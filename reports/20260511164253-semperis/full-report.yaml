      - number: '4.3'
        title: Capital Adequacy and Financing Structure
        blocks:
          - type: paragraph
            body: |
              Semperis raised $125 million in growth financing in June 2024 from J.P. Morgan Asset Management and
              Hercules Capital. This round was structured as a combination of equity and growth debt financing; the
              growth financing terminology in official announcements distinguishes it from a pure equity Series D.
              Total capital raised through June 2024 is approximately $368-373 million depending on whether earlier
              smaller rounds are included. The most recent prior equity raise was the $200 million Series C led by
              KKR in March 2022, which established a $1 billion+ unicorn valuation.

              Semperis CFO Jeff Bray described the June 2024 financing as complementing an already strong balance
              sheet, implying the company was not in a distressed capital position. The primary stated uses of the
              growth capital are product innovation and global customer base expansion. This is consistent with active
              hiring in sales, engineering, and go-to-market roles. With $125M raised in June 2024 and demonstrated
              3,000%+ revenue growth over five years, the company's capital runway extends well into 2026 and beyond.

              The investor base includes KKR (private equity, Series C lead), J.P. Morgan Asset Management, Hercules
              Capital (growth debt specialist), Insight Partners (growth software specialist), Ten Eleven Ventures
              (cybersecurity-focused), Paladin Capital Group (government and national security-focused), Atrium Health
              Strategic Fund, and others. This diverse institutional backing provides both financial resources and
              strategic alignment with Semperis' enterprise and government customer base.

              Monthly burn rate and exact cash on hand are not publicly disclosed. As a private company with
              approximately 500-600 employees, monthly cash burn can be roughly estimated: assuming $15,000-$20,000
              average total compensation per employee per month, total payroll-equivalent burn would be $7.5-12M per
              month before revenue offset. At $100M+ ARR (approximately $8.3M per month in subscription revenue), the
              company is likely approaching cash-flow breakeven or already past it given high SaaS gross margins.
              However, aggressive R&D investment and international expansion could sustain a negative free cash flow
              profile. The hiring of Jeff Bray, Mike DeGaetano, and Annabel Lewis with IPO experience signals a
              12-24 month public market preparation timeline consistent with the June 2024 capital raise.
