    title: Investment KPIs
    type: kpi
    layout: standard
    summary: >-
      Investment committee scorecard for Semperis across seven key dimensions scored on a 1-5 scale based on publicly
      available evidence as of May 2026. Score of 3 indicates adequate evidence or neutral assessment; scores of 4-5
      indicate strength; scores of 1-2 indicate weakness or risk.
    data:
      items:
        - label: Market Opportunity
          value: 4/5
          detail: >-
            ITDR market $16B+ in 2025 growing at 25-30% CAGR; strong TAM expansion driven by rising AD attack surface
            and regulatory mandates
        - label: Customer Proof
          value: 4/5
          detail: >-
            1,000+ enterprise customers; named Fortune 500 logos in financial services, healthcare, and aviation; $100M+
            ARR milestone confirmed January 2025
        - label: Competitive Moat
          value: 3/5
          detail: >-
            AD-specific depth is durable short-term; Microsoft MDI bundling and CrowdStrike platform consolidation
            reduce long-term moat confidence meaningfully
        - label: Financial Quality
          value: 3/5
          detail: >-
            ARR disclosed and growing; burn rate, NRR, and gross margin are opaque; SaaS model assumed but private
            financial data is severely limited
        - label: Risk Profile
          value: 3/5
          detail: >-
            No known litigation or regulatory investigation; Hercules debt covenants add operational risk; Israel R&D
            geopolitical exposure is manageable but present
        - label: Valuation Attractiveness
          value: 3/5
          detail: >-
            10x ARR is fair at 20%+ growth; peer median supports current mark; at-risk if growth decelerates
            significantly or multiples compress
        - label: Evidence Quality
          value: 3/5
          detail: >-
            Strong official and news evidence confirms scale and funding; no audited financials; NRR and gross margin
            opaque; recommendation is evidence-limited
    approximationNotes: >
      KPI scores are qualitative assessments based on publicly available evidence as of May 2026. Scores for financial
      quality and evidence quality would improve materially upon receipt of audited financials, NRR disclosure, and
      gross margin data under NDA from Semperis management.
