  - id: FE002
    title: Customer Workflow / Operating Flow — AD Security Lifecycle
    slug: customer-workflow-operating-flow
    type: flow
    layout: wide
    summary: >-
      Operational workflow showing how a Semperis customer moves through the full AD security lifecycle using different
      platform products, from initial assessment through recovery.
    data:
      nodes:
        - id: n1
          label: Baseline Assessment
          detail: >-
            Run Purple Knight free scan to discover IOEs and IOCs in AD and Entra ID; generate scored report and
            prioritized remediation checklist
          type: step
        - id: n2
          label: Tier 0 Hardening
          detail: >-
            Use Forest Druid to define Tier 0 asset perimeter; map all ownership paths to privileged assets; close
            blast-radius backdoors
          type: step
        - id: n3
          label: Continuous Detection
          detail: >-
            Deploy DSP to monitor replication log for all AD changes; receive real-time alerts on suspicious changes
            with auto-scored severity
          type: step
        - id: n4
          label: Runtime Attack Interception
          detail: >-
            Lightning IRP detects in-memory attacks (DCSync, Golden Ticket) before they complete; alerts SOC via
            SIEM/SOAR integration
          type: step
        - id: n5
          label: Targeted Remediation
          detail: >-
            DSP auto-remediates or one-click rolls back specific malicious AD object changes; analyst reviews audit
            trail for forensics
          type: step
        - id: n6
          label: Incident Response
          detail: >-
            Semperis IFIR team engages for threat eradication verification; Ready1 crisis management platform
            coordinates stakeholder communication
          type: decision
        - id: n7
          label: Forest Recovery
          detail: >-
            ADFR orchestrates malware-free full or partial forest restore on clean hardware; Azure cloud backups
            available if on-prem storage lost
          type: step
        - id: n8
          label: Post-Recovery Validation
          detail: >-
            Re-run Purple Knight scan; verify Tier 0 perimeter with Forest Druid; confirm clean AD state before
            returning to production
          type: step
      edges:
        - from: n1
          to: n2
          label: Findings drive hardening
        - from: n2
          to: n3
          label: Harden then monitor continuously
        - from: n3
          to: n4
          label: Alerts escalate to runtime detection
        - from: n4
          to: n5
          label: Attack confirmed → remediate
        - from: n3
          to: n5
          label: DSP change alert → rollback
        - from: n5
          to: n6
          label: Major incident declared
        - from: n6
          to: n7
          label: Recovery required
        - from: n7
          to: n8
          label: Forest online → validate
        - from: n8
          to: n3
          label: Return to continuous monitoring
    claimRefs:
      - CE002
      - CE016
      - CE017
      - CE019
      - CE027
      - CE036
