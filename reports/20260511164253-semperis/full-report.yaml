      - number: '6.2'
        title: 'Purple Knight Funnel to Paid Customers: From 65K Community to 1,000+ Enterprise'
        blocks:
          - type: paragraph
            body: >-
              Semperis' path from founding in 2014 to 1,000+ enterprise customers in 2025 follows a distinctive
              product-led growth funnel anchored by Purple Knight, the company's free Active Directory security
              assessment tool. Purple Knight — available at no cost since 2021 — has been downloaded or used by more
              than 65,000 organizations as of 2025, creating a large top-of-funnel pipeline that converts a subset of
              free users into paid Directory Services Protector (DSP) and Active Directory Forest Recovery (ADFR)
              customers. The 1,000+ paid enterprise customer milestone versus the 65,000+ Purple Knight community
              implies a roughly 1.5% free-to-paid conversion rate — low by PLG SaaS standards but entirely consistent
              with the long-cycle, multi-stakeholder enterprise procurement environment for AD security tools, where the
              time from first Purple Knight scan to purchase can span 12–24 months. The company's customer trajectory is
              estimated to have started at approximately 100 paying customers in 2020 and grown through several distinct
              phases: a series of high-profile ransomware attacks targeting Active Directory infrastructure from 2020 to
              2022 (including attacks on healthcare, energy, and transportation sectors) created strong demand pull for
              purpose-built AD recovery tools. Semperis FedRAMP Moderate authorization in 2022–2023 enabled government
              sector penetration. Channel partner program expansion through 2023–2025 accelerated mid-enterprise account
              acquisition. The 100M+ identities protected claim — disclosed by Semperis but covering community and paid
              users combined — indicates scale of deployment but cannot be parsed for paid-only coverage. No growth rate
              or cohort vintage data has been publicly disclosed.
