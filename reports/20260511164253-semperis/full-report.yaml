  - id: FR003
    title: Dependency map
    type: dag
    layout: wide
    summary: >-
      Dependency map showing critical inputs to the Semperis platform and the customer segments it serves. Microsoft
      Active Directory is the foundational platform dependency. Investor dependencies (Insight Partners, J.P. Morgan and
      Hercules Capital) govern capital availability and exit timing. The FedRAMP Authorization Body controls access to
      the US federal customer segment. The Israel R&D Center provides engineering capacity. OEM partner Cohesity
      provides amplified distribution to data infrastructure buyers.
    data:
      nodes:
        - id: dep-microsoft
          label: Microsoft Active Directory
          detail: >-
            Core market exists because AD dominates enterprise authentication; Microsoft controls the platform Semperis
            depends on for product relevance; Entra ID migration trajectory is the long-term existential dependency risk
          type: dependency
        - id: dep-insight
          label: Insight Partners
          detail: >-
            Primary financial backer across multiple funding rounds; board influence over capital allocation, executive
            hiring, and exit timing; LP dynamics affect secondary market pressure
          type: dependency
        - id: dep-jpmorgan
          label: J.P. Morgan / Hercules Capital
          detail: >-
            $125M 2024 growth round lead investors; debt component from Hercules Capital includes financial maintenance
            covenants; specific covenant terms not publicly disclosed
          type: dependency
        - id: dep-cohesity
          label: Cohesity OEM Partnership
          detail: >-
            Cohesity Identity Resilience powered by Semperis technology; co-marketed data and identity resilience
            solution amplifies distribution to Cohesity enterprise customer base
          type: dependency
        - id: dep-fedramp-body
          label: FedRAMP Authorization Body
          detail: >-
            FedRAMP Moderate authorization governs federal civilian procurement eligibility; annual re-assessment
            required to maintain status; High authorization required for DoD and IC segments
          type: dependency
        - id: dep-israel-rnd
          label: Israel R&D Center
          detail: >-
            Majority of core engineering concentrated in Tel Aviv; delivers DSP, ADFR, Purple Knight, and Forest Druid
            product development; geopolitical risk affects delivery continuity
          type: dependency
        - id: semperis-core
          label: Semperis Platform
          detail: >-
            DSP, ADFR, Purple Knight, and Forest Druid delivered to 1,000+ enterprise customers; multi-product suite
            with increasing cross-sell penetration
          type: process
        - id: customer-federal
          label: US Federal Agencies
          detail: >-
            FedRAMP-dependent government customer segment; estimated 10-15% of ARR; CISA-aligned use cases for critical
            infrastructure protection
          type: actor
        - id: customer-enterprise
          label: Fortune 500 Enterprise
          detail: >-
            Primary revenue base; 1,000+ enterprise customers; DSP plus ADFR multi-product expansion is the primary ARR
            growth motion
          type: actor
      edges:
