  - number: 7
    title: Risks
    sections:
      - number: '7.1'
        title: Regulatory and Legal Risks
        blocks:
          - type: paragraph
            body: >-
              Semperis operates in a heavily regulated environment where four distinct regulatory risk vectors create
              cumulative compliance obligations. The most material is GDPR/data-processor liability: Semperis processes
              Active Directory directory data for EU-based enterprise customers. AD objects contain personal data as
              defined by GDPR Article 4(1) — full names, email addresses, phone numbers, job titles, and organizational
              membership — meaning Semperis acts as a data processor requiring a compliant Data Processing Agreement
              (DPA) with each EU customer under Article 28. Non-compliance fines can reach 4% of global annual turnover
              or €20M per violation, whichever is greater. With Semperis approaching and surpassing $100M ARR and EU
              customers representing a material share of enterprise accounts, the aggregate fine exposure is
              structurally significant. Semperis discloses a compliance certification page and trust center, suggesting
              an active compliance program, but specific GDPR enforcement risk cannot be verified from public data.

              Export control compliance under the US Export Administration Regulations (EAR Part 740) is a second
              distinct vector. Semperis operates an R&D center in Tel Aviv, Israel, developing cryptographic security
              software (Active Directory encryption keys, Kerberos golden ticket detection, cryptographic backup
              verification). EAR classifies cryptographic software under Export Control Classification Number 5E002;
              license exceptions (ENC) are required for commercial export. An export compliance failure could result in
              fines up to $1M per violation, debarment from US government contracting, and license revocation.

              FedRAMP authorization is a third risk: Semperis holds FedRAMP Moderate authorization for Directory
              Services Protector, per the FedRAMP marketplace, but has not achieved FedRAMP High authorization, which
              limits addressable revenue from sensitive federal civilian agencies (DoD, IC) where High authorization is
              required. The authorization gap creates a ceiling on federal revenue until High is achieved, a process
              that typically requires 12–24 months. Patent and IP litigation risk in the AD security tooling market is
              non-zero; active patenting of AD security methods (evidenced by US patent applications including
              US20230075051A1 series) creates future exposure to claims, though no known litigation against Semperis has
              been identified through public court record searches as of May 2026. CISA's identity and access management
              framework and NIST Zero Trust guidelines create ongoing alignment requirements for government-facing
              products that must be maintained to preserve the government sales motion.
