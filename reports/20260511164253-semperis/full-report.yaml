      - number: '4.2'
        title: Unit Economics and Sales Efficiency
        blocks:
          - type: paragraph
            body: |
              Semperis' unit economics are not publicly disclosed, but can be triangulated from product positioning,
              market comparables, and limited public signals. Gross margin for enterprise identity SaaS companies
              including comparable public companies such as CyberArk and SentinelOne typically falls in the 70-85%
              range. Given Semperis' software-only delivery model with no significant hardware component, its gross
              margin is likely within this range, though exact figures remain unavailable.

              The go-to-market motion is a high-touch enterprise sales model combining direct enterprise sales with
              channel partners. AWS Marketplace listing enables faster procurement cycles for enterprises with AWS
              cloud budgets. Customer acquisition cost (CAC) is not disclosed, but enterprise identity security sales
              cycles typically span 6-18 months with multi-department stakeholders. This implies elevated CAC per
              account, offset by the high lifetime value (LTV) of mission-critical security infrastructure contracts
              that face significant switching costs once deeply integrated.

              Net revenue retention (NRR) is the single most important unit economics metric for a SaaS company at
              Semperis' stage but has not been disclosed. Given the mission-critical nature of Active Directory
              protection and Semperis' explicit positioning around enterprise-wide coverage, NRR is likely above 115%
              to 120% consistent with top-tier identity security SaaS peers. Purple Knight's 75,600+ free downloads
              represent a qualified pipeline of organizations that have already been exposed to the Semperis
              methodology and platform, lowering effective CAC for DSP conversions from this cohort.

              The Ransomware Risk Report 2025 found that 78% of responding organizations were targeted by ransomware
              within the prior 12 months, representing persistent demand pressure that shortens decision cycles for AD
              security investments. Annual contract value per enterprise DSP deployment is estimated at $100,000 to
              $500,000+ depending on AD environment scale. At $100M+ ARR with 1,000+ enterprise customers, the implied
              average ARR per customer is approximately $100,000, consistent with large-enterprise pricing dynamics.
              The key diligence requirement is access to actual CAC, LTV, payback period, NRR, and GRR cohort data.
