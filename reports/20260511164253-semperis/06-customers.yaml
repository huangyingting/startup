  - id: expansion-concentration
    title: "Land-and-Expand Motion, Concentration Risk, and Channel Dependence"
    body: >-
      Semperis' land-and-expand strategy operates along three primary dimensions: product
      cross-sell (DSP customers adding ADFR or Lightning IRP), forest coverage expansion
      (adding additional AD forests within existing enterprise accounts as they grow or
      acquire companies), and geographic expansion within global enterprise customers. The
      natural expansion path from DSP threat detection to ADFR recovery represents the highest-
      value cross-sell in the portfolio — it adds a materially distinct use case with a different
      budget owner (business continuity, not just security operations) and higher switching costs.
      ADFR typically adds $200K–$400K to annual contract value for large enterprise accounts,
      representing a meaningful upsell per customer. Expansion revenue from this motion is not
      separately disclosed, creating uncertainty about the health of the land-and-expand thesis.
      The most significant concentration risk relates to large enterprise account dependence:
      given Semperis' reported valuation of approximately $1.3–1.5B from its Series C in 2024
      and typical enterprise infrastructure company ARR multiples, the top 20 accounts likely
      represent more than 30% of ARR — a concentration profile typical of enterprise security
      vendors at this stage. Channel dependence through VAR and MSP partners introduces secondary
      concentration risk if major resellers account for a disproportionate share of new customer
      acquisition. Single-product customers — those using DSP only or ADFR only — represent
      a more vulnerable retention segment given lower switching costs. No customer has been
      publicly identified as exceeding 10% of ARR, but the absence of disclosure limits
      diligence visibility. Geographic concentration at approximately 60% North America constrains
      the expansion narrative in high-growth EMEA and APAC enterprise security markets.
    claimRefs:
      - CU024
      - CU025
      - CU026
      - CU027
