  evidenceGaps:
    - id: EGU001
      description: >-
        Semperis has not disclosed net revenue retention (NRR), gross revenue retention (GRR),
        gross churn rate, or any cohort-level retention metric in any public statement, press
        release, or analyst briefing as of May 2026. Without this data, it is impossible to
        independently verify the high switching cost thesis or to distinguish retention performance
        between ADFR-anchored customers (likely higher) and DSP-only customers (likely lower,
        given MDI competitive pressure). This is the single most important customer diligence
        data point to request from management in due diligence sessions.
      relatedQuestionRefs:
        - QU007
        - QU019

    - id: EGU002
      description: >-
        Average annual contract value per enterprise customer and ARR-per-customer distribution
        have not been publicly disclosed by Semperis. Given the 1,000+ customer count and the
        reported valuation of approximately $1.3–1.5B (implying significant ARR), understanding
        ACV distribution — particularly the share of revenue concentrated in large enterprise
        accounts above $500K ACV — is critical to evaluating concentration risk and expansion
        potential. Diligence must request ACV quartile distribution and top-10 customer ARR
        concentration from management.
      relatedQuestionRefs:
        - QU008
        - QU015

    - id: EGU003
      description: >-
        The named customer proof table captures only six publicly identified customers out of
        1,000+ in the total enterprise base. This represents less than 1% of the customer base
        and cannot be assumed representative of the broader installation. The retention status
        of all six named customers is unconfirmed — Semperis does not disclose whether named
        case study customers remain active subscribers. Independent outcome validation of case
        study claims (e.g., recovery time improvement at Lenovo) is unavailable. Diligence
        requires customer reference calls with at least three current subscribers across different
        verticals to validate outcome claims and retention.
      relatedTableRefs:
        - TU003
      relatedQuestionRefs:
        - QU002
        - QU012

