figures:
  - id: FU001
    title: Customer journey map
    type: journey-map
    layout: wide
    summary: >-
      End-to-end Semperis customer acquisition and expansion lifecycle — from free tool discovery
      through enterprise purchase, production deployment, and upsell expansion. Each stage
      maps the primary customer action, adoption surface, and key touchpoints driving progression.
    data:
      items:
        - label: "Awareness"
          detail: >-
            IT security team or AD administrator discovers AD vulnerabilities through Purple
            Knight free assessment or via ransomware incident affecting a peer organization;
            Semperis Research Lab publications and MITRE ATT&CK references drive organic
            discovery.
          touchpoints:
            - "Purple Knight free AD assessment tool (65K+ organizations)"
            - "MITRE ATT&CK framework references and Semperis Research Lab publications"
            - "Analyst reports (KuppingerCole, Forrester, Wavestone) citing Semperis"
        - label: "Evaluation"
          detail: >-
            Security team evaluates DSP and ADFR against CrowdStrike Falcon Identity Protection
            and Microsoft Defender for Identity; engages in proof-of-concept or 30-day trial;
            independent review platforms consulted to validate peer experience.
          touchpoints:
            - "30-day trial or POC (typically 60–120 day enterprise eval cycle)"
            - "G2, Gartner Peer Insights, and TrustRadius peer review research"
            - "Direct comparison against Microsoft MDI baseline already deployed"
        - label: "Purchase"
          detail: >-
            Enterprise procurement team negotiates annual subscription via direct sales or
            VAR/channel partner; FedRAMP compliance review for government accounts; multi-year
            pricing often negotiated for larger deployments.
          touchpoints:
            - "Direct enterprise sales for accounts >$250K ACV"
            - "VAR/MSP channel partner for mid-enterprise accounts"
            - "GSA or other government contract vehicles for federal accounts"
        - label: "Deployment"
          detail: >-
            DSP sensors deployed on domain controllers; ADFR configured for cyber-resilient
            recovery against offline forensically clean backups; integration with SIEM (Splunk,
            Microsoft Sentinel) and SOAR tooling; tabletop exercise to validate recovery plan.
          touchpoints:
            - "Professional services onboarding (typically 4–8 weeks)"
            - "Splunk/Microsoft Sentinel integration configuration"
            - "Recovery tabletop exercise and runbook certification"
        - label: "Expansion"
          detail: >-
            Multi-product customers add Lightning IRP, additional AD forests, or Entra ID
            coverage; annual renewal captures upsell from scope expansion; Customer Success
            team drives cross-sell conversations; Purple Knight results surface additional risks.
          touchpoints:
            - "Annual renewal plus upsell motion (ADFR on top of DSP)"
            - "Customer Success and Technical Account Manager engagement"
            - "Lightning IRP and additional forest scope expansion"
    approximationNotes: >-
      Touchpoint ordering and conversion timing are estimated from peer review platform disclosures,
      independent customer testimonials, and enterprise security SaaS benchmarks. The 60–120 day
      evaluation cycle estimate is derived from G2 and TrustRadius buyer-reported procurement
      timelines. Semperis has not disclosed average sales cycle length.
    claimRefs:
      - CU002
      - CU005
      - CU006
      - CU007
      - CU024
      - CU025

