chapter:
  number: 6
  title: Customers
  summary: >
    Semperis serves 1,000+ enterprise customers anchored in large organizations with complex
    Active Directory environments — typically 10,000+ employees and 100+ domain controllers.
    The customer base spans financial services (~25–30%), healthcare (~15–20%), government
    and federal agencies (~10–15%), critical infrastructure (~10–15%), and general Fortune 500
    enterprises (~30–40%). Geographic mix is estimated at ~60% North America and ~40%
    international. Purple Knight, the free AD assessment tool with 65,000+ community users,
    acts as the primary top-of-funnel demand generator, implying a ~1.5% free-to-paid
    conversion rate — low by SaaS standards but consistent with high-touch enterprise cycles.
    Named customers include Lenovo, United Airlines, Starbucks, American Airlines, Hertz, and
    ADP, with case study quality ranging from detailed outcome narratives (Lenovo, healthcare)
    to logo references (Starbucks, Hertz). Critical information gaps include: no disclosed NRR,
    GRR, or churn data; no customer concentration breakdown; and no channel-revenue share. High
    switching costs for ADFR-anchored accounts — rooted in tested DR runbooks and recovery
    certifications — underpin an estimated gross retention above 85%, though this estimate is
    unverified. Customer satisfaction on G2 (4.7/5.0) and Gartner Peer Insights (4.4/5.0) is
    high, with recurring criticism around pricing complexity and deployment cost in large hybrid
    environments. Enterprise vendor consolidation trends represent the primary adverse customer
    risk, as platform vendors (Microsoft, CrowdStrike) bundle competing capabilities into
    existing enterprise contracts.

sections:
  - id: customer-base-segmentation
    title: "Enterprise Mix, Buyer Profile, and Channel Breakdown"
    body: >-
      Semperis serves a base of 1,000+ enterprise customers anchored in organizations with
      complex Active Directory environments — typically 10,000+ employees, 100+ domain controllers,
      and a security operations team capable of procuring and deploying a dedicated AD security
      platform. The primary buyer is the CISO or VP of Security, working with AD administration
      and IT security operations teams; the primary payer is the enterprise security or IT
      operations budget, not the identity and access management team. The customer mix is
      heavily weighted toward regulated verticals: financial services is the estimated largest
      vertical (25–30% of customer base), driven by regulatory mandates for identity security
      and resilience. Healthcare accounts for an estimated 15–20%, driven by ransomware
      exposure and HIPAA-related compliance mandates. Government and federal agencies represent
      10–15%, with FedRAMP Moderate authorization enabling Semperis to compete in civilian
      federal procurement. Critical infrastructure sectors — energy, utilities, and transportation
      — represent a further 10–15%, motivated by CISA mandates and the role of Active Directory
      in operational technology network authentication. Fortune 500 and large-enterprise general
      accounts account for the remainder, but likely represent a disproportionately large share
      of ARR given per-seat deal sizes. Geographic mix is estimated at approximately 60% North
      America (US and Canada) and 40% international (primarily EMEA), with APAC still a modest
      minority of the installed base. Channel mix spans a direct enterprise sales motion for
      accounts above approximately $250K in annual contract value and a growing VAR/MSP partner
      network for mid-enterprise accounts. Semperis has publicly disclosed a formal MSP program
      and reseller partnerships with major security distributors, but has not provided partner-
      sourced ARR as a share of total ARR. No segment-level revenue concentration data has
      been publicly disclosed.
    claimRefs:
      - CU001
      - CU002
      - CU003
      - CU004
      - CU005
      - CU037
      - CU038
    tableRefs:
      - TU001
    figureRefs:
      - FU001

  - id: adoption-trajectory
    title: "Purple Knight Funnel to Paid Customers: From 65K Community to 1,000+ Enterprise"
    body: >-
      Semperis' path from founding in 2014 to 1,000+ enterprise customers in 2025 follows a
      distinctive product-led growth funnel anchored by Purple Knight, the company's free Active
      Directory security assessment tool. Purple Knight — available at no cost since 2021 — has
      been downloaded or used by more than 65,000 organizations as of 2025, creating a large
      top-of-funnel pipeline that converts a subset of free users into paid Directory Services
      Protector (DSP) and Active Directory Forest Recovery (ADFR) customers. The 1,000+ paid
      enterprise customer milestone versus the 65,000+ Purple Knight community implies a roughly
      1.5% free-to-paid conversion rate — low by PLG SaaS standards but entirely consistent
      with the long-cycle, multi-stakeholder enterprise procurement environment for AD security
      tools, where the time from first Purple Knight scan to purchase can span 12–24 months.
      The company's customer trajectory is estimated to have started at approximately 100 paying
      customers in 2020 and grown through several distinct phases: a series of high-profile
      ransomware attacks targeting Active Directory infrastructure from 2020 to 2022 (including
      attacks on healthcare, energy, and transportation sectors) created strong demand pull for
      purpose-built AD recovery tools. Semperis FedRAMP Moderate authorization in 2022–2023
      enabled government sector penetration. Channel partner program expansion through 2023–2025
      accelerated mid-enterprise account acquisition. The 100M+ identities protected claim —
      disclosed by Semperis but covering community and paid users combined — indicates scale
      of deployment but cannot be parsed for paid-only coverage. No growth rate or cohort
      vintage data has been publicly disclosed.
    claimRefs:
      - CU006
      - CU007
      - CU008
      - CU009
      - CU010
      - CU029
    tableRefs:
      - TU002
    figureRefs:
      - FU002

  - id: named-customer-proof
    title: "Named Logos, Case Studies, and Production Deployment Quality"
    body: >-
      Semperis has publicly named a small fraction of its 1,000+ customer base, with named
      customer proof concentrated in globally recognized brands across transportation, retail,
      technology, and financial services. The highest-quality named proof is Lenovo — for which
      Semperis has published a case study describing DSP and ADFR deployment following an AD
      compromise incident, with described outcomes including materially faster recovery compared
      to manual processes. United Airlines is named with DSP deployed across its global AD
      environment for continuous threat detection. American Airlines' deployment was confirmed
      in a Semperis press release citing enterprise-scale AD identity protection. Starbucks is
      listed on the Semperis customer page, but public case study detail is limited to logo
      reference and general scope. Hertz and ADP are referenced in company materials without
      confirmed outcome metrics. An unnamed US healthcare system used Semperis ADFR to recover
      from a ransomware attack in under 30 minutes — a compelling outcome, but the absence of
      customer naming limits independent corroboration. A UK public sector organization is
      cited in a case study demonstrating AD recovery for government infrastructure. On
      independent review platforms, reviewers from named enterprises in healthcare, financial
      services, and critical infrastructure confirm production use. The overall evidence quality
      for named customers is moderate: company-produced case studies dominate, independent
      third-party validation of specific outcome claims is limited, and retention status of
      named customers (whether they remain active subscribers) is not confirmed. The six publicly
      named customers — Lenovo, United Airlines, American Airlines, Starbucks, Hertz, and ADP
      — represent less than 1% of the claimed customer base, limiting generalizability of
      named proof to the broader installed base.
    claimRefs:
      - CU011
      - CU012
      - CU013
      - CU014
      - CU015
      - CU016
      - CU031
      - CU032
