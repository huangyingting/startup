summary:
  headline: >
    Semperis 是 Active Directory 与 Entra ID 身份韧性平台的确定性龙头，拥有 $100M+ ARR、1,000+ 企业客户和耐久的 AD 专属护城河；但 $1B+ 估值约等于 ARR 的
    ~10x，已经计入持续高增长。Microsoft 捆绑、财务不透明，以及 CrowdStrike 和 SentinelOne 的平台整合压力，让当前价格下更适合继续研究，而不是直接买入。
