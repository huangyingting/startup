companyProfile:
  summary: |
    Semperis is a cybersecurity company that has built the leading identity threat detection
    and response (ITDR) platform for Active Directory and Microsoft Entra ID environments.
    Founded in 2013 in Hoboken, NJ by CEO Mickey Bresman, CTO Guy Teverovsky, and EVP Business
    Development Matan Liberman, the company addresses a critical but historically underserved
    attack surface: Active Directory, which manages identity and access for 90%+ of Global
    Fortune 1000 organizations and is the #1 target in ransomware and nation-state attacks.
    Semperis's five-product Identity Resilience Platform (Directory Services Protector,
    AD Forest Recovery, Lightning IRP, Purple Knight, and Forest Druid) is the only suite
    covering continuous detection, real-time protection, and cyber-aware recovery for hybrid
    AD/Entra ID environments. The company crossed $100M ARR in January 2025 with a 1,000+
    enterprise customer base and $368M in total funding, achieving unicorn status in June 2024.
  foundedDate: "2013-01-01"
  founders:
    - name: Mickey Bresman
      role: CEO and Co-Founder
      background: |
        Serial entrepreneur with prior identity and security company experience. Primary
        external face of Semperis; leads go-to-market, investor relations, and strategic
        partnerships. Based in New York metro area.
      claimRefs: []
    - name: Guy Teverovsky
      role: CTO and Co-Founder
      background: |
        Deep Active Directory engineering expertise; leads all product and technology
        development from the Tel Aviv R&D center (~150 engineers). Architect of the
        cyber-aware AD Forest Recovery technology and the DSP detection engine.
      claimRefs: []
    - name: Matan Liberman
      role: EVP Business Development and Co-Founder
      background: |
        Leads strategic alliances, channel partnerships, and business development.
        Key architect of the Microsoft, Splunk, and CrowdStrike integration ecosystem.
      claimRefs: []
  foundingLocation: "Hoboken, NJ, USA"
  headquarters: "Hoboken, NJ, USA"
  productSummary: |
    Five-product Identity Resilience Platform: (1) Directory Services Protector (DSP) — hybrid
    AD/Entra ID threat detection and response with 200+ indicators of exposure/compromise and
    real-time rollback; (2) AD Forest Recovery (ADFR) — cyber-aware backup and recovery
    system 3-5x faster than Microsoft native recovery, preventing reinfection; (3) Lightning IRP
    — ML-powered runtime identity threat blocking launched ~2023; (4) Purple Knight — free
    community AD security assessment tool (65,000+ organizations, 218 IoE/IoC checks);
    (5) Forest Druid — free attack path analysis from Tier 0 AD objects. Platform integrates
    with Splunk, Microsoft Sentinel, QRadar, and major SOAR tools.
  customerFocus: >
    Fortune 500 and large enterprise organizations with complex on-premises Active Directory
    and hybrid Entra ID environments; primary verticals include financial services, healthcare,
    government, critical infrastructure, and manufacturing. Secondary: mid-market enterprises
    via channel partners.
  businessModel: >
    Annual subscription SaaS licensing for paid products (DSP, ADFR, Lightning IRP); freemium
    funnel through Purple Knight and Forest Druid community tools driving enterprise pipeline;
    professional services and implementation as ancillary revenue; channel distribution through
    VARs and MSPs.
  stage: "Growth (post-Series C, unicorn)"
  fundingStatus: >
    $125M growth financing closed June 2024 (J.P. Morgan Private Capital + Hercules Capital
    debt/equity hybrid); $200M Series C raised March 2022 (KKR-led + Insight, Ten Eleven,
    Paladin, Tech Pioneers, Atrium Health); $40M Series B in 2020 (Insight Partners); total
    raised ~$368M; current valuation $1B+ (unicorn).
  disclosureProfile: private-undisclosed
  claimRefs: []

summary:
  headline: >
    Semperis is the definitive identity-resilience platform for Active Directory and Entra ID,
    with $100M+ ARR, 1,000+ enterprise customers, and a durable AD-specific moat — but the
    $1B+ valuation at ~10x ARR is priced for continued high growth, and Microsoft bundling,
    opaque financials, and platform-consolidation pressure from CrowdStrike and SentinelOne
    make this a research-more rather than an outright buy at current price.
