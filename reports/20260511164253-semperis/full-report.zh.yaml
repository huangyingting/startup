      - number: '1.4'
        title: 规模指标、客户与市场地位
        blocks:
          - type: paragraph
            body: >
              截至 early 2025，Semperis 年度经常性收入（ARR）已突破 $100 million；公司在 January 2025 的新闻稿和 PR Newswire
              发布中公开宣布了这一里程碑。收入增长非常突出：Semperis 称，在公告前五年收入增长 3,000%， 背后是多起高知名度 AD 攻击之后，企业快速采用 ITDR 解决方案（Colonial
              Pipeline、SolarWinds 以及其他利用 AD 凭据的勒索事件）。根据分析师预测，ARR 在 2026 约为 $151 million，反映出持续的两位数增长。

              公司服务 1,000+ 企业客户，其中包括具名 Fortune 500 账户：American Airlines、ADP、Lenovo、United Airlines 和 Starbucks。Semperis
              称，其客户群中受保护的用户身份超过 100 million。客户集中在航空、金融服务、 科技等受监管行业，既反映这些行业安全预算更高，也反映这些行业一旦 AD 受损，监管后果更重。

              保守估计下，公司员工数约为 500 名员工；部分数据库追踪到接近 637 名员工。公司一直维持约 24% 年度员工增长。Semperis 委托 Forrester 完成的 Total Economic
              Impact（TEI）研究测算，一个综合客户可获得 $9.5 million 的三年价值，为高管层企业采购决策提供了商业理由。
