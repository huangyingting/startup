      - number: '2.4'
        title: 增长驱动、监管催化剂与市场约束
        blocks:
          - type: paragraph
            body: >-
              ITDR 需求最核心的结构性驱动，是 Active Directory 被攻陷在现代网络攻击中的主导地位。CrowdStrike 的 2025 Global Threat Report 记录，身份攻击同比增加
              71%，在已观察到的勒索软件入侵中，AD 被攻击的比例超过 90%。 Verizon 的 2025 Data Breach Investigations Report
              同样记录，凭据攻陷是最主要的初始访问向量，出现在 68% 的数据泄露中。这种高普遍性形成了持续、且有证据支撑的需求信号，竞争对手很难将其消解。

              监管强制要求是第二大需求催化剂，尤其影响政府与受监管行业。CISA 的 Zero Trust Maturity Model（v2.0, 2023） 明确要求身份支柱控制，包括连续身份威胁检测。EO
              14028（Executive Order on Improving the Nation's Cybersecurity, May 2021）要求联邦民事机构在 2024 前采用 Zero
              Trust，创造了联邦采购管线。CMMC 2.0 Level 2 （生效于 December 2023）要求 DoD 承包商实施与 ITDR 功能相匹配的访问控制和事件检测能力。在欧洲， NIS2（生效于
              October 2024）和 DORA（生效于 January 2025）分别对关键基础设施运营商和金融实体施加事件响应 与运营韧性要求——两者都要求 Semperis 所提供的这类快速身份恢复能力。

              云身份扩散构成第三个结构性驱动：Microsoft 的 Entra ID（前身为 Azure AD）已在全球服务超过 700 million 月活用户；本地 AD 与 Entra ID
              同步的混合环境，如今已成为主流企业架构。相较纯本地部署，这种混合模型使攻击面翻倍， 因为攻击者可以攻陷任一环境，再横跳到另一端。

              主要市场约束包括：Microsoft 捆绑的 Defender for Identity（MDI）工具，它被纳入 Microsoft 365 E5 和 Defender for Identity P2
              授权，以零增量成本提供基础 AD 威胁检测；CrowdStrike 和 SentinelOne 带来的竞争压力， 它们正把 ITDR
              能力扩展到各自端点防护平台内；安全团队围绕既有平台供应商精简工具所带来的预算整合压力； 以及一个定义性术语（ITDR）到 2022 才被创造的市场，天然面临早期买方教育挑战。Microsoft
              捆绑威胁是分析师评论中 最常被提及的负面风险，也是多位行业观察者认为 Semperis 在云身份细分的竞争护城河正在收窄、但在本地 AD 恢复上 仍然强势的主要原因。
