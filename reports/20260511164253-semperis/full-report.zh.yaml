      - number: '3.2'
        title: 竞争对手画像——规模、能力、定价与战略方向
        blocks:
          - type: paragraph
            body: >-
              Microsoft Defender for Identity（MDI）是影响 Semperis 最重大的竞争变量。MDI 是基于 Microsoft 传感器技术的云端 AD 威胁检测工具，消费本地 AD
              域控制器流量，并针对 80+ 攻击技术发出告警。它在 Microsoft 365 E5 （$57/user/month）、Microsoft Defender for Identity Plan
              2（$5.50/user/month，作为 E3 附加项）或 Microsoft Defender XDR 套件中以零增量成本交付。估计 70%+ Semperis 企业客户已经持有 M365 E5 授权， 使
              MDI 成为默认已部署基线，Semperis 必须让客户付费来补充它。MDI 的实质限制已有记录：缺少自动化响应作业手册， 不提供取证型 AD 回滚或林级恢复能力，本地 / Entra ID
              混合关联有限，并需要大量配置工作来降低误报率。 IBM X-Force 在 2025 的红队测试发现，MDI 只检测出被测 AD 攻击技术中的 42%。Semperis 的商业化 话术正是直接利用这些已有记录的
              MDI 缺口。

              CrowdStrike Falcon Identity Protection 为 CrowdStrike 的端点情报平台加入身份信号，提供 AD 用户风险评分， 并把端点事件与身份异常做交叉关联。定价通常为
              $8–15/endpoint/year，作为 Falcon Complete 或 Falcon Enterprise 套件的附加项。CrowdStrike 不提供 AD 林级恢复、备份，或 Semperis
              DSP 所具备的 AD 专用攻击技术覆盖深度。 但在 CrowdStrike 已是既有 EDR 供应商的账户中，Falcon Identity Protection 是低摩擦扩展，直接竞争 Semperis
              DSP 的检测层。CrowdStrike 的 FY2026 ARR 为 $3.65B，客户基础 29,000+，赋予它压倒性的分发优势。

              Quest Software 是 AD 恢复与备份上最直接的对手。Quest Recovery Manager for Active Directory（RMAD）在 AD 对象级与墓碑恢复领域领先 15+
              年，在企业和政府中有庞大装机基础。Quest 由 Francisco Partners 和 Cinven（私募股权）私有持有。Quest RMAD 聚焦单个对象还原与细粒度恢复—— 不提供达到 Semperis
              ADFR 规模的全林恢复。Quest Change Auditor 提供 AD 事件日志、审计和合规报告。 Quest 经常在政府和受监管行业账户中捆绑这两项产品。定价由企业协商；估计大型 Quest AD 部署
              ARR 为 $100K–$500K+。 Quest 的战略方向是拓宽 IT 管理，而不是加深 AD 安全。

              Netwrix（整合原 Stealthbits）聚焦 AD 审计、合规报告和数据安全。其 AD Auditing Edition 在合规 / 审计用例上 与 Quest Change Auditor
              竞争。Netwrix 缺少与 Semperis 相当的 ITDR 威胁检测深度，也没有林级恢复能力。 Netwrix 由 TA Associates 支持，正定位于治理与合规市场。Cayosoft
              是规模更小的竞争者，面向中端市场， 以低于 Semperis 的价位提供一体化 AD 管理与恢复平台，主要在 5,000 名员工以下组织中替换 Quest。

              CyberArk 的 Identity Security Platform 包含 Endpoint Privilege Manager 和 Identity Threat Detection 功能， 与 ITDR
              能力部分重叠。CyberArk 的主动作仍是 PAM，但它正通过 Secure Browser 和 Identity Flows 产品积极扩展到身份威胁检测。 CyberArk（NASDAQ: CYBR）在 Q4
              2024 报告 $974M ARR，并在金融服务与关键基础设施中拥有重要装机基础—— 与 Semperis 目标账户重叠。CyberArk 更可能是 Semperis 的潜在收购方，而非纯竞争对手。
