      - number: '5.2'
        title: 技术架构与基础设施
        blocks:
          - type: paragraph
            body: >-
              Semperis DSP 的核心技术架构是无代理。DSP 不在域控制器上部署软件代理，而是被动读取 AD 复制流——DFS/USN journal——在变更穿过 AD
              结构时捕捉每一次变更。这种方式非侵入式：不修改 AD，不安装内核模式驱动，也不影响 DC 稳定性。官方产品文档称，DSP 专为承接全球最大 AD 环境的变更量而设计；在多林部署中，处理流程针对每日和每小时高频
              AD 更新做了优化。

              部署选项覆盖本地、云（Azure）和混合模式。ADFR 进一步扩展云覆盖，把 Azure Blob Storage 作为加密备份目标（AES-256），即使本地存储被摧毁，恢复点仍然可用。对多林组织，ADFR
              提供单一管理服务器和门户，可同时编排多个林和地理分发点的恢复。Lightning IRP 以运行时行为检测补足 DSP，使用基于 ML 的异常检测识别仅靠变更日志分析会漏掉的进行中攻击，例如完全发生在内存中的
              DCSync 冒充和 Golden Ticket 伪造模式。

              Semperis 通过 REST APIs 接入 Microsoft Sentinel、Splunk、ServiceNow 等主流 SIEM/SOAR 平台，让安全运营团队无需额外中间件，就能把 DSP
              告警送入既有响应流程。平台对 Entra ID 的覆盖与本地 AD 覆盖对称：DSP 监控 Entra ID 配置变更，Purple Knight 则按同一套 IOE/IOC 类别扫描 Entra ID 和本地
              AD。February 2026 收购 MightyID 后，Okta 和 Ping Identity 被纳入同一个连续暴露管理与防篡改变更跟踪框架，形成统一的混合身份安全结构。
