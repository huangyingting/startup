      - number: '1.5'
        title: 负面信号、关键风险与尽调提示
        blocks:
          - type: paragraph
            body: >
              Semperis 最重要的结构性风险，是它依赖 Microsoft Active Directory 继续作为企业身份基础设施的主导方案。 Microsoft 正积极推广 Microsoft Entra
              ID（前身为 Azure Active Directory），把它作为本地 AD 的云原生替代路径； 一旦迁移加速，DSP 和 ADFR 主要保护的传统 AD 环境装机基数可能收缩。Semperis 已通过把
              DSP 覆盖延伸到混合 Entra ID 环境，并将自己定位为不绑定具体身份基础设施的 ITDR 平台来回应，但 AD 退场带来的长期 TAM 风险确实存在。

              叠加风险在于 Microsoft 本身也通过 Microsoft Defender for Identity（MDI）和 Microsoft Entra ID Protection 直接竞争；两者都为
              Microsoft 365 E5 订阅者提供部分重叠的 AD 威胁检测能力，而且没有增量成本。已经投入大量 Microsoft 授权的企业，可能把 MDI 视为「够用」，从而抵触在第三方平台上继续投入 ITDR
              预算。Semperis 以更深的取证能力、攻击路径分析（Forest Druid）和林级恢复（ADFR）形成差异化——这些能力 MDI 无法复制—— 但 Microsoft 捆绑方案带来的定价压力仍是持续逆风。

              其他风险包括企业客户集中度、私人公司没有 SEC 报告义务导致信息不对称、关键人物风险集中在 CEO 与联合创始团队、 若公开市场环境恶化则存在 IPO 时点风险，以及来自 CrowdStrike Falcon
              Identity、Varonis 和 Netwrix 的竞争压力。
