  - number: 6
    title: 客户
    sections:
      - number: '6.1'
        title: 企业客户结构、买方画像与渠道拆分
        blocks:
          - type: paragraph
            body: >-
              Semperis 服务 1,000+ 家企业客户，核心是 Active Directory 环境复杂的组织——通常拥有 10,000+ 名员工、100+ 个域控制器，以及能够采购并部署专用 AD
              安全平台的安全运营团队。主要买方是 CISO 或 VP of Security，并与 AD 管理和 IT 安全运营团队协作；主要付款方是企业安全或 IT
              运营预算，而不是身份与访问管理团队。客户结构明显偏向受监管行业：金融服务预计是最大垂直（客户基础的 25–30%），由身份安全和韧性的监管要求驱动。医疗保健约占 15–20%，驱动力是勒索软件暴露和 HIPAA
              相关合规要求。政府和联邦机构占 10–15%，FedRAMP Moderate 授权让 Semperis 能参与民用联邦采购。关键基础设施行业——能源、公用事业和交通运输——另占 10–15%，动因是 CISA
              要求，以及 Active Directory 在运营技术网络认证中的作用。Fortune 500 和大型企业通用账户构成其余部分；但考虑到按席位计价的交易规模，它们很可能贡献了不成比例的 ARR。地域结构估计约为
              60% 北美（美国和加拿大）、40% 国际（主要是 EMEA），APAC 在装机基础中仍占较小少数。渠道结构覆盖两端：对年合同价值约 $250K 以上账户的企业直销动作，以及面向中型企业账户、正在增长的
              VAR/MSP 伙伴网络。Semperis 已公开披露正式 MSP 计划，以及与主要安全分销商的经销合作，但未披露合作伙伴来源 ARR 占总 ARR 的比例。公司没有公开披露分部层面的收入集中度数据。
