      - number: '3.3'
        title: 护城河耐久性、切换成本与竞争风险清单
        blocks:
          - type: paragraph
            body: >-
              Semperis 最强的竞争护城河是 Active Directory Forest Recovery（ADFR）能力——这是 Active Directory 唯一专用、 经测试、自动化的全林恢复产品。没有
              Semperis 时，从勒索攻击中恢复一个 500-node AD 林， 通常需要 AD 专家按复杂作业手册手工投入 24–72 小时，且备份介质再次感染风险很高。Semperis ADFR
              把这一过程压缩为从取证干净镜像出发的 15 分钟内自动恢复。这与 Microsoft MDI、CrowdStrike 或 Quest RMAD 提供的任何能力都有质的不同。对已经与 Semperis
              一起投入测试恢复计划和作业手册的客户，护城河最强—— 替换工具意味着重建整个灾备框架，切换成本很高。

              Semperis 对 AD 专用攻击技术的覆盖深度，是第二层护城河：10+ 年 AD 安全工程积累，使其可在本地 AD 与 Entra ID 上检测 150+
              攻击技术。这种检测深度，以及配套威胁情报基础设施（Semperis Research Lab、 Purple Knight 评分模型），很难快速复制。不过，这条护城河正在收窄：Microsoft 正快速扩展
              MDI 检测目录，CrowdStrike 则通过 Graph 集成吸收 AD 遥测。两个平台供应商的工程资源都远超 Semperis， 且都在投资身份安全。

              市场已经出现多归属行为：许多大型 Semperis 客户同时保留 MDI（捆绑）和 Semperis DSP/ADFR， 用 MDI 做基线检测，用 Semperis 做恢复和高级检测。这种共存模型既验证了
              Semperis 的增量价值，也带来风险： 如果 MDI 明显改进，共存理由会被削弱。Semperis 在销售材料中承认这一动态，并在营销中把 MDI 定位为互补而非竞争； 但随着 MDI
              增加功能，这一叙事越来越吃力。

              分发能力存在显著不对称：Microsoft 在企业身份基础设施中拥有 95%+ 市占率，并把 MDI 捆绑进其主导生产力套件。 CrowdStrike 拥有 29,000+
              企业端点客户。面对这些分发优势，Semperis 必须靠直销或伙伴渠道逐个赢下账户。 Semperis 的政府合同载具和 FedRAMP 授权，在美国联邦市场形成了部分分发护城河。

              关于护城河耐久性的负面证据：2025–2026 的独立分析师评论指出，在已部署 MDI 且 80%+ 常见 AD 攻击场景已被覆盖的账户中， Semperis 的定价溢价（大型企业部署估计 $300–700K
              ARR）越来越难证明合理。DSP 的非恢复用例（威胁检测、攻击路径可视化） 面临最大商品化压力。恢复用例仍受保护。
