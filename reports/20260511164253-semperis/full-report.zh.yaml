      - number: '4.3'
        title: 资本充足性与融资结构
        blocks:
          - type: paragraph
            body: >
              Semperis 在 June 2024 从 J.P. Morgan Asset Management 和 Hercules Capital 获得 $125 million
              增长融资。该轮由股权和增长债务融资组合而成；官方公告使用“增长融资”措辞，说明它不同于纯股权 Series D。计入或不计入更早的小额轮次后，截至 June 2024 的累计融资约为 $368-373
              million。此前最近一次股权融资是 KKR 领投的 March 2022 $200 million Series C，当时确认了 $1 billion+ 独角兽估值。


              Semperis CFO Jeff Bray 将 June 2024
              融资描述为对本已强劲资产负债表的补充，暗示公司并非处在资金承压状态。公司披露的增长资本主要用途，是产品创新和全球客户群扩张。这与销售、工程和市场进入岗位的积极招聘相吻合。June 2024 新融入
              $125M，加上五年内已展示的 3,000%+ 收入增长，公司资金跑道大概率延伸到 2026 及更远。


              投资人包括 KKR（私募股权，Series C 领投）、J.P. Morgan Asset Management、Hercules Capital（增长债务专家）、Insight
              Partners（成长型软件投资专家）、Ten Eleven Ventures（聚焦网络安全）、Paladin Capital Group（聚焦政府与国家安全）、Atrium Health Strategic
              Fund 等。多元机构背书既带来资金，也让资本与 Semperis 的企业和政府客户基础形成战略同向。


              月度烧钱速度和精确现金余额均未公开披露。作为一家约 500-600 名员工的私营公司，月度现金消耗只能粗略估算：若假设每名员工每月平均总薪酬为 $15,000-$20,000，未抵扣收入前的工资等价消耗约为每月
              $7.5-12M。在 $100M+ ARR（约每月 $8.3M 订阅收入）水平上，考虑到 SaaS 高毛利，公司很可能正接近现金流盈亏平衡，或已经越过该点。不过，激进 R&D
              投入和国际扩张仍可能让自由现金流维持为负。Jeff Bray、Mike DeGaetano 和 Annabel Lewis 均具 IPO 经验，他们的加入指向与 June 2024 融资相匹配的 12-24
              个月公开市场准备窗口。
