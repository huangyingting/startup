  - number: 3
    title: 竞争对手
    sections:
      - number: '3.1'
        title: 竞争格局——直接对手、平台方与现状方案
        blocks:
          - type: paragraph
            body: >-
              Semperis 所处竞争格局可以拆成四个层次，各自战略意义差异很大。第一层是直接 AD 安全专门厂商，包括 Quest Software（Change Auditor 和 Recovery Manager
              for Active Directory）、Netwrix（AD Auditing Edition， 2021 收购 Stealthbits）和 Cayosoft（面向较小企业的 AD 管理与恢复）。这些供应商在
              AD 审计、加固，以及不同程度的备份 与恢复用例上与 Semperis 重叠。按收入规模看，Quest 是最强的直接对手，估计 IT 管理收入 $500M+（AD 产品只是其中一部分），
              且在中端市场和政府账户中有庞大装机基础。Netwrix 主要围绕审计与合规用例竞争，检测较轻，也没有专用林级恢复。 Cayosoft 是规模更小的供应商，面向中端市场组织，提供一体化 AD/Azure AD
              管理套件，内含有限恢复功能。

              第二层竞争对 Semperis 商业化威胁最大：平台供应商把身份威胁检测捆绑进更广的安全产品。Microsoft Defender for Identity（MDI）包含在 M365 E5
              中，没有增量成本，并能检测 pass-the-hash、DCSync 和横向移动等常见 AD 攻击。 CrowdStrike Falcon Identity Protection 把 AD
              相邻身份遥测与其主导端点代理打包。SentinelOne Singularity Identity、 Palo Alto Networks Cortex Identity 和 IBM QRadar UEBA
              都提供身份行为分析，与 Semperis DSP 能力部分重叠。

              第三层是部分重叠的相邻供应商，包括 CyberArk（PAM 领导者，其 Identity Security Platform 正越来越多纳入 ITDR 相邻检测）、Okta（员工身份平台，在 Okta
              Privileged Access 中提供身份异常检测），以及 Microsoft 自有的 Entra ID Protection（内建于 Entra ID
              的条件访问与基于风险的身份信号）。客户购买这些供应商主要是为了不同的核心用例， 但在整合账户中，它们可能挤占预算。

              第四层是现状方案和免费工具，也是实际最普遍的替代项：多数企业 IT 团队主要靠原生 Windows event logs、Microsoft 免费的 BloodHound（Active Directory
              安全评估开源工具）和手工流程管理 AD 安全。BloodHound Community Edition 部署广泛，可做攻击路径分析，这也是 Semperis Forest Druid 覆盖的方向。现状方案是
              Semperis 最主要替换的对象，尤其是在第一次进行结构化 ITDR 采购的中端市场账户中。
