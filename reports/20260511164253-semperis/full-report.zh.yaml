  - number: 7
    title: 风险
    sections:
      - number: '7.1'
        title: 监管与法律风险
        blocks:
          - type: paragraph
            body: >-
              Semperis 所处环境监管强度高，四条相互独立的监管风险线叠加出累积合规义务。最实质的是 GDPR 和 UK GDPR 责任：Semperis 为 EU 和 UK 企业客户处理 Active
              Directory 目录数据。AD 对象包含 GDPR Article 4(1) 所定义的个人数据——全名、电子邮件地址、电话号码、职务和组织成员关系——因此 Semperis 扮演数据处理者角色，必须根据
              Article 28 与每个 EU/UK 客户签署合规的数据处理协议。违规罚款最高可达全球年营业额的 4%，或每次违规 twenty million euros，以较高者为准。Semperis 正接近
              $100M+ ARR，EU 客户又占企业账户的实质份额，因此总罚款暴露在结构上重要。ICO 已确认，Brexit 之后 UK GDPR 作为平行制度适用，许多情况下同一客户数据会产生双重合规义务。

              US Export Administration Regulations（EAR Part 730 et seq.）下的出口管制合规，是第二条独立风险线。Semperis 在 Tel Aviv, Israel
              运营 R&D 中心，开发加密安全软件，包括 Active Directory 加密密钥处理、Kerberos golden ticket 检测和加密备份验证。EAR
              将双用途网络安全软件纳入分类；加密物项商业出口需要适用许可例外。出口合规失败可能导致每次违规最高 $1M
              罚款、禁止承接美国政府合同，以及许可撤销。以色列公司来源、美国联邦客户基础和加密技术范围叠加，使任何被处理的涉密联邦数据都带来更高 ITAR 敏感性。

              FedRAMP 授权是第三项监管风险：按 FedRAMP marketplace，Semperis 已为 Directory Services Protector 持有 FedRAMP Moderate
              授权，但尚未获得 FedRAMP High 授权；在要求 High 授权的敏感联邦民用机构和 DoD，这会限制可服务收入。High 达成前，该授权缺口会给联邦收入设置上限，而 High 通常需要 12 to 24
              个月。SEC Cybersecurity Disclosure Rule（Reg S-K Item 106，effective December
              2023）要求上市公司在四个工作日内披露重大网络安全事件；作为上市公司客户的供应商，Semperis 客户发生且被认定为重大的任何 AD 事件，都可能牵连供应商关系。Semperis 最终 IPO
              后，公司自身也将承担所有 Form 8-K 和年度报告网络安全披露义务。CIRCIA 强制报告规则又带来额外间接合规义务，因为关键基础设施客户必须向 CISA 报告事件，并可能将 Semperis
              列为受影响环境中的技术供应商。
