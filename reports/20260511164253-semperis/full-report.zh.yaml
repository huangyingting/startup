      - number: '4.2'
        title: 单位经济与销售效率
        blocks:
          - type: paragraph
            body: |
              Semperis 的单位经济未公开披露，但可由产品定位、市场可比公司和有限公开信号三角测算。企业身份 SaaS 公司，
              包括 CyberArk、SentinelOne 等可比上市公司，毛利率通常落在 70-85% 区间。鉴于 Semperis 采用纯软件
              交付模型，且没有显著硬件组件，其毛利率很可能位于这一范围内；准确数字仍不可得。

              商业化动作是高接触企业销售模型，结合企业直销与渠道伙伴。AWS Marketplace 上架让拥有 AWS 云预算的企业
              采购周期更快。获客成本（CAC）未披露，但企业身份安全销售周期通常横跨 6-18 个月，
              且涉及多部门干系人。这意味着单账户 CAC 较高；一旦深度集成，任务关键安全基础设施合同切换成本很高，
              其高生命周期价值（LTV）可抵消这一点。

              净收入留存（NRR）是 Semperis 当前阶段 SaaS 公司最重要的单位经济指标，但尚未披露。考虑到
              Active Directory 保护的任务关键属性，以及 Semperis 围绕企业级全覆盖的明确定位，NRR 可能高于 115%，
              并接近 120%，与顶级身份安全 SaaS 同行一致。Purple Knight 的 75,600+ 免费下载代表一批合格管线：
              这些组织已经接触过 Semperis 方法论和平台，因此该群体向 DSP 转化的有效 CAC 更低。

              Ransomware Risk Report 2025 发现，78% 的受访组织在此前 12 个月内成为勒索软件目标，代表持续需求压力，
              并缩短 AD 安全投资决策周期。每个企业 DSP 部署的年合同价值估计为 $100,000 至 $500,000+，
              取决于 AD 环境规模。在 $100M+ ARR、1,000+ 企业客户基础上，隐含平均每客户 ARR 约 $100,000，
              符合大型企业定价动态。关键尽调要求是获取实际 CAC、LTV、回收期、NRR 和 GRR 队列数据。
