      - number: '5.4'
        title: 产品路线图与竞争差异化
        blocks:
          - type: paragraph
            body: >-
              Semperis 的近期路线图聚焦三条线：多 IdP 扩展、AI 增强运营，以及危机管理集成。MightyID 收购（February 2026）立即把平台覆盖从本地 AD 和 Entra ID 扩展到 Okta
              与 Ping Identity，使 Semperis 成为唯一在单一平台内横跨完整企业 IdP 栈提供连续暴露管理和防篡改变更跟踪的供应商。公司也在开发 Generative
              AI（CoPilot-style）功能——截至研究日，具体产品名称和 GA 日期尚未公开披露，但博客内容提到，AI 驱动的异常评分和威胁优先级排序属于活跃开发方向。

              公司相对 Microsoft Defender for Identity 的差异化叙事，核心在覆盖范围：MDI 用用户行为分析监控单个用户活动，而 Semperis 保护身份服务本身——整个 AD
              林、复制拓扑、schema 和信任关系。Semperis 认为，只保护用户行为会让 AD 基础设施层暴露在外，两套方案更多是互补而非竞争。相对 Quest Recovery Manager for Active
              Directory，Semperis 把 ADFR 的网络攻击优先编排作为关键优势：恢复时将 AD 与 OS 分离，防止恶意软件回流，这是传统备份与恢复方案无法匹配的。

              身份取证与事件响应（IFIR）被定位为恢复后的差异化能力：Semperis 提供专家 IR 能力，其安全团队拥有合计 180+ 年 Microsoft MVP
              经验，帮助客户在回到生产环境前确认威胁已清除。另行收购的危机管理平台 Ready1 已集成进恢复工作流。非人类身份（NHI）和服务账号监控，是一个正在出现的覆盖缺口；公司已承认，这属于更长期路线图的一部分。
