      - number: '2.5'
        title: 展品
        blocks:
          - type: callout
            title: Microsoft MDI 捆绑是 TAM 被侵蚀的首要风险
            body: >-
              Microsoft Defender for Identity 已包含在 Microsoft 365 E5 授权中——Semperis 核心企业买方群体往往已经持有这一授权层级。 MDI 以零增量成本提供实时
              AD 威胁检测、pass-the-hash 和 DCSync 告警，以及横向移动可视化。任何投资者模型若不明确计入 全新账户中的 MDI 基线，都会高估 Semperis 的替换机会。关键尽调问题是：在
              Semperis 赢单中， 有多少比例是 MDI 已部署但不足够，多少是 MDI 尚未配置？这项数据——带 MDI 背景的赢单 / 输单分析—— 应在管理层访谈中索取。
