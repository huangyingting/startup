      - number: '1.2'
        title: 创始人、领导层与治理
        blocks:
          - type: paragraph
            body: >
              Semperis 由 Mickey Bresman（CEO）、Matan Liberman（业务发展执行副总裁）和 Guy Teverovsky （首席技术官）联合创立。Bresman
              是对外代表和首席执行官，常出现在新闻稿与客户公告中。 Liberman 推动业务拓展战略和伙伴关系活动。Teverovsky 领导技术架构与产品工程团队，打造了这套专攻 AD 的平台。
              自公司创立以来，创始团队一直保持稳定领导；在安全关键基础设施产品领域，关键人物连续性直接影响客户信任， 这是一个重要差异点。

              随着潜在 IPO 准备推进，Semperis 已引入有经验的企业软件和公开市场高管来补强领导团队。按 Security Week 报道， 公司专门聘用了有公开市场转型经验的高管。招聘具备上市公司背景的 CFO 和
              CRO 级人才，通常出现在 IPO 前 12–24 个月阶段的公司身上。

              关键人物风险为中等，主要集中在 CEO Mickey Bresman 身上。作为公司外部发言人和战略决策者，他与投资者关系、 客户信心和市场定位高度绑定。公司未披露公开继任计划。创始团队持续担任
              CEO、业务发展执行副总裁和 CTO，为公司保留了制度性知识， 但也意味着多位联合创始人若同时离开，将成为公司稳定性的重大负面信号。
