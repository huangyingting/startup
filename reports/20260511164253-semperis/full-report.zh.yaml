  - number: 2
    title: 市场分析
    sections:
      - number: '2.1'
        title: 市场边界——身份安全、ITDR 与 AD 加固
        blocks:
          - type: paragraph
            body: >-
              身份安全市场覆盖一组工具和平台：发现、保护、检测威胁，并恢复被攻陷的身份系统。核心对象主要是 Microsoft Active Directory（本地）、Microsoft Entra ID（云 /
              混合），以及 LDAP 目录、Okta/Ping 身份结构等相邻身份存储。Gartner 在 2022 IAM Hype Cycle 中正式提出「身份威胁检测与响应」 （Identity Threat
              Detection and Response，ITDR）这一新兴安全品类，承认攻击者已经从端点入侵转向以身份为中心的横向移动。

              与 Semperis 最相关的市场边界由三个相互咬合的子赛道组成。第一，AD 安全与加固，涵盖持续评估并加固 AD 配置、检测错误配置、识别攻击路径的工具——Semperis Purple Knight 和
              Forest Druid 位于这一层。第二， 面向 AD 与混合身份的 ITDR，涵盖针对 pass-the-hash、DCSync、Kerberoasting、password spraying
              等身份攻击的实时检测和自动化响应——Semperis Directory Services Protector（DSP）是这一层的旗舰产品。第三， AD
              灾难恢复与网络韧性，覆盖专用备份、取证回滚，以及从勒索软件中恢复整片 AD 林—— Semperis Active Directory Forest
              Recovery（ADFR）是主要方案。企业级规模下，没有其他供应商能同时覆盖 这三个子赛道。

              通常不计入 Semperis 直接 TAM、但构成替代风险的相邻市场包括：特权访问管理（PAM，例如 CyberArk、BeyondTrust），它控制特权账户使用，但不做实时 AD 威胁检测；身份治理与管理
              （IGA），它管理访问生命周期，但缺少攻击检测能力；更广义的 SIEM/SOAR 平台，把 AD 遥测作为众多数据源之一接入；
              以及云基础设施授权管理（CIEM），它关注云资源权限，而非本地目录安全。Microsoft 自有工具——Defender for Identity（MDI）和 Entra ID Protection——是
              Semperis 必须替换或补充的主要市场内替代品。

              Active Directory 的全球装机基础估计覆盖超过 95% 的 Fortune 500 企业，以及全球 1,000 名员工以上组织中的 90%+；AD
              的延续性几乎等同于企业身份基础设施本身的延续性。如此广的装机基础意味着，Semperis 的 TAM 与更广义企业 IT 支出的地域和行业分布相同——集中在北美（45–55%）、欧洲（25–35%）和
              APAC（15–20%）。
