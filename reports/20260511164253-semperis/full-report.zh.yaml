        - 索取经审计利润表或管理层 P&L；对标 CyberArk（84%）和 SentinelOne（79%）
      - - 净收入留存（NRR）
        - 无法判断扩张经济性；NRR 驱动 LTV 和增长效率论点
        - 索取按 cohort 拆分的 NRR 和 GRR；与 120% 以上的 Okta 和 CrowdStrike 基准比较
      - - 月度烧钱率 / 现金续航
        - 无法评估融资依赖或 IPO 前需要额外资本的概率
        - 索取月度管理层 P&L；用当前 ARR 增长和成本假设推导现金续航
      - - 产品级 ARR 拆分
        - 无法识别增长驱动因素与成熟 SKU；阻碍按产品做 TAM 扩张分析
        - 索取 DSP、ADFR、Lightning IRP 和专业服务的 ARR 拆分
      - - 客户集中度风险
        - 无法评估前 10 大客户是否占 ARR >30%；集中度风险未披露
        - 索取 top-10 客户 ARR 表，以及行业和地域集中度热力图
      - - 债务条款和契约
        - 无法评估财务灵活性或契约违约风险；$125M 轮中的债务未量化
        - 索取 Hercules Capital 信贷协议、契约、摊销时间表和提前还款条款
      - - 收入确认政策
        - 无法验证 ARR 定义是否与 GAAP 订阅收入一致；专业服务占比影响质量
        - 索取收入确认政策、递延收入余额和 ARR 定义文件
