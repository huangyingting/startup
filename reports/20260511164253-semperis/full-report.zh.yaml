      - - Microsoft 原生 AD 恢复侵蚀 ADFR 切换成本
        - Microsoft 在 Entra ID 或 Windows Server 更新中发布原生 Active Directory 林恢复，具备等效的取证级洁净还原能力
        - 任意 12 个月窗口内，≥ 2 家公开点名的 Semperis 企业客户提及 ADFR 被替换
        - 留存护城河论点失效；悲观情景概率升至 60% 以上；ADFR 溢价收入面临风险
        - 退出或对冲头寸；在继续持有前，重新评估 Entra ID 产品收入贡献
      - - 关键人物离职（CEO 或 CTO）
        - CEO Mickey Bresman 或 CTO Guy Teverovsky 宣布离职，且没有计划中的 6 个月继任交接
        - 初始投资后 24 个月内宣布非计划离职；90 天内未任命继任者
        - 投资者信心受冲击；IPO 可能延后；鉴于 CTO 对 AD 安全 IP 的集中掌握，R&D 连续性存在风险
        - 暂停后续投资；等待继任安排清晰，并观察新领导层 180 天履职记录后再恢复
      - - 监管执法行动
        - CISA、BIS 或 SEC 对 Semperis 或其以色列 R&D 运营发起正式调查、违规通知或执法行动
        - 任何正式书面监管通知或已公告调查
        - 联邦客户流失；FedRAMP 授权复审风险；声誉受损会进一步拉长企业销售周期
        - 在 30 天内启动退出复核；进一步投入资本前召集法律顾问评估
      - - 降价融资或融资失败
        - Semperis 下一轮股权融资的投后估值低于 $900M，或已公告融资在公告后 90 天内未能完成交割
        - 确认的条款清单低于 $900M，或融资未能交割
        - 表明运营表现低于已披露里程碑；清算优先权包袱可能损害普通股价值
        - 如确认，立即退出头寸；除非股权结构全面重组，否则不参与降价融资
    notes: >-
      触发阈值用于识别投资论点驱动因素的实质恶化，而非正常业务波动。DSP 续约率和 ADFR 替换数据未公开披露，必须在尽调中通过管理层披露取得，
      或在投资后通过投资者信息权取得。监管触发项同时适用于美国（SEC、BIS）和以色列-美国双地运营合规事件。所有行动含义均假设为没有董事会控制权的少数股权投资； 控股投资者可能拥有额外补救手段。
    claimRefs:
      - CV016
      - CV023
      - CV032
      - CV037
      - CV038
  - id: TV006
    title: 最终尽调问题表
    enumeration: false
    columns:
      - 主题
      - 缺失证据
      - 重要性
      - 负责人 / 尽调路径
    rows:
      - - 净收入留存（NRR）和总收入留存（GRR）
        - 任一期间的 NRR 和 GRR 均未公开披露；公开来源没有可用代理指标
        - 这是检验切换成本论点的核心实证指标；没有 NRR，ADFR 留存护城河只是主张，尚未验证；基础情景 ARR 增长假设 NRR > 100%
        - 在管理层会议上直接向 Semperis CFO 索取；要求按产品线（DSP vs. ADFR）披露过去 4 个季度的 NRR 和 GRR
      - - 客户集中度和 ARR 瀑布
        - Top-10 客户 ARR 占比和合同到期排期未公开披露
        - 若 Top-10 客户占比超过 30%，任意 12 个月窗口都会产生重大流失风险；合同续约排期影响 IPO 收入可预测性叙事
        - 向 Semperis 财务团队索取 ARR 集中度瀑布、合同到期排期，以及 Top-10 客户行业和续约状态
      - - 股权结构表、优先权栈和债务契约
        - Insight Partners Series C 清算优先权条款和 Hercules Capital 债务契约结构未公开披露
        - 优先权包袱可能实质降低退出时普通股价值；Hercules Capital 契约可能限制运营灵活性并触发强制事件
        - 向 Insight Partners 牵头合伙人索取；审阅 Hercules Capital 贷款协议，包括财务维持契约、最低流动性门槛和交叉违约条款
      - - FedRAMP High 授权路线图
        - FedRAMP High 授权时间表、担保机构或进展里程碑均未公开披露
        - FedRAMP High 可打开 DoD 和情报共同体机会，估计可带来 $50–100M 增量 ARR；若没有确认路线图，该收入在投资周期内仍属推测
        - 向 Semperis CISO 和联邦销售团队索取 FedRAMP High 授权路线图、已确认担保机构和预计授权时间
      - - 出口管制和 EAR 合规计划
        - 未公开披露 EAR Part 730 合规状态、许可证例外覆盖或针对以色列开发的加密软件的在行合规计划
        - Semperis 的以色列 R&D 为美国联邦客户开发加密 AD 安全软件，形成重大 EAR 合规义务；不合规罚款最高可达每项违规 $1M，并有禁止承包风险
        - 向 Semperis 总法律顾问索取出口管制合规文件；确认持续开展分类审查、许可证例外选择，以及针对涉密联邦数据处理的 ITAR 评估
    notes: >-
      由于 Semperis 是私营公司，上述五项尽调问题的信息在结构上无法从公开来源取得。第 1 项（NRR）和第 2 项（集中度）是会阻断投资的问题： 若答复不令人满意，应暂停承诺。第 3 项（股权结构表）、第 4
      项（FedRAMP High）和第 5 项（出口管制）是影响条款和交易结构的重大风险限定项； 如能充分缓释，不单独阻断投资。投资后的协商信息权应包括季度 ARR 和 NRR 报告、FedRAMP 里程碑报告，以及任何监管问询在
      10 个工作日内通知。
    claimRefs:
      - CV028
      - CV030
      - CV039
      - CV042
      - CV044
