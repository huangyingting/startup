    title: 公司概览
    sections:
      - number: '1.1'
        title: 公司身份、总部与商业模式
        blocks:
          - type: paragraph
            body: >
              Semperis 是一家私人网络安全公司，总部位于美国 New Jersey 州 Hoboken，并在英国、荷兰、 以色列和澳大利亚设有办公室。公司约 2013–2014
              创立，目标很明确：补上企业安全中的关键缺口， 即保护 Microsoft Active Directory（AD）和云身份基础设施。全球绝大多数企业 IT 环境的认证与授权都靠 AD
              承载，但历史上一直缺少专门、实时的威胁检测与恢复能力。Semperis 正是为填补这一缺口而成立。

              公司核心产品族以 Identity Resilience Platform 为品牌，伞下包含四项主要产品。Directory Services Protector（DSP） 面向本地 AD 与混合 Azure
              AD（Entra ID）部署，提供实时威胁检测、自动化修复和取证分析。Active Directory Forest Recovery（ADFR）让组织能在数小时内从灾难性 AD 攻击中恢复。Purple
              Knight 是免费的社区 AD 安全评估工具， 负责生成销售线索。Forest Druid 是攻击路径分析工具，用来绘制穿透 AD 和 Azure AD 的权限升级路线。 这些产品合在一起，覆盖 AD
              安全生命周期：评估、检测、响应、恢复。

              Semperis 采用 B2B 企业 SaaS 商业模式，以订阅授权收费。商业化由企业直销团队与渠道伙伴共同承担。 免费提供的 Purple Knight 是漏斗顶部工具；通过 Purple Knight 发现
              AD 弱点的组织，常会转化为付费 DSP 订阅。 公司主要服务金融服务、医疗、政府 / 国防和关键基础设施等受监管行业。
