  - id: FR002
    title: 风险传导图
    type: dag
    layout: wide
    summary: >-
      有向无环图展示主要风险事件如何传导到 Semperis 与投资相关的结果。Microsoft MDI 捆绑和 FedRAMP 授权失效都会通过 ARR 压缩，最终传导到估值倍数压缩。Semperis
      软件被攻陷会通过客户信任流失传导到估值影响和 IPO 中断。控制节点会部分拦截特定风险向量。所有路径最终都汇聚到 IPO 推迟或中断这一投资人退出风险结果。
    data:
      nodes:
        - id: risk-microsoft
          label: Microsoft MDI 捆绑
          detail: M365 E5 中免费 MDI 在续约时替代 DSP；这是 Semperis 企业细分最可能出现的 ARR 压缩向量
          type: risk
        - id: risk-security-breach
          label: Semperis 软件被攻陷
          detail: 代理部署在域控上；供应链被攻陷会打开灾难性的客户 AD 访问，并带来监管责任和品牌毁灭
          type: risk
        - id: risk-export-control
          label: EAR/ITAR 出口暴露
          detail: 以色列-美国双地运营；网络安全双用途技术分类；美国联邦客户群让涉密数据处理场景对 ITAR 敏感
          type: risk
        - id: risk-fedramp
          label: FedRAMP 授权失效
          detail: 失去 FedRAMP Moderate 授权会取消民用联邦采购资格；政府 ARR 面临风险；High 授权缺口限制 DoD 和 IC 收入
          type: risk
        - id: risk-israel
          label: 以色列 R&D 地缘政治风险
          detail: 工程团队多数集中在 Tel Aviv；持续冲突驱动的中断会损害所有 Semperis 产品的产品交付速度和路线图执行
          type: risk
        - id: impact-arr
          label: ARR 压缩
          detail: Microsoft 捆绑、FedRAMP 失效或平台整合导致续约损失，使收入增长率低于投资人预期和 IPO 可比公司
          type: impact
        - id: impact-trust
          label: 客户信任流失
          detail: 安全厂商漏洞或监管执法行动损害其在企业身份安全市场的品牌可信度；客户续约流失加速
          type: impact
        - id: impact-valuation
          label: 估值倍数压缩
          detail: 收入增长放缓和信任流失把 ITDR 倍数压向商品化基础设施水平；IPO 定价窗口变窄
          type: impact
        - id: impact-ipo
          label: IPO 推迟或中断
          detail: 重大监管行动、漏洞、收入不及预期或 R&D 中断会迫使 IPO 推迟或出现估值下调轮；每拖延一个周期，Insight Partners 的退出压力都会增加
          type: impact
        - id: control-fedramp
          label: FedRAMP 合规控制
          detail: 现有 Moderate 授权正在主动维护；High 授权流程将启动；专职合规团队管理年度评估日程
          type: control
        - id: control-sdlc
          label: 安全 SDLC 与代码签名
          detail: SOC 2 Type II 认证；代码签名流水线；安全信任中心计划；部分拦截供应链被攻陷风险向量，但无法消除
          type: control
      edges:
        - from: risk-microsoft
          to: impact-arr
          label: MDI 在续约时替代 DSP
        - from: risk-fedramp
          to: impact-arr
          label: FedRAMP 失效消除联邦收入
        - from: risk-israel
          to: impact-arr
          label: R&D 中断推迟产品交付
        - from: risk-security-breach
          to: impact-trust
          label: 漏洞摧毁品牌可信度
        - from: risk-export-control
          to: impact-trust
          label: 执法行动损害客户信心
        - from: impact-arr
          to: impact-valuation
          label: 增长放缓压缩倍数
        - from: impact-trust
          to: impact-valuation
          label: 信任流失削弱定价权
        - from: impact-valuation
          to: impact-ipo
          label: 倍数压缩缩窄 IPO 窗口
        - from: control-fedramp
          to: risk-fedramp
          label: 合规控制降低失效风险
        - from: control-sdlc
          to: risk-security-breach
          label: 安全 SDLC 部分阻断攻陷
    approximationNotes: DAG 边来自章节正文记录的因果逻辑；具体因果权重基于判断。五个主要风险节点都可能单独触发估值倍数压缩；最可能的传导路径是 Microsoft MDI 到 ARR 压缩，再到估值压缩，最后到 IPO 延迟。
    claimRefs:
      - CR012
      - CR016
      - CR024
      - CR039
  - id: FR003
    title: 依赖关系图
    type: dag
    layout: wide
    summary: >-
      依赖关系图展示 Semperis 平台的关键输入，以及它服务的客户群。Microsoft Active Directory 是基础平台依赖。投资者依赖（Insight Partners、J.P. Morgan 和
      Hercules Capital）约束资本可得性和退出时点。FedRAMP 授权机构控制进入美国联邦客户群的通道。以色列研发中心提供工程产能。OEM 合作伙伴 Cohesity 把分销放大到数据基础设施买家。
    data:
      nodes:
        - id: dep-microsoft
          label: Microsoft Active Directory
          detail: 核心市场之所以存在，是因为 AD 主导企业身份验证；Microsoft 控制着 Semperis 产品相关性所依赖的平台；Entra ID 迁移轨迹是长期生存级依赖风险
          type: dependency
        - id: dep-insight
          label: Insight Partners
          detail: 跨多轮融资的主要财务支持方；通过董事会影响资本配置、高管招聘和退出时点；LP 动态会影响二级市场压力
          type: dependency
        - id: dep-jpmorgan
          label: J.P. Morgan / Hercules Capital 融资方
          detail: $125M 2024 增长轮领投方；Hercules Capital 提供的债务部分包含财务维持契约；具体契约条款未公开披露
          type: dependency
        - id: dep-cohesity
          label: Cohesity OEM 合作
          detail: Cohesity Identity Resilience 基于 Semperis 技术；联合营销的数据与身份韧性解决方案把分销放大到 Cohesity 企业客户群
          type: dependency
        - id: dep-fedramp-body
          label: FedRAMP 授权机构
          detail: FedRAMP Moderate 授权决定联邦民用采购资格；需要年度复评以维持状态；DoD 和 IC 客群需要 High 授权
          type: dependency
        - id: dep-israel-rnd
          label: 以色列研发中心
          detail: 核心工程大部分集中在特拉维夫；交付 DSP、ADFR、Purple Knight 和 Forest Druid 产品开发；地缘政治风险影响交付连续性
          type: dependency
        - id: semperis-core
          label: Semperis 平台
          detail: DSP、ADFR、Purple Knight 和 Forest Druid 已交付给 1,000+ 家企业客户；多产品套件的交叉销售渗透率持续提升
          type: process
        - id: customer-federal
          label: 美国联邦机构
          detail: 依赖 FedRAMP 的政府客户群；ARR 估计占比 10-15%；与 CISA 对齐的关键基础设施保护用例
          type: actor
        - id: customer-enterprise
          label: Fortune 500 企业
          detail: 主要收入基础；1,000+ 家企业客户；DSP 加 ADFR 的多产品扩张是主要 ARR 增长路径
          type: actor
      edges:
        - from: dep-microsoft
          to: semperis-core
          label: AD 平台提供产品市场
        - from: dep-insight
          to: semperis-core
          label: 股权资本与治理
        - from: dep-jpmorgan
          to: semperis-core
          label: 债务融资与 IPO 协同
        - from: dep-cohesity
          to: semperis-core
          label: OEM 分销放大
        - from: dep-fedramp-body
          to: customer-federal
          label: 授权把关联邦采购
        - from: dep-israel-rnd
          to: semperis-core
          label: 工程产能与产品交付
        - from: semperis-core
          to: customer-federal
          label: 平台交付给联邦机构
        - from: semperis-core
          to: customer-enterprise
          label: 平台交付给企业客户
    approximationNotes: 依赖类型反映新闻稿、FedRAMP 市场和产品文档中可公开观察到的关系。Hercules Capital 财务契约细节按 BDC 投资组合公司贷款的典型做法估计；实际条款需要尽调权限确认。
    claimRefs:
      - CR022
      - CR025
      - CR027
      - CR028
      - CR029
  - id: FV001
    title: 投资建议逻辑
    type: flow
    layout: standard
    summary: >-
      从 Semperis 已验证的规模和护城河强度出发，经风险评估和估值检查，推导到 BUY 建议以及保护性条款设计要求。每个节点代表一道独立尽调关口，必须通过后才能进入下一决策阶段。流程确认：尽管存在 Microsoft
      捆绑风险，ADFR 切换成本、FedRAMP 可信度和入场价格纪律的组合，仍支持有条件 BUY。
    data:
      nodes:
        - id: scale-proof
          label: 规模与验证
          detail: >-
            $100M+ ARR 已于 January 2025 确认；1,000+ 家企业客户；已确认 Fortune 500 具名账户（AA、ADP、Lenovo、United、Starbucks）——
            规模门槛已达到独角兽级别
          type: process
        - id: moat-strength
          label: 护城河耐久性
          detail: ADFR 切换成本嵌入 DR 运行手册；Purple Knight 65K+ 社区用户带来有机管线护城河；FedRAMP Moderate 构成联邦竞品进入壁垒
          type: process
        - id: market-position
          label: 市场地位
          detail: >-
            唯一同时覆盖检测（DSP）+ 恢复（ADFR）的纯 ITDR 厂商；KuppingerCole Leader 2025；$6–8B TAM 以 25–30% CAGR 增长；企业级规模下没有直接可比的独立纯 ITDR
            公司
          type: process
        - id: risk-assessment
          label: 风险评估
          detail: Microsoft MDI 捆绑是主要结构性威胁；ADFR DR 集成可部分缓释；以色列研发地缘政治风险真实存在但可管理；NRR 未披露是主要证据缺口
          type: process
        - id: valuation-check
          label: 估值检查
          detail: 基准情景 $880M–$1.56B（$110–130M ARR 的 8–12x）；2024 增长轮 $1B+ 确认估值底部；较 2022 的 $1.4B 峰值下调，反映行业倍数压缩 30–50%
          type: process
        - id: recommendation
          label: 投资建议：BUY
          detail: 入场估值低于 $1.3B 时启动投资，并配保护性结构（NRR 契约、反稀释、下行条款）；身份安全是关键基础设施投资主题，IPO 退出窗口为 18–36 个月
          type: process
    approximationNotes: 流程逻辑是综合多源证据的分析性构造；单个节点断言由 CV001–CV044 支撑。节点顺序反映尽调优先级，而非因果时间顺序。BUY 建议以投资前满足 TV006 中五项尽调要求为条件。
    claimRefs:
      - CV001
      - CV012
      - CV014
      - CV026
      - CV029
      - CV040
  - id: FV002
    title: 估值敏感性
    type: bar
    layout: standard
    summary: >-
      在八个 ARR 倍数情景下，将 Semperis 估计 ARR 转换为隐含企业价值，从熊情景底部（$100M ARR 上 5x = $500M EV）到牛情景上限（$150M ARR 上 18x = $2.7B
      EV）。图表显示，在基准 ARR 假设下，ARR 倍数每提高 2–3x，EV 增加 $200–450M，确认现阶段主要估值杠杆是倍数选择，而不只是 ARR 增长。
    data:
      items:
        - label: 熊情景 5x ARR（$100M 基准）
          value: 500
        - label: 熊情景 7x ARR（$100M 基准）
          value: 700
        - label: 基准情景 8x ARR（$120M 估计）
          value: 960
        - label: 基准情景 10x ARR（$120M 估计）
          value: 1200
        - label: 基准情景 12x ARR（$120M 估计）
          value: 1440
        - label: 牛情景 15x ARR（$150M 估计）
          value: 2250
        - label: 牛情景 18x ARR（$150M 估计）
          value: 2700
        - label: CrowdStrike 上市公司类比 17x
          value: 2040
    approximationNotes: >-
      ARR 数字为估计：$100M 是已确认底部（January 2025 公告）；$120M 是 early 2026 的基准估计，基于已确认底部应用 20–30% 增长；$150M 是牛情景估计，基于 40–60% YoY
      增长。倍数来自可比公司组（TV004）。CrowdStrike 类比把 CrowdStrike 约 17x 远期倍数应用到 Semperis $120M ARR，作为示意性上限。所有数值均以 USD millions 计。
    claimRefs:
      - CV017
      - CV020
      - CV021
      - CV022
      - CV036
      - CV041
  - id: FV003
    title: 估值 / 回报区间
    type: range
    layout: standard
    summary: >-
      六个参考点的企业价值区间，覆盖 Semperis 熊情景、基准情景、牛情景、2022 Series C 估值锚、June 2024 增长轮底部，以及 Ping Identity 战略 M&A 可比交易。图表确认，低于 $1.3B
      入场可捕捉相对于基准和牛情景的显著上行，同时相对 $400–700M 的熊情景底部提供缓冲。
    data:
      items:
        - label: 熊情景 EV 区间
          low: 400
          high: 700
        - label: 基准情景 EV 区间
          low: 880
          high: 1560
        - label: 牛情景 EV 区间
          low: 1800
          high: 3200
        - label: 2022 Series C 估值锚
          low: 1400
          high: 1400
        - label: 2024 增长轮锚
          low: 1000
          high: 1200
        - label: 身份领域 M&A 可比交易（Ping Identity）
          low: 1500
          high: 3000
    approximationNotes: >-
      所有区间均为估计，来自 ARR 倍数敏感性分析（TV003）和可比交易价值（TV004）。2022 Series C 锚是 SEC Form D 和 GlobeNewsWire 报道确认的投后估值 $1.4B。2024
      增长轮锚公开报道为 "$1B+" —— 低端为 $1.0B，$1.2B 的高端是估计，反映增长轮相对上一轮的典型估值抬升。Ping Identity 可比区间低端代表 Thales 收购价（$2.8B），高端代表同等公司按可比
      ITDR 市场倍数得到的隐含牛情景。所有数值均以 USD millions 计。
    claimRefs:
      - CV006
      - CV020
      - CV021
      - CV022
      - CV033
      - CV038
  - id: FV004
    title: 投资 KPI
    type: kpi
    layout: standard
    summary: >-
      投资委员会按七个维度评分——市场地位、客户验证、护城河强度、单位经济、主要风险、估值立场和证据质量——给出 Semperis 投资准备度的 IC
      快照。市场、验证和护城河是强项；单位经济和证据质量是缺口维度，必须由尽调要求在投资承诺前补齐。
    data:
      nodes:
        - id: kpi-market
          label: 市场地位
          detail: 唯一兼具检测 + 恢复的纯 ITDR；$6–8B TAM 以 25–30% CAGR 增长；FedRAMP Moderate；KuppingerCole Leader 2025；Gartner ITDR 认可
          type: strength
        - id: kpi-proof
          label: 客户验证
          detail: 1,000+ 家企业客户；Fortune 500 具名账户已确认；$100M ARR 里程碑于 January 2025 跨过；美国联邦客户基础已确认
          type: strength
        - id: kpi-moat
          label: 护城河强度
          detail: ADFR DR 运行手册切换成本；Purple Knight 65K+ 社区带来有机企业管线；FedRAMP Moderate 构成联邦竞品进入壁垒；受监管垂直行业替换周期 3–5 年
          type: strength
        - id: kpi-economics
          label: 单位经济
          detail: ARR ~$100–120M（估计）；增长 40–60% YoY（估计）；NRR 未披露（关键缺口）；毛利率估计 > 70%（SaaS 可比）但未经确认；烧钱率未知
          type: risk
        - id: kpi-risk
          label: 主要风险
          detail: Microsoft MDI 打包进 M365 E5，形成零成本 DSP 替代；AD 市场在 5–10 年云迁移周期上存在淘汰风险；以色列研发地缘政治集中；Hercules Capital 债务契约
          type: risk
        - id: kpi-valuation
          label: 估值立场
          detail: 公允价值 $880M–$1.56B（基准 8–12x ARR）；上一轮为 June 2024 的 $1.0B+；入场纪律在 $1.3B 或以下至关重要；较 2022 的 $1.4B 峰值下调，原因是行业倍数压缩
          type: neutral
        - id: kpi-evidence
          label: 证据质量
          detail: 中等 —— $100M ARR 已确认，Fortune 500 具名客户已确认；NRR 未披露，毛利率未披露，股权结构不透明，出口管制姿态未知
          type: neutral
    approximationNotes: >-
      强项 / 风险 / 中性评级是基于公开证据整体的分析判断；它们不代表数值评分。单位经济节点被评为风险，不是因为经济性肯定很差，而是 NRR
      和毛利率数据缺失，使公开证据无法独立验证。估值立场仅反映基准情景区间；牛情景和熊情景区间见 TV003 和 FV003。
    claimRefs:
      - CV003
      - CV004
      - CV005
      - CV019
      - CV026
      - CV028
      - CV036
      - CV039
