  - id: TP004
    title: 护城河持久性 / 竞争风险清单
    enumeration: true
    enumerationScope:
      coverage: partial
      basis: >-
        Enumeration of Semperis' claimed competitive moats and corresponding threat scenarios based on KuppingerCole
        ITDR Leadership Compass 2025, Wavestone AD security tools report 2026, IBM X-Force threat intelligence 2026,
        Forrester Now Tech ITDR Q1 2025, and SecurityWeek competitive analysis. Severity ratings are qualitative analyst
        assessments. Excludes macro-level market exit scenarios.
    columns:
      - 护城河主张
      - 主要威胁
      - 严重程度
      - 缓释措施 / 尽调追问
    rows:
      - - AD Forest Recovery (ADFR) — 唯一专为 AD 林恢复打造的自动化产品
        - Microsoft 将原生 AD 林恢复能力做进 Azure Site Recovery 或 BCDR Suite
        - 中 — 并非迫在眉睫，但可能成为 Microsoft 未来 3–5 年路线图事项
        - 跟踪 Microsoft BCDR 路线图；评估 ADFR 客户留存和续约率；测试恢复 RTO 主张
      - - AD 安全工程深度 — 150+ 种攻击技术检测，12+ 年 R&D
        - Microsoft MDI 扩大检测目录，覆盖 Semperis DSP 的全部技术；CrowdStrike Graph 吸收 AD 遥测
        - 高 — Microsoft 和 CrowdStrike 正在积极扩张；这条护城河在收窄
        - 按季度跟踪 MDI 发布说明；获取 MDI 扩张后的赢单 / 输单数据；衡量检测同等性差距趋势
      - - Purple Knight 免费工具 — 4M+ 下载，作为漏斗顶部需求入口
        - BloodHound CE 和 Microsoft Secure Score 提供免费替代；Purple Knight 转化率可能下降
        - 低-中 — Purple Knight 保留独特 AD 评分模型；MDI / Secure Score 并不等同
        - 跟踪 Purple Knight 下载到付费的转化率；比较 Purple Knight 评分与 MDI / Secure Score 输出
      - - FedRAMP Moderate 授权 — 政府市场准入护城河
        - CrowdStrike（FedRAMP High）和 Microsoft（FedRAMP High）拥有更高等级联邦授权；DISA IL4+ 要求将 Semperis 排除在最高密级工作之外
        - 中 — Semperis 的 FedRAMP Moderate 限制其在涉密和 IL4+ 联邦账户中的上行空间
        - 确认 Semperis FedRAMP High 路线图；评估合同工具覆盖（GSA、CIO-SP3、SEWP）
      - - 转换成本 — AD 恢复运行手册和经过测试的 DR 计划围绕 ADFR 构建
        - 客户在成本压力下整合到 Microsoft BCDR，或转向手工 DR
        - 低-中 — 转换成本真实存在，但不是合同锁定；组织可以重建 DR 计划
        - 按仅 ADFR 与 DSP+ADFR 客户拆分衡量 NRR 和流失；分析流失原因
      - - Semperis Research Lab — 已发布的 AD 威胁情报与研究员信誉
        - CrowdStrike Intelligence 和 Microsoft 威胁研究发布同等 AD 攻击情报
        - 低 — 研究信誉有助于安全社区影响力，但不能形成可防守的收入护城河
        - 跟踪 Semperis Research Lab 的发布频率和引用率，并与 CrowdStrike / Microsoft 对比
      - - 混合 AD + Entra ID 覆盖 — 本地和云身份的单一视图
        - Microsoft Entra ID Protection + MDI 已提供原生混合覆盖；Entra Workload Identities 在扩张
        - 高 — Microsoft 在 Entra ID + MDI 组合上拥有原生集成优势
        - 评估 Semperis Entra ID 检测能力与 MDI 的同等性；衡量 Entra-only 客户赢单率
    notes: 严重程度评级：高 = 1–2 年内的即时威胁；中 = 2–4 年期限；低 = 遥远或不太可能。 评估基于分析师评论、Microsoft 和 CrowdStrike 公开披露的产品路线图，以及独立安全研究员评估。
