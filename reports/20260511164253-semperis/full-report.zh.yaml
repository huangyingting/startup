        - FedRAMP 授权失效，或单一财年流失 ≥3 个具名联邦账户
      - - Purple Knight 社区（65,000+ 用户）形成有机企业销售管线护城河
        - 正向论点
        - 公司披露 65,000+ 组织使用 Purple Knight 免费工具；社区用户已显示可转化为付费 DSP
        - Microsoft 在 MDI 或 Entra ID 内发布可比的免费 AD 安全审计工具
