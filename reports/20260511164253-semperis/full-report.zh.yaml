      - number: '6.4'
        title: 转换成本、合同耐久性与 NRR 证据缺口
        blocks:
          - type: paragraph
            body: >-
              Semperis 尚未公开披露任何净收入留存（NRR）、毛收入留存（GRR）或流失率数据——这是客户尽调图景中最重要的单一信息缺口。不过，对产品架构的结构性分析强力支持高转换成本论点，尤其适用于以 ADFR
              为锚的客户。ADFR 嵌入企业灾难恢复运行手册、已测试并验证的恢复剧本，以及运营桌面演练项目。替换 ADFR 不只是换软件，还要重建 DR
              框架、重新测试恢复流程，并与信息安全团队、往往还包括外部审计方一起重新认证恢复过程。这些转换成本真实存在，但不是合同性的——重视成本的 CFO 可以强制替换。仅使用 DSP 做威胁检测的客户转换成本更低，因为
              Microsoft Defender for Identity 和 CrowdStrike Falcon Identity Protection
              能以较低或零增量成本提供替代检测路径。独立评测平台上的客户满意度数据支持高留存论点：G2 在 240+ 条评论中的平均评分为 4.7/5.0，Gartner Peer Insights 为
              4.4/5.0。常见满意驱动因素包括恢复能力、支持质量和检测深度。常见抱怨包括相较捆绑替代品定价偏高，以及大型混合环境部署复杂——这些信号与仅使用 DSP
              的客户在续约时面临审查相一致。根据同行评论披露，大型企业合同结构估计为一至三年。对以 ADFR 为锚的账户，估计毛留存高于
              85%，与结构性转换成本分析一致，但该估算尚未通过管理层披露确认。关键尽调问题：按产品线（以 ADFR 为锚 vs. 仅 DSP）和客户规模拆分的 NRR。
