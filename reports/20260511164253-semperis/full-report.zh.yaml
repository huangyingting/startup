      - number: '1.3'
        title: 融资历史、估值与投资者基础
        blocks:
          - type: paragraph
            body: >
              从创立到 June 2024，Semperis 已在五轮披露融资中筹集约 $368 million。公司最近一轮融资是 June 2024 完成的 $125 million 增长融资，由 J.P. Morgan
              Asset Management 和 Hercules Capital 领投，使 Semperis 以超过 $1 billion 的估值成为独角兽。上一轮主要融资是 early 2022 的 $200
              million Series C，构成公司成为独角兽前资本结构中的大部分。

              $125 million June 2024 这一轮采用股权与债务结合的结构（增长融资），符合 Hercules Capital 面向高增长科技公司的典型放贷模式。J.P. Morgan 的资产管理部门与
              Hercules 共同领投，显示机构投资者认可 Semperis 的市场地位与财务轨迹。该轮融资伴随公司宣布 $100M ARR 轨迹突破，并释放明确 IPO 准备信号； Security Week 报道称
              Semperis 正在「考虑 IPO」，并已「聘请有公开市场经验的资深高管」。

              更早期轮次包括一轮 Series B（约 2019–2021）以及来自早期机构风投的种子轮和 Series A。约 $368 million 的总融资额，使 Semperis 成为市场上融资最充足的纯 ITDR
              公司之一。早期轮次的完整投资者名单与经济条款 未被全面公开披露，围绕股权结构和清算优先权留下了尽调缺口。
