companyProfile:
  summary: |
    Semperis 是一家网络安全公司，打造了面向 Active Directory 与 Microsoft Entra ID 环境的领先身份威胁检测与响应（ITDR）
    平台。公司由 CEO Mickey Bresman、CTO Guy Teverovsky 和业务发展执行副总裁 Matan Liberman 于 2013
    在 Hoboken, NJ 创立，切入一个关键但长期供给不足的攻击面：Active Directory。它为 90%+ Global Fortune 1000
    组织管理身份与访问，也是勒索软件和民族国家攻击中的 #1 目标。Semperis 的五产品 Identity Resilience Platform
    （Directory Services Protector、AD Forest Recovery、Lightning IRP、Purple Knight 和 Forest Druid）
    是唯一覆盖混合 AD/Entra ID 环境持续检测、实时防护和网络攻击感知恢复的套件。公司在 January 2025 跨过
    $100M ARR，拥有 1,000+ 企业客户、$368M 总融资，并在 June 2024 成为独角兽。
