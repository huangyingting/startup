        - Microsoft E5 账户中的 DSP 续约率；MDI 对等功能发布；按客户批次观察净收入留存（NRR）趋势
        - E5 账户 DSP 续约率低于 85%；连续两个季度 NRR 低于 95%，且由 MDI 替代驱动
        - 加速 ADFR 和 Purple Knight 差异化；调整 DSP 定价；把价值主张转向 MDI 完全没有对等能力的恢复场景
        - 是 — 若 DSP NRR 连续三个季度或更久低于 90%，且 MDI 被点名为主要流失驱动因素，需重新评估投资论点
      - - Semperis 软件供应链被入侵
        - 安全事件披露；点名 Semperis 的 CISA 公告；客户通知事件；SOC 2 认证连续性
        - 任何已确认的 Semperis 生产系统入侵；客户 AD 数据暴露事件；SOC 2 认证失效
        - 按事件响应计划立即响应事件；通知客户；取证审计；与 CISA 协调；启动危机沟通协议
        - 是 — Semperis 身份基础设施出现重大入侵，会立即触发投资论点重估；身份安全领域的品牌破坏通常不可逆
      - - FedRAMP 授权失效或 High 授权延迟
        - FedRAMP 市场页面上架状态；年度评估完成日期；DoD 客户销售管线 ARR 指标
        - 失去 Moderate 授权；High 授权时间线超过从现在起 30 个月；联邦销售管线 ARR 同比增长低于 5%
        - 加码 FedRAMP 补救资源；暂停联邦销售扩张；评估 High 授权赞助机构替代方案
        - 部分 — 联邦 ARR 承压（估计占总量 10-15%）；不打破企业市场论点；若联邦业务是投资假设中的核心增长向量，则需评估
      - - 以色列 R&D 地缘政治扰动
        - Tel Aviv 办公室运营状态；R&D 员工数报告；工程速度指标；产品路线图里程碑交付率
        - 任意滚动 6 个月内 Tel Aviv R&D 员工流失超过 25%；连续两个路线图季度出现超过 3 个月的持续产品路线图延误
        - 加速 NJ 工程招聘；为关键路径项目补充外部承包人员；启动 R&D 地域多元化计划
        - 部分 — 持续超过 12 个月的严重扰动会损害产品交付承诺；打破投资论点前，先评估严重程度、恢复周期和客户影响
      - - IPO 执行失败或降轮融资
        - IPO 准备里程碑（CFO 到岗、S-1 申报日期、银行聘用）；SaaS 公开市场倍数；Semperis ARR 增速相对 ITDR 可比同业组合的位置
        - IPO 较投资者沟通目标延迟超过 18 个月；降轮 IPO 估值低于 $1.0B；ARR 增长低于 20%，同时 ITDR 同业维持在 30% 以上
        - 评估战略 M&A 替代方案；通过二级市场要约收购为 LP 提供流动性；按当前估值追加增长型股权资金进行资本重组
        - 部分 — 降轮 IPO 会削弱员工留存和士气，但企业产品价值独立存在；时间线拉长会推高投资者退出压力
    notes: 阈值为指示性，应在尽调中与管理层校准。所有监控指标都需要投资者级别报告访问权才能跟踪。两个绝对打破投资论点的触发条件，是 Microsoft MDI 持续驱动 NRR 压缩，以及 Semperis 出现重大安全入侵。
