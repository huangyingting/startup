        - 训练数据未覆盖的新攻击 TTP 初期可能逃过检测
      - - REST API 与 SIEM/SOAR 集成层
        - 将告警和遥测路由到 Microsoft Sentinel、Splunk、ServiceNow 等
        - SIEM/SOAR 厂商 API 兼容性；客户集成人员
