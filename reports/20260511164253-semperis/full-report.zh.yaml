      - number: '2.2'
        title: TAM、SAM 和 SOM——测算身份威胁检测与响应机会
        blocks:
          - type: paragraph
            body: >-
              已发布的分析师估算中，2026 年 ITDR 市场规模从 $2.32B（Fortune Business Insights，范围较窄）到
              $5.0B+（MarketsandMarkets，身份检测口径更宽）不等；纯软件 ITDR TAM 的中位共识约为 $3.0–4.0B。 这种分散不是噪音，而是真实的边界分歧：较窄定义聚焦 AD
              专用威胁检测工具，较宽定义则纳入云身份保护、员工身份安全、 以及身份驱动的 XDR 能力。KuppingerCole 估计 2025 年 ITDR 市场为 $3.2B，年增速约 20%——这一数字与中位共识相符。

              按 IDC 和 Grand View Research，包含 IAM、PAM、IGA 和 ITDR 的更广义身份安全市场，2026 年全球规模估计为 $22–26B。ITDR 目前约占其中
              13–18%；这个品类增长明显快于更广义的 IAM 基础，因为已部署 IAM 平台的组织， 正在其上叠加 ITDR。

              Semperis 的可服务可获得市场（SAM）是 ITDR 与 AD 安全支出中的一个子集：约 2,000 名员工 以上、且拥有本地或混合 AD 环境的组织。这一口径排除纯云、仅 Entra ID
              的组织、低于企业级 AD 复杂度门槛的组织、 以及只消费商品化 Microsoft 原生工具的客户。基于已发布的细分规模数据，这一企业级细分约占 ITDR TAM 的 55–65%，对应 2026 年 SAM 约
              $1.8–2.8B。以 3 年规划期看，Semperis 的 SOM 估计为 $350–650M—— 即 SAM 的 15–25%——方向上与其当前 $100M+ ARR、约 4–6% 当前 SAM 渗透率一致。

              关键估算保留项：没有分析师把「以企业 AD 为中心的 ITDR」作为独立研究品类发布。所有 SAM 和 SOM 估算均来自二级研究 与 Semperis 披露的 ARR。17–26% CAGR
              的市场增长说明可服务边界正在快速扩张；若品类定义转向平台捆绑式身份安全， 这既是机会，也是风险。
