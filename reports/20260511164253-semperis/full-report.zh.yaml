      - number: '7.2'
        title: 运营与安全风险
        blocks:
          - type: paragraph
            body: >-
              Semperis 最灾难性的运营风险，是自身平台和面向客户基础设施遭遇网络安全入侵。Semperis 在客户域控制器上部署轻量代理，并在其云基础设施中托管取证干净的 AD 备份副本。一旦 Semperis
              自身系统被攻破，现存最敏感的一类企业目录数据就会暴露，攻击者可能借此大规模攻陷客户 AD 环境。同行网络安全供应商已有先例——SolarWinds（2020 供应链后门，影响 18,000
              个安装）、Okta（2022-2023 入侵，影响数千客户）和 CrowdStrike（2024 Falcon sensor 更新导致全球 IT 中断，影响 8.5 million 台 Windows
              系统）——说明身份和端点安全供应商是高价值攻击目标，入侵后果远超直接客户。Semperis 按其安全信任中心维持 SOC 2 Type II 证明和安全与信任计划，但这些控制无法完全消除风险。

              Microsoft MDI 捆绑威胁，是发生概率最高的实质性运营风险。Microsoft Defender for Identity（MDI）已无额外成本地包含在 Microsoft 365 E5 和 E5
              Security 订阅中，而这些订阅已在 Semperis 企业客户基础中广泛采用。续约时，承受预算压力的 IT 采购团队通常会评估 MDI 是否足以满足其 AD 监控需求。Semperis DSP
              提供更深的取证调查、Active Directory Forest Recovery 和 Purple Knight 审计能力，MDI 无法复制；但零成本 MDI 替代品仍会在每个企业续约周期制造显著定价压力。

              域控制器上的代理式部署形成另一项运营风险：DSP 代理处理实时 AD 变更事件，并需要与 Windows Server 和域控制器补丁级别兼容。代理更新与客户补丁周期不兼容，可能引发客户 AD
              运营事件。Semperis 通过分阶段部署管理该风险，但域控制器本身高度敏感，任何代理层事件都会对客户信任造成不成比例的损害。

              中期结构性风险是 Active Directory 市场过时。Microsoft Entra ID 是本地 AD 的云原生继任者；企业完成向 Entra ID 的云身份迁移并降低对本地 AD 的依赖后，本地 AD
              安全工具的可服务市场会收缩。Semperis 已投资 Entra ID 安全产品能力，但长期 TAM
              轨迹取决于企业迁移得多彻底、多快。分析师估计，这一风险主要是五到十年维度的风险，而非即时风险；但其结构性不可逆，仍值得持续监测。
