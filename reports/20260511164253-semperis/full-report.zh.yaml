      - number: '8.4'
        title: 退出准备度、尽调问题与否决标准
        blocks:
          - type: paragraph
            body: >-
              Semperis 展现出可信的 IPO 准备信号：January 2025 确认跨过 $100M ARR，任命 CFO 显示财务 报告能力成熟，1,000+ 企业客户提供足以支撑 S-1
              申报的参考客户基础，Fortune 500 具名客户分布 在航空、金融服务、医疗、零售等受监管垂直行业，能锚定机构投资者兴趣，FedRAMP Moderate 授权 则建立了联邦收入可信度。Insight
              Partners 的组合公司 IPO 历史，以及 J.P. Morgan Asset Management 对成长轮的领投，为其提供机构路径支撑。现实退出周期是 18-36 个月（IPO window
              2027-2028），前提是 ARR 增速持续高于 30%，且网络安全 SaaS 的公开市场环境有利。战略 M&A 是第二路径：CrowdStrike、Palo Alto Networks、Microsoft 和
              Thales 都是可能买方，按 8-14x ARR 计算，在基准 ARR 假设下对应 $800M-$1.7B 退出区间。

              五个会打破投资论点的触发器需要持续监控：DSP 续约率跌破 70%（Microsoft MDI 替代），Microsoft 原生 AD 恢复削弱 ADFR 切换成本，投资后 12 个月内 CEO/CTO
              意外离任，监管执法行动，或下一轮 股权融资估值低于 $900M。任何一个触发器都会实质性把牛市 / 基准情形的概率权重推向熊市情形， 并应启动退出复盘。

              投资承诺前，有五项最终尽调要求不可让步：(1) NRR 和 GRR 披露 —— 没有这项披露，切换成本论点 无法验证，基准情形里的留存假设也无法压力测试；(2) 客户集中度瀑布 —— 前 10 大客户 ARR
              占比 超过 30% 会造成实质性流失风险，并改变投资判断；(3) 股权结构表和清算优先权栈 —— 必须审阅 Insight Partners Series C 优先权和 Hercules Capital
              债务契约，才能理解普通股分配瀑布和 运营灵活性约束；(4) FedRAMP High 路线图 —— 确认 High 授权时间表和担保机构，可打开估计 $50-100M 增量 ARR 的 DoD/IC
              收入机会；(5) 出口管制合规文件 —— Semperis 的以色列研发 涉及两用加密软件，需要有效的 EAR 合规计划；考虑到其美国联邦客户基础，缺少文件就是实质性 监管风险。
            claimRefs:
