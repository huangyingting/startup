  - id: TM001
    title: 市场定义表
    enumeration: false
    columns:
      - 细分领域
      - 类别
      - 纳入支出
      - 排除支出
      - 主要买方 / 付款方
      - 与 Semperis 的相关性
    rows:
      - - ITDR — Active Directory
        - 核心 TAM
        - 实时 AD 威胁检测、攻击路径分析、自动化响应、姿态管理
        - 纯云、仅 Entra 的 ITDR、消费者身份、客户 IAM
        - CISO / 身份架构师；安全预算
        - 主要产品类别 — DSP 和 ADFR 直接覆盖该细分领域
      - - AD 备份与网络恢复
        - 核心 TAM
        - 专为 AD/forest 打造的备份、勒索软件回滚、基于 golden image 的完整 forest 恢复
        - 通用备份工具（Veeam、Commvault）、基于 SIEM 的 IR
        - IT 安全总监 / CISO；DR/BC 预算
        - Semperis ADFR 是唯一专为 AD forest 恢复打造的产品；差异化强
      - - AD 加固与评估
        - 核心 TAM
        - AD 安全姿态工具、错误配置检测、攻击路径映射（BloodHound 类）
        - 非 AD 专用的一般漏洞扫描器、人工渗透测试
        - 安全架构师 / IT 运维；安全预算
        - Semperis Purple Knight（免费）和 Forest Druid 作为付费产品的漏斗入口
      - - 特权访问管理（PAM）
        - 相邻 — 部分重叠
        - 特权凭据保险库、just-in-time 访问、会话录制
        - 一般 AD 威胁检测、实时响应
        - CISO / IAM 团队；安全或 IAM 预算
        - PAM 厂商（CyberArk、BeyondTrust）处于相邻位置 — Semperis 与 PAM 集成，但不取代 PAM
      - - 身份治理与管理（IGA）
        - 相邻 — 排除
        - 入职 / 转岗 / 离职流程、访问认证、角色管理
        - AD 威胁检测、实时取证、forest 恢复
        - IT / HR；合规预算
        - 不在 Semperis 产品范围内；IGA 买方可能同时采购 ITDR，但采购流程不同
      - - 更广 IAM 平台（SSO、MFA）
        - 排除在 SAM 外
        - 云 SSO、多因素认证、员工身份联合
        - AD 专用威胁检测、AD 恢复
        - CTO / IT；SaaS 身份预算
        - Okta、Ping、Duo 是 IAM 平台厂商；Semperis 与其集成，但不在 SSO 领域竞争
      - - Microsoft Defender for Identity（MDI，身份防护）
        - 市场内替代品
