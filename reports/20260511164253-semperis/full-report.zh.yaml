  - id: FE001
    title: Semperis Identity Resilience Platform — 产品架构图
    slug: product-architecture-map
    type: stack
    layout: wide
    summary: 分层堆栈展示 Semperis Identity Resilience Platform：底层是身份覆盖范围，顶层是危机管理。每一层代表由一个或多个产品模块交付的独立功能能力。
    data:
      layers:
        - label: 身份覆盖范围
          detail: 本地 Active Directory、Entra ID（Azure AD）、Okta、Ping Identity——平台覆盖完整的混合多 IdP 攻击面
        - label: 预防与评估
          detail: Purple Knight（免费 IOE/IOC 扫描器，v4.2 2026）、Forest Druid（免费 Tier 0 影响半径分析）——持续评估安全态势并降低暴露
        - label: 实时检测与变更监控
          detail: DSP 无代理捕获复制日志，ML 异常检测引擎，针对 AD 和 Entra ID 变更做 IOE/IOC 评分与告警
        - label: 运行时攻击检测
          detail: Lightning IRP 用行为检测识别内存中攻击（DCSync、Golden Ticket、Kerberoasting），补足 DSP 变更日志分析
        - label: 自动化修复与响应
          detail: DSP 一键对象回滚，集成 SIEM/SOAR（Sentinel、Splunk、ServiceNow），跨所有 IdP 做防篡改变更追踪
        - label: 网络优先的林恢复
          detail: ADFR 在干净硬件上自动恢复无恶意软件的林，支持 Azure 云备份（AES-256）和对象级恢复向导
        - label: 危机管理与取证
          detail: Identity Forensics and Incident Response（IFIR）、Ready1 危机管理平台，汇集 Microsoft MVP 合计 180+ 年经验，提供专家级 IR 能力
    claimRefs:
      - CE001
      - CE006
      - CE009
      - CE010
      - CE015
      - CE018
      - CE026
      - CE030
  - id: FE002
    title: 客户工作流 / 运营流程 — AD 安全生命周期
    slug: customer-workflow-operating-flow
    type: flow
    layout: wide
    summary: 运营工作流展示 Semperis 客户如何用不同平台产品走完整个 AD 安全生命周期，从初始评估一直到恢复。
    data:
      nodes:
        - id: n1
          label: 基线评估
          detail: 运行 Purple Knight 免费扫描，在 AD 和 Entra ID 中发现 IOE 与 IOC；生成评分报告和按优先级排序的修复清单
          type: step
        - id: n2
          label: Tier 0 加固
          detail: 用 Forest Druid 定义 Tier 0 资产边界；映射通往特权资产的所有所有权路径；关闭影响半径后门
          type: step
        - id: n3
          label: 持续检测
          detail: 部署 DSP 监控所有 AD 变更的复制日志；对可疑变更接收实时告警，并自动评分严重性
          type: step
        - id: n4
          label: 运行时攻击拦截
          detail: Lightning IRP 在内存中攻击（DCSync、Golden Ticket）完成前识别；通过 SIEM/SOAR 集成向 SOC 告警
          type: step
        - id: n5
          label: 定向修复
          detail: DSP 自动修复或一键回滚特定恶意 AD 对象变更；分析师复核审计轨迹以做取证
          type: step
        - id: n6
          label: 事件响应
          detail: Semperis IFIR 团队介入，核验威胁是否清除；Ready1 危机管理平台协调利益相关方沟通
          type: decision
        - id: n7
          label: 林恢复
          detail: ADFR 在干净硬件上编排无恶意软件的完整或部分林恢复；如本地存储丢失，可使用 Azure 云备份
          type: step
        - id: n8
          label: 恢复后验证
          detail: 重新运行 Purple Knight 扫描；用 Forest Druid 验证 Tier 0 边界；确认 AD 状态干净后再回到生产
          type: step
      edges:
        - from: n1
          to: n2
          label: 发现项推动加固
        - from: n2
          to: n3
          label: 先加固，再持续监控
        - from: n3
          to: n4
          label: 告警升级到运行时检测
        - from: n4
          to: n5
          label: 攻击确认 → 修复
        - from: n3
          to: n5
          label: DSP 变更告警 → 回滚
        - from: n5
          to: n6
          label: 宣布重大事件
        - from: n6
          to: n7
          label: 需要恢复
        - from: n7
          to: n8
          label: 林上线 → 验证
        - from: n8
          to: n3
          label: 回到持续监控
    claimRefs:
      - CE002
      - CE016
      - CE017
      - CE019
      - CE027
      - CE036
  - id: FE003
    title: 关键依赖图 — Semperis 平台
