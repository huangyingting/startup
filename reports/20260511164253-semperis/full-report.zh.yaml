  - id: FU001
    title: 客户旅程图
    type: journey-map
    layout: wide
    summary: Semperis 客户获取和扩张的端到端生命周期——从免费工具发现，到企业采购、生产部署和追加销售扩张。每个阶段映射客户主要动作、采用界面，以及推动进阶的关键触点。
    data:
      items:
        - label: 认知
          detail: >-
            IT 安全团队或 AD 管理员通过 Purple Knight 免费评估发现 AD 漏洞，或因同业组织遭遇勒索软件事件而开始关注；Semperis Research Lab 出版物和 MITRE ATT&CK
            引用推动自然发现。
          touchpoints:
            - Purple Knight 免费 AD 评估工具（65K+ 组织）
            - MITRE ATT&CK 框架引用和 Semperis Research Lab 出版物
            - 引用 Semperis 的分析师报告（KuppingerCole、Forrester、Wavestone）
        - label: 评估
          detail: >-
            安全团队把 DSP 和 ADFR 与 CrowdStrike Falcon Identity Protection、Microsoft Defender for Identity 对比评估；推进概念验证或 30
            天试用；参考独立评测平台验证同业体验。
          touchpoints:
            - 30 天试用或 POC（企业评估周期通常 60–120 天）
            - G2、Gartner Peer Insights 和 TrustRadius 同业评价研究
            - 直接对比已部署的 Microsoft MDI 基线
        - label: 采购
          detail: 企业采购团队通过直销或 VAR/渠道伙伴谈判年度订阅；政府账户接受 FedRAMP 合规审查；较大部署通常谈判多年期价格。
          touchpoints:
            - 面向 >$250K ACV 账户的企业直销
            - 面向中型企业账户的 VAR/MSP 渠道伙伴
            - 面向联邦账户的 GSA 或其他政府合同工具
        - label: 部署
          detail: 在域控上部署 DSP 传感器；配置 ADFR，使用离线、取证干净的备份做网络韧性恢复；集成 SIEM（Splunk、Microsoft Sentinel）和 SOAR 工具；通过桌面演练验证恢复计划。
          touchpoints:
            - 专业服务导入（通常 4–8 周）
            - Splunk/Microsoft Sentinel 集成配置
            - 恢复桌面演练和运行手册认证
        - label: 扩张
          detail: 多产品客户增加 Lightning IRP、更多 AD 林或 Entra ID 覆盖；年度续约承接范围扩张带来的追加销售；客户成功团队推动交叉销售对话；Purple Knight 结果暴露更多风险。
          touchpoints:
            - 年度续约加追加销售动作（在 DSP 之上叠加 ADFR）
            - 客户成功和技术客户经理参与
            - Lightning IRP 和更多林范围扩张
    approximationNotes: 触点顺序和转化时点基于同业评价平台披露、独立客户证言和企业安全 SaaS 基准估算。60–120 天评估周期来自 G2 和 TrustRadius 买方报告的采购时间线。Semperis 未披露平均销售周期长度。
    claimRefs:
      - CU002
      - CU005
      - CU006
      - CU007
      - CU024
      - CU025
