      - number: '5.3'
        title: 信任、质量与合规
        blocks:
          - type: paragraph
            body: >-
              Semperis 的信任基础，主要来自产品层面的合规对齐和第三方评测评分。DSP 内置 GDPR、HIPAA、PCI、SOX 合规报告包；这些模板可以定期生成和分发，让受监管行业客户直接从 DSP
              产出审计证据。公司将 DSP 定位为覆盖最关键合规要求的 AD 安全控制，同时不需要单独的报告基础设施。公司材料称，其云托管和联邦领域产品符合 SOC 2 Type II 与 FIPS
              140-2；但研究期间未找到公开可访问的证明文件，对执行正式供应商评估的受监管买方而言，这是一个验证缺口。

              在第三方评测平台上，Semperis DSP 得分较强：G2 对比显示，主动威胁狩猎为 9.7，支持质量 9.6，易用性 9.2，风险评分 9.0，自动扫描 8.1。公司基于客户调研数据报告 Net
              Promoter Score 为 81。Peerspot 评论者强调安装简便、生产环境可靠，以及 Semperis 支持团队质量高；同时指出云环境集成深度仍可提升，而 MightyID
              收购部分补上了这一缺口。KuppingerCole 在 2025 将 Semperis 评为 Identity Threat Detection and Response 类别 Leader。公司还入选
              Fortune 2024 增长最快网络安全公司 Cyber 60 榜单，并入围 2026 Australian Cyber Awards Ransomware Security Provider of the
              Year 决赛名单。产品定位提到 MITRE ATT&CK 框架覆盖，但外部来源尚未独立验证其具体技术级覆盖深度。
