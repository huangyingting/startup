  - id: TP001
    title: 竞争对手画像表
    enumeration: true
    enumerationScope:
      coverage: partial
      basis: >-
        Enumeration of primary competitive vendors in the ITDR, AD security, and identity threat detection space based
        on KuppingerCole ITDR Leadership Compass 2025, Forrester Now Tech ITDR Q1 2025, Wavestone AD security tools
        report 2026, and Semperis' public competitive positioning. Excludes vendors with <1% market presence; emerging
        ITDR startups below Series A are excluded. Free/open-source tools (BloodHound CE) included as status-quo
        substitute.
    columns:
      - 竞争对手
      - 类别
      - 规模 / 融资
      - 主要目标细分
      - 关键差异化
      - 相对 Semperis 的实质限制
    rows:
      - - Microsoft Defender for Identity (MDI，身份防护)
        - 捆绑平台替代品
        - 包含在 M365 E5（$57/user/month）中；未披露独立 ARR；Microsoft FY2025 收入 >$245B
        - 所有企业级 Microsoft 客户（Fortune 500 中 70%+）
        - E5 中零增量成本；原生集成 Microsoft XDR 生态；覆盖常见 AD 攻击的范围广
        - 没有 AD 林恢复；没有取证回滚；自动化响应有限；检测深度低于 Semperis DSP（按 IBM X-Force， 技术覆盖率 42%）
      - - CrowdStrike Falcon Identity Protection
        - 平台型端点 + 身份捆绑包
        - CrowdStrike FY2026 ARR $3.65B；Falcon Identity Protection 是追加销售 SKU；客户 29,000+
        - 现有 CrowdStrike 端点客户（大型企业）
        - 统一端点 + 身份遥测；借助现有客户基础低摩擦追加销售；威胁图谱关联更强
        - 没有 AD 林恢复；AD 专项检测深度低于 Semperis；需要 CrowdStrike EDR 基座；非 CrowdStrike 账户成本更高
      - - Quest Software（RMAD + Change Auditor，恢复工具）
        - 直接 AD 备份 / 审计专家
        - Quest Software 总收入估计 $700M+；由 Francisco Partners 和 Cinven PE 支持；深耕 AD 管理 >25 年
        - 企业和政府；Quest 装机基础（AD 产品客户 10,000+）
        - AD 备份 / 恢复装机基础 15+ 年；政府关系；捆绑 AD 管理套件
        - 没有达到 Semperis ADFR 规模的专用林恢复；恢复停留在对象级，不是完整林；ITDR 检测能力更弱； PE 持有，投资受限
      - - Netwrix AD Auditing（含 Stealthbits）
        - AD 审计与合规
        - Netwrix：TA Associates 支持，ARR 估计 $150–300M；2021 年收购 Stealthbits
        - 需要 AD 合规报告的中型市场和受监管行业
        - 合规 / 审计报告能力强；整合 Stealthbits 后增加部分 AD 安全能力；定价有竞争力
        - 没有 AD 林恢复；ITDR 检测深度较浅；主要用例是审计 / 合规，不是检测 / 响应
      - - SentinelOne Singularity Identity
        - 平台型端点 + 身份捆绑包
        - SentinelOne FY2025 ARR $858M；Singularity Identity 是附加模块
        - SentinelOne 端点装机基础（中大型企业）
        - 身份信号与端点遥测集成；作为 SentinelOne 捆绑附加项，定价有竞争力
        - AD 专项检测深度仍处早期；没有恢复能力；需要 SentinelOne 基座
      - - Cayosoft
        - AD 管理 + 恢复（中型市场）
        - 私营，种子 / Series A 阶段；团队小；ARR 估计 < $20M
        - 中型市场（1,000–5,000 名员工）；摆脱手工 AD 管理的组织
        - 以更低价格整合 AD 管理和部分恢复功能；UX 简单
        - 企业级恢复能力有限；没有与 Entra ID ITDR 对等的能力；伙伴生态较小；长期可存续性未知
      - - CyberArk Identity Security Platform 身份安全平台
        - 相邻 PAM / 身份（部分重叠）
        - CyberArk (CYBR) Q4 2024 ARR $974M；在金融服务和关键基础设施有大型装机基础
        - 受监管行业的企业 PAM 买方（BFSI、医疗健康）
        - PAM 市场领导者；身份安全平台扩张；金融服务品牌强
        - 主要用例是 PAM，不是 AD 专项 ITDR；没有林恢复；买方不同（PAM 团队 vs. AD/安全团队）
      - - BloodHound CE（开源 / SpecterOps）
        - 现状替代品（免费攻击路径分析）
        - 免费社区版；SpecterOps BloodHound Enterprise：$50K–$200K ARR（SaaS）
        - 安全研究团队；具备 AD 安全专长的组织；预算受限组织
        - 免费社区版；采用广泛；攻击路径可视化强
        - 没有威胁检测或监控；没有 ITDR 响应；没有恢复；需要 AD 安全专长来解读结果
    notes: 私营公司规模估计基于二级研究和分析师报告。CrowdStrike 和 SentinelOne 数字来自公开财报披露。 Quest 和 Netwrix 数字估计基于分析师报告。MDI 定价来自 Microsoft 公开价目表。
    claimRefs:
      - CP001
      - CP002
      - CP006
      - CP008
      - CP010
      - CP012
