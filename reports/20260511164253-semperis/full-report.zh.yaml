      - number: '6.2'
        title: Purple Knight 漏斗到付费客户：从 65K 社区到 1,000+ 企业
        blocks:
          - type: paragraph
            body: >-
              Semperis 从 2014 创立到 2025 达到 1,000+ 家企业客户，走的是一条以 Purple Knight 为锚的差异化 PLG 漏斗。Purple Knight 是公司的免费 Active
              Directory 安全评估工具，自 2021 起免费提供；截至 2025，已有超过 65,000 个组织下载或使用，形成了庞大的漏斗顶部管道，其中一部分免费用户转化为付费 Directory Services
              Protector（DSP）和 Active Directory Forest Recovery（ADFR）客户。1,000+ 付费企业客户里程碑，对应 65,000+ Purple Knight
              社区，意味着免费转付费转化率约为 1.5%——按 PLG SaaS 标准偏低，但与 AD 安全工具长周期、多利益相关方的企业采购环境完全一致；从首次 Purple Knight 扫描到购买，可能跨越 12–24
              个月。公司客户轨迹估计从 2020 约 100 家付费客户起步，并经历数个清晰阶段：2020 to 2022 期间，一系列瞄准 Active Directory
              基础设施的高知名度勒索软件攻击（包括医疗、能源和交通运输行业攻击）为专用 AD 恢复工具制造了强劲需求拉力。Semperis 在 2022–2023 获得 FedRAMP Moderate
              授权，打开政府部门渗透。2023–2025 渠道伙伴计划扩张，加速了中型企业账户获取。Semperis 披露的 100M+ identities protected
              口径合并覆盖社区和付费用户，说明部署规模，但无法拆出仅付费覆盖。公司未公开披露增长率或客户分群年份数据。
