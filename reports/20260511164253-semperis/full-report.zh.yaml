  - number: 5
    title: 产品与技术
    sections:
      - number: '5.1'
        title: 产品组合与模块架构
        blocks:
          - type: paragraph
            body: >-
              Semperis 将商业产品归入 Identity Resilience Platform 伞下；截至 2026-05-11 运行日，该组合包含六个主要产品模块。Directory Services
              Protector（DSP）是旗舰付费产品，持续实时监控本地 Active Directory 和混合 Entra ID 环境。DSP 通过专利无代理复制日志（DFS/USN journal）分析捕捉每一次 AD
              变更，并可自动回滚对 AD 对象的未授权修改。产品内置与 GDPR、HIPAA、PCI、SOX 对齐的合规报告模板，支持多林部署，并按被利用可能性和影响为每个安全指标打风险分。

              Purple Knight 是免费的社区工具，用来扫描 AD 和 Entra ID 环境中的暴露指标（IOE）和入侵指标（IOC）。2026 发布的 Version 4.2 将评分口径改为只关注 “failed”
              指标，而非全部指标，信号因此更锐利。Purple Knight 现已支持 Microsoft Government cloud，覆盖范围延伸到美国联邦机构。Forest Druid
              同样免费，它用由内向外的方法管理攻击路径：不枚举所有攻击者路径，而是先定义 Tier 0 资产，再从这些资产反向映射所有权关系。Forest Druid 首次亮相于 Black Hat USA。

              Active Directory Forest Recovery（ADFR）是高端恢复产品，支持以网络攻击场景优先、无恶意软件的 AD 林恢复。ADFR
              在全新且干净的硬件上编排林恢复的每一步——元数据清理、Global Catalog 重建、站点拓扑重构——避免裸机恢复夹带恶意软件回流。ADFR 还提供对象级恢复向导，并以 AES-256 加密将备份存入
              Azure Blob Storage。Lightning Identity Runtime Protection（Lightning IRP）增加运行时攻击检测——DCSync、Golden Ticket
              forgery、Kerberoasting——用行为信号补足 DSP 的变更检测。February 2026 收购 MightyID 后，平台覆盖扩展到 Okta 和 Ping Identity 环境，使
              Semperis 成为唯一宣称能在单一平台内覆盖完整混合 AD + Entra ID + 云 IdP 纵深防御的供应商。
