      - number: '6.3'
        title: 具名 Logo、案例研究与生产部署质量
        blocks:
          - type: paragraph
            body: >-
              Semperis 只公开点名了 1,000+ 客户基础中的一小部分；具名客户证据集中在交通运输、零售、科技和金融服务中的全球知名品牌。质量最高的具名证据是 Lenovo：Semperis
              发布了案例研究，描述其在一次 AD 失陷事件后部署 DSP 和 ADFR，结果包括相较手工流程恢复明显更快。United Airlines 被点名，其全球 AD 环境部署 DSP
              以进行连续威胁检测。American Airlines 部署由 Semperis 新闻稿确认，新闻稿提到企业级 AD 身份保护。Starbucks 出现在 Semperis 客户页面，但公开案例细节仅限于
              logo 引用和一般范围。Hertz 和 ADP 出现在公司材料中，但没有确认的结果指标。一家未具名美国医疗系统使用 Semperis ADFR 在 30
              分钟以内从勒索软件攻击中恢复——结果很有说服力，但客户未具名限制了独立佐证。一个英国公共部门组织被案例研究引用，用以展示政府基础设施的 AD
              恢复。独立评测平台上，来自医疗、金融服务和关键基础设施具名企业的评论者确认了生产使用。具名客户的整体证据质量为中等：公司制作的案例研究占主导，具体结果主张的独立第三方验证有限，具名客户的留存状态（是否仍为活跃订阅客户）未获确认。六个公开具名客户——Lenovo、United
              Airlines、American Airlines、Starbucks、Hertz、ADP——占公司宣称客户基础不到 1%，限制了具名证据向更广泛装机基础外推的能力。
