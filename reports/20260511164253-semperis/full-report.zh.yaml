  - number: 4
    title: 财务
    sections:
      - number: '4.1'
        title: 收入来源与定价模型
        blocks:
          - type: paragraph
            body: |
              Semperis 采用订阅优先的 SaaS 收入模型，由两项旗舰产品支撑：Directory Services Protector（DSP）和 Active
              Directory Forest Recovery（ADFR）。DSP 按节点或按用户授权，以年度经常性订阅覆盖本地 Active Directory、
              混合 Azure AD（Entra ID）和 Okta 环境。ADFR 按企业 AD 林层级授权，面向需要在数小时而不是数天内完成自动化、
              无恶意软件 AD 恢复的客户。两项产品合计贡献 Semperis $100M+ ARR 基础的绝大多数，但公司尚未披露明确的产品级收入拆分。

              Purple Knight 是 Semperis 的免费 AD 安全评估工具，已获得 75,600+ 次下载，是导向付费 DSP 转化的主要需求生成漏斗。
              Forest Druid 是另一款免费攻击路径分析工具，在 Tier 0 攻击面细分中承担类似功能。这种免费增值到企业付费的
              动作以近乎零增量获客成本创造高质量管线。Lightning IRP（Identity Incident Response Platform）是较新的收入来源，
              面向 AD 专用事件响应项目，把可触达买方从预防扩展到主动响应。

              专业服务包括事件响应预留服务、部署项目和培训，在总收入中占少数。Semperis 委托开展的 Forrester 2024
              Total Economic Impact 研究量化了部署企业的潜在节省，包括停机时间减少 90%、人工监控时间减少 40%。
              这些生产率指标支撑了企业为高价订阅付费的理由。Semperis 不发布公开定价页；所有定价都通过企业直销项目或渠道伙伴报价完成。

              在 January 2025 前两年，UK ARR 增长超过 200%，显示订阅基础的国际扩张很强。连续四年入选 Deloitte Technology
              Fast 500，进一步印证收入增长快速且持续。收入质量高：Active Directory 保护具备任务关键属性，意味着自愿流失低、
              多年期企业合同，以及随着客户 AD 环境扩大而扩张的潜力。主要收入确认风险，是收入转向更多专业服务，从而稀释 ARR 质量；
              但尚未观察到这种转变。
