        - Purple Knight 免费 IOE/IOC 扫描并输出评分报告
        - 数分钟 vs 数周；免费；按优先级排序的修复清单
        - 仅时间点快照；无持续监控
      - - 映射通往 Tier 0 资产的权限提升路径
