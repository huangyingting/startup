      - number: '7.4'
        title: 人员、执行与否决标准
        blocks:
          - type: paragraph
            body: >-
              CEO Mickey Bresman 是 Semperis 面向投资者关系、战略合作和政府互动的主要外部代表。他若离任，会给 IPO 执行、投资人信心和政府部门市场进入带来不确定性。CTO Guy
              Teverovsky 是核心 AD 安全与恢复知识产权的主要技术架构师。技术深度和机构知识集中在这两个角色上，形成显著关键人依赖；标准继任规划只能部分缓释。

              Israel R&D 的地缘政治集中度风险，是运营层面最实质的人员风险。Semperis 工程团队高度集中在 Tel Aviv, Israel。始于 October 2023 且仍在持续的
              Israel-Hamas conflict，已扰乱多家以色列科技公司的运营，包括预备役征召影响工程人手。地缘政治焦虑、美国公司竞争性录用报价，或人身安全担忧驱动的人才流失，可能降低 R&D 速度。业务连续性规划和
              R&D 地域多元化是缓释手段；但如果 Tel Aviv 运营遭遇严重扰动，重建工程能力的时间线至少需要 12 to 24 个月。双总部结构（Parsippany, NJ 和 Tel
              Aviv）带来管理开销、时区协同摩擦和文化整合挑战，在压力下会进一步放大。

              IPO 执行风险是近期论点风险。March 2022 确立的 $1.4B 估值和 2024 的 $125M 增长轮，让投资人期待流动性事件。IPO 准备需要聘请公开市场 CFO、搭建 SOX 合规基础设施、完成
              S-1 文件，并维持足以支撑 IPO 估值的 ARR 增长。若在不利市场窗口过早 IPO，可能形成 down-round，打击员工士气、客户信心和 Semperis
              品牌。下方标准表列出了本章主要风险线的具体监测阈值和论点破坏触发器。投资人应监测 TR005 中的五个阈值，并将两个绝对触发器——持续的 MDI 驱动 NRR 压缩，以及 Semperis
              发生重大安全入侵——视为需要立即重新评估投资论点的事件。
