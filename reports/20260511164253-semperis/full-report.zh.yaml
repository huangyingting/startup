      - number: '4.4'
        title: 公开财务缺口与尽调阻滞点
        blocks:
          - type: paragraph
            body: >
              Semperis
              仍是私营公司，尚未披露承销商和成长股投资人进行精确估值所需的财务指标。以下缺口，是任何试图给出收入倍数或评估资本充足性的投资人面临的主要尽调阻滞点。每一项都具实质性，必须直接取得管理层财务数据、审计报表，或数据室中的详细披露。


              最关键的缺口，是没有毛利率数据。缺少毛利率，就无法判断 $100M+ ARR 的质量、公司的毛利扩张空间，或盈利路径预测是否可信。同等规模的企业 SaaS 公司通常有 70-85% 毛利率，但 Semperis
              的实际收入成本仍未知。


              净收入留存（NRR）和毛收入留存（GRR）同样不可得。若 NRR 高于 120%，说明 $100M+ ARR 基础正在靠追加销售和交叉销售继续扩张，维持 ARR 增长所需的增长资本会下降。若 NRR 低于
              110%，则意味着尽管产品定位为任务关键型，客户流失压力仍然显著，这会构成实质性负面发现。


              客户集中度风险也是未知项。若少数大型企业贡献了不成比例的 ARR，业务就存在从汇总数字中看不出的集中度风险。按产品拆分 DSP、ADFR 和 Lightning IRP 的
              ARR，才能看清哪些产品拉动增长，哪些产品可能接近饱和。


              没有管理账目，烧钱速度和现金跑道无法精确判断。本章的财务估算区间图，为关键财务指标给出有来源支撑的边界；但超过 $100M+ ARR 门槛之外的所有数字，均来自可比公司和推断。从业者社区讨论对 Semperis
              定价提出担忧：相较免费和低成本替代品，它在 SME 细分市场显得昂贵，可能构成潜在竞争风险因素。
