      - number: '8.3'
        title: 可比公司组与市场基准
        blocks:
          - type: paragraph
            body: >-
              六家可比公司支撑 Semperis 估值框架，覆盖公开安全平台、身份领域 M&A，以及私募股权支持的私营 AD 竞争对手。没有单一可比公司是纯粹 ITDR 匹配；该组合的目的，是从不同角度三角定位 ARR 倍数。

              CrowdStrike（CRWD）是主要公开市场锚点：FY2026 ARR 约 $3.95B，对应 $65-75B 企业价值，隐含 16-19x 预期 ARR。CrowdStrike 的 Falcon
              Identity Protection 模块在 ITDR 检测领域与 DSP 竞争，因此它既是竞争对手，也是估值天花板基准。倍数溢价反映了 CrowdStrike 的平台规模和 Falcon 网络效应，而
              Semperis 作为独立供应商无法复制。

              Rubrik（RBRK）是结构上最相似的公开可比：面向企业买方的安全加恢复叙事。FY2025 ARR 约 $825M，April 2024 完成 IPO，估值为 12-15x 往绩 ARR。Rubrik IPO
              提供了最近的数据点，说明公开市场如何给具有强企业客户背书能力、以恢复为锚的安全供应商定价。

              Ping Identity（Thales December 2023 以 $2.8B 收购）确立了身份领域 M&A 的战略收购方基准：收购时约 7-8x ARR。这意味着，如果没有 IPO 溢价，身份平台 M&A
              会按基本 ARR 给 Semperis 估值 $700M-$960M，确认低于 $1.3B 的进入价可获得 M&A 底部价值加 IPO 期权溢价。

              SailPoint（Thoma Bravo 在 April 2022 以 $6.9B 私有化，目标 re-IPO）提供身份治理可比，约为 10-12x ARR。SailPoint
              规模显著更大，但私募股权持有下身份治理倍数压缩具有启示意义：Thoma Bravo 不会出价过高，即使在战略溢价情景下，身份领域倍数也有可见天花板。

              Quest Software（Francisco Partners）和 Netwrix（私募股权支持）是私营 AD 管理与分析竞争对手。Quest 估计 $2-4B EV、$400-600M ARR，隐含
              4-7x 倍数，反映市场对老牌 AD 管理组合的折价。Netwrix 为 $600M-$1B 估值、$100-150M ARR，隐含 5-7x，提供最直接的规模可比基准。鉴于 Semperis 专注
              ITDR、增长更快且有机构投资人背书，它应相对 Quest 和 Netwrix 享有溢价。

              放在整个可比组中，ITDR 类别领导者溢价支持其比私募股权支持的 AD 管理倍数（5-7x）高出 2-3x，同时低于 CrowdStrike 平台倍数（16-19x），从而支撑 8-12x ARR
              的基本情形区间。投资 KPI 评分确认，市场位置和客户证据较强；单位经济和证据质量是中等缺口。
