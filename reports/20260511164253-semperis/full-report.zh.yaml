  - id: TM004
    title: 增长驱动因素与约束表
    enumeration: true
    enumerationScope:
      coverage: partial
      basis: >-
        Enumeration of material demand drivers and adoption constraints for the ITDR and AD security market based on
        CrowdStrike, Verizon DBIR, IBM X-Force, KuppingerCole, Gartner, and Forrester publications retrieved May 2026,
        and CISA/NIST regulatory documents. Macroeconomic budget cycle effects and geopolitical supply-chain risks are
        excluded. Quantification of constraint severity is estimated; no analyst publishes a ranked constraint model for
        ITDR specifically.
    columns:
      - 驱动因素 / 约束
      - 方向
      - 时间
      - 对 Semperis 的影响
      - 尽调问题
    rows:
      - - AD 出现在 >90% 勒索软件攻击目标中；基于身份的攻击同比 +71%（CrowdStrike 2025）
        - 正向驱动
        - 持续 / 结构性（2022–2028+）
        - 为 ITDR 和 AD 恢复制造有证据支撑的迫切需求；这是 Semperis 最强卖点
        - 核实攻击流行度数据仍为最新（2025–2026），且没有因攻击者转向而下降
      - - 美国零信任强制要求：EO 14028、CISA ZT Maturity Model v2、M-21-31 日志要求
        - 正向驱动
        - 2022–2025 年推出；合规周期持续
        - ITDR 联邦采购管线；Semperis 政府垂直行业直接受益
        - 确认 Semperis FedRAMP 授权状态和合同载体覆盖范围
      - - NIS2 指令（EU，2024 年 10 月生效）和 DORA（EU，2025 年 1 月生效）
        - 正向驱动
        - 已生效；2025–2027 年执法爬坡
        - EMEA 需求提速；Semperis 伦敦办公室和 EMEA 销售扩张与该催化因素一致
        - 评估 Semperis EMEA 管线中 NIS2 适用客户案例的广度；建模 NIS2 罚款暴露
      - - 云 / 混合 AD 扩张：Entra ID + 本地 AD 同步使攻击面翻倍
        - 正向驱动
        - 持续结构性（2024–2028）
        - 混合环境要求 Semperis 同时保护 AD 和 Entra ID；产品口径随之扩大
        - 跟踪 Semperis Entra ID 支持路线图；核实云端 ITDR 没有让位给 Microsoft MDI
      - - CMMC 2.0 国防工业基础强制要求（DoD 供应商，2023 年 12 月生效）
        - 正向驱动
        - 报名 / 认证周期进行中；2024–2027
        - 国防承包商为满足 CMMC 采购 ITDR；Semperis FedRAMP 状态重要
        - 测算国防承包商可触达市场；确认 CMMC 评估员要求与 DSP 功能匹配
      - - Microsoft Defender for Identity 捆绑在 M365 E5 中，无增量成本
        - 负向约束
        - 即时 / 结构性竞争威胁
        - Microsoft MDI 提供基础 AD 威胁检测；侵蚀 Microsoft 重度客户中的绿地机会
        - 取得相对 MDI 基线的胜率 / 败率数据；评估 E5 授权账户中的价格压力
      - - CrowdStrike 和 SentinelOne 在端点平台内扩展身份保护
        - 负向约束
        - 加速（2024–2026）
        - 平台厂商把轻量 ITDR 捆进端点 SKU，挤压 Semperis 的先落地再扩张打法
        - 量化相对 CrowdStrike Falcon Identity Protection 的胜率；跟踪 CrowdStrike ITDR 能力路线图
      - - 企业预算整合压缩单点解决方案支出
        - 负向约束
        - 周期性 / 中等（2024–2026）
        - CISO 面临供应商精简压力，可能更偏好捆绑平台而非独立 ITDR
        - 分析 Semperis NRR 和流失数据；评估 Semperis 因整合而输单的频率，与因竞争对手输单区分
      - - ITDR 市场 2022 年才被定义——买方教育滞后，品类仍不成熟
        - 负向约束
        - 2022–2026（随品类成熟而减弱）
        - Semperis 必须投入需求生成；绿地账户销售周期被拉长
        - 量化平均销售周期，并跟踪同比趋势，作为品类成熟度代理指标
      - - 安全技能短缺——买方组织缺少 AD 安全专长
        - 混合 / 不确定
        - 结构性（2023–2028+）
        - 技能缺口推高对自动化工具的需求（正向），也推高对宽口径 MSSP/MDR 平台的需求（负向）
        - 评估 Semperis MSP 渠道计划是否有效抓住技能短缺的中型市场买方
    notes: 驱动因素 / 约束的严重程度评级是基于分析师评论和可得攻击统计的定性评估。没有分析师发布针对 ITDR 市场的排序约束模型。宏观经济影响（利率、IT 预算冻结）未纳入。
