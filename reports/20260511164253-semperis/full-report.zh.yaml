      - number: '2.3'
        title: 细分市场与买方分析——谁购买 ITDR，为什么
        blocks:
          - type: paragraph
            body: >-
              ITDR 与 AD 安全采购集中在三类主要买方原型上，差异来自组织规模、监管暴露和技术成熟度。大型企业（10,000 名员工 以上）中，主要买方是 CISO 或安全副总裁；身份架构团队影响力很强，CIO
              负责签核。预算来自安全运营或身份基础设施科目。 这一细分最常见的采用触发点，是数据泄露或险情后的事后强制要求，其后是董事会层面对网络韧性框架的压力。金融服务、 医疗和关键基础设施主导大型企业 ITDR 支出。

              在中端市场（2,000–10,000 名员工），买方通常是向 CTO 或 CIO 汇报的 IT 安全总监或 IT 总监。 预算归属由 IT
              运营与安全共同承担，采购触发更多来自合规要求（CMMC、HIPAA、PCI-DSS 补充控制、欧洲组织的 NIS2）， 而不是实际被攻破经历。基于已披露赢单模式，这一细分是 Semperis 增长最快的市场。

              政府和国防买方销售周期更长（12–24 个月），但单笔交易价值更高、留存更强。CISA 的 SCuBA 指南与 M-21-31 联邦备忘录，在联邦民事机构中创造了合规驱动需求。美国国防部的 CMMC 2.0
              强制要求催化了 10,000+ 名员工层级国防工业基础承包商的需求。服务中端市场客户的托管服务提供商（MSPs） 是重要间接渠道——Semperis 在 2024 披露了 MSP 伙伴计划，MSP
              采用可在没有直接销售成本的情况下创造经常性收入。

              医疗行业的特点是紧迫性高（针对医院 AD 的勒索软件攻击已多次扰乱临床运营，包括 early 2024 的 Change Healthcare 事件）、 承担 HIPAA 监管义务，且 IT
              安全投入通常不足——因此 ITDR 的 ROI 论证很有说服力。关键基础设施（能源、公用事业、水务） 是一个正在兴起的买方细分，在 CISA 公告和 TSA 指令推动下加速。

              地域集中度：北美约占 ITDR 支出 50%；欧洲占 30%（在 NIS2 下加速）；APAC 占 15% （监管推动有限的增长市场）。Semperis 已披露 EMEA 扩张是战略重点，并在 2024
              开设伦敦办公室。
