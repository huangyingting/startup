        - DSP 一键自动回滚特定对象 / 属性
        - 定向修复从数小时缩至数分钟
        - 回滚范围限于 AD 对象；不覆盖 OS 或应用层
      - - 勒索软件后恢复 AD 林
        - 手工重建 AD 林；BMR 恢复有重新引入恶意软件风险
        - ADFR 在干净硬件上自动恢复无恶意软件 AD 林
        - 相比手工恢复最高快 90%；不会重新引入恶意软件
        - 缺少 90% 主张的第三方验证
      - - 快速评估 AD 安全态势
