      - number: '6.5'
        title: 先落地后扩张、集中度风险与渠道依赖
        blocks:
          - type: paragraph
            body: >-
              Semperis 的先落地后扩张策略沿三条主线推进：产品交叉销售（DSP 客户增加 ADFR 或 Lightning IRP）、林覆盖扩张（现有企业账户在成长或并购后增加更多 AD
              林），以及全球企业客户内部的地域扩张。从 DSP 威胁检测自然扩展到 ADFR
              恢复，是组合中价值最高的交叉销售——它增加了一个实质上不同的用例，预算所有者也不同（业务连续性，而不只是安全运营），转换成本更高。对大型企业账户，ADFR 通常会给年合同价值增加
              $200K–$400K，构成每客户有意义的追加销售。该动作带来的扩张收入未单独披露，因此先落地后扩张论点的健康度仍不确定。最重要的集中度风险来自对大型企业账户的依赖：考虑到 Semperis 报告其 2024
              Series C 估值约为 $1.3–1.5B，以及企业基础设施公司的典型 ARR 倍数，前 20 大账户很可能贡献超过 30% 的
              ARR——这是该阶段企业安全供应商常见的集中度画像。若主要经销商贡献了不成比例的新客户获取，通过 VAR 和 MSP 伙伴形成的渠道依赖会引入第二层集中度风险。单一产品客户——仅使用 DSP 或仅使用 ADFR
              的客户——因转换成本更低，是更脆弱的留存细分。尚未有任何客户被公开识别为超过 10% ARR，但缺少披露限制了尽调可见度。北美约 60% 的地域集中度，压缩了公司在高增长 EMEA 和 APAC
              企业安全市场的扩张叙事。
