      - number: '8.2'
        title: 估值框架与情景
        blocks:
          - type: paragraph
            body: >-
              Semperis 最适合用 ARR 倍数估值，因为它是一家高增长 SaaS 公司，未公开披露 EBITDA 利润率或自由现金流画像。early 2026 的 ARR 为 $100-120M（由 January
              2025 已确认里程碑，以及从披露里程碑推断的 40-60% YoY 增长轨迹估算），为估值区间提供锚点。倍数选择参考三类基准：CrowdStrike 公开市场估值约 16-19x 预期
              ARR，作为安全平台天花板；Rubrik IPO 先例为 12-15x 往绩 ARR，代表安全加恢复叙事；SailPoint 为 10-12x、Ping Identity 为 7-8x，作为身份领域 M&A
              可比。网络安全 SaaS 倍数已从 2022 峰值（20-30x ARR）压缩到 2026（成长阶段私营公司 8-15x ARR）；这是结构性现实，任何进入价格都必须折现。

              牛市情景（20% 概率信号）：在 ITDR 市场加速、AI 身份安全需求和 Entra ID 扩展成功的带动下，ARR 达到 $150-180M。按 12-18x ARR，隐含 EV 为 $1.8-3.2B，体现
              IPO 前溢价。关键上行情形假设包括 NRR 高于 120%、通过 FedRAMP High 授权扩展联邦 ARR，以及 CrowdStrike 继续作为互补平台伙伴，而不是正面 ITDR 竞争对手。

              基本情景（55% 概率信号）：ARR 达到 $110-130M，按 8-12x ARR，对应隐含 EV 为 $880M-$1.56B。该情景假设增长温和延续，DSP 续约率高于 80%，且在 ADFR
              差异化最有说服力的企业层级，Microsoft MDI 竞争可控。June 2024 增长轮（$1B+ 估值）所反映的当前市场条件，支撑了基本情形底部。

              熊市情景（25% 概率信号）：Microsoft MDI 捆绑推动 DSP 出现实质替代，ARR 增长放缓到低于 20%，ARR 达到 $80-100M。按 5-7x ARR，隐含 EV 为
              $400-700M，低于 June 2024 轮的 $1B+ 估值，意味着 down-round 情景。触发因素包括 DSP 续约率下滑、联邦客户流失，或 Insight Partners
              在市场周期不利时点被迫退出。

              估值敏感性显示，在基本 ARR 假设下，ARR 倍数每增加 2x，EV 增加 $200-300M。进入价守在 $1.3B 或以下，既能捕捉牛市情景的显著上行，又能相对熊市底部提供 30-40%
              下行缓冲，从而支持带保护性结构要求的 BUY 论点。
