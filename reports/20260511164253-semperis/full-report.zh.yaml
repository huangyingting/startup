        - 反向论点
        - G2 评价提到定价摩擦；Semperis 博客确认 E5 捆绑 MDI；MDI 缺少 ADFR 功能，但覆盖核心检测
        - DSP 续约率连续 3+ 年稳定在 85% 以上；Semperis 披露 NRR > 110%
      - - 5–10 年周期内云身份（Entra ID）采用加速，AD 市场收缩
        - 反向论点
        - Microsoft 365 纯云推进已有记录；Semperis Entra ID 安全博客显示产品投入，但尚非主要收入驱动
