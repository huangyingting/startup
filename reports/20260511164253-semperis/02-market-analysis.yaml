callouts:
  - calloutType: risk
    title: "Microsoft MDI Bundling Is the Primary TAM Erosion Risk"
    body: >-
      Microsoft Defender for Identity is included in the Microsoft 365 E5 license — the license tier
      already held by Semperis' core enterprise buyer base. MDI provides real-time AD threat detection,
      pass-the-hash and DCSync alerts, and lateral movement visualization at zero incremental cost.
      Any investor model that does not explicitly account for the MDI baseline in greenfield accounts
      will overstate Semperis' displacement opportunity. The critical diligence question is: in what
      percentage of Semperis' wins is MDI already deployed and insufficient, versus cases where MDI
      had not been configured? This data — win/loss analysis with MDI context — should be requested
      in management sessions.
    claimRefs:
      - CM023
      - CM035

