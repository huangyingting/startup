chapter:
  number: 2
  title: Market Analysis
  summary: >
    Semperis competes at the intersection of Identity Security and Active Directory (AD) defense —
    specifically in the Identity Threat Detection and Response (ITDR) category coined by Gartner in 2022
    and the adjacent AD backup/recovery and hardening sub-market. The ITDR total addressable market
    is estimated at $2.8–5.0B globally in 2026 across multiple analyst lenses, growing at 17–26% CAGR
    through 2030, driven by AD's role as the primary lateral-movement path in ransomware attacks,
    expanding Zero Trust regulatory mandates, NIS2/DORA obligations in Europe, and cloud identity
    proliferation (Entra ID) enlarging the hybrid-AD attack surface. Semperis' serviceable addressable
    market — enterprise AD security, ITDR, and AD disaster recovery in organizations above 2,000 employees
    — is estimated at $1.8–2.8B. Material headwinds include Microsoft's bundled Defender for Identity,
    consolidation pressure from broad platform vendors (CrowdStrike, SentinelOne), and the early-stage
    buyer education challenge inherent in a market defined only since 2022. The SOM at a 3-year horizon
    is estimated at $350–650M, implying meaningful room above Semperis' current $100M+ ARR.

sections:
  - id: market-definition
    title: "Market Boundary — Identity Security, ITDR, and AD Hardening"
    body: >-
      The identity security market encompasses tools and platforms that discover, protect, detect threats
      in, and recover compromised identity systems — primarily Microsoft Active Directory (on-premises),
      Microsoft Entra ID (cloud/hybrid), and adjacent identity stores including LDAP directories and
      Okta/Ping identity fabrics. Gartner formally introduced "Identity Threat Detection and Response"
      (ITDR) as an emerging security category in its 2022 IAM Hype Cycle, recognizing that attackers
      have shifted from endpoint-focused intrusions to identity-centric lateral movement.

      The market boundary most relevant to Semperis encompasses three interlocking sub-segments. First,
      AD Security and Hardening includes tools that continuously assess and harden AD configurations,
      detect misconfigurations, and identify attack paths — Semperis Purple Knight and Forest Druid
      sit here. Second, ITDR for AD and Hybrid Identity includes real-time detection and automated
      response to identity-based attacks including pass-the-hash, DCSync, Kerberoasting, and
      password spraying — Semperis Directory Services Protector (DSP) is the flagship product in this
      layer. Third, AD Disaster Recovery and Cyber Resilience covers purpose-built backup, forensic
      rollback, and full-forest recovery from ransomware — Semperis Active Directory Forest Recovery
      (ADFR) is the primary solution. No other vendor competes across all three sub-segments at
      enterprise scale.

      Adjacent markets that are typically excluded from Semperis' direct TAM but represent substitution
      risk include: Privileged Access Management (PAM, e.g., CyberArk, BeyondTrust), which controls
      privileged account usage but does not perform real-time AD threat detection; Identity Governance
      and Administration (IGA), which manages the access lifecycle but lacks attack-detection capability;
      broader SIEM/SOAR platforms that ingest AD telemetry as one data source among many; and Cloud
      Infrastructure Entitlement Management (CIEM), which focuses on cloud resource permissions rather
      than on-premises directory security. Microsoft's own tools — Defender for Identity (MDI) and
      Entra ID Protection — represent the primary included-market substitutes that Semperis must
      displace or complement.

      The global installed base of Active Directory is estimated at more than 95% of Fortune 500
      enterprises and 90%+ of organizations above 1,000 employees globally, making AD persistence
      effectively co-extensive with enterprise identity infrastructure. This breadth of installed base
      means Semperis' TAM shares the same geographic and vertical distribution as enterprise IT spend
      more broadly — concentrated in North America (45–55%), Europe (25–35%), and APAC (15–20%).
