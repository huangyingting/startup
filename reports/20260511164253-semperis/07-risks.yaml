  evidenceGaps:
    - type: enumeration-incomplete
      severity: material
      topic: regulatory-legal-risk-register
      missingEvidence: >-
        Complete enumeration of any undisclosed regulatory investigations, pre-litigation dispute notices, or
        in-camera regulatory proceedings involving Semperis across US, EU, and Israel jurisdictions; private
        correspondence with EU data protection authorities (DPAs) is not captured in public records.
      whyItMatters: >-
        Undisclosed regulatory or litigation matters could materially affect Semperis valuation, government
        contract eligibility, and GDPR compliance posture in ways not reflected in the partial enumeration
        in TR001; GDPR DPA enforcement actions in particular can move quickly.
      diligencePath: >-
        Request from Semperis management a complete regulatory and litigation register including matters not
        meeting public disclosure thresholds; engage independent legal counsel to conduct EU DPA correspondence
        review and US court record search (PACER) for Semperis-named matters.
      relatedTableRefs:
        - TR001

    - type: private-evidence-only
      severity: material
      topic: financial-risk-burn-rate
      missingEvidence: >-
        Semperis's current cash burn rate, cash position, and detailed covenant terms for the June 2024
        $125M Hercules Capital / J.P. Morgan growth debt facility; no public disclosure of burn rate, interest
        rate, minimum ARR covenant, or maturity date.
      whyItMatters: >-
        Without burn rate and covenant detail, it is impossible to assess runway duration, covenant-breach
        probability under ARR deceleration scenarios, or how constrained Semperis's operating flexibility
        is in the 12–18 months before a planned IPO.
      diligencePath: >-
        Request term sheet or loan agreement summary from Semperis CFO covering principal, interest rate,
        maturity, minimum ARR covenant threshold, maximum leverage covenant, and any springing covenants.
      relatedQuestionRefs:
        - QR007

    - type: private-evidence-only
      severity: material
      topic: israel-rd-continuity-plan
      missingEvidence: >-
        Semperis has not publicly disclosed a business continuity plan for Israel R&D operations, IDF
        reservist mobilization protocols, or engineering redundancy plan for sustained regional conflict
        scenarios affecting the Tel Aviv development center.
      whyItMatters: >-
        Without a verified continuity plan, the potential for Israel R&D disruption to delay the Entra ID
        and cloud ITDR roadmap cannot be assessed; a 6-month engineering delay at a competitive inflection
        point could allow CrowdStrike to close the AD security capability gap.
      diligencePath: >-
        Request Israel R&D business continuity plan, IDF reserve obligation percentage of engineering
        headcount, geographic redundancy plan (US / EMEA backup engineering capacity), and engineering
        headcount impact report from the October 2023 conflict period.
      relatedQuestionRefs:
        - QR014

    - type: missing-source
      severity: material
      topic: customer-arr-concentration
      missingEvidence: >-
        Semperis has not disclosed top-customer ARR concentration, NRR, gross churn, or top-10/20 account
        ARR share; without these metrics, the customer concentration risk cannot be quantified, and the
        revenue-cliff scenario for large-enterprise churn cannot be modeled.
      whyItMatters: >-
        High ARR concentration (e.g., top-20 accounts >30% of total ARR) would create a material revenue-cliff
        risk if even one large account churns to Microsoft MDI following Microsoft's E5 bundling expansion;
        this risk is unquantifiable without concentration data.
      diligencePath: >-
        Request top-20 customer ARR concentration report, NRR by cohort, gross churn rate, and average
        contract duration from Semperis CFO; cross-reference with customer reference interviews.
      relatedQuestionRefs:
        - QR020
        - QR025

    - type: private-evidence-only
      severity: minor
      topic: gdpr-dpa-compliance-mechanism
      missingEvidence: >-
        Semperis's actual Data Processing Agreement (DPA) template for EU customers and the specific
        technical/organizational measures Semperis employs as a data processor under GDPR Article 28;
        public compliance page indicates certifications exist but DPA terms are not public.
      whyItMatters: >-
        GDPR Article 28 compliance depends on contractual specifics (DPA scope, sub-processor disclosure,
        data transfer mechanism under SCCs or adequacy decision) that cannot be assessed from the compliance
        page alone; specific gaps in DPA terms could create enforcement exposure.
      diligencePath: >-
        Request Semperis standard EU DPA template and list of sub-processors; confirm SCCs or other GDPR
        transfer mechanism for Israel-US-EU data flows; confirm no pending EU DPA investigations.
      relatedQuestionRefs:
        - QR028

    - type: missing-source
      severity: minor
      topic: israel-rd-post-conflict-status
      missingEvidence: >-
        No public disclosure by Semperis of Israel R&D headcount impact, engineering output, or operational
        continuity measures following the October 2023 Hamas attack and subsequent 2024–2025 IDF mobilization;
        Israel Innovation Authority annual report data covers sector-wide impacts but not Semperis specifically.
      whyItMatters: >-
        If Israel R&D was already impaired during 2024–2025 without public disclosure, the roadmap delays
        may be masked in public communications; confirmed headcount resilience would significantly reduce
        this risk factor.
      diligencePath: >-
        Request Israel R&D headcount data for October 2023–May 2026 (pre-conflict vs. post-conflict);
        ask for specific engineering milestones delayed or accelerated in response to conflict; verify
        with Israel Innovation Authority sector data on reservist mobilization rates.
      relatedQuestionRefs:
        - QR030

