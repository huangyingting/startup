  evidenceGaps:
    - id: EGR001
      description: >-
        Semperis has not publicly disclosed any pending litigation, regulatory investigations, formal
        export control reviews, or enforcement proceedings. Absence of public disclosure does not confirm
        absence of risk; private regulatory correspondence, sealed litigation, and informal BIS inquiries
        would not appear in public records. The regulatory-legal risk register reflects only confirmed
        in-force obligations and is therefore a partial enumeration of the true legal risk landscape.
        Any undisclosed proceedings would materially affect the severity of TR001.
      type: enumeration-incomplete
      relatedQuestionRefs:
        - QR004
        - QR014
        - QR022
      relatedTableRefs:
        - TR001

    - id: EGR002
      description: >-
        The operational and financial impact of the Israel-Hamas conflict on Semperis's Tel Aviv R&D
        center is not publicly quantified. Headcount changes, military reservist call-ups affecting
        engineering velocity, talent attrition data, and office operational status are not disclosed in
        any public Semperis communications or investor materials as of the research date. This gap
        prevents independent verification of the Israel geopolitical risk severity assigned in TR004.
      type: private-evidence-only
      relatedQuestionRefs:
        - QR020
        - QR025

    - id: EGR003
      description: >-
        Semperis's debt covenant terms with Hercules Capital in the $125M June 2024 growth round are
        not publicly disclosed. Standard BDC loan covenant structures for companies at Semperis's revenue
        stage typically include minimum ARR growth rates, liquidity ratios, and EBITDA floors, but the
        specific terms cannot be independently assessed without due diligence access to the loan agreement.
        This gap prevents quantification of the covenant breach probability in TR003.
      type: missing-source
      relatedQuestionRefs:
        - QR009
        - QR015
        - QR033
        - QR034
        - QR035

    - id: EGR004
      description: >-
        Semperis has not publicly disclosed internal metrics, board reporting thresholds, or management
        monitoring frameworks for tracking MDI competitive displacement risk or export control compliance
        benchmarking against peers. Competitor export control postures (Quest Software, Netwrix) are also
        not publicly documented. These gaps prevent independent verification of the monitoring indicator
        thresholds documented in TR005.
      type: missing-source
      relatedQuestionRefs:
        - QR030
        - QR031
