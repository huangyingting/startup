  - id: Isr-S04
    title: People, Execution, and Kill Criteria
    body: >-
      CEO Mickey Bresman is Semperis's primary external face for investor relations, strategic
      partnerships, and government engagement. His departure would create uncertainty around IPO
      execution, investor confidence, and the government sector go-to-market. CTO Guy Teverovsky
      is the principal technical architect of the core AD security and recovery intellectual property.
      The combination of technical depth and institutional knowledge concentrated in these two roles
      creates significant key-person dependency that standard succession planning only partially
      mitigates.

      The Israel R&D geopolitical concentration risk is the most operationally material people risk.
      Semperis's engineering team is heavily concentrated in Tel Aviv, Israel. The ongoing Israel-Hamas
      conflict beginning in October 2023 has disrupted technology sector operations for multiple Israeli
      companies, including military reservist call-ups affecting engineering headcount. Talent attrition
      driven by geopolitical anxiety, competitive offers from US-based companies, or physical security
      concerns could reduce R&D velocity. Business continuity planning and geographic diversification of
      R&D are mitigations, but the timeline to rebuild engineering capacity if Tel Aviv operations are
      severely disrupted is 12 to 24 months minimum. The dual headquarters structure (Parsippany, NJ
      and Tel Aviv) creates management overhead, timezone coordination friction, and cultural integration
      challenges that compound under stress.

      IPO execution risk is a near-term thesis risk. The $1.4B valuation established in March 2022 and
      the $125M growth round in 2024 create investor expectations for a liquidity event. IPO preparation
      requires hiring a public-market CFO, engaging SOX compliance infrastructure, completing an S-1
      filing, and sustaining ARR growth sufficient to justify IPO valuation. A premature IPO in an adverse
      market window could produce a down-round that damages employee morale, customer confidence, and the
      Semperis brand. The criteria table below identifies specific monitoring thresholds and thesis-break
      triggers for the primary risk vectors documented in this chapter. Investors should monitor the five
      thresholds in TR005 and treat two absolute triggers — sustained MDI-driven NRR compression and a
      material Semperis security breach — as immediate thesis re-evaluation events.
    claimRefs:
