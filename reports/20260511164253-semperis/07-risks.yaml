      Semperis's customer segment and analyst market data. Israel geopolitical risk likelihood is set to
      Medium based on ongoing regional conflict as of May 2026. All severity ratings bias toward higher
      severity under uncertainty.
    claimRefs:
      - CR011
      - CR014
      - CR017
      - CR032
      - CR035

  - id: FR002
    title: "Risk transmission map"
    type: dag
    layout: wide
    summary: >-
      Directed acyclic graph showing how primary risk events propagate to investment-relevant outcomes
      at Semperis. Microsoft MDI bundling and FedRAMP authorization lapse both flow through ARR compression
      to eventual valuation multiple compression. Semperis software compromise flows through customer trust
      erosion to valuation impact and IPO disruption. Control nodes partially intercept specific risk
      vectors. All paths ultimately converge on IPO delay or disruption as the investor exit risk outcome.
    data:
      nodes:
        - id: risk-microsoft
          label: "Microsoft MDI Bundling"
          detail: "Free MDI in M365 E5 displaces DSP at renewal; most probable ARR compression vector for
            Semperis enterprise segment"
          type: risk
        - id: risk-security-breach
          label: "Semperis Software Compromise"
          detail: "Agent deployed on domain controllers; supply-chain compromise would enable catastrophic
            customer AD access and produce regulatory liability and brand destruction"
          type: risk
        - id: risk-export-control
          label: "EAR/ITAR Export Exposure"
          detail: "Israel-US dual operations; cybersecurity dual-use technology classification; US federal
            customer base creates ITAR sensitivity for classified data handling scenarios"
          type: risk
        - id: risk-fedramp
          label: "FedRAMP Authorization Lapse"
          detail: "Loss of FedRAMP Moderate authorization eliminates civilian federal procurement eligibility;
            government ARR at risk; High authorization gap limits DoD and IC revenue"
          type: risk
        - id: risk-israel
          label: "Israel R&D Geopolitical Risk"
          detail: "Majority engineering concentrated in Tel Aviv; sustained conflict-driven disruption
            impairs product delivery velocity and roadmap execution for all Semperis products"
          type: risk
        - id: impact-arr
          label: "ARR Compression"
          detail: "Renewal losses from Microsoft bundling, FedRAMP lapse, or platform consolidation reduce
            topline growth rate below investor expectations and IPO comparables"
          type: impact
        - id: impact-trust
          label: "Customer Trust Erosion"
          detail: "Security vendor breach or regulatory enforcement action damages brand credibility in
            enterprise identity security market; customer churn accelerates on renewals"
          type: impact
        - id: impact-valuation
          label: "Valuation Multiple Compression"
          detail: "Revenue growth deceleration and trust erosion compress ITDR multiples toward commodity
            infrastructure levels; IPO pricing window narrows"
          type: impact
        - id: impact-ipo
          label: "IPO Delay or Disruption"
          detail: "Material regulatory action, breach, revenue miss, or R&D disruption forces IPO delay or
            down-round; Insight Partners exit pressure increases with each delay cycle"
          type: impact
        - id: control-fedramp
          label: "FedRAMP Compliance Controls"
          detail: "Existing Moderate authorization actively maintained; High authorization process to be
            initiated; annual assessment calendar managed by dedicated compliance team"
          type: control
        - id: control-sdlc
          label: "Secure SDLC and Code Signing"
          detail: "SOC 2 Type II attestation; code signing pipeline; security trust center program; partially
            intercepts supply-chain compromise risk vector but cannot eliminate it"
          type: control
      edges:
        - from: risk-microsoft
          to: impact-arr
          label: "MDI displaces DSP at renewal"
        - from: risk-fedramp
          to: impact-arr
          label: "FedRAMP lapse eliminates federal revenue"
        - from: risk-israel
          to: impact-arr
          label: "R&D disruption delays product delivery"
        - from: risk-security-breach
          to: impact-trust
          label: "Breach destroys brand credibility"
        - from: risk-export-control
          to: impact-trust
          label: "Enforcement action damages customer confidence"
        - from: impact-arr
          to: impact-valuation
          label: "Growth deceleration compresses multiples"
        - from: impact-trust
          to: impact-valuation
          label: "Trust erosion reduces pricing power"
        - from: impact-valuation
          to: impact-ipo
          label: "Multiple compression narrows IPO window"
        - from: control-fedramp
          to: risk-fedramp
          label: "Compliance controls reduce lapse risk"
        - from: control-sdlc
          to: risk-security-breach
          label: "Secure SDLC partially intercepts compromise"
    approximationNotes: >-
      DAG edges are implied by causal logic documented in section prose; exact causal weights are
      judgment-based. All five primary risk nodes can independently trigger valuation multiple compression;
      the most likely transmission path is Microsoft MDI to ARR compression to valuation compression to
      IPO delay.
    claimRefs:
      - CR012
      - CR016
      - CR024
      - CR039

  - id: FR003
    title: "Dependency map"
    type: dag
    layout: wide
    summary: >-
      Dependency map showing critical inputs to the Semperis platform and the customer segments it serves.
      Microsoft Active Directory is the foundational platform dependency. Investor dependencies (Insight
      Partners, J.P. Morgan and Hercules Capital) govern capital availability and exit timing. The FedRAMP
      Authorization Body controls access to the US federal customer segment. The Israel R&D Center provides
      engineering capacity. OEM partner Cohesity provides amplified distribution to data infrastructure
      buyers.
