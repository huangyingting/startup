  - id: Isr-S03
    title: Partner, Dependency, and Financial Risks
    body: >-
      Semperis's most fundamental dependency risk is Microsoft Active Directory itself. The entire Semperis
      product portfolio — DSP, ADFR, Purple Knight, and Forest Druid — derives its value from the existence
      and prevalence of Microsoft AD as the enterprise identity fabric. Microsoft controls this platform,
      sets its security architecture roadmap, and can choose to expand native AD security and recovery
      capabilities at any time. The OEM partnership with Cohesity for Cohesity Identity Resilience powered
      by Semperis technology amplifies distribution but also creates a partner who could build competing
      native capabilities if the commercial terms deteriorate.

      The Insight Partners investor concentration risk is the primary financial governance risk. Insight
      Partners led multiple Semperis funding rounds and retains significant board influence over capital
      allocation strategy, executive hiring, and exit timing. Insight's broad enterprise software portfolio
      creates potential conflicts of interest when portfolio companies compete in adjacent markets. The $125M
      growth round in June 2024 led by J.P. Morgan Asset Management with Hercules Capital participation
      added a debt financing component. Hercules Capital is a specialty BDC lender whose portfolio company
      loans typically include financial maintenance covenants including minimum ARR growth rates, liquidity
      ratios, or EBITDA thresholds. A covenant breach at an adverse point in the business cycle could force
      an operational restructuring or premature exit. The specific covenant terms are not publicly disclosed,
      making independent assessment of this risk impossible without due diligence access to the loan
      agreement.

      Channel and MSSP reseller concentration represents a revenue distribution risk. Semperis routes a
      material portion of mid-enterprise ARR through MSSP and value-added reseller partners. Loss of a key
      reseller relationship — whether from competitive displacement, reseller acquisition, or Semperis
      pricing changes — can produce revenue step-downs in the affected segment without an immediately
      available direct replacement. Thales's 2022 acquisition of Ping Identity for $2.3B illustrates how
      large strategic acquirers reshape the identity vendor landscape through consolidation, potentially
      creating well-funded new competitors who were previously smaller independent players.
