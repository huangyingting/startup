chapter:
  number: 7
  title: Risk Register
  summary: >
    Semperis carries a risk profile shaped by three apex exposures as of May 2026: structural
    platform dependency on Microsoft Active Directory and Entra ID (an existential single-vendor
    risk), the dual geopolitical and people risk from its Israel-concentrated R&D center amid
    ongoing regional conflict, and the competitive threat from Microsoft M365 E5 bundling Defender
    for Identity at zero incremental cost. The June 2024 $125M growth financing from J.P. Morgan
    Asset Management and Hercules Capital adds financial covenant obligations. Regulatory exposure
    is real but bounded: GDPR data-processor obligations scale with EU customer count, export-control
    (EAR) compliance governs Israel-developed cryptographic software, and FedRAMP authorization
    remains at Moderate, capping federal revenue until High is achieved. The most catastrophic but
    low-probability risk is a security breach at Semperis itself — an identity-security-vendor breach
    would produce disproportionate brand destruction. Mitigations exist for every top risk; thesis-break
    triggers center on Microsoft expanding native AD recovery capability, a Semperis platform breach,
    or material Israel R&D disruption.
sections:
  - id: Isr-S01
    title: Regulatory and Legal Risk
    body: >-
      Semperis operates in a heavily regulated environment where four distinct regulatory risk vectors
      create cumulative compliance obligations. The most material is GDPR and UK GDPR liability: Semperis
      processes Active Directory directory data for EU-based and UK-based enterprise customers. AD objects
      contain personal data as defined by GDPR Article 4(1) — full names, email addresses, phone numbers,
      job titles, and organizational membership — meaning Semperis acts as a data processor requiring a
      compliant Data Processing Agreement with each EU/UK customer under Article 28. Non-compliance fines
      can reach 4% of global annual turnover or twenty million euros per violation, whichever is greater.
      With Semperis approaching $100M+ ARR and EU customers representing a material share of enterprise
      accounts, the aggregate fine exposure is structurally significant. The ICO has confirmed that UK GDPR
      applies post-Brexit as a parallel regime, creating dual compliance obligations for the same customer
      data in many cases.

      Export control compliance under the US Export Administration Regulations (EAR Part 730 et seq.) is a
      second distinct vector. Semperis operates an R&D center in Tel Aviv, Israel, developing cryptographic
      security software including Active Directory encryption key handling, Kerberos golden ticket detection,
      and cryptographic backup verification. EAR classifies dual-use cybersecurity software; license
      exceptions are required for commercial export of encryption items. An export compliance failure could
      result in fines up to $1M per violation, debarment from US government contracting, and license
      revocation. The combination of Israeli company origin, US federal customer base, and cryptographic
      technology scope creates heightened ITAR sensitivity for any classified federal data processed.

      FedRAMP authorization is a third regulatory risk: Semperis holds FedRAMP Moderate authorization for
      Directory Services Protector per the FedRAMP marketplace, but has not achieved FedRAMP High
      authorization, which limits addressable revenue from sensitive federal civilian agencies and DoD
      where High authorization is required. The authorization gap creates a ceiling on federal revenue
      until High is achieved, typically a 12 to 24 month process. The SEC Cybersecurity Disclosure Rule
      (Reg S-K Item 106, effective December 2023) requires public companies to disclose material
      cybersecurity incidents within four business days; as a provider to public company customers, any
      AD incident at a Semperis customer deemed material may implicate the vendor relationship. Upon
      Semperis's eventual IPO, the company itself becomes subject to all Form 8-K and annual report
      cybersecurity disclosure obligations. CIRCIA mandatory reporting rules create additional indirect
      compliance obligations as critical infrastructure customers must report incidents to CISA, potentially
      naming Semperis as a technology vendor in the affected environment.
