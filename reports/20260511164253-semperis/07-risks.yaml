chapter:
  number: 7
  title: Risks
  summary: >
    Semperis faces a concentrated risk profile anchored by three apex exposures as of May 2026: structural
    dependency on Microsoft AD and Entra ID APIs (an existential single-vendor dependency), the dual
    geopolitical and people risk from its ~150-engineer Israel R&D center operating amid ongoing regional
    conflict, and the competitive commoditization threat from Microsoft M365 E5 bundling Defender for
    Identity at zero incremental cost. A June 2024 $125M growth financing from J.P. Morgan and Hercules
    Capital adds financial covenant obligations to the risk register. Regulatory exposure is real but
    bounded: GDPR data-processor obligations scale with EU customer count, export-control (EAR) compliance
    is required for Israel-developed cryptographic software, and FedRAMP authorization remains at the
    Moderate level, ceiling federal civilian revenue until High is achieved. The most catastrophic but
    low-probability risk is a security breach at Semperis itself — an identity security vendor breach would
    produce disproportionate brand destruction. Mitigations exist for every top risk; the strongest
    mitigation is the ADFR product moat (switching costs) and the weakest is export-control compliance
    documentation, which is not publicly verified. Thesis-break triggers center on Microsoft expanding
    native AD recovery capability, a Semperis platform breach, or material Israel R&D disruption.

