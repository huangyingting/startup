  - id: operational-security-risks
    title: Operational and Security Risks
    body: >-
      Semperis's most catastrophic operational risk is a cybersecurity breach of its own platform and
      customer-facing infrastructure. Semperis is an identity security vendor that holds real-time access
      to customer Active Directory environments and hosts forensically clean AD backup copies. A breach of
      Semperis's own systems would expose some of the most sensitive enterprise directory data in existence,
      enabling attackers to compromise customer AD environments at scale. Precedents from peer cybersecurity
      vendors — SolarWinds (2020 supply-chain backdoor), Okta (2022 Lapsus$ breach and 2023 HAL breach
      affecting 5,000 customers), and CrowdStrike (2024 Falcon sensor update causing global outage) —
      demonstrate that identity and endpoint security vendors are high-value attack targets and that breach
      events produce catastrophic reputational and customer-loss outcomes. Semperis's identity security
      market position makes a breach disproportionately damaging relative to the base rate of enterprise
      software breaches. No publicly disclosed security incidents at Semperis have been identified through
      BleepingComputer, Dark Reading, or court record searches as of May 2026.

      The second major operational risk is Microsoft Active Directory and Entra ID API dependency. Semperis
      Directory Services Protector uses AD replication metadata (DRSReplicaSync-based change detection) to
      monitor directory changes in real time. Semperis ADFR uses AD backup APIs and Volume Shadow Copy
      Service integration for forensically clean backup creation. Microsoft has historically changed AD
      replication protocols, Entra ID REST API endpoints, and authentication flows with varying advance
      notice. An undocumented API deprecation or breaking change could impair DSP change detection or ADFR
      backup functionality within a short remediation window, creating a critical product incident.

      SaaS platform reliability presents a third operational risk. Enterprise customers with active Semperis
      deployments expect 99.9%+ uptime; real-time AD protection requires continuous sensor operation. Extended
      platform outages during active threat scenarios could trigger contractual SLA penalties and breach
      notification obligations. Support quality at scale is a fourth risk: scaling from approximately 500
      employees in 2024 to 1,000+ post-financing requires maintaining the deep AD domain expertise required
      for incident response, which is a scarce capability. Quality degradation in enterprise support could
      accelerate churn in high-value accounts that rely on Semperis for active directory resilience.
    claimRefs:
      - CR011
      - CR012
      - CR013
      - CR014
      - CR015
      - CR016
      - CR039
    tableRefs:
      - TR002

  - id: partner-dependency-risks
    title: Partner and Dependency Risks
    body: >-
      Semperis's partner and dependency risk register is anchored by a single existential dependency:
      Microsoft Active Directory and Entra ID APIs. Semperis DSP and ADFR are architecturally built on
      Microsoft's AD replication protocol (MS-DRSR), LDAP/LDAPS directory access, and Windows Volume Shadow
      Copy Service. If Microsoft restricts third-party access to AD replication metadata — which Microsoft
      has competitive incentive to do as it expands native Defender for Identity capabilities — DSP's
      real-time change detection and ADFR's backup framework would require fundamental rearchitecting with
      no guaranteed timeline. Unlike typical API deprecations in SaaS ecosystems, Microsoft AD API changes
      affect on-premises Windows Server deployments where update cadence is customer-controlled, making a
      clean API cutover particularly complex. Microsoft's expanding Entra ID native backup and recovery
      roadmap (announced features in 2025) represents the strategic manifestation of this dependency risk:
      Microsoft is building its own AD recovery capability, which reduces Semperis's moat while simultaneously
      controlling the underlying API.

      The June 2024 $125M growth financing from J.P. Morgan and Hercules Capital introduces financial
      covenant risk. Growth debt from Hercules Capital typically includes minimum ARR, minimum cash balance,
      and maximum leverage covenants. Semperis has disclosed the $125M principal amount but not the specific
      covenant terms, interest rate, or maturity. If ARR growth decelerates materially from current trajectory
      (announced 2024 surpass of $100M ARR), covenant compliance risk increases. A covenant breach could
      trigger acceleration clauses requiring early repayment, constraining strategic flexibility at a critical
      pre-IPO moment.

      Channel partner concentration is a third risk. Semperis's go-to-market relies on a combination of
      direct enterprise sales and VAR/MSSP channel partners. Without disclosed partner concentration data,
      the risk that a top-1 or top-3 VAR partner shifts preferred referrals to CrowdStrike Identity or
      Microsoft MDI cannot be quantified. Key customer ARR concentration is similarly opaque: without NRR
      and top-20 ARR share disclosures, a high-ARR-concentration scenario (e.g., top-20 customers >30% of
      total ARR) represents a revenue-cliff risk if any large account churns to a bundled Microsoft MDI
      deployment.
    claimRefs:
      - CR017
      - CR018
      - CR019
      - CR020
