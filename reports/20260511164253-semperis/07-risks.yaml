      nodes:
        - id: dep-microsoft
          label: "Microsoft Active Directory"
          detail: "Core market exists because AD dominates enterprise authentication; Microsoft controls
            the platform Semperis depends on for product relevance; Entra ID migration trajectory is the
            long-term existential dependency risk"
          type: dependency
        - id: dep-insight
          label: "Insight Partners"
          detail: "Primary financial backer across multiple funding rounds; board influence over capital
            allocation, executive hiring, and exit timing; LP dynamics affect secondary market pressure"
          type: dependency
        - id: dep-jpmorgan
          label: "J.P. Morgan / Hercules Capital"
          detail: "$125M 2024 growth round lead investors; debt component from Hercules Capital includes
            financial maintenance covenants; specific covenant terms not publicly disclosed"
          type: dependency
        - id: dep-cohesity
          label: "Cohesity OEM Partnership"
          detail: "Cohesity Identity Resilience powered by Semperis technology; co-marketed data and
            identity resilience solution amplifies distribution to Cohesity enterprise customer base"
          type: dependency
        - id: dep-fedramp-body
          label: "FedRAMP Authorization Body"
          detail: "FedRAMP Moderate authorization governs federal civilian procurement eligibility; annual
            re-assessment required to maintain status; High authorization required for DoD and IC segments"
          type: dependency
        - id: dep-israel-rnd
          label: "Israel R&D Center"
          detail: "Majority of core engineering concentrated in Tel Aviv; delivers DSP, ADFR, Purple Knight,
            and Forest Druid product development; geopolitical risk affects delivery continuity"
          type: dependency
        - id: semperis-core
          label: "Semperis Platform"
          detail: "DSP, ADFR, Purple Knight, and Forest Druid delivered to 1,000+ enterprise customers;
            multi-product suite with increasing cross-sell penetration"
