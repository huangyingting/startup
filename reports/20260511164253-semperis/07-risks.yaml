        - id: customer-enterprise
          label: "Fortune 500 Enterprise"
          detail: "Primary revenue base; 1,000+ enterprise customers; DSP plus ADFR multi-product expansion
            is the primary ARR growth motion"
          type: actor
      edges:
        - from: dep-microsoft
          to: semperis-core
          label: "AD platform provides product market"
        - from: dep-insight
          to: semperis-core
          label: "Equity capital and governance"
        - from: dep-jpmorgan
          to: semperis-core
          label: "Debt financing and IPO alignment"
        - from: dep-cohesity
          to: semperis-core
          label: "OEM distribution amplification"
        - from: dep-fedramp-body
          to: customer-federal
          label: "Authorization gates federal procurement"
        - from: dep-israel-rnd
          to: semperis-core
          label: "Engineering capacity and product delivery"
        - from: semperis-core
          to: customer-federal
          label: "Platform delivered to federal agencies"
        - from: semperis-core
          to: customer-enterprise
          label: "Platform delivered to enterprise customers"
