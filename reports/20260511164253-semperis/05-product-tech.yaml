  - type: private-evidence-only
    severity: material
    topic: SOC 2 Type II and FIPS 140-2 certification
    missingEvidence: Publicly accessible SOC 2 Type II attestation report and FIPS 140-2 validation certificate number for
      Semperis cloud-managed services
    whyItMatters: Regulated buyers in financial services, healthcare, and government require independently verifiable certification
      documentation before approving vendor procurement
    diligencePath: Request SOC 2 Type II report and FIPS 140-2 certificate number directly from Semperis during vendor assessment;
      confirm scope covers ADFR cloud backup and DSP SaaS components
    relatedQuestionRefs:
    - QE007
    - QE008
  - type: enumeration-incomplete
    severity: minor
    topic: Product module asset matrix coverage
    missingEvidence: Detailed technical specifications for Lightning IRP and Semperis Backup Services, including deployment
      architecture, pricing, and integration requirements
    whyItMatters: Lightning IRP is listed as a key differentiator for runtime attack detection but lacks publicly accessible
      technical documentation, making independent capability assessment difficult
    diligencePath: Request Lightning IRP technical datasheet and deployment guide from Semperis; confirm GA status, supported
      AD versions, and minimum infrastructure requirements
    relatedQuestionRefs:
    - QE023
    relatedTableRefs:
    - TE001
  - type: access-blocked
    severity: minor
    topic: G2 customer reviews direct access
    missingEvidence: Full G2 review content including review count, review recency distribution, and negative review themes
      for Semperis DSP
    whyItMatters: G2 is a primary peer review platform for enterprise buyers; blocked access limits ability to assess review
      volume, recency, and sentiment distribution
    diligencePath: Access G2 Enterprise subscription or request Semperis to share G2 review report; supplement with Peerspot
      and Gartner Peer Insights which have partial access
    relatedQuestionRefs:
    - QE015
  - type: missing-source
    severity: minor
    topic: Product reliability and outage history
    missingEvidence: Public uptime data, incident history, or reliability SLA documentation for Semperis DSP SaaS components
    whyItMatters: Enterprise buyers in critical infrastructure and healthcare require reliability evidence before deploying
      security-critical AD monitoring infrastructure
    diligencePath: Check Semperis status page if publicly available; request uptime SLA and historical incident reports during
      vendor assessment
    relatedQuestionRefs:
