- id: TE002
  title: Workflow / Use-Case Table
  slug: workflow-use-case-table
  type: matrix
  notes: Use cases derived from official product pages, press releases, and customer review platforms.
  columns:
  - User Job / Scenario
  - Current / Legacy Workflow
  - Semperis Solution
  - Measurable Benefit (Claimed)
  - Limitation / Gap
  rows:
  - - Detect unauthorized AD change
    - Manual AD audit log review; SIEM after-the-fact
    - DSP real-time replication log monitoring with automated alerts
    - Near-zero detection latency vs hours/days manual review
    - Alert tuning required; no public false-positive rate data
  - - Roll back malicious AD object change
    - Manual AD restore from backup; lengthy change approval chains
    - DSP one-click automated rollback of specific objects/attributes
    - Minutes vs hours for targeted remediation
    - Rollback scope limited to AD objects; not OS or application layers
  - - Recover AD forest after ransomware
    - Manual forest rebuild; BMR restore risking malware reintroduction
    - ADFR automated malware-free forest recovery on clean hardware
    - Up to 90% faster recovery vs manual; no malware reintroduction
    - Third-party validation of 90% claim not available
  - - Assess AD security posture quickly
    - Periodic manual audit; expensive third-party pen test
    - Purple Knight free IOE/IOC scan with scored report
    - Minutes vs weeks; free; prioritized remediation checklist
    - Point-in-time snapshot only; no continuous monitoring
  - - Map privilege escalation paths to Tier 0 assets
    - Manual tiering documentation; BloodHound attacker-view traversal
    - Forest Druid inside-out Tier 0 asset mapping and ownership analysis
    - Faster defender-focused prioritization vs full graph traversal
    - No published comparison vs BloodHound on coverage
  - - Detect runtime AD attacks (in-memory)
    - EDR/SIEM behavioral rules; delayed alert after attack completes
    - Lightning IRP real-time DCSync/Golden Ticket/Kerberoast detection
    - In-progress attack interruption vs post-incident detection
    - Integration specs and deployment requirements not publicly detailed
