figures:
- id: FE001
  title: Semperis Identity Resilience Platform — Product Architecture Map
  slug: product-architecture-map
  type: stack
  layout: wide
  summary: Layered stack showing the Semperis Identity Resilience Platform from identity coverage scope at the foundation
    to crisis management at the apex. Each layer represents a distinct functional capability delivered by one or more product
    modules.
  data:
    layers:
    - label: Identity Coverage Scope
      detail: On-prem Active Directory, Entra ID (Azure AD), Okta, Ping Identity — full hybrid multi-IdP attack surface covered
        by the platform
    - label: Prevention & Assessment
      detail: Purple Knight (free IOE/IOC scanner, v4.2 2026), Forest Druid (free Tier 0 blast-radius analysis) — continuous
        posture assessment and exposure reduction
    - label: Real-time Detection & Change Monitoring
      detail: DSP agent-free replication log capture, ML anomaly detection engine, IOE/IOC scoring and alerting for AD and
        Entra ID changes
    - label: Runtime Attack Detection
      detail: Lightning IRP behavioral detection of in-memory attacks (DCSync, Golden Ticket, Kerberoasting) complementing
        DSP change-log analysis
    - label: Automated Remediation & Response
      detail: DSP one-click object rollback, SIEM/SOAR integration (Sentinel, Splunk, ServiceNow), tamper-proof change tracking
        across all IdPs
    - label: Cyber-First Forest Recovery
      detail: ADFR automated malware-free forest recovery on clean hardware, Azure cloud backup (AES-256), object-level recovery
        wizard
    - label: Crisis Management & Forensics
      detail: Identity Forensics and Incident Response (IFIR), Ready1 crisis management platform, 180+ combined Microsoft
        MVP years of expert IR capacity
  claimRefs:
