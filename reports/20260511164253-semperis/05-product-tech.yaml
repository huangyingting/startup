- id: TE003
  title: Technology / Operating Architecture Table
  slug: technology-operating-architecture-table
  type: matrix
  notes: Architecture details derived from official product documentation and product FAQ pages.
  columns:
  - Layer / Component
  - Role in Architecture
  - Key Dependency
  - Risk
  rows:
  - - AD Replication Log Interceptor (DFS/USN)
    - Passively captures all AD changes in real time without agents on DCs
    - Microsoft AD replication infrastructure; AD schema compatibility
    - Breaking AD schema changes in future Windows Server versions could affect capture
  - - ML Anomaly Detection Engine
    - Baseline behavior modeling and anomaly scoring for behavioral detections
    - Customer-specific training data volume; tuning expertise
    - New attack TTPs not in training data may evade detection initially
  - - REST API & SIEM/SOAR Integration Layer
    - Routes alerts and telemetry to Microsoft Sentinel, Splunk, ServiceNow, etc.
    - SIEM/SOAR vendor API compatibility; customer integration staff
    - Integration depth varies by SIEM vendor; not all are equally supported
  - - Azure Cloud Backup (ADFR)
    - Encrypted (AES-256) off-site recovery point storage for ADFR
    - Azure availability and customer Azure subscription
    - Azure region outage could delay recovery if on-prem also destroyed
  - - ADFR Orchestration Engine
    - Automates metadata cleanup, GC rebuild, site topology restructuring during forest recovery
    - Windows Server version compatibility; correct pre-configured distribution points
    - Complex multi-forest topologies add orchestration risk; no public SLA
  - - Entra ID / Azure AD Integration
    - Extends DSP and Purple Knight monitoring scope to cloud-hosted identity
    - Microsoft Graph API and Entra ID licensing at customer site
    - Microsoft API changes or deprecations could require product updates
  - - MightyID (Okta / Ping Identity)
    - Extends exposure management and change tracking to cloud IdPs
    - Okta and Ping Identity API access; integration completeness post-acquisition
    - Integration maturity post-acquisition (Feb 2026) unverified; potential gaps
