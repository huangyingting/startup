  - id: Isv-S03
    title: "Comparable Set and Market Benchmarks"
    body: >-
      Six comparable companies anchor the Semperis valuation framework, spanning public security
      platforms, identity sector M&A, and private PE-backed AD competitors. No single comparable
      is a pure-play ITDR match; the set is designed to triangulate ARR multiples from different
      vantage points.

      CrowdStrike (CRWD) is the primary public market anchor: FY2026 ARR of approximately $3.95B
      at a $65-75B enterprise value implies 16-19x forward ARR. CrowdStrike's Falcon Identity
      Protection module competes with DSP in the ITDR detection space, making it both a competitor
      and a valuation ceiling benchmark. The multiple premium reflects CrowdStrike's platform scale
      and Falcon network effect that Semperis cannot replicate as a standalone vendor.

      Rubrik (RBRK) is the most structurally analogous public comparable: a security-plus-recovery
      narrative targeting enterprise buyers. FY2025 ARR of approximately $825M with an IPO completed
      in April 2024 at 12-15x trailing ARR. The Rubrik IPO provides the most recent data point for
      how public markets price a recovery-anchored security vendor with strong enterprise customer
      reference ability.

      Ping Identity (acquired by Thales December 2023 for $2.8B) establishes the strategic acquirer
      benchmark for identity sector M&A: approximately 7-8x ARR at the time of acquisition. This
      implies that without an IPO premium, identity platform M&A would value Semperis at $700M-$960M
      at base ARR, confirming that entry below $1.3B captures M&A floor value plus an IPO option
      premium.

      SailPoint (taken private by Thoma Bravo for $6.9B in April 2022, with re-IPO targeted) provides
      the identity governance comparable at approximately 10-12x ARR. SailPoint is materially larger
      but the identity governance multiple compression under private equity ownership is instructive:
      Thoma Bravo does not over-pay, and identity sector multiples have a visible ceiling even under
      strategic premium scenarios.

      Quest Software (Francisco Partners) and Netwrix (PE-backed) are private AD management and
      analytics competitors. Quest at an estimated $2-4B EV on $400-600M ARR implies 4-7x multiples
      reflecting the discount applied to older AD management portfolios. Netwrix at $600M-$1B on
      $100-150M ARR implies 5-7x, providing the most directly size-comparable benchmark. Semperis
      should trade at a premium to Quest and Netwrix given its ITDR-specific focus, faster growth
      rate, and institutional investor backing.

      Across the comparable set, the ITDR category-leadership premium justifies a 2-3x turn above
      PE-backed AD management multiples (5-7x) and at a discount to CrowdStrike's platform multiple
      (16-19x), supporting the base case range of 8-12x ARR. Investment KPI scoring confirms market
      position and customer proof are strong; unit economics and evidence quality are medium gaps.
