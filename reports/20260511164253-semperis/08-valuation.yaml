callouts:
  - calloutType: strength
    title: Category Leader at Fair Valuation with Institutional Backing
    body: >
      Semperis $100M+ ARR at a 10x implied multiple sits at the peer median for high-growth
      cybersecurity SaaS — not an outlier. The Rubrik IPO at 12x ARR and CyberArk 16x NTM trading
      multiple bracket Semperis current valuation as reasonable. J.P. Morgan Asset Management
      participation as co-lead investor in the June 2024 round provides a credible institutional
      mark and signals pre-IPO validation from a leading public-markets anchor investor.
    claimRefs:
      - CV002
      - CV004
      - CV011
      - CV038

  - calloutType: risk
    title: Opaque Financials and Debt Covenants Create Material Diligence Risk
    body: >
      Semperis has not disclosed burn rate, net revenue retention, gross margin, or audited financial
      statements. Without this data, the investment case cannot be fully validated from public sources.
      The Hercules Capital venture debt component may carry covenants that constrain IPO timing, M&A
      optionality, or capital deployment — a risk that is difficult to assess without private access
      to the financing term sheet and covenant package.
    claimRefs:
      - CV024
      - CV028
      - CV030
      - CV034

  - calloutType: recommendation
    title: Research-More — Proceed to Diligence on Four Critical Inputs
    body: >
      The recommended investment stance is research-more and conditional favorable. Strong market
      positioning, enterprise scale, and a reasonable valuation multiple justify advancing to formal
      due diligence. Four items must be resolved before commitment: net revenue retention, burn rate
      and gross margin, competitive displacement win rates, and FedRAMP authorization status.
      Positive resolution on all four items would support a favorable investment recommendation at
      or near the current implied valuation.
    claimRefs:
