  evidenceGaps:
    - id: EGV001
      description: >-
        Semperis has not disclosed net revenue retention or gross revenue retention for any
        reporting period. NRR is the primary empirical test of the ADFR switching cost thesis.
        Without it, the retention assumption in the base case valuation model is asserted rather
        than evidence-supported. This is the single most material evidence gap in the investment
        case.
      type: private-evidence-only
      relatedQuestionRefs:
        - QV003
        - QV026

    - id: EGV002
      description: >-
        Semperis's cap table, Series C liquidation preference terms, and Hercules Capital debt
        covenant details are not publicly available. The preference stack and debt covenants
        directly affect common equity waterfall at exit and operational flexibility during the
        hold period. Without this information, downside scenarios cannot be accurately modeled.
      type: private-evidence-only
      relatedQuestionRefs:
        - QV024
        - QV031

    - id: EGV003
      description: >-
        Semperis's export control compliance posture under EAR Part 730 for its Israel-developed
        cryptographic software is not publicly disclosed. This is a material regulatory risk given
        the combination of Israeli R&D origin, US federal customer base, and cryptographic technology
        classification scope. No proxy evidence is available from public filings or press releases.
      type: private-evidence-only
      relatedQuestionRefs:
        - QV022

    - id: EGV004
      description: >-
        The comparable valuation table (TV004) is partial-coverage by design. SentinelOne Singularity
        Identity, Tenable Identity Exposure, and Varonis are excluded because their ITDR revenue is
        not separately disclosed and their primary business focus differs materially from Semperis.
        Additional identity sector private companies (e.g., Saviynt, Oort) are excluded due to
        absence of confirmable financial data. Full enumeration of all ITDR vendors would require
        access to private market databases beyond public evidence scope.
      type: partial-coverage
      relatedQuestionRefs:
        - QV006
        - QV007
      relatedTableRefs:
        - TV004

