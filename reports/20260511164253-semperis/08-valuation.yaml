        Semperis net revenue retention has not been publicly disclosed at any point in available sources.
        NRR is the most critical financial indicator for assessing land-and-expand dynamics, retention
        quality, and justification for the 10x ARR premium multiple. Without NRR data, the investment
        case cannot be fully validated from public sources; this is a blocking gap for final conviction.
