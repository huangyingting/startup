  - id: comparable-exit-analysis
    title: Comparable Exit Analysis
    body: >
      Semperis valuation can be benchmarked against a set of public and private comparable companies
      in identity security, data security, and adjacent cybersecurity SaaS categories. The strongest
      public comparables are CrowdStrike, SentinelOne, CyberArk, and Varonis — all of which compete in
      identity and endpoint security and are covered by sell-side analysts as Semperis peer group.
      CrowdStrike at approximately 26x NTM revenue and $90B+ market cap represents the upper bound of
      the peer range, elevated by its AI-driven platform premium and exceptional growth profile above
      $3 billion annual revenue. SentinelOne at approximately 25x NTM revenue and $18B market cap
      provides a second large-cap AI security comparable with directly overlapping ITDR capabilities.
      CyberArk at approximately 16x NTM revenue and $15B market cap is perhaps the most directly
      comparable public company — a specialist in privileged access management and identity security
      with an enterprise-focused SaaS transition model. Varonis at approximately 9x NTM revenue and
      $5B market cap provides the lower-bound comparable for data-and-identity security specialists
      with overlapping enterprise buyer profiles in regulated industries.

      The most relevant exit precedent is Rubrik, which IPO-d in April 2024 at approximately 12x ARR
      on approximately $650M ARR, raising $752M in its initial public offering and reaching an $8B+
      market cap at opening. Rubrik narrative — backup and recovery security for enterprise data
      protection, pre-IPO unicorn status, venture-backed, positioned as a Microsoft-independent
      alternative — shares meaningful structural parallels with Semperis, making it the highest-quality
      private-to-public exit comparable for calibrating Semperis potential IPO multiple. On the M&A
      side, Semperis most plausible strategic acquirers include CrowdStrike, Microsoft, Palo Alto
      Networks, and CyberArk, each of which has demonstrated appetite for identity and AD security
      capability acquisition. A control premium of 20-30% over comparable public multiples would imply
      strategic acquisition valuations of approximately $1.2-2.0 billion for a 2026-2028 transaction,
      contingent on Semperis ARR trajectory and market conditions at time of transaction.
