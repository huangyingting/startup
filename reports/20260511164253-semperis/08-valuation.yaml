chapter:
  number: 8
  title: Valuation
  summary: >
    Semperis achieved unicorn status at $1B+ in June 2024 via a $125M growth financing from J.P. Morgan
    Asset Management and Hercules Capital. At $100M+ ARR announced in January 2025, the implied ARR
    multiple is approximately 10x — consistent with cybersecurity SaaS peers CyberArk (~16x NTM revenue),
    Varonis (~9x), and the Rubrik IPO precedent (~12x ARR). The investment thesis rests on Semperis
    category leadership in Active Directory ITDR, high enterprise switching costs, and a $16B+ ITDR market
    growing at 25-30% CAGR. The anti-thesis centers on Microsoft bundling, CrowdStrike platform
    consolidation, and opaque financials. Three scenarios yield implied valuations of $600-750M (bear at
    6-7.5x ARR), $1.0-1.5B (base at 10x ARR), and $1.5-2.0B (bull at 15x ARR). The recommended stance
    is research-more and conditional favorable: strong positioning supports further diligence on burn rate,
    net revenue retention, gross margin, competitive displacement rate, and FedRAMP authorization status
    before investment commitment is warranted.

sections:
  - id: investment-thesis-antithesis
    title: Investment Thesis and Anti-Thesis
    body: >
      Semperis investment thesis rests on three reinforcing pillars. First, the company occupies a
      defensible niche as the only enterprise-grade platform purpose-built for Active Directory identity
      threat detection and response — a category Gartner formally defined in 2022 and identifies as a
      high-priority enterprise security requirement. Active Directory underpins authentication for
      virtually every on-premises enterprise globally, and AD-specific attack paths were exploited in
      the Colonial Pipeline, SolarWinds, and Kaseya breaches that defined the 2020-2022 ransomware era.
      Semperis Directory Services Protector, Active Directory Forest Recovery, Purple Knight, and Forest
      Druid tools address the full security lifecycle across assess, detect, respond, and recover. Second,
      the company has demonstrated product-market fit at enterprise scale with 1,000+ enterprise customers
      including named Fortune 500 accounts in financial services, healthcare, aviation, and critical
      infrastructure, with $100M+ ARR achieved by January 2025 representing more than 3,000% five-year
      growth. Switching costs are structurally high because AD security infrastructure is operationally
      embedded, involves 3-5 year replacement cycles, and serves as a compliance artifact in regulated
      sectors. Third, total raised capital of approximately $368M with J.P. Morgan Asset Management and
      Hercules Capital as June 2024 anchors signals institutional confidence in the IPO narrative and
      provides runway for continued market expansion into new geographies and government segments.

      The anti-thesis centers on four structural risks. First, Microsoft bundles Defender for Identity
      into its Microsoft 365 E5 license at no incremental cost, creating a competing option in accounts
      with deep Microsoft licensing commitments. Second, CrowdStrike Falcon Identity and SentinelOne
      Singularity Identity offer ITDR capabilities bundled within broader endpoint-to-identity platforms,
      enabling aggressive pricing strategies that Semperis as a standalone vendor cannot easily replicate.
      Third, Semperis financials are opaque: burn rate, net revenue retention, gross margin, and unit
      economics are not publicly disclosed, making independent financial assessment impossible without
      direct company access. Fourth, the Hercules Capital venture debt component introduces covenants
      that could constrain operational flexibility and IPO timing if revenue growth decelerates below
      lender thresholds established in the June 2024 term sheet.
