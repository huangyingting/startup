  - id: valuation-context
    title: Valuation Context and Entry Discipline
    body: >
      Semperis most recent financing event — the $125M growth round closed in June 2024 co-led by J.P.
      Morgan Asset Management and Hercules Capital — established the company unicorn valuation above
      $1 billion. At $100M+ ARR announced in January 2025, this implies an ARR multiple of approximately
      10x. For a high-growth cybersecurity SaaS company with 20%+ annual ARR growth and enterprise-grade
      retention characteristics, a 10x ARR multiple sits at the midpoint of the public peer valuation
      range. CrowdStrike trades at approximately 26x NTM revenue elevated by its AI and platform scale
      premium; CyberArk trades at approximately 16x NTM revenue; Varonis at approximately 9x; and
      SentinelOne at approximately 25x. The Rubrik IPO in April 2024 — a backup-and-recovery security
      unicorn with a structurally similar pre-IPO narrative — priced at approximately 12x ARR, providing
      a directly comparable private-to-public transition reference point for Semperis potential exit
      valuation at a hypothetical 2027-2028 IPO.

      The June 2024 financing was structured as a combination of equity and venture debt, consistent with
      Hercules Capital Business Development Company lending model for high-growth technology companies.
      While the equity portion establishes the $1B+ valuation mark, the debt component carries repayment
      obligations, interest accrual, and likely equity warrants that affect the equity waterfall at exit.
      The precise split between equity and debt within the $125M is not publicly disclosed, creating a
      material diligence gap around effective equity valuation and dilution-preference overhang. From an
      entry discipline perspective, the 10x implied ARR multiple is fair if Semperis sustains 20%+ ARR
      growth through 2026-2027. The multiple is at risk if growth decelerates below 15% annually, which
      would imply a down-round scenario at current public market comparable valuations. Cybersecurity SaaS
      multiples compressed 60-70% in 2022-2023 before recovering substantially in 2024-2026 as identity
      and AI security categories attracted renewed institutional investor interest across the sector.
