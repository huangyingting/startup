  - id: TV002
    title: Thesis / anti-thesis table
    columns:
      - Side
      - Argument
      - What Would Change This View
    rows:
      - - Thesis
        - Semperis is the category-defining ITDR leader in a $16B+ market growing at 25-30% CAGR with no direct enterprise-grade AD security peer matching its platform depth
        - If a competing pure-play AD security vendor achieves equivalent enterprise scale or the market fragments significantly around multiple specialists
      - - Thesis
        - $100M+ ARR at 3,000%+ five-year growth and 1,000+ enterprise customers in regulated sectors demonstrates durable and repeatable product-market fit
        - If two consecutive quarters show ARR growth below 15% or if large enterprise churn events are publicly disclosed or confirmed under diligence
      - - Thesis
        - High switching costs from deep AD infrastructure integration create 3-5 year replacement cycles and structural enterprise retention advantages
        - If a platform vendor such as CrowdStrike or Microsoft achieves equivalent AD-depth coverage through acquisition or accelerated native R&D investment
      - - Anti-Thesis
        - Microsoft Defender for Identity is bundled at no incremental cost in Microsoft 365 E5 and competes directly in AD threat detection for enterprises with large Microsoft licensing commitments
        - If Microsoft deprioritizes MDI development or if Semperis demonstrates strong verified MDI displacement win rates in enterprise competitive evaluations
      - - Anti-Thesis
        - Semperis financials are opaque; burn rate, NRR, and gross margin are not publicly disclosed and cannot be independently assessed from public sources
        - If Semperis files an S-1 or provides audited financials to prospective investors showing strong unit economics and NRR above 120%
      - - Anti-Thesis
        - Hercules Capital venture debt creates repayment obligations and covenants that may constrain IPO timing or limit M&A strategic options if growth decelerates
        - If debt terms are disclosed and covenants are shown to be permissive or if debt is retired ahead of IPO from strong operating cash flow
    notes: >
      Thesis and anti-thesis arguments are derived from publicly available evidence as of May 2026.
      Arguments marked anti-thesis reflect risks and adverse signals that could reduce valuation or
