  - id: TV005
    title: Thesis-break and kill triggers table
    columns:
      - Trigger
      - Threshold
      - Transmission to Thesis
      - Action Implication
    rows:
      - - Net Revenue Retention Below 100%
        - NRR falls below 100% for two consecutive quarters
        - Indicates net churn in enterprise customer base; undermines switching-cost moat and land-and-expand thesis core assumption
        - Exit or abort investment; NRR below 100% in enterprise security is a disqualifying signal for the investment case
      - - ARR Growth Deceleration
        - ARR growth falls below 15% annually for two consecutive quarters
        - At 10x ARR entry multiple, sub-15% growth implies the multiple is unsustainable; peer median multiples for slower-growth SaaS compress to 5-8x ARR
        - Re-evaluate at lower entry multiple or exit position; initiate down-round scenario analysis immediately
      - - Microsoft MDI Enterprise Displacement
        - Evidence that Microsoft MDI is displacing Semperis in 20%+ of enterprise renewals
        - Platform bundling threat materializes; Semperis loses pricing power; standalone ITDR TAM contracts materially
        - Trigger immediate strategic review; assess M&A exit urgency before competitive moat erodes further
      - - Gross Margin Below 65%
        - Audited or disclosed gross margin falls below 65%
        - Inconsistent with software SaaS positioning; indicates services or hardware diluting economics; compresses achievable exit multiple
        - Reduce target valuation multiple to 6-8x ARR; reassess return scenario; request detailed cost structure breakdown
      - - Hercules Debt Covenant Breach or Stress
        - Evidence of covenant breach, forced amendment, or accelerated repayment demand in Hercules Capital debt terms
        - Signals financial stress or revenue underperformance; could trigger dilutive equity issuance or forced M&A at unfavorable terms
        - Immediate diligence escalation; assess runway and renegotiation options; potential for material equity dilution at next event
    notes: >
      Thesis-break triggers are illustrative thresholds based on judgment about evidence that would
      materially weaken or invalidate the investment thesis. Thresholds are not derived from Semperis
      management disclosure. Actual Hercules Capital covenant thresholds are not publicly known.
