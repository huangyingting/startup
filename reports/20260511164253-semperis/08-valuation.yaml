  - id: Isv-S04
    title: "Exit Readiness, Diligence Asks, and Kill Criteria"
    body: >-
      Semperis exhibits credible IPO readiness signals: confirmed $100M ARR crossed January 2025,
      CFO appointment signaling financial reporting maturity, 1,000+ enterprise customers providing
      a reference customer base adequate for an S-1 filing, Fortune 500 named logos across regulated
      verticals (aviation, financial services, healthcare, retail) that anchor institutional investor
      interest, and FedRAMP Moderate authorization establishing federal revenue credibility. Insight
      Partners' portfolio IPO history and J.P. Morgan Asset Management's growth round leadership
      provide institutional pathway support. The realistic exit horizon is 18-36 months (IPO window
      2027-2028) conditional on sustained ARR growth above 30% and favorable public market conditions
      for cybersecurity SaaS. Strategic M&A exit is a secondary path: CrowdStrike, Palo Alto Networks,
      Microsoft, and Thales are plausible acquirers at 8-14x ARR, implying $800M-$1.7B exit range at
      base ARR assumptions.

      Five thesis-break triggers require continuous monitoring: DSP renewal rate decay below 70%
      (Microsoft MDI displacement), ADFR switching cost erosion via Microsoft native AD recovery,
      unplanned CEO/CTO departure within 12 months of investment, regulatory enforcement action, or a
      next equity round priced below $900M valuation. Any of these triggers materially shifts the
      bull/base probability weighting toward the bear case and should initiate an exit review.

      Five final diligence asks are non-negotiable before investment commitment: (1) NRR and GRR
      disclosure — without this, the switching cost thesis is unverifiable and the retention
      assumption in the base case cannot be stress-tested; (2) customer concentration waterfall —
      top-10 customer ARR share exceeding 30% creates material churn risk that alters the investment
      case; (3) cap table and preference stack — Insight Partners Series C preferences and Hercules
      Capital debt covenants must be reviewed to understand common equity waterfall and operational
      flexibility constraints; (4) FedRAMP High road map — confirming timeline and sponsoring agency
      for High authorization unlocks the DoD/IC revenue opportunity estimated at $50-100M incremental
      ARR; and (5) export control compliance documentation — Semperis's Israel R&D dual-use
      cryptographic software requires active EAR compliance program, and absence of documentation is
      a material regulatory risk given the US federal customer base.
