sections:
  - id: SP001
    title: Competitive Landscape Overview
    body: >-
      The AI video generation competitive landscape as of May 2026 has consolidated around six primary commercial
      platforms and a growing open-source tier. The Artificial Analysis Video Arena—a blind human preference
      benchmark—provides the most authoritative quality ranking available in public sources, with Runway Gen-4.5 leading
      at ELO 1,247 (released December 2025), followed closely by Hailuo 2.3 (~1,230), Google Veo 3/3.1 (~1,220), Kling
      2.6/O1 (~1,200), Luma Ray 3 (~1,180), and Sora 2 (~1,150 before discontinuation). The 97-point spread across these
      six platforms illustrates both the convergence of quality and the fragility of any single model's lead.

      The most material competitive event since the report date is the discontinuation of OpenAI's Sora web and app
      products on April 26, 2026—approximately two weeks before this report. Sora's API remains active until September
      24, 2026, but the standalone Sora product is gone, and OpenAI has directed users to export their content. This
      removes one of Runway's most cited technical benchmarks while leaving OpenAI's future video strategy unclear.
      OpenAI may continue developing video capabilities embedded within ChatGPT, but no replacement product had been
      announced as of the report date.

      The competitive field can be segmented into three tiers. Tier 1 direct competitors—Google Veo 3, Kling O1, Luma
      Ray 3, Hailuo 2.3, and Pika—all target professional and semi-professional video generation workflows with
      subscription SaaS models. Tier 2 adjacent competitors—Adobe Firefly Video (integrated into Creative Cloud) and
      Stability AI (Stable Video Diffusion for open-source distributions)—target enterprise and developer segments
      respectively. Tier 3 open-source models— Wan 2.6 and LTX-2—compete at zero marginal cost for technically
      sophisticated users with GPU infrastructure. A fourth dimension is the multi-homing trend: by mid-2025, market
      observers noted that the single-tool era in AI video was "already over," with professional users routinely
      combining Runway (hero shots), Kling (volume), and Pika (rapid prototyping) in hybrid workflows.
