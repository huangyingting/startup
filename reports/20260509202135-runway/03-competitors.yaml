chapter:
  number: 3
  title: Competitors
  summary: >-
    Runway operates in the most rapidly evolving segment of the AI creative tools market, where competitive intensity
    has surged dramatically since 2023. As of May 2026, Runway Gen-4.5 leads the Artificial Analysis Video Arena ELO
    leaderboard at 1,247—27 points ahead of Hailuo 2.3 (#2 at ~1,230) and 27 ahead of Google Veo 3/3.1 (#3 at ~1,220).
    The most significant development since the report date is the discontinuation of OpenAI's Sora web and app products
    on April 26, 2026—removing one major direct rival while leaving OpenAI's broader video strategy uncertain. Runway's
    primary competitive differentiators are its professional cinematic toolset, Gen-4.5's character and scene
    consistency, NVIDIA-backed A2D architecture, and its first Hollywood studio partnership (Lionsgate). Its principal
    competitive risks are compute-advantaged incumbents (Google, Meta), the rapid rise of price-competitive Chinese
    models (Kling O1 at $6.99/month), and commoditization pressure from open-source alternatives (Wan 2.6, LTX-2).
