callouts:
  - calloutType: risk
    title: Sora's Discontinuation Signals Broader Video AI Market Instability — and Near-Term Opportunity
    body: >-
      OpenAI discontinued Sora's web and app products on April 26, 2026—two weeks before this report date. This is a
      double-edged signal for Runway. In the short term, Sora's removal eliminates one of Runway's most visible
      technical benchmarks and may redirect some Sora subscribers to Runway's ecosystem. In the medium term, it signals
      that even a well-resourced competitor (OpenAI, backed by Microsoft) chose to wind down a dedicated video product
      rather than continue competing. This may reflect OpenAI's strategic choice to embed video capabilities within
      ChatGPT rather than maintain a separate video brand—a distribution approach that could return OpenAI to the
      competitive field without the overhead of a standalone product. Diligence investors should monitor whether OpenAI
      launches a Sora replacement product embedded in ChatGPT Pro, which would reconstitute the competitive threat with
      even stronger distribution (200M+ ChatGPT users) than Sora had as a standalone product.
    claimRefs:
      - CP002
      - CP003
      - CP011
      - CP012
  - calloutType: risk
    title: Kling's Unit Economics Are a Structural Pricing Threat to Runway's Mid-Market
    body: >-
      Kling O1's $6.99/month standard pricing—42% below Runway's $12/month entry tier—combined with ~40% lower
      cost-per-second API rates and $100M ARR achieved in 10 months represents a structural, not cyclical, pricing
      challenge. Kling's pricing is sustainable because Kuaishou (a public Chinese technology company) has scale
      infrastructure advantages and is not optimizing for near-term margins. Runway's response options are limited:
      matching Kling's pricing would compress margins significantly, while maintaining premium pricing requires a
      durable quality premium that the ELO leaderboard (27-point gap, Runway #1 vs. Kling #4) may not sustain through
      quarterly model updates. The multi-tool workflow emergence further erodes Runway's "all-in-one" value proposition,
      as enterprise and prosumer buyers increasingly use Kling for volume and Runway only for high-value hero shots—a
      segmentation that reduces Runway's revenue per user.
    claimRefs:
      - CP021
      - CP022
      - CP023
      - CP040
      - CP048
      - CP057
