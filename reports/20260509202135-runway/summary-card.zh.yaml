summary:
  headline: Runway 是位置最好的独立生成式视频 AI 公司，收入动能强，产品路线图以 GWM-1 做差异化，也有深度企业合作；但法律、竞争和盈利风险都不轻，$5.3B 估值已经被拉得很满。
