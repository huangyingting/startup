  - id: market-and-execution-risk
    title: Market and Execution Risk
    body: >-
      Runway's enterprise Hollywood strategy — exemplified by the Lionsgate partnership announced in September 2024 —
      has encountered early friction. The Wrap reported in 2025 that Lionsgate's 20,000-title catalog proved
      insufficient as a standalone training corpus for the ambitious generative use cases the partnership envisioned,
      and that copyright uncertainty around actor likenesses and ancillary rights created unresolved legal
      complications. These findings are a cautionary signal that the studio-model-training revenue strategy may require
      larger multi-studio catalogs and clearer regulatory frameworks before it can scale.

      SAG-AFTRA and WGA labor agreements reached in 2023 include provisions restricting AI use on union-covered
      productions, creating legal friction for studios seeking to deploy Runway's tools in film and television
      workflows. Studios' internal legal functions are reportedly urging caution until copyright and talent rights
      boundaries are clearer, slowing enterprise adoption velocity. This dynamic extends to advertising and commercial
      production, where brand safety concerns about AI-generated content's training provenance may deter risk-averse
      corporate customers.

      The AI video market faces structural commoditization pressure as Chinese competitors undercut on price and
      open-source alternatives eliminate the cost of managed infrastructure for technical users. A race to the bottom on
      pricing could compress Runway's gross margins precisely when the company needs margin expansion to approach
      profitability. Reputation risk from the YouTube scraping media coverage in July 2024 — which received broad pickup
      including SiliconANGLE, PC Gamer, and TheOutpost — may reduce willingness among large media companies, who are
      themselves rights holders, to sign enterprise contracts with Runway. Deepfake fraud incidents quadrupled
      year-over-year by 2025, increasing regulatory pressure on AI video platforms to implement content authentication
      measures that may impose technical and compliance costs.
