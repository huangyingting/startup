  - id: technology-and-operational-risk
    title: Technology and Operational Risk
    body: >-
      Runway's technical operations carry several compounding dependencies. The company is reliant on Nvidia GPUs for
      model training and inference — a concentration that exposes it to GPU supply constraints, pricing leverage by
      Nvidia, and competitive disadvantage relative to vertically integrated incumbents (Google on TPUs, OpenAI with
      Microsoft compute capacity). Runway's CoreWeave cloud compute agreement addresses scale but creates vendor
      lock-in: if CoreWeave's financial position, pricing terms, or capacity allocations change, Runway's cost structure
      and delivery capability are directly affected. AMD Ventures joined the Series E, potentially signaling compute
      diversification intent, but the practical transition to AMD hardware for large-scale AI training remains
      operationally complex.

      Key-person concentration on CEO Cristóbal Valenzuela is significant. Valenzuela is the primary external
      spokesperson, deal-maker (Lionsgate partnership, Series D and E), and the most visible articulator of the General
      World Model thesis. His departure would create uncertainty for investor confidence, enterprise partnerships, and
      product strategy continuity. No public succession plan or executive bench disclosure has been identified.

      At the model level, each generation of Runway's models deprecates prior capabilities and introduces new user
      migration costs. Gen-4 introduced character consistency but capped video duration at 16 seconds, limiting its
      utility for long-form content against Sora's 60-second output. AI video outputs remain inherently stochastic;
      high-profile quality failures in customer-facing workflows could damage brand credibility with enterprise
      accounts. Runway's refusal to disclose training data composition for Gen-4 and GWM-1 leaves open the possibility
      of future regulatory or legal challenge for those newer models — not only Gen-3.
