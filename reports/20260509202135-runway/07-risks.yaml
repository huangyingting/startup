company:
  name: Runway
chapter:
  number: 7
  title: Risks
  summary: >-
    Runway faces a convergence of legal, competitive, financial, technological, and market-execution risks that
    collectively represent a materially elevated risk profile for an AI infrastructure company at its valuation stage.
    The most acute near-term exposures are: (1) unresolved copyright litigation from a class action lawsuit filed by
    artists and ongoing YouTube-scraping allegations related to Gen-3 training data — both of which could impose
    retroactive licensing costs, require data exclusion, or deter risk-averse enterprise customers; (2) intensifying
    competition from well-resourced big-tech incumbents (OpenAI Sora, Google Veo) and rapidly improving Chinese
    alternatives (Kling) that undercut on price; and (3) an EBITDA loss estimated at approximately $155 million for
    2024, implying heavy dependence on continued VC financing at a $5.3 billion valuation supported by ARR estimates
    ranging from $90 million to $300 million — a five-fold discrepancy that creates valuation multiple uncertainty.
    Secondary risks include key-person concentration on CEO Cristóbal Valenzuela, compute supply chain dependence on
    Nvidia and CoreWeave, complications in the flagship Lionsgate studio partnership, and deepening EU AI Act compliance
    obligations.
sections:
  - id: legal-and-regulatory-risk
    title: Legal and Regulatory Risk
    body: >-
      Runway's most acute legal exposure stems from two concurrent copyright-related proceedings. First, a class action
      lawsuit filed by visual artists in the Northern District of California names Runway alongside other AI defendants,
      alleging that training data included copyrighted artwork without authorization and in violation of the DMCA.
      Runway's defense rests on the fair use doctrine, but this defense has not been tested at trial; in analogous 2025
      decisions, courts reached different conclusions in Bartz v. Anthropic (training held transformative/fair use) and
      Kadrey v. Meta (also fair use, but with narrow factual scope), leaving material uncertainty about the outcome for
      video-generation training. The Copyright Alliance reports that over 70 infringement lawsuits have been filed
      against AI companies as of 2025, and the $1.5 billion Anthropic settlement demonstrates the potential magnitude of
      liability when pirated-library training data is involved.

      Second, a July 2024 report by 404 Media, corroborated by SiliconANGLE and TheOutpost, alleged that Runway scraped
      thousands of YouTube videos for Gen-3 training using an internal spreadsheet that targeted channels including
      Disney, Netflix, Sony, Pixar, Casey Neistat, and Marques Brownlee. The leaked document indicated the company used
      proxies to bypass YouTube's Terms of Service; YouTube leadership characterized the scraping as a clear Terms of
      Service violation. Runway has not publicly disclosed the training data composition for Gen-3, Gen-4, or GWM-1.

      Regulatory risk compounds the litigation exposure. The EU AI Act, enacted in 2024 with prohibited-practice
      provisions effective February 2025, imposes transparency and disclosure obligations on AI systems deployed in the
      EU market. High-risk AI system obligations (including dataset quality requirements, activity logging, and
      documentation mandates) take effect in August 2026 and August 2027. Runway must assess which of its systems
      qualify as high-risk under the Act's definitions. Additional regulatory layers include emerging deepfake
      legislation across US states and the EU, and actor likeness rights legislation intersecting with Runway's
      Hollywood customer base — complications already evidenced in the Lionsgate partnership.
