  - id: competitive-risk
    title: Competitive Risk
    body: >-
      Runway competes in a market attracting disproportionate capital and talent from the world's largest technology
      companies, creating structural disadvantages in compute scale, distribution reach, and product integration. OpenAI
      Sora generates videos up to 60 seconds — compared to Runway's 16-second cap on Gen-4.5 — at 4K resolution on paid
      tiers, and benefits from Microsoft Azure's enormous compute infrastructure. Google's Veo 2 and Veo 3 are embedded
      in YouTube's creator ecosystem, providing direct access to the world's largest video-publishing platform as a
      distribution and customer acquisition moat that Runway cannot easily replicate. DeepMind's research capacity
      further accelerates Google's model iteration pace.

      Chinese competitors represent an underappreciated structural threat. Kling, developed by Kuaishou, offers
      comparable video generation quality at materially lower prices, enabling aggressive capture of cost-sensitive
      creators and SMBs globally. The speed of improvement among Chinese models — Kling and Wan Video in particular —
      matches or exceeds Runway's generation cadence, and potential US export control actions on Chinese AI tools could
      paradoxically strengthen Kling's position within China and neutral markets. Adobe Firefly, integrated directly
      into Premiere Pro, compounds the threat from the creative workflow side: Adobe is simultaneously a Series E
      investor and a direct product competitor, creating a complex partner-vs.-competitor dynamic that could affect
      Runway's market access. Meta's Movie Gen has been announced as a direct competitor in AI video for entertainment.
      Open-source models including Stability AI's Stable Video Diffusion represent a zero-marginal-cost alternative for
      technically sophisticated users who do not need managed infrastructure.
