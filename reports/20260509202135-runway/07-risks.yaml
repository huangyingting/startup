callouts:
  - calloutType: risk
    title: 'Copyright Litigation: High-Severity, Unresolved Overhang'
    body: >-
      Runway faces a class action lawsuit from visual artists and unresolved YouTube scraping allegations covering its
      Gen-3 training dataset. Both remain active as of the May 2026 research date. The Anthropic precedent — a $1.5
      billion settlement over pirated-library training data — illustrates potential liability magnitude. An adverse
      ruling on fair use could require data exclusion (degrading model quality), impose retroactive licensing costs, and
      deter risk-averse enterprise customers who are themselves rights holders. No primary-source legal strategy
      disclosure from Runway is available; diligence must include PACER docket review and direct legal counsel
      interview.
    claimRefs:
      - CR001
      - CR002
      - CR006
      - CR009
      - CR010
  - calloutType: risk
    title: 'Profitability Path Unclear: $155M EBITDA Loss vs. $5.3B Valuation'
    body: >-
      Sacra estimates a 2024 EBITDA loss of approximately $155 million, implying monthly cash consumption exceeding $12
      million. The $5.3 billion valuation is supported by ARR estimates ranging from $90 million (Sacra, June 2025) to
      $300 million (Getlatka, late 2025) — a five-fold discrepancy that creates significant uncertainty in the implied
      revenue multiple (17× to 59×). If growth decelerates due to competitive pressure or litigation impact, the risk of
      a significant down-round or compressed IPO valuation is material.
    claimRefs:
      - CR019
      - CR020
      - CR023
      - CR024
      - CR025
  - calloutType: risk
    title: Big-Tech Competitive Advantage Is Structural, Not Temporary
    body: >-
      OpenAI (Sora/Microsoft compute) and Google (Veo/YouTube distribution/TPUs) hold structural advantages in compute
      scale, distribution reach, and capital that Runway cannot close through VC funding alone. Sora's 60-second video
      duration versus Runway's 16-second cap is a current product disadvantage in long-form content use cases. Kling's
      price competition from a state-backed Chinese company creates a two-front war: premium differentiation upmarket
      and price defense downmarket simultaneously.
    claimRefs:
      - CR011
      - CR012
      - CR013
      - CR017
      - CR018
  - calloutType: risk
    title: 'Key-Person Risk: No Disclosed Succession Plan'
    body: >-
      CEO Cristóbal Valenzuela is Runway's primary external deal-maker, investor-relations lead, and public articulator
      of the General World Model vision. His departure without a named successor would create immediate uncertainty
      across investor confidence, enterprise partnerships (including the Lionsgate deal), and talent retention. No board
      composition disclosure, no succession plan, and no depth of C-suite visibility has been identified in public
      sources. This is a standard diligence ask that prospective investors should address directly.
    claimRefs:
      - CR029
  - calloutType: assumption
    title: All Financial Risk Metrics Sourced from Unaudited Third Parties
    body: >-
      The EBITDA loss estimate ($155M), ARR figures ($90M–$300M range), and cash burn estimates in this chapter are
      entirely sourced from third-party aggregators (Sacra, Getlatka, Electroiq) without audited financial statement
      confirmation. Runway has not publicly disclosed audited financials. Any investment or acquisition decision should
      be conditioned on obtaining audited statements, recognized revenue schedules, and gross margin data directly from
      Runway.
    claimRefs:
      - CR019
      - CR022
      - CR024
      - CR025
