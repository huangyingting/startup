  - id: financial-and-business-risk
    title: Financial and Business Risk
    body: >-
      Runway's financial profile is characterized by rapid top-line growth offset by large and persistent operating
      losses. Sacra estimates an EBITDA loss of approximately $155 million for 2024 — implying a burn rate likely
      exceeding $12 million per month and total cash consumption that could exhaust the pre-Series E balance well within
      18 months without continued fundraising. The company has raised $860 million in total through the February 2026
      Series E, but all funding has been equity-based; no disclosed debt facility or recurring-revenue credit line has
      been announced. The path to profitability is unclear: compute costs for training and inference are structural and
      scale with usage, not offset by it at current pricing levels.

      Valuation risk is material. The $5.3 billion post-money Series E valuation implies a multiple of approximately 17×
      to 59× ARR depending on which revenue estimate is used — Getlatka's $300 million or Sacra's $90 million as of June
      2025. If ARR growth decelerates as the video generation market commoditizes, or if a litigation adverse judgment
      requires data exclusion that degrades model performance, the multiple compression risk could be severe and could
      complicate a future IPO or secondary transaction. No public exit timeline has been disclosed. Revenue
      concentration risk is additional: the company's revenue base is primarily subscription and a small number of large
      enterprise contracts, with Lionsgate as the highest-profile named customer — a customer whose partnership has
      encountered documented complications. The absence of audited financials from primary sources, and the five-fold
      discrepancy between Sacra's and Getlatka's ARR estimates, represents an information gap that prospective investors
      must resolve through primary-source review.
