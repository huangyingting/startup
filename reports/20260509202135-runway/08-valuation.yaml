  - id: TV006
    title: Final Diligence Asks
    columns:
      - Topic
      - Missing Evidence
      - Why It Matters
      - Diligence Path
      - Priority
    rows:
      - - Audited GAAP financials and gross margin
        - >-
          No publicly disclosed income statement, revenue recognition schedule, or gross margin for any year; Sacra
          ($90M) and Getlatka ($300M) ARR estimates differ 3.3× for 2025
        - >-
          The entire valuation case depends on which revenue estimate is accurate; a $90M ARR company at $5.3B is 59× —
          speculative pricing even by AI standards
        - >-
          Request audited financial statements for FY2023–FY2025 as NDA-gated data room materials; obtain revenue
          recognition policy, ARR definition, and deferred revenue schedule
        - CRITICAL — block before capital commitment
      - - Copyright litigation exposure quantification
        - >-
          No independent legal analysis of artists class action damages exposure; no disclosed reserve or settlement
          negotiation status; no legal opinion on fair use defense strength
        - >-
          An adverse ruling could require $500M+ retroactive licensing, data exclusion that degrades models, or damages
          exceeding cash position; Anthropic $1.5B precedent sets the order of magnitude
        - >-
          Commission independent IP litigation counsel for case analysis; review N.D. Cal. docket for all filings;
          obtain Runway's outside counsel opinion on defense prospects under NDA
        - CRITICAL — unquantified existential risk
      - - GWM-1 Robotics commercial pipeline
        - >-
          GWM-1 launched December 2025; no disclosed commercial contracts, enterprise pipeline, or ARR contribution from
          Robotics or Avatars variants
        - >-
          World model TAM expansion (robotics, AV) is the primary justification for the valuation premium above video
          tool benchmarks; without commercial evidence it remains a narrative bet
        - >-
          Request GWM-1 enterprise pipeline, signed LOIs or contracts, and any ARR bookings from Robotics/Avatars
          variants; assess with 3+ target enterprise reference calls
        - HIGH — required to underwrite bull case
      - - Customer concentration and net revenue retention
        - >-
