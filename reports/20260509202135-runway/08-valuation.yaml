          Runway has named logos but no subscription count or retention data
        - >-
          High customer concentration at Lionsgate/major studios creates revenue cliff if the Lionsgate complications
          deepen and studios reduce spending or switch to competing platforms
        - >-
          Request top-10 customer concentration, NRR, and logo retention rate for FY2024 and FY2025; conduct reference
