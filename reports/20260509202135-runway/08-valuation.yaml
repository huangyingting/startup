  - id: valuation-scenarios-and-recommendations
    title: Valuation Scenarios, Recommendation, and Final Diligence Asks
    body: >-
      Three valuation scenarios for a 2027 exit or secondary mark frame the investment decision. The base case assumes
      continued revenue growth at approximately 80% annually (deceleration from 147%), reaching approximately $540
      million ARR by year-end 2027, with an EBITDA loss narrowing to approximately -$80 million as compute efficiencies
      and operating leverage partially offset growth investment. At a 10× ARR multiple (consistent with high-growth
      profitable-trajectory SaaS), the base case implies a $5.4 billion valuation — essentially flat from the February
      2026 entry price, with no return for Series E investors on this timeline. To generate a 2× return from the $5.3
      billion entry, revenue would need to reach approximately $1 billion ARR by 2027 with a 10× multiple, requiring
      sustained 100%+ growth.

      The bull case assumes GWM-1 robotics and autonomous vehicle contracts begin contributing $100-200 million in
      incremental ARR by 2027, total ARR reaches $900 million to $1 billion, EBITDA losses narrow to -$50 million, and
      the company achieves a 12-15× ARR multiple justified by world model infrastructure positioning. This scenario
      supports a valuation of $10.8-15 billion in 2027, delivering 2-3× returns from Series E. The bear case — triggered
      by copyright litigation adverse ruling, competitive margin compression from Google/Kling, or revenue deceleration
      — assumes 2027 ARR of $180-220 million at a 7-8× multiple due to elevated risk discount, implying a valuation of
      $1.3-1.8 billion and a significant markdown from the Series E entry.

      The overall recommendation is STRETCHED / CONDITIONAL PASS. The valuation is defensible at the high end of a
      plausible revenue range, supported by exceptional growth trajectory and strategic investor quality — but it
      requires resolution of five diligence gaps before capital commitment: (1) audited GAAP financials to resolve the
      Getlatka/Sacra revenue discrepancy; (2) gross margin and unit economics disclosure; (3) quantified litigation
      exposure and legal strategy review; (4) GWM-1 robotics commercial pipeline metrics; and (5) key-person succession
      plan. The risk rating is HIGH given the EBITDA loss profile, litigation overhang, and multiple sensitivity to
      unaudited revenue figures.
