callouts:
  - calloutType: risk
    title: Revenue Estimate Discrepancy Is the Valuation's Achilles Heel
    body: >-
      The $5.3 billion Series E valuation implies an ARR multiple ranging from 18× (Getlatka's $300 million) to 59×
      (Sacra's $90 million) — a 3.3× spread that is not a rounding error. If Sacra's figure reflects GAAP-recognized
      revenue and Getlatka reflects contracted or bookings-based ARR, the gap may be partially explainable by deferred
      revenue or recognition timing. But even under the most favorable Getlatka interpretation, Runway is priced at a
      slight premium to SaaS benchmarks and requires continued 100%+ growth to justify the multiple. The $5.3 billion
      entry price has essentially zero margin of safety — investors are paying for execution that has not yet been
      audited.
    claimRefs:
      - CV010
      - CV011
      - CV024
      - CV025
      - CV038
  - calloutType: risk
    title: 'Stability AI Precedent: Cautionary Tale for Compute-Heavy AI'
    body: >-
      Stability AI's trajectory from $1 billion valuation (2022-2023) to severe financial distress within 18-24 months —
      driven by open-source competition, inability to monetize at scale, and high compute costs — provides a directly
      relevant cautionary precedent for Runway. Both companies rely on expensive GPU compute, face open-source
      alternatives, and compete against big-tech incumbents with structural compute and distribution advantages.
      Runway's stronger revenue trajectory and more sophisticated enterprise go-to-market differentiate it from
      Stability AI, but the fundamental cost-structure risk is analogous. A revenue deceleration scenario following
      competitive compression by Google Veo or Kling could trigger a similar rapid valuation collapse.
    claimRefs:
      - CV021
      - CV039
      - CV045
  - calloutType: insight
    title: 'GWM-1 Robotics: The Multiple Expansion Bet'
    body: >-
      Every AI video market analyst report reviewed sizes the creative video generation market at $1-4.5 billion as of
      2025. If Runway's world model TAM expansion thesis is correct — that GWM-1 Robotics generates synthetic training
      data for robot policy development, a market independent of creative tools — the total addressable market grows by
      an order of magnitude. Enterprise robotics contracts carry $500K-$10M+ annual contract values, compared to
      $3K-$30K for current studio partnerships. One confirmed $50M ARR contribution from GWM-1 Robotics by 2027 would
      materially change the bull case probability from 30% to 50%+. This is the diligence item with the highest option
      value.
    claimRefs:
      - CV031
      - CV032
      - CV042
  - calloutType: assumption
    title: All Valuation Analysis Is Estimate-Based Without Audited Financials
    body: >-
      Every quantitative conclusion in this valuation chapter — revenue multiples, EBITDA loss, scenario ARR
      projections, and comparable benchmarks — is derived from third-party aggregators (Getlatka, Sacra, ElectroIQ,
      BayelsaWatch), independent analyst estimates, and news reports. Runway has not publicly filed audited financial
      statements, disclosed recognized revenue, or provided investor-grade financial metrics as of the May 2026 research
      date. Capital allocation decisions must be conditioned on obtaining audited statements and a primary data room
      review. Treating this chapter's quantitative outputs as investment-grade precision would be a material error in
      diligence process.
    claimRefs:
      - CV008
      - CV010
      - CV011
      - CV012
      - CV040
