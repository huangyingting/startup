  - id: revenue-multiple-analysis
    title: Revenue Multiple Analysis and Comparable Benchmarks
    body: >-
      Runway's ARR multiple at the Series E varies dramatically depending on which revenue estimate is used as the
      denominator. On Getlatka's $300 million ARR estimate (reportedly reached in October 2025), the $5.3 billion
      valuation implies approximately 18× ARR — within the elevated range for high-growth AI software but not extreme by
      2024-2025 AI market standards. On Sacra's $90 million ARR estimate for June 2025, the implied multiple rises to
      approximately 59×, which would represent a price more consistent with frontier AI laboratory valuations (Anthropic
      at approximately 21× on $850 million ARR) than with video software tools. Even at the intermediate Sacra estimate
      of $70 million ARR for year-end 2024, the April 2025 Series D at $3.3 billion implies a 47× multiple — suggesting
      that either the market is pricing in substantial near-term growth, or Sacra's estimates materially understate
      Runway's actual ARR.

      Comparable private company benchmarks provide mixed context. ElevenLabs achieved a $3 billion valuation at $90
      million ARR in 2024 — an implied multiple of approximately 33× for voice AI. Midjourney, the image AI leader,
      commanded an estimated $10 billion valuation at approximately $200 million in annual revenue, implying 50×
      multiple — but Midjourney is profitable with no external venture funding, a fundamentally different risk profile.
      Anthropic raised at an approximately 21× multiple on $850 million ARR, but Anthropic's addressable market (LLMs as
      infrastructure) is wider than Runway's current video tools market. Stability AI, a cautionary comparable, peaked
      at a $1 billion valuation in 2022-2023 before facing financial difficulties in 2024 — demonstrating that even
      well-capitalized generative AI companies can see rapid value destruction when competitive pressures intensify and
      the cost structure outpaces revenue.

      High-growth SaaS benchmarks from the 2024-2025 public market environment typically yield 8-15× ARR multiples for
      companies growing at 50-100% annually. Runway's claimed 147% YoY growth rate (2024-2025 per Getlatka) would
      justify a premium above this range, but the absence of audited financials, gross margin disclosure, and recognized
      revenue schedules means the premium relies entirely on self-reported and aggregator-estimated metrics rather than
      investor-grade financial statements.
