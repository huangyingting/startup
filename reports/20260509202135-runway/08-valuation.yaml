    - type: private-evidence-only
      severity: critical
      topic: Audited GAAP financials and recognized revenue
      missingEvidence: >-
        No audited income statement, revenue recognition schedule, or gross margin is publicly available for Runway. The
        3.3× discrepancy between Getlatka ($300M ARR) and Sacra ($90M ARR) for the same 2025 period cannot be resolved
        without audited figures. Runway declined to confirm revenue to Crunchbase in February 2026.
      whyItMatters: >-
        The entire valuation case — and whether the Series E is 18× or 59× ARR — depends on which revenue estimate is
        accurate. A 3× error in the denominator creates a 3× error in the multiple, which would swing the valuation
        stance from 'reasonable premium' to 'highly speculative frontier AI pricing.'
      diligencePath: >-
        Request audited financial statements for FY2023, FY2024, and FY2025 as NDA-gated data room materials. Obtain
        revenue recognition policy, ARR definition (bookings vs. recognized), and deferred revenue schedule. Compare
        GAAP recognized revenue to all third-party estimates.
      relatedQuestionRefs:
        - QV004
        - QV005
        - QV008
        - QV009
        - QV030
      relatedTableRefs:
        - TV001
        - TV002
    - type: missing-source
      severity: material
      topic: GWM-1 Robotics commercial pipeline and ARR contribution
      missingEvidence: >-
        GWM-1 (launched December 2025) robotics and avatars variants have no disclosed commercial contracts, ARR
        contribution, or enterprise pipeline metrics as of the May 2026 research date. The world model TAM expansion
        thesis is the primary justification for the premium above video tool benchmarks.
      whyItMatters: >-
        Without commercial evidence, the world model expansion is a narrative bet worth at most a modest option premium
        above the video tool baseline. If GWM-1 Robotics is not generating revenue by mid-2026, the bull case
        probability falls significantly and the base case multiple should compress to reflect a video-only business.
      diligencePath: >-
        Request GWM-1 enterprise pipeline, signed LOIs or contracts, and any bookings from Robotics/Avatars variants.
        Conduct reference calls with at least three target enterprise robotics or AV customers to assess buying intent
        and contract value.
      relatedQuestionRefs:
        - QV019
        - QV025
        - QV028
      relatedTableRefs:
        - TV005
        - TV006
    - type: missing-source
      severity: material
      topic: Copyright litigation damages quantification
      missingEvidence: >-
        The artists class action lawsuit in the Northern District of California has not produced a publicly disclosed
        damages claim or settlement negotiation status. No independent legal analysis of Runway's litigation exposure is
        available in public sources.
      whyItMatters: >-
        At the Anthropic $1.5 billion precedent for pirated-library training data, an adverse ruling could exceed
        Runway's current cash position and require data exclusion that degrades model quality — a dual financial and
        technical risk that is not priced into the current $5.3 billion valuation.
      diligencePath: >-
        Commission independent IP litigation counsel for exposure analysis; review N.D. Cal. court docket via PACER for
        all filings, expert disclosures, and scheduling orders; obtain Runway's outside counsel opinion on defense
        prospects under strict NDA.
      relatedQuestionRefs:
        - QV013
        - QV027
      relatedTableRefs:
        - TV006
    - type: missing-source
      severity: minor
      topic: Adobe's dual investor and competitor role; CoreWeave contract terms; exit mechanisms
      missingEvidence: >-
        Three secondary evidence gaps remain open: (1) Adobe's Series E investment and preferred AI creativity partner
        arrangement creates a complex incentive structure that is not documented in any public conflict-of-interest
        policy or partnership agreement; the terms of the exclusivity arrangement are not disclosed. (2) CoreWeave's
        contract pricing, commitment duration, and penalty clauses for the GB300 NVL72 agreement are not disclosed,
        making it impossible to independently assess Runway's compute cost trajectory. (3) No exit mechanism or timeline
        has been disclosed by Runway or its investors; the 37-investor syndicate suggests eventual IPO, but no S-1
        filing or roadshow indication exists.
      whyItMatters: >-
        Adobe's conflict of interest could affect the reliability of the preferred API partnership and Create Cloud
        distribution channel if Adobe's competitive priorities shift. CoreWeave contract terms drive the burn rate
        trajectory and profitability timeline. Exit mechanism uncertainty affects return modeling and liquidity planning
        for investors.
      diligencePath: >-
        Request the full Adobe partnership agreement terms including exclusivity scope, duration, and competitive use
        restrictions. Obtain CoreWeave contract pricing schedule and commitment terms. Ask management for the preferred
        exit scenario timeline and any banking mandates or roadshow preparation status.
      relatedQuestionRefs:
        - QV026
        - QV028
        - QV030
      relatedTableRefs:
        - TV006
