          No disclosed EBITDA breakeven target, gross margin improvement roadmap, or exact cash balance; Sacra $155M
          2024 EBITDA loss implies high burn; CoreWeave commitment economics unknown
        - >-
          Without a profitability roadmap, investors are underwriting an open-ended capital call; if growth decelerates
