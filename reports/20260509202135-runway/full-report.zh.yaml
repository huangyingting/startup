      - number: '3.5'
        title: 竞争风险、威胁与战略展望
        blocks:
          - type: paragraph
            body: >-
              Runway 面临四类结构上不同的竞争风险，尽调投资人需要分别评估。

              算力规模型巨头：Google（Veo 3）和 Meta（Movie Gen，2024 年 10 月作为研究模型发布）拥有 Runway 无法靠自身积累追上的算力优势。Google 的优势还会被 YouTube
              分发放大：如果 Veo 接入 YouTube Shorts 和 Creator Tools，就会形成独立 AI 视频公司拿不到的封闭受众护城河。Veo 3.1 已经在 MovieGenBench
              的三个维度（文本对齐、视觉质量、音视频偏好）上领先所有对手，说明 Google 的质量追赶轨迹很强。

              中国模型的定价压力：Kling O1 的标准价为 $6.99/月，单秒成本比西方替代品低约 40%，并拥有 10,000+ 企业客户，在价格敏感市场构成可信的结构性威胁。Kling 第 10 个月做到 $100M
              年经常性收入（ARR），显示出少数西方创业公司才能匹敌的变现速度。西方企业买家可能遭遇监管摩擦（数据主权担忧、类似 CFIUS 的审查），从而限制 Kling 在部分细分市场的采用，但这不是可靠护城河。

              开源商品化：Wan 2.6 和 LTX-2 让自托管用户以零边际成本获得专业级视频生成。Wan 2.6 在 ELO 中排名 #8（约 1,130）且完全免费，LTX-2 还能跑在消费级 GPU
              上。托管基础设施和企业功能（SLA、合规、支持）可以为没有 GPU 资源的买家维持商业平台价值，但开源会给准专业用户层的定价权设上限。

              法律与训练数据风险：Runway 仍面临艺术家集体诉讼，原告指控其未经授权在 AI 训练中使用受版权保护作品，Runway 以合理使用抗辩。法院尚未作出终局性裁决。Runway
              拒绝披露训练数据来源，带来的不透明性会影响企业合规采购和欧盟 AI Act 对通用目的 AI（GPAI）的文档义务。不利裁决可能显著抬高训练数据授权成本，或限制未来模型训练。

              多工具工作流出现：到 2025 年中，市场观察者已经指出「AI 视频的单一工具时代已经结束」，用户把 Runway（英雄镜头）+ Kling（批量产出）+ Pika（快速测试）组合成混合工作流。这让 Runway
              更像高价值镜头的高端工具，而不是全栈方案，限制中端订阅者的潜在人均收入。娱乐行业 75% 的 AI 相关岗位削减率也说明，劳动力冲击可能引发政治和监管反弹，并影响所有 AI 视频平台。
