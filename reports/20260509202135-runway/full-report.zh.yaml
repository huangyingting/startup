    type: flow
    summary: >-
      操作流程展示电影创作者或企业创意专业人士如何使用 Runway 平台生产 AI 生成视频：从创意简报，到模型选择、生成、迭代编辑，再到最终导出或通过 API
      接入下游工作流。重点标出平台的模块化工具架构，以及人的创意方向与自动生成交汇的位置。
