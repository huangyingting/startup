              Runway 面临视觉艺术家提起的集体诉讼，以及围绕 Gen-3 训练数据集的 YouTube 抓取指控；截至 2026 年 5 月研究日，两者都仍在推进。Anthropic 先例——因盗版书库训练数据达成
              $1.5 billion 和解——显示潜在责任规模。合理使用若被不利裁定，可能要求剔除数据（削弱模型质量）、追加追溯许可成本，并吓退本身也是权利持有人的风险规避型企业客户。Runway
              没有可用的一手法律策略披露；尽调必须包括 PACER 案卷审阅和与法律顾问直接访谈。
