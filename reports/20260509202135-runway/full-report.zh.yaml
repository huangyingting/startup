      - number: '1.2'
        title: 创始人、管理层与治理
        blocks:
          - type: paragraph
            body: >-
              Runway 由三位 New York University Interactive Telecommunications Program（ITP）毕业生在 2018 年共同创办：Cristóbal
              Valenzuela（CEO）、Anastasis Germanidis（CTO）和 Alejandro Matamala-Ortiz（CPO）。三位创始人的背景横跨 AI
              研究、软件工程和创意产品设计，这种组合塑造了 Runway 的双重身份：既是研究实验室，也是面向创作者的产品公司。Valenzuela 是对外阐述 Runway 愿景的核心发言人，把 AI
              描述为艺术表达的新媒介；这一角色在 Lionsgate 合作公告以及 Series D、Series E 融资中最为明显。Germanidis 共同署名了 2023 年 12 月阐述 General World
              Model 研究计划的基础论文，并负责公司的技术研究方向。Matamala-Ortiz 负责产品战略和设计。公司新闻稿或本次研究审阅的任何公开来源都没有披露 Runway
              的完整董事会构成、治理结构或独立董事席位。这是一个重大的治理信息缺口。潜在投资者应单独核查创始三人组带来的关键人集中风险，尤其是 Valenzuela
              兼任首席对外发言人和战略负责人这一点。本章审阅的公开来源未发现重大管理层离职。
