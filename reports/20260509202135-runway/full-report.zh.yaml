  - number: 5
    title: 产品与技术
    sections:
      - number: '5.1'
        title: 产品套件概览
        blocks:
          - type: paragraph
            body: >-
              自 2022 年 Gen-1 以来，Runway 的商业产品套件经历了六次清晰的代际跃迁，每一代都在解决上一代限制。Gen-1 引入视频到视频风格迁移，是公司的首个公开视频生成模型。Gen-2（2023
              年）引入文本生成视频，并推动收入从 $4.5 million（2022 年）加速到 $48.7 million ARR（2023 年）。Gen-3 Alpha（2024 年 6 月）以约每秒 10
              个积分交付电影级控制；Gen-3 Alpha Turbo 则以约每秒 5 个积分提供快 7× 的版本。2025 年 3 月 31 日发布的 Gen-4
              带来核心叙事突破：无需微调或额外模型训练，就能在跨场景中精准保持角色、地点和物体一致，让电影人可以在连续叙事中从多个视角重新生成角色。2025 年 12 月推出的 Gen-4.5
              在此基础上扩展到原生音频生成、音频编辑和多镜头视频合成，可以生成具备角色一致性和复杂机位的一分钟视频。TechCrunch 在 GWM-1 发布时报道称，Gen-4.5 在 Video Arena 排行榜上超过
              Google 和 OpenAI。Act-One（2024 年 10 月 22 日）加入无需动捕的角色动画，完全由演员的单机位表演驱动——不需要专门设备——后续产品 Act-Two 已向付费订阅者开放。2025 年
              12 月发布的 GWM-1 推出公司首个 General World Model 系列，包含三个专门变体：GWM Worlds（24fps、720p 的可探索 3D 环境）、GWM
              Avatars（带唇同步和面部表情的对话角色）以及 GWM Robotics（通过 Python SDK 为机器人策略开发提供合成训练数据）。更广泛的创意工具套件包含 30 多个工具，包括 Motion
              Brush、AI Inpainting、Green Screen AI、Frame Interpolation、Director Mode 和 Image-to-Image 生成。截至 2025 年 12
              月，订阅定价从 Free 档（125 个一次性积分）到 Basic（$15/月，625 积分）、Standard（$35/月，2,250 积分）、Pro（$95/月，6,750 积分）和
              Unlimited（$145/月）不等。
