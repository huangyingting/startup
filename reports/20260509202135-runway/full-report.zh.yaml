  - number: 2
    title: 市场分析
    sections:
      - number: '2.1'
        title: 市场边界与范围
        blocks:
          - type: paragraph
            body: >-
              Runway 的可触达市场可以分成三层嵌套范围。最窄口径是 AI 视频生成软件，即把文本、图像或既有素材转成合成视频的工具；这也是分析机构最直接测量的细分市场。2025 年这一市场的估计从 $716.8
              million（Fortune Business Insights，不含分析和安全用例）到 $1.8 billion（Apatero，包含开源平台和 API 生态）不等。更宽口径加入 AI
              驱动的视频分析、内容审核和自动剪辑工具；Grand View Research 估算该市场 2025 年为 $4.6 billion，到 2033 年增至 $42.3
              billion。最宽口径则是包含图像、音频和视频生成的生成式 AI 创意工具，市场规模进入数百亿美元级别。

              不属于 Runway 直接可触达市场的包括：（1）Adobe Premiere Pro、DaVinci Resolve 等传统视频编辑软件，它们使用非生成式 AI
              做调色或降噪；（2）视频监控和安全分析系统；（3）视频流基础设施（CDN、编码）。这些相邻行业有时会出现在宽口径分析估算中，从而抬高 TAM 数字。

              核心需求机制是用 AI 推理替代传统视频制作劳动力：过去为一次专业视频拍摄支付 $50,000–$150,000 的营销团队，如今可以用数百美元的 AI
              工具产出质量相近的素材。这种成本压缩是所有细分市场的首要采用驱动，也解释了为什么营销和广告在市场支出中占比最高（按 Fortune Business Insights，为 33.9%）。

              Runway 宣称通过 GWM-1（Worlds、Robotics、Avatars）扩展到世界建模，这打开了完全不同的需求池：用于机器人策略训练、自动驾驶仿真和科学发现的合成数据。任何 AI
              视频市场估算都尚未覆盖这一用例；相对于创意视频工具，它可能把 TAM 扩大数个数量级。
