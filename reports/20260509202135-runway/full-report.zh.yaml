          - type: callout
            title: 开源扩散压住专业消费者细分的定价权
            body: >-
              开源 AI 视频模型（LTX-2、Wan 2.2）在 2025 年约占全部 AI 视频生成的 40%，尽管它们可以免费使用。商业平台仍主导收入，但开源份额在
              专业消费者市场设定了价格上限：不需要企业支持或一致性保证的用户，可以用边际成本生成视频。这一结构类似数据库和基础设施中的企业软件与开源软件格局——商业既有厂商能守住企业市场份额，却无法在消费层随意提价。Runway
              的护城河必须越来越多来自模型质量差异和企业功能（一致性、安全、支持、合规），而不能只靠访问入口。
