      - number: '5.6'
        title: 展品
        blocks:
          - type: callout
            title: 自回归世界模拟：真实的架构差异化
            body: >-
              GWM-1 的自回归扩散架构——基于此前帧和用户控制输入逐帧生成——确实不同于标准的基于扩散的视频生成。该方法支持 24fps、720p
              的实时交互式模拟，让交互式世界导航和实时机器人策略测试在计算上可行。GWM-1 通过在特定领域数据上对 Gen-4.5 进行后训练构建，把 Runway 既有模型投入转化成三个领域专门产品。Runway CTO
              将其描述为通往通用模拟的正确架构路径。比 Google 的 Genie-3 更「通用」是公司自称且未经验证，但这一架构路径与已发表的 AI 世界模型研究一致。
            calloutType: strength
            claimRefs:
              - CE017
              - CE018
              - CE027
              - CE028
              - CE030
          - type: callout
            title: 角色一致性突破：Gen-4 打开 Hollywood 叙事用例
            body: >-
              Gen-4 无需微调或额外模型训练，就能在跨场景中保持角色、地点和物体一致，这是专业电影制作的关键技术解锁。在 Gen-4 之前，无法在剪辑之间保留角色身份，是专业电影人无法把 AI
              视频生成用于叙事工作的主要原因。Gen-4.5 进一步加入原生音频，允许单一模型完成一分钟多镜头制作。2025 年 12 月，Gen-4.5 在 Video Arena 排行榜上位居 Google 和
              OpenAI 之上。该一致性突破由视觉参考输入支撑，而不是模型微调，消除了 Hollywood 企业采用的一大障碍。
