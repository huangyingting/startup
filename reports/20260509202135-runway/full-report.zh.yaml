      - number: '2.5'
        title: 监管环境
        blocks:
          - type: paragraph
            body: >-
              Runway 面临两条监管风险线：欧盟 AI 专项监管，以及美国版权法不确定性。

              EU AI Act（Regulation 2024/1689）自 2025 年 2 月起禁止性条款生效，按风险等级划分 AI 系统。生成式 AI
              视频工具不属于不可接受风险禁令范围（该范围覆盖操纵、社会评分和生物识别监控），但高能力基础模型面临 General-Purpose AI（GPAI）义务，包括透明度要求；若模型训练数据集超过 10^25
              FLOPs，还需系统性风险评估。考虑到规模，Runway 模型很可能受 GPAI 条款覆盖。合规要求记录训练数据来源，这一点与 Runway 正在进行的版权诉讼直接交叉。

              美国没有同等的综合 AI 法案。围绕 AI 训练数据的版权法不确定性正在多个案件中诉讼。Runway
              在抗辩中引用合理使用，但法院尚未作出决定性裁判。不利结果可能要求公司追溯授权历史训练数据，或限制未来训练管线，从而提高模型训练成本。

              MarkNtel Advisors 报告把伦理和法律风险列为 AI 视频生成市场的首要挑战，并指出未经授权使用受版权保护的视频内容训练模型，可能引发法律行动，阻碍市场增长。Fortune Business
              Insights 同样将监管和法律不确定性列为首要市场约束，指出关于所有权和数据使用的明确法律缺位，让采用更难，尤其是在内容规则严格的司法辖区。

              正面因素是，印度（IndiaAI Mission，2024–2029 年承诺 $1.2 billion）、英国（AI Opportunity Action Plan）和美国政府都在积极资助 AI
              基础设施和发展；即便合规要求上升，这仍为 AI 能力投资创造顺风。Runway 聚焦受监管行业的企业客户（制片厂、医疗培训），意味着监管合规可能相对于合规较弱的开源替代品，变成竞争优势。
            claimRefs:
              - CM031
              - CM032
              - CM033
              - CM034
      - number: '2.6'
        title: Runway 的可服务市场与可获取市场
        blocks:
          - type: paragraph
            body: >-
              用自下而上的视角看规模：Runway 在狭义 AI 视频生成市场内可直接服务的市场（SAM）由商业 / 企业细分构成；按 Apatero 的细分拆分，这一部分占市场 42%，在 $1.8 billion
              总市场中约为 $756 million。加入开发者 / API 细分（27%）后，SAM 扩至约 $1.2 billion。按早期 2025 年 Sacra 和 Deadline 估计的 $100–300
              million 年化收入，Runway 约持有自身 SAM 的 8–25%；区间很宽，反映市场规模分母和 Runway 未披露收入都存在不确定性。

              Runway 近期（2025–2027）的 SOM（可获取市场）受企业交付能力约束：一年内能导入企业 AI 视频合同的广告代理、制片厂和科技公司数量有限。按 Apatero 估计，Runway 月活用户约 15
              million，叠加免费增值 到付费转化，用户基数已经很大；真正的约束是单用户变现深度。

              世界建模扩张更像 SAM 延伸，而不是进入一个独立市场。机器人合成数据市场预计到 2028 年达到 $2.1 billion（MarketsandMarkets 对广义合成数据生成的预测，CAGR
              45.7%）。Runway 的 GWM Robotics 瞄准其中一部分：用于物理机器人的策略训练数据；公开分析报告尚未单独测算这块市场。企业沟通正在进行，但尚未披露收入。

              Runway 市场规模判断中最关键的不确定性，是生成式 AI 创意工具的企业采用曲线。McKinsey 报告称，截至 2025 年中，只有三分之一组织开始规模化 AI
              项目，大多数仍在实验或试点。如果未来两年规模化比例升至 50–60%，Runway 这类工具需求可能出现阶跃式增长；如果受监管摩擦、既有厂商阻力或 ROI 不及预期影响而停滞，Runway 增速可能迅速放缓。
