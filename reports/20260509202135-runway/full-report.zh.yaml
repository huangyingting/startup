    rows:
      - - 收入动能异常强
        - 2024-2025 同比增长 147%；按 Getlatka，ARR 从 $3M（2021）增至 $300M（2025 估计）；企业客户名单包括所有主要电影制片厂、Chime、Robinhood、Allstate
        - 收入未经审计；Sacra 的 $90M ARR 意味着相较 Sacra 的 2024 年 $70M 仅增长 29%；没有可用 GAAP 损益表
        - 经审计 GAAP 收入确认 Getlatka 轨迹；毛利率 ≥50%；FY2025 ARR 增速确认高于 100%
      - - 世界模型 TAM 扩张
        - GWM-1（Dec 2025）打开机器人和 AV 合成数据市场；Characters API 瞄准企业虚拟形象用例；CoreWeave GB300 NVL72 算力升级显示模型规模野心
        - 公开财务中 GWM-1 收入贡献为零；机器人市场仍早期，且由 Tesla、Boston Dynamics、Agility 的内部努力主导；从研究转商业尚未验证
        - 确认 GWM-1 Robotics 企业合同并披露 ARR；投资者材料发布多年管线
      - - 战略投资者质量与分发
        - General Atlantic（连续两轮领投）、NVIDIA（三轮）、Adobe Ventures（首选 API 合作伙伴）、AMD Ventures（算力多元化信号）
        - Adobe 是直接产品竞争者（Firefly Video 集成进 Premiere Pro）；NVIDIA 投资带来依赖，不是护城河；投资者下一轮可能下调估值
        - 合作条款记录 Adobe 投资者角色与竞争者角色已清晰隔离；确认 NVIDIA 算力访问有优先待遇
      - - 企业黏性与客户集中度
        - 企业账户包括「所有主要电影制片厂」，金融科技、保险、制造等行业均有已确认品牌客户；Lionsgate 是最高知名度具名合作
        - TheWrap 称 Lionsgate 合作存在复杂因素：片库太小、演员权利问题；企业流失率未知；top-10 客户集中度未披露
        - 披露净收入留存 >120%；企业品牌客户留存 >90%；top-10 客户占 ARR <40%
      - - 自研世界模型带来的竞争护城河
        - 'Gen-4.5 在 Artificial Analysis 文生视频基准上排名 #1（1,247 Elo）；独立基准显示角色一致性和多角度连贯性同类最佳'
        - >-
          OpenAI Sora 可生成 60 秒 4K 视频，Runway 上限为 16 秒 1080p；Google Veo 3 单次生成集成原生音频；Kling 以相近质量压低价格；开源 Stable Video
