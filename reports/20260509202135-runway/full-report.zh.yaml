              Kling O1 的标准价为 $6.99/月，比 Runway 的 $12/月入门档低 42%；再叠加单秒 API 成本低约 40%、10 个月做到 $100M
              ARR，这不是周期性挑战，而是结构性定价挑战。Kling 的定价可以持续，因为 Kuaishou 是中国上市科技公司，拥有规模化基础设施优势，且并不以短期利润率为优化目标。Runway
              的应对空间有限：跟价会显著压缩利润率；维持高端定价则需要持久的质量溢价，而 ELO 排行榜上的 27 分差距（Runway #1、Kling #4）未必能在季度模型更新中守住。多工具工作流进一步侵蚀 Runway
