  - id: TE002
    title: 技术与运营架构评估
    columns:
      - 层 / 组件
      - 技术 / 方法
      - 作用
      - 关键依赖
      - 风险等级
    rows:
      - - 基础模型（Gen-4.5）
        - 基于扩散的视频生成；Transformer 架构（推断）
        - 核心视频生成：文本 / 图像到视频、多镜头合成、原生音频
        - 大规模视频训练数据；用于训练和推理的 GPU 算力
        - 高——训练数据诉讼；模型质量竞争
      - - 基础模型（GWM-1）
        - 自回归扩散；基于 Gen-4.5 底座后训练
        - 为 Worlds、Avatars、Robotics 提供逐帧交互式模拟
        - 领域专用微调数据；推理算力需求显著高于批量扩散
        - 高——规模化算力成本；基准不透明
      - - 训练数据管线
        - 未披露；据称大规模抓取网络视频（Gen-3）
        - 模型能力的底座；训练语料决定模型质量上限
        - 权利已清理，或可用合理使用抗辩的训练数据语料
        - 关键——版权诉讼进行中；未发布数据卡
      - - 算力基础设施
        - 云 GPU（CoreWeave 合作；可能辅以 AWS/GCP）
        - 规模化训练和推理算力
        - CoreWeave 和主流云 GPU 容量；Nvidia 硬件供应
        - 中——GPU 供应链；CoreWeave 交易对手风险
      - - 浏览器界面
        - 云端渲染的浏览器 Web 应用
        - 面向终端用户的创意编辑与生成；无需本地算力
        - CDN、Runway 云基础设施正常运行时间
        - 低——标准 SaaS 基础设施风险
      - - REST API 接入（Gen-4 Turbo / Gen-4 Images）
        - REST API，提供 Build 和 Enterprise 层级
        - 开发者和企业可嵌入外部产品
        - API 稳定性、速率限制、版本承诺
        - 中——API SLA 与定价透明度缺口
      - - Python SDK（GWM Robotics）
        - Python SDK；申请后可用
        - 为机器人策略训练和测试生成合成数据
        - SDK 可用性、企业合作伙伴接入
        - 中——早期访问；披露的牵引力有限
      - - 信任与安全层
        - 视觉内容审核；C2PA 内容溯源水印
        - 筛查生成内容；建立溯源链，支撑下游问责
        - 下游平台对 C2PA 的采用；审核准确率
        - 中——C2PA 尚未普遍采用；可能存在审核缺口
    enumerationScope:
      coverage: partial
