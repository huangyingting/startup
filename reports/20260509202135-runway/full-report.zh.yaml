      - number: '7.2'
        title: 竞争风险
        blocks:
          - type: paragraph
            body: >-
              Runway 所在市场正在吸引全球最大科技公司投入不成比例的资本和人才，在算力规模、分发触达和产品整合上形成结构性劣势。OpenAI Sora 在付费层可生成最长 60 秒视频，而 Runway 的
              Gen-4.5 上限为 16 秒，并支持 4K 分辨率，还背靠 Microsoft Azure 巨大的算力基础设施。Google 的 Veo 2 和 Veo 3 嵌入 YouTube
              创作者生态，直接接入全球最大视频发布平台，形成 Runway 难以复制的分发和获客护城河。DeepMind 的研究能力还进一步加快 Google 的模型迭代。

              中国竞争者是被低估的结构性威胁。Kuaishou 开发的 Kling 以明显更低价格提供相近的视频生成质量，可以在全球范围内进攻价格敏感的创作者和中小企业。中国模型的进步速度——尤其是 Kling 和 Wan
              Video——追平甚至超过 Runway 的生成节奏；美国若对中国 AI 工具采取出口管制，反而可能强化 Kling 在中国和中立市场的地位。Adobe Firefly 直接集成进 Premiere
              Pro，从创意工作流一侧加压：Adobe 既是 Series E 投资方，又是直接产品竞争者，形成复杂的合作伙伴兼竞争者关系，可能影响 Runway 的市场进入。Meta 的 Movie Gen
              已宣布成为娱乐领域 AI 视频的直接竞争产品。包括 Stability AI 的 Stable Video Diffusion 在内的开源模型，则为不需要托管基础设施的技术型用户提供边际成本为零的替代方案。
