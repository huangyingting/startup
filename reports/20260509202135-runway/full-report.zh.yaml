      - number: '4.5'
        title: 财务风险与尽调阻断项
        blocks:
          - type: paragraph
            body: >-
              在资本配置决策能够被有信心地承销之前，六类财务风险需要一手尽调。第一，算力成本依赖：Sacra 估计 Runway 2024 年 EBITDA 亏损约 $155 million，反映规模化 GPU
              推理成本；随着新一代高质量模型（Gen-4、Gen-4.5、GWM-1）每次输出消耗的算力显著增加，该成本下降速度不及 Runway 收入增长。Runway 与 CoreWeave
              的协议提供了一定基础设施成本可见度，但没有消除供应商集中风险。第二，版权诉讼敞口：Runway 面临艺术家发起的集体诉讼，指控其未经授权使用受版权保护作品训练模型，Runway
              以合理使用抗辩；法院尚未作出终局性裁决。不利裁决可能要求追溯性授权费、显著提高未来训练数据成本，或限制 Runway 模型训练范围——这些都会削弱当前估值隐含的毛利率轨迹。第三，Lionsgate
              合作复杂化：The Wrap 在 2025 年报道称，Lionsgate 合作遭遇未预见挑战，Lionsgate 片库被描述为不足以创建最初设想中雄心勃勃项目所需的大规模 AI 模型。虽然 Lionsgate
              重申合作仍在进行，但这些被报道的限制削弱了 Runway 定制模型工作室合作收入流的可扩展性。第四，收入确认和指标质量风险：Sacra 的 $44 million GAAP 收入与 Getlatka 的 2024
              年 $121.6 million ARR 之间存在重大缺口，意味着市场按哪个指标才「真实」来给 Runway 估值，会显著影响估值倍数。第五，毛利率未知：Runway
              未披露收入成本、毛利率或任何损益表拆分。没有这些数据，资本密集度分析完全依赖第三方估算（Sacra 的 EBITDA），而该估算本身来源单一且未经审计。第六，收入集中度：Runway
              的企业客户基础包括「所有主要电影公司」和知名品牌，但前 10 大客户集中度以及对应续约风险均未知。
