          - type: callout
            title: Lionsgate 交易波折暴露企业模型脆弱性
            body: >-
              The Wrap 在 2025 年记录的 Lionsgate 合作波折，暴露 Runway 企业工作室战略中的结构性弱点：用单一工作室片库训练出的定制模型，不足以支撑雄心勃勃的大规模制作。专家判断「即使
              Disney 片库也太小，无法创建模型」，说明 Runway 面向 Hollywood 工作室的企业价值主张，要么需要聚合多家工作室片库（抬高权利复杂度），要么要把工作室定制模型与 Runway
              通用基础模型结合（稀释专有优势）。围绕演员权利的版权复杂性进一步增加法律摩擦。非独家交易结构意味着 Lionsgate 可以同时接触多家 AI
              供应商，该工作室也确认正在这么做。由于没有其他公开点名的工作室客户，Lionsgate 的复杂情况是企业收入逻辑中的集中风险。
            calloutType: risk
            claimRefs:
              - CU020
              - CU021
              - CU022
              - CU023
              - CU024
          - type: callout
            title: 缺少企业留存指标形成尽调盲区
            body: >-
              Runway 未公开披露 NRR、GRR、流失率、订阅续约率、队列留存数据或分细分市场 ARPU。对于 $121.6M ARR（2024 年）的公司，这些都是成熟投资人评估收入质量所需的标准企业 SaaS
              指标。三件事叠加：（1）未披露留存指标，（2）唯一具名企业客户的交易已遭遇有记录的复杂情况，（3）个人创作者细分市场面临低价替代品的激烈价格竞争——由此形成显著尽调盲区。基于积分的模式可能通过非自愿升级而不是真实留存掩盖流失，因此独立指标披露尤其重要。
            calloutType: risk
            claimRefs:
              - CU030
              - CU034
              - CU036
              - CU046
          - type: callout
            title: 积分经济模型：结构性 ARPU 扩张伴随竞争脆弱性
            body: >-
              基于积分的用量模型是一套双刃剑机制。正面看，专业创作者在项目中途耗尽积分并升级到更高档位，会形成自然增购压力，是结构性 ARPU 扩张驱动因素。负面看，它让 Runway 暴露在直接成本比较中：Standard
              计划用户每月花 $35 只能生成约 62 秒 Gen-3 Alpha，单秒成本（$0.56）清晰可见，也很容易与 Kling AI 每秒 $0.07–$0.14 的 API 定价或 Pika
              免费档对标。对休闲用户和价格敏感用户——也就是最宽的漏斗细分——随着竞争对手模型质量提升，这套经济账会推动他们迁移到更低成本替代品。Runway 在该细分市场的防线是质量差异化和工具套件广度，而不是价格。
            calloutType: insight
            claimRefs:
              - CU029
              - CU034
              - CU043
              - CU044
              - CU045
              - CU046
  - number: 7
    title: 风险
    sections:
      - number: '7.1'
        title: 法律与监管风险
        blocks:
          - type: paragraph
            body: >-
              Runway 最急迫的法律敞口来自两条并行的版权相关程序。第一，视觉艺术家在加州北区联邦法院提起集体诉讼，将 Runway 与其他 AI 被告一并列名，指控其训练数据未经授权纳入受版权保护的艺术作品，并违反
              DMCA。Runway 的抗辩押在合理使用原则上，但该抗辩尚未经历庭审检验；在 2025 年相近判例中，法院在 Bartz v. Anthropic（训练被认定具转换性 / 属合理使用）和 Kadrey v.
              Meta（同样认定合理使用，但事实范围很窄）中得出不同结论，视频生成训练的结果仍有实质性不确定性。Copyright Alliance 报告称，截至 2025 年，针对 AI 公司的侵权诉讼已超过 70
              起；Anthropic 因盗版书库训练数据达成 $1.5 billion 和解，显示潜在责任规模可能很大。

              第二，404 Media 在 2024 年 7 月发布报告，并由 SiliconANGLE 和 TheOutpost 佐证，指称 Runway 使用一份内部电子表格抓取数千个 YouTube 视频用于 Gen-3
              训练，目标频道包括 Disney、Netflix、Sony、Pixar、Casey Neistat 和 Marques Brownlee。泄露文件显示，公司使用代理绕过 YouTube 服务条款；YouTube
              管理层将该抓取定性为明确违反服务条款。Runway 尚未公开披露 Gen-3、Gen-4 或 GWM-1 的训练数据构成。

              监管风险进一步叠加诉讼敞口。EU AI Act 于 2024 年通过，禁止性行为条款自 2025 年 2 月生效，对部署在 EU 市场的 AI 系统施加透明度和披露义务。高风险 AI
              系统义务（包括数据集质量要求、活动日志和文档要求）将于 2026 年 8 月和 2027 年 8 月生效。Runway 必须评估哪些系统符合该法案对高风险的定义。额外监管层还包括美国各州和 EU
              正在形成的深度伪造立法，以及与 Runway 好莱坞客户群交叉的演员形象权立法——Lionsgate 合作中已能看到这些复杂性。
