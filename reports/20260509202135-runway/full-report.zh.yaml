      - number: '4.4'
        title: 资本充足性与融资状况
        blocks:
          - type: paragraph
            body: >-
              Runway 的融资历史（详见公司概况章节）截至 2026 年 2 月已累计通过七次确认融资事件募得 $860 million。本章评估资本充足性时，前瞻视角最重要：2026 年 2 月的 $315
              million Series E 由 General Atlantic 领投，NVIDIA、Adobe Ventures、AMD Ventures、Fidelity、AllianceBernstein、Mirae
              Asset、Emphatic Capital、Felicis 和 Premji Invest 参与，投后估值 $5.3 billion，资金用途明确指向扩大研究能力、算力基础设施（包括与 CoreWeave
              达成的 GB300 NVL72 系统协议）以及扩张企业销售和 go-to-market。2025 年 4 月的 $308 million Series D 同样指定用于 AI 研究、招聘和 Runway
              Studios 扩张。按 Sacra 估算的 2024 年 EBITDA 烧钱 $155 million，以及累计融资 $860 million（其中 Series D 和 Series E 的大部分资金在
              2025 年和 2026 年初到账）测算，Series E 交割时的隐含现金头寸很可观——可能在 $400–$600 million 区间，具体取决于 2022 年 Series C
              以来的累计烧钱。公司未公开披露任何债务融资、可转债或项目融资义务。扩大的 Series E 财团——Adobe Ventures 和 AMD Ventures 加入，NVIDIA、General
              Atlantic、Fidelity 等老股东继续参与——显示 AI 算力和创意软件栈之间形成战略对齐，降低单一投资人关系限制 Runway
              战略方向的风险。但月度烧钱速度、准确在手现金，以及下一轮融资触发条件均未公开。CoreWeave 作为主要算力供应商构成供应商集中风险：CoreWeave 的财务稳定性或定价条款一旦恶化，可能实质影响
              Runway 的推理成本结构和产品路线图节奏。
