      - number: '7.5'
        title: 市场与执行风险
        blocks:
          - type: paragraph
            body: >-
              Runway 面向好莱坞企业客户的策略——以 2024 年 9 月宣布的 Lionsgate 合作为代表——已经早期遇阻。The Wrap 在 2025 年报道，Lionsgate 的 2
              万部片库作为独立训练语料，不足以支撑双方设想的雄心勃勃的生成式用例；围绕演员形象和附带权利的版权不确定性也制造了未解决的法律复杂性。这些发现发出警示：电影公司模型训练收入策略要规模化，可能需要更大的多电影公司片库和更清晰的监管框架。

              SAG-AFTRA 和 WGA 在 2023 年达成的劳资协议包含限制在工会覆盖制作中使用 AI 的条款，给希望在电影和电视工作流中部署 Runway
              工具的制片厂制造法律摩擦。据报道，制片厂内部法务部门正敦促在版权和艺人权利边界更清晰前保持谨慎，拖慢了企业采用速度。该动态也延伸到广告和商业制作领域，企业客户如果风险偏好较低，可能会因 AI
              生成内容训练来源的品牌安全担忧而退缩。

              随着中国竞争者以低价切入、开源替代品为技术型用户抹掉托管基础设施成本，AI 视频市场面临结构性商品化压力。价格战可能压缩 Runway 毛利率，而公司恰恰需要扩大毛利来靠近盈利。2024 年 7 月
              YouTube 抓取媒体报道带来的声誉风险——包括 SiliconANGLE、PC Gamer 和 TheOutpost 在内的媒体广泛跟进——可能降低大型媒体公司与 Runway
              签署企业合同的意愿；这些公司本身就是权利持有人。到 2025 年，深度伪造欺诈事件同比增加四倍，监管对 AI 视频平台实施内容认证措施的压力加大，可能带来技术和合规成本。
