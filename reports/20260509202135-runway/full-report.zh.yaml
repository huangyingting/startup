    title: 乐观 / 基准 / 悲观估值情景（2027 退出）
    columns:
      - 情景
      - 2027 ARR（$M）
      - YoY 增长假设
      - EBITDA 利润率
      - 退出 ARR 倍数
      - 隐含企业价值（$B）
      - 核心假设
      - 概率信号
    rows:
      - - 悲观情景
        - $180–220
        - 从 147% 减速至 25-35%；竞争侵蚀增长
        - –40% EBITDA（成本结构改善很小）
        - 7–8×（诉讼 + 近期亏损带来风险折价）
        - $1.3–$1.8B
        - 版权诉讼出现不利裁定或和解 >$500M；Kling / Google 大幅侵蚀消费者 / SMB 市场；GWM-1 未能商业化；收入质量更接近 Sacra 估计
        - 15% 概率信号 — 需要多个不利事件同时发生；如果诉讼和竞争同步加剧，则可能出现
      - - 基准情景
        - $480–580
        - 增长从 147% 减速至 70-80%；企业业务继续放量
        - –15% EBITDA（经营杠杆部分兑现）
        - 9–11×（AI + 增长溢价，部分盈利能力折价）
        - $4.3–$6.4B
        - 按 Getlatka 口径，收入轨迹延续但小幅放缓；Lionsgate 类问题限于个案；版权纠纷庭外和解；GWM-1 对收入有小幅贡献
        - 55% 概率信号 —— 如果增长轨迹属实且诉讼可控，这是最可能路径
      - - 乐观情景
        - $900–$1,100
        - 持续 100%+ 增长；GWM-1 Robotics 贡献 $100-200M 增量 ARR
        - –5% EBITDA（接近盈亏平衡；计算效率提升）
        - 12–15×（世界模型基础设施溢价）
        - $10.8–$16.5B
        - 到 2027 年，GWM-1 Robotics 签下多份 $5M+ 企业合同；版权诉讼被驳回或以 <$100M 和解；Runway Gen-5 在时长 / 分辨率上缩小与 Sora 的差距；企业 NRR >130%
        - 30% 概率信号 —— 需要世界模型逻辑落地、诉讼解决，并相对大厂持续保持竞争差异
    notes: >-
      情景概率是基于公开证据的定性信号，不是精算估计。2027 年 ARR 以据报道约 $300M 的 2025 年 ARR（Getlatka）为基数推算。所有情景都假设除常规 Series E
      优先权结构外没有重大稀释。退出倍数区间参考可比私营公司标记估值（Luma AI、ElevenLabs、Anthropic）以及相同增速下的公开 SaaS
      市场基准。悲观情景倍数计入未决诉讼和盈利能力担忧带来的显著风险溢价。数值仅用于投资框架示意。
    claimRefs:
      - CV041
      - CV042
      - CV043
      - CV009
      - CV012
      - CV021
      - CV037
  - id: TV006
    title: 最终尽调要求
    columns:
      - 主题
      - 缺失证据
      - 重要性
      - 尽调路径
      - 优先级
    rows:
      - - 经审计 GAAP 财务和毛利率
        - 没有任何年度的公开损益表、收入确认表或毛利率；Sacra（$90M）与 Getlatka（$300M）对 2025 年 ARR 的估计相差 3.3×
        - 整个估值逻辑取决于哪一个收入估计准确；若公司 ARR 为 $90M、估值 $5.3B，则倍数达 59× —— 即便按 AI 标准也属投机定价
        - 要求将 FY2023–FY2025 经审计财务报表作为 NDA 数据室材料提供；取得收入确认政策、ARR 定义和递延收入明细
        - 关键 — 出资承诺前必须阻断
      - - 版权诉讼风险量化
        - 没有独立法律分析量化艺术家集体诉讼的赔偿风险；未披露准备金或和解谈判状态；没有关于合理使用抗辩强度的法律意见
        - 不利裁决可能要求 $500M+ 追溯许可费、排除训练数据导致模型变差，或赔偿额超过现金头寸；Anthropic $1.5B 先例给出了量级
        - 委托独立 IP 诉讼律师分析案件；查阅 N.D. Cal. 案卷全部文件；在 NDA 下取得 Runway 外部律师对抗辩前景的意见
        - 关键 — 未量化的生死风险
      - - GWM-1 Robotics 商业管线
        - GWM-1 于 2025 年 12 月发布；未披露来自 Robotics 或 Avatars 变体的商业合同、企业管线或 ARR 贡献
        - 世界模型把 TAM 扩到机器人、AV 等场景，这是视频工具基准之上估值溢价的主要理由；没有商业证据时，它仍只是叙事下注
        - 要求提供 GWM-1 企业管线、已签 LOI 或合同，以及 Robotics / Avatars 变体的任何 ARR 订单；与 3+ 家目标企业参考客户核验
        - 高 — 承保乐观情景必须取得
      - - 客户集中度和净收入留存
        - 前十大客户收入集中度、企业客户数和 NRR 指标均未公开披露；Runway 有已命名 logo，但没有订阅数量或留存数据
        - 如果收入高度集中于 Lionsgate / 大型制片厂，一旦 Lionsgate 问题加深、制片厂削减支出或转向竞品，收入可能断崖下跌
        - 要求提供 FY2024 和 FY2025 前十大客户集中度、NRR 和 logo 留存率；与至少 5 家已命名企业客户做参考访谈
        - 高 — 评估收入质量必须取得
      - - 盈利时间表和现金头寸
        - 未披露 EBITDA 盈亏平衡目标、毛利率改善路线图或准确现金余额；Sacra 估计 2024 年 EBITDA 亏损 $155M，意味着烧钱速度高；CoreWeave 承诺的经济性未知
        - 没有盈利路线图，投资人等于承接一张开放式资本调用单；如果盈亏平衡前增长放缓，稀释性降估融资风险很实质
        - 要求提供 3 年财务模型，涵盖毛利率轨迹、EBITDA 盈亏平衡路径，以及 Q1-Q2 2026 月度烧钱速度；取得 CoreWeave 合同的定价和承诺结构条款
        - 高 — 评估融资风险必须取得
      - - 领导层接班和团队厚度
        - 公开来源未确认 CFO、VP Engineering、VP Sales 或其他 C-suite 高管；CEO Valenzuela 是主要外部发言人和交易推动者；董事会构成未披露
        - Valenzuela 身上的关键人集中度让投资人关系、企业合作和产品战略延续性更脆弱；董事会治理未知
        - 要求提供组织架构图和 C-suite 履历；取得董事名单和治理章程；与联合创始人 Matamala-Ortiz、Germanidis 做参考访谈，核验 Valenzuela 接班规划
        - 中 — 后期私营公司标准尽调要求
    notes: 这些尽调要求来自截至 2026 年 5 月公开证据中的缺口；具体请求应按交易结构、NDA 条款和投资人权利协议调整。
    claimRefs:
      - CV010
      - CV011
      - CV012
      - CV036
      - CV037
      - CV038
      - CV039
      - CV041
      - CV042
      - CV043
