chapters:
  - number: 1
    title: 公司概况
    sections:
      - number: '1.1'
        title: 公司定位与商业模式
        blocks:
          - type: paragraph
            body: >-
              Runway（runwayml.com）是一家位于纽约市的应用 AI 研究公司，2018 年注册成立。公司称自己的使命是构建基础性的 General World
              Models，能够模拟所有可能的世界和体验；它把下一代智能定义为能够理解、感知、生成并在世界中行动的 AI 系统。落到经营上，Runway 靠开发并商业化用于媒体创作的生成式 AI
              模型赚钱，核心是文本转视频和图像转视频；同时，它正把世界模拟工具推向娱乐、建筑、广告、游戏和机器人等企业垂直场景。公司的核心产品包括
              Gen-4.5（当前旗舰视频模型，公司称其为全球评分最高的视频模型）、GWM-1（General World Model，提供 Worlds、Avatars 和 Robotics
              版本，用于交互式实时世界模拟）、Act-One（无需专用设备、用单摄像头视频输入生成角色表演，2024 年 10 月推出），以及 Characters API（基于 GWM-1 的实时视频智能体
              API，用于定制对话式视频人格）。Runway 的变现方式包括约 $12 至 $95 / 用户 / 月的自助订阅、面向更重负载的按 GPU 分钟计费，以及大规模部署的按席位企业定价。公司还运营 Runway
              Studios，这是内部电影和动画制作部门，既是创意样板间，也是打入好莱坞关系网的 GTM 工具。
