            title: Sora 停止运营释放更广泛视频 AI 市场不稳定信号，也带来短期机会
            body: >-
              OpenAI 于 2026 年 4 月 26 日停止 Sora 的网页和 App 产品，距离本报告日期只有两周。这个信号对 Runway 是双刃剑。短期看，Sora 退出消除了 Runway
              最显眼的技术标杆之一，也可能把部分 Sora 订阅者导向 Runway 生态。中期看，即便资源雄厚的竞争对手（由 Microsoft 支持的 OpenAI）也选择收缩专门的视频产品，而不是继续竞争。这可能反映
              OpenAI 的战略选择：把视频能力嵌入 ChatGPT，而不是维护独立视频品牌；这种分发打法未来仍可能让 OpenAI 回到战场，且没有独立产品的运营负担。尽调投资人应跟踪 OpenAI 是否会推出嵌入
              ChatGPT Pro 的 Sora 替代产品；一旦发生，竞争威胁会被重组，而且分发能力（200M+ ChatGPT 用户）比独立 Sora 更强。
