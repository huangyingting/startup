      - number: '7.3'
        title: 财务与业务风险
        blocks:
          - type: paragraph
            body: >-
              Runway 的财务画像是收入高速增长，但被巨大且持续的经营亏损抵消。Sacra 估算 2024 年 EBITDA 亏损约 $155 million，意味着月烧钱速度很可能超过 $12
              million；如果没有持续融资，E 轮前现金余额可能在远低于 18 个月内耗尽。公司截至 2026 年 2 月 Series E 累计融资 $860
              million，但全部为股权融资；尚未披露任何债务额度或基于经常性收入的授信额度。盈利路径不清晰：训练和推理算力成本是结构性成本，并随使用量扩大，按当前定价水平不会被规模抵消。

              估值风险显著。$5.3 billion 的 Series E 投后估值意味着 ARR 倍数约为 17× 到 59×，取决于采用哪一个收入估算——Getlatka 的 $300 million，或 Sacra 截至
              2025 年 6 月的 $90 million。如果视频生成市场商品化导致 ARR 增长放缓，或诉讼不利判决要求剔除数据并削弱模型表现，倍数压缩风险可能很严峻，也会让未来 IPO
              或二级交易更复杂。公司未披露公开退出时间表。收入集中风险也存在：公司收入基础主要来自订阅和少数大型企业合同，其中 Lionsgate
              是知名度最高的具名客户——但该合作已出现有记录的复杂问题。缺少来自一手来源的经审计财务报表，加上 Sacra 与 Getlatka 的 ARR 估算相差五倍，是潜在投资者必须通过一手材料审阅解决的信息缺口。
