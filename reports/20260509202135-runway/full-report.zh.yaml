      - number: '4.2'
        title: 定价与变现结构
        blocks:
          - type: paragraph
            body: >-
              Runway 的变现结构把订阅底座和基于用量的积分层叠加起来，在不同用户群中创造多层收入机会。Free 计划一次性发放 125 个积分（相当于 25 秒 Gen-4 Turbo 或 Gen-3 Alpha
              Turbo），积分不续发，因此更像试用门槛，而不是可持续获客渠道。Standard 计划每用户每月 $12（按年计费 $144），解锁每月 625 个积分、无水印 1080p 输出、Gen-4.5
              文本生成视频、Gen-4 图像生成视频、Act-Two 表演捕捉、第三方模型（Veo 3.1、Kling 3.0 Pro、Seedance 2.0）访问，以及 100 GB 资产存储。根据 aibrainjet
              2025 年 11 月的分析，Pro 档约 $28/月，每月提供 2,250 个积分和完整 Gen-4 访问；Unlimited 档约 $76/月，提供同样的 2,250 个快速积分，再加无限
              relaxed-mode 生成——可以隔夜批量渲染且不消耗积分，这是广告公司和工作室买家认为关键的功能。企业定价为定制模式，按席位授权，并包含基于专有数据集的微调、SSO
              和专属支持基础设施。积分消耗经济性形成系统性增购漏斗：Gen-3 Alpha 每秒生成视频约消耗 10 个积分，也就是说 Standard 订阅者约 62 秒 Gen-3 Alpha
              素材就会耗尽月度积分——勉强够一条社媒短片，远远不够专业制作需求。Gen-4 为了保持角色一致性，每秒消耗 10–15 个积分；Gen-4.5 约为每秒 12 个积分。这套数学结构性地把专业创作者推向
              Unlimited 和 Enterprise 档，或推向需要额外付费的积分充值。大型工作室会预购积分包来支持更大规模渲染，压低单积分成本，同时提高收入可预测性。Gen-4 Image 每张生成图像 $0.08
              的分层 API 定价，为开发者在没有订阅承诺的情况下把 Runway 接入应用提供了计量入口。
