      - number: '3.4'
        title: 定价与包装对比
        blocks:
          - type: paragraph
            body: >-
              截至 2026 年 Q1，AI 视频生成市场已经分化成四个清晰价格层。免费 / 开源层（Wan 2.6、LTX-2、Pika 有限免费层）让拥有 GPU
              基础设施、或愿意使用有限额度的用户以零边际成本获得专业级输出。高性价比商业层（$6.99–$19.99 / 月）包括 Kling 标准层（$6.99 / 月）、Hailuo 2.3（约 $14.99 /
              月）和通过 AI Pro 访问的 Google Veo 3（$19.99 / 月），都提供 ELO 排名靠前的输出。专业层（$29.99–$76 / 月）覆盖 Luma Ray 3 无限层（$29.99 /
              月）和 Runway 订阅层（$12–$76 / 月）。企业 / 按量计费层覆盖基于 API 的定价；Kling 的 API 价格（$0.07–$0.14 / 秒）结构上低于可比 Runway API 费率。

              Runway 的 $12 / 月基础方案比 Kling 的 $6.99 / 月标准方案贵 42%；其 $76 / 月最高层也高于 Luma 的无限方案（$29.99 / 月）。Google $19.99 / 月的
              Veo 3 访问提供一个排名 #3 的模型，价格低于 Runway 的中端层。这一价格结构意味着 Runway 被定位成溢价专业工具；只有质量和工作流集成能支撑溢价时，这才是可行护城河。ELO
              质量差距快速收窄（前 5 个模型彼此相差约 67 ELO），对 Runway 中端市场定价权构成结构性威胁。

              Gen-3 Alpha Turbo 仍可用，价格为 5 credits / 秒，比标准 Gen-3 的 10 credits / 秒低 50%，渲染速度快 7×，为预算敏感订阅用户提供速度 /
              成本逃生阀。Gen-4 在标准 Gen-3 基础上增加约 15–20% 每秒溢价，Gen-4 Turbo（2025 年 4 月）则在质量和速度之间搭桥。
