      - number: '4.3'
        title: 收入轨迹与财务表现
        blocks:
          - type: paragraph
            body: >-
              Runway 披露口径中的收入轨迹，是生成式 AI 领域最剧烈的增长曲线之一。Getlatka 和 Electroiq 持续报告：2021 年 $3 million，2022 年 $4.5
              million，2023 年 $48.7 million（在 Gen-2 主流采用推动下约增长 10×），2024 年 ARR 达 $121.6 million。TechCrunch 在 2025 年 4 月
              Series D 发布时报道称，Runway 的 2025 年年化收入目标为 $300 million；Getlatka 随后称该目标已在 2025 年 10 月达到，较 2024 年约同比增长
              147%。但这里存在重大差异。Sacra 独立估计，Runway 2024 年末 ARR 为 $70 million，2025 年 6 月 ARR 为 $90 million——显著低于 Getlatka 的
              $121.6 million 和 $300 million。Sacra 还报告 2024 日历年按 GAAP 确认收入为 $44 million，说明 Getlatka 数字可能代表 ARR
              订单或合同价值，而不是 GAAP 收入。厘清该差异是优先尽调事项：2024 年 $44 million 与 $121.6 million
              收入之间不是四舍五入误差；它意味着要么是长期企业合同带来大量尚未确认的递延收入，要么是 Getlatka（聚合自报数据）与 Sacra（使用自有估算模型）之间的指标定义根本不同。Sacra 还报告 2024 年
              EBITDA 亏损约 $155 million，主要由推理 GPU 算力成本、AI 模型训练支出和人员扩张驱动。这意味着烧钱规模超过已确认收入的
              3×，资本密集度符合一家仍在用风险资本补贴增长的公司。收入质量需要审视：2025 年收入增长的相当一部分，可能来自 2025 年 4 月 Series D 资金到账后加速企业销售招聘和算力扩张，因此 2025
              年才是完整受益于 Series D 资本的第一年。公开来源未披露 $300 million ARR 代表运行率还是过去十二个月。
