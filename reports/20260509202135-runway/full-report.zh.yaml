      - number: '5.4'
        title: 企业与开发者平台
        blocks:
          - type: paragraph
            body: >-
              Runway 的企业与开发者平台包括三条主要访问渠道：自助订阅产品、REST API，以及面向 GWM Robotics 的 Python SDK。Runway API 提供 "Build" 和
              "Enterprise" 档，允许外部产品和内部工作流接入 Gen-4 Turbo 与 Gen-4 Images。战略企业 API 合作伙伴包括全球广告控股公司
              Omnicom，说明平台已触达大规模商业内容制作。API 上的企业部署要求应用在适用用户界面显示 "Powered by Runway"。GWM Robotics 可按请求通过 Python SDK
              向企业开发者合作伙伴开放；截至 2025 年 12 月 GWM-1 发布时，Runway 正在与机器人公司就企业部署积极讨论。据报道，企业客户包括所有主要电影公司，以及
              Chime、Robinhood、Allstate、PayPal、Yamaha、Palo Alto Networks、Siemens、SoFi、Prudential 和 AAA 等跨行业客户。Runway
              向企业合作伙伴提供定制模型训练：Lionsgate 合作涉及在 Lionsgate 专有的 20,000 部片库上训练定制模型。Runway Studios 是公司的制作部门，通过原创 AI 电影制作和与
              Hollywood 实体联合制作，支持企业 go-to-market。Runway 还拨出 $5 million，资助最多 100 部使用 AI 生成视频的电影；该项目一方面在制作规模上验证 Gen-4.5
              能力，另一方面为企业销售建立创意参考内容组合。企业页面瞄准娱乐、广告、游戏、建筑和机器人等垂直领域，反映公司希望把可服务市场大幅扩展到 Hollywood 之外。
