      - number: '1.5'
        title: 里程碑、合作与负面事件
        blocks:
          - type: paragraph
            body: >-
              Runway 的经营历史由产品发布、融资节点、战略合作和新出现的法律风险快速串联起来。产品侧，公司从 Gen-1（2022）推进到 Gen-2（2023）、Gen-3 Alpha（2024 年 6
              月）、Act-One（2024 年 10 月）、Gen-4（2025 年 3 月）、GWM-1（2025 年 12 月）和 Gen-4.5（截至 2026 年的当前旗舰）；每一代都在处理上一代模型的局限，其中
              Gen-4 在无需微调的情况下引入跨场景角色和地点一致性，GWM-1 则通过 Worlds、Avatars 和 Robotics 版本扩展到交互式世界模拟。2024 年 9 月宣布的 Lionsgate
              合作，是任何生成式 AI 公司首次公开披露的好莱坞制片厂合作，合作内容包括用 Lionsgate 自有 20,000+ 片库训练定制模型。不过，The Wrap 在 2025
              年报道称该合作遇到阻碍：Lionsgate 的片库作为独立训练语料不足以支撑最初设想的宏大用例，演员肖像权和附属权利的不确定性也带来额外摩擦。负面方面，404 Media 在 2024 年 7
              月报道称，Runway 被指抓取 Marques Brownlee、Casey Neistat、Disney、Netflix 等知名创作者和品牌的数千条 YouTube 视频，用于训练 Gen-3
              模型。Runway 还面临艺术家提起的集体诉讼，原告指控其未经授权使用受版权保护的艺术作品训练模型；Runway 的抗辩依据是合理使用原则。这些未决法律事项构成重大包袱，需要专项法律尽调。与 CoreWeave
              的算力基础设施协议支撑 Runway 的扩张策略。
