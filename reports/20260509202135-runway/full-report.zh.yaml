      - number: '7.4'
        title: 技术与运营风险
        blocks:
          - type: paragraph
            body: >-
              Runway 的技术运营承受多重相互叠加的依赖。公司依赖 Nvidia GPU 进行模型训练和推理——这种集中度让它暴露在 GPU 供应约束、Nvidia 定价杠杆，以及相对垂直整合巨头（Google 的
              TPU、OpenAI 的 Microsoft 算力容量）的竞争劣势之下。Runway 与 CoreWeave 的云算力协议解决了规模问题，但也造成供应商锁定：如果 CoreWeave
              的财务状况、定价条款或容量分配变化，Runway 的成本结构和交付能力会被直接影响。AMD Ventures 参与 Series E，可能显示公司有意分散算力来源，但大规模 AI 训练向 AMD
              硬件实操迁移仍然运营复杂。

              CEO Cristóbal Valenzuela 身上的关键人物集中度很高。Valenzuela 是主要外部发言人、交易推动者（Lionsgate 合作、Series D 和 E）以及 General World
              Model 论点最可见的阐释者。如果他离任，投资者信心、企业合作和产品策略连续性都会出现不确定性。公开资料中未发现继任计划或高管梯队披露。

              模型层面，Runway 每一代模型都会弱化前代能力，并带来新的用户迁移成本。Gen-4 引入角色一致性，但视频时长上限为 16 秒；与 Sora 的 60 秒输出相比，长内容场景实用性受限。AI
              视频输出天然带有随机性；面向客户的工作流一旦出现高知名度质量失败，可能损害企业客户眼中的品牌可信度。Runway 拒绝披露 Gen-4 和 GWM-1 训练数据构成，意味着未来监管或法律挑战不只可能落在
              Gen-3，也可能落在这些更新模型上。
            claimRefs:
              - CR027
              - CR028
              - CR029
              - CR030
