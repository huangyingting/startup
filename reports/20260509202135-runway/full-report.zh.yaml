      - number: '5.2'
        title: 核心技术架构
        blocks:
          - type: paragraph
            body: >-
              Runway 的技术底座建立在一系列越来越复杂的生成模型之上。标准 Gen-4.5 视频模型采用基于扩散的架构，在大规模视频数据集上训练，并通过单次推理生成完整视频片段。GWM-1
              则是一次显著的架构转向：它使用自回归扩散架构，通过在特定领域数据上对 Gen-4.5 进行后训练构建。标准扩散模型通过逐步去噪同时生成完整视频；GWM-1
              不同，它基于过往帧和控制输入，一次生成一帧。这种自回归方法让模型可以实时响应用户控制输入，从而实现交互式世界导航。GWM-1 输出视频最长两分钟，分辨率最高 1280×720 像素（720p），帧率
              24fps。在 GWM-1 系列内部，Worlds、Robotics 和 Avatars 目前作为独立专门模型实现，Runway
              计划最终把它们统一成一个合并模型。平台完全运行在浏览器中，终端用户不需要本地算力，并可通过 REST API 将 Gen-4 Turbo 和 Gen-4 Images 嵌入第三方产品。GWM Robotics
              还通过 Python SDK 面向企业开发者集成开放。在信任与安全层，Runway 支持 C2PA 内容来源标准，为生成内容打水印，并运行视觉审核系统，在交付前筛查输出。API
              集成合同要求合作伙伴应用在适用用户界面显示 "Powered by Runway" 品牌标识，建立下游内容问责机制。
