      - number: '2.4'
        title: 需求驱动与结构性顺风
        blocks:
          - type: paragraph
            body: >-
              四股结构性力量正在加速所有细分市场采用 AI 视频。

              第一，视频内容消费增长快于制作能力。美国 National Telecommunications and Information Administration 报告称，视频占全球移动互联网流量的 65%
              以上。YouTube 报告称，截至 2024 年已在三年内向创作者支付 $70 billion，并把 Google DeepMind 的 Veo 引入 YouTube Shorts，说明最大的视频平台相信生成式
              AI 会成为下一层制作基础设施。TikTok 每天处理 25 million 条视频上传。消费和制作之间的缺口，创造了降低视频创作成本和时间的结构性需求。

              第二，AI 模型质量正在跨过专业级门槛。Runway 于 2025 年 4 月发布 Gen-4，引入跨镜头角色一致性，解决了 AI 视频用于专业制作时最大的单项技术缺陷。Gen-4.5
              又加入原生音频生成和多镜头编辑。GWM-1 世界模型把能力延伸到物理一致的仿真。每一次能力解锁都会扩大可触达用例，并降低企业采用风险。

              第三，推理成本正在大幅下降。Apatero 报告称，2024 到 2025 年，AI 视频生成平均耗时下降 70%，云 API 成本为每次生成 $0.05–$0.15。这条成本曲线对应 GPU
              算力性价比的提升轨迹，预计还会继续。成本下降降低了所有买方细分的采用 ROI 门槛。

              第四，企业 AI 采用整体加速。McKinsey 2025 年 State of AI 调查显示，88% 的组织现在至少在一个业务职能中使用 AI（2024 年为 78%），AI 正在 64%
              的公司推动创新。AI 高绩效企业在营销和销售中部署 AI 的比例接近落后者的三倍。这一宏观顺风直接抬升了包括视频生成在内的 AI 创意工具需求。

              两个结构性约束限制短期增长。版权和训练数据诉讼仍在进行——据 VentureBeat，Runway
              正在为艺术家诉讼抗辩，原告称其未经授权使用受版权保护作品训练模型。无论结果是法院裁决还是立法澄清，都可能实质影响模型训练经济性。开源竞争威胁也真实存在：Apatero 报告称，2025
              年开源模型（LTX-2、Wan）约占全部 AI 视频生成的 40%；即便商业平台以 60% 的生成量主导收入，开源仍会限制 Runway 在 prosumer 细分的定价权。
