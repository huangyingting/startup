      - number: '5.3'
        title: 创新轨迹与研究管线
        blocks:
          - type: paragraph
            body: >-
              Runway 明确的使命是构建基础性 General World Models，模拟所有可能的世界和体验。公司 CTO Anastasis Germanidis
              已阐述核心研究命题：在足够规模和合适数据下，教会模型直接预测像素，是通往通用模拟的正确路径。Germanidis 共同署名的 2023 年 12 月论文将这一研究方向正式化，并启动 GWM 研究项目。从
              Gen-1 到 GWM-1 的产品演进体现了这条轨迹：每一代都解决上一代限制，同时向更丰富的世界模拟推进。Gen-4 的角色一致性突破解决叙事断裂；Gen-4.5 将其扩展到音频和多镜头叙事；GWM-1
              则把视频预测变成交互式实时模拟。Runway 声称 GWM-1 在模拟范围上比 Google 的 Genie-3 更「通用」。未来研究方向包括把 GWM-1
              的三个变体统一成单一模型，并把模拟保真度扩展到机器人、生命科学和工业领域。公司运营内部制作部门 Runway
              Studios，直接与电影人、工作室、音乐人和独立艺术家合作——既是创意概念验证，也是模型能力在制作规模上的研究试验场。公司研究页面显示，Act-One 的后续产品 Act-Two
              已向付费订阅者开放，说明角色动画产品线仍在持续迭代研发。
