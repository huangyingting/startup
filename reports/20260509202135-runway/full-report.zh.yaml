      - number: '5.5'
        title: 技术风险与局限
        blocks:
          - type: paragraph
            body: >-
              Runway 面临一组实质性技术与法律风险，可能影响模型质量、算力经济性和竞争地位。最尖锐的风险是训练数据诉讼悬而未决。视觉艺术家提起的集体诉讼指控 Runway
              未经授权使用受版权保护艺术品训练模型；截至研究日期，Runway 的合理使用抗辩尚未在审判中接受检验。404 Media 另在 2024 年 7 月报道称，Runway 被指为 Gen-3
              训练抓取了知名创作者和品牌的数千个 YouTube 视频，包括 Marques Brownlee、Casey Neistat、Disney 和 Netflix。Runway 以竞争敏感为由拒绝披露 Gen-4
              训练数据来源，进一步加剧不透明性担忧。不利裁决可能带来追溯性授权成本，要求排除数据并削弱模型表现，还会在本身就是内容权利持有者的企业客户中制造声誉风险。竞争侧，Kling AI（Kuaishou）于 2025 年
              12 月推出带原生音频生成的一体化视频套件，直接对标 Gen-4.5 的新增音频能力，显示中国 AI 开发者的质量提升速度很快。OpenAI 的 Sora 仍是长视频生成的竞争参照。Stability AI 的
              Stable Video Diffusion 等开源模型会侵蚀 Runway 在准专业用户市场的价格溢价。GWM-1
              发布时未披露参数量、训练数据、方法论和性能基准等技术规格，外部无法独立验证能力。Crunchbase 报道显示，Runway 的算力基础设施依赖 CoreWeave 等云 GPU
              供应商；随着模型分辨率、生成时长和实时模拟需求上升，公司面临成本扩张敞口。基于积分的定价模型意味着算力成本压缩会直接影响每次生成的利润率，尤其是 GWM-1 逐帧自回归推理天然比一次性批量生成更消耗算力。
