  - number: 3
    title: 竞争格局
    sections:
      - number: '3.1'
        title: 竞争格局概览
        blocks:
          - type: paragraph
            body: >-
              截至 2026 年 5 月，AI 视频生成竞争格局已围绕六个主要商业平台和一个不断壮大的开源层收敛。Artificial Analysis Video Arena
              这一盲测人工偏好基准，是公开来源中最权威的质量排名：Runway Gen-4.5 以 ELO 1,247 领先（2025 年 12 月发布），紧随其后的是 Hailuo 2.3（约 1,230）、Google
              Veo 3/3.1（约 1,220）、Kling 2.6/O1（约 1,200）、Luma Ray 3（约 1,180）和 Sora 2（停用前约 1,150）。六个平台之间 97
              点的差距同时说明质量正在收敛，也说明任何单一模型的领先都很脆弱。

              报告日期以来最重要的竞争事件，是 OpenAI 于 2026 年 4 月 26 日停用 Sora 网页和 app 产品，距离本报告约两周。Sora API 将继续运行至 2026 年 9 月 24 日，但独立
              Sora 产品已经消失，OpenAI 已要求用户导出内容。这移除了 Runway 最常被引用的技术标杆之一，同时也让 OpenAI 未来的视频战略变得不清晰。OpenAI 可能继续开发嵌入 ChatGPT
              的视频能力，但截至报告日期尚未宣布替代产品。

              竞争场可以分成三层。Tier 1 直接竞争者——Google Veo 3、Kling O1、Luma Ray 3、Hailuo 2.3 和 Pika——都以订阅 SaaS
              模式面向专业和半专业视频生成工作流。Tier 2 相邻竞争者——Adobe Firefly Video（集成进 Creative Cloud）和 Stability AI（面向开源分发的 Stable Video
              Diffusion）——分别瞄准企业和开发者细分。Tier 3 开源模型——Wan 2.6 和 LTX-2——以零边际成本争夺拥有 GPU 基础设施、技术能力较强的用户。第四个维度是多工具并用趋势：到 2025
              年中，市场观察者已指出 AI 视频的单一工具时代“已经结束”，专业用户常把 Runway（主镜头）、Kling（批量）和 Pika（快速原型）组合成混合工作流。
