      - number: '8.6'
        title: 展项
        blocks:
          - type: callout
            title: 收入估算差异是估值的阿喀琉斯之踵
            body: >-
              $5.3 billion Series E 估值意味着 ARR 倍数从 18×（Getlatka 的 $300 million）到 59×（Sacra 的 $90 million）不等——3.3×
              的跨度不是四舍五入误差。如果 Sacra 数字反映 GAAP 确认收入，而 Getlatka 反映合同额或基于 bookings 的 ARR，递延收入或收入确认时点可以解释部分差距。但即使按最有利的
              Getlatka 解释，Runway 定价也略高于 SaaS 基准，并需要继续 100%+ 增长来支撑倍数。$5.3 billion 进入价格几乎没有安全边际——投资者在为尚未审计的执行结果买单。
            calloutType: risk
            claimRefs:
              - CV010
              - CV011
              - CV024
              - CV025
              - CV038
          - type: callout
            title: Stability AI 先例：算力重型 AI 的警示故事
            body: >-
              Stability AI 从 $1 billion 估值（2022-2023）到 18-24 个月内陷入严重财务困境——驱动因素包括开源竞争、无法规模化变现和高算力成本——为 Runway
              提供了直接相关的警示先例。两家公司都依赖昂贵 GPU 算力，面对开源替代品，并与拥有结构性算力和分发优势的大科技既有玩家竞争。Runway 收入轨迹更强、企业 go-to-market 更成熟，使它区别于
              Stability AI，但根本成本结构风险相似。若 Google Veo 或 Kling 的竞争压缩导致收入放缓，类似的快速估值坍塌可能发生。
            calloutType: risk
            claimRefs:
              - CV021
              - CV039
              - CV045
          - type: callout
            title: GWM-1 机器人：倍数扩张押注
            body: >-
              本次审阅的每一份 AI 视频市场分析师报告，都将 2025 年创意视频生成市场规模估在 $1-4.5 billion。若 Runway 的 world model TAM 扩张论点成立——即 GWM-1
              Robotics 为机器人策略开发生成合成训练数据，且该市场独立于创意工具——总可服务市场将扩大一个数量级。企业机器人合同年合同额为 $500K-$10M+，而当前工作室合作为 $3K-$30K。到 2027
              年，若 GWM-1 Robotics 确认贡献 $50M ARR，将显著把牛市情景概率从 30% 提升至 50%+。这是期权价值最高的尽调事项。
            calloutType: insight
            claimRefs:
              - CV031
              - CV032
              - CV042
          - type: callout
            title: 缺少经审计财务时，所有估值分析都基于估算
            body: >-
              本估值章节的每一个量化结论——收入倍数、EBITDA 亏损、情景 ARR
              预测和可比基准——都来自第三方聚合商（Getlatka、Sacra、ElectroIQ、BayelsaWatch）、独立分析师估算和新闻报道。截至 2026 年 5 月研究日，Runway
              未公开提交经审计财务报表，未披露已确认收入，也未提供投资级财务指标。资本配置决策必须以获得经审计报表和一手数据室审阅为前提。若把本章量化输出当作投资级精度，将是尽调流程中的重大错误。
