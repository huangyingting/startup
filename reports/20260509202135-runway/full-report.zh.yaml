      - number: '6.2'
        title: 关键企业客户关系
        blocks:
          - type: paragraph
            body: >-
              Runway 披露的最重要企业关系，是 2024 年 9 月 18 日宣布的 Lionsgate 合作——被描述为大型 Hollywood 工作室与生成式 AI 视频创业公司之间首个公开披露的合作。交易内容包括
              Lionsgate 向 Runway 提供其 20,000+ 部电影和电视片库，用于训练仅供 Lionsgate 电影人、导演和制作人员访问的专有定制 AI 模型。Lionsgate 副董事长 Michael
              Burns 在公告中称 Runway 是「有远见、同类最佳的合作伙伴」，随后又对 New York 杂志 Vulture 表示，他可以用 AI 在「三个小时」内把 John Wick 风格系列重制成 PG-13
              动画。然而，The Wrap 在 2025 年报道称，该合作早期遭遇重大复杂情况。两位知情人士称，尽管 Lionsgate 片库横跨 20,000+
              部作品，但事实证明仍不足以训练出最初设想的雄心勃勃的大规模项目模型。The Wrap 引用的一位行业专家称：「Lionsgate 片库太小，无法创建模型。事实上，Disney
              片库也太小，无法创建模型。」围绕演员人才权利用于 AI 训练的版权担忧进一步加剧法律摩擦。Lionsgate 发言人对 The Wrap 表示，工作室仍按计划在「几条战线」推进 AI，并确认该交易为非独家，允许
              Lionsgate 同时接触多家 AI 供应商。除 Lionsgate 外，Runway 未公开点名其他企业关系。公司企业页面提到定制模型训练和团队工作区，Runway Studios
              也直接与电影人合作。Electroiq 提到 CBS 的 Late Show 制作团队用 Runway 做合成制作，以及 KPF Architects 用于建筑动画——两者都表明 Hollywood
              工作室之外存在真实专业采用，尽管都不是披露条款的正式企业合同。第三方来源 wifitalents 声称 A24 是合作伙伴，但官方公告没有佐证，置信度很低。
