      - number: '1.3'
        title: 融资历史与资本结构
        blocks:
          - type: paragraph
            body: >-
              自 2018 年成立以来，Runway 至少完成了八轮已知融资，并逐步吸引头部机构和战略投资者。公司创立时拿到约 $2 million 种子轮；随后在 2020 年 12 月完成 $8.5 million
              Series A，2021 年 12 月完成 $35 million Series B。2022 年 12 月约 $50 million 的 Series C 为公司建立了中后期可信度，此后生成式 AI
              融资热潮开始加速。拐点出现在 2023 年 6 月：Runway 完成 $141 million Series C 延展轮，估值 $1.5 billion，由 Salesforce Ventures、Google
              和 Nvidia 三个战略相关投资方锚定，正式进入独角兽行列。2025 年 4 月，General Atlantic 领投 $308 million Series D，Fidelity Management &
              Research、Baillie Gifford、Nvidia 和 SoftBank Vision Fund 2 参与，投后估值推至约 $3 billion；按 Crunchbase 口径，累计融资达到
              $536.5 million。最近一次是 2026 年 2 月，Runway 完成 $315 million Series E，投后估值 $5.3 billion，再次由 General Atlantic
              领投，Nvidia、Adobe Ventures、AMD Ventures、Fidelity、AllianceBernstein、Mirae Asset、Emphatic Capital、Felicis
              Ventures 和 Premji Invest 参与。按 Crunchbase 口径，Series E 后累计融资约 $860 million。扩大的 Series E 财团引入 Adobe Ventures
              和 AMD Ventures，并有老股东继续跟投，传递出平台野心和基础设施多元化信号。公司尚未公开披露老股交易规模、正式债务融资或股权结构表。
