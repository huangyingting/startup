              OpenAI（Sora / Microsoft 算力）和 Google（Veo / YouTube 分发 / TPU）在算力规模、分发触达和资本上拥有结构性优势，Runway 单靠 VC 融资无法弥合。Sora
              60 秒视频时长相较 Runway 16 秒上限，是当前在长内容用例中的产品劣势。来自国家支持的中国公司 Kling 的价格竞争制造了双线作战：上攻高端要做溢价差异化，下探低端又要守住价格。
