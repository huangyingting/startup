      - number: '3.2'
        title: Tier-1 直接竞争对手画像
        blocks:
          - type: paragraph
            body: >-
              Google Veo 3 / 3.1（2025 年 5 月发布）是 Runway 技术上最难对付的竞争对手。它能在单次生成中同步生成原生音频，包括对白、音效和环境声；支持最高 4K
              分辨率，并能连贯维持超过一分钟的视频。按 Google DeepMind 自己发布的评估，Veo 3.1 在 MovieGenBench 的文本对齐、视觉质量和音视频偏好基准上超过所有对手模型。安全能力通过
              SynthID 水印内置，检测准确率 99.3%。访问方式是 Google AI Pro，每月 $19.99，可生成约 90 次快速 Veo 3 或 10 次全质量 Veo 3，价格显著低于 Runway
              可比层级。Google 的结构性优势是算力规模、YouTube 分发，以及 Gemini / Imagen 4 生态整合——这些护城河 Runway 无法靠自身复制。

              Kling O1 / Kling 2.6（Kuaishou，2025 年 12 月发布）可能是追赶 Runway 最快的竞争者。Kling O1 是全球首个统一多模态视频模型，把 18+
              项视频任务整合在单一平台中：文本转视频、图像转视频、修补、风格迁移、镜头延展、音频合成，以及带多角色对白的语音控制。Kling 2.6 又加入单次生成中的同步音视频合成。视频最长可达 2
              分钟、1080p，是商业可用产品中最长的时长。标准价格每月 $6.99，API 价格 $0.07–$0.14 / 秒，单位秒成本约比西方竞争者低 40%。Kling 在第 10 个月（2025 年 6
              月）年化收入突破 $100 million，并在全球服务 10,000+ 企业客户；这种变现速度，少有硅谷 AI 初创公司能匹敌。

              Luma AI 的 Ray 3 和 Ray 3.14 模型引入 ACES2065-1 EXR 格式的原生 High Dynamic Range（HDR）输出（10、12、16
              bit），这是市场首例，面向需要影棚级色彩科学的高端电影和广告工作流。Luma 将 Ray 3 描述为全球首个具备推理能力的视频模型，能够评估自己的输出并迭代出更好结果。无限生成访问定价为每月
              $29.99。Luma Ray 3 也已集成进 Adobe Firefly，获得跨平台分发。

              Pika 面向社交媒体创作者，主打速度和创意操控，而不是电影级真实感。Pika 的 Pikaformance 模型能以接近实时的生成速度，输出与任意音频同步的高真实表情。标准 Pika 视频生成在 15–30
              秒完成，约比 Runway 或 Kling 快 3–5x；同时提供免费层，降低采用门槛。Pikaframes、Pikaswaps 和 Pikadditions
              扩展了短视频内容的创意灵活性，但面向专业叙事用途时，输出质量低于 Runway。

              Hailuo 2.3（MiniMax）在 ELO 榜上排名第二（约 1,230），价格约 $14.99 / 月，是性价比最高的高质量选择，并直接威胁 Runway 的中端订阅用户。

              OpenAI Sora（2026 年 4 月 26 日停用）需要每月 $200 的 ChatGPT Pro 订阅，并对每段 5 秒 1080p 视频收取约
              $4。尽管照片级真实感和物理仿真很强，定价结构限制了可触达采用；Sora 2 的 ELO 约为 1,150，停用前在质量榜上排名第六。
