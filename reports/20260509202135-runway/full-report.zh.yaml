      - number: '6.3'
        title: 个人创作者与准专业用户群
        blocks:
          - type: paragraph
            body: >-
              个人创作者和准专业用户群包括独立电影人、YouTuber、社媒内容创作者、动态图形设计师和营销专业人士，按账户数计是 Runway 付费订阅用户基础中最大的板块，也是其订阅收入根基。2023 年 Gen-2
              发布是关键拐点：文本生成视频推动病毒式采用，并促成当年收入从 $4.5M 跳升 10× 至 $48.7M。Gen-3 Alpha（2024 年 6 月）和 Gen-4（2025 年 3 月）交付此前任何 AI
              模型都没有的电影级质量和角色一致性能力，进一步深化专业创作者采用。Runway 的订阅阶梯从 Free（125 个一次性积分）到 Basic（$15/月）、Standard（$35/月）、Pro（$95/月）和
              Unlimited（$145/月），设计目标是把试用者转化为经常性订阅者。积分系统会给重度用户制造摩擦：Standard 计划的 2,250 个积分可生成约 225 秒 Gen-3 Turbo 视频，或按 10
              积分/秒生成约 62 秒 Gen-3 Alpha——往往不足以完成单个商业项目的一轮迭代。这种经济性把专业创作者推向 Pro（$95/月）或 Unlimited（$145/月）档，提高
              ARPU，但也让用户更敏感地拿它与低价替代品比较。Pika、Kling AI 和免费档竞争对手吸引价格敏感的爱好者，否则这些用户可能停留在 Runway 的 Basic 档。专业评测者给 Runway
              商业工作的总体价值打出 9.4/10（bestaicompared）和 4.5/5（toolschool.ai），同时持续指出积分成本、输出质量波动和视频长度限制是障碍。Runway 与奥斯卡获奖影片
              "Everything Everywhere All at Once" 的关联，以及 Hundred Film Fund 项目，充当创作者社区参与和口碑获客机制。
