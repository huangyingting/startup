    sections:
      - number: '6.1'
        title: 客户基础概览
        blocks:
          - type: paragraph
            body: >-
              Runway 报告的用户指标覆盖多个参与层级。截至 2024 年 Q1，平台累计约 4 million 注册用户（wifitalents，单一来源估计），2023 年月活用户约 1.2 million。根据
              electroiq 引用的 Skim AI 数据，截至 2024 年 11 月，付费订阅用户超过 100,000；wifitalents 另称付费用户群在 2023 年增长两倍至 100,000。Getlatka
              引用的 2025 年总客户约 300,000 这一更高数字，未获得 Runway 官方披露验证。网站流量在 2023 年 12 月达到 11.83 million 次访问峰值，平均会话时长 5 分 32 秒——对
              SaaS 创意工具而言参与度异常高——且当期环比增长 9.14%。收入增长印证了用户采用：$3M（2021 年）、$4.5M（2022 年）、$48.7M（2023 年）、$121.6M（2024
              年），意味着随着 Gen-2、Gen-3 和 Gen-4 提升模型质量，订阅者增长与单用户消费增加同时发生。基于第三方分析，地域集中度估计为北美约 45%、欧洲约
              30%，但公司未披露官方拆分。付费用户基础高度偏向个人创作者和准专业用户（按账户数计为最大细分），营销机构和企业影视客户账户数较少，但单账户收入显著更高。Runway 未公开披露付费转化率、ARPU
              或队列级留存数据。
