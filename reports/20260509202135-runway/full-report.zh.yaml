      - number: '2.3'
        title: 客户细分与采用路径
        blocks:
          - type: paragraph
            body: >-
              六类买方构成 Runway 的可触达客户群，它们的预算归属、采购节奏和价值主张各不相同。

              企业媒体和娱乐制片厂是价值最高的细分市场。电影制片厂和流媒体服务承受的 AI 成本压力最尖锐，但也最可能从 AI 辅助制作中受益。Runway 与 Lionsgate 的合作是同类首例：Lionsgate
              获得一个用其 20,000+ 部作品片库训练的定制 AI 模型，表明企业制片厂机会真实存在。预算负责人是 CTO 和制作负责人，年度技术预算达到六到八位数。采用触发点是竞争压力：不整合 AI 的制片厂，相比整合
              AI 的同行会出现成本劣势。

              广告代理和营销团队按组织数量看是规模最大的企业细分。Fortune Business Insights 报告称，营销和广告在 2026 年占 AI 视频生成市场支出的 33.9%。McKinsey 2025 年
              State of AI 调查发现，AI 驱动的收入增长最常出现在营销和销售用例中，这与代理机构用 AI 视频工具制作营销活动一致。预算归 CMO 和创意总监；采购由成本效率和交付速度驱动。

              独立电影人和创意专业人士是 Runway 声量最高的早期采用者。VentureBeat 对 Gen-4 的报道强调，角色一致性突破让 AI
              辅助电影制作对专业制作“真正有用”——这正是技术能力向买方价值的直接转化。Runway Hundred Film Fund（单个项目最高 $1 million）直接面向这一群体。

              内容创作者按人数看是最大的用户群。全球创作者经济约有 200 million 人自认创作者（Influencer Marketing Hub，2022），创作者经济预计到 2027 年达到 $480
              billion。Apatero 报告称，2025 年全平台 AI 视频月活用户为 50 million，其中 38% 的用户在制作社交媒体内容。该细分价格敏感、由月度订阅驱动，且容易流失。

              科技公司，尤其是机器人和自动驾驶公司，是 Runway 通过 GWM Robotics 切入的新兴企业细分。机器人策略开发所需的合成训练数据是一个数十亿美元级问题，尚无成熟生成式解决方案。GWM Robotics
              可通过 Python SDK 使用，并正与机器人公司就企业部署进行积极讨论（据 TechCrunch 和 DataPhoenix）。该细分销售周期更长，但合同价值更高、流失更低。

              中小企业是 Fortune Business Insights 估计中增长最快的细分（SME 预计 CAGR 21.1%），动力来自 AI 视频工具成本下降和专业级内容制作民主化。IT
              和电信行业是按市场份额计最大的终端用户垂直（约 34%，按 MarkNtel），主要由员工培训和文档视频需求推动。
