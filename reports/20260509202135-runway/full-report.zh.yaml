  - id: FE001
    title: Runway 产品架构栈
    type: stack
    summary: >-
      分层展示 Runway 技术与产品架构：底层是算力基础设施，上接基础模型、专门模型变体、创意工具套件、交付接口，顶层是终端用户细分。它展示从专有算力和训练数据向上延伸到面向客户平台的依赖链，并标出 IP
      风险和竞争差异化累积的位置。
    data:
      items:
        - id: compute
          label: 算力基础设施
          detail: CoreWeave 云 GPU（主要）；Nvidia 硬件；可能由 AWS/GCP 补充——依赖度高，未披露替代方案
        - id: training-data
          label: 训练数据管线
          detail: 大规模视频 / 图像语料库（未披露）；Gen-3 被指使用网页 / YouTube 抓取；权利清理未验证——重大法律风险
        - id: foundation-models
          label: 基础模型
          detail: Gen-4.5（扩散，文本 / 图像 / 音频生成视频）；GWM-1（自回归扩散，基于 Gen-4.5 后训练）
        - id: specialized-variants
          label: 专门模型变体
          detail: Gen-4 Turbo；GWM Worlds（720p 24fps）；GWM Avatars（对话式）；GWM Robotics（合成数据）；Act-One/Two（角色动画）
        - id: tool-layer
          label: 创意工具套件（30+）
          detail: >-
            Motion Brush、Inpainting、Green Screen AI、Frame Interpolation、Director Mode、Image-to-Image、Video-to-Video
            等编辑工具
        - id: interface-layer
          label: 交付接口
          detail: 基于浏览器的 Web 应用（无需本地算力）；REST API（Gen-4 Turbo/Images，Build & Enterprise 档位）；Python SDK（GWM Robotics，按请求开放）
        - id: users
