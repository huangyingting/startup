  - id: TP001
    title: AI 视频竞争对手概况表
    columns:
      - 竞争对手
      - 类别
      - 规模 / 融资
      - 目标细分
      - 关键差异点
      - 主要限制
      - 状态（2026 年 5 月）
    rows:
      - - Runway Gen-4.5
        - 直接竞争——专业 AI 视频
        - $860M 累计融资；约 $300M ARR（2025 年 10 月）；$5.3B 估值（2026 年 2 月）
        - 专业电影人、工作室、企业创意团队、开发者
        - '#1 ELO 1,247；角色 / 场景一致性；NVIDIA A2D 架构；Lionsgate 好莱坞合作；GWM-1 世界模型'
        - 高价定价（$12–76/mo）；无原生 4K；训练数据诉讼未决；Gen-4 发布时无原生音频
        - 活跃——按 ELO 计的市场领导者
      - - Google Veo 3 / 3.1
        - 直接竞争——大型科技现任者
        - Google DeepMind（Alphabet，$1.8T+ 市值）；无限算力
        - 企业、创意专业人士、YouTube 创作者
        - '#3 ELO 约 1,220；原生音频（对白、音效、环境声）；4K 输出；>1 分钟连贯视频；SynthID 水印 99.3%；MovieGenBench T2V 总体偏好最佳'
        - 无独立订阅——需要 Google AI Pro 生态；YouTube 集成尚未面向创作者大规模商业部署
        - 活跃——快速提升
      - - Kling O1 / Kling 2.6 (Kuaishou)
        - 直接竞争——成本有竞争力的中国对手
        - Kuaishou（上市公司，约 $10B+ 市值）；第 10 个月 ARR 超 $100M；10,000+ 企业客户
        - 价格敏感型企业、社交媒体代理公司、高产量内容生产者
        - '#4 ELO 约 1,200；首个统一多模态模型（18+ 任务）；音画同步；1080p 下 2 分钟片段；$6.99/mo； 每秒成本比西方同业低 40%'
        - 美国 / 欧盟企业有数据主权顾虑；提示词系统复杂；电影感精细控制不如 Runway
        - 活跃——按收入速度计增长最快
      - - Luma Ray 3 / Ray 3.14
        - 直接竞争——电影感细分对手
        - 累计融资约 $43M（2022 年 Series A）；与 Adobe 合作
        - 高端电影制作、广告、ACES 色彩工作流用户
        - '#5 ELO 约 1,180；全球首个原生 HDR（ACES2065-1 EXR）；首个推理视频模型；$29.99/mo 不限量； Adobe Firefly 集成'
        - 片段时长较短（约 15s）；产品宽度小于 Runway 的 30+ 工具；HDR 工作流之外企业工具有限
        - 活跃——靠 HDR 和推理做差异化
      - - Pika (Pika Labs)
        - 直接竞争——社交媒体 / 速度优先
        - 累计融资约 $80M+（2023–2025）；提供免费档
        - 社交媒体创作者、快速原型用户、短视频内容生产者
        - 15–30 秒生成（比竞争对手快 3–5x）；Pikaformance 近实时；免费档；创意操控工具（Pikaframes、Pikaswaps、Pikadditions）
        - 电影感保真度较低；最长片段 10s；不适合专业叙事内容
        - 活跃——消费者 / 社交细分
      - - Hailuo 2.3 (MiniMax)
        - 直接竞争——性价比档对手
        - MiniMax（中国 AI 公司，私营）；融资未披露
        - 重视性价比的专业人士、中腰部内容创作者
        - '#2 ELO 约 1,230；每美元输出质量最高；$14.99/mo；角色一致性（S2V-01 模型）'
        - 西方企业市场存在感较弱；英文公开文档有限；存在数据主权顾虑
        - 活跃——性价比定位强
      - - Adobe Firefly Video
        - 邻近领域——企业创意套件
        - 'Adobe（NASDAQ: ADBE，约 $220B 市值）；Creative Cloud 30M+ 订阅用户'
        - 使用 Adobe Creative Cloud / Premiere Pro 的企业创意团队
        - 直接集成 Premiere Pro；商业授权训练数据（降低 IP 风险）；Luma Ray 3 在 Firefly 内分发
        - 不是独立视频生成器；模型表现弱于纯 AI 视频玩家；依赖 Creative Cloud 订阅
        - 活跃——借 CC 生态做分发
      - - Stability AI（Stable Video Diffusion 模型）
        - 邻近领域——开源分发
        - 累计融资约 $100M；2024 年在英国申请自愿重组
        - 开发者、研究人员、自托管企业
        - 开源发布 Stable Video Diffusion（SVD）；可免费下载并自托管；开发者社区分发
        - 组织不稳定（2024 年重组）；模型质量低于头部商业平台；无托管基础设施或企业支持
        - 有保留地活跃——开源，公司重组中
      - - Wan 2.6 / LTX-2（开源档）
        - 替代品——开源自托管
        - 社区 / 开源项目（源自 Alibaba Wan 研究）；无商业融资结构
        - 技术能力强的用户、研究人员、有 GPU 的成本敏感型开发者
        - '#8 ELO 约 1,130（Wan 2.6）；完全免费自托管；可在消费级 GPU 上运行；无订阅或 API 成本'
        - 需要 GPU 基础设施和技术知识；无托管 SLA、合规支持或企业功能；最长视频 15s
        - 活跃——免费替代档
      - - Meta Movie Gen
        - 潜在进入者——大型科技研究模型
        - 'Meta（NASDAQ: META，约 $1.3T+ 市值）；无限算力；2024 年 10 月发布'
        - 不明确——尚未宣布商业发布
        - 算力规模；多模态生成研究；社交媒体分发整合潜力（Facebook、Instagram、Reels）
        - 截至报告日期尚不可商用；未公开披露定价、产品或发布时间线
        - 商业化前——仅研究模型
    notes: >-
      融资数据来自 Crunchbase、TechCrunch 和 Sacra。ELO 分数来自 dualview.ai 引用的 Artificial Analysis Video Arena（2026 年 1 月）。Kling
      ARR 和企业客户数来自 imseankim.com（2025 年 6 月）。OpenAI Sora 未列入活跃竞争对手名单，因为其网页 / 应用已于 2026 年 4 月 26 日停止服务，来源为 OpenAI
      官方停止服务通知。Adobe 市值为近似值。Meta Movie Gen 商业状态按已审阅公开公告判断；未披露商业产品。
