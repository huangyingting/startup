      - number: '8.5'
        title: 估值情景、建议与最终尽调问题
        blocks:
          - type: paragraph
            body: >-
              三种 2027 年退出或二级市场重估情景界定了投资决策。基准情景假设收入继续以约 80% 年增速增长（较 147% 放缓），到 2027 年底达到约 $540 million
              ARR；随着算力效率和经营杠杆部分抵消增长投入，EBITDA 亏损收窄至约 -$80 million。按 10× ARR 倍数（与迈向盈利的高增长 SaaS 一致），基准情景意味着 $5.4 billion
              估值——基本持平于 2026 年 2 月进入价格，Series E 投资者在该时间线上没有回报。若要从 $5.3 billion 进入价实现 2× 回报，到 2027 年收入需要达到约 $1 billion
              ARR，并获得 10× 倍数，要求持续 100%+ 增长。

              牛市情景假设 GWM-1 机器人和自动驾驶合同到 2027 年开始贡献 $100-200 million 新增 ARR，总 ARR 达到 $900 million 至 $1 billion，EBITDA
              亏损收窄至 -$50 million，并因世界模型基础设施定位获得 12-15× ARR 倍数。该情景支持 2027 年 $10.8-15 billion 估值，为 Series E 带来 2-3×
              回报。熊市情景——由版权诉讼不利判决、Google / Kling 带来的竞争性毛利压缩，或收入放缓触发——假设 2027 年 ARR 为 $180-220 million，并因风险折价处于 7-8×
              倍数，意味着估值 $1.3-1.8 billion，较 Series E 进入价大幅下调。

              总体建议是偏贵 / 有条件通过。估值在合理收入区间高端可以自洽，受到极强增长轨迹和战略投资者质量支撑——但在出资承诺前，必须解决五个尽调缺口：（1）经审计 GAAP 财务报表，以解决 Getlatka /
              Sacra 收入差异；（2）毛利率和单位经济模型披露；（3）量化诉讼敞口和法律策略审阅；（4）GWM-1 机器人商业管线指标；（5）关键人物继任计划。鉴于 EBITDA
              亏损画像、诉讼悬顶风险以及倍数对未经审计收入数字高度敏感，风险评级为高。
