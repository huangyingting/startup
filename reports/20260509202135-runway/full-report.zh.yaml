      - number: '1.4'
        title: 核心指标与市场地位
        blocks:
          - type: paragraph
            body: >-
              Runway 的收入曲线异常陡峭：按 Getlatka 和 Electroiq 数据，2021 年 $3 million、2022 年 $4.5 million、2023 年 $48.7 million，2024
              年年经常性收入（ARR）达到 $121.6 million。2023 年到 2024 年约 2.5× 的加速，反映 Gen-2 及后续模型进入主流采用，同时早期企业 API 合同开始放量。TechCrunch 在
              2025 年 4 月 Series D 时报道称，Runway 的 2025 年年化收入目标为 $300 million；Getlatka 报告称该目标已在 2025 年 10 月达成。需要谨慎：Sacra
              另行估计 Runway 2024 年末 ARR 为 $70 million，2025 年 6 月为 $90 million，显著低于 Getlatka 和 Electroiq。差异可能来自 GAAP 确认收入与
              ARR 或订单额的口径不同，尽调中需要向一手来源澄清。到 2024 年 11 月，Runway 按 Electroiq 数据约有 100,000 名用户；Getlatka 报告 2025 年约有 300,000
              名客户。企业客户覆盖每一家主要电影制片厂，并包括 Chime、Robinhood、Allstate、PayPal、Yamaha、Palo Alto
              Networks、Siemens、SoFi、Prudential、Gamma 和 AAA，显示其客户已经明显走出好莱坞，跨多个行业分散。网站流量在 2023 年 12 月达到约 11.83 million
              月访问量峰值，全球排名第十一。Runway 入选 TIME Magazine 2023 年 100 家最具影响力公司。2025 年员工数估计约为 382，来源为二级聚合器，尚无一手确认。
