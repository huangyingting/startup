        title: 客户声音：评价、证言与负面信号
        blocks:
          - type: paragraph
            body: >-
              第三方评价聚合器对 Runway 客户满意度给出中度正面但有细节的信号。BestAICompared 给 Runway 总体评分 9.4/10（2025 年 9
              月更新），视频质量和功能为五星，易用性和价值为四星。Toolschool.ai 给 Runway
              4.5/5，并对商业和专业用途给出「高度推荐」结论。专业评测者反复批评的主题集中在四点：（1）积分成本——Standard 计划每月约 62 秒 Gen-3
              Alpha「勉强够一条社媒预告片」；（2）输出质量波动——结果「可能不一致」，可能需要多次重新生成，进一步叠加积分成本；（3）视频长度限制——每次生成最长 10 秒，落后于 OpenAI Sora 在同等档位的
              60 秒片段；（4）高峰期排队时间和偶发服务器宕机。最重要的负面客户信号来自 The Wrap 2025 年对 Lionsgate-Runway 交易的调查：该合作的技术抱负显著超过定制模型实际可交付能力。The
              Wrap 引用的专家总结道：「要创建完整的专业工作流，你需要的不只是一个模型；你需要一个生态系统」——这直接挑战 Runway 面向工作室的单模型企业价值主张。围绕人才相关内容用于 AI
              训练的版权担忧增加了法律摩擦，工作室法务部门正在谨慎处理。Runway 官方客户页面展示了经筛选的创作者证言，认可平台创意能力，但这些由公司选择，并非系统性满意度调查。公开来源未发现 NPS、CSAT
              或系统性企业满意度数据。
