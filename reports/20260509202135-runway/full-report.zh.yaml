      - number: '8.2'
        title: 收入倍数分析与可比基准
        blocks:
          - type: paragraph
            body: >-
              Runway 在 Series E 的 ARR 倍数随所用收入估算分母不同而大幅变化。若采用 Getlatka 的 $300 million ARR 估算（据称 2025 年 10 月达到），$5.3
              billion 估值意味着约 18× ARR——处于高增长 AI 软件的高位区间，但按 2024-2025 年 AI 市场标准并不极端。若采用 Sacra 对 2025 年 6 月的 $90 million
              ARR 估算，隐含倍数升至约 59×，这个价格更像前沿 AI 实验室估值（Anthropic 在 $850 million ARR 上约 21×），而不是视频软件工具。即使采用 Sacra 对 2024 年底
              $70 million ARR 的中间估算，2025 年 4 月 $3.3 billion 的 Series D 也意味着 47× 倍数——说明市场要么在计入大量近期增长，要么 Sacra 的估算明显低估了
              Runway 的实际 ARR。

              可比私营公司基准提供的参照并不一致。ElevenLabs 2024 年以 $90 million ARR 获得 $3 billion 估值——语音 AI 的隐含倍数约 33×。图像 AI 领导者
              Midjourney 估值据估约 $10 billion，年收入约 $200 million，意味着 50× 倍数——但 Midjourney 已盈利且没有外部风险融资，风险画像根本不同。Anthropic 基于
              $850 million ARR 以约 21× 倍数融资，但 Anthropic 的可服务市场（作为基础设施的 LLM）比 Runway 当前的视频工具市场更宽。Stability AI
              是一个警示型可比对象：2022-2023 年估值峰值 $1 billion，2024 年即陷入财务困难——说明即便资本充足的生成式 AI 公司，也会在竞争压力加剧且成本结构跑得比收入更快时迅速毁损价值。

              2024-2025 年公开市场环境下，高增长 SaaS 基准通常给年增长 50-100% 的公司 8-15× ARR 倍数。Runway 声称的 147% YoY 增长率（Getlatka 口径下
              2024-2025 年）可以支撑高于该区间的溢价；但缺少经审计财务报表、毛利率披露和已确认收入明细，意味着该溢价完全依赖自报和聚合商估算指标，而不是投资级财务报表。
