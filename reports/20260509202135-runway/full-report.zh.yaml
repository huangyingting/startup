  - id: FR002
    title: Runway 风险事件时间线（2024–2026）
    type: timeline
    summary: 时间线按顺序排列构成 Runway 累积风险图景的反向事件、监管里程碑和竞争者进入。它展示法律、竞争和监管风险如何随着公司增长和融资同步升级；2024–2025 年风险堆积最密集。
    data:
      items:
        - label: YouTube 抓取指控
          date: 2024-07
          detail: 404 Media / SiliconANGLE 报道指称，Gen-3 训练未经授权使用来自 Disney、Netflix、Sony、Pixar 频道的数千个 YouTube 视频；并指称使用代理
        - label: Lionsgate 合作复杂问题浮现
          date: '2025'
          detail: The Wrap 报道片库太小、演员肖像权未解决；为工作室模型收入策略亮起警示
        - label: 艺术家集体诉讼进行中
          date: 2025-Q1
          detail: 视觉艺术家在加州北区提起集体诉讼，将 Runway（以及 Stability AI、Midjourney、DeviantArt）列为被告；被告援引合理使用抗辩
        - label: EU AI Act 禁止性条款生效
          date: 2025-02
          detail: EU 全境禁止 8 类 AI 实践；透明度风险条款适用于 Runway 的生成式系统
        - label: Bartz v. Anthropic——$1.5B 和解
          date: 2025-09
          detail: 里程碑版权和解确立 AI 训练数据责任的先例量级；Runway 不是当事方，但被密切关注
        - label: Kling 抢占价格敏感细分
          date: '2025'
          detail: Kuaishou 的 Kling AI 视频工具以更低价格达到可比质量；在全球价格敏感创作者中获得牵引
        - label: EU AI Act 高风险义务生效
          date: 2026-08
          detail: 高风险 AI 系统严格义务生效：风险评估、数据集质量要求、活动日志、文档要求
        - label: Series E（估值 $5.3B）——估值风险锁定
