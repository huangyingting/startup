          - type: callout
            title: 训练数据不透明：生存级法律与竞争风险
            body: >-
              Runway 拒绝披露 Gen-4 和 Gen-4.5 训练数据来源，再叠加艺术家版权诉讼和 404 Media 关于 Gen-3 抓取 YouTube
              视频的未报告指控，构成平台最重要的技术风险。不利的合理使用裁决可能要求追溯性授权付款，迫使公司排除数据并削弱模型质量，还可能触发作为权利持有者的企业客户流失。Runway
              的不透明立场也阻止外部独立审计训练数据质量和多样性，限制投资人对模型性能上限的尽调。在训练数据规则更严格的司法辖区，数据来源更干净（授权或合成）的竞争对手可能赢得监管和企业偏好。
