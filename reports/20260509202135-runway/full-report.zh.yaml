      - - 盈利路径
        - CoreWeave 算力协议（GB300 NVL72）显示 Runway 在降低单位推理成本；AMD Ventures 入局意味着 GPU 成本多元化路线图；2025 收入增长可能带来经营杠杆
        - $155M EBITDA 亏损（2024，Sacra），毛利率仅 25-35%；未披露收支平衡路径；Series E 资本按当前烧钱速度可能将现金跑道延长 24-30 个月，但仍需要再融资
        - 披露毛利率到 2027 提升至 50%+ 的轨迹；明确 EBITDA 收支平衡日期或 ARR 目标里程碑
