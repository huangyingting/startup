  - number: 8
    title: 估值
    sections:
      - number: '8.1'
        title: 当前估值快照
        blocks:
          - type: paragraph
            body: >-
              Runway 于 2026 年 2 月 10 日完成 Series E 融资，由 General Atlantic 领投，融资 $315 million，投后估值 $5.3 billion——这也是 2025 年
              4 月以 $3.3 billion 估值领投 Series D 的同一家机构。本轮参与方包括 NVIDIA、Adobe Ventures、AMD Ventures、Fidelity Management &
              Research Co.、AllianceBernstein、Mirae Asset、Emphatic Capital、Felicis Ventures 和 Premji Invest。自 2018
              年成立以来，公司通过七次融资事件累计融资约 $860 million，使 Runway 成为美国融资额最高的独立 AI 视频公司。2026 年 2 月 Series E 距 2025 年 4 月 Series
              D（$308 million，估值 $3.3 billion）仅 10 个月，而 Series D 距 2023 年 6 月 Series C 延伸轮（$141 million，估值 $1.5
              billion）也只有 20 个月。三年内三次重大融资，说明投资者信心很强，也预期公司会继续高强度消耗资本；这与 Sacra 报告的 2024 日历年 $155 million EBITDA 亏损一致。

              $5.3 billion 估值对应生成式 AI 牛市中的一个特定时点：2025 年全球 AI 视频融资总额为 $3.08 billion，较 2024 年 AI 视频创业公司融资的 $1.58 billion
              增长 94.6%（Crunchbase 数据）。在融资环境中，Runway 最接近的直接竞争者 Luma AI 于 2025 年 11 月完成 $900 million Series C，估值 $4
              billion。Series E 的战略投资者结构传递的信号值得注意：NVIDIA 参与（连续第三轮投资 Runway）提供算力协同；Adobe Ventures 参与则因 Adobe Firefly
              的直接产品竞争，制造复杂的合作伙伴兼竞争者关系；AMD Ventures 入场说明公司可能尝试摆脱 NVIDIA 独占式基础设施，推进算力多元化。

              Series E 公告发布时，Runway 拒绝向 Crunchbase News 披露收入数字；运营负责人 Michelle Kwon
              只称增长“极快”，未给出量化数据。这种不透明，再加上第三方收入估算相差五倍（Sacra 为 $90 million，Getlatka 为 2025 年 $300
              million），使隐含估值倍数存在实质性不确定性，也让独立估值分析只能落在估算区间，而非已确认指标。
