  - id: TE005
    title: Runway 工作流与使用场景覆盖
    columns:
      - 用户细分
      - 待完成任务
      - Runway 方案
      - 关键收益
      - 已知限制
    rows:
      - - 独立电影人
        - 制作多场景角色一致的叙事短片
        - Gen-4.5 用视觉参考输入保持角色一致；Director Mode 控制电影摄影；Act-Two 处理表演
        - 短篇叙事无需实体布景、演员排期和高额 VFX 预算
        - 每次多镜头生成的输出时长上限为 1 分钟；复杂对话场景仍需后期拼接
      - - 营销 / 广告代理
        - 为多渠道活动规模化生成符合品牌调性的视频创意
        - Gen-4 Turbo 通过 REST API（Build 层级）提供；自定义模型训练（Enterprise 层级）用于匹配品牌风格
        - 无需重拍成本即可快速生成创意变体；API 可接入既有资产管理工作流
        - 品牌一致性需要自定义模型训练（仅企业版）；API 定价未公开披露
      - - 机器人开发者 / 研究实验室
        - 生成合成视频训练数据，用于训练机器人操作和导航策略
        - 通过 Python SDK 使用 GWM Robotics；根据图像提示模拟具备物理感知的真实环境
        - 降低实体数据采集成本和安全风险；可规模化生成边缘场景
        - SDK 仅可申请获取；未披露生产规模客户；未发布与真实物理结果对照的基准验证
      - - 企业沟通 / HR
        - 为培训、入职和面向客户的体验创建可交互的对话式 AI 角色
        - 通过 Runway Characters API 使用 GWM Avatars；实时对话数字人带口型同步和表情
        - 按需创建数字人，无需演员或工作室成本；可规模化支持本地化和个性化
        - 仅 Beta 访问；定价未披露；企业级实时互动所需的延迟和真实感下限不清楚
      - - 游戏开发者 / XR 创作者
        - 用概念图或文本提示构建可探索的 3D 交互世界，用于游戏原型和 XR 体验
        - GWM Worlds；720p 24fps、空间一致的交互环境；用户输入可控制镜头
        - 大幅加快世界构建原型；让单人工作室也能创建可导航环境
        - 分辨率限于 720p；尚未达到 AAA 游戏流水线的生产级质量；世界尺度和持久性约束未披露
      - - 内容创作者 / YouTuber
        - 在订阅预算内，用文本或图像提示快速制作高质量短视频内容
        - Standard 或 Pro 套餐中的 Gen-4.5；创意工具套件中的 Motion Brush、Inpainting、Green Screen AI
        - 无需专用硬件；基于浏览器；每月积分配额支持中等产量
        - 算力积分系统给高产量创作者带来成本不确定性；输出风格可能需要反复提示才能贴合设想
    notes: >-
      使用场景描述综合自 Runway 产品页、API 文档、TechCrunch GWM-1 报道（2025 年 12 月）和 DeepLearning.ai GWM 分析。 限制反映截至 2026 年 5
      月研究日的公开约束；未列出的限制可能仍然存在。
