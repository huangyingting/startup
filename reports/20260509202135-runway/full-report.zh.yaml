      - number: '6.4'
        title: 获客与留存机制
        blocks:
          - type: paragraph
            body: >-
              Runway 的获客主要由模型质量里程碑触发的自然病毒式采用驱动：Gen-2 的文本生成视频突破（2023 年）、Gen-3 Alpha 的电影级质量升级（2024 年）和 Gen-4 的角色一致性解锁（2025
              年 3 月），都带来可观察的网站流量、媒体报道和社交分享峰值。公司未披露获客成本、付费营销支出或渠道归因。免费增值模式似乎是主导获客动作：125 个一次性免费积分让用户在积分耗尽并触发转化前体验完整产品。平台
              30+ 创意工具套件提供了视频生成之外的留存表面：Motion Brush、AI Inpainting、Green Screen AI 和 Frame Interpolation
              等工具通过替代多个点状方案工作流来提升黏性。对企业客户而言，基于工作室专有 IP 片库的定制模型训练形成结构性切换成本：客户若更换供应商，需要重新投资模型训练。Lionsgate
              的复杂情况揭示了风险：如果定制模型无法为雄心勃勃的用例交付制作级输出，切换成本不足以阻止流失或不续约。公司未披露
              NRR、GRR、订阅续约率或队列级留存指标。企业合同期限、续约机制和批量折扣结构也未知。基于积分的模式带来的增购压力，可能把非自愿升级（项目中途为完成工作而购买积分）伪装成真实留存，因此独立指标披露对尽调尤其重要。
