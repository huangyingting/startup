      - number: '8.4'
        title: 熊市情景：盈利缺口、诉讼悬顶风险与竞争压力
        blocks:
          - type: paragraph
            body: >-
              反对 Runway $5.3 billion 估值的熊市情景，由四个相互叠加、合起来可能造成实质估值压缩的风险支撑。第一，盈利时间表未定义，2024 年亏损画像很重：Sacra 估算 2024 日历年
              EBITDA 亏损 $155 million，意味着即便 2025 年 4 月的 Series D 资金尚未投入，月现金消耗也已超过 $12 million。毛利率估算仅 25-35%（BayelsaWatch
              引用 Miracuves），训练和推理算力成本是结构性、持续性的，并随使用量扩大——也就是说，若 GPU 推理单位经济模型没有明显转变，单靠收入增长无法快速补上 EBITDA 缺口。公司未披露 EBITDA
              盈亏平衡路径，甚至未披露毛利改善目标，使当前估值取决于持续以持平或更高估值获得风险资本融资。

              第二，视觉艺术家提起的版权集体诉讼——将 Runway 与 Stability AI、Midjourney 和 DeviantArt 一并列名——是一项生存级财务风险，而 $5.3 billion
              价格并未充分计入。Runway
              的合理使用抗辩尚未被裁定；若法院作出不利判决，公司可能被要求（a）追溯许可训练数据，（b）从未来训练语料中排除某些内容，削弱模型质量，或（c）支付超过当前现金头寸的赔偿。Anthropic
              先例（因盗版书库训练数据达成 $1.5 billion 和解）显示潜在规模。第三项风险是收入质量：Sacra 对 2025 年的 $90 million ARR 与 Getlatka 的 $300 million
              ARR 相差五倍，让哪个倍数才“真实”变得不确定。如果 Sacra 数字更准确，$5.3 billion 估值意味着约 59× ARR——只有 Midjourney（盈利、未靠外部融资）和前沿 LLM
              实验室（TAM 宽得不可比）才维持过这种倍数。

              第四，The Wrap 报道的 Lionsgate 合作复杂性，暴露了 Runway 最受关注企业收入渠道的执行风险。Lionsgate 的 2 万部片库作为独立训练语料，不足以支撑该合作最初设想的雄心勃勃 AI
              电影制作场景，削弱了电影公司模型训练业务模式可扩展性的假设。Stability AI 在 2024 年迅速毁损价值——18-24 个月内从 $1 billion 峰值跌入严重财务困境——为 AI
              公司提供了警示先例：一边是开源和大科技替代品带来的竞争加剧，一边是高烧钱率。
