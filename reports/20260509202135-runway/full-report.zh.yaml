      - number: '2.2'
        title: 市场规模与增长预测
        blocks:
          - type: paragraph
            body: >-
              多份独立分析报告给出的市场规模估计跨度很大，背后是范围定义和方法论不同。下表汇总了 AI 视频生成市场六个最可信、有来源的数字。窄口径一端，Knowledge Sourcing Intelligence 和
              Research and Markets 均给出 2025 年 $1.08 billion、2030 年 $1.97 billion、CAGR 12.8% 的数字，这是一个保守估计，只聚焦文本转视频和
              PowerPoint 转视频软件产品。MarkNtel Advisors 估计 2024 年基数为 $0.43 billion，到 2030 年扩至 $2.34 billion，CAGR
              32.8%，反映其基年更晚。Fortune Business Insights 则把 2025 年收入放在 $716.8 million，到 2034 年增至 $3.35 billion，CAGR 18.8%。

              在更宽的 AI 视频市场层面（包含分析、自动剪辑，以及纯生成之外的视频 AI 工具），Grand View Research 估算 2024 年市场为 $3.86 billion（2025 年为 $4.55
              billion），到 2033 年增至 $42.29 billion，CAGR 32.2%。Apatero 行业汇总估计，纯生成市场 2025 年为 $1.8 billion，年增长 35–40%，并引用全平台
              50 million 月活用户作为需求锚。

              2025 年估计从 $0.72 B 到 $4.55 B，跨度很大，主要由范围差异驱动，而不是方法论错误。投资者应把 Knowledge Sourcing / Research and Markets 的
              $1.08 billion 作为狭义 AI 视频生成市场的保守地板，把 Grand View 的 $4.55 billion 作为更广义 AI 视频软件市场的参考。Runway 主要在窄口径市场竞争，但它的
              API 和企业合作也触达更宽市场。

              按不同报告，北美贡献全球 AI 视频市场收入的 34–41%（Fortune Business Insights 为 41%；Grand View Research 对更宽市场给出
              34.8%）。亚太是所有报告中增长最快的地区，动力来自中国、印度和日本；MarkNtel Advisors 将该地区 2024 年视频生成工具市场份额归因为 37%+，反映其庞大的社交媒体内容创作者基数和政府
              AI 投资。

              所有可信预测给出的方向信号一致：AI 视频生成市场到 2030 年将以每年 13–33% 增长，动力来自推理成本下降、模型质量提升和企业采用扩大。狭义纯生成市场在 2025–2030 年最可能的 CAGR 是
              20–25%。
