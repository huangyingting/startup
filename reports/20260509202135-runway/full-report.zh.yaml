              - CM011
          - type: callout
            title: 世界建模打开当前报告尚未覆盖的 TAM 扩张
            body: >-
              本次审阅的每一份 AI 视频市场报告（Fortune、Grand View、MarkNtel、Knowledge Sourcing、Apatero）都只测算创意视频生成市场。Runway 的 GWM-1
              Robotics 产品用于生成物理一致的机器人策略开发合成训练数据，指向完全不同的需求池；按 MarketsandMarkets 对广义合成数据的估计，该市场到 2028 年整体为 $2.1
              billion。Runway 可触达的具体切片尚无法量化，但战略逻辑清晰：与机器人公司的企业合同 ACV 更高、流失更低，若世界模型押注兑现，可能实质改善 Runway 的收入质量。
