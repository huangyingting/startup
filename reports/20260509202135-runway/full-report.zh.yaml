          label: 创意简报
          detail: 用户定义叙事意图：角色、场景、视觉风格、基调、音频需求
        - id: input-prep
          label: 输入准备
          detail: 提供文本提示词、参考图像、演员视频（用于 Act-One）或既有素材
        - id: model-select
          label: 模型 / 工具选择
