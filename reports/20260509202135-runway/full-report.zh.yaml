      - number: '2.7'
        title: 展示项
        blocks:
          - type: callout
            title: 分析师估算分歧大，市场规模不确定
            body: >-
              2025 年 AI 视频生成市场规模估计从 $716.8 million（Fortune Business Insights）到 $4.55 billion（Grand View Research）不等，相差
              6×；差异来自范围定义，而非数据质量。若投资者只依赖单一估计，可能把 Runway 的市场渗透率错估一个数量级。最稳妥的做法是用窄口径 Knowledge Sourcing 数字（$1.08B）作为地板，用
              Grand View 的宽口径数字作为天花板，并把 Runway 自身收入作为首要市场信号，而不是只看自上而下估算。
            calloutType: risk
