  - number: 4
    title: 财务情况
    sections:
      - number: '4.1'
        title: 收入模型与收入来源
        blocks:
          - type: paragraph
            body: >-
              Runway 运营着四条收入流，其模式已经从纯自助订阅业务演进为越来越偏企业、API 优先的平台。第一条也是历史上最主要的收入流是自助订阅：按月或按年分层收费，从免费到每用户每月 $76
              不等，并用「积分」控制用户访问算力密集型视频生成。积分架构在经济性上很关键：Standard 计划每月 625 个积分只能生成约 62 秒 Gen-3 Alpha 素材，或 52 秒 Gen-4
              素材，持续推动专业创作者升级到更高档位，或额外购买积分包。第二条收入流是企业按席位授权：面向大型组织的定制定价协议，包含 SOC 2 Type 2 合规、SSO
              集成、基于专有数据集的定制模型微调，以及专属支持。截至 2026 年 2 月，已确认的企业客户包括所有主要电影公司，以及 Chime、Robinhood、Allstate、PayPal、Yamaha、Palo
              Alto Networks、Siemens、SoFi、Prudential 和 AAA。第三条是 API 收入：面向开发者的 Gen-4 Turbo 和 Gen-4 Images 计量访问，其中 Gen-4
              Image 每张生成图片收费 $0.08。战略 API 合作伙伴包括全球广告集团 Omnicom；Adobe 也被列为 Runway 首选 API
              创意合作伙伴，拥有独家早期模型访问权——这套分发安排把潜在竞争对手转成了主要渠道。第四条是 Runway Studios，即内部制作和娱乐部门，服务电影人、工作室和音乐人，同时也是企业买家的 GTM
              展示场和创意验证载体。各收入流对总 ARR 的相对贡献未公开；Runway 在 2026 年 2 月拒绝向 Crunchbase News 提供收入拆分数据。
