              Sacra 估算 2024 年 EBITDA 亏损约 $155 million，意味着月现金消耗超过 $12 million。$5.3 billion 估值背后的 ARR 估算从 $90
              million（Sacra，2025 年 6 月）到 $300 million（Getlatka，2025 年末）不等——五倍差距使隐含收入倍数（17× 到
              59×）有很大不确定性。如果竞争压力或诉讼影响拖慢增长，大幅下轮或 IPO 估值压缩的风险很实质。
