      - number: '1.4'
        title: Key Metrics and Market Position
        blocks:
          - type: paragraph
            body: >-
              Runway's revenue trajectory demonstrates exceptional growth: $3 million (2021), $4.5 million (2022), $48.7
              million (2023), and $121.6 million in ARR for 2024, per Getlatka and Electroiq. The 2023-to-2024
              acceleration of approximately 2.5× reflects mainstream adoption of Gen-2 and subsequent models alongside
              early enterprise API contract ramp. TechCrunch reported at the time of the April 2025 Series D that Runway
              was targeting $300 million in annualized revenue for 2025, a target Getlatka reports as achieved in
              October 2025. Caution: Sacra separately estimates $70 million ARR at year-end 2024 and $90 million in June
              2025 — materially lower than Getlatka and Electroiq. This discrepancy may reflect the distinction between
              recognized GAAP revenue versus ARR or bookings, and warrants primary-source clarification in diligence. By
              November 2024, Runway had approximately 100,000 users per Electroiq; Getlatka reports approximately
              300,000 customers as of 2025. Enterprise customers span every major film studio and include Chime,
              Robinhood, Allstate, PayPal, Yamaha, Palo Alto Networks, Siemens, SoFi, Prudential, Gamma, and AAA —
              demonstrating meaningful cross-sector diversification beyond Hollywood. Website traffic peaked at
              approximately 11.83 million monthly visits in December 2023, ranking eleventh globally. Runway was named
              among TIME Magazine's 100 Most Influential Companies in 2023. Headcount is estimated at approximately 382
              in 2025, sourced from secondary aggregators without primary-source confirmation.
