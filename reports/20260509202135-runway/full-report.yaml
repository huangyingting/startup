            title: Open-Source Proliferation Caps Pricing Power in Prosumer Segment
            body: >-
              Open-source AI video models (LTX-2, Wan 2.2) account for approximately 40% of all AI video generations in
              2025 despite being free to use. While commercial platforms dominate revenue, the open-source share sets a
              price ceiling in the prosumer market: users who do not need enterprise support or consistency guarantees
              can generate video at marginal cost. This structural dynamic is analogous to the enterprise software vs.
              open-source dynamic in databases and infrastructure—commercial incumbents retain enterprise market share
              but cannot raise prices in the consumer tier. Runway's moat must increasingly come from model quality
              differentiation and enterprise features (consistency, safety, support, compliance) rather than access
              alone.
