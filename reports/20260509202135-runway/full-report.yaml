      - number: '4.3'
        title: Revenue Trajectory and Financial Performance
        blocks:
          - type: paragraph
            body: >-
              Runway's reported revenue trajectory is one of the most dramatic in the generative AI sector. Getlatka and
              Electroiq consistently report: $3 million in 2021, $4.5 million in 2022, $48.7 million in 2023 (a roughly
              10× increase driven by Gen-2 mainstream adoption), and $121.6 million ARR in 2024. TechCrunch reported at
              the April 2025 Series D announcement that Runway was targeting $300 million in annualized revenue for
              2025; Getlatka subsequently reported this target was reached in October 2025, representing approximately
              147% year-over-year growth from 2024. However, a material discrepancy exists. Sacra independently
              estimates $70 million ARR at year-end 2024 and $90 million ARR by June 2025—materially lower than
              Getlatka's $121.6 million and $300 million figures. Sacra further reports $44 million of GAAP-recognized
              revenue for calendar 2024, suggesting the Getlatka figure may represent ARR bookings or contracted value
              rather than GAAP revenue. The resolution of this discrepancy is a priority diligence item: the difference
              between $44 million and $121.6 million in 2024 revenue is not a rounding error; it implies either (a)
              significant deferred revenue from long-term enterprise contracts not yet recognized, or (b) fundamentally
              different metric definitions between Getlatka (which aggregates self-reported data) and Sacra (which uses
              proprietary estimation models). Sacra also reports a 2024 EBITDA loss of approximately $155 million,
              driven by heavy GPU compute costs for inference, AI model training expenditure, and headcount scaling.
              This represents a burn of more than 3× recognized revenue—a capital-intensity profile consistent with a
              company still subsidizing growth through venture capital. Revenue quality deserves scrutiny: a significant
              portion of 2025 revenue growth likely reflects the Series D's April 2025 timing enabling accelerated
              enterprise hiring and compute scale-up, making 2025 the first full year benefiting from Series D capital.
              Whether the $300 million ARR figure represents run-rate or trailing twelve months is not disclosed in
              public sources.
            claimRefs:
              - CI017
              - CI018
              - CI019
              - CI020
              - CI021
              - CI022
              - CI023
              - CI024
              - CI038
              - CI039
      - number: '4.4'
        title: Capital Adequacy and Funding Position
        blocks:
          - type: paragraph
            body: >-
              Runway's funding history (detailed in the Company Overview chapter) culminates in $860 million of total
              capital raised through February 2026 across seven confirmed financing events. For the purposes of capital
              adequacy assessment in this chapter, the forward-looking view matters most: the February 2026 Series E of
              $315 million—led by General Atlantic, with NVIDIA, Adobe Ventures, AMD Ventures, Fidelity,
              AllianceBernstein, Mirae Asset, Emphatic Capital, Felicis, and Premji Invest participating—was raised at a
              $5.3 billion post-money valuation, and the proceeds are explicitly earmarked for expanded research
              capacity, compute infrastructure (including a confirmed agreement with CoreWeave for GB300 NVL72 systems),
              and scaling enterprise sales and go-to-market. The April 2025 Series D of $308 million was similarly
              earmarked for AI research, hiring, and Runway Studios expansion. With a Sacra-estimated 2024 EBITDA burn
              of $155 million and $860 million raised in total (with the bulk of the Series D and Series E arriving in
              2025 and early 2026), the implied cash position as of Series E close is material—likely in the range of
              $400–$600 million depending on cumulative burn since the 2022 Series C. No debt facilities, convertible
              notes, or project-finance obligations have been publicly disclosed. The expanded Series E
              syndicate—including Adobe Ventures and AMD Ventures alongside returning investors NVIDIA, General
              Atlantic, and Fidelity—signals strategic alignment across the AI compute and creative software stacks,
              reducing the risk that any single investor relationship constrains Runway's strategic direction. However,
              monthly burn rate, exact cash on hand, and the trigger conditions for a next financing event are not
              public. CoreWeave's status as a primary compute provider represents a supplier concentration risk: any
              deterioration in CoreWeave's financial stability or pricing terms could materially affect Runway's
              inference cost structure and product roadmap cadence.
            claimRefs:
