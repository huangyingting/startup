      - number: '4.5'
        title: Financial Risks and Diligence Blockers
        blocks:
          - type: paragraph
            body: >-
              Six financial risk categories require primary diligence before capital allocation decisions can be
              underwritten with confidence. First, compute cost dependency: Runway's EBITDA loss of approximately $155
              million in 2024 (Sacra) reflects the cost of GPU inference at scale—a cost that is not declining as fast
              as Runway's revenue is growing because new higher-quality models (Gen-4, Gen-4.5, GWM-1) consume
              significantly more compute per output. Runway's CoreWeave agreement provides some infrastructure cost
              visibility but does not eliminate supplier concentration risk. Second, copyright litigation exposure:
              Runway faces an active artist class action lawsuit alleging unauthorized use of copyrighted works for
              model training, defended under the fair use doctrine; no dispositive ruling has been issued. An adverse
              ruling could require retroactive licensing fees, materially increase future training data costs, or
              restrict the scope of Runway's model training—all of which would impair the gross margin trajectory the
              current valuation implies. Third, the Lionsgate partnership complications: The Wrap reported in 2025 that
              the Lionsgate partnership encountered unforeseen challenges, with the Lionsgate library described as
              insufficient to create the large-scale AI models needed for the ambitious projects originally envisioned.
              While Lionsgate reaffirmed the partnership is ongoing, the reported limitations call into question the
              scalability of Runway's custom model studio partnership revenue stream. Fourth, revenue recognition and
              metric quality risk: the material gap between Sacra's $44 million GAAP revenue and Getlatka's $121.6
              million ARR for 2024 means the market is underwriting Runway at a valuation multiple that is sensitive to
              which metric is "real." Fifth, unknown gross margins: Runway has not disclosed cost of revenue, gross
              margin, or any P&L breakdown. Without this, capital intensity analysis relies entirely on third-party
              estimates (Sacra's EBITDA) that are themselves single-source and unaudited. Sixth, revenue concentration:
              Runway's enterprise base includes "every major film studio" and notable brands, but the top-10 customer
              concentration—and corresponding contract renewal risk—is unknown.
