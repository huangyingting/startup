      - number: '6.6'
        title: Exhibits
        blocks:
          - type: callout
            title: Large Free-to-Paid Funnel Powered by Viral Product-Led Growth
            body: >-
              Runway has demonstrated a highly effective product-led growth loop: each successive model quality
              milestone (Gen-2 in 2023, Gen-3 in 2024, Gen-4 in 2025) generated organic viral discovery events that
              drove new user registration without disclosed paid marketing spend. The 10× revenue jump from $4.5M to
              $48.7M between 2022 and 2023 is the clearest evidence of this dynamic. The 11.83 million website visits in
              December 2023 at a 5-minute-32-second average session time signals strong product stickiness among
              experimenters. The credit-exhaustion upsell mechanism and 30+ tool suite are structurally sound retention
              and ARPU expansion drivers within the individual creator segment. TIME100 and Fast Company recognition
              reinforce brand credibility that reduces paid acquisition cost.
            calloutType: strength
            claimRefs:
              - CU004
              - CU005
              - CU006
              - CU007
              - CU026
              - CU028
              - CU029
              - CU039
              - CU040
          - type: callout
            title: Lionsgate Deal Complications Reveal Enterprise Model Fragility
            body: >-
              The Lionsgate partnership complications — documented by The Wrap in 2025 — expose a structural weakness in
              Runway's enterprise studio strategy: a custom model trained on a single studio's library is insufficient
              for ambitious large-scale production. The expert assessment that "even the Disney catalog is too small to
              create a model" suggests Runway's enterprise value proposition for Hollywood studios requires either
              multi-studio library aggregation (raising rights complexity) or combining studio-custom models with
              Runway's general-purpose base model (diluting the proprietary advantage). Copyright complications around
              actor rights add further legal friction. The non-exclusive deal structure means Lionsgate can
              simultaneously engage multiple AI providers, and the studio has confirmed it is doing exactly that. With
              no other publicly named studio customers, the Lionsgate complications are a concentrated risk to the
              enterprise revenue thesis.
            calloutType: risk
            claimRefs:
              - CU020
              - CU021
              - CU022
              - CU023
              - CU024
          - type: callout
            title: Absence of Enterprise Retention Metrics Creates Diligence Blind Spot
            body: >-
              Runway does not publicly disclose NRR, GRR, churn rates, subscription renewal rates, cohort retention
              data, or ARPU by segment. At $121.6M ARR (2024), these are standard enterprise SaaS metrics that
              sophisticated investors require for revenue quality assessment. The combination of (1) no disclosed
              retention metrics, (2) a single named enterprise customer whose deal has hit documented complications, and
              (3) intense price competition from lower-cost alternatives in the individual creator segment creates a
              significant diligence blind spot. The credit-based model may mask churn through involuntary upgrades
              rather than genuine retention, making independent metric disclosure particularly important.
            calloutType: risk
            claimRefs:
              - CU030
              - CU034
              - CU036
              - CU046
          - type: callout
            title: 'Credit Economics: Structural ARPU Expansion with Competitive Vulnerability'
            body: >-
              The credit-based consumption model is a double-edged mechanism. On the positive side, it creates natural
              upsell pressure as professional creators exhaust credits mid-project and upgrade to higher tiers — a
              structural ARPU expansion driver. On the negative side, it exposes Runway to direct cost comparison: when
              a Standard-plan user produces only ~62 seconds of Gen-3 Alpha per month at $35/month, the cost per second
              ($0.56) is a visible and easily benchmarked figure against Kling AI's $0.07–$0.14/second API pricing or
              Pika's free-tier offerings. For casual/budget-conscious users — the widest funnel segment — this economics
              calculus favors migrating to lower-cost alternatives as competitor model quality improves. Runway's
              competitive defense in this segment is quality differentiation and tool suite breadth, not price.
            calloutType: insight
            claimRefs:
              - CU029
              - CU034
              - CU043
              - CU044
              - CU045
