              - CR029
          - type: callout
            title: All Financial Risk Metrics Sourced from Unaudited Third Parties
            body: >-
              The EBITDA loss estimate ($155M), ARR figures ($90M–$300M range), and cash burn estimates in this chapter
              are entirely sourced from third-party aggregators (Sacra, Getlatka, Electroiq) without audited financial
              statement confirmation. Runway has not publicly disclosed audited financials. Any investment or
              acquisition decision should be conditioned on obtaining audited statements, recognized revenue schedules,
              and gross margin data directly from Runway.
