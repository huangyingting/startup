chapters:
  - number: 1
    title: Company Overview
    sections:
      - number: '1.1'
        title: Company Identity and Business Model
        blocks:
          - type: paragraph
            body: >-
              Runway (runwayml.com) is a New York City–based applied AI research company incorporated in 2018. The
              company's stated mission is to build foundational General World Models capable of simulating all possible
              worlds and experiences, positioning the next era of intelligence as coming from AI systems that can
              understand, perceive, generate, and act in the world. Operationally, Runway generates revenue by
              developing and commercializing generative AI models for media creation — primarily text-to-video and
              image-to-video generation — and increasingly via world simulation tools for enterprise verticals including
              entertainment, architecture, advertising, gaming, and robotics. The company's core product suite includes
              Gen-4.5 (its current flagship video model, described by the company as the world's top-rated video model),
              GWM-1 (a General World Model available in Worlds, Avatars, and Robotics variants for interactive,
              real-time world simulation), Act-One (character performance generation from single-camera video input
              without specialized equipment, launched October 2024), and the Characters API (a real-time video agent API
              built on GWM-1 for custom conversational video personas). Runway monetizes its platform through self-serve
              subscriptions priced between approximately $12 and $95 per user per month, metered GPU-minute charges for
              heavier workloads, and a per-seat enterprise pricing model for larger deployments. The company also
              operates Runway Studios, an in-house film and animation production arm that serves as both a creative
              showcase and a go-to-market vehicle for Hollywood relationships.
            claimRefs:
              - CO001
              - CO004
              - CO005
              - CO030
              - CO031
              - CO032
              - CO041
              - CO042
              - CO045
      - number: '1.2'
        title: Founders, Leadership, and Governance
        blocks:
          - type: paragraph
            body: >-
              Runway was co-founded in 2018 by three graduates of New York University's Interactive Telecommunications
              Program (ITP): Cristóbal Valenzuela (CEO), Anastasis Germanidis (CTO), and Alejandro Matamala-Ortiz (CPO).
              The founders bring complementary backgrounds spanning AI research, software engineering, and creative
              product design — a combination that shaped Runway's dual identity as both a research laboratory and a
              creator-facing product company. Valenzuela has been the primary external spokesperson articulating
              Runway's vision of AI as a new medium for artistic expression, most visibly in the Lionsgate partnership
              announcement and the Series D and E fundraises. Germanidis co-authored the December 2023 foundational
              research paper outlining the General World Model research program and leads the company's technical
              research direction. Matamala-Ortiz leads product strategy and design. Public information on Runway's full
              board composition, governance structure, or independent director representation is not disclosed in the
              company's press materials or in any publicly available source reviewed during this research. This
              represents a material governance information gap. Key-person concentration risk on the founding trio —
              particularly Valenzuela as chief external spokesperson and strategy leader — is a factor prospective
              investors should independently probe. No material leadership departures have been reported in public
              sources reviewed for this chapter.
            claimRefs:
              - CO002
              - CO003
              - CO004
              - CO033
              - CO046
      - number: '1.3'
        title: Funding History and Capitalization
        blocks:
          - type: paragraph
            body: >-
              Runway has executed at least eight known financing rounds since its 2018 founding, progressively
              attracting marquee institutional and strategic investors. Starting with approximately $2 million in Seed
              funding at founding, the company raised $8.5 million in a December 2020 Series A and $35 million in a
              December 2021 Series B. A December 2022 Series C of approximately $50 million established mid-stage
              credibility before the generative AI funding boom accelerated. The inflection came with a June 2023 Series
              C Extension of $141 million at a $1.5 billion valuation, anchored by Salesforce Ventures, Google, and
              Nvidia — three strategically relevant investors — establishing Runway's unicorn status. An April 2025
              Series D of $308 million led by General Atlantic, with Fidelity Management & Research, Baillie Gifford,
              Nvidia, and SoftBank Vision Fund 2 participating, pushed the post-money valuation to approximately $3
              billion and brought cumulative funding to $536.5 million per Crunchbase. Most recently, in February 2026,
              Runway closed a $315 million Series E at a $5.3 billion post-money valuation, again led by General
              Atlantic, with Nvidia, Adobe Ventures, AMD Ventures, Fidelity, AllianceBernstein, Mirae Asset, Emphatic
              Capital, Felicis Ventures, and Premji Invest participating. Total funding through the Series E stands at
              approximately $860 million per Crunchbase. The expanded Series E syndicate — including Adobe Ventures and
              AMD Ventures alongside returning investors — signals both platform ambitions and infrastructure
              diversification. No secondary transaction volumes, formal debt facilities, or cap table structure have
              been publicly disclosed.
