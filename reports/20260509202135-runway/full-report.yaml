  - number: 6
    title: Customers
    sections:
      - number: '6.1'
        title: Customer Base Overview
        blocks:
          - type: paragraph
            body: >-
              Runway's reported user metrics span multiple tiers of engagement. As of Q1 2024, the platform had
              accumulated approximately 4 million registered users (wifitalents, single-source estimate) with roughly
              1.2 million monthly active users as of 2023. The paying subscriber base exceeded 100,000 as of November
              2024 per Skim AI data cited by electroiq, with wifitalents separately reporting that the paid user base
              tripled to 100,000 during 2023. A higher figure of ~300,000 total customers in 2025 is cited by getlatka
              but is unverified by official Runway disclosures. Website traffic peaked at 11.83 million visits in
              December 2023, with an average session duration of 5 minutes and 32 seconds — unusually high engagement
              for a SaaS creative tool — and grew 9.14% month-over-month during that period. Revenue growth corroborates
              user adoption: $3M (2021), $4.5M (2022), $48.7M (2023), $121.6M (2024), implying a combination of
              subscriber growth and increasing per-user consumption as model quality improved through Gen-2, Gen-3, and
              Gen-4. Geographic concentration is estimated at approximately 45% North America and 30% Europe based on
              third-party analytics, though no official breakdown has been disclosed. The paid user base skews heavily
              toward individual creators and prosumers (the largest segment by account count), with marketing agencies
              and enterprise film/TV clients representing a smaller number of accounts but disproportionately larger
              per-account revenue. No paid conversion rate, ARPU, or cohort-level retention data has been publicly
              disclosed by Runway.
            claimRefs:
              - CU001
              - CU002
              - CU003
              - CU004
              - CU005
              - CU006
              - CU007
              - CU008
              - CU026
      - number: '6.2'
        title: Key Enterprise Customer Relationships
        blocks:
          - type: paragraph
            body: >-
              Runway's most significant disclosed enterprise relationship is the Lionsgate partnership announced on
              September 18, 2024 — described as the first publicly disclosed collaboration between a major Hollywood
              studio and a generative AI video startup. The deal involved Lionsgate providing its 20,000+ title film and
              television library to Runway to train a proprietary custom AI model accessible exclusively to Lionsgate
              filmmakers, directors, and production staff. Lionsgate Vice Chair Michael Burns characterized Runway as a
              "visionary, best-in-class partner" at announcement, and subsequently told New York magazine's Vulture that
              he could use AI to remake a John Wick-style franchise as a PG-13 anime in "three hours." However, The Wrap
              reported in 2025 that the partnership encountered significant early complications. According to two people
              familiar with the situation, the Lionsgate catalog — despite spanning 20,000+ titles — proved insufficient
              to train a model for the ambitious large-scale projects envisioned. An industry expert cited in The Wrap
              stated: "The Lionsgate catalog is too small to create a model. In fact, the Disney catalog is too small to
              create a model." Copyright concerns around actor talent rights for AI training compounded the legal
              friction. A Lionsgate spokesman told The Wrap the studio is still pursuing AI on "several fronts as
              planned" and confirmed the deal is non-exclusive, allowing Lionsgate to engage multiple AI providers
              simultaneously. Beyond Lionsgate, Runway's other enterprise relationships are not publicly named. The
              company's enterprise page references custom model training and team workspaces, and Runway Studios works
              directly with filmmakers. Electroiq references CBS's Late Show production team using Runway for composite
              creation and KPF Architects for architectural animation — both indicating real professional adoption
              outside Hollywood studios, though neither represents a formal enterprise contract with disclosed terms.
              Third-party source wifitalents claims A24 as a partner, but this is not corroborated by official
              announcements and carries very low confidence.
            claimRefs:
              - CU009
              - CU017
              - CU018
              - CU019
              - CU020
              - CU021
              - CU022
              - CU023
              - CU024
              - CU025
              - CU037
              - CU038
      - number: '6.3'
        title: Individual Creator and Prosumer Segment
        blocks:
          - type: paragraph
            body: >-
              The individual creator and prosumer segment — comprising indie filmmakers, YouTubers, social media content
              creators, motion designers, and marketing professionals — represents the largest block of Runway's paying
              subscriber base by account count and the foundation of its subscription revenue. Gen-2's launch in 2023
              was the key inflection point: text-to-video generation drove viral adoption and contributed to the 10×
              revenue jump from $4.5M to $48.7M that year. Gen-3 Alpha (June 2024) and Gen-4 (March 2025) deepened
              professional creator adoption by delivering cinematic quality and character consistency capabilities
              previously unavailable from any AI model. Runway's subscription ladder from Free (125 one-time credits)
              through Basic ($15/month), Standard ($35/month), Pro ($95/month), and Unlimited ($145/month) is designed
              to convert experimenters to recurring subscribers. The credit system creates friction for heavy users: the
              Standard plan's 2,250 credits yield approximately 225 seconds of Gen-3 Turbo video or ~62 seconds of Gen-3
              Alpha at 10 credits/second — often insufficient for a single commercial project iteration cycle. This
              economics dynamic pushes professional creators toward Pro ($95/month) or Unlimited ($145/month) tiers,
              increasing ARPU but also sharpening price comparison against lower-cost alternatives. Pika, Kling AI, and
              free-tier competitors attract budget-conscious hobbyists who would otherwise anchor at Runway's Basic
              tier. Professional reviewers rate Runway's overall value at 9.4/10 (bestaicompared) and 4.5/5
              (toolschool.ai) for commercial work, while consistently flagging credit cost, output quality variance, and
              video length limits as barriers. Runway's association with Oscar-winning film "Everything Everywhere All
              at Once" and the Hundred Film Fund program serve as creator community engagement and word-of-mouth
              acquisition mechanisms.
            claimRefs:
              - CU010
              - CU011
              - CU013
              - CU014
              - CU015
