      - number: '6.4'
        title: Customer Acquisition and Retention Mechanics
        blocks:
          - type: paragraph
            body: >-
              Runway's customer acquisition is driven primarily by model quality milestones generating organic viral
              adoption: Gen-2's text-to-video breakthrough (2023), Gen-3 Alpha's cinematic quality upgrade (2024), and
              Gen-4's character consistency unlock (March 2025) each produced observable spikes in website traffic,
              press coverage, and social sharing. The company does not disclose customer acquisition cost, paid
              marketing spend, or channel attribution. The freemium model — 125 free one-time credits enabling full
              product experience before credit exhaustion drives conversion — appears to be the dominant acquisition
              motion. The platform's 30+ creative tool suite provides retention surface beyond video generation: tools
              like Motion Brush, AI Inpainting, Green Screen AI, and Frame Interpolation increase stickiness by
              replacing multiple point-solution workflows. For enterprise clients, custom model training on a studio's
              proprietary IP library creates a structural switching cost: the client would need to re-invest in model
              training with any alternative provider. The Lionsgate complications reveal the risk: if the custom model
              does not deliver production-quality outputs for ambitious use cases, the switching cost is insufficient to
              prevent churn or non-renewal. No NRR, GRR, subscription renewal rates, or cohort-level retention metrics
              have been disclosed. Enterprise contract lengths, renewal mechanisms, and volume discount structures are
              also unknown. The credit-based model's upsell pressure may mask involuntary upgrades (buying credits
              mid-project to finish work) as genuine retention, making independent metric disclosure particularly
              important for diligence.
            claimRefs:
              - CU030
              - CU031
              - CU032
              - CU034
              - CU043
              - CU044
              - CU045
              - CU046
      - number: '6.5'
        title: 'Voice of Customer: Reviews, Testimonials, and Adverse Signals'
        blocks:
          - type: paragraph
            body: >-
              Third-party review aggregators provide a moderately positive but nuanced signal on Runway's customer
              satisfaction. BestAICompared rates Runway 9.4/10 overall (updated September 2025), with five-star ratings
              for video quality and features, four-star ratings for ease of use and value. Toolschool.ai gives Runway
              4.5/5 with a "highly recommended" verdict for commercial and professional use. Recurring professional
              reviewer criticisms cluster around four themes: (1) credit cost — the Standard plan's ~62 seconds of Gen-3
              Alpha per month is "barely enough for a single social media teaser"; (2) output quality variance — results
              "can be inconsistent" and may require multiple regenerations, compounding credit costs; (3) video length
              limits — maximum 10 seconds per generation lags OpenAI Sora's 60-second clips on equivalent tiers; (4)
              queue times and occasional server downtime during peak hours. The most materially adverse customer signal
              comes from The Wrap's 2025 investigation into the Lionsgate-Runway deal: the partnership's technical
              aspirations significantly exceeded what the custom model could deliver. The expert quoted in The Wrap
              summarized: "To create a full professional workflow, you need more than just one model; you need an
              ecosystem" — a direct challenge to Runway's single-model enterprise value proposition for studios.
              Copyright concerns over AI training on talent-related content add legal friction that studio legal
              departments are navigating cautiously. Runway's official customers page surfaces curated creator
              testimonials endorsing the platform's creative capabilities, though these are company-selected and not a
              systematic satisfaction survey. No NPS, CSAT, or systematic enterprise satisfaction data has been
              identified in public sources.
            claimRefs:
              - CU032
              - CU033
              - CU034
              - CU035
              - CU036
              - CU037
              - CU039
