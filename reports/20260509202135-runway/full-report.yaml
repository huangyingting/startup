      - number: '1.5'
        title: Milestones, Partnerships, and Adverse Events
        blocks:
          - type: paragraph
            body: >-
              Runway's operational history encompasses a rapid sequence of product launches, financing milestones,
              strategic partnerships, and emerging legal risks. On the product side, the company progressed from Gen-1
              (2022) through Gen-2 (2023), Gen-3 Alpha (June 2024), Act-One (October 2024), Gen-4 (March 2025), GWM-1
              (December 2025), and Gen-4.5 (current flagship as of 2026) — each generation addressing prior model
              limitations, with Gen-4 introducing character and location consistency across scenes without fine-tuning,
              and GWM-1 extending into interactive world simulation with Worlds, Avatars, and Robotics variants. The
              Lionsgate partnership announced in September 2024 represented the first publicly disclosed Hollywood
              studio collaboration by any generative AI company, involving a custom model trained on Lionsgate's
              proprietary 20,000-title library. However, The Wrap reported in 2025 that the partnership encountered
              complications: Lionsgate's catalog proved insufficient as a standalone training corpus for the ambitious
              use cases initially envisioned, and legal uncertainty around actor likenesses and ancillary rights created
              additional friction. On the adverse side, 404 Media reported in July 2024 that Runway allegedly scraped
              thousands of YouTube videos from prominent creators and brands — including Marques Brownlee, Casey
              Neistat, Disney, and Netflix — to train its Gen-3 model. Runway also faces a class action lawsuit filed by
              artists alleging training on copyrighted artwork without authorization; Runway's defense invokes the fair
              use doctrine. These unresolved legal matters constitute material overhang requiring dedicated legal
              diligence. A compute infrastructure agreement with CoreWeave supports Runway's scaling strategy.
