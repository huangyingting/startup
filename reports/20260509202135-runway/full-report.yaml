              - CM008
              - CM009
              - CM010
              - CM011
          - type: callout
            title: World Modeling Opens a TAM Expansion Not Captured in Any Current Report
            body: >-
              Every AI video market report reviewed (Fortune, Grand View, MarkNtel, Knowledge Sourcing, Apatero) sizes
              the creative video generation market only. Runway's GWM-1 Robotics product— generating physics-consistent
              synthetic training data for robot policy development—addresses an entirely different demand pool estimated
              in aggregate at $2.1 billion by 2028 for synthetic data broadly (MarketsandMarkets). Runway's addressable
              slice of this is not yet quantifiable, but the strategic rationale is significant: enterprise contracts
              with robotics firms carry much higher ACV and lower churn than prosumer subscriptions, and could
              materially shift Runway's revenue quality if the world model bets pay off.
