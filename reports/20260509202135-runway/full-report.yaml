  - number: 7
    title: Risks
    sections:
      - number: '7.1'
        title: Legal and Regulatory Risk
        blocks:
          - type: paragraph
            body: >-
              Runway's most acute legal exposure stems from two concurrent copyright-related proceedings. First, a class
              action lawsuit filed by visual artists in the Northern District of California names Runway alongside other
              AI defendants, alleging that training data included copyrighted artwork without authorization and in
              violation of the DMCA. Runway's defense rests on the fair use doctrine, but this defense has not been
              tested at trial; in analogous 2025 decisions, courts reached different conclusions in Bartz v. Anthropic
              (training held transformative/fair use) and Kadrey v. Meta (also fair use, but with narrow factual scope),
              leaving material uncertainty about the outcome for video-generation training. The Copyright Alliance
              reports that over 70 infringement lawsuits have been filed against AI companies as of 2025, and the $1.5
              billion Anthropic settlement demonstrates the potential magnitude of liability when pirated-library
              training data is involved.

              Second, a July 2024 report by 404 Media, corroborated by SiliconANGLE and TheOutpost, alleged that Runway
              scraped thousands of YouTube videos for Gen-3 training using an internal spreadsheet that targeted
              channels including Disney, Netflix, Sony, Pixar, Casey Neistat, and Marques Brownlee. The leaked document
              indicated the company used proxies to bypass YouTube's Terms of Service; YouTube leadership characterized
              the scraping as a clear Terms of Service violation. Runway has not publicly disclosed the training data
              composition for Gen-3, Gen-4, or GWM-1.

              Regulatory risk compounds the litigation exposure. The EU AI Act, enacted in 2024 with prohibited-practice
              provisions effective February 2025, imposes transparency and disclosure obligations on AI systems deployed
              in the EU market. High-risk AI system obligations (including dataset quality requirements, activity
              logging, and documentation mandates) take effect in August 2026 and August 2027. Runway must assess which
              of its systems qualify as high-risk under the Act's definitions. Additional regulatory layers include
              emerging deepfake legislation across US states and the EU, and actor likeness rights legislation
              intersecting with Runway's Hollywood customer base — complications already evidenced in the Lionsgate
              partnership.
            claimRefs:
              - CR001
              - CR002
              - CR003
              - CR004
              - CR005
              - CR006
              - CR007
              - CR008
              - CR009
              - CR010
      - number: '7.2'
        title: Competitive Risk
        blocks:
          - type: paragraph
            body: >-
              Runway competes in a market attracting disproportionate capital and talent from the world's largest
              technology companies, creating structural disadvantages in compute scale, distribution reach, and product
              integration. OpenAI Sora generates videos up to 60 seconds — compared to Runway's 16-second cap on Gen-4.5
              — at 4K resolution on paid tiers, and benefits from Microsoft Azure's enormous compute infrastructure.
              Google's Veo 2 and Veo 3 are embedded in YouTube's creator ecosystem, providing direct access to the
              world's largest video-publishing platform as a distribution and customer acquisition moat that Runway
              cannot easily replicate. DeepMind's research capacity further accelerates Google's model iteration pace.

              Chinese competitors represent an underappreciated structural threat. Kling, developed by Kuaishou, offers
              comparable video generation quality at materially lower prices, enabling aggressive capture of
              cost-sensitive creators and SMBs globally. The speed of improvement among Chinese models — Kling and Wan
              Video in particular — matches or exceeds Runway's generation cadence, and potential US export control
              actions on Chinese AI tools could paradoxically strengthen Kling's position within China and neutral
              markets. Adobe Firefly, integrated directly into Premiere Pro, compounds the threat from the creative
              workflow side: Adobe is simultaneously a Series E investor and a direct product competitor, creating a
              complex partner-vs.-competitor dynamic that could affect Runway's market access. Meta's Movie Gen has been
              announced as a direct competitor in AI video for entertainment. Open-source models including Stability
              AI's Stable Video Diffusion represent a zero-marginal-cost alternative for technically sophisticated users
              who do not need managed infrastructure.
            claimRefs:
              - CR011
              - CR012
              - CR013
              - CR014
              - CR015
              - CR016
              - CR017
              - CR018
      - number: '7.3'
        title: Financial and Business Risk
        blocks:
          - type: paragraph
            body: >-
              Runway's financial profile is characterized by rapid top-line growth offset by large and persistent
              operating losses. Sacra estimates an EBITDA loss of approximately $155 million for 2024 — implying a burn
              rate likely exceeding $12 million per month and total cash consumption that could exhaust the pre-Series E
              balance well within 18 months without continued fundraising. The company has raised $860 million in total
              through the February 2026 Series E, but all funding has been equity-based; no disclosed debt facility or
              recurring-revenue credit line has been announced. The path to profitability is unclear: compute costs for
              training and inference are structural and scale with usage, not offset by it at current pricing levels.

              Valuation risk is material. The $5.3 billion post-money Series E valuation implies a multiple of
              approximately 17× to 59× ARR depending on which revenue estimate is used — Getlatka's $300 million or
              Sacra's $90 million as of June 2025. If ARR growth decelerates as the video generation market
              commoditizes, or if a litigation adverse judgment requires data exclusion that degrades model performance,
              the multiple compression risk could be severe and could complicate a future IPO or secondary transaction.
              No public exit timeline has been disclosed. Revenue concentration risk is additional: the company's
              revenue base is primarily subscription and a small number of large enterprise contracts, with Lionsgate as
              the highest-profile named customer — a customer whose partnership has encountered documented
              complications. The absence of audited financials from primary sources, and the five-fold discrepancy
              between Sacra's and Getlatka's ARR estimates, represents an information gap that prospective investors
              must resolve through primary-source review.
            claimRefs:
              - CR019
              - CR020
              - CR021
              - CR022
              - CR023
              - CR024
              - CR025
              - CR026
      - number: '7.4'
        title: Technology and Operational Risk
        blocks:
          - type: paragraph
            body: >-
              Runway's technical operations carry several compounding dependencies. The company is reliant on Nvidia
              GPUs for model training and inference — a concentration that exposes it to GPU supply constraints, pricing
              leverage by Nvidia, and competitive disadvantage relative to vertically integrated incumbents (Google on
              TPUs, OpenAI with Microsoft compute capacity). Runway's CoreWeave cloud compute agreement addresses scale
              but creates vendor lock-in: if CoreWeave's financial position, pricing terms, or capacity allocations
              change, Runway's cost structure and delivery capability are directly affected. AMD Ventures joined the
              Series E, potentially signaling compute diversification intent, but the practical transition to AMD
              hardware for large-scale AI training remains operationally complex.

              Key-person concentration on CEO Cristóbal Valenzuela is significant. Valenzuela is the primary external
              spokesperson, deal-maker (Lionsgate partnership, Series D and E), and the most visible articulator of the
              General World Model thesis. His departure would create uncertainty for investor confidence, enterprise
              partnerships, and product strategy continuity. No public succession plan or executive bench disclosure has
              been identified.

              At the model level, each generation of Runway's models deprecates prior capabilities and introduces new
              user migration costs. Gen-4 introduced character consistency but capped video duration at 16 seconds,
              limiting its utility for long-form content against Sora's 60-second output. AI video outputs remain
              inherently stochastic; high-profile quality failures in customer-facing workflows could damage brand
              credibility with enterprise accounts. Runway's refusal to disclose training data composition for Gen-4 and
              GWM-1 leaves open the possibility of future regulatory or legal challenge for those newer models — not
              only Gen-3.
            claimRefs:
              - CR027
              - CR028
              - CR029
              - CR030
              - CR031
              - CR032
              - CR033
      - number: '7.5'
        title: Market and Execution Risk
        blocks:
          - type: paragraph
            body: >-
              Runway's enterprise Hollywood strategy — exemplified by the Lionsgate partnership announced in September
              2024 — has encountered early friction. The Wrap reported in 2025 that Lionsgate's 20,000-title catalog
              proved insufficient as a standalone training corpus for the ambitious generative use cases the partnership
              envisioned, and that copyright uncertainty around actor likenesses and ancillary rights created unresolved
              legal complications. These findings are a cautionary signal that the studio-model-training revenue
              strategy may require larger multi-studio catalogs and clearer regulatory frameworks before it can scale.

              SAG-AFTRA and WGA labor agreements reached in 2023 include provisions restricting AI use on union-covered
              productions, creating legal friction for studios seeking to deploy Runway's tools in film and television
              workflows. Studios' internal legal functions are reportedly urging caution until copyright and talent
              rights boundaries are clearer, slowing enterprise adoption velocity. This dynamic extends to advertising
              and commercial production, where brand safety concerns about AI-generated content's training provenance
              may deter risk-averse corporate customers.

              The AI video market faces structural commoditization pressure as Chinese competitors undercut on price and
              open-source alternatives eliminate the cost of managed infrastructure for technical users. A race to the
              bottom on pricing could compress Runway's gross margins precisely when the company needs margin expansion
              to approach profitability. Reputation risk from the YouTube scraping media coverage in July 2024 — which
              received broad pickup including SiliconANGLE, PC Gamer, and TheOutpost — may reduce willingness among
              large media companies, who are themselves rights holders, to sign enterprise contracts with Runway.
              Deepfake fraud incidents quadrupled year-over-year by 2025, increasing regulatory pressure on AI video
              platforms to implement content authentication measures that may impose technical and compliance costs.
            claimRefs:
              - CR034
              - CR035
              - CR036
              - CR037
              - CR038
              - CR039
              - CR040
      - number: '7.6'
        title: Exhibits
        blocks:
          - type: callout
            title: 'Copyright Litigation: High-Severity, Unresolved Overhang'
            body: >-
              Runway faces a class action lawsuit from visual artists and unresolved YouTube scraping allegations
              covering its Gen-3 training dataset. Both remain active as of the May 2026 research date. The Anthropic
              precedent — a $1.5 billion settlement over pirated-library training data — illustrates potential liability
              magnitude. An adverse ruling on fair use could require data exclusion (degrading model quality), impose
              retroactive licensing costs, and deter risk-averse enterprise customers who are themselves rights holders.
              No primary-source legal strategy disclosure from Runway is available; diligence must include PACER docket
              review and direct legal counsel interview.
            calloutType: risk
            claimRefs:
              - CR001
              - CR002
              - CR006
              - CR009
              - CR010
          - type: callout
            title: 'Profitability Path Unclear: $155M EBITDA Loss vs. $5.3B Valuation'
            body: >-
              Sacra estimates a 2024 EBITDA loss of approximately $155 million, implying monthly cash consumption
              exceeding $12 million. The $5.3 billion valuation is supported by ARR estimates ranging from $90 million
              (Sacra, June 2025) to $300 million (Getlatka, late 2025) — a five-fold discrepancy that creates
              significant uncertainty in the implied revenue multiple (17× to 59×). If growth decelerates due to
              competitive pressure or litigation impact, the risk of a significant down-round or compressed IPO
              valuation is material.
            calloutType: risk
            claimRefs:
              - CR019
              - CR020
              - CR023
              - CR024
              - CR025
          - type: callout
            title: Big-Tech Competitive Advantage Is Structural, Not Temporary
            body: >-
              OpenAI (Sora/Microsoft compute) and Google (Veo/YouTube distribution/TPUs) hold structural advantages in
              compute scale, distribution reach, and capital that Runway cannot close through VC funding alone. Sora's
              60-second video duration versus Runway's 16-second cap is a current product disadvantage in long-form
              content use cases. Kling's price competition from a state-backed Chinese company creates a two-front war:
              premium differentiation upmarket and price defense downmarket simultaneously.
            calloutType: risk
            claimRefs:
              - CR011
              - CR012
              - CR013
              - CR017
              - CR018
          - type: callout
            title: 'Key-Person Risk: No Disclosed Succession Plan'
            body: >-
              CEO Cristóbal Valenzuela is Runway's primary external deal-maker, investor-relations lead, and public
              articulator of the General World Model vision. His departure without a named successor would create
              immediate uncertainty across investor confidence, enterprise partnerships (including the Lionsgate deal),
              and talent retention. No board composition disclosure, no succession plan, and no depth of C-suite
              visibility has been identified in public sources. This is a standard diligence ask that prospective
              investors should address directly.
            calloutType: risk
