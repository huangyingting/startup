  - number: 8
    title: Valuation
    sections:
      - number: '8.1'
        title: Current Valuation Snapshot
        blocks:
          - type: paragraph
            body: >-
              Runway closed its Series E financing round on February 10, 2026, raising $315 million at a $5.3 billion
              post-money valuation led by General Atlantic — the same firm that led the April 2025 Series D at a $3.3
              billion valuation. The round included participation from NVIDIA, Adobe Ventures, AMD Ventures, Fidelity
              Management & Research Co., AllianceBernstein, Mirae Asset, Emphatic Capital, Felicis Ventures, and Premji
              Invest. Total capital raised since the company's 2018 founding now stands at approximately $860 million
              across seven financing events, positioning Runway as the most heavily capitalized independent AI video
              company in the United States. The February 2026 Series E came 10 months after the April 2025 Series D
              ($308 million at $3.3 billion), itself only 20 months after the June 2023 Series C extension ($141 million
              at $1.5 billion). The financing cadence — three major rounds in under three years — signals strong
              investor conviction and an expectation of continued high capital consumption, consistent with the $155
              million EBITDA loss reported by Sacra for calendar 2024.

              The $5.3 billion valuation represents a specific moment in the generative AI bull market: global AI video
              funding in 2025 totaled $3.08 billion, up 94.6% from the $1.58 billion raised by AI video startups in 2024
              (Crunchbase data). Runway's closest direct competitor in the funding environment, Luma AI, raised a $900
              million Series C in November 2025 at a $4 billion valuation. The strategic investor composition of the
              Series E is notable for what it signals: NVIDIA's participation (its third consecutive round with Runway)
              provides compute alignment; Adobe Ventures' participation creates a complex partner-competitor dynamic
              given Adobe Firefly's direct product competition; and AMD Ventures' entry suggests potential compute
              diversification away from NVIDIA-exclusive infrastructure.

              Runway declined to disclose revenue figures to Crunchbase News at the time of the Series E announcement,
              with head of operations Michelle Kwon describing growth as "extremely fast" without providing
              quantification. This opacity — combined with a five-fold discrepancy between third-party revenue estimates
              ($90 million per Sacra versus $300 million per Getlatka for 2025) — creates material uncertainty in the
              implied valuation multiple and constrains independent valuation analysis to estimate-based ranges rather
              than confirmed metrics.
            claimRefs:
              - CV001
              - CV002
              - CV003
              - CV004
              - CV015
              - CV016
              - CV017
              - CV040
              - CV044
      - number: '8.2'
        title: Revenue Multiple Analysis and Comparable Benchmarks
        blocks:
          - type: paragraph
            body: >-
              Runway's ARR multiple at the Series E varies dramatically depending on which revenue estimate is used as
              the denominator. On Getlatka's $300 million ARR estimate (reportedly reached in October 2025), the $5.3
              billion valuation implies approximately 18× ARR — within the elevated range for high-growth AI software
              but not extreme by 2024-2025 AI market standards. On Sacra's $90 million ARR estimate for June 2025, the
              implied multiple rises to approximately 59×, which would represent a price more consistent with frontier
              AI laboratory valuations (Anthropic at approximately 21× on $850 million ARR) than with video software
              tools. Even at the intermediate Sacra estimate of $70 million ARR for year-end 2024, the April 2025 Series
              D at $3.3 billion implies a 47× multiple — suggesting that either the market is pricing in substantial
              near-term growth, or Sacra's estimates materially understate Runway's actual ARR.

              Comparable private company benchmarks provide mixed context. ElevenLabs achieved a $3 billion valuation at
              $90 million ARR in 2024 — an implied multiple of approximately 33× for voice AI. Midjourney, the image AI
              leader, commanded an estimated $10 billion valuation at approximately $200 million in annual revenue,
              implying 50× multiple — but Midjourney is profitable with no external venture funding, a fundamentally
              different risk profile. Anthropic raised at an approximately 21× multiple on $850 million ARR, but
              Anthropic's addressable market (LLMs as infrastructure) is wider than Runway's current video tools market.
              Stability AI, a cautionary comparable, peaked at a $1 billion valuation in 2022-2023 before facing
              financial difficulties in 2024 — demonstrating that even well-capitalized generative AI companies can see
              rapid value destruction when competitive pressures intensify and the cost structure outpaces revenue.

              High-growth SaaS benchmarks from the 2024-2025 public market environment typically yield 8-15× ARR
              multiples for companies growing at 50-100% annually. Runway's claimed 147% YoY growth rate (2024-2025 per
              Getlatka) would justify a premium above this range, but the absence of audited financials, gross margin
              disclosure, and recognized revenue schedules means the premium relies entirely on self-reported and
              aggregator-estimated metrics rather than investor-grade financial statements.
            claimRefs:
              - CV005
              - CV006
              - CV007
              - CV008
              - CV009
