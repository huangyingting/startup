      - number: '3.4'
        title: Pricing and Packaging Comparison
        blocks:
          - type: paragraph
            body: >-
              The AI video generation market has stratified into four distinct pricing tiers as of Q1 2026. The free /
              open-source tier (Wan 2.6, LTX-2, Pika limited free) provides professional-grade output at zero marginal
              cost for users with GPU infrastructure or willingness to use limited credits. The value commercial tier
              ($6.99–$19.99/month) includes Kling standard ($6.99/month), Hailuo 2.3 (~$14.99/month), and Google Veo 3
              via AI Pro ($19.99/month)—all offering high-ELO-ranked outputs. The professional tier ($29.99–$76/month)
              spans Luma Ray 3 unlimited ($29.99/month) and Runway's subscription tiers ($12–$76/month). The enterprise
              / metered tier covers API-based pricing; Kling's API rates ($0.07–$0.14/second) are structurally lower
              than comparable Runway API rates.

              Runway's $12/month base plan is 42% more expensive than Kling's $6.99/month standard plan, and its
              $76/month top tier is more expensive than Luma's unlimited offering ($29.99/month). Google's $19.99/month
              Veo 3 access provides a #3-ranked model at a price point below Runway's mid tier. This pricing structure
              means Runway is positioned as a premium professional tool—a viable moat only if quality and workflow
              integration justify the premium. The rapid closure of the ELO quality gap (top 5 models within ~67 ELO of
              each other) represents a structural threat to Runway's pricing power in the mid-market.

              Gen-3 Alpha Turbo remains available at 5 credits/second—50% less than standard Gen-3 at 10
              credits/second—and renders 7× faster, providing a speed/cost escape valve for budget-conscious
              subscribers. Gen-4 adds approximately 15–20% premium per-second over standard Gen-3, with Gen-4 Turbo
              (April 2025) bridging quality and speed.
