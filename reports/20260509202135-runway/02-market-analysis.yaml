  evidenceGaps:
    - type: missing-source
      severity: material
      topic: Copyright litigation case status and financial exposure
      missingEvidence: >-
        The specific court case filing details, docket progress, preliminary rulings, and financial exposure estimates
        for Runway's artist copyright lawsuit are not publicly accessible in searchable form. VentureBeat confirms the
        lawsuit exists and Runway's fair use defense, but no case filings were retrieved.
      whyItMatters: >-
        An adverse ruling could require retroactive licensing of training data, restrict future training pipelines, or
        result in settlement payments—all of which would materially affect Runway's model training cost structure and
        competitive position.
      diligencePath: >-
        Search PACER (U.S. federal court docket system) for the specific case name. Request legal counsel update from
        Runway during due diligence. Obtain outside counsel opinion on likelihood of adverse outcome and financial
        exposure range.
      relatedQuestionRefs:
        - QM010
    - type: missing-source
      severity: material
      topic: Runway's actual SAM penetration rate
      missingEvidence: >-
        Runway does not disclose subscriber counts, enterprise customer count, or revenue by segment. The SAM
        penetration calculation in section 6 is based on two undisclosed numbers (Runway revenue and market size),
        making it highly uncertain.
      whyItMatters: >-
        Without audited revenue data, it is impossible to verify whether Runway is a market share leader or a niche
        player within its SAM. A 2× error in either direction changes the competitive positioning narrative materially.
      diligencePath: >-
        Request revenue breakdown by segment (consumer subscription, enterprise, API) during management meetings.
        Cross-reference against Google Play / App Store revenue intelligence tools. Obtain enterprise customer list
        under NDA.
      relatedQuestionRefs:
        - QM013
    - type: missing-source
      severity: material
      topic: AI video generator market 2026 sizing update
      missingEvidence: >-
        No analyst report reviewed provides a 2026 market size estimate with full methodology disclosed. Fortune
        Business Insights provides a 2026 forecast number ($847M) but within a paywalled report; the accessible portion
        cites only the 2025 base.
      whyItMatters: >-
        Given the market's 13–33% annual growth rate, a 2026 estimate would differ materially from the 2025 figures used
        in this chapter. Decisions made on 2025 data could underestimate the market runway by 13–33%.
      diligencePath: >-
        Purchase Fortune Business Insights or MarkNtel Advisors full reports. Run cross-validation using Runway's
        reported ARR trajectory against market share assumptions.
      relatedQuestionRefs:
        - QM025
    - type: private-evidence-only
      severity: material
      topic: GWM Robotics commercial traction
      missingEvidence: >-
        Runway confirmed active enterprise conversations for GWM Robotics but no signed contracts, pricing, or customer
        names have been disclosed publicly.
      whyItMatters: >-
        The world modeling TAM expansion narrative depends entirely on GWM Robotics converting enterprise conversations
        to contracts. Without confirmed deals, the TAM expansion remains theoretical.
      diligencePath: >-
        Request pipeline data and LOIs under NDA. Ask for robotics firm references who are in evaluation. Verify SDK
        adoption metrics via GitHub/PyPI download counts for GWM Robotics SDK.
      relatedQuestionRefs:
        - QM011
    - type: conflicting-data
      severity: minor
      topic: 'Regional market leadership: North America vs. Asia-Pacific'
      missingEvidence: >-
        Fortune Business Insights reports North America holds 41% of the market in 2025. MarkNtel Advisors reports
        Asia-Pacific leads with 37%+ market share. These cannot both be correct for the same market scope and year.
      whyItMatters: >-
        Runway's current customer base is primarily North American and European. If Asia-Pacific actually leads,
        Runway's market penetration outside its home region is lower than North America share would suggest.
      diligencePath: >-
        Reconcile by confirming scope definitions: MarkNtel's Asia-Pacific leadership likely reflects user volume
        (social media creators), while Fortune's North America leadership reflects revenue (enterprise spend). Request
        revenue vs. volume breakdown from analysts.
      relatedQuestionRefs:
        - QM003
