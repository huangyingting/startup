callouts:
  - calloutType: risk
    title: Wide Analyst Estimate Spread Creates Sizing Uncertainty
    body: >-
      2025 market size estimates for AI video generation range from $716.8 million (Fortune Business Insights) to $4.55
      billion (Grand View Research)—a 6× variance driven by scope definitions, not data quality differences. Investors
      relying on a single estimate risk mispricing Runway's market penetration rate by an order of magnitude. The most
      defensible approach is to use the narrow Knowledge Sourcing figure ($1.08B) as the floor and Grand View's broad
      figure as the ceiling, and to track Runway's own revenue as the primary market signal rather than top-down
      estimates.
    claimRefs:
      - CM007
      - CM008
      - CM009
      - CM010
      - CM011
  - calloutType: insight
    title: World Modeling Opens a TAM Expansion Not Captured in Any Current Report
    body: >-
      Every AI video market report reviewed (Fortune, Grand View, MarkNtel, Knowledge Sourcing, Apatero) sizes the
      creative video generation market only. Runway's GWM-1 Robotics product— generating physics-consistent synthetic
      training data for robot policy development—addresses an entirely different demand pool estimated in aggregate at
      $2.1 billion by 2028 for synthetic data broadly (MarketsandMarkets). Runway's addressable slice of this is not yet
      quantifiable, but the strategic rationale is significant: enterprise contracts with robotics firms carry much
      higher ACV and lower churn than prosumer subscriptions, and could materially shift Runway's revenue quality if the
      world model bets pay off.
    claimRefs:
      - CM003
      - CM004
      - CM037
  - calloutType: risk
    title: Open-Source Proliferation Caps Pricing Power in Prosumer Segment
    body: >-
      Open-source AI video models (LTX-2, Wan 2.2) account for approximately 40% of all AI video generations in 2025
      despite being free to use. While commercial platforms dominate revenue, the open-source share sets a price ceiling
      in the prosumer market: users who do not need enterprise support or consistency guarantees can generate video at
      marginal cost. This structural dynamic is analogous to the enterprise software vs. open-source dynamic in
      databases and infrastructure—commercial incumbents retain enterprise market share but cannot raise prices in the
      consumer tier. Runway's moat must increasingly come from model quality differentiation and enterprise features
      (consistency, safety, support, compliance) rather than access alone.
    claimRefs:
      - CM028
      - CM029
