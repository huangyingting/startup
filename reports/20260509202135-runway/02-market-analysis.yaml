  - id: SM-SEC-04
    title: Demand Drivers and Structural Tailwinds
    body: >-
      Four structural forces are accelerating AI video adoption across all segments.

      First, video content consumption is growing faster than production capacity. The U.S. National Telecommunications
      and Information Administration reports that video accounts for more than 65% of global mobile internet traffic.
      YouTube reports paying out $70 billion to creators over three years as of 2024, and introduced Google DeepMind's
      Veo into YouTube Shorts—signaling that the largest video platform believes generative AI is the next production
      layer. TikTok processes 25 million video uploads per day. This consumption-production gap creates structural
      demand for tools that reduce the cost and time of video creation.

      Second, AI model quality is crossing professional-grade thresholds. Runway's Gen-4 launch in April 2025 introduced
      character consistency across shots—resolving the single largest technical deficiency of AI video for professional
      production. Gen-4.5 added native audio generation and multi-shot editing. The GWM-1 world model extends
      capabilities to physics-consistent simulation. Each capability unlock expands the addressable use cases and
      de-risks enterprise adoption.

      Third, inference costs are falling dramatically. Apatero reports a 70% reduction in average AI video generation
      time from 2024 to 2025, with cloud API costs at $0.05–$0.15 per generation. This cost curve mirrors the GPU
      compute price-performance trajectory and is expected to continue. Falling costs lower the ROI threshold for
      adoption across all buyer segments.

      Fourth, enterprise AI adoption is accelerating broadly. McKinsey's 2025 State of AI survey reports that 88% of
      organizations now use AI in at least one business function (up from 78% in 2024), and AI is enabling innovation at
      64% of companies. AI high performers are deploying AI in marketing and sales at nearly three times the rate of
      laggards. This macro tailwind directly lifts demand for AI creative tools including video generation.

      Two structural constraints limit near-term growth. Copyright and training data litigation is ongoing—Runway is
      defending an artist lawsuit alleging unauthorized use of copyrighted works for model training, per VentureBeat.
      Resolution in either direction (court ruling or legislative clarification) could materially affect model training
      economics. The open-source competitive threat is real: Apatero reports that open-source models (LTX-2, Wan)
      account for approximately 40% of all AI video generations in 2025, limiting Runway's pricing power in the prosumer
      segment even as commercial platforms dominate revenue at 60% of generations.
