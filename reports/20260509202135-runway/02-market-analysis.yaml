  - id: SM-SEC-02
    title: Market Sizing and Growth Forecasts
    body: >-
      Multiple independent analyst reports provide a wide spread of market size estimates, reflecting different scope
      definitions and methodologies. The table below summarizes the six most credible sourced figures for the AI video
      generator market. At the narrow end, Knowledge Sourcing Intelligence and Research and Markets both report $1.08
      billion in 2025 growing to $1.97 billion in 2030 at a 12.8% CAGR—a conservative estimate focused purely on
      text-to-video and PowerPoint-to-video software products. MarkNtel Advisors estimates the 2024 base at $0.43
      billion scaling to $2.34 billion by 2030 at a 32.8% CAGR, reflecting a later-starting base year. Fortune Business
      Insights places 2025 revenue at $716.8 million scaling to $3.35 billion by 2034 at 18.8% CAGR.

      At the broader AI video market level (which includes analytics, editing automation, and video AI tools beyond pure
      generation), Grand View Research sizes the 2024 market at $3.86 billion ($4.55 billion in 2025) growing to $42.29
      billion by 2033 at a 32.2% CAGR. The Apatero industry aggregate estimates the generation-only market at $1.8
      billion in 2025 with 35–40% annual growth, citing 50 million monthly active users across all platforms as the
      demand anchor.

      The wide range of estimates ($0.72 B–$4.55 B for 2025) is driven by scope differences, not methodological error.
      Investors should use the Knowledge Sourcing / Research and Markets $1.08 billion figure as the conservative floor
      for the narrow AI video generation market, and the Grand View $4.55 billion figure as the reference for the
      broader AI video software market. Runway competes primarily in the narrow segment but its API and enterprise
      partnerships touch the broader market.

      North America accounts for 34–41% of global AI video market revenue depending on the report (Fortune Business
      Insights reports 41%; Grand View Research 34.8% for the broader market). Asia-Pacific is the fastest-growing
      region in all reports, driven by China, India, and Japan, with MarkNtel Advisors attributing 37%+ market share to
      the region in 2024 for video generator tools—reflecting the region's large social media content creator base and
      government AI investments.

      Across all credible forecasts, the directional signal is consistent: the AI video generation market is growing at
      13–33% annually through 2030, driven by falling inference costs, improving model quality, and expanding enterprise
      adoption. The most likely 2025–2030 CAGR for the narrow generation-only market is 20–25%.
