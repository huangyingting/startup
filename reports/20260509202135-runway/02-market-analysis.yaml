chapter:
  number: 2
  title: Market Analysis
  summary: >-
    Runway operates at the intersection of two converging markets: the narrow AI video generator market (estimated
    $1.1–1.8 B in 2025, CAGR 12–33% depending on scope) and the broader AI video market ($4.6 B in 2025 growing to $42 B
    by 2033 at 32% CAGR). Six distinct buyer segments drive demand, led by enterprise studios, advertising agencies, and
    content creators. Structural tailwinds—explosive video consumption, falling inference costs, and Hollywood's embrace
    of AI production tools—are accelerating adoption, while regulatory uncertainty (EU AI Act, US copyright litigation)
    and open-source commoditization represent the primary headwinds. Runway's expanding scope into world modeling
    (GWM-1) opens a multi-hundred-billion-dollar adjacency in robotics and simulation that is not captured in current
    market sizing estimates.
