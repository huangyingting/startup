  - id: SM-SEC-03
    title: Customer Segments and Adoption Pathways
    body: >-
      Six distinct buyer segments represent Runway's addressable customer base, each with different budget ownership,
      procurement dynamics, and value propositions.

      Enterprise media and entertainment studios represent the highest-value segment. Film studios and streaming
      services face the most acute cost pressure from AI, but also stand to gain the most from AI-assisted production.
      Runway's partnership with Lionsgate—a first-of-its-kind deal giving the studio a custom AI model trained on its
      20,000+ title catalog—signals the enterprise studio opportunity. Budget owners are CTOs and heads of production
      with six- to eight-figure annual technology budgets. The adoption trigger is competitive pressure: studios that
      fail to integrate AI face cost disadvantages relative to those that do.

      Advertising agencies and marketing teams constitute the highest-volume enterprise segment by number of
      organizations. Fortune Business Insights reports that marketing and advertising accounts for 33.9% of AI video
      generator market spend in 2026. McKinsey's 2025 State of AI survey found that AI-driven revenue increases are most
      commonly reported in marketing and sales use cases, consistent with agencies deploying AI video tools for campaign
      production. Budget ownership sits with CMOs and creative directors; procurement is driven by cost efficiency and
      turnaround speed.

      Independent filmmakers and creative professionals are Runway's most vocal early-adopter segment. VentureBeat's
      coverage of Gen-4 highlighted that the character consistency breakthrough makes AI-assisted filmmaking "actually
      useful" for professional production—a direct translation of technical capability into buyer value. The Runway
      Hundred Film Fund (offering up to $1 million per project) targets this segment directly.

      Content creators represent the largest user segment by headcount. The global creator economy has approximately 200
      million people who consider themselves creators (Influencer Marketing Hub, 2022), with the creator economy
      projected to reach $480 billion by 2027. Apatero reports 50 million monthly active AI video users across all
      platforms in 2025, with 38% of users creating social media content. This segment is price-sensitive,
      monthly-subscription-driven, and churn-prone.

      Technology companies—particularly robotics and autonomous vehicle firms—represent Runway's emerging enterprise
      segment via GWM Robotics. Synthetic training data for robot policy development is a multi-billion-dollar problem
      with no incumbent generative solution. GWM Robotics, available via Python SDK, is in active discussions with
      robotics firms for enterprise deployment (per TechCrunch and DataPhoenix). This segment has longer sales cycles
      but higher contract values and lower churn.

      Small and medium enterprises are the fastest-growing segment by Fortune Business Insights estimates (SMEs forecast
      at 21.1% CAGR), driven by increasing affordability of AI video tools and the democratization of professional-grade
      content production. The IT and telecom sector is the largest end-user vertical by market share (~34%, per
      MarkNtel), primarily driven by employee training and documentation video needs.
