  - id: SM-SEC-05
    title: Regulatory Environment
    body: >-
      Runway faces a two-front regulatory risk: AI-specific regulation in the EU and copyright law uncertainty in the
      United States.

      The EU AI Act (Regulation 2024/1689), with prohibitions effective February 2025, classifies AI systems by risk
      level. Generative AI video tools do not fall under the unacceptable-risk prohibitions (which cover manipulation,
      social scoring, and biometric surveillance), but high-capability foundation models face General-Purpose AI (GPAI)
      obligations including transparency requirements and, for models trained on datasets exceeding 10^25 FLOPs,
      systemic risk assessments. Runway's models are likely covered by GPAI provisions given their scale. Compliance
      requires documentation of training data sources—a requirement that intersects directly with Runway's ongoing
      copyright litigation.

      In the United States, there is no equivalent comprehensive AI act. Copyright law uncertainty around AI training
      data is being litigated across multiple cases. Runway has cited fair use in its defense but courts have not yet
      issued dispositive rulings. Adverse outcomes could require licensing historical training data retroactively or
      restricting future training pipelines, increasing model training costs.

      The MarkNtel Advisors report identifies ethical and legal risks as the primary challenge for the AI video
      generator market, noting that unauthorized use of copyrighted video content for model training could result in
      legal action that hinders market growth. Fortune Business Insights similarly flags regulatory and legal
      uncertainty as the primary market restraint, noting that the absence of clear laws on ownership and data use makes
      adoption harder, especially in jurisdictions with strict content rules.

      Positively, governments in India (IndiaAI Mission, $1.2 billion committed 2024–2029), the UK (AI Opportunity
      Action Plan), and the US are actively funding AI infrastructure and development, creating a tailwind for AI
      capability investment even as compliance requirements increase. Runway's enterprise focus on regulated sectors
      (studios, healthcare training) means regulatory compliance could become a competitive advantage over
      less-compliant open-source alternatives.
