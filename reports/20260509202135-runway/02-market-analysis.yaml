  - id: SM-SEC-06
    title: Runway's Serviceable and Obtainable Market
    body: >-
      Applying a bottom-up lens to the sizing: Runway's directly serviceable market (SAM) within the narrow AI video
      generator market consists of the commercial/enterprise segment (42% of market by Apatero's segment breakdown),
      which totals approximately $756 million at $1.8 billion total market. Adding the developer/API segment (27%), the
      SAM expands to approximately $1.2 billion. At reported annualized revenue of $100–300 million (per Sacra and
      Deadline estimates for early 2025), Runway holds an estimated 8–25% of its own SAM—a wide range that reflects the
      uncertainty in both the market size denominator and Runway's undisclosed revenue.

      Runway's SOM (obtainable market) in the near term (2025–2027) is bounded by enterprise capacity: the number of
      advertising agencies, studios, and tech companies that can onboard an enterprise AI video contract in any given
      year. With 15 million estimated monthly active users (per Apatero) and a freemium-to-paid conversion, Runway's
      user base is large but monetization depth per user is the binding constraint.

      The world modeling expansion represents a SAM extension rather than a separate market entry. The synthetic data
      market for robotics is projected to reach $2.1 billion by 2028 (MarketsandMarkets for synthetic data generation
      broadly, at 45.7% CAGR). Runway's GWM Robotics targets a subset of this—specifically policy training data for
      physical robots—which is not yet sized by any public analyst report. Enterprise conversations are underway but no
      revenue has been disclosed.

      The most material uncertainty in Runway's market sizing is the dependency on the enterprise adoption curve for
      generative AI creative tools. McKinsey reports that only one-third of organizations have begun scaling AI programs
      as of mid-2025—the majority are still experimenting or piloting. If scaling accelerates to 50–60% of organizations
      within two years, demand for tools like Runway's could see step-change growth. If scaling stalls—due to regulatory
      friction, incumbent resistance, or disappointing ROI—Runway's growth could decelerate sharply.
