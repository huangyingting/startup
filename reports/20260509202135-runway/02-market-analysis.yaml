sections:
  - id: SM-SEC-01
    title: Market Boundary and Scope
    body: >-
      Runway's addressable market can be defined at three nested levels of scope. The narrowest definition— AI video
      generator software that converts text, images, or existing footage into synthetic video—is the segment most
      directly measured by analyst firms. Estimates for this market in 2025 range from $716.8 million (Fortune Business
      Insights, excluding analytics and security use cases) to $1.8 billion (Apatero, including open-source platforms
      and API ecosystems). A broader definition adds AI-powered video analytics, content moderation, and automated
      editing tools, which Grand View Research sizes at $4.6 billion in 2025 growing to $42.3 billion by 2033. The
      broadest framing—generative AI creative tools including image, audio, and video generation—extends into the tens
      of billions.

      Excluded from Runway's direct addressable market are: (1) traditional video editing software such as Adobe
      Premiere Pro and DaVinci Resolve that use non-generative AI for color grading or noise reduction; (2) video
      surveillance and security analytics systems; (3) video streaming infrastructure (CDN, encoding). These adjacent
      sectors occasionally appear in broad analyst estimates and inflate TAM figures.

      The core demand mechanism is the substitution of traditional video production labor with AI inference: a marketing
      team that previously paid $50,000–$150,000 for a professional video shoot can now produce comparable-quality
      assets using AI tools for hundreds of dollars. This cost compression is the primary adoption driver across all
      segments and explains why marketing and advertising lead in market share (33.9% of spend, per Fortune Business
      Insights).

      Runway's stated expansion into world modeling—through GWM-1 (Worlds, Robotics, Avatars)—opens an entirely
      different demand pool: synthetic data for robot policy training, autonomous-vehicle simulation, and scientific
      discovery. This use case is not yet captured by any AI video market estimate and represents a potential TAM
      expansion of several orders of magnitude relative to creative video tools.
