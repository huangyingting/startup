  - id: enterprise-developer-platform
    title: Enterprise and Developer Platform
    body: >-
      Runway's enterprise and developer platform encompasses three primary access channels: a self-serve subscription
      product, a REST API, and a Python SDK for GWM Robotics. The Runway API offers "Build" and "Enterprise" tiers,
      providing access to Gen-4 Turbo and Gen-4 Images for embedding into external products and internal workflows.
      Strategic enterprise API partners include Omnicom, a global advertising holding company, demonstrating the
      platform's reach into large-scale commercial content production. Enterprise deployments on the API require
      applications to display "Powered by Runway" on applicable user interfaces. GWM Robotics is available via Python
      SDK to enterprise developer partners by request, and Runway was in active discussions with robotics companies for
      enterprise deployment as of the GWM-1 launch in December 2025. Enterprise customers reportedly include every major
      film studio plus cross-sector accounts such as Chime, Robinhood, Allstate, PayPal, Yamaha, Palo Alto Networks,
      Siemens, SoFi, Prudential, and AAA. Custom model training is offered to enterprise partners: the Lionsgate
      collaboration involved training a bespoke model on Lionsgate's proprietary 20,000-title library. Runway Studios,
      the company's production arm, supports enterprise go-to-market through original AI filmmaking and co-production
      with Hollywood entities. Runway also earmarked $5 million to fund up to 100 films using AI-generated video, a
      program that simultaneously validates Gen-4.5 capabilities at production scale and builds a portfolio of creative
      reference content for enterprise sales. The enterprise page targets entertainment, advertising, gaming,
      architecture, and robotics verticals, reflecting the company's ambition to expand the addressable market well
      beyond Hollywood.
