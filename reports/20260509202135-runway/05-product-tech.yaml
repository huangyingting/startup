chapter:
  number: 5
  title: Product & Technology
  summary: >-
    Runway operates a full-stack generative video and world simulation platform that has progressed from a creative
    video editor (Gen-1, 2022) to a general world model builder (GWM-1, December 2025). The current product suite spans
    Gen-4.5 (flagship video generation with native audio and multi-shot composition), GWM-1 in three specialized
    variants (Worlds for interactive environments, Avatars for conversational characters, Robotics for synthetic
    robot-training data via Python SDK), Act-One/Act-Two for motion-capture-free character animation, and 30+ creative
    tools accessible through a browser-based interface and a REST API. The core technical innovation in GWM-1 is an
    autoregressive diffusion architecture built by post-training Gen-4.5 on domain-specific data, enabling
    frame-by-frame real-time simulation rather than the batch generation used in standard video diffusion. Material
    technical risks include unresolved training data copyright litigation, an opacity policy on Gen-4 training data
    sources, undisclosed GWM-1 benchmark performance metrics, intense competition from Kling AI and OpenAI Sora, and
    compute cost scaling as generation duration and fidelity increase.
sections:
  - id: product-suite-overview
    title: Product Suite Overview
    body: >-
      Runway's commercial product suite has evolved through six distinct generational leaps since Gen-1 in 2022, each
      addressing limitations of the prior model. Gen-1 introduced video-to-video style transfer as the company's first
      public video generation model. Gen-2 (2023) introduced text-to-video generation and drove the revenue acceleration
      from $4.5 million (2022) to $48.7 million ARR (2023). Gen-3 Alpha (June 2024) delivered cinematic control at
      approximately 10 credits per second, with Gen-3 Alpha Turbo providing a 7× faster variant at roughly 5 credits per
      second. Gen-4, released March 31, 2025, introduced the core narrative breakthrough: precise character, location,
      and object consistency across scenes without fine-tuning or additional model training, enabling filmmakers to
      regenerate characters from multiple perspectives within a continuous narrative. Gen-4.5, launched in December
      2025, extended this with native audio generation, audio editing, and multi-shot video composition that can
      generate one-minute videos with character consistency and complex camera angles. Gen-4.5 surpassed both Google and
      OpenAI on the Video Arena leaderboard, according to TechCrunch reporting at the time of GWM-1's release. Act-One
      (October 22, 2024) added motion-capture-free character animation driven entirely by an actor's single-camera
      performance — no specialized equipment required — and a successor Act-Two became available to paid subscribers.
      GWM-1, released December 2025, launched the company's first general world model family in three specialized
      variants: GWM Worlds (explorable 3D environments at 24fps, 720p), GWM Avatars (conversational characters with lip
      sync and facial expressions), and GWM Robotics (synthetic training data for robot policy development via Python
      SDK). The broader creative tool suite includes over 30 tools including Motion Brush, AI Inpainting, Green Screen
      AI, Frame Interpolation, Director Mode, and Image-to-Image generation. Subscription pricing ranges from a Free
      tier (125 one-time credits) through Basic ($15/month, 625 credits), Standard ($35/month, 2,250 credits), Pro
      ($95/month, 6,750 credits), and Unlimited ($145/month) as of December 2025.
