  - id: core-technology-architecture
    title: Core Technology Architecture
    body: >-
      Runway's technology foundation rests on a sequence of increasingly sophisticated generative models. The standard
      Gen-4.5 video model uses a diffusion-based architecture trained on large-scale video datasets to generate entire
      video clips in a single inference pass. GWM-1 represents a significant architectural departure: it uses an
      autoregressive diffusion architecture built by post-training Gen-4.5 on domain-specific data. Unlike standard
      diffusion models that generate entire videos simultaneously by progressively removing noise, GWM-1 generates one
      frame at a time based on past frames and control inputs. This autoregressive approach enables the model to respond
      to user control input in real time, making interactive world navigation possible. GWM-1 outputs video up to two
      minutes in length at 1280×720-pixel resolution (720p) at 24 frames per second. Within the GWM-1 family, Worlds,
      Robotics, and Avatars are currently implemented as separate specialized models, with Runway planning eventual
      unification into a single merged model. The platform operates entirely in the browser, requiring no local compute
      from end users, and is accessible via a REST API that embeds Gen-4 Turbo and Gen-4 Images into third-party
      products. GWM Robotics is additionally available through a Python SDK for enterprise developer integrations. On
      the trust and safety layer, Runway supports C2PA content provenance standards for watermarking generated content
      and operates a visual moderation system screening outputs before delivery. The API integration contract requires
      partner applications to display "Powered by Runway" branding on applicable user interfaces, establishing a
      downstream content accountability mechanism.
