  - id: technical-risks-limitations
    title: Technical Risks and Limitations
    body: >-
      Runway faces a cluster of material technical and legal risks that could affect model quality, compute economics,
      and competitive standing. The most acute risk is unresolved training data litigation. A class action lawsuit filed
      by visual artists alleges that Runway trained its models on copyrighted artwork without authorization; Runway's
      fair use defense has not been tested at trial as of the research date. 404 Media separately reported in July 2024
      that Runway allegedly scraped thousands of YouTube videos from prominent creators and brands — including Marques
      Brownlee, Casey Neistat, Disney, and Netflix — for Gen-3 training. Runway refuses to disclose where Gen-4's
      training data came from, citing competitive sensitivity, which compounds the opacity concern. An adverse ruling
      could impose retroactive licensing costs, require data exclusion that degrades model performance, and create
      reputational risk with enterprise customers who are themselves content rights holders. On the competitive side,
      Kling AI (Kuaishou) launched its own all-in-one video suite with native audio generation in December 2025,
      directly matching Gen-4.5's new audio capabilities, representing rapid quality improvement from Chinese AI
      developers. OpenAI's Sora remains a competitive reference for long-form video generation. Open-source models such
      as Stable Video Diffusion from Stability AI erode Runway's price premium in the prosumer segment. GWM-1 technical
      specifications — including parameter count, training data, methodology, and performance benchmarks — were not
      disclosed at launch, making independent capability verification impossible. Runway's compute infrastructure relies
      on cloud GPU providers, including CoreWeave per Crunchbase reporting, creating cost scaling exposure as model
      resolution, generation length, and real-time simulation demands increase. The credit-based pricing model means
      compute cost compression directly affects margin per generation, particularly as GWM-1's frame-by-frame
      autoregressive inference is inherently more compute-intensive than one-shot batch generation.
