  evidenceGaps:
    - type: missing-source
      severity: material
      topic: Gen-4, Gen-4.5, and GWM-1 training data composition and rights clearance
      missingEvidence: >-
        Runway has not published a training data card, data source disclosure, or rights licensing schedule for any of
        Gen-4, Gen-4.5, or GWM-1. The company's explicit policy is to withhold training data sources for competitive
        reasons. Independent audits of data quality, diversity, or copyright clearance are therefore impossible. The
        active artists class action and the 404 Media YouTube scraping report compound this gap.
      whyItMatters: >-
        Training data provenance is the single most material technical diligence item for Runway. An adverse fair use
        ruling could require data re-training, impose retroactive licensing costs, and degrade model performance — all
        three of which could simultaneously impair revenue, increase costs, and reduce product quality. Enterprise
        customers who are rights holders (e.g., studios, media companies) face reputational risk if their content was
        used without authorization.
      diligencePath: >-
        Request a training data provenance report and rights licensing schedule under NDA. Engage outside litigation
        counsel to assess the artists class action exposure and the YouTube scraping allegation. Benchmark fair use
        defense strength against comparable settled cases.
      relatedQuestionRefs:
        - QE017
        - QE018
        - QE019
        - QE030
      relatedTableRefs:
        - TE003
    - type: missing-source
      severity: material
      topic: GWM-1 benchmark performance metrics and parameter count
      missingEvidence: >-
        Runway did not disclose parameter count, training methodology, benchmark performance metrics, or comparative
        evaluation data for GWM-1 at launch. The only objective metric available is Gen-4.5's Video Arena leaderboard
        ranking (top position, December 2025). No equivalent benchmark ranking exists for GWM-1's world simulation
        capabilities.
      whyItMatters: >-
        Without benchmark data, the technical differentiation claim of GWM-1 vs. Google Genie-3 or World Labs Marble
        cannot be assessed. Investors cannot independently verify whether the architectural departure justifies the
        compute premium, or whether GWM-1's simulation fidelity meets the bar required for enterprise robotics training
        data applications.
      diligencePath: >-
        Request technical briefing and internal benchmark data from Runway research team. Commission independent
        third-party model evaluation. Review any arXiv or conference paper submissions from Runway on GWM-1
        architecture.
      relatedQuestionRefs:
        - QE003
        - QE010
        - QE016
        - QE025
        - QE029
      relatedTableRefs:
        - TE002
    - type: missing-source
      severity: minor
      topic: Runway API pricing per-second and enterprise contract terms
      missingEvidence: >-
        Runway's API pricing per second of generated video is not publicly disclosed. Enterprise contract terms, volume
        discounts, and SLA commitments are not in any public source. Kling AI's competing API rates ($0.07–$0.14 per
        second) are publicly disclosed, making direct API price competitiveness assessment impossible for Runway.
      whyItMatters: >-
        API economics are critical for modeling the developer and enterprise revenue streams. If Runway's API rates are
        materially above market, high-volume enterprise buyers will gravitate toward Kling or aggregator platforms
        (fal.ai) that offer both Kling and Runway at comparable quality.
      diligencePath: >-
        Request Runway API pricing schedule from developer relations or enterprise sales team. Obtain sample enterprise
        MSA to assess contract terms and SLA commitments.
      relatedQuestionRefs:
        - QE014
        - QE021
      relatedTableRefs:
        - TE002
    - type: enumeration-incomplete
      severity: minor
      topic: Complete Runway enterprise customer list and contract terms
      missingEvidence: >-
        Runway claims enterprise customers include every major film studio and named cross-sector accounts, but this
        claim is company-asserted and not independently verified by named customer press releases or case studies. The
        Runway Customers page (runwayml.com/customers) was inaccessible with meaningful content at research date.
        Contract sizes, renewal rates, and churn data are entirely private.
      whyItMatters: >-
        Enterprise customer quality and contract durability directly affect revenue predictability. If a material
        portion of the customer list consists of small-scale or pilot deployments, the enterprise ARR concentration and
        growth outlook may differ materially from the headline customer count.
      diligencePath: >-
        Request named customer list, NRR, and contract term distribution under NDA. Seek customer reference calls with
        three to five enterprise accounts from entertainment, advertising, and non-Hollywood verticals.
      relatedQuestionRefs:
        - QE013
        - QE024
      relatedTableRefs:
        - TE001
