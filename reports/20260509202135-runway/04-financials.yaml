  - id: revenue-trajectory-and-financial-performance
    title: Revenue Trajectory and Financial Performance
    body: >-
      Runway's reported revenue trajectory is one of the most dramatic in the generative AI sector. Getlatka and
      Electroiq consistently report: $3 million in 2021, $4.5 million in 2022, $48.7 million in 2023 (a roughly 10×
      increase driven by Gen-2 mainstream adoption), and $121.6 million ARR in 2024. TechCrunch reported at the April
      2025 Series D announcement that Runway was targeting $300 million in annualized revenue for 2025; Getlatka
      subsequently reported this target was reached in October 2025, representing approximately 147% year-over-year
      growth from 2024. However, a material discrepancy exists. Sacra independently estimates $70 million ARR at
      year-end 2024 and $90 million ARR by June 2025—materially lower than Getlatka's $121.6 million and $300 million
      figures. Sacra further reports $44 million of GAAP-recognized revenue for calendar 2024, suggesting the Getlatka
      figure may represent ARR bookings or contracted value rather than GAAP revenue. The resolution of this discrepancy
      is a priority diligence item: the difference between $44 million and $121.6 million in 2024 revenue is not a
      rounding error; it implies either (a) significant deferred revenue from long-term enterprise contracts not yet
      recognized, or (b) fundamentally different metric definitions between Getlatka (which aggregates self-reported
      data) and Sacra (which uses proprietary estimation models). Sacra also reports a 2024 EBITDA loss of approximately
      $155 million, driven by heavy GPU compute costs for inference, AI model training expenditure, and headcount
      scaling. This represents a burn of more than 3× recognized revenue—a capital-intensity profile consistent with a
      company still subsidizing growth through venture capital. Revenue quality deserves scrutiny: a significant portion
      of 2025 revenue growth likely reflects the Series D's April 2025 timing enabling accelerated enterprise hiring and
      compute scale-up, making 2025 the first full year benefiting from Series D capital. Whether the $300 million ARR
      figure represents run-rate or trailing twelve months is not disclosed in public sources.
