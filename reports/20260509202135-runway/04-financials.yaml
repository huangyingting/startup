  evidenceGaps:
    - type: private-evidence-only
      severity: critical
      topic: 'Runway segment revenue breakdown: subscription vs. enterprise vs. API vs. Studios'
      missingEvidence: >-
        No public source discloses Runway's revenue breakdown by segment. Runway declined to provide any revenue figures
        to Crunchbase News in February 2026, and no investor presentation, SEC filing, or regulatory disclosure is
        publicly available. The four-stream revenue model (subscription, enterprise per-seat, API, Runway Studios) is
        documented in structure but not in financial proportions.
      whyItMatters: >-
        Revenue concentration by segment fundamentally affects underwriting: if 80%+ of revenue is self-serve
        subscriptions with $144/year average (Standard plan), the LTV profile and growth ceiling differ radically from a
        scenario where 60%+ is enterprise contracts. Gross margin also varies significantly by segment: API inference is
        likely lower margin than pure subscription; Studios may be near zero margin currently.
      diligencePath: >-
        Request audited segment revenue breakdown for CY2022–CY2024. Obtain monthly ARR bridging schedule by segment.
        Request customer count by tier and trailing ARR contribution.
      relatedQuestionRefs:
        - QI016
        - QI019
    - type: private-evidence-only
      severity: critical
      topic: Monthly burn rate and verified cash position post-Series E
      missingEvidence: >-
        No public source discloses Runway's monthly cash burn, remaining cash balance, or credit facility. The only
        proxy available is Sacra's estimated $155M EBITDA loss for 2024, implying approximately $13M/month, but this is
        a single unaudited estimate. The Series E ($315M, Feb 2026) presumably provides substantial cash runway but the
        exact balance is unknown.
      whyItMatters: >-
        Without verified burn rate and cash position, capital adequacy cannot be assessed. If burn has accelerated to
        $20–25M/month in 2025 (consistent with 3× headcount growth and compute expansion), the Series E's $315M would
        provide only 12–15 months of runway—a materially shorter horizon than the 24+ months implied by the $13M/month
        proxy.
      diligencePath: >-
        Request 13-week cash flow forecast and trailing 12-month operating cash flow. Obtain audited balance sheet as of
        latest quarter-end. Request board-approved budget for CY2026 with sensitivity to compute cost and headcount
        scenarios.
      relatedQuestionRefs:
        - QI017
    - type: private-evidence-only
      severity: critical
      topic: Gross margin and cost of revenue disaggregation
      missingEvidence: >-
        Runway has not disclosed any P&L data beyond Sacra's estimate of the 2024 EBITDA loss. The $155M EBITDA loss
        does not distinguish between gross profit (before SG&A and R&D) and operating income. Gross margin
        drivers—compute cost per credit consumed, infrastructure amortization, data storage, and personnel in COGS—are
        all unknown from public sources.
      whyItMatters: >-
        The entire valuation thesis for Runway at 17.7× ARR depends on a credible path to software- like gross margins
        (60–80%) as inference costs decline with hardware progress. Without the current gross margin baseline, no model
        can assess whether this path is achievable within the investment horizon or whether compute costs will
        structurally cap margins below SaaS comparables.
      diligencePath: >-
        Request GAAP income statement with COGS line items for CY2022–CY2024. Request compute cost-per-unit (credits
        generated) for Gen-3 and Gen-4 generations to assess efficiency improvement trajectory. Obtain management's
        gross margin expansion model and key assumptions.
      relatedQuestionRefs:
        - QI018
    - type: private-evidence-only
      severity: material
      topic: Runway Studios discrete revenue and cost profile
      missingEvidence: >-
        No public source discloses Runway Studios' revenue contribution, project pipeline, or profitability. The Studios
        page describes work with filmmakers, studios, and musicians but provides no financial metrics. Given the scale
        of the main subscription business ($300M ARR target), Studios is likely a small revenue contributor operating at
        negative margin as a GTM showcase investment rather than a standalone profit center.
      whyItMatters: >-
        If Runway Studios is consuming $10–30M+ annually in production costs (consistent with a serious film/animation
        production arm employing screenwriters, animators, and creative producers) without material revenue offset, it
        represents a meaningful EBITDA drag that could persist well beyond the investment horizon. Conversely, if
        Studios successfully attracts studio co-production deals, it could become a higher-margin revenue stream.
      diligencePath: >-
        Request Studios revenue, headcount, and cost center P&L. Assess co-production deal pipeline and contract terms.
        Evaluate whether Studios is structured to generate IRR-positive returns or is primarily a GTM and brand
        investment.
      relatedQuestionRefs:
        - QI019
        - QI027
