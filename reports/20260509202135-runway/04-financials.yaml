  - id: pricing-and-monetization-structure
    title: Pricing and Monetization Structure
    body: >-
      Runway's monetization structure combines a subscription base with a consumption-based credit overlay, creating
      layered revenue opportunities across user segments. The Free plan grants 125 one-time credits (equivalent to 25
      seconds of Gen-4 Turbo or Gen-3 Alpha Turbo) with no credit renewal, functioning as a trial gate rather than a
      sustainable acquisition channel. The Standard plan at $12 per user per month (billed annually at $144) unlocks 625
      monthly credits, watermark- free 1080p output, Gen-4.5 text-to-video, Gen-4 image-to-video, Act-Two performance
      capture, access to third-party models (Veo 3.1, Kling 3.0 Pro, Seedance 2.0), and 100 GB asset storage. Based on
      aibrainjet's November 2025 analysis, a Pro tier at approximately $28 per month provides 2,250 credits per month
      with full Gen-4 access, while an Unlimited tier at approximately $76 per month provides the same 2,250 fast
      credits plus unlimited relaxed-mode generations—enabling overnight batch rendering without credit depletion, a
      feature agency and studio buyers find critical. Enterprise pricing is custom, with per-seat licensing that
      includes fine-tuning on proprietary datasets, SSO, and dedicated support infrastructure. The credit consumption
      economics create a systematic upsell funnel: Gen-3 Alpha consumes approximately 10 credits per second of generated
      video, meaning a Standard subscriber exhausts their monthly credits in approximately 62 seconds of Gen-3 Alpha
      footage—barely sufficient for a social media reel, far short of professional production needs. Gen-4 consumes
      10–15 credits per second for character-consistent generation, and Gen-4.5 costs approximately 12 credits per
      second. This math structurally pushes professional creators toward Unlimited and Enterprise tiers, or toward
      credit top-ups at incremental cost. Large studios pre-purchase credit bundles for higher-volume rendering,
      compressing per-credit cost while increasing revenue predictability. The tiered API pricing for Gen-4 Image at
      $0.08 per generated image provides a metered entry point for developers integrating Runway into their applications
      without subscription commitment.
