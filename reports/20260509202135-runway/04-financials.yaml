  - id: capital-adequacy-and-funding-position
    title: Capital Adequacy and Funding Position
    body: >-
      Runway's funding history (detailed in the Company Overview chapter) culminates in $860 million of total capital
      raised through February 2026 across seven confirmed financing events. For the purposes of capital adequacy
      assessment in this chapter, the forward-looking view matters most: the February 2026 Series E of $315 million—led
      by General Atlantic, with NVIDIA, Adobe Ventures, AMD Ventures, Fidelity, AllianceBernstein, Mirae Asset, Emphatic
      Capital, Felicis, and Premji Invest participating—was raised at a $5.3 billion post-money valuation, and the
      proceeds are explicitly earmarked for expanded research capacity, compute infrastructure (including a confirmed
      agreement with CoreWeave for GB300 NVL72 systems), and scaling enterprise sales and go-to-market. The April 2025
      Series D of $308 million was similarly earmarked for AI research, hiring, and Runway Studios expansion. With a
      Sacra-estimated 2024 EBITDA burn of $155 million and $860 million raised in total (with the bulk of the Series D
      and Series E arriving in 2025 and early 2026), the implied cash position as of Series E close is material—likely
      in the range of $400–$600 million depending on cumulative burn since the 2022 Series C. No debt facilities,
      convertible notes, or project-finance obligations have been publicly disclosed. The expanded Series E
      syndicate—including Adobe Ventures and AMD Ventures alongside returning investors NVIDIA, General Atlantic, and
      Fidelity—signals strategic alignment across the AI compute and creative software stacks, reducing the risk that
      any single investor relationship constrains Runway's strategic direction. However, monthly burn rate, exact cash
      on hand, and the trigger conditions for a next financing event are not public. CoreWeave's status as a primary
      compute provider represents a supplier concentration risk: any deterioration in CoreWeave's financial stability or
      pricing terms could materially affect Runway's inference cost structure and product roadmap cadence.
