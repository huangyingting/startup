figures:
  - id: "FU001"
    title: "Runway Revenue and User Adoption Growth Timeline (2021–2024)"
    type: "bar"
    summary: >-
      Bar visualization of Runway's revenue trajectory from $3M (2021) to $121.6M (2024) alongside
      key user adoption milestones, illustrating the compound effect of successive model quality
      upgrades (Gen-1 through Gen-4) on subscriber and revenue growth. The 2022–2023 jump (10× revenue
      increase) marks the Gen-2 viral adoption event. All revenue figures are third-party estimates
      from getlatka/electroiq; not officially confirmed by Runway. User metrics from wifitalents.
    data:
      items:
        - id: "rev-2021"
          label: "Revenue 2021 (est. $M ARR)"
          value: 3
          note: "~$3M ARR est.; pre-Gen-1 era; founding year user traction; no viral product moment yet"
        - id: "rev-2022"
          label: "Revenue 2022 (est. $M ARR)"
          value: 4.5
          note: "~$4.5M ARR est.; Gen-1 launch year; modest 50% growth; product still early-stage"
        - id: "rev-2023"
          label: "Revenue 2023 (est. $M ARR)"
          value: 48.7
          note: "~$48.7M ARR est.; Gen-2 text-to-video viral moment; 10× revenue jump; paid base triples to ~100K"
        - id: "rev-2024"
          label: "Revenue 2024 (est. $M ARR)"
          value: 121.6
          note: "~$121.6M ARR est.; Gen-3 Alpha (Jun 2024) and enterprise traction; 2.5× growth rate"
        - id: "users-2023"
          label: "MAU 2023 (millions)"
          value: 1.2
          note: "~1.2M monthly active users est. (2023); first disclosed MAU estimate; different unit from revenue bars"
        - id: "users-q1-2024"
          label: "Registered Users Q1-2024 (millions)"
          value: 4
          note: "~4M registered users est. (Q1 2024); large unmonetized pool; free-to-paid conversion unknown"
        - id: "paying-nov2024"
          label: "Paying Subscribers Nov-2024 (thousands)"
          value: 100
          note: "100K+ paying users (Nov 2024); ~2.5% implied conversion if 4M registered; different unit"
        - id: "web-dec2023"
          label: "Website Visits Dec-2023 (millions/mo)"
          value: 11.83
          note: "Peak organic traffic at Gen-2/Gen-3 viral moment; 9.14% MoM growth; different unit from revenue"
    claimRefs: [CU003, CU004, CU005, CU006, CU007, CU008, CU026, CU027]

