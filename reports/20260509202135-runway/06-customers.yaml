  - id: "FU003"
    title: "Customer Proof Quality Matrix"
    type: "matrix"
    summary: >-
      Evidence quality matrix assessing Runway's six identified customer categories across four
      dimensions: evidence quality (how well-documented the relationship is), outcome specificity
      (measurable outcomes documented), production maturity (customer using Runway in actual
      production), and retention visibility (signal of ongoing or renewed relationship). Highlights
      the stark evidence gap between the individual creator segment and the enterprise segment.
    data:
      columns:
        - "Evidence Quality"
        - "Outcome Specificity"
        - "Production Maturity"
        - "Retention Visibility"
      rows:
        - label: "Individual Creators / Prosumers"
