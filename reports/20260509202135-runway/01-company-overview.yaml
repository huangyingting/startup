  - calloutType: "strength"
    title: "Exceptional Revenue Velocity and Tier-1 Investor Syndicate"
    body: >-
      Runway's revenue grew from $3M (2021) to $121.6M ARR (2024) — approximately 40× in three years —
      and reportedly reached $300M by late 2025. The investor syndicate includes General Atlantic
      (two consecutive lead rounds), Nvidia (three rounds), Google, Adobe Ventures, and Fidelity,
      combining substantial financial capacity with strategic alignment across compute, creative software,
      and enterprise distribution ecosystems. The 3.5× valuation step-up from $1.5B (Jun 2023) to
      $5.3B (Feb 2026) reflects both revenue growth and strategic premium.
    claimRefs: [CO018, CO011, CO013, CO015]

  - calloutType: "risk"
    title: "Unresolved Training Data Litigation: Copyright Overhang"
    body: >-
      Runway faces a class action lawsuit filed by artists alleging training on copyrighted works without
      authorization, and was separately reported by 404 Media to have scraped thousands of YouTube videos
      for Gen-3 model training. Runway's fair use defense has not been tested at trial. An adverse ruling
      could impose retroactive licensing costs, require data exclusion that degrades model performance,
      and create reputational risk with potential enterprise customers who are themselves rights holders.
    claimRefs: [CO037, CO038, CO039]

  - calloutType: "risk"
    title: "Lionsgate Partnership: Early-Stage Complications"
    body: >-
      The high-profile Lionsgate partnership — the first Hollywood-AI studio deal — encountered early
      difficulties per The Wrap. A single studio's catalog (20,000 titles) proved insufficient as a
      standalone training corpus for ambitious generative use cases, and actor likeness rights created
      unresolved legal friction. This signals execution risk in Runway's enterprise Hollywood strategy
      and raises questions about scalability of the studio partnership model.
    claimRefs: [CO034, CO035, CO036]

  - calloutType: "insight"
    title: "Strategic Pivot: From Video Tool to World Simulation Infrastructure"
    body: >-
      GWM-1 (December 2025) and the Characters API signal a deliberate expansion from Runway-as-video-
      editor to Runway-as-world-simulation-platform. The Robotics and Avatars variants of GWM-1, and
      the CoreWeave compute partnership, position the company for enterprise contracts well beyond
      entertainment — including autonomous vehicles, medical simulation, and spatial computing. The
      Series E inclusion of AMD Ventures alongside returning Nvidia further signals compute
      diversification for inference-scale ambitions.
    claimRefs: [CO030, CO040, CO045, CO046]

  - calloutType: "assumption"
    title: "Revenue and Customer Figures Sourced from Unaudited Third Parties"
    body: >-
      All revenue (2024 ARR, 2025 revenue) and customer count figures in this chapter are sourced from
      third-party aggregators (Getlatka, Electroiq, Sacra) rather than audited financials or primary
      company disclosure. Sacra and Getlatka differ materially on 2024 ARR ($70M vs $121.6M). Any
      investment decision should be conditioned on obtaining audited financials and revenue recognition
      schedules directly from Runway.
    claimRefs: [CO017, CO019, CO022]

