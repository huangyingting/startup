      Asia-Pacific leads with 37%+ market share. These cannot both be correct for the same market scope and year.
    whyItMatters: >-
      Runway's current customer base is primarily North American and European. If Asia-Pacific actually leads, Runway's
      market penetration outside its home region is lower than North America share would suggest.
    diligencePath: >-
