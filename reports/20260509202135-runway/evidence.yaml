  - type: enumeration-incomplete
    severity: minor
    topic: 'Full AI video competitor landscape: regional and emerging players'
    missingEvidence: >-
      The competitor table covers ten platforms identified through English-language product pages, benchmark rankings,
      and news coverage. AI video competitors in India (Krea AI, regional platforms), South Korea, and Southeast Asia
      may have material market share not captured in Western-facing sources. HeyGen (avatar/talking-head video,
      overlapping enterprise segment) and Midjourney (image- focused with reported video expansion plans) are monitored
      adjacencies not fully profiled here. Apple Intelligence video features rumored for iOS 19 were not confirmed in
      sources reviewed.
    whyItMatters: >-
      An incomplete competitor map could cause investors to underestimate the total competitive pressure on Runway,
      particularly in Asia-Pacific where Kling data shows the region has strong adoption. Apple's potential entry with
      native device-integrated video AI would create distribution moats fundamentally different from cloud SaaS
      competitors.
    diligencePath: >-
      Commission primary research on AI video competitor landscapes in Japan, Korea, India, and Southeast Asia. Monitor
      Apple WWDC announcements for video AI feature disclosures. Request Runway's internal competitive intelligence
      documents under NDA.
    relatedQuestionRefs:
      - QP016
    relatedTableRefs:
      - TP001
  - type: missing-source
    severity: material
    topic: Runway's API pricing structure and enterprise contract terms
    missingEvidence: >-
      Runway's per-second API pricing is not published in any public source reviewed. Kling's API rates
      ($0.07–$0.14/second) are publicly disclosed; Runway's comparable rates are unknown. Enterprise contract
      structures, volume discounts, and SLA terms for both Runway and competitors are not publicly accessible.
    whyItMatters: >-
      API pricing is a key competitive lever for developer and enterprise adoption. If Runway's API rates are materially
      higher than Kling's publicly disclosed rates, enterprise buyers with high-volume generation needs will gravitate
      toward Kling or use aggregator platforms (fal.ai) that include both. This directly affects Runway's total
      addressable market for its API business.
    diligencePath: >-
      Request Runway's API pricing schedule from the sales team or developer documentation. Compare against Kling's
      public API rates and fal.ai aggregator pricing for Runway models. Obtain at least three enterprise customer
      reference calls to verify pricing sensitivity.
    relatedQuestionRefs:
      - QP022
    relatedTableRefs:
      - TP003
  - type: missing-source
    severity: material
    topic: Meta Movie Gen commercial launch timeline and capabilities
    missingEvidence: >-
      Meta announced Movie Gen as a research model in October 2024, but no commercial product, pricing, API, or launch
      timeline has been publicly disclosed in any source reviewed. Meta's compute advantage (estimated at greater than
      600,000 H100 GPUs) means that if Movie Gen is commercialized, it could arrive with scale and distribution
      advantages that immediately restructure the competitive landscape.
    whyItMatters: >-
      Meta's eventual commercialization of Movie Gen—potentially integrated into Instagram Reels, Facebook, WhatsApp, or
      sold as API—would create a distribution moat (3B+ monthly active users) no independent AI video company can
      replicate. A commercial Meta video AI could render Runway's consumer/prosumer subscription business vulnerable in
      the social media segment.
    diligencePath: >-
      Monitor Meta AI Research publications for Movie Gen updates. Track Meta's developer conference announcements for
      API previews. Request Runway's scenario analysis for a Meta commercial entry.
    relatedQuestionRefs:
      - QP024
  - type: private-evidence-only
    severity: material
    topic: Runway's enterprise customer retention rates and multi-tool workflow churn
    missingEvidence: >-
      No public data is available on Runway's enterprise customer retention, churn rates, or the proportion of customers
      using Runway in single-tool vs. multi-tool workflow combinations. The multi-tool workflow trend (Runway + Kling +
      Pika) suggests Runway may capture only a fraction of each customer's video production spend.
    whyItMatters: >-
