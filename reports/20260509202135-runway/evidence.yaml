    diligencePath: >-
      Request cohort retention analysis, net revenue retention (NRR), and customer usage data (sessions per user per
      month) from Runway. Request breakdown of API vs. subscription revenue. Obtain 5+ enterprise customer references to
      assess multi-tool workflow adoption patterns.
