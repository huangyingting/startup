companyProfile:
  summary: "Runway is an applied AI research company founded in 2018 in New York City by Cristóbal Valenzuela (CEO), Anastasis Germanidis (CTO), and Alejandro Matamala (CPO). The company builds generative video models and general world models aimed at simulating reality for creative, enterprise, and scientific applications. It is best known for its Gen series of video generation models (Gen-1 through Gen-4.5) and in December 2025 launched GWM-1, a General World Model capable of simulating explorable environments, realistic digital avatars, and robotic training scenarios. Backed by $860 million in total funding at a $5.3 billion post-money valuation as of February 2026, Runway serves approximately 300,000 customers ranging from individual creators to major film studios, including a notable partnership with Lionsgate."
