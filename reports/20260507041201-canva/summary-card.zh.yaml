  topStrengths:
    - 240M MAU 叠加病毒式免费增值飞轮，让 Canva 在规模化 SaaS 里拥有最低一档 CAC
    - FY2024 已盈利，Rule of 40 分数约 35+，相对只讲增长的同业可拿更高倍数
    - 120%+ NRR 是结构性复利收入引擎；不用新增 logo，现有客户也能推高 ARR
    - 教育管线（10M+ 教师）为未来付费队列提供零成本获客入口
    - 2023 年 11 月聘请 Kelly Steckelberg（前 Zoom CFO），带来明确 IPO 执行经验，也释放上市准备信号
  topRisks:
    - Adobe Firefly + Express 是第一个可信的直接竞争挑战，正面冲击 Canva 的 SMB 设计护城河
    - EU AI Act（2026 年生效）会让 Magic Studio 作为通用 AI 系统承担合规义务
    - Melanie Perkins 关键人集中，且没有公开继任计划，IPO 时会形成治理风险
    - AI 训练数据版权诉讼（Getty v. Stability AI 先例）可能带来 $50-500M 追溯责任
    - $42B 估值安全边际有限：这个价格要求公司持续执行到位，几乎不给增长放缓留空间
  unresolvedGaps:
    - Pro、Teams、Enterprise 各层级付费订阅人数未公开披露
    - 按队列拆分的 NRR 和 logo 流失率全是估算；没有经审计的队列数据
    - Magic Studio 的 AI 训练数据来源未公开记录，版权责任无法量化
    - 经审计财务报表不可得；所有收入 / 利润率数据都来自官方新闻稿
    - 完整企业客户名单未披露；案例研究只是选择性参考客户
