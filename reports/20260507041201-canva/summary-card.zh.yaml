summary:
  headline: |
    Canva 是世界级设计平台：已经盈利、增长 35%+，并跑出高效率的消费者到企业飞轮。按 ARR 12.7x（$42B）看，估值与增长 / 盈利画像匹配，但安全边际有限；对 2–4 年机构投资周期的投资人，可中高置信度买入。
  overallScore: 8
  recommendation: buy
  confidence: medium
  riskRating: medium
  valuationStance: fair
  keyMetrics:
    valuationUsdM: 42000
    revenueRunRateUsdM: 3300
    arrUsdM: 3300
    revenueGrowthYoYPct: 35
    grossMarginPct: 65
    nrrPct: 120
    totalRaisedUsdM: 2760
