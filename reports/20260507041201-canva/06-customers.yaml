callouts:
  - id: KCU001
    type: key-finding
    title: "240M MAU with habitual engagement is Canva's most powerful customer metric"
    body: >
      At 15B+ designs per year across 240M MAU, Canva users average 5.2+ designs per month —
      well above the casual-use threshold. This habitual engagement creates durable brand
      recognition, product familiarity, and accumulated design assets (Brand Kit, templates,
      shared folders) that make switching costly even for free users. The education pipeline
      (10M+ teachers, 40M+ students) compounds this by seeding the next generation of Canva
      users at zero acquisition cost.
    claimRefs: [CU001, CU015, CU031, CU033]
