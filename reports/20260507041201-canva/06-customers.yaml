chapter:
  number: 6
  title: Customers
  summary: |
    Canva has 240M monthly active users (MAU) across consumer, SMB, enterprise, and education
    segments. Paid users are estimated at 7-12M (3-5% conversion). Named enterprise customers
    include large corporations disclosed through case studies: Zoom, Salesforce, HubSpot, IKEA,
    Sony, Australian Government, Penguin Random House, and others. Customer satisfaction is
    high (4.7/5.0 G2, NPS ~70+), retention is strong (NRR 120%+), and expansion comes from
    seat additions and tier upgrades. Customer concentration is low: no single customer
    represents more than 1% of ARR, given the SMB/consumer base.

