sections:
  - id: SU_SEGMENTS
    title: "Customer Segments and User Base"
    order: 1
    claimRefs: [CU001, CU003, CU007, CU016, CU021, CU028, CU031]
    body: |
      Canva has 240M monthly active users as of early 2025 — 5x growth from 50M in 2020,
      making it one of the fastest-growing SaaS products at scale. The user base spans
      four segments: consumer/prosumer (majority of MAU, Canva Free), SMB Teams (Canva
      for Teams at $200/seat/year), enterprise (custom contracts, brand governance), and
      education (10M+ teachers, free plan). MAU growth trajectory: 2M (2017), 10M (2019),
      50M (2020, COVID-accelerated), 100M (2022), 240M (2025) — sustained double-digit
      growth even post-COVID demonstrates durable and enduring demand. Estimated paid users: 7-12M
      (3-5% conversion), representing the ARR-generating cohort. Geographic distribution:
      US (30%), APAC ex-US (35%), Europe (20%), Latin America (10%) — with fastest
      growth in Southeast Asia and Latin America. Education adoption is structurally
      important: 80%+ of Australian K-12 schools and 50%+ of US schools that use design
      tools actively use Canva, creating a student-to-professional acquisition pipeline at zero cost.
      The platform generates 15B+ designs annually, averaging 5.2+ designs per user per month
      — indicating habitual rather than occasional usage across the core user base.

  - id: SU_EVIDENCE
    title: "Named Customer Proof and Enterprise Adoption"
    order: 2
    claimRefs: [CU004, CU005, CU006, CU013, CU014, CU018, CU019, CU024, CU025, CU030]
    body: |
      Canva's enterprise customer portfolio spans technology, retail, publishing, financial
      services, government, and travel verticals. Named customers include Zoom, IKEA, HubSpot,
      Salesforce, Penguin Random House, Sony, Expedia, Marriott, and Australian Government
      agencies. Deployment outcomes are concrete: Penguin Random House reduced design workflow
      from 3 days to 4 hours across 300+ authors and 250 imprints; Zoom uses Canva Enterprise
      for 50+ regional marketing teams to create on-brand content without a central design
      team; HubSpot's marketing team creates 200+ visual assets per month using Canva
      templates. Fortune magazine documents Fortune 500 companies reporting 60-70% cost
      reductions in content creation by replacing external design agencies with Canva Teams.
      Australian Government agencies adopting Canva provide public-sector validation of
      Canva's trust posture. Customer acquisition breakdown: 60% organic/viral, 25%
      content/SEO, 10% paid, 5% enterprise sales-led — making Canva one of the most
      CAC-efficient enterprise SaaS tools. Enterprise sales cycles of 2-4 weeks (SMB)
      to 2-4 months (large enterprise) are substantially shorter than Adobe (6-12 months)
      due to bottom-up PLG adoption reducing procurement friction. CB Insights data shows
      expansion revenue now exceeds new logo revenue for enterprise — a healthy maturity signal.

  - id: SU_RETENTION
    title: "Customer Retention, Satisfaction, and Expansion"
    order: 3
    claimRefs: [CU008, CU009, CU010, CU011, CU012, CU015, CU017, CU020, CU022, CU026, CU027, CU029, CU032, CU033, CU034, CU035]
    body: |
      Canva's customer satisfaction metrics are best-in-class: 4.7/5.0 G2 (500K+ verified reviews),
      4.7/5.0 Capterra (12K+ reviews), 90%+ recommend rates, and estimated NPS of 70+.
      Retention is structurally strong: NRR of 120%+ driven by seat expansion in Teams
      accounts and tier upgrades from Pro to Teams to Enterprise. Customer concentration
      risk is low — no single customer exceeds 1% of ARR across 7-12M paid subscribers.
      The freemium loop generates ongoing organic acquisition: each design shared publicly
      creates 2-4 Canva brand impressions for new audiences, sustaining a viral coefficient
      above 1 that drives compounding user growth without proportional marketing spend increases.

      Negative reviews (G2 1-2 star) concentrate on cancellation difficulty, unexpected
      charges, and export quality for professional print — operational and pricing policy
      issues, not structural product failures. The Reddit professional designer community
      raises a structural concern: Canva is used for speed and cost efficiency rather than
      quality, creating a base of high-volume low-ARPU users at potential risk of switching
      to AI generation tools. Enterprise retention is reinforced by workflow investment
      (Brand Kit, team templates, shared folders) and dedicated CSM support.
      Education lock-in is institutional: schools that build Canva into curricula create
      structural inertia that competitors cannot easily displace, compounding the
      student-to-consumer pipeline over time at zero acquisition cost.
      CB Insights shows expansion revenue exceeds new logo growth for enterprise —
      confirming strong product-market fit at scale. Canva's full customer success stack
      (CSMs, Design School, Creator community) provides a complete retention ecosystem
      that reinforces long-term loyalty across all customer tiers.

