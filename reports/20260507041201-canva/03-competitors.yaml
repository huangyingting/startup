chapter:
  number: 3
  title: Competitive Landscape
  summary: |
    Canva occupies the dominant position in non-professional visual design, with an estimated
    60-70% share in the accessible design tool segment (240M MAU). Its key competitive risks
    come from Adobe Express/Firefly (down-market push by the incumbent), Microsoft Designer
    (enterprise bundling threat), and AI-native generation tools that may bypass template-based
    workflows. Canva's moats — network effects from 15B+ designs, template flywheel, freemium
    distribution, and brand recognition — remain durable through 2026, but must be defended
    as AI commoditizes base design capabilities.
