companyProfile:
  summary: >
    Canva is the market-defining visual design platform for non-professional designers,
    with 240M monthly active users, $3.3B ARR, and profitability achieved in FY2024.
    The freemium model (Canva Free → Pro → Teams → Enterprise) converts users through
    a viral sharing loop that makes Canva one of the most CAC-efficient SaaS businesses
    globally. AI innovation through Magic Studio (Magic Design, Write, Media, Eraser,
    Edit, Expand) provides a growing ARPU expansion layer. The Affinity acquisition
    (March 2024) opens the professional designer segment adjacent to Canva's core SMB/
    consumer market. Enterprise adoption is accelerating with named customers including
    Zoom, IKEA, HubSpot, Salesforce, and Penguin Random House.
  foundedDate: "2013-01-01"
  founders:
    - name: Melanie Perkins
      role: CEO and Co-Founder
      background: >
        Australian entrepreneur; founded Canva at 25; one of Australia's most prominent
        tech founders; previously co-founded Fusion Books (2007) which was the precursor
        to Canva. Holds voting control; key person risk at IPO.
      claimRefs: []
    - name: Cliff Obrecht
      role: COO and Co-Founder
      background: >
        Co-founded Canva and Fusion Books with Melanie Perkins; operational leader
        responsible for business development and partnerships.
      claimRefs: []
    - name: Cameron Adams
      role: CPO and Co-Founder
      background: >
        Product and engineering lead; ex-Google engineer; responsible for Canva's
        product vision, design language, and technical direction.
      claimRefs: []
  foundingLocation: "Perth, Australia"
  headquarters: "Sydney, Australia"
  productSummary: >
    Canva provides a browser-based and mobile design platform with 250K+ templates
    across social media, presentations, documents, videos, websites, and print formats.
    Magic Studio AI tools (Magic Design, Write, Media, Eraser, Edit, Expand) provide
    generative design capabilities. Canva Apps connects 500+ third-party integrations.
    Affinity Designer, Photo, and Publisher (acquired March 2024) serve professional
    designers with desktop-grade tools. Flourish (acquired 2022) powers interactive
    data visualization. Canva Websites, Canva Docs, and Canva Sheets extend the
    platform into publishing and collaboration use cases.
  customerFocus: >
    Consumer and prosumer designers (majority of 240M MAU), SMB marketing teams
    (Canva for Teams), enterprise brand and content teams (custom enterprise contracts),
    and education (10M+ teachers globally, Canva for Education free plan). Largest
    customer by segment value is enterprise; largest by volume is consumer.
  businessModel: >
    Freemium SaaS: Canva Free (zero revenue, viral acquisition engine) → Canva Pro
    ($120/user/year, individual) → Canva for Teams ($200/seat/year) → Enterprise
    (custom pricing). Education is free. Revenue is primarily subscription-based with
    a small and growing usage-based component from Magic Studio AI credits. Estimated
    NRR 120%+ from seat expansion and tier upgrades.
  stage: "Late-stage private; pre-IPO; profitable FY2024"
  fundingStatus: >
    $2.76B total raised. Key rounds: $75M Series A (2019), $60M Series B (2020),
    $200M Series C (2021) at $40B valuation, $115M additional (2022). Investors include
    Blackbird Ventures, Sequoia Capital, T. Rowe Price, Franklin Templeton, Owl Rock
    Capital, and Bond. Kelly Steckelberg (ex-Zoom CFO) hired November 2023 as CFO,
    signaling IPO preparation. Target listing: 2026-2027.
  disclosureProfile: private-disclosed
  claimRefs: []

summary:
  headline: >
    Canva is a world-class design platform — profitable, growing 35%+, and an efficient
    consumer-to-enterprise flywheel. At 12.7x ARR ($42B), the valuation is fair for
    the growth/profitability profile but offers limited margin of safety; BUY with
    medium-high confidence for investors with a 2-4 year institutional horizon.
  overallScore: 8.0
  recommendation: buy
  confidence: medium
  riskRating: medium
  valuationStance: fair
  keyMetrics:
    valuationUsdM: 42000
    revenueRunRateUsdM: 3300
    arrUsdM: 3300
    revenueGrowthYoYPct: 35
    grossMarginPct: 65
    nrrPct: 120
    totalRaisedUsdM: 2760
    customerCount: 240000000
    headcount: 4500
  topStrengths:
    - "240M MAU with viral freemium flywheel creates one of the lowest CAC profiles in SaaS at scale"
    - "Profitable in FY2024 — Rule of 40 score ~35+ enables premium multiple vs growth-only peers"
    - "120%+ NRR is a structural compounding revenue engine; existing customers grow ARR without new logos"
    - "Education pipeline (10M+ teachers) provides zero-cost future paid cohort acquisition"
    - "Kelly Steckelberg (ex-Zoom CFO) hired November 2023 signals IPO readiness with specific execution experience"
  topRisks:
    - "Adobe Firefly + Express is the first credible direct competitive challenge to Canva's SMB design moat"
    - "EU AI Act (effective 2026) creates compliance obligations for Magic Studio as a general-purpose AI system"
    - "Key-person concentration in Melanie Perkins with no public succession plan creates governance risk at IPO"
    - "AI copyright training data litigation (Getty v. Stability AI precedent) creates potential $50-500M retroactive liability"
    - "Limited margin of safety at $42B: $42B demands sustained execution with no room for growth deceleration"
  unresolvedGaps:
    - "Paid subscriber count by tier (Pro, Teams, Enterprise) not publicly disclosed"
    - "NRR and logo churn by cohort — all estimates; no audited cohort data available"
    - "AI training data provenance for Magic Studio not publicly documented — copyright liability unquantifiable"
    - "Audited financial statements not available; all revenue/margin data from official press releases"
    - "Full enterprise customer list not disclosed; case studies are selective reference customers only"

appendices:
  - id: A
    title: "Canva Funding and Valuation History"
    blocks:
      - type: paragraph
        title: null
        body: >
          Canva's valuation trajectory reflects the SaaS market cycle: $1B unicorn
          (2018), $3.2B (2020), $15B (2021), $40B peak (2021 ZIRP era), $27B trough
          (2022 rate reset), and $42B recovery (2024) as ARR grew and profitability was
          achieved. Total raised: $2.76B across Blackbird, Sequoia, T. Rowe Price,
          Franklin Templeton, Owl Rock, and Bond. The $27B→$42B recovery is supported
          by Canva adding $1B+ ARR since the trough and achieving profitability —
          not just market multiple recovery.
        claimRefs: []

  - id: B
    title: "IPO Preparation Timeline"
    blocks:
      - type: paragraph
        title: null
        body: >
          Key IPO preparation milestones: Kelly Steckelberg hired as CFO (Nov 2023),
          Affinity acquisition expanding professional segment (March 2024), profitability
          achieved (FY2024 confirmed Jan 2025), 240M MAU milestone (Jan 2025). Estimated
          IPO window: H1 2026 to H1 2027 depending on SaaS market conditions. With $1.3B
          cash and profitability, Canva can wait for optimal conditions without liquidity
          pressure. Zoom IPO (2019) provides the closest comparable: Kelly Steckelberg
          helped price Zoom at $16B (initial) which traded up 8x at peak.
        claimRefs: []
