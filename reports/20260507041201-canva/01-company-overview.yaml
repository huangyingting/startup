chapter:
  number: 1
  title: Company Overview
  summary: |
    Canva is the world's largest visual communications platform, serving 240M+ monthly
    active users across consumer, SMB, and enterprise segments. Founded 2013 in Perth,
    Australia by Melanie Perkins (CEO), Cliff Obrecht (COO), and Cameron Adams (CPO),
    Canva has grown to ~$3.3B ARR (2025), $42B valuation (secondary, Aug 2025), and
    4,500+ employees. Its freemium-to-enterprise model and AI-powered Magic Studio suite
    position it as the challenger to Adobe's Creative Cloud hegemony.
