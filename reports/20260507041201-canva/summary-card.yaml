summary:
  headline: >
    Canva is a world-class design platform — profitable, growing 35%+, and an efficient consumer-to-enterprise flywheel.
    At 12.7x ARR ($42B), the valuation is fair for the growth/profitability profile but offers limited margin of safety;
    BUY with medium-high confidence for investors with a 2-4 year institutional horizon.
