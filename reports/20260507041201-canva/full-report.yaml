      - number: '1.2'
        title: Founders, Leadership, and Governance
        blocks:
          - type: paragraph
            body: |
              Canva's founding team is unusually stable and complementary. Melanie Perkins (CEO) is a
              mission-driven founder who previously co-founded Fusion Books at 19 — an online school
              yearbook platform — validating the concept of making design tools accessible before
              building Canva. Cliff Obrecht (COO) and Perkins are life and business partners who have
              led go-to-market, sales, and strategic partnerships since day one. Cameron Adams (CPO) was
              a Google Wave engineer whose technical expertise enabled the platform's foundational
              architecture. Together, the three co-founders have remained intact for 12+ years —
              unusual co-founder longevity that reduces transition risk.

              Melanie Perkins' Forbes profile as one of Australia's youngest billionaire founders gives
              her significant public credibility, though it creates key-person dependency in media
              narrative and talent attraction. The leadership team was strengthened significantly in
              2023 with Kelly Steckelberg (CFO, ex-Zoom) and a growing executive bench. Canva's board
              includes early backers from Blackbird Ventures and Sequoia Capital; the full independent
              director composition has not been publicly disclosed. Sequoia Capital's involvement provides
              both governance support and U.S. institutional network access critical for IPO preparation.
            claimRefs:
              - CO012
              - CO013
              - CO014
              - CO015
              - CO026
              - CO027
              - CO031
      - number: '1.3'
        title: Scale, Funding, and Milestones
        blocks:
          - type: paragraph
            body: |
              Canva has achieved extraordinary scale: $3.3B ARR (2025), 240M+ monthly active users,
              4,500+ employees, and a $42B valuation via secondary market transactions in August 2025
              — implying a 12.7x ARR multiple, reasonable for a platform growing at 40%+ with
              demonstrated profitability. The company has raised approximately $2.76B total across
              multiple rounds including the landmark $200M Series F at $26B (2021). Key investors
              include Sequoia Capital, T. Rowe Price, Franklin Templeton, Blackbird Ventures, and
              Owl Rock Capital.

              Critical milestones include: Fusion Books origin → Canva beta launch (2013) → $3.6M
              Series A with Blackbird (2014) → mobile app (2016) → 10M users (2018) → COVID
              growth surge 2020 → Series E at $6B (2020) → Series F at $26B (2021) → Magic Studio
              AI launch (2023) → Affinity acquisition (March 2024) → $3.3B ARR (2025) → $42B
              secondary valuation (August 2025). Canva became profitable in FY2024 — a significant
              milestone validating its unit economics at $3B+ revenue scale and distinguishing it
              from peers still burning capital at similar ARR levels. The IPO timeline is
              reportedly 2026-2027, supported by the Steckelberg CFO hire and alignment from
              T. Rowe Price and Franklin Templeton as public market-oriented long-term investors.
              No material adverse events have been identified through May 2026, and critics who
              question the $42B valuation note that Adobe remains a formidable incumbent at
              comparable revenue but with far larger margins and a proven enterprise moat — a
              legitimate risk that investors should monitor through the IPO process.
