            title: AI is expanding — not compressing — Canva's TAM
            body: >
              Generative AI tools expand the population of content creators rather than replacing design tools. McKinsey
              estimates 1.5B additional non-designers will become addressable by 2030. Canva's Magic Studio positions it
              to capture this growth; the key risk is Adobe Express and Firefly moving down-market into the SMB segment
              with AI-native tools backed by Adobe's brand authority.
