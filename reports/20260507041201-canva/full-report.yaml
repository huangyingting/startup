  - number: 4
    title: Financials
    sections:
      - number: '4.1'
        title: Revenue Model and Growth Trajectory
        blocks:
          - type: paragraph
            body: |
              Canva's revenue model is freemium SaaS with four subscription tiers plus Canva Print
              as an adjacent physical commerce stream. As of early 2025, Canva has reached $3.3B ARR
              growing at 30%+ year-on-year — the fastest revenue growth rate in Australian startup
              history and one of the fastest for a global SaaS company at this revenue scale. The
              company achieved profitability (positive EBITDA) in FY2024, a milestone that
              significantly de-risks the IPO narrative and positions Canva among the most financially
              attractive pre-IPO SaaS companies globally.

              Primary revenue comes from Pro subscriptions ($15/month, estimated 60% of ARR),
              Teams plans ($200/seat/year, estimated 25% of ARR), Enterprise custom contracts
              (estimated 12% of ARR and growing fastest), and Canva Print physical goods (~3%).
              The implied blended ARPU across 7-12M estimated paid users is $60-90/user/year.
              Revenue per employee of $733K (4,500+ staff) is well above SaaS benchmarks, indicating
              strong operational efficiency. Magic Studio AI is currently bundled in Pro/Teams plans
              and is not yet a standalone revenue stream, but usage-based AI credit topups are being
              piloted for FY2025-2026 monetization. Enterprise sales motion has shifted from purely
              product-led to hybrid PLG + sales-led in 2024, expanding enterprise ARR contribution.
            claimRefs:
              - CI001
              - CI002
              - CI003
              - CI004
              - CI014
              - CI016
              - CI019
              - CI028
              - CI030
              - CI032
      - number: '4.2'
        title: Unit Economics and Capital Efficiency
        blocks:
          - type: paragraph
            body: |
              Canva's unit economics are exceptionally favorable for a SaaS company at this scale.
              Estimated gross margin of 85-92% compares favorably to the 74% public SaaS median
              (Bessemer 2025). The freemium acquisition model makes CAC structurally low: most paid
              users convert from the free tier at near-zero acquisition cost, yielding 6-12 month
              CAC payback for Pro and 12-18 months for Teams. Net revenue retention is estimated
              at 120%+ — driven by seat expansion in Teams accounts and tier upgrades from Pro to
              Enterprise as companies grow. The Affinity acquisition adds one-time purchase revenues
              that are margin-accretive with minimal COGS beyond distribution.

              Freemium conversion rate of 3-5% (estimated 7-12M paid users from 240M MAU) is at
              the high end of freemium SaaS benchmarks. The enterprise segment has estimated NRR
              of 130%+, reflecting natural seat expansion, Brand Kit adoption, and workflow
              integration deepening. International revenue diversification (US 35%, APAC 30%,
              Europe 20%, ROW 15%) limits geographic concentration risk. The main unit economics
              risk is the freemium ceiling: at 3-5% conversion from 240M MAU, there is limited
              room to grow paid users without either improving conversion rates or growing the
              total MAU base — both of which require continued product and marketing investment.
