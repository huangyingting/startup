      - number: '5.2'
        title: Technology Architecture and Engineering
        blocks:
          - type: paragraph
            body: |
              Canva's technology architecture is cloud-native: AWS-primary for core application
              services, GCP for AI inference workloads, and Fastly CDN for global design asset
              delivery at scale. The platform is a microservices architecture of 100+ independent services,
              enabling independent scaling of high-demand components — particularly the template
              rendering pipeline and AI inference infrastructure. The rendering engine is WebGL-
              based, delivering high-fidelity in-browser previews and print-ready exports in
              PDF, SVG, PNG, MP4, and GIF formats. Real-time collaboration is built on operational
              transformation (similar to Google Docs), supporting concurrent editing at global scale.

              Magic Studio AI uses a hybrid model stack: OpenAI GPT-4 for Magic Write, Stability AI
              Stable Diffusion-based models for Magic Media, and Canva's proprietary fine-tuned
              design recommendation engine for Magic Design. The developer platform (Canva Apps SDK,
              Connect API, Apps Marketplace) enables third-party extension — though community feedback
              notes rate limits and documentation quality lag behind Figma's plugin ecosystem.
              AI inference compute cost is a growing concern: at scale, Magic Studio usage could
              add $7M-75M+ in annual COGS as adoption grows. AWS infrastructure concentration
              creates availability risk for regional outages, standard at this scale. The engineering
              culture is high-quality: weekly releases, 99.9%+ uptime, and active open-source SDK
              maintenance. Canva does not yet hold FedRAMP authorization, limiting US federal
              government adoption.
