  - number: 2
    title: Market Analysis
    sections:
      - number: '2.1'
        title: Total Addressable Market and Growth Drivers
        blocks:
          - type: paragraph
            body: |
              Canva operates at the intersection of digital content creation, graphic design software,
              and the creative economy — a broad market with multiple sizing frameworks. The digital
              content creation market is projected to reach $38.2 billion by 2030 at 13.5% CAGR, driven
              by social media growth, AI augmentation, and enterprise content operations expansion.
              The graphic design software segment specifically is forecast at $14.6B by 2030. However,
              Canva's relevant TAM is broader: it spans consumer/prosumer design ($5-10B), SMB marketing
              content creation ($10-15B), and enterprise creative operations ($20-25B) — a total SAM
              of approximately $35-50B globally. The print-on-demand market ($11.2B at 26.4% CAGR)
              represents a compelling adjacent physical goods revenue stream.

              Primary growth drivers include: (1) the $250B+ annual social media advertising market
              demanding higher content refresh rates than traditional production cycles can support;
              (2) the secular shift toward in-housing of marketing content creation; (3) AI tools
              expanding the addressable population of non-professional designers; and (4) the growing
              creator economy ($250B+ by 2027) requiring professional-quality visual content at scale.
              The creative economy digital platforms market is projected to grow at 18% CAGR through
              2030. Hootsuite data shows 5.5 billion social media users each generating 23+ pieces of
              visual content annually — creating a structural demand floor that is supply-constrained.
              Emerging EU AI Act disclosure requirements represent a regulatory overhang for
              AI-generated content tools that Canva's Magic Studio must navigate.
            claimRefs:
              - CM001
              - CM002
              - CM003
              - CM006
              - CM017
              - CM019
              - CM023
              - CM028
      - number: '2.2'
        title: Customer Segments and Geographic Markets
        blocks:
          - type: paragraph
            body: |
              Canva serves four primary customer segments with distinct value propositions. Consumer
              and prosumer users (the foundational 240M MAU base) use Canva for social media, personal
              projects, and freelance work — typically at Canva Pro pricing. The education segment (10M+
              teachers) creates a powerful market seeding effect: students learn design through Canva
              and carry those habits into the workforce as consumer and SMB users. SMB marketing teams
              are the highest-growth commercial segment: 71% of small businesses in 2025 use at least
              one AI-powered marketing tool (Salesforce), with Canva for Teams as the dominant non-Adobe
              option. Enterprise creative operations is the least penetrated but highest-ARPU segment:
              Fortune 500 companies spend $2-5M/year externally on content production that is
              increasingly in-sourceable via Canva for Enterprise with brand governance.

              Canva serves 230+ countries globally with particular strength in Australia, UK, US,
              Philippines, Brazil, and India. Asia-Pacific is growing at 20%+ CAGR, driven by
              Philippines, India, Indonesia, and Vietnam. HBR reports that 62% of marketing content
              was created by non-designers in 2024, up from 40% in 2019 — a secular trend underpinning
              Canva's multi-segment opportunity. The creator economy ($250B+ by 2027) adds a prosumer
              segment with high willingness to pay for premium features. Emerging markets represent
              significant growth optionality where brand awareness is growing but penetration remains low.
            claimRefs:
              - CM004
              - CM005
              - CM011
              - CM013
              - CM015
              - CM016
              - CM020
