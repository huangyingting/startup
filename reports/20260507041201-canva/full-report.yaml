      - number: '4.3'
        title: Capital Structure, Funding, and IPO Outlook
        blocks:
          - type: paragraph
            body: |
              Canva has raised $2.76B total across its funding history, with the last priced round
              being the $200M Series F at $40B valuation in September 2021. Secondary market
              transactions in 2025 valued the company at $42B — supported by institutional marks
              from T. Rowe Price, Franklin Templeton, and Owl Rock, providing credible external
              validation. Cash position is estimated at $1.3B+ with near-zero burn following the
              FY2024 profitability milestone, giving Canva effectively unlimited runway.

              The hire of Kelly Steckelberg (ex-Zoom CFO) in November 2023 is the clearest IPO
              preparation signal: Steckelberg built Zoom's public company financial infrastructure
              and managed its successful 2019 NASDAQ IPO. Reuters reports that Canva is targeting
              a 2026-2027 IPO window, with investment bank mandates under discussion. The dual
              corporate structure (Canva Pty Ltd in Australia, Canva, Inc. in Delaware) supports
              a US listing. Employee share liquidity through secondary sales in 2025 validates
              the $42B valuation externally and maintains staff retention during pre-IPO period.
              The Guardian and FT Lex flag the 12.7x ARR multiple as aggressive — it requires
              sustained execution at the high end of public SaaS comps to avoid IPO discount.
              T. Rowe Price and Franklin Templeton institutional marks in 2025 secondary transactions
              provide credible price discovery beyond promotional investor releases, supporting
              $42B as a fair market reference rather than a promotional or internal estimate.
