            title: 'Adobe Express + Firefly AI is Canva''s #1 competitive threat'
            body: >
              Adobe's combination of Firefly AI (IP-safe, commercially indemnified), Creative Cloud cross-sell, and 90%+
              Fortune 500 penetration makes Adobe Express the most credible threat to Canva's position. Adobe is
              deliberately moving down-market into the non-designer SMB space — exactly Canva's core market. Canva's
              response must be faster innovation in Magic Studio AI, deeper enterprise integration, and continued
              pricing advantage.
