  - number: 5
    title: Product & Technology
    sections:
      - number: '5.1'
        title: Product Portfolio and Capabilities
        blocks:
          - type: paragraph
            body: |
              Canva's product is a browser-first cloud design platform serving 240M MAU with a full
              suite of design capabilities. The core editor supports 1B+ templates across 100+ design
              categories — social media, presentations, videos, documents, websites, and print. Magic
              Studio (launched 2023, expanded 2024-2025) is the AI suite: Magic Design generates full
              designs from text prompts; Magic Write provides AI copywriting; Magic Media generates
              images and short videos; Magic Eraser, Edit, and Expand handle generative manipulation.

              The Affinity acquisition (March 2024) added professional desktop design tools —
              Designer, Photo, and Publisher — closing the gap with Adobe Creative Cloud in the
              professional segment. Flourish (acquired 2022) powers interactive charts and data
              visualization inside Canva's editor. Canva Websites (2023) and Canva Docs (2024)
              extend the platform into publishing and collaboration use cases. Brand Kit is the enterprise
              feature set: custom fonts, colors, logos, role-based access, and audit trails for
              brand consistency governance at scale. Mobile apps (iOS, Android) support full
              design editing with offline capability. Canva Create 2025 announced Magic Video
              (AI text-to-video), Canva Code, and deeper Affinity integration. Canva supports
              100+ languages but template depth is highest in English; localization quality
              represents a growth opportunity in non-English markets.
            claimRefs:
              - CE001
              - CE002
              - CE005
              - CE006
