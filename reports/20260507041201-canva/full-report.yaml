      - number: '6.3'
        title: Customer Retention, Satisfaction, and Expansion
        blocks:
          - type: paragraph
            body: |
              Canva's customer satisfaction metrics are best-in-class: 4.7/5.0 G2 (500K+ verified reviews),
              4.7/5.0 Capterra (12K+ reviews), 90%+ recommend rates, and estimated NPS of 70+.
              Retention is structurally strong: NRR of 120%+ driven by seat expansion in Teams
              accounts and tier upgrades from Pro to Teams to Enterprise. Customer concentration
              risk is low — no single customer exceeds 1% of ARR across 7-12M paid subscribers.
              The freemium loop generates ongoing organic acquisition: each design shared publicly
              creates 2-4 Canva brand impressions for new audiences, sustaining a viral coefficient
              above 1 that drives compounding user growth without proportional marketing spend increases.

              Negative reviews (G2 1-2 star) concentrate on cancellation difficulty, unexpected
              charges, and export quality for professional print — operational and pricing policy
              issues, not structural product failures. The Reddit professional designer community
              raises a structural concern: Canva is used for speed and cost efficiency rather than
              quality, creating a base of high-volume low-ARPU users at potential risk of switching
              to AI generation tools. Enterprise retention is reinforced by workflow investment
              (Brand Kit, team templates, shared folders) and dedicated CSM support.
              Education lock-in is institutional: schools that build Canva into curricula create
              structural inertia that competitors cannot easily displace, compounding the
              student-to-consumer pipeline over time at zero acquisition cost.
              CB Insights shows expansion revenue exceeds new logo growth for enterprise —
              confirming strong product-market fit at scale. Canva's full customer success stack
              (CSMs, Design School, Creator community) provides a complete retention ecosystem
              that reinforces long-term loyalty across all customer tiers.
