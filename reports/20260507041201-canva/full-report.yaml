companyProfile:
  summary: >
    Canva is the market-defining visual design platform for non-professional designers, with 240M monthly active users,
    $3.3B ARR, and profitability achieved in FY2024. The freemium model (Canva Free → Pro → Teams → Enterprise) converts
    users through a viral sharing loop that makes Canva one of the most CAC-efficient SaaS businesses globally. AI
    innovation through Magic Studio (Magic Design, Write, Media, Eraser, Edit, Expand) provides a growing ARPU expansion
    layer. The Affinity acquisition (March 2024) opens the professional designer segment adjacent to Canva's core SMB/
    consumer market. Enterprise adoption is accelerating with named customers including Zoom, IKEA, HubSpot, Salesforce,
    and Penguin Random House.
  foundedDate: '2013-01-01'
  founders:
    - name: Melanie Perkins
      role: CEO and Co-Founder
      background: >
        Australian entrepreneur; founded Canva at 25; one of Australia's most prominent tech founders; previously
        co-founded Fusion Books (2007) which was the precursor to Canva. Holds voting control; key person risk at IPO.
      claimRefs: []
    - name: Cliff Obrecht
      role: COO and Co-Founder
      background: >
        Co-founded Canva and Fusion Books with Melanie Perkins; operational leader responsible for business development
        and partnerships.
      claimRefs: []
    - name: Cameron Adams
      role: CPO and Co-Founder
      background: >
        Product and engineering lead; ex-Google engineer; responsible for Canva's product vision, design language, and
        technical direction.
      claimRefs: []
  foundingLocation: Perth, Australia
  headquarters: Sydney, Australia
  productSummary: >
    Canva provides a browser-based and mobile design platform with 250K+ templates across social media, presentations,
    documents, videos, websites, and print formats. Magic Studio AI tools (Magic Design, Write, Media, Eraser, Edit,
    Expand) provide generative design capabilities. Canva Apps connects 500+ third-party integrations. Affinity
    Designer, Photo, and Publisher (acquired March 2024) serve professional designers with desktop-grade tools. Flourish
    (acquired 2022) powers interactive data visualization. Canva Websites, Canva Docs, and Canva Sheets extend the
    platform into publishing and collaboration use cases.
  customerFocus: >
    Consumer and prosumer designers (majority of 240M MAU), SMB marketing teams (Canva for Teams), enterprise brand and
    content teams (custom enterprise contracts), and education (10M+ teachers globally, Canva for Education free plan).
    Largest customer by segment value is enterprise; largest by volume is consumer.
  businessModel: >
    Freemium SaaS: Canva Free (zero revenue, viral acquisition engine) → Canva Pro ($120/user/year, individual) → Canva
    for Teams ($200/seat/year) → Enterprise (custom pricing). Education is free. Revenue is primarily subscription-based
    with a small and growing usage-based component from Magic Studio AI credits. Estimated NRR 120%+ from seat expansion
    and tier upgrades.
  stage: Late-stage private; pre-IPO; profitable FY2024
  fundingStatus: >
    $2.76B total raised. Key rounds: $75M Series A (2019), $60M Series B (2020), $200M Series C (2021) at $40B
    valuation, $115M additional (2022). Investors include Blackbird Ventures, Sequoia Capital, T. Rowe Price, Franklin
    Templeton, Owl Rock Capital, and Bond. Kelly Steckelberg (ex-Zoom CFO) hired November 2023 as CFO, signaling IPO
    preparation. Target listing: 2026-2027.
  disclosureProfile: private-disclosed
  claimRefs: []
chapters:
  - number: 1
    title: Company Overview
    sections:
      - number: '1.1'
        title: Identity, Mission, and Business Model
        blocks:
          - type: paragraph
            body: |
              Canva is a visual communications platform founded in January 2013 in Perth, Western
              Australia by Melanie Perkins (CEO), Cliff Obrecht (COO), and Cameron Adams (CPO).
              Headquartered in Sydney with global offices in San Francisco, Austin, London, and
              elsewhere, Canva's mission is "Empowering the world to design" — making professional
              design accessible to non-designers and marketing teams through an intuitive drag-and-drop
              web and mobile interface.

              Canva's business model is freemium-to-enterprise: Canva Free (ad-supported basic tier)
              converts to Canva Pro ($15/month per user) and Canva for Teams ($200/seat/year); large
              enterprise accounts are served through Canva for Enterprise with direct sales, SSO,
              and brand governance features. Canva for Education is free to accredited educational
              institutions, reaching 10M+ teachers and students and building community equity. The
              company is incorporated in Australia (Canva Pty Ltd) and has embedded social values
              into its founding charter through the '30% pledge' — committing to donate 30% of equity
              to charitable causes, a practice that differentiates the brand from profit-maximizing peers.
              Kelly Steckelberg, former Zoom CFO, was hired in November 2023 as Canva's first CFO,
              a strong signal of IPO preparation and institutional investor readiness.
            claimRefs:
              - CO001
              - CO002
              - CO003
