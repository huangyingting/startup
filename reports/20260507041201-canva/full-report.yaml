  - number: 8
    title: Valuation
    sections:
      - number: '8.1'
        title: Investment Recommendation and Valuation Framework
        blocks:
          - type: paragraph
            body: |
              Canva's $42B secondary valuation (12.7x $3.3B ARR) is broadly fairly valued for a
              profitable, high-growth SaaS platform with 240M MAU and a credible 2026-2027 IPO path.
              Our base case values Canva at $38-44B (11.5-13.3x ARR on $3.3-3.7B NTM ARR) — with
              the current secondary price at the high end of the base case, requiring sustained
              execution but not a premium to base case assumptions. T. Rowe Price and Franklin
              Templeton fund disclosures independently corroborate the $42B mark.

              Key valuation drivers: (1) FY2024 profitability enables Rule of 40 analysis (~35+
              score) rather than pure growth multiples — a critical re-rating signal; (2) NRR of
              120%+ provides a compounding revenue engine that justifies a premium multiple versus
              peers with 100-105% NRR; (3) capital efficiency of 1.2x revenue-to-raised is best-
              in-class; (4) Kelly Steckelberg's hire as CFO with Zoom IPO experience is a definitive
              IPO preparation signal. FCF yield at $42B is 0.6-0.9% — priced for growth, not yield,
              consistent with growth-stage SaaS valuations. Meritech, Goldman Sachs, and BVP Cloud
              Index converge on 11-15x NTM as the appropriate multiple range for Canva's growth/
              profitability profile. Recommendation: BUY at or below $42B with medium-high confidence.
            claimRefs:
              - CV001
              - CV002
              - CV006
              - CV008
              - CV010
              - CV013
              - CV015
              - CV019
              - CV030
              - CV031
              - CV033
      - number: '8.2'
        title: Comparable Analysis and Market Benchmarks
        blocks:
          - type: paragraph
            body: |
              The strongest valuation anchor for Canva is Figma's $20B Adobe acquisition price at
              ~30x ARR (confirmed in CMA and DOJ filings). Canva's 12.7x ARR multiple is a 57%
              discount to Figma's acquisition multiple, justified by Canva's 5x larger ARR base
              and broader competitive exposure — but indicating that if Canva were to trade at even
              a modest premium to its current private multiple, a $50-60B IPO outcome is plausible.
              Adobe's Creative Cloud ($12B ARR, 20-25x EV/Revenue) shows that design software
              platforms command premium multiples when profitable and growing. Canva's 35%+ growth
              versus Adobe's 10-12% justifies a higher NTM multiple despite lower absolute margins.

              Public SaaS comparables (HubSpot at 6.5x NTM, Salesforce at 7x NTM) trade at lower
              multiples due to slower growth, validating Canva's premium relative to these peers.
              Canva's design TAM of $25-35B (2025), growing to $50-70B by 2030 as AI design expands
              addressable actions, implies current ARR at 10-13% market penetration — substantial
              runway for 15-20 years of continued growth. PitchBook's valuation history ($27B trough
              in 2022 → $42B recovery in 2024) is consistent with the broader SaaS multiple recovery
              and Canva's own improved fundamentals (profitability achieved, $1B+ ARR added in 24 months).
              Geographic diversification (30+ countries contributing >5% of ARR) does not create a
              discount; Atlassian (Australian SaaS, 20x NTM) validates that international SaaS origin
              is not a structural valuation headwind. Education channel NPV ($2-4B) and M&A optionality
              ($30B+ floor from strategic acquirers) provide asymmetric downside protection.
            claimRefs:
              - CV003
              - CV004
              - CV005
              - CV007
              - CV009
              - CV011
              - CV012
              - CV017
              - CV020
              - CV021
              - CV022
              - CV027
              - CV028
              - CV029
              - CV034
              - CV035
      - number: '8.3'
        title: Scenario Analysis, Thesis-Breakers, and Return Profile
        blocks:
          - type: paragraph
            body: |
              Bull case ($55-66B / 16-20x ARR): 40%+ ARR growth driven by enterprise expansion,
              AI credit monetization adding $360-500M ARR, and NRR sustaining at 120%+. The AI-
              driven ARPU expansion is the single highest-upside driver: 30% of paid users adopting
              Magic Studio AI credits at $10/month would add 15-20% to ARR without new customers.
              At 20x NTM ARR on $4.5-5B forward ARR, the bull case is achievable but requires
              sustained execution across enterprise, AI, and international expansion simultaneously.

              Bear case ($22-26B / 7-8x ARR): Adobe Firefly captures 20%+ of SMB net new ARR,
              slowing Canva's growth to 15-20%; EU AI Act compliance requires costly Magic Studio
              retraining; IPO market multiple compression forces 7-8x NTM pricing. This scenario
              combines two simultaneous adverse developments — unlikely in isolation but possible
              together, particularly if competitive pressure accelerates. FT Lex's thesis that
              '$42B demands a perfect world' correctly identifies the limited margin of safety.

              Primary thesis-breakers: Adobe Firefly achieving 50M MAU (vs Canva 240M), Melanie
              Perkins departure within IPO window, or profitability reversal. Return profile at $42B
              entry: bear case (0.5-0.7x, -30% to -50%), base case (1.0-1.3x, 3-year), bull case
              (1.5-1.7x, 3-year) — a skewed profile with limited absolute upside but meaningful
              downside if two adverse scenarios materialize simultaneously.
            claimRefs:
              - CV007
              - CV008
              - CV009
              - CV014
              - CV016
              - CV018
              - CV023
              - CV024
              - CV025
              - CV036
              - CV037
              - CV038
              - CV039
              - CV040
      - number: '8.4'
        title: Exhibits
        blocks:
          - type: callout
            title: 12.7x ARR is a reasonable but not cheap entry — the margin of safety is thin
            body: >
              Canva is one of the most compelling late-stage private technology companies globally: profitable at $3.3B
              ARR, growing 35%+, with 120%+ NRR, 240M MAU, and a credible 2026- 2027 IPO path. The $42B secondary price
              is fairly valued by public SaaS benchmarks and represents a 57% discount to Figma's acquisition multiple.
              However, this is not a 'cheap' valuation — it prices in continued execution and a supportive IPO market.
              The risk-return profile is asymmetric: bear case -40% versus bull case +57% at the entry price. BUY at or
              below $42B, with a clear eye on Adobe Firefly competitive progress as the primary thesis-monitoring
              variable.
            calloutType: insight
