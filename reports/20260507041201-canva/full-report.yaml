      - number: '6.2'
        title: Named Customer Proof and Enterprise Adoption
        blocks:
          - type: paragraph
            body: |
              Canva's enterprise customer portfolio spans technology, retail, publishing, financial
              services, government, and travel verticals. Named customers include Zoom, IKEA, HubSpot,
              Salesforce, Penguin Random House, Sony, Expedia, Marriott, and Australian Government
              agencies. Deployment outcomes are concrete: Penguin Random House reduced design workflow
              from 3 days to 4 hours across 300+ authors and 250 imprints; Zoom uses Canva Enterprise
              for 50+ regional marketing teams to create on-brand content without a central design
              team; HubSpot's marketing team creates 200+ visual assets per month using Canva
              templates. Fortune magazine documents Fortune 500 companies reporting 60-70% cost
              reductions in content creation by replacing external design agencies with Canva Teams.
              Australian Government agencies adopting Canva provide public-sector validation of
              Canva's trust posture. Customer acquisition breakdown: 60% organic/viral, 25%
              content/SEO, 10% paid, 5% enterprise sales-led — making Canva one of the most
              CAC-efficient enterprise SaaS tools. Enterprise sales cycles of 2-4 weeks (SMB)
              to 2-4 months (large enterprise) are substantially shorter than Adobe (6-12 months)
              due to bottom-up PLG adoption reducing procurement friction. CB Insights data shows
              expansion revenue now exceeds new logo revenue for enterprise — a healthy maturity signal.
