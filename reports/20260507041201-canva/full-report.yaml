appendices:
  - id: A
    title: Canva Funding and Valuation History
    blocks:
      - type: paragraph
        title: null
        body: >
          Canva's valuation trajectory reflects the SaaS market cycle: $1B unicorn (2018), $3.2B (2020), $15B (2021),
          $40B peak (2021 ZIRP era), $27B trough (2022 rate reset), and $42B recovery (2024) as ARR grew and
          profitability was achieved. Total raised: $2.76B across Blackbird, Sequoia, T. Rowe Price, Franklin Templeton,
          Owl Rock, and Bond. The $27B→$42B recovery is supported by Canva adding $1B+ ARR since the trough and
          achieving profitability — not just market multiple recovery.
        claimRefs: []
  - id: B
    title: IPO Preparation Timeline
    blocks:
      - type: paragraph
        title: null
        body: >
          Key IPO preparation milestones: Kelly Steckelberg hired as CFO (Nov 2023), Affinity acquisition expanding
          professional segment (March 2024), profitability achieved (FY2024 confirmed Jan 2025), 240M MAU milestone (Jan
          2025). Estimated IPO window: H1 2026 to H1 2027 depending on SaaS market conditions. With $1.3B cash and
          profitability, Canva can wait for optimal conditions without liquidity pressure. Zoom IPO (2019) provides the
          closest comparable: Kelly Steckelberg helped price Zoom at $16B (initial) which traded up 8x at peak.
        claimRefs: []
