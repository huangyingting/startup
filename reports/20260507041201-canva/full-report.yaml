            body: >
              Canva is executing a dual product expansion: Magic Studio AI brings accessible AI design to 240M MAU,
              while Affinity brings professional-grade desktop tools for the creative segment. Together, they position
              Canva to serve the full spectrum from non-designer to professional — a strategy Adobe's Creative Cloud +
              Express is also pursuing but from opposite directions. The risk is execution complexity in merging these
              two product paradigms (cloud-simple vs desktop-professional) without fragmenting the core user experience.
