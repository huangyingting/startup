        - Enterprise ARR % and growth rate are primary valuation drivers; tier mix determines NRR quality
        - 'Data room request: ARR cohort by tier, NRR by tier, expansion vs new logo split'
      - - NRR and churn by cohort
        - NRR estimate only (120%+); no public cohort data
        - Actual NRR is the single most important valuation driver for an expansion-led growth model
        - 'Request monthly cohort data: logo retention, net $ retention, expansion ARR, contraction ARR'
      - - AI training data provenance
        - Magic Studio training data not publicly disclosed
        - Copyright litigation risk cannot be sized without training data audit; potential $50-500M liability
        - Request IP counsel memo on AI training data; indemnification clauses in content licenses
      - - Cap table and option pool
        - Implied dilution based on total raised; actual cap table not public
        - Post-IPO dilution affects investor return profile; ESOP overhang may create secondary pressure
        - Request fully diluted cap table; ESOP size and vesting schedule; founder lock-up commitment
      - - Enterprise customer list and ACV
        - Case studies only; full customer list not disclosed
        - Top-10 customer concentration, ACV range, and churn risk are critical for enterprise thesis validation
        - 'Data room: full enterprise customer list, ACV distribution, cohort retention by vintage'
