chapter:
  number: 8
  title: Valuation
  summary: |
    Canva's $42B secondary market valuation implies 12.7x 2025 ARR ($3.3B). Our base case
    values Canva at $38-44B (11.5-13.3x ARR) — reasonable for a profitable, high-growth
    SaaS platform with 240M MAU and a credible IPO path in 2026-2027. Bull case: $55-66B
    (16-20x ARR) requires sustained 35%+ growth and AI-driven ARPU expansion. Bear case:
    $22-26B (7-8x ARR) if competitive erosion from Adobe Firefly or market multiple
    compression materializes. Recommendation: BUY at or below $42B with medium-high
    confidence. Primary risks: AI competitive erosion, EU AI Act compliance cost, and
    valuation compression at public market listing.
