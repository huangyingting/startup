      - - Canva secondary market
        - $3.3B ARR; $42B secondary valuation (2024)
        - 12.7x ARR / ~11x NTM
        - Direct reference; T. Rowe Price + Franklin Templeton mark confirms
        - Secondary market may not reflect IPO price; limited float means price is indicative
      - - Atlassian (TEAM)
        - $4B+ ARR; ~$40B market cap (2025)
        - ~9-10x NTM EV/Revenue
        - Australian-founded SaaS — comparable origin; PLG collaboration model
        - B2B focus vs Canva SMB/consumer; lower NRR; developer tools not design
      - - Salesforce (CRM)
        - $36B ARR; ~$250B market cap (2025)
        - ~6-7x NTM EV/Revenue
        - Large enterprise SaaS — comparable scale trajectory
