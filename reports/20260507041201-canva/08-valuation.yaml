  - id: TV005
    title: Thesis-break and criteria triggers table
    order: 5
    claimRefs:
      - CV007
      - CV009
      - CV014
      - CV019
      - CV025
      - CV037
      - CV038
    notes: Table covers threshold events that trigger thesis reassessment and the corresponding recommended investor action.
    columns:
      - Trigger
      - Threshold
      - Transmission to Thesis
      - Action Implication
    rows:
      - - Adobe Firefly MAU acceleration
        - Firefly reaches 50M MAU or Canva MAU growth falls below 20% YoY
        - SMB moat eroded; ARR growth decelerates to <20%; NTM multiple compresses to 8-10x → bear case
        - Reduce position; reassess entry price at $28-32B
      - - ARR growth deceleration
        - Two consecutive quarters of <25% ARR growth
        - Rule of 40 falls below 25; multiple compresses from 12x to 8-9x → valuation $26-30B
        - Flag for review; initiate competitive analysis deep dive
      - - Profitability reversal
        - Operating loss for 2+ consecutive quarters due to AI investment
        - FCF yield turns negative; $42B entry now at premium to distressed SaaS comps → $22-28B fair value
        - Exit or reduce at loss; require new profitability guidance before re-entry
      - - Key person departure (Melanie Perkins)
        - Announced CEO exit within 12 months of IPO window
        - Investor confidence loss; IPO delay; culture risk → 20-30% immediate valuation discount
        - Hold/reduce pending successor announcement; review management bench depth
      - - EU AI Act shutdown risk
        - EU authorities demand suspension of Magic Studio as non-compliant AI system
        - AI revenue premium at risk; $360-500M ARPU upside disappears; retraining cost $50-500M
        - Initiate EU regulatory risk review; update model without AI premium
      - - IPO market closure
        - SaaS NTM multiples fall below 7x median (rate spike >5.5% US 10yr)
        - IPO delayed to 2028+; secondary market liquidity at risk; valuation mark falls to $25-30B
        - Reassess liquidity horizon; $1.3B cash confirms 3-year no-IPO runway
