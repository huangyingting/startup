callouts:
  - id: KCV001
    type: key-finding
    title: 12.7x ARR is a reasonable but not cheap entry — the margin of safety is thin
    body: >
      Canva is one of the most compelling late-stage private technology companies globally: profitable at $3.3B ARR,
      growing 35%+, with 120%+ NRR, 240M MAU, and a credible 2026- 2027 IPO path. The $42B secondary price is fairly
      valued by public SaaS benchmarks and represents a 57% discount to Figma's acquisition multiple. However, this is
      not a 'cheap' valuation — it prices in continued execution and a supportive IPO market. The risk-return profile is
      asymmetric: bear case -40% versus bull case +57% at the entry price. BUY at or below $42B, with a clear eye on
      Adobe Firefly competitive progress as the primary thesis-monitoring variable.
    claimRefs:
      - CV001
      - CV008
      - CV039
      - CV040
