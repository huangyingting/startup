chapter:
  number: 4
  title: Financials
  summary: |
    Canva achieved $3.3B ARR by early 2025 with strong growth (30%+ YoY), achieved profitability
    in FY2024, and holds $1.3B+ cash with minimal debt. Its revenue model is freemium SaaS with
    four tiers (Free, Pro, Teams, Enterprise) plus Canva Print, AI monetization emerging through
    Magic Studio. Unit economics are strong: estimated 90%+ gross margin, positive FCF, strong
    NRR (120%+). The company has $2.76B raised, a $42B secondary market valuation (Aug 2025),
    and an IPO is actively planned for 2026-2027 with Kelly Steckelberg (ex-Zoom CFO) hired Nov 2023.

