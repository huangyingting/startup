      - number: '5.3'
        title: 信任、合规与技术风险
        blocks:
          - type: paragraph
            body: >
              Canva 拥有强 SMB 级合规资质：SOC 2 Type II、ISO 27001、GDPR、CCPA、Australian Privacy Act 和 WCAG 2.1 AA
              无障碍标准。这些认证足以支撑大多数商业市场的企业采购。不过，企业信任缺口仍在：缺少 FedRAMP 授权（卡住美国联邦政府）、HIPAA Business Associate
              Agreement（BAA）覆盖有限（卡住医疗企业），也不提供用户设计的端到端加密。这些缺口削弱了 Canva 在受监管行业的可服务企业市场。


              关键技术风险是 AI 版权责任：The Guardian 和 EFF 对 Magic Media 训练数据来源提出担忧。Canva 已发布 AI
              Principles，承诺透明度，并允许用户选择退出训练数据使用；但美国和欧盟针对 Stability AI、Midjourney 的未决案件，会给使用相似训练方法的工具带来法律敞口。如果诉讼成功，Canva
              可能面临估计 $50M–500M 的重训义务。以当前监管环境看，AI 治理姿态基准上够用，但 2025–2026 年 EU AI Act 合规要求生效后仍需增强。开发者生态成熟度是次级风险：Product
