      - - 股权结构表与期权池
        - 只能按累计融资推算稀释；实际股权结构表未公开
        - IPO 后稀释影响投资者回报画像；ESOP 悬空供给可能造成老股压力
        - 索取完全稀释后股权结构表；ESOP 规模和归属时间表；创始人锁定承诺
      - - 企业客户名单和 ACV
        - 仅有案例研究；完整客户名单未披露
        - Top-10 客户集中度、ACV 区间和流失风险对验证企业逻辑至关重要
        - 数据室：完整企业客户名单、ACV 分布、按年份队列划分的留存
