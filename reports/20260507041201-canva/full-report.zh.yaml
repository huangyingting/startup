      - CV010
      - CV019
      - CV030
    data:
      nodes:
        - id: F1
          label: 规模已确认：240M MAU、$3.3B ARR、已盈利
          detail: FY2024 盈利 + 35%+ 增长 = Rule of 40 分数 35+ → 有资格拿 10-15x 高端倍数
        - id: F2
          label: 客户证据：具名企业客户、120%+ NRR
          detail: Zoom、IKEA、Penguin RH 已部署；NRR 120%+ = 复利收入引擎 → 增长耐久度得到确认
        - id: F3
          label: 竞争护城河：免费增值飞轮 + 教育用户管线
          detail: 240M MAU 品牌 + 教育锁定形成可持续 CAC 优势 → 相对 Adobe 可比公司应享溢价
        - id: F4
          label: 风险已评估：AI 竞争、监管、关键人物
          detail: AI 冲击真实存在，但时间线是 2-3 年；$1.3B 现金 + 盈利能力提供缓冲 → 中高风险、可管理
        - id: F5
          label: 估值：12.7x ARR，较 Figma 30x 折价 57%
          detail: 基准情景 $38-44B；相对基准估值合理；M&A 可选性给出 $30B+ 底部 → 下行有限
        - id: F6
          label: 投资建议：$42B 或以下买入
