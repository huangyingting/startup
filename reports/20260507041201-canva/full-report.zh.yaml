companyProfile:
  summary: >
    Canva 是面向非专业设计者、并定义了这一市场的视觉设计平台：月活跃用户 240M、ARR $3.3B，并已在 FY2024 实现盈利。免费增值模型（Canva Free → Pro → Teams →
    Enterprise）靠病毒式分享循环转化用户，使 Canva 成为全球获客效率最高的 SaaS 公司之一。Magic Studio（Magic Design、Write、Media、Eraser、Edit、Expand）推动 AI
    创新，正在成为提升 ARPU 的新层。2024 年 3 月收购 Affinity 后，Canva 从核心 SMB / 消费者市场向相邻的专业设计师人群打开入口。企业采用正在加速，具名客户包括
    Zoom、IKEA、HubSpot、Salesforce 和 Penguin Random House。
