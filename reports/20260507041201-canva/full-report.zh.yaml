          note: 12.7x ARR 相对基准估值合理；较 Figma 折价 57%；安全边际有限
        - label: 证据质量
          value: 7
          max: 10
          note: 收入 / MAU 证据强；经审计财务、分层 ARR 拆分、NRR 队列数据偏弱
appendices:
  - id: A
    title: Canva 融资与估值历史
    blocks:
      - type: paragraph
        title: null
        body: >
          Canva 的估值轨迹基本跟着 SaaS 市场周期走：2018 年以 $1B 跻身独角兽，2020 年 $3.2B，2021 年 $15B，2021 年 ZIRP 时代冲至 $40B 峰值，2022 年利率重定价后降至
          $27B 谷底；到 2024 年，ARR 增长且公司实现盈利，估值回升到 $42B。公司累计融资 $2.76B，投资方包括 Blackbird、Sequoia、T. Rowe Price、Franklin
          Templeton、Owl Rock 和 Bond。$27B→$42B 的修复有基本面支撑：Canva 自谷底以来新增 $1B+ ARR，并实现盈利，而不只是市场倍数修复。
        claimRefs: []
  - id: B
    title: IPO 准备时间线
    blocks:
      - type: paragraph
        title: null
        body: >
          关键 IPO 准备里程碑包括：2023 年 11 月聘请 Kelly Steckelberg 担任 CFO；2024 年 3 月收购 Affinity，扩展专业设计人群；FY2024 实现盈利（2025 年 1
          月确认）；2025 年 1 月达到 240M MAU。估计 IPO 窗口为 2026 年 H1 至 2027 年 H1，取决于 SaaS 市场环境。Canva 手握 $1.3B
          现金且已盈利，没有流动性压力，可以等到条件更合适再上市。最接近的可比案例是 2019 年 Zoom IPO：Kelly Steckelberg 曾帮助 Zoom 以 $16B（初始）定价，峰值时较发行估值上涨 8x。
        claimRefs: []
