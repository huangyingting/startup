      - number: '2.3'
        title: 竞争动态与市场风险
        blocks:
          - type: paragraph
            body: >
              视觉传播市场正在分化：Adobe Creative Cloud（FY2025 订阅收入 $13.8B）占据专业设计师细分；Canva 占据非设计师和 SMB 细分，估计在全球非专业设计市场有 60–70%
              份额。Figma（Adobe 交易受阻后仍独立）面向专业 UI/UX 设计师，与 Canva 核心用例相邻但不同。Microsoft Designer 在 Microsoft 365
              企业生态中威胁上升，Teams 和 Office 集成可能在不增加预算的情况下推动自然采用。IDC 2025 MarketScape 因 Canva 易用性、模板深度和企业能力，将其评为创意工具领导者。


              AI 既是顺风，也是威胁：McKinsey 分析显示，生成式 AI 到 2030 年会让设计工具的可触达人群增加 1.5B；但 Midjourney 和 DALL-E 3 等 AI
              工具也能绕过基于模板的设计。Canva 的战略回应是把 Magic Studio AI 融入产品，而不是与 AI 对抗——这一定位正确。Bloomberg Intelligence 指出，相比 Adobe
              的补装式 AI 路径，Canva 的 AI 原生架构在 2026–2030 年具备优势。240M 用户每年生成 15B 份设计，形成数据和使用模式飞轮，强化平台粘性；任何竞争对手都很难快速复制。
