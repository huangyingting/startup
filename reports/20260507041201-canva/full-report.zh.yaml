      - number: '4.2'
        title: 单位经济与资本效率
        blocks:
          - type: paragraph
            body: >
              以这个规模的 SaaS 公司看，Canva 的单位经济异常有利。估计毛利率 85–92%，优于 Bessemer 2025 年公开 SaaS 中位数 74%。免费增值获客模型让 CAC
              结构性偏低：大多数付费用户从免费层转化而来，获客成本接近零，Pro 的 CAC 回本周期为 6–12 个月，Teams 为 12–18 个月。净留存率估计超过 120%，由 Teams 账户席位扩张和 Pro 向
              Enterprise 升级推动。Affinity 收购增加一次性购买收入，除分发之外 COGS 很低，因此增厚利润率。


              免费增值转化率 3–5%（从 240M MAU 中估计 7–12M 付费用户）处于免费增值 SaaS 基准高端。企业细分估计 NRR 超过 130%，反映自然席位扩张、Brand Kit
              采用和工作流集成加深。国际收入多元化（美国 35%、亚太 30%、欧洲 20%、其他地区 15%）限制了地域集中风险。主要单位经济风险是免费增值天花板：从 240M MAU 转化 3–5%
              后，如果不提升转化率或扩大总 MAU，付费用户增长空间有限；而两者都需要持续产品和营销投入。
