      - number: '8.4'
        title: 图表
        blocks:
          - type: callout
            title: 12.7x ARR 是合理但不便宜的入场价——安全边际很薄
            body: >
              Canva 是全球最有吸引力的后期私人科技公司之一：$3.3B ARR 且已盈利，增速 35%+，NRR 120%+，MAU 240M，并有可信的 2026-2027 IPO 路径。$42B 老股交易价格按上市
              SaaS 基准看估值合理，较 Figma 收购倍数折价 57%。但这不是「便宜」估值——它已经计入持续执行和友好的 IPO 市场。风险回报不对称：按入场价计算，悲观情景 -40%，乐观情景 +57%。$42B
              或以下买入，同时把 Adobe Firefly 的竞争进展作为最重要的逻辑跟踪变量。
