  - number: 2
    title: 市场分析
    sections:
      - number: '2.1'
        title: 总可用市场与增长驱动因素
        blocks:
          - type: paragraph
            body: >
              Canva 位于数字内容创作、图形设计软件和创作者经济的交叉点，市场范围很宽，也有多套测算口径。数字内容创作市场预计到 2030 年达到 $38.2B，CAGR 为 13.5%，由社交媒体增长、AI
              增强和企业内容运营扩张推动。图形设计软件细分市场预计到 2030 年达到 $14.6B。不过，Canva 的相关 TAM 更宽：它覆盖消费者 / 准专业设计（$5–10B）、SMB
              营销内容创作（$10–15B）和企业创意运营（$20–25B），全球 SAM 合计约 $35–50B。按需印刷市场（$11.2B，CAGR 26.4%）则是有吸引力的相邻实物商品收入流。


              主要增长驱动因素包括：（1）年规模 $250B+ 的社交媒体广告市场，对内容刷新频率的要求超过传统制作周期能承受的水平；（2）营销内容创作内包化的长期趋势；（3）AI
              工具扩大非专业设计者的可触达人群；（4）创作者经济到 2027 年预计超过 $250B，需要规模化的专业级视觉内容。创作者经济数字平台市场预计到 2030 年 CAGR 为 18%。Hootsuite
              数据显示，全球 5.5B 社交媒体用户每年各自产生 23+ 件视觉内容——由此形成一个结构性需求底盘，而供给端受限。新出现的 EU AI Act 披露要求，会给 Canva 的 Magic Studio 这类
              AI 生成内容工具带来监管压力。
