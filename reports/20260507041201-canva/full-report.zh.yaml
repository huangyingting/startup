      - number: '1.3'
        title: 规模、融资与里程碑
        blocks:
          - type: paragraph
            body: >
              Canva 已经达到罕见规模：$3.3B ARR（2025）、240M+ 月活跃用户、4,500+ 员工，并在 2025 年 8 月通过老股交易获得 $42B 估值——对应 12.7x ARR
              倍数。对于一家增长超过 40% 且已证明盈利能力的平台，这一倍数仍在合理区间。公司累计融资约 $2.76B，多轮融资包括标志性的 $200M Series F（2021，估值 $26B）。关键投资方包括
              Sequoia Capital、T. Rowe Price、Franklin Templeton、Blackbird Ventures 和 Owl Rock Capital。


              关键里程碑包括：Fusion Books 起点 → Canva beta 发布（2013）→ Blackbird 参与的 $3.6M Series A（2014）→ 移动应用（2016）→ 10M
              用户（2018）→ 2020 年 COVID 增长跃升 → Series E 估值 $6B（2020）→ Series F 估值 $26B（2021）→ Magic Studio AI 发布（2023）→ 收购
              Affinity（2024 年 3 月）→ $3.3B ARR（2025）→ 老股交易估值 $42B（2025 年 8 月）。Canva 在 FY2024 实现盈利，这是重要里程碑：它在 $3B+
              收入规模上验证了单位经济，也把 Canva 与类似 ARR 水平仍在烧钱的同行区分开来。IPO 时间据报道为 2026–2027 年，Steckelberg 出任 CFO，以及 T. Rowe Price 和
              Franklin Templeton 这类面向公开市场的长期投资者支持了这一节奏。截至 2026 年 5 月，尚未发现重大不利事件；质疑 $42B 估值的批评者指出，Adobe
              仍是强大在位者，收入规模相当但利润率高得多，且企业护城河已经验证——这是投资者在 IPO 过程中应持续跟踪的合理风险。
