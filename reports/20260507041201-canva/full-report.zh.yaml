      - number: '3.3'
        title: 竞争风险与脆弱点
        blocks:
          - type: paragraph
            body: >
              到 2027 年，Canva 面临的最可信竞争风险包括：（1）Adobe Express 搭配 Firefly AI，凭 IP 安全 AI 和 Creative Cloud 交叉销售拿下 SMB
              细分；（2）Microsoft Designer 通过零增量成本捆绑，把 Canva 排挤出企业 Microsoft 365 生态；（3）AI 模板商品化削弱模板库优势，因为竞争对手可以即时生成等质模板。


              The Guardian 引述批评者观点，认为模板如今已是商品——考虑到 AI 图像生成速度，这一判断有真实分量。不过，Canva 的回应方向正确：Magic Studio AI 把生成能力嵌入 Canva
              的编排工作流，而不是与其对抗。多栖使用风险中等（35% 的 Canva 企业团队仍保留 Adobe CC 许可），说明 Canva 掌握营销内容，Adobe 掌握制作。离开 Canva
              的用户主要提到专业工具限制和价格敏感；Affinity 收购和分层定价已经部分回应了这两点。Canva 的企业护城河是最弱的一维：Adobe 在 Fortune 500 中渗透率超过 90%，Microsoft
              的 M365 足迹几乎无处不在，给在位者带来结构性企业优势。
