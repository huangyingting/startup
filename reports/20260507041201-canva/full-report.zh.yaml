      - number: '7.3'
        title: 运营、执行与估值风险
        blocks:
          - type: paragraph
            body: >
              关键人物风险是严重度最高的运营风险：Melanie Perkins 作为 12 年创始 CEO，是 Canva 最不可替代的资产——她若离开，会实质性损害文化、客户信任和 IPO
              时投资者信心。管理层梯队（Cliff Obrecht、Cameron Adams、Kelly Steckelberg）提供部分缓释，但清晰接班路径尚未公开。IPO 时双重股权结构很可能让 Perkins
              拥有投票控制权，相比单一股权同行形成 5–15% 的治理折价。


              AWS 基础设施集中带来服务连续性风险，多区域部署和 CDN 分发只能部分缓释。自 2019 年数据泄露后，安全姿态已经显著改善（SOC 2 Type II、ISO 27001、漏洞赏金），但企业客户越来越要求
              SSPM 证明和 4 小时 SLA 响应承诺。价格弹性风险真实存在：2023 年提价引发有记录的反弹，影响消费者和小型创作者队列；继续提价以支持 AI 投资，会在价格敏感的免费 / 消费者层带来流失风险。Web
              优先订阅引导部分缓释了应用商店收入集中度，但以移动优先的新兴市场增长，可能提高对 Apple / Google 的依赖。


              执行过度扩张是主要战略风险：企业、AI、专业工具（Affinity）、视频、网站和文档同时扩张，会把管理层注意力和工程资源分散到五套不同的市场进入动作。Affinity
              集成（专业设计师细分）风险尤其高——目标买方画像与 Canva 核心非设计师用户完全不同。Canva 的盈利能力和 $1.3B 现金为其穿越 IPO 窗口提供 3+ 年跑道，但重度 AI
              投资支出可能逆转盈利。若增长保持，$42B 二级市场估值到公开市场压缩 25–35% 是基准情景；如果增长放缓到 30% 以下，压缩会更严重。
