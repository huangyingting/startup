      - number: '5.2'
        title: 技术架构与工程
        blocks:
          - type: paragraph
            body: >
              Canva 的技术架构是云原生：核心应用服务以 AWS 为主，AI 推理工作负载使用 GCP，全球设计资产交付依赖 Fastly CDN。平台由 100+
              独立服务组成的微服务架构支撑，可独立扩展高需求组件，尤其是模板渲染管线和 AI 推理基础设施。渲染引擎基于 WebGL，在浏览器内交付高保真预览，并导出可印刷的 PDF、SVG、PNG、MP4 和 GIF
              格式。实时协作基于操作转换（operational transformation，类似 Google Docs），支持全球规模的并发编辑。


              Magic Studio AI 使用混合模型栈：Magic Write 使用 OpenAI GPT-4，Magic Media 使用基于 Stability AI Stable Diffusion
              的模型，Magic Design 使用 Canva 自研微调的设计推荐引擎。开发者平台（Canva Apps SDK、Connect API、Apps
              Marketplace）支持第三方扩展；不过社区反馈指出，速率限制和文档质量落后于 Figma 插件生态。AI 推理计算成本正在成为担忧：随着采用增加，Magic Studio 大规模使用可能每年增加
              $7M–75M+ COGS。AWS 基础设施集中度会带来区域性故障的可用性风险，在这个规模上属于常见问题。工程文化质量高：每周发布、99.9%+ 正常运行时间，并积极维护开源 SDK。Canva 尚未取得
              FedRAMP 授权，限制了美国联邦政府采用。
