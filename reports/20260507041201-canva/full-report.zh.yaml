      - number: '8.2'
        title: 可比公司分析与市场基准
        blocks:
          - type: paragraph
            body: >
              Canva 最强估值锚是 Adobe 收购 Figma 的 $20B 对价，约 30x ARR（CMA 和 DOJ 文件确认）。Canva 12.7x ARR 相当于较 Figma 收购倍数折价 57%。考虑到
              Canva ARR 体量大 5x、竞争暴露面更宽，这个折价有依据；反过来，只要 Canva IPO 时较当前私募倍数拿到小幅溢价，$50-60B 的上市估值就有可能。Adobe Creative
              Cloud（$12B ARR，20-25x EV/Revenue）说明，设计软件平台只要盈利且增长，仍能拿到高倍数。Canva 增速 35%+，高于 Adobe 的 10-12%，即便绝对利润率更低，也支撑更高的
              NTM 倍数。


              上市 SaaS 可比公司（HubSpot 6.5x NTM、Salesforce 7x NTM）因增长更慢而倍数更低，反向验证了 Canva 相对这些同业的溢价。Canva 的设计总可用市场（TAM）在 2025
              年为 $25-35B；AI 设计正在扩展可触达动作，到 2030 年 TAM 将增至 $50-70B。当前 ARR 对应 10-13% 市场渗透率，仍有 15-20 年持续增长空间。PitchBook
              的估值历史（2022 年低点 $27B → 2024 年回升至 $42B）与 SaaS 倍数整体修复、Canva 自身基本面改善（实现盈利，24 个月新增 $1B+ ARR）一致。地域多元化（30+ 个国家贡献
              >5% ARR）不应带来折价；Atlassian（澳大利亚 SaaS，20x NTM）证明国际 SaaS 出身不是结构性估值拖累。教育渠道净现值（$2-4B）和并购可选性（战略收购方给出 $30B+
              地板）提供不对称的下行保护。
