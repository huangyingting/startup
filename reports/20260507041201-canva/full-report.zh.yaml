  - number: 3
    title: 竞争格局
    sections:
      - number: '3.1'
        title: 竞争格局概览
        blocks:
          - type: paragraph
            body: >
              Canva 的竞争格局分三层：（1）拥有分发杠杆的在位巨头（Adobe Express、Microsoft Designer、Google
              Workspace）；（2）与其相邻重叠的专业细分工具（Figma，以及现由 Canva 持有的 Affinity 产品）；（3）新兴 AI 原生挑战者（Gamma、Beautiful.ai、15+ 家 AI
              设计初创公司）。Adobe Express 是最接近的直接威胁——背靠 Adobe 品牌权威、Firefly AI 集成和 Creative Cloud 交叉销售——并正主动下探非设计师 SMB 市场，这正是
              Canva 的核心市场。Microsoft Designer 则在 Microsoft 365 企业生态内形成捆绑威胁，现有订阅者零增量成本即可采用，天然降低切入门槛。Figma
              相邻但不是直接竞争对手：它面向专业 UI/UX 设计师，而 Canva 面向营销内容和社交媒体。


              最值得关注的新动态是 AI 生成工具（Midjourney、DALL-E 3）和 AI 原生设计初创公司，它们攻击的是具体用例，而不是 Canva 的完整套件。CB Insights 识别出 2022–2025
              年成立的 15+ 家此类初创公司。Canva 2024 年收购 Affinity，直接补上专业细分缺口，从易用设计向专业创意工作搭起战略桥梁。2022 年收购 Flourish，则补上此前被 Visme 和
              Piktochart 利用的数据可视化缺口。竞争正在加剧，但 Canva 的多产品、多细分战略体现出扎实的竞争预判。Affinity 和 Flourish 收购说明，Canva
              正主动补齐竞争缺口，而不是只依赖既有位置；这释放出竞争应对上的战略成熟度。这种主动并购路径，是相较 Adobe Express 和 Microsoft Designer 等有机速度更慢的挑战者的一项结构性优势。
