      - number: '6.3'
        title: 客户留存、满意度与扩张
        blocks:
          - type: paragraph
            body: >
              Canva 的客户满意度指标处于同类最佳：G2 4.7/5.0（500K+ 验证评价）、Capterra 4.7/5.0（12K+ 评价）、90%+ 推荐率，估计 NPS 70+。留存结构性强：NRR 超过
              120%，由 Teams 账户席位扩张，以及 Pro 向 Teams 再向 Enterprise 升级驱动。客户集中度风险低——在 7–12M 付费订阅者中，没有单一客户超过 ARR 的
              1%。免费增值循环持续带来自然获客：每一份公开分享的设计都会为新受众创造 2–4 次 Canva 品牌曝光，维持高于 1 的病毒系数，不必同比例增加营销支出也能推动复合用户增长。


              负面评价（G2 1–2 星）集中在取消困难、意外扣费和专业印刷导出质量上——这是运营和定价政策问题，不是结构性产品失败。Reddit 专业设计师社区提出一个结构性担忧：Canva
              被用于速度和成本效率，而不是质量，因此形成一批高频但低 ARPU 的用户，未来可能转向 AI 生成工具。企业留存由工作流投入（Brand Kit、团队模板、共享文件夹）和专属 CSM
              支持强化。教育锁定是制度性的：学校把 Canva 写入课程后，会形成竞争对手难以轻易替代的结构性惯性，并以零获客成本持续复合学生到消费者的管线。CB Insights
              显示，企业扩张收入超过新客户增长，确认了规模化后的强产品市场匹配。Canva 完整的客户成功栈（CSM、Design School、Creator 社区）形成完整留存生态，强化所有客户层级的长期忠诚度。
