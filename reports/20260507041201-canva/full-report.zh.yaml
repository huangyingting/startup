chapters:
  - number: 1
    title: 公司概况
    sections:
      - number: '1.1'
        title: 身份、使命与商业模式
        blocks:
          - type: paragraph
            body: >
              Canva 是视觉传播平台，2013 年 1 月由 Melanie Perkins（CEO）、Cliff Obrecht（COO）和 Cameron Adams（CPO）在西澳大利亚 Perth
              创立。公司总部位于 Sydney，并在 San Francisco、Austin、London 等地设有全球办公室。Canva 的使命是「Empowering the world to
              design」——让非设计师和营销团队也能通过直观的拖拽式网页与移动界面完成专业设计。


              Canva 的商业模式从免费增值走向企业：Canva Free（广告支持的基础层）转化为 Canva Pro（$15/月/用户）和 Canva for Teams（$200/席位/年）；大型企业账户通过
              Canva for Enterprise 服务，配有直销、SSO 和品牌治理功能。Canva for Education 面向认证教育机构免费，覆盖 10M+
              教师和学生，并积累社区资产。公司注册于澳大利亚（Canva Pty Ltd），并通过「30% 承诺」把社会价值写入创始章程——承诺将 30% 股权捐给慈善事业，这让品牌有别于利润最大化导向的同行。2023 年
              11 月，前 Zoom CFO Kelly Steckelberg 成为 Canva 首任 CFO，这是 IPO 准备和机构投资者就绪的强信号。
