  - number: 4
    title: 财务情况
    sections:
      - number: '4.1'
        title: 收入模式与增长轨迹
        blocks:
          - type: paragraph
            body: >
              Canva 的收入模式是免费增值 SaaS，四个订阅层级之外，还有 Canva Print 作为相邻实物电商收入流。截至 2025 年初，Canva 已达到 $3.3B ARR，年同比增长超过
              30%——这是澳大利亚初创公司史上最快收入增速之一，也是全球 SaaS 公司在这一收入规模上最快的增长之一。公司在 FY2024 实现盈利（正 EBITDA），这一里程碑显著降低了 IPO 叙事风险，也让
              Canva 跻身全球最具财务吸引力的上市前 SaaS 公司之列。


              主要收入来自 Pro 订阅（$15/月，估计占 ARR 60%）、Teams 计划（$200/席位/年，估计占 ARR 25%）、Enterprise 定制合同（估计占 ARR 12%，且增长最快）和 Canva
              Print 实物商品（约 3%）。按估计 7–12M 付费用户计算，隐含混合 ARPU 为 $60–90/用户/年。每名员工收入 $733K（4,500+ 员工）显著高于 SaaS
              基准，说明运营效率强。Magic Studio AI 目前捆绑在 Pro / Teams 计划中，还不是独立收入流，但用量型 AI 积分充值正在为 FY2025–2026 商业化试点。2024
              年，企业销售动作从纯产品驱动转向混合 PLG + 销售驱动，扩大了企业 ARR 贡献。
