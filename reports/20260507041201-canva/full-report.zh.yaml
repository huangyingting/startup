      - number: '2.2'
        title: 客户细分与地域市场
        blocks:
          - type: paragraph
            body: >
              Canva 服务四类主要客户，每类价值主张不同。消费者和准专业用户（240M MAU 的基础盘）用 Canva 做社交媒体、个人项目和自由职业工作，通常购买 Canva Pro。教育细分（10M+
              教师）带来强大的市场播种效应：学生通过 Canva 学设计，再把这些习惯带入职场，成为消费者和 SMB 用户。SMB 营销团队是增长最快的商业细分：Salesforce 称，2025 年 71%
              的小企业使用至少一种 AI 驱动的营销工具，Canva for Teams 是主导性的非 Adobe 选项。企业创意运营渗透率最低但 ARPU 最高：Fortune 500 公司每年在外部内容制作上花费
              $2–5M，其中越来越多可以通过带品牌治理能力的 Canva for Enterprise 转为内部完成。


              Canva 服务全球 230+ 国家，在澳大利亚、英国、美国、菲律宾、巴西和印度尤其强。亚太地区由菲律宾、印度、印度尼西亚和越南推动，CAGR 超过 20%。HBR 报道称，2024 年 62%
              的营销内容由非设计师创作，2019 年为 40%——这一长期趋势支撑了 Canva 的多细分市场机会。创作者经济（到 2027 年
              $250B+）又增加了一个愿意为高级功能付费的准专业用户群。新兴市场带来显著增长选择权，品牌认知正在提高，但渗透率仍低。
