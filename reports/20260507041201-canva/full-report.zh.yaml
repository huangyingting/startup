      - number: '4.3'
        title: 资本结构、融资与 IPO 前景
        blocks:
          - type: paragraph
            body: >
              Canva 历史累计融资 $2.76B，上一轮定价融资是 2021 年 9 月 $200M Series F，估值 $40B。2025 年老股交易将公司估值定在 $42B，并由 T. Rowe
              Price、Franklin Templeton 和 Owl Rock 等机构标记支撑，提供了可信的外部验证。FY2024 盈利里程碑之后，公司现金头寸估计超过
              $1.3B，烧钱接近零，等于拥有几乎不受限的现金跑道。


              2023 年 11 月聘请 Kelly Steckelberg（前 Zoom CFO）是最清晰的 IPO 准备信号：Steckelberg 曾搭建 Zoom 的上市公司财务基础设施，并管理其 2019 年
              NASDAQ IPO。Reuters 报道称，Canva 目标 IPO 窗口为 2026–2027 年，投资银行委任正在讨论。双重公司结构（澳大利亚 Canva Pty Ltd、Delaware Canva,
              Inc.）支持美国上市。2025 年通过老股交易给员工股份提供流动性，在外部验证 $42B 估值的同时，也在 IPO 前维持员工留任。The Guardian 和 FT Lex 提醒，12.7x ARR
              倍数偏激进——Canva 需要持续处在公开 SaaS 可比公司高端执行，才能避免 IPO 折价。T. Rowe Price 和 Franklin Templeton 在 2025
              年老股交易中的机构标记，提供了超出投资者宣传稿的可信价格发现，支持 $42B 作为公允市场参照，而不是宣传性或内部估计。
