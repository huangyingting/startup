  - number: 6
    title: 客户情况
    sections:
      - number: '6.1'
        title: 客户细分与用户基础
        blocks:
          - type: paragraph
            body: >
              截至 2025 年初，Canva 拥有 240M 月活跃用户，较 2020 年 50M 增长 5 倍，是规模化阶段增长最快的 SaaS 产品之一。用户基础横跨四个细分：消费者 / 准专业用户（MAU
              大多数，Canva Free）、SMB Teams（Canva for Teams，$200/席位/年）、企业（定制合同、品牌治理）和教育（10M+ 教师，免费计划）。MAU
              增长轨迹为：2M（2017）、10M（2019）、50M（2020，COVID 加速）、100M（2022）、240M（2025）——COVID 后仍保持两位数增长，说明需求持久。估计付费用户为
              7–12M（3–5% 转化），构成贡献 ARR 的用户群。地域分布：美国 30%、亚太（不含美国）35%、欧洲 20%、拉美 10%；东南亚和拉美增长最快。教育采用具有结构性意义：澳大利亚 K–12 学校中
              80%+、美国使用设计工具的学校中 50%+ 都在活跃使用 Canva，零成本形成学生到专业用户的获客管线。平台每年生成 15B+ 份设计，平均每名用户每月 5.2+
              份，说明核心用户基础是习惯性使用，而非偶发使用。
