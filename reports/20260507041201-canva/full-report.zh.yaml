      - number: '7.2'
        title: 监管、法律与 IP 风险
        blocks:
          - type: paragraph
            body: >
              Canva 面临复杂的多法域监管风险堆叠。GDPR 敞口很大：实质性违规可能被罚全球收入 4%（最高 $132M），其中自动化决策和 AI 个性化（Magic Studio）会被 GDPR 第 22 条和第 35
              条重点审视。EU AI Act 将 Magic Studio 视为通用 AI 系统：透明度义务、技术文档要求和训练数据版权合规将在 2026 年生效。California CCPA 执法（每次违规最高 $7M
              罚金）给分析追踪和数据共享实践带来平行的美国敞口。


              AI 版权诉讼是最不可预测的法律风险：Getty v. Stability AI 及相关案件正在确立 AI 训练数据版权判例；不利裁决可能要求 Canva 仅用授权数据重训 Magic Studio
              模型，估计成本 $50M–500M，或让公司暴露于追溯责任。US Copyright Office 2024 年立场认为 AI 生成输出可能缺乏版权保护，这给使用 Magic Studio
              做商业应用的客户带来商业不确定性。2019 年数据泄露（139M 账户受影响）已经是历史事件，但仍造成持续的企业信任摩擦，并在数据安全审计中留下监管先例。Australian Privacy Act
              改革（2024）把罚金上限提高到 $50M AUD，并扩大义务，抬高 Canva 本土合规成本。印度、巴西以及其他潜在高增长市场的数据本地化义务，会带来基础设施资本要求。欧盟 2025–2026 年把 WCAG
              无障碍要求扩展到私营部门，也需要 Canva 在无障碍导出上追加产品投入。
