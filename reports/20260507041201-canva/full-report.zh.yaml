  - number: 5
    title: 产品与技术
    sections:
      - number: '5.1'
        title: 产品组合与能力
        blocks:
          - type: paragraph
            body: >
              Canva 的产品是浏览器优先的云设计平台，服务 240M MAU，并提供完整设计能力。核心编辑器支持 100+ 设计类别、1B+ 模板，覆盖社交媒体、演示文稿、视频、文档、网站和印刷。Magic
              Studio（2023 年发布，2024–2025 年扩展）是 AI 套件：Magic Design 可根据文本提示生成完整设计；Magic Write 提供 AI 文案；Magic Media
              生成图像和短视频；Magic Eraser、Edit 和 Expand 处理生成式编辑。


              2024 年 3 月收购 Affinity 后，Canva 增加了专业桌面设计工具——Designer、Photo 和 Publisher——补上了与 Adobe Creative Cloud
              在专业细分的差距。2022 年收购的 Flourish 支撑 Canva 编辑器内的交互式图表和数据可视化。Canva Websites（2023）和 Canva
              Docs（2024）把平台延伸到发布和协作场景。Brand Kit
              是企业功能集：自定义字体、颜色、标识、基于角色的访问和审计轨迹，用于规模化治理品牌一致性。移动应用（iOS、Android）支持完整设计编辑，并具备离线能力。Canva Create 2025 发布了 Magic
              Video（AI 文本转视频）、Canva Code 和更深入的 Affinity 集成。Canva 支持 100+ 语言，但英语模板深度最高；非英语市场的本地化质量是增长机会。
