  - number: 8
    title: 估值
    sections:
      - number: '8.1'
        title: 投资建议与估值框架
        blocks:
          - type: paragraph
            body: >
              Canva 的 $42B 老股交易估值（按 $3.3B 年经常性收入（ARR）计为 12.7x）大体合理：公司已经盈利，仍在高速增长，拥有 240M 月活用户（MAU），且 2026-2027 IPO
              路径可信。我们的基准情景给 Canva $38-44B 估值（按 $3.3-3.7B 未来 12 个月 ARR 计为
              11.5-13.3x）——当前老股价格处在基准区间高位，需要公司继续稳住执行，但并未高于基准假设。T. Rowe Price 和 Franklin Templeton 的基金披露分别佐证 $42B 标记。


              关键估值驱动因素：（1）FY2024 实现盈利，让市场可以按 40 法则（得分约 35+）而不是纯增长倍数定价，这是关键的重估信号；（2）净留存率（NRR）120%+ 提供复利式收入引擎，相比 NRR
              100-105% 的同业，足以支撑溢价倍数；（3）收入 / 累计融资 1.2x 的资本效率同类最佳；（4）聘请拥有 Zoom IPO 经验的 Kelly Steckelberg 出任 CFO，是明确的 IPO
              准备信号。$42B 估值下，自由现金流收益率为 0.6-0.9%——价格买的是增长，不是收益率，符合成长阶段 SaaS 的估值逻辑。Meritech、Goldman Sachs 和 BVP Cloud Index
              都指向 11-15x NTM 作为适配 Canva 增长 / 盈利组合的倍数区间。建议：在 $42B 或以下买入，信心中高。
