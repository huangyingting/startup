      - number: '3.2'
        title: 竞争护城河与切换成本
        blocks:
          - type: paragraph
            body: >
              Canva 的竞争护城河多层且相互强化。核心护城河是模板网络效应：100+ 类别、1B+ 模板，并由 15B+ 年设计事件衍生的推荐持续改进。这个飞轮会随时间复利增长——Sequoia Capital 将其视为
              Canva 最难复制的资产。团队切换成本也不低：Brand Kit 保存自定义字体、颜色和标识；共享团队模板和设计历史形成组织依赖；已连接的应用集成增加迁移摩擦。Forrester 评估 Canva 在消费者 /
              SMB 侧的粘性为 78% 不愿切换。


              供给侧护城河（8,000+ 字体、Unsplash/Pexels 素材、专有授权合作）补强了模板飞轮。教育分发打造出独特管道：10M+ 教师和 40M+ 学生用户代表进入职场的下一代 Canva
              消费者。品牌信任（G2 评分 4.7/5.0，500K+ 评价）是会随使用复利积累的无形护城河。免费增值分发支持自下而上的企业采用，Adobe、Microsoft 这类自上而下工具若不改定价，很难复制。Canva
              集成 50+ 企业工具，而竞争对手生态更窄，这又增加了集成层锁定。合在一起，这些护城河形成自我强化的竞争位置，并在平台扩张时变得更耐久——典型的网络效应业务，每增加一个用户、一份设计和一个集成，都会更强。
