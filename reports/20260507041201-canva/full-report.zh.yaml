      - number: '8.3'
        title: 情景分析、投资逻辑击穿点与回报画像
        blocks:
          - type: paragraph
            body: >
              乐观情景（$55-66B / 16-20x ARR）：企业扩张推动 ARR 增长 40%+，Magic Studio AI 点数变现贡献 $360-500M ARR，NRR 维持 120%+。AI 驱动的
              ARPU 扩张是上行空间最大的单一变量：30% 付费用户以 $10/月采用 Magic Studio AI 点数，无需新增客户即可把 ARR 抬高 15-20%。以 $4.5-5B 前瞻 ARR 给予 20x
              NTM ARR，乐观情景可以打到，但需要企业、AI、国际扩张三条线同时持续执行。


              悲观情景（$22-26B / 7-8x ARR）：Adobe Firefly 拿走 SMB 新增净 ARR 的 20%+，Canva 增速降到 15-20%；EU AI Act 合规迫使 Magic Studio
              花大钱重训；IPO 市场倍数压缩，迫使 NTM 定价落到 7-8x。这个情景把两项反向进展叠在一起——单独发生概率不高，但一起发生并非不可能，尤其在竞争压力加速时。FT Lex 关于「$42B
              需要一个完美世界」的判断，准确点出了安全边际有限。


              主要投资逻辑击穿点：Adobe Firefly 达到 50M MAU（对比 Canva 240M）、Melanie Perkins 在 IPO 窗口期离任，或盈利能力反转。$42B
              入场的回报画像：悲观情景（0.5-0.7x，-30% 至 -50%）、基准情景（1.0-1.3x，3 年）、乐观情景（1.5-1.7x，3
              年）——绝对上行有限，但若两个反向情景同时发生，下行很有分量，回报分布偏斜。
