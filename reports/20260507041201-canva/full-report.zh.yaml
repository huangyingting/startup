  - number: 7
    title: 风险
    sections:
      - number: '7.1'
        title: 竞争与市场颠覆风险
        blocks:
          - type: paragraph
            body: >
              Canva 的首要竞争风险是 Adobe 的 Firefly + Express 产品组合，这是第一次对 Canva 核心 SMB 设计民主化价值主张构成可信直接挑战。Adobe 在创意市场的品牌资产、商业安全
              AI（授权训练数据）和既有企业关系，使其在重新赢回专业和企业客户时具备结构性优势。Microsoft Designer 的 M365 Copilot 集成则构成分发威胁：70%+ Fortune 500
              企业已经在 Microsoft 生态中，可以不经采购就获得设计能力，直接与 Canva for Teams 竞争。


              生成式 AI 商品化是中期结构性风险：Midjourney、DALL-E 3 和 Stable Diffusion 以 $10–30/月提供独立 AI 图像生成，而模型质量正快速向 Canva Magic
              Studio 能力收敛。未来 2–3 年，AI 生成设计可能成为嵌入每个生产力平台的商品化功能，削弱 Canva 的 AI 差异化溢价。DOJ 阻止 Adobe-Figma 合并，短期对 Canva
              净利好，但也释放了 Adobe 用于其他竞争动作的并购资本。Figma 作为资本充足的独立竞争者（并在扩展模板和演示功能），从第三条路径增加竞争压力。IDC 记录 Adobe 自 2020 年以来损失 3–4
              个百分点设计市场份额，但 Adobe 正通过 AI 集成加速反击。Canva 的护城河（240M MAU、品牌熟悉度、免费增值飞轮）仍然可观，但竞争压力正同时在所有客户细分中加剧。
            claimRefs:
