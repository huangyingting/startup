      - number: '1.2'
        title: 创始人、领导层与治理
        blocks:
          - type: paragraph
            body: >
              Canva 的创始团队异常稳定且互补。Melanie Perkins（CEO）是使命驱动型创始人，19 岁时曾联合创办在线学校年鉴平台 Fusion Books，在创建 Canva
              前就验证了让设计工具变得易用的概念。Cliff Obrecht（COO）与 Perkins 既是生活伴侣也是商业伙伴，从第一天起负责市场进入、销售和战略合作。Cameron Adams（CPO）曾是 Google
              Wave 工程师，他的技术能力支撑了平台的基础架构。三位联合创始人 12+ 年保持完整，这种创始团队稳定性很少见，也降低了交接风险。


              Melanie Perkins 登上 Forbes 澳大利亚最年轻亿万富翁创始人榜单，给她带来显著公众信誉；但媒体叙事和人才吸引也因此更依赖她本人。2023 年，Kelly Steckelberg（CFO，前
              Zoom）加入，管理层梯队继续增强。Canva 董事会包括来自 Blackbird Ventures 和 Sequoia Capital 的早期支持者；完整独立董事构成尚未公开披露。Sequoia Capital
              的参与既提供治理支持，也带来美国机构网络，对 IPO 准备至关重要。
