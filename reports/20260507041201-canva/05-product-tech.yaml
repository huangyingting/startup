chapter:
  number: 5
  title: Product and Technology
  summary: |
    Canva's product is a browser-first, AI-augmented design platform serving 240M MAU
    across 230+ countries. Core product: cloud design editor with 1B+ templates, Magic Studio
    AI suite (Magic Design, Write, Media, Eraser, Edit), Canva Print, Canva Websites/Docs,
    and enterprise Brand Kit/governance. Technology is cloud-native (AWS + GCP), with
    custom rendering engine, proprietary AI inference pipeline (partnered with Stability AI
    and OpenAI), and global CDN. Canva acquired Affinity (2024) for professional desktop tools,
    Flourish (2022) for data visualization, and Smartmockups (2021). Key technical risk:
    infrastructure scale for 15B+ annual designs and AI inference compute cost expansion.

