sections:
  - id: SE_PRODUCT
    title: "Product Portfolio and Capabilities"
    order: 1
    claimRefs: [CE001, CE002, CE005, CE006, CE008, CE010, CE013, CE014, CE016, CE020, CE022, CE023, CE028, CE032]
    body: |
      Canva's product is a browser-first cloud design platform serving 240M MAU with a full
      suite of design capabilities. The core editor supports 1B+ templates across 100+ design
      categories — social media, presentations, videos, documents, websites, and print. Magic
      Studio (launched 2023, expanded 2024-2025) is the AI suite: Magic Design generates full
      designs from text prompts; Magic Write provides AI copywriting; Magic Media generates
      images and short videos; Magic Eraser, Edit, and Expand handle generative manipulation.

      The Affinity acquisition (March 2024) added professional desktop design tools —
      Designer, Photo, and Publisher — closing the gap with Adobe Creative Cloud in the
      professional segment. Flourish (acquired 2022) powers interactive charts and data
      visualization inside Canva's editor. Canva Websites (2023) and Canva Docs (2024)
      extend the platform into publishing and collaboration use cases. Brand Kit is the enterprise
      feature set: custom fonts, colors, logos, role-based access, and audit trails for
      brand consistency governance at scale. Mobile apps (iOS, Android) support full
      design editing with offline capability. Canva Create 2025 announced Magic Video
      (AI text-to-video), Canva Code, and deeper Affinity integration. Canva supports
      100+ languages but template depth is highest in English; localization quality
      represents a growth opportunity in non-English markets.

  - id: SE_TECH
    title: "Technology Architecture and Engineering"
    order: 2
    claimRefs: [CE003, CE004, CE007, CE011, CE015, CE017, CE018, CE019, CE021, CE024, CE025, CE026, CE029, CE031, CE034]
    body: |
      Canva's technology architecture is cloud-native: AWS-primary for core application
      services, GCP for AI inference workloads, and Fastly CDN for global design asset
      delivery at scale. The platform is a microservices architecture of 100+ independent services,
      enabling independent scaling of high-demand components — particularly the template
      rendering pipeline and AI inference infrastructure. The rendering engine is WebGL-
      based, delivering high-fidelity in-browser previews and print-ready exports in
      PDF, SVG, PNG, MP4, and GIF formats. Real-time collaboration is built on operational
      transformation (similar to Google Docs), supporting concurrent editing at global scale.

      Magic Studio AI uses a hybrid model stack: OpenAI GPT-4 for Magic Write, Stability AI
      Stable Diffusion-based models for Magic Media, and Canva's proprietary fine-tuned
      design recommendation engine for Magic Design. The developer platform (Canva Apps SDK,
      Connect API, Apps Marketplace) enables third-party extension — though community feedback
      notes rate limits and documentation quality lag behind Figma's plugin ecosystem.
      AI inference compute cost is a growing concern: at scale, Magic Studio usage could
      add $7M-75M+ in annual COGS as adoption grows. AWS infrastructure concentration
      creates availability risk for regional outages, standard at this scale. The engineering
      culture is high-quality: weekly releases, 99.9%+ uptime, and active open-source SDK
      maintenance. Canva does not yet hold FedRAMP authorization, limiting US federal
      government adoption.

  - id: SE_TRUST
    title: "Trust, Compliance, and Technical Risks"
    order: 3
    claimRefs: [CE009, CE012, CE019, CE020, CE024, CE027, CE030, CE033, CE035]
    body: |
      Canva holds strong SMB-tier compliance credentials: SOC 2 Type II, ISO 27001, GDPR,
      CCPA, Australian Privacy Act, and WCAG 2.1 AA accessibility standards. These certifications
      support enterprise procurement in most commercial markets. However, enterprise trust
      gaps remain: FedRAMP authorization is absent (blocking US federal government), HIPAA
      Business Associate Agreement (BAA) coverage is limited (blocking healthcare enterprise),
      and end-to-end encryption for user designs is not offered. These gaps reduce Canva's
      addressable enterprise market in regulated industries.

      The key technical risk is AI copyright liability: The Guardian and EFF raise concerns
      about Magic Media's training data provenance. Canva has published AI Principles
      committing to transparency and user opt-out from training data use, but pending US
      and EU court cases against Stability AI and Midjourney create legal exposure for
      tools that use similar training methodologies. If litigation succeeds, Canva may face
      retraining obligations estimated at $50M-500M. AI governance posture is baseline
      adequate for current regulatory environment but will require enhancement as EU AI Act
      compliance requirements take effect in 2025-2026. Developer ecosystem maturity is
      a secondary risk: Product Hunt community feedback notes API limitations versus Figma,
      and SDK documentation quality needs improvement to support long-term ecosystem growth.
