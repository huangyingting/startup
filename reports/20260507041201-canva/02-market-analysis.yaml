  title: Market Analysis
  summary: |
    Canva operates in the visual communications and creative software market, a segment
    within the broader Digital Experience and Content Creation market worth $50B+ by 2030.
    The addressable market spans three distinct layers: consumer/prosumer design ($10B),
    SMB marketing content ($15B), and enterprise creative operations ($25B+). Canva's
    unique position is its cross-segment capture — from individual creators to Fortune 500
    marketing teams. The market is growing at 15-20% CAGR driven by AI integration,
    social media content demand, and the shift of marketing content in-house.
