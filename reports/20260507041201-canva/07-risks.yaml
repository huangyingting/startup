callouts:
  - id: KCR001
    type: key-risk
    title: Adobe Firefly + Microsoft Designer form a two-front competitive pincer on Canva's SMB and enterprise segments
    body: >
      Canva's AI differentiation moat is durable but not permanent. Adobe's Firefly integration with Express brings
      commercially safe AI (licensed training data), Adobe brand trust, and existing enterprise relationships to compete
      directly on Canva's Magic Studio value proposition. Simultaneously, Microsoft Designer's M365/Copilot integration
      gives it zero- friction enterprise distribution in accounts where Microsoft already has 70%+ penetration. Canva's
      240M MAU, brand familiarity, and freemium flywheel remain strong competitive advantages — but this is a two-front
      competitive war that did not exist 24 months ago.
    claimRefs:
      - CR001
      - CR002
      - CR021
