chapter:
  number: 7
  title: Risks
  summary: |
    Canva faces five primary risk categories: (1) AI competitive disruption — Adobe
    Firefly, generative AI tools, and Microsoft Designer threaten Canva's design-
    democratization moat; (2) Regulatory — GDPR, CCPA, EU AI Act, and copyright
    litigation over AI training data; (3) Operational — platform security, data
    breaches (precedent: 2019 breach), and cloud concentration on AWS; (4) People —
    founder key-person concentration with Melanie Perkins and limited management
    bench depth; (5) Valuation/IPO — secondary market $42B valuation may compress
    significantly at IPO given design software comps. Overall risk level: medium-high.
