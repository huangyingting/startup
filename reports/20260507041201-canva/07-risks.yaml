sections:
  - id: SR_COMPETITIVE
    title: Competitive and Market Disruption Risks
    order: 1
    claimRefs:
      - CR001
      - CR002
      - CR012
      - CR017
      - CR021
      - CR032
      - CR038
    body: |
      The primary competitive risk for Canva is Adobe's Firefly + Express product combination,
      which represents the first credible direct challenge to Canva's core SMB design
      democratization value proposition. Adobe's brand equity in creative markets, commercial-
      safe AI (licensed training data), and existing enterprise relationships give it structural
      advantages in winning back professional and enterprise customers. Microsoft Designer's
      M365 Copilot integration poses a distribution threat: 70%+ of Fortune 500 enterprises
      already in Microsoft's ecosystem can access design capabilities without procurement,
      directly competing with Canva for Teams.

      Generative AI commoditization is a medium-term structural risk: Midjourney, DALL-E 3,
      and Stable Diffusion provide standalone AI image generation at $10-30/month, and model
      quality is rapidly converging on Canva's Magic Studio capabilities. Within 2-3 years,
      AI-generated design could become a commodity feature embedded in every productivity
      platform, reducing Canva's AI differentiation premium. The DOJ's block of the Adobe-
      Figma merger was net positive for Canva short-term, but freed Adobe's acquisition
      capital for alternative competitive moves. Figma's independence as a well-capitalized
      competitor (with expanding template and presentation features) adds competitive
      pressure from a third vector. IDC documents Adobe losing 3-4 points of design market
      share since 2020 — but Adobe's counter-attack with AI integration is accelerating.
      Canva's moat (240M MAU, brand familiarity, freemium flywheel) remains substantial,
      but competitive pressure is intensifying across all customer segments simultaneously.
  - id: SR_REGULATORY
    title: Regulatory, Legal, and IP Risks
    order: 2
    claimRefs:
      - CR003
      - CR004
      - CR005
      - CR010
      - CR014
      - CR015
      - CR020
      - CR024
      - CR025
      - CR031
      - CR034
      - CR040
    body: |
      Canva faces a complex multi-jurisdiction regulatory risk stack. GDPR exposure is
      material: 4% global revenue fines (up to $132M) for substantive violations, with
      automated decision-making and AI personalization (Magic Studio) specifically scrutinized
      under GDPR Articles 22 and 35. The EU AI Act applies to Magic Studio as a general-
      purpose AI system: transparency obligations, technical documentation requirements,
      and copyright compliance for training data take effect in 2026. California CCPA
      enforcement (penalties up to $7M per violation) creates parallel US exposure for
      analytics tracking and data sharing practices.

      AI copyright litigation is the most unpredictable legal risk: the Getty v. Stability
      AI and related cases are establishing precedent on AI training data copyright; adverse
      rulings could require Canva to retrain Magic Studio models on licensed-only data at
      estimated $50M-500M cost, or expose the company to retroactive liability. The US
      Copyright Office's 2024 position that AI-generated outputs may lack copyright protection
      creates commercial uncertainty for customers using Magic Studio for business applications.
      The 2019 data breach (139M accounts affected) is historical but creates ongoing enterprise
      trust friction and regulatory precedent in data security audits. Australian Privacy Act
      reforms (2024) expand penalty caps to $50M AUD and extend obligations — elevating
      Canva's domestic compliance cost. Data localization obligations in India, Brazil, and
      potentially other high-growth markets create infrastructure capital requirements.
      WCAG accessibility requirements expanding to private sector in EU 2025-2026 require
      additional product investment in accessibility exports.
    tableRefs:
      - TR001
