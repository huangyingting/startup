callouts:
- type: insight
  tone: positive
  title: Authentication Technology as Defensible Moat
  body: 'Vestiaire''s hybrid AI + expert authentication system is difficult to replicate at quality parity. The machine learning
    models are trained on over 10 years of luxury item transaction data — a proprietary corpus that grows with every authentication
    decision. The Vestiaire Collective Anti-Counterfeiting Academy (750 hours initial training per authenticator) builds brand-specific
    forensic expertise that cannot be acquired quickly. Physical centers in four global cities represent substantial capital
    and operational investment. Together, these form a compounding moat: more data → better AI → faster expert throughput
    → more transaction volume → more data.'
  claimRefs:
  - CE012
  - CE013
  - CE014
  - CE015
- type: risk
  tone: warning
  title: Authentication Accuracy Gap and Reputational Exposure
  body: The 0.1% residual authentication error rate — covered by insurance but not formally audited by an independent third
    party — represents a material reputational risk in a trust-dependent luxury market. The Times article (September 2025)
    documented the escalating sophistication of 'superfakes' as a direct challenge to authentication infrastructure. Any high-profile
    failure (a counterfeit Birkin reaching a buyer) could trigger press coverage that disproportionately damages brand trust
    relative to the statistical frequency of the event. The RealReal's experience with a 2018 Chanel lawsuit over authentication
    failures demonstrates that this is not a hypothetical risk in the luxury resale category.
  claimRefs:
  - CE013
  - CE015
- type: risk
  tone: warning
  title: Technology Leadership Continuity Risk
  body: The October 2025 CEO appointment of Bernard Osta (finance background, ex-CFO) rather than a technology executive introduces
    product vision continuity risk at a moment when the company has explicitly committed to AI-accelerated growth. CTPO Stacia
    Carr was recruited in 2024 under the prior CEO; her tenure and strategic alignment under Osta is not yet publicly confirmed.
    Key-person dependency on a small leadership team overseeing a complex proprietary ML authentication system is a diligence
    item.
  claimRefs:
  - CE020
  - CE036
  - CE037
