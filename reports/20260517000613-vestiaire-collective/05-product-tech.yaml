- id: roadmap-trust
  title: Product Roadmap and Trust Framework
  body: 'Incoming CEO Bernard Osta (appointed October 2025, previously CFO at Vestiaire and before that an investment banker)
    made explicit in his first public statements that AI-acceleration of the product roadmap is his top priority, stating:
    "With the rise of AI, we have an extraordinary opportunity to accelerate on our product roadmap, deliver the most engaging
    customer experience and gain market share." Near-term product priorities include the launch of AI-powered image search
    (announced October 2024, allowing buyers to upload a photo to find matching items), continued AI price recommendation
    refinement, deeper personalization using purchase and browsing history, and expansion of the Resale-as-a-Service program.
    Osta has also identified making resale "more seamless, instant and frictionless" as a key theme — modeled on the Ganni
    RaaS implementation which introduced home pickup and instant store credit.

    The trust framework is anchored by Vestiaire''s B Corp certification (awarded 2021), which independently verifies social
    and environmental performance standards across the full business. On anti-counterfeiting compliance, Vestiaire is a signatory
    of the French Anti-Counterfeiting Charter (2012) and the European Commission''s Memorandum of Understanding on online
    counterfeiting (signed April 2024). The platform is a member of the Sustainable Market Initiative (SMI) Fashion Task Force
    convened by King Charles III, participating in a pilot to establish blockchain-based Digital IDs for luxury items to provide
    provenance tracking across the full lifecycle. Vestiaire partnered with Chloé to conduct the first resale experience using
    digital item identification technology, and is engaged with the World Economic Forum on data exchange frameworks for digital
    authentication. The EU Digital Product Passport (DPP) initiative is viewed by management as a "powerful enabler to promote
    circularity and enhance the value of luxury goods through resale." On payments and data, the platform is GDPR-compliant
    as a French company with EU user data handling obligations, and PCI-DSS compliance is implicit in the multi-currency payment
    infrastructure. The Digital Services Act (DSA) applies to Vestiaire as a platform operating in the EU; no specific DSA
    enforcement action has been publicly reported. Platform safety commitments include the 2022–2023 phased ban on 63 fast-fashion
    brands (including Zara, H&M, Shein, Temu, Uniqlo, Mango), explicitly aligning platform values with its circular economy
    mission and restricting supply to luxury-tier and sustainable sellers only.'
