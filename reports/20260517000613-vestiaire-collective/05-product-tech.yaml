- id: TE002
  title: Authentication Workflow
  columns:
  - Step
  - Actor
  - Method
  - Typical Time
  - Output
  - Failure Risk
  rows:
  - - 1. Seller Registration & Monitoring
    - AI system + Trust & Safety team
    - ML model screens account behavior, device fingerprint, identity signals at account creation
    - Real-time (seconds)
    - Account approved or blocked; ~10% blocked pre-listing in 2024
    - Sophisticated fraudsters may pass initial screening; ongoing monitoring required
  - - 2. Listing Creation & Digital Verification
    - Seller + AI + Human curation team
    - Seller uploads photos; AI image recognition scans for brand markers; curators review manually
    - Minutes to hours per listing
    - Listing approved, rejected, or flagged for physical authentication
    - AI can miss sophisticated counterfeits in photos; relies on photo quality and seller cooperation
  - - 3. Buyer Purchase (Escrow Initiated)
    - Buyer + Payment system
    - Buyer completes purchase; payment held in escrow until authentication outcome
    - Instant (at purchase)
    - Funds secured; authentication trigger sent to seller; prepaid shipping label issued
    - Buyer may not proceed with auth shipping; escrow management creates operational complexity
  - - 4. Item Shipped to Authentication Center
    - Seller + Logistics carrier
    - Seller ships to assigned center (Tourcoing, Crawley, Brooklyn, or Hong Kong) via tracked prepaid label
    - 1–7 days transit depending on geography
    - Item received at center; chain of custody logged
    - Shipping damage in transit; seller non-compliance with shipping instructions
  - - 5. Expert Physical Authentication
    - Vestiaire authenticator (750h trained specialist)
    - 'Forensic inspection: microscopy, dental mirror, olfactory test, acoustic test, measurements, stitching analysis, hardware,
      packaging'
    - Minutes to hours per item (high-value items take longer)
    - Item authenticated (pass) or rejected (counterfeit / not-as-described)
    - ~8% rejection rate per day; edge cases in ultra-rare items or novel counterfeiting methods
  - - 6. Quality Control Check
    - Vestiaire QC specialist
    - Condition assessment vs. seller description; photos taken for buyer record
    - Minutes per item
    - Item condition confirmed or downgraded; listing amended if needed
    - Subjective condition grading; occasional disputes on 'good' vs 'very good' classification
  - - 7a. Authentication Pass — Dispatch
    - Vestiaire logistics team
    - Authentication certificate generated; item repackaged with sustainability packaging; dispatched to buyer
    - 1–5 business days from auth center to buyer
    - Buyer receives authenticated item with certificate and Vestiaire branded packaging
    - Logistics delays or damage in final-mile delivery
  - - 7b. Authentication Fail — Buyer Refund
    - Vestiaire Trust & Safety + Customer Support
    - Buyer notified of counterfeit finding; full refund processed from escrow; seller account flagged or closed
    - 24–72 hours for refund processing
    - Buyer fully refunded; item quarantined; seller sanctioned; data fed to ML model
    - Reputational risk if failure is publicized; insurance covers residual 0.1% accuracy gap
  notes: Based on Vestiaire's published authentication documentation, Forbes Trust Report (October 2022), The Times article
    (September 2025), TheIndustry.fashion (January 2022 UK centre opening), and Vestiaire Collective FAQ/help center. Physical
    center throughput and training hours sourced from Forbes and The Times primary reporting. Step ordering and timing are
    approximate.
  enumerationScope:
    coverage: partial
    basis: This enumeration covers the standard authentication workflow for physical-auth-eligible items (items sold on the
      standard C2C flow). It does not cover the separate RaaS brand partner workflow, the Consignment VIP flow managed entirely
      by Vestiaire, or the direct-buy "Sell Now" instant offer flow which bypasses the standard seller-ships-to-center model.
      Items below €1,000 that do not opt into physical authentication follow only steps 1–3 and 7a in abbreviated form.
