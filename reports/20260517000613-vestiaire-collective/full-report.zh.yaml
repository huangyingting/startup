      - number: '2.2'
        title: 市场规模与增长轨迹
        blocks:
          - type: paragraph
            body: >-
              全球二手服装市场是消费品里增长最快的细分领域之一。ThredUp 的 2026 Resale Market and Consumer Trend Report 预计，全球二手服装总市场到 2030 年将达到
              $393 billion，增速是整体服装市场的 2×。BCG 另行预计，全球转售市场到 2030 年将达到 $360 billion（据 WWD 报道）。这两个头部数字定义不同——ThredUp
              覆盖全部二手服装，BCG 更宽泛地覆盖转售——但结论在量级和方向上趋同：本十年末市场规模约为 $350–$400 billion。当前市场（2024 年估计）约为 $170–$230
              billion，意味着未来六年复合年增长率约 8–10%。


              对 Vestiaire 而言，真正相关的可服务市场更窄：通过经鉴定数字平台完成的奢侈时尚转售。公开数据没有精确拆分这一子市场，但分析师共识和竞争对手披露可用于合理三角测算。The RealReal
              是最大的上市奢侈品转售平台，FY2024 收入约 $600 million，活跃买家超过 1 million。考虑到 Vestiaire 在欧洲规模相当或更大，且在美国继续增长，对 2030
              年全球线上奢侈时尚转售的保守 SAM 估计为 $60–80 billion，假设奢侈品约占二手服装总价值的 15–20%，数字渠道承接多数增长。在一个 Vestiaire
              守住欧洲领先地位，并显著提升美国和亚太渗透率的情景下，其可获取市场（SOM）到 2028–2030 年可能达到 $5–8 billion GMV，相当于其 SAM 的 8–12% 份额。


              市场并不均质。不同品类的增长轨迹和利润率结构差异很大。奢侈手袋和皮具是单件价值最高的子品类，品牌认知强，二级市场流动性深。腕表和高级珠宝增长很快，受投资级属性和专业平台兴起支撑。服饰体量最大，但单件价值较低。鞋履受
              StockX 和 GOAT 带动的球鞋转售文化驱动，按件数增长最快。Vestiaire 覆盖其中大多数品类，带来多元化，也要求平台具备按品类分化的鉴定专业能力。
