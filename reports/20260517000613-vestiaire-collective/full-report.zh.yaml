      - number: '3.3'
        title: 竞争护城河与风险分析
        blocks:
          - type: paragraph
            body: >-
              Vestiaire Collective 最持久的护城河，是欧洲品牌声望、实物鉴定基础设施和 2021 年拿下的 Kering 战略合作三者叠加。Kering
              的参与为它带来欧洲奢侈品公司中的可信度、潜在的品牌背书转售项目优先通道，以及美国中心型竞争者难以复制的机构合法性信号。公司覆盖 80+
              个国家的卖家和买家网络，为难找的奢侈品形成全球供需飞轮，也压缩了地理触达更有限平台可进入的市场。

              最实质的竞争风险是奢侈品牌去中介化。Kering 关联品牌（Gucci Vault、Saint Laurent）、LVMH 的 Nona Source 和 Stella McCartney 的
              Re.Up，都是一手奢侈品牌直接搭建或赞助转售渠道的案例。如果品牌把转售导向自有平台，本应流向 Vestiaire 的利润就会被品牌拿走。Kering 合作本身也存在结构性冲突：Kering
              品牌（Gucci、Saint Laurent、Balenciaga、Bottega Veneta）同时是 Vestiaire 的供给来源、战略投资方和潜在的一方转售竞争者。

              The RealReal 2024 年走向盈利是重要标记。如果 TRR 继续用其实物寄售模型扩张欧洲，它可能在 Vestiaire 的本土市场复制鉴定定位。GOAT
              持续扩展奢侈品——加入设计师手袋、成衣和配饰——构成来自球鞋平台层级的中期威胁。ThredUp 的转售即服务（RaaS）模型（2026 年 5
              月转向）也可能让快时尚和当代品牌零售商规模化提供点对点转售，进而侵蚀流向 Vestiaire 低端奢侈层的中端供给。
