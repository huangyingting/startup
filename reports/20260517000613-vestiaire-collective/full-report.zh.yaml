      - number: '4.3'
        title: 资本充足性与融资路径
        blocks:
          - type: paragraph
            body: >
              Vestiaire Collective 自 2015 年以来通过多轮融资募集超过 $600 million，投资方包括 Eurazeo（约 25% 持股，最大股东）、Kering（约 5%
              战略持股）、SoftBank、Tiger Global、Condé Nast 和 Generation Investment Management。公司估值经历了有意义的重置：从 2022 年 3 月
              Tradesy 交易后的 $1.7 billion 投后估值，到 2022 年中约 €1.4 billion，再到 2024 年 1 月众筹轮的 €1.1 billion（$1.2B）。该众筹仅募集约
              €3.5M，金额更像象征性——说明它主要是品牌和社区建设动作，而非主要资本募集。


              管理层明确把 IPO 条件设定为先实现盈利。Reuters 2024 年 1 月报道称，公司目标是在 2024 年底前盈利。截至 2026 年 5 月，尚未出现该里程碑的公开确认。2025 年 10 月任命前
              CFO Bernard Osta 为 CEO，说明财务纪律和 IPO 准备已成为管理层的主优先级。Osta 曾在 Lazard 和 Goldman Sachs 从事投行业务，这与上市前定位一致。


              现金状况、烧钱速度和债务期限表完全未披露。作为法国私营公司，Vestiaire 没有公开申报义务，近期也没有主要股权融资；如果不能直接接触管理层，真实资本充足性无法验证。The RealReal 从
              -$134.6M EBITDA（FY2023）改善到 +$9.07M EBITDA（FY2025），大约用了三个财年，说明即使是资源充足的公开市场可比公司，盈利之路也可能很长。
