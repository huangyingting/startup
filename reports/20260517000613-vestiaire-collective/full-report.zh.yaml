        - REAL 净亏损从 -$196M（FY2021）收窄至 -$42M（FY2025）；走势向好，但 GAAP 盈利尚未实现
      - - Gen Z 可持续消费顺风是结构性的；二手时尚是增长方向
        - Vinted 同样受 Gen Z 欢迎，规模大得多（2025 年 GMV €10.8B），且已盈利（净利润 €62M）；与 Vestiaire 的结构性差距可能继续拉大
        - Vinted 2026 年 4 月估值达 €8B，约 7× 收入；说明市场更偏爱盈利型运营商，而非亏损同行
      - - $600M+ 融资提供多年现金缓冲；新 CEO 来自投资银行，指向流动性事件
        - 除 2024 年 2 月 €3.5M 众筹外，2021 年后无公开融资轮；Depop 2026 年以 $1.2B 出售给 eBay（低于 Etsy 2021 年支付的 $1.6B），显示转售估值被压缩
        - 下调估值融资风险真实存在；众筹显示，在 $1.7B 估值上进入传统 VC 市场有难度；Depop 案例是直接可比的不利 M&A 先例
    notes: 论点 / 反论点配对基于 8 个尽调章节的证据。
