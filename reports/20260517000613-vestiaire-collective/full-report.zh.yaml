          - type: callout
            title: 鉴定信任是获客与留存引擎
            body: >-
              Vestiaire Collective 的鉴定保证是奢侈品转售市场最有力的单一差异化。买家若以低于零售价 30–70% 的价格成功收到经验证的奢侈品，满意度高，复购意愿强。独立背书——包括法国 Qualiweb
