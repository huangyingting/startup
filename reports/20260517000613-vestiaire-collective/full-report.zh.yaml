  - id: FO002
    title: Vestiaire Collective 商业模式流程
    type: flow
    summary: 简化流程展示 Vestiaire Collective 如何连接卖家、买家和鉴定服务，并通过佣金、买家费用和转售即服务 合作产生收入。
    data:
      nodes:
        - id: seller
          label: 卖家
          detail: 个人或专业卖家上架二手奢侈品。成交后支付约 12–15% 的卖家佣金。
        - id: listing
          label: 上架与策展
          detail: 平台在上架前审核照片和商品详情，确保符合编辑标准，并满足品类、品牌和成色要求。
        - id: auth
          label: 鉴定中心
          detail: 商品发往巴黎、纽约或香港中心。专家鉴定师核验品牌、材质、成色与真伪。
        - id: buyer
          label: 买家
          detail: 买家按标价购买，并支付约 5% 的买家保护费。商品通过质检后，买家收到经鉴定商品。
        - id: revenue
          label: Vestiaire 收入
          detail: 公司从成交交易中留存卖家佣金（12–15%）、买家保护费（~5%）以及鉴定服务费。
        - id: raas
          label: RaaS / 品牌合作伙伴
          detail: 奢侈品牌合作伙伴通过转售即服务接入 Vestiaire Collective 的转售基础设施，形成额外 B2B 收入流。
      edges:
        - from: seller
          to: listing
          label: 上架商品
        - from: listing
          to: auth
          label: 商品寄送做实物核验
        - from: auth
          to: buyer
          label: 经鉴定商品交付
        - from: buyer
          to: revenue
          label: 买家保护费支付
        - from: seller
          to: revenue
          label: 卖家佣金留存
        - from: raas
          to: revenue
          label: 授权 / RaaS 服务费
    claimRefs:
      - CO008
      - CO009
      - CO010
      - CO011
      - CO012
      - CO013
      - CO014
