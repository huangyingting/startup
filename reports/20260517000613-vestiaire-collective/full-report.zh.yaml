          - type: callout
            title: $1.7B 估值属于 2021 年时代，可能需要下调 30–60%
            body: >
              $1.7 billion Series F 估值形成于 2021 年 3 月私募市场亢奋高点。此后：The RealReal 市值从 ~$4B 跌至 $1.09B 后部分恢复；ThredUp 市值曾高于
              $3B，如今为 $529M；Depop 被 Etsy 以 $1.2B 转售给 eBay（较 Etsy 2021 年 $1.6B 收购价低 25%）；Poshmark 在 2021 年 1 月 IPO
              时交易估值超过 $3B，之后以 $1.2B 被收购。Vestiaire 2024 年 2 月众筹仅 €3.5M，是一个强信号：机构资本市场并不愿意在接近 2021
              年估值的水平为新轮次提供资金。没有新的交易锚定价格，所有分析在 2026 年条件下都必须把 $1.7B 视为上限，而不是下限。
