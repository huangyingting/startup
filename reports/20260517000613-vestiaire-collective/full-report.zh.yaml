      - number: '5.2'
        title: 鉴定模型与技术
        blocks:
          - type: paragraph
            body: >-
              鉴定是 Vestiaire Collective 的标志性技术能力，也是相较于未审核转售平台的主要信任差异。系统按四阶段验证管线运转。第一，AI 驱动的资料监控会在任何商品上架前识别并拦截可疑卖家账号；2024
              年，这一层在注册环节拦截了约 10% 的潜在账号。第二，人工选品团队借助 AI 图像分析检查上传照片，在每件商品上线前完成数字筛查。第三，售价超过 €1,000 的商品必须实物鉴定，低价商品可选择 €15
              的加购鉴定；卖家把商品寄到最近的鉴定中心，由受训专家进行手工法证检查。第四，质量控制会核对商品成色是否与卖家描述一致，减少售后纠纷。

              Vestiaire 运营四个实物鉴定中心：Tourcoing（法国，旗舰中心，两班制 120 名员工，每天鉴定约 2,000 件商品）、Crawley（英国 West Sussex，2022 年 1
              月开业，产能最高每天 1,000 件）、Brooklyn（纽约，覆盖北美）和香港（覆盖亚洲）。Vestiaire Collective Anti-Counterfeiting Academy 创立于 2017
              年，每名鉴定师需接受 750 小时初始培训，并每年再接受 180
              小时继续教育，覆盖宝石学、制表和皮具等品类专长。专家鉴定会用显微镜分析皮革纹理、牙科镜检查五金、嗅觉比对（每个奢侈品牌都有独特皮革气味）、声音测试（拉链和锁扣声）、精确测量，以及手工缝线分析，以区分手工原作和机器缝制假货。每天提交的商品约
              8% 未通过鉴定或成色标准；自 2020 年以来，Vestiaire 拒收商品累计估计市值 $360 million。平台声称鉴定准确率 99.9%，剩余 0.1%
              由保险政策覆盖：若买家商品后来被认定为假货，可获得全额退款。鉴定并售出的最高价值商品是一只 Hermès Birkin Faubourg，价格为
              €158,000。机器学习越来越多地支持但不替代人类专家：算法向鉴定师提示历史假货模式、品牌特定标记和来源指标；每一件通过或被拒的商品都会回流训练数据，使系统持续自我改进。
