  - number: 4
    title: 财务情况
    sections:
      - number: '4.1'
        title: 收入模型与定价架构
        blocks:
          - type: paragraph
            body: >
              Vestiaire Collective 运营寄售式市场，卖家上架商品，售出后支付佣金。确切佣金率未公开披露，但平台收入模型与 The RealReal 接近；The RealReal 在 FY2025 实现
              37.7% 抽佣率（收入 / GMV），收入构成约为 77% 寄售佣金、13% 直接购买、10% 配送和服务。将 25–38% 的可比区间套用于 PrivCo 对 2024 年 GMV 的估计，意味着
              Vestiaire 总收入大体符合 PrivCo 给出的 $380M 估计。


              鉴定是单独的收入层。估值超过 €1,000 的商品会自动鉴定且不另收费（成本打包进佣金）。低于 €1,000 的商品可以选择实物鉴定，价格为每件 €15。这个可选模型不同于 The RealReal
              的强制鉴定做法，也形成两层信任结构：低价值商品买家必须主动选择验证。平台还提供礼宾服务，替卖家处理上架、专业摄影和商品描述，这是一个收费增购项，但定价和附着率没有披露。


              预付费配送标签系统意味着 Vestiaire 会管理部分物流协调；不过，与 Vinted 的 Vinted Go
              物流业务不同，配送利润贡献没有单独披露，看起来被打包在整体服务关系里。收入质量主要由寄售佣金支撑，这部分交易性强、依赖成交量；鉴定费和礼宾服务提供次要贡献，但规模未知。
