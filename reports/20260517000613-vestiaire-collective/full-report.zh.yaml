      - number: '6.3'
        title: 客户体验、留存与满意度
        blocks:
          - type: paragraph
            body: >
              Vestiaire Collective 的客户满意度反映了平台双边属性：买家和卖家痛点不同，而鉴定流程虽是价值主张核心，却也是被提及最多的单一摩擦来源。SmartCustomer.com（截至 2026 年聚合
              2,807 条评论）给 Vestiaire 的平均评分为
              3.9/5。客户评论样本反复出现几类主题：正面评论提到经鉴定商品的质量、发现稀有奢侈品的能力，以及卖家收款处理快；反面评论则持续指向鉴定延迟、客服响应时间，以及订单被取消或产生争议时的挫败感。


              负面体验模式包括：（1）鉴定等待时间超出典型窗口，买家等待三到四周，而非营销中暗示的收货后 2-3
              天审核期；（2）客服互动被认为缓慢，问题在多个客服之间转来转去；（3）卖家称买家接受报价后最终未付款；（4）国际买家遭遇意外关税或跨境物流复杂性。一位评论者写道：“差不多一个月糟糕互动，感觉有 20
              个员工把我踢来踢去。要是能给负星，我一定会给！”（SmartCustomer，2026 年 4 月）。


              尽管存在这些摩擦，Vestiaire 的品牌认知仍得到独立客户关系评估确认。公司在 2024 年和 2026 年两次获得法国 Qualiweb “Best Digital Customer
              Relationship of the Year”奖（奢侈 / 时尚类别排名 #1），并在 2025/2026 年被 Corriere della Sera 评为“Italy's Best Customer
              Service”。客户服务副总裁在 2026 年 3 月（Stratégies magazine）披露，公司每年处理 120 万次客户联系，由 350 名客服支持（多数外包），AI 辅助聊天机器人分流带来 3
              个百分点满意度提升，平均客单价为 350 欧元。这些机构认可表明服务质量正在改善，即便第三方评论平台呈现的评价分布仍然分化。


              平台不采用订阅模式，因此所有收入都由交易驱动，留存体现为复购频次，而非流失率。可比的鉴定型奢侈品转售竞争对手 The RealReal 报告称，2025 年 80% 的 GMV 来自复购买家——这是行业基准；如果
              Vestiaire 达到同等水平，则说明活跃买家留存健康。Vestiaire 尚未公开披露同类指标。行业对奢侈品转售平台的估计显示，完成首次成功购买的买家中，有 40–60% 会在 12
              个月内回购；留存率越高，通常越依赖正面的鉴定体验。


              买家旅程图（FU001）展示了关键的“鉴定等待”阶段：这是摩擦峰值时刻，体验要么确认信任（并推动复购），要么摧毁信任（并触发流失）。通过 Crawley UK 中心或 Brooklyn North America
              中心鉴定的商品受益于更快的区域周转，尤其是在 Brexit 相关跨境复杂性促使英国枢纽于 2022 年 1 月开设之后。
