  - id: TV006
    title: 尽调问题清单
    columns:
      - 请求事项
      - 优先级
      - 理由
      - 预期来源
    rows:
      - - FY2022–2025 经审计损益表和资产负债表
        - 关键
        - 没有财务报表，无法判断盈利轨迹、烧钱速度或真实现金头寸
        - 管理账；虚拟数据室；法国商事法院备案（如有）
      - - 按地区（欧洲、美国、亚洲）和品类（包袋、服装、腕表）拆分的 GMV 与净收入
        - 关键
        - 看清收入质量、集中度，以及哪些地区已经盈利；欧洲为主的收入可能适用较低倍数
        - 内部分析；管理层介绍；数据室
      - - 鉴定失败率（假货漏检率）与保险覆盖
        - 高
        - 核心运营风险和护城河耐久性；The RealReal 遭遇过鉴定诉讼；Vestiaire 的失败率未经验证
        - 质量保证团队审计；内部错误日志；保险文件
      - - Kering 合作商业条款：收入分成、排他性、优先购买权
        - 高
        - Kering 的 VC 持股与自有 Gucci Vault 平台之间的利益冲突尚未量化；条款决定协同还是冲突
        - 股东协议；管理层讨论；法律顾问
      - - 完整股权结构表，包括期权池、清算优先权和反稀释条款
        - 高
        - 看清真实经济稀释；低于 $2B 的退出场景下，早期轮次可能带有重优先权，压低普通股价值
        - 法律文件；股权结构模型
      - - 客户留存队列数据（CAC、LTV、按客群批次拆分的复购率）
        - 中
        - 验证粘性说法；欧洲平台 CAC 可能更低，但美国可能需要重投放；LTV/CAC 比率决定单位经济能否跑通
        - 产品分析团队；投资者材料
      - - 技术与安全审计：GDPR 合规证书、DSA 合规状态、数据泄露历史
        - 中
        - GDPR 不合规风险重要；Vinted 2024 年 7 月收到 €2.4M GDPR 罚款；Vestiaire 运营规模相近
        - 安全审计报告；DPO 认证；CNIL 往来函件
    notes: 尽调问题按投资前尽职调查沟通优先级排序。关键事项应在任何投资条款清单之前解决。
