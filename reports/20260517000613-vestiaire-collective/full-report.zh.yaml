      - number: '8.2'
        title: 估值情景与可比分析
        blocks:
          - type: paragraph
            body: >
              我们用三种方法构建估值：（1）上市同行 EV/revenue 可比倍数，（2）相邻转售市场的先例交易，（3）概率加权情景分析。三者都收敛到大约 $1.0–1.5 billion 的基准公允价值——低于 2021
              年轮次价格——只有在 Vestiaire 证明盈利能力、规模可比 Vinted 的乐观情景下，才有显著上行。


              上市可比分析：The RealReal（REAL）约以 1.51× TTM 收入倍数交易（截至 2026 年 5 月 15 日，市值 $1.09 billion / TTM 收入 $722
              million），此前其在 2025 年首次实现全年各季度调整后 EBITDA 为正（$42 million，6.1% margin），并指引 FY2026 收入为 $765–780
              million。ThredUp（TDUP）约以 1.65× TTM 收入倍数交易（市值 $529 million / TTM 收入 $321 million），Q1 2026 收入增长 14.6%，毛利率
              79.2%。这些倍数反映市场已经把转售平台估值从 2021 年高点大幅压低，当时 REAL 市值曾短暂超过 $4 billion。


              私有可比分析：Vinted——Vestiaire 最接近的欧洲同行——2026 年 4 月通过老股交易达到 €8 billion 估值，约为 FY2025 收入（€1.1 billion）的 7.3×。但
              Vinted 结构上不同：它在 2025 年实现 €62 million 净利润和 €137 million 自由现金流，覆盖 26+
              个市场的大众与奢侈品细分，并运营物流和支付基础设施，带来额外利润率。Poshmark 于 2023 年 1 月被 Naver 以 $1.2 billion 收购，约为 FY2020 收入的 4.6×——较其
              2021 年 1 月 IPO 时 $3 billion+ 估值大幅折价。Depop 于 2021 年 6 月被 Etsy 以 $1.6 billion 收购，2026 年又以 $1.2 billion 转售给
              eBay——下调 25%。StockX 最后披露估值为 $3.8 billion（2021 年 4 月），此后没有新轮次。GOAT 最后披露为 $3.7 billion（2021）。两者的 2021
              年私募峰值倍数都已经过时，且很可能偏高。


              将 1.5×（未盈利上市可比）套用到 Vestiaire 估计收入区间 $250–450 million，对应公允价值为 $375–675 million——较 2021 年价格低 60–80%。套用
              3×（给予私有奢侈品市场领导地位的溢价），对应 $750 million–$1.35 billion。只有在 5×（接近已证明盈利能力的 Vinted）时，Vestiaire 隐含公允价值才会接近
              $1.25–2.25 billion——与 2021 年轮次一致。概率加权结果（25% 乐观情景 $2.25B，50% 基准情景 $1.25B，25% 悲观情景 $0.5B）给出约 $1.3 billion
              的期望值，较 2021 年价格小幅折价。
