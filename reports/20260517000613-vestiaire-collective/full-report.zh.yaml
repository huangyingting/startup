      - number: '2.4'
        title: 竞争格局与市场定位
        blocks:
          - type: paragraph
            body: >-
              全球奢侈品转售市场高度分散，没有一个平台能在所有地理市场和品类中占据主导。Vestiaire Collective 在欧洲位置最强，也是唯一将精选奢侈定位与 70+
              个国家全球运营结合起来的大型平台。按产品定位看，最接近的同行是 The RealReal；后者主导美国寄售市场，2025 年活跃买家超过 1 million，80% GMV
              来自复购买家，说明经鉴定奢侈品转售的留存很强。不过，The RealReal 模型资本强度高：公司 2023 年净亏损 $168.5 million，2024 年净亏损 $134.2 million，2025
              年净亏损 $41.8 million，说明当鉴定、寄售物流和获客成本都很高时，实现盈利存在结构性难度。


              Fashionphile 位于更专业的细分生态，是超奢侈手袋买断专家，由 Neiman Marcus 支持，并因能给卖家提供即时流动性而获信任。Poshmark 在 2023 年 1 月以 $1.2
              billion 被韩国互联网公司 Naver 收购后，运营社交电商模型，拥有 130 million+ 社区成员、$8 billion+ 卖家收入和 350 million+
              已售商品，但目标是中端和大众时尚，而非奢侈品。Depop 于 2021 年被 Etsy 以 $1.625 billion 收购，截至 2026 年 2 月据称正拟以 $1.2 billion 出售给
              eBay；它面向年轻用户、聚焦古着，鉴定基础设施很轻。StockX 2021 年估值 $3.8 billion，用竞价 /
              挂单交易所模型服务球鞋和街头服饰市场，奢侈品覆盖有限。除年轻奢侈品买家和设计师服饰的交叉地带外，这些平台更多是相邻竞争者，而非直接对手。


              新兴竞争动态是品牌自营转售项目崛起。Vestiaire 自身转售即服务（RaaS）产品已有 12+ 奢侈品牌伙伴，包括 Burberry、Ganni、Alexander McQueen、Mulberry 和
              Chloé，使公司不只是与一手奢侈零售竞争，也成为品牌自有转售的基础设施。不过，Kering（Vestiaire 投资方）、LVMH 等奢侈品集团也在探索直接转售项目，这引出一个问题：Vestiaire 的
              RaaS 合作关系未来是否会面临去中介风险。平台整合（Poshmark 卖给 Naver，Depop 拟卖给 eBay）也说明市场正在理性化，资本雄厚的收购方在二手时尚中寻找规模。
