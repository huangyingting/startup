  - number: 8
    title: 估值
    sections:
      - number: '8.1'
        title: 投资逻辑与建议
        blocks:
          - type: paragraph
            body: >
              Vestiaire Collective 是一个有吸引力的欧洲奢侈品转售品牌，具备真实网络效应、鉴定基础设施、Kering 战略协同，以及 Gen Z 可持续叙事带来的结构性需求驱动。公司成立于 2009
              年，业务覆盖 70+ 个国家，拥有超过 500 万件精选商品，每日新增 30,000 件上架，已经在欧洲二手奢侈品细分市场建立了有意义的护城河。2025 年 10 月 CEO 交接——前 CFO、投资银行家
              Bernard Osta 接替 Maximilian Bittner——带来资本市场经验，可能意味着近期流动性事件（IPO 或战略出售）。


              尽管有这些优势，以 2021 年 $1.7 billion 的价格或接近该价格投资，仍无法支撑“投资”建议。该估值形成于 2021 年 3 月私募市场亢奋高点，当时 Vestiaire 完成 $216
              million Series F，由 SoftBank 和 Generation Investment Management 领投，Kering 作为战略共同投资方。此后私募市场大幅重估：截至 2026 年 5
              月，可比上市公司 The RealReal（REAL）和 ThredUp（TDUP）的 过去 12 个月收入倍数分别约为 1.5× 和 1.65×，而 Vestiaire 2021 年隐含倍数约为估计收入的
              4–6×——在未证明盈利能力前，2.5–4× 溢价很难维持。


              我们的投资建议是“观察”，总分 6.5/10。信心为中，因为 Vestiaire 是私营公司，没有公开财务披露；所有收入估计都来自 GMV
              代理计算和行业基准。风险评级为高。上调至“买入”的唯一最重要催化剂，是确认 EBITDA 盈亏平衡路径，类似 The RealReal 的盈利轨迹（FY2025 调整后 EBITDA $42
              million，首次全年每个季度均为正）。最可能的下调触发因素，是新一轮融资定价低于 $1 billion，这将意味着公司正式按当前市场条件重置估值，进入 估值下调轮次。
