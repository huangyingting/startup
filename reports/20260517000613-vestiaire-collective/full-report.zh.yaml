      - number: '5.3'
        title: 技术架构与基础设施
        blocks:
          - type: paragraph
            body: >-
              Vestiaire Collective 的技术组织由首席技术与产品官（CTPO）Stacia Carr 牵头。她于 2024 年加入，此前在 Zalando 和 SoundCloud
              担任高级技术岗位。董事会还得到技术顾问 Jim Freeman 的支持；他曾任 Zalando CTO，以及 Amazon Prime Video 和 Alexa
              副总裁，加入董事会就是为了指导产品和基础设施战略。公司 2024 年总员工数估计约 600 人，工程和产品团队占相当比重，这与同等规模市场平台的配置一致。

              平台技术栈——根据招聘信息、StackShare 档案、工程博客（公开可见内容有限）以及可比市场平台架构推断——围绕移动优先、云托管的微服务架构搭建。面向消费者的界面包括 iOS（Swift 和 / 或
              React Native）、Android（Kotlin 和 / 或 React Native）以及基于 React 的网页前端。后端服务使用 RESTful API，搜索和发现层由 Elasticsearch
              驱动，支撑 5M+ 在线商品上的品类、品牌、尺码和成色筛选。ML/AI 层是平台自研核心：计算机视觉模型支持基于图片的搜索（包括视觉相似小组件），AI 驱动的价格推荐纳入商品成色、品牌吸引力、当前供需，以及来自
              10 年以上市场交易的历史数据。支付处理支持 30+ 种货币，由支付网关伙伴（Stripe、Adyen 或同类）支撑。云基础设施采用多区域部署，服务覆盖 70+ 个国家的用户；公司明确计量云托管的 Scope 3
              排放，并用 Aktio 碳计算平台核算数字足迹带来的环境影响。即将推出的图片搜索功能（2024 年 10 月宣布，计划于 2024 年底 / 2025
              年初上线）将允许买家上传照片，并从全量库存中获得视觉相似匹配，类似把 Google Lens 用到奢侈时尚领域。

              平台支持 9+ 种语言（英语、法语、德语、意大利语、西班牙语、瑞典语、荷兰语、韩语、繁体中文）和多币种结账，是市场上国际化程度较高的时尚转售技术栈之一。“相似商品”小组件体现了 AI
              的商业影响：通过这一发现入口，商品销量翻倍，验证了机器学习投入的回报。一次性买家中 22%、复购买家中 17% 此前都难以找到想要的商品；AI 增强搜索同时撬动留存和转化。
