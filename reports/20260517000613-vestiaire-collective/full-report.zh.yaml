      - number: '8.3'
        title: 否决触发条件与尽调要求
        blocks:
          - type: paragraph
            body: >
              “观察”建议取决于几项监测条件。如果以下任何否决条件被触发，建议应立即下调为“放弃”，无需等待完整重评。最关键风险是新一轮融资估值低于 $1 billion，这将确认 Vestiaire
              自身董事会和机构投资者已接受按市场出清价格重置。这会先于任何 IPO 或收购以相对上一轮投资者的显著溢价发生。


              第二优先风险是 The RealReal 的竞争演化。如果 REAL 在 2026 年实现全年 GAAP 净利润（指引 non-GAAP EPS 净亏损 $0.03），而 Vestiaire 仍不盈利，REAL
              将成为全球占主导地位的鉴定型奢侈品转售平台，并拥有更有说服力的公开市场故事——这会让 Vestiaire 更难以溢价进入公开资本市场。Kering 的战略关系带来治理风险：如果 Kering 出售其持股（其从
              2021 年轮次持有少数股权），或将竞争性 Gucci Vault 转售计划放大到有意义的 GMV，就会削弱 Vestiaire 投资叙事的一根关键支柱。


              尽调要求按优先级组织。最重要的一项是获取 FY2022–2025 经审计
              P&L，以确认实际收入、毛利率和现金消耗；这些目前无法从公开来源验证。没有这项资料，估值分析只能建立在存在重大不确定区间的估计上。次优先事项包括按地域和品类拆分的 GMV
              与平台抽成率（理解收入质量）、鉴定失败率（评估核心运营风险），以及 Kering 合作关系的商业条款（量化战略依赖和任何利益冲突）。在提出任何投资条款清单 前，必须完整审查股权结构表，并分析期权池稀释。
