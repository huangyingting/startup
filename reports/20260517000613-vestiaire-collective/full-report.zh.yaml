companyProfile:
  summary: >-
    Vestiaire Collective 是一家总部位于巴黎的奢侈时尚转售市场，连接经鉴定的二手奢侈品卖家与买家。公司由 Fanny Moizant、Sophie Hersan 和 Sébastien Fabre 于 2009
    年创立，社区成员已超过 5 million，覆盖 80+ 个国家，累计融资约 $600M，其中包括 2021 年以约 $1.7B 估值完成的 $216M Series F。平台用多步骤鉴定模型拉开差距：AI
    预筛叠加巴黎、纽约和香港鉴定中心的专家实物复核，使其区别于未验证的点对点市场。Kering（Gucci、Saint Laurent 和 Balenciaga 的母公司）是战略投资方，为其在奢侈品生态里带来独特的品牌协同。
