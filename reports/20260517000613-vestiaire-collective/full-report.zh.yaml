      - number: '6.2'
        title: 用户采用轨迹与增长
        blocks:
          - type: paragraph
            body: >
              Vestiaire Collective 于 2009 年上线，最初大约有 3,000 件商品，来自创始人的个人网络。早期增长集中在法国；2012 年前后英国上线后，公司才真正开始国际扩张。到 2014
              年，平台进入美国市场；到 2017 年，又扩展到香港、新加坡和澳大利亚。


              平台经历了两次主要加速。第一次是 2019 年 Series E 融资，公司获得资金投向营销和鉴定基础设施。第二次、也更剧烈的一次，是 2020–2021 年 COVID-19
              疫情，线上购物迁移、消费者对可持续时尚兴趣上升，以及强劲的“封锁期奢侈品”转售需求共同推动增长。Vestiaire Collective 报告称，2021 年新客户增长 70%（Glossy.co，2022 年
              3 月，引述 SimilarWeb 数据）。


              2022 年 3 月收购美国转售平台 Tradesy（约 400 万会员）后，Vestiaire 合并受众达到全球约 2,300 万会员（Glossy.co），但这个数字混合了两个平台的数据库，不能直接与
              Vestiaire 单独的自然会员数相比。截至 Stratégies 2026 年对 VP Service Client 的采访，公司确认线上商品 500 万件，业务覆盖 70+
              个国家。Wikipedia（最后更新于 2026 年）称平台有 500 万件精选商品，每日约 30,000 件新商品上架（每周约 210,000 件）。


              2021 年 Series F（$216M，估值 $1.7B）为国际扩张和鉴定基础设施投入提供资金。PrivCo 估计 Vestiaire 2023 年收入为 $250M，2024 年为
              $380M，显示在更广泛奢侈品市场承压时，公司 GMV 仍保持强劲增长。2022 年实施的快时尚禁售——移除 H&M、Zara
              等品牌——是一次有意为之的客户质量优先于数量取舍，强化了奢侈定位，但也收窄了可触达卖家基础。


              英国市场消费者情绪强劲：TheIndustry.fashion 2022 年 1 月报道称，三分之一英国消费者在 2021 年节日季购买过或计划购买二手商品，六分之一英国人的衣橱中至少 50% 是二手单品，体现了
              Vestiaire 核心价值主张的结构性顺风。
