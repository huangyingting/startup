  - number: 3
    title: 竞争格局
    sections:
      - number: '3.1'
        title: 竞争格局概览
        blocks:
          - type: paragraph
            body: >-
              全球奢侈时尚转售市场至少有三层竞争者。第一层是经鉴定奢侈品转售，由 Vestiaire Collective 和 The RealReal 主导，两家公司都运营端到端鉴定、专业摄影和精选上架。The
              RealReal（NASDAQ: REAL）是市场基准：2011 年创立，2025 年收入约 $692.85M，2024 年 GMV 约 $1.8B，注册会员约 38 million。The RealReal 在
              2024 年末实现全年盈利。Fashionphile 和 Rebag 位于这一层内的细分生态，专注超奢侈手袋和配饰，使用自有买断和寄售模型；Fashionphile 报告 2024 年利润增长 67%。

              第二层是大众点对点和社交电商。Poshmark（2023 年 1 月起为 Naver 子公司；80M+ 用户、130M+ 社区成员）和 Depop（2026 年初 Etsy 将其出售给
              eBay）面向更年轻、价格敏感的买家，鉴定有限，平均订单金额更低。ThredUp（NASDAQ: TDUP，2025 年收入 $310.81M）在更低端市场竞争，采用高抽佣率寄售模型，服务大众二手服装。

              第三层是以球鞋优先、并向奢侈品扩张的街头服饰平台：GOAT Group（私营，2021 年 Series F 后估值 $3.7B）和 StockX（私营，2021 年估值
              $3.8B）都鉴定实物商品，但主要集中在鞋履、街头服饰和电子产品，同时增加奢侈品 SKU。Vestiaire 的奢侈品限定选品和欧洲身份，让它与三层竞争者都保持了有意义的区隔；不过，GOAT
              扩充奢侈手袋和服饰选择、品牌尝试自营转售后，这些边界正在变得模糊。
