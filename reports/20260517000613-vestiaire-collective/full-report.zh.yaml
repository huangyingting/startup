      - number: '5.4'
        title: 产品路线图与信任框架
        blocks:
          - type: paragraph
            body: >-
              新任 CEO Bernard Osta（2025 年 10 月任命，此前任 Vestiaire CFO，再往前是投资银行家）在首次公开表态中明确表示，用 AI 加速产品路线图是他的首要任务。他说：“随着 AI
              兴起，我们拥有非凡机会，可以加快产品路线图、交付最有吸引力的客户体验并赢得市场份额。”近期产品重点包括推出 AI 图片搜索（2024 年 10 月宣布，允许买家上传照片寻找匹配商品）、继续打磨 AI
              价格推荐、基于购买和浏览历史做更深度个性化，以及扩展转售即服务（Resale-as-a-Service） 项目。Osta 还把让转售“更无缝、更即时、更低摩擦”列为关键主题——参照 Ganni RaaS
              落地方式，后者引入上门取件和即时店内积分。

              信任框架以 Vestiaire 的 B Corp 认证为锚（2021 年获得），该认证独立核验公司全业务的社会和环境绩效标准。在反假货合规方面，Vestiaire 是 French
              Anti-Counterfeiting Charter（2012）的签署方，也是 European Commission 针对线上假货的 Memorandum of Understanding（2024 年 4
              月签署）的签署方。平台是 King Charles III 召集的 Sustainable Market Initiative（SMI）Fashion Task Force
              成员，参与试点，为奢侈品建立基于区块链的 Digital ID，以便在完整生命周期中追踪来源。Vestiaire 与 Chloé 合作，完成了首个使用数字商品识别技术的转售体验，并与 World Economic
              Forum 就数字认证的数据交换框架展开合作。管理层将 EU Digital Product Passport（DPP）倡议视为“促进循环经济、通过转售提升奢侈品价值的强大助推器”。支付和数据方面，作为一家承担
              EU 用户数据处理义务的法国公司，平台符合 GDPR；多币种支付基础设施也隐含 PCI-DSS 合规。Digital Services Act（DSA）适用于在 EU 运营的平台
              Vestiaire；目前没有公开报道显示其遭遇具体 DSA 执法行动。平台安全承诺包括 2022–2023 年分阶段禁售 63 个快时尚品牌（包括
              Zara、H&M、Shein、Temu、Uniqlo、Mango），明确把平台价值观与循环经济使命对齐，并将供给限制在奢侈品级别和可持续卖家。
