      - number: '7.4'
        title: 图表资料
        blocks:
          - type: callout
            title: Kering 利益冲突结构上仍未解决
            body: >
              Kering 在 2021 年 3 月共同领投 €178M Series F，并持有 Vestiaire Collective 有意义的股权，同时拥有 Gucci-Vault
              和其他品牌运营的转售项目。这造成结构性利益冲突：Vestiaire 最显眼的奢侈品投资者，也是品牌转售领域的直接竞争者。Kering 2023–2025 年的自身财务压力（收入从 2023 年 €19.6B 降至
              2025 年 €14.67B）可能促使其优先扶持品牌自有转售渠道。没有公开披露任何治理补救措施，例如竞业禁止约定或信息隔离墙。
