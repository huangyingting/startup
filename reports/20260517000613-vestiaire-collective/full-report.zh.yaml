      - number: '4.4'
        title: 财务证据缺口与尽调判断
        blocks:
          - type: paragraph
            body: >
              Vestiaire Collective 的财务画像几乎完全不透明。最关键缺口包括：（1）没有公开卖家佣金率，外部无法独立建立 GMV 到收入模型；（2）任何年份都没有经审计财务数据，使 PrivCo
              的收入和利润率估计无法验证；（3）没有现金余额或烧钱速度披露，现金跑道无法评估；（4）没有 EBITDA 进展数据，无法评估公司声称的盈利路径。


              从尽调判断看：收入模型结构上成立——带鉴定护城河的寄售市场已在规模化场景中被验证（The RealReal、Vinted）。全球二手服装市场预计到 2030 年达到
              $393B，提供可触达顺风。不过，Vestiaire Collective 的奢侈品定位、实物鉴定基础设施和多地区足迹，带来高于大众市场可比公司的单位成本；其估计毛利率（约 50%）在改善前落后同行 25–30
              个百分点。


              收入质量中等：寄售佣金是交易性收入，与成交量相关，没有订阅或合同基础。鉴定费收入取决于买家选择和附着率，带来收入波动。快时尚禁令虽然有利于品牌定位，但永久缩小可触达
              GMV，是用规模换质量的主动取舍。消费者评论中的鉴定失败投诉说明存在质量缺口；如果这种问题具有系统性，可能同时压缩利润率（通过退款）和转化率（通过削弱买家信任）。没有直接管理层沟通，就无法评估资本充足性。
