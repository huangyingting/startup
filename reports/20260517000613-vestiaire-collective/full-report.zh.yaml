    title: 公司概况
    sections:
      - number: '1.1'
        title: 公司身份与创立故事
        blocks:
          - type: paragraph
            body: >-
              Vestiaire Collective 于 2009 年在法国巴黎创立，六位联合创始人为 Fanny Moizant、Sophie Hersan、Sébastien Fabre、Alexander
              Cognard、Henrique Fernandes 和 Christophe
              Cohen。公司抓住的洞察是：经鉴定奢侈品二级市场规模可观且供给不足，消费者信任和扎实质检才是核心价值，而大众转售平台没有交付这一点。Moizant 和 Hersan
              都有奢侈时尚背景，她们设想的是一个精选的点对点平台，靠严格商品鉴定和编辑化选品，区别于通用型线上市场。


              平台最初聚焦法国，之后逐步扩展到欧洲及更广市场。它从早期就把自己定位为可信的社区市场，服务二手奢侈服饰、手袋、鞋履、珠宝和腕表，因此与 eBay 等通用转售网站拉开差异。公司总部位于巴黎第 9 区 53 rue
              de Châteaudun，并在伦敦、纽约、香港和首尔设有办公室。截至 2024 年，平台服务 80
              多个国家的买家和卖家，并通过巴黎、纽约和香港的专门鉴定中心，在交付买家之前确保商品品质和真伪。Wikipedia 数据显示，公司截至 2024 年约有 600
              名员工。奢侈品转售可以被制度化、鉴定并规模化建立信任——这一创始逻辑支撑了公司十余年的增长，从法国创业公司走到全球独角兽。
