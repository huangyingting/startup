  - id: FV004
    title: 投资评分卡：Vestiaire Collective（2026 年 5 月）
    type: kpi
    summary: 六个维度的汇总评分卡，用于推导 6.5/10 的整体投资分数和观察建议。
    data:
      items:
        - label: 整体评分
          value: 6.5 / 10
          unit: score
          detail: 品牌强、市场地位靠前，但单位经济承压、估值陈旧且偏高，且未披露盈利路径，抵消了优势
          trend: flat
        - label: 市场机会
          value: 8 / 10
          unit: score
          detail: 奢侈品转售是结构性增长市场；REAL FY2025 GMV $2.13B，增长 16%；Vinted GMV €10.8B，增长 47%；总市场 $40–50B+
          trend: up
        - label: 竞争地位
          value: 7 / 10
          unit: score
          detail: 欧洲奢侈品转售领导者；Kering 战略协同；4 个鉴定枢纽；15+ 个品牌 RaaS 合作；覆盖 70+ 个国家
          trend: flat
        - label: 财务健康
          value: 4 / 10
          unit: score
          detail: 大概率仍在亏损（无公开披露）；2024 年众筹 €3.5M 表明在 $1.7B 估值下 VC 兴趣有限；REAL 类比公司曾深度亏损 4+ 年
          trend: unknown
        - label: 技术与产品
          value: 7 / 10
          unit: score
          detail: ML 辅助鉴定较强；移动优先（iOS / Android）；与 13+ 个奢侈品牌做 RaaS 集成；提供直发和寄售选项
          trend: up
        - label: 估值吸引力
          value: 4 / 10
          unit: score
          detail: 上一轮估值 $1.7B，对比上市可比按收入 1.5–1.65× 交易；若没有盈利能力，隐含 4–6× 倍数缺乏支撑；下行轮风险真实存在
          trend: down
    claimRefs:
      - CV001
      - CV002
      - CV003
      - CV019
