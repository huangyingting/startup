      - number: '6.4'
        title: 客户集中度与扩张风险
        blocks:
          - type: paragraph
            body: >
              Vestiaire Collective 的客户基础存在几项结构性集中和扩张风险，值得尽调关注。地域集中仍是最实质的风险：平台在法国和英国的历史优势意味着，欧洲监管变化——包括 EU Digital
              Services Act、GDPR 以及拟议中的转售税收框架——可能对核心客户群造成不成比例影响。法国市场虽是 Vestiaire 最成熟的市场，但也是 Vinted 等本土平台竞争最强的地方。


              品类集中是第二项风险。手袋——尤其是 Chanel、Hermès 和 Louis Vuitton——按价值看可能贡献 GMV 最大份额。如果这些品牌积极限制二级市场交易（Chanel
              已通过零售价控制和购买限制这样做），热门商品供给会收紧，买家体验会恶化。平台远离快时尚的转向（2022 年禁售）是有意降低大宗同质供给风险，但也让收入更集中在高端细分市场。


              高频用户集中是第三个维度：专业卖家估计约占活跃卖家的
              10%，但很可能贡献了不成比例的总上架量和交易量。专业卖家经济性受到冲击（例如佣金上调、平台政策变化，或品牌直营转售项目竞争）可能实质性降低库存质量和数量。Vestiaire 与 Alexander
              McQueen、Mulberry 的 Resale-as-a-Service（RaaS）试点显示公司在努力分散供给，但品牌自营转售项目长期看可能构成去中介威胁。


              美国扩张风险仍然偏高。Tradesy 整合把两个卖家社区、费率结构和客户预期不同的平台合并在一起。美国奢侈品转售买家已有 The RealReal
              充分服务；后者品牌认知更深，一些卖家也更偏好其寄售模式。Vestiaire 2020–2022 年美国销售额每年增长 75%，但基数较小；现在要维持增长，就必须正面竞争一家扎根本地、复购买家指标更强的领导者。


              最后，平台依赖消费者可选支出，因此容易受到奢侈品市场下行冲击。宏观压力下，升级型买家——数量最大的细分人群——最可能降低购买频次；与此同时，卖家可能把供给大量涌入平台，造成价格压力和利润率压缩。
