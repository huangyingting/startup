  - id: TR001
    title: 监管 / 法律风险清单
    columns:
      - 法规
      - 司法辖区
      - 风险类型
      - 当前状态（2026）
      - 潜在影响
      - 缓释措施
    rows:
      - - 《数字服务法》（DSA）– Regulation EU 2022/2065
        - 欧洲联盟
        - 合规 / 执法
        - 2024 年 2 月起生效；2025 年 12 月开出首个重大执法罚单（对 X 罚款 €120M）。Vestiaire 作为在线市场受约束。
        - 罚款最高可达全球年营业额 6%；被迫调整运营；强制开展卖家核验审计
        - 签署欧盟反假冒 MoU（2024 年 4 月）；鉴定流程可作为有记录的 DSA 尽调措施
      - - 《通用数据保护条例》（GDPR）– Regulation EU 2016/679
        - 欧洲联盟 / EEA
        - 数据保护 / 隐私
        - 已生效；Vestiaire 处理 5M+ 会员记录，并向美国、英国、香港、新加坡、菲律宾、马达加斯加、 澳大利亚、以色列跨境传输数据。CNIL 是牵头监管机构。
        - 罚款最高可达全球年收入 4%；面临集体诉讼；在高端市场声誉受毁灭性打击
        - 按已发布隐私政策执行 GDPR 合规计划；为数据主体提供权利门户；国际传输采用标准合同条款
      - - 《欧盟 AI 法案》– Regulation EU 2024/1689
        - 欧洲联盟
        - 技术 / AI 合规
        - 2024 年 8 月起生效；分阶段实施至 2027 年。AI 辅助鉴定流水线可能被纳入监管范围，因为它支撑面向消费者的高价值交易。
        - 罚款最高可达 €35M 或全球年营业额 7%；强制合格评定；ML 模型可能受到运营限制
        - 分类风险仍未解决；高风险条款有 36 个月实施窗口，留出评估时间
      - - 欧盟消费者权利指令与远程销售法规
        - 欧盟 / 英国
        - 消费者保护 / 责任
        - 已生效；Vestiaire 承认鉴定“并非零错误”，并承诺对非真品全额退款。系统性失败可能招致监管审查。
        - 集体诉讼责任；监管罚款；假货流向买家后需强制赔偿
        - 已发布全额退款政策；买方条款清楚披露鉴定限制
      - - 反洗钱（AML）/ 了解你的客户（KYC）– AMLD5/AMLD6
        - 欧盟 / 英国
        - 金融犯罪合规
        - 欧盟第 6 版反洗钱指令已生效；FATF 将高价值奢侈品标记为 AML 风险载体。Vestiaire 的高交易金额（€5K–€50K+） 带来 KYC 风险敞口。
        - 监管调查；平台限制；国家金融情报机构（FIU）罚款
        - 支付处理方承担 AML 义务（Klarna、PayPal、Adyen）；上架阶段核验卖家身份
      - - 法国反假冒宪章与欧盟知识产权执行条例
        - 法国 / 欧洲联盟
        - 知识产权 / 假冒
        - Vestiaire 是法国反假冒宪章（2012）和欧盟 MoU（2024 年 4 月）签署方。任何系统性鉴定失败， 都可能使这些承诺失效，并让 Vestiaire 面临品牌方发起的知识产权执法行动。
        - 品牌方禁令；移除上架品类；声誉制裁
        - 对 €1,000+ 商品做实物鉴定；750 小时鉴定培训项目；参与欧盟 MoU
    notes: |
      风险评估截至 2026 年 5 月。监管环境仍在快速演变——欧盟 AI 法案分阶段实施至 2027 年，DSA 执法也在加码。 这不是法律意见。Vestiaire 实际合规计划细节未公开披露；评估基于已发布的法规文本和行业分析。
