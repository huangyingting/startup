      - number: '1.4'
        title: 领导层、治理与组织挑战
        blocks:
          - type: paragraph
            body: >-
              创立以来，Vestiaire Collective 经历了多次重要领导层变动。六位原始联合创始人之一 Sébastien Fabre 从 2009 年公司创立起担任 CEO，直到 2022 年离任；在 13
              年里，他带领平台走过早期增长阶段和多轮融资。2022 年，Maximilien Dodin 被任命为新 CEO，为公司独角兽之后的增长阶段引入外部新领导。联合创始人 Fanny Moizant
              继续担任总裁，联合创始人 Sophie Hersan 仍以时尚总监身份活跃，为创始愿景和编辑化身份提供延续性。


              根据 Wikipedia 最近一次更新（2024 年 9 月），Bernard Osta 被列为现任 CEO，2024 年员工数约为 600 人。这意味着 Dodin
              任期之后，公司又经历了一次领导层交接，时间很可能在 2023 或 2024 年。创始人交棒后不到两年内第二次更换
              CEO，说明公司从创始人主导的创业公司，走向按专业管理运作、估值超过十亿美元的规模化公司时，治理仍在持续演进。


              2023 年，Vestiaire Collective 进行了显著裁员；当时欧洲科技行业普遍推进成本合理化，公司也在这股浪潮中削减人手。这符合晚期科技公司的普遍轨迹：2020–2022
              年激进扩招，之后在利率上升、全球晚期私营公司估值压缩的压力下，被迫降低运营烧钱速度。裁员引发负面媒体报道，也暴露出员工对公司方向的担忧。消费者评价平台同样呈现体验分化，关于鉴定延迟、物流问题和纠纷处理流程的投诉反复出现，构成需要持续运营投入的声誉风险。
