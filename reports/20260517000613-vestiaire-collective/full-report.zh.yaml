              - CR024
              - CR025
          - type: callout
            title: EU 监管叠加带来复合合规负担
            body: >
              Vestiaire 同时承担 GDPR（最高全球收入 4%）、DSA（最高全球收入 6%）、EU AI Act（最高全球营业额 7% 或
              €35M）以及消费者保护法下的合规义务。每套框架都可独立执法，合规成本会层层叠加。2025 年 12 月 X 遭 €120M DSA 罚款，证明 Commission
              愿意出手。对一家未披露盈利能力的私营公司来说，累计监管不合规敞口可能实质性超过任一单年收入。
            calloutType: risk
            claimRefs:
              - CR001
              - CR002
              - CR003
          - type: callout
            title: The RealReal 盈利拐点抬高竞争门槛
            body: >
              The RealReal 2025 全年在 $2.13B GMV 上实现调整后 EBITDA 为正，达到 $42M——这是主要奢侈品转售平台首次达到运营可持续。这显著抬高竞争门槛：Vestiaire
              现在必须匹配一家已盈利、已规模化的美国竞争对手，才能继续吸引增长资本。Vestiaire 未公开披露可比 GMV 或盈利指标，因此无法验证差距是在收窄还是扩大。
