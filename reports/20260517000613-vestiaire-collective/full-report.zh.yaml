      - number: '7.2'
        title: 运营与技术风险
        blocks:
          - type: paragraph
            body: >
              鉴定失败是 Vestiaire Collective 的核心运营风险。公司运营四个实体鉴定枢纽——Tourcoing（France）、Crawley（UK）、Hong Kong 和 Brooklyn（North
              America）——并在自家网站公开承认其鉴定措施“并非没有错误，偶尔可能出现失误”。2022 年 1 月开设的英国中心每天最多可鉴定 1,000 件商品。平台每周上架超过 100,000
              件新商品，实体鉴定门槛为 €1,000+（低价值商品可选择支付 €15 鉴定费）；因此，相当一部分交易量完全绕过实体核验。即使错误率低于
              1%，按规模计算也意味着每周可能有数百起鉴定失败触达买家。每一次失败都会带来退款责任、潜在消费者保护执法、负面媒体报道和买家流失。

              鉴定中心集中带来另一项运营连续性风险。四个中心都由 Vestiaire 运营和配置人员，任何中断——火灾、自然灾害、疫情式封锁、罢工或物流中断——都可能让整个地区的处理停摆。公司因 Brexit
              开设英国中心（2022 年 1 月）时明确承认，74% 的英国时尚企业因 Brexit 相关成本上升遭遇挫折，说明跨境流动存在物流脆弱性。Vestiaire 法律信息页面确认，平台由 Amazon Web
              Services France EMEA 托管，这带来对单一超大规模云厂商的云集中风险。

              技术风险还包括高峰期（巴黎、米兰、伦敦、纽约时装周）平台可用性，届时买家流量会激增。卖家欺诈是不断升级的威胁：复杂假货团伙持续探测鉴定系统，机器学习鉴定模型必须不断更新，才能对抗演化中的仿造技术。反洗钱（AML）风险也存在：平台上的高交易金额（商品经常超过
              €5,000–€50,000）会吸引监管关注，因为 FATF 指引将奢侈品列为金融犯罪载体。Vestiaire 未公开披露任何 AML/KYC 合规项目，形成潜在监管盲点。
