      - number: '1.3'
        title: 融资历史与投资人生态
        blocks:
          - type: paragraph
            body: >-
              自 2009 年创立以来，Vestiaire Collective 通过多轮股权融资累计募集约 $600 million 或更多资金。公司最重要的一轮融资发生在 2021 年 3 月，Series F 融资
              $216 million，投后估值约 $1.7 billion，并正式跻身独角兽。Series F 由知名技术型对冲基金和成长股权投资机构 Tiger Global Management 领投，Kering
              战略参投；Kering 是法国奢侈品集团，旗下拥有 Gucci、Saint Laurent、Bottega Veneta 和 Balenciaga 等品牌。技术型成长投资者与大型奢侈品集团同时入局，凸显
              Vestiaire Collective 位于时尚与技术交汇处的定位，也验证了奢侈品转售市场的财务机会和战略价值。


              Kering 的参与早于 Series F。该奢侈品集团最早在 Vestiaire Collective 2019 年 Series E 轮投资，释放出奢侈品行业逐渐接受转售作为互补渠道的信号。其他关键投资方包括
              Balderton Capital（早期欧洲风投支持者，参与过更早轮次）、Eurazeo（支持欧洲扩张的法国私募股权公司）和 Condé
              Nast（全球媒体集团，以战略投资方身份带来编辑触达和时尚受众营销协同）。这些支持者共同反映了两层含义：资本看好奢侈品转售市场的长期增长，奢侈品和媒体既有玩家也在做战略卡位。


              投资人结构也带来微妙张力：Kering 的持股虽然提供背书和潜在商业协同，却也引出合理的利益冲突问题——Kering 一边制造并销售全新奢侈品，一边持有一个转售平台股权，而该平台会与这些新货争夺同一批消费者预算。
