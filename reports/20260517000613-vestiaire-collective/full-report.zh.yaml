      - number: '5.5'
        title: 图表资料
        blocks:
          - type: callout
            title: 鉴定技术构成可防守护城河
            body: >-
              Vestiaire 的 AI + 专家混合鉴定系统很难在同等质量下复制。机器学习模型用 10 年以上奢侈品交易数据训练——这是随每一次鉴定决策继续增长的自有语料。Vestiaire Collective
              Anti-Counterfeiting Academy（每名鉴定师 750 小时初始培训）沉淀品牌专项取证能力，无法快速买来。分布在全球四座城市的实体中心意味着大量资本和运营投入。几者叠加成复利式护城河：更多数据
              → 更好的 AI → 更快的专家吞吐 → 更高交易量 → 更多数据。
            calloutType: insight
            claimRefs:
              - CE012
              - CE013
              - CE014
              - CE015
          - type: callout
            title: 鉴定准确率缺口与声誉敞口
            body: >-
              0.1% 残余鉴定错误率有保险覆盖，但未经过独立第三方正式审计；在依赖信任的奢侈品市场，这是实质性声誉风险。The Times 2025 年 9
              月文章记录了“超级仿品”复杂度升级，直接挑战鉴定基础设施。任何高曝光失败（一只假 Birkin 到达买家手中）都可能引发媒体报道；相对于事件统计频率，品牌信任受到的伤害会被放大。The RealReal 2018
              年因鉴定失败遭 Chanel 起诉的经历说明，奢侈品转售品类里这不是假设风险。
            calloutType: insight
            claimRefs:
              - CE013
              - CE015
          - type: callout
            title: 技术领导连续性风险
            body: >-
              2025 年 10 月，Bernard Osta（金融背景、前 CFO）而非技术高管出任 CEO；在公司明确承诺以 AI 加速增长的节点，这带来产品愿景连续性风险。CTPO Stacia Carr 是前任 CEO
              于 2024 年招募的；她在 Osta 领导下的任期稳定性和战略一致性尚无公开确认。一个小型领导团队要负责复杂的自研 ML 鉴定系统，关键人依赖是尽调事项。
            calloutType: insight
            claimRefs:
