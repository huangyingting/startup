            - 联合创始人（Moizant / Hersan）离职
            - CEO（Osta）提前离职
            - Kering 冲突实质限制 Vestiaire 战略
        - label: 轻微影响
          values:
            - 单个卖家 / 买家纠纷通过退款解决
            - 某一区域物流延迟
            - 无系统性鉴定失效的负面报道
    claimRefs:
      - CR001
      - CR013
      - CR024
      - CR027
  - id: FR002
    title: 风险传导图
    type: dag
    summary: |
      有向无环图展示 Vestiaire Collective 单次鉴定失效如何级联成运营、法律、声誉、竞争和财务后果。该级联解释了为什么鉴定质量是商业模式的生死线运营风险。
    data:
      nodes:
        - id: r1
          label: 鉴定失效
          detail: 假货通过数字预筛和实物专家复核；商品发给买家
        - id: r2
          label: 买家发现假货
          detail: 买家收到非正品；向 Vestiaire 客服报告或在社交媒体公开
        - id: r3
          label: 退款 + 调查成本
          detail: Vestiaire 根据买家条款全额退款；内部复盘鉴定流程；产生法律成本
        - id: r4
          label: 媒体与社交危机
          detail: 事件病毒式传播；媒体报道鉴定失误；KOL 反弹；品牌受损
        - id: r5
          label: 监管审查（DSA / 消费者保护）
          detail: 触发 DSA 平台问责条款；DGCCRF 或欧盟消费者保护机构调查
        - id: r6
          label: 买家信任侵蚀
          detail: 平台买家减少活动，或转向 The RealReal 等竞品
        - id: r7
          label: 卖家供给减少
          detail: 卖家认为平台风险上升或声誉受损；上架量下降
        - id: r8
          label: GMV 与收入下滑
          detail: 买家需求和卖家供给减少，压缩商品交易总额（GMV）和抽佣收入
        - id: r9
          label: 投资者信心与估值影响
          detail: GMV 可见度下降；监管罚款风险；再融资或退出路径复杂化
      edges:
        - from: r1
          to: r2
          label: 触发
        - from: r2
          to: r3
          label: 需要
        - from: r2
          to: r4
          label: 可能升级为
        - from: r4
          to: r5
          label: 可能触发
        - from: r4
          to: r6
          label: 导致
        - from: r5
          to: r9
          label: 促成
        - from: r6
          to: r7
          label: 导致
        - from: r6
          to: r8
          label: 降低
        - from: r7
          to: r8
          label: 降低
        - from: r3
          to: r9
          label: 促成
        - from: r8
          to: r9
          label: 推动
    claimRefs:
      - CR013
      - CR014
      - CR015
      - CR016
      - CR017
  - id: FR003
    title: 依赖关系图
    type: dag
    summary: |
      有向无环图梳理每项欧盟监管框架如何给 Vestiaire Collective 带来合规成本和执法暴露，以及这些义务如何汇聚为运营限制和财务处罚。
    data:
      nodes:
        - id: reg1
          label: GDPR（EU 2016/679 号法规）
          detail: 保护 5M+ 会员记录；违规责任最高达全球年收入 4%；CNIL 为牵头监管机构
        - id: reg2
          label: Digital Services Act（EU 2022/2065 号法规）
          detail: 在线市场平台问责；卖家验证；假货上架风险；2024 年 2 月生效；罚款最高达全球年营业额 6%
        - id: reg3
          label: EU AI Act（EU 2024/1689 号法规）
          detail: AI 辅助鉴定链路可能纳入监管范围；2024–2027 年分阶段实施；高风险 AI 罚款最高达 €35M 或年营业额 7%
        - id: reg4
          label: 消费者权利指令 / 远程销售
          detail: 假货交付责任；退款义务；撤回权；欧盟和英国消费者保护
        - id: reg5
          label: AML / KYC（AMLD5、AMLD6）
          detail: 高价值奢侈品交易监控；FATF 将奢侈品列为 AML 风险载体的指引；国家 FIU 报告义务
        - id: reg6
          label: 合规成本（法律、DPO、审计、技术）
          detail: 所有框架叠加的法律、DPO、技术合规和审计成本；对亏损企业的 OpEx 构成实质影响
        - id: reg7
          label: 监管罚款与执法
          detail: DSA：最高达全球收入 6%；GDPR：最高达全球收入 4%；EU AI Act：最高达全球收入 7%；累计风险超过任一单项上限
        - id: reg8
          label: 运营限制
          detail: 强制下架卖家商品；强制鉴定审计要求；数据本地化；潜在平台暂停
      edges:
        - from: reg1
          to: reg6
          label: 推高合规成本
        - from: reg2
          to: reg6
          label: 推高合规成本
        - from: reg3
          to: reg6
          label: 推高合规成本
        - from: reg5
          to: reg6
          label: 推高合规成本
        - from: reg1
          to: reg7
          label: 泄露风险 → 罚款
        - from: reg2
          to: reg7
          label: 不合规 → 罚款
        - from: reg3
          to: reg7
          label: 不合规 → 罚款
        - from: reg4
          to: reg7
          label: 假货责任
        - from: reg2
          to: reg8
          label: 执法行动
        - from: reg4
          to: reg8
          label: 强制退款操作
        - from: reg7
          to: reg8
          label: 执法后果
    claimRefs:
      - CR001
      - CR002
      - CR003
      - CR004
      - CR005
  - id: FV001
    title: 投资逻辑流程：通往观察建议
    type: flow
    summary: Vestiaire Collective 的优势和结构性风险如何叠加，最终导向「观察」而非「买入」或「放弃」建议。
    data:
      nodes:
        - id: t1
          label: 欧洲奢侈品转售品牌领先
          detail: 15+ 年；70+ 个国家；5M+ 件商品；Kering 协同；4 个全球枢纽支撑鉴定基础设施
        - id: t2
          label: Gen Z 可持续需求
          detail: 结构性顺风；85% 的 Vestiaire 用户称愿意少买但买更高质量的商品；二手 = 可持续
        - id: t3
          label: 高鉴定成本结构
          detail: 法国、英国、香港、Brooklyn 实物枢纽；每名专家 750 小时培训；REAL 类比：FY2025 收入 $693M，但净亏损 -$42M
        - id: t4
          label: 竞争加剧
          detail: The RealReal FY2025 GMV $2.13B，增长 16%；Vinted GMV €10.8B，已盈利、估值 €8B；GOAT / StockX 向奢侈品推进
        - id: t5
          label: 陈旧的 $1.7B 估值（2021）
          detail: 上市可比公司按收入 1.5–1.65× 交易（2026 年 5 月）；$1.7B 对应估计 $300–450M 收入的 4–6×；后续轮次未消化 2021 年峰值
        - id: t6
          label: 新 CEO（2025 年 10 月）
          detail: Bernard Osta（曾任 Lazard、Goldman Sachs；前 CFO）释放出聚焦资本市场准备的信号——潜在 IPO 或收购催化剂
        - id: t7
          label: 观察：等待盈利或估值重置
          detail: 重新进入触发条件：EBITDA 转正信号，或估值重置到 <$1B，或以有吸引力价格提交 IPO S-1
      edges:
        - from: t1
          to: t7
          label: 支撑
        - from: t2
          to: t7
          label: 支撑
        - from: t6
          to: t7
          label: 催化剂
        - from: t3
          to: t7
          label: 约束
        - from: t4
          to: t7
          label: 约束
        - from: t5
          to: t7
          label: 约束
    claimRefs:
      - CV001
      - CV002
      - CV003
      - CV007
  - id: FV002
    title: EV/Revenue 倍数：转售平台可比样本（2026 年 5 月）
