              ThredUp 2026 年给出的 $393B 全球二手服装市场预测，以及 BCG 通过 WWD 披露的 $360B 独立估计，都指向结构性需求增长；驱动力包括可持续意识、奢侈品价格通胀，以及 Gen Z
