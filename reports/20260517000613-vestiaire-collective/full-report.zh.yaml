  - number: 7
    title: 风险
    sections:
      - number: '7.1'
        title: 监管与法律风险
        blocks:
          - type: paragraph
            body: >
              Vestiaire Collective 处在三套强力 EU 监管框架交汇处，2025–2026 年合规负担会叠加。Digital Services Act（DSA，Regulation EU
              2022/2065）自 2024 年 2 月起适用于所有线上市场平台，将 Vestiaire 归类为线上市场平台，要求其承担卖家验证义务、透明的内容审核记录和风险评估要求。不合规罚款最高可达全球年营业额
              6%。2025 年 12 月，X（Twitter）因 DSA 被罚 €120M，这是首个重大执法信号，表明 European Commission 准备对未履行 DSA 义务的平台采取行动。对 Vestiaire
              来说，最尖锐的 DSA 敞口在假货上：如果 Commission 认定 Vestiaire 自营鉴定不足以防止非法商品上架，可能触发 DSA Article 24（市场平台卖家验证）和 Article
              26（风险缓释）下的执法。

              GDPR（Regulation EU 2016/679）带来另一项重大风险。Vestiaire 为 80+ 个国家约 500
              万会员处理个人和财务数据，并按其隐私政策披露，将数据跨境传输给美国、英国、香港、新加坡、菲律宾、马达加斯加、澳大利亚和以色列的服务提供商。一旦数据泄露影响买家购买历史和支付信息，罚款最高可达全球年收入
              4%，并在以消费者信任为基础的高端奢侈品细分市场造成严重声誉伤害。CNIL（Commission Nationale de l'Informatique et des Libertés）是 Vestiaire 的
              GDPR 牵头监管机构。

              EU AI Act（Regulation EU 2024/1689）自 2024 年 8 月生效，对 AI 系统引入按风险分级的监管，多数义务分 24 至 36 个月落地。Vestiaire
              的机器学习辅助数字鉴定流程——在实物检查或直接发货前以数字方式审核商品的系统——可能落入该法案范围。虽然法案的高风险类别目前聚焦就业、信贷和执法，但用于面向消费者、且财务结果重大的交易中的 AI
              系统，未来可能被扩展纳入。违反 AI Act 义务的罚款最高可达 €35M 或全球年营业额 7%。EU 消费者保护法还提供了另一条责任路径：如果假货交付给依赖 Vestiaire
              鉴定保证的买家，公司将面临退款义务，以及 EU 远程销售法规和 Consumer Rights Directive 下的潜在侵权索赔。
