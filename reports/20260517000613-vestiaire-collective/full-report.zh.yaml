      - number: '2.3'
        title: 消费者分层与需求驱动
        blocks:
          - type: paragraph
            body: >-
              奢侈品转售消费者不是单一群体。Vestiaire 平台至少服务五类可识别客群，他们的动机、价格敏感度和行为各不相同。价值最大的客群是追求性价比的奢侈品买家——他们希望以较一手零售低 30–70%
              的价格买到经鉴定的 Chanel、Hermès 或 Gucci。这类买家通常 25–45
              岁，收入带有向上型消费特征，对品牌高度敏感。第二类是受可持续理念驱动的购物者，在年轻人群中增长很快，核心动机是循环时尚的环境价值。Vestiaire 自身 2025 Impact Report 称，85%
              的消费者表示愿意少买但买更高质量的商品，87% 的购买避免了一次一手购买（用“替代率”量化环境价值主张）。Circular Economy Journal
              发表的一项独立学术生命周期评估发现，二手服装的气候影响比新品同类约低 42%。


              第三类重要客群是收藏者和爱好者，他们用 Vestiaire
              寻找新渠道买不到的稀有古着或限量单品。他们支付意愿高，在高价值交易中占比超出人数占比。第四类是首次进入奢侈品的向往型买家，对市场扩张尤其重要。买不起全新奢侈品的 Gen Z
              和年轻千禧一代可以通过转售进入这个品类，建立品牌亲近感，未来可能转化为一手零售购买。The RealReal 在其 10-K
              中明确提到这种“通往奢侈品的入口”动态。第五类是专业转售商和经销商，他们利用平台套利，通常上架量高，也对卖家费用高度敏感。


              宏观环境正在加速所有客群的需求。ThredUp 2026
              年报告指出，消费者正把转售嵌入个人财务生活——用转售所得资助新的奢侈品购买——技术也在降低购买全流程的摩擦。全新奢侈品价格上涨，一部分来自品牌主导的“高端化”策略，一部分来自关税和供应链成本，使转售的性价比主张越来越有吸引力。按
              ThredUp 的说法，全球二手市场正在进入一个“更具竞争性、结构更复杂的阶段”；在市场进一步整合之前，平台必须尽快在技术、供给质量和品牌信任上领先。
