      - number: '7.3'
        title: 战略、合作伙伴与人员风险
        blocks:
          - type: paragraph
            body: >
              Kering 投资是 Vestiaire Collective 结构最复杂的战略风险。Kering 在 2021 年 3 月与 Tiger Global 共同领投 €178M Series F；它既是
              Vestiaire 最重要的支持者之一，也是 Gucci、Yves Saint Laurent、Balenciaga 和 Bottega Veneta 等奢侈品牌的母公司。Kering 拥有
              Gucci-Vault，这是一个品牌运营的转售和复刻平台，直接与 Vestiaire 的 C2C 转售模式竞争。这造成结构性利益冲突：Kering 作为投资者拥有董事会影响力，同时运营竞争性转售渠道，并可能把
              Gucci 寄售引向 Gucci-Vault，从而不给 Vestiaire 提供专有供给。Kering 自身也面临收入压力（2025 年收入 €14.67B，低于 2023 年的
              €19.6B），因此可能优先扶持品牌自有转售渠道，而不是其持有少数股权的第三方平台。

              六年内第二次 CEO 交接后，人员与执行风险升高。Bernard Osta 在担任 CFO 后于 2025 年 10 月 7 日出任 CEO，接替 Maximilian Bittner（2019–2025 年
              CEO）。内部晋升降低了文化震荡风险，但 Osta 的背景是金融，而非奢侈品运营或市场平台技术。联合创始人 Fanny Moizant（总裁）和 Sophie
              Hersan（时尚总监）仍是品牌身份和社区信任的核心；任一人离开都会构成重大声誉和组织风险。公司在 2020–2021 年增长期激进扩员后，于 2022–2023
              年裁员，引发负面媒体报道，并暴露文化张力。鉴定专家留任是反复出现的运营和人才风险：公司 750 小时专项培训让离职鉴定师切换成本很高，但也让他们对 The RealReal、GOAT
              和新兴品牌自营转售项目等竞争对手更有吸引力。

              The RealReal 带来的竞争风险已实质性加剧：The RealReal 2025 年 GMV 超过 $2.13B（同比增长 16%），全年调整后 EBITDA 转正，达到
              $42M——这是奢侈品转售平台的重要里程碑。这增加了一项风险：Vestiaire
              未披露可比财务指标，可能在北美关键市场的单位经济和运营规模上被对手拉开。宏观风险补齐了战略图景：奢侈品属于可选消费，对消费者信心高度敏感；经济下行可能同时压低转售量，因为卖家减少供给（保留资产），买家也减少需求。
