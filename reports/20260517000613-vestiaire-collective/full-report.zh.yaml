      - number: '8.4'
        title: 图表资料
        blocks:
          - type: callout
            title: 观察：等待盈利信号或估值重置
            body: >
              Vestiaire Collective 是定义品类的欧洲奢侈品转售品牌，拥有真实鉴定基础设施、Kering 战略协同，以及循环时尚需求带来的结构性顺风。但其 $1.7 billion Series F
              估值（2021 年 3 月）相对 2026 年私募市场环境已经明显过时。上市奢侈品转售可比公司以 1.5–1.65× 收入倍数交易（REAL、TDUP），而 Vestiaire 4–6×
              的隐含倍数只有在公司展示清晰盈利路径时才站得住。我们建议“观察”，重新进入的触发点是：（1）确认 EBITDA 盈亏平衡，（2）新一轮融资低于 $1 billion、重置成本基础，或（3）IPO S-1
              文件锚定公开市场定价。新任 CEO 的投行背景（Lazard、Goldman Sachs）暗示 18–36 个月内可能出现流动性事件。
            calloutType: recommendation
