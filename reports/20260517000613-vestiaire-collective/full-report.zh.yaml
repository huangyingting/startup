      - number: '1.2'
        title: 商业模式与市场运营
        blocks:
          - type: paragraph
            body: >-
              Vestiaire Collective 运营一个混合 C2C（消费者对消费者）和 B2C（企业对消费者）的二手奢侈时尚市场平台。主要收入机制是对已完成交易抽佣：卖家支付约为成交价 12–15%
              的佣金，买家另付约 5% 的买家保护费。此外，公司还收取鉴定服务费；对高于某一价格门槛的商品，鉴定是强制项，也是平台品质保障主张的核心。


              鉴定是平台最核心的价值主张，也是运营差异化所在。超过门槛价值的实物商品会寄往 Vestiaire Collective
              位于巴黎、纽约或香港的鉴定中心，由专家鉴定品牌、材质、成色和真伪，再转寄给买家。对低价值或高信任商品，直发选项允许点对点发货，并用基于照片的数字验证把关。公司还提供转售即服务（RaaS），让品牌伙伴把转售基础设施接入自有零售渠道，并为高价值商品提供寄售服务。


              平台覆盖奢侈手袋、鞋履、服饰、珠宝和腕表等品类，尤其擅长法国和意大利奢侈品牌。约 5 million 社区成员横跨 80+ 个国家，每周在平台新增超过 100,000 件商品。这使 Vestiaire
              Collective 成为快速扩张的循环电商赛道中领先的全球平台之一。
