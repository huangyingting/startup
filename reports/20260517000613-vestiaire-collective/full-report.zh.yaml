      - number: '3.2'
        title: 功能与能力对比
        blocks:
          - type: paragraph
            body: >-
              鉴定质量是奢侈品转售中最关键的差异化功能。Vestiaire Collective 结合算法预筛和专门鉴定中心的实物检查，鉴定中心位于巴黎、伦敦、纽约和香港，并配备内部宝石学家、制表师和时尚专家。The
              RealReal 运营 17 个奢侈品寄售办公室（其中 14 个带零售），由内部专家进行实物鉴定；它曾遭遇公开鉴定失败，包括 2018 年 Chanel 诉讼和 Forbes
              记录的多起假货事件。Fashionphile 的 Clair Report AI 定价和 Fashionphile Certified 服务，是 Vestiaire 之外最强的 AI 增强鉴定能力。Rebag
              用自有 CLAIR Index 对手袋进行算法定价。GOAT 和 StockX 通过履约中心的多步骤实物检查完成鉴定，但主要品类仍是球鞋和街头服饰。

              地理覆盖让 Vestiaire 与美国中心型同行明显分开。Vestiaire 在 80+ 个国家运营；The RealReal 主要聚焦美国，国际配送有限。GOAT 和 StockX
              服务全球买家，但履约基础设施仍以美国为中心。Poshmark 集中在美国和加拿大，在澳大利亚和印度仍处早期。

              费率结构差异很大（见 TP003）。Vestiaire 的 5–15% 卖家费用加 3–5% 买家保护费，使混合抽佣约为 15–20%。The RealReal 寄售模型保留 30–45%，卖家拿到
              55–70%。Poshmark 固定 20%（低于 $15 的商品收 $2.95），对低价值商品有竞争力。GOAT 收取约 9.5–15% 卖家费，加 9.5% 买家费，合计交易成本 19–25%。StockX
              收取 8–9.5% 卖家费（阶梯递减），再加 5.5–8% 买家溢价，合计 14–18%。
