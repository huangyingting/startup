  - id: FU001
    title: Vestiaire Collective 买家旅程图
    type: journey-map
    summary: Vestiaire Collective 典型买家旅程，从发现到复购；鉴定等待是建立信任（也可能击穿信任）的关键阶段。
    data:
      nodes:
        - id: j1
          label: 认知
          detail: 买家通过 Instagram、Pinterest、口碑、自然搜索或 KOL 帖子发现平台；Vestiaire 的可持续定位吸引环保意识较强的买家
        - id: j2
          label: 浏览与心愿单
          detail: 按品牌或品类搜索；用尺码、颜色、成色、价格筛选；加入心愿单；与零售价比较；平台有 5M+ 件精选商品
        - id: j3
          label: 购买决策
          detail: >-
            加入购物车；选择 Authenticated Shipping（€1,000 以上商品强制）或 Direct Shipping（≤€1,000 商品，限部分地区）；通过银行卡、PayPal、Klarna 或
            Apple Pay 支付买家费（约 5%）
        - id: j4
          label: 鉴定等待
          detail: 卖家把商品寄到区域鉴定中心（Tourcoing / Crawley / Brooklyn / HK）；鉴定团队在 4 个工作日内检查；若中心积压，延迟可能拉长到 2–4 周；这是主要摩擦点
        - id: j5
          label: 收货与核验
          detail: 鉴定后的商品连同成色确认一起发出；买家有 72 小时反馈问题；若商品与描述不符或未通过真伪要求，可全额退款
        - id: j6
          label: 评价与复购
          detail: >-
            评价卖家；给平台写评价；浏览下一次购买；许多买家也会变成卖家——上架自己衣橱里的商品来补贴购买；惊喜因素包括正品奢侈品 30–70% 折扣、稀有古着发现、平均客单约 350 欧元 vs. 新品零售价
            €1,000+；痛点包括鉴定等待（2–4 周）和 5% 买家费；复购触发来自鉴定顺利、心愿单降价提醒，以及卖家回款支撑再次购买
