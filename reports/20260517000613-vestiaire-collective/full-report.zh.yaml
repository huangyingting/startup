  - number: 5
    title: 产品与技术
    sections:
      - number: '5.1'
        title: 产品平台与功能组合
        blocks:
          - type: paragraph
            body: >-
              Vestiaire Collective 的平台由三个相互连接的入口组成——iOS 应用、Android 应用和网页市场——共同服务一个统一的全球二手奢侈时尚库存。iOS 应用（5.268.0 版本，2026 年
              5 月）在美国 App Store 有 16,000 条评论，评分 4.5 星，说明主要移动渠道的用户满意度较强。平台任一时点上架超过 5 million 件精选商品，每天在 70+ 个国家和 9+
              种支持语言中新增 30,000 多件商品。主要销售流程包括标准 C2C 上架、“立即出售”即时报价机制——Vestiaire 保证给出价格——面向交易商的专业卖家项目，以及全服务寄售 VIP 通道，由
              Vestiaire 为高端卖家管理摄影、描述、定价、仓储和配送。买家工具包括 AI
              精选个性化信息流、“相似商品”视觉组件（已证明可让匹配商品购买转化翻倍）、免息支付选项，以及与个人卖家直接议价。文本搜索贡献全部订单的 40%；其余 60% 来自浏览、推荐和直接链接，说明发现架构较为均衡，并在用
              AI 持续增强。转售即服务（RaaS）白标项目让奢侈品牌（截至 2026 年 12+ 个，包括 Ganni、Chloé、Burberry、Isabel Marant、Mytheresa、Alexander
              McQueen）把品牌化转售体验直接嵌入 Vestiaire 平台，其中 Ganni
              集成了上门取件和即时店铺积分。社区和信任功能包括卖家状态徽章系统、愿望清单、关注功能，以及与奢侈品牌伙伴联合运营的“品牌认证”来源证明项目。平台 Trustpilot 页面有 102,206 条评论，综合评分
              4.2/5，并获得“优秀”评级（2026 年 2 月快照）；这说明整体情绪偏正面，但仍有关于配送和客服响应时间的零散投诉。
