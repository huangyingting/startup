              第三方评论平台 SmartCustomer（2,807 条评论，3.9/5）显示，鉴定延迟和客服响应是被提及最多的负面体验。2026 年 4
              月的评论提到等待超过一个月、无法联系到稳定的支持人员，以及买家出价后没有义务完成购买。客户服务副总裁 2026 年 3 月向 Stratégies 承认，公司每年处理 120
