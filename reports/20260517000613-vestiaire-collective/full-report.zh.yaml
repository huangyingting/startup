  - number: 6
    title: 客户情况
    sections:
      - number: '6.1'
        title: 客户分层与人口画像
        blocks:
          - type: paragraph
            body: >
              Vestiaire Collective 的社区包括两类主要角色——买家和卖家——但许多成员会在不同时间同时承担两种角色。平台未公开披露买家 / 卖家比例，但行业估计和第三方评论网站的人口画像显示，约
              60–65% 的注册成员至少购买过一次，约 40–45% 至少上架过一件商品出售。


              买家画像以 25–55 岁女性为核心（客户服务副总裁在 2026 年接受 Stratégies magazine 采访时确认，并表示平均客单价为 350
              欧元）。主力是有消费升级诉求的中高收入消费者：他们寻找经过鉴定的 Chanel、Hermès、Gucci、Louis Vuitton、Prada 和 Bottega Veneta，相比新品零售价折扣
              30–70%。一部分高端买家——主要是 35–50 岁、已有稳定奢侈品预算的人群——集中购买高价值手袋和腕表，贡献了不成比例的 GMV。Gen Z 和年轻千禧一代（18–30
              岁）是增长很快的升级型人群，他们把二手奢侈品当作拥有品牌的入口，暂时买不起正价新品也能进入品牌；ThredUp 2026 Resale Report 证实，Gen Z 是全球二手市场参与增长最快的驱动力。


              卖家画像同样多元。休闲卖家——清理衣橱或处理奢侈礼品的个人——人数最多，但通常每年只上架少量商品。专业卖家（商业转售商、古董精品店和奢侈品套利者）上架量高，常使用 Vestiaire
              的专业卖家项目，并倾向于专注箱包、腕表和珠宝等品类。一个有意义且具战略价值的人群是“卖家型买家”：时尚爱好者卖出旧物来资助新购买，形成利于平台参与度和 GMV 的循环商业飞轮。


              地域上，Vestiaire 的本土市场法国历史上占用户最大份额，但平台一直在快速扩张。截至 2022 年，法国、英国和美国被列为三大核心市场，其中美国增长最快，2020–2021 年每年增长
              75%（Glossy.co）。2022 年收购美国 Tradesy 后，北美存在感显著增强。亚洲——尤其是韩国、香港和新加坡——正在增长，但规模仍较小。平台在 70 多个国家运营，支持九种语言，并在
              Tourcoing（EU）、Crawley（UK）、Hong Kong 和 Brooklyn（North America）设有专门鉴定中心。


              按交易量看，头部品类是手袋（GMV 占比最大）、鞋履、服装、珠宝和腕表。领先品牌包括 Chanel、Hermès、Louis Vuitton、Gucci、Prada、Dior、Bottega Veneta 和
              Balenciaga——这些都是鉴定风险高、买家重视来源的品类。
