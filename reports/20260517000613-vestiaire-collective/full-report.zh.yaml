  - id: TE004
    title: 信任、质量与合规
    columns:
      - 领域
      - 机制
      - 标准 / 认证
      - 缺口 / 风险
      - 备注
    rows:
      - - 反假货
        - 4 步核验流程（AI + 人工）；Authentication Academy；每日拒绝约 8% 商品
        - 法国《反假货宪章》（2012）；欧盟委员会线上反假货 MoU（2024 年 4 月）
        - 99.9% 准确率仍留下残余缺口；保险覆盖 0.1%；“superfake” 越来越精细
        - 自 2020 年以来拒收 $360M 商品；鉴定师训练 750h + 每年 180h
      - - 买家保护
        - 若鉴定后交付的商品是假货，全额退款保证；鉴定期间托管
        - 消费者保护法（欧盟、英国、美国按买家辖区适用）
        - 0.1% 残余风险的保险覆盖：保障上限未公开披露
        - 已鉴定并售出的最高价商品：€158,000 Hermès Birkin Faubourg
      - - 数据隐私
        - GDPR 合规的数据处理；账号注册时取得明确同意；iOS 隐私标签披露收集购买、联系方式、搜索历史、标识符
        - GDPR（欧盟 2018）；UK GDPR（脱欧后）
        - 未确认公开审计认证（如 ISO 27001）；未公开报道数据泄露历史
        - 法国公司，总部在 Paris；DPA 为 CNIL；用户数据包括交易和行为日志
      - - 平台监管
        - 面向欧盟市场运营方的 DSA 合规；卖家身份核验义务
        - 欧盟《数字服务法》（DSA，平台自 2023/2024 起适用）
        - 公开来源未确认 DSA 审计或执法记录；合规姿态可推断但未验证
        - 超大型在线平台（VLOP）身份取决于用户数门槛；正式 DSA 指定状态未公开
      - - 支付安全
        - 带托管的多货币支付网关；买卖双方资金隔离
        - 通过支付网关伙伴隐含 PCI-DSS（Stripe / Adyen 级）
        - Vestiaire 未公开确认具体 PCI-DSS 等级认证
        - 鉴定期间的托管机制是消费者信任差异点
      - - 可持续 / B Corp
        - B Corp 认证；禁售快时尚品牌（63 个品牌，2022–2023）；碳强度跟踪
        - B Corp（2021 年认证，对社会和环境标准做独立验证）
        - B Corp 再认证周期要求定期复审；首次认证为 2021 年
