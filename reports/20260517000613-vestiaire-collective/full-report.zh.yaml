      - number: '4.2'
        title: 单位经济模型与成本结构
        blocks:
          - type: paragraph
            body: >
              PrivCo 估计 Vestiaire Collective 毛利率约 50%，明显低于 The RealReal（FY2025）报告的 74.59% 和 ThredUp（FY2025）的 79.39%。考虑到
              Vestiaire 的实物鉴定基础设施，这个差距有合理性：四个鉴定中心（Tourcoing、Crawley、香港、Brooklyn）合计处理大量商品，仅 Crawley 就按每天最多 1,000
              件商品设计产能。鉴定中心里的人工密集型检查、拍照和质量控制，是主要 COGS 驱动因素。


              The RealReal 的毛利率轨迹有参考价值：随着公司规模扩大、更多交易转向寄售模型并提高拍卖费用，毛利率从 68.5%（FY2023）提升到 74.59%（FY2025）。Vestiaire
              可能也走在类似轨道上，但没有经审计数据，当前利润率水平无法验证。如果 50% 毛利率估计准确，则 $380M 收入对应约 $190M 毛利——足以支撑平台成本，但要达到 IPO 水准的 EBITDA
              利润率，还需要显著改善。


              Vestiaire 没有披露获客成本（CAC）和回本周期。The RealReal 在 FY2025 有 1.06M 活跃买家、$594 AOV，并呈现正 FCF；Vestiaire 的可比买家指标未知。收购
              Tradesy 前两年，美国销售额每年增长 75%，说明有强劲的有机增长动能，但 Tradesy 整合通过合并会员扩张稀释了单位经济模型，而不是体现有机 CAC 效率。ThredUp FY2025 毛利率为
              79.39%，在可比公司中最高，但那是鉴定负担更轻的大众市场模型。
