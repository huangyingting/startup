  - number: 2
    title: 市场分析
    sections:
      - number: '2.1'
        title: 市场定义与范围
        blocks:
          - type: paragraph
            body: >-
              奢侈时尚转售市场覆盖二手设计师和奢侈品的买卖，包括服饰、手袋和皮具、鞋履、高级珠宝与腕表；交易通过数字平台完成，平台提供鉴定、选品和信任基础设施。该细分市场属于更广义的全球二手服装市场，而后者又是全球时尚经济的一个子领域。Vestiaire
              Collective 具体处在奢侈品选品与点对点（C2C）商业的交汇处，为消费者提供精选商品，品牌原始零售价通常在 €200 到 €2,000+
              以上。平台范围覆盖消费者对消费者（C2C）和品牌对消费者（B2C）渠道，也包括面向奢侈品牌伙伴、正在增长的转售即服务（RaaS）产品。


              这个市场与 Poshmark、Depop 等大众转售平台有三点结构性差异。第一，平均订单金额明显更高，由奢侈品底层品牌资产支撑。第二，鉴定是核心信任机制，不是可选功能，因为假货风险显著：The RealReal
              的 2025 年 10-K 明确称，既有市场“碎片化、难以进入且充斥假货”。第三，选品质量决定平台定位，也决定买家是否愿意付费。Vestiaire 已经全面禁止快时尚品牌进入平台——这项政策在 2022 和
              2023 年分阶段完成——以保护品类定位，并强化市场的高端定位。这个边界定义意味着，市场更小，但防御性更强，单件商品的潜在利润率也高于大众转售。


              可触达的商品宇宙很大。全球家庭衣橱里沉淀的二手奢侈品，构成一条长尾、高价值、尚未充分变现的供给；只要平台能建立强寄售方关系，就能把它释放出来。Vestiaire 的 4 步验证管线——资料监控、数字 AI
              复核、实体中心检查和质量控制——支撑了把潜在供给转化为实际交易量所需的信任。公司平台数据也显示供给正在流动：精选商品超过 5 million 件，每天新增约 30,000 件。关键战略问题在于，Vestiaire
              能否足够高效地把这条流量变现，并走向盈利。
