  - id: FI001
    title: 收入模型桥接图
    type: flow
    summary: 买家和卖家活动如何转化为 Vestiaire Collective 的收入和毛利润。
    approximationNotes: 佣金率和 GMV 为估计值；鉴定自选转化率未知。收入流规模是基于可比上市平台数据（The RealReal FY2025 收入结构）的定性排序。
    claimRefs:
      - CI005
      - CI006
      - CI007
      - CI024
      - CI029
    data:
      nodes:
        - id: buyer-seller-activity
          label: 买家需求 + 卖家供给
          description: 买家浏览并购买，卖家按要价上架商品。合并会员数 23M+，覆盖 70+ 个国家。
        - id: gmv
          label: 商品交易总额（GMV，估计 $1.0–1.5B，2024E）
          description: 按商品成交价计算的总交易量。公司未公开披露；由收入 ÷ 估计抽佣率反推。
        - id: commission-revenue
          label: 卖家佣金收入（约为主收入流）
          description: 每笔交易抽取的佣金比例未披露。可类比 The RealReal 37.7% 的抽佣率；Vestiaire 费率未公开。
        - id: auth-fee-revenue
          label: 鉴定费收入（€15 自选，低于 €1K 的商品）
          description: 卖家选择鉴定时，每件固定收取 €15。超过 €1,000 的商品自动鉴定，不另收费。
        - id: concierge-shipping-revenue
          label: 托管代卖 + 运输收入（未披露）
          description: 全服务上架（礼宾式代卖）和物流（预付运单加价）。两项收入均未披露；相对佣金可能较小。
        - id: gross-revenue
          label: 总收入（估计 ~$380M，2024E）
          description: 所有收入流合计。PrivCo 估计，未经审计文件确认。以 The RealReal FY2024（$600M）为参照，并按 Vestiaire 较小规模调整。
        - id: authentication-costs
          label: 鉴定中心成本（4 个全球枢纽）
          description: >-
            Tourcoing、Crawley、Hong Kong 和 Brooklyn 的人工、设施和技术成本。仅 Crawley 就按 1,000 件 / 天设计。该项是 COGS 的主要驱动，也解释了毛利率为何约
            ~50%、低于可比公司。
        - id: gross-profit
          label: 毛利润（估计毛利率 ~50%，~$190M）
          description: 扣除鉴定中心 COGS 和物流成本后的毛利润。PrivCo 估计；因实物鉴定开销，较 The RealReal（74.6%）和 ThredUp（79.4%）低 24–29 个百分点。
      edges:
        - from: buyer-seller-activity
          to: gmv
          label: 按成交价形成交易
        - from: gmv
          to: commission-revenue
          label: 成交时扣除佣金 %
        - from: gmv
          to: auth-fee-revenue
          label: €15 自选鉴定费（商品 <€1K）
        - from: gmv
          to: concierge-shipping-revenue
          label: 可选服务
        - from: commission-revenue
          to: gross-revenue
          label: 计入收入
        - from: auth-fee-revenue
          to: gross-revenue
          label: 计入收入
        - from: concierge-shipping-revenue
          to: gross-revenue
          label: 计入收入
        - from: gross-revenue
          to: authentication-costs
          label: 扣除 COGS
        - from: authentication-costs
          to: gross-profit
          label: 扣除 COGS 后净额
