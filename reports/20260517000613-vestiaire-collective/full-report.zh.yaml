  - id: TE002
    title: 鉴定工作流
    columns:
      - 步骤
      - 执行方
      - 方法
      - 典型耗时
      - 输出
      - 失败风险
    rows:
      - - 1. 卖家注册与监控
        - AI 系统 + 信任与安全团队
        - 账号创建时，ML 模型筛查账号行为、设备指纹、身份信号
        - 实时（秒级）
        - 账号获批或被拦截；2024 年约 10% 在上架前被拦截
        - 老练欺诈者可能通过初筛；仍需持续监控
      - - 2. 商品创建与数字核验
        - 卖家 + AI + 人工策展团队
        - 卖家上传照片；AI 图像识别扫描品牌标识；策展人员人工复核
        - 每件商品数分钟到数小时
        - 商品获批、被拒，或被标记进入实物鉴定
        - AI 可能漏掉照片中的高仿；依赖照片质量和卖家配合
      - - 3. 买家购买（托管启动）
        - 买家 + 支付系统
        - 买家完成购买；款项托管至鉴定结果出炉
        - 即时（购买时）
        - 资金锁定；鉴定触发通知发给卖家；预付运单生成
        - 买家可能不继续鉴定发货；托管管理增加运营复杂度
      - - 4. 商品发往鉴定中心
        - 卖家 + 物流承运商
        - 卖家用带追踪的预付运单，将商品寄往指定中心（Tourcoing、Crawley、Brooklyn 或 Hong Kong）
        - 运输 1–7 天，取决于地区
        - 中心收货；监管链记录
        - 运输途中损坏；卖家不遵守发货说明
      - - 5. 专家实物鉴定
        - Vestiaire 鉴定师（750h 训练的专家）
        - 法证级检查：显微镜、牙镜、嗅觉测试、声学测试、尺寸测量、缝线分析、五金件、包装
        - 每件商品数分钟到数小时（高价值商品耗时更长）
        - 商品通过鉴定，或被拒（假货 / 与描述不符）
        - 每日约 8% 拒绝率；超稀有商品或新型造假方法会出现边缘案例
      - - 6. 质控检查
        - Vestiaire 质控专家
        - 成色评估对照卖家描述；为买家记录拍照
        - 每件商品数分钟
        - 商品成色被确认或下调；必要时修改商品信息
        - 成色分级带主观性；“good”与“very good”分类偶有争议
      - - 7a. 鉴定通过——发货
        - Vestiaire 物流团队
        - 生成鉴定证书；商品用可持续包装重新打包；发给买家
        - 从鉴定中心到买家 1–5 个工作日
        - 买家收到带证书和 Vestiaire 品牌包装的已鉴定商品
        - 最后一公里配送延误或损坏
      - - 7b. 鉴定失败——买家退款
        - Vestiaire 信任与安全 + 客服
        - 通知买家发现假货；托管款全额退款；卖家账号被标记或关闭
        - 退款处理 24–72 小时
        - 买家全额退款；商品隔离；卖家受罚；数据回流 ML 模型
        - 若失败事件公开，会带来声誉风险；保险覆盖准确率剩余 0.1% 缺口
    notes: >-
      基于 Vestiaire 发布的鉴定文档、Forbes Trust Report（2022 年 10 月）、The Times 文章（2025 年 9 月）、TheIndustry.fashion（2022 年 1
      月英国中心开业）以及 Vestiaire Collective FAQ / 帮助中心。 实物中心吞吐量和训练小时数来自 Forbes 与 The Times 的一手报道。步骤顺序和耗时为近似值。
    enumerationScope:
      coverage: partial
      basis: >-
        This enumeration covers the standard authentication workflow for physical-auth-eligible items (items sold on the
        standard C2C flow). It does not cover the separate RaaS brand partner workflow, the Consignment VIP flow managed
        entirely by Vestiaire, or the direct-buy "Sell Now" instant offer flow which bypasses the standard
        seller-ships-to-center model. Items below €1,000 that do not opt into physical authentication follow only steps
        1–3 and 7a in abbreviated form.
    claimRefs:
      - CE010
      - CE011
      - CE012
      - CE013
      - CE014
      - CE015
      - CE016
      - CE017
      - CE018
      - CE028
      - CE029
