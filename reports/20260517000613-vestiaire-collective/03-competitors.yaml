  - id: feature-comparison
    title: "Feature and Capability Comparison"
    body: >-
      Authentication quality is the most consequential differentiating feature in luxury resale. Vestiaire
      Collective uses a combination of algorithmic pre-screening and physical inspection at dedicated authentication
      centers in Paris, London, New York, and Hong Kong, deploying in-house gemologists, watchmakers, and fashion
      specialists. The RealReal operates 17 Luxury Consignment Offices (14 with retail), with physical authentication
      by in-house experts; it has faced public authentication failures including a 2018 Chanel lawsuit and multiple
      Forbes-documented counterfeit incidents. Fashionphile's Clair Report AI pricing and Fashionphile Certified
      service represent the strongest AI-augmented authentication outside of Vestiaire. Rebag deploys the proprietary
      CLAIR Index to price handbags algorithmically. GOAT and StockX authenticate through physical multi-step
      inspection at fulfillment centers, though their primary categories remain sneakers and streetwear.

      Geographic coverage differentiates Vestiaire sharply from US-centric peers. Vestiaire operates in 80+
      countries; The RealReal is predominately US-focused with limited international shipping. GOAT and StockX
      serve global buyers but maintain US-centric fulfillment infrastructure. Poshmark is concentrated in the US
      and Canada, with early-stage Australia and India presence.

      Fee structures vary substantially (see TP003). Vestiaire's seller fee of 5–15% plus a 3–5% buyer protection
      fee yields a blended take of approximately 15–20%. The RealReal's consignment model retains 30–45%, with
      sellers receiving 55–70%. Poshmark's flat 20% (or $2.95 for items under $15) is competitive for lower-value
      items. GOAT charges roughly 9.5–15% seller fee plus a 9.5% buyer fee, summing to 19–25% total transaction
      cost. StockX applies an 8–9.5% seller fee (declining scale) plus a 5.5–8% buyer premium, totaling 14–18%.
