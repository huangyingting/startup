callouts:
  - type: risk
    tone: warning
    title: "Kering Structural Conflict of Interest"
    body: >-
      Kering's minority stake in Vestiaire creates an inherent tension: Kering brands (Gucci, Saint Laurent,
      Balenciaga, Bottega Veneta) are simultaneously Vestiaire's supply source, strategic investors, and
      active experimenters in first-party resale (Gucci Vault). This conflict could constrain Vestiaire's ability
      to negotiate, prioritize, or promote Kering brands neutrally, and could limit Vestiaire's strategic
      flexibility if Kering deepens its own resale channel.
    claimRefs:
      - CP038
  - type: risk
    tone: warning
    title: "The RealReal Authentication Credibility Risk"
    body: >-
      The RealReal's well-documented authentication failures (Chanel lawsuit 2018, Forbes counterfeit reports
      2019–2021) represent a systemic risk for the entire authenticated luxury resale category—including Vestiaire.
      If consumer trust in platform authentication erodes broadly, buyers may shift toward brand-direct resale or
      specialist authenticators, compressing category GMV.
    claimRefs:
      - CP030
  - type: insight
    tone: positive
    title: "Profitability Benchmarks from Luxury Resale Peers"
    body: >-
      The RealReal's achievement of full-year profitability in 2024 and Fashionphile's 67% profit increase in
      2024 demonstrate that authenticated luxury resale platforms can achieve sustainable unit economics. This
      provides Vestiaire with a viable profitability roadmap and validates the category's long-term financial model.
    claimRefs:
      - CP007
      - CP017

