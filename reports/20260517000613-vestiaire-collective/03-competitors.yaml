  evidenceGaps:
    - type: private-evidence-only
      severity: blocking
      topic: Vestiaire Collective GMV
      missingEvidence: >-
        Vestiaire Collective's actual GMV, revenue, and take rate are not publicly disclosed. No audited financial
        statements, investor presentations, or regulatory filings are available in the public domain.
      whyItMatters: >-
        Without Vestiaire's own GMV and revenue, it is impossible to rigorously size the competitive gap between
        Vestiaire and The RealReal ($1.8B 2024 GMV) or benchmark Vestiaire's fee economics against public peers.
      diligencePath: >-
        Request Vestiaire management information package including audited P&L, GMV by market, and take rate
        breakdown. Review Kering's consolidated financials for minority stake disclosure.
      relatedQuestionRefs:
        - QP023

    - type: private-evidence-only
      severity: material
      topic: GOAT Group revenue
      missingEvidence: >-
        GOAT Group's post-2021 revenue, GMV, and fundraising status are not publicly available. The company has
        not raised publicly disclosed funding since the 2021 Series F.
      whyItMatters: >-
        GOAT's luxury expansion trajectory cannot be quantified without GMV or revenue data, making it impossible
        to assess the actual speed and scale of luxury category growth at GOAT.
      diligencePath: >-
        Monitor GOAT funding announcements, press coverage of luxury category GMV, and any IPO filing disclosures.
        Survey GOAT's luxury assortment size as a proxy for category investment.
      relatedQuestionRefs:
        - QP008

    - type: stale
      severity: material
      topic: luxury resale profitability paths
      missingEvidence: >-
        While The RealReal announced full-year profitability at end of 2024, the specific unit economics
        (contribution margin by category, CAC, take rate by price tier) that enabled profitability are not
        publicly disclosed in sufficient detail to extrapolate Vestiaire's path.
      whyItMatters: >-
        Vestiaire investors and analysts need to understand whether TRR's profitability path is achievable for
        a geographically broader, European-headquartered platform with different cost structures.
      diligencePath: >-
        Pull The RealReal's Q4 2024 and Q1 2026 earnings call transcripts and 10-K for unit economics disclosure.
        Compare against Fashionphile's reported profitability metrics where available.
      relatedQuestionRefs:
        - QP014

    - type: private-evidence-only
      severity: material
      topic: Poshmark post-acquisition strategy
      missingEvidence: >-
        Since Naver privatized Poshmark in January 2023, no financial results or detailed strategic updates
        have been publicly disclosed. The company's product roadmap, luxury tier plans, and revenue trajectory
        are unknown.
      whyItMatters: >-
        If Poshmark uses Naver's capital to add authenticated luxury capabilities, it could encroach on Vestiaire's
        market from the mass-market direction at scale.
      diligencePath: >-
        Monitor Poshmark job postings for luxury authentication roles, Naver's investor materials for Poshmark
        segment disclosure, and any press announcements about product launches.
      relatedQuestionRefs:
        - QP024

    - type: private-evidence-only
      severity: minor
      topic: Vestiaire luxury-only moat sustainability
      missingEvidence: >-
        No third-party market share data is available to quantify how much of Vestiaire's GMV comes from
        categories also served by GOAT and StockX, nor is data available on seller/buyer overlap between platforms.
      whyItMatters: >-
        Without category-level market share data, it is impossible to quantify the degree of competitive overlap
        and pressure from sneaker-first platforms expanding into luxury.
      diligencePath: >-
        Conduct buyer surveys comparing Vestiaire, GOAT, and TRR for handbag and luxury apparel categories.
        Monitor GOAT's SKU count and GMV in luxury handbag category over time.
      relatedQuestionRefs:
        - QP022
