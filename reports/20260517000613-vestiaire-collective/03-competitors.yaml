  - id: TP004
    title: "Moat Durability and Competitive Risk Register"
    columns:
      - competitor or threat
      - moat / competitive advantage claimed
      - risk to Vestiaire Collective
      - severity
      - mitigation or diligence ask
    rows:
      - - The RealReal
        - "US first-mover in authenticated luxury resale; 38M members; 17 physical locations; NASDAQ public with $1.09B cap"
        - Potential European expansion replicating Vestiaire's authentication positioning in its home market; quality concerns could cap TRR's auth credibility advantage
        - High
        - Monitor TRR European store openings; leverage Kering partnership and EU brand identity; maintain authentication quality bar above TRR
      - - GOAT Group
        - "Sneaker category dominance; brand partnerships (Air Jordan); $3.7B valuation; global fulfillment network"
        - Expanding luxury handbag, apparel, and accessories assortment directly competes with Vestiaire's core categories
        - Medium-High
        - Vestiaire's luxury-only curation and heritage brand positioning; monitor GOAT luxury SKU count and GMV share quarterly
      - - StockX
        - "Unique bid/ask market model; pricing transparency; $3.8B valuation; strong streetwear and sneaker community"
        - Limited luxury threat today; IPO would provide capital for category expansion into luxury goods
        - Medium
        - Vestiaire's authentication superiority and luxury heritage; category overlap is currently low but watch IPO proceeds allocation
      - - Luxury brand first-party resale (Gucci Vault, LVMH Nona Source, Stella McCartney Re.Up)
        - "Primary brand credibility; control over supply; margin capture; no intermediary fees"
        - Disintermediation risk if brands direct resale supply to own platforms rather than Vestiaire
        - High
        - Vestiaire's breadth across many brands is more convenient than single-brand platforms; Kering partnership aligns incentives; monitor expansion of Kering brand first-party resale
      - - Poshmark (Naver)
        - "130M+ community members; social commerce features; $1.2B acquisition backing"
        - Mass-market encroachment if Poshmark adds verified luxury tier backed by Naver resources
        - Low-Medium
        - Vestiaire's strict luxury curation and authentication standard; Poshmark's mass-market brand positioning creates distinct segment
      - - eBay / Depop
        - "eBay distribution scale; Depop Gen Z community; global marketplace infrastructure"
        - eBay's authentication capabilities (eBay Authenticate) could be extended via Depop to compete in entry-level luxury
        - Low
        - Vestiaire's luxury-only positioning and European identity; Depop's Gen Z consumer base skews toward lower price points incompatible with Vestiaire's luxury tier
    notes: >-
      Severity reflects risk to Vestiaire Collective's competitive position and market share, not probability of
      occurrence. Kering conflict of interest (see evidenceGaps) is a separate structural risk not tied to a single
      competitor and is discussed in section competitive-moats-risks.
    enumerationScope:
      coverage: partial
      basis: >-
        Covers six most material competitive threats or risk vectors visible in public evidence as of May 2026.
        Does not include all potential entrants (e.g. Amazon Luxury Stores, social commerce platforms such as
        TikTok Shop or Instagram).
    claimRefs:
      - CP029
      - CP034
      - CP038

