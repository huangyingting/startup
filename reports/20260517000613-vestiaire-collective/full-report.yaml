      - number: '1.2'
        title: Business Model and Marketplace Operations
        blocks:
          - type: paragraph
            body: >-
              Vestiaire Collective operates a hybrid C2C (consumer-to-consumer) and B2C (business-to-consumer)
              marketplace platform for pre-owned luxury fashion. The primary revenue mechanism is a take rate on
              completed transactions: sellers pay a commission of approximately 12–15% of the sale price, while buyers
              pay an additional buyer protection fee of approximately 5%. In addition, the company charges fees for its
              authentication service, which is mandatory for items above a certain price threshold and is central to the
              platform's quality assurance proposition.


              Authentication is the platform's central value proposition and operational differentiator. Physical items
              above a threshold value are shipped to one of Vestiaire Collective's authentication centers — in Paris,
              New York, or Hong Kong — where expert authenticators verify brand, materials, condition, and authenticity
              before the item is forwarded to the buyer. For lower-value or highly-trusted items, a Direct Shipping
              option allows peer-to-peer shipment with photo-based digital verification. The company also offers Resale
              as a Service (RaaS), enabling brand partners to integrate resale infrastructure into their own retail
              channels, and provides consignment services for high-value items.


              The platform lists items spanning luxury handbags, shoes, clothing, jewelry, and watches, with particular
              strength in French and Italian luxury brands. More than 100,000 new items are listed on the platform each
              week by its approximately 5 million community members, spanning buyers and sellers across 80+ countries.
              This positions Vestiaire Collective as one of the leading global platforms in the rapidly expanding
              recommerce sector.
