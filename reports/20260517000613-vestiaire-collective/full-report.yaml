      - number: '8.3'
        title: Kill Triggers and Diligence Asks
        blocks:
          - type: paragraph
            body: >
              The "track" recommendation is contingent on several monitoring conditions. If any of the kill triggers
              below are activated, the recommendation should be downgraded to "pass" immediately, without waiting for a
              full re-assessment. The most critical risk is a new down-round at a valuation below $1 billion, which
              would confirm that Vestiaire's own board and institutional investors have accepted a reset to
              market-clearing valuations. This would precede any IPO or acquisition at a meaningful premium to prior
              investors.


              The second priority risk is The RealReal's competitive evolution. If REAL achieves full-year GAAP net
              profit in 2026 (guided net loss of $0.03 EPS non-GAAP) while Vestiaire remains unprofitable, REAL would
              become the dominant authenticated luxury resale platform globally with a compelling public market story —
              making it harder for Vestiaire to access public capital at premium pricing. Kering's strategic
              relationship introduces a governance risk: if Kering divests its stake (it holds a minority position from
              the 2021 round) or scales the competing Gucci Vault resale initiative to meaningful GMV, that would
              undermine a key narrative pillar of Vestiaire's investment story.


              The diligence asks are structured by priority. The single most important ask is access to audited P&L for
              FY2022–2025 to establish actual revenue, gross margin, and cash burn, which is currently unverifiable from
              public sources. Without this, the valuation analysis rests on estimates with material uncertainty bounds.
              Secondary priorities include GMV and take rate by geography and category (to understand revenue quality),
              authentication failure rate (to assess the core operational risk), and the Kering partnership commercial
              terms (to quantify the strategic dependency and any conflicts of interest). A full cap table review with
              option pool dilution analysis is essential before any investment term sheet is proposed.
