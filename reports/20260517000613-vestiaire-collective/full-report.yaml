  - number: 1
    title: Company Overview
    sections:
      - number: '1.1'
        title: Company Identity and Founding Story
        blocks:
          - type: paragraph
            body: >-
              Vestiaire Collective was founded in 2009 in Paris, France, by a team of six co-founders: Fanny Moizant,
              Sophie Hersan, Sébastien Fabre, Alexander Cognard, Henrique Fernandes, and Christophe Cohen. The company
              emerged from the insight that the secondary market for authenticated luxury goods represented a
              significant and underserved opportunity — one where consumer trust and robust quality assurance were the
              essential value propositions that mass-market resale platforms failed to deliver. Moizant and Hersan, both
              with backgrounds in luxury fashion, envisioned a curated peer-to-peer platform that would differentiate
              itself from generalist online marketplaces through rigorous product authentication and editorial curation
              of listings.


              The platform began as a French-focused operation before gradually expanding across Europe and beyond. Its
              positioning as a trusted community marketplace for pre-owned luxury apparel, handbags, shoes, jewelry, and
              watches set it apart from eBay and other generalist resale sites from its earliest days. The company is
              headquartered at 53 rue de Châteaudun in the 9th arrondissement of Paris, and maintains additional offices
              in London, New York, Hong Kong, and Seoul. As of 2024, the platform serves buyers and sellers in more than
              80 countries, with dedicated authentication centers in Paris, New York, and Hong Kong ensuring item
              quality and genuineness before delivery to buyers. The company employs approximately 600 people as of
              2024, according to Wikipedia. The founding thesis — that luxury resale could be formalized, authenticated,
              and trusted at scale — has underpinned the company's decade-long growth trajectory from a French startup
              to a global unicorn.
