      - number: '5.2'
        title: Authentication Model and Technology
        blocks:
          - type: paragraph
            body: >-
              Authentication is the defining technological capability of Vestiaire Collective and its primary trust
              differentiator versus unmoderated resale platforms. The system operates as a four-stage verification
              pipeline. First, AI-driven profile monitoring identifies and blocks suspicious seller accounts before any
              listing is created; in 2024, this layer blocked approximately 10% of would-be accounts at registration.
              Second, human curation teams examine uploaded photographs using AI-supported image analysis, screening
              every listing digitally before it goes live. Third, physical authentication is mandatory for items priced
              above €1,000 and available as an optional €15 add-on for lower-value items; sellers ship the item to the
              nearest authentication center where trained experts conduct hands-on forensic inspection. Fourth, a
              quality-control check verifies that the item's condition matches the seller's description, reducing
              post-sale disputes.

              Vestiaire operates four physical authentication centers — Tourcoing (France, the flagship hub housing 120
              staff across two shifts and verifying approximately 2,000 items per day), Crawley (West Sussex UK, opened
              January 2022, capacity up to 1,000 items per day), Brooklyn (New York, North America coverage), and Hong
              Kong (Asia coverage). The Vestiaire Collective Anti-Counterfeiting Academy, established in 2017, trains
              each authenticator through 750 hours of initial instruction and 180 additional hours of annual continuing
              education across category specializations including gemology, watchmaking, and leather goods. Expert
              authentication employs microscopy for leather grain analysis, dental mirrors for hardware inspection,
              olfactory comparison (each luxury brand carries a distinct leather scent), acoustic testing (zipper and
              lock sounds), precise measurements, and hand-stitching analysis that distinguishes artisanal originals
              from machine-stitched counterfeits. Approximately 8% of items submitted daily fail authentication or
              condition standards; since 2020, Vestiaire has rejected items with a cumulative estimated market value of
              $360 million. The platform claims 99.9% authentication accuracy, with the residual 0.1% covered by an
              insurance policy that fully refunds buyers whose items are later determined to be counterfeit. The
              highest-value item authenticated and sold was an Hermès Birkin Faubourg at €158,000. Machine learning
              increasingly supports but does not replace human experts: algorithms inform authenticators on historical
              counterfeit patterns, brand-specific markers, and provenance indicators, creating a self-improving system
              as each authenticated or rejected item feeds the training dataset.
