      - number: '6.3'
        title: Customer Experience, Retention, and Satisfaction
        blocks:
          - type: paragraph
            body: >
              Customer satisfaction at Vestiaire Collective reflects the platform's dual-sided nature: buyers and
              sellers have distinct pain points, and the authentication process—while central to the value
              proposition—is the single most cited source of friction. SmartCustomer.com (aggregating 2,807 reviews as
              of 2026) gives Vestiaire a 3.9 out of 5 average rating. A sample of customer reviews reveals recurring
              themes: positive reviews cite the quality of authenticated items, the ability to discover rare luxury
              pieces, and fast payment processing for sellers; adverse reviews consistently cite authentication delays,
              customer service response times, and frustration when orders are cancelled or disputed.


              Adverse experience patterns include: (1) Authentication wait times extending beyond the typical window,
              with buyers waiting three to four weeks rather than the 2-3 day post-receipt review period implied in
              marketing; (2) Customer service interactions perceived as slow and passing issues between multiple agents;
              (3) Sellers reporting offers accepted by buyers that later do not result in payment; (4) International
              buyers experiencing unexpected customs fees or cross-border shipping complications. One reviewer noted:
              "Almost a month of terrible interactions with what feels like 20 staff members passing me around. If I
              could use minus stars I would!" (SmartCustomer, April 2026).


              Despite these friction points, Vestiaire's brand recognition has been affirmed by independent customer
              relationship assessments. The company won the French Qualiweb "Best Digital Customer Relationship of the
              Year" award in 2024 and again in 2026 (ranking #1 in the luxury/fashion category), and was ranked "Italy's
              Best Customer Service" in 2025/2026 by Corriere della Sera. The VP of Customer Service disclosed in March
              2026 (Stratégies magazine) that the company manages 1.2 million customer contacts annually across 350
              agents (majority outsourced), that the AI-assisted chatbot routing has generated a 3-point satisfaction
              improvement, and that average basket size is 350 euros. These institutional recognitions suggest the
              service quality picture is improving, even as third-party review platforms reflect a mixed distribution.


              The platform does not operate a subscription model, meaning all revenue is transaction-driven and
              retention is expressed through repeat purchase frequency rather than churn rates. The RealReal, a
              comparable authenticated luxury resale competitor, reported 80% of GMV from repeat buyers in 2025—an
              industry benchmark that, if achieved by Vestiaire, would suggest healthy retention among active buyers.
              Vestiaire has not publicly disclosed equivalent metrics. Industry estimates for luxury resale platforms
              suggest 40–60% of buyers who complete a first successful purchase will return within 12 months, with
              higher retention rates correlating to positive authentication experiences.


              The buyer journey map (FU001) illustrates the critical "Authentication Wait" phase as a moment of peak
              friction—where the experience either affirms trust (and drives repeat purchases) or destroys it (and
              triggers churn). Items authenticated through the Crawley UK center or the Brooklyn North America center
              benefit from faster regional turnaround, particularly after Brexit-related cross-border complications
              prompted the UK hub opening in January 2022.
