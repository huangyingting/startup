      - number: '6.4'
        title: Customer Concentration and Expansion Risk
        blocks:
          - type: paragraph
            body: >
              Vestiaire Collective's customer base presents several structural concentration and expansion risks that
              warrant diligence attention. Geographic concentration remains the most material: the platform's historical
              strength in France and UK means that European regulatory changes—including the EU Digital Services Act,
              GDPR, and proposed resale taxation frameworks—could disproportionately affect the core customer base. The
              French market, while Vestiaire's most mature, is also where competition from local platforms such as
              Vinted is strongest.


              Category concentration is a second risk. Handbags—particularly Chanel, Hermès, and Louis Vuitton—likely
              represent the largest share of GMV by value. If these brands were to aggressively enforce restrictions on
              secondary market trading (as Chanel has done through price controls and purchase limits at retail), supply
              of desirable items would tighten and the buyer experience would degrade. The platform's pivot away from
              fast fashion (2022 ban) was a deliberate de-risking of commodity supply, but it also concentrated revenue
              further in the high-end segment.


              Power-user concentration is a third dimension: professional sellers—estimated at roughly 10% of active
              sellers—likely drive a disproportionate share of total listings volume and transaction count. Disruption
              to professional seller economics (such as commission increases, platform policy changes, or competition
              from brand-direct resale programs) could materially reduce inventory quality and quantity. Vestiaire's
              Resale-as-a-Service (RaaS) pilots with Alexander McQueen and Mulberry signal efforts to diversify supply,
              but brands running their own resale programs represent a potential disintermediation threat over time.


              US expansion risk remains elevated. The Tradesy integration combined two platforms with different seller
              communities, fee structures, and customer expectations. US luxury resale buyers are well-served by The
              RealReal, which has deeper brand recognition and a consignment model preferred by some sellers.
              Vestiaire's US sales grew 75% per year in 2020–2022 but that was off a small base; sustaining growth now
              requires competing directly with an entrenched local leader with superior repeat-buyer metrics.


              Finally, the platform's dependence on consumer discretionary spending makes it vulnerable to luxury market
              downturns. During macroeconomic stress, aspirational buyers—the largest volume segment—are most likely to
              reduce purchase frequency, while sellers may flood the platform with supply, creating pricing pressure and
              margin compression.
