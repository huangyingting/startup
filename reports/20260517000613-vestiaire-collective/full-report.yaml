  - id: FI001
    title: Revenue Model Bridge
    type: flow
    summary: How buyer and seller activity converts into Vestiaire Collective's revenue and gross profit.
    approximationNotes: >-
      Commission rate and GMV are estimated; authentication opt-in conversion is unknown. Revenue stream sizes are
      qualitative orderings based on comparable public platform data (The RealReal FY2025 revenue mix).
    claimRefs:
      - CI005
      - CI006
      - CI007
      - CI024
      - CI029
    data:
      nodes:
        - id: buyer-seller-activity
          label: Buyer Demand + Seller Supply
          description: >-
            Buyers browse and purchase; sellers list items at asking price. Combined membership 23M+ across 70+
            countries.
        - id: gmv
          label: Gross Merchandise Value (est. $1.0–1.5B, 2024E)
          description: >-
            Total transaction volume at item sale prices. Not publicly disclosed; back-calculated from revenue ÷
            estimated take rate.
        - id: commission-revenue
          label: Seller Commission Revenue (~Primary Stream)
          description: >-
            Undisclosed commission percentage taken from each sale. Analogous to The RealReal's 37.7% take rate;
            Vestiaire's rate is not public.
        - id: auth-fee-revenue
          label: Authentication Fee Revenue (€15 opt-in, sub-€1K items)
          description: >-
            Flat €15 per item for seller-elected authentication. Items over €1,000 auto-authenticated at no incremental
            charge.
        - id: concierge-shipping-revenue
          label: Concierge + Shipping Revenue (Undisclosed)
          description: >-
            Full-service listing (concierge) and logistics (pre-paid label markup). Both streams undisclosed; likely
            minor relative to commission.
        - id: gross-revenue
          label: Total Gross Revenue (est. ~$380M, 2024E)
          description: >-
            Sum of all revenue streams. PrivCo estimate; not confirmed by audited filings. Comparable to The RealReal
            FY2024 ($600M) adjusted for Vestiaire's smaller scale.
        - id: authentication-costs
          label: Authentication Center Costs (4 global hubs)
          description: >-
            Labor, facility, and technology costs at Tourcoing, Crawley, Hong Kong, and Brooklyn. Crawley alone designed
            for 1,000 items/day. Primary COGS driver explaining ~50% gross margin vs. comps.
        - id: gross-profit
          label: Gross Profit (est. ~50% margin, ~$190M)
          description: >-
            After authentication center COGS and logistics costs. PrivCo estimate; 24–29 percentage points below The
            RealReal (74.6%) and ThredUp (79.4%) due to physical auth overhead.
      edges:
        - from: buyer-seller-activity
          to: gmv
          label: Transactions at sale price
        - from: gmv
          to: commission-revenue
          label: Commission % deducted at sale
        - from: gmv
          to: auth-fee-revenue
          label: €15 opt-in fee (items <€1K)
        - from: gmv
          to: concierge-shipping-revenue
          label: Optional services
        - from: commission-revenue
          to: gross-revenue
          label: Added to revenue
        - from: auth-fee-revenue
          to: gross-revenue
          label: Added to revenue
        - from: concierge-shipping-revenue
          to: gross-revenue
          label: Added to revenue
        - from: gross-revenue
          to: authentication-costs
          label: COGS deducted
        - from: authentication-costs
          to: gross-profit
          label: Net after COGS
