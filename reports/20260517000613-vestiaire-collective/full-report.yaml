      - number: '4.3'
        title: Capital Adequacy and Financing Path
        blocks:
          - type: paragraph
            body: >
              Vestiaire Collective has raised over $600 million since 2015 across multiple rounds, with investors
              including Eurazeo (approximately 25% stake, largest shareholder), Kering (approximately 5% strategic
              stake), SoftBank, Tiger Global, Condé Nast, and Generation Investment Management. The company's valuation
              has undergone a meaningful reset: from a $1.7 billion post-Tradesy valuation in March 2022, to
              approximately €1.4 billion mid-2022, to €1.1 billion ($1.2B) at the January 2024 crowdfunding round. The
              crowdfunding raised only ~€3.5M — a token amount — suggesting it was primarily a brand and
              community-building exercise rather than a primary capital raise.


              Management explicitly conditioned an IPO on achieving profitability first. In January 2024, Reuters
              reported the company aimed to be profitable by end of 2024. As of May 2026, no public confirmation of that
              milestone has appeared. The October 2025 appointment of Bernard Osta — the former CFO — as CEO signals
              that financial discipline and IPO preparation have become the dominant management priority. Osta's
              investment banking background from Lazard and Goldman Sachs is consistent with pre-IPO positioning.


              Cash position, burn rate, and debt schedule are entirely undisclosed. With no public filing requirement as
              a French private company, and no recent primary equity round, the true capital adequacy of Vestiaire is
              unverifiable without direct management access. The RealReal required approximately three fiscal years of
              improvement to move from -$134.6M EBITDA (FY2023) to +$9.07M EBITDA (FY2025), illustrating how long the
              profitability journey can take even for a well-resourced public-market comp.
