  - id: TE004
    title: Trust, Quality, and Compliance
    columns:
      - Area
      - Mechanism
      - Standard / Certification
      - Gap / Risk
      - Notes
    rows:
      - - Anti-Counterfeiting
        - 4-step verification pipeline (AI + human); Authentication Academy; rejection of ~8% of items daily
        - French Anti-Counterfeiting Charter (2012); EU Commission MoU on online counterfeiting (April 2024)
        - 99.9% accuracy leaves a residual gap; insurance covers 0.1%; rising 'superfake' sophistication
        - $360M in items rejected since 2020; 750h + 180h/year authenticator training
      - - Buyer Protection
        - Full refund guarantee if counterfeit delivered post-authentication; escrow during authentication
        - Consumer protection law (EU, UK, US applicable per jurisdiction of buyer)
        - 'Insurance coverage for 0.1% residual: coverage limits not publicly disclosed'
        - 'Highest-value item authenticated and sold: €158,000 Hermès Birkin Faubourg'
      - - Data Privacy
        - >-
          GDPR-compliant data handling; explicit consent at account registration; iOS privacy label discloses:
          purchases, contact info, search history, identifiers collected
        - GDPR (EU 2018); UK GDPR (post-Brexit)
        - No public audit certification (e.g. ISO 27001) confirmed; data breach history not publicly reported
        - French company headquartered in Paris; DPA is CNIL; user data includes transaction and behavior logs
      - - Platform Regulation
        - DSA compliance for EU marketplace operators; seller identity verification obligations
        - EU Digital Services Act (DSA, applicable from 2023/2024 for platforms)
        - No confirmed DSA audit or enforcement record in public sources; compliance posture assumed but unverified
        - >-
          Very Large Online Platform (VLOP) status depends on user count threshold; formal DSA designation status not
          public
      - - Payment Security
        - Multi-currency payment gateway with escrow; buyer-seller fund segregation
        - PCI-DSS implied via payment gateway partners (Stripe/Adyen class)
        - Specific PCI-DSS level certification not publicly confirmed by Vestiaire
        - Escrow mechanism during authentication is a consumer trust differentiator
      - - Sustainability / B Corp
        - B Corp certification; fast-fashion brand ban (63 brands, 2022–2023); carbon intensity tracking
        - B Corp (certified 2021, independent verification of social and environmental standards)
        - B Corp recertification cycle requires periodic re-audit; first certification was 2021
        - >-
          50% of Vestiaire users now check the platform first before buying new; 87% of orders prevent a first-hand
          purchase
      - - Blockchain / Digital ID
        - >-
          SMI Fashion Task Force participation; pilot with Chloé for digital item identification; WEF data exchange
          framework
        - Aligned with EU Digital Product Passport (DPP) initiative
        - No production blockchain authentication deployed at scale yet; pilot stage only
        - DPP legislation not yet fully enacted; future compliance requirement may drive mandatory adoption
    notes: >-
      Compliance postures inferred from the 2025 Impact Report, Forbes Trust Report, Vestiaire FAQ, app store privacy
      labels, and press coverage of EU regulatory developments. Formal audit certifications (ISO 27001, DSA VLOP filing)
      have not been publicly disclosed.
