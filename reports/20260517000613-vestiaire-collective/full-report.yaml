  - id: FO002
    title: Vestiaire Collective Business Model Flow
    type: flow
    summary: >-
      Simplified flow showing how Vestiaire Collective connects sellers, buyers, and authentication services to generate
      revenue through commissions, buyer fees, and Resale as a Service partnerships.
    data:
      nodes:
        - id: seller
          label: Seller
          detail: >-
            Individual or professional seller lists a pre-owned luxury item. Pays approximately 12–15% seller commission
            on successful sale completion.
        - id: listing
          label: Listing & Curation
          detail: >-
            Platform reviews photos and item details for editorial standards before listing. Ensures items meet
            category, brand, and condition criteria.
        - id: auth
          label: Authentication Center
          detail: >-
            Item shipped to Paris, New York, or Hong Kong center. Expert authenticators verify brand, materials,
            condition, and genuineness.
        - id: buyer
          label: Buyer
          detail: >-
            Buyer purchases at listed price plus approximately 5% buyer protection fee. Receives authenticated item
            after it passes quality check.
        - id: revenue
          label: Vestiaire Revenue
          detail: >-
            Company retains seller commission (12–15%), buyer protection fee (~5%), and authentication service fees from
            completed transactions.
        - id: raas
          label: RaaS / Brand Partners
          detail: >-
            Luxury brand partners integrate Vestiaire Collective's resale infrastructure via Resale as a Service,
            creating an additional B2B revenue stream.
      edges:
        - from: seller
          to: listing
          label: Lists item
        - from: listing
          to: auth
          label: Item shipped for physical verification
        - from: auth
          to: buyer
          label: Authenticated item delivered
        - from: buyer
          to: revenue
          label: Buyer protection fee paid
        - from: seller
          to: revenue
          label: Seller commission retained
        - from: raas
          to: revenue
          label: Licensing / RaaS service fees
    claimRefs:
      - CO008
      - CO009
      - CO010
      - CO011
      - CO012
      - CO013
      - CO014
