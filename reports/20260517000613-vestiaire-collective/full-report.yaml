          restrictions on ML models
        - >-
          Classification risk unresolved; 36-month implementation runway for high-risk provisions provides time to
          assess
      - - EU Consumer Rights Directive and Distance Selling Regulations
        - European Union / UK
        - Consumer Protection / Liability
        - >-
          In force; Vestiaire acknowledges authentication is 'not error-free' and commits to full refunds for
          non-genuine items. Systematic failure could trigger regulatory scrutiny.
        - Class action liability; regulatory fines; mandatory compensation for counterfeits passed through to buyers
        - Full refund policy published; buyer terms and conditions clearly disclose authentication limitations
      - - Anti-Money Laundering (AML) / Know Your Customer (KYC) – AMLD5/AMLD6
        - European Union / UK
        - Financial Crime Compliance
        - >-
          EU 6th AML Directive in force; high-value luxury goods are flagged as AML risk vectors by FATF. Vestiaire's
          high transaction values (€5K–€50K+) create KYC exposure.
        - Regulatory investigation; platform restrictions; fines from national FIUs (Financial Intelligence Units)
        - Payment processor AML obligations (Klarna, PayPal, Adyen); seller identity verification at listing stage
      - - French Anti-Counterfeiting Charter and EU IP Enforcement Regulation
        - France / European Union
        - Intellectual Property / Counterfeiting
        - >-
          Vestiaire is a signatory to French Anti-Counterfeiting Charter (2012) and EU MoU (April 2024). Any systemic
          authentication failure could void these commitments and expose Vestiaire to IP enforcement actions by brand
          owners.
        - Brand owner injunctions; removal of listing categories; reputational sanctions
