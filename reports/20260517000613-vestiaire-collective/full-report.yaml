      - number: '2.4'
        title: Competitive Landscape and Market Positioning
        blocks:
          - type: paragraph
            body: >-
              The luxury resale market is fragmented globally and no single platform dominates across all geographies
              and categories. Vestiaire Collective holds the strongest position in Europe and is the only major platform
              that combines a curated luxury positioning with global operations in 70+ countries. Its closest peer in
              terms of product positioning is The RealReal, which dominates the US consignment market and had 1 million+
              active buyers in 2025, with 80% of its GMV from repeat buyers — evidence of strong retention in
              authenticated luxury resale. However, The RealReal's model is capital-intensive: the company reported net
              losses of $168.5 million in 2023, $134.2 million in 2024, and $41.8 million in 2025, illustrating the
              structural difficulty of achieving profitability when authentication, consignment logistics, and customer
              acquisition costs are high.


              Fashionphile sits in a more specialised niche as a buy-outright specialist for ultra-luxury handbags,
              backed by Neiman Marcus and trusted for instant liquidity to sellers. Poshmark — now owned by South Korean
              internet company Naver following a $1.2 billion acquisition in January 2023 — operates a social commerce
              model with 130 million+ community members, $8 billion+ in seller earnings, and 350 million+ items sold,
              but targets mid-market and mass fashion rather than luxury. Depop, acquired by Etsy for $1.625 billion in
              2021 and reportedly in a proposed $1.2 billion sale to eBay as of February 2026, is youth-oriented and
              vintage-focused with minimal authentication infrastructure. StockX, valued at $3.8 billion in 2021,
              addresses the sneaker and streetwear segment with a bid/ask exchange model and limited luxury breadth.
              These platforms are more adjacent competitors than direct ones, except in the overlap zone of younger
              luxury buyers and designer apparel.


              The emerging competitive dynamic is the rise of branded resale programs. Vestiaire's own RaaS offering —
              with 12+ luxury brand partners including Burberry, Ganni, Alexander McQueen, Mulberry, and Chloé —
              positions the company as infrastructure for brand-owned resale rather than a pure competitor to primary
              luxury retail. However, luxury conglomerates like Kering (an investor in Vestiaire) and LVMH are also
              exploring direct resale programs, raising the question of whether Vestiaire's RaaS partnerships may face
              disintermediation risk over time. Platform consolidation (Poshmark to Naver, Depop to eBay proposal) also
              suggests the market is rationalising, with well-capitalised acquirers seeking scale in secondhand fashion.
