              executive introduces product vision continuity risk at a moment when the company has explicitly committed
              to AI-accelerated growth. CTPO Stacia Carr was recruited in 2024 under the prior CEO; her tenure and
              strategic alignment under Osta is not yet publicly confirmed. Key-person dependency on a small leadership
