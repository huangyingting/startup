      - number: '7.3'
        title: Strategic, Partner, and People Risks
        blocks:
          - type: paragraph
            body: >
              The Kering investment represents Vestiaire Collective's most structurally complex strategic risk.
              Kering—which co-led the €178M Series F in March 2021 alongside Tiger Global—is simultaneously one of
              Vestiaire's most significant backers and the parent company of luxury brands including Gucci, Yves Saint
              Laurent, Balenciaga, and Bottega Veneta. Kering owns Gucci-Vault, a brand-operated resale and re-edition
              platform that competes directly with Vestiaire's C2C resale model. This creates a structural conflict of
              interest: Kering holds board influence as an investor while operating a competing resale channel and
              potentially withholding proprietary supply from Vestiaire by steering Gucci consignment toward Gucci-Vault
              instead. As Kering itself faces revenue pressure (€14.67B revenue in 2025, down from €19.6B in 2023), it
              may prioritize brand-owned resale channels over third-party platforms in which it holds a minority equity
              stake.

              People and execution risk is elevated following the second CEO transition in six years. Bernard Osta, who
              became CEO on October 7, 2025 after serving as CFO, replaces Maximilian Bittner (CEO 2019–2025). While an
              internal promotion reduces culture disruption risk, Osta's background is finance rather than luxury
              operations or marketplace technology. Co-founders Fanny Moizant (President) and Sophie Hersan (Fashion
              Director) remain central to brand identity and community trust, and any departure of either would
              represent a significant reputational and organizational risk. The company conducted layoffs in 2022–2023
              following aggressive headcount expansion during the 2020–2021 growth period, which generated adverse press
              coverage and surfaced cultural tensions. Authentication expert retention is a recurring operational and
              talent risk: the company's 750-hour specialization training program creates high switching costs for
              departing authenticators, but also makes them attractive to competitors including The RealReal, GOAT, and
              emerging brand-owned resale programs.

              Competitive risk from The RealReal has materially intensified: The RealReal surpassed $2.13B in GMV in
              2025 (up 16% year-over-year) and achieved positive Adjusted EBITDA of $42M for the full year—a significant
              milestone for a luxury resale platform. This increases the risk that Vestiaire, which has not disclosed
              comparable financial metrics, is being out-competed on unit economics and operational scale in the key
              North American market. Macro risk rounds out the strategic picture: luxury goods are discretionary
              purchases acutely sensitive to consumer confidence, and an economic downturn could disproportionately
              depress resale volume as sellers reduce supply (keeping assets) and buyers reduce demand simultaneously.
