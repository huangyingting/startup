      - number: '2.2'
        title: Market Size and Growth Trajectory
        blocks:
          - type: paragraph
            body: >-
              The global secondhand apparel market is one of the fastest-growing segments in consumer goods. ThredUp's
              2026 Resale Market and Consumer Trend Report projects the total global secondhand apparel market will
              reach $393 billion by 2030, growing at 2× the rate of the overall apparel market. BCG separately projects
              the global resale market will reach $360 billion by 2030 (per reporting by WWD). These two headline
              figures use different definitions — ThredUp's covers all secondhand apparel while BCG's covers resale more
              broadly — but they converge on the same magnitude and direction: a $350–$400 billion market by the end of
              the decade. The current market (2024 estimate) is approximately $170–$230 billion, implying a roughly
              8–10% compound annual growth rate over six years.


              For Vestiaire, the relevant serviceable addressable market is narrower: luxury fashion resale conducted
              through authenticated digital platforms. Public data does not precisely segment this sub-market, but
              analyst consensus and competitor disclosures allow reasonable triangulation. The RealReal — the largest
              publicly listed luxury resale player — reported approximately $600 million in revenue for FY2024 with 1
              million+ active buyers. Given that Vestiaire operates at comparable or larger scale in Europe and growing
              scale in the US, a conservative SAM estimate for global online luxury fashion resale in 2030 is $60–80
              billion, assuming luxury accounts for approximately 15–20% of total secondhand apparel value and digital
              channels capture the majority of growth. Vestiaire's serviceable obtainable market (SOM) is likely $5–8
              billion in GMV by 2028–2030, reflecting an 8–12% share of its SAM under a scenario where it maintains its
              European leadership and grows US and Asia-Pacific penetration meaningfully.


              The market is notably not uniform. Different categories carry very different growth trajectories and
              margin profiles. Luxury handbags and leather goods are the highest-value sub-segment per item, with strong
              brand recognition and deep secondary market liquidity. Watches and fine jewelry are fast-growing,
              supported by their investment-grade characteristics and the emergence of specialised platforms. Apparel
              has the largest volume but lower per-item values. Footwear, driven by the sneaker resale culture from
              StockX and GOAT, is growing fastest by unit count. Vestiaire spans most of these categories, which
              provides diversification but also requires category-specific authentication expertise.
            claimRefs:
