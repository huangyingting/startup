            country presence
          trend: flat
        - label: Financial Health
          value: 4 / 10
          unit: score
          detail: >-
            Likely loss-making (no public disclosures); €3.5M crowdfunding in 2024 signals limited VC appetite at $1.7B;
            REAL analogue spent 4+ years in deep losses
          trend: unknown
        - label: Technology & Product
          value: 7 / 10
          unit: score
          detail: >-
            Strong ML-assisted authentication; mobile-first (iOS/Android); RaaS integration with 13+ luxury brands;
            direct shipping and consignment options
          trend: up
        - label: Valuation Attractiveness
          value: 4 / 10
          unit: score
          detail: >-
            $1.7B last round vs. public comps at 1.5–1.65× revenue; implied 4–6× multiple unjustified without
            profitability; down-round risk real
          trend: down
