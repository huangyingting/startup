      - number: '3.3'
        title: Competitive Moats and Risk Analysis
        blocks:
          - type: paragraph
            body: >-
              Vestiaire Collective's most durable moat is the combination of European brand cachet, physical
              authentication infrastructure, and the Kering strategic partnership secured in 2021. Kering's
              participation confers credibility with European luxury houses, potential preferential access to
              brand-endorsed resale programs, and a signal of institutional legitimacy that US-centric rivals cannot
              easily replicate. The company's 80+ country seller and buyer network creates a global supply and demand
              flywheel for hard-to-find luxury items that narrows the accessible market for platforms with more limited
              geographic reach.

              The most material competitive risk is luxury brand disintermediation. Kering-affiliated brands (Gucci
              Vault, Saint Laurent), LVMH's Nona Source, and Stella McCartney's Re.Up all represent cases of primary
              luxury brands building or sponsoring resale channels directly. If brands route resale through proprietary
              platforms, they capture margin that would otherwise flow to Vestiaire. There is also a structural conflict
              in the Kering partnership itself: Kering brands (Gucci, Saint Laurent, Balenciaga, Bottega Veneta) are
              simultaneously Vestiaire's supply source, strategic investors, and potential first-party resale
              competitors.

              The RealReal's 2024 path to profitability is a significant marker. If TRR continues European expansion
              with its physical consignment model, it could replicate Vestiaire's authentication positioning in its home
              market. GOAT's ongoing luxury expansion—adding designer handbags, ready-to-wear, and
              accessories—represents a medium-term threat from the sneaker platform tier. ThredUp's Resale-as-a-Service
              model (May 2026 pivot) could also enable fast-fashion and contemporary retailers to offer peer-to-peer
              resale at scale, potentially eroding mid-market supply that flows to Vestiaire's lower luxury tier.
