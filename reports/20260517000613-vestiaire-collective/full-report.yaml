      - number: '6.2'
        title: Adoption Trajectory and Growth
        blocks:
          - type: paragraph
            body: >
              Vestiaire Collective launched in 2009 with roughly 3,000 items sourced from founders' personal networks.
              Growth was initially concentrated in France before the company began international expansion in earnest
              around 2012 with the UK launch. By 2014, the platform had entered the US market and, by 2017, had expanded
              to Hong Kong, Singapore, and Australia.


              The platform experienced two major acceleration events. The first was the 2019 Series E funding round,
              which gave the company capital to invest in marketing and authentication infrastructure. The second—and
              more dramatic—acceleration was the COVID-19 pandemic of 2020–2021, which drove a shift toward online
              shopping, increased consumer interest in sustainable fashion, and created strong "lockdown luxury" resale
              demand. Vestiaire Collective reported a 70% surge in new customers over the course of 2021 (Glossy.co,
              March 2022, citing SimilarWeb data).


              The March 2022 acquisition of Tradesy—a US-based resale platform with approximately 4 million
              members—brought Vestiaire's combined audience to approximately 23 million members globally (Glossy.co),
              though this figure blends the two platforms' databases and the combined number is not directly comparable
              to Vestiaire's organic member count alone. As of the 2026 VP Service Client interview in Stratégies, the
              company confirmed 5 million products online and operations across 70+ countries. Wikipedia (last updated
              2026) cites 5 million curated items with approximately 30,000 new items listed daily (approximately
              210,000 per week).


              The 2021 Series F ($216M at $1.7B valuation) funded international expansion and authentication
              infrastructure investment. PrivCo estimated Vestiaire's revenue at $250M in 2023 and $380M in 2024,
              suggesting continued strong GMV growth even as the broader luxury goods market faced headwinds. The
              fast-fashion ban implemented in 2022—removing H&M, Zara, and similar brands—represented a deliberate
              customer quality-over-quantity trade-off that reinforced the luxury positioning but narrowed the
              addressable seller base.


              The UK market showed strong consumer sentiment: TheIndustry.fashion reported in January 2022 that
              one-third of UK consumers had bought or planned to buy second-hand in the 2021 festive period, and
              one-in-six UK wardrobes contained at least 50% second-hand items, reflecting structural tailwinds for
              Vestiaire's core value proposition.
