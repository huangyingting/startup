            body: >-
              Vestiaire Collective's platform comprises three interconnected surfaces — iOS app, Android app, and web
              marketplace — all serving a unified global inventory of luxury pre-owned fashion. The iOS application
              (version 5.268.0, May 2026) holds a 4.5-star rating from 16,000 US App Store reviews, reflecting strong
              user satisfaction in the primary mobile channel. The platform lists over 5 million curated items at any
              given time, with more than 30,000 new listings added every day across 70+ countries and 9+ supported
              languages. The primary sales flows include standard C2C listings, a "Sell Now" (direct buy) instant offer
              mechanism where Vestiaire guarantees a price, a professional seller program for trade vendors, and a
              full-service Consignment VIP track where Vestiaire manages photography, descriptions, pricing, storage,
              and shipping for premium sellers. Buyer tools include AI-curated personalized feeds, a "similar items"
              visual widget that has demonstrably doubled purchase conversion on matching items, interest-free payment
              options, and direct negotiation with individual sellers. Text search drives 40% of all orders; the
              remaining 60% comes from browsing, recommendations, and direct links — illustrating a balanced discovery
              architecture that is being progressively enhanced with AI. A Resale-as-a-Service (RaaS) white-label
              program lets luxury brands (12+ as of 2026, including Ganni, Chloé, Burberry, Isabel Marant, Mytheresa,
              Alexander McQueen) embed branded resale experiences directly on the Vestiaire platform, with Ganni's
              integration featuring home pickup and instant store credit. Community and trust features include a Seller
              Status badge system, wishlist, follow functionality, and the "Brand Approved" provenance program operated
              jointly with luxury partner brands. The platform's Trustpilot profile shows 102,206 reviews with a 4.2/5
              "Great" aggregate rating (February 2026 snapshot), confirming broad positive sentiment alongside isolated
              complaints about shipping and support response times.
