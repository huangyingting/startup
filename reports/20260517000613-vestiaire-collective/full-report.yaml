      - number: '7.2'
        title: Operational and Technology Risks
        blocks:
          - type: paragraph
            body: >
              Authentication failure is the central operational risk for Vestiaire Collective. The company operates four
              physical authentication hubs—Tourcoing (France), Crawley (UK), Hong Kong, and Brooklyn (North America)—and
              has publicly acknowledged on its own website that its authentication measures "are not error-free and
              mistakes may occasionally occur." The UK center, opened in January 2022, can authenticate up to 1,000
              items per day. With the platform listing over 100,000 new items weekly, and a physical authentication
              threshold of €1,000+ (with an opt-in fee of €15 for lower-value items), a non-trivial proportion of volume
              bypasses physical verification entirely. Even a sub-1% error rate at scale implies hundreds of potential
              authentication failures per week that could reach buyers. Each failure creates refund liability, potential
              consumer protection enforcement, adverse media coverage, and buyer churn.

              Authentication center concentration creates a separate operational continuity risk. All four centers are
              operated and staffed by Vestiaire, meaning any disruption—fire, natural disaster, pandemic-style
              lockdowns, strike action, or logistics disruption—could halt processing across an entire geography. The
              company's Brexit-driven UK center opening (January 2022) explicitly acknowledged that 74% of UK fashion
              businesses had experienced setbacks due to Brexit-related cost hikes, suggesting logistical fragility in
              cross-border flows. The platform is hosted by Amazon Web Services France EMEA, as confirmed by Vestiaire's
              legal information page, creating cloud concentration risk on a single hyperscaler.

              Technology risk extends to platform availability during peak periods (Fashion Weeks in Paris, Milan,
              London, New York), when buyer traffic surges. Seller fraud represents an escalating threat: sophisticated
              counterfeit operations continuously probe authentication systems, and machine learning authentication
              models require constant updates to remain effective against evolving forgery techniques.
              Anti-money-laundering (AML) risk is also present: the high transaction values on the platform (items
              regularly exceeding €5,000–€50,000) attract regulatory attention given FATF guidance on luxury goods as a
              vehicle for financial crime. Vestiaire has not publicly disclosed any AML/KYC compliance program, creating
              potential regulatory blind spots.
