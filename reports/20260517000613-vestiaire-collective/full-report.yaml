      - number: '8.4'
        title: Exhibits
        blocks:
          - type: callout
            title: 'Track: Wait for Profitability Signal or Valuation Reset'
            body: >
              Vestiaire Collective is a category-defining European luxury resale brand with real authentication
              infrastructure, Kering strategic alignment, and structural tailwinds from circular fashion demand.
              However, its $1.7 billion Series F valuation (March 2021) is materially stale relative to the 2026 private
              market landscape. Public luxury resale comparables trade at 1.5–1.65× revenue (REAL, TDUP), while
              Vestiaire's implied multiple of 4–6× is only justifiable if the company demonstrates a clear path to
              profitability. We recommend tracking with re-entry triggers at: (1) confirmed EBITDA break-even, (2) a new
              round at <$1 billion that resets the basis, or (3) an IPO S-1 filing that anchors public market pricing.
              The new CEO's investment banking background (Lazard, Goldman Sachs) signals a potential liquidity event
              within 18–36 months.
            calloutType: recommendation
            claimRefs:
              - CV001
              - CV003
              - CV006
              - CV007
          - type: callout
            title: The $1.7B Valuation Is 2021-Era and Likely Needs a 30–60% Reset
            body: >
              The $1.7 billion Series F valuation was established during peak private market exuberance in March 2021.
              Since then: The RealReal's market cap fell from ~$4B to $1.09B before partially recovering; ThredUp's
              market cap peaked above $3B and now sits at $529M; Depop was resold by Etsy to eBay for $1.2B (down 25%
              from Etsy's 2021 acquisition price of $1.6B); Poshmark was acquired for $1.2B after trading at $3B+ at its
              January 2021 IPO. Vestiaire's crowdfunding of only €3.5M in February 2024 is a strong signal that
              institutional capital markets are not comfortable funding new rounds at or near the 2021 valuation.
              Without a fresh transaction to anchor the price, all analysis must treat $1.7B as a ceiling rather than a
              floor in 2026 conditions.
            calloutType: risk
            claimRefs:
