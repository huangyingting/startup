      - number: '1.4'
        title: Leadership, Governance, and Organizational Challenges
        blocks:
          - type: paragraph
            body: >-
              Vestiaire Collective has undergone significant leadership transitions since its founding. Sébastien Fabre,
              one of the six original co-founders, served as CEO from the company's inception in 2009 until 2022,
              guiding the platform through its earliest growth phases and multiple funding rounds over thirteen years.
              In 2022, Maximilien Dodin was appointed as the new CEO, bringing fresh external leadership to the
              company's post-unicorn growth phase. Co-founder Fanny Moizant continues to serve as President, and
              co-founder Sophie Hersan remains active as Fashion Director, providing continuity of the founding vision
              and editorial identity.


              According to Wikipedia's most recent update (September 2024), Bernard Osta is listed as the current CEO,
              with approximately 600 employees reported for 2024. This represents a further leadership transition
              following Dodin's tenure that likely occurred in 2023 or 2024. A second CEO succession within two years of
              the initial founder handoff signals ongoing governance evolution as the company matures from a founder-led
              startup into a professionally managed scale-up operating at a billion-dollar-plus valuation.


              In 2023, Vestiaire Collective conducted a notable workforce reduction, cutting staff amid a broader
              cost-rationalization effort that swept through the European technology sector. This was consistent with a
              pattern seen across late-stage tech companies that had expanded headcount aggressively during 2020–2022
              and then faced pressure to reduce operating burn rates as interest rates rose and late-stage
              private-company valuations compressed globally. The layoffs generated adverse press coverage and surfaced
              employee concerns about company direction. Customer review platforms also reflect mixed experiences, with
              recurring complaints about authentication delays, shipping issues, and dispute resolution processes,
              representing a reputational risk that requires ongoing operational attention.
