      - number: '4.2'
        title: Unit Economics and Cost Structure
        blocks:
          - type: paragraph
            body: >
              PrivCo estimates Vestiaire Collective's gross margin at approximately 50%, materially below the 74.59%
              reported by The RealReal (FY2025) and 79.39% by ThredUp (FY2025). The gap is plausible given Vestiaire's
              physical authentication infrastructure: four authentication centers (Tourcoing, Crawley, Hong Kong,
              Brooklyn) that together process a large volume of items — Crawley alone was designed for up to 1,000 items
              per day. Labor- intensive inspection, photographing, and quality control at authentication centers are the
              primary COGS drivers.


              The RealReal's gross margin trajectory is instructive: it improved from 68.5% (FY2023) to 74.59% (FY2025)
              as the company scaled and shifted more volume to its consignment model, while also raising auction fees.
              Vestiaire may be on a similar trajectory, but without audited data the current margin level is
              unverifiable. The 50% gross margin estimate, if accurate, implies ~$190M in gross profit on $380M revenue
              — enough to fund platform costs but requiring significant improvement to support an IPO-grade EBITDA
              margin.


              Customer acquisition cost (CAC) and payback periods are not disclosed by Vestiaire. The RealReal had 1.06M
              active buyers and $594 AOV in FY2025 with a positive FCF profile; Vestiaire's comparable buyer metrics are
              unknown. US sales growth of 75% per year for two years prior to the Tradesy acquisition suggests strong
              organic growth dynamics, but the Tradesy integration diluted unit economics through combined membership
              expansion rather than organic CAC efficiency. ThredUp's FY2025 gross margin of 79.39% is the highest among
              comps but reflects a mass-market model with lighter authentication overhead.
