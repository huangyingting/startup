      - number: '2.5'
        title: Exhibits
        blocks:
          - type: callout
            title: Luxury Resale Tailwinds Are Structural, Not Cyclical
            body: >-
              The $393B global secondhand apparel market projection (ThredUp 2026) and the independent BCG $360B
              estimate (via WWD) both point to structural demand growth anchored in sustainability awareness, luxury
              price inflation, and Gen Z brand participation via resale. Vestiaire is well-positioned geographically
              (70+ countries) and operationally (AI curation, four authentication hubs) to capture this tailwind,
              especially in the European market where B Corp certification and the fast fashion ban reinforce the
              brand's sustainability positioning.
            calloutType: strength
            claimRefs:
              - CM001
              - CM002
              - CM003
              - CM004
              - CM010
          - type: callout
            title: Profitability Remains Elusive in Authenticated Luxury Resale at Scale
            body: >-
              The RealReal's 10-K reveals it still posted a net loss of $41.8 million in FY2025 despite being the
              world's largest authenticated luxury resale platform and generating approximately $600 million in revenue.
              This illustrates the structural cost challenge of running authentication, fulfilment, and customer
              acquisition at scale. Vestiaire faces the same economics without the benefit of public market capital or
              disclosed metrics to signal its own progress toward profitability.
            calloutType: risk
            claimRefs:
              - CM027
              - CM028
              - CM030
          - type: callout
            title: RaaS as a Defensive Moat and a Revenue Diversification Vector
            body: >-
              Vestiaire's Resale-as-a-Service model — with 12+ luxury brand partners including Burberry, Ganni,
              Alexander McQueen, and Chloé — represents both a defensive moat against brand-owned resale programmes and
              a B2B revenue line less exposed to consumer demand cycles. If successfully scaled, RaaS could also
              accelerate supply without the incremental cost of C2C consignor acquisition, improving the unit economics
              profile that constrains luxury resale profitability broadly.
            calloutType: insight
            claimRefs:
