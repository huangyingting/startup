  - number: 6
    title: Customers
    sections:
      - number: '6.1'
        title: Customer Segmentation and Demographics
        blocks:
          - type: paragraph
            body: >
              Vestiaire Collective's community encompasses two primary role types—buyers and sellers—though many members
              occupy both roles at different times. The platform does not publicly disclose its buyer-seller ratio, but
              industry estimates and third-party review site demographics suggest approximately 60–65% of registered
              members have made at least one purchase, while roughly 40–45% have listed at least one item for sale.


              The buyer profile centers on women aged 25–55 (confirmed by the VP of Customer Service in a 2026 interview
              with Stratégies magazine, who stated the average basket is 350 euros). Aspirational and
              upper-middle-income consumers dominate: they seek authenticated Chanel, Hermès, Gucci, Louis Vuitton,
              Prada, and Bottega Veneta at 30–70% discounts versus new retail prices. A subset of premium
              buyers—primarily 35–50-year-olds with established luxury budgets—concentrates on high-value handbags and
              watches, generating a disproportionate share of GMV. Gen Z and younger millennials (18–30) represent a
              fast-growing aspirational segment that uses secondhand luxury as a gateway to brand ownership they cannot
              yet afford at retail prices; ThredUp's 2026 Resale Report confirms Gen Z drives the fastest-growing
              participation in the secondhand market globally.


              The seller profile is similarly varied. Casual sellers—individuals clearing wardrobes or recycling luxury
              gifts—constitute the largest group by count but typically list only a few items per year. Professional
              sellers (commercial resellers, vintage boutiques, and luxury arbitrageurs) list in high volumes, often use
              Vestiaire's pro-seller programs, and tend to specialize in categories such as bags, watches, and jewelry.
              A meaningful and strategically valuable segment is the "seller-buyer"—a fashion enthusiast who sells to
              fund new purchases, creating a virtuous circular commerce loop that benefits platform engagement and GMV.


              Geographically, Vestiaire's home market of France historically accounted for the largest share of users,
              but the platform has been expanding rapidly. France, the UK, and the US were cited as the three core
              markets as of 2022, with the US growing fastest, up 75% per year in 2020–2021 (Glossy.co). Following the
              2022 acquisition of US-based Tradesy, North American presence was significantly bolstered.
              Asia—particularly South Korea, Hong Kong, and Singapore—represents a growing but still smaller segment.
              The platform operates in over 70 countries across nine languages, with dedicated authentication centers in
              Tourcoing (EU), Crawley (UK), Hong Kong, and Brooklyn (North America).


              Top categories by transaction volume are handbags (largest GMV share), shoes, clothing, jewelry, and
              watches. Leading brands include Chanel, Hermès, Louis Vuitton, Gucci, Prada, Dior, Bottega Veneta, and
              Balenciaga—all categories where authentication risk is high and provenance matters to buyers.
            claimRefs:
