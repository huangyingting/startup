      - number: '4.4'
        title: Financial Evidence Gaps and Diligence Verdict
        blocks:
          - type: paragraph
            body: >
              Vestiaire Collective's financial profile is almost entirely opaque. The most material gaps are: (1) no
              public seller commission rate, preventing any independent GMV-to-revenue modeling; (2) no audited
              financials for any year, making the PrivCo revenue and margin estimates unverifiable; (3) no cash position
              or burn rate disclosure, leaving runway assessment impossible; and (4) no EBITDA progression data,
              preventing evaluation of the stated profitability path.


              From a diligence verdict standpoint: the revenue model is structurally sound — consignment marketplaces
              with authentication moats are proven at scale (The RealReal, Vinted). The global secondhand apparel market
              projected at $393B by 2030 provides an addressable tailwind. However, Vestiaire Collective's luxury
              positioning, physical authentication infrastructure, and multi-geography footprint create higher unit
              costs than mass-market comps, and its gross margin (~50% estimated) lags peers by 25–30 percentage points
              before improvement.


              Revenue quality is moderate: consignment commissions are transactional and volume-correlated, with no
              subscription or contract base. Authentication fee revenue is opt-in and attachment-rate-dependent,
              creating revenue variability. The fast-fashion ban, while strategically sound for brand positioning,
              permanently shrinks addressable GMV and was a deliberate trade-off of volume for quality. Authentication
              failure complaints from consumer reviews indicate a quality gap that, if systemic, could compress both
              margin (through refunds) and conversion (through reduced buyer trust). Capital adequacy cannot be assessed
              without direct management engagement.
