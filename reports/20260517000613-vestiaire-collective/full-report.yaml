      - number: '5.3'
        title: Technology Architecture and Infrastructure
        blocks:
          - type: paragraph
            body: >-
              Vestiaire Collective's technology organization is led by Chief Technology and Product Officer (CTPO)
              Stacia Carr, recruited in 2024, who previously held senior technology roles at Zalando and SoundCloud. The
              board benefits from technology advisory input from Jim Freeman, former CTO at Zalando and VP of Prime
              Video and Alexa at Amazon, who was added specifically to guide product and infrastructure strategy. The
              company employs an estimated 600 total staff (2024) with the engineering and product function representing
              a significant share, consistent with a marketplace at this scale.

              The platform's technology stack — inferred from job listings, the StackShare profile, the engineering blog
              (limited public visibility), and comparable marketplace architectures — is built around a mobile-first,
              cloud-hosted microservices architecture. Consumer interfaces include iOS (Swift and/or React Native),
              Android (Kotlin and/or React Native), and a web frontend (React-based). Backend services use RESTful APIs
              with an Elasticsearch-powered search and discovery layer that handles category, brand, size, and condition
              filters across 5M+ live listings. The ML/AI layer is the platform's proprietary core: computer vision
              models support image-based search (including the visual similarity widget), and AI-powered price
              recommendation incorporates item condition, brand desirability, current supply/demand, and historical
              transaction data from over 10 years of marketplace activity. Payment processing is multi-currency across
              30+ currencies, supported by payment gateway partners (Stripe, Adyen, or equivalent). Cloud infrastructure
              is multi-region to serve the platform's 70+ country user base; the company explicitly measures cloud
              hosting Scope 3 emissions and uses the Aktio carbon calculation platform for environmental accounting
              across its digital footprint. A forthcoming image search feature (announced October 2024, planned for late
              2024/early 2025 launch) will allow buyers to upload a photograph and receive visually similar matches from
              the full inventory, analogous to Google Lens applied to luxury fashion.

              The platform supports 9+ languages (English, French, German, Italian, Spanish, Swedish, Dutch, Korean,
              Traditional Chinese) and multi-currency checkout, making it among the more internationally mature fashion
              resale technology stacks in the market. The "similar items" widget demonstrates the commercial impact of
              AI: doubling of item sales through that discovery surface validates the return on ML investment. With 22%
              of one-time buyers and 17% of repeat buyers previously struggling to find desired items, AI-enhanced
              search is both a retention and conversion lever.
