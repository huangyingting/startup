          value: 8 / 10
          unit: score
          detail: >-
            Luxury resale is a structural growth market; REAL's $2.13B FY2025 GMV growing 16%; Vinted €10.8B GMV growing
            47%; total market $40–50B+
          trend: up
        - label: Competitive Position
          value: 7 / 10
          unit: score
          detail: >-
