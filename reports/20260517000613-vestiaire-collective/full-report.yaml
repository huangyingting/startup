  - number: 3
    title: Competitors
    sections:
      - number: '3.1'
        title: Competitive Landscape Overview
        blocks:
          - type: paragraph
            body: >-
              The global luxury fashion resale market is contested by at least three distinct competitor tiers. The
              first tier—authenticated luxury resale—is dominated by Vestiaire Collective and The RealReal, both of
              which operate end-to-end authentication, professional photography, and curated listings. The RealReal
              (NASDAQ: REAL) is the market benchmark: founded in 2011, it generated approximately $692.85M in 2025
              revenue, achieved roughly $1.8B GMV in 2024, and carries approximately 38 million registered members. The
              RealReal reached full-year profitability at the end of 2024. Fashionphile and Rebag occupy a sub-niche
              within this tier, focusing exclusively on ultra-luxury handbags and accessories with proprietary buy-back
              and consignment models; Fashionphile reported a 67% jump in profits in 2024.

              The second tier is mass-market peer-to-peer and social commerce. Poshmark (Naver subsidiary since January
              2023; 80M+ users, 130M+ community members) and Depop (being acquired by eBay from Etsy in early 2026)
              target younger, price-sensitive buyers with limited authentication and lower average order values. ThredUp
              (NASDAQ: TDUP, 2025 revenue $310.81M) competes further down-market with a high-take-rate consignment model
              designed for mass secondhand apparel.

              The third tier consists of sneaker-first and streetwear platforms that have expanded toward luxury: GOAT
              Group (private, $3.7B valuation as of 2021 Series F) and StockX (private, $3.8B valuation 2021) both
              authenticate physical goods but concentrate on footwear, streetwear, and electronics, with increasing
              luxury assortment. Vestiaire's luxury-only curation and European identity provide meaningful separation
              from all three tiers, though the boundaries are eroding as GOAT expands its luxury handbag and apparel
              selection and as brands experiment with first-party resale.
