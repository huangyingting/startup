  - number: 4
    title: Financials
    sections:
      - number: '4.1'
        title: Revenue Model and Pricing Architecture
        blocks:
          - type: paragraph
            body: >
              Vestiaire Collective operates a consignment-style marketplace where sellers list items and pay a
              commission upon successful sale. The exact commission rate is not publicly disclosed, but the platform's
              revenue model closely resembles The RealReal's — which achieved a 37.7% take rate (revenue / GMV) in
              FY2025, split as approximately 77% consignment commission, 13% direct purchase, and 10% shipping and
              services. Applying a comparable range of 25–38% to PrivCo's estimated 2024 GMV implies Vestiaire's gross
              revenue is broadly consistent with the $380M PrivCo estimate.


              Authentication is a distinct revenue layer. Items valued over €1,000 are automatically authenticated at no
              additional charge (cost bundled into commission). Items under €1,000 can opt in to physical authentication
              at €15 per item. This opt-in model differs from The RealReal's mandatory authentication approach and
              creates a two-tiered trust dynamic: buyers of lower-value items must actively elect verification. The
              platform also offers a concierge service that handles listing, professional photography, and item
              descriptions on behalf of sellers — a fee-bearing upsell that has no disclosed pricing or attachment rate.


              A pre-paid shipping label system means Vestiaire manages some logistics coordination; however, unlike
              Vinted's Vinted Go logistics business, the shipping margin contribution is not separately disclosed and
              appears bundled with the overall service relationship. Revenue quality is weighted toward consignment
              commissions that are transactional and volume-dependent, with secondary contributions from authentication
              fees and concierge services whose scale is unknown.
