      - number: '1.3'
        title: Funding History and Investor Ecosystem
        blocks:
          - type: paragraph
            body: >-
              Vestiaire Collective has raised approximately $600 million or more in total equity funding across multiple
              rounds since its founding in 2009. The company's most significant funding event was its Series F in March
              2021, when it raised $216 million at a post-money valuation of approximately $1.7 billion, officially
              achieving unicorn status. The Series F round was led by Tiger Global Management, a prominent
              technology-focused hedge fund and growth equity investor, with strategic participation from Kering — the
              French luxury group that owns brands including Gucci, Saint Laurent, Bottega Veneta, and Balenciaga. This
              dual participation of a technology-focused growth investor and a major luxury conglomerate underscored
              Vestiaire Collective's positioning at the intersection of fashion and technology and validated both the
              financial opportunity and the strategic relevance of the luxury resale market.


              Kering's involvement predates the Series F. The luxury group first invested in Vestiaire Collective during
              the company's Series E round in 2019, signaling the luxury industry's growing acceptance of resale as a
              complementary channel. Other key investors include Balderton Capital (an early European venture capital
              backer that participated in earlier rounds), Eurazeo (a French private equity firm that supported European
              scaling), and Condé Nast (the global media group, a strategic investor providing editorial reach and
              fashion-audience marketing synergies). These backers collectively reflect both financial confidence in the
              luxury resale market's secular growth and strategic positioning by luxury and media incumbents.


              The investor base presents a nuanced dynamic: Kering's stake, while providing validation and potential
              commercial synergies, also raises legitimate questions about conflicts of interest — as Kering
              simultaneously manufactures and sells new luxury goods while holding equity in a marketplace that competes
              for consumer wallet share with those same new goods.
