  topStrengths:
    - Dominant European luxury resale brand with strong Gen Z and millennial appeal and 15+ years of market leadership
    - Strategic Kering investment (Gucci/Balenciaga/YSL parent) provides brand validation and potential M&A optionality
    - >-
      Authentication-first model with AI pre-screening and physical expert centers drives trust and premium positioning
      vs. unverified platforms
    - Structural market tailwind from sustainability megatrend; pre-loved luxury growing 3–5× faster than new luxury
  topRisks:
    - >-
      The RealReal and GOAT pose significant US market competition with similar authentication infrastructure and
      growing luxury credentials
    - >-
      High authentication cost structure (physical centers, 100+ experts) pressures take-rate economics; The RealReal
      loses ~$160M/year on similar model
    - >-
      Dependency on luxury fashion cycle and macroeconomic sensitivity; luxury goods are discretionary purchases
      vulnerable to recession
    - >-
      Kering's dual role as strategic investor and owner of competing Gucci-Vault resale program creates unresolved
      conflict of interest
    - >-
      EU regulatory exposure: GDPR, DSA, and EU AI Act create compounding compliance burden with fines up to 4–6% of
      global revenue
  unresolvedGaps:
    - Actual GMV, revenue run rate, and take rate by category — all private and unconfirmed
    - Path to profitability, burn rate, and cash runway
    - Kering partnership commercial terms and equity stake percentage
    - Authentication failure rate and quality assurance metrics
    - Geographic revenue mix and seller/buyer retention cohort data
    - Cap table, option pool, and anti-dilution provisions
