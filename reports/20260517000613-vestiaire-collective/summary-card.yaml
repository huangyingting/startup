  headline: >-
    Vestiaire Collective is the leading European luxury resale unicorn with strong brand positioning, a Kering strategic
    relationship, and a sustainability narrative resonating with younger luxury consumers, but its $1.7B (2021)
    valuation looks stretched against public comparables and its path to profitability remains unconfirmed.
