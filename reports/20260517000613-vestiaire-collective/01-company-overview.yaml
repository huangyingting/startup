callouts:
  - type: "risk"
    title: "Rapid CEO Turnover"
    body: "Vestiaire Collective has experienced at least two CEO successions within approximately two years (Fabre to Dodin in 2022, Dodin to Osta per Wikipedia by September 2024). Frequent senior leadership change at the post-unicorn stage can signal internal misalignment, investor pressure, or strategic uncertainty, and may impede execution of long-term growth initiatives."
    claimRefs: [CO023, CO024, CO025]
  - type: "risk"
    title: "Kering Conflict of Interest"
    body: "Kering's dual role as a luxury goods manufacturer and a strategic equity investor in Vestiaire Collective creates a structural conflict of interest: Kering's own brands (Gucci, Saint Laurent, Balenciaga) benefit from primary new-goods sales while Kering simultaneously holds equity in a resale platform that may compete for the same consumer budget."
    claimRefs: [CO022, CO030]

