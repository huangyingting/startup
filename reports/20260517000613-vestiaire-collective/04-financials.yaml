  title: Financials
  summary: >
    Vestiaire Collective is a private company without public financial disclosures; all revenue and margin figures are
    third-party estimates. PrivCo estimates 2024 revenue at $380M (+25% from 2023's ~$250M) on a ~50% gross margin.
    The company has raised $600M+ to date at a peak valuation of €1.4B (2022), declining to €1.1B in a January 2024
    crowdfunding round; management targeted profitability by end of 2024 and an IPO as the next milestone, but neither
    has been publicly confirmed. The nearest public comps — The RealReal (FY2025 revenue $692.85M, EBITDA margin 1.31%)
    and ThredUp (FY2025 revenue $310.81M, EBITDA margin -2.84%) — show that luxury and mass-market resale platforms
    require years of scale investment before reaching sustainable profitability.

