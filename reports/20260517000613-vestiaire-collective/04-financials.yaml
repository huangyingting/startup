          to: auth-fee-revenue
          label: €15 opt-in fee (items <€1K)
        - from: gmv
          to: concierge-shipping-revenue
          label: Optional services
        - from: commission-revenue
          to: gross-revenue
          label: Added to revenue
        - from: auth-fee-revenue
          to: gross-revenue
          label: Added to revenue
        - from: concierge-shipping-revenue
          to: gross-revenue
          label: Added to revenue
        - from: gross-revenue
          to: authentication-costs
          label: COGS deducted
        - from: authentication-costs
          to: gross-profit
          label: Net after COGS
