  evidenceGaps:
    - type: private-evidence-only
      severity: blocking
      topic: seller commission rate and revenue mix
      missingEvidence: >-
        Vestiaire Collective does not disclose its seller commission rate, buyer fee schedule, or the revenue split
        between commission income, authentication fees, concierge services, and shipping. The take rate cannot be
        independently verified without GMV disclosure.
      whyItMatters: >-
        Cannot model revenue from GMV or assess revenue quality (recurring vs. transactional) without the commission
        rate; pricing is the most fundamental underwriting input for a marketplace.
      diligencePath: >-
        Request management presentation with fee schedule by item category and geography; request confidential GMV
        bridge showing revenue by stream.
      relatedQuestionRefs:
        - QI002
        - QI009
    - type: private-evidence-only
      severity: blocking
      topic: audited financials and profitability status
      missingEvidence: >-
        No audited or investor-disclosed FY2024 or FY2025 financials are publicly available. The January 2024
        profitability target has not been confirmed or refuted. Revenue figures from PrivCo ($380M, 2024) are estimates
        that have not been corroborated by any primary source.
      whyItMatters: >-
        The core investment thesis (profitability path to IPO) cannot be evaluated without at minimum reviewed P&L
        data. Unconfirmed profitability would push the IPO timeline significantly beyond current assumptions.
      diligencePath: >-
        Request audited FY2023 and FY2024 consolidated financial statements; obtain Q4 2025 management accounts
        showing revenue, EBITDA, and net income trajectory.
      relatedQuestionRefs:
        - QI003
        - QI004
        - QI026
    - type: private-evidence-only
      severity: material
      topic: cash position and burn rate
      missingEvidence: >-
        Vestiaire Collective's cash position, monthly cash burn, and debt schedule are not publicly disclosed. No
        credible public estimate exists for runway duration.
      whyItMatters: >-
        Capital adequacy cannot be independently assessed; if the company is still burning cash, the next round size
        and timing are unknown inputs that affect dilution assumptions and exit timing.
      diligencePath: >-
        Obtain audited balance sheet from most recent period; request CFO letter summarizing cash, debt, and runway
        under base case projections.
      relatedQuestionRefs:
        - QI005
        - QI025
    - type: missing-source
      severity: material
      topic: authentication failure rates and refund costs
      missingEvidence: >-
        No quantitative data on authentication failure rates (items incorrectly passed as authentic), associated
        refund rates, or service delivery costs per authenticated item is publicly available. Consumer complaints
        exist but do not quantify systemic rates.
      whyItMatters: >-
        Authentication quality is the core value proposition of premium luxury resale; systemic failures create brand
        liability and margin risk (refunds, reversals, reprocessing costs) that are not captured in gross margin
        estimates.
      diligencePath: >-
        Request internal quality control data: return rate by authentication type (opt-in vs. auto), refund
        processing cost per item, and dispute resolution volume.
      relatedQuestionRefs:
        - QI008
    - type: private-evidence-only
      severity: minor
      topic: cap table anti-dilution and debt obligations
      missingEvidence: >-
        No information is publicly available on anti-dilution protections, liquidation preferences, or debt/credit
        facilities. The valuation decline from $1.7B to €1.1B between 2022 and 2024 suggests down-round dynamics
        that may have triggered protective provisions.
      whyItMatters: >-
        Cap table structure affects exit distribution and dilution; anti-dilution or ratchet provisions could
        significantly affect equity value available to new investors.
      diligencePath: >-
        Request cap table and term sheet for the most recent funding round; review investor rights agreement for
        liquidation preferences and anti-dilution clauses.
      relatedQuestionRefs:
        - QI017

sections:
  - id: rev-model
    title: Revenue Model and Pricing Architecture
    body: >
      Vestiaire Collective operates a consignment-style marketplace where sellers list items and pay a commission upon
      successful sale. The exact commission rate is not publicly disclosed, but the platform's revenue model closely
      resembles The RealReal's — which achieved a 37.7% take rate (revenue / GMV) in FY2025, split as approximately
      77% consignment commission, 13% direct purchase, and 10% shipping and services. Applying a comparable range of
      25–38% to PrivCo's estimated 2024 GMV implies Vestiaire's gross revenue is broadly consistent with the $380M
      PrivCo estimate.


      Authentication is a distinct revenue layer. Items valued over €1,000 are automatically authenticated at no
      additional charge (cost bundled into commission). Items under €1,000 can opt in to physical authentication at
      €15 per item. This opt-in model differs from The RealReal's mandatory authentication approach and creates
      a two-tiered trust dynamic: buyers of lower-value items must actively elect verification. The platform also
      offers a concierge service that handles listing, professional photography, and item descriptions on behalf of
      sellers — a fee-bearing upsell that has no disclosed pricing or attachment rate.


      A pre-paid shipping label system means Vestiaire manages some logistics coordination; however, unlike Vinted's
      Vinted Go logistics business, the shipping margin contribution is not separately disclosed and appears bundled
      with the overall service relationship. Revenue quality is weighted toward consignment commissions that are
      transactional and volume-dependent, with secondary contributions from authentication fees and concierge services
      whose scale is unknown.
    claimRefs:
      - CI005
      - CI006
      - CI007
      - CI024
      - CI025
      - CI029
    callouts:
      - type: risk
        title: Commission Rate Is the Pivotal Unknown
        body: >-
          Without the seller commission rate, it is impossible to independently calculate GMV from revenue or model
          revenue sensitivity to volume changes. This is the single most important undisclosed financial input.
        tone: risk
    tableRefs:
      - TI001
      - TI002
    figureRefs:
      - FI001
  - id: unit-econ
    title: Unit Economics and Cost Structure
    body: >
      PrivCo estimates Vestiaire Collective's gross margin at approximately 50%, materially below the 74.59% reported
      by The RealReal (FY2025) and 79.39% by ThredUp (FY2025). The gap is plausible given Vestiaire's physical
      authentication infrastructure: four authentication centers (Tourcoing, Crawley, Hong Kong, Brooklyn) that
      together process a large volume of items — Crawley alone was designed for up to 1,000 items per day. Labor-
      intensive inspection, photographing, and quality control at authentication centers are the primary COGS drivers.


      The RealReal's gross margin trajectory is instructive: it improved from 68.5% (FY2023) to 74.59% (FY2025) as
      the company scaled and shifted more volume to its consignment model, while also raising auction fees. Vestiaire
      may be on a similar trajectory, but without audited data the current margin level is unverifiable. The 50%
      gross margin estimate, if accurate, implies ~$190M in gross profit on $380M revenue — enough to fund platform
      costs but requiring significant improvement to support an IPO-grade EBITDA margin.


      Customer acquisition cost (CAC) and payback periods are not disclosed by Vestiaire. The RealReal had 1.06M
      active buyers and $594 AOV in FY2025 with a positive FCF profile; Vestiaire's comparable buyer metrics are
      unknown. US sales growth of 75% per year for two years prior to the Tradesy acquisition suggests strong
      organic growth dynamics, but the Tradesy integration diluted unit economics through combined membership
      expansion rather than organic CAC efficiency. ThredUp's FY2025 gross margin of 79.39% is the highest among
      comps but reflects a mass-market model with lighter authentication overhead.
    claimRefs:
      - CI019
      - CI020
      - CI021
      - CI024
      - CI025
      - CI026
      - CI027
      - CI030
      - CI031
      - CI032
      - CI038
    callouts:
      - type: assumption
        title: Gross Margin Estimate Is Low-Confidence
        body: >-
          The ~50% gross margin figure is from PrivCo, which derives estimates from limited public data. Actual
          gross margin may differ materially; audited P&L would be the definitive source.
        tone: neutral
    tableRefs:
      - TI003
    figureRefs:
      - FI002
      - FI003
  - id: capital-adequacy
    title: Capital Adequacy and Financing Path
    body: >
      Vestiaire Collective has raised over $600 million since 2015 across multiple rounds, with investors including
      Eurazeo (approximately 25% stake, largest shareholder), Kering (approximately 5% strategic stake), SoftBank,
      Tiger Global, Condé Nast, and Generation Investment Management. The company's valuation has undergone a
      meaningful reset: from a $1.7 billion post-Tradesy valuation in March 2022, to approximately €1.4 billion
      mid-2022, to €1.1 billion ($1.2B) at the January 2024 crowdfunding round. The crowdfunding raised only ~€3.5M
      — a token amount — suggesting it was primarily a brand and community-building exercise rather than a primary
      capital raise.


      Management explicitly conditioned an IPO on achieving profitability first. In January 2024, Reuters reported the
      company aimed to be profitable by end of 2024. As of May 2026, no public confirmation of that milestone has
      appeared. The October 2025 appointment of Bernard Osta — the former CFO — as CEO signals that financial
      discipline and IPO preparation have become the dominant management priority. Osta's investment banking
      background from Lazard and Goldman Sachs is consistent with pre-IPO positioning.


      Cash position, burn rate, and debt schedule are entirely undisclosed. With no public filing requirement as a
      French private company, and no recent primary equity round, the true capital adequacy of Vestiaire is
      unverifiable without direct management access. The RealReal required approximately three fiscal years of
      improvement to move from -$134.6M EBITDA (FY2023) to +$9.07M EBITDA (FY2025), illustrating how long the
      profitability journey can take even for a well-resourced public-market comp.
    claimRefs:
      - CI009
      - CI012
      - CI013
      - CI014
      - CI016
      - CI017
      - CI018
      - CI027
      - CI034
      - CI040
      - CI041
    callouts:
      - type: risk
        title: Valuation Down-Round Is Unreresolved
        body: >-
          A drop from $1.7B (March 2022) to €1.1B (January 2024) represents a 35%+ decline. Anti-dilution provisions
          from prior rounds may affect the effective cap table structure and exit economics for new investors.
        tone: risk
    tableRefs:
      - TI004
    figureRefs:
      - FI004
  - id: evidence-gaps
    title: Financial Evidence Gaps and Diligence Verdict
    body: >
      Vestiaire Collective's financial profile is almost entirely opaque. The most material gaps are: (1) no public
      seller commission rate, preventing any independent GMV-to-revenue modeling; (2) no audited financials for any
      year, making the PrivCo revenue and margin estimates unverifiable; (3) no cash position or burn rate
      disclosure, leaving runway assessment impossible; and (4) no EBITDA progression data, preventing evaluation of
      the stated profitability path.


      From a diligence verdict standpoint: the revenue model is structurally sound — consignment marketplaces with
      authentication moats are proven at scale (The RealReal, Vinted). The global secondhand apparel market projected
      at $393B by 2030 provides an addressable tailwind. However, Vestiaire Collective's luxury positioning,
      physical authentication infrastructure, and multi-geography footprint create higher unit costs than mass-market
      comps, and its gross margin (~50% estimated) lags peers by 25–30 percentage points before improvement.


      Revenue quality is moderate: consignment commissions are transactional and volume-correlated, with no
      subscription or contract base. Authentication fee revenue is opt-in and attachment-rate-dependent, creating
      revenue variability. The fast-fashion ban, while strategically sound for brand positioning, permanently shrinks
      addressable GMV and was a deliberate trade-off of volume for quality. Authentication failure complaints from
      consumer reviews indicate a quality gap that, if systemic, could compress both margin (through refunds) and
      conversion (through reduced buyer trust). Capital adequacy cannot be assessed without direct management
      engagement.
    claimRefs:
      - CI022
      - CI033
      - CI034
      - CI035
      - CI036
      - CI037
      - CI039
    callouts:
      - type: risk
        title: Cannot Underwrite Financials Without Primary Data Access
        body: >-
          All financial analysis for Vestiaire Collective is based on third-party estimates (PrivCo), comparable
          company analysis (The RealReal, ThredUp), and limited public signals. An investment decision requires
          audited financials, cap table details, and management guidance as minimum diligence inputs.
        tone: risk
    tableRefs:
      - TI005

