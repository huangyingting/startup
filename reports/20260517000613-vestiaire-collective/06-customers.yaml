figures:
  - id: "FU001"
    title: "Buyer Journey Map on Vestiaire Collective"
    type: "journey-map"
    summary: "Typical buyer journey from discovery through repeat purchase on Vestiaire Collective, illustrating the authentication wait as the critical trust-building (or trust-breaking) phase."
    data:
      nodes:
        - id: "j1"
          label: "Awareness"
          detail: "Discovery via Instagram, Pinterest, word-of-mouth, organic search, or influencer post; Vestiaire's sustainability positioning attracts eco-conscious buyers"
        - id: "j2"
          label: "Browse & Wishlist"
          detail: "Search by brand or category; filter by size, color, condition, price; save to wishlist; compare with retail price; platform features 5M+ curated items"
        - id: "j3"
          label: "Purchase Decision"
          detail: "Add to cart; choose Authenticated Shipping (items above €1,000 mandatory) or Direct Shipping (items ≤€1,000, select regions); pay buyer fee (~5%) via card, PayPal, Klarna, or Apple Pay"
        - id: "j4"
          label: "Authentication Wait"
          detail: "Seller ships item to regional auth center (Tourcoing/Crawley/Brooklyn/HK); authentication team inspects within 4 working days; delay can extend to 2–4 weeks if center is backlogged; primary friction point"
        - id: "j5"
          label: "Receive & Verify"
          detail: "Authenticated item shipped with condition confirmation; buyer has 72 hours to report issues; full refund available if item not as described or fails authenticity"
        - id: "j6"
          label: "Review & Re-engage"
          detail: "Rate seller; review platform; browse for next purchase; many buyers become sellers — listing items from own wardrobe to fund purchases; delight factors include 30–70% discount on authenticated luxury, rare vintage finds, avg basket ~350 euros vs. €1,000+ new retail; pain points include authentication wait (2–4 weeks) and 5% buyer fee; repeat triggers are successful auth, price-drop wishlist alerts, and seller proceeds enabling re-purchase"
    claimRefs: [CU001, CU019, CU020, CU022]

