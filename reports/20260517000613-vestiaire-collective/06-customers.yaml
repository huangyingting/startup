    body: "Vestiaire Collective's authentication guarantee is the single most powerful differentiator in the luxury resale market. Among buyers who successfully receive a verified luxury item at 30–70% below retail price, satisfaction is high and repeat purchase intent is strong. Independent validation—including France's Qualiweb #1 'Best Digital Customer Relationship' award (2024, 2026) and Italy's Corriere della Sera 'Best Customer Service' (2025/2026)—confirms institutional recognition of the customer experience quality, even as third-party review platforms reflect a mixed distribution driven by the minority of authentication delay cases."
    claimRefs: [CU024, CU025, CU027]

  - calloutType: "risk"
    title: "Authentication Delays and Customer Service Friction Drive Churn"
    body: "Third-party review platform SmartCustomer (2,807 reviews, 3.9/5) shows authentication delays and customer service responsiveness as the most cited adverse experiences. Reviews from April 2026 cite waits exceeding a month, inability to reach consistent support agents, and uncommitted buyers who make offers without obligation to complete purchase. The VP of Customer Service acknowledged to Stratégies in March 2026 that the company fields 1.2 million contacts per year—roughly one contact per five platform users annually—suggesting meaningful friction volume even as overall satisfaction scores improved post-AI-chatbot deployment."
    claimRefs: [CU019, CU021, CU022, CU023]

