  evidenceGaps:
    - id: "EU001"
      type: private-evidence-only
      severity: material
      topic: "retention-metrics"
      missingEvidence: "Vestiaire Collective has not publicly disclosed NPS score, first-year repeat purchase rate, or cohort-level retention data. The estimated retention rates in FU004 are analyst estimates benchmarked against The RealReal's disclosed figures and luxury resale industry norms."
      whyItMatters: "Without actual cohort retention data, it is impossible to verify whether the authentication guarantee converts first-time buyers into loyal repeat customers at rates sufficient to justify high customer acquisition costs."
      diligencePath: "Request cohort retention analysis from Vestiaire directly (investor relations/commercial diligence); compare to The RealReal's 10-K disclosures; review SimilarWeb or Sensor Tower data for app retention proxy metrics."
      relatedQuestionRefs: [QU005, QU024]

    - id: "EU002"
      type: private-evidence-only
      severity: material
      topic: "buyer-seller-ratio"
      missingEvidence: "Vestiaire Collective has not disclosed the ratio of buyers to sellers among its registered member base, nor the share of members who have completed at least one transaction versus those who are inactive."
      whyItMatters: "The buyer-seller ratio determines whether the platform has supply-demand balance and whether the community is engagement-healthy. A high inactive member count would inflate the headline 'millions of members' figure."
      diligencePath: "Request active user counts broken down by buyer/seller/both from company; check app store data for monthly active user estimates; compare to competitor disclosures."
      relatedQuestionRefs: [QU001, QU003]

    - id: "EU003"
      type: data-not-accessible
      severity: moderate
      topic: "trustpilot-score"
      missingEvidence: "Trustpilot UK and US pages for vestiairecollective.com were inaccessible during research (bot protection). The widely cited 3.5–4.0/5 range from press references was not independently verified during this research pass."
