  evidenceGaps:
    - type: private-evidence-only
      severity: blocking
      topic: financial-statements
      missingEvidence: >-
        Vestiaire Collective has not publicly disclosed audited financial statements (P&L, balance sheet,
        cash flow) for any fiscal year. Revenue, GMV, gross margin, and cash burn figures used in this
        analysis are analyst estimates derived from proxies; actual results could differ materially.
      whyItMatters: >-
        Without audited financials, the entire valuation analysis rests on estimated revenue of $300-450M
        with wide uncertainty bounds. Profitability status (key to any IPO valuation) cannot be independently
        confirmed.
      diligencePath: >-
        Request audited P&L in virtual data room; check French Tribunal de Commerce annual filings
        (comptes annuels) for any statutory disclosure; request management accounts directly.
      relatedQuestionRefs:
        - QV010

    - type: private-evidence-only
      severity: material
      topic: kering-partnership-terms
      missingEvidence: >-
        The commercial terms of Vestiaire's partnership with Kering — including revenue sharing, exclusivity
        provisions, Gucci Vault non-compete clauses, and right-of-first-refusal — are not public. This
        makes it impossible to quantify the conflict-of-interest risk or the value of the strategic
        relationship.
      whyItMatters: >-
        Kering is both an investor (minority stake) and a competitor (Gucci Vault resale platform), creating
        a structural conflict that is unresolvable without the partnership terms. The relationship could
        be a key moat or a key risk depending on the structure.
      diligencePath: >-
        Request shareholder agreement and partnership commercial terms in data room; review Kering annual
        reports for related-party transaction disclosures.

    - type: missing-source
      severity: material
      topic: authentication-quality
      missingEvidence: >-
        No public authentication failure rate (counterfeit escape rate) is disclosed for Vestiaire
        Collective. The rate for The RealReal has been disputed publicly. Without Vestiaire's rate,
        the core operational moat cannot be independently verified.
      whyItMatters: >-
        Authentication is the primary moat and primary cost driver. An error rate above 0.5% would
        trigger brand damage, returns processing costs, and potential regulatory exposure under EU
        product safety rules.
      diligencePath: >-
        Request internal QA audit report; monitor Trustpilot and press for authentication incidents;
        check EU consumer authority (DGCCRF) enforcement actions.

