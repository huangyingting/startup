  - id: "valuation-scenarios"
    title: "Valuation Scenarios and Comparable Analysis"
    body: >
      We build valuation estimates from three methodologies: (1) EV/revenue comparables on public peers,
      (2) precedent transactions in adjacent resale markets, and (3) a scenario analysis with probability
      weighting. All three converge on a base-case fair value of roughly $1.0–1.5 billion — below the
      2021 series price — with significant upside only in a bull scenario where Vestiaire demonstrates
      profitability and scale comparable to Vinted.


      Public comparable analysis: The RealReal (REAL) trades at approximately 1.51× TTM revenue ($1.09 billion
      market cap / $722 million TTM revenue as of May 15, 2026), after achieving its first all-quarters
      positive Adjusted EBITDA year in 2025 ($42 million, 6.1% margin) and guiding for FY2026 revenue of
      $765–780 million. ThredUp (TDUP) trades at approximately 1.65× TTM revenue ($529 million market cap /
      $321 million TTM revenue), with Q1 2026 revenue growth of 14.6% and gross margin of 79.2%. These
      multiples reflect a market that has repriced resale platforms significantly downward from the
      2021 peak when REAL's market cap briefly exceeded $4 billion.


      Private comparable analysis: Vinted — Vestiaire's closest European peer — achieved an €8 billion
      valuation in April 2026 via a secondary share transaction at approximately 7.3× FY2025 revenue
      (€1.1 billion). However, Vinted is structurally differentiated: it generated €62 million net profit
      and €137 million free cash flow in 2025, trades across mass-market and luxury segments in 26+
      markets, and operates logistics and payments infrastructure that generates additional margin. Poshmark
      was acquired by Naver in January 2023 for $1.2 billion at approximately 4.6× FY2020 revenue — a
      steep markdown from its $3 billion+ IPO valuation in January 2021. Depop, acquired by Etsy for
      $1.6 billion in June 2021, was re-sold to eBay in 2026 for $1.2 billion — a 25% markdown. StockX
      last disclosed a $3.8 billion valuation (April 2021) with no updated round since. GOAT last disclosed
      $3.7 billion (2021). Both 2021 peak private multiples are stale and likely inflated.


      Applying 1.5× (public unprofitable comp) to Vestiaire's estimated revenue range of $250–450 million
      yields a fair value of $375–675 million — 60–80% below the 2021 price. Applying 3× (premium for
      private luxury market leadership) yields $750 million–$1.35 billion. Only at 5× (approaching Vinted
      with demonstrated profitability) would Vestiaire's implied fair value approach $1.25–2.25 billion —
      consistent with the 2021 round. The probability-weighted outcome (25% bull at $2.25B, 50% base at
      $1.25B, 25% bear at $0.5B) yields an expected value of approximately $1.3 billion, a modest discount
      to the 2021 price.
