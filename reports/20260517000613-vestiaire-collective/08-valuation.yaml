chapter:
  number: 8
  title: "Valuation"
  summary: >
    Vestiaire Collective's last disclosed valuation of $1.7 billion (March 2021 Series F) looks materially
    stretched against 2026 market conditions. Public luxury resale comparables The RealReal and ThredUp
    trade at 1.5–1.65× TTM revenue as of May 2026, implying a fair-value range of roughly $450–750 million
    for Vestiaire on estimated $300–450 million revenue — a significant discount to the 2021 price.
    Competitor Vinted achieved an €8 billion valuation in April 2026 at ~7× revenue, but does so from a
    position of profitability and scale that Vestiaire has not yet publicly demonstrated. We rate the
    investment "track": monitor for a clear profitability signal or valuation reset before committing capital.

sections:
  - id: "investment-thesis"
    title: "Investment Thesis and Recommendation"
    body: >
      Vestiaire Collective is a compelling European luxury resale brand with genuine network effects,
      authentication infrastructure, Kering strategic alignment, and a Gen Z sustainability narrative that
      serves as a structural demand driver. Founded in 2009 and operating in 70+ countries with over
      5 million curated items and 30,000 new listings daily, the platform has built a meaningful moat in
      the European pre-loved luxury segment. The October 2025 CEO transition — with former CFO and
      investment banker Bernard Osta succeeding Maximilian Bittner — brings capital markets experience
      that may signal a near-term liquidity event (IPO or strategic sale).


      Despite these strengths, a recommendation of "invest" cannot be justified at or near the 2021
      price of $1.7 billion. The valuation was established at peak private market exuberance in March 2021,
      when Vestiaire raised $216 million in a Series F led by SoftBank and Generation Investment Management,
      with Kering as a strategic co-investor. Since then, the private market has re-rated dramatically: peer
      public companies The RealReal (REAL) and ThredUp (TDUP) trade at roughly 1.5× and 1.65× trailing
      revenue respectively as of May 2026, while Vestiaire's implied 2021 multiple was approximately
      4–6× estimated revenue — a 2.5–4× premium that is hard to sustain without demonstrated profitability.


      Our investment recommendation is "track" with a 6.5/10 overall score. Confidence is medium because
      Vestiaire is a private company with no public financial disclosures; all revenue estimates are derived
      from GMV proxy calculations and industry benchmarks. The risk rating is high. The single most important
      catalyst to upgrade toward "buy" would be a confirmed path to EBITDA break-even, mirroring The RealReal's
      trajectory toward profitability (Adj. EBITDA of $42 million in FY2025, first year positive in all quarters).
      The single most likely downgrade trigger is a new funding round priced below $1 billion, which would
      signal a formal down-round valuation reset in line with current market conditions.
