  evidenceGaps:
    - type: private-evidence-only
      severity: blocking
      topic: authentication-error-rate
      missingEvidence: >-
        Vestiaire Collective's actual authentication failure rate — the percentage of physically authenticated
        items subsequently confirmed as counterfeit — is not publicly disclosed. This is the single most
        critical operational risk metric for the platform and cannot be estimated from public sources.
      whyItMatters: >-
        Without the authentication error rate, it is impossible to quantify the financial exposure from
        refund obligations, assess whether the current four-hub model is adequate, or evaluate whether
        the company's EU Anti-Counterfeiting MoU commitments are being met. An error rate above 0.5%
        at scale (100,000+ weekly listings) would imply hundreds of failed authentications per week.
      diligencePath: >-
        Request authentication quality reports from management including: error rate by hub, by item
        category (handbags vs. watches vs. shoes), and by seller profile (first-time vs. repeat seller).
        Review internal audit findings and any correspondence with DGCCRF or consumer protection authorities.
      relatedQuestionRefs:
        - QR002

    - type: private-evidence-only
      severity: blocking
      topic: vestiaire-financials
      missingEvidence: >-
        Vestiaire Collective's GMV, net revenue, gross margin, EBITDA, and cash position for fiscal years
        2023–2025 are not publicly disclosed; as a private French company, it has no statutory obligation
        to publish financial statements accessible to investors.
      whyItMatters: >-
        Without financial metrics, it is impossible to assess whether the company is approaching profitability
        or burning cash at an unsustainable rate, to estimate regulatory fine exposure relative to revenue,
        or to benchmark operational efficiency against The RealReal's disclosed $2.13B GMV / 6.1% EBITDA margin.
      diligencePath: >-
        Request investor update, management accounts (FY2023–2025), and any Eurazeo or Bpifrance portfolio
        disclosures that contain partial financial metrics for Vestiaire Collective.
      relatedQuestionRefs:
        - QR020
        - QR007

    - type: private-evidence-only
      severity: material
      topic: kering-governance-documents
      missingEvidence: >-
        The precise equity stake held by Kering in Vestiaire Collective, whether Kering holds board
        representation or observer rights, and the terms of any investor agreement addressing the conflict
        of interest with Kering's brand-owned resale programs are not publicly disclosed.
      whyItMatters: >-
        Without governance documents, it is impossible to assess whether Vestiaire Collective has structural
        protections against Kering using its board access to steer Vestiaire strategy in ways that benefit
        Kering's own competing resale channels.
      diligencePath: >-
        Request complete cap table, Kering investment agreement, board composition, board observer rights,
        and any non-compete or information-barrier provisions from the Series F investment documents.
        Review Kering's annual report for any disclosure of the Vestiaire Collective minority stake.
      relatedQuestionRefs:
        - QR005
        - QR009

