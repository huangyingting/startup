chapter:
  number: 7
  title: "Risks"
  summary: >
    Vestiaire Collective faces a compounding risk stack across regulatory, operational, strategic, and financial
    dimensions. The EU regulatory environment—DSA, GDPR, EU AI Act, and consumer protection law—creates overlapping
    compliance obligations each carrying fines of 4–7% of global annual revenue. Authentication failure is the
    existential operational risk: any systematic breakdown in the verification process triggers cascading legal
    liability, brand damage, and buyer churn. The Kering investor-competitor conflict is structurally unresolved,
    and a second CEO transition in three years (Maximilian Bittner to Bernard Osta, October 2025) elevates
    execution risk as the company pursues RaaS expansion and fights for global market share against The RealReal.

sections:
  - id: "regulatory-legal-risks"
    title: "Regulatory and Legal Risks"
    body: >
      Vestiaire Collective operates at the intersection of three powerful EU regulatory frameworks that create a
      compounding compliance burden in 2025–2026. The Digital Services Act (DSA, Regulation EU 2022/2065), in force
      since February 2024 for all online marketplaces, classifies Vestiaire as an online marketplace subject to
      seller verification obligations, transparent moderation records, and risk assessment requirements. Non-compliance
      carries fines of up to 6% of global annual turnover. The December 2025 €120M DSA fine against X (Twitter)
      served as the first major enforcement signal, demonstrating that the European Commission is prepared to act
      against platforms that fall short of their DSA obligations. For Vestiaire, the most acute DSA exposure lies
      in counterfeit listings: if the Commission determines that Vestiaire's self-operated authentication is
      insufficient to prevent illegal listings, it may trigger enforcement under DSA Article 24 (marketplace
      seller verification) and Article 26 (risk mitigation).

      GDPR (Regulation EU 2016/679) creates a separate and significant risk. Vestiaire processes personal and financial
      data for approximately 5 million members across 80+ countries, and transfers data internationally to service
      providers in the US, UK, Hong Kong, Singapore, the Philippines, Madagascar, Australia, and Israel, as
      disclosed in its privacy policy. A data breach affecting buyer purchase histories and payment information
      could result in fines of up to 4% of global annual revenue and severe reputational damage in the premium
      luxury segment where consumer trust is foundational. The CNIL (Commission Nationale de l'Informatique et
      des Libertés) serves as Vestiaire's lead GDPR supervisory authority.

      The EU AI Act (Regulation EU 2024/1689), in force since August 2024, introduces risk-based regulation of
      AI systems with a phased 24-to-36-month implementation schedule for most obligations. Vestiaire's
      machine-learning-assisted digital authentication pipeline—the system that digitally vets items before
      physical inspection or direct shipping—potentially falls within the Act's scope. While the Act's high-risk
      category focuses on employment, credit, and law enforcement, AI systems used in consumer-facing transactions
      with significant financial outcomes may face future classification expansion. Non-compliance with AI Act
      obligations can result in fines of up to €35M or 7% of global annual turnover. EU consumer protection law
      provides an additional avenue of liability: if a counterfeit item is delivered to a buyer who relied on
      Vestiaire's authentication guarantee, the company is exposed to refund obligations and potential tort
      claims under EU distance-selling regulations and the Consumer Rights Directive.
