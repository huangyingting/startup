callouts:
  - calloutType: "risk"
    title: "Kering Conflict of Interest Is Structurally Unresolved"
    body: >
      Kering co-led the €178M Series F in March 2021 and holds a meaningful equity stake in Vestiaire Collective
      while simultaneously owning Gucci-Vault and other brand-operated resale programs. This creates a structural
      conflict of interest where Vestiaire's most prominent luxury investor is also its direct competitor in brand
      resale. Kering's own financial pressures in 2023–2025 (revenue down from €19.6B in 2023 to €14.67B in 2025)
      may incentivize it to prioritize brand-owned resale channels. No public governance remedy—such as a
      non-compete covenant or information barrier—has been disclosed.
    claimRefs:
      - CR024
      - CR025
  - calloutType: "risk"
    title: "EU Regulatory Stack Creates Compounding Compliance Burden"
    body: >
      Vestiaire simultaneously faces compliance obligations under GDPR (up to 4% global revenue), DSA (up to
      6% global revenue), EU AI Act (up to 7% of global turnover or €35M), and consumer protection law. Each
      framework is independently enforceable, and their compliance costs stack. The December 2025 €120M DSA fine
      against X demonstrates the Commission's willingness to act. For a privately held company that has not
      disclosed profitability, cumulative regulatory non-compliance exposure could materially exceed any
      single-year revenue.
    claimRefs:
      - CR001
      - CR002
      - CR003
  - calloutType: "risk"
    title: "The RealReal's Profitability Inflection Raises Competitive Bar"
    body: >
      The RealReal achieved positive Adjusted EBITDA of $42M for full-year 2025 on $2.13B of GMV—marking the
      first time any major luxury resale platform reached operational sustainability. This raises the competitive
      bar significantly: Vestiaire must now match a profitable, scaled US competitor to attract continued growth
      capital. Vestiaire has not publicly disclosed comparable GMV or profitability metrics, making it impossible
      to verify whether the gap is narrowing or widening.
    claimRefs:
      - CR033
      - CR034

