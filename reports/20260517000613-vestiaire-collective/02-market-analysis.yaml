  - id: buyer-segments
    title: Consumer Segmentation and Demand Drivers
    body: >-
      The luxury resale consumer base is not monolithic. Vestiaire's platform serves at least five identifiable
      segments with distinct motivations, price sensitivities, and behaviours. The largest value segment comprises
      value-seeking luxury buyers — consumers who want access to authenticated Chanel, Hermès, or Gucci at 30–70%
      below primary retail. These buyers are typically 25–45 years old, have aspirational incomes, and are highly
      brand-sensitive. A second segment — sustainability-driven shoppers — is growing rapidly among younger cohorts,
      motivated by the environmental case for circular fashion. Vestiaire's own 2025 Impact Report states that 85% of
      its consumers indicate a willingness to buy fewer, higher-quality items, and that 87% of purchases prevent a
      first-hand purchase (a "displacement rate" that quantifies the environmental value proposition). An independent
      academic life-cycle assessment published in the Circular Economy Journal found that secondhand clothing carries
      approximately 42% lower climate impact than new equivalents.


      A third important segment is collectors and enthusiasts, who use Vestiaire to source rare vintage pieces or
      limited-edition items unavailable through new channels. Their willingness to pay is high, and they represent a
      disproportionate share of high-value transactions. A fourth segment — aspirational first-time luxury buyers —
      is especially significant for market expansion. Gen Z and younger millennials who cannot afford new luxury can
      access the category via resale, building brand affinity that may later convert to primary retail purchases. This
      "gateway to luxury" dynamic is explicitly cited by The RealReal in its 10-K. Fifth, professional resellers and
      dealers use the platform for arbitrage, tending to have high listing volumes and high price sensitivity on
      seller fees.


      Macro conditions are accelerating demand across all segments. ThredUp's 2026 report notes that consumers are
      embedding resale into their financial lives — using resale proceeds to fund new luxury purchases — and that
      technology is reducing friction across the purchase journey. Rising prices for new luxury goods (partly driven
      by brand-led "premiumisation" strategies and partly by tariff and supply chain costs) are making resale an
      increasingly attractive value proposition. The global secondhand market is becoming a "more competitive,
      structurally complex phase" as ThredUp puts it, with an urgency for platforms to lead on technology, supply
      quality, and brand trust before the market consolidates further.
