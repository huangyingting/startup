chapter:
  number: 2
  title: Market Analysis
  summary: >-
    The global secondhand apparel market is projected to reach $393 billion by 2030 (ThredUp 2026 Resale Report),
    growing at twice the rate of the overall apparel market. Within this landscape, luxury fashion resale is the
    highest-value and fastest-maturing segment, driven by consumer demand for value, sustainability credentials, and
    access to rare items. Vestiaire Collective holds a strong position as the leading European curated luxury resale
    marketplace operating in 70+ countries, with differentiating capabilities in AI-assisted curation, a four-hub
    global authentication infrastructure, and an emerging Resale-as-a-Service (RaaS) model partnering with 12+ luxury
    brands. However, core financial metrics remain undisclosed, and the company faces structurally difficult unit
    economics that have constrained profitability even for the better-capitalized public peer, The RealReal.
sections:
  - id: market-definition
    title: Market Definition and Scope
    body: >-
      The luxury fashion resale market encompasses the buying and selling of pre-owned designer and luxury goods —
      including apparel, handbags and leather goods, footwear, fine jewelry, and watches — through digital platforms
      that provide authentication, curation, and trust infrastructure. This segment sits within the broader global
      secondhand apparel market, itself a sub-sector of the overall global fashion economy. Vestiaire Collective
      operates specifically at the intersection of luxury curation and peer-to-peer (C2C) commerce, offering consumers
      a curated selection of items from brands whose original retail prices typically exceed €200 to €2,000+. The
      platform's scope extends to both consumer-to-consumer (C2C) and brand-to-consumer (B2C) channels, including a
      growing Resale-as-a-Service (RaaS) offering for luxury brand partners.


      The market is structurally distinct from mass-market resale platforms such as Poshmark and Depop in three ways.
      First, the average order value is materially higher, supported by the underlying brand equity of luxury goods.
      Second, authentication is a core trust mechanism rather than an optional feature, because counterfeits are a
      significant risk: The RealReal's 2025 10-K explicitly describes the pre-existing market as "fragmented, difficult
      to access and laden with counterfeit goods." Third, curation quality determines platform positioning and
      determines buyer willingness to pay fees. Vestiaire bans fast fashion brands from the platform entirely — a
      policy it completed in phases during 2022 and 2023 — to protect category positioning and reinforce the premium
      positioning of its marketplace. This boundary definition means the market is smaller but more defensible and
      carries higher margin potential per unit than mass resale.


      The addressable universe of goods is large. Pre-owned luxury goods locked in household wardrobes globally
      represent a long-tail supply of high-value, under-monetised inventory that platforms with strong consignor
      relationships can unlock. Vestiaire's 4-step verification pipeline — profile monitoring, digital AI review,
      physical hub inspection, and quality control — supports the trust required to convert this latent supply into
      active transaction volume. The company's platform statistics, with 5 million+ curated items and approximately
      30,000 new items listed daily, indicate that supply is actively flowing. The key strategic question is whether
      Vestiaire can monetise this flow efficiently enough to reach profitability.
