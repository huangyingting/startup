  customerFocus: "Millennial and Gen Z luxury fashion consumers seeking authenticated pre-owned luxury goods at 30–70% discount to retail; global, with strength in Europe (France, UK, Germany), US, and Asia-Pacific (Korea, Hong Kong)"
