companyProfile:
  summary: "Vestiaire Collective is a Paris-based luxury fashion resale marketplace connecting sellers and buyers of authenticated pre-owned luxury goods. Founded in 2009 by Fanny Moizant, Sophie Hersan, and Sébastien Fabre, the company has grown to over 5 million community members across 80+ countries and raised approximately $600M in total funding, including a $216M Series F in 2021 at a ~$1.7B valuation. The platform's multi-step authentication model—combining AI pre-screening with physical expert review at centers in Paris, New York, and Hong Kong—differentiates it from unverified peer-to-peer marketplaces. Kering (parent of Gucci, Saint Laurent, and Balenciaga) is a strategic investor, providing unique brand alignment within the luxury ecosystem."
