  - number: 6
    title: 客户
    sections:
      - number: '6.1'
        title: 客户分层：电力公司、公共项目与 AI 容量买家
        blocks:
          - type: paragraph
            body: >-
              Form Energy 的客户基础不是经典 SaaS 那种有数百个小客户标识的名单；它是一批项目驱动的交易对手，决策周期长，战略价值高。最清晰的公开买家是电力公司和类电力机构：Great River
              Energy、Xcel Energy、Georgia Power，以及由 PG&E 托管的 California 项目。第二类是 NYSERDA、DOE 和 California Energy
              Commission 等机构提供的公共部门商业化支持，它们实际上在付费证明或加速部署，即使并非传统经常性收入意义上的最终客户。第三类是正在出现的大型负荷基础设施买家，Crusoe 为 AI 数据中心预留 12
              GWh 容量就是代表。这个组合很重要，因为买方、用户和付款方因细分而异。机构为示范承保，电力公司部署可靠性资产，Crusoe
              为数据中心开发锁定容量。因此，公开证据支持客群宽度，但不支持细分经济性或收入组合。这种分层也意味着，数客户标识可能误导。州级奖励和电力公司采购协议都是真实的外部验证事件，但它们在收入确认、续约逻辑和集中度风险上的表现完全不同。因此，客户章节必须保留这些区别，而不是把每一个具名交易对手都当作可互换的需求。
            claimRefs:
              - CU011
