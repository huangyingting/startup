              公开规模证据最强的地方是制造进展和已宣布部署；在客户数或收入运行率这类经典软件式 KPI 上则弱得多。Form 称其在 2024 年完成了超过 550,000 平方英尺的 Form Factory
              1，并启动试生产；工厂员工从 2024 年 9 月超过 250 人，增至 2024 年 10 月全公司超过 900 人，而当前 About 页面显示员工接近 1,000 人。本地媒体报道的 2025 年 2
              月公司声明称，一次重组影响不到总员工数的 5%，但公司在工厂仍有 350 多名团队成员，并有近 40 个开放岗位。商业上，记录如今明显不止单一试点：Great River Energy 于 2024 年为
