      - number: '1.3'
        title: 融资形成、投资者组合与制造支持
        blocks:
          - type: paragraph
            body: >-
              Form 的融资历史如今更像典型的后期气候制造扩产案例。公司的进展页面披露，融资链从 2018 年 $9 million Series A 一直延伸到 2024 年 10 月 $405 million
              Series F。已公开的领投方从 Breakthrough Energy Ventures、Prelude Ventures、The Engine、Eni Next、Coatue、XCarb 和 TPG
              Rise 等气候与硬科技专业投资者，转向由 T. Rowe Price 牵头的后期资本。Series F 还引入 GE Vernova，既是投资者，也是制造和商业合作方。公共部门支持补上了这套资本栈。Form
              2024 年 9 月的新闻稿称，DOE 选择公司获得最高 $150 million 制造支持，用于一条到 2027 年可达 20 GWh 年产能的新产线。West Virginia 州议会 2023
              年摘要还描述了额外 $300 million 州级支持包，附带抵押和就业创造条件，突显公共融资是规模化论点的一部分，不是脚注。
