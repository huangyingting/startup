          - type: callout
            title: 最强正面因素是真实外部验证
            body: 很少有私营气候制造公司能拿出超过 $1.2 billion 融资、DOE 制造业支持，以及横跨公用事业、政府和 AI 基础设施买家的具名交易对手。
            calloutType: strength
