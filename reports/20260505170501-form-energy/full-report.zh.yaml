      - number: '8.4'
        title: 公开可比公司给出区间，不给目标
        blocks:
          - type: paragraph
            body: >-
              可比公司集合主要有用之处，在于它显示储能估值锚有多不稳定。按 2026 年 5 月公开市场数据，Fluence 市值约 $2.26 billion，过去十二个月收入 $2.55 billion，约 0.9x
              销售额；Stem 约 0.5x；Energy Vault 约 9.2x；ESS 约 5.1x；Eos 约
              19.6x。这个区间不是整齐的同业中位数，而是在提醒：储能股票里嵌入了很不同的规模、困境、技术期待和融资选择权组合。监管文件证据也强化了同样的谨慎：Fluence 已有真实规模，但 2023 财年毛利率只有
              6.4%；ESS 收入成本高于收入，并持续出现持续经营措辞；Eos 披露，如果没有更多资本，对持续经营能力存在重大疑虑。对 Form
              来说，可比公司的启示因此是方向性的，不是决定性的。由于客户证据和制造业支持更强，公司或许应该相对陷入困境的小盘股享有溢价，但公开可比公司并不能证明仅凭信念就应支付一个未披露的溢价轮。Form
              披露私人收入、利润率和股权结构条款之前，可比数据支持克制的好奇，而不是照价全收的热情。
