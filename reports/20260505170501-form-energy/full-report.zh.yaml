      - number: '4.4'
        title: 财务结论与尽调阻断项
        blocks:
          - type: paragraph
            body: >-
              财务结论是混合但可行动的。Form
              正在为长时基础设施签下具名交易对手，包括电力公司和一家预留商业条款的数据中心开发商，因此收入质量在结构上似乎好过纯投机平台公司。这给了公司真实在手订单和战略相关性。与此同时，毛利率路径在公开材料中仍未证明。硬件和项目型业务在展示持久盈利能力之前，常会吃掉库存、调试、质保和营运资本摩擦；这里的公开可比公司也强化了这一点。Fluence
              展示了规模化储能集成商在实现正但仍温和的毛利率后可能是什么样；ESS 和 Eos 则显示，早期制造爬坡很容易带来负毛利、增量资本需求和融资风险。因此，仅凭公开来源无法承保 Form
              自身案例。最高优先级尽调问题很直接：当前现金、月度烧钱速度、2026—2028 资本开支计划、在手订单转收入日程、合同毛利率假设、按已签约 GWh
              计算的客户集中度，以及制造扩张或大型部署所附带的任何项目融资或债务义务。在管理层提供这套材料之前，应把 Form 视为商业前景可观但财务仍不透明。
