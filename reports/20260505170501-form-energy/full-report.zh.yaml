            body: >-
              最清晰的公开财务信号不是现金生成，而是资本支持。Form 2024 年 10 月宣布 $405 million Series F，并称累计融资超过 $1.2 billion；DOE 还选择公司获得最高 $150
              million，用于在 Form Factory 1 增加一条新制造线。同一公开记录也显示了大型实体扩张：初始工厂 550,000 平方英尺、目标在 2025 年底前完成的扩建项目，以及制造野心——工厂页面写到
              2028 年至少每年 500 MW，DOE 支持的 Project RAPID 产线则写到 2027 年最高 20 GWh 年产能。这些数字让承保逻辑很清楚：Form
              正在公开财务披露跟上之前，先把一个首创型储能平台工业化。DOE 的 FOAK（首创型）融资报告相关性很强，因为它明确说，示范和部署是商业化中最耗资本和时间的环节，许多项目达不到标准可融资性。这个背景很贴合
              Form。公共补贴和大额私募轮显然缓解了近期融资压力，但不能回答决定性问题：手头现金、每个项目的营运资本需求、债务或项目融资义务，以及把已宣布 GWh 转化为运行系统还需要多少额外股权。
