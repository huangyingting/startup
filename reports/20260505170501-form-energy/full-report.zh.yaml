      - number: '7.3'
        title: 资本强度、有限披露和轻微组织压力放大了财务与执行风险
        blocks:
          - type: paragraph
            body: >-
              公开记录足以说明 Form 比许多气候硬件同行资本更充足，但还不足以证明公司已经走出首个同类制造业创业公司常见的危险区。$405 million Series F
              以及联邦或州层面的支持确实是正面因素，但同一时期也出现了一次以效率和财务可持续性为名的重组。Fluence 和 Eos
              的上市公司文件解释了为什么这件事重要：长时储能企业在舰队规模产品市场契合完全证实前，就可能被供应商集中、关税、质量故障、违约赔偿、契约风险和反复融资需求击中。Form
              的化学路线和电芯级安全叙事，在火灾特征和原材料依赖上看起来明显好于锂离子，但这只收窄了部分风险。它没有回答收入集中、客户续约、具体补贴契约或系统级认证披露。正确的尽调姿态因此应当克制，而不是恐慌：假设公司仍有可能赢，但要把激励兑现、项目里程碑、网络安全后续处置和首批现场表现视为打破投资逻辑的触发器，而不是运营脚注。实际推论是，下行监控应按月而不是按年做：Great
              River、Xcel、Weirton 扩建以及任何与数据泄露相关的法律进展，公开里程碑足够密集，过期的尽调备忘录很快会漏掉真实的逻辑恶化。
