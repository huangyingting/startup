  - id: FV002
    title: 估值敏感性
    type: bar
    layout: standard
    summary: 投资判断对价格可见度和单位经济性最敏感，而不是需求是否存在。
    data:
      items:
        - label: 进入价格与最新估值标记可见度
          value: 10
          detail: 没有公开投后估值或股价披露。
        - label: 毛利率与项目经济性
          value: 9
          detail: 从已签协议 GWh 到盈利收入的路径没有公开披露。
        - label: 积压订单转收入时点
          value: 9
          detail: 大额协议已经存在，但交付节奏仍不透明。
        - label: 优先权与稀释压力
          value: 8
          detail: 当前清算优先权堆叠未公开。
        - label: 制造爬坡执行
          value: 8
          detail: 批量生产和首批客户交付仍处早期。
        - label: 市场需求顺风
          value: 5
          detail: 相比价格和利润率，需求证据的不确定性较低。
    approximationNotes: 数值是基于采信证据得出的 0-10 序数敏感性评分，用来显示哪些未知项最影响投资决策。
    claimRefs:
