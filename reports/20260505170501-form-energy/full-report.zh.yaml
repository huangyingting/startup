      - number: '2.3'
        title: 买家分层、预算归属与采用路径
        blocks:
          - type: paragraph
            body: >-
              保留来源勾出的买家地图是连贯的。Form
              公开客户集显示，投资者所有电力公司、合作社和垂直整合电力公司正在为资源规划和发电可靠性探索多日储能，而不是为分布式产消者场景采购。实践中，经济买家似乎是电力公司的资源规划、发电或监管资本团队；公开来源很少披露精确委员会结构，但围绕综合资源规划、可靠性和长期战略的语言已经说明，这些是资本配置决策，不是站点经理的一次性试点采购。采用路径也看得见。电力公司先建模系统价值，再测试试点或示范，之后才考虑更大范围扩张。Xcel
              明确使用 Formware 建模；Great River 把 Cambridge 项目定位为多年评估；Georgia Power
              则把其项目与更广泛的可靠性和可再生能源战略相连。这种缓慢、重证据的采购动作，也是表观市场可能远大于近期收入池的原因之一。
