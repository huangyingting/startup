      - number: '5.3'
        title: 差异化、安全与剩余尽调缺口
        blocks:
          - type: paragraph
            body: >-
              Form 的差异化是多层的。最可见的护城河是化学体系和系统设计：便宜的铁、水和空气；长时储能；以及在单体级 UL9540A 测试中没有热失控行为。第二层护城河是规划软件。Formware 反复出现在 Great
              River、Xcel、California、Georgia 和 New York 的公开叙事里，因为公司销售的不只是储能时长，也是一套模型，用来说明时长会在哪些地方改变最低成本组合。第三层是 IP
              和制造诀窍：围绕空气电极、密封碱性系统和单体架构的专利轨迹在增长，同时还有专用高产能工厂。需要谨慎的是，公开验证最强的部分仍是概念、架构、安全和项目管线，而不是现场效率、长期衰减、网络控制或精确硬件控制栈。公开
              GitHub 足迹真实但很小，它更能支撑“软件存在”，而不是“软件成熟度独立可见”。换句话说，Form
              的公开尽调包已经达到“严肃产品公司”的门槛，但还没到“可完全承保的运营资产提供商”。公司证据足以支持技术兴趣和商业可信度，同时把若干可融资性问题留给与客户、监管方和项目级工程文件的直接尽调。这些缺失披露不是边缘问题。它们正落在采购团队判断一款首创型电池只是有趣，还是能在多个地区重复部署、真正可融资的关口。
