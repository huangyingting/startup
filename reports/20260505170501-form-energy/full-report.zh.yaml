  - number: 8
    title: 估值
    sections:
      - number: '8.1'
        title: 建议：公司足够真实，价格仍不透明
        blocks:
          - type: paragraph
            body: >-
              Form Energy 现在更像一家处于后期工业商业化阶段的公司，而不是实验室阶段气候创业公司。官方和客户来源显示，公司完成 $405 million Series F，总融资超过 $1.2
              billion，获得最高 $150 million DOE 制造业支持，与 Great River 开展首个商业部署，与 Georgia Power 签署 15 MW / 1,500 MWh 协议，与
              Crusoe 签署 12 GWh 协议，推进 300 MW / 30 GWh Google-Xcel
              项目，并在爱尔兰拿到首个国际部署。对一家私有储能公司来说，这种外部证据异常强。问题在于，保留的公开融资来源都没有披露确切投后估值、当前股价、清算优先权、当前收入运行率或毛利率。公开股票显示，储能公司估值可以从低迷的低于
              1x 销售额，到投机性的两位数销售倍数不等。没有披露入场价格或私人经济性时，正确做法不是硬凑一个虚假精确目标，而是维持继续研究，并在价格和单位经济性可见前把估值立场定为未知。
