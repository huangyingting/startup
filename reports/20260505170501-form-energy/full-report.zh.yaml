      - number: '3.2'
        title: 直接同行画像与相对规模
        blocks:
          - type: paragraph
            body: >-
              在直接同行中，Eos 目前在公开商业规模上最强：其 2025 年结果显示收入 $114.2 million、在手订单 $701.5 million、在手订单 2.8 GWh，并有超过 $600 million
              现金。ESS 围绕铁液流化学、8-22 小时时长和无容量衰减主张，有一套连贯的产品故事，但 2025 年收入只有 $1.6 million，流动性也紧得多。Highview 和 Hydrostor
              的竞争方式不同。它们是基础设施式平台，价值主张依赖大型项目场址、土建和融资结构，而不只是发运电池集装箱。Form 自身介于这些阵营之间：比 Highview 或 Hydrostor
              更产品化，比许多锂离子既有厂商更偏电力公司场景，也在具名电力公司验证上领先许多新化学体系。公司与 Xcel、Great River 和 Georgia Power 的公开部署具有战略价值，但仍未达到
              Fluence 级商业规模，也未匹配其他长时形态正在推进的基础设施式项目管线。
