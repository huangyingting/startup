      - number: '2.4'
        title: 增长驱动、采用约束与估值关键
        blocks:
          - type: paragraph
            body: >-
              结构性驱动是真实的：电力需求重新上行，可再生能源渗透让部分电网里的多日平衡更有价值，电力公司也希望在不锁定更多化石调峰的情况下守住可靠性。DOE、NREL、WRI、C2ES、WECC 和 IEA
              都支撑这一论点的不同版本。但反向证据对估值时点同样重要。Nature、C&EN 和 Energy-Storage.News
              显示，电力公司仍然谨慎；资源充裕性规则和市场设计并不总能充分补偿长时资产；锂离子改善速度足够快，仍主导大量跨日项目管线。Form
              的工厂建设和具名电力公司项目是正面信号，但制造规模、认证周期和融资结构仍会限制理论机会中有多少能变成近期收入。可投资结论因此不是“市场巨大”，而是：Form
              位于一个真实但缓慢打开的电力公司楔形市场，其变现取决于政策、项目执行，以及市场是否愿意为超出当下短时基线的时长付费。
