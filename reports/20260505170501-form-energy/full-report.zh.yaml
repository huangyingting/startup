  - number: 3
    title: 竞争对手
    sections:
      - number: '3.1'
        title: 竞争格局概览
        blocks:
          - type: paragraph
            body: >-
              Form Energy 的竞争集比“其他铁空气创业公司”宽得多。相关替代方案包括 ESS、Eos、Highview Power 和 Hydrostor 等直接非锂长时同行；Fluence
              及更广泛锂离子集成商这类短时储能既有厂商；以及抽水蓄能或其他可靠性投资等现状替代。这个更宽的框架很重要，因为电力公司采购储能并不只看化学体系。它们比较项目风险、交付确定性、融资、土建复杂度，以及系统能否在今天的资源充裕性和可靠性结构里赚到价值。Form
              宣传的 100 小时铁空气系统有差异化，但它进入的是这样一个市场：部分对手在长时能力上重叠，另一些对手则只是因为更容易采购而胜出。因此，竞争问题不是 Form
              是否独特，而是这种独特性能否在短时既有厂商和其他长时形态吸收同一预算类别之前，转化为持久的采购优势。
            claimRefs:
              - CP001
              - CP003
              - CP005
              - CP009
              - CP014
              - CP018
              - CP020
              - CP023
              - CP024
              - CP030
