        title: 护城河耐久性、反向证据与结论
        blocks:
          - type: paragraph
            body: >-
              保留来源支持 Form 具备真实优势，但还不足以证明护城河无可质疑。Form 有鲜明的 100
              小时产品主张、首座工厂爬坡，以及许多新化学体系尚缺的电力公司参考点。但反向证据同样强。锂离子继续扩大规模，并占据大多数跨日管线；电力公司对转向多日化学体系仍犹豫；公开记录在实际定价和可重复赢单率上较弱。Eos
              已经展现出强于 ESS 的商业指标，并可能从公开数字看成为最可信的非锂同行。Highview 和 Hydrostor
              证明，基础设施式长时项目也在推进，特别是在项目融资和电网稳定服务能够支撑它们的地方。Fluence 仍是战略既有厂商基准，因为资产负债表强度和软件加服务分销能力可以压过更窄的产品优势。2026
              年正确的判断是：Form 在时长真正重要的地方有可信楔子，但在规模、价格透明度和电力公司转化证据追上技术故事之前，护城河仍取决于执行。
