      - number: '5.2'
        title: 架构、制造与成熟度
        blocks:
          - type: paragraph
            body: >-
              保留来源足够具体，可以描述运营模型，而不必发明隐藏内部结构。公开页面称，单体电池包含铁和空气电极，以及水基不可燃电解质；单体组成模块，模块进入受保护外壳，外壳再组成兆瓦级功率块。MIT 的独立描述与 Form
              自己的布局大体一致。制造成熟度已不再只是实验室规模：Form Factory 1 在 Weirton 运行，公司称试生产于 2024 年 9 月开始，扩建于 2024 年 10
              月启动。对一家私营气候科技公司而言，工厂页面披露了异常具体的产线建设细节，包括阳极和阴极产线、单体组装、焊接、炉体、涂布、AGV 和机器人。这让人更有信心：Form
              已越过从化学故事到可制造系统的分界线，尽管公开良率、吞吐和降本曲线仍是私有信息。公开制造证据也异常具体，因为工厂页面和新闻稿披露了面积、用工目标、扩建时点和生产设备类别。这不能替代良率曲线，但实质性提高了信心：Form
              已从实验室原型进入工业化阶段，真正开始依赖工艺工程和产线设计。
