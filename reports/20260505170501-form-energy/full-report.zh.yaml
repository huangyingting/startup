  - id: FV001
    title: 建议逻辑
    type: flow
    layout: wide
    summary: 建议维持在「继续研究」：市场和客户验证很强，但价格和经济性披露缺失，抵消了这部分优势。
    data:
      nodes:
        - id: n1
          label: 市场顺风
          detail: LDES 政策支持，加上数据中心和可再生能源推高用电需求。
          tone: positive
        - id: n2
          label: 客户验证
          detail: Great River、Georgia、Xcel、Google、Crusoe、NYSERDA 和 Ireland 构成真实外部验证。
          tone: positive
        - id: n3
          label: 资本支持
          detail: Series F 融资和 DOE 制造支持，延长了规模化爬坡的现金跑道。
          tone: positive
        - id: n4
          label: 经济性不透明
          detail: 没有公开收入、利润率、积压订单转化或项目级贡献数据。
          tone: warning
        - id: n5
          label: 估值不透明
          detail: 没有公开投后估值、股价或优先股堆叠。
          tone: negative
        - id: n6
          label: 建议
          detail: 继续研究；高风险；价格和经济性披露前，估值立场未知。
          tone: warning
      edges:
        - from: n1
          to: n6
        - from: n2
          to: n6
        - from: n3
          to: n6
        - from: n4
          to: n6
        - from: n5
          to: n6
    approximationNotes: null
    claimRefs:
