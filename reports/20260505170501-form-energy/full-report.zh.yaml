      - number: '3.4'
        title: 切换成本、锁定与多供应商并用
        blocks:
          - type: paragraph
            body: >-
              电力公司不太可能在所有储能任务上押注一个赢家。多供应商并用在结构上合理，因为不同资产解决不同时间尺度和选址约束。同一个系统里，电力公司可以用 Form
              做多日韧性，用锂离子做日内循环，在其他地方用抽水蓄能或输电方案。这会限制锁定。Highview 和 Hydrostor
              也说明，切换成本不只是化学体系问题：基础设施项目会形成很深的特定场址承诺，而如果采购标准保持化学中性，模块化电池供应商更容易被替换。Fluence
              最强的边并非时长，而是分销和采购熟悉度。它的规模、在手订单和服务栈让采购、运营和融资都更容易。Form 因此需要的不只是技术新意。它需要足够的已部署验证、规划模型可信度和制造兑现，让电力公司把 100
              小时时长视为必须采购的品类，而不是放在更容易买的短时方案旁边的实验性附加项。
