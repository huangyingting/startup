      - number: '8.3'
        title: 为什么公开证据仍撑不起估值
        blocks:
          - type: paragraph
            body: >-
              反向逻辑并不是 Form 缺少雄心或客户，而是公开证据仍不足以让外部投资人承销入场价格。官方融资报道确认了融资额和投资人质量，Latitude 报道管理层称 Series F
              相比上一轮是上调估值融资，但公司仍未公开给出确切估值、每股价格或优先股堆叠。运营模型同样不透明。Form
              自有材料提出强技术和成本主张，客户公告显示已签下很大体量，但保留的公开来源仍没有提供当前收入、已实现平均售价、毛利率、订单储备转收入、质保假设或项目级贡献利润率。DOE 的 FOAK
              融资报告解释了为什么这重要：示范和部署是商业化中最耗资本、最耗时间的阶段，首个同类项目长期存在融资缺口。在这个背景下，不看价格就给出乐观建议会过度声称。正确问题不是 Form
              是否令人印象深刻，而是任何给出的价格是否已经在经济性可见前预设了连续生产成功。
