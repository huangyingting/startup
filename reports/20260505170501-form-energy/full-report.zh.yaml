            body: >-
              Form 最清晰的功能优势，是 100 小时时长和低成本材料叙事的组合。ESS 同样覆盖非锂储能，但集中在 8-22 小时铁液流用例和循环寿命。Eos
              以锌基化学、模块化封装和密度主张参与类似长时区间竞争，而不是主打 100 小时时长。Highview 和 Hydrostor
              通过大型场址、重基础设施方案竞争，这些方案能提供长时储能，但需要不同的选址和融资姿态。Fluence 代表相反的基准：高度产品化、面向电力公司的电池系统，叠加强软件和服务，但没有公开 100
              小时产品。价格是整个格局的薄弱点。公开来源描述了封装、时长和融资叙事，但很少披露实际客户价格、折扣或赢单 /
              输单数据。这意味着投资者可以比较相对能力和规模，却还无法以重复、同口径方式证明哪家供应商在全负荷项目经济性上胜出。
