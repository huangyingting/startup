            body: >-
              2024—2026 年，Form 的公开牵引明显改善，但运营验证仍落后于已宣布规模。Great River Energy 仍是首个商业试点锚点：Cambridge 项目规模为 1.5 MW / 150
              MWh，已从合作推进到破土，预计在 2025 年末或 2026 年左右投运。Xcel、Georgia Power、FuturEnergy Ireland 和 Crusoe
              把这一模式扩展到更大的电力公司、国际和数据中心用例；公司及合作方新闻稿如今引用超过 65 GWh、随后超过 75 GWh 的已签约商业项目。这些是强需求和管线信号，尤其是 2026 年 3 月 Crusoe
              协议明确预留了从 2027 年开始的容量、价格和交付条款。不过成本栈仍主要是方向性的。Form 自己的产品页面主张 100
              小时时长、低成本投入、占地范围，以及在相关用例中低于锂离子十分之一的成本目标，但没有公开实际毛利率披露。上市公司可比项有助于框定可能的经济性：规模化储能集成商 Fluence 已实现低个位数正毛利率，而更早期的
              ESS 和 Eos 在制造爬坡期仍显示负毛利或资本依赖。含义是，Form 可能有强战略需求，但需求本身并不能证明健康的单位经济性。
