  - id: TV002
    title: 投资逻辑 / 反向逻辑表
    columns:
      - 方向
      - 论点
      - 什么会改变判断
    rows:
      - - 投资逻辑
        - 长时储能同时受政策和需求顺风推动，EIA 现在预计负荷会持续增长，部分来自数据中心。
        - 如果负荷增长明显放缓，或公用事业客户停止为可靠性容量采购多日储能，该判断会转弱。
      - - 投资逻辑
        - 在私营气候制造商里，Form 拥有罕见强度的具名客户验证：Great River、Georgia Power、Xcel、Google、Crusoe、NYSERDA 和爱尔兰。
        - 如果早期项目按期投运，并以披露经济性的重复订单转化，该判断会增强。
      - - 反向逻辑
        - 公开证据仍未披露当前估值、每股价格、清算优先权、收入运行率或毛利率。
        - 如果管理层提供最新条款清单、409A 或老股交易标记，以及从积压订单到收入的桥接，该风险会大幅下降。
      - - 反向逻辑
        - FOAK 制造和部署仍耗资本、耗时间；储能可比公司显示，一旦执行延误，估值可能剧烈压缩。
        - 如果多个客户交付能证明连续生产、保修表现和项目贡献利润率，该判断会改善。
    notes: 该表把公司质地和特定价格下的可投性分开；尚未解决的反向逻辑是估值与经济性披露，而不是市场是否存在。
