  - id: TV005
    title: 投资逻辑破裂与否决触发项表
    columns:
      - 触发项
      - 阈值
      - 如何传导到投资逻辑
      - 行动含义
    rows:
      - - 估值仍不透明
        - 尽调期间没有披露股价、投后估值或条款清单可见性
        - 阻断任何基于证据的入场纪律，优先权悬顶也无从判断。
        - 不要投资；将建议维持在继续研究，若无法建立价格纪律则转为回避。
      - - 连续生产延误
        - 首批客户交付错过预期 2026 验证点，或需要反复重置时间表
        - 削弱核心商业化叙事，并提高融资风险。
        - 在生产一致性可见之前，避免支付溢价。
      - - 积压订单质量恶化
        - Great River、Xcel/Google 或 Crusoe 等具名对手方推迟、缩小或取消旗舰项目
        - 削弱支撑当前关注度的需求和市场验证逻辑。
        - 推进前重新审视需求质量和客户集中度。
      - - 利润率继续隐藏或深度为负
        - 管理层无法展示项目级毛利率路径、保修假设或积压订单转化经济性
        - 让资本强度压过任何增长叙事。
        - 若价格含溢价则视为回避；要求硬性财务尽调。
      - - 执行压力重现
        - 收入验证前再次重组、紧急融资或对公共支持的依赖上升
        - 表明公司可能已经跑在自身运营模型前面。
        - 除非入场价格大幅降低作为补偿，否则从继续研究下调至回避。
    notes: 这些触发项面向投资委员会设计：每一项都把可监控事件和投资判断变化连接起来。
    claimRefs:
      - CV005
      - CV009
      - CV025
      - CV026
      - CV040
      - CV041
      - CV042
      - CV043
  - id: TV006
    title: 最终尽调问题表
    columns:
      - 主题
      - 缺失证据
      - 重要性
      - 负责人 / 尽调路径
    rows:
      - - 最新估值
        - 精确的投后估值、每股价格，以及任何 2025-2026 年二级市场或 409A 估值标记
        - 没有真实入场价，投资建议就无法用严谨方式体现价格敏感性。
        - 向管理层或领投方索取最新融资备忘录、董事会材料和二级市场价格参考。
      - - 股权结构表和优先权
        - 清算优先权、参与权、强制跟投条款、期权池刷新，以及高级证券堆叠
        - 即便经营改善，优先股堆叠也可能吃掉上行空间。
        - 获取股权结构表、章程修正案和最新投资条款清单。
      - - 收入可见度
        - 当前收入运行率、按交付年度拆分的已签订单、取消条款，以及订单积压转收入的桥接
        - 公开的 GWh 公告不足以直接撑起估值。
        - 索取已预订订单积压、转化假设和客户里程碑时间表。
      - - 项目利润率
        - 已交付 ASP、安装成本、质保准备金、服务义务，以及项目级毛利率假设
        - 商业声量可能很强，项目经济性仍可能很弱。
        - 审阅模型假设、首批项目经济性和制造良率数据。
      - - 客户集中度
        - 与 Great River、Xcel/Google、Crusoe、Georgia 及其他头部项目绑定的订单积压和预期收入占比
        - 少数交易对手似乎撑起了大部分公开动能。
        - 要求按已预订收入、已预订 GWh 和现金回款披露头部客户集中度。
      - - 制造规模化
        - Project RAPID 的良率、吞吐量、按产线拆分的资本开支、营运资本需求和 DOE 资金条件
        - 价值判断取决于连续生产，而不只是项目公告。
        - 审阅工厂 KPI、爬坡计划、DOE 授奖条件和产线级里程碑报告。
    notes: 这些问题是把本章从继续研究转成可投资承销备忘录所需的最低尽调包。
    claimRefs:
      - CV005
      - CI015
      - CV007
      - CV019
      - CV040
      - CV041
      - CV042
