  - id: FV003
    title: 估值 / 回报区间
    type: range
    layout: standard
    summary: 公开储能可比公司给出的销售倍数区间很宽，这也正说明，仅靠公开来源无法有把握地给 Form 定价。
    data:
      items:
        - label: 悲观 / 纪律性进入区间
          low: 0.54
          mid: 0.72
          high: 0.89
          detail: 锚定 Stem 和 Fluence 的公开市销率。
        - label: 基准 / 混合投机储能区间
          low: 5.15
          mid: 7.17
          high: 9.19
          detail: 锚定 ESS Tech 和 Energy Vault 的公开比率。
        - label: 乐观 / 稀缺性溢价区间
          low: 9.19
          mid: 14.42
          high: 19.64
          detail: 锚定 Energy Vault 和 Eos，代表高 beta 可选性，而不是已验证的经济性。
    approximationNotes: 这些市值 / 销售额区间来自 CompaniesMarketCap 2026 年 5 月的公开储能可比公司市值和收入页面。它们不是对 Form 的直接估值，因为 Form 未公开当前收入或最新融资价格。
    claimRefs:
      - CV027
      - CV028
      - CV029
      - CV030
      - CV031
      - CV032
      - CV033
      - CV034
      - CV035
      - CV039
  - id: FV004
    title: 投资 KPI
    type: kpi
    layout: standard
    summary: Form 在市场和客户验证上得分较高，在估值和经济性可见度上得分较低。
    data:
      items:
        - label: 市场顺风
          score: 8
          detail: 政策和需求背景支撑多日储能。
        - label: 客户验证
          score: 8
          detail: 以私营公司标准看，具名公用事业和数据中心交易对手异常强。
        - label: 技术差异化
          score: 7.5
          detail: 100 小时铁空气主张清晰、差异化明显。
        - label: 融资支持
          score: 7.5
          detail: 大额 Series F 融资叠加 DOE 制造支持，降低了近期生存风险。
        - label: 经济性可见度
          score: 3
          detail: 收入、利润率和 ASP 仍未披露。
        - label: 估值透明度
          score: 2
          detail: 没有公开投后估值，也没有清晰进入价格标记。
        - label: 下行风险平衡
          score: 4
          detail: 执行和资本密集度风险仍然显著。
        - label: 证据质量
          score: 5.5
          detail: 公开证据在势能上较强，在投资判断输入上较弱。
    approximationNotes: 评分是基于采信证据得出的 0-10 序数投委会摘要判断，不是外部评级。
    claimRefs:
      - CV023
      - CV024
      - CV040
      - CV010
      - CO022
      - CI015
      - CV005
      - CV025
      - CV041
      - CV042
