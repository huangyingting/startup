  - number: 5
    title: 产品与技术
    sections:
      - number: '5.1'
        title: 产品定义与客户工作流
        blocks:
          - type: paragraph
            body: >-
              Form Energy
              销售的是表前多日储能系统，而不是通用电池部件。公开电池技术页面围绕电力公司和电网运营商的痛点来定义产品：极端天气、可再生能源低谷、停电、输电拥堵，以及数据中心等大型负荷需求上升。公司的首个商业产品被明确描述为可放电最长
              100 小时的铁空气系统。公开材料反复把这一时长定位为相对锂离子的核心工作流差异，因为锂离子仍更适合短时日内平衡。Formware 之所以重要，是因为 Form
              推销的不只是硬件，而是一套规划和运营栈，帮助电力公司判断 100 小时资产在未来组合中该放在哪里。实践中，Form 的产品最好理解为铁空气硬件，加上建模、选址和集成支持。用例证据仍大多是前瞻性的，但具体到足以把
              Form 绑定到可识别的待办任务：多日可靠性、可再生能源整合、缓解拥堵，以及如今为 AI 驱动的负荷增长提供容量支持。这种具体性提高了信心：Form
              卖进的是真实运营工作流，而不是泛泛的“电网电池”品类。今天如此。
