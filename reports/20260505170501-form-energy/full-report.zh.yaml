  - number: 1
    title: 公司概览
    sections:
      - number: '1.1'
        title: 身份、产品边界与运营足迹
        blocks:
          - type: paragraph
            body: >-
              Form Energy
              如今对外呈现的是一家美国储能技术和制造公司，而不是实验室阶段的电池开发商。公司官网和电池技术页面都围绕多日电网可靠性讲业务：首个商业产品是一种铁空气电池，使用低成本的铁、水和空气，而非重锂化学体系，可储存并释放最长
              100 小时的电力。公开地点证据也比许多私营气候科技同行更扎实。Form 的联系页面列出 Weirton、Somerville 和 Berkeley 三处运营地点，2026 年 3 月的 Ireland
              公告则明确称 Somerville 是公司总部。合在一起，保留来源支持把 Form 视作一家以美国为基地、跨多地点运营的工业电池公司，研发根基在 Massachusetts，制造扩张落在 West
              Virginia。
            claimRefs:
              - CO002
              - CO003
              - CO004
              - CO005
              - CO006
              - CO007
      - number: '1.2'
        title: 创始人、领导层厚度与治理可见度
        blocks:
          - type: paragraph
            body: >-
              公开材料对创始人的归属异常一致。Form 自己的 About 页面和 Engine Ventures 的投资者简介都列出同样五位联合创始人：Mateo Jaramillo、Ted Wiley、William
              Woodford、Yet-Ming Chiang 和 Marco Ferrara。这些来源还把创始人-市场匹配落在他们此前横跨 MIT 材料科学、24M Technologies、A123 和 Tesla
              Energy 的经历上，这与电池化学、制造和电网商业化高度相关。现任高管披露在运营层面较扎实：Form 公开列名 Jaramillo、Wiley、Chiang、Woodford、Ferrara、首席商务官 RJ
              Johnson 和临时总法律顾问 Brian
              Lewis。治理披露薄得多。保留来源能看到高管和公共资金结构，但没有披露当前董事会名单、委员会结构或投资者控制权。临时法务头衔也说明，至少一项领导层变动在公开材料里仍只露出一部分。
