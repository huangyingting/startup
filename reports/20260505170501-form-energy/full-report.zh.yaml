        title: 附录
        blocks:
          - type: callout
            title: 公开证据结论：继续研究
            body: Form 商业可信度高，但公开来源仍看不出价格。管理层给出当前估值、股权结构条款，以及从收入到利润率的桥接之前，不要上调建议。
            calloutType: recommendation
            claimRefs:
              - CV005
