  - number: 4
    title: 财务
    sections:
      - number: '4.1'
        title: 收入模型与变现架构
        blocks:
          - type: paragraph
            body: >-
              公开证据指向一种项目制工业收入模型，而不是软件或消费者订阅模型。Form 通过与电力公司、公共部门项目以及如今与 Crusoe 面向 AI
              数据中心电力需求的战略容量协议，销售并部署电网级铁空气电池系统。可见商业模式在各交易对手间一致：客户签署项目或容量协议，Form 在 West Virginia
              制造系统，收入应跟随硬件交付、现场部署、调试，以及之后可能的服务义务。公开材料还显示，公司在电力公司尽调中使用 Formware 建模，但没有经审阅证据表明 Formware
              是一条单独变现的软件线。关键的变现细节在于，Form 已披露合同存在、预留容量，并在一个案例中披露预留定价条款，但尚未发布任何标价、实际
              ASP、折扣框架，或设备、施工支持和安装后服务之间的收入确认组合。这意味着收入机制看得见，但每个已签约 GWh 的经济性还看不见。
