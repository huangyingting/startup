  - id: TV003
    title: 乐观 / 基准 / 悲观情景表
    columns:
      - 情景
      - 明确假设
      - 估值 / 回报逻辑
      - 关键风险
      - 概率信号
    rows:
      - - 乐观
        - 量产按时爬坡，Great River 和 Xcel 项目顺利运行，Crusoe 与 Google 相关需求转化为交付，私下尽调显示毛利率可接受且融资条款干净。
        - 只有在披露收入可见性支撑入场、且不要求投资人凭盲信在高 beta 储能可比公司之上支付投机溢价时，才有吸引力。
        - 即便在上行情景，制造良率、交付节奏、保修敞口和客户集中度仍然重要。
        - 商业动能真实存在，但公开经济性还看不见。
      - - 基准
        - 积压订单继续扩张，但转化为收入较慢，且到 2026-2027 毛利率仍未证明。
        - 中性偏谨慎：只有价格纪律足够时才值得跟踪，估值逻辑可能更接近低个位数销售额倍数，而不是气候科技稀缺溢价。
        - 即便公司运营成功，稀释、优先权悬顶和客户变现延迟也可能侵蚀回报。
        - 基准情景最贴合当前公开记录：需求强，但经济性不透明。
      - - 悲观
        - 项目延误，连续生产慢于预期，或下一轮融资在利润率可见前到来。
        - 如果价格假设包含高溢价的长时储能稀缺价值，应当回避；下行可能类似那些估值重置到困境水平的上市储能公司。
        - 多重压缩、过度建设风险、融资依赖和首个项目表现不及预期。
        - 估值、股权结构表和利润率的公开盲点让该下行情景无法被排除。
    notes: 由于 Form 缺少公开收入和股价数据，情景逻辑采用的是投资判断口径，而不是虚假的精确点估计。
    claimRefs:
      - CV040
      - CV005
      - CV009
      - CV025
      - CV039
      - CV041
      - CV042
      - CV043
  - id: TV004
    title: 可比公司估值表
    columns:
      - 可比公司
      - 指标
      - 倍数 / 估值 / 状态
      - 相关性
      - 局限
    rows:
      - - Fluence
        - May 2026 市值和 2025 TTM 收入
        - 约 $2.26B 市值、$2.55B 收入、~0.9x 销售额
        - 样本中规模最大的上市电网储能运营商；可作为已有收入储能公司交易倍数的底线参照。
        - 主要是短时储能集成商和软件赋能运营商，不是 100-hour 电池制造商。
      - - Stem
        - May 2026 市值和 2025 TTM 收入
        - 约 $86.8M 市值、$160M 收入、~0.5x 销售额
        - 对失去市场信心的储能相邻上市公司来说，这是有用的困境底线。
        - 软件和优化业务组合并不是直接的化学体系或制造可比项。
      - - Energy Vault
        - May 2026 市值和 2025 TTM 收入
        - 约 $770M 市值、$83.8M 收入、~9.2x 销售额
        - 显示当公开投资人定价期权价值时，新型电网储能叙事仍能拿到溢价。
        - 业务组合和技术不同，因此这项溢价不能一比一搬到 Form。
      - - ESS Tech
        - May 2026 市值和 2025 TTM 收入
        - 约 $31.0M 市值、$6.0M 收入、~5.1x 销售额
        - 对早期商业化制造商有警示意义的相近电化学可比公司。
        - 微型市值且处于困境；估值主要由生存能力主导，而不是干净增长质量。
      - - Eos Energy
        - May 2026 市值和 2025 TTM 收入
        - 约 $2.16B 市值、$110M 收入、~19.6x 销售额
        - 显示美国电池制造稀缺性和反转期权仍可支撑很高的倍数。
        - 高 beta 复苏交易和资本结构细节让它难以单独作为 Form 的锚点。
    notes: 这些是来自 May 2026 公开市场数据的市值 / 销售额参照点，不是 Form 的直接公允价值目标。更适合把这个区间当作不确定性警示，而不是套用同行中位数的捷径。
    enumerationScope:
      coverage: partial
      basis: >-
        This table is a deliberate public-market sample of storage and storage-adjacent comparables that bracket Form’s
        business model and investor narrative. It is not exhaustive of private rounds, secondaries, or M&A because those
        prices are not broadly public or directly comparable for Form as of the run date.
