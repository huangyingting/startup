  - id: TP001
    title: 竞争对手概况表
    columns:
      - 竞争对手
      - 类别
      - 规模 / 融资
      - 目标细分市场
      - 差异化
      - 局限
    rows:
      - - Form Energy
        - 直接竞争 / 多日铁空气电池
        - 私有公司；首座工厂目标到 2028 年达到 500 MW 年产能；已披露与 Xcel、Great River 和 Georgia Power 的公用事业项目
        - 需要多日可靠性或可再生能源稳供的公用事业公司和负荷服务实体
        - 100 小时铁空气时长，叠加低成本材料叙事
        - 公开定价、胜率和规模化商业收入仍未披露
      - - ESS
        - 直接竞争 / 铁液流电池
        - 2025 年收入 $1.6M；流动性有限；基础项目包括 50 MWh SRP 系统和 27 MWh 军方合同
        - 商业和公用事业级长时储能用户
        - 8-22 小时铁液流；宣称 25+ 年寿命且容量不衰减
        - 商业规模仍小，财务缓冲有限
      - - Eos Energy
        - 直接竞争 / 锌基 LDES
        - 2025 年收入 $114.2M；积压订单 $701.5M；现金 $624.6M
        - 韧性电网和分布式长时储能
        - 美国本土锌基化学体系、集装箱化 Eos Cube、高密度 Indensity 架构
        - 公开重点不是 100 小时系统，执行仍是关键
      - - Highview Power
        - 直接相邻 / 液态空气基础设施
        - '>£500M 融资已披露；Hunterston 和 Carrington 分阶段项目'
        - 电网级长时储能与稳定服务
        - 大型基础设施式液态空气平台，配套电网稳定服务
        - 土建复杂度和项目融资要求不同于电池部署
      - - Hydrostor
        - 直接相邻 / A-CAES 基础设施
        - 私有公司；目标项目为 100+ MW 和 8+ 小时
        - 电网运营商和大型能源用户
        - 先进压缩空气储能，采用大规模设计，功率 / 能量配置灵活
        - 需要洞穴资源和项目开发执行
      - - Fluence
        - 既有替代方案 / 公用事业级电池集成商
        - 2025 年收入 $2.3B；积压订单 $5.3B；流动性 $1.3B
        - 大规模部署成熟电池系统的公用事业公司
        - 分销、软件和采购可信度
        - 保留来源中没有公开的 100 小时产品宣称
      - - 抽水蓄能
        - 现状长时储能替代方案
        - 成熟基础设施技术
        - 需要长时储能的公用事业公司和系统规划者
        - 运营历史深厚的既有长时储能基准
        - 依赖特定场址且资本开支重；不是模块化电池
    notes: 概况表混合了直接同行、相邻长时储能形态和既有方案，因为公用事业公司可以沿多条采购路径解决同一个可靠性任务。
