      - number: '2.2'
        title: 规模测算视角：宏观需求很大，但没有干净的公开 Form 专属 SAM
        blocks:
          - type: paragraph
            body: >-
              公开规模证据有用，但拼不出干净的 Form 专属 TAM/SAM/SOM 栈。监管和行业来源显示，美国储能市场增长很快，电力系统到 2050 年需要更多灵活性；但同一批来源并未拆出其中有多少支出会落到 100
              小时电池上。ACP 2025 年创纪录的 18.9 GW 电池装机和 EIA 储能趋势，验证了广义储能需求强劲；McKinsey/LDES Council、WRI、NREL 和 WECC
              则都描述了一个未来电力系统：随着可再生能源渗透率上升，多日灵活性会更有价值。BloombergNEF
              又给出另一层视角：部分非锂技术在超过八小时后可能低于锂离子成本，但多数仍处早期，且取决于部署。正确解读因此不是一个醒目的 TAM，而是受约束的市场镜头。Form
              可以指向电力公司项目和制造爬坡，但公开证据仍不足以支撑可核验的公司专属 SAM 或 SOM。
