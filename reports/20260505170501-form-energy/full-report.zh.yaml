  - number: 2
    title: 市场分析
    sections:
      - number: '2.1'
        title: 市场边界与正确可比集
        blocks:
          - type: paragraph
            body: >-
              Form Energy
              面对的是一场大型储能转型，但承保市场比“所有储能”或“所有电网资本开支”更窄。保留的官方、监管和政策来源一致指向这样一段市场：电力公司需要把电力跨越多日天气事件、可再生能源低谷或资源充裕性窗口进行转移，而四小时系统无法完全覆盖。Form
              自己的客户证据也集中在表前、以电力公司为中心：Xcel、Great River Energy 和 Georgia Power
              买的不是通用电池集装箱，而是在测试或采购多日容量，以整合更多可再生能源并守住可靠性。这意味着纳入的支出应是公用事业级多日储能、可再生能源出力稳定、韧性和容量价值。排除的支出应包括无关的输电扩建、通用短时套利电池，以及经济性从不依赖长时放电的固定储能部署。现状替代方案仍然重要：抽水蓄能、短时锂离子、燃气调峰电厂和其他电网升级路径，仍是买家的默认选择。
