        title: 耐久性和集中度仍是最大的公开盲点
        blocks:
          - type: paragraph
            body: >-
              乐观解读是，Form 已不再依赖一个试点或一个地区。公开参考如今覆盖 Minnesota、Colorado、Georgia、California、New York、Maine，并通过 Crusoe
              进入全国性数据中心叙事。这种广度反驳了公开管线中显而易见的单一客户依赖。更难处理的解读是，几乎所有最强参考仍是收入前或早期收入项目里程碑：试点、示范、监管批准、拨款和容量预留。公开材料没有披露净留存、总留存、流失、续约节奏、合同期限、按收入计算的客户集中度，或按项目类别划分的毛利率。即使最好的
              Great River
              证据，也仍强调在更大范围铺开前进行多年研究。对尽调而言，正确结论因此是平衡的：具名客户证据真实且在扩大，但关系耐久性和真实经济性的集中度仍基本藏在公开记录之外。这也是为什么本章应被读作采用证明，而不是留存证明。公开证据足以说客户是真实的，多类买家愿意参与，项目规模有意义；但若没有直接公司尽调，还不足以承保客户终身价值。
