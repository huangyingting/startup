      - number: '8.2'
        title: 为什么这条逻辑原则上值得投资
        blocks:
          - type: paragraph
            body: >-
              估值案例的正面部分很好讲。Form 并不是要求投资人相信一个不存在的市场：DOE 把长时储能定义为面向大规模商业部署的 10 小时以上系统，EIA 的 2026
              展望称电力需求恢复增长，数据中心负荷已成为主要驱动。Form 在这个阶段也比许多气候制造同行拥有更多客户证据。Great River 已经为首个商业部署破土，Georgia Power 仍在最终协议下推进，DOE
              和 Xcel 正在资助成对的多日示范，Google 与 Xcel 宣布 30 GWh 系统，Crusoe 锁定 12 GWh
              并约定保留定价和交付条款，爱尔兰则增加了一个国际验证点。换句话说，公司有市场顺风、可信交易对手，也有一套制造扩建；如果执行守住，这套产能足够有分量。上述事实证明继续尽调有价值，也解释了为什么本章即便没有给出买入建议，公司仍值得关注。
