      - number: '6.2'
        title: 具名客户证据在项目阶段和交易对手上最强，在实际运营结果上还不够强
        blocks:
          - type: paragraph
            body: >-
              最好的客户证据是按阶段分布的。Great River 是最干净的具名参考，因为它覆盖 2020 年试点合同、2024 年破土、具体 1.5 MW / 150 MWh 配置，以及明确的多年评估期。Georgia
              Power 是最可见的公用事业级协议，规模为 15 MW / 1,500 MWh，但即便如此，公开记录仍使用前瞻性表述，并提到监管批准。Xcel
              的证据在认真程度上很强——确定性协议、煤电场址选择、Minnesota PUC 成本回收、DOE 支持的 MIND 开发资金——但在运营成熟度上较弱，因为项目在 2024
              年仍处于规划和许可阶段。California 和 New York 重要，是因为政府资金把 Form 从纸面研究推到具有具名规模和东道方的商业示范。Crusoe 把故事从电力公司脱碳扩展到 AI
              驱动的负荷增长，但协议仍是 2027 年开始的预留容量，而不是已运行现场。实际含义是，Form 的具名客户证据足以支撑商业化叙事，但还不足以证明可重复的运营卓越。公开记录显示有严肃买家和严肃项目；它还没有显示
