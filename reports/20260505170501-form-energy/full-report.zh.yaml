  - number: 7
    title: 风险
    sections:
      - number: '7.1'
        title: 今天最清晰的已记录反向风险，是网络 / 隐私事件加监管可见度缺口
        blocks:
          - type: paragraph
            body: >-
              Form Energy 在保留记录中最具体的反向事件，不是电池起火或许可执法行动，而是向 New Hampshire Attorney General 披露的 2025 年 9
              月勒索软件事件。这一点重要，因为它把网络和隐私风险从抽象尽调套话，变成一个有具名数据类别、邮寄通知和 24 个月补救支持的已记录事件。第二个法律监管主题是可见度，而不是已知违规。West Virginia
              显然有许可、申诉和工人安全投诉机制，公民、监管者和员工都能触达这些机制。但保留来源仍未披露 Weirton 场址的准确有效许可 ID、条件，或任何 Form
              特定执法历史。这意味着投资者可以画出法律和监管路径，但仅凭公开网页证据，还无法完成 Form
              现场许可栈的尽调。唯一另一个保留公开诉讼是一宗就业歧视案，曾被提起、后已终止；它是可管理信号，而不是单独打破投资论点的事项。净结论是，目前法律风险更多来自隐私暴露、报告义务和监管透明度不足，而不是已公开记录的重大环境或
              IP 行动模式。
