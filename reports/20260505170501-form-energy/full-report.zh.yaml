      - number: '7.2'
        title: 商业化风险仍主要是进度、依赖和工厂爬坡风险
        blocks:
          - type: paragraph
            body: >-
              最大的承销问题不在于 Form 能否讲出有说服力的化学路线，而在于公司能否把几个高度依赖里程碑的项目变成可反复交付、也融得到钱的常规执行。Great River
              仍是首个商业部署；在保留的最新来源里，它还没有投运，尽管规模、2025 年末目标和多年研究计划都已经具体。Xcel 路径同样严肃，但仍卡在分阶段 DOE
              开发资金、规划、设计和许可上。缅因州项目规模更大，成败不只看 Form 能否交付电池，还取决于区域输电与储能项目能否跑通。供给侧，Form 一边爬坡 Weirton，一边把工厂扩建约 300,000 sq
              ft，还要在棕地建设现实中从试产转向商业化生产。这些风险并不致命，却把执行通道压得很窄：工厂爬坡、合作方准备度或首批现场部署只要滑坡，就会推迟把公共热度转化为持久运营证据。因此，证据支持把商业化时点和合作方依赖排在下行情景树的前列。
