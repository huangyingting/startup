callouts:
  - calloutType: strength
    title: Named counterparties are real and widening
    body: >-
      Form now has public references across cooperative utilities, IOUs, state agencies, and a large AI-infrastructure
      buyer, which is materially better than a single-demo commercialization story.
    claimRefs:
      - C242
      - C252
      - C255
  - calloutType: risk
    title: Public proof is pipeline-heavy, not retention-heavy
    body: >-
      Almost every strong public customer reference is still an agreement, grant, demonstration, or pilot milestone.
      There is still no public retention, renewal, or concentration disclosure.
    claimRefs:
