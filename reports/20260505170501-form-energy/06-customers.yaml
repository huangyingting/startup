  - id: TU005
    title: Expansion and concentration risk table
    columns:
      - expansion driver
      - concentration risk
      - impact
      - diligence path
    rows:
      - - Utility decarbonization and coal-plant transition
        - A small number of flagship utilities could dominate early booked volume
        - Pipeline may look broad while economics remain concentrated
        - Request top-customer backlog and revenue share
      - - State-backed commercialization programs
        - Grant dependence can flatter momentum before true merchant or regulated utility demand is proven
        - Project pipeline may be supported by public capital more than recurring utility economics
        - Separate grant-backed demand from utility self-funded demand
      - - AI data-center load growth via Crusoe
        - A few hyperscale or AI-infrastructure buyers could become very large quickly
        - Large buyers may improve scale but create single-buyer bargaining power
        - Request backlog split by utility vs AI-load buyers
      - - Great River-style pilot-to-expansion path
        - Pilot success may not convert into multi-site rollout
        - Narrative momentum could exceed real repeat economics
        - Request follow-on bookings and post-pilot decision criteria
      - - Regional expansion into CA / NY / Maine
        - Permitting, community acceptance, and state-program design can slow rollout
        - Commercialization timelines may slip despite signed awards
        - Track regulatory milestones, local acceptance, and revised COD dates
      - - Growing project list across geographies
        - No public concentration or renewal data means diversification cannot be assumed
        - Breadth of logos does not equal breadth of realized revenue
        - Request customer concentration, cancellation rates, and renewal metrics
    notes: null
    claimRefs:
