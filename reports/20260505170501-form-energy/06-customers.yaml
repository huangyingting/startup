  - id: T603
    title: Named customer proof table
    columns:
      - customer
      - segment
      - deployment / use case
      - production vs pilot
      - outcome
      - limitation
    rows:
      - - Great River Energy
        - Cooperative utility
        - Cambridge multi-day storage project in Minnesota
        - Pilot / first commercial deployment
        - Groundbreaking completed; late-2025 operating target; multi-year study planned
        - No public economic outcome or renewal data yet
      - - Georgia Power
        - Investor-owned utility
        - 15 MW / 1,500 MWh 100-hour storage in Georgia
        - Pre-production utility-scale agreement
        - Definitive agreement publicly announced with clear size
        - Still subject to regulatory approvals and timing caveats
      - - Xcel Energy
        - Investor-owned utility
        - Two 10 MW / 1,000 MWh systems at Becker and Pueblo coal-transition sites
        - Demonstration / development
        - Definitive agreements plus DOE-backed development phases
        - Planning and permitting stage is not the same as operating production
      - - NYSERDA
        - State commercialization sponsor
        - 10 MW / 1,000 MWh New York demonstration
        - Demonstration
        - Public funding award validates external demand for commercialization
        - Location and operating outcomes were still unsettled publicly
      - - California Energy Commission / PG&E host
        - State program + utility host
        - 5 MW / 500 MWh East Road commercial demonstration at PG&E substation
        - Commercial demonstration
        - State funding and environmental approval in hand
        - Still a demonstration asset, not a fleet rollout
      - - Crusoe
        - AI infrastructure buyer
        - 12 GWh reserved-capacity agreement for AI data centers
        - Pre-deployment capacity agreement
        - Reserved volume, pricing, and delivery terms are public
        - Not yet a live operating customer site
