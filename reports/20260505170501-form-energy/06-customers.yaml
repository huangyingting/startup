  evidenceGaps:
    - type: private-evidence-only
      severity: material
      topic: Retention and durability
      missingEvidence: No public NRR, GRR, logo churn, contract-length, or renewal-cohort data was found for Form Energy customers.
      whyItMatters: >-
        Without retention data, the public record cannot distinguish a strong booked pipeline from durable revenue
        compounding.
      diligencePath: >-
        Request renewal schedules, contract lengths, cohort retention, and pilot-to-expansion conversion by major
        project family.
      relatedQuestionRefs:
        - RQ616
    - type: missing-source
      severity: material
      topic: Customer concentration
      missingEvidence: Public sources name many counterparties but do not disclose revenue share, backlog share, or margin by customer.
      whyItMatters: A broad project roster can still hide material concentration in a few contracts or grant programs.
      diligencePath: >-
        Request top-customer revenue / backlog concentration and segment mix for utility, public-sector, and data-center
        buyers.
      relatedQuestionRefs:
        - RQ615
    - type: enumeration-incomplete
      severity: minor
      topic: Named customer proof table
      missingEvidence: >-
        The table captures the public named counterparties reviewed in this run, but public evidence may omit
        confidential or earlier-stage buyers.
      whyItMatters: Form’s private sales pipeline is likely broader than public disclosures.
      diligencePath: Request full pipeline segmentation and signed-but-undisclosed counterparties under NDA where permitted.
      relatedTableRefs:
        - T603
    - type: missing-source
      severity: material
      topic: Retention cohort figure substitution
      missingEvidence: Public evidence does not provide month- or year-bucket retention percentages required for a cohort figure.
      whyItMatters: A qualitative customer chapter can be written without cohorts, but a true durability view cannot.
      diligencePath: Request cohort curves or annual renewal tables by project / segment.
      relatedQuestionRefs:
        - RQ625
      relatedTableRefs:
        - T606
    - type: stale
      severity: minor
      topic: Great River / Xcel timing
      missingEvidence: >-
        Several public sources from 2023-2024 gave early online estimates for 2025 that still need refresh once the
        first operating Form systems are public.
      whyItMatters: Timing slippage would change how investors interpret commercialization momentum.
      diligencePath: >-
        Refresh project status against 2026 utility filings and Form project updates before using dates in valuation
        work.
      relatedQuestionRefs:
        - RQ621
        - RQ622
acknowledgedWarnings:
  - dimension: duplicateAnalysis
    reason: >-
      T602 records dated milestone evidence and named metrics, while F601 abstracts the customer journey; T605 details
