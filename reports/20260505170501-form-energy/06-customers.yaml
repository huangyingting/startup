  - id: T606
    title: Retention / cohort substitution table
    columns:
      - segment
      - planned cohort question
      - public data available
      - why cohort figure is unsupported
      - substitute evidence
      - diligence ask
    rows:
      - - Utility pilot customers
        - Do initial pilots renew into larger fleets across time buckets?
        - Stage milestones and expansion language only
        - No month- or year-bucket retention percentages are public
        - Use Great River and Xcel stage progression as weak proxies only
        - Request cohort of pilots by year and follow-on contract status
      - - Utility-scale agreement customers
        - Do large utility agreements move from signed deal to live site and then expansion?
        - Signed agreements and expected COD dates
        - Public sources do not disclose conversion or renewal rates
        - Use Georgia and California stage progression instead of a false cohort chart
        - Request signed-to-NTP, NTP-to-COD, and COD-to-expansion conversion
      - - Public-program-backed projects
        - Do demonstration grants create durable recurring procurement?
        - Grant awards and approvals
        - Grant awards are one-time events, not retention datapoints
        - Use NYSERDA and CEC award progression only
        - Request repeat procurement from same agencies or host utilities
      - - Large-load / data-center buyers
        - Do reserved-capacity deals convert into live operating sites and follow-on orders?
        - Reserved volume and delivery terms only
        - No public time-series purchase behavior exists yet
        - Use Crusoe capacity agreement as an expansion-surface marker only
        - Request backlog conversion and renewal options by buyer
    notes: >-
      The chapter packet planned a retention / repeat cohort figure, but the retained sources do not provide
      time-bucketed retention percentages required by the cohort schema. This substitution table records the missing
      data rather than inventing a cohort chart.
    claimRefs:
      - C253
      - C254
      - C261
figures:
  - id: F601
    title: Customer journey map
    type: journey-map
    layout: wide
    summary: >-
      Form’s customer journey typically moves from planning study or funding award to site-specific demonstration, then
      to live operation and potential fleet or segment expansion.
    data:
      nodes:
        - id: j1
          label: Problem identification
          detail: Utility, state program, or large-load buyer identifies a multi-day reliability or capacity problem.
          tone: neutral
        - id: j2
          label: Modeling / evaluation
          detail: Formware-backed studies or agency diligence test whether 100-hour storage fits the use case.
          tone: neutral
        - id: j3
          label: Award / contract
          detail: Customer or sponsor signs a pilot, definitive agreement, grant, or capacity reservation.
          tone: positive
        - id: j4
          label: Permitting / development
          detail: Project moves through regulatory review, environmental work, or DOE development phases.
          tone: warning
        - id: j5
          label: Construction / delivery
          detail: Systems are manufactured in Weirton and delivered to the host site.
          tone: positive
        - id: j6
          label: Operation / expansion decision
          detail: Customer evaluates field results and decides whether to scale to broader deployment.
          tone: warning
    approximationNotes: >-
      The path compresses several public project types into one generic journey; not every customer will pass through
      every step.
    claimRefs:
      - C223
      - C224
      - C230
      - C234
      - C236
      - C239
      - C248
