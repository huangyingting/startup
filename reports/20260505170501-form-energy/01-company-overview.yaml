chapter:
  number: 1
  title: Company Overview
  summary: >-
    Form Energy is a privately held Somerville, Massachusetts energy-storage manufacturer founded in 2017 to
    commercialize 100-hour iron-air batteries for the electric grid. Retained public sources support more than $1.2
    billion raised, nearly 1,000 employees, an operating factory in Weirton, West Virginia, and expanding utility and
    data-center partnerships through March 2026. The main unresolved items are latest valuation, precise customer and
    revenue metrics, current board composition, and a complete public record of leadership changes.
sections:
  - id: section-1
    title: Identity, product scope, and operating footprint
    body: >-
      Form Energy currently presents itself as an American energy storage technology and manufacturing company rather
      than as a laboratory-stage battery developer. Its public homepage and battery-technology pages frame the business
      around multi-day grid reliability: the company’s first commercial product is an iron-air battery that can store
      and discharge electricity for up to 100 hours, using low-cost iron, water, and air instead of lithium-heavy
      chemistry. Public location evidence is also stronger than at many private climate-tech peers. Form’s contact page
      lists operating sites in Weirton, Somerville, and Berkeley, while the March 2026 Ireland announcement explicitly
      calls Somerville the company’s headquarters. Taken together, the retained sources support treating Form as a
      U.S.-based, multi-site industrial battery company with Massachusetts development roots and West Virginia
      manufacturing scale-up.
    claimRefs:
      - CO002
      - CO003
      - CO004
      - CO005
      - CO006
      - CO007
  - id: section-2
    title: Founders, leadership bench, and governance visibility
    body: >-
      Founding attribution is unusually consistent in public materials. Form’s own About page and an investor profile
      from Engine Ventures identify the same five co-founders: Mateo Jaramillo, Ted Wiley, William Woodford, Yet-Ming
      Chiang, and Marco Ferrara. Those sources also anchor founder-market fit in prior work spanning MIT materials
      science, 24M Technologies, A123, and Tesla Energy, which is highly relevant for battery chemistry, manufacturing,
      and grid commercialization. Current executive disclosure is solid at the operating level: Form publicly names
      Jaramillo, Wiley, Chiang, Woodford, Ferrara, Chief Commercial Officer RJ Johnson, and Interim General Counsel
      Brian Lewis. Governance disclosure is much thinner. The retained sources expose executives and public-funding
      structures, but they do not disclose a current board roster, committee structure, or investor control rights. The
      interim legal title also suggests at least one leadership transition remains only partially visible in public
      materials.
    claimRefs:
      - CO008
      - CO009
      - CO010
      - CO011
      - CO012
      - CO013
      - CO014
      - CO015
      - CO016
      - CO051
    tableRefs:
      - TO002
  - id: section-3
    title: Capital formation, investor mix, and manufacturing support
    body: >-
      Form’s funding history now reads like a classic late-stage climate-manufacturing buildout. The company’s progress
      page discloses a financing chain from a $9 million Series A in 2018 through a $405 million Series F in October
      2024. Publicly disclosed lead investors moved from climate and hard-tech specialists such as Breakthrough Energy
      Ventures, Prelude Ventures, The Engine, Eni Next, Coatue, XCarb, and TPG Rise to late-stage capital led by T. Rowe
      Price. Series F also brought in GE Vernova as both an investor and manufacturing/commercial collaborator. That
      capital stack is complemented by public-sector support. Form’s September 2024 release said DOE selected the
      company for up to $150 million of manufacturing support tied to a new line that could reach 20 GWh of annual
      capacity by 2027. A 2023 West Virginia legislature summary described an additional $300 million state package with
      collateral and job-creation conditions, highlighting how public financing is part of the scale thesis, not a side
      note.
    claimRefs:
      - CO017
      - CO018
      - CO019
      - CO020
      - CO021
      - CO022
      - CO023
      - CO024
      - CO025
      - CO035
      - CO036
    tableRefs:
      - TO001
      - TO003
  - id: section-4
    title: Manufacturing readiness, deployment momentum, and scale signals
    body: >-
      Public scale evidence is strongest on manufacturing progress and announced deployments, and much weaker on classic
      software-style KPIs like customer count or revenue run-rate. Form says it completed a 550,000-plus-square-foot
      Form Factory 1 in 2024, began trial production there, and had moved from more than 250 factory employees in
      September 2024 to over 900 company-wide employees in October 2024 and nearly 1,000 employees on the current About
      page. A February 2025 company statement reported by local media said a restructuring affected fewer than 5% of
      total employees, but the company still had more than 350 team members at the factory and nearly 40 open roles.
      Commercially, the record is now materially deeper than a single pilot: Great River Energy broke ground on Form’s
      first commercial deployment in 2024, Xcel and Form advanced multi-day projects in Minnesota and Colorado, Xcel and
      Google announced a 30 GWh project in 2026, Form announced a 12 GWh Crusoe agreement for AI infrastructure, and the
      company said it had more than 75 GWh of projects under agreement by March 2026. Public sources still do not
      disclose precise customer count or revenue.
    claimRefs:
      - CO028
      - CO029
      - CO030
      - CO031
      - CO032
      - CO033
      - CO037
      - CO038
      - CO039
      - CO040
      - CO043
      - CO044
      - CO046
      - CO047
      - CO049
    figureRefs:
      - FO003
  - id: section-5
    title: Milestones of record and the remaining diligence gaps
    body: >-
      The public chronology is reusable enough for later chapters. It begins with the 2017 founding, continues through
      disclosed Series A through Series F financings, the 2020 Great River pilot agreement, the 2023 Xcel project
      announcements, the Weirton groundbreaking and state-support package, the August and September 2024 commercial and
      manufacturing milestones, the 2024 DOE selection and safety milestone, the February 2025 restructuring, and the
      February-March 2026 sequence of Google/Xcel, Ireland, and Crusoe announcements. That chronology is good enough to
      anchor later market, product, and financial work. The most important open questions are not about whether Form
      exists or is scaling, but about how the business should be underwritten. Retained public sources still do not
      provide a clean latest valuation, a precise customer count, a public revenue run-rate, or a current board roster
      and control-rights map. Those gaps should be carried forward explicitly rather than normalized into false
      precision.
    claimRefs:
