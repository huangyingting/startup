callouts:
  - calloutType: strength
    title: Utility buyer proof is unusually concrete for a pre-scale LDES company
    body: >-
      Form is not selling a hypothetical market. Public counterparties already include Xcel, Great River Energy, and
      Georgia Power, which means the company has evidence across multiple utility buying motions even though broader
      market capture remains unproven.
    claimRefs:
      - CM005
      - CM006
      - CM007
      - CM008
  - calloutType: risk
    title: Short-duration storage growth can crowd out the inter-day window Form needs
    body: >-
      Record battery deployment growth validates demand for storage generally, but adverse sources show lithium-ion is
      still taking much of the 8-12 hour pipeline. If that keeps improving while capacity rules stay conservative,
      Form’s 100-hour advantage may monetize slower than headline LDES narratives suggest.
    claimRefs:
      - CM019
      - CM020
      - CM021
      - CM023
      - CM035
      - CM039
  - calloutType: assumption
    title: Public SAM remains a constrained utility wedge, not a proven global TAM
    body: >-
      Retained sources support multiday value and buyer interest, but they do not produce a defensible company-specific
      SAM or SOM. Any valuation model that assumes rapid penetration of the broad storage market needs data-room
      evidence on conversion rates, pipeline quality, and utility procurement timing.
    claimRefs:
      - CM018
      - CM025
      - CM030
      - CM040
