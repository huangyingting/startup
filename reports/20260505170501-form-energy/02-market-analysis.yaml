        - driver
        - Current through 2050
        - Creates more need for capacity, flexibility, and reliability tools
        - Map which load-growth regions most value multiday storage
      - - Higher renewable penetration in some grids
        - driver
        - Current through 2050
        - Increases the potential value of longer-duration flexibility in selected regions
        - Request region-specific modeling rather than one generic TAM
      - - Utility proof points from Xcel, Great River, and Georgia Power
        - driver
        - Current
        - Shows real buyer interest across multiple utility classes
        - Test whether pilots convert into fleet-scale follow-on orders
      - - Resource-adequacy and resilience value
        - driver
        - Current
        - Supports a premium use case beyond daily arbitrage
        - Clarify how each target market compensates multiday duration
      - - Resource-adequacy accreditation and market-design gaps
        - constraint
        - Current
        - Can suppress monetization even when technical need exists
        - Review ISO/RTO and utility capacity rules market by market
      - - Lithium-ion cost and deployment momentum
        - constraint
        - Current
        - Short-duration incumbents may absorb much of the inter-day opportunity
        - Benchmark Form against 8-12 hour lithium-ion offers and FID trends
      - - Utility adoption caution
        - constraint
        - Current
        - Pilots can remain pilots if utilities are slow to approve new chemistries
        - Request utility procurement cycle data and post-pilot decision criteria
      - - Manufacturing and project-delivery ramp
        - constraint
        - Current through 2028
        - Factory and EPC execution can limit realized share of a large market
        - Quantify 2026-2028 deliverable MW and bottlenecks
    notes: >-
      Drivers and constraints are mixed because both determine whether a theoretically attractive market becomes
