  evidenceGaps:
    - type: missing-source
      severity: blocking
      topic: Latest Form Energy valuation remains undisclosed
      missingEvidence: Exact post-money valuation, share price, and any 2025-2026 secondary or 409A pricing references for Form Energy.
      whyItMatters: This chapter cannot make a price-sensitive recommendation without knowing the current entry reference point.
      diligencePath: Obtain the latest financing memo, board-approved term sheet, 409A summary, and any secondary transaction marks.
      relatedQuestionRefs:
        - RQ804
      relatedTableRefs: []
    - type: private-evidence-only
      severity: blocking
      topic: Preference stack and dilution overhang are not public
      missingEvidence: >-
        Liquidation preference seniority, participation terms, pay-to-play mechanics, option-pool refresh, and any debt
        or structured equity overhang.
      whyItMatters: >-
        Capital structure can dominate exit returns even when operating execution improves, especially in
        capital-intensive manufacturing businesses.
      diligencePath: >-
        Request the cap table, charter amendments, financing documents, and latest investor rights summary from
        management counsel.
      relatedQuestionRefs:
        - RQ826
      relatedTableRefs: []
    - type: private-evidence-only
      severity: blocking
      topic: Current revenue and margin underwriting package is unavailable
      missingEvidence: >-
        Current revenue run-rate, backlog by delivery year, cancellation rights, ASP, gross margin, warranty reserve,
        and backlog-to-revenue conversion schedule.
      whyItMatters: >-
        Public GWh announcements are useful demand signals but insufficient to value Form without unit economics and
        timing.
      diligencePath: >-
        Obtain management financial model extracts, booked backlog schedule, customer contract summaries, and
        first-project margin analysis.
      relatedQuestionRefs:
        - RQ827
      relatedTableRefs: []
    - type: enumeration-incomplete
      severity: minor
      topic: Comparable valuation table is a sampled public set, not an exhaustive private-market ledger
      missingEvidence: >-
        A clean, public list of directly comparable private rounds, secondaries, and M&A outcomes for long-duration
        storage companies.
      whyItMatters: >-
        Private pricing would be more relevant to Form than public-comp shorthand, but those data are not broadly
        available on the open web.
      diligencePath: >-
        Supplement the public-comp set with private-market databases, banker materials, and investor references under
        NDA.
      relatedQuestionRefs: []
      relatedTableRefs:
        - T804
