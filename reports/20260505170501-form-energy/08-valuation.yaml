  - id: T804
    title: Comparable valuation table
    columns:
      - comparable
      - metric
      - multiple / valuation / status
      - relevance
      - limitation
    rows:
      - - Fluence
        - May 2026 market cap and 2025 TTM revenue
        - About $2.26B market cap, $2.55B revenue, ~0.9x sales
        - >-
          Best scaled public grid-storage operator in the set; useful floor for what revenue-bearing storage can trade
          at.
        - Primarily a shorter-duration integrator and software-enabled operator, not a 100-hour battery manufacturer.
      - - Stem
        - May 2026 market cap and 2025 TTM revenue
        - About $86.8M market cap, $160M revenue, ~0.5x sales
        - Useful distressed floor for a storage-adjacent public name that lost market confidence.
        - Software and optimization mix is not a direct chemistry or manufacturing analogue.
      - - Energy Vault
        - May 2026 market cap and 2025 TTM revenue
        - About $770M market cap, $83.8M revenue, ~9.2x sales
        - Shows how a novel-grid-storage narrative can still command a premium when public investors price optionality.
        - Business mix and technology are different, so the premium is not portable one-for-one to Form.
      - - ESS Tech
        - May 2026 market cap and 2025 TTM revenue
        - About $31.0M market cap, $6.0M revenue, ~5.1x sales
        - Useful chemistry-adjacent cautionary comp for an early commercial manufacturer.
        - Micro-cap and distressed; valuation is dominated by survivability rather than clean-growth quality.
      - - Eos Energy
        - May 2026 market cap and 2025 TTM revenue
        - About $2.16B market cap, $110M revenue, ~19.6x sales
        - >-
          Shows that U.S. battery-manufacturing scarcity and turnaround optionality can still support very high
          multiples.
        - High-beta recovery dynamics and capital-structure specifics make it a poor standalone anchor for Form.
    notes: >-
      These are market-cap-to-sales reference points from May 2026 public market data, not a direct fair-value target
      for Form. The spread is better used as a warning about uncertainty than as a peer-median shortcut.
    enumerationScope:
