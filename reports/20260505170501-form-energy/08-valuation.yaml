  - id: T803
    title: Bull / base / bear scenario table
    columns:
      - scenario
      - explicit assumptions
      - valuation / return logic
      - key risks
      - probability signal
    rows:
      - - bull
        - >-
          Serial production ramps on time, Great River and Xcel projects operate cleanly, Crusoe and Google-linked
          demand convert into deliveries, and private diligence shows acceptable gross margins plus clean financing
          terms.
        - >-
          Only attractive if entry is supported by disclosed revenue visibility and does not demand paying a speculative
          premium above high-beta storage comps on blind faith.
        - >-
          Manufacturing yield, delivery timing, warranty exposure, and customer concentration still matter even in the
          upside case.
        - Commercial momentum is real, but public economics are not yet visible.
      - - base
        - Backlog keeps expanding, but conversion into revenue is gradual and margins remain unproven through 2026-2027.
        - >-
          Neutral to cautious: a trackable opportunity only at disciplined pricing, likely closer to low-single-digit
          sales logic than scarcity-premium climate-tech logic.
        - >-
          Dilution, preference overhang, and delayed customer monetization can erode returns even if the company
          succeeds operationally.
        - This best matches the current public record of strong demand but opaque economics.
      - - bear
        - >-
          Projects slip, serial production is slower than expected, or the next financing arrives before margins are
          visible.
        - >-
          Avoid if price assumes premium long-duration scarcity value; downside can resemble the public storage names
          that reset to distressed valuations.
        - Multiple compression, overbuild risk, financing dependence, and first-project underperformance.
        - Public blind spots on valuation, cap table, and margin make this downside impossible to dismiss.
    notes: >-
      Because public revenue and share-price data for Form are missing, scenario logic is framed as underwriting posture
      rather than a false-precision point estimate.
