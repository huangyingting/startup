  - id: T802
    title: Thesis / anti-thesis table
    columns:
      - side
      - argument
      - what would change the view
    rows:
      - - thesis
        - >-
          Long-duration storage has policy and demand tailwinds, and EIA now expects sustained load growth partly from
          data centers.
        - >-
          This weakens if load growth moderates materially or utilities stop procuring multiday storage for reliability
          capacity.
      - - thesis
        - >-
          Form has unusually strong named-customer proof for a private climate manufacturer: Great River, Georgia Power,
          Xcel, Google, Crusoe, NYSERDA, and Ireland.
        - >-
          This strengthens if early projects reach operations on schedule and convert into repeat orders with disclosed
          economics.
      - - anti-thesis
        - >-
          Public evidence still does not disclose current valuation, price per share, liquidation preferences, revenue
          run-rate, or gross margins.
        - >-
          This risk falls sharply if management provides the latest term sheet, 409A or secondary marks, and a
          backlog-to-revenue bridge.
      - - anti-thesis
        - >-
          FOAK manufacturing and deployment remain capital- and time-intensive, and storage comps show valuations can
          compress violently when execution slips.
        - >-
          This improves if serial production, warranty performance, and project contribution margins are demonstrated
          over multiple customer deliveries.
    notes: >-
      The table separates company quality from investability at a specific price; the unresolved anti-thesis items are
      valuation and economics disclosure, not market existence.
