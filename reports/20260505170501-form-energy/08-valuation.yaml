  - id: T805
    title: Thesis-break and kill triggers table
    columns:
      - trigger
      - threshold
      - transmission to thesis
      - action implication
    rows:
      - - Valuation remains opaque
        - No disclosed share price, post-money, or term-sheet visibility during diligence
        - Prevents any evidence-based entry discipline and leaves preference overhang unknowable.
        - >-
          Do not invest; keep recommendation at research-more or move to avoid if price discipline cannot be
          established.
      - - Serial-production slip
        - First customer deliveries miss expected 2026 proof points or require repeated schedule resets
        - Weakens the core commercialization narrative and raises financing risk.
        - Avoid paying premium pricing until production consistency is visible.
      - - Backlog quality deterioration
        - Named counterparties delay, resize, or cancel flagship projects such as Great River, Xcel/Google, or Crusoe
        - Undercuts the demand and market-validation case that justifies attention today.
        - Re-underwrite demand quality and customer concentration before proceeding.
      - - Margins stay hidden or deeply negative
        - Management cannot show project-level gross margin path, warranty assumptions, or backlog conversion economics
        - Makes capital intensity dominate any growth narrative.
        - Treat as avoid at premium prices; require hard financial diligence.
      - - Execution stress resurfaces
        - Further restructuring, emergency financing, or rising dependence on public support before revenue proof
        - Signals that the company may be outrunning its operating model.
        - Downgrade from research-more to avoid unless compensated by a materially lower entry price.
    notes: >-
      These triggers are designed for investment committees: each one links a monitorable event to a change in
      underwriting posture.
    claimRefs:
