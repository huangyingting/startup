callouts:
  - calloutType: recommendation
    title: 'Public-evidence call: research-more'
    body: >-
      Form looks commercially credible, but the price is still unknowable from public sources. Do not upgrade the call
      until management shares current valuation, cap-table terms, and a revenue-to-margin bridge.
    claimRefs:
      - C309
      - C344
      - C345
  - calloutType: strength
    title: The strongest positive is real external validation
    body: >-
      Very few private climate-manufacturing companies can point to over $1.2 billion raised, DOE manufacturing support,
      and named counterparties spanning utilities, governments, and AI infrastructure buyers.
    claimRefs:
      - C307
      - C153
      - C343
  - calloutType: risk
    title: The biggest risk is underwriting blindness, not lack of ambition
    body: >-
      Exact valuation, liquidation preferences, revenue, margins, and backlog conversion remain private. That makes
      downside analysis much harder than the company-quality narrative suggests.
    claimRefs:
      - C309
      - C328
      - C329
      - C344
  - calloutType: assumption
    title: What could move the recommendation
    body: >-
      A materially discounted entry price plus clean financing terms, evidence of profitable serial production, and a
      backlog conversion schedule would likely improve the call from research-more to track.
    claimRefs:
      - C309
      - C344
      - C346
