  - id: TE002
    title: Workflow / use-case table
    columns:
      - user job
      - current workflow
      - company solution
      - measurable benefit
      - limitation
    rows:
      - - Ride through multi-day renewable shortfalls
        - Add peakers, overbuild renewables, or accept curtailment / scarcity risk
        - Use 100-hour iron-air storage as a multi-day dispatchable resource
        - Public modeling cites lower system cost and more flexible clean portfolios
        - Benefit is mostly model-backed in public sources, not field-proven at scale yet
      - - Harden grid against severe weather and outage events
        - Rely on thermal backup or expensive short-duration reserves
        - Discharge over several days during storms, heat waves, or winter events
        - Form and utility partners repeatedly tie the product to extreme-weather resilience
        - No public after-action record yet from a large operating fleet
      - - Defer or optimize transmission buildout
        - Build wires or add conventional capacity
        - Use long-duration storage in congested areas to shift energy across days
        - Maine and California project narratives emphasize congestion and reliability value
        - Public cases do not yet quantify realized transmission capex avoided
      - - Evaluate future resource portfolios
        - Run legacy planning tools built around typical weather and average conditions
        - Run Formware to model weather volatility and long-duration dispatch value
        - Form says utilities can optimize least-cost portfolios over multi-year hourly data
        - Independent validation of software outputs is still limited
      - - Support large new loads such as AI data centers
        - Secure new firm capacity or wait for grid upgrades
        - Pair multi-day storage with energy-first capacity planning
        - Crusoe agreement shows a new data-center-oriented demand path
        - Capacity agreement is not the same as an operating customer site yet
