    title: Product architecture map
    type: stack
    layout: wide
    summary: >-
      Form’s public architecture can be read as a four-layer stack: iron-air electrochemistry, modular field hardware,
      power-block / interconnection systems, and Formware planning software.
    data:
      layers:
        - id: chemistry
          label: Electrochemistry
          modules:
            - Iron electrode
            - Air electrode
            - Water-based non-flammable electrolyte
            - Reversible rusting reaction
        - id: cell-module
          label: Cell / Module
          modules:
            - Stack of many individual cells
            - Module packaging
            - Container-scale enclosure
        - id: system
          label: Field System
          modules:
            - Megawatt-scale power blocks
            - PCS / inverter / protection equipment (vendors undisclosed)
            - Utility interconnection and controls
        - id: software
          label: Planning / Controls Layer
          modules:
            - Formware resource-adequacy model
            - Portfolio optimization
            - Operational dispatch planning
