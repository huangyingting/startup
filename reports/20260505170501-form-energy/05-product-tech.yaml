  - id: FE002
    title: Customer workflow / operating flow
    type: flow
    layout: standard
    summary: >-
      Form’s operating flow starts with grid planning, proceeds through site-specific design and manufacturing, and ends
      with multi-day dispatch on the utility system.
    data:
      nodes:
        - id: w1
          label: 1. Portfolio modeling
          description: Utility or public program evaluates reliability, congestion, and weather-risk use cases with Formware.
        - id: w2
          label: 2. Site selection and permitting
          description: Project team secures interconnection, environmental review, and grant or rate-recovery path.
        - id: w3
          label: 3. Factory production
          description: Cells, modules, and system hardware are produced at Form Factory 1.
        - id: w4
          label: 4. EPC / installation
          description: Enclosures and power blocks are deployed at utility or host sites.
        - id: w5
          label: 5. Grid integration
          description: System is connected to serve reliability, renewable balancing, or transmission-related needs.
        - id: w6
          label: 6. Multi-day dispatch
          description: Asset charges and discharges over multi-day intervals during stress, congestion, or renewable lulls.
      edges:
        - from: w1
          to: w2
        - from: w2
          to: w3
        - from: w3
          to: w4
        - from: w4
          to: w5
        - from: w5
          to: w6
    approximationNotes: This flow abstracts multiple public project narratives into one generic deployment sequence.
