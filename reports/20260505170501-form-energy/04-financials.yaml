  evidenceGaps:
    - type: private-evidence-only
      severity: material
      topic: Public revenue-mix disclosure for Form Energy
      missingEvidence: >-
        Public sources do not disclose actual revenue mix across hardware, implementation, warranty, service, or any
        recurring software line.
      whyItMatters: >-
        Revenue quality cannot be assessed without knowing how much revenue is one-time equipment versus recurring or
        services revenue.
      diligencePath: Request audited or board-level revenue mix for 2024-2026 by product, geography, and revenue-recognition line.
      relatedQuestionRefs:
        - QI011
      relatedTableRefs:
        - TI001
    - type: private-evidence-only
      severity: blocking
      topic: Form Energy realized pricing and ASP
      missingEvidence: No reviewed source disclosed project ASP, contract value per MWh, deposit schedules, or discount structure.
      whyItMatters: Announced GWh under agreement cannot be translated into a revenue forecast or margin model without pricing.
      diligencePath: >-
        Request customer-by-customer contract summary showing ASP, milestone billing, cancellation rights, and backlog
        aging.
      relatedQuestionRefs:
        - QI010
      relatedTableRefs:
        - TI002
    - type: private-evidence-only
      severity: blocking
      topic: Form Energy cash, burn, and runway
      missingEvidence: Public sources do not disclose unrestricted cash, monthly burn, or runway months.
      whyItMatters: Capital adequacy is impossible to underwrite for a scaling hardware manufacturer without current liquidity data.
      diligencePath: Request latest balance sheet, trailing-12-month cash-flow statement, and management runway scenarios.
      relatedQuestionRefs:
        - QI016
        - QI017
      relatedTableRefs:
        - TI004
    - type: private-evidence-only
      severity: material
      topic: Form Energy debt and project-finance structure
      missingEvidence: >-
        No reviewed source disclosed company-level debt facilities, grant draw conditions, liens, or project-finance
        recourse.
      whyItMatters: Hidden debt or recourse obligations could dominate equity value even if demand and grants look favorable.
      diligencePath: Request debt schedule, covenant package, grant reimbursement mechanics, and project-finance term sheets.
      relatedQuestionRefs:
        - QI025
      relatedTableRefs:
        - TI004
    - type: stale
      severity: material
      topic: Project commissioning dates versus live operations
      missingEvidence: >-
        Several project announcements target 2025-2029 startup dates, but only limited public evidence confirms what is
        operating today.
      whyItMatters: Revenue timing and credibility of backlog depend on actual commissioning, not signed announcements alone.
      diligencePath: >-
        Request latest project-by-project status report with permits, manufacturing completion, shipment, energization,
        and commercial-operation dates.
      relatedQuestionRefs:
        - QI023
        - QI024
      relatedTableRefs:
        - TI005
    - type: enumeration-incomplete
      severity: material
      topic: Planned financial estimate range figure substituted by public financial gaps table
      missingEvidence: Public sources did not provide defensible numeric ranges for Form revenue, burn, runway, or gross margin.
      whyItMatters: >-
        A numeric range figure would imply a level of precision the public record does not support for a private
        company.
      diligencePath: >-
        Replace T405 with a numeric range figure only after management provides cash, burn, backlog conversion, and
        project-margin inputs.
      relatedQuestionRefs:
        - QI010
        - QI016
        - QI017
      relatedTableRefs:
        - TI005
