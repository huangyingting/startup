        - Realized pricing private
        - Battery hardware plus deployment into utility-scale sites
        - Contract value, deposit timing, and milestone schedule undisclosed
        - Form has commercial agreements without public list pricing
      - - Crusoe capacity agreement
        - Reserved volume, pricing, and delivery terms
        - Realized pricing private
        - 12 GWh of multi-day storage for AI data centers starting in 2027
        - Price, prepayment, and margin structure undisclosed
        - Strong evidence of enterprise-style commercial terms, not list-price sales
      - - Georgia Power agreement
        - Definitive agreement for 15 MW / 1,500 MWh system
        - Realized pricing private
        - Multi-day storage for regulated utility grid support
        - Subject to regulatory approvals; no contract economics disclosed
        - Revenue timing depends on approvals and project completion
      - - Xcel Energy projects
        - Two 10 MW / 1,000 MWh systems
        - Realized pricing private
        - Grid reliability and renewable integration at retiring coal sites
        - Grants, tax credits, and regulatory approvals affect economics
        - Public procurement anchors demand but not ASP or margin
      - - Company cost-positioning claim
        - Less than one-tenth the cost of lithium-ion for relevant use cases
        - Company target, not customer list price
        - 100-hour iron-air storage with low-cost materials
        - No realized project-level cost data or customer bill-rate disclosure
        - Useful for positioning, insufficient for underwriting
    notes: >-
      Form’s public disclosures reveal commercial structure and demand, but not list prices, discounting, realized ASP,
      or customer-specific contract economics.
