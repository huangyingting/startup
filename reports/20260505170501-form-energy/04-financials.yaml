company:
  name: Form Energy
chapter:
  number: 4
  title: Financials
  summary: >-
    Form Energy’s public record now shows a hardware-project revenue model, rapidly expanding contracted demand, and
    unusually large public/private capital support, but the core underwriting variables—realized pricing, revenue mix,
    cash, burn, margin, and backlog conversion—remain private.
sections:
  - id: SEC401
    title: Revenue model and monetization architecture
    body: >-
      The public evidence points to a project-based industrial revenue model rather than a software or consumer
      subscription model. Form sells and deploys grid-scale iron-air battery systems through definitive agreements with
      utilities, public-sector programs, and now a strategic capacity agreement with Crusoe for AI data-center power
      demand. The visible commercial pattern is consistent across counterparties: customers sign a project or capacity
      agreement, Form manufactures systems in West Virginia, and revenue should follow hardware delivery, site
      deployment, commissioning, and potentially later service obligations. Public materials also show that the company
      uses Formware modeling in utility diligence, but there is no reviewed evidence that Formware is a separately
      monetized software line. The key monetization nuance is that Form has disclosed contract existence, reserved
      volume, and in one case reserved pricing terms, yet has not published any list price, realized ASP, discount
      framework, or revenue-recognition mix between equipment, construction support, and post-installation services.
      That means the revenue mechanism is visible, but the economics of each booked gigawatt-hour are not.
    claimRefs:
      - CI001
      - CI004
      - CI005
      - CI006
      - CI007
      - CI008
      - CI009
      - CI018
      - CI019
      - CI020
      - CI043
  - id: SEC402
    title: Commercial traction, delivery timing, and cost-stack signals
    body: >-
      Form’s public traction has improved materially in 2024-2026, but operating proof still lags announced volume.
      Great River Energy remains the first commercial pilot anchor: a 1.5 MW / 150 MWh Cambridge project that moved from
      partnership to groundbreaking and is expected to become operational around late 2025 or 2026. Xcel, Georgia Power,
      FuturEnergy Ireland, and Crusoe extend that pattern into larger utility, international, and data-center use cases,
      while company and partner releases now cite more than 65 GWh and then more than 75 GWh of commercial projects
      under agreement. These are strong demand and pipeline signals, especially because the March 2026 Crusoe agreement
      explicitly reserved volume, pricing, and delivery terms starting in 2027. The cost stack, however, is still mostly
      directional. Form’s own product pages claim 100-hour duration, low-cost inputs, acreage ranges, and a cost target
      below one-tenth of lithium-ion for relevant use cases, but there is no public realized gross-margin disclosure.
      Public-company comparables help bracket the likely economics: scaled storage integrator Fluence reached positive
      low-single-digit gross margin, while earlier-stage ESS and Eos still showed negative gross economics or capital
      dependence during manufacturing ramp. The implication is that Form may have strong strategic demand, but that
      demand does not by itself prove healthy unit economics.
    claimRefs:
      - CI001
      - CI003
      - CI005
      - CI006
      - CI007
      - CI008
      - CI009
      - CI010
