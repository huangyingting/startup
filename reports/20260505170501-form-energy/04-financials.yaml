  - id: TI002
    title: Pricing / monetization table
    columns:
      - Product or contract type
      - Price or contract
      - List vs. realized pricing
      - Included capabilities
      - Discounts or unknowns
      - Implication
    rows:
      - - Utility pilot and deployment contracts
