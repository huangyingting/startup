    title: Revenue streams table
    columns:
      - Stream
      - Mechanism
      - Unit
      - Current value or status
      - Quality
      - Diligence ask
    rows:
      - - Battery system deployments for utilities
        - Project-based hardware supply tied to definitive agreements and site commissioning
        - MW / MWh project
        - Confirmed with Great River, Xcel, and Georgia Power project announcements
        - 'Medium-high: counterparties and project sizes are public, realized revenue timing is not'
        - Request revenue-recognition policy by equipment, construction milestone, and commissioning stage
      - - Strategic capacity reservations for large loads
        - Reserved production volume, pricing, and delivery terms under multi-year capacity agreement
        - GWh reserved capacity
        - Confirmed publicly in Crusoe agreement starting in 2027
        - 'High on mechanism, low on economics: pricing exists but remains private'
        - Request average selling price, deposit schedule, and cancellation terms for Crusoe-style deals
      - - International utility-scale deployments
        - Country-specific project contracts with local developer or utility counterparties
        - MW / MWh project
        - Ireland deal announced for 10 MW / 1,000 MWh in 2029
        - 'Medium: agreement exists, but commissioning is long-dated'
        - Request expected geography mix and conversion cadence from signed projects to revenue
      - - Engineering / deployment support services
        - Site development, commissioning support, and multi-year project study work
        - Project services
        - Implied by pilot-project development and study language; no separate revenue disclosure
        - 'Low-medium: mechanism is plausible but public mix is undisclosed'
        - Request whether implementation, warranty, or O&M revenue is billed separately from hardware
      - - Software / modeling monetization
        - Formware supports utility diligence and planning
        - Unknown
        - No reviewed evidence of separate Formware revenue despite repeated product use in sales process
        - 'Low: sales enablement is visible, monetization is not'
        - Request whether any software, licensing, or recurring analytics revenue exists today
    notes: >-
      Public sources show that Form monetizes through project and capacity agreements, but not the actual split between
      hardware, services, and any recurring software or maintenance revenue.
