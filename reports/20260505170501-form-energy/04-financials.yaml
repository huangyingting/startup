  - id: TI003
    title: Unit economics table
    columns:
      - Metric
      - Value or status
      - Confidence
      - Why it matters
      - Diligence ask
    rows:
      - - Product duration
        - 100 hours
        - High
        - Defines the use case versus four-hour lithium-ion and shapes revenue opportunity in reliability markets
        - Request delivered round-trip-efficiency, warranty, and degradation curves by project
      - - Land intensity
        - Half an acre per 1 MW in least-dense configuration; greater than 3 MW/acre in denser layouts
        - Medium
        - Affects site cost, permitting flexibility, and deployable economics for constrained locations
        - Request actual acreage and civil-balance-of-plant cost from operating projects
      - - Cost positioning versus lithium-ion
        - Claimed at less than one-tenth the cost of lithium-ion for relevant duration use cases
        - Medium
        - Suggests long-duration value proposition, but is not the same as realized gross margin
        - Request delivered $/kWh, installed $/kW, and customer savings assumptions behind the claim
      - - Public realized gross margin
        - null
        - Low
        - Gross margin is the main missing variable for underwriting hardware economics
        - Request project-level gross-margin bridge and manufacturing yield data
      - - Public realized ASP per booked MWh
        - null
        - Low
        - Needed to translate announced GWh into forecast revenue
        - Request contract ASP by customer class and by delivery year
      - - Fluence 2023 benchmark
        - Revenue $2.218B; gross margin 6.4%; operating cash outflow $111.9M; backlog 4.6 GW
        - Medium
        - >-
          Shows that scaled storage integration can reach positive gross margin but still consume cash and carry backlog
          risk
        - Benchmark Form against a mature integrator on margin, cash conversion, and concentration
      - - ESS 2023 benchmark
        - Revenue $7.5M; cost of revenue $20.5M; gross loss $13.0M; cash $20.2M plus $87.9M short-term investments
        - Medium
        - Shows early commercial storage manufacturers can recognize revenue while still selling below fully loaded cost
        - Request whether Form’s first commercial systems are margin-positive before learning-curve gains
      - - Eos 2023 benchmark
        - Cash $69.5M; capex $29.3M; substantial doubt about going concern absent new capital
        - Medium
        - Shows how manufacturing-line buildout and working-capital needs can overwhelm storage-company balance sheets
        - Request Form debt covenants, capex commitments, and minimum liquidity thresholds
    notes: >-
      The public unit-economics view is mostly directional: Form discloses technical and scale anchors, while public
      comps show the gross-margin and balance-sheet outcomes that Form still has not reported.
    claimRefs:
      - CI001
      - CI003
      - CI027
      - CI028
      - CI029
      - CI030
      - CI031
      - CI032
      - CI034
  - id: TI004
    title: Capital adequacy table
    columns:
      - Metric
      - Value or status
      - Confidence
      - Why it matters
      - Diligence ask
    rows:
      - - Latest primary financing
        - $405M Series F announced October 2024
        - Medium
        - Largest recent private-capital anchor and a buffer against immediate financing stress
        - Request net cash proceeds after fees and any investor side-letter obligations
      - - Total funds raised to date
        - Over $1.2B as of October 2024
        - Medium
        - Indicates unusually large cumulative capital requirement for a private battery manufacturer
        - Request cumulative primary versus secondary capital and remaining unrestricted cash
      - - DOE manufacturing support
        - Up to $150M award negotiation for Project RAPID
        - Medium
        - Non-dilutive support can reduce factory-build burden but may carry milestones and reimbursement timing
        - Request status of award negotiation, draw schedule, and matching-fund requirements
      - - Publicly disclosed cash on hand
        - null
        - Low
        - Without cash balance there is no defensible runway calculation
        - Request latest balance sheet cash and restricted cash separately
      - - Publicly disclosed monthly burn
        - null
        - Low
        - Burn determines whether large project wins reduce or increase financing urgency
        - Request last 12 months of operating cash burn and expected 2026-2027 burn profile
      - - Runway months
        - null
        - Low
        - Runway is the decisive capital-adequacy metric for a scaling manufacturer
        - Request management runway base case and downside case
      - - Manufacturing scale commitments
        - >-
          550,000 sq ft operating facility; expansion targeted by end 2025; up to 20 GWh line by 2027; 500 MW/year and
          750+ jobs by 2028
        - Medium
        - Shows capital intensity and execution burden embedded in commercialization roadmap
        - Request capex budget by phase, line yield assumptions, and working-capital needs per GWh shipped
      - - Next-round trigger
        - Unknown publicly
        - Low
        - Needed to know whether future financing is strategic, project-specific, or existential
        - Request trigger metrics for another equity round, structured finance, or project-level debt
      - - Debt / project-finance obligations
        - No reviewed public company-level debt or project-finance detail disclosed
        - Low
        - Hidden recourse or covenants could dominate risk even if equity support looks strong
        - Request full debt schedule, grant conditions, liens, and project-finance structure by major deployment
    notes: >-
      Public evidence supports a strong financing stack and aggressive factory build-out, but not a usable company-level
      runway analysis.
    claimRefs:
      - CI013
      - CI014
      - CI015
      - CI016
      - CI017
      - CI023
      - CI039
  - id: TI005
    title: Public financial gaps table
    columns:
      - Missing private metric
      - Impact
      - Current public substitute
      - Why substitute is insufficient
      - Exact diligence path
    rows:
      - - Cash balance
        - Blocks runway analysis
        - Latest Series F size and DOE support
        - Capital raised does not equal unrestricted cash after factory spend and project working capital
        - Request latest monthly balance sheet with unrestricted and restricted cash split
      - - Monthly burn and operating cash flow
        - Blocks capital-adequacy and downside-case modeling
        - Comparable-company operating cash outflows
        - Comp cash burn shows industry pattern, not Form’s actual cash consumption
        - Request trailing-12-month cash flow statement and 2026 budget versus actual
      - - Realized ASP / contract value per MWh
        - Blocks revenue forecast from booked GWh
        - Project sizes and reserved pricing-term disclosures
        - Volume does not translate into revenue without price, deposits, and milestone schedule
        - Request customer-by-customer ASP, payment terms, and revenue recognition schedule
      - - Gross margin by project and by factory phase
        - Blocks view on margin path and learning curve
        - Company cost-positioning claims plus public comps
        - Cost targets and comp margins do not reveal Form’s actual bill of materials, yield, or warranty burden
        - Request gross-margin bridge for pilot, early commercial, and scaled production phases
      - - Revenue mix between hardware, services, and software
        - Blocks quality-of-revenue assessment
        - Public mention of Formware and project-development activity
        - Public materials do not say whether software or services are paid, bundled, or free sales support
        - Request 2026 revenue mix by hardware, integration, service, and any recurring software
      - - Customer concentration and backlog conversion
        - Blocks confidence in forward revenue timing
        - Named-project announcements and aggregate GWh under agreement
        - Signed volume may still face permitting, grants, financing, or interconnection delays
        - Request booked backlog waterfall by customer, status, cancellation rights, and planned in-service date
    notes: >-
      T405 substitutes for the planned numeric financial-estimate range: public sources are rich enough to identify the
      missing underwriting inputs, but not rich enough to produce honest revenue, burn, runway, or margin ranges.
    claimRefs:
      - CI005
      - CI011
      - CI013
      - CI018
      - CI023
      - CI038
