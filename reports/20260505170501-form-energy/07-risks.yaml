callouts:
  - calloutType: risk
    title: The 2025 breach moved risk from theoretical to concrete
    body: >-
      Cyber and privacy diligence can no longer be treated as generic enterprise-software boilerplate. Form has a
      documented ransomware event with employee and beneficiary data at issue.
    claimRefs:
      - CR013
      - CR014
      - CR015
  - calloutType: insight
    title: Schedule risk matters more than chemistry skepticism now
    body: >-
      The public record already supports real plant construction, a first commercial deployment, and credible
      counterparties. The bigger risk is slippage across factory, partner, and permitting milestones before those
      references become long-run operating proof.
    claimRefs:
      - CR003
      - CR005
      - CR006
      - CR009
      - CR034
  - calloutType: recommendation
    title: Treat permit files, incident postmortem, and award covenants as must-have diligence items
    body: >-
      Before underwriting aggressively, request the active Weirton permit stack, the 2025 breach forensic summary, and
      the detailed federal or state milestone agreements behind the plant ramp.
    claimRefs:
      - CR018
      - CR019
      - CR031
      - CR042
