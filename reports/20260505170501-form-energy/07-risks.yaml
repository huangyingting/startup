  - id: TR005
    title: Mitigation and kill criteria table
    columns:
      - risk
      - monitorable trigger
      - threshold / event
      - action implication
    rows:
      - - Great River commercialization proof
        - Operating milestone
        - Project still not operational or study not launched by end-2026
        - Downgrade confidence in repeatable field performance and extend revenue ramp assumptions
      - - Factory ramp
        - Production and expansion milestone
        - End-2025 expansion slips materially or commercial production narrative retreats
        - Re-underwrite delivery timing, gross-margin path, and next-capital needs
      - - Cyber / legal follow-through
        - Incident or enforcement progression
        - New class actions, AG findings, or a second material cyber incident emerge
        - Raise residual legal risk rating and tighten customer-trust assumptions
      - - Policy and incentive dependency
        - Award or covenant status
        - DOE award negotiation stalls, draw conditions tighten, or state support weakens
        - Treat capital adequacy and plant-ramp thesis as impaired
      - - System safety
        - Field incident record
        - Any public thermal event, fire, recall, or system-certification setback appears
        - Treat safety moat as broken until root cause and remediation are proven
      - - Partner and regional execution
        - Counterparty commitment
        - Xcel, Great River, or Maine programs are canceled, downsized, or repeatedly deferred
        - Cut pipeline conversion assumptions and widen downside valuation range
    notes: >-
