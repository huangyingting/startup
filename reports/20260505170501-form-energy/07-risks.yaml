  evidenceGaps:
    - type: private-evidence-only
      severity: material
      topic: Active Weirton permit IDs and conditions for T701 Regulatory / legal risk register
      missingEvidence: >-
        Retained public sources describe the permit system and search tools, but they do not close the exact
        Form-specific permit numbers, conditions, or current compliance status.
      whyItMatters: >-
        Without live permit files and conditions, it is impossible to fully underwrite environmental, construction, or
        operating restrictions on the factory.
      diligencePath: >-
        Pull current WVDEP permit IDs, permit packets, comment history, and any appeal or enforcement dockets for Form
        Factory 1.
      relatedQuestionRefs:
        - RQ717
      relatedTableRefs:
        - T701
    - type: missing-source
      severity: material
      topic: Public IP or trade-secret litigation visibility for T701 Regulatory / legal risk register
      missingEvidence: >-
        Broad retained legal searches did not yield a reliable official or court source proving whether Form has patent
        or trade-secret disputes beyond the non-IP employment case.
      whyItMatters: >-
        Novel battery and manufacturing companies can face IP injunction or damages risk that would affect valuation and
        product freedom to operate.
      diligencePath: >-
        Run direct federal and state docket searches, patent-assignment review, and outside-counsel confirmation on any
        threatened or pending IP matters.
      relatedQuestionRefs:
        - RQ705
      relatedTableRefs:
        - T701
    - type: private-evidence-only
      severity: material
      topic: Public security certification evidence
      missingEvidence: >-
        Retained official sources do not show SOC 2, ISO 27001, or a public trust center that would let customers
        evaluate Form’s post-breach control environment.
      whyItMatters: >-
        Cyber assurance increasingly affects utility procurement, employee-trust recovery, and post-incident legal
        exposure.
      diligencePath: >-
        Request SOC reports, ISO certificates, recent penetration-test summaries, and the board or management cadence
        for cyber remediation.
      relatedQuestionRefs:
        - RQ720
      relatedTableRefs:
        - T702
    - type: missing-source
      severity: minor
      topic: Massachusetts breach notice copy
      missingEvidence: >-
        Massachusetts confirms the reporting framework and public-records path, but a Form-specific open-web notice was
        not confirmed from retained public records.
      whyItMatters: Multi-state notice consistency can reveal additional affected populations, notice timing, and remediation scope.
      diligencePath: >-
        File a Massachusetts public-records request or obtain the company’s complete state-by-state notification matrix
        from counsel.
      relatedQuestionRefs:
        - RQ721
    - type: private-evidence-only
      severity: material
      topic: Customer and partner concentration by revenue
      missingEvidence: >-
        Retained sources name marquee projects but do not disclose revenue concentration, renewal rates, backlog
        conversion, or margin by customer class.
      whyItMatters: A company can have many public logos yet still depend economically on a small set of projects or counterparties.
      diligencePath: >-
        Request customer concentration, project margin, cancellation exposure, and bookings-to-revenue conversion by top
        accounts.
      relatedQuestionRefs:
        - RQ716
      relatedTableRefs:
        - T703
    - type: private-evidence-only
      severity: material
      topic: DOE and WVEDA milestone covenants for T701 Regulatory / legal risk register
      missingEvidence: >-
        Public sources confirm support but do not disclose draw conditions, clawbacks, forgiveness triggers, or
        milestone default language.
      whyItMatters: >-
        Those covenants determine whether plant-ramp slips become financing events rather than ordinary operational
        noise.
      diligencePath: >-
        Obtain the executed award and loan agreements, milestone schedules, compliance reporting cadence, and default
        remedies.
