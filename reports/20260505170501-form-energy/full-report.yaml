      - number: '1.3'
        title: Capital formation, investor mix, and manufacturing support
        blocks:
          - type: paragraph
            body: >-
              Form’s funding history now reads like a classic late-stage climate-manufacturing buildout. The company’s
              progress page discloses a financing chain from a $9 million Series A in 2018 through a $405 million Series
              F in October 2024. Publicly disclosed lead investors moved from climate and hard-tech specialists such as
              Breakthrough Energy Ventures, Prelude Ventures, The Engine, Eni Next, Coatue, XCarb, and TPG Rise to
              late-stage capital led by T. Rowe Price. Series F also brought in GE Vernova as both an investor and
              manufacturing/commercial collaborator. That capital stack is complemented by public-sector support. Form’s
              September 2024 release said DOE selected the company for up to $150 million of manufacturing support tied
              to a new line that could reach 20 GWh of annual capacity by 2027. A 2023 West Virginia legislature summary
              described an additional $300 million state package with collateral and job-creation conditions,
              highlighting how public financing is part of the scale thesis, not a side note.
