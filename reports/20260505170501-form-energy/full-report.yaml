      - number: '8.4'
        title: Public comps provide a bracket, not a target
        blocks:
          - type: paragraph
            body: >-
              The comparable set is helpful mainly because it shows how unstable storage valuation anchors can be. On
              May 2026 public market data, Fluence traded at about $2.26 billion market cap on $2.55 billion of trailing
              revenue, or roughly 0.9x sales; Stem was around 0.5x; Energy Vault around 9.2x; ESS around 5.1x; and Eos
              around 19.6x. That spread is not a neat peer median but a warning that storage equities embed very
              different mixes of scale, distress, technology hope, and financing optionality. Filing evidence reinforces
              the same caution: Fluence had real scale but only a 6.4% gross margin in fiscal 2023, ESS had cost of
              revenue above revenue and ongoing going-concern language, and Eos disclosed substantial doubt about
              continuing as a going concern absent more capital. For Form, the comp lesson is therefore directional
              rather than dispositive. The company may deserve a premium to distressed small caps because its customer
              proof and manufacturing support are stronger, but public comps do not justify paying an undisclosed
              premium round on faith alone. Until Form shares private revenue, margins, and cap-table terms, comparable
              data supports disciplined curiosity, not price-taking enthusiasm.
            claimRefs:
