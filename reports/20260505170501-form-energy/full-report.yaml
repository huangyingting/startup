        title: Exhibits
        blocks:
          - type: callout
            title: 'Public-evidence call: research-more'
            body: >-
              Form looks commercially credible, but the price is still unknowable from public sources. Do not upgrade
              the call until management shares current valuation, cap-table terms, and a revenue-to-margin bridge.
            calloutType: recommendation
            claimRefs:
              - CV005
              - CV041
              - CV042
          - type: callout
            title: The strongest positive is real external validation
            body: >-
              Very few private climate-manufacturing companies can point to over $1.2 billion raised, DOE manufacturing
              support, and named counterparties spanning utilities, governments, and AI infrastructure buyers.
            calloutType: strength
            claimRefs:
              - CV003
