      - number: '7.2'
        title: Commercialization risk is still mostly schedule, dependency, and factory-ramp risk
        blocks:
          - type: paragraph
            body: >-
              The biggest underwriting question is not whether Form can tell a compelling chemistry story; it is whether
              the company can turn several milestone-heavy programs into routine, financeable delivery. Great River is
              still the first commercial deployment and remains pre-operational in the latest retained sources, even
              though it has a concrete size, a late-2025 target, and a planned multi-year study. Xcel’s path is
              similarly serious but still gated by phased DOE development funding, planning, design, and permitting.
              Maine is larger still and depends on the success of a regional transmission-and-storage program, not just
              on Form shipping batteries. On the supply side, Form is simultaneously ramping Weirton, expanding the
              plant by roughly 300,000 square feet, and trying to move from trial to commercial production while
              managing brownfield construction realities. Those are not fatal risks, but they create a narrow execution
              corridor: a slip in the factory ramp, partner readiness, or first field deployments would delay the
              conversion of public excitement into durable operating proof. The evidence therefore supports a risk
              ranking in which commercialization timing and partner dependency sit near the top of the downside tree.
