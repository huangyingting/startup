      - number: '8.3'
        title: Why valuation support still fails in public
        blocks:
          - type: paragraph
            body: >-
              The anti-thesis is not that Form lacks ambition or customers; it is that public evidence still does not
              let an outside investor underwrite the entry price. Official financing coverage confirms the amount raised
              and investor quality, and Latitude reports management described Series F as an up-round versus the prior
              financing, but the company still has not publicly given the exact valuation, price per share, or
              preference stack. The same opacity applies to the operating model. Form's own materials make strong
              technology and cost claims, and customer announcements show very large booked volumes, yet retained public
              sources still do not provide current revenue, realized average selling price, gross margin,
              backlog-to-revenue conversion, warranty assumptions, or project-level contribution margins. DOE's FOAK
              financing report explains why this matters: demonstration and deployment are the most capital- and
              time-intensive commercialization stages, and there is a persistent financing gap for first-of-a-kind
              projects. In that context, a price-insensitive bullish recommendation would be overclaiming. The right
              question is not whether Form is impressive; it is whether any offered price already assumes successful
              serial production before the economics are visible.
            claimRefs:
              - CO022
              - CV004
