  - number: 8
    title: Valuation
    sections:
      - number: '8.1'
        title: 'Recommendation: the company looks real, the price still does not'
        blocks:
          - type: paragraph
            body: >-
              Form Energy now looks more like a late-stage industrial commercialization story than a lab-stage climate
              startup. Official and customer sources show a $405 million Series F, total funding above $1.2 billion, up
              to $150 million of DOE manufacturing support, a first commercial deployment with Great River, a 15 MW /
              1,500 MWh Georgia Power agreement, a 12 GWh Crusoe agreement, a 300 MW / 30 GWh Google-Xcel project, and a
              first international deployment in Ireland. That is unusually strong external proof for a private storage
              company. The problem is that none of the retained public financing sources disclose the exact post-money
              valuation, current share price, liquidation preferences, current revenue run-rate, or gross-margin
              profile. Public equities show that storage names can trade anywhere from distressed sub-1x sales levels to
              speculative double-digit sales multiples. Without a disclosed entry price or private economics, the right
              call is not to force a false-precision target but to hold a research-more view and treat valuation stance
              as unknown until price and unit economics are visible.
            claimRefs:
              - CO022
              - CV003
