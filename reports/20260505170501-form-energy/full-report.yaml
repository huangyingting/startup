      - number: '3.5'
        title: Moat durability, adverse evidence, and verdict
        blocks:
          - type: paragraph
            body: >-
              The retained source set supports a real Form advantage, but not an unquestioned moat. Form has a
              distinctive 100-hour product claim, a first-factory ramp, and utility reference points that many novel
              chemistries still lack. Yet the adverse evidence is powerful. Lithium-ion keeps gaining scale and holds
              most of the inter-day pipeline; utilities still hesitate to move to multiday chemistries; and the public
              record is weak on realized pricing and repeatable win rates. Eos already shows stronger commercial metrics
              than ESS and may emerge as the most credible non-lithium peer on public numbers. Highview and Hydrostor
              demonstrate that infrastructure-style long-duration projects are also advancing, especially where project
              finance and grid-stability services can support them. Fluence remains the strategic incumbent benchmark
              because balance-sheet strength and software-plus-services distribution can overwhelm narrower product
              advantages. The right 2026 verdict is that Form has a credible wedge where duration truly matters, but its
              moat remains execution-dependent until scale, pricing transparency, and utility conversion evidence catch
              up with the technology story.
