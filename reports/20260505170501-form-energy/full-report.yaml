            body: >-
              Form Energy sells a front-of-the-meter multi-day storage system rather than a generic battery component.
              The public battery-technology page frames the product around utility and grid-operator pain points:
              extreme weather, renewable doldrums, outages, transmission congestion, and rising large-load demand such
              as data centers. The company’s first commercial product is explicitly described as an iron-air system that
              can discharge for up to 100 hours. Public materials repeatedly position that duration as the core workflow
              distinction from lithium-ion, which remains better suited to short intraday balancing. Formware matters
              because Form is not just pitching hardware; it is pitching a planning-and-operations stack that helps
              utilities decide where a 100-hour asset belongs in a future portfolio. In practice, that means Form’s
              offering is best understood as iron-air hardware plus modeling, siting, and integration support. The
              use-case evidence is still mostly prospective, but it is specific enough to tie Form to identifiable
              jobs-to-be-done: multiday reliability, renewable integration, congestion relief, and now capacity support
              for AI-driven load growth. That specificity raises confidence that Form is selling into a real operating
              workflow rather than a generic “grid battery” category. today.
