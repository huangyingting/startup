            body: >-
              The encouraging read is that Form no longer depends on one pilot or one geography. Public references now
              span Minnesota, Colorado, Georgia, California, New York, Maine, and a national data-center narrative via
              Crusoe. That breadth argues against an obvious single-customer dependence in the public pipeline. The
              harder read is that almost all of the strongest references are still pre-revenue or early-revenue project
              milestones: pilots, demonstrations, regulatory approvals, grants, and capacity reservations. Public
              materials do not disclose net retention, gross retention, churn, renewal cadence, contract length,
              customer concentration by revenue, or margin by project class. Even the best Great River proof still
              emphasizes a multi-year study before broader rollout. For diligence, the right conclusion is therefore
              balanced: named-customer evidence is real and widening, but the durability of those relationships and the
              concentration of actual economics are still largely hidden from the public record. This is also why the
              chapter should be read as a proof-of-adoption chapter, not a proof-of-retention chapter. The public
              evidence is good enough to say that customers are real, that multiple categories of buyers are willing to
              engage, and that project sizes are meaningful; it is not good enough to underwrite customer lifetime value
              without direct company diligence.
