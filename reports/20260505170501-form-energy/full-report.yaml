          - type: callout
            title: The biggest risk is underwriting blindness, not lack of ambition
            body: >-
              Exact valuation, liquidation preferences, revenue, margins, and backlog conversion remain private. That
              makes downside analysis much harder than the company-quality narrative suggests.
            calloutType: risk
            claimRefs:
