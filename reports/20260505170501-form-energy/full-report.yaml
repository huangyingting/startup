      - number: '4.4'
        title: Financial verdict and diligence blockers
        blocks:
          - type: paragraph
            body: >-
              The financial verdict is mixed but actionable. Revenue quality appears structurally better than that of a
              purely speculative platform company because Form is booking named counterparties for long-duration
              infrastructure, including utilities and a data-center developer with reserved commercial terms. That gives
              the company real backlog and strategic relevance. At the same time, the margin path remains unproven in
              public. Hardware and project businesses often absorb inventory, commissioning, warranty, and
              working-capital friction before they demonstrate durable profitability, and the public comparables here
              reinforce that point. Fluence shows what a scaled storage integrator can look like with positive but still
              modest gross margin; ESS and Eos show how easily an early manufacturing ramp can produce negative gross
              economics, fresh capital needs, and financing risk. Form’s own case therefore cannot be underwritten from
              public sources alone. The highest-priority diligence asks are straightforward: current cash, monthly burn,
              2026-2028 capex plan, backlog-to-revenue conversion schedule, contract gross-margin assumptions, customer
              concentration by booked GWh, and any project-finance or debt obligations attached to manufacturing
              expansion or large deployments. Until management provides that package, Form should be treated as
              commercially promising but still financially opaque.
