      - number: '8.2'
        title: Why the thesis is investable in principle
        blocks:
          - type: paragraph
            body: >-
              The positive side of the valuation case is easy to articulate. Form is not asking investors to believe in
              a market that does not exist: DOE defines long-duration storage as 10-plus-hour systems aimed at
              widespread commercial deployment, and EIA's 2026 outlook says electricity demand has resumed growth, with
              data-center load now a major driver. Form also has more customer proof than many climate-manufacturing
              peers at this stage. Great River has already broken ground on the first commercial deployment, Georgia
              Power continues under definitive agreement, DOE and Xcel are funding paired multiday demonstrations,
              Google and Xcel announced a 30 GWh system, Crusoe locked in 12 GWh with reserved pricing and delivery
              terms, and Ireland adds an international proof point. In other words, the company has market tailwinds,
              credible counterparties, and a manufacturing buildout that is large enough to matter if execution holds.
              Those facts justify continued diligence and explain why the company deserves attention even though the
              chapter stops short of a buy recommendation.
            claimRefs:
              - CV023
