  - number: 2
    title: Market Analysis
    sections:
      - number: '2.1'
        title: Market boundary and the right comparison set
        blocks:
          - type: paragraph
            body: >-
              Form Energy is exposed to a large storage transition, but the underwriting market is narrower than “all
              energy storage” or “all grid capex.” The retained official, regulatory, and policy sources consistently
              point to the portion of the market where utilities need electricity shifted across multi-day weather
              events, renewable droughts, or resource-adequacy windows that four-hour systems do not fully cover. Form’s
              own customer evidence is front-of-the-meter and utility-centric: Xcel, Great River Energy, and Georgia
              Power are not buying a generic battery container, they are testing or procuring multi-day capacity to
              integrate more renewable energy and preserve reliability. That means included spend should be
              utility-scale multiday storage, renewable-firming, resilience, and capacity value. Excluded spend should
              include unrelated transmission expansion, generic short-duration arbitrage batteries, and stationary
              storage deployments whose economic case never depends on long-duration discharge. Status-quo substitutes
              still matter: pumped hydro, short-duration lithium-ion, gas peakers, and other grid-upgrade paths remain
              the buyer’s default alternatives.
            claimRefs:
