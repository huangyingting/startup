  - id: TV005
    title: Thesis-break and kill triggers table
    columns:
      - trigger
      - threshold
      - transmission to thesis
      - action implication
    rows:
      - - Valuation remains opaque
        - No disclosed share price, post-money, or term-sheet visibility during diligence
        - Prevents any evidence-based entry discipline and leaves preference overhang unknowable.
        - >-
          Do not invest; keep recommendation at research-more or move to avoid if price discipline cannot be
          established.
      - - Serial-production slip
        - First customer deliveries miss expected 2026 proof points or require repeated schedule resets
        - Weakens the core commercialization narrative and raises financing risk.
        - Avoid paying premium pricing until production consistency is visible.
      - - Backlog quality deterioration
        - Named counterparties delay, resize, or cancel flagship projects such as Great River, Xcel/Google, or Crusoe
        - Undercuts the demand and market-validation case that justifies attention today.
        - Re-underwrite demand quality and customer concentration before proceeding.
      - - Margins stay hidden or deeply negative
        - Management cannot show project-level gross margin path, warranty assumptions, or backlog conversion economics
        - Makes capital intensity dominate any growth narrative.
        - Treat as avoid at premium prices; require hard financial diligence.
      - - Execution stress resurfaces
        - Further restructuring, emergency financing, or rising dependence on public support before revenue proof
        - Signals that the company may be outrunning its operating model.
        - Downgrade from research-more to avoid unless compensated by a materially lower entry price.
    notes: >-
      These triggers are designed for investment committees: each one links a monitorable event to a change in
      underwriting posture.
    claimRefs:
      - CV005
      - CV009
      - CV025
      - CV026
      - CV040
      - CV041
      - CV042
      - CV043
  - id: TV006
    title: Final diligence asks table
    columns:
      - topic
      - missing evidence
      - why it matters
      - owner / diligence path
    rows:
      - - Latest valuation
        - Exact post-money, price per share, and any 2025-2026 secondary or 409A marks
        - Without a real entry price, recommendation cannot become price-sensitive in a rigorous way.
        - >-
          Request the latest financing memo, board materials, and secondary-price references from management or lead
          investors.
      - - Cap table and preferences
        - Liquidation preferences, participation, pay-to-play terms, option-pool refresh, and senior security stack
        - Preference overhang can eliminate upside even when operations improve.
        - Obtain the cap table, certificate amendments, and most recent term sheet.
      - - Revenue visibility
        - Current revenue run-rate, signed backlog by delivery year, cancellation terms, and backlog-to-revenue bridge
        - Public GWh announcements are not enough to convert into valuation support.
        - Request booked backlog, conversion assumptions, and customer milestone schedule.
      - - Project margins
        - >-
          Delivered ASP, installation cost, warranty reserve, service obligations, and project-level gross-margin
          assumptions
        - The business can look strong commercially while still being economically weak.
        - Review model assumptions, first-project economics, and manufacturing yield data.
      - - Customer concentration
        - >-
          Share of backlog and expected revenue tied to Great River, Xcel/Google, Crusoe, Georgia, and other top
          programs
        - A few counterparties appear to drive much of the public momentum.
        - Ask for top-customer concentration by booked revenue, booked GWh, and cash receipts.
      - - Manufacturing scale-up
        - Yield, throughput, capex by line, working-capital needs, and DOE-funding conditions for Project RAPID
        - The value case depends on serial production, not just project announcements.
        - Review factory KPIs, ramp plan, DOE award conditions, and line-level milestone reporting.
    notes: >-
      These asks are the minimum diligence package needed to convert this chapter from research-more into an investable
      underwriting memo.
    claimRefs:
      - CV005
      - CI015
      - CV007
      - CV019
      - CV040
      - CV041
