  - number: 4
    title: Financials
    sections:
      - number: '4.1'
        title: Revenue model and monetization architecture
        blocks:
          - type: paragraph
            body: >-
              The public evidence points to a project-based industrial revenue model rather than a software or consumer
              subscription model. Form sells and deploys grid-scale iron-air battery systems through definitive
              agreements with utilities, public-sector programs, and now a strategic capacity agreement with Crusoe for
              AI data-center power demand. The visible commercial pattern is consistent across counterparties: customers
              sign a project or capacity agreement, Form manufactures systems in West Virginia, and revenue should
              follow hardware delivery, site deployment, commissioning, and potentially later service obligations.
              Public materials also show that the company uses Formware modeling in utility diligence, but there is no
              reviewed evidence that Formware is a separately monetized software line. The key monetization nuance is
              that Form has disclosed contract existence, reserved volume, and in one case reserved pricing terms, yet
              has not published any list price, realized ASP, discount framework, or revenue-recognition mix between
              equipment, construction support, and post-installation services. That means the revenue mechanism is
              visible, but the economics of each booked gigawatt-hour are not.
