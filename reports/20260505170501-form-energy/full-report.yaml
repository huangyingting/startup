      - number: '3.3'
        title: Capability, packaging, and pricing transparency
        blocks:
          - type: paragraph
            body: >-
              Form’s clearest feature advantage is the combination of 100-hour duration and low-cost-material narrative.
              ESS overlaps on non-lithium storage but concentrates on 8-22 hour iron-flow use cases and cycling life.
              Eos competes in a similar long-duration band with zinc-based chemistry, modular packaging, and density
              claims rather than on 100-hour duration. Highview and Hydrostor compete through large-site,
              infrastructure-heavy solutions that can deliver long durations but require a different siting and
              financing posture. Fluence represents the opposite benchmark: highly productized, utility-ready battery
              systems with powerful software and service attachments, but without a public 100-hour offering. Pricing is
              the weak spot across the whole landscape. Public sources describe packaging, duration, and financing
              narratives, but they rarely disclose realized customer pricing, discounting, or win-loss data. That means
              investors can compare relative capability and scale, but not yet prove which vendor wins on fully loaded
              project economics in a repeated, apples-to-apples way.
