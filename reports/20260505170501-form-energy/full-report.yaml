      - number: '2.4'
        title: Growth drivers, adoption constraints, and what matters for valuation
        blocks:
          - type: paragraph
            body: >-
              The structural drivers are real: electricity demand is rising again, renewable penetration makes multi-day
              balancing more valuable in some grids, and utilities want reliability without locking in more fossil
              peaking. DOE, NREL, WRI, C2ES, WECC, and IEA all support versions of that thesis. But the adverse evidence
              is equally important for valuation timing. Nature, C&EN, and Energy-Storage.News show that utilities still
              move cautiously; resource-adequacy rules and market designs do not always compensate long-duration assets
              fully; and lithium-ion is improving quickly enough to dominate much of the inter-day project pipeline.
              Form’s factory build-out and named utility projects are positives, yet manufacturing scale, qualification
              cycles, and financing structures still constrain how much of the theoretical opportunity becomes near-term
              revenue. The investable conclusion is therefore not “the market is huge”; it is that Form sits in a real
              but slow-opening utility wedge whose monetization depends on policy, project execution, and the market’s
              willingness to pay for duration beyond today’s short-duration baseline.
