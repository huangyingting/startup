      - number: '7.3'
        title: >-
          Financial and execution risk is amplified by capital intensity, limited disclosure, and mild organizational
          strain
        blocks:
          - type: paragraph
            body: >-
              The public record has enough evidence to say Form is better capitalized than many climate-hardware peers,
              but not enough to say the company is out of the danger zone that first-of-kind manufacturing startups
              often face. A $405 million Series F and federal or state support are real positives, yet the same period
              also includes a restructuring framed around efficiency and financial viability. Comparable public-company
              filings from Fluence and Eos help explain why this matters: long-duration storage businesses can be hit by
              supplier concentration, tariffs, quality failures, liquidated damages, covenant risk, and repeated capital
              needs long before product-market fit is fully proven at fleet scale. Form’s chemistry and cell-level
              safety story appear materially better than lithium-ion on fire profile and raw-material dependence, but
              that only narrows some risks. It does not answer revenue concentration, customer renewal, exact grant
              covenants, or system-level certification disclosure. The right diligence posture is therefore disciplined
              rather than alarmist: assume the company can still win, but treat incentive execution, project milestones,
              cyber follow-through, and first-field performance as thesis-break triggers rather than operational
              footnotes. A practical corollary is that downside monitoring should be monthly, not annual: the public
              milestones around Great River, Xcel, the Weirton expansion, and any breach-related legal developments are
              frequent enough that a stale diligence memo would quickly miss real thesis deterioration.
            claimRefs:
