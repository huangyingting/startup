        title: Manufacturing readiness, deployment momentum, and scale signals
        blocks:
          - type: paragraph
            body: >-
              Public scale evidence is strongest on manufacturing progress and announced deployments, and much weaker on
              classic software-style KPIs like customer count or revenue run-rate. Form says it completed a
              550,000-plus-square-foot Form Factory 1 in 2024, began trial production there, and had moved from more
              than 250 factory employees in September 2024 to over 900 company-wide employees in October 2024 and nearly
              1,000 employees on the current About page. A February 2025 company statement reported by local media said
              a restructuring affected fewer than 5% of total employees, but the company still had more than 350 team
              members at the factory and nearly 40 open roles. Commercially, the record is now materially deeper than a
              single pilot: Great River Energy broke ground on Form’s first commercial deployment in 2024, Xcel and Form
              advanced multi-day projects in Minnesota and Colorado, Xcel and Google announced a 30 GWh project in 2026,
              Form announced a 12 GWh Crusoe agreement for AI infrastructure, and the company said it had more than 75
              GWh of projects under agreement by March 2026. Public sources still do not disclose precise customer count
              or revenue.
