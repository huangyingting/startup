      - number: '2.3'
        title: Buyer segmentation, budget ownership, and adoption path
        blocks:
          - type: paragraph
            body: >-
              The buyer map that emerges from retained sources is coherent. Form’s public customer set shows
              investor-owned utilities, cooperatives, and vertically integrated utilities exploring multi-day storage
              for resource planning and generation reliability rather than for distributed prosumer use cases. In
              practice, the economic buyer appears to be a utility resource-planning, generation, or regulated-capital
              team; public sources rarely disclose the exact committee structure, but the language around integrated
              resource planning, reliability, and long-term strategy makes clear that these are capital-allocation
              decisions, not one-off pilot purchases by a site manager. The adoption path is also visible. Utilities
              first model the system value, then test a pilot or demonstration, and only afterward consider broader
              expansion. Xcel explicitly used Formware modeling; Great River framed Cambridge as a multi-year
              evaluation; Georgia Power linked its project to a broader reliability and renewables strategy. That slow,
              evidence-heavy procurement motion is one reason the apparent market can be much larger than the near-term
              revenue pool.
