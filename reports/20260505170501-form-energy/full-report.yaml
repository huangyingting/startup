chapters:
  - number: 1
    title: Company Overview
    sections:
      - number: '1.1'
        title: Identity, product scope, and operating footprint
        blocks:
          - type: paragraph
            body: >-
              Form Energy currently presents itself as an American energy storage technology and manufacturing company
              rather than as a laboratory-stage battery developer. Its public homepage and battery-technology pages
              frame the business around multi-day grid reliability: the company’s first commercial product is an
              iron-air battery that can store and discharge electricity for up to 100 hours, using low-cost iron, water,
              and air instead of lithium-heavy chemistry. Public location evidence is also stronger than at many private
              climate-tech peers. Form’s contact page lists operating sites in Weirton, Somerville, and Berkeley, while
              the March 2026 Ireland announcement explicitly calls Somerville the company’s headquarters. Taken
              together, the retained sources support treating Form as a U.S.-based, multi-site industrial battery
              company with Massachusetts development roots and West Virginia manufacturing scale-up.
            claimRefs:
              - CO002
              - CO003
              - CO004
              - CO005
              - CO006
              - CO007
