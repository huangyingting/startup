  - number: 6
    title: Customers
    sections:
      - number: '6.1'
        title: 'Customer segmentation: utilities, public programs, and AI-capacity buyers'
        blocks:
          - type: paragraph
            body: >-
              Form Energy’s customer base is not a classic SaaS roster of hundreds of small logos; it is a project-led
              book of counterparties with long decision cycles and high strategic value. The clearest public buyers are
              utilities and utility-like institutions: Great River Energy, Xcel Energy, Georgia Power, and the
              PG&E-hosted California project. A second segment is public-sector commercialization support through
              agencies such as NYSERDA, DOE, and the California Energy Commission, which are effectively paying to prove
              or accelerate deployment even if they are not end customers in the traditional recurring-revenue sense. A
              third segment is emerging large-load infrastructure buyers, best represented by Crusoe’s 12 GWh capacity
              reservation for AI data centers. This mix matters because buyer, user, and payer differ by segment.
              Agencies underwrite demonstrations, utilities deploy reliability assets, and Crusoe secures capacity for
              data-center development. Public evidence therefore supports segment breadth, but not segment economics or
              revenue mix. That segmentation also means logo counting can mislead. A state award and a utility purchase
              agreement are both real external validation events, but they behave very differently in revenue
              recognition, renewal logic, and concentration risk. The customer chapter therefore has to preserve those
              distinctions instead of treating every named counterpart as interchangeable demand.
            claimRefs:
              - CU011
              - CU012
              - CU014
              - CU017
              - CU020
              - CU022
              - CU030
      - number: '6.2'
        title: Named customer proof is strongest on project stage and counterparties, not on realized operating outcomes yet
        blocks:
          - type: paragraph
            body: >-
              The best customer proof is stage-specific. Great River is the cleanest named reference because it spans a
              2020 pilot contract, a 2024 groundbreaking, a specific 1.5 MW / 150 MWh configuration, and an explicit
              multi-year evaluation period. Georgia Power is the most visible utility-scale agreement at 15 MW / 1,500
              MWh, but even there the public record still speaks in forward-looking terms and notes regulatory
              approvals. Xcel’s proof is strong on seriousness—definitive agreements, coal-site selection, Minnesota PUC
              cost recovery, and DOE-backed MIND development funding—but weaker on operating maturity because the
              project was still in planning and permitting in 2024. California and New York are meaningful because
              government money moved Form from paper studies into commercial demonstrations with named scales and hosts.
              Crusoe broadens the story beyond utility decarbonization into AI-driven load growth, but the agreement is
              still reserved capacity starting in 2027, not a live operating site. The practical implication is that
              Form’s named-customer proof is credible enough to support a commercialization narrative, but not yet
              strong enough to prove repeatable operating excellence. The public record shows serious buyers and serious
              projects; it does not yet show many years of operation, renewal, or follow-on site expansion under Form’s
              own name.
