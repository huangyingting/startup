  - number: 3
    title: Competitors
    sections:
      - number: '3.1'
        title: Competitive landscape overview
        blocks:
          - type: paragraph
            body: >-
              Form Energy’s competitive set is broader than “other iron-air startups.” The relevant alternatives include
              direct non-lithium long-duration peers such as ESS, Eos, Highview Power, and Hydrostor; short-duration
              storage incumbents such as Fluence and the broader lithium-ion integrator class; and status-quo
              substitutes such as pumped hydro or other reliability investments. That wider frame matters because
              utilities do not procure storage by chemistry alone. They compare project risk, delivery certainty,
              financing, civil complexity, and whether a system earns value inside today’s resource-adequacy and
              reliability structures. Form’s advertised 100-hour iron-air system is differentiated, but it is entering a
              market where some rivals overlap on long-duration capability while others win simply because they are
              easier to buy. The competitive question is therefore not whether Form is unique. It is whether the
              uniqueness translates into durable procurement advantage before shorter-duration incumbents and other
              long-duration formats absorb the same budget categories.
            claimRefs:
              - CP001
              - CP003
              - CP005
              - CP009
              - CP014
              - CP018
              - CP020
              - CP023
              - CP024
              - CP030
              - CP031
      - number: '3.2'
        title: Direct peer profiles and relative scale
        blocks:
          - type: paragraph
            body: >-
              Among direct peers, Eos currently looks strongest in public commercial scale: its 2025 results show $114.2
              million of revenue, a $701.5 million backlog, 2.8 GWh in backlog, and more than $600 million of cash. ESS
              has a coherent product story around iron-flow chemistry, 8-22 hour duration, and no-capacity-fade claims,
              but its 2025 revenue was only $1.6 million and its liquidity remains much tighter. Highview and Hydrostor
              compete differently. They are infrastructure-style platforms whose value proposition depends on large
              project sites, civil works, and financing structures, not simply shipping containers of batteries. Form
              itself sits somewhere between those camps: more productized than Highview or Hydrostor, more
              utility-specific than many lithium-ion incumbents, and ahead of many novel chemistries in named utility
              proof. The company’s public deployments with Xcel, Great River, and Georgia Power are strategically
              valuable, but they still do not match Fluence-level commercial scale or the infrastructure-style project
              pipelines some other long-duration formats are pursuing.
