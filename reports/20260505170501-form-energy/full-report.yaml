      - number: '3.4'
        title: Switching costs, lock-in, and multi-homing
        blocks:
          - type: paragraph
            body: >-
              Utilities are unlikely to commit to one winner across all storage jobs. Multi-homing is structurally
              plausible because different assets solve different time horizons and siting constraints. A utility could
              deploy Form for multiday resilience, lithium-ion for daily cycling, and pumped hydro or transmission
              solutions elsewhere on the same system. That limits lock-in. Highview and Hydrostor also show why
              switching costs are not purely chemical: infrastructure projects can create deep site-specific
              commitments, while modular battery vendors can be swapped more easily if procurement standards remain
              chemistry-agnostic. Fluence’s strongest edge is not duration but distribution and procurement familiarity.
              Its scale, backlog, and services stack make it easier to buy, operate, and finance. Form therefore needs
              more than technical novelty. It needs enough deployed proof, planning-model credibility, and manufacturing
              follow-through that utilities treat 100-hour duration as a category they must procure rather than as an
              experimental add-on next to easier short-duration choices.
            claimRefs:
              - CP020
              - CP021
              - CP022
              - CP023
