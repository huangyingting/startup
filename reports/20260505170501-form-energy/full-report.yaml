  - number: 7
    title: Risks
    sections:
      - number: '7.1'
        title: The clearest documented adverse risk today is cyber/privacy plus regulatory visibility gaps
        blocks:
          - type: paragraph
            body: >-
              Form Energy’s most concrete adverse event in the retained record is not a battery fire or permit
              enforcement action; it is the September 2025 ransomware incident disclosed to the New Hampshire Attorney
              General. That matters because it moves cyber and privacy risk from abstract diligence boilerplate into a
              documented incident with named data categories, mailed notices, and 24 months of remediation support. The
              second legal-regulatory theme is visibility rather than known violation. West Virginia clearly has permit,
              appeal, and worker-safety complaint mechanisms, and those mechanisms are accessible to citizens,
              regulators, and employees. Yet the retained sources still do not disclose the exact active permit IDs,
              conditions, or any Form-specific enforcement history for the Weirton site. That means investors can map
              the legal and regulatory pathways, but they cannot yet close diligence on Form’s live permit stack from
              public web evidence alone. The only other retained public lawsuit is an employment-discrimination case
              that was filed and later terminated, which is a manageable signal rather than a thesis-break by itself.
              The net read is that legal risk is currently more about privacy exposure, reporting obligations, and
              incomplete regulatory transparency than about a publicly documented pattern of major environmental or IP
              actions.
            claimRefs:
              - CR013
              - CR014
              - CR015
              - CR016
              - CR017
              - CR018
