      - number: '2.2'
        title: 'Sizing lenses: big macro demand, but no clean public Form-specific SAM'
        blocks:
          - type: paragraph
            body: >-
              Public sizing evidence is useful, but it does not produce a clean Form-specific TAM/SAM/SOM stack.
              Regulatory and industry sources show the U.S. storage market is growing quickly and the power system will
              need more flexibility as demand rises through 2050, yet those same sources do not isolate what fraction of
              that spend will clear for 100-hour batteries. ACP’s record 18.9 GW of 2025 battery installations and EIA’s
              storage trends validate strong demand for storage broadly, while McKinsey/LDES Council, WRI, NREL, and
              WECC all describe a future power system where multiday flexibility becomes more valuable as renewable
              penetration rises. BloombergNEF adds another lens: some non-lithium technologies can undercut lithium-ion
              beyond eight hours, but most remain early and deployment-dependent. The right interpretation is therefore
              a constrained market lens rather than a headline TAM. Form can point to utility projects and a
              manufacturing ramp, but public evidence still stops short of a verifiable company-specific SAM or SOM.
            claimRefs:
