      - number: '5.2'
        title: Architecture, manufacturing, and maturity
        blocks:
          - type: paragraph
            body: >-
              The retained sources are specific enough to describe the operating model without inventing hidden
              internals. Public pages say individual cells contain iron and air electrodes with a water-based
              non-flammable electrolyte; cells are grouped into modules, modules into protected enclosures, and
              enclosures into megawatt-scale power blocks. MIT’s independent description broadly matches Form’s own
              layout. Manufacturing maturity is no longer just lab-scale: Form Factory 1 is operating in Weirton, with
              the company stating that trial production began in September 2024 and that expansion started in October
              2024. The factory pages disclose unusually concrete line-building detail for a private climate-tech
              company, including anode and cathode lines, cell assembly, welding, furnaces, coating, AGVs, and robotics.
              That gives real confidence that Form has crossed the line from chemistry story to manufacturable system,
              even though public yield, throughput, and cost-down curves remain private. Public manufacturing proof is
              also unusually concrete because the factory pages and releases disclose square footage, headcount goals,
              expansion timing, and categories of production equipment. That does not replace a yield curve, but it
              materially improves confidence that Form has moved beyond lab prototypes into an industrialization phase
              with real process engineering and line-design dependencies.
