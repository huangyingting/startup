      - number: '5.3'
        title: Differentiation, safety, and remaining diligence gaps
        blocks:
          - type: paragraph
            body: >-
              Form’s differentiation is multi-layered. The most visible moat is chemistry and system design: inexpensive
              iron, water, and air; long duration; and no thermal-runaway behavior in cell-level UL9540A testing. A
              second moat is planning software. Formware is repeatedly used in public narratives about Great River,
              Xcel, California, Georgia, and New York because the company is selling not just storage duration but a
              model for where duration changes the least-cost portfolio. A third moat is IP and manufacturing know-how,
              with a growing patent trail around air electrodes, sealed alkaline systems, and cell architecture plus a
              dedicated high-volume plant. The caution is that public proof remains strongest on concept, architecture,
              safety, and project pipeline—not on fielded efficiency, long-term degradation, cyber controls, or the
              exact hardware-control stack. The public GitHub footprint is real but minimal, which supports “software
              exists” more than “software maturity is independently obvious.” In other words, Form’s public diligence
              package already clears the threshold for “serious product company,” but not yet for “fully underwritten
              operating asset provider.” The company has enough evidence to justify technical interest and commercial
              credibility, while leaving several bankability questions to direct diligence with customers, regulators,
              and project-level engineering documents. The missing disclosures are not edge cases. They sit at the exact
              junction where procurement teams decide whether a first-of-kind battery is merely interesting or genuinely
              financeable for repeat deployments across multiple territories.
