        title: Founders, leadership bench, and governance visibility
        blocks:
          - type: paragraph
            body: >-
              Founding attribution is unusually consistent in public materials. Form’s own About page and an investor
              profile from Engine Ventures identify the same five co-founders: Mateo Jaramillo, Ted Wiley, William
              Woodford, Yet-Ming Chiang, and Marco Ferrara. Those sources also anchor founder-market fit in prior work
              spanning MIT materials science, 24M Technologies, A123, and Tesla Energy, which is highly relevant for
              battery chemistry, manufacturing, and grid commercialization. Current executive disclosure is solid at the
              operating level: Form publicly names Jaramillo, Wiley, Chiang, Woodford, Ferrara, Chief Commercial Officer
              RJ Johnson, and Interim General Counsel Brian Lewis. Governance disclosure is much thinner. The retained
              sources expose executives and public-funding structures, but they do not disclose a current board roster,
              committee structure, or investor control rights. The interim legal title also suggests at least one
              leadership transition remains only partially visible in public materials.
