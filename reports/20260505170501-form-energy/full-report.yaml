            body: >-
              Form’s public traction has improved materially in 2024-2026, but operating proof still lags announced
              volume. Great River Energy remains the first commercial pilot anchor: a 1.5 MW / 150 MWh Cambridge project
              that moved from partnership to groundbreaking and is expected to become operational around late 2025 or
