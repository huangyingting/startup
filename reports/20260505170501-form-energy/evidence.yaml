evidenceGaps:
  - type: missing-source
    severity: material
    topic: Leadership and founder table lacks a public board roster or control-rights appendix
    missingEvidence: Current board members, observer rights, committee assignments, and founder/investor control documents.
    whyItMatters: >-
      Company Overview should anchor governance for later risk and valuation work, and public sources do not yet resolve
      the governing body behind the disclosed executives.
    diligencePath: >-
      Request the latest board deck, charter documents, investor rights agreement, and cap-table governance summary from
      management.
    relatedQuestionRefs:
      - RQ105
    relatedTableRefs:
      - T102
  - type: private-evidence-only
    severity: material
    topic: Latest valuation remains undisclosed in retained public financing coverage
    missingEvidence: Exact post-money valuation, share price, and any 2025-2026 secondary pricing reference points.
    whyItMatters: >-
      Latest valuation is a required cover metric and a key input for later underwriting, but retained public sources on
      Series F only disclose amount raised and investors.
    diligencePath: Obtain the Series F term sheet, latest 409A or secondary pricing memo, and board-approved financing summary.
    relatedQuestionRefs:
      - RQ108
  - type: private-evidence-only
    severity: material
    topic: Customer count and revenue run-rate are not publicly disclosed in retained Form Energy sources
    missingEvidence: Exact customer count, booked revenue, run-rate, backlog conversion, and deployment revenue recognition detail.
    whyItMatters: >-
      These are cover metrics for the report and necessary for judging commercialization pace, but public sources
      emphasize projects and pipeline rather than recognized revenue or customer counts.
    diligencePath: >-
      Request customer roster, booked orders, revenue bridge, and backlog-to-revenue schedule from finance and
      commercial leadership.
    relatedQuestionRefs:
      - RQ122
  - type: enumeration-incomplete
    severity: material
    topic: Stakeholder or investor map is public-facing only and cannot resolve the full cap table
    missingEvidence: >-
      Current ownership percentages, board seats, liquidation preferences, pro-rata rights, and non-equity commercial
      obligations.
    whyItMatters: >-
      The table can name the most visible investors and public-capital providers, but not the full power structure
      behind future financing and strategic decisions.
    diligencePath: >-
      Request the latest cap table, investor rights schedule, side letters, and government-support agreements with
      milestones and clawbacks.
    relatedTableRefs:
      - T103
  - type: enumeration-incomplete
    severity: minor
    topic: >-
      Milestone table omits private board actions, undisclosed contract signings, and non-public internal manufacturing
      gates
    missingEvidence: Exact dates for all private financing closes, every customer contract signature, and internal readiness reviews.
    whyItMatters: >-
      The chapter has a usable public chronology, but later diligence should not mistake it for a complete internal
      operating history.
    diligencePath: >-
      Ask management for the internal milestone tracker, program review cadence, and signed commercial timeline by
      project.
    relatedTableRefs:
      - T104
  - type: missing-source
    severity: minor
    topic: Material 2024-2026 leadership changes are only partially visible from current public pages
    missingEvidence: A dated executive-change log covering departures, interim appointments, and board-approved leadership transitions.
    whyItMatters: >-
      Key-person diligence depends on knowing whether current executives are stable, newly hired, or interim
      placeholders during scale-up.
    diligencePath: Request executive employment history, appointment dates, and any recent succession or search processes.
    relatedQuestionRefs:
      - RQ124
    relatedTableRefs:
      - T102
  - type: private-evidence-only
    severity: material
    topic: Form-specific SAM and SOM
    missingEvidence: >-
      Public sources do not disclose Form’s qualified pipeline, utility conversion rate, expected win share, or priced
      backlog by use case.
    whyItMatters: >-
      Without a bottom-up pipeline view, investors can overstate the near-term revenue pool implied by broad LDES
      narratives.
    diligencePath: >-
      Request segmented pipeline, expected MW/MWh delivery schedule, conversion assumptions, and utility decision
      timelines from the data room.
    relatedQuestionRefs:
      - RQ207
    relatedTableRefs:
      - T202
  - type: missing-source
    severity: material
    topic: Utility budget authority and approval chain
    missingEvidence: >-
      Retained sources imply IRP and generation-budget ownership but do not disclose exact committee, regulator, or
      board approval paths for Form-like procurements.
    whyItMatters: Form’s sales cycle and procurement friction depend on who controls the checkbook and how projects are accredited.
    diligencePath: >-
      Obtain utility RFPs, IRP excerpts, and management interviews that document approval gates, cost-recovery routes,
      and procurement owners.
    relatedQuestionRefs:
      - RQ212
    relatedTableRefs:
      - T203
  - type: conflicting-data
    severity: material
    topic: LDES cost crossover versus lithium-ion deployment reality
    missingEvidence: >-
      Sources agree novel technologies can win beyond eight hours in theory, but public deployment data still skew
      toward lithium-ion and shorter durations.
    whyItMatters: 'This contradiction is central to Form’s timing risk: technical value may emerge before market share does.'
    diligencePath: >-
      Benchmark live project bids, duration-specific LCOS assumptions, and resource-adequacy compensation across target
      regions.
    relatedQuestionRefs:
      - RQ221
      - RQ222
    relatedTableRefs:
