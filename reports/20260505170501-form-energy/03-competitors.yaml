      - - Pumped hydro
        - Status quo long-duration substitute
        - Mature infrastructure technology
        - Utilities and system planners needing long-duration storage
        - Established long-duration benchmark with deep operational history
        - Site-specific and capital-intensive; not a modular battery
    notes: >-
      The profile table mixes direct peers, adjacent long-duration formats, and incumbents because utilities can solve
      the same reliability job through multiple procurement paths.
