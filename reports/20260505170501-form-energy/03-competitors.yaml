  evidenceGaps:
    - type: private-evidence-only
      severity: blocking
      topic: Realized pricing and win-loss rates across competitors
      missingEvidence: >-
        Retained public sources do not disclose Form’s or peers’ realized contract pricing, discounting, gross margins
        by project, or durable win-loss rates.
      whyItMatters: >-
        Without project-level economics, the competitive analysis can establish differentiation and scale, but not prove
        who wins on normalized unit economics.
      diligencePath: Request bid files, pricing comparables, gross-margin bridges, and win-loss analysis by use case from management.
      relatedQuestionRefs:
        - RQ313
        - RQ323
      relatedTableRefs:
        - T303
    - type: conflicting-data
      severity: material
      topic: Lithium-ion cost leadership versus long-duration technical value
      missingEvidence: >-
        Some sources show non-lithium LDES wins beyond eight hours in theory, while adverse sources show lithium-ion
        still dominates real project pipelines.
      whyItMatters: >-
        This contradiction is the core competitive risk for Form: the better technology for a use case may not be the
        one buyers actually procure.
      diligencePath: Benchmark live bid durations, capacity payments, and financing terms in target utility procurements.
      relatedQuestionRefs:
        - RQ320
        - RQ324
      relatedTableRefs:
        - T304
    - type: missing-source
      severity: material
      topic: Competitor-specific pricing packages and service terms
      missingEvidence: >-
        Public product pages lack enough detail on maintenance obligations, service guarantees, EPC scope, and contract
        length for apples-to-apples comparisons.
      whyItMatters: Packaging and service obligations can matter as much as chemistry in utility procurement.
      diligencePath: Collect proposal decks, service agreements, and warranty structures from Form and major competitors.
      relatedQuestionRefs:
        - RQ313
        - RQ314
      relatedTableRefs:
        - T303
    - type: stale
      severity: minor
      topic: Fast-moving project finance and backlog figures
      missingEvidence: >-
        Several competitor scale signals come from 2025 or early-2026 releases that may shift quickly as projects are
        financed, delayed, or canceled.
      whyItMatters: Competitive rank can change quickly in a still-emerging category.
      diligencePath: Refresh all 2026 quarterly updates and project-FID status before an investment decision.
      relatedQuestionRefs:
        - RQ307
        - RQ309
      relatedTableRefs:
        - T301
