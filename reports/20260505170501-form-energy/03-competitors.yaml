callouts:
  - calloutType: strength
    title: Form is differentiated on duration, not just on being another battery startup
    body: >-
      The strongest retained-source distinction is that Form is explicitly marketing 100-hour storage, while most direct
      battery peers sit closer to the 8-22 hour range and incumbents compete through scale and procurement familiarity.
      That gives Form a real wedge in multiday utility use cases.
    claimRefs:
      - C094
      - C099
      - C103
      - C112
      - C125
  - calloutType: risk
    title: Incumbent procurement power is the real threat
    body: >-
      Fluence-scale incumbents and the broader lithium-ion ecosystem can win budgets even without matching Form’s
      duration because they are easier to finance, operate, and approve. Adverse sources reinforce that utilities still
      favor shorter-duration, better-known solutions in much of today’s market.
    claimRefs:
      - C115
      - C119
      - C120
      - C121
      - C128
      - C136
  - calloutType: assumption
    title: Pricing remains a blind spot across the field
    body: >-
      Public competitor pages and results releases reveal package shape, backlog, and project milestones but not enough
      realized pricing or win-loss data to prove who truly wins on economics. Investors should treat any hard
      competitive pricing claim as unverified until data-room evidence exists.
    claimRefs:
      - C130
      - C131
