  claims:
    - id: CM001
      statement: >-
        The B2B payments market encompasses all financial transactions where a business pays another business,
        including trade settlements, supplier invoices, inter-company transfers, payroll, and expense management,
        across both domestic and cross-border flows.
      type: inferred
      topic: market-definition
      sourceRefs:
        - SM001
        - SM012
      confidence: high
      freshness: current
      answersQuestionRefs:
        - QM016

    - id: CM002
      statement: >-
        Traditional cross-border B2B payments pass through three to five intermediary banks before settlement,
        with each adding latency (typically one to five business days) and fees (typically one to five percent
        of transaction value), creating the core efficiency problem that API-native payment platforms solve.
      type: third-party-reported
      topic: market-definition
      sourceRefs:
        - SM003
        - SM006
        - SM018
      confidence: high
      freshness: current
      answersQuestionRefs:
        - QM018

    - id: CM003
      statement: >-
        Status-quo substitutes for Nium's B2B payment infrastructure include SWIFT correspondent banking,
        bank wire transfers, money transfer operators (Western Union Business Solutions), and internal
        treasury systems — all of which are being disrupted by API-native payment platforms.
      type: inferred
      topic: market-definition
      sourceRefs:
        - SM003
        - SM017
      confidence: medium
      freshness: current
      answersQuestionRefs:
        - QM016

