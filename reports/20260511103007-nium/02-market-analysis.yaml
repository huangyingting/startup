chapter:
  number: 2
  title: Market Analysis
  summary: >-
    The global B2B payments market is massive and accelerating. Mordor Intelligence values total B2B payments at
    $1.42 trillion in 2025, growing to $3.43 trillion by 2031 at a 15.48% CAGR, with cross-border flows expanding
    at a faster 16.52% CAGR and digital rails advancing at 17.31% CAGR. Allied Market Research independently sizes
    the cross-border payments sub-market at $206.5 billion in 2024, projected to reach $414.6 billion by 2034 at
    7.1% CAGR. Real-time payment networks — now numbering 80 or more globally — are structurally displacing
    correspondent banking chains involving three to five intermediaries per transaction. APAC leads regional growth
    at 17.42% CAGR, driven by India UPI processing 13.4 billion monthly transactions. FedNow exceeded 900
    participating US institutions by late 2025. The buyer landscape spans enterprise fintechs, banks, airlines,
    gig-economy platforms, and SMEs, each with distinct technical requirements and budget ownership. ISO 20022
    standardization, e-commerce globalization, and regulatory mandates are primary adoption drivers; AML/KYC
    fragmentation and FX volatility are key constraints. Nium's $50 billion-plus annual transaction volume and
    190-country footprint position it to capture a meaningful share of the rapidly digitizing cross-border B2B
    infrastructure layer.

sections:
  - id: market-definition
    title: Market Definition and Scope
    body: >-
      The B2B payments market encompasses all financial transactions where a business pays another business for goods,
      services, payroll, inter-company transfers, or trade settlements. It spans domestic and cross-border flows,
      covers multiple payment rails (wire, ACH/SEPA batch, real-time instant, card, and emerging digital-asset
      rails), and includes the full spectrum of enterprise sizes from micro-SMEs to multinational corporations.

      Nium's serviceable market sits at the intersection of two high-growth sub-segments: cross-border B2B payments
      and card issuance/embedded finance. Cross-border B2B payments are defined as commercial transactions that
      cross a national border and require currency conversion, regulatory compliance in multiple jurisdictions, and
      settlement across correspondent banking networks or direct instant-payment rails. These transactions are
      structurally more expensive than domestic equivalents — traditional cross-border flows pass through three to
      five intermediary banks before settlement, each adding latency (typically 1-5 business days) and a fee
      (typically 1-5% of transaction value) — creating the core problem Nium addresses.

      Status-quo substitutes for Nium's B2B infrastructure include SWIFT correspondent banking (the legacy
      incumbent for large corporates), bank wire transfers (costly, slow), money transfer operators such as Western
      Union Business Solutions, and internal treasury systems at the largest multinationals. The adjacent TAM
      segments that Nium does not yet fully address include consumer remittances, domestic payments within single
      jurisdictions, and securities settlement — though the embedded finance (BaaS) roadmap may expand adjacently
      into domestic-payment infrastructure for fintech clients.
