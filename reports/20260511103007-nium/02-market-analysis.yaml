  - id: growth-drivers
    title: Growth Drivers and Adoption Constraints
    body: >-
      The B2B payments market is being transformed by a set of structural and regulatory tailwinds that
      disproportionately benefit API-native, multi-rail infrastructure providers like Nium.

      The most significant regulatory driver is ISO 20022 adoption. The BIS CPMI has been working with the
      financial industry to harmonize ISO 20022 data requirements for cross-border payments, with most world
      payment systems having adopted the standard by 2025. ISO 20022 enables richer data to travel with payments
      — reducing errors, enabling straight-through processing, and facilitating compliance screening — making it
      easier to build automated reconciliation and reducing the manual intervention that inflates costs today.

      Real-time payment network proliferation is the second mega-driver. By 2025-2026, over 80 real-time payment
      networks operate globally, with transaction volumes projected to reach 512 billion annually by 2027. India's
      UPI processed 13.4 billion monthly transactions by December 2025; SEPA Instant in Europe processed 14.5
      billion transactions in 2024, a 54% year-over-year growth. The US FedNow network exceeded 900 participating
      financial institutions by late 2025, and the RTP® network raised its per-transaction limit to $10 million
      in February 2025, expanding eligibility to larger B2B flows.

      E-commerce globalization creates persistent demand for cross-border supplier payments. Visa's B2B virtual
      card volumes grew 25% year-over-year in FY2025, signaling corporate preference for card-based B2B spend.
      The EU e-VAT mandate from 2028 will affect more than 10 million businesses, forcing digital invoice and
      payment integration — a compliance-driven digitization wave.

      Key constraints include AML/KYC regulatory fragmentation across jurisdictions, FX volatility in emerging-
      market corridors, cybersecurity risk in high-volume payment flows, and the shrinking correspondent banking
      network that forces payments providers to maintain direct settlement relationships as tier-2 and tier-3
      market banks exit. Switching costs from established banking relationships are high for large corporates,
      making enterprise sales cycles 6-18 months for full onboarding.
