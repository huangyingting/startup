  - id: market-sizing
    title: Market Sizing — TAM, SAM, and SOM
    body: >-
      Multiple independent analysts have sized the B2B payments opportunity using different methodologies,
      producing a wide but directionally consistent picture. Mordor Intelligence (updated February 2026) measures
      the total global B2B payments market — including domestic flows, all payment instruments, and all
      geographies — at $1.42 trillion in 2025, growing to $3.43 trillion by 2031 at a 15.48% compound annual
      growth rate. The cross-border sub-segment grows faster at 16.52% CAGR, and digital payment rails specifically
      advance at 17.31% CAGR within the period.

      Allied Market Research independently sizes the global cross-border payments market (B2B, B2C, and C2C
      combined) at $206.5 billion in 2024, growing to $414.6 billion by 2034 at 7.1% CAGR. Within this, B2B is
      the largest transaction-type segment. MarketsAndMarkets sizes the narrower B2B digital payment platform
      market (software and services fees only, excluding float and FX) at $8.2 billion by 2028 at a 14.3% CAGR,
      representing the pure-platform revenue layer where Nium competes for software economics.

      For a TAM-SAM-SOM framework applied to Nium: the TAM is the total B2B payments market ($1.42T in 2025),
      the SAM is the cross-border B2B and card-issuance addressable universe ($206.5B cross-border plus
      incremental card issuance) where Nium has regulatory licenses and network reach, and the SOM is Nium's
      current and near-term capturable revenue — evidenced by FY2024 revenue of SGD 167.2 million ($125M) on
      $50B+ in annual transaction volume (an implied blended take rate of approximately 0.25%). The wide spread
      among analyst estimates ($1.42T vs. $206.5B vs. $8.2B) reflects dramatically different scope definitions:
      total payment flows vs. cross-border segment only vs. platform fees only. Investors should specify which
      lens they are using when sizing Nium's market opportunity.
