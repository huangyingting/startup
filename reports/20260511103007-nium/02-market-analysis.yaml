  - id: market-outlook
    title: Market Outlook and Nium's Positioning
    body: >-
      The global B2B payments market is approaching an inflection point. Legacy correspondent banking — a chain
      of 3-5 intermediary banks adding 1-5 business days and compounding fees to each cross-border transaction —
      is being replaced by direct real-time rails, API-native platforms, and increasingly by digital-asset
      settlement corridors. McKinsey's 2020 Global Payments Report documented that cross-border payments totaled
      $130 trillion in 2019, generating $224 billion in revenues, with global payments revenues growing
      approximately 7% annually before COVID disruption. Post-COVID digitization has accelerated these trends.

      Ripple's industry analysis estimates the B2B cross-border payments market hit $31.6 trillion in transaction
      volume (not fee revenue) recently, projected to grow 58% to reach $50 trillion by 2032. This volume growth,
      combined with structural fee compression as technology replaces correspondent banking intermediaries, creates
      a volume-for-margin trade-off that benefits scaled, low-cost infrastructure providers.

      SWIFT's global financial messaging network connects more than 11,000 financial institutions and has
      historically dominated international payment messaging. SWIFT gpi now enables same-day settlement for many
      corridors, but SWIFT remains a messaging standard rather than a settlement rail — meaning liquidity must
      still reside in correspondent bank accounts. Real-time API platforms that pre-fund local wallets in each
      country (Nium's model) represent the structural alternative that removes pre-funding friction.

      Nium's $50 billion-plus annual transaction volume (announced February 2026), 190+ country reach, and 40+
      regulatory licenses represent meaningful moats in the cross-border infrastructure layer. The November 2025
      Visa USDC stablecoin settlement pilot with Nium signals the next evolution: digital-asset rails potentially
      replacing pre-funded fiat wallets for certain corridors, further compressing settlement costs.

      Regional growth dynamics favor Nium: APAC — Nium's home region — is the fastest-growing at 17.42% CAGR,
      driven by Southeast Asian e-commerce and India's UPI ecosystem. LAMEA (Latin America, Middle East, Africa)
      is the fastest-growing region in the cross-border segment per Allied Market Research, and Nium has been
      expanding coverage there.
