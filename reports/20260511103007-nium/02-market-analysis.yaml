callouts:
  - calloutType: insight
    title: Platform-Layer Economics Compress Fees But Expand Volume
    body: >-
      At $50B+ annual transaction volume and approximately $125M in FY2024 revenue, Nium's implied take
      rate is roughly 0.25% (25 basis points). This is materially lower than traditional correspondent
      banking (1-5%) but consistent with scaled API payment infrastructure economics. The strategic bet is
      that volume grows faster than take-rate compression, sustained by expanding corridors, new client
      types (banks, fintechs), and higher-margin products (card issuance). The B2B digital payment platform
      market's $8.2B by 2028 projection at 14.3% CAGR (MarketsAndMarkets) implies the platform fee layer
      alone is growing faster than most SaaS verticals — but Nium must continue capturing share at pace.
    claimRefs:
      - CM009
      - CM011
      - CM012
      - CM013

  - calloutType: risk
    title: Market Sizing Uncertainty Is Structural — Not Just Methodological
    body: >-
      Analyst estimates for the B2B payments market range from $8.2 billion (MarketsAndMarkets, platform
      fees only) to $1.42 trillion (Mordor Intelligence, total B2B flows) — a 170× spread. This is not
      statistical noise. It reflects genuine disagreement about whether to measure total transaction value,
      fee revenue, or platform software fees, and whether to include domestic payments. Investors using TAM
      to justify Nium's valuation must specify which metric they are using. The relevant comparison for
      pricing Nium is the platform-fee layer (~$8.2B by 2028) or the cross-border revenue market ($206.5B
      in 2024) — not the aggregate $1.42T payment flows figure, which overstates Nium's addressable
      revenue opportunity by orders of magnitude.
    claimRefs:
      - CM006
      - CM008
      - CM009
      - CM011

