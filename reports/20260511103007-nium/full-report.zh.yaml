      - number: '2.3'
        title: 买方与细分市场格局
        blocks:
          - type: paragraph
            body: >-
              B2B 支付买方格局可按行业垂直、企业规模和技术成熟度划分。在 Nium 所处的基础设施层，主要买方类型包括企业级 fintech、银行和金融机构、航空公司与旅行管理公司、gig-economy
              平台，以及拥有国际供应商或员工基础的中型企业。

              企业级 fintech（数字银行、薪资平台、借贷平台、保险 fintech）是 Nium 价值最高的买方细分。它们把 Nium 的 API 嵌入自有产品，成为 Nium 网络访问能力的转售方。决策者通常是 CTO
              或 CPO，CFO 负责签核 unit economics。 预算被归为工程 / 产品 capex，并随着交易量放大转化为 COGS。采用触发点通常是客户要求跨境支付功能，而内部自建 需要 12-18 个月。

              航空公司和旅行管理公司需要为机票分销（NDC）、酒店整合和旅行支出 FX 转换做高频、低利润率的 B2B 结算。 SIC / 旅游行业相对员工数贡献了超额支付量。银行和金融机构越来越多把 Nium
              作为代理行替代方案——不再自己维护 190 个国家本地清算银行关系，而是白标使用 Nium 的覆盖。Gig-economy 平台（ride-hailing、自由职业 marketplace、 last-mile
              delivery）需要用多币种向承包方做日内多次付款，批处理 ACH 系统很难服务这一场景。

              BFSI 是最大需求垂直，占全球 B2B 支付市场 25.18%。大型企业贡献 60.31% 的收入份额，但 SME 是增长最快的细分， CAGR 为 16.23%。Nium
              历史上聚焦中大型企业客户，但由嵌入式金融伙伴服务的 SME 细分代表了重要扩张方向。
