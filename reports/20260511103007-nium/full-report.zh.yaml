      - number: '5.5'
        title: 路线图与技术差异化
        blocks:
          - type: paragraph
            body: >-
              Nium 的技术路线图由三条主线塑造：向服务不足市场扩展通道（非洲、东南亚、拉丁美洲）、采用下一代支付网络（stablecoin/USDC、ISO 20022），以及加深发卡和 BaaS 平台。2025 年 11
              月与 Visa 的 USDC 结算试点，是公司探索下一代支付网络最具体的公开证据。SWIFT 和主要区域支付网络在 2025-2026 年完成 ISO 20022 迁移，这要求 Nium
              的报文层支持更丰富的结构化数据格式；这项升级可能提升 AML 筛查准确率，并降低误报带来的合规负担。

              Nium 的主要技术差异化不在专利保护的软件，而在运营能力：监管牌照栈（40+ 司法辖区）、实时通道网络（100+ 即时通道）和发卡网络（Visa 与 Mastercard 合作覆盖 34+
              国家），单独复制每一项都很贵，叠加后形成多年进入壁垒。AWS 和主要云服务商提供支付基础设施服务，理论上可能把 Nium 技术栈的某些部分商品化——尤其是 SWIFT
              报文和外汇服务——但它们尚未进入全栈持牌支付基础设施市场。开源支付基础设施（Moov.io）能解决开发者体验缺口，却无法复制 Nium 的监管牌照足迹。Stablecoin/CBDC 支付网络在 5
              年以上周期内构成新兴技术风险：如果大型基础设施提供商采用绕开传统支付网络的可编程货币支付网络，Nium 的通道和牌照护城河可能被扰动。
