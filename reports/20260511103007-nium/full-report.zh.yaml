  - number: 5
    title: 产品与技术
    sections:
      - number: '5.1'
        title: 产品套件概览
        blocks:
          - type: paragraph
            body: >-
              Nium 的 B2B 产品组合分为三大模块：Nium Transact、Nium Receive 和 Nium Embed。Nium Transact 是付款产品，让企业客户可在 190 多个国家用 100
              多种货币发起付款。它同时支持 SWIFT 和本地实时支付网络；截至 2026 年，可用即时通道超过 100 条。Nium Receive 让企业通过多币种虚拟账户收取 40
              多种货币，并在收款时转换入账资金。Nium Embed 是发卡和银行即服务（BaaS）模块，支持客户在 34 多个国家发行 Visa 和 Mastercard
              虚拟卡及实体卡，用于企业费用管理、差旅项目和终端用户金融产品。

              三个模块都通过同一个统一 REST API 暴露，使用一致的认证、JSON 载荷和基于 webhook 的状态通知。Nium
              平台也支持批量支付操作，可用于薪资、市场平台付款和企业资金拨付，适合有高频、重复付款需求的企业客户。除这些 B2B 产品外，Nium 仍保留面向个人跨境汇款的 Instarem 消费者品牌；Instarem
              在同一套监管牌照下运营，但产品界面独立。公司每月有 285,000 多家企业使用实时支付网络，显示其在金融科技、差旅管理、薪资平台和市场平台等垂直领域已有较大采用度。

              一个值得注意的技术里程碑是 Nium 在 2025 年 11 月与 Visa 进行 USDC 稳定币结算试点——这是 Visa 网络上较早一批脱离传统法币流的集成。这个试点表明，Nium
              有意在现有法币通道之外支持下一代支付网络。
