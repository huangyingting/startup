      - 缓解
      - 监测指标
      - 中止情景
    rows:
      - - MAS 或 FCA 牌照撤销
        - 持续合规；资本充足；监管检查准备
        - MAS/FCA 注册状态；季度资本充足报告
        - 牌照暂停或正式撤销——立即复核投资
      - - 印度 ED/PMLA 案件升级（暂缓执行被撤销）
        - Kerala HC 暂缓执行仍有效（Sept 2025）；法律团队已介入；跟踪印度收入
        - Kerala HC 案件状态；印度走廊收入占总收入比例
        - ED 获得不利裁决且印度业务暂停——投资逻辑破裂
      - - 收入同比下降（不只是增速放缓）
        - 企业客户留存靠 API 集成切换成本支撑
        - 按季度跟踪收入增速；如披露则跟踪 NRR
        - 连续两个季度收入下降——启动投资复核
      - - 前三大企业客户流失（收入占比 >15%）
        - API 集成切换成本；多产品客户关系
        - 按季度监控收入集中度；跟踪客户 NPS
        - 主要客户流失且收入下降 >15%——投资逻辑破裂
      - - CEO 在 IPO 前离职
        - 无结构性缓释；CFO/CCO 到位可降低关键人依赖
        - 无早期预警信号；跟踪高管离职公告
        - CEO 辞任或被迫离开——立即复核
      - - IPO 撤回或定价低于 $1.0B
        - CFO/CCO 到位；收入增长；印度法律问题解决
        - IPO S-1 申报；承销商授权；路演信号
        - IPO 撤回或定价低于 $1.0B——陷入困境融资情景
    notes: 触发标准是投资逻辑破裂情景，不等于必然亏损。部分情景（例如 IPO 定价低于 $1.0B） 需要重新评估风险 / 回报权衡，而不是自动退出。监测指标基于公开数据源； 如果能进入私有数据室，预警会更早出现。
  - id: TV001
    title: 建议摘要表
    description: Nium investment recommendation, confidence, risk rating, valuation stance, and target return.
    claimRefs:
      - CV001
      - CV002
      - CV013
      - CV014
    columns:
      - 维度
      - 评估
      - 支撑理由
    rows:
      - - 建议
        - 有条件持有 / 观察
        - 市场有吸引力，牌照护城河也能防守；前提是印度法律问题解决、收入重新加速
      - - 信心
        - 中
        - ACRA 文件提供的尽调数据质量较高；印度收入仍未知；IPO 条款未披露
      - - 风险评级
        - 高
        - 印度 ED/PMLA 法律悬而未决；经营亏损率 53%；估值较峰值压缩 33%
      - - 估值立场
        - 以当前增长看，$1.4B 估值合理；如果增长进一步放缓则偏贵
        - FY2024 收入的 11.3x——对成长期 B2B 支付基础设施公司并不离谱； 但需要重新加速才能支撑估值
      - - 目标回报（基准）
        - 0.0–1.3x（持平到小幅收益）
        - 若 IPO 估值为 $1.4–$1.8B，以当前入场价计算回报为 0-30%； 如果增长不加速，当前估值向上的空间有限
      - - 目标回报（乐观）
        - 1.4–1.8x
        - IPO 估值达到 $2.0–$2.5B 需要收入增长 20%+；若印度问题解决且 FY2025 加速，则具备可信度
      - - 目标回报（悲观）
        - 0.5–0.7x（亏损情景）
        - 如果 IPO 撤回或印度案件升级，可能以 $700M–$1.0B 估值融资过桥
    notes: 建议和风险评估仅基于公开信息。投资者在依据任何估值逻辑行动前， 应完整查看数据室，包括印度收入拆分、MAS 资本充足率和 FY2025 年初至今财务数据。
  - id: TV002
    title: 投资逻辑 / 反向逻辑表
    description: Nium's investment thesis and anti-thesis — bull and bear case logic side by side.
    claimRefs:
      - CV001
      - CV003
      - CV004
      - CV006
      - CV007
    columns:
      - 维度
      - 投资逻辑（乐观情景）
      - 反向逻辑（悲观情景）
    rows:
      - - 市场机会
        - 到 2033 年，B2B 跨境支付规模达 $4.4T；Nium 的 40 张牌照组合能拿到超比例份额
        - 市场竞争激烈；Airwallex、Stripe Treasury 和 Visa/Currencycloud 资本更多，扩张也很快
      - - 收入增长
        - FY2024 增速放缓至 13.3%，是高速增长后的正常化；FY2025 有机会重新加速到 20%+
        - 两年内增速从 2.7x 降到 13.3%；更像结构性放缓，而不是周期性波动
      - - 盈利路径
        - 合规和牌照成本基数固定，规模扩大后有经营杠杆；边际交易经济性会改善
        - 亏损率 53%，且未披露 EBITDA 打平时间表；合规成本刚性强，还在增长
      - - 印度法律风险
        - Kerala HC 暂缓令有效；印度业务继续运行；法律风险在充分披露下可管理
        - 印度 ED/PMLA 调查仍在继续；暂缓令可能被推翻；IPO 风险重大
      - - IPO 执行
        - CFO/CCO 已到位；新加坡总部扩张；Visa 合作；2026 年窗口可达成
        - 印度案件未解决；烧钱速度需要股权融资支撑；2026 年 IPO 市场未必能支撑 $1.4B+ 定价
      - - 竞争护城河
        - 190+ 个国家的 40+ 张牌照需要 5 年以上搭建；API 集成切换成本保护收入
        - Airwallex 正在快速获取牌照；Visa/Currencycloud 拥有更深的网络关系
    notes: 投资逻辑和反向逻辑的维度基于公开信息。部分因素（印度收入、FY2025 增长、 IPO S-1 内容）尚未公开，会显著影响投资逻辑与反向逻辑的权重。
