      - number: '7.3'
        title: 技术与竞争风险
        blocks:
          - type: paragraph
            body: >-
              Nium 的主要竞争风险来自三类来源：（1）资金充足的垂直领域既有玩家扩展牌照和通道足迹；（2）stablecoin/CBDC 支付网络带来的横向技术扰动；（3）开源和云原生基础设施把 Nium
              技术栈的一部分商品化。

              Airwallex 已融资超过 $900M，并持有英国和欧洲 EMI 牌照，同时在北美和亚太快速扩张。Currencycloud（2021 年被 Visa 收购）可调用 Visa 的全球网络和资本。Stripe
              Treasury 将支付基础设施服务打包进 Stripe 生态。这些竞争者提供的产品越来越重叠——多币种账户、跨境转账、发卡——并拥有难以复制的 Visa/Mastercard 网络关系优势。Wise
              Business 在 SME 细分市场竞争，它以透明外汇定价挑战 Nium 未披露外汇点差的模式。

              SWIFT 报文的 ISO 20022 迁移（2025-2026 年完成）要求 Nium 升级报文基础设施。这是合规成本，不是战略机会；但如果不能及时升级，可能出现 SWIFT 连接问题。Stablecoin
              支付网络——以 Nium 自己 2025 年 11 月与 Visa 的 USDC 试点为例——构成 5 年以上维度的技术扰动：如果 USDC 或 CBDC 支付网络扩大到替代法币代理行体系，Nium
              的通道牌照护城河可能被部分去中介化。Moov.io 和其他开源支付基础设施项目解决开发者体验缺口，但无法复制 Nium 的监管牌照足迹。

              外汇点差不透明（Nium 不公布外汇加价率）带来定价风险：如果议价能力强的企业客户要求披露外汇定价，Nium 当前的不披露模式在 IPO 后可能难以持续。
