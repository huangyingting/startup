        title: 图表
        blocks:
          - type: callout
            title: 印度 ED/PMLA 法律风险是近期最关键风险
            body: >-
              印度 Enforcement Directorate 对 Nium 的 PMLA 调查在 2025 年 9 月被 Kerala HC 暂缓执行，这是本次尽调中后果最大、也最不确定的风险。印度是 Nium
              的重要支付通道——既包括 Instarem 消费者汇款，也包括 B2B UPI / 即时支付路径。如果暂缓执行被撤销且 ED 获得执法结果，Nium 的印度业务可能被暂停，影响收入和计划中的美国
              IPO（美国承销商和机构投资人通常要求重大法律不确定性在推进前得到解决或被风险隔离）。投资人应要求提供所有印度法律程序的当前状态、印度收入占总收入比例，以及 Nium 法务团队是否已聘用独立国际律师。
