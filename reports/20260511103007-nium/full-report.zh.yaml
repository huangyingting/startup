  - number: 4
    title: 财务情况
    sections:
      - number: '4.1'
        title: 收入流与定价模式
        blocks:
          - type: paragraph
            body: >-
              Nium 通过四条主要收入流变现，但公开文件未单独披露任何一条。Nium Transact——出站跨境付款产品——估计贡献收入大头，可能为 60–70%，来自银行间汇率上的 FX spread
              和单笔固定费用。FX spread 是主导经济驱动因素：Nium 对每笔换汇交易的 mid-market 汇率 加价（估计 30–100 个基点）。Nium Receive 让企业收取 40+
              种货币的付款，并同样通过入站资金流的 FX 兑换变现，估计占总收入 15–20%。Nium Embed——覆盖 34+ 个国家的发卡和 BaaS——通过 interchange
              income、项目设置费以及按卡或按项目的月费贡献估计 10–15% 收入。Nium 平台上预注资客户余额的 float income 估计贡献 5–10% 收入，自 2022
              年以来受益于较高利率。面向企业嵌入式 基础设施的 API / 牌照收入流仍属边缘，可能低于总收入 5%。

              所有收入流合计的隐含 blended take rate 约为 0.25%，计算方式是用 FY2024 收入中值约 SGD 125M 除以 $50B+ 年交易量。这明显低于 Wise
              等消费者跨境玩家（blended take rate 约 0.5–0.7%），但反映了 Nium 交易量组合的大名义金额、企业 B2B 特征。公司不公布定价； 企业客户很可能协商定制 spread
              和按量折扣，使实际 take rate 低于任何标价。收入确认按交易发生计，没有证据显示存在重大递延收入， 降低了会计复杂度，但也限制了对未来已签约交易量的可见度。FY2021 至 FY2024 三年收入
              CAGR 约 56%，但可见增速从 FY2022 的 2.7× 降至 FY2024 的 13.3%；在承销 IPO 增长逻辑前，管理层需要对此轨迹给出详细解释。
