      - number: '6.3'
        title: 具名客户证明与案例研究
        blocks:
          - type: paragraph
            body: >-
              Nium 的案例研究页面记录了企业客户部署及结果。KBank（Kasikorn Bank）是泰国最大商业银行之一，被列为使用 Nium 跨境支付基础设施的生产环境客户，并附有 KBank
              国际贸易产品管理负责人的推荐语。这是 Nium 质量最高的公开客户证明：具名、一线金融机构，并有高管引述。

              Brex 这家美国企业卡和费用管理平台（估值 $12B+）使用 Nium Embed 做国际发卡。这段关系出现在 Nium 的平台传播中，也符合 Brex 的产品供给（全球市场多币种企业卡）。Paysend
              是英国跨境汇款金融科技公司，使用 Nium 的支付网络覆盖国际通道；这一点可由联合新闻稿和 Nium 的合作伙伴 / 客户文档佐证。Rippling 是美国 HR 与薪资平台（估值
              $13.5B），使用全球支付基础设施做国际薪资拨付。Nium 的通道深度和即时支付网络与 Rippling 全球薪资产品需求一致。

              具名客户的证据质量不一：KBank 有带引述的案例研究；Brex、Paysend 和 Rippling 出现在公开新闻与 Nium 合作伙伴传播中，但没有详细结果指标。公开资料中没有任何客户披露归因于 Nium
              的具体成本节约、结算速度改善或交易量。企业支付基础设施客户很少公开详细供应商绩效指标，因此缺少量化结果是常态，不是异常。
