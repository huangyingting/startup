  - number: 2
    title: 市场分析
    sections:
      - number: '2.1'
        title: 市场定义与范围
        blocks:
          - type: paragraph
            body: >-
              B2B 支付市场覆盖企业为商品、服务、薪资、集团内转账或贸易结算向另一家企业付款的全部金融交易。它横跨本地和 跨境资金流，覆盖多种支付 rails（wire、ACH/SEPA
              批处理、实时即时支付、卡，以及新兴数字资产 rails）， 并囊括从微型 SME 到跨国公司的全谱系企业规模。

              Nium 的可服务市场位于两个高增长子赛道的交汇处：跨境 B2B 支付和发卡 / 嵌入式金融。跨境 B2B 支付指跨越国境、 需要换汇、多个司法辖区监管合规，并通过代理行网络或直接即时支付 rails
              完成清算的商业交易。这类交易结构上比 本地交易更贵——传统跨境资金流在清算前会经过三到五家中介银行，每一层都增加延迟（通常 1-5 个工作日）和费用 （通常为交易额的 1-5%）——这正是 Nium
              解决的核心问题。

              Nium B2B 基础设施的现状替代方案包括 SWIFT 代理行（大型企业的传统既有方案）、银行电汇（成本高、速度慢）、 Western Union Business Solutions 等 money
              transfer operators，以及最大跨国公司内部的资金管理系统。 Nium 尚未完全覆盖的相邻 TAM 赛道包括消费者汇款、单一司法辖区内的本地支付和证券结算；不过嵌入式金融（BaaS） 路线图可能会向
              fintech 客户的本地支付基础设施相邻扩展。
            claimRefs:
