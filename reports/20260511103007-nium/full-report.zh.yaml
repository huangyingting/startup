companyProfile:
  summary: >
    Nium 由 Prajit Nanu（CEO）和 Michael Minassian 于 2014 年在 Singapore 创立，最初名为 Instarem， 主要做 Asia 与 India 之间的消费者汇款。公司随后转向
    B2B 支付基础设施，并更名为 Nium，搭建了一个 API 优先的平台，覆盖全球实时支付、多币种钱包、发卡和银行即服务。Nium 从 Series A 到 E 累计融资 $312M+，主要投资方包括
    Visa、Temasek、Vertex Ventures 和 Global Founders Capital。2022 年 Series D 将估值推至 $2.1B 的峰值；2024 年 Series E 估值降至
    $1.4B，反映增长放缓和市场倍数重估下 约 33% 的压缩。Nium 向 ACRA 提交的 FY2024 财务数据显示，收入 SGD 167.2M（同比 +13.3%）、净亏损 SGD 88.1M、总资产 SGD
    804.5M。公司目标是在 2026 年底赴美 IPO。
