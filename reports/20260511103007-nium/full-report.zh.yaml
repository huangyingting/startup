      - number: '8.3'
        title: 乐观、基准与悲观情景
        blocks:
          - type: paragraph
            body: >-
              乐观情景假设：印度法律问题解决（或在 IPO 披露中成功隔离风险）、FY2025 收入重新加速到 20%+（SGD 200M+）、 盈利路线图可信（IPO 后 24 个月内能看到 EBITDA
              打平），且美国金融科技 IPO 市场接纳度回升。在这种情景下， Nium 可能以 $2.0B–$2.5B 估值 IPO，对应前瞻收入 12–15x。可比先例包括：Flywire 2021 年 IPO 约为前瞻收入
              8x； Payoneer 2021 年 SPAC 约为前瞻收入 6x；dLocal 2021 年 IPO 约为前瞻收入 25x（随后回调）。

              基准情景假设印度法律风险仍在（Kerala HC 暂缓令维持）、FY2025 收入增长 15-20%、亏损延续但亏损率有所改善， IPO 定价 $1.4B–$1.8B——持平或略高于当前 Series E
              估值。考虑当前轨迹，这是最可能情景。以 $1.4B 参加 Series E 的投资人只能获得温和的 0-1.3x 回报（与 IPO 定价持平至小幅增值）；这不足以支撑风险投资回报，
              但考虑风险画像，仍是一个可辩护结果。

              悲观情景假设印度 ED/PMLA 案件升级（暂缓令被撤销），或 2026 年美国 IPO 窗口因宏观环境关闭，迫使 Nium 以 $700M–$1.0B 的压缩估值融资过桥（FY2024 收入 5–7x）。以
              $1.4B 进入 Series E 的投资人将面临 30-50% 减记损失。
            claimRefs:
