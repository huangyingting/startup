      - number: '2.2'
        title: 市场规模 — TAM、SAM 与 SOM
        blocks:
          - type: paragraph
            body: >-
              多家独立分析机构用不同方法测算 B2B 支付机会，得出的范围很宽，但方向一致。Mordor Intelligence （2026 年 2 月更新）将全球 B2B
              支付总市场——包括本地资金流、所有支付工具和所有地区——测算为 2025 年 $1.42 trillion，并将在 2031 年增至 $3.43 trillion，复合年增长率 15.48%。跨境子赛道增长更快，
              CAGR 为 16.52%；同期数字支付 rails 的 CAGR 为 17.31%。

              Allied Market Research 独立测算全球跨境支付市场（B2B、B2C 和 C2C 合计）2024 年为 $206.5 billion， 到 2034 年增至 $414.6
              billion，CAGR 为 7.1%。其中，B2B 是最大的交易类型细分。MarketsAndMarkets 将更窄的 B2B 数字支付平台市场（仅软件和服务费，不含 float 和 FX）测算为 2028 年
              $8.2 billion，CAGR 为 14.3%， 代表 Nium 竞争软件经济性的纯平台收入层。

              套用到 Nium 的 TAM-SAM-SOM 框架：TAM 是 B2B 支付总市场（2025 年 $1.42T）；SAM 是 Nium 拥有监管牌照和 网络覆盖的跨境 B2B 与发卡可服务空间（$206.5B
              跨境市场加上增量发卡）；SOM 是 Nium 当前和近期可获取的收入， 可由 FY2024 收入 SGD 167.2 million（$125M）和 $50B+ 年交易量验证（隐含 blended take
              rate 约 0.25%）。 分析师估算之间差距巨大（$1.42T vs. $206.5B vs. $8.2B），反映范围定义截然不同：总支付流、仅跨境细分， 或仅平台费。投资者在测算 Nium
              市场机会时，应明确使用哪一种口径。
