      - number: '3.3'
        title: 功能、能力与定价对比
        blocks:
          - type: paragraph
            body: >-
              从八项采购标准做能力层分析，没有一家竞争者能完全复制 Nium 对实时支付 corridor 广度、多国发卡和监管牌照深度的组合。 Airwallex 在产品广度上最接近，但 corridor
              数量和监管牌照数量落后于 Nium。Wise Business 的 FX 透明度更强， 但缺乏发卡 API 或企业合规工具。Stripe 在开发者体验和 API 文档质量上领先，但银行能力仅限 US/EU，也没有
              Nium 在 APAC、LATAM 和 MEA 的 100+ 实时 corridor 对应能力。

              定价上，企业合同市场结构性不透明。Nium 不公开定价，而是按客户、交易量、corridor 和产品组合协商。Wise Business 收取透明的一次性 $31 开户费，FX 费用约为 mid-market
              汇率上方 0.3-1.5%，经济性可见且可预测。Airwallex 免费层 收 $0/month，FX 加价 0.2-1.0%，卡使用另有单笔费用。Payoneer 历史上向 SMB 收取 3% FX
              加价，企业账户可协商费率。

              Nium、Currencycloud 和 Banking Circle 没有透明标价，本身就是竞争因素：这会给评估选项的 SMB 制造摩擦， 但也给予企业定价灵活性——这一权衡有利于 Nium 企业优先的
              go-to-market。Airwallex 透明的分层定价则在中型企业 同时评估多家提供商时带来优势。
