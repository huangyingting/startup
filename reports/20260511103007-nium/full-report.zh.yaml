      - number: '1.5'
        title: 财务表现、反向事件与未解问题
        blocks:
          - type: paragraph
            body: >
              DealStreetAsia 审阅的文件显示，Nium FY2024 财务结果（截至 2024 年 12 月 31 日的财年）收入为 SGD 167.2M，同比 +13.3%，但净亏损 SGD
              88.1M。总运营费用升至 SGD 267.8M，主要由 SGD 87.8M 的处理费用 推动。2023 年裁员后，员工薪酬从 SGD 114.1M 降至 SGD 97.1M，广告费用从 SGD 15.6M
              大幅降至 SGD 5.1M。 总资产为 SGD 804.5M，总权益降至 SGD 82.3M（2023 年为 SGD 105.3M），反映累计亏损。2021 年收入为 SGD 43.9M，2022 年增至 SGD
              117M，但 FY2023 的确切数字未公开。

              三个反向事件需要尽调重点关注。第一，2023 年 10 月全球裁员 10%——此前子公司 Instarem 已裁员，CPO Robin Gandhi 与联合创始人 Pratik Gandhi
              同时离职——代表了显著的运营和领导层扰动。第二，2024 年 6 月 Series E 以 $1.4B 估值完成 down-round（较峰值低 30%），反映更广泛的 fintech 市场压力，并伴随 IPO
              从 原计划的 2025 年 Q2 推迟至 2026 年底。第三，也是监管风险上最重要的一项：2025 年 India Enforcement Directorate（ED）依据 Prevention of
              Money Laundering Act（PMLA）提起案件，将 Nium India 及其董事列为 被告，指称该平台被 Chinese loan-app 诈骗运营方用于资金流转。Nium 否认共谋，Kerala
              High Court 于 2025 年 9 月中止诉讼，但该案凸显支付中介大规模运营时的平台责任风险。此外，Nium 的 Wikipedia 条目带有 利益冲突标记。IPO
              准备度和盈利路径仍是需要进一步尽调的开放问题。
