  - id: FV002
    title: 估值敏感性
    type: bar
    description: 基于 FY2024 约 $124M 收入，展示 Nium 在 6x（困境）到 15x（高增长溢价）不同 EV/Revenue 倍数下的隐含企业价值。
    claimRefs:
      - CV007
      - CV008
      - CV009
      - CV011
    data:
      xAxis: EV/Revenue 倍数
      yAxis: 隐含企业价值（$M）
      items:
        - label: 6x 收入（困境 / 悲观）
          value: 744
          note: 低于 Payoneer/dLocal 公开市场倍数；过桥轮 / 下调估值轮场景
        - label: 8x 收入（同业中位数）
          value: 992
          note: 与 dLocal/Payoneer 同业中位数一致；已计入亏损折价
        - label: 10x 收入（基准）
          value: 1240
          note: 当前 Series E 轮 $1.4B 估值意味着约 11.3x；10x = 相对入场价小幅折价
        - label: 11.3x 收入（Series E 轮）
          value: 1400
          note: 当前 Series E 轮估值——Series E 轮投资人的盈亏平衡点
        - label: 13x 收入（乐观）
          value: 1612
          note: 收入重新提速且印度风险解决后的乐观情景 IPO 定价
        - label: 15x 收入（溢价）
          value: 1860
          note: 溢价情景要求 20%+ 增长、清晰盈利路线图和干净的法律状态
  - id: FV003
    title: 估值 / 回报区间
    type: range
    description: 2026-2027 年退出时，悲观、基准和乐观情景下的预期企业价值区间。
    claimRefs:
      - CV013
      - CV015
      - CV016
      - CV017
    data:
      items:
        - label: 悲观情景（2026-2027 年被迫过桥）
          low: 700
          high: 1000
          unit: $M
          note: 印度 ED 案件升级，或宏观环境导致 IPO 窗口关闭；困境过桥融资
        - label: 基准情景（IPO 估值达到 / 接近 $1.4B）
          low: 1400
          high: 1800
          unit: $M
          note: 印度暂缓令维持；IPO 按计划推进；收入增长 15-20%；较 Series E 轮小幅溢价
        - label: 乐观情景（溢价 IPO）
          low: 2000
          high: 2500
          unit: $M
          note: 印度风险解决；收入增长 20%+；盈利路线图可信；IPO 溢价定价
  - id: FV004
    title: 投资 KPI
    type: kpi
    description: 监控 Nium 投资逻辑直至 IPO 的关键绩效指标。
    claimRefs:
      - CV001
      - CV005
      - CV007
      - CV019
      - CV022
    data:
      items:
        - label: 当前估值
          value: $1.4B
          unit: Series E (June 2024)
          trend: down
          note: 较 $2.1B 峰值（2022 年）下降 33%；FY2024 EV/收入约 11.3x
        - label: FY2024 收入
          value: SGD 167.2M
          unit: (~$124M)
          trend: up
          note: 同比 +13.3%；较 FY2022 的 2.7x 增速明显放缓
        - label: FY2024 净亏损
          value: SGD 88.1M
          unit: (~$65M)
          trend: down
          note: 亏损率 53%；IPO 前存在烧钱速度风险
        - label: 交易规模
          value: $50B+
          unit: annually (Feb 2026)
          trend: up
          note: 285,000+ 家企业每月接入 RTP 网络；费率约 0.25%
        - label: 目标 IPO
          value: Late 2026
          unit: US listing
          trend: neutral
          note: 取决于印度法律问题解决和收入增长
