  - number: 3
    title: 竞争格局
    sections:
      - number: '3.1'
        title: 竞争格局概览
        blocks:
          - type: paragraph
            body: >-
              全球 B2B 支付基础设施市场还没有明确赢家。至少六家实质性竞争者在实时跨境支付、发卡、多币种账户和嵌入式银行服务上 覆盖重叠客户细分。Nium 将自身放在三项能力交汇处：实时支付 corridor、覆盖 40+
              司法辖区的监管牌照，以及发卡 BaaS； 每一项单独看都会吸引不同对手。

              竞争宇宙可分为四类。直接同业是以基础设施为先、争夺同一批企业和 fintech 买方的 B2B 平台：Airwallex 和 Currencycloud（Visa）。相邻的消费者到 SMB 玩家包括 Wise
              Business 和 Payoneer，它们以略不同的价值主张 （透明度和 marketplace payout）服务企业买方，但正向更高端客户收敛。开发者平台相邻玩家包括 Stripe，它提供发卡 和银行
              API，但主要聚焦 US 和 EU，缺乏 Nium 在新兴市场 corridor 的深度。既有玩家——主要是 SWIFT 和代理行网络——
              仍占据大额企业跨境交易量的大头，但在速度、成本和开发者体验上持续失地。可能的新进入者包括大型云平台（AWS、Google） 的嵌入式金融产品，以及可能在五年以上周期内同时去中介化多类玩家的
              stablecoin/CBDC rails。

              截至 2026 年 2 月，Nium 年交易量超过 $50B，FY2024 收入 SGD 167.2M；相对于 Wise 的 UK 上市业务和 Payoneer 接近 $1B 的收入规模，Nium
              处于中等体量，但领先于 Airwallex 最近一次披露的收入数字。市场不是赢家通吃：客户通常会 同时使用两到三家基础设施提供商，没有竞争者在全球 B2B 跨境支付量中取得支配性份额。
            claimRefs:
              - CP001
              - CP002
              - CP003
              - CP004
              - CP005
      - number: '3.2'
        title: 竞争者画像
        blocks:
          - type: paragraph
            body: >-
              Wise Business 面向希望获得透明、低成本国际转账的自由职业者、SMB 和中型企业。其核心主张是按 mid-market 汇率 且无隐藏加价；US 客户支付一次性 $31
              开户费即可覆盖完整产品套件。Wise Platform（不同于 Wise Business）为银行 和企业提供基于 API 的跨境支付基础设施，与 Nium 模式类似，已确认的合作包括 Indonesia 的
              Bank Mandiri。Wise 在 London Stock Exchange 上市，相比 Nium 的私营身份，具备公开公司治理和资本获取优势。

              Airwallex 是最可比的基础设施竞争者。公司 2015 年创立于 Melbourne，2024 年 10 月完成 $100M Series F1， 估值达到 $5.6B。Airwallex
              提供全球账户、费用管理、支付 API 和发卡，覆盖 150+ 个国家。其定价结构从免费的 Explore 计划到 $49/month 的 Growth 计划，企业价按定制条款。Airwallex 与 Nium
              争夺同样的企业 fintech 和 SMB 买方，并一直在扩展发卡和 API 能力。

              Stripe Issuing 和 Stripe Treasury 服务开发者优先、正在构建嵌入式卡和银行产品的公司。Stripe 的全球规模 （估值 $65B、年支付量 $1T+）远大于
              Nium，但国际基础设施重点明显偏向 US 和 EU 市场。Stripe Treasury 仅面向 US-based 平台，限制了它在既有市场以外的跨境 corridor 相关性。

              Payoneer（NASDAQ: PAYO）FY2024 收入为 $961.7M，接近 Nium SGD 167.2M（约 $125M）的七倍。Payoneer 的主要 差异化在于 marketplace
              payout 网络：与 Amazon、Wish、Lazada、Upwork 和 Fiverr 的深度集成，使其成为跨境自由 职业者和卖家付款的主导平台。Payoneer 服务 190+ 个国家的 5M+
              客户，但并不主要为企业客户提供基础设施 API。

              Currencycloud 于 2021 年被 Visa 以 $963M 收购，全球处理 $100B+ 交易，支持 180+ 个国家和 35 种 payout 货币， 提供 API-first 嵌入式支付平台，是
              Nium Transact 功能上最直接的等价物。Banking Circle 是 2015 年创立的 EU 银行牌照持有者，聚焦需要虚拟 IBAN 账户和多币种清算的 European 支付服务提供商和
              fintech，在 Europe 以外的 全球覆盖有限。
