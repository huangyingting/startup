      - number: '7.2'
        title: 运营与财务风险
        blocks:
          - type: paragraph
            body: >-
              Nium FY2024 在 SGD 167.2M 收入上录得 SGD 88.1M 净亏损，隐含经营亏损率约 53%。总资产为 SGD
              804.5M，其中大部分代表客户备付金（客户支付资金以在途资金和监管资本储备账户形式持有）。公司尚未产生经营性现金流，仍依赖股权资本。公司累计融资约 $312M，直到 Series E（2024 年 6
              月，$50M，估值 $1.4B）。在年度亏损 SGD 88.1M 的情况下，跑道取决于 Series E 剩余现金，以及收入增长带来的经营性现金流改善。如果 Nium 在 Series E 完成后 18-24
              个月内无法实现现金流收支平衡，就需要追加融资或加快 IPO 时间表——两者在当前金融科技市场都带有执行风险。

              2023 年 10 月裁员（约 10% 员工）可能反映公司在收入增长放缓和投资人压力下削减运营成本。FY2024 收入同比增速降至 13.3%，低于 FY2022 的 2.7x
              同比——这是显著减速，说明主要垂直市场可能饱和、客户流失抵消了新客户获取，或价格承压。嵌入 Nium 成本结构的 AML/CFT
              合规成本是永久性开销：监管检查、交易监控软件、合规人员和资本储备都不是下行周期中可剔除的可变成本。

              运营可靠性风险——未披露 API 可用性
              SLA、没有公开事故记录——会造成企业信任缺口，可能约束客户获取，或导致高量客户流失。支付基础设施提供商一旦发生重大中断或结算延迟，会面临合同罚款和声誉损害，而企业买方之间的口碑网络会放大这种损害。
