  - id: TM004
    title: 增长驱动因素与约束表
    description: >-
      Identifies the key forces accelerating or constraining B2B payments market digitization, with specific
      implications for Nium and diligence follow-up actions.
    columns:
      - 驱动因素 / 约束
      - 方向
      - 时间
      - 对 Nium 的影响
      - 尽调问题
    rows:
      - - ISO 20022 全球采用（BIS CPMI 要求的协调）
        - 驱动
        - 2025 年起，持续推进
        - 更丰富的支付数据提高 STP 率；传统银行客户需要符合 ISO 20022 的基础设施
        - 核实 Nium 在所有走廊的 ISO 20022 合规状态
      - - 实时支付网络扩张（全球 80+ 个网络）
        - 驱动
        - 持续推进（3-5 年建设仍在继续）
        - Nium 每接入一个新的 RTP 网络，都能增加走廊价值并缩短结算时间
        - 跟踪 Nium 活跃实时走廊集成数量，相比可接入网络总数
      - - 印度 UPI 月交易量达 13.4 billion 笔（2025 年 12 月）
        - 驱动
        - 结构性 — 已投入运行
        - APAC 走廊交易量机会；Nium 新加坡总部与印度监管环境相邻
        - 量化 Nium 印度入境 / 出境支付量
      - - FedNow 参与机构超过 900 家（美国，2025 年末）
        - 驱动
        - 2025-2027 年采用爬坡
        - 支持美国出境实时支付；扩大 Nium 美元走廊覆盖
        - 评估 Nium 的 FedNow 连接，以及任何 FedNow 专项客户赢单
      - - SEPA Instant 2024 年交易量 14.5 billion 笔（同比增长 54%）
        - 驱动
        - 结构性 — EU 监管要求在提速
        - 欧洲金融科技客户越来越需要 SEPA Instant；Nium 持有 FCA（英国）和 EU 支付牌照
        - 梳理 Brexit 后 Nium 的 EU 牌照覆盖，以及任何 SEPA Instant 集成状态
      - - 2028 年起 EU e-VAT 强制要求（影响 10M+ 家企业）
        - 驱动（监管）
        - 2026-2028 年准备阶段
        - 倒逼数字发票 + 支付集成；推高 SME 对 API 型 B2B 支付平台的需求
        - 评估 Nium 是否有 VAT 合规产品路线图
      - - 电商全球化和跨境 SME 供应商付款
        - 驱动
        - 结构性（5-10 年）
        - 拥有国际供应商的 SME 群体扩大；Nium 的嵌入式金融伙伴触达 SME
        - 持续跟踪 SME 与企业客户收入结构
      - - Visa B2B 虚拟卡交易量：同比增长 25%（FY2025）
        - 驱动
        - 持续推进
        - 卡越来越常用于 B2B 支出管理；Nium Embed 发卡直接受益
        - 索取 Nium Embed 在 FY2024-FY2025 的发卡量和增长率
      - - 40+ 法域 AML/KYC 监管碎片化
        - 约束
        - 持续 — Nium 进入新市场后继续叠加
        - 抬高每条走廊的合规成本；拖慢客户接入；需要大型合规团队
        - 索取合规 / 监管团队人数和支出，占总运营成本比例
      - - 新兴市场走廊 FX 波动
        - 约束
        - 持续 — 阶段性飙升
        - 高波动走廊利润率受压；存在暂停走廊的风险
        - 索取走廊级 P&L 和 FX 风险对冲政策
      - - 代理行网络收缩（tier-2 银行去风险化）
        - 驱动 + 约束
        - 结构性（10+ 年趋势）
        - 削弱传统竞争；也迫使 Nium 在更多市场维持直接结算关系
        - 梳理 Nium 的直接结算银行关系，相比依赖次级代理行的走廊
      - - 大额支付流中的网络安全风险
