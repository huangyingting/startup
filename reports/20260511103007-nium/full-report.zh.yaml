      - number: '8.2'
        title: 估值与可比公司分析
        blocks:
          - type: paragraph
            body: >-
              2024 年 6 月 Series E 轮融资时，Nium 的投前估值为 $1.4B。按 FY2024 收入 SGD 167.2M 计算（按 2024 年 6 月 SGD/USD 汇率约合 $124M），对应
              EV/Revenue 约 11.3x——高于上市跨境支付可比公司， 但符合高增长私营公司 IPO 前的折价定价惯例。

              B2B 跨境支付基础设施赛道的上市可比公司收入倍数更低，反映公开市场流动性折价、规模更大，以及部分公司盈利能力更强。 Payoneer（PAYO）约按收入 2.5–3.5x 交易；dLocal（DLO）约
              3.0–4.5x（从 2021 年 25x+ 峰值经历治理修正后）； Flywire（FLYW）约 3.5–5x；Wise（WISE.L）在 LSE 约 5–7x。Adyen 约按收入 10–15x
              交易，反映其规模、利润率和成熟地位， 但并不是 Nium 当前发展阶段的直接可比公司。

              Nium 相对这些上市同行的溢价有几项支撑：历史收入增速更高、牌照地域覆盖更广（190+ 个国家，相比 Payoneer 通道深度更有限）， 以及 IPO 前私募市场通常会给成长阶段公司更高定价。但收入增速从
              2.7x 降至 13.3% YoY，削弱了应得溢价；SGD 88.1M 亏损也说明，公司要拿到公开市场倍数，必须先证明经营杠杆。

              以 EV/Revenue 看，合理 IPO 定价区间应为 FY2025 前瞻收入的 8-12x。若 Nium 在 FY2025 实现 20% 收入增长（SGD 200M）， $1.4B 估值对应
              EV/Revenue 约 10x——放在 2026 年 IPO 市场中，对一家高增长、仍亏损的支付基础设施公司算合理。 若增速降至 10%，$1.4B 对应倍数约 11.5x；如果经营杠杆故事还没跑出来，IPO
              定价可能偏高。
