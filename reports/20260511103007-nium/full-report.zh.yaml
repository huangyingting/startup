  - number: 6
    title: 客户
    sections:
      - number: '6.1'
        title: 客户群体分层
        blocks:
          - type: paragraph
            body: >-
              Nium 的付费企业客户集中在四类：金融科技与嵌入式金融平台、差旅管理公司（TMCs）和航空公司、薪资与 HR 技术平台，以及需要向跨境卖家付款的市场平台 / 电商企业。在金融科技领域，Nium 的
              Transact 和 Receive 产品服务那些构建自身跨境支付产品的公司——本质上，Nium 成为品牌化金融科技体验背后的隐形基础设施层。Brex 使用 Nium Embed 进行多币种发卡；Paysend
              使用 Nium 的支付网络覆盖国际汇款通道。差旅领域，Nium 瞄准需要向 190 多个国家的航空公司、酒店和地面交通供应商进行多币种付款的 TMC 和
              OTA；在这个场景里，结算速度和通道深度是核心购买标准。薪资领域，Rippling 这类平台用 Nium 的基础设施，向没有本地银行关系市场的员工发放薪资。市场平台场景中，Nium
              通过虚拟账户让全球平台上的卖家以本币收款。

              地理上，Nium 的客户群分布全球，但可能集中在北美、欧洲、东南亚和印度——这些市场也是它牌照和通道覆盖较深的地方。Nium 的 Instarem
              消费者品牌服务个人汇款用户，主要覆盖南亚与东南亚之间的汇款；它在同一套监管牌照下运营，但产品界面独立。企业 B2B 与 Instarem 消费者两个板块面向不同买方画像，也有不同收入特征。

              大多数客户关系通过 API 集成建立——这是一个高摩擦的准入过程，包含客户实体的监管 KYB、技术集成和合规准入。这种准入成本天然形成留存护城河：客户完成集成后，除非服务明显变差，否则不太可能更换供应商。
