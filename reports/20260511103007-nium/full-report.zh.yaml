      - number: '2.4'
        title: 增长驱动因素与采用约束
        blocks:
          - type: paragraph
            body: >-
              一组结构性和监管顺风正在改造 B2B 支付市场，并且尤其利好 Nium 这类 API-native、多 rail 基础设施提供商。

              最重要的监管驱动因素是 ISO 20022 采用。BIS CPMI 一直与金融行业协作，协调跨境支付的 ISO 20022 数据要求； 到 2025 年，大多数全球支付系统已采用该标准。ISO 20022
              让更丰富的数据随支付同行——减少错误、支持直通式处理、 方便合规筛查——从而更容易搭建自动对账，并降低今天推高成本的人工介入。

              实时支付网络扩张是第二个超级驱动因素。到 2025-2026 年，全球已有 80 多个实时支付网络运行，年交易量预计到 2027 年达到 512 billion。India 的 UPI 到 2025 年 12
              月单月处理 13.4 billion 笔交易；Europe 的 SEPA Instant 2024 年处理 14.5 billion 笔交易，同比增长 54%。US FedNow 网络到 2025 年底已超过
              900 家 参与金融机构，RTP® 网络在 2025 年 2 月将单笔上限提高到 $10 million，扩大了更大 B2B 资金流的适用范围。

              电商全球化持续制造跨境供应商付款需求。Visa 的 B2B 虚拟卡交易量在 FY2025 同比增长 25%，说明企业更偏好 基于卡的 B2B 支出。EU 自 2028 年起实施的 e-VAT 要求将影响超过 10
              million 家企业，迫使数字发票和支付集成落地， 形成合规驱动的数字化浪潮。

              主要约束包括各司法辖区 AML/KYC 监管碎片化、新兴市场 corridor 的 FX 波动、高交易量支付流中的网络安全风险， 以及代理行网络收缩——随着 tier-2 和 tier-3
              市场银行退出，支付提供商必须维持直接清算关系。大型企业从既有银行 关系切换的成本很高，使完整 onboarding 的企业销售周期达到 6-18 个月。
