      - number: '6.6'
        title: 图表
        blocks:
          - type: callout
            title: 客户证明深度与声称规模不匹配
            body: >-
              Nium 声称其支付网络上有 285,000 多家企业，年交易量超过 $50B——但具名客户证明只有一个带高管引述的案例研究（KBank），再加上与 Brex、Paysend、Rippling
              的推断关系。没有客户披露归因于 Nium 的交易量，没有结果指标（成本节约、结算速度提升）被披露，也没有可公开访问的独立客户满意度数据（G2、Gartner Peer
              Insights）。投资人在完成任何交易前，应要求 5–10 家可背书的企业客户愿意接受访谈。客户证明深度是实质性尽调缺口。
            calloutType: risk
            claimRefs:
              - CU018
              - CU019
              - CU020
              - CU022
          - type: callout
            title: 净收入留存率是最重要的未知数
            body: >-
              对 Nium 这样的 B2B 支付基础设施公司而言，净收入留存率（NRR）是尚未公开披露的单一最重要指标。如果 NRR 高于 110%，Nium FY2024 的 13.3%
              收入增长意味着新客户获取有限——这是令人担心的信号。如果 NRR 低于 100%，新客户收入是在填补流失收入，而不是复利增长。如果 NRR 达到 120%+，即便表观增长偏慢，Nium
              的收入模型仍可支撑溢价估值。整个增长质量叙事都取决于 NRR；其未披露也因此成为本尽调报告中最关键的数据缺口。
            calloutType: insight
            claimRefs:
              - CU023
              - CU024
              - CU027
              - CU028
  - number: 7
    title: 风险
    sections:
      - number: '7.1'
        title: 监管与法律风险
        blocks:
          - type: paragraph
            body: >-
              Nium 持有覆盖 190 多个国家的 40 多张监管牌照——这既是其主要竞争护城河，也是最复杂的运营风险。每张牌照都附带持续资本充足率要求、定期监管检查、交易监控义务和 AML/CFT
              计划维护。主要市场牌照若被撤销（MAS Singapore、FCA UK 或大型 EU 司法辖区），后果将是灾难性的——受影响通道的跨境支付能力会立即失效。MAS Major Payment
              Institution 框架要求 Nium 维持最低流动资本储备，并遵守 Payment Services Act 2019。FCA Electronic Money Institution 授权要求 Nium
              UK 隔离客户资金，并遵守 Payment Services Regulations 2017。European Banking Authority（EBA）监管 EU 成员国的 EMI 框架合规；Brexit
              之后的护照机制安排意味着，Nium 必须维持单独的 EU 司法辖区牌照才能服务欧洲客户。

              印度 Enforcement Directorate（ED）依据 PMLA（Prevention of Money Laundering Act）对 Nium 的调查，是最重要的活跃法律风险。Kerala
              High Court 在 2025 年 9 月暂缓执法行动，但底层调查仍在进行。印度是重要支付通道——既是入境汇款的重要来源，也是向外 B2B 付款的重要市场。如果 Kerala HC 的暂缓执行被撤销，或 ED
              获得不利裁决，Nium 的印度业务可能被暂停或受到实质限制，影响 Instarem 消费者汇款业务，以及涉及印度交易对手方的 B2B 通道。这一法律不确定性也直接威胁计划中的美国
              IPO：美国承销商和机构投资人很可能要求印度 ED 案件在推进前得到解决，或被清晰隔离。

              FATF 的 40 Recommendations 定义了所有跨国支付服务提供商必须遵守的 AML/CFT 标准。任何司法辖区中不符合 FATF
              标准，都会带来执法行动、牌照暂停或代理行撤出风险；这些都会让受影响通道的支付处理失效。
            claimRefs:
              - CR001
              - CR002
              - CR003
              - CR004
              - CR005
              - CR007
              - CR008
