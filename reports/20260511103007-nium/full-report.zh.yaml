      - number: '1.4'
        title: 融资历史与资本结构
        blocks:
          - type: paragraph
            body: >
              Nium 在 11 轮融资中累计募资约 $312M，投资者 37 名，其中机构投资者 30 名、天使投资者 7 名。公司最重要的 融资事件是 2021 年 7 月的 Series D：Riverwood
              Capital 领投 $200M，Visa、Temasek、GIC、Vertex Ventures、 Atinum Group、Beacon Venture Capital 和 Rocket Capital
              参投，推动 Nium 成为 Southeast Asia 第一家 B2B 支付独角兽。该轮将 Nium 估值推至 $1 billion 以上。2022 年，公司又从 BOND、NewView Capital、
              Moore Capital 和 Tribe Capital 融资，峰值估值约 $2.0–2.1B。

              2024 年 6 月，Nium 完成 Series E，募资 $50M，由 Brunei Investment Agency（BIA）领投，投后估值 $1.4B——较 2022 年峰值有意下调约
              30%，管理层将其归因于公开市场 fintech 估值普遍压缩。CEO Nanu 表示： 「无论你以 $1 billion 还是 $5 billion 上市，都不重要。因为估值只有在你被收购，或完成 IPO
              时才算数。」 资金主要留给 M&A，用于收购 Africa、Middle East 和 Latin America 的成长阶段支付公司。2025 年 4 月， BIA 和 Endeavor 又完成一小笔 $2M
              的 Series E-II。至少自 Series C（2020 年 5 月）以来，Visa 一直与 Nium 保持战略投资关系。按 Tracxn 统计，累计股权融资约 $312M；若纳入全部
              tranche，部分来源引用 $335M+。 截至报告日，公司仍为私营，尚无已确认的公开市场上市。
