      - number: '8.6'
        title: 附录
        blocks:
          - type: callout
            title: $1.4B 估值合理但不便宜——上行空间要靠执行兑现
            body: >-
              以 $1.4B（2024 年 6 月 Series E）计算，Nium 定价约为 FY2024 收入 11x——高于上市可比公司 （Payoneer 2.5-3.5x；dLocal 3-4.5x；Flywire
              3.5-5x），但符合高增长支付基础设施公司 IPO 前私募市场惯例。 这个估值不便宜：它已经计入收入继续增长；如果同比增速明显跌破 10-15%，$1.4B 在 IPO 定价中会很难守住。 乐观情景回报（以
              $2.0-2.5B IPO 计为 1.4-1.8x）同时要求印度法律问题解决、增长重新加速——两个条件彼此独立， 且都不确定。投资人应按这种有条件上行来控制仓位。
            calloutType: insight
            claimRefs:
              - CV007
              - CV008
              - CV011
              - CV013
          - type: callout
            title: 印度 ED/PMLA 案件是最强估值约束
            body: >-
              印度 ED/PMLA 调查不只是法律风险，更是估值约束。美国承销商和机构 IPO 投资人推进前，会要求印度案件完全解决， 或在 S-1 披露中做充分风险隔离。若 Kerala HC 暂缓令在 IPO
              前被撤销，Nium 要么暂停印度业务，要么面临潜在 SEC 注册延迟，要么披露重大法律或有事项；这些都会显著压缩 IPO 定价。印度收入敞口（公开口径未测算）是关键未知数： 如果印度贡献超过 20%
              收入，反向裁决的财务影响就会达到投资逻辑失效级别。
            calloutType: risk
            claimRefs:
              - CV004
              - CV006
              - CV025
              - CV026
