      - number: '5.3'
        title: 开发者体验与集成
        blocks:
          - type: paragraph
            body: >-
              Nium 的开发者生态可通过 nium-global GitHub 组织访问，里面有语言专用 SDK、tax-service 工具（最后更新于 2024 年 12 月）和 unified-errors
              库（最后更新于 2024 年 8 月）等公开仓库。GitHub 活动显示 Nium 在集成上倾向开发者优先，但仓库数量和社区参与度相比 Stripe 或 Moov.io 这类纯开发者平台公司仍然有限。Nium 的
              REST API 设计遵循标准企业 API 惯例：JSON 载荷、基于 OAuth 的认证、用于重试安全的幂等键，以及异步支付事件的 webhook 通知。

              企业集成通常需要用于上线前测试的沙盒环境、多环境 API key 管理和合规准入（KYB）。Nium 的准入流程包含对客户实体的监管 KYB
              筛查，因此相比允许即时访问沙盒的开发者优先平台，摩擦更高。这是持牌支付基础设施的内生取舍：监管要求会加入验证步骤，而面向消费者的 API 平台不需要面对这些步骤。Moov.io 作为开源支付基础设施提供商，展示了
              Nium 在部分企业细分市场所竞争的开发者中心化一端。Rapyd 也提供类似的多币种 API 优先定位，并有重叠的通道覆盖。Adyen 的 B2B
              支付知识库确认，企业跨境支付需要多网络连接来优化成本——这也验证了 Nium 的架构方向。
