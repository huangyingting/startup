  - id: TM001
    title: 市场定义表
    description: >-
      Defines the market segments Nium competes in, distinguishing included from excluded spend, identifying who pays,
      and explaining relevance to Nium's business model.
    columns:
      - 细分 / 类别
      - 纳入支出
      - 排除支出
      - 买方 / 付款方
      - 与 Nium 的相关性
    rows:
      - - 全球 B2B 支付（总 TAM）
        - 企业对企业资金流：贸易结算、供应商发票、公司间转账、薪资、费用管理
        - 消费者支付、政府向居民转账、证券结算
        - 全球 10M+ 企业的 CFO、资金团队、AP/AR 部门
        - 完整 TAM 语境；Nium 服务该总量中跨境资金流的基础设施层
      - - 跨境 B2B 支付（核心 SAM）
        - 国际供应商付款、进出口结算、跨境薪资、FX 兑换、向企业账户实时汇款
        - 境内 B2B 支付；在 SEPA 门槛以下、传统轨道足够覆盖的欧盟内部支付
        - 跨国企业、拥有全球客户的金融科技公司、使用国际承包商的零工平台
        - Nium 价值最高的产品线（Nium Transact 出款 + Nium Receive 收款）；190+ 个国家
      - - 实时支付轨道（基础设施使能层）
        - 即时支付网络交易：FedNow、UPI、SEPA Instant、PayNow、PromptPay、Interac
        - 批量 ACH、存档卡支付、支票、加密货币投机
        - 企业金融科技公司、数字银行、嵌入实时支付能力的 PSP
        - Nium 实时通道网络（100+ 条即时通道）；支持当日付款
      - - 发卡与虚拟卡（B2B 支出管理）
        - 企业虚拟卡发行、差旅管理虚拟卡、B2B 采购卡、基于卡的费用管理
        - 消费者信用卡 / 借记卡、消费者预付卡
        - 企业采购团队、差旅管理公司、零工经济平台
        - Nium Embed 产品；在 34+ 个国家发卡；Ixaris 收购（2021 年）补上旅行垂直
      - - 嵌入式金融 / BaaS（相邻业务）
        - 白标支付账户、多币种钱包、面向非银行金融科技公司的 API 嵌入式支付流
        - 完整银行业务（存款、贷款、保险）、证券经纪
        - 嵌入金融服务的新银行、保险科技平台、市场平台运营商
        - Nium 的 BaaS 和 Nium Embed；增长中的相邻业务——尚非主要收入驱动
    notes: >-
      市场边界定义沿用 Mordor Intelligence（B2B 支付）和 Allied Market Research（跨境）。Nium 明确将消费者汇款排除在 B2B 战略之外，但保留 Instarem
      作为全资消费者子公司。单一司法辖区内的境内支付纳入 TAM，但对 Nium 主要是通过嵌入式金融伙伴触达的间接机会。
    claimRefs:
      - CM001
      - CM002
      - CM003
      - CM004
      - CM005
    enumeration: true
    enumerationScope:
      coverage: partial
      basis: >-
        Five primary segments covered represent Nium's core and adjacent addressable markets. Additional adjacent
        segments (e.g., FX hedging, trade finance, CBDC settlement) exist but are excluded as Nium has not entered them
        as of May 2026.
  - id: TM002
    title: TAM/SAM/SOM 或规模测算视角表
    description: >-
      Compares major analyst estimates of the B2B and cross-border payments market using different scopes,
      methodologies, and time horizons to provide a multi-lens sizing view.
    columns:
      - 发布方
      - 年份（基期→终期）
      - 地域
      - 数值 / CAGR
      - 方法论
      - 置信度
      - 局限
    rows:
      - - Mordor Intelligence
        - 2025→2031
        - 全球
        - $1.42T（2025）→ $3.43T（2031）；15.48% CAGR
        - 总 B2B 支付市场，包含境内、全部轨道、全部企业规模
        - 高——2026 年 2 月更新
        - 包含 Nium 并不主要覆盖的境内资金流；最宽口径 TAM
      - - Mordor Intelligence（跨境子细分）
        - 2025→2031
        - 全球
        - 16.52% CAGR（子细分增长率）
        - 总 B2B 支付市场中的跨境 B2B 资金流
        - 高——同一报告，2026 年 2 月
        - 公开摘要未单独拆出规模值；仅有 CAGR
      - - 机构：Allied Market Research
        - 2024→2034
        - 全球
        - $206.5B（2024）→ $414.6B（2034）；7.1% CAGR
        - 按渠道划分的跨境支付（B2B + B2C + C2C）：银行转账、MTO、卡、其他
        - 高——成熟研究机构
        - 包含非 B2B 资金流；口径是费用 / 收入市场，不是交易量
      - - Ripple（行业估计）
        - 2023→2032
        - 全球（仅 B2B 跨境）
        - $31.6T 交易量 → 2032 年 $50T（总增长约 58%）
        - 交易量（不是收入）；B2B 跨境总资金流
        - 中——供应商赞助估算；交易量不是费用
        - 交易量将收入机会夸大 100-200x；未披露方法论
      - - MarketsAndMarkets
        - 2023→2028
        - 全球
        - 到 2028 年达 $8.2B；14.3% CAGR
        - B2B 数字支付平台市场（仅软件 / 服务费）
        - 中 — 测算口径是所有估算中最窄的
        - 不含沉淀资金收益、FX 点差和网络接入费；最接近 Nium 的实际收入层
      - - McKinsey & Company
        - 2019 基线（历史）
        - 全球（所有跨境支付）
        - $130T 流量；$224B 收入；疫情前收入 CAGR 约 7%
        - 所有跨境支付收入，包括批发、零售、B2B、B2C
        - 高 — 老牌机构；2019 基线用于趋势背景
        - 基线过旧（2019 年）；未反映疫后加速
      - - Mordor Intelligence（APAC 子细分）
        - 2025→2031
        - 仅亚太
        - 17.42% CAGR — 全球区域中增速最快
        - 全球报告中的 APAC B2B 支付子细分
        - 高 — 同一份 2026 年 2 月更新报告
        - 仅限 APAC；北美尽管 CAGR 较低，仍持有 34.27% 市场份额
    notes: >-
      各项估算的绝对规模相差超过 150 倍，因为它们衡量的东西根本不同：B2B 支付总流水、跨境收费收入，或仅平台软件费。MarketsAndMarkets 约 $8.2B 的数字（平台费）最接近 Nium
      的实际收入模型，Mordor 的 $1.42T 则代表最宽的潜在可触达市场。投资人给 Nium 的核心 TAM 定量时，应采用跨境专项估算。
    claimRefs:
      - CM006
      - CM007
      - CM008
      - CM009
      - CM010
      - CM011
      - CM012
