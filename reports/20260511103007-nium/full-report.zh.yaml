      - number: '8.5'
        title: 尽调问题与投资逻辑失效触发条件
        blocks:
          - type: paragraph
            body: >-
              Nium 估值最关键的尽调问题是：（1）印度收入拆分（Instarem 消费业务 + B2B 通道）占 FY2024/FY2025 总收入的比例，用来量化印度 ED 案件风险的财务影响；（2）当前 MAS
              资本充足状况相对 MPS 最低要求的位置， 用来评估新加坡监管牌照框架下的烧钱速度风险；（3）FY2025 YTD 收入和增长率，用来判断收入放缓是在延续、企稳还是反转；
              （4）按客户队列拆分的净收入留存率（NRR），用来判断现有企业客户是在扩张还是流失；（5）IPO S-1 时间表和承销商委任状态。

              投资逻辑失效情景（即投资逻辑被推翻的条件）：（1）印度 ED/PMLA 暂缓令被撤销，印度业务暂停——总可用市场（TAM） 缩小并触发 IPO 延期，迫使公司以压缩估值融资过桥；（2）FY2025
              收入同比下滑——意味着市场饱和或大客户流失，且 IPO 前无法扭转；（3）CEO 在 IPO 前离任——这是会引发机构投资人不确定性的信号事件，并可能迫使 IPO 延期； （4）IPO 定价低于
              $1.0B——Series E 投资人的回报情景不可接受；（5）MAS 或 FCA 牌照被撤销——对 B2B 平台构成生存威胁。
            claimRefs:
