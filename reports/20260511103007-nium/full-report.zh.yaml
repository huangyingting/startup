            title: 收入增长减速给 IPO 论证发出结构性警报
            body: >-
              Nium 的收入增长从 FY2022 的 2.7×（净收入 USD 82M，同比 2.7×）降至 FY2024 的 13.3%（SGD 167.2M）。这不只是基数效应下的正常化：Wise 最近一个财年同比增长
              24%，同时实现盈利；Payoneer FY2024 收入为 $961M（同比 +15%），并已持续盈利。一家公司若想在 2026 年末赴美 IPO，并在当前 $1.4B Series E
              价格之上获得隐含估值溢价，投资人会要求证明其年增速能够重新加速至 25% 以上。管理层必须解释 13.3%
              增长究竟来自通道饱和、竞争性降价压力、有意牺牲交易量换质量，还是临时季节因素。没有这个解释，承销商很难在当前私募市场价格之上构建可信的 IPO 估值。
