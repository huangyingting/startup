      - number: '1.2'
        title: 创立历程与公司演进
        blocks:
          - type: paragraph
            body: >
              Nium 由 Prajit Nanu 和 Michael Bermingham 于 2014 年在 Singapore 创立，最初名为 Instarem， 是「Instant Remittance」的缩写。平台于
              2015 年 8 月在 Australia 上线，并提交第一张牌照申请， 目标是提供透明、低成本的消费者跨境汇款。2016 年，公司处理第一笔机构批量付款请求，B2B 转型由此自然发生： 相比 $800
              billion 的消费者汇款市场，$60 trillion 的 B2B 支付机会被暴露出来。Nanu 将这一刻称为 转折点：「我们想打造支付系统里的
              McDonald's——标准化、一致，让世界任何地方的人都能在它之上构建产品。」

              Pratik Gandhi 是最早的本地员工之一（2016 年加入），2021 年被提升为联合创始人，但在 2023 年 10 月离职； 同期离开的还有 Chief Product Officer，公司也首次裁撤
              10% 员工。2019 年，公司在推出 B2B 平台时更名为 Nium，同时保留 Instarem 作为消费者服务。三次收购塑造了公司的能力边界：Ixaris（London 旅游虚拟卡平台，
              2021）、Wirecard Forex India（Indian 支付业务，2021）和 SoCash（Singapore 替代支付网络，2022 年 4 月）。到 2022 年，Nium 报告净收入 SGD
              117M，同比增长 2.7x，成为 Singapore 第一家专注支付、收入运行率 达到 $100M+ 里程碑的全球 fintech。2023 年 7 月，Nium 在 Capital Tower 启用新的
              Singapore 总部， Deputy Prime Minister Heng Swee Keat 主持仪式，显示出公司对 Singapore fintech 生态的重要性。
