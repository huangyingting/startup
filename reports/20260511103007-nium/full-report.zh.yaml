      - number: '5.4'
        title: 信任、合规与可靠性
        blocks:
          - type: paragraph
            body: >-
              Nium 的合规架构围绕 40 多张监管牌照搭建，这是其平台中资本最密集、运营最复杂的部分。这些牌照包括新加坡 MAS Major Payment Institution 授权、英国 FCA Electronic
              Money Institution 授权，以及欧洲、亚太、美洲和非洲的同类授权。每张牌照都附带最低资本充足率要求、交易监控义务、AML/CFT 计划维护和定期监管检查。Nium 的合规引擎在支付 API
              内嵌在线筛查——AML、KYC/KYB、OFAC 制裁、PEP 检查——让合规发生在交易层面，而不是另起一个批处理流程。

              BIS CPMI 研究（D215）记录了跨境支付基础设施互操作性的标准，并把合规和信任列为跨境支付增长的关键使能因素。Nium 将合规嵌入 API
              层，而不是把它作为独立服务暴露出来，这是实质性的技术和运营差异点。Nium 尚未公开披露 API 可用性 SLA、事故历史或响应时间基准等可靠性指标。一家公司若要服务有高量、时效性支付流的企业客户，未发布 SLA
              就是尽调缺口。规模化支付基础设施提供商通常承诺 99.99% 以上可用性；从公开数据无法判断 Nium 的承诺水平。截至 2026 年，媒体报道中没有记录重大公开安全漏洞或 API 中断。
