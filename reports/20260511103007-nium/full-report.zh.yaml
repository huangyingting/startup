      - number: '5.6'
        title: 图表
        blocks:
          - type: callout
            title: Nium 的护城河是监管牌照，不是专有代码
            body: >-
              Nium 的技术差异化并不主要来自软件。与 Stripe（PCI 认证的开发者体验、丰富文档、强品牌）或 Adyen（深度卡组织关系和全渠道覆盖）等 API 优先同行不同，Nium 的竞争护城河来自其覆盖 190
              多个国家的 40 多张监管牌照，再叠加实时通道网络和 Visa/Mastercard 发卡触达。复制这套牌照栈需要 3–7 年，并且每个司法辖区都要投入数千万美元。不过，这也意味着 Nium
              的护城河资本密集、依赖合规，而不是受软件知识产权保护——面对 Airwallex、Currencycloud 等资金充足、正积极扩展自身牌照版图的竞争者，脆弱性仍在。
            calloutType: insight
            claimRefs:
              - CE013
              - CE028
              - CE039
          - type: callout
            title: 未披露可用性 SLA 和 PCI 状态，阻断企业信任信号
            body: >-
              企业支付买家在通过任何基础设施提供商部署高量卡或支付流之前，需要公开的 SLA 承诺（通常为 99.99%+ 可用性）和 PCI DSS Level 1 认证。Nium
              尚未在可公开访问的文档中发布这两项信息。虽然没有公开事故说明运营可能稳定，但投资人和进行尽调的企业潜在客户应要求提供：（1）Nium 过去 12 个月的可用性记录；（2）Master Service
              Agreement 中的 SLA 条款；（3）由 Qualified Security Assessor 出具的当前 PCI DSS Attestation of
              Compliance（AOC）副本。这些都是企业支付基础设施采购的基础文件。
