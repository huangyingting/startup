      - number: '3.4'
        title: 切换成本与多供应商并用动态
        blocks:
          - type: paragraph
            body: >-
              B2B 支付基础设施客户一旦完成集成，就面临中高切换成本，但也常常同时使用两到三家提供商。API 集成是锁定效应的主要来源：
              为新提供商重建支付路由逻辑、合规工作流和对账系统，企业客户通常需要三到九个月工程投入。Nium 自有合规 onboarding 覆盖 40+ 个监管司法辖区的 KYC、AML
              和制裁筛查；客户若切到监管牌照更窄的提供商，还会承担额外合规迁移成本。

              不过，在企业支付基础设施里，多供应商并用是常态而非例外。企业 fintech 客户经常在特定 corridor（例如 APAC 实时 payout） 使用 Nium，同时在其他 corridor 使用
              Airwallex 或 Wise Platform。这降低了既有提供商的流失风险，但也限制了 Nium 在单一 客户关系中的 wallet share。按 PYMNTS，Nium 每月有 285,000+
              家企业使用其实时支付网络，这说明核心企业细分之外还有长尾小客户； 由于小企业缺乏维护多套集成的工程资源，这类关系更粘。

              Nium 的供给侧锁定来自监管牌照：想复制 Nium 的 40+ 张牌照组合，竞争者需要三到五年时间，并在多个司法辖区投入数千万合规资金。 Currencycloud 被 Visa 收购后，可借助 Visa
              既有金融机构关系加快牌照获取，降低了该竞争者的进入壁垒。Airwallex 自 2019 年起 一直在主动搭建自己的监管牌照组合，但尚未披露可比的牌照数量。
            claimRefs:
              - CP026
              - CP027
              - CP028
              - CP029
              - CP030
      - number: '3.5'
        title: 护城河耐久性与竞争风险评估
        blocks:
          - type: paragraph
            body: >-
              Nium 的三项主要护城河主张——地理覆盖（190+ 个国家）、监管牌照（40+ 张）和实时 corridor 深度（100+ 条）——在两到三年周期内
              都具备耐久性，但边际上竞争正在加剧。监管牌照护城河最可防守：打造 40+ 张牌照需要司法辖区专业能力、资本和时间，无法走捷径。 Airwallex
              的牌照建设已耗时七年以上，覆盖司法辖区仍更少。Currencycloud/Visa 受益于 Visa 既有监管关系，但也受 Visa 战略约束。

              主要商品化风险在 FX 费率压缩。更多玩家进入 SWIFT 替代 corridor 市场后，FX spread 利润率会下降。Nium FY2024 约 $125M 收入、 $50B+ 交易量意味着
              blended take rate 约 0.25%，已经接近基础设施提供商的压缩下限。若想在 take-rate 不继续压缩的情况下增长， Nium
              需要把产品组合转向发卡、嵌入式金融和增值合规服务，这些产品利润率更高。

              截至 2026 年，最不利的竞争进展是 Airwallex 的快速融资轨迹（估值 $5.6B vs. Nium 的 $1.4B），这给 Airwallex 带来约四倍的
              隐含资本，用于加速牌照、产品开发和销售——在 Nium 计划 2026 年 IPO 之前，可能威胁其增长势头。Nium 的 India ED/PMLA 监管案件 （Kerala HC 于 2025 年 9
              月中止）也带来声誉风险，可能拖慢新司法辖区的监管批准。
