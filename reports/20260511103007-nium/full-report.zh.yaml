      - number: '2.5'
        title: 市场展望与 Nium 定位
        blocks:
          - type: paragraph
            body: >-
              全球 B2B 支付市场正接近拐点。传统代理行——每笔跨境交易要经过 3-5 家中介银行、增加 1-5 个工作日并层层叠加费用—— 正被直接实时 rails、API-native 平台以及越来越多的数字资产清算
              corridor 取代。McKinsey 2020 年 Global Payments Report 记录，2019 年跨境支付总额为 $130 trillion，产生 $224 billion 收入；COVID
              扰动前， 全球支付收入每年约增长 7%。COVID 后数字化加速了这些趋势。

              Ripple 行业分析估计，B2B 跨境支付市场最近已达到 $31.6 trillion 的交易量（不是费用收入），预计到 2032 年 增长 58% 至 $50
              trillion。交易量增长叠加技术替代代理行中介带来的结构性费率压缩，形成以量换价的权衡， 利好有规模、低成本的基础设施提供商。

              SWIFT 的全球金融报文网络连接超过 11,000 家金融机构，历史上主导国际支付报文。SWIFT gpi 目前在许多 corridor 支持同日清算，但 SWIFT 仍是报文标准而非清算
              rail——这意味着流动性仍必须放在代理行账户中。像 Nium 这样在各国预先为本地钱包注资的实时 API 平台，是去除预注资摩擦的结构性替代方案。

              Nium 年交易量 $50 billion+（2026 年 2 月宣布）、190+ 个国家覆盖和 40+ 张监管牌照，在跨境基础设施层构成了 有意义的护城河。2025 年 11 月，Visa 与 Nium 开展
              USDC stablecoin 清算试点，指向下一阶段演进：数字资产 rails 可能在部分 corridor 取代预注资 fiat 钱包，进一步压低清算成本。

              区域增长动态利好 Nium：APAC——Nium 的本土区域——是增长最快的区域，CAGR 为 17.42%，由 Southeast Asian 电商和 India UPI 生态驱动。按 Allied
              Market Research，LAMEA（Latin America, Middle East, Africa）是跨境细分中 增长最快的区域，Nium 也一直在扩展该地区覆盖。
