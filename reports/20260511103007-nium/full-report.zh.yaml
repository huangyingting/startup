              总资金流）不等，跨度达 170×。这不是统计噪声，而是真实分歧：究竟衡量总交易额、 费用收入还是平台软件费，是否纳入本地支付。用 TAM 支撑 Nium 估值的投资者必须说明使用哪一种指标。给 Nium 定价时，
