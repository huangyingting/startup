              Nium FY2024 的 SGD 804.5M 总资产，主要由 MAS Payment Services Act 和 FCA Electronic Money Regulations
              要求下以信托方式隔离的客户资金构成。这些余额不能用于一般公司用途，流动性分析应将其排除。真实运营现金——累计股权融资扣除累计亏损和监管资本占用——可能在 SGD 70–110M
              区间，显著低于总资产数字给人的印象。尽调必须完整走查资产负债表，区分受限监管资本、隔离客户备付金、运营银行余额，以及任何信贷额度或或有负债。
