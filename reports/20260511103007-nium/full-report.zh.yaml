chapters:
  - number: 1
    title: 公司概况
    sections:
      - number: '1.1'
        title: 公司身份与商业模式
        blocks:
          - type: paragraph
            body: >
              Nium 是一家私营 B2B 金融基础设施公司，总部设在 Singapore 和 San Francisco, California 两地。 公司面向银行、fintech
              和企业运营领先的实时跨境支付平台，让客户通过一次 API 集成，即可在跨境场景中 即时收款、换汇和付款。Nium 的产品套件分为四条主线：向 190+ 个国家、100+ 种货币跨境付款（其中 100+
              个国家支持实时到账）、在 40+ 个市场收款和本地资金归集、在 34+ 个国家发行实体卡与虚拟卡，以及 嵌入式金融 / 银行即服务（BaaS）能力。

              公司使用 Nium 品牌运营，同时保留 Instarem 作为全资消费者汇款子公司。Nium 的核心商业模式按交易收费， 对处理的支付量收取基点（bps），并辅以企业基础设施访问的 SaaS 费用。截至 2026
              年 2 月，公司宣布年交易量 已超过 $50 billion。Nium 在 40 多个国家持有监管牌照和授权，包括 MAS（Singapore）、FCA（UK）、 ASIC（Australia）以及覆盖
              United States 的 FINCEN / 州级 MSB 牌照，使其成为全球牌照覆盖最广的 金融科技基础设施提供商之一。公司称使命是「打造第一个全球实时支付基础设施」，愿景是「让资金即时流向每个人、
              每个地方」。
