      - number: '8.4'
        title: 退出准备度与 IPO 时间表
        blocks:
          - type: paragraph
            body: >-
              Nium 的 IPO 准备已经在推进。CFO Andre Mancl 于 2024 年 8 月到任，加上 CCO 任命，说明公司在搭建 IPO 就绪所需的基础设施。Nium 2024
              年末迁入新加坡新总部，也释放出组织层面投入 IPO 流程的信号。公司已通过多家媒体公开指向 2026 年末赴美上市目标。Visa 合作以及 USDC 稳定币试点（2025 年 11
              月）支撑了「新一代支付基础设施」的 IPO 叙事。

              IPO 落地的关键里程碑包括：（1）提交 SEC S-1 注册声明，通常在定价前 6-12 个月；（2）FY2024 和 FY2025 财务报表完成符合 PCAOB 的审计；（3）印度 ED/PMLA
              案件解决，或在披露中隔离风险；（4）宣布承销商委任； （5）IPO 路演。若公司目标在 H2 2026 定价，S-1 应在 Q2 2026 前提交。

              稀释风险：Series A-E 累计融资 $312M，投资人超过 40 家，股权结构表会很复杂。多轮风险投资留下的优先权包袱 （清算优先权、反稀释条款）可能在 IPO 定价时制造张力，尤其是 IPO
              定价等于或低于 $1.4B Series E 投后估值时。 公开市场投资人应核实 IPO 新股募集资金是进入公司（增长资本），还是流向老股卖方（现有投资人流动性）。
            claimRefs:
