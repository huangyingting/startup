            body: >-
              Nium FY2024 净亏损 SGD 88.1M，收入增长从 FY2022 的 2.7x 降至 13.3%，估值也从 $2.1B 压缩到 $1.4B，这构成了艰难的 IPO 前背景。如果公司无法在 IPO
              S-1 中证明可信的盈利路径，美国机构投资人会以大幅低于当前 $1.4B 私募估值的价格给流通股定价。CFO（Andre Mancl，2024 年 8 月加入）必须在处理印度法律阴影的同时管理这个叙事。成功
              IPO 的窗口在 2026 年；如果宏观环境恶化，或印度案件升级，现实中最早的窗口会变成 2027 年——这意味着公司需要桥融资，或以可能进一步压缩的估值补充股权。
