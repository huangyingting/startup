          - type: callout
            title: 国家数量已不再是差异化，corridor 速度才是
            body: >-
              三家竞争者（Wise、Payoneer、Currencycloud）已经匹配或接近 Nium 的 190 国覆盖。差异化指标已从国家数量转向实时 corridor 深度： 其中多少国家支持即时清算，而不是批处理或
              SWIFT fallback。Nium 的 100+ 即时 corridor——包括 Canada（Interac，2025）、 Southeast Asian 即时网络和 India UPI
              等新兴市场新增项——比单纯国家数量更可防守。想复制这一点的竞争者，要么在每条 corridor 建立本地银行关系，要么收购已有 rail access 的公司；两条路都不快，也不便宜。
