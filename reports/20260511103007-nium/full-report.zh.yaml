      - number: '1.3'
        title: 领导团队与治理
        blocks:
          - type: paragraph
            body: >
              Nium 创立以来，领导团队经历了明显演变。Prajit Nanu 仍担任联合创始人兼 CEO，带领公司从消费者汇款起步， 完成 B2B 转型、跻身独角兽，并推进中的 IPO 准备。另一位原始联合创始人
              Michael Bermingham 仍保持领导层 存在感，但其当前运营头衔已随时间变化（Wikipedia 将其列为 COO，而公司较新的公开材料未明确引用其头衔）。 截至 2026 年 2 月，执行委员会包括
              Andre Mancl（CFO，2024 年中任命）、Anupam Pahuja （Chief Revenue Officer）、Alex Johnson（Chief Payments
              Officer）、Spencer Hanlon （Chief Operations Officer）和 Rissy Ruddy（Chief Human Resources Officer）。

              2026 年 2 月，Nium 宣布三项新的 C-suite 任命，聚焦 AI、stablecoin 与可编程货币交汇处的下一阶段增长： Sekhar Cidambi 出任 Chief Technology
              Officer（曾任职 Coinbase、Visa、FIS、Amazon 和 Symantec）， Danielle Gotkis 出任 Chief Marketing Officer（曾任职
              dLocal、Recurly、Feedzai），Amaresh Mohan 出任 Chief Risk and Compliance Officer（曾任职 Stripe、PayPal 和 GoTo）。董事会包括
              Riverwood Capital、 Visa、GIC 等主要机构投资者代表，以及 2022 年 10 月任命的独立董事 Huey Lin（GGV Capital）和 David Yates （Siris
              Capital Group）。关键人风险集中在 CEO Prajit Nanu 身上；他的愿景、人脉和公众形象是公司身份和 投资者信心的核心。
