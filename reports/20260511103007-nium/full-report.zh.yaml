      - number: '4.2'
        title: 销售效率与 unit economics
        blocks:
          - type: paragraph
            body: >-
              Nium 的 go-to-market 面向企业买方——旅行管理公司、薪资平台、数字银行和 marketplace——通过企业直销推进，并由 API 开发者文档和 集成支持配合。公司披露，截至 2026
              年，每月有 285,000+ 家企业使用其实时支付网络，但不清楚其中有多少是直接企业 API 客户， 又有多少是通过使用 Nium rails 的中介间接交易。获客成本和回本周期未公开，无法独立评估 unit
              economics 或 LTV:CAC 比率。 净留存率（NRR）——衡量企业客户群内扩张的主要 proxy——也未披露，不过 FY2024 同比 13.3% 的收入增长很可能同时包含既有客户的价格和
              交易量因素。

              毛利率是最重要的未披露指标。对跨境支付基础设施提供商而言，在扣除网络费用、FX 对冲成本和支付处理费用后，收入层面的毛利率通常在 40% 到 60% 之间。KPMG 对实时支付的分析显示，年交易笔数超过
              500M+ 后，实时支付利润率才会在结构上转正。没有 Nium 的交易笔数 （不同于交易金额），很难判断公司是否已跨过这一门槛。FY2024 净亏损 SGD 88.1M、收入 SGD 167.2M，对应亏损 /
              收入比约 53%， 相比 Wise（FY2023 已实现经营利润转正）和 Payoneer（自 2023 年起盈利）等接近盈亏平衡的竞争者偏高。用年度净亏损除以十二得到的 估计月度烧钱速度为 SGD
              7–8M，只是粗略 proxy，混合了非现金项目和真实现金消耗；仍需现金流量表来细化估计。
