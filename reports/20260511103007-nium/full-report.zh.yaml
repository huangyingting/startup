      - number: '4.5'
        title: 财务结论与尽调缺口
        blocks:
          - type: paragraph
            body: >-
              Nium 计划在 2026 年末赴美 IPO，但其财务画像喜忧参半。收入增长已经明确从高速增长（FY2022 为 2.7×）降到低双位数扩张（FY2024 为 13.3%），亏损 / 收入比仍高达约
              53%。全球跨境 B2B 支付市场到 2027 年仍以 10% 以上 CAGR 增长，Worldpay 2026 Global Payments Report 也把跨境支付列为全球增长最快的细分领域之一。Nium
              所在市场具备结构性增长，但收入减速说明核心通道可能趋于饱和、竞争者压价，也可能是内部执行问题。Statista 数据显示 B2B 数字支付市场仍在扩张，构成顺风；但在公开市场投资人愿意给出溢价估值前，Nium
              必须明显重新提速。

              新加坡支持金融科技的监管环境——MAS 监管沙盒、补贴，以及 Payment Services Act 框架——给 Nium
              提供了有利的本土市场背景，但不会直接改善单位经济性。五个财务缺口构成阻断性尽调事项：按业务流拆分的毛利率（判断单位经济性）、CAC 与回本周期（评估销售效率）、按通道或地理区域拆分的收入（判断集中度风险）、NRR
              与客户流失率（预测收入韧性）、月度现金流实绩（确认真实烧钱速度和跑道）。按当前私营公司惯例，这些数据都不会公开披露，但任何 IPO 或成长股权投资论证在承销 / 投资前，都必须在数据室里解决这些问题。
