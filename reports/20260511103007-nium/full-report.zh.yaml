      - number: '6.2'
        title: 采用度与增长轨迹
        blocks:
          - type: paragraph
            body: >-
              Nium 公开披露的增长指标主要是交易量口径：年交易量超过 $50B（2026 年 2 月），以及每月实时支付网络上的企业超过 285,000 家。收入从 SGD 43.9M（FY2021，约 USD
              32M）增长到 USD 82M（FY2022）——对应 FY2022 同比 2.7× 增长。FY2024 收入达到 SGD 167.2M（同比 +13.3%），说明公司已从 FY2022
              的高速增长期，转向更可持续的企业级增长。$50B 交易量对应 SGD 167.2M 收入，隐含平均抽成率约 0.25%，与批发型 B2B 支付基础设施定价相符。

              Nium 每月 285,000 多家企业的口径很宽，并未区分付费企业 API 客户、低量偶发用户，以及通过 Instarem
              消费者网络完成交易的企业。公司没有披露设置最低交易门槛后的付费客户数，因此无法从公开数据估算单客平均收入（ARPU），也无法评估客户集中度风险。FY2024 的 13.3% 收入增速说明增长仍然稳健，但低于
              B2B 金融科技获得溢价倍数通常需要的「高速增长」门槛；这也与 Nium 估值从 $2.0–2.1B 峰值（2022 年）压缩到 $1.4B（Series E，2024 年 6 月）相一致。

              新客户获取指标——CAC、回本周期、销售周期长度——均未公开披露。考虑到企业 API 销售的复杂度（KYB、法律、技术集成），中端市场客户的销售周期可能为 3–9 个月，企业大客户会更长。
