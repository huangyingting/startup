      - number: '6.5'
        title: 扩张与集中度风险
        blocks:
          - type: paragraph
            body: >-
              Nium 的「先落地、再扩张」模式靠既有企业客户内部的支付量增长来运转：Nium 客户自身业务增长后，会通过 Nium 基础设施处理更多交易量，在不增加额外 CAC 的情况下带来收入增长。这种交易量扩张，是
              Nium 有机收入增长的主要来源，也是支付基础设施提供商的常见模式。企业销售扩张还会沿着「产品足迹扩张」路径推进——从 Transact（付款）起步的 TMC 客户，日后可能增加 Receive（虚拟账户）或
              Embed（发卡）。

              客户集中度风险未知：Nium 没有披露前 5 大或前 10 大客户贡献了多少收入。对于一家交易量 $50B、收入 SGD 167.2M 的公司，交易量中相当大一部分很可能来自少数高量企业客户（薪资平台、大型
              TMC，或处理数十亿美元支付的金融科技平台）。如果前 5 大客户贡献 40% 以上收入，流失单一客户就会造成实质影响。这是标准企业 B2B 风险，但 Nium 没有在公开传播中回应。

              合作伙伴渠道依赖也未披露。Nium 主要做直销，但部分通道和地区可能依赖本地银行伙伴、代理行或转售关系。这些伙伴关系一旦受扰，可能影响特定通道的服务质量。印度 ED/PMLA 法律案件（Kerala HC 截至
              2025 年 9 月作出暂缓执行）若升级，可能影响 Nium 与印度相关的客户关系。
            claimRefs:
              - CU030
              - CU031
              - CU032
              - CU033
              - CU034
