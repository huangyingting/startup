      - number: '7.4'
        title: 人员与执行风险
        blocks:
          - type: paragraph
            body: >-
              CEO Prajit Nanu 是 Nium 的联合创始人，也是最显眼的公众面孔；如果他离开，对投资人、企业客户和 IPO 进程都会是重大信号风险事件。2024 年高管团队扩充（CFO Andre Mancl、新
              CCO）引入有经验的财务和合规负责人，降低了关键人依赖，但公司身份仍与创始 CEO 紧密绑定。

              2023 年 10 月约 10% 的裁员带来员工士气风险。Teamblind
              评论和员工情绪信号显示，组织内部分层级对工作文化、增长轨迹和管理层透明度存在担忧——不过这些信号只是方向性，并非统计上确定。工程和合规人才留存对 Nium
              很关键；在新加坡竞争激烈的金融科技招聘市场，DBS、Grab、Sea Limited 和 Revolut 都在争夺同一批工程和风险管理人才。

              计划在美国交易所 IPO 本身就是重大执行风险：公司需要达到 SEC S-1 披露标准，在印度 ED/PMLA 案件未解决的情况下通过美国承销商尽调，并把 IPO 定价在当前 $1.4B
              估值或以上，这要求收入持续增长，并拿出通往盈利的证据。2024 年估值从 $2.1B（峰值）压缩到 $1.4B（Series E），说明投资人已经下调增长溢价；IPO
              必须证明可信的盈利路线图，否则估值可能进一步压缩。
