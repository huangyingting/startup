      - number: '7.5'
        title: 缓释因素与杀死论证的条件
        blocks:
          - type: paragraph
            body: >-
              Nium 的主要风险缓释来自结构本身：40 多张牌照构成高进入壁垒，即使面对竞争压力，也能保护既有业务；API
              集成切换成本形成可防守的客户留存；多元地理牌照足迹意味着单一司法辖区的监管行动不会让整个平台失效。Kerala HC 对印度 ED/PMLA 案件作出的暂缓执行是有意义的短期缓释，但不是永久解决方案。

              CFO 任命（Andre Mancl，2024 年 8 月）和 CCO 任命显示，公司在为 IPO 披露和合规要求做准备。Visa USDC 稳定币试点让 Nium
              成为下一代支付网络发展的参与者，而不是被动既有玩家。ISO 20022 迁移合规虽然运营压力大，但所有市场参与者都在同时执行——这不是 Nium 独有的不利因素。

              会触发重新评估投资的破题场景包括：（1）MAS 或 FCA 牌照被撤销或暂停；（2）印度 ED/PMLA 法律案件导致印度业务暂停；（3）收入同比下降（不只是减速）；（4）流失一家收入占比超过 15% 的前 3
              大企业客户；（5）CEO 在 IPO 前离职；（6）IPO 失败（撤回，或定价低于 $1.0B 估值）。这些场景目前并非预期结果，但它们是投资论证失效的具体条件。
