      - number: '6.4'
        title: 留存与韧性
        blocks:
          - type: paragraph
            body: >-
              Nium 没有公开净收入留存率（NRR）、毛收入留存率（GRR）、年度流失率或队列级数据。对 B2B
              支付基础设施提供商而言，这些是判断业务质量最关键的指标——它们决定收入增长来自获取新客户（昂贵），还是来自既有客户扩张（资本效率更高）。

              结构性因素显示 Nium 的企业板块留存可能较高：API 集成要投入数月，形成高切换成本；监管合规依赖会嵌入客户流程（Nium 的 KYB、AML 和合规栈常常在客户工作流中）；多通道依赖意味着替换 Nium
              需要重新谈判多个通道专属关系。具有类似市场地位的 B2B 支付基础设施提供商（Adyen、被 Visa 收购前的 Currencycloud）历史上曾报告 NRR 高于
              100%——主要由客户交易量增长推动，而不是涨价。

              留存的负面信号包括：Nium FY2024 收入增速从 FY2022 的 2.7× 降至 13.3%，说明客户流失可能抵消了新客户收入，也可能是既有客户交易量增长放慢。2023 年 10 月约 10%
              的裁员，可能指向客户流失或销售管线放缓。没有披露 NRR，就无法区分这些情形。Instarem 的消费者留存很可能低于 B2B 企业留存，因为个人消费者会比较汇率，并且可在单笔交易上切换服务商，没有集成成本。
