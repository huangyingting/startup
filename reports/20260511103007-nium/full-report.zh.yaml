  - number: 8
    title: 估值
    sections:
      - number: '8.1'
        title: 投资论证与反论证
        blocks:
          - type: paragraph
            body: >-
              Nium 的投资论证建立在三根支柱上：（1）B2B 跨境支付存在结构性市场机会，预计到 2033 年交易价值达到 $4.4 万亿，CAGR 为 7.7%；（2）Nium 覆盖 190 多个国家的 40
              多张牌照栈，耗费多年和 $312M 资本搭建，形成持久进入壁垒；（3）API 优先架构，每月 RTP 网络上有 285,000+ 家企业，带来切换成本防御力，并形成不断增长的交易量基础（截至 2026 年 2
              月，年交易量 $50B+）。公司目标在 2026 年末赴美 IPO，为持续增长提供流动性和资本；Visa USDC 试点也让 Nium 参与到下一代支付基础设施层。

              反论证同样有力：收入增长从 FY2022 的 2.7x 急剧降至 FY2024 的 13.3%，亏损则扩大到 SGD 88.1M——53% 的亏损率说明，商业模式还需要显著更大规模，才能产生正经营性现金流。印度
              ED/PMLA 调查（Kerala HC 于 2025 年 9 月暂缓执行）是后果最重的法律风险，可能阻止或推迟美国 IPO。当前 $1.4B 估值约为收入的
              11x，已经计入溢价增长故事；一旦条件恶化，安全边际有限。

              建议是有条件持有 / 观察：Nium 在大型结构性市场中位置较好，且具备可防守的知识产权，但 IPO
              前风险画像（印度法律阴影、烧钱速度、增长减速）要求持续主动跟踪。若印度法律程序得到解决或完成风险隔离、FY2025 收入增速重新超过 20%、IPO S-1 提交且没有新的重大法律披露，投资确信度应上升。
