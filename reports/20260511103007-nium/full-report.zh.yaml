      - number: '5.2'
        title: 技术与运营架构
        blocks:
          - type: paragraph
            body: >-
              Nium 的技术栈以多层支付基础设施平台运转。客户接口层通过带有 OpenAPI 兼容文档的 REST API，以一致接口暴露付款发起、账户管理、合规状态和结算查询。Webhooks
              负责支付状态变化的异步事件通知。业务逻辑层承载 Nium
              的外汇引擎、多网络路由智能、合规编排和账本管理。外汇引擎在付款时实时计算汇率，拉取银行间中间价，加上点差后向客户展示锁定汇率。路由引擎则按通道可用性、结算速度和成本，为每笔交易选择最优支付网络——SWIFT、本地
              ACH、即时网络或稳定币。

              网络连接层上，Nium 持有 SWIFT 报文访问能力，并接入 100 多条本地实时支付网络，包括 UPI（印度）、FAST（新加坡）、PayNow（新加坡）、UK Faster
              Payments，以及亚太、欧洲和美洲的同类系统。结算与数据层处理多币种账本对账、备付金管理和监管报告。合规层对每笔交易执行在线 AML/CFT 筛查、KYC/KYB 验证和 OFAC 制裁检查。Nium
              没有公开披露具体云服务商、数据库技术和编程语言栈。从 nium-global GitHub 组织看，SDK 覆盖 Java、Node.js、Python 和 PHP
              等多种语言，说明其开发方式偏多语言，且符合云原生实践。全球支付网络正推进 ISO 20022 迁移；随着 SWIFT 和区域支付网络在 2025-2026 年完成迁移，Nium 的架构必须支持持续演进的报文格式。
