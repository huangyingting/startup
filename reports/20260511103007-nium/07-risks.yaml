  evidenceGaps:
    - topic: "India corridor revenue as percentage of total revenue"
      type: private-evidence-only
      severity: blocking
      missingEvidence: >-
        Nium's India-specific revenue (Instarem consumer plus B2B India corridors) as a percentage of
        total FY2024 revenue — required to quantify the financial impact if India operations are
        restricted by the ED/PMLA case.
      relatedQuestionRefs:
        - QR013
      relatedTableRefs:
        - TR001
      whyItMatters: >-
        The India ED case is the most consequential near-term legal risk; without India revenue
        quantification, the financial impact of an adverse legal outcome cannot be modeled.
      diligencePath: >-
        Request India revenue breakdown from Nium management; ask specifically for Instarem India
        remittance revenue and B2B corridor revenue from/to India as percentage of total.

    - topic: "MAS capital adequacy position and regulatory examination history"
      type: private-evidence-only
      severity: important
      missingEvidence: >-
        Nium's current capital adequacy position relative to MAS minimum requirements; date and
        outcome of most recent MAS regulatory examination.
      relatedQuestionRefs:
        - QR002
        - QR026
      relatedTableRefs:
        - TR001
      whyItMatters: >-
        MAS capital adequacy is the foundational regulatory compliance requirement. Understanding
        Nium's current buffer above minimum requirements is essential to assess the risk that
        capital could fall below minimum levels during the burn rate period.
      diligencePath: >-
        Request MAS capital adequacy reporting from Nium finance team; confirm date of last MAS
        examination and outcome.

    - topic: "India ED/PMLA case status as of Q2 2026"
      type: not-yet-public
      severity: important
      missingEvidence: >-
        Most recent status of the India ED/PMLA case and Kerala HC stay as of Q2 2026 — the
        September 2025 stay may have been extended, modified, or reversed in the interim.
      relatedQuestionRefs:
        - QR016
      relatedTableRefs:
        - TR001
      whyItMatters: >-
        The legal situation may have evolved between September 2025 and May 2026. A reversal of
        the stay would immediately elevate this risk to thesis-break severity.
      diligencePath: >-
        Request current status from Nium legal team; verify with Indian legal counsel familiar
        with ED/PMLA proceedings.
