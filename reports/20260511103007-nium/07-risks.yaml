callouts:
  - title: India ED/PMLA Legal Risk Is the Most Consequential Near-Term Risk
    calloutType: risk
    body: >-
      The India Enforcement Directorate PMLA investigation against Nium, stayed by Kerala HC in September
      2025, is the most consequential and most uncertain risk in this diligence. India is a major payment
      corridor for Nium — both through Instarem consumer remittance and B2B UPI/instant payment routes.
      If the stay is reversed and ED secures enforcement, Nium's India operations could be suspended,
      affecting both revenue and the planned US IPO (US underwriters and institutional investors typically
      require material legal uncertainty to be resolved or ring-fenced before proceeding). Investors
      should request the current status of all India legal proceedings, the India revenue percentage
      of total revenue, and whether Nium's legal team has independent international counsel engaged.
    claimRefs:
      - CR001
      - CR002
      - CR003
      - CR006

  - title: Burn Rate and Valuation Compression Create Pre-IPO Pressure
    calloutType: risk
    body: >-
      Nium's SGD 88.1M FY2024 net loss, 13.3% revenue growth deceleration (from 2.7x in FY2022), and
      valuation compression from $2.1B to $1.4B create a difficult pre-IPO context. If the company cannot
      demonstrate a credible path to profitability in its IPO S-1, US institutional investors will price
      the float at a significant discount to the current $1.4B private valuation. The CFO (Andre Mancl,
      hired August 2024) must manage this narrative while dealing with the India legal overhang. The
      window for a successful IPO is 2026; if macroeconomic conditions deteriorate or the India case
      escalates, 2027 becomes the realistic earliest window — requiring either bridge financing or
      additional equity at potentially further compressed valuations.
    claimRefs:
      - CR009
      - CR010
      - CR025
      - CR028

