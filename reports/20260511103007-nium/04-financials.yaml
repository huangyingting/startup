callouts:
- title: Revenue Growth Deceleration Signals a Structural Concern for the IPO Thesis
  calloutType: risk
  body: 'Nium''s revenue growth decelerated from 2.7× in FY2022 (USD 82M net revenue, 2.7× YoY) to 13.3% in FY2024 (SGD 167.2M).
    This is not merely a base-effect normalization: Wise grew at 24% YoY in its most recent fiscal year while operating profitably;
    Payoneer reported $961M in FY2024 revenue (+15% YoY) and turned consistently profitable. For a company targeting a US
    IPO in late 2026 at an implied valuation premium over the current $1.4B Series E price, investors will require evidence
    that growth can re-accelerate to 25-plus percent annually. Management must explain whether the 13.3% growth reflects corridor
    saturation, competitive pricing pressure, deliberate volume-quality trade-offs, or a temporary seasonal factor. Without
    this explanation, underwriters will struggle to build a credible IPO valuation above the current private-market price.'
  claimRefs:
  - CI001
  - CI002
  - CI008
  - CI039
- title: SGD 804M in Total Assets Overstates Free Cash; Regulatory Float Must Be Disaggregated
  calloutType: risk
  body: Nium's FY2024 total assets of SGD 804.5M are primarily composed of segregated customer funds held in trust under MAS
    Payment Services Act and FCA Electronic Money Regulations. These balances are not available for general corporate purposes
    and should be excluded from any liquidity analysis. The true operational cash position — equity raised minus cumulative
    losses and regulatory capital set-asides — is likely in the range of SGD 70–110M, substantially lower than the total asset
    figure implies. Due diligence must include a full balance-sheet walkthrough distinguishing restricted regulatory capital,
    segregated customer float, operational bank balances, and any credit facilities or contingent liabilities.
  claimRefs:
