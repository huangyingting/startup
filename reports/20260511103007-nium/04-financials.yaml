- id: sales-and-unit-economics
  title: Sales Efficiency and Unit Economics
  body: 'Nium''s GTM motion targets enterprise buyers — travel management companies, payroll platforms, neobanks, and marketplaces
    — through direct enterprise sales supported by API developer documentation and integration support. The company has disclosed
    that 285,000-plus businesses used its real-time payment network monthly as of 2026, though it is unclear how many of these
    are direct enterprise API clients versus indirect participants transacting through an intermediary that uses Nium''s rails.
    Customer acquisition cost and payback period are not publicly disclosed, making it impossible to independently assess
    unit economics or LTV:CAC ratios. Net revenue retention — the primary proxy for expansion within an enterprise customer
    base — is also not disclosed, though the 13.3% YoY revenue growth for FY2024 likely includes both price and volume components
    from existing customers.

    Gross margin is the most important undisclosed metric. For cross-border payment infrastructure providers, gross margin
    typically ranges from 40% to 60% at the revenue level, after deducting network fees, FX hedging costs, and payment processing
    charges. KPMG analysis on real-time payments suggests that scale above 500M-plus transactions annually is required before
    real-time payment margins become structurally positive. Without Nium''s transaction count (as opposed to volume), it is
    difficult to assess whether it has crossed this threshold. The net loss of SGD 88.1M in FY2024 against revenue of SGD
    167.2M produces a loss-to-revenue ratio of approximately 53%, which is elevated relative to near-breakeven competitors
    like Wise (which turned operating profit positive in FY2023) and Payoneer (which has been profitable since 2023). Estimated
    monthly cash burn of SGD 7–8M, derived from the annual net loss divided by twelve, is a rough proxy that conflates non-cash
    items with true cash consumption; actual cash-flow statements are required to refine this estimate.'
