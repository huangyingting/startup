company:
  name: Nium
chapter:
  number: 4
  title: Financials
  summary: Nium reported FY2024 revenue of SGD 167.2M (+13.3% YoY) and a net loss of SGD 88.1M, sourced from ACRA Singapore
    filings via fintechnews.sg. Annual transaction volume surpassed $50B (February 2026), implying a blended take rate of
    approximately 0.25% — competitive for B2B infrastructure but below consumer-facing peers. Revenue grew at a three-year
    CAGR of roughly 56% from SGD 43.9M in FY2021, though growth has decelerated sharply from 2.7× in FY2022 to 13% in FY2024.
    Gross margin and CAC/NRR remain undisclosed. Estimated monthly cash burn of SGD 7–8M implies runway of 12–24 months from
    the June 2024 Series E close, suggesting a pre-IPO bridge or additional raise will be required before the targeted late-2026
    US listing. Total equity raised is approximately $312M across Seed through Series E at a $1.4B valuation — a 33% markdown
    from the 2022 peak of $2.0–2.1B. Five critical financial gaps (gross margin, CAC, NRR, corridor concentration, and monthly
    actuals) are unresolved and represent blocking diligence items.
sections:
- id: revenue-streams-and-pricing
  title: Revenue Streams and Pricing Model
  body: 'Nium generates revenue across four primary streams, none of which are individually disclosed in public filings. Nium
    Transact — the outbound cross-border pay-out product — accounts for the estimated majority of revenue, likely 60–70%,
    through a combination of FX spread on the interbank rate and a per-transaction flat fee. The FX spread is the dominant
    economic driver: Nium applies a markup (estimated 30–100 basis points) to the mid-market rate on each converted transaction.
    Nium Receive enables businesses to collect payments in 40-plus currencies, generating revenue similarly through FX conversion
    on inbound flows, estimated at 15–20% of total revenue. Nium Embed — card issuance and BaaS in 34-plus countries — contributes
    estimated 10–15% of revenue through interchange income, program setup fees, and monthly per-card or per-program fees.
    Float income from prefunded customer balances on Nium''s platform represents an estimated 5–10% of revenue, benefiting
    from elevated interest rates since 2022. An API/licensing stream for enterprise-embedded infrastructure is marginal and
    likely sub-5% of total revenue.

    The implied blended take rate across all streams is approximately 0.25%, derived by dividing the approximately SGD 125M
    midpoint of FY2024 revenue by the $50B-plus annual transaction volume. This is well below consumer cross-border players
    such as Wise (roughly 0.5–0.7% blended take rate) but reflects the large-notional, enterprise-B2B character of Nium''s
    volume mix. Pricing is not published; enterprise clients likely negotiate bespoke spreads and volume-based discounts,
    which compresses the realized take rate relative to any list rate. Revenue recognition is transaction-based with no evidence
    of material deferred revenue, reducing accounting complexity but also limiting visibility into forward- contracted volume.
    The three-year revenue CAGR from FY2021 to FY2024 was approximately 56%, with visible deceleration from 2.7× growth in
    FY2022 to 13.3% in FY2024 — a trajectory that warrants detailed explanation from management before underwriting the IPO
    growth case.'
