  evidenceGaps:
  - topic: CAC and payback period
    type: private-evidence-only
    severity: blocking
    missingEvidence: Customer acquisition cost and payback period by acquisition channel and customer segment, required to
      compute LTV:CAC ratio and assess sales efficiency.
    relatedQuestionRefs:
    - QI023
    relatedTableRefs:
    - TI003
    - TI005
    whyItMatters: Without CAC and payback data, the fundamental unit economics of Nium's enterprise B2B business cannot be
      independently verified, making it impossible to underwrite the long-term financial thesis or validate the sales model
      efficiency.
    diligencePath: Request cohort-level CAC by acquisition channel for FY2023–FY2024; payback period by customer segment and
      ACV band; cross-reference against sales headcount and quota.
  - topic: Net revenue retention and churn
    type: private-evidence-only
    severity: blocking
    missingEvidence: Net revenue retention rate by customer segment and vintage, gross churn rate, and expansion revenue percentage
      — the primary metrics for revenue durability assessment.
    relatedQuestionRefs:
    - QI024
    relatedTableRefs:
    - TI003
    - TI005
    whyItMatters: Without NRR, the quality and durability of Nium's revenue base cannot be assessed. For a company targeting
      an IPO at a premium valuation, low NRR or high churn would materially impair the forward revenue forecast and investor
      underwriting.
    diligencePath: Request NRR by customer segment (enterprise vs SMB) and vintage year for FY2022–FY2024; gross churn rate
      and reason-for-churn analysis; expansion revenue as a percentage of total revenue.
