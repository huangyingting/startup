callouts:
  - title: Customer Proof Depth is Thin Relative to Claimed Scale
    calloutType: risk
    body: >-
      Nium claims 285,000-plus businesses on its payment network and $50B-plus in annual transaction
      volume — but its named customer proof consists of one case study with an executive quote (KBank),
      plus inferred relationships with Brex, Paysend, and Rippling. No customer has published volume
      attributable to Nium, no outcome metrics (cost savings, settlement speed improvement) are disclosed,
      and no independent customer satisfaction data (G2, Gartner Peer Insights) is publicly accessible.
      Investors should request 5–10 referenceable enterprise customers willing to take calls before
      closing any transaction. Customer proof depth is a material diligence gap.
    claimRefs:
      - CU018
      - CU019
      - CU020
      - CU022

  - title: Net Revenue Retention is the Most Important Unknown
    calloutType: insight
    body: >-
      For a B2B payment infrastructure company like Nium, net revenue retention (NRR) is the single
      most important metric not publicly disclosed. If NRR is above 110%, Nium's 13.3% FY2024 revenue
      growth implies limited new customer acquisition — a concerning sign. If NRR is below 100%, new
      customer revenue is being used to replace churned revenue rather than compounding. If NRR is
      120%+, Nium's revenue math supports premium valuation even at slow headline growth. The entire
      growth quality story depends on NRR, which makes its non-disclosure the single most consequential
      data gap in this diligence report.
    claimRefs:
      - CU023
      - CU024
      - CU027
      - CU028

