company:
  name: Nium
chapter:
  number: 6
  title: Customers
  summary: >-
    Nium's customer base spans four primary enterprise verticals — fintech platforms, travel management
    companies (TMCs), payroll and HR platforms, and marketplace/e-commerce businesses. As of February 2026,
    285,000-plus businesses use Nium's real-time payment network monthly, and the platform processes $50B-plus
    in annual transaction volume. Named customers include KBank (Kasikorn Bank, Thailand) in documented case
    studies, Brex (corporate card platform, US), Paysend (cross-border fintech, UK), and Rippling (HR/payroll
    platform, US). Customer retention economics are structurally favorable: B2B payment infrastructure is high-
    switching-cost with multi-year API integrations. However, Nium has not published net revenue retention,
    gross revenue retention, churn rates, or top-10 customer concentration ratios — creating critical diligence
    gaps. Adverse signals include the risk that named customers represent a small share of total accounts and
    that many logos may reflect pilot deployments rather than production-scale activity.

sections:
  - id: customer-base-segmentation
    title: Customer Base Segmentation
    body: >-
      Nium's paying enterprise customers are concentrated in four segments: fintech and embedded finance
      platforms, travel management companies (TMCs) and airlines, payroll and HR technology platforms,
      and marketplace/e-commerce businesses with cross-border seller payouts. Within fintech, Nium's
      Transact and Receive products serve companies building their own cross-border payment products —
      effectively making Nium an invisible infrastructure layer under branded fintech experiences.
      Brex uses Nium Embed for multi-currency card issuance; Paysend uses Nium's rail network for
      international remittance corridors. In travel, Nium targets TMCs and OTAs that require multi-
      currency disbursements to airlines, hotels, and ground transport in 190-plus countries — a use
      case where settlement speed and corridor depth are primary buying criteria. In payroll, platforms
      like Rippling use Nium's infrastructure to send salary payments to employees in markets without
      local banking relationships. In marketplace, Nium enables sellers on global platforms to receive
      payouts in their local currencies via virtual accounts.

      Geographically, Nium's customer base is globally distributed but likely concentrated in
      North America, Europe, Southeast Asia, and India — markets where it has deep licensing and
      corridor coverage. Nium's Instarem consumer brand serves individual remittance senders, primarily
      between South Asia and Southeast Asia, operating under the same regulatory licenses but as a
      separate product surface. The enterprise B2B and Instarem consumer segments serve distinct
      buyer profiles with distinct revenue characteristics.

      Most customer relationships are established through API integration — a high-friction onboarding
      process that includes regulatory KYB of the client entity, technical integration, and compliance
      onboarding. This onboarding cost creates a natural retention moat: clients who complete
      integration are unlikely to switch providers without a significant degradation in service.
    claimRefs:
      - CU001
      - CU002
      - CU003
      - CU005
      - CU007
      - CU009
      - CU014
