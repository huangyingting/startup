      - TU002
    figureRefs:
      - FU002

  - id: named-customer-proof
    title: Named Customer Proof and Case Studies
    body: >-
      Nium's case studies page documents enterprise customer deployments with outcomes. KBank (Kasikorn
      Bank), one of Thailand's largest commercial banks, is featured as a production customer using
      Nium's cross-border payment infrastructure, with a testimonial from KBank's Head of International
      Trade Product Management. This is Nium's highest-quality public customer proof: a named, tier-1
      financial institution with a quoted executive.

      Brex, the US-based corporate card and expense management platform (valuation $12B+), uses Nium
      Embed for international card issuance. This relationship is referenced in Nium's platform
      communications and is consistent with Brex's product offering (multi-currency corporate cards
      in global markets). Paysend, the UK-based cross-border remittance fintech, uses Nium's payment
      rail network for international corridors, as corroborated by co-press releases and Nium's
      partner/customer documentation. Rippling, the US-based HR and payroll platform ($13.5B valuation),
      uses global payment infrastructure for international payroll disbursements. Nium's corridor
      depth and instant payment network is consistent with Rippling's global payroll product requirements.

      The evidence quality for named customers varies: KBank has a quoted case study; Brex, Paysend,
      and Rippling are referenced in public news and Nium partner communications but without detailed
      outcome metrics. No customer has published specific cost savings, settlement speed improvements,
      or transaction volume attributable to Nium from public sources. Enterprise payment infrastructure
      customers rarely publish detailed vendor performance metrics, making the absence of quantified
      outcomes typical rather than exceptional.
    claimRefs:
      - CU004
      - CU006
      - CU018
      - CU019
      - CU020
