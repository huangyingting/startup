  - id: retention-and-durability
    title: Retention and Durability
    body: >-
      Nium has not published net revenue retention (NRR), gross revenue retention (GRR), annual churn
      rate, or cohort-level data. For B2B payment infrastructure providers, these are the most
      important indicators of business quality — they determine whether revenue growth is driven by
      landing new customers (expensive) or expanding within existing customers (capital-efficient).

      Structural factors suggest high retention in Nium's enterprise segment: API integrations are
      multi-month investments that create high switching costs; regulatory compliance dependencies
      (Nium's KYB, AML, and compliance stack is often embedded in client workflows); and multi-corridor
      dependencies mean that replacing Nium requires renegotiating multiple corridor-specific relationships.
      B2B payment infrastructure providers with equivalent market positions (Adyen, Currencycloud before
      acquisition by Visa) have historically reported NRR above 100% — driven by client volume growth
      rather than price increases.

      Negative signals on retention include: Nium's FY2024 revenue growth decelerated to 13.3% from
      2.7× in FY2022 — suggesting either customer churn offset new customer revenue, or existing customers
      grew volumes more slowly. The October 2023 ~10% headcount reduction may indicate customer attrition
      or pipeline slowdown. Without disclosed NRR, it is impossible to distinguish between these scenarios.
      Instarem consumer retention is likely lower than B2B enterprise retention, as individual consumers
      compare rates and switch on single transactions without integration costs.
    claimRefs:
      - CU023
      - CU024
      - CU025
      - CU026
      - CU027
      - CU028
      - CU029
    tableRefs:
      - TU004
    figureRefs:
