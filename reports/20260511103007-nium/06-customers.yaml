  evidenceGaps:
    - topic: "Net revenue retention and gross revenue retention"
      type: private-evidence-only
      severity: blocking
      missingEvidence: >-
        Nium's NRR, GRR, and annual client churn rate by cohort year. These are the most
        important metrics for assessing Nium's business quality and growth durability.
      relatedQuestionRefs:
        - QU005
        - QU023
      relatedTableRefs:
        - TU004
      whyItMatters: >-
        Without NRR/GRR, it is impossible to determine whether Nium's 13.3% FY2024 revenue growth
        reflects healthy volume expansion within existing clients, new client acquisition, or
        replacement of churned revenue. This ambiguity is the central growth quality question.
      diligencePath: >-
        Request NRR and GRR by cohort year (FY2022, FY2023, FY2024) from Nium management.
        Cross-reference with enterprise client list and revenue waterfall.

    - topic: "Customer revenue concentration"
      type: private-evidence-only
      severity: important
      missingEvidence: >-
        Percentage of revenue from top 5 and top 10 enterprise clients; any customers representing
        more than 10% of total revenue individually.
      relatedQuestionRefs:
        - QU011
      relatedTableRefs:
        - TU005
      whyItMatters: >-
        If a small number of high-volume clients (e.g., payroll platforms processing billions per month)
        account for a large share of Nium's $50B transaction volume, the loss of any single client
        would be material. This is a standard enterprise B2B risk not addressed in public communications.
      diligencePath: >-
        Request revenue waterfall with anonymized client IDs. Identify clients representing >5% of
        total revenue and assess contractual renewal terms and switching risk.

    - topic: "Paying enterprise client count, ARPU, and transaction volume breakdown"
      type: private-evidence-only
      severity: important
      missingEvidence: >-
        Nium's actual paid enterprise API client count, average revenue per client (ARPU) by vertical,
        and transaction volume breakdown by product (Transact/Receive/Embed) and by geography.
      relatedQuestionRefs:
        - QU003
        - QU004
        - QU012
      relatedTableRefs:
        - TU002
        - TU003
      whyItMatters: >-
        The 285,000 monthly businesses metric is too broad to assess customer quality or concentration.
        Without paid client count and ARPU, growth decomposition (new clients vs existing expansion)
        is impossible from public data. The named customer table (TU003) is a sample of verifiable
        deployments; full client list and production deployment confirmations are not publicly available.
      diligencePath: >-
        Request enterprise API client count with minimum-volume filter, ARPU by vertical (fintech,
        travel, payroll, marketplace), and revenue breakdown by product module (Transact/Receive/Embed)
        and by geography (APAC/Americas/EMEA). Request full referenceable customer list from Nium
        management for independent verification.
