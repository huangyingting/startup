  title: Product and Technology
  summary: >-
    Nium's product suite comprises three primary B2B modules — Nium Transact (pay-out in 100+ currencies, 190+
    countries), Nium Receive (pay-in in 40+ currencies), and Nium Embed (card issuance BaaS in 34+ countries)
    — delivered through a single unified REST API. The platform connects to 100+ instant payment corridors via
    local rails (UPI, FAST, PayNow) and SWIFT, routing transactions in real time with an embedded FX engine.
    Nium's technology moat rests on its regulatory licensing stack (40+ jurisdictions), real-time corridor
    breadth, and multi-rail routing intelligence rather than on disclosed proprietary IP. The nium-global
    GitHub organization hosts public SDKs but reflects modest open-source activity relative to developer-first
    peers. A November 2025 USDC/stablecoin settlement pilot with Visa signals roadmap ambition into next-
    generation payment rails. Critical technology risks include undisclosed uptime SLAs, no published PCI
    DSS Level 1 certificate, and potential platform commoditization from open-source infrastructure (Moov.io)
    or cloud provider payment services (AWS).

sections:
  - id: product-suite-overview
    title: Product Suite Overview
    body: >-
      Nium's B2B product portfolio is organized into three principal modules: Nium Transact, Nium Receive,
      and Nium Embed. Nium Transact is the pay-out product enabling enterprise clients to send payments in
      100-plus currencies across 190-plus countries. It supports both SWIFT and local real-time rails with
      100-plus instant corridors available as of 2026. Nium Receive enables businesses to collect payments in
      40-plus currencies through multi-currency virtual accounts, converting inbound flows at the point of
      collection. Nium Embed is the card issuance and Banking-as-a-Service (BaaS) module, enabling clients
      to issue Visa and Mastercard virtual and physical cards in 34-plus countries for corporate expense
      management, travel programs, and end-user financial products.

      All three modules are exposed through a single unified REST API with consistent authentication, JSON
      payloads, and webhook-based status notifications. Nium's platform also supports batch payment
      operations for payroll, marketplace payouts, and corporate treasury disbursements, making it
      suitable for enterprise clients with high-volume, recurring payment needs. Alongside these B2B
      products, Nium retains the Instarem consumer brand for individual cross-border remittance, which
      operates as a separate product surface under the same regulatory licenses. The company's 285,000-plus
      businesses using the real-time payment network monthly demonstrates significant adoption across
      fintech, travel management, payroll platforms, and marketplace verticals.

      A notable technology milestone was Nium's November 2025 pilot with Visa for USDC stablecoin
      settlement — one of the first such integrations on Visa's network outside of traditional fiat flows.
      This pilot signals Nium's directional intent to support next-generation payment rails alongside its
      existing fiat corridors.
