callouts:
  - title: Nium's Moat Is Regulatory Licensing, Not Proprietary Code
    calloutType: insight
    body: >-
      Nium's technology differentiation is not primarily software-based. Unlike API-first peers such
      as Stripe (PCI-certified developer experience, extensive docs, strong brand) or Adyen (deep card
      scheme relationships and omni-channel coverage), Nium's competitive moat derives from its 40-plus
      regulatory licenses across 190-plus countries combined with its real-time corridor network and
      Visa/Mastercard card issuance reach. Replicating this licensing stack requires 3–7 years and tens
      of millions of dollars per jurisdiction. However, this means that Nium's moat is capital-intensive
      and compliance-dependent rather than software-IP-protected — making it vulnerable to well-funded
      competitors (Airwallex, Currencycloud) who are actively expanding their own licensing footprints.
    claimRefs:
      - CE013
      - CE028
      - CE039

  - title: Undisclosed Uptime SLA and PCI Status Are Blocking Enterprise Trust Signals
    calloutType: risk
    body: >-
      Enterprise payment buyers require published SLA commitments (typically 99.99%+ uptime) and
      PCI DSS Level 1 certification before deploying high-volume card or payment flows through
      any infrastructure provider. Nium has not published either of these in publicly accessible
      documentation. While the absence of public incidents suggests operational stability, investors
      and enterprise prospects conducting due diligence should request: (1) Nium's uptime track
      record for the past 12 months, (2) the SLA terms in their Master Service Agreement, and
      (3) a copy of the current PCI DSS Attestation of Compliance (AOC) from a Qualified Security
      Assessor. These are table-stakes documents for enterprise payments infrastructure procurement.
    claimRefs:
      - CE036
      - CE037
      - CE013

