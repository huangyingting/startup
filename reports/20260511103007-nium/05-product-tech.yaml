  evidenceGaps:
    - topic: "API uptime and reliability SLA"
      type: private-evidence-only
      severity: blocking
      missingEvidence: >-
        Nium's published API uptime SLA, historical availability rate, and incident response
        record — standard enterprise procurement requirements for high-volume payment infrastructure.
      relatedQuestionRefs:
        - QE018
      relatedTableRefs:
        - TE004
      whyItMatters: >-
        Enterprise clients deploying high-volume payment flows through Nium require contractual
        uptime commitments and incident history before vendor selection. The absence of published
        SLAs creates procurement friction and limits enterprise trust signals.
      diligencePath: >-
        Request Nium's Master Service Agreement SLA terms, past-12-month uptime dashboard,
        and any documented incident reports from the enterprise support team.

    - topic: "PCI DSS Level 1 certification"
      type: private-evidence-only
      severity: blocking
      missingEvidence: >-
        Nium's current PCI DSS Level 1 Attestation of Compliance (AOC) from a Qualified Security
        Assessor, required for card-present and card-not-present data handling under Nium Embed.
      relatedQuestionRefs:
        - QE020
      relatedTableRefs:
        - TE004
      whyItMatters: >-
        Any enterprise deploying card issuance through Nium Embed must confirm PCI DSS Level 1
        compliance before going live with card programs. Without this attestation, card program
        deployment is a regulatory risk for the client.
      diligencePath: >-
        Request the current PCI DSS AOC from Nium's compliance team; verify with the QSA directly
        if the certificate is not in the data room.
