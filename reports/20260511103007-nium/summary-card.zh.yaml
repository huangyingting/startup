summary:
  headline: |
    Nium 拿下 40 张牌照，年交易量超过 $50B，监管护城河让它成为可信的 B2B 支付基础设施 IPO 候选；但印度法律风险、53% 经营亏损率和增长放缓，让 IPO 前风险偏高，加仓信心需要继续跟踪。
