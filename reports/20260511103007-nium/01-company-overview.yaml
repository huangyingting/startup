callouts:
  - calloutType: strength
    title: Broadest Regulatory License Portfolio in B2B Payments Infrastructure
    body: >-
      Nium's 40+ regulatory licenses across jurisdictions including MAS (Singapore), FCA (UK), ASIC (Australia),
      and US MSBs represent years of compliance investment that new entrants cannot replicate quickly. This
      infrastructure moat is the foundation of Nium's differentiation claim versus point-solution competitors.
    claimRefs:
      - CO016
      - CO004
  - calloutType: risk
    title: Loss-Making with Deferred IPO and Concentrated Leadership Risk
    body: >-
      Nium posted a net loss of SGD 88.1M in FY2024 and deferred its IPO from Q2 2025 to late 2026. Revenue growth
      has slowed to 13.3% YoY. Key-person risk in CEO Prajit Nanu is material, and the October 2023 leadership
      departures (CPO and co-founder) highlight execution risk. The Enforcement Directorate case in India adds
      regulatory tail risk.
    claimRefs:
      - CO019
      - CO027
      - CO032
      - CO044
  - calloutType: insight
    title: February 2026 C-Suite Reinforcement Signals Pre-IPO Sprint
    body: >-
      The simultaneous appointment of a CTO (Cidambi, ex-Coinbase/Visa), CMO (Gotkis, ex-dLocal), and CRCO
      (Mohan, ex-Stripe/PayPal) in February 2026 signals deliberate pre-IPO leadership builds in technology,
      go-to-market, and compliance — the three areas cited as deficient when the 2025 IPO was deferred.
    claimRefs:
      - CO021
      - CO022
      - CO023
      - CO044

