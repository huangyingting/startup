company:
  name: Nium
chapter:
  number: 1
  title: Company Overview
  summary: >
    Nium is a Singapore- and San Francisco-co-headquartered B2B payments infrastructure company founded in 2014 as
    Instarem, rebranded in 2019, and now operating as Southeast Asia's first B2B payments unicorn. The company
    provides real-time cross-border payment, card issuance, and embedded finance services to 200+ enterprise clients
    in 190+ countries, having raised over $312M across 11 funding rounds including a $200M Series D in 2021 and a
    $50M Series E in June 2024 at a $1.4B valuation. Despite strong revenue growth (SGD 167.2M in FY2024, +13.3%
    YoY), Nium remains loss-making and has deferred its IPO target to late 2026.

sections:
  - id: company-identity
    title: Company Identity and Business Model
    body: >
      Nium is a private B2B financial infrastructure company headquartered jointly in Singapore and San Francisco,
      California. The company operates as the leading real-time cross-border payments platform for banks, fintechs,
      and enterprises, enabling clients to collect, convert, and disburse funds instantly across borders through a
      single API integration. Nium's product suite spans four core lines: cross-border pay-outs to 190+ countries in
      100+ currencies (over 100 of which in real-time), pay-ins and local fund collection in 40+ markets, physical
      and virtual card issuance in 34+ countries, and embedded finance / banking-as-a-service (BaaS) capabilities.

      The company operates under the brand name Nium while retaining Instarem as a wholly owned consumer-remittance
      subsidiary. Nium's primary business model is transaction-fee-based, charging basis points (bps) on payment
      volume processed, supplemented by SaaS fees for enterprise infrastructure access. As of February 2026, the
      company announced it supports over $50 billion in annual transaction volume. Nium holds regulatory licenses
      and authorizations in more than 40 countries — including MAS (Singapore), FCA (UK), ASIC (Australia), and
      FINCEN/state MSB licenses across the United States — making it one of the most broadly licensed fintech
      infrastructure providers globally. The company's stated mission is "to build the first global infrastructure
      for real-time payments" with a vision of "a world where money moves instantly to everyone, everywhere."
