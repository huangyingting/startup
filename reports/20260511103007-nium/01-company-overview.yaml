  - id: adverse-events
    title: Financial Performance, Adverse Events, and Open Questions
    body: >
      Nium's FY2024 financial results (fiscal year ending December 31, 2024), based on filings reviewed by
      DealStreetAsia, show revenue of SGD 167.2M — up 13.3% year-over-year — but a net loss of SGD 88.1M. Total
      operating expenses climbed to SGD 267.8M, driven largely by processing charges of SGD 87.8M. Employee
      compensation declined to SGD 97.1M from SGD 114.1M following the 2023 workforce reductions, and advertising
      costs fell sharply to SGD 5.1M from SGD 15.6M. Total assets stood at SGD 804.5M and total equity declined to
      SGD 82.3M (from SGD 105.3M in 2023), reflecting accumulated losses. Revenue in 2021 was SGD 43.9M and grew
      to SGD 117M in 2022, but exact FY2023 figures are not publicly available.

      Three adverse events merit diligence attention. First, the October 2023 10% global workforce reduction —
      preceded by layoffs at subsidiary Instarem and the simultaneous departure of CPO Robin Gandhi and co-founder
      Pratik Gandhi — represents significant operational and leadership disruption. Second, the June 2024 Series E
      down-round at $1.4B valuation (30% below peak) reflects broader fintech market pressures and was accompanied
      by an IPO delay from the originally targeted Q2 2025 to late 2026. Third, and most significantly for
      regulatory risk, in 2025 India's Enforcement Directorate (ED) filed a Prevention of Money Laundering Act
      (PMLA) case naming Nium India and its director as accused, alleging the platform was used to route funds from
      Chinese loan-app scam operators. Nium denied complicity and the Kerala High Court stayed proceedings in
      September 2025, but the case highlights the platform-liability risks for payment intermediaries operating at
      scale. Additionally, the Wikipedia article on Nium carries a conflict-of-interest flag. IPO readiness and
      profitability path remain open questions requiring additional diligence.
