      provisions for each investor across all rounds
    whyItMatters: >-
      Cap table structure determines control rights and alignment between management and investors ahead of IPO; lack of
      disclosure prevents full governance risk assessment
    diligencePath: >-
      Request investor rights agreement and cap table from Nium CFO or legal counsel during due diligence;
      cross-reference with any SGCA ACRA filings for Singapore incorporated entity
