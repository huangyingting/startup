      analysis; Tracxn cites SGD 148M for 2023 but this is unverified
    whyItMatters: >-
      Without FY2023 data, revenue growth trajectory assessment is incomplete; SGD 148M in 2023 then SGD 167M in 2024
      would imply 13% growth — significant deceleration from 2.7x in 2022
