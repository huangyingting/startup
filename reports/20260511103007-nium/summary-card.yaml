summary:
  headline: >
    Nium's 40-license regulatory moat and $50B+ annual transaction volume position it as a credible B2B payments
    infrastructure IPO candidate, but India legal risk, 53% operating loss margin, and growth deceleration create
    elevated pre-IPO risk requiring active monitoring before increasing position conviction.
