  shortDescription: >
    Nium is a Singapore-headquartered B2B payments infrastructure company that provides global real-time payment, card
    issuance, and banking-as-a-service capabilities through a unified API platform. Founded in 2014 as Instarem, Nium
    holds 40+ payment service licenses across 190+ countries, processed $50B+ in annual transaction volume in 2025, and
    serves 285,000+ businesses. The company is valued at $1.4B (Series E, June 2024) and targets a late-2026 US IPO.
