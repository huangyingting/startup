  - id: capability-pricing-comparison
    title: Feature, Capability, and Pricing Comparison
    body: >-
      A capability-level analysis across eight buying criteria reveals that no competitor fully replicates
      Nium's combination of real-time payment corridor breadth, multi-country card issuance, and regulatory
      licensing depth. Airwallex comes closest on product breadth but trails Nium on corridor count and regulatory
      license count. Wise Business offers superior FX transparency but lacks card issuance API or enterprise
      compliance tooling. Stripe leads on developer experience and API documentation quality but is restricted
      to US/EU for banking and has no equivalent to Nium's 100-plus real-time corridors in APAC, LATAM, and MEA.

      On pricing, the market is structurally opaque for enterprise contracts. Nium's pricing is not publicly
      disclosed and is negotiated per client based on transaction volume, corridors, and product mix. Wise
      Business charges a transparent one-time $31 setup fee with FX fees of approximately 0.3-1.5% above
      mid-market rates, making its economics visible and predictable. Airwallex charges $0/month on its free
      tier with a 0.2-1.0% FX markup and per-transaction fees for card use. Payoneer historically charges
      3% FX markup for SMBs with negotiated rates for enterprise accounts.

      The absence of transparent list pricing from Nium, Currencycloud, and Banking Circle is itself a
      competitive factor: it creates friction for SMBs evaluating options but allows enterprise pricing
      flexibility — a trade-off that favors Nium's enterprise-first go-to-market. Airwallex's transparent
      tiered pricing gives it an advantage with mid-market buyers evaluating multiple providers.
    claimRefs:
      - CP018
