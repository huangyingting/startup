callouts:
  - calloutType: risk
    title: Airwallex's Valuation Gap Signals a Competitive Funding Asymmetry
    body: >-
      Airwallex's $5.6B valuation (October 2024) is four times Nium's $1.4B Series E valuation (June 2024).
      This creates a structural funding asymmetry: Airwallex can raise capital more cheaply and deploy it
      faster on licensing, engineering, and customer acquisition. If Airwallex closes its remaining capability
      gaps — particularly in real-time corridor breadth and regulatory licensing — before Nium reaches
      profitability or completes its planned 2026 IPO, Nium may face a competitor with comparable product scope
      but significantly greater capital resources. Investors should assess Nium's path to profitability
      relative to Airwallex's funding runway and product roadmap convergence.
    claimRefs:
      - CP009
      - CP016
      - CP039
      - CP040

  - calloutType: insight
    title: Country Count Is No Longer a Differentiator — Corridor Speed Is
    body: >-
      Three competitors (Wise, Payoneer, Currencycloud) already match or approach Nium's 190-country reach.
      The differentiating metric has shifted from country count to real-time corridor depth: how many of those
      countries support instant settlement versus batch or SWIFT fallback. Nium's 100-plus instant corridors —
      including emerging-market additions such as Canada (Interac, 2025), Southeast Asian instant networks,
      and India UPI — represent a more defensible position than country count alone. Competitors seeking to
      replicate this must either establish local banking relationships in each corridor or acquire companies
      with existing rail access, neither of which is fast or cheap.
    claimRefs:
      - CP002
      - CP003
      - CP013
      - CP032
      - CP033

