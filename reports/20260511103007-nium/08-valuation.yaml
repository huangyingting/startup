  evidenceGaps:
    - topic: "India revenue as percentage of total revenue"
      type: private-evidence-only
      severity: blocking
      missingEvidence: >-
        Nium's India-specific revenue (Instarem consumer remittance + B2B India corridor) as a
        percentage of FY2024/FY2025 total revenue — critical for sizing the financial impact
        of the India ED/PMLA case on the investment thesis.
      relatedQuestionRefs:
        - QV022
        - QV007
      relatedTableRefs:
        - TV004
        - TV006
      whyItMatters: >-
        The India ED case is the most consequential near-term risk. Without India revenue
        quantification, the bear case scenario cannot be properly sized and the investment
        decision is made with a material unknown.
      diligencePath: >-
        Request India P&L from data room; ask for Instarem India revenue and B2B India corridor
        revenue as a percentage of consolidated group revenue for FY2024 and FY2025 YTD.

    - topic: "FY2025 YTD revenue and growth rate"
      type: not-yet-public
      severity: blocking
      missingEvidence: >-
        Nium has not publicly disclosed FY2025 revenue data. Whether the 13.3% growth
        deceleration trend is continuing, stabilizing, or reversing in FY2025 is critical
        to assessing the probability weight of base vs. bull vs. bear scenarios.
        The IPO S-1 filing timeline and underwriter mandate status are also undisclosed —
        key confirmations that the 2026 IPO window is achievable.
      relatedQuestionRefs:
        - QV014
        - QV019
        - QV018
