callouts:
  - title: The $1.4B Valuation Is Fair, Not Cheap — Upside Requires Execution
    calloutType: insight
    body: >-
      At $1.4B (June 2024 Series E), Nium is priced at approximately 11x FY2024 revenue — a
      premium to public comparables (Payoneer at 2.5-3.5x; dLocal at 3-4.5x; Flywire at 3.5-5x)
      but consistent with pre-IPO private market convention for a high-growth payment infrastructure
      company. This valuation is not cheap: it prices in continued revenue growth, and any
      meaningful deceleration below 10-15% YoY would make the $1.4B difficult to maintain in
      IPO pricing. The bull case return (1.4-1.8x at $2.0-2.5B IPO) requires both India legal
      resolution AND growth re-acceleration — two conditions that are independent and each
      uncertain. Investors should size position to reflect this conditional upside.
    claimRefs:
      - CV007
      - CV008
      - CV011
      - CV013

  - title: India ED/PMLA Case Is the Most Binding Valuation Constraint
    calloutType: risk
    body: >-
      The India ED/PMLA investigation is not just a legal risk — it is a valuation constraint.
      US underwriters and institutional IPO investors will require either full resolution of
      the India case or comprehensive ring-fencing in the S-1 disclosures before proceeding.
      If the Kerala HC stay is reversed before the IPO, Nium would need to either suspend India
      operations, face a potential SEC registration delay, or disclose a material legal contingency
      that would significantly compress IPO pricing. The India revenue exposure (unmeasured publicly)
      is the key unknown: if India represents more than 20% of revenue, the financial impact of
      an adverse ruling is thesis-break level.
    claimRefs:
      - CV004
      - CV006
      - CV025
      - CV026

