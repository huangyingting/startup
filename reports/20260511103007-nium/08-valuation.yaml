  - id: exit-readiness-and-ipo-timeline
    title: Exit Readiness and IPO Timeline
    body: >-
      Nium's IPO preparation is actively underway. The CFO hire (Andre Mancl, August 2024) and
      CCO appointment signal IPO-readiness infrastructure building. Nium relocated to a new
      Singapore HQ in late 2024, signaling organizational commitment to the IPO process.
      The company has publicly indicated a late-2026 US listing target through multiple media
      channels. The Visa partnership and USDC stablecoin pilot (November 2025) support the
      IPO narrative of next-generation payment infrastructure.

      Key milestones for IPO execution: (1) SEC S-1 registration statement filing, typically
      6-12 months before pricing; (2) PCAOB-compliant audit of FY2024 and FY2025 financial
      statements; (3) India ED/PMLA case resolution or ring-fencing in disclosures; (4)
      underwriter mandate announcement; (5) IPO road show. The S-1 should be filed by
      Q2 2026 if the company targets an H2 2026 pricing.

      Dilution risk: total raised of $312M with 40-plus investors across Series A-E creates
      a complex cap table. Preference overhang from venture rounds (liquidation preferences,
      anti-dilution provisions) could create pricing tension at IPO, particularly if the
      IPO prices at or below the $1.4B Series E post-money valuation. Public market investors
      should evaluate whether the primary proceeds from the IPO go to the company (growth capital)
      or to secondary sellers (existing investor liquidity).
    claimRefs:
      - CV019
      - CV020
      - CV021
      - CV022
      - CV023
    tableRefs:
      - TV005

  - id: diligence-asks-and-thesis-break
    title: Diligence Asks and Thesis-Break Triggers
    body: >-
      The most critical diligence asks for Nium's valuation are: (1) India revenue breakdown
      (Instarem consumer + B2B corridor) as a percentage of FY2024/FY2025 total — to quantify
      the financial impact of the India ED case risk; (2) current MAS capital adequacy position
      relative to the MPS minimum requirements — to assess burn rate risk within the Singapore
      regulatory license framework; (3) FY2025 YTD revenue and growth rate — to determine
      whether the growth deceleration trend is continuing, stabilizing, or reversing; (4) NRR
      (net revenue retention) by customer cohort — to assess whether existing enterprise clients
      are expanding or churning; (5) IPO S-1 timeline and underwriter mandate status.

      Thesis-break scenarios (conditions under which the investment thesis is invalidated):
      (1) India ED/PMLA stay reversed and India operations suspended — reduces TAM and
      triggers IPO delay, forcing bridge financing at compressed valuation; (2) FY2025 revenue
      YoY decline — signals market saturation or major customer churn that cannot be
      reversed before IPO; (3) CEO departure before IPO — signal event that causes
      institutional investor uncertainty and potentially forces IPO delay; (4) IPO priced
      below $1.0B — return scenario unacceptable for Series E investors; (5) MAS or FCA
      license revocation — existential threat to the B2B platform.
    claimRefs:
      - CV024
      - CV025
      - CV026
      - CV027
      - CV028
      - CV029
