      - number: '8.2'
        title: Valuation and Comparable Analysis
        blocks:
          - type: paragraph
            body: >-
              At the June 2024 Series E, Nium was valued at $1.4B on a pre-money basis. Based on FY2024 revenue of SGD
              167.2M (approximately $124M at June 2024 SGD/USD exchange rates), this implies an EV/Revenue multiple of
              approximately 11.3x — a premium to comparable public cross-border payment companies but consistent with a
              pre-IPO discount applied to higher-growth private companies.

              Public comparables in the B2B cross-border payment infrastructure space trade at lower revenue multiples,
              reflecting their public market liquidity discount, larger scale, and in some cases stronger profitability
              profiles. Payoneer (PAYO) trades at approximately 2.5–3.5x revenue; dLocal (DLO) trades at 3.0–4.5x
              revenue (post-governance correction from its 2021 peak of 25x+); Flywire (FLYW) trades at 3.5–5x revenue;
              and Wise (WISE.L) trades at 5–7x revenue on the LSE. Adyen trades at 10–15x revenue reflecting its size,
              margins, and established position, but is not a direct comparable to Nium's developmental stage.

              Nium's premium to these public peers is partially justified by: higher historical revenue growth rate,
              broader geographic licensing coverage (190+ countries vs. Payoneer's more limited corridor depth), and
              pre-IPO private market convention of premium pricing for growth-stage companies. However, the growth
              deceleration from 2.7x to 13.3% YoY reduces the magnitude of premium warranted, and the SGD 88.1M loss
              suggests the path to public market multiples requires demonstration of operating leverage.

              On an EV/Revenue basis, a reasonable IPO pricing range would be 8-12x FY2025 forward revenue. If Nium
              achieves 20% revenue growth in FY2025 (SGD 200M), the EV/Revenue at $1.4B would be ~10x — reasonable for a
              high-growth, loss-making payment infrastructure provider in a 2026 IPO market. If growth slows to 10%, the
              multiple would be ~11.5x at $1.4B — potentially too high for IPO pricing without a demonstrated operating
              leverage story.
            claimRefs:
              - CV007
              - CV008
              - CV009
              - CV010
              - CV011
              - CV012
