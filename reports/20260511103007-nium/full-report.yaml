      - number: '5.5'
        title: Roadmap and Technology Differentiation
        blocks:
          - type: paragraph
            body: >-
              Nium's technology roadmap is shaped by three vectors: corridor expansion into underserved markets (Africa,
              Southeast Asia, Latin America), adoption of next-generation payment rails (stablecoin/USDC, ISO 20022),
              and deepening of the card issuance and BaaS platform. The November 2025 USDC settlement pilot with Visa
              represents the most concrete public evidence of next-generation rail exploration. ISO 20022 migration,
              which SWIFT and major regional payment networks are completing through 2025-2026, requires Nium's
              messaging layer to support richer structured data formats — an upgrade that could improve AML screening
              accuracy and reduce false-positive compliance overhead.

              Nium's primary technology differentiation is not patent-protected software but operational excellence: the
              regulatory licensing stack (40+ jurisdictions), the real-time corridor network (100+ instant corridors),
              and the card issuance network (Visa and Mastercard partnership across 34+ countries) are individually
              expensive to replicate and collectively create a multi-year barrier to entry. AWS and major cloud
              providers offer payment infrastructure services that could theoretically commoditize parts of Nium's stack
              — particularly SWIFT messaging and FX services — but have not entered the full-stack licensed payment
              infrastructure market. Open-source payment infrastructure (Moov.io) addresses the developer-experience gap
              but does not replicate Nium's regulatory licensing footprint. Stablecoin/CBDC rails represent an emerging
              technology risk over a 5-plus year horizon: if major infrastructure providers adopt programmable money
              rails that bypass traditional payment networks, Nium's corridor and licensing moat could be disrupted.
