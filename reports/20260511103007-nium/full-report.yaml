  - id: TM004
    title: Growth drivers and constraints table
    description: >-
      Identifies the key forces accelerating or constraining B2B payments market digitization, with specific
      implications for Nium and diligence follow-up actions.
    columns:
      - Driver / Constraint
      - Direction
      - Timing
      - Implication for Nium
      - Diligence Ask
    rows:
      - - ISO 20022 global adoption (BIS CPMI-mandated harmonization)
        - Driver
        - 2025 and ongoing
        - Richer payment data improves STP rates; legacy bank clients need ISO 20022-compliant infrastructure
        - Verify Nium's ISO 20022 compliance status across all corridors
      - - Real-time payment network proliferation (80+ networks globally)
        - Driver
        - Ongoing (3-5 year buildout continues)
        - Each new RTP network Nium connects to adds incremental corridor value and reduces settlement time
        - Track count of Nium's active real-time corridor integrations vs. total available networks
      - - India UPI at 13.4 billion monthly transactions (December 2025)
        - Driver
        - Structural — already operational
        - APAC corridor volume opportunity; Nium's Singapore base provides regulatory adjacency to India
        - Quantify Nium's India inbound/outbound payment volume
      - - FedNow exceeded 900 participating institutions (US, late 2025)
        - Driver
        - 2025-2027 adoption ramp
        - Enables US-outbound real-time payments; expands Nium's US dollar corridor reach
        - Assess Nium's FedNow connectivity and any FedNow-specific client wins
      - - 'SEPA Instant: 14.5 billion transactions in 2024 (54% YoY growth)'
        - Driver
        - Structural — EU regulatory mandate accelerating
        - European fintech clients increasingly require SEPA Instant; Nium holds FCA (UK) and EU payment licenses
        - Map Nium's EU license coverage post-Brexit and any SEPA Instant integration status
      - - EU e-VAT mandate from 2028 (affecting 10M+ businesses)
        - Driver (regulatory)
        - 2026-2028 preparation phase
        - Forces digital invoice + payment integration; drives SME demand for API-based B2B payment platforms
        - Assess whether Nium has a VAT-compliance product roadmap
      - - E-commerce globalization and cross-border SME supplier payments
        - Driver
        - Structural (5-10 year)
        - Expanding SME cohort with international suppliers; Nium's embedded finance partners reach SMEs
        - Track SME vs. enterprise revenue mix over time
      - - 'Visa B2B virtual card volume: 25% YoY growth (FY2025)'
        - Driver
        - Ongoing
        - Cards increasingly preferred for B2B spend management; Nium Embed card issuance directly benefits
        - Request Nium Embed card issuance volume and growth rate for FY2024-FY2025
      - - AML/KYC regulatory fragmentation across 40+ jurisdictions
        - Constraint
        - Ongoing — compounding as Nium enters new markets
        - Increases compliance cost per corridor; slows client onboarding; requires large compliance team
        - Request headcount and spend on compliance/regulatory as % of total operating costs
      - - FX volatility in emerging-market corridors
        - Constraint
        - Ongoing — episodic spikes
        - Margin compression in high-volatility corridors; risk of corridor suspension
        - Request corridor-level P&L and FX risk hedging policy
      - - Shrinking correspondent banking network (de-risking by tier-2 banks)
        - Driver + Constraint
        - Structural (10+ year trend)
        - Reduces traditional competition; also forces Nium to maintain direct settlement relationships in more markets
        - Map Nium's direct settlement bank relationships vs. sub-correspondent-dependent corridors
      - - Cybersecurity risk in high-volume payment flows
        - Constraint
        - Ongoing
        - Data breach or fraud event could cause regulatory license suspension and client churn
        - Request cybersecurity audit reports and incident history
    notes: >-
      Magnitude ratings are qualitative assessments synthesized from Mordor Intelligence, BIS, Allied Market Research,
      and PYMNTS sources. All 'Diligence Ask' items require direct data from Nium management; none of the underlying
      metrics are publicly disclosed.
