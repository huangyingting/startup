      - number: '3.4'
        title: Switching Costs and Multi-Homing Dynamics
        blocks:
          - type: paragraph
            body: >-
              B2B payment infrastructure customers face moderate-to-high switching costs once integrated but frequently
              multi-home across two to three providers. API integration is the primary source of lock-in: rebuilding
              payment routing logic, compliance workflows, and reconciliation systems for a new provider typically
              requires three to nine months of engineering work for enterprise clients. Nium's proprietary compliance
              onboarding — covering KYC, AML, and sanctions screening across 40-plus regulatory jurisdictions — creates
              an additional compliance-migration cost for customers switching to providers with narrower regulatory
              licensing.

              However, multi-homing is the norm rather than the exception in enterprise payments infrastructure.
              Enterprise fintech clients frequently use Nium for specific corridors (e.g., APAC real-time payouts) while
              using Airwallex or Wise Platform for other corridors. This reduces churn risk for incumbent providers but
              also limits Nium's wallet share in any single client relationship. Nium's 285,000-plus businesses using
              its real-time payment network monthly (per PYMNTS) indicates a long tail of smaller clients beyond its
              core enterprise segment — these relationships are stickier because smaller businesses have less
              engineering resource to maintain multiple integrations.

              Supply-side lock-in exists in Nium's case through its regulatory licenses: competitors wishing to
              replicate Nium's 40-plus-license portfolio would need three to five years and tens of millions in
              compliance investment across multiple jurisdictions. Currencycloud's acquisition by Visa accelerated its
              license access through Visa's existing financial institution relationships, reducing this barrier for that
              competitor. Airwallex has been actively building its own regulatory licensing portfolio since 2019 but has
              not yet disclosed a comparable license count.
            claimRefs:
              - CP026
              - CP027
              - CP028
              - CP029
              - CP030
      - number: '3.5'
        title: Moat Durability and Competitive Risk Assessment
        blocks:
          - type: paragraph
            body: >-
              Nium's three primary moat claims — geographic reach (190+ countries), regulatory licensing (40+ licenses),
              and real-time corridor depth (100+ corridors) — are each durable over a two-to-three-year horizon but face
              increasing competition at the margin. The regulatory licensing moat is the most defensible: building
              40-plus licenses requires jurisdictional expertise, capital, and time that cannot be shortcut. Airwallex's
              licensing build-out has taken seven-plus years and covers fewer jurisdictions. Currencycloud/Visa benefits
              from Visa's existing regulatory relationships but operates within Visa's strategic constraints.

              The primary commoditization risk is in FX rate compression. As more players enter the SWIFT alternative
              corridor market, FX spread margins decline. Nium's reported $125M FY2024 revenue on $50B-plus transaction
              volume implies an approximately 0.25% blended take rate — already near the compression floor for
              infrastructure providers. Further volume growth without take-rate compression requires product mix shift
              toward card issuance, embedded finance, and value-added compliance services where margins are higher.

              The most adverse competitive development as of 2026 is Airwallex's rapid fundraising trajectory ($5.6B
              valuation vs. Nium's $1.4B), which gives Airwallex approximately four times the implied capital to
              accelerate licensing, product development, and sales — a potential threat to Nium's growth momentum before
              its planned 2026 IPO. Nium's India ED/PMLA regulatory case (stayed by Kerala HC in September 2025) also
              creates reputational risk that could delay regulatory approvals in new jurisdictions.
