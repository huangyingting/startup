  - id: TM001
    title: Market definition table
    description: >-
      Defines the market segments Nium competes in, distinguishing included from excluded spend, identifying who pays,
      and explaining relevance to Nium's business model.
    columns:
      - Segment / Category
      - Included Spend
      - Excluded Spend
      - Buyer / Payer
      - Relevance to Nium
    rows:
      - - Global B2B payments (total TAM)
        - >-
          Business-to-business flows: trade settlements, supplier invoices, inter-company transfers, payroll, expense
          management
        - Consumer payments, government-to-citizen transfers, securities settlement
        - CFOs, treasury teams, AP/AR departments at 10M+ businesses globally
        - Full TAM context; Nium serves the infrastructure layer for cross-border flows within this total
      - - Cross-border B2B payments (primary SAM)
        - >-
          International supplier payments, export/import settlements, cross-border payroll, FX conversions, real-time
          remittances to business accounts
        - Domestic B2B payments, intra-EU payments below SEPA thresholds where legacy rails suffice
        - Multinational enterprises, fintechs with global clients, gig platforms with international contractors
        - Nium's highest-value product line (Nium Transact pay-out + Nium Receive pay-in); 190+ countries
      - - Real-time payment rails (infrastructure enabler)
        - 'Instant payment network transactions: FedNow, UPI, SEPA Instant, PayNow, PromptPay, Interac'
        - Batch ACH, card-on-file, checks, cryptocurrency speculation
        - Enterprise fintechs, digital banks, PSPs embedding real-time payment capability
        - Nium's real-time corridor network (100+ instant corridors); enables same-day disbursements
      - - Card issuance and virtual cards (B2B spend management)
        - >-
          Corporate virtual card issuance, travel management virtual cards, B2B procurement cards, card-based expense
          management
        - Consumer credit/debit cards, consumer prepaid cards
        - Enterprise procurement teams, travel management companies, gig-economy platforms
        - Nium Embed product; card issuance in 34+ countries; Ixaris acquisition (2021) added travel vertical
      - - Embedded finance / BaaS (adjacency)
        - White-label payment accounts, multi-currency wallets, API-embedded payment flows for non-bank fintechs
        - Full banking (deposits, lending, insurance), securities brokerage
        - Neobanks, insurtech platforms, marketplace operators embedding financial services
        - Nium's BaaS and Nium Embed; growing adjacency — not yet primary revenue driver
    notes: >-
      Market boundary definitions follow Mordor Intelligence (B2B payments) and Allied Market Research (cross-border).
      Nium explicitly excludes consumer remittances from its B2B-focused strategy while retaining Instarem as a wholly
      owned consumer subsidiary. Domestic payments within single jurisdictions are included in TAM but represent an
      indirect opportunity through embedded finance partners.
    claimRefs:
