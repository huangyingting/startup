  - number: 7
    title: Risks
    sections:
      - number: '7.1'
        title: Regulatory and Legal Risk
        blocks:
          - type: paragraph
            body: >-
              Nium holds 40-plus regulatory licenses spanning 190-plus countries — both its primary competitive moat and
              its most operationally complex risk. Each license imposes ongoing capital adequacy requirements, periodic
              regulatory examination, transaction monitoring obligations, and AML/CFT program maintenance. License
              revocation in a major market (MAS Singapore, FCA UK, or a large EU jurisdiction) would be catastrophic —
              immediately disabling cross-border payment capabilities for affected corridors. The MAS Major Payment
              Institution framework requires Nium to maintain minimum liquid capital reserves and to comply with the
              Payment Services Act 2019. The FCA Electronic Money Institution authorization requires Nium UK to
              ring-fence client funds and comply with the Payment Services Regulations 2017. The European Banking
              Authority (EBA) oversees EMI framework compliance across EU member states, and post-Brexit passporting
              arrangements mean Nium must maintain separate EU-jurisdiction licenses to serve European customers.

              The India Enforcement Directorate (ED) PMLA (Prevention of Money Laundering Act) investigation against
              Nium is the most material active legal risk. The Kerala High Court stayed enforcement action in September
              2025, but the underlying investigation is ongoing. India is a major payment corridor — a significant
              source of inbound remittances and outward B2B payments. If the Kerala HC stay is reversed or the ED
              secures an adverse ruling, Nium's Indian operations could be suspended or materially restricted, impacting
              both the Instarem consumer remittance business and B2B corridors involving Indian counterparties. The
              legal uncertainty is also a direct risk to the planned US IPO: US underwriters and institutional investors
              are likely to require resolution or clear ring-fencing of the India ED case before proceeding.

              FATF's 40 Recommendations define AML/CFT standards that all payment service providers operating
              internationally must comply with. Non-compliance with FATF standards in any jurisdiction creates the risk
              of enforcement action, license suspension, or correspondent banking withdrawal — all of which would
              disable payment processing in affected corridors.
            claimRefs:
