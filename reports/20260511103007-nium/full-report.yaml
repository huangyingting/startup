          type: process
        - id: w3
          label: Compliance Check (AML, KYC/KYB, OFAC sanctions in-line)
          type: process
        - id: w4
          label: Multi-Rail Routing (SWIFT vs local instant vs USDC)
          type: process
        - id: w5
          label: FX Conversion (interbank rate + spread applied)
          type: process
        - id: w6
          label: Payment Execution (via selected rail)
          type: process
        - id: w7
          label: Webhook Notification (payment confirmed / failed)
          type: output
