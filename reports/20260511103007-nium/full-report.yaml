  - id: FE001
    title: Product architecture map
    type: stack
    description: >-
      Nium's platform architecture from client API interface to network connectivity and compliance, showing key layers,
      modules, and dependencies.
    claimRefs:
      - CE001
      - CE002
      - CE003
      - CE009
      - CE015
    data:
      layers:
        - label: Client Interface Layer
          modules:
            - REST API (JSON / OpenAPI)
            - Webhook Event Notifications
            - Enterprise SDKs (Java, Node.js, Python, PHP)
            - Sandbox / Developer Environment
          note: Single unified API for all three product modules; OpenAPI-spec compatible
        - label: Product Module Layer
          modules:
            - Nium Transact — Pay-Out (100+ currencies, 190+ countries)
            - Nium Receive — Pay-In (40+ currencies, virtual accounts)
            - Nium Embed — Card Issuance BaaS (34+ countries, Visa + MC)
            - Instarem Consumer (retained brand)
          note: Three B2B modules share underlying infrastructure; Instarem is a separate UX
        - label: Business Logic Layer
          modules:
            - FX Engine (real-time rate calculation + spread)
            - Multi-Rail Routing Intelligence
            - Compliance Orchestration (AML, KYC/KYB, OFAC)
            - Ledger and Reconciliation Engine
          note: Technology stack (cloud provider, DB) not publicly disclosed
        - label: Network Connectivity Layer
          modules:
            - SWIFT Messaging (ISO 20022 migration in progress)
            - Local Instant Rails (UPI, FAST, PayNow, UK Faster Payments, 100+ total)
            - Visa / Mastercard Card Networks
            - Stablecoin / USDC Rail (Visa pilot, November 2025)
          note: 100+ instant corridors; corridor-level SLAs not published
        - label: Regulatory and Compliance Layer
          modules:
            - 40+ Regulatory Licenses (MAS MPI, FCA EMI, 38+ others)
            - Capital Adequacy Reserves (MAS + FCA requirements)
            - AML / CFT Program
            - Sanctions Screening (OFAC, UN, EU)
          note: Licensing stack is primary technology moat; replicated by few competitors at this scale
  - id: FE002
    title: Customer workflow / operating flow
    type: flow
    description: >-
      How an enterprise client uses Nium's REST API to initiate a cross-border payment from account funding through
      compliance check, rail selection, and final settlement.
    claimRefs:
