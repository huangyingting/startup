companyProfile:
  summary: >
    Nium was founded in 2014 in Singapore by Prajit Nanu (CEO) and Michael Minassian as Instarem, initially focused on
    consumer remittances between Asia and India. The company rebranded to Nium as it pivoted to B2B payments
    infrastructure, building an API-first platform for global real-time payments, multi-currency wallets, card issuance,
    and banking-as-a-service. Nium raised $312M+ across Series A through E, with notable investors including Visa,
    Temasek, Vertex Ventures, and Global Founders Capital. The 2022 Series D at $2.1B established the peak valuation;
    the 2024 Series E at $1.4B reflected a 33% compression on growth deceleration and market multiple repricing. Nium's
    FY2024 ACRA-filed financials show SGD 167.2M revenue (+13.3% YoY), SGD 88.1M net loss, and SGD 804.5M total assets.
    The company targets a US IPO in late 2026.
