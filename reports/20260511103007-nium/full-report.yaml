      - number: '7.3'
        title: Technology and Competitive Risk
        blocks:
          - type: paragraph
            body: >-
              Nium's primary competitive risks come from three sources: (1) well-funded vertical incumbents expanding
              their licensing and corridor footprints; (2) horizontal technology disruption from stablecoin/CBDC rails;
              and (3) open-source and cloud-native infrastructure commoditizing parts of Nium's stack.

              Airwallex has raised over $900M and holds EMI licenses in the UK and Europe while expanding aggressively
              in North America and Asia-Pacific. Currencycloud (acquired by Visa in 2021) has access to Visa's global
              network and capital. Stripe Treasury provides payment infrastructure services bundled with Stripe's
              ecosystem. These competitors offer increasingly overlapping products — multi-currency accounts,
              cross-border transfers, card issuance — with the advantage of Visa/Mastercard network relationships that
              are difficult to replicate. Wise Business competes in the SME segment with transparent FX pricing that
              challenges Nium's undisclosed FX spread model.

              ISO 20022 migration of SWIFT messaging (completing by 2025-2026) requires Nium to upgrade its messaging
              infrastructure. This is a compliance cost rather than a strategic opportunity, but failure to upgrade
              timely could result in SWIFT connectivity issues. Stablecoin payment rails — exemplified by Nium's own
              November 2025 USDC pilot with Visa — represent a 5-plus year technology disruption vector: if USDC or CBDC
              rails scale to replace fiat correspondent banking, Nium's corridor licensing moat could be partially
              disintermediated. Moov.io and other open-source payment infrastructure projects address the
              developer-experience gap but do not replicate Nium's regulatory licensing footprint.

              The FX spread opacity (Nium does not publish FX mark-up rates) creates pricing risk: if enterprise clients
              with high negotiating leverage demand disclosed FX pricing, Nium's current non-disclosure may no longer be
              sustainable post-IPO.
            claimRefs:
              - CR017
              - CR018
              - CR019
              - CR020
              - CR021
              - CR022
              - CR023
