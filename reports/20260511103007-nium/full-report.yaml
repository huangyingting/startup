      - number: '5.2'
        title: Technology and Operating Architecture
        blocks:
          - type: paragraph
            body: >-
              Nium's technology stack operates as a multi-layer payment infrastructure platform. At the client interface
              layer, a REST API with OpenAPI-compatible documentation exposes payment initiation, account management,
              compliance status, and settlement inquiries through a consistent interface. Webhooks provide asynchronous
              event notifications for payment state changes. The business logic layer houses Nium's FX engine,
              multi-rail routing intelligence, compliance orchestration, and ledger management. The FX engine performs
              real-time rate calculation at the point of payment, pulling interbank mid-market rates and applying spread
              before presenting a locked rate to the customer. The routing engine selects the optimal payment rail —
              SWIFT, local ACH, instant rail, or stablecoin — for each transaction based on corridor availability,
              settlement speed, and cost.

              At the network connectivity layer, Nium maintains licensed access to SWIFT messaging, 100-plus local
              real-time payment rails including UPI (India), FAST (Singapore), PayNow (Singapore), UK Faster Payments,
              and equivalents across Asia-Pacific, Europe, and the Americas. The settlement and data layer handles
              multi-currency ledger reconciliation, float management, and regulatory reporting. The compliance layer
              performs in-line AML/CFT screening, KYC/KYB verification, and OFAC sanctions checking on every
              transaction. Nium's specific cloud provider, database technology, and programming language stack are not
              publicly disclosed. From the nium-global GitHub organization, SDKs are available in multiple languages
              including Java, Node.js, Python, and PHP, suggesting a polyglot development approach consistent with
              cloud-native practices. ISO 20022 migration across global payment networks is ongoing; Nium's architecture
              must support evolving message formats as SWIFT and regional rails complete their ISO 20022 migration by
              2025-2026.
