      - number: '4.6'
        title: Exhibits
        blocks:
          - type: callout
            title: Revenue Growth Deceleration Signals a Structural Concern for the IPO Thesis
            body: >-
              Nium's revenue growth decelerated from 2.7× in FY2022 (USD 82M net revenue, 2.7× YoY) to 13.3% in FY2024
              (SGD 167.2M). This is not merely a base-effect normalization: Wise grew at 24% YoY in its most recent
              fiscal year while operating profitably; Payoneer reported $961M in FY2024 revenue (+15% YoY) and turned
              consistently profitable. For a company targeting a US IPO in late 2026 at an implied valuation premium
              over the current $1.4B Series E price, investors will require evidence that growth can re-accelerate to
              25-plus percent annually. Management must explain whether the 13.3% growth reflects corridor saturation,
              competitive pricing pressure, deliberate volume-quality trade-offs, or a temporary seasonal factor.
              Without this explanation, underwriters will struggle to build a credible IPO valuation above the current
              private-market price.
