      - number: '3.2'
        title: Competitor Profiles
        blocks:
          - type: paragraph
            body: >-
              Wise Business targets freelancers, SMBs, and midsize enterprises seeking transparent, low-cost
              international transfers. Its key proposition is the mid-market exchange rate with no hidden markup — a $31
              one-time account setup fee covers the full product suite for US customers. Wise Platform (separate from
              Wise Business) provides API-based cross-border payment infrastructure for banks and enterprises, similar
              to Nium's model, with confirmed partnerships including Bank Mandiri in Indonesia. Wise is London Stock
              Exchange listed, giving it public-company governance and capital access advantages over Nium's private
              status.

              Airwallex is the most comparable infrastructure competitor. Founded in Melbourne in 2015, it raised $100M
              in a Series F1 round in October 2024, reaching a $5.6B valuation. Airwallex offers global accounts,
              expense management, payment APIs, and card issuance across 150-plus countries. Its pricing structure
              ranges from a free Explore plan to a $49/month Growth plan, with enterprise pricing on custom terms.
              Airwallex targets the same enterprise fintech and SMB buyers as Nium and has been expanding card issuance
              and API capabilities.

              Stripe Issuing and Stripe Treasury address developer-first companies building embedded card and banking
              products. Stripe's global scale ($65B valuation, $1T+ annual payment volume) dwarfs Nium, but its
              international infrastructure focus skews heavily toward US and EU markets. Stripe Treasury is available
              exclusively for US-based platforms, limiting its cross-border corridor relevance outside established
              markets.

              Payoneer (NASDAQ: PAYO) reported $961.7M in FY2024 revenue — nearly seven times Nium's SGD 167.2M ($125M
              equivalent). Payoneer's primary differentiator is its marketplace payout network: deep integrations with
              Amazon, Wish, Lazada, Upwork, and Fiverr position it as the dominant platform for cross-border freelancer
              and seller payments. Payoneer serves 5M-plus customers across 190-plus countries but is not primarily an
              infrastructure API provider for enterprise clients.

              Currencycloud, acquired by Visa in 2021 for $963M, processes $100B-plus in transactions globally, supports
              180-plus countries and 35 payout currencies, and offers an API-first embedded payments platform — the most
              direct functional equivalent to Nium Transact. Banking Circle, an EU banking licensee founded in 2015,
              focuses on European payment service providers and fintechs needing virtual IBAN accounts and
              multi-currency clearing, with limited global reach outside Europe.
