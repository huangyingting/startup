      - number: '7.2'
        title: Operational and Financial Risk
        blocks:
          - type: paragraph
            body: >-
              Nium's FY2024 net loss of SGD 88.1M on SGD 167.2M revenue implies an operating loss margin of
              approximately 53%. Total assets were SGD 804.5M, the majority of which represents customer float (client
              payment funds held in transit and reserve accounts for regulatory capital compliance). The company is not
              generating operating cash flow and remains dependent on equity capital. Total raised is approximately
              $312M through Series E (June 2024, $50M raise at $1.4B valuation). With SGD 88.1M in annual losses, the
              runway depends on the remaining cash from the Series E combined with any operating cash flow improvements
              from revenue growth. If Nium fails to achieve cash flow breakeven within 18-24 months of the Series E
              close, it will need to raise additional capital or accelerate the IPO timeline — both of which carry
              execution risk in the current fintech market.

              The October 2023 layoffs (~10% of headcount) may reflect operational cost reduction in response to slower
              revenue growth and investor pressure. FY2024 revenue growth decelerated to 13.3% YoY, down from 2.7x YoY
              in FY2022 — a significant deceleration that suggests either market saturation in primary verticals,
              customer churn offsetting new acquisition, or pricing pressure. The AML/CFT compliance cost embedded in
              Nium's cost structure is a permanent overhead: regulatory examination, transaction monitoring software,
              compliance personnel, and capital reserves are not variable costs that can be eliminated in a down-cycle.

              Operational reliability risk — undisclosed API uptime SLAs and no published incident record — creates
              enterprise trust gaps that may be constraining customer acquisition or causing churn among high-volume
              clients. Payment infrastructure providers that experience significant outages or settlement delays face
              contractual penalty exposure and reputational damage that compounds with enterprise buyers' word-of-mouth
              networks.
