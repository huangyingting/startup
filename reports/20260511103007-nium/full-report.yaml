  - number: 2
    title: Market Analysis
    sections:
      - number: '2.1'
        title: Market Definition and Scope
        blocks:
          - type: paragraph
            body: >-
              The B2B payments market encompasses all financial transactions where a business pays another business for
              goods, services, payroll, inter-company transfers, or trade settlements. It spans domestic and
              cross-border flows, covers multiple payment rails (wire, ACH/SEPA batch, real-time instant, card, and
              emerging digital-asset rails), and includes the full spectrum of enterprise sizes from micro-SMEs to
              multinational corporations.

              Nium's serviceable market sits at the intersection of two high-growth sub-segments: cross-border B2B
              payments and card issuance/embedded finance. Cross-border B2B payments are defined as commercial
              transactions that cross a national border and require currency conversion, regulatory compliance in
              multiple jurisdictions, and settlement across correspondent banking networks or direct instant-payment
              rails. These transactions are structurally more expensive than domestic equivalents — traditional
              cross-border flows pass through three to five intermediary banks before settlement, each adding latency
              (typically 1-5 business days) and a fee (typically 1-5% of transaction value) — creating the core problem
              Nium addresses.

              Status-quo substitutes for Nium's B2B infrastructure include SWIFT correspondent banking (the legacy
              incumbent for large corporates), bank wire transfers (costly, slow), money transfer operators such as
              Western Union Business Solutions, and internal treasury systems at the largest multinationals. The
              adjacent TAM segments that Nium does not yet fully address include consumer remittances, domestic payments
              within single jurisdictions, and securities settlement — though the embedded finance (BaaS) roadmap may
              expand adjacently into domestic-payment infrastructure for fintech clients.
            claimRefs:
              - CM001
              - CM002
