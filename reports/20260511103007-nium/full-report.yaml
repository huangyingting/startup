      - number: '7.6'
        title: Exhibits
        blocks:
          - type: callout
            title: India ED/PMLA Legal Risk Is the Most Consequential Near-Term Risk
            body: >-
              The India Enforcement Directorate PMLA investigation against Nium, stayed by Kerala HC in September 2025,
              is the most consequential and most uncertain risk in this diligence. India is a major payment corridor for
              Nium — both through Instarem consumer remittance and B2B UPI/instant payment routes. If the stay is
              reversed and ED secures enforcement, Nium's India operations could be suspended, affecting both revenue
              and the planned US IPO (US underwriters and institutional investors typically require material legal
              uncertainty to be resolved or ring-fenced before proceeding). Investors should request the current status
              of all India legal proceedings, the India revenue percentage of total revenue, and whether Nium's legal
              team has independent international counsel engaged.
            calloutType: risk
            claimRefs:
              - CR001
              - CR002
              - CR003
              - CR006
          - type: callout
            title: Burn Rate and Valuation Compression Create Pre-IPO Pressure
            body: >-
              Nium's SGD 88.1M FY2024 net loss, 13.3% revenue growth deceleration (from 2.7x in FY2022), and valuation
              compression from $2.1B to $1.4B create a difficult pre-IPO context. If the company cannot demonstrate a
              credible path to profitability in its IPO S-1, US institutional investors will price the float at a
              significant discount to the current $1.4B private valuation. The CFO (Andre Mancl, hired August 2024) must
              manage this narrative while dealing with the India legal overhang. The window for a successful IPO is
              2026; if macroeconomic conditions deteriorate or the India case escalates, 2027 becomes the realistic
              earliest window — requiring either bridge financing or additional equity at potentially further compressed
              valuations.
            calloutType: risk
            claimRefs:
              - CR009
              - CR010
              - CR025
              - CR028
  - number: 8
    title: Valuation
    sections:
      - number: '8.1'
        title: Investment Thesis and Anti-Thesis
        blocks:
          - type: paragraph
            body: >-
              The investment thesis for Nium rests on three pillars: (1) a structural market opportunity in B2B
              cross-border payments, projected to reach $4.4 trillion in transaction value by 2033 at 7.7% CAGR; (2)
              Nium's 40-plus license stack across 190-plus countries, which took years and $312M in capital to build and
              creates a durable barrier to entry; and (3) an API-first architecture with 285,000+ businesses on the
              monthly RTP network, providing switching-cost defensibility and a growing transaction volume base ($50B+
              annually as of February 2026). The company targets a late-2026 US IPO that would provide liquidity and
              capital for continued growth, and the Visa USDC pilot positions Nium as a participant in the
              next-generation payment infrastructure layer.

              The anti-thesis is equally compelling: revenue growth has decelerated sharply from 2.7x (FY2022) to 13.3%
              (FY2024), while losses have widened to SGD 88.1M — a 53% loss margin that suggests the business model
              requires significantly more scale before generating positive operating cash flow. The India ED/PMLA
              investigation (stayed by Kerala HC in September 2025) represents the most consequential legal risk and may
              prevent or delay the US IPO. The current $1.4B valuation at ~11x revenue already prices in a premium
              growth story, leaving limited margin of safety if conditions deteriorate.

              The recommendation is conditional hold/watch: Nium is well-positioned in a large structural market with
              defensible IP, but the pre-IPO risk profile (India legal overhang, burn rate, growth deceleration)
              requires active monitoring. Investment conviction should increase if: India legal proceedings are resolved
              or ring-fenced, FY2025 revenue growth re-accelerates above 20%, and IPO S-1 is filed with no material new
              legal disclosures.
            claimRefs:
              - CV001
              - CV002
              - CV003
              - CV004
              - CV005
