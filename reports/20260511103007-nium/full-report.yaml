      - number: '1.3'
        title: Leadership and Governance
        blocks:
          - type: paragraph
            body: >
              Nium's leadership team has undergone significant evolution since the company's founding. Prajit Nanu
              remains the co-founder and CEO, having led the company from its consumer remittance origin through its B2B
              transformation, unicorn milestone, and ongoing IPO preparation. Michael Bermingham, the other original
              co-founder, has maintained a leadership presence though his current operational title has evolved over
              time (Wikipedia lists him as COO while the company's more recent public materials do not cite his title
              explicitly). As of February 2026, the executive committee includes Andre Mancl (CFO, appointed mid-2024),
              Anupam Pahuja (Chief Revenue Officer), Alex Johnson (Chief Payments Officer), Spencer Hanlon (Chief
              Operations Officer), and Rissy Ruddy (Chief Human Resources Officer).

              In February 2026, Nium announced three new C-suite appointments focused on the company's next growth phase
              at the intersection of AI, stablecoins, and programmable money: Sekhar Cidambi as Chief Technology Officer
              (previously at Coinbase, Visa, FIS, Amazon, and Symantec), Danielle Gotkis as Chief Marketing Officer
              (previously at dLocal, Recurly, Feedzai), and Amaresh Mohan as Chief Risk and Compliance Officer
              (previously at Stripe, PayPal, and GoTo). The board includes representatives from major institutional
              investors including Riverwood Capital, Visa, and GIC, as well as independent directors Huey Lin (GGV
              Capital) and David Yates (Siris Capital Group), appointed in October 2022. Key-person risk is concentrated
              in CEO Prajit Nanu, whose vision, relationships, and public profile are central to the company's identity
              and investor confidence.
