  - number: 3
    title: Competitors
    sections:
      - number: '3.1'
        title: Competitive Landscape Overview
        blocks:
          - type: paragraph
            body: >-
              The global B2B payments infrastructure market has no clear winner. At least six substantive competitors
              address overlapping customer segments across real-time cross-border payments, card issuance,
              multi-currency accounts, and embedded banking services. Nium positions itself at the intersection of three
              capabilities — real-time payment corridors, regulatory licensing across 40-plus jurisdictions, and card
              issuance BaaS — that individually attract different rivals.

              The competitive universe divides into four categories. Direct peers are infrastructure-first B2B platforms
              that compete on the same enterprise and fintech buyer: Airwallex and Currencycloud (Visa). Adjacent
              consumer-to-SMB players include Wise Business and Payoneer, which address enterprise buyers through
              slightly different value propositions (transparency and marketplace payouts respectively) but are
              converging upmarket. Developer-platform adjacent players include Stripe, which offers card issuance and
              banking APIs but is predominantly US and EU focused without Nium's emerging-market corridor depth.
              Incumbents — primarily SWIFT and correspondent banking networks — hold the lion's share of large-value
              corporate cross-border volume but lose ground on speed, cost, and developer experience. Likely new
              entrants include large cloud platforms (AWS, Google) with embedded finance offerings and stablecoin/CBDC
              rails that could disintermediate multiple players simultaneously over a five-plus-year horizon.

              Nium's $50B-plus in annual transaction volume (as of February 2026) and SGD 167.2M in FY2024 revenue
              position it as mid-scale relative to Wise's UK-listed operation and Payoneer's near-$1B revenue, but ahead
              of Airwallex's last disclosed revenue figures. The market is not winner-take-all: customers routinely
              multi-home across two to three infrastructure providers, and no competitor has achieved a dominant share
              of global B2B cross-border payment volume.
