      - number: '6.5'
        title: Expansion and Concentration Risk
        blocks:
          - type: paragraph
            body: >-
              Nium's land-and-expand model operates through payment volume growth within existing enterprise clients: as
              Nium customers grow their own businesses, they process more volume through Nium's infrastructure,
              generating revenue growth without additional CAC. This volume-expansion dynamic is the primary source of
              organic revenue growth for Nium and is common among payment infrastructure providers. Enterprise sales
              expansion also follows the "product footprint expansion" path — a TMC client who starts with Transact
              (pay-out) may add Receive (virtual accounts) or Embed (card issuance) over time.

              Customer concentration risk is unknown: Nium has not disclosed what percentage of revenue comes from its
              top 5 or top 10 clients. For a company with $50B in transaction volume and SGD 167.2M in revenue, a
              significant share of volume likely comes from a small number of high-volume enterprise clients (payroll
              platforms, large TMCs, or fintech platforms processing billions in payments). If the top 5 clients
              represent 40-plus percent of revenue, the loss of a single client would be material. This is a standard
              enterprise B2B risk that Nium has not addressed in public communications.

              Partner channel dependence is also undisclosed. Nium sells primarily direct, but some corridors and
              geographies may rely on local banking partners, correspondent banks, or reseller relationships. Disruption
              to these partner relationships could affect service quality in specific corridors. The India ED/PMLA legal
              case (Kerala HC stay as of September 2025) could affect Nium's India- related customer relationships if
              the legal situation escalates.
