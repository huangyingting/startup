      - number: '7.5'
        title: Mitigations and Kill Criteria
        blocks:
          - type: paragraph
            body: >-
              Nium's primary risk mitigations are structural: the 40-plus license stack creates high barriers to entry
              that protect the existing franchise even under competitive pressure; the API integration switching costs
              create defensible customer retention; and the diversified geographic licensing footprint means that
              regulatory action in one jurisdiction does not disable the entire platform. The Kerala HC stay on the
              India ED/PMLA case is a meaningful short-term mitigation, though not a permanent resolution.

              The CFO hire (Andre Mancl, August 2024) and CCO hire signal preparation for the IPO's disclosure and
              compliance requirements. The Visa USDC stablecoin pilot positions Nium as a participant in next-generation
              rail development rather than a passive incumbent. ISO 20022 migration compliance, while operationally
              demanding, is also being executed by all market participants simultaneously — it is not a Nium-specific
              disadvantage.

              Thesis-break scenarios that would warrant investment reconsideration include: (1) MAS or FCA license
              revocation or suspension; (2) India ED/PMLA legal case resulting in business suspension in India; (3)
              revenue decline YoY (not just deceleration); (4) loss of a top-3 enterprise client representing greater
              than 15% of revenue; (5) CEO departure before IPO; (6) failed IPO (withdrawn or priced below $1.0B
              valuation). These scenarios are not currently anticipated but represent the specific conditions under
              which the investment thesis breaks.
            claimRefs:
              - CR030
              - CR031
              - CR032
              - CR033
              - CR034
