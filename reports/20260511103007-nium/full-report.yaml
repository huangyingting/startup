      - number: '8.4'
        title: Exit Readiness and IPO Timeline
        blocks:
          - type: paragraph
            body: >-
              Nium's IPO preparation is actively underway. The CFO hire (Andre Mancl, August 2024) and CCO appointment
              signal IPO-readiness infrastructure building. Nium relocated to a new Singapore HQ in late 2024, signaling
              organizational commitment to the IPO process. The company has publicly indicated a late-2026 US listing
              target through multiple media channels. The Visa partnership and USDC stablecoin pilot (November 2025)
              support the IPO narrative of next-generation payment infrastructure.

              Key milestones for IPO execution: (1) SEC S-1 registration statement filing, typically 6-12 months before
              pricing; (2) PCAOB-compliant audit of FY2024 and FY2025 financial statements; (3) India ED/PMLA case
              resolution or ring-fencing in disclosures; (4) underwriter mandate announcement; (5) IPO road show. The
              S-1 should be filed by Q2 2026 if the company targets an H2 2026 pricing.

              Dilution risk: total raised of $312M with 40-plus investors across Series A-E creates a complex cap table.
              Preference overhang from venture rounds (liquidation preferences, anti-dilution provisions) could create
              pricing tension at IPO, particularly if the IPO prices at or below the $1.4B Series E post-money
              valuation. Public market investors should evaluate whether the primary proceeds from the IPO go to the
              company (growth capital) or to secondary sellers (existing investor liquidity).
            claimRefs:
              - CV019
              - CV020
              - CV021
              - CV022
              - CV023
          - type: table
            tableRef: TV005
            claimRefs:
              - CV024
              - CV025
              - CV026
              - CV027
              - CV028
      - number: '8.5'
        title: Diligence Asks and Thesis-Break Triggers
        blocks:
          - type: paragraph
            body: >-
              The most critical diligence asks for Nium's valuation are: (1) India revenue breakdown (Instarem consumer
              + B2B corridor) as a percentage of FY2024/FY2025 total — to quantify the financial impact of the India ED
              case risk; (2) current MAS capital adequacy position relative to the MPS minimum requirements — to assess
              burn rate risk within the Singapore regulatory license framework; (3) FY2025 YTD revenue and growth rate —
              to determine whether the growth deceleration trend is continuing, stabilizing, or reversing; (4) NRR (net
              revenue retention) by customer cohort — to assess whether existing enterprise clients are expanding or
              churning; (5) IPO S-1 timeline and underwriter mandate status.

              Thesis-break scenarios (conditions under which the investment thesis is invalidated): (1) India ED/PMLA
              stay reversed and India operations suspended — reduces TAM and triggers IPO delay, forcing bridge
              financing at compressed valuation; (2) FY2025 revenue YoY decline — signals market saturation or major
              customer churn that cannot be reversed before IPO; (3) CEO departure before IPO — signal event that causes
              institutional investor uncertainty and potentially forces IPO delay; (4) IPO priced below $1.0B — return
              scenario unacceptable for Series E investors; (5) MAS or FCA license revocation — existential threat to
              the B2B platform.
            claimRefs:
              - CV024
              - CV025
              - CV026
              - CV027
              - CV028
              - CV029
          - type: table
            tableRef: TV006
            claimRefs:
              - CV024
              - CV025
              - CV029
              - CV030
      - number: '8.6'
        title: Exhibits
        blocks:
          - type: callout
            title: The $1.4B Valuation Is Fair, Not Cheap — Upside Requires Execution
            body: >-
              At $1.4B (June 2024 Series E), Nium is priced at approximately 11x FY2024 revenue — a premium to public
              comparables (Payoneer at 2.5-3.5x; dLocal at 3-4.5x; Flywire at 3.5-5x) but consistent with pre-IPO
              private market convention for a high-growth payment infrastructure company. This valuation is not cheap:
              it prices in continued revenue growth, and any meaningful deceleration below 10-15% YoY would make the
              $1.4B difficult to maintain in IPO pricing. The bull case return (1.4-1.8x at $2.0-2.5B IPO) requires both
              India legal resolution AND growth re-acceleration — two conditions that are independent and each
              uncertain. Investors should size position to reflect this conditional upside.
            calloutType: insight
            claimRefs:
              - CV007
              - CV008
              - CV011
              - CV013
          - type: callout
            title: India ED/PMLA Case Is the Most Binding Valuation Constraint
            body: >-
              The India ED/PMLA investigation is not just a legal risk — it is a valuation constraint. US underwriters
              and institutional IPO investors will require either full resolution of the India case or comprehensive
              ring-fencing in the S-1 disclosures before proceeding. If the Kerala HC stay is reversed before the IPO,
              Nium would need to either suspend India operations, face a potential SEC registration delay, or disclose a
              material legal contingency that would significantly compress IPO pricing. The India revenue exposure
              (unmeasured publicly) is the key unknown: if India represents more than 20% of revenue, the financial
              impact of an adverse ruling is thesis-break level.
            calloutType: risk
            claimRefs:
              - CV004
              - CV006
              - CV025
              - CV026
