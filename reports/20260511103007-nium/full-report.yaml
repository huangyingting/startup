              On pricing, the market is structurally opaque for enterprise contracts. Nium's pricing is not publicly
              disclosed and is negotiated per client based on transaction volume, corridors, and product mix. Wise
              Business charges a transparent one-time $31 setup fee with FX fees of approximately 0.3-1.5% above
              mid-market rates, making its economics visible and predictable. Airwallex charges $0/month on its free
              tier with a 0.2-1.0% FX markup and per-transaction fees for card use. Payoneer historically charges 3% FX
              markup for SMBs with negotiated rates for enterprise accounts.

              The absence of transparent list pricing from Nium, Currencycloud, and Banking Circle is itself a
              competitive factor: it creates friction for SMBs evaluating options but allows enterprise pricing
              flexibility — a trade-off that favors Nium's enterprise-first go-to-market. Airwallex's transparent tiered
