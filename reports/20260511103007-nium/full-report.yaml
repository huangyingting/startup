            body: >-
              Nium has raised approximately $312M in total equity across Seed through Series E. The most recent round
              closed in June 2024 — a $50M Series E at a $1.4B pre-money valuation — representing a 33% discount to the
              $2.0–2.1B valuation implied by the 2022 Series D. This valuation markdown reflects both the broader
              fintech re-rating in 2023 and the company's slower revenue growth in FY2024. Andre Mancl was appointed CFO
