  - id: TM002
    title: TAM/SAM/SOM or sizing lens table
    description: >-
      Compares major analyst estimates of the B2B and cross-border payments market using different scopes,
      methodologies, and time horizons to provide a multi-lens sizing view.
    columns:
      - Publisher
      - Year (Base→End)
      - Geography
      - Value / CAGR
      - Methodology
      - Confidence
      - Limitation
    rows:
      - - Mordor Intelligence
        - 2025→2031
        - Global
        - $1.42T (2025) → $3.43T (2031); 15.48% CAGR
        - Total B2B payments market including domestic, all rails, all enterprise sizes
        - High — updated Feb 2026
        - Includes domestic flows which Nium does not primarily address; broadest possible TAM
      - - Mordor Intelligence (cross-border sub-segment)
        - 2025→2031
        - Global
        - 16.52% CAGR (sub-segment growth rate)
        - Cross-border B2B flows specifically within the total B2B payments market
        - High — same report, Feb 2026
        - Value not separately broken out in public summary; CAGR only
      - - Allied Market Research
        - 2024→2034
        - Global
        - $206.5B (2024) → $414.6B (2034); 7.1% CAGR
        - 'Cross-border payments (B2B + B2C + C2C) by channel: bank transfer, MTO, card, other'
        - High — established research firm
        - Includes non-B2B flows; fee/revenue market, not transaction volume
      - - Ripple (industry estimate)
        - 2023→2032
        - Global (B2B cross-border only)
        - $31.6T transaction volume → $50T by 2032 (~58% total growth)
        - Transaction volume (not revenue); B2B cross-border gross flows
        - Medium — vendor-sponsored estimate; volume not fee
        - Transaction volume overstates revenue opportunity by 100-200x; methodology not disclosed
      - - MarketsAndMarkets
        - 2023→2028
        - Global
        - $8.2B by 2028; 14.3% CAGR
        - B2B digital payment platform market (software/service fees only)
        - Medium — scope is narrowest of all estimates
        - Excludes float, FX spread, and network access fees; closest to Nium's actual revenue layer
      - - McKinsey & Company
        - 2019 baseline (historical)
        - Global (all cross-border)
        - $130T flows; $224B revenues; ~7% revenue CAGR pre-COVID
        - All cross-border payments revenue including wholesale, retail, B2B, B2C
        - High — established firm; 2019 baseline used for trend context
        - Outdated baseline (2019); does not capture post-COVID acceleration
      - - Mordor Intelligence (APAC sub-segment)
        - 2025→2031
        - Asia-Pacific only
        - 17.42% CAGR — fastest regional growth globally
        - APAC B2B payments sub-segment within global report
        - High — same Feb 2026 updated report
        - APAC-specific; North America holds 34.27% market share despite lower CAGR
    notes: >-
      Estimates vary by more than 150× in absolute value because they measure fundamentally different things: total B2B
      payment flows, cross-border fee-based revenues, or platform-only software fees. The approximately $8.2B
      MarketsAndMarkets figure (platform fees) is the most comparable to Nium's actual revenue model, while the $1.42T
      Mordor figure represents the broadest possible addressable universe. Investors should use the
      cross-border-specific estimates when sizing Nium's primary TAM.
