      - number: '7.4'
        title: People and Execution Risk
        blocks:
          - type: paragraph
            body: >-
              CEO Prajit Nanu is Nium's co-founder and most visible public face; his departure would be a material
              signal risk event for investors, enterprise customers, and the IPO process. The 2024 C-suite expansion
              (CFO Andre Mancl, new CCO) reduces key-person dependency by adding experienced finance and compliance
              leadership, but the company's identity remains closely tied to its founder CEO.

              The October 2023 ~10% headcount reduction created employee morale risk. Teamblind reviews and employee
              sentiment signals indicate concerns about work culture, growth trajectory, and management transparency at
              some levels within the organization — though these signals are directional rather than statistically
              definitive. Engineering and compliance talent retention is critical in Singapore's competitive fintech
              hiring market, where DBS, Grab, Sea Limited, and Revolut compete for the same engineering and risk
              management talent pool.

              The planned IPO on a US exchange is a significant execution risk: achieving the required SEC S-1
              disclosure standards, navigating the US underwriter due diligence process while the India ED/PMLA case
              remains unresolved, and pricing an IPO at or above the $1.4B current valuation requires sustained revenue
              growth and evidence of path to profitability. The 2024 valuation compression from $2.1B (peak) to $1.4B
              (Series E) signals that investors have already marked down the growth premium; the IPO must demonstrate a
              credible profitability roadmap to avoid further compression.
            claimRefs:
              - CR024
              - CR025
              - CR026
              - CR027
              - CR028
              - CR029
