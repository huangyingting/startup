      - number: '1.4'
        title: Funding History and Capital Structure
        blocks:
          - type: paragraph
            body: >
              Nium has raised approximately $312M across 11 funding rounds, with 37 investors including 30 institutional
              and 7 angel investors. The company's most significant funding event was the July 2021 Series D: a $200M
              raise led by Riverwood Capital, joined by Visa, Temasek, GIC, Vertex Ventures, Atinum Group, Beacon
              Venture Capital, and Rocket Capital, which elevated Nium to unicorn status as Southeast Asia's first B2B
              payments unicorn. The round valued Nium at over $1 billion. Additional capital was raised in 2022 at a
              peak valuation of approximately $2.0–2.1B from BOND, NewView Capital, Moore Capital, and Tribe Capital.

              In June 2024, Nium completed a Series E round, raising $50M led by the Brunei Investment Agency (BIA) at a
              post-money valuation of $1.4B — a deliberate reset of approximately 30% from the 2022 peak that management
              attributed to broader public market fintech valuation compression. CEO Nanu noted: "Whether you go public
              at $1 billion, $5 billion, it doesn't matter. Because the valuation is only when you get bought, or when
              you go through an IPO." The proceeds were earmarked primarily for M&A targeting growth-stage payment firms
              in Africa, the Middle East, and Latin America. A small Series E-II tranche of $2M was completed in April
              2025 from BIA and Endeavor. Visa has maintained a strategic investment relationship with Nium since at
              least Series C (May 2020). Total equity raised is approximately $312M per Tracxn; some sources cite $335M+
              when including all tranches. The company remains private with no confirmed public market listing as of the
              report date.
