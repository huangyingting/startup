      - number: '1.2'
        title: Founding History and Corporate Evolution
        blocks:
          - type: paragraph
            body: >
              Nium was founded in 2014 in Singapore by Prajit Nanu and Michael Bermingham under the name Instarem, short
              for "Instant Remittance." The platform launched in August 2015 in Australia with the first license
              application, aimed at providing transparent, low-cost consumer cross-border remittances. The B2B pivot
              came organically in 2016 when the company processed its first institutional bulk payment request, exposing
              the $60 trillion B2B payments opportunity versus the $800 billion consumer remittance market. Nanu has
              cited this moment as transformative: "We wanted to create the McDonald's of payment systems — standardised
              and consistent so people in any part of the world could build products on it."

              Pratik Gandhi, one of the earliest local hires (2016), was elevated to co-founder status in 2021 but
              departed in October 2023 — around the same time as the Chief Product Officer and the company's first 10%
              workforce reduction. The company rebranded to Nium in 2019 upon launching its B2B platform while retaining
              Instarem as a consumer service. Three acquisitions shaped the company's capabilities: Ixaris (London-based
              travel virtual card platform, 2021), Wirecard Forex India (Indian payments operations, 2021), and SoCash
              (Singapore alternative payments network, April 2022). By 2022, Nium reported SGD 117M in net revenue — a
              2.7x increase year-over-year — making it Singapore's first global fintech focused on payments to reach the
              $100M+ revenue run-rate milestone. In July 2023, Nium opened its new Singapore headquarters at Capital
              Tower with Deputy Prime Minister Heng Swee Keat presiding, signaling the company's importance to
              Singapore's fintech ecosystem.
