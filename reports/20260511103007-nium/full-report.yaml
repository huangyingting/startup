      - number: '8.3'
        title: Bull, Base, and Bear Scenarios
        blocks:
          - type: paragraph
            body: >-
              The bull case assumes India legal resolution (or successful ring-fencing in IPO disclosures), FY2025
              revenue growth re-acceleration to 20%+ (SGD 200M+), a credible profitability roadmap (EBITDA breakeven
              visible within 24 months of IPO), and a receptive US fintech IPO market. In this scenario, Nium could IPO
              at $2.0B–$2.5B, implying 12–15x forward revenue. Comparable precedents: Flywire's 2021 IPO at ~8x forward
              revenue; Payoneer's 2021 SPAC at ~6x forward revenue; dLocal's 2021 IPO at ~25x forward revenue
              (subsequently corrected).

              The base case assumes India legal risk stays (Kerala HC stay maintained), FY2025 revenue growth of 15-20%,
              continuing losses with some improvement in loss margin, and an IPO priced at $1.4B–$1.8B — at or modestly
              above the current Series E valuation. This is the most likely scenario given the current trajectory.
              Investors in the Series E at $1.4B would achieve a modest 0-1.3x return (flat to IPO pricing), which is
              insufficient for venture returns but represents a defensible outcome given the risk profile.

              The bear case assumes India ED/PMLA case escalates (stay reversed) or the US IPO window closes in 2026 due
              to macro conditions, forcing Nium to raise bridge capital at a compressed valuation of $700M–$1.0B (5–7x
              FY2024 revenue). Series E investors at $1.4B would face a loss scenario of 30-50% markdown.
            claimRefs:
              - CV013
              - CV014
              - CV015
              - CV016
              - CV017
              - CV018
