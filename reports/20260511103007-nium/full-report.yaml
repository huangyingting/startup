      - number: '2.3'
        title: Buyer and Segment Landscape
        blocks:
          - type: paragraph
            body: >-
              The B2B payments buyer landscape is segmented by industry vertical, enterprise size, and technical
              sophistication. At the infrastructure layer where Nium operates, the primary buyer types are enterprise
              fintechs, banks and financial institutions, airlines and travel management companies, gig-economy
              platforms, and mid-market enterprises with international supplier or employee bases.

              Enterprise fintechs (neobanks, payroll platforms, lending platforms, insurance fintechs) are Nium's
              highest- value buyer segment. They embed Nium's API into their own product, becoming resellers of Nium's
              network access. The decision-maker is typically the CTO or CPO, with the CFO signing off on unit
              economics. Budget is classified as engineering/product capex that converts to COGS as volume scales.
              Adoption trigger is typically customer demand for cross-border payment functionality that would take 12-18
              months to build in-house.

              Airlines and travel management companies require high-frequency, low-margin B2B settlement for airfare
              distribution (NDC), hotel consolidation, and FX conversion on travel spend. The SIC/travel sector drives
              outsize payment volume relative to headcount. Banks and financial institutions increasingly use Nium as a
              correspondent banking alternative — rather than maintaining relationships with local settlement banks in
              190 countries themselves, they white-label Nium's reach. Gig-economy platforms (ride-hailing, freelance
              marketplaces, last-mile delivery) require sub-daily disbursements to contractors in multiple currencies, a
              use case poorly served by batch ACH systems.

              BFSI is the largest demand vertical at 25.18% of the global B2B payments market. Large enterprises hold
              60.31% of revenue share but SMEs are the fastest-growing segment at 16.23% CAGR. Nium has historically
              focused on mid-to-large enterprise clients but the SME segment — served via embedded finance partners —
              represents a significant expansion vector.
