  - id: FU001
    title: Customer journey map
    type: journey-map
    description: >-
      Nium's enterprise customer journey from initial awareness through API integration, production go-live, and
      multi-product expansion.
    claimRefs:
      - CU001
      - CU007
      - CU009
      - CU014
    data:
      items:
        - label: Awareness
          value: >-
            Nium brand discovery through fintech conferences (Money20/20, Sibos) | Word of mouth in fintech/payroll
            vertical networks | Nium sales outreach via SDR/enterprise sales | Search for "B2B payment infrastructure
            API" or "card issuance API" | Analyst reports (CB Insights, Tracxn)
          note: 'Enterprise discovery driven primarily by sales motion and peer referral. emotion: problem-aware'
        - label: Evaluation
          value: >-
            Product demo with Nium solutions engineer | API sandbox access (requires KYB screening) | Corridor coverage
            comparison vs Airwallex, Currencycloud | Compliance documentation review (40+ license list) | Proof of
            concept in sandbox environment for target corridors
          note: >-
            KYB onboarding friction during evaluation is a structural drag; compliance-focused buyers may prefer this
            diligence. emotion: evaluating
        - label: Commercial Onboarding
          value: >-
            MSA and DPA negotiation (multi-month for large enterprises) | KYB completion and regulatory sign-off | API
            key provisioning and sandbox environment | SLA terms and incident escalation path negotiation
          note: '3–9 month commercial cycle for mid-market; longer for tier-1 financial institutions. emotion: committed'
        - label: Technical Integration
          value: >-
            SDK integration (Java, Node.js, Python, PHP) | Webhook configuration for payment events | Compliance
            workflow integration (AML, KYC/KYB passed through to Nium) | Go-live testing across target corridors
          note: >-
            Technical integration creates high switching costs — clients who complete integration rarely switch.
            emotion: invested
        - label: Production and Expansion
          value: >-
            Live payments processing in initial corridors | Volume ramp as client's end-users generate demand |
            Additional corridor enablement (expanding from 10 to 50 corridors) | Cross-sell of Receive or Embed on top
            of Transact | Annual volume expansion drives revenue growth without additional CAC
          note: >-
            Land-and-expand model — volume growth + product expansion within existing clients is primary growth lever.
            emotion: growing
