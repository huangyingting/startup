      - number: '4.3'
        title: Cost Structure and Gross Margin Drivers
        blocks:
          - type: paragraph
            body: >-
              Nium's cost structure is shaped by three principal drivers: payment network fees and FX hedging costs
              (cost of revenue), regulatory compliance and licensing expenditure across 40-plus jurisdictions, and
              technology and headcount investment for product expansion. ACRA Singapore filings indicate rapid headcount
              growth since 2021, consistent with investment in engineering, compliance, and sales teams across
              Asia-Pacific, Europe, and North America. The regulatory cost burden is material and unusual for a company
              of Nium's scale: holding major payment institution licenses from MAS Singapore, FCA UK, and equivalent
              regulators across more than 40 jurisdictions requires minimum liquid asset holdings, dedicated compliance
              staff, and periodic examination costs that consume capital without generating proportional revenue. MAS's
              Payment Services Act requires major payment institutions to maintain capital adequacy above defined
              thresholds, creating a minimum capital floor that constrains capital allocation flexibility.

              Industry benchmarks provide context: KPMG's 2021 analysis of real-time payment economics found that
              payment infrastructure providers need 500M-plus annual transactions before real-time corridors become
              structurally profitable. Deloitte fintech benchmarks suggest that scaled payment companies targeting
              profitability aim for 15–25% EBITDA margins once operating leverage is established. BCG embedded- finance
              research notes that BaaS bundling and competitive pricing pressure from large bank programs can compress
              take rates for infrastructure providers over time. None of these generic benchmarks have been calibrated
              against Nium-specific data, but they suggest a plausible margin pathway: if Nium can grow revenue toward
              SGD 300–400M with flat operating expense growth, it could approach EBITDA breakeven within three to four
              years of current scale. This path requires volume growth resuming above 20–30% annually, which is
              inconsistent with the FY2024 trajectory of 13.3%.
