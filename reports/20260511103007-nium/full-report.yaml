      - number: '2.5'
        title: Market Outlook and Nium's Positioning
        blocks:
          - type: paragraph
            body: >-
              The global B2B payments market is approaching an inflection point. Legacy correspondent banking — a chain
              of 3-5 intermediary banks adding 1-5 business days and compounding fees to each cross-border transaction —
              is being replaced by direct real-time rails, API-native platforms, and increasingly by digital-asset
              settlement corridors. McKinsey's 2020 Global Payments Report documented that cross-border payments totaled
              $130 trillion in 2019, generating $224 billion in revenues, with global payments revenues growing
              approximately 7% annually before COVID disruption. Post-COVID digitization has accelerated these trends.

              Ripple's industry analysis estimates the B2B cross-border payments market hit $31.6 trillion in
              transaction volume (not fee revenue) recently, projected to grow 58% to reach $50 trillion by 2032. This
              volume growth, combined with structural fee compression as technology replaces correspondent banking
              intermediaries, creates a volume-for-margin trade-off that benefits scaled, low-cost infrastructure
              providers.

              SWIFT's global financial messaging network connects more than 11,000 financial institutions and has
              historically dominated international payment messaging. SWIFT gpi now enables same-day settlement for many
              corridors, but SWIFT remains a messaging standard rather than a settlement rail — meaning liquidity must
              still reside in correspondent bank accounts. Real-time API platforms that pre-fund local wallets in each
              country (Nium's model) represent the structural alternative that removes pre-funding friction.

              Nium's $50 billion-plus annual transaction volume (announced February 2026), 190+ country reach, and 40+
              regulatory licenses represent meaningful moats in the cross-border infrastructure layer. The November 2025
              Visa USDC stablecoin settlement pilot with Nium signals the next evolution: digital-asset rails
              potentially replacing pre-funded fiat wallets for certain corridors, further compressing settlement costs.

              Regional growth dynamics favor Nium: APAC — Nium's home region — is the fastest-growing at 17.42% CAGR,
              driven by Southeast Asian e-commerce and India's UPI ecosystem. LAMEA (Latin America, Middle East, Africa)
              is the fastest-growing region in the cross-border segment per Allied Market Research, and Nium has been
              expanding coverage there.
            claimRefs:
              - CM031
              - CM032
              - CM033
              - CM034
              - CM035
              - CM036
              - CM037
              - CM038
      - number: '2.6'
        title: Exhibits
        blocks:
          - type: callout
            title: Platform-Layer Economics Compress Fees But Expand Volume
            body: >-
              At $50B+ annual transaction volume and approximately $125M in FY2024 revenue, Nium's implied take rate is
              roughly 0.25% (25 basis points). This is materially lower than traditional correspondent banking (1-5%)
              but consistent with scaled API payment infrastructure economics. The strategic bet is that volume grows
              faster than take-rate compression, sustained by expanding corridors, new client types (banks, fintechs),
              and higher-margin products (card issuance). The B2B digital payment platform market's $8.2B by 2028
              projection at 14.3% CAGR (MarketsAndMarkets) implies the platform fee layer alone is growing faster than
              most SaaS verticals — but Nium must continue capturing share at pace.
            calloutType: insight
            claimRefs:
              - CM009
              - CM011
              - CM012
              - CM013
          - type: callout
            title: Market Sizing Uncertainty Is Structural — Not Just Methodological
            body: >-
              Analyst estimates for the B2B payments market range from $8.2 billion (MarketsAndMarkets, platform fees
              only) to $1.42 trillion (Mordor Intelligence, total B2B flows) — a 170× spread. This is not statistical
              noise. It reflects genuine disagreement about whether to measure total transaction value, fee revenue, or
              platform software fees, and whether to include domestic payments. Investors using TAM to justify Nium's
              valuation must specify which metric they are using. The relevant comparison for pricing Nium is the
              platform-fee layer (~$8.2B by 2028) or the cross-border revenue market ($206.5B in 2024) — not the
              aggregate $1.42T payment flows figure, which overstates Nium's addressable revenue opportunity by orders
              of magnitude.
            calloutType: risk
