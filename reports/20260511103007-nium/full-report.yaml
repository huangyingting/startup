      - number: '5.4'
        title: Trust, Compliance, and Reliability
        blocks:
          - type: paragraph
            body: >-
              Nium's compliance architecture is built around its 40-plus regulatory licenses, representing the most
              capital-intensive and operationally complex aspect of its platform. These include MAS Major Payment
              Institution authorization in Singapore, FCA Electronic Money Institution authorization in the United
              Kingdom, and equivalent authorizations across Europe, Asia-Pacific, the Americas, and Africa. Each license
              imposes minimum capital adequacy requirements, transaction monitoring obligations, AML/CFT program
              maintenance, and periodic regulatory examination. Nium's compliance engine performs in-line screening —
              AML, KYC/KYB, OFAC sanctions, PEP checks — embedded within the payment API so that compliance happens at
              the transaction level rather than as a separate batch process.

              BIS CPMI research (D215) documents the standards for cross-border payment infrastructure interoperability
              and identifies compliance and trust as critical enablers of cross-border payment growth. Nium's approach
              of embedding compliance into the API layer rather than exposing it as a separate service is a material
              technical and operational differentiator. Nium has not publicly disclosed specific reliability metrics
              such as API uptime SLA, incident history, or response-time benchmarks. For a company targeting enterprise
              clients with high-volume, time-sensitive payment flows, the absence of published SLAs is a diligence gap.
              Payment infrastructure providers at scale typically commit to 99.99%-plus uptime; Nium's commitment level
              is unknown from public data. No major public security breach or API outage has been documented in press
              coverage through 2026.
