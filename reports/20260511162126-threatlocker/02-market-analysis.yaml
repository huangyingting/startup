  evidenceGaps:
    - type: "missing-source"
      severity: "material"
      topic: "SAM-estimate"
      missingEvidence: >
        No public analyst study directly sizes the MSP-delivered zero trust endpoint security market
        as a discrete sub-segment; the $4-6B SAM is analyst-derived from CompTIA MSP aggregate data
        with a series of adjustment assumptions that have not been independently validated.
      whyItMatters: >
        The SAM derivation methodology introduces material uncertainty into the market penetration
        calculation; if the security share of MSP spend is higher or lower than 8-12%, the SAM
        and implied penetration rate shift significantly.
      diligencePath: >
        Request a commissioned market study from IDC or Gartner segmenting MSP security spend by
        endpoint control category; alternatively, build up from RMM/PSA platform data on
        per-endpoint security tool attachment rates across the MSP base.
      relatedQuestionRefs: [QM004]

    - type: "private-evidence-only"
      severity: "minor"
      topic: "MSP-sales-cycle"
      missingEvidence: >
        ThreatLocker has not disclosed the typical MSP partner onboarding sales cycle length;
        no public case study or channel partner report provides average time-to-signature metrics
        for MSP partners evaluating endpoint security platforms.
      whyItMatters: >
        Sales cycle length drives pipeline velocity and headcount-to-quota efficiency; a longer
        cycle than typical SaaS would compress growth rate relative to ARR estimates.
      diligencePath: >
        Request MSP onboarding funnel data from ThreatLocker management including median
        time-from-first-contact to signed contract and median time-to-full-deployment for a
        new MSP partner's first 100 endpoints.
      relatedQuestionRefs: [QM009]

    - type: "private-evidence-only"
      severity: "material"
      topic: "market-share"
      missingEvidence: >
        No third-party analyst has published a direct market share comparison between ThreatLocker
        and CrowdStrike or SentinelOne in the SMB endpoint security segment; G2 review counts
        and Gartner quadrant placement provide qualitative signals but no share data.
      whyItMatters: >
        Without market share data, it is not possible to determine whether ThreatLocker is gaining
        share from incumbent EDR vendors or growing primarily by expanding total MSP endpoint
        security adoption; the two scenarios have different competitive implications.
      diligencePath: >
        Request ThreatLocker win/loss data segmented by competitor displaced; cross-reference
        with channel surveys of MSPs asking which endpoint security tools they replaced when
        adopting ThreatLocker.
      relatedQuestionRefs: [QM024]

    - type: "missing-source"
      severity: "minor"
      topic: "brand-recognition-gap"
      missingEvidence: >
        No independent brand awareness survey has measured ThreatLocker's unaided awareness among
        IT buyers outside the MSP community; the contrast between high G2 satisfaction scores and
        absence from the Gartner EPP Leaders quadrant suggests a community-specific brand profile
        that has not been independently quantified.
      whyItMatters: >
        If ThreatLocker's brand is highly concentrated in the MSP channel community, enterprise
        direct sales expansion will require significant marketing investment to build buyer
        awareness outside the existing partner network.
      diligencePath: >
        Commission or review a brand awareness survey of IT security buyers in the 500-5,000
        employee segment; compare unaided awareness for ThreatLocker vs. CrowdStrike, SentinelOne,
        and Microsoft Defender as a baseline.
      relatedQuestionRefs: [QM026]

    - type: "access-blocked"
      severity: "minor"
      topic: "CAGR-forecast-comparison"
      missingEvidence: >
        Gartner, IDC, and Forrester's 2024 and 2026 zero trust market CAGR forecasts are behind
        paywalls (SM006, SM021, SM022), preventing direct comparison of whether analyst growth
        rate projections have increased or decreased as the market matures from early adoption
        to mainstream deployment.
      whyItMatters: >
        A declining CAGR trend would signal market maturation and compression of the growth premium
        for vendors in the space; an increasing CAGR would validate accelerating adoption.
      diligencePath: >
        Obtain Gartner and IDC research subscriptions or request reprints; alternatively, use
        public Fortune Business Insights and MarketsAndMarkets CAGR revisions as a proxy for
        the direction of consensus CAGR revision since 2024.
      relatedQuestionRefs: [QM027]

