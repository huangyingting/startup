figures:
  - id: FM001
    title: "Market Sizing Lens"
    description: >
      TAM-SAM-SOM pyramid illustrating ThreatLocker's nested market sizing from the global zero
      trust security market ($34.5–42.3B) down through the MSP-delivered endpoint security SAM
      ($4–6B) to ThreatLocker's estimated current penetration (~$71.5M ARR).
    type: "pyramid"
    data:
      nodes:
        - id: "n1"
          label: "TAM — Global Zero Trust Security Market"
          description: >
            $42.3B in 2025 (Fortune Business Insights); $34.5B in 2026 (MarketsAndMarkets);
            includes all Zero Trust security including networking and identity layers beyond
            ThreatLocker's current scope
        - id: "n2"
          label: "SAM — MSP-Delivered Zero Trust Endpoint Security"
          description: >
            $4–6B estimated; derived from North American MSP security spend (CompTIA) scaled
            to English-speaking MSP-dominant markets; endpoint allowlisting and PAM segments only
        - id: "n3"
          label: "SOM — ThreatLocker Current Penetration"
          description: >
            ~$71.5M ARR (2025 Tracxn estimate); < 2% of estimated SAM; 70,000+ protected
            organizations at estimated $1,000/yr average contract value
    claimRefs: [CM001, CM002, CM005, CM014, CM015, CM024, CM038]
    sourceRefs: [SM001, SM002, SM007, SM015]

