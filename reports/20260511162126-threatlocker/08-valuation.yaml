      IC-ready summary of recommendation, confidence, risk rating, valuation stance,
      and decision implication for ThreatLocker based on public evidence as of May 2026.
    notes: >
      ARR and growth figures are third-party estimates (PitchBook, GetLatka, Tracxn);
      no audited financial statements are available. Implied multiple based on $1.7B
      post-money valuation from April 2022 Series B.
    columns:
      - "Dimension"
      - "Assessment"
      - "Evidence Quality"
      - "Implication"
    rows:
      - ["Recommendation", "Investigate Further", "Low-Medium (no audited financials)", "Do not deploy at current price without verified ARR / NRR / gross margin"]
      - ["Confidence", "Medium", "Strong product story; weak financial visibility", "Financial confirmation gates required before upgrade to Buy"]
      - ["Risk Rating", "Medium-High", "MSP concentration; litigation overhang; limited disclosure", "Monitor Schwab case; request cohort data before commitment"]
      - ["Valuation Stance", "Reasonably priced at 6.5-7.7x ARR", "Modest discount to growth-stage peer median 8.1x", "Entry at or below $2.0B defensible if growth confirmed"]
      - ["Decision Implication", "Proceed to Management Diligence", "Clear 6 gates (ARR, NRR, margin, litigation, cap table, enterprise)", "Upgrade to Buy if all gates cleared; downgrade to Track if below threshold"]
    claimRefs: [CV001, CV002, CV003, CV011, CV014, CV027]
    sourceRefs: [SV004, SV006, SV009, SV012, SV013]

