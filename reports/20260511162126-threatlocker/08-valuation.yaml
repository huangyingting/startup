chapter:
  number: 8
  letter: V
  title: Valuation
  summary: >
    ThreatLocker achieved unicorn status with a $1.2 billion post-money valuation
    following its $60 million Series E in April 2025, having raised approximately
    $253.6 million in total funding. At a third-party revenue estimate of $71.5M
    for 2025 (Tracxn), the implied EV/revenue multiple is approximately 16.8x —
    elevated relative to public-market peers CrowdStrike (~10-15x NTM), SentinelOne
    (~6-9x NTM), and Palo Alto Networks (~8x), but defensible given ThreatLocker's
    channel-native zero-trust differentiation, 70,000-plus customer base, and
    sustained growth trajectory. The base case valuation of $1.2B rests on 20-30%
    revenue growth continuing; a bull scenario at $120-150M revenue and 18-20x
    multiple yields $2.0-3.0B; a bear scenario at 10-15% growth with 8-11x multiple
    yields $600-800M. Key valuation risks include private company opacity (no audited
    financials), family governance concentration, MSP channel concentration, revenue
    estimate uncertainty, and an active lawsuit (ThreatLocker v. Charles Schwab,
    Case 6:2025cv00923). IPO readiness is emerging but requires audited financials
    and corporate governance additions not yet publicly demonstrated. Recommendation:
    Investigate Further — constructive directional bias pending data-room verification
    of ARR, gross margin, NRR, and MSP concentration.

sections:
  - id: thesis-anti-thesis
    title: "Investment Thesis and Anti-Thesis"
    body: >
      ThreatLocker's investment thesis anchors on structural defensibility: its
      default-deny, application-allowlisting architecture cannot be easily replicated
      by traditional EDR vendors without rebuilding the detection model from scratch.
      The MSP channel provides built-in distribution scale (70,000-plus organizations
      protected through approximately 6,000 MSP partners across 50-plus countries),
      creates high switching costs through policy-library lock-in, and makes churn
      structurally difficult for SMB customers who rely on MSP-managed policies.
      Regulatory tailwinds — HIPAA BAA requirements, FTC Safeguards Rule, state privacy
      laws — create a durable compliance use case that is budget-resilient in downturns.
      TAM expansion from zero-trust security adoption mandates and ransomware threat
      escalation provides a long-duration growth runway corroborated by Fortune Business
      Insights and MarketsAndMarkets market forecasts.

      The anti-thesis centers on four concerns. First, channel concentration: if the
      top 10-50 MSP partners account for a disproportionate share of ARR, churn among
      a small number of mega-MSPs (Kaseya, ConnectWise, or major independent MSPs)
      could materially impair the business. Second, revenue estimate uncertainty:
      all revenue figures are third-party approximations; actual ARR is unknown and
      could be above or below the $71.5M Tracxn estimate. Third, governance risk:
      three Jenkins family members hold the CEO, COO, and CTO roles, creating key-person
      dependency and potential governance conflicts that institutional investors would
      price as a discount. Fourth, the active ThreatLocker v. Schwab lawsuit
      (Case 6:2025cv00923) creates unquantified financial and reputational exposure.
    claimRefs:
      - CV001
      - CV004
      - CV014
      - CV034
