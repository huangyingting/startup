  - id: scenario-analysis
    title: "Bull / Base / Bear Scenario Analysis"
    body: >
      Valuation scenario analysis for ThreatLocker requires explicit assumptions about
      revenue growth, multiple expansion or compression, and timing of a liquidity event.

      The base case ($1.2B) reflects the April 2025 Series E mark. It is supported by
      the Tracxn $71.5M 2025 revenue estimate, a 16.8x EV/revenue multiple consistent
      with 20-30% growth expectations, and continued MSP channel momentum. A base-case
      investor buying at $1.2B needs revenue to reach approximately $200M at 10-12x
      to achieve a 2x return, implying roughly 180% revenue growth over 4-5 years —
      achievable if current growth rates hold and the company maintains channel health.

      The bull case ($2.0-3.0B) requires revenue to scale to $120-150M (50-70% growth
      from $71.5M) at an 18-20x multiple. This is plausible if ThreatLocker successfully
      expands into enterprise direct sales, adds network access and cloud security
      modules that increase deal size, and maintains MSP channel health. Employee growth
      from ~200 to ~700 over 30 months supports the possibility of significant revenue
      scaling in the 2026-2028 window.

      The bear case ($600-800M) emerges if revenue growth decelerates to 10-15%
      annually, compelling a multiple reset to 8-11x. Triggers include: MSP platform
      consolidation displacing ThreatLocker, an adverse outcome in the ThreatLocker v.
      Schwab litigation, a management console security incident, or macro-driven SMB IT
      budget contraction. At $600-800M, Series E investors would face a 33-50% mark-to-
      market loss. The steep learning curve and complex onboarding documented in
      Cybernews and G2 reviews represent an ongoing bear trigger: if customer acquisition
      velocity in the SMB segment slows due to platform friction, base-case growth
      assumptions would need to be revised downward.
