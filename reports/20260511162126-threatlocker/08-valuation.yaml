        - {from: "MSP-channel moat (9,000+ partners)", to: "Thesis strengths confirmed"}
        - {from: "Default-deny product differentiation", to: "Thesis strengths confirmed"}
        - {from: "Regulatory tailwinds (HIPAA/FTC/CCPA)", to: "Thesis strengths confirmed"}
        - {from: "Implied 6.5-7.7x ARR (below peer median 8.1x)", to: "Thesis strengths confirmed"}
        - {from: "Litigation overhang (Schwab Case 6:2025cv00923)", to: "Anti-thesis risks material"}
