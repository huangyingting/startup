  - id: recommendation-confidence
    title: "Recommendation, Confidence, and Risk Rating"
    body: >
      The recommendation is Investigate Further with a constructive directional bias.
      The evidence base supports the product story and market position, but the absence
      of audited financial disclosures, an unresolved litigation overhang, and limited
      visibility into gross margin and NRR prevent a definitive buy recommendation at
      the $1.2B implied valuation. At 16.8x estimated EV/revenue, the current mark is
      at the upper end of the public-market cybersecurity SaaS range and pricing in
      sustained 30-50% growth — which cannot be independently verified.

      Confidence in the qualitative thesis (product differentiation, channel moat,
      TAM) is Medium-High. Confidence in the quantitative valuation (revenue, multiple,
      return) is Low due to complete absence of audited financial disclosures. Risk
      rating is Medium-High, driven primarily by revenue opacity, governance
      concentration, and MSP channel dependency. If data-room verification confirms
      ARR at or above $90M with NRR above 110%, gross margin above 70%, and MSP
      partner concentration below 40% for top-10, the recommendation would upgrade to
      Buy at $1.2-1.5B entry with a $2.0-2.5B exit scenario. If ARR is below $71.5M
      or NRR is below 100%, the recommendation would downgrade to Track at a reset
      valuation of 5-7x ARR.
