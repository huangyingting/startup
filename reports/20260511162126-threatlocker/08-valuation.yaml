      - ["Distribution Moat", "9,000+ MSP partners with policy-library lock-in; switching cost is 3-6 months of re-tuning", "MSP aggregators (Kaseya, Datto) could bundle competing products at zero marginal cost", "MSP partner churn above 8% or loss of a top-10 MSP partner relationship"]
      - ["Market Tailwinds", "HIPAA BAA, FTC Safeguards, CCPA, SEC cyber rule create budget-resilient compliance use case", "Regulatory complexity could drive customers to platform-vendor all-in-one compliance bundles", "Loss of compliance differentiation if major platform vendors achieve equivalent certifications"]
      - ["Capital Efficiency", "$220M+ ARR on $101M raised implies 2.2-2.6x ARR/capital -- top decile for cybersecurity SaaS", "No public audited financials; efficiency metrics unverified and could be misleading", "Audited gross margin below 65% or EBITDA loss rate above 30% of ARR"]
