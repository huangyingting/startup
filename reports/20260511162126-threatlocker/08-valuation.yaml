acknowledgedWarnings:
  - dimension: figureType
    reason: >
      No planned figure type (flow, bar, range, kpi) is available in the schema;
      nearest schema-level equivalents used: dag for recommendation-logic (flow),
      matrix for valuation-sensitivity (bar/range), cohort for valuation-return-range
      (range), and matrix for investment-kpis (kpi). Substitutions are intentional
      and the most appropriate schema types for the required data structures.
  - dimension: paywallRisk
    reason: >
      Three sources carry paywall or gated accessStatus (SV001 Gartner MQ, SV004 Crunchbase Pro,
      SV009 PitchBook). All three are widely cited in public analyst commentary and press
      summaries. Key data points (round sizes, valuation marks, growth estimates) are
      corroborated by open-access sources (SV006 TechCrunch, SV013 GetLatka, SV030 SiliconAngle).
      Paywall sources are used only for context and multi-source corroboration, not as
      sole evidence for any high-confidence claim.
  - dimension: unverifiedSource
    reason: >
      SaaStr (SV003) and SiliconAngle (SV008/SV030) are community and analyst blogs
      cross-checked against primary-tier sources. TechCrunch (SV006/SV024) and Reuters
      (SV007/SV028) are mainstream business press with editorial review; funding figures
      confirmed against company press releases. Radical Compliance (SV021) is an
      independent compliance newsletter corroborated by AICPA SOC 2 references.
      Abnormal Security (SV022) and Red Canary (SV023) are security-vendor research
      blogs; market data corroborated by IBM X-Force and CrowdStrike filings (SV020).
      Spiceworks (SV019) community data is used only for sentiment signal, not factual
      claims. CybersecurityVentures (SV025) forecasts are widely cited industry
      benchmarks cross-checked against Gartner (SV001) and IDC (SV017). Tracxn (SV014)
      and GetLatka (SV013) are data-aggregator platforms; findings corroborated by
      PitchBook (SV009) and Crunchbase (SV004).
  - dimension: tableNotes
    reason: >
      Valuation ranges in TV003 (bull/base/bear) and TV004 (comparable set) are analyst
      estimates derived from public company multiples, disclosed private-round data, and
      comparable transaction analysis. ThreatLocker does not publicly disclose revenue,
      ARR, EBITDA, or gross margin; all financial estimates carry high uncertainty.
      Comparable multiples reflect public-market conditions as of Q1-Q2 2026 and may
      compress materially in a macro downturn. Notes caveat is applied to all six tables
      per validator guidance for tables containing analyst-derived financial estimates.

chapter:
  number: 8
  title: Valuation
  summary: >
    ThreatLocker is a high-conviction, high-growth private cybersecurity company with
    strong product-market fit in the MSP-served SMB and mid-market endpoint protection
    segment. Public evidence supports ARR in the $220M-$260M range as of mid-2026,
    growing at approximately 50-60% annually, with the last disclosed valuation of $1.7B
    from the 2022 Series B. At implied ARR multiples of 6.5-7.7x (below current public-market
    peer benchmarks of 8-12x for 40-60% growth), ThreatLocker appears attractively valued
    on a relative basis if growth is sustainable. The investment thesis rests on four
    pillars: (1) durable product differentiation via default-deny architecture, (2) deep
    MSP-channel moat generating high switching costs, (3) expanding TAM from regulatory
    tailwinds, and (4) enterprise and geographic white space. Key anti-thesis risks: MSP
    concentration, limited public financials, unresolved Schwab litigation (Case
    6:2025cv00923), and compressed exit timing if public-market multiples deflate before
    a 2027-2029 IPO or M&A event. Recommendation: Investigate Further - valuation is
    reasonable but requires private financial confirmations before a definitive buy.

sections:
  - id: thesis-anti-thesis
    title: "Investment Thesis and Anti-Thesis"
    body: >
      ThreatLocker's investment thesis anchors on structural defensibility: its default-deny
      architecture cannot be easily replicated by traditional EDR vendors without rebuilding
      the detection model from scratch. The MSP channel provides built-in distribution scale
      (9,000+ MSP partners across 50+ countries), creates high switching costs through
      policy-library lock-in, and makes churn structurally difficult for SMB customers who
      rely on MSP-managed policies. Regulatory tailwinds (HIPAA BAA, FTC Safeguards, state
      privacy laws) create a durable compliance use case that is budget-resilient in downturns.
      The anti-thesis centers on channel concentration: ThreatLocker's >80% MSP-derived revenue
      creates existential exposure if a major platform aggregator (Kaseya, ConnectWise, Datto)
      launches a competing allowlisting product. Enterprise direct sales traction and EMEA
      expansion are growth optionality but remain nascent based on public evidence as of 2026.
    tableRefs: [TV001, TV002]
    figureRefs: [FV001]

  - id: recommendation-decision
    title: "Recommendation and Decision Framework"
    body: >
      The recommendation is Investigate Further with a constructive directional bias. The
      evidence base supports the product story and market position, but the absence of
      audited financial disclosures, an unresolved litigation overhang, and limited
      visibility into gross margin and NRR prevent a definitive buy recommendation at the
      current implied valuation. Diligence gates that, if cleared, would upgrade the
      recommendation to Buy at $1.7-2.5B: (1) verified ARR >= $220M with >= 55% growth and
      NRR >= 115%, (2) gross margin >= 72%, (3) MSP churn < 5%, (4) Schwab case resolution
      without material financial liability, (5) enterprise cohort evidence showing direct-
      sales productivity. If the company is below these thresholds, valuation should be
      reset to 5-7x ARR and the recommendation downgraded to Track.
    tableRefs: [TV005]
    figureRefs: [FV004]

  - id: comparable-valuation
    title: "Valuation and Comparable Analysis"
    body: >
      ThreatLocker's last disclosed valuation ($1.7B, April 2022) was set at a moment when
      growth-stage cybersecurity SaaS commanded 20-40x ARR multiples. Post-2022 compression
      reset public benchmarks to 6-14x NTM revenue. CrowdStrike (CRWD) trades at approximately
      10-14x NTM revenue on 25%+ growth; SentinelOne (S) trades at 6-9x on 33%+ growth; Palo
      Alto Networks (PANW) trades at 7-9x on 15%+ growth. Private comparables: Wiz ($12B at
      ~$500M ARR = 24x, growth-premium justified), ExtraHop (acquired at ~6x ARR). At $1.7B
      with estimated $220-260M ARR, ThreatLocker implies 6.5-7.7x ARR -- a discount to
      growth-stage peers, suggesting either hidden risk or a buying opportunity. The valuation
      would need to reach $2.5-4.0B at exit to generate a 1.5-2.5x return from a hypothetical
      $1.7B entry, requiring sustained >= 40% CAGR through 2028-2029.
    tableRefs: [TV003, TV004]
    figureRefs: [FV002, FV003]

  - id: exit-readiness
    title: "Exit Readiness and Strategic Optionality"
    body: >
      ThreatLocker's most likely exit pathways by probability: (1) PE-backed growth recap or
      buyout (2026-2027) -- highest probability given founder ownership concentration and
      absence of VC pressure for fast IPO; (2) strategic M&A by Palo Alto Networks, Cisco,
      Microsoft, or CrowdStrike seeking MSP-channel access and default-deny IP; (3) IPO
      (2028-2030) once ARR exceeds $400-500M and public-market appetite for cybersecurity SaaS
      recovers. The Schwab litigation creates a 12-24-month IPO drag. CEO Danny Jenkins has
      publicly positioned ThreatLocker as independent and growth-focused, reducing near-term
      M&A probability unless an acquirer offers a significant control premium. EMEA expansion
      could widen the M&A acquirer pool to include European strategic buyers such as Airbus
      CyberSecurity, Thales, or regional telecom-backed MSSPs. A strong 2027 ARR print above
      $400M would meaningfully accelerate the IPO window and generate competitive tension
      between the strategic and public-market exit routes.
    tableRefs: []
    figureRefs: []

  - id: final-diligence-asks
    title: "Final Diligence Asks"
    body: >
      Six critical diligence gaps must be resolved before finalizing the investment
      recommendation. First, audited or management-certified ARR, NRR, gross margin, and
      burn rate as of December 2025. Second, customer cohort data showing retention by MSP
      segment, vertical, and geography. Third, details on the Schwab litigation settlement
      risk, total potential liability, and insurance coverage. Fourth, cap table and
      preference-stack detail, specifically Series B liquidation preferences, anti-dilution
      provisions, and any secondary transactions since 2022. Fifth, enterprise direct-sales
      pipeline showing deal size, cycle, and conversion rates. Sixth, SOC 2 Type II scope and
      any open audit findings. Resolution of all six items would materially reduce thesis
      uncertainty.
    tableRefs: [TV006]
    figureRefs: []

