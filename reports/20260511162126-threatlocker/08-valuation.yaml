  - id: comparable-set
    title: "Comparable Company Set and Relative Valuation"
    body: >
      ThreatLocker's primary public-market comparable set includes CrowdStrike,
      SentinelOne, Palo Alto Networks, and Sophos, each representing a different
      segment of the endpoint and zero-trust security market.

      CrowdStrike (CRWD) is the most direct public comp: a channel-heavy endpoint
      security platform with approximately $4 billion ARR growing at roughly 25% as
      of fiscal year 2026, trading at approximately 10-15x NTM revenue. CrowdStrike's
      scale premium is substantial — its size, enterprise penetration, and threat
      intelligence network justify significant multiple versus smaller peers.

      SentinelOne (S) trades at approximately 6-9x NTM revenue on approximately
      $850 million ARR growing at roughly 33% annually. SentinelOne's lower multiple
      reflects competitive pressure from CrowdStrike and a path-to-profitability
      narrative that has lagged investor expectations. ThreatLocker's 16.8x implied
      multiple exceeds SentinelOne's range despite SentinelOne being 11x larger by ARR.

      Palo Alto Networks trades at approximately 8x revenue given its large-cap
      diversified platform profile and lower relative growth rate. Sophos was acquired
      by Francisco Partners and is private, serving as a transaction comparable (PE
      buyout at 4-8x revenue) rather than a tradeable NTM benchmark. Microsoft Defender
      is excluded as a bundled OS feature rather than a standalone SaaS product.

      The comparable analysis suggests ThreatLocker's 16.8x multiple is defensible
      only if actual ARR is higher than the $71.5M Tracxn estimate and/or the market
      is pricing in sustained 30-50% growth. If revenue growth decelerates, a 6-9x
      SentinelOne-comparable multiple would imply a $430-640M valuation.
