    description: >
      Directed acyclic graph showing the evidence chain from ThreatLocker's growth,
      moat, regulatory tailwinds, and valuation inputs, through thesis strengths and
      anti-thesis risks, to the investment recommendation of Investigate Further.
    summary: >
      Twelve-node recommendation logic DAG connecting ARR/growth, MSP moat, default-deny
      differentiation, and regulatory tailwinds through thesis strengths and anti-thesis
      risks (litigation, concentration, no audited financials) to the six diligence gates
      and final recommendation.
    data:
      nodes:
        - label: "ARR $220-260M, 50-60% growth (estimated)"
        - label: "MSP-channel moat (9,000+ partners)"
        - label: "Default-deny product differentiation"
        - label: "Regulatory tailwinds (HIPAA/FTC/CCPA)"
        - label: "Implied 6.5-7.7x ARR (below peer median 8.1x)"
        - label: "Thesis strengths confirmed"
        - label: "Litigation overhang (Schwab Case 6:2025cv00923)"
        - label: "MSP concentration risk (>80% channel revenue)"
        - label: "No audited financials -- NRR and margin unverified"
