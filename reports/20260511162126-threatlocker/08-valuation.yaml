figures:
  - id: FV001
    title: "Recommendation Logic"
    type: flow
    description: >
      Decision flow from key evidence pillars — market, product, customers, financials,
      competition, and risks — to the final investment recommendation for ThreatLocker.
    claimRefs: [CV001, CV004, CV010, CV038]
    sourceRefs: [SV001, SV005, SV007]
    data:
      nodes:
        - id: market
          label: "Zero Trust TAM"
          description: "Large and growing market; Fortune Business Insights and MarketsAndMarkets project strong CAGR through 2030"
        - id: product
          label: "Default-Deny Architecture"
          description: "Structurally superior approach; application allowlisting cannot be replicated by detection-based peers"
        - id: customers
          label: "70,000+ Organizations"
          description: "Proven scale; 40% customer growth from Series D to March 2026; strong G2 and Gartner scores"
        - id: financials
          label: "Revenue Opacity"
          description: "Tracxn $71.5M 2025 est.; no audited data; 16.8x EV/revenue multiple unverified"
        - id: risks
          label: "Key Risks"
          description: "MSP concentration, litigation (Schwab Case 6:2025cv00923), governance, multiple compression"
        - id: recommendation
          label: "Investigate Further"
          description: "Constructive directional bias; pending data-room ARR, NRR, GM, and MSP concentration verification"
      edges:
        - from: market
          label: "supports"
          to: recommendation
        - from: product
          label: "supports"
          to: recommendation
        - from: customers
          label: "supports"
          to: recommendation
        - from: financials
          label: "constrains confidence"
          to: recommendation
        - from: risks
          label: "constrains confidence"
          to: recommendation

  - id: FV002
    title: "Valuation Sensitivity"
    type: bar
    description: >
      Sensitivity of ThreatLocker's implied EV/revenue multiple to different
      revenue assumptions at the $1.2B Series E enterprise value. Shows how
      the multiple compresses as actual ARR increases above the Tracxn estimate.
    claimRefs: [CV009, CV010, CV011, CV012, CV015, CV016]
    sourceRefs: [SV013, SV004, SV020, SV021]
    data:
      items:
        - label: "Tracxn Est. ($71.5M)"
          value: 16.8
          note: "Primary benchmark; 16.8x at $1.2B EV — above CrowdStrike NTM range"
        - label: "Latka 2023 ($61.7M)"
          value: 19.5
          note: "2023 estimate; implies 19.5x — stretched even vs. high-growth peers"
        - label: "Bear Revenue ($55M)"
          value: 21.8
          note: "Below-estimate scenario; multiple expands to ~22x — unsustainably rich"
        - label: "Bull Rev. ($90M)"
          value: 13.3
          note: "Upper-bound estimate; 13x at $90M — within public-market peer range"
        - label: "CrowdStrike NTM (midpoint)"
          value: 12.5
          note: "Benchmark: CrowdStrike 10-15x NTM on $4B ARR, 25% growth"
        - label: "SentinelOne NTM (midpoint)"
          value: 7.5
          note: "Benchmark: SentinelOne 6-9x NTM on $850M ARR, 33% growth"

  - id: FV003
    title: "Valuation / Return Range"
    type: range
    description: >
      Bear, base, and bull valuation ranges for ThreatLocker based on revenue
      growth and EV/revenue multiple assumptions. Low/high bounds reflect
      scenario parameter ranges, not point estimates.
    claimRefs: [CV021, CV022, CV023, CV025, CV026, CV029, CV030]
    sourceRefs: [SV005, SV013, SV020, SV023]
    data:
