          high: 800
          note: "10-15% growth, 8-11x multiple; MSP displacement, litigation, or macro trigger"
        - label: "Base Case"
          low: 1100
          high: 1500
          note: "20-30% growth, ~14-16x; current Series E mark; MSP channel intact"
        - label: "Bull Case"
          low: 2000
          high: 3000
          note: "50-70% growth to $120-150M at 18-20x; enterprise expansion and new modules"
        - label: "Strategic M&A Exit"
          low: 1500
          high: 2500
          note: "Estimated strategic buyer range (Palo Alto, CrowdStrike, Microsoft) — MSP channel premium"
        - label: "PE-Buyout Floor"
