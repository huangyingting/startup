  - id: valuation-context
    title: "Current Valuation Context, Financing, and Entry Discipline"
    body: >
      ThreatLocker crossed the unicorn threshold in April 2025 with a $1.2 billion
      post-money valuation after closing a $60 million Series E led by Arthur Ventures
      and CR2 Ventures, with Elephant Venture Capital and returning investor StepStone
      Group also participating. This followed the company's $115 million Series D in
      April 2024, led by General Atlantic with StepStone Group and D.E. Shaw Group,
      which established a ~$750 million post-money valuation when the company served
      50,000-plus customer organizations. Total funding through April 2025 stands at
      approximately $253.6 million.

      The valuation step-up from ~$750M to $1.2B (60% increase) was achieved on a
      relatively modest $60M raise, consistent with a company that did not require
      large primary capital injection — a signal of strong unit economics or near-
      profitability. Third-party revenue estimates put 2023 revenue at $61.7M (Latka)
      and 2025 revenue at $71.5M (Tracxn), implying an EV/revenue multiple of
      approximately 16.8x at the April 2025 Series E mark. Entry discipline for
      secondary investors requires verification that ARR, NRR, and gross margin justify
      this multiple before committing capital at the $1.2B mark or above.
