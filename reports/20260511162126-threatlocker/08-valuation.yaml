  evidenceGaps:
    - type: private-evidence-only
      severity: blocking
      topic: NRR and gross retention
      missingEvidence: >
        ThreatLocker does not publicly disclose net revenue retention, gross logo retention,
        or customer churn by segment. These metrics are the most critical underwriters of
        valuation premium for SaaS endpoint security vendors.
      whyItMatters: >
        NRR below 110% or logo churn above 5% would materially reduce the valuation
        multiple and call into question the MSP-channel lock-in thesis.
      diligencePath: >
        Request cohort-level ARR waterfall by customer vintage, MSP-segment churn rate,
        and NDR for the last 3 fiscal years directly from management.
      relatedQuestionRefs: [QV003]

    - type: private-evidence-only
      severity: blocking
      topic: Gross margin and EBITDA
      missingEvidence: >
        ThreatLocker has no public audited financial statements. Gross margin, COGS
        breakdown, operating expenses, and EBITDA are entirely estimated from peer benchmarks.
      whyItMatters: >
        Gross margin below 65% would dramatically reduce the intrinsic valuation and
        challenge the SaaS business model narrative. EBITDA loss above 40% of ARR would
        raise business model risk flags.
      diligencePath: >
        Obtain audited or management-certified P&L with COGS detail and EBITDA reconciliation
        for FY2024 and FY2025 directly from CFO.
      relatedQuestionRefs: [QV004, QV025]

    - type: missing-source
      severity: material
      topic: Secondary market equity pricing and TV004 comparable valuation completeness
      missingEvidence: >
        No public secondary market bid/ask prices or completed secondary transactions in
        ThreatLocker equity have been identified as of mid-2026. The implied $1.7B valuation
        is based solely on the 2022 Series B round. Additionally, the comparable valuation
        table (TV004) is incomplete because private-company ARR and EV data are not publicly
        disclosed, limiting the precision of peer multiple comparisons.
      whyItMatters: >
        Secondary market pricing would provide the most current market-clearing valuation
        signal for a company that has not raised capital since 2022. The incompleteness of
        the comparable set means the implied discount to peers could narrow once private
        company data is obtained.
      diligencePath: >
        Engage secondary market intermediaries (Forge Global, Nasdaq Private Market) for
        current bid/ask indications; query existing investors for any disclosed transfers.
        Request private comparable data from PitchBook enterprise license or direct LP queries.
      relatedQuestionRefs: [QV028]
      relatedTableRefs: [TV004]
