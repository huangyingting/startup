  evidenceGaps:
    - type: private-evidence-only
      severity: material
      topic: financial-metrics
      missingEvidence: >
        ThreatLocker has not publicly disclosed ARR, gross margin, operating expenses, burn rate, or
        profitability. Revenue estimates ($61.7M-$71.5M) come from Latka and Tracxn and cannot be
        independently verified.
      whyItMatters: >
        Without disclosed financials, investors cannot assess unit economics, capital efficiency, or
        runway at current burn. The small Series E raise relative to valuation step-up raises questions
        about capital deployment and cash generation.
      diligencePath: >
        Request audited financials, ARR bridge, and gross margin disclosure from ThreatLocker management.
        Engage Series D and E investors who hold information rights to discuss financial performance.
      relatedQuestionRefs:
        - QO017
        - QO025

    - type: access-blocked
      severity: minor
      topic: series-e-primary-source
      missingEvidence: >
        Both primary Series E press releases (prnewswire.com and businesswire.com) returned 404 errors
        at research time, preventing direct verification of investor names and valuation terms.
      whyItMatters: >
        While the Series E is corroborated by PremierAlts and Tracxn, inability to access primary
        press releases reduces confidence in the precise investor roster and valuation figure.
      diligencePath: >
        Check archive.org for cached versions of the press releases. Contact General Atlantic or
        Arthur Ventures investor relations for direct confirmation.
      relatedQuestionRefs:
        - QO026

    - type: access-blocked
      severity: minor
      topic: crunchbase-tracxn-data
      missingEvidence: >
        Crunchbase and Tracxn profiles require JavaScript rendering unavailable at research time,
        preventing access to full funding history, founding round details, and historical metrics.
      whyItMatters: >
        Early funding round details (pre-Series D) and precise historical headcount/revenue data are
        only available from JS-dependent databases, creating gaps in the pre-2024 narrative.
      diligencePath: >
        Access Crunchbase and Tracxn via authenticated browser or API subscription. Cross-reference
        with Delaware corporate filings for any registered securities disclosures.
      relatedQuestionRefs:
        - QO009

    - type: missing-source
      severity: material
      topic: governance-board
      missingEvidence: >
        ThreatLocker has not publicly disclosed its board of directors composition, investor
        representative seats, or governance rights from its Series D and Series E financings.
      whyItMatters: >
        Board composition and investor governance rights determine how much independent oversight
        exists for a family-controlled management team, a key institutional investor risk factor.
      diligencePath: >
        Request board composition and governance term sheets in private due diligence. Review Delaware
        corporate filings for publicly accessible governance disclosures.
      relatedQuestionRefs:
        - QO007
        - QO008

    - type: enumeration-incomplete
      severity: minor
      topic: stakeholder or investor map
      missingEvidence: >
        Early-round investors (pre-Series D) are not publicly named. The complete cap table, board seat
        assignments, and secondary market activity are not disclosed.
      whyItMatters: >
        Without cap table visibility, ownership concentration, dilution trajectory, and alignment of
        economic and voting interests cannot be assessed.
      diligencePath: >
        Request cap table from ThreatLocker in private due diligence. Cross-reference any disclosed
        Delaware filings with Crunchbase and PitchBook for early investor data.
      relatedQuestionRefs:
        - QO009
      relatedTableRefs:
        - TO003

    - type: enumeration-incomplete
      severity: minor
      topic: milestone table
      missingEvidence: >
        Operational product launch milestones prior to 2022 (e.g., exact dates for Ringfencing,
        Storage Control, Network Control, PAM introductions) are not publicly documented at
        granular level.
      whyItMatters: >
        Without a complete product launch timeline, it is difficult to assess the cadence of
        innovation and whether the company was a fast or slow product iteration shop early on.
      diligencePath: >
        Request internal product roadmap and changelog from ThreatLocker or speak to early MSP
        partners who adopted the platform between 2018-2022.
      relatedQuestionRefs:
        - QO010
        - QO015
      relatedTableRefs:
        - TO004

    - type: missing-source
      severity: minor
      topic: legal-schwab-outcome
      missingEvidence: >
        The outcome, current status, and financial exposure of the ThreatLocker v. Charles Schwab
        lawsuit (6:2025cv00923, M.D. Fla.) filed May 2025 is unknown from public sources.
      whyItMatters: >
        If significant financial damages are at stake or the lawsuit is a symptom of a broader
        customer relationship problem, it could be material to the investment thesis.
      diligencePath: >
        Access PACER (federal court records) for case docket updates. Request management commentary
        on the lawsuit in private due diligence.
      relatedQuestionRefs:
        - QO028

    - type: missing-source
      severity: minor
      topic: ztna-comparison
      missingEvidence: >
        No independent side-by-side functional comparison between ThreatLocker's ZTNA (launched March 2026)
        and dedicated ZTNA vendors such as Zscaler Private Access, Cloudflare Access, or Palo Alto Prisma
        Access is available from publicly accessible sources at research time.
      whyItMatters: >
        ThreatLocker's ZTNA is newly launched; understanding how its feature set, scalability, and
        architectural approach compare to purpose-built ZTNA vendors is critical to evaluating platform
        credibility and competitive positioning in the network access market.
      diligencePath: >
        Request ThreatLocker technical architecture documentation for ZTNA. Conduct primary interviews
        with MSP partners who have evaluated or deployed the ZTNA module alongside Zscaler or Cloudflare.
        Review analyst reports from Gartner and Forrester on ZTNA market that may include ThreatLocker.
      relatedQuestionRefs:
        - QO029
