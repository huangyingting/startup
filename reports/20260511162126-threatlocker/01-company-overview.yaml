company:
  name: "ThreatLocker, Inc."
chapter:
  number: 1
  title: Company Overview
  summary: >
    ThreatLocker, Inc. is an Orlando, Florida-based cybersecurity company founded in 2017 that built a
    Zero Trust endpoint security platform on a default-deny application allowlisting philosophy. The
    company serves more than 70,000 organizations globally through a channel-first MSP model and achieved
    unicorn status with a $1.2 billion post-money valuation following its $60 million Series E in April
    2025, having raised approximately $253.6 million in total funding.

