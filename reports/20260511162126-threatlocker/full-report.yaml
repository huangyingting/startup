      - number: '2.3'
        title: Buyer Segmentation and Adoption Path
        blocks:
          - type: paragraph
            body: >
              ThreatLocker's primary buyer structure is channel-mediated through MSP partners who evaluate, select, and
              bundle ThreatLocker into managed security stacks for SMB clients with fewer than 500 employees. In this
              model, the MSP is simultaneously the buyer (procurement decision), reseller (packaged into monthly managed
              service fee), and primary support contact, while the SMB is the end user and indirect payer through their
              monthly managed service invoice. The MSP partner evaluates ThreatLocker based on technical fit with
              existing RMM and PSA tools, margin on resale, supportability for their technical team, and partner program
              quality including access to Cyber Hero 24/7 support. The adoption trigger in the SMB-via-MSP segment is
              typically a ransomware incident affecting a peer business, a cyber insurance renewal requiring documented
              application control, or an MSP platform-wide security architecture review following a breach event.
              Mid-market organizations with 500–2,500 employees may purchase directly from ThreatLocker, with the IT
              Director or CISO as buyer and a compliance mandate (SOC 2, HIPAA, PCI-DSS) as the adoption trigger, with
              CISO or CFO sign-off required for initial deployment. Healthcare organizations represent a vertically
              specific demand cluster driven by HIPAA Security Rule requirements for technical access safeguards, CISA
              healthcare-sector alerts, and the risk of OCR investigations; ThreatLocker references Hattiesburg Clinic
              as a publicly identified customer. Education institutions leverage E-Rate cybersecurity funding and state
              mandates following ransomware on school districts, with Niles Community Schools as a referenced
              deployment. Aviation and transportation accounts including JetBlue and Emirates reflect compliance-driven
              adoption under TSA cybersecurity directives and PCI-DSS requirements. The adoption funnel illustrates the
              typical conversion path from MSP awareness through trial, proof of concept, initial deployment, and module
              upsell, with the 24/7 Cyber Hero support team as the key friction-reduction mechanism at the
              proof-of-concept stage where allowlist policy build generates the most operational friction.
