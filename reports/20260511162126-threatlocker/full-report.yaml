      - number: '7.5'
        title: Mitigations, Kill Criteria, and Monitoring
        blocks:
          - type: paragraph
            body: >
              ThreatLocker's risk mitigations include: SOC 2 Type II certification for operational assurance; a
              dedicated compliance team (per company disclosures) addressing HIPAA Business Associate obligations; BAA
              execution with healthcare customers; standard AWS shared responsibility model reducing cloud
              infrastructure risk; and a growing MSP partner base that distributes concentration risk across 6,000-plus
              partners. Kill criteria for this investment include: a material regulatory enforcement action against
              ThreatLocker directly (not a customer using the product); an adverse judgment in the ThreatLocker v.
              Schwab litigation that results in material financial liability; a security breach of ThreatLocker's
              management console that compromises customer policy environments; CEO departure without a credible
              succession plan; or NRR below 85 percent for two consecutive quarters once disclosed. Monitoring triggers
              should include: quarterly G2/Gartner review score trends; MSP partner churn signals in channel press;
              HIPAA HHS enforcement actions in healthcare IT sector; FTC Safeguards enforcement actions against
              financial services firms citing vendor risk; and any new litigation filings naming ThreatLocker.
