      - number: '7.2'
        title: Operational and Security Risk
        blocks:
          - type: paragraph
            body: >
              ThreatLocker's default-deny model introduces an inherent false-positive risk: any misconfigured policy can
              block legitimate business-critical applications, causing operational disruptions for customers and support
              escalations for ThreatLocker. G2 and Gartner reviews document recurring false-positive incidents and steep
              learning curve complaints. At scale — 70,000-plus customers — even a low false-positive rate generates
              significant support volume that can strain ThreatLocker's operations team. The company holds SOC 2 Type II
              certification, providing third-party assurance of its security controls. However, the scope, coverage, and
              last audit date of the SOC 2 are not publicly specified, creating uncertainty about the depth of the
              assurance framework. ThreatLocker's cloud management console — a single-pane-of-glass for all policy
              management — is a high-value target for adversaries; compromise of the management console would enable an
              attacker to modify allowlists across thousands of endpoints. Supply chain risk is lower than peers given
              ThreatLocker's default-deny approach, but the company depends on kernel-level endpoint agent integrity.
              Any kernel-level driver vulnerability could be exploited to bypass ThreatLocker controls. ThreatLocker has
              not disclosed any material security incidents as of mid-2026.
            claimRefs:
