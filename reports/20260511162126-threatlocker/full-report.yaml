            body: >
              ThreatLocker reported more than 70,000 customers as of early 2026, a figure CEO Danny Jenkins has cited in
              multiple conference keynotes and media interviews. Independent estimates from Latka and Tracxn place the
              range at 65,000 to 75,000, consistent with company disclosures. Growth from approximately 40,000 customers
              in 2023 implies a two-year CAGR of roughly 32 percent, well above the broader endpoint security market
