      - number: '5.2'
        title: Core Security Modules
        blocks:
          - type: paragraph
            body: >
              ThreatLocker's module stack is additive and sold per-endpoint, enabling MSPs to tier their security
              offering by customer risk tolerance and budget. The core Application Allowlisting module is the platform
              foundation: it prevents any unapproved application from executing regardless of whether the threat is
              known or unknown, making it effective against zero-day malware, ransomware, and supply-chain attacks.
              Ringfencing extends the control surface by restricting what resources, including files, registry entries,
              network endpoints, and other processes, an already-approved application can access, limiting lateral
              movement after a phishing or credential compromise event.

              Storage Control blocks unauthorized access to removable media such as USB drives and network shares,
              preventing data exfiltration and ransomware encryption of shared files. Network Control adds
              per-application network allowlisting so each application can only communicate with explicitly permitted IP
              addresses and ports. Privileged Access Management provides credential vaulting so privileged passwords are
              never exposed in plaintext, while Elevation Control lets individual applications request elevated
              privileges without granting persistent local admin rights. The platform also includes an EDR module for
              behavioral threat detection and an MDR service layer, rounding out the preventive allowlisting stack with
              reactive detection. Each module ships under the Cyber Hero unlimited support model, providing 24/7 direct
              engineer support to customers at no additional cost. Customer case studies confirm the platform's
              effectiveness: Niles Community Schools prevented a ransomware attack using ThreatLocker's allowlisting,
              and Hattiesburg Clinic deployed ThreatLocker for healthcare endpoint protection aligned with HIPAA
              security requirements.
