  - number: 7
    title: Risks
    sections:
      - number: '7.1'
        title: Regulatory and Legal Risk
        blocks:
          - type: paragraph
            body: >
              ThreatLocker operates in a highly regulated environment. As a vendor processing or enabling the processing
              of PHI on behalf of healthcare customers, ThreatLocker may qualify as a HIPAA Business Associate,
              obligating it to maintain a compliant security program and execute Business Associate Agreements. A breach
              or enforcement action against a healthcare customer citing ThreatLocker's tooling could expose the company
              to secondary regulatory scrutiny. The FTC Safeguards Rule (16 C.F.R. Part 314) requires financial
              institutions — including ThreatLocker's financial services customers — to implement multi-layered
              technical safeguards; ThreatLocker's allowlisting and Ringfencing products are positioned as key control
              elements for this requirement. California's CCPA and similar state privacy laws impose data-handling
              obligations on ThreatLocker's customer data operations. The SEC's 2023 cybersecurity incident disclosure
              rule (Final Rule, Release No. 33-11216) requires material cybersecurity incidents to be disclosed within
              four business days, creating disclosure risk for ThreatLocker's public-company customers. The most acute
              legal risk is ThreatLocker, Inc. v. Charles Schwab Corp. (Case 6:2025cv00923, M.D. Fla.), filed in 2025.
              Case details are limited by court access; LQCRE's reporting indicates the dispute involves a commercial
              relationship, but the cause of action, damages sought, and litigation timeline are not publicly known. If
              ThreatLocker is a defendant or counter-party in an unfavorable outcome, the reputational and financial
              impact could be material.
            claimRefs:
              - CR001
              - CR002
              - CR003
              - CR004
              - CR005
              - CR006
              - CR007
