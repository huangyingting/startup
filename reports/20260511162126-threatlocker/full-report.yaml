      - number: '7.3'
        title: Partner and Dependency Risk
        blocks:
          - type: paragraph
            body: >
              ThreatLocker's go-to-market depends primarily on approximately 6,000 MSP partners who resell and manage
              ThreatLocker deployments for SMB customers. If the top 10 to 50 MSP partners account for a
              disproportionate share of customer volume or ARR, partner churn or competitive displacement (Kaseya,
              ConnectWise bundling) could materially impact ThreatLocker's business. Kaseya's acquisition of Datto and
              ConnectWise's platform expansion create scenarios where these MSP platform vendors bundle endpoint
              security competing with ThreatLocker into the base MSP toolstack. ThreatLocker depends on AWS and Azure
              for cloud infrastructure underlying its management console and policy management plane; an outage or terms
              change at either cloud provider would have operational impact. Microsoft's continued expansion of Windows
              Defender and Intune — integrated into Windows licensing — represents a low-cost bundled competitor that
              could reduce ThreatLocker's TAM in the SMB segment served by MSPs. SOC 2 and compliance certifications
              depend on ThreatLocker maintaining continuous audit readiness; any lapse in control documentation or
              third-party penetration testing could affect enterprise sales cycles.
            claimRefs:
