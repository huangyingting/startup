        title: New Capabilities 2025-2026
        blocks:
          - type: paragraph
            body: >
              ThreatLocker demonstrated significant platform velocity at Zero Trust World 2025 by announcing five new
              modules: Insights for security analytics and reporting, Patch Management for automated OS and application
              patching integrated with the allowlisting engine, User Store for centralized user identity management, Web
              Control for browser-level web access filtering, and Cloud Control for cloud application access governance.
              These additions signal a deliberate shift from a point-solution allowlisting tool toward a comprehensive
              Zero Trust platform, expanding the total addressable contract value per customer and positioning
              ThreatLocker to compete in adjacent security categories previously served by separate point solutions.

              Most significantly, ThreatLocker launched ZTNA and ZTCA in March 2026 as confirmed by a PR Newswire
              announcement. ZTNA replaces traditional VPN-based remote access with identity-verified, policy-driven
              network access that prevents credential-based lateral movement, directly addressing the attack pattern
              that bypasses traditional EPP controls. ZTCA extends this to cloud applications, providing access
              governance for SaaS and IaaS workloads. Together these two new modules expand ThreatLocker's addressable
              market beyond endpoint security into network and cloud access control, where Zscaler, Netskope, and Palo
              Alto ZTNA currently dominate. The data-center expansion supports both ZTNA and ZTCA latency requirements
              and compliance for international customers. CRN and TMCnet both covered ThreatLocker's 2026 platform
              expansion and MSP consolidation strategy, confirming third-party awareness of the product investment
