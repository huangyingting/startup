  - number: 4
    title: Financials
    sections:
      - number: '4.1'
        title: Revenue Model and Pricing
        blocks:
          - type: paragraph
            body: >
              ThreatLocker's revenue model is a recurring per-endpoint monthly subscription delivered primarily through
              Managed Service Provider partners who bundle it into their managed security stack. MSP partners collect
              the full managed security fee from SMB clients and remit a portion to ThreatLocker, making MSPs the
              primary revenue delivery channel for the majority of the company's approximately 70,000 protected
              organizations. A smaller segment of enterprise organizations in healthcare, aviation, education, and
              financial services purchase ThreatLocker under annual or multi-year contracts through direct sales. No
              revenue split between MSP-delivered and direct enterprise channels has been publicly disclosed.


              Pricing is opaque by design. ThreatLocker does not publish list pricing for any subscription tier; all
              pricing is negotiated through MSP volume agreements or direct enterprise contracts. This channel-mediated
              approach protects competitive positioning but makes it impossible to verify average selling prices from
              public sources. CrowdStrike's published list pricing of $299.99 to $924.99 per endpoint per year provides
              a competitive anchor; ThreatLocker likely prices below enterprise EDR incumbents given its SMB-first MSP
              channel positioning.


              ThreatLocker's module expansion strategy is a critical revenue quality driver. With thirteen or more
              modules available including Ringfencing, Storage Control, Network Control, PAM, ZTNA, and ZTCA, the
              platform offers meaningful upsell pathways that drive net revenue retention above 100% for customers
              expanding their Zero Trust stack. Five new modules launched at Zero Trust World 2025, and ZTNA and ZTCA
              launched in March 2026, expanding both addressable contract value per customer and the total addressable
              market. The revenue model bridge illustrates how MSP and direct channels generate gross subscription
              revenue, with MSP take-rates reducing net revenue before COGS, and module expansion driving net revenue
              retention. The Cyber Hero unlimited support model is included in the subscription cost and represents a
              cost center that may compress gross margin relative to platforms with tiered support pricing.
