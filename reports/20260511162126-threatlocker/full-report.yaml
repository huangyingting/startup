        title: Customer Vertical Segmentation
        blocks:
          - type: paragraph
            body: >
              ThreatLocker's customer base spans six primary verticals: healthcare, financial services, education,
              government, professional services, and general SMB via MSPs. Healthcare customers such as Hattiesburg
