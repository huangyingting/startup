      - number: '1.2'
        title: Founders, Leadership Team, and Governance
        blocks:
          - type: paragraph
            body: >
              ThreatLocker was co-founded by three individuals with complementary expertise. Danny Jenkins, CEO,
              conceived the default-deny application control approach after observing how detection-based security tools
              consistently failed to prevent ransomware and supply chain attacks. His brother Michael Jenkins serves as
              CTO, overseeing platform engineering and infrastructure. Sami Jenkins (COO) manages day-to-day operations,
              and John Carolan (CQA) oversees product and service quality. Rob Allen serves as Chief Product Officer
              leading roadmap execution. Together these five individuals form the publicly disclosed C-suite as of May
              2026.

              The concentration of three Jenkins family members across the top three executive positions (CEO, COO, and
              CTO) is a notable governance consideration for institutional investors. Family-led executive teams can
              exhibit stronger cultural cohesion and long-term orientation, but they also create key-person risk,
              potential succession planning gaps, and reduced independence in board oversight. ThreatLocker has not
              publicly disclosed its board composition, investor governance rights, or information rights agreements
              from its Series D and Series E financings, limiting visibility into how General Atlantic, Arthur Ventures,
              and other major investors exercise oversight.

              Leadership stability has been a strength: no senior executive departures have been disclosed since
              founding. Danny Jenkins is the company's primary public spokesperson and frequent industry event speaker.
              The "Cyber Hero" 24/7 unlimited support model — staffed by engineers, not tier-1 agents — reflects a
              service-first culture embedded from the company's founding values.
