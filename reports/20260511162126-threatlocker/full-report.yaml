          growth
        - Customer acquisition velocity metrics; NPS vs. comparable EPP platforms
      - - MSP channel moat
        - >-
          9,000+ MSP partners across 50+ countries; policy-library lock-in creates high switching costs; channel-first
          go-to-market is capital-efficient
        - MSP concentration unknown; Kaseya/ConnectWise bundling could displace ThreatLocker at platform level
        - Top-10 MSP ARR share < 30% = moat confirmed; > 50% = critical risk
      - - Revenue growth
        - >-
          Latka $61.7M (2023) → Tracxn $71.5M (2025) suggests ~8% CAGR floor; customer growth 50K→70K (+40%) implies
          higher ARR trajectory
        - ARR estimates are third-party only; actual ARR is completely unknown; estimated 16.8x multiple is unanchored
        - Audited FY2025 ARR; NRR ≥ 110% would confirm expansion revenue
