      - number: '6.3'
        title: Named Customer Proof
        blocks:
          - type: paragraph
            body: >
              ThreatLocker's public case study library includes documented production deployments at Orlando Magic (NBA
              franchise, full Ringfencing and allowlisting implementation), Indianapolis Colts (NFL franchise, endpoint
              lockdown), JetBlue Airways (airline, zero-trust application control for ground operations), Emirates
              (international airline, infrastructure protection), Hattiesburg Clinic (multi-specialty healthcare
              practice, HIPAA-driven adoption), and Niles Community Schools (K-12 district, device allowlisting). These
              are production deployments, not pilots, as confirmed by multi-year contract language and ongoing
              operational references in the case studies. Outcome claims include reduction in phishing-related lateral
              movement, elimination of unauthorized software installations, and improved audit trail fidelity for
              compliance reporting. However, quantified financial outcomes — such as breach cost avoided, IT hours
              saved, or security operations cost reduction — are absent from publicly available materials, limiting ROI
              evidence depth. Most case studies are self-published by ThreatLocker; independent press coverage
              corroborates named customer relationships but rarely validates specific outcome metrics independently.
