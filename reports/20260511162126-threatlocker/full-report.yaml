      - number: '2.2'
        title: 'Market Sizing: Multiple Lenses'
        blocks:
          - type: paragraph
            body: >
              Multiple analyst firms provide materially different estimates for the zero trust security and endpoint
              security markets, primarily due to boundary definitions. Fortune Business Insights sizes the global zero
              trust security market at $42.28 billion in 2025 with a 15.6% compound annual growth rate to $117 billion
              by 2032, while MarketsAndMarkets estimates $34.5 billion in 2026 with a 17.3% CAGR to $66.6 billion by
              2029. These top-level TAM figures include networking appliances, identity platforms, and cloud security
              layers that are adjacent to but not coextensive with ThreatLocker's endpoint focus. Grand View Research
              sizes the narrower endpoint security market at $17.6 billion in 2024 growing at 11% CAGR to $45.3 billion
              by 2033—a more directly comparable boundary, though it excludes the ZTNA and ZTCA adjacencies ThreatLocker
              entered in 2026. Mordor Intelligence provides a mid-range estimate combining endpoint security and ZTNA at
              $28.3 billion in 2025 with 13.4% CAGR to 2030. BIS Research offers a cross-check at $19.5 billion for the
              zero trust networking market in 2025. The serviceable addressable market requires bottom-up derivation.
              CompTIA estimates total North American MSP spend at approximately $150 billion in 2025, with security
              representing 8–12% of total MSP revenue, implying $12–18 billion in North American MSP security spend.
              Applying a 30–40% adjustment for the endpoint-focused zero trust share yields a SAM of approximately $4–6
              billion for MSP-delivered zero trust endpoint security in ThreatLocker's accessible markets. At an
              estimated $71.5 million ARR (Tracxn 2025, cross-validated with Latka), ThreatLocker's serviceable
              obtainable market represents less than 2% of the conservative $4 billion SAM and approximately 1.2% of the
              $6 billion high-case estimate. The analyst estimates differ by up to $8 billion at the 2025 baseline,
              driven by definitional disagreements over hardware network appliance inclusion, identity-layer spend
              allocation, and geographic coverage scope. The market sizing pyramid illustrates the nested TAM-SAM-SOM
              structure, while the market estimate range figure preserves the full analyst dispersion.
