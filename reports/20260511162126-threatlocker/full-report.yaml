      - number: '6.5'
        title: Go-to-Market, Expansion, and Concentration Risk
        blocks:
          - type: paragraph
            body: >
              ThreatLocker's primary distribution runs through approximately 6,000-plus MSP partners globally, creating
              significant partner-channel concentration risk. If the top 50 MSP partners account for a disproportionate
              share of customer volume — a plausible but unverified scenario — churn among a small number of large MSPs
              could materially impact customer count and ARR. The land-and-expand model operates at two levels: MSPs
              expand by adding endpoint seats for existing SMB clients, and direct enterprise accounts expand by
              deploying additional ThreatLocker modules including Ringfencing, Storage Control, and Network Control. AWS
              and Azure marketplace listings provide procurement convenience for enterprise buyers who prefer
              cloud-based billing. Key friction points include the complexity of policy migration when MSPs switch
              vendors and the learning curve for non-technical IT administrators. MSP consolidation — notably Kaseya's
              acquisition of Datto — creates risk that larger platform players will bundle endpoint security
              functionality competitive with ThreatLocker into existing MSP toolstacks. Expansion velocity is supported
              by the zero-trust compliance tailwind, but MSP platform competition from Kaseya and ConnectWise is a
              structural headwind for channel exclusivity.
