  - id: TE002
    title: Technology / Operating Architecture Table
    description: >
      Layer-by-layer breakdown of ThreatLocker's platform architecture components, dependencies, and technical risk per
      layer.
    columns:
      - Layer/Component
      - Role
      - Dependency
      - Risk
    rows:
      - - Cloud Management Console
        - Centralized multi-tenant policy configuration and telemetry aggregation
        - Cloud infrastructure provider not publicly named
        - Cloud outage delays policy updates; agents maintain last-known policy locally
      - - ThreatLocker Agent (Windows)
        - Kernel-level enforcement of allowlisting, Ringfencing, Network and Storage Control
        - Windows OS kernel; compatibility with existing security tools
        - Faulty agent update can cause BSOD or application breakage; staged rollout required
      - - ThreatLocker Agent (macOS)
        - Enforcement on Apple silicon and Intel macOS endpoints
        - macOS kernel extensions; Apple notarization and approval
        - Apple tightening of kernel extension access may require agent re-architecture
      - - Cloud Policy Replication
        - Pushes policy changes from console to distributed agents globally
        - Reliable internet connectivity at managed endpoints
        - Agent policy lag during extended outage; local caching provides partial resilience
      - - Data Center Network (14 centers)
        - Distributed policy sync, telemetry storage, and low-latency console access
        - Datacenter uptime; regional ISP connectivity for Saudi Arabia and Abu Dhabi
        - Single-region outage covered by multi-region redundancy; new international centers add operational complexity
      - - RMM Integration Layer
        - Enables MSP deployment and management from existing RMM consoles
        - ConnectWise, Datto, NinjaRMM API stability and versioning
        - RMM API deprecation or platform changes can break MSP deployment pipelines
    notes: >-
      Cloud infrastructure provider is inferred as a major public cloud; ThreatLocker has not publicly named its
      provider. Agent risk based on kernel-agent design patterns, not a published incident record.
