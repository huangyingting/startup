      - number: '1.4'
        title: Scale, Milestones, and Company Trajectory
        blocks:
          - type: paragraph
            body: >
              ThreatLocker's growth trajectory has been exceptional. The company grew its protected organization count
              from 50,000+ at Series D (April 2024) to 70,000+ by March 2026 — a 40% increase in roughly 23 months.
              Employee count grew from approximately 200 in 2023 to approximately 700 by March 2026 — a 250% headcount
              increase in about 30 months — reflecting aggressive hiring across product, engineering, sales, and support
              functions.

              Product milestones include the launch of Application Allowlisting (founding), Ringfencing, Storage
              Control, Network Control, PAM, and Elevation Control. In March 2026, ThreatLocker launched Zero Trust
              Network Access (ZTNA) and Zero Trust Cloud Access (ZTCA), extending the platform beyond the endpoint into
              network and cloud. At Zero Trust World 2025, the company unveiled five additional modules: Insights, Patch
              Management, User Store, Web Control, and Cloud Control. The company announced 14 new data centers in
              2025-2026 for global infrastructure expansion.

              Legal milestones include a 2022 trademark dispute against ThreatBlockr (Case 6:22-cv-02407, M.D. Fla.) and
              a contract dispute against Charles Schwab filed in May 2025 (Case 6:2025cv00923, M.D. Fla.). ThreatLocker
              has raised $253.6 million in total and holds a $1.2 billion unicorn valuation. This growth from an Orlando
              startup to a global 700-person cybersecurity platform covering endpoint, network, and cloud in under nine
              years is a strong indicator of product-market fit and execution quality. Sustained customer satisfaction
              (G2 4.8/5, Gartner Peer Insights 4.8/5) reinforces the narrative of genuine value delivery rather than
              growth at the expense of quality.
