chapters:
  - number: 1
    title: Company Overview
    sections:
      - number: '1.1'
        title: Company Identity, Founding, and Business Overview
        blocks:
          - type: paragraph
            body: >
              ThreatLocker, Inc. is a private cybersecurity company headquartered in Orlando, Florida, founded in 2017
              by Danny Jenkins (CEO), Sami Jenkins (COO), and John Carolan (Chief Quality Assurance Officer). The
              company operates under a Zero Trust philosophy with a "default-deny" model: by default, no application is
              permitted to run unless it has been explicitly allowlisted by an administrator. This stands in contrast to
              the legacy "default-allow" approach that dominated endpoint security for decades.

              ThreatLocker's primary go-to-market is through Managed Service Providers (MSPs), enabling the company to
              reach small-to-medium businesses that rely on MSPs for IT operations without building a costly direct
              sales force at that scale. The company also serves enterprise organizations directly, with notable
              customers including the Orlando Magic, Indianapolis Colts, JetBlue Airways, Emirates airlines, Hattiesburg
              Clinic, and Niles Community Schools — spanning entertainment, aviation, healthcare, and education
              verticals. As of March 2026, ThreatLocker protects 70,000+ organizations globally.

              Beyond its Orlando headquarters, ThreatLocker maintains international offices in Dublin, Ireland; Dubai,
              UAE; and Brisbane, Australia, and announced 14 new data centers in 2025-2026 (12 in the US, plus Saudi
              Arabia and Abu Dhabi). The company hosts Zero Trust World, an annual practitioner conference for MSPs and
              security professionals. Third-party review platforms rate the platform highly: G2 gives ThreatLocker 4.8
              out of 5 from 472 reviews (94/100 likeliness to recommend) and Gartner Peer Insights gives it 4.8 out of 5
              from 79 ratings.
