    notes: >
      Diligence asks are ranked by valuation impact. All items in this table are blocking or material for a definitive
      investment recommendation. Clearing all blocking items would be required before committing capital at the $1.2B
      mark.
    columns:
      - Priority
      - Topic
      - Missing Evidence
      - Why It Matters
      - Owner / Diligence Path
    rows:
      - - Blocking (1)
        - Revenue verification
        - Audited GAAP revenue + ARR for FY2023-FY2025
        - 16.8x multiple is unanchored without audited ARR; actual revenue could be 13x-25x at $1.2B
        - CFO/auditors; request in data room
      - - Blocking (2)
        - Gross margin and unit economics
        - Gross margin %, NRR, CAC, LTV by MSP cohort
        - Gross margin < 65% would compress sustainable multiple by 30-40%; NRR < 100% breaks growth model
        - CFO; request cohort financial model in data room
      - - Blocking (3)
        - Litigation exposure
        - Full docket, cause of action, damages sought in Case 6:2025cv00923
        - Unknown financial liability; adverse judgment could represent material ARR-equivalent loss
        - Legal counsel; PACER docket + management representation
      - - Material (4)
        - MSP channel concentration
        - Top-10 and top-50 MSP ARR share as % of total ARR
        - High concentration (> 50%) would amplify bear scenario severity
        - CRO; request top-partner revenue concentration in data room
      - - Material (5)
        - Board and governance structure
        - Board composition, investor governance rights, information rights, protective provisions from Series D and E
        - Governance quality affects IPO readiness timeline and multiple; family C-suite discount quantification
        - CEO/General Counsel; corporate governance memo
      - - Informational (6)
        - SOX readiness and IPO timeline
        - Audit committee status, SOX gap analysis, auditor engagement letter
        - IPO window depends on SOX readiness; delays push exit beyond 2028
        - CFO/General Counsel; governance readiness memo
    sourceRefs:
      - SV004
      - SV005
      - SV011
      - SV013
      - SV019
    claimRefs:
