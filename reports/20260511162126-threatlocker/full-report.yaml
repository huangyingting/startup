  - number: 2
    title: Market Analysis
    sections:
      - number: '2.1'
        title: Market Boundary and Definition
        blocks:
          - type: paragraph
            body: >
              ThreatLocker operates in the zero trust endpoint security market, defined by software that enforces a
              default-deny posture on endpoints: explicitly permitting only allowlisted applications, controlling
              storage device access, ringfencing application behaviors to limit lateral movement, and managing
              privileged access elevation at the workstation level. This definition is anchored by a prevention-first
              philosophy that contrasts sharply with detection-based endpoint security (EDR, XDR, legacy antivirus),
              which permits execution and responds after threat detection. The included spend categories are:
              application allowlisting and control, endpoint privilege access management for workstations, storage
              access control, application ringfencing, zero trust network access delivered via an endpoint agent, and
              zero trust cloud access for managed endpoints. Excluded spend covers pure detection-based EDR platforms
              where no allowlist enforcement is primary (CrowdStrike Falcon, SentinelOne Singularity), network-only ZTNA
              without endpoint enforcement, server and infrastructure-only PAM, standalone cloud security posture
              management without agent delivery, and identity-only IAM platforms without endpoint control. The primary
              status-quo substitutes ThreatLocker displaces include Windows Defender bundled at zero marginal cost with
              Microsoft 365, traditional antivirus and EDR solutions, and in larger accounts, legacy application
              whitelisting tools. ThreatLocker entered ZTNA and ZTCA adjacencies in March 2026, modestly expanding its
              addressable market beyond the pure endpoint security boundary. The market estimate range figure
              illustrates the material gap between endpoint security estimates ($17.6B) and broader zero trust security
              definitions ($34.5–42.3B), making boundary definition critical to any sizing conclusion. Spend on
              cloud-only workloads without a managed endpoint agent, unmanaged BYOD devices, and infrastructure-layer
              network controls falls outside ThreatLocker's current scope.
