      - number: '3.2'
        title: Competitor Profiles and Comparison
        blocks:
          - type: paragraph
            body: >
              CrowdStrike Falcon is the dominant enterprise EDR/XDR platform with $3.1 billion in annual recurring
              revenue for fiscal year 2025 (ended January 31, 2025) and more than 29,000 subscription customers,
              deployed primarily in mid-market and enterprise organizations. Its AI-driven Falcon platform offers
              superior threat detection breadth, XDR telemetry integration, and identity threat protection, but operates
              on a default-allow philosophy and is priced at $299.99 to $924.99 or more per endpoint per year at list
              rates — a premium that limits SMB penetration. CrowdStrike's MSP distribution channel is limited relative
              to ThreatLocker's MSP-native model. SentinelOne Singularity reported $936 million in ARR for fiscal year
              2026 (ended January 31, 2026) and differentiates through autonomous AI-driven threat response and its
              Purple AI analyst assistant. Like CrowdStrike, it uses a default-allow model and is priced at $69.99 to
              $229.99 or more per endpoint per year at list rates. Microsoft Defender for Business represents the most
              significant pricing constraint in the SMB market, bundled within Microsoft 365 Business Premium at $22 per
              user per month alongside email, identity, and compliance tools, and available standalone at $3 per user
              per month. Its default-allow architecture and absence of application allowlisting anchor the SMB pricing
              floor and constrain what MSP-delivered endpoint security vendors can charge. Malwarebytes ThreatDown,
              rebranded following Vector Capital's 2023 acquisition, focuses on SMB EDR through its MSP-native OneView
              console at competitive price points but offers no application allowlisting or default-deny capability.
              Bitdefender GravityZone claims 1,600 or more MSP partners and provides multi-tenant MSP management and
              competitive pricing but also operates on a default-allow model. Carbon Black, now under Broadcom following
              the VMware acquisition completed in November 2023, has experienced channel disruption and limited
              competitive momentum in the SMB and MSP segments. The feature and pricing comparison tables document these
              differences systematically across six vendors and five key capability dimensions.
