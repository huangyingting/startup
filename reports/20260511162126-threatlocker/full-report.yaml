      - number: '4.2'
        title: Unit Economics and Margin Analysis
        blocks:
          - type: paragraph
            body: >
              ThreatLocker's unit economics are substantially unknown from public sources. No gross margin, customer
              acquisition cost, average contract value, net revenue retention, payback period, or burn rate has been
              disclosed by the company or confirmed by a credible primary source. The unit economics table documents six
              core metrics and assigns each a low confidence rating given the absence of primary data, while the unit
              economics bridge illustrates the qualitative flow from new partner onboarding through per-endpoint revenue
              generation, gross margin capture, CAC recovery, and lifetime value expansion via module upsell.


              Benchmarking from SaaS peers provides proxy estimates for ThreatLocker's potential margin range.
              CrowdStrike reported a non-GAAP gross margin of approximately 75% for fiscal year 2025, and SentinelOne
              reported approximately 74% for fiscal year 2026. These benchmarks establish a 70-80% gross margin range as
              plausible for a comparable endpoint security SaaS platform. However, ThreatLocker's heavy MSP channel
              reliance introduces a structural headwind: MSP partners typically apply a 30-50% take-rate on managed
              security spending, which may reduce ThreatLocker's effective gross revenue per endpoint below list pricing
              and compress gross margin below the pure-play SaaS peer benchmark if the estimates in those benchmarks
              reflect direct-to-enterprise economics.


              Implied unit economics can be estimated from the publicly available customer count of 70,000 or more
              organizations as of March 2026 and the third-party ARR estimate of $71.5 million from Tracxn 2025. This
              implies an average revenue per organization of approximately $1,000 per year, consistent with a 50-150
              endpoint SMB customer base at approximately $8-15 per endpoint per month. With approximately 700 employees
              and $71.5 million estimated ARR, ThreatLocker's ARR per employee ratio of approximately $102,000 is below
              best-in-class SaaS efficiency but consistent with a company in rapid headcount growth investing heavily in
              R&D, sales, and support infrastructure. High G2 and Gartner Peer Insights scores of 4.8 out of 5 are
              positive leading indicators of customer satisfaction and low voluntary churn, which supports the thesis
              that net revenue retention is likely above 100%.
