      - number: '4.4'
        title: Financial Verdict and Diligence Blockers
        blocks:
          - type: paragraph
            body: >
              ThreatLocker's financial profile exhibits strong revenue quality characteristics despite significant
              disclosure gaps. The core subscription model is recurring, per-endpoint, driven by compliance mandates and
              allowlist policy lock-in, with low churn risk and high revenue visibility. MSP-delivered SMB revenue
              provides broad geographic and customer diversification without concentrated enterprise credit risk. At
              approximately 16-17x estimated ARR, ThreatLocker's $1.2 billion valuation exceeds the current public
              market median for endpoint security software, reflecting investor confidence in the growth trajectory and
              market opportunity. The MSP channel's lower direct customer acquisition cost relative to enterprise-
              direct models provides structural capital efficiency that may support faster-than- expected progress
              toward profitability.


              Comparison to public peers illustrates the gap in absolute scale: CrowdStrike's ARR of $3.1 billion is
              approximately 43 times ThreatLocker's estimated ARR, and SentinelOne's $936 million ARR is approximately
              13 times larger. This gap indicates ThreatLocker is at an early-to-mid growth stage with substantial
              runway within the $42.28 billion global zero trust security market, where its approximately $71.5 million
              ARR represents less than 0.2% of total addressable market. The subscription model has low revenue
              recognition risk relative to enterprise license or usage-based models, and no evidence of pricing
              pressure, contract non-renewals, or large-scale customer losses has been identified in public review data.


              The primary financial diligence blockers are documented in the public financial gaps table and represent
              the core constraints on quantitative underwriting. Without management-reported ARR growth, gross margin,
              net revenue retention, and CAC data, it is not possible to model ThreatLocker's intrinsic value with
              precision. A private due diligence process requiring the latest board financial package including an ARR
              bridge, income statement with COGS detail, cohort-level NRR, and CAC by channel would substantially close
              these gaps. The ThreatLocker v. Charles Schwab litigation represents an unquantified financial contingency
              that should be addressed in any acquisition or investment process. Family governance concentration across
              CEO, COO, and CTO roles also warrants assessment of alignment risk for minority shareholders in a
              potential liquidity scenario.
