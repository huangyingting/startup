    title: 'Product Architecture Map: ThreatLocker Module Stack'
    type: stack
    description: >
      Layered module stack illustrating ThreatLocker's platform architecture from the cloud management console and
      endpoint agent foundation through the full module set including the newly launched ZTNA and ZTCA network access
      tier.
    summary: Eight-layer platform stack from cloud console and agent foundation through ZTNA/ZTCA at the network access tier.
    data:
      items:
        - label: Zero Trust Network and Cloud Access (ZTNA/ZTCA)
          value: Identity-based network and cloud access control; credential-attack resistant; GA March 2026
        - label: Endpoint Detection and Response (EDR/MDR)
          value: Behavioral threat detection and incident response complementing allowlisting prevention
        - label: Privileged Access Management and Elevation Control
          value: Credential vaulting; app-level elevation without persistent admin; reduces privilege abuse
        - label: Network Control and Storage Control
          value: Per-application network allowlisting and USB/NFS storage blocking
        - label: Ringfencing
          value: Application resource isolation post-execution; prevents lateral movement after compromise
        - label: Application Allowlisting (Core)
          value: Default-deny execution engine; blocks all unapproved apps, scripts, and macros
        - label: ThreatLocker Agent
          value: Kernel-level endpoint enforcement on Windows and macOS; local policy cache for offline resilience
        - label: Cloud Management Console
          value: Multi-tenant policy management; MSP and enterprise dashboard; 14-datacenter global footprint
