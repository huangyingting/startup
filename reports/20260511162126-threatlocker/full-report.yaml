      - number: '1.3'
        title: Funding History, Investors, and Valuation
        blocks:
          - type: paragraph
            body: >
              ThreatLocker has raised approximately $253.6 million in total venture capital funding. The most
              significant milestone was April 2024 when the company closed a $115 million Series D led by General
              Atlantic, with StepStone Group and D.E. Shaw Group participating, establishing a post-money valuation of
              approximately $750 million. This round coincided with ThreatLocker reaching 50,000+ customer
              organizations. In April 2025, ThreatLocker closed a $60 million Series E led by Arthur Ventures and CR2
              Ventures, with Elephant Venture Capital and returning investor StepStone Group, reaching a $1.2 billion
              post-money valuation and achieving unicorn status.

              The Series E's relatively small raise ($60M) compared to the valuation step-up ($750M to $1.2B) is
              notable: it suggests the company was profitable or near-profitable and did not require large primary
              capital injection. Elephant VC and Arthur Ventures were returning investors in the Series E, indicating
              continued conviction in the company's trajectory. The investor map includes major institutional players
              spanning growth equity (General Atlantic), venture (Arthur Ventures, CR2 Ventures, Elephant VC),
              fund-of-funds (StepStone Group), and quantitative finance (D.E. Shaw Group).

              Primary press releases for the Series E round on PR Newswire and BusinessWire returned 404 errors at time
              of research, but the round is corroborated by PremierAlts and Tracxn analyst data. The company has not
              disclosed ARR, gross margin, burn rate, or profitability status. Revenue estimates from Latka ($61.7M,
              2023) and Tracxn ($71.5M, 2025) are third-party figures and may understate actual ARR given the rapid
              customer growth trajectory.
