      - number: '7.4'
        title: People and Execution Risk
        blocks:
          - type: paragraph
            body: >
              ThreatLocker is a founder-CEO-led company with Danny Jenkins as a prominent public figure, frequent
              conference speaker, and technical visionary. Key-person dependency on Jenkins is a material risk: his
              departure or incapacitation would remove the primary product and culture driver at a critical growth
              inflection point. The company grew from approximately 40,000 to 70,000-plus customers in two years,
              requiring substantial operational scaling across engineering, sales, support, and compliance functions.
              Talent acquisition and retention in the cybersecurity engineering market is highly competitive; Orlando,
              Florida, while a growing tech hub, is a smaller talent pool than San Francisco Bay Area or New York.
              Series D funding positions ThreatLocker for continued growth but also creates pressure to scale revenue in
              line with investor expectations. If revenue or customer growth disappoints post-Series D, the company may
              face pressure on burn, valuation, and employee morale. Management depth below the CEO level has not been
              independently assessed; the bench of senior engineering and go-to-market leaders is not publicly
              documented, creating uncertainty about succession depth.
            claimRefs:
