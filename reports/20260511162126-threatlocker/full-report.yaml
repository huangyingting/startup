      - number: '3.3'
        title: Moat, Switching Costs, and Distribution
        blocks:
          - type: paragraph
            body: >
              ThreatLocker's competitive moat rests on four reinforcing mechanisms that deepen with customer tenure:
              allowlist policy lock-in, MSP channel depth, Cyber Hero support differentiation, and Zero Trust World
              community mindshare. Allowlist policies — the core operational data asset accumulated by ThreatLocker
              customers over months and years of deployment — represent the highest-durability moat element. Each
              client's allowlist encodes specific application workflows, approved software versions, and organizational
              exception logic that would require complete recreation in any competing platform. This switching cost is
              architecturally distinct from generic SaaS churn barriers: allowlists are not portable to default-allow
              EDR platforms such as CrowdStrike or SentinelOne, because those platforms do not have a comparable
              allowlist enforcement model. Switching requires not only a software migration but a fundamental security
              architecture change from prevention-first to detection-first, a decision that exposes the organization to
              a security posture gap during the transition period. ThreatLocker's MSP channel depth — with integrations
              spanning 1,600 or more MSP partner ecosystems including ConnectWise, Kaseya, and Datto — constitutes a
              distribution moat built over years. ConnectWise, Kaseya, and Datto are the dominant RMM and PSA platforms
              in North American MSP markets; deep integrations with these platforms make ThreatLocker a natural
              selection when MSPs standardize their security stack. The Cyber Hero 24/7 engineer-staffed support model
              directly addresses the primary onboarding friction in allowlisting adoption. G2 scores of 4.8 out of 5 for
              ThreatLocker versus 4.6 for CrowdStrike reflect superior ease-of-use and customer support ratings across
              independent reviews, and Gartner Peer Insights scores of 4.8 out of 5 from 79 ratings corroborate this
              satisfaction signal. Zero Trust World, ThreatLocker's annual MSP-focused conference, deepens community
              identity around the default-deny philosophy and creates reputational reinforcement beyond the product
              itself.
