              primary distribution vehicle, accounting for an estimated 60 to 65 percent of total customer count by
              endpoint seat. Direct enterprise and mid-market accounts, sourced through ThreatLocker's internal sales
              team and AWS and Azure marketplace listings, represent the remaining 35 to 40 percent. ThreatLocker's
              deployment footprint spans more than 180 countries, though revenue concentration in North America is
              expected to be high. Customer-count growth is the strongest publicly verifiable traction signal; ARR,
              revenue cohorts, and NRR remain undisclosed for a private company at this stage. The six-thousand-plus MSP
              partner network provides structural distribution breadth but also introduces concentration risk if a small
