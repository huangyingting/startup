      - number: '6.4'
        title: Customer Satisfaction and Retention
        blocks:
          - type: paragraph
            body: >
              G2 rates ThreatLocker 4.8 out of 5 from more than 920 reviews as of Q1 2026, with policy granularity,
              visibility into application behavior, and effective ransomware blocking as recurring praise themes.
              Gartner Peer Insights awarded ThreatLocker a Customers' Choice distinction in the zero-trust network
              access category with a 4.8 out of 5 rating. PeerSpot and Capterra average between 4.7 and 4.8 out of 5
              across more than 200 combined reviews, consistent with G2 and Gartner scores. TrustRadius places
              ThreatLocker in the top quartile of endpoint security tools. Recurring negative review themes include
              steep initial learning curve — particularly for policy tuning — complex onboarding for organizations
              without dedicated IT staff, and occasional false positives that block legitimate software. Adverse reviews
              on Cybernews and practitioner community forums flag frustration with support responsiveness during
              high-volume onboarding events. NRR and GRR are not publicly disclosed; the high satisfaction scores and
              absence of a mass-churn narrative in MSP community forums are positive proxies but do not substitute for
              verified retention data. Contract renewal rates and cohort-level churn are key diligence gaps that must be
              addressed in any data room process.
