  - number: 8
    title: Valuation
    sections:
      - number: '8.1'
        title: Investment Thesis and Anti-Thesis
        blocks:
          - type: paragraph
            body: >
              ThreatLocker's investment thesis anchors on structural defensibility: its default-deny,
              application-allowlisting architecture cannot be easily replicated by traditional EDR vendors without
              rebuilding the detection model from scratch. The MSP channel provides built-in distribution scale
              (70,000-plus organizations protected through approximately 6,000 MSP partners across 50-plus countries),
              creates high switching costs through policy-library lock-in, and makes churn structurally difficult for
              SMB customers who rely on MSP-managed policies. Regulatory tailwinds — HIPAA BAA requirements, FTC
              Safeguards Rule, state privacy laws — create a durable compliance use case that is budget-resilient in
              downturns. TAM expansion from zero-trust security adoption mandates and ransomware threat escalation
              provides a long-duration growth runway corroborated by Fortune Business Insights and MarketsAndMarkets
              market forecasts.

              The anti-thesis centers on four concerns. First, channel concentration: if the top 10-50 MSP partners
              account for a disproportionate share of ARR, churn among a small number of mega-MSPs (Kaseya, ConnectWise,
              or major independent MSPs) could materially impair the business. Second, revenue estimate uncertainty: all
              revenue figures are third-party approximations; actual ARR is unknown and could be above or below the
              $71.5M Tracxn estimate. Third, governance risk: three Jenkins family members hold the CEO, COO, and CTO
              roles, creating key-person dependency and potential governance conflicts that institutional investors
              would price as a discount. Fourth, the active ThreatLocker v. Schwab lawsuit (Case 6:2025cv00923) creates
              unquantified financial and reputational exposure.
            claimRefs:
              - CV001
              - CV004
              - CV014
              - CV034
              - CV035
              - CV038
              - CV041
