  - id: FE002
    title: 'Customer Workflow / Operating Flow: Default-Deny Enforcement Cycle'
    type: flow
    description: >
      Flow diagram showing how ThreatLocker's default-deny enforcement cycle operates from admin policy configuration
      through agent enforcement, application execution attempt, allowlist evaluation, and telemetry feedback to the
      console.
    summary: Six-node enforcement flow from admin policy configuration to block/allow decision with telemetry feedback loop.
    data:
      nodes:
        - id: n1
          label: IT Admin or MSP Engineer
          description: Configures allowlists, Ringfencing rules, and module policies in the cloud management console
        - id: n2
          label: Cloud Management Console
          description: Stores and distributes policies to all managed endpoints; aggregates telemetry and alerts
        - id: n3
          label: ThreatLocker Agent on Endpoint
          description: Receives and enforces policy in real time at kernel level on each managed endpoint
        - id: n4
          label: Application Execution Attempt
          description: Any software, script, or macro attempts to execute on the managed endpoint
        - id: n5
          label: Allowlist and Ringfencing Check
          description: Agent compares execution and resource access attempt against approved application policy
        - id: n6
          label: Block or Allow plus Alert
          description: Approved applications execute; unapproved are blocked; all events are logged and alerted
      edges:
        - from: n1
          to: n2
          label: Configure and update policy
        - from: n2
          to: n3
          label: Push policy to endpoint agent
        - from: n4
          to: n5
          label: Trigger policy evaluation
        - from: n5
          to: n6
          label: Enforcement decision rendered
        - from: n6
          to: n2
          label: Telemetry and alert feedback
