      - number: '8.6'
        title: Exit Readiness, Final Diligence Asks, and Thesis-Break Triggers
        blocks:
          - type: paragraph
            body: >
              ThreatLocker's IPO readiness is emerging but not confirmed. The company has the brand recognition,
              customer scale (70,000-plus organizations), and market narrative (zero trust, MSP-first) required to
              support a public offering. Its revenue run rate, if the Tracxn $71.5M estimate is directionally correct,
              would need to reach at least $150-200M ARR before a credible Nasdaq or NYSE listing, suggesting an IPO
              window of 2027-2029 at current growth rates. Pre-IPO governance requirements — audited GAAP financials for
              3 fiscal years, Sarbanes-Oxley internal control readiness, an independent board majority — have not been
              publicly demonstrated. The Jenkins family's three-member C-suite concentration would require board
              independence additions and potentially dual-class share structuring to satisfy institutional IPO
              investors.

              Strategic M&A exit at $1.5-2.5B is possible if Palo Alto Networks, CrowdStrike, or Microsoft seeks to
              acquire the MSP channel asset. PE-led buyouts of comparable cybersecurity SaaS companies have occurred at
              4-8x revenue, implying $285-570M — well below the $1.2B Series E mark and unattractive to late-stage
              investors.

              Thesis-break triggers requiring investment hold: an adverse judgment in ThreatLocker v. Schwab with
              material financial liability; a confirmed breach of ThreatLocker's management console; CEO departure
              without succession; or NRR below 85% for two consecutive quarters once disclosed. Final diligence asks
              before increasing position: audited FY2023-FY2025 financials, top-10 MSP ARR concentration, gross margin
              confirmation (target: >70%), NRR (target: >110%), and board composition and governance rights
              documentation.
