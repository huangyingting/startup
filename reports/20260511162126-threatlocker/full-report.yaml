  - number: 3
    title: Competitors
    sections:
      - number: '3.1'
        title: Competitive Landscape Overview
        blocks:
          - type: paragraph
            body: >
              The global endpoint security market is organized around a fundamental architectural divide: default-deny
              versus default-allow. Default-allow platforms — comprising CrowdStrike Falcon, SentinelOne Singularity,
              Microsoft Defender for Business, Malwarebytes ThreatDown, Bitdefender GravityZone, and Carbon Black —
              permit all software to execute by default and rely on behavioral detection, machine learning, and threat
              intelligence feeds to identify malicious behavior after it attempts to run. This detection-first model is
              effective against known threat signatures but structurally exposes a window during which novel ransomware,
              fileless malware, and zero-day exploits may execute before behavioral patterns are recognized.
              ThreatLocker inverts this model entirely: its default-deny architecture prevents any unapproved
              application from executing regardless of whether a threat signature exists, eliminating the detection
              window as an architectural property rather than relying on signature coverage breadth. This structural
              difference is ThreatLocker's core value proposition and primary differentiation from all seven profiled
              competitors across all four competitive categories: enterprise EDR/XDR (CrowdStrike, SentinelOne), bundled
              security suites (Microsoft Defender), SMB-focused managed endpoint security (Malwarebytes ThreatDown,
              Bitdefender GravityZone), and enterprise behavioral detection (Carbon Black via Broadcom). The competitive
              positioning map illustrates this differentiation visually, placing ThreatLocker uniquely in the
              upper-right quadrant combining maximum Zero Trust strictness with highest SMB and MSP channel fit — a
              quadrant no profiled competitor occupies simultaneously. Microsoft Defender occupies high SMB penetration
              but low Zero Trust strictness; CrowdStrike and SentinelOne achieve moderate Zero Trust features but low
              MSP-native distribution; Malwarebytes and Bitdefender have MSP reach but minimal Zero Trust depth.
              ThreatLocker's uniqueness in this two-dimensional space is its most durable competitive position, though
              the durability of that position faces displacement risks from incumbents building allowlisting add-ons and
              AI-native new entrants.
