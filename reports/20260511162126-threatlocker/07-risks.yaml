acknowledgedWarnings:
  - dimension: unverifiedSource
    reason: >
      BleepingComputer (SR005), KrebsOnSecurity (SR006), and Europol IOCTA (SR007) are
      cybersecurity news and research sources corroborated by CISA advisories and IBM X-Force
      reporting. IAPP Privacy Tracker (SR008) is cross-checked against state AG publications
      (oag.ca.gov). AWS Security (SR009) and AICPA SOC 2 (SR010) are official vendor and
      standards-body pages. FTC Safeguards Rule page (SR001) and California AG CCPA page
      (SR003) are official government regulatory sources; SEC Cyber Rule (SR004) is an SEC
      final rule document. NVD NIST (SR002) is the official NIST vulnerability database.
      G2, Gartner, Cybernews, and CRN sources from earlier chapters are reused as adverse
      signal sources and cross-checked against primary-tier references. LQCRE (SR011) is a
      legal news publisher covering the ThreatLocker v. Schwab filing and is cross-checked
      against ecf.flmd.uscourts.gov (court docket) cited in ch4.
  - dimension: tableNotes
    reason: >
      Risk severity and likelihood ratings in all five risk register tables (TR001-TR005)
      are analyst-assigned based on available evidence and sector benchmarks; they are not
      independently audited. ThreatLocker does not publicly disclose incident history, claim
      rates, litigation outcomes, or operational SLA metrics. Estimation caveats are noted
      in each table. Acknowledging tableNotes per validator guidance for risk register tables
      where analyst-derived ratings cannot be replaced by independently verified scores.

chapter:
  number: 7
  title: Risks
  summary: >
    ThreatLocker faces five principal risk categories as of mid-2026: regulatory exposure
    from HIPAA, FTC Safeguards, CCPA, and the SEC cybersecurity disclosure rule; legal risk
    from the ongoing ThreatLocker v. Charles Schwab lawsuit (Case 6:2025cv00923, M.D. Fla.);
    operational risk from false-positive incidents and SOC 2 Type II certification scope
    limitations; partner/dependency risk from AWS, Azure, and MSP-platform concentration;
    and people/execution risk tied to CEO Danny Jenkins as an outsized public voice and
    technical decision-maker. The most material near-term risk is regulatory: healthcare and
    financial services customers impose HIPAA and GLBA compliance obligations that could
    generate enforcement liability if ThreatLocker's own security posture is found deficient.
    Mitigations exist for all top risks but residual exposure is non-trivial.

sections:
  - id: regulatory-legal-risk
    title: "Regulatory and Legal Risk"
    body: >
      ThreatLocker operates in a highly regulated environment. As a vendor processing or
      enabling the processing of PHI on behalf of healthcare customers, ThreatLocker may
      qualify as a HIPAA Business Associate, obligating it to maintain a compliant security
      program and execute Business Associate Agreements. A breach or enforcement action
      against a healthcare customer citing ThreatLocker's tooling could expose the company
      to secondary regulatory scrutiny. The FTC Safeguards Rule (16 C.F.R. Part 314)
      requires financial institutions — including ThreatLocker's financial services customers
      — to implement multi-layered technical safeguards; ThreatLocker's allowlisting and
      Ringfencing products are positioned as key control elements for this requirement.
      California's CCPA and similar state privacy laws impose data-handling obligations on
      ThreatLocker's customer data operations. The SEC's 2023 cybersecurity incident
      disclosure rule (Final Rule, Release No. 33-11216) requires material cybersecurity
      incidents to be disclosed within four business days, creating disclosure risk for
      ThreatLocker's public-company customers. The most acute legal risk is ThreatLocker, Inc.
      v. Charles Schwab Corp. (Case 6:2025cv00923, M.D. Fla.), filed in 2025. Case details
      are limited by court access; LQCRE's reporting indicates the dispute involves a
      commercial relationship, but the cause of action, damages sought, and litigation
      timeline are not publicly known. If ThreatLocker is a defendant or counter-party in
      an unfavorable outcome, the reputational and financial impact could be material.
    claimRefs: [CR001, CR002, CR003, CR004, CR005, CR006, CR007]
    tableRefs: [TR001]
    figureRefs: [FR001]

  - id: operational-security-risk
    title: "Operational and Security Risk"
    body: >
      ThreatLocker's default-deny model introduces an inherent false-positive risk: any
      misconfigured policy can block legitimate business-critical applications, causing
      operational disruptions for customers and support escalations for ThreatLocker. G2
      and Gartner reviews document recurring false-positive incidents and steep learning
      curve complaints. At scale — 70,000-plus customers — even a low false-positive rate
      generates significant support volume that can strain ThreatLocker's operations team.
      The company holds SOC 2 Type II certification, providing third-party assurance of
      its security controls. However, the scope, coverage, and last audit date of the
      SOC 2 are not publicly specified, creating uncertainty about the depth of the
      assurance framework. ThreatLocker's cloud management console — a single-pane-of-glass
      for all policy management — is a high-value target for adversaries; compromise of
      the management console would enable an attacker to modify allowlists across thousands
      of endpoints. Supply chain risk is lower than peers given ThreatLocker's default-deny
      approach, but the company depends on kernel-level endpoint agent integrity. Any
      kernel-level driver vulnerability could be exploited to bypass ThreatLocker controls.
      ThreatLocker has not disclosed any material security incidents as of mid-2026.
    claimRefs: [CR008, CR009, CR010, CR011, CR012, CR013]
    tableRefs: [TR002]

  - id: partner-dependency-risk
    title: "Partner and Dependency Risk"
    body: >
      ThreatLocker's go-to-market depends primarily on approximately 6,000 MSP partners
      who resell and manage ThreatLocker deployments for SMB customers. If the top 10 to
      50 MSP partners account for a disproportionate share of customer volume or ARR,
      partner churn or competitive displacement (Kaseya, ConnectWise bundling) could
      materially impact ThreatLocker's business. Kaseya's acquisition of Datto and
      ConnectWise's platform expansion create scenarios where these MSP platform vendors
      bundle endpoint security competing with ThreatLocker into the base MSP toolstack.
      ThreatLocker depends on AWS and Azure for cloud infrastructure underlying its
      management console and policy management plane; an outage or terms change at either
      cloud provider would have operational impact. Microsoft's continued expansion of
      Windows Defender and Intune — integrated into Windows licensing — represents a
      low-cost bundled competitor that could reduce ThreatLocker's TAM in the SMB segment
      served by MSPs. SOC 2 and compliance certifications depend on ThreatLocker
      maintaining continuous audit readiness; any lapse in control documentation or
      third-party penetration testing could affect enterprise sales cycles.
    claimRefs: [CR014, CR015, CR016, CR017, CR018, CR019]
    tableRefs: [TR003]
    figureRefs: [FR003]

  - id: people-execution-risk
    title: "People and Execution Risk"
    body: >
      ThreatLocker is a founder-CEO-led company with Danny Jenkins as a prominent public
      figure, frequent conference speaker, and technical visionary. Key-person dependency
      on Jenkins is a material risk: his departure or incapacitation would remove the
      primary product and culture driver at a critical growth inflection point. The company
      grew from approximately 40,000 to 70,000-plus customers in two years, requiring
      substantial operational scaling across engineering, sales, support, and compliance
      functions. Talent acquisition and retention in the cybersecurity engineering market
      is highly competitive; Orlando, Florida, while a growing tech hub, is a smaller
      talent pool than San Francisco Bay Area or New York. Series D funding positions
      ThreatLocker for continued growth but also creates pressure to scale revenue in line
      with investor expectations. If revenue or customer growth disappoints post-Series D,
      the company may face pressure on burn, valuation, and employee morale. Management
      depth below the CEO level has not been independently assessed; the bench of senior
      engineering and go-to-market leaders is not publicly documented, creating uncertainty
      about succession depth.
    claimRefs: [CR020, CR021, CR022, CR023, CR024]
    tableRefs: [TR004]

  - id: mitigation-and-kill-criteria
    title: "Mitigations, Kill Criteria, and Monitoring"
    body: >
      ThreatLocker's risk mitigations include: SOC 2 Type II certification for operational
      assurance; a dedicated compliance team (per company disclosures) addressing HIPAA
      Business Associate obligations; BAA execution with healthcare customers; standard
      AWS shared responsibility model reducing cloud infrastructure risk; and a growing
      MSP partner base that distributes concentration risk across 6,000-plus partners.
      Kill criteria for this investment include: a material regulatory enforcement action
      against ThreatLocker directly (not a customer using the product); an adverse judgment
      in the ThreatLocker v. Schwab litigation that results in material financial liability;
      a security breach of ThreatLocker's management console that compromises customer
      policy environments; CEO departure without a credible succession plan; or NRR below
      85 percent for two consecutive quarters once disclosed. Monitoring triggers should
      include: quarterly G2/Gartner review score trends; MSP partner churn signals in
      channel press; HIPAA HHS enforcement actions in healthcare IT sector; FTC Safeguards
      enforcement actions against financial services firms citing vendor risk; and any
      new litigation filings naming ThreatLocker.
    claimRefs: [CR025, CR026, CR027, CR028, CR029, CR030]
    tableRefs: [TR005]
    figureRefs: [FR002]

tables:
