  evidenceGaps:
    - type: private-evidence-only
      severity: minor
      topic: churn-data
      missingEvidence: >
        No public win-loss or churn data is available for ThreatLocker; the company has not
        disclosed customer retention rates, net revenue retention, or percentage of accounts
        that have migrated to competing platforms.
      whyItMatters: >
        Without churn data, it is not possible to verify whether allowlist policy lock-in
        translates into measurable retention superiority over default-allow EDR vendors or
        whether MSP partners churn ThreatLocker when switching RMM/PSA platforms.
      diligencePath: >
        Request cohort-level retention data from ThreatLocker management segmented by MSP
        partner tenure; conduct MSP partner interviews asking specifically about evaluation
        of competing tools and reasons for staying with or leaving ThreatLocker.
      relatedQuestionRefs: [QP016]

    - type: missing-source
      severity: minor
      topic: msp-partner-count-competitors
      missingEvidence: >
        CrowdStrike and SentinelOne have not publicly disclosed MSP partner counts or the
        percentage of their ARR driven through the MSP channel, making a direct channel
        distribution comparison with ThreatLocker's 1,600+ partner claim impossible.
      whyItMatters: >
        If either enterprise EDR vendor has quietly built an MSP distribution channel
        comparable in scale to ThreatLocker's, the distribution moat would be narrower
        than the current analysis suggests.
      diligencePath: >
        Request channel partner program data from CrowdStrike and SentinelOne investor
        relations; cross-reference with channel survey data from CompTIA or Channel Futures
        on endpoint security tool attachment rates in MSP RMM/PSA platforms.
      relatedQuestionRefs: [QP018]

    - type: missing-source
      severity: material
      topic: analyst-coverage-gap
      missingEvidence: >
        ThreatLocker is not currently included in the Gartner Magic Quadrant for Endpoint
        Protection Platforms, which is the primary analyst reference for enterprise endpoint
        security procurement decisions; no equivalent independent analyst placement exists
        to anchor its enterprise positioning outside the MSP community.
      whyItMatters: >
        The absence from the Gartner EPP Magic Quadrant means enterprise IT procurement
        decision-makers who rely on Gartner research will not encounter ThreatLocker in
        their primary vendor shortlisting process, materially constraining enterprise
        direct-sales expansion potential without significant marketing investment.
      diligencePath: >
        Review Gartner's EPP Magic Quadrant inclusion criteria; assess whether ThreatLocker's
        growing enterprise customer base and $1.2B valuation qualify it for consideration;
        validate whether ThreatLocker has engaged with Gartner's analyst briefing process.
      relatedQuestionRefs: [QP020]

    - type: access-blocked
      severity: minor
      topic: customer-complaint-data
      missingEvidence: >
        Reddit communities and MSP-focused forums (Reddit r/msp, Spiceworks, MSP Alliance
        forums) contain practitioner-level discussions of ThreatLocker operational challenges
        including false positive management and onboarding friction, but systematic access
        and analysis of this adverse sentiment is blocked by manual browsing requirements.
      whyItMatters: >
        Practitioner-level complaint patterns in MSP forums would provide leading indicators
        of churn risk and operational weaknesses that competitors actively exploit in sales
        conversations, which are not captured in structured G2 or Gartner review platforms.
      diligencePath: >
        Conduct manual analysis of r/msp, Spiceworks, and MSP Alliance forums searching
        for ThreatLocker mentions; commission MSP practitioner interviews to surface
        unprompted feedback on operational pain points and competitive alternatives evaluated.
      relatedQuestionRefs: [QP024]

    - type: private-evidence-only
      severity: minor
      topic: win-rate-data
      missingEvidence: >
        ThreatLocker's win rates versus CrowdStrike and SentinelOne in competitive RFPs
        are not publicly disclosed; no independent win-loss analysis or analyst-published
        competitive benchmarking exists for the MSP endpoint security segment.
      whyItMatters: >
        Win rate trends are a leading indicator of moat durability; declining win rates
        in competitive evaluations would signal that the default-deny differentiation is
        weakening relative to enterprise EDR vendors adding allowlisting capabilities.
      diligencePath: >
        Request win-loss data from ThreatLocker management segmented by competitor displaced
        or evaluated against; supplement with MSP partner interviews asking about competitive
        evaluation frequency and outcomes when ThreatLocker is compared against CrowdStrike
        or SentinelOne.
      relatedQuestionRefs: [QP027]

