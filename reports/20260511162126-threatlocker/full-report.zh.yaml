      - number: '1.3'
        title: 融资历史、投资者和估值
        blocks:
          - type: paragraph
            body: >
              ThreatLocker 累计获得约 $253.6 million 风险资本融资。最重要的里程碑发生在 2024 年 4 月：公司完成由 General Atlantic 领投、StepStone Group 和
              D.E. Shaw Group 参投的 $115 million Series D 轮融资，投后估值约 $750 million。本轮融资时，ThreatLocker 已触达 50,000 多家客户组织。2025
              年 4 月，ThreatLocker 完成由 Arthur Ventures 和 CR2 Ventures 领投、Elephant Venture Capital 与老股东 StepStone Group 参投的
              $60 million Series E 轮融资，投后估值达到 $1.2 billion，成为独角兽。

              Series E 融资额相对较小（$60M），但估值从 $750M 跳到 $1.2B，值得注意：这说明公司可能已经盈利或接近盈利，并不需要大额新股资金注入。Elephant VC 和 Arthur
              Ventures 是 Series E 的老股东，显示它们继续看好公司轨迹。投资者版图覆盖成长股权（General Atlantic）、风险投资（Arthur Ventures、CR2
              Ventures、Elephant VC）、母基金（StepStone Group）和量化金融（D.E. Shaw Group）等主要机构玩家。

              PR Newswire 和 BusinessWire 上的 Series E 原始新闻稿在研究时返回 404，但该轮融资由 PremierAlts 和 Tracxn 分析师数据交叉印证。公司未披露
              ARR、毛利率、烧钱速度或盈利状态。Latka（$61.7M，2023 年）和 Tracxn（$71.5M，2025 年）的收入估计均来自第三方；考虑到客户增长很快，它们可能低估了实际 ARR。
