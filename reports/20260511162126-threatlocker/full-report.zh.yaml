      - number: '7.4'
        title: 人员与执行风险
        blocks:
          - type: paragraph
            body: >
              ThreatLocker 由创始人 CEO Danny Jenkins 领导；他是高调公众人物、频繁会议演讲者，也是技术愿景提出者。对 Jenkins
              的关键人依赖是重大风险：如果他离任或失去履职能力，公司会在关键增长拐点失去主要产品和文化驱动者。公司两年内从约 40,000 家客户增长到 70,000
              多家，需要工程、销售、支持和合规职能大幅扩张。网络安全工程人才的获取和留存竞争激烈；佛罗里达 Orlando 虽然是成长中的科技枢纽，但人才池小于 San Francisco Bay Area 或 New
              York。Series D 融资让 ThreatLocker 具备继续增长的资金位置，也带来按投资人预期扩张收入的压力。如果 Series D
              后收入或客户增长不及预期，公司可能面临烧钱速度、估值和员工士气压力。CEO 以下的管理层深度尚未被独立评估；高级工程和 GTM 领导梯队未公开记录，继任深度存在不确定性。
