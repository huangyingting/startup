      - number: '2.3'
        title: 买方分层和采用路径
        blocks:
          - type: paragraph
            body: >
              ThreatLocker 的主要买方结构通过 MSP 合作伙伴居中完成。MSP 为员工少于 500 人的 SMB 客户评估、选择 ThreatLocker，并将其打包进托管安全堆栈。在该模型中，MSP
              同时是买方（采购决策者）、经销商（打包进每月托管服务费）和主要支持联系人；SMB 是终端用户，并通过每月托管服务账单间接付款。MSP 合作伙伴评估 ThreatLocker 时，重点看它与现有 RMM 和 PSA
              工具的技术适配度、转售利润率、其技术团队能否支持，以及合作伙伴计划质量，包括是否能接入 Cyber Hero 24/7 支持。通过 MSP 服务 SMB
              的细分市场，采用触发点通常是同行企业遭遇勒索软件事件、网络保险续保要求记录应用控制，或 MSP 在一次泄露事件后开展全平台安全架构复盘。500–2,500 名员工的中端市场组织可能直接向 ThreatLocker
              采购，买方是 IT 负责人或 CISO，采用触发点是合规要求（SOC 2、HIPAA、PCI-DSS），初始部署需要 CISO 或 CFO 签批。医疗组织是一个垂直需求集群，由 HIPAA Security
              Rule 对技术访问保障的要求、CISA 医疗行业警报以及 OCR 调查风险驱动；ThreatLocker 将 Hattiesburg Clinic 列为公开客户。教育机构利用 E-Rate
              网络安全资金，并受到学区遭遇勒索软件后的州级要求推动，Niles Community Schools 是其引用部署。JetBlue 和 Emirates 等航空与交通账户，则体现 TSA 网络安全指令和
              PCI-DSS 要求下的合规驱动采用。采用漏斗图展示了从 MSP 认知、试用、概念验证、初始部署到模块增购的典型转化路径；在概念验证阶段，白名单策略构建会产生最大运营摩擦，24/7 Cyber Hero
              支持团队是降低摩擦的关键机制。
