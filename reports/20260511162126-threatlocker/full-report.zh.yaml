      - number: '6.2'
        title: 客户垂直行业拆分
        blocks:
          - type: paragraph
            body: >
              ThreatLocker 客户覆盖六个主要垂直行业：医疗健康、金融服务、教育、政府、专业服务，以及通过 MSP 触达的一般 SMB。Hattiesburg Clinic 等医疗客户受 HIPAA
              技术保障要求和临床环境中勒索软件事件高成本驱动。金融服务客户采用 ThreatLocker 是为了 SOC 2、PCI-DSS 和 GLBA 合规。教育垂直——从 Niles Community Schools
              这样的 K-12 学区到高等教育——看重平台适合非受管设备环境，以及州级网络安全强制要求。政府和关键基础设施买家响应 CISA 零信任指引。Orlando Magic、Indianapolis Colts
              等职业体育球队，以及 JetBlue、Emirates 等航空运营商，是更高知名度的企业客户胜利，证明产品可扩展到 SMB 之外。MSP 合作伙伴为所有垂直行业中 250
              席以下客户长尾提供横向覆盖，形成广度，降低单一行业集中度风险。按垂直行业划分的收入或客户数未公开披露，限制了现阶段可做的行业集中度分析深度。
