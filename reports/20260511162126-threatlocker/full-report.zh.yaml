      - number: '6.5'
        title: GTM、扩张与集中度风险
        blocks:
          - type: paragraph
            body: >
              ThreatLocker 主要通过全球约 6,000 多家 MSP 合作伙伴分发，带来显著渠道集中度风险。如果前 50 家 MSP 合作伙伴贡献了不成比例的客户量——这是合理但未验证的情景——少数大型 MSP
              流失可能实质影响客户数和 ARR。先落地再扩张模型有两层：MSP 通过为现有 SMB 客户增加终端席位扩张，直接企业账户则通过部署 Ringfencing、Storage Control、Network
              Control 等更多 ThreatLocker 模块扩张。AWS 和 Azure Marketplace 上架为偏好云端计费的企业买家提供采购便利。主要摩擦包括 MSP 换供应商时的策略迁移复杂度，以及非技术型
              IT 管理员的学习曲线。MSP 整合——尤其是 Kaseya 收购 Datto——带来风险：更大的平台玩家可能把与 ThreatLocker 竞争的终端安全功能打包进既有 MSP
              工具栈。零信任合规顺风支撑扩张速度，但来自 Kaseya 和 ConnectWise 的 MSP 平台竞争，是渠道独占性的结构性逆风。
