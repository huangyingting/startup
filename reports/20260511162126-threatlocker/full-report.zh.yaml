  - number: 7
    title: 风险
    sections:
      - number: '7.1'
        title: 监管与法律风险
        blocks:
          - type: paragraph
            body: >
              ThreatLocker 在高度监管环境中运营。作为代表医疗客户处理或支持处理 PHI 的供应商，ThreatLocker 可能被认定为 HIPAA Business
              Associate，因此必须维护合规安全计划并签署 Business Associate Agreements。若医疗客户发生泄露或被执法，且执法材料引用 ThreatLocker
              工具，公司可能面临次级监管审查。FTC Safeguards Rule（16 C.F.R. Part 314）要求金融机构——包括 ThreatLocker
              的金融服务客户——落地多层技术保障；ThreatLocker 的应用白名单和 Ringfencing 产品被定位为满足该要求的关键控制要素。California CCPA 和类似州隐私法对
              ThreatLocker 的客户数据运营施加数据处理义务。SEC 2023 年网络安全事件披露规则（Final Rule, Release No. 33-11216）要求重大网络安全事件在四个工作日内披露，为
              ThreatLocker 的上市公司客户带来披露风险。最尖锐的法律风险是 2025 年提起的 ThreatLocker, Inc. v. Charles Schwab Corp.（Case
              6:2025cv00923, M.D. Fla.）。法院访问限制使案件细节有限；LQCRE 报道显示争议涉及商业关系，但诉因、索赔金额和诉讼时间表均未公开。如果 ThreatLocker
              是被告或争议对手，且结果不利，声誉和财务影响可能重大。
