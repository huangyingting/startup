      - number: '5.2'
        title: 核心安全模块
        blocks:
          - type: paragraph
            body: >
              ThreatLocker 的模块栈是增量式的，并按端点销售，使 MSP 能根据客户风险承受能力和预算对安全产品分层。核心 Application Allowlisting
              模块是平台基础：无论威胁已知还是未知，它都会阻止任何未经批准的应用执行，因此能对零日恶意软件、勒索软件和供应链攻击生效。Ringfencing
              扩展控制面，限制已获批应用可以访问哪些资源，包括文件、注册表项、网络端点和其他进程，从而在钓鱼或凭证泄露事件后限制横向移动。

              Storage Control 阻止对 USB 驱动器和网络共享等可移动介质的未经授权访问，防止数据外泄和共享文件被勒索软件加密。Network Control 增加按应用的网络白名单，使每个应用只能与明确允许的
              IP 地址和端口通信。Privileged Access Management 提供凭证保险库，确保特权密码不会以明文暴露；Elevation Control
              则允许单个应用请求提升权限，而无需授予持久本地管理员权限。平台还包括一个用于行为威胁检测的 EDR 模块和 MDR 服务层，用反应式检测补齐预防式白名单堆栈。每个模块都随 Cyber Hero
              无限支持模式交付，客户无需额外付费即可获得 24/7 工程师直连支持。客户案例研究证实平台有效：Niles Community Schools 使用 ThreatLocker
              的白名单阻止了一次勒索软件攻击；Hattiesburg Clinic 部署 ThreatLocker，用于符合 HIPAA 安全要求的医疗端点保护。
