  - number: 8
    title: 估值
    sections:
      - number: '8.1'
        title: 投资逻辑与反向逻辑
        blocks:
          - type: paragraph
            body: >
              ThreatLocker 的投资逻辑锚定结构性防御力：其默认拒绝的应用白名单架构，传统 EDR 厂商若不从头重建检测模型，很难复制。MSP 渠道带来内置分发规模（通过 50 多个国家约 6,000 家 MSP
              合作伙伴保护 70,000 多个组织），通过策略库锁定形成高切换成本，并让依赖 MSP 管理策略的 SMB 客户在结构上更难流失。监管顺风——HIPAA BAA 要求、FTC Safeguards
              Rule、州隐私法——形成耐久合规用例，在下行周期也相对抗预算压力。零信任安全采用强制要求和勒索软件威胁升级，带来长期增长跑道；Fortune Business Insights 和
              MarketsAndMarkets 的市场预测提供佐证。

              反向逻辑集中在四个担忧。第一，渠道集中度：如果前 10-50 家 MSP 合作伙伴贡献不成比例的 ARR，少数 超大型 MSP（Kaseya、ConnectWise 或大型独立
              MSP）流失可能实质损害业务。第二，收入估计不确定：所有收入数字都是第三方近似值；实际 ARR 未知，可能高于也可能低于 Tracxn $71.5M 估计。第三，治理风险：Jenkins 家族三名成员分别担任
              CEO、COO 和 CTO，形成关键人依赖和潜在治理冲突，机构投资人会以折价定价。第四，仍在进行的 ThreatLocker v. Schwab 诉讼（Case
              6:2025cv00923）带来未量化的财务和声誉敞口。
