  - id: FU001
    title: 客户旅程图：ThreatLocker 采用路径
    type: journey-map
    description: |
      端到端客户旅程从问题认知延伸到托管扩张。MSP 渠道承接大多数 SMB 入驻；直销负责企业和中端市场账户。 旅程阶段依据公开案例研究描述和 MSP 社群反馈整理。
    summary: |
      七阶段旅程从认知到扩张，覆盖 MSP 主导的 SMB 入驻和企业直销动作。
    data:
      items:
        - label: 认知
          detail: |
            潜在客户通过 MSP 合作伙伴推荐、CISA 零信任指导、MSP 社群活动中的同行转介绍，或 ThreatLocker 的 Zero Trust World 大会了解 ThreatLocker。
        - label: 评估
          detail: |
            IT 管理员或 MSP 先看 G2 和 Gartner 评分、申请演示，再拿 CrowdStrike、SentinelOne 的允许列表能力与 ThreatLocker 对标。
        - label: 试用与 PoC
          detail: |
            开启 60 至 90 天审计（学习）模式；ThreatLocker 扫描现有应用清单，在不执行拦截的情况下生成初始允许列表建议。
        - label: 采购
          detail: |
            通过 MSP 渠道（SMB）或直销（企业）签约；通常为一至三年期限；从 Application Control、Ringfencing、Storage Control、Network Control 中选择模块。
        - label: 部署
          detail: |
            开展策略配置工作坊；分阶段推送端点；培训 IT 团队使用策略管理控制台；完成与 PSA 和 RMM 工具集成。
        - label: 活跃使用
          detail: |
            日常执行允许列表和 Ringfencing 策略；安全运营团队用审计日志做事件调查和合规报告。
        - label: 扩张
          detail: |
            MSP 为新的 SMB 客户增加端点席位；企业增加 Cloud Storage Control、Network Control 等模块；多年续约锁定 ARR。
    sourceRefs:
      - SU011
      - SU020
    claimRefs:
      - CU031
      - CU026
