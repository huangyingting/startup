      - number: '5.3'
        title: 2025–2026 年新增能力
        blocks:
          - type: paragraph
            body: >
              ThreatLocker 在 Zero Trust World 2025 上宣布五个新模块，展现了明显的平台迭代速度：用于安全分析和报告的 Insights、与白名单引擎集成的自动化 OS 和应用补丁 Patch
              Management、集中式用户身份管理 User Store、浏览器层网页访问过滤 Web Control，以及云应用访问治理 Cloud
              Control。这些新增功能表明，公司正在有意从单点白名单工具转向综合零信任平台，扩大单客户可触达合同价值，并让 ThreatLocker 进入此前由独立点解决方案服务的邻近安全类别。

              最重要的是，ThreatLocker 于 2026 年 3 月推出 ZTNA 和 ZTCA，PR Newswire 公告已确认。ZTNA 用经过身份验证、由策略驱动的网络访问取代传统 VPN
              远程访问，防止基于凭证的横向移动，直接应对绕过传统 EPP 控制的攻击路径。ZTCA 将这一能力延伸到云应用，为 SaaS 和 IaaS 工作负载提供访问治理。这两个新模块合在一起，把 ThreatLocker
              的可触达市场从端点安全扩展到网络和云访问控制；在这些领域，Zscaler、Netskope 和 Palo Alto ZTNA 目前占据主导。数据中心扩张同时支持 ZTNA 和 ZTCA
              的延迟要求，以及国际客户的合规需求。CRN 和 TMCnet 都报道了 ThreatLocker 2026 年平台扩张和 MSP 整合策略，确认第三方已经注意到其产品投资叙事。
