  - id: TI003
    title: 单位经济表
    description: >
      Six unit economics metrics for ThreatLocker including gross margin, CAC, ACV, NRR, payback period, and
      profitability status. All values are either not disclosed or analyst-estimated from SaaS peer benchmarks. Each row
      documents the metric, current value or status, confidence level, why it matters, and the specific diligence
      request to close the gap.
    columns:
      - 指标
      - 数值 / 状态
      - 置信度
      - 重要性
      - 尽调要点
    rows:
      - - 毛利率
        - 未披露；SaaS 端点安全同业：70-80% 毛利率
        - 低 — 基于 SaaS 同业基准估算
        - 决定资本效率和盈利路径；纯端点 SaaS 厂商通常需要 70%+ 毛利率
        - 索取经审计或管理层口径毛利率；对照 CrowdStrike（75%）和 SentinelOne（74%）基准
      - - 获客成本（CAC）
        - 未披露；相较企业直销，MSP 渠道结构会降低直接 CAC
        - 低 — 无数据
        - 渠道优先的 GTM 通常压低直接 CAC，但转售商抽成会挤压毛利率；资本效率评估必须核清
        - 按渠道（MSP 与直销）索取 CAC；厘清 MSP 推荐激励和抽成结构
      - - 平均合同价值（ACV）
        - 未披露；估计每个组织 $1,000-3,000/年（平均 50-150 个端点，$10-20/端点/月）
        - 低 — 分析师推算
        - ACV 决定 LTV 和 CAC 回本；如果平均组织为 100 个端点、$10/月，即 $12k/年 ACV，回本逻辑会明显变化
        - 按客群（SMB 与企业）索取 ACV，以及每位客户平均端点数
      - - 净留存率（NRR）
        - 未披露；按模块扩张轨迹推测，可能为 100-115%+
        - 低 — 估计
        - NRR 高于 100% 表明现有客户通过模块增购带来自然增长；是 SaaS 质量的关键指标
        - 索取 MSP 与直销渠道过去 12 个月 NRR；尤其是模块附加率
      - - 回本周期（CAC 回收）
        - 未披露；基于行业基准，MSP 交付估计为 12-18 个月
        - 低 — 估计
        - 规模化后回本周期低于 18 个月，说明增长资本效率高；短于 CrowdStrike 估计约 24 个月的回本周期
        - 按队列年份索取 CAC + 首年 ACV，计算各渠道实际回本周期
      - - 烧钱速度 / 盈利能力
        - 未披露；Series E 规模较小（估值 $1.2B 时融资 $60M），暗示接近盈亏平衡或已盈利
        - 低 — 从融资行为推断
        - Series E 规模相对估值跃升偏小，说明公司要么盈利能力强，要么资金用途很聚焦；也是投资人信心信号
        - 索取当前月度烧钱速度、按当前支出的现金跑道，以及公司是否 EBITDA 为正
    notes: 所有单位经济指标均为分析师按 SaaS 行业基准和竞争对手披露推算。ThreatLocker 未确认任何指标。毛利率同业基准来自 CrowdStrike FY2025 和 SentinelOne FY2026 公开业绩。
