    title: 公司概况
    sections:
      - number: '1.1'
        title: 公司身份、创立和业务概览
        blocks:
          - type: paragraph
            body: >
              ThreatLocker, Inc. 是一家总部位于佛罗里达州奥兰多的私营网络安全公司，2017 年由 Danny Jenkins（CEO）、Sami Jenkins（COO）和 John
              Carolan（首席质量保证官）创立。公司以零信任理念运转，采用“默认拒绝”模型：默认情况下，除非管理员明确加入白名单，任何应用都不能运行。过去数十年，端点安全主要由“默认允许”路径主导；ThreatLocker
              与之相反。

              ThreatLocker 主要靠托管服务提供商（MSP）渠道获客。借助 MSP，公司可以触达依赖 MSP 负责 IT 运营的中小企业，不必为该规模客户搭建昂贵的直销团队。公司也直接服务企业组织，公开客户包括
              Orlando Magic、Indianapolis Colts、JetBlue Airways、Emirates airlines、Hattiesburg Clinic 和 Niles Community
              Schools，覆盖娱乐、航空、医疗和教育垂直行业。截至 2026 年 3 月，ThreatLocker 保护全球 70,000 多家组织。

              除奥兰多总部外，ThreatLocker 在爱尔兰都柏林、阿联酋迪拜和澳大利亚布里斯班设有国际办公室，并在 2025–2026 年宣布新增 14 个数据中心（美国 12 个，另有沙特阿拉伯和阿布扎比）。公司主办
              Zero Trust World，这是面向 MSP 和安全从业者的年度会议。第三方评论平台对该平台评价很高：G2 基于 472 条评论给 ThreatLocker 4.8/5 分（推荐可能性
              94/100），Gartner Peer Insights 基于 79 个评分给出 4.8/5 分。
