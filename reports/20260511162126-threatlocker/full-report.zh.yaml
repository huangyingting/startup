      - number: '7.5'
        title: 缓释措施、否决标准与监控指标
        blocks:
          - type: paragraph
            body: >
              ThreatLocker 的风险缓释包括：用于运营保证的 SOC 2 Type II 认证；据公司披露，专门合规团队处理 HIPAA Business Associate 义务；与医疗客户签署 BAA；标准
              AWS 共同责任模型降低云基础设施风险；以及不断增长的 MSP 合作伙伴基础，把集中度风险分散到 6,000 多家合作伙伴。该投资的否决标准包括：针对 ThreatLocker
              本身的重大监管执法（不是针对使用产品的客户）；ThreatLocker v. Schwab 诉讼出现不利判决并导致重大财务责任；ThreatLocker 管理控制台发生安全泄露并危及客户策略环境；CEO
              离任且没有可信继任计划；或 NRR 披露后连续两个季度低于 85%。监控触发项应包括：G2/Gartner 评价分数的季度趋势；渠道媒体中的 MSP 合作伙伴流失信号；医疗 IT 领域的 HIPAA HHS
              执法行动；针对金融服务公司、且引用供应商风险的 FTC Safeguards 执法行动；以及任何将 ThreatLocker 列名的新诉讼文件。
