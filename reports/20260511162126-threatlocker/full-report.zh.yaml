      - number: '2.2'
        title: 市场规模：多重视角
        blocks:
          - type: paragraph
            body: >
              多家分析机构对零信任安全和端点安全市场给出的估计差异很大，主要原因是边界定义不同。Fortune Business Insights 估算，2025 年全球零信任安全市场为 $42.28 billion，并以
              15.6% 的复合年增长率到 2032 年达到 $117 billion；MarketsAndMarkets 则估算 2026 年为 $34.5 billion，到 2029 年以 17.3% CAGR 增至
              $66.6 billion。这些顶层 TAM 数字包含网络设备、身份平台和云安全层；这些领域与 ThreatLocker 的端点重点相邻，但并不完全重合。Grand View Research
              估算更窄的端点安全市场 2024 年为 $17.6 billion，并以 11% CAGR 增至 2033 年的 $45.3 billion——边界更直接可比，但排除了 ThreatLocker 在 2026
              年进入的 ZTNA 和 ZTCA 邻近领域。Mordor Intelligence 给出一个中间估计：端点安全加 ZTNA 在 2025 年为 $28.3 billion，到 2030 年 CAGR 为
              13.4%。BIS Research 则以 2025 年零信任网络市场 $19.5 billion 提供交叉校验。可服务市场需要自下而上推导。CompTIA 估算 2025 年北美 MSP 总支出约 $150
              billion，其中安全占 MSP 总收入的 8–12%，意味着北美 MSP 安全支出为 $12–18 billion。若将其中 30–40% 归为端点聚焦的零信任份额，ThreatLocker 可进入市场中通过
              MSP 交付的零信任端点安全 SAM 约为 $4–6 billion。按 Tracxn 2025 年、并经 Latka 交叉验证的估计 ARR $71.5 million 计算，ThreatLocker
              的可获取市场占保守 $4 billion SAM 不到 2%，约占高情景 $6 billion 估计的 1.2%。分析师对 2025 年基准的估计相差最高达 $8
              billion，背后是围绕硬件网络设备是否纳入、身份层支出如何分摊，以及地理覆盖范围的定义分歧。市场规模金字塔展示嵌套的 TAM-SAM-SOM 结构，市场估计区间图则保留完整的分析师离散度。
