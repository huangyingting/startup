      - number: '8.2'
        title: 建议、置信度与风险评级
        blocks:
          - type: paragraph
            body: >
              建议是继续研究，但方向性偏建设性。证据基础支持产品故事和市场位置，但缺少经审计财务披露、诉讼悬而未决、对毛利率和 NRR 可见度有限，使得在 $1.2B 隐含估值下无法给出明确买入建议。当前估值约 16.8x
              估计 EV/收入，处于公开市场网络安全 SaaS 区间上沿，并计入持续 30-50% 增长——这一点无法独立验证。

              对定性逻辑（产品差异化、渠道护城河、TAM）的置信度为中高。对定量估值（收入、倍数、回报）的置信度为低，原因是完全没有经审计财务披露。风险评级为中高，主要由收入不透明、治理集中和 MSP
              渠道依赖驱动。如果资料室验证 ARR 不低于 $90M、NRR 高于 110%、毛利率高于 70%、前 10 大 MSP 合作伙伴集中度低于 40%，则建议可上调为在 $1.2-1.5B 入场买入，并以
              $2.0-2.5B 退出情景为目标。如果 ARR 低于 $71.5M 或 NRR 低于 100%，则建议下调为观察，重置估值为 5-7x ARR。
