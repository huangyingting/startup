      - number: '3.2'
        title: 竞争对手画像和对比
        blocks:
          - type: paragraph
            body: >
              CrowdStrike Falcon 是企业 EDR/XDR 领域的主导平台，2025 财年（截至 2025 年 1 月 31 日）年经常性收入（ARR）为 $3.1 billion，订阅客户超过 29,000
              家，主要部署在中端市场和企业组织。它的 AI 驱动 Falcon 平台在威胁检测广度、XDR 遥测集成和身份威胁保护上更强，但采用默认允许理念，标价为每端点每年 $299.99 至 $924.99
              或更高——这一溢价限制了 SMB 渗透。相对 ThreatLocker 的 MSP 原生模型，CrowdStrike 的 MSP 分销渠道有限。SentinelOne Singularity 报告 2026
              财年（截至 2026 年 1 月 31 日）ARR 为 $936 million，并以自主 AI 驱动威胁响应和 Purple AI 分析师助手形成差异化。与 CrowdStrike
              一样，它使用默认允许模型，标价为每端点每年 $69.99 至 $229.99 或更高。Microsoft Defender for Business 是 SMB 市场最重要的价格约束；它随 Microsoft
              365 Business Premium 以每用户每月 $22 捆绑提供，同时包含邮件、身份和合规工具，也可按每用户每月 $3 单独购买。它的默认允许架构和缺少应用白名单，锚定了 SMB 价格地板，并限制 MSP
              交付端点安全供应商的收费能力。Malwarebytes ThreatDown 在 Vector Capital 2023 年收购后更名，聚焦通过 MSP 原生 OneView 控制台提供 SMB
              EDR，价格有竞争力，但没有应用白名单或默认拒绝能力。Bitdefender GravityZone 声称拥有 1,600 个或更多 MSP 合作伙伴，并提供多租户 MSP
              管理和有竞争力的定价，但同样采用默认允许模型。Carbon Black 现归 Broadcom 所有，源于 2023 年 11 月完成的 VMware 收购；它在 SMB 和 MSP
              细分市场经历了渠道扰动，竞争势头有限。功能和定价对比表系统记录了六家供应商在五个关键能力维度上的差异。
