  - id: TV002
    title: 投资逻辑 / 反向逻辑表
    description: >
      Investment thesis and anti-thesis for ThreatLocker, with key arguments and what evidence would change the view on
      each dimension.
    notes: |
      所有投资逻辑均来自公开可得证据。关于渠道集中度、收入和治理的反向逻辑更难仅靠公开来源验证，需要访问数据室。
    columns:
      - 维度
      - 投资逻辑
      - 反向逻辑
      - 什么会改变判断
    rows:
      - - 产品差异化
        - 默认拒绝架构比基于检测的 EPP/EDR 更有结构优势；不重建完整平台就难以复制
        - 平台复杂度带来陡峭学习曲线（Cybernews）；上手摩擦可能拖慢 SMB 净新增客户增长
        - 客户获取速度指标；相较可比 EPP 平台的 NPS
      - - MSP 渠道护城河
        - 50+ 个国家有 9,000+ 家 MSP 合作伙伴；策略库锁定效应抬高切换成本；渠道优先 GTM 更省资本
        - MSP 集中度未知；Kaseya/ConnectWise 捆绑可能在平台层替代 ThreatLocker
        - Top-10 MSP ARR 占比 < 30% = 护城河获确认；> 50% = 关键风险
      - - 收入增长
        - Latka $61.7M（2023）→ Tracxn $71.5M（2025）意味着约 8% CAGR 底线；客户数 50K→70K（+40%）指向更高 ARR 轨迹
        - ARR 估计仅来自第三方；实际 ARR 完全未知；估计 16.8x 倍数缺乏锚点
        - 经审计 FY2025 ARR；NRR ≥ 110% 将验证扩张收入
      - - 估值纪律
        - 如果实际 ARR > $71.5M，或 30-50% 增长得到确认，$1.2B 标记对应 16.8x 仍可辩护
        - 该倍数高于 CrowdStrike NTM 区间（10-15x），而公司规模只是 CrowdStrike 的一小部分；定价隐含很高增长预期
        - 若确认 ARR $90M+，倍数会降至 ~13x——落在公开市场区间内
      - - 治理
        - 创始人领导的团队文化强、长期导向清晰；Jenkins 家族创立公司并以资本效率把公司做起来
        - Jenkins 家族三名成员分别担任 CEO/COO/CTO，带来关键人物风险，也可能在 IPO/M&A 时引发治理冲突
        - 披露董事会构成 + 增补独立董事
      - - 监管顺风
        - HIPAA、FTC Safeguards 和零信任强制要求创造持久合规需求；ThreatLocker 作为端点安全控制层处在有利位置
        - 如果 HIPAA/FTC 执法强度变化，合规驱动采购可能见顶；这不是真正的产品拉动需求
        - 医疗 / 金融服务垂直行业合同赢率；合规必需收入与可选收入拆分
