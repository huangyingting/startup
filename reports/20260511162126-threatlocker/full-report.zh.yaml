      - number: '5.4'
        title: 技术差异化
        blocks:
          - type: paragraph
            body: >
              ThreatLocker 最核心的技术差异在于默认拒绝、基于身份的执行控制：架构上就不同于 CrowdStrike Falcon、SentinelOne、Sophos Intercept X
              这类默认允许、先检测的模型。基于签名或 AI 行为的 EDR 平台有共同弱点：未知软件先被放行，恶意行为发生后再尝试识别。ThreatLocker
              反过来做：没有明确批准，任何东西都不能运行。因此，它既能挡住已知恶意软件，也能挡住 EDR AI 模型从未见过的新威胁，包括 AI 生成恶意软件和被供应链污染的软件包。Ringfencing
              商标和多层模块栈把防护叠起来；竞争对手若不大幅重构平台，很难复制。

              云端管理、多租户架构，是 ThreatLocker 区别于传统本地应用白名单方案的另一点：策略能在数分钟内下发到数千个终端。Microsoft Defender 通过 AppLocker 和 WDAC
              提供白名单能力，但它们原生绑定 Windows，需要深厚 Group Policy 经验，也没有 ThreatLocker 统一的多模块管理界面。相较 Carbon Black App
              Control，ThreatLocker 是云原生、面向 MSP，并且打包完整模块栈，而不是按能力单独授权。G2 上 472 条评价给 ThreatLocker 4.8/5，Gartner Peer
              Insights 上 79 个评分给 4.8/5，说明用户对技术路线满意度很高。Cybernews 评测确认 ThreatLocker
              技术底座较强，同时指出学习曲线陡、初始设置复杂是主要可用性缺口；这一批评有效且反复出现，公司必须在规模化过程中解决。
