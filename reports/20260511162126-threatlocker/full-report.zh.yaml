      - number: '7.2'
        title: 运营与安全风险
        blocks:
          - type: paragraph
            body: >
              ThreatLocker 的默认拒绝模型自带误报风险：任何配置错误的策略都可能阻断合法关键业务应用，导致客户运营中断，并让 ThreatLocker 支持工单升级。G2 和 Gartner
              评价记录了反复出现的误报事件和学习曲线陡的抱怨。在 70,000 多客户规模下，即便误报率很低，也会产生大量支持量，挤压 ThreatLocker 运营团队。公司持有 SOC 2 Type II
              认证，为其安全控制提供第三方保证。但 SOC 2 的范围、覆盖面和最近审计日期并未公开说明，导致保证框架深度存在不确定性。ThreatLocker
              云管理控制台是所有策略管理的单一视窗，也是攻击者的高价值目标；如果管理控制台被攻陷，攻击者就能修改数千个终端的白名单。鉴于 ThreatLocker
              默认拒绝方法，供应链风险低于同业，但公司依赖内核级终端代理完整性。任何内核级驱动漏洞都可能被利用来绕过 ThreatLocker 控制。截至 2026 年中，ThreatLocker 未披露任何重大安全事件。
