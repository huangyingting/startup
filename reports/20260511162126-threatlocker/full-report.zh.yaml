      - number: '7.3'
        title: 合作伙伴与依赖风险
        blocks:
          - type: paragraph
            body: >
              ThreatLocker 的 GTM 主要依赖约 6,000 家 MSP 合作伙伴，由它们为 SMB 客户转售和管理 ThreatLocker 部署。如果前 10 至 50 家 MSP
              合作伙伴贡献了不成比例的客户量或 ARR，合作伙伴流失或竞争替代（Kaseya、ConnectWise 打包）可能实质影响 ThreatLocker 业务。Kaseya 收购 Datto、ConnectWise
              平台扩张，形成一种情景：这些 MSP 平台厂商把与 ThreatLocker 竞争的终端安全打包进基础 MSP 工具栈。ThreatLocker 管理控制台和策略管理平面的云基础设施依赖 AWS 和
              Azure；任一云厂商宕机或条款变化都会产生运营影响。Microsoft 持续扩展 Windows Defender 和 Intune，并将其整合进 Windows 授权，构成低成本打包竞争对手，可能压缩
              ThreatLocker 在 MSP 服务的 SMB 细分中的 TAM。SOC 2 和合规认证依赖 ThreatLocker 持续保持审计就绪状态；控制文档或第三方渗透测试若有任何缺口，可能影响企业销售周期。
