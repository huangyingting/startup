        - 约 $71.5M ARR 估算（Tracxn 2025）；公司未确认
        - 经常性、高质量 SaaS 收入；MSP 可见度强；SMB 规模下合同风险低
        - 确认每端点 ASP；索取每个 MSP 客户平均端点数和 MSP 队列留存数据
      - - 直销企业订阅
