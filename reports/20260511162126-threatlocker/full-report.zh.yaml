      - number: '4.2'
        title: 单位经济和利润率分析
        blocks:
          - type: paragraph
            body: >
              公开来源基本无法确认 ThreatLocker
              的单位经济。公司未披露毛利率、获客成本、平均合同价值、净收入留存、回本周期或烧钱速度，也没有可信的一手来源证实这些指标。单位经济表记录了六个核心指标；由于缺少一手数据，每项都被赋予低置信度。单位经济桥图则定性展示从新合作伙伴上线、按端点产生收入、捕获毛利、回收
              CAC，到通过模块增购扩展客户终身价值的流动。


              SaaS 同业基准可为 ThreatLocker 的潜在利润率区间提供代理估计。CrowdStrike 报告 2025 财年 non-GAAP 毛利率约 75%，SentinelOne 报告 2026 财年约
              74%。这些基准说明，可比端点安全 SaaS 平台实现 70–80% 毛利率是合理区间。不过，ThreatLocker 对 MSP 渠道高度依赖，带来结构性逆风：MSP 合作伙伴通常对托管安全支出抽取
              30–50%，如果这些同业基准反映的是企业直销经济性，这可能会让 ThreatLocker 每端点有效总收入低于标价，并把毛利率压到纯 SaaS 同业基准以下。


              可以基于 2026 年 3 月公开的 70,000 家或更多组织客户数，以及 Tracxn 2025 年第三方 ARR 估计 $71.5 million，推算隐含单位经济。该组合意味着每组织平均年收入约
              $1,000，与一个 50–150 端点的 SMB 客户群相符，端点价格约为每月 $8–15。按约 700 名员工和 $71.5 million 估计 ARR 计算，ThreatLocker 每员工 ARR 约
              $102,000，低于一流 SaaS 效率水平，但与一家处于快速增员期、重投研发、销售和支持基础设施的公司相符。G2 和 Gartner Peer Insights 均为 4.8/5
              的高分，是客户满意度和低自愿流失的正向领先指标，支持一个判断：净收入留存率很可能高于 100%。
