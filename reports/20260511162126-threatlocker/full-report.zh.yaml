  - number: 5
    title: 产品与技术
    sections:
      - number: '5.1'
        title: 产品架构和平台设计
        blocks:
          - type: paragraph
            body: >
              ThreatLocker
              运行一个云端管理、基于代理的安全平台，建立在默认拒绝理念上：每个应用、脚本、可执行文件和宏都会被拦截，除非管理员明确批准。平台由两个主要组件构成：一个云托管管理控制台，供管理员在所有受管端点上配置和审计策略；一个轻量级内核级代理，部署在单个
              Windows 和 macOS 端点上，并实时执行这些策略。由于代理在本地执行策略，即使短暂断网，端点仍然受保护；最后一次已知获批策略会继续约束执行，直到连接恢复并刷新策略。

              云管理控制台按多租户设计，让托管服务提供商可在单一界面管理数千个客户组织，同时保持租户之间完整策略隔离。策略会自动从控制台推送到代理，端点遥测回流到控制台，用于审计和告警。平台在上线期间支持自动学习模式：代理先观察并记录所有运行软件，再切换到执行模式，从而降低策略构建负担。ThreatLocker
              在 2025–2026 年扩展至 14 个新数据中心，包括美国 12 个、沙特阿拉伯和阿布扎比，以降低策略同步延迟，并支持 Emirates airlines
              和医疗行业买方等国际客户的数据驻留要求。云基础设施提供商尚未公开命名，这是一项需要尽调的依赖风险。
