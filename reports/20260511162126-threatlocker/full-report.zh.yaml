      - number: '8.4'
        title: 乐观 / 基准 / 悲观情景分析
        blocks:
          - type: paragraph
            body: >
              ThreatLocker 估值情景分析需要明确假设收入增长、倍数扩张或压缩，以及流动性事件时间。

              基准情景（$1.2B）对应 2025 年 4 月 Series E 标记。支撑因素包括 Tracxn 对 2025 年收入 $71.5M 的估计、与 20-30% 增长期待一致的 16.8x EV/收入倍数，以及
              MSP 渠道动能延续。以 $1.2B 买入的基准情景投资人，需要收入达到约 $200M，并以 10-12x 退出，才能实现 2x 回报；这意味着 4-5 年收入增长约
              180%，如果当前增速保持且公司维持渠道健康，是可以实现的。

              乐观情景（$2.0-3.0B）要求收入扩大至 $120-150M（较 $71.5M 增长 50-70%），并获得 18-20x 倍数。如果 ThreatLocker
              成功扩展企业直销、增加可提升客单价的网络访问和云安全模块，并维持 MSP 渠道健康，这一情景有可能成立。员工数约 30 个月从约 200 增至约 700，支持公司在 2026-2028 窗口显著放大收入的可能性。

              悲观情景（$600-800M）出现在收入增长放缓至每年 10-15%、迫使倍数重置至 8-11x 时。触发项包括：MSP 平台整合替代 ThreatLocker；ThreatLocker v. Schwab
              诉讼结果不利；管理控制台安全事件；或宏观驱动下 SMB IT 预算收缩。若估值降至 $600-800M，Series E 投资人将面临 33-50% 的账面减值。Cybernews 和 G2
              评价记录的学习曲线陡、上手复杂，是持续的悲观触发项：如果平台摩擦拖慢 SMB 细分的获客速度，基准情景增长假设就需要下修。
