          tone: neutral
        - label: 早期 VC 轮次
          date: 2020-2022
          detail: 获得首笔机构资本；Series D 前累计融资未公开逐项披露；公司主要靠 MSP 渠道再投入增长
          tone: neutral
        - label: Series D 轮 — $115M
