      - number: '2.4'
        title: 增长驱动和采用约束
        blocks:
          - type: paragraph
            body: >
              ThreatLocker 的增长环境由相互强化的结构性顺风，以及两个具有直接运营影响的重大约束共同塑造。最主要增长驱动是勒索软件频率和复杂度上升。Verizon 2025 年 Data Breach
              Investigations Report 显示，勒索软件出现在 44% 的泄露事件中；每起事件都在验证默认拒绝应用白名单模型，并在 MSP 社区为 ThreatLocker
              带来入站线索。监管要求是第二个结构性驱动：CISA 的 Zero Trust Maturity Model、关于改善国家网络安全的 Executive Order 14028，以及 NIST SP
              800-207，共同推动合规项目要求联邦和企业账户具备明确端点控制能力。NIS2 Directive 将该要求扩展至欧洲基本服务运营商，扩大了可触达地域市场。第三个近期驱动是网络保险承保：主要保险公司现在要求
              SMB 和中端市场投保人记录应用控制、MFA 和端点保护，作为获得保障的条件；寻求可负担保费的投保人因此必须具备 ThreatLocker 等同能力。MSP 市场约 11% 的年增长率，会放大
              ThreatLocker 的渠道收入——每新增一个采用 ThreatLocker 的 MSP，就带来整本 SMB 客户账，而无需额外直销投入。ConnectWise 2025 MSP Threat Report
              确认，受访 MSP 中超过 75% 正因勒索软件和监管压力增加安全预算，验证了需求环境。主要约束是白名单运营复杂度：构建准确白名单会在策略设置期间产生误报，并需要熟练 MSP
              人员管理，从而抬高上线期流失风险。ThreatLocker 的 Cyber Hero 24/7 支持团队是主要缓释手段，但该约束会限制采用速度。第二个约束是 Microsoft Defender for
              Business。它以零边际成本随 Microsoft 365 捆绑给已经为 Microsoft 365 付费的 SMB，压缩 SMB 为额外端点安全工具付费的意愿，并要求 ThreatLocker
              说清楚自己相对免费捆绑替代品的具体差异化。
