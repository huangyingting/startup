      - - 阻断项（1）
        - 收入验证
        - FY2023-FY2025 经审计 GAAP 收入 + ARR
        - 没有经审计 ARR，16.8x 倍数没有锚点；按 $1.2B 估值，实际收入可能对应 13x-25x
        - CFO / 审计师；在数据室索取
      - - 阻断项（2）
        - 毛利率和单位经济
        - 按 MSP 队列拆分的毛利率%、NRR、CAC、LTV
        - 毛利率 < 65% 会让可持续倍数压缩 30-40%；NRR < 100% 会打破增长模型
        - CFO；在数据室索取队列财务模型
      - - 阻断项（3）
        - 诉讼敞口
        - 案件 6:2025cv00923 的完整案卷、诉因和索赔金额
        - 财务责任未知；不利判决可能造成相当于 ARR 的重大损失
        - 法律顾问；PACER 案卷 + 管理层陈述
      - - 重大项（4）
        - MSP 渠道集中度
        - Top-10 和 Top-50 MSP ARR 占总 ARR 的比例
        - 高集中度（> 50%）会放大悲观情景的严重性
        - CRO；在数据室索取头部合作伙伴收入集中度
      - - 重大项（5）
        - 董事会与治理结构
