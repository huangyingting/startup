        - 按席位或活动报名
        - 偶发；Zero Trust World 2025 在 Orlando 举办；未单独披露
        - 收入低、品牌价值高的渠道投入；不太可能对 P&L 有实质影响
        - 确认大会 / 培训收入是否披露，或并入总 ARR
