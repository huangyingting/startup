      - number: '1.2'
        title: 创始人、领导团队和治理
        blocks:
          - type: paragraph
            body: >
              ThreatLocker 由三位背景互补的人联合创立。CEO Danny Jenkins 在看到基于检测的安全工具一再无法阻止勒索软件和供应链攻击后，构思了默认拒绝应用控制路径。他的兄弟 Michael
              Jenkins 担任 CTO，负责平台工程和基础设施。Sami Jenkins（COO）管理日常运营，John Carolan（CQA）负责产品和服务质量。Rob Allen 担任首席产品官，主导路线图落地。截至
              2026 年 5 月，这五人构成公司公开披露的高管层。

              Jenkins 家族三名成员占据 CEO、COO、CTO
              三个最高层职位，这是机构投资者需要关注的治理事项。家族主导的高管团队可能有更强的文化凝聚力和长期取向，但也会带来关键人风险、继任规划缺口，以及董事会监督独立性下降。ThreatLocker
              尚未公开披露董事会构成、投资者治理权利，或 Series D 和 Series E 融资中的信息权协议，因此外界很难判断 General Atlantic、Arthur Ventures
              和其他主要投资者如何行使监督权。

              领导层稳定是优势：自创立以来，公司未披露过高管离职。Danny Jenkins 是公司主要公开发言人，也频繁出席行业活动。Cyber Hero 24/7
              无限支持模式由工程师而非一级客服坐镇，反映出公司从创立价值观中延续下来的服务优先文化。
