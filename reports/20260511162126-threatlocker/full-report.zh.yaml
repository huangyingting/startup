      - number: '5.5'
        title: 信任、合规与集成生态
        blocks:
          - type: paragraph
            body: >
              ThreatLocker 支持医疗健康、金融服务和教育客户的监管合规工作流。对 HIPAA 覆盖实体，ThreatLocker
              的应用白名单和存储控制模块会限制哪些软件可以访问受保护健康信息，并防止未经授权复制到外部介质。对金融行业客户，平台控制与 GLBA Safeguards Rule
              对访问管理和终端安全的要求对齐。ThreatLocker 的营销资料记录了 GLBA 合规支持，不过受监管实体仍承担合规责任。MSP 渠道让“合规即服务”包装成为可能，MSP 可将 ThreatLocker
              打包进面向受监管客户的合规技术栈。

              集成层面，ThreatLocker 连接 ConnectWise Automate、Datto RMM、NinjaRMM 等主流 RMM 平台，使 MSP 无需切换工具，就能在现有管理控制台内部署和管理
              ThreatLocker。对 MSP 渠道，这种集成深度构成有意义的切换成本壁垒：MSP 一旦把 ThreatLocker 接入 ConnectWise 或 Datto 工作流，切换成本就不止产品本身，还包括
              RMM 配置和客户上线文档。公司声称具备 SOC 2 Type II 合规，但公开认证报告尚未从独立来源确认；对需要第三方证明作为采购前提的企业买家，这是一个尽调缺口。Cyber Hero 支持模式免费提供
              24/7 ThreatLocker 工程师访问，相较对高级支持层级单独收费的厂商，这是有意义的差异化。
