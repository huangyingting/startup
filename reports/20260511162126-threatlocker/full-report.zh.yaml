      - number: '1.4'
        title: 规模、里程碑和公司轨迹
        blocks:
          - type: paragraph
            body: >
              ThreatLocker 的增长轨迹非常突出。受保护组织数量从 Series D（2024 年 4 月）时的 50,000 多家增至 2026 年 3 月的 70,000 多家——约 23 个月增长
              40%。员工数从 2023 年约 200 人增至 2026 年 3 月约 700 人——约 30 个月增加 250%——反映出公司在产品、工程、销售和支持岗位上激进招聘。

              产品里程碑包括推出 Application Allowlisting（创立时）、Ringfencing、Storage Control、Network Control、PAM 和 Elevation
              Control。2026 年 3 月，ThreatLocker 推出 Zero Trust Network Access（ZTNA）和 Zero Trust Cloud
              Access（ZTCA），把平台从端点延伸到网络和云。在 Zero Trust World 2025 上，公司发布五个新增模块：Insights、Patch Management、User Store、Web
              Control 和 Cloud Control。公司还宣布 2025–2026 年新增 14 个数据中心，用于全球基础设施扩张。

              法律里程碑包括 2022 年针对 ThreatBlockr 的商标争议（Case 6:22-cv-02407, M.D. Fla.），以及 2025 年 5 月针对 Charles Schwab
              提起的合同争议（Case 6:2025cv00923, M.D. Fla.）。ThreatLocker 累计融资 $253.6 million，估值为 $1.2
              billion。这家公司不到九年便从奥兰多初创公司成长为覆盖端点、网络和云、拥有 700 名员工的全球网络安全平台，强烈说明产品市场契合度和执行质量。客户满意度持续保持高位（G2 4.8/5，Gartner
              Peer Insights 4.8/5），也支持一个判断：公司的增长来自真实价值交付，而不是牺牲质量换规模。
