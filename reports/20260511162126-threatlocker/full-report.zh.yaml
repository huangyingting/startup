      - number: '8.3'
        title: 当前估值背景、融资与入场纪律
        blocks:
          - type: paragraph
            body: >
              ThreatLocker 在 2025 年 4 月越过独角兽门槛：公司完成 $60M Series E，投后估值 $1.2B；该轮由 Arthur Ventures 和 CR2 Ventures
              领投，Elephant Venture Capital 与老股东 StepStone Group 参投。在此之前，公司于 2024 年 4 月完成 $115M Series D，由 General
              Atlantic 领投，StepStone Group 和 D.E. Shaw Group 参投；当时公司服务 50,000 多家客户组织，投后估值约 $750M。截至 2025 年 4 月，累计融资约
              $253.6M。

              估值从约 $750M 抬升到 $1.2B（增长 60%），只靠相对温和的 $60M 融资完成，说明公司不需要大规模新股资金注入——这可能是单位经济较强或接近盈利的信号。第三方收入估计显示，2023 年收入为
              $61.7M（Latka），2025 年收入为 $71.5M（Tracxn），意味着 2025 年 4 月 Series E 标记下 EV/收入约 16.8x。二级投资人的入场纪律是：在 $1.2B
              或更高估值投入前，必须验证 ARR、NRR 和毛利率足以支撑这一倍数。
