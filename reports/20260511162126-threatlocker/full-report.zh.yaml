      - number: '8.6'
        title: 退出准备度、最终尽调问题与逻辑破裂触发项
        blocks:
          - type: paragraph
            body: >
              ThreatLocker 的 IPO 准备度正在成形，但尚未确认。公司具备支撑公开发行所需的品牌认知、客户规模（70,000 多家组织）和市场叙事（零信任、MSP 优先）。如果 Tracxn $71.5M
              估计方向正确，其收入运行率至少需要达到 $150-200M ARR，才能支撑可信的 Nasdaq 或 NYSE 上市；按当前增速，IPO 窗口可能在 2027-2029。IPO 前治理要求——3 个财年经审计
              GAAP 财务、Sarbanes-Oxley 内控就绪、独立董事会多数——尚未公开证明。Jenkins 家族三人集中在高管层，若要满足机构 IPO 投资人要求，需要增加董事会独立性，并可能设计双重股权结构。

              如果 Palo Alto Networks、CrowdStrike 或 Microsoft 想收购 MSP 渠道资产，$1.5-2.5B 的战略 M&A 退出有可能发生。可比网络安全 SaaS 公司的 PE
              主导收购通常在 4-8x 收入，对应 $285-570M，远低于 $1.2B Series E 标记，对后期投资人吸引力不足。

              需要暂停投资的逻辑破裂触发项包括：ThreatLocker v. Schwab 出现不利判决并带来重大财务责任；ThreatLocker 管理控制台确认被攻破；CEO 离任且无继任；或 NRR
              披露后连续两个季度低于 85%。加仓前的最终尽调问题：经审计 FY2023-FY2025 财务、前 10 大 MSP ARR
              集中度、毛利率确认（目标：>70%）、NRR（目标：>110%）、董事会构成和治理权利文件。
            claimRefs:
              - CV027
              - CV028
              - CV029
              - CV030
              - CV011
              - CV012
