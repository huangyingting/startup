          tone: positive
        - label: Series E 轮 — $60M（独角兽）
          date: 2025-04
          detail: 由 Arthur Ventures 和 CR2 Ventures 领投，Elephant VC 和 StepStone Group 参投；投后估值 $1.2B；达到独角兽状态
          tone: positive
        - label: 70,000+ 家组织
          date: 2026-03
          detail: ThreatLocker 在全球保护 70,000+ 家组织，员工约 700 人，并新增 14 个数据中心；累计融资约 $253.6M
          tone: positive
