      - number: '3.4'
        title: 竞争风险和替代
        blocks:
          - type: paragraph
            body: >
              ThreatLocker 的护城河面临五个需要持续监测的重大威胁。第一，Microsoft Defender for Business 以零边际成本捆绑在每用户每月 $22 的 Microsoft 365
              Business Premium 中，在 SMB 细分市场形成结构性价格上限。已经订阅 M365 Business Premium 用于办公生产力的 SMB，可以在不增加预算的情况下获得端点保护，这限制了
              ThreatLocker 的定价权，也要求它把增量安全收益讲得足够清楚，才能证明额外按端点付费合理。第二，CrowdStrike 和 SentinelOne
              都已把有限应用控制功能作为可选附加模块推出——这说明白名单正在默认允许阵营中获得心智。两家公司都没有重新定位为默认拒绝平台，但 AI 辅助策略自动化可能降低过去保护 ThreatLocker
              的运营复杂度壁垒，让白名单创建更快、对专家依赖更低。如果任一企业 EDR 供应商交付可信的 AI 原生白名单，并降低上线摩擦，ThreatLocker 的切换成本优势会明显收窄。第三，包括 Illumio 和
              Zero Networks 在内的 AI 原生微分段与零信任执行供应商，代表一个新兴类别：它们从网络分段层而非端点代理切入零信任，可能吸引偏好网络层执行的安全架构师。第四，ThreatLocker 未进入
              Gartner Magic Quadrant for Endpoint Protection Platforms；该象限覆盖 CrowdStrike、SentinelOne、Microsoft 和 Palo
              Alto Networks，这会在 MSP 社区之外的企业直销扩张中造成品牌可见度缺口。第五，缺少公开赢单 / 输单或流失数据来验证 ThreatLocker
              的留存说法，社区论坛中虽有运营摩擦信号，但无法通过结构化来源获取。Carbon Black 在 Broadcom 收购后的扰动，既说明机构错位风险，也说明 ThreatLocker
              有机会拿下被挤出的企业账户。独立于 MSP 渠道替代风险之外，还有一个问题：ConnectWise、Kaseya 或 Datto 是否会加深竞争工具集成，或自建安全产品，从而削弱 ThreatLocker
              的分销独占性。
            claimRefs:
              - CP024
              - CP028
              - CP029
              - CP031
