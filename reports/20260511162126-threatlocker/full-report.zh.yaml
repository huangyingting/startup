      - number: '8.5'
        title: 可比公司组与相对估值
        blocks:
          - type: paragraph
            body: >
              ThreatLocker 的主要公开市场可比公司包括 CrowdStrike、SentinelOne、Palo Alto Networks 和 Sophos，它们分别代表终端安全和零信任安全市场的不同细分。

              CrowdStrike（CRWD）是最直接的公开可比：渠道占比较高的终端安全平台，截至 2026 财年 ARR 约 $4B，增速约 25%，交易在约 10-15x NTM 收入。CrowdStrike
              的规模溢价很高——其体量、企业渗透和威胁情报网络，支持相对小型同业的显著倍数溢价。

              SentinelOne（S）ARR 约 $850M，年增速约 33%，交易在约 6-9x NTM 收入。SentinelOne 较低倍数反映来自 CrowdStrike
              的竞争压力，以及落后于投资人预期的盈利路径叙事。ThreatLocker 隐含倍数 16.8x，高于 SentinelOne 区间，尽管 SentinelOne 按 ARR 计算大 11x。

              Palo Alto Networks 交易在约 8x 收入，原因是其大市值多元化平台属性和相对较低增速。Sophos 已被 Francisco Partners 收购并私有化，更适合作为交易可比（PE
              收购，4-8x 收入），而不是可交易的 NTM 基准。Microsoft Defender 作为 OS 打包功能而非独立 SaaS 产品，被排除在外。

              可比分析显示，ThreatLocker 的 16.8x 倍数只有在实际 ARR 高于 Tracxn $71.5M 估计，和/或市场正在定价持续 30-50% 增长时才站得住。如果收入增长放缓，按
              SentinelOne 可比的 6-9x 倍数，将对应 $430-640M 估值。
            claimRefs:
              - CV015
              - CV016
