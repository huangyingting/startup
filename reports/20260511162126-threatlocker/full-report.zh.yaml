  - number: 3
    title: 竞争格局
    sections:
      - number: '3.1'
        title: 竞争格局概览
        blocks:
          - type: paragraph
            body: >
              全球端点安全市场围绕一个根本架构分野展开：默认拒绝与默认允许。默认允许平台——包括 CrowdStrike Falcon、SentinelOne Singularity、Microsoft Defender
              for Business、Malwarebytes ThreatDown、Bitdefender GravityZone 和 Carbon
              Black——默认允许所有软件执行，并依赖行为检测、机器学习和威胁情报源，在恶意行为尝试运行后识别威胁。该检测优先模型对已知威胁特征有效，但结构上会暴露一个窗口：新的勒索软件、无文件恶意软件和零日利用可能在行为模式被识别前已经执行。ThreatLocker
              完全反转这个模型：它的默认拒绝架构禁止任何未经批准的应用执行，不管是否存在威胁特征；检测窗口不是靠特征覆盖广度去缩小，而是在架构上被消除。这一结构性差异是 ThreatLocker
              的核心价值主张，也是它相对七个被画像竞争对手的主要差异化，覆盖四类竞争类别：企业 EDR/XDR（CrowdStrike、SentinelOne）、捆绑安全套件（Microsoft Defender）、面向
              SMB 的托管端点安全（Malwarebytes ThreatDown、Bitdefender GravityZone），以及企业行为检测（Broadcom 旗下 Carbon
              Black）。竞争定位图直观呈现了这种差异化：ThreatLocker 独处右上象限，同时具备最高零信任严格度和最高 SMB 与 MSP 渠道契合度；被画像竞争对手没有一家同时占据该象限。Microsoft
              Defender 的 SMB 渗透率高，但零信任严格度低；CrowdStrike 和 SentinelOne 具备中等零信任功能，但 MSP 原生分销弱；Malwarebytes 和 Bitdefender 有
              MSP 触达，但零信任深度有限。ThreatLocker 在这个二维空间中的独特性，是其最耐久的竞争位置；不过，现有厂商构建白名单附加模块和 AI 原生新进入者，都会带来替代风险。
            claimRefs:
