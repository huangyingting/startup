      - number: '6.4'
        title: 客户满意度与留存
        blocks:
          - type: paragraph
            body: >
              截至 2026 年 Q1，G2 上 ThreatLocker 在 920 多条评价中得分 4.8/5；政策颗粒度、应用行为可见性、有效阻断勒索软件是反复出现的好评主题。Gartner Peer Insights
              在零信任网络访问类别授予 ThreatLocker Customers' Choice 标识，评分 4.8/5。PeerSpot 和 Capterra 合计 200 多条评价的均分在 4.7 至 4.8/5
              之间，与 G2 和 Gartner 分数一致。TrustRadius 将 ThreatLocker 放在终端安全工具前四分位。负面评价反复提到初始学习曲线陡，尤其是策略调优；没有专职 IT
              人员的组织上手复杂；以及偶发误报会阻断合法软件。Cybernews 和从业者社区论坛上的反向评价指出，在高量上线事件中，支持响应速度令人沮丧。NRR 和 GRR 未公开披露；高满意度分数以及 MSP
              社区论坛中缺少大规模流失叙事，是正向代理指标，但不能替代经验证的留存数据。合同续约率和队列层面的流失，是任何资料室流程必须解决的关键尽调缺口。
