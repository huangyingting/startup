  - number: 6
    title: 客户情况
    sections:
      - number: '6.1'
        title: 客户牵引力与规模
        blocks:
          - type: paragraph
            body: >
              截至 2026 年初，ThreatLocker 报告客户超过 70,000 家，CEO Danny Jenkins 在多场会议主题演讲和媒体采访中引用过这个数字。Latka 和 Tracxn 的独立估计区间为
              65,000 至 75,000，与公司披露一致。客户数从 2023 年约 40,000 增至这一水平，意味着两年 CAGR 约 32%，明显高于整体终端安全市场每年 15% 至 20% 的增速（Fortune
              Business Insights）。MSP 合作伙伴渠道是主要分发载体，按终端席位计，估计占总客户数的 60% 至 65%。通过 ThreatLocker 内部销售团队以及 AWS 和 Azure
              Marketplace 获取的直接企业和中端市场账户，占剩余 35% 至 40%。ThreatLocker 部署足迹覆盖 180
              多个国家，但收入预计高度集中在北美。客户数增长是公开可验证的最强牵引力信号；作为现阶段的私营公司，ARR、收入队列和 NRR 仍未披露。6,000 多家的 MSP 合作伙伴网络带来结构性分发广度，但如果少数超大型
              MSP 贡献了不成比例的客户量，也会引入集中度风险。
