      - - 净留存率（NRR）
        - 无法量化现有客户群的自然增长；NRR 高于 100% 是验证模块扩张逻辑的关键 SaaS 质量信号
        - 向财务团队索取队列级 NRR 数据；访谈前 10 大 MSP 合作伙伴，了解模块附加率行为
