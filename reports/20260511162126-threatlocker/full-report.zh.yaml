  - number: 4
    title: 财务情况
    sections:
      - number: '4.1'
        title: 收入模型和定价
        blocks:
          - type: paragraph
            body: >
              ThreatLocker 的收入模型是按端点计费的月度经常性订阅，主要由托管服务提供商（MSP）合作伙伴交付；MSP 将其打包进托管安全堆栈。MSP 合作伙伴向 SMB
              客户收取完整托管安全费用，再把其中一部分支付给 ThreatLocker，因此 MSP 是公司约 70,000
              家受保护组织中大多数客户的主要收入交付渠道。医疗、航空、教育和金融服务中的一小部分企业组织，则通过直销签订年度或多年期合同采购 ThreatLocker。公司未公开披露 MSP 交付与企业直销渠道之间的收入拆分。


              定价有意保持不透明。ThreatLocker 不公布任何订阅层级的标价；所有定价都通过 MSP
              批量协议或企业直销合同谈判完成。这种渠道居中的方式保护竞争定位，但也让外界无法用公开来源验证平均销售价格。CrowdStrike 公布的每端点每年 $299.99 至 $924.99 标价提供了一个竞争锚；鉴于
              ThreatLocker 定位 SMB 优先、MSP 渠道优先，它的价格很可能低于企业 EDR 现有厂商。


              ThreatLocker 的模块扩张策略是收入质量的关键驱动。平台已提供十三个或更多模块，包括 Ringfencing、Storage Control、Network Control、PAM、ZTNA 和
              ZTCA，为客户扩展零信任堆栈提供明确增购路径，并推动净收入留存率超过 100%。2025 年 Zero Trust World 推出五个新模块，ZTNA 和 ZTCA 也在 2026 年 3
              月上线，同时扩大了单客户可触达合同价值和总可用市场。收入模型桥图展示 MSP 和直销渠道如何生成总订阅收入，MSP 抽成会在 COGS 前降低净收入，而模块扩张推动净收入留存。Cyber Hero
              无限支持模式包含在订阅成本内，是一个成本中心；相对采用分层支持定价的平台，它可能压缩毛利率。
