  - number: 2
    title: 市场分析
    sections:
      - number: '2.1'
        title: 市场边界和定义
        blocks:
          - type: paragraph
            body: >
              ThreatLocker 所在市场是零信任端点安全，定义为在端点上执行默认拒绝姿态的软件：只明确允许白名单应用运行，控制存储设备访问，通过 Ringfencing
              限制应用行为以减少横向移动，并在工作站层面管理特权访问提升。该定义以预防优先为锚点，与基于检测的端点安全（EDR、XDR、传统杀毒）形成鲜明对比；后者允许执行，并在检测到威胁后响应。纳入支出类别包括：应用白名单和控制、面向工作站的端点特权访问管理、存储访问控制、应用
              Ringfencing、通过端点代理交付的零信任网络访问，以及面向受管端点的零信任云访问。排除支出包括不以白名单执行为核心的纯检测型 EDR 平台（CrowdStrike Falcon、SentinelOne
              Singularity）、没有端点执行的纯网络 ZTNA、仅面向服务器和基础设施的 PAM、没有代理交付的独立云安全态势管理，以及没有端点控制的纯身份 IAM 平台。ThreatLocker
              替代的主要现状方案包括：随 Microsoft 365 以零边际成本捆绑提供的 Windows Defender、传统杀毒和 EDR 方案，以及较大账户中的传统应用白名单工具。ThreatLocker 于
              2026 年 3 月进入 ZTNA 和 ZTCA
              邻近领域，适度扩大了其可触达市场，超出纯端点安全边界。市场估计区间图展示了端点安全估计（$17.6B）与更宽泛零信任安全定义（$34.5–42.3B）之间的显著差距，因此边界定义对任何市场规模结论都很关键。没有受管端点代理的纯云工作负载支出、未受管
              BYOD 设备以及基础设施层网络控制，均不在 ThreatLocker 当前范围内。
