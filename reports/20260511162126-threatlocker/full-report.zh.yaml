    title: 最终尽调要求表
    description: >
      Prioritized final diligence asks for ThreatLocker, with topic, missing evidence, why it matters for valuation, and
      the recommended owner or diligence path.
    notes: |
      尽调要求按估值影响排序。本表所有事项都会阻碍或显著影响最终投资建议。若要在 $1.2B 标记下注资，必须先清除所有阻断项。
