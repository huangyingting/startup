      topic: product
      missingEvidence: "ThreatLocker has not publicly disclosed a maximum supported endpoint scale limit per cloud console instance or per deployment."
      whyItMatters: "Scalability ceiling is important for large enterprise buyers and MSPs managing thousands of endpoints; undisclosed limits create procurement uncertainty."
      diligencePath: "Request maximum endpoint capacity per tenant and per console instance from ThreatLocker directly; ask for references from MSPs managing 10,000 or more endpoints."
