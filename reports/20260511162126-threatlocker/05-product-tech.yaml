chapter:
  number: 5
  title: "Product & Technology"
  summary: >
    ThreatLocker's Zero Trust platform is anchored by a default-deny Application Allowlisting
    engine that blocks every unapproved executable, script, and macro before it runs, making
    it fundamentally different from signature-based EDR vendors. The platform's eight GA modules
    including Ringfencing, Storage Control, Network Control, PAM, Elevation Control, and the
    newly launched ZTNA and ZTCA cover the full Zero Trust endpoint and network stack. Five
    additional modules announced at Zero Trust World 2025 and a 14-data-center expansion
    demonstrate active platform investment, though agent-level update risk, complex initial
    onboarding, and the absence of public SLA and SOC 2 attestation remain the primary product
    diligence concerns.

sections:
  - id: product-architecture-and-platform-design
    title: "Product Architecture and Platform Design"
    body: >
      ThreatLocker operates a cloud-managed, agent-based security platform built on a
      default-deny philosophy: every application, script, executable, and macro is blocked
      unless explicitly approved by an administrator. The platform consists of two primary
      components, a cloud-hosted management console where administrators configure and audit
      policies across all managed endpoints, and a lightweight kernel-level agent deployed
      on individual Windows and macOS endpoints that enforces those policies in real time.
      Because the agent enforces policy locally, endpoints remain protected even during
      temporary internet outages; the last-known approved policy continues to govern execution
      until connectivity is restored and policy can be refreshed.

      The cloud management console is multi-tenant by design, enabling Managed Service
      Providers to manage thousands of customer organizations from a single interface with
      full policy isolation between tenants. Policies are pushed from the console to agents
      automatically, and telemetry from endpoints flows back to the console for audit and
      alerting. The platform supports automated learning modes during onboarding, where the
      agent observes and catalogs all running software before switching to enforcement mode,
      reducing the policy-building burden. ThreatLocker expanded to 14 new data centers in
      2025-2026, including 12 in the US, Saudi Arabia, and Abu Dhabi, to reduce policy-sync
      latency and support international data residency requirements for customers such as
      Emirates airlines and healthcare sector buyers. The cloud infrastructure provider has
      not been publicly named, representing a dependency risk that warrants diligence.
