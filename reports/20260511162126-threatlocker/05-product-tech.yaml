      severity: material
      topic: product
      missingEvidence: "ThreatLocker has not published an SLA for agent uptime, policy enforcement continuity, or cloud management console availability."
      whyItMatters: "Enterprise buyers in regulated industries require contractual SLAs for security tool availability; absence is a potential procurement blocker for healthcare and financial services."
      diligencePath: "Request Master Service Agreement and SLA schedule from ThreatLocker; ask for historical console uptime data and agent availability incident records."
