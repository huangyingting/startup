  - id: trust-compliance-and-integration
    title: "Trust, Compliance, and Integration Ecosystem"
    body: >
      ThreatLocker supports regulatory compliance workflows for customers in healthcare,
      financial services, and education verticals. For HIPAA-covered entities, ThreatLocker's
      allowlisting and storage control modules restrict which software can access protected
      health information and prevent unauthorized copying to external media. For financial
      sector customers, the platform's controls align with the GLBA Safeguards Rule's
      requirements for access management and endpoint security. GLBA compliance support is
      documented in ThreatLocker's marketing materials, though the covered entity retains
      compliance responsibility. The MSP channel enables compliance-as-a-service packaging
      where MSPs bundle ThreatLocker into their compliance stack for regulated clients.

      On the integration side, ThreatLocker connects with major RMM platforms including
      ConnectWise Automate, Datto RMM, and NinjaRMM, enabling MSPs to deploy and manage
      ThreatLocker from within their existing management consoles without switching tools.
      This integration depth is a meaningful switching cost barrier for the MSP channel:
      once an MSP has integrated ThreatLocker into its ConnectWise or Datto workflow,
      switching costs extend beyond the product to the RMM configuration and customer
      onboarding documentation. SOC 2 Type II compliance is claimed but the public
      certification report has not been confirmed from independent sources, representing
      a diligence gap for enterprise buyers who require third-party attestation as a
      procurement prerequisite. The Cyber Hero support model provides 24/7 access to
      ThreatLocker engineers at no additional cost, which is a meaningful differentiator
      versus vendors that charge separately for premium support tiers.
    claimRefs:
      - CE013
      - CE014
      - CE021
