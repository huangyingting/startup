companyProfile:
  summary: >-
    ThreatLocker, Inc. is an Orlando, Florida-based cybersecurity company founded in 2017 that has built
    a Zero Trust endpoint security platform centered on application allowlisting with a default-deny
    philosophy. The company serves over 70,000 organizations globally through a channel-first model
    focused on Managed Service Providers (MSPs), and achieved unicorn status with a $1.2 billion
    post-money valuation following its $60 million Series E round in April 2025. ThreatLocker's platform
    spans application allowlisting, Ringfencing, storage control, privileged access management, network
    control, EDR/MDR, and newly launched ZTNA and ZTCA capabilities. With approximately 700 employees
    and a highly rated customer support model (Cyber Hero 24/7), ThreatLocker has grown from roughly
    200 employees in 2023 to a ~$253.6 million total-raised unicorn operating in a $42 billion and
    growing Zero Trust security market.
