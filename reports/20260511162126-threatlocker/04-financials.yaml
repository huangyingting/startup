  evidenceGaps:
    - type: private-evidence-only
      severity: material
      topic: arr-not-disclosed
      missingEvidence: >
        ThreatLocker has not disclosed ARR, revenue growth rate, or any financial
        operating metrics from any public source. Latka ($61.7M, 2023) and Tracxn
        ($71.5M, 2025) are third-party estimates with unknown methodology and
        significant uncertainty bands.
      whyItMatters: >
        Without management-reported ARR, it is impossible to model revenue trajectory,
        calculate an accurate valuation multiple, or forecast capital needs. The
        Latka-to-Tracxn implied growth rate of 16% annualized may understate or
        overstate actual performance.
      diligencePath: >
        Request management-reported ARR bridge (monthly or quarterly) for trailing 24
        months from ThreatLocker CEO or CFO in a private due diligence process. Cross-
        reference against deferred revenue balance on any available balance sheet and
        against customer cohort data from key MSP partners.
      relatedQuestionRefs:
        - QI008

    - type: missing-source
      severity: material
      topic: lawsuit-exposure-unknown
      missingEvidence: >
        The ThreatLocker v. Charles Schwab Corporation complaint (Case 6:2025cv00923,
        M.D. Fla.) is accessible only via PACER subscription. The LQCRE article
        describes it as a contract or lease dispute but does not detail the amount
        in controversy, relief sought, or likelihood of material financial exposure.
      whyItMatters: >
        A material adverse judgment in this litigation could affect ThreatLocker's
        capital adequacy, require disclosure obligations for any IPO or acquisition
        process, or distract management during a critical growth period. The exposure
        is currently unquantifiable from public sources.
      diligencePath: >
        Obtain the full complaint through PACER (Case 6:2025cv00923, M.D. Fla.) to
        determine the amount in controversy and nature of claims. Request litigation
        update and reserve estimate from ThreatLocker management or legal counsel
        in any investment or acquisition process.
      relatedQuestionRefs:
        - QI015

    - type: missing-source
      severity: minor
      topic: pricing-opaque
      missingEvidence: >
        ThreatLocker does not publish list pricing for any product tier. No customer
        contract, MSP partner pricing sheet, or reseller rate card is publicly available.
        Enterprise pricing estimates of $50-150/endpoint/year are analyst-derived from
        industry benchmarks and are unconfirmed.
      whyItMatters: >
        Without pricing visibility, it is impossible to verify average selling price,
        assess pricing power versus Microsoft Defender bundling, or model revenue
        sensitivity to price changes. Opaque pricing also makes competitive win-loss
        analysis speculative.
      diligencePath: >
        Request MSP partner pricing schedules, volume discount tiers, and representative
        enterprise contracts under NDA from ThreatLocker in a due diligence process.
        Cross-reference with 3-5 MSP partner interviews to triangulate realized
        per-endpoint pricing and take-rate structure.
      relatedQuestionRefs:
        - QI024

    - type: private-evidence-only
      severity: material
      topic: unit-economics-private
      missingEvidence: >
        Customer acquisition cost, net revenue retention, lifetime value, average
        contract value, payback period, and gross margin are all private metrics not
        available from any public source. SaaS peer benchmarks from CrowdStrike and
        SentinelOne provide a proxy range but are not company-specific.
      whyItMatters: >
        Unit economics are the core inputs for valuation modeling in a SaaS business.
        Without CAC, NRR, and gross margin, it is not possible to determine whether
        ThreatLocker's growth is capital-efficient, whether its MSP channel model
        creates structural margin compression, or whether its customer lifetime value
        justifies the current valuation multiple.
      diligencePath: >
        Request CAC by channel (MSP vs. direct enterprise), cohort-level NRR for
        trailing 8 quarters, gross margin by revenue segment, and ACV distribution
        by customer size tier from ThreatLocker finance and sales operations teams.
      relatedQuestionRefs:
        - QI028

    - type: access-blocked
      severity: minor
      topic: series-e-primary-pr-broken
      missingEvidence: >
        Primary press releases for the $60M Series E on PR Newswire (302428573) and
        BusinessWire returned 404 errors at time of research. The terms and investor
        roster are corroborated by PremierAlts and Tracxn secondary sources but
        cannot be verified from the original announcements.
      whyItMatters: >
        Primary press releases would confirm investor names, participation amounts,
        valuation methodology, and stated use of funds. Without them, the investor
        composition and valuation terms rely on secondary aggregator data that may
        contain inaccuracies or omissions.
      diligencePath: >
        Request the original Series E term sheet and closing documents from ThreatLocker
        management; alternatively, contact Arthur Ventures or CR2 Ventures investor
        relations to confirm round terms. Check Internet Archive for cached versions
        of the PR Newswire and BusinessWire announcements.
      relatedQuestionRefs:
        - QI026
