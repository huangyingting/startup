    description: >
      Six unit economics metrics for ThreatLocker including gross margin, CAC, ACV,
      NRR, payback period, and profitability status. All values are either not disclosed
      or analyst-estimated from SaaS peer benchmarks. Each row documents the metric,
      current value or status, confidence level, why it matters, and the specific
      diligence request to close the gap.
    columns:
      - "Metric"
      - "Value / Status"
      - "Confidence"
      - "Why It Matters"
      - "Diligence Ask"
    rows:
      - - "Gross Margin"
        - "Not disclosed; SaaS endpoint security peers: 70-80% gross margin"
        - "Low — estimated from SaaS peer benchmarks"
        - "Determines capital efficiency and path to profitability; 70%+ gross margin typical for pure-play endpoint SaaS"
        - "Request audited or management-reported gross margin; compare to CrowdStrike (75%) and SentinelOne (74%) benchmarks"
      - - "Customer Acquisition Cost (CAC)"
        - "Not disclosed; MSP channel structure reduces direct CAC vs. enterprise-direct"
        - "Low — no data"
        - "Channel-first GTM typically lowers direct CAC but reduces gross margin from reseller take-rate; critical for capital efficiency assessment"
        - "Request CAC by channel (MSP vs. direct); understand MSP referral incentives and take-rate structure"
      - - "Average Contract Value (ACV)"
        - "Not disclosed; est. $1,000-3,000/year per organization (50-150 endpoints avg, $10-20/endpoint/month)"
