  - id: financial-verdict-and-diligence-blockers
    title: "Financial Verdict and Diligence Blockers"
    body: >
      ThreatLocker's financial profile exhibits strong revenue quality characteristics
      despite significant disclosure gaps. The core subscription model is recurring,
      per-endpoint, driven by compliance mandates and allowlist policy lock-in, with
      low churn risk and high revenue visibility. MSP-delivered SMB revenue provides
      broad geographic and customer diversification without concentrated enterprise
      credit risk. At approximately 16-17x estimated ARR, ThreatLocker's $1.2 billion
      valuation exceeds the current public market median for endpoint security software,
      reflecting investor confidence in the growth trajectory and market opportunity.
      The MSP channel's lower direct customer acquisition cost relative to enterprise-
      direct models provides structural capital efficiency that may support faster-than-
      expected progress toward profitability.


      Comparison to public peers illustrates the gap in absolute scale: CrowdStrike's
      ARR of $3.1 billion is approximately 43 times ThreatLocker's estimated ARR, and
      SentinelOne's $936 million ARR is approximately 13 times larger. This gap
      indicates ThreatLocker is at an early-to-mid growth stage with substantial runway
      within the $42.28 billion global zero trust security market, where its
      approximately $71.5 million ARR represents less than 0.2% of total addressable
      market. The subscription model has low revenue recognition risk relative to
      enterprise license or usage-based models, and no evidence of pricing pressure,
      contract non-renewals, or large-scale customer losses has been identified in
      public review data.


      The primary financial diligence blockers are documented in the public financial
      gaps table and represent the core constraints on quantitative underwriting. Without
      management-reported ARR growth, gross margin, net revenue retention, and CAC data,
      it is not possible to model ThreatLocker's intrinsic value with precision. A
      private due diligence process requiring the latest board financial package including
      an ARR bridge, income statement with COGS detail, cohort-level NRR, and CAC by
      channel would substantially close these gaps. The ThreatLocker v. Charles Schwab
      litigation represents an unquantified financial contingency that should be addressed
      in any acquisition or investment process. Family governance concentration across
      CEO, COO, and CTO roles also warrants assessment of alignment risk for minority
      shareholders in a potential liquidity scenario.
    claimRefs:
      - CI005
      - CI019
      - CI027
      - CI029
      - CI030
      - CI033
      - CI038
    tableRefs:
      - TI005

tables:
  - id: TI001
    title: "Revenue streams table"
    description: >
      Five revenue mechanisms for ThreatLocker including MSP subscription, direct
      enterprise, professional services, module upsell, and training. For each stream,
      the table identifies the mechanism, billing unit, current value or status,
      quality assessment, and key diligence ask. Revenue composition based on official
      platform pages, CRN channel coverage, and TMCnet reporting.
    columns:
      - "Revenue Stream"
      - "Mechanism"
      - "Unit"
      - "Current Value / Status"
      - "Quality Assessment"
      - "Diligence Ask"
    rows:
      - - "MSP Subscription (Core)"
        - "Monthly per-endpoint fee bundled into MSP's managed security stack; MSP collects from SMB client and remits to ThreatLocker"
        - "Per endpoint per month (recurring)"
        - "~$71.5M ARR est. (Tracxn 2025); not confirmed by company"
        - "Recurring, high-quality SaaS revenue; strong visibility for MSPs; low contract risk at SMB scale"
        - "Confirm ASP per endpoint; request average endpoints per MSP client and MSP cohort retention data"
      - - "Direct Enterprise Subscription"
        - "Annual or multi-year contract with enterprise organizations (500-2,500+ endpoints) via direct sales"
        - "Per endpoint per year (annual contract)"
        - "Not disclosed separately; included in total ARR estimate"
        - "High-value, high-retention; compliance-driven stickiness in healthcare, aviation, education verticals"
        - "Request enterprise vs. MSP revenue split; enterprise contract terms and renewal rates"
      - - "Professional Services / Onboarding"
        - "Implementation and onboarding assistance for large enterprise deployments; not standard for MSP-channel SMBs"
        - "Time-and-materials or fixed fee"
        - "Believed minimal; not disclosed; Cyber Hero support included in subscription"
        - "Low-margin, non-recurring; typically minimal for SaaS platforms with strong self-service/MSP delivery"
        - "Confirm PS revenue as % of total; validate whether Cyber Hero support is included or billed separately"
      - - "Module Upsell / Expansion Revenue"
        - "Additional modules (Ringfencing, Storage Control, Network Control, PAM, ZTNA, ZTCA) sold to existing customers expanding their Zero Trust stack"
        - "Per module add-on or bundled tier upgrade"
        - "Growing; 5 new modules launched at ZTW 2025; ZTNA/ZTCA March 2026 launch expands SAM"
        - "Net revenue retention indicator: expansion revenue from existing base is high-quality and margin-accretive"
        - "Request NRR, module attach rates, and upsell conversion rates from MSP partners"
      - - "ThreatLocker Training / Certification"
        - "Zero Trust World conference, online training, and certification programs for MSPs and practitioners"
        - "Per seat or event registration"
        - "Incidental; Zero Trust World 2025 held in Orlando; not separately disclosed"
        - "Low revenue, high brand-value channel investment; unlikely to be material to P&L"
        - "Confirm whether conference/training revenue is disclosed or consolidated into total ARR"
    notes: "Revenue composition based on ThreatLocker official platform page, CRN channel coverage, and TMCnet. No revenue split between MSP and direct, or by module, has been disclosed. Tracxn and Latka estimates are third-party only."
    claimRefs:
