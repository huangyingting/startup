        - "Low — inferred from financing behavior"
        - "Series E size relative to valuation step suggests either high profitability or targeted capital use; investor confidence signal"
        - "Request current monthly burn rate, runway at current spend, and whether company is EBITDA-positive"
    notes: "All unit economic values are analyst-derived estimates from SaaS industry benchmarks and competitor disclosures. ThreatLocker has not confirmed any of these metrics. Gross margin peer benchmarks from CrowdStrike FY2025 and SentinelOne FY2026 public earnings."
