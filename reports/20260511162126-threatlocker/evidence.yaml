      RMM/PSA platforms.
    diligencePath: >
      Request cohort-level retention data from ThreatLocker management segmented by MSP partner tenure; conduct MSP
      partner interviews asking specifically about evaluation of competing tools and reasons for staying with or leaving
      ThreatLocker.
    relatedQuestionRefs:
