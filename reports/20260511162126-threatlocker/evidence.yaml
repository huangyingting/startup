    missingEvidence: >
      No public win-loss or churn data is available for ThreatLocker; the company has not disclosed customer retention
      rates, net revenue retention, or percentage of accounts that have migrated to competing platforms.
    whyItMatters: >
      Without churn data, it is not possible to verify whether allowlist policy lock-in translates into measurable
