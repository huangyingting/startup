        - label: "JetBlue Airways"
          values: ["High", "Medium", "Low", "High"]
        - label: "Emirates"
          values: ["Medium", "Low", "Low", "High"]
        - label: "Hattiesburg Clinic"
          values: ["High", "Medium", "Low", "High"]
        - label: "Niles Community Schools"
          values: ["High", "Medium", "Low", "High"]
        - label: "Unnamed MSP Customers"
