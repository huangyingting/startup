artifact: customers
slug: threatlocker
runDate: "2026-05-11"
company:
  name: "ThreatLocker, Inc."

acknowledgedWarnings:
  - dimension: unverifiedSource
    reason: >
      Capterra (SU001), TrustRadius (SU002), and PeerSpot (SU003) are review aggregators
      that may throttle direct fetches; scores are cross-checked against G2 (SU013) and
      Gartner Peer Insights (SU014). Channel Insider (SU004), Dark Reading (SU005),
      SecurityWeek (SU006), Healthcare IT News (SU007), and Channel Pro Network (SU008)
      are industry news sites corroborated via multiple trade sources. SANS Institute
      (SU009) is a research institution whose content is independently verifiable.
      Cyber Defense Magazine (SU010) is a trade publication cross-checked against
      SecurityWeek and Dark Reading. Named customer deployments (Orlando Magic,
      Indianapolis Colts, JetBlue, Emirates, Hattiesburg Clinic, Niles Community Schools)
      are sourced from ThreatLocker official case studies (SU011, SU012); independent
      corroboration is limited for private deployment outcome metrics.
  - dimension: tableNotes
    reason: >
      TU001 (segmentation), TU002 (growth trajectory), TU004 (retention), and TU005
      (concentration risk) contain analyst-derived estimates because ThreatLocker does
      not publicly disclose segmented revenue, NRR/GRR, churn, or MSP concentration
      data. Notes on each table document estimation methodology and coverage limitations;
      this is unavoidable for a private company that has not disclosed operating metrics.
      Acknowledging tableNotes per validator guidance for factual snapshot tables where
      estimation caveats cannot be removed.

chapter:
  number: 6
  title: Customers
  summary: >
    ThreatLocker reports 70,000-plus customers as of early 2026, growing from roughly
    40,000 in 2023 — a two-year CAGR of approximately 32%. The customer base skews
    heavily toward MSP-served SMBs (estimated 60-65% by count) with a growing mid-market
    and enterprise tail. Named public deployments span professional sports (Orlando Magic,
    Indianapolis Colts), aviation (JetBlue, Emirates), healthcare (Hattiesburg Clinic),
    and education (Niles Community Schools). G2 rates the platform 4.8/5 from 920-plus
    reviews and Gartner Peer Insights awards it 4.8/5 with Customers' Choice distinction.
    Key diligence gaps: NRR and GRR are not publicly disclosed; MSP partner concentration
    is opaque; enterprise churn and cohort retention data are unavailable.

sections:
  - id: customer-traction-and-scale
    title: "Customer Traction and Scale"
    body: >
      ThreatLocker reported more than 70,000 customers as of early 2026, a figure CEO
      Danny Jenkins has cited in multiple conference keynotes and media interviews.
      Independent estimates from Latka and Tracxn place the range at 65,000 to 75,000,
      consistent with company disclosures. Growth from approximately 40,000 customers
      in 2023 implies a two-year CAGR of roughly 32 percent, well above the broader
      endpoint security market growth rate of 15 to 20 percent per year (Fortune Business
      Insights). The MSP partner channel is the primary distribution vehicle, accounting
      for an estimated 60 to 65 percent of total customer count by endpoint seat.
      Direct enterprise and mid-market accounts, sourced through ThreatLocker's internal
      sales team and AWS and Azure marketplace listings, represent the remaining 35 to
      40 percent. ThreatLocker's deployment footprint spans more than 180 countries,
      though revenue concentration in North America is expected to be high. Customer-count
      growth is the strongest publicly verifiable traction signal; ARR, revenue cohorts,
      and NRR remain undisclosed for a private company at this stage. The six-thousand-plus
      MSP partner network provides structural distribution breadth but also introduces
      concentration risk if a small subset of mega-MSPs accounts for a disproportionate
      share of total customer volume.
    claimRefs: [CU001, CU002, CU003, CU004, CU005, CU006]
    tableRefs: [TU002]

  - id: customer-vertical-segmentation
    title: "Customer Vertical Segmentation"
    body: >
      ThreatLocker's customer base spans six primary verticals: healthcare, financial
      services, education, government, professional services, and general SMB via MSPs.
      Healthcare customers such as Hattiesburg Clinic are motivated by HIPAA technical
      safeguard requirements and the high cost of ransomware incidents in clinical
      environments. Financial services clients adopt ThreatLocker for SOC 2, PCI-DSS,
      and GLBA compliance. The education vertical — from K-12 districts like Niles
      Community Schools to higher education — is attracted by the platform's suitability
      for unmanaged device environments and state-level cybersecurity mandates. Government
      and critical infrastructure buyers respond to CISA zero-trust guidance. Professional
      sports franchises (Orlando Magic, Indianapolis Colts) and aviation operators
      (JetBlue, Emirates) are higher-profile enterprise wins that validate scalability
      beyond the SMB segment. MSP partners provide horizontal coverage across all
      verticals for the long tail of sub-250-seat customers, creating breadth that
      reduces single-sector concentration risk at the vertical level. Revenue or
      customer-count breakdown by vertical is not publicly disclosed, limiting
      the depth of vertical concentration analysis available at this stage.
    claimRefs: [CU007, CU008, CU009, CU030]
    tableRefs: [TU001]

  - id: named-customer-proof
    title: "Named Customer Proof"
    body: >
      ThreatLocker's public case study library includes documented production deployments
      at Orlando Magic (NBA franchise, full Ringfencing and allowlisting implementation),
      Indianapolis Colts (NFL franchise, endpoint lockdown), JetBlue Airways (airline,
      zero-trust application control for ground operations), Emirates (international
      airline, infrastructure protection), Hattiesburg Clinic (multi-specialty healthcare
      practice, HIPAA-driven adoption), and Niles Community Schools (K-12 district,
      device allowlisting). These are production deployments, not pilots, as confirmed
      by multi-year contract language and ongoing operational references in the case
      studies. Outcome claims include reduction in phishing-related lateral movement,
      elimination of unauthorized software installations, and improved audit trail
      fidelity for compliance reporting. However, quantified financial outcomes — such
      as breach cost avoided, IT hours saved, or security operations cost reduction —
      are absent from publicly available materials, limiting ROI evidence depth. Most
      case studies are self-published by ThreatLocker; independent press coverage
      corroborates named customer relationships but rarely validates specific outcome
      metrics independently.
    claimRefs: [CU010, CU011, CU012, CU013, CU022, CU023, CU029]
    tableRefs: [TU003]
    figureRefs: [FU003]

  - id: customer-satisfaction-and-retention
    title: "Customer Satisfaction and Retention"
    body: >
      G2 rates ThreatLocker 4.8 out of 5 from more than 920 reviews as of Q1 2026,
      with policy granularity, visibility into application behavior, and effective
      ransomware blocking as recurring praise themes. Gartner Peer Insights awarded
      ThreatLocker a Customers' Choice distinction in the zero-trust network access
      category with a 4.8 out of 5 rating. PeerSpot and Capterra average between 4.7
      and 4.8 out of 5 across more than 200 combined reviews, consistent with G2 and
      Gartner scores. TrustRadius places ThreatLocker in the top quartile of endpoint
      security tools. Recurring negative review themes include steep initial learning
      curve — particularly for policy tuning — complex onboarding for organizations
      without dedicated IT staff, and occasional false positives that block legitimate
      software. Adverse reviews on Cybernews and practitioner community forums flag
      frustration with support responsiveness during high-volume onboarding events.
      NRR and GRR are not publicly disclosed; the high satisfaction scores and absence
      of a mass-churn narrative in MSP community forums are positive proxies but do not
      substitute for verified retention data. Contract renewal rates and cohort-level
      churn are key diligence gaps that must be addressed in any data room process.
    claimRefs: [CU014, CU015, CU016, CU017, CU018, CU019, CU020, CU021, CU035]
    tableRefs: [TU004]
    figureRefs: [FU004]

  - id: go-to-market-expansion-concentration-risk
    title: "Go-to-Market, Expansion, and Concentration Risk"
    body: >
      ThreatLocker's primary distribution runs through approximately 6,000-plus MSP
      partners globally, creating significant partner-channel concentration risk. If
      the top 50 MSP partners account for a disproportionate share of customer volume
      — a plausible but unverified scenario — churn among a small number of large MSPs
      could materially impact customer count and ARR. The land-and-expand model operates
      at two levels: MSPs expand by adding endpoint seats for existing SMB clients, and
      direct enterprise accounts expand by deploying additional ThreatLocker modules
      including Ringfencing, Storage Control, and Network Control. AWS and Azure
      marketplace listings provide procurement convenience for enterprise buyers who
      prefer cloud-based billing. Key friction points include the complexity of policy
      migration when MSPs switch vendors and the learning curve for non-technical IT
      administrators. MSP consolidation — notably Kaseya's acquisition of Datto —
      creates risk that larger platform players will bundle endpoint security functionality
      competitive with ThreatLocker into existing MSP toolstacks. Expansion velocity
      is supported by the zero-trust compliance tailwind, but MSP platform competition
      from Kaseya and ConnectWise is a structural headwind for channel exclusivity.
    claimRefs: [CU024, CU025, CU026, CU027, CU028, CU031, CU032, CU034]
    tableRefs: [TU005]
    figureRefs: [FU001, FU002]

