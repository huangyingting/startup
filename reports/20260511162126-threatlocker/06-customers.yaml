figures:
  - id: FU001
    title: "Customer Journey Map: ThreatLocker Adoption Path"
    type: journey-map
    description: >
      End-to-end customer journey from problem awareness through managed expansion.
      The MSP channel handles the majority of SMB onboarding; direct sales manages
      enterprise and mid-market accounts. Journey stages reflect publicly available
      case study descriptions and MSP community feedback.
    summary: >
      Seven-stage journey from awareness through expansion, covering both MSP-led SMB
      onboarding and direct enterprise sales motions.
    data:
      items:
        - label: "Awareness"
          detail: >
            Prospect learns of ThreatLocker via MSP partner recommendation, CISA
            zero-trust guidance, peer referral at MSP community events, or ThreatLocker's
            Zero Trust World conference.
        - label: "Evaluation"
          detail: >
            IT administrator or MSP reviews G2 and Gartner ratings, requests a demo,
            and benchmarks ThreatLocker against CrowdStrike and SentinelOne allowlisting
            capabilities.
        - label: "Trial and POC"
          detail: >
            Sixty to ninety day audit (learning) mode enabled; ThreatLocker scans existing
            application inventory and generates initial allowlist recommendations without
            enforcement.
        - label: "Purchase"
          detail: >
            Contract signed via MSP channel (SMB) or direct sales (enterprise); typically
            one to three year term; modules selected from Application Control, Ringfencing,
            Storage Control, and Network Control.
        - label: "Deployment"
          detail: >
            Policy configuration workshops conducted; staged endpoint rollout executed;
            IT team trained on the policy management console; integration with PSA and
            RMM tooling completed.
        - label: "Active Use"
          detail: >
            Daily enforcement of allowlist and Ringfencing policies; security operations
            team uses audit logs for incident investigation and compliance reporting.
        - label: "Expansion"
          detail: >
            MSP adds endpoint seats for new SMB clients; enterprise adds modules such as
            Cloud Storage Control and Network Control; multi-year renewal locks in ARR.
    sourceRefs: [SU011, SU020]
    claimRefs: [CU031, CU026]

  - id: FU002
    title: "Adoption and Deployment Funnel"
    type: funnel
    description: >
      Estimated progression from addressable prospects to multi-module ThreatLocker
      deployments. Conversion rates are illustrative, based on industry SaaS benchmarks
      and MSP channel norms; ThreatLocker does not disclose funnel metrics publicly.
    summary: >
      Six-stage funnel from addressable MSP and enterprise prospects through
      multi-module expansion, with illustrative conversion rates.
    data:
      items:
        - label: "Addressable Prospects (MSPs and Enterprise)"
          value: 100000
        - label: "Engaged or Demo Requested"
          value: 12000
        - label: "POC or Trial Initiated"
          value: 4500
        - label: "Converted to Customer"
          value: 2800
        - label: "Active Multi-Module Deployment"
          value: 1400
        - label: "Expansion and Renewal Year 2 Plus"
          value: 900
    sourceRefs: [SU011, SU019]
    claimRefs: [CU031, CU026, CU027]

