  - id: EGM001
    title: Free-to-paid conversion rate post-2024 pricing restructure not publicly disclosed
    description: >-
      Figma has not disclosed the conversion rate from free to paid tiers following its late-2024 seat-based pricing
      restructure. The 690K paid customer to 13M+ MAU ratio implies ~5% conversion but the exact rate and trend are not
      confirmed.
    relatedQuestionRefs:
