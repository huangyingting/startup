  - id: EGM002
    title: Compliance certifications complete list not confirmed
    description: >-
      Figma's full list of compliance certifications (SOC 2 Type II, HIPAA, FedRAMP, ISO 27001, GDPR) has not been fully
      enumerated from an official source in this research cycle. Public documentation confirms SOC 2 but other
      certifications are not independently verified.
    relatedQuestionRefs:
      - QM022
  - id: EGM003
    title: Official geographic revenue breakdown not disclosed
    description: >-
      Figma does not publicly report geographic revenue by region in its quarterly financial results or S-1. The 38%
      North America user concentration from 6sense is a proxy, not revenue-based.
