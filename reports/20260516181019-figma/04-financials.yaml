callouts:
  - calloutType: strength
    title: "Best-in-Class SaaS Margins With Accelerating Cash Generation"
    body: >
      A 91% gross margin combined with 139% NDR and 46% revenue growth is an exceptionally rare
      combination. Only a handful of public SaaS companies sustain this profile: Figma sits alongside
      Veeva and early Snowflake on the rule-of-40+ spectrum. The $1.6B cash balance and zero-debt
      balance sheet give management exceptional strategic optionality with no financing dependency.
    claimRefs: [CI010, CI015, CI021]

  - calloutType: risk
    title: "GAAP Profitability Timeline Is Unclear"
    body: >
      GAAP operating margin of -41% in Q1 2026 reflects the post-IPO stock compensation overhang.
      Until stock-based compensation normalizes (likely 2027–2028), GAAP EPS will remain deeply
      negative, creating headline risk for retail investors and index-driven forced sellers. The
      AI credit model also introduces cost unpredictability if GPU/inference costs scale faster
      than revenue.
    claimRefs: [CI018, CI019, CI020]

  - calloutType: insight
    title: "International Revenue Monetization Gap Represents a Multibillion-Dollar Opportunity"
    body: >
      85% of Figma users are outside the U.S., yet only ~20% of revenue is international—implying
      the average international user pays roughly 6× less than a U.S. user. If Figma can close
      even half this gap through localized enterprise sales and pricing, the total addressable
      revenue opportunity from existing users alone could exceed $2–3B incrementally.
    claimRefs: [CI033, CI034]

