runDate: "2026-05-16"
company:
  name: "Figma"
chapter:
  number: 4
  title: "Financials"
  summary: >
    Figma is a high-quality SaaS business with 91% gross margins, 46% revenue growth through Q1 2026,
    and $1.6B in cash with no debt. Q1 2026 revenue of $333.4M exceeded consensus estimates; non-GAAP
    operating margin reached 16% while GAAP margins remain deeply negative due to IPO-related stock
    compensation. The company converted to free-cash-flow positivity in 2024 and has a robust $1.6B
    liquidity buffer. Key financial gaps include undisclosed CAC/LTV metrics, opacity around the AI
    credit monetization ramp, and GAAP profitability uncertain through at least 2026.

sections:
  - id: revenue-model
    title: "Revenue Model and Pricing Architecture"
    body: >
      Figma generates revenue almost entirely through seat-based SaaS subscriptions, supplemented by
      a newly launched AI credit model (March 2026). The pricing ladder has four tiers: Starter (free,
      unlimited viewers), Professional ($16/editor/month, $12/dev seat, $3/collab seat), Organization
      ($55/$25/$5), and Enterprise ($90/$35/$5), all billed annually for paid-plus tiers. Enterprise
      list pricing of $1,080/editor/year is typically realized at $700–$900 after negotiated volume
      discounts of 20–35%.

      All paid seats bundle FigJam and Slides—there is no "design-only" SKU below Organization tier—
      which drives cross-product attach at no incremental charge and supports Figma's multi-product
      expansion narrative. Revenue recognition follows ASC 606 ratable SaaS accounting; no significant
      usage-based revenue existed until the March 2026 AI credit introduction.

      The free-to-paid conversion funnel is PLG-driven: unlimited viewers and a starter tier create
      broad top-of-funnel adoption, while professional feature gates (SSO, advanced admin, branching,
      analytics) drive organizational upgrades. AI credits are priced at approximately $0.03/credit
      with potential monthly impact of $50–$200+ per power user, providing a nascent consumption
      revenue layer atop the subscription base.
    claimRefs: [CI001, CI002, CI003, CI004, CI005, CI006]
    tableRefs: [TI001, TI002]

  - id: growth-and-scale
    title: "Revenue Growth and Scale Milestones"
    body: >
      Figma crossed $1B annualized revenue in 2025, reporting FY2025 revenue of approximately $1.06B
      (+41% YoY), after $749M in FY2024 (+48% YoY) and $505M in FY2023. Q1 2026 revenue of $333.4M
      beat analyst estimates by a material margin and sustained 46% YoY growth, implying an annualized
      run rate of ~$1.33B. Management raised full-year 2026 guidance following Q1 results, with
      consensus estimates projecting ~$1.37B for FY2026.

      Net Dollar Retention of 139% (Q1 2026, up from 136% in Q4 2025) underscores the land-and-expand
      engine: existing enterprise customers consistently expand seat count and upgrade tiers. The 1,525
      customers paying >$100K ARR grew 48% YoY and contribute approximately 37% of total revenue,
      creating meaningful concentration but also a durable large-deal pipeline. The 15,218 customers
      at >$10K ARR grew 37% YoY, forming the mid-market expansion layer.

      Growth is primarily seat-depth driven within the Fortune 500 (95% of which already use Figma),
      meaning the marginal revenue driver is not net-new logos but rather conversion of view-only users
      to paid seats, cross-selling FigJam/Slides to existing design teams, and introducing developer
      seats (Dev Mode) to engineering organizations.
    claimRefs: [CI007, CI008, CI009, CI010, CI011, CI012, CI013, CI014]
    tableRefs: [TI003]
    figureRefs: [FI001, FI003]

  - id: margins-profitability
    title: "Gross Margins, Cost Structure, and Path to GAAP Profitability"
    body: >
      Figma's 91% gross margin is best-in-class among SaaS companies and reflects the software-only
      delivery model with no hardware, inventory, or material third-party COGS (AWS infrastructure
      costs are the primary COGS item). Non-GAAP operating margin of 16% in Q1 2026 confirms
      underlying business profitability; the GAAP operating margin of -41% (loss of $137.4M) is
      almost entirely attributable to stock-based compensation and payroll taxes on RSUs vested
      at IPO.

      Operating expenses on a GAAP basis surged in 2024 to $1.539B against $749M revenue—a 205%
      ratio—driven by a one-time stock tender and IPO-related compensation. Sales and marketing was
      reported at 55% of revenue in 2025 (GAAP), inflated by stock comp; the underlying cash S&M
      spend is materially lower. R&D investment is substantial and growing as Figma accelerates AI
      product development (Figma Make, Figma Weave), creating upward pressure on engineering headcount.

      Free cash flow was $88.6M in Q1 2026 (27% FCF margin), confirming the business generates
      meaningful cash despite GAAP losses. Operating cash flow was $97.3M (29% margin). Full-year
      2025 FCF was positive, driven by the $1B breakup fee cash infusion from Adobe in early 2024 and
      ongoing subscription collections. GAAP net profitability is expected to remain negative through
      at least FY2026 as stock compensation amortizes.
    claimRefs: [CI015, CI016, CI017, CI018, CI019, CI020]
    figureRefs: [FI002]

  - id: capital-adequacy
    title: "Capital Adequacy, Cash Position, and Financing"
    body: >
      Figma holds $1.6B in cash and equivalents as of March 31, 2026, with zero debt—an exceptional
      liquidity position relative to its $12B market cap and $1.33B annualized revenue. This cash
      balance reflects: (1) $1.5B raised in the November 2025 NYSE IPO (ticker: FIG), (2) $1B
      breakup fee received from Adobe in January 2024 after the $20B acquisition collapsed under
      EU and UK regulatory challenge, and (3) ongoing free cash flow generation since H2 2024.

      Pre-IPO the company had raised $332.8M across rounds from Sequoia Capital, Kleiner Perkins,
      Andreessen Horowitz, and Greylock Partners at a last private valuation of $12.5B (2021).
      IPO underwriters included Morgan Stanley, Goldman Sachs, Allen & Company, and J.P. Morgan.
      The company has no drawn credit facilities or project finance obligations disclosed in its
      S-1 or subsequent 10-Q filings.

      Capital adequacy is high: at the current FCF rate of ~$350M annualized, the cash position
      provides 4+ years of operational runway with zero additional financing needed even in a
      prolonged revenue deceleration scenario. The primary capital deployment priorities are
      AI infrastructure investment (GPU/cloud compute for Figma Make and Weave) and organic R&D
      headcount expansion. No acquisitions have been announced post-IPO as of May 2026.
    claimRefs: [CI021, CI022, CI023, CI024, CI025, CI026]
    tableRefs: [TI004]
    figureRefs: [FI004]

  - id: financial-gaps
    title: "Financial Gaps and Diligence Blockers"
    body: >
      Despite being a public company, Figma does not disclose several unit-economics metrics
      standard in SaaS analysis: (1) customer acquisition cost (CAC) and sales efficiency ratios
      such as magic number or CAC payback period, (2) ARR by product line (Design vs. FigJam vs.
      Dev Mode vs. Slides vs. Make), (3) cohort retention waterfall data, or (4) gross margin
      by customer segment. These omissions limit precise LTV/CAC modeling.

      The March 2026 launch of AI credits introduces a consumption revenue component whose
      monetization trajectory, attach rate, and margin profile have not been disclosed. Management
      noted 50–75% of enterprise customers use AI tools weekly, but the revenue contribution
      from credits versus seat subscriptions is not broken out. The transition from pure-seat
      to hybrid seat-plus-consumption billing creates model complexity and investor uncertainty.

      International revenue concentration is also a gap: roughly 85% of Figma's users are outside
      the U.S., but only ~20% of revenue is generated internationally, suggesting significant
      monetization headroom but also possible competitive displacement risk from local or low-cost
      alternatives (Penpot, MasterGo, Motiff) in price-sensitive markets.
    claimRefs: [CI027, CI028, CI029, CI030, CI031, CI032, CI033, CI034, CI035]
    tableRefs: [TI005]

