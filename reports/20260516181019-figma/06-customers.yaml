company:
  name: "Figma"
chapter:
  number: 6
  title: "Customers"
  summary: "Figma serves ~690,000 paid organizations with 1,525 enterprise accounts (>$100K ARR, +48% YoY) and 15,218 mid-market accounts (>$10K ARR, +37% YoY). Net Dollar Retention of 139% in Q1 2026 — up from 132% a year prior — reflects strong seat expansion and cross-product adoption. Approximately 95% of Fortune 500 companies use Figma; 76% of enterprise customers use two or more products. Named customer outcomes are high-quality and independently corroborated (Microsoft: 70% faster design-dev handoff; Netflix: global design system on single platform). Key diligence gaps: gross dollar retention undisclosed, cohort durability beyond Year 2 unverified, and AI-native tools present a rising churn risk for new workflow acquisition."

sections:
  - id: U01
    title: "Customer Base and Segmentation"
    body: |
      Figma serves approximately 690,000 paid organizations as of Q1 2026, spanning a wide spectrum from individual freelancers through Global 2000 enterprises. The customer base clusters into three measurable commercial tiers: the enterprise segment (~1,525 organizations generating >$100K ARR), a mid-market segment (~13,693 organizations generating $10K–$100K ARR), and a large SMB/long-tail base (~675K organizations below $10K ARR). Approximately 95% of Fortune 500 companies now use Figma in some capacity, making it the de facto standard for collaborative product design in large enterprise environments.

      Beyond paid accounts, Figma counts an estimated 13 million monthly active users, the majority of whom access the platform under the free tier or as invited collaborators on paid workspace plans. Critically, approximately two-thirds of MAU are not professional designers—they include product managers, engineers, marketing leads, and executives who view or interact with Figma files regularly. This cross-functional penetration entrenches Figma at the workflow layer rather than solely within the design team.

      Vertically, technology and SaaS companies account for the largest share of revenue, followed by financial services, healthcare, retail/CPG, and media/entertainment. Figma Education extends the platform free to qualifying universities and K-12 institutions, creating a student-to-professional pipeline that has historically seeded enterprise adoption. Geographic distribution is estimated at roughly 50% North America and 50% international (Europe, APAC), though Figma does not publicly disaggregate revenue by geography.
    claimRefs: [CU001, CU002, CU003, CU004, CU005, CU006, CU007]
    tableRefs: [TU001]
    figureRefs: [FU001]

  - id: U02
    title: "Adoption Trajectory and Enterprise Growth"
    body: |
      Figma's customer-growth trajectory signals accelerating enterprise penetration. The >$100K ARR cohort grew 48% year-over-year in Q1 2026, outpacing overall ARR growth and demonstrating that Figma's expansion engine is driving seat and product upsells faster within its largest accounts than it is signing new small accounts. The >$10K ARR cohort grew 37% YoY, reflecting steady mid-market momentum.

      Net Dollar Retention reached 139% in Q1 2026, up from 132% a year prior—a trajectory that is exceptionally strong even for high-growth SaaS: it implies existing customers are spending 39% more year-over-year on average, driven by seat growth, plan upgrades from Team to Org to Enterprise, and cross-sell of FigJam, Dev Mode, and Slides. Monthly active users reportedly reached approximately 13 million, and product telemetry (inferred from management commentary) indicates that 76% of enterprise accounts now use two or more distinct Figma products, compared to an estimated ~68% in 2024.

      The PLG (product-led growth) motion remains the primary acquisition channel. New paid organizations are predominantly seeded through free-tier virality: a single designer invites teammates to a Figma project, collaborators experience the product, and the workspace eventually hits plan limits that trigger an upgrade prompt. The average time-to-paid conversion for PLG leads is not publicly disclosed, but management commentary characterizes the free-to-Team upgrade rate as healthy and improving.
    claimRefs: [CU008, CU009, CU010, CU011, CU012, CU013, CU014]
    tableRefs: [TU002]
    figureRefs: [FU002]

  - id: U03
    title: "Named Customer Proof and Case Studies"
    body: |
      Figma's enterprise reference base is extensive and includes publicly documented outcomes at marquee logos. Microsoft—one of Figma's most cited reference customers—reported a 70% reduction in design-to-development handoff time after standardizing on Figma across its product design organization. The Microsoft case study is particularly valuable because it spans both Design and Dev Mode product lines and is corroborated by Microsoft's own published engineering blog and Figma's official customer story page.

      Netflix has standardized its global design system on Figma, enabling 150+ designers worldwide to collaborate on a single shared component library without the version-control chaos that plagued earlier tools. Netflix's engineering blog explicitly credits Figma's multiplayer model with eliminating design-file divergence across its international studios.

      GitHub, Airbnb, Dropbox, and Spotify each offer published or referenced customer stories that document use cases from design system maintenance to brand standardization to cross-team FigJam workshops. These reference customers span four different industries (technology, hospitality, cloud storage, and music streaming), demonstrating vertical breadth rather than niche positioning. The quality of these references is high: published engineering and design blogs from the customers themselves, not solely Figma marketing materials, corroborate outcomes.
    claimRefs: [CU015, CU016, CU017, CU018, CU019, CU020, CU021, CU022]
    tableRefs: [TU003]
    figureRefs: [FU003]

  - id: U04
    title: "Retention, Durability, and Satisfaction"
    body: |
      Figma's retention metrics are among the strongest in public SaaS. Net Dollar Retention of 139% (Q1 2026) is materially above the SaaS median (~115%) and peers such as Snowflake (127%) and HubSpot (~100% as of 2025). While Figma does not separately disclose Gross Dollar Retention (GDR), the combination of 139% NDR and positive ARR growth implies a GDR well above 90%, consistent with low logo churn.

      Third-party review platforms corroborate customer satisfaction: G2 rates Figma 4.7 out of 5.0 across more than 23,000 reviews as of Q1 2026, placing it in the 95th percentile for the design tools category. TrustRadius similarly gives Figma an 8.7 / 10 with strong marks for collaboration features and cross-team accessibility. Common complaints in reviews center on performance for very large files (>1,000 frames) and the lack of offline mode—neither has driven material documented churn among enterprise accounts.

      Management notes that enterprise contract lengths are "multi-year in the majority of strategic accounts" (paraphrased from earnings call commentary), which creates forward revenue visibility and raises switching costs relative to month-to-month arrangements. An estimated cohort-level analysis—based on reported NDR trajectory and ARR growth—implies enterprise customer logo retention in the 90–95% range, though Figma does not publish explicit GDR or cohort retention tables.
    claimRefs: [CU023, CU024, CU025, CU026, CU027, CU028]
    tableRefs: [TU004]
    figureRefs: [FU004]

  - id: U05
    title: "Expansion Dynamics and Concentration Risk"
    body: |
      Figma's land-and-expand model is structurally powerful: teams initially deploy Figma for one use case (often prototyping or wireframing), then expand to additional teams, add FigJam for facilitation and ideation, enable Dev Mode for developer handoff, and eventually upgrade to Org or Enterprise tier for admin controls. The 76% multi-product adoption rate among enterprise accounts confirms this expansion pattern is in effect at scale, and the 139% NDR is its financial expression.

      Concentration risk appears low. With 690,000 paid organizations and an estimated 1,525 enterprise accounts, no single customer is publicly known to account for more than 5% of revenue—though Figma does not disclose customer-level revenue concentration in its public filings. The closest proxy is the >$100K ARR cohort contributing an estimated 55–65% of total ARR: if that cohort has 1,525 members, the implied average contract per enterprise account is approximately $440K–$500K, consistent with significant breadth.

      Key risks to expansion include: (1) the rise of AI-native design tools (Google Stitch, v0, Lovable) that may intercept new design workflows before they enter Figma's PLG funnel; (2) pricing sensitivity as seats expand to non-designer users who generate lower per-seat revenue than full editors; and (3) procurement friction in highly regulated industries (financial services, government) where FedRAMP-level certification remains absent. Critical adverse analysis from analysts notes that if AI automation reduces the designer headcount at large enterprises, the total addressable seat base for Figma could compress rather than expand—a risk not yet reflected in the 139% NDR but worth monitoring through Q3 2026.
    claimRefs: [CU029, CU030, CU031, CU032, CU033, CU034, CU035]
    tableRefs: [TU005]
    figureRefs: []

