    approximationNotes: "MAU of 13M is an estimate from analyst commentary; Figma does not formally disclose MAU. Paid org, >$10K, and >$100K ARR counts are from Q1 2026 investor materials. Funnel values represent organizations, not individual users, except MAU (individuals)."
    claimRefs: [CU001, CU008, CU009]

