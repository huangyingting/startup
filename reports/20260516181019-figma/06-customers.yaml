          values: ["Yes — org-wide", "Implied", "Yes — core use case", "Unknown", "Yes (2+)"]
        - label: "Netflix"
          values: ["Yes — 150+ designers", "Yes", "Implied", "Unknown", "Yes (2+)"]
        - label: "GitHub"
          values: ["Yes — design system", "Unknown", "Yes", "Unknown", "Yes (2+)"]
        - label: "Airbnb"
          values: ["Yes — DLS", "Unknown", "Yes — tokens", "Unknown", "Yes (2+)"]
        - label: "Dropbox"
          values: ["Yes — brand system", "Unknown", "Unknown", "Unknown", "Unconfirmed"]
        - label: "Spotify"
          values: ["Yes — 1,500+ designers", "Yes", "Unknown", "Unknown", "Yes (2+)"]
    approximationNotes: "Product adoption per customer is based on published case studies and engineering/design blog posts. 'Unknown' denotes absence of public confirmation, not absence of usage. 'Implied' denotes strong inference from use-case description."
    claimRefs: [CU021, CU010, CU004, CU022]

