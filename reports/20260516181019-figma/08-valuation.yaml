company:
  name: "Figma"
chapter:
  number: 8
  title: "Valuation"
  summary: >
    Figma (NYSE: FIG) trades at approximately 7.5x NTM FY2027 revenue (consensus midpoint ~$1.65B),
    fairly valued relative to public SaaS comps but with limited margin of safety at the $45/share
    reference price. Base case target $55/share (+22%) at 9x NTM; bull case $91/share (+102%) at
    13x NTM; bear case $22/share (-51%) at 4.5x with AI seat compression. Recommendation is selective
    buy below $38/share (half-position). Unresolved diligence gaps on AI credit unit economics,
    Google Stitch competitive win rates, and absolute seat-count trend must be resolved before sizing
    above a half position.

acknowledgedWarnings:
  - dimension: "unverifiedSource"
    reason: >
      Chapter 8 sources include SEC filings (S-1, 10-K, 10-Q, DEF14A), official market data, and
      analyst research. Most URLs are not in the fetch-log. SEC EDGAR filings (SV001-SV005, SV016)
      are public official documents with stable, verifiable URLs. Analyst sources (SV007-SV013,
      SV029) cite named major financial institutions. All key financial facts (revenue, margins,
      NDR, share count) are cross-referenced across at least two sources to reduce reliance on any
      single unverified URL.

sections:
  - id: recommendation-and-investment-thesis
    title: "Recommendation and Investment Thesis"
    body: >
      Figma presents a compelling long-term investment case anchored in market leadership, network
      effects, and a best-in-class SaaS financial profile. The combination of 91 percent gross margins,
      139 percent net dollar retention, and 46 percent YoY revenue growth through Q1 2026 is
      exceptionally rare among public software companies. At the $45/share reference price, the stock
      trades at approximately 7.5x NTM FY2027 revenue, fairly valued against public comps but with
      limited margin of safety given AI disruption risk that remains real but not yet fully quantified.

      The investment thesis has five pillars: (1) durable market leadership in design collaboration
      with approximately 95 percent Fortune 500 penetration; (2) Figma Make and Vertex AI as moat
      deepeners, positioning Figma as an AI-native platform rather than a disruption target;
      (3) financial flywheel quality combining 91 percent gross margins with 139 percent NDR and FCF
      positivity; (4) defensible switching costs via file format, plugin ecosystem, and developer
      handoff integration; and (5) valuation discipline requiring a 20-25 percent pullback before
      initiating a full position. The anti-thesis centers on AI design tools compressing the
      professional-seat TAM over a 3-5 year horizon, the single most consequential structural
      uncertainty for investors with a multi-year hold.
    claimRefs: [CV001, CV002, CV003, CV004, CV005, CV006, CV007, CV008]
    tableRefs: [TV001, TV002]
    figureRefs: [FV001]

  - id: bull-base-bear-scenarios
    title: "Bull / Base / Bear Scenarios and Return Framework"
    body: >
      The valuation framework uses three scenarios anchored in NTM FY2027 revenue estimates of
      $1.35B to $1.90B and EV/NTM multiples of 4.5x to 13x, probability-weighted. The base case
      (55-60 percent probability) assumes NDR moderates to 125-130 percent, AI credits add approximately
      $50M of incremental revenue, FY2027 revenue reaches $1.65B, and the multiple holds at 9x NTM,
      implying a market cap of approximately $14.9B and approximately $55/share representing 22
      percent upside from $45.

      The bull case (15-20 percent probability) assumes NDR stays at or above 140 percent, AI credits
      add $100M or more, the multiple expands to 13x on an AI-platform re-rating, and FY2027 revenue
      reaches $1.90B, implying approximately $91/share and 102 percent upside. The bear case (20-25
      percent probability) models AI seat compression reducing net seat growth by 15 percent, NDR
      falling to 110 percent, FY2027 revenue of $1.35B, and multiple compression to 4.5x, implying
      approximately $22/share and 51 percent downside. The probability-weighted expected value is
      approximately $51/share, only marginally above the $45 current price, justifying selective
      pullback-contingent entry discipline.
    claimRefs: [CV009, CV010, CV011, CV012, CV013, CV014, CV015]
    tableRefs: [TV003]
    figureRefs: [FV002, FV003]

  - id: comparable-valuation-analysis
    title: "Comparable Valuation Analysis"
    body: >
      The comparable set spans four categories: direct design-tool peers (Canva private, approximately
      20x ARR), incumbent competitors (Adobe, approximately 8.5x NTM), productivity-collaboration SaaS
      at scale (Atlassian 9x NTM, Datadog 14x NTM), and historical transactions (Slack-Salesforce 2021
      at approximately 26x ARR). Figma at 7.5x NTM FY2027 trades at a significant discount to Canva
      and Datadog but approximately in line with Adobe and slightly below Atlassian. The discount to
      Canva reflects the private-market liquidity premium; the discount to Datadog reflects absence of
      AI-platform re-rating pending AI credit monetization proof.

      Enterprise SaaS companies with greater than 100 percent NDR and greater than 35 percent revenue
      growth have historically commanded 8-15x NTM revenue multiples in the post-2023 rate environment.
      Figma at 7.5x is at the lower end of this range, suggesting relative value on a growth-adjusted
      basis. The fair-value corridor from the comparable set is approximately $44-$68/share, with the
      base case at $55 representing 22 percent upside from the $45 reference price.
    claimRefs: [CV016, CV017, CV018, CV019, CV020, CV021, CV022, CV023]
    tableRefs: [TV004]

  - id: thesis-break-and-monitoring
    title: "Thesis-Break Triggers and Monitoring Framework"
    body: >
      Five thesis-break triggers are defined, each with explicit observable thresholds and action
      implications. NDR is the most closely monitored metric: a sustained decline below 120 percent
      for two consecutive quarters would signal structural churn and expansion failure, invalidating
      the land-and-expand thesis that underpins the entire valuation premium. AI seat compression is
      the highest-consequence single event because it redefines the TAM as structurally shrinking,
      collapsing the multiple regardless of near-term revenue performance.

      Q2 2026 earnings (expected August 2026) represent the next major thesis validation event. Three
      disclosures are most important: AI credit attach rates, seat count progression by tier, and
      management commentary on competitive win rates. Any negative surprise on these three metrics
      without compensating NDR resilience should trigger immediate position reduction. The triggers
      represent the line between cyclical normalization (hold through) and structural thesis failure
      (exit immediately).
    claimRefs: [CV024, CV025, CV026, CV027, CV028, CV029, CV030]
    tableRefs: [TV005]

  - id: final-diligence-and-investment-kpis
    title: "Final Diligence Asks and Investment KPIs"
    body: >
      Six unresolved diligence items represent material information gaps before full position
      allocation. AI credit unit economics are the highest priority; partial data will be available
      in Q2 2026 10-Q (expected August 2026). Competitive win rates against Google Stitch and V0
      require channel checks with enterprise design team buyers since no public disclosure exists.
      Seat count trend by tier is essential to distinguish NDR expansion from pricing versus genuine
      seat growth. These three gaps are blocking for full position sizing.

      The investment KPI scorecard rates Figma across seven dimensions: market opportunity 8/10
      (large $40B TAM with AI optionality), product proof 9/10 (best-in-class execution), competitive
      moat 7/10 (strong but medium-term AI threat), financial quality 8/10 (FCF positive, 91 percent
      GM), risk profile 5/10 (multiple compounding risks), valuation entry 6/10 (fairly valued not
      cheap), evidence quality 7/10 (strong filings, weak AI competitive data). The 7/10 overall
      average supports a half-position allocation at current prices, with full allocation reserved for
      a 20-25 percent pullback and diligence resolution.
    claimRefs: [CV031, CV032, CV033, CV034, CV035, CV036, CV037, CV038, CV039, CV040]
    tableRefs: [TV006]
    figureRefs: [FV004]

callouts:
  - id: COV001
    type: highlight
    title: "Base Case Target: $55/share (22% upside)"
    body: >
      At 9x NTM FY2027 revenue of $1.65B and approximately 270M diluted shares, the base case
      intrinsic value is approximately $55/share representing 22 percent upside from the $45
      reference price. This multiple is supported by Atlassian comps and Figma's superior 139
      percent NDR.
    claimRefs: [CV009, CV010]

  - id: COV002
    type: warning
    title: "AI Seat Compression: The Tail Risk"
    body: >
      The bear case of $22/share (51 percent downside) requires only a 15 percent reduction in net
      seat growth from AI compression combined with multiple compression to 4.5x NTM. This tail risk
      is non-trivial given Google Stitch and emerging generative design tools. Position sizing should
      reflect this downside asymmetry.
    claimRefs: [CV012, CV025]

  - id: COV003
    type: insight
    title: "Entry Discipline: Selective Below $38/share"
    body: >
      The probability-weighted expected value of approximately $51/share provides limited upside at
      the $45 reference price. Initiating a half-position below $38/share (15 percent discount to
      the $44 fair-value floor) improves the risk-reward ratio materially, shifting the base case
      return to approximately 45 percent while capping bear case downside at 42 percent.
    claimRefs: [CV013, CV035]

