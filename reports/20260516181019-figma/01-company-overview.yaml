company:
  name: "Figma"
chapter:
  number: 1
  title: "Company Overview"
  summary: "Figma, Inc. (NYSE: FIG) is the dominant browser-native collaborative design platform, founded in 2012 by Dylan Field and Evan Wallace. After a failed $20B Adobe acquisition in 2023, Figma went public on July 31, 2025 at a $19.3B valuation and reported Q1 2026 revenue of $333.4M (up 46% YoY), with 690,000 paid customers and 139% net dollar retention."

sections:
  - id: identity-and-market-position
    title: "Company Identity and Market Position"
    body: "Figma, Inc. is a San Francisco-headquartered cloud-native software company offering the leading browser-based collaborative interface design platform. Founded in 2012 by Dylan Field and Evan Wallace at Brown University, Figma launched its first product preview in 2015 and opened to the public in 2016, quickly becoming the de facto standard for product design workflows at technology companies worldwide. The company traded on the New York Stock Exchange under the ticker FIG as of July 31, 2025, following a landmark IPO that valued Figma at $19.3 billion. Figma operates as a SaaS business with a per-editor seat subscription model supplemented by enterprise contracts. Its platform encompasses Figma Design (core collaborative vector design), FigJam (digital whiteboard), Figma Slides (presentation tool), Dev Mode (developer handoff), and AI-powered features including Figma Make, MCP integration, and Figma Weave. As of May 2026, Figma's NYSE-listed shares implied a market capitalization of approximately $12 billion following post-IPO correction, even as revenue growth continued to accelerate. Figma's competitive positioning rests on deep real-time collaboration, browser-first architecture, and multiplayer-first design that enables simultaneous editing by thousands of contributors—capabilities that Adobe's desktop-native Creative Cloud cannot replicate natively."
    claimRefs: [CO001, CO002, CO003, CO004, CO005, CO006, CO007, CO027, CO028, CO030]
    tableRefs: [TO001]
    figureRefs: [FO002]

  - id: founders-leadership-governance
    title: "Founders, Leadership, and Governance"
    body: "Figma was co-founded by Dylan Field and Evan Wallace, both Brown University computer science students who met on campus and shared a vision for collaborative, web-native creative tooling. Dylan Field received a Thiel Fellowship—a $100,000 grant for students under 23 to leave school and pursue entrepreneurial ideas—and departed Brown to found Figma in San Francisco in 2012. Field has served as CEO since founding and retains 73.6% of shareholder voting power through Figma's dual-class share structure, a governance provision that ensures his ability to direct long-term strategy independent of public market pressure. Evan Wallace co-developed Figma's early WebGL-based rendering engine before departing his day-to-day role in 2022; he remains a shareholder. Figma's executive team as of 2026 includes Praveer Melwani (CFO), Yuhki Yamashita (CPO), Kris Rasmussen (CTO), Nadia Singer (Chief People Officer), Shaunt Voskanian (CRO), Sheila Vashee (CMO), Nairi Hourdajian (CCO), and Brendan Mulligan (General Counsel). The board of directors is chaired by Dylan Field and includes John Lilly (Greylock, Lead Independent Director), Kelly Kramer, Lynn Vojvodich Radakovich, Daniel Rimer (Index Ventures), Mamoon Hamid (Kleiner Perkins), Bill McDermott, Luis von Ahn, Mike Krieger, and Andrew Reed. Key-person risk centers on Dylan Field; his dual-class share position and founder-CEO status create strategic continuity but also concentration risk."
    claimRefs: [CO008, CO009, CO010, CO011, CO029, CO034, CO036, CO037]
    tableRefs: [TO002]

  - id: funding-history-capital-structure
    title: "Funding History and Capital Structure"
    body: "Figma raised approximately $529 million in private venture capital across six rounds between 2015 and 2022, from top-tier investors including Greylock Partners, Kleiner Perkins, Sequoia Capital, Andreessen Horowitz, Index Ventures, and Durable Capital Partners. A critical non-dilutive cash infusion came in December 2023 when Adobe paid a $1 billion contractual termination fee following the regulatory collapse of its proposed $20 billion acquisition of Figma; UK Competition and Markets Authority and EU regulators found the deal would harm competition in digital design software. A 2024 private tender offer set Figma's valuation at $12.5 billion, enabling employee and early investor liquidity ahead of the IPO. On July 31, 2025, Figma debuted on the NYSE at $33 per share, raising approximately $1.2 billion and implying a $19.3 billion valuation—one of the largest technology IPOs of 2025. First-day trading saw the stock surge to $115.50 (from a $85 open), temporarily pushing Figma's market capitalization to approximately $68 billion before a subsequent correction. By May 15, 2026, shares traded near $22.92, with a market cap of approximately $12 billion. As of March 31, 2026, Figma held $1.6 billion in cash, cash equivalents, and marketable securities."
    claimRefs: [CO012, CO013, CO023, CO024, CO025, CO026, CO038, CO006, CO022]
    tableRefs: [TO003, TO004]
    figureRefs: [FO001]

  - id: financial-scale-customer-traction
    title: "Financial Scale and Customer Traction"
    body: "Figma has demonstrated consistent revenue acceleration: FY2024 revenue was $749 million (up 48% year-over-year), FY2025 revenue exceeded $1 billion for the first time, and Q1 2026 revenue reached $333.4 million (up 46% year-over-year), accelerating from 40% growth in Q4 2025. Figma raised its full-year 2026 revenue guidance to $1.422–$1.428 billion following the Q1 beat. As of March 31, 2026, Figma's net dollar retention rate was 139%—the highest in over two years—reflecting strong seat expansion within existing accounts. The paid customer base grew 54% year-over-year to approximately 690,000 customers. Within that base, 15,218 customers generate over $10,000 in annual recurring revenue (up 37% YoY) and 1,525 customers generate over $100,000 (up 48% YoY), evidence of strong enterprise penetration. Free cash flow was $88.6 million in Q1 2026 (27% margin), and operating cash flow was $97.3 million. GAAP operating loss was $137.4 million in Q1 2026 due to stock-based compensation; non-GAAP operating income was $52.1 million. AI products including Figma Make and MCP drove accelerated seat expansion, with over 60% usage of AI features among $100K+ ARR customers."
    claimRefs: [CO014, CO015, CO016, CO017, CO018, CO019, CO020, CO031, CO032, CO033, CO040]
    figureRefs: [FO003]

  - id: risks-and-adverse-considerations
    title: "Risks and Adverse Considerations"
    body: "Despite strong growth metrics, Figma faces several material risks. The failed Adobe acquisition removed the largest near-term liquidity event and forced Figma to pursue an independent IPO path, exposing it to public market volatility—its market cap declined from a first-day high of ~$68 billion to ~$12 billion within ten months of its IPO, a 82% correction. Figma's redesigned user interface ('UI3'), launched in 2024, drew significant backlash from its core professional user base, with critics citing workflow disruption and increased complexity, accelerating adoption of open-source alternatives such as Penpot. Analysts have questioned Figma's competitive moat, particularly as AI-native design tools (v0 by Vercel, Lovable, Canva AI) gain traction with non-designer audiences. Revenue concentration among enterprise accounts creates dependency on continued expansion of a relatively small number of high-value relationships. Key-person risk from CEO Dylan Field is heightened by his dual-class voting structure, which means board oversight of his decisions is limited. Figma's GAAP operating losses remain substantial due to stock-based compensation, creating potential investor concern about the path to sustainable GAAP profitability."
    claimRefs: [CO007, CO027, CO034, CO035]

callouts:
  - calloutType: strength
    title: "Accelerating Revenue Growth Post-IPO"
    body: "Figma's Q1 2026 revenue growth rate accelerated to 46% YoY from 40% in Q4 2025, driven by AI seat expansion. A full-year 2026 guidance of $1.42-$1.43B implies sustained ~35% growth for the full year."
    claimRefs: [CO014, CO016, CO033]

  - calloutType: risk
    title: "Post-IPO Market Cap Correction of 82%"
    body: "Figma's market cap fell from approximately $68B on IPO day (July 31, 2025) to ~$12B by May 2026—an 82% correction—reflecting investor concern about profitability timelines and competition from AI-native tools."
    claimRefs: [CO007, CO027]

  - calloutType: insight
    title: "Adobe Breakup Fee as Strategic Catalyst"
    body: "The $1 billion termination fee from Adobe in December 2023 provided Figma with meaningful balance-sheet strength independent of new equity dilution, and the regulatory outcome validated Figma's market dominance in the eyes of antitrust regulators."
    claimRefs: [CO012, CO013]

  - calloutType: risk
    title: "Dual-Class Governance Concentrates Power in CEO"
    body: "Dylan Field holds 73.6% of voting power through Class B shares, limiting public shareholders' ability to influence board composition or major strategic decisions."
    claimRefs: [CO008, CO034]

