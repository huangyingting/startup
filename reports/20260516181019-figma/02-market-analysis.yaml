localEvidence:
  evidenceGaps:
    - id: EGM001
      title: "Free-to-paid conversion rate post-2024 pricing restructure not publicly disclosed"
      description: "Figma has not disclosed the conversion rate from free to paid tiers following its late-2024 seat-based pricing restructure. The 690K paid customer to 13M+ MAU ratio implies ~5% conversion but the exact rate and trend are not confirmed."
      relatedQuestionRefs: [QM021]

    - id: EGM002
      title: "Compliance certifications complete list not confirmed"
      description: "Figma's full list of compliance certifications (SOC 2 Type II, HIPAA, FedRAMP, ISO 27001, GDPR) has not been fully enumerated from an official source in this research cycle. Public documentation confirms SOC 2 but other certifications are not independently verified."
      relatedQuestionRefs: [QM022]

    - id: EGM003
      title: "Official geographic revenue breakdown not disclosed"
      description: "Figma does not publicly report geographic revenue by region in its quarterly financial results or S-1. The 38% North America user concentration from 6sense is a proxy, not revenue-based."
      relatedQuestionRefs: [QM023]

    - id: EGM004
      title: "Measurable AI-tool enterprise churn evidence unavailable"
      description: "No publicly available data documents measurable Figma customer churn to AI-native design tools (Vercel v0, Galileo, Penpot) in 2026. Customer-level churn by competitive reason is not disclosed."
      relatedQuestionRefs: [QM024]

    - id: EGM005
      title: "Multi-product attach rate at $100K+ tier not disclosed"
      description: "Figma does not disclose multi-product attach rates or correlate product count to NDR in public filings or earnings commentary. The 139% NDR figure is stated in aggregate across all tiers."
      relatedQuestionRefs: [QM025]

