artifact: "risks"
slug: "figma"
runDate: "2026-05-16"
company:
  name: "Figma"
chapter:
  number: 7
  title: "Risks"
  summary: "Figma's dominant risk is AI-native design tool disintermediation — Google Stitch, v0 (Vercel), Lovable, and similar products could intercept new design workflows before they enter Figma's PLG funnel, potentially compressing the addressable designer TAM over 2026–2028. Secondary risks include AWS infrastructure concentration, EU AI Act applicability to Figma Make, post-IPO talent retention, and sustained GAAP losses driven by stock-based compensation. Regulatory/legal risk is manageable: GDPR/CCPA compliant, no material litigation, but FedRAMP absence blocks the US federal government vertical. Key-man risk around CEO Dylan Field is real but partially mitigated by a strong leadership bench. The primary thesis-break trigger is NDR declining below 115% with concurrent AI-native customer defections — which has not yet materialized as of Q1 2026."

sections:
  - id: R01
    title: "Regulatory and Legal Risk"
    body: |
      Figma operates in a complex multi-jurisdictional regulatory environment but has no material disclosed litigation as of the Q1 2026 10-Q period. GDPR compliance is established: Figma publishes a Data Processing Agreement (DPA) and Privacy Shield/SCCs for EU data transfers, holds data in AWS eu-west-1 (Ireland) for EU customers, and offers GDPR-specific contract terms in its Enterprise plan. CCPA compliance is similarly managed through a privacy notice and opt-out mechanisms.

      The EU AI Act (enacted June 2024, enforcement from August 2026 onward) poses a medium-severity regulatory risk for Figma Make, the AI-powered design generation feature. If Figma Make is classified as a "high-risk" AI system under Annex III or a general-purpose AI system requiring transparency obligations, Figma would face conformity assessment requirements, registration in the EU AI Act database, and post-market monitoring obligations — all representing meaningful compliance investment. Figma has not publicly commented on its EU AI Act readiness.

      The failed Adobe acquisition (terminated January 2024 after EU regulatory opposition) left a significant antitrust record: regulators found that Adobe+Figma would have had excessive market power in professional design software. This ruling paradoxically strengthens Figma as a standalone company (confirms market leadership) but may create a template for future scrutiny if Figma itself pursues large acquisitions. No active litigation related to the termination is publicly disclosed. FedRAMP absence is a de facto regulatory barrier: without FedRAMP Moderate or High authorization, Figma cannot be approved for US federal government procurement, limiting the addressable market in the public sector.
    claimRefs: [CR001, CR002, CR003, CR004, CR005, CR006, CR007]
    tableRefs: [TR001]
    figureRefs: []

  - id: R02
    title: "Operational, Security, and Technical Risk"
    body: |
      Figma's browser-native architecture provides significant distribution advantages but creates concentrated technical dependencies. The platform runs on AWS for compute, PostgreSQL for database persistence, Redis for caching, and S3 for file storage — all on a single cloud provider. A prolonged AWS outage (particularly in us-east-1 or eu-west-1) would cause service disruption for all Figma users simultaneously; Figma has no publicly documented multi-cloud failover architecture. Historical outages documented on Figma's public status page include incidents in 2023 and 2024 that caused multi-hour degraded performance for significant user cohorts, though none resulted in disclosed data loss or material customer churn.

      Security risk is meaningfully elevated because Figma stores all customer design IP — including unreleased product roadmaps, brand assets, and proprietary design files — in its cloud infrastructure. A material security breach could expose highly sensitive pre-product-launch intellectual property for 690K+ paid organizations, creating significant legal, reputational, and churn risk. Figma holds SOC 2 Type II certification and conducts annual penetration testing but has not achieved ISO 27001 certification or FedRAMP authorization, limiting its defensibility with highly security-conscious enterprise customers.

      The platform's reliance on WebAssembly (for the C++/Rust canvas engine) introduces dependency on browser vendors. If Chrome, Safari, or Firefox materially changed their WebAssembly implementations or blocked certain APIs, Figma's rendering engine could require significant re-engineering. This risk is assessed as low-probability given WebAssembly's W3C standardization, but the mitigation path is multi-year engineering work. Performance at scale remains a documented limitation: files with more than ~1,000 frames experience material performance degradation (slow load times, laggy real-time sync), which is the most common complaint in G2 and TrustRadius reviews and a legitimate churn risk for agencies handling high-volume campaigns.
    claimRefs: [CR008, CR009, CR010, CR011, CR012, CR013, CR014]
    tableRefs: [TR002]
    figureRefs: [FR001]

  - id: R03
    title: "Partner and Dependency Risk"
    body: |
      Figma's technology stack relies on a small number of critical infrastructure and integration partners. AWS is the single most critical dependency: all compute, storage, database, and CDN infrastructure runs on AWS. While AWS has industry-leading uptime SLAs, any regional outage or account-level incident (e.g., billing dispute, regulatory action against AWS in a given jurisdiction) would immediately affect all Figma customers in that region. Figma does not appear to have a published multi-cloud disaster recovery plan.

      Google Cloud is an emerging secondary dependency: Figma's AI features (Make, Weave, AI autocomplete) are powered by Google Cloud's Vertex AI and Gemini models pursuant to a partnership announced at Config 2025. If this partnership is terminated or the models are deprecated, Figma's AI product roadmap would require significant re-architecture. The partnership terms are not publicly disclosed.

      Browser vendors (Google/Chrome, Apple/Safari, Mozilla/Firefox) represent a platform dependency for Figma's WebAssembly-based rendering engine. Third-party integration partners — Atlassian (Jira/Confluence embedding), Microsoft (Teams/Office integration), GitHub (Dev Mode), Okta and Microsoft Entra (SCIM/SSO for enterprise) — could restrict or degrade their integration APIs, though the switching cost for these integrations is symmetric and none represents a single point of failure.
    claimRefs: [CR015, CR016, CR017, CR018, CR019, CR020, CR021]
    tableRefs: [TR003]
    figureRefs: [FR002, FR003]

  - id: R04
    title: "People and Execution Risk"
    body: |
      CEO Dylan Field, a co-founder who has led Figma since inception in 2012, represents the primary key-man concentration risk. Field has been the public face of Figma's product vision, the driving force behind the PLG model, and the primary architect of the platform strategy. His departure — voluntary or involuntary — would create significant strategic uncertainty and likely trigger executive team disruption. No formal CEO succession plan has been publicly disclosed. CTO Kris Rasmussen and CPO Yuhki Yamashita provide some bench depth, but neither has yet demonstrated ability to anchor investor confidence in the absence of Field.

      Post-IPO talent retention poses increasing challenges. Figma's equity compensation pool is now subject to public-market price transparency, and early employees whose options are fully vested face diminished retention incentive. Stock-based compensation of approximately $170M in FY2025 represents a meaningful dilution overhang. Simultaneously, Figma competes for engineering talent with AI-native startups (which offer potentially higher upside), Google DeepMind, and OpenAI — all of which are hiring aggressively for the same design/AI intersection skill sets that Figma's own roadmap depends on.

      Execution risk is also elevated around the company's transition from a founder-led private company to a public company with quarterly earnings obligations. The discipline required for consistent guidance and public financial reporting is distinct from the speed-optimized culture of Figma's early years. Early public-company stumbles (guidance misses, accounting issues, investor communication failures) could disproportionately damage investor confidence given the premium valuation multiple.
    claimRefs: [CR022, CR023, CR024, CR025, CR026]
    tableRefs: [TR004]
    figureRefs: []

  - id: R05
    title: "AI Disruption, Financial, and Thesis-Break Risks"
    body: |
      The AI disruption risk to Figma is the single most significant thesis-break scenario. Four categories of AI-native tools threaten different parts of Figma's value chain: (1) design-to-code tools (v0 by Vercel, Lovable, Bolt) that bypass the design step entirely by generating production code from natural language — eliminating the need for a Figma prototype; (2) AI design generation tools (Google Stitch) that can generate design artifacts from prompts, potentially compressing the professional designer headcount at enterprises; (3) AI-native agents that can read and modify Figma files directly via API (emerging capability); and (4) AI-powered prototyping tools embedded in competing products (Canva AI, Microsoft Designer, Adobe Firefly).

      Figma's response — Make (AI generation within Figma), Weave (developer AI), and Sites (no-code publishing) — is a credible defense, but the response is reactive rather than native-AI-first. The risk is not that existing customers leave today (NDR 139% in Q1 2026 confirms retention), but that the new-cohort intake rate slows as AI-native tools capture new project categories before they enter Figma's PLG funnel.

      Financial risk includes: (1) sustained GAAP operating losses (-41% margin in Q1 2026, primarily from stock compensation); (2) uncertain AI credit monetization ramp (Figma charges AI credit usage fees for Make, but the revenue contribution is not separately disclosed); (3) multiple compression risk at the current EV/Revenue of ~7.9x if growth decelerates; and (4) risk that GAAP profitability never materializes if AI investment spending accelerates.

      The kill criteria for this investment thesis are: NDR declining below 115% for two consecutive quarters, absolute >$100K ARR customer count growth decelerating below 20% YoY, Figma losing significant named enterprise accounts to AI-native alternatives, or a Google Stitch/v0 integration reaching >10% of the design tool workflow market.
    claimRefs: [CR027, CR028, CR029, CR030, CR031, CR032, CR033, CR034, CR035]
    tableRefs: [TR005]
    figureRefs: []

