          detail: "Highest in over two years; reflects strong seat expansion within existing accounts. Competitor NDR not publicly disclosed."
        - label: "Professional UI/UX Market Share"
          value: "40–65%"
          detail: "Range reflects different methodologies: 6sense reports ~40.65% by active installations; UX Tools 2024 survey suggests higher concentration among professional designers."
        - label: "Paid Customer Base (Q1 2026)"
          value: "690,000"
          detail: "Up 54% YoY. Miro: 250,000 organizations (free plus paid); Canva: 220M total users (predominantly free). Not directly comparable."
        - label: "Enterprise Penetration (>$100K ARR)"
          value: "1,525 (+48% YoY)"
          detail: "Strong enterprise expansion indicating design-system lock-in is converting to multi-seat enterprise deals rather than churn."
        - label: "Penpot GitHub Stars (open-source traction proxy)"
          value: "35,000+"
          detail: "Among most-starred open-source design tools; growth accelerated after Figma UI3 redesign controversy in 2024."
        - label: "Sketch Market Share Trend"
          value: "Declining"
          detail: "Per UX Tools annual surveys, Sketch market share has declined consistently since 2017. Sketch built a .fig importer in 2024 as a defensive competitive move."
        - label: "InVision Market Exit"
          value: "Dec 2024"
          detail: "InVision shut down its product on December 31, 2024, ceding residual handoff users primarily to Figma and Zeplin."

localEvidence:
  evidenceGaps:
    - id: EGP001
      title: "Canva Enterprise ARR and Design-Segment Revenue"
      description: "Canva does not disclose revenue by segment. It is unclear what proportion of Canva's ARR comes from enterprise accounts specifically targeting design workflows versus broader marketing content creation. This limits precise quantification of head-to-head revenue overlap with Figma."
      relatedQuestionRefs: [QP003]

    - id: EGP002
      title: "Sketch Current Active User Count and Market Share"
      description: "Sketch does not disclose active user or customer counts. Its competitive position versus Figma cannot be precisely quantified from public data; estimates rely on third-party surveys (UX Tools) and market-share proxies. QP007 is marked partial as a result."
      relatedQuestionRefs: [QP007]

    - id: EGP003
      title: "Framer Funding and Ownership Details"
      description: "Framer's funding history and current ownership are not fully disclosed. The claim that Framer was acquired by Miro's parent company cannot be confirmed from available sources and is marked unresolved. QP012 remains unresolved."
      relatedQuestionRefs: [QP012]

    - id: EGP004
      title: "Miro Current ARR and Growth Rate"
      description: "Miro's last disclosed valuation was $17.5B in January 2022 from a $400M Series E. Current ARR, growth rate, and recent competitive moves in design-adjacent markets are not publicly disclosed. QP013 remains unresolved."
      relatedQuestionRefs: [QP013]

    - id: EGP005
      title: "UX Tools 2024 Survey Granular Design Tool Market Share Data"
      description: "While the UX Tools 2024 survey introduction confirms 'unprecedented industry consolidation' around Figma, granular percentage breakdowns for individual tools were not accessible from the fetched page. Precise market share percentages from this survey remain unavailable, limiting confidence on QP015."
