callouts:
  - calloutType: strength
    title: "WebAssembly Architecture Is a Durable Technical Moat"
    body: >
      Figma's decision to compile its vector graphics engine to WebAssembly in 2012–2013 was a
      pioneering technical bet that competitors have not replicated at scale. The result is a
      browser-based tool that performs at near-native speed, eliminates install friction, and enables
      seamless real-time multiplayer—a combination no desktop-native competitor (Sketch, Adobe XD)
      has matched. This architectural moat is not just a performance advantage but a collaboration
      moat: it allows any stakeholder with a browser to participate in design workflows without
      software installation, which is why two-thirds of Figma's MAUs are non-designers.
    claimRefs: [CE007, CE008, CE009]

  - calloutType: risk
    title: "AI-Native Design Bypass Is an Existential Product Risk"
    body: >
      Google Stitch, v0 by Vercel, Lovable, and Bolt represent a new category of AI tools that
      generate functional UI/front-end code directly from text prompts—bypassing the design canvas
      entirely. If this paradigm gains enterprise adoption, Figma's seat-based model (which charges
      for design editing) faces structural demand destruction. Figma Make is the company's defensive
      response, but it enters a market where Google (with zero marginal cost of deployment via Stitch)
      can subsidize the product to drive enterprise cloud adoption. 63% of design workflows reportedly
      automatable by AI by 2026.
    claimRefs: [CE026, CE027, CE028]

  - calloutType: insight
    title: "Design System Lock-In Is More Valuable Than the Editor Lock-In"
    body: >
      The highest-value switching cost in Figma's product is not the editor (which could theoretically
      be replicated) but the enterprise design system: months of accumulated component libraries, design
      tokens, brand guidelines, and cross-team consumption patterns. Once a Fortune 500 company's design
      system is embedded in Figma, migrating requires rebuilding the system, retraining all consuming
      teams, and negotiating a parallel workflow transition. This lock-in is structurally similar to
      Salesforce's CRM lock-in—the data and process depth is what prevents churn, not the UI.
    claimRefs: [CE020, CE021, CE024]

