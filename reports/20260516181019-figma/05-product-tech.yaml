company:
  name: "Figma"
chapter:
  number: 5
  title: "Product & Technology"
  summary: >
    Figma has built an exceptionally durable product moat through its browser-native architecture
    (WebAssembly for near-native graphics performance), a multi-product platform (Design, FigJam,
    Dev Mode, Slides, Make, Sites, Weave), and a deeply embedded enterprise workflow that integrates
    design, development, and product management. The core technology is technically superior to
    alternatives and protected by significant switching costs embedded in design systems, component
    libraries, and developer handoff workflows. The primary product risk is AI-native competitors
    that bypass the traditional design canvas entirely; Figma's response (Figma Make, Weave) is
    credible but unproven at scale.

sections:
  - id: product-overview
    title: "Product Portfolio and Multi-Product Architecture"
    body: >
      Figma's product portfolio has evolved from a single collaborative design tool into a multi-product
      platform spanning the full product development lifecycle. The core product, Figma Design, is a
      browser-native vector design tool that enables real-time collaboration among designers, developers,
      and product managers. It supports high-fidelity UI/UX mockups, interactive prototyping, and design
      system management, and has become the de facto industry standard for digital product teams.

      FigJam is Figma's online collaborative whiteboard, launched in 2021. It targets brainstorming,
      planning workshops, and cross-functional meetings. FigJam AI adds automated summarization, idea
      clustering, and workshop facilitation. Dev Mode (launched 2023) provides developers with an
      inspection-focused view of designs, generating code snippets in CSS, iOS (Swift), Android, and
      React—directly competing with legacy handoff tools like Zeplin and Avocode, which it has largely
      displaced. Figma Slides (2024) is a presentation builder that allows embedding live design
      prototypes and FigJam boards into decks.

      Figma Make (2025), the company's most strategically significant AI product, enables users to
      generate UI components, entire screens, and interactive prototypes from text prompts. It uses
      Figma's own AI combined with Google Cloud's Gemini and Imagen models. Figma Weave (2026) extends
      AI capabilities to design systems, automating variable token management, brand compliance checks,
      and component suggestion. Figma Sites (2025) enables publishing design files directly as live
      websites. Across all products, 76% of Fortune 500 customers use two or more Figma products as
      of Q1 2026.
    claimRefs: [CE001, CE002, CE003, CE004, CE005, CE006]
    tableRefs: [TE001]
    figureRefs: [FE001]

  - id: technology-architecture
    title: "Technology Architecture and Engineering Differentiation"
    body: >
      Figma's technical moat stems from its browser-native architecture built on WebAssembly (WASM),
      which compiles C++ and Rust graphics code to run at near-native speed in the browser. This
      architecture decision—made in the company's earliest engineering phase—allows Figma to render
      complex vector graphics, run real-time multiplayer collaboration, and handle large design files
      without a desktop application. No other design tool has fully replicated this approach at scale.

      The frontend stack uses TypeScript and React for UI components, with Canvas/WebGL for rendering.
      The WebAssembly bundle handles the compute-intensive vector engine. Real-time collaboration runs
      over WebSockets with operational transforms (OT) for conflict resolution when multiple users edit
      simultaneously. The backend is hosted on AWS and uses PostgreSQL (primary data store), Redis
      (session and cache), and S3 (asset storage). Backend services for vector computation use C++
      and Rust for performance.

      The plugin ecosystem (700+ published plugins) runs in sandboxed iframes with a restricted
      JavaScript API (`window.figma`), preventing arbitrary file or network access. This sandboxing
      model is a security feature but also creates extensibility constraints. The REST API and Webhooks
      support enterprise integrations with Jira, GitHub, Slack, Microsoft Teams, and Notion. GitHub
      and Figma have a direct integration enabling design reviews within pull request flows, embedding
      Figma's design canvas into engineering workflows.
    claimRefs: [CE007, CE008, CE009, CE010, CE011, CE012, CE013]
    tableRefs: [TE003]
    figureRefs: [FE002]

  - id: trust-compliance
    title: "Security, Compliance, and Trust Architecture"
    body: >
      Figma holds SOC 2 Type II certification (annual independent audit covering security, availability,
      and confidentiality trust service criteria). The company is GDPR compliant (EU data residency
      options available for enterprise contracts), CCPA compliant, and has HIPAA-eligible configurations
      for healthcare enterprise customers. As a public company since November 2025, Figma is subject
      to SOX (Sarbanes-Oxley) financial reporting controls, adding an additional layer of governance
      oversight. FedRAMP compliance (U.S. government cloud security) is not confirmed as of May 2026.

      Enterprise security features include SCIM (System for Cross-domain Identity Management) for
      automated user provisioning and deprovisioning, SAML/SSO integration (Okta, Microsoft Entra,
      Ping Identity), granular guest access controls, organization-wide library controls, and
      comprehensive audit logging with 365-day retention in the Enterprise tier. Data is encrypted
      at rest (AES-256) and in transit (TLS 1.2/1.3). Assets (design files) are stored in AWS S3
      with server-side encryption.

      The plugin sandboxing model is a material security boundary: plugins run in isolated browser
      contexts with no direct file system or network access outside defined API channels. Enterprise
      customers can restrict plugin access through admin controls. In December 2024, Figma disclosed
      a bug bounty program through HackerOne, demonstrating responsible disclosure practices consistent
      with other enterprise SaaS companies.
    claimRefs: [CE014, CE015, CE016, CE017, CE018, CE019]
    tableRefs: [TE004]

  - id: product-workflow
    title: "Customer Workflow Integration and Use-Case Depth"
    body: >
      Figma's deepest workflow integration is the design-to-development handoff cycle. A product team
      uses Figma Design for wireframes and high-fidelity mockups, FigJam for discovery workshops and
      retrospectives, Dev Mode for developer inspection of designs, and GitHub integration for
      embedding design states in code review pull requests. This full-cycle integration means that
      removing Figma requires replacing four distinct workflow tools simultaneously, dramatically
      raising switching costs and making Figma's churn rate structurally lower than a single-purpose
      tool.

      Design systems are the highest-value use case for enterprise customers. A design system in Figma
      consists of shared component libraries, design tokens (color, typography, spacing variables),
      and style guides maintained centrally and consumed across all product teams. Once a company's
      design system is built in Figma—a process requiring months of effort—migration to a competitor
      means not only redesigning the system but also retraining all consuming teams. Microsoft reported
      a 70% improvement in engineering handoff speed after standardizing on Figma design systems, and
      Figma has published case studies showing productivity gains across Netflix, GitHub, Dropbox,
      and dozens of Fortune 500 clients.

      The non-designer user base (two-thirds of MAU) is a strategic advantage: product managers and
      developers using Figma for wireframing, annotations, and feedback loops create cross-functional
      stickiness that design-tool-only competitors (Sketch) cannot replicate. This breadth is also
      why Figma's NDR of 139% reflects true expansion rather than price increases—organizations
      expand by adding new seat types and use cases, not just design headcount.
    claimRefs: [CE020, CE021, CE022, CE023, CE024]
    tableRefs: [TE002]

  - id: roadmap-risks
    title: "Product Roadmap, AI Transition, and Technical Risks"
    body: >
      Figma's roadmap for 2025–2026 is anchored on AI-native capabilities. Figma Make (text-to-UI
      generation), Sites (design-to-web publishing), Slides (design-to-presentation), and Weave
      (AI design systems) collectively represent a strategic shift from tool-of-record to
      AI-accelerated workflow layer. The Google Cloud partnership (Gemini and Imagen integration)
      provides access to state-of-the-art vision and language models without Figma bearing the cost
      of training proprietary foundation models.

      The primary technical risk is AI-native competitors that bypass the Figma canvas entirely:
      Google Stitch (free AI design platform, launched 2025), v0 by Vercel (React code generation
      from screenshots), and Lovable (app generation from prompts) all generate UI/front-end code
      directly without requiring a design step. If the design-to-code workflow continues to compress,
      fewer designers may be needed, and the seat-based revenue model faces structural pressure.
      Over 63% of design workflows are estimated to be automatable by AI by 2026 according to third
      party analysis, creating existential uncertainty for traditional design tooling.

      Secondary technical risks include platform dependency (all users require a modern browser and
      internet connection; Figma has limited offline capabilities), plugin ecosystem governance
      (malicious plugins could exfiltrate design IP despite sandboxing), and WebAssembly payload
      size (Figma's WASM bundle can slow initial load on slower connections, affecting user experience
      in price-sensitive emerging markets). The competitive response via Figma Make and Weave is
      credible but requires proof of enterprise adoption at scale.
    claimRefs: [CE025, CE026, CE027, CE028, CE029, CE030]
    tableRefs: [TE005]
    figureRefs: [FE003, FE004]

