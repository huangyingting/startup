      - number: '7.2'
        title: Operational, Security, and Technical Risk
        blocks:
          - type: paragraph
            body: >
              Figma's browser-native architecture provides significant distribution advantages but creates concentrated
              technical dependencies. The platform runs on AWS for compute, PostgreSQL for database persistence, Redis
              for caching, and S3 for file storage — all on a single cloud provider. A prolonged AWS outage
              (particularly in us-east-1 or eu-west-1) would cause service disruption for all Figma users
              simultaneously; Figma has no publicly documented multi-cloud failover architecture. Historical outages
              documented on Figma's public status page include incidents in 2023 and 2024 that caused multi-hour
              degraded performance for significant user cohorts, though none resulted in disclosed data loss or material
              customer churn.


              Security risk is meaningfully elevated because Figma stores all customer design IP — including unreleased
              product roadmaps, brand assets, and proprietary design files — in its cloud infrastructure. A material
              security breach could expose highly sensitive pre-product-launch intellectual property for 690K+ paid
              organizations, creating significant legal, reputational, and churn risk. Figma holds SOC 2 Type II
              certification and conducts annual penetration testing but has not achieved ISO 27001 certification or
              FedRAMP authorization, limiting its defensibility with highly security-conscious enterprise customers.


              The platform's reliance on WebAssembly (for the C++/Rust canvas engine) introduces dependency on browser
              vendors. If Chrome, Safari, or Firefox materially changed their WebAssembly implementations or blocked
              certain APIs, Figma's rendering engine could require significant re-engineering. This risk is assessed as
              low-probability given WebAssembly's W3C standardization, but the mitigation path is multi-year engineering
              work. Performance at scale remains a documented limitation: files with more than ~1,000 frames experience
              material performance degradation (slow load times, laggy real-time sync), which is the most common
              complaint in G2 and TrustRadius reviews and a legitimate churn risk for agencies handling high-volume
              campaigns.
            claimRefs:
