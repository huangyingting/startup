      - number: '6.5'
        title: Expansion Dynamics and Concentration Risk
        blocks:
          - type: paragraph
            body: >
              Figma's land-and-expand model is structurally powerful: teams initially deploy Figma for one use case
              (often prototyping or wireframing), then expand to additional teams, add FigJam for facilitation and
              ideation, enable Dev Mode for developer handoff, and eventually upgrade to Org or Enterprise tier for
              admin controls. The 76% multi-product adoption rate among enterprise accounts confirms this expansion
              pattern is in effect at scale, and the 139% NDR is its financial expression.


              Concentration risk appears low. With 690,000 paid organizations and an estimated 1,525 enterprise
              accounts, no single customer is publicly known to account for more than 5% of revenue—though Figma does
              not disclose customer-level revenue concentration in its public filings. The closest proxy is the >$100K
              ARR cohort contributing an estimated 55–65% of total ARR: if that cohort has 1,525 members, the implied
              average contract per enterprise account is approximately $440K–$500K, consistent with significant breadth.


