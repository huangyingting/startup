  - id: FU001
    title: Customer Journey Map
    type: journey-map
    layout: wide
    summary: >-
      Six-stage Figma customer journey from initial discovery through deep enterprise embedding, illustrating the PLG
      motion and expansion vectors.
    data:
      nodes:
        - id: discover
          label: Discover
          detail: >-
            Designer shares a Figma link or invites a collaborator; non-designer accesses file via browser — no install
            required
        - id: activate
          label: Activate
          detail: >-
            Create free account, explore canvas, use community templates; zero friction entry via browser-native
            experience
        - id: collaborate
          label: Collaborate
          detail: Invited as editor on team project; accesses real-time multiplayer; uses FigJam for whiteboarding
        - id: convert
          label: Convert to Paid
          detail: >-
            Team exceeds free plan limits (draft limit, viewer count, version history); upgrade prompt drives Team/Org
            plan purchase
        - id: expand
          label: Expand
          detail: >-
            Org-wide rollout; add Dev Mode for developer handoff; enable Slides and Make (AI) features; upgrade to Org
            or Enterprise tier
        - id: embed
          label: Enterprise Embed
          detail: >-
            Figma becomes design system backbone; SCIM/SSO provisioned; design tokens integrated with engineering
            pipeline; multi-year contract
    approximationNotes: >-
      Journey stages are qualitative and derived from Figma's published PLG model, management commentary, and customer
      case studies. Specific conversion rates between stages are not publicly disclosed.
    claimRefs:
      - CU013
      - CU014
