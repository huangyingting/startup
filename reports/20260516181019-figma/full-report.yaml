  - number: 2
    title: Market Analysis
    sections:
      - number: '2.1'
        title: Market Boundary and Substitutes
        blocks:
          - type: paragraph
            body: >
              Figma's core market is professional UI/UX design software: cloud-based platforms used by product, design,
              and engineering teams to create, prototype, and ship digital interfaces. The market includes wireframing,
              high-fidelity mockups, interactive prototyping, design-system management, developer handoff
              (design-to-code), and real-time collaborative whiteboarding. It excludes high-end visual production (Adobe
              Photoshop/Illustrator for print and photo), consumer graphic design (Canva/Adobe Express), and engineering
              CAD/PLM collaboration tools (AutoCAD, SolidWorks, Onshape).


              Status-quo substitutes vary by buyer segment. Enterprise design teams previously relied on Sketch
              (macOS-only, file-based), Adobe XD (discontinued 2023), and InVision for prototyping. Non-design
              stakeholders used Miro, Mural, or PowerPoint for whiteboarding, and Zeplin/Avocode for developer handoff.
              All of these represent either direct share losses for Figma or ongoing expansion opportunities as product
              teams consolidate tooling onto a single platform.


              Cloud deployment dominates the UI/UX software market, accounting for 68–71% of usage and expanding at an
              outsized CAGR relative to on-premises alternatives. This structural shift benefits Figma, which is
              entirely browser-native with no on-premises offering, making it both a primary beneficiary of the cloud
              transition and somewhat exposed to cloud-specific security and compliance requirements in regulated
              industries.
            claimRefs:
              - CM001
              - CM002
              - CM003
              - CM004
              - CM005
          - type: table
            tableRef: TM001
            claimRefs: []
      - number: '2.2'
        title: TAM, SAM, and SOM Sizing
        blocks:
          - type: paragraph
            body: >
              Market sizing estimates for UI/UX design software diverge by as much as 5× across analyst firms due to
              fundamental differences in market scope. Dataintelo places the 2025 TAM at $9.8B with a 24.1% CAGR to
              $67.4B by 2034. Verified Market Reports independently estimates $10.5B for 2025. These broader definitions
              include enterprise design systems, developer-handoff tooling, and adjacent prototyping categories. Mordor
              Intelligence uses a narrower definition at $1.98B (2025), growing at 32% CAGR to $11.66B by 2031.
              GlobalGrowthInsights sits at $2.4B (2025) with a 15.3% CAGR through 2035.


              Figma's own S-1 and IPO disclosures claim a $33B TAM, nearly 3–17× larger than analyst estimates. The
              company calculates this by including all product-team collaboration, design operations, and
              software-development-adjacent workflows. The broader visual cloud market—encompassing creative cloud
              tools, collaborative design, and content platforms—is projected to reach $237.3B by 2029 at a 13.5% CAGR,
              representing Figma's long-term expansion frontier if it successfully positions as a cross-functional
              platform.


              Figma's SAM—the portion realistically addressed by a cloud-native design-first collaboration platform—is
              estimated at $7–10B (2026) when scoping professional design, prototyping, and developer handoff for
              product-centric organizations. The current SOM is anchored by FY2025 revenue of $749M and an annualized Q1
              2026 run-rate of ~$1.33B, implying 10–19% of the estimated SAM. North America generates 38–39% of global
              market revenue, consistent with Figma's own ~38% U.S. user concentration. APAC is the fastest-growing
              region at a 33% CAGR (Mordor Intelligence), driven by mobile-first product development in India and
              Southeast Asia.
            claimRefs:
