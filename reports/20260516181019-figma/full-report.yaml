              9x NTM, Datadog 14x NTM), and historical transactions (Slack-Salesforce 2021 at approximately 26x ARR).
              Figma at 7.5x NTM FY2027 trades at a significant discount to Canva and Datadog but approximately in line
              with Adobe and slightly below Atlassian. The discount to Canva reflects the private-market liquidity
              premium; the discount to Datadog reflects absence of AI-platform re-rating pending AI credit monetization
              proof.

              Enterprise SaaS companies with greater than 100 percent NDR and greater than 35 percent revenue growth
              have historically commanded 8-15x NTM revenue multiples in the post-2023 rate environment. Figma at 7.5x
              is at the lower end of this range, suggesting relative value on a growth-adjusted basis. The fair-value
              corridor from the comparable set is approximately $44-$68/share, with the base case at $55 representing 22
              percent upside from the $45 reference price.
            claimRefs:
              - CV016
              - CV017
              - CV018
              - CV019
              - CV020
              - CV021
              - CV022
              - CV023
          - type: table
            tableRef: TV004
            claimRefs:
              - CV016
              - CV017
              - CV018
              - CV019
              - CV020
              - CV021
              - CV022
      - number: '8.4'
        title: Thesis-Break Triggers and Monitoring Framework
        blocks:
          - type: paragraph
            body: >
              Five thesis-break triggers are defined, each with explicit observable thresholds and action implications.
              NDR is the most closely monitored metric: a sustained decline below 120 percent for two consecutive
              quarters would signal structural churn and expansion failure, invalidating the land-and-expand thesis that
              underpins the entire valuation premium. AI seat compression is the highest-consequence single event
              because it redefines the TAM as structurally shrinking, collapsing the multiple regardless of near-term
              revenue performance.

              Q2 2026 earnings (expected August 2026) represent the next major thesis validation event. Three
              disclosures are most important: AI credit attach rates, seat count progression by tier, and management
              commentary on competitive win rates. Any negative surprise on these three metrics without compensating NDR
              resilience should trigger immediate position reduction. The triggers represent the line between cyclical
              normalization (hold through) and structural thesis failure (exit immediately).
            claimRefs:
              - CV024
              - CV025
              - CV026
              - CV027
              - CV028
              - CV029
              - CV030
          - type: table
            tableRef: TV005
            claimRefs:
              - CV024
              - CV025
              - CV026
              - CV027
              - CV028
              - CV029
              - CV030
      - number: '8.5'
        title: Final Diligence Asks and Investment KPIs
        blocks:
          - type: paragraph
            body: >
              Six unresolved diligence items represent material information gaps before full position allocation. AI
              credit unit economics are the highest priority; partial data will be available in Q2 2026 10-Q (expected
              August 2026). Competitive win rates against Google Stitch and V0 require channel checks with enterprise
              design team buyers since no public disclosure exists. Seat count trend by tier is essential to distinguish
              NDR expansion from pricing versus genuine seat growth. These three gaps are blocking for full position
              sizing.

              The investment KPI scorecard rates Figma across seven dimensions: market opportunity 8/10 (large $40B TAM
              with AI optionality), product proof 9/10 (best-in-class execution), competitive moat 7/10 (strong but
              medium-term AI threat), financial quality 8/10 (FCF positive, 91 percent GM), risk profile 5/10 (multiple
              compounding risks), valuation entry 6/10 (fairly valued not cheap), evidence quality 7/10 (strong filings,
              weak AI competitive data). The 7/10 overall average supports a half-position allocation at current prices,
              with full allocation reserved for a 20-25 percent pullback and diligence resolution.
            claimRefs:
              - CV031
              - CV032
              - CV033
              - CV034
              - CV035
              - CV036
              - CV037
              - CV038
              - CV039
              - CV040
          - type: table
            tableRef: TV006
            claimRefs:
              - CV031
              - CV032
              - CV033
              - CV034
          - type: figure
            figureRef: FV004
            claimRefs:
              - CV034
              - CV036
              - CV037
              - CV038
              - CV039
              - CV040
      - number: '8.6'
        title: Exhibits
        blocks:
          - type: callout
            title: 'Base Case Target: $55/share (22% upside)'
            body: >
              At 9x NTM FY2027 revenue of $1.65B and approximately 270M diluted shares, the base case intrinsic value is
              approximately $55/share representing 22 percent upside from the $45 reference price. This multiple is
              supported by Atlassian comps and Figma's superior 139 percent NDR.
            calloutType: insight
            claimRefs:
              - CV009
              - CV010
          - type: callout
            title: 'AI Seat Compression: The Tail Risk'
            body: >
              The bear case of $22/share (51 percent downside) requires only a 15 percent reduction in net seat growth
              from AI compression combined with multiple compression to 4.5x NTM. This tail risk is non-trivial given
              Google Stitch and emerging generative design tools. Position sizing should reflect this downside
              asymmetry.
            calloutType: insight
            claimRefs:
              - CV012
              - CV025
          - type: callout
            title: 'Entry Discipline: Selective Below $38/share'
            body: >
              The probability-weighted expected value of approximately $51/share provides limited upside at the $45
              reference price. Initiating a half-position below $38/share (15 percent discount to the $44 fair-value
              floor) improves the risk-reward ratio materially, shifting the base case return to approximately 45
              percent while capping bear case downside at 42 percent.
            calloutType: insight
            claimRefs:
              - CV013
              - CV035
