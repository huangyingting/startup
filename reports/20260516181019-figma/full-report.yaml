  - id: FR001
    title: Risk Heatmap
    type: matrix
    layout: wide
    summary: >-
      Figma risk heatmap mapping 12 identified risks across likelihood (rows) and impact (columns), showing
      concentration of risk in AI-disruption and operational resilience dimensions.
    data:
      columns:
        - label: Low Impact
        - label: Medium Impact
        - label: High Impact
        - label: Critical Impact
      rows:
        - label: High Likelihood
          values:
            - Performance at scale (large files)
            - Post-IPO talent attrition; AI roadmap execution
            - AI-native disintermediation of new workflows
            - ''
        - label: Medium Likelihood
          values:
            - CCPA/GDPR enforcement
            - EU AI Act (Make); culture/cadence transition
            - AWS concentration outage; design TAM compression
            - Material security breach
        - label: Low Likelihood
          values:
            - IP litigation
            - FedRAMP gap; Key-man (Field departure)
            - Browser vendor restriction; financial loss acceleration
            - Design IP exfiltration at scale
    approximationNotes: >-
      Likelihood and impact ratings are qualitative analyst assessments based on industry benchmarks, S-1 risk
      disclosures, and competitive intelligence. No actuarial probability estimates are available. 'High likelihood'
      denotes >30% probability over a 12-month horizon; 'Medium' 10–30%; 'Low' <10%.
    claimRefs:
      - CR008
      - CR015
      - CR027
      - CR028
  - id: FR002
    title: Risk Transmission Map
    type: dag
    layout: wide
    summary: >-
      Directed acyclic graph showing how primary risk events propagate through Figma's business model to secondary and
      tertiary effects on revenue, retention, and competitive position.
    data:
      nodes:
        - id: ai-disintermediation
          label: AI-native tools intercept new design workflows
          detail: Google Stitch, v0, Lovable capture new project categories before PLG funnel
        - id: plg-slowdown
          label: PLG funnel compression
          detail: Fewer new free users converting to paid; TAM growth slows
        - id: ndr-deceleration
          label: NDR deceleration
          detail: New-cohort expansion offsets existing retention; NDR trends toward 115%
        - id: aws-outage
          label: AWS regional outage
          detail: Multi-hour service disruption for all Figma users in affected region
        - id: enterprise-sla-breach
          label: Enterprise SLA breach
          detail: Downtime exceeds contractual thresholds; churn risk in premium accounts
        - id: eu-ai-act
          label: EU AI Act enforcement on Make
          detail: Figma Make requires conformity assessment or feature modification in EU
        - id: eu-revenue-cap
          label: EU AI revenue restricted
          detail: Make features limited in EU; ~25% of international revenue affected
        - id: field-departure
          label: Dylan Field departure
          detail: CEO and product visionary exits; investor confidence impacted
        - id: strategic-uncertainty
          label: Strategic uncertainty
          detail: Product roadmap paralysis; talent attrition accelerates
      edges:
        - from: ai-disintermediation
          to: plg-slowdown
        - from: plg-slowdown
          to: ndr-deceleration
        - from: aws-outage
          to: enterprise-sla-breach
        - from: enterprise-sla-breach
          to: ndr-deceleration
        - from: eu-ai-act
          to: eu-revenue-cap
        - from: eu-revenue-cap
          to: ndr-deceleration
        - from: field-departure
          to: strategic-uncertainty
        - from: strategic-uncertainty
          to: plg-slowdown
    approximationNotes: >-
      Risk transmission paths are qualitative and based on analyst modeling of cause-effect relationships in enterprise
      SaaS businesses. Feedback loops exist (e.g., NDR deceleration → lower valuation → talent attrition → further NDR
      impact) but are not shown to preserve DAG acyclicity.
    claimRefs:
      - CR027
      - CR029
      - CR015
      - CR022
  - id: FR003
    title: Dependency Map
    type: dag
    layout: wide
    summary: >-
      Directed graph of Figma's critical technology and partner dependencies, showing single points of failure and
      diversification status at each dependency layer.
    data:
      nodes:
        - id: figma-core
          label: Figma Platform
          detail: Core design, FigJam, Dev Mode, Slides, Make, Sites, Weave products
        - id: aws
          label: AWS (compute, DB, storage, CDN)
          detail: Primary and sole cloud provider; PostgreSQL, Redis, S3, CloudFront
        - id: google-cloud
          label: Google Cloud Vertex AI
          detail: Powers Figma Make AI generation features; announced partnership 2025
        - id: browser-wasm
          label: Browser vendors (Chrome/Safari/Firefox WebAssembly)
          detail: Runtime host for Figma's C++/Rust canvas engine via WebAssembly
        - id: github
          label: GitHub (Dev Mode integration)
          detail: 'Two-way integration: code references design tokens; design linked to PRs'
        - id: atlassian
          label: Atlassian (Jira/Confluence)
          detail: Figma embeds in Jira tickets and Confluence pages for design handoff
        - id: okta-entra
          label: Okta / Microsoft Entra (SCIM/SSO)
          detail: Enterprise identity providers for SCIM provisioning and SAML SSO
        - id: stripe
          label: Payment processor (Stripe est.)
          detail: Subscription billing for all plans; critical for revenue collection
      edges:
        - from: figma-core
          to: aws
        - from: figma-core
          to: google-cloud
        - from: figma-core
          to: browser-wasm
        - from: figma-core
          to: github
        - from: figma-core
          to: atlassian
        - from: figma-core
          to: okta-entra
        - from: figma-core
          to: stripe
    approximationNotes: >-
      Dependency map derived from Figma's public architecture documentation, partnership announcements, status page
      integrations list, and enterprise documentation. Internal dependency contracts and SLAs are not available for
      review. Payment processor assumed to be Stripe based on common SaaS tooling; not publicly confirmed.
    claimRefs:
      - CR015
      - CR016
      - CR017
      - CR018
      - CR019
  - id: FV001
    title: Recommendation Logic
    type: flow
    layout: wide
    summary: >
      Decision flow from financial quality, competitive moat, and AI risk assessment through valuation analysis and
      entry discipline to the selective buy recommendation below $38/share.
    data:
      nodes:
        - id: N1
          label: Financial Quality
          detail: 91% GM, 139% NDR, 46% growth, FCF positive, $1.6B cash
        - id: N2
          label: Competitive Moat
          detail: 95% Fortune 500, 2M+ plugins, deep enterprise integrations
        - id: N3
          label: AI Risk
          detail: Google Stitch threat, seat compression, moat durability uncertain
        - id: N4
          label: Valuation at $45
          detail: 7.5x NTM FY2027; lower bound of 8-15x SaaS comp range
        - id: N5
          label: Entry Discipline
          detail: Below $38 = half-position; full requires diligence resolution
        - id: N6
          label: Selective Buy
          detail: Half-position below $38; base target $55 (+22%); bull $91 (+102%)
      edges:
        - from: N1
          to: N4
        - from: N2
          to: N4
        - from: N3
          to: N4
        - from: N4
          to: N5
        - from: N5
          to: N6
    approximationNotes: >
      Flow represents analyst judgment framework; decision weights are qualitative not actuarial. The flow reflects the
      dominant causal chain; secondary effects (lock-up overhang, macro) are subsumed in the valuation and entry
      discipline nodes.
    claimRefs:
      - CV001
      - CV006
      - CV008
      - CV013
      - CV035
  - id: FV002
    title: Valuation Sensitivity
    type: bar
    layout: standard
    summary: >
      Per-share price at various EV/NTM revenue multiples applied to the base case FY2027 revenue estimate of $1.65B and
      approximately 270M diluted shares, showing the return profile across a 4.5x to 13x multiple range.
    data:
      items:
        - label: 4.5x NTM (Bear)
          value: 22
        - label: 6x NTM
          value: 30
        - label: 7.5x NTM (Current)
          value: 45
        - label: 9x NTM (Base Target)
          value: 55
        - label: 11x NTM
          value: 67
        - label: 13x NTM (Bull)
          value: 91
    approximationNotes: >
      Per-share values calculated as (EV/NTM multiple x $1.65B NTM FY2027 revenue estimate) divided by 270M diluted
      shares. Revenue estimate is sell-side consensus midpoint. Individual analyst estimates range $1.55B-$1.73B.
      Diluted share count from S-1 prospectus and proxy statement.
    claimRefs:
      - CV009
      - CV010
      - CV011
      - CV012
      - CV014
      - CV015
  - id: FV003
    title: Valuation / Return Range
    type: range
    layout: standard
    summary: >
      Return ranges (percent) for bull, base, and bear scenarios relative to the $45/share reference price, with the
      probability-weighted expected value shown as a separate range.
    data:
      items:
        - label: Bear Case
          low: -51
          high: -30
        - label: Base Case
          low: 10
          high: 30
        - label: Bull Case
          low: 60
          high: 102
        - label: Probability-Weighted EV
          low: 8
          high: 18
    approximationNotes: >
      Ranges reflect scenario uncertainty within each case rather than a single point estimate. Bear case low -51% at
      4.5x/$1.35B; high -30% at 5x/$1.45B. Base case low +10% at 8x/$1.55B; high +30% at 9x/$1.65B. Bull case low +60%
      at 11x/$1.80B; high +102% at 13x/$1.90B.
    claimRefs:
      - CV009
      - CV011
      - CV012
      - CV013
  - id: FV004
    title: Investment KPIs
    type: kpi
    layout: standard
    summary: >
      Investment committee scorecard rating Figma across seven dimensions on a 1-10 scale spanning market opportunity,
      product proof, competitive moat, financial quality, risk profile, valuation entry, and evidence quality.
    data:
      items:
        - label: Market Opportunity
          value: 8/10
          detail: $40B TAM growing 12% CAGR; AI expands addressable use cases beyond professional designers
        - label: Product Proof
          value: 9/10
          detail: Best-in-class execution; 95% Fortune 500; 139% NDR validates product-market fit
        - label: Competitive Moat
          value: 7/10
          detail: Strong switching costs (plugins, integrations); medium-term AI threat from Google Stitch credible
        - label: Financial Quality
          value: 8/10
          detail: 91% gross margin, FCF positive Q1 2026, $1.6B cash no debt, 46% revenue growth
        - label: Risk Profile
          value: 5/10
          detail: 'Multiple compounding risks: AI disruption, lock-up overhang, competition, growth deceleration'
        - label: Valuation Entry
          value: 6/10
          detail: 7.5x NTM at lower bound of comps; $51 probability-weighted EV leaves limited upside at $45
        - label: Evidence Quality
          value: 7/10
          detail: Strong S-1/10-K/10-Q filings; weak AI competitive win-rate and channel check data
    approximationNotes: >
      Scores are analyst qualitative judgments on a 1-10 scale anchored to comparable SaaS investments. Market
      opportunity anchored to IDC design software TAM estimate. Financial quality anchored to observable 91% gross
      margin and 139% NDR. Risk profile reflects multiplicative AI disruption and lock-up uncertainty. Scores as of May
      2026.
    claimRefs:
      - CV034
      - CV036
      - CV037
      - CV038
      - CV039
      - CV040
