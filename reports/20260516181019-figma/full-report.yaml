  - id: TV005
    title: Thesis-Break and Kill Triggers Table
    columns:
      - Trigger
      - Threshold
      - Observable Date
      - Action
    rows:
      - - NDR Decline
        - NDR below 120% for 2 consecutive quarters
        - Q2 2026 plus Q3 2026 earnings
        - Reduce to quarter-position; re-underwrite land-and-expand thesis
      - - AI Seat Compression
        - Absolute seat count declining YoY in any tier
        - Q2 2026 earnings (August 2026)
        - Exit full position within 5 trading days of disclosure
      - - Gross Margin Erosion
        - GM below 88% for 2 consecutive quarters
        - Q2 2026 plus Q3 2026 earnings
        - Reduce position by half; reassess AI infrastructure cost trajectory
      - - Competitive Loss
        - Loss of 2+ Fortune 100 design contracts to AI-native tools
        - Channel checks and press
        - Exit full position within 10 trading days of confirmation
      - - Revenue Miss
        - FY2026 revenue below $1.30B or YoY growth below 25%
        - Q4 2026 earnings (January 2027)
        - Review multiple compression scenario; reduce on second miss
    notes: >
      These are thesis-break not normal-noise signals; single-quarter misses without confirming second data point should
      be monitored but not acted upon immediately. Bear thesis confirmation requires at least two corroborating data
      points before full exit.
    claimRefs:
      - CV024
      - CV025
      - CV026
      - CV027
      - CV028
      - CV029
      - CV030
  - id: TV006
    title: Final Diligence Asks Table
    columns:
      - Item
      - Information Gap
      - Why It Matters
      - Source
      - Expected Resolution
    rows:
      - - AI Credit Economics
        - Revenue per credit, cost per credit, attach rate by tier
        - Determines whether AI is margin-accretive or dilutive; drives bull/base split
        - Q2 2026 10-Q (August 2026)
        - High priority; partially resolvable from Q2 filing
      - - Competitive Win Rates
        - Win rates vs. Google Stitch in enterprise design tenders
        - Validates or undermines AI threat severity for multiple compression risk
        - Channel checks with design team leads
        - Requires primary research; 4-6 weeks
      - - Seat Count by Tier
        - Absolute seat count trend by starter/professional/org tier
        - Distinguishes pricing-driven NDR from volume-driven NDR for model robustness
        - Q2 2026 10-Q or investor day
        - May require direct IR inquiry
      - - AI Gross Margin Impact
        - AI credit gross margin vs. traditional seat gross margin
        - Tests whether AI scale will compress blended margins below 88% threshold
        - Q2 2026 earnings call or 10-Q notes
        - Partially resolvable from management commentary
      - - FigJam Enterprise Adoption
        - FigJam enterprise penetration and cross-sell attach rate
        - Upside optionality; quantifies secondary product contribution to bull case
        - Q2 2026 10-Q or investor day supplemental
        - Low priority; informative not blocking
      - - Lock-up Expiration Schedule
        - Exact lock-up expiration dates and insider ownership schedule
        - Supply overhang timing affects near-term entry price discipline
        - SEC Form 4 filings and S-1 prospectus lock-up table
        - Available from SEC EDGAR now
    notes: Items 1-3 are blocking for full position allocation; items 4-6 are informative but not blocking
    claimRefs:
      - CV031
      - CV032
      - CV033
      - CV034
