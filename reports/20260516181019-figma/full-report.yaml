              expand to non-designer users who generate lower per-seat revenue than full editors; and (3) procurement
              friction in highly regulated industries (financial services, government) where FedRAMP-level certification
              remains absent. Critical adverse analysis from analysts notes that if AI automation reduces the designer
              headcount at large enterprises, the total addressable seat base for Figma could compress rather than
