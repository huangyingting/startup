            body: >
              Figma generates revenue almost entirely through seat-based SaaS subscriptions, supplemented by a newly
              launched AI credit model (March 2026). The pricing ladder has four tiers: Starter (free, unlimited
              viewers), Professional ($16/editor/month, $12/dev seat, $3/collab seat), Organization ($55/$25/$5), and
