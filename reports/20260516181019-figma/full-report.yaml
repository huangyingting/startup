      - number: '1.5'
        title: Risks and Adverse Considerations
        blocks:
          - type: paragraph
            body: >-
              Despite strong growth metrics, Figma faces several material risks. The failed Adobe acquisition removed
              the largest near-term liquidity event and forced Figma to pursue an independent IPO path, exposing it to
              public market volatility—its market cap declined from a first-day high of ~$68 billion to ~$12 billion
              within ten months of its IPO, a 82% correction. Figma's redesigned user interface ('UI3'), launched in
              2024, drew significant backlash from its core professional user base, with critics citing workflow
              disruption and increased complexity, accelerating adoption of open-source alternatives such as Penpot.
              Analysts have questioned Figma's competitive moat, particularly as AI-native design tools (v0 by Vercel,
              Lovable, Canva AI) gain traction with non-designer audiences. Revenue concentration among enterprise
              accounts creates dependency on continued expansion of a relatively small number of high-value
              relationships. Key-person risk from CEO Dylan Field is heightened by his dual-class voting structure,
              which means board oversight of his decisions is limited. Figma's GAAP operating losses remain substantial
              due to stock-based compensation, creating potential investor concern about the path to sustainable GAAP
              profitability.
