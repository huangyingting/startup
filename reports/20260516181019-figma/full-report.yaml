  - number: 8
    title: Valuation
    sections:
      - number: '8.1'
        title: Recommendation and Investment Thesis
        blocks:
          - type: paragraph
            body: >
              Figma presents a compelling long-term investment case anchored in market leadership, network effects, and
              a best-in-class SaaS financial profile. The combination of 91 percent gross margins, 139 percent net
              dollar retention, and 46 percent YoY revenue growth through Q1 2026 is exceptionally rare among public
              software companies. At the $45/share reference price, the stock trades at approximately 7.5x NTM FY2027
              revenue, fairly valued against public comps but with limited margin of safety given AI disruption risk
              that remains real but not yet fully quantified.

              The investment thesis has five pillars: (1) durable market leadership in design collaboration with
              approximately 95 percent Fortune 500 penetration; (2) Figma Make and Vertex AI as moat deepeners,
              positioning Figma as an AI-native platform rather than a disruption target; (3) financial flywheel quality
              combining 91 percent gross margins with 139 percent NDR and FCF positivity; (4) defensible switching costs
              via file format, plugin ecosystem, and developer handoff integration; and (5) valuation discipline
              requiring a 20-25 percent pullback before initiating a full position. The anti-thesis centers on AI design
              tools compressing the professional-seat TAM over a 3-5 year horizon, the single most consequential
              structural uncertainty for investors with a multi-year hold.
