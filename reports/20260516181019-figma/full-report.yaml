      - number: '7.5'
        title: AI Disruption, Financial, and Thesis-Break Risks
        blocks:
          - type: paragraph
            body: >
              The AI disruption risk to Figma is the single most significant thesis-break scenario. Four categories of
              AI-native tools threaten different parts of Figma's value chain: (1) design-to-code tools (v0 by Vercel,
              Lovable, Bolt) that bypass the design step entirely by generating production code from natural language —
              eliminating the need for a Figma prototype; (2) AI design generation tools (Google Stitch) that can
              generate design artifacts from prompts, potentially compressing the professional designer headcount at
              enterprises; (3) AI-native agents that can read and modify Figma files directly via API (emerging
              capability); and (4) AI-powered prototyping tools embedded in competing products (Canva AI, Microsoft
              Designer, Adobe Firefly).


              Figma's response — Make (AI generation within Figma), Weave (developer AI), and Sites (no-code publishing)
              — is a credible defense, but the response is reactive rather than native-AI-first. The risk is not that
              existing customers leave today (NDR 139% in Q1 2026 confirms retention), but that the new-cohort intake
              rate slows as AI-native tools capture new project categories before they enter Figma's PLG funnel.


              Financial risk includes: (1) sustained GAAP operating losses (-41% margin in Q1 2026, primarily from stock
              compensation); (2) uncertain AI credit monetization ramp (Figma charges AI credit usage fees for Make, but
              the revenue contribution is not separately disclosed); (3) multiple compression risk at the current
              EV/Revenue of ~7.9x if growth decelerates; and (4) risk that GAAP profitability never materializes if AI
              investment spending accelerates.


              The kill criteria for this investment thesis are: NDR declining below 115% for two consecutive quarters,
              absolute >$100K ARR customer count growth decelerating below 20% YoY, Figma losing significant named
              enterprise accounts to AI-native alternatives, or a Google Stitch/v0 integration reaching >10% of the
              design tool workflow market.
