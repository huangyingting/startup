      - number: '3.4'
        title: Switching Costs, Lock-In, and Network Effects
        blocks:
          - type: paragraph
            body: >-
              Figma benefits from several interlocking lock-in mechanisms that meaningfully raise switching costs for
              established users. First, the .fig file format is proprietary and closed; while Figma can import Sketch
              files, exporting a complete Figma project to a competitor requires custom migration tools. Sketch
              explicitly built a .fig importer in 2024 specifically to enable migration away from Figma, and
              open-sourced it, signaling that file-format portability is a real barrier that Sketch views as a
              competitive talking point. Second, design systems are deeply embedded: component libraries, variable
              tokens, design system documentation, and brand kits built in Figma are not portable to other tools without
              significant manual rebuilding. Large enterprise accounts that have invested 12–18 months building a design
              system in Figma face six-figure switching costs in labor alone. Third, the plugin ecosystem—with thousands
              of community-built plugins—represents a network effect where plugin developers target Figma first, making
              its workflow integrations (Jira, GitHub, Slack, Lottie, Zeplin, Storybook) more comprehensive than any
              alternative. ProductHunt user reviews confirm that 'the plugin ecosystem is unmatched' among alternatives,
              and cite cross-platform support (Windows and Mac) as a reason for continued lock-in that Sketch cannot
              replicate. Fourth, the Figma Community—a marketplace of free templates, UI kits, and design resources with
              millions of uses—creates a content flywheel that increases value as more users contribute, a dynamic that
              Penpot and Sketch cannot match given their smaller user bases. Multi-homing is possible (some teams run
              Figma alongside Miro or Canva for whiteboarding or marketing templates), but multi-homing at the primary
              product-design tool level is rare due to file and workflow fragmentation. Distribution power is reinforced
              by Figma's MCP server integration (launched 2026), which embeds Figma design data directly into VS Code
              and engineering workflows, raising the cost of switching even for teams whose frustration originates with
              designers rather than developers.
            claimRefs:
              - CP024
              - CP025
              - CP026
              - CP027
              - CP028
