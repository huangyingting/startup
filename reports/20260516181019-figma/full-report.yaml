            body: >
              Figma's technology stack relies on a small number of critical infrastructure and integration partners. AWS
              is the single most critical dependency: all compute, storage, database, and CDN infrastructure runs on
              AWS. While AWS has industry-leading uptime SLAs, any regional outage or account-level incident (e.g.,
              billing dispute, regulatory action against AWS in a given jurisdiction) would immediately affect all Figma
