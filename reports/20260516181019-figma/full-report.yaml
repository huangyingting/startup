      - number: '2.4'
        title: Growth Drivers and Adoption Constraints
        blocks:
          - type: paragraph
            body: >
              The primary growth drivers are: (1) remote and hybrid work normalization—68% of design teams now treat
              real-time collaboration as a critical selection criterion, directly favoring Figma's browser-native
              architecture; (2) enterprise digital transformation spending rising to 7.5% of revenue in 2025; (3)
              AI-assisted design influencing ~49% of UI/UX software buying decisions; (4) non-designer seat expansion
              via FigJam, Dev Mode, and Slides, evidenced by 139% NDR; and (5) mobile-first application development
              making UI/UX tooling essential across BFSI, healthcare, retail, and government digital services.


              Key adoption constraints include: high switching costs for enterprises that have embedded Figma into CI/CD
              pipelines, design systems, and multi-team libraries; data security and compliance requirements (GDPR,
              HIPAA, SOC 2, FedRAMP) cited by over 50% of organizations as the primary barrier to adopting cloud-based
              design platforms; AI-native design startups (Penpot, Galileo AI, Vercel v0) that could commoditize basic
              UI generation; and network-infrastructure gaps in emerging markets.


              There is a structural risk that AI automation—research suggests up to 70% of routine drafting tasks could
              be automated—could compress per-seat willingness to pay or reduce total designer headcount even as Figma
              expands into non-designer workflows. The near-saturation of the Fortune 500 (95% penetration) also means
              new logo growth in the enterprise tier is limited; expansion revenue depends on deepening multi-product
              attach rates within existing accounts.
            claimRefs:
              - CM028
              - CM029
              - CM030
              - CM031
              - CM032
              - CM033
              - CM034
              - CM035
              - CM036
              - CM037
          - type: table
            tableRef: TM004
            claimRefs: []
          - type: figure
            figureRef: FM004
            claimRefs: []
      - number: '2.5'
        title: Sizing Gaps and Diligence Notes
        blocks:
          - type: paragraph
            body: >
              The most significant gap is that no independent analyst uses the same market boundary as Figma's $33B
              self-reported TAM. The widest independent estimate ($9.8–10.5B) still implies Figma already captures 7–14%
              of its analyst-defined TAM at current revenue run-rates. Investors should stress-test whether Figma's $33B
              expansion path requires displacing Adobe Creative Cloud's core professional base (adversarial,
              high-switching-cost) or is achievable through organic workflow expansion into adjacent non-design
              collaboration categories.


              Segmentation quality is limited by the absence of official geographic revenue breakdowns or segment-level
              ARR disclosures in Figma's public filings. User demographic data (44% SMB, 42% mid- market, 13% enterprise
              by user count) derives from market research firms (6sense, Dataintelo) rather than Figma's own reporting.
              Mordor and Dataintelo use incompatible base-year scoping, making trend comparisons across reports
              unreliable without normalization.
            claimRefs:
              - CM038
              - CM039
              - CM040
  - number: 3
    title: Competitors
    sections:
      - number: '3.1'
        title: Competitive Landscape Overview
        blocks:
          - type: paragraph
            body: >-
              Figma operates at the center of a multi-ring competitive landscape. The innermost ring—direct professional
              design tools—contains Sketch (Mac-only, subscription at approximately $9/editor/mo), Framer
              (website/prototype builder with AI code generation, freemium), and the now-discontinued Adobe XD
              (maintenance mode since 2023, no new features). Sketch retains a loyal Mac-centric designer base but has
              been structurally disadvantaged since Figma's multiplayer canvas became the industry default; Sketch's web
              view is read-only for collaborators without a license, limiting adoption in larger cross-functional teams.
              The second ring covers adjacent platforms: Miro and Mural (visual collaboration/whiteboarding, Miro valued
              at $17.5B) compete for pre-design ideation and workshop workflows, capturing budget that might otherwise
              go to FigJam. The third ring is the most strategically significant: Canva's $26B-valued creative platform,
              now augmented by the March 2024 acquisition of the Affinity suite (Affinity Designer, Photo, Publisher),
              has positioned itself as a full-spectrum creative alternative to both Figma and Adobe Creative Cloud,
              particularly for marketing and content teams. Canva's 220M+ users dwarf Figma's 690,000 paid customers,
              though Canva addresses a broader, less technical audience. A fourth ring of AI-native tools—Vercel v0,
              Galileo AI, Anima, Builder.io—is emerging as a substitution threat by generating React code or complete UI
              screens directly from natural language prompts, bypassing the traditional design handoff workflow that
              Figma Dev Mode monetizes. Finally, internal-build pressure from design systems teams at large technology
              companies (Google's Material Design tooling, Microsoft's Fluent UI system) represents a long-term status
              quo risk, though most have adopted Figma rather than built replacements. The most notable recent exit from
              the market was InVision, which shut down its product on December 31, 2024, ceding its residual
              design-collaboration and handoff user base primarily to Figma and Zeplin. The UX Tools 2024 design tools
              survey found 'unprecedented industry consolidation' with Figma dominating the professional segment as
              competing tools specialize in adjacent niches.
            claimRefs:
              - CP001
              - CP002
              - CP003
              - CP004
