      - number: '3.2'
        title: 'Competitor Profiles: Scale, Funding, and Strategy'
        blocks:
          - type: paragraph
            body: >-
              Sketch (Sketch B.V., Dutch-owned, bootstrapped profitable) launched in 2010 and dominated Mac-based UI
              design until Figma's 2016 public launch. It migrated to a subscription model (Standard plan approximately
              $9/editor/mo billed annually for 1–14 editors, Business plan for 15+ editors with SSO and SCIM) and
              launched a web-based inspector and read-only sharing in 2023. Sketch remains Mac-only for editing—a
              persistent structural limitation that prevents adoption in mixed Windows/Mac enterprises—and introduced a
              .fig file importer in 2024 to ease migration from Figma, signaling competitive pressure. Canva (Canva Pty
              Ltd, Sydney, Australia) raised $3.6B across its life at a $26B valuation (2021 Series F). Its Magic Studio
              suite—including Magic Design, Magic Write, Magic Edit—provides text-to-image, background removal, and
              presentation generation. The March 2024 acquisition of Serif's Affinity suite added professional-grade
              Affinity Designer (Illustrator alternative) and Affinity Photo (Photoshop alternative). Canva Enterprise
              lists FedEx, Salesforce, Reddit, and Expedia as customers. Miro (RealtimeBoard Inc., US) last raised $400M
              at a $17.5B valuation in January 2022 from ICONIQ Growth and Accel; it serves 100M+ users across 250,000
              organizations including Nike, IKEA, Deloitte, and Cisco. Framer (Framer B.V., Amsterdam) is a freemium
              no-code website builder and design tool with AI that generates page layouts and components from prompts;
              its pricing starts free with paid plans at $5–$30/project/mo. Penpot (Kaleidos Inc., Spain) is an
              open-source, browser-based design tool licensed under MPL 2.0 that positions as a privacy-sovereign Figma
              alternative, gaining traction among EU public-sector and data-sensitive enterprise clients. Vercel v0
              (Vercel Inc., San Francisco) is an AI-code-generation service that produces React/Next.js components from
