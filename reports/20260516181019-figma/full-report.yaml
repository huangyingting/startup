            body: >
              The valuation framework uses three scenarios anchored in NTM FY2027 revenue estimates of $1.35B to $1.90B
              and EV/NTM multiples of 4.5x to 13x, probability-weighted. The base case (55-60 percent probability)
              assumes NDR moderates to 125-130 percent, AI credits add approximately $50M of incremental revenue, FY2027
              revenue reaches $1.65B, and the multiple holds at 9x NTM, implying a market cap of approximately $14.9B
              and approximately $55/share representing 22 percent upside from $45.

              The bull case (15-20 percent probability) assumes NDR stays at or above 140 percent, AI credits add $100M
              or more, the multiple expands to 13x on an AI-platform re-rating, and FY2027 revenue reaches $1.90B,
