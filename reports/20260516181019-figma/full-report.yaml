      - number: '1.4'
        title: Financial Scale and Customer Traction
        blocks:
          - type: paragraph
            body: >-
              Figma has demonstrated consistent revenue acceleration: FY2024 revenue was $749 million (up 48%
              year-over-year), FY2025 revenue exceeded $1 billion for the first time, and Q1 2026 revenue reached $333.4
              million (up 46% year-over-year), accelerating from 40% growth in Q4 2025. Figma raised its full-year 2026
