      - number: '5.6'
        title: Exhibits
        blocks:
          - type: callout
            title: WebAssembly Architecture Is a Durable Technical Moat
            body: >
              Figma's decision to compile its vector graphics engine to WebAssembly in 2012–2013 was a pioneering
              technical bet that competitors have not replicated at scale. The result is a browser-based tool that
              performs at near-native speed, eliminates install friction, and enables seamless real-time multiplayer—a
              combination no desktop-native competitor (Sketch, Adobe XD) has matched. This architectural moat is not
              just a performance advantage but a collaboration moat: it allows any stakeholder with a browser to
              participate in design workflows without software installation, which is why two-thirds of Figma's MAUs are
              non-designers.
            calloutType: strength
            claimRefs:
              - CE007
              - CE008
              - CE009
          - type: callout
            title: AI-Native Design Bypass Is an Existential Product Risk
            body: >
              Google Stitch, v0 by Vercel, Lovable, and Bolt represent a new category of AI tools that generate
              functional UI/front-end code directly from text prompts—bypassing the design canvas entirely. If this
              paradigm gains enterprise adoption, Figma's seat-based model (which charges for design editing) faces
              structural demand destruction. Figma Make is the company's defensive response, but it enters a market
              where Google (with zero marginal cost of deployment via Stitch) can subsidize the product to drive
              enterprise cloud adoption. 63% of design workflows reportedly automatable by AI by 2026.
            calloutType: risk
            claimRefs:
              - CE026
              - CE027
              - CE028
          - type: callout
            title: Design System Lock-In Is More Valuable Than the Editor Lock-In
            body: >
              The highest-value switching cost in Figma's product is not the editor (which could theoretically be
              replicated) but the enterprise design system: months of accumulated component libraries, design tokens,
              brand guidelines, and cross-team consumption patterns. Once a Fortune 500 company's design system is
              embedded in Figma, migrating requires rebuilding the system, retraining all consuming teams, and
              negotiating a parallel workflow transition. This lock-in is structurally similar to Salesforce's CRM
              lock-in—the data and process depth is what prevents churn, not the UI.
            calloutType: insight
            claimRefs:
              - CE020
              - CE021
              - CE024
  - number: 6
    title: Customers
    sections:
      - number: '6.1'
        title: Customer Base and Segmentation
        blocks:
          - type: paragraph
            body: >
              Figma serves approximately 690,000 paid organizations as of Q1 2026, spanning a wide spectrum from
              individual freelancers through Global 2000 enterprises. The customer base clusters into three measurable
              commercial tiers: the enterprise segment (~1,525 organizations generating >$100K ARR), a mid-market
              segment (~13,693 organizations generating $10K–$100K ARR), and a large SMB/long-tail base (~675K
              organizations below $10K ARR). Approximately 95% of Fortune 500 companies now use Figma in some capacity,
              making it the de facto standard for collaborative product design in large enterprise environments.


              Beyond paid accounts, Figma counts an estimated 13 million monthly active users, the majority of whom
              access the platform under the free tier or as invited collaborators on paid workspace plans. Critically,
              approximately two-thirds of MAU are not professional designers—they include product managers, engineers,
              marketing leads, and executives who view or interact with Figma files regularly. This cross-functional
              penetration entrenches Figma at the workflow layer rather than solely within the design team.


              Vertically, technology and SaaS companies account for the largest share of revenue, followed by financial
              services, healthcare, retail/CPG, and media/entertainment. Figma Education extends the platform free to
              qualifying universities and K-12 institutions, creating a student-to-professional pipeline that has
              historically seeded enterprise adoption. Geographic distribution is estimated at roughly 50% North America
              and 50% international (Europe, APAC), though Figma does not publicly disaggregate revenue by geography.
