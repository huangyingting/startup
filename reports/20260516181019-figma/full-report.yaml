      - number: '7.4'
        title: People and Execution Risk
        blocks:
          - type: paragraph
            body: >
              CEO Dylan Field, a co-founder who has led Figma since inception in 2012, represents the primary key-man
              concentration risk. Field has been the public face of Figma's product vision, the driving force behind the
              PLG model, and the primary architect of the platform strategy. His departure — voluntary or involuntary —
              would create significant strategic uncertainty and likely trigger executive team disruption. No formal CEO
              succession plan has been publicly disclosed. CTO Kris Rasmussen and CPO Yuhki Yamashita provide some bench
              depth, but neither has yet demonstrated ability to anchor investor confidence in the absence of Field.


              Post-IPO talent retention poses increasing challenges. Figma's equity compensation pool is now subject to
              public-market price transparency, and early employees whose options are fully vested face diminished
              retention incentive. Stock-based compensation of approximately $170M in FY2025 represents a meaningful
              dilution overhang. Simultaneously, Figma competes for engineering talent with AI-native startups (which
              offer potentially higher upside), Google DeepMind, and OpenAI — all of which are hiring aggressively for
              the same design/AI intersection skill sets that Figma's own roadmap depends on.


              Execution risk is also elevated around the company's transition from a founder-led private company to a
              public company with quarterly earnings obligations. The discipline required for consistent guidance and
              public financial reporting is distinct from the speed-optimized culture of Figma's early years. Early
              public-company stumbles (guidance misses, accounting issues, investor communication failures) could
              disproportionately damage investor confidence given the premium valuation multiple.
