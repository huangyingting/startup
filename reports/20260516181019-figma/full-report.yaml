      - number: '2.3'
        title: Buyer and User Segmentation
        blocks:
          - type: paragraph
            body: >
              Figma's user base is structurally distinctive: approximately two-thirds of monthly active users are
              non-designers—product managers, developers, marketers, and other cross-functional stakeholders. This makes
              Figma's TAM expansion story less about recruiting new designers and more about displacing general
              collaboration tools (Miro, Notion, PowerPoint) from non-design workflows, and converting existing accounts
              into higher-value multi-product enterprise contracts.


              By company size, small businesses (under 50 employees) account for 44% of Figma's user base, mid-size
              companies (100–999 employees) represent 42%, and large enterprises (1,000+) make up about 13% of users but
              contribute disproportionately to revenue. As of Q1 2026, 1,525 customers paid more than $100K ARR (~37% of
              revenue) and 15,218 paid more than $10K ARR. The bottom ~439K customers under $10K ARR account for 36% of
              revenue while serving as the primary top-of-funnel for enterprise conversion.


              Geographically, 38% of Figma users are U.S.-based, followed by India (~7%) and Brazil (~8.7%). 95% of the
              Fortune 500 use Figma, meaning incremental enterprise growth within this cohort is driven by seat depth
              rather than net-new logo acquisition. Budget ownership varies: enterprise contracts typically sit with VP
              Engineering or VP Product; SMB purchases are driven by individual designers or startup founders through
              the freemium conversion path.
            claimRefs:
              - CM018
              - CM019
              - CM020
              - CM021
              - CM022
              - CM023
              - CM024
              - CM025
