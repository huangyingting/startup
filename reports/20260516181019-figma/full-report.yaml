  - number: 7
    title: Risks
    sections:
      - number: '7.1'
        title: Regulatory and Legal Risk
        blocks:
          - type: paragraph
            body: >
              Figma operates in a complex multi-jurisdictional regulatory environment but has no material disclosed
              litigation as of the Q1 2026 10-Q period. GDPR compliance is established: Figma publishes a Data
              Processing Agreement (DPA) and Privacy Shield/SCCs for EU data transfers, holds data in AWS eu-west-1
              (Ireland) for EU customers, and offers GDPR-specific contract terms in its Enterprise plan. CCPA
              compliance is similarly managed through a privacy notice and opt-out mechanisms.


              The EU AI Act (enacted June 2024, enforcement from August 2026 onward) poses a medium-severity regulatory
              risk for Figma Make, the AI-powered design generation feature. If Figma Make is classified as a
              "high-risk" AI system under Annex III or a general-purpose AI system requiring transparency obligations,
              Figma would face conformity assessment requirements, registration in the EU AI Act database, and
              post-market monitoring obligations — all representing meaningful compliance investment. Figma has not
              publicly commented on its EU AI Act readiness.


              The failed Adobe acquisition (terminated January 2024 after EU regulatory opposition) left a significant
              antitrust record: regulators found that Adobe+Figma would have had excessive market power in professional
              design software. This ruling paradoxically strengthens Figma as a standalone company (confirms market
              leadership) but may create a template for future scrutiny if Figma itself pursues large acquisitions. No
              active litigation related to the termination is publicly disclosed. FedRAMP absence is a de facto
              regulatory barrier: without FedRAMP Moderate or High authorization, Figma cannot be approved for US
              federal government procurement, limiting the addressable market in the public sector.
