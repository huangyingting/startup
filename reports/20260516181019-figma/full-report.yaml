      - number: '1.2'
        title: Founders, Leadership, and Governance
        blocks:
          - type: paragraph
            body: >-
              Figma was co-founded by Dylan Field and Evan Wallace, both Brown University computer science students who
              met on campus and shared a vision for collaborative, web-native creative tooling. Dylan Field received a
              Thiel Fellowship—a $100,000 grant for students under 23 to leave school and pursue entrepreneurial
              ideas—and departed Brown to found Figma in San Francisco in 2012. Field has served as CEO since founding
              and retains 73.6% of shareholder voting power through Figma's dual-class share structure, a governance
              provision that ensures his ability to direct long-term strategy independent of public market pressure.
              Evan Wallace co-developed Figma's early WebGL-based rendering engine before departing his day-to-day role
              in 2022; he remains a shareholder. Figma's executive team as of 2026 includes Praveer Melwani (CFO), Yuhki
              Yamashita (CPO), Kris Rasmussen (CTO), Nadia Singer (Chief People Officer), Shaunt Voskanian (CRO), Sheila
              Vashee (CMO), Nairi Hourdajian (CCO), and Brendan Mulligan (General Counsel). The board of directors is
              chaired by Dylan Field and includes John Lilly (Greylock, Lead Independent Director), Kelly Kramer, Lynn
              Vojvodich Radakovich, Daniel Rimer (Index Ventures), Mamoon Hamid (Kleiner Perkins), Bill McDermott, Luis
              von Ahn, Mike Krieger, and Andrew Reed. Key-person risk centers on Dylan Field; his dual-class share
              position and founder-CEO status create strategic continuity but also concentration risk.
