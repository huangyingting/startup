      - number: '5.5'
        title: Product Roadmap, AI Transition, and Technical Risks
        blocks:
          - type: paragraph
            body: >
              Figma's roadmap for 2025–2026 is anchored on AI-native capabilities. Figma Make (text-to-UI generation),
              Sites (design-to-web publishing), Slides (design-to-presentation), and Weave (AI design systems)
              collectively represent a strategic shift from tool-of-record to AI-accelerated workflow layer. The Google
              Cloud partnership (Gemini and Imagen integration) provides access to state-of-the-art vision and language
              models without Figma bearing the cost of training proprietary foundation models.

              The primary technical risk is AI-native competitors that bypass the Figma canvas entirely: Google Stitch
              (free AI design platform, launched 2025), v0 by Vercel (React code generation from screenshots), and
              Lovable (app generation from prompts) all generate UI/front-end code directly without requiring a design
              step. If the design-to-code workflow continues to compress, fewer designers may be needed, and the
              seat-based revenue model faces structural pressure. Over 63% of design workflows are estimated to be
              automatable by AI by 2026 according to third party analysis, creating existential uncertainty for
              traditional design tooling.

              Secondary technical risks include platform dependency (all users require a modern browser and internet
              connection; Figma has limited offline capabilities), plugin ecosystem governance (malicious plugins could
              exfiltrate design IP despite sandboxing), and WebAssembly payload size (Figma's WASM bundle can slow
              initial load on slower connections, affecting user experience in price-sensitive emerging markets). The
              competitive response via Figma Make and Weave is credible but requires proof of enterprise adoption at
              scale.
