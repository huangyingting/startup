      - number: '5.3'
        title: Security, Compliance, and Trust Architecture
        blocks:
          - type: paragraph
            body: >
              Figma holds SOC 2 Type II certification (annual independent audit covering security, availability, and
              confidentiality trust service criteria). The company is GDPR compliant (EU data residency options
              available for enterprise contracts), CCPA compliant, and has HIPAA-eligible configurations for healthcare
              enterprise customers. As a public company since November 2025, Figma is subject to SOX (Sarbanes-Oxley)
              financial reporting controls, adding an additional layer of governance oversight. FedRAMP compliance (U.S.
              government cloud security) is not confirmed as of May 2026.

              Enterprise security features include SCIM (System for Cross-domain Identity Management) for automated user
              provisioning and deprovisioning, SAML/SSO integration (Okta, Microsoft Entra, Ping Identity), granular
              guest access controls, organization-wide library controls, and comprehensive audit logging with 365-day
              retention in the Enterprise tier. Data is encrypted at rest (AES-256) and in transit (TLS 1.2/1.3). Assets
              (design files) are stored in AWS S3 with server-side encryption.

              The plugin sandboxing model is a material security boundary: plugins run in isolated browser contexts with
              no direct file system or network access outside defined API channels. Enterprise customers can restrict
              plugin access through admin controls. In December 2024, Figma disclosed a bug bounty program through
              HackerOne, demonstrating responsible disclosure practices consistent with other enterprise SaaS companies.
            claimRefs:
