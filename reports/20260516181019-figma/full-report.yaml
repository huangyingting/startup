  - number: 5
    title: Product & Technology
    sections:
      - number: '5.1'
        title: Product Portfolio and Multi-Product Architecture
        blocks:
          - type: paragraph
            body: >
              Figma's product portfolio has evolved from a single collaborative design tool into a multi-product
              platform spanning the full product development lifecycle. The core product, Figma Design, is a
              browser-native vector design tool that enables real-time collaboration among designers, developers, and
              product managers. It supports high-fidelity UI/UX mockups, interactive prototyping, and design system
              management, and has become the de facto industry standard for digital product teams.

              FigJam is Figma's online collaborative whiteboard, launched in 2021. It targets brainstorming, planning
              workshops, and cross-functional meetings. FigJam AI adds automated summarization, idea clustering, and
              workshop facilitation. Dev Mode (launched 2023) provides developers with an inspection-focused view of
              designs, generating code snippets in CSS, iOS (Swift), Android, and React—directly competing with legacy
              handoff tools like Zeplin and Avocode, which it has largely displaced. Figma Slides (2024) is a
              presentation builder that allows embedding live design prototypes and FigJam boards into decks.

              Figma Make (2025), the company's most strategically significant AI product, enables users to generate UI
              components, entire screens, and interactive prototypes from text prompts. It uses Figma's own AI combined
              with Google Cloud's Gemini and Imagen models. Figma Weave (2026) extends AI capabilities to design
              systems, automating variable token management, brand compliance checks, and component suggestion. Figma
              Sites (2025) enables publishing design files directly as live websites. Across all products, 76% of
              Fortune 500 customers use two or more Figma products as of Q1 2026.
            claimRefs:
