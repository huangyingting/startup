              AI seat compression reducing net seat growth by 15 percent, NDR falling to 110 percent, FY2027 revenue of
              $1.35B, and multiple compression to 4.5x, implying approximately $22/share and 51 percent downside. The
              probability-weighted expected value is approximately $51/share, only marginally above the $45 current
