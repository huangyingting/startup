      - number: '1.3'
        title: Funding History and Capital Structure
        blocks:
          - type: paragraph
            body: >-
              Figma raised approximately $529 million in private venture capital across six rounds between 2015 and
              2022, from top-tier investors including Greylock Partners, Kleiner Perkins, Sequoia Capital, Andreessen
              Horowitz, Index Ventures, and Durable Capital Partners. A critical non-dilutive cash infusion came in
              December 2023 when Adobe paid a $1 billion contractual termination fee following the regulatory collapse
              of its proposed $20 billion acquisition of Figma; UK Competition and Markets Authority and EU regulators
              found the deal would harm competition in digital design software. A 2024 private tender offer set Figma's
              valuation at $12.5 billion, enabling employee and early investor liquidity ahead of the IPO. On July 31,
              2025, Figma debuted on the NYSE at $33 per share, raising approximately $1.2 billion and implying a $19.3
              billion valuation—one of the largest technology IPOs of 2025. First-day trading saw the stock surge to
              $115.50 (from a $85 open), temporarily pushing Figma's market capitalization to approximately $68 billion
              before a subsequent correction. By May 15, 2026, shares traded near $22.92, with a market cap of
              approximately $12 billion. As of March 31, 2026, Figma held $1.6 billion in cash, cash equivalents, and
              marketable securities.
