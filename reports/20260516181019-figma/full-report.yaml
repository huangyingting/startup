        - 220M+ users; 1M+ templates; Magic Studio AI; Affinity Designer for pros
        - Limited precision design; no developer handoff; no design-system management
      - - Miro
        - Visual collaboration / whiteboard
        - $400M raised; $17.5B valuation (Jan 2022)
        - Cross-functional product and innovation teams
        - 100M+ users; best-in-class facilitation, templates, sticky notes, diagramming
        - Not a design authoring tool; limited vector precision; no developer handoff
      - - Framer
