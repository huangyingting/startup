      - number: '5.2'
        title: Technology Architecture and Engineering Differentiation
        blocks:
          - type: paragraph
            body: >
              Figma's technical moat stems from its browser-native architecture built on WebAssembly (WASM), which
              compiles C++ and Rust graphics code to run at near-native speed in the browser. This architecture
              decision—made in the company's earliest engineering phase—allows Figma to render complex vector graphics,
              run real-time multiplayer collaboration, and handle large design files without a desktop application. No
              other design tool has fully replicated this approach at scale.

              The frontend stack uses TypeScript and React for UI components, with Canvas/WebGL for rendering. The
              WebAssembly bundle handles the compute-intensive vector engine. Real-time collaboration runs over
              WebSockets with operational transforms (OT) for conflict resolution when multiple users edit
              simultaneously. The backend is hosted on AWS and uses PostgreSQL (primary data store), Redis (session and
              cache), and S3 (asset storage). Backend services for vector computation use C++ and Rust for performance.

              The plugin ecosystem (700+ published plugins) runs in sandboxed iframes with a restricted JavaScript API
              (`window.figma`), preventing arbitrary file or network access. This sandboxing model is a security feature
              but also creates extensibility constraints. The REST API and Webhooks support enterprise integrations with
              Jira, GitHub, Slack, Microsoft Teams, and Notion. GitHub and Figma have a direct integration enabling
              design reviews within pull request flows, embedding Figma's design canvas into engineering workflows.
            claimRefs:
