              top-of-funnel adoption, while professional feature gates (SSO, advanced admin, branching, analytics) drive
              organizational upgrades. AI credits are priced at approximately $0.03/credit with potential monthly impact
              of $50–$200+ per power user, providing a nascent consumption revenue layer atop the subscription base.
