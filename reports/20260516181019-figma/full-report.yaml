      - number: '5.4'
        title: Customer Workflow Integration and Use-Case Depth
        blocks:
          - type: paragraph
            body: >
              Figma's deepest workflow integration is the design-to-development handoff cycle. A product team uses Figma
              Design for wireframes and high-fidelity mockups, FigJam for discovery workshops and retrospectives, Dev
              Mode for developer inspection of designs, and GitHub integration for embedding design states in code
              review pull requests. This full-cycle integration means that removing Figma requires replacing four
              distinct workflow tools simultaneously, dramatically raising switching costs and making Figma's churn rate
              structurally lower than a single-purpose tool.

              Design systems are the highest-value use case for enterprise customers. A design system in Figma consists
              of shared component libraries, design tokens (color, typography, spacing variables), and style guides
              maintained centrally and consumed across all product teams. Once a company's design system is built in
              Figma—a process requiring months of effort—migration to a competitor means not only redesigning the system
              but also retraining all consuming teams. Microsoft reported a 70% improvement in engineering handoff speed
              after standardizing on Figma design systems, and Figma has published case studies showing productivity
              gains across Netflix, GitHub, Dropbox, and dozens of Fortune 500 clients.

              The non-designer user base (two-thirds of MAU) is a strategic advantage: product managers and developers
              using Figma for wireframing, annotations, and feedback loops create cross-functional stickiness that
              design-tool-only competitors (Sketch) cannot replicate. This breadth is also why Figma's NDR of 139%
              reflects true expansion rather than price increases—organizations expand by adding new seat types and use
              cases, not just design headcount.
            claimRefs:
