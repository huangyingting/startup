      - number: '3.5'
        title: Moat Durability, Commoditization Risk, and Adverse Evidence
        blocks:
          - type: paragraph
            body: >-
              Figma's moat is real but narrowing under AI pressure. The collaboration moat (multiplayer, real-time
              editing) was genuinely defensible from 2016–2022 when technical complexity prevented replication; by 2025,
              Penpot, Framer, and other browser-based tools have basic multiplayer functionality, eroding this
              advantage. The plugin ecosystem moat remains durable—thousands of third-party integrations take years to
              replicate—but is vulnerable if AI-native tools (v0, Lovable, Cursor) bypass the design layer entirely and
              generate production code from prompts, making plugins irrelevant. The most significant commoditization
              risk is in AI-assisted prototyping: Vercel v0 can generate a React component or full page layout from a
              text prompt in seconds, eliminating the design-to-code handoff that Figma Dev Mode charges $35/dev/mo to
              facilitate. If AI-first code generation without wireframing becomes the standard development workflow for
              new projects, Figma's addressable use case at the prototype/handoff boundary shrinks. Adverse evidence
              includes: (1) Figma's UI3 redesign (2024) triggered significant user backlash and accelerated evaluation
              of Penpot among professional users, providing Penpot with inbound interest it had not previously enjoyed;
              (2) Adobe's $1B breakup fee and the failed $20B acquisition crystallized that Figma faces a well-resourced
              platform competitor that will continue to invest in design-adjacent AI tools (Firefly, GenStudio); (3)
              Canva's Affinity acquisition gives it professional-grade vector and photo tools that historically kept
              Canva out of Figma's core market. On the other hand, Figma's 139% net dollar retention, accelerating
              revenue growth to 46% YoY in Q1 2026, and 690,000 paid customers with 1,525 accounts above $100K ARR
              provide strong evidence that the current moat is holding and enterprise expansion is proceeding ahead of
              competitive erosion.
