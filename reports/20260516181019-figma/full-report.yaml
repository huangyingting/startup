      - number: '3.3'
        title: Capability, Pricing, and GTM Comparison
        blocks:
          - type: paragraph
            body: >-
              On capabilities, Figma is the only tool that combines: real-time multiplayer canvas with pixel-precise
              vector design, full design system management with component libraries and variable tokens, interactive
              prototyping without plugins, native developer handoff (Dev Mode) with code snippets and inspect panel, and
              AI-augmented features (Figma Make, text-to-design, auto-layout suggestions). Sketch has comparable design
              quality on Mac but lacks native multiplayer editing (requires Abstract or Kactus for version control), has
              no Windows support, and its web features are read-only for non-subscribers. Adobe no longer has a
              strategic design tool for product teams—XD is in maintenance mode and Creative Cloud's design capabilities
              are split across Illustrator, Photoshop, and Adobe Express. Adobe Firefly (generative AI) is powerful but
              requires Creative Cloud subscription. Canva has superior template breadth (over 1 million templates) and
              is dramatically easier for non-designers but lacks precision drawing tools, design systems, and developer
              handoff. Miro has the best whiteboarding and facilitation features but is not a design authoring tool. On
              pricing, Figma's Professional plan at $12/editor/mo (billed annually) is mid-market; Sketch Standard at
              approximately $9/editor/mo is cheaper for Mac-only teams; Canva Pro at approximately $15/user/mo targets a
              wider audience. For enterprises, Figma Enterprise at $75/editor/mo plus optional Dev Mode at $35/dev/mo
              represents a significant per-seat cost that creates churn risk if Canva Enterprise or Penpot self-hosted
              can replicate critical workflows. On GTM, Figma's dominant PLG motion—free Starter plan with unlimited
              drafts, viral multiplayer invitations—has been uniquely effective. Sketch explicitly states on its pricing
              page that it does not offer a free tier because 'free plans are unsustainable,' relying instead on a
              30-day trial. Canva is aggressively PLG with a generous free tier supporting five users. Penpot is free
              forever when self-hosted. This three-way pricing dynamic means Figma faces PLG pressure from the low end
              (Canva, Penpot free tiers) and enterprise budget pressure from open-source (Penpot) and AI tools (Vercel
              v0) simultaneously.
