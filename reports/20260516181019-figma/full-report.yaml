              Google Cloud is an emerging secondary dependency: Figma's AI features (Make, Weave, AI autocomplete) are
              powered by Google Cloud's Vertex AI and Gemini models pursuant to a partnership announced at Config 2025.
              If this partnership is terminated or the models are deprecated, Figma's AI product roadmap would require
              significant re-architecture. The partnership terms are not publicly disclosed.


              Browser vendors (Google/Chrome, Apple/Safari, Mozilla/Firefox) represent a platform dependency for Figma's
