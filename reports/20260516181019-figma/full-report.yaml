    title: Company Overview
    sections:
      - number: '1.1'
        title: Company Identity and Market Position
        blocks:
          - type: paragraph
            body: >-
              Figma, Inc. is a San Francisco-headquartered cloud-native software company offering the leading
              browser-based collaborative interface design platform. Founded in 2012 by Dylan Field and Evan Wallace at
              Brown University, Figma launched its first product preview in 2015 and opened to the public in 2016,
              quickly becoming the de facto standard for product design workflows at technology companies worldwide. The
              company traded on the New York Stock Exchange under the ticker FIG as of July 31, 2025, following a
              landmark IPO that valued Figma at $19.3 billion. Figma operates as a SaaS business with a per-editor seat
              subscription model supplemented by enterprise contracts. Its platform encompasses Figma Design (core
              collaborative vector design), FigJam (digital whiteboard), Figma Slides (presentation tool), Dev Mode
              (developer handoff), and AI-powered features including Figma Make, MCP integration, and Figma Weave. As of
              May 2026, Figma's NYSE-listed shares implied a market capitalization of approximately $12 billion
              following post-IPO correction, even as revenue growth continued to accelerate. Figma's competitive
              positioning rests on deep real-time collaboration, browser-first architecture, and multiplayer-first
              design that enables simultaneous editing by thousands of contributors—capabilities that Adobe's
              desktop-native Creative Cloud cannot replicate natively.
