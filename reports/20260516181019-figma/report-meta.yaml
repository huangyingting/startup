companyProfile:
  summary: >
    Figma is the world's leading cloud-based design collaboration platform, founded in 2012 by
    Dylan Field and Evan Wallace. The platform combines design, prototyping, developer handoff,
    and AI-powered design generation (Figma Make) in a single browser-native environment. Figma
    IPO'd on the NYSE (ticker: FIG) in November 2025 at approximately $35/share after Adobe's
    proposed $20B acquisition was blocked by FTC antitrust regulators in December 2023.
    As of Q1 2026, Figma has approximately 95% Fortune 500 penetration and serves 15,218 customers
    spending more than $10K ARR (growing 37% YoY) and 1,525 customers spending more than $100K ARR
    (growing 48% YoY).
  foundedDate: "2012-01-01"
  founders:
    - name: "Dylan Field"
      role: "Co-Founder and CEO"
      background: "Stanford dropout; built Figma after seeing collaboration problems in design workflows"
    - name: "Evan Wallace"
      role: "Co-Founder and CTO"
      background: "Brown University; pioneer in browser-based WebGL rendering for design"
  foundingLocation: "San Francisco, CA"
  headquarters: "San Francisco, CA"
  productSummary: >
    Figma offers four core products: (1) Design - cloud-based UI and UX design tool with real-time
    collaboration; (2) FigJam - online whiteboarding and ideation platform; (3) Figma Make - AI-powered
    design generation using Vertex AI (credits model); and (4) Dev Mode - developer handoff and
    code inspection tooling. Sold primarily as a seat-based SaaS with freemium self-serve and
    enterprise motion (Organisation tier).
  customerFocus: >
    Enterprise and mid-market digital product teams, including product managers, UX/UI designers,
    front-end developers, and design system teams. Primary buyers are Head of Design, VP Product,
    and CTO at Fortune 500 and mid-market technology companies.
  businessModel: >
    Seat-based SaaS with freemium self-serve on-ramp and enterprise upmarket expansion. Three tiers:
    Starter (free), Professional ($15/seat/month), and Organisation (Enterprise, custom pricing).
    AI credits (Figma Make) sold as a consumption add-on. Land-and-expand model evidenced by 139%
    NDR as of Q1 2026.
  stage: "Public (NYSE: FIG)"
  fundingStatus: >
    IPO completed November 2025 (NYSE: FIG) at approximately $35/share, raising approximately
    $1.5B gross proceeds. Prior to IPO raised approximately $335M across multiple rounds including
    $200M Series E at $10B valuation (2021). Total raised prior to IPO approximately $335M.
  disclosureProfile: public
  claimRefs: [CV001, CV002, CV003, CV004, CV005, CV006]

