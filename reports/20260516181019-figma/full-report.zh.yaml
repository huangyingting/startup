      - number: '5.5'
        title: 产品路线图、AI 转型与技术风险
        blocks:
          - type: paragraph
            body: >
              Figma 2025–2026 年路线图围绕 AI 原生能力展开。Figma Make（文本生成 UI）、Sites（设计到网页发布）、Slides（设计到演示文稿）和 Weave（AI
              设计系统）合在一起，标志着公司正从记录工具转向 AI 加速的工作流层。 Google Cloud 合作（Gemini 和 Imagen 集成）让 Figma
              可以接入最前沿的视觉和语言模型，而不必承担自训专有基础模型的成本。

              首要技术风险来自完全绕过 Figma 画布的 AI 原生竞争者：Google Stitch（免费 AI 设计平台，2025 年推出）、Vercel 的 v0（从截图生成 React 代码）和
              Lovable（用提示词生成应用）都能直接生成 UI / 前端代码，不再需要设计步骤。 如果设计到代码的工作流继续压缩，所需设计师可能减少，按席位收费的收入模式将承受结构性压力。第三方分析估计，到 2026
              年，超过 63% 的设计工作流可由 AI 自动化，这给传统设计工具带来生存级不确定性。

              次要技术风险包括平台依赖（所有用户都需要现代浏览器和互联网连接；Figma 离线能力有限）、插件生态治理（恶意插件即便在沙箱下仍可能外泄设计 IP），以及 WebAssembly 载荷大小（Figma 的
              WASM 包在较慢连接上会拖慢首次加载，影响价格敏感新兴市场的用户体验）。 Figma Make 和 Weave 的竞争回应可信，但还需要证明企业能够大规模采用。
