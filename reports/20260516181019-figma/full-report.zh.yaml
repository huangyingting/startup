      - number: '7.3'
        title: 合作伙伴与依赖风险
        blocks:
          - type: paragraph
            body: >
              Figma 的技术栈依赖少数关键基础设施和集成伙伴。AWS 是最关键的单一依赖：所有计算、存储、数据库和 CDN 基础设施都运行在 AWS 上。 虽然 AWS 拥有业内领先的正常运行时间
              SLA，但任何区域故障或账户级事件（例如账单纠纷、某司法辖区针对 AWS 的监管行动）都会立刻影响该地区所有 Figma 客户。 Figma 看起来没有发布多云灾备计划。


              Google Cloud 正成为新兴的第二依赖：根据 Config 2025 宣布的合作，Figma 的 AI 功能（Make、Weave、AI 自动补全）由 Google Cloud 的 Vertex AI 和
              Gemini 模型提供支持。 如果这一合作终止或模型被弃用，Figma 的 AI 产品路线图将需要大幅重构。合作条款未公开披露。


              浏览器厂商（Google/Chrome、Apple/Safari、Mozilla/Firefox）是 Figma 基于 WebAssembly 的渲染引擎的平台依赖。
              第三方集成伙伴——Atlassian（Jira/Confluence 嵌入）、Microsoft（Teams/Office 集成）、GitHub（Dev Mode）、Okta 和 Microsoft
              Entra（企业 SCIM/SSO）——可能限制或降级其集成 API，尽管这些集成的切换成本是对称的，且没有任何一个构成单点故障。
