      - number: '8.3'
        title: 可比估值分析
        blocks:
          - type: paragraph
            body: >
              可比公司集合横跨四类：直接设计工具同业（Canva 私有，约 20x ARR）、现任竞争者（Adobe，约 8.5x NTM）、已具规模的生产力协作 SaaS（Atlassian 9x NTM、Datadog
              14x NTM），以及历史交易（2021 年 Slack-Salesforce 约 26x ARR）。 Figma 按 7.5x NTM FY2027 交易，较 Canva 和 Datadog 明显折价，但与
              Adobe 大致相当，并略低于 Atlassian。 较 Canva 的折价反映私募市场流动性溢价；较 Datadog 的折价反映 AI credit 变现证明出现前，Figma 尚未获得 AI 平台重估。

              在 2023 年后利率环境下，NDR 高于 100%、收入增速高于 35% 的企业 SaaS 公司，历史上通常可获得 8-15x NTM 收入倍数。 Figma 的 7.5x
              位于区间低端，说明按增长调整后具备相对价值。 可比公司集合给出的公允价值走廊约为 $44-$68/share，基准情景 $55 较 $45 参考价上行 22%。
