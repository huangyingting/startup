companyProfile:
  summary: >
    Figma 是全球领先的云端设计协作平台，Dylan Field 和 Evan Wallace 2012 年创办。平台把设计、原型、开发者交付和 AI 驱动的设计生成（Figma Make）放进同一个浏览器原生环境。Adobe 拟以
    $20B 收购 Figma，但 2023 年 12 月被 FTC 反垄断监管机构叫停；此后 Figma 于 2025 年 11 月在 NYSE 上市（股票代码：FIG），发行价约 $35/share。到 Q1 2026，Figma
    约渗透 95% 的 Fortune 500，服务 15,218 个 ARR 超过 $10K 的客户（同比增长 37%）和 1,525 个 ARR 超过 $100K 的客户（同比增长 48%）。
  foundedDate: '2012-01-01'
  founders:
    - name: Dylan Field
      role: 联合创始人兼 CEO
      background: Stanford 辍学生；看到设计工作流里的协作问题后创办 Figma
    - name: Evan Wallace
      role: 联合创始人兼 CTO
      background: Brown University；浏览器端 WebGL 设计渲染先行者
  foundingLocation: San Francisco, CA
  headquarters: San Francisco, CA
  productSummary: >
    Figma 提供四个核心产品：（1）Design——带实时协作的云端 UI 和 UX 设计工具；（2）FigJam——在线白板与创意平台；（3）Figma Make——使用 Vertex AI 的 AI
    驱动设计生成（信用点模型）；（4）Dev Mode——开发者交付与代码检查工具。公司主要以基于席位的 SaaS 销售，采用免费自助入口和企业销售并行的模式（Organisation 层级）。
  customerFocus: |
    企业和中端市场的数字产品团队，包括产品经理、UX/UI 设计师、前端开发者和设计系统团队。主要买方是 Fortune 500 和中端市场科技公司的设计负责人、产品副总裁和 CTO。
  businessModel: >
    基于席位的 SaaS，免费自助入口负责获客，企业上行扩张负责放大合同。三档价格：Starter（免费）、Professional（$15/seat/month）和 Organisation（Enterprise，定制价格）。AI
    信用点（Figma Make）作为按量增购项销售。Q1 2026 的 139% NDR 证明了先落地、再扩张的模型。
  stage: 'Public (NYSE: FIG)'
  fundingStatus: >
