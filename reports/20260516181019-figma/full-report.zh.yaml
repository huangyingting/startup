      - number: '7.5'
        title: AI 颠覆、财务与投资逻辑破裂风险
        blocks:
          - type: paragraph
            body: >
              AI 颠覆风险是 Figma 最重要的投资逻辑破裂场景。四类 AI 原生工具威胁 Figma 价值链的不同环节：（1）设计到代码工具（Vercel 的
              v0、Lovable、Bolt），通过自然语言直接生成生产代码，完全绕过设计步骤，消除对 Figma 原型的需求；（2）AI 设计生成工具（Google
              Stitch），可从提示词生成设计资产，可能压缩企业专业设计师人数；（3）可通过 API 直接读取和修改 Figma 文件的 AI 原生智能体（新兴能力）；（4）嵌入竞争产品中的 AI 驱动原型工具（Canva
              AI、Microsoft Designer、Adobe Firefly）。


              Figma 的回应——Make（Figma 内部 AI 生成）、Weave（开发者 AI）和 Sites（无代码发布）——是可信防守，但它是反应式回应，而不是 AI 原生优先。
              风险不在于现有客户今天离开（2026 年 Q1 139% NDR 证明留存），而在于随着 AI 原生工具在新项目类别进入 Figma 的 PLG 漏斗前就截获需求，新队列进入速度放缓。


              财务风险包括：（1）GAAP 经营亏损持续（2026 年 Q1 利润率 -41%，主要来自股权薪酬）；（2）AI credits 变现爬坡不确定（Figma 对 Make 收取 AI credit
              使用费，但未单独披露收入贡献）；（3）如果增长减速，当前约 7.9x EV/Revenue 面临倍数压缩风险；（4）如果 AI 投资支出加速，GAAP 盈利能力可能永远无法兑现。


              本投资逻辑的终止标准是：NDR 连续两个季度跌破 115%；ARR 超过 $100K 的客户数绝对增速同比放缓至 20% 以下；Figma 将重要具名企业账户流失给 AI 原生替代品；或 Google
              Stitch/v0 集成触达设计工具工作流市场的 10% 以上。
            claimRefs:
              - CR027
              - CR028
              - CR029
              - CR030
              - CR031
              - CR032
              - CR033
              - CR034
              - CR035
