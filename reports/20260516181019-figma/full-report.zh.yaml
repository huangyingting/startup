      - number: '5.3'
        title: 安全、合规与信任架构
        blocks:
          - type: paragraph
            body: >
              Figma 持有 SOC 2 Type II 认证（年度独立审计覆盖安全性、可用性和保密性三项信任服务标准）。 公司符合 GDPR 要求（企业合同可选择欧盟数据驻留），也符合
              CCPA，并为医疗健康企业客户提供符合 HIPAA 条件的配置。 2025 年 11 月成为上市公司后，Figma 受 SOX（Sarbanes-Oxley）财务报告控制约束，治理监督又多了一层。 截至 2026
              年 5 月，FedRAMP（美国政府云安全）合规尚未确认。

              企业安全功能包括：用于自动用户开通和停用的 SCIM（跨域身份管理系统）、SAML/SSO 集成（Okta、Microsoft Entra、Ping
              Identity）、细粒度访客访问控制、全组织范围的库控制，以及 Enterprise 层保留 365 天的完整审计日志。 数据静态加密采用 AES-256，传输中加密采用 TLS
              1.2/1.3。资产（设计文件）存储在 AWS S3，并启用服务器端加密。

              插件沙箱模型是一道重要安全边界：插件在隔离的浏览器上下文中运行，除定义好的 API 通道外，不能直接访问文件系统或网络。 企业客户可以通过管理员控制限制插件访问。2024 年 12 月，Figma 通过
              HackerOne 披露了漏洞赏金计划，显示其负责任披露实践与其他企业 SaaS 公司一致。
