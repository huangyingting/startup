      - number: '3.3'
        title: 能力、定价与 GTM 对比
        blocks:
          - type: paragraph
            body: >-
              从能力看，Figma 是唯一同时具备以下要素的工具：实时多人画布、像素级精确矢量设计、带组件库和变量 token 的完整设计系统管理、无需插件的交互原型、原生开发者交付（Dev
              Mode，含代码片段和检查面板）以及 AI 增强功能（Figma Make、文本到设计、自动布局建议）。Sketch 在 Mac 上设计质量相当，但缺少原生多人编辑（需要 Abstract 或 Kactus
              做版本控制），没有 Windows 支持，并且 web 功能对非订阅者只读。Adobe 不再拥有面向产品团队的战略性设计工具——XD 已进入维护模式，Creative Cloud 的设计能力分散在
              Illustrator、Photoshop 和 Adobe Express。Adobe Firefly（生成式 AI）能力强，但需要 Creative Cloud 订阅。Canva 模板广度更强（超过 1
              million 个模板），对非设计师也容易得多，但缺少精密绘图工具、设计系统和开发者交付。Miro 白板和引导协作能力最好，但不是设计创作工具。定价上，Figma Professional 计划
              $12/editor/mo（按年计费）处于中端；Sketch Standard 约 $9/editor/mo，对纯 Mac 团队更便宜；Canva Pro 约
              $15/user/mo，面向更宽人群。企业端，Figma Enterprise $75/editor/mo，加可选 Dev Mode $35/dev/mo，单席位成本不低；如果 Canva Enterprise
              或自托管 Penpot 能复制关键工作流，就会带来流失风险。GTM 上，Figma 以 PLG 为主导——免费 Starter 计划、不限量草稿、病毒式多人邀请——效果独特。Sketch
              在定价页明确表示不提供免费层，因为“免费计划不可持续”，转而依赖 30 天试用。Canva 也激进走 PLG，免费层可支持五名用户。Penpot 自托管则永久免费。这种三方定价动态意味着，Figma 同时承受低端
              PLG 压力（Canva、Penpot 免费层）和来自开源（Penpot）及 AI 工具（Vercel v0）的企业预算压力。
            claimRefs:
              - CP017
              - CP018
              - CP019
              - CP020
