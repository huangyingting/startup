      - number: '6.5'
        title: 扩张动态与集中度风险
        blocks:
          - type: paragraph
            body: >
              Figma 的先落地再扩张模型在结构上很强：团队最初通常为一个用例部署 Figma（常见是原型或线框图），随后扩展到更多团队，加入 FigJam 做引导和创意发散，启用 Dev Mode 做开发交接，最终升级到
              Org 或 Enterprise 层以获得管理员控制。 企业账户中 76% 的多产品采用率证明这一扩张模式已在规模上生效，139% 的 NDR 则是它的财务表达。


              集中度风险看起来较低。Figma 拥有 690,000 个付费组织、估计 1,525 个企业账户，尚无公开信息显示单一客户贡献超过 5% 收入——不过 Figma 的公开文件未披露客户级收入集中度。
              最接近的代理指标是 ARR 超过 $100K 的客户群估计贡献总 ARR 的 55–65%：若该客户群有 1,525 个成员，则隐含每个企业账户平均合同额约 $440K–$500K，与显著广度一致。


              扩张的关键风险包括：（1）AI 原生设计工具（Google Stitch、v0、Lovable）崛起，可能在新设计工作流进入 Figma 的 PLG
              漏斗前就截流；（2）席位扩展到非设计师用户后，价格敏感度上升，因为这些用户的单席收入低于完整编辑席位；（3）高度监管行业（金融服务、政府）存在采购摩擦，FedRAMP 级认证仍然缺失。
              分析师的关键反向分析指出，如果 AI 自动化减少大型企业设计师人数，Figma 的总可触达席位基础可能收缩而非扩张——这一风险尚未反映在 139% NDR 中，但值得持续观察到 2026 年 Q3。
