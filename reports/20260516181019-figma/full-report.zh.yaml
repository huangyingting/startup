      - number: '4.5'
        title: 财务缺口与尽调阻碍
        blocks:
          - type: paragraph
            body: >
              尽管已经是上市公司，Figma 仍未披露 SaaS 分析中常见的几项单位经济指标：（1）获客成本（CAC）以及 magic number 或 CAC 回本周期等销售效率比率；（2）按产品线拆分的
              ARR（Design、FigJam、Dev Mode、Slides、Make）；（3）队列留存瀑布数据；（4）按客户分群拆分的毛利率。这些遗漏限制了精确的 LTV/CAC 建模。

              2026 年 3 月推出 AI 信用点，引入了消费型收入组成部分，但其变现轨迹、附着率和利润率结构尚未披露。管理层提到 50–75% 的企业客户每周使用 AI
              工具，但信用点与席位订阅各自贡献多少收入没有拆出。从纯席位切换到“席位 + 消费”的混合计费，会增加模型复杂度和投资者不确定性。

              国际收入集中度也是缺口：Figma 约 85% 用户在美国以外，但国际收入仅约
