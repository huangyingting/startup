  - number: 8
    title: 估值
    sections:
      - number: '8.1'
        title: 投资建议与投资逻辑
        blocks:
          - type: paragraph
            body: >
              Figma 提供了一个有吸引力的长期投资案例，核心支撑是市场领导力、网络效应，以及同类最佳的 SaaS 财务画像。 91% 毛利率、139% 净美元留存率和截至 2026 年 Q1 46%
              同比收入增长放在上市软件公司中极为少见。 以 $45/share 参考价计，股票约按 7.5x 未来十二个月 FY2027 收入交易，相对上市可比公司估值合理；但鉴于 AI
              颠覆风险仍真实存在且尚未充分量化，安全边际有限。

              投资逻辑有五根支柱：（1）在设计协作中具备持久市场领导力，Fortune 500 渗透率约 95%；（2）Figma Make 和 Vertex AI 加深护城河，把 Figma 定位为 AI
              原生平台，而不是被颠覆目标；（3）财务飞轮质量高，91% 毛利率、139% NDR 与 FCF 转正并存；（4）文件格式、插件生态和开发者交接集成带来可防御切换成本；（5）估值纪律要求在建满仓前等待 20-25%
              回撤。 反向逻辑聚焦于 AI 设计工具在 3-5 年维度压缩专业席位 TAM，这是多年持有投资者面临的最关键结构性不确定性。
            claimRefs:
