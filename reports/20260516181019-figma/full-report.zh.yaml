      - number: '2.2'
        title: TAM、SAM 与 SOM 规模测算
        blocks:
          - type: paragraph
            body: >
              由于市场范围定义差异很大，UI/UX 设计软件的市场规模估算在不同分析机构之间最多相差 5×。Dataintelo 将 2025 年 TAM 估为 $9.8B，并以 24.1% CAGR 增至 2034 年的
              $67.4B。Verified Market Reports 独立估算 2025 年为 $10.5B。这些更宽口径定义纳入了企业设计系统、开发者交付工具和相邻原型类别。Mordor Intelligence
              口径更窄，估算 2025 年为 $1.98B，到 2031 年以 32% CAGR 增至 $11.66B。GlobalGrowthInsights 估算 2025 年为 $2.4B，并在 2035 年前维持
              15.3% CAGR。


              Figma 自己的 S-1 和 IPO 披露声称 TAM 为 $33B，几乎比分析师估算高
              3–17×。公司把所有产品团队协作、设计运营和与软件开发相邻的工作流都纳入计算。更宽的视觉云市场——包括创意云工具、协同设计和内容平台——预计到 2029 年将以 13.5% CAGR 增至 $237.3B；如果
              Figma 成功定位为跨职能平台，这就是长期扩张边界。


              Figma 的 SAM——云原生、设计优先协作平台能现实触达的部分——在面向产品型组织的专业设计、原型和开发者交付范围内估计为 $7–10B（2026）。当前 SOM 由 FY2025 $749M 收入和 Q1
              2026 年化运行率约 $1.33B 锚定，意味着占估算 SAM 的 10–19%。North America 贡献全球市场收入的 38–39%，与 Figma 自身约 38% 的美国用户集中度一致。APAC
              是增长最快区域，CAGR 为 33%（Mordor Intelligence），由 India 和 Southeast Asia 的移动优先产品开发驱动。
