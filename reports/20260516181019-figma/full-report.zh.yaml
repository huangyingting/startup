      - number: '8.4'
        title: 投资逻辑破裂触发器与监控框架
        blocks:
          - type: paragraph
            body: >
              报告定义了五个投资逻辑破裂触发器，每个都有明确可观察阈值和操作含义。 NDR 是最需要密切监控的指标：若连续两个季度持续跌破 120%，将显示结构性流失和扩张失败，从而推翻支撑整个估值溢价的先落地再扩张逻辑。
              AI 席位压缩是单一事件中后果最重的一项，因为它会把 TAM 重新定义为结构性收缩，无论短期收入表现如何，倍数都会坍塌。

              2026 年 Q2 财报（预计 2026 年 8 月）是下一个重大投资逻辑验证事件。 三项披露最重要：AI credit 附着率、按层级划分的席位数进展，以及管理层对竞争胜率的评论。
              如果这三项出现任何负面意外，且没有 NDR 韧性抵消，应立即触发减仓。 这些触发器划出了周期性正常化（继续持有）与结构性逻辑失败（立即退出）的分界线。
            claimRefs:
              - CV024
              - CV025
              - CV026
              - CV027
              - CV028
              - CV029
              - CV030
