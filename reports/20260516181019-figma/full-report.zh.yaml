      - number: '3.2'
        title: 竞品画像：规模、融资与战略
        blocks:
          - type: paragraph
            body: >-
              Sketch（Sketch B.V.，荷兰所有，自举且盈利）2010 年推出，在 Figma 2016 年公开发布前一直主导 Mac 端 UI 设计。它迁移到订阅模式（Standard 计划约
              $9/editor/mo，按年计费，覆盖 1–14 名编辑；Business 计划面向 15+ 编辑，带 SSO 和 SCIM），并在 2023 年推出网页检查器和只读分享。Sketch 仍只能在 Mac
              上编辑——这一持续的结构性限制阻碍了其在 Windows/Mac 混合企业中的采用——并在 2024 年推出 .fig 文件导入器以降低从 Figma 迁移的难度，释放了竞争压力信号。Canva（Canva
              Pty Ltd，Sydney, Australia）累计融资 $3.6B，2021 年 Series F 估值 $26B。其 Magic Studio 套件——包括 Magic Design、Magic
              Write、Magic Edit——提供文本生成图像、背景移除和演示生成。2024 年 3 月收购 Serif 的 Affinity 套件，补上了专业级 Affinity Designer（Illustrator
              替代品）和 Affinity Photo（Photoshop 替代品）。Canva Enterprise 列出的客户包括 FedEx、Salesforce、Reddit 和
              Expedia。Miro（RealtimeBoard Inc., US）最近一次融资是在 2022 年 1 月，从 ICONIQ Growth 和 Accel 融资 $400M，估值 $17.5B；其服务
              250,000 个组织中的 100M+ 用户，包括 Nike、IKEA、Deloitte 和 Cisco。Framer（Framer B.V., Amsterdam）是免费增值的 no-code
              网站构建器和设计工具，带 AI，可根据提示词生成页面布局和组件；其定价从免费起，付费计划为 $5–$30/project/mo。Penpot（Kaleidos Inc.,
              Spain）是开源、浏览器端设计工具，采用 MPL 2.0 许可，定位为注重隐私主权的 Figma 替代品，在 EU 公共部门和数据敏感型企业客户中获得牵引。Vercel v0（Vercel Inc., San
              Francisco）是一项 AI 代码生成服务，可根据文本提示词生成 React/Next.js 组件，按 token 定价，并直接与 Figma Dev Mode 竞争。Zeplin
              是开发者交付工具（Basic 起价 $17/project，Advanced 和 Enterprise 按席位定价），自 Figma 推出 Dev Mode 复制其核心功能后，所处利基正在收窄。
