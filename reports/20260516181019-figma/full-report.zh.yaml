      - number: '2.4'
        title: 增长驱动因素与采用约束
        blocks:
          - type: paragraph
            body: >
              主要增长驱动因素包括：（1）远程和混合办公常态化——68% 的设计团队已把实时协作视为关键选择标准，直接利好 Figma 的浏览器原生架构；（2）企业数字化转型支出在 2025 年升至收入的 7.5%；（3）AI
              辅助设计影响约 49% 的 UI/UX 软件购买决策；（4）通过 FigJam、Dev Mode 和 Slides 扩张非设计师席位，139% NDR 已经给出证据；（5）移动优先应用开发让 UI/UX 工具在
              BFSI、医疗、零售和政府数字服务中都变成刚需。


              关键采用约束包括：企业已把 Figma 嵌入 CI/CD 管线、设计系统和多团队库，切换成本高；超过 50% 的组织把数据安全和合规要求（GDPR、HIPAA、SOC
              2、FedRAMP）列为采用云端设计平台的主要障碍；AI 原生设计创业公司（Penpot、Galileo AI、Vercel v0）可能把基础 UI 生成商品化；新兴市场仍有网络基础设施缺口。


              AI 自动化存在结构性风险——研究显示，最高 70% 的常规起草任务可能被自动化——即便 Figma 向非设计师工作流扩张，每席位付费意愿或设计师总人数也可能被压缩。Fortune 500 已接近饱和（95%
              渗透率），也意味着企业层级新增客户增长有限；扩张收入取决于现有账户内多产品附着率能否加深。
