      - number: '3.5'
        title: 护城河耐久性、商品化风险与反向证据
        blocks:
          - type: paragraph
            body: >-
              Figma 的护城河真实存在，但在 AI 压力下正在变窄。协作护城河（多人、实时编辑）在 2016–2022 年确实可防守，因为技术复杂度阻止了复制；到 2025 年，Penpot、Framer
              和其他浏览器端工具已经具备基础多人功能，侵蚀了这一优势。插件生态护城河仍然耐久——数千个第三方集成需要多年复制——但如果 AI
              原生工具（v0、Lovable、Cursor）完全绕过设计层，直接从提示词生成生产代码，插件就会变得无关紧要。最大的商品化风险在 AI 辅助原型：Vercel v0 可以在数秒内根据文本提示词生成 React
              组件或完整页面布局，消灭 Figma Dev Mode 以 $35/dev/mo 收费来促成的设计到代码交付。如果不经线框图的 AI-first 代码生成成为新项目标准开发工作流，Figma 在原型 /
              交付边界上的可触达用例会收缩。反向证据包括：（1）Figma 的 UI3 改版（2024）引发明显用户反弹，加速专业用户评估 Penpot，为 Penpot 带来此前没有的主动需求；（2）Adobe 的 $1B
              分手费和 $20B 收购失败，清楚表明 Figma 面对一个资源充足的平台型竞争者，后者会继续投资设计相邻 AI 工具（Firefly、GenStudio）；（3）Canva 收购 Affinity
              后拥有专业级矢量和照片工具，而这些能力过去让 Canva 留在 Figma 核心市场之外。另一方面，Figma 139% 净美元留存率、Q1 2026 收入增速加快至 46% YoY、690,000
              个付费客户以及 1,525 个 $100K ARR 以上账户，都强力证明当前护城河仍守得住，企业扩张也跑在竞争侵蚀之前。
