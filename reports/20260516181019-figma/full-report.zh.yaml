            body: >
              按 9x NTM FY2027 收入 $1.65B、约 270M 稀释股数计算，基准情景内在价值约为 $55/share，较 $45 参考价上行 22%。 这一倍数由 Atlassian 可比公司和 Figma
              更高的 139% NDR 支撑。
