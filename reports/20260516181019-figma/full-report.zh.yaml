      - number: '8.5'
        title: 最终尽调问题与投资 KPI
        blocks:
          - type: paragraph
            body: >
              在配置满仓前，六项未解决尽调事项构成重大信息缺口。AI credit 单位经济性优先级最高；部分数据将在 2026 年 Q2 10-Q（预计 2026 年 8 月）中可见。 对 Google Stitch 和
              V0 的竞争胜率需要与企业设计团队买家做渠道访谈，因为没有公开披露。 按层级划分的席位数趋势至关重要，它能区分 NDR 扩张究竟来自定价，还是来自真实席位增长。 这三项缺口会阻碍满仓规模配置。

              投资 KPI 记分卡按七个维度评价 Figma：市场机会 8/10（$40B TAM 大且有 AI 可选性）、产品证明 9/10（同类最佳执行）、竞争护城河 7/10（强，但中期有 AI 威胁）、财务质量
              8/10（FCF 转正、91% GM）、风险画像 5/10（多重风险叠加）、估值入场 6/10（估值合理但不便宜）、证据质量 7/10（监管文件强，AI 竞争数据弱）。 总体平均 7/10
              支持在当前价格配置半仓；满仓配置应留给 20-25% 回撤和尽调问题解决之后。
