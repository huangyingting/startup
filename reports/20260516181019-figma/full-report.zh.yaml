  - id: TM003
    title: 细分市场 / 买家图谱
    summary: Figma buyer segments by company size, role, and geography with budget ownership and adoption path.
    notes: 按公司规模划分的用户份额来自 6sense 和 Dataintelo（非 Figma IR）；收入份额来自分析师对 Figma 披露的汇总。地域收入拆分未获官方披露。
    plannedTableRef: segment-buyer-map
    columns:
