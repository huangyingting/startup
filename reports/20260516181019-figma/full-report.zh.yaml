        - Mac 原生精度、公平定价、开放文件格式、.fig 导入器
        - 编辑器仅限 Mac；无 Windows；非订阅用户网页版只读
      - - Adobe Creative Cloud（XD 已停用）
        - 创意平台 / 既有巨头
        - 上市公司（ADBE）；年收入 $21B+
        - 企业创意和营销团队
        - 印刷、照片、视频能力顶尖；Firefly AI；企业覆盖极深
        - XD 于 2023 年停用；无专门产品设计工具；UX 碎片化
      - - Canva
        - 创意平台 / 相邻
        - 已融资 $3.6B；估值 $26B（2021）；2024 年 3 月收购 Affinity 套件
        - 非设计师营销人员、SMB、内容团队、教育
        - 220M+ 用户；1M+ 模板；Magic Studio AI；面向专业人士的 Affinity Designer
        - 精细设计能力有限；无开发者交接；无设计系统管理
      - - Miro
        - 视觉协作 / 白板
        - 已融资 $400M；估值 $17.5B（2022 年 1 月）
        - 跨职能产品和创新团队
        - 100M+ 用户；协作引导、模板、便利贴、图表能力顶尖
        - 不是设计创作工具；矢量精度有限；无开发者交接
      - - Framer
        - 设计转网站 / 无代码
        - 私营；融资未披露
        - 搭建营销网站和原型的设计师
        - AI 生成页面布局；输出接近代码质量的 React；实时发布网站
        - 不是完整 UI/UX 设计系统工具；不支持应用开发者检查 / 交接
      - - Penpot
        - 开源设计工具
        - Kaleidos（西班牙）支持；MPL 2.0 开源
        - 数据主权企业、欧盟公共部门、开源倡导者
        - 可自托管；基于浏览器；SVG 原生；永久免费；无供应商锁定
        - 插件生态更小；模板更少；企业支持深度不足
      - - Vercel v0
        - AI 原生代码生成
        - 私营（Vercel）；估值 $2.5B（2023）
        - 构建 Web UI 的开发者和技术型创始人
        - 根据文本提示生成生产级 React/Next.js；集成 Vercel 部署
        - 不是设计工具；无可视画布；无设计系统；不支持设计师协作
      - - Zeplin
        - 开发者交接
        - 私营；融资未披露
        - 未使用 Figma Dev Mode 团队的设计-开发交接
        - 交接规格、样式指南、标注能力强；集成 Slack 和 Jira
        - Figma Dev Mode 复制核心交接功能后，护城河收窄
      - - Galileo AI
        - AI 原生 UI 生成
        - 种子轮阶段；约融资 $4.9M（2023）
        - 基于文本提示快速生成 UI 概念
        - 单条提示即可生成完整 UI 屏幕；概念探索速度快
        - 仅限概念阶段；不是完整设计系统或原型工具
      - - Google（Slides / Drawings / Material）
        - 既有玩家 / 内部自建
        - 上市公司（GOOGL）；年收入 $350B+
        - Google 内部团队；企业 Workspace 用户
        - 深度集成 Workspace；Material Design 系统；Workspace 订阅用户免费
        - 无专门产品设计创作；无原型制作或开发者交接
