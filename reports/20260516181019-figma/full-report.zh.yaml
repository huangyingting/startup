        - 需要一手研究；4-6 周
      - - 分层级席位数
        - starter / professional / org 层级的绝对席位数趋势
        - 区分价格驱动的 NDR 与数量驱动的 NDR，关系到模型稳健性
        - 2026 年 Q2 10-Q 或投资者日
        - 可能需要直接询问 IR
      - - AI 对毛利率的影响
        - AI 积分毛利率与传统席位毛利率
        - 检验 AI 规模化是否会把混合毛利率压到 88% 阈值以下
        - 2026 年 Q2 财报电话会或 10-Q 注释
        - 管理层评论可部分解决
      - - FigJam 企业采用
        - FigJam 企业渗透率与交叉销售附加率
        - 上行情景期权；量化第二产品对乐观情景的贡献
        - 2026 年 Q2 10-Q 或投资者日补充材料
        - 低优先级；提供信息但不构成阻断
      - - 禁售期到期安排
        - 准确禁售期到期日与内部人持股安排
        - 供给压力时点影响近期入场价格纪律
        - SEC Form 4 文件和 S-1 招股说明书禁售表
        - 现在可从 SEC EDGAR 获取
    notes: 第 1-3 项决定能否配置完整仓位；第 4-6 项提供信息但不构成阻断
    claimRefs:
      - CV031
      - CV032
      - CV033
      - CV034
