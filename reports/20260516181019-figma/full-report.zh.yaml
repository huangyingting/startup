  - number: 2
    title: 市场分析
    sections:
      - number: '2.1'
        title: 市场边界与替代品
        blocks:
          - type: paragraph
            body: >
              Figma 的核心市场是专业 UI/UX
              设计软件：产品、设计和工程团队用云端平台创建、原型化并交付数字界面。该市场包括线框图、高保真视觉稿、交互原型、设计系统管理、开发者交付（设计到代码）和实时协同白板。不包括高端视觉制作（用于印刷和照片的 Adobe
              Photoshop/Illustrator）、消费者图形设计（Canva/Adobe Express）以及工程 CAD/PLM 协作工具（AutoCAD、SolidWorks、Onshape）。


              现状替代品因买方分群而异。企业设计团队过去依赖 Sketch（仅 macOS、文件型）、Adobe XD（2023 年停止开发）和 InVision 做原型。非设计相关方用 Miro、Mural 或
              PowerPoint 做白板，用 Zeplin/Avocode 做开发者交付。上述工具要么代表 Figma 的直接份额流失，要么代表产品团队把工具整合到单一平台时的持续扩张机会。


              云部署主导 UI/UX 软件市场，占使用量 68–71%，相对本地部署替代方案仍以更高 CAGR 扩张。这一结构性迁移利好
              Figma：它完全浏览器原生，没有本地部署产品，因此既是云迁移的主要受益者，也在受监管行业中更暴露于云端特有的安全和合规要求。
            claimRefs:
              - CM001
              - CM002
              - CM003
              - CM004
              - CM005
