      - number: '4.2'
        title: 收入增长与规模里程碑
        blocks:
          - type: paragraph
            body: >
              Figma 2025 年跨过 $1B 年化收入门槛，披露 FY2025 收入约 $1.06B（同比增长 41%），此前 FY2024 为 $749M（同比增长 48%），FY2023 为 $505M。Q1
              2026 收入 $333.4M，明显高于分析师预期，并保持 46% YoY 增长，隐含年化运行率约 $1.33B。Q1 业绩发布后，管理层上调 2026 全年指引，市场一致预期 FY2026 约 $1.37B。

              139% 的净美元留存率（Q1 2026，高于 Q4 2025 的 136%）凸显先落地、再扩张引擎：现有企业客户持续增加席位并升级层级。支付 >$100K ARR 的 1,525 个客户同比增长 48%，贡献约
              37% 总收入，既带来有意义的集中度，也带来耐久的大单管线。支付 >$10K ARR 的 15,218 个客户同比增长 37%，构成中端市场扩张层。

              增长主要来自 Fortune 500 内部席位深度（其中 95% 已使用 Figma），因此边际收入驱动不是净新客户，而是把只读用户转成付费席位、向现有设计团队交叉销售
              FigJam/Slides，以及把开发者席位（Dev Mode）引入工程组织。
