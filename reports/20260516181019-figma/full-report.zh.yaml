  - number: 3
    title: 竞争格局
    sections:
      - number: '3.1'
        title: 竞争格局概览
        blocks:
          - type: paragraph
            body: >-
              Figma 位于多圈层竞争格局的中心。最内圈是直接的专业设计工具，包括 Sketch（仅 Mac，订阅价约 $9/editor/mo）、Framer（带 AI 代码生成的网站 /
              原型构建器，免费增值）以及已停止开发的 Adobe XD（自 2023 年起进入维护模式，不再新增功能）。Sketch 保有忠诚的 Mac 中心设计师群体，但自 Figma
              的多人画布成为行业默认后，结构性劣势一直存在；Sketch 的网页视图对没有许可证的协作者只读，限制了其在大型跨职能团队中的采用。第二圈是相邻平台：Miro 和 Mural（视觉协作 / 白板，Miro 估值
              $17.5B）争夺设计前的创意和工作坊工作流，吃掉原本可能流向 FigJam 的预算。第三圈战略意义最大：Canva 估值 $26B 的创意平台，在 2024 年 3 月收购 Affinity
              套件（Affinity Designer、Photo、Publisher）后，已把自己定位为同时替代 Figma 和 Adobe Creative Cloud 的全谱系创意平台，尤其面向营销和内容团队。Canva
              的 220M+ 用户远大于 Figma 的 690,000 付费客户，不过 Canva 面向的是更宽、更低技术门槛的人群。第四圈 AI 原生工具——Vercel v0、Galileo
              AI、Anima、Builder.io——正在成为替代威胁：它们能从自然语言提示词直接生成 React 代码或完整 UI 屏幕，绕开 Figma Dev Mode
              变现所依赖的传统设计交付工作流。最后，大型科技公司的设计系统团队（Google 的 Material Design 工具、Microsoft 的 Fluent UI
              系统）自建工具压力构成长期现状风险，不过多数团队选择采用 Figma，而不是自建替代品。近期最值得注意的市场退出是 InVision，它在 2024 年 12 月 31
              日关闭产品，把残余设计协作和交付用户主要让给 Figma 和 Zeplin。UX Tools 2024 设计工具调查发现，专业设计工具市场出现“前所未有的行业整合”，Figma 主导专业细分，竞品则专注相邻利基。
