      - number: '5.2'
        title: 技术架构与工程差异化
        blocks:
          - type: paragraph
            body: >
              Figma 的技术护城河来自浏览器原生架构。该架构基于 WebAssembly（WASM），把 C++ 和 Rust 图形代码编译后在浏览器中以接近原生的速度运行。公司在最早工程阶段就做出这一架构决定，使
              Figma 能渲染复杂矢量图形、运行实时多人协作，并处理大型设计文件，而无需桌面应用。其他设计工具尚未在规模上完整复制这一做法。

              前端栈用 TypeScript 和 React 构建 UI 组件，用 Canvas/WebGL 负责渲染。WebAssembly bundle 处理计算密集型矢量引擎。实时协作通过 WebSockets
              运行，并用操作变换（OT）在多人同时编辑时解决冲突。后端托管在 AWS，使用 PostgreSQL（主数据存储）、Redis（会话和缓存）以及 S3（资产存储）。面向矢量计算的后端服务使用 C++ 和 Rust
              以获得性能。

              插件生态（700+ 已发布插件）运行在沙箱化 iframe 中，使用受限 JavaScript
              API（`window.figma`），防止任意文件或网络访问。该沙箱模型是一项安全功能，但也带来可扩展性约束。REST API 和 Webhooks 支持与
              Jira、GitHub、Slack、Microsoft Teams 和 Notion 的企业集成。GitHub 与 Figma 有直接集成，可在 pull request 流程中进行设计评审，把 Figma
              设计画布嵌入工程工作流。
