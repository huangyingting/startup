  - id: TM001
    title: 市场定义表
    summary: 'Figma''s market boundary: included spend, excluded spend, adjacent categories, and status-quo substitutes.'
    notes: 边界和替代品分类由分析师基于公开来源判断；Figma 未发布官方市场分类。
    plannedTableRef: market-definition-table
    columns:
      - 维度
      - 描述
      - Figma 定位
      - 尽调备注
    rows:
      - - 核心市场（范围内）
        - 云原生 UI/UX 设计、原型制作、设计系统、开发者交接、协作白板
        - 覆盖 Figma Design、FigJam、Dev Mode、Slides 的核心产品
        - 品类份额 40.65%（6sense 2025）
      - - 排除：印刷 / 照片制作
        - Adobe Photoshop、Illustrator、InDesign 面向印刷和摄影
        - 未覆盖；仅属相邻领域
        - Adobe 在该子领域是既有玩家，切换成本高
      - - 排除：消费者图形设计
        - Canva、Adobe Express 面向非专业、模板驱动内容
        - 与 SMB 有交集，但买家不同（营销人员 vs. 设计师）
        - Canva ARR 达 $4B（2025）；TAM 不同
      - - 排除：工程 CAD/PLM
        - AutoCAD、SolidWorks、Onshape 面向 3D / 机械工程设计
        - 未覆盖；渲染范式不同
        - 作为独立 $372M 市场跟踪（IntelMarketResearch 2024）
      - - 替代品：Sketch
        - 仅限 macOS、基于文件的 UI 设计工具；Figma 之前的重要玩家
        - Figma 已取代其主导位置；仍有坚守工作室使用
        - Sketch 份额从 45%（2017）降至 ~4.5%（2025）
      - - 替代品：Adobe XD
        - Adobe 的设计 / 原型工具；2023 年 3 月停更
        - XD 停更的主要受益者
        - Adobe XD 退场前份额为 10–14%
      - - 相邻：白板 / 异步协作
        - Miro、Mural、Notion 用于头脑风暴和团队对齐
        - FigJam 直接竞争；对非设计用户形成部分替代
        - FigJam 在 PM 和非设计师群体中增长
      - - 相邻：开发者交接工具
        - Zeplin、Avocode —— 把设计转成代码规格
        - Dev Mode 将该环节整合进 Figma
        - 已有 Zeplin 客户流向 Figma 的记录
