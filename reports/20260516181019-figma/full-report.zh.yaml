      - 用户基数占比
      - 预算负责人
      - 核心用例
      - 采用路径
      - 收入含义
    rows:
      - - Fortune 500 企业
        - 用户约 ~13%；覆盖 95% 的 Fortune 500 公司
        - 工程副总裁 / 产品副总裁
        - 大规模设计系统、设计运营、开发者交接
        - 设计师自下而上采用 → 自上而下采购
        - 37% 收入来自 1,525 个 ARR >$100K 客户
      - - 中端市场（100–999 名员工）
        - 用户基数 ~42%
        - 设计负责人 / CTO
        - 多团队产品设计、原型制作、FigJam 规划
        - 试用 → 团队计划 → 企业版升级
        - 约 27% 收入来自约 10,076 个 ARR $10K–$100K 客户
      - - SMB / 初创公司（<50 名员工）
        - 用户基数 ~44%
        - 创始人 / 首席设计师
        - MVP 线框图、产品设计、快速原型
        - 免费层 → Figma Professional；价格敏感
        - 约 36% 收入来自约 439K 个 ARR <$10K 客户
      - - 非设计师（PM、开发者、营销人员）
        - MAU 约 ~66%（跨职能）
        - 与主细分市场共用预算
        - FigJam 工作坊、Dev Mode 代码检查、Slides 演示文稿
        - 现有账户内逐步扩席
        - 139% NDR 的主要驱动；无单独公开拆分
      - - 北美（主要地区）
        - 用户基数 ~38–46%
        - 随公司规模而变
        - Figma 全套产品；企业交易密度最高
        - 自下而上 + 自上而下的企业销售
        - 最大收入地区；无官方收入拆分
      - - 印度 / 亚太
        - 印度约 ~7–11%；亚太 CAGR 33%
        - 科技初创创始人 / 开发者主导团队
        - 设计 + Dev Mode；成本敏感；英语优先
        - 免费增值驱动；初创生态增长
        - 用户高增长；ARPU 低于北美
      - - 受监管行业（BFSI、医疗健康）
        - 未公开量化
        - CTO / CISO 负责合规监督
        - 符合 SOC 2、HIPAA、FedRAMP 的设计环境
        - 安全审查 → 企业采购周期长
        - 销售周期更长；合规功能可溢价
  - id: TM004
    title: 增长驱动与约束表
    summary: >-
      Structured inventory of Figma market growth drivers and adoption constraints with estimated impact and
      implications.
    notes: 影响评级为基于分析师报告的定性估计；没有 Figma 披露的量化指标支撑。
    plannedTableRef: growth-drivers-and-constraints-table
    columns:
      - 因素
      - 类型
      - 估计影响
      - 对 Figma 的含义
    rows:
      - - 远程 / 混合办公常态化
        - 驱动
        - 高：68% 设计团队需要协作优先工具
        - 结构性顺风；浏览器原生架构高度契合
      - - 数字化转型支出（2025 年占收入 7.5%）
        - 驱动
        - 高：企业软件预算持续增长
        - 数字产品成了每家企业的核心，Figma 随之受益
      - - 非设计师席位扩张（FigJam、Dev Mode、Slides）
        - 驱动
        - 高：139% NDR 反映跨职能采用
        - 近期主要增长杠杆，不依赖新增企业标识
      - - AI 辅助设计功能（影响 49% 采购决策）
        - 驱动
        - 中高：AI 已成主要采购标准
        - Figma Make、Figma AI、MCP 集成可能加速企业销售
      - - 移动优先应用热潮（占 UI/UX 需求 39.57%）
        - 驱动
        - 中：APAC 与消费科技增长
        - 推动科技、BFSI、医疗垂直的新企业客户
      - - Fortune 500 接近饱和（渗透率 95%）
        - 约束
        - 中：客户标识增长受限；扩张靠席位驱动
        - 需要更深账户渗透；存在席位天花板风险
      - - 高切换成本（双刃剑）
        - 约束
        - 中：拖慢 Figma 替代坚守 Sketch / Creative Cloud 用户的速度
        - 对留存有利；对新获客构成门槛
      - - 安全 / 合规采购摩擦
        - 约束
        - 中：>50% 将安全列为采用云设计工具的首要障碍
        - 扩张受监管行业需要 FedRAMP、HIPAA 认证
      - - AI 原生竞争者替代（Penpot、Galileo、Vercel v0）
        - 约束 / 风险
        - 目前低-中；3–5 年内可能升至高
        - 可能把基础 UI 生成商品化；Figma 必须掌控 AI 层
      - - AI 自动化减少设计师人数
        - 约束 / 风险
        - 低-中：最多 70% 常规草图可自动化
        - 可能压缩设计师席位池；非设计师扩张可部分抵消
      - - 新兴市场网络基础设施缺口
        - 约束
        - 低：尽管基础设施不均，APAC 增长仍强
        - 限制低带宽地区采用实时协作
