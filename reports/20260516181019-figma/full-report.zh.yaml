      - number: '2.3'
        title: 买方与用户分群
        blocks:
          - type: paragraph
            body: >
              Figma 的用户基数在结构上很特殊：月活跃用户中约三分之二不是设计师，而是产品经理、开发者、营销人员和其他跨职能相关方。因此，Figma 的 TAM 扩张故事，与其说是招募新设计师，不如说是把
              Miro、Notion、PowerPoint 等通用协作工具从非设计工作流中挤出去，并把现有账户转成价值更高的多产品企业合同。


              按公司规模，小企业（50 人以下）占 Figma 用户基数的 44%，中型公司（100–999 人）占 42%，大型企业（1,000+）约占 13% 用户，但对收入贡献明显更高。截至 Q1 2026，1,525
              个客户支付超过 $100K ARR（约 37% 收入），15,218 个客户支付超过 $10K ARR。底部约 439K 个低于 $10K ARR 的客户贡献 36% 收入，同时也是企业转化的主要漏斗顶部。


              从地域看，38% 的 Figma 用户位于美国，其后是 India（约 7%）和 Brazil（约 8.7%）。95% 的 Fortune 500 使用
              Figma，意味着这一群体内的增量企业增长主要靠席位深度，而不是获取净新客户。预算归属各不相同：企业合同通常落在工程副总裁或产品副总裁名下；SMB 采购则由个人设计师或创业公司创始人通过免费增值转化路径推动。
