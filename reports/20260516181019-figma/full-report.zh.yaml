      - number: '7.2'
        title: 运营、安全与技术风险
        blocks:
          - type: paragraph
            body: >
              Figma 的浏览器原生架构带来显著分发优势，但也造成集中技术依赖。平台依赖 AWS 计算、PostgreSQL 数据库持久化、Redis 缓存和 S3 文件存储——全部跑在单一云服务商上。 长时间 AWS
              故障（尤其在 us-east-1 或 eu-west-1）会让所有 Figma 用户同时遭遇服务中断；Figma 没有公开记录的多云故障切换架构。 Figma 公开状态页记录的历史故障包括 2023 年和
              2024 年事件，曾导致大批用户数小时性能降级，但没有披露数据丢失或重大客户流失。


              Figma 存储所有客户设计 IP——包括未发布产品路线图、品牌资产和专有设计文件——都在其云基础设施中，因此安全风险显著抬升。 一旦发生重大安全漏洞，690K+
              付费组织的高度敏感、上市前产品知识产权可能暴露，带来重大法律、声誉和流失风险。 Figma 持有 SOC 2 Type II 认证并每年进行渗透测试，但尚未取得 ISO 27001 认证或 FedRAMP
              授权，这限制了其在安全要求极高的企业客户面前的防御力。


              平台依赖 WebAssembly（用于 C++/Rust 画布引擎），也就依赖浏览器厂商。如果 Chrome、Safari 或 Firefox 大幅改变 WebAssembly 实现，或封锁某些
              API，Figma 的渲染引擎可能需要大量重构。 鉴于 WebAssembly 已由 W3C 标准化，这一风险概率被评估为较低，但缓释路径需要多年工程投入。 规模性能仍是有记录的限制：超过约 1,000
              个画框的文件会出现明显性能下降（加载慢、实时同步卡顿），这是 G2 和 TrustRadius 评论中最常见的抱怨，也是代理商处理高容量活动时的真实流失风险。
            claimRefs:
