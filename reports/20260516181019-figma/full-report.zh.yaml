      - number: '4.3'
        title: 毛利率、成本结构与 GAAP 盈利路径
        blocks:
          - type: paragraph
            body: >
              Figma 91% 的毛利率在 SaaS 公司中属于一流水平，反映了纯软件交付模型：没有硬件、库存或重大第三方 COGS（AWS 基础设施成本是主要 COGS 项）。Q1 2026 non-GAAP 经营利润率
              16%，确认底层业务已经盈利；GAAP 经营利润率为 -41%（亏损 $137.4M），几乎完全来自股权激励以及 IPO 时 RSU 归属带来的工资税。

              按 GAAP 口径，2024 年运营费用飙升至 $1.539B，而收入为 $749M，费用 / 收入比达到 205%，由一次性股票要约交易和 IPO 相关薪酬推动。2025 年销售和营销费用披露为收入的
              55%（GAAP），受股权激励抬高；底层现金 S&M 支出低得多。随着 Figma 加速 AI 产品开发（Figma Make、Figma Weave），R&D 投入大且继续增长，对工程人员规模形成上行压力。

              Q1 2026 自由现金流为 $88.6M（27% FCF 利润率），说明即便 GAAP 亏损，业务仍能产生有意义现金。经营现金流为 $97.3M（29% 利润率）。2025 全年 FCF 为正，受 Adobe
              在 2024 年初支付的 $1B 分手费现金注入以及持续订阅回款推动。由于股权薪酬摊销，GAAP 净利润预计至少到 FY2026 仍为负。
