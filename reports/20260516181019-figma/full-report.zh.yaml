            title: AI 席位压缩：尾部风险
            body: >
              $22/share 的悲观情景（下行 51%）只需要 AI 压缩导致净席位增长减少 15%，再叠加 NTM 倍数压缩至 4.5x。 鉴于 Google Stitch
              和新兴生成式设计工具，这一尾部风险并非微不足道。仓位规模应反映这种下行不对称。
            calloutType: insight
            claimRefs:
              - CV012
              - CV025
          - type: callout
            title: 入场纪律：选择性低于 $38/share
            body: >
              概率加权期望价值约 $51/share，在 $45 参考价下提供的上行有限。 低于 $38/share（较 $44 公允价值底部折价 15%）启动半仓，能显著改善风险回报比，把基准情景回报推至约
              45%，同时将悲观情景下行限制在 42%。
            calloutType: insight
            claimRefs:
