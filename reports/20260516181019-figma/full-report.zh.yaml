      - number: '7.4'
        title: 人员与执行风险
        blocks:
          - type: paragraph
            body: >
              CEO Dylan Field 是联合创始人，自 2012 年 Figma 创立以来一直领导公司，构成首要关键人物集中风险。 Field 是 Figma 产品愿景的公众面孔、PLG
              模型背后的驱动力，也是平台战略的主要设计者。 无论自愿还是非自愿离任，都会造成重大战略不确定性，并很可能引发高管团队动荡。 公司未公开披露正式 CEO 继任计划。CTO Kris Rasmussen 和 CPO
              Yuhki Yamashita 提供了一定替补深度，但两人都尚未证明在 Field 缺席时能稳住投资者信心。


              IPO 后，人才留存挑战上升。Figma 的股权薪酬池现在受公开市场价格透明度约束，期权已完全归属的早期员工留存激励下降。 FY2025 约 $170M 的股权薪酬构成有意义的稀释压力。同时，Figma 与 AI
              原生初创公司（提供更高潜在上行）、Google DeepMind 和 OpenAI 争夺工程人才——这些公司都在积极招聘 Figma 自身路线图所依赖的设计 / AI 交叉技能人才。


              公司从创始人领导的私营公司转型为承担季度财报义务的上市公司，执行风险也随之上升。 持续给出指引并进行公开财务报告所需的纪律，与 Figma 早期追求速度的文化不同。
              早期上市公司失误（指引落空、会计问题、投资者沟通失败）可能在高估值倍数下对投资者信心造成不成比例的伤害。
