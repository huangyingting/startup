      - number: '6.4'
        title: 留存、耐久性与满意度
        blocks:
          - type: paragraph
            body: >
              Figma 的留存指标位居上市 SaaS 第一梯队。139% 的净美元留存率（2026 年 Q1）显著高于 SaaS 中位数（约 115%），也高于 Snowflake（127%）和 HubSpot（截至
              2025 年约 100%）等同业。 虽然 Figma 未单独披露总美元留存率（GDR），但 139% NDR 与 ARR 正增长的组合，意味着 GDR 远高于 90%，与低 logo 流失相符。


              第三方评论平台印证了客户满意度：截至 2026 年 Q1，G2 上 Figma 在超过 23,000 条评论中得分 4.7/5.0，位于设计工具类别第 95 百分位。 TrustRadius 同样给 Figma
              8.7 / 10，并对协作功能和跨团队可访问性打出高分。 评论中的常见抱怨集中在超大文件（>1,000 个画框）的性能，以及缺少离线模式——但两者都未造成企业账户中有记录的重大流失。


              管理层称，企业合同期限在「多数战略账户中为多年期」（转述自财报电话会评论），这提高了前瞻收入可见度，也相较月度订阅安排抬高了切换成本。 基于已报告 NDR 轨迹和 ARR 增长的估计队列分析显示，企业客户
              logo 留存率在 90–95% 区间，尽管 Figma 未发布明确的 GDR 或队列表。
