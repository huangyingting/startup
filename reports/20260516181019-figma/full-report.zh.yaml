      - number: '2.5'
        title: 规模测算缺口与尽调备注
        blocks:
          - type: paragraph
            body: >
              最大缺口在于，没有独立分析机构采用与 Figma 自报 $33B TAM 相同的市场边界。最宽的独立估算（$9.8–10.5B）仍意味着，按当前收入运行率，Figma 已经拿下其分析师定义 TAM 的
              7–14%。投资者需要压力测试：Figma 的 $33B 扩张路径究竟是否需要替代 Adobe Creative Cloud
              的核心专业用户基础（对抗性强、切换成本高），还是能靠自然工作流扩张进入相邻非设计协作类别来实现。


              分群质量受限于 Figma 公开文件没有披露官方地域收入拆分或分群级 ARR。用户人口数据（按用户数计，44% SMB、42% 中端市场、13% 企业）来自市场研究机构（6sense、Dataintelo），而非
              Figma 自身报告。Mordor 和 Dataintelo 使用的基准年口径不兼容，未经标准化就跨报告比较趋势并不可靠。
            claimRefs:
