  - number: 4
    title: 财务情况
    sections:
      - number: '4.1'
        title: 收入模型与定价架构
        blocks:
          - type: paragraph
            body: >
              Figma 几乎全部收入来自基于席位的 SaaS 订阅，并由 2026 年 3 月新推出的 AI
              信用点模型补充。定价阶梯有四档：Starter（免费，不限观看者）、Professional（$16/editor/month、$12/dev seat、$3/collab
              seat）、Organization（$55/$25/$5）和 Enterprise（$90/$35/$5），所有付费及以上层级均按年计费。Enterprise 标价为 $1,080/editor/year，经过
              20–35% 的协商量折后，通常实际落在 $700–$900。

              所有付费席位都打包 FigJam 和 Slides——Organization 层级以下没有“仅设计”SKU——这在不额外收费的情况下推动跨产品附着，并支撑 Figma 的多产品扩张叙事。收入确认遵循 ASC
              606 的可递延 SaaS 会计；在 2026 年 3 月引入 AI 信用点前，公司没有显著的使用量收入。

              免费转付费漏斗由 PLG 驱动：不限量观看者和 Starter 层级创造宽漏斗入口，而专业功能门槛（SSO、高级管理、分支、分析）推动组织升级。AI 信用点定价约 $0.03/credit，对重度用户每月可能带来
              $50–$200+ 影响，在订阅基座之上提供一个早期按量收入层。
