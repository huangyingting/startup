  - number: 5
    title: 产品与技术
    sections:
      - number: '5.1'
        title: 产品组合与多产品架构
        blocks:
          - type: paragraph
            body: >
              Figma 的产品组合已经从单一协同设计工具，演进为覆盖完整产品开发生命周期的多产品平台。核心产品 Figma Design 是浏览器原生矢量设计工具，让设计师、开发者和产品经理能够实时协作。它支持高保真
              UI/UX 视觉稿、交互原型和设计系统管理，并已成为数字产品团队的事实行业标准。

              FigJam 是 Figma 2021 年推出的在线协同白板，面向头脑风暴、规划工作坊和跨职能会议。FigJam AI 增加自动总结、想法聚类和工作坊引导。Dev Mode（2023
              年推出）给开发者提供以检查为中心的设计视图，可生成 CSS、iOS（Swift）、Android 和 React 代码片段，直接竞争 Zeplin 和 Avocode 等传统交付工具，并已基本替代它们。Figma
              Slides（2024）是演示构建器，允许把实时设计原型和 FigJam 白板嵌入演示文稿。

              Figma Make（2025）是公司最具战略意义的 AI 产品，让用户能根据文本提示词生成 UI 组件、完整屏幕和交互原型。它结合 Figma 自有 AI 与 Google Cloud 的 Gemini 和
              Imagen 模型。Figma Weave（2026）把 AI 能力延伸到设计系统，自动化变量 token 管理、品牌合规检查和组件建议。Figma Sites（2025）支持把设计文件直接发布为线上网站。截至
              Q1 2026，76% 的 Fortune 500 客户使用两个或更多 Figma 产品。
