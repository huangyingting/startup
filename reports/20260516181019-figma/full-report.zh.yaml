      - number: '3.4'
        title: 切换成本、锁定效应与网络效应
        blocks:
          - type: paragraph
            body: >-
              Figma 受益于几套相互嵌套的锁定机制，显著抬高成熟用户的切换成本。第一，.fig 文件格式是专有且封闭的；Figma 可以导入 Sketch 文件，但把完整 Figma
              项目导出到竞品需要定制迁移工具。Sketch 2024 年专门做了 .fig 导入器并开源，用来支持从 Figma 迁出，说明文件格式可迁移性是真实壁垒，Sketch
              也把它视作竞争话术。第二，设计系统嵌入很深：在 Figma 中搭建的组件库、变量 token、设计系统文档和品牌套件，无法无痛迁移到其他工具。大型企业账户如果花了 12–18 个月在 Figma
              中搭设计系统，单劳动力切换成本就可能达到六位数。第三，插件生态——数千个社区插件——形成网络效应：插件开发者优先面向
              Figma，导致其工作流集成（Jira、GitHub、Slack、Lottie、Zeplin、Storybook）比任何替代品都更完整。ProductHunt 用户评价确认，Figma
              在替代品中“插件生态无可匹敌”，并把跨平台支持（Windows 和 Mac）列为继续被锁定的原因，这一点 Sketch 无法复制。第四，Figma Community 是免费模板、UI kit
              和设计资源市场，已有数百万次使用；更多用户贡献会推高价值，形成内容飞轮，而 Penpot 和 Sketch 用户基数较小，难以匹配。多归属可以存在（有些团队同时用 Figma 和 Miro 或 Canva
              做白板或营销模板），但在核心产品设计工具层面，多归属因文件和工作流碎片化而很少见。Figma 的 MCP server 集成（2026 年推出）进一步增强分发力，它把 Figma 设计数据直接嵌入 VS Code
              和工程工作流，即使切换冲动来自设计师而非开发者，团队的迁移成本也会上升。
            claimRefs:
              - CP024
              - CP025
              - CP026
              - CP027
              - CP028
