      - number: '1.4'
        title: 财务规模与客户牵引
        blocks:
          - type: paragraph
            body: >-
              Figma 的收入增速持续加快：FY2024 收入为 $749 million（同比增长 48%），FY2025 收入首次超过 $1 billion，Q1 2026 收入达到 $333.4
              million（同比增长 46%），高于 Q4 2025 的 40% 增速。Q1 超预期后，Figma 将 2026 全年收入指引上调至 $1.422–$1.428 billion。截至 2026 年 3 月
              31 日，Figma 净美元留存率为 139%，为两年多来最高，说明现有账户内席位扩张强劲。付费客户基数同比增长 54%，达到约 690,000 个客户。其中，15,218 个客户贡献超过 $10,000
              年经常性收入（同比增长 37%），1,525 个客户贡献超过 $100,000（同比增长 48%），企业渗透力很强。Q1 2026 自由现金流为 $88.6 million（27% 利润率），经营现金流为
              $97.3 million。由于股权激励，Q1 2026 GAAP 经营亏损为 $137.4 million；non-GAAP 经营利润为 $52.1 million。包括 Figma Make 和 MCP
              在内的 AI 产品推动席位扩张加速，在 $100K+ ARR 客户中，AI 功能使用率超过 60%。
