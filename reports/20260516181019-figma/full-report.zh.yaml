      - number: '6.3'
        title: 指名客户证明与案例研究
        blocks:
          - type: paragraph
            body: >
              Figma 的企业参考客户基础很广，并包含公开记录的大客户成效。Microsoft 是 Figma 最常引用的参考客户之一；在其产品设计组织全面标准化采用 Figma 后，设计到开发交接时间缩短 70%。
              Microsoft 案例尤其有价值，因为它横跨 Design 和 Dev Mode 两条产品线，并由 Microsoft 自己发布的工程博客与 Figma 官方客户故事页相互印证。


              Netflix 已将其全球设计系统标准化在 Figma 上，使全球 150+ 名设计师能够在同一个共享组件库上协作，摆脱早期工具常见的版本控制混乱。 Netflix
              工程博客明确将其国际工作室之间设计文件分叉问题的消除归功于 Figma 的多人协作模型。


              GitHub、Airbnb、Dropbox 和 Spotify 均有已发布或被引用的客户故事，记录了从设计系统维护、品牌标准化到跨团队 FigJam 工作坊的用例。
              这些参考客户横跨四个不同行业（技术、酒店住宿、云存储和音乐流媒体），证明 Figma 不是小众定位，而是具备垂直行业广度。 这些案例质量很高：客户自己发布的工程和设计博客，而非仅有 Figma
              营销材料，印证了相关成果。
