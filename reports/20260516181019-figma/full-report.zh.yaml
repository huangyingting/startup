  - id: FV003
    title: 估值 / 回报区间
    type: range
    layout: standard
    summary: |
      相对 $45/share 参考价的乐观、基准、悲观情景回报区间（百分比），并单列概率加权期望值区间。
    data:
      items:
        - label: 悲观情景
          low: -51
          high: -30
        - label: 基准情景
          low: 10
          high: 30
        - label: 乐观情景
          low: 60
          high: 102
        - label: 概率加权 EV
          low: 8
          high: 18
    approximationNotes: >
      区间反映每个情景内的不确定性，而非单点估计。悲观情景低端为 4.5x/$1.35B 下的 -51%，高端为 5x/$1.45B 下的 -30%。基准情景低端为 8x/$1.55B 下的 +10%，高端为 9x/$1.65B 下的
      +30%。乐观情景低端为 11x/$1.80B 下的 +60%，高端为 13x/$1.90B 下的 +102%。
    claimRefs:
      - CV009
      - CV011
      - CV012
      - CV013
  - id: FV004
    title: 投资 KPI
    type: kpi
    layout: standard
    summary: |
      投委会评分卡以 1-10 分评价 Figma 七个维度，涵盖市场机会、产品证明、竞争护城河、财务质量、风险画像、估值入场和证据质量。
    data:
      items:
        - label: 市场机会
          value: 8/10
          detail: $40B TAM 以 12% CAGR 增长；AI 将可服务用例扩展到专业设计师之外
        - label: 产品证明
          value: 9/10
          detail: 一流执行；95% Fortune 500；139% NDR 验证产品市场契合
        - label: 竞争护城河
          value: 7/10
          detail: 强切换成本（插件、集成）；Google Stitch 带来的中期 AI 威胁可信
        - label: 财务质量
          value: 8/10
          detail: 91% 毛利率，2026 Q1 FCF 为正，$1.6B 现金无债务，收入增长 46%
        - label: 风险画像
          value: 5/10
          detail: 多重叠加风险：AI 颠覆、锁定期抛压、竞争、增长减速
        - label: 估值入场
          value: 6/10
          detail: 7.5x NTM 处于可比公司下沿；$51 概率加权 EV 相比 $45 上行有限
        - label: 证据质量
          value: 7/10
          detail: S-1/10-K/10-Q 文件强；AI 竞争胜率和渠道访谈数据弱
    approximationNotes: >
      分数为分析师定性判断，1-10 分锚定可比 SaaS 投资。市场机会锚定 IDC 设计软件 TAM 估计。财务质量锚定可观察的 91% 毛利率和 139% NDR。风险画像反映 AI 颠覆和锁定期不确定性的乘数效应。评分截至
      2026 年 5 月。
    claimRefs:
      - CV034
      - CV036
      - CV037
      - CV038
      - CV039
      - CV040
