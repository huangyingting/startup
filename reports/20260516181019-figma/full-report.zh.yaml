      - number: '5.6'
        title: 图表资料
        blocks:
          - type: callout
            title: WebAssembly 架构构成持久技术护城河
            body: >
              Figma 在 2012–2013 年决定把矢量图形引擎编译到 WebAssembly，是一次开创性的技术下注，竞争对手至今没有大规模复制。
              结果是一款基于浏览器的工具，性能接近原生应用，消除了安装摩擦，并支持无缝实时多人协作——没有任何桌面原生竞争者（Sketch、Adobe XD）做到同样组合。
              这道架构护城河不只是性能优势，更是协作护城河：任何有浏览器的利益相关者都能参与设计工作流，无需安装软件，这正是 Figma 三分之二 MAU 来自非设计师的原因。
            calloutType: strength
            claimRefs:
              - CE007
              - CE008
              - CE009
          - type: callout
            title: AI 原生设计绕行是生存级产品风险
            body: >
              Google Stitch、Vercel 的 v0、Lovable 和 Bolt 代表了一类新的 AI 工具：它们可直接从文本提示生成可运行的 UI / 前端代码，完全绕过设计画布。
              如果这一范式获得企业采用，Figma 以设计编辑收费的席位模式将面临结构性需求破坏。Figma Make 是公司的防守回应，但它进入的市场里，Google 可以凭借 Stitch
              近乎零边际部署成本补贴产品，以拉动企业云采用。 据报道，到 2026 年，63% 的设计工作流可由 AI 自动化。
            calloutType: risk
            claimRefs:
              - CE026
              - CE027
              - CE028
          - type: callout
            title: 设计系统锁定比编辑器锁定更有价值
            body: >
              Figma 产品中价值最高的切换成本不是理论上可以复制的编辑器，而是企业设计系统：数月积累下来的组件库、设计 token、品牌指南和跨团队使用模式。 一家 Fortune 500 公司的设计系统嵌进 Figma
              后，迁移就意味着重建系统、重新培训所有使用团队，并谈妥一套并行工作流过渡。 这种锁定效应在结构上类似 Salesforce 的 CRM 锁定——阻止流失的是数据和流程深度，而不是 UI。
            calloutType: insight
            claimRefs:
              - CE020
              - CE021
              - CE024
  - number: 6
    title: 客户情况
    sections:
      - number: '6.1'
        title: 客户基础与分层
        blocks:
          - type: paragraph
            body: >
              截至 2026 年 Q1，Figma 服务约 690,000 个付费组织，覆盖个人自由职业者到 Global 2000 企业。客户基础可分为三个可衡量商业层级：企业段（约 1,525 个组织，ARR 超过
              $100K）、中端市场段（约 13,693 个组织，ARR 为 $10K–$100K），以及庞大的 SMB / 长尾基础（约 675K 个组织，ARR 低于 $10K）。 目前约 95% 的 Fortune
              500 公司以某种形式使用 Figma，使其成为大型企业环境中协作式产品设计的事实标准。


              付费账户之外，Figma 估计拥有 13 million 月活用户，其中大多数通过免费层或受邀协作者身份进入付费工作区计划。 关键在于，约三分之二 MAU
              不是专业设计师，而是产品经理、工程师、市场负责人和高管，他们会定期查看或互动 Figma 文件。 这种跨职能渗透让 Figma 锁在工作流层，而不只是设计团队内部。


              从垂直行业看，技术和 SaaS 公司贡献最大收入份额，其后是金融服务、医疗健康、零售 / CPG、媒体 / 娱乐。 Figma Education 向符合条件的大学和 K-12
              机构免费开放平台，形成从学生到职场的漏斗，历史上为企业采用播下种子。 地域分布估计约 50% 来自北美、50% 来自国际市场（欧洲、APAC），但 Figma 未公开按地区拆分收入。
