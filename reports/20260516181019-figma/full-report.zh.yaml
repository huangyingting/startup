      - number: '8.2'
        title: 乐观 / 基准 / 悲观情景与回报框架
        blocks:
          - type: paragraph
            body: >
              估值框架使用三种情景，以 FY2027 未来十二个月收入估计 $1.35B–$1.90B、EV/NTM 倍数 4.5x–13x 为锚，并按概率加权。 基准情景（55-60% 概率）假设 NDR 放缓至
              125-130%，AI credits 增加约 $50M 增量收入，FY2027 收入达到 $1.65B，倍数维持在 9x NTM，隐含市值约 $14.9B，约 $55/share，较 $45 上行 22%。

              乐观情景（15-20% 概率）假设 NDR 维持在 140% 或以上，AI credits 增加 $100M 或更多收入，AI 平台重估推动倍数扩张至 13x，FY2027 收入达到 $1.90B，隐含约
              $91/share、上行 102%。 悲观情景（20-25% 概率）建模 AI 席位压缩使净席位增长减少 15%，NDR 降至 110%，FY2027 收入为 $1.35B，倍数压缩至 4.5x，隐含约
              $22/share、下行 51%。 概率加权期望价值约 $51/share，仅略高于 $45 当前价格，因此支持选择性、以回撤为条件的入场纪律。
