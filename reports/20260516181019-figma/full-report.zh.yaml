      - number: '5.4'
        title: 客户工作流集成与用例深度
        blocks:
          - type: paragraph
            body: >
              Figma 最深的工作流集成落在设计到开发交接这一环。产品团队用 Figma Design 做线框图和高保真原型，用 FigJam 做探索工作坊和复盘，用 Dev Mode 让开发者检查设计，再借助 GitHub
              集成把设计状态嵌入代码评审拉取请求。 这套全周期集成意味着，一旦移除 Figma，团队必须同时替换四种不同工作流工具，切换成本大幅上升，Figma 的流失率也因此比单一用途工具更低。

              对企业客户而言，设计系统是价值最高的用例。Figma 中的设计系统由共享组件库、设计 token（颜色、字体、间距变量）和样式指南组成，由中心团队维护，供所有产品团队使用。 一家公司把设计系统搭在 Figma
              上，通常要花数月；迁移到竞争对手不仅要重做系统，还要重新培训所有使用团队。 Microsoft 称，标准化采用 Figma 设计系统后，工程交接速度提升 70%；Figma 也发布过案例，显示
              Netflix、GitHub、Dropbox 以及数十家 Fortune 500 客户取得生产力提升。

              非设计师用户群（占 MAU 的三分之二）是战略优势：产品经理和开发者用 Figma 画线框、做批注、跑反馈闭环，形成跨职能黏性，单纯设计工具竞争者（Sketch）难以复制。 这也解释了为什么 Figma 139%
              的 NDR 体现的是真扩张，而不是涨价——组织扩张靠新增席位类型和用例，不只是增加设计师人数。
