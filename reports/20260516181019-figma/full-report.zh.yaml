      - number: '1.5'
        title: 风险与反向因素
        blocks:
          - type: paragraph
            body: >-
              尽管增长指标强劲，Figma 仍面对几项实质性风险。Adobe 收购失败移除了近期最大的流动性事件，也迫使 Figma 走独立 IPO 路线，直接暴露在公开市场波动中——上市后十个月内，市值从首日高点约 $68
              billion 跌至约 $12 billion，回调 82%。Figma 2024 年推出的改版用户界面（“UI3”）遭到核心专业用户明显反弹，批评集中在工作流被打断、复杂度上升，也加速了 Penpot
              等开源替代品的采用。随着 AI 原生设计工具（Vercel 的 v0、Lovable、Canva AI）在非设计师人群中获得牵引，分析师开始质疑 Figma
              的竞争护城河。企业账户收入集中，使公司依赖相对少数高价值客户关系的持续扩张。CEO Dylan Field 带来的关键人物风险因双重投票权结构进一步放大，董事会对其决策的约束有限。受股权激励影响，Figma 的
              GAAP 经营亏损仍然很大，投资者可能担心公司能否走向可持续的 GAAP 盈利。
