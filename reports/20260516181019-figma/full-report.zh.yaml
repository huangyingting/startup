      - number: '1.3'
        title: 融资历史与资本结构
        blocks:
          - type: paragraph
            body: >-
              2015 年至 2022 年，Figma 通过六轮私募风险融资合计募集约 $529 million，投资方包括 Greylock Partners、Kleiner Perkins、Sequoia
              Capital、Andreessen Horowitz、Index Ventures 和 Durable Capital Partners 等顶级机构。2023 年 12 月，Adobe 拟以 $20
              billion 收购 Figma 的交易在监管层面失败，Adobe 向 Figma 支付 $1 billion 合同终止费，这笔非稀释现金注入很关键；UK Competition and Markets
              Authority 和 EU 监管机构认为该交易会损害数字设计软件竞争。2024 年的私募要约交易将 Figma 估值定在 $12.5 billion，让员工和早期投资人在 IPO 前获得流动性。2025 年 7
              月 31 日，Figma 以每股 $33 在 NYSE 首日挂牌，募资约 $1.2 billion，隐含估值 $19.3 billion，是 2025 年最大科技 IPO 之一。首日交易中，股价从 $85
              开盘价冲至 $115.50，一度把 Figma 市值推到约 $68 billion，随后进入回调。到 2026 年 5 月 15 日，股价约 $22.92，市值约 $12 billion。截至 2026 年 3
              月 31 日，Figma 持有 $1.6 billion 现金、现金等价物和可交易证券。
