  - number: 7
    title: 风险
    sections:
      - number: '7.1'
        title: 监管与法律风险
        blocks:
          - type: paragraph
            body: >
              Figma 处在复杂的多司法辖区监管环境中，但截至 2026 年 Q1 10-Q 期间，没有披露重大诉讼。 GDPR 合规已经建立：Figma 发布数据处理协议（DPA）以及用于欧盟数据传输的 Privacy
              Shield/SCCs，在 AWS eu-west-1（爱尔兰）为欧盟客户保存数据，并在 Enterprise 计划中提供 GDPR 专属合同条款。 CCPA 合规同样通过隐私通知和退出机制管理。


              EU AI Act（2024 年 6 月通过，2026 年 8 月起执行）对 AI 驱动的设计生成功能 Figma Make 构成中等严重度监管风险。 如果 Figma Make 被归类为 Annex III
              下的「高风险」AI 系统，或被归类为承担透明度义务的通用 AI 系统，Figma 将面临合格评定要求、注册进入 EU AI Act 数据库，以及上市后监测义务——这些都意味着有意义的合规投入。 Figma
              尚未公开评论其 EU AI Act 准备情况。


              Adobe 收购失败（在欧盟监管反对后于 2024 年 1 月终止）留下了重要反垄断记录：监管者认定 Adobe+Figma 将在专业设计软件市场拥有过强市场力量。 这一裁定反而强化了 Figma
              作为独立公司的地位（确认市场领导力），但如果 Figma 自己未来追求大型收购，也可能成为后续审查模板。 目前没有公开披露与终止交易相关的进行中诉讼。缺少 FedRAMP 是事实上的监管壁垒：没有 FedRAMP
              Moderate 或 High 授权，Figma 无法获批进入美国联邦政府采购，限制了公共部门可服务市场。
            claimRefs:
