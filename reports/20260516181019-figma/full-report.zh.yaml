      - number: '6.2'
        title: 采用轨迹与企业增长
        blocks:
          - type: paragraph
            body: >
              Figma 的客户增长轨迹显示企业渗透正在加速。ARR 超过 $100K 的客户群在 2026 年 Q1 同比增长 48%，快于整体 ARR 增速，说明 Figma
              的扩张引擎在最大账户内推动席位和产品增购的速度，超过其签下新小客户的速度。 ARR 超过 $10K 的客户群同比增长 37%，反映中端市场动能稳定。


              2026 年 Q1，净美元留存率（NDR）达到 139%，高于一年前的 132%。即使放在高增长 SaaS 中，这条轨迹也异常强：它意味着现有客户平均同比多花 39%，驱动因素包括席位增长、从 Team 升级到
              Org 再到 Enterprise，以及 FigJam、Dev Mode、Slides 的交叉销售。 据报道，月活用户达到约 13 million；产品遥测（从管理层评论推断）显示，76%
              的企业账户目前使用两种或更多不同 Figma 产品，高于 2024 年估计的约 68%。


              PLG（产品驱动增长）仍是主要获客渠道。新的付费组织主要靠免费层病毒式传播播种：单个设计师邀请队友加入 Figma 项目，协作者体验产品，工作区最终触及计划限制，触发升级提示。 PLG
              线索从免费转为付费的平均时间未公开披露，但管理层评论称，免费到 Team 的升级率健康且在改善。
