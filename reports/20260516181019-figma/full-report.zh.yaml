      - number: '1.2'
        title: 创始人、管理层与治理
        blocks:
          - type: paragraph
            body: >-
              Figma 由 Dylan Field 和 Evan Wallace 共同创办。两人都是 Brown University 计算机科学学生，在校园相识，并共同看到了协同、Web 原生创意工具的机会。Dylan
              Field 获得 Thiel Fellowship——一笔面向 23 岁以下学生、鼓励离校创业的 $100,000 资助——随后离开 Brown，于 2012 年在 San Francisco 创办
              Figma。Field 自创立以来一直担任 CEO，并通过 Figma 的双重股权结构保留 73.6% 的股东投票权；这项治理安排保证他能不受公开市场短期压力左右，主导长期战略。Evan Wallace
              共同开发了 Figma 早期基于 WebGL 的渲染引擎，2022 年离开日常岗位；他仍是股东。截至 2026 年，Figma 高管团队包括 Praveer Melwani（CFO）、Yuhki
              Yamashita（CPO）、Kris Rasmussen（CTO）、Nadia Singer（首席人力官）、Shaunt Voskanian（CRO）、Sheila Vashee（CMO）、Nairi
              Hourdajian（CCO）和 Brendan Mulligan（总法律顾问）。董事会由 Dylan Field 担任主席，成员包括 John Lilly（Greylock，首席独立董事）、Kelly
              Kramer、Lynn Vojvodich Radakovich、Daniel Rimer（Index Ventures）、Mamoon Hamid（Kleiner Perkins）、Bill
              McDermott、Luis von Ahn、Mike Krieger 和 Andrew Reed。关键人物风险集中在 Dylan Field：他的双重股权地位和创始人 CEO
              身份带来战略连续性，也带来权力集中风险。
