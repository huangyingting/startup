  - id: TP004
    title: 护城河耐久性与竞争风险登记表
    summary: Assessment of Figma's moat claims, the threats that could erode each, severity, and key diligence asks.
    notes: >-
      严重程度按潜在 ARR 影响的时间跨度和幅度分为高 / 中 / 低。来源包括 Sketch vs Figma 竞争页、Penpot 的 GitHub 热度、 Vercel v0 产品页、Figma Q1 2026
      业绩新闻稿、UX Tools 2024 调查、ProductHunt 评价，以及 Adobe Firefly 产品页。
    plannedTableRef: moat-durability-competitive-risk-register
    enumeration: false
    claimRefs:
      - CP024
      - CP026
      - CP027
      - CP029
      - CP030
      - CP031
      - CP032
      - CP033
      - CP035
    columns:
      - 护城河主张
      - 威胁
      - 严重程度
      - 缓释措施 / 尽调问题
    rows:
      - - 自研 .fig 文件格式制造切换成本
        - Sketch 2024 年做出 .fig 导入器；Penpot 支持 .fig 导入；文件可迁移性在改善
        - 中
        - 跟踪第三方 .fig 导入器采用率；观察企业客户是否把可迁移性列为切换因素
      - - 数千个 Figma 插件让工作流和开发者集成更黏
        - AI 原生工具（v0、Lovable）如果用 prompt-to-code 取代设计，可能绕过插件层
        - 高（长期）
        - 量化与 Dev Mode 绑定的企业 ARR 占比；若 AI 代码生成把交接工作流商品化，测算收入风险
      - - 嵌入式组件库和变量 token 抬高企业账户切换成本
        - Canva 加入 Affinity 后，如果补上 token 管理和设计系统，可能迁移企业账户
        - 中
        - 跟踪 Canva Affinity 集成路线图；评估 Canva Enterprise 是否在向 Figma 客户推销设计系统
      - - 浏览器原生多人设计成为分布式产品团队的核心工作流依赖
        - Penpot 和 Framer 都提供基于浏览器的多人协作；技术护城河在收窄
        - 低–中
        - 衡量 UI3 争议后 Penpot 企业订单量；评估 EU 采购要求是否把 RFP 从 Figma 拉走
      - - 免费 Starter 计划和病毒式邀请推动 PLG 自然采用，也带来企业自下而上增长
        - Canva 免费层同样慷慨；Penpot 永久免费；开源定价压力挤压 PLG 转化
        - 中
        - 按 cohort 跟踪 Figma 免费转付费率；与 NRR 对比，推断转化速度变化
      - - Figma Community 内容飞轮（模板、UI 套件、插件）增强黏性，降低冷启动
        - 如果大型设计系统在 Penpot 或 Sketch 发布同等质量资产，飞轮会减弱
        - 低
        - 监测主要设计系统维护方（Google、Microsoft、Atlassian）是否发布一流的 Penpot 或 Sketch 库
