    title: 公司概况
    sections:
      - number: '1.1'
        title: 公司身份与市场位置
        blocks:
          - type: paragraph
            body: >-
              Figma, Inc. 是一家总部位于 San Francisco 的云原生软件公司，提供领先的浏览器端协同界面设计平台。Dylan Field 和 Evan Wallace 2012 年在 Brown
              University 创办 Figma，2015 年发布首个产品预览版，2016 年向公众开放，很快成为全球科技公司产品设计工作流的事实标准。2025 年 7 月 31 日完成标志性 IPO 后，公司股票以
              FIG 为代码在 New York Stock Exchange 交易，该 IPO 对 Figma 估值 $19.3 billion。Figma 以 SaaS
              模式运营，按编辑席位订阅收费，并叠加企业合同。平台覆盖 Figma Design（核心协同矢量设计）、FigJam（数字白板）、Figma Slides（演示工具）、Dev Mode（开发者交付），以及包括
              Figma Make、MCP 集成和 Figma Weave 在内的 AI 功能。到 2026 年 5 月，IPO 后股价回调后，Figma 在 NYSE 上市股票隐含市值约 $12
              billion；与此同时，收入增长仍在加速。Figma 的竞争位置靠三点撑住：深度实时协作、浏览器优先架构、多人优先设计，能让上千名协作者同时编辑——Adobe 桌面原生的 Creative Cloud
              无法原生复制这些能力。
