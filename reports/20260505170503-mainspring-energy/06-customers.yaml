callouts:
  - calloutType: strength
    title: Named proof spans several demanding customer classes
    body: >-
      Mainspring’s public customer record includes grocery cold storage public power irrigation biogas wastewater data
      centers logistics charging and defense. That breadth matters because it shows the product is not pinned to one
      narrow logo category or one-off pilot narrative.
    claimRefs:
      - CU002
      - CU029
      - CU032
  - calloutType: insight
    title: The customer wedge is usually procurement friction plus site-specific energy pain
    body: >-
      The best stories are not generic green branding wins. They are cases where Mainspring can shorten time to power
      avoid utility delays monetize methane or shift capex into a financed structure which is why NextEra-backed PPAs
      and turnkey deployment language matter so much in the public record.
    claimRefs:
      - CU005
      - CU022
      - CU031
      - CU038
      - CU040
  - calloutType: risk
    title: Public durability and concentration evidence is still thin
    body: >-
      Expansion signals are encouraging but the retained sources still do not disclose active customer count NRR GRR
      churn contract term or top-customer concentration. Public evidence proves adoption; it does not yet prove
      portfolio durability.
    claimRefs:
      - CU033
      - CU038
