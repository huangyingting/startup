chapter:
  number: 6
  title: Customers
summary: >-
  Public customer proof for Mainspring is materially better than a simple logo wall: named deployments span Kroger,
  Lineage, Lathrop Irrigation District, UMPA, CalBio, Chattanooga’s Moccasin Bend campus, EdgeConneX, Prologis, and the
  U.S. Air Force, with multiple stories tying adoption to lower energy costs, faster time to power, resilience, and
  lower emissions. The strongest public pattern is concentration in energy-intensive, infrastructure-heavy operators
  that care about power quality and permitting more than in broad SMB cohorts. Expansion logic is visible through
  multi-site rollouts and partner-backed financing, but public retention, contract, satisfaction, and top-customer
  concentration metrics remain thin.
sections:
  - id: '6.1'
    title: >-
      Customer segmentation is broad across infrastructure-heavy operators, but the clearest fit is power-constrained
      critical loads
    body: >-
      Mainspring’s public customer base is not random. The retained solution pages and project announcements
      consistently cluster around operators for whom electricity is either a core operating input or a bottleneck to
      growth: grocery and cold-storage operators that want predictable energy costs, public-power and irrigation
      entities that need local capacity, dairy and wastewater operators that can monetize methane, data-center
      developers that cannot wait on interconnection, and public-sector resilience buyers such as the Air Force. That
      pattern matters because it means the company’s buyer is usually not a generic facilities manager shopping for
      backup generation; it is a decision-maker facing a specific power constraint, permitting problem, or
      decarbonization mandate. Schneider’s partnership release, the utility/customer spotlights, and the
      logistics/data-center stories all point in the same direction: Mainspring wins where speed to power, modular
      add-ons, fuel flexibility, and low-NOx siting are economically meaningful rather than merely nice-to-have.


      The segmentation is therefore broad by vertical but narrow by operating profile. Kroger and Lineage are very
      different end markets, yet both use Mainspring to control onsite energy costs while improving resilience. UMPA and
      Lathrop Irrigation District sit on the utility/public-power side, but both appear in the record because local
      dispatchable generation solves capacity and rate pressure. CalBio and Chattanooga’s MBEC use the system to turn
      waste methane into electricity, which creates a very different revenue logic from retail or data centers but the
      same attraction to modular, easily permitted local generation. EdgeConneX, Prologis, and Amazon add another
      segment where grid delays themselves become the wedge. The public evidence therefore supports a customer thesis
      centered on energy-intensive, mission-critical operators with site-specific deployment pain, not mass-market
      backup buyers.
    claimRefs:
      - CU001
      - CU002
      - CU029
      - CU032
      - CU041
      - CU042
      - CU043
  - id: '6.2'
    title: >-
      Named customer proof is real and increasingly production-grade, with the strongest evidence on cost, resilience,
      and expansion
    body: >-
      Mainspring clears the named-customer-proof bar because the retained evidence goes beyond logos and generic
      testimonials. Kroger’s official customer page says the system provides predictable and lower energy costs, and
      Trellis adds financing detail plus a direct quote explaining why the grocer liked a no-capex, no-maintenance
      structure. Lineage has several layers of proof: official enterprise positioning, the 2022 up-to-150-generator
      agreement, and the 2024 Texas expansion for 33 generators across five facilities. UMPA’s 48 MW central-Utah
      project is large enough to matter strategically, while Lathrop Irrigation District is one of the clearest outcome
      stories in the entire public set because Mainspring claims 40% lower electricity rates, 95% peak-load coverage,
      three-month air permits, and seven-month delivery. CalBio and MBEC show that the product is not limited to
      corporate campuses: both use site methane or biogas to produce electricity, with CalBio scaling to 5.3 MW across
      five sites and Chattanooga targeting a one-third bill offset and 3 MW over two phases.


      The strongest common outcomes are not software-style productivity metrics; they are physical deployment and
      energy-economics metrics. Public sources repeatedly cite lower or more predictable energy cost, faster
      availability than utility timelines, resilience during grid constraints, methane monetization, and lower-emissions
      permitting. EdgeConneX is framed around time-to-market and load-following dispatchability, Prologis around getting
      truck-charging power in nine months instead of three years, and the Air Force around mission resilience plus
      fuel-flexibility testing. That evidence mix supports a balanced conclusion: Mainspring has credible production
      proof across several demanding customer types, and the proof is getting fresher in 2025-2026 as larger projects
      and multi-site expansions appear. What public sources still do not show is broad cohort durability—there is plenty
      of deployment proof, but little disclosure on renewals, standardized uptime, or segment-level retention quality.
    claimRefs:
      - CU003
      - CU005
      - CU007
      - CU010
      - CU013
      - CU016
      - CU017
      - CU019
      - CU020
      - CU022
      - CU025
      - CU027
      - CU028
      - CU033
      - CU034
      - CU035
      - CU036
      - CU037
      - CU039
  - id: '6.3'
    title: Expansion logic is visible, but concentration, retention, and contract quality remain the main public blind spots
    body: >-
      The best public expansion signal is repeat deployment after an initial site proves out. Kroger says it has already
      begun adopting the technology at other locations. Lineage moved from an early cold-storage deployment to a network
      agreement, later followed by a Texas rollout covering five facilities and 33 generators. CalBio bought eight
      additional generators for two more cluster sites after earlier Hanford, Buttonwillow, and Merced deployments.
      MBEC’s first six-generator phase is explicitly paired with a second six-generator phase once campus upgrades are
      complete. These are meaningful because they show customers are not only piloting the asset once; they are
      considering how modular local generation fits into network-level energy strategy. Partner-backed financing and
      channel support reinforce that pattern. Trellis and Canary both describe NextEra-backed structures that reduce
      upfront capital friction, while Mainspring’s reseller launch suggests the company is building more than a
      direct-sales motion.


      But the public record stays stubbornly weak on classic durability and concentration questions. There is no
      retained public disclosure of total active customer count, NRR, GRR, churn, median contract term, renewal rates,
      or top-customer revenue share. Public customer proof is also concentrated in a relatively small set of visible
      names, which is good for proof quality but bad for concentration transparency: investors can see several strong
      logos, yet cannot tell how much of revenue depends on a handful of infrastructure-scale accounts or financing
      partners. Satisfaction proof is similarly uneven. The project announcements and customer quotes are positive, but
      they are not the same thing as broad survey, review, or cohort data. So the customer verdict is constructive but
      incomplete: Mainspring appears able to land in hard energy problems and expand where the first deployment works,
      yet public evidence still cannot validate portfolio durability or concentration risk on its own.
    claimRefs:
      - CU004
      - CU010
      - CU025
      - CU028
      - CU030
      - CU031
      - CU033
      - CU038
      - CU040
tables:
  - id: TU001
    title: Customer segmentation table
    columns:
      - Segment
      - Buyer / user / payer
      - Use case
      - Scale
      - Revenue / strategic value
      - Gap
    rows:
      - - Grocery / retail power users
        - Facilities / construction or energy manager / store operations / enterprise finance
        - Behind-the-meter onsite generation to cut cost and improve resiliency
        - Kroger deployment plus stated adoption at other locations
        - Shows Mainspring can fit recurring multi-site retail energy spend rather than one-off backup only
        - No public live-site count ACV or renewal term disclosed
      - - Cold storage / logistics networks
        - Energy and sustainability leaders / warehouse operations / corporate capital and energy budgets
        - Solar firming onsite generation energy independence and cost control
        - Lineage moved from an initial site to up-to-150-generator and five-facility Texas expansion proof
        - Large-network customer validates land-and-expand logic across distributed industrial sites
        - Public sources do not disclose how many committed sites are operating versus planned
      - - Public power / irrigation / municipal utilities
        - Generation planners / grid operations / member-city or community ratepayers
        - Local dispatchable generation peak coverage rate control and capacity buildout
        - LID outcome story plus UMPA 48 MW greenfield project
        - Proves relevance for public-power buyers facing reliability and capacity pressure
        - No public dispatch history revenue contribution or utility-customer retention data
      - - Biogas / dairy RNG operators
        - Cluster or project operators / site operations / project economics
        - Convert dairy biogas into productive power and reduce emissions
        - CalBio scaling to 5.3 MW across five sites
        - Demonstrates product fit where waste-fuel monetization and rural resilience matter
        - No public IRR payback or fleet-availability cohort by project
      - - Wastewater / municipal infrastructure
        - Public utility administrators / treatment operations / city or ratepayer budgets
        - Use wastewater methane for onsite power and reduce purchased electricity
        - MBEC initial 1.5 MW planned 3 MW and roughly one-third bill offset
        - Extends proof into critical civic infrastructure and biogas-to-power workflows
        - Project is newly announced so steady-state operating metrics are not public
      - - Data centers / grid-constrained critical loads
        - Development and infrastructure teams / facility operations / project sponsors
        - Get grid-independent power faster follow load and preserve time-to-market
        - EdgeConneX official proof plus AI-site scale-up path in 25-50 MW increments
        - High strategic value because grid delays can block customer revenue altogether
        - Public uptime contract length and customer-owned performance dashboards remain unavailable
    notes: >-
      The visible customer mix spans many verticals but almost every retained proof involves a buyer with hard power
      constraints or energy-cost exposure.
    claimRefs:
      - CU001
      - CU002
      - CU012
      - CU017
      - CU024
      - CU029
      - CU032
      - CU041
      - CU042
      - CU043
