  - id: TU005
    title: Expansion and concentration risk table
    columns:
      - Expansion driver
      - Concentration risk
      - Impact
      - Diligence path
    rows:
      - - Modular add-on capacity after the first site works
        - Public proof is concentrated in a small set of visible flagship accounts
        - A few large customers may drive perception and revenue more than public data reveals
        - Request top-customer revenue share backlog split and committed versus operating megawatts by account
      - - Partner-backed PPAs and financed solutions reduce upfront friction
        - Dependence on financing partners such as NextEra can shape win rates and economics
        - If financing tightens sales velocity or customer ROI could change materially
        - Request mix of self-funded partner-funded and service-based deals plus margin by structure
      - - Channel partners widen access beyond direct sales
        - Reseller quality and project-execution dependence may add variability
        - Growth could be gated by partner readiness rather than pure customer demand
        - Request partner pipeline conversion rates and post-sale support ownership by segment
      - - Large energy users value rapid permitting and time to power
        - Demand may remain concentrated in grid-constrained or energy-intensive verticals
        - The TAM may be smaller than a generic all-backup-power story implies
        - Request win/loss data by vertical and reasons smaller accounts do or do not convert
      - - Multi-phase projects create visible expansion path
        - Delayed second phases can hide weaker realized ROI or slower commissioning
        - Expansion optics could outpace realized cash generation if follow-ons slip
        - >-
          Request milestone completion data operating performance from phase-one sites and causes of any schedule
          movement
    notes: Expansion logic is visible publicly but the concentration side of the equation is still mostly opaque.
    claimRefs:
      - CU030
      - CU031
      - CU033
      - CU038
