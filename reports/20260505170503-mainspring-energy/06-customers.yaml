    - type: missing-source
      severity: material
      topic: customer-count denominator
      missingEvidence: >-
        No retained public source discloses total active customer count live-site count by customer or conversion from
        named logos to operating deployments.
      whyItMatters: >-
        Without a denominator investors cannot tell whether the visible flagship projects represent a broad installed
        base or a narrow set of reference accounts.
      diligencePath: >-
        Request customer-count history live-site counts installed MW by active customer and logo-to-operating-site
        conversion by segment.
      relatedTableRefs:
        - TU003
      relatedQuestionRefs:
        - QU021
    - type: missing-source
      severity: material
      topic: retention and renewal quality
      missingEvidence: The retained sources do not disclose NRR GRR churn renewal rates or contract-term data for any customer cohort.
      whyItMatters: >-
        Multi-site expansion stories are encouraging but they do not replace standardized evidence on portfolio
        durability or renewal behavior.
      diligencePath: >-
        Request renewal curves revenue-retention metrics contract durations and churn reasons split by utility
        enterprise biogas and data-center customers.
      relatedQuestionRefs:
        - QU022
        - QU023
      relatedTableRefs: []
    - type: missing-source
      severity: material
      topic: customer and partner concentration
      missingEvidence: >-
        No retained public source quantifies top-customer revenue share backlog concentration or the degree of
        dependence on financing and channel partners.
      whyItMatters: >-
        A business built around large infrastructure accounts can look healthy publicly while still carrying meaningful
        concentration and partner-dependence risk.
