      - number: '4.5'
        title: Financial Verdict and Diligence Blockers
        blocks:
          - type: paragraph
            body: >-
              The public case for Mainspring is investable on strategic demand, not yet on underwritten economics.
              Revenue quality looks stronger than a pre-commercial science project because the company has commercial
              shipments since 2020, hundreds of megawatts in field operations and advanced development, repeat-customer
              evidence through Lineage, and a financing stack large enough to support manufacturing expansion. The
              public case for margin quality is much weaker. Official sources do not disclose revenue, ARR, gross
              margin, cash, burn, runway, customer concentration, backlog conversion, or project-level contribution
              margin. That means the right investor stance is not “no economics”; it is “economics not yet observable.”
              Priority diligence asks are: trailing 24-month bookings and revenue by customer type; hardware versus
              service gross margin; working-capital needs by deployment; monthly burn and current cash; timing and
              certainty of DOE grant proceeds; and whether financed projects create recurring cash flows or simply defer
              hardware payments. Until those data are available, valuation should be anchored to capital efficiency risk
              as much as to market demand.
