      - number: '3.4'
        title: Moat Durability Versus Incumbents and Peers
        blocks:
          - type: paragraph
            body: >-
              Mainspring's moat is best understood as a product-plus-permitting-plus-fuel-flexibility bundle rather than
              as a pure scale moat. The official product surfaces consistently emphasize a 250 kW modular block,
              scalability to 100+ MW, dispatchability, the ability to switch across gaseous fuels without hardware
              changes, and sub-1.5 ppm NOx claims. Those attributes create a differentiated procurement story versus
              conventional engines and versus fuel cells that may be cleaner at the stack but less flexible
              operationally. The CEC demonstration report supports the broad thesis by describing the product as an
              early commercial system with high electrical efficiency, ultra-low emissions, fuel flexibility, and low
              costs, while follow-on projects with Kroger, Lineage, and AEP suggest practical buyer pull. But the
              durability is still conditional. Bloom already has scale, data-center proof, and fuel-cell branding;
              Cummins has global service infrastructure and much larger balance-sheet capacity; Capstone proves that
              modular distributed generation can become a service-heavy installed-base business; and Hyliion shows that
              linear-generation concepts are no longer uniquely Mainspring's narrative space.
            claimRefs:
              - CP002
              - CP003
              - CP004
              - CP012
              - CP013
