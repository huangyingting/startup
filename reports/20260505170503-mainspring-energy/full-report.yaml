            body: >-
              Public sources clearly show that Mainspring has raised substantial capital, but they do not show whether
              that capital is sufficient. The April 2025 Series F brought in $258 million to expand manufacturing and
              customer sales, while the company says cumulative financing now exceeds $800 million. Separate from
              venture capital, the DOE selected Mainspring for an $87 million manufacturing grant tied to a
              more-than-$175 million investment in a nearly 300,000-square-foot Pennsylvania facility capable of
              producing 1,000 generators annually and employing more than 600 people. Historical SEC filing evidence
              also confirms that Mainspring previously used exempt private financing, with a July 2021 Form D showing a
              $110 million total offering and $108.1 million sold. All of that supports the view that Mainspring is
              capitalized enough to pursue manufacturing scale-up and large projects. None of it discloses cash on hand,
