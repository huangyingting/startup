      - number: '8.3'
        title: Recommendation and diligence gates
        blocks:
          - type: paragraph
            body: >-
              Given the evidence available on 2026-05-05, the most defensible call is research-more with medium
              confidence, a high risk rating, and an unknown valuation stance. The positive side of the ledger is
              meaningful: more than 500 MW of late-stage development and operation, a large factory grant, utility and
              municipal projects, a defense pilot, and a board strengthened with experienced industrial operators. The
              negative side is more important for current entry discipline: no public revenue or margin disclosure, no
              disclosed current price, no public cap-table terms, limited reliability visibility, and unclear
              concentration. That means an investor should not confuse company quality with investable price support.
              Price sensitivity, dilution risk, and exit timing all remain too opaque for a buy recommendation today.
              The asymmetry is therefore favorable only if the eventual private price is materially discounted to those
              uncertainties.
