      - number: '7.2'
        title: Operational, dependency, and manufacturing risk
        blocks:
          - type: paragraph
            body: >-
              Operational risk clusters around scaling a hardware platform into larger, more timing-sensitive
              deployments. Public materials emphasize fast deployment, modular availability, multi-fuel flexibility, and
              low emissions, but they also show a business pushing into bigger and more consequential installations such
              as a 48 MW municipal utility project, a Chattanooga wastewater program, and a defense pilot. The
              Pennsylvania plant is strategically important because it is intended to lift output to 1,000 units
              annually and create more than 600 operating jobs, yet it also creates obvious ramp risk: labor, supplier
              quality, commissioning discipline, and project conversion all have to improve together. Multi-fuel
              capability mitigates single-fuel dependence, but it does not erase factory, installation, or field-service
              risk. Investors should treat each new marquee deployment as both validation and stress test, because
              bigger sites amplify installation, uptime, supplier, and service coordination demands.
            claimRefs:
