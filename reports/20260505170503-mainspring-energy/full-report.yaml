      - number: '7.3'
        title: Regulatory, legal, and disclosure gaps
        blocks:
          - type: paragraph
            body: >-
              Regulatory posture is directionally constructive but not fully de-risked. Mainspring’s 2024 California
              Energy Commission filing argues that the platform is fully commercialized on natural gas and RNG/biogas,
              has passed 1,000 hours on 100% hydrogen, and has moved beyond pilot status for core gas applications. That
              supports current deployment readiness, but hydrogen commercialization remains milestone-driven, not
              broadly proven in disclosed revenue or operating data. Legal and compliance disclosure is also thin. The
              website does publish a 2025 privacy policy, 2025 terms of use, and supplier-governance materials, which
              shows baseline legal hygiene. However, public evidence reviewed did not disclose active litigation,
              cybersecurity incidents, customer concentration, or reliability metrics. Those gaps force diligence to
              stay focused on downside scenarios rather than assuming risk is low because incidents are not obvious in
              marketing materials. The absence of adverse evidence in marketing channels should therefore be read as an
              information gap, not as proof that residual risk is low.
            claimRefs:
