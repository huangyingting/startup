      - number: '3.3'
        title: Distribution Power, Switching Costs, and Multi-Homing
        blocks:
          - type: paragraph
            body: >-
              Mainspring's strongest strategic problem is not proving that the product is novel; it is turning novelty
              into repeatable distribution and switching costs before incumbents compress the category. The Schneider
              partnership directly addresses this issue by pairing the Linear Generator with Schneider's EcoStruxure
              microgrid design-build offering, making Mainspring easier to buy inside broader resilience projects.
              Lineage provides a second form of leverage: repeat deployments across multiple sites create
              referenceability around cost savings, solar firming, and predictable onsite-power economics. Even so, the
              buyer can often multi-home. A site may mix Mainspring or Bloom generation with batteries, solar, controls,
              and conventional standby engines. UtilityDive's reporting also reinforces that customers pursuing
              data-center and fleet-electrification projects are often solving for speed-to-power, not brand loyalty.
              That matters because if interconnection delays ease, some of Mainspring's current wedge can narrow.
              Mainspring therefore needs partner access, permitting advantage, and fleet-operating data to compound
              faster than the broader market standardizes around any modular low-emissions generation vendor.
            claimRefs:
