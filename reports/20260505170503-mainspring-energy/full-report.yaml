      - number: '3.5'
        title: Adverse Evidence and Competitive Verdict
        blocks:
          - type: paragraph
            body: >-
              The main adverse evidence is not a catastrophic product failure in the retained source set; it is the
              combination of market opacity and heavyweight alternatives. Public pricing remains highly custom across
              Mainspring, Bloom, Capstone, and Cummins, which means investors cannot yet prove that Mainspring is
              winning on realized economics instead of simply on category storytelling. Capstone's post-bankruptcy risk
              factors and weaker backlog show that distributed-generation markets can punish companies whose
              commercialization path outruns their balance sheet. Bloom demonstrates that large, low-emissions
              onsite-power vendors can reach public-company revenue scale, leaving Mainspring exposed if customers
              decide fuel cells are the safer premium option. Cummins shows the opposite threat: incumbent generator
              vendors can use distribution and service depth to defend accounts even without Mainspring's
              fuel-flexibility narrative. The investment conclusion is that Mainspring has a credible wedge, but it is
              still an execution moat. Its differentiation looks strongest where permitting, fuel switching, and fast
              deployment matter most; it looks weakest where buyer procurement is dominated by incumbent service
              networks, custom pricing, and the ability to bundle multiple power assets under one vendor umbrella.
            claimRefs:
