      - number: '2.4'
        title: Growth drivers, adoption constraints, and what matters for valuation
        blocks:
          - type: paragraph
            body: >-
              The core drivers are durable and externally visible: time-to-power, resiliency, decarbonization pressure,
              and fuel optionality. McKinsey, Bloom, Data Center Knowledge, Wood Mackenzie, Utility Dive, Schneider,
              ABM, and General Catalyst all point in different language to the same structural issue — large customers
              need power faster than the grid can reliably provide it. That is why data-center operators are exploring
              onsite generation, why utilities and public power are reconsidering new local technologies, and why
              projects in wastewater and biogas are attractive where customers already control a usable fuel stream.


              The constraints are just as important. EIA’s DG report notes that local, state, and federal policy,
              project costs, and interconnection limitations all affect deployment. IEA’s DER analysis argues that
              distributed resources create grid benefits only when markets and regulation are prepared to absorb them.
              McKinsey and Wood Mackenzie emphasize long development timelines for transmission and power
              infrastructure, shortages of transformers and backup equipment, and labor bottlenecks. Data Center
              Knowledge shows that even when the market wants onsite power, many customers still lean on natural gas
              because renewables alone lack the availability profile required for AI-scale workloads. For valuation,
              this means Mainspring is exposed to a real and growing demand pool, but monetization depends on project
              execution, permitting, financing, and buyer willingness to adopt a newer technology in mission-critical
              environments.
