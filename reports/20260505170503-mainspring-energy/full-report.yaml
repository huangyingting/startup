      - number: '5.3'
        title: Differentiation, trust controls, and remaining technical gaps
        blocks:
          - type: paragraph
            body: >-
              Mainspring’s clearest differentiation claim is that it combines fuel-cell-like efficiency and emissions
              with engine-like dispatchability and lower mechanical complexity. The CEC report, IEEE Spectrum explainer,
              Schneider partnership material, and Xendee webinar all support the same architecture-level thesis: the
              product can switch among multiple gaseous fuels without retrofit, ramp quickly, and fit into microgrid or
              renewable-firming designs. Public operating proof is also widening: AEP’s pilot framed the asset as a
              peaker alternative and EV-charging enabler; Schneider packaged it into an EcoStruxure microgrid offer; and
              DCVC described a Prologis truck-charging deployment where onsite power arrived in nine months instead of a
              multi-year utility timeline. Even so, the trust and quality story is uneven. Public emissions and
              electrical-certification evidence is good, but there is no public trust center, no public SOC 2 or cyber
              certification package, no published fleet-availability dataset, and no customer-facing API or SDK
              documentation visible in the retained sources. Those omissions do not invalidate the core hardware thesis,
              but they do matter because Mainspring increasingly sells into uptime-sensitive environments such as data
              centers, utilities, wastewater plants, and defense pilots where the software-control plane and service
              response become part of the product itself. Another practical implication is that product diligence now
              has to cover both electromechanical robustness and the operational maturity of the remote-service layer.
              Public sources support the hardware thesis, but they do not yet show how alarms are triaged, how remote
              actions are permissioned, or how software releases are validated before field rollout. Those are not
              cosmetic omissions when the buyer is relying on the asset for critical capacity rather than occasional
              backup.
