      - number: '7.4'
        title: Investment implication and kill criteria
        blocks:
          - type: paragraph
            body: >-
              The key investment implication is that Mainspring now looks more like a scaling industrial platform than a
              speculative lab company, but it has not yet disclosed enough operating evidence to be treated as a routine
              project-finance or power-equipment underwriting exercise. The most useful kill criteria are therefore
              observable and near-term: factory-ramp slippage in Pennsylvania, delays converting flagship utility or
              municipal announcements into operating assets, failure to disclose reliability and service metrics after
              the fleet scales, evidence of customer concentration around a few counterparties, or policy changes that
              weaken project economics such as tax-credit support. If those indicators move in the wrong direction, the
              current narrative of flexible, rapidly deployable local power could translate into margin compression,
              financing dependence, and valuation downside. Those criteria are practical because they can be tested with
              future public updates and with a targeted diligence pack from management. Investors should also compare
              what management says about rapid deployment with the much slower realities of project permitting,
              equipment commissioning, workforce training, and long-tail service support, because that is where many
              hardware stories lose valuation support.
            claimRefs:
              - CR009
              - CR014
              - CR016
