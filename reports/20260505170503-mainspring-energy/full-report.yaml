      - number: '2.3'
        title: Buyer, user, payer, and adoption path
        blocks:
          - type: paragraph
            body: >-
              The buyer map is multi-segment but coherent. In public power and utility contexts, the economic buyer is a
              utility GM, generation VP, or public-power board seeking local capacity that can be permitted and deployed
              faster than substation or transmission upgrades. In data centers, the buyer is typically an infrastructure
              or power-architecture team that treats electricity access and uptime as gating constraints on new site
              launches. In fleet EV charging, the payer can sit with an operations, facilities, or electrification
              program budget that cares about speed-to-power more than wholesale energy optimization. In wastewater and
              biogas settings, the buyer is often an infrastructure operator or project developer monetizing waste
              methane while cutting power bills or emissions.


              The adoption path is also consistent across segments. Public sources repeatedly point to a trigger event:
              grid congestion, long interconnection timelines, growing load, resilience needs, or decarbonization
              mandates. Buyers then evaluate onsite or microgrid-capable solutions, often through a partner such as
              Schneider, ABM, or NextEra, because financing, EPC, and integration complexity are part of the sale. If
              the first deployment succeeds, expansion can follow into additional sites or larger capacity blocks, as
              shown by CalBio’s multi-site scale-up and Mainspring’s references to grocery-store and public-power
              expansion.
