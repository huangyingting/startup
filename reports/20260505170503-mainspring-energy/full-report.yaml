  - number: 8
    title: Valuation
    sections:
      - number: '8.1'
        title: Current entry context
        blocks:
          - type: paragraph
            body: >-
              Mainspring’s public narrative supports commercial relevance but not price precision. The company has a
              recent $258 million Series F round, says cumulative financing now exceeds $800 million, and continues to
              add large reference deployments and manufacturing capacity. That is enough to conclude the business is
              neither stalled nor purely conceptual. It is not enough to determine whether today’s private valuation is
              attractive, fair, or stretched because the company does not publicly disclose revenue, gross margin,
              backlog, current post-money valuation, or cap-table terms. In practical terms, investors can underwrite
              strategic momentum and execution risk, but not entry price. That makes valuation work an exercise in
              anchor ranges and diligence priorities rather than in definitive fair-value math. That limitation matters
              because private-company valuation discipline is mainly about entry price and downside structure, not about
              admiring strategic relevance in the abstract.
            claimRefs:
              - CR007
              - CR008
              - CV004
              - CV007
              - CV009
              - CV027
              - CV028
              - CV029
      - number: '8.2'
        title: Comparable anchors and scenario framing
        blocks:
          - type: paragraph
            body: >-
              The most useful public anchors are industrial and power-equipment peers rather than software businesses.
              Generac, Cummins, and Caterpillar all provide tradable market-cap and revenue reference points, and they
              also publish risk disclosures that fit a manufacturing-led power platform. Using market-cap-to-revenue as
              a simple public anchor, the observed band runs from about 2.7x for Cummins to 6.0x for Caterpillar, with
              Generac around 3.6x. That range is informative but imperfect. Caterpillar embeds a larger, more
              diversified industrial platform, while Generac and Cummins are more comparable on power-equipment
              execution risk. A clean-tech peer such as Bloom Energy adds another important lesson: strong growth can
              still coexist with warranty reserves, debt, and commercialization noise. The right interpretation is that
              Mainspring could earn premium multiples only if it proves manufacturing scale and service durability, not
              simply because power demand is hot. In other words, the comps are useful for discipline and scenario
              framing, but they cannot substitute for company-specific financial disclosure.
            claimRefs:
              - CV013
              - CV014
              - CV015
              - CV016
              - CV017
              - CV018
              - CV019
              - CV020
              - CV021
              - CV022
