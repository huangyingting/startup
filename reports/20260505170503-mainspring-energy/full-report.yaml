          - type: callout
            title: The customer wedge is usually procurement friction plus site-specific energy pain
            body: >-
              The best stories are not generic green branding wins. They are cases where Mainspring can shorten time to
              power avoid utility delays monetize methane or shift capex into a financed structure which is why
              NextEra-backed PPAs and turnkey deployment language matter so much in the public record.
            calloutType: insight
            claimRefs:
              - CU005
