      - number: '3.2'
        title: Direct and Adjacent Rival Profiles
        blocks:
          - type: paragraph
            body: >-
              Bloom Energy and Capstone matter because they offer customers a credible path to onsite power without
              waiting for utility interconnection cycles. Bloom has materially larger scale than Mainspring, with $1.47
              billion of 2024 revenue, 27.5% annual gross margin, a November 2024 AEP agreement for up to 1 GW of fuel
              cells, and a May 2024 expansion at Intel's Santa Clara high-performance computing data center. Capstone
              sits lower on the technology curve but remains relevant in behind-the-meter and microgrid procurement
              because it markets 65 kW to multi-megawatt microturbines, highlights data-center case studies, and
              historically generates a meaningful share of revenue from service. Mainspring's own traction is still
              smaller, but official and independent sources show commercial shipments since 2020, hundreds of megawatts
              in field operations and advanced development, named Lineage deployments, and an emerging channel strategy
              through Schneider Electric. Hyliion is also a credible likely entrant because Energy Intelligence reported
              it is deploying a similar linear-generator concept through Flexnode at data complexes.
