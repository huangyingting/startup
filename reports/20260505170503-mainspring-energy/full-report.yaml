          - type: callout
            title: Diligence should focus on non-public operating proof
            body: >-
              The highest-value diligence asks are reliability, warranty, customer concentration, and factory-ramp
              metrics. Those items are more decision-critical than additional market-sizing work at this stage.
            calloutType: recommendation
            claimRefs:
              - CR036
