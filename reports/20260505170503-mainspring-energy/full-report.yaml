  - number: 3
    title: Competitors
    sections:
      - number: '3.1'
        title: Competitive Landscape Overview
        blocks:
          - type: paragraph
            body: >-
              Mainspring is not competing only against one clean-generation startup. The relevant buyer alternatives
              include direct low-emissions onsite-power peers, incumbent engine and generator vendors, adjacent
              microgrid integrators, and the status quo of grid supply with conventional backup. Bloom Energy is the
              most obvious direct premium alternative where a customer wants low-emissions onsite generation for data
              centers and other critical loads. Capstone Green Energy is a modular CHP and microturbine alternative with
              meaningful microgrid and data-center references. Cummins represents the incumbent threat: its data-center
              page, annual report, and results releases show a much larger installed base, broad natural-gas and
              backup-power catalog, and demand strength in power generation markets tied to data centers. Mainspring
              itself is positioning for utilities, enterprises, industrial users, and data centers, which means it sits
              at the intersection of critical-power procurement, decarbonization budgets, and grid-capacity bottlenecks
              rather than in a narrow single-vertical niche.
