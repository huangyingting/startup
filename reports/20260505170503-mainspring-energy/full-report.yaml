  - number: 6
    title: Customers
    sections:
      - number: '6.1'
        title: >-
          Customer segmentation is broad across infrastructure-heavy operators, but the clearest fit is
          power-constrained critical loads
        blocks:
          - type: paragraph
            body: >-
              Mainspring’s public customer base is not random. The retained solution pages and project announcements
              consistently cluster around operators for whom electricity is either a core operating input or a
              bottleneck to growth: grocery and cold-storage operators that want predictable energy costs, public-power
              and irrigation entities that need local capacity, dairy and wastewater operators that can monetize
              methane, data-center developers that cannot wait on interconnection, and public-sector resilience buyers
              such as the Air Force. That pattern matters because it means the company’s buyer is usually not a generic
              facilities manager shopping for backup generation; it is a decision-maker facing a specific power
              constraint, permitting problem, or decarbonization mandate. Schneider’s partnership release, the
              utility/customer spotlights, and the logistics/data-center stories all point in the same direction:
              Mainspring wins where speed to power, modular add-ons, fuel flexibility, and low-NOx siting are
              economically meaningful rather than merely nice-to-have.


              The segmentation is therefore broad by vertical but narrow by operating profile. Kroger and Lineage are
              very different end markets, yet both use Mainspring to control onsite energy costs while improving
              resilience. UMPA and Lathrop Irrigation District sit on the utility/public-power side, but both appear in
              the record because local dispatchable generation solves capacity and rate pressure. CalBio and
              Chattanooga’s MBEC use the system to turn waste methane into electricity, which creates a very different
              revenue logic from retail or data centers but the same attraction to modular, easily permitted local
              generation. EdgeConneX, Prologis, and Amazon add another segment where grid delays themselves become the
              wedge. The public evidence therefore supports a customer thesis centered on energy-intensive,
              mission-critical operators with site-specific deployment pain, not mass-market backup buyers.
            claimRefs:
              - CU001
              - CU002
              - CU029
              - CU032
              - CU041
              - CU042
              - CU043
