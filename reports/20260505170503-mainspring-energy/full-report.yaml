      - number: '6.3'
        title: >-
          Expansion logic is visible, but concentration, retention, and contract quality remain the main public blind
          spots
        blocks:
          - type: paragraph
            body: >-
              The best public expansion signal is repeat deployment after an initial site proves out. Kroger says it has
              already begun adopting the technology at other locations. Lineage moved from an early cold-storage
              deployment to a network agreement, later followed by a Texas rollout covering five facilities and 33
              generators. CalBio bought eight additional generators for two more cluster sites after earlier Hanford,
              Buttonwillow, and Merced deployments. MBEC’s first six-generator phase is explicitly paired with a second
              six-generator phase once campus upgrades are complete. These are meaningful because they show customers
              are not only piloting the asset once; they are considering how modular local generation fits into
              network-level energy strategy. Partner-backed financing and channel support reinforce that pattern.
              Trellis and Canary both describe NextEra-backed structures that reduce upfront capital friction, while
              Mainspring’s reseller launch suggests the company is building more than a direct-sales motion.


              But the public record stays stubbornly weak on classic durability and concentration questions. There is no
              retained public disclosure of total active customer count, NRR, GRR, churn, median contract term, renewal
              rates, or top-customer revenue share. Public customer proof is also concentrated in a relatively small set
              of visible names, which is good for proof quality but bad for concentration transparency: investors can
              see several strong logos, yet cannot tell how much of revenue depends on a handful of infrastructure-scale
              accounts or financing partners. Satisfaction proof is similarly uneven. The project announcements and
              customer quotes are positive, but they are not the same thing as broad survey, review, or cohort data. So
              the customer verdict is constructive but incomplete: Mainspring appears able to land in hard energy
              problems and expand where the first deployment works, yet public evidence still cannot validate portfolio
              durability or concentration risk on its own.
