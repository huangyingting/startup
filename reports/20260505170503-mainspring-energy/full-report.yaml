      - number: '6.4'
        title: Exhibits
        blocks:
          - type: callout
            title: Named proof spans several demanding customer classes
            body: >-
              Mainspring’s public customer record includes grocery cold storage public power irrigation biogas
              wastewater data centers logistics charging and defense. That breadth matters because it shows the product
              is not pinned to one narrow logo category or one-off pilot narrative.
            calloutType: strength
            claimRefs:
