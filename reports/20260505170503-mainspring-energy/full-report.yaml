        title: Product definition, use cases, and workflow fit
        blocks:
          - type: paragraph
            body: >-
              Mainspring sells the Linear Generator as local power rather than as a generic backup set. Across its
              product, utilities, data-center, enterprise, and industrial pages, the recurring pitch is the same:
              customers that need firm power but do not want diesel-style emissions or single-fuel dependence can deploy
              factory-built 250 kW packages and stack them modularly as load grows. In workflow terms, the product sits
              between the fuel supply, the customer’s onsite electrical load, and optional grid interconnection.
              Data-center buyers are shown a path from grid-constrained land to islandable onsite generation; utilities
              are shown local firm capacity and near-load balancing; enterprise customers are shown cost-controlled
              primary power and solar firming; industrial methane and biogas operators are shown waste-to-power
              monetization. The official product page anchors the core value proposition with concrete specs—46% net-AC
              efficiency, less than 1.5 ppm NOx, no water consumption, and 0-100% dispatchability—while the Energy
              Intelligence interview and Latitude Media reporting extend the same workflow into EdgeConneX-style data
              centers, Amazon logistics, and military resilience use cases. The public record therefore supports a
              conclusion that Mainspring’s product-market framing is operationally specific, not just abstract
              clean-energy branding.
