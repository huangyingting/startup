              replacing the rotating-machine architecture used by conventional generators. The CEC report adds
              independent structure around that explanation: it documents a 230 kW demonstration at a grocery site in
              Colton, states that the unit remained operational as of July 2023, and says performance targets for
              output, emissions, efficiency, and run time were met after more than nine months of monitoring. The same
              report says the packaged product is UL-2200 listed and uses UL-1741-SA-listed grid-tie inverters, which is
              important because it turns vague “safe and reliable” marketing into a real certification trail. Developer
              signal also matters here. Current job postings describe a cloud-to-field software ecosystem with telemetry
              ingestion, secure remote monitoring, predictive maintenance, data platforms, controls simulation, embedded
              software, and AI-assisted fleet optimization. The CoLab case study reinforces that Mainspring is already
              operating at nontrivial hardware complexity, with more than 3,000 unique parts, about 30 mechanical
              engineers, and a multi-discipline workflow spanning hardware, software, controls, systems, and suppliers.
