      - number: '4.3'
        title: Cost Structure and Margin Path
        blocks:
          - type: paragraph
            body: >-
              Mainspring appears structurally more capital-intensive than a pure software business. The official pages
              emphasize lower capex, lower maintenance, and higher efficiency relative to alternatives, but those are
              buyer-facing value claims rather than reported margins. The DOE grant and Pennsylvania plant plans imply
              real manufacturing, tooling, and workforce build-out; the CEC report further frames the product as a
              hardware system whose value rests on efficiency, emissions, fuel flexibility, and low costs. That points
              to a blended cost structure spanning generator manufacturing, field deployment, service, and partner
              support. Public-company comparables suggest the likely range of outcomes. Bloom shows that low-emissions
              onsite-power vendors can reach 27.5% gross margin at scale, while Cummins shows a much larger industrial
              power business at 24.7% gross margin. Capstone is the downside reminder that distributed-generation
              vendors can still face backlog compression, restructuring, and liquidity stress even with a service
              component. The gap is obvious: Mainspring does not disclose its own gross margin, contribution margin by
              deployment, or service-versus-hardware mix, so investors cannot yet place it confidently on that spectrum.
