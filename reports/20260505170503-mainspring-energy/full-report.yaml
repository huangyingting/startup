      - number: '6.2'
        title: >-
          Named customer proof is real and increasingly production-grade, with the strongest evidence on cost,
          resilience, and expansion
        blocks:
          - type: paragraph
            body: >-
              Mainspring clears the named-customer-proof bar because the retained evidence goes beyond logos and generic
              testimonials. Kroger’s official customer page says the system provides predictable and lower energy costs,
              and Trellis adds financing detail plus a direct quote explaining why the grocer liked a no-capex,
              no-maintenance structure. Lineage has several layers of proof: official enterprise positioning, the 2022
              up-to-150-generator agreement, and the 2024 Texas expansion for 33 generators across five facilities.
              UMPA’s 48 MW central-Utah project is large enough to matter strategically, while Lathrop Irrigation
              District is one of the clearest outcome stories in the entire public set because Mainspring claims 40%
              lower electricity rates, 95% peak-load coverage, three-month air permits, and seven-month delivery. CalBio
              and MBEC show that the product is not limited to corporate campuses: both use site methane or biogas to
              produce electricity, with CalBio scaling to 5.3 MW across five sites and Chattanooga targeting a one-third
              bill offset and 3 MW over two phases.


              The strongest common outcomes are not software-style productivity metrics; they are physical deployment
              and energy-economics metrics. Public sources repeatedly cite lower or more predictable energy cost, faster
              availability than utility timelines, resilience during grid constraints, methane monetization, and
              lower-emissions permitting. EdgeConneX is framed around time-to-market and load-following dispatchability,
              Prologis around getting truck-charging power in nine months instead of three years, and the Air Force
              around mission resilience plus fuel-flexibility testing. That evidence mix supports a balanced conclusion:
              Mainspring has credible production proof across several demanding customer types, and the proof is getting
              fresher in 2025-2026 as larger projects and multi-site expansions appear. What public sources still do not
              show is broad cohort durability—there is plenty of deployment proof, but little disclosure on renewals,
              standardized uptime, or segment-level retention quality.
