  - number: 7
    title: Risks
    sections:
      - number: '7.1'
        title: Top risk picture
        blocks:
          - type: paragraph
            body: >-
              Mainspring’s public record supports a high but still actionable risk profile. The company clearly has
              commercial momentum: it reports more than 500 MW in late-stage development and operation, announced a $258
              million Series F round in 2025, won an $87 million DOE-backed manufacturing award, and publicized utility,
              municipal, and defense projects in 2026. Those positives do not remove the core underwriting problem. Most
              of the critical proof points that would reduce perceived risk at this stage—fleet reliability,
              warranty-loss history, disclosed backlog conversion, customer concentration, and current unit
              economics—remain non-public. The result is a business that appears demand-validated and policy-aligned,
              but still difficult to size on residual execution risk with precision. Public evidence also suggests
              diligence should compare announced capacity and grants against real commissioning cadence, serviceability,
              and customer concentration before assuming the current narrative converts cleanly into durable cash
              generation.
            claimRefs:
              - CR001
              - CR007
              - CR009
              - CR014
