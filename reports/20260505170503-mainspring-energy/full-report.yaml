      - number: '8.4'
        title: What would move the call
        blocks:
          - type: paragraph
            body: >-
              The recommendation can improve, but only if new evidence arrives on the variables that matter most. A
              stronger call would require visible factory-ramp progress in Pennsylvania, disclosed reliability and
              warranty metrics, customer and backlog diversification, and at least some credible disclosure on revenue
              scale or pricing support. Those are the items that determine whether Mainspring belongs near the
              lower-middle or upper end of public-comp valuation anchors. Conversely, if large projects slip, if
              financing need rises before operating proof catches up, or if the company remains opaque on economics
              while scaling capital-intensive hardware, downside risk will dominate. Investors should therefore treat
              current public comps as ceiling signals and diligence checklists, not as direct confirmation that the
              present private price is justified. Until then, the right stance is to keep diligence focused on the
              variables that would change the comp set from a ceiling into a real underwriting tool. A better price call
              would therefore require not just another financing headline, but evidence that the company can convert
              manufacturing scale and flagship projects into transparent, repeatable economics.
            claimRefs:
