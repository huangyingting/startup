          - type: callout
            title: Public durability and concentration evidence is still thin
            body: >-
              Expansion signals are encouraging but the retained sources still do not disclose active customer count NRR
              GRR churn contract term or top-customer concentration. Public evidence proves adoption; it does not yet
              prove portfolio durability.
            calloutType: risk
            claimRefs:
