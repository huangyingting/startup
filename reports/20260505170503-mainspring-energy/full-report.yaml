          - type: callout
            title: Multi-fuel capability is a real mitigant
            body: >-
              Mainspring’s fuel-flexible design meaningfully reduces single-fuel dependence and helps on resilience, but
              it should be treated as a mitigant inside a broader execution-risk frame rather than as a full risk
              eliminator.
            calloutType: strength
            claimRefs:
