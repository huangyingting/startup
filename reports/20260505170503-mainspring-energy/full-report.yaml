      - number: '4.2'
        title: GTM Motion and Sales Efficiency Proxies
        blocks:
          - type: paragraph
            body: >-
              Mainspring's GTM motion looks consultative and infrastructure-led rather than transactional. The strongest
              evidence comes from the kinds of customers and partnerships it highlights: Schneider-led microgrids,
              Lineage rollouts, utility projects, data-center messaging, and manufacturing expansion sized for rapid
              capacity deployment. These are not lightweight self-serve workflows. They imply long selling cycles, site
              design work, permitting, installation, and financing coordination. PG&E's February 2025 data-center
              interconnection release is important because it shows the surrounding market condition helping Mainspring:
              large customers want power faster than utilities can always deliver it, and some are willing to fund
              infrastructure upfront under new tariff mechanisms. That makes Mainspring's “speed-to-power” pitch
              economically credible even without public CAC or payback metrics. The missing piece is efficiency
              measurement. No retained source discloses sales-cycle duration, pipeline conversion, CAC, customer
              acquisition headcount, or payback period, so the chapter can only infer a high-touch motion with
              potentially strong average contract value but heavy acquisition and deployment friction.
