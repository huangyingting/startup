        title: Revenue Model and Monetization
        blocks:
          - type: paragraph
            body: >-
              The retained public record supports a revenue model centered on selling or financing modular onsite-power
              systems, then layering service, maintenance, and repeat-site expansion rather than on selling a
              transparent software subscription. Mainspring's enterprise and solutions pages repeatedly frame the
              product as a turnkey onsite-power offering that can be bought with flexible ownership structures, monthly
              payments, and maintenance options. The product is explicitly designed for utilities, enterprises,
              industrial users, and data centers, which suggests a deployment-led business where monetization tracks
              project scope and site operating economics more than seat-based usage. Customer evidence from Lineage
              reinforces that interpretation: deployments expand across facilities over time, pointing to repeat project
              revenue and potential service or fleet-management economics. The key constraint is that Mainspring does
              not publish a list price, power-purchase rate, ACV range, or disclosed service attach rate. Public
              evidence therefore supports the structure of the revenue model, but not its realized mix or quality.
