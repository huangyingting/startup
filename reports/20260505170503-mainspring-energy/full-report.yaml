            title: Biggest downside is a financing event before disclosure improves
            body: >-
              If Mainspring needs another round before it reveals revenue, reliability, or concentration data, dilution
              and preference-overhang risk could dominate otherwise positive demand signals.
            calloutType: risk
            claimRefs:
