  - id: FU001
    title: Customer journey map
    type: journey-map
    layout: wide
    summary: Maps how major customer segments move from a power pain point into deployment and then into repeat-site expansion.
    data:
      items:
        - label: Kroger / retail
          detail: >-
            High electricity-cost pain -> financed onsite option -> deploy store-level generation -> adopt at additional
            locations
        - label: Lineage / cold chain
          detail: Solar-firming and resilient-power need -> first site proof -> multi-site plan -> broader facility expansion
        - label: Public power / utility
          detail: >-
            Capacity or rate pressure -> evaluate dispatchable local generation -> permit and build -> use for peak and
            local capacity
        - label: Biogas / wastewater
          detail: >-
            Monetize methane and cut flaring -> validate fuel-flexible generation -> phased installation -> add more
            sites or second phase
        - label: Data center / critical load
          detail: >-
            Interconnection delay threatens go-live -> choose grid-independent power -> turnkey deployment -> add
            modular 25-50 MW blocks
    approximationNotes: >-
      The journey map synthesizes repeated patterns from named customer stories rather than depicting one universal
      internal sales playbook.
    claimRefs:
      - CU003
      - CU010
      - CU013
      - CU017
      - CU025
      - CU027
      - CU040
