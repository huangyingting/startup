        title: Exhibits
        blocks:
          - type: callout
            title: Public evidence supports interest, not a buy call
            body: >-
              Mainspring appears strategically important and commercially relevant, but the current public record does
              not reveal enough about price or economics to support a buy recommendation.
            calloutType: recommendation
