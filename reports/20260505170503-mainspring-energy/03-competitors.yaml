callouts:
  - calloutType: strength
    title: Mainspring has a real permitting-and-flexibility wedge
    body: >-
      Public evidence consistently shows a differentiated story around seamless fuel switching, low emissions, and
      modular deployment. That combination is stronger than a generic “onsite power” message and helps explain why
      Schneider, Lineage, and utility-related deployments are strategically important proof points.
    claimRefs:
      - C078
      - C079
      - C080
      - C083
      - C085
  - calloutType: risk
    title: Category success could still weaken company-specific moat
    body: >-
      If buyers increasingly procure modular low-emissions generation as a broad category, large incumbents and larger
      direct peers can absorb Mainspring's value proposition into bigger bundles, stronger balance sheets, and more
      mature service footprints. Public pricing opacity increases that risk because outside observers cannot yet prove
      Mainspring wins on realized economics.
    claimRefs:
      - C091
      - C097
      - C098
      - C099
      - C114
      - C115
