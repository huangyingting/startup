  - id: T303
    title: Pricing / packaging comparison
    columns:
      - Vendor
      - Public price / contract model
      - Included capabilities
      - Discount / unknowns
      - Implication
    rows:
      - - Mainspring
        - Custom quote; financing-partner monthly payments; lower-LCOE claim
        - Generator hardware, financing structures, service options, partner-integrated microgrids
        - Realized project pricing and service attach rates undisclosed
        - Economic wedge is plausible but not independently verifiable from public sources
      - - Bloom Energy
        - Custom project pricing / power-capacity agreements
        - Fuel-cell generation, grid-parallel or grid-independent data-center power
        - No public list pricing for comparable systems
        - Competes as premium critical-power solution with opaque realized economics
      - - Capstone
        - Custom quote / distributor-led projects / service plans
        - Microturbines, CHP, microgrids, factory protection plan
        - Public self-serve price card unavailable
        - More mature service packaging, but economic transparency is still low
      - - Cummins
        - Custom quote / project-based generator procurement
        - Backup generators, natural-gas engines, microgrid lab and support
        - No public line-item data-center project pricing
        - Incumbents can price strategically within bundled site-power bids
      - - Status quo substitute
        - Utility tariff plus backup-engine capex and O&M
        - Grid power, standby generation, site controls
        - Project economics depend on tariff design and interconnection timing
        - Mainspring wins most clearly when speed-to-power and fuel flexibility matter
    notes: >-
      The retained source set supports packaging and financing constructs more strongly than list prices; all vendors
      reviewed rely heavily on custom quoting for material deployments.
