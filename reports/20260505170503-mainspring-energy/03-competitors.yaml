  - id: T304
    title: Moat durability / competitive risk register
    columns:
      - Moat claim
      - Threat
      - Severity
      - Mitigation / diligence ask
    rows:
      - - Fuel-flexible generator with dynamic switching
        - Bloom, Capstone, and Hyliion narrow perceived differentiation as multi-fuel narratives spread
        - Medium
        - >-
          Request independent customer evidence on fuel-switching frequency, downtime avoidance, and realized fuel
          optionality value
      - - Low-emissions, fast-permitting story
        - Incumbents can pair lower-emissions engines, batteries, and controls into compliant microgrids
        - Medium
        - Request permit-cycle comparisons and evidence of wins attributable to NOx advantage
      - - Channel leverage through Schneider
        - Partnership may improve access but not create exclusivity or customer lock-in
        - Medium
        - Ask for pipeline conversion, repeat-partner bookings, and margin split by partner-led deal
      - - Referenceability through Lineage and utility projects
        - Customer proof can remain vertical-specific and fail to generalize to data centers or industrial buyers
        - Medium
        - Request cohort expansion data by vertical and site-level renewal/expansion patterns
      - - Category creation around linear generators
        - >-
          Incumbents or entrants can reframe procurement around “modular low-emissions onsite power” rather than
          Mainspring specifically
        - High
        - Track whether buyers ask for Mainspring by name or evaluate it as one option inside broader RFPs
    notes: >-
      The key diligence question is whether Mainspring is becoming a must-spec vendor or merely a strong option in an
      expanding procurement category.
