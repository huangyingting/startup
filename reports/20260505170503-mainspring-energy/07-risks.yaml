callouts:
  - calloutType: risk
    title: Highest residual risk is still execution, not demand
    body: >-
      Public demand signals are improving, but the most important unknown remains whether factory ramp, field
      reliability, and project conversion can keep up with the scale implied by recent announcements.
    claimRefs:
      - C252
      - C257
      - C259
      - C276
      - C279
  - calloutType: strength
    title: Multi-fuel capability is a real mitigant
    body: >-
      Mainspring’s fuel-flexible design meaningfully reduces single-fuel dependence and helps on resilience, but it
      should be treated as a mitigant inside a broader execution-risk frame rather than as a full risk eliminator.
    claimRefs:
      - C256
      - C261
      - C262
      - C270
  - calloutType: recommendation
    title: Diligence should focus on non-public operating proof
    body: >-
      The highest-value diligence asks are reliability, warranty, customer concentration, and factory-ramp metrics.
      Those items are more decision-critical than additional market-sizing work at this stage.
    claimRefs:
      - C279
      - C281
      - C282
      - C283
