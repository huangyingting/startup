  - id: T705
    title: Mitigation and kill criteria table
    columns:
      - Risk
      - Monitorable trigger
      - Threshold / event
      - Action implication
    rows:
      - - Factory ramp
        - Pennsylvania plant milestones
        - Groundbreaking, hiring, and output targets slip materially versus 2025-2026 plan
        - Freeze underwriting until build and commissioning evidence improves
      - - Fleet reliability
        - Public reliability disclosure
        - No warranty, outage, or service metrics disclosed as deployments scale
        - Treat margin and valuation assumptions as unproven
      - - Customer concentration
        - Project / customer mix disclosure
        - Backlog or revenue appears concentrated in a few flagship sites
        - Raise discount rate and require contract diligence
      - - Permitting / community friction
        - Data-center or utility siting delays
        - Repeated project slippage tied to permitting, interconnection, or local opposition
        - Reassess speed-to-market thesis and sales-cycle assumptions
