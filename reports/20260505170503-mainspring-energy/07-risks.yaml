chapter:
  number: 7
  title: Risks
  summary: >-
    Mainspring shows credible demand and policy alignment, but underwriting still hinges on factory ramp, reliability
    disclosure, and concentration risks that remain mostly non-public.
sections:
  - id: S701A
    title: Top risk picture
    body: >-
      Mainspring’s public record supports a high but still actionable risk profile. The company clearly has commercial
      momentum: it reports more than 500 MW in late-stage development and operation, announced a $258 million Series F
      round in 2025, won an $87 million DOE-backed manufacturing award, and publicized utility, municipal, and defense
      projects in 2026. Those positives do not remove the core underwriting problem. Most of the critical proof points
      that would reduce perceived risk at this stage—fleet reliability, warranty-loss history, disclosed backlog
      conversion, customer concentration, and current unit economics—remain non-public. The result is a business that
      appears demand-validated and policy-aligned, but still difficult to size on residual execution risk with
      precision. Public evidence also suggests diligence should compare announced capacity and grants against real
      commissioning cadence, serviceability, and customer concentration before assuming the current narrative converts
      cleanly into durable cash generation.
    claimRefs:
      - C244
      - C250
      - C252
      - C257
      - C259
      - C279
      - C281
      - C283
  - id: S701B
    title: Operational, dependency, and manufacturing risk
    body: >-
      Operational risk clusters around scaling a hardware platform into larger, more timing-sensitive deployments.
      Public materials emphasize fast deployment, modular availability, multi-fuel flexibility, and low emissions, but
      they also show a business pushing into bigger and more consequential installations such as a 48 MW municipal
      utility project, a Chattanooga wastewater program, and a defense pilot. The Pennsylvania plant is strategically
      important because it is intended to lift output to 1,000 units annually and create more than 600 operating jobs,
      yet it also creates obvious ramp risk: labor, supplier quality, commissioning discipline, and project conversion
      all have to improve together. Multi-fuel capability mitigates single-fuel dependence, but it does not erase
      factory, installation, or field-service risk. Investors should treat each new marquee deployment as both
      validation and stress test, because bigger sites amplify installation, uptime, supplier, and service coordination
      demands.
    claimRefs:
      - C248
      - C249
      - C252
      - C253
      - C254
      - C255
      - C257
      - C259
      - C270
      - C276
      - C277
  - id: S701C
    title: Regulatory, legal, and disclosure gaps
    body: >-
      Regulatory posture is directionally constructive but not fully de-risked. Mainspring’s 2024 California Energy
      Commission filing argues that the platform is fully commercialized on natural gas and RNG/biogas, has passed 1,000
      hours on 100% hydrogen, and has moved beyond pilot status for core gas applications. That supports current
      deployment readiness, but hydrogen commercialization remains milestone-driven, not broadly proven in disclosed
      revenue or operating data. Legal and compliance disclosure is also thin. The website does publish a 2025 privacy
      policy, 2025 terms of use, and supplier-governance materials, which shows baseline legal hygiene. However, public
      evidence reviewed did not disclose active litigation, cybersecurity incidents, customer concentration, or
      reliability metrics. Those gaps force diligence to stay focused on downside scenarios rather than assuming risk is
      low because incidents are not obvious in marketing materials. The absence of adverse evidence in marketing
      channels should therefore be read as an information gap, not as proof that residual risk is low.
    claimRefs:
      - C261
      - C262
      - C263
      - C264
      - C265
      - C266
      - C267
      - C279
      - C280
      - C281
      - C282
  - id: S701D
    title: Investment implication and kill criteria
    body: >-
      The key investment implication is that Mainspring now looks more like a scaling industrial platform than a
      speculative lab company, but it has not yet disclosed enough operating evidence to be treated as a routine
      project-finance or power-equipment underwriting exercise. The most useful kill criteria are therefore observable
      and near-term: factory-ramp slippage in Pennsylvania, delays converting flagship utility or municipal
      announcements into operating assets, failure to disclose reliability and service metrics after the fleet scales,
      evidence of customer concentration around a few counterparties, or policy changes that weaken project economics
      such as tax-credit support. If those indicators move in the wrong direction, the current narrative of flexible,
      rapidly deployable local power could translate into margin compression, financing dependence, and valuation
      downside. Those criteria are practical because they can be tested with future public updates and with a targeted
      diligence pack from management. Investors should also compare what management says about rapid deployment with the
      much slower realities of project permitting, equipment commissioning, workforce training, and long-tail service
      support, because that is where many hardware stories lose valuation support.
    claimRefs:
      - C252
      - C257
      - C259
      - C275
      - C276
      - C277
      - C283
