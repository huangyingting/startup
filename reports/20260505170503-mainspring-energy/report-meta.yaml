companyProfile:
  summary: >-
    Mainspring Energy is a private distributed-power company building modular, fuel-flexible linear generators for
    onsite and local power applications across utilities, data centers, industrial sites, cold storage, wastewater,
    and other resilience-sensitive settings. Public evidence supports meaningful commercial momentum and strong policy
    alignment, but not enough financial disclosure to underwrite price precisely.
