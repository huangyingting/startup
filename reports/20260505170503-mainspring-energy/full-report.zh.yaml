      - number: '2.4'
        title: 增长驱动、采用约束和估值真正看什么
        blocks:
          - type: paragraph
            body: >-
              核心驱动因素持久且外部可见：拿电速度、韧性、脱碳压力和燃料可选性。McKinsey、Bloom、Data Center Knowledge、Wood Mackenzie、Utility
              Dive、Schneider、ABM 和 General Catalyst
              用不同语言指向同一个结构性问题——大型客户需要电力的速度，快过电网能够可靠交付的速度。这解释了为什么数据中心运营商在探索现场发电，为什么公用事业和公共电力重新评估新的本地技术，也解释了为什么在客户本来就掌握可用燃料流的地方，污水处理和沼气项目有吸引力。


              约束同样重要。EIA 的 DG 报告指出，地方、州和联邦政策、项目成本以及并网限制都会影响部署。IEA 的 DER 分析认为，只有市场和监管准备好吸收分布式资源时，它们才会产生电网收益。McKinsey 和
              Wood Mackenzie 强调输电和电力基础设施开发周期长、变压器和备用设备短缺以及劳动力瓶颈。Data Center Knowledge
              显示，即便市场想要现场电力，很多客户仍依赖天然气，因为纯可再生能源达不到 AI 规模工作负载所需的可用性。估值上，这意味着 Mainspring
              面对真实且增长的需求池，但变现取决于项目执行、许可、融资，以及买方是否愿意在关键任务环境中采用较新的技术。
