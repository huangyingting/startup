            body: >-
              如果买方越来越把模块化低排放发电作为一个宽类别采购，大型在位者和更大的直接同行就能把 Mainspring
              的价值主张吸收到更大的打包方案、更强资产负债表和更成熟服务网络中。公开定价不透明会放大这一风险，因为外部观察者还无法证明 Mainspring 靠已实现经济性赢单。
