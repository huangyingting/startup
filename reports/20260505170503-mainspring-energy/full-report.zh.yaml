          - type: callout
            title: 多燃料能力是真正的缓释因素
            body: Mainspring 的燃料灵活设计显著降低单一燃料依赖，也有助于韧性；但它应被放在更大的执行风险框架里，当作缓释因素，而不是完整的风险消除器。
            calloutType: strength
            claimRefs:
              - CR013
              - CR018
              - CR019
