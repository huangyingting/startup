  - id: FE004
    title: 产品成熟度 / 能力图
    type: matrix
    layout: wide
    summary: 从成熟度、证据质量、部署广度和公开风险透明度四个维度，给公开可见能力最强的领域打分。
    data:
      columns:
        - 成熟度
        - 证据质量
        - 部署广度
        - 公开风险透明度
      rows:
        - label: 核心发电机硬件
          values:
