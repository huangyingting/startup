      - number: '7.3'
        title: 监管、法律和披露缺口
        blocks:
          - type: paragraph
            body: >-
              监管态势方向上有利，但风险尚未完全解除。Mainspring 在 2024 年向 California Energy Commission 提交的文件称，平台在天然气和 RNG/沼气上已完全商业化，在 100%
              氢气上通过 1,000 小时测试，并且核心燃气应用已走出试点状态。这支撑了当前部署就绪度，但氢气商业化仍由里程碑驱动，还没有在已披露收入或运营数据中得到广泛证明。法律和合规披露也偏薄。网站发布了 2025
              年隐私政策、2025
              年使用条款和供应商治理材料，说明基础法律卫生还在。但已审阅公开证据未披露正在进行的诉讼、网络安全事件、客户集中度或可靠性指标。这些缺口迫使尽调继续盯住下行情景，而不是因为营销材料里没有明显事故就假设风险很低。因此，营销渠道里没有反向证据，应解读为信息缺口，不是剩余风险低的证明。
