      - number: '7.4'
        title: 投资含义和否决标准
        blocks:
          - type: paragraph
            body: >-
              关键投资含义是，Mainspring
              现在更像一个正在扩张的工业平台，而不是投机性实验室公司；但它披露的运营证据还不足以把它当作常规项目融资或电力设备承销案例。最有用的否决标准因此应当可观察、且偏近端：Pennsylvania
              工厂爬坡滑坡，旗舰公用事业或市政公告迟迟无法转为运营资产，机队扩大后仍不披露可靠性和服务指标，客户集中在少数交易对手，或税收抵免等政策支持削弱项目经济性。如果这些指标走错方向，当前灵活、可快速部署本地电力的叙事可能转化为利润率挤压、融资依赖和估值下行。上述标准实用，因为未来公开更新和向管理层索取的定向尽调包都能检验。投资者还应把管理层关于快速部署的说法，同项目许可、设备投运、员工培训和长尾服务支持的慢现实对照；许多硬件故事正是在这里失去估值支撑。
            claimRefs:
              - CR009
              - CR014
