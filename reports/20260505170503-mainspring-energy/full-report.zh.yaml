        title: 架构、部署模式与工程成熟度
        blocks:
          - type: paragraph
            body: >-
              对于一家后期私营硬件公司，公开技术细节异常充分。官方产品页和 California Energy Commission
              报告都描述了一种低温、非燃烧反应：压力循环推动振荡器穿过铜线圈，电力电子替代传统发电机使用的旋转机械架构。CEC 报告为这种解释增加了独立结构：它记录了 Colton 一个杂货站点的 230 kW 示范，称截至
              2023 年 7 月该设备仍在运行，并表示经过九个多月监测后，输出、排放、效率和运行时间目标均已达成。同一报告称，封装产品通过 UL-2200 列名，并使用 UL-1741-SA
              列名的并网逆变器；这一点重要，因为它把模糊的“安全可靠”营销转成真实认证链条。开发者信号也重要。当前招聘描述了一个从云到现场的软件生态，包含遥测采集、安全远程监控、预测性维护、数据平台、控制仿真、嵌入式软件和
              AI 辅助机群优化。CoLab 案例进一步说明，Mainspring 已在处理非平凡硬件复杂度：超过 3,000 个独特零件、约 30 名机械工程师，以及跨硬件、软件、控制、系统和供应商的多学科工作流。
