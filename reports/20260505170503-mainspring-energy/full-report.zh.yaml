      - number: '7.2'
        title: 运营、依赖和制造风险
        blocks:
          - type: paragraph
            body: >-
              运营风险集中在把硬件平台扩到更大、时间要求更高的部署中。公开材料强调快速部署、模块化可用性、多燃料灵活性和低排放，但也显示公司正在进入更大、更关键的安装场景，例如 48 MW
              市政公用事业项目、Chattanooga 废水项目和国防试点。Pennsylvania 工厂有战略意义，因为它计划把产量提高到每年 1,000 台，并创造 600
              多个运营岗位；但工厂也带来明显爬坡风险：劳动力、供应商质量、投运纪律和项目转化都必须同步改善。多燃料能力能缓解单一燃料依赖，但抹不掉工厂、安装或现场服务风险。投资者应把每个新的标杆部署同时视为验证和压力测试，因为站点越大，对安装、正常运行时间、供应商和服务协同的要求就越高。
