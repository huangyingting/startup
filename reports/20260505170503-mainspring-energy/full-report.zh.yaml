  - number: 8
    title: 估值
    sections:
      - number: '8.1'
        title: 当前进入背景
        blocks:
          - type: paragraph
            body: >-
              Mainspring 的公开叙事支撑商业重要性，但不能支撑精确定价。公司最近完成 $258 million Series F 轮融资，称累计融资已超过 $800
              million，并继续增加大型参考部署和制造产能。这足以说明业务既没有停滞，也不是纯概念。它不足以判断今天的私募估值是有吸引力、合理还是偏高，因为公司没有公开披露收入、毛利率、订单储备、当前投后估值或股权结构条款。实际操作中，投资者可以承销战略动能和执行风险，但无法承销进入价格。因此，估值工作更像设定锚定区间和尽调优先级，而不是给出确定的公允价值数学。这一限制很重要，因为私营公司估值纪律主要看进入价格和下行结构，不是抽象地欣赏战略重要性。
            claimRefs:
              - CR007
              - CR008
              - CV004
              - CV007
              - CV009
              - CV027
              - CV028
              - CV029
      - number: '8.2'
        title: 可比锚点和情景框架
        blocks:
          - type: paragraph
            body: >-
              最有用的公开锚点是工业和电力设备同行，而不是软件公司。Generac、Cummins 和 Caterpillar 都提供可交易市值和收入参考点，也发布了适合制造驱动电力平台的风险披露。若用市值 /
              收入作为简单公开锚点，观察到的区间从 Cummins 约 2.7x 到 Caterpillar 6.0x，Generac 约 3.6x。这个区间有信息量，但并不完美。Caterpillar
              内含更大、更多元的工业平台，而 Generac 和 Cummins 在电力设备执行风险上更可比。Bloom Energy
              这样的清洁技术同行还给出另一条重要经验：强增长仍可能与保修准备金、债务和商业化噪音并存。正确解读是，Mainspring
              只有证明制造规模和服务耐久性，才可能拿到溢价倍数，而不是仅仅因为电力需求火热。换句话说，可比公司有助于纪律和情景框架，但不能替代公司自身的财务披露。
            claimRefs:
              - CV013
              - CV014
              - CV015
              - CV016
              - CV017
