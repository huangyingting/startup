        title: 资本充足性与融资依赖
        blocks:
          - type: paragraph
            body: >-
              公开来源清楚显示 Mainspring 已融资大量资本，但没有显示这些资本是否足够。2025 年 4 月 Series F 轮带来 $258 million，用于扩大制造和客户销售；公司称累计融资已超过 $800
              million。除风险投资外，DOE 还选择 Mainspring 获得 $87 million 制造拨款，对应一项超过 $175 million 的 Pennsylvania 投资：一座近
              300,000-square-foot 工厂，年产能 1,000 台发电机，可雇用 600 多人。历史 SEC 文件证据也确认，Mainspring 过去使用过豁免私募融资；2021 年 7 月 Form D
              显示总发行规模 $110 million，已售 $108.1 million。所有这些都支持 Mainspring
              有足够资本推进制造扩张和大型项目。没有任何资料披露手头现金、月度烧钱、营运资本拖累、债务义务、回款时点或现金跑道。Latitude 2025 年 5 月报道增加了一个反向细节：DOE
              奖项的拨付时间看起来处于不确定状态。结论是，对资本可得性有方向性信心，但无法判断近期现金储备是否充足。
