            title: Mainspring 在许可和灵活性上有真实切入口
            body: 公开证据持续显示，公司在无缝燃料切换、低排放和模块化部署上有差异化叙事。这个组合强于泛泛的“现场电力”说法，也有助于解释为什么 Schneider、Lineage 和公用事业相关部署是战略上重要的证明点。
