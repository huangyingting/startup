  - id: FU001
    title: 客户旅程图
    type: journey-map
    layout: wide
    summary: 梳理主要客户细分如何从电力痛点走向部署，再走向重复站点扩张。
    data:
      items:
        - label: Kroger / 零售
          detail: 高电价痛点 -> 融资型站内选项 -> 部署门店级发电 -> 在更多地点采用
        - label: Lineage / 冷链
          detail: 光伏稳供和韧性电力需求 -> 首站验证 -> 多站点计划 -> 更广泛的设施扩张
        - label: 公共电力 / 公用事业
          detail: 容量或费率压力 -> 评估可调度本地发电 -> 获批并建设 -> 用于尖峰和本地容量
        - label: 沼气 / 废水
          detail: 变现甲烷并减少放空燃烧 -> 验证燃料灵活发电 -> 分阶段安装 -> 增加更多站点或第二阶段
        - label: 数据中心 / 关键负荷
          detail: 互联延迟威胁上线 -> 选择不依赖电网的电力 -> 交钥匙部署 -> 追加模块化 25-50 MW 区块
    approximationNotes: 旅程图综合命名客户案例中反复出现的模式，而不是描绘一套通用的内部销售打法。
    claimRefs:
