      - number: '6.2'
        title: 具名客户证明真实且越来越接近生产级，最强证据来自成本、韧性和扩张
        blocks:
          - type: paragraph
            body: >-
              Mainspring 达到了具名客户证明门槛，因为留存证据不止客户标识和泛泛背书。Kroger 官方客户页称系统带来可预测且更低的能源成本；Trellis
              补充了融资细节，并引用直接表述，解释为什么这家杂货商喜欢无资本开支、无维护结构。Lineage 有多层证据：官方企业定位、2022 年最高 150 台发电机协议，以及 2024 年 Texas
              扩张，覆盖五座设施、33 台发电机。UMPA 的 48 MW Utah 中部项目大到具有战略意义；Lathrop Irrigation District 则是整个公开材料中最清晰的结果故事之一，因为
              Mainspring 声称其电价降低 40%、覆盖 95% 峰值负荷、三个月拿到空气许可、七个月完成交付。CalBio 和 MBEC 说明产品不限于企业园区：二者都用站点甲烷或沼气发电，CalBio
              扩展到五个站点共 5.3 MW，Chattanooga 则以两阶段实现 3 MW，并瞄准抵消三分之一电费。


              最强共同结果不是软件式生产率指标，而是物理部署和能源经济性指标。公开来源反复提到更低或更可预测的能源成本、快于公用事业时间线的可用性、电网约束下的韧性、甲烷变现和较低排放许可。EdgeConneX
              围绕上市时间和负荷跟随可调度性叙述；Prologis 围绕九个月拿到卡车充电电力，而不是三年；Air Force 则围绕任务韧性和燃料灵活性测试。这个证据组合支持一个平衡结论：Mainspring
              在多个严苛客户类型中有可信生产证明，而且 2025-2026
              年随着更大项目和多站点扩张出现，证明越来越新。公开来源仍未显示的是广泛队列耐久度——部署证明很多，但续约、标准化正常运行时间或细分层面留存质量披露很少。
