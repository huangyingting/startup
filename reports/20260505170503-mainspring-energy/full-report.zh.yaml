        - 工厂爬坡按时落地，旗舰项目转化，公司开始披露可靠性和收入规模。
        - 高端公共可比公司锚点会更可信；工业稀缺性的溢价叙事也可能站得住。
        - 如果规模扩张跑过质量，质保或服务问题仍会限制上行。
        - 需要多个新证据支撑，所以当前信号偏弱。
      - - 基准
        - 需求仍强，但披露继续有限，工厂爬坡仍是关键闸门。
        - 采用中低位公共可比公司锚点，并因不透明性坚持估值折价。
        - 价格风险和稀释风险仍然显著。
        - 最符合当前公开证据。
      - - 悲观
        - 工厂或部署持续延期，经济性仍不披露。
        - 降价融资或倍数严重压缩风险占主导；重点转向保本。
        - 执行延误、集中度和更高融资需求。
