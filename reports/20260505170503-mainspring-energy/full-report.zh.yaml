        title: GTM 路径与销售效率代理指标
        blocks:
          - type: paragraph
            body: >-
              Mainspring 的 GTM 更像咨询式、基础设施牵引，而不是交易式。最强证据来自它强调的客户和合作类型：Schneider 主导的微电网、Lineage
              推广、公用事业项目、数据中心信息以及为快速容量部署而扩张的制造能力。这些不是轻量自助流程；它们意味着销售周期长、站点设计、许可、安装和融资协调。PG&E 2025 年 2
              月的数据中心并网发布很重要，因为它显示了帮助 Mainspring 的周边市场条件：大型客户希望拿电速度快于公用事业总能交付的速度，一些客户也愿意在新电价机制下预先出资建设基础设施。这让 Mainspring
              的“快速供电”主张即便没有公开 CAC
              或回本周期指标，也具备经济可信度。缺失的是效率测量。没有留存来源披露销售周期时长、销售管线转化、CAC、获客人员数或回本周期，因此本章只能推断这是一种高接触模式，平均合同价值可能较强，但获客和部署摩擦很重。
