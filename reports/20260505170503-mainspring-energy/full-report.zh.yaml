  - number: 6
    title: 客户情况
    sections:
      - number: '6.1'
        title: 客户分层横跨多类重资产运营商，但最清晰契合点是受电力约束的关键负载
        blocks:
          - type: paragraph
            body: >-
              Mainspring
              的公开客户群并不随机。留存解决方案页面和项目公告持续聚集在这样一类运营商周围：电力要么是核心运营投入，要么卡住增长。它们包括想要可预测能源成本的杂货和冷链运营商、需要本地容量的公共电力和灌溉实体、能把甲烷变现的奶牛场和污水处理运营商、等不起并网的数据中心开发商，以及
              Air Force 等公共部门韧性买方。这个模式很重要，因为公司的买方通常不是泛泛采购备用发电的设施经理，而是面对具体电力约束、许可问题或脱碳要求的决策者。Schneider 合作发布、公用事业 /
              客户专题，以及物流 / 数据中心故事都指向同一方向：当拿电速度、模块化加装、燃料灵活性和低 NOx 选址在经济上有意义，而不只是锦上添花时，Mainspring 更容易赢。


              因此，按垂直行业看，分层很宽；按运营画像看，分层很窄。Kroger 和 Lineage 的终端市场差异很大，但都用 Mainspring 控制现场能源成本并提升韧性。UMPA 和 Lathrop
              Irrigation District 位于公用事业 / 公共电力一侧，但它们出现在记录中，是因为本地可调度发电能解决容量和费率压力。CalBio 和 Chattanooga 的 MBEC
              用系统把废弃甲烷转成电力，营收逻辑与零售或数据中心很不同，但同样被模块化、易获许可的本地发电吸引。EdgeConneX、Prologis 和 Amazon
              又增加了一个细分：电网延迟本身就是切入口。公开证据因此支持一种客户逻辑：Mainspring 的核心买方是能源密集、关键任务、存在站点级部署痛点的运营商，而不是大众备用电源买家。
