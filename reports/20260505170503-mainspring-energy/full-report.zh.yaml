      - number: '4.3'
        title: 成本结构与利润率路径
        blocks:
          - type: paragraph
            body: >-
              Mainspring 的结构看起来比纯软件业务更资本密集。官方页面强调相对替代方案的更低资本开支、更低维护和更高效率，但这些是面向买方的价值主张，不是已报告利润率。DOE 拨款和 Pennsylvania
              工厂计划意味着真实的制造、工装和员工扩张；CEC
              报告进一步把产品定位为硬件系统，其价值建立在效率、排放、燃料灵活性和低成本上。这指向一种混合成本结构，覆盖发电机制造、现场部署、服务和合作伙伴支持。上市公司可比对象给出可能结果区间。Bloom
              显示，低排放现场电力供应商可以在规模化后达到 27.5% 毛利率；Cummins 显示，一个大得多的工业电力业务有 24.7% 毛利率。Capstone
              是下行提醒：即便有服务成分，分布式发电供应商仍可能面对积压订单压缩、重组和流动性压力。缺口很明显：Mainspring
              没有披露自身毛利率、按部署划分的贡献利润率，或服务与硬件组合，因此投资者还无法把它有把握地放进这个区间。
