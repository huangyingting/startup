      - number: '5.3'
        title: 差异化、信任控制与剩余技术缺口
        blocks:
          - type: paragraph
            body: >-
              Mainspring 最清晰的差异化主张，是把类似燃料电池的效率和排放，与类似发动机的可调度性和更低机械复杂度结合起来。CEC 报告、IEEE Spectrum 解释文章、Schneider 合作材料和
              Xendee 网络研讨会都支持同一个架构层面的投资逻辑：产品无需改造即可在多种气态燃料之间切换，能快速爬坡，也能嵌入微电网或可再生能源稳定出力设计。公开运营证明也在变宽：AEP 试点把该资产定位为调峰机组替代和
              EV 充电助推器；Schneider 将其打包进 EcoStruxure 微电网方案；DCVC 描述了一个 Prologis
              卡车充电部署，现场电力九个月到位，而不是等待多年公用事业时间线。即便如此，信任和质量故事并不均衡。公开排放和电气认证证据不错，但留存来源中看不到公开信任中心、公开 SOC 2
              或网络安全认证包、已发布机群可用性数据集，也看不到面向客户的 API 或 SDK 文档。这些缺口不会推翻核心硬件投资逻辑，但很重要，因为 Mainspring
              越来越卖给数据中心、公用事业、污水处理厂和国防试点等对正常运行时间敏感的环境，软件控制平面和服务响应会成为产品本身的一部分。另一个实际影响是，产品尽调现在必须同时覆盖机电稳健性和远程服务层的运营成熟度。公开来源支持硬件逻辑，但还没有显示告警如何分诊、远程操作如何授权，或软件发布在现场推出前如何验证。当买方依赖该资产提供关键容量，而不是偶尔备用时，这些不是装饰性缺口。
