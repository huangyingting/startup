      - number: '3.3'
        title: 渠道力量、切换成本与多归属
        blocks:
          - type: paragraph
            body: >-
              Mainspring 最强的战略问题，不是证明产品新颖，而是在大型在位者压缩这个类别之前，把新颖性变成可重复的分销和切换成本。Schneider 合作直接回应了这个问题：它把 Linear Generator 与
              Schneider 的 EcoStruxure 微电网设计 / 建造方案打包，让 Mainspring 更容易被纳入更宽的韧性项目采购。Lineage
              提供第二种杠杆：多站点重复部署围绕成本节约、光伏稳定出力和可预测现场电力经济性建立可引用案例。即便如此，买方通常可以多归属。一个站点可能把 Mainspring 或 Bloom
              发电与电池、光伏、控制系统和传统备用发动机混合使用。UtilityDive
              的报道也强化了这一点：客户推进数据中心和车队电气化项目时，常常是在解决拿电速度，而不是追求品牌忠诚。因此，如果并网延迟缓解，Mainspring 当前的一部分切入口可能收窄。Mainspring
              需要让合作伙伴触达、许可优势和机群运营数据的复利，跑得比市场围绕任何模块化低排放发电供应商标准化的速度更快。
