      - number: '4.5'
        title: 财务结论与尽调阻断点
        blocks:
          - type: paragraph
            body: >-
              公开案例支持从战略需求角度投资 Mainspring，但还不足以按经济性承销。收入质量看起来强于未商业化科学项目，因为公司自 2020 年起有商业出货，数百兆瓦处于现场运营和高级开发，通过 Lineage
              有重复客户证据，也有足以支撑制造扩张的融资栈。利润率质量的公开案例弱得多。官方来源没有披露收入、ARR、毛利率、现金、烧钱速度、现金跑道、客户集中度、积压订单转化或项目级贡献利润率。这意味着正确的投资者立场不是“没有经济性”，而是“经济性尚不可观测”。优先尽调问题包括：过去
              24 个月按客户类型拆分的订单和收入；硬件与服务毛利率；每次部署的营运资本需求；月度烧钱和当前现金；DOE
              拨款到账的时间和确定性；以及融资项目是创造经常性现金流，还是只是推迟硬件付款。在这些数据可得之前，估值锚点既要看市场需求，也要看资本效率风险。
            claimRefs:
              - CP001
              - CI008
