      - number: '2.3'
        title: 买方、用户、付款方与采用路径
        blocks:
          - type: paragraph
            body: >-
              买方图谱多元但逻辑一致。在公共电力和公用事业场景中，经济买方是公用事业总经理、发电 VP
              或公共电力董事会，他们需要可获许可、部署速度快于变电站或输电升级的本地容量。数据中心里，买方通常是基础设施或电力架构团队，电力接入和正常运行时间会卡住新站点上线。车队 EV
              充电中，付款方可能在运营、设施或电气化项目预算里，他们更关心快速供电，而不是批发能源优化。污水处理和沼气场景中，买方往往是基础设施运营商或项目开发商，一边把废弃甲烷变现，一边降低电费或排放。


              各细分市场的采用路径也一致。公开来源反复指向同一种触发事件：电网拥堵、漫长并网周期、负荷增长、韧性需求或脱碳要求。买方随后评估现场或具备微电网能力的解决方案，往往会通过 Schneider、ABM 或
              NextEra 这样的合作伙伴推进，因为融资、EPC 和集成复杂度本身就是销售的一部分。首个部署成功后，扩张可以进入更多站点或更大容量块；CalBio 的多站点扩容，以及 Mainspring
              对杂货店和公共电力扩张的表述，都说明了这一点。
