      - number: '6.3'
        title: 扩张逻辑可见，但集中度、留存和合同质量仍是主要公开盲区
        blocks:
          - type: paragraph
            body: >-
              最好的公开扩张信号，是首个站点跑通后继续重复部署。Kroger 称已开始在其他地点采用该技术。Lineage 从早期冷库部署走向网络协议，随后又在 Texas 推出覆盖五座设施、33 台发电机的项目。CalBio
              在 Hanford、Buttonwillow 和 Merced 早期部署后，又为另外两个集群站点购买八台发电机。MBEC
              第一阶段六台发电机，明确与园区升级完成后的第二阶段六台发电机配对。这些信号有意义，因为它们显示客户不是只试点一次资产，而是在思考模块化本地发电如何嵌入网络级能源战略。合作伙伴支持的融资和渠道支持强化了这一模式。Trellis
              和 Canary 都描述了 NextEra 支持的结构，可以降低前期资本摩擦；Mainspring 的经销商发布也说明公司在建设不止直销的销售动作。


              但在经典耐久度和集中度问题上，公开记录仍顽固薄弱。留存公开资料没有披露总活跃客户数、NRR、GRR、流失率、中位合同期限、续约率或头部客户收入占比。公开客户证明也集中在相对少数可见名称上；这有利于证明质量，却不利于集中度透明度：投资者能看到几个强客户名称，却看不出收入有多少依赖少数基础设施级客户或融资伙伴。满意度证明同样不均衡。项目公告和客户引语是正面的，但它们并不等同于广泛调查、评价或队列数据。因此，客户结论是建设性但不完整：Mainspring
              看起来能切入困难能源问题，并在首个部署奏效后扩张；但公开证据本身仍无法验证组合耐久度或集中度风险。
