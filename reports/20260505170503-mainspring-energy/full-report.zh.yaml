  - number: 3
    title: 竞争格局
    sections:
      - number: '3.1'
        title: 竞争格局概览
        blocks:
          - type: paragraph
            body: >-
              Mainspring
              不是只和一家清洁发电初创公司竞争。相关买方替代方案包括直接的低排放现场供电同行、传统发动机和发电机厂商、相邻微电网集成商，以及电网供电加传统备用的现状。客户想为数据中心和其他关键负载采购低排放现场发电时，Bloom
              Energy 是最明显的直接高端替代。Capstone Green Energy 是模块化 CHP 和微型燃气轮机替代方案，在微电网和数据中心也有有意义的案例。Cummins
              代表在位者威胁：其数据中心页面、年报和业绩发布显示，它拥有大得多的装机基础、宽广的天然气和备用电力产品目录，以及与数据中心相关发电市场的强劲需求。Mainspring
              自己面向公用事业、企业、工业用户和数据中心定位，因此它不是处在狭窄单一垂直市场，而是卡在关键电力采购、脱碳预算和电网容量瓶颈的交汇处。
