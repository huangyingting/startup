      - number: '1.2'
        title: 创始人、领导层与治理
        blocks:
          - type: paragraph
            body: >-
              留存来源中的公开创始人组合一致：Shannon Miller、Adam Simpson 和 Matt Svrcek。Shannon Miller
              仍是最清晰的关键人物。公司发布、合作伙伴公告、投资者评论和行业文章都将他列为创始人兼
              CEO；在融资、产品和市场采用议题上，他也是主要被引用的发言人。这种集中度带来真实的关键人物依赖，因为投资者、合作伙伴和媒体叙事都围绕 Miller 的判断以及技术—商业框架展开。


              领导层宽度在改善，但公开观感仍偏创始人中心。Adam Simpson 一直被列为联合创始人，但外部可见头衔随时间变化：2024 年 7 月经销商公告称他为首席产品官，2026 年 2 月和 3
              月客户公告则称他为首席商务官。这个变化暗示，部署规模扩大后，内部领导分工正在向商业化演进。2025 年 4 月，Tom Linebarger 和 Bethany Mayer 在 Series F
              轮公告中加入董事会，公开治理也随之加强。Linebarger 带来 Cummins 的深厚发电运营信誉，Mayer
              则带来硬件和上市公司运营经验。即便如此，公开可见的管理梯队仍比累计融资规模暗示的要薄，因为已审阅来源没有披露完整的当前高管名单、委员会结构或详细控制权。
