        - 要求按细分市场披露合作伙伴管线转化率和售后支持归属
      - - 大型用能方看重快速许可和接电速度
        - 需求可能仍集中在电网受限或高耗能垂直领域
        - TAM 可能小于泛化的“所有备用电源”叙事
        - 要求按垂直领域披露赢单 / 输单数据，以及小客户转化或不转化的原因
      - - 多阶段项目形成可见扩张路径
        - 二期延迟可能掩盖较弱的实际 ROI 或更慢的投运
        - 如果后续阶段滑坡，扩张观感可能跑在实际现金生成之前
        - 要求披露里程碑完成数据、一期站点运行表现以及任何进度变动原因
    notes: 扩张逻辑在公开资料中可见，但等式另一边的集中度仍大多不透明。
