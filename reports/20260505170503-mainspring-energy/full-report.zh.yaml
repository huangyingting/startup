    layout: standard
    summary: 对估值最敏感的变量是工厂爬坡、财务披露和现场可靠性，而不只是宽泛市场需求。
    data:
      items:
        - label: 工厂爬坡验证
          value: 10
        - label: 收入披露
          value: 9
        - label: 可靠性 / 质保可见度
