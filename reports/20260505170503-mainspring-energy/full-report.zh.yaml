  - number: 5
    title: 产品与技术
    sections:
      - number: '5.1'
        title: 产品定义、用例与工作流匹配
        blocks:
          - type: paragraph
            body: >-
              Mainspring 销售 Linear Generator
              时，把它说成本地电力，而不是普通备用机组。产品、公用事业、数据中心、企业和工业页面反复讲同一套主张：客户需要可靠可调电力，又不想要柴油式排放或单一燃料依赖，就可以部署工厂制造的 250 kW
              套件，并随负荷增长模块化堆叠。放在工作流里，产品位于燃料供应、客户现场电力负荷和可选电网互联之间。数据中心买方看到的是一条从受电网限制的土地走向可孤岛运行现场发电的路径；公用事业看到本地可靠容量和近负荷平衡；企业客户看到成本可控的主供电和光伏稳定出力；工业甲烷和沼气运营商看到废弃物转电的变现。官方产品页用具体规格锚定核心价值主张——46%
              net-AC 效率、低于 1.5 ppm NOx、不耗水、0-100% 可调度——Energy Intelligence 访谈和 Latitude Media 报道则把同一工作流延伸到 EdgeConneX
              式数据中心、Amazon 物流和军事韧性用例。公开记录因此支持一个结论：Mainspring 的产品—市场框架很具体、偏运营，不只是抽象清洁能源品牌。
