          - type: callout
            title: 尽调应聚焦非公开运营证明
            body: 价值最高的尽调问题是可靠性、保修、客户集中度和工厂爬坡指标。在当前阶段，这些事项比继续做市场规模测算更能决定投资判断。
            calloutType: recommendation
