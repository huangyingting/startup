        - 对 NextEra 等融资伙伴的依赖会影响赢单率和经济性
        - 如果融资收紧，销售速度或客户 ROI 可能大幅变化
        - 要求按结构披露自筹、伙伴融资和服务型交易的占比及毛利
      - - 渠道合作伙伴把触达面扩到直销之外
