  - number: 7
    title: 风险
    sections:
      - number: '7.1'
        title: 首要风险图景
        blocks:
          - type: paragraph
            body: >-
              Mainspring 的公开记录显示，风险很高，但仍可管理。公司显然有商业动能：它称已有超过 500 MW 处于后期开发和运营，2025 年宣布 $258 million Series F 轮融资，获得 $87
              million 的 DOE 支持制造奖项，并在 2026
              年公布了公用事业、市政和国防项目。这些利好没有消除核心承销难题。到这一阶段，能降低感知风险的关键证明点大多仍未公开：机队可靠性、保修损失历史、已披露订单储备转化、客户集中度，以及当前单位经济性。结果是一家公司看起来已有需求验证、也顺着政策方向走，但很难精准衡量剩余执行风险。公开证据还意味着，尽调应先把已宣布产能和补助同真实投运节奏、可维护性和客户集中度对照，再假设当前叙事会顺利转化为耐久现金生成。
            claimRefs:
              - CR001
