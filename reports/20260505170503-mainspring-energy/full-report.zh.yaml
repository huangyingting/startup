      - number: '3.5'
        title: 反向证据与竞争结论
        blocks:
          - type: paragraph
            body: >-
              留存来源中，主要反向证据不是灾难性产品失败，而是市场不透明叠加重量级替代方案。Mainspring、Bloom、Capstone 和 Cummins 的公开定价都高度定制，这意味着投资者还无法证明
              Mainspring 是靠已实现经济性取胜，而不只是靠类别叙事取胜。Capstone 破产后的风险因素和较弱积压订单表明，当商业化路径跑得比资产负债表更快时，分布式发电市场会惩罚公司。Bloom
              证明大型低排放现场电力供应商可以达到上市公司收入规模；如果客户认为燃料电池是更安全的高端选择，Mainspring 就会暴露。Cummins 展示了相反威胁：即便没有 Mainspring
              的燃料灵活性叙事，既有发电机厂商也能用分销和服务深度防守客户。投资结论是，Mainspring
              有可信切入口，但仍是执行护城河。许可、燃料切换和快速部署最重要的地方，它的差异化最强；如果买方采购由在位者服务网络、定制定价和单一供应商打包多类电力资产的能力主导，差异化就最弱。
