            body: >-
              Bloom Energy 和 Capstone 重要，是因为它们给客户提供了一条无需等待公用事业并网周期也能获得现场电力的可信路径。Bloom 的规模明显大于 Mainspring：2024 年收入 $1.47
              billion，年度毛利率 27.5%，2024 年 11 月与 AEP 签署最高 1 GW 燃料电池协议，并在 2024 年 5 月扩建 Intel 的 Santa Clara
              高性能计算数据中心。Capstone 处在更低的技术曲线上，但在表后和微电网采购中仍有相关性，因为它销售 65 kW
              到多兆瓦级微型燃气轮机，强调数据中心案例，并且历史上有相当比例收入来自服务。Mainspring 自身商业牵引力仍更小，但官方和独立来源显示，自 2020
              年起已有商业出货，数百兆瓦处于现场运营和高级开发，已有具名 Lineage 部署，并通过 Schneider Electric 形成新兴渠道策略。Hyliion 也是可信的潜在进入者，因为 Energy
              Intelligence 报道称，它正在通过 Flexnode 在数据园区部署类似线性发电机概念。
