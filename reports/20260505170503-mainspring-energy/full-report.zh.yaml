      - number: '1.3'
        title: 融资历史、规模信号与里程碑轨迹
        blocks:
          - type: paragraph
            body: >-
              到 2025 年 4 月，Mainspring 凭借 $258 million Series F 轮进入后期私营公司状态；该轮由 General Catalyst 领投，Amazon’s Climate
              Pledge Fund、DCVC、Temasek、Marunouchi Innovation Partners、M&G、Pictet、Lightrock、LGT Bank、Khosla Ventures 和
              Gates Frontier 参投。该轮也伴随新董事任命，并明确讲述制造和销售扩张叙事。不过，公开累计融资数字并不完全一致。Mainspring 自己的 Series F 轮发布稿称，公司已获得超过 $800
              million 融资，而 Tracxn 2026 年 3 月资料列示五轮融资共 $739 million。可能的解释是，Mainspring 更宽泛的“融资”口径包含项目融资或非轮次资本，而 Tracxn
              未计入；但已审阅来源没有明说。


              运营上，即便没有披露收入，公开规模信号也足够重要。官网称有超过 500 MW 处于后期开发和运营；2025 年 Series F 轮发布稿和 2026 年客户公告提到数百兆瓦处于高级开发和现场运营；合作伙伴 /
              客户证据指向冷库、奶牛场沼气、污水处理、车队 EV 充电以及公用事业 / 公共电力场景中的真实项目。Mainspring 的时间线也显示技术在成熟：2021 年产品发布并建立 $150 million
              NextEra 关系，2022 年达成氢和氨燃料灵活性里程碑，2024 年扩展渠道和微电网合作，2025 年增加大额融资和董事会厚度，2026 年通过 CalBio 和 Chattanooga
              扩大证明点。已审阅公开材料仍没有收入、估值金额和客户总数，因此这些封面指标必须保持明确未决。
