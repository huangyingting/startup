chapters:
  - number: 1
    title: 公司概况
    sections:
      - number: '1.1'
        title: 身份、产品与商业模式
        blocks:
          - type: paragraph
            body: >-
              Mainspring Energy 把自己定位为本地、燃料灵活、低排放电力供应商，而不是普通发电机厂商。官方材料将核心产品称为 Mainspring Linear
              Generator：一套可调度的现场供电系统，可从单台 250 kW 设备扩展到 100 MW
              以上阵列。产品可使用天然气、丙烷、沼气、氢和氨等多种气态燃料，这正是公司叙事的核心：客户可以先用传统燃料快速加装容量，之后再转向低碳燃料，而无需替换已安装资产。TechCrunch 的 2021 年发布报道和
              Mainspring 自己的发布稿，都把产品源头追溯到三位创始人在 Stanford 热力学实验室的研究，使公司拥有一条可信的、扎根深度技术研发的创始人与市场匹配故事。


              Mainspring
              的商业模式由部署牵引。公司并不把自己包装成只通过分销渠道卖货的大宗设备商；官方和合作伙伴材料反复强调交钥匙或合作伙伴协助的部署、融资关系以及针对项目的韧性结果。公开资料显示，公司客户覆盖公用事业、商业和工业场地、冷库、污水甲烷、奶牛场沼气、EV
              充电和微电网应用。这个组合说明，Mainspring 参与的是资本密集型电力基础设施市场，客户采用不只看硬件性能，也同样取决于项目开发、许可和融资支持。产品反复围绕“快速供电”、低 NOx
              排放和燃料可选性来定位，说明 Mainspring 变现的不是单纯效率溢价，而是可靠性和部署时点问题。
