      - number: '8.4'
        title: 什么会改变判断
        blocks:
          - type: paragraph
            body: >-
              建议可以上调，但前提是最关键变量出现新证据。更强判断需要看到 Pennsylvania 工厂爬坡进展、披露的可靠性和保修指标、客户与订单储备多元化，以及至少部分可信的收入规模或价格支撑披露。这些事项决定
              Mainspring
              应靠近公开可比估值锚点的中低端还是上端。反过来，如果大型项目滑坡，如果运营证明尚未跟上、融资需求就上升，或者公司在扩张资本密集型硬件时仍对经济性保持不透明，下行风险会占主导。因此，投资者应把当前公开可比公司视作上限信号和尽调清单，而不是当前私募价格合理的直接确认。在那之前，正确姿态是继续把尽调集中在能把可比公司集合从上限变成真实承销工具的变量上。更好的价格判断需要的不只是又一条融资新闻，而是公司能把制造规模和旗舰项目转化为透明、可重复经济性的证据。
