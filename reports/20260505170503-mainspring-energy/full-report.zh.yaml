  - number: 4
    title: 财务情况
    sections:
      - number: '4.1'
        title: 收入模式与变现
        blocks:
          - type: paragraph
            body: >-
              留存公开记录支持一种以销售或融资模块化现场供电系统为核心的收入模式：先交付系统，再叠加服务、维护和重复站点扩张，而不是销售透明的软件订阅。Mainspring
              的企业和解决方案页面反复把产品定位为交钥匙现场供电方案，可通过灵活所有权结构、月付和维护选项购买。产品明确面向公用事业、企业、工业用户和数据中心，说明这是一门部署牵引型业务，变现更多跟项目范围和站点运营经济性走，而不是跟席位使用量走。Lineage
              的客户证据强化了这一解释：部署会随时间跨设施扩展，指向重复项目收入以及潜在服务或机群管理经济性。关键约束是，Mainspring 不公布标价、购电费率、ACV
              区间或披露的服务附着率。因此，公开证据能支持收入模式结构，却无法支持其实际组合或质量。
