      - number: '2.2'
        title: 规模测算视角：需求池很大，但没有干净的公开 Mainspring 专属 TAM
        blocks:
          - type: paragraph
            body: >-
              没有一个留存来源能干净测出 Mainspring 专属 TAM，因此市场必须通过相邻公开视角三角测算。最强视角是美国数据中心电力需求，因为它直接反映 Mainspring
              进入市场时所面对的“现在就要电力”问题。McKinsey 估计，美国数据中心需求将从 2024 年的 25 GW 升至 2030 年的 80 GW 以上，电力需求占美国总需求的比例将从当前 3-4% 升至
              2030 年的 11-12%，并需要超过 50 GW 额外容量。Bloom Energy 的 2025 年报告也指向同一方向：未来五年已宣布数据中心容量为 35 GW，并称约 30% 站点预计到 2030
              年会把现场电力作为主要来源。Wood Mackenzie 的口径更扩张，跟踪到 134 GW 拟建美国数据中心，同时还有 64 GW 已承诺公用事业服务和另外 132 GW 大负荷排队。


              这些数字并不意味着 Mainspring 的 TAM 就是“80 GW”或“134 GW”。它们是相邻需求指标，显示电力稀缺的规模，而这种稀缺给现场解决方案留出了空间。Mainspring 更近端的
              SAM，更可能是这些市场中表后部署、低排放许可和多燃料灵活性起决定作用的子集：UMPA 这类公共电力项目、关键 C&I
              场地、车队电气化、冷库、污水甲烷以及部分数据中心。由于公开来源没有用经审计支出或装机容量总量单独切出这个子集，任何 TAM/SAM/SOM 堆栈都只能作为近似值，而不能当成硬市场事实。
