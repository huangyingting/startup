  - number: 2
    title: 市场分析
    sections:
      - number: '2.1'
        title: 市场边界、纳入支出和正确比较集合
        blocks:
          - type: paragraph
            body: >-
              Mainspring 的相关市场比“所有分布式能源”窄，也比“备用发电机”宽。EIA 的 2024 年分布式发电报告将商业和工业场景中的 DG 定义为现场、表后发电，而 Mainspring
              自己的材料把产品放在商业和工业建筑、公用事业、微电网、数据中心、EV 充电、污水甲烷和沼气应用中。纳入支出因此横跨本地发电资产、燃料灵活发电机组、微电网设计 /
              建造集成、与现场发电绑定的项目融资或部署服务，以及让这些装置真正可用的厂区配套工程。排除支出则是无法解决客户现场可靠性或并网时点问题的大型公用事业级发电，以及屋顶光伏、电池等相邻 DER
              类别——除非它们与可调度本地发电配套。


              这个边界很重要，因为 Mainspring
              赢单的场景，是买方要“快速在现场拿到可靠电力，并保留未来燃料选择权”，而不是单纯采购最便宜的兆瓦时。比较对象因此更接近柴油备用、燃气发电机组、燃料电池、热电联产（CHP）和微电网套件，而不是纯可再生能源或纯软件。也就是说，公开的数据中心、车队
              EV、污水处理和公共电力需求指标，比泛化的全球 DER 收入估算更有决策价值。买方关心并网延迟、正常运行时间、许可和脱碳取舍；他们采购 Mainspring 不是为了最大化纯能源套利。
