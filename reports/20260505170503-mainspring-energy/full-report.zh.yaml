        - id: n6
          label: 遥测、远程诊断和预测性维护工作流监测机群
        - id: n7
          label: 需求、站点升级或燃料选项扩张后，额外机组按模块追加
      edges:
        - from: n1
          to: n2
        - from: n2
          to: n3
        - from: n3
          to: n4
        - from: n4
          to: n5
        - from: n5
          to: n6
        - from: n6
          to: n7
    approximationNotes: 节点标签综合官方方案页和合作伙伴描述中反复出现的部署步骤；公开的只是通用工作流，不是某个站点的 SOP。
