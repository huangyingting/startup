      - number: '3.4'
        title: 相对在位者与同行的护城河耐久度
        blocks:
          - type: paragraph
            body: >-
              Mainspring 的护城河最好理解为产品、许可和燃料灵活性的组合，而不是纯规模护城河。官方产品页面持续强调 250 kW 模块化单元、可扩展到 100+
              MW、可调度、无需硬件改造即可切换多种气态燃料，以及低于 1.5 ppm 的 NOx 声称。相对传统发动机，也相对燃料电池，这些属性拼出差异化采购故事：燃料电池在电堆层面可能更清洁，但运营灵活性较弱。CEC
              示范报告把产品描述为一个早期商业系统，具备高电效率、超低排放、燃料灵活性和低成本，由此支持大方向；Kroger、Lineage 和 AEP 的后续项目则显示实际买方拉动。但耐久性仍有条件。Bloom
              已有规模、数据中心证明和燃料电池品牌；Cummins 有全球服务基础设施和大得多的资产负债表能力；Capstone 证明模块化分布式发电可以变成服务占比高的装机基础业务；Hyliion 则说明线性发电概念已不再是
              Mainspring 独有的叙事空间。
