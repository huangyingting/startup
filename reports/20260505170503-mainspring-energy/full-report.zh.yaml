      - number: '8.3'
        title: 建议和尽调关口
        blocks:
          - type: paragraph
            body: >-
              基于 2026-05-05 可获得的证据，最站得住脚的判断是继续研究，置信度中等，风险评级高，估值立场未知。正面因素有分量：超过 500 MW
              处于后期开发和运营，大额工厂补助，公用事业和市政项目，国防试点，以及由资深工业运营者增强的董事会。负面因素对当前进入纪律更关键：没有公开收入或利润率披露，没有披露当前价格，没有公开股权结构条款，可靠性可见度有限，集中度不清。这意味着，投资者不应把公司质量误认为可投资价格支撑。价格敏感性、稀释风险和退出时点目前都太不透明，无法给出买入建议。因此，只有最终私募价格对这些不确定性有显著折价，不对称性才有利。
