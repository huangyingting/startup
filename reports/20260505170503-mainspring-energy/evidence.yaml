evidenceGaps:
  - type: private-evidence-only
    severity: material
    topic: leadership and founder table completeness
    missingEvidence: >-
      Reviewed sources do not publish a full current executive-team roster, committee structure, or detailed board
      composition beyond the 2025 additions.
    whyItMatters: Leadership depth and succession planning matter for underwriting key-person risk and operating resilience.
    diligencePath: Request the current executive roster, org chart, board committee memberships, and succession plan.
    relatedQuestionRefs:
      - QO008
    relatedTableRefs:
      - TO002
  - type: private-evidence-only
    severity: material
    topic: valuation disclosure
    missingEvidence: >-
      Reviewed public sources do not disclose an exact post-money valuation amount for the 2025 Series F or any later
      tender valuation.
    whyItMatters: Valuation is needed for dilution analysis, return expectations, and comparison with public-market comps.
    diligencePath: Request the Series F term sheet, board deck, and any secondary or 409A valuation materials.
    relatedQuestionRefs:
      - QO012
    relatedTableRefs:
      - TO001
  - type: conflicting-data
    severity: material
    topic: total financing reconciliation
    missingEvidence: >-
      Mainspring’s official release says financing exceeds $800M while Tracxn lists $739M in funding; reviewed sources
      do not explain the definition difference.
    whyItMatters: >-
      Underwriting capital efficiency and dilution requires knowing whether project finance, debt, or other structures
      are included.
    diligencePath: Request a round-by-round financing ledger that separates equity, project finance, debt, and grants.
    relatedQuestionRefs:
      - QO011
    relatedTableRefs:
      - TO001
      - TO003
  - type: private-evidence-only
    severity: material
    topic: private operating metrics
    missingEvidence: Revenue, ARR, gross margin, and total customer-count totals are not disclosed in reviewed public sources.
    whyItMatters: These cover metrics materially affect maturity, operating leverage, and chapter-04 financial underwriting.
    diligencePath: Request audited or board-reported revenue, installed base, customer-count, and margin data.
    relatedQuestionRefs:
      - QO015
    relatedTableRefs:
      - TO001
  - type: enumeration-incomplete
    severity: minor
    topic: leadership table coverage
    missingEvidence: The table covers founders and newly disclosed board members but not a full verified 2026 executive bench.
    whyItMatters: Completeness matters for assessing operational redundancy beyond the founder set.
    diligencePath: Request the full executive roster and role histories.
    relatedTableRefs:
      - TO002
    relatedQuestionRefs: []
  - type: enumeration-incomplete
    severity: minor
    topic: stakeholder or investor map coverage
    missingEvidence: >-
      Public sources identify named investors and strategic partners but not ownership weights, liquidation preferences,
      or all investor rights.
    whyItMatters: Capital-structure detail affects governance and downside economics.
    diligencePath: Request the cap table, voting agreements, and investor-rights agreements.
    relatedTableRefs:
      - TO003
    relatedQuestionRefs: []
  - type: enumeration-incomplete
    severity: minor
    topic: milestone chronology completeness
    missingEvidence: >-
      The chronology reflects public milestones only; private product releases, governance changes, and internal
      operating milestones are absent.
    whyItMatters: A complete chronology improves diligence on execution cadence and inflection points.
    diligencePath: Request an internal company timeline with financing, hiring, product, and regulatory milestones.
    relatedQuestionRefs:
      - QO025
    relatedTableRefs:
      - TO004
  - type: missing-source
    severity: minor
    topic: public adverse-event coverage
    missingEvidence: >-
      Web-searched retained sources did not surface a clearly documented 2024-2026 layoff, lawsuit, or material project
      failure tied to Mainspring Energy.
    whyItMatters: Absence of evidence is not evidence of absence, especially for a private infrastructure company.
    diligencePath: >-
      Run targeted legal-docket, local-news, and employment-review checks plus management Q&A on project write-downs and
      workforce actions.
    relatedQuestionRefs:
      - QO024
    relatedTableRefs: []
  - type: private-evidence-only
    severity: material
    topic: precise TAM / SAM / SOM
    missingEvidence: >-
      No reviewed public source isolates the exact spend or capacity pool for fuel-flexible low-emissions onsite
      generation that Mainspring can realistically serve.
    whyItMatters: Market sizing precision matters for valuation, share assumptions, and scenario analysis.
    diligencePath: >-
      Request management’s internal pipeline segmentation, win/loss data by segment, and bottom-up serviceable-market
      model.
    relatedQuestionRefs:
      - QM011
      - QM023
    relatedTableRefs:
      - TM002
  - type: conflicting-data
    severity: material
    topic: conflicting data-center demand estimates
    missingEvidence: >-
      Public sources cite materially different 2030 demand lenses ranging from 50 GW to 120 GW or more, and proposal
      pipelines exceed committed load.
    whyItMatters: Valuation narratives can become overstated if wide-ranging adjacent estimates are treated as one settled TAM.
    diligencePath: >-
      Reconcile primary estimates by geography, use case, and whether values measure demand, announcements, proposals,
      or committed utility service.
    relatedQuestionRefs:
      - QM022
    relatedTableRefs:
      - TM002
  - type: private-evidence-only
    severity: material
    topic: buyer budget transparency
    missingEvidence: >-
      Reviewed public sources identify buyer types and triggers, but rarely disclose actual contracted pricing, payback,
      or budget ownership at site level.
    whyItMatters: Budget authority and payback thresholds are necessary to understand sales-cycle risk and deployment scalability.
    diligencePath: Request project-level proposals, signed pricing, payback assumptions, and who approved each deployment budget.
    relatedQuestionRefs:
      - QM024
    relatedTableRefs:
      - TM003
  - type: missing-source
    severity: minor
    topic: public company filing detail for genset competitors
    missingEvidence: >-
      Retained public-company IR pages did not yield granular cited market-share or shipment data for direct
      onsite-generation competitors.
    whyItMatters: Direct competitor scale context would tighten the market map and later competitor chapter.
    diligencePath: >-
      Pull specific 10-K sections, earnings transcripts, and investor decks for Cummins, Caterpillar, Generac, and
      Vertiv in the competitor chapter.
    relatedTableRefs:
      - TM001
      - TM002
    relatedQuestionRefs: []
  - type: missing-source
    severity: material
    topic: Realized project pricing and discount schedules across competitor set
    missingEvidence: >-
      Public sources do not disclose contracted $/kW, service attach rates, or discount ranges for comparable
      Mainspring, Bloom, Capstone, or Cummins deals.
    whyItMatters: >-
      Without realized economics, it is hard to determine whether Mainspring wins because of product superiority,
      pricing aggression, or simply category timing.
    diligencePath: >-
      Request three recent signed proposals or customer contracts, including equipment price, services, financing
      structure, and expected LCOE versus alternatives.
    relatedQuestionRefs:
      - QP023
    relatedTableRefs: []
  - type: private-evidence-only
    severity: material
    topic: Switching-cost proof beyond marketing and partner references
    missingEvidence: >-
      The retained source set does not disclose renewal rates, fleet expansion rates by cohort, or win-loss data proving
      durable lock-in after first deployment.
    whyItMatters: >-
      Competitive durability depends on whether Mainspring becomes embedded infrastructure rather than an initially
      attractive hardware choice.
    diligencePath: >-
      Request cohort retention by installed site, follow-on module purchases, and pipeline conversion data for
      partner-led versus direct deals.
    relatedQuestionRefs:
      - QP024
    relatedTableRefs: []
  - type: missing-source
    severity: minor
    topic: Caterpillar-specific data-center competitive detail
    missingEvidence: >-
      Search results surfaced Caterpillar as a relevant incumbent class, but the retained accessible source set was
      stronger on Cummins than on Caterpillar-specific onsite-power buyer proof.
    whyItMatters: >-
      A fuller incumbent map would sharpen how much Mainspring faces one dominant incumbent versus a broader pack of
      traditional generator vendors.
    diligencePath: >-
      Pull current Caterpillar electric-power and annual-report materials that quantify data-center, gas-generator, or
      microgrid commercial emphasis.
    relatedQuestionRefs:
      - QP003
    relatedTableRefs: []
  - type: private-evidence-only
    severity: blocking
    topic: Current cash, burn, and runway
    missingEvidence: No retained public source provides Mainspring's current cash balance, monthly cash burn, or runway calculation.
    whyItMatters: >-
      Capital adequacy cannot be underwritten from disclosed financing alone when manufacturing scale-up and financed
      deployments may consume cash unevenly.
    diligencePath: Request monthly cash flow statements, current treasury balance, debt schedule, and a base / downside runway model.
    relatedQuestionRefs: []
    relatedTableRefs: []
  - type: private-evidence-only
    severity: material
    topic: Gross margin and revenue mix by stream
    missingEvidence: >-
      Public materials do not disclose revenue by hardware, service, financing income, or partner channel, nor the gross
      margin attached to each stream.
    whyItMatters: >-
      Without mix and margin data, investors cannot tell whether Mainspring is evolving toward attractive recurring
      economics or remaining a low-visibility project business.
    diligencePath: >-
      Request a 24-month revenue bridge by stream with gross margin, contribution margin, and backlog conversion by
      cohort.
    relatedQuestionRefs: []
    relatedTableRefs: []
  - type: missing-source
    severity: material
    topic: Customer concentration and working-capital profile
    missingEvidence: >-
      Retained public sources do not quantify top-customer exposure, deposit structures, DSO, milestone billing, or
      inventory turns.
    whyItMatters: >-
      Hardware-heavy growth businesses can look well funded while still facing acute cash pressure from concentration,
      delayed collections, or inventory build.
    diligencePath: >-
      Request top-10 customer share, billing milestones, deposit terms, DSO, inventory metrics, and any project-finance
      or guarantee obligations.
    relatedQuestionRefs: []
    relatedTableRefs: []
