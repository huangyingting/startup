    severity: material
    topic: fleet availability and durability metrics
    missingEvidence: >-
      No retained public source discloses fleet-wide availability, MTBF, warranty claims, or long-duration degradation
      statistics for Mainspring deployments.
    whyItMatters: >-
      Utilities, data centers, wastewater operators, and defense buyers underwrite uptime risk differently from one-off
      demo success.
    diligencePath: >-
      Request cohort-level uptime dashboards, failure-mode summaries, warranty reserve history, and service-response
      SLAs by segment.
    relatedQuestionRefs:
      - QE023
    relatedTableRefs: []
