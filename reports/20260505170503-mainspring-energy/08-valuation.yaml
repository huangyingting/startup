  - id: TV002
    title: Thesis / anti-thesis table
    columns:
      - Argument
      - What would change the view
    rows:
      - - >-
          Demand tailwinds are real because utilities, municipalities, defense, and data centers all show interest in
          dispatchable local power.
        - >-
          If announced projects slip repeatedly or fail to convert into operating assets, the demand story weakens
          materially.
      - - Multi-fuel, low-emissions positioning may create scarce optionality in constrained-power markets.
        - >-
          If fuel-flexibility does not translate into lower customer acquisition friction or better economics, scarcity
          premium should shrink.
      - - Manufacturing expansion and board upgrades suggest the company is preparing for industrial scale.
        - >-
          If the Pennsylvania plant ramps slowly or reliability metrics disappoint, scale ambition becomes a liability
          rather than an advantage.
      - - Private-market support from strategic investors can be valuable.
        - >-
          Without public revenue, valuation, or preference terms, financing support alone cannot prove attractive entry
          pricing.
    notes: >-
      The anti-thesis remains stronger than the thesis on price support because the business is private and financially
      opaque.
    claimRefs:
      - CR007
      - CV003
      - CV007
      - CV009
      - CV011
      - CV012
      - CV034
      - CV036
  - id: TV003
    title: Bull / base / bear scenario table
    columns:
      - Scenario
      - Assumptions
      - Valuation / return logic
      - Key risks
      - Probability signal
    rows:
      - - Bull
        - >-
          Factory ramp lands on time, flagship projects convert, and the company begins disclosing reliability plus
          revenue scale.
        - Upper-end public-comp anchors become more credible; premium industrial scarcity framing could be justified.
        - Warranty or service issues still cap upside if scale outruns quality.
        - Requires multiple new proofs, so signal is currently low.
      - - Base
        - Demand remains strong, but disclosure stays limited and factory ramp remains the key gating variable.
        - Use lower-middle public-comp anchors and insist on a valuation discount for opacity.
        - Price risk and dilution risk remain material.
        - Best fit for current public evidence.
      - - Bear
        - Factory or deployment slippage persists while economics remain undisclosed.
        - Down-round or severe multiple compression risk dominates; focus shifts to capital preservation.
        - Execution delays, concentration, and higher financing need.
        - Risk rises quickly if milestones slip without new disclosure.
    notes: Scenario logic is directional because the current private valuation and revenue base are not public.
    claimRefs:
      - CV028
      - CV032
      - CV038
      - CV039
      - CV040
  - id: TV004
    title: Comparable valuation table
    columns:
      - Comparable
      - Metric
      - Multiple / valuation / status
      - Relevance
      - Limitation
    rows:
      - - Mainspring Series F (2025)
        - New money raised
        - US$258M round size disclosed; valuation undisclosed
        - Latest public price-setting event for the company
        - Cannot infer fair value without post-money, revenue, or preference data
      - - Generac
        - Market cap / revenue
        - ~3.6x market-cap-to-revenue
        - Closest public anchor for backup / resilience-oriented power hardware
        - Mature public company with different profitability and disclosure profile
      - - Cummins
        - Market cap / revenue
        - ~2.7x market-cap-to-revenue
        - Useful lower-bound industrial power-systems anchor
        - Broader engine and industrial mix makes it more diversified than Mainspring
      - - Caterpillar
        - Market cap / revenue
        - ~6.0x market-cap-to-revenue
        - Illustrates upper-end industrial valuation for scale, durability, and installed-base quality
        - Too large and diversified to use as a clean apples-to-apples comp
    notes: >-
      Comparable set is intentionally partial: it mixes one private financing event with three public industrial anchors
      because the company has not disclosed revenue or current valuation.
    enumerationScope:
      coverage: partial
      basis: >-
        This table intentionally covers only the most decision-useful public anchors available on 2026-05-05: the latest
        disclosed private financing event plus three public industrial / power-equipment comparables with accessible
        market-cap and revenue data.
    claimRefs:
      - CR007
      - CV004
      - CV015
      - CV018
      - CV021
      - CV030
  - id: TV005
    title: Thesis-break and kill triggers table
    columns:
      - Trigger
      - Threshold
      - Transmission to thesis
      - Action implication
    rows:
      - - Factory ramp misses plan
        - Major commissioning or hiring slippage at Pennsylvania plant
        - Weakens scale thesis and pushes capital need higher
        - Pause underwriting until ramp proof improves
      - - Reliability disclosure stays absent
        - No fleet KPI or warranty disclosure as deployments scale
        - Prevents premium multiple support
        - Hold valuation stance at unknown and require discount
      - - Project conversion disappoints
        - Flagship utility, municipal, or defense projects slip or stall
        - Turns demand narrative into backlog-risk narrative
        - Lower growth assumptions and widen downside
      - - New financing arrives without better disclosure
        - Another round occurs before revenue / margin visibility improves
        - Raises dilution and preference-overhang risk
        - Assume weaker investor entry discipline
    notes: >-
      These triggers are observable from future public updates or diligence materials and directly affect recommendation
      quality.
    claimRefs:
      - CV007
      - CV008
      - CV032
      - CV036
      - CV040
  - id: TV006
    title: Final diligence asks table
    columns:
      - Topic
      - Missing evidence
      - Why it matters
      - Owner or diligence path
    rows:
      - - Revenue scale
        - No public revenue, ARR, or backlog conversion data
        - Without revenue, public comp ranges cannot become fair-value estimates
        - Management / finance diligence
      - - Gross margin and warranty
        - No public fleet reliability or reserve history
        - Service burden could cap valuation even if demand is strong
        - Operations and finance diligence
      - - Cap table and preferences
        - No public post-money valuation or liquidation terms
        - Preference stack can eliminate entry attractiveness even in a strong company
        - Legal and financing diligence
      - - Customer concentration
        - No public top-customer or top-project exposure
        - Concentration risk changes downside severity
        - Commercial diligence
      - - Exit readiness
        - No public liquidity, secondary, or M&A process signals
        - Return timing and dilution path remain uncertain
        - Board / investor diligence
    notes: >-
      These asks are the minimum package required to move from watchlist interest to a price-sensitive investment
      opinion.
    claimRefs:
      - CV027
      - CV028
      - CV032
      - CV036
      - CV037
