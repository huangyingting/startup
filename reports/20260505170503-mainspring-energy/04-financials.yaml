      - Price / unit / contract
      - List vs realized pricing
      - Discounts / unknowns
      - Source
      - Implication
    rows:
      - - Enterprise financed solution
        - Monthly payments via financing partners
        - Publicly described, not numerically priced
        - Implied financing spread, contract tenor, and residual economics undisclosed
        - Mainspring enterprise page
        - Helpful for adoption, but impossible to model cash timing without contract detail
      - - Direct generator deployment
        - Custom project quote
        - No public price card
        - No public $/kW or $/MWh benchmark
        - Mainspring product / solutions pages
        - Revenue quality depends on site-specific negotiated economics
      - - Maintenance offering
        - Turnkey maintenance / flexible service plan
        - Offer visible; plan pricing hidden
        - No public service attach rate or renewal pricing
        - Mainspring enterprise page
        - Potential recurring layer remains unquantified
      - - Partner-led microgrid package
        - Custom design-build project
        - Partner packaging visible; realized transfer pricing hidden
        - Channel margin split undisclosed
        - Schneider + Mainspring partnership
        - Could widen distribution but dilute per-project economics
      - - Comparable market benchmark
        - Custom contracts dominate Bloom, Cummins, and Capstone critical-power deployments
        - Competitor list prices mostly absent
        - Public pricing opacity is industry-wide
        - Bloom / Cummins / Capstone public materials
        - Makes it harder to prove Mainspring is winning on price rather than on urgency or product fit
    notes: >-
      Official pricing evidence is mostly structural rather than numeric; public sources support custom quoting and
      financing constructs more than transparent tariffs.
