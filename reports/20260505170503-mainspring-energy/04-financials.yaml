company:
  name: Mainspring Energy
chapter:
  number: 4
  title: Financials
  summary: >-
    Mainspring's public financial picture is strongest on capital formation, deployment proof, and monetization
    structure, but weak on realized economics. Official sources support a project-led revenue model built around
    generator deployments, financed onsite-power arrangements, maintenance/service options, and partner-led microgrid
    projects rather than a transparent recurring-software model. The company has also disclosed substantial capital
    support: a $258 million Series F in April 2025, more than $800 million of cumulative financing, and an $87 million
    DOE manufacturing grant tied to a >$175 million Pennsylvania plant intended to produce 1,000 generators per year.
    Those facts suggest a business scaling into a capital-intensive market with real customer pull. They do not disclose
    revenue, ARR, gross margin, cash, burn, runway, or customer concentration. The underwriting conclusion is therefore
    mixed: Mainspring appears to have meaningful demand and multiple monetization pathways, but public evidence is still
    insufficient to judge margin quality, sales efficiency, or near-term capital adequacy with confidence.
sections:
  - id: revenue-model-and-monetization
    title: Revenue Model and Monetization
    body: >-
      The retained public record supports a revenue model centered on selling or financing modular onsite-power systems,
      then layering service, maintenance, and repeat-site expansion rather than on selling a transparent software
      subscription. Mainspring's enterprise and solutions pages repeatedly frame the product as a turnkey onsite-power
      offering that can be bought with flexible ownership structures, monthly payments, and maintenance options. The
      product is explicitly designed for utilities, enterprises, industrial users, and data centers, which suggests a
      deployment-led business where monetization tracks project scope and site operating economics more than seat-based
      usage. Customer evidence from Lineage reinforces that interpretation: deployments expand across facilities over
      time, pointing to repeat project revenue and potential service or fleet-management economics. The key constraint
      is that Mainspring does not publish a list price, power-purchase rate, ACV range, or disclosed service attach
      rate. Public evidence therefore supports the structure of the revenue model, but not its realized mix or quality.
    claimRefs:
      - CP027
      - CI002
      - CI003
      - CI004
      - CI005
      - CI006
      - CI014
      - CI015
      - CI017
      - CI038
  - id: gtm-and-sales-efficiency
    title: GTM Motion and Sales Efficiency Proxies
    body: >-
      Mainspring's GTM motion looks consultative and infrastructure-led rather than transactional. The strongest
      evidence comes from the kinds of customers and partnerships it highlights: Schneider-led microgrids, Lineage
      rollouts, utility projects, data-center messaging, and manufacturing expansion sized for rapid capacity
      deployment. These are not lightweight self-serve workflows. They imply long selling cycles, site design work,
      permitting, installation, and financing coordination. PG&E's February 2025 data-center interconnection release is
      important because it shows the surrounding market condition helping Mainspring: large customers want power faster
      than utilities can always deliver it, and some are willing to fund infrastructure upfront under new tariff
      mechanisms. That makes Mainspring's “speed-to-power” pitch economically credible even without public CAC or
      payback metrics. The missing piece is efficiency measurement. No retained source discloses sales-cycle duration,
      pipeline conversion, CAC, customer acquisition headcount, or payback period, so the chapter can only infer a
      high-touch motion with potentially strong average contract value but heavy acquisition and deployment friction.
    claimRefs:
      - CI002
      - CI008
      - CO020
      - CI014
      - CI016
      - CI018
      - CI019
      - CI027
      - CI042
  - id: cost-structure-and-margin-path
    title: Cost Structure and Margin Path
    body: >-
      Mainspring appears structurally more capital-intensive than a pure software business. The official pages emphasize
      lower capex, lower maintenance, and higher efficiency relative to alternatives, but those are buyer-facing value
      claims rather than reported margins. The DOE grant and Pennsylvania plant plans imply real manufacturing, tooling,
      and workforce build-out; the CEC report further frames the product as a hardware system whose value rests on
      efficiency, emissions, fuel flexibility, and low costs. That points to a blended cost structure spanning generator
      manufacturing, field deployment, service, and partner support. Public-company comparables suggest the likely range
      of outcomes. Bloom shows that low-emissions onsite-power vendors can reach 27.5% gross margin at scale, while
      Cummins shows a much larger industrial power business at 24.7% gross margin. Capstone is the downside reminder
      that distributed-generation vendors can still face backlog compression, restructuring, and liquidity stress even
      with a service component. The gap is obvious: Mainspring does not disclose its own gross margin, contribution
      margin by deployment, or service-versus-hardware mix, so investors cannot yet place it confidently on that
      spectrum.
    claimRefs:
      - CP027
      - CI004
      - CI011
      - CI012
      - CI013
      - CI023
      - CI024
      - CI028
      - CP016
      - CP022
      - CP023
      - CI034
      - CI035
      - CI036
      - CI039
  - id: capital-adequacy-and-financing
    title: Capital Adequacy and Financing Dependency
    body: >-
      Public sources clearly show that Mainspring has raised substantial capital, but they do not show whether that
      capital is sufficient. The April 2025 Series F brought in $258 million to expand manufacturing and customer sales,
      while the company says cumulative financing now exceeds $800 million. Separate from venture capital, the DOE
      selected Mainspring for an $87 million manufacturing grant tied to a more-than-$175 million investment in a nearly
      300,000-square-foot Pennsylvania facility capable of producing 1,000 generators annually and employing more than
      600 people. Historical SEC filing evidence also confirms that Mainspring previously used exempt private financing,
      with a July 2021 Form D showing a $110 million total offering and $108.1 million sold. All of that supports the
      view that Mainspring is capitalized enough to pursue manufacturing scale-up and large projects. None of it
      discloses cash on hand, monthly burn, working-capital drag, debt obligations, collections timing, or runway.
      Latitude's May 2025 reporting adds an adverse nuance by noting that the DOE award appeared to be in limbo on
      disbursement timing. The result is directional confidence in capital access but not in near-term treasury
      sufficiency.
    claimRefs:
      - CO020
      - CI010
      - CI011
      - CI012
      - CI013
      - CI020
      - CI021
      - CI022
      - CI026
      - CI027
      - CI040
  - id: financial-verdict
    title: Financial Verdict and Diligence Blockers
    body: >-
      The public case for Mainspring is investable on strategic demand, not yet on underwritten economics. Revenue
      quality looks stronger than a pre-commercial science project because the company has commercial shipments since
      2020, hundreds of megawatts in field operations and advanced development, repeat-customer evidence through
      Lineage, and a financing stack large enough to support manufacturing expansion. The public case for margin quality
      is much weaker. Official sources do not disclose revenue, ARR, gross margin, cash, burn, runway, customer
      concentration, backlog conversion, or project-level contribution margin. That means the right investor stance is
      not “no economics”; it is “economics not yet observable.” Priority diligence asks are: trailing 24-month bookings
      and revenue by customer type; hardware versus service gross margin; working-capital needs by deployment; monthly
      burn and current cash; timing and certainty of DOE grant proceeds; and whether financed projects create recurring
      cash flows or simply defer hardware payments. Until those data are available, valuation should be anchored to
      capital efficiency risk as much as to market demand.
    claimRefs:
      - CP001
      - CI008
      - CO020
      - CI010
      - CI014
      - CI018
      - CI026
      - CI038
      - CI039
      - CI040
      - CI041
tables:
  - id: TI001
    title: Revenue streams table
    columns:
      - Revenue stream
      - Mechanism
      - Unit
      - Current value / status
      - Revenue quality
      - Diligence ask
    rows:
      - - Generator project sale
        - Sale and installation of modular linear-generator systems
        - Per deployed system / project
        - Commercial shipments since 2020; deployments across utilities, enterprises, and data centers
        - Medium — clearly real, but no realized ASP or gross margin disclosure
        - Request booked revenue and gross margin by deployed MW and customer segment
      - - Financed onsite-power arrangement
        - Monthly payments through financing partners instead of upfront capital
        - Multi-year monthly payment / financed asset
        - Officially marketed to enterprise buyers; economics undisclosed
        - Medium — supports adoption but may defer cash realization
        - Request term length, financing partner economics, and default / residual assumptions
      - - Service and maintenance
        - Turnkey maintenance and flexible service offerings
        - Service plan / maintenance contract
        - Officially offered; attach rate and renewal economics undisclosed
        - Medium — could improve recurring revenue quality if attach is high
        - Request service attach rate, renewal rate, and service gross margin
      - - Partner-led microgrid projects
        - Schneider or other channel-led projects integrating Mainspring generation
        - Project / design-build contract
        - Go-to-market path clearly established through Schneider
        - Medium — can accelerate pipeline but may compress margin via channel sharing
        - Request partner-led booking mix and partner margin structure
      - - Repeat site expansion
        - Same customer adds more units across sites or phases
        - Expansion order
        - Lineage moved from network-wide 2022 framework to 2024 Texas rollout
        - High potential — repeat buying is strongest public proof of revenue quality
        - Request cohort expansion by customer and time-to-second-site metrics
    notes: The public record supports the existence of these monetization streams, but not their realized revenue mix.
    claimRefs:
      - CI002
      - CI003
      - CI004
      - CP001
      - CI014
      - CI015
