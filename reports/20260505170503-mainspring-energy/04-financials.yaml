callouts:
  - calloutType: strength
    title: Capital formation and customer proof are clearly real
    body: >-
      The strongest public financial signal is not revenue disclosure; it is that Mainspring keeps attracting capital
      and customer proof at the same time. A $258M round, an $87M manufacturing grant, repeat Lineage deployments, and
      expanding data-center messaging together suggest a company solving a real market bottleneck rather than selling
      only pilots.
    claimRefs:
      - CO020
      - CI010
      - CI011
      - CI014
      - CI016
      - CI018
  - calloutType: risk
    title: Treasury sufficiency remains un-underwritable from public data
    body: >-
      Public sources do not disclose revenue, gross margin, cash, burn, runway, customer concentration, or project-level
      contribution margin. That means the current diligence risk is not demand uncertainty alone; it is the inability to
      test whether manufacturing scale-up and financed deployments are compounding value faster than they consume cash.
    claimRefs:
      - CI026
      - CI038
      - CI039
      - CI040
      - CI041
