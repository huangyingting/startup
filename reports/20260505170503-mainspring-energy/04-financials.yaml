  - id: TI005
    title: Public financial gaps table
    columns:
      - Missing metric
      - Impact
      - Exact diligence path
    rows:
      - - Revenue / ARR by stream
        - Prevents underwriting revenue quality and mix
        - >-
          Request monthly revenue bridge for last 24 months split into hardware, financing income, service, and
          partner-led projects
      - - Gross margin by hardware, service, and partner channel
        - Prevents margin-path judgment and valuation framing
        - Request segment gross margin and contribution margin by deployment cohort
      - - Cash on hand, burn, and runway
        - Blocks capital-adequacy assessment
