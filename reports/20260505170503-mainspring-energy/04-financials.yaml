  - id: TI003
    title: Unit economics table
    columns:
      - Metric
      - Value / status
      - Confidence
      - Why it matters
      - Diligence ask
    rows:
      - - System scale
        - 250 kW modules scalable to 100+ MW
        - Medium
        - Defines minimum deployment granularity and expansion potential
        - Request average deployed system size, MW per site, and module utilization by vertical
      - - Dispatchability
        - 0-100% output shift; can run in parallel with or independent of grid
        - Medium
        - Improves resilience value and can justify premium pricing in constrained-power markets
        - Request dispatch profile by customer type and share of projects using prime vs backup mode
      - - Maintenance / availability
        - Modular design allows maintenance without system downtime; “high 9s” availability claim
        - Medium
        - Reliability is central to critical-load willingness to pay
        - Request fleet uptime, scheduled maintenance cost, and spare-parts consumption per MW-year
      - - Customer economics claim
        - Lower LCOE than alternatives, with no public numeric spread
        - Low
        - LCOE determines whether Mainspring is a premium niche or a scalable economic choice
        - Request signed customer business cases with assumed fuel price, load shape, and permitting costs
      - - Public comp gross-margin range
        - Bloom 27.5% gross margin; Cummins 24.7% gross margin; Capstone service revenue 22% of sales
        - Medium
        - Provides rough external bounds for what mature distributed-power economics can look like
        - Request Mainspring hardware gross margin, service gross margin, and blended contribution margin by cohort
    notes: Public evidence is strongest on operational attributes and weakest on realized unit economics.
