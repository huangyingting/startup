company:
  name: Mainspring Energy
chapter:
  number: 1
  title: Company Overview
  summary: >-
    Mainspring Energy is a Menlo Park, California distributed-power company founded in 2010 by Shannon Miller, Adam
    Simpson, and Matt Svrcek. Its core product is a fuel-flexible linear generator that can run from 250 kW to
    grid-scale 100+ MW arrays, with commercial deployments spanning utilities, cold storage, wastewater, dairy biogas,
    EV charging, and data-center-adjacent projects. The company raised a $258 million Series F in April 2025 led by
    General Catalyst, but public total-funding figures conflict: Mainspring says financing exceeds $800 million while
    Tracxn lists $739 million in five rounds. Headcount is third-party-estimated at 517 as of February 2026, while
    valuation, revenue, and customer-count totals remain undisclosed in reviewed public sources.
sections:
  - id: identity-business-model
    title: Identity, product, and business model
    body: >-
      Mainspring Energy positions itself as a provider of local, fuel-flexible, low-emissions power generation rather
      than a generic generator vendor. Official materials describe the company’s core product as the Mainspring Linear
      Generator, a dispatchable onsite-power system that scales from a single 250 kW unit to arrays above 100 MW. The
      product runs on multiple gaseous fuels including natural gas, propane, biogas, hydrogen, and ammonia, which is
      central to the company’s pitch that customers can add capacity immediately on conventional fuels and later
      transition toward lower-carbon fuels without replacing the installed asset. TechCrunch’s 2021 launch coverage and
      Mainspring’s own launch release both tie the product’s origin to Stanford thermodynamics-lab work by the three
      founders, giving the company a credible founder-market-fit story rooted in deep technical R&D.


      Mainspring’s business model is deployment-led. The company does not present itself as a commodity equipment maker
      selling into a distributor channel alone; instead, official and partner materials repeatedly emphasize turnkey or
      partner-assisted deployments, financing relationships, and project-specific resiliency outcomes. Public references
      show the company selling into utilities, commercial and industrial sites, cold storage, wastewater methane, dairy
      biogas, EV charging, and microgrid applications. That mix suggests Mainspring competes in a capital-intensive
      power-infrastructure market where customer adoption depends on project development, permitting, and financing
      support as much as on hardware performance. The product’s repeated positioning around “speed-to-power,” low NOx
      emissions, and fuel optionality indicates that Mainspring is monetizing a reliability and deployment-timing
      problem more than a pure efficiency premium.
    claimRefs:
      - C001
      - C002
      - C003
      - C004
      - C005
      - C006
      - C007
      - C008
      - C009
      - C010
