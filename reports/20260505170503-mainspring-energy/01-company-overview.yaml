  - id: leadership-governance
    title: Founders, leadership, and governance
    body: >-
      The public founder set is consistent across retained sources: Shannon Miller, Adam Simpson, and Matt Svrcek.
      Shannon Miller remains the clearest key person. He appears as founder and CEO in company releases, partner
      announcements, investor commentary, and industry articles, and he is the primary quoted spokesperson on financing,
      product, and market adoption. That concentration creates real key-person dependence because investor, partner, and
      media narratives all anchor on Miller’s judgment and technical-commercial framing.


      Leadership breadth is improving but still looks founder-centric. Adam Simpson is consistently identified as a
      co-founder, but his externally visible title has changed over time: a July 2024 reseller announcement named him
      Chief Product Officer, while February and March 2026 customer announcements identified him as Chief Commercial
      Officer. That shift implies an internal leadership evolution toward commercialization as deployment scale
      increases. Public governance was also strengthened in April 2025, when Tom Linebarger and Bethany Mayer joined the
      board as part of the Series F announcement. Linebarger adds deep power-generation operating credibility from
      Cummins, while Mayer adds hardware and public-company operating experience. Even with those additions, however,
      the publicly visible bench remains thinner than the capital raised would imply, because reviewed sources do not
      disclose a full current executive roster, committee structure, or detailed control rights.
    claimRefs:
      - C003
      - C004
      - C013
