  - id: capital-scale-milestones
    title: Funding history, scale signals, and milestone trajectory
    body: >-
      Mainspring reached late-stage private-company status by April 2025 with a $258 million Series F led by General
      Catalyst and participation from Amazon’s Climate Pledge Fund, DCVC, Temasek, Marunouchi Innovation Partners, M&G,
      Pictet, Lightrock, LGT Bank, Khosla Ventures, and Gates Frontier. That round also coincided with new board
      appointments and an explicit manufacturing-and-sales scaling narrative. Public total-funding numbers are not fully
      aligned, however. Mainspring’s own Series F release says the company has secured more than $800 million in
      financing, while Tracxn’s March 2026 profile lists $739 million raised in five rounds. The likely explanation is
      that Mainspring’s broader “financing” language includes project finance or non-round capital that Tracxn excludes,
      but that is not made explicit in reviewed sources.


      Operationally, public scale signals are material even without disclosed revenue. The homepage advertises more than
      500 MW in late-stage development and operation; the 2025 Series F release and 2026 customer announcements describe
      hundreds of megawatts in advanced development and field operations; and partner/customer evidence points to real
      projects across cold storage, dairy biogas, wastewater, fleet EV charging, and utility/public-power use cases.
      Mainspring’s chronology also shows technical maturation: 2021 marked product launch and a $150 million NextEra
      relationship, 2022 brought a hydrogen-and-ammonia fuel-flexibility milestone, 2024 expanded channel and microgrid
      partnerships, 2025 added large-scale financing and board depth, and 2026 broadened proof points through CalBio and
      Chattanooga. Revenue, valuation amount, and total customer count remain unavailable in reviewed public materials,
      so those cover metrics must stay explicitly open.
    claimRefs:
