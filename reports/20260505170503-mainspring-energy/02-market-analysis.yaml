  - id: sizing-lenses
    title: 'Sizing lenses: large demand pools, but no clean public Mainspring-specific TAM'
    body: >-
      No single retained source cleanly sizes a Mainspring-specific TAM, so the market must be triangulated through
      adjacent public lenses. The strongest lens is U.S. data-center power demand because it directly reflects the
      “power now” problem Mainspring markets into. McKinsey estimates U.S. data-center demand rising from 25 GW in 2024
      to more than 80 GW in 2030, with power needs moving from 3-4% of total U.S. demand today to 11-12% by 2030 and
      requiring more than 50 GW of additional capacity. Bloom Energy’s 2025 report points in the same direction,
      predicting 35 GW of announced data-center capacity over five years and saying about 30% of sites are expected to
      use onsite power as a primary source by 2030. Wood Mackenzie’s even more expansionary lens tracks 134 GW of
      proposed U.S. data centers, alongside 64 GW of committed utility service and another 132 GW in large-load queues.


      Those figures do not mean Mainspring’s TAM is simply “80 GW” or “134 GW.” They are adjacent demand indicators
      showing the scale of power scarcity that creates room for onsite solutions. Mainspring’s nearer-term SAM is more
      likely the subset of those markets where behind-the-meter deployment, low-emissions permitting, and multi-fuel
      flexibility are decisive: public power projects like UMPA, critical C&I sites, fleet electrification, cold
      storage, wastewater methane, and selected data centers. Because public sources do not isolate that subset with
      audited spend or installed-capacity totals, any TAM/SAM/SOM stack must be presented as an approximation rather
      than a hard market fact.
    claimRefs:
      - C012
      - C013
