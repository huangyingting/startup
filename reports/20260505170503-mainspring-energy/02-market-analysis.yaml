company:
  name: Mainspring Energy
chapter:
  number: 2
  title: Market Analysis
  summary: >-
    Mainspring Energy sells into a broad but definable market for onsite, behind-the-meter, and microgrid-enabled power
    where reliability, speed-to-power, and fuel flexibility matter more than lowest-capex generation alone. The cleanest
    near-term demand wedge is not all distributed generation; it is the subset of commercial, industrial, utility,
    data-center, fleet-electrification, wastewater, and biogas buyers facing grid delays, resiliency needs, or
    decarbonization pressure. Public market-sizing evidence is fragmented: McKinsey sees U.S. data-center demand growing
    from 25 GW in 2024 to more than 80 GW in 2030, Bloom projects 35 GW of capacity announcements over five years with
    30% of sites using onsite primary power by 2030, Wood Mackenzie tracks 134 GW of proposed U.S. data centers, and
    Mainspring’s own public-power perspective cites a 50-120 GW 2030 range from outside analysts. The opportunity is
    clearly large, but a precise Mainspring-specific TAM/SAM/SOM remains unobservable in public sources.
sections:
  - id: market-boundary
    title: Market boundary, included spend, and the right comparison set
    body: >-
      The relevant market for Mainspring is narrower than “all distributed energy” and broader than “backup generators.”
      EIA’s 2024 distributed-generation report defines DG in commercial and industrial settings as onsite,
      behind-the-meter generation, while Mainspring’s own materials position the product across commercial and
      industrial buildings, utilities, microgrids, data centers, EV charging, wastewater methane, and biogas
      applications. The included spend therefore spans local generation assets, fuel-flexible generator packages,
      microgrid design/build integration, project finance or deployment services tied to onsite generation, and the
      balance-of-plant work required to make these installations usable. The excluded spend is bulk utility-scale
      generation that does not solve customer-sited reliability or interconnection timing problems, as well as adjacent
      DER categories such as rooftop solar or batteries when they are not paired with dispatchable local generation.


      This boundary matters because Mainspring wins when the buyer’s job is “get dependable power onsite quickly with
      future fuel optionality,” not when the buyer is simply procuring cheapest megawatt-hours. That pushes the
      comparison set toward diesel backup, gas gensets, fuel cells, CHP, and microgrid packages rather than pure
      renewables or pure software. It also means public data center, fleet EV, wastewater, and public-power demand
      indicators are more decision-useful than generic global DER revenue estimates. Buyers care about interconnection
      delays, uptime, permitting, and decarbonization tradeoffs; they do not buy Mainspring to maximize energy-only
      arbitrage.
    claimRefs:
      - C001
      - C002
      - C003
      - C004
      - C005
