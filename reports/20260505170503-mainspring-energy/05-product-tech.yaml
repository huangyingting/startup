callouts:
  - calloutType: strength
    title: Public technical evidence is stronger than typical private-climate-tech marketing
    body: >-
      The California Energy Commission report gives Mainspring unusual public technical grounding for a private hardware
      company: it explains the core mechanism, records a real-site demonstration, and documents electrical-certification
      context plus measured emissions and efficiency.
    claimRefs:
      - CE013
      - CE015
      - CE016
      - CE017
      - CE018
  - calloutType: insight
    title: The product increasingly includes a software-control plane, not just hardware
    body: >-
      Current roles show Mainspring building a cloud-to-field stack for telemetry, remote control, predictive
      maintenance, data platforms, and DevSecOps. That means diligence should treat software reliability and security as
      part of the product thesis, not as an implementation afterthought.
    claimRefs:
      - CE028
      - CE029
      - CE030
      - CE035
  - calloutType: risk
    title: Security, API, and fleet-availability transparency remain thin
    body: >-
      Despite strong public emissions and hardware validation, the retained sources do not show a public trust center,
      SOC package, customer API documentation, or fleet-wide availability statistics. Those gaps matter because the
      company now targets uptime-sensitive operators such as utilities, wastewater systems, data centers, and defense
      installations.
    claimRefs:
      - CE015
      - CE017
      - CE029
