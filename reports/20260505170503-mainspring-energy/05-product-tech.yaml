company:
  name: Mainspring Energy
chapter:
  number: 5
  title: Product & Technology
  summary: >-
    Mainspring’s product is a packaged 250 kW linear generator positioned as modular, multi-fuel, low-NOx local
    generation for utilities, data centers, enterprise sites, industrial biogas operators, and resilience-sensitive
    facilities. Public technical evidence is stronger than marketing copy alone: the California Energy Commission’s
    demonstration report explains the low-temperature noncombustion cycle, documents more than nine months of field
    monitoring, and records UL-listed power electronics plus sub-2 ppm NOx performance. Public engineering signals also
    show a meaningful software and controls layer around telemetry, remote monitoring, predictive maintenance, and fleet
    optimization. The biggest remaining gaps are customer-visible reliability metrics, public cybersecurity
    documentation, and developer-facing integration materials.
sections:
  - id: '5.1'
    title: Product definition, use cases, and workflow fit
    body: >-
      Mainspring sells the Linear Generator as local power rather than as a generic backup set. Across its product,
      utilities, data-center, enterprise, and industrial pages, the recurring pitch is the same: customers that need
      firm power but do not want diesel-style emissions or single-fuel dependence can deploy factory-built 250 kW
      packages and stack them modularly as load grows. In workflow terms, the product sits between the fuel supply, the
      customer’s onsite electrical load, and optional grid interconnection. Data-center buyers are shown a path from
      grid-constrained land to islandable onsite generation; utilities are shown local firm capacity and near-load
      balancing; enterprise customers are shown cost-controlled primary power and solar firming; industrial methane and
      biogas operators are shown waste-to-power monetization. The official product page anchors the core value
      proposition with concrete specs—46% net-AC efficiency, less than 1.5 ppm NOx, no water consumption, and 0-100%
      dispatchability—while the Energy Intelligence interview and Latitude Media reporting extend the same workflow into
      EdgeConneX-style data centers, Amazon logistics, and military resilience use cases. The public record therefore
      supports a conclusion that Mainspring’s product-market framing is operationally specific, not just abstract
      clean-energy branding.
    claimRefs:
      - CE001
      - CE006
      - CE007
      - CE008
      - CE009
      - CE011
      - CE020
      - CE021
      - CE022
      - CE040
    tableRefs:
      - TE001
      - TE002
    figureRefs:
      - FE002
  - id: '5.2'
    title: Architecture, deployment model, and engineering maturity
    body: >-
      Public technical detail is unusually strong for a late-stage private hardware company. The official product page
      and the California Energy Commission report both describe a low-temperature, noncombustion reaction that pushes
      oscillators through copper coils, with pressure cycling and power electronics replacing the rotating-machine
      architecture used by conventional generators. The CEC report adds independent structure around that explanation:
      it documents a 230 kW demonstration at a grocery site in Colton, states that the unit remained operational as of
      July 2023, and says performance targets for output, emissions, efficiency, and run time were met after more than
      nine months of monitoring. The same report says the packaged product is UL-2200 listed and uses UL-1741-SA-listed
      grid-tie inverters, which is important because it turns vague “safe and reliable” marketing into a real
      certification trail. Developer signal also matters here. Current job postings describe a cloud-to-field software
      ecosystem with telemetry ingestion, secure remote monitoring, predictive maintenance, data platforms, controls
      simulation, embedded software, and AI-assisted fleet optimization. The CoLab case study reinforces that Mainspring
      is already operating at nontrivial hardware complexity, with more than 3,000 unique parts, about 30 mechanical
      engineers, and a multi-discipline workflow spanning hardware, software, controls, systems, and suppliers.
    claimRefs:
      - CE002
      - CE003
      - CE004
      - CE005
      - CE013
      - CE014
      - CE015
