  - number: 5
    title: 产品与技术
    sections:
      - number: '5.1'
        title: 产品组合与应用套件
        blocks:
          - type: paragraph
            body: >-
              Komodo Health 是一个垂直整合的真实世界数据平台：客户关系从数据访问延伸到分析工具，再到 AI
              增强的洞察生成。平台服务制药、生物技术、支付方、雇主、金融服务和患者倡导组织；核心工作流从原始患者旅程数据出发，经过定制分析应用，进入高管仪表盘和 AI 辅助查询。产品组合由六个分析应用构成：Sentinel
              用于 HCP 商业定向，Aperture 用于市场准入，Prism 用于 HEOR/RWE 队列构建，MapView 用于地理患者流可视化，Pulse 用于实时 KPI 监测，Komodo Home 作为统一
              SaaS 工作区；这些应用都叠在 Healthcare Map 数据资产和 Marmot 生成式 AI 编排引擎之上。Komodo Home 提供两种访问模式：Komodo Navigator
              是自然语言聊天界面，可支持临时患者人群查询；Development Kit 则通过 Snowflake 零拷贝共享、Databricks 计算和原生 Python API 暴露 Healthcare
              Map。Mavens 和 Breakaway Partners 收购增加了专业服务和战略咨询能力，形成全栈托管分析产品。2025 年 12 月 AWS Marketplace 列表带有「Reviewed by
              AWS」徽章，使企业制药买家可以用云原生方式采购。截至 2026 年 5 月，Sentinel、Aperture、Prism 和 Pulse 的专用产品子页面返回 404
              错误，说明网站可能正在重构，也给细颗粒度功能文档留下尽调缺口。
