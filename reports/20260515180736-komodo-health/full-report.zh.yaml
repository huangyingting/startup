      - number: '3.3'
        title: 能力、定价与分发对比
        blocks:
          - type: paragraph
            body: >-
              在生命科学买家真正关心的核心能力维度上，Komodo 的 Healthcare Map 既有真实优势，也有已记录缺口。多模态数据融合（理赔 + EHR + 专科药房 + 实验室 + 消费者数据）和每日刷新节奏，把
              Komodo 与 IQVIA 的周期性更新、以及仅覆盖肿瘤的竞争者（Flatiron、Tempus）区分开来。330M+ 美国患者覆盖意味着近乎全量的美国人群可视性，小玩家无法匹配。面对 Veeva，Komodo
              的优势是数据深度和 AI 原生架构；Veeva 的优势是 CRM 分发渠道和既有制药客户关系。

              竞争集合中的定价基准高度不透明。指示性估计显示，Komodo 企业合同每年约 $500K 至 $3M，IQVIA Technology & Analytics 面向大型制药客户的项目约 $1M 至
              $10M+，Definitive Healthcare 历史上面向中端市场账户的合同约 $50K 至 $500K。IQVIA 的定价溢价来自全服务 CRO 整合；Definitive Healthcare
              的较低定价反映其更窄的供给方情报范围。鉴于使用场景广度，Komodo 作为高端数据平台，定价低于 IQVIA 但高于 DH 是合理的；但定价透明度不足，无法独立验证。

              分发是重要竞争变量。Komodo 通过 Snowflake Healthcare Data Cloud 市场分发，获得云原生可发现性；同时也通过直接企业销售和基于 Salesforce 的 Mavens
              工作流产品分发。IQVIA 通过深嵌制药 R&D 组织的大客户团队分发。Veeva 通过既有 CRM 客户组织分发。Snowflake 渠道对 Komodo 覆盖范围是净正面，但也带来依赖：如果
              Snowflake 自建专有医疗数据，或取代 Komodo 成为标准患者旅程数据提供商，Komodo 的市场位置可能受威胁。

              Definitive Healthcare 市值从约 $5B（2021 年 IPO）压缩到约 $500M（2024），是 Komodo Health $3.3B 2022 年估值最醒目的公开市场可比。DH 产品比
              Komodo 更窄，但同样的需求压缩、宏观估值倍数收缩，以及 IQVIA 扩张带来的竞争定价压力，都影响了 DH；如果 Komodo 增长放缓，这也是其私募估值的现实悲观情景。
