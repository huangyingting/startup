      - number: '2.4'
        title: 市场趋势与未来展望
        blocks:
          - type: paragraph
            body: >-
              几条趋势将塑造 2030 年前的 RWE 市场演进。AI 和机器学习整合已成为从非结构化临床数据中提取洞察的必需能力；供应商大举投入 EHR 文本自然语言处理、医学影像分析和预测建模。Komodo Health
              及其竞争对手已经推出 AI 驱动功能，用于患者队列识别和结局预测。


              包括 USCDI 标准化和 FHIR 采用在内的数据互操作倡议，有望提升跨来源数据质量和链接能力。ONC Cures Act Final Rule
              要求具备数据共享能力，可能扩大数据可得性，同时也给供应商带来合规要求。联邦学习和差分隐私等隐私保护技术，在维持分析效用的同时回应了患者数据保护担忧。


              基因组和多组学数据整合代表增长前沿；精准医疗应用需要把分子数据与临床结局链接起来。Tempus 和 Veracyte 等公司已经围绕这一整合搭建业务，传统 RWE 供应商则试图通过合作或收购补齐基因组能力。


              北美之外的医疗系统正在建设数据基础设施，国际扩张因此带来增长机会。EU 的 European Health Data Space 倡议旨在推动跨境健康数据访问，可能在欧洲创造统一的 RWE
              市场。Asia-Pacific 市场，尤其是 Japan、South Korea 和 China，正在投资健康数据平台，未来可支持 RWE 应用。


              RWE 报销仍有限但在增长，部分支付方开始接受基于 RWE 的证据来做覆盖决策。Centers for Medicare and Medicaid Services（CMS）已经试点在覆盖认定中使用
              RWE，未来可能把市场拓展到制药客户之外。
