      - number: '4.5'
        title: 财务尽调缺口与反向信号
        blocks:
          - type: paragraph
            body: >-
              Komodo Health 呈现出与后期私营公司身份一致的大量财务不透明。五个关键尽调阻塞点是：（1）FY2022–FY2025 实际 ARR
              或总收入，这是最基础的承销输入，但公开来源完全缺失；（2）按产品线拆分的毛利率（数据平台与专业服务），决定商业模式是否具备经营杠杆；（3）现金余额和月度烧钱速度，用于评估财务稳定性和现金跑道；（4）Mavens
              和 Breakaway Partners 的收购价格、整合结果和收入贡献；（5）公司当前流动性路线图，包括 IPO 时间表、老股交易或债务安排。最显著的反向信号来自上市可比公司：Definitive
              Healthcare Corp.（NASDAQ: DH）报告 FY2025 总收入 $241.5M，较 FY2024 的 $252.2M 下滑 4.4%，净美元留存率从 96%（FY2023）降至
              82%（FY2025）——这是上市医疗数据 SaaS 公司中最剧烈的 NDR 恶化。这组同业数据与 Komodo Health 的续约经济直接相关，并显示行业逆风很强。医疗数据 SaaS
              公开市场倍数压缩（Definitive Healthcare 在 2025–2026 年约按 0.7–1.0× 收入交易）也意味着，Komodo Health $3.3B
              私募估值相对当前可比业务的市场出清估值存在显著溢价。缓释因素包括：公开资料没有出现裁员、财务困境信号或与财务压力相关的领导层变动；公司仍在多个技术和商业岗位积极招聘；并且持续推进产品开发（Marmot AI
              平台上线），与一家健康运营的公司相符。
