      - number: '1.6'
        title: 图表材料
        blocks:
          - type: callout
            title: 美国商业授权患者数据集中规模最大
            body: >
              Healthcare Map 结合了超过 1T 条已链接记录和 330M+ 条纵向患者旅程，并从 60+ 个数据源每日刷新，
              这是美国真实世界数据品类中公开表述最强的数据规模主张。开放与封闭数据都能在这一深度上打通， 运营上很难复制，也是 Komodo 所有下游产品的底座。
