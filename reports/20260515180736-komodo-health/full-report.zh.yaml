chapters:
  - number: 1
    title: 公司概况
    sections:
      - number: '1.1'
        title: 身份、产品与商业模式
        blocks:
          - type: paragraph
            body: >
              Komodo Health, Inc. 2014 年在 Delaware 注册，运营总部位于加州 San Francisco，在 New York City 设有主要工程和商业办公室，并拥有 2021
              年收购而来的全球 Mavens 业务单元。公司自称是医疗 AI 和软件公司，底座是 Healthcare Map：一个整合式纵向数据集，来自 60+
              个医疗和药房理赔、电子健康记录（EHR）、专科药房、实验室和消费者数据源，覆盖超过 330M 条去标识化美国患者旅程；数据每日刷新，合计超过 1T 条已链接患者记录。


              平台靠面向生命科学公司（最大板块）、健康计划、医疗服务方、金融服务投资者和政府合格实体买家的企业 SaaS 订阅和数据授权变现。Komodo 的商业化体系分为 Healthcare
              Map（数据底座）、Marmot 智能层（叠在 Map 之上的医疗专用 AI 引擎）和 Komodo Home（让分析师用自然语言跑工作流的交互界面）。已有点状应用包括 Sentinel（HCP
              定向）、Aperture（商业规划）、Prism（真实世界证据队列构建）、MapView 和 Pulse（洞察交付）。Mavens 业务单元还向全球生命科学客户销售基于 Salesforce
              的商业和医学事务软件。


              定价按企业合同执行；Komodo 不公布标价。公开营销材料称平台和 Mavens 合计约有 600+ 生命科学客户，但 Komodo 没有公布经审计的客户数，这个数字也无法独立验证。
