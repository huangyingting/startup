      - number: '7.5'
        title: 估值与融资风险
        blocks:
          - type: paragraph
            body: >-
              Komodo 最近一次披露的新股股权融资，是 January 2022 由 Tiger Global 领投的 $220M Series D，投后估值 $3.3B。Tiger Global 在 2022
              科技股下行中遭遇估计 $17B 投资组合减记；若按当前可比公司重新标记，其 Komodo 持仓相对持有成本将出现显著未实现亏损。截至 May 2026，没有公开披露 Series E，意味着 Series D
              已经滞后约 52 个月。成长股权公司通常每 18–24 个月融资一轮；按这一节奏，Komodo 相对阶段晚了 2–3
              轮，暗示三种可能：（a）公司靠现金流自我供血，（b）已经做了未披露债务或老股融资，或（c）正在不经中间股权轮，直接管理到 IPO 窗口。


              与 Komodo 最直接类比的公开市场可比公司是 Definitive Healthcare（DH）。Definitive 在 September 2021 以约 $25/share、约 $220M 收入
              IPO，市值峰值超过 $2.8B；截至 mid-2026，在约 $250M 收入上，市值低于 $500M，约为 2x 收入倍数。Komodo January 2022 的 $3.3B 估值，在估计
              $100–120M ARR 上隐含 27–33x 收入；若把 DH 当前 2x 倍数用于 Komodo 估计 $200–250M 当前 ARR，公平市场价值约为 $400–500M，较 2022 Series D
              价格折价 85–88%。即使用 Veeva 的 11x 或 IQVIA 的 4x 作为理想基准，Komodo 隐含 30x 倍数也没有市场支撑。


              融资路径包括：带有大幅稀释条款的后期新股轮、在市场窗口修复后 IPO、战略收购，或老股出售。Tiger Global 的持仓和联合创始人的股权，都会形成避免降估值融资的一致压力；带清算优先权加码或
              pay-to-play 条款的桥接融资，可能在结构上损害普通股股东。打破投资逻辑的事件包括：披露低于 $2B 估值的降估值融资、新股融资失败，或 IPO 窗口无限期推迟到 2027 日历年之后。
