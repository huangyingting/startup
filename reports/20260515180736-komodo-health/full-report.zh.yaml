      - number: '8.2'
        title: 公开可比公司与市场倍数
        blocks:
          - type: paragraph
            body: >-
              截至 May 2026，四家公开公司为 Komodo Health 提供直接或相邻可比：


              IQVIA（NYSE: IQV）——全球健康数据和 CRO 服务领导者——FY2025 收入 $16.3B，市值 $28.7B，隐含约 1.76× 过去十二个月收入倍数。IQVIA
              低倍数反映其服务收入占比高、SaaS 利润率较低；它更像是 Komodo 的地板参考，而非目标倍数。


              Veeva Systems（NYSE: VEEV）——生命科学 CRM 和数据云的主导 SaaS 平台——FY2026 收入 $3.195B，市值 $26B，隐含约 8.1× 收入倍数。Veeva
              是结构上最相近的公开可比公司：高毛利 SaaS，客户集中在制药商业端。若 Komodo 能证明可比的 NRR 和毛利率，应以 Veeva 区间倍数为目标。


              Tempus AI（NASDAQ: TEM）——June 2024 IPO 的 AI 驱动健康数据平台——截至 May 2026 市值约 $7.9B。按估计约 $700M 过去十二个月收入计算，隐含约
              11–12× 倍数。Tempus 是最接近的结构类比：AI + 纵向患者数据平台，面向制药和肿瘤。Komodo 的 Marmot AI 层若想拿到 Tempus 式倍数，就必须证明可比的 AI 收入贡献。


              Definitive Healthcare（NASDAQ: DH）——医疗健康商业情报平台——是最不利可比。DH 市值从 IPO 时的约 $3.9B（September 2021）跌至 May 2026 的约
              $87.9M。DH FY2025 收入同比下降 4%，企业 NDR 从 96% 侵蚀到 85%，三年商誉减值合计近 $1B。虽然 DH 的产品重点（提供方定向）不同于 Komodo（制药 RWE +
              AI），但类别层面的风险信号很重要。BVP EMCLOUD 指数也确认了结构性倍数压缩：从 2021 高点约 30× NTM ARR，降到 mid-2026 的约 7–8×。
            claimRefs: []
