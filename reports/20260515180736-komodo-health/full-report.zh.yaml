  - number: 2
    title: 市场分析
    sections:
      - number: '2.1'
        title: 市场规模与增长轨迹
        blocks:
          - type: paragraph
            body: >-
              真实世界证据（RWE）和医疗分析市场已经显著增长，动力来自制药公司寻找传统临床试验数据之外的替代证据。多家分析机构预计，全球 RWE 市场到 2030-2035 年将保持双位数 CAGR。Precedence
              Research 估计，市场 2025 年为 $3.32B，到 2035 年增至 $7.43B，CAGR 为 8.39%。MarketsandMarkets 的预测更激进，预计市场将从 2024 年的
              $4.74B 增至 2030 年的 $10.83B，CAGR 为 14.8%。Mordor Intelligence 估计，市场 2025 年为 $2.44B，到 2031 年增至 $6.04B，CAGR 为
              16.33%。


              北美约占 40% 份额，主导市场；先进医疗基础设施、制药公司高 R&D 支出，以及监管层支持 RWE 用于药物开发和审批流程，是主要驱动因素。FDA 的 21st Century Cures Act
              及后续指南文件使 RWE 用于监管申报具备合法性，加速了市场采用。Asia-Pacific 是增长最快的地区，医疗数字化加速，政府也在支持健康数据基础设施建设。


              核心市场驱动因素包括药物开发成本上升（每个获批药物平均 $2.6B）、监管层越来越接受 RWE 用于标签扩展和上市后监测，以及价值医疗分析需求增长。COVID-19
              疫情打断传统临床试验，也证明真实世界数据在追踪治疗结局和疫苗有效性上有用，从而加速了 RWE 采用。
            claimRefs:
