      - number: '5.3'
        title: Marmot：生成式 AI 编排层
        blocks:
          - type: paragraph
            body: >-
              Marmot 是 Komodo 的生成式 AI 层，商业定位不是通用 LLM 包装层，而是为医疗健康场景定制的
              AI。它的核心架构差异在领域专用模型路由：系统不会把所有查询都交给同一个基础模型处理，而是先判断查询意图，再路由到领域专用模型（例如面向商业分析任务训练的模型，或面向 HEOR
              队列逻辑训练的模型），随后经过评估门控才返回结果。每次交互都会生成完整审计轨迹，包括路由决策、所用模型、输入参数和输出，支撑受监管研究流程的可复现性要求。客户数据隔离在架构层强制落地：每个客户的专有管线数据完全分隔，Komodo
              也明确承诺客户数据绝不会用于训练其基础模型，直击制药公司在商业敏感患者分析管线上的关键数据治理顾虑。基于角色的访问控制把 Marmot AI 权限接入 Komodo
              既有权限框架，避免用户查询合同范围外的数据，或触发合同范围外的 AI 模型。Amit Sangani（Meta；曾领导 PyTorch 和 Llama）在 January 2026 出任 CTO，释放出
              Marmot AI 基础设施计划扩张的信号，方向很可能是开放标准模型，以及与云原生栈更深的集成。主要风险包括：Marmot 准确率缺少公开基准数据；领域模型在边缘临床推理任务中可能出错；FDA 对 AI/ML
              的监管预期仍在演进，未来可能要求用于监管申报流程的 AI 工具提供正式验证文档。
            claimRefs: []
          - type: figure
            figureRef: FE003
            claimRefs:
              - CE025
              - CE026
              - CE027
              - CE028
      - number: '5.4'
        title: 集成、伙伴关系与开发者生态
        blocks:
          - type: paragraph
            body: >-
              Komodo 的集成策略围绕一个原则展开：医疗健康分析买方的数据基础设施在哪里，Komodo 就接到哪里。Snowflake 零拷贝数据共享集成让客户不用复制数据，就能在自己的 Snowflake 环境里直接查询
              Healthcare Map 数据，同时降低成本和数据治理负担；Snowflake 客户案例验证了这一点。通过 Development Kit 接入 Databricks
              后，数据科学团队可以用既有湖仓基础设施，在 Healthcare Map 数据上运行自定义 PySpark 或 Python 管线，服务那些内部数据科学能力成熟的客户。Development Kit 里的
              Python SDK 进一步向工程团队开放程序化访问，用于搭建自动化分析或报告管线。AWS Marketplace 上架（December 2025，「Reviewed by
              AWS」）打开了云原生采购路径，贴合企业云承诺支出计划，降低制药 IT 买方的采购摩擦。Salesforce CRM 集成把 Sentinel 商业分析直接接到制药一线销售流程里，让代表级 HCP
              定向和拜访计划进入 CRM 记录系统。GeneDx 罕见病数据合作以及其他数据合作，把 Healthcare Map 的覆盖从传统理赔扩展出去。集成端点的广度具备竞争力，但截至 May 2026，正式 API
              文档和公开开发者门户仍不可访问；相比那些公开完整 SDK 文档的云原生竞争对手，这是一个缺口。
            claimRefs: []
      - number: '5.5'
        title: 信任、安全、合规与数据质量限制
        blocks:
          - type: paragraph
            body: >-
              Komodo Health 采用分层合规框架，匹配商业健康数据平台的要求：与所有客户签署 HIPAA 商业伙伴协议，为受保护健康信息建立合同责任；SOC 2 Type II
              认证为安全性、可用性和保密性控制提供持续第三方审计验证；HITRUST CSF 认证这一医疗健康专用安全框架，则说明其安全实践不仅满足基础 HIPAA，还对齐医疗健康行业的更高预期。Marmot AI
              层在这些控制之上强制执行单客户数据隔离、基于角色的访问和完整查询审计轨迹。公开 GitHub 信号——fork panther-labs/panther-analysis 的 SIEM 安全检测规则——显示
              Komodo 使用 Panther 安全监控平台做云基础设施告警，符合现代云原生安全运营模式。HHS OCR 的 HIPAA 执法统计显示，全行业每年发生 500+ 起重大泄露；作为众多制药和支付方客户的 BAA
              交易对手，一旦发生泄露，Komodo 将面临重大的监管、声誉和合同责任。剩余核心尽调问题包括：最近一份 SOC 2 报告的具体范围和审计期间；Komodo 是否经历过任何需报告的泄露事件；Marmot
              的数据隔离架构如何技术落地（行级安全、独立模型实例，或虚拟化租户环境）。随着 Marmot 的使用扩展到监管申报流程，FDA 对 AI/ML 医疗健康工具的监管框架日益成形，也给 Marmot
              带来前瞻性合规风险。
