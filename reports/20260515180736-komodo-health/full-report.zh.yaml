      - number: '8.5'
        title: 退出路径、流动性与最终尽调问题
        blocks:
          - type: paragraph
            body: >-
              Komodo Health 有三条主要退出路径，每条路径对应不同估值含义：


              IPO：需要证明达到公开市场质量的指标——审计财务、披露 ARR 及增长轨迹、毛利率 >70%、NDR >100%。按当前 SaaS 市场倍数，Komodo 若要以 $3.3B 或更高估值 IPO，需要在
              Veeva 可比倍数（8×）下达到 $330M+ ARR，或在 Tempus 可比倍数（12×）下达到 $275M+ ARR。没有公开证据支持 Komodo 已达到这些门槛。一篇关于 2025 要约交易的
              Bloomberg 文章标题——虽无法访问——暗示存在二级市场活动，但不能证明正在准备 IPO。


              战略 M&A：IQVIA、Roche/Flatiron（通过扩张）、J&J、Veeva 和 Salesforce Health Cloud 是自然收购方。战略估值通常按数据资产过去十二个月收入的 3–6×
              计算；在 $200M 收入上，隐含 $0.6–1.2B。Roche 收购 Flatiron（2018）的价格约为 6×；IQVIA 的组合扩张也显示出收购数据护城河资产的胃口。


              老股交易或续期载体：据报道的 2025 要约交易显示，Komodo 可能在没有新股融资事件的情况下向早期股东提供了流动性。面对 IPO 窗口不确定性，续期基金和 GP 主导的二级交易对 4 年期独角兽很常见。


              April 2026 CFO 任命是正面信号——新 CFO 上任往往先于融资流程——但不足以确定退出时间线或估值。资本承诺前必须解决六个尽调问题。
            claimRefs: []
