      - number: '2.2'
        title: 竞争格局与市场定位
        blocks:
          - type: paragraph
            body: >-
              RWE 和医疗数据分析市场由大型多元化玩家和垂直供应商共同构成。市场领导者 IQVIA 年收入 $15B，覆盖数据、分析和临床试验服务，其中 RWE 是重要增长板块。UnitedHealth Group 旗下
              Optum 借助覆盖 90+ million 人的理赔数据，2023 年在更广泛的健康服务组合中录得 $200B 收入。Flatiron Health 2018 年被 Roche 以 $1.9B
              收购，聚焦肿瘤专用 RWE，数据来自 280+ 家癌症诊所。


              Komodo Health 通过 Healthcare Map 做出差异化：它使用 60+ 个数据源和超过 1T 条临床记录，连接 330+ million 人的患者旅程。与主要依赖理赔或 EHR
              数据的竞争对手不同，Komodo 强调跨医疗场景的完整患者旅程映射。公司服务 600+ 生命科学客户，方案覆盖商业分析、临床试验优化和监管支持。


              新兴竞争者包括 TriNetX，其运营一个全球健康研究网络，覆盖 30+ 个国家的 250+ million 患者数据；以及 Aetion，提供经 FDA 验证的 RWE 分析软件。Veradigm（原
              Allscripts）把 EHR 数据与分析能力结合，Veracyte 和 Tempus 则聚焦精准医疗应用中的基因组和多组学数据整合。


              市场仍在整合，大型制药和科技公司持续收购垂直 RWE 供应商。重要交易包括 Roche-Flatiron（$1.9B，2018）、IQVIA-DMD Marketing（2019）和
              Oracle-Cerner（$28.3B，2022）；其中 Oracle-Cerner 扩大了 Oracle 的医疗数据能力。
