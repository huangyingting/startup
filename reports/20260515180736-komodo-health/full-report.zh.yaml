      - - Tempus AI (TEM)
        - 上市
        - ~$700M 收入（估计 2024）
        - ~11–12× 追溯
        - AI 健康数据公司，June 2024 IPO；结构上最接近；给 AI 上行空间定上限
      - - Definitive Healthcare (DH)
        - 上市（反向）
        - ~$243M 收入（FY2025）
        - <0.4× 追溯
        - 反向：估值下跌 97%；NDR 85%；FY2025 计提 $196M 商誉减值
      - - ConcertAI
        - 私有
        - ~$160M ARR（估计 2022）
        - ~12× ARR（2022 数据）
        - 肿瘤 RWE；Series C 估值 $1.9B；数据过期——仅限 2022 数据
      - - H1.co
        - 私有
        - 未披露
        - ~$1.6B 估值（2022）
        - HCP 数据平台；Series C；收入未公开；倍数精度有限
      - - Flatiron / Roche（并购）
        - 并购先例
        - ~$300M 收入（收购时估计）
        - 收购时隐含 ~6×
        - Roche 于 2018 收购；肿瘤 EHR RWE；战略买方协同溢价
      - - Komodo Health
        - 私有（本公司）
        - 未披露
        - 若 ARR 为 $100M，则 ~33×（2022）
        - 上一轮为 Jan 2022；投后 $3.3B；数据过期；隐含约 33× ARR 倍数
    notes: 除特别说明外，收入倍数均为追溯口径；私有公司估值取自公开记录中的 2022 年最后已知数据。
  - id: TV005
    title: 击穿投资逻辑与否决触发表
    sectionRef: SV005
    claimRefs:
      - CV024
      - CV025
      - CV031
      - CV040
    columns:
      - 触发因素
      - 可观察阈值
      - 对投资逻辑的影响
      - 行动含义
    rows:
      - - ARR 下滑或流失激增
        - 披露 ARR 低于 $100M，或 NDR 低于 85%
        - 基准情景失效，投资逻辑转向悲观情景
        - 退出持仓或拒绝投资
      - - 与 DH 类似的 NDR 侵蚀
        - Komodo NDR 降至 DH 水平（85%）或更低
        - 证实品类级风险，意味着倍数可能迅速坍塌
        - 否决投资；立即要求经审计财务
      - - 监管限制数据使用
        - 联邦或多州法律禁止商业使用去标识化患者理赔数据
        - TAM 被摧毁，护城河变成负债
        - 否决投资；跟踪 MHMD Act 及类似州法
      - - 关键药企客户流失
        - 任一前三大药企客户流失（估计 ARR 集中度 >20%）
        - 带来收入断崖风险，可能触发契约条款或下行轮
        - 重新评估入场价；要求披露客户集中度
      - - 新一轮新股融资失败
        - 轮次定价 <$1B，或采用可转债桥接结构
        - 证实下行轮，也意味着投资人联盟信心丧失
        - 调整收益分配模型；考虑按 <$1B 盯市
    notes: 无需私有访问即可观察这些触发因素；所有否决级触发都需立即上报投委会。
  - id: TV006
    title: 最终尽调问题表
    sectionRef: SV005
    claimRefs:
      - CV018
      - CV036
    columns:
      - 主题
      - 缺失证据
      - 重要性
      - 负责人 / 路径
    rows:
      - - 经审计 FY2025 ARR 和收入
        - January 2022 以来没有公开财务披露
        - 无法三角验证当前倍数；所有情景都缺少锚点
        - 向公司索取；签条款清单前必须拿到
      - - Marmot AI 挂载率和增量 ACV
        - Marmot 收入贡献未公开披露
        - 判断 AI 上行是真实收入还是定位话术；区分乐观与基准情景的关键
        - 客户访谈；直接询问 3–5 家药企客户
      - - 完整股权结构表和优先股堆叠
        - Tiger Global、a16z、CVS 优先股条款未披露
        - 稀释和清算优先权影响实际回报；$3.3B 可能不是正确基准
        - 法务尽调；需要瀑布模型
      - - 按客户分群的队列 NDR
        - 未发布 NDR 数据；DH 对照需要可比指标
        - 衡量留存护城河；判断基准与悲观情景的关键信号
        - 财务尽调；要求 3 年队列留存分析
      - - 2025 年要约收购条款和定价
        - Bloomberg 有标题；文章无法访问；条款未知
        - 反映二级市场估值，可能显示内部人标记低于 $3.3B
        - 通过并购律师或直接询问公司获取
      - - 州级数据法律监管暴露范围
        - MHMD Act（WA）及 CA、TX 类似法案；对理赔数据的执法范围不清楚
        - 决定可服务 TAM 的耐久性；若理赔数据使用受限，可能构成生存级风险
        - 法务尽调；需要监管律师意见
    notes: 第 1–4 项是签条款清单前的阻断项；第 5–6 项是法律和回报模型尽调的必需项。
