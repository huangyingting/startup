      - number: '2.3'
        title: 客户分层与使用场景
        blocks:
          - type: paragraph
            body: >-
              制药和生物技术公司是 RWE 平台的核心客户，约贡献 60-70% 市场收入。这些机构用 RWE
              做临床试验设计和站点选择、上市后监测、比较效果研究、标签扩展支持，以及健康经济学与结局研究（HEOR）。大型制药公司通常会同时维护多个 RWE 供应商关系，以获得不同数据资产和分析能力。


              支付方和医疗系统是增长中的客户群，用 RWE 做人群健康管理、质量衡量和价值医疗合约。包括 FDA 和 CMS 在内的政府机构越来越多依赖 RWE 做监管决策和政策制定。学术医学中心和研究机构则用 RWE
              平台做观察性研究和资助研究。


              Komodo Health 的 600+ 生命科学公司客户基础，让它按制药客户数进入前三大供应商之列。公司的使用场景覆盖药物开发生命周期，从早期患者识别到上市后商业分析。关键应用包括罕见病患者发现、商业团队
              HCP 定向、治疗模式分析和竞争情报。


              FDA 的 RWE 项目已经验证了若干供应商平台的监管用途，为获批提供商创造认证优势。Komodo Health 曾支持 FDA 接受的 RWE 申报，不过 FDA
              没有公开认证特定供应商为优先提供商。监管接受度仍是制药公司采用 RWE 决策的核心驱动因素。
