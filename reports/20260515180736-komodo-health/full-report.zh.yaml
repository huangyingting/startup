      - number: '8.3'
        title: 私有市场可比与 M&A 先例
        blocks:
          - type: paragraph
            body: >-
              私有市场里，三组可比提供额外校准：


              ConcertAI（2022）：完成一轮成长轮融资，把肿瘤 RWE 平台估值定在约 $1.9B；按估计约 $160M ARR 计算，隐含约 12× ARR 倍数。这是最近一笔规模较大的私有市场可比，说明医疗健康
              AI / 数据平台在 2022 年估值环境下可拿到 10–14× ARR。


              H1.co（2022 Series C）：作为医生数据平台估值约 $1.6B；收入未披露。它可作为 HCP 数据资产的规模参考，但公开财务披露有限，限制了直接倍数比较。


              Flatiron Health / Roche（2018）：Roche 以约 $1.9B 收购 Flatiron，按收购时估计过去十二个月收入计算，约为 6×。Flatiron 的肿瘤 EHR 数据重点只是
              Komodo 可服务市场的一个子集。该收购倍数（6×）和收购方画像（Roche）是战略退出场景下的相关 M&A 先例。


              战略收购方（IQVIA、Roche、J&J、Salesforce Health Cloud）可能会因 Komodo 的数据护城河和制药渠道触达，按 3–6× 过去十二个月收入估值。若假设收入
              $200M，战略收购区间为 $0.6–1.2B，显著低于 2022 Series D 的 $3.3B 价格；这反映了收购方更可能按困境或正常化倍数出价，而不是支付私募轮溢价。
            claimRefs: []
      - number: '8.4'
        title: 情景估值框架与公允价值区间
        blocks:
          - type: paragraph
            body: >-
              三个情景定义了当前投资人视角下的 Komodo 估值区间：


              乐观情景（15% 概率）：Komodo 披露 $200M+ ARR，NDR 强劲（>110%），Marmot AI 贡献有意义的增量收入，公司在 IPO 或战略收购前建立起 Tempus 式 AI
              健康数据叙事。在 $200M ARR 上按 15× NTM ARR 计算，隐含企业价值为 $3.0–4.5B。前提是：Marmot 变现获得正向确认、NDR 稳定性得到证明，并且制药预算韧性延续。


              基准情景（55% 概率）：ARR 在 $130–170M 区间，NDR 稳定但不突出（90–100%），Marmot 是功能而非独立收入驱动，公司寻求一轮后期新股融资或按 8–10× NTM ARR 完成 M&A
              退出。隐含企业价值：$1.0–1.7B。较 $3.3B Series D 价格减记 49–70%。


              悲观情景（30% 概率）：ARR 低于 $100M 或在下滑，NDR 沿 DH 轨迹跌破 85%，公司进入降估值融资或困境出售动态。在 $90M NTM ARR 上按 4–6× 计算，隐含 EV 为
              $0.4–0.5B。如果 Komodo 的制药客户遭遇类似预算压力和流失模式，这一情景与 DH 的公开市场可比相符。


              跨情景概率加权后的隐含公允价值区间约为 $1.1–1.5B，较上一轮已知私有估值 $3.3B 减记 55–67%。入场价格纪律、优先股堆叠认知，以及 Marmot AI 变现确认，是关键价值杠杆。
            claimRefs: []
          - type: table
            tableRef: TV003
