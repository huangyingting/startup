      - number: '3.2'
        title: 既有巨头与直接可比公司画像
        blocks:
          - type: paragraph
            body: >-
              IQVIA 是最强的竞争威胁。$16.3B 收入（FY2025）、93,000 名员工和 1.2B 条全球去标识化患者记录，给了它 Komodo 无法有机匹配的规模。Technology & Analytics
              部门（占收入 40%）提供 Octa 商业分析平台，Symphony Health 子公司提供患者级理赔数据，直接竞争 Komodo 的 Healthcare Map。IQVIA 的 R&D 部门（占收入
              55%）是 CRO，为 Komodo 试图销售的同一批制药公司运营临床试验，因此拥有关系深度和交叉销售杠杆，而 Komodo 的纯数据模式缺少这两点。从 Komodo 角度看，IQVIA
              的弱点在于数据新鲜度和多模态整合。IQVIA 的历史数据更新是周期性的，而非每日；技术栈也反映了传统 IMS Health 和 Quintiles 架构，而不是现代云原生数据管线。

              Veeva Systems（FY2026 收入 $3.2B，1,552 家生命科学客户）是最危险的新兴威胁。Veeva 主导生命科学 CRM，并系统性向数据扩张。收购 Crossix（患者数据，2019）和推出
              Veeva Compass 患者级数据，奠定了数据战略；2025 年 Salesforce 合作结束，移除了全栈竞争的关键限制；2026 年 3 月收购 Ostro（面向生命科学的 AI
              智能体，$100M），又增加了与 Komodo Marmot 平台重叠的 AI 工作流能力。Veeva 可以向 1,552 个既有制药 CRM 客户交叉销售，不需要赢得新账户；这种结构性威胁不同于 IQVIA
              的有机数据扩张。

              Flatiron Health（Roche 子公司，2018 年以 $1.9B 收购）是肿瘤 RWE 既有巨头，整合了数百家癌症中心，并与 20+ 顶级肿瘤治疗开发商合作。Roche
              所有权天然带来利益冲突，限制了它作为 Roche 竞争对手中立数据伙伴的效用，也为 Komodo 在非 Roche 制药公司的肿瘤真实世界证据市场保留了缺口。

              Tempus AI（NASDAQ: TEM，2024 年 6 月 IPO）站在 AI 肿瘤数据顶端，拥有 350+ petabytes 数据（包括临床基因组和多组学测序）、连接 65% 美国学术医学中心，并与前
              20 大制药肿瘤公司中的 95% 建立伙伴关系。Tempus 的基因组优势是 Komodo 仅靠理赔数据无法复制的结构性护城河，但 Tempus 的范围（聚焦肿瘤）比 Komodo 全人群地图更窄。

              Definitive Healthcare 和 H1 是商业情报竞争者。它们的估值下滑（DH：较 IPO 峰值 -88%）和更窄的数据范围（供给方情报，而非患者旅程分析），使其存在感不如 IQVIA 和
              Veeva 致命；但它们直接争夺 Komodo 的 Sentinel 和 Aperture 客户预算。
