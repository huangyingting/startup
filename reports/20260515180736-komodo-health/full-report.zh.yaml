      - number: '6.5'
        title: 市场背景、竞争定位与集中风险
        blocks:
          - type: paragraph
            body: >-
              全球 RWE 解决方案市场估计在 2024 年为 $4.74B，到 2030 年增至 $10.8B，CAGR 为 14.8%。这股顺风支撑 Komodo Health
              的增长叙事，也说明市场吸引力正在拉来资金充足的竞争者。IQVIA（NYSE: IQV）是主导型在位者，收入 $15B+，拥有全球患者数据版图；Flatiron Health（Roche 子公司）掌握肿瘤
              RWE；Symphony Health（ICON 子公司）在 Rx 理赔中竞争；Definitive Healthcare（NASDAQ: DH，FY2024 收入约
              $228M）服务医院和提供方情报；TriNetX、H1 和 Veeva Data Cloud 则在相邻的理赔和 HCP 数据细分市场竞争。Definitive Healthcare
              提供了规模和订阅模式相近的直接公开市场收入基准。

              集中风险是首要商业顾虑。制药垂直行业收入集中约 85–90%，让 Komodo 暴露于制药 R&D
              预算周期、生物科技融资环境，以及大型制药公司自建数据基础设施的新风险。美国单一地理覆盖限制每个账户的全球钱包份额，也把美国以外的制药分析需求让给 IQVIA。评论平台无法访问（G2 损坏、TrustRadius
              404），导致缺少独立满意度基准。尽管存在这些风险，三家独立市场研究机构对 TAM 估计趋同，Snowflake 伙伴关系带来分销规模，深度管线集成中的结构性切换成本也能提供可防守的收入基础，前提是 2022
              年声称的客户数在方向上属实。
