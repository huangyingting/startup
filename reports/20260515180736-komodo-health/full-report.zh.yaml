      - EV / 收入倍数
      - 关键备注
    rows:
      - - IQVIA (IQV)
        - 上市
        - $16.3B 收入（FY2025）
        - ~1.8× 追溯
        - 服务收入占比高；CRO 组合压低倍数；可作为 Komodo 的底部参照
      - - Veeva Systems (VEEV)
        - 上市
        - $3.2B 收入（FY2026）
        - ~8.1× 追溯
