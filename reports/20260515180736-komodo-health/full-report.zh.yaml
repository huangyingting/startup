      - number: '6.3'
        title: 客户留存、健康度与扩张信号
        blocks:
          - type: paragraph
            body: >-
              Komodo Health 不公开披露净留存率（NRR）或总留存率（GRR）。留存只能从结构上推断：多年订阅合同、深度管线集成，以及从 Sentinel 到 Aperture、Prism、Marmot
              的产品增购路径，都与高于 100% 的 NRR 相符。一旦制药分析团队用 Komodo 患者标识符搭建处方医生定向模型和 RWE
              队列，更换底层数据集就需要重建所有下游分析资产；对企业商业分析团队来说，这是实质性切换成本。那家全球前 20 大制药客户已经拿到 >20%
              处方医生名单覆盖率改善，任何竞争平台想让其迁移，都必须先达到很高的替代门槛。

              Marmot AI assistant（2024–2025）打开了新的留存和扩张面：覆盖 Healthcare Intelligence Graph 的 AI
              原生界面，让用户不只依赖周期性数据刷新，而是每天触碰平台，从而提高粘性，并创造 AI 档位定价路径。Breakaway Partners 托管服务收购把 Komodo
              团队嵌进客户分析组织，进一步加深运营集成。G2 和 TrustRadius 评论页面无法访问（分别为 403 和 404），阻断了独立满意度基准测试；这一尽调缺口需要企业级平台访问或直接客户访谈来补。截至 May
              2026，未发现公开报道的流失事件，但在缺少 NRR 数据的情况下，未见流失报道并不等同于已确认的高留存。
