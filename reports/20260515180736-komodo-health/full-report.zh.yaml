      - number: '1.4'
        title: 规模、客户与产品足迹
        blocks:
          - type: paragraph
            body: >
              截至 2026 年 5 月，Komodo Health 将 Healthcare Map 定位为美国商业授权的最大患者级数据集：超过 1T 条已链接记录，覆盖 330M+ 条去标识化患者旅程，来自每日刷新的
              60+ 个开放和封闭数据源。Komodo 的营销材料称 Healthcare Map 和 Mavens 业务单元合计服务 600+ 生命科学客户；公司还建立了具名合作，包括
              Snowflake（云端数据交换）、GeneDx（罕见病纵向数据集，2026 年 1 月）、ZERO Prostate Cancer（筛查倡议，2026 年 3 月），以及自 2022 年起与 Pfizer
              在真实世界证据研究上的长期合作。


              员工数没有正式披露。2024–2026 年，公开 LinkedIn 员工数估计在约 700 至 950 之间；据 Endpoints News 报道，公司曾在 2022–2023 年裁员，影响估计 9%
              员工，此前员工峰值超过 1,000 人。估计年收入、年经常性收入（ARR）、毛利率、客户数和净收入留存率均未公开披露。


              行业认可包括入选 CNBC Disruptor 50（2022）、Forbes AI 50（多年）以及 Healthcare Technology Report 的 2025 年 Top 50
              Healthcare Technology Companies。
