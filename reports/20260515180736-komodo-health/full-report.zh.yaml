  - number: 6
    title: 客户情况
    sections:
      - number: '6.1'
        title: 客户基础——规模、分层与垂直行业结构
        blocks:
          - type: paragraph
            body: >-
              截至 January 2022，Komodo Health 服务 600+ 家生命科学机构，其中包括按收入计全球前 20 大制药公司全部客户。这个客户数在 Series D
              公告中披露，此后没有更新；外部分析师无法确认当前客户基础规模。制药和生物制药贡献约 85–90% 客户收入，反映出公司起步于制药商业分析和 RWE。客户分层包括全球前 20
              大制药公司（核心收入）、中型专科药企、临床阶段和商业化生物科技公司、服务制药客户的合同研究组织、管理式医疗组织（支付方）以及医疗系统。Healthcare Intelligence Graph
              只覆盖美国，是结构性集中因素：Komodo 的 330M+ 去标识化美国患者记录无法满足美国以外的制药分析需求，限制了每个全球制药账户的总钱包份额。

              使用场景覆盖制药商业化全生命周期：处方医生定向和区域设计（上市前）、临床试验入组找患者、为标签扩展生成真实世界证据、药物警戒安全信号检测，以及竞争性商业情报。由于 Komodo
              不公开披露定价，企业合同额只能按行业常规推断：中端市场约 $500K–$2M，全球前 20 大账户约 $2M–$5M+。公司 2016–2022 的增长轨迹——从 Series A 到 Series
              D、累计六轮融资——与 COVID-19 期间制药扩张带来的生命科学数据支出高峰，以及监管对 RWE 用于补充药物审批路径接受度提高的周期重合。
