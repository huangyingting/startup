      - number: '7.3'
        title: 运营、关键人物与整合风险
        blocks:
          - type: paragraph
            body: >-
              Komodo 由 Dr. Arif Nathoo（CEO）和 Web Sun（President）联合创立；截至 May 2026，两人仍在担任高管。创始人构成集中的关键人物风险：Nathoo
              承载临床公信力、医学事务关系和核心投资人信任；Sun 承载商业战略、GTM 执行和运营纪律。任何一人离开，都会冲击企业合同续约和投资人信心。部分 2023–2024 报道暗示 Web Sun
              从日常总裁职责中后撤（未确认）；Sun 的实际职责范围如果发生变化，就是需要尽调跟进的黄旗事件。


              Komodo 已完成两笔收购，均带来实质整合风险。Mavens 收购（May 2021）加入了 200+ 名 Salesforce 专家员工，分布在多个地理区域，带来不同产品文化和国际交付运营。Breakaway
              Partners 收购（January 2024）加入了一家商业分析咨询公司，引入服务收入，可能稀释 SaaS 毛利率指标，并在产品主导文化与服务主导文化之间制造张力。两笔整合都没有公开披露留任结果、NPS
              恶化情况或财务协同兑现情况。


              数据质量限制是潜在声誉风险。Komodo 的 Healthcare Map 对农村和 Medicaid 人群覆盖不足（理赔样本偏向商业保险人群），从就诊到已裁定理赔存在 30–90
              天滞后，并因特定医疗系统集成而带有 EHR 样本偏斜。这些限制可能造成不利产品结果——患者队列识别错误、疾病发生率高估、有偏的真实世界证据结论——进而侵蚀制药客户信任。一次高曝光 RWE
              失败或客户数据质量争议，都会演变成声誉和 ARR 风险事件。对 AWS 云和 Snowflake Data Cloud 的供应商 / 平台依赖增加了基础设施集中风险；任一提供商服务中断，都会扰乱数据管线交付
              SLA。
