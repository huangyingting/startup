      - number: '5.2'
        title: Healthcare Map：核心数据资产与架构
        blocks:
          - type: paragraph
            body: >-
              Healthcare Map 是支撑 Komodo 所有分析能力的基础自研资产。它通过概率实体解析引擎，把 1T+ 条个人医疗记录链接成 330M+
              条纵向患者旅程；该引擎在开放理赔、封闭理赔、EHR、实验室、专科药房以及 60+
              个来源伙伴的辅助照护数据之间校准患者身份。每日刷新节奏把这项资产与依赖每周或每月批处理更新的竞争对手区分开来，使近实时商业和临床监测成为可能。去标识化管线同时应用 HIPAA Safe Harbor（移除 18
              类 PHI 标识符）和 Expert Determination（统计验证再识别风险很小），生成符合 HHS OCR
              指南的有限数据集。患者旅程链接在实体层完成，通过跨来源标识符的概率匹配，生成从诊断到治疗、药房取药和结局的统一照护事件时间线，不需要各来源拥有共同患者标识符。GeneDx 罕见病基因组合作为 Healthcare
              Map 增加了链接的基因组-临床数据，扩大了罕见病流行病学覆盖。超过 600 篇同行评议论文使用过 Healthcare Map 数据，提供了独立分析验证。关键限制包括理赔数据天然覆盖不到未参保和仅
              Medicaid 人群、不同理赔支付方编码存在差异，以及支付方伙伴封闭理赔接收和处理存在滞后，这些都可能影响特定数据元素的新鲜度。
