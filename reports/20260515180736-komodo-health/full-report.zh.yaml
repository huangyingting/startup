      - number: '1.3'
        title: 融资历史与资本形成
        blocks:
          - type: paragraph
            body: >
              2015 年至 2022 年 1 月，Komodo Health 在五轮已披露新股权益融资中累计融资约 $314M。最早一轮是 2015 年约 $5M 的种子轮，由 SV Angel 和 Felicis
              Ventures 领投。2017 年又完成约 $9M 的 Series A。2019 年 Series B 为 $50M，由 Andreessen Horowitz 领投，Felicis、Section 32 和
              SVB Capital 参与。2021 年 3 月 Series C 增加 $50M，由 Andreessen Horowitz 领投，ICONIQ Capital、Casdin Capital 和
              Northpond Ventures 作为新投资方加入。


              迄今最大一轮是 2022 年 1 月 12 日宣布的 $220M Series D，由 Tiger Global Management 领投，据报道投后估值为 $3.3B。加入 Komodo 董事会的 Tiger
              Global 合伙人 Lee Fixel 称 Komodo「正在改变医疗数据基础设施」。既有投资方 Andreessen Horowitz、ICONIQ Capital、Casdin
              Capital、Northpond Ventures 和 Section 32 参与；新投资方包括 Dragoneer Investment Group 和 Tellurian Ventures。2022 年 1
              月，科技和医疗行业媒体广泛报道了这轮融资。


              从 Series D 到报告日期（2026 年 5 月 15 日），没有后续新股权益融资轮公开宣布。Komodo 没有披露任何债务额度、老股要约或下调估值融资；不过，2022–2024 年整体创投环境、Tiger
              Global 的估值下调周期，以及没有新轮融资消息，都让当前隐含估值仍是一个开放问题。
