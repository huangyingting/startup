      - number: '3.4'
        title: 护城河耐久性与竞争风险
        blocks:
          - type: paragraph
            body: >-
              Komodo 的竞争护城河可以从四个维度评估：数据广度和新鲜度、多模态整合、应用层切换成本，以及 AI 差异化。

              在数据广度和新鲜度上，Healthcare Map 声称的核心护城河是来自 60+ 个来源、每日刷新的 330M+ 条美国患者旅程。这是公司口径，尚未独立基准验证，但有客户采用和已披露的 600+
              生命科学客户关系支撑。护城河具备部分耐久性，因为匹配来源广度和每日刷新基础设施需要大量投入；但 IQVIA 如果对 Symphony Health 业务投入足够，也可能补上新鲜度差距，Veeva Compass
              也在扩大患者数据覆盖。

              在多模态整合上，Komodo 融合理赔 + EHR + 实验室 + 专科药房 + 消费者数据，比仅有理赔或仅有 EHR 的竞争对手更完整地呈现患者旅程。这是最可防守的护城河，因为获取并标准化 60+
              个异构数据流需要多年工程和数据运营，新进入者难以复制。不过，IQVIA 的 1.2B 全球患者记录优势说明，在某些维度上 IQVIA 的数据规模已超过 Komodo。

              在应用层切换成本上，Sentinel + Aperture + Prism + Mavens 套件把 Komodo 嵌入生命科学商业和医学事务工作流。分析师和商业运营团队一旦在 Komodo
              应用套件上搭建工作流，切换到 IQVIA 或 Veeva 就需要再培训、工作流迁移并承担采购风险，从而形成有意义的留存动态。这是验证最充分的护城河维度，因为它与观察到的行为一致：多年期企业合同和扩大的客户关系。

              在 AI 差异化上，Marmot AI 是公司宣称的护城河，但验证最弱。IQVIA 有带 AI 增强分析的 Octa；Veeva 正通过 Ostro 收购 AI 能力；Tempus 拥有最深的 AI
              肿瘤能力。没有独立基准，Marmot AI 护城河无法验证。

              2026–2028 年，Komodo 面临的主要竞争风险是：（1）Veeva 向其 1,552 个制药 CRM 客户交叉销售替代，不需要赢得新账户；（2）IQVIA 通过投资 Symphony Health
              补上新鲜度差距；（3）Tempus 从肿瘤扩张到全人群 AI 分析，从而抹平 Komodo 的广度优势；（4）如果增长放缓且医疗数据公开市场倍数继续压缩，出现类似 DH 的估值压缩情景。
