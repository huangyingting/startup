  - id: FR001
    title: 风险热力图
    type: matrix
    claimRefs:
      - CR001
      - CR006
      - CR010
      - CR014
      - CR017
      - CR021
    description: 双轴矩阵按发生概率（低 / 中 / 高）和已知缓释后的剩余影响（中 / 高 / 关键）映射 Komodo 各主要风险类别。 位置反映 TR001–TR006 中评估的缓释后剩余暴露。
    data:
      columns:
        - 低概率
        - 中概率
        - 高概率
      rows:
        - label: 关键影响
          values:
            - FDA 对 Marmot 的 SaMD 分类
            - HIPAA 去标识化充分性裁定；网络安全事故（Change Healthcare 先例）
            - 勒索软件 / 数据外泄；IRA 压缩药企收入
        - label: 高影响
          values:
            - FTC 将 HBNR 扩展至 Komodo；创始人离任
            - MHMD / 州法合规失败；整合失败（Mavens / Breakaway）；关键人物流失（Sangani）
            - 下行轮或 Series E 失败；头部药企客户流失（转向 IQVIA）；生物技术融资收缩
        - label: 中影响
          values:
            - FTC Kochava 式同意令；HHS Section 1557 AI 偏见认定
            - 与药企客户的数据质量争议；Snowflake 定价 / 市场扰动
            - IRA 推动药企整合并减少客户数量
  - id: FR002
    title: 风险传导图
    type: dag
    claimRefs:
      - CR001
      - CR006
      - CR010
      - CR014
      - CR017
      - CR018
      - CR019
      - CR024
    description: 有向无环图（DAG）展示主要风险触发因素如何传导到 ARR、利润率、融资和企业价值。每条边代表本章主张支持的、有记录的因果机制。
    data:
      nodes:
        - id: n1
          label: HIPAA / FTC 执法
          detail: HHS OCR 行动、FTC 同意令，或去标识化挑战
          type: risk
        - id: n2
          label: 网络安全事故
          detail: 勒索软件或数据外泄事件（Change Healthcare 先例）
          type: risk
        - id: n3
          label: 关键人物离任
          detail: Nathoo 或 Sun 退出高管岗位
          type: risk
        - id: n4
          label: 药企客户流失
          detail: IRA 压力、IQVIA/Veeva 替代、数据质量争议
          type: risk
        - id: n5
          label: IRA 药品定价压力
          detail: CMS 药价谈判压缩药企研发分析预算
          type: risk
        - id: n6
          label: ARR 下滑
          detail: 客户流失或扩张丢失导致收入收缩
          type: impact
        - id: n7
          label: 声誉受损
          detail: 数据隐私事故或监管认定进入公开领域
          type: impact
        - id: n8
          label: 融资风险
          detail: 下行轮、融资失败，或不利桥接条款
          type: impact
        - id: n9
          label: 估值受损
          detail: 下行轮低于 $2B，或 IPO 定价显著低于 Series D
          type: impact
      edges:
        - from: n1
          to: n7
        - from: n1
          to: n6
        - from: n2
          to: n7
        - from: n2
          to: n6
        - from: n3
          to: n6
        - from: n3
          to: n8
        - from: n4
          to: n6
        - from: n5
          to: n4
        - from: n5
          to: n6
        - from: n6
          to: n8
        - from: n7
          to: n8
        - from: n8
          to: n9
  - id: FR003
    title: 依赖图
    type: dag
    claimRefs:
      - CR010
      - CR011
      - CR012
      - CR013
      - CR025
    description: 有向无环图（DAG）映射 Komodo 的关键外部依赖——数据源、云基础设施、分销渠道、客户和监管者——以及它们与 Healthcare Map 和 Marmot 平台运营的关系。
    data:
      nodes:
        - id: d1
          label: 60+ 数据源合作伙伴
          detail: 理赔、药房、EHR、实验室数据流（身份未完全公开）
          type: supplier
        - id: d2
          label: AWS 云基础设施
          detail: Healthcare Map 和 Marmot 的核心数据管道、计算与存储
          type: supplier
        - id: d3
          label: Snowflake Data Cloud
          detail: Healthcare Map 分发市场；数据仓库层
          type: supplier
        - id: d4
          label: 前 20 药企 / 生物技术客户
          detail: 估计贡献 >50% ARR；Pfizer、J&J、AbbVie、Novartis（代表性）
          type: customer
        - id: d5
          label: HHS / OCR
          detail: HIPAA 执法机构；去标识化充分性裁定方
          type: regulator
        - id: d6
          label: FTC
          detail: Section 5 健康数据经纪商监管；HBNR 执法
          type: regulator
        - id: d7
          label: FDA
          detail: Marmot 临床决策支持的 AI/ML SaMD 路径主管机构
          type: regulator
        - id: d8
          label: Komodo Healthcare Map + Marmot
          detail: 核心产品平台；数据链接和 AI 推理引擎
          type: company
      edges:
        - from: d1
          to: d8
        - from: d2
          to: d8
        - from: d3
          to: d8
        - from: d5
          to: d8
        - from: d6
          to: d8
        - from: d7
          to: d8
        - from: d8
          to: d4
  - id: FV001
    title: 投资建议逻辑
    type: flow
    claimRefs:
      - CV001
      - CV002
      - CV003
      - CV031
    description: 流程图追踪证据链：数据护城河强度、AI 平台可选性、财务不透明和可比样本风险，如何导向带价格纪律的有条件投资建议。
    data:
      nodes:
        - id: n1
          label: 数据护城河
          detail: 330M 患者旅程；纵向理赔 / 实验室 / 药房数据；嵌入药企
          type: input
        - id: n2
          label: AI 可选性
          detail: Marmot 平台需求加速（Apr 2026）；CFO 已到位；上行空间未确认
          type: input
        - id: n3
          label: 财务不透明
          detail: 2022 年以来无 ARR / NDR / 收入披露；所有估值依赖情景
          type: input
        - id: n4
          label: 可比风险
          detail: DH -97%；EMCLOUD 7–8×，峰值曾达 30×；品类压缩已确认
          type: input
        - id: n5
          label: 投资逻辑强度
          detail: 护城河强 + AI 可选性；财务证据弱；品类风险高
          type: intermediate
        - id: n6
          label: 估值评估
          detail: 加权公允价值 $1.1–1.5B；按当前证据，$3.3B 站不住
          type: intermediate
        - id: n7
          label: 有条件推进
          detail: 继续跟踪；价格敏感入场；承诺前解决 6 项尽调问题
          type: output
      edges:
        - from: n1
          to: n5
        - from: n2
          to: n5
        - from: n3
          to: n6
        - from: n4
          to: n6
        - from: n5
          to: n7
        - from: n6
          to: n7
  - id: FV002
    title: 估值敏感性
    type: bar
    claimRefs:
      - CV007
      - CV008
      - CV009
      - CV010
      - CV011
      - CV012
    description: 柱状图展示不同倍数 / ARR 组合下 Komodo 的隐含企业价值，说明估值对 ARR 假设和市场倍数假设都高度敏感。
    data:
      items:
        - label: 悲观：4× × $90M ARR
          value: 360
        - label: 悲观：6× × $90M ARR
          value: 540
        - label: 基准：8× × $140M ARR
          value: 1120
        - label: 基准：10× × $150M ARR
          value: 1500
        - label: 乐观：12× × $180M ARR
          value: 2160
        - label: 乐观：15× × $200M ARR
          value: 3000
        - label: 2022 年 Series D 投后估值（参考）
          value: 3300
  - id: FV003
    title: 估值 / 回报区间
    type: range
    claimRefs:
      - CV008
      - CV010
      - CV011
      - CV012
    description: 区间图展示低 / 基准 / 高企业价值结果、按 $1.2B 基准价格入场的隐含回报倍数，以及情景概率信号。
    data:
      items:
        - label: 退出时隐含 EV（USD M）
          low: 400
          mid: 1300
          high: 4000
        - label: $1.2B 入场的回报倍数（×）
          low: 0.3
          mid: 1.1
          high: 3.3
        - label: $3.3B 入场的回报倍数（×）
          low: 0.1
          mid: 0.4
          high: 1.2
        - label: 退出时间（自 2026 年起的年数）
          low: 2
          mid: 5
          high: 8
  - id: FV004
    title: 投资 KPI
    type: kpi
    claimRefs:
      - CV001
      - CV002
      - CV012
      - CV018
      - CV036
    description: 投委会评分卡从 7 个维度评估 Komodo Health 的 2026 年入场决策。
    data:
      items:
        - label: 市场机会
          value: 7
          detail: 大型药企 RWE 和健康 AI TAM（$5B+）；药企商业和临床运营带来结构性需求
        - label: 产品 / 证明
          value: 6
          detail: 330M 患者旅程；药企商业渗透已确认；Marmot AI 需求加速（Apr 2026）；AI 层没有收入证明
        - label: 竞争护城河
          value: 7
          detail: 纵向患者数据集规模耐久；嵌入药企工作流带来切换成本；不易复制
        - label: 单位经济模型
          value: 3
          detail: 没有公开 ARR、NDR 或毛利率；DH NDR 对照提示品类风险；财务不透明是关键阻断缺口
        - label: 风险画像
          value: 2
          detail: 品类压缩已确认（DH -97%）；EMCLOUD 自 2022 年以来 -75%；AI 变现未经证明；存在数据监管限制风险；优先股堆叠未知
        - label: 估值纪律
          value: 4
          detail: 按 2026 年倍数，2022 年 $3.3B 投后估值站不住；隐含公允价值 $1.1–1.5B；需要 55–67% 折价
        - label: 证据质量
          value: 4
          detail: 33 个来源支撑 42 条主张；财务尽调仍有阻断缺口；没有经审计财务，所有情景都缺少锚点
