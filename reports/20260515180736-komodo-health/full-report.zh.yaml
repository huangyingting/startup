      - number: '1.2'
        title: 创始人、管理层与治理
        blocks:
          - type: paragraph
            body: >
              Komodo Health 由 Arif Nathoo 医学博士（CEO）和 Web Sun（总裁）于 2014 年共同创立。Nathoo 曾在 Harvard Medical School 接受医生训练，此前在
              McKinsey & Company 领导制药战略项目；Sun 是 Stanford 背景的运营者，共创 Komodo 前在 McKinsey 负责增长和运营。到 2026 年 5
              月，两位创始人仍担任高管，并被媒体合称为公司的运营主梁。创始人与市场的匹配度在临床（Nathoo）和商业（Sun）两条轴线上都强，但关键人物集中度高。


              公司 2026 年 5 月 about 页面列出的高管团队包括 Miles Ennis（首席运营官兼首席收入官）、Amit Sangani（首席技术官，负责扩展 Marmot）、Paul
              Gurney（首席产品官）、Mark Jewett（首席营销官）、Sarah Shin（首席人事官）、Paul Thomas（首席财务官）、Mike Weiss（总法律顾问兼合规负责人）、Brad
              Kelley（数据战略总经理）和 Adam Tong（首席商务官，负责 Mavens）。


              董事会构成没有完整公开。据报道，历史董事和观察员包括 Lee Fixel（Tiger Global，Series D 领投方）、David George（Andreessen Horowitz）、Will
              Griffith（ICONIQ Capital）、Eli Casdin（Casdin Capital）、Andy Schwab（Section 32），以及联合创始人 Nathoo 和
              Sun。公司没有披露审计或薪酬委员会构成，也没有披露任何独立董事。
