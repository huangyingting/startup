  - number: 3
    title: 竞争格局
    sections:
      - number: '3.1'
        title: 竞争格局与分层
        blocks:
          - type: paragraph
            body: >-
              Komodo Health 所处的医疗数据和真实世界证据分析市场拥挤且竞争加剧。竞争格局可拆成三个板块，分别对应不同买家需求和竞争动态。

              第一类也是最重要的一类，是全栈医疗数据既有巨头：IQVIA（NYSE: IQV，FY2025 收入 $16.3B）和 Veeva Systems（NYSE: VEEV，FY2026 收入 $3.2B）。IQVIA
              的 Technology & Analytics 部门拥有 1.2B 条全球去标识化患者记录，运营 Symphony Health（患者级理赔数据），并由 Komodo 无法匹敌的 CRO 关系背书。Veeva
              正从 CRM 激进转向患者级数据，抓手是 Veeva Compass 和 Veeva Data Cloud；其 1,552 个制药客户让交叉销售替代成为 Komodo
              的结构性威胁。这个板块没有其他竞争者同时具备规模、制药客户关系深度和资本，能够打穿从 CRO 到商业分析的全栈。

              第二类是聚焦肿瘤的 RWE 专家：Flatiron Health（Roche 子公司，已整合数百家癌症中心）、Tempus AI（NASDAQ: TEM，2024 年 6 月 IPO，收入估计 $480M+，覆盖
              65% 美国学术医学中心）、ConcertAI（2022 年累计融资 $150M+）和 Syapse。这些玩家在肿瘤临床工作流整合上更深，尤其是 Tempus 拥有 350+
              petabyte、包含临床基因组数据的数据集；但它们的范围比 Komodo 全人群 Healthcare Map 更窄。它们在 R&D 分析上比在商业分析上更相关。

              第三类是商业医疗情报：Definitive Healthcare（NASDAQ: DH，收入约 $250M，2021 年 IPO 估值 $5B，到 2024 年压缩至约 $500M 市值）和 H1（HCP
              情报，2021 年 $123M Series C）。这些玩家直接与 Komodo 的 Sentinel 和 Aperture 商业应用竞争。Definitive Healthcare
              估值严重压缩，是纯医疗数据公司估值倍数的反向可比信号。

              除这三类外，大型制药公司内部自建（Pfizer、Roche、Novartis 数据科学团队）和云平台进入者（Snowflake Healthcare Data Cloud、Amazon
              HealthLake、Microsoft Cloud for Healthcare）也构成替代和平台风险。RWE 解决方案市场整体预计从 $2.5B（2024）增至 2032 年超过 $8B（约 15%
              CAGR），将继续吸引资本进入各个板块。
