  - number: 7
    title: 风险
    sections:
      - number: '7.1'
        title: 监管与数据隐私风险
        blocks:
          - type: paragraph
            body: >-
              Komodo Health 的整个产品业务版图建立在患者级医疗理赔数据的去标识化和商业分发之上，正处在美国隐私法演进最快的几个领域交汇处。


              HIPAA 去标识化：HHS 指引认可两种方法——Expert Determination（统计方法）和 Safe Harbor（字段抑制）。Komodo 依赖 Expert
              Determination。学术和监管文献已经记录，将「去标识化」理赔数据与辅助数据集（基因组、消费者位置、药房记录）合并，可能以不可忽视的概率重新识别具体个人。HHS Office of Civil
              Rights 在近年周期内达成的执法和解合计超过 $30M，单项罚款最高达到 $16M（Premera Blue Cross，2019）。一旦裁定 Komodo 的方法不足，公司——以及可能包括其受 HIPAA
              覆盖的实体客户——都会暴露于执法责任。


              FTC 监管轨迹：FTC 在 2024 年依据 Section 5 与数据经纪商 Kochava 达成和解，原因是其销售敏感位置和健康数据构成不公平贸易行为。另一路径上，FTC 在 June 2024 敲定扩展版
              Health Breach Notification Rule（HBNR），把覆盖范围延伸到健康应用和数字健康工具。FTC 已明确要审视健康数据聚合商和经纪商，给 Komodo
              这类收集、链接并转售患者旅程数据的公司带来不可忽视的外溢风险。FTC 同意令或调查会造成重大业务扰动，而不只是合规成本。


              州法拼图：Washington 的 My Health My Data Act（MHMD，March 2024 生效）为健康数据设定消费者权利，保护范围超出 HIPAA，并适用于非 HIPAA 覆盖实体，可能覆盖
              Komodo 的数据授权业务。California CMIA 扩展、Connecticut 和 Colorado 隐私法共同构成多州合规负担，需要逐州法律顾问介入。州总检察长诉讼正在成为越来越大的风险向量。


              FDA SaMD 与 AI 偏见：Komodo 的 Marmot AI 平台定位于临床决策支持场景。FDA 的 AI/ML-Enabled Medical Device Action Plan（2023
              年更新）和 SaMD 指引建立了一条监管路径：影响临床决策的 AI 工具可能需要 510(k) clearance 或 de novo authorization。HHS Section 1557（2024
              final rule）要求接受联邦财政援助的主体，对用于临床决策支持的 AI 做算法偏见测试，也给部署 Marmot 的健康计划和提供方客户增加了合规义务。
            claimRefs: []
