      - number: '7.4'
        title: 网络安全与宏观风险
        blocks:
          - type: paragraph
            body: >-
              医疗健康是勒索软件和数据泄露最常瞄准的行业。February 2024 的 Change Healthcare 网络攻击——归因于 ALPHV/BlackCat——扰乱了数千家美国医院和提供方的支付处理，导致
              UnitedHealth Group 报告 2024 年上半年直接成本 $872M+，在医疗系统下游造成估计 $1–2B 扰动，并暴露了估计 190 million
              名患者的个人健康信息，成为美国史上最大医疗健康数据泄露事件。Change Healthcare 事件重置了所有医疗健康数据托管方的网络安全尽调预期。


              Komodo 持有覆盖 330M+ 患者旅程的去标识化纵向数据。虽然去标识化数据名义上豁免 HIPAA，但勒索软件事件或数据外泄会：（1）触发 HHS OCR
              强制调查，以判断是否可能重新识别；（2）在制药和医疗健康买方中造成灾难性声誉损害；（3）如果泄露触及受 HIPAA 覆盖实体伙伴的原始输入数据流，还可能暴露上游管线数据。Komodo 持有 HITRUST CSF
              认证，认证的是控制框架，不能防止泄露；Change Healthcare 事发时同样具备 SOC 2 合规。公司不公开披露事件响应测试频率、渗透测试计划，或备份 / 恢复 RTO/RPO 指标。


              Inflation Reduction Act 带来的宏观风险是结构性的。CMS 已选定首批 10 种药物进行 Medicare 价格谈判（2026
              年生效），后续批次将每年加入更多产品。纳入价格谈判的药物，制造商收入估计减少 25–60%。对 Komodo 的制药客户来说，IRA 价格压力直接压低商业上市规划、真实世界证据和 IV 期分析项目的
              ROI——这些正是 Komodo 主要支撑的工作流。2022–2024 的生物科技融资收缩减少了 CRO 和新兴生物制药板块的可服务钱包。两股宏观力量都是跨多年运行的结构性逆风。
