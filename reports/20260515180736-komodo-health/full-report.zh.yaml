      - number: '7.2'
        title: 竞争与市场结构风险
        blocks:
          - type: paragraph
            body: >-
              Komodo 所处市场里，IQVIA 已经是最常见的正面竞争对手；这家公司收入 $47B+、员工 85,000 人，是全球医疗健康数据和分析领导者。IQVIA 在全球制药、生物科技、支付方和提供方板块拥有远强于
              Komodo 的企业关系，更宽的自有数据集，以及远超 Komodo 私人公司资产负债表的 R&D 资本。Veeva Systems（截至 mid-2026，市值约 $38B）正用 Veeva Compass
              强势扩张到真实世界证据和数据领域；这是一个原生集成 CRM 的数据集，可降低已经使用 Veeva 商业平台的 80%+ 全球前 50 大制药公司的切换成本。Flatiron Health（Roche
              子公司，收购价格 $1.9B）主导肿瘤 EHR 关联 RWE。Tempus AI（NASDAQ: TEM，IPO June 2024）则以基因组学和 AI 驱动临床数据分析为方向，同时推进理赔数据链接策略。


              Komodo 估值风险最清晰的公开市场证据来自 Definitive Healthcare（Nasdaq: DH）。Definitive 在 September 2021 以约 $25/share
              上市，市值峰值超过 $2.8B。到 May 2026，DH 股价约 $3–4/share，较高点下跌 90%+，收入约 $250M，对应约 2x 收入倍数。Komodo 在 January 2022 以
              $3.3B 完成 Series D，当时估计 ARR 为 $100–120M，隐含 27–33x 倍数。当前公开市场可比公司（DH 2x、IQVIA 4x EV/revenue、Veeva 11x）无法支撑约
              30x 入场。若按公平市场倍数完成 Series E 或 IPO，将是一次严重降估值融资。


              客户垂直集中放大了竞争风险。估计 Komodo 80–85% 收入来自生命科学（制药、生物科技、CRO）。Inflation Reduction Act 的 Medicare 药价谈判条款给制药 R&D
              预算带来结构性压力。生物科技融资在 2022–2024 显著收紧。两股力量共同压缩 Komodo 在主导垂直行业里的可服务钱包。公司声称已扩张到支付方和提供方板块，但收入贡献尚无公开确认。
