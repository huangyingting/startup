  - id: TV002
    title: 投资逻辑 / 反向逻辑表
    sectionRef: SV001
    claimRefs:
      - CV004
      - CV005
      - CV031
      - CV040
    columns:
      - 论点
      - 证据
      - 改变判断的条件
    rows:
      - - 投资逻辑：可防守的数据护城河
        - 330M+ 患者旅程、纵向覆盖、医药 CRO 工作流
        - AI 替代、监管限制去标识化数据使用，或前三大药企客户流失
      - - 投资逻辑：Marmot 带来 AI 上行空间
        - CFO 到位 + April 2026 新闻稿提到 Marmot 需求；Komodo 将 Marmot 定位为核心平台
        - Marmot 不能转化为增量 ARR，只停留在功能插件
      - - 投资逻辑：稀缺性溢价
        - 具备 330M+ 患者规模且打入药企商业场景的私有资产很少
        - 战略买方把同等级数据能力内化，或替代方案出现
      - - 反向逻辑：DH 式压缩
        - DH 较 IPO 估值跌去 97%；医疗数据分析品类存在系统性风险
        - DH 反弹，或 Komodo 证明其 NDR 和收入增长轨迹更强
      - - 反向逻辑：2022 年倍数站不住
        - 2026 年已没有 33× ARR 倍数；EMCLOUD 中位数为 7–8×；没有重新评级证据
        - Marmot 突破拿出证据后，市场把 AI 健康数据重新定价到 15–20×
      - - 反向逻辑：财务不透明
        - 2022 年以来没有经审计的收入 / ARR / NDR；所有估值都依赖情景且无法验证
        - 经审计财务确认 ARR 增长 15%+、NDR >105%
    notes: 投资逻辑项反映公开可得的证实性主张；反向逻辑项反映已确认的反向可比样本。
  - id: TV003
    title: 乐观 / 基准 / 悲观情景表
    sectionRef: SV004
    claimRefs:
      - CV008
      - CV010
      - CV011
      - CV012
    columns:
      - 情景
      - 概率
      - ARR 假设
      - 适用倍数
      - 隐含 EV
      - 关键触发因素
    rows:
      - - 乐观
        - 15%
        - $200M+
        - 15× NTM ARR
        - $3.0–4.5B
        - Marmot AI 放量；讲出可比 Tempus 的 AI 叙事；IPO 或战略并购
      - - 基准
        - 55%
        - $130–170M
        - 8–10× NTM ARR
        - $1.0–1.7B
        - NDR 稳定在 90–100%；Veeva 可比 SaaS 倍数；后期新股融资
      - - 悲观
        - 30%
        - <$100M 或下滑
        - 4–6× NTM ARR
        - $0.4–0.6B
        - DH 式 NDR 侵蚀；药企预算削减；下行轮或困境出售动态
      - - 概率加权中枢
        - 100%
        - 隐含 ~$140M
        - 综合 ~8–9×
        - $1.1–1.5B
        - 较 $3.3B Series D 投后估值折价 55–67%
    notes: 概率为分析师估计；ARR 输入是未经验证的情景假设，仍需一手尽调确认。
  - id: TV004
    title: 可比估值表
    sectionRef: SV002
    enumerationScope:
      coverage: sample
      basis: >-
        Public comparables selected from active healthcare data/AI companies with SEC filings; private comparables
        sourced from CB Insights, PitchBook, and press coverage of 2022 rounds. Sample not exhaustive — smaller RWE
        vendors and non-US comparables excluded.
    claimRefs:
