      - number: '4.3'
        title: 现金状况、烧钱速度与现金跑道
        blocks:
          - type: paragraph
            body: >-
              Komodo Health 作为私营公司，不披露现金余额、月度烧钱速度或资产负债表信息。所有烧钱估计都必须从可观察代理变量推导。按约 800 名员工估计（LinkedIn 估计；Greenhouse
              招聘门户显示截至 2026 年 5 月在工程、数据科学、基础设施和商业岗位有 41 个开放职位，可作佐证），每名员工平均全成本 $200–250K，则员工驱动的年度支出估计为
              $160–200M。再加上非员工运营成本估计（数据采购、云基础设施、办公室和市场营销）$40–80M，年度总运营成本估计为 $200–280M。如果 Komodo Health 已实现 $150–300M
              ARR、毛利率为 60–75%，其毛利润将为 $90–225M，意味着现金流状态从显著为负到小幅为正都有可能。自 2022 年 1 月 Series D 以来已过去 4.3
              年，却没有公开宣布后续融资事件；对一家烧钱的高增长公司而言并不寻常。最合理的解释是：（1）收入增长足以接近或达到现金流盈亏平衡；（2）老股交易在未公开新股融资轮的情况下为投资人提供流动性并给公司带来资本；或（3）已安排私人信贷或增长债务。公开来源没有发现任何债务工具披露。公司仍在大规模招聘（41
              个开放岗位），与财务困境中的公司不一致，至少说明现金充足性尚可。
