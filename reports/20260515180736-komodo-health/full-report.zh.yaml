      - number: '6.2'
        title: 具名客户证据与案例研究
        blocks:
          - type: paragraph
            body: >-
              Komodo Health 公开记录中质量最高的客户证据，是其 Healthcare Map 页面上一位全球前 20 大制药公司分析负责人的直接证言：部署 Healthcare Map
              后，处方医生名单覆盖率相较此前方案提高了 20 个百分点以上。这是一个量化结果表述——对企业数据供应商来说并不常见——也为其交付的商业价值提供了可触摸证据。其他案例研究和客户引用均匿名，用「Top 20
              Pharma」「Top 5 CRO」「Leading Biotech」等客户画像代称；没有任何制药公司在新闻稿、业绩电话会或投资者材料中公开确认与 Komodo 存在具名合同关系。

              除直接证言外，几类代理信号支撑了客户基础说法。January 2026 与 GeneDx 的罕见病患者识别合作，显示公司扩张到诊断和基因组学垂直领域。CVS Health Ventures 在 March
              2021 的战略性 Series C 投资，说明支付方领域存在需求。a16z 的 2019 投资逻辑明确把 Healthcare Map 数据质量和生命科学客户规模列为投资理由。Snowflake
              已发布的案例研究，以及 Healthcare Data Cloud 伙伴身份，提供了来自大型云基础设施公司的独立第三方验证。Mavens CRM 收购（2021）和 Breakaway
              托管服务收购（2024）加深了客户运营触点。截至 May 2026，未发现公开报道的客户流失或合同取消。
