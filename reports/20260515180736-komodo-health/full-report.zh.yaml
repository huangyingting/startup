      - number: '1.5'
        title: 里程碑、收购与反向事件
        blocks:
          - type: paragraph
            body: >
              Komodo 的里程碑轨迹显示，公司从数据底座初创公司（2014–2018），推进到企业 SaaS 扩张期（2019–2021），再转向定义品类的医疗 AI
              平台（2023–2026）。两笔收购重塑了产品界面：2021 年 11 月，Komodo 收购 Mavens，这是一家基于 Salesforce 的生命科学软件和咨询公司，拥有全球交付足迹，使 Komodo
              从数据授权拓展到商业工作流软件。2024 年，Komodo 收购生命科学商业分析咨询公司 Breakaway Partners，以加强 Sentinel HCP 定向和 Aperture 规划产品。


              2022 年 11 月，Endpoints News 等媒体报道称 Komodo 裁员，影响约 9% 员工，并将其归因于后期市场错位下更保守的增长姿态。截至 2026 年 5 月 15 日，公开资料没有显示
              Komodo 出现重大法律、监管执法、制裁、数据泄露披露或产品召回。不过，美国医疗数据行业持续承受隐私诉讼压力（HIPAA、州级生物识别和消费者隐私法），FTC 也关注健康数据经纪商；迄今 Komodo
              没有出现在重大反向文件中，但这一空白不应解读为零风险。
