      - number: '4.4'
        title: 收购与资本部署
        blocks:
          - type: paragraph
            body: >-
              Komodo Health 已完成两笔公开宣布的收购。2021 年 5 月，公司收购 Mavens；Mavens 被描述为生命科学领域领先的 Salesforce 咨询伙伴，为生物制药公司提供
              CRM、商业运营和数据整合服务。Mavens 收购价格未披露；基于 Mavens 当时估计 200+ 人员工规模和收入画像，对价估计为 $50–80M。这笔收购把 Komodo Health
              的商业化路径延伸到制药商业运营团队，并增加了经常性专业服务收入，不过利润率低于核心数据平台。2024 年 1 月，Komodo Health 以未披露对价收购 Breakaway
              Partners，这是一家商业分析和外勤团队效能咨询公司。Breakaway Partners 为制药和医疗器械商业团队提供分析即服务（analytics-as-a-service），以托管服务补充 Komodo
              的自助式数据平台。这些收购合计扩大了 Komodo Health 的产品和服务组合，但也可能因纳入人力资本密集型专业服务而稀释混合毛利率。两笔交易累计部署资本估计为 $80–150M，是对 Series C 和
              Series D 股权资金的实质消耗。两笔收购均未公开报告收入贡献或整合结果。
