      - number: '4.2'
        title: 收入模型、商业模式与单位经济
        blocks:
          - type: paragraph
            body: >-
              Komodo Health 的收入模型结合多年期企业 SaaS 订阅合同和数据授权协议，底层是 Healthcare Map——一个自研数据库，覆盖 330M+ 条去标识化患者旅程和 1T+
              条已链接理赔记录，并从 60+ 个来源每日刷新。核心客户是寻求真实世界证据（RWE）、商业洞察和患者路径分析的制药、生物技术和医疗器械公司；次级客户包括支付方、医疗服务方和金融服务机构。据报道，合同 ACV 约为
              $500K 至 $5M+，采用多年期承诺。Marmot AI 分析平台是较新的高 ACV 产品层，瞄准医疗 AI 工作流中的可审计性和可复现性。Mavens 和 Breakaway Partners
              两笔收购增加了专业服务收入流（Salesforce CRM 实施和外勤团队分析咨询），毛利率低于核心数据平台：专业服务估计为 20–40%，核心数据平台估计为 70–80%。混合毛利率估计为
              60–75%，但未获公开确认。收入未公开披露；根据 2022 年 1 月 Series D 当时报道暗示的「数亿美元级」ARR 轨迹，并假设 25–40% 复合增长，FY2025 ARR 可能为
              $150–300M。这一范围高度不确定。真实世界证据解决方案市场估计将从 2025 年 $2.44B 增至 2031 年 $6.04B，CAGR 为 16.33%（Mordor Intelligence），为
              Komodo Health 核心市场提供结构性顺风。不过，直接可比上市公司 Definitive Healthcare Corp. 报告 FY2025 收入 $241.5M，同比下降 4%，NDR 从
              96%（FY2023）降至 82%（FY2025），构成行业层面的反向可比。
