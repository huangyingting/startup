  - number: 8
    title: 估值
    sections:
      - number: '8.1'
        title: 投资逻辑、反向逻辑与建议
        blocks:
          - type: paragraph
            body: >-
              Komodo Health 的投资逻辑建立在三根支柱上：（1）可防守的纵向患者数据护城河——由理赔、药房、实验室和健康记录拼成的 330M+ 患者旅程——复制成本高，并且正越来越深地嵌入制药商业工作流；（2）通过
              Marmot 平台实现的新兴 AI 变现，Komodo 称截至 April 2026 该平台需求正在加速；（3）私人市场稀缺性：在医疗健康 AI /
              数据类别里，具备如此规模、覆盖深度和制药客户渗透率的资产非常少。


              反向逻辑同样清晰。最不利的公开可比公司 Definitive Healthcare（DH），从 September 2021 的 $3.9B IPO 估值压缩到 May 2026 约 $88M 市值，跌幅
              >97%；这说明医疗健康数据分析公司一旦收入增长停滞、净美元留存率（NDR）下降、公开市场热情消退，几乎可以损失全部价值。DH FY2025 收入同比下降 4%，企业 NDR 从 FY2023 的 96% 降至
              85%，净亏损达到 $199.3M，并出现 $196.1M 商誉减值；Komodo 投资人必须围绕这条轨迹做反向尽调。进一步看，Komodo 自 January 2022 Series D
              以来，没有披露审计收入、ARR 或 NDR 数据；$3.3B 投后价格建立在 33× 隐含 ARR 倍数上，而当前市场并不支持这个倍数。


              建议是有条件推进：考虑到数据护城河和 AI 平台可选性，值得做一级市场尽调，但按 $3.3B 入场没有现有证据支撑。价格纪律至关重要。资本承诺前，必须解决六个具体尽调问题（见第 5 节）。
            claimRefs: []
          - type: table
            tableRef: TV001
