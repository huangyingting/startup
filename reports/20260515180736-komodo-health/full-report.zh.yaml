  - number: 4
    title: 财务情况
    sections:
      - number: '4.1'
        title: 融资历史与资本结构
        blocks:
          - type: paragraph
            body: >-
              Komodo Health 在 2014 年至 2022 年 1 月的五轮风险融资中披露累计股权融资约 $314M。融资轨迹始于 2014 年种子轮，随后是 2018 年 8 月由 Felicis
              Ventures 领投的 $14M Series A、2019 年 11 月由 Andreessen Horowitz 领投的 $50M Series B、2021 年合计 $94M 的 Series
              C（首批加延展轮，CVS Health Ventures 为战略投资方），以及 2022 年 1 月 12 日由 Tiger Global Management 领投、投后估值 $3.3B 的 $220M
              Series D。Series D 的其他参与方包括 Andreessen Horowitz、ICONIQ Growth、Casdin Capital、SVB Capital 和 Northpond
              Ventures。资本结构是后期私营公司结构，没有公开 SEC 文件，也没有披露债务工具；精确稀释比例未公开。Series D 仍是最后一次披露的股权融资事件；截至 2026 年 5 月，约 4.3
              年过去，没有公开的 Series E 公告、IPO 或已披露战略收购。2022 年 1 月 Series D 的 $3.3B 估值，符合 2021–2022 年 SaaS 倍数高峰环境（估计 22–33× 预期
              ARR）。此后，医疗数据 SaaS 的公开市场倍数环境大幅压缩，Definitive Healthcare Corp. 在 2025–2026 年交易低于 1× 收入就是证据。
