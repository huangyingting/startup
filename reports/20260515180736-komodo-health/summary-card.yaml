  topStrengths:
    - >-
      Differentiated Healthcare Map scale (330M+ patient journeys, 60+ sources, 1T+ records refreshed daily) backed by
      HIPAA, SOC 2 Type II, and HITRUST controls.
    - >-
      Broad product surface across data, AI (Marmot), apps (Sentinel/Aperture/Prism/MapView/Pulse), and Salesforce-based
      Mavens, with 600+ life sciences customers claimed.
    - >-
      Strong cap table (Tiger Global, a16z, ICONIQ, Casdin, Northpond, CVS Health Ventures) and Snowflake distribution
      partnership giving capital and channel optionality.
  topRisks:
    - >-
      Last priced round is January 2022 at $3.3B with no announced Series E by mid-2026; public peer (Definitive
      Healthcare) market cap has compressed ~90% from IPO, signalling material down-round risk.
    - >-
      Competitive pressure from IQVIA (scale), Veeva Compass / Data Cloud (CRM-adjacent expansion), Tempus AI (post-IPO
      comp), and pharma in-house build threatens pricing and share.
    - >-
      Regulatory and privacy exposure rising — HIPAA enforcement, FTC scrutiny of health-data brokers (Kochava
      settlement, Health Breach Notification Rule expansion), and state laws (Washington MHMDA) raise compliance and
      reputational cost.
    - >-
      Customer and vertical concentration (top-20 pharma, ~85% life sciences, ~95% U.S.) and reliance on co-founders
      Nathoo and Sun create operational fragility.
  unresolvedGaps:
    - >-
      Audited revenue, ARR, growth rate, gross margin, net revenue retention, gross retention, and burn are not publicly
      disclosed.
    - >-
      No publicly filed S-1, 10-K, or post-2022 priced round; current secondary marks and any tender-offer pricing are
      not confirmed.
    - >-
      Customer-count substantiation (the 600+ claim), top-account concentration, and contract ACV distribution are not
      independently verifiable.
    - >-
      Marmot AI performance benchmarks, model provenance, and FDA / HHS Section 1557 AI-bias posture are not publicly
      documented.
    - >-
      Integration outcomes for Mavens (2021) and Breakaway Partners (2024) — revenue contribution, retention, churn —
      are not disclosed.
