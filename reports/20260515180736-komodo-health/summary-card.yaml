summary:
  headline: >-
    Komodo Health has a credible Healthcare Map data asset and 600+ customer footprint, but a stale 2022 Series D mark,
    severe peer compression, and rising regulatory scrutiny make the $3.3B valuation hard to defend without fresh
    disclosure.
  overallScore: 5.7
