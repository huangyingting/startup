  - number: 3
    title: Competitors
    sections:
      - number: '3.1'
        title: Competitive landscape and segmentation
        blocks:
          - type: paragraph
            body: >-
              Komodo Health operates in a crowded and intensifying market for healthcare data and real-world evidence
              analytics. The competitive landscape breaks into three segments that reflect different buyer needs and
              competitive dynamics.

              The first and most significant segment is full-stack healthcare data incumbents: IQVIA (NYSE: IQV, $16.3B
              revenue FY2025) and Veeva Systems (NYSE: VEEV, $3.2B revenue FY2026). IQVIA's Technology & Analytics
              division holds 1.2 billion globally de-identified patient records, runs Symphony Health (patient-level
              claims data), and backs this with CRO relationships that Komodo cannot match. Veeva is pivoting
              aggressively from CRM into patient-level data through Veeva Compass and Veeva Data Cloud, and its 1,552
              pharma customers make cross-sell displacement a structural threat to Komodo. No other competitor in this
              segment has the combination of scale, pharma relationship depth, and capital to execute across the full
              CRO-to-commercial analytics stack.

              The second segment is oncology-focused RWE specialists: Flatiron Health (Roche subsidiary, hundreds of
              cancer centers integrated), Tempus AI (NASDAQ: TEM, IPO June 2024, $480M+ revenue estimate, 65% of U.S.
              academic medical centers), ConcertAI ($150M+ raised, 2022), and Syapse. These players have deeper oncology
              clinical workflow integrations — particularly Tempus's 350+ petabyte dataset with clinical genomics — but
              narrower scope than Komodo's full-population Healthcare Map. They are more relevant in R&D analytics than
              commercial analytics.

              The third segment is commercial healthcare intelligence: Definitive Healthcare (NASDAQ: DH, ~$250M
              revenue, IPO at $5B valuation in 2021 compressed to ~$500M market cap by 2024) and H1 (HCP intelligence,
              $123M Series C 2021). These players compete directly with Komodo's Sentinel and Aperture commercial
              applications. Definitive Healthcare's severe valuation compression is an adverse comparables signal for
              pure-play healthcare data multiples.

              Beyond these three segments, internal build by large pharma (Pfizer, Roche, Novartis data science teams)
              and cloud-platform entrants (Snowflake Healthcare Data Cloud, Amazon HealthLake, Microsoft Cloud for
              Healthcare) represent substitute and platform risks. The RWE solutions market overall is projected to grow
              from $2.5B (2024) to over $8B by 2032 (~15% CAGR), attracting continued capital to all segments.
