      - number: '3.2'
        title: Incumbent and direct peer profiles
        blocks:
          - type: paragraph
            body: >-
              IQVIA is the most formidable competitive threat. Its $16.3B revenue (FY2025), 93,000 employees, and 1.2
              billion globally de-identified patient records give it scale Komodo cannot match organically. The
              Technology & Analytics division (40% of revenue) provides the Octa commercial analytics platform, and the
              Symphony Health subsidiary offers patient-level claims data directly competitive with Komodo's Healthcare
              Map. IQVIA's R&D division (55% of revenue) is a CRO that runs clinical trials for the same pharma
              companies Komodo sells to, creating relationship depth and cross-sell leverage that Komodo's pure-data
              model lacks. IQVIA's weakness from Komodo's perspective: data freshness and multi-modal integration.
              IQVIA's historical data updates are periodic rather than daily, and its technology stack reflects legacy
              IMS Health and Quintiles architectures rather than modern cloud-native data pipelines.

              Veeva Systems ($3.2B FY2026 revenue, 1,552 life-sciences customers) is the most dangerous emerging threat.
              Veeva dominates life sciences CRM and is systematically expanding into data. The acquisition of Crossix
              (patient data, 2019) and the launch of Veeva Compass patient-level data established the data strategy; the
              end of the Salesforce partnership in 2025 removed the key constraint on full-stack competition; and the
              acquisition of Ostro (AI agents for life sciences, $100M, March 2026) adds AI workflow capabilities that
              overlap with Komodo's Marmot platform. Veeva's cross-sell path to its 1,552 existing pharma CRM customers
              — without requiring new account wins — makes it structurally threatening in a way IQVIA's organic data
              expansion is not.

              Flatiron Health (Roche subsidiary, acquired 2018 for $1.9B) is the incumbent in oncology RWE with hundreds
              of cancer center integrations and partnerships with 20+ top oncology therapeutic developers. Flatiron's
              Roche ownership creates an inherent conflict of interest that limits its utility as a neutral data partner
              for Roche competitors, preserving a market gap for Komodo in oncology real-world evidence for non-Roche
              pharma.

              Tempus AI (NASDAQ: TEM, IPO June 2024) occupies the AI-oncology data apex with 350+ petabytes of data
              (including clinical genomics and multi-omics sequencing), connections to 65% of U.S. academic medical
              centers, and 95% of top-20 pharma oncology companies as partners. Tempus's genomics advantage is a
              structural moat Komodo cannot replicate through claims data alone, but Tempus's scope is narrower
              (oncology-focused) than Komodo's full-population map.

              Definitive Healthcare and H1 represent commercial intelligence competitors whose declining valuations (DH:
              -88% from IPO peak) and narrower data scope (provider-side intelligence vs. patient-journey analytics)
              make them less existential threats than IQVIA and Veeva, but they compete directly for Komodo's Sentinel
              and Aperture customer wallet.
