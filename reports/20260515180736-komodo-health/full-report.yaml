      - number: '7.5'
        title: Valuation and Financing Risk
        blocks:
          - type: paragraph
            body: >-
              Komodo's last disclosed primary equity round was a $220M Series D at a $3.3B post-money valuation in
              January 2022, led by Tiger Global. Tiger Global suffered an estimated $17B in portfolio markdowns during
              the 2022 tech downturn; its Komodo position—if marked to current comps—would represent a significant
              unrealized loss relative to carry. No Series E has been publicly disclosed as of May 2026, placing the
              Series D approximately 52 months stale. A typical growth-equity spacing of 18–24 months between rounds
              implies Komodo is 2–3 rounds late for its stage, suggesting either: (a) the company is self-funding from
              cash-flow, (b) it has done undisclosed debt or secondary financing, or (c) it is actively managing its way
              to an IPO window without an intermediate equity round.


              The public-market comp most directly analogous to Komodo is Definitive Healthcare (DH). Definitive IPO'd
              at ~$25/share in September 2021 on ~$220M revenue, peaked above $2.8B market cap, and trades below $500M
              as of mid-2026 on ~$250M revenue—roughly a 2x revenue multiple. Komodo's $3.3B January 2022 valuation at
              an estimated $100–120M ARR implied 27–33x revenue; DH's current 2x multiple applied to Komodo's estimated
              $200–250M current ARR would imply a fair-market value of $400–500M—an 85–88% haircut from the 2022 Series
              D price. Even using Veeva's 11x or IQVIA's 4x as aspirational benchmarks, Komodo's implied 30x multiple
              has no market support.


              Financing paths include a late-stage primary round with sharply dilutive terms, an IPO in a recovered
              market window, a strategic acquisition, or secondary sales. Tiger Global's position and the co-founders'
              equity stakes create alignment pressures to avoid a down-round; bridge financing with liquidation
              preference ratchets or pay-to-play provisions could structurally disadvantage common stockholders.
              Thesis-break events include: a disclosed down-round below $2B valuation, a failed primary raise, or an
              indefinitely deferred IPO window beyond calendar 2027.
            claimRefs: []
