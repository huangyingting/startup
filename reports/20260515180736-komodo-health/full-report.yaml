      - number: '3.3'
        title: Capability, pricing, and distribution comparison
        blocks:
          - type: paragraph
            body: >-
              On the key capability dimensions that matter to life-sciences buyers, Komodo's Healthcare Map has genuine
              advantages and documented gaps. The multi-modal data fusion (claims + EHR + specialty pharmacy + labs +
              consumer data) and daily refresh cadence differentiate Komodo from IQVIA's periodic update cycles and from
              oncology-only competitors (Flatiron, Tempus). The 330M+ U.S. patient coverage represents
              near-comprehensive U.S. population visibility that smaller players cannot match. Against Veeva, Komodo's
              advantage is data depth and AI-native architecture; Veeva's advantage is the CRM distribution channel and
              existing pharma customer relationships.

              Pricing benchmarks are highly opaque across the competitive set. Indicative estimates suggest Komodo
              enterprise contracts range from $500K to $3M annually, IQVIA Technology & Analytics engagements from $1M
              to $10M+ for large pharma relationships, and Definitive Healthcare historical contracts from $50K to $500K
              for mid-market accounts. IQVIA's pricing premium reflects full-service CRO integration; Definitive
              Healthcare's lower pricing reflects its narrower provider-intelligence scope. Komodo's positioning as a
              premium data platform priced below IQVIA but above DH is rational given its use case breadth, but pricing
              transparency is insufficient for independent validation.

              Distribution is an important competitive dynamic. Komodo distributes through the Snowflake Healthcare Data
              Cloud marketplace — giving it cloud-native discoverability — and through direct enterprise sales and a
              Salesforce-based Mavens workflow product. IQVIA distributes through deep account teams embedded in pharma
              R&D organizations. Veeva distributes through its established CRM account organization. The Snowflake
              channel is a net positive for Komodo's reach but also creates a dependency: Komodo's marketplace position
              could be threatened if Snowflake builds proprietary healthcare data or displaces Komodo as the canonical
              patient-journey data provider.

              Definitive Healthcare's market cap compression from ~$5B (IPO 2021) to ~$500M (2024) is the most salient
              public-market comparable for Komodo Health's $3.3B 2022 valuation. While DH is a narrower product than
              Komodo, the same demand compression, macro multiple contraction, and competitive pricing pressure from
              IQVIA expansion affected DH and represents a realistic adverse scenario for Komodo's private valuation if
              growth decelerates.
