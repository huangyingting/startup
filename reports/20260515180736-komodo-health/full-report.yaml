  - number: 8
    title: Valuation
    sections:
      - number: '8.1'
        title: Investment Thesis, Anti-Thesis, and Recommendation
        blocks:
          - type: paragraph
            body: >-
              The investment thesis for Komodo Health rests on three pillars: (1) a defensible longitudinal patient data
              moat — 330M+ patient journeys assembled from claims, pharmacy, lab, and health records — that is expensive
              to replicate and increasingly embedded in pharma commercial workflows; (2) emerging AI monetization
              through the Marmot platform, which Komodo describes as generating accelerating demand as of April 2026;
              and (3) scarcity value in the private market: there are very few assets of this scale, coverage depth, and
              pharma-customer penetration in the healthcare AI/data category.


              The anti-thesis is equally structured. The most adverse public comparable — Definitive Healthcare (DH) —
              has suffered a >97% compression from its $3.9B IPO valuation (September 2021) to a ~$88M market cap as of
              May 2026, demonstrating that healthcare data analytics companies can lose nearly all their value when
              revenue growth stalls, NDR declines, and public market enthusiasm evaporates. DH FY2025 revenue declined
              4% YoY, enterprise NDR fell to 85% (from 96% in FY2023), and net loss reached $199.3M with $196.1M in
              goodwill impairment — a trajectory that Komodo investors must diligence against. Furthermore, Komodo has
              not disclosed audited revenue, ARR, or NDR data since the January 2022 Series D; the $3.3B post-money
              price was set at a 33× implied ARR multiple that the current market does not support.


              The recommendation is Conditional Proceed: primary diligence is warranted given the data moat and AI
              platform optionality, but entry at $3.3B is not supportable on available evidence. Price discipline is
              essential. Resolution of six specific diligence asks (see Section 5) is required before capital
              commitment.
