      - number: '5.3'
        title: 'Marmot: Generative AI Orchestration Layer'
        blocks:
          - type: paragraph
            body: >-
              Marmot is Komodo's generative AI layer, commercially positioned as a purpose-built healthcare AI distinct
              from general-purpose LLM wrappers. Its core architectural differentiator is domain-specific model routing:
              rather than processing all queries through a single foundation model, Marmot evaluates the query intent
              and routes to a domain-specific model (e.g., a model trained on commercial analytics tasks vs. one trained
              on HEOR cohort logic), then passes responses through evaluation gates before returning output. Each
              interaction generates a full audit trail including routing decision, model used, input parameters, and
              output — supporting reproducibility requirements in regulated research workflows. Customer data isolation
              is enforced at the architecture level: each customer's proprietary pipeline data is fully segregated, and
              Komodo explicitly commits that customer data is never used to train its foundation models, addressing a
              critical data governance concern for pharma companies with commercially sensitive patient analytics
              pipelines. Role-based access controls tie Marmot AI access to the existing Komodo permissions framework,
              preventing users from querying data or triggering AI models outside their contractual scope. The
              appointment of Amit Sangani (Meta; led PyTorch and Llama) as CTO in January 2026 signals a planned
              expansion of Marmot's AI infrastructure, likely toward open-standard models and deeper integration with
              the cloud-native stack. Key risks include the absence of public benchmark data for Marmot accuracy, the
              potential for domain model errors in edge-case clinical reasoning tasks, and evolving FDA AI/ML regulatory
              expectations that may eventually require formal validation documentation for AI tools used in regulatory
              submission workflows.
            claimRefs: []
          - type: figure
            figureRef: FE003
            claimRefs:
              - CE025
              - CE026
