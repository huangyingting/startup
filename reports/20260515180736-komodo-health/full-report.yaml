      - number: '2.3'
        title: Customer Segments and Use Cases
        blocks:
          - type: paragraph
            body: >-
              Pharmaceutical and biotechnology companies represent the primary customer segment for RWE platforms,
              accounting for approximately 60-70% of market revenue. These organizations use RWE for clinical trial
              design and site selection, post-market surveillance, comparative effectiveness research, label expansion
              support, and health economics and outcomes research (HEOR). Large pharma companies typically maintain
              relationships with multiple RWE vendors to access diverse data assets and analytical capabilities.


              Payers and health systems represent a growing segment, using RWE for population health management, quality
              measurement, and value-based contracting. Government agencies, including the FDA and CMS, increasingly
              rely on RWE for regulatory decision-making and policy development. Academic medical centers and research
              institutions use RWE platforms for observational studies and grant-funded research.


              Komodo Health's customer base of 600+ life sciences companies positions it among the top three vendors by
              customer count in the pharmaceutical segment. The company's use cases span the drug development lifecycle,
              from early-stage patient identification through post-launch commercial analytics. Key applications include
              rare disease patient finding, HCP targeting for commercial teams, treatment pattern analysis, and
              competitive intelligence.


              The FDA's RWE program has validated several vendors' platforms for regulatory use, creating a
              certification advantage for approved providers. Komodo Health has supported FDA-accepted RWE submissions,
              though the agency has not publicly certified specific vendors as preferred providers. Regulatory
              acceptance remains the primary driver of pharmaceutical company RWE adoption decisions.
            claimRefs:
              - CM013
