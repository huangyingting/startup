        title: Product Portfolio and Application Suite
        blocks:
          - type: paragraph
            body: >-
              Komodo Health operates as a vertically integrated real-world data platform: the customer relationship
              spans from data access through analytics tooling to AI-augmented insight generation. The platform serves
              pharma, biotech, payer, employer, financial services, and patient advocacy organisations, with the core
              workflow running from raw patient journey data through purpose-built analytics applications to executive
              dashboards and AI-assisted queries. The product portfolio consists of six analytics applications (Sentinel
              for HCP commercial targeting, Aperture for market access, Prism for HEOR/RWE cohort construction, MapView
              for geographic patient flow visualisation, Pulse for real-time KPI monitoring, and Komodo Home as the
              unified SaaS workspace), all layered over the Healthcare Map data asset and the Marmot generative AI
              orchestration engine. Komodo Home provides two access modes: Komodo Navigator — a natural-language chat
              interface enabling ad hoc patient population queries — and the Development Kit, which exposes the
              Healthcare Map via Snowflake zero-copy sharing, Databricks compute, and native Python APIs. The Mavens and
              Breakaway Partners acquisitions added professional services and strategic advisory capabilities, creating
              a full-stack managed analytics offering. The December 2025 AWS Marketplace listing with a "Reviewed by
              AWS" badge enables cloud-native procurement for enterprise pharma buyers. As of May 2026, dedicated
              product sub-pages for Sentinel, Aperture, Prism, and Pulse return 404 errors, suggesting an ongoing
              website restructuring and creating a diligence gap around granular feature documentation.
