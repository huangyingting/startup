      - number: '7.4'
        title: Cybersecurity and Macro Risk
        blocks:
          - type: paragraph
            body: >-
              Healthcare is the most-targeted sector for ransomware and data breaches. The February 2024 Change
              Healthcare cyberattack—attributed to ALPHV/BlackCat—disrupted payment processing for thousands of U.S.
              hospitals and providers, caused UnitedHealth Group to report direct costs of $872M+ in the first half of
              2024, generated an estimated $1–2B in downstream disruption across the health system, and exposed personal
              health information for an estimated 190 million patients—the largest healthcare data breach in U.S.
              history. The Change Healthcare incident reset expectations for cybersecurity diligence on every healthcare
              data custodian.


              Komodo holds de-identified longitudinal data for 330M+ patient journeys. While de-identified data is
              nominally HIPAA-exempt, a ransomware event or data exfiltration incident would: (1) trigger mandatory HHS
              OCR investigation to determine if re-identification is possible; (2) generate catastrophic reputational
              damage among pharma and healthcare buyers; (3) potentially expose upstream pipeline data from
              covered-entity partners if the breach touches raw input feeds. Komodo holds HITRUST CSF certification,
              which certifies a control framework but does not prevent breaches—Change Healthcare also had SOC 2
              compliance at the time of its incident. The company does not disclose its incident response testing
              cadence, penetration testing program, or backup/recovery RTO/RPO metrics publicly.


              Macro risk from the Inflation Reduction Act is structural. CMS has selected the first 10 drugs for
              Medicare price negotiation (effective 2026), with subsequent cohorts adding more products annually. Drugs
              under price negotiation see manufacturer revenue reduced by an estimated 25–60%. For Komodo's pharma
              customers, IRA price pressure directly reduces the ROI on commercial-launch planning, real-world evidence,
              and phase IV analytics programs—the workflows Komodo primarily powers. Biotech funding contraction in
              2022–2024 reduced addressable wallet in the CRO and emerging-biopharma segment. Both macro forces are
              structural headwinds operating on a multi-year horizon.
            claimRefs: []
