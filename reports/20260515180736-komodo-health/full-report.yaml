      - number: '1.2'
        title: Founders, Leadership and Governance
        blocks:
          - type: paragraph
            body: |
              Komodo Health was co-founded in 2014 by Dr. Arif Nathoo, MD (CEO) and Web Sun (President).
              Nathoo trained as a physician at Harvard Medical School and previously led pharmaceutical
              strategy engagements at McKinsey & Company; Sun is a Stanford-trained operator who led growth
              and operations at McKinsey before co-founding Komodo. Both founders remain in their executive
              roles as of May 2026 and have been jointly described in press coverage as the operating spine
              of the company. Founder-market fit is strong on both clinical (Nathoo) and commercial (Sun)
              axes, but key-person concentration is high.

              The senior team listed on the company's about page in May 2026 includes Miles Ennis (Chief
              Operating Officer and Chief Revenue Officer), Amit Sangani (Chief Technology Officer, hired to
              scale Marmot), Paul Gurney (Chief Product Officer), Mark Jewett (Chief Marketing Officer),
              Sarah Shin (Chief People Officer), Paul Thomas (Chief Financial Officer), Mike Weiss (General
              Counsel and Head of Compliance), Brad Kelley (General Manager, Data Strategy) and Adam Tong
              (Chief Business Officer, leading Mavens).

              Board composition is not fully public. Reported board members and observers historically
              include Lee Fixel (Tiger Global lead Series D investor), David George (Andreessen Horowitz),
              Will Griffith (ICONIQ Capital), Eli Casdin (Casdin Capital), Andy Schwab (Section 32) and
              co-founders Nathoo and Sun. The company has not disclosed the composition of audit or
              compensation committees, nor any independent directors.
