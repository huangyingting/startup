      - number: '8.5'
        title: Exit Paths, Liquidity, and Final Diligence Asks
        blocks:
          - type: paragraph
            body: >-
              Komodo Health has three primary exit paths, each with distinct valuation implications:


              IPO: Requires demonstrating public-market-quality metrics — audited financials, disclosed ARR with growth
              trajectory, gross margin >70%, and NDR >100%. At current SaaS market multiples, a Komodo IPO at or above
              $3.3B would require ARR of $330M+ at Veeva-comparable multiples (8×) or $275M+ at Tempus-comparable
              multiples (12×). No public evidence supports that Komodo has reached these thresholds. A Bloomberg article
              headline about a 2025 tender offer — while inaccessible — suggests secondary market activity but not IPO
              preparation.


              Strategic M&A: IQVIA, Roche/Flatiron (via expansion), J&J, Veeva, and Salesforce Health Cloud are natural
              acquirers. Strategic valuations typically reflect 3–6× trailing revenue for data assets; at $200M revenue,
              this implies $0.6–1.2B. Roche paid ~6× for Flatiron (2018); IQVIA's portfolio expansion suggests appetite
              for data moat acquisitions.


              Secondary or continuation vehicle: The reported 2025 tender offer suggests Komodo may have provided
              liquidity to early shareholders without a primary event. Continuation funds and GP-led secondaries are
