chapters:
  - number: 1
    title: Company Overview
    sections:
      - number: '1.1'
        title: Identity, Product and Business Model
        blocks:
          - type: paragraph
            body: |
              Komodo Health, Inc. was incorporated in Delaware in 2014 and is operationally headquartered in
              San Francisco, California, with major engineering and commercial offices in New York City and
              a global Mavens unit acquired in 2021. The company describes itself as a healthcare-AI and
              software company whose foundation is the Healthcare Map, an integrated longitudinal dataset of
              more than 330 million de-identified U.S. patient journeys assembled from over 60 medical and
              pharmacy claims, electronic health record (EHR), specialty pharmacy, lab and consumer data
              sources, refreshed daily and totaling more than one trillion linked patient records.

              The platform is monetized through enterprise SaaS subscriptions and data licensing to life
              sciences companies (its largest segment), health plans, providers, financial-services investors
              and government qualified-entity buyers. Komodo's go-to-market is organized into the Healthcare
              Map (data foundation), the Marmot intelligence layer (a healthcare-specific AI engine layered
              over the Map), and Komodo Home (the interaction surface that lets analysts run workflows in
              natural language). Pre-existing point applications include Sentinel (HCP targeting), Aperture
              (commercial planning), Prism (real-world evidence cohorting), MapView and Pulse (insight
              delivery). The Mavens business unit additionally sells Salesforce-based commercial and
              medical-affairs software to global life sciences customers.

              Pricing is per enterprise contract; Komodo does not publish list prices. Public marketing
              claims approximately 600+ life sciences customers across the platform and Mavens combined,
              though Komodo has not published an audited customer count and the figure is not independently
              verifiable.
