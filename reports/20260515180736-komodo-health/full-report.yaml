              - CE028
      - number: '5.4'
        title: Integrations, Partnerships, and Developer Ecosystem
        blocks:
          - type: paragraph
            body: >-
              Komodo's integration strategy centres on meeting healthcare analytics buyers where their data
              infrastructure already lives. The Snowflake zero-copy data sharing integration enables customers to query
              Healthcare Map data directly from within their Snowflake environment without replicating data, reducing
              both cost and data governance overhead; this is validated by the Snowflake customer case study. The
              Databricks integration through the Development Kit allows data science teams to run custom PySpark or
              Python pipelines on Healthcare Map data using their existing lakehouse infrastructure, supporting
              customers with mature internal data science capabilities. The Python SDK in the Development Kit extends
              programmatic access for engineering teams building automated analytics or reporting pipelines. The AWS
              Marketplace listing (December 2025, "Reviewed by AWS") creates a cloud-native procurement path aligned
              with enterprise cloud commit programmes, reducing procurement friction for pharma IT buyers. The
              Salesforce CRM integration connects Sentinel commercial analytics directly to pharma field force
              workflows, enabling rep-level HCP targeting and call planning within the CRM system of record. The GeneDx
              rare disease data partnership and other data partnerships extend the breadth of the Healthcare Map beyond
              traditional claims. While the breadth of integration endpoints is competitive, formal API documentation
              and a published developer portal are not publicly accessible as of May 2026, representing a gap versus
              cloud-native competitors who publish comprehensive SDK documentation.
            claimRefs: []
      - number: '5.5'
        title: Trust, Security, Compliance, and Data-Quality Limitations
        blocks:
          - type: paragraph
            body: >-
              Komodo Health operates under a layered compliance framework appropriate for a commercial health data
              platform: HIPAA Business Associate Agreements with all customers establish contractual accountability for
              protected health information; SOC 2 Type II certification provides continuous third-party audit validation
              of security, availability, and confidentiality controls; and HITRUST CSF certification — the
              healthcare-specific security framework — demonstrates alignment with healthcare industry security
              expectations beyond base HIPAA. The Marmot AI layer extends these controls by enforcing per-customer data
              isolation, role-based access, and full query audit trails. The public GitHub signal — a fork of
              panther-labs/panther-analysis for SIEM security detection rules — indicates use of the Panther security
              monitoring platform for cloud infrastructure alerting, consistent with modern cloud-native security
              operations. HIPAA enforcement statistics from HHS OCR show 500+ major breaches annually across the
              industry; as a BAA counterparty to numerous pharma and payer customers, a breach event would expose Komodo
              to material regulatory, reputational, and contractual liability. Key remaining diligence questions
              include: the specific scope and audit period of the most recent SOC 2 report; whether Komodo has
              experienced any reportable breach events; and how Marmot's data isolation architecture is technically
              implemented (row-level security, separate model instances, or virtualised tenant environments). The FDA's
              growing regulatory framework for AI/ML-enabled healthcare tools creates a forward-looking compliance risk
              for Marmot as its use expands into regulatory submission workflows.
