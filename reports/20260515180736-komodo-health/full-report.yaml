      - number: '8.3'
        title: Private Comparables and M&A Precedents
        blocks:
          - type: paragraph
            body: >-
              In the private market, three comparables provide additional calibration:


              ConcertAI (2022): raised a growth round valuing the oncology RWE platform at approximately $1.9B on
              estimated ~$160M ARR, implying a ~12× ARR multiple. This is the most recent sizable private-market
              comparable and suggests healthcare AI/data platforms commanded 10–14× ARR at 2022 valuations.


              H1.co (2022 Series C): valued at ~$1.6B as a physician data platform; revenue undisclosed. Serves as a
              size reference for HCP data assets, but limited public financial disclosure constrains direct multiple
              comparisons.


              Flatiron Health / Roche (2018): Roche acquired Flatiron for approximately $1.9B, implying roughly 6×
              estimated trailing revenue at time of acquisition. Flatiron's oncology EHR data focus is a subset of
              Komodo's addressable market. The acquisition multiple (6×) and acquirer profile (Roche) are relevant M&A
              precedent for a strategic exit scenario.


              A strategic acquirer (IQVIA, Roche, J&J, Salesforce Health Cloud) might value Komodo at 3–6× trailing
              revenue for its data moat and pharma channel access. On a $200M revenue assumption, this implies a
              strategic acquisition range of $0.6–1.2B — substantially below the $3.3B 2022 Series D price, reflecting
              the acquirer's ability to buy at distress or normalized multiples rather than private-round premiums.
            claimRefs: []
      - number: '8.4'
        title: Scenario Valuation Framework and Fair Value Range
        blocks:
          - type: paragraph
            body: >-
              Three scenarios define the Komodo valuation range for a current investor:


              Bull case (15% probability): Komodo discloses ARR of $200M+ with strong NDR (>110%), Marmot AI contributes
              meaningful incremental revenue, and the company achieves a Tempus-style AI health data narrative ahead of
              an IPO or strategic acquisition. At 15× NTM ARR on $200M, implied enterprise value is $3.0–4.5B. Requires:
              positive Marmot monetization confirmation, demonstrated NDR stability, and continued pharma budget
              resilience.


              Base case (55% probability): ARR is in the $130–170M range with stable but not exceptional NDR (90–100%),
              Marmot is a feature rather than a standalone revenue driver, and the company seeks a late-stage primary
              round or M&A exit at 8–10× NTM ARR. Implied enterprise value: $1.0–1.7B. This is a 49–70% markdown from
              the $3.3B Series D price.


              Bear case (30% probability): ARR is below $100M or declining, NDR follows the DH trajectory below 85%, and
              the company faces down-round or distressed-sale dynamics. At 4–6× NTM ARR on $90M, implied EV is
              $0.4–0.5B. This scenario is consistent with the DH public-market comparable if Komodo's pharma customers
              follow similar budget pressure and churn patterns.


              The implied fair value range across scenarios (probability-weighted) is approximately $1.1–1.5B — a 55–67%
              markdown from the last known private valuation of $3.3B. Entry discipline, preference stack awareness, and
              Marmot AI confirmation are the key value levers.
