      - number: '4.3'
        title: Cash Position, Burn Rate, and Runway
        blocks:
          - type: paragraph
            body: >-
              Komodo Health does not disclose cash balances, monthly burn rate, or balance sheet information as a
              private company. All burn estimates must be derived from observable proxies. With an estimated headcount
              of approximately 800 employees (LinkedIn estimates; corroborated by Greenhouse careers portal showing 41
              open positions in engineering, data science, infrastructure, and commercial roles as of May 2026) at an
              average fully-loaded cost of $200–250K per employee, annual headcount-driven expenditure is estimated at
              $160–200M. Adding estimated non-headcount operating costs (data acquisition, cloud infrastructure, office,
              and marketing) of $40–80M yields a total annual operating cost estimate of $200–280M. If Komodo Health has
              achieved revenue of $150–300M ARR with 60–75% gross margin, its gross profit would be $90–225M, suggesting
              cash-flow positions ranging from significantly negative to modestly positive. The 4.3-year elapsed time
              since the January 2022 Series D without a publicly announced follow-on financing event is unusual for a
              high-growth company burning capital. The most plausible explanations are: (1) revenue has grown
              sufficiently to approach or achieve cash-flow breakeven; (2) secondary share sales have provided investor
              liquidity and company capital without a publicised primary round; or (3) private credit or growth debt has
              been arranged. No debt instrument disclosures have been identified in any public source. Active hiring at
              scale (41 open roles) is inconsistent with a company in financial distress, suggesting cash adequacy at
              minimum.
