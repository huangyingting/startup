      - number: '1.5'
        title: Milestones, Acquisitions and Adverse Events
        blocks:
          - type: paragraph
            body: |
              Komodo's milestone trajectory shows a steady progression from data-foundation startup (2014–
              2018), to enterprise SaaS scale-up (2019–2021), to category-defining healthcare-AI platform
              (2023–2026). Two acquisitions reshaped the product surface: in November 2021 Komodo acquired
              Mavens, a Salesforce-based life-sciences software and consulting firm with global delivery
              footprint, broadening Komodo from data licensing into commercial workflow software. In 2024,
              Komodo acquired Breakaway Partners, a life-sciences commercial analytics consultancy, to
              strengthen its Sentinel HCP-targeting and Aperture planning offerings.

              In November 2022, Endpoints News and other outlets reported that Komodo conducted a
              reduction-in-force affecting approximately 9 percent of its workforce, attributing the move to
              a more conservative growth posture amid late-stage market dislocation. No material legal,
              regulatory enforcement, sanctions, breach disclosure or product recall has been publicly
              reported against Komodo as of May 15, 2026. The U.S. healthcare-data sector is, however,
              subject to ongoing privacy-litigation pressure (HIPAA, state biometric and consumer-privacy
              laws) and to FTC interest in health data brokers; Komodo has not been named in major adverse
              filings to date but the gap should not be read as zero risk.
