      - number: '7.2'
        title: Competitive and Market Structural Risk
        blocks:
          - type: paragraph
            body: >-
              Komodo operates in a market where IQVIA—a $47B+ revenue, 85,000-person global leader in healthcare data
              and analytics—is already its most common head-to-head competitor. IQVIA has vastly superior enterprise
              relationships across pharma, biotech, payer and provider segments globally, a broader proprietary dataset,
              and capital for R&D that dwarfs Komodo's private balance sheet. Veeva Systems (market cap ~$38B as of
              mid-2026) has been expanding aggressively into real-world evidence and data with Veeva Compass, a native
              CRM-integrated dataset that reduces switching costs for the 80%+ of top-50 pharma companies already on
              Veeva's commercial platform. Flatiron Health (Roche subsidiary, $1.9B acquisition price) dominates
              oncology EHR-linked RWE. Tempus AI (NASDAQ: TEM, IPO June 2024) pursues genomics and AI-powered clinical
              data analytics with a growing claims-data linkage strategy.


              The clearest public-market evidence for Komodo's valuation risk is Definitive Healthcare (Nasdaq: DH).
              Definitive went public in September 2021 at approximately $25/share, peaking above $2.8B market cap. By
              May 2026, DH trades near $3–4/share, a 90%+ collapse, on revenues of approximately $250M— roughly a 2x
              revenue multiple. Komodo's $3.3B January 2022 Series D at an estimated $100–120M ARR implied a 27–33x
              multiple. Current public-market comps (DH 2x, IQVIA 4x EV/revenue, Veeva 11x) provide no support for a
              ~30x entry. A Series E or IPO at fair-market multiples would be a severe down-round.


              Customer vertical concentration amplifies competitive risk. An estimated 80–85% of Komodo revenue comes
              from life sciences (pharma, biotech, CROs). Pharma R&D budgets face structural pressure from the Inflation
              Reduction Act's Medicare drug price negotiation provisions. Biotech funding tightened materially in
              2022–2024. Both forces compress Komodo's addressable wallet in its dominant vertical. Expansion into payer
              and provider segments is claimed but revenue contribution is not publicly confirmed.
