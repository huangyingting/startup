  - id: FV004
    title: Investment KPIs
    type: kpi
    claimRefs:
      - CV001
      - CV002
      - CV012
      - CV018
      - CV036
    description: Investment committee scorecard rating Komodo Health across 7 dimensions for a 2026 entry decision.
    data:
      items:
        - label: Market opportunity
          value: 7
          detail: Large pharma RWE and health AI TAM ($5B+); structural demand from pharma commercial and clinical operations
        - label: Product / proof
          value: 6
          detail: >-
            330M patient journeys; pharma commercial penetration confirmed; Marmot AI demand accelerating (Apr 2026); no
            revenue proof for AI layer
        - label: Competitive moat
          value: 7
          detail: >-
            Longitudinal patient dataset scale is durable; pharma workflow embedment creates switching costs; not easily
            replicated
        - label: Unit economics
          value: 3
          detail: >-
            No public ARR, NDR, or gross margin; DH NDR parallel suggests category risk; financial opacity is a critical
            blocking gap
        - label: Risk profile
          value: 2
          detail: >-
            Category compression confirmed (DH -97%); EMCLOUD -75% since 2022; AI monetization unproven; regulatory data
            restriction risk; preference stack unknown
        - label: Valuation discipline
          value: 4
          detail: $3.3B 2022 post-money indefensible at 2026 multiples; fair value $1.1–1.5B implied; 55–67% markdown required
        - label: Evidence quality
          value: 4
          detail: >-
            42 claims across 33 sources; blocking financial diligence gaps remain; all scenarios unanchored without
            audited financials
