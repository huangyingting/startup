      - number: '4.2'
        title: Revenue Model, Business Model, and Unit Economics
        blocks:
          - type: paragraph
            body: >-
              Komodo Health's revenue model combines multi-year enterprise SaaS subscription contracts with
              data-licensing agreements, all underpinned by the Healthcare Map — a proprietary database covering 330M+
              de-identified patient journeys and 1T+ linked claims records refreshed from 60+ sources daily. Primary
              customers are pharmaceutical, biotech, and medical device companies seeking real-world evidence (RWE),
              commercial insights, and patient pathway analytics; secondary customer segments include payers, providers,
              and financial services. Contract ACVs are reported to range from approximately $500K to $5M+, with
              multi-year commitments. The Marmot AI analytics platform represents a newer, higher-ACV product layer
              targeting auditability and reproducibility in healthcare AI workflows. The Mavens and Breakaway Partners
              acquisitions added professional services revenue streams (Salesforce CRM implementation and field force
              analytics consulting) that carry lower gross margins (est. 20–40%) relative to the core data platform
              (est. 70–80%). The blended gross margin is estimated at 60–75% but has not been publicly confirmed.
              Revenue is not publicly disclosed; based on contemporaneous reporting at the time of the January 2022
              Series D implying a "triple-digit-million-dollar" ARR trajectory, and assuming 25–40% compound growth
              rates, FY2025 ARR could be $150–300M. This range is highly uncertain. The real-world evidence solutions
              market is estimated to grow from $2.44B in 2025 to $6.04B by 2031 at a 16.33% CAGR (Mordor Intelligence),
              providing structural tailwinds for Komodo Health's core market. However, a directly comparable public
              company, Definitive Healthcare Corp., reported FY2025 revenue of $241.5M, declining 4% year-over-year,
              with NDR falling from 96% (FY2023) to 82% (FY2025), providing an adverse sector-level comp.
