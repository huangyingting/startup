      - number: '5.2'
        title: 'Healthcare Map: Core Data Asset and Architecture'
        blocks:
          - type: paragraph
            body: >-
              The Healthcare Map is the foundational proprietary asset underpinning all Komodo analytics. It links 1T+
              individual healthcare records into 330M+ longitudinal patient journeys through a probabilistic entity
              resolution engine that reconciles patient identity across open claims, closed claims, EHR, laboratory,
              specialty pharmacy, and ancillary care data from 60+ source partners. Daily refresh cadence distinguishes
              the asset from competitors that rely on weekly or monthly batch updates, enabling near-real-time
              commercial and clinical monitoring. The de-identification pipeline applies both HIPAA Safe Harbor (removal
              of 18 PHI identifiers) and Expert Determination (statistical validation that re-identification risk is
              very small), producing limited datasets compliant with HHS OCR guidance. Patient journey linkage is
              performed at the entity level using probabilistic matching across source identifiers, creating a unified
              timeline of care events from diagnosis through treatment, pharmacy fill, and outcome — without requiring a
              common patient identifier across sources. The GeneDx rare disease genomics partnership augments the
              Healthcare Map with linked genomic-clinical data, expanding coverage for rare disease epidemiology. Over
              600 peer-reviewed publications have used Healthcare Map data, providing independent analytical validation.
              Key limitations include inherent claims data gaps for uninsured and Medicaid-only populations, coding
              variability across claims payers, and lag in receipt and processing of closed claims from payer partners,
              which can affect recency in specific data elements.
