      - number: '8.2'
        title: Public Comparable Companies and Market Multiples
        blocks:
          - type: paragraph
            body: >-
              Four public companies provide direct or adjacent comparables for Komodo Health as of May 2026:


              IQVIA (NYSE: IQV) — the global leader in health data and CRO services — reported $16.3B in FY2025 revenue
              and carries a $28.7B market cap, implying a ~1.76× trailing revenue multiple. IQVIA's low multiple
              reflects its services-heavy mix and lower SaaS margins; it is a floor reference rather than a target
              multiple for Komodo.


              Veeva Systems (NYSE: VEEV) — the dominant SaaS platform for life sciences CRM and data cloud — reported
              $3.195B in FY2026 revenue with a $26B market cap, implying an ~8.1× revenue multiple. Veeva is the most
              structurally similar public comparable: high-margin SaaS with pharma commercial customers. Komodo should
              target Veeva-range multiples if it can demonstrate comparable NRR and gross margin.


              Tempus AI (NASDAQ: TEM) — the AI-driven health data platform that IPO'd in June 2024 — carries a ~$7.9B
              market cap as of May 2026. At estimated ~$700M trailing revenue, this implies an ~11–12× multiple. Tempus
              is the closest structural analog: an AI + longitudinal patient data platform targeting pharma and
              oncology. Komodo's Marmot AI layer would need to demonstrate comparable AI revenue contribution to command
              a Tempus-style multiple.


              Definitive Healthcare (NASDAQ: DH) — a healthcare commercial intelligence platform — represents the most
              adverse comparable. DH's market cap collapsed from ~$3.9B at IPO (September 2021) to ~$87.9M by May 2026.
              DH FY2025 revenues declined 4% YoY, enterprise NDR eroded from 96% to 85%, and goodwill impairments
              totaled nearly $1B over three years. While DH's product focus (provider targeting) differs from Komodo's
              (pharma RWE + AI), the category-level risk signal is material. The BVP EMCLOUD index confirms structural
              multiple compression: from ~30× NTM ARR at the 2021 peak to ~7–8× by mid-2026.
