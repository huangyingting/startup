        title: Named Customer Evidence and Case Studies
        blocks:
          - type: paragraph
            body: >-
              The highest-quality customer proof in Komodo Health's public record is a direct testimonial on its
              Healthcare Map page from an analytics lead at a top-20 global pharmaceutical company, who states that
              deploying the Healthcare Map increased prescriber list coverage by more than 20 percentage points versus
              prior solutions. This is a quantified outcome statement — rare for enterprise data vendors — and provides
              tangible evidence of commercial value delivered. All other case studies and customer references are
              anonymized, using archetypes such as 'Top 20 Pharma,' 'Top 5 CRO,' and 'Leading Biotech;' no
              pharmaceutical company has publicly confirmed a named contractual relationship in press releases, earnings
              calls, or investor materials.

              Beyond direct testimonials, several proxy signals support the customer base claim. The January 2026 GeneDx
              partnership for rare disease patient identification shows expansion into diagnostics and genomics
              verticals. CVS Health Ventures' strategic Series C investment in March 2021 indicates payer-sector demand.
              The a16z 2019 investment thesis explicitly cited Healthcare Map data quality and life sciences customer
              scale as investment rationale. Snowflake's published case study and Healthcare Data Cloud partner
              designation provide independent third-party validation from a major cloud infrastructure company. The
              Mavens CRM acquisition (2021) and Breakaway managed services acquisition (2024) deepen the customer
              operating surface. No publicly reported customer losses or contract cancellations have been found through
              May 2026.
