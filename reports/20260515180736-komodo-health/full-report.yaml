      - number: '6.3'
        title: Customer Retention, Health, and Expansion Signals
        blocks:
          - type: paragraph
            body: >-
              Komodo Health does not publicly disclose net revenue retention (NRR) or gross revenue retention (GRR).
              Retention is structurally inferred: multi-year subscription contracts, deep pipeline integration, and the
              presence of a product upsell path from Sentinel to Aperture to Prism to Marmot are all consistent with
              above-100% NRR. Once a pharma analytics team builds prescriber targeting models and RWE cohorts on Komodo
              patient identifiers, replacing the underlying dataset requires rebuilding all downstream analytical assets
              — a switching cost that is material for enterprise commercial analytics teams. The top-20 pharma customer
              who achieved >20% prescriber list coverage improvement would face a high bar for any competing platform to
              match before a migration could be justified.

              The Marmot AI assistant (2024–2025) represents a new retention and expansion surface: an AI-native
              interface over the Healthcare Intelligence Graph provides daily engagement beyond periodic data refreshes,
              increasing platform stickiness and creating a path for AI-tier pricing. The Breakaway Partners managed
              services acquisition embeds Komodo teams inside customer analytics organizations, further increasing
              operational integration. G2 and TrustRadius review profiles are inaccessible (403 and 404 respectively),
              preventing independent satisfaction benchmarking — a diligence gap that requires enterprise-level platform
              access or direct customer references to address. No publicly reported churn events have been found through
              May 2026, but the absence of reported losses is not equivalent to confirmed high retention in the absence
              of NRR data.
