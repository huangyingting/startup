      - number: '1.3'
        title: Funding History and Capital Formation
        blocks:
          - type: paragraph
            body: |
              Komodo Health has raised approximately $314 million across five disclosed primary equity rounds
              between 2015 and January 2022. The earliest round was a 2015 Seed of approximately $5 million
              led by SV Angel and Felicis Ventures. Series A of approximately $9 million followed in 2017.
              Series B was a $50 million round in 2019 led by Andreessen Horowitz with Felicis, Section 32
              and SVB Capital participating. Series C added $50 million in March 2021 led by Andreessen
              Horowitz, with ICONIQ Capital, Casdin Capital and Northpond Ventures joining as new investors.

              The largest round to date was the $220 million Series D announced January 12, 2022, led by
              Tiger Global Management at a reported post-money valuation of $3.3 billion. Tiger Global
              partner Lee Fixel, who joined Komodo's board, described Komodo as "transforming healthcare's
              data infrastructure." Existing investors Andreessen Horowitz, ICONIQ Capital, Casdin Capital,
              Northpond Ventures and Section 32 participated; new investors included Dragoneer Investment
              Group and Tellurian Ventures. The round was widely reported in the technology and healthcare
              trade press in January 2022.

              No subsequent primary equity round has been publicly announced between Series D and the
              report date (May 15, 2026). Komodo has not disclosed any debt facility, secondary tender or
              down-round; however, the broader 2022–2024 venture environment, Tiger Global's mark-down cycle,
              and the absence of new round news leave the current implied valuation an open question.
