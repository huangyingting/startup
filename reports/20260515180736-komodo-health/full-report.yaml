  - number: 7
    title: Risks
    sections:
      - number: '7.1'
        title: Regulatory and Data-Privacy Risk
        blocks:
          - type: paragraph
            body: >-
              Komodo Health's entire product franchise rests on the de-identification and commercial distribution of
              patient-level healthcare claims data, placing it at the intersection of the most rapidly evolving areas of
              U.S. privacy law.


              HIPAA de-identification: HHS guidance recognizes two accepted methods—Expert Determination (statistical)
              and Safe Harbor (field suppression). Komodo relies on Expert Determination. Academic and regulatory
              literature has documented that combining "de-identified" claims data with auxiliary datasets (genomics,
              consumer location, pharmacy records) can re-identify specific individuals at non-trivial rates. HHS Office
              of Civil Rights has settled enforcement actions exceeding $30M in aggregate in recent annual cycles, with
              individual penalties reaching $16M (Premera Blue Cross, 2019). Any ruling that Komodo's methodology is
              inadequate would expose it—and potentially its covered-entity customers—to enforcement liability.


              FTC oversight trajectory: The FTC settled with data broker Kochava in 2024 under Section 5 for unfair
              trade practices involving sale of sensitive location and health data. Separately, the FTC finalized an
              expanded Health Breach Notification Rule (HBNR) in June 2024, extending coverage to health apps and
              digital health tools. The FTC's stated intent to scrutinize health data aggregators and brokers creates a
              non-trivial extension risk to companies like Komodo that collect, link, and resell patient-journey data.
              An FTC consent order or investigation would be a material business disruption, not merely a compliance
              cost.


              State patchwork: Washington's My Health My Data Act (MHMD, effective March 2024) establishes consumer
              rights over health data that extend beyond HIPAA's protections and apply to entities that are not HIPAA
              covered entities, which could encompass Komodo's data licensing operations. California CMIA expansions,
              Connecticut, and Colorado privacy laws create a multi-state compliance burden requiring per-jurisdiction
              legal counsel. Litigation by state attorneys general is a growing risk vector.


              FDA SaMD and AI bias: Komodo's Marmot AI platform is positioned for clinical decision support contexts.
              FDA's AI/ML-Enabled Medical Device Action Plan (updated 2023) and SaMD guidance create a regulatory
              pathway under which AI tools influencing clinical decisions may require 510(k) clearance or de novo
              authorization. HHS Section 1557 (2024 final rule) mandates algorithmic bias testing for AI used in
              clinical decision support by entities receiving federal financial assistance, adding compliance
              obligations for health plan and provider customers that deploy Marmot.
            claimRefs: []
