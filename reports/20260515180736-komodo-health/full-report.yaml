      - number: '6.4'
        title: Partnerships, Ecosystem, and Distribution Channels
        blocks:
          - type: paragraph
            body: >-
              The Snowflake partnership is Komodo Health's most significant documented channel expansion. Announced in
              2021 and deepened into a Healthcare Data Cloud designation, the partnership lists Komodo Health data on
              the Snowflake Marketplace, enabling Snowflake's 9,000+ enterprise customers to access the Healthcare Map
              through native data sharing without a separate procurement contract. This lowers acquisition friction for
              cloud-native pharma analytics buyers who already operate on Snowflake. Joint customers can combine their
              own CRM or clinical data with Komodo's patient claims in a shared cloud workspace, increasing the
              analytical value of each dataset and the stickiness of the combined solution.

              Beyond Snowflake, the investor network provides distribution leverage: CVS Health Ventures (payer
              network), a16z (pharma and health system relationships), and Dragoneer and Tiger Global (enterprise
              technology relationships) all provide warm introductions into enterprise sales cycles. Komodo's partners
              page documents additional technology integrations with CRM, analytics, and data cloud platforms,
              suggesting a multi-channel distribution strategy. Bessemer Venture Partners' Cloud Index inclusion signals
              external recognition of Komodo as a cloud-native enterprise SaaS company meeting BVP's benchmarking
              criteria. The combination of platform partnerships (Snowflake), strategic investors (CVS, a16z), and a
              managed services capability (post-Breakaway) constitutes a multi-layer go-to-market infrastructure for
              enterprise life sciences accounts.
            claimRefs: []
      - number: '6.5'
        title: Market Context, Competitive Positioning, and Concentration Risk
        blocks:
          - type: paragraph
            body: >-
              The global RWE solutions market is estimated at $4.74B in 2024, growing to $10.8B by 2030 at a 14.8% CAGR
              — a tailwind that supports Komodo Health's growth narrative but also signals the market attractiveness
              that is drawing well-capitalized competitors. IQVIA (NYSE: IQV) is the dominant incumbent with $15B+ in
              revenue and a global patient data footprint; Flatiron Health (Roche subsidiary) owns oncology RWE;
              Symphony Health (ICON subsidiary) competes in Rx claims; Definitive Healthcare (NASDAQ: DH, ~$228M FY2024
              revenue) serves hospital and provider intelligence; TriNetX, H1, and Veeva Data Cloud compete in adjacent
              claim and HCP data segments. Definitive Healthcare provides a direct public-market revenue benchmark at
              similar scale and subscription model.

              Concentration risk is the primary commercial concern. Pharma vertical concentration of ~85–90% creates
              exposure to pharmaceutical R&D budget cycles, biotech funding conditions, and the emerging risk of major
              pharma building internal data infrastructure. US-only geographic scope limits global wallet share per
              account and cedes ex-US pharma analytics requirements to IQVIA. Review platform inaccessibility (G2
              broken, TrustRadius 404) leaves no independent satisfaction benchmarking. Despite these risks, three
              independent market research firms converge on the TAM estimate, the Snowflake partnership provides
              distribution scale, and the structured switching costs embedded in deep pipeline integration provide a
              defensible revenue base if the customer count claimed in 2022 is directionally accurate.
