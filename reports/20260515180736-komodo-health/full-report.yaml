      - number: '1.4'
        title: Scale, Customers and Product Footprint
        blocks:
          - type: paragraph
            body: |
              As of May 2026, Komodo Health markets the Healthcare Map as the largest commercially licensed
              U.S. patient-level dataset, with more than one trillion linked records spanning 330 million+
              de-identified patient journeys assembled from 60+ open and closed data sources refreshed daily.
              Komodo's marketing materials describe more than 600 life sciences customers across the
              Healthcare Map and the Mavens business unit, and the company has built named partnerships with
              Snowflake (cloud data exchange), GeneDx (rare-disease longitudinal datasets, January 2026),
              ZERO Prostate Cancer (screening initiative, March 2026), and a long-running collaboration with
              Pfizer on real-world evidence research published from 2022 onward.

              Headcount is not officially disclosed. Public LinkedIn employee counts have ranged between
              approximately 700 and 950 in 2024–2026; the company peaked above 1,000 employees prior to a
              2022–2023 reduction-in-force that affected an estimated 9 percent of staff according to
              Endpoints News reporting. Estimated annual revenue, ARR, gross margin, customer count and
              net-revenue retention are not publicly disclosed.

              Industry recognitions include placement on the CNBC Disruptor 50 (2022), Forbes AI 50 (multi-
              year), and the Healthcare Technology Report's Top 50 Healthcare Technology Companies of 2025.
