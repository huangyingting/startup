      - number: '2.2'
        title: Competitive Landscape and Market Positioning
        blocks:
          - type: paragraph
            body: >-
              The RWE and healthcare data analytics market features a mix of large diversified players and specialized
              vendors. IQVIA, the market leader, generated $15 billion in annual revenue across its data, analytics, and
              clinical trial services, with RWE representing a significant growth segment. Optum, part of UnitedHealth
              Group, leverages claims data from 90+ million covered lives and reported $200 billion in 2023 revenue
              across its broader health services portfolio. Flatiron Health, acquired by Roche for $1.9 billion in 2018,
              focuses on oncology-specific RWE with data from 280+ cancer clinics.


              Komodo Health differentiates through its Healthcare Map, which links patient journeys across 330+ million
              individuals using 60+ data sources and over 1 trillion clinical records. Unlike competitors relying
              primarily on claims or EHR data, Komodo emphasizes comprehensive patient journey mapping across healthcare
              settings. The company serves 600+ life sciences customers, with solutions spanning commercial analytics,
              clinical trial optimization, and regulatory support.


              Emerging competitors include TriNetX, which operates a global health research network with data from 250+
              million patients across 30+ countries, and Aetion, which provides FDA-validated RWE analytics software.
              Veradigm (formerly Allscripts) combines EHR data with analytics capabilities, while Veracyte and Tempus
              focus on genomic and multi-omic data integration for precision medicine applications.


              Market consolidation continues, with large pharmaceutical and technology companies acquiring specialized
              RWE vendors. Notable transactions include Roche-Flatiron ($1.9B, 2018), IQVIA-DMD Marketing (2019), and
              Oracle-Cerner ($28.3B, 2022), which expanded Oracle's healthcare data capabilities.
