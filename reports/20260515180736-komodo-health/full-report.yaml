          label: Data moat
          detail: 330M patient journeys; longitudinal claims/lab/pharmacy; pharma-embedded
          type: input
        - id: n2
          label: AI optionality
          detail: Marmot platform demand accelerating (Apr 2026); CFO hired; upside unconfirmed
          type: input
        - id: n3
          label: Financial opacity
          detail: No ARR/NDR/revenue since 2022; all valuations scenario-dependent
          type: input
        - id: n4
          label: Comparable risk
          detail: DH -97%; EMCLOUD 7–8× vs 30× peak; category compression confirmed
          type: input
        - id: n5
          label: Thesis strength
          detail: Strong moat + AI optionality; weak financial evidence; high category risk
          type: intermediate
        - id: n6
          label: Valuation assessment
          detail: Fair value $1.1–1.5B weighted; $3.3B indefensible on current evidence
          type: intermediate
        - id: n7
          label: CONDITIONAL PROCEED
          detail: Monitor; price-sensitive entry; resolve 6 diligence asks before commit
          type: output
