      - number: '4.4'
        title: Acquisitions and Capital Deployment
        blocks:
          - type: paragraph
            body: >-
              Komodo Health has completed two publicly announced acquisitions. In May 2021, the company acquired Mavens,
              described as the leading Salesforce consulting partner for life sciences — a firm providing CRM,
              commercial operations, and data integration services to biopharma companies. The Mavens acquisition price
              was not disclosed; based on Mavens' estimated 200+ employee headcount and revenue profile at the time, the
              consideration is estimated at $50–80M. The acquisition extended Komodo Health's go-to-market into pharma
              commercial operations teams and added recurring professional services revenue, though at lower margins
              than the core data platform. In January 2024, Komodo Health acquired Breakaway Partners, a commercial
              analytics and field force effectiveness consultancy, for an undisclosed consideration. Breakaway Partners
              provided analytics-as-a-service for pharmaceutical and medical device commercial teams, complementing
              Komodo's self-serve data platform with managed services. The combined effect of these acquisitions has
              been to broaden Komodo Health's product and service offering while potentially diluting blended gross
              margins through the inclusion of human-capital-intensive professional services. Capital deployed on
              acquisitions across both transactions is estimated at $80–150M cumulative — representing a material
              consumption of the Series C and Series D equity proceeds. Neither acquisition has publicly reported
              revenue contribution or integration outcomes.
