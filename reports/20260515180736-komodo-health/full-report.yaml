      - number: '3.4'
        title: Moat durability and competitive risks
        blocks:
          - type: paragraph
            body: >-
              Komodo's competitive moats can be evaluated across four dimensions: data breadth and freshness,
              multi-modal integration, application-layer switching costs, and AI differentiation.

              On data breadth and freshness, the Healthcare Map's 330M+ U.S. patient journeys from 60+ sources with
              daily refresh is the core moat claim. This is company-claimed and not independently benchmarked, but is
              supported by customer adoption and 600+ disclosed life-sciences customer relationships. The moat is
              partially durable because matching the source breadth and daily refresh infrastructure requires
              significant investment, but IQVIA could close the freshness gap through its Symphony Health operations
              with sufficient investment, and Veeva Compass is expanding patient-data coverage.

              On multi-modal integration, Komodo's fusion of claims + EHR + labs + specialty pharmacy + consumer data
              creates a more complete patient-journey picture than claims-only or EHR-only competitors. This is the most
              defensible moat because sourcing and normalizing 60+ heterogeneous data streams requires years of
              engineering and data operations work that new entrants cannot easily replicate. However, IQVIA's 1.2B
              global patient record advantage suggests IQVIA's data scale already surpasses Komodo's on some dimensions.

              On application-layer switching costs, the Sentinel + Aperture + Prism + Mavens suite embeds Komodo in
              life-sciences commercial and medical affairs workflows. Once analysts and commercial operations teams
              build workflows on Komodo's app suite, switching to IQVIA or Veeva requires retraining, workflow
              migration, and procurement risk — creating meaningful retention dynamics. This is the most validated moat
              dimension because it aligns with observed behavior (multi-year enterprise contracts, expanding customer
              relationships).

              On AI differentiation, Marmot AI is a stated moat but the least validated. IQVIA has Octa with AI-enhanced
              analytics; Veeva is acquiring AI capabilities (Ostro); Tempus has the deepest AI-oncology capability.
              Without independent benchmarking, the Marmot AI moat claim cannot be verified.

              The top competitive risks for Komodo over 2026–2028 are: (1) Veeva cross-sell displacement among its 1,552
              pharma CRM customers, which requires no new account wins; (2) IQVIA closing the freshness gap through
              Symphony Health investment; (3) Tempus expanding beyond oncology into full-population AI analytics, which
              would close Komodo's breadth advantage; and (4) the DH-like valuation compression scenario if growth
              decelerates and healthcare data multiples continue to compress in the public market.
