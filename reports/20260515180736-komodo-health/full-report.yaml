        - label: High Impact
          values:
            - FTC HBNR extension to Komodo; Founder departure
            - MHMD / state-law compliance failure; Integration failure (Mavens / Breakaway); Key-person loss (Sangani)
            - Down-round or failed Series E; Top pharma customer churn (IQVIA switch); Biotech funding contraction
        - label: Medium Impact
          values:
            - FTC Kochava-style consent order; HHS Section 1557 AI bias finding
            - Data-quality dispute with pharma customer; Snowflake pricing / marketplace disruption
            - IRA pharma consolidation reducing customer count
