      - number: '7.3'
        title: Operational, Key-Person, and Integration Risk
        blocks:
          - type: paragraph
            body: >-
              Komodo was co-founded by Dr. Arif Nathoo (CEO) and Web Sun (President), both of whom remain in executive
              roles as of May 2026. The founders represent concentrated key-person risk: Nathoo anchors clinical
              credibility, medical-affairs relationships, and primary investor trust; Sun anchors commercial strategy,
              GTM execution, and operational discipline. Departure of either would be a destabilizing event for
              enterprise contract renewals and investor confidence. Some 2023–2024 coverage suggested Web Sun stepped
              back from day-to-day President responsibilities (unconfirmed); any change in Sun's active scope is a
              yellow-flag event warranting diligence follow-up.


              Komodo has executed two acquisitions that carry material integration risk. The Mavens acquisition (May
              2021) added 200+ Salesforce-specialist employees across multiple geographies, a distinct product culture,
              and international delivery operations. The Breakaway Partners acquisition (January 2024) added a
              commercial-analytics consultancy, introducing services revenue that could dilute SaaS gross-margin metrics
              and create tension between a product-led and services-led culture. Neither integration has been publicly
              assessed for retention outcomes, NPS deterioration, or financial-synergy realization.


              Data quality limitations are a latent reputational risk. Komodo's Healthcare Map underrepresents rural and
              Medicaid populations (claims bias toward commercially insured), has a 30–90 day lag from encounter to
              adjudicated claim, and carries EHR sample skew from specific health system integrations. These limitations
              could generate adverse product outcomes—misidentified patient cohorts, overstated disease incidence,
              biased real-world evidence conclusions—that erode pharma customer trust. A high-profile RWE failure or
              customer data-quality dispute would be a reputational and ARR risk event. Vendor/platform dependency on
              AWS cloud and Snowflake Data Cloud adds infrastructure concentration risk; service outages by either
              provider would disrupt data pipeline delivery SLAs.
