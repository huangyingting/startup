      or revenue concentration for the top-20 pharma accounts; the >50% concentration estimate for
      top-20 pharma is inferred, not confirmed.
    whyItMatters: Customer concentration cannot be risk-modeled without knowing ARR distribution; loss
      of 1–2 anchor accounts could be thesis-breaking.
