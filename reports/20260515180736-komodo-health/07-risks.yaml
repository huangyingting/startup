- id: TR005
  title: Mitigation and Kill Criteria Table
  columns:
  - Risk
  - Monitorable Trigger
  - Threshold / Event
  - Action Implication
  rows:
  - - HHS OCR enforcement or FTC consent order
    - Federal Register; HHS OCR settlement database; FTC press releases
    - Any formal HHS OCR investigation of Komodo or FTC consent order
    - 'Diligence blocker: halt until outside privacy-law counsel completes compliance audit'
  - - Down-round at Series E or IPO
    - PitchBook; press releases; SEC S-1 or D-1 filing
    - Any Series E disclosed below $2B valuation or IPO prospectus implying sub-$2B post-money
    - 'Thesis break: re-underwrite revenue model and comp multiples; reassess investor alignment'
  - - Founder departure (Nathoo or Sun)
    - LinkedIn; press releases; Komodo leadership page
    - Either founder departure from executive role or transition to advisory
    - 'Yellow flag: assess bench depth; request leadership transition plan and succession diligence'
  - - Major cybersecurity breach
    - HHS OCR breach portal (breaches of 500+ individuals); press coverage
    - Any HHS OCR-reportable breach involving Komodo or upstream covered-entity partners
    - 'Diligence flag: assess remediation timeline, customer notification, regulatory response, and ongoing litigation risk'
  - - Top pharma customer non-renewal citing data quality or IQVIA switch
    - Customer press releases; Komodo ARR disclosures; DH / Veeva customer overlap lists
    - Any public disclosure of top-5 pharma account non-renewal or announced IQVIA/Veeva migration
    - 'Yellow flag: request ARR cohort data, NRR by customer tier, and win/loss analysis vs IQVIA and Veeva'
  - - IRA price negotiation on top-5 pharma customer drugs
    - CMS drug price negotiation announcements
    - 2+ of Komodo's top-5 pharma customers have major drugs selected for price negotiation
    - 'Yellow flag: model revenue impact; request IRA scenario analysis from management; assess portfolio diversification'
  - - Failed Series E or IPO deferral beyond 2027
    - No press release or S-1 filing by end of 2027
    - Series E fails to close or IPO withdrawn in 2027 market window
    - 'Thesis break: assess bridge-financing terms, liquidity preference overhang, and secondary-market pricing'
