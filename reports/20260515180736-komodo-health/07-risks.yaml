  claims:
  - id: CR001
    type: third-party-reported
    topic: HIPAA-de-identification-scrutiny
    statement: HHS guidance recognizes Expert Determination and Safe Harbor as the two accepted de-identification
      methods under HIPAA; academic and regulatory literature documents that de-identified claims data
      can be re-identified using auxiliary datasets, exposing companies relying on Expert Determination
      to potential enforcement if the methodology is found inadequate.
    sourceRefs:
    - SR004
    - SR020
    confidence: high
    freshness: current
    answersQuestionRefs:
    - QR001
    - QR002
  - id: CR002
    type: third-party-reported
    topic: HHS-OCR-enforcement-magnitude
    statement: HHS Office for Civil Rights has reached settlement agreements totaling over $30M in recent
      annual enforcement cycles; individual HIPAA enforcement penalties have reached $16M (Premera Blue
      Cross, 2019), establishing a material financial-risk benchmark for healthcare data companies.
    sourceRefs:
    - SR003
    - SR019
    - SR034
    confidence: high
    freshness: current
    answersQuestionRefs:
    - QR002
    - QR003
  - id: CR003
    type: third-party-reported
    topic: FTC-Kochava-health-data-broker-precedent
    statement: The FTC settled with data broker Kochava in January 2024 under Section 5 of the FTC
      Act for unfair trade practices involving the sale of sensitive location and health data, establishing
      a direct precedent that health data aggregators and resellers face FTC enforcement risk under
      existing authority.
    sourceRefs:
    - SR001
    - SR022
    confidence: high
    freshness: current
    answersQuestionRefs:
    - QR003
    - QR004
  - id: CR004
    type: third-party-reported
    topic: FTC-HBNR-2024-expansion
    statement: The FTC finalized an expanded Health Breach Notification Rule in June 2024, extending
      notification requirements to health apps and digital health tools beyond covered entities; the
      FTC's regulatory trajectory indicates intent to scrutinize health data aggregators and resellers.
    sourceRefs:
    - SR002
    - SR024
    confidence: high
    freshness: current
    answersQuestionRefs:
    - QR003
    - QR004
  - id: CR005
    type: third-party-reported
    topic: Washington-MHMD-health-data-coverage
    statement: Washington's My Health My Data Act (effective March 2024) establishes consumer rights
      over health data that extend beyond HIPAA, applies to entities that are not HIPAA covered entities
      (including data brokers and analytics companies), and includes a private right of action—creating
      direct litigation risk for companies like Komodo that collect and license health data about Washington
      residents.
    sourceRefs:
    - SR005
    - SR033
    confidence: medium
    freshness: current
    answersQuestionRefs:
    - QR005
    - QR006
  - id: CR006
    type: third-party-reported
    topic: Change-Healthcare-ransomware-sector-precedent
    statement: The February 2024 Change Healthcare ransomware attack, attributed to ALPHV/BlackCat,
      caused UnitedHealth Group to report $872M+ in direct costs in H1 2024, disrupted payment processing
      for thousands of U.S. hospitals, and exposed PHI for an estimated 190 million patients—establishing
      this breach as the largest healthcare data incident in U.S. history and raising the bar for cybersecurity
      diligence on all healthcare data custodians.
    sourceRefs:
    - SR009
    - SR010
    - SR021
    confidence: high
    freshness: current
    answersQuestionRefs:
    - QR007
    - QR008
  - id: CR007
    type: third-party-reported
    topic: HITRUST-certification-does-not-prevent-breach
    statement: HITRUST CSF certification attests to a security control framework but does not prevent
      breaches; Change Healthcare held SOC 2 compliance at the time of its 2024 ransomware incident,
      demonstrating that certification-level attestation is insufficient evidence of breach prevention.
    sourceRefs:
    - SR009
    - SR032
    confidence: medium
    freshness: current
    answersQuestionRefs:
    - QR008
    - QR009
  - id: CR008
    type: third-party-reported
    topic: de-identified-data-reidentification-risk
    statement: A breach of Komodo's de-identified data pipelines would trigger mandatory HHS OCR investigation
      to determine re-identification feasibility, generate major reputational damage with pharma customers,
      and potentially expose raw covered-entity input data if the breach touches upstream ingestion pipelines.
