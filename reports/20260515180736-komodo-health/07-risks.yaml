      HHS OCR correspondence for Komodo's de-identification program is available; the adequacy of Komodo's
      specific approach is unconfirmed.
    whyItMatters: If HHS OCR determines the methodology is inadequate in an enforcement context, Komodo
      and its covered-entity customers face material penalties and potential data-product recall.
    diligencePath: Request written Expert Determination opinion from qualified statistician, validation
      methodology documentation, and any HHS OCR correspondence or inquiry letters in diligence.
