  - SI011
  - SI008
- id: SI-financial-gaps-adverse-signals
  title: Financial Diligence Gaps and Adverse Signals
  body: 'Komodo Health presents extensive financial opacity consistent with its status as a late-stage private company.
    The five critical diligence blockers are: (1) actual ARR or total revenue for FY2022–FY2025, which is the most
    fundamental underwriting input and is entirely absent from public sources; (2) gross margin by product line
    (data platform versus professional services), which determines whether the business model has operating leverage;
    (3) cash balance and monthly burn rate, which are needed to assess financial stability and runway; (4) acquisition
    prices, integration outcomes, and revenue contributions from Mavens and Breakaway Partners; and (5) the company''s
    current liquidity roadmap including IPO timeline, secondary transactions, or debt arrangements. The most significant
    adverse signal comes from a public market comparable: Definitive Healthcare Corp. (NASDAQ: DH) reported FY2025
    total revenue of $241.5M declining 4.4% from FY2024''s $252.2M, with net dollar retention dropping from 96%
    (FY2023) to 82% (FY2025) — the most dramatic NDR deterioration among publicly traded healthcare data SaaS companies.
    This peer data is directly relevant to Komodo Health''s renewal economics and suggests material sector headwinds.
    The compression of public market multiples for healthcare data SaaS (Definitive Healthcare trading at approximately
    0.7–1.0× revenue in 2025–2026) also implies that Komodo Health''s private mark of $3.3B represents a significant
    premium to current market-clearing valuations for comparable businesses. Mitigating factors include: no public
    reports of layoffs, financial distress signals, or leadership changes linked to financial pressure; active hiring
    across multiple technical and commercial roles; and continued product development activity (Marmot AI platform
    launch) consistent with a healthy operating company.'
  tableRefs:
  - TI005
  figureRefs: []
  sourceRefs:
