  evidenceGaps:
  - type: private-evidence-only
    severity: critical
    topic: revenue-and-ARR
    missingEvidence: Komodo Health has not publicly disclosed revenue, ARR, net dollar retention, or any income
      statement metrics; all revenue estimates are inferred from press coverage characterising a "triple-digit-million-dollar
      trajectory" at the time of the January 2022 Series D.
    whyItMatters: Revenue is the most fundamental investment underwriting input; without it, no reliable valuation
      model, growth-rate assessment, or profitability trajectory can be built from public sources alone.
    diligencePath: Request audited income statements for FY2021–FY2025; monthly ARR schedule by customer cohort;
      and management definition of ARR vs. total revenue (subscription vs. data licensing split).
    relatedQuestionRefs:
    - QI001
    - QI002
    - QI026
  - type: private-evidence-only
    severity: critical
    topic: cash-balance-and-burn
    missingEvidence: No cash balance, monthly cash burn, or balance sheet data has been publicly disclosed; all
      burn estimates are derived from headcount estimates and industry benchmarks.
    whyItMatters: A 4-year gap since the last disclosed equity round (January 2022 Series D) without a publicly
      announced Series E is unusual for a high-burn private company and raises questions about capital adequacy.
    diligencePath: Request management accounts showing monthly cash burn and current liquidity; review any debt
      instrument disclosures; confirm whether secondary share sales have occurred.
    relatedQuestionRefs:
    - QI011
    - QI012
    - QI013
  - type: private-evidence-only
    severity: material
    topic: gross-margin-and-cost-structure
    missingEvidence: Komodo Health has not disclosed gross margin, cost of revenue, or operating cost breakdown;
      healthcare data platforms typically show 70–80% gross margins but this is unverified for Komodo.
    whyItMatters: Gross margin determines whether the business model has inherent leverage; a lower-than-expected
      margin (e.g. due to high data acquisition costs or Mavens professional services mix) would materially reduce
      the quality of the revenue base.
    diligencePath: Request gross margin by product line (Healthcare Map data licensing vs. Marmot SaaS vs. Mavens
      professional services); verify data acquisition and refresh costs.
    relatedQuestionRefs:
    - QI006
    - QI007
    - QI027
  - type: missing-source
    severity: material
    topic: IPO-or-secondary-liquidity-path
    missingEvidence: Komodo Health was widely reported as a 2022–2023 IPO candidate but never filed an S-1; no
      subsequent liquidity announcement, secondary transaction, or SPAC filing has been publicly confirmed.
    whyItMatters: For investors or employees holding equity, understanding the liquidity path and timeline is
      material; the absence of a public exit timeline creates significant uncertainty about when and at what valuation
      returns will be realised.
    diligencePath: Confirm management's current liquidity roadmap; explore whether secondary tender offers have
      occurred for employee shares; determine if any IPO bankers have been re-engaged.
    relatedQuestionRefs:
    - QI021
    - QI022
    - QI023
  - type: missing-source
    severity: moderate
    topic: acquisition-financials
    missingEvidence: Neither the Mavens (May 2021) nor the Breakaway Partners (January 2024) acquisition prices
      were publicly disclosed; integration outcomes and revenue contribution are unknown.
    whyItMatters: If both acquisitions were significant capital consumers (combined est. $80–150M), this materially
      impacts the effective runway from the Series C/D rounds.
    diligencePath: Request purchase prices, earn-out structures, and revenue contribution for both acquisitions;
      review integration status and any goodwill impairment indicators.
    relatedQuestionRefs:
    - QI015
    - QI016
    - QI017
