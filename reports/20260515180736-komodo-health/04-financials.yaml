- id: TI005
  title: Financial Diligence Gaps — Priority Summary
  columns:
  - Missing Private Metric
  - Severity
  - Investment Decision Impact
  - Diligence Path
  rows:
  - - Total revenue / ARR (FY2022–FY2025)
    - Critical
    - Cannot validate growth, revenue quality, or proximity to breakeven
    - Request audited income statements and monthly ARR schedule by cohort
  - - Gross margin by product line
    - Material
    - Determines whether SaaS model has operating leverage or is margin-diluted by services
    - Request segment P&L (data platform vs. professional services vs. AI)
  - - Cash balance and monthly burn rate
    - Material
    - Cannot confirm runway or assess debt financing need without balance sheet
    - Request management accounts; confirm cash position as of Q1 2026
  - - Mavens and Breakaway acquisition prices
    - Material
    - Without prices, true capital consumption from acquisitions cannot be assessed
    - Request purchase price, earn-out terms, and post-acquisition revenue contribution
  - - Net Dollar Retention rate (by cohort)
    - Moderate
    - NDR decline at comparable public peer (DH 96%→82%) is adverse signal; Komodo NDR unknown
    - Request annual NDR by cohort and enterprise vs. mid-market split
  notes: >-
    The five items listed represent the highest-priority financial diligence asks for any material investment in
    or acquisition of Komodo Health. Resolution of these gaps would enable construction of a credible DCF or
    revenue-multiple valuation model.
  enumerationScope:
    coverage: sample
    basis: >-
      Gaps identified by systematic review of all publicly available information and confirmed by absence of any
      relevant disclosures in accessible public sources as of May 2026.
