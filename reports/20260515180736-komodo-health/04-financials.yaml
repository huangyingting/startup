chapter:
  number: 4
  title: Financials
  summary: Komodo Health has raised approximately $314M across five rounds, most recently a $220M Series D in January
    2022 at a $3.3B post-money valuation led by Tiger Global Management. As a private company, Komodo discloses no
    audited financials; revenue is estimated at $100–200M ARR based on contemporaneous reporting implying a
    triple-digit trajectory. The business model is enterprise SaaS subscriptions plus multi-year data-licensing
    contracts with ACVs reportedly $500K–$5M+, targeting life sciences and payer customers. With approximately 800
    employees and no Series E disclosed as of mid-2026—four years after the last equity round—the burn and runway
    picture is materially uncertain; possible explanations include revenue self-sufficiency, secondary sales, or
    private credit. Acquisitions of Mavens (May 2021) and Breakaway Partners (January 2024) consumed a portion of
    capital. A directly comparable public company, Definitive Healthcare Corp., reported FY2025 revenue of $241.5M
    declining 4% year-over-year with net dollar retention falling from 96% (FY2023) to 82% (FY2025), providing an
    adverse sector context. Critical diligence blockers include actual ARR, gross margin, cash balance, and burn rate,
    none of which is publicly available.
