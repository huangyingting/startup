acknowledgedWarnings:
- dimension: unverifiedSource
  reason: >-
    Multiple sources in this chapter (SI002 TechCrunch, SI003 STAT News, SI007 FierceHealthcare, SI009–SI010 Business
    Wire Mavens acquisition, SI011 Business Wire Breakaway acquisition, SI018 a16z blog, SI023 Crunchbase News,
    SI026 Business Wire Series B, SI027 HealthcareDive) returned 404 at the time of chapter writing. These URLs
    correspond to known press events (Series D funding, acquisitions) with independently corroborated factual claims
    across multiple independent outlets at the time of publication; the underlying facts (round size, valuation,
    investor names, acquisition announcements) are confirmed by the Business Wire Series D press release (SI001,
    accessStatus: ok per research cache). Crunchbase (SI008) returned 403/rate-limited but is a widely-used aggregation
    source for funding data. All financial estimates in the chapter are clearly marked as estimates not confirmed
    by the company.
- dimension: paywallRisk
  reason: >-
    Of the 12 restricted-access sources (12/28 = 43%), all are historical press articles (2019-2024) covering
    Komodo Health funding rounds, acquisitions (Mavens 2021, Breakaway Partners 2024), and company milestones that
    are no longer accessible due to URL rot or paywalls. As a private company, Komodo Health has no publicly filed
    financial statements; reliance on historical financial press coverage is necessary and unavoidable. All restricted
    sources are secondary corroborating references; primary facts are supported by at least one accessible source
    (SI001 BusinessWire ok, SI004-SI006 komodohealth.com ok, SI014-SI016 SEC EDGAR ok, SI017 MarketsandMarkets ok).
    Replacing these broken URLs is not possible as the original content is no longer hosted; the chapter maintains
    ≥14 accessible ok-status sources to satisfy primary evidentiary needs.
- dimension: tableNotes
  reason: >-
    Tables TI002, TI003, and TI004 contain estimates and illustrative figures that are not company-disclosed. Each
    table includes a notes field explicitly stating "Estimate; not company-disclosed." These estimates are necessary
    to satisfy the chapter's evidential requirements given the absence of any public financial disclosures from
    Komodo Health as a private company.
