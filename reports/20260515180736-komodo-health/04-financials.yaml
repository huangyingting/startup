sections:
- id: SI-funding-capital-structure
  title: Funding History and Capital Structure
  body: 'Komodo Health has raised approximately $314M in disclosed equity across five venture rounds spanning 2014
    to January 2022. The funding trajectory begins with a seed round in 2014, followed by a $14M Series A in August
    2018 led by Felicis Ventures, a $50M Series B in November 2019 led by Andreessen Horowitz, a combined $94M Series
    C in 2021 (initial tranche plus extension) with CVS Health Ventures as a strategic investor, and a $220M Series
    D on January 12, 2022, led by Tiger Global Management at a $3.3B post-money valuation. Additional participants
    in the Series D include Andreessen Horowitz, ICONIQ Growth, Casdin Capital, SVB Capital, and Northpond Ventures.
    The capital structure is that of a late-stage private company with no public SEC filings and no disclosed debt
    instruments; exact dilution percentages are not publicly available. The Series D remains the last disclosed equity
    financing event; as of May 2026, approximately 4.3 years have elapsed without a public Series E announcement,
    an IPO, or a disclosed strategic acquisition. The January 2022 Series D valuation of $3.3B was consistent with
    the peak SaaS multiple environment of 2021–2022 (estimated 22–33× forward ARR). The public market multiple
    environment for healthcare data SaaS has compressed dramatically since then, as evidenced by Definitive Healthcare
    Corp. trading below 1× revenue in 2025–2026.'
  tableRefs:
  - TI001
  - TI002
  figureRefs:
  - FI001
  sourceRefs:
  - SI001
  - SI002
  - SI003
  - SI007
  - SI008
