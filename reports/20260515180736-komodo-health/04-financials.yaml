- id: SI-revenue-model-unit-economics
  title: Revenue Model, Business Model, and Unit Economics
  body: 'Komodo Health''s revenue model combines multi-year enterprise SaaS subscription contracts with data-licensing
    agreements, all underpinned by the Healthcare Map — a proprietary database covering 330M+ de-identified patient
    journeys and 1T+ linked claims records refreshed from 60+ sources daily. Primary customers are pharmaceutical,
    biotech, and medical device companies seeking real-world evidence (RWE), commercial insights, and patient pathway
    analytics; secondary customer segments include payers, providers, and financial services. Contract ACVs are
    reported to range from approximately $500K to $5M+, with multi-year commitments. The Marmot AI analytics platform
    represents a newer, higher-ACV product layer targeting auditability and reproducibility in healthcare AI workflows.
    The Mavens and Breakaway Partners acquisitions added professional services revenue streams (Salesforce CRM implementation
    and field force analytics consulting) that carry lower gross margins (est. 20–40%) relative to the core data
    platform (est. 70–80%). The blended gross margin is estimated at 60–75% but has not been publicly confirmed.
    Revenue is not publicly disclosed; based on contemporaneous reporting at the time of the January 2022 Series
    D implying a "triple-digit-million-dollar" ARR trajectory, and assuming 25–40% compound growth rates, FY2025
    ARR could be $150–300M. This range is highly uncertain. The real-world evidence solutions market is estimated
    to grow from $2.44B in 2025 to $6.04B by 2031 at a 16.33% CAGR (Mordor Intelligence), providing structural
    tailwinds for Komodo Health''s core market. However, a directly comparable public company, Definitive Healthcare
    Corp., reported FY2025 revenue of $241.5M, declining 4% year-over-year, with NDR falling from 96% (FY2023)
    to 82% (FY2025), providing an adverse sector-level comp.'
  tableRefs:
  - TI003
  figureRefs:
  - FI002
  sourceRefs:
  - SI004
  - SI005
  - SI006
  - SI008
  - SI014
  - SI016
  - SI017
  - SI024
  - SI025
  - SI028
- id: SI-cash-burn-runway
  title: Cash Position, Burn Rate, and Runway
  body: 'Komodo Health does not disclose cash balances, monthly burn rate, or balance sheet information as a private
    company. All burn estimates must be derived from observable proxies. With an estimated headcount of approximately
    800 employees (LinkedIn estimates; corroborated by Greenhouse careers portal showing 41 open positions in engineering,
    data science, infrastructure, and commercial roles as of May 2026) at an average fully-loaded cost of $200–250K
    per employee, annual headcount-driven expenditure is estimated at $160–200M. Adding estimated non-headcount
    operating costs (data acquisition, cloud infrastructure, office, and marketing) of $40–80M yields a total annual
    operating cost estimate of $200–280M. If Komodo Health has achieved revenue of $150–300M ARR with 60–75% gross
    margin, its gross profit would be $90–225M, suggesting cash-flow positions ranging from significantly negative
    to modestly positive. The 4.3-year elapsed time since the January 2022 Series D without a publicly announced
    follow-on financing event is unusual for a high-growth company burning capital. The most plausible explanations
    are: (1) revenue has grown sufficiently to approach or achieve cash-flow breakeven; (2) secondary share sales
    have provided investor liquidity and company capital without a publicised primary round; or (3) private credit
    or growth debt has been arranged. No debt instrument disclosures have been identified in any public source.
    Active hiring at scale (41 open roles) is inconsistent with a company in financial distress, suggesting cash
    adequacy at minimum.'
  tableRefs:
  - TI004
  figureRefs:
  - FI004
  sourceRefs:
  - SI001
  - SI013
  - SI022
  - SI012
  - SI006
- id: SI-acquisitions-capital-deployment
  title: Acquisitions and Capital Deployment
  body: 'Komodo Health has completed two publicly announced acquisitions. In May 2021, the company acquired Mavens,
    described as the leading Salesforce consulting partner for life sciences — a firm providing CRM, commercial operations,
    and data integration services to biopharma companies. The Mavens acquisition price was not disclosed; based on
    Mavens'' estimated 200+ employee headcount and revenue profile at the time, the consideration is estimated at
    $50–80M. The acquisition extended Komodo Health''s go-to-market into pharma commercial operations teams and
    added recurring professional services revenue, though at lower margins than the core data platform. In January
    2024, Komodo Health acquired Breakaway Partners, a commercial analytics and field force effectiveness consultancy,
    for an undisclosed consideration. Breakaway Partners provided analytics-as-a-service for pharmaceutical and
    medical device commercial teams, complementing Komodo''s self-serve data platform with managed services. The
    combined effect of these acquisitions has been to broaden Komodo Health''s product and service offering while
    potentially diluting blended gross margins through the inclusion of human-capital-intensive professional services.
    Capital deployed on acquisitions across both transactions is estimated at $80–150M cumulative — representing a
    material consumption of the Series C and Series D equity proceeds. Neither acquisition has publicly reported
    revenue contribution or integration outcomes.'
  tableRefs: []
  figureRefs:
