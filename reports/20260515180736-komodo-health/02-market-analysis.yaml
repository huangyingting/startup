chapter:
  number: 2
  title: Market Analysis
  summary: Komodo Health operates in the rapidly expanding real-world evidence (RWE) market, valued at approximately $3-5
    billion in 2025 with projected growth to $7-11 billion by 2030-2035. The company competes against established players
    like IQVIA, Optum, and Flatiron Health while differentiating through its Healthcare Map covering 330M+ patient journeys
    across 60+ data sources. North America dominates with ~40% market share, while Asia-Pacific is the fastest-growing region.
    Pharmaceutical and biotech companies represent 60-70% of demand, using RWE for clinical trial design, post-market surveillance,
    and label expansion support.
sections:
- id: s1
  title: Market Size and Growth Trajectory
  body: 'The real-world evidence (RWE) and healthcare analytics market has experienced substantial growth, driven by pharmaceutical
    companies seeking alternatives to traditional clinical trial data. Multiple analyst firms project the global RWE market
    to grow at double-digit CAGRs through 2030-2035. Precedence Research estimates the market at $3.32 billion in 2025, growing
    to $7.43 billion by 2035 at an 8.39% CAGR. MarketsandMarkets projects more aggressive growth, with the market reaching
    $10.83 billion by 2030 from $4.74 billion in 2024 at a 14.8% CAGR. Mordor Intelligence estimates the market at $2.44 billion
    in 2025, growing to $6.04 billion by 2031 at a 16.33% CAGR.


    North America dominates the market with approximately 40% share, driven by advanced healthcare infrastructure, high R&D
    spending by pharmaceutical companies, and regulatory support for RWE in drug development and approval processes. The FDA''s
    21st Century Cures Act and subsequent guidance documents have legitimized RWE use in regulatory submissions, accelerating
    market adoption. Asia-Pacific represents the fastest-growing region, with increasing healthcare digitization and government
    initiatives supporting health data infrastructure development.


    Key market drivers include rising drug development costs (averaging $2.6 billion per approved drug), increasing regulatory
    acceptance of RWE for label expansions and post-market surveillance, and growing demand for value-based care analytics.
    The COVID-19 pandemic accelerated RWE adoption as traditional clinical trials faced disruptions and real-world data demonstrated
    utility in tracking treatment outcomes and vaccine effectiveness.'
  claimRefs:
  - CM001
  - CM002
  - CM003
  - CM004
  - CM005
  tableRefs:
  - TM001
  figureRefs:
  - FM001
- id: s2
  title: Competitive Landscape and Market Positioning
  body: 'The RWE and healthcare data analytics market features a mix of large diversified players and specialized vendors.
    IQVIA, the market leader, generated $15 billion in annual revenue across its data, analytics, and clinical trial services,
    with RWE representing a significant growth segment. Optum, part of UnitedHealth Group, leverages claims data from 90+
    million covered lives and reported $200 billion in 2023 revenue across its broader health services portfolio. Flatiron
    Health, acquired by Roche for $1.9 billion in 2018, focuses on oncology-specific RWE with data from 280+ cancer clinics.


    Komodo Health differentiates through its Healthcare Map, which links patient journeys across 330+ million individuals
    using 60+ data sources and over 1 trillion clinical records. Unlike competitors relying primarily on claims or EHR data,
    Komodo emphasizes comprehensive patient journey mapping across healthcare settings. The company serves 600+ life sciences
    customers, with solutions spanning commercial analytics, clinical trial optimization, and regulatory support.


    Emerging competitors include TriNetX, which operates a global health research network with data from 250+ million patients
    across 30+ countries, and Aetion, which provides FDA-validated RWE analytics software. Veradigm (formerly Allscripts)
    combines EHR data with analytics capabilities, while Veracyte and Tempus focus on genomic and multi-omic data integration
    for precision medicine applications.


    Market consolidation continues, with large pharmaceutical and technology companies acquiring specialized RWE vendors.
    Notable transactions include Roche-Flatiron ($1.9B, 2018), IQVIA-DMD Marketing (2019), and Oracle-Cerner ($28.3B, 2022),
    which expanded Oracle''s healthcare data capabilities.'
  claimRefs:
  - CM006
  - CM007
