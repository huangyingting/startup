companyProfile:
  summary: >-
    Komodo Health is a healthcare-AI and real-world data company whose Healthcare Map links 330M+ de-identified U.S.
    patient journeys across 60+ data sources. It monetizes via enterprise SaaS subscriptions and data licensing to
    pharma/biotech, payers, providers, and increasingly via the Marmot AI layer and Mavens Salesforce extension. The
    company combines a credible data asset and 600+ customer claim with material valuation, financing, and
    competitive risks driven by a stale 2022 Series D mark, IQVIA/Veeva pressure, and a tightening regulatory regime
    for health-data brokers.
  foundedDate: '2014-01-01'
  founders:
    - name: Dr. Arif Nathoo, MD
      role: Co-founder and CEO
      background: Physician-executive; co-founded Komodo in 2014; primary external face and capital allocator.
      claimRefs: [CO007]
    - name: Web Sun
      role: Co-founder and President
      background: Co-founded Komodo in 2014; commercial and partnerships leadership.
