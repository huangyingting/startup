    language analytics, Komodo Home interaction layer, and the app suite — Sentinel, Aperture, Prism, MapView,
    Pulse — plus Mavens Salesforce-based commercial software for life sciences.
  customerFocus: Pharma and biotech (primary), payers, providers, medtech, financial services, and government.
  businessModel: Enterprise SaaS subscriptions and data licensing with multi-year contracts; expansion via app upsell.
  stage: late-stage private (Series D, January 2022)
  fundingStatus: >-
