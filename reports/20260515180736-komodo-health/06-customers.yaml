  title: Customers & Traction
  summary: 'Komodo Health serves 600+ life sciences organizations as of January 2022, including all top-20 global pharmaceutical
    companies by revenue. Approximately 85–90% of the revenue base is concentrated in pharma and biopharma; payers and providers
    account for the remainder. Customer proof is primarily anonymized — no pharma company has publicly branded a case study —
    but a direct testimonial on Komodo''s website documents a top-20 pharma analytics lead achieving >20% prescriber list coverage
    improvement. Independent validation comes from Snowflake''s partner case study page and marketplace listing, CVS Health
    Ventures'' strategic Series C investment, and GeneDx''s January 2026 integration partnership. Retention is inferred to be
    strong given multi-year subscription contracts and deep integration switching costs, though NRR is not publicly disclosed.
    The primary risks are ~85–90% pharma vertical concentration, US-only geographic scope, and the inability to access G2 and
    TrustRadius review platforms for independent satisfaction benchmarking.'
