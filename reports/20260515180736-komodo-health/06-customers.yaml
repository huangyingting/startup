sections:
- id: SU-segmentation
  title: Customer Base — Size, Segmentation, and Vertical Mix
  body: 'Komodo Health serves 600+ life sciences organizations as of January 2022, including all top-20 global pharmaceutical
    companies by revenue. This customer count was disclosed at the Series D announcement and has not been updated since; the
    current customer base size is unknown to external analysts. Pharma and biopharma account for approximately 85–90% of customer
    revenue, reflecting the company''s origin in pharma commercial analytics and RWE. Customer segments include top-20 global
    pharma (core revenue), mid-size specialty pharma, clinical-stage and commercial biotech, contract research organizations
    serving pharma clients, managed care organizations (payers), and health systems. The US-only geographic scope of the Healthcare
    Intelligence Graph is a structural concentration factor: Komodo''s 330M+ de-identified U.S. patient records cannot address
    ex-US pharma analytics requirements, limiting total wallet share per global pharma account.

    Use cases span the full pharma commercial lifecycle: prescriber targeting and territory design (pre-launch), patient finding
    for clinical trial enrollment, real-world evidence generation for label expansion, pharmacovigilance safety signal detection,
    and competitive commercial intelligence. Enterprise contract values are estimated at $500K–$2M for mid-market and $2M–$5M+
    for top-20 accounts based on industry norm inference, as Komodo does not disclose pricing publicly. The company''s 2016–2022
    growth trajectory — from Series A through Series D over six rounds — coincided with peak life sciences data spending driven
    by COVID-19-era pharma expansion and increased regulatory acceptance of RWE for supplemental drug approval pathways.'
  tableRefs:
  - TU001
  figureRefs:
  - FU001
  sourceRefs:
  - SU001
  - SU002
  - SU004
  - SU026
  - SU028
- id: SU-customer-proof
  title: Named Customer Evidence and Case Studies
  body: 'The highest-quality customer proof in Komodo Health''s public record is a direct testimonial on its Healthcare Map
    page from an analytics lead at a top-20 global pharmaceutical company, who states that deploying the Healthcare Map increased
    prescriber list coverage by more than 20 percentage points versus prior solutions. This is a quantified outcome statement —
    rare for enterprise data vendors — and provides tangible evidence of commercial value delivered. All other case studies
    and customer references are anonymized, using archetypes such as ''Top 20 Pharma,'' ''Top 5 CRO,'' and ''Leading Biotech;''
    no pharmaceutical company has publicly confirmed a named contractual relationship in press releases, earnings calls, or
    investor materials.

    Beyond direct testimonials, several proxy signals support the customer base claim. The January 2026 GeneDx partnership
    for rare disease patient identification shows expansion into diagnostics and genomics verticals. CVS Health Ventures''
    strategic Series C investment in March 2021 indicates payer-sector demand. The a16z 2019 investment thesis explicitly cited
    Healthcare Map data quality and life sciences customer scale as investment rationale. Snowflake''s published case study
    and Healthcare Data Cloud partner designation provide independent third-party validation from a major cloud infrastructure
    company. The Mavens CRM acquisition (2021) and Breakaway managed services acquisition (2024) deepen the customer operating
    surface. No publicly reported customer losses or contract cancellations have been found through May 2026.'
  tableRefs:
  - TU002
  figureRefs:
  - FU003
  sourceRefs:
  - SU001
  - SU003
  - SU004
  - SU015
  - SU017
  - SU027
  - SU028
- id: SU-retention
  title: Customer Retention, Health, and Expansion Signals
  body: 'Komodo Health does not publicly disclose net revenue retention (NRR) or gross revenue retention (GRR). Retention
    is structurally inferred: multi-year subscription contracts, deep pipeline integration, and the presence of a product
    upsell path from Sentinel to Aperture to Prism to Marmot are all consistent with above-100% NRR. Once a pharma analytics
    team builds prescriber targeting models and RWE cohorts on Komodo patient identifiers, replacing the underlying dataset
    requires rebuilding all downstream analytical assets — a switching cost that is material for enterprise commercial analytics
    teams. The top-20 pharma customer who achieved >20% prescriber list coverage improvement would face a high bar for any
    competing platform to match before a migration could be justified.

    The Marmot AI assistant (2024–2025) represents a new retention and expansion surface: an AI-native interface over the
    Healthcare Intelligence Graph provides daily engagement beyond periodic data refreshes, increasing platform stickiness
    and creating a path for AI-tier pricing. The Breakaway Partners managed services acquisition embeds Komodo teams inside
    customer analytics organizations, further increasing operational integration. G2 and TrustRadius review profiles are inaccessible
    (403 and 404 respectively), preventing independent satisfaction benchmarking — a diligence gap that requires enterprise-level
    platform access or direct customer references to address. No publicly reported churn events have been found through May
    2026, but the absence of reported losses is not equivalent to confirmed high retention in the absence of NRR data.'
  tableRefs:
  - TU004
  figureRefs: []
  sourceRefs:
  - SU005
  - SU010
  - SU011
  - SU026
  - SU027
- id: SU-partnerships
  title: Partnerships, Ecosystem, and Distribution Channels
  body: 'The Snowflake partnership is Komodo Health''s most significant documented channel expansion. Announced in 2021 and
    deepened into a Healthcare Data Cloud designation, the partnership lists Komodo Health data on the Snowflake Marketplace,
    enabling Snowflake''s 9,000+ enterprise customers to access the Healthcare Map through native data sharing without a separate
    procurement contract. This lowers acquisition friction for cloud-native pharma analytics buyers who already operate on
    Snowflake. Joint customers can combine their own CRM or clinical data with Komodo''s patient claims in a shared cloud
    workspace, increasing the analytical value of each dataset and the stickiness of the combined solution.

    Beyond Snowflake, the investor network provides distribution leverage: CVS Health Ventures (payer network), a16z (pharma
    and health system relationships), and Dragoneer and Tiger Global (enterprise technology relationships) all provide warm
    introductions into enterprise sales cycles. Komodo''s partners page documents additional technology integrations with
    CRM, analytics, and data cloud platforms, suggesting a multi-channel distribution strategy. Bessemer Venture Partners''
    Cloud Index inclusion signals external recognition of Komodo as a cloud-native enterprise SaaS company meeting BVP''s
    benchmarking criteria. The combination of platform partnerships (Snowflake), strategic investors (CVS, a16z), and a managed
    services capability (post-Breakaway) constitutes a multi-layer go-to-market infrastructure for enterprise life sciences
    accounts.'
  tableRefs: []
  figureRefs: []
  sourceRefs:
  - SU004
  - SU006
  - SU007
  - SU008
  - SU009
  - SU015
  - SU016
  - SU017
- id: SU-market-context
  title: Market Context, Competitive Positioning, and Concentration Risk
  body: 'The global RWE solutions market is estimated at $4.74B in 2024, growing to $10.8B by 2030 at a 14.8% CAGR —
    a tailwind that supports Komodo Health''s growth narrative but also signals the market attractiveness that is drawing
    well-capitalized competitors. IQVIA (NYSE: IQV) is the dominant incumbent with $15B+ in revenue and a global patient
    data footprint; Flatiron Health (Roche subsidiary) owns oncology RWE; Symphony Health (ICON subsidiary) competes in
    Rx claims; Definitive Healthcare (NASDAQ: DH, ~$228M FY2024 revenue) serves hospital and provider intelligence; TriNetX,
    H1, and Veeva Data Cloud compete in adjacent claim and HCP data segments. Definitive Healthcare provides a direct public-market
    revenue benchmark at similar scale and subscription model.

    Concentration risk is the primary commercial concern. Pharma vertical concentration of ~85–90% creates exposure to pharmaceutical
    R&D budget cycles, biotech funding conditions, and the emerging risk of major pharma building internal data infrastructure.
    US-only geographic scope limits global wallet share per account and cedes ex-US pharma analytics requirements to IQVIA.
    Review platform inaccessibility (G2 broken, TrustRadius 404) leaves no independent satisfaction benchmarking. Despite
    these risks, three independent market research firms converge on the TAM estimate, the Snowflake partnership provides
    distribution scale, and the structured switching costs embedded in deep pipeline integration provide a defensible revenue
    base if the customer count claimed in 2022 is directionally accurate.'
