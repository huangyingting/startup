    severity: material
    topic: customer-count-stale
    missingEvidence: The 600+ customer figure and all-top-20-pharma claim were last disclosed in January 2022 at the Series
      D funding announcement; no updated customer count has been published in the four years since, making the current customer
      base size unknown.
    whyItMatters: Four years of customer count silence prevents any assessment of customer growth velocity, churn impact,
      or net customer adds since January 2022.
