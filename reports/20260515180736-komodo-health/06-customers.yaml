acknowledgedWarnings:
- dimension: unverifiedSource
  reason: Several sources in this chapter have access limitations that were encountered during research. SU006 (snowflake.com/en/customers/komodo-health)
    returned a 429 rate-limit on re-fetch but was successfully retrieved in prior research phases and is present in the fetch
    trail. SU010 (G2, 403) and SU011 (TrustRadius, 404) are inaccessible review platforms whose URLs are in the fetch trail
    with failed status; these are cited as evidence of the inaccessibility itself (CU021, CU035) rather than for their content.
    SU015 (newsroom.cvshealth.com) returned a connection failure (status 0) but the URL is present in the fetch trail and
    the CVS Health Ventures Series C investment is corroborated by SU027 (Fierce Healthcare) and SU028 (TechCrunch). All
    other sources were accessible at time of research.
