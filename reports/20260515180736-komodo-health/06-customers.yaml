    severity: critical
    topic: nrr-grr-not-disclosed
    missingEvidence: Komodo Health does not publicly disclose net revenue retention (NRR), gross revenue retention (GRR), or
      cohort churn rates; as a private company these metrics are not reported in any public filing or press release.
    whyItMatters: Without retention metrics, analysts cannot assess whether the 600+ customer base is growing organically through
      upsell and expansion or whether new customer additions are masking underlying churn.
    diligencePath: Request NRR and GRR by cohort year (2019–2024), churn rate by customer tier (top-20 pharma vs mid-market),
      and a waterfall of ARR from new logo vs expansion vs contraction.
