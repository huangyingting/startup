        Flatiron Health is owned by Roche (acquired 2018, reported acquisition price $1.9 billion),
        operates as an independent affiliate of the Roche Group, and partners with hundreds of cancer
        centers, 20+ top global oncology therapeutic developers, and regulators worldwide — positioning
        it as the dominant oncology-focused RWE platform but with narrower scope than Komodo's full
        patient-journey map.
      type: third-party-reported
      topic: Flatiron-profile
      sourceRefs: [SP013, SP015]
      confidence: high
      freshness: current
      answersQuestionRefs: [QP001, QP006]
    - id: CP006
