sections:
  - id: section-1
    title: Competitive landscape and segmentation
    body: >-
      Komodo Health operates in a crowded and intensifying market for healthcare data and
      real-world evidence analytics. The competitive landscape breaks into three segments that
      reflect different buyer needs and competitive dynamics.

      The first and most significant segment is full-stack healthcare data incumbents: IQVIA
      (NYSE: IQV, $16.3B revenue FY2025) and Veeva Systems (NYSE: VEEV, $3.2B revenue FY2026).
      IQVIA's Technology & Analytics division holds 1.2 billion globally de-identified patient
      records, runs Symphony Health (patient-level claims data), and backs this with CRO
      relationships that Komodo cannot match. Veeva is pivoting aggressively from CRM into
      patient-level data through Veeva Compass and Veeva Data Cloud, and its 1,552 pharma
      customers make cross-sell displacement a structural threat to Komodo. No other competitor
      in this segment has the combination of scale, pharma relationship depth, and capital to
      execute across the full CRO-to-commercial analytics stack.

      The second segment is oncology-focused RWE specialists: Flatiron Health (Roche subsidiary,
      hundreds of cancer centers integrated), Tempus AI (NASDAQ: TEM, IPO June 2024, $480M+
      revenue estimate, 65% of U.S. academic medical centers), ConcertAI ($150M+ raised, 2022),
      and Syapse. These players have deeper oncology clinical workflow integrations — particularly
      Tempus's 350+ petabyte dataset with clinical genomics — but narrower scope than Komodo's
      full-population Healthcare Map. They are more relevant in R&D analytics than commercial
      analytics.

      The third segment is commercial healthcare intelligence: Definitive Healthcare (NASDAQ: DH,
      ~$250M revenue, IPO at $5B valuation in 2021 compressed to ~$500M market cap by 2024) and
      H1 (HCP intelligence, $123M Series C 2021). These players compete directly with Komodo's
      Sentinel and Aperture commercial applications. Definitive Healthcare's severe valuation
      compression is an adverse comparables signal for pure-play healthcare data multiples.

      Beyond these three segments, internal build by large pharma (Pfizer, Roche, Novartis data
      science teams) and cloud-platform entrants (Snowflake Healthcare Data Cloud, Amazon
      HealthLake, Microsoft Cloud for Healthcare) represent substitute and platform risks. The
      RWE solutions market overall is projected to grow from $2.5B (2024) to over $8B by 2032
      (~15% CAGR), attracting continued capital to all segments.
    claimRefs: [CP001, CP003, CP005, CP006, CP007, CP008, CP009, CP010, CP011, CP012, CP014, CP018]
    tableRefs: [TP001]
    figureRefs: [FP001]
  - id: section-2
    title: Incumbent and direct peer profiles
    body: >-
      IQVIA is the most formidable competitive threat. Its $16.3B revenue (FY2025), 93,000
      employees, and 1.2 billion globally de-identified patient records give it scale Komodo
      cannot match organically. The Technology & Analytics division (40% of revenue) provides
      the Octa commercial analytics platform, and the Symphony Health subsidiary offers
      patient-level claims data directly competitive with Komodo's Healthcare Map. IQVIA's R&D
      division (55% of revenue) is a CRO that runs clinical trials for the same pharma companies
      Komodo sells to, creating relationship depth and cross-sell leverage that Komodo's pure-data
      model lacks. IQVIA's weakness from Komodo's perspective: data freshness and multi-modal
      integration. IQVIA's historical data updates are periodic rather than daily, and its
      technology stack reflects legacy IMS Health and Quintiles architectures rather than modern
      cloud-native data pipelines.

      Veeva Systems ($3.2B FY2026 revenue, 1,552 life-sciences customers) is the most dangerous
      emerging threat. Veeva dominates life sciences CRM and is systematically expanding into
      data. The acquisition of Crossix (patient data, 2019) and the launch of Veeva Compass
      patient-level data established the data strategy; the end of the Salesforce partnership
      in 2025 removed the key constraint on full-stack competition; and the acquisition of Ostro
      (AI agents for life sciences, $100M, March 2026) adds AI workflow capabilities that
      overlap with Komodo's Marmot platform. Veeva's cross-sell path to its 1,552 existing
      pharma CRM customers — without requiring new account wins — makes it structurally
      threatening in a way IQVIA's organic data expansion is not.

      Flatiron Health (Roche subsidiary, acquired 2018 for $1.9B) is the incumbent in oncology
      RWE with hundreds of cancer center integrations and partnerships with 20+ top oncology
      therapeutic developers. Flatiron's Roche ownership creates an inherent conflict of interest
      that limits its utility as a neutral data partner for Roche competitors, preserving a market
      gap for Komodo in oncology real-world evidence for non-Roche pharma.

      Tempus AI (NASDAQ: TEM, IPO June 2024) occupies the AI-oncology data apex with 350+
      petabytes of data (including clinical genomics and multi-omics sequencing), connections to
      65% of U.S. academic medical centers, and 95% of top-20 pharma oncology companies as
      partners. Tempus's genomics advantage is a structural moat Komodo cannot replicate through
      claims data alone, but Tempus's scope is narrower (oncology-focused) than Komodo's
      full-population map.

      Definitive Healthcare and H1 represent commercial intelligence competitors whose declining
      valuations (DH: -88% from IPO peak) and narrower data scope (provider-side intelligence
      vs. patient-journey analytics) make them less existential threats than IQVIA and Veeva,
      but they compete directly for Komodo's Sentinel and Aperture customer wallet.
    claimRefs: [CP002, CP004, CP005, CP007, CP013, CP015, CP019, CP020, CP022, CP023, CP024, CP026]
    tableRefs: [TP002]
    figureRefs: [FP002]
  - id: section-3
    title: Capability, pricing, and distribution comparison
    body: >-
      On the key capability dimensions that matter to life-sciences buyers, Komodo's Healthcare
      Map has genuine advantages and documented gaps. The multi-modal data fusion (claims + EHR +
      specialty pharmacy + labs + consumer data) and daily refresh cadence differentiate Komodo
      from IQVIA's periodic update cycles and from oncology-only competitors (Flatiron, Tempus).
      The 330M+ U.S. patient coverage represents near-comprehensive U.S. population visibility
      that smaller players cannot match. Against Veeva, Komodo's advantage is data depth and
      AI-native architecture; Veeva's advantage is the CRM distribution channel and existing
      pharma customer relationships.

      Pricing benchmarks are highly opaque across the competitive set. Indicative estimates
      suggest Komodo enterprise contracts range from $500K to $3M annually, IQVIA Technology
      & Analytics engagements from $1M to $10M+ for large pharma relationships, and Definitive
      Healthcare historical contracts from $50K to $500K for mid-market accounts. IQVIA's pricing
      premium reflects full-service CRO integration; Definitive Healthcare's lower pricing
      reflects its narrower provider-intelligence scope. Komodo's positioning as a premium
      data platform priced below IQVIA but above DH is rational given its use case breadth, but
      pricing transparency is insufficient for independent validation.

      Distribution is an important competitive dynamic. Komodo distributes through the Snowflake
      Healthcare Data Cloud marketplace — giving it cloud-native discoverability — and through
      direct enterprise sales and a Salesforce-based Mavens workflow product. IQVIA distributes
      through deep account teams embedded in pharma R&D organizations. Veeva distributes through
      its established CRM account organization. The Snowflake channel is a net positive for
      Komodo's reach but also creates a dependency: Komodo's marketplace position could be
      threatened if Snowflake builds proprietary healthcare data or displaces Komodo as the
      canonical patient-journey data provider.

      Definitive Healthcare's market cap compression from ~$5B (IPO 2021) to ~$500M (2024) is
      the most salient public-market comparable for Komodo Health's $3.3B 2022 valuation.
      While DH is a narrower product than Komodo, the same demand compression, macro multiple
      contraction, and competitive pricing pressure from IQVIA expansion affected DH and
      represents a realistic adverse scenario for Komodo's private valuation if growth decelerates.
    claimRefs: [CP015, CP022, CP025, CP027, CP028, CP031, CP034, CP036]
    tableRefs: [TP003]
    figureRefs: [FP003]
  - id: section-4
    title: Moat durability and competitive risks
    body: >-
      Komodo's competitive moats can be evaluated across four dimensions: data breadth and
      freshness, multi-modal integration, application-layer switching costs, and AI differentiation.

      On data breadth and freshness, the Healthcare Map's 330M+ U.S. patient journeys from 60+
      sources with daily refresh is the core moat claim. This is company-claimed and not
      independently benchmarked, but is supported by customer adoption and 600+ disclosed
      life-sciences customer relationships. The moat is partially durable because matching the
      source breadth and daily refresh infrastructure requires significant investment, but IQVIA
      could close the freshness gap through its Symphony Health operations with sufficient
      investment, and Veeva Compass is expanding patient-data coverage.

      On multi-modal integration, Komodo's fusion of claims + EHR + labs + specialty pharmacy +
      consumer data creates a more complete patient-journey picture than claims-only or
      EHR-only competitors. This is the most defensible moat because sourcing and normalizing
      60+ heterogeneous data streams requires years of engineering and data operations work that
      new entrants cannot easily replicate. However, IQVIA's 1.2B global patient record
      advantage suggests IQVIA's data scale already surpasses Komodo's on some dimensions.

      On application-layer switching costs, the Sentinel + Aperture + Prism + Mavens suite
      embeds Komodo in life-sciences commercial and medical affairs workflows. Once analysts and
      commercial operations teams build workflows on Komodo's app suite, switching to IQVIA or
      Veeva requires retraining, workflow migration, and procurement risk — creating meaningful
      retention dynamics. This is the most validated moat dimension because it aligns with
      observed behavior (multi-year enterprise contracts, expanding customer relationships).

      On AI differentiation, Marmot AI is a stated moat but the least validated. IQVIA has Octa
      with AI-enhanced analytics; Veeva is acquiring AI capabilities (Ostro); Tempus has the
      deepest AI-oncology capability. Without independent benchmarking, the Marmot AI moat claim
      cannot be verified.

      The top competitive risks for Komodo over 2026–2028 are: (1) Veeva cross-sell displacement
      among its 1,552 pharma CRM customers, which requires no new account wins; (2) IQVIA closing
      the freshness gap through Symphony Health investment; (3) Tempus expanding beyond oncology
      into full-population AI analytics, which would close Komodo's breadth advantage; and
      (4) the DH-like valuation compression scenario if growth decelerates and healthcare data
      multiples continue to compress in the public market.
    claimRefs: [CP016, CP017, CP021, CP023, CP025, CP026, CP029, CP030, CP032, CP033, CP035, CP037]
