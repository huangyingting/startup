company:
  name: Komodo Health
chapter:
  number: 3
  title: Competitive Positioning
  summary: >-
    Komodo Health operates at the intersection of healthcare data, real-world evidence (RWE), and
    life-sciences analytics — a market dominated by IQVIA ($16.3B revenue, NYSE: IQV) but populated
    by a growing set of specialist challengers. The competitive landscape segments into three arenas:
    (1) full-stack incumbents (IQVIA, Veeva Systems) with deep pharma relationships and resources
    that dwarf Komodo's; (2) oncology-focused RWE specialists (Flatiron Health/Roche, Tempus AI,
    ConcertAI, Syapse) that compete for the life sciences R&D workflow but with narrower data scope;
    and (3) commercial healthcare intelligence providers (Definitive Healthcare, H1) that overlap
    with Komodo's Sentinel HCP-targeting and Aperture commercial-planning applications. Komodo's
    primary differentiation is its multi-modal Healthcare Map — 330M+ U.S. patient journeys from
    60+ data sources refreshed daily — which is broader and more current than any single oncology
    or claims-only competitor. The Marmot AI layer and application suite (Sentinel, Aperture, Prism,
    MapView, Pulse, Mavens) add workflow switching costs on top of the data moat.

    The most significant competitive threat is IQVIA, which has 1.2 billion globally non-identified
    patient records, a full CRO-to-commercial-analytics stack, and deep multi-decade pharma
    relationships. Veeva Systems ($3.2B FY2026 revenue, 1,552 life-sciences customers) ended its
    Salesforce partnership in 2025 and is aggressively expanding into patient-level data via Veeva
    Compass and Veeva Data Cloud, representing a CRM-incumbent-pivoting-into-data threat. Tempus AI
    (IPO June 2024, NASDAQ: TEM) brings genomics + AI depth in oncology that Komodo's claims-based
    approach cannot replicate. The sector's valuation risk is flagged by Definitive Healthcare
    (NASDAQ: DH), which IPO'd at ~$5B in 2021 and traded near ~$500M market cap by 2024 — an
    adverse signal for pure-play healthcare-data multiples.

    Komodo's moats — daily-refreshed multi-modal data, app-suite switching costs, and a growing
    AI layer — are real but still maturing. At the Series D valuation of $3.3B (January 2022),
    Komodo priced at a significant premium to Definitive Healthcare's compressed multiple,
    underscoring the diligence need to validate whether the differentiation gap versus IQVIA and
    Veeva justifies the premium. The key open question is whether Komodo's breadth moat is
    durable as IQVIA adds freshness and Veeva adds patient-level data.
