        approvals and life sciences commercial decision-making.
      type: estimated
      topic: RWE-market-size
      sourceRefs: [SP019, SP020, SP021]
      confidence: medium
      freshness: current
      answersQuestionRefs: [QP009]
    - id: CP015
      statement: >-
        Komodo Health's competitive differentiation rests on four pillars: (1) multi-modal data
        fusion across claims, EHR, specialty pharmacy, labs, and consumer data; (2) comprehensive
        U.S. patient-journey coverage at 330 million+ de-identified patients; (3) daily data
        refresh versus competitors with periodic or quarterly updates; and (4) the Marmot AI
        layer purpose-built for healthcare analytics, which provides workflow switching costs
        beyond the data subscription.
      type: company-claimed
      topic: Komodo-differentiation
      sourceRefs: [SP022, SP023]
      confidence: medium
      freshness: current
      answersQuestionRefs: [QP010, QP022]
    - id: CP016
      statement: >-
        Veeva's 2025 termination of its Salesforce partnership removes the prior constraint on
        Veeva's ability to compete head-to-head with life sciences CRM and data analytics
        providers, and its March 2026 acquisition of Ostro for $100 million (AI agents for
        life sciences) signals continued platform expansion into AI-assisted medical affairs
        and commercial workflows that overlap with Komodo's application suite.
      type: third-party-reported
      topic: Veeva-competitive-expansion
      sourceRefs: [SP002, SP006]
      confidence: medium
      freshness: current
      answersQuestionRefs: [QP003, QP019]
    - id: CP017
      statement: >-
        The competitive risk from large pharma internal data science teams (Pfizer, Roche, Novartis)
        building proprietary real-world data capabilities represents a long-term substitute risk;
        however, external data licensing remains more cost-effective for most pharma companies
        than building and maintaining a 330M+ patient population dataset independently.
      type: inferred
      topic: pharma-internal-build
