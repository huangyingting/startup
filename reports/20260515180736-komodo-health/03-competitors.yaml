    - id: CP001
      statement: >-
        IQVIA Holdings (NYSE: IQV) is the largest competitor to Komodo Health, reporting $16.3 billion
        in revenue for fiscal year 2025, with its Technology & Analytics division accounting for
        approximately 40% of revenues and providing access to 1.2 billion unique non-identified patient
        records globally.
      type: third-party-reported
      topic: IQVIA-profile
      sourceRefs: [SP001, SP014]
      confidence: high
      freshness: current
      answersQuestionRefs: [QP001, QP002]
    - id: CP002
      statement: >-
        IQVIA's Technology & Analytics division includes the Octa platform (commercial analytics),
        Symphony Health subsidiary (patient-level claims data), and a CRO-to-commercial full stack
        that creates deep, multi-decade relationships with top-20 pharma companies — relationships
        Komodo Health must displace to grow in the enterprise segment.
      type: third-party-reported
      topic: IQVIA-profile
      sourceRefs: [SP001, SP005, SP016]
      confidence: high
      freshness: current
      answersQuestionRefs: [QP002, QP015]
    - id: CP003
      statement: >-
        Veeva Systems (NYSE: VEEV) reported $3.195 billion in revenue for fiscal year 2026 (ending
        January 31, 2026) with 1,552 life-sciences customers, ending its Salesforce CRM partnership
        in 2025 and acquiring Ostro (AI agents for life sciences) for $100 million in March 2026,
        signaling aggressive platform consolidation.
      type: third-party-reported
      topic: Veeva-profile
      sourceRefs: [SP002, SP007]
      confidence: high
      freshness: current
      answersQuestionRefs: [QP001, QP003]
    - id: CP004
      statement: >-
        Veeva's Compass patient-level data product and Veeva Data Cloud directly compete with
        Komodo's Healthcare Map in the life-sciences data market. Veeva acquired Crossix
        (medical-privacy-safe patient data and analytics) in October 2019, establishing a foundation
        for patient-level data that has since expanded into a direct head-to-head product line.
      type: third-party-reported
      topic: Veeva-competitive
      sourceRefs: [SP002, SP006]
      confidence: high
      freshness: current
      answersQuestionRefs: [QP003, QP019]
    - id: CP005
