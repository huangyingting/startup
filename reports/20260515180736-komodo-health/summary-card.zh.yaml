summary:
  headline: Komodo Health 的 Healthcare Map 数据资产可信，也已覆盖 600+ 客户；但 2022 年 Series D 估值已经过时，同业倍数大幅压缩，监管审视还在升温。没有新的披露，$3.3B 估值很难守住。
