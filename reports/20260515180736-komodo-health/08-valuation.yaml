company:
  name: Komodo Health
chapter:
  number: 8
  title: Valuation
  summary: 'Komodo Health''s last disclosed valuation is $3.3B post-money from its January 2022 Series D, set at the peak
    of the SaaS bubble. Four years of macro multiple compression — the BVP EMCLOUD median declined from ~30× to ~7–8× NTM
    ARR — has structurally repriced every comparable in the healthcare data analytics category. The most adverse precedent
    is Definitive Healthcare (NASDAQ: DH), which collapsed from a $3.9B IPO valuation to ~$88M market cap, a >97% compression.
    Applying current market multiples to estimated Komodo ARR of $100–170M yields a fair-value range of $0.8–1.7B under base
    assumptions, a 49–76% implied markdown from the Series D price. A bull case tied to Marmot AI platform breakout and
    Tempus-comparable multiples could support $2.5–4B; a bear case tracking DH deterioration implies $0.4–0.6B. The April
    2026 CFO hire and reported Marmot demand acceleration are constructive signals but insufficient to resolve the core unknowns.
    Recommendation: Monitor with primary diligence gating — do not commit at $3.3B; price-sensitive entry requires confirmation
    of ARR trajectory, Marmot AI monetization, and NDR stability.'
sections:
- id: SV001
  title: Investment Thesis, Anti-Thesis, and Recommendation
  body: 'The investment thesis for Komodo Health rests on three pillars: (1) a defensible longitudinal patient data moat —
    330M+ patient journeys assembled from claims, pharmacy, lab, and health records — that is expensive to replicate and
    increasingly embedded in pharma commercial workflows; (2) emerging AI monetization through the Marmot platform, which
    Komodo describes as generating accelerating demand as of April 2026; and (3) scarcity value in the private market: there
    are very few assets of this scale, coverage depth, and pharma-customer penetration in the healthcare AI/data category.


    The anti-thesis is equally structured. The most adverse public comparable — Definitive Healthcare (DH) — has suffered
    a >97% compression from its $3.9B IPO valuation (September 2021) to a ~$88M market cap as of May 2026, demonstrating
    that healthcare data analytics companies can lose nearly all their value when revenue growth stalls, NDR declines, and
    public market enthusiasm evaporates. DH FY2025 revenue declined 4% YoY, enterprise NDR fell to 85% (from 96% in FY2023),
    and net loss reached $199.3M with $196.1M in goodwill impairment — a trajectory that Komodo investors must diligence
    against. Furthermore, Komodo has not disclosed audited revenue, ARR, or NDR data since the January 2022 Series D; the
    $3.3B post-money price was set at a 33× implied ARR multiple that the current market does not support.


    The recommendation is Conditional Proceed: primary diligence is warranted given the data moat and AI platform optionality,
    but entry at $3.3B is not supportable on available evidence. Price discipline is essential. Resolution of six specific
    diligence asks (see Section 5) is required before capital commitment.'
  tableRefs:
  - TV001
  - TV002
  figureRefs:
  - FV001
  - FV004
- id: SV002
  title: Public Comparable Companies and Market Multiples
  body: 'Four public companies provide direct or adjacent comparables for Komodo Health as of May 2026:


    IQVIA (NYSE: IQV) — the global leader in health data and CRO services — reported $16.3B in FY2025 revenue and carries
    a $28.7B market cap, implying a ~1.76× trailing revenue multiple. IQVIA''s low multiple reflects its services-heavy
    mix and lower SaaS margins; it is a floor reference rather than a target multiple for Komodo.


    Veeva Systems (NYSE: VEEV) — the dominant SaaS platform for life sciences CRM and data cloud — reported $3.195B in
    FY2026 revenue with a $26B market cap, implying an ~8.1× revenue multiple. Veeva is the most structurally similar public
    comparable: high-margin SaaS with pharma commercial customers. Komodo should target Veeva-range multiples if it can
    demonstrate comparable NRR and gross margin.


    Tempus AI (NASDAQ: TEM) — the AI-driven health data platform that IPO''d in June 2024 — carries a ~$7.9B market cap
    as of May 2026. At estimated ~$700M trailing revenue, this implies an ~11–12× multiple. Tempus is the closest structural
    analog: an AI + longitudinal patient data platform targeting pharma and oncology. Komodo''s Marmot AI layer would need
    to demonstrate comparable AI revenue contribution to command a Tempus-style multiple.


    Definitive Healthcare (NASDAQ: DH) — a healthcare commercial intelligence platform — represents the most adverse comparable.
    DH''s market cap collapsed from ~$3.9B at IPO (September 2021) to ~$87.9M by May 2026. DH FY2025 revenues declined
    4% YoY, enterprise NDR eroded from 96% to 85%, and goodwill impairments totaled nearly $1B over three years. While
    DH''s product focus (provider targeting) differs from Komodo''s (pharma RWE + AI), the category-level risk signal is
    material. The BVP EMCLOUD index confirms structural multiple compression: from ~30× NTM ARR at the 2021 peak to ~7–8×
    by mid-2026.'
  tableRefs:
  - TV004
  figureRefs:
  - FV002
- id: SV003
  title: Private Comparables and M&A Precedents
  body: 'In the private market, three comparables provide additional calibration:


    ConcertAI (2022): raised a growth round valuing the oncology RWE platform at approximately $1.9B on estimated ~$160M
    ARR, implying a ~12× ARR multiple. This is the most recent sizable private-market comparable and suggests healthcare
    AI/data platforms commanded 10–14× ARR at 2022 valuations.


    H1.co (2022 Series C): valued at ~$1.6B as a physician data platform; revenue undisclosed. Serves as a size reference
    for HCP data assets, but limited public financial disclosure constrains direct multiple comparisons.


    Flatiron Health / Roche (2018): Roche acquired Flatiron for approximately $1.9B, implying roughly 6× estimated trailing
    revenue at time of acquisition. Flatiron''s oncology EHR data focus is a subset of Komodo''s addressable market. The
    acquisition multiple (6×) and acquirer profile (Roche) are relevant M&A precedent for a strategic exit scenario.


    A strategic acquirer (IQVIA, Roche, J&J, Salesforce Health Cloud) might value Komodo at 3–6× trailing revenue for
    its data moat and pharma channel access. On a $200M revenue assumption, this implies a strategic acquisition range of
    $0.6–1.2B — substantially below the $3.3B 2022 Series D price, reflecting the acquirer''s ability to buy at distress
    or normalized multiples rather than private-round premiums.'
- id: SV004
  title: Scenario Valuation Framework and Fair Value Range
  body: 'Three scenarios define the Komodo valuation range for a current investor:


    Bull case (15% probability): Komodo discloses ARR of $200M+ with strong NDR (>110%), Marmot AI contributes meaningful
    incremental revenue, and the company achieves a Tempus-style AI health data narrative ahead of an IPO or strategic
    acquisition. At 15× NTM ARR on $200M, implied enterprise value is $3.0–4.5B. Requires: positive Marmot monetization
    confirmation, demonstrated NDR stability, and continued pharma budget resilience.


    Base case (55% probability): ARR is in the $130–170M range with stable but not exceptional NDR (90–100%), Marmot is
    a feature rather than a standalone revenue driver, and the company seeks a late-stage primary round or M&A exit at
    8–10× NTM ARR. Implied enterprise value: $1.0–1.7B. This is a 49–70% markdown from the $3.3B Series D price.


    Bear case (30% probability): ARR is below $100M or declining, NDR follows the DH trajectory below 85%, and the company
    faces down-round or distressed-sale dynamics. At 4–6× NTM ARR on $90M, implied EV is $0.4–0.5B. This scenario is
    consistent with the DH public-market comparable if Komodo''s pharma customers follow similar budget pressure and churn
    patterns.


    The implied fair value range across scenarios (probability-weighted) is approximately $1.1–1.5B — a 55–67% markdown
    from the last known private valuation of $3.3B. Entry discipline, preference stack awareness, and Marmot AI confirmation
    are the key value levers.'
  tableRefs:
  - TV003
  figureRefs:
  - FV003
- id: SV005
  title: Exit Paths, Liquidity, and Final Diligence Asks
  body: 'Komodo Health has three primary exit paths, each with distinct valuation implications:


    IPO: Requires demonstrating public-market-quality metrics — audited financials, disclosed ARR with growth trajectory,
    gross margin >70%, and NDR >100%. At current SaaS market multiples, a Komodo IPO at or above $3.3B would require ARR
    of $330M+ at Veeva-comparable multiples (8×) or $275M+ at Tempus-comparable multiples (12×). No public evidence
    supports that Komodo has reached these thresholds. A Bloomberg article headline about a 2025 tender offer — while
    inaccessible — suggests secondary market activity but not IPO preparation.


    Strategic M&A: IQVIA, Roche/Flatiron (via expansion), J&J, Veeva, and Salesforce Health Cloud are natural acquirers.
    Strategic valuations typically reflect 3–6× trailing revenue for data assets; at $200M revenue, this implies $0.6–1.2B.
    Roche paid ~6× for Flatiron (2018); IQVIA''s portfolio expansion suggests appetite for data moat acquisitions.


    Secondary or continuation vehicle: The reported 2025 tender offer suggests Komodo may have provided liquidity to
    early shareholders without a primary event. Continuation funds and GP-led secondaries are common for 4-year-old unicorns
    facing IPO window uncertainty.


    The April 2026 CFO appointment is a constructive signal — new CFO hires often precede a financing process — but
    insufficient to establish exit timeline or valuation. Six diligence asks must be resolved before capital commitment.'
