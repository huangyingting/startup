- id: TV005
  title: Thesis-Break and Kill Triggers Table
  sectionRef: SV005
  claimRefs:
  - CV024
  - CV025
  - CV031
  - CV040
  columns:
  - Trigger
  - Observable Threshold
  - Impact on Thesis
  - Action Implication
  rows:
  - - ARR decline or churn spike
    - Disclosed ARR below $100M or NDR below 85%
    - Eliminates base case; pushes toward bear scenario
    - Exit position or decline investment
  - - DH-parallel NDR erosion
    - Komodo NDR declines to DH levels (85%) or further
    - Confirms category-level risk; implies imminent multiple collapse
    - Kill investment; request audited financials immediately
  - - Regulatory data restriction
    - Federal or multi-state law prohibiting commercial use of de-identified patient claims data
    - TAM destruction; moat becomes liability
    - Kill investment; monitor MHMD Act and similar state legislation
  - - Key pharma customer loss
    - Loss of any top-3 pharma client (estimated >20% ARR concentration)
    - Revenue cliff risk; may trigger covenant or down-round
    - Reassess entry price; request customer concentration disclosure
  - - Failed new primary round
    - Round priced at <$1B or convertible bridge structure
    - Confirms down-round; implies investor syndicate lost confidence
    - Adjust carry model; consider mark-to-market at <$1B
  notes: Triggers are observable without private access; all kill-level triggers require immediate escalation to investment committee.
- id: TV006
  title: Final Diligence Asks Table
  sectionRef: SV005
  claimRefs:
  - CV018
  - CV036
  columns:
  - Topic
  - Missing Evidence
  - Why It Matters
  - Owner / Path
  rows:
  - - Audited ARR and revenue FY2025
    - No public financials disclosed since January 2022
    - Cannot triangulate current multiple; all scenarios are unanchored
    - Request from company; required pre-term sheet
  - - Marmot AI attach rate and incremental ACV
    - No public disclosure of Marmot revenue contribution
    - Determines whether AI upside is real or positioning; key bull vs. base differentiator
    - Customer references; ask 3–5 pharma clients directly
  - - Full cap table and preference stack
    - Tiger Global, a16z, CVS preferred terms undisclosed
    - Dilution and liquidation preference impact effective return; $3.3B may be wrong basis
    - Legal diligence; waterfall model required
  - - Cohort NDR by customer segment
    - No NDR data published; DH parallel requires comparable metric
    - Measures retention moat; key signal for base vs. bear scenario
    - Financial diligence; request 3-year cohort retention analysis
  - - Tender offer 2025 terms and pricing
    - Bloomberg headline exists; article inaccessible; terms unknown
    - Signals secondary market valuation; may indicate insider marks below $3.3B
    - Obtain via M&A counsel or direct inquiry to company
  - - State data law regulatory exposure scope
    - MHMD Act (WA), similar bills in CA, TX; enforcement scope on claims data unclear
    - Determines addressable TAM durability; potential existential risk if claims data use restricted
    - Legal diligence; regulatory counsel opinion required
  notes: 'Items 1–4 are blocking before term sheet commitment; items 5–6 are required for legal and return-model diligence.'
