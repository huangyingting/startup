sections:
- id: SE-product-portfolio
  title: Product Portfolio and Application Suite
  body: 'Komodo Health operates as a vertically integrated real-world data platform: the customer
    relationship spans from data access through analytics tooling to AI-augmented insight generation.
    The platform serves pharma, biotech, payer, employer, financial services, and patient advocacy
    organisations, with the core workflow running from raw patient journey data through purpose-built
    analytics applications to executive dashboards and AI-assisted queries. The product portfolio
    consists of six analytics applications (Sentinel for HCP commercial targeting, Aperture for
    market access, Prism for HEOR/RWE cohort construction, MapView for geographic patient flow
    visualisation, Pulse for real-time KPI monitoring, and Komodo Home as the unified SaaS workspace),
    all layered over the Healthcare Map data asset and the Marmot generative AI orchestration engine.
    Komodo Home provides two access modes: Komodo Navigator — a natural-language chat interface
    enabling ad hoc patient population queries — and the Development Kit, which exposes the Healthcare
    Map via Snowflake zero-copy sharing, Databricks compute, and native Python APIs. The Mavens
    and Breakaway Partners acquisitions added professional services and strategic advisory capabilities,
    creating a full-stack managed analytics offering. The December 2025 AWS Marketplace listing
    with a "Reviewed by AWS" badge enables cloud-native procurement for enterprise pharma buyers.
    As of May 2026, dedicated product sub-pages for Sentinel, Aperture, Prism, and Pulse return
    404 errors, suggesting an ongoing website restructuring and creating a diligence gap around
    granular feature documentation.'
  tableRefs:
  - TE001
  - TE002
  figureRefs:
  - FE001
  sourceRefs:
  - SE001
  - SE003
  - SE004
  - SE005
  - SE023
  - SE024
  - SE025
  - SE026
- id: SE-healthcare-map
  title: 'Healthcare Map: Core Data Asset and Architecture'
  body: 'The Healthcare Map is the foundational proprietary asset underpinning all Komodo analytics.
    It links 1T+ individual healthcare records into 330M+ longitudinal patient journeys through a
    probabilistic entity resolution engine that reconciles patient identity across open claims, closed
    claims, EHR, laboratory, specialty pharmacy, and ancillary care data from 60+ source partners.
    Daily refresh cadence distinguishes the asset from competitors that rely on weekly or monthly
    batch updates, enabling near-real-time commercial and clinical monitoring. The de-identification
    pipeline applies both HIPAA Safe Harbor (removal of 18 PHI identifiers) and Expert Determination
    (statistical validation that re-identification risk is very small), producing limited datasets
    compliant with HHS OCR guidance. Patient journey linkage is performed at the entity level using
    probabilistic matching across source identifiers, creating a unified timeline of care events from
    diagnosis through treatment, pharmacy fill, and outcome — without requiring a common patient identifier
    across sources. The GeneDx rare disease genomics partnership augments the Healthcare Map with linked
    genomic-clinical data, expanding coverage for rare disease epidemiology. Over 600 peer-reviewed
    publications have used Healthcare Map data, providing independent analytical validation. Key
    limitations include inherent claims data gaps for uninsured and Medicaid-only populations, coding
    variability across claims payers, and lag in receipt and processing of closed claims from payer
    partners, which can affect recency in specific data elements.'
  tableRefs:
  - TE003
  figureRefs:
  - FE002
  sourceRefs:
  - SE001
  - SE005
  - SE006
  - SE008
  - SE021
- id: SE-marmot-ai
  title: 'Marmot: Generative AI Orchestration Layer'
  body: 'Marmot is Komodo''s generative AI layer, commercially positioned as a purpose-built healthcare
    AI distinct from general-purpose LLM wrappers. Its core architectural differentiator is domain-specific
    model routing: rather than processing all queries through a single foundation model, Marmot evaluates
    the query intent and routes to a domain-specific model (e.g., a model trained on commercial analytics
    tasks vs. one trained on HEOR cohort logic), then passes responses through evaluation gates before
    returning output. Each interaction generates a full audit trail including routing decision, model
    used, input parameters, and output — supporting reproducibility requirements in regulated research
    workflows. Customer data isolation is enforced at the architecture level: each customer''s proprietary
    pipeline data is fully segregated, and Komodo explicitly commits that customer data is never used
    to train its foundation models, addressing a critical data governance concern for pharma companies
    with commercially sensitive patient analytics pipelines. Role-based access controls tie Marmot AI
    access to the existing Komodo permissions framework, preventing users from querying data or triggering
    AI models outside their contractual scope. The appointment of Amit Sangani (Meta; led PyTorch and
    Llama) as CTO in January 2026 signals a planned expansion of Marmot''s AI infrastructure, likely
    toward open-standard models and deeper integration with the cloud-native stack. Key risks include
    the absence of public benchmark data for Marmot accuracy, the potential for domain model errors
    in edge-case clinical reasoning tasks, and evolving FDA AI/ML regulatory expectations that may
    eventually require formal validation documentation for AI tools used in regulatory submission
    workflows.'
  tableRefs: []
  figureRefs:
  - FE003
  sourceRefs:
  - SE002
  - SE005
  - SE010
- id: SE-integrations
  title: Integrations, Partnerships, and Developer Ecosystem
  body: 'Komodo''s integration strategy centres on meeting healthcare analytics buyers where their
    data infrastructure already lives. The Snowflake zero-copy data sharing integration enables
    customers to query Healthcare Map data directly from within their Snowflake environment without
    replicating data, reducing both cost and data governance overhead; this is validated by the
    Snowflake customer case study. The Databricks integration through the Development Kit allows
    data science teams to run custom PySpark or Python pipelines on Healthcare Map data using their
    existing lakehouse infrastructure, supporting customers with mature internal data science capabilities.
    The Python SDK in the Development Kit extends programmatic access for engineering teams building
    automated analytics or reporting pipelines. The AWS Marketplace listing (December 2025, "Reviewed
    by AWS") creates a cloud-native procurement path aligned with enterprise cloud commit programmes,
    reducing procurement friction for pharma IT buyers. The Salesforce CRM integration connects Sentinel
    commercial analytics directly to pharma field force workflows, enabling rep-level HCP targeting and
    call planning within the CRM system of record. The GeneDx rare disease data partnership and other
    data partnerships extend the breadth of the Healthcare Map beyond traditional claims. While the
    breadth of integration endpoints is competitive, formal API documentation and a published developer
    portal are not publicly accessible as of May 2026, representing a gap versus cloud-native competitors
    who publish comprehensive SDK documentation.'
  tableRefs: []
  figureRefs: []
  sourceRefs:
  - SE003
  - SE005
  - SE013
  - SE021
  - SE022
- id: SE-trust-compliance
  title: Trust, Security, Compliance, and Data-Quality Limitations
  body: 'Komodo Health operates under a layered compliance framework appropriate for a commercial
    health data platform: HIPAA Business Associate Agreements with all customers establish contractual
    accountability for protected health information; SOC 2 Type II certification provides continuous
    third-party audit validation of security, availability, and confidentiality controls; and HITRUST
    CSF certification — the healthcare-specific security framework — demonstrates alignment with
    healthcare industry security expectations beyond base HIPAA. The Marmot AI layer extends these
    controls by enforcing per-customer data isolation, role-based access, and full query audit trails.
    The public GitHub signal — a fork of panther-labs/panther-analysis for SIEM security detection
    rules — indicates use of the Panther security monitoring platform for cloud infrastructure alerting,
    consistent with modern cloud-native security operations. HIPAA enforcement statistics from HHS OCR
    show 500+ major breaches annually across the industry; as a BAA counterparty to numerous pharma
    and payer customers, a breach event would expose Komodo to material regulatory, reputational, and
    contractual liability. Key remaining diligence questions include: the specific scope and audit period
    of the most recent SOC 2 report; whether Komodo has experienced any reportable breach events; and
    how Marmot''s data isolation architecture is technically implemented (row-level security, separate
    model instances, or virtualised tenant environments). The FDA''s growing regulatory framework for
    AI/ML-enabled healthcare tools creates a forward-looking compliance risk for Marmot as its use
    expands into regulatory submission workflows.'
  tableRefs:
  - TE004
  - TE005
  figureRefs:
  - FE004
  sourceRefs:
  - SE001
  - SE007
  - SE008
  - SE009
  - SE010
  - SE014
