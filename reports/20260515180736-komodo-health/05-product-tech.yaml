acknowledgedWarnings:
- dimension: unverifiedSource
  reason: Four Komodo Health product sub-pages (komodohealth.com/product/sentinel/, /aperture/, /prism/, /pulse/) returned
    HTTP 404 at research time (May 2026) and are marked accessStatus broken. Product functionality for these applications
    is inferred from the Komodo Home workspace page, press releases, and blog content. These four broken sources represent
    15% of the 26 total chapter sources, below the 25% paywallRisk threshold. Competitor comparison claims for IQVIA, Flatiron,
    TriNetX, H1, Symphony Health, and Definitive Healthcare are based on each vendor's public homepage and official product
    materials, which are self-reported and may not reflect current capability gaps.
