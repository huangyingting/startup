- id: TE003
  title: Technology and Operating Architecture Table
  columns:
  - Layer
  - Technology / Approach
  - Proprietary vs. Commercial
  - Key Risk or Dependency
  rows:
  - - Raw Data Ingestion (60+ sources)
    - Automated ETL pipelines; open claims, closed claims, EHR, lab, Rx, ancillary feeds from source partners
    - Proprietary ingestion pipeline; data licensing agreements with sources
    - Source partner relationship risks; data access fees; feed quality variability
  - - De-identification and Compliance
    - HIPAA Expert Determination + Safe Harbor applied to all patient data; limited dataset production
    - Proprietary de-id methodology validated by in-house expert statisticians
    - Ongoing HHS OCR methodology compliance; re-identification risk if methodology gaps emerge
  - - Patient Journey Linkage (Healthcare Map engine)
    - Probabilistic entity resolution across 1T+ records to build 330M+ longitudinal journeys
    - Proprietary record linkage engine — core IP of the platform
    - Linkage accuracy variability; coverage gaps in closed claims and underinsured populations
  - - Analytics Applications (SaaS)
    - Sentinel, Aperture, Prism, MapView, Pulse — role-specific UX over Healthcare Map
    - Proprietary application layer built on Healthcare Map data
    - Product page 404 errors suggest active restructuring; feature scope uncertain
  - - Generative AI Layer (Marmot)
    - Domain-specific LLM routing with evaluation gates; audit trails; per-customer data isolation
    - Proprietary LLM orchestration; underlying model vendors not publicly disclosed
    - Hallucination risk in clinical reasoning; no public benchmark; evolving FDA AI/ML oversight
  - - Developer Access (Development Kit)
    - Snowflake zero-copy sharing; Databricks compute integration; Python SDK
    - Snowflake and Databricks commercial platforms; SDK proprietary to Komodo
    - Cloud vendor dependency; Snowflake and Databricks pricing and API stability
  - - Delivery and Procurement Infrastructure
    - Komodo Home SaaS workspace; AWS Marketplace (December 2025, "Reviewed by AWS")
    - AWS cloud infrastructure; Komodo Home proprietary frontend
    - Cloud uptime dependency; AWS Marketplace listing maintenance and compliance requirements
  notes: Architecture compiled from official Komodo product pages, press releases, and Snowflake customer case study as of
    May 2026. Specific technology stack components (cloud provider, database technology, ML frameworks) are not publicly
    disclosed beyond Snowflake, Databricks, and AWS integrations.
  enumerationScope:
    coverage: partial
    basis: Architecture layers identified from official disclosures and partner confirmations; internal system specifics are
      not publicly documented.
  claimRefs:
  - CE001
  - CE002
  - CE003
  - CE004
  - CE013
  - CE016
  - CE025
  - CE026
- id: TE004
  title: Trust, Security, and Compliance Status
  columns:
  - Domain
  - Standard or Requirement
  - Komodo Status
  - Evidence Basis
  - Diligence Ask
  rows:
  - - HIPAA Privacy and Security Rule
    - HIPAA 45 CFR Parts 160, 164; BAA required for all customers
    - Compliant; BAA executed with all platform customers
    - Komodo official product page; HHS OCR guidance
    - Request BAA template; confirm breach notification procedure and history
  - - SOC 2 Type II
    - AICPA Trust Service Criteria — security, availability, confidentiality
    - Certified (stated by company); Type II continuous audit period
    - Komodo official disclosures
    - Request most recent SOC 2 Type II report; verify audit period and covered systems scope
  - - HITRUST CSF
    - HITRUST Common Security Framework v11
    - Certified (stated by company); third-party assessor validated
    - Komodo official disclosures
    - Request HITRUST certification letter; confirm scope, assessment date, and assessor identity
  - - HIPAA De-identification
    - HHS Expert Determination and Safe Harbor methods (45 CFR §164.514)
    - Both methods applied per company disclosure and HHS guidance alignment
    - Komodo product page; HHS OCR de-id technical guidance
    - Request de-id methodology white paper; confirm expert statistician credentials and re-id risk threshold
  - - AI Data Isolation (Marmot)
    - Per-customer data segregation; no cross-customer model training
    - Enforced per company commitment; technical architecture not publicly documented
    - Komodo Marmot product page
    - Request technical architecture description of isolation mechanism (row-level, tenant separation, or separate instances)
  - - Security Monitoring
    - SIEM and continuous threat detection
    - Panther Labs SIEM deployed per public GitHub fork of panther-analysis
    - GitHub developer signal (public repository)
    - Request penetration test results, vulnerability programme details, and incident response procedures
  notes: Compliance status primarily based on company disclosures; formal certification documents are not publicly available
    for this private company. SOC 2 Type II and HITRUST certificates should be requested in due diligence.
  enumerationScope:
    coverage: partial
    basis: Compliance domains identified from Komodo official disclosures and applicable regulatory frameworks for healthcare
      data platforms. Specific audit scope and certification dates are not publicly available.
  claimRefs:
  - CE029
  - CE030
  - CE031
  - CE032
  - CE033
  - CE034
- id: TE005
  title: Competitive Platform Comparison — RWD and Analytics Capabilities
  columns:
  - Vendor
  - Data Scale
  - AI / NL Query Capability
  - Key Therapeutic Focus
  - Integration Depth
  - Primary Weakness vs. Komodo
  rows:
  - - Komodo Health
    - 330M+ patient journeys; 1T+ linked records; 60+ sources; daily refresh
    - Marmot (LLM routing, evaluation gates, audit trail, data isolation)
    - Full-stack — Commercial, HEOR, Med Affairs, Clin Dev, Financial Services
    - Snowflake, Databricks, AWS Marketplace, Salesforce, Python SDK
    - Product sub-pages unavailable (404); private company; no public benchmarks
  - - IQVIA (Orchestrated Analytics)
    - 1.2B+ non-identified records; 100+ countries; claim to largest RWD
    - OCE.AI (sales force AI); RWE analytics suite
    - Full-stack; strongest in global pharma commercial and pharmacovigilance
    - Salesforce, Veeva; broad ERP integration; global
    - Highest-cost tier; complex legacy platform; Roche subsidiary perception risk for some customers
  - - Flatiron Health (Roche)
    - Oncology-specific curated EHR-linked RWD; ~280 community oncology sites
    - Limited public AI capabilities
    - Oncology HEOR and clinical research exclusively
    - Roche integration; academic medical centre partnerships
    - Single-disease focus (oncology); Roche ownership creates pharma competitor-use friction
  - - TriNetX
    - 250M+ patient records via federated health system network; no data movement
    - TriNetX platform (federated query, no patient data export)
    - Clinical research feasibility; trial site selection
    - Health system EHR network; limited commercial platform integrations
    - No data export model limits analytics depth; limited commercial use cases
  - - H1 (HCP Intelligence)
    - HCP clinical activity and professional data; claims-linked HCP profiles
    - H1 Navigator (AI-driven HCP search and profiling)
    - Medical affairs; KOL mapping; HCP engagement
    - Salesforce; narrow medical affairs CRM integrations
    - Limited patient-journey depth; narrow single-function focus (HCP profiling)
  - - Symphony Health (IQVIA company)
    - 300M+ patient transactions; integrated with IQVIA data assets
    - Limited standalone AI capabilities
    - Pharma commercial analytics; patient flow
    - IQVIA ecosystem integration; IBM Life Sciences partnership
    - Increasingly integrated with IQVIA parent; potential for product redundancy
  - - Definitive Healthcare
    - Hospital and provider directory; facility-level claims; 10K+ US facilities
    - Atlas AI analytics platform
    - Market sizing; provider intelligence; commercial targeting
    - Salesforce; Veeva; CRM-focused integrations
    - Limited patient-journey longitudinal depth; primarily facility-level not patient-level data
  notes: Competitive data compiled from company official websites and CB Insights as of May 2026. Vendor capabilities are
    self-reported where third-party validation is unavailable. IQVIA patient record count from iqvia.com/solutions/real-world-evidence.
  enumerationScope:
    coverage: partial
    basis: Seven vendors selected as direct or adjacent RWD/analytics platform competitors based on publicly available competitive
      positioning. Additional niche vendors exist in specialty verticals (oncology, rare disease) not captured here.
  claimRefs:
  - CE005
  - CE015
  - CE025
  - CE036
figures:
- id: FE001
  title: Komodo Health Platform Architecture Stack
  type: stack
  data:
    layers:
    - label: 'Customer Value: Insight-to-Action for Pharma, HEOR, and Medical Affairs'
      detail: Analytics outputs delivered via SaaS applications (Sentinel, Aperture, Prism, MapView, Pulse) and Komodo Navigator
        NL interface; action ranges from field force HCP targeting to regulatory-grade RWE submission
    - label: 'AI Orchestration Layer: Marmot'
      detail: Domain-specific LLM routing with evaluation gates, full audit trails, per-customer data isolation; role-based
        access controls tied to Komodo permissions; powers NL queries in Komodo Navigator and MapAI
    - label: 'Analytics Application Layer: Sentinel, Aperture, Prism, MapView, Pulse, Komodo Home'
      detail: Six role-specific SaaS applications plus unified Komodo Home workspace; Komodo Navigator (NL chat) and Development
        Kit (Snowflake / Databricks / Python) for advanced users
    - label: 'Core Data Asset: Healthcare Map'
      detail: 330M+ patient journeys from 1T+ linked records; 60+ data sources; daily refresh; probabilistic entity resolution;
        HIPAA de-identification via Expert Determination and Safe Harbor
    - label: 'Data Ingestion and Compliance Layer'
      detail: Automated ETL pipelines from 60+ source partners (open claims, closed claims, EHR, Rx, lab, ancillary); Expert
        Determination and Safe Harbor de-id applied; GeneDx rare disease genomic data linked
    - label: 'Delivery and Procurement Infrastructure: AWS Marketplace, Snowflake, Databricks'
      detail: AWS Marketplace launch December 2025 (Reviewed by AWS); Snowflake Data Cloud zero-copy sharing; Databricks
        lakehouse compute; Python SDK for programmatic access
