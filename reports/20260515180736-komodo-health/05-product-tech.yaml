chapter:
  number: 5
  title: Product and Technology
  summary: Komodo Health operates a full-stack real-world data (RWD) analytics platform anchored by the Healthcare Map, a
    proprietary patient-journey asset covering 330M+ patient journeys linked across 1T+ healthcare records from 60+ data
    sources refreshed daily. The application layer spans six purpose-built analytics modules — Sentinel (commercial), Aperture
    (market access), Prism (HEOR/RWE), MapView (geographic analytics), Pulse (KPI dashboards), and Komodo Home (unified
    workspace with NL query and developer SDK) — all layered over Marmot, a generative AI orchestration engine that routes
    questions to domain-specific models with evaluation gates, full audit trails, and per-customer data isolation. Deep
    Snowflake and Databricks integrations, a December 2025 AWS Marketplace listing, and a new Meta/PyTorch-background CTO
    (Amit Sangani, January 2026) signal a deliberate cloud-native and AI-first infrastructure push; HITRUST CSF, SOC 2
    Type II, and HIPAA compliance provide the regulatory foundation. Key diligence gaps include the unavailability of
    dedicated product sub-pages for Sentinel, Aperture, Prism, and Pulse, an undisclosed Marmot LLM benchmark, and no
    public IP portfolio.
