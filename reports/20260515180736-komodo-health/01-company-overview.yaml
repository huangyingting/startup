      topic: financials / ARR
      missingEvidence: Audited or company-disclosed revenue, ARR, gross margin and net-revenue retention figures.
      whyItMatters: Without these the implied 2022 valuation multiple cannot be benchmarked against current SaaS comps.
      diligencePath: Request management briefing under NDA; cross-check with secondary platforms such as Sacra or Sapphire.
      relatedQuestionRefs:
