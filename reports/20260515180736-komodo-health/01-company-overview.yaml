callouts:
  - calloutType: strength
    title: Largest commercially licensed U.S. patient dataset
    body: |
      The Healthcare Map's combination of more than one trillion linked records and 330 million+ longitudinal patient
      journeys, refreshed daily from 60+ sources, is the strongest publicly stated data-scale claim in the U.S.
      real-world-data category. Coverage at this depth, with both open and closed data linked, is operationally
      difficult to replicate and is the foundation of every downstream Komodo product.
    claimRefs:
      - CO003
      - CO004
      - CO005
  - calloutType: risk
    title: Stale primary mark with no newer round
    body: |
      Komodo's last disclosed primary equity round closed in January 2022 at a $3.3 billion valuation, predating the
      late-stage repricing cycle. With no newer primary round publicly announced more than four years later, the
      current implied equity value, dilution stack and any secondary or down-round activity are unverifiable from
      outside the company.
    claimRefs:
      - CO017
      - CO020
  - calloutType: insight
