chapter:
  number: 6
  title: Customers and Traction
  summary: 'Fervo Energy has secured 658 MW of binding power purchase agreements with NV Energy (~400 MW Cape Station) and
    Google (Project Red 1.5 MW + undisclosed counterparties ~256 MW), plus a non-binding 3 GW framework with Google. Project
    Red has delivered 24/7 EGS electricity to Google for 18+ months, the strongest customer-proof of EGS technology globally.
    Cape Station targets COD late 2026. Customer concentration is extreme: two named counterparties represent ~61% of disclosed
    binding MW. Expansion depends on converting the 15+ GW development pipeline to new binding contracts with diversified
    counterparties.'
sections:
- id: SU-SEC-01
  title: Customer Landscape Overview
  body: Fervo Energy's customer base as of the April 2026 S-1 consists of two publicly named counterparties—NV Energy (Berkshire
    Hathaway Energy) and Google LLC—plus unnamed parties representing approximately 256 MW of binding PPA capacity. Total
    binding PPAs stand at 658 MW, representing approximately $7.2 billion in potential contracted revenue over 20-25 year
    PPA terms. NV Energy has committed to approximately 400 MW of Cape Station output to satisfy Nevada's Renewable Portfolio
    Standard mandate requiring 100% renewable energy by 2030. Google entered a commercial PPA for Project Red (1.5 MW) in
    2021, with first power delivered in November 2023. In August 2024, Google signed a non-binding framework agreement for
    up to 3 GW of additional EGS capacity from Fervo's development pipeline. The extreme concentration in two named counterparties—representing
    essentially all of public contracted revenue—is the defining customer risk for this investment thesis.
  figureRefs:
  - FU001
- id: SU-SEC-02
  title: Customer Segmentation and Buyer Profiles
  body: 'Fervo Energy serves two distinct customer archetypes: regulated utilities and hyperscale technology companies. NV
    Energy represents the utility archetype—a regulated, investment-grade counterparty purchasing geothermal power to meet
    statutory renewable energy requirements and serve ratepayer demand for reliable baseload clean generation. Google represents
    the hyperscaler archetype: a large technology company purchasing 24/7 carbon-free electricity to match data center load
    on an hourly basis, satisfying sustainability commitments that intermittent solar and wind cannot fulfill. Both archetypes
    prefer long-term PPA structures (20+ years) providing price certainty and eliminating renewable energy credit procurement
    complexity. The addressable market beyond current customers includes additional regulated utilities in western and southwestern
    states facing RPS compliance deadlines and hyperscalers (Microsoft, Amazon, Meta) with active 24/7 CFE procurement programs.
    Fervo''s unnamed counterparties for ~256 MW suggest initial diversification, but their identities and creditworthiness
    remain undisclosed, limiting risk assessment.'
  tableRefs:
  - TU001
  figureRefs:
  - FU002
- id: SU-SEC-03
  title: Named Customer Proof and Adoption Trajectory
  body: The most credible customer proof point is Project Red's 18+ months of continuous commercial delivery to Google since
    November 2023. This real-world operational track record—the first utility-scale EGS project delivering 24/7 firm electricity
    under a commercial PPA—validates Fervo's core technology claims and provides Google-level customer endorsement. Google's
    subsequent non-binding 3 GW framework signed in August 2024 suggests satisfaction with Project Red performance, though
    this framework carries no binding delivery obligation and conversion milestones remain undisclosed. Cape Station, with
    approximately 400 MW contracted to NV Energy, has not yet achieved commercial operations; NV Energy's commitment was underpinned
    by a Nevada PUC regulatory filing in January 2025. The adoption trajectory—from a 1.5 MW pilot (2021) to 658 MW binding
    backlog (2026)—represents rapid growth in contracted capacity, though actual power delivery remains concentrated in Project
    Red's 1.5 MW until Cape Station achieves COD.
  tableRefs:
  - TU002
  - TU003
  figureRefs:
  - FU003
- id: SU-SEC-04
  title: Retention, Durability, and Contract Stability
  body: 'Retention at Fervo Energy is structurally embedded in 20-25 year power purchase agreements rather than measured through
    SaaS metrics like net revenue retention, churn, or NPS. Binding contracts create high switching costs for counterparties
    who would need to replace firm, dispatchable renewable generation with equivalent alternatives requiring 3-5+ year procurement
    cycles. NV Energy''s retention probability is anchored by Nevada''s RPS mandate, creating a structural need for geothermal
    baseload that few alternative technologies can satisfy by 2030. Google''s Project Red retention is demonstrated by 18+
    months of continuous, uninterrupted delivery. Primary retention risks include: (1) NV Energy''s 2026 rate case subjecting
    Cape Station PPA to cost-effectiveness scrutiny; (2) Google''s growing interest in nuclear SMR PPAs as an alternative
    source of 24/7 CFE; and (3) Cape Station operational delays potentially triggering PPA performance provisions. Fervo has
    not disclosed whether termination for convenience, curtailment, or capacity performance penalty provisions exist in its
    PPAs.'
  tableRefs:
  - TU004
  figureRefs:
  - FU004
- id: SU-SEC-05
  title: Expansion Pathway and Customer Concentration Risk
  body: Customer concentration is the defining structural risk in Fervo Energy's customer profile. NV Energy and Google together
    account for essentially all publicly named contracted revenue; NV Energy alone represents approximately 61% of named binding
    MW. This concentration is explicitly disclosed as a key risk factor in Fervo's S-1, with the company acknowledging that
    the loss of either customer could have a material adverse effect on revenues and funding. The expansion path depends on
    converting the 15+ GW development pipeline into binding PPAs with new counterparties. Fervo's Axios-sourced outreach to
    additional US utilities in 2025 suggests commercial activity beyond current customers, but no additional binding commitments
    have been publicly disclosed. Google's 3 GW non-binding framework represents the largest potential expansion lever, but
    competing technologies (nuclear SMR) may reduce Google's geothermal commitment appetite in 2026 and beyond. Diversification
    to three or more binding counterparties—each representing less than 30% of contracted revenue—would materially reduce
    concentration risk and represents a critical pre-and post-IPO milestone to monitor.
  tableRefs:
  - TU005
