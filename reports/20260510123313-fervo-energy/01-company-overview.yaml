chapter:
  number: 1
  title: Company Overview
  summary: >-
    Fervo Energy, founded in 2017 by Tim Latimer and Jack Norbeck, is a San Francisco-based
    enhanced geothermal systems (EGS) company applying horizontal drilling, multi-stage hydraulic
    fracturing, and distributed fiber optic sensing to generate reliable 24/7 carbon-free
    electricity. Its flagship Cape Station project (500 MW, Utah) is the world's largest planned
    EGS installation, with Phase 1 targeting October 2026 commercial operations. Fervo has raised
    over $1 billion in equity, including a $462M Series E in December 2025 anchored by Google,
    and filed an S-1 in April 2026 targeting a $1.25 billion IPO at approximately $6.5 billion
    valuation on Nasdaq (FRVO). With 658 MW of binding power purchase agreements and a 15+ GW
    development pipeline across approximately 475,000 net acres, Fervo is positioned as the
    primary scaled EGS developer globally, but remains pre-commercial with $138,000 in 2025
    revenue, a $57.8M net loss, and $465.7M in capital expenditures.

sections:
  - id: section-identity
    title: Company Identity, Mission, and Business Model
    body: >-
      Fervo Energy was incorporated in 2017 and is headquartered in San Francisco, California,
      with active operations in Utah and Nevada. The company's mission is to provide 24/7
      carbon-free baseload power through the development of next-generation geothermal energy,
      specifically enhanced geothermal systems (EGS). Fervo's one-line business model: apply
      oil-and-gas horizontal drilling techniques to create engineered underground heat reservoirs
      that generate reliable, dispatchable carbon-free electricity regardless of weather or time
      of day. The company's unique value proposition is converting the geothermal resource base
      — which the DOE estimates is orders of magnitude larger than the currently developed
      installed base — into scalable, bankable, utility-grade power assets. As of March 2026,
      Fervo employs approximately 225 people and has filed a registration statement on Form S-1
      with the Securities and Exchange Commission targeting an IPO on the Nasdaq exchange under
      the ticker FRVO with a stated raise target of $1.25 billion at approximately $6.5 billion
      valuation. The company has secured binding power purchase agreements for 658 MW of capacity
      representing approximately $7.2 billion in potential contracted revenue, and Google has
      signed a non-binding framework for up to 3 GW of additional capacity.
    claimRefs: [CO001, CO002, CO003, CO004, CO005, CO039, CO040]
    tableRefs: [TO001]
    figureRefs: [FO003]

  - id: section-technology
    title: Technology and Operational Footprint
    body: >-
      Fervo's core technology — Enhanced Geothermal Systems (EGS) — distinguishes it from
      conventional hydrothermal geothermal plants by engineering the underground reservoir rather
      than relying on naturally occurring hot water or steam. The process involves drilling
      horizontal wells into hot basement rock, then applying multi-stage hydraulic fracturing
      (adapted from shale oil-and-gas practice) to create permeability networks connecting
      injector and producer wells. Distributed fiber optic sensing is deployed downhole to
      monitor reservoir behavior in real time, enabling optimization that was not possible in
      prior EGS attempts. Extracted geothermal brine drives an Organic Rankine Cycle (ORC)
      turbine at surface to generate electricity. The company's GeoBlock Factory initiative
      is a standardized, modular deployment system designed to reduce per-well and per-project
      costs through factory-style repeatability. Cape Station, located in Beaver County, Utah,
      is the world's largest planned EGS project with 500 MW total planned capacity: Phase 1
      targets 100 MW of commercial delivery by October 2026, and Phase 2 targets 400 MW by
      2028. Corsac Station in Nevada is a 115 MW project contracted primarily to serve Google
      and NV Energy. Project Red was the company's first EGS pilot in Utah, successfully
      validating the horizontal drilling and fracturing approach at field scale in 2022. Fervo
      controls approximately 475,000 net acres of geothermal land and has a development pipeline
      exceeding 15 GW.
    claimRefs: [CO015, CO016, CO017, CO018, CO019, CO020, CO021, CO022, CO023, CO024]
    tableRefs: []
    figureRefs: [FO001, FO002]

  - id: section-leadership
    title: Founders and Leadership
    body: >-
      Fervo was co-founded by Tim Latimer (CEO and Board Chair) and Dr. Jack Norbeck (CTO).
      Latimer holds a Stanford MBA and MS, has a background as a petroleum engineer, and brings
      rare cross-domain expertise in both oil-and-gas drilling practice and energy business
      development; he is broadly credited with recognizing that shale horizontal drilling
      technology could be re-applied to geothermal resource development. Norbeck holds a PhD
      in Earth Science from Stanford and completed a postdoctoral fellowship at the United States
      Geological Survey (USGS), giving him deep geoscience and reservoir engineering expertise
      that underpins Fervo's subsurface technology. The executive team has expanded significantly
      ahead of the IPO: David Ulrey serves as CFO overseeing capital markets strategy and IPO
      readiness; Sarah Jewett leads SVP Strategy shaping hyperscaler partnerships; Dawn Owens
      as SVP Development manages the project pipeline including Cape Station expansion; Gustavo
      Torres serves as SVP and General Counsel managing regulatory approvals, land rights, and
      PPA legal structures; Quinn Woodard Jr. leads VP Operations for drilling and field
      execution; and Christian Gradl leads the SVP GeoBlock Factory standardization initiative.
      Margaret C. Whitman, former CEO of HP and eBay, serves as Lead Independent Director,
      providing governance oversight and public-company experience ahead of the IPO.
    claimRefs: [CO006, CO007, CO008, CO009, CO010, CO011, CO012, CO013, CO014]
    tableRefs: [TO002]
    figureRefs: []

  - id: section-funding
    title: Funding History and Capital Structure
    body: >-
      Fervo has assembled a complex, multi-source capital structure spanning equity rounds,
      strategic investments, and project debt, totaling well over $1.5 billion in aggregate
      capital raised through April 2026. The company's first institutional capital was a $28M
      Series A in 2021 from Breakthrough Energy Ventures (BEV), the climate-technology fund
      backed by Bill Gates, establishing early mission-aligned investor credibility. A $138M
      Series B co-led by DCVC and Capricorn Investment Group in 2022 provided runway for
      Project Red validation and early Cape Station development. February 2024 brought a
      landmark $244M Series D strategic investment from Devon Energy Corporation, an upstream
      oil-and-gas major whose participation both validated horizontal drilling applicability and
      provided supply-chain relationships. December 2024 added a $255M combined financing
      (Series D extension from Capricorn at $135M plus $120M in debt from Mercuria, a major
      commodity trading firm). In June 2025, BEV led an additional $206M round split between
      $100M equity and $106M debt. December 2025 brought the company's largest round: a $462M
      Series E co-led by B Capital with Google as anchor investor, simultaneously validating
      both the investment thesis and commercial relationship. Fervo announced its IPO in January
      2026 targeting $1.25 billion at approximately $6.5 billion valuation, filed its S-1 in
      April 2026, and closed $421M in project debt from a JPMorgan-led institutional syndicate
      in March 2026 to finance Cape Station construction. Financially, Fervo remains
      pre-commercial: 2025 revenue was $138,000 (down from $199,000 in 2024), 2025 net loss
      was $57.8M (vs. $41.1M in 2024), and 2025 capital expenditures reached $465.7M. Cash
      stood at $461.8M on December 31, 2025. IPO success depends critically on Cape Station
      Phase 1 reaching the October 2026 commercial milestone on schedule.
    claimRefs: [CO025, CO026, CO027, CO028, CO029, CO030, CO031, CO032, CO033, CO034, CO035, CO036, CO037, CO038, CO039]
    tableRefs: [TO003]
    figureRefs: []

  - id: section-milestones
    title: Milestones and Governance
    body: >-
      Fervo's history from founding to IPO filing spans nine years and includes significant
      milestones across founding, technology validation, financing, and regulatory progression.
      The 2022 success of Project Red — the first field-scale demonstration of EGS using
      horizontal drilling in Utah — was the pivotal technical milestone that converted investor
      skepticism into conviction and enabled the Series D and subsequent capital formation.
      Devon Energy's strategic investment in 2024 marked the first time a major oil-and-gas
      company committed capital at scale to EGS technology, adding industry credibility and
      operational knowhow. Google's participation in the Series E as an anchor investor in
      December 2025 simultaneously validated the commercial demand for 24/7 carbon-free
      geothermal power for data center load and gave Fervo its largest equity round. The
      company's governance structure includes a board with Margaret C. Whitman as Lead
      Independent Director, providing seasoned public-company oversight appropriate for a
      company entering the public markets. Adverse considerations include the entirely
      pre-commercial revenue base, substantial ongoing capital requirements, subsurface
      geotechnical risk inherent in EGS development, permitting complexity on federal and
      state lands, and the concentration of near-term value creation in the October 2026
      Cape Station Phase 1 milestone. The S-1 filed in April 2026 with the SEC discloses
      these risks in detail and provides audited financial statements for investor review.
    claimRefs: [CO004, CO022, CO027, CO030, CO031, CO041, CO042]
    tableRefs: [TO004]
    figureRefs: []

