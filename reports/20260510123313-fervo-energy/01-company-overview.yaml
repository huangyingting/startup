  evidenceGaps:
    - topic: "Cape Station construction current status"
      type: stale
      severity: material
      missingEvidence: >-
        Independent field-level verification of Cape Station Phase 1 well count, completion
        stages, ORC equipment procurement status, and grid interconnection progress as of
        May 2026; the most recent third-party reporting is from March 2026.
      whyItMatters: >-
        The October 2026 Cape Station Phase 1 target is the single most critical milestone
        underpinning the IPO valuation narrative; any delay or underperformance discovered
        post-IPO filing would be material to investors.
      diligencePath: >-
        Request construction progress reports from management, engage independent engineering
        consultants to assess wellbore performance data and ORC commissioning schedule, and
        review grid interconnection queue filings with relevant utility operators.
      relatedQuestionRefs: [QO015]
      relatedTableRefs: [TO004]

    - topic: "EGS cost structure vs incumbent power sources"
      type: missing-source
      severity: material
      missingEvidence: >-
        Published, independent LCOE or per-MW capital cost comparison between Fervo's EGS
        approach and conventional geothermal, nuclear small modular reactors, offshore wind,
        and long-duration storage alternatives; company has not publicly disclosed unit economics.
      whyItMatters: >-
        Investors cannot independently assess whether Fervo's cost trajectory supports a
        compelling $/MWh at commercial scale without independent LCOE benchmarks.
      diligencePath: >-
        Commission or identify third-party energy economics reports on EGS LCOE trajectories;
        request unit economics disclosure from management under NDA as part of IPO diligence;
        compare to NREL and DOE EGS cost projections in published research.
      relatedQuestionRefs: [QO019]
      relatedTableRefs: []

    - topic: "PPA terms and counterparty credit quality"
      type: private-evidence-only
      severity: material
      missingEvidence: >-
        Full PPA contract details for the 658 MW binding portfolio, including counterparty
        identities, credit ratings, termination provisions, price escalation mechanisms,
        delivery obligation schedule, and force majeure definitions.
      whyItMatters: >-
        The $7.2 billion potential revenue backlog is entirely dependent on PPA counterparty
        credit quality and contract robustness; without these details, investors cannot
        assess revenue realization risk.
      diligencePath: >-
        Obtain PPA contract summaries from S-1 exhibits; engage energy counsel to review
        termination provisions and counterparty creditworthiness; request management disclosure
        of counterparty names and credit ratings under standard IPO diligence process.
      relatedQuestionRefs: [QO020]
      relatedTableRefs: [TO003]

    - topic: "Leadership and founder table completeness"
      type: enumeration-incomplete
      severity: minor
      missingEvidence: >-
        Complete disclosure of all Fervo Energy board members, independent directors, and
        senior executives not yet publicly named; the current leadership table is a sample
        of publicly confirmed executives only.
      whyItMatters: >-
        Full governance picture including all board members, compensation committee members,
        and audit committee composition is relevant for IPO readiness assessment and
        governance quality evaluation.
      diligencePath: >-
        Review the S-1 proxy statement and governance disclosures for complete board and
        executive team composition; cross-reference SEC filings for any officer or director
        disclosures filed under Section 16.
      relatedQuestionRefs: []
      relatedTableRefs: [TO002]

    - topic: "Stakeholder or investor map completeness"
      type: enumeration-incomplete
      severity: minor
      missingEvidence: >-
        Complete cap table including all investor economic stakes, pro-rata rights, board
        representation agreements, side letters, and the full economic waterfall at IPO;
        information on smaller LP investors not publicly disclosed.
      whyItMatters: >-
        The full investor governance structure including anti-dilution provisions, registration
        rights, and economic preferences affects IPO economics for public market investors.
      diligencePath: >-
        Obtain the complete cap table from S-1 registration statement exhibits; review
        investor rights agreements and voting agreements disclosed in S-1 exhibits; engage
        legal counsel to assess economic waterfall and IPO mechanics.
      relatedQuestionRefs: []
      relatedTableRefs: [TO003]

    - topic: "Adverse events and litigation history"
      type: missing-source
      severity: material
      missingEvidence: >-
        Independent verification that no material lawsuits, regulatory enforcement actions,
        environmental violations, safety incidents, or leadership misconduct allegations exist
        against Fervo Energy or its key executives beyond what is disclosed in the S-1.
      whyItMatters: >-
        Undisclosed adverse events could impair the IPO and represent material risks for
        investors; the S-1 risk factors section is company-authored and may not capture
        all material adverse information.
      diligencePath: >-
        Conduct independent litigation search via PACER and state court databases; engage
