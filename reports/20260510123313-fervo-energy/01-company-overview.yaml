callouts:
  - calloutType: strength
    title: "EGS Technology Validated at Field Scale via Project Red"
    body: >-
      Fervo's successful demonstration of EGS at field scale through Project Red in 2022
      addresses the primary technical de-risking hurdle that has historically constrained
      geothermal expansion. The application of horizontal drilling, multi-stage fracturing,
      and distributed fiber optic sensing — borrowed from mature shale O&G practice — provides
      a repeatable, measurable approach that conventional geothermal lacked. Devon Energy's
      $244M strategic investment in 2024, made with full awareness of the technology from an
      operator's perspective, provides third-party technical validation from a party uniquely
      qualified to assess subsurface drilling risk.
    claimRefs: [CO015, CO022, CO027]

  - calloutType: risk
    title: "Pre-Commercial Revenue Stage With Substantial Capital Intensity"
    body: >-
      With $138,000 in 2025 revenue against a $57.8M net loss and $465.7M in capital
      expenditures, Fervo remains entirely pre-commercial. The company's IPO success
      depends critically on Cape Station Phase 1 reaching 100 MW commercial operations by
      October 2026 on schedule and on budget. Any delay in Cape Station milestones, permitting
      setback, or cost overrun would materially impair the IPO narrative and may strain the
      capital structure ahead of Phase 2. The pre-commercial revenue base also creates a
      wide valuation sensitivity range that investors must assess against the development timeline.
    claimRefs: [CO033, CO035, CO037, CO019, CO031]

  - calloutType: recommendation
    title: "Independently Verify Cape Station Phase 1 Progress and PPA Binding Terms"
    body: >-
      Investors should conduct independent verification of Cape Station Phase 1 construction
      progress toward the October 2026 target, including well count, completion stages,
      ORC equipment procurement, and grid interconnection status. Additionally, full PPA
      contract details — including counterparty credit quality, termination rights, price
      escalation provisions, and force majeure definitions — should be obtained from the S-1
      exhibits and legal counsel review. The $7.2 billion potential revenue backlog is
      contingent on these terms and the company's ability to deliver contracted capacity.
    claimRefs: [CO019, CO039, CO004]

  - calloutType: insight
    title: "Google as Both Investor and Offtaker Creates Alignment and Concentration Risk"
    body: >-
      Google's participation as anchor investor in the Series E and its non-binding framework
      for up to 3 GW, combined with Corsac Station as an active delivery obligation, makes
      Google simultaneously a financial stakeholder and the single most important revenue
      counterparty in Fervo's commercial pipeline. This dual role creates strong alignment
      around 24/7 carbon-free energy delivery for data centers but also creates a material
      concentration: any deterioration in the Google commercial relationship — whether from
      Google's own energy strategy shifts, regulatory changes, or contract disputes — would
      simultaneously affect both the investor base and the primary revenue pipeline.
    claimRefs: [CO021, CO030, CO040]

