      - number: '8.3'
        title: Investment Thesis Risks and Final Diligence Asks
        blocks:
          - type: paragraph
            body: >-
              The investment thesis for Fervo Energy rests on four sequential assumptions, each of which must hold for
              the target valuation to be realized: (1) Cape Station Phase 1 delivers 100 MW of commercial operations on
              schedule by October 2026 without material cost overruns; (2) the GeoBlock Factory cost reduction
              trajectory from $7,000/kW to $3,000/kW begins to show measurable progress through Phase 2 and subsequent
              projects; (3) Google's non-binding 3 GW framework advances toward binding PPA commitments, cementing
              long-term revenue visibility; and (4) the regulatory and seismicity environment remains permissive across
              the development lifecycle. The anti-thesis is equally clear: at $6.5B, investors are paying for perfection
              on a first-of-kind technology. Cape Station Phase 1 delivery failure would eliminate $7.2B of PPA revenue
              backlog, trigger debt covenant risk, and expose the full accumulated deficit against a pre-commercial
              asset base. The thesis-break triggers include any Phase 1 operational failure or delay beyond Q2 2027, any
              induced seismicity event requiring regulatory shutdown of injection operations, Google's withdrawal from
              the 3 GW framework, or any adverse capital market development that impairs access to the equity and debt
              capital needed to fund Phase 2. Final diligence asks before IPO participation include: (1) independent
              engineering verification of Phase 1 well count, completion performance, and ORC procurement status; (2)
              full PPA contract terms including counterparty credit quality, pricing per MWh, escalation, and
              termination; (3) seismicity monitoring protocol thresholds and current background seismicity data at the
              Cape Station site; (4) complete cap table waterfall at IPO including pro-rata rights and lock-up
              provisions; and (5) unit economics disclosure including per-well cost and LCOE projections at Phase 1 and
              Phase 2 scale. The strength of this diligence package will determine whether an IPO investment can be
              underwritten at the top, middle, or bottom of the $21-24/share range — or whether a post-IPO entry after
              Phase 1 delivery is the superior risk-adjusted approach.
            claimRefs:
              - CV029
              - CV031
              - CV032
              - CV033
              - CV034
              - CV035
              - CV036
              - CV037
              - CV038
