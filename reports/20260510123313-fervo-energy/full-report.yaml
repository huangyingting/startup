      - number: '6.2'
        title: Customer Segmentation and Buyer Profiles
        blocks:
          - type: paragraph
            body: >-
              Fervo Energy serves two distinct customer archetypes: regulated utilities and hyperscale technology
              companies. NV Energy represents the utility archetype—a regulated, investment-grade counterparty
              purchasing geothermal power to meet statutory renewable energy requirements and serve ratepayer demand for
              reliable baseload clean generation. Google represents the hyperscaler archetype: a large technology
              company purchasing 24/7 carbon-free electricity to match data center load on an hourly basis, satisfying
              sustainability commitments that intermittent solar and wind cannot fulfill. Both archetypes prefer
              long-term PPA structures (20+ years) providing price certainty and eliminating renewable energy credit
              procurement complexity. The addressable market beyond current customers includes additional regulated
              utilities in western and southwestern states facing RPS compliance deadlines and hyperscalers (Microsoft,
              Amazon, Meta) with active 24/7 CFE procurement programs. Fervo's unnamed counterparties for ~256 MW
              suggest initial diversification, but their identities and creditworthiness remain undisclosed, limiting
