      - number: '6.4'
        title: Retention, Durability, and Contract Stability
        blocks:
          - type: paragraph
            body: >-
              Retention at Fervo Energy is structurally embedded in 20-25 year power purchase agreements rather than
              measured through SaaS metrics like net revenue retention, churn, or NPS. Binding contracts create high
              switching costs for counterparties who would need to replace firm, dispatchable renewable generation with
              equivalent alternatives requiring 3-5+ year procurement cycles. NV Energy's retention probability is
              anchored by Nevada's RPS mandate, creating a structural need for geothermal baseload that few alternative
              technologies can satisfy by 2030. Google's Project Red retention is demonstrated by 18+ months of
              continuous, uninterrupted delivery. Primary retention risks include: (1) NV Energy's 2026 rate case
              subjecting Cape Station PPA to cost-effectiveness scrutiny; (2) Google's growing interest in nuclear SMR
              PPAs as an alternative source of 24/7 CFE; and (3) Cape Station operational delays potentially triggering
              PPA performance provisions. Fervo has not disclosed whether termination for convenience, curtailment, or
