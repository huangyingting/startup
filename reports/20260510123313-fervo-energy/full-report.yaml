  - number: 5
    title: Product & Technology
    sections:
      - number: '5.1'
        title: Product Definition in Customer Workflow Terms
        blocks:
          - type: paragraph
            body: >-
              Fervo Energy's core product is firm, dispatchable, 24/7 carbon-free electricity delivered to utilities and
              large commercial buyers under long-term power purchase agreements of 15–25 years. In the customer
              workflow, a utility or corporate buyer signs a fixed-price baseload PPA for a contracted block of
              megawatts; Fervo then engineers, constructs, and operates the underground geothermal system that delivers
              the contracted output at a grid interconnect. Unlike wind and solar, the EGS resource — heat stored in the
              Earth's crust — is constant and not weather-dependent, making Fervo's output behave like a conventional
              thermal baseload plant but with zero fuel cost and near-zero carbon emissions.

              For corporate buyers like Google, Fervo solves a specific problem: powering energy-intensive data centers
              with provable 24/7 carbon-free electricity that matches actual load hour by hour, not just on an annual
              average basis. Annual-match wind and solar PPAs leave a residual carbon footprint in overnight or cloudy
              hours when generation is zero; Fervo's EGS closes that gap with firm around-the-clock carbon-free
              generation. For utilities, the product satisfies integrated resource plan requirements for dispatchable
              firm clean capacity that variable renewables alone cannot fulfill.

              Fervo's secondary product is PowerFlex, a reservoir management platform enabling the plant to modulate
              output ±20% in response to real-time grid signals. This transforms the EGS plant from a fixed-output
              baseload resource into a flexible clean firm generator capable of frequency regulation, dispatchable
              ramping, and capacity market participation — a meaningful pricing premium over strictly baseload operation
              and an important differentiation from wind and solar in grid operator value terms.
            claimRefs:
