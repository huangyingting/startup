  - id: TV003
    title: Bull / base / bear scenario table
    columns:
      - Scenario
      - Key Assumptions
      - Implied Valuation Range
      - Probability Signal
      - Key Risks to This Scenario
    rows:
      - - Bull
        - >-
          Phase 1 delivers 100 MW by Q4 2026 on or below budget; GeoBlock Factory shows first cost improvements; Google
          3 GW advances toward binding; power demand premium holds; IPO market constructive
        - $8-10B enterprise value; ~$9-11/share post-IPO upside from midpoint
        - 25-30% — requires all execution assumptions to hold simultaneously
        - Phase 1 delay by even 2 months compresses bull trajectory; any seismicity event eliminates scenario
      - - Base
        - >-
          Phase 1 delivers with minor delays (Q1 2027 at latest); GeoBlock Factory on plan; Google relationship stable;
          IPO pricing at $21-22/share; capital markets neutral
        - $5-7B enterprise value; approximately inline with IPO midpoint
        - 45-50% — plausible but requires Phase 1 delivery within modest tolerance
        - Assumes no adverse seismicity, no regulatory intervention, and stable capital markets through 2027
      - - Bear
        - >-
          Phase 1 delayed 6+ months; LCOE above $100/MWh at Phase 1; induced seismicity event triggers regulatory
          review; capital market conditions deteriorate post-IPO
        - $2-3B enterprise value; material impairment from IPO price
        - 20-25% — low probability but non-negligible given first-of-kind execution risk
        - Assumes no complete project abandonment; partial recovery if Phase 1 eventually delivers at higher cost
      - - Catastrophic Tail
        - >-
          Phase 1 fails completely (seismicity shutdown or well abandonment); Google investor relationship terminates;
          capital markets close to clean energy IPOs
        - Below $1B; near-total loss of pre-money equity at IPO
        - 5% — very low probability; represents combination of multiple adverse tail events
        - >-
          This scenario destroys virtually all equity value; PPA revenue backlog collapses and debt takes control of
          assets
      - - Summary
        - >-
          Base case implies modest upside from IPO midpoint; bull case requires near-perfect execution; bear case is
          material downside from any IPO price
        - 'Range: $1-10B; midpoint at base assumptions: ~$6B'
        - Monitor Phase 1 milestone delivery as primary probability signal
        - Independent engineering verification is the most valuable diligence step to tighten scenario probabilities
    notes: >-
      Scenario probability signals are subjective assessments based on the evidence available as of May 10, 2026. They
      are not actuarial estimates. Phase 1 milestone delivery by Q4 2026 is the single most important
      probability-shifting event for all scenarios.
