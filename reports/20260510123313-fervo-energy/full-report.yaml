              Google's participation as anchor investor in the Series E and its non-binding framework for up to 3 GW,
              combined with Corsac Station as an active delivery obligation, makes Google simultaneously a financial
              stakeholder and the single most important revenue counterparty in Fervo's commercial pipeline. This dual
