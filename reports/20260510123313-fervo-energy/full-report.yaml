  - number: 7
    title: Risks
    sections:
      - number: '7.1'
        title: Competitive Landscape Overview
        blocks:
          - type: paragraph
            body: >-
              Fervo Energy operates at the intersection of three competitive forces: enhanced geothermal systems (EGS)
              developers deploying similar horizontal drilling and fracturing approaches, conventional geothermal
              operators expanding into engineered systems, and adjacent 24/7 clean baseload technologies competing for
              the same long-duration power procurement demand. In the EGS category, Fervo faces Eavor Technologies,
              whose closed-loop Eavor-Loop system circulates working fluid through a drilled network without contacting
              the rock formation, eliminating induced seismicity risk at the cost of lower temperature access and
              narrower geographic applicability. Sage Geosystems targets hot dry rock geothermal combined with
              pressurized fluid energy storage, signed a 150 MW PPA with Meta in 2024, and was selected for a DoD
              feasibility study at Fort Bliss Army Base. AltaRock Energy and XGS Energy represent earlier-stage EGS
              commercialization efforts backed by DOE grants and early corporate PPAs respectively, though neither has
              achieved commercial-scale operations. GreenFire Energy operates closed-loop geothermal retrofit technology
              backed by Baker Hughes and secured a DoD Naval Air Facility El Centro feasibility study in 2024. Ormat
              Technologies (NYSE: ORA) is the dominant publicly traded geothermal operator with approximately 1,500 MW
              of operating capacity and $800M in 2024 revenue at roughly 15x EV/EBITDA, representing the market
              comparable most relevant to Fervo's post-commercial valuation. Adjacent technologies competing for 24/7
              CFE procurement demand include utility-scale solar plus battery storage (rapidly declining LCOE but
              limited duration), advanced nuclear SMRs (Kairos, TerraPower, NuScale targeting late 2020s commercial
              deployment), and pumped storage hydro. Fervo's 475,000-acre geothermal rights portfolio, Project Red
              operating track record, and 658 MW of binding PPAs provide competitive differentiation, but the land
              position and technology lead are defensible only if Cape Station Phase 1 delivers on schedule and
              validates EGS at commercial scale. A single competitor demonstration at comparable scale would
              substantially compress Fervo's first-mover premium in PPA negotiations and IPO pricing.
            claimRefs:
              - CR006
              - CR011
              - CR014
              - CR015
              - CR024
              - CR025
              - CR032
