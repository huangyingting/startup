      - number: '2.2'
        title: Market Sizing — TAM, SAM, and SOM
        blocks:
          - type: paragraph
            body: >-
              Market sizing for EGS power requires multiple lenses because no single analyst dataset isolates the EGS
              sub-market from the broader geothermal sector. The global geothermal power market was valued at
              approximately $9.2 billion in 2024 by Grand View Research, with MarketsandMarkets projecting a 10.3% CAGR
              through 2030, implying a global TAM of $15-25 billion by 2030. This top-down estimate captures all
              geothermal technology types and geographies but significantly understates the long-run US EGS potential,
              which NREL's January 2026 report estimates at 90 GW by 2050 under favorable scenarios and the DOE cites as
              100+ GW of technical potential today. Translating technical potential into dollar terms: at an assumed PPA
              price of $80-100/MWh and 100 GW operating at 95% capacity factor, the theoretical US annual revenue TAM
              exceeds $65 billion — though this assumes full resource conversion, which will take decades and depends on
              cost reduction trajectories. A more constrained US serviceable addressable market (SAM) for EGS firm clean
              power covers the hyperscaler and utility CFE demand expected to emerge over 2025-2035. Tech company 24/7
              CFE commitments and AI-driven load growth suggest 20-50 GW of demand for firm carbon-free power by 2035,
              of which EGS could serve 5-15 GW — implying a US EGS SAM of $8-15 billion annually at maturity. Fervo's
              current serviceable obtainable market (SOM) is anchored by 658 MW in binding PPAs representing
              approximately $7.2 billion in potential contracted revenue, plus a non-binding 3 GW framework with Google
              that, if converted, could add tens of billions in revenue backlog. Cape Station Phase 1's 100 MW
              commercial target in October 2026 represents Fervo's first SOM realization step.
