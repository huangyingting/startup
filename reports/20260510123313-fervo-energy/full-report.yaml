        sensing stack.
  foundingLocation: San Francisco, CA
  headquarters: San Francisco, CA (global HQ); Milford, UT (Cape Station operations)
  productSummary: >-
    Fervo's flagship product is utility-scale enhanced geothermal power delivered under long-term power purchase
    agreements (PPAs). Cape Station Phase 1 (100 MW) targets commercial delivery in October 2026 under a PPA with NV
    Energy; Phase 2 (400 MW) is targeted for 2028. The GeoBlock Factory program standardizes EGS well construction to
    drive down drilling cost and time. Fervo also operates Project Red (1.5 MW) in Nevada as a commercial pilot and
    proof-of-concept for its EGS stack. The full development pipeline exceeds 15 GW across approximately 475,000 net
    acres.
  customerFocus: >-
    Primary customers are large utilities and hyperscale technology companies seeking 24/7 carbon-free electricity.
