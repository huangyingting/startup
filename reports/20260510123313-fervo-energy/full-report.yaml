chapters:
  - number: 1
    title: Company Overview
    sections:
      - number: '1.1'
        title: Company Identity, Mission, and Business Model
        blocks:
          - type: paragraph
            body: >-
              Fervo Energy was incorporated in 2017 and is headquartered in San Francisco, California, with active
              operations in Utah and Nevada. The company's mission is to provide 24/7 carbon-free baseload power through
              the development of next-generation geothermal energy, specifically enhanced geothermal systems (EGS).
              Fervo's one-line business model: apply oil-and-gas horizontal drilling techniques to create engineered
              underground heat reservoirs that generate reliable, dispatchable carbon-free electricity regardless of
              weather or time of day. The company's unique value proposition is converting the geothermal resource base
              — which the DOE estimates is orders of magnitude larger than the currently developed installed base — into
              scalable, bankable, utility-grade power assets. As of March 2026, Fervo employs approximately 225 people
              and has filed a registration statement on Form S-1 with the Securities and Exchange Commission targeting
              an IPO on the Nasdaq exchange under the ticker FRVO with a stated raise target of $1.25 billion at
              approximately $6.5 billion valuation. The company has secured binding power purchase agreements for 658 MW
              of capacity representing approximately $7.2 billion in potential contracted revenue, and Google has signed
              a non-binding framework for up to 3 GW of additional capacity.
