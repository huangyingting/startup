      - number: '7.6'
        title: Key-Person and Organizational Risk
        blocks:
          - type: paragraph
            body: >-
              Fervo Energy's technology advantage is substantially concentrated in the intellectual capital of its two
              co-founders. CEO Tim Latimer holds an MS in Energy Resources Engineering from Stanford University, brings
              oil and gas drilling and completions experience from prior industry roles, and leads Fervo's executive
              team, investor relations, and IPO process. CTO Jack Norbeck holds a Stanford PhD in Energy Resources
              Engineering and serves as the primary technical architect of Fervo's horizontal EGS drilling and fiber
              optic reservoir monitoring approach. Both founders developed the core technology framework at Stanford and
              hold critical institutional knowledge about the stimulation design, wellbore architecture, and subsurface
              interpretation methodology that differentiates Fervo from competitors. The departure of either founder
              before Cape Station Phase 1 reaches commercial operations would represent a material adverse event that is
              unlikely to be fully compensated by any single hire. As a pre-commercial company with approximately 225
              employees, Fervo lacks the organizational depth to fully replicate founder-concentrated technical and
              commercial functions in the near term. The IPO process itself creates key-person distraction risk as
              senior leadership diverts time to investor roadshow, SEC comment periods, and public market governance
              requirements during the most critical construction execution window. Post-IPO, lock-up expiration and
              liquid equity will create founder and senior executive retention risk from competing offers. Investors
              should request multi-year employment agreements, unvested equity schedules, and succession plans for the
              CEO and CTO roles as a condition of IPO investment.
            claimRefs:
              - CR019
          - type: table
            tableRef: TR005
            claimRefs:
              - CR019
      - number: '7.7'
        title: Risk Mitigation Strategies
        blocks:
          - type: paragraph
            body: >-
              Fervo has assembled a set of risk mitigations that are meaningful but not fully tested at commercial
              scale. The most important is the seismicity traffic-light protocol implemented at Project Red and Cape
              Station: accelerometers and fiber optic distributed acoustic sensing (DAS) continuously monitor ground
              motion, with preset thresholds triggering injection reduction (yellow), pause (orange), and halt (red) to
              prevent magnitude escalation. Project Red's 18+ months of commercial operations to Google without a
              material seismic event provides the strongest operational proof of the protocol's effectiveness, though
              Nevada geology differs from Beaver County, Utah. GeoBlock Factory standardization addresses technology
              risk by systematizing drilling and completion procedures to reduce per-well cost variance and accelerate
              learning curves. The $461.8M cash position as of early 2026 provides a construction contingency buffer,
              and the Devon Energy strategic partnership brings operational credibility and potential co-investment
              capacity for site-level execution challenges. DOE EGS Earthshot program support — including the Project
              Red pilot grant and subsequent funding commitments — provides government-backed technology validation and
              partial cost subsidy for stimulation R&D. The DoD feasibility study selection at NAS Fallon, Nevada
              validates military-grade operational rigor standards for Fervo's EGS approach. Diversified PPA
              counterparties beyond Google (NV Energy plus undisclosed parties totaling 658 MW) reduce
              single-counterparty termination risk, though concentration remains high. Thesis-break monitoring triggers
              investors should track: Cape Station Phase 1 COD announcement, EPA UIC permit status updates, Google
              framework binding conversion events, JPMorgan covenant compliance certifications, and competing EGS
              commercial milestones from Eavor and Sage.
