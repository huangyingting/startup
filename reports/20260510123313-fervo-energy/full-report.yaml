      - number: '2.4'
        title: Growth Drivers and Adoption Constraints
        blocks:
          - type: paragraph
            body: >-
              The EGS power market benefits from several structural tailwinds that create a favorable adoption
              environment through the 2030s. The most material driver is the AI-induced surge in data center electricity
              demand: US data centers currently consume approximately 200 TWh per year (roughly 4-5% of total US
              electricity consumption) and are growing at 15-25% annually as hyperscalers expand GPU-intensive training
              and inference infrastructure. This load growth directly translates to procurement demand for 24/7
              carbon-free baseload supply, creating the premium-price buyer segment that defines Fervo's opportunity.
              The Inflation Reduction Act of 2022 provides a second critical tailwind: geothermal projects qualify for a
              30-50% Investment Tax Credit (ITC) or a $27.50-55/MWh Production Tax Credit (PTC), reducing Fervo's
              effective LCOE by hundreds of millions of dollars over a project's life and enabling project financing at
              cost structures that were not viable pre-IRA. The DOE's Enhanced Geothermal Shot — a 2022 initiative
              targeting a cost reduction to $45/MWh by 2035 — provides policy commitment and R&D co-investment that
              de-risks EGS technology maturation. Oil-and-gas horizontal drilling technology transfer (exemplified by
              Devon Energy's partnership) continues to reduce per-well costs. Offsetting these tailwinds are material
              constraints. EGS capital intensity of $4-8M/MW versus $1-2M/MW for utility-scale solar limits deployment
              velocity and requires large project debt facilities. Subsurface geological risk — the possibility of
              drilling underperforming wells — cannot be fully eliminated before drilling begins. Grid interconnection
              backlogs of 3-5 years in the western US limit near-term project completion timelines even for fully
              financed projects. A limited specialized workforce combining geoscience, petroleum engineering, and power
              generation expertise constrains scale-up speed.
