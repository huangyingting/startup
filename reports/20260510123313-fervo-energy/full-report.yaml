      - number: '8.4'
        title: IPO Market Context and Funding History
        blocks:
          - type: paragraph
            body: >-
              Fervo Energy S-1 registration statement filed with the SEC on April 17 2026 under CIK 0001853868 targets a
              raise of up to 1.25 billion dollars at a maximum valuation of approximately 6.5 billion with an indicated
              share price range of 21 to 24 dollars listing on Nasdaq under ticker FRVO. The IPO represents the
              culmination of a rapid private fundraising progression across multiple rounds. The Series B in 2022
              implied approximately 1 billion dollars valuation establishing the early institutional anchor. Devon
              Energy invested 244 million dollars in the Series D in February 2024 at approximately 1.4 billion implied
              valuation. The 462 million dollar Series E in December 2025 with Google as the anchor investor implied
              approximately 2.9 billion dollars valuation. The IPO target represents a 2.2x step-up from the Series E
              implied valuation and a 46x multiple to the Series B a progression that reflects technology de-risking
              through Project Red pilot validation PPA accumulation across 658 MW of binding contracts and commencement
              of Cape Station construction. The 2026 Nasdaq clean energy IPO environment has been selective with
              institutional demand concentrated on companies with near-term revenue visibility or strong infrastructure
              sponsor backing. The post-IRA policy tailwinds including geothermal investment tax credits and the DOE EGS
              Earthshot initiative support the broader clean energy infrastructure IPO environment. JPMorgan 421 million
              dollar project debt facility closed March 2026 adds institutional validation and reduces equity dilution
              pressure from the IPO. Pre-IPO investors including DCVC B Capital and Devon Energy face standard lock-up
              restrictions that will affect secondary market liquidity in the six months following IPO. The 1.25 billion
              dollar raise at the 6.5 billion valuation implies approximately 19 percent dilution to existing
              shareholders which is within the typical range for large infrastructure IPOs. The IPO price range of 21 to
              24 per share implies a pre-money market capitalization of approximately 6.0 to 6.9 billion based on
              estimated fully diluted shares outstanding.
            claimRefs:
              - CV001
              - CV010
              - CV011
              - CV041
              - CV042
      - number: '8.5'
        title: Valuation Methodology and Analytical Frameworks
        blocks:
          - type: paragraph
            body: >-
              Fervo Energy pre-commercial status eliminates the applicability of conventional financial statement
              multiples. With 138 thousand dollars in 2025 revenue and a 57.8 million dollar net loss EV per revenue and
              EV per EBITDA multiples exceed 40000x and are analytically meaningless. The primary valuation anchor is
              the PPA backlog method. The 7.2 billion dollar binding revenue backlog representing 658 MW of contracted
              capacity is discounted by an execution risk factor to derive an implied enterprise value. At 0.9x backlog
              multiple the implied EV equals the 6.5 billion IPO target. At 0.7x it implies 5.0 billion. This method is
              appropriate for infrastructure developers where contracted revenue provides a floor on future cash flows
              but its reliability is directly tied to the enforceability and pricing of PPA contracts which are not
              fully disclosed in the S-1. A discounted cash flow framework is not meaningfully applicable pre-commercial
              because the model requires assumptions about LCOE trajectory at 80 to 150 dollars per MWh current estimate
              versus 25 to 40 dollars per MWh for utility solar and thermal drawdown rates and operational capacity
              factors not yet validated at commercial EGS scale. A comparable per MW analysis provides an important
              reality check. Ormat Technologies trades at approximately 5.3 million dollars per MW on proven operational
              capacity. Fervo at 6.5 billion against 658 MW of contracted PPA capacity implies 9.9 million dollars per
              MW which is an 87 percent premium. The developer pipeline adds conceptual value with 15 plus GW at 0.1
              million per MW optionality value implying 1.5 billion incremental. Technology option value for first-mover
              EGS at commercial scale is real but unquantifiable through precedent. The weight of evidence supports the
              PPA backlog method as primary with a technology premium adjustment and developer pipeline option value as
              secondary components. BNEF projects a persistent 24 per 7 carbon-free power premium through 2030 as
              hyperscaler demand outpaces dispatchable CFE supply supporting the long-term revenue premium embedded in
              Fervo PPA pricing.
            claimRefs:
              - CV002
              - CV003
              - CV004
              - CV005
              - CV006
              - CV007
              - CV018
              - CV029
      - number: '8.6'
        title: Investor Return Analysis and Exit Scenarios
        blocks:
          - type: paragraph
            body: >-
              IPO investors entering at 21 to 24 dollars per share face a complex return profile shaped by Phase 1
              execution lock-up dynamics and exit optionality. Series E investors entered at approximately 2.9 billion
              implied valuation in December 2025 and the IPO at 6.5 billion represents a 2.2x mark-up in approximately
              five months. Pre-IPO investors including DCVC B Capital and Devon Energy face standard lock-up
              restrictions that will affect secondary market liquidity in the six months following IPO. The 1.25 billion
              dollar raise at 6.5 billion valuation implies approximately 19 percent dilution to existing shareholders.
              In a bull scenario with five-year holding if Phase 1 delivers and Phase 2 constructs on schedule and
              GeoBlock Factory achieves its cost reduction roadmap strategic acquirer value could range from 8 to 15
              billion implying 25 to 50 percent upside from the IPO mid-price of approximately 22.50 dollars per share.
              Potential acquirers include major utilities seeking carbon-free baseload supply and integrated energy
              companies seeking EGS technology optionality. In the base scenario where Phase 1 delivers with modest
              delays and Phase 2 commences public market valuation stabilizes at 5 to 7 billion representing flat to
              modest upside from the IPO range. In the bear scenario where Phase 1 is delayed or fails the valuation
              compresses to 2 to 3 billion implying 50 to 70 percent downside from IPO pricing. The asymmetric risk and
              reward profile with meaningful upside only in the bull case and severe downside in the bear case argues
              for a post-delivery entry strategy rather than IPO participation at the top of the range. Lock-up expiry
              at 180 days post-IPO creates secondary market supply that investors should monitor as an entry opportunity
              if Phase 1 executes cleanly. Renaissance Capital has noted that Fervo Energy IPO investor return profile
              depends almost entirely on Phase 1 milestone delivery and represents a concentrated technology execution
              bet with limited downside protection at 6.5 billion valuation.
            claimRefs:
              - CV010
              - CV019
              - CV028
              - CV037
              - CV041
              - CV042
      - number: '8.7'
        title: Exhibits
        blocks:
          - type: callout
            title: Valuation Requires Near-Perfect Phase 1 Execution
            body: >-
              At $6.5B implied valuation, Fervo is priced for near-perfect execution of the first commercial-scale EGS
              project globally. The 87% premium over Ormat Technologies' EV/MW on operational capacity leaves
              essentially no margin for Phase 1 delays, cost overruns, or seismicity events. Investors at the top of the
              $21-24/share range should require extraordinary diligence assurance before committing at this multiple.
            calloutType: risk
            claimRefs:
              - CV011
              - CV012
              - CV014
              - CV031
          - type: callout
            title: Google's Dual Role Is Both the Strongest Bull Signal and the Greatest Bear Risk
            body: >-
              Google's position as Series E anchor investor and primary commercial offtaker simultaneously validates the
              commercial thesis (a sophisticated technology buyer paying for 24/7 clean power at premium pricing) and
              concentrates the most material downside scenario (Google relationship deterioration hits both the investor
              base and the primary revenue pipeline simultaneously). No single relationship in the Fervo capital
              structure has more bearing on valuation outcomes across all three scenarios.
            calloutType: insight
            claimRefs:
              - CV025
              - CV034
          - type: callout
            title: 'Preferred Entry: Post-IPO After Phase 1 Commercial Delivery'
            body: >-
              The superior risk-adjusted entry for Fervo Energy is post-IPO after Cape Station Phase 1 delivers
              commercial operations, which would mark the first commercial EGS project globally and represent a
              step-change de-risking event. At that point, the investment thesis shifts from execution risk to scale
              risk, and the comparable set expands from zero operational EGS precedents to a confirmed first commercial
              case. Monitor the October 2026 target date closely and build a position only after independent
              confirmation of commercial delivery.
            calloutType: recommendation
            claimRefs:
              - CV001
              - CV021
              - CV031
              - CV035
