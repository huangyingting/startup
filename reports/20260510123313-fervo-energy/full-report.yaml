    title: Market definition table
    columns:
      - Segment / Category
      - Included Spend
      - Excluded Spend
      - Buyer / Payer
      - Relevance to Fervo
    rows:
      - - EGS electricity generation (Fervo core)
        - >-
          Geothermal electricity generated from engineered reservoirs in non-volcanic rock via horizontal drilling and
          hydraulic fracturing; 24/7 firm baseload power sold under long-term PPAs
        - Conventional hydrothermal (steam-only areas); closed-loop geothermal alternatives not requiring fracturing
        - Electric utilities as IPP offtakers; direct tech company PPAs; NV Energy, Google
        - >-
          Fervo's primary revenue mechanism; Cape Station and Corsac Station are the first commercial EGS assets at
          scale
      - - Conventional geothermal (comparable)
        - >-
          Steam-based or flash geothermal from naturally permeable resource areas; established technology with 3.8 GW US
          installed base
        - EGS and closed-loop next-gen alternatives
        - Utilities and wholesale power markets; dominated by Ormat Technologies (ORA) in western US
        - >-
          Sets price anchor and competitor reference for Fervo's power pricing; Ormat's ~$80-100/MWh PPA prices are
          benchmark
      - - Firm clean power market (substitute)
        - >-
          Any 24/7 clean electricity supply — nuclear SMR, long-duration storage paired with renewables, gas with carbon
          capture — serving baseload clean energy demand
        - Intermittent wind and solar without adequate storage duration; traditional fossil baseload
        - Tech companies and utilities seeking carbon-free baseload; same buyer class as EGS
        - >-
          Defines Fervo's competitive frame; buyers evaluate geothermal against all firm zero-carbon options on cost and
          reliability
      - - AI/data center power procurement
        - >-
          Direct electricity supply agreements for hyperscaler data center operators; 24/7 CFE contracts matched to
          hour-by-hour data center load; bilateral PPAs and framework agreements
        - Legacy utility contracts without CFE attributes; bundled RECs without time-matching
        - VP Energy and VP Sustainability at Google, Microsoft, Amazon, Meta; data center energy management teams
        - >-
          Fastest-growing segment; AI-driven load growth and 24/7 CFE mandates directly drive Fervo's Corsac Station and
          Google 3 GW framework; premium pricing versus spot markets
      - - US utility renewable integration
        - >-
          Long-term capacity PPAs for utility Integrated Resource Plans; RPS compliance procurement; baseload geothermal
          to balance intermittent wind/solar in the western grid
        - Coal or gas-only legacy procurement; short-term spot market purchases without capacity commitment
        - State utility regulators and IRP planning teams at NV Energy, PacifiCorp, PGE, and other western utilities
        - Provides multi-decade contract base; NV Energy is existing Fervo counterparty; TM003 details full buyer map
    notes: >-
      Market boundary definitions are drawn from Fervo's S-1 filing, DOE Enhanced Geothermal Shot documentation, and
      independent analyst characterizations of the firm clean power market. Excluded spend boundaries are conservative:
      any overlap with adjacent renewable procurement markets is excluded to avoid double-counting. Buyer/payer entries
      reflect disclosed Fervo counterparties (Google, NV Energy) plus analogous utility and industrial segments.
      Conventional geothermal comparables are based on Ormat Technologies publicly reported financials and EIA US
      installed capacity data.
