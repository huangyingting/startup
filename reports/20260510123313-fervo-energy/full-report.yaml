      - number: '1.5'
        title: Milestones and Governance
        blocks:
          - type: paragraph
            body: >-
              Fervo's history from founding to IPO filing spans nine years and includes significant milestones across
              founding, technology validation, financing, and regulatory progression. The 2022 success of Project Red —
              the first field-scale demonstration of EGS using horizontal drilling in Utah — was the pivotal technical
              milestone that converted investor skepticism into conviction and enabled the Series D and subsequent
              capital formation. Devon Energy's strategic investment in 2024 marked the first time a major oil-and-gas
              company committed capital at scale to EGS technology, adding industry credibility and operational knowhow.
              Google's participation in the Series E as an anchor investor in December 2025 simultaneously validated the
              commercial demand for 24/7 carbon-free geothermal power for data center load and gave Fervo its largest
              equity round. The company's governance structure includes a board with Margaret C. Whitman as Lead
              Independent Director, providing seasoned public-company oversight appropriate for a company entering the
              public markets. Adverse considerations include the entirely pre-commercial revenue base, substantial
              ongoing capital requirements, subsurface geotechnical risk inherent in EGS development, permitting
              complexity on federal and state lands, and the concentration of near-term value creation in the October
              2026 Cape Station Phase 1 milestone. The S-1 filed in April 2026 with the SEC discloses these risks in
              detail and provides audited financial statements for investor review.
