      - number: '2.5'
        title: Market Risks and Competitive Dynamics
        blocks:
          - type: paragraph
            body: >-
              The EGS power market faces several risks that could constrain adoption or erode Fervo's competitive
              position. The most fundamental risk is cost competitiveness: current EGS LCOE estimates of approximately
              $80-100/MWh must fall to the DOE's $45/MWh target to compete with solar-plus-storage without IRA
              subsidies. Until Cape Station Phase 1 establishes verified commercial-scale cost benchmarks,
              cost-competitiveness assumptions carry material uncertainty. Battery storage cost declines represent a
              substitute threat: utility-scale lithium-ion battery LCOE has fallen dramatically, and if storage duration
              extends to 12-24 hours at competitive cost, the firmness premium geothermal commands would narrow. Nuclear
              Small Modular Reactors (SMRs) from developers like NuScale, TerraPower, and X-Energy target the same 24/7
              CFE buyer segment at potentially competitive cost, though commercial SMR deployment at scale is at minimum
              10 years away. Competitive EGS developers — Eavor Technologies (closed-loop), Sage Geosystems, AltaRock
              Energy, and XGS Energy — represent direct technology competition, though none has reached the commercial
              scale of Fervo's Cape Station. Regulatory risk is bifurcated: IRA tax credit modification by Congress
              could materially impair project economics, while accelerated state clean energy mandates could expand
              demand. Hyperscaler demand concentration creates counterparty risk — if Google or Microsoft slow their
              24/7 CFE procurement pace due to target delays or changing energy policy, near-term SOM contraction could
              occur. Permitting timelines on federal lands (2-5 years) and state environmental review processes impose
              schedule risk on greenfield EGS development. Overall, the market risk profile is consistent with an
              early-commercial infrastructure asset class where technology de-risking and cost reduction trajectories
              are the primary value drivers.
