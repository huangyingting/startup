companyProfile:
  summary: >-
    Fervo Energy was founded in 2017 by Tim Latimer (CEO) and Jack Norbeck (CTO) in San Francisco, California. The
    company applies horizontal drilling, multi-stage hydraulic fracturing, and distributed fiber optic sensing —
    techniques borrowed from the oil and gas industry — to tap geothermal heat at scale. Its core offering is 24/7
    carbon-free baseload electricity through engineered underground heat reservoirs, addressing the intermittency
    problem that limits solar and wind. Cape Station in Milford, Utah is the world's largest planned EGS project (500 MW
    full build-out). Phase 1 (100 MW) targets commercial operations in October 2026. Fervo filed an S-1 with the SEC in
    April 2026 targeting a $1.25B IPO at ~$6.5B valuation on Nasdaq under ticker FRVO. The company remains
    pre-commercial with $138K in 2025 revenue and a $57.8M net loss; the valuation depends entirely on construction
    execution, PPA delivery, and GeoBlock Factory cost reduction progress.
  foundedDate: '2017-01-01'
  founders:
    - name: Tim Latimer
      role: Co-Founder & CEO
      background: >-
        Former drilling and completions engineer at oil and gas companies; MS in Energy Resources Engineering from
        Stanford University. Recognized as a Forbes 30 Under 30 alumnus. Leads Fervo's executive team and investor
        relations through IPO.
    - name: Jack Norbeck
      role: Co-Founder & CTO
      background: >-
        Stanford PhD in Energy Resources Engineering. Leads reservoir engineering, subsurface technology, and the
