      - number: '5.3'
        title: EGS Technology Architecture
        blocks:
          - type: paragraph
            body: >-
              Fervo's EGS technology stack integrates four layers: horizontal directional drilling, multi-stage
              hydraulic fracturing, distributed fiber optic sensing, and an Organic Rankine Cycle surface power plant.
              The horizontal drilling layer uses polycrystalline diamond compact (PDC) bits, rotary steerable systems
              (RSS), and measurement-while-drilling (MWD) telemetry adapted from oil-and-gas shale practice, drilling
              horizontal laterals 2,000–3,500 feet long at 5,000–8,000 feet depth in basement rock. Fervo's Project Red
              validated this approach at commercial well design scale, and Cape Station is now applying it to multiple
              simultaneous wells.

              Multi-stage hydraulic fracturing creates connected permeability networks between injector and producer
              wells in crystalline basement rock that naturally has near-zero matrix permeability. Cold water injected
              under pressure is heated as it flows through fractures, contacting rock at 180–250°C, then extracted as
              geothermal brine to drive an ORC turbine. Distributed fiber optic sensing (DAS/DTS) deployed along the
              entire horizontal wellbore provides continuous centimeter-resolution subsurface telemetry, enabling
              real-time observation of fracture propagation, identification of productive zones, detection of thermal
              short-circuiting, and dynamic injection rate optimization. The January 2024 Science peer-reviewed paper
              documenting Project Red results confirms the fiber sensing approach as independently validated.

              At surface, pre-fabricated modular ORC turbine skids convert extracted brine to electricity at capacity
              factors exceeding 90%. The GeoBlock Factory approach pre-fabricates and standardizes these surface skids
              to reduce on-site installation time. PowerFlex sits above the physical plant as a software-defined
              reservoir management layer enabling dynamic load-following by varying injection and production rates
              within safe operating windows. Together these four layers constitute an integrated system that goes from
              raw basement rock to carbon-free electrons on the grid — a system with no direct analogue in prior
              geothermal practice.
