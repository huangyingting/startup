  - id: TM004
    title: Growth drivers and constraints table
    columns:
      - Driver / Constraint
      - Direction
      - Timing
      - Implication for Fervo
      - Diligence Ask
    rows:
      - - AI data center electricity demand surge
        - Driver
        - 2024-2030 (peak build-out)
        - >-
          Hyperscalers must procure firm clean power to meet 24/7 CFE targets; creates premium-price PPA opportunity
          with creditworthy counterparties willing to sign long-term agreements
        - >-
          Verify data center load growth projections by hyperscaler; confirm Google and Microsoft CFE contract timelines
          are not subject to delays or target revisions
      - - IRA investment and production tax credits
        - Driver
        - 2023-2032 (statutory IRA horizon)
        - >-
          30-50% ITC and $27.50-55/MWh PTC significantly reduce Fervo's effective LCOE and project financing cost;
          enables institutional project debt at acceptable DSCR
        - >-
          Monitor Congressional IRA modification risk; confirm Fervo's Cape Station and Corsac Station qualify for ITC
          vs. PTC election; verify election timing and recapture risk
      - - DOE Enhanced Geothermal Shot policy
        - Driver
        - 2022-2035 (program horizon)
        - >-
          Sets $45/MWh cost target with associated R&D investment; signals long-term federal policy commitment; provides
          co-investment signal for EGS developers
        - >-
          Confirm Fervo's cost trajectory relative to $45/MWh DOE target; assess EGS Pilot Demonstrations program
          funding availability for Fervo projects
      - - Oil-and-gas horizontal drilling technology transfer
        - Driver
        - 2020-ongoing
        - >-
          Reduces EGS drilling cost per well by applying mature shale O&G techniques; Devon Energy partnership provides
          supply-chain relationships and technical expertise
        - >-
          Track drilling cost per well as Devon partnership matures; quantify learning curve improvement in cost-per-MW
          from Project Red to Cape Station Phase 1
      - - High EGS capital intensity vs. solar and wind
        - Constraint
        - Ongoing
        - >-
          $4-8M/MW for EGS versus $1-2M/MW for utility-scale solar limits deployment speed without large project debt;
          requires institutional lenders with geothermal risk appetite
        - >-
          Obtain verified $/MW cost estimates from Fervo's Cape Station development; compare to solar and wind
          benchmarks; assess cost reduction roadmap to 2030 targets
      - - Subsurface geological risk
        - Constraint
        - Project-specific
        - >-
          Dry holes or underperforming wells increase per-MWh cost and create schedule risk; cannot be fully de-risked
          before drilling begins even with extensive geophysical surveys
        - >-
          Review Project Red and Cape Station well performance data relative to design assumptions; assess success rate
          per well drilled and deviation from reservoir model predictions
      - - Grid interconnection backlogs
        - Constraint
        - 2024-2030
        - >-
          3-5 year interconnection queue wait times in western US WECC region limit near-term deployment even for
          projects with viable geology and secured financing
        - >-
          Assess Cape Station and pipeline projects' interconnection queue position, estimated approval dates, and
          transmission upgrade requirements; evaluate impact on October 2026 Phase 1 target
      - - Nuclear SMR competitive emergence
        - Constraint
        - 2030-2040 (earliest scale deployment)
        - >-
          If SMR deployment accelerates (NuScale, TerraPower, X-Energy), SMRs compete for the same 24/7 CFE buyer
          segment at potentially similar cost; could compress the firmness premium geothermal commands
        - >-
          Monitor SMR commercial deployment timelines and cost benchmarks; assess whether hyperscaler procurement
          preferences would switch to SMR if available at competitive cost by 2035
    notes: >-
      Driver/constraint entries are sourced from EIA Annual Energy Outlook projections, DOE Enhanced Geothermal Shot
      documentation, IRA statutory provisions, Rystad Energy analysis of Cape Station financing, and IEEFA's independent
      assessment of geothermal risks. Timing ranges are approximate and reflect analyst consensus; actual inflection
      points may differ. Nuclear SMR timing is conservative given NuScale's VOYGR cancellation (2023) and the general
      pattern of SMR deployment delays. The diligence asks are prioritized by materiality to Fervo's near-term IPO and
      Cape Station delivery narrative.
