      - CV021
      - CV022
      - CV023
      - CV024
      - CV031
      - CV034
  - id: TV004
    title: Comparable valuation table
    columns:
      - Comparable Company
      - Stage / Status
      - Enterprise Value / Valuation
      - EV/MW (Operational Capacity)
      - Business Model
      - Relevance to Fervo and Limitation
    rows:
      - - 'Ormat Technologies (NYSE: ORA)'
        - Public; ~600 MW operational geothermal
        - ~$3.2B EV (Q1 2026)
        - ~$5.3M/MW operational capacity
        - Conventional hydrothermal geothermal; ORC power plants; U.S. and international
        - >-
