      - number: '1.4'
        title: Funding History and Capital Structure
        blocks:
          - type: paragraph
            body: >-
              Fervo has assembled a complex, multi-source capital structure spanning equity rounds, strategic
              investments, and project debt, totaling well over $1.5 billion in aggregate capital raised through April
              2026. The company's first institutional capital was a $28M Series A in 2021 from Breakthrough Energy
              Ventures (BEV), the climate-technology fund backed by Bill Gates, establishing early mission-aligned
              investor credibility. A $138M Series B co-led by DCVC and Capricorn Investment Group in 2022 provided
              runway for Project Red validation and early Cape Station development. February 2024 brought a landmark
              $244M Series D strategic investment from Devon Energy Corporation, an upstream oil-and-gas major whose
              participation both validated horizontal drilling applicability and provided supply-chain relationships.
              December 2024 added a $255M combined financing (Series D extension from Capricorn at $135M plus $120M in
              debt from Mercuria, a major commodity trading firm). In June 2025, BEV led an additional $206M round split
              between $100M equity and $106M debt. December 2025 brought the company's largest round: a $462M Series E
              co-led by B Capital with Google as anchor investor, simultaneously validating both the investment thesis
              and commercial relationship. Fervo announced its IPO in January 2026 targeting $1.25 billion at
              approximately $6.5 billion valuation, filed its S-1 in April 2026, and closed $421M in project debt from a
              JPMorgan-led institutional syndicate in March 2026 to finance Cape Station construction. Financially,
              Fervo remains pre-commercial: 2025 revenue was $138,000 (down from $199,000 in 2024), 2025 net loss was
              $57.8M (vs. $41.1M in 2024), and 2025 capital expenditures reached $465.7M. Cash stood at $461.8M on
              December 31, 2025. IPO success depends critically on Cape Station Phase 1 reaching the October 2026
              commercial milestone on schedule.
