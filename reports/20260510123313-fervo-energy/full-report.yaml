  - number: 8
    title: Valuation
    sections:
      - number: '8.1'
        title: Valuation Framework and Investment Recommendation
        blocks:
          - type: paragraph
            body: >-
              Fervo Energy's $6.5B target IPO valuation presents one of the most analytically challenging pre-IPO
              pricing exercises in the 2026 clean energy market. The company is entirely pre-commercial: 2025 revenue
              was $138,000 against a $57.8M net loss, and the entire valuation is grounded in future cash flows
              contingent on Cape Station Phase 1 delivering 100 MW of commercial operations by October 2026. There is no
              precedent for a commercial- scale EGS project in the United States, meaning investors are being asked to
              discount a first-of-kind technology transition at a valuation implying approximately $9.9M per contracted
              megawatt of PPA capacity. The closest operational comparable — Ormat Technologies (NYSE: ORA) — trades at
              approximately $5.3M/MW on proven operational capacity, suggesting Fervo carries an 87% premium over a
              seasoned geothermal operator. This premium is partially justified by Fervo's long-term addressable market
              (15+ GW pipeline, $7.2B PPA backlog, strategic positioning for data center 24/7 clean power demand),
              Google's dual role as anchor investor and primary offtaker, and the structural scarcity premium for
              dispatchable 24/7 carbon-free power in a market dominated by intermittent renewables. However, the premium
              is only defensible if Cape Station Phase 1 delivers on schedule and within budget. The investment
              recommendation is conditional: do not participate at the $6.5B target without independent Phase 1
              construction verification, full PPA contract disclosure, and seismicity protocol review. Track the IPO for
              post-close entry if Phase 1 delivers its October 2026 commercial milestone, which would mark the first
              commercial EGS project globally and represent a fundamental de-risking event for the entire investment
              thesis. The IPO price range of $21-24/share per the S-1 implies a pre-money market capitalization of
              approximately $6.0-6.9B. Any final price at the top of this range reflects high demand and requires the
              highest confidence in near-term execution.
