      - number: '2.3'
        title: Buyer Segmentation and Procurement Dynamics
        blocks:
          - type: paragraph
            body: >-
              Three primary buyer segments define EGS power demand, each with distinct motivations, budget ownership,
              and adoption triggers. Technology hyperscalers — primarily Google, Microsoft, Amazon, and Meta — represent
              the fastest-growing and highest-value buyer class. These companies have publicly committed to 24/7
              carbon-free energy by 2030 (Google's explicit target), driven by investor and regulatory pressure on Scope
              2 emissions accounting and the reputational imperative of AI infrastructure sustainability. Their data
              center energy procurement teams execute long-duration PPAs at VP Sustainability or VP Energy Procurement
              level, and they demonstrate willingness to pay 20-40% premiums over spot market rates for certified 24/7
              CFE firmness. Google's existing Corsac Station agreement (115 MW) and non-binding 3 GW framework with
              Fervo exemplify this procurement model. Electric utilities represent the second major buyer segment,
              driven by state Renewable Portfolio Standard mandates in California, Nevada, New Mexico, and other western
              states requiring 100% clean electricity by 2030-2045. NV Energy is Fervo's key utility counterparty
              through both the Corsac Station and Cape Station PPAs. Utility procurement occurs through Integrated
              Resource Planning (IRP) processes with 20-30 year contract tenors, managed by VP Resource Planning teams
              subject to state regulator approval. Industrial direct buyers — steel, chemicals, mining — represent a
              smaller but growing segment seeking to reduce Scope 2 emissions through bilateral PPAs or co-location
              agreements. Federal and military facilities represent an additional segment driven by Executive Order
              sustainability mandates and DOE partnership programs, though current Fervo contracts are concentrated in
              the hyperscaler and utility categories.
