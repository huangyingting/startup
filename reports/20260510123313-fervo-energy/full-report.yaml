      - number: '5.4'
        title: Trust, Safety, Regulatory Compliance, and Environmental Controls
        blocks:
          - type: paragraph
            body: >-
              Fervo's EGS operations are governed by a multi-layered regulatory framework. Cape Station received a
              Bureau of Land Management right-of-way grant following completion of an Environmental Impact Statement in
              August 2024, clearing the primary federal permitting requirement. The EIS evaluated land disturbance,
              water use, visual impact, and induced seismicity, imposing monitoring and mitigation conditions now
              incorporated into Fervo's operational permit. Fervo's FERC interconnection agreement for Cape Station has
              been filed and is pending completion.

              Induced seismicity is the primary safety and community trust risk for EGS. Fervo employs the DOE Traffic
              Light Protocol (TLP), which monitors real-time seismicity during fracturing and halts injection if
              seismicity exceeds magnitude thresholds. Project Red completed its hydraulic fracturing campaign with no
              reportable seismic events. Cape Station's larger-scale stimulation carries inherently greater seismicity
              potential than the 3.5 MW pilot and involves a more extensive monitoring array plus DOE oversight.

              Water management uses a closed-loop recycling system: extracted brine is reinjected after heat removal,
              minimizing consumptive water use — a BLM permit condition for the water-stressed western US site. The
              company's drilling operations follow standard oil-and-gas occupational safety protocols. The S-1 (April
              2026) discloses induced seismicity, water use, BLM permitting, FERC interconnection, and IP
              misappropriation as material risk factors. No reportable environmental violations or safety incidents have
              been publicly disclosed through the report date.
            claimRefs:
              - CE018
