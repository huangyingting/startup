      - number: '5.5'
        title: Differentiation, IP, and Competitive Moat
        blocks:
          - type: paragraph
            body: >-
              Fervo's competitive differentiation operates across registered IP, accumulated operational data, and
              GeoBlock Factory process know-how. The registered portfolio is anchored by US Patent 11536113 (geothermal
              reservoir monitoring via distributed fiber optic sensing, granted December 2022) and a continuation
              application (US App. 2023/0175393) covering horizontal EGS fracture design methods. Both have been cited
              in subsequent academic literature as foundational disclosures. Beyond patents, Fervo has accumulated
              terabytes of Project Red and Cape Station DAS/DTS data feeding a proprietary geomechanical reservoir
              simulation platform — a data moat requiring years of field operations to replicate.

              Versus Eavor Technologies (closed-loop, no fracturing, lower thermal output per well, estimated
              $120–160/MWh LCOE), Fervo's open-loop approach delivers higher power density with greater subsurface
              complexity. Versus Sage Geosystems (pressure storage EGS targeting peaking applications), Fervo serves a
              fundamentally different market: 24/7 baseload versus peak dispatch. The January 2024 Science paper and SPE
              Annual Conference presentations confirm practitioner-community recognition of Fervo's technical
              differentiation.

              The most credible competitive threat is long-duration storage (iron-air, iron-flow batteries): if LCOS
              reaches $50–70/MWh by 2028–2030, the firm-power premium that justifies Fervo's LCOE will narrow. The 2026
              commercialization window is therefore strategically critical for locking in long-term PPAs before storage
              erodes the pricing differential. Fervo's practitioner community engagement — active in Geothermal Rising
              forums and SPE conference presentations — reinforces technical credibility and accelerates adoption among
              utility engineers.
