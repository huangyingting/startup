  - number: 2
    title: Market Analysis
    sections:
      - number: '2.1'
        title: Market Definition and Boundaries
        blocks:
          - type: paragraph
            body: >-
              Fervo Energy operates primarily in the Enhanced Geothermal Systems (EGS) sub-market, a nascent segment of
              the broader geothermal power generation industry. EGS distinguishes itself from conventional hydrothermal
              geothermal by engineering underground reservoirs in non-volcanic basement rock through horizontal drilling
              and multi-stage hydraulic fracturing, enabling power generation across a far larger geographic footprint
              than traditional steam-based plants. The primary market is US-based electricity generation sold through
              long-term power purchase agreements (PPAs) to two distinct buyer classes: electric utilities (NV Energy,
              PacifiCorp, Pacific Gas & Electric) constrained by state Renewable Portfolio Standards, and technology
              hyperscalers (Google, Microsoft, Amazon, Meta) pursuing 24/7 carbon-free energy mandates for their data
              center operations. The adjacent firm clean power market — competing with nuclear, long-duration storage
              paired with renewables, and gas with carbon capture — defines Fervo's competitive context for buyers who
              cannot accept intermittent supply. The status-quo alternative for baseload clean power is conventional
              geothermal (dominated by Ormat Technologies in the western US) and natural gas peaker plants ($50-120/MWh,
              carbon-emitting). Excluded from this market definition are traditional wind and solar projects without
              storage, which cannot provide the 24/7 firmness that defines Fervo's value proposition. Geographically,
              the primary market is the US western states where geothermal resources are most accessible, with the
              global context provided by the $9.2B worldwide geothermal market.
            claimRefs:
              - CM001
              - CM002
              - CM003
