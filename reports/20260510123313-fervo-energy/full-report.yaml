      - number: '7.3'
        title: Execution and Technology Risk
        blocks:
          - type: paragraph
            body: >-
              Cape Station in Beaver County, Utah is the single most material asset and the primary risk concentration
              in Fervo's investment thesis. No commercial-scale EGS project has operated at 100 MW or above globally,
              making Cape Station Phase 1 a first-of-kind deployment without direct operational precedent. The project
              depends on coordinated delivery of horizontal drilling campaigns, multi-stage hydraulic fracturing
              completions, surface organic Rankine cycle (ORC) power plant equipment, and grid interconnection. Fervo's
              GeoBlock Factory standardization initiative targets reducing EGS overnight costs from approximately
              $7,000/kW to $3,000/kW at Nth-of-a-kind scale — a projection that depends on drilling efficiency learning
              curves, completions design optimization, and ORC plant procurement that are forecast assumptions, not
              demonstrated outcomes. Project Red demonstrated a well cost reduction from approximately $9.4M to $4.8M
              per well, a meaningful learning curve that supports the GeoBlock cost trajectory but does not validate it
              at Cape Station scale with a far larger well count and fracture network. Subsurface geological variability
              means that Project Red's Nevada performance metrics may not be directly replicable in Beaver County, Utah,
              where different rock temperature profiles, permeability characteristics, and in-situ stress conditions
              prevail. Thermal drawdown — declining heat extraction as the near-wellbore reservoir cools over time — is
              a known long-term EGS operational risk that has not been demonstrated at commercial scale over
              multi-decade timescales. The 2025 capital expenditure of $465.7M, financed primarily by the JPMorgan $421M
              project debt facility and existing cash, indicates a rapid construction ramp with minimal schedule buffer.
              Any delay in drilling performance below plan, equipment procurement disruption, or reservoir connectivity
              underperformance will extend the Phase 1 commercial operations date, trigger potential covenant review,
              and delay IPO revenue recognition. The construction timeline is critical: Phase 1 commercial operations by
              late 2026 directly underpins IPO pricing, PPA delivery obligations to NV Energy, and the Google framework
              conversion narrative.
            claimRefs:
              - CR016
              - CR020
              - CR029
              - CR033
