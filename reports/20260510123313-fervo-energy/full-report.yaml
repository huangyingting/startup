      - number: '1.2'
        title: Technology and Operational Footprint
        blocks:
          - type: paragraph
            body: >-
              Fervo's core technology — Enhanced Geothermal Systems (EGS) — distinguishes it from conventional
              hydrothermal geothermal plants by engineering the underground reservoir rather than relying on naturally
              occurring hot water or steam. The process involves drilling horizontal wells into hot basement rock, then
              applying multi-stage hydraulic fracturing (adapted from shale oil-and-gas practice) to create permeability
              networks connecting injector and producer wells. Distributed fiber optic sensing is deployed downhole to
              monitor reservoir behavior in real time, enabling optimization that was not possible in prior EGS
              attempts. Extracted geothermal brine drives an Organic Rankine Cycle (ORC) turbine at surface to generate
              electricity. The company's GeoBlock Factory initiative is a standardized, modular deployment system
              designed to reduce per-well and per-project costs through factory-style repeatability. Cape Station,
              located in Beaver County, Utah, is the world's largest planned EGS project with 500 MW total planned
              capacity: Phase 1 targets 100 MW of commercial delivery by October 2026, and Phase 2 targets 400 MW by
              2028. Corsac Station in Nevada is a 115 MW project contracted primarily to serve Google and NV Energy.
              Project Red was the company's first EGS pilot in Utah, successfully validating the horizontal drilling and
              fracturing approach at field scale in 2022. Fervo controls approximately 475,000 net acres of geothermal
              land and has a development pipeline exceeding 15 GW.
            claimRefs:
