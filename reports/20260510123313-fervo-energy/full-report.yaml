      - number: '1.3'
        title: Founders and Leadership
        blocks:
          - type: paragraph
            body: >-
              Fervo was co-founded by Tim Latimer (CEO and Board Chair) and Dr. Jack Norbeck (CTO). Latimer holds a
              Stanford MBA and MS, has a background as a petroleum engineer, and brings rare cross-domain expertise in
              both oil-and-gas drilling practice and energy business development; he is broadly credited with
              recognizing that shale horizontal drilling technology could be re-applied to geothermal resource
              development. Norbeck holds a PhD in Earth Science from Stanford and completed a postdoctoral fellowship at
              the United States Geological Survey (USGS), giving him deep geoscience and reservoir engineering expertise
              that underpins Fervo's subsurface technology. The executive team has expanded significantly ahead of the
              IPO: David Ulrey serves as CFO overseeing capital markets strategy and IPO readiness; Sarah Jewett leads
              SVP Strategy shaping hyperscaler partnerships; Dawn Owens as SVP Development manages the project pipeline
              including Cape Station expansion; Gustavo Torres serves as SVP and General Counsel managing regulatory
              approvals, land rights, and PPA legal structures; Quinn Woodard Jr. leads VP Operations for drilling and
              field execution; and Christian Gradl leads the SVP GeoBlock Factory standardization initiative. Margaret
              C. Whitman, former CEO of HP and eBay, serves as Lead Independent Director, providing governance oversight
              and public-company experience ahead of the IPO.
