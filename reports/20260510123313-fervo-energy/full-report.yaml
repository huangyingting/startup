  - number: 6
    title: Customers
    sections:
      - number: '6.1'
        title: Customer Landscape Overview
        blocks:
          - type: paragraph
            body: >-
              Fervo Energy's customer base as of the April 2026 S-1 consists of two publicly named counterparties—NV
              Energy (Berkshire Hathaway Energy) and Google LLC—plus unnamed parties representing approximately 256 MW
              of binding PPA capacity. Total binding PPAs stand at 658 MW, representing approximately $7.2 billion in
              potential contracted revenue over 20-25 year PPA terms. NV Energy has committed to approximately 400 MW of
              Cape Station output to satisfy Nevada's Renewable Portfolio Standard mandate requiring 100% renewable
              energy by 2030. Google entered a commercial PPA for Project Red (1.5 MW) in 2021, with first power
              delivered in November 2023. In August 2024, Google signed a non-binding framework agreement for up to 3 GW
              of additional EGS capacity from Fervo's development pipeline. The extreme concentration in two named
              counterparties—representing essentially all of public contracted revenue—is the defining customer risk for
              this investment thesis.
