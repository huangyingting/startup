      - number: '1.6'
        title: Exhibits
        blocks:
          - type: callout
            title: EGS Technology Validated at Field Scale via Project Red
            body: >-
              Fervo's successful demonstration of EGS at field scale through Project Red in 2022 addresses the primary
              technical de-risking hurdle that has historically constrained geothermal expansion. The application of
              horizontal drilling, multi-stage fracturing, and distributed fiber optic sensing — borrowed from mature
              shale O&G practice — provides a repeatable, measurable approach that conventional geothermal lacked. Devon
              Energy's $244M strategic investment in 2024, made with full awareness of the technology from an operator's
              perspective, provides third-party technical validation from a party uniquely qualified to assess
              subsurface drilling risk.
            calloutType: strength
            claimRefs:
              - CO015
              - CO022
              - CO027
          - type: callout
            title: Pre-Commercial Revenue Stage With Substantial Capital Intensity
            body: >-
              With $138,000 in 2025 revenue against a $57.8M net loss and $465.7M in capital expenditures, Fervo remains
              entirely pre-commercial. The company's IPO success depends critically on Cape Station Phase 1 reaching 100
              MW commercial operations by October 2026 on schedule and on budget. Any delay in Cape Station milestones,
              permitting setback, or cost overrun would materially impair the IPO narrative and may strain the capital
              structure ahead of Phase 2. The pre-commercial revenue base also creates a wide valuation sensitivity
              range that investors must assess against the development timeline.
