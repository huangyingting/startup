      - number: '5.6'
        title: Development Roadmap and Deployment Track
        blocks:
          - type: paragraph
            body: >-
              Fervo's 2026–2030 technology roadmap has three parallel tracks: (1) Cape Station Phase 1 commercial
              commissioning (100 MW, October 2026 target); (2) Cape Station Phase 2 scale-up (400 MW, 2028 target); and
              (3) GeoBlock Factory cost reduction targeting the DOE Enhanced Geothermal Shot goal of $45/MWh by 2035
              from an estimated current $80–100/MWh. Track 3 involves 20–30% drilling days reduction via bit and RSS
              optimization, ORC skid pre-fabrication to reduce on-site installation time, and fracturing efficiency
              gains through stage and fluid volume optimization.

              Phase 2 financing depends entirely on Phase 1 delivering on-schedule, on-budget performance — if Phase 1
              underperforms on geological or cost grounds, Phase 2 becomes unfinanceable without significant remediation
              capital. The GeoBlock Factory cost reduction roadmap has no independent validation yet; Cape Station Phase
              1 is the first real test of whether modular standardization delivers genuine improvement. Fervo's S-1 IPO
              targets $1.25 billion in public capital, which would fund Phase 2 development and early pipeline
              conversion.

              Developer and practitioner engagement is an active and credible signal: Fervo engineers present at SPE
              Annual Conferences and Geothermal Rising practitioner forums, published a peer-reviewed Science paper in
