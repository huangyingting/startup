  topStrengths:
    - >-
      World's largest planned EGS project (Cape Station, 500 MW) with 100 MW Phase 1 targeting October 2026 commercial
      operations
    - 658 MW of binding PPAs representing ~$7.2B in potential contracted revenue backlog — de-risked demand side
    - Google anchor relationship (Project Red offtake; non-binding 3 GW framework) provides hyperscaler credibility
    - >-
      $421M JPMorgan-led project finance facility closed March 2026 — institutional lender validation of Cape Station
      construction plan
    - >-
      Proprietary horizontal EGS drilling stack with fiber optic reservoir monitoring — first-mover IP advantage in a
      large greenfield market
    - DOE EGS Earthshot initiative tailwind; bipartisan IRA and energy security policy support for geothermal
  topRisks:
    - >-
      Entirely pre-commercial: 2025 revenue $138K, net loss $57.8M — entire $6.5B valuation is contingent on Cape
      Station Phase 1 delivering on schedule
    - >-
      No precedent for commercial-scale EGS in the U.S. — technology transition risk is first-of-kind and cannot be
      fully de-risked by pilot data
    - >-
      Induced seismicity (induced earthquake) risk: regulatory shutdown or PPA force majeure could be fatal to the
      project
    - >-
      87% EV/MW premium over operational comparable Ormat Technologies (ORA) — significant valuation compression risk if
      Phase 1 delays
    - 'Concentrated counterparty: NV Energy and Google together represent the majority of binding PPA capacity'
    - >-
      Capital intensity: $465.7M CapEx in 2025 alone; continued large capital needs could dilute IPO investors in
      follow-on offerings
  unresolvedGaps:
    - Full PPA contract terms (price, termination rights, force majeure) not publicly disclosed in S-1
    - Independent geotechnical verification of Cape Station Phase 1 subsurface resource — company-disclosed data only
    - Actual induced seismicity risk quantification at the Milford, UT site
    - GeoBlock Factory cost curve reduction progress vs. internal targets — opaque in public disclosures
    - Google 3 GW non-binding framework — conversion probability and timeline undisclosed
    - Post-IPO capital plan and potential dilutive follow-on offerings not quantified in S-1
