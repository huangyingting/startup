summary:
  headline: >-
    Fervo Energy is the global EGS leader with 658 MW of binding PPAs and a $7.2B backlog, but trades at an 87% premium
    to operational geothermal comparables on pre-commercial financials — the $6.5B IPO is only justified if Cape Station
    Phase 1 delivers on time.
