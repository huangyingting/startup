- id: valuation-methodology-frameworks
  title: Valuation Methodology and Analytical Frameworks
  body: Fervo Energy pre-commercial status eliminates the applicability of conventional financial statement multiples. With
    138 thousand dollars in 2025 revenue and a 57.8 million dollar net loss EV per revenue and EV per EBITDA multiples exceed
    40000x and are analytically meaningless. The primary valuation anchor is the PPA backlog method. The 7.2 billion dollar
    binding revenue backlog representing 658 MW of contracted capacity is discounted by an execution risk factor to derive
    an implied enterprise value. At 0.9x backlog multiple the implied EV equals the 6.5 billion IPO target. At 0.7x it implies
    5.0 billion. This method is appropriate for infrastructure developers where contracted revenue provides a floor on future
    cash flows but its reliability is directly tied to the enforceability and pricing of PPA contracts which are not fully
    disclosed in the S-1. A discounted cash flow framework is not meaningfully applicable pre-commercial because the model
    requires assumptions about LCOE trajectory at 80 to 150 dollars per MWh current estimate versus 25 to 40 dollars per
    MWh for utility solar and thermal drawdown rates and operational capacity factors not yet validated at commercial EGS scale.
    A comparable per MW analysis provides an important reality check. Ormat Technologies trades at approximately 5.3 million
    dollars per MW on proven operational capacity. Fervo at 6.5 billion against 658 MW of contracted PPA capacity implies
    9.9 million dollars per MW which is an 87 percent premium. The developer pipeline adds conceptual value with 15 plus GW
    at 0.1 million per MW optionality value implying 1.5 billion incremental. Technology option value for first-mover EGS
    at commercial scale is real but unquantifiable through precedent. The weight of evidence supports the PPA backlog method
    as primary with a technology premium adjustment and developer pipeline option value as secondary components. BNEF projects
    a persistent 24 per 7 carbon-free power premium through 2030 as hyperscaler demand outpaces dispatchable CFE supply supporting
    the long-term revenue premium embedded in Fervo PPA pricing.
