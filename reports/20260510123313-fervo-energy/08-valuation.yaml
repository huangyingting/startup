tables:
- id: TV001
  title: Recommendation summary table
  columns:
  - Dimension
  - Assessment
  - Basis
  - Confidence
  - Decision Implication
  rows:
  - - Recommendation
    - Conditional Hold / Track
    - Do not participate at $6.5B without Phase 1 construction verification; track for post-IPO entry if Phase 1 delivers
      Q4 2026
    - Medium
    - Await Phase 1 milestone confirmation before committing capital at IPO price range
  - - Valuation Stance
    - Stretched but not indefensible at $5-6B; overpriced at top of range without Phase 1 verification
    - Ormat comp implies 87% premium; BNEF 24/7 power premium and 15+ GW pipeline partially justify premium
    - Medium
    - If must participate, bias toward $21/share floor rather than $24/share ceiling
  - - Risk Rating
    - High
    - Single-project concentration; pre-commercial revenue; first-of-kind EGS technology; induced seismicity exposure; $244.5M
      accumulated deficit
    - High
    - Risk-tolerant growth investors only; unsuitable for capital-preservation or income-oriented mandates
  - - Confidence in Thesis
    - Medium
    - PPA backlog and Google validation are real; Phase 1 execution is unverified; GeoBlock Factory cost curve is theoretical
    - Medium
    - Thesis strengthens materially upon Phase 1 commercial delivery; weakens materially on any delay or cost overrun
  - - Time Horizon
    - Long — 5+ years for full thesis realization
    - Phase 2 targets 2028; GeoBlock Factory Nth-of-a-kind cost target likely 2030+; full pipeline monetization is a decade-horizon
      thesis
    - Medium
    - Not appropriate for investors requiring near-term liquidity events or 2-3 year hold periods
  notes: Recommendation reflects evidence as of May 10, 2026, immediately prior to IPO pricing. Conditional nature reflects
    the absence of independent Phase 1 construction verification and limited public disclosure of PPA contract economics.
