- id: ipo-market-context
  title: IPO Market Context and Funding History
  body: Fervo Energy S-1 registration statement filed with the SEC on April 17 2026 under CIK 0001853868 targets a raise
    of up to 1.25 billion dollars at a maximum valuation of approximately 6.5 billion with an indicated share price range
    of 21 to 24 dollars listing on Nasdaq under ticker FRVO. The IPO represents the culmination of a rapid private fundraising
    progression across multiple rounds. The Series B in 2022 implied approximately 1 billion dollars valuation establishing
    the early institutional anchor. Devon Energy invested 244 million dollars in the Series D in February 2024 at approximately
    1.4 billion implied valuation. The 462 million dollar Series E in December 2025 with Google as the anchor investor implied
    approximately 2.9 billion dollars valuation. The IPO target represents a 2.2x step-up from the Series E implied valuation
    and a 46x multiple to the Series B a progression that reflects technology de-risking through Project Red pilot validation
    PPA accumulation across 658 MW of binding contracts and commencement of Cape Station construction. The 2026 Nasdaq clean
    energy IPO environment has been selective with institutional demand concentrated on companies with near-term revenue visibility
    or strong infrastructure sponsor backing. The post-IRA policy tailwinds including geothermal investment tax credits and
    the DOE EGS Earthshot initiative support the broader clean energy infrastructure IPO environment. JPMorgan 421 million
    dollar project debt facility closed March 2026 adds institutional validation and reduces equity dilution pressure from
    the IPO. Pre-IPO investors including DCVC B Capital and Devon Energy face standard lock-up restrictions that will affect
    secondary market liquidity in the six months following IPO. The 1.25 billion dollar raise at the 6.5 billion valuation
    implies approximately 19 percent dilution to existing shareholders which is within the typical range for large infrastructure
    IPOs. The IPO price range of 21 to 24 per share implies a pre-money market capitalization of approximately 6.0 to 6.9
    billion based on estimated fully diluted shares outstanding.
