- id: scenario-analysis-and-comparable-valuation
  title: Scenario Analysis and Comparable Valuation
  body: 'The valuation range for Fervo Energy is exceptionally wide given the binary execution risk at Cape Station. In a
    bull scenario — Cape Station Phase 1 delivers on schedule, GeoBlock Factory achieves first cost reductions, and Google''s
    non-binding 3 GW framework advances toward binding commitments — the valuation could expand to $8-10B as the investment
    community applies a scaled developer premium to the 15+ GW pipeline. This scenario assumes a successful Phase 1 that establishes
    the template for Phase 2 and subsequent projects, driving down the perceived risk premium on future development capital.
    In a base scenario reflecting the IPO price range with modest Phase 1 execution discipline, a $5-7B range is consistent
    with the current book of contracted capacity and a moderate technology premium. The bear scenario — Phase 1 delayed by
    six or more months, LCOE remaining above $100/MWh on initial deliveries, or a significant induced seismicity event — would
    compress the valuation to $2-3B as the market reprices the probability of full commercial delivery. Comparable valuation
    is complicated by the absence of commercial EGS peers: Ormat Technologies is the best operational comparable but operates
    conventional hydrothermal assets with lower technology risk and well-established cost curves. Eavor Technologies and other
    private EGS developers offer partial comparables but have no public market price discovery. Calpine Corporation (acquired
    by KKR at ~$18B enterprise value) provides a baseload generation multiple reference but represents a mature, diversified
    portfolio with no technology uncertainty. BNEF projects a persistent 24/7 carbon-free power premium through 2030 as hyperscaler
    demand outpaces supply, supporting the long-term revenue premium embedded in Fervo''s PPA pricing. Lazard''s LCOE analysis
    estimates EGS at $80-150/MWh at commercial scale versus $25-40/MWh for utility solar — this cost gap is the single most
    important variable in the long-term competitive position of EGS as a technology and is directly relevant to Fervo''s Nth-of-a-kind
    cost target.'
