- id: TV006
  title: Final diligence asks table
  columns:
  - Topic
  - Missing Evidence
  - Why It Matters
  - Owner / Diligence Path
  rows:
  - - Phase 1 Construction Status Verification
    - Independent engineering assessment of Cape Station Phase 1 well count, completion stages, ORC equipment procurement
      status, and grid interconnection queue position as of May 2026
    - Phase 1 delivery is the single most critical value-creation event; independent verification allows investors to form
      a probability estimate for the October 2026 milestone
    - Engage independent geotechnical engineering firm (e.g., Baker Hughes Energy Services, Schlumberger) to conduct a desktop
      review of publicly available construction data and management-disclosed field data under NDA
  - - Full PPA Contract Economics
    - Binding PPA contract terms for the 658 MW portfolio, including counterparty identities and credit ratings, pricing per
      MWh, escalation mechanisms, force majeure, and termination provisions
    - The $7.2B potential revenue backlog is the foundation of all bull and base scenarios; without full contract terms, investors
      cannot assess the revenue quality or downside protection
    - Request PPA term sheets and contract summaries from management under standard IPO NDA; engage energy law counsel to
      review contract structure; verify counterparty credit ratings through independent credit analysis
  - - Seismicity Protocol and Site Data
    - Traffic-light protocol threshold values, current background seismicity levels at the Cape Station site, number and placement
      of monitoring stations, and historical seismicity record during Project Red and Phase 1 drilling
    - Seismicity risk is the most difficult-to-insure tail risk; protocol adequacy and site-specific data determine whether
      the risk is manageable or potentially fatal to the project
    - Request monitoring data and protocol documentation from management; cross-reference BLM conditions of approval for any
      required monitoring thresholds; compare to USGS best-practice guidelines and independent seismology review
  - - Cap Table and IPO Economics
    - Complete cap table at IPO including all investor economic stakes, pro-rata rights, anti-dilution provisions, registration
      rights, lock-up periods, board representation, and economic waterfall
    - Without the full cap table, public investors cannot assess dilution risk, governance alignment, or the economic preference
      structure that governs returns in downside scenarios
    - Review S-1 registration statement exhibits and all amendments; engage securities counsel to assess governance structure;
      request management disclosure of any side letters or board representation agreements not captured in public filings
  notes: Final diligence asks are ordered by materiality to the investment decision, not by ease of execution. Items 1 and
    2 are prerequisites for any final investment commitment at the IPO; items 3 and 4 are important but may be partially satisfied
    by the S-1 proxy statement and management road show presentations.
  claimRefs:
  - CV035
  - CV036
  - CV037
  - CV038
