callouts:
- calloutType: risk
  title: Valuation Requires Near-Perfect Phase 1 Execution
  body: At $6.5B implied valuation, Fervo is priced for near-perfect execution of the first commercial-scale EGS project globally.
    The 87% premium over Ormat Technologies' EV/MW on operational capacity leaves essentially no margin for Phase 1 delays,
    cost overruns, or seismicity events. Investors at the top of the $21-24/share range should require extraordinary diligence
    assurance before committing at this multiple.
  claimRefs:
  - CV011
  - CV012
  - CV014
  - CV031
- calloutType: insight
  title: Google's Dual Role Is Both the Strongest Bull Signal and the Greatest Bear Risk
  body: Google's position as Series E anchor investor and primary commercial offtaker simultaneously validates the commercial
    thesis (a sophisticated technology buyer paying for 24/7 clean power at premium pricing) and concentrates the most material
    downside scenario (Google relationship deterioration hits both the investor base and the primary revenue pipeline simultaneously).
    No single relationship in the Fervo capital structure has more bearing on valuation outcomes across all three scenarios.
  claimRefs:
  - CV025
  - CV034
- calloutType: recommendation
  title: 'Preferred Entry: Post-IPO After Phase 1 Commercial Delivery'
  body: The superior risk-adjusted entry for Fervo Energy is post-IPO after Cape Station Phase 1 delivers commercial operations,
    which would mark the first commercial EGS project globally and represent a step-change de-risking event. At that point,
    the investment thesis shifts from execution risk to scale risk, and the comparable set expands from zero operational EGS
    precedents to a confirmed first commercial case. Monitor the October 2026 target date closely and build a position only
    after independent confirmation of commercial delivery.
  claimRefs:
  - CV001
  - CV021
  - CV031
  - CV035
