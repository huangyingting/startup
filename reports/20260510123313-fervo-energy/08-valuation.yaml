- id: TV005
  title: Thesis-break and kill triggers table
  columns:
  - Trigger
  - Threshold / Defining Event
  - Transmission to Investment Thesis
  - Action Implication
  rows:
  - - Cape Station Phase 1 operational failure or delay
    - Phase 1 does not deliver 100 MW commercial operations by Q2 2027 (6-month grace on October 2026 target)
    - Eliminates primary de-risking event; triggers debt covenant review; destroys IPO narrative; reprices entire PPA backlog
      at higher discount rate
    - Exit or avoid position immediately; re-evaluate only if Phase 1 delay is bounded with credible revised timeline and
      construction financing secured
  - - Induced seismicity regulatory shutdown
    - Any seismicity event at or above M3.0 at Cape Station site requiring regulatory suspension of injection operations
    - Triggers BLM/EPA permit suspension; creates civil liability exposure; potentially permanent project termination analogous
      to Basel 2009; destroys equity value
    - Full exit; thesis is broken; no recovery scenario within reasonable investment horizon given regulatory and legal exposure
  - - Google commercial relationship deterioration
    - Google withdraws from 3 GW non-binding framework or initiates dispute over Corsac Station delivery obligations
    - Simultaneous loss of anchor investor confidence and primary revenue counterparty; market reprices Google concentration
      risk at maximum severity
    - Reduce position to minimum; monitor for resolution; if confirmed permanent, exit; Google alignment is structural to
      the investment thesis
  - - Capital markets access impaired
    - Fervo unable to raise additional equity or debt capital at acceptable terms post-IPO; any credit rating downgrade or
      covenant breach on JPMorgan facility
    - Company may not be able to fund Phase 2 ($400M+) or refinance Phase 1 project debt; dilution or distress scenario becomes
      possible
    - Closely monitor quarterly cash burn relative to Phase 2 capital requirements; any signal of covenant breach requires
      immediate position reassessment
  notes: Kill triggers are binary events that fundamentally impair the investment thesis rather than merely reducing return
    expectations. Investors should define specific monitoring dashboards for each trigger with quarterly or event-driven review
    cadence.
