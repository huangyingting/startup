  evidenceGaps:
  - topic: IPO timing and pre-IPO investor liquidity motivation
    type: missing-source
    severity: material
    missingEvidence: Independent analysis of whether the May 2026 IPO timing reflects company operational readiness or is
      driven by pre-IPO investor lock-up expiration pressure, secondary market liquidity needs, or underwriter-driven window
      timing. No public communication from underwriters on the basis for IPO timing relative to Cape Station milestone achievement
      has been identified.
    whyItMatters: IPO timing driven by investor liquidity rather than company readiness would signal that the public market
      is being asked to absorb risk ahead of the optimal disclosure timing, reducing confidence in the IPO at the top of the
      pricing range.
    diligencePath: Review S-1 use-of-proceeds section for any disclosure linking IPO timing to investor liquidity; request
      management disclosure of lock-up agreements and investor registration rights triggering conditions; analyze underwriter
      selection and timing relative to Series E lock-up expiration dates.
    relatedQuestionRefs:
    - QV012
  - topic: PPA counterparty identities and credit quality beyond Google
    type: private-evidence-only
    severity: material
    missingEvidence: Full PPA contract terms for the 658 MW binding portfolio, including all counterparty identities beyond
      Google, individual credit ratings, contracted MWs per counterparty, pricing per MWh, escalation mechanisms, force majeure
      definitions, and termination provisions, are not publicly disclosed in the S-1.
    whyItMatters: The $7.2B potential revenue backlog is the foundation of all bull and base valuation scenarios; without
      counterparty credit quality and contract terms, investors cannot assess the quality, durability, or downside risk of
      the contracted revenue base.
    diligencePath: Request PPA contract summaries from management under standard NDA; review S-1 exhibit list for any filed
      PPA exhibits; engage energy law counsel to review contract structure; verify all counterparty credit ratings through
      independent credit analysis.
    relatedQuestionRefs:
    - QV014
  - topic: Development pipeline beyond Cape Station and Corsac NPV
    type: private-evidence-only
    severity: minor
    missingEvidence: Net present value analysis of Fervo's development pipeline beyond Cape Station and Corsac Station — encompassing
      the 15+ GW of announced development acreage — has not been independently published or disclosed in the S-1 in a format
      enabling investor verification of pipeline optionality value.
    whyItMatters: Bull and ultra-bull valuation scenarios depend significantly on the value of the development pipeline beyond
      the two near-term projects; without an independently verifiable pipeline NPV, investors are relying entirely on management's
      characterization of the optionality value embedded in the $6.5B target valuation.
    diligencePath: Request resource characterization data for the 475,000-acre land portfolio; commission independent geothermal
      resource assessment from qualified geoscience firm; compare pipeline NPV estimates against NREL and DOE EGS resource
      assessments for the relevant geographies.
    relatedQuestionRefs:
    - QV025
