- id: TV002
  title: Thesis / anti-thesis table
  columns:
  - Argument
  - Bull / Thesis View
  - Bear / Anti-Thesis View
  - What Would Change the View
  rows:
  - - EGS Technology Scalability
    - Project Red proven; Cape Station Phase 1 will be first commercial EGS globally; GeoBlock Factory template enables rapid
      cost reduction
    - No commercial-scale EGS project has ever operated at this scale; thermal drawdown and subsurface variability may prevent
      cost curve realization
    - Phase 1 achieving 100 MW on schedule at or below $7,000/kW overnight cost would validate bull view; Phase 1 delay or
      cost overrun validates bear
  - - Power Demand Tailwind
    - AI data center 24/7 carbon-free power demand is structural; Google and hyperscalers will pay a premium for dispatchable
      geothermal
    - Solar + storage LCOE continues to fall; by 2028-2030 storage pairing may close the dispatchability gap at lower cost
    - BNEF or independent LCOE analysis showing EGS-specific premium shrinking below 20% of solar+storage would weaken bull;
      sustained hyperscaler PPA demand above $70/MWh would strengthen it
  - - Valuation Premium
    - 15+ GW pipeline and $7.2B PPA backlog justify a scarcity premium over operational comparables; no other commercial EGS
      developer exists at this scale
    - At $9.9M/MW of contracted capacity vs. Ormat's $5.3M/MW of operational capacity, 87% premium requires near-flawless
      Phase 1 delivery
    - Phase 1 delivery resets the relevant comparable from pre-commercial to operational; if post-IPO EV/MW contracts to 6-7M/MW
      range, the premium is justified by pipeline optionality
  - - Google Relationship Durability
    - Google as both anchor investor and 3 GW framework partner creates durable commercial alignment; data center power demand
      is a generational tailwind
    - Google concentration creates binary risk; any deterioration in Google's sustainability commitments, energy strategy,
      or Fervo relationship simultaneously hits investor and offtaker pillars
    - Binding commitment advancement from the 3 GW non-binding framework to a signed PPA would materially strengthen bull;
      Google strategic pivot away from geothermal would confirm bear
  - - Regulatory and Seismicity
    - Fervo's traffic-light protocol and monitoring reduce seismicity risk; no enforcement actions to date; Utah regulatory
      environment is permissive
    - Basel precedent demonstrates that a single M3.0+ event can permanently terminate an EGS project; commercial-scale volumes
      at Cape Station have not been tested
    - Third-party USGS or independent seismicity assessment confirming adequate monitoring and low M3+ probability would strengthen
      bull; any seismicity event above M2.5 at Cape Station would shift view toward bear
  - - Capital Access and IPO Market
    - JPMorgan debt validates institutional confidence; Google anchor validates commercial confidence; IPO market timing is
      constructive in clean energy
    - Pre-commercial revenue and $244.5M accumulated deficit limit access to capital in a risk-off market; IPO price sensitivity
      is high given 2026 clean energy IPO volume
    - Successful IPO pricing at or above $22/share demonstrates institutional demand; any IPO withdrawal or pricing below
      $20/share would validate bear capital-access concern
  notes: Thesis and anti-thesis arguments are evidence-grounded from S-1 disclosures, analyst assessments, and comparable
    company analysis. No argument in this table should be treated as investment advice; each view represents a range of reasonable
    investor interpretations.
