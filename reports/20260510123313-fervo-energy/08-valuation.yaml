- id: TV004
  title: Comparable valuation table
  columns:
  - Comparable Company
  - Stage / Status
  - Enterprise Value / Valuation
  - EV/MW (Operational Capacity)
  - Business Model
  - Relevance to Fervo and Limitation
  rows:
  - - 'Ormat Technologies (NYSE: ORA)'
    - Public; ~600 MW operational geothermal
    - ~$3.2B EV (Q1 2026)
    - ~$5.3M/MW operational capacity
    - Conventional hydrothermal geothermal; ORC power plants; U.S. and international
    - Best operational comparable; established track record; lower technology risk and lower capital intensity than EGS; Fervo
      implies 87% premium over Ormat EV/MW on contracted capacity
  - - Calpine Corporation (KKR-owned)
    - Private; ~15 GW gas + geothermal
    - ~$18B EV (2018 acquisition by KKR)
    - ~$1.2M/MW total fleet capacity
    - Gas-fired baseload and geothermal in California; diversified portfolio
    - Provides baseload power multiple reference; not comparable on technology risk or EGS profile; geothermal is small fraction
      of Calpine capacity
  - - Eavor Technologies
    - Private; pilot-stage closed-loop EGS
    - Estimated ~$1.5B post-2023 round
    - N/A — pre-commercial
    - Closed-loop EGS without water injection; no induced seismicity risk; European and North American development
    - Direct EGS competitor; different technology (no water injection); similar capital intensity; no public market price;
      round-implied valuation not fully comparable to Fervo's binding PPA-backed model
  - - AltaRock Energy
    - Private; R&D and early commercial EGS
    - Undisclosed; DOE-funded R&D stage
    - N/A — pre-commercial R&D stage
    - EGS reservoir engineering R&D; no commercial projects operating
    - EGS technology peer at much earlier stage; no binding commercial contracts; not a valuation comparable — useful only
      as technology risk reference point
  - - Baseload Capital / Icelandic Geothermal Portfolio
    - Private; operational geothermal assets in Iceland
    - ~$500M-$1B estimated range (private)
    - ~$3-5M/MW based on estimated capacity
    - Conventional geothermal in high-resource hydrothermal environment; European market
    - Operational geothermal comparable with lower capital intensity than EGS; geographic and resource difference limits direct
      comparability; useful as lower bound on geothermal EV/MW
  notes: Comparable valuations are estimates based on publicly disclosed financing rounds, analyst coverage, and exchange-reported
    data as of Q1 2026. Private company valuations are estimates from disclosed round pricing only and carry significant uncertainty.
    Fervo's implied EV/MW at $6.5B target valuation is based on 658 MW of contracted PPA capacity as the relevant denominator;
    applying it to pipeline capacity of 15+ GW would reduce the implied EV/MW dramatically.
  enumerationScope:
    coverage: partial
    basis: This table covers the most relevant publicly-disclosed geothermal and clean baseload power comparables as of May
      2026; the pre-commercial EGS peer set is nascent with limited public market price discovery. Private company valuations
      are estimates from disclosed rounds only. Additional international geothermal operators in Iceland, Philippines, Kenya,
      and Indonesia are excluded due to different regulatory and resource environments that make direct comparison unreliable.
