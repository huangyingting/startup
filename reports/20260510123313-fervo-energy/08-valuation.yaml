- id: investor-return-exit-scenarios
  title: Investor Return Analysis and Exit Scenarios
  body: IPO investors entering at 21 to 24 dollars per share face a complex return profile shaped by Phase 1 execution lock-up
    dynamics and exit optionality. Series E investors entered at approximately 2.9 billion implied valuation in December 2025
    and the IPO at 6.5 billion represents a 2.2x mark-up in approximately five months. Pre-IPO investors including DCVC B
    Capital and Devon Energy face standard lock-up restrictions that will affect secondary market liquidity in the six months
    following IPO. The 1.25 billion dollar raise at 6.5 billion valuation implies approximately 19 percent dilution to existing
    shareholders. In a bull scenario with five-year holding if Phase 1 delivers and Phase 2 constructs on schedule and GeoBlock
    Factory achieves its cost reduction roadmap strategic acquirer value could range from 8 to 15 billion implying 25 to 50
    percent upside from the IPO mid-price of approximately 22.50 dollars per share. Potential acquirers include major utilities
    seeking carbon-free baseload supply and integrated energy companies seeking EGS technology optionality. In the base scenario
    where Phase 1 delivers with modest delays and Phase 2 commences public market valuation stabilizes at 5 to 7 billion
    representing flat to modest upside from the IPO range. In the bear scenario where Phase 1 is delayed or fails the valuation
    compresses to 2 to 3 billion implying 50 to 70 percent downside from IPO pricing. The asymmetric risk and reward profile
    with meaningful upside only in the bull case and severe downside in the bear case argues for a post-delivery entry strategy
    rather than IPO participation at the top of the range. Lock-up expiry at 180 days post-IPO creates secondary market supply
    that investors should monitor as an entry opportunity if Phase 1 executes cleanly. Renaissance Capital has noted that
    Fervo Energy IPO investor return profile depends almost entirely on Phase 1 milestone delivery and represents a concentrated
    technology execution bet with limited downside protection at 6.5 billion valuation.
