chapter:
  number: 8
  title: Valuation
  summary: 'Fervo Energy targets a ~$6.5B IPO valuation at $21-24/share (Nasdaq: FRVO) based on an S-1 filed in April 2026.
    The company is entirely pre-commercial with $138K in 2025 revenue and a $57.8M net loss, making the valuation depend entirely
    on the probability-weighted value of the Cape Station construction pipeline (Phase 1: 100 MW by October 2026; Phase 2:
    400 MW by 2028), 658 MW of binding PPAs (~$7.2B potential revenue backlog), and a 15+ GW development pipeline. The implied
    EV/capacity ratio of approximately $9.9M/MW of contracted PPA capacity at the IPO target valuation has no close precedent
    among operational geothermal comparables (Ormat Technologies trades at ~$5.3M/MW on operational capacity). The bull case
    at $8-10B requires on-schedule Phase 1 delivery and GeoBlock Factory cost curve progress; the bear case at $2-3B reflects
    Phase 1 delay risk and market multiple compression. The conditional recommendation is: do not participate at $6.5B without
    independent Phase 1 construction verification and full PPA contract disclosure; track for post-IPO entry if Phase 1 delivers
    on schedule in Q4 2026. Key thesis-break triggers are Phase 1 failure, induced seismicity shutdown, and Google commercial
    relationship deterioration.'
sections:
- id: valuation-framework-and-recommendation
  title: Valuation Framework and Investment Recommendation
  body: 'Fervo Energy''s $6.5B target IPO valuation presents one of the most analytically challenging pre-IPO pricing exercises
    in the 2026 clean energy market. The company is entirely pre-commercial: 2025 revenue was $138,000 against a $57.8M net
    loss, and the entire valuation is grounded in future cash flows contingent on Cape Station Phase 1 delivering 100 MW of
    commercial operations by October 2026. There is no precedent for a commercial- scale EGS project in the United States,
    meaning investors are being asked to discount a first-of-kind technology transition at a valuation implying approximately
    $9.9M per contracted megawatt of PPA capacity. The closest operational comparable — Ormat Technologies (NYSE: ORA) — trades
    at approximately $5.3M/MW on proven operational capacity, suggesting Fervo carries an 87% premium over a seasoned geothermal
    operator. This premium is partially justified by Fervo''s long-term addressable market (15+ GW pipeline, $7.2B PPA backlog,
    strategic positioning for data center 24/7 clean power demand), Google''s dual role as anchor investor and primary offtaker,
    and the structural scarcity premium for dispatchable 24/7 carbon-free power in a market dominated by intermittent renewables.
    However, the premium is only defensible if Cape Station Phase 1 delivers on schedule and within budget. The investment
    recommendation is conditional: do not participate at the $6.5B target without independent Phase 1 construction verification,
    full PPA contract disclosure, and seismicity protocol review. Track the IPO for post-close entry if Phase 1 delivers its
    October 2026 commercial milestone, which would mark the first commercial EGS project globally and represent a fundamental
    de-risking event for the entire investment thesis. The IPO price range of $21-24/share per the S-1 implies a pre-money
    market capitalization of approximately $6.0-6.9B. Any final price at the top of this range reflects high demand and requires
    the highest confidence in near-term execution.'
