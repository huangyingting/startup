- id: financial-market-risk
  title: Financial and Market Risk
  body: 'Fervo Energy''s financial risk profile is defined by extreme pre-commercial
    capital intensity against a near-zero revenue base. The company reported 2025 revenue
    of $138,000 against a net loss of $57.8M and an accumulated deficit of $244.5M,
    with 2025 capital expenditures of $465.7M representing one of the highest pre-commercial
    CapEx intensity ratios in the energy sector. Cash of $461.8M and the $421M JPMorgan
    project debt facility provide a construction runway, but covenant structures tied
    to Cape Station operational milestones create cliff-edge risk if Phase 1 is delayed
    beyond agreed construction milestones. Google holds a dual role as the anchor investor
    in the $462M Series E and the primary commercial framework counterparty with a non-binding
    3 GW framework agreement — a concentrated counterparty structure that creates correlated
    risk if the Google relationship deteriorates. The 658 MW of binding PPAs representing
    approximately $7.2B in contracted potential revenue provide significant demand-side
    protection, but the specific PPA pricing, escalation mechanisms, and termination
    provisions remain undisclosed publicly, making independent credit risk assessment
    impossible. Power market price declines from accelerating solar and wind deployment
    and battery storage cost reductions create structural long-term pricing pressure
    on PPA renewals for capacity beyond the current contracted backlog. Capital market
    conditions affect Fervo''s ability to refinance the JPMorgan debt post-construction
    and access equity at favorable terms; the IPO window may close if the S-1 is not
    priced within the filing window. Skeptical analyst commentary has highlighted the
    gap between Fervo''s pre-commercial EGS cost projections and demonstrated cost curves,
    and the 87% premium to operational comparable Ormat Technologies at EV/MW implies
    significant valuation compression risk if Phase 1 delivery is delayed. Devon Energy''s
    $244M strategic investment provides operational credibility from an experienced upstream
    energy company, but Devon itself faces commodity price exposure that could limit
    follow-on capital availability.'
