- id: risk-mitigation-strategies
  title: Risk Mitigation Strategies
  body: 'Fervo has assembled a set of risk mitigations that are meaningful but not fully
    tested at commercial scale. The most important is the seismicity traffic-light protocol
    implemented at Project Red and Cape Station: accelerometers and fiber optic distributed
    acoustic sensing (DAS) continuously monitor ground motion, with preset thresholds
    triggering injection reduction (yellow), pause (orange), and halt (red) to prevent
    magnitude escalation. Project Red''s 18+ months of commercial operations to Google
    without a material seismic event provides the strongest operational proof of the
    protocol''s effectiveness, though Nevada geology differs from Beaver County, Utah.
    GeoBlock Factory standardization addresses technology risk by systematizing drilling
    and completion procedures to reduce per-well cost variance and accelerate learning
    curves. The $461.8M cash position as of early 2026 provides a construction contingency
    buffer, and the Devon Energy strategic partnership brings operational credibility
    and potential co-investment capacity for site-level execution challenges. DOE EGS
    Earthshot program support — including the Project Red pilot grant and subsequent
    funding commitments — provides government-backed technology validation and partial
    cost subsidy for stimulation R&D. The DoD feasibility study selection at NAS Fallon,
    Nevada validates military-grade operational rigor standards for Fervo''s EGS approach.
    Diversified PPA counterparties beyond Google (NV Energy plus undisclosed parties
    totaling 658 MW) reduce single-counterparty termination risk, though concentration
    remains high. Thesis-break monitoring triggers investors should track: Cape Station
    Phase 1 COD announcement, EPA UIC permit status updates, Google framework binding
    conversion events, JPMorgan covenant compliance certifications, and competing EGS
    commercial milestones from Eavor and Sage.'
