- id: regulatory-environmental-risk
  title: Regulatory and Environmental Risk
  body: 'Fervo Energy operates under a complex multi-agency federal and state regulatory
    stack that creates concurrent permitting exposure across five primary regulators.
    The Bureau of Land Management (BLM) administers Fervo''s geothermal leases on federal
    lands under the Geothermal Steam Act of 1970 and can impose conditions of approval,
    issue notices of noncompliance, suspend, or terminate operations for environmental
    violations or failure to meet lease terms. The EPA Underground Injection Control
    (UIC) Class II program regulates fluid injection wells used in EGS operations under
    the Safe Drinking Water Act and can suspend permits if induced seismicity thresholds
    are exceeded. FERC has jurisdiction over Fervo''s wholesale power sales and interconnection
    agreements as Cape Station transitions from construction to commercial operations.
    Utah DEQ environmental review adds state-level permitting complexity including water
    quality, air emissions, and surface disturbance requirements. The most acute regulatory
    risk is induced seismicity. The Basel, Switzerland EGS project was permanently shut
    down in 2009 after a magnitude 3.4 earthquake caused property damage and triggered
    regulatory intervention — a precedent that has influenced every subsequent EGS permitting
    discussion globally. South Korea shut down its Pohang EGS project in 2019 following
    a magnitude 5.5 earthquake linked to injection operations. Fervo has implemented
    traffic-light seismicity protocols that pause or halt injection if accelerometer
    thresholds are exceeded, but these protocols cannot fully prevent a significant seismic
    event from triggering regulatory intervention. Environmental groups including Earthjustice
    have challenged energy infrastructure permits under NEPA, creating litigation risk
    for Fervo''s multi-agency permitting stack. Any regulatory shutdown or permitting
    suspension at Cape Station would constitute a material adverse event triggering project
    debt covenant review, PPA force majeure provisions, and potential IPO pricing failure.'
