- id: primary-competitor-profiles
  title: Primary Competitor Profiles
  body: 'Eavor Technologies (Canada) represents the most technically differentiated
    competitor. Its Eavor-Loop closed-loop system drills two vertical wells connected
    by horizontal laterals, circulating a thermodynamic working fluid that never contacts
    the rock. This architecture eliminates the induced seismicity risk inherent to Fervo''s
    hydraulic fracturing approach and removes the need for permeable fracture networks,
    enabling deployment at sites where Fervo''s EGS would be prohibited or face community
    opposition. Backed by bp and Chevron with approximately $200M raised, Eavor is constructing
    a 65 MW project at Geretsried, Germany. The fundamental difference in approach means
    Eavor and Fervo are not directly substitutable at individual sites but compete for
    the same utility and corporate PPA market. Sage Geosystems (Houston, TX), led by
    former Shell executive Cindy Taff, targets hot dry rock geothermal combined with
    underground pressurized fluid energy storage. Sage signed a 150 MW PPA with Meta
    in 2024 and was selected for a DoD Fort Bliss feasibility study, demonstrating direct
    competition with Fervo for government-sponsored EGS opportunities. AltaRock Energy
    (Seattle) has conducted EGS stimulation at Newberry Volcano in Oregon with DOE funding
    but has not achieved commercial-scale operations, reflecting the technology gap between
    laboratory stimulation and utility delivery. XGS Energy has signed corporate PPAs
    including with technology companies but operates at small scale with approximately
    $30M raised. Ormat Technologies (NYSE: ORA), with approximately 1,500 MW of operating
    geothermal capacity and $800M in 2024 revenue at roughly 15x EV/EBITDA, provides
    the most direct public market comparable. Ormat is profitable, has a 35-year track
    record in conventional geothermal, and is expanding into EGS and binary cycle upgrades.
    Fervo''s pre-IPO valuation of approximately $6.5B at Cape Station scale implies
    an 87% premium over Ormat''s EV/MW ratio on undelivered capacity, justified only
    by the EGS technology premium and growth option value. Investors who disagree with
    this premium face significant valuation compression risk if Cape Station underperforms.'
