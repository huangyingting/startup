- id: key-person-organizational-risk
  title: Key-Person and Organizational Risk
  body: 'Fervo Energy''s technology advantage is substantially concentrated in the intellectual
    capital of its two co-founders. CEO Tim Latimer holds an MS in Energy Resources
    Engineering from Stanford University, brings oil and gas drilling and completions
    experience from prior industry roles, and leads Fervo''s executive team, investor
    relations, and IPO process. CTO Jack Norbeck holds a Stanford PhD in Energy Resources
    Engineering and serves as the primary technical architect of Fervo''s horizontal
    EGS drilling and fiber optic reservoir monitoring approach. Both founders developed
    the core technology framework at Stanford and hold critical institutional knowledge
    about the stimulation design, wellbore architecture, and subsurface interpretation
    methodology that differentiates Fervo from competitors. The departure of either founder
    before Cape Station Phase 1 reaches commercial operations would represent a material
    adverse event that is unlikely to be fully compensated by any single hire. As a
    pre-commercial company with approximately 225 employees, Fervo lacks the organizational
    depth to fully replicate founder-concentrated technical and commercial functions
    in the near term. The IPO process itself creates key-person distraction risk as
    senior leadership diverts time to investor roadshow, SEC comment periods, and public
    market governance requirements during the most critical construction execution window.
    Post-IPO, lock-up expiration and liquid equity will create founder and senior executive
    retention risk from competing offers. Investors should request multi-year employment
    agreements, unvested equity schedules, and succession plans for the CEO and CTO roles
    as a condition of IPO investment.'
  claimRefs:
  - CR019
  tableRefs:
