- title: Technology Differentiation and Feature Comparison
  body: 'Fervo Energy competitive differentiation centers on four pillars: (1) proven horizontal drilling adapted from oil
    and gas, enabling multi-lateral well configurations that competitors have not yet demonstrated at commercial scale; (2)
    distributed temperature sensing (DTS) via fiber-optic cables enabling real-time reservoir monitoring and optimization;
    (3) GeoBlock modular factory design targeting 30% drilling cost reduction through standardized prefabricated components;
    and (4) PowerFlex flexible dispatch capability that enables geothermal to participate in ancillary services markets—frequency
    regulation, capacity, and demand response—that are unavailable to conventional baseload geothermal competitors. NREL analysis
    confirms that EGS, closed-loop geothermal systems (CLGS), multi-zone fracturing, and deep millimeter-wave are complementary
    technologies addressing different resource windows rather than direct substitutes. Eavor Technologies closed-loop design
    avoids hydraulic fracturing entirely, offering a differentiated risk profile for induced seismicity-sensitive permitting
    jurisdictions. However, Latitude Media analysis notes that EGS and CLGS are complementary rather than competitive in most
    markets, as they address different geological conditions. Quaise Energy microwave vaporization has potential for accessing
    ultra-deep heat reservoirs but remains pre-demonstration and years from commercial validation. Ormat conventional geothermal
    benefits from decades of operational experience and a public-company balance sheet but is constrained to hydrothermal
    resource locations. RMI analysis identifies subsurface well data, operational DTS IP, and PPA contractual lock-in as the
    three sustainable EGS moats, noting Fervo is uniquely positioned with all three demonstrated.'
  tableRefs:
  - TP003
  figureRefs:
  - FP002
