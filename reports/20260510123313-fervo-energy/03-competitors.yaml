- title: Pricing and Commercial Strategy
  body: Fervo Energy commercial strategy focuses on long-term, baseload PPAs with investment-grade utilities and hyperscalers—a
    segment where conventional geothermal and intermittent wind and solar cannot offer comparable 24/7 reliability. The NV
    Energy PPA for 400 MW at Cape Station sets the US reference price for EGS offtake; the specific price per MWh is commercially
    confidential, though analyst estimates range from $60-80/MWh. Google framework agreement for up to 3 GW signals hyperscaler
    willingness to pay a premium for firm dispatchable renewables as AI data center power demands intensify. The Financial
    Times reports that hyperscalers are actively courting both EGS and nuclear SMR developers for firm clean power, creating
    a competitive auction dynamic that should support Fervo pricing power. Rocky Mountain Institute analysis finds geothermal
    EGS competitive at $60-80/MWh at scale versus nuclear SMR at $100-150+/MWh, with both superior to solar plus storage for
    true 24/7 baseload reliability. Eavor has signed early PPAs in Europe at €80-100/MWh, somewhat higher than Fervo estimated
    US pricing. LBNL PPA benchmark data shows conventional geothermal averaging $70-85/MWh in the US, suggesting EGS at commercial
    scale will be price-competitive. Fervo PowerFlex flexible dispatch capability adds a potential ancillary services revenue
    stream—frequency regulation, capacity markets—that could supplement base PPA revenue and improve overall project economics
    over time. The GeoBlock factory cost reduction program targets 30% per-well cost reductions at scale, which would further
    compress the cost-of-service and potentially enable more competitive PPA pricing in future rounds.
