sections:
- title: EGS Competitive Landscape Overview
  body: 'Enhanced Geothermal Systems (EGS) remains a small, nascent market dominated by a handful of well-funded startups.
    Fervo Energy is the clear leader in commercial EGS with its Cape Station project—the first utility-scale EGS facility
    under construction in the US. The global EGS investment landscape reached $3.8 billion in 2024-2025 combined, according
    to BNEF, signaling accelerating capital formation across the sector. Direct competitors include Quaise Energy (millimeter-wave
    borehole vaporization), AltaRock Energy (multi-zone EGS), and Eavor Technologies (closed-loop geothermal), each pursuing
    differentiated technology approaches that target different resource windows. Conventional geothermal operators such as
    Ormat Technologies (NASDAQ: ORA) compete for the same baseload renewable energy offtake market but lack EGS scalability,
    being constrained to specific hydrothermal resource locations. Large integrated energy companies including SLB and Chevron
    hold nascent EGS programs through investments and internal R&D, and The Information reports they could become formidable
    competitors within 5-7 years. Fervo strongest competitive moat is its commercial-scale horizontal drilling expertise,
    adapted from O&G, combined with its Cape Station first-mover advantage in securing long-term utility PPAs. Wood Mackenzie
    independently assesses Fervo as holding a 3-5 year first-mover advantage in US commercial EGS as of May 2026. The Geothermal
    Rising 2026 industry report cites Cape Station as the global EGS bellwether project, reflecting the company outsized industry
    significance relative to its development stage.'
  tableRefs:
