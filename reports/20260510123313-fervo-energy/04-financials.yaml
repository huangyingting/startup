sections:
- title: Revenue Stage and Business Model
  summary: Fervo Energy is in a pre-commercial revenue stage with nominal revenue from test operations while its first commercial
    asset, Cape Station, approaches commercial operation. Revenue comes primarily from a capacity-payment PPA with NV Energy
    for 400 MW of geothermal baseload power, covering potential $7.2 billion in contracted revenue over 25+ years.
  tableRefs:
  - TI001
  figureRefs:
  - FI001
  claimRefs:
  - CI001
  - CI002
  - CI003
  - CI004
  - CI005
  - CI006
  - CI007
  - CI008
  - CI037
  body: Fervo Energy is a pre-commercial energy company generating nominal revenue from test-well operations while Cape Station,
    its first commercial Enhanced Geothermal System, advances toward commercial operation. The company primary revenue model
    relies on long-term power purchase agreements (PPAs) with creditworthy utility and technology counterparties. The flagship
    NV Energy PPA covers 400 MW of baseload geothermal capacity over 25 years, representing a contracted revenue stream of
    approximately $7.2 billion in present value. Google has signed a non-binding framework for up to 3 GW of additional capacity.
    Revenue recognition commences upon each facility reaching commercial operation date (COD). The PPA structure—featuring
    capacity payments independent of actual energy output—reduces revenue recognition uncertainty during the pre-COD period.
    This is a capital-intensive infrastructure model with high upfront costs and minimal pre-COD revenue, analogous to early-stage
    offshore wind or nuclear developers that accrue contracted revenue only after construction milestones. Fervo reported
    $138,000 in revenue for FY2025 and $199,000 for FY2024, both from a small pilot well at Cape Station delivering power
    to the grid under test agreements.
- title: Cost Structure and Operating Expenses
  summary: Fervo operating costs are dominated by R&D (drilling technology, subsurface characterization) and capital construction
    for Cape Station. G&A is modest relative to CapEx. The company burns cash at scale typical of infrastructure build-outs
    with an anticipated path to operational cash flow post-COD.
  tableRefs:
  - TI002
  figureRefs:
  - FI002
  claimRefs:
  - CI009
  - CI010
  - CI011
  - CI012
  - CI013
  - CI014
  body: Fervo Energy cost profile is dominated by capital expenditures for well drilling and surface construction at Cape
    Station. In FY2025, capital expenditures reached $465.7 million, reflecting the aggressive drilling campaign to complete
    the multi-well field. R&D expenses of $39.7 million cover EGS drilling technology development, fiber-optic distributed
    temperature sensing (DTS) systems, and reservoir engineering. G&A expenses of $21.8 million include executive team buildout,
    legal and regulatory compliance, and IPO preparation costs. The company operating cost structure is capital-intensive
    by design—each EGS well pair costs approximately $8–15 million to drill and complete, and Cape Station requires 34+ well
    pairs for full capacity. Once operational, geothermal has near-zero fuel cost and low variable operating expenses, leading
    to high operating leverage post-COD. Federal and state geothermal royalties (1.75–3.5% of gross revenue on federal lands)
    add a modest ongoing obligation. The overall cost model improves substantially at scale as drilling becomes standardized
    and GeoBlock modular factory technology reduces per-well costs by a targeted 30%.
- title: Funding History and Capital Structure
  summary: Fervo has raised over $1.5 billion in total capital including equity rounds from Breakthrough Energy Ventures,
    DCVC, Capricorn, Google, and Devon Energy, plus DOE Loan Programs Office support and a $421M JPMorgan project debt facility.
    The latest Series E ($462M) positions Fervo for the announced IPO.
  tableRefs:
  - TI003
  - TI004
  figureRefs: []
  claimRefs:
  - CI015
  - CI016
  - CI017
  - CI018
  - CI019
  - CI020
  - CI021
  - CI022
  body: 'Fervo Energy has assembled one of the most diverse and well-structured capital stacks in US clean energy history.
    Total capital formation exceeds $2.1 billion, comprising approximately $1.277 billion in equity from seven rounds, a $400
    million DOE Loan Programs Office guarantee, and a $421 million JPMorgan-led project debt facility. Equity investors span
    strategic and financial categories: Breakthrough Energy Ventures (Series A), DCVC and Capricorn Investment Group (Series
    B), Devon Energy and bp ventures (Series D), and B Capital with Google as anchor (Series E, December 2025). Strategic
    partners such as Devon Energy provide both capital and subsurface drilling expertise. The DOE guarantee (conditional commitment,
    2024) backstops Cape Station project debt, lowering the cost of capital and signaling federal government validation of
    EGS technology maturity. Project debt from JPMorgan (March 2026) is ring-fenced to Cape Station construction. Post-Series
    E implied valuation is approximately $5 billion, rising to a $6.5 billion target at the pending IPO. The diversified capital
    stack—spanning government, institutional, strategic, and public market participants—represents best-in-class funding architecture
    for first-of-kind infrastructure.'
- title: Financial Projections and Adequacy
  summary: Fervo financial model targets commercial operation at Cape Station in 2026-2027, unlocking ~$250M+ in annualized
    PPA capacity revenue. Bull scenario assumes rapid scale to 1+ GW; bear scenario includes drilling cost overruns or permitting
    delays that delay COD. Current capital position is assessed as adequate for Cape Station completion with moderate cushion.
  tableRefs:
  - TI005
  figureRefs:
  - FI003
  - FI004
  claimRefs:
  - CI023
  - CI024
  - CI025
  - CI026
  - CI027
  - CI028
  - CI029
  - CI030
  - CI036
  - CI038
  body: 'Financial projections center on Cape Station achieving commercial operation date, which drives the primary revenue
    inflection. Wood Mackenzie and Green Stocks Research base-case models project $25 million in 2026 revenue (partial COD)
    rising to approximately $145 million in 2027 (full 400 MW capacity). The bull scenario—assuming GeoBlock cost reductions
    accelerate Phase 2 development—projects $520 million by 2029. The bear case assumes COD delays to 2028 due to drilling
    cost overruns or subsurface variability, limiting 2027 revenue to $35 million and potentially requiring bridge financing.
    Capital adequacy assessment: Fervo held $461.8 million in cash as of December 2025 with approximately $40 million monthly
    CapEx burn, providing roughly 11 months of direct cash runway plus DOE and JPMorgan facility drawdown capacity. The Financial
    Times has flagged the IPO valuation as aggressive given pre-commercial status, and Fitch notes that 18–24 month COD slippage
    represents the primary financial stress scenario. Overall, capital adequacy is assessed as sufficient for Cape Station
    completion under base-case assumptions, with moderate cushion and multiple contingency levers including the pending IPO
    proceeds.'
