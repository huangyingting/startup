summary:
  headline: >-
    Fervo Energy 是全球 EGS 领头羊，握有 658 MW 具约束力 PPA 和 $7.2B 积压订单；但公司仍处商业化前阶段， 估值较运营中地热可比公司溢价 87%——只有 Cape Station Phase 1
    按时交付，$6.5B IPO 才站得住。
