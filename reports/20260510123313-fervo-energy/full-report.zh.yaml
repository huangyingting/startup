              - CO004
          - type: callout
            title: Google 同时是投资人和承购方，带来一致性也带来集中风险
            body: >-
              Google 既作为 Series E 锚定投资人参与，又签署最高 3 GW 的无约束力框架，再加上 Corsac Station 的在执行交付义务， 让 Google 同时成为 Fervo
              商业管线中的财务利益相关方和最重要收入交易对手。这一双重角色强化了双方围绕数据中心 24/7 无碳能源交付的一致性，但也制造出实质集中风险：如果 Google 商业关系恶化——无论源于 Google
              自身能源战略调整、 监管变化还是合同争议——投资者基础和主要收入管线都会同时受影响。
