            body: >-
              财务预测围绕 Cape Station 达到商业运营日展开，这是主要收入拐点。Wood Mackenzie 和 Green Stocks Research 的基准模型预计， 2026 年收入为 $25
              million（部分 COD），2027 年升至约 $145 million（400 MW 满负荷）。 乐观情景假设 GeoBlock 降本加速 Phase 2 开发，预计 2029 年达到 $520
              million。 悲观情景假设钻井成本超支或地下差异导致 COD 延至 2028 年，把 2027 年收入限制在 $35 million，并可能需要过桥融资。 资金充足性评估：截至 2025 年 12
              月，Fervo 持有 $461.8 million 现金，月度资本开支消耗约 $40 million， 直接现金跑道约 11 个月，另有 DOE 和 JPMorgan 工具的提款能力。Financial
              Times 已提示，考虑到商业化前状态，IPO 估值偏激进； Fitch 指出，COD 滑坡 18–24 个月是主要财务压力情景。总体看，在基准假设下，资金足以完成 Cape Station，
