      - number: '8.3'
        title: 投资论点风险与最终尽调问题
        blocks:
          - type: paragraph
            body: >-
              Fervo Energy 的投资论点建立在四个顺序假设上，每一个都必须成立，目标估值才能兑现：（1）Cape Station Phase 1 在 2026 年 10 月前按期交付 100 MW
              商业运营，且没有重大成本超支；（2）GeoBlock Factory 从 $7,000/kW 降至 $3,000/kW 的降本轨迹，在 Phase 2 和后续项目中开始显示可衡量进展； （3）Google
              不具约束力的 3 GW 框架向约束性 PPA 承诺推进，夯实长期收入可见度；（4）开发生命周期内的监管和地震环境保持许可友好。 反论点同样清楚：以 $6.5B
              估值，投资者是在为一项首创技术的完美执行买单。Cape Station Phase 1 交付失败将抹去 $7.2B PPA 收入合同储备，
              触发债务契约风险，并让商业化前资产基础暴露在全部累计亏损之下。论点破裂触发器包括：Phase 1 任何运营失败或延迟至 2027 年 Q2 之后； 任何需要监管关停注入作业的诱发地震事件；Google 退出 3
              GW 框架；或任何损害 Phase 2 所需股权和债务资本获取能力的不利资本市场变化。 IPO 参与前的最终尽调问题包括：（1）独立工程验证 Phase 1 井数、完井表现和 ORC 采购状态；（2）完整 PPA
              合同条款，包括交易对手信用质量、 每 MWh 定价、递增和终止；（3）Cape Station 场址地震监测协议阈值和当前背景地震数据；（4）IPO 时完整股权结构瀑布，
              包括按比例认购权和锁定条款；（5）单位经济披露，包括 Phase 1 和 Phase 2 尺度下的单井成本与 LCOE 预测。这套尽调材料的强度将决定 IPO 投资能否按 $21–24/share
              区间的顶部、中部或底部承销——或者，Phase 1 交付后再进入是否才是风险调整后更优路径。
