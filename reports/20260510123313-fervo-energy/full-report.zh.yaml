      - number: '1.4'
        title: 融资历史与资本结构
        blocks:
          - type: paragraph
            body: >-
              截至 2026 年 4 月，Fervo 已拼出一套复杂的多来源资本结构，覆盖股权轮次、战略投资和项目债务， 累计融资远超 $1.5 billion。公司的首笔机构资金是 2021 年来自 Breakthrough
              Energy Ventures（BEV）的 $28M Series A； BEV 是 Bill Gates 支持的气候科技基金，这一轮建立了早期使命契合型投资者背书。 2022 年 DCVC 和
              Capricorn Investment Group 联合领投的 $138M Series B 为 Project Red 验证和 Cape Station 早期开发提供了现金跑道。 2024 年 2
              月，Devon Energy Corporation 投入标志性的 $244M Series D 战略投资；作为上游油气巨头， Devon 的参与既验证了水平钻井的适用性，也带来供应链关系。2024 年 12
              月，公司新增 $255M 组合融资 （Capricorn $135M Series D 延展轮，加上大宗商品交易商 Mercuria 提供的 $120M 债务）。 2025 年 6 月，BEV 牵头追加
              $206M，拆分为 $100M 股权和 $106M 债务。2025 年 12 月，公司完成最大一轮融资： B Capital 联合 Google 领投 $462M Series E，Google
              作为锚定投资人同时验证了投资逻辑和商业关系。 Fervo 于 2026 年 1 月宣布 IPO，目标以约 $6.5 billion 估值募资 $1.25 billion；2026 年 4 月提交 S-1； 并在
              2026 年 3 月从 JPMorgan 牵头的机构银团获得 $421M 项目债务，用于 Cape Station 建设。 财务上，Fervo 仍处于商业化前阶段：2025 年收入 $138,000（低于
              2024 年的 $199,000）， 2025 年净亏损 $57.8M（2024 年为 $41.1M），2025 年资本开支达到 $465.7M。 截至 2025 年 12 月 31 日，现金为
              $461.8M。IPO 成败高度取决于 Cape Station Phase 1 能否按计划在 2026 年 10 月达到商业化里程碑。
