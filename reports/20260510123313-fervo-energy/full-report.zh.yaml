      - number: '2.4'
        title: 增长驱动因素与采用约束
        blocks:
          - type: paragraph
            body: >-
              EGS 电力市场受益于几股结构性顺风，支撑 2030 年代的有利采用环境。最关键的驱动因素是 AI 带来的数据中心用电激增： 美国数据中心目前每年消耗约 200 TWh（约占美国总用电量的
              4-5%），且随着超大规模云厂商扩张 GPU 密集型训练和推理基础设施， 年增速达到 15-25%。这部分负荷增长直接转化为对 24/7 无碳基荷供给的采购需求，形成定义 Fervo 机会的高价买方群体。
              2022 年 Inflation Reduction Act 是第二个关键顺风：地热项目可获得 30-50% 投资税收抵免（ITC）或 $27.50-55/MWh 生产税收抵免（PTC）， 在项目生命周期内把
              Fervo 的有效 LCOE 降低数亿美元，并让 IRA 前不可行的成本结构具备项目融资可能。 DOE 的 Enhanced Geothermal Shot 是 2022 年启动的政策项目，目标到 2035
              年把成本降至 $45/MWh； 它提供政策承诺和 R&D 共同投入，为 EGS 技术成熟去风险。油气水平钻井技术转移（Devon Energy 合作为代表）持续降低单井成本。 抵消这些顺风的是实质约束。EGS
              资本强度为 $4-8M/MW，而公用事业级太阳能为 $1-2M/MW； 这限制部署速度，并要求大额项目债务工具。地下地质风险——钻井可能打出表现不佳的井——在开钻前无法完全消除。 美国西部 3-5
              年并网积压限制了近期项目完工时间，即便项目已完全融资。兼具地球科学、石油工程和发电经验的专业人才有限， 也压住了扩张速度。
