  - number: 5
    title: 产品与技术
    sections:
      - number: '5.1'
        title: 按客户工作流定义产品
        blocks:
          - type: paragraph
            body: >-
              Fervo Energy 的核心产品，是根据 15–25 年长期电力购买协议向公用事业和大型商业买方交付的稳定、可调度、24/7 无碳电力。 在客户工作流中，公用事业或企业买方签下一份固定价格基荷
              PPA，锁定一块兆瓦容量；Fervo 随后设计、建设并运营地下地热系统， 在电网互连点交付合同电量。不同于风电和太阳能，EGS 资源——储存在地壳中的热量——持续存在且不受天气影响， 因此 Fervo
              的输出像传统热电基荷电站，但燃料成本为零，碳排放近乎为零。

              Google 这样的企业买方需要解决一个具体问题：用可证明的 24/7 无碳电力为高耗能数据中心供电， 并按小时匹配实际负荷，而不是只按年度平均匹配。按年度匹配的风电和太阳能 PPA
              在夜间或多云、发电为零时仍留下剩余碳足迹； Fervo 的 EGS 用稳定全天候无碳发电补上这个缺口。对公用事业公司，产品则满足综合资源规划对可调度、稳定清洁容量的要求， 这是可变可再生能源单独无法完成的。

              Fervo 的次级产品是 PowerFlex，一个储层管理平台，可让电站根据实时电网信号把输出调节 ±20%。 它把 EGS 电站从固定输出基荷资源变成灵活的稳定清洁发电机，可参与调频、可调度爬坡和容量市场；
              相比纯基荷运营，这带来有意义的定价溢价，也让 Fervo 在电网运营商价值维度上区别于风电和太阳能。
            claimRefs:
              - CE001
              - CE002
              - CE003
              - CE016
