      - number: '8.2'
        title: 情景分析与可比估值
        blocks:
          - type: paragraph
            body: >-
              Cape Station 的二元执行风险让 Fervo Energy 的估值区间异常宽。在多头情景下——Cape Station Phase 1 按期交付、GeoBlock Factory
              实现首轮降本、Google 不具约束力的 3 GW 框架向约束性承诺推进——投资界可能把规模化开发商溢价套用到 15+ GW 管线，估值可扩张至 $8–10B。该情景假设 Phase 1 成功，并为 Phase
              2 和后续项目建立模板，从而压低未来开发资本的感知风险溢价。基准情景反映 IPO 价格区间和适度的 Phase 1 执行纪律，$5–7B 区间与当前合同容量和中等技术溢价相符。空头情景——Phase 1
              延迟六个月或更久、初始交付 LCOE 仍高于 $100/MWh，或发生重大诱发地震事件——会把估值压缩至 $2–3B，因为市场会重估完整商业交付的概率。可比估值因缺少商业 EGS 同行而复杂化：Ormat
              Technologies 是最佳运营可比公司，但其运营传统水热资产，技术风险更低、成本曲线更成熟。Eavor Technologies 和其他私有 EGS
              开发商提供部分参照，但没有公开市场价格发现。Calpine Corporation（由 KKR 以约 $18B 企业价值收购）提供基荷发电倍数参照， 但其是成熟、多元化资产组合，没有技术不确定性。BNEF
              预计，到 2030 年超大规模科技公司需求将超过供给，24/7 无碳电力溢价将持续， 支撑 Fervo PPA 定价中嵌入的长期收入溢价。Lazard 的 LCOE 分析估计，商业规模 EGS 为
              $80–150/MWh，而公用事业太阳能为 $25–40/MWh——这一成本差距是 EGS 技术长期竞争地位中最重要的变量，也直接关系到 Fervo 的第 N 个同类项目成本目标。
