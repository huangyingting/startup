  - number: 7
    title: 风险
    sections:
      - number: '7.1'
        title: 竞争格局概览
        blocks:
          - type: paragraph
            body: >-
              Fervo Energy 处在三股竞争力量的交汇点：部署类似水平钻井和压裂方案的增强型地热系统（EGS）开发商，向工程化系统扩张的传统地热运营商， 以及争夺同一长时电力采购需求的相邻 24/7 清洁基荷技术。在
              EGS 类别中，Fervo 面对 Eavor Technologies；其闭环 Eavor-Loop 系统让工质在钻井网络中循环，不接触岩层，从而消除诱发地震风险，但代价是可触达温度更低、地理适用性更窄。Sage
              Geosystems 面向热干岩地热叠加加压流体储能，2024 年与 Meta 签署 150 MW PPA，并入选 Fort Bliss Army Base 的 DoD 可行性研究。 AltaRock
              Energy 和 XGS Energy 分别代表由 DOE 拨款和早期企业 PPA 支持的更早期 EGS 商业化尝试，但二者都尚未实现商业规模运营。 GreenFire Energy 运营由 Baker
              Hughes 支持的闭环地热改造技术，并在 2024 年获得 DoD Naval Air Facility El Centro 可行性研究。Ormat Technologies（NYSE:
              ORA）是占主导地位的上市地热运营商，运营容量约 1,500 MW，2024 年收入 $800M， EV/EBITDA 约 15x，是与 Fervo 商业化后估值最相关的市场可比公司。争夺 24/7 CFE
              采购需求的相邻技术包括公用事业级太阳能加电池储能 （LCOE 快速下降但持续时长有限）、先进核能 SMR（Kairos、TerraPower、NuScale 目标在 2020 年代后期商业部署）和抽水蓄能。
              Fervo 的 475,000 英亩地热权利组合、Project Red 运营记录和 658 MW 具有约束力的 PPA 提供了竞争差异化；但只有 Cape Station Phase 1
              按期交付并在商业尺度验证 EGS，土地位置和技术领先才守得住。任何竞争对手在可比尺度完成一次示范，都会显著压缩 Fervo 在 PPA 谈判和 IPO 定价中的先发溢价。
            claimRefs:
