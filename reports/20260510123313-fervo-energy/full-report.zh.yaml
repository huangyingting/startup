      - number: '7.5'
        title: 监管与环境风险
        blocks:
          - type: paragraph
            body: >-
              Fervo Energy 处在复杂的联邦与州多机构监管栈之下，五个主要监管方带来并行许可风险。美国土地管理局（BLM） 根据 1970 年《地热蒸汽法》管理 Fervo
              在联邦土地上的地热租约，可设置批准条件、发出违规通知，并因环境违规或未满足租约条款而暂停或终止运营。 EPA 地下注入控制（UIC）Class II 项目根据《安全饮用水法》监管 EGS 作业使用的流体注入井；
              如果诱发地震超过阈值，可暂停许可。Cape Station 从建设转入商业运营后，FERC 对 Fervo 的批发电力销售和并网协议拥有管辖权。 Utah DEQ
              环境审查增加州级许可复杂度，包括水质、空气排放和地表扰动要求。最尖锐的监管风险是诱发地震。瑞士 Basel EGS 项目在 2009 年因一次 3.4
              级地震造成财产损失并触发监管介入而永久关闭——这一先例影响了全球后续每一次 EGS 许可讨论。 韩国在 2019 年关闭 Pohang EGS 项目，此前一场 5.5 级地震被认为与注入作业有关。Fervo
              已部署交通灯地震协议； 一旦加速度计阈值被突破，协议会暂停或停止注入，但这些协议无法完全防止一次重大地震事件触发监管介入。Earthjustice 等环保组织曾根据 NEPA 挑战能源基础设施许可，为 Fervo
              的多机构许可栈带来诉讼风险。Cape Station 的任何监管关停或许可暂停，都会构成重大不利事件， 触发项目债务契约审查、PPA 不可抗力条款，以及潜在 IPO 定价失败。
