      - number: '1.5'
        title: 里程碑与治理
        blocks:
          - type: paragraph
            body: >-
              Fervo 从创立到提交 IPO 文件历时九年，跨过了创立、技术验证、融资和监管推进等关键节点。 2022 年 Project Red 成功，是首个在犹他州用水平钻井完成的现场规模 EGS 演示；
              这一关键技术里程碑把投资者疑虑转化为信心，并促成了 Series D 及后续资本形成。 Devon Energy 2024 年的战略投资，是大型油气公司首次以规模化资金押注 EGS 技术，带来行业可信度和运营
              know-how。 Google 于 2025 年 12 月作为锚定投资人参与 Series E，同时验证了数据中心负荷对 24/7 无碳地热电力的商业需求， 并给 Fervo
              带来最大一轮股权融资。公司治理结构包括由 Margaret C. Whitman 担任首席独立董事的董事会； 对进入公开市场的公司而言，这提供了成熟的上市公司监督。反向因素包括：收入基础完全商业化前、
              持续资本需求巨大、EGS 开发固有的地下岩土风险、联邦和州土地许可复杂，以及近期价值创造集中在 2026 年 10 月 Cape Station Phase 1 里程碑。2026 年 4 月提交给 SEC 的
              S-1 详细披露了这些风险，并提供经审计财务报表供投资者审阅。
