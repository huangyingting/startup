        - 传统水热地热（仅蒸汽区域）；无需压裂的闭环地热替代方案
        - 作为 IPP 购电方的公用事业；科技公司直接 PPA；NV Energy、Google
        - Fervo 的主要收入机制；Cape Station 和 Corsac Station 是首批规模化商业 EGS 资产
      - - 传统地热（可比）
        - 来自天然渗透资源区的蒸汽型或闪蒸型地热；成熟技术，在美国装机 3.8 GW
        - EGS 和闭环下一代替代方案
        - 公用事业和批发电力市场；美国西部由 Ormat Technologies（ORA）主导
        - 为 Fervo 电价提供价格锚和竞争对手参照；Ormat 的 ~$80-100/MWh PPA 价格是基准
      - - 稳定清洁电力市场（替代）
        - 任何 24/7 清洁电力供应——核能 SMR、与可再生能源搭配的长时储能、配碳捕捉的燃气——满足基荷清洁能源需求
        - 没有足够储能时长的间歇性风能和太阳能；传统化石基荷
        - 寻求无碳基荷的科技公司和公用事业；与 EGS 同一类买家
        - 定义 Fervo 的竞争框架；买方会按成本和可靠性，把地热与所有稳定零碳选项比较
      - - AI / 数据中心电力采购
        - 面向超大规模云数据中心运营商的直接供电协议；与数据中心逐小时负载匹配的 24/7 CFE 合同；双边 PPA 和框架协议
        - 没有 CFE 属性的传统公用事业合同；不做时间匹配的打包 REC
        - Google、Microsoft、Amazon、Meta 的能源副总裁和可持续发展副总裁；数据中心能源管理团队
        - 增长最快的细分；AI 带来的负载增长和 24/7 CFE 要求，直接推动 Fervo 的 Corsac Station 和 Google 3 GW 框架；相对现货市场具备溢价
      - - 美国公用事业可再生能源整合
        - 公用事业综合资源计划中的长期容量 PPA；RPS 合规采购；用基荷地热平衡美国西部电网的间歇性风光
        - 煤电或纯燃气传统采购；没有容量承诺的短期现货采购
        - 州公用事业监管机构，以及 NV Energy、PacifiCorp、PGE 等西部公用事业的 IRP 规划团队
        - 提供数十年合约基础；NV Energy 是 Fervo 现有交易对手；TM003 详列完整买方图谱
    notes: >-
      市场边界定义来自 Fervo 的 S-1 文件、DOE Enhanced Geothermal Shot
      文档，以及独立分析师对稳定清洁电力市场的刻画。排除支出边界偏保守：任何与相邻可再生能源采购市场重叠的部分都被排除，以避免重复计算。买方 / 付款方条目反映已披露的 Fervo 交易对手（Google、NV
      Energy），并加入可类比的公用事业和工业细分。传统地热可比公司基于 Ormat Technologies 公开财务数据和 EIA 美国装机容量数据。
