            title: 数据中心需求撑起持续的高价买方群体
            body: >-
              来自 Google、Microsoft、Amazon 和 Meta 等超大规模云厂商的 AI 用电需求，创造了一个结构性新买方类别： 它们愿意为经认证的稳定性支付较现货电价 20-40% 的溢价，采购 24/7
              无碳基荷电力。 美国数据中心目前每年用电约 200 TWh，随着 AI 训练和推理负载放大，年增速为 15-25%。 Google 到 2030 年的 24/7 CFE 承诺，加上现有 Corsac
              Station 协议和与 Fervo 的无约束力 3 GW 框架， 体现出五年前尚未大规模存在的采购动态。该买方群体直接奖励 EGS 的核心属性——24/7 基荷电力——
              并且在同等溢价下难以用间歇性太阳能或风电替代，因此 Fervo 在当前容量稀缺的细分市场中拥有定价权。
            calloutType: strength
            claimRefs:
              - CM017
              - CM018
              - CM019
              - CM024
              - CM025
          - type: callout
            title: EGS 商业规模成本竞争力仍未验证
            body: >-
              当前 EGS LCOE 估计约 $80-100/MWh，必须在 2035 年前降至 DOE Enhanced Geothermal Shot 的 $45/MWh 目标， 才能在没有 IRA
              补贴的情况下与太阳能加储能竞争。IRA 税收抵免短期能弥合差距，但 IRA 修改的政治风险并不低。 在 Cape Station Phase 1 于 2026 年底或 2027
              年交出经验证的商业规模成本基准之前，降本路径仍是假设， 不是已证明结果。IEEFA 指出，地热复兴面临真实障碍，包括高前期资本成本、地下差异性和漫长许可周期——成本模型可能低估这些风险。 投资者应把 EGS
              成本预测视为必须用 Cape Station 运营数据独立验证的假设。
