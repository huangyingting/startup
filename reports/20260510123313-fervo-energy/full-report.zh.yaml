      - number: '2.3'
        title: 买方分层与采购动态
        blocks:
          - type: paragraph
            body: >-
              三类主要买方定义了 EGS 电力需求，每类的动机、预算归属和采用触发点都不同。科技超大规模云厂商——主要是 Google、Microsoft、Amazon 和 Meta——
              是增长最快、价值最高的买方类别。这些公司公开承诺到 2030 年实现 24/7 无碳能源（Google 明确设定该目标）， 背后驱动力是投资者和监管方对 Scope 2 排放核算的压力，以及 AI
              基础设施可持续性的声誉要求。 它们的数据中心能源采购团队在可持续发展副总裁或能源采购副总裁层级执行长期 PPA， 并表现出为经认证的 24/7 CFE 稳定性支付较现货市场 20-40% 溢价的意愿。Google
              现有 Corsac Station 协议（115 MW） 和与 Fervo 的无约束力 3 GW 框架，就是这种采购模式的例子。电力公用事业公司是第二大买方群体， 由 California、Nevada、New
              Mexico 及其他西部州的可再生能源组合标准推动，这些标准要求 2030-2045 年实现 100% 清洁电力。 NV Energy 是 Fervo 在 Corsac Station 和 Cape
              Station PPA 下的关键公用事业交易对手。公用事业采购通过综合资源规划（IRP） 流程进行，合同期限 20-30 年，由资源规划副总裁团队管理，并须州监管机构批准。
              工业直采买方——钢铁、化工、采矿——规模较小但在增长，希望通过双边 PPA 或共址协议降低 Scope 2 排放。 联邦和军事设施则构成另一个买方群体，受行政令可持续性要求和 DOE 合作项目推动；不过
              Fervo 当前合同仍集中在超大规模云厂商和公用事业类别。
