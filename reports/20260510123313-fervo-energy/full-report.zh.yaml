      - 关键假设
      - 隐含估值区间
      - 概率信号
      - 该情景的主要风险
    rows:
      - - 乐观
        - Phase 1 在 2026 年 Q4 之前交付 100 MW，且预算内或低于预算；GeoBlock Factory 显示首批成本改善；Google 3 GW 向约束性承诺推进；电力需求溢价维持；IPO 市场建设性
        - $8-10B 企业价值；按中点计算，IPO 后每股约 $9-11 上行空间
        - 25-30% — 需要所有执行假设同时成立
        - Phase 1 即使只延期 2 个月，也会压缩乐观路径；任何地震活动事件都会排除该情景
      - - 基准
        - Phase 1 小幅延期后交付（最晚 2027 年 Q1）；GeoBlock Factory 按计划推进；Google 关系稳定；IPO 定价在 $21-22/股；资本市场中性
        - $5-7B 企业价值；大致与 IPO 中点一致
        - 45-50% — 合理但要求 Phase 1 在适度容忍区间内交付
        - 假设没有不利地震活动、没有监管干预，且资本市场到 2027 年保持稳定
      - - 悲观
        - Phase 1 延期 6 个月以上；Phase 1 LCOE 高于 $100/MWh；诱发地震事件触发监管审查；IPO 后资本市场环境恶化
        - $2-3B 企业价值；较 IPO 价格出现重大减值
        - 20-25% — 概率较低，但鉴于首创执行风险，不可忽视
        - 假设项目没有完全放弃；若 Phase 1 最终以更高成本交付，仍有部分修复
      - - 灾难性尾部
        - Phase 1 彻底失败（地震活动停工或井废弃）；Google 投资者关系终止；清洁能源 IPO 融资窗口关闭
        - 低于 $1B；IPO 前估值对应股权近乎全损
        - 5% — 概率很低；代表多个不利尾部事件叠加
        - 该情景几乎摧毁全部股权价值；PPA 收入储备坍塌，债务方接管资产
      - - 摘要
        - 基准情景意味着相对 IPO 中点有温和上行；乐观情景要求近乎完美执行；悲观情景意味着任何 IPO 价格下都有重大下行
        - 区间：$1-10B；基准假设中点：~$6B
        - 把 Phase 1 里程碑交付作为首要概率信号来监测
        - 独立工程验证是收窄情景概率最有价值的尽调动作
    notes: 情景概率信号是基于截至 2026 年 5 月 10 日可得证据的主观评估，并非法定精算估计。Phase 1 能否在 2026 年 Q4 前交付，是所有情景中最重要的概率切换事件。
