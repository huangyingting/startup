      - number: '7.4'
        title: 财务与市场风险
        blocks:
          - type: paragraph
            body: >-
              Fervo Energy 的财务风险画像，由接近零收入基础上的极端商业化前资本强度定义。公司 2025 年收入为 $138,000，净亏损 $57.8M， 累计亏损 $244.5M；2025 年资本开支
              $465.7M，是能源行业商业化前 CapEx 强度最高的案例之一。$461.8M 现金和 $421M JPMorgan 项目债务融资提供建设跑道，但与 Cape Station 运营里程碑挂钩的契约结构会在
              Phase 1 超过约定建设里程碑时形成悬崖式风险。 Google 同时是 $462M Series E 的锚定投资者，也是 3 GW 非约束性框架协议下的主要商业框架交易对手——这种集中交易对手结构会在
              Google 关系恶化时放大相关风险。658 MW 具有约束力的 PPA 代表约 $7.2B 合同潜在收入，提供显著需求侧保护；但具体 PPA 定价、
              递增机制和终止条款未公开披露，独立信用风险评估无法完成。太阳能和风电部署加速、电池储能成本下降，推动电力市场价格走低，对当前合同储备 之外容量的 PPA 续约形成结构性长期定价压力。资本市场环境影响 Fervo
              在建设后再融资 JPMorgan 债务、并以有利条款获得股权资本的能力； 如果 S-1 未能在申报窗口内定价，IPO 窗口可能关闭。持怀疑态度的分析师评论指出，Fervo 商业化前 EGS
              成本预测与已验证成本曲线之间存在差距； 按 EV/MW 对运营可比公司 Ormat Technologies 的 87% 溢价，也意味着如果 Phase 1 交付延迟，估值有显著压缩风险。Devon Energy
              $244M 战略投资带来来自资深上游能源公司的运营可信度，但 Devon 自身也暴露于大宗商品价格，可能限制后续资本供给。
