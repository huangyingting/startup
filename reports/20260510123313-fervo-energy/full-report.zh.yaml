      - number: '6.5'
        title: 扩张路径与客户集中风险
        blocks:
          - type: paragraph
            body: >-
              客户集中是 Fervo Energy 客户画像中最核心的结构性风险。NV Energy 和 Google 合计几乎占全部公开具名合同收入；仅 NV Energy 就代表约 61% 的具名约束性 MW。这一集中度在
              Fervo 的 S-1 中被明确披露为关键风险因素；公司承认，失去任一客户都可能对收入和融资产生重大不利影响。 扩张路径取决于能否把 15+ GW 开发管线转成与新交易对手签署的约束性 PPA。Fervo 在
              2025 年通过 Axios 披露的对更多美国公用事业的接触， 显示当前客户之外已有商业活动，但公开信息中尚无更多约束性承诺。Google 的 3 GW 非约束性框架是最大潜在扩张杠杆，但核能 SMR
              等竞争技术可能在 2026 年及以后削弱 Google 对地热的承诺意愿。若能多元化到三个或更多具有约束力的交易对手，且每家占合同收入低于 30%，将实质降低集中风险； 这是 IPO 前后都必须跟踪的关键里程碑。
