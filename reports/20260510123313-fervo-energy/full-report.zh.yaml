          - type: callout
            title: 独立核验 Cape Station Phase 1 进度和 PPA 约束性条款
            body: >-
              投资者应独立核验 Cape Station Phase 1 朝 2026 年 10 月目标推进的建设进度，包括井数、完井阶段、 ORC 设备采购和并网状态。同时，应从 S-1 附件和法律顾问审阅中取得完整 PPA
              合同细节， 包括交易对手信用质量、终止权、价格升级条款和不可抗力定义。$7.2 billion 潜在收入储备取决于这些条款， 也取决于公司交付合同容量的能力。
