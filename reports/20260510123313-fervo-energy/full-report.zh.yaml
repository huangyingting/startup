  - number: 8
    title: 估值
    sections:
      - number: '8.1'
        title: 估值框架与投资建议
        blocks:
          - type: paragraph
            body: >-
              Fervo Energy 的 $6.5B 目标 IPO 估值，是 2026 年清洁能源市场最难分析的 IPO 前定价之一。公司完全处于商业化前阶段：2025 年收入 $138,000，净亏损
              $57.8M；全部估值都建立在未来现金流之上，而这些现金流取决于 Cape Station Phase 1 能否在 2026 年 10 月前交付 100 MW 商业运营。美国没有商业规模 EGS
              项目先例，意味着投资者要以约 $9.9M/每合同兆瓦 PPA 容量的估值，折现一次首创技术转型。 最接近的运营可比公司 Ormat Technologies（NYSE: ORA）按已验证运营容量交易在约
              $5.3M/MW，显示 Fervo 相比成熟地热运营商带有 87% 溢价。该溢价部分由 Fervo 的长期可服务市场（15+ GW 管线、$7.2B PPA 合同储备、面向数据中心 24/7
              清洁电力需求的战略定位）、 Google 作为锚定投资者和主要承购方的双重角色，以及间歇性可再生能源主导市场中可调度 24/7 无碳电力的结构性稀缺溢价支撑。 但只有 Cape Station Phase 1
              按期、按预算交付，这一溢价才站得住。投资建议是有条件的：若没有独立 Phase 1 建设验证、 完整 PPA 合同披露和地震协议审查，不应按 $6.5B 目标参与。若 Phase 1 达成 2026 年 10
              月商业里程碑，可跟踪 IPO 后入场； 那将标志全球首个商业 EGS 项目落地，并成为整个投资论点的根本去风险事件。S-1 所示 $21–24/share IPO 价格区间，意味着 IPO 前市值约
              $6.0–6.9B。最终定价若处于区间顶部，代表需求强劲，也要求投资者对近期执行具备最高信心。
