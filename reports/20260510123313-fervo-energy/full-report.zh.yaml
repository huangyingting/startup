      - number: '7.3'
        title: 执行与技术风险
        blocks:
          - type: paragraph
            body: >-
              位于 Utah Beaver County 的 Cape Station 是最重要的单一资产，也是 Fervo 投资论点中最集中的风险点。全球尚无 100 MW 或以上商业规模 EGS 项目运行，Cape
              Station Phase 1 因而是没有直接运营先例的首创部署。项目依赖水平钻井活动、多级水力压裂完井、 地表有机朗肯循环（ORC）电站设备和电网并网的协同交付。Fervo 的 GeoBlock Factory
              标准化计划目标是把 EGS 隔夜成本 从约 $7,000/kW 降至第 N 个同类项目尺度下的 $3,000/kW——这一预测取决于钻井效率学习曲线、完井设计优化和 ORC 电站采购，
              都是预测假设，不是已验证结果。Project Red 显示单井成本从约 $9.4M 降至 $4.8M，这条有意义的学习曲线支持 GeoBlock 成本轨迹， 但不能验证它在 Cape Station
              这个井数和裂缝网络规模远大的项目上也成立。地下地质差异意味着 Project Red 的 Nevada 表现指标未必能直接复制到 Utah Beaver
              County，后者的岩体温度剖面、渗透特征和原位应力条件都不同。热衰减——随着近井筒储层随时间冷却，采热能力下降——是已知的长期 EGS 运营风险，尚未在商业规模上跨数十年时间尺度验证。2025 年资本开支为
              $465.7M，主要由 JPMorgan $421M 项目债务融资和现有现金支持， 显示建设快速爬坡且进度缓冲很少。任何钻井表现低于计划、设备采购中断或储层连通性不足，都会推迟 Phase 1
              商业运营日期，触发潜在契约审查， 并延后 IPO 收入确认。建设时间线至关重要：2026 年底前 Phase 1 商业运营直接支撑 IPO 定价、对 NV Energy 的 PPA 交付义务， 以及 Google
              框架转化叙事。
