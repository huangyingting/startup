      - number: '2.5'
        title: 市场风险与竞争动态
        blocks:
          - type: paragraph
            body: >-
              EGS 电力市场面临多重风险，可能限制采用或削弱 Fervo 的竞争位置。最根本的风险是成本竞争力： 当前 EGS LCOE 估计约 $80-100/MWh，必须降至 DOE $45/MWh 目标，才能在没有
              IRA 补贴的情况下与太阳能加储能竞争。 在 Cape Station Phase 1 建立经验证的商业规模成本基准之前，成本竞争力假设存在实质不确定性。 电池储能成本下降构成替代威胁：公用事业级锂离子电池
              LCOE 已大幅下行；如果储能时长以有竞争力成本延长至 12-24 小时， 地热获得的稳定性溢价会收窄。NuScale、TerraPower 和 X-Energy 等开发商的小型模块化核反应堆（SMR） 瞄准同一
              24/7 CFE 买方群体，成本可能具备竞争力；不过商业 SMR 大规模部署至少还要 10 年。 竞争性 EGS 开发商——Eavor Technologies（闭环）、Sage
              Geosystems、AltaRock Energy 和 XGS Energy——构成直接技术竞争， 但还没有一家达到 Fervo Cape Station 的商业规模。监管风险呈两面性：国会修改 IRA
              税收抵免可能实质损害项目经济性， 而州清洁能源强制目标加速则可能扩大需求。超大规模云厂商需求集中带来交易对手风险： 如果 Google 或 Microsoft 因目标延迟或能源政策变化放慢 24/7 CFE
              采购节奏，近期 SOM 可能收缩。 联邦土地许可时间（2-5 年）和州环境审查流程给绿地 EGS 开发施加进度风险。总体看，市场风险画像符合早期商业化基础设施资产类别： 技术去风险和降本路径是主要价值驱动。
