companyProfile:
  summary: >-
    Fervo Energy 由 Tim Latimer（CEO）和 Jack Norbeck（CTO）于 2017 年在加州旧金山创立。
    公司把油气行业的水平钻井、多段水力压裂和分布式光纤传感技术搬到地热开发中，试图规模化开采地下热能。 核心产品是通过工程化地下热储提供 24/7 无碳基荷电力，解决太阳能和风电受间歇性制约的问题。 位于犹他州 Milford 的
    Cape Station 是全球规划规模最大的 EGS 项目（完全建成 500 MW）。 Phase 1（100 MW）目标在 2026 年 10 月投入商业运营。Fervo 已于 2026 年 4 月向 SEC 提交 S-1，
    计划以约 $6.5B 估值在 Nasdaq 以 FRVO 为股票代码 IPO，募资 $1.25B。公司仍处于商业化前阶段： 2025 年收入 $138K，净亏损 $57.8M；估值完全取决于建设执行、PPA 交付和 GeoBlock
    Factory 降本进展。
