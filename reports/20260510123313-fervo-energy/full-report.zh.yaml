      - number: '5.2'
        title: 产品模块与资产地图
        blocks:
          - type: paragraph
            body: >-
              Fervo 的产品组合围绕三类项目资产（Project Red、Corsac Station、Cape Station）和两个赋能平台（GeoBlock Factory、PowerFlex）组织。 Project
              Red（犹他州 Milford）是已完成的 3.5 MW 水平 EGS 试点，目前作为持续学习和演示资产运营。 Corsac Station（内华达州，115 MW）是公司的首个完全商业规模、已签约 EGS
              设施，按有约束力 PPA 服务 Google 和 NV Energy。 Cape Station（犹他州 Beaver County，500 MW）是旗舰项目：Phase 1（100 MW）目标 2026 年
              10 月，Phase 2（400 MW）目标 2028 年。

              GeoBlock Factory 是 Fervo 的模块化建设平台，标准化钻井、压裂、ORC 滑橇安装和互连工作流，让各项目能像工厂一样重复交付。 每个 GeoBlock 单元代表约 10–25 MW 模块化
              EGS 容量，支持分阶段资本投入。PowerFlex 是自研储层管理和电网调度软件， 支持动态跟随负荷。除活跃项目外，Fervo 持有约 475,000 净英亩地热土地权利，开发管线潜在 EGS 容量超过 15
              GW； 这些土地和数据期权支撑更长期的增长故事。
