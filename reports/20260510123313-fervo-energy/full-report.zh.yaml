      - number: '6.4'
        title: 留存、耐久性与合同稳定性
        blocks:
          - type: paragraph
            body: >-
              Fervo Energy 的留存嵌在 20–25 年购电协议结构里，而不是用净收入留存、流失率或 NPS 这类 SaaS 指标衡量。具有约束力的合同为交易对手制造高切换成本；
              若要替换稳定、可调度的可再生发电，他们需要寻找等效替代方案，并经历 3–5 年以上采购周期。NV Energy 的留存概率由 Nevada 的 RPS
              要求锚定，这创造了对地热基荷的结构性需求，而很少有替代技术能在 2030 年前满足。Google 的 Project Red 留存由连续 18 个月以上、 不间断交付证明。主要留存风险包括：（1）NV
              Energy 2026 年费率案将 Cape Station PPA 置于成本效益审查之下；（2）Google 对核能 SMR PPA 的兴趣上升，后者可作为 24/7 CFE 的替代来源；（3）Cape
              Station 运营延迟可能触发 PPA 履约条款。Fervo 未披露其 PPA 是否包含无因终止、限电或容量履约罚则。
