      - number: '6.2'
        title: 客户分层与买方画像
        blocks:
          - type: paragraph
            body: >-
              Fervo Energy 服务两类清晰客户：受监管公用事业和超大规模科技公司。NV Energy 代表公用事业画像——受监管、投资级的交易对手，
              购买地热电力以满足法定可再生能源要求，并向费率支付者提供可靠的基荷清洁发电。Google 代表超大规模科技公司画像：大型科技公司采购 24/7
              无碳电力，按小时匹配数据中心负荷，以履行间歇性太阳能和风电无法满足的可持续承诺。两类客户都偏好长期 PPA 结构（20 年以上），
              借此获得价格确定性，并消除可再生能源信用采购复杂度。当前客户之外的可服务市场包括西部和西南部各州更多面临 RPS 合规期限的受监管公用事业， 以及拥有活跃 24/7 CFE
              采购计划的超大规模科技公司（Microsoft、Amazon、Meta）。Fervo 约 256 MW 未披露交易对手显示出初步多元化， 但身份和信用质量未披露，限制了风险评估。
