      - number: '7.6'
        title: 关键人物与组织风险
        blocks:
          - type: paragraph
            body: >-
              Fervo Energy 的技术优势高度集中在两位联合创始人的智力资本中。CEO Tim Latimer 拥有 Stanford University 能源资源工程硕士学位，
              此前在行业岗位积累油气钻井和完井经验，并领导 Fervo 的高管团队、投资者关系和 IPO 流程。CTO Jack Norbeck 拥有 Stanford 能源资源工程博士学位，是 Fervo 水平 EGS
              钻井和光纤储层监测方案的主要技术架构师。两位创始人在 Stanford 发展出核心技术框架， 掌握刺激设计、井筒架构和地下解释方法等关键组织知识，这些知识把 Fervo 与竞争对手区分开来。在 Cape
              Station Phase 1 达到商业运营前， 任一创始人离开都会构成重大不利事件，且很难由任何单一招聘完全弥补。作为一家约 225 名员工的商业化前公司，Fervo 短期内缺乏足够组织纵深，
              无法完全复制创始人集中的技术与商业职能。IPO 流程本身也带来关键人物分心风险：在最关键的建设执行窗口，高管需要把时间转向投资者路演、 SEC 问询期和公开市场治理要求。IPO
              后，锁定期届满和流动股票会带来创始人与高管被竞争方挖走的留任风险。投资者应把多年雇佣协议、 未归属股权安排，以及 CEO 和 CTO 角色继任计划作为 IPO 投资条件。
            claimRefs:
              - CR019
