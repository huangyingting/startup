      - number: '8.4'
        title: IPO 市场背景与融资历史
        blocks:
          - type: paragraph
            body: >-
              Fervo Energy 于 2026 年 4 月 17 日向 SEC 提交 S-1 注册声明，CIK 为 0001853868，目标最高募资 1.25 billion 美元， 最高估值约 6.5
              billion，指引发行价区间为 21 至 24 美元，并计划以 FRVO 为股票代码在 Nasdaq 上市。此次 IPO 是其多轮私募快速推进的终点。 2022 年 Series B 隐含约 1 billion
              美元估值，建立了早期机构锚点。Devon Energy 于 2024 年 2 月在 Series D 投资 244 million 美元，隐含估值约 1.4 billion。2025 年 12 月由 Google
              担任锚定投资者的 462 million 美元 Series E 隐含估值约 2.9 billion。IPO 目标相对 Series E 隐含估值抬升 2.2x，相对 Series B 提升 46x；这一进阶反映
              Project Red 试点验证带来的技术去风险、658 MW 具有约束力合同带来的 PPA 积累，以及 Cape Station 开工。2026 年 Nasdaq 清洁能源 IPO
              环境较为挑剔，机构需求集中在具备近期收入可见度或强基础设施赞助方支持的公司。IRA 后政策顺风，包括地热投资税收抵免和 DOE EGS Earthshot 计划，支撑更广泛的清洁能源基础设施 IPO
              环境。JPMorgan 421 million 美元项目债务融资于 2026 年 3 月关闭， 增加了机构验证，并降低 IPO 带来的股权稀释压力。IPO 前投资者包括 DCVC、B Capital 和
              Devon Energy，将面临标准锁定限制， 影响 IPO 后六个月的二级市场流动性。按 6.5 billion 估值募集 1.25 billion 美元，意味着现有股东约 19% 稀释，处于大型基础设施
              IPO 的典型范围内。21 至 24 美元发行价区间，按估计完全稀释流通股计算，意味着 IPO 前市值约 6.0 至 6.9 billion。
            claimRefs:
              - CV001
              - CV010
              - CV011
              - CV041
              - CV042
      - number: '8.5'
        title: 估值方法与分析框架
        blocks:
          - type: paragraph
            body: >-
              Fervo Energy 的商业化前状态，使传统财务报表倍数不适用。2025 年收入 138 thousand 美元、净亏损 57.8 million 美元， EV/revenue 和 EV/EBITDA
              倍数超过 40000x，分析意义为零。主要估值锚是 PPA 合同储备方法。代表 658 MW 合同容量的 7.2 billion 美元约束性收入合同储备，经执行风险因子折现后，可推导隐含企业价值。按 0.9x
              合同储备倍数，隐含 EV 等于 6.5 billion IPO 目标；按 0.7x，则隐含 5.0 billion。该方法适用于基础设施开发商，因为合同收入为未来现金流提供底部； 但其可靠性直接取决于 PPA
              合同的可执行性和定价，而 S-1 并未完整披露。商业化前阶段，折现现金流框架并不真正适用，因为模型需要假设 LCOE 轨迹——当前估计为每 MWh 80 至 150 美元，而公用事业太阳能为每 MWh 25 至
              40 美元——以及热衰减率和运营容量因子， 这些都尚未在商业 EGS 尺度验证。按每 MW 可比分析提供重要现实校验。Ormat Technologies 按已验证运营容量交易在约每 MW 5.3 million
              美元。Fervo 以 6.5 billion 对应 658 MW 合同 PPA 容量，意味着每 MW 9.9 million 美元，溢价 87%。 开发商管线增加概念性价值：15+ GW 按每 MW 0.1
              million 的期权价值计算，隐含 1.5 billion 增量。商业尺度首发 EGS 的技术期权价值真实存在， 但无法用先例量化。证据权重支持以 PPA
              合同储备方法为主，并把技术溢价调整和开发商管线期权价值作为次要组成。BNEF 预计， 到 2030 年超大规模科技公司需求将超过可调度 CFE 供给，24/7 无碳电力溢价将持续，支撑 Fervo PPA
              定价中嵌入的长期收入溢价。
            claimRefs:
              - CV002
              - CV003
              - CV004
              - CV005
              - CV006
              - CV007
              - CV018
              - CV029
      - number: '8.6'
        title: 投资者回报分析与退出情景
        blocks:
          - type: paragraph
            body: >-
              以每股 21 至 24 美元进入的 IPO 投资者，将面对由 Phase 1 执行、锁定期动态和退出可选性共同塑造的复杂回报画像。Series E 投资者在 2025 年 12 月以约 2.9 billion
              隐含估值进入，6.5 billion IPO 估值意味着约五个月内账面提升 2.2x。IPO 前投资者包括 DCVC、 B Capital 和 Devon Energy，将面临标准锁定限制，影响 IPO
              后六个月的二级市场流动性。按 6.5 billion 估值募集 1.25 billion 美元，意味着现有股东约 19% 稀释。在五年持有的多头情景下，如果 Phase 1 交付、Phase 2 按期建设，且
              GeoBlock Factory 实现降本路线图，战略收购方价值可能在 8 至 15 billion 之间，相比约 22.50 美元每股的 IPO 中间价有 25% 至 50% 上行。
              潜在收购方包括寻求无碳基荷供给的大型公用事业，以及寻求 EGS 技术可选性的综合能源公司。基准情景中，Phase 1 伴随适度延迟交付且 Phase 2 启动，公开市场估值稳定在 5 至 7 billion，相对
              IPO 区间为持平至小幅上行。空头情景中，Phase 1 延迟或失败，估值压缩至 2 至 3 billion，意味着相对 IPO 定价有 50% 至 70%
              下行。这种风险回报不对称——只有多头情景有可观上行，空头情景下行严重——支持在交付后入场， 而不是按区间顶部参与 IPO。IPO 后 180 天锁定期届满会制造二级市场供给；如果 Phase 1
              执行干净，投资者应把它作为入场机会跟踪。 Renaissance Capital 指出，Fervo Energy IPO 投资者回报几乎完全取决于 Phase 1 里程碑交付，是一笔集中技术执行押注； 在 6.5
              billion 估值下，下行保护有限。
            claimRefs:
              - CV010
              - CV019
              - CV028
              - CV037
              - CV041
              - CV042
      - number: '8.7'
        title: 展品
        blocks:
          - type: callout
            title: 估值要求 Phase 1 近乎完美执行
            body: >-
              按 $6.5B 隐含估值，Fervo 已按全球首个商业规模 EGS 项目的近乎完美执行定价。相对 Ormat Technologies 运营容量 EV/MW 的 87% 溢价，几乎没有给 Phase 1
              延迟、成本超支或地震事件留下容错。若按 $21–24/share 区间顶部进入，投资者应要求异常充分的尽调保证。
            calloutType: risk
            claimRefs:
              - CV011
              - CV012
              - CV014
              - CV031
          - type: callout
            title: Google 的双重角色既是最强多头信号，也是最大空头风险
            body: >-
              Google 同时是 Series E 轮锚定投资者和主要商业购电方：一方面验证了商业逻辑——成熟技术买家愿意为 24/7 清洁电力支付溢价；另一方面也把最大下行情景集中在同一处——一旦 Google
              关系恶化，投资者基础和主要收入管线会同时受冲击。Fervo 资本结构里，没有任何单一关系比 Google 更能左右三种情景下的估值结果。
            calloutType: insight
            claimRefs:
              - CV025
              - CV034
          - type: callout
            title: 优先进入点：IPO 后，且 Phase 1 已商业投运
            body: >-
              Fervo Energy 风险调整后更优的进入点，是 IPO 后并等 Cape Station Phase 1 商业投运之后；届时它将成为全球首个商业化 EGS
              项目，也会是一次台阶式风险释放。到那时，投资逻辑会从执行风险转向规模化风险，可比样本也从没有任何运营中的 EGS 先例，扩展到首个已确认商业案例。应紧盯 2026-10
              目标日期，只有在商业交付获得独立确认后再建仓。
            calloutType: recommendation
            claimRefs:
              - CV001
              - CV021
              - CV031
              - CV035
