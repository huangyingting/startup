        and hyperscaler sustainability reports. The full buyer universe includes additional utility counterparties,
        international buyers, and industrial segments not yet represented in Fervo's disclosed contract portfolio.
        Federal and carbon market segments are included as emerging rather than current revenue contributors.
    notes: >-
      买家条目基于 Fervo 已披露合同（NV Energy、Google）、超大规模云厂商可持续承诺（Google 2024 Environmental Report、Microsoft
      可持续页面）以及公开记录的采购模式。预算负责人角色按各类买家的 PPA 采购行业惯例推断；具体交易对手的实际决策人头衔需要通过直接尽调核实。联邦和碳市场板块对 Fervo 仍处早期；Cape Station
      商业化后，合同组合逐渐成熟，映射可能需要更新。
