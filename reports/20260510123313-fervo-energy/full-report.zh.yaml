          - type: callout
            title: 跟踪管线项目的 IRA 税收抵免稳定性和并网队列状态
            body: >-
              IRA 的 ITC 和 PTC 抵免可把 Fervo 有效 LCOE 降低 30-50%，是 Cape Station 和更广泛开发管线项目融资经济性的基础。 国会对 IRA
              条款的修改——无论是日落、加速退坡还是排除特定技术——都是 EGS 项目经济性近期最大的单一监管风险。 同时，美国西部电网 3-5
              年的并网积压，独立于融资或地质条件限制近期项目完工时间。投资者和尽调团队应同时跟踪任何 IRA 修改提案的立法进展， 以及 Cape Station 之外 Fervo
              管线项目的并网队列位置；任一维度延迟，都可能让收入确认实质晚于当前 S-1 披露。
            calloutType: recommendation
            claimRefs:
              - CM026
              - CM027
              - CM031
              - CM032
          - type: callout
            title: 稳定清洁电力溢价是市场的核心动态
            body: >-
              不同于太阳能或风电，地热 EGS 可提供 24/7 基荷电力，容量因子超过 90-95%；这一物理特性让 Fervo 不是按最低 $/MWh 成本竞争，
              而是争取可靠性溢价。这一区别切出一个分层市场：间歇性可再生能源的替代受到结构性限制， 竞争对手范围也限于核电、天然气（带碳成本）和长时储能，而不是整个可再生能源采购市场。 当超大规模云厂商的 CFE
              承诺从年度平均匹配收紧到逐小时匹配——Google 方法明确要求如此—— EGS PPA 中嵌入的稳定性溢价很可能扩大而非收缩，即便整体可再生能源成本下降。24/7 要求越严格，Fervo 的市场位置越强。
