      - number: '1.6'
        title: 图表与证据
        blocks:
          - type: callout
            title: Project Red 以现场规模验证 EGS 技术
            body: >-
              Fervo 通过 Project Red 在 2022 年成功完成现场规模 EGS 演示，跨过了长期限制地热扩张的主要技术去风险门槛。
              公司把成熟页岩油气实践中的水平钻井、多段压裂和分布式光纤传感用于地热，形成可重复、可测量的方法， 弥补传统地热的不足。Devon Energy 于 2024 年投入 $244M
              战略投资；它从运营商视角充分了解该技术， 这笔投资相当于由最有资格评估地下钻井风险的一方给出的第三方技术验证。
            calloutType: strength
            claimRefs:
              - CO015
              - CO022
              - CO027
          - type: callout
            title: 商业化前收入阶段叠加强资本开支
            body: >-
              2025 年收入只有 $138,000，却对应 $57.8M 净亏损和 $465.7M 资本开支，Fervo 仍完全处于商业化前阶段。 公司 IPO 成败高度取决于 Cape Station Phase 1
              能否按期、按预算在 2026 年 10 月达到 100 MW 商业运营。 Cape Station 任何里程碑延迟、许可受挫或成本超支，都会实质削弱 IPO 叙事，并可能在 Phase 2 前挤压资本结构。
              商业化前收入基础也让估值敏感区间很宽，投资者必须把它与开发时间表一起评估。
            calloutType: risk
            claimRefs:
