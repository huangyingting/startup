      - number: '2.2'
        title: 市场规模 — TAM、SAM 与 SOM
        blocks:
          - type: paragraph
            body: >-
              EGS 电力的市场规模需要多重视角，因为没有单一分析师数据集能把 EGS 子市场从更广义地热板块中剥离出来。 Grand View Research 估计，2024 年全球地热发电市场规模约 $9.2
              billion；MarketsandMarkets 预计到 2030 年 CAGR 为 10.3%，意味着 2030 年全球 TAM 为 $15-25 billion。这个自上而下估算覆盖所有地热技术类型和地区，
              但显著低估了美国 EGS 的长期潜力：NREL 2026 年 1 月报告估计，在有利情景下美国到 2050 年可达 90 GW， DOE 则称当前技术潜力超过 100 GW。把技术潜力折算成美元：假设 PPA
              价格为 $80-100/MWh， 100 GW 以 95% 容量因子运行，美国理论年度收入 TAM 超过 $65 billion；但这假设资源完全转化， 需要数十年，并取决于降本路径。更受约束的美国 EGS
              稳定清洁电力可服务市场（SAM），覆盖 2025-2035 年预计出现的超大规模云厂商和公用事业 CFE 需求。 科技公司的 24/7 CFE 承诺和 AI 驱动负荷增长，指向到 2035 年 20-50 GW
              稳定无碳电力需求； 其中 EGS 可服务 5-15 GW，意味着美国 EGS SAM 成熟期每年为 $8-15 billion。 Fervo 当前可获取市场（SOM）由 658 MW 有约束力 PPA
              锚定，代表约 $7.2 billion 潜在合同收入； 另有 Google 的无约束力 3 GW 框架，一旦转化，可能增加数百亿美元收入储备。Cape Station Phase 1 的 100 MW 2026
              年 10 月商业目标，是 Fervo 实现 SOM 的第一步。
