            body: >-
              Fervo Energy 已搭建美国清洁能源史上最多元、结构最完整的资本栈之一。总资本形成超过 $2.1 billion， 包括七轮股权融资约 $1.277 billion、DOE 贷款项目办公室的 $400
              million 担保，以及 JPMorgan 牵头的 $421 million 项目债务工具。 股权投资者横跨战略和财务类别：Breakthrough Energy Ventures（Series A）、DCVC
              和 Capricorn Investment Group（Series B）、 Devon Energy 和 bp ventures（Series D），以及 B Capital 与 Google 锚定的
              Series E（2025 年 12 月）。 Devon Energy 等战略伙伴既提供资金，也带来地下钻井经验。DOE 担保（2024 年有条件承诺）为 Cape Station 项目债务兜底，
              降低资本成本，并释放出联邦政府认可 EGS 技术成熟度的信号。JPMorgan 2026 年 3 月提供的项目债务被隔离用于 Cape Station 建设。 Series E 后隐含估值约 $5
              billion，待 IPO 目标估值升至 $6.5 billion。 这套多元资本栈横跨政府、机构、战略和公开市场参与者，代表首创型基础设施项目的顶级融资架构。
