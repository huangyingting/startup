      - number: '1.3'
        title: 创始人与领导团队
        blocks:
          - type: paragraph
            body: >-
              Fervo 由 Tim Latimer（CEO 兼董事会主席）和 Dr. Jack Norbeck（CTO）共同创立。Latimer 拥有 Stanford MBA 和硕士学位，
              早年是石油工程师，同时懂油气钻井实践和能源业务开发；外界普遍认为，他识别出页岩水平钻井技术可重新用于地热资源开发。 Norbeck 拥有 Stanford
              地球科学博士学位，并在美国地质调查局（USGS）完成博士后研究， 具备深厚的地球科学和储层工程能力，支撑 Fervo 的地下技术。IPO 前，管理层显著扩容： David Ulrey 担任
              CFO，负责资本市场战略和 IPO 准备；Sarah Jewett 作为战略高级副总裁，主导超大规模云厂商合作； Dawn Owens 作为开发高级副总裁，管理包括 Cape Station 扩建在内的项目管线；
              Gustavo Torres 担任高级副总裁兼总法律顾问，负责监管审批、土地权利和 PPA 法律结构； Quinn Woodard Jr. 作为运营副总裁，负责钻井和现场执行； Christian Gradl
              以高级副总裁身份领导 GeoBlock Factory 标准化项目。HP 和 eBay 前 CEO Margaret C. Whitman 担任首席独立董事， 为即将 IPO 的公司提供治理监督和上市公司经验。
