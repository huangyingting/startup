    title: 最终尽调问题表
    columns:
      - 主题
      - 缺失证据
      - 重要性
      - 负责人 / 尽调路径
    rows:
      - - Phase 1 建设状态验证
        - 截至 2026 年 5 月，对 Cape Station Phase 1 井数量、完井阶段、ORC 设备采购状态和电网互连排队位置的独立工程评估
        - Phase 1 交付是最关键的价值创造事件；独立验证能帮助投资者为 2026 年 10 月里程碑形成概率估计
        - 聘请独立岩土工程公司（如 Baker Hughes Energy Services、Schlumberger），在 NDA 下对公开建设数据和管理层披露现场数据做桌面审查
      - - 完整 PPA 合同经济性
        - 658 MW 资产组合的有约束力 PPA 合同条款，包括交易对手身份和信用评级、每 MWh 定价、调价机制、不可抗力和终止条款
        - $7.2B 潜在收入储备订单是所有乐观和基准情景的基础；没有完整合同条款，投资者无法评估收入质量或下行保护
        - 在标准 IPO NDA 下向管理层索取 PPA 条款清单和合同摘要；聘请能源法律顾问审查合同结构；通过独立信用分析验证交易对手信用评级
      - - 地震活动协议和场址数据
        - 交通灯协议阈值、Cape Station 场址当前背景地震活动水平、监测站数量和布点，以及 Project Red 和 Phase 1 钻井期间的历史地震活动记录
        - 地震活动风险是最难保险覆盖的尾部风险；协议充分性和场址特定数据决定风险是可管理，还是可能对项目致命
        - 向管理层索取监测数据和协议文件；交叉核对 BLM 批准条件中的强制监测阈值；与 USGS 最佳实践指引和独立地震学审查对照
      - - 股权结构表和 IPO 经济性
        - IPO 时完整股权结构表，包括所有投资者经济权益、按比例认购权、反稀释条款、注册权、锁定期、董事会席位和经济分配瀑布
        - 没有完整股权结构表，公开市场投资者无法评估稀释风险、治理一致性，或下行情景中决定回报的经济优先级结构
        - 审查 S-1 注册声明附件及所有修订；聘请证券法律顾问评估治理结构；要求管理层披露公开申报文件未涵盖的任何附函或董事会席位协议
    notes: 最终尽调问题按对投资决策的重要性排序，而不是按执行难度排序。第 1、2 项是 IPO 阶段任何最终投资承诺的前提；第 3、4 项很重要，但可能由 S-1 委托书和管理层路演材料部分满足。
    claimRefs:
      - CV035
      - CV036
      - CV037
      - CV038
