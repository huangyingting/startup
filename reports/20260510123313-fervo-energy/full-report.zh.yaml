      - number: '1.2'
        title: 技术与运营版图
        blocks:
          - type: paragraph
            body: >-
              Fervo 的核心技术是增强型地热系统（EGS）。它区别于传统水热型地热电站：不是依赖天然热水或蒸汽， 而是主动工程化地下储层。流程包括钻入热基底岩的水平井，再采用从页岩油气实践改造而来的多段水力压裂，
              打通连接注入井和生产井的渗透网络。分布式光纤传感下入井中实时监测储层行为， 让以往 EGS 尝试无法做到的优化成为可能。抽出的地热卤水在地表驱动有机朗肯循环（ORC）涡轮发电。 公司的 GeoBlock
              Factory 是一套标准化、模块化部署系统，意在通过工厂式重复性降低单井和单项目成本。 位于犹他州 Beaver County 的 Cape Station 是全球规划规模最大的 EGS 项目，总规划容量
              500 MW： Phase 1 目标在 2026 年 10 月实现 100 MW 商业交付，Phase 2 目标在 2028 年交付 400 MW。 内华达州 Corsac Station 是 115 MW
              项目，主要合同服务对象是 Google 和 NV Energy。 Project Red 是公司在犹他州的首个 EGS 试点，已在 2022 年以现场规模成功验证水平钻井和压裂路径。 Fervo 控制约
              475,000 净英亩地热土地，开发管线超过 15 GW。
