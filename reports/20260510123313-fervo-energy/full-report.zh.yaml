  - id: TV002
    title: 投资逻辑 / 反向逻辑表
    columns:
      - 论点
      - 乐观 / 投资逻辑视角
      - 悲观 / 反向逻辑视角
      - 哪些信号会改变判断
    rows:
      - - EGS 技术扩展性
        - Project Red 已验证；Cape Station Phase 1 将成为全球首个商业化 EGS；GeoBlock Factory 模板可推动成本快速下降
        - 尚无商业规模 EGS 项目在这一规模运行；热衰减和地下差异可能让成本曲线无法兑现
        - 若 Phase 1 按期达成 100 MW，且隔夜成本不高于 $7,000/kW，将验证乐观观点；Phase 1 延期或成本超支则验证悲观观点
      - - 电力需求顺风
        - AI 数据中心对 24/7 无碳电力的需求具有结构性；Google 和超大规模云厂商会为可调度地热支付溢价
        - 太阳能 + 储能 LCOE 仍在下降；到 2028-2030 年，储能配套可能以更低成本补上可调度性差距
        - 若 BNEF 或独立 LCOE 分析显示 EGS 特定溢价收窄至太阳能+储能的 20% 以下，将削弱乐观观点；若超大规模云厂商 PPA 需求持续高于 $70/MWh，则会强化乐观观点
      - - 估值溢价
        - 15+ GW 管线和 $7.2B PPA 储备订单支撑相对运营可比公司的稀缺溢价；没有其他商业化 EGS 开发商达到这一规模
        - 按已签约容量计算为 $9.9M/MW，而 Ormat 运营容量为 $5.3M/MW；87% 溢价要求 Phase 1 近乎完美交付
        - Phase 1 交付会把相关可比对象从商业化前公司重置为运营公司；若 IPO 后 EV/MW 收缩到 6-7M/MW 区间，管线期权价值可支撑该溢价
      - - Google 关系韧性
        - Google 既是锚定投资者，也是 3 GW 框架合作方，形成持久的商业一致性；数据中心电力需求是代际顺风
        - Google 集中度带来二元风险；Google 可持续承诺、能源战略或与 Fervo 关系只要恶化，投资者支柱和购电方支柱会同时受损
        - 若 3 GW 非约束性框架推进为已签署 PPA 的约束性承诺，将显著强化乐观观点；Google 战略转向、远离地热，将确认悲观观点
      - - 监管与地震活动
        - Fervo 的交通灯协议和监测降低地震活动风险；迄今没有执法行动；Utah 监管环境宽松
        - Basel 先例表明，单次 M3.0+ 事件就可能永久终止 EGS 项目；Cape Station 的商业规模注入量尚未测试
        - 若 USGS 或独立第三方地震活动评估确认监测充分且 M3+ 概率较低，将强化乐观观点；Cape Station 若出现 M2.5 以上地震事件，判断将转向悲观
      - - 资本获取与 IPO 市场
        - JPMorgan 债务验证机构信心；Google 锚定验证商业信心；清洁能源 IPO 市场窗口建设性
        - 商业化前收入和 $244.5M 累计亏损限制风险偏好下降市场中的资本获取；鉴于 2026 年清洁能源 IPO 发行量，IPO 价格敏感度高
        - 若 IPO 成功定价在 $22/股或以上，说明机构需求存在；若 IPO 撤回或定价低于 $20/股，将验证悲观方对资本获取的担忧
    notes: 投资逻辑和反向逻辑均基于 S-1 披露、分析师评估和可比公司分析。本表任何论点都不应视为投资建议；每个视角只是合理投资者解读范围中的一种。
    claimRefs:
