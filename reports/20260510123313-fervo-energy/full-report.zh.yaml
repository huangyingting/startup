      - number: '3.2'
        title: 技术差异化与功能对比
        blocks:
          - type: paragraph
            body: >-
              Fervo Energy 的竞争差异化集中在四根支柱：（1）从油气行业改造而来的已验证水平钻井， 支持竞争者尚未在商业规模证明的多分支井配置；（2）通过光纤电缆实现分布式温度传感（DTS），
              可实时监测和优化储层；（3）GeoBlock 模块化工厂设计，目标通过标准化预制组件把钻井成本降低 30%； （4）PowerFlex
              灵活调度能力，使地热可以参与辅助服务市场——调频、容量和需求响应——这些市场传统基荷地热竞争者无法进入。 NREL
              分析确认，EGS、闭环地热系统（CLGS）、多区压裂和深层毫米波是面向不同资源窗口的互补技术，而不是直接替代品。 Eavor Technologies
              的闭环设计完全避免水力压裂，在对诱发地震敏感的许可辖区提供差异化风险画像。 不过 Latitude Media 分析指出，在多数市场中 EGS 和 CLGS 互补而非竞争，因为它们对应不同地质条件。 Quaise
              Energy 的微波汽化有望接入超深层热储，但仍处于演示前阶段，距离商业验证还有多年。 Ormat 传统地热受益于数十年运营经验和上市公司资产负债表，但被限制在水热资源位置。 RMI 分析把地下井数据、运营
              DTS IP 和 PPA 合同锁定列为三条可持续 EGS 护城河，并指出 Fervo 是唯一三者都已证明的公司。
