      - number: '5.6'
        title: 开发路线图与部署轨迹
        blocks:
          - type: paragraph
            body: >-
              Fervo 的 2026–2030 年技术路线图有三条并行轨道：（1）Cape Station Phase 1 商业投运（100 MW，目标 2026 年 10 月）； （2）Cape Station Phase
              2 扩容（400 MW，目标 2028 年）；（3）GeoBlock Factory 降本，目标是从当前估计 $80–100/MWh 降至 DOE Enhanced Geothermal
              Shot（增强型地热攻关）提出的 2035 年 $45/MWh。第三条轨道包括：通过钻头和 RSS 优化把钻井天数压降 20–30%； 用 ORC
              撬块预制压缩现场安装时间；并通过压裂段数与流体体积优化提升压裂效率。

              Phase 2 融资完全取决于 Phase 1 能否按期、按预算交付——如果 Phase 1 在地质或成本上表现不佳，Phase 2 若没有大量补救资本就无法融资。 GeoBlock Factory
              降本路线图尚无独立验证；Cape Station Phase 1 是模块化标准化能否带来真实改进的第一次实战检验。Fervo 的 S-1 IPO 目标募集 $1.25 billion 公共资本，用于资助
              Phase 2 开发和早期管线转化。

              开发者和从业者互动是活跃且可信的信号：Fervo 工程师在 SPE Annual Conferences 和 Geothermal Rising 从业者论坛发言， 2024 年 1 月发表同行评议 Science
              论文，并保持活跃的 LinkedIn 工程内容。这种跨行业技术可信度加速人才招聘和客户信任， 支撑 2026–2028 年路线图的商业执行。路线图执行的监测指标包括：Phase 1
              单井钻井天数相对计划的偏差、压裂连通性测试、 首次发电日期相对 2026 年 10 月目标的偏差，以及 Phase 1 ORC 初始运营容量因子。
