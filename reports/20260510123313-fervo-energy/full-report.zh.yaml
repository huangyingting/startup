  - number: 4
    title: 财务情况
    sections:
      - number: '4.1'
        title: 收入阶段与商业模式
        blocks:
          - type: paragraph
            body: >-
              Fervo Energy 是一家商业化前能源公司，目前仅从测试井运营中获得名义收入；其首个商业增强型地热系统 Cape Station 正推进至商业运营。
              公司的主要收入模式依赖与信用良好的公用事业和科技交易对手签订长期电力购买协议（PPA）。 旗舰 NV Energy PPA 覆盖 400 MW 基荷地热容量，期限 25 年，按现值计代表约 $7.2
              billion 合同收入流。 Google 已签署最高 3 GW 额外容量的无约束力框架。每个设施达到商业运营日（COD）后开始确认收入。 PPA 结构包含不依赖实际发电量的容量付款，降低了 COD
              前收入确认的不确定性。 这是一种资本密集型基础设施模式：前期成本高，COD 前收入很少，类似早期海上风电或核电开发商， 只有在建设里程碑达成后才累积合同收入。Fervo FY2025 收入为
              $138,000，FY2024 为 $199,000， 均来自 Cape Station 一口小型试点井根据测试协议向电网送电。
