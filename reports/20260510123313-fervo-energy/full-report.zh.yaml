  - number: 2
    title: 市场分析
    sections:
      - number: '2.1'
        title: 市场定义与边界
        blocks:
          - type: paragraph
            body: >-
              Fervo Energy 主要处在增强型地热系统（EGS）子市场，这是更广义地热发电行业中仍处早期的细分赛道。 EGS 与传统水热型地热的差别在于，它通过水平钻井和多段水力压裂在非火山基底岩中工程化地下储层，
              因而可在比传统蒸汽型电站大得多的地理范围内发电。主市场是美国境内发电，通过长期电力购买协议（PPA） 出售给两类买方：受州可再生能源组合标准约束的电力公用事业公司（NV
              Energy、PacifiCorp、Pacific Gas & Electric）， 以及为数据中心运营追求 24/7
              无碳能源目标的科技超大规模云厂商（Google、Microsoft、Amazon、Meta）。 相邻的稳定清洁电力市场——包括核电、与可再生能源配套的长时储能、带碳捕集的天然气——定义了 Fervo
              面对那些无法接受间歇供给买方时的竞争环境。 基荷清洁电力的现状替代方案是传统地热（美国西部由 Ormat Technologies 主导）和天然气调峰电厂（$50-120/MWh，排放碳）。
              未配储的传统风电和太阳能项目不纳入该市场定义，因为它们无法提供定义 Fervo 价值主张的 24/7 稳定性。 地理上，主市场是地热资源最容易获取的美国西部各州；全球背景则是 $9.2B 的全球地热市场。
