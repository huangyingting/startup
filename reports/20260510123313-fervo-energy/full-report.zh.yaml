  - number: 6
    title: 客户
    sections:
      - number: '6.1'
        title: 客户格局概览
        blocks:
          - type: paragraph
            body: >-
              截至 2026 年 4 月 S-1，Fervo Energy 的客户基础由两个公开具名交易对手组成——NV Energy（Berkshire Hathaway Energy）和 Google
              LLC——另有未披露方代表约 256 MW 具有约束力的 PPA 容量。具有约束力的 PPA 总量为 658 MW，对应 20–25 年 PPA 期限内约 $7.2 billion 的潜在合同收入。NV
              Energy 已承诺采购约 400 MW Cape Station 输出，以满足 Nevada 的可再生能源组合标准（RPS） 要求，即到 2030 年 100% 使用可再生能源。Google 在 2021 年为
              Project Red（1.5 MW）签署商业 PPA，并于 2023 年 11 月获得首批电力。2024 年 8 月，Google 签署一项不具约束力的框架协议，可从 Fervo 开发管线采购最高 3 GW
              额外 EGS 容量。两个具名交易对手几乎代表全部公开合同收入，这种极端集中是本投资论点最关键的客户风险。
            claimRefs: []
