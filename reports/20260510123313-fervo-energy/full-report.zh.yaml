      - number: '7.7'
        title: 风险缓释策略
        blocks:
          - type: paragraph
            body: >-
              Fervo 已组合出一套有意义但尚未在商业尺度完全验证的风险缓释措施。最重要的是 Project Red 和 Cape Station 实施的地震交通灯协议：
              加速度计和光纤分布式声学传感（DAS）持续监测地面运动，预设阈值触发注入降低（黄色）、暂停（橙色）和停止（红色），以防震级升级。 Project Red 向 Google 商业运营 18
              个月以上且未发生重大地震事件，是协议有效性的最强运营证据，不过 Nevada 地质与 Utah Beaver County 不同。GeoBlock Factory
              标准化通过系统化钻井和完井流程来降低单井成本波动，并加快学习曲线，从而应对技术风险。截至 2026 年初， $461.8M 现金头寸提供建设应急缓冲；Devon Energy
              战略伙伴关系带来运营可信度，也可能为场址级执行挑战提供共同投资能力。DOE EGS Earthshot 项目支持——包括 Project Red 试点拨款和后续资金承诺——提供政府背书的技术验证，并为刺激 R&D
              提供部分成本补贴。 Fervo 入选 Nevada NAS Fallon 的 DoD 可行性研究，验证了其 EGS 方案符合军用级运营严谨标准。Google 之外的多元化 PPA 交易对手 （NV Energy
              加未披露方，总计 658 MW）降低单一交易对手终止风险，但集中度仍然偏高。投资者应跟踪的破题风险触发器包括： Cape Station Phase 1 COD 公告、EPA UIC 许可状态更新、Google
              框架约束性转化事件、JPMorgan 契约合规认证，以及 Eavor 和 Sage 的竞争性 EGS 商业里程碑。
