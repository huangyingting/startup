      - number: '7.2'
        title: 主要竞争对手画像
        blocks:
          - type: paragraph
            body: >-
              Eavor Technologies（加拿大）是技术差异最明显的竞争对手。其 Eavor-Loop 闭环系统钻两口垂直井，并用水平段连接，让热力工质循环且永不接触岩体。 这套架构消除了 Fervo
              水力压裂方案固有的诱发地震风险，也不需要可渗透裂缝网络，因此可部署在 Fervo 的 EGS 被禁止或遭遇社区反对的场址。 Eavor 获 bp 和 Chevron 支持，已融资约 $200M，正在德国
              Geretsried 建设 65 MW 项目。方法上的根本差异意味着 Eavor 和 Fervo 在单个场址并非直接替代，但会争夺同一个公用事业和企业 PPA 市场。Sage
              Geosystems（Houston, TX）由前 Shell 高管 Cindy Taff 领导，面向热干岩地热叠加地下加压流体储能。Sage 在 2024 年与 Meta 签署 150 MW PPA，并入选
              DoD Fort Bliss 可行性研究，显示它与 Fervo 直接竞争政府支持的 EGS 机会。AltaRock Energy（Seattle）曾在 Oregon 的 Newberry Volcano 借
              DOE 资金进行 EGS 刺激，但尚未达到商业规模运营，反映出实验室刺激与公用事业交付之间的技术鸿沟。XGS Energy 已签署包括科技公司在内的企业 PPA，但规模较小，融资约 $30M。Ormat
              Technologies（NYSE: ORA）拥有约 1,500 MW 运营地热容量和 $800M 2024 年收入， EV/EBITDA 约 15x，是最直接的公开市场可比公司。Ormat
              已盈利，在传统地热领域有 35 年记录，并在向 EGS 和双循环升级扩张。 Fervo 在 Cape Station 尺度下约 $6.5B 的 IPO 前估值，按尚未交付容量计算，比 Ormat 的 EV/MW
              比率高出 87%；这只有靠 EGS 技术溢价和增长期权价值才能解释。不认可这一溢价的投资者，如果 Cape Station 表现不佳，将面临显著估值压缩风险。
