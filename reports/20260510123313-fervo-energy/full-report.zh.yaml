chapters:
  - number: 1
    title: 公司概况
    sections:
      - number: '1.1'
        title: 公司身份、使命与商业模式
        blocks:
          - type: paragraph
            body: >-
              Fervo Energy 成立于 2017 年，总部位于加州旧金山，并在犹他州和内华达州开展运营。 公司使命是开发下一代地热能源，尤其是增强型地热系统（EGS），提供 24/7 无碳基荷电力。 用一句话概括
              Fervo 的商业模式：借助油气行业的水平钻井技术，打造工程化地下热储， 生产不受天气和时间影响、可靠且可调度的无碳电力。其独特价值主张在于把地热资源基础转化为可规模化、 可融资、公用事业级的发电资产；DOE
              估计这一资源基础比当前已开发装机规模高出数个数量级。 截至 2026 年 3 月，Fervo 约有 225 名员工，并已向美国证券交易委员会（SEC）提交 Form S-1 注册声明， 计划以 FRVO 为代码在
              Nasdaq IPO，披露募资目标为 $1.25 billion，估值约 $6.5 billion。 公司已锁定 658 MW 容量的有约束力电力购买协议，潜在合同收入约 $7.2 billion；Google
              还签署了最高 3 GW 额外容量的无约束力框架。
