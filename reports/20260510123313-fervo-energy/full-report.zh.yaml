      - number: '4.2'
        title: 成本结构与运营费用
        blocks:
          - type: paragraph
            body: >-
              Fervo Energy 的成本画像由 Cape Station 的钻井和地表建设资本开支主导。FY2025 资本开支达到 $465.7 million， 反映公司为完成多井井场而推进的激进钻井活动。$39.7
              million R&D 费用覆盖 EGS 钻井技术开发、 光纤分布式温度传感（DTS）系统和储层工程。$21.8 million G&A 费用包括管理团队扩建、法律与监管合规、IPO 准备成本。
              公司运营成本结构本就是资本密集型：每对 EGS 井钻完并完井约需 $8–15 million，Cape Station 满负荷需要 34+ 对井。 一旦投运，地热几乎没有燃料成本，变动运营费用很低，COD
              后经营杠杆较高。 联邦和州地热特许权使用费（联邦土地总收入的 1.75–3.5%）带来适度持续义务。 随着钻井标准化、GeoBlock 模块化工厂技术按目标把单井成本降低
              30%，整体成本模型在规模化后会显著改善。
