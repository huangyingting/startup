  - id: TV005
    title: 投资逻辑破裂与止损触发器表
    columns:
      - 触发器
      - 阈值 / 定义事件
      - 对投资逻辑的传导
      - 行动含义
    rows:
      - - Cape Station Phase 1 运营失败或延期
        - Phase 1 未能在 2027 年 Q2 前实现 100 MW 商业运营（2026 年 10 月目标基础上 6 个月宽限）
        - 消除核心去风险事件；触发债务契约审查；摧毁 IPO 叙事；整个 PPA 储备订单按更高贴现率重新定价
        - 立即退出或避免持仓；只有在 Phase 1 延期范围有限、修订时间表可信且建设融资已落实时，才重新评估
      - - 诱发地震导致监管停工
        - Cape Station 场址任何 M3.0 及以上地震事件，且要求监管暂停注入作业
        - 触发 BLM/EPA 许可暂停；带来民事责任暴露；可能像 Basel 2009 一样永久终止项目；摧毁股权价值
        - 全面退出；投资逻辑已破裂；在合理投资周期内，监管和法律暴露使复苏情景不存在
      - - Google 商业关系恶化
        - Google 退出 3 GW 非约束性框架，或就 Corsac Station 交付义务发起争议
        - 锚定投资者信心和主要收入交易对手同时流失；市场会以最高严重程度重新定价 Google 集中度风险
        - 将仓位降至最低；跟踪解决进展；若确认永久性恶化，则退出；Google 一致性是投资逻辑的结构性支柱
      - - 资本市场融资受损
        - Fervo 在 IPO 后无法以可接受条款增发股权或举债；JPMorgan 贷款出现任何信用评级下调或契约违约
        - 公司可能无法为 Phase 2（$400M+）融资或为 Phase 1 项目债再融资；稀释或困境情景变得可能
        - 密切跟踪季度现金消耗与 Phase 2 资本需求的差距；任何契约违约信号都要求立即重新评估仓位
    notes: 止损触发器是会从根本上损害投资逻辑的二元事件，而不只是降低回报预期。投资者应为每个触发器设定具体监控仪表盘，并按季度或事件驱动节奏复核。
