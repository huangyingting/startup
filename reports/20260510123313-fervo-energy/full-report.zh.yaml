      - 买方
      - 用户
      - 付款方
      - 工作流
      - 预算负责人
      - 采用触发因素
    rows:
      - - 超大规模云厂商（主要）
        - Google/Alphabet、Microsoft、Amazon Web Services、Meta Platforms 等超大规模云客户
        - 数据中心能源管理和基础设施团队；设施运营
        - 可持续发展和企业财务部门；从运营预算中划拨资本
        - 24/7 CFE 合同按数据中心负荷逐小时匹配；双边 PPA；期限较长（10-20 年）的多 GW 框架协议
        - VP Sustainability / VP Energy Procurement；GW 级承诺由 C 级高管批准
        - 24/7 CFE 承诺期限（Google：2030）；AI 负荷增长拉出新的可靠容量紧缺需求；SEC 气候披露规则带来 Scope 2 报告压力
      - - 区域电力公用事业公司
        - NV Energy、PacifiCorp、Pacific Gas & Electric、Rocky Mountain Power 等公用事业买方
        - 州公用事业监管委员和 IRP 规划人员；费率支付者是最终受益人
        - 费率支付者（通过费率基数转嫁）；自有资产由公用事业公司资产负债表承担
        - 通过正式综合资源规划（IRP）流程采购长期容量；竞争性 RFP；多年 PPA 承诺需州监管批准
        - 资源规划 VP 和 IRP 团队；最终预算需州公用事业委员会批准
        - 州 RPS 强制要求 100% 清洁电力（CA 2045、NV 2050）；西部电网太阳能 / 风电间歇性增加，需要可靠基荷来平衡
      - - 联邦设施和军方
        - 美国国防部设施、GSA 联邦建筑、美国能源部设施
        - 联邦能源经理和设施运营团队
        - 联邦拨款（国会）；ESPC 权限下的机构能源预算
        - 通过节能绩效合同（ESPC）或 NDAA 权限下的长期 PPA 进行联邦采购；DOE 合作项目
        - 基地能源经理 / 设施能源官；DOE FEMP 协调
        - 联邦可持续发展强制要求和清洁能源行政令；DOD 能源安全要求；DOE 与 EGS 开发商的合作项目
      - - 工业直接买家
        - 大型高耗能工业企业：钢铁制造商、化工生产商、采矿运营商、数据中心托管运营商
        - 工厂运营和能源管理团队；制造现场操作人员
        - 企业可持续和运营预算；通过双边 PPA 锁价对冲 Scope 2
        - 直接谈判双边 PPA 或托管协议；通常设计为 10-20 年固定价格协议，交易对手为信用良好的工业企业
        - 大型多年能源承诺需采购 VP 或 CFO 层级批准；可持续委员会参与
        - Science Based Targets initiative 下的 Scope 2 减排目标；对冲大宗商品价格波动带来的能源成本风险；投资者 ESG 压力
      - - 碳信用和 REC 市场
        - 自愿碳市场买家；购买地热 REC 或碳抵消的企业可持续团队
        - 首席可持续发展官；ESG 报告团队
        - 企业 CSR/ESG 预算；自愿净零项目资金
        - 地热可再生能源证书（REC）合同或碳信用协议；期限通常短于电力 PPA
        - 首席可持续发展官；ESG 委员会
        - 自愿净零承诺；投资者对 Scope 2 和 Scope 3 的压力；GHG Protocol 下的碳核算要求
    enumerationScope:
      coverage: partial
      basis: >-
        This map covers the five most material buyer segments for EGS power based on current Fervo contracts and
