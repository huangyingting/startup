  - number: 3
    title: 竞争格局
    sections:
      - number: '3.1'
        title: EGS 竞争格局概览
        blocks:
          - type: paragraph
            body: >-
              增强型地热系统（EGS）仍是一个规模小、早期的市场，由少数资金充足的初创公司主导。 Fervo Energy 是商业 EGS 的明确领先者，Cape Station 项目是美国首个在建的公用事业级 EGS 设施。
              据 BNEF，全球 EGS 投资在 2024-2025 年合计达到 $3.8 billion，显示整个板块资本形成正在加速。 直接竞争者包括 Quaise Energy（毫米波井筒汽化）、AltaRock
              Energy（多区 EGS）和 Eavor Technologies（闭环地热）， 各自采用差异化技术路径，瞄准不同资源窗口。Ormat Technologies（NASDAQ:
              ORA）等传统地热运营商争夺同一基荷可再生能源承购市场， 但缺乏 EGS 的可扩展性，受限于特定水热资源位置。SLB 和 Chevron 等大型综合能源公司通过投资和内部 R&D 布局早期 EGS 项目； The
              Information 报道称，它们可能在 5-7 年内成为强大竞争者。Fervo 最强的竞争护城河，是从油气行业改造而来的商业规模水平钻井能力， 叠加 Cape Station 在锁定长期公用事业 PPA
              上的先发优势。Wood Mackenzie 独立评估认为，截至 2026 年 5 月， Fervo 在美国商业 EGS 领域拥有 3-5 年先发优势。Geothermal Rising 2026 行业报告把
              Cape Station 称为全球 EGS 风向标项目， 反映公司相对其开发阶段具有超常的行业重要性。
            claimRefs:
