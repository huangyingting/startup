      - number: '5.5'
        title: 差异化、IP 与竞争护城河
        blocks:
          - type: paragraph
            body: >-
              Fervo 的竞争差异化来自三层：注册 IP、累积运营数据，以及 GeoBlock Factory 工艺诀窍。注册组合以 US Patent 11536113
              为锚点，该专利覆盖通过分布式光纤传感监测地热储层，已于 2022 年 12 月授权；另有一项延续申请（US App. 2023/0175393） 覆盖水平 EGS
              裂缝设计方法。后续学术文献已把两者作为基础披露引用。专利之外，Fervo 已积累 Project Red 和 Cape Station 的 TB 级 DAS/DTS
              数据，并输入自有地质力学储层模拟平台——这是一条需要多年现场运营才能复制的数据护城河。

              相比 Eavor Technologies（闭环、无压裂、单井热输出较低、估计 LCOE 为 $120–160/MWh），Fervo 的开环方案用更高地下复杂度换来更高功率密度。 相比 Sage
              Geosystems（面向调峰应用的压力储能 EGS），Fervo 服务的是根本不同的市场：24/7 基荷，而不是峰值调度。2024 年 1 月的 Science 论文和 SPE Annual
              Conference 演示确认，Fervo 的技术差异化已获得从业者社区认可。

              最可信的竞争威胁是长时储能（铁空气、铁液流电池）：如果 LCOS 在 2028–2030 年达到 $50–70/MWh，支撑 Fervo LCOE 的稳定电力溢价会收窄。 因此，2026
              年商业化窗口具有战略关键性；Fervo 需要在储能侵蚀价差之前锁定长期 PPA。Fervo 参与从业者社区——活跃于 Geothermal Rising 论坛和 SPE
              会议演示——强化了技术可信度，也加快了公用事业工程师群体的采用。
