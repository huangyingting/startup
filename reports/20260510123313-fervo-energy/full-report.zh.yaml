      - number: '5.3'
        title: EGS 技术架构
        blocks:
          - type: paragraph
            body: >-
              Fervo 的 EGS 技术栈由四层拼成：水平定向钻井、多级水力压裂、分布式光纤传感，以及地表有机朗肯循环（ORC）电站。
              水平钻井层沿用并改造油气页岩作业里的多晶金刚石复合片（PDC）钻头、旋转导向系统（RSS）和随钻测量（MWD）遥测， 在基底岩中钻出 2,000–3,500 英尺长、埋深 5,000–8,000
              英尺的水平段。Fervo 的 Project Red 已在商业井设计尺度验证这套方法， Cape Station 现在把它用于多口井同步推进。

              多级水力压裂在注入井和生产井之间打通渗透网络，而晶质基底岩本身的基质渗透率几乎为零。冷水在压力下注入，沿裂缝流动时接触 180–250°C 岩体并被加热，随后以地热卤水形式采出，驱动 ORC
              涡轮。沿整段水平井筒部署的分布式光纤传感（DAS/DTS） 提供连续、厘米级地下遥测，团队可以实时观察裂缝扩展、识别高产区、发现热短路，并动态优化注入速率。2024 年 1 月发表在 Science 的
              Project Red 同行评议论文确认，光纤传感方案已获得独立验证。

              地表环节，预制模块化 ORC 涡轮撬块把采出的卤水转成电力，容量因子超过 90%。GeoBlock Factory 方案将这些地表撬块预制化、标准化， 以压缩现场安装时间。PowerFlex
              位于实体电站之上，是软件定义的储层管理层；它通过在安全运行窗口内调节注入和生产速率， 支持动态跟随负荷。这四层合在一起，把原始基底岩转成上网的无碳电力——此前地热实践中没有直接对应的系统。
