      - number: '3.3'
        title: 定价与商业策略
        blocks:
          - type: paragraph
            body: >-
              Fervo Energy 的商业策略聚焦于与投资级公用事业公司和超大规模云厂商签订长期基荷 PPA； 在这一细分市场中，传统地热以及间歇性风电、太阳能都无法提供可比的 24/7 可靠性。 NV Energy 针对
              Cape Station 400 MW 的 PPA 设定了美国 EGS 承购参考价格；具体每 MWh 价格属商业机密， 但分析师估计在 $60-80/MWh。Google 最高 3 GW 的框架协议显示，随着
              AI 数据中心用电需求加剧， 超大规模云厂商愿意为稳定、可调度的可再生能源支付溢价。Financial Times 报道称，超大规模云厂商正积极接洽 EGS 和核能 SMR 开发商，
              以获得稳定清洁电力，这种竞价动态应支撑 Fervo 定价权。Rocky Mountain Institute 分析认为， 地热 EGS 在规模化后以 $60-80/MWh 具备竞争力，相比核能 SMR 的
              $100-150+/MWh 更优； 在真正 24/7 基荷可靠性上，两者都优于太阳能加储能。Eavor 已在欧洲签署早期 PPA，价格为 €80-100/MWh， 略高于 Fervo 估计的美国价格。LBNL
              PPA 基准数据显示，美国传统地热均价为 $70-85/MWh， 表明商业规模 EGS 将具备价格竞争力。Fervo 的 PowerFlex 灵活调度能力增加潜在辅助服务收入流——调频、容量市场—— 可补充基础
              PPA 收入，并随时间改善整体项目经济性。GeoBlock 工厂降本项目目标在规模化后把单井成本降低 30%， 这会进一步压缩服务成本，并可能让未来轮次 PPA 定价更有竞争力。
