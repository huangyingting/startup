      - number: '5.4'
        title: 信任、安全、监管合规与环境控制
        blocks:
          - type: paragraph
            body: >-
              Fervo 的 EGS 运营受多层监管框架约束。Cape Station 在 2024 年 8 月完成环境影响声明后，获得美国土地管理局（BLM） 的通行权授予，扫清主要联邦许可要求。EIS
              评估了土地扰动、用水、视觉影响和诱发地震，并施加监测与缓解条件；这些条件现在已经纳入 Fervo 的运营许可。Fervo 针对 Cape Station 的 FERC 并网协议已经提交，仍待完成。

              诱发地震是 EGS 最核心的安全与社区信任风险。Fervo 采用 DOE 交通灯协议（TLP），在压裂期间实时监测地震活动； 一旦地震活动超过震级阈值，就停止注入。Project Red
              完成水力压裂作业时没有可报告地震事件。Cape Station 的刺激规模更大， 天然比 3.5 MW 试点带来更高诱发地震潜势，因此配套了更密集的监测阵列和 DOE 监督。

              水管理采用闭环回收系统：采出的卤水脱热后回注，把消耗性用水降到最低——这是 BLM 对美国西部缺水场址设置的许可条件。 公司的钻井作业遵循标准油气职业安全规程。2026 年 4 月的 S-1
              将诱发地震、用水、BLM 许可、FERC 并网和 IP 盗用列为重大风险因素。 截至报告日期，公开信息中没有披露可报告环境违规或安全事故。
