      - number: '6.3'
        title: 具名客户验证与采用轨迹
        blocks:
          - type: paragraph
            body: >-
              最可信的客户验证点，是 Project Red 自 2023 年 11 月以来连续 18 个月以上向 Google 商业交付。这段真实运营记录——首个在商业 PPA 下交付 24/7 稳定电力的公用事业规模
              EGS 项目——验证了 Fervo 的核心技术主张，并提供了 Google 级别的客户背书。Google 随后在 2024 年 8 月签署不具约束力的 3 GW 框架，显示其对 Project Red
              表现满意；但该框架没有约束性交付义务，转化里程碑也未披露。 Cape Station 已与 NV Energy 签约约 400 MW，但尚未商业运营；NV Energy 的承诺由 2025 年 1 月
              Nevada PUC 监管申报支撑。 从 1.5 MW 试点（2021 年）到 658 MW 具有约束力的合同储备（2026 年），采用轨迹体现出合同容量的快速增长；不过在 Cape Station 实现 COD
              之前，实际电力交付仍集中在 Project Red 的 1.5 MW。
