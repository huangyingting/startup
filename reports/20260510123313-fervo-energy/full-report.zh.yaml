  - id: TM004
    title: 增长驱动与制约因素表
    columns:
      - 驱动因素 / 制约因素
      - 方向
      - 时间窗口
      - 对 Fervo 的影响
      - 尽调问题
    rows:
      - - AI 数据中心用电需求激增
        - 驱动因素
        - 2024-2030（建设高峰）
        - 超大规模云厂商必须采购可靠清洁电力以满足 24/7 CFE 目标；这给 Fervo 创造溢价 PPA 机会，交易对手信用良好且愿签长期协议
        - 按超大规模云厂商核实数据中心负荷增长预测；确认 Google 和 Microsoft 的 CFE 合同时间表不会被延后或调整目标
      - - IRA 投资税收抵免和生产税收抵免
        - 驱动因素
        - 2023-2032（IRA 法定期限）
        - 30-50% ITC 和 $27.50-55/MWh PTC 显著降低 Fervo 的有效 LCOE 和项目融资成本；让机构项目债在可接受 DSCR 下可行
        - 跟踪国会修改 IRA 的风险；确认 Fervo 的 Cape Station 和 Corsac Station 是否符合 ITC 或 PTC 选择资格；核实选择时点和追缴风险
      - - DOE Enhanced Geothermal Shot 政策
        - 驱动因素
        - 2022-2035（项目期限）
        - 设定 $45/MWh 成本目标并配套 R&D 投入；释放长期联邦政策承诺信号；为 EGS 开发商提供共同投资信号
        - 确认 Fervo 相对 DOE $45/MWh 目标的成本轨迹；评估 EGS Pilot Demonstrations 项目是否有资金可用于 Fervo 项目
      - - 油气水平钻井技术迁移
        - 驱动因素
        - 2020-至今
        - 套用成熟页岩油气技术，降低 EGS 单井钻井成本；Devon Energy 合作关系带来供应链关系和技术经验
        - 随 Devon 合作成熟，跟踪单井钻井成本；量化从 Project Red 到 Cape Station Phase 1 的每 MW 成本学习曲线改善
      - - EGS 资本强度高于太阳能和风电
        - 制约因素
        - 持续
        - EGS 为 $4-8M/MW，公用事业级太阳能为 $1-2M/MW；没有大额项目债，部署速度受限；需要愿意承担地热风险的机构贷款人
        - 从 Fervo 的 Cape Station 开发中获取已核实的 $/MW 成本估计；对比太阳能和风电基准；评估通向 2030 年目标的降本路线图
      - - 地下地质风险
        - 制约因素
        - 按项目而定
        - 干井或产能不及预期的井会推高每 MWh 成本并带来进度风险；即便做了大量地球物理勘测，开钻前也无法完全消除风险
        - 复核 Project Red 和 Cape Station 井性能数据相对设计假设的表现；评估已钻井成功率，以及与储层模型预测的偏差
      - - 电网并网积压
        - 制约因素
        - 2024-2030
        - 美国西部 WECC 区域 3-5 年并网排队等待时间，限制了近期部署，即使项目地质可行且融资已锁定
        - 评估 Cape Station 和管线项目的并网队列位置、预计批准日期和输电升级要求；评估对 2026 年 10 月 Phase 1 目标的影响
      - - 核能 SMR 竞争出现
        - 制约因素
        - 2030-2040（最早规模部署）
        - 如果 SMR 部署加速（NuScale、TerraPower、X-Energy），SMR 会以可能相近的成本争夺同一批 24/7 CFE 买家；地热拿到的可靠性溢价可能被压缩
        - 跟踪 SMR 商业化部署时间表和成本基准；评估若 2035 年前 SMR 能以有竞争力的成本供应，超大规模云厂商采购偏好是否会转向 SMR
    notes: >-
      驱动因素 / 制约因素条目来自 EIA Annual Energy Outlook 预测、DOE Enhanced Geothermal Shot 文件、IRA 法定条款、Rystad Energy 对 Cape Station
      融资的分析，以及 IEEFA 对地热风险的独立评估。时间范围为大致估计，反映分析师共识；实际拐点可能不同。考虑到 NuScale 的 VOYGR 在 2023 年取消，以及 SMR 部署普遍延后的模式，核能 SMR
      时间判断偏保守。尽调问题按其对 Fervo 近期 IPO 和 Cape Station 交付叙事的重要性排序。
