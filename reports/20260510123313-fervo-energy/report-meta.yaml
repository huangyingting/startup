companyProfile:
  summary: >-
    Fervo Energy was founded in 2017 by Tim Latimer (CEO) and Jack Norbeck (CTO) in San
    Francisco, California. The company applies horizontal drilling, multi-stage hydraulic
    fracturing, and distributed fiber optic sensing — techniques borrowed from the oil and
    gas industry — to tap geothermal heat at scale. Its core offering is 24/7 carbon-free
    baseload electricity through engineered underground heat reservoirs, addressing the
    intermittency problem that limits solar and wind. Cape Station in Milford, Utah is the
    world's largest planned EGS project (500 MW full build-out). Phase 1 (100 MW) targets
    commercial operations in October 2026. Fervo filed an S-1 with the SEC in April 2026
    targeting a $1.25B IPO at ~$6.5B valuation on Nasdaq under ticker FRVO. The company
    remains pre-commercial with $138K in 2025 revenue and a $57.8M net loss; the valuation
    depends entirely on construction execution, PPA delivery, and GeoBlock Factory cost
    reduction progress.

  foundedDate: "2017-01-01"

  founders:
    - name: Tim Latimer
      role: Co-Founder & CEO
      background: >-
        Former drilling and completions engineer at oil and gas companies; MS in Energy
        Resources Engineering from Stanford University. Recognized as a Forbes 30 Under 30
        alumnus. Leads Fervo's executive team and investor relations through IPO.
    - name: Jack Norbeck
      role: Co-Founder & CTO
      background: >-
        Stanford PhD in Energy Resources Engineering. Leads reservoir engineering,
        subsurface technology, and the GeoBlock Factory standardized drilling program.
        Core inventor of Fervo's horizontal EGS drilling and fiber optic sensing stack.

  foundingLocation: "San Francisco, CA"
  headquarters: "San Francisco, CA (global HQ); Milford, UT (Cape Station operations)"

  productSummary: >-
    Fervo's flagship product is utility-scale enhanced geothermal power delivered under
    long-term power purchase agreements (PPAs). Cape Station Phase 1 (100 MW) targets
    commercial delivery in October 2026 under a PPA with NV Energy; Phase 2 (400 MW) is
    targeted for 2028. The GeoBlock Factory program standardizes EGS well construction to
    drive down drilling cost and time. Fervo also operates Project Red (1.5 MW) in Nevada
    as a commercial pilot and proof-of-concept for its EGS stack. The full development
    pipeline exceeds 15 GW across approximately 475,000 net acres.

  customerFocus: >-
    Primary customers are large utilities and hyperscale technology companies seeking
    24/7 carbon-free electricity. Anchor customers include NV Energy (PPA for Cape Station
    Phase 1) and Google (non-binding 3 GW framework; existing Project Red offtake). The
    $7.2B binding PPA backlog (658 MW) represents contracted future revenue from these
    and additional undisclosed counterparties.

  businessModel: >-
    B2B project developer and independent power producer (IPP). Revenue model: long-term
    power purchase agreements (PPAs) with utilities and corporate buyers at fixed or
    indexed $/MWh rates. Capital structure: equity (Series A–E, ~$1.1B+) plus project
    debt ($120M Mercuria facility, $421M JPMorgan-led Cape Station facility). Pre-commercial
    through 2025; commercial revenue expected to begin in late 2026 upon Cape Station
    Phase 1 commercial operations.

  stage: "Pre-IPO (S-1 filed April 2026; Nasdaq FRVO; $1.25B raise target)"

  fundingStatus: >-
    Total equity raised exceeds $1.1B pre-IPO across Series A–E. Key rounds: $138M
    Series B (2022, Capricorn Investment Group lead); $244M Series C (2023); $135M Series D
    extension (December 2024, Capricorn); $462M Series E (December 2025, B Capital and
    Google co-lead). Project debt: $120M Mercuria facility (December 2024) and $421M
    JPMorgan-led Cape Station project finance facility (March 2026). IPO targets $1.25B
    at ~$6.5B valuation on Nasdaq (FRVO), announced January 2026, S-1 filed April 2026.

  disclosureProfile: private-disclosed

  claimRefs: []

