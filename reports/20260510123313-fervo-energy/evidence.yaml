  - topic: Cape Station construction current status
    type: stale
    severity: material
    missingEvidence: >-
      Independent field-level verification of Cape Station Phase 1 well count, completion stages, ORC equipment
      procurement status, and grid interconnection progress as of May 2026; the most recent third-party reporting is
