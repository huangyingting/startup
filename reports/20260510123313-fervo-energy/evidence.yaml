  - topic: EGS permitting timelines versus wind and solar on federal lands
    type: missing-source
    severity: material
    missingEvidence: >-
      Quantitative comparison of EGS federal permitting timelines (Bureau of Land Management environmental review and
      NEPA process) versus comparable onshore wind or solar permitting on federal lands in the western US. Current
      chapter sources characterize EGS permitting as 2-5 years but do not provide a published comparison benchmark to
      other renewable technologies on equivalent land classifications.
    whyItMatters: >-
      If EGS permitting timelines are materially longer than wind or solar on federal lands, this constraint is more
      binding than the chapter's current treatment suggests and would affect the pace at which Fervo can develop its
      475,000-acre land position into operating assets.
    diligencePath: >-
      Request BLM permitting timeline data for recent wind, solar, and geothermal projects on federal lands; review the
      DOE GeoVision report's permitting section for comparative analysis; engage a permitting consultant with federal
      renewable experience.
    relatedQuestionRefs:
      - QM023
    relatedTableRefs:
      - TM004
  - topic: EGS drilling cost learning curve from Project Red to Cape Station
    type: private-evidence-only
    severity: material
    missingEvidence: >-
      Publicly available quantification of per-well and per-MW drilling cost improvement from Fervo's Project Red pilot
      (2022) to Cape Station Phase 1 operations (2026). The chapter asserts that O&G horizontal drilling technology
      transfer reduces EGS cost, but no public source provides a specific learning curve coefficient or $/MW cost
      comparison between Project Red and Cape Station. This data likely exists in Fervo's internal cost accounting and
      the S-1 cost discussion but is not fully disclosed.
    whyItMatters: >-
      The learning curve from pilot to commercial scale is the primary evidence that EGS costs can reach the $45/MWh DOE
      target by 2035. Without quantified improvement data, cost reduction projections are speculative and cannot be
      benchmarked against the IRA subsidy-free competitive threshold.
    diligencePath: >-
      Request per-well drilling cost breakdown and aggregate $/MW development cost for Cape Station Phase 1 from Fervo
      management; compare to Project Red disclosed cost; engage independent petroleum engineering consultants to
      validate the cost model.
    relatedQuestionRefs:
      - QM024
      - QM025
    relatedTableRefs:
      - TM004
