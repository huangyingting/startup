      geothermal, nuclear small modular reactors, offshore wind, and long-duration storage alternatives; company has not
      publicly disclosed unit economics.
    whyItMatters: >-
      Investors cannot independently assess whether Fervo's cost trajectory supports a compelling $/MWh at commercial
      scale without independent LCOE benchmarks.
    diligencePath: >-
      Commission or identify third-party energy economics reports on EGS LCOE trajectories; request unit economics
      disclosure from management under NDA as part of IPO diligence; compare to NREL and DOE EGS cost projections in
      published research.
