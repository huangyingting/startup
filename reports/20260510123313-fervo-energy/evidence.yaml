    whyItMatters: >-
      The October 2026 Cape Station Phase 1 target is the single most critical milestone underpinning the IPO valuation
      narrative; any delay or underperformance discovered post-IPO filing would be material to investors.
    diligencePath: >-
      Request construction progress reports from management, engage independent engineering consultants to assess
      wellbore performance data and ORC commissioning schedule, and review grid interconnection queue filings with
      relevant utility operators.
