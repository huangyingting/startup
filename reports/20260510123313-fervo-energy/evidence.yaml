      carbon/REC markets but does not include international buyers (European and Asian utilities pursuing clean power
      imports), co-location data center operators (distinct from hyperscalers), or municipal utilities. These segments
      are excluded because no current Fervo contracts exist in these categories, but they may represent future demand.
