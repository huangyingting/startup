  evidenceGaps:
    - topic: "Hyperscaler 24/7 CFE procurement timeline updates 2025-2026"
      type: stale
      severity: material
      missingEvidence: >-
        Current (within 6 months of report date) verification of whether Google, Microsoft, Amazon,
        and Meta have updated their 24/7 CFE procurement timelines in light of AI infrastructure
        capital prioritization, changing corporate energy strategies, or evolving regulatory carbon
        accounting requirements. The most recent sourced data reflects 2024 annual reports and
        December 2025 investment disclosures; intervening hyperscaler budget revisions or CFE
        target modifications are not captured.
      whyItMatters: >-
        Hyperscaler demand concentration is the primary driver of Fervo's premium-price buyer
        segment; any slowdown in 24/7 CFE procurement pace by one or two large tech companies
        would materially compress the near-term SOM and affect Fervo's PPA conversion pipeline.
      diligencePath: >-
        Review hyperscaler Q1 2026 earnings call transcripts for energy procurement commentary;
        check Google, Microsoft, and Amazon sustainability teams' public 2026 disclosures; verify
        whether the Google 3 GW non-binding framework has progressed toward binding terms.
      relatedQuestionRefs: [QM019, QM020]
      relatedTableRefs: [TM003]

    - topic: "EGS permitting timelines versus wind and solar on federal lands"
      type: missing-source
      severity: material
      missingEvidence: >-
        Quantitative comparison of EGS federal permitting timelines (Bureau of Land Management
        environmental review and NEPA process) versus comparable onshore wind or solar permitting
        on federal lands in the western US. Current chapter sources characterize EGS permitting
        as 2-5 years but do not provide a published comparison benchmark to other renewable
        technologies on equivalent land classifications.
      whyItMatters: >-
        If EGS permitting timelines are materially longer than wind or solar on federal lands,
        this constraint is more binding than the chapter's current treatment suggests and would
        affect the pace at which Fervo can develop its 475,000-acre land position into operating
        assets.
      diligencePath: >-
        Request BLM permitting timeline data for recent wind, solar, and geothermal projects
        on federal lands; review the DOE GeoVision report's permitting section for comparative
        analysis; engage a permitting consultant with federal renewable experience.
