      basis: >-
        This map covers the five most material buyer segments for EGS power based on current Fervo
        contracts and disclosed framework agreements (Google, NV Energy) and analogous segments
        documented in public procurement data and hyperscaler sustainability reports. The full buyer
        universe includes additional utility counterparties, international buyers, and industrial
        segments not yet represented in Fervo's disclosed contract portfolio. Federal and carbon
        market segments are included as emerging rather than current revenue contributors.
    notes: >-
      Buyer entries are based on Fervo's disclosed contracts (NV Energy, Google), hyperscaler
      sustainability commitments (Google 2024 Environmental Report, Microsoft sustainability page),
      and publicly documented procurement patterns. Budget owner roles are inferred from industry
      norm for PPA procurement at each buyer type; actual decision-maker titles at specific
      counterparties require verification through direct diligence. Federal and carbon market
      segments are early-stage for Fervo and may require updated mapping as the contract portfolio
      matures post-Cape Station commercialization.
