callouts:
  - calloutType: strength
    title: "Data Center Demand Creates Sustained Premium-Price Buyer Segment"
    body: >-
      AI-driven electricity demand from hyperscalers — Google, Microsoft, Amazon, and Meta —
      creates a structurally new buyer class for 24/7 carbon-free baseload power that is willing
      to pay 20-40% premiums over spot market prices for certified firmness. US data centers
      currently consume approximately 200 TWh per year and are growing at 15-25% annually as
      AI training and inference workloads scale. Google's 24/7 CFE commitment by 2030, combined
      with its existing Corsac Station agreement and non-binding 3 GW framework with Fervo,
      exemplifies a procurement dynamic that did not exist at scale five years ago. This buyer
      segment directly rewards EGS's core attribute — 24/7 baseload power — and is structurally
      constrained from substituting intermittent solar or wind at the same premium, providing
      Fervo with pricing power in a segment where capacity is currently scarce.
    claimRefs: [CM017, CM018, CM019, CM024, CM025]

  - calloutType: risk
    title: "EGS Cost Competitiveness Remains Unproven at Commercial Scale"
    body: >-
      Current EGS LCOE estimates of approximately $80-100/MWh must fall to the DOE's $45/MWh
      Enhanced Geothermal Shot target by 2035 to compete with solar-plus-storage without IRA
      subsidies. While IRA tax credits bridge this gap in the near term, political risk around
      IRA modification is non-trivial. Until Cape Station Phase 1 delivers verified commercial-scale
      cost benchmarks in late 2026 or 2027, the cost reduction trajectory remains an assumption
      rather than a demonstrated outcome. IEEFA has noted that geothermal's renaissance faces
      real hurdles including high upfront capital costs, subsurface variability, and lengthy
      permitting timelines — risks that cost models can underestimate. Investors should treat
      EGS cost projections as requiring independent verification from Cape Station operations data.
    claimRefs: [CM029, CM034, CM035, CM036, CM038]

  - calloutType: recommendation
    title: "Track IRA Tax Credit Stability and Interconnection Queue Status for Pipeline Projects"
    body: >-
      IRA ITC and PTC credits reduce Fervo's effective LCOE by 30-50% and are foundational
      to project financing economics for Cape Station and the broader development pipeline.
      Congressional modifications to IRA provisions — whether through sunset, phase-down
      acceleration, or technology exclusions — represent the single largest near-term regulatory
      risk to EGS project economics. Simultaneously, western US grid interconnection backlogs
      of 3-5 years limit near-term project completion timelines independent of financing or
      geology. Investors and diligence teams should monitor both the legislative progress of any
      IRA modification proposals and the interconnection queue positions of Fervo's pipeline
      projects beyond Cape Station, as delays in either dimension could materially push out
      revenue recognition beyond the current S-1 disclosure.
    claimRefs: [CM026, CM027, CM031, CM032]

  - calloutType: insight
    title: "The Firm Clean Power Premium is the Central Market Dynamic"
    body: >-
      Unlike solar or wind, geothermal EGS provides 24/7 baseload electricity with capacity
      factors exceeding 90-95% — a physical characteristic that allows Fervo to compete not
      on lowest cost per MWh but on reliability premium. This distinction creates a segmented
      market where substitution by intermittent renewables is structurally constrained, and
      where the relevant competitive set is limited to nuclear, gas (with carbon penalties), and
      long-duration storage rather than the full renewable procurement market. As hyperscaler
      CFE commitments tighten from annual average matching to hourly temporal matching — as
      Google's methodology explicitly requires — the firmness premium embedded in EGS PPAs is
      likely to expand rather than contract, even as overall renewable costs decline. Fervo's
      market position improves precisely as the 24/7 requirement becomes more stringent.
    claimRefs: [CM002, CM003, CM006, CM017, CM018]

