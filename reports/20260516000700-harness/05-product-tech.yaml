figures:
- id: FE001
  title: Product architecture map
  type: stack
  layout: wide
  summary: 'Harness platform architecture shown as a four-layer stack: SaaS control plane on GCP, platform services (AIDA,
    policies), delivery modules, and the Delegate agent bridging to customer infrastructure.'
  data:
    layers:
    - id: l1
      label: Harness SaaS Control Plane (Google Cloud Platform)
      detail: Multi-tenant Kubernetes-native orchestration layer; hosts pipeline engine, state management, REST/GraphQL API,
        and AIDA AI Knowledge Graph. Horizontally scalable. Primary ingress for all UI and API traffic.
    - id: l2
      label: Platform Services (AIDA · Policies · Governance · Audit)
      detail: 'AI Development Assistant (AIDA): Test Intelligence, anomaly detection, pipeline auto-generation, cost recommendations.
        OPA-based Policy-as-Code enforcement. Role-based access control, audit trail, secret management connectors.'
    - id: l3
      label: Delivery Modules (CI · CD · CCM · FF · SSCA · IDP · Chaos)
      detail: 'Seven independently licensed capability modules: Continuous Integration, Continuous Delivery, Cloud Cost Management,
        Feature Flags, Software Supply Chain Assurance (SLSA L3), Internal Developer Portal (Backstage), and Chaos Engineering
        (LitmusChaos). Each module is additive and can be adopted incrementally.'
    - id: l4
      label: Delegate Agent (Customer Environment)
      detail: Lightweight JVM-based agent deployed in customer Kubernetes cluster or VM. Outbound-only long-polling to SaaS
        control plane — no inbound firewall rules required. Executes pipeline steps locally, keeping secrets inside customer
        network. Supports multiple Delegates per account for HA.
    - id: l5
      label: Target Infrastructure (Customer-owned)
      detail: 'Kubernetes clusters (EKS, GKE, AKS, on-prem), AWS ECS/Lambda, Azure Container Apps, VMs, bare metal. Cloud
        providers: AWS, Azure, GCP. IaC: Terraform, Pulumi, Ansible. Secrets: HashiCorp Vault, AWS Secrets Manager, Azure
        Key Vault.'
  approximationNotes: Layer boundaries are logical, not physical; actual GCP topology (regions, zones, multi-region replication)
    is not publicly disclosed.
