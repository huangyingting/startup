  evidenceGaps:
  - type: missing-source
    severity: material
    topic: compliance
    missingEvidence: FedRAMP Authorized or In Process listing on the official fedramp.gov marketplace confirming Harness is
      pursuing or holds FedRAMP authorization.
    whyItMatters: U.S. federal agencies and many regulated-sector enterprises require FedRAMP authorization for cloud SaaS
      procurement; absence blocks a material buyer segment.
    diligencePath: Search fedramp.gov/products marketplace; request FedRAMP status letter or Authority to Operate (ATO) documentation
      directly from Harness.
    relatedQuestionRefs:
    - QE021
  - type: private-evidence-only
    severity: material
    topic: AI differentiation
    missingEvidence: Independent third-party benchmark confirming Harness AI Test Intelligence's claimed 90% test-time reduction
      across representative enterprise codebases.
    whyItMatters: AI Test Intelligence is a primary differentiation claim; unverified performance benchmarks limit confidence
      in the CI module's competitive positioning.
    diligencePath: Request methodology documentation, training data details, and customer case study data with before/after
      test suite runtimes from Harness; seek independent evaluation from analyst firms.
    relatedQuestionRefs:
    - QE008
  - type: missing-source
    severity: material
    topic: security
    missingEvidence: Third-party penetration test results, vulnerability disclosure policy, or bug bounty program details
      for the Harness SaaS platform.
    whyItMatters: Enterprise security reviews require evidence of proactive vulnerability management; absence of public pen
      test disclosures increases vendor risk assessment uncertainty.
    diligencePath: Request penetration test summary report and vulnerability remediation SLAs via vendor security questionnaire;
      ask about HackerOne/Bugcrowd participation.
    relatedQuestionRefs:
    - QE022
  - type: private-evidence-only
    severity: material
    topic: roadmap
    missingEvidence: Formal, versioned Harness product roadmap with committed delivery dates and feature specifications for
      AIDA AI Agents and Knowledge Graph expansion.
    whyItMatters: Without a commitments-backed roadmap, buyers cannot reliably assess when agentic AI features will reach
      GA maturity or plan integration timelines.
    diligencePath: Request roadmap briefing and reference customer validation of beta AI agent capabilities from Harness product
      management.
    relatedQuestionRefs:
    - QE025
  - type: missing-source
    severity: minor
    topic: reliability
    missingEvidence: Publicly stated SaaS SLA (uptime %, incident response time) for the Harness control plane; public status
      page with historical uptime data; count of pre-built OPA policy templates available out-of-box.
    whyItMatters: Enterprise customers require SLA commitments for SaaS deployment platforms; absence of public SLA makes
      contractual evaluation harder. OPA template count substantiates the policy-as-code differentiation claim.
    diligencePath: Review enterprise contract template; request SLA annexe; check status.harness.io for availability history;
      request OPA template catalog from Harness sales engineering.
    relatedQuestionRefs:
    - QE013
    - QE010
