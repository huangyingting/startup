- id: ai-trust-compliance-roadmap
  title: AI Differentiation, Trust, Compliance, and Roadmap
  body: 'Harness AIDA (AI Development Assistant) is the platform''s primary competitive differentiator, combining generative
    AI with a proprietary Software Delivery Knowledge Graph built from over 128 million deployment records and 81 million
    build records. AIDA capabilities span four areas: (1) AI Test Intelligence—identifying and executing only the subset of
    tests relevant to a specific code diff, claiming 8x build acceleration; (2) AI pipeline generation—converting natural
    language descriptions into Harness pipeline YAML; (3) AI anomaly detection and root cause analysis for deployment failures
    and build errors; and (4) proactive recommendations for cloud cost optimization in the CCM module. Trust and compliance
    posture is anchored by Harness''s confirmed SOC 2 Type II attestation (covering the Harness SaaS platform including the
    FME/Split integration) and ISO 27001/27017/27018 certifications (covering Harness, Split/FME, and Traceable), all published
    on the Harness Trust Center. The SSCA module implements SLSA Level 3 build provenance using Sigstore''s Cosign and Rekor
    transparency log for cryptographic artifact signing, providing tamper-evident build pipelines. GDPR and CCPA compliance
    is stated on the privacy policy, but FedRAMP In Process or Authorized status has not been found on the official FedRAMP
    Marketplace as of May 2026—a material gap for U.S. federal and regulated-sector buyers. The near-term roadmap (2025-2026)
    centers on agentic AI for pipeline orchestration, deeper Knowledge Graph integration for cross-service dependency mapping,
    and API security via the Traceable platform acquired in February 2025. The IDP module continues to evolve with AI-powered
    developer experience recommendations. Roadmap details are primarily signaled through blog posts and conference presentations;
    no formal, versioned public roadmap document has been located, creating uncertainty about delivery timelines and prioritization.'
