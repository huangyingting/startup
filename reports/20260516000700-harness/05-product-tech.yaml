- id: FE002
  title: Customer workflow / operating flow
  type: flow
  layout: wide
  summary: End-to-end developer workflow showing how a code commit travels through Harness CI (test selection, build, artifact),
    Harness CD (deployment strategy, verification), and feeds back into monitoring and next cycle.
  data:
    nodes:
    - id: n1
      label: Code Commit / PR
      detail: Developer pushes to GitHub/GitLab/Bitbucket/Azure DevOps. Webhook triggers Harness CI pipeline automatically.
    - id: n2
      label: AI Test Intelligence
      detail: AIDA selects only tests relevant to the changed code diff; skips unaffected tests. Claimed 90% reduction in
        test time for mature repos.
    - id: n3
      label: Build + Artifact Creation
      detail: Build Cache Intelligence reuses unchanged dependencies. Container image or binary artifact produced and published
        to registry.
    - id: n4
      label: Policy + Quality Gate
      detail: OPA policy checks artifact signature, SBOM, vulnerability scan (SSCA). Approval gate if policy requires human
        sign-off.
    - id: n5
      label: CD Pipeline Trigger
      detail: CD pipeline triggered with deployment strategy (canary, blue-green, rolling, A/B). Environment-specific approval
        gates enforced.
    - id: n6
      label: Progressive Deployment
      detail: Delegate executes deployment steps in customer environment. Feature Flags enable traffic shifting without re-deployment.
    - id: n7
      label: Automated Verification
      detail: AIDA anomaly detection monitors Datadog/New Relic/Prometheus metrics post-deploy. Auto-rollback triggered on
        threshold breach.
    - id: n8
      label: Feedback to AIDA Knowledge Graph
      detail: Deployment outcome (success/failure, metrics) ingested into AIDA Knowledge Graph for continuous model improvement.
    edges:
    - from: n1
      to: n2
      label: webhook trigger
    - from: n2
      to: n3
      label: filtered test run
    - from: n3
      to: n4
      label: artifact + SBOM
    - from: n4
      to: n5
      label: policy passed
    - from: n5
      to: n6
      label: deployment steps
    - from: n6
      to: n7
      label: metrics stream
    - from: n7
      to: n8
      label: outcome record
    - from: n8
      to: n2
      label: model update (next run)
  approximationNotes: null
