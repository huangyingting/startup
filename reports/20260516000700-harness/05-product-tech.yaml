- id: TE002
  title: Workflow / use-case table
  columns:
  - User Job-to-be-Done
  - Current / Prior Workflow
  - Harness Solution
  - Measurable Benefit (claimed)
  - Known Limitation
  rows:
  - - Ship code faster with quality gates
    - Jenkins pipelines + manual test selection
    - Harness CI with AI Test Intelligence selects only relevant tests per code diff
    - Up to 90% reduction in test execution time; 8x faster builds claimed
    - Benefit requires training data; claimed speedup unverified by independent benchmarks
  - - Deploy safely across clouds
    - Manual runbooks or scripted deployments; no rollback automation
    - Harness CD with canary/blue-green and automated verification + rollback
    - Zero-downtime deployments; policy-enforced approvals reduce human error
    - Verification relies on customer-configured observability integrations; out-of-box monitors limited
  - - Optimize cloud spend without manual analysis
    - Manual cost reviews in AWS Cost Explorer / Azure Cost Management
    - Harness CCM AutoStopping + cross-cloud BI + FinOps recommendations
    - $1.9B+ cloud spend optimized across customers (cumulative, not per-customer)
    - AutoStopping requires tagging discipline; cloud API rate limits can delay recommendations
  - - Safely launch features progressively
    - Monolithic releases or basic environment toggles
    - Harness Feature Flags with pipeline integration and OPA governance
    - Decoupled deployment from release; rapid rollback on flag toggle
    - Experimentation analytics depth below dedicated tools (Optimizely, LaunchDarkly)
  - - Establish trusted software supply chain
    - No SBOM, no provenance; ad-hoc dependency audits
    - 'Harness SSCA: SLSA L3 provenance, SBOM generation, SCA, Cosign signing'
    - Cryptographic build provenance; policy-blocked vulnerable dependencies
    - SLSA L3 coverage requires Harness CI; mixed-CI environments may need additional tooling
  notes: Benefit claims are Harness marketing or documentation statements unless noted as independently verified. Limitations
    are assessed from documentation gaps and analyst reviews.
