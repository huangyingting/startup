    - Usage-based overage
    - Secondary; customers with BYO runners have zero overage exposure
    - 'Low: variable, easily reduced by customer runner migration'
    - Confirm overage revenue as % of ARR; customer self-hosting rate
  notes: Revenue figures for individual modules are not publicly disclosed. All module ARR contributions are estimates based
