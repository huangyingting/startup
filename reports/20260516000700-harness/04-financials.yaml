- id: TI003
  title: Unit economics table
  columns:
  - Metric
  - Value / Estimate
  - Confidence
  - Why It Matters
  - Diligence Ask
  rows:
  - - ARR (2025 estimated)
    - '>$250M (company-stated trajectory)'
    - 'Low: unaudited private company'
    - Primary revenue quality indicator; must be confirmed with signed contract backlog
    - Confirm total ARR from audited or investor-verified figures; net vs. gross ARR
  - - ARR Growth Rate (2024-2025)
    - ~50%+ YoY; 2024 ARR ~$156M per Latka
    - 'Low: Latka is unverified company-reported data'
    - Demonstrates hypergrowth phase; key valuation driver
    - Confirm with board materials or investor update; confirm whether organic or includes Traceable merger ARR
  - - Average Contract Value (ACV)
    - ~$250K implied ($250M ARR / 1,000+ customers)
    - 'Low: derived from two unverified inputs'
    - Enterprise-tier ACV; confirms true enterprise, not mid-market positioning
    - Confirm actual ACV distribution; % of ARR from top 10/25/50 customers
  - - Net Revenue Retention (NRR)
    - Not disclosed; estimated 110-130% (DevOps SaaS peer range)
    - 'Very Low: pure benchmark estimate'
    - Core measure of expansion revenue and churn; critical for valuation
    - Require NRR by cohort from investor disclosures or data room
  - - Gross Margin (estimated)
    - 75-82% (DevOps SaaS benchmark; GitLab reports ~84% non-GAAP)
    - 'Low: inferred from peer comps'
    - Determines FCF path; SaaS at this ARR should achieve 80%+ long-term
    - Require audited or investor-verified gross margin by revenue stream
  - - CAC Payback Period
    - Not disclosed; estimated 18-30 months (complex enterprise sales)
    - 'Very Low: benchmark range'
    - Critical for capital efficiency; with 50%+ growth, high CAC is expected
    - Require Sales Efficiency Ratio from data room; new logo CAC vs. expansion CAC
  - - ARR per FTE
    - ~$208K ($250M ARR / 1,200 FTE)
    - 'Low: both inputs are unverified'
    - Productivity benchmark; healthy for growth stage; top quartile is $250K+
    - Confirm headcount vs. ARR; verify Traceable headcount included
  - - LTV / CAC (estimated)
    - '>5x estimated (80% GM, $250K ACV, 5+ year avg. life)'
    - 'Very Low: inferred from benchmarks'
    - Venture-grade unit economics if confirmed; critical for IPO readiness
    - Require customer lifetime data and churn rate from data room
  notes: Harness is a private company and does not publish unit economics. All estimates are derived from company-stated ARR,
    customer count, employee count, and public DevOps SaaS peer group benchmarks (GitLab, HashiCorp, Datadog). The Latka ARR
    figure ($156M for 2024) is reported as company-submitted data and is not independently verified. Every cell marked "Low"
