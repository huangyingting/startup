  - - CD Module Subscription
    - Developer seat license
    - Seat-based; enterprise pricing
    - Largest ARR contributor; mission-critical delivery automation
    - 'High: high switching cost; multi-year enterprise contracts'
    - Confirm CD ARR as % of total; renewal rate and expansion rate
  - - Cloud Cost Management (CCM)
    - Percentage of cloud spend optimized OR seat-based
    - 1-3% of savings OR flat seat fee
    - CCM module customers save fraction of $1.9B+ cloud spend identified
    - 'High: ROI-linked, but varies with cloud spend levels'
    - Confirm pricing model (savings % or seat); CCM ARR as % of total
  - - Feature Flags Module
    - Developer seat license
    - Seat-based OR event-based
