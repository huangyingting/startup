    - 'Medium: competition from LaunchDarkly limits pricing power'
    - Confirm FF ARR; head-to-head attach rate with CD module
  - - SSCA / IDP / Chaos Modules
    - Developer seat license
    - Seat-based per module
    - Newer modules; growing adoption in compliance-heavy enterprises
    - 'Medium: newer, smaller ARR contribution; adoption risk'
    - Confirm SSCA/IDP/Chaos ARR contribution individually; growth trajectory
  - - Professional Services
    - Implementation, onboarding, migration
    - Project-based or T&M
