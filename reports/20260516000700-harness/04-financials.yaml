    - Require cohort-level NRR by module from investor data room or board-level reporting
  - - Confirmed Gross Margin
    - 'Material: FCF path depends on margin; 75% vs 82% matters significantly for valuation floor'
    - Require audited P&L or unaudited financials with management attestation from CFO
  - - Customer Concentration
    - 'Material: top 10-25 customer ARR % is key credit/investor risk; single customer >10% ARR is a risk flag'
