      label: Module Subscription
      detail: Annual SaaS subscription; upfront billing improves working capital; per-module ARR recognized ratably
    - id: n3
      label: CCM % of Savings
      detail: Cloud Cost Management priced at ~1-3% of cloud savings identified; $1.9B+ cloud savings identified for customers
    - id: n4
      label: Compute Overages
      detail: Cloud-hosted runner minutes beyond included allowance billed per-minute; zero for BYO-runner customers
    - id: n5
