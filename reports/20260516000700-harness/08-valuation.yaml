callouts:
- calloutType: recommendation
  title: 'Recommendation: Research-More / Watch at $5.5B'
  body: 'Harness is a compelling business at an ambitious price. The 22x forward ARR multiple at $5.5B is defensible only
    with NRR ≥115%, confirmed gross margin ≥75%, and a credible IPO path by 2028. Without these confirmations, the probability-weighted
    gross return of ~1.12x over 3 years is insufficient for growth-equity risk capital. Conditional buy threshold: all four
    data gate criteria must be confirmed in a management data room before committing capital at current valuation.'
  claimRefs:
  - CV001
  - CV004
  - CV023
  - CV024
  - CV025
- calloutType: risk
  title: 'Adverse: 22x EV/ARR Premium Is Primary Downside Risk'
  body: GitLab trades at 7–8x EV/Revenue in 2026 after reporting 26% growth and 87% gross margin—both confirmed via SEC 10-K.
    Harness at 22x implies investors are paying 2.75x the GitLab multiple on a company with unconfirmed NRR and no public
    financials. Multiple compression to GitLab-parity (7–8x) on $400M ARR would yield a $2.8–3.2B enterprise value, a 40–50%
    loss from entry.
  claimRefs:
  - CV010
  - CV014
  - CV019
  - CV041
  - CV042
