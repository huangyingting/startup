    - ATO denied OR delayed beyond 24 months from diligence date
    - Semi-annual federal pipeline review
    - Revise federal sector TAM assumption; partial write-down of bull scenario
  - - Cash runway shortfall
    - Evidence of burn rate > $15M/month (implied runway < 12 months on $200M)
    - Burn > $15M/month OR management raises emergency bridge
    - Quarterly per CEO public statements
    - Immediate full exit; next round likely highly dilutive
  - - GitHub/GitLab major account wins
    - Any verified loss of 3+ Fortune 500 accounts to GitHub Actions or GitLab in 12 months
    - Three or more documented account losses to primary competitors
    - Annual win/loss review with management
    - Competitive moat impairment; reduce bull probability to 10%
  - - No IPO path by 2027
    - No S-1 draft, SEC registration, or banker engagement by Q4 2027
    - No credible IPO signal by Dec 2027
    - Annual IPO readiness check
    - Illiquidity risk materially increases; seek secondary or exit
