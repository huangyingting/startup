- id: valuation-methodology-comparable-analysis
  title: Valuation Methodology and Comparable Analysis
  body: 'Harness is a late-stage private SaaS company without audited financial disclosures. The most appropriate primary
    valuation methodology is revenue-multiple (EV/ARR), calibrated against a set of public comps and M&A transactions from
    the DevOps/DevSecOps sector. The current entry price is $5.5B on >$250M ARR, implying a forward EV/ARR of approximately
    22x (using $250M as the denominator, which understates true ARR if the company achieves higher growth). This multiple
    compares to GitLab (GTLB) at approximately 7–8x FY2026 revenue of $955.2M, and Datadog (DDOG) at approximately 11x revenue.
    GitLab reported $955.2 million in total revenue for fiscal year 2026 (ended January 31, 2026), representing 26% year-over-year
    growth, with a Dollar-Based Net Retention Rate of 118% and gross profit margin of 87%. This provides a high-quality public-market
    benchmark for similarly positioned DevOps platforms. Datadog trades at a premium to GitLab due to its higher growth rate
    (>25% YoY) and superior NRR (>120%). HashiCorp was acquired by IBM for $6.4B in 2024, implying approximately 11x ARR at
    transaction, which validates the M&A exit range. Historical precedent from GitHub''s acquisition by Microsoft in 2018
    at approximately $7.5B (when GitHub had $200–250M ARR) set a 30x benchmark, though that deal reflected strategic platform
    control premium rather than pure financial underwriting. The Harness premium to GitLab (22x vs 7–8x) must be justified
    by a combination of: (a) higher expected growth trajectory—Harness grew at ~60% YoY in 2024→2025 vs GitLab at 26%; (b)
    broader platform with more expansion modules; (c) private-company scarcity premium; and (d) AI-native positioning. However,
    the 70%+ compression in public DevOps multiples since 2021 (from 40–60x to 7–11x) is a structural headwind for the exit
    multiple used in return modeling. Even assuming a modest re-rating to 15–20x at exit, the bull-case return from current
    entry of $5.5B is limited to 1.5–2x over a 3-year horizon, insufficient for venture-style risk-adjusted returns. For growth-equity
    or late-stage institutional investors, a 1.5–2x gross return over 3 years at ~20–25% IRR is within scope, provided NRR
    ≥115% is confirmed and the IPO window opens in 2027–2028.'
