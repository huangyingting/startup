- id: scenario-analysis-return-modeling
  title: Bull, Base, and Bear Scenario Analysis
  body: 'Three scenarios are modeled using a 2028 exit event (IPO or strategic acquisition) as the terminal valuation anchor,
    with 3-year return implied by the $5.5B entry price. All scenarios assume no additional dilutive financing; however, the
    preference-stack overhang from $775M+ raised across multiple rounds means common and late-preferred shareholders face
    waterfall distribution risk in liquidation events below $5.5B. BULL CASE: Harness maintains approximately 40% CAGR, reaching
    ~$500M ARR by 2028. Market conditions improve and AI-DevOps re-rating allows a 20x ARR exit multiple in an IPO context,
    yielding a $10B enterprise value. From a $5.5B entry, the gross return is approximately 1.8x (~22% IRR). This scenario
    is contingent on: AIDA achieving broad enterprise adoption as a paid upsell; FedRAMP authorization completing in 2026–2027;
    public DevOps multiples stabilizing at 15–20x; and NRR confirmed above 120%. The trigger for this scenario is evidence
    of NRR ≥120% and sustained ARR growth of 35–40%. BASE CASE: Harness grows at ~25% CAGR (market-rate deceleration from
    current ~60%), reaching ~$400M ARR by 2028. Exit at 15x ARR yields a $6B enterprise value—approximately 1.1x gross return
    (~3% IRR), barely above water after 3 years, insufficient for most growth equity mandates. This scenario reflects the
    most likely outcome given macro headwinds and competitive pressure, and is essentially a flat-to-slight loss in real terms
    after fees and cost of capital. BEAR CASE: Growth decelerates to ~10% CAGR due to macro contraction, GitHub Actions/GitLab
    gaining share, or internal execution issues. ARR reaches ~$320M by 2028. Public market comps trade at 8x (further compression),
    yielding a $2.6B exit enterprise value—a 0.47x loss. This scenario produces a material capital loss and is triggered by
    NRR falling below 100%, a significant customer churn event, or a public market re-rating below 8x ARR for comparable companies.
    The asymmetry of the return profile (bull 1.8x, base 1.1x, bear 0.47x) is unfavorable: downside exceeds upside at current
    pricing. This asymmetry argues for price discipline—either waiting for a lower entry price, or gaining strong NRR and
    cohort-retention conviction before committing capital at the $5.5B valuation. For investors already in at earlier rounds,
    the Series E price represents significant dilution of earlier returns, and the IPO window uncertainty adds illiquidity
    risk to the bear scenario.'
