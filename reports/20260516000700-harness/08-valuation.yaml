- id: TV005
  title: Thesis-Break and Kill Triggers
  columns:
  - Risk
  - Measurable Signal
  - Kill Threshold
  - Monitoring Frequency
  - Action
  rows:
  - - NRR below cohort expectation
    - Disclosed or inferred NRR < 100%
    - NRR < 100% (land-and-expand model failing)
    - At each management update / quarterly
    - Immediate exit or price renegotiation
  - - Public DevOps multiple compression
    - GitLab EV/Revenue falls below 5x sustained for 2 quarters
    - GitLab EV/Rev < 5x for 2 consecutive quarters
    - Monthly market data review
    - Reduce position; reassess Harness exit multiple
  - - Significant customer churn event
    - Loss of top-10 customer or any >$5M ARR account
    - Any single customer churn >$5M ARR without replacement
    - Quarterly customer reference checks
    - Full thesis review; likely exit
  - - FedRAMP ATO denied/delayed >24 months
