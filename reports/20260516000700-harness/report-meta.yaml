companyProfile:
  summary: Harness is a San Francisco-based AI-native DevOps platform founded in 2016 by Jyoti Bansal (AppDynamics founder)
    and Rishi Singh. It offers a seven-module SaaS suite covering CI, CD, cloud cost management, feature flags, software supply-chain
    assurance, an internal developer portal, and chaos engineering, all unified by the AIDA AI engine. As of December 2025
    it reported >50M ARR, 1,000+ enterprise customers, and closed a $240M Series E at a $5.5B valuation led by Goldman Sachs.
  foundedDate: '2016-01-01'
  founders:
  - name: Jyoti Bansal
    role: CEO and Co-founder
    background: Previously founded AppDynamics (acquired by Cisco for $3.7B in 2017); serial enterprise-software entrepreneur.
    claimRefs:
    - CO001
  - name: Rishi Singh
    role: CTO and Co-founder
    background: Co-founded Harness with Bansal; leads product architecture and engineering.
    claimRefs:
    - CO002
  foundingLocation: San Francisco, California, USA
  headquarters: San Francisco, California
  productSummary: Harness sells a unified DevOps platform with modules for CI (Test Intelligence, build caching), CD (multi-cloud
    deployments, GitOps, policy-as-code), CCM (FinOps, AutoStopping), Feature Flags (progressive delivery), SSCA (SLSA-L3
    provenance, SBOM), IDP (Backstage-powered developer portal), and Chaos Engineering (LitmusChaos-based). The AIDA AI engine
    underpins all modules with auto-generated pipeline YAML, anomaly detection, and root-cause analysis.
  customerFocus: Enterprise software and platform engineering teams at 1,000+ companies across BFSI, technology, retail, aviation,
    and healthcare verticals.
  businessModel: Annual SaaS subscriptions per module per developer seat; land with CI or CD and expand to additional modules;
    enterprise-tier contracts with governance and compliance add-ons.
  stage: late-stage private
