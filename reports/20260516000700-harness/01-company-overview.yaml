- id: section-4
  title: Scale metrics, milestones, and adverse considerations
  body: 'Harness''s traction metrics are substantial for a late-stage private company. By late 2025 the company served more
    than 1,000 enterprise customers including United Airlines, Morningstar, Keller Williams, National Australia Bank, Citi
    Bank, Ancestry, Ulta Beauty, and T-Mobile. Company-claimed platform metrics include 128 million deployments processed,
    81 million builds completed, 1.2 trillion API calls protected, and $1.9 billion in cloud spending optimized in the twelve
    months preceding December 2025. Harness is G2 Leader-recognized in eleven software categories and holds FedRAMP Moderate
    authorization, the latter being particularly relevant for US government and regulated industry customers. Customers report
    an 80-to-1 reduction in developer effort at Ancestry and months saved in time-to-market at Ulta Beauty. The platform shipped
    70-plus new features in April 2025 alone, reflecting a high-velocity product cadence. Adverse diligence signals that deserve
    explicit documentation include third-party reviewer criticism of a steep learning curve, complex pipeline-as-code experience,
    insufficient nested pipeline support, high licensing costs relative to open-source alternatives, and occasional debugging
    and log accuracy gaps noted on review platforms including PeerSpot and Capterra. These criticisms are most acute for smaller
    teams and those migrating from open-source toolchains. The company remains private with no publicly available audited
    financials, and the $250 million ARR figure is a company-stated trajectory rather than a reported close. These gaps are
    material for any downstream valuation or credit work.

    '
