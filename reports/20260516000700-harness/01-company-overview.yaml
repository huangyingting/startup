company:
  name: Harness
chapter:
  number: 1
  title: Company Overview
  summary: Harness is a San Francisco-based AI-powered software delivery platform company founded in 2017 by serial entrepreneur
    Jyoti Bansal and Rishi Singh. The company raised a $240M Series E at a $5.5B valuation in December 2025, bringing total
    equity raised to over $570M. Harness serves 1,000+ enterprise customers, employs 1,200+ people globally, and was on track
    to exceed $250M ARR in 2025. The platform automates the full software delivery lifecycle including CI, CD, cloud cost
    management, feature flags, security testing, and AI-driven operations across a modular product suite.
sections:
- id: section-1
  title: Identity, mission, and operating model
  body: 'Harness is a private, venture-backed technology company headquartered in San Francisco, California, incorporated
    under the legal name Harness Inc. The company was co-founded in 2017 by Jyoti Bansal and Rishi Singh with the mission
    to enable every software developer in the world to deliver code quickly, securely, reliably, and efficiently. Harness
    operates as a commercial software platform company selling annual subscriptions to enterprise engineering and DevOps teams
    under a product-led and sales-led hybrid model. The platform is organized into a growing suite of modules spanning continuous
    integration, continuous delivery, cloud cost management, feature flags, security testing orchestration, supply chain security,
    internal developer portal, service reliability management, AI-assisted site reliability engineering, AI test automation,
    web application and API protection, and database DevOps. Harness acquired the open-source CI platform Drone.io in 2020
    and merged Traceable, a companion API security and observability company, into Harness in 2025. The two acquisitions reflect
    a deliberate strategy of extending the platform''s scope from deployment automation into security, observability, and
    cost governance. Harness''s product homepage positions the company around the concept that the bottleneck in AI-assisted
    software development is not code generation but the downstream phases including testing, security, deployment reliability,
    and incident response, a thesis that shapes the company''s product roadmap and go-to-market messaging entering 2026. The
    company operates under a SaaS model with free, Team, and Enterprise pricing tiers.

    '
  claimRefs:
  - CO001
  - CO002
  - CO003
  - CO004
  - CO021
  - CO022
  - CO023
  - CO027
  - CO039
- id: section-2
  title: Founders, leadership, and key-person dependence
  body: 'Jyoti Bansal, CEO and co-founder, is the most strategically significant individual in the company''s identity. Bansal
    previously founded AppDynamics, an application performance management company, and sold it to Cisco for $3.7 billion in
    2017 — the same year he co-founded Harness with Rishi Singh. His repeat-founder credibility, deep enterprise software
    distribution experience, and existing relationships with major enterprise buyers are central to Harness''s fundraising
    narrative, customer trust, and strategic positioning. Rishi Singh co-founded the company and has served in engineering
    leadership capacity. Bansal holds a strong public profile and has been the primary public face of Harness across fundraising
    announcements, analyst briefings, and media coverage. This concentration of external trust in a single founder-CEO is
    a material key-person dependency that later chapters on risk and valuation should treat as an explicit underwriting variable.
    The company has grown from 250 employees at the start of 2021 to approximately 1,200+ globally by late 2025, with 14 offices
    worldwide including a major development center in Bengaluru, India. Approximately 33 percent of the workforce is India-based
    across Bengaluru and Gurugram. Bansal has publicly acknowledged plans for a future IPO but has not provided a specific
    timeline, describing the business as healthy, high-growth, and eventually suitable for public markets.

    '
  claimRefs:
  - CO001
  - CO003
  - CO016
  - CO017
  - CO028
  - CO035
  - CO040
  tableRefs:
  - TO002
- id: section-3
  title: Capital structure, investors, and funding history
  body: 'Harness has executed one of the more substantial private-market fundraising sequences in the DevOps software category.
    The company raised a Series A of approximately $20 million in October 2017, led by Menlo Ventures and BIG Labs. A $60
    million Series B followed in April 2019, led by IVP, Google Ventures, and ServiceNow. In January 2021 Harness raised a
    $115 million Series C at a $1.7 billion valuation, led by Alkeon Capital with co-investors including Norwest Venture Partners,
    Battery Ventures, Citi Ventures, Sorenson Capital, and Thomvest Ventures. The April 2022 Series D closed at $230 million
    ($175 million equity and $55 million debt) at a $3.7 billion valuation, led by Norwest Venture Partners and joined by
    J.P. Morgan, Capital One Ventures, Splunk Ventures, Adage Capital, Balyasny Asset Management, and Gaingels. In October
    2023 Harness raised approximately $150 million in conventional debt financing led by Hercules Capital. The December 2025
    Series E raised $240 million ($200 million primary investment plus a $40 million planned tender offer providing employee
    liquidity) at a $5.5 billion post-money valuation, led by Goldman Sachs with participation from IVP, Menlo Ventures, and
    Unusual Ventures. Total equity raised stands at over $570 million. Harness plans to use the Series E proceeds to hire
    hundreds of engineers in Bengaluru, expand AI capabilities, and strengthen US and international go-to-market operations.

    '
