callouts:
- calloutType: strength
  title: Repeat-founder credibility drives enterprise trust
  body: Jyoti Bansal's prior sale of AppDynamics to Cisco for $3.7 billion gives Harness an unusual degree of enterprise buyer
    and investor credibility for a 2017-founded company, compressing the trust-building cycle with Fortune 500 DevOps buyers.
  claimRefs:
  - CO003
  - CO001
- calloutType: insight
  title: Knowledge graph differentiates Harness AI strategy
  body: Harness built a software delivery knowledge graph that maps code changes, deployments, tests, incidents, and policies
    for each customer. This context layer underpins AI agents for testing, security, and operations, making the platform more
    deeply embedded than a surface-level CI/CD tool.
  claimRefs:
  - CO031
  - CO004
- calloutType: risk
  title: Platform complexity and pricing are a documented friction point
  body: Third-party review platforms consistently flag Harness's steep learning curve, high cost relative to open-source alternatives,
    and gaps in pipeline-as-code and nested pipeline support. These signals are most acute for SMBs and organizations migrating
    from Jenkins or GitLab, and could constrain mid-market expansion.
  claimRefs:
  - CO030
  - CO037
