- id: competitor-profiles-capabilities
  title: Competitor Profiles and Capability Comparison
  body: 'GitHub Actions is Harness''s most dangerous distribution competitor, embedded natively in GitHub''s source control
    platform used by over 100 million developers. Pricing starts at $4/user/month (Team tier) with compute minutes charged
    at $0.006/min for Linux. The platform offers a 20,000+ action marketplace and previews agentic workflows with AI-powered
    pipeline definitions. GitHub Actions'' primary weakness relative to Harness is its lack of integrated cloud cost management,
    feature flags, and enterprise CD governance capabilities.


    GitLab CI/CD, part of the GitLab DevSecOps platform, reached $1B ARR in FY2026 with $955M total revenue (26% YoY growth),
    1,456 enterprise customers generating $100K+ ARR, and a dollar-based net retention rate of 118%. GitLab offers free self-hosted
    CI (Community Edition) and $29/user/month (SaaS Premium with 10,000 compute minutes). GitLab''s Ultimate tier (emphasizing
    compliance and governance) now represents 56% of total ARR, reflecting enterprise willingness to pay for security-embedded
    DevOps. The GitLab Duo Agent Platform represents a direct AI-native competitive response to Harness AIDA.


    CircleCI prices at $15/user/month (Performance plan) with credit-based compute consumption. Jenkins remains popular (37%
    CI market share) but carries high maintenance overhead—60%+ of enterprises using Jenkins cite plugin management complexity
    as a major pain point. CloudBees provides enterprise Jenkins support at custom enterprise pricing.


    LaunchDarkly, the primary feature management competitor, offers custom enterprise pricing with seat-based and usage-based
    tiers. PeerSpot data indicates Harness holds a 21.3% mindshare in feature management versus LaunchDarkly''s 18.7% in 2026
    comparisons.'
