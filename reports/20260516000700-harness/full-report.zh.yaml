  - id: FR002
    title: 风险传导图 — Harness 风险如何级联到结果
    type: dag
    layout: wide
    summary: 有向图展示主要风险节点（安全、监管、竞争、执行）如何通过中间效应传导到最终投资结果。
    data:
      nodes:
        - id: r1
          label: Delegate Agent 被攻破
          detail: 客户侧 agent 持有部署凭证；按 CISA/NIST 指引，是供应链攻击向量。
        - id: r2
          label: GCP 基础设施故障
          detail: 单云集中；未确认有多云故障转移。
        - id: r3
          label: FedRAMP 授权缺口
          detail: May 2026 未在市场目录中查到；阻断美国联邦和 DISA 合同。
        - id: r4
          label: EU AI Act 不合规
          detail: AIDA 可能属于高风险 AI 系统；未准备合格评定。
        - id: r5
          label: GitHub Actions / GitLab 商品化
          detail: 免费或捆绑竞品压缩 Harness 在 SMB 和捆绑平台型企业中的 TAM。
        - id: r6
          label: Jyoti Bansal 离任
          detail: 创始人 CEO 是主要门面；未公开继任计划。
        - id: r7
          label: 客户信任侵蚀
          detail: 中间效应：安全事件或合规失败削弱企业信心。
        - id: r8
          label: ARR 增长放缓
          detail: 中间效应：竞争或市场逆风压缩净新增 ARR。
        - id: r9
          label: 估值压缩 / 降价融资
          detail: 终局结果：ARR YoY 增长 < 30% 或关键账户流失触发估值下调。
        - id: r10
          label: 监管处罚 / 诉讼
          detail: 终局结果：GDPR 罚款、FedRAMP 失格或 AI Act 执法。
        - id: r11
          label: 执行力下滑
          detail: 中间效应：关键人流失或印度 R&D 中断拖慢产品速度。
        - id: r12
          label: 退出选择受限
          detail: 终局结果：如果增长逻辑破裂，被迫战略出售或推迟 IPO。
      edges:
        - from: r1
          to: r7
          label: 泄露暴露客户
        - from: r2
          to: r7
          label: 故障损害 SLA 可信度
        - from: r3
          to: r8
          label: 阻断联邦 TAM 扩张
        - from: r4
          to: r10
          label: 2027 起触发执法
        - from: r5
          to: r8
          label: 压缩新客户管线
        - from: r6
          to: r11
          label: 打乱产品和 GTM 速度
        - from: r7
          to: r8
          label: 侵蚀 NRR 和续约
        - from: r8
          to: r9
          label: 增长不达预期触发估值下调
        - from: r8
          to: r12
          label: 削弱 IPO 可选性
        - from: r10
          to: r9
          label: 罚款或禁令加重估值打击
        - from: r11
          to: r8
          label: 产品延误降低胜率
        - from: r9
          to: r12
          label: 降价融资限制退出
    approximationNotes: 边权重为定性判断；未估算传导概率。
    claimRefs:
      - CR009
      - CR014
      - CR016
