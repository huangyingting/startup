      - number: '1.3'
        title: 资本结构、投资方与融资历史
        blocks:
          - type: paragraph
            body: >
              Harness 完成了 DevOps 软件类别中规模较大的一组私募融资。公司在 2017 年 10 月完成约 $20M Series A，由 Menlo Ventures 和 BIG Labs 领投。2019 年
              4 月，公司完成 $60M Series B，由 IVP、Google Ventures 和 ServiceNow 领投。2021 年 1 月，Harness 以 $1.7B 估值完成 $115M Series
              C，由 Alkeon Capital 领投，Norwest Venture Partners、Battery Ventures、Citi Ventures、Sorenson Capital 和 Thomvest
              Ventures 等共同投资。2022 年 4 月 Series D 完成 $230M（$175M 股权和 $55M 债务），估值 $3.7B，由 Norwest Venture Partners 领投，J.P.
              Morgan、Capital One Ventures、Splunk Ventures、Adage Capital、Balyasny Asset Management 和 Gaingels 参投。2023 年
              10 月，Harness 完成约 $150M 常规债务融资，由 Hercules Capital 领投。2025 年 12 月 Series E 融资 $240M（$200M 新股投资，外加计划中的 $40M
              要约收购以提供员工流动性），投后估值 $5.5B，由 Goldman Sachs 领投，IVP、Menlo Ventures 和 Unusual Ventures 参投。累计股权融资超过
              $570M。Harness 计划将 Series E 资金用于在 Bengaluru 招聘数百名工程师、扩展 AI 能力，并强化美国及国际市场的 GTM 运营。
