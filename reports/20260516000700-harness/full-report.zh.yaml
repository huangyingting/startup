      - number: '4.2'
        title: 单位经济模型与销售效率
        blocks:
          - type: paragraph
            body: >-
              作为私营公司，Harness 不公开披露客户级单位经济模型，包括净留存率（NRR）、总留存率（GRR）、获客成本（CAC）、CAC 回本周期或平均合同价值（ACV）。现有代理指标和行业基准只能提供部分三角验证。


              用 >$250M ARR 除以 1,000+ 企业客户，可推导出约 $250,000 的单客户 ARR 代理值，说明 ACV 规模可观，符合中端市场到企业级交易。增长率相近（同比 50%+）的企业 SaaS
              公司通常拥有 115-130% NRR，并由既有账户内的模块扩张支撑。如果客户以较高附加率采用更多模块，多模块先切入、再扩张模式在结构上支持 100% 以上 NRR。


              复杂、多利益相关方的企业销售周期抬高了 CAC（新客户通常 6-18 个月，扩张周期更短）。直接企业销售动作（AE + 解决方案工程 + SDR）由渠道合作伙伴，以及 AWS、Azure、GCP
              上的云市场上架补充，后者可降低云原生客户的 CAC。毛利率估计为 75-80%，与可比云交付 DevOps 平台一致（GitLab 报告非 GAAP 毛利率约 84%）。公司有 1,200+ 员工和 >$250M
              ARR，约为 $208K ARR/FTE；对这一增长阶段的企业 SaaS 来说，这是健康的生产率指标。专业服务毛利率可能低于 0% 至
              -20%，因为实施较重的企业入门是成本中心，目标是推动多模块采用，而不是贡献利润率。
