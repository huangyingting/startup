  - number: 5
    title: 产品与技术
    sections:
      - number: '5.1'
        title: 核心平台模块与客户工作流
        blocks:
          - type: paragraph
            body: >-
              Harness 把产品组织成七项独立授权的模块化能力，客户可以逐步采用，也可以作为统一平台采用。持续集成（CI）模块提供云托管和自托管构建执行，AI Test Intelligence
              只选择与特定代码变更相关的测试——Harness 称该功能最多可将测试时间减少 90%——同时提供 Build Cache Intelligence 复用依赖，并用 Flaky Test Detection
              降低噪声。20,000+ 个预构建 YAML pipeline 模板加速入门。持续交付（CD）模块为 Kubernetes、AWS ECS、Lambda、Azure Container Apps 和裸金属 VM
              编排多云部署，支持金丝雀、蓝绿、滚动和 A/B 部署策略，并配有自动验证关卡。通过 Flux 集成的 GitOps 支持声明式部署工作流。云成本管理（CCM）在 AWS、Azure 和 GCP 上提供
              FinOps 可见性，AutoStopping 自动停止闲置云资源；Harness 报告称已在客户基础中优化 $1.9B+ 云支出。Feature
              Flags（FF）为广泛语言矩阵（Java、Python、Node.js、Go、React、Android、iOS）支持服务端和客户端 SDK，并与 CD pipeline
              集成以实现渐进式发布。软件供应链保障（SSCA）模块实现 SLSA Level 3 构建来源证明，生成 SBOM，执行软件组合分析，并通过 OPA 落地
              policy-as-code。内部开发者门户（IDP）基于开源 Backstage 框架，提供软件目录、自助模板和开发者记分卡。最后，基于 CNCF LitmusChaos 项目的 Chaos
              Engineering 通过 GameDays 和面向 Kubernetes、VM、托管云服务的混沌实验，支持主动韧性测试。社区开源版本（Harness Open Source 和 gitness 项目）免费提供
              CI 和 GitOps；商业平台则通过企业 RBAC、治理、审计和 AI 能力形成差异化。
