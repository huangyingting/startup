      - number: '5.3'
        title: AI 差异化、信任、合规与路线图
        blocks:
          - type: paragraph
            body: >-
              Harness AIDA（AI Development Assistant）是平台的主要竞争差异化，将生成式 AI 与自研软件交付知识图谱结合，后者基于 128M+ 条部署记录和 81M 条构建记录构建。AIDA
              能力覆盖四个领域：（1）AI Test Intelligence——识别并只执行与特定代码 diff 相关的测试，声称可将构建加速 8x；（2）AI pipeline 生成——把自然语言描述转换为 Harness
              pipeline YAML；（3）针对部署失败和构建错误的 AI 异常检测与根因分析；（4）在 CCM 模块中主动推荐云成本优化。Harness 已确认的 SOC 2 Type II 证明（覆盖 Harness
              SaaS 平台，包括 FME/Split 集成）以及 ISO 27001/27017/27018 认证（覆盖 Harness、Split/FME 和 Traceable），构成其信任和合规姿态的基础；这些均发布在
              Harness Trust Center。SSCA 模块使用 Sigstore 的 Cosign 和 Rekor 透明日志实现 SLSA Level 3 构建来源证明，用于加密构建产物签名，提供可识别篡改的构建
              pipeline。隐私政策写明 GDPR 和 CCPA 合规，但截至 2026 年 5 月，官方 FedRAMP Marketplace 未发现 FedRAMP In Process 或 Authorized
              状态——这对美国联邦和受监管行业买方是实质缺口。近期路线图（2025-2026）聚焦用于 pipeline 编排的智能体 AI、更深的 知识图谱集成以映射跨服务依赖，以及通过 2025 年 2 月收购的
              Traceable 平台提供 API 安全。IDP 模块继续演进，加入 AI 驱动的开发者体验建议。路线图细节主要通过博客文章和会议演讲释放；未找到正式、带版本的公开路线图文件，因此交付时间和优先级存在不确定性。
