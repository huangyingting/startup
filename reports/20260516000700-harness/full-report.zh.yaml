      - number: '6.5'
        title: 扩张动态与集中度风险
        blocks:
          - type: paragraph
            body: >-
              Harness 的先切入、再扩张变现模式横跨七个平台模块——CI、CD、CCM、Feature Flags、SSCA、Internal Developer Portal 和 Chaos
              Engineering——客户可以从单一模块开始，并随着 DevOps 成熟度提高采用更多能力。这种架构创造了自然扩张路径：从 CI 开始的客户可以推进到 CD，再用 CCM 优化成本，然后用 SSCA
              做供应链安全，随着时间推高每个账户的 ARR。CCM 模块尤其能强化留存，因为大规模优化云支出的客户（2025 年 Harness 管理了客户基础中 $1.9B
              云支出）会积累制度知识和运营依赖，拆除成本很高。但集中度风险也很实质：相对于声称的 1,000+ 客户基础，公开引用的具名企业客户不足 10 家，限制了对客户健康、垂直多样性和收入集中度的尽调可见度。DORA
              2024 研究广泛验证了平台工程逻辑——使用内部开发者平台的组织显示出生产力、团队绩效和组织结果改善——但 DORA
              也指出，如果没有适当护栏，平台工程可能降低变更稳定性。定价复杂度和设置负担给中端市场买方造成有意义的摩擦，来自 GitHub Actions 和 GitLab CI 的竞争也持续侵蚀 Harness
              可触达市场的低端，可能在较小或投入程度较低的企业账户中造成流失风险。NRR 未披露，是评估扩张耐久性的单一最重要缺口。
