      - number: '1.4'
        title: 规模指标、里程碑与反向因素
        blocks:
          - type: paragraph
            body: >
              对一家后期私营公司来说，Harness 的牵引力指标相当可观。截至 2025 年末，公司服务 1,000+ 企业客户，包括 United Airlines、Morningstar、Keller
              Williams、National Australia Bank、Citi Bank、Ancestry、Ulta Beauty 和 T-Mobile。公司披露的平台指标包括处理 128M 次部署、完成 81M
              次构建、保护 1.2T 次 API 调用，并在 2025 年 12 月前的十二个月里优化 $1.9B 云支出。Harness 在 11 个软件类别中被 G2 认定为 Leader，并持有 FedRAMP
              Moderate 授权；后者对美国政府和受监管行业客户尤其相关。客户反馈包括 Ancestry 的开发者工作量降至 1/80，以及 Ulta Beauty 在产品上市时间上节省数月。平台仅在 2025 年 4
              月就发布 70+ 个新功能，体现出高速度的产品节奏。需要明确记录的反向尽调信号包括：第三方评论批评学习曲线陡峭、pipeline-as-code 体验复杂、嵌套 pipeline
              支持不足、相对开源替代方案的授权成本较高，以及 PeerSpot、Capterra
              等评论平台提到的偶发调试和日志准确性缺口。这些批评在小团队、以及从开源工具链迁移的组织中最尖锐。公司仍为私营，没有公开可用的审计财务数据；$250M ARR
              数字是公司披露的轨迹，不是已报告的期末值。这些缺口对后续任何估值或信用工作都很重要。
