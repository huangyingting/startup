  - number: 3
    title: 竞争格局
    sections:
      - number: '3.1'
        title: 竞争格局概览
        blocks:
          - type: paragraph
            body: >-
              Harness 所在的 DevOps 平台市场竞争激烈，并横跨几个不同竞争类别。直接 CI/CD 竞争对手包括 GitHub Actions（Microsoft 在 GitHub 内嵌的 CI/CD，约 11%
              市场份额）、GitLab CI/CD（集成 DevSecOps 平台的一部分，FY2026 ARR 为 $1B）和 CircleCI（面向 Docker 优化的专门厂商）。传统在位者 Jenkins（约 37%
              CI/CD 市场份额）和 CloudBees Jenkins（约 28%）凭借企业环境中的庞大安装基础占据主导，尤其在需要自托管和最大化定制的受监管行业。


              Microsoft 的 Azure DevOps 通过与 Microsoft 365 和 Azure 生态打包，构成次级竞争威胁。在相邻市场，LaunchDarkly
              是主要功能管理竞争对手，CloudHealth（VMware/Broadcom）在云成本管理中竞争。Octopus Deploy 则竞争 CD 发布自动化细分市场。


              竞争格局分为两类：GitHub Actions、GitLab、Azure DevOps 这类内嵌平台打法，借助 SCM/云分发优势；以及 Harness、CloudBees、CircleCI 这类独立
              DevOps 平台，靠功能深度、企业支持和多云中立性竞争。Harness 是唯一一个在统一模块生态中集成 CI、CD、云成本管理、功能开关、软件供应链安全、内部开发者门户和混沌工程的独立平台。
