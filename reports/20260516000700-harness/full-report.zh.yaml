      - number: '7.2'
        title: 运营、安全和技术风险
        blocks:
          - type: paragraph
            body: >-
              Harness 最有辨识度的运营风险来自 Delegate agent 架构。Delegate 是安装在客户环境中的代理，通过出站 HTTPS 轮询 Harness 的 SaaS
              控制平面，在客户网络内执行部署任务，并持有基础设施目标凭据（Kubernetes 集群、云服务商、镜像仓库）。如果某个 Delegate
              实例被攻破——无论是供应链攻击、恶意镜像替换还是凭据泄露——攻击者就获得客户生产环境的部署级访问权。CISA 和 NIST 在联合供应链指引中将 CI/CD
              工具链的软件供应链风险列为主要威胁向量；Delegate 模式把风险集中在客户侧基础设施，而不是 Harness 自身边界。缓释高度依赖客户的 Kubernetes RBAC 卫生、镜像签名验证（通过 SSCA
              启用）以及最小权限 Delegate 授权——这些都需要客户主动配置。


              多租户带来第二类运营风险。作为服务 1,000+ 企业客户的 SaaS 平台，且运行在共享基础设施上，Harness 控制平面一旦失陷，理论上可能同时暴露多家客户的 pipeline
              secrets、环境变量和部署历史。Harness 的 SOC 2 Type II 审计和 ISO 27001 认证提供了有意义的控制证据，但证明报告未公开，无法独立审阅。GCP
              集中度是第三个风险：Harness 的 SaaS 控制平面主要运行在 Google Cloud Platform 上，因此 GCP 区域性故障会直接影响 SaaS 客户。公开资料未确认多云故障切换能力。


              数据驻留风险影响受监管企业：位于欧盟的 BFSI 或医疗客户可能要求所有数据留在欧盟边界内，但欧盟数据中心放置不是 Harness
              默认配置。客户必须主动要求欧盟租户，全球分布的工程团队因此可能出现合规缺口。最后，AIDA 的 AI 幻觉风险真实但有边界：AI 生成的 pipeline YAML
              若含安全缺陷或配置错误，可能在人工审查前把漏洞带入客户 CI/CD 流。Harness 通过 OPA policy gates 缓释这一点，但关闭 policy checks 的客户仍会暴露在风险中。
