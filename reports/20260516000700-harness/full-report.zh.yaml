  - number: 4
    title: 财务情况
    sections:
      - number: '4.1'
        title: 收入模式与变现来源
        blocks:
          - type: paragraph
            body: >-
              Harness 采用订阅 SaaS 收入模式，核心是在七个平台模块上按开发者席位授权：持续集成（CI）、持续交付（CD）、云成本管理（CCM）、Feature
              Flags（FF）、软件供应链保障（SSCA）、内部开发者门户（IDP）和混沌工程。每个模块单独定价，支持先切入、再扩张的变现模式：客户先从 CI 或 CD
              开始，再随着时间采用更多模块。定价主要按开发者席位计算，CI 约为 $25/developer/month；CCM 等模块则采用模块特定定价，例如按优化云支出比例（通常 1-3%）、席位或用量指标计费。


              第二层收入来自客户超过所含云托管 runner 分钟后的计算分钟超额费用。使用自托管（BYO）runner 的企业客户可避免计算超额费用，因此需要在云 runner
              便利性和成本可预测性之间取舍。专业服务收入（入门、实施、从 Jenkins/CircleCI 迁移）占总 ARR 的比例相对较小，估计低于 10%；这与 SaaS
              优先模式一致，该模式强调产品驱动入门和社区辅助扩张。


              Harness 报告称 2025 年有望超过 $250M ARR，较 2024 年约 $156.2M ARR 同比增长 50%+。收入确认遵循标准订阅 SaaS
              处理：授权费在订阅期内（月度或年度账单）按比例确认；年度合同通常预付，形成正向营运资本动态。CCM 模块帮助客户优化的 $1.9B+ 云支出，是与 ARR 粘性相关的平台参与度指标，但本身不是收入。
