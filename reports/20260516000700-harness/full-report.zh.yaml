        title: 附录
        blocks:
          - type: callout
            title: 建议：以 $5.5B 估值继续研究 / 观察
            body: >-
              Harness 是一家有吸引力的公司，但价格也很进取。$5.5B 估值对应 22x forward ARR；只有在 NRR ≥115%、毛利率确认 ≥75%、且 2028 年前 IPO
              路径可信时，这一倍数才守得住。没有这些确认，3 年概率加权毛回报约 ~1.12x，不足以吸引 growth-equity 风险资本。有条件买入门槛：按当前估值投入前，四个数据门槛必须全部在管理层 data
              room 中确认。
            calloutType: recommendation
            claimRefs:
              - CV001
              - CV004
              - CV023
              - CV024
              - CV025
          - type: callout
            title: 反向：22x EV/ARR 溢价是主要下行风险
            body: >-
              GitLab 在 2026 年报告 26% 增长和 87% 毛利率后，交易约为 7–8x EV/Revenue，且两项都由 SEC 10-K 确认。Harness 22x 意味着投资者在一家 NRR
              未确认、没有公开财务数据的公司上，支付了 GitLab 倍数的 2.75x。若 $400M ARR 上倍数压缩至 GitLab 同等水平（7–8x），企业价值将为 $2.8–3.2B，较入场亏损 40–50%。
            calloutType: risk
            claimRefs:
              - CV010
              - CV014
              - CV019
              - CV041
              - CV042
