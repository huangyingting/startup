  - id: FE001
    title: 产品架构图
    type: stack
    layout: wide
    summary: Harness 平台架构按四层展示：GCP 上的 SaaS 控制平面、平台服务（AIDA、策略）、交付模块，以及连接客户基础设施的 Delegate agent。
    data:
      layers:
        - id: l1
          label: Harness SaaS 控制平面（Google Cloud Platform）
          detail: 多租户、Kubernetes 原生编排层；承载流水线引擎、状态管理、REST/GraphQL API 和 AIDA AI 知识图谱。可水平扩展。所有 UI 和 API 流量的主要入口。
        - id: l2
          label: 平台服务（AIDA · 策略 · 治理 · 审计）
          detail: >-
            AI Development Assistant（AIDA）覆盖 Test Intelligence、异常检测、流水线自动生成和成本建议。基于 OPA 执行
            Policy-as-Code。提供基于角色的访问控制、审计轨迹和密钥管理连接器。
        - id: l3
          label: 交付模块（CI · CD · CCM · FF · SSCA · IDP · Chaos）
          detail: 七个可独立授权的能力模块：持续集成、持续交付、云成本管理、功能开关、软件供应链保障（SLSA L3）、内部开发者门户（Backstage）和混沌工程（LitmusChaos）。每个模块都是增量组件，可逐步采用。
        - id: l4
          label: Delegate Agent（客户环境）
          detail: >-
            轻量 JVM agent，部署在客户 Kubernetes 集群或 VM 中。只以出站长轮询连接 SaaS 控制平面——无需入站防火墙规则。在本地执行流水线步骤，把密钥留在客户网络内。支持每个账户部署多个
            Delegate，提供 HA。
        - id: l5
          label: 目标基础设施（客户拥有）
          detail: >-
            Kubernetes 集群（EKS、GKE、AKS、本地部署）、AWS ECS/Lambda、Azure Container
            Apps、VM、裸金属。云提供商：AWS、Azure、GCP。IaC：Terraform、Pulumi、Ansible。密钥：HashiCorp Vault、AWS Secrets Manager、Azure Key
            Vault。
    approximationNotes: 层边界是逻辑边界，不是物理边界；实际 GCP 拓扑（regions、zones、多区域复制）未公开。
    claimRefs:
      - CE015
      - CE016
      - CE017
      - CE019
      - CE040
  - id: FE002
    title: 客户工作流 / 运营流程
    type: flow
    layout: wide
    summary: 端到端开发者工作流，展示一次代码提交如何经过 Harness CI（测试选择、构建、制品）、Harness CD（部署策略、验证），再回流到监控和下一轮迭代。
    data:
      nodes:
        - id: n1
          label: 代码提交 / PR
          detail: 开发者推送到 GitHub/GitLab/Bitbucket/Azure DevOps。Webhook 自动触发 Harness CI 流水线。
        - id: n2
          label: AI Test Intelligence
          detail: AIDA 只选择与变更代码 diff 相关的测试，跳过未受影响的测试。成熟仓库据称可把测试时间减少 90%。
        - id: n3
          label: 构建 + 制品生成
          detail: Build Cache Intelligence 复用未变化的依赖。生成容器镜像或二进制制品并发布到制品仓库。
        - id: n4
          label: 策略 + 质量门禁
          detail: OPA 策略检查制品签名、SBOM、漏洞扫描（SSCA）。如果策略要求人工签核，则进入审批门禁。
        - id: n5
          label: CD 流水线触发
          detail: CD 流水线按部署策略（canary、blue-green、rolling、A/B）触发。执行按环境设置的审批门禁。
        - id: n6
          label: 渐进式部署
          detail: Delegate 在客户环境中执行部署步骤。Feature Flags 支持无需重新部署即可切流。
        - id: n7
          label: 自动化验证
          detail: 部署后，AIDA 异常检测监控 Datadog/New Relic/Prometheus 指标。超过阈值时自动触发回滚。
        - id: n8
          label: 反馈到 AIDA 知识图谱
          detail: 部署结果（成功 / 失败、指标）写入 AIDA 知识图谱，用于持续改进模型。
      edges:
        - from: n1
          to: n2
          label: webhook 触发
        - from: n2
          to: n3
          label: 过滤后的测试运行
        - from: n3
          to: n4
          label: 制品 + SBOM
        - from: n4
          to: n5
          label: 策略通过
        - from: n5
          to: n6
          label: 部署步骤
        - from: n6
          to: n7
          label: 指标流
        - from: n7
          to: n8
          label: 结果记录
        - from: n8
          to: n2
          label: 模型更新（下一次运行）
    approximationNotes: null
    claimRefs:
