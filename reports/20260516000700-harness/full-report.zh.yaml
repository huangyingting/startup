      - number: '3.2'
        title: 竞争对手画像与能力对比
        blocks:
          - type: paragraph
            body: >-
              GitHub Actions 是 Harness 最危险的分发型竞争对手，它原生嵌入 GitHub 源代码控制平台，而 GitHub 被 100M+ 开发者使用。定价从 $4/user/month（Team
              档）起，Linux 计算分钟按 $0.006/min 计费。平台提供 20,000+ actions 市场，并预览由 AI 驱动 pipeline 定义的智能体工作流。相对 Harness，GitHub
              Actions 的主要弱点是缺少集成云成本管理、功能开关和企业 CD 治理能力。


              GitLab CI/CD 是 GitLab DevSecOps 平台的一部分，FY2026 ARR 达到 $1B，总收入 $955M（同比增长 26%），拥有 1,456 家贡献 $100K+ ARR
              的企业客户，按美元计净留存率为 118%。GitLab 提供免费自托管 CI（Community Edition）和 $29/user/month 的 SaaS Premium（含 10,000
              计算分钟）。GitLab 的 Ultimate 档（强调合规和治理）现在占总 ARR 的 56%，反映企业愿意为嵌入安全的 DevOps 付费。GitLab Duo Agent Platform 是对
              Harness AIDA 的直接 AI 原生竞争回应。


              CircleCI 的 Performance 计划价格为 $15/user/month，计算消耗按 credit 计费。Jenkins 仍然流行（37% CI 市场份额），但维护负担高——使用 Jenkins 的
              60%+ 企业把插件管理复杂度列为主要痛点。CloudBees 以定制企业价提供企业级 Jenkins 支持。


              LaunchDarkly 是主要功能管理竞争对手，提供基于席位和用量分层的定制企业定价。PeerSpot 数据显示，在 2026 年对比中，Harness 在功能管理中的心智份额为 21.3%，高于
              LaunchDarkly 的 18.7%。
