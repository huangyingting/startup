  - id: TI003
    title: 单位经济表
    columns:
      - 指标
      - 数值 / 估计
      - 置信度
      - 为何重要
      - 尽调问题
    rows:
      - - ARR（2025 年估计）
        - '>$250M（公司所称轨迹）'
        - 低：私营公司，未经审计
        - 核心收入质量指标；必须用已签合同储备确认
        - 用审计或投资人核验数据确认总 ARR；区分净 ARR 与总 ARR
      - - ARR 增长率（2024-2025）
        - 同比约 ~50%+；Latka 称 2024 ARR 约 ~$156M
        - 低：Latka 为未经核验的公司自报数据
        - 证明仍处高速增长期；关键估值驱动
        - 用董事会材料或投资人更新确认；确认是否为有机增长，还是包含 Traceable 合并 ARR
      - - 平均合同价值（ACV）
        - 隐含约 ~$250K（$250M ARR / 1,000+ 客户）
        - 低：由两个未经核验输入推导
        - 企业级 ACV；确认其是真企业客户定位，而非中端市场
        - 确认实际 ACV 分布；前 10/25/50 大客户贡献 ARR 比例
      - - 净收入留存率（NRR）
        - 未披露；估计 110-130%（DevOps SaaS 同业区间）
        - 很低：纯基准估计
        - 衡量扩张收入和流失的核心指标；对估值关键
        - 要求提供投资人披露或数据室中的分 cohort NRR
      - - 毛利率（估计）
        - 75-82%（DevOps SaaS 基准；GitLab 报告 non-GAAP 约 ~84%）
        - 低：由同业可比公司推断
        - 决定 FCF 路径；SaaS 达到这一 ARR 后长期应做到 80%+
        - 要求按收入流提供经审计或投资人核验的毛利率
      - - CAC 回本周期
        - 未披露；估计 18-30 个月（复杂企业销售）
        - 很低：基准区间
        - 对资本效率关键；在 50%+ 增长下，高 CAC 属预期
        - 要求数据室提供销售效率比率；新客户 CAC 与扩张 CAC
      - - 每 FTE ARR
        - ~$208K（$250M ARR / 1,200 FTE）
        - 低：两项输入均未验证
        - 生产率基准；按成长阶段看健康；前四分位为 $250K+
        - 核对员工数与 ARR；确认是否纳入 Traceable 员工数
      - - LTV / CAC（估计）
        - '>5x 估计（80% GM，$250K ACV，平均生命周期 5+ 年）'
        - 极低：由基准推断
        - 若证实，单位经济模型达到风投级；对 IPO 准备度关键
        - 要求数据室提供客户生命周期数据和流失率
    notes: >-
      Harness 是私营公司，不披露单位经济模型。所有估计都来自公司披露的 ARR、客户数、员工数，以及公开 DevOps SaaS 同业基准（GitLab、HashiCorp、Datadog）。Latka 报告的 ARR
      数字（2024 年 $156M）称为公司提交数据，未经独立验证。 凡标为「低」或「极低」置信度的单元格，都是投资前或收购尽调的阻断项。
    claimRefs:
      - CI011
      - CI012
      - CI013
      - CI014
      - CI015
      - CI016
      - CI017
