  - number: 6
    title: 客户情况
    sections:
      - number: '6.1'
        title: 客户基础与分层
        blocks:
          - type: paragraph
            body: >-
              Harness 在 2025 年 12 月 Series E 公告中称，全球服务 1,000+ 个企业工程团队，客户覆盖北美、EMEA 和
              APAC。客户基础明显偏向受监管且技术前沿的垂直行业，因为在这些行业中，软件交付速度和治理是关乎竞争力的生存因素。银行、金融服务与保险（BFSI）公司估计占基础的 30-35%，吸引力来自 Harness
              的软件供应链保障（SSCA）模块和审计就绪的 pipeline 治理。科技和软件公司估计占 25-30%，驱动力是开发者生产力和平台工程要求。零售、酒店和旅行——由 Choice Hotels 和 Keller
              Williams 锚定——约占 10-15%，云成本管理（CCM）是主要切入点。航空和交通（United Airlines）约占 5%，医疗/生命科学另占 5-10%。地理集中度最高的是北美，在
              EMEA（Berlin、Amsterdam、Stockholm 办公室）和 APAC（Bengaluru、Gurugram）也已有实质企业客户布局。公司也把 Ancestry 和 Ulta Beauty
              列为具名客户，说明其已渗透面向消费者的数字业务。Harness 目标客户是拥有 100+ 开发者的企业工程组织，通常通过直接企业销售动作获取，并由 AWS、Azure、GCP 上的云市场上架补充。
