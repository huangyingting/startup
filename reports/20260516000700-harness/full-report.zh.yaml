  - id: FR001
    title: Harness 风险热力图 — 概率 vs. 影响
    type: matrix
    layout: wide
    summary: 概率-影响热力图，将 12 项已识别 Harness 风险放入 3×4 网格；高影响 / 高概率单元格代表可能打破投资逻辑的风险。
    data:
      columns:
        - 低概率
        - 中概率
        - 高概率
      rows:
