      - number: '1.2'
        title: 创始人、领导层与关键人依赖
        blocks:
          - type: paragraph
            body: >
              CEO 兼联合创始人 Jyoti Bansal 是公司身份里最具战略意义的人。Bansal 此前创办应用性能管理公司 AppDynamics，并在 2017 年以 $3.7B 售予 Cisco——同年他与
              Rishi Singh 共同创办 Harness。他作为连续创业者的信誉、深厚的企业软件分销经验，以及与大型企业买家的既有关系，都是 Harness 融资叙事、客户信任和战略定位的核心。Rishi Singh
              共同创办公司，并担任工程领导职务。Bansal 公开能见度很高，是 Harness 在融资公告、分析师简报和媒体报道中的主要公众面孔。外部信任集中在单一创始人 CEO
              身上，构成实质性的关键人依赖；后续风险和估值章节应把它作为明确的投资判断变量。公司员工数从 2021 年初的 250 人增至 2025 年末全球约 1,200+ 人，在全球设有 14 个办公室，包括印度
              Bengaluru 的大型研发中心。约 33% 员工位于印度的 Bengaluru 和 Gurugram。Bansal 公开承认公司未来有 IPO
              计划，但未给出具体时间，只把业务描述为健康、高增长，并最终适合进入公开市场。
