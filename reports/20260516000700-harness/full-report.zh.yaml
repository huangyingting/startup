      - number: '8.4'
        title: 风险调整回报与关键尽调问题
        blocks:
          - type: paragraph
            body: >-
              三个情景等权时，概率加权期望价值约为 (1.8×0.25) + (1.1×0.50) + (0.47×0.25) = 0.45 + 0.55 + 0.12 = 1.12x
              毛回报。把概率权重调整为更符合基准情景最可能（牛熊各占 50%）后，结果相近。以 3 年风险调整 ~1.12–1.3x 毛回报计，$5.5B 价格下的风险 / 回报不足以支持有确信度的买入。若以 $4.0B
              重新入场（当前 ARR 的 $16x，接近 25% 折价），且确认 NRR ≥115%，基准情景 IRR 可改善至 ~12–15%，乐观情景可到 ~35%+ IRR，更像一笔有吸引力的 growth-equity
              交易。会推翻投资案例的关键 thesis-break 条件包括：（1）确认 NRR 低于 100%——说明 land-and-expand 模型在规模化后没有跑通；（2）任何队列年度客户流失
              >20%；（3）IPO 窗口关闭，2030 年前没有清晰流动性路径；（4）GitHub Actions 或 GitLab 赢下 Harness top-20 账户中的 3 个以上；（5）FedRAMP
              授权被拒或实质延迟。监测信号包括季度 ARR 公告、Gartner Peer Insights 评分趋势、企业账户扩张与收缩对比，以及作为 burn rate 代理的 LinkedIn
              员工数轨迹。任何投资决策前的最终尽调要求：（A）管理层披露 NRR 以及按 vintage 划分的客户级队列留存；（B）过去十二个月经审计的毛利率和 EBITDA margin；（C）FedRAMP
              ATO（Authority to Operate）状态和预计完成时间表；（D）当前现金余额和月度现金消耗，用于验证 runway 声明；（E）在 $4B、$5.5B 和 $8B 退出企业价值下的
              cap-table waterfall 分析；（F）IPO 招股说明书 filing 意向（S-1 草稿或投行聘用）。没有 A–D 数据点，就无法独立验证乐观逻辑，按当前入场价格投资仍偏投机。
