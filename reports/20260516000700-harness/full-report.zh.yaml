      - number: '8.3'
        title: 乐观、基准和悲观情景分析
        blocks:
          - type: paragraph
            body: >-
              三个情景都以 2028 年退出事件（IPO 或战略收购）作为终值估值锚，并由 $5.5B 入场价格推算 3 年回报。所有情景假设没有额外稀释融资；不过，多轮累计 $775M+ 融资产生的优先股堆叠意味着，在低于
              $5.5B 的清算事件中，普通股和 late-preferred 股东面临 waterfall 分配风险。乐观情景：Harness 保持约 40% CAGR，到 2028 年达到 ~$500M
              ARR。市场环境改善，AI-DevOps 重估让 IPO 情境下的退出倍数达到 20x ARR，对应 $10B 企业价值。从 $5.5B 入场，毛回报约 1.8x（~22% IRR）。这一情景取决于：AIDA
              作为付费 upsell 被企业广泛采用；FedRAMP 授权在 2026–2027 年完成；公开 DevOps 倍数稳定在 15–20x；NRR 确认高于 120%。触发信号是 NRR ≥120%，且 ARR
              持续增长 35–40%。基准情景：Harness 以 ~25% CAGR 增长（从当前 ~60% 按市场速度放缓），到 2028 年达到 ~$400M ARR。以 15x ARR 退出，对应 $6B
              企业价值——毛回报约 1.1x（~3% IRR），3 年后仅略高于保本，难以满足多数 growth equity
              mandate。这一情景反映宏观逆风和竞争压力下最可能的结果；扣除费用和资本成本后，实际表现基本持平到小幅亏损。悲观情景：受宏观收缩、GitHub Actions/GitLab 抢份额或内部执行问题影响，增速降至
              ~10% CAGR。ARR 到 2028 年达到 ~$320M。公开市场可比公司交易在 8x（进一步压缩），对应 $2.6B 退出企业价值，即 0.47x 亏损。该情景造成实质资本损失，触发因素包括 NRR 低于
              100%、重大客户流失事件，或可比公司公开市场倍数重估到低于 8x ARR。回报曲线不对称（乐观 1.8x、基准 1.1x、悲观
              0.47x）且不利：当前定价下，下行超过上行。该不对称支持严格价格纪律——要么等待更低入场价格，要么在 $5.5B 估值投入前，对 NRR 和队列留存建立强确信。对已在早期轮进入的投资者而言，Series E
              价格意味着早期回报被显著稀释，IPO 窗口不确定性也给悲观情景增加流动性风险。
