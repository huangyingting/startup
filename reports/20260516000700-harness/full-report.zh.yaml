  - number: 2
    title: 市场分析
    sections:
      - number: '2.1'
        title: 市场定义与总可用机会
        blocks:
          - type: paragraph
            body: >-
              Harness 参与多个高增长软件交付细分市场，合在一起构成一个庞大且扩张中的总可用市场。最宽口径的市场定义——涵盖 CI/CD、部署编排和 AI 原生工具的 DevOps 平台——由 The Business
              Research Company 和 Mordor Intelligence 估算为 2026 年 $19.57B，并以 21.33% CAGR 增长至 2031 年 $51.43B。Grand View
              Research 使用 2023 年基准年和 16.8% CAGR 给出的较窄口径，预计到 2030 年达到 $37.25B。多家独立研究机构对 2026 年 $18B–20B 区间形成一致判断，验证了 TAM
              基础。


              除核心 DevOps 平台市场外，Harness 还触达相邻的高价值细分市场。受多云复杂度和 AI 工作负载成本压力推动，Cloud FinOps 和云成本管理市场预计到 2030 年达到
              $26.91B，CAGR 为 12.6%。功能管理软件市场规模较小但在增长——预计从 2026 年 $369M 增至 2035 年 $750M。CI/CD 工具子细分市场（窄口径）规模为 $2.09B，CAGR
              为 20.72%。合计来看，Harness 多支柱可触达市场超过 $37B。


              以 $19.57B DevOps TAM 计，Harness 披露的 ARR 轨迹超过 $250M，对应约 1.3% 市场渗透率——说明在快速扩张的市场里，增长跑道仍长且扎实。大型企业细分市场（1,000+
              员工）贡献 64% DevOps 收入，按当前市场规模约为 $12.5B SAM。
