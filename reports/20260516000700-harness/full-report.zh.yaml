      - number: '8.5'
        title: 投资建议
        blocks:
          - type: paragraph
            body: >-
              建议：继续研究 / 观察。确信度：低至中。不是放弃——业务基本面足够强，值得继续跟进——但在缺少上述尽调数据前，当前价格不构成买入。Harness 底层业务具备耐久特征：AI-native
              平台拥有八个模块、1,000+ 企业客户、$250M+ ARR 且 50%+ 增长、Goldman Sachs Alternatives 背书，以及有明确成功记录的 CEO（AppDynamics 以 $3.7B
              出售给 Cisco）。市场机会真实存在——IDC 预计 DevOps 平台支出到 2026 年超过 $20B——Harness 也通过 Gartner Peer Insights 认可和 Fortune 500
              客户 wins 证明了相关性。不过，以 $5.5B 入场、22x forward ARR，按 2025–2026 年公开市场标准偏贵；关键财务披露（NRR、毛利率、burn
              rate）缺失，无法独立承销乐观情景。对能进入管理层 data room 的 growth-equity 或 late-stage 投资者，有条件买入门槛是：NRR ≥115%、毛利率 ≥75%、月度 burn
              ≤$8M（意味着 $200M runway ≥25 个月），且 FedRAMP ATO 时间表 ≤18 个月。对没有 data room 访问权的市场观察者，观察立场更合适，直到 S-1
              招股说明书或二级市场信息提供必要透明度。估值立场：相对公开可比公司偏高，但对一家已确认企业牵引力、ARR run rate 为 $250M+ 的私营 AI-DevOps
              平台而言并非不理性。倍数溢价反映稀缺性、增长轨迹和 AI 定位，但如果没有有意义的 IPO 重估，当前水平上行有限。
