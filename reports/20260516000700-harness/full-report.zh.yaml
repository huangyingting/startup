      - number: '5.2'
        title: 架构、集成与部署模式
        blocks:
          - type: paragraph
            body: >-
              Harness 以托管在 Google Cloud Platform 上的多租户 SaaS 交付，也可通过 Kubernetes Helm charts 进行自托管（本地或私有云）部署。架构核心是
              Delegate：一个轻量 JVM agent，安装在客户自己的 Kubernetes 集群或 VM 中，并与 Harness SaaS
              控制平面建立仅出站、长轮询连接。这一设计不需要入站防火墙规则，并把敏感凭据（云提供商密钥、容器注册表 token、Kubernetes service account）留在客户网络内，防止它们传输到
              Harness 基础设施或由 Harness 存储。所有编排决策和 pipeline 执行都由控制平面发起，但由 Delegate 本地执行；Delegate 也处理 artifact
              上传、测试执行和部署命令。控制平面本身是 Kubernetes-native 且可水平扩展；企业客户可以跨环境运行多个 Delegate 以获得冗余。集成深度是平台的主要卖点：Harness 连接所有主要 SCM
              提供商（GitHub、GitLab、Bitbucket、Azure DevOps）、CI 迁移工具（Jenkins、CircleCI）、云
              基础设施即代码工具（Terraform、Pulumi、Ansible）、密钥管理（HashiCorp Vault、AWS Secrets Manager、Azure Key
              Vault）、可观测性平台（Datadog、New Relic、Prometheus），以及工单/通知系统（Jira、Slack、PagerDuty）。开源 Gitness 项目（32,000+ GitHub
              stars）提供自托管 SCM 和 pipeline 运行时，既是开发者社区入口，也是通过生态锁定形成的竞争护城河。另一个由 Harness 维护的 OSS CI 项目 Drone.io 已累计超过 29,000
              stars。SaaS 档的可靠性 SLA 未公开发布；缺少公开状态页 SLA 或可用时间承诺是一个尽调缺口，尽管企业合同很可能包含私下 SLA 条款。
