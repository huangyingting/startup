  - id: TI005
    title: 公开财务数据缺口表
    columns:
      - 缺失指标
      - 对尽调的影响
      - 精确尽调路径
    rows:
      - - 净收入留存率（NRR）
        - 关键：扩张收入质量是 SaaS 估值的核心驱动；没有 NRR，无法确认先落地再扩张的逻辑
        - 要求投资人数据室或董事会级报告按模块提供队列级 NRR
      - - 已确认毛利率
        - 重要：FCF 路径取决于毛利率；75% 和 82% 对估值底线差异很大
        - 要求经审计损益表，或由 CFO 代表管理层确认的未审计财务数据
      - - 客户集中度
        - 重要：前 10-25 大客户 ARR 占比是关键债权 / 投资风险；单一客户 >10% ARR 是风险信号
        - 要求数据室提供收入集中度明细；确认 United Airlines、Morningstar 的 ARR
      - - CAC 与回本周期
        - 重要：资本效率和增长可持续性取决于 CAC 回本；也验证 $200M 现金跑道是否够用
        - 要求 Q1-Q4 2025 投资人更新中的销售效率比；新客户 ACV 与 CAC 分开列示
      - - 实际烧钱速度和现金头寸
        - 阻断：没有实际现金头寸和月度 / 季度烧钱数据，无法验证 CEO 的现金跑道表述
        - 要求数据室提供董事会批准的损益表，或过去 12 个月的月度财务仪表盘
      - - Traceable 合并 ARR 贡献
        - 重要：$250M ARR 可能包含也可能不包含合并后 Traceable 的 ARR（Feb 2025）；这会混淆内生与外延增长
        - 确认 ARR 桥表：拆分合并日 Harness 内生 ARR 与 Traceable ARR；单列各自增长率
      - - 债务 / 信贷额度细节
        - 重要：风险债义务会压缩实际现金跑道；下行周期存在契约风险
        - 向 CFO 索取股权结构表、所有债务额度协议和法律披露
    notes: 本表列出评估 Harness 这家私营公司时缺失的具体财务披露。每一行都是正式投资条款清单或投资尽调流程会提出的数据请求。 没有数据室访问权限，本报告只能依赖公开指标、CEO 表述和同业基准。
