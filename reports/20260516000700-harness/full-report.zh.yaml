      - CR045
  - id: FR003
    title: Harness 关键依赖图
    type: dag
    layout: standard
    summary: 依赖图把 Harness 平台组件映射到关键外部提供方；节点大小表示集中度风险水平。
    data:
      nodes:
        - id: d1
          label: Harness SaaS 平台
          detail: 核心编排和控制平面；主要托管在 GCP。
        - id: d2
          label: Google Cloud Platform 托管
          detail: 主要基础设施；截至 May 2026 未确认多云故障转移。
        - id: d3
          label: GitHub / GitLab APIs
          detail: 深度 SCM 和流水线集成；API 变化可能削弱迁移价值主张。
        - id: d4
          label: CNCF — LitmusChaos
          detail: Apache 2.0；支撑 Harness Chaos Engineering 模块；Harness 是主要贡献者。
        - id: d5
          label: CNCF — Backstage (Spotify)
          detail: 开源 IDP 框架；支撑 Harness IDP 模块；如果 Spotify 改变策略，存在治理风险。
        - id: d6
          label: Traceable AI（2025 收购）
          detail: API 安全模块；整合复杂度带来近期执行风险。
        - id: d7
          label: 客户 Kubernetes 集群
          detail: Delegate agent 在此运行；客户 RBAC 卫生状况决定供应链爆炸半径。
        - id: d8
          label: AWS CodePipeline / Azure DevOps
          detail: 竞争性云原生平台；重度使用 AWS 或 Azure 的账户存在锁定风险。
      edges:
        - from: d1
          to: d2
          label: 托管于
        - from: d1
          to: d3
          label: 集成
        - from: d1
          to: d4
          label: Chaos 模块依赖
        - from: d1
          to: d5
          label: IDP 模块依赖
        - from: d1
          to: d6
          label: API 安全模块（收购后）
        - from: d1
          to: d7
          label: Delegate agent 部署于
        - from: d3
          to: d8
          label: 争夺流水线控制权
    approximationNotes: 依赖关系根据公开产品文档和开源仓库检查推断。
    claimRefs:
      - CR014
      - CR025
      - CR026
      - CR027
      - CR028
      - CR030
      - CR032
      - CR036
  - id: FV001
    title: 投资建议逻辑流
    type: flow
    layout: wide
    summary: 从 Harness 证据基础出发，经投资逻辑 / 反向逻辑评估，落到有条件的“继续研究”建议，展示哪些数据门槛必须通过才能形成买入确信。
    data:
      nodes:
        - id: n1
          label: 市场证据
          detail: IDC：DevOps 市场到 2026 年超过 $20B；Gartner：AI DevOps 是最高优先级；TAM 增长已确认
        - id: n2
          label: 公司证明
          detail: '>$250M ARR（公司披露）；1,000+ 企业客户；YoY 增长 50%+；Goldman Sachs 领投 Series E'
        - id: n3
          label: 产品 / 护城河
          detail: 8 模块平台；AIDA AI 层；FedRAMP 推进中；先落地再扩张架构
        - id: n4
          label: 估值评估
          detail: $5.5B / 22x ARR，相较上市可比公司 7–11x；已嵌入 2–3x 私募溢价；入场上行空间有限
        - id: n5
          label: 关键数据缺口
          detail: NRR 未披露；毛利率未经审计；烧钱速度未确认；没有 IPO 时间表
        - id: n6
          label: 投资逻辑强
          detail: AI 原生差异化、先落地再扩张、FedRAMP 可选上行、CEO 履历都支撑乐观情景
        - id: n7
          label: 反向逻辑很重
          detail: 免费层竞争、优先股包袱、倍数压缩风险、未确认 NRR 都很实质
        - id: n8
          label: 继续研究 / 观察
          detail: 有条件：若确认 NRR ≥115%、GM ≥75%、烧钱 ≤$8M/mo、FedRAMP 时间线 ≤18 个月，则买入
        - id: n9
          label: 买入触发条件（有条件）
          detail: 管理层数据室确认全部 4 个数据门槛 → 入场价 ≤$5.5B 时上调至买入
        - id: n10
          label: 放弃触发条件
          detail: NRR <100%，或烧钱 >$15M/月，或估值倍数 >25x 但没有 NRR >120% 证据 → 放弃
      edges:
        - from: n1
          to: n4
          label: 市场顺风
        - from: n2
          to: n6
          label: 印证乐观论点
        - from: n3
          to: n6
          label: 产品护城河
        - from: n4
          to: n7
          label: 倍数风险
        - from: n5
          to: n7
          label: 证据缺口
        - from: n6
          to: n8
          label: 强投资论点
        - from: n7
          to: n8
          label: 重大风险
        - from: n8
          to: n9
          label: 若达标
        - from: n8
          to: n10
          label: 若未达标
    approximationNotes: 分析师参照 $5B+ 私有软件公司的成长股权投资测算标准设定这些决策阈值，并非公司指引。
    claimRefs:
      - CV001
      - CV003
      - CV004
      - CV006
      - CV031
      - CV032
      - CV033
      - CV034
      - CV035
  - id: FV002
    title: EV/ARR 倍数敏感性分析
    type: bar
    layout: standard
    summary: 横向条形图把不同退出 EV/ARR 倍数套到 2028 年 ARR 情景上，展示 Harness 对应的企业价值，说明回报对倍数扩张或压缩有多敏感。
    data:
      items:
        - label: 悲观：$320M ARR × 8x
          value: 2.6
        - label: 悲观：$320M ARR × 11x（Datadog 可比）
