      - number: '7.3'
        title: 竞争、合作伙伴和执行风险
        blocks:
          - type: paragraph
            body: >-
              Harness 面临来自根深蒂固、低成本替代方案的结构性竞争压力。Jenkins 估计在全球 CI/CD 市场保有 37% 份额，免费开源，并深嵌 legacy enterprise
              pipelines——高切换成本让现状比采用 Harness 更占优。GitHub Actions 对公共仓库免费，并在 GitHub 生态内为私有仓库提供慷慨的免费 minutes，实际上把 SMB
              和中端市场客户的基础 CI 商品化。GitLab 报告约 $1 billion ARR，捆绑式 DevSecOps 平台覆盖 CI、CD、安全和规划，价格相近，直接竞争 Harness 的集成平台野心。AWS
              CodePipeline 和 CodeBuild 提供免费层和原生 AWS 生态集成，在 AWS-heavy 账户中制造锁定效应。AI-native coding assistants（GitHub
              Copilot、Cursor）也开始自动生成 pipeline 配置，可能在 2026–2028 年削弱 AIDA 差异化。


              合作伙伴和依赖风险集中在三处。第一，GCP 是主要基础设施提供商；尚未确认多云故障切换。第二，Harness 的 IDP 模块依赖 CNCF 的 Backstage 项目，该项目最初由 Spotify
              开发。Spotify 或 CNCF 若调整 Backstage 的治理、许可或商业策略，Harness 可能需要 fork 或重建关键模块。第三，2025 年收购 Traceable AI
              增加了整合复杂度；API 安全能力必须纳入平台，同时不能扰动核心平台稳定性。


              执行风险主要集中在人和估值。Jyoti Bansal 是 founder-CEO，也是企业销售叙事、投资者关系和产品愿景的核心人物——他若离任或长期缺席，影响重大。印度工程团队估计占班加罗尔 1,200+
              总员工中的 50%+；地缘政治事件、工资通胀或其他美国支持公司的人才竞争，都可能扰动 R&D 连续性。以 $5.5 billion 估值和 $775 million 融资额计，Harness 交易约为 22x
              ARR——显著高于 late-stage SaaS 公司 10x 中位数。公司因此必须在短期内实现高倍数退出，或继续超高速增长，中间结果空间很小。增长不达标会迫使价值毁灭型 down-round
              融资或被迫战略出售。
