      - number: '6.3'
        title: 具名客户证据与案例研究
        blocks:
          - type: paragraph
            body: >-
              Harness 最有说服力的客户证据来自具有量化结果的具名企业账户。United Airlines 报告称部署 Harness 后发布周期加快 75%，归因于自动化 pipeline、policy-as-code
              治理和智能回滚。Choice Hotels International 使用 Harness 的 CCM 模块将云成本降低 60%，展示了平台在核心 CI/CD 之外的价值。Morningstar
              在受监管金融数据环境中使用 Harness 进行 CI/CD 治理和合规；National Australia Bank 则代表其在亚太地区的 BFSI 渗透。Keller Williams
              在房地产科技场景中使用 Harness 做部署自动化。此外，Ancestry 报告称通过 Harness 的 pipeline 一致性功能，开发者工作量降至 1/80；Ulta Beauty 则称 Harness
              帮助其 eCommerce 平台节省了“数月”上市时间。Harness 客户证据页汇总的结果包括部署速度提升 3x、构建失败减少 67%、故障排查效率提升 85%，以及代表性客户案例中的年度云成本节省
              $1.2M。关键限制在于，所有量化结果都来自 Harness 自身案例研究和新闻稿，没有独立第三方验证具体指标。此外，在公司声称的 1,000+ 客户基础中，公开引用的具名客户不足 10
              家，使完整客户组合构成不透明。
