      - number: '8.2'
        title: 估值方法与可比分析
        blocks:
          - type: paragraph
            body: >-
              Harness 是 late-stage 私营 SaaS 公司，没有审计财务披露。最合适的主要估值方法是收入倍数（EV/ARR），并用 DevOps/DevSecOps 领域的一组公开可比公司和 M&A
              交易校准。当前入场价格为 >$250M ARR 对应 $5.5B，隐含 forward EV/ARR 约 22x（以 $250M 作为分母；如果公司实现更高增长，这会低估真实 ARR）。这一倍数对比
              GitLab（GTLB）约 7–8x FY2026 revenue $955.2M，以及 Datadog（DDOG）约 11x revenue。GitLab 报告 fiscal year 2026（截至 2026
              年 1 月 31 日）总收入 $955.2 million，同比增长 26%，Dollar-Based Net Retention Rate 为 118%，毛利率 87%。这为定位相近的 DevOps
              平台提供了高质量公开市场基准。Datadog 因增速更高（>25% YoY）且 NRR 更强（>120%），相对 GitLab 享有溢价。IBM 在 2024 年以 $6.4B 收购
              HashiCorp，交易隐含约 11x ARR，验证了 M&A 退出区间。历史先例是 Microsoft 2018 年以约 $7.5B 收购 GitHub（当时 GitHub ARR 为
              $200–250M），设下 30x 基准，不过该交易反映的是战略平台控制溢价，而非纯财务承销。Harness 相对 GitLab 的溢价（22x vs
              7–8x）必须由几项因素共同支撑：（a）更高预期增长轨迹——Harness 2024→2025 年约 ~60% YoY，对比 GitLab
              26%；（b）平台更宽、扩展模块更多；（c）私营公司稀缺溢价；（d）AI-native 定位。不过，公开 DevOps 倍数自 2021 年以来压缩 70%+（从 40–60x 到
              7–11x），这是回报模型退出倍数的结构性逆风。即使假设退出时温和重估至 15–20x，从当前 $5.5B 入场的乐观情景回报也只在 3 年内达到 1.5–2x，不足以覆盖 venture-style
              风险调整回报。对 growth-equity 或 late-stage 机构投资者而言，3 年 1.5–2x 毛回报、约 ~20–25% IRR 仍在范围内，但前提是确认 NRR ≥115%，且 IPO 窗口在
              2027–2028 年打开。
