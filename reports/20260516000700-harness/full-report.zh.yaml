        - label: 乐观：$500M ARR × 20x
          value: 10
        - label: GitHub 2018 年先例（~30x）
          value: 7.5
    approximationNotes: ARR 预测为分析师估算（非公司指引）。倍数区间来自 2025–2026 年公开可比公司交易水平和 2018–2024 年 M&A 先例。$5.5B 入场价仅作参考。
