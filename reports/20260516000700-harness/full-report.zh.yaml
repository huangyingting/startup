    approximationNotes: 验证质量根据结果是否至少被一个独立于 Harness 的来源引用来评估（如新闻文章、分析师报告）；公司证言和案例研究无论是否具名客户，都按公司来源处理。
    claimRefs:
      - CU019
      - CU020
      - CU029
      - CU035
