      - number: '6.4'
        title: 留存、满意度与客户耐久性
        blocks:
          - type: paragraph
            body: >-
              Harness 未披露净留存率（NRR）或总留存率（GRR）指标，而这些是私营 SaaS 公司的标准指标，因此其留存画像很难独立评估。可用代理信号混合，但方向偏正面。截至 2026 年，TrustRadius
              基于 11 条评论给 Harness 8.1/10 分，用户强调部署速度提升和治理能力。Gartner Peer Insights 在 2024-2025 年把 Harness 评为 DevOps
              Platforms 的 Customers' Choice，说明企业评论者中存在有意义的满意度。PeerSpot 评论显示部署效率提升 15-20%，问题解决时间缩短 30-35%，企业支持工单在四天 SLA
              内解决。但独立评论平台持续显示，Harness 的定价复杂度是主要不满来源——多个 Capterra、PeerSpot 和 TrustRadius
              评论者称，相比开源或更简单的替代方案，该平台昂贵，尤其不适合较小工程团队和初创公司。设置复杂度和学习曲线是次要满意度问题。多模块先切入、再扩张模式创造了结构性留存激励：通过 CCM 自动化 $1.9B
              云支出，或在数百条部署 pipeline 中嵌入 Harness 的客户，面临高切换成本。不过，在没有 NRR 数据的情况下，独立投资人无法验证扩张逻辑是否在实践中兑现，或早期队列流失是否抵消了新客户增长。
