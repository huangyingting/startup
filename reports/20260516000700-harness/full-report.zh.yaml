  - id: FV003
    title: 乐观 / 基准 / 悲观回报区间
    type: range
    layout: standard
    summary: 区间图以 $5.5B 入场价为基准，展示乐观、基准和悲观情景下的总回报倍数，并把概率加权预期回报作为单独数据点标出。
    data:
      items:
        - label: 乐观情景（25% 概率）
          low: 1.5
          mid: 1.82
          high: 2.2
          displayValue: ~1.82x gross (~22% IRR)
          detail: $500M ARR × 20x = $10B 退出；前提是 NRR ≥120% 且拿到 FedRAMP ATO
          tone: positive
        - label: 基准情景（50% 概率）
          low: 0.9
          mid: 1.09
          high: 1.3
          displayValue: ~1.09x gross (~3% IRR)
          detail: $400M ARR × 15x = $6B 退出；按市场节奏减速；勉强高于成本
          tone: warning
        - label: 悲观情景（25% 概率）
          low: 0.3
          mid: 0.47
          high: 0.65
          displayValue: ~0.47x gross (~−24% IRR)
          detail: $320M ARR × 8x = $2.6B 退出；增长减速 + 倍数压缩
          tone: negative
        - label: 概率加权回报
          low: 0.9
          mid: 1.12
          high: 1.35
          displayValue: ~1.12x prob-weighted
          detail: (1.82×0.25)+(1.09×0.50)+(0.47×0.25)；不足以满足成长股权的风险回报要求
          tone: warning
    approximationNotes: 所有回报测算都假设以 $5.5B Series E 轮估值入场，持有 3 年后在 2028 年退出。模型未计入中途流动性或额外稀释。优先权堆栈的分配瀑布可能把普通股实际回报压到模型结果以下。
    claimRefs:
      - CV023
      - CV024
      - CV025
      - CV026
      - CV027
      - CV028
      - CV029
      - CV043
      - CV044
      - CV045
  - id: FV004
    title: 投委会可用投资评分卡 KPI
    type: kpi
    layout: standard
    summary: 投委会评分覆盖七个维度：市场、验证、护城河、经济性、风险、估值和证据质量。评分反映截至 2026 年 5 月的尽调证据质量。
    data:
      items:
        - label: 市场机会
          value: 8/10
          detail: IDC：DevOps 市场到 2026 年 >$20B；Gartner 将 AI DevOps 列为最高优先级；大 TAM 得到证实
          tone: positive
        - label: 业务验证（ARR / 客户）
          value: 7/10
          detail: 公司称 ARR >$250M；1,000+ 企业客户；50%+ 增长；Goldman Sachs 背书
          tone: positive
        - label: 竞争护城河
          value: 6/10
          detail: AIDA AI 层 + 8 个模块的广度确实形成差异化；GitHub/GitLab 免费层风险限制护城河评分
          tone: positive
        - label: 单位经济性
          value: 4/10
          detail: NRR 未披露；毛利率估计 75–80%，但未经审计；ARR/FTE ~$208K（健康）；置信度低
          tone: warning
        - label: 风险画像
          value: 4/10
          detail: 22x ARR 倍数；已融资 $775M 带来优先权包袱；没有 IPO 时间表；悲观情景会出现重大亏损
          tone: warning
        - label: 估值（相对可比公司）
          value: 3/10
          detail: 22x，高于公开可比公司中位数 7–11x；溢价 2–3x；概率加权回报 ~1.12x，不足
          tone: negative
        - label: 证据质量
          value: 5/10
          detail: GitLab 10-K 和 Goldman Sachs 新闻稿提供强可比锚点；Harness 私有数据缺口重大
          tone: neutral
    approximationNotes: 评分是基于现有公开证据的 1–10 分定性评估。分数反映证据质量，而不是公司的绝对质量。私有数据缺口拉低了单位经济性和估值分数。
    claimRefs:
      - CV001
      - CV003
      - CV004
      - CV005
      - CV006
      - CV007
