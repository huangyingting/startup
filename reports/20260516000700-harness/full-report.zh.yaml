  - number: 7
    title: 风险
    sections:
      - number: '7.1'
        title: 监管与法律风险
        blocks:
          - type: paragraph
            body: >-
              Harness 处在多司法辖区监管体系下，需要同时承担数据隐私、AI 和信息安全合规义务。作为网站访客的数据控制者、企业客户的数据处理者，Harness 必须遵守欧盟 GDPR；严重违规最高罚款为 €20
              million 或全球年营业额的 4%。按 Harness 估计 $250 million ARR 计算，4% 约等于 $10 million 的潜在罚款敞口，但研究未发现监管行动。CCPA 及其继任 CPRA
              对加州居民数据提出类似义务。Harness 的 Privacy Statement
              承认公司既是数据控制者也是数据处理者，并提供欧盟数据中心部署；但研究期间未找到可公开访问的数据处理补充协议（DPA），这对受监管司法辖区的企业 BFSI 客户构成重要尽调缺口。


              认证方面，Harness 在 2025 年完成 Harness with FME (Split) SaaS Platform 的 SOC 2 Type II 审计，同时通过 ISO 27001、27017 和
              27018 监督审核，移除了一个潜在的企业销售障碍。不过，截至 2026 年 5 月，FedRAMP marketplace 未显示 Harness
              获得授权，限制了公司在美国联邦机构和承包商中的可服务市场。NIST Cybersecurity Framework 2.0 于 2024 年 2 月发布，美国联邦供应商已被广泛要求对齐；Harness
              声称已对齐，但尚无公开证明经过独立验证。


              EU AI Act 引入新的合规维度。Harness 的 AIDA 功能会生成 pipeline YAML、自动选择测试并推荐安全修复；如果这些能力实质影响受监管实体的雇佣条件或软件交付工作流，AIDA 可能按
              Annex III 被归为高风险 AI 系统。完整执行义务从 2027 年开始，Harness 仍有准备窗口，但符合性评估文档似乎尚未准备。开源许可风险中等：Drone.io 和 LitmusChaos 采用
              Apache 2.0（宽松许可、无 copyleft），Gitness 的部分组件采用 SSPL，限制商业再分发——这可能约束基于 Gitness 的商业产品打包。未发现 GPL 传染风险。服务条款将
              Harness 责任上限设为已支付的 12 个月费用，这是企业 SaaS 的常规做法。
