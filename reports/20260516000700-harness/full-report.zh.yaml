      - number: '3.3'
        title: 护城河分析与竞争风险
        blocks:
          - type: paragraph
            body: >-
              Harness 的主要竞争护城河来自三点：累积部署数据驱动 AI 功能、多模块切换成本，以及企业治理深度。Harness AI Development Assistant（AIDA）基于 128M+
              次编排部署形成的部署模式训练，构成新进入者难以快速复制的数据护城河。客户每多采用一个模块（CI、CCM、Feature Flags、SSCA、IDP），配置、策略和集成都会继续积累，切换成本随之大幅上升。


              最大竞争风险是 GitHub Actions 通过 SCM 锁定带来的分发优势。代码已经托管在 GitHub 的组织，无需单独评估供应商，就能以低摩擦路径采用 GitHub Actions。Microsoft
              能把 CI/CD 能力打包进既有 GitHub Team/Enterprise 合同，造成独立平台在低端市场很难匹配的定价压力。


              GitLab 的 $1B ARR 规模、118% DBNRR，以及 AI 原生 DevSecOps 定位，在企业层构成实质威胁。GitLab 增长中的 Ultimate 合规档（占 ARR
              56%）显示，它正在成功向上销售安全和治理——直接竞争 Harness SSCA 能力。Jenkins 和 CloudBees
              通过棕地惯性构成中等护城河风险：即便客户承认存在更好的替代方案，它们的大型安装基础也更换缓慢。


              由于多模块锁定和专门的企业合规能力，Harness 护城河在近期到中期具备耐久性；但在纯 CI/CD 中，GitHub Actions 和 GitLab 持续投入 AI 原生 pipeline
              自动化功能，正在侵蚀构建/测试速度差异化，带来商品化压力。
