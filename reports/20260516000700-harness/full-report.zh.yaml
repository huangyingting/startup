      - number: '6.2'
        title: 采用轨迹与平台规模
        blocks:
          - type: paragraph
            body: >-
              Harness 的平台规模指标提供了真实企业采用的最强证据。在截至 2025 年 12 月的十二个月里，平台驱动 128M 次部署、处理 81M 次构建、通过 SSCA 保护 1.2T 次 API 调用，并通过
              CCM 模块优化 $1.9B 云支出。这些数字由公司披露，尚未独立审计；但量级很大，且在多份 Harness 新闻稿和媒体报道中保持一致，因此增强了可信度。2025 年 ARR 有望超过 $250M，同比增长
              50%+，意味着 2024 全年约 $156M。以 1,000+ 企业客户计，隐含单客户平均 ARR 约 $250,000，符合中端市场到企业 SaaS 交易。员工数达到 1,200+，分布在全球 14
              个办公室，并计划在印度激进招聘（目标 2026 年 Bengaluru 员工达到 600-700 人）。ARR 在一年内从 $156M 增至 $250M，且增长
              50%+，反映强劲的新客户获客和/或既有账户内显著扩张收入；但新增 ARR 与扩张 ARR 的拆分未公开披露。DORA 2024 发现内部开发者平台提升组织绩效，验证了平台工程采用趋势，也支撑对 Harness
              这类解决方案的持续需求。
