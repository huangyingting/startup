          detail: 根据 DevOps SaaS 同业基准估算。GitLab 非 GAAP 毛利率约 84%；Harness 受服务收入结构影响，可能略低。置信度：很低（未经验证）
          tone: positive
        - label: ARR 倍数（Series E x ARR）
          low: 19
          mid: 22
          high: 26
          displayValue: ~22x
          detail: $5.5B 估值 / 约 $250M ARR = 约 22x。处于 DevOps SaaS 同业区间高端。50%+ 增长可支撑，但从历史看偏高。置信度：中（估值已确认，ARR 未验证）
          tone: neutral
        - label: Series E 后现金跑道（月）
          low: 24
          mid: 36
          high: 48
          displayValue: 3-4+ years
          detail: CEO 称 $200M 新股“提供足够跑道，支撑公司实现现金流转正”。估算区间假设年烧钱 $30-60M。置信度：很低（烧钱速度未披露）
          tone: positive
    approximationNotes: >-
      所有区间均为估计。ARR 数据由公司披露（私营、未经审计）。毛利率根据 DevOps SaaS 同业基准估算（GitLab、HashiCorp、Datadog）。ARR 倍数使用公司确认的 $5.5B 估值（高置信度）除以未验证
      ARR（低置信度）。现金跑道以 CEO 公开表态为锚；烧钱速度根据同业基准估计。
