chapters:
  - number: 1
    title: 公司概况
    sections:
      - number: '1.1'
        title: 身份、使命与运营模式
        blocks:
          - type: paragraph
            body: >
              Harness 是一家私营、风险投资支持的科技公司，总部位于 California 州 San Francisco，法定名称 Harness Inc.。Jyoti Bansal 和 Rishi Singh 于
              2017 年共同创办公司，使命是让全球每一位软件开发者都能快速、安全、可靠、高效地交付代码。Harness 作为商业软件平台公司运营，以产品驱动和销售驱动结合的模式，向企业工程与 DevOps
              团队销售年度订阅。平台被组织成持续扩展的模块套件，覆盖持续集成、持续交付、云成本管理、功能开关、安全测试编排、供应链安全、内部开发者门户、服务可靠性管理、AI 辅助站点可靠性工程、AI 测试自动化、Web 应用和
              API 防护，以及数据库 DevOps。Harness 于 2020 年收购开源 CI 平台 Drone.io，并在 2025 年把姊妹 API 安全与可观测性公司 Traceable 并入
              Harness。这两笔收购显示，公司有意把平台从部署自动化延伸到安全、可观测性和成本治理。Harness 产品首页的核心判断是：AI
              辅助软件开发的瓶颈不在代码生成，而在测试、安全、部署可靠性、事故响应等下游环节；这条判断塑造了公司进入 2026 年时的产品路线图和 GTM 叙事。公司采用 SaaS 模式，设免费、Team 和
              Enterprise 三档定价。
