      - number: '7.4'
        title: 附录
        blocks:
          - type: callout
            title: Delegate 架构是概率最高的安全风险
            body: >-
              Delegate agent 模式在架构上优雅，但把供应链攻击面集中到客户侧。带有生产部署凭据的 Delegate 一旦被攻破，就等同于客户 CD pipeline 遭遇 root 级入侵。CISA 和 NIST
              在联合供应链指引中明确将这一模式列为主要威胁向量。缓释措施存在（镜像签名、最小 RBAC、SSCA），但依赖客户主动配置——Harness 无法单方面强制执行。
            calloutType: risk
            claimRefs:
              - CR009
              - CR024
              - CR038
          - type: callout
            title: FedRAMP 缺口实质限制公共部门 ARR 上限
            body: >-
              美国联邦机构、国防承包商以及许多州和地方政府实体要求 SaaS 获得 FedRAMP 授权。截至 2026 年 5 月，FedRAMP marketplace 未显示 Harness。鉴于 Harness
              明确采用企业销售动作，并有公共部门增长野心，这一缺口封住了一个大而粘性的垂直市场中的可服务 ARR。GitLab 等竞争对手已有 FedRAMP 授权产品，在 Harness 完成授权前会形成持久竞争劣势。
            calloutType: risk
            claimRefs:
              - CR005
              - CR007
          - type: callout
            title: 估值倍数几乎不给增长放缓留空间
            body: >-
              以 $5.5 billion 估值和 ~$250 million ARR 计算，Harness 交易约为 22x revenue——超过当前 late-stage enterprise SaaS
              中位数的两倍。只有当 Harness 能连续多年保持 50%+ 增长，并通过 IPO 或战略收购实现高倍数退出时，这一溢价才站得住。若 ARR 增速放缓到
              30%，估值很可能大幅重置，进而压缩未来融资选择和退出时点。
            calloutType: risk
            claimRefs:
              - CR020
              - CR044
  - number: 8
    title: 估值
    sections:
      - number: '8.1'
        title: 投资逻辑与反向逻辑
        blocks:
          - type: paragraph
            body: >-
              Harness 的投资逻辑建立在五根支柱上：（1）AIDA 智能助手嵌入全部八个平台模块，形成 AI-native 差异化，在 GitHub Actions 和 GitLab CI
              免费层基线之上创造可衡量的工作流自动化；（2）多模块 land-and-expand 架构会结构性推高净留存率（NRR）至 100% 以上，每增加一个模块都会在 CI、CD、Cloud Cost
              Management（CCM）、Feature Flags、Software Supply Chain Assurance（SSCA）、Internal Developer Portal（IDP）、Chaos
              Engineering 和 AIDA AI 层之间加深切换成本；（3）1,000+ 企业客户基础隐含约 ~$250K 平均合同价值，提供了巨大的可扩张表面；（4）FedRAMP 授权正在推进，可打开联邦 /
              公共部门这一传统上高忠诚、高价值的垂直市场；（5）$200M 新股投资让 CEO 声称公司无需进一步融资即可跑到现金流转正，降低短期资本风险。Gartner 将 AI 辅助软件工程和 DevSecOps 平台列为
              2025–2026 年软件工程领导者的首要技术优先事项；IDC 预计全球 DevOps 平台市场到 2026 年将超过 $20B，其中 AI-driven tools 是增长最快的子细分。这些宏观顺风直接利好
              Harness 的产品方向。反向逻辑同样充分。Harness 的 forward ARR 倍数为 22x，而公开可比公司交易在 7–11x：GitLab（GTLB）在 2026 年初约为 7x
              revenue，Datadog 约为 11x。Harness 价格中包含 2x–3x 私营公司溢价，一旦增长放缓，安全边际极薄。GitHub Actions 和 GitLab CI 对大多数已在这些 SCM
              平台上的买方仍是零边际成本选项，Microsoft 和 IBM 的资产负债表几乎无限，可捆绑竞争能力。CEO Jyoti Bansal 公开对实现现金流转正的确定性留有余地（“It's hard to
              commit”），引发资本效率纪律疑问。没有公开审计的 NRR、队列留存或毛利率数据可供独立验证。$775M+ 融资形成的优先股堆叠，在低于 $5.5B 的 down-round 或 M&A 场景中给普通股和
              late-stage 优先股股东带来不对称风险。净结论：投资逻辑和反向逻辑都有证据支持，必须验证关键财务指标后，才能建立买入确信。
