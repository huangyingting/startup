            - label: —
              tone: neutral
        - label: 高影响
          values:
            - label: GCP 单云故障
              tone: warning
            - label: FedRAMP 缺口阻断联邦销售；估值承压
              tone: negative
            - label: —
              tone: neutral
        - label: 中影响
          values:
            - label: Jyoti Bansal 关键人风险
              tone: warning
            - label: EU AI Act 不合规；印度 R&D 中断；SSPL gitness 风险
              tone: warning
            - label: GitHub Actions 商品化；GDPR 罚款敞口
              tone: negative
        - label: 低影响
          values:
            - label: CCPA / ToS 责任上限
              tone: positive
            - label: Backstage 治理变化；Traceable 整合
              tone: neutral
            - label: AIDA 在 YAML 中产生幻觉
              tone: warning
    approximationNotes: 概率和影响为分析师定性估计。没有可用于校准的历史事故数据。
