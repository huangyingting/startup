      - number: '2.3'
        title: 增长驱动、约束与竞争动态
        blocks:
          - type: paragraph
            body: >-
              三股结构性力量推动 DevOps 市场：云采用加速、AI/ML 融入软件 pipeline，以及监管对 DevSecOps 的要求。云基础设施扩张直接创造 CI/CD
              需求，因为企业迁移工作负载后需要自动化部署编排。混合云部署是增速最快的 CI/CD 模式，CAGR 为 15.52%；组织需要在公有云可扩展性和私有基础设施的数据主权之间平衡。


              AI 集成带来双重动态。2024 DORA State of DevOps 报告确认，AI 采用显著提高个人开发者生产力，但可能负面影响交付稳定性和吞吐量——这一悖论有利于 AI
              原生平台厂商，因为它们能在统一系统内同时管理收益和风险。AI 驱动的自动化测试生成正以 16.10% CAGR 推动 CI/CD pipeline 内的测试自动化，直接利好 Harness Test
              Intelligence 能力。平台工程和内部开发者门户被 DORA 2024 确认为生产力倍增器，带动对 Harness IDP 这类模块的需求。


              采用约束包括与遗留工具集成的复杂度——60% 企业认为 DevSecOps 实施在技术上困难——以及预算审查加强，后者加速了 FinOps 纪律的采用。约 18% 企业仍没有任何 CI/CD
              工具，构成绿地机会。竞争动态包括 GitHub Actions、GitLab CI/CD、Jenkins、CircleCI 和 Azure DevOps 这些核心 CI/CD 竞争对手；Harness 则靠 AI
              原生 pipeline、集成 FinOps、功能管理和平台工程能力，放在同一个统一模块生态中形成差异化。更广泛的工具整合趋势——从碎片化点工具转向集成式 DevOps 平台——为 Harness
              多模块策略提供结构性顺风。
