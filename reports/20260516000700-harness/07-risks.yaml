- id: operational-security-risks
  title: Operational, Security, and Technical Risks
  body: 'Harness''s most distinctive operational risk stems from its Delegate agent architecture. The Delegate is a customer-installed
    agent that polls Harness''s SaaS control plane over outbound HTTPS, executes deployment tasks within the customer network,
    and holds credentials to infrastructure targets (Kubernetes clusters, cloud providers, registries). If a Delegate instance
    is compromised — whether through supply chain attack, malicious image substitution, or credential leakage — an attacker
    gains deployment-level access to the customer''s production environment. CISA and NIST have jointly highlighted software
    supply chain risks for CI/CD toolchains as a primary threat vector, and the Delegate pattern concentrates that risk on
    customer-side infrastructure rather than Harness''s own perimeter. Mitigation depends heavily on customer Kubernetes RBAC
    hygiene, image signature verification (enabled via SSCA), and minimal-privilege Delegate permissions — all of which require
    active customer configuration.


    Multi-tenancy introduces a second class of operational risk. As a SaaS platform serving 1,000+ enterprise customers on
    shared infrastructure, a breach in Harness''s control plane could theoretically expose pipeline secrets, environment variables,
    and deployment history across multiple customers simultaneously. Harness''s SOC 2 Type II audit and ISO 27001 certification
    provide meaningful controls evidence, but attestation reports are not publicly available for independent review. GCP concentration
    is a third risk: Harness runs its SaaS control plane primarily on Google Cloud Platform, meaning a GCP regional outage
    would directly impair SaaS customers. No confirmed multi-cloud failover capability has been publicly documented.


    Data residency risk affects regulated enterprises: EU-based customers in BFSI or healthcare may require all data to remain
    within EU boundaries, but EU data center placement is not the default Harness configuration. Customers must actively request
    EU tenancy, creating potential compliance gaps for globally distributed engineering teams. Finally, AI hallucination risk
    from AIDA is real but bounded: AI-generated pipeline YAML that contains security flaws or misconfigurations could introduce
    vulnerabilities into customer CI/CD flows before human review. Harness mitigates this through OPA policy gates, but customers
    who disable policy checks remain exposed.'
