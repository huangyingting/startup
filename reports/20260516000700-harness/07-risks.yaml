callouts:
- calloutType: risk
  title: Delegate Architecture Is the Highest-Probability Security Risk
  body: The Delegate agent pattern is architecturally elegant but concentrates supply chain attack surface on the customer
    side. A compromised Delegate with production deployment credentials is equivalent to a root-level breach of the customer's
    CD pipeline. CISA and NIST explicitly flag this pattern as a primary threat vector in their joint supply chain guidance.
    Mitigations exist (image signing, minimal RBAC, SSCA) but depend on active customer configuration — Harness cannot enforce
    them unilaterally.
  claimRefs:
  - CR009
  - CR024
  - CR038
- calloutType: risk
  title: FedRAMP Gap Is a Material Ceiling on Public-Sector ARR
  body: US federal agencies, defense contractors, and many state/local government entities require FedRAMP-authorized SaaS.
    Harness was not found in the FedRAMP marketplace as of May 2026. Given Harness's stated enterprise sales motion and public
    sector growth ambitions, this gap caps addressable ARR in a large and sticky vertical. Competitors like GitLab have FedRAMP-authorized
    offerings, creating a durable competitive disadvantage until Harness completes authorization.
  claimRefs:
  - CR005
  - CR007
- calloutType: risk
  title: Valuation Multiple Leaves Little Room for Growth Deceleration
  body: At $5.5 billion valuation and ~$250 million ARR, Harness trades at approximately 22x revenue — more than double the
    current median for late-stage enterprise SaaS. This premium is justified only if Harness can sustain 50%+ growth for multiple
    years and achieve a high-multiple exit via IPO or strategic acquisition. A deceleration to 30% ARR growth would likely
    trigger a significant valuation reset, constraining future financing options and exit timing.
  claimRefs:
  - CR020
  - CR044
