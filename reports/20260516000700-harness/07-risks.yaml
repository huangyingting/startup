  evidenceGaps:
  - type: missing-source
    severity: material
    topic: fedramp-authorization
    missingEvidence: FedRAMP Authorization to Operate (ATO) document or official FedRAMP marketplace listing for Harness
    whyItMatters: FedRAMP authorization is a hard gate for US federal agency procurement; its absence limits addressable TAM
      and may deter defense contractors. Cannot confirm whether Harness has an authorization in progress (In Process designation)
      or has not applied.
    diligencePath: Request FedRAMP roadmap from Harness management; check FedRAMP marketplace for "In Process" or "Authorized"
      Harness listing; ask for GovCloud environment documentation.
    relatedQuestionRefs:
    - QR001
    - QR010
    relatedTableRefs:
    - TR001
  - type: private-evidence-only
    severity: material
    topic: gdpr-compliance
    missingEvidence: Publicly accessible or NDA-provided Data Processing Addendum (DPA) with standard contractual clauses
      (SCCs) for EU customer data processing
    whyItMatters: GDPR requires a signed DPA between controller and processor; BFSI and healthcare enterprise customers will
      require one before contract signature. Its absence from public materials is a sales friction and a compliance risk signal.
    diligencePath: Request DPA template from Harness legal team; verify SCCs adoption post-EU-US Data Privacy Framework (DPF)
      2023; confirm Harness's DPF self-certification status.
    relatedQuestionRefs:
    - QR006
    - QR022
  - type: private-evidence-only
    severity: material
    topic: eu-ai-act-classification
    missingEvidence: Legal opinion or conformity assessment classifying AIDA under EU AI Act risk tiers (prohibited, high-risk,
      limited-risk, minimal-risk)
    whyItMatters: If AIDA is classified as high-risk (affecting work conditions or safety-critical pipelines), Harness must
      prepare conformity assessments, register systems in the EU database, and ensure human oversight mechanisms — adding
      compliance costs and potentially restricting AIDA capabilities.
    diligencePath: Engage EU regulatory counsel to conduct AIDA risk classification review; monitor EU AI Office guidance
      on AI tools used in software development workflows.
    relatedQuestionRefs:
    - QR014
  - type: private-evidence-only
    severity: minor
    topic: business-continuity
    missingEvidence: Publicly available or NDA-accessible business continuity and disaster recovery (BCDR) plan with RPO/RTO
      targets for Harness SaaS
    whyItMatters: Enterprise BFSI and regulated-industry customers require BCDR documentation as part of vendor risk assessments.
      GCP single-cloud concentration makes BCDR plans particularly material.
    diligencePath: Request BCDR plan and most recent DR test results from Harness engineering leadership; ask for GCP multi-region
      failover architecture documentation.
    relatedQuestionRefs:
    - QR029
  - type: private-evidence-only
    severity: material
    topic: financial-runway
    missingEvidence: Harness burn rate, quarterly cash flow, and fundraising runway beyond the December 2025 Series E
    whyItMatters: At a $5.5B valuation and with aggressive India hiring planned (600-700 new Bengaluru engineers), monthly
      burn is likely substantial. Understanding runway helps assess whether another fundraising or exit event is required
      within the diligence horizon.
    diligencePath: Request unaudited P&L and cash position from CFO; estimate burn from disclosed headcount (1,200+) at blended
      SaaS cost-per-employee benchmarks.
    relatedQuestionRefs:
    - QR031
