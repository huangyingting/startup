  - CU034
- calloutType: risk
  title: Fewer Than Ten Named Customers From 1,000+ Base
  body: Harness publicly references fewer than ten named enterprise customers from its stated 1,000+ base. This concentration
    of evidence creates material opacity about customer health, churn patterns, and vertical diversity.
