  evidenceGaps:
  - type: private-evidence-only
    severity: material
    topic: NRR
    missingEvidence: Net revenue retention (NRR) and gross revenue retention (GRR) data from Harness management or audited
      financial statements
    whyItMatters: NRR is the single most critical SaaS durability metric; without it, the land-and-expand thesis cannot be
      independently verified and churn risk remains unquantifiable
    diligencePath: Request NRR, GRR, expansion ARR, and cohort retention data in the formal data room; benchmark against comparable
      DevOps SaaS companies (GitLab NRR ~120–130% range)
    relatedQuestionRefs:
    - QU013
  - type: private-evidence-only
    severity: material
    topic: case-study-verification
    missingEvidence: Independent third-party verification of United Airlines 75% faster releases and Choice Hotels 60% cloud
      cost reduction claims
    whyItMatters: Both headline customer outcomes are sourced exclusively from Harness marketing materials; absence of independent
      corroboration limits their evidential weight in diligence
    diligencePath: Request direct customer reference calls with United Airlines IT/DevOps leadership and Choice Hotels technology
      team; ask for third-party auditor sign-off or Gartner/Forrester case study reference
    relatedQuestionRefs:
    - QU004
    - QU010
  - type: enumeration-incomplete
    severity: material
    topic: named-customers
    missingEvidence: Full named customer list with vertical, ARR band, contract term, and renewal history for the 1,000+ enterprise
      customer base
    whyItMatters: Fewer than 10 of 1,000+ customers are publicly named, making revenue concentration, vertical distribution,
      and cohort health assessment impossible
    diligencePath: 'Request full anonymized customer list in data room with at minimum: vertical, ARR band, contract start
      date, renewal status, modules purchased, and NPS score'
    relatedQuestionRefs:
    - QU021
    - QU022
    relatedTableRefs:
    - TU003
  - type: missing-source
    severity: material
    topic: retention-cohort-data
    missingEvidence: Actual cohort retention curves for Harness enterprise customers, showing logo and revenue retention at
      12, 24, and 36 months
    whyItMatters: The cohort figure (FU004) uses estimated benchmarks because Harness has not disclosed actual retention data;
      investors cannot assess whether expansion ARR exceeds churn
    diligencePath: Request cohort analysis in data room; if unavailable, use NRR as proxy and benchmark against public DevOps
      SaaS peers (GitLab ~120%, JFrog ~115%)
    relatedQuestionRefs:
    - QU013
