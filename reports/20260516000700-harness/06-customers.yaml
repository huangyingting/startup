- id: named-customer-proof
  title: Named Customer Evidence and Case Studies
  body: Harness's most compelling customer evidence comes from named enterprise accounts with quantified outcomes. United
    Airlines reports 75% faster release cycles following Harness deployment, attributed to automated pipelines, policy-as-code
    governance, and intelligent rollback. Choice Hotels International achieved a 60% reduction in cloud costs using Harness's
    CCM module, demonstrating the platform's value beyond core CI/CD. Morningstar uses Harness for CI/CD governance and compliance
    in a regulated financial-data environment, while National Australia Bank represents BFSI penetration in the Asia-Pacific
    region. Keller Williams uses Harness for deployment automation in a real-estate technology context. Additionally, Ancestry
    reports an 80-to-1 reduction in developer effort through Harness's pipeline consistency features, and Ulta Beauty credited
    Harness with saving "months" of effort on its eCommerce platform time-to-market. Across Harness's customer evidence page,
    aggregate outcomes include a 3x increase in deployment velocity, 67% reduction in build failures, 85% improvement in troubleshooting
    efficiency, and $1.2 million in annual cloud cost savings in representative customer cases. The platform also claims 10x
    DevOps efficiency gains in marketing materials. A critical limitation is that all quantified outcomes are sourced from
    Harness's own case studies and press releases, with no independent third-party verification of the specific metrics. Additionally,
    fewer than ten named customers are publicly referenced from the stated 1,000+ base, making the full customer portfolio
    composition opaque.
  claimRefs:
