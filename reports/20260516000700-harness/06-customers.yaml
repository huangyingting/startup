- id: adoption-trajectory
  title: Adoption Trajectory and Platform Scale
  body: Harness's platform scale metrics provide the strongest evidence of genuine enterprise adoption. In the twelve months
    trailing December 2025, the platform powered 128 million deployments, processed 81 million builds, protected 1.2 trillion
    API calls through SSCA, and optimized $1.9 billion in cloud spend via the CCM module. These figures are company-stated
    and have not been independently audited, but their magnitude—and consistency across multiple Harness press releases and
    media coverage—lends credibility. ARR was on track to exceed $250 million in 2025 with 50%-plus year-over-year growth,
    implying approximately $156 million for full-year 2024. At more than 1,000 enterprise customers, the implied average ARR
    per customer is approximately $250,000, consistent with mid-market to enterprise SaaS deals. Employee count reached 1,200-plus
    across 14 global offices, with aggressive India hiring planned (600-700 Bengaluru-based employees targeted for 2026).
    The trajectory from $156M to $250M ARR in a single year with 50%+ growth reflects strong net new logo acquisition and/or
    significant expansion revenue within existing accounts, though the split between new ARR and expansion ARR is not publicly
    disclosed. Platform engineering adoption, validated by DORA 2024's finding that internal developer platforms improve organizational
    performance, supports continued demand for Harness-type solutions.
  claimRefs:
  - CU011
  - CU012
