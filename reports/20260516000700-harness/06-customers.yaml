- id: TU005
  title: Expansion Dynamics and Concentration Risk
  columns:
  - Risk / Opportunity Type
  - Current Status
  - Severity
  - Diligence Mitigation
  rows:
  - - Customer name concentration
    - Fewer than 10 publicly named customers from 1,000+ stated base
    - Material
    - Request full customer list, vertical breakdown, and revenue concentration analysis
  - - NRR / expansion ARR undisclosed
    - Cannot verify land-and-expand thesis independently
    - Material
    - Request NRR, GRR, expansion ARR, and cohort retention data in data room
  - - Pricing complexity / mid-market friction
    - Multiple reviewers cite pricing as primary adoption barrier for smaller orgs
    - Minor
    - Enterprise-only targeting mitigates; confirm ACV floor in sales data
  - - GitHub Actions / GitLab CI competitive erosion
    - Lower-end enterprise accounts at risk of substitution with simpler free tools
    - Material
    - Confirm churn rate by segment; request deal-loss analysis vs GitHub Actions
  - - Single-module adoption risk
    - Customers using only one module have lower switching costs
    - Minor
    - Request module attach rate by customer cohort to quantify expansion depth
  - - Geographic concentration
    - North America likely dominant; EMEA/APAC offices recently opened
    - Minor
    - Request ARR by geography; confirm EMEA/APAC customer count and growth rate
  - - CCM module switching cost
    - $1.9B cloud spend optimized creates high institutional switching cost
    - Strength
    - Validate with CCM customer tenure and renewal rate in data room
  notes: Severity assessed based on impact to diligence confidence and investment thesis; not an absolute measure of business
    risk. CCM switching cost is listed as a strength rather than a risk.
