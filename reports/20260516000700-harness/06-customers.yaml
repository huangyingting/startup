figures:
- id: FU001
  title: Harness Customer Journey Map
  type: journey-map
  layout: wide
  summary: End-to-end journey from enterprise prospect to multi-module Harness customer, showing key adoption touchpoints,
    expansion loops, and retention anchors.
  data:
    nodes:
    - id: awareness
      label: Awareness
      description: Prospect discovers Harness via analyst reports, DevOps conference, peer referral, or cloud marketplace
        listing
    - id: evaluation
      label: Evaluation / POC
      description: AE-led proof-of-concept on CI or CD module; typically 4–8 weeks; DORA metrics and deployment speed benchmarked
    - id: initial-purchase
      label: Initial Purchase (Land)
      description: First module licensed (CI or CD); typically 50–500 developer seats; ACV ~$50K–$250K
    - id: deployment
      label: Production Deployment
      description: Platform deployed on-premises or SaaS; delegates configured; pipelines migrated from Jenkins or CircleCI
    - id: expansion-ccm
      label: CCM Expansion
      description: Cloud cost visibility drives CCM adoption; $1.9B optimized across customer base; strong switching cost
    - id: expansion-ssca
      label: SSCA / FF Expansion
      description: Security and governance requirements drive SSCA and Feature Flags adoption; regulatory mandates accelerate
    - id: platform-standard
      label: Platform Standardization
      description: Harness becomes DevOps standard across org; IDP module deployed; full platform ARR unlocked
    - id: renewal-advocacy
      label: Renewal & Advocacy
      description: Multi-year contract renewal; customer becomes reference (e.g. United Airlines, Choice Hotels); NPS positive
  approximationNotes: Journey stages are inferred from product structure, named customer evidence, and pricing model; Harness
    has not published a formal customer success playbook.
  claimRefs:
  - CU034
  - CU036
  - CU038
  - CU040
