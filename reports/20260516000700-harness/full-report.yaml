            body: >-
              Harness's retention profile is difficult to assess independently given the absence of disclosed net
              revenue retention (NRR) or gross revenue retention (GRR) metrics—standard for private SaaS companies.
              Available proxy signals are mixed but directionally positive. TrustRadius rates Harness 8.1 out of 10
              based on 11 reviews as of 2026, with users highlighting deployment velocity gains and governance
              capabilities. Gartner Peer Insights has recognized Harness as a Customers' Choice in DevOps Platforms for
