    title: IC-Ready Investment Scorecard KPIs
    type: kpi
    layout: standard
    summary: >-
      Investment committee scoring across seven dimensions: market, proof, moat, economics, risk, valuation, and
      evidence quality. Scores reflect diligence evidence quality as of May 2026.
    data:
      items:
        - label: Market Opportunity
          value: 8/10
          detail: IDC DevOps market >$20B by 2026; Gartner AI DevOps top priority; large TAM confirmed
          tone: positive
        - label: Business Proof (ARR/Customers)
          value: 7/10
          detail: '>$250M ARR company-stated; 1,000+ enterprise customers; 50%+ growth; Goldman Sachs sponsorship'
          tone: positive
        - label: Competitive Moat
          value: 6/10
          detail: AIDA AI layer + 8-module breadth are genuine differentiators; GitHub/GitLab free-tier risk caps moat rating
          tone: positive
        - label: Unit Economics
          value: 4/10
          detail: NRR undisclosed; gross margin estimated 75–80% but unaudited; ARR/FTE ~$208K (healthy); low confidence
          tone: warning
        - label: Risk Profile
          value: 4/10
          detail: 22x ARR multiple; $775M raised preference overhang; no IPO timeline; bear scenario is material loss
          tone: warning
        - label: Valuation (vs comps)
          value: 3/10
          detail: 22x vs public comp median 7–11x; 2–3x premium; probability-weighted return ~1.12x is insufficient
          tone: negative
        - label: Evidence Quality
          value: 5/10
          detail: GitLab 10-K and Goldman Sachs press provide strong comp anchors; Harness private data gaps are material
          tone: neutral
    approximationNotes: >-
      Scores are qualitative assessments on a 1–10 scale based on available public evidence. Scores reflect evidence
      quality, not absolute company quality. Unit economics and valuation scores penalized for private data gaps.
