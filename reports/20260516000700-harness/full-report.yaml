      - number: '5.2'
        title: Architecture, Integrations, and Deployment Model
        blocks:
          - type: paragraph
            body: >-
              Harness is delivered as multi-tenant SaaS hosted on Google Cloud Platform and is also available for
              self-hosted (on-premises or private cloud) deployment via Kubernetes Helm charts. The architectural
              centerpiece is the Delegate: a lightweight JVM-based agent installed in the customer's own Kubernetes
              cluster or VM that establishes an outbound-only, long-polling connection to the Harness SaaS control
              plane. This design eliminates inbound firewall rule requirements and keeps sensitive credentials (cloud
              provider keys, container registry tokens, Kubernetes service accounts) inside the customer network,
              preventing them from being transmitted to or stored by Harness infrastructure. All orchestration decisions
              and pipeline executions are initiated from the control plane but executed locally by the Delegate, which
              also handles artifact uploads, test execution, and deployment commands. The control plane itself is
              Kubernetes-native and horizontally scalable; enterprise customers can run multiple Delegates across
              environments for redundancy. Integration depth is a major platform selling point: Harness connects to all
              major SCM providers (GitHub, GitLab, Bitbucket, Azure DevOps), CI migration tools (Jenkins, CircleCI),
              cloud infrastructure-as-code tooling (Terraform, Pulumi, Ansible), secrets management (HashiCorp Vault,
              AWS Secrets Manager, Azure Key Vault), observability platforms (Datadog, New Relic, Prometheus), and
              ticketing/notification systems (Jira, Slack, PagerDuty). The open-source Gitness project (32,000+ GitHub
              stars) provides a self-hosted SCM and pipeline runtime, serving as both a developer community entry point
              and a competitive moat through ecosystem lock-in. Drone.io, another Harness-maintained OSS CI project, has
              accumulated over 29,000 stars. Reliability SLAs for the SaaS tier are not publicly published; the absence
              of a public status page SLA or uptime commitment is a diligence gap, though enterprise contracts likely
              include private SLA terms.
            claimRefs:
