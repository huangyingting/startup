      - number: '4.2'
        title: Unit Economics and Sales Efficiency
        blocks:
          - type: paragraph
            body: >-
              As a private company, Harness does not publicly disclose customer-level unit economics including net
              revenue retention (NRR), customer acquisition cost (CAC), CAC payback period, or average contract value
              (ACV). Available proxies and industry benchmarks provide partial triangulation.


              The ARR-per-customer proxy of approximately $250,000 can be derived from dividing >$250M ARR by 1,000+
              enterprise customers, suggesting a meaningful ACV consistent with mid-market to enterprise deals.
              Enterprise SaaS companies at comparable growth rates (50%+ YoY) typically operate with NRR of 115-130%,
              supported by module expansion within existing accounts. The multi-module land-and-expand model
              structurally supports above-100% NRR if customers adopt additional modules at high attach rates.


              CAC is elevated by a complex, multi-stakeholder enterprise sales cycle (typically 6-18 months for new
              logos, shorter for expansion). The direct enterprise sales motion (AE + solutions engineering + SDR) is
              supplemented by channel partnerships and marketplace availability on AWS, Azure, and GCP, which can reduce
              CAC for cloud-native customers. Gross margin is estimated at 75-80%, in line with comparable
              cloud-delivered DevOps platforms (GitLab reports approximately 84% non-GAAP gross margin). With 1,200+
              employees and >$250M ARR, the company operates at approximately $208K ARR/FTE—a healthy productivity
              metric for enterprise SaaS at this growth stage. Professional services gross margin is likely below 0% to
              -20%, as implementation-heavy enterprise onboarding is a cost center designed to drive multi-module
              adoption rather than margin.
