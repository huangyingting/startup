      - number: '1.2'
        title: Founders, leadership, and key-person dependence
        blocks:
          - type: paragraph
            body: >
              Jyoti Bansal, CEO and co-founder, is the most strategically significant individual in the company's
              identity. Bansal previously founded AppDynamics, an application performance management company, and sold
              it to Cisco for $3.7 billion in 2017 — the same year he co-founded Harness with Rishi Singh. His
              repeat-founder credibility, deep enterprise software distribution experience, and existing relationships
              with major enterprise buyers are central to Harness's fundraising narrative, customer trust, and strategic
              positioning. Rishi Singh co-founded the company and has served in engineering leadership capacity. Bansal
              holds a strong public profile and has been the primary public face of Harness across fundraising
              announcements, analyst briefings, and media coverage. This concentration of external trust in a single
              founder-CEO is a material key-person dependency that later chapters on risk and valuation should treat as
              an explicit underwriting variable. The company has grown from 250 employees at the start of 2021 to
              approximately 1,200+ globally by late 2025, with 14 offices worldwide including a major development center
              in Bengaluru, India. Approximately 33 percent of the workforce is India-based across Bengaluru and
              Gurugram. Bansal has publicly acknowledged plans for a future IPO but has not provided a specific
              timeline, describing the business as healthy, high-growth, and eventually suitable for public markets.
