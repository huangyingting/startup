  - id: FV001
    title: Investment Recommendation Logic Flow
    type: flow
    layout: wide
    summary: >-
      Decision flow from Harness evidence base through thesis/anti-thesis evaluation to the conditional research-more
      recommendation, showing which data gates must be cleared for a buy conviction.
    data:
      nodes:
        - id: n1
          label: Market Evidence
          detail: 'IDC: DevOps market >$20B by 2026; Gartner: AI DevOps top priority; TAM growth confirmed'
        - id: n2
          label: Company Proof
          detail: '>$250M ARR (company-stated); 1,000+ enterprise customers; 50%+ YoY growth; Goldman Sachs-led Series E'
        - id: n3
          label: Product / Moat
          detail: 8-module platform; AIDA AI layer; FedRAMP in progress; land-and-expand architecture
        - id: n4
          label: Valuation Assessment
          detail: $5.5B / 22x ARR vs public comps 7–11x; 2–3x private premium embedded; limited upside from entry
        - id: n5
          label: Key Data Gaps
          detail: NRR undisclosed; gross margin unaudited; burn rate not confirmed; no IPO timeline
        - id: n6
          label: Thesis Strong
          detail: AI-native differentiation, land-and-expand, FedRAMP optionality, CEO pedigree all support bull case
        - id: n7
          label: Anti-Thesis Substantial
          detail: Free-tier competition, preference overhang, multiple compression risk, unconfirmed NRR all material
        - id: n8
          label: RESEARCH-MORE / WATCH
          detail: 'Conditional: buy if NRR ≥115%, GM ≥75%, burn ≤$8M/mo, FedRAMP timeline ≤18 months confirmed'
        - id: n9
          label: BUY Trigger (conditional)
          detail: All 4 data gate criteria confirmed in management data room → upgrade to buy at ≤$5.5B entry
        - id: n10
          label: PASS Trigger
          detail: NRR <100% OR burn >$15M/mo OR multiple >25x without NRR >120% evidence → pass
      edges:
        - from: n1
          to: n4
          label: market tailwind
        - from: n2
          to: n6
          label: confirms bull thesis
        - from: n3
          to: n6
          label: product moat
        - from: n4
          to: n7
          label: multiple risk
        - from: n5
          to: n7
          label: missing evidence
        - from: n6
          to: n8
          label: strong thesis
        - from: n7
          to: n8
          label: material risks
        - from: n8
          to: n9
          label: if criteria met
        - from: n8
          to: n10
          label: if criteria fail
    approximationNotes: >-
      Decision thresholds are analyst-defined based on growth-equity underwriting standards for $5B+ private software
      companies. Not company guidance.
