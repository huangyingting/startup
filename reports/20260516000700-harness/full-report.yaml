            body: >-
              Harness's land-and-expand monetization model spans seven platform modules—CI, CD, CCM, Feature Flags,
              SSCA, Internal Developer Portal, and Chaos Engineering—enabling customers to start with a single module
              and adopt additional capabilities as their DevOps maturity grows. This architecture creates natural
              expansion vectors: a customer starting with CI can progress to CD, then CCM for cost optimization, then
              SSCA for supply chain security, compounding ARR per account over time. The CCM module, in particular,
              creates strong retention because customers optimizing cloud spend at scale (Harness managed $1.9B in cloud
              spend across its base in 2025) accumulate institutional knowledge and operational dependencies that are
              costly to unwind. However, concentration risk is material: fewer than ten named enterprise customers are
              publicly referenced against a claimed base of 1,000+, limiting diligence visibility into customer health,
              vertical diversity, and revenue concentration. DORA 2024 research validates the platform engineering
              thesis broadly—organizations using internal developer platforms show improved productivity, team
              performance, and organizational outcomes—but DORA also notes that platform engineering can decrease change
              stability if implemented without appropriate guardrails. Pricing complexity and setup overhead create
              meaningful friction for mid-market buyers, and competition from GitHub Actions and GitLab CI continues to
              erode the lower end of Harness's addressable market, potentially creating churn risk among smaller or
              less-committed enterprise accounts. The absence of NRR disclosure is the single most material gap in
              assessing expansion durability.
