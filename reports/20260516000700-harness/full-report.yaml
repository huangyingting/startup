  - number: 5
    title: Product & Technology
    sections:
      - number: '5.1'
        title: Core Platform Modules and Customer Workflow
        blocks:
          - type: paragraph
            body: >-
              Harness organizes its product as seven independently licensed, modular capabilities that can be adopted
              incrementally or as a unified platform. The Continuous Integration (CI) module provides cloud-hosted and
              self-hosted build execution, with AI Test Intelligence selecting only the tests relevant to a given code
              change—a feature Harness claims reduces test time by up to 90%—alongside Build Cache Intelligence for
              dependency reuse and Flaky Test Detection for noise reduction. Over 20,000 pre-built YAML pipeline
              templates accelerate onboarding. The Continuous Delivery (CD) module orchestrates multi-cloud deployments
              to Kubernetes, AWS ECS, Lambda, Azure Container Apps, and bare-metal VMs, offering canary, blue-green,
              rolling, and A/B deployment strategies with automated verification gates. GitOps via Flux integration is
              included for declarative deployment workflows. Cloud Cost Management (CCM) provides FinOps visibility
              across AWS, Azure, and GCP, with AutoStopping automatically halting idle cloud resources; Harness reports
              over $1.9 billion in cloud spend optimized across its customer base. Feature Flags (FF) supports
              server-side and client-side SDKs for a broad language matrix (Java, Python, Node.js, Go, React, Android,
              iOS) and integrates with CD pipelines for progressive delivery. The Software Supply Chain Assurance (SSCA)
              module achieves SLSA Level 3 build provenance, generates SBOMs, performs software composition analysis,
              and enforces policy-as-code via OPA. The Internal Developer Portal (IDP) is built on the open-source
              Backstage framework, offering a software catalog, self-service templates, and developer scorecards.
              Finally, Chaos Engineering—based on the CNCF LitmusChaos project—enables proactive resilience testing
              through GameDays and chaos experiments targeting Kubernetes, VMs, and managed cloud services. A community
              open-source edition (Harness Open Source and the gitness project) provides CI and GitOps at no cost, with
              the commercial platform differentiated by enterprise RBAC, governance, audit, and AI capabilities.
