            title: 'Recommendation: Research-More / Watch at $5.5B'
            body: >-
              Harness is a compelling business at an ambitious price. The 22x forward ARR multiple at $5.5B is
              defensible only with NRR ≥115%, confirmed gross margin ≥75%, and a credible IPO path by 2028. Without
              these confirmations, the probability-weighted gross return of ~1.12x over 3 years is insufficient for
