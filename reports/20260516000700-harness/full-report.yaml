      - number: '8.4'
        title: Risk-Adjusted Return and Key Diligence Asks
        blocks:
          - type: paragraph
            body: >-
              The probability-weighted expected value of the three scenarios at equal weighting is approximately
              (1.8×0.25) + (1.1×0.50) + (0.47×0.25) = 0.45 + 0.55 + 0.12 = 1.12x gross return. Adjusting probability
              weights to reflect the base case as most likely (50% bull/bear split) yields similar outcomes. At a
              risk-adjusted ~1.12–1.3x gross over 3 years, the risk/reward is insufficient for a conviction buy at
              $5.5B. A re-entry at $4.0B ($16x current ARR, closer to a 25% discount) with confirmed NRR ≥115% would
              improve the base case IRR to ~12–15% and the bull case to ~35%+ IRR, a more attractive growth-equity
              proposition. Key thesis-break conditions that would invalidate the investment case: (1) NRR confirmed
              below 100%—indicates the land-and-expand model is not working at scale; (2) >20% customer churn in any
              cohort year; (3) IPO window closing with no clear path to liquidity before 2030; (4) GitHub Actions or
              GitLab winning more than 3 of the top-20 Harness accounts; (5) FedRAMP authorization denied or materially
              delayed. Monitoring signals: quarterly ARR announcements, Gartner Peer Insights ratings trend, enterprise
              account expansions vs. contractions, and LinkedIn headcount trajectory as a proxy for burn rate. Final
              diligence asks before any investment decision: (A) management disclosure of NRR and customer-level cohort
              retention by vintage; (B) audited gross margin and EBITDA margin for trailing twelve months; (C) FedRAMP
              ATO (Authority to Operate) status and expected completion timeline; (D) current cash balance and monthly
              cash burn to validate runway claim; (E) cap-table waterfall analysis at $4B, $5.5B, and $8B exit
              enterprise values; and (F) IPO prospectus filing intent (S-1 draft or banker engagement). Without data
              points A–D, no independent verification of the bull thesis is possible, and the investment remains
              speculative at the current entry price.
