      - number: '1.3'
        title: Capital structure, investors, and funding history
        blocks:
          - type: paragraph
            body: >
              Harness has executed one of the more substantial private-market fundraising sequences in the DevOps
              software category. The company raised a Series A of approximately $20 million in October 2017, led by
              Menlo Ventures and BIG Labs. A $60 million Series B followed in April 2019, led by IVP, Google Ventures,
              and ServiceNow. In January 2021 Harness raised a $115 million Series C at a $1.7 billion valuation, led by
              Alkeon Capital with co-investors including Norwest Venture Partners, Battery Ventures, Citi Ventures,
              Sorenson Capital, and Thomvest Ventures. The April 2022 Series D closed at $230 million ($175 million
              equity and $55 million debt) at a $3.7 billion valuation, led by Norwest Venture Partners and joined by
              J.P. Morgan, Capital One Ventures, Splunk Ventures, Adage Capital, Balyasny Asset Management, and
              Gaingels. In October 2023 Harness raised approximately $150 million in conventional debt financing led by
              Hercules Capital. The December 2025 Series E raised $240 million ($200 million primary investment plus a
              $40 million planned tender offer providing employee liquidity) at a $5.5 billion post-money valuation, led
              by Goldman Sachs with participation from IVP, Menlo Ventures, and Unusual Ventures. Total equity raised
              stands at over $570 million. Harness plans to use the Series E proceeds to hire hundreds of engineers in
              Bengaluru, expand AI capabilities, and strengthen US and international go-to-market operations.
