  - number: 6
    title: Customers
    sections:
      - number: '6.1'
        title: Customer Base and Segmentation
        blocks:
          - type: paragraph
            body: >-
              Harness claims to serve more than 1,000 enterprise engineering teams globally as of its December 2025
              Series E announcement, with customer presence across North America, EMEA, and APAC. The customer base
              skews heavily toward regulated and technology-forward verticals where software delivery velocity and
              governance are existential competitive factors. Banking, financial services, and insurance (BFSI)
              companies represent an estimated 30-35% of the base, drawn by Harness's Software Supply Chain Assurance
              (SSCA) module and audit-ready pipeline governance. Technology and software companies account for an
              estimated 25-30%, driven by developer productivity and platform engineering mandates. Retail, hospitality,
              and travel—anchored by Choice Hotels and Keller Williams—represent approximately 10-15%, with cloud cost
              management (CCM) as the primary entry point. Aviation and transportation (United Airlines) account for
              roughly 5% and healthcare/life sciences for another 5-10%. Geographic concentration is highest in North
              America, with meaningful enterprise presence in EMEA (Berlin, Amsterdam, Stockholm offices) and APAC
              (Bengaluru, Gurugram). The company also counts Ancestry and Ulta Beauty among named customers, indicating
              penetration in consumer-facing digital businesses. Harness targets enterprise engineering organizations
              with 100+ developers, typically acquired through a direct enterprise sales motion augmented by cloud
              marketplace listings on AWS, Azure, and GCP.
