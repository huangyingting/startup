      - number: '7.4'
        title: Exhibits
        blocks:
          - type: callout
            title: Delegate Architecture Is the Highest-Probability Security Risk
            body: >-
              The Delegate agent pattern is architecturally elegant but concentrates supply chain attack surface on the
              customer side. A compromised Delegate with production deployment credentials is equivalent to a root-level
              breach of the customer's CD pipeline. CISA and NIST explicitly flag this pattern as a primary threat
              vector in their joint supply chain guidance. Mitigations exist (image signing, minimal RBAC, SSCA) but
              depend on active customer configuration — Harness cannot enforce them unilaterally.
            calloutType: risk
            claimRefs:
              - CR009
              - CR024
              - CR038
          - type: callout
            title: FedRAMP Gap Is a Material Ceiling on Public-Sector ARR
            body: >-
              US federal agencies, defense contractors, and many state/local government entities require
              FedRAMP-authorized SaaS. Harness was not found in the FedRAMP marketplace as of May 2026. Given Harness's
              stated enterprise sales motion and public sector growth ambitions, this gap caps addressable ARR in a
              large and sticky vertical. Competitors like GitLab have FedRAMP-authorized offerings, creating a durable
              competitive disadvantage until Harness completes authorization.
            calloutType: risk
            claimRefs:
              - CR005
              - CR007
          - type: callout
            title: Valuation Multiple Leaves Little Room for Growth Deceleration
            body: >-
              At $5.5 billion valuation and ~$250 million ARR, Harness trades at approximately 22x revenue — more than
              double the current median for late-stage enterprise SaaS. This premium is justified only if Harness can
              sustain 50%+ growth for multiple years and achieve a high-multiple exit via IPO or strategic acquisition.
              A deceleration to 30% ARR growth would likely trigger a significant valuation reset, constraining future
              financing options and exit timing.
            calloutType: risk
            claimRefs:
              - CR020
              - CR044
  - number: 8
    title: Valuation
    sections:
      - number: '8.1'
        title: Investment Thesis and Anti-Thesis
        blocks:
          - type: paragraph
            body: >-
              The Harness investment thesis rests on five pillars: (1) AI-native differentiation through the AIDA
              intelligent assistant embedded across all eight platform modules, which creates measurable workflow
              automation above the free-tier baselines offered by GitHub Actions and GitLab CI; (2) a multi-module
              land-and-expand architecture that structurally drives net revenue retention above 100%, with each
              additional module deepening switching costs across CI, CD, Cloud Cost Management (CCM), Feature Flags,
              Software Supply Chain Assurance (SSCA), Internal Developer Portal (IDP), Chaos Engineering, and the AIDA
              AI layer; (3) a 1,000+ enterprise customer base with an implied average contract value of ~$250K,
              providing a large addressable expansion surface; (4) FedRAMP authorization in progress, which unlocks the
              federal/public sector vertical—a traditionally high-loyalty, high-value segment; and (5) a $200M primary
              investment providing CEO-stated runway to cash-flow positive without further fundraising, reducing
              near-term capital risk. Gartner identifies AI-assisted software engineering and DevSecOps platforms as the
              top technology priorities for software engineering leaders in 2025–2026, and the global DevOps platform
              market is projected by IDC to exceed $20B by 2026, with AI-driven tools as the fastest-growing
              sub-segment. These macro tailwinds directly favor Harness's product direction. The anti-thesis is equally
              substantial. Harness commands a 22x forward ARR multiple in an environment where public comps trade at
              7–11x: GitLab (GTLB) was trading near 7x revenue in early 2026, and Datadog near 11x. The 2x–3x
              private-company premium embedded in Harness's price leaves minimal margin of safety if growth decelerates.
              GitHub Actions and GitLab CI remain zero-marginal-cost options for the majority of buyers already on those
              SCM platforms, and Microsoft and IBM have effectively unlimited balance sheets to bundle competing
              capabilities. CEO Jyoti Bansal publicly hedged on the certainty of achieving cash-flow positivity ("It's
              hard to commit"), raising questions about capital efficiency discipline. No publicly audited NRR, cohort
              retention, or gross-margin data exists for independent verification. The preference-stack overhang from
              $775M+ raised creates asymmetric risk for common and late-stage preferred shareholders in a down-round or
              M&A scenario below $5.5B. Net verdict: the thesis and anti-thesis are both evidence-supported, requiring
              validation of key financial metrics before a buy conviction can be established.
