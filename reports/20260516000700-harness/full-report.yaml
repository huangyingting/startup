  - number: 3
    title: Competitors
    sections:
      - number: '3.1'
        title: Competitive Landscape Overview
        blocks:
          - type: paragraph
            body: >-
              Harness operates in a highly competitive DevOps platform market spanning several distinct competitive
              categories. Direct CI/CD competitors include GitHub Actions (embedded CI/CD from Microsoft with ~11%
              market share), GitLab CI/CD (part of an integrated DevSecOps platform with $1B ARR in FY2026), and
              CircleCI (Docker-optimized specialist). Legacy incumbents Jenkins (~37% CI/CD market share) and CloudBees
              Jenkins (~28%) dominate through sheer installed base in enterprise environments, particularly in regulated
              industries requiring self-hosting and maximum customization.


              Microsoft's Azure DevOps represents a secondary competitive threat through bundling with the Microsoft 365
              and Azure ecosystem. In adjacent markets, LaunchDarkly is the primary feature management competitor, while
              CloudHealth (VMware/Broadcom) competes in cloud cost management. Octopus Deploy competes in the CD release
              automation segment.


              The landscape is bifurcated between embedded platform plays (GitHub Actions, GitLab, Azure DevOps) that
              leverage SCM/cloud distribution advantages, and independent DevOps platforms (Harness, CloudBees,
              CircleCI) that compete on feature depth, enterprise support, and multi-cloud agnosticism. Harness is the
              only independent platform offering integrated CI, CD, cloud cost management, feature flags, software
              supply chain security, internal developer portal, and chaos engineering in a unified module ecosystem.
