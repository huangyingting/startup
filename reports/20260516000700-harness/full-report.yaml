  - number: 4
    title: Financials
    sections:
      - number: '4.1'
        title: Revenue Model and Monetization Streams
        blocks:
          - type: paragraph
            body: >-
              Harness operates a subscription SaaS revenue model centered on developer seat licensing across seven
              platform modules: Continuous Integration (CI), Continuous Delivery (CD), Cloud Cost Management (CCM),
              Feature Flags (FF), Software Supply Chain Assurance (SSCA), Internal Developer Portal (IDP), and Chaos
              Engineering. Each module is separately priced, enabling land-and-expand monetization where customers begin
              with CI or CD and adopt additional modules over time. Pricing is primarily developer-seat-based at
              approximately $25/developer/month for CI, with module-specific pricing for CCM (percentage of cloud spend
              optimized, typically 1-3%) and others structured around seat or usage metrics.


              A secondary revenue layer comes from compute minute overages for customers exceeding included cloud-hosted
              runner minutes. Enterprise customers using self-hosted (BYO) runners avoid compute overages, creating a
              trade-off between cloud runner convenience and cost predictability. Professional services revenue
              (onboarding, implementation, migration from Jenkins/CircleCI) contributes a relatively small share of
              total ARR—estimated less than 10%—consistent with the SaaS-first model that emphasizes product-led
              onboarding and community-assisted expansion.


              Harness reported being on track to exceed $250M ARR in 2025, representing 50%+ YoY growth from
              approximately $156.2M ARR in 2024. Revenue recognition follows standard subscription SaaS treatment:
              license fees recognized ratably over the subscription term (monthly or annual billings), with annual
              contracts typically pre-paid upfront, creating positive working capital dynamics. The $1.9B+ in cloud
              spend optimized for customers through the CCM module provides a platform engagement metric that correlates
              to ARR stickiness but is not itself revenue.
