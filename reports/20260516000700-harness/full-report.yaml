  - id: FE001
    title: Product architecture map
    type: stack
    layout: wide
    summary: >-
      Harness platform architecture shown as a four-layer stack: SaaS control plane on GCP, platform services (AIDA,
      policies), delivery modules, and the Delegate agent bridging to customer infrastructure.
    data:
      layers:
        - id: l1
          label: Harness SaaS Control Plane (Google Cloud Platform)
          detail: >-
            Multi-tenant Kubernetes-native orchestration layer; hosts pipeline engine, state management, REST/GraphQL
            API, and AIDA AI Knowledge Graph. Horizontally scalable. Primary ingress for all UI and API traffic.
        - id: l2
          label: Platform Services (AIDA · Policies · Governance · Audit)
          detail: >-
            AI Development Assistant (AIDA): Test Intelligence, anomaly detection, pipeline auto-generation, cost
            recommendations. OPA-based Policy-as-Code enforcement. Role-based access control, audit trail, secret
            management connectors.
        - id: l3
          label: Delivery Modules (CI · CD · CCM · FF · SSCA · IDP · Chaos)
          detail: >-
            Seven independently licensed capability modules: Continuous Integration, Continuous Delivery, Cloud Cost
            Management, Feature Flags, Software Supply Chain Assurance (SLSA L3), Internal Developer Portal (Backstage),
            and Chaos Engineering (LitmusChaos). Each module is additive and can be adopted incrementally.
        - id: l4
          label: Delegate Agent (Customer Environment)
          detail: >-
            Lightweight JVM-based agent deployed in customer Kubernetes cluster or VM. Outbound-only long-polling to
            SaaS control plane — no inbound firewall rules required. Executes pipeline steps locally, keeping secrets
            inside customer network. Supports multiple Delegates per account for HA.
        - id: l5
          label: Target Infrastructure (Customer-owned)
          detail: >-
            Kubernetes clusters (EKS, GKE, AKS, on-prem), AWS ECS/Lambda, Azure Container Apps, VMs, bare metal. Cloud
            providers: AWS, Azure, GCP. IaC: Terraform, Pulumi, Ansible. Secrets: HashiCorp Vault, AWS Secrets Manager,
            Azure Key Vault.
    approximationNotes: >-
      Layer boundaries are logical, not physical; actual GCP topology (regions, zones, multi-region replication) is not
      publicly disclosed.
    claimRefs:
      - CE015
      - CE016
      - CE017
      - CE019
      - CE040
  - id: FE002
    title: Customer workflow / operating flow
    type: flow
    layout: wide
    summary: >-
      End-to-end developer workflow showing how a code commit travels through Harness CI (test selection, build,
      artifact), Harness CD (deployment strategy, verification), and feeds back into monitoring and next cycle.
    data:
      nodes:
        - id: n1
          label: Code Commit / PR
          detail: >-
            Developer pushes to GitHub/GitLab/Bitbucket/Azure DevOps. Webhook triggers Harness CI pipeline
            automatically.
        - id: n2
          label: AI Test Intelligence
          detail: >-
            AIDA selects only tests relevant to the changed code diff; skips unaffected tests. Claimed 90% reduction in
            test time for mature repos.
        - id: n3
          label: Build + Artifact Creation
          detail: >-
            Build Cache Intelligence reuses unchanged dependencies. Container image or binary artifact produced and
            published to registry.
        - id: n4
          label: Policy + Quality Gate
          detail: >-
            OPA policy checks artifact signature, SBOM, vulnerability scan (SSCA). Approval gate if policy requires
            human sign-off.
        - id: n5
          label: CD Pipeline Trigger
          detail: >-
            CD pipeline triggered with deployment strategy (canary, blue-green, rolling, A/B). Environment-specific
            approval gates enforced.
        - id: n6
          label: Progressive Deployment
          detail: >-
            Delegate executes deployment steps in customer environment. Feature Flags enable traffic shifting without
            re-deployment.
        - id: n7
          label: Automated Verification
          detail: >-
            AIDA anomaly detection monitors Datadog/New Relic/Prometheus metrics post-deploy. Auto-rollback triggered on
            threshold breach.
        - id: n8
          label: Feedback to AIDA Knowledge Graph
          detail: >-
            Deployment outcome (success/failure, metrics) ingested into AIDA Knowledge Graph for continuous model
            improvement.
      edges:
        - from: n1
          to: n2
          label: webhook trigger
        - from: n2
          to: n3
          label: filtered test run
        - from: n3
          to: n4
          label: artifact + SBOM
        - from: n4
          to: n5
          label: policy passed
        - from: n5
          to: n6
          label: deployment steps
        - from: n6
          to: n7
          label: metrics stream
        - from: n7
          to: n8
          label: outcome record
        - from: n8
          to: n2
          label: model update (next run)
    approximationNotes: null
