chapters:
  - number: 1
    title: Company Overview
    sections:
      - number: '1.1'
        title: Identity, mission, and operating model
        blocks:
          - type: paragraph
            body: >
              Harness is a private, venture-backed technology company headquartered in San Francisco, California,
              incorporated under the legal name Harness Inc. The company was co-founded in 2017 by Jyoti Bansal and
              Rishi Singh with the mission to enable every software developer in the world to deliver code quickly,
              securely, reliably, and efficiently. Harness operates as a commercial software platform company selling
              annual subscriptions to enterprise engineering and DevOps teams under a product-led and sales-led hybrid
              model. The platform is organized into a growing suite of modules spanning continuous integration,
              continuous delivery, cloud cost management, feature flags, security testing orchestration, supply chain
              security, internal developer portal, service reliability management, AI-assisted site reliability
              engineering, AI test automation, web application and API protection, and database DevOps. Harness acquired
              the open-source CI platform Drone.io in 2020 and merged Traceable, a companion API security and
              observability company, into Harness in 2025. The two acquisitions reflect a deliberate strategy of
              extending the platform's scope from deployment automation into security, observability, and cost
              governance. Harness's product homepage positions the company around the concept that the bottleneck in
              AI-assisted software development is not code generation but the downstream phases including testing,
              security, deployment reliability, and incident response, a thesis that shapes the company's product
              roadmap and go-to-market messaging entering 2026. The company operates under a SaaS model with free, Team,
              and Enterprise pricing tiers.
            claimRefs:
              - CO001
              - CO002
              - CO003
              - CO004
              - CO021
