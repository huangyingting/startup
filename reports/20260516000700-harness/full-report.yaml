  - number: 7
    title: Risks
    sections:
      - number: '7.1'
        title: Regulatory and Legal Risks
        blocks:
          - type: paragraph
            body: >-
              Harness operates under a multi-jurisdictional regulatory regime that imposes compliance obligations across
              data privacy, AI, and information security. As a data controller for website visitors and a data processor
              for enterprise customers, Harness must comply with the EU General Data Protection Regulation (GDPR), which
              carries fines of up to €20 million or 4% of global annual turnover for serious violations. At Harness's
              estimated $250 million ARR, 4% would represent approximately $10 million in potential fine exposure,
              though no regulatory action has been identified. The California Consumer Privacy Act (CCPA) and its
              successor CPRA imposes parallel obligations for California resident data. Harness's Privacy Statement
              acknowledges its role as both data controller and data processor, and the company offers EU data center
              deployments, but a publicly accessible data-processing addendum (DPA) was not located during research, a
              material diligence gap for enterprise BFSI customers in regulated jurisdictions.


              On the certification front, Harness completed its SOC 2 Type II audit for the Harness with FME (Split)
              SaaS Platform in 2025 and simultaneously achieved ISO 27001, 27017, and 27018 surveillance audit
              compliance, removing a potential enterprise sales blocker. However, FedRAMP authorization was not found in
              the FedRAMP marketplace as of May 2026, limiting Harness's addressable market among US federal agencies
              and contractors. The NIST Cybersecurity Framework 2.0, released in February 2024 and widely mandated by US
              federal suppliers, requires alignment that Harness claims but has not independently verified through
              public attestation.


              The EU AI Act introduces a new compliance dimension. Harness's AIDA feature generates pipeline YAML,
              auto-selects tests, and recommends security remediations — capabilities that could classify AIDA as a
              high-risk AI system under Annex III if it materially affects employment conditions or software delivery
              workflows at regulated entities. Full enforcement obligations apply from 2027, giving Harness a runway for
              compliance, but conformity assessment documentation does not appear to have been prepared. Open-source
              license risk is moderate: Drone.io and LitmusChaos use Apache 2.0 (permissive, no copyleft), while Gitness
              adopted SSPL for certain components, which restricts commercial redistribution — creating a potential
              constraint on Gitness-derived commercial product bundling. No GPL contagion has been identified. Terms of
              service cap Harness liability at 12 months of fees paid, which is standard enterprise SaaS practice.
