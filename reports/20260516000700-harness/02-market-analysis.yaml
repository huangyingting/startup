- id: FM004
  title: Adoption funnel or value-chain map
  type: flow
  layout: standard
  summary: Flow diagram illustrating the enterprise DevOps adoption journey across five stages from greenfield/awareness to
    AI-native optimization. Harness is positioned as serving stages 3 through 5, with platform engineering and AI-native capabilities
    as key differentiators at the consolidation and optimization stages.
  data:
    nodes:
    - id: n1
      label: Greenfield / No CI-CD
      detail: ~18% of enterprises; manual deployments; risk-prone and slow release cycles
    - id: n2
      label: Point-Solution Adoption
      detail: Jenkins, GitHub Actions, standalone tools; fragmented toolchain; manual integration overhead
    - id: n3
      label: Integrated Platform Evaluation
      detail: Enterprise seeks unified CI/CD + security + governance; Harness, GitLab, Azure DevOps in consideration
    - id: n4
      label: Platform Consolidation
      detail: Multi-module deployment (CI+CD+CCM+FF+SSCA); Harness IDP for developer self-service; vendor lock-in risk decreases
    - id: n5
      label: AI-Native Optimization
      detail: AI-assisted pipelines, Test Intelligence, FinOps optimization, DORA metric tracking; Harness AIDA and CCM at
        this stage
    edges:
    - from: n1
      to: n2
      label: Initial DevOps adoption
    - from: n2
      to: n3
      label: Toolchain consolidation pressure
    - from: n3
      to: n4
      label: Platform selection and deployment
    - from: n4
      to: n5
      label: AI-native maturity evolution
  approximationNotes: 18% greenfield estimate from Mordor Intelligence. Adoption stage progression is a qualitative model
    synthesizing DORA 2024, analyst reports, and Harness go-to-market positioning.
