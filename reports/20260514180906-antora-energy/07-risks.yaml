  - CR003
  - CR005
- calloutType: risk
  title: 'Capital Intensity: Hardware Business Needs More Capital Than Software'
  body: 'Each thermal battery project requires significant upfront capital before any revenue is recognized. With ~249 employees,
    three manufacturing facilities, and an active project pipeline, Antora''s cash burn is likely substantial. The Series
    B (August 2024) may need to be followed by a Series C in 2026–2027 to sustain operations through commercial scale-up,
    making Antora dependent on continued climate tech investor appetite.

    '
  claimRefs:
  - CR027
  - CR029
  - CR030
- calloutType: strength
  title: Supply Chain Risk Is Lower Than Most Clean Energy Hardware
  body: 'Unlike lithium-ion batteries, heat pumps, or electrolyzer-based technologies, Antora''s solid carbon storage medium
    requires no critical minerals, rare earths, or geopolitically constrained supply chains. US industrial carbon is a commodity
    supplied by domestic industries with decades of operating history. This is a structural supply chain advantage that meaningfully
    reduces one category of risk that plagues most clean energy hardware companies.

    '
  claimRefs:
  - CR036
