  title: 'Regulatory Barrier: The Biggest Near-Term Blocker'
  body: 'US electricity tariff structures were not designed for behind-the-meter thermal batteries that shift consumption
    to off-peak periods. Demand charges, time-of-use tariffs, and wholesale market rules may impose punitive costs on Antora
    customers or deny access to demand response incentives. Antora''s own CEO acknowledged this barrier publicly in December
    2025. Resolution requires state-by-state utility commission proceedings or federal FERC action — both slow, uncertain,
    and outside Antora''s control.

    '
  claimRefs:
