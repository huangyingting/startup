  claims:
  - id: CR001
    statement: US electricity tariff structures in most states were designed before behind-the-meter thermal storage existed
      and do not adequately accommodate the energy-shifting operating model of Antora's thermal battery.
    type: third-party-reported
    topic: regulatory-risk
    sourceRefs:
    - SR014
    - SR017
    confidence: high
    freshness: current
    answersQuestionRefs:
    - QR001
    - QR006
    - QR016
  - id: CR002
    statement: FERC Order 841 (2018) addressed battery energy storage participation in wholesale electricity markets but did
      not specifically resolve behind-the-meter thermal battery treatment under retail utility tariffs.
    type: third-party-reported
    topic: regulatory-risk
    sourceRefs:
    - SR017
    - SR023
    confidence: high
    freshness: historical
    answersQuestionRefs:
    - QR006
    - QR011
  - id: CR003
    statement: Behind-the-meter thermal storage may still incur demand charges assessed at peak charging periods even when
      industrial production heat is delivered during off-peak hours, creating tariff ambiguity that increases customer risk.
    type: third-party-reported
    topic: regulatory-risk
    sourceRefs:
    - SR014
    - SR022
    confidence: medium
    freshness: current
    answersQuestionRefs:
    - QR001
    - QR016
  - id: CR004
    statement: Some US utility tariffs do not recognize thermal storage as a grid resource eligible for demand response incentives,
      denying Antora customers a key revenue offset that improves project economics.
    type: third-party-reported
    topic: regulatory-risk
    sourceRefs:
    - SR021
    - SR023
    confidence: medium
    freshness: current
    answersQuestionRefs:
