- id: RSEC02
  title: Technology and Operational Risks
  body: 'Antora''s most material technology risk is the TPV manufacturing scale-up. The company demonstrated

    >40% TPV efficiency in laboratory/early-line conditions and built the world''s first dedicated TPV

    manufacturing line in 2023, but maintaining that efficiency consistently across high-volume production

    is a separate engineering challenge [CR012][CR013]. Semiconductor manufacturing at scale typically

    involves yield challenges, process variation, and quality control issues that are not apparent at

    prototype scale. If production-line TPV cells underperform the demonstrated >40% efficiency by a

    material margin (e.g., falling to 25–30% average), the economics of the HeatToPower system would

    change significantly and the competitive advantage vs. alternative thermal storage approaches would

    narrow [CR014].


    The high-temperature product development program (targeting cement, glass, and steel at >375°C)

    represents a separate, longer-horizon technology risk. Materials science at extreme temperatures

    introduces challenges including thermal cycling fatigue in carbon and insulation materials, heat

    transfer design complexity, and TPV emitter degradation at temperatures above current commercial

    range [CR015][CR016]. No commercial timeline has been disclosed for these products, and their

    development depends on the success of the current commercial product generating sufficient cash

    flow and investor confidence to fund continued R&D.


    Operational risks include manufacturing scale-up execution across three facilities (San Jose,

    Big Stone City SD, St. Mary''s PA), project construction management at multiple concurrent sites,

    supply chain resilience for carbon feedstock from US coal communities, and the 24/7 operational

    reliability of deployed systems [CR017][CR018][CR019]. The GWh/year manufacturing capacity target

    represents a significant scaling challenge for a company at early commercial stage. Any manufacturing

    delays would directly reduce revenue and increase cash burn [CR020].

    '
