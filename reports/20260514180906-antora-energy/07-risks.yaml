  evidenceGaps:
  - type: private-evidence-only
    severity: blocking
    topic: regulatory-legal-risk-register
    missingEvidence: State-by-state regulatory assessment of electricity tariff treatment for behind-the-meter thermal batteries
      across all key Antora target states (CA, SD, PA, and prospective states).
    whyItMatters: The regulatory framework is the primary near-term commercial barrier; without a state-by-state assessment,
      investors cannot gauge the pace of regulatory resolution.
    diligencePath: Commission specialized utility regulatory counsel in CA, SD, PA; review utility rate cases and any FERC
      comments from Antora or thermal storage companies.
    relatedQuestionRefs:
    - QR022
    - QR025
    relatedTableRefs:
    - TR001
  - type: private-evidence-only
    severity: material
    topic: monthly-cash-burn
    missingEvidence: Antora's actual monthly cash burn rate, total cash and cash equivalents, and Series C capital needs timeline.
    whyItMatters: Without burn rate data, investors cannot assess the urgency of the Series C need or whether the company
      can reach key commercial milestones before cash is exhausted.
    diligencePath: Request audited financial statements, monthly burn rate dashboard, and Series C timeline from Antora management.
    relatedQuestionRefs:
    - QR012
  - type: private-evidence-only
    severity: material
    topic: industrial-electrification-adoption-rate
    missingEvidence: Authoritative data on the percentage of US industrial process heat facilities that have adopted any form
      of electric-based heating as of 2026.
    whyItMatters: Baseline adoption rate is needed to contextualize Antora's market penetration and regulatory progress in
      the broader industrial electrification transition.
    diligencePath: Review IEA Industrial Heat report, DOE Advanced Manufacturing Office surveys, and utility commission industrial
      customer audits.
    relatedQuestionRefs:
    - QR014
  - type: private-evidence-only
    severity: material
    topic: capital-cost-per-mwth
    missingEvidence: Installed capital cost per MWth for a full Antora thermal battery plant at commercial scale, including
      all civil, electrical, and integration costs.
    whyItMatters: Without capital cost data, project economics cannot be independently modeled and comparisons to gas boilers
      or competing thermal storage solutions cannot be verified.
    diligencePath: Request representative project cost breakdown from Antora; review any published project finance term sheets.
    relatedQuestionRefs:
    - QR015
  - type: private-evidence-only
    severity: material
    topic: insurance-performance-bonds
    missingEvidence: Information on insurance coverage, performance bonds, warranty provisions, and equipment guarantees for
      Antora's industrial deployments.
    whyItMatters: Performance guarantees determine customer risk allocation and investor confidence in revenue reliability;
      inadequate coverage could be a procurement dealbreaker.
    diligencePath: Request insurance summary and warranty terms from Antora; review any customer contract terms made available
      in due diligence.
    relatedQuestionRefs:
    - QR009
