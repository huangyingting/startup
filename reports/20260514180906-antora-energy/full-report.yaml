            title: Carbon block storage medium is a commodity with no exclusivity
            body: >-
              Unlike Rondo's refractory brick or ETS's proprietary firebrick, Antora's carbon block medium is an
              abundant industrial commodity. Any competitor could procure the same material; competitive advantage must
              therefore come from manufacturing processes, system integration, and TPV technology rather than from
              material exclusivity. If manufacturing processes are not effectively protected by IP, commoditization risk
