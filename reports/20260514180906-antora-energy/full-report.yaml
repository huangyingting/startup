      - number: '2.4'
        title: Growth drivers, constraints, and competitive dynamics
        blocks:
          - type: paragraph
            body: |
              The most powerful growth driver for Antora's market is the structural decline in renewable electricity
              prices. Wind and solar photovoltaic costs have fallen 70–90% over the past decade, making cheap
              renewable power increasingly available in many regions. When combined with the fact that industrial
              natural gas prices have remained volatile and elevated—particularly following the 2022 European energy
              crisis—the economic case for locking in low-cost renewable electricity stored as heat becomes
              compelling. Corporate decarbonization mandates represent a second major driver: hundreds of major
              industrial companies have committed to Science Based Targets or net-zero pledges that require deep
              Scope 1 emission reductions, and process heat is one of the last hard-to-decarbonize elements of
              industrial operations. Carbon pricing mechanisms—whether through voluntary markets, regulatory
              compliance schemes like the EU ETS, or emerging US carbon border adjustment proposals—add further
              financial pressure to decarbonize industrial heat. Data center demand represents a potentially
              step-change growth driver: the AI compute buildout has accelerated thermal load growth at data
              centers globally, and the cooling requirements create demand for low-carbon thermal management.
              Against these drivers, several constraints limit near-term adoption. The most significant is
              regulatory: electricity tariff structures and interconnection rules were not designed for behind-the-
              meter thermal storage. Industrial facilities that install a thermal battery and use renewable power
              to charge it may face utility tariffs that negate the cost savings, or encounter permitting and
              metering rules that slow deployment. Antora's own management has publicly acknowledged this barrier
              as a systemic challenge. Capital intensity is a second constraint: even with an energy-as-a-service
              model, the project sizes and financing complexity required for large industrial deployments create
              longer sales cycles and require sophisticated project finance capabilities. Customer inertia and
              engineering complexity in repurposing existing industrial heat infrastructure add switching costs
              for potential customers who already have installed boiler systems.
            claimRefs:
              - CM022
              - CM023
              - CM024
              - CM025
              - CM026
              - CM027
              - CM028
