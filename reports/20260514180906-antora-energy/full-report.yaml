      - number: '2.3'
        title: Customer segments, buyers, and adoption paths
        blocks:
          - type: paragraph
            body: |
              Antora's customer universe spans multiple industrial segments that share the common characteristics
              of high continuous thermal energy demand, capital-intensive operations, and growing pressure to reduce
              Scope 1 and Scope 2 emissions. The food and beverage industry is a particularly attractive early
              market: plants require continuous process heat at temperatures well within Antora's 100–375°C range,
              energy costs represent a significant operating expense, and many large food companies have made public
              net-zero commitments with 2030–2040 targets. Chemical manufacturing similarly requires sustained heat
              supply and has energy budgets that can support premium pricing for decarbonized heat delivery. Pulp and
              paper mills typically operate 24/7 with high thermal loads, making the storage dispatch capability
              particularly valuable to bridge renewable generation intermittency. Minerals refining, including
              operations in which BHP Ventures (an Antora investor) participates, requires significant heat for
              ore processing and beneficiation within Antora's temperature range. Data centers are a growing and
              potentially fast-moving segment: AI-driven compute expansion has massively increased cooling loads,
              and data center operators face both energy cost pressure and ESG scrutiny. The buyer in each segment
              is typically the plant-level energy director, VP of operations, or chief engineer, with capital
              expenditure approval often requiring VP or C-suite sign-off given the project scale. Energy service
              contracts reduce this barrier by shifting upfront CapEx to Antora's balance sheet. The adoption trigger
              most commonly cited in Antora's public materials is the combination of falling renewable electricity
              prices and rising carbon costs, creating a compelling ROI for decarbonized industrial heat. However,
              the sales cycle in industrial settings is typically 12–36 months due to engineering studies, permitting,
              utility tariff negotiations, and capital budgeting processes.
