      - number: '7.5'
        title: Mitigation Framework and Investment Kill Criteria
        blocks:
          - type: paragraph
            body: |
              Antora has taken visible steps to mitigate its most significant risks. On the regulatory front,
              the company's December 2025 Utility Dive op-ed and 2026 presentations at WEF, CFR, and BNEF
              events represent a deliberate advocacy strategy to shape the regulatory environment for thermal
              storage [CR034][CR035]. The investor syndicate includes NextEra Energy Resources, which has
              deep utility and regulatory relationships that could accelerate tariff reform in key markets.
              On the competitive front, Antora's TPV manufacturing moat provides 3–5 years of buffer before
              a determined competitor could replicate the manufacturing capability at commercial scale [CR026].

              The supply chain risk is actively mitigated by sourcing carbon from established US industrial
              suppliers in coal communities — a supply chain that has operated for decades, faces no single-
              point failure, and creates socioeconomic co-benefits that could attract favorable regulatory
              treatment [CR036]. The manufacturing scale-up risk is partially mitigated by the factory-built,
              road-shippable module architecture, which reduces construction site complexity compared to
              in-situ solutions [CR037].

              The investment kill criteria — events that should trigger a fundamental reassessment of the
              Antora thesis — include: failure to name any public customer 18 months hence (by late 2027);
              TPV production-line efficiency falling below 30% averaged across production lots; a competing
              technology (Rondo, ETS) achieving >100 MWth of named commercial deployments; regulatory
              clarification definitively excluding thermal batteries from demand response programs; or
              inability to raise a Series C at or above Series B valuation [CR038][CR039][CR040].
