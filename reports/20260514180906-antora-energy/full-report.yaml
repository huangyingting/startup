            title: No revenue or margin data publicly available — complete financial diligence blocker
            body: >-
              Antora has disclosed no revenue, gross margin, EBITDA, cash position, or burn rate as of May 2026. While
              this is common at the Series B stage for climate hardware companies, it means that any investment decision
              must be made on a forward thesis only—no retrospective financial validation is possible from public
