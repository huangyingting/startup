  - id: FU001
    title: Antora Energy Customer Journey Map
    type: journey-map
    layout: wide
    summary: >-
      End-to-end journey for an industrial customer from initial awareness of Antora's thermal battery through
      deployment and O&M.
    approximationNotes: >-
      Journey stages are inferred from Antora's turnkey solution description and standard industrial capital procurement
      practice.
    claimRefs:
      - CU007
      - CU008
      - CU014
      - CU030
    data:
      items:
        - label: Awareness
          value: Industry conference, peer referral, investor introduction, or regulatory push to decarbonize
          note: 'Long awareness-to-evaluation lag typical in heavy industry. emotion: curious'
        - label: Technical Evaluation
          value: Site assessment, temperature range validation, engineering feasibility study; 3–12 months
          note: 'Antora provides technical team support; site-specific heat load analysis required. emotion: evaluating'
        - label: Business Case
          value: Financial modeling, IRR/NPV analysis, carbon credit valuation, fuel price hedge value
          note: >-
            Industrial buyers require 10–15% IRR hurdle; Antora's economics depend on renewable electricity cost.
            emotion: evaluating
        - label: Procurement / Contract
          value: EPC or turnkey contract negotiation; project finance arrangement; insurance and permitting
          note: >-
            Typical industrial capex procurement cycle 6–18 months. High legal and financial complexity. emotion:
            committed
        - label: Construction / Commissioning
          value: Module delivery, civil work, heat transfer integration, controls commissioning; 6–12 months
          note: 'Factory-built modules reduce site time; civil and grid interconnection are critical path. emotion: engaged'
        - label: Operations and Expansion
          value: 24/7 O&M by Antora, dispatch optimization, renewable charging; potential module add-ons
          note: 'High switching costs post-commissioning; expansion economics are favorable. emotion: engaged'
