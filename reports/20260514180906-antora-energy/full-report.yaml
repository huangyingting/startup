companyProfile:
  summary: >-
    Antora Energy is a San Jose, CA-based deep-tech startup developing a solid-carbon thermal battery that stores
    low-cost renewable electricity as heat in graphite blocks heated to above 2000°C, then delivers industrial process
    heat (100–375°C) and peak electricity via thermophotovoltaic cells with >40% efficiency. The company targets
    industrial manufacturers who need to decarbonize high-temperature heat — a market segment largely unreachable by
    conventional batteries or heat pumps. Antora has raised >$230M from a strong investor syndicate led by
    Decarbonization Partners (BlackRock/Temasek JV) and NextEra Energy Resources, but has not disclosed named customers
    or commercial revenue.
