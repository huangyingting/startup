      - number: '4.3'
        title: Commercial traction and financial metrics
        blocks:
          - type: paragraph
            body: |
              Antora has achieved the following disclosed commercial milestones as of May 2026: the world's
              first dedicated thermophotovoltaic (TPV) cell manufacturing line (completed 2023); successful
              first commercial deployment at an undisclosed customer site (announced 2023); and operational
              or under-construction status for three US manufacturing factories across California, South
              Dakota, and Pennsylvania. No revenue figure, revenue growth rate, annual recurring revenue
              (ARR), number of paying customers, customer contract value (TCV or ACV), utilization rate,
              deployed capacity (MWh), or other standard commercial-traction metric has been publicly
              disclosed as of the diligence date.
              The absence of public revenue metrics is typical for climate-hardware companies at Antora's
              stage (pre-scale commercial, first-of-kind technology, EaaS model with recognition tied to
              long-term contracts rather than upfront booking). However, it prevents any forward financial
              modeling from public data alone. The three-factory network implies that Antora has committed
              to a significant manufacturing ramp; the actual utilization of factory capacity versus nameplate
              capacity is unknown. Customer concentration risk is high at this early stage, as the first few
              industrial anchor customers represent disproportionate revenue and reference-site value.
              One adverse consideration for Antora's financial trajectory is the broader climate tech funding
              environment in 2025–2026. Climate technology startups in capital-intensive hardware sectors
              have faced extended runway pressures as investor patience for pre-profit hardware companies has
              shortened relative to the 2020–2022 peak climate tech funding cycle. Antora's $150M Series B
              in August 2024 preceded this tightening, providing a strong financial cushion; however, future
              rounds may face more demanding profitability timelines from investors if climate-hardware
              sentiment does not improve by the time Antora next accesses capital markets.
            claimRefs:
