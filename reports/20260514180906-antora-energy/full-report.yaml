      - number: '3.3'
        title: Feature comparison and pricing models
        blocks:
          - type: paragraph
            body: |
              Direct feature comparison across ETES competitors reveals several key differentiators. Antora's
              use of solid carbon blocks as the storage medium provides three structural advantages: cost
              (approximately 1/10th the cost per energy unit of lithium-ion batteries), abundance (carbon is
              the fourth most-produced industrial material globally), and safety (no thermal runaway risk unlike
              lithium-ion or some molten salt configurations). The carbon block approach also enables the
              thermophotovoltaic (TPV) capability: by heating the carbon to incandescence, Antora can convert
              stored heat directly to electricity at greater than 40% efficiency—a feature unique among reviewed
              ETES competitors. This dual heat-and-power output capability (marketed as HeatToPower) is a
              significant differentiator because it allows a single Antora system to serve both thermal and
              electrical demand, potentially improving project economics.
              On pricing, no ETES competitor has published a list price for their systems. Rondo has indicated
              a per-GJ heat pricing model. Antora uses energy service contracts priced in dollars per GJ or
              dollars per MWh of delivered heat and electricity. The benchmark for pricing is industrial natural
              gas at $5–15/MMBtu ($5–14/GJ) in the US, which is the reference point customers use when
              evaluating thermal storage alternatives. Antora's system economics depend on the renewable
              electricity purchase price (which is the input cost), module manufacturing cost (driven by carbon
              block material and steel enclosure), installation, and O&M costs. As manufacturing scales to
              GWh/year capacity across three factories, the cost trajectory for Antora's product should follow
              a manufacturing learning curve similar to other energy hardware products. At $230M+ in total
              funding, Antora is better capitalized than most ETES peers except Rondo (which is similarly well-
              funded through EIP). The US-manufactured supply chain at three factories is also a differentiator
              as industrial customers increasingly prefer domestic procurement and supply chain resilience.
