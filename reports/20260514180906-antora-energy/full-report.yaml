      - number: '2.2'
        title: Market sizing — TAM, SAM, and SOM
        blocks:
          - type: paragraph
            body: |
              Estimating the addressable market for electrified industrial heat requires bottom-up and top-down
              approaches because the category is new and no single third-party report uses Antora's exact product
              boundary. Using a top-down approach anchored by IEA data, total global industrial process heat demand
              is approximately 40 EJ per year, equivalent to roughly $700B–$1T annually at prevailing industrial
              energy prices. Applying the fraction of industrial heat that falls in the 100–375°C temperature range
              (estimated at 40–55% of total industrial heat demand, per multiple industry analyses) yields a global
              TAM for Antora's serviceable temperature range of approximately $150–$280B annually. This is a very
              large market even under conservative assumptions. For the US specifically, the Energy Information
              Administration estimates US industrial process heat consumption at approximately 10 EJ per year. At
              the same temperature-fraction and energy price assumptions, the US SAM for the 100–375°C range is
              approximately $30–60B annually. Antora's near-term serviceable obtainable market (SOM) is materially
              smaller: with its first commercial deployment in 2023 and three manufacturing facilities in 2026, the
              company is in early revenue generation mode. Even capturing 0.1–0.5% of the US SAM would represent
              $30–300M in annual contracted thermal capacity—a plausible medium-term growth target but not yet
              achievable at the current production scale. The long-duration energy storage market, where Antora's TPV
              capability creates an adjacency, is separately forecast to grow significantly by 2030–2035 as renewable
              penetration increases and grid operators seek multi-hour storage capacity. However, Antora's primary
              go-to-market focus remains on direct industrial heat supply rather than grid services.
