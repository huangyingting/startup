      - number: '1.4'
        title: Milestones and operational trajectory
        blocks:
          - type: paragraph
            body: |
              Antora Energy's trajectory from a 2018 founding to a full US manufacturing scale-up by 2026 represents
              a rapid but measured progression through the typical deep-tech startup arc. The company was founded in
              2018 and spent its first several years in R&D and proof-of-concept development, supported by ARPA-E and
              other government grants. The Series A in 2022 enabled the hiring push and capital investment needed to
              move from laboratory prototypes to commercial-scale hardware. In 2023, Antora achieved three major
              milestones simultaneously: deploying its first commercial-scale thermal battery, opening its San Jose
              manufacturing facility, and building the world's first dedicated thermophotovoltaic (TPV) cell
              manufacturing line—demonstrating greater than 40% efficiency in converting stored heat to electricity.
              That same year the company received recognition from TIME as one of the Best Inventions of 2023 and
              from Fast Company as a 2023 World Changing Ideas honoree. The August 2024 Series B closed at $150M
              provided the capital to begin scaling manufacturing beyond the original San Jose facility. By April 2026,
              Antora had opened two additional US manufacturing facilities: one in Big Stone City, South Dakota focused
              on plant operations, and one in St. Mary's, Pennsylvania for manufacturing operations, bringing its total
              US factory count to three. This geographic diversification de-risks supply chain concentration while
              accessing lower-cost manufacturing labor markets. The San Jose Mercury News covered the expansion in April
              2026, providing third-party confirmation of the scale-up. Antora also maintained a high public profile
              through 2025–2026 with appearances at the World Economic Forum Future of Power Systems panel, the Council
              on Foreign Relations panel, and the Bloomberg New Energy Finance San Francisco Summit in early 2026.
