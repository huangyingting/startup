              - CR030
          - type: callout
            title: Supply Chain Risk Is Lower Than Most Clean Energy Hardware
            body: >
              Unlike lithium-ion batteries, heat pumps, or electrolyzer-based technologies, Antora's solid carbon
              storage medium requires no critical minerals, rare earths, or geopolitically constrained supply chains. US
              industrial carbon is a commodity supplied by domestic industries with decades of operating history. This
              is a structural supply chain advantage that meaningfully reduces one category of risk that plagues most
              clean energy hardware companies.
            calloutType: strength
            claimRefs:
              - CR036
  - number: 8
    title: Valuation
    sections:
      - number: '8.1'
        title: Investment Recommendation and Thesis Logic
        blocks:
          - type: paragraph
            body: |
              Antora Energy receives a TRACK recommendation as of Q2 2026. The company possesses three
              characteristics rare in climate tech hardware: a demonstrated technology breakthrough (>40% TPV
              efficiency), a proprietary manufacturing moat (world's-only dedicated TPV production line), and
              a large, underpenetrated addressable market ($70B+ in US industrial process heat spending annually).
              These fundamentals are intact and improving: the $150M Series B (August 2024) funded manufacturing
              expansion into South Dakota and Pennsylvania, headcount has grown to ~249 employees, and the company
              presented at WEF and BNEF events in January 2026, signaling a transition from R&D to commercial
              positioning [CV001][CV002][CV003][CV004][CV005].

              The TRACK designation reflects a single critical gap: as of Q2 2026, Antora has named zero public
              customers. In the industrial hardware category, the difference between a compelling pre-commercial
              story and a BUY-grade investment is exactly this: one signed, named customer with a real contract
              value, real project timeline, and real commissioning date. Without that anchor, the investment
              thesis rests on a technology promise rather than a commercial proof [CV006][CV007][CV008].

              The thesis would move to BUY with: (1) disclosure of at least one named customer with a signed
              contract; (2) visible path to a second customer in a different sector or geography; (3) credible
              Series C timeline with financial runway through commercialization. The thesis would move to
              SELL/REDUCE with: (1) no customer named by late 2027; (2) Series C below Series B valuation;
              (3) Rondo Energy announcing >100 MWth of named commercial deployments [CV009][CV010].
            claimRefs:
              - CV001
