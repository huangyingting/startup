  - id: TV006
    title: Final Diligence Asks Table
    columns:
      - Topic
      - Missing Evidence
      - Why It Matters
      - Owner / Diligence Path
    rows:
      - - Signed customer list
        - Names, contract values, deployment timelines of any signed customers
        - Zero-customer signal is the single biggest commercial risk; even one customer changes thesis materially
        - Request directly from Antora CEO / CCO in investor meeting; treat as gate-level ask
      - - Cap table and preference stack
        - Complete cap table, liquidation preferences, option pool, and conversion terms for all rounds
        - Without preference waterfall analysis, return scenarios are unmodelable; down-round exposure is unknown
        - Request from Antora CFO or legal counsel in due diligence
      - - TPV production yield data
        - Average TPV production-line efficiency distribution and yield rates from the manufacturing line
        - HeatToPower economics depend critically on production efficiency; demo efficiency ≠ production efficiency
        - Request from Antora CTO/COO; third-party technical audit strongly preferred
      - - Audited financials and burn rate
        - Audited or reviewed financial statements, monthly burn rate, and cash runway as of Q2 2026
        - Cannot assess Series C urgency or investment timeline without actual cash position data
        - Request from Antora CFO; confirm with outside auditor if possible
      - - Series C timeline and milestones
        - Projected Series C timeline, target raise size, planned milestones, and use of proceeds
        - Understanding the financing roadmap is essential to assess risk of a down-round or premature exit
        - Request from Antora CEO in deal conversation; confirm with existing investor board members
    notes: >-
      Pure factual snapshot; no estimation involved. These diligence asks are required before a material investment
      decision; they represent minimum threshold information, not comprehensive due diligence.
    claimRefs:
      - CV046
      - CV047
      - CV048
