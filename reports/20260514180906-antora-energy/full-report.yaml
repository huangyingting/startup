  - number: 4
    title: Financials
    sections:
      - number: '4.1'
        title: Revenue model and monetization approach
        blocks:
          - type: paragraph
            body: |
              Antora Energy monetizes its thermal battery technology through an energy-as-a-service (EaaS)
              contract structure in which the company retains ownership of installed thermal storage modules
              and sells the resulting thermal and electrical energy to industrial customers on a long-term
              service contract. Revenue is generated from two primary streams: (1) delivery of industrial
              process heat charged to customers in dollars per gigajoule (GJ) of heat delivered; and (2)
              delivery of electricity produced via Antora's thermophotovoltaic (TPV) panels, charged in
              dollars per megawatt-hour (MWh). The EaaS model shifts upfront capital expenditure to Antora's
              balance sheet, lowering the customer's initial investment and enabling a recurring-revenue
              relationship with amortized payback periods tied to contract duration.
              The pricing benchmark for Antora's service is the US industrial natural gas market: customers
              evaluate industrial heat alternatives against the delivered cost of gas-fired heat at approximately
              $5–15 per MMBtu (roughly $5–14 per GJ) at the industrial site. All ETES competitors—including
              Rondo Energy, which has disclosed a per-GJ heat pricing model—must deliver heat below this
              natural gas equivalent cost to win and retain industrial customers. Antora adds a second revenue
              lever: the TPV electricity output creates an additional value component that a gas-fired system
              cannot easily match, potentially enabling Antora to charge a premium per GJ of total delivered
              energy (heat plus electricity combined) relative to pure heat-only competitors.
              A secondary revenue stream—government grants and non-dilutive funding—has been important for
              Antora's pre-commercial and early-commercial stages. ARPA-E, NSF, DOE, and California Energy
              Commission grant programs have provided recurring non-dilutive capital since the company's
              founding. These grants are non-recurring and do not constitute a sustainable commercial revenue
              source, but they reduce dilution risk and bridge the capital gap between equity rounds. Carbon
              credit revenue is a speculative future stream; Antora has not publicly confirmed any carbon credit
              transactions or offtake agreements as of May 2026. The Inflation Reduction Act's investment tax
              credit (ITC) eligibility for thermal storage could provide an additional revenue-equivalent
              benefit to customers using Antora systems, improving project economics without directly appearing
              on Antora's income statement.
            claimRefs:
              - CI001
              - CI002
              - CI003
              - CI004
              - CI005
