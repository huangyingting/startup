      - number: '7.3'
        title: Competitive Risks
        blocks:
          - type: paragraph
            body: |
              Antora's competitive risk is meaningful but differentiated. The direct thermal storage competitive
              set includes Rondo Energy (firebrick resistive heating), Electrified Thermal Solutions (brick heating,
              MIT spinout), Kyoto Group (molten salt, Norwegian company with European deployments), and Malta Inc.
              (heat-pump thermal storage, Google/X spinout) [CR021]. Among these, Rondo represents the most
              immediate competitive threat: Rondo has publicly announced named customer deployments in food and
              beverage manufacturing, giving it a credibility advantage in commercial proof that Antora currently
              lacks [CR022]. Rondo has also raised substantial financing, most recently in a well-publicized round
              supported by strategic investors [CR023].

              Electrified Thermal Solutions (ETS) poses a differentiated competitive risk: its brick-based approach
              targets higher temperatures than Antora's current commercial range (375°C), potentially capturing
              the highest-emitting industrial customers (cement, glass, steel) before Antora's high-temperature
              product reaches commercial readiness [CR024]. If ETS achieves commercial scale at >500°C before
              Antora's high-temperature program delivers, Antora's addressable market would be constrained to
              mid-temperature applications until it can close this technical gap.

              More broadly, large industrial OEMs (Siemens Energy, GE Vernova, ABB) that currently supply
              conventional fired heaters and steam generators could enter the electrification market with bolt-on
              thermal storage solutions, leveraging existing customer relationships to displace new entrants [CR025].
              Competitive risk is bounded for Antora's TPV technology by the world's-only dedicated TPV manufacturing
              line and demonstrated >40% efficiency moat, but this advantage is time-bounded: a well-funded competitor
              with 3–5 years of TPV R&D investment could close the efficiency gap [CR026].
            claimRefs:
              - CR021
              - CR022
              - CR023
              - CR024
              - CR025
              - CR026
