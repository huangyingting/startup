      - number: '4.2'
        title: Unit economics and cost structure
        blocks:
          - type: paragraph
            body: |
              Antora's unit economics center on three primary cost drivers: (1) the input cost of renewable
              electricity purchased to charge the thermal storage modules; (2) the manufactured cost of the
              carbon block thermal battery modules themselves (the physical storage medium and enclosure);
              and (3) installation, operations, and maintenance (O&M) costs over the contract lifetime.
              Renewable electricity purchase price is the dominant variable cost and the key lever in
              Antora's financial model. The cheaper the electricity Antora can purchase—whether from
              behind-the-meter renewables, grid-scale PPAs, or renewable energy certificates—the lower
              Antora's effective COGS per GJ of heat delivered and the higher the gross margin on each
              energy service contract. At current US utility-scale solar costs of approximately $20–40/MWh
              and typical industrial heat conversion ratios, the direct input energy cost per GJ of heat
              delivered is roughly $6–14, creating very thin or negative gross margin at current electricity
              prices for customers in high-electricity-cost regions. Achieving positive unit economics at
              scale requires either: (a) very cheap renewable electricity (direct wire, behind-meter, or
              sub-$20/MWh PPAs); or (b) a significant premium from the dual heat+electricity output of the
              TPV system; or (c) both.
              Module manufacturing cost is the second major driver. Antora has three factories (San Jose CA,
              Big Stone City SD, St. Mary's PA) and the module cost follows a manufacturing learning curve
              as production volume increases. Current per-module manufacturing cost is not publicly disclosed;
              comparable energy hardware learning curves suggest significant room for cost reduction as
              Antora scales from hundreds of MWh/year to GWh/year production capacity. Installation costs
              at industrial sites vary by customer facility configuration and are not publicly disclosed.
              O&M costs include carbon block replacement cadence, TPV cell maintenance, and site support;
              Antora has not disclosed O&M terms or costs publicly. No gross margin, EBITDA, payback period,
              or return on invested capital has been disclosed for any Antora deployment. These are material
              gaps that prevent underwriting of unit economics from public information alone.
            claimRefs:
