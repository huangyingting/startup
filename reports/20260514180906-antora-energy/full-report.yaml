      - number: '2.5'
        title: Exhibits
        blocks:
          - type: callout
            title: Large market with structural tailwinds
            body: >-
              The global market for industrial process heat exceeds $700B annually, and the electrifiable portion
              addressable by Antora's current product represents $150–280B globally. Structural tailwinds—falling
              renewable prices, corporate net-zero mandates, and AI-driven data center thermal growth—create a
              compelling near-term adoption window without requiring regulatory change.
            calloutType: strength
            claimRefs:
              - CM007
              - CM008
              - CM022
          - type: callout
            title: Regulatory constraints could delay adoption timeline
            body: >-
              Electricity tariff structures and interconnection rules in many US jurisdictions were not designed for
              behind-the-meter thermal storage. This regulatory mismatch is the single most-cited constraint by Antora
              itself, and resolution depends on utility commission proceedings that move slowly. The market timing risk
              is that addressable market remains large but deployable market is smaller until regulatory barriers are
              resolved.
            calloutType: risk
            claimRefs:
              - CM026
              - CM027
          - type: callout
            title: No independent market research with Antora-specific boundaries found
            body: >-
              No single third-party market research report uses Antora's exact product boundary (100–375°C electrified
              industrial thermal storage). All market size estimates in this chapter are bottom-up calculations using
              IEA, EIA, and DOE industrial heat data combined with temperature-fraction assumptions. Investors should
              treat TAM and SAM figures as directional estimates with wide confidence intervals, not as validated
              commercial market forecasts.
