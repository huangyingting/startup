      - number: '1.5'
        title: Adverse signals, risks, and diligence gaps
        blocks:
          - type: paragraph
            body: >
              Antora Energy faces several material risks and diligence gaps that a prospective investor must weigh

              against its compelling technology narrative and strong investor backing. The most operationally
              significant

              risk is regulatory: Antora itself has highlighted through a February 2026 Utility Dive op-ed and a

              December 2025 article that electricity tariff structures, interconnection rules, and metering regulations

              were not designed for behind-the-meter thermal storage systems. The headline "Thermal batteries are ready.

              Our electricity rules are not." directly acknowledges that market adoption could be bottlenecked by
              utility

              and regulatory policy rather than technology performance. This regulatory barrier risk is independently

              confirmed by industry analysts and represents a systemic, not company-specific, challenge. Financial

              transparency is limited: as a private company at early commercial stage, Antora has not disclosed revenue,

              gross margin, customer names, contract terms, or detailed unit economics. The total raised figure of more

              than $230M is confirmed from the official press release, but the current equity valuation is undisclosed

              and unicorn status cannot be confirmed or denied from public sources. Capital intensity is a structural

              concern: building and deploying modular thermal battery systems at scale requires significant upfront

              capital expenditure from both Antora and its customers or energy service contract providers. Technology

              scale-up risk remains for the TPV heat-to-power capability, which is in development at full commercial

              scale as of the diligence date. Customer concentration risk is unknown—the company references working

              with some of the world's biggest industrial facilities but has not publicly named any commercial

              customers. The combined exposure of regulatory headwinds, early commercial stage, capital intensity, and

              financial opacity warrants careful scrutiny in follow-on diligence conversations with management.
