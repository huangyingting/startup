  - number: 3
    title: Competitors
    sections:
      - number: '3.1'
        title: Competitive landscape and sector overview
        blocks:
          - type: paragraph
            body: |
              The electrified industrial thermal energy storage (ETES) sector is small but growing rapidly as
              industrial decarbonization becomes a strategic priority. As of May 2026, the sector includes
              fewer than ten startups with serious commercial traction globally; most are early-stage with their
              first or second commercial deployments completed in the 2022–2025 period. The four most directly
              comparable competitors to Antora are: Rondo Energy (refractory brick storage, California-based,
              targeting 1100–1500°C); Electrified Thermal Solutions (ETS, conductive firebrick storage to 1800°C,
              MIT spinout); Kyoto Group with its Heatcube product (molten salt storage, Norway-based,
              commercially deployed in Europe); and Malta Inc. (steam-based heat pump with first commercial
              deployment in Texas). Each uses a different storage medium and serves a different temperature
              range or geography from Antora's current commercial product.
              Beyond these direct ETES peers, Antora also competes against: (1) the status quo of natural gas
              combustion for industrial heat; (2) direct electric heating technologies such as electric boilers
              and heat pumps which can serve lower-temperature applications; (3) green hydrogen combustion as
              a potential Scope 1 decarbonization pathway for high-temperature heat; (4) biomass or bioenergy
              systems in regions with feedstock availability; and (5) industrial-scale demand response programs
              that manage energy timing without storage. The ETES sector is unlikely to see a winner-take-all
              outcome because temperature requirements, geography, and industrial process specifics create
              natural segmentation. Antora's focus on the 100–375°C range with a US-made product positions it
              in a defensible niche, but the addressable temperature overlap with some competitors (particularly
              in the lower range) creates direct competition for certain customer segments.
            claimRefs:
