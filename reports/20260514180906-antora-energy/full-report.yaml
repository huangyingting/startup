            body: |
              The most significant gap in Antora's customer case is the complete absence of publicly named customers
              as of May 2026 [CU002][CU017]. Despite deploying its first commercial-scale thermal battery in 2023
              and raising $150 million in Series B financing in August 2024 with investor references to growing
              customer pipeline, Antora has not publicly identified a single customer by name [CU003][CU032].

              The indirect evidence for active commercial deployments is credible but thin. First, job postings for
              plant technicians in Big Stone City, South Dakota and St. Mary's, Pennsylvania suggest active project
              sites beyond the original 2023 deployment [CU004][CU005][CU013]. Second, the company's Series B press
              release referenced targeting "billions of dollars of zero-emissions energy delivery," implying a pipeline
              well beyond a single site [CU006]. Third, the company has publicly described working with "some of the
              world's biggest industrial facilities" — a phrase consistent with Fortune 500 industrial operators but
              unverifiable without disclosure [CU016].

              For comparison, competitor Rondo Energy has publicly named customer deployments in food and beverage
              manufacturing, providing a benchmark for what commercial validation disclosure looks like in this market
              [CU011][CU015]. The absence of equivalent disclosure at Antora is either a result of customer
              confidentiality requirements, deliberate competitive strategy, or an indication that deployment scale
              remains limited. Investors cannot independently assess commercial traction without named references,
              and the absence of third-party customer proof leaves evaluation heavily dependent on company-provided
              narrative [CU012][CU024].
