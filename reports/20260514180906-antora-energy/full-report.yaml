      - number: '7.4'
        title: Financial, Execution, and Key-Person Risks
        blocks:
          - type: paragraph
            body: |
              Antora's business model is fundamentally capital-intensive. Each thermal battery project requires
              significant upfront capital for module manufacturing, civil construction, and grid interconnection
              before any revenue is recognized. Project finance arrangements (similar to those used in renewable
              energy project development) are likely required for large installations, creating dependency on
              the health of clean energy capital markets and lender comfort with first-of-kind technology [CR027].
              If interest rates remain elevated or climate tech project finance tightens, Antora's project
              development pipeline could slow materially [CR028].

              Antora's total funding exceeds $230M but the company has not disclosed revenues, gross margins,
              or cash runway. With ~249 employees and the cost structure of a manufacturing and project
              development company, monthly cash burn is likely substantial, possibly $3–8M per month [CR029].
              At the high end, this implies a burn runway under 3 years from the Series B close (August 2024),
              making a Series C raise a likely necessity by late 2026 or 2027 [CR030].

              Key-person risk is elevated: all three co-founders (Andrew Ponec, Justin Briggs, and David Bierman)
              hold C-suite roles, and the company's core technology (TPV, carbon thermal storage) is deeply tied
              to their research heritage [CR031]. Loss of any founder — particularly the CEO or TPV-focused
              co-founder — would likely trigger investor concern and could slow customer procurement processes
              that rely on founder-level relationship selling at the executive level [CR032]. There are no
              public signals of executive succession planning or independent board leadership that would
              buffer against this risk [CR033].
            claimRefs:
              - CR027
              - CR028
