      - number: '3.5'
        title: Exhibits
        blocks:
          - type: callout
            title: Unique TPV heat-to-power capability with no direct replication identified
            body: >-
              Antora is the only reviewed ETES competitor with a dedicated TPV cell manufacturing line and demonstrated
              greater than 40% heat-to-power efficiency. This dual heat-and-power output (HeatToPower) enables a system
              that serves both thermal and electrical demand from a single installation—a product capability that could
              command premium pricing and improve customer project economics beyond heat-only competitors.
