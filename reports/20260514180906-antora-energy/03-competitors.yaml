      type: inferred
      topic: competitive-moat
      sourceRefs: [SP007, SP009]
      confidence: medium
      freshness: current
      answersQuestionRefs: [QP025]

    - id: CP025
      statement: >-
        Antora's carbon block storage medium is an abundant commodity; any competitor could procure the same
