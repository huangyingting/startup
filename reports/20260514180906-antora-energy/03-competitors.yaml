callouts:
  - calloutType: strength
    title: Unique TPV heat-to-power capability with no direct replication identified
    body: >-
      Antora is the only reviewed ETES competitor with a dedicated TPV cell manufacturing line and
      demonstrated greater than 40% heat-to-power efficiency. This dual heat-and-power output (HeatToPower)
      enables a system that serves both thermal and electrical demand from a single installation—a product
      capability that could command premium pricing and improve customer project economics beyond
      heat-only competitors.
    claimRefs:
      - CP004
      - CP003
      - CP016

  - calloutType: risk
    title: Carbon block storage medium is a commodity with no exclusivity
    body: >-
      Unlike Rondo's refractory brick or ETS's proprietary firebrick, Antora's carbon block medium is an
      abundant industrial commodity. Any competitor could procure the same material; competitive advantage
      must therefore come from manufacturing processes, system integration, and TPV technology rather
      than from material exclusivity. If manufacturing processes are not effectively protected by IP,
      commoditization risk is material.
    claimRefs:
      - CP025
      - CP024

  - calloutType: insight
    title: Limited competitive pricing data available; all ETES pricing is contract-confidential
    body: >-
      No reviewed ETES competitor publishes a list price for industrial thermal storage. All pricing is
      project-specific and governed by energy service contracts. The only pricing benchmark available is
      the industrial natural gas market at $5–15/MMBtu, which all ETES players must beat on total cost
      of heat delivery to win contracts. Independent verification of Antora's pricing competitiveness
      relative to Rondo or other peers is not possible from public sources.
    claimRefs:
      - CP017
      - CP018
      - CP019

