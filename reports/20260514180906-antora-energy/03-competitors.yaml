  claims:
    - id: CP001
      statement: >-
        The ETES sector as of May 2026 includes fewer than ten startups with serious commercial traction
        globally, most at an early commercial stage with first or second deployments in the 2022–2025 period.
      type: inferred
      topic: competitive-landscape
      sourceRefs: [SP001, SP002, SP003, SP004]
      confidence: medium
      freshness: current
      answersQuestionRefs: [QP001]

    - id: CP002
      statement: >-
        Antora's current commercial product operates in the 100–375°C range, which creates minimal direct
        overlap with Rondo (1100–1500°C), ETS (up to 1800°C), and partial overlap with Kyoto Group and Malta.
      type: company-claimed
      topic: competitive-positioning
      sourceRefs: [SP005, SP001]
      confidence: high
      freshness: current
      answersQuestionRefs: [QP002]

    - id: CP003
      statement: >-
        Antora's thermophotovoltaic (TPV) heat-to-power capability is a feature unique among reviewed ETES
        competitors; no other major ETES player has disclosed a commercial TPV integration.
      type: inferred
      topic: differentiation
      sourceRefs: [SP005, SP001, SP002, SP003, SP004]
      confidence: high
      freshness: current
      answersQuestionRefs: [QP009]

    - id: CP004
      statement: >-
        Antora built the world's first dedicated TPV cell manufacturing line in 2023 and demonstrated greater
        than 40% heat-to-power conversion efficiency; this capability enables dual heat and electricity output
        from a single thermal battery system.
      type: company-claimed
      topic: differentiation
      sourceRefs: [SP005, SP006]
      confidence: high
      freshness: recent
      answersQuestionRefs: [QP009, QP013]

    - id: CP005
      statement: >-
        The ETES sector is unlikely to produce a winner-take-all outcome because temperature requirements,
        geography, and industrial process specifics create natural segmentation among competing technologies.
      type: inferred
      topic: market-structure
      sourceRefs: [SP009, SP010]
      confidence: medium
      freshness: current
      answersQuestionRefs: [QP022]

    - id: CP006
      statement: >-
        Status-quo substitutes for Antora include: natural gas combustion (lowest CapEx), direct electric
        heating, green hydrogen combustion, biomass systems, and industrial demand response programs.
      type: inferred
      topic: substitutes
      sourceRefs: [SP006, SP022]
      confidence: medium
      freshness: current
      answersQuestionRefs: [QP003]

    - id: CP007
      statement: >-
        Industrial customers evaluating thermal storage alternatives use industrial natural gas prices as
        their reference point; all ETES competitors must deliver heat below the total cost of gas plus carbon.
      type: inferred
      topic: pricing-baseline
      sourceRefs: [SP005, SP013]
      confidence: medium
      freshness: current
      answersQuestionRefs: [QP012]

    - id: CP008
      statement: >-
        Rondo Energy uses refractory brick as its storage medium, targets the 1100–1500°C temperature range,
        claims 98% electrical-to-heat conversion efficiency, and has announced commercial deployments exceeding
        400 MWh of installed capacity with partnerships totaling over 3 GWh of future projects.
      type: third-party-reported
      topic: competitor-rondo
      sourceRefs: [SP001, SP021]
      confidence: medium
      freshness: current
      answersQuestionRefs: [QP004, QP021]

    - id: CP009
      statement: >-
        Rondo Energy is backed by Energy Impact Partners (EIP) and has focused on partnerships with biofuels
        producers and industrial facilities that need very high-temperature heat above Antora's current range.
      type: third-party-reported
      topic: competitor-rondo
      sourceRefs: [SP001, SP018]
      confidence: medium
      freshness: current
      answersQuestionRefs: [QP004]

    - id: CP010
      statement: >-
        Rondo's primary advantage relative to Antora is proven commercial deployment at larger announced
        scale (400 MWh+); its limitation is its absence of heat-to-power capability and focus on temperatures
        above Antora's current commercial product range.
      type: inferred
      topic: competitor-rondo
      sourceRefs: [SP001, SP011]
      confidence: medium
      freshness: current
      answersQuestionRefs: [QP004]

    - id: CP011
      statement: >-
        Rondo Energy's announced 3 GWh in partnerships represents a larger publicly disclosed commercial
        pipeline than Antora's; however, Antora has not publicly disclosed its own pipeline size.
      type: inferred
      topic: competitor-rondo
      sourceRefs: [SP001, SP011]
      confidence: low
      freshness: current
      answersQuestionRefs: [QP021]

    - id: CP012
      statement: >-
        Electrified Thermal Solutions is an MIT spinout using conductive firebrick storage to achieve
        temperatures up to 1800°C, backed by strategic industrials Holcim, Vale, and ArcelorMittal.
      type: third-party-reported
      topic: competitor-ets
      sourceRefs: [SP002, SP016]
      confidence: medium
      freshness: current
      answersQuestionRefs: [QP005]

    - id: CP013
      statement: >-
        Kyoto Group's Heatcube product uses molten salt as its storage medium and has been commercially
        deployed in Europe in partnership with Aalborg Forsyning, KALL Ingredients, and Iberdrola.
      type: third-party-reported
      topic: competitor-kyoto
      sourceRefs: [SP003, SP020]
      confidence: medium
      freshness: current
      answersQuestionRefs: [QP006, QP023]

    - id: CP014
      statement: >-
        Malta Inc. uses a steam-based heat pump approach at 300–550°C and completed its first commercial
        deployment at the Proman methanol plant in Pampa, Texas; Malta's heat pump model does not require
        cheap electricity to charge, differentiating it from storage-first competitors.
      type: third-party-reported
      topic: competitor-malta
      sourceRefs: [SP004, SP017]
      confidence: medium
      freshness: recent
      answersQuestionRefs: [QP007, QP024]

    - id: CP015
      statement: >-
        ETS's backing from strategic industrials—Holcim (cement), Vale (mining), ArcelorMittal (steel)—
        provides more direct customer channel potential for high-temperature applications than Antora's
        primarily financial investor base, though Antora has BHP Ventures for mining exposure.
      type: inferred
      topic: competitive-comparison
      sourceRefs: [SP002, SP016, SP008]
      confidence: medium
      freshness: current
      answersQuestionRefs: [QP019]

    - id: CP016
      statement: >-
        Antora uses energy service contracts priced in dollars per GJ or dollars per MWh of delivered heat
        and electricity; Rondo has indicated a per-GJ heat pricing model; no other ETES competitor has
        publicly disclosed its pricing mechanism.
      type: company-claimed
      topic: pricing
      sourceRefs: [SP006, SP001]
      confidence: medium
      freshness: current
      answersQuestionRefs: [QP010, QP011]

    - id: CP017
      statement: >-
        No reviewed ETES competitor has published a list price for industrial thermal storage; all ETES
        pricing is project-specific and governed by energy service contracts.
      type: inferred
      topic: pricing-transparency
      sourceRefs: [SP001, SP002, SP003, SP004]
      confidence: high
      freshness: current
      answersQuestionRefs: [QP011]

    - id: CP018
      statement: >-
        The benchmark for all ETES pricing is industrial natural gas at $5–15 per MMBtu (roughly $5–14/GJ)
        in the US industrial market; all ETES competitors must beat this on total cost of heat delivery.
      type: inferred
      topic: pricing-baseline
      sourceRefs: [SP006, SP013]
      confidence: medium
      freshness: current
      answersQuestionRefs: [QP012]

    - id: CP019
      statement: >-
        Malta Inc. has not disclosed any pricing or performance details from its first commercial deployment
