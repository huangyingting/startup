      type: inferred
      topic: competitive-moat
      sourceRefs: [SP005, SP012]
      confidence: medium
      freshness: current
      answersQuestionRefs: [QP013]

    - id: CP024
      statement: >-
        The manufacturing processes, thermal management design, and module integration expertise accumulated
