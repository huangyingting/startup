      type: inferred
      topic: competitor-pricing
      sourceRefs: [SP004, SP017]
      confidence: medium
      freshness: current
      answersQuestionRefs: [QP024]

    - id: CP020
      statement: >-
        Antora's energy-as-a-service model shifts upfront capital expenditure to Antora's balance sheet,
        which is a pricing structure advantage over a pure hardware sale model because it lowers the
        customer's upfront investment requirement.
      type: company-claimed
      topic: pricing-advantage
      sourceRefs: [SP006, SP008]
      confidence: medium
      freshness: current
      answersQuestionRefs: [QP010]

    - id: CP021
      statement: >-
        With more than $230M in total disclosed funding, Antora is better capitalized than most ETES peers
        except Rondo, which is similarly well-funded through Energy Impact Partners; ETS funding from
        strategic industrials is undisclosed.
      type: inferred
      topic: funding-comparison
      sourceRefs: [SP008, SP018, SP015]
      confidence: low
      freshness: current
      answersQuestionRefs: [QP017]

    - id: CP022
      statement: >-
        Antora's three-factory US manufacturing network (San Jose CA, Big Stone City SD, St. Mary's PA)
