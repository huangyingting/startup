        domestic manufacturing footprint.
      type: inferred
      topic: manufacturing-moat
      sourceRefs: [SP007, SP001, SP003]
      confidence: medium
      freshness: current
      answersQuestionRefs: [QP014]

    - id: CP023
      statement: >-
        Antora's TPV manufacturing line represents a first-mover advantage in integrating heat-to-power
