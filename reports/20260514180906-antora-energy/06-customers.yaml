callouts:
- calloutType: risk
  title: No Named Customers — The Critical Traction Gap
  body: 'Antora has not publicly identified a single named customer as of May 2026, despite deploying its first commercial
    system in 2023 and raising $230M+ in total financing. This is the single most material commercial risk in the investment
    case. Without named customer proof, the commercial traction narrative depends entirely on company-provided statements
    that cannot be independently verified.

    '
  claimRefs:
  - CU002
  - CU012
  - CU024
- calloutType: insight
  title: Industrial O&M Contracts Create Structural Retention Advantage
  body: 'While no retention data is available, Antora''s site-integrated turnkey O&M model creates high structural switching
    costs. Once a thermal battery is integrated into a customer''s process heat system, replacement requires major capital
    investment and production disruption. This architecture implies high retention for any successfully commissioned site.

    '
  claimRefs:
  - CU030
  - CU034
- calloutType: insight
  title: 'Data Center Segment: Fastest-Growing Opportunity'
  body: 'The AI-driven surge in data center power demand is creating a new and potentially large customer segment for Antora.
    Data centers need both cooling and backup power — both addressable by Antora''s HeatToPower system. This segment did not
    exist as a material opportunity at Antora''s founding, validating the scalability of the carbon thermal battery platform.

    '
  claimRefs:
  - CU009
  - CU029
