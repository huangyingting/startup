company:
  name: Antora Energy
chapter:
  number: 6
  title: Customers
  summary: 'As of May 2026, Antora Energy has not publicly named any customers despite deploying its first commercial-scale
    thermal battery in 2023. The evidence base for commercial traction consists of indirect signals: job postings listing
    plant technician roles in Big Stone City, South Dakota and St. Mary''s, Pennsylvania; the company''s own reference to
    "some of the world''s biggest industrial facilities"; and a Series B reference to targeting delivery of "billions of dollars
    of zero-emissions energy." Target sectors include food and beverage, chemicals, renewable fuels, mining, data centers,
    concrete/lime, pulp/paper, and refining. The absence of named customer proof is the single most material evidence gap
    in Antora''s commercial case, though industrial O&M contract structures imply high retention for any deployed system.

    '
sections:
- id: USEC01
  title: Customer Segments and Target Market Coverage
  body: 'Antora Energy targets industrial manufacturers with continuous process heat requirements at temperatures

    between 100°C and 375°C. This temperature range encompasses a broad set of US and global industrial

    sectors including food and beverage processing, specialty chemicals, renewable fuels production, pulp and

    paper manufacturing, concrete and lime production, mining operations, and petroleum refining [CU001][CU010].

    The company also identifies data centers as an emerging customer segment, particularly given the surge in

    AI-driven electricity demand and the tech sector''s decarbonization commitments as of 2026 [CU009][CU029].


    Antora''s addressable market is concentrated in heavy industry — sectors characterized by 24/7 heat demand,

    long equipment life cycles, and established capital procurement processes. Industrial buyers in these sectors

    typically evaluate major capital expenditures over 12–36 month timelines, requiring extensive engineering

    studies, financial modeling, and internal approval processes before committing to a new energy system [CU008].

    This conservative procurement dynamic is both a barrier to rapid customer acquisition and a source of

    competitive protection once a customer deploys: the same long evaluation process that delays the first sale

    also creates high switching costs post-deployment [CU014][CU030].


    Geographically, Antora''s initial focus is on the United States, with manufacturing and project sites

    in California, South Dakota, and Pennsylvania providing the strongest geographic signal [CU020][CU026].

    No international deployments have been publicly announced. The US industrial process heat market is

    one of the largest in the world, with the manufacturing sector consuming approximately 7.5 EJ of

    process heat annually at temperatures in Antora''s commercial range [CU031].

    '
