- id: USEC04
  title: Retention, Stickiness, and Contract Durability
  body: 'While no public retention data exists for Antora''s deployed systems, the structural characteristics

    of industrial thermal battery installations strongly imply high retention rates for any commissioned

    system. The turnkey O&M model embeds Antora deeply in customer operations: the company handles

    ongoing maintenance, monitoring, and performance optimization, creating an ongoing service relationship

    that is difficult and costly to terminate [CU030][CU034].


    The site-specific nature of thermal battery installations — requiring civil construction, custom heat

    transfer integration, and facility-specific dispatch optimization — means switching costs are

    extremely high once deployed. A customer that has integrated Antora''s heat delivery into their process

    cannot simply replace it without significant capital expenditure and production disruption [CU025].

    This structural stickiness is analogous to industrial equipment OEM relationships in capital-intensive

    industries such as chemicals and food processing, where equipment replacement cycles span 10–25 years.


    No public NRR, GRR, churn rate, or contract renewal data exists for Antora as of 2026, representing

    a material evidence gap. The first deployment site (operational since 2023) remains active per company

    communications — providing at least 2-year retention evidence — but this is a single data point [CU023][CU033].

    Investors should request contract duration, renewal terms, and termination provisions as part of commercial

    due diligence.

    '
  claimRefs:
  - CU023
  - CU025
  - CU030
  - CU033
  - CU034
