companyProfile:
  summary: Antora Energy is a San Jose, CA-based deep-tech startup developing a solid-carbon thermal battery that stores low-cost renewable electricity as heat in graphite blocks heated to above 2000°C, then delivers industrial process heat (100–375°C) and peak electricity via thermophotovoltaic cells with >40% efficiency. The company targets industrial manufacturers who need to decarbonize high-temperature heat — a market segment largely unreachable by conventional batteries or heat pumps. Antora has raised >$230M from a strong investor syndicate led by Decarbonization Partners (BlackRock/Temasek JV) and NextEra Energy Resources, but has not disclosed named customers or commercial revenue.
  foundedDate: '2018-01-01'
  founders:
    - name: Andrew Ponec
      role: CEO
      background: Primary external spokesperson; drives fundraising, strategy, and commercial partnerships.
      claimRefs: [CO009, CO010]
    - name: Justin Briggs
      role: COO
      background: Ph.D. co-founder; oversees operations and manufacturing scale-up.
      claimRefs: [CO009]
    - name: David Bierman
      role: CCO
      background: Ph.D. co-founder; drives commercial strategy and customer development.
      claimRefs: [CO009]
  foundingLocation: San Jose, California, USA
  headquarters: San Jose, California
  productSummary: Thermal energy storage system using solid carbon (graphite) heated to 2000°C+, delivering industrial process heat at 100–375°C and electricity via thermophotovoltaic conversion. Each module provides 300 kWth thermal output, charges at up to 900 kWe, and is designed for a 20+ year lifetime.
  customerFocus: Energy-intensive industrial manufacturers needing process heat decarbonization — cement, steel, chemicals, food and beverage, and other high-heat industries.
  businessModel: Energy-as-a-Service (EaaS) subscription model; Antora retains ownership of installed modules and charges per unit of heat or electricity delivered, targeting below the cost of industrial natural gas.
  stage: Series B
  fundingStatus: Last disclosed round was $150M Series B in August 2024 at an undisclosed valuation, led by Decarbonization Partners (BlackRock/Temasek); total raised exceeds $230M.
