- id: founders-leadership
  title: Founders, leadership team, and organizational depth
  body: 'Antora Energy was co-founded by Andrew Ponec (CEO), Justin Briggs Ph.D. (COO), and David Bierman Ph.D.

    (CCO). Early press coverage identified Ponec and Briggs as the primary founding pair, while the company''s

    own website lists all three as founders. Ponec serves as CEO and is the primary external voice of the

    company for fundraising, investor communications, and policy engagement. Briggs, holding a doctorate and

    serving as COO, provides scientific and operational depth. Bierman as Chief Commercialization Officer

    bridges the technology development and revenue generation functions. LinkedIn data as of May 2026 places the

    company in the 201-500 employee range with approximately 249 disclosed connections on the platform. The

    company posted open roles in San Jose, CA; Big Stone City, SD; St. Mary''s, PA; and remote field engineering

    positions as of April 2026, indicating active geographic expansion of the workforce to match manufacturing

    scale-up. Antora''s culture page emphasizes an interdisciplinary team spanning thermal engineering, power

    electronics, manufacturing, and commercial development. The founding team''s technical credentials are a core

    diligence strength: each founder brings scientific depth relevant to the core product challenge. Key-person

    dependency on the founding trio—particularly Ponec as the primary fundraising and external communications

    lead—represents a governance concentration risk, especially given the company''s early commercial stage and

    absence of disclosed succession planning documentation. The company has not publicly disclosed a full board

    composition or detailed organizational chart beyond the founding team and a small set of executives

    referenced in news coverage.

    '
