company:
  name: Antora Energy
chapter:
  number: 1
  title: Company Overview
  summary: Antora Energy is a San Jose-based industrial thermal energy storage company founded in 2018 that converts cheap
    renewable electricity into high-temperature heat stored in solid carbon blocks, delivering carbon-free process heat and
    electricity to industrial facilities. The company raised a $150M Series B in August 2024 led by Decarbonization Partners,
    bringing total disclosed funding to more than $230M, and expanded US manufacturing to three facilities by April 2026.
    Revenue and valuation remain undisclosed; the company is at an early commercial stage with its first deployment completed
    in 2023.
sections:
- id: identity-mission
  title: Identity, mission, and business model
  body: 'Antora Energy is a US-based industrial decarbonization company headquartered at 2350 Zanker Road, San Jose,

    California 95131, with a secondary operational address at 1244 Reamwood Avenue, Sunnyvale, CA 94089. The

    company''s core thesis is that the cheapest form of new electricity generation—intermittent wind and solar—can

    be converted into stored thermal energy using carbon blocks, then dispatched as process heat or electricity to

    industrial customers on demand. Antora''s product is a modular thermal battery system rated at 300 kWth per

    module, capable of delivering heat in the 100–375°C range that covers a broad swath of industrial processes

    including food and beverage, chemicals, pulp and paper, and minerals refining. The company operates under the

    brand domain antora.com and describes its mission as decarbonizing industrial heat, which accounts for

    roughly 15% of global greenhouse gas emissions according to Decarbonization Partners. Industry as a whole

    accounts for approximately 30% of global emissions per the Rocky Mountain Institute. Antora''s business model

    combines hardware sales of thermal battery modules with long-term energy service contracts, positioning the

    company as a vertically integrated operator that handles site identification, power supply procurement,

    project financing, installation, and ongoing operations and maintenance. This energy-as-a-service model is

    designed to reduce upfront capital barriers for industrial customers while generating recurring revenue

    streams for Antora. The company is at Series B stage, backed by prominent climate-tech and strategic

    investors, and expanded from a single manufacturing facility in San Jose to three US production sites by

    April 2026 with an ambition to build gigawatt-hours each year of thermal storage capacity.

    '
