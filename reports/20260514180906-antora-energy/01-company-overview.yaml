- id: funding-investors
  title: Funding history, investors, and capital structure
  body: 'Antora Energy has raised more than $230 million in total funding as stated in its official Series B press

    release published on August 13, 2024. The Series B round was $150 million, led by Decarbonization Partners,

    a joint venture between BlackRock and Temasek specifically established to invest in decarbonization

    technologies at scale. New investors in the Series B included Emerson Collective—the philanthropic and

    investment organization founded by Laurene Powell Jobs—GS Futures (Goldman Sachs'' sustainability-focused

    investment arm), The Nature Conservancy, and a subsidiary of NextEra Energy Resources LLC, one of the

    world''s largest renewable energy producers. Existing investors that participated in the Series B included

    Trust Ventures, Lowercarbon Capital, Breakthrough Energy Ventures, BHP Ventures, Overture VC, and Grok

    Ventures. The combination of strategic industrial investors such as BHP Ventures and NextEra Energy

    Resources, major climate funds including Breakthrough Energy Ventures and Lowercarbon Capital, and

    institutional capital from Decarbonization Partners creates a diverse investor base with aligned incentives

    around industrial decarbonization adoption. The company''s pre-Series B fundraising included a Series A

    closed in 2022—amount not publicly disclosed—plus earlier non-dilutive government grants from ARPA-E via

    the DAYS program, the NSF, the California Energy Commission, and the DOE Industrial Efficiency and

    Decarbonization Office. The company''s current valuation is not publicly disclosed, and Antora has not

    confirmed or denied unicorn status from any reviewed public source.

    '
