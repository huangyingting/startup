    customer friction and creates durable recurring revenue. The investor base includes a potential channel partner (NextEra),
    a potential industrial customer (BHP Ventures), climate-specialist VCs, and a $150M Series B led by the BlackRock-Temasek
    JV, providing both capital depth and strategic ecosystem access.
