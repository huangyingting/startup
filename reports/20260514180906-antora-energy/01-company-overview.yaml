  - CO033
  - CO034
- calloutType: insight
  title: No public revenue, valuation, or customer names disclosed
  body: As a private company at early commercial stage, Antora has not disclosed revenue, gross margin, customer names, contract
    terms, or equity valuation. The first commercial deployment was in 2023 and the company is still in early customer acquisition
    mode; independent verification of commercial traction is not possible from public sources alone. This warrants a focused
    management-level diligence request.
