  title: Regulatory bottleneck risk acknowledged by Antora itself
  body: Antora's own public communications, including a February 2026 Utility Dive op-ed, acknowledge that current electricity
    market tariff structures and metering regulations were not designed for behind-the-meter thermal storage. This regulatory
    mismatch could delay adoption and constrain addressable market even if the technology performs as claimed.
