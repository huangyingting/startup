  topStrengths:
    - >-
      Best-in-class fundraising ($230M+) from strategic industrials (NextEra Energy Resources, BHP Ventures) and top
      climate VCs (Breakthrough Energy Ventures, Decarbonization Partners).
    - >-
      Proprietary thermophotovoltaic technology with >40% demonstrated efficiency sets a credible technical moat against
      competitors using lower-efficiency approaches.
    - >-
      Manufacturing build-out underway at three sites (San Jose CA, Big Stone City SD, St. Mary's PA), demonstrating
      deployment seriousness and government confidence.
  topRisks:
    - >-
      No named customers or commercial revenue disclosed; the company remains in pre-commercial demonstration phase,
      creating binary deployment risk.
    - >-
      Hardware deep-tech at scale is capital-intensive; if the Series C market contracts or first customer deployments
      underperform, the runway compresses sharply.
    - >-
      Thermal-battery IP and first-mover advantage are not fully defensible — Rondo Energy, Electrified Thermal
      Solutions, Kyoto Group, and Malta Inc. all compete in adjacent segments with institutional backing.
  unresolvedGaps:
    - >-
      No named industrial customers confirmed; all commercial traction is inference from manufacturing site activity and
      investor statements.
    - >-
      Revenue, unit economics (LCOH), gross margin, and burn rate are entirely non-public; EaaS pricing vs. natural gas
      parity is unverified at commercial scale.
    - >-
      Post-money Series B valuation, liquidation preferences, and participation rights are undisclosed; entry price for
      Series C investors cannot be benchmarked.
    - >-
      ARPA-E DAYS grant amount and DOE conditional commitment status not publicly confirmed; government funding quality
      is uncertain.
