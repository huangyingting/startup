- id: ESEC02
  title: Product Architecture and Module Specifications
  body: 'The core commercial product is a modular, factory-built thermal battery. Each storage module delivers

    300 kWth of thermal output and accepts up to 900 kWe of charging power [CE003][CE004]. Plants are

    composed of multiple modules, enabling installations that scale from single-digit megawatts to

    gigawatt-scale deployments depending on customer process heat requirements [CE022]. The plant-level

    heat density is 10,900 kWth per acre (2.65 kWth/m²), allowing substantial industrial installations

    on typical industrial site footprints [CE020].


    Modules are factory-built and road-shippable, which reduces site construction timelines compared to

    field-fabricated alternatives and enables a consistent quality standard across deployments [CE023].

    The product architecture is designed for a turnkey customer experience: Antora handles site selection

    through operations and maintenance, reducing the burden on industrial customers who lack in-house

    energy storage expertise [CE021]. The modular architecture also means customers can start with a

    smaller initial installation and add modules as their process heat needs or budget allows. Antora

    offers 24/7 monitoring and AI-driven dispatch optimization software that maximizes renewable energy

    charging and minimizes energy cost over time [CE037]. This software layer is a differentiating

    capability that separates Antora from purely hardware-focused competitors.

    '
  claimRefs:
  - CE003
  - CE004
  - CE020
  - CE021
  - CE022
  - CE023
