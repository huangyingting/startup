- id: ESEC03
  title: Thermophotovoltaic Technology and HeatToPower System
  body: 'Antora''s thermophotovoltaic (TPV) technology is the most technically differentiated component of its

    system. TPV cells convert infrared radiation emitted by the hot solid carbon blocks directly into

    electricity, analogous to how solar photovoltaic cells convert visible light [CE011]. Antora

    demonstrated TPV efficiency exceeding 40% in 2023—a landmark result for the TPV field—and built the

    world''s first dedicated TPV manufacturing line in 2023 [CE009][CE010]. This is the only known purpose-built

    TPV production facility globally as of 2026, representing both a first-mover advantage and a

    manufacturing moat.


    The HeatToPower system combines TPV electricity generation with thermal output delivery, enabling

    simultaneous heat and electricity output from a single storage system [CE012]. This dual-output

    capability significantly expands Antora''s addressable customer base: facilities that need both

    process heat and on-site power—such as data centers and industrial plants with high electrical

    loads—can satisfy both from a single Antora installation. The HeatToPower system at full commercial

    scale remains in development as of 2026, but the TPV manufacturing line provides the physical

    production foundation [CE033][CE036]. The >40% TPV efficiency demonstrated is substantially above

    prior laboratory benchmarks for TPV cells, and represents a commercially significant advance if

    the performance can be maintained consistently across the manufacturing line [CE009].

    '
  claimRefs:
  - CE009
  - CE010
  - CE011
  - CE012
  - CE033
  - CE036
