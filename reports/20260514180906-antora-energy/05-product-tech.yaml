  title: World's Only Dedicated TPV Manufacturing Line
  body: 'Antora''s commissioning of the world''s first dedicated thermophotovoltaic manufacturing line in 2023, combined with
    >40% efficiency demonstration, is a technical and manufacturing moat that competitors cannot easily replicate. This positions
    Antora as the only company with an end-to-end solid carbon thermal battery and TPV co-generation capability.

    '
  claimRefs:
  - CE009
  - CE010
- calloutType: risk
  title: High-Temperature Products Remain in Development
  body: 'Antora''s current commercial product is limited to 100–375°C, which excludes the highest-emitting industrial sectors
    (cement, glass, steel). These markets require temperatures of 1,000–1,700°C and represent a separate R&D program with
    no disclosed commercial timeline. Failure to scale TPV and carbon heating to these temperatures would constrain Antora''s
    long-run total addressable market.

    '
  claimRefs:
  - CE014
  - CE036
- calloutType: insight
  title: No Critical Minerals or Rare Earths — A Supply Chain Structural Advantage
  body: 'Unlike lithium-ion batteries and many other clean energy technologies, Antora''s system requires no lithium, cobalt,
    nickel, or other critical minerals. This eliminates a major category of supply chain risk and geopolitical dependency,
    and makes the cost structure relatively stable over time.

    '
