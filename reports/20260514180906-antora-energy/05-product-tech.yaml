- id: ESEC04
  title: Manufacturing, Supply Chain, and San Jose Facility
  body: 'Antora operates a dedicated manufacturing facility in San Jose, California, opened in 2023 [CE016][CE017].

    This facility houses both module manufacturing and the world''s first dedicated TPV production line [CE010].

    The company is actively scaling to GWh-per-year production capacity, with the San Jose facility

    representing the first phase and two additional facilities announced in April 2026—in Big Stone City,

    South Dakota, and St. Mary''s, Pennsylvania [CE018][CE031].


    The supply chain for solid carbon is sourced from US coal communities, including Pennsylvania, which

    provides carbon feedstock from an industrial base with deep experience in carbon production [CE019].

    This sourcing strategy provides both supply chain resilience (domestic supply, established industrial

    suppliers) and a socioeconomic narrative around energy transition and community support. The carbon

    feedstock is chemically identical to materials used in the steel and aluminum industries for decades,

    meaning supply chain risk is low relative to novel critical mineral supply chains [CE015]. No

    rare earth elements or critical minerals are required for any part of the system [CE024]. The

    manufacturing expansion to South Dakota and Pennsylvania in 2026 signals that Antora is moving

    beyond the prototype/pilot phase into volume production [CE031][CE038].

    '
  claimRefs:
