company:
  name: Antora Energy
chapter:
  number: 5
  title: Product & Technology
  summary: 'Antora Energy has built a modular thermal battery that stores energy in resistively heated solid carbon blocks
    and delivers industrial process heat from 100–375°C, with a thermophotovoltaic (TPV) system that converts stored heat
    to electricity at demonstrated efficiencies exceeding 40%. Each module provides 300 kWth of thermal output with a 900
    kWe charging rate, a 20+-year design life, unlimited cycles, and no degradation. The solid carbon medium costs roughly
    one-tenth of lithium-ion on a per-energy basis, requires no critical minerals, and has centuries of industrial precedent.
    The world''s first dedicated TPV manufacturing line was commissioned in 2023. Higher-temperature variants for cement,
    glass, and steel remain in development, representing the key technical frontier and a significant future market expansion
    lever.

    '
sections:
- id: ESEC01
  title: 'Core Technology: Solid Carbon Thermal Energy Storage'
  body: 'Antora''s fundamental technology converts electricity—renewable, off-peak grid, or curtailed—into heat

    stored in solid carbon blocks through resistive heating. Carbon is the thermal storage medium of choice

    for several interdependent reasons: it costs roughly one-tenth as much as lithium-ion batteries per unit

    of stored energy [CE006], it is the fourth most produced industrial material globally with centuries of

    proven use in the steel and aluminum industries [CE007][CE015], it exhibits no thermal runaway risk at

    operating temperatures [CE030], and it achieves approximately four times the volumetric energy density

    of electrochemical batteries [CE008]. The solid state of the storage medium means there is no

    self-discharge, no degradation across unlimited charge-discharge cycles, and no rare earth or critical

    mineral dependencies [CE005][CE024][CE032].


    The charging subsystem applies electrical current to resistively heat the carbon blocks to high

    temperatures (above 375°C internally, with output heat delivered at 100–375°C in the current commercial

    product) [CE002]. Heat is extracted via a heat transfer subsystem and delivered to industrial process

    loads. A full plant installation integrates modules, power systems, grid interconnection, heat transfer

    equipment, balance of plant, civil infrastructure, controls software, 24/7 monitoring, and dispatch

    optimization algorithms [CE021]. The system design life exceeds 20 years, making it competitive with

    long-lived industrial capital assets such as fired heaters and process boilers [CE005].

    '
