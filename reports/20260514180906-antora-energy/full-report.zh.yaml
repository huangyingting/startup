      - number: '2.3'
        title: 客户分层、买方和采用路径
        blocks:
          - type: paragraph
            body: >
              Antora 的客户范围横跨多个工业细分市场，这些客户都有几个共同点：连续热能需求高、运营资本密集，并且减排 Scope 1 和 Scope 2
              的压力不断上升。食品饮料行业尤其适合作为早期市场：工厂需要连续过程热，温度完全落在 Antora 的 100–375°C 区间内；能源成本是重要运营开支；许多大型食品公司也公开承诺 2030–2040
              年净零目标。化工制造同样需要持续供热，能源预算也能支撑为脱碳供热支付溢价。纸浆和造纸厂通常 24/7 运转，热负荷高，储能调度能力尤其适合弥合可再生发电的间歇性。矿物精炼——包括 Antora 投资人 BHP
              Ventures 参与的业务——在矿石处理和选矿环节需要大量热量，且温度位于 Antora 覆盖范围内。数据中心是一个正在增长且可能快速推进的细分市场：AI
              驱动的算力扩张显著推高冷却负荷，数据中心运营商同时面对能源成本压力和 ESG 审视。各细分市场中的买方通常是工厂级能源负责人、运营 VP 或总工程师；由于项目规模较大，资本开支审批往往还需要 VP 或
              C-suite 签字。能源服务合同把前期 CapEx 转移到 Antora 资产负债表上，从而降低这一门槛。Antora
              公开材料中最常提到的采用触发因素，是可再生电价下降和碳成本上升的组合，为脱碳工业热创造有吸引力的 ROI。不过，工业场景的销售周期通常为 12–36
              个月，因为需要工程研究、许可、与公用事业公司谈判电价，以及完成资本预算流程。
