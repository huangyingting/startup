              不同于 Rondo 的耐火砖或 ETS 的专有耐火砖，Antora 的碳块介质是一种丰富的工业大宗商品。任何竞争对手都可以买到同样材料；因此，竞争优势必须来自制造流程、系统集成和 TPV
