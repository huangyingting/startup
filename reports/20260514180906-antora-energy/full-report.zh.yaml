      - number: '4.2'
        title: 单位经济模型与成本结构
        blocks:
          - type: paragraph
            body: >
              Antora
              的单位经济模型围绕三项主要成本驱动：（1）购买可再生电力为热储能模块充电的投入成本；（2）碳块热电池模块本身的制造成本（物理储能介质和外壳）；（3）合同期内的安装、运营和维护（O&M）成本。可再生电力采购价格是主导性可变成本，也是
              Antora 财务模型的关键杠杆。Antora 能买到的电越便宜——无论来自表后可再生能源、电网级 PPA，还是可再生能源证书——每 GJ 交付热量的有效 COGS
              就越低，每份能源服务合同的毛利率也越高。按当前美国公用事业级太阳能约 $20–40/MWh 的成本，以及典型工业热转换比，交付每 GJ 热量的直接输入能源成本大约为
              $6–14；在电价较高地区，以当前电价给客户供热时，毛利率会很薄，甚至为负。要在规模化后跑出正向单位经济模型，需要满足至少一个条件：（a）非常便宜的可再生电力（直连、表后或低于 $20/MWh 的
              PPA）；或（b）TPV 系统热+电双输出带来的显著溢价；或（c）两者兼具。

              模块制造成本是第二个主要驱动。Antora 拥有三家工厂（San Jose CA、Big Stone City SD、St. Mary's
              PA），随着产量提升，模块成本会沿制造学习曲线下降。当前单模块制造成本未公开披露；可比能源硬件学习曲线显示，Antora 从每年数百 MWh 扩到 GWh/year
              产能后，成本仍有显著下降空间。工业场址安装成本随客户设施配置而变，未公开披露。O&M 成本包括碳块更换节奏、TPV 电池维护和场址支持；Antora 未公开披露 O&M 条款或成本。公司未披露任何 Antora
              部署的毛利率、EBITDA、回本周期或投资资本回报率。仅靠公开信息无法承销单位经济模型，这是实质缺口。
