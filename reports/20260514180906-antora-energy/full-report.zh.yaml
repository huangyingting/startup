  - id: FV001
    title: 投资建议逻辑
    type: flow
    layout: wide
    summary: 市场、技术、客户验证、风险与估值信号如何汇成「观察」建议。
    approximationNotes: null
    claimRefs:
      - CV001
      - CV006
      - CV007
      - CV010
    data:
      nodes:
        - id: v1
          label: 市场：全球工业热能 >$400B，90%+ 仍靠化石燃料
          type: start
        - id: v2
          label: 技术：TPV 效率 >40%，自研制造构成护城河
          type: process
        - id: v3
          label: 客户验证：截至 Q2 2026，公开客户为零
          type: decision
        - id: v4
          label: 监管：电价壁垒未解（CEO 于 Dec 2025 承认）
          type: process
        - id: v5
          label: 资本：已融资 $230M；2026-2027 很可能需要 Series C
          type: process
        - id: v6
          label: 竞争：Rondo 已披露客户；ETS 瞄准更高温段
          type: process
        - id: v7
          label: 估值：Series B 隐含 ~$700-900M（估计）；定价押注执行兑现
          type: decision
        - id: v8
          label: 乐观：2026-27 披露 2+ 家客户 → 触发买入
          type: process
        - id: v9
          label: 悲观：到 2027 采用仍停滞 → 触发减持
          type: process
        - id: v10
          label: 建议：观察——对技术有信心，但商业证据还不足以支持买入
          type: end
      edges:
        - from: v1
          to: v2
          label: TAM 足够大
        - from: v2
          to: v3
          label: 技术强
