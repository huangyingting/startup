              全球工业过程热市场每年超过 $700B；Antora 当前产品可触达的可电气化部分，在全球范围内约为 $150–280B。结构性顺风——可再生电价下降、企业净零授权、AI
              驱动的数据中心热需求增长——在不依赖监管变化的情况下，也创造了有吸引力的近期采用窗口。
