      - number: '2.4'
        title: 增长驱动、约束和竞争动态
        blocks:
          - type: paragraph
            body: >
              Antora 所在市场最强的增长驱动，是可再生电力价格的结构性下降。过去十年，风电和太阳能光伏成本下降了 70–90%，低价可再生电力在许多地区越来越可得。再考虑到工业天然气价格仍然波动且偏高——尤其是 2022
              年欧洲能源危机之后——把低成本可再生电力锁定下来并存成热能，在经济性上开始变得有说服力。企业脱碳授权是第二个主要驱动：数百家大型工业公司承诺 Science Based Targets 或净零目标，需要深度削减
              Scope 1 排放，而过程热是工业运营中最后一批难脱碳环节之一。碳定价机制——无论是自愿市场、EU ETS
              等监管合规体系，还是美国正在出现的碳边境调节提案——都会进一步加大工业热脱碳的财务压力。数据中心需求可能带来阶跃式增长：AI 算力建设在全球范围内加速了数据中心热负荷增长，冷却需求也创造了低碳热管理需求。

              与这些驱动相对，几项约束限制了近期采用。最重要的是监管：电价结构和并网规则并不是为表后热储能设计的。工业设施安装热电池并用可再生电力充电时，可能遭遇抵消成本节省的公用事业电价，或遇到拖慢部署的许可和计量规则。Antora
              管理层已公开承认这是系统性挑战。资本强度是第二项约束：即便采用能源即服务模式，大型工业部署所需的项目规模和融资复杂度也会拉长销售周期，并要求公司具备成熟的项目融资能力。客户惯性以及改造现有工业供热基础设施的工程复杂度，也会给已经安装锅炉系统的潜在客户增加切换成本。
