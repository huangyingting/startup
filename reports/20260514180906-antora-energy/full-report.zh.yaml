        - label: 客户验证
          value: 2/10 — Zero public customers as of Q2 2026; pipeline unverified
        - label: 资本效率
          value: 4/10 — $230M raised with no revenue; hardware model is capital-intensive
        - label: 监管清晰度
          value: 3/10 — Tariff barriers material and unresolved; state-by-state complexity
        - label: 竞争地位
          value: 6/10 — TPV moat strong; Rondo ahead on commercial proof
        - label: 证据质量
          value: 4/10 — No financials, no customers; technology claims strong
        - label: 总体投资评分
          value: '5/10 — TRACK: technology conviction without commercial proof'
