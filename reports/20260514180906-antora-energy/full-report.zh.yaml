      - number: '1.5'
        title: 反向信号、风险和尽调缺口
        blocks:
          - type: paragraph
            body: >
              Antora Energy 面临几项实质风险和尽调缺口，潜在投资人需要把这些因素与其有吸引力的技术叙事和强投资人背书放在一起权衡。最重要的运营风险来自监管：Antora 自己在 2026 年 2 月的
              Utility Dive 署名文章和 2025 年 12 月文章中强调，现有电价结构、并网规则和计量监管并不是为表后热储能系统设计的。标题「Thermal batteries are ready. Our
              electricity rules are
              not.」直接承认，市场采用可能卡在公用事业和监管政策上，而不是技术性能上。行业分析师也独立确认了这一监管壁垒；这属于系统性挑战，而非公司特有问题。财务透明度有限：作为一家早期商业阶段的私营公司，Antora
              未披露收入、毛利率、客户名称、合同条款或详细单位经济模型。官方新闻稿确认累计融资超过
              $230M，但当前股权估值未披露，公开来源无法确认或否认其独角兽状态。资本强度是结构性担忧：大规模建设和部署模块化热电池系统，需要 Antora 及其客户或能源服务合同提供方投入大量前期资本。TPV
              热转电能力仍存在技术规模化风险；截至尽调日，该能力仍处于全商业规模开发中。客户集中风险未知——公司称正在与全球最大的一些工业设施合作，但未公开点名任何商业客户。监管逆风、早期商业阶段、资本密集和财务不透明叠加，意味着后续与管理层尽调时必须重点追问。
