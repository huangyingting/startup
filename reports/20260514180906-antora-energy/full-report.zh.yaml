      - number: '8.4'
        title: 情景分析：乐观 / 基准 / 悲观
        blocks:
          - type: paragraph
            body: >
              乐观情景假设 Antora 成功执行 2026–2027 年商业路线图：公开宣布 2–3 个具名客户，SD 和 PA 设施的 GWh/年制造产能上线，TPV 生产线效率维持 >35%，且 Series C
              以不低于 Series B 隐含估值完成。在这一情景中，Antora 2028 年收入可达到 $100–200M；按 8–12x 前瞻收入倍数（适用于拥有可防守技术护城河的高增长工业能源硬件公司），到 2030
              年企业估值可达 $1.0–2.0B [CV033][CV034]。


              基准情景假设进展较慢但未停滞：2026 年底前宣布一个具名客户，制造扩张按期推进，到 2027 年在 2–3 个关键州获得监管清晰度，并以较 Series B 温和跃升的估值完成 Series C。基准情景下
              2028 年收入为 $40–80M，按 6–8x 前瞻倍数，对应企业估值 $500–800M——大体与估计 Series B 隐含投后一致 [CV035][CV036]。


              悲观情景假设采用停滞：到 2027 年仍无具名客户，关键市场监管障碍难以破解，Rondo Energy 宣布大规模扩张，Antora 被迫以不高于 Series B 的估值完成 Series
              C。在这一情景中，公司从近期商业规模化机会，变成长周期押注最终监管解决；Series B 投资者预期回报在稀释和时间价值扣除后，存在实际负回报风险。如果 2025 年 12 月 Utility Dive
              文章提出的“电力规则拖慢工业脱碳”在两个监管周期内（2026–2028）没有解决，这一情景是可能的 [CV037][CV038]。


              概率加权回报更支持耐心、分阶段投资：投入资本应与对客户证明将被披露的信心相匹配；如果 / 当 Antora 以可信规模点名首个公开客户，再选择增加敞口 [CV039][CV040]。
            claimRefs:
              - CV033
              - CV034
              - CV035
              - CV036
              - CV037
              - CV038
              - CV039
              - CV040
