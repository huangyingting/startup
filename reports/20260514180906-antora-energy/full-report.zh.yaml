      - number: '8.2'
        title: 投资逻辑与反向逻辑
        blocks:
          - type: paragraph
            body: >
              Antora 的投资逻辑建立在五根支柱上。第一，工业热约占全球工业能源消耗的 40%，其中 90% 以上由燃烧天然气、煤炭或石油产生；企业净零承诺和趋严的工业排放监管，正在逐步动摇这种结构性依赖
              [CV011][CV012]。第二，Antora 的 TPV 技术（>40% 效率、固态碳储能、100–375°C 范围）有清晰差异化：没有其他商业产品能在同一系统中，把光伏发电输出和工业供热结合起来
              [CV013][CV014]。第三，战略投资者财团（NextEra Energy Resources、Emerson Collective、Breakthrough Energy Ventures、Lower
              Carbon Capital）带来的不只是资本，还有公用事业、工业和政策关系，可形成专有交易流优势 [CV015][CV016]。第四，无论政府更替，美国工业脱碳需求都有持久政策顺风支撑（IRA
              工业税收抵免、DOE Advanced Manufacturing 计划）[CV017]。第五，资本效率更高的项目融资模式一旦由一个客户跑通，就能形成快速复制模板，用外部项目资本扩张，而不是消耗 Antora
              自有资产负债表 [CV018]。


              Antora 的反向逻辑同样完整。第一，已融资 $230M 风险资本是一笔可观资金，但在硬件扩产业务中，走到现金流盈亏平衡所需资本可能轻易超过剩余跑道
              [CV019][CV020]。第二，完全没有公开客户，带来的不确定性与已有 LOI 或已宣布试点的公司在性质上不同——投资者无法基于零公开证明去建模收入、利润率或增长
              [CV021]。第三，监管费率障碍并非假设：Antora 自己的 CEO 在 2025 年 12 月公开称其为约束，解决还需要逐州公用事业委员会程序，可能耗时 3–7 年 [CV022]。第四，直接竞争者
              Rondo Energy 已有具名商业客户，正在积累 Antora 当前缺少的商业证明，形成先发优势；Antora 必须在达到 Rondo 当前位置前补上这段差距 [CV023]。
