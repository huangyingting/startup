      - number: '1.2'
        title: 创始人、领导团队与组织厚度
        blocks:
          - type: paragraph
            body: >
              Antora Energy 由 Andrew Ponec（CEO）、Justin Briggs Ph.D.（COO）和 David Bierman Ph.D.（CCO）联合创立。早期媒体报道把 Ponec 和
              Briggs 描述为主要创始搭档，而公司官网列出三人为创始人。Ponec 担任 CEO，是公司在融资、投资人沟通和政策参与上的主要对外声音。Briggs 拥有博士学位并担任
              COO，提供科学与运营厚度。Bierman 作为首席商务官，连接技术开发和收入生成两端。按 2026 年 5 月的 LinkedIn 数据，公司员工规模位于 201-500 人区间，平台上披露约 249
              个关联人员。截至 2026 年 4 月，公司在加州 San Jose、南达科他州 Big Stone City、宾夕法尼亚州 St. Mary's
              以及远程现场工程岗位发布招聘，说明员工队伍正在随制造规模化向多地扩张。Antora
              的文化页面强调团队跨越热工程、电力电子、制造和商业开发。创始团队的技术履历是尽调中的核心优势：每位创始人都具备与核心产品挑战直接相关的科学厚度。对创始三人组的关键人物依赖——尤其是 Ponec
              作为主要融资和对外沟通负责人——构成治理集中风险；在公司仍处于早期商业阶段、且未披露继任规划文件的情况下，这一点更值得关注。除创始团队和新闻报道提到的少数高管外，公司未公开披露完整董事会构成或详细组织架构图。
