          to: v6
          label: 资本强度 + 竞争
        - from: v6
          to: v7
          label: 竞争短板影响估值
        - from: v7
          to: v8
          label: 乐观路径：披露客户
        - from: v7
          to: v9
          label: 悲观路径：采用停滞
        - from: v8
          to: v10
          label: 客户验证 → 上调
        - from: v9
          to: v10
          label: 停滞 → 下调
