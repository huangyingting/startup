      - number: '5.4'
        title: 制造、供应链与 San Jose 工厂
        blocks:
          - type: paragraph
            body: >
              Antora 在加州 San Jose 运营一座专用制造设施，于 2023 年启用 [CE016][CE017]。这座设施同时容纳模块制造和全球第一条专用 TPV 生产线 [CE010]。公司正积极把产能扩大到
              GWh/年，San Jose 工厂是第一阶段；2026 年 4 月，Antora 又宣布在 South Dakota 州 Big Stone City 和 Pennsylvania 州 St. Mary's
              增建两座设施 [CE018][CE031]。

              固态碳供应链来自美国煤炭社区，包括 Pennsylvania；这些地区的工业基础在碳生产上经验深厚，可提供碳原料
              [CE019]。这一采购策略同时带来供应链韧性（本土供应、成熟工业供应商）和围绕能源转型、社区支持的社会经济叙事。碳原料在化学上与钢铁、铝工业几十年来使用的材料相同，因此相较新型关键矿物供应链，供应链风险较低
              [CE015]。系统任何部分都不需要稀土元素或关键矿物 [CE024]。2026 年扩建到 South Dakota 和 Pennsylvania，说明 Antora 正从原型 / 试点阶段走向规模生产
              [CE031][CE038]。
