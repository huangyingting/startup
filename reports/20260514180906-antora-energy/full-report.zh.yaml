      - number: '5.3'
        title: 热光伏技术与 HeatToPower 系统
        blocks:
          - type: paragraph
            body: >
              Antora 的热光伏（TPV）技术，是系统中技术差异化最强的部分。TPV 电池把高温固态碳块释放的红外辐射直接转成电力，原理类似太阳能光伏电池把可见光转成电力 [CE011]。Antora 在 2023
              年展示了超过 40% 的 TPV 效率——这是 TPV 领域的里程碑结果——并在 2023 年建成全球第一条专用 TPV 制造线 [CE009][CE010]。截至 2026 年，这是全球已知唯一一座专门建设的
              TPV 生产设施，既带来先发优势，也形成制造护城河。

              HeatToPower 系统把 TPV 发电与热量输出结合起来，让单一储能系统同时供热和发电 [CE012]。双输出能力显著扩大了 Antora
              的可服务客户群：既需要工艺热、又需要现场电力的设施——例如数据中心，以及电力负载高的工业工厂——可由一套 Antora 安装同时满足。到 2026 年，完整商业规模的 HeatToPower 系统仍在研发中，但
              TPV 制造线已经提供实体生产基础 [CE033][CE036]。已展示的 >40% TPV 效率大幅高于此前 TPV 电池实验室基准；如果这项性能能在制造线上稳定保持，就是具备商业意义的突破 [CE009]。
