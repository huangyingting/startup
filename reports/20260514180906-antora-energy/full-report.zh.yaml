      - number: '3.2'
        title: 竞争对手画像与战略方向
        blocks:
          - type: paragraph
            body: >
              Rondo Energy 目前是最接近 Antora 的商业类比公司。Rondo 以耐火砖作为储能介质，瞄准 1100–1500°C 温度区间，并声称电转热效率为 98%。公司已宣布商业部署超过 400 MWh
              装机容量，并签署总量超过 3 GWh 的未来项目合作协议。Rondo 获 Energy Impact Partners（EIP）支持，重点与生物燃料生产商和需要超高温热的工业设施合作——温度高于 Antora
              当前产品范围。Rondo 的主要优势是已经完成规模化商业部署；相对于 Antora 的局限，在于其聚焦温度高于 Antora 覆盖范围，且缺少 TPV 热转电能力。Electrified Thermal
              Solutions（ETS）是 MIT 分拆公司，使用导电耐火砖技术，温度最高可达 1800°C，是本次审阅 ETES 玩家中最高的。ETS 背后有 Holcim、Vale、ArcelorMittal
              等战略工业投资人，使其直通水泥、钢铁和矿业客户。ETS 瞄准 Antora 当前产品无法覆盖的超高温应用；如果 Antora 开发高温产品，双方重叠才会体现在未来产品路线图上。Kyoto Group 的
              Heatcube 使用熔盐作为储能介质，已在欧洲与 Aalborg Forsyning、KALL Ingredients 和 Iberdrola
              合作商业部署。熔盐储能的最高温度上限低于碳块，并带有不同的安全和维护特征。Kyoto Group 在欧洲区域供热和工业市场的商业经验，让其在北美之外拥有地理优势，但尚未证明美国商业规模。Malta Inc.
              采用根本不同的路径：用蒸汽热泵把余热升温至 300–550°C，不需要低价电力来充电，并已在德州 Pampa 的 Proman 甲醇工厂完成首个商业部署。Malta
              的热泵模式把它与储能优先的竞争者区分开来，面向余热回收比购买可再生电力充储能更经济的市场。
