      - number: '7.2'
        title: 技术与运营风险
        blocks:
          - type: paragraph
            body: >
              Antora 最重要的技术风险是 TPV 制造规模化。公司在实验室 / 早期产线条件下展示了 >40% TPV 效率，并在 2023 年建成全球第一条专用 TPV
              制造线，但在高产量生产中持续保持该效率，是另一项工程挑战 [CR012][CR013]。大规模半导体制造通常会遇到良率、工艺波动和质量控制问题，这些问题在原型规模上并不明显。如果生产线 TPV 电池效率较已展示的
              >40% 大幅下滑（例如平均跌至 25–30%），HeatToPower 系统的经济性会显著变化，相对其他热储能方案的竞争优势也会收窄 [CR014]。


              高温产品开发项目（面向 >375°C 的水泥、玻璃和钢铁）是另一项更长期的技术风险。极高温材料科学会带来多重挑战，包括碳和隔热材料的热循环疲劳、换热设计复杂度，以及 TPV 发射体在当前商业范围以上温度下的退化
              [CR015][CR016]。这些产品尚未披露商业化时间表；其研发取决于当前商业产品能否产生足够现金流和投资者信心，继续资助研发。


              运营风险包括三处设施（San Jose、Big Stone City SD、St. Mary's PA）的制造扩产执行、多个并行场址的项目施工管理、来自美国煤炭社区碳原料供应链的韧性，以及已部署系统的 24/7
              运行可靠性 [CR017][CR018][CR019]。GWh/年制造产能目标，对一家早期商业阶段公司是重大扩张挑战。任何制造延误都会直接压低收入并推高烧钱速度 [CR020]。
            claimRefs:
