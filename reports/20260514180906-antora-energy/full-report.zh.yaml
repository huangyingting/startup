      - number: '2.2'
        title: 市场规模——TAM、SAM 和 SOM
        blocks:
          - type: paragraph
            body: >
              估算电气化工业热的可触达市场，需要自下而上和自上而下结合，因为该品类仍然很新，且没有单一第三方报告使用 Antora 的精确产品边界。按 IEA 数据作自上而下锚点，全球工业过程热总需求约为每年 40
              EJ，按现行工业能源价格折算，约等于每年 $700B–$1T。再套用 100–375°C 温度区间在工业热中的占比（多份行业分析估计为工业热总需求的 40–55%），Antora 可服务温度范围的全球 TAM
              约为每年 $150–$280B。即便在保守假设下，这也是一个很大的市场。美国市场方面，Energy Information Administration 估计美国工业过程热消耗约为每年 10
              EJ。按同样的温度占比和能源价格假设，美国 100–375°C 区间的 SAM 约为每年 $30–60B。Antora 近期可获取市场（SOM）要小得多：公司首个商业部署在 2023 年，2026
              年拥有三处制造设施，目前仍处于早期收入生成阶段。即便拿下美国 SAM 的 0.1–0.5%，也意味着每年 $30–300M 的合同热容量——作为中期增长目标合理，但以当前产能规模还无法实现。Antora 的
              TPV 能力还打开了长时储能相邻市场；随着可再生能源渗透率上升、电网运营商寻求多小时储能容量，该市场预计到 2030–2035 年会显著增长。不过，Antora 的主要商业化重点仍是直接工业供热，而不是电网服务。
