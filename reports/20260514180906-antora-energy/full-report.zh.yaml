      - number: '8.5'
        title: 退出路径分析与最终尽调问题
        blocks:
          - type: paragraph
            body: >
              Antora 的退出路径主要有三条。近期最可能的是被大型工业设备或能源 OEM 战略收购——Siemens Energy、GE Vernova、ABB、Baker Hughes 或
              Eaton。上述买方都在推进工业电气化战略，会把 Antora 的 TPV 技术、制造能力和客户关系视为差异化 R&D 收购标的 [CV041][CV042]。相邻硬件品类里已有可比交易，包括 Ameresco
              收购能效项目开发商（$500M–1B 区间），以及多起公用事业公司收购分布式能源资源公司的交易。如果 Antora 能证明已部署或已签约容量达到 50+ MWth，战略退出有可能在 2026–2030 年完成。


              IPO 路径需要 2–3 年可见的收入增长、项目层面转正的毛利率，以及对气候科技公司公开发行重新开放的宏观环境。到 2026 年，未产生收入的气候科技 SPAC 窗口基本关闭；如果公开市场窗口重启，传统 IPO
              更可信 [CV043][CV044]。私募股权路径更像次选项：只有当 Antora 做出足够去风险的项目现金流、能支撑工业脱碳基础设施的 PE 整合策略时，才有意义 [CV045]。


              作出重大投资决策前，最后一轮尽调必须拿到几项材料：完整股权结构表和优先股堆叠，并附清算瀑布分析；至少一份已签署客户合同或详细 LOI；制造线上的 TPV 生产良率和效率分布数据；经审计或审阅的财务报表；以及可信的
              Series C 时间表和预计里程碑 [CV046][CV047][CV048]。这些要求不是愿望清单——少了任何一项，投资逻辑都无法充分压力测试，也无法按隐含估值做风险调整。
            claimRefs:
              - CV041
              - CV042
              - CV043
              - CV044
              - CV045
              - CV046
              - CV047
              - CV048
