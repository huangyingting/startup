      - number: '5.5'
        title: 技术差异化、知识产权与研发路线图
        blocks:
          - type: paragraph
            body: >
              Antora 的竞争护城河建立在三根相互咬合的支柱上：固态碳储能介质及其热特性、自研 TPV
              技术与制造工艺，以及集成的调度优化软件。碳储能介质本身并不新，但在规模化下实现均匀充电、热管理、换热架构和长寿命，需要大量积累的工程诀窍。TPV 技术是最可防守的护城河：>40% 效率展示、全球唯一专用 TPV
              制造线和内部量产经验结合起来，构成新进入者需要数年才能复制的壁垒 [CE009][CE010]。

              当前商业产品覆盖 100–375°C 热量范围，目标客户包括可再生燃料、食品饮料、化工、采矿、纸浆和造纸、混凝土和石灰，以及数据中心 [CE013]。更高温的研发项目——面向水泥（最高
              1,450°C）、玻璃（最高 1,600°C）、钢铁（最高 1,700°C）和矿物精炼——是技术开发和市场扩张的下一前沿
              [CE014][CE036]。这些行业脱碳技术难度更高，但能源强度大，市场机会也极大。更高温 TPV 变体和兼容碳加热系统的研发，是 Antora 最关键的技术风险，也是未来增长中最重要的杠杆
              [CE034]。Rondo Energy（耐火砖电阻加热）、Electrified Thermal Solutions、Kyoto Group（熔盐）和 Malta Inc.
              等竞争者，通过替代材料和机制覆盖相互重叠的温度区间 [CE034]。
