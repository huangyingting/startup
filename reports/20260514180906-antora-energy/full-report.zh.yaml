          value: 15000
          unit: facilities
          note: 根据 DOE 工业热调查数据估计；包括食品、化工、炼油、造纸等行业
        - label: 有活跃脱碳计划的设施
          value: 3000
          unit: facilities
          note: 估计截至 2026 年，总量中 20% 有活跃的热脱碳计划
        - label: 了解 Antora 的设施
          value: 500
          unit: facilities
          note: 根据公司沟通触达、会议露出和媒体报道估计
        - label: 进入技术评估的设施
          value: 30
          unit: facilities
          note: 估计值；Antora 表示有管线对话，但未给出具体数量
        - label: 已部署 / 在建设施
