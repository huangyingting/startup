      - number: '4.3'
        title: 商业牵引力与财务指标
        blocks:
          - type: paragraph
            body: >
              截至 2026 年 5 月，Antora 已披露以下商业里程碑：全球第一条专用热光伏（TPV）电池制造线（2023 年完成）；首个商业部署在未披露客户场址成功落地（2023
              年宣布）；三家美国制造工厂横跨加州、南达科他州和宾夕法尼亚州，已运营或在建。截至尽调日，公司未公开披露收入数字、收入增长率、年经常性收入（ARR）、付费客户数、客户合同价值（TCV 或
              ACV）、利用率、已部署容量（MWh）或其他标准商业牵引力指标。

              不公开收入指标，对 Antora 所处阶段的气候硬件公司来说并不反常（预规模商业阶段、首台套技术、EaaS 模式下收入确认绑定长期合同而非前期预订）。但这也意味着无法只用公开数据做前瞻财务建模。三工厂网络说明
              Antora 已承诺一轮显著制造爬坡；工厂实际利用率相对铭牌产能仍未知。早期阶段客户集中风险较高，因为最初几个工业锚定客户对收入和示范场址价值贡献不成比例。

              Antora 财务轨迹上的一个反向因素，是 2025–2026 年更广泛的气候科技融资环境。资本密集型硬件赛道的气候科技创业公司面临更长的现金跑道压力，因为投资人对亏损前硬件公司的耐心相较 2020–2022
              年气候科技融资高峰已经缩短。Antora 在 2024 年 8 月完成 $150M Series
              B，先于这轮收紧，提供了强财务缓冲；不过，如果公司下一次进入资本市场时气候硬件情绪仍未改善，未来轮次可能会遭遇投资人更苛刻的盈利时间表要求。
