      - number: '7.5'
        title: 缓释框架与投资否决标准
        blocks:
          - type: paragraph
            body: >
              Antora 已采取可见动作来缓释最重要的风险。监管层面，公司 2025 年 12 月在 Utility Dive 的署名文章，以及 2026 年在 WEF、CFR 和 BNEF
              活动上的演示，说明它有意通过倡导塑造热储能监管环境 [CR034][CR035]。投资者财团包括 NextEra Energy Resources；该公司拥有深厚的公用事业和监管关系，可能加快关键市场的费率改革。


              竞争层面，Antora 的 TPV 制造护城河可在有决心的竞争者复制商业规模制造能力前，提供 3–5 年缓冲
              [CR026]。供应链风险则通过从美国煤炭社区成熟工业供应商采购碳来主动缓释——这条供应链已运行数十年，没有单点故障，还创造了社会经济协同收益，可能吸引更有利的监管待遇
              [CR036]。工厂预制、可公路运输的模块架构，也部分缓释制造扩产风险；与现场建造方案相比，它降低了施工场址复杂度 [CR037]。


              投资否决标准——一旦出现就应触发对 Antora 投资逻辑的根本性重估——包括：18 个月后（到 2027 年底）仍未点名任何公开客户；TPV 生产线效率按生产批次平均跌破
              30%；竞争技术（Rondo、ETS）实现 >100 MWth 具名商业部署；监管澄清明确把热电池排除在需求响应项目之外；或无法以不低于 Series B 估值完成 Series C
              [CR038][CR039][CR040]。
            claimRefs:
