  - number: 3
    title: 竞争格局
    sections:
      - number: '3.1'
        title: 竞争版图与行业概览
        blocks:
          - type: paragraph
            body: >
              电气化工业热能储存（ETES）赛道规模仍小，但随着工业脱碳成为战略优先事项，增长很快。截至 2026 年 5 月，全球范围内具备严肃商业牵引力的创业公司不到十家；多数仍处早期，首个或第二个商业部署集中在
              2022–2025 年完成。与 Antora 最直接可比的四个竞争对手是：Rondo Energy（耐火砖储能，总部在加州，目标温度 1100–1500°C）；Electrified Thermal
              Solutions（ETS，导电耐火砖储能至 1800°C，MIT 分拆公司）；Kyoto Group 及其 Heatcube 产品（熔盐储能，总部在挪威，已在欧洲商业部署）；以及 Malta
              Inc.（蒸汽热泵，首个商业部署位于德州）。每家公司使用的储能介质不同，服务温度范围或地理市场也与 Antora 当前商业产品不同。

              除这些直接 ETES 同行外，Antora 还面临几类竞争：（1）工业供热中天然气燃烧这一现状方案；（2）电锅炉、热泵等直接电加热技术，可服务较低温应用；（3）绿色氢燃烧，可作为高温热的 Scope 1
              脱碳路径；（4）有原料供给地区的生物质或生物能源系统；（5）不做储能、只管理用能时点的工业级需求响应项目。ETES 赛道不太可能出现赢家通吃，因为温度要求、地理位置和具体工业流程会自然分层。Antora 聚焦
              100–375°C 区间并提供美国制造产品，处在一个有防守性的利基市场；但与部分竞争对手在可触达温度上存在重叠，尤其是低温段，这会在若干客户细分中形成直接竞争。
