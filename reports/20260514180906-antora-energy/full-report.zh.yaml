      - number: '5.2'
        title: 产品架构与模块规格
        blocks:
          - type: paragraph
            body: >
              核心商业产品是一种模块化、工厂预制的热电池。每个储能模块输出 300 kWth 热功率，可接收最高 900 kWe 充电功率 [CE003][CE004]。工厂由多个模块组成，可按客户工艺热需求，从个位数 MW
              级一路扩展到 GW 级部署 [CE022]。厂级热密度为每英亩 10,900 kWth（2.65 kWth/m²），典型工业场址面积上也能承载可观装机 [CE020]。


              模块在工厂制造、可公路运输，相比现场制造方案可缩短场址施工周期，并让不同部署保持一致质量标准 [CE023]。产品架构面向交钥匙客户体验：Antora 从选址一直负责到运营维护，减轻缺乏内部储能能力的工业客户负担
              [CE021]。模块化架构也让客户可以先做较小的初始安装，再按工艺热需求或预算增加模块。Antora 提供 24/7 监控和 AI 驱动的调度优化软件，最大化可再生能源充电，并随时间降低能源成本
              [CE037]。这层软件能力把 Antora 与纯硬件竞争者区分开。
            claimRefs:
              - CE003
              - CE004
              - CE020
              - CE021
              - CE022
              - CE023
              - CE037
