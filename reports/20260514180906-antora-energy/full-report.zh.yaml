  - number: 4
    title: 财务情况
    sections:
      - number: '4.1'
        title: 收入模式与变现路径
        blocks:
          - type: paragraph
            body: >
              Antora Energy
              通过能源即服务（EaaS）合同结构，把热电池技术变现：公司保留已安装热储能模块的所有权，并通过长期服务合同向工业客户出售由此产生的热能和电能。收入来自两条主要流：（1）交付工业过程热，按客户获得的每 GJ
              热量收费；（2）交付由 Antora 热光伏（TPV）面板产生的电力，按每 MWh 收费。EaaS 模式把前期资本开支转移到 Antora
              资产负债表上，降低客户初始投资，并形成经常性收入关系，摊销回收周期与合同期限绑定。

              Antora 服务的定价基准是美国工业天然气市场：客户会把工业供热替代方案与工业场址内燃气供热的交付成本比较，后者约为每 MMBtu $5–15（大约每 GJ $5–14）。所有 ETES
              竞争对手——包括已披露按 GJ 计价供热模式的 Rondo Energy——都必须以低于这一天然气等价成本的价格交付热量，才能赢得并留住工业客户。Antora 增加了第二个收入杠杆：TPV
              电力输出创造了燃气系统难以匹配的额外价值组成部分，可能让 Antora 相对纯供热竞争者，对每 GJ 总交付能源（热量加电力）收取溢价。

              政府拨款和非稀释性资金这条次级收入流，对 Antora 的商业化前和早期商业阶段很重要。ARPA-E、NSF、DOE 和 California Energy Commission
              拨款项目自公司成立以来持续提供非稀释性资本。这些拨款不可重复，也不构成可持续商业收入来源，但能降低稀释风险，并填补股权融资轮之间的资本缺口。碳信用收入仍是投机性的未来流；截至 2026 年 5 月，Antora
              未公开确认任何碳信用交易或承购协议。Inflation Reduction Act 对热储能投资税收抵免（ITC）的适用资格，可能给使用 Antora
              系统的客户提供额外的收入等价收益，改善项目经济性，但不会直接出现在 Antora 损益表上。
