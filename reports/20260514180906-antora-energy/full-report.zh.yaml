            body: |
              Antora 在 2023 年投运全球第一条专用热光伏制造线，并展示 >40% 效率，形成竞争者难以轻易复制的技术和制造护城河。这让 Antora 成为唯一具备端到端固态碳热电池与 TPV 联产能力的公司。
