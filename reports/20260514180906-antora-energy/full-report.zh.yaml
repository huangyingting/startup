      - number: '6.4'
        title: 留存、黏性与合同耐久性
        blocks:
          - type: paragraph
            body: >
              尽管 Antora 部署系统没有公开留存数据，但工业热电池安装的结构特征强烈暗示，任何已投运系统的留存率都会很高。交钥匙运维（O&M）模式把 Antora
              深度嵌入客户运营：公司负责持续维护、监控和性能优化，形成难以且高成本终止的持续服务关系 [CU030][CU034]。

              热电池安装具有强场址属性——需要土建施工、定制换热集成和设施特定的调度优化——因此一旦部署，切换成本极高。客户把 Antora 供热接入自身工艺后，无法在不投入大量资本、不中断生产的情况下简单替换
              [CU025]。这种结构性黏性类似化工、食品加工等资本密集型行业中的工业设备 OEM 关系，设备更换周期通常横跨 10–25 年。

              截至 2026 年，Antora 没有公开 NRR、GRR、流失率或合同续约数据，这是实质性证据缺口。公司沟通显示，首个部署场址（2023 年起运营）仍然活跃——至少提供了 2 年留存证据——但这只是单一数据点
              [CU023][CU033]。

              投资者应在商业尽调中索取合同期限、续约条款和终止条款。
