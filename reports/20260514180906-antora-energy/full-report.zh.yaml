        - IEA 或 DOE 行业采用数据证明加速或放缓
      - - 技术护城河
        - TPV 效率 >40%，全球唯一专用制造线 = 领先 3–5 年
        - 资金充足的竞争对手 3 年内复制 TPV 线；效率达到同等水平
        - 竞争对手（Rondo、ETS）公布可比 TPV 线效率数据
      - - 客户采用
        - NextEra Energy 合作以及食品饮料管线在 2026 年转为签约合同
        - 到 2027 年仍无客户；长销售周期拉长到 5+ 年
        - Antora 公布首个公开客户；或披露管线转化率
      - - 监管风险
        - 关键州电价改革落地；FERC 行动打开全国市场
        - 监管障碍持续 5+ 年；公用事业委员会案件拖延
        - FERC NOPR 或州 PUC 对表后热储能作出有利裁定
      - - 财务风险
        - 已融 $230M 支撑规模化直至现金流；Series C 轮估值上台阶
        - 烧钱速度超过现金跑道；Series C 轮估值不高于 Series B 轮（降价融资）
        - 经审计财务、Series C 轮交割条款，或已确认收入里程碑
    notes: 纯事实快照；不涉及估算。投资逻辑和反向逻辑代表分析师基于公开可得信息作出的评估。
