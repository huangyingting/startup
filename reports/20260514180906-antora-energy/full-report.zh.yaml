  - number: 7
    title: 风险
    sections:
      - number: '7.1'
        title: 监管与法律风险
        blocks:
          - type: paragraph
            body: >
              Antora 近期最具结构性破坏力的风险，是电力市场规则与表后热储能运行模式不匹配。在多数美国电力市场，电价结构围绕传统电力消费者设计：他们支付需量电费、能源电费和分时电价，这些费率按可预测间隔用电的设备校准
              [CR001][CR002]。热电池从根本上改变了这种关系：工厂可以把用电转移到可再生能源便宜且被弃用的离峰时段，再在高峰时段连续供热。这种表后套利行为让客户面对复杂监管处理：即使生产时段没有电网可见用电，需量电费仍可能按充电峰值计收；部分公用事业费率也不承认热储能是可获得需求响应激励的电网资源
              [CR003][CR004]。


              Antora 的 CEO 在 2025 年 12 月 Utility Dive 署名文章中公开提出这一监管障碍，承认“为另一个时代写下的电力规则正在拖慢工业脱碳”[CR005]。FERC Order
              841（2018）处理了电池储能参与批发电力市场的问题，但没有专门解决表后热电池在零售电价下的待遇；零售电价由州公用事业委员会和单个公用事业费率案件决定
              [CR006][CR007]。缺少明确的联邦优先规则，意味着 Antora 每个客户部署都要做场址特定的监管评估。这既抬高客户采购成本，也增加时间表不确定性，可能把评估期拉长 6–18 个月 [CR008]。


              法律层面，截至 2026 年 5 月，Antora 没有已知诉讼、监管执法行动或知识产权争议，但仍有几类法律风险：若关键工程师离职，自研 TPV
              制造诀窍可能引发商业秘密争议；项目施工合同带有标准质保和性能保证条款，会产生或有负债；South Dakota 和 Pennsylvania 新制造设施的环境许可，需经过州级监管审批流程
              [CR009][CR010][CR011]。
