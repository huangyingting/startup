      - number: '4.5'
        title: 财务结论和尽调阻断项
        blocks:
          - type: paragraph
            body: >
              Antora Energy 的财务尽调明显受限：标准私营公司披露几乎全部缺失。到 2026 年 5
              月，收入、毛利率、EBITDA、现金余额、烧钱速度、项目级经济性、客户合同条款和公司估值，都无法从公开来源取得。对 Series B
              阶段的气候硬件公司而言，这并不罕见，但也意味着财务判断只能靠结构性推断，而不是已确认指标。基于现有公开记录，可以低到中等置信度得出以下推断：

              (1) Antora 短期资本化水平尚可，2024 年 8 月 Series B 融资 $150M，估计提供 18–36 个月现金跑道；

              (2) EaaS 收入模式在气候硬件上结构合理——收入与客户节能绑定，也降低客户切换风险——但会显著抬高 Antora 资产负债表的资本强度；

              (3) 单位经济性对电力输入成本和模块制造成本曲线高度敏感；规模化后转正可行，但没有任何公开来源确认；

              (4) 三座工厂的制造投资说明商业信心较强，但在规模经济验证前就锁定了大量资本。

              最关键的尽调阻断点包括：(a) 没有已确认收入或客户合同经济性；(b) 没有已确认毛利率或贡献利润率；(c) 没有已确认现金余额或烧钱速度；(d) 没有已确认项目级 ROI；(e)
              没有股权估值或新投资的隐含进入价格。任何投资承诺要被负责任地承销，管理层必须先披露这些缺口。
