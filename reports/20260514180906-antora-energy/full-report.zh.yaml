      - number: '7.3'
        title: 竞争风险
        blocks:
          - type: paragraph
            body: >
              Antora 的竞争风险不低，但有差异化。直接热储能竞争集合包括 Rondo Energy（耐火砖电阻加热）、Electrified Thermal Solutions（砖加热，MIT 孵化公司）、Kyoto
              Group（熔盐，在欧洲已有部署的挪威公司）和 Malta Inc.（热泵热储能，Google/X 孵化公司）[CR021]。其中，Rondo
              是最直接的竞争威胁：它已公开宣布食品饮料制造领域的具名客户部署，在商业证明上拥有 Antora 目前缺少的可信度优势 [CR022]。Rondo 也已完成可观融资，最近一轮得到战略投资者支持且广受报道
              [CR023]。


              Electrified Thermal Solutions（ETS）构成差异化竞争风险：其基于砖的方案瞄准高于 Antora 当前商业范围（375°C）的温度，可能在 Antora
              高温产品商业化前，先拿下排放最高的工业客户（水泥、玻璃、钢铁）[CR024]。如果 ETS 在 Antora 高温项目交付前率先实现 >500°C 商业规模，Antora
              的可服务市场会被限制在中温应用，直到它补上技术缺口。


              更广泛地看，目前供应传统燃烧式加热炉和蒸汽发生器的大型工业 OEM（Siemens Energy、GE Vernova、ABB），也可能借助既有客户关系，带着附加式热储能方案进入电气化市场并挤压新进入者
              [CR025]。Antora 的 TPV 技术风险因全球唯一专用 TPV 制造线和已展示 >40% 效率护城河而受到限制，但这个优势有时间边界：资金充足的竞争者投入 3–5 年 TPV 研发，就可能缩小效率差距
              [CR026]。
