      - number: '8.3'
        title: 估值背景与可比分析
        blocks:
          - type: paragraph
            body: >
              Antora 的 Series B 投后估值尚未公开。参照阶段相近的工业清洁技术硬件公司融资——$100M+ Series B、>200 名员工、自研制造能力、商业化前收入——2024
              年气候科技风险投资常态下，隐含投后估值落在 $700–900M 区间看起来合理 [CV024][CV025][CV026]。该区间约为累计融资额（$230M+）的 3–6 倍，与气候硬件公司受欢迎 Series
              B 常见 2–4 倍估值跃升大体一致。


              估值可比集合包括：Form Energy（电网级铁空气储能，融资 >$400M，Series D 隐含约 $2B）；Ambri Inc.（液态金属电池，据报道以 $250M+ 估值被 Paulson &
              Geithner 收购）；Rondo Energy（工业热储能，据报道融资 $100M+）；以及 Electrified Thermal Solutions（直接竞争者，截至 2024 年融资约
              $40M）。公开市场可比公司包括 Thermon Group（THR，工业伴热，市值约 $700M）和 Ameresco（AMRC，工业能效服务，市值约
              $1B）[CV027][CV028][CV029][CV030]。


              按隐含 Series B 估值看，Antora 的定价已经押注执行：估值反映制造扩产成功、商业客户在 2026–2027 年出现、监管障碍不会致命的预期。悲观情景下，如果市场采用到 2027
              年仍停滞，且在首笔重要收入前就需要 Series C，隐含估值可能压缩到 $300–500M——较估计 Series B 投后下跌 40–65%。乐观情景下，如果 2026–2027 年公开宣布 2–3
              个客户，且 GWh/年制造爬坡按计划推进，到 2029–2030 年实现 $1.2B+ 退出估值是可达的 [CV031][CV032]。
