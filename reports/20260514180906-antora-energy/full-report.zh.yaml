      - number: '1.4'
        title: 里程碑与运营轨迹
        blocks:
          - type: paragraph
            body: >
              Antora Energy 从 2018 年成立，到 2026 年完成美国制造规模化，走出了一条快速但相对有节奏的深科技创业路径。公司成立于 2018 年，前几年主要投入 R&D 和概念验证开发，并获得
              ARPA-E 等政府拨款支持。2022 年的 Series A 支撑了招聘和资本投入，让公司从实验室原型走向商业规模硬件。2023 年，Antora 同时达成三项重要里程碑：部署首个商业规模热电池，启用 San
              Jose 制造设施，并建成全球第一条专用热光伏（TPV）电池制造线——证明储热转电效率超过 40%。

              同年，公司入选 TIME 2023 年 Best Inventions，并获 Fast Company 2023 World Changing Ideas 荣誉。2024 年 8 月完成的 $150M
              Series B 为公司将制造能力扩出原 San Jose 工厂提供了资本。到 2026 年 4 月，Antora 已新增两处美国制造设施：一处位于南达科他州 Big Stone
              City，聚焦工厂运营；一处位于宾夕法尼亚州 St. Mary's，负责制造运营，使其美国工厂总数达到三处。地域分散降低了供应链集中风险，也让公司进入成本更低的制造劳动力市场。San Jose Mercury
              News 在 2026 年 4 月报道了此次扩张，为规模化提供了第三方确认。2025–2026 年，Antora 也保持较高公共曝光，出现在 World Economic Forum Future of
              Power Systems panel、Council on Foreign Relations panel，以及 2026 年初的 Bloomberg New Energy Finance San
              Francisco Summit。
