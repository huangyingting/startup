      - number: '3.3'
        title: 功能对比与定价模式
        blocks:
          - type: paragraph
            body: >
              直接比较 ETES 竞争对手的功能，可以看到几项关键差异。Antora 使用固态碳块作为储能介质，带来三项结构性优势：成本（单位能量成本约为锂离子电池的
              1/10）、丰富度（碳是全球产量第四大的工业材料），以及安全性（不同于锂离子或部分熔盐配置，不存在热失控风险）。碳块路径还支撑热光伏（TPV）能力：把碳加热到白炽状态后，Antora 可将储存热量以超过 40%
              的效率直接转成电力——这是已审阅 ETES 竞争对手中独有的功能。这种热电双输出能力（以 HeatToPower 对外营销）是重要差异点，因为它让单套 Antora
              系统同时服务热需求和电力需求，可能改善项目经济性。

              定价方面，没有 ETES 竞争对手公布系统标价。Rondo 表示采用按 GJ 计价的供热模式。Antora 使用能源服务合同，按交付热量和电量以每 GJ 或每 MWh 计价。定价基准是美国工业天然气，价格为
              $5–15/MMBtu（$5–14/GJ），客户评估热储能替代方案时会以此为参照。Antora 的系统经济性取决于可再生电力采购价格（投入成本）、模块制造成本（由碳块材料和钢制外壳驱动）、安装成本以及 O&M
              成本。随着三家工厂的制造规模达到 GWh/year，Antora 产品的成本轨迹应沿着类似其他能源硬件产品的制造学习曲线下降。累计融资 $230M+ 让 Antora 的资本化水平高于多数 ETES 同行，除
              Rondo 外——后者通过 EIP 获得了类似强度的资金支持。三家工厂构成的美国制造供应链也是差异点，因为工业客户越来越偏好本土采购和更有韧性的供应链。
