              在已审阅的 ETES 竞争对手中，Antora 是唯一拥有专用 TPV 电池制造线并展示超过 40%
              热转电效率的公司。这种热电双输出（HeatToPower）让单套系统同时服务热需求和电力需求——一种可能支撑溢价定价，并让客户项目经济性优于纯供热竞争者的产品能力。
