    title: 公司概况
    sections:
      - number: '1.1'
        title: 身份、使命与商业模式
        blocks:
          - type: paragraph
            body: >
              Antora Energy 是一家总部位于美国的工业脱碳公司，总部地址为加州 San Jose 2350 Zanker Road, 95131，另有运营地址位于加州 Sunnyvale 1244 Reamwood
              Avenue, 94089。公司的核心判断是：新增发电中最便宜的一类——间歇性风电和太阳能——可以借助碳块转化为储存的热能，再按需向工业客户输出过程热或电力。Antora 的产品是模块化热电池系统，每个模块额定
              300 kWth，可输出 100–375°C 的热量，覆盖食品饮料、化工、纸浆和造纸、矿物精炼等大量工业流程。公司使用 antora.com 品牌域名，并把使命描述为推动工业热脱碳；按
              Decarbonization Partners 的说法，工业热约占全球温室气体排放的 15%。Rocky Mountain Institute 则估计，工业整体约占全球排放的 30%。Antora
              的商业模式把热电池模块硬件销售与长期能源服务合同结合起来，把公司定位成垂直一体化运营商，覆盖场址识别、电力供应采购、项目融资、安装以及持续运维。该能源即服务模式旨在降低工业客户前期资本门槛，同时为 Antora
              带来经常性收入。公司处于 Series B 阶段，背后有知名气候科技和战略投资人支持；到 2026 年 4 月，Antora 已从 San Jose 单一制造设施扩展到美国三处生产基地，并计划每年建设 GWh
              级热储能产能。
