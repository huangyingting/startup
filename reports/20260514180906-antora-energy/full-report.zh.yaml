  - number: 6
    title: 客户情况
    sections:
      - number: '6.1'
        title: 客户分层与目标市场覆盖
        blocks:
          - type: paragraph
            body: >
              Antora Energy 面向有连续工艺热需求的工业制造商，温度范围在 100°C 到 375°C
              之间。该温度带覆盖美国和全球大量工业部门，包括食品饮料加工、特种化学品、可再生燃料生产、纸浆和造纸、混凝土和石灰生产、采矿作业，以及石油炼制 [CU001][CU010]。

              公司还把数据中心列为新兴客户群，尤其是考虑到截至 2026 年 AI 驱动的电力需求激增，以及科技行业的脱碳承诺 [CU009][CU029]。

              Antora 的可服务市场集中在重工业——这些行业有 24/7 热需求、设备生命周期长，且资本采购流程成熟。此类工业买家评估重大资本开支通常需要 12–36
              个月；在承诺采购新型能源系统前，还要完成大量工程研究、财务建模和内部审批 [CU008]。

              这种保守采购机制既拖慢客户获取速度，也在客户部署后形成竞争保护：同一套漫长评估流程延缓首单，也在部署后制造高切换成本 [CU014][CU030]。

              从地理看，Antora 初期重点在美国；California、South Dakota 和 Pennsylvania 的制造与项目场址，是最强的地理信号
              [CU020][CU026]。公司尚未公开宣布国际部署。美国工业工艺热市场是全球最大市场之一；制造业每年消耗约 7.5 EJ、且处于 Antora 商业温度范围内的工艺热 [CU031]。
