      - number: '4.6'
        title: 证据要点
        blocks:
          - type: callout
            title: 公开无收入或利润率数据——财务尽调被完全卡住
            body: >-
              到 2026 年 5 月，Antora 未披露收入、毛利率、EBITDA、现金余额或烧钱速度。气候硬件公司在 Series B
              阶段常见这种披露状态，但投资决策只能押前瞻逻辑，公开来源无法提供回溯财务验证。公开财务缺口表（TI005）中的五项，是负责任承销前最低限度需要披露的信息。
            calloutType: risk
            claimRefs:
              - CI029
              - CI030
              - CI031
          - type: callout
            title: 单位经济性高度受可再生电力输入成本影响
            body: >-
              Antora 的销货成本主要由给热电池充电的可再生电力价格决定。按当前美国公用事业级太阳能 PPA 成本 $20–40/MWh 计算，仅电力一项折算到每 GJ 供热的
              COGS，在许多市场已经接近或超过天然气基准。单位经济性转正，需要极低价电力采购（直连、表后或低于 $20/MWh）、TPV 发电输出带来可观溢价，或二者兼具。因此 Antora
              必须挑地理位置和客户场址；并非所有工业热客户都能提供足够好的用电成本环境。
            calloutType: risk
            claimRefs:
              - CI009
              - CI010
              - CI011
          - type: callout
            title: EaaS 模式抬高资本强度，但改善收入质量
            body: >-
              Antora 选择能源即服务（EaaS）合同模式，由公司保留已部署热电池的所有权，换来长期、经常性且可见度高的合同收入。但每新增一个部署项目，Antora
              都要把资产留在自己的资产负债表上，资本强度很高。规模化之后，这一模式很可能需要项目级债务或税收权益融资，把早期部署占用的资本循环出来；截至 2026 年 5
              月，公司未披露任何债务或项目融资工具，这是前瞻资本结构风险。
            calloutType: insight
            claimRefs:
