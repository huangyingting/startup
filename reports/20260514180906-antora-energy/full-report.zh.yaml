      - number: '7.6'
        title: 证据要点
        blocks:
          - type: callout
            title: 监管障碍：近期最大卡点
            body: >
              美国电力费率结构并不是为把用电转移到离峰时段的表后热电池设计的。需量电费、分时电价和批发市场规则，可能给 Antora 客户施加惩罚性成本，或拒绝其获得需求响应激励。Antora 自己的 CEO 已在 2025
              年 12 月公开承认这一障碍。解决它需要逐州公用事业委员会程序，或联邦 FERC 行动——二者都慢、不确定，且不受 Antora 控制。
            calloutType: risk
            claimRefs:
              - CR001
              - CR003
              - CR005
          - type: callout
            title: 资本强度：硬件业务比软件需要更多资本
            body: >
              每个热电池项目在确认任何收入前，都需要大量前置资本。Antora 约有 249 名员工、三座制造设施和活跃项目管线，烧钱速度很可能不低。2024 年 8 月 Series B 之后，可能还需要在
              2026–2027 年接续 Series C，支撑公司走过商业扩产阶段；这让 Antora 依赖气候科技投资者持续保持投资意愿。
            calloutType: risk
            claimRefs:
              - CR027
              - CR029
              - CR030
          - type: callout
            title: 供应链风险低于多数清洁能源硬件
            body: >
              与锂离子电池、热泵或基于电解槽的技术不同，Antora
              的固态碳储能介质不需要关键矿物、稀土或受地缘限制的供应链。美国工业碳是由本土产业供应的大宗商品，已有数十年运营历史。这是结构性供应链优势，能实质性降低困扰多数清洁能源硬件公司的一个风险类别。
            calloutType: strength
            claimRefs:
              - CR036
  - number: 8
    title: 估值
    sections:
      - number: '8.1'
        title: 投资建议与逻辑
        blocks:
          - type: paragraph
            body: >
              截至 2026 年 Q2，Antora Energy 的建议为观察。公司具备气候科技硬件中少见的三项特征：已展示的技术突破（>40% TPV 效率）、自研制造护城河（全球唯一专用 TPV
              生产线），以及规模大且渗透率低的可服务市场（美国工业工艺热年支出 $70B+）。这些基本面仍在，且有所改善：2024 年 8 月 $150M Series B 资助了向 South Dakota 和
              Pennsylvania 的制造扩张，员工数增长到约 249 人；公司还在 2026 年 1 月出席 WEF 和 BNEF 活动，显示从研发转向商业定位
              [CV001][CV002][CV003][CV004][CV005]。


              “观察”评级反映一个关键缺口：截至 2026 年 Q2，Antora
              没有公开点名任何客户。在工业硬件类别里，一个有吸引力的商业化前故事与达到“买入”标准的投资之间，差别正是这一点：一个签约且具名的客户，具有真实合同金额、真实项目时间表和真实投运日期。没有这个锚点，投资逻辑靠的是技术承诺，而不是商业证明
              [CV006][CV007][CV008]。


              若出现以下情况，投资逻辑可上调至买入：(1) 披露至少一个已签约的具名客户；(2) 在不同部门或地区看到第二个客户的清晰路径；(3) Series C
              时间表可信，并能提供穿越商业化的现金跑道。若出现以下情况，投资逻辑应下调至卖出 / 减持：(1) 到 2027 年底仍无具名客户；(2) Series C 低于 Series B 估值；(3) Rondo
              Energy 宣布 >100 MWth 具名商业部署 [CV009][CV010]。
