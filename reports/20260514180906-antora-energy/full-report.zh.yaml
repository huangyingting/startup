  - number: 2
    title: 市场分析
    sections:
      - number: '2.1'
        title: 市场定义和边界
        blocks:
          - type: paragraph
            body: >
              Antora Energy
              位于两个大型工业市场的交集：热能储存和工业过程热。更准确的相关市场，是工业过程热的电气化——把廉价、间歇性的可再生电力转化为可储存热能，再按需输送给工业流程。这个市场之所以存在，是因为全球约 15%
              温室气体排放来自工业过程热，而其中绝大多数热量目前仍靠燃烧化石燃料产生，主要是天然气、煤和石油。按 Rocky Mountain Institute 的数据，工业整体约占全球排放的
              30%，是排放量最大或并列最大的部门。

              Antora 当前产品的市场边界覆盖需要 100°C 至 375°C 热量的工业流程——这一范围包括食品饮料加工、化工制造、纸浆和造纸、矿物精炼以及数据中心冷却。水泥、玻璃、钢铁和炼铁等更高温工业应用需要超过
              375°C 的温度，因此不在 Antora 当前商业产品覆盖范围内；不过公司表示正在开发高温产品。现状替代方案是天然气燃烧，目前美国工业市场价格大约为每百万 BTU $5–15（每 GJ
              $5–14）。任何热能储存方案都必须在总能源成本上竞争，成本口径包括资本摊销、运营成本以及避免的碳成本。相邻市场包括长时电力储能（Antora 的 TPV 能力适用）、区域供热，以及更广义的工业热即服务。
