            body: >
              Antora 的客户集中度风险在结构上偏高，因为公司尚未公开确认超过少数部署场址。没有具名客户，又采用硬件项目业务模式，收入很可能高度集中在少数账户
              [CU022][CU024]。任何一个场址如果延迟、取消或表现不及预期，对报告收入的影响都可能不成比例。


              Antora 适合先落地再扩张：在客户设施安装初始模块，形成基础后，再按客户工艺热需求增长或更多工艺脱碳逐步扩容
              [CU034][CU021]。不过，公司尚未公开确认任何来自既有场址的扩张合同；工业热系统销售周期长，也意味着扩张很可能按年而非按季度计量。


              Antora 的商业策略明确包括通过第三方能源开发商、项目融资中介和公用事业伙伴拓展渠道——这可能在不按比例增加自有销售员工数的情况下加速管线增长 [CU007]。投资者财团包括美国大型可再生能源公司
              NextEra Energy Resources，可能在公用事业和大型工业领域提供客户渠道入口。战略投资者与新兴数据中心细分市场叠加，确实创造了扩张潜力；但截至 2026 年，商业执行证据仍有限
              [CU036][CU009]。
