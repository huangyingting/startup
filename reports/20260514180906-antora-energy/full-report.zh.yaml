      - number: '1.3'
        title: 融资历史、投资人和资本结构
        blocks:
          - type: paragraph
            body: >
              Antora Energy 官方 Series B 新闻稿发布于 2024 年 8 月 13 日，其中称公司累计融资超过 $230M。Series B 规模为 $150M，由 Decarbonization
              Partners 领投；该平台是 BlackRock 与 Temasek 成立的合资公司，专门投资可规模化脱碳技术。Series B 新投资人包括 Emerson Collective——Laurene
              Powell Jobs 创立的慈善与投资机构——GS Futures（Goldman Sachs 聚焦可持续发展的投资部门）、The Nature Conservancy，以及全球最大可再生能源生产商之一
              NextEra Energy Resources LLC 旗下子公司。参与 Series B 的既有投资人包括 Trust Ventures、Lowercarbon Capital、Breakthrough
              Energy Ventures、BHP Ventures、Overture VC 和 Grok Ventures。BHP Ventures、NextEra Energy Resources
              等战略工业投资人，Breakthrough Energy Ventures、Lowercarbon Capital 等主要气候基金，以及 Decarbonization Partners
              的机构资本，共同构成了多元投资人基础，激励方向都指向工业脱碳采用。公司 Series B 前的融资包括 2022 年完成的 Series A——金额未公开披露——以及来自 ARPA-E DAYS
              计划、NSF、California Energy Commission 和 DOE Industrial Efficiency and Decarbonization Office
              的早期非稀释性政府拨款。公司当前估值未公开披露；Antora 未在任何已审阅公开来源中确认或否认独角兽状态。
