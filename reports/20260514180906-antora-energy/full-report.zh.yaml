  - number: 5
    title: 产品与技术
    sections:
      - number: '5.1'
        title: 核心技术：固态碳热储能
        blocks:
          - type: paragraph
            body: >
              Antora 的底层技术把电力——可再生电、离峰电网电力或弃电——转成热量，并通过电阻加热储存在固态碳块中。碳成为热储能介质有几个相互关联的原因：按单位储能成本计算，它约为锂离子电池的十分之一
              [CE006]；它是全球产量第四大的工业材料，在钢铁和铝工业中已有数百年验证 [CE007][CE015]；在运行温度下没有热失控风险 [CE030]；体积能量密度约为电化学电池的四倍
              [CE008]。储能介质为固态，意味着没有自放电、无限次充放电循环中没有退化，也不依赖稀土或关键矿物 [CE005][CE024][CE032]。


              充电子系统向碳块施加电流，通过电阻把碳块加热到高温（内部超过 375°C，当前商业产品输出 100–375°C
              的热量）[CE002]。热量经由换热子系统提取，并送往工业过程负载。一套完整工厂安装会集成模块、电力系统、电网互联、换热设备、辅助系统、土建基础设施、控制软件、24/7 监控和调度优化算法
              [CE021]。系统设计寿命超过 20 年，可与燃烧式加热炉、工艺锅炉等长寿命工业资本资产竞争 [CE005]。
