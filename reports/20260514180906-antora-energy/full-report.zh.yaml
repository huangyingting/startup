      - number: '8.6'
        title: 附录
        blocks:
          - type: callout
            title: 建议是观察，不是买入
            body: >
              尽管 Antora 技术基本面很强，观察评级只反映投资案里最关键的单一缺口：截至 2026 年
              Q2，公开客户为零。工业硬件里，买入和观察的差别正是这一点——至少有一个已签约、可点名、可部署的客户，并且合同价值和投运时间表可信。技术有吸引力；商业验证缺席。投资者应设定正式买入触发条件：公布一个客户，建议就立即上调。没有这个触发条件，Series
              B 隐含估值约 $700-900M，定价反映的是执行兑现，而不是零商业验证。
            calloutType: insight
            claimRefs:
              - CV006
              - CV024
          - type: callout
            title: 商业牵引一旦停滞，下轮降价风险真实存在
            body: >
              Antora 估计每月烧钱 $3–8M，意味着到 2026 年底或 2027 年初可能需要 Series C。如果届时仍没有可点名的公开客户，又处在收缩的气候科技创投市场，平轮或降价轮风险就很实质。Series
              B 投资者应密切跟踪：降价轮不只是估值信号，也是治理事件，可能改变董事会动态、提高稀释，并释放投资者信心被削弱的信号。
            calloutType: risk
            claimRefs:
              - CV019
              - CV020
              - CV037
          - type: callout
            title: 战略投资者组合是真正的竞争护城河
            body: >
              NextEra Energy Resources（美国最大的清洁能源发电商）、Emerson Collective、Breakthrough Energy Ventures 和 Lower Carbon
              Capital 为 Antora 提供大多数气候科技创业公司没有的网络触达和监管倡导能力。NextEra
              的公用事业级关系，可能加速关键部署州的电价机制改革，并为项目部署带来专有交易流。这个投资者组合的质量，相比同阶段竞争者确实形成差异，并部分抵消商业验证不足。
            calloutType: strength
            claimRefs:
              - CV015
              - CV016
