companyProfile:
  summary: >-
    Antora Energy 是一家位于加州 San Jose 的深科技创业公司，正在开发固态碳热电池：用低成本可再生电力把石墨块加热到 2000°C 以上，把电能存成热能，再向工业场景输出 100–375°C
    的过程热，并通过热光伏电池以 >40% 效率输出峰值电力。公司瞄准需要给高温热脱碳的工业制造商——这个细分市场基本不是传统电池或热泵能覆盖的。Antora 已从 Decarbonization
    Partners（BlackRock/Temasek 合资平台）和 NextEra Energy Resources 领投的强投资人组合中融资 >$230M，但尚未披露具名客户或商业收入。
