        - label: 高温产品（>375°C，用于水泥 / 钢铁）
          values:
            - ''
            - ''
            - ''
            - 开发中；未公布商业时间线
  - id: FU001
    title: Antora Energy 客户旅程图
    type: journey-map
    layout: wide
    summary: 工业客户从最初了解 Antora 热电池，到部署和运维的端到端旅程。
    approximationNotes: 旅程阶段根据 Antora 交钥匙方案描述和标准工业资本采购实践推断。
    claimRefs:
      - CU007
      - CU008
      - CU014
      - CU030
    data:
      items:
        - label: 认知
          value: Industry conference, peer referral, investor introduction, or regulatory push to decarbonize
          note: 重工业从认知到评估通常有很长滞后。情绪：好奇
        - label: 技术评估
          value: Site assessment, temperature range validation, engineering feasibility study; 3–12 months
          note: Antora 提供技术团队支持；需要按现场分析热负荷。情绪：评估中
        - label: 商业案例
          value: Financial modeling, IRR/NPV analysis, carbon credit valuation, fuel price hedge value
          note: 工业买家要求 10–15% IRR 门槛；Antora 的经济性取决于可再生电力成本。情绪：评估中
        - label: 采购 / 合同
          value: EPC or turnkey contract negotiation; project finance arrangement; insurance and permitting
          note: 典型工业资本开支采购周期为 6–18 个月。法律和财务复杂度高。情绪：已承诺
        - label: 建设 / 调试
          value: Module delivery, civil work, heat transfer integration, controls commissioning; 6–12 months
          note: 工厂预制模块缩短现场时间；土建和电网互联是关键路径。情绪：投入
        - label: 运营和扩张
          value: 24/7 O&M by Antora, dispatch optimization, renewable charging; potential module add-ons
          note: 调试完成后切换成本高；扩张经济性有利。情绪：投入
  - id: FU002
    title: Antora Energy 客户采用漏斗（估计，2026）
    type: funnel
    layout: standard
    summary: 截至 2026 年，从美国总可服务工业设施到已部署 Antora 热电池站点的估计漏斗。
    approximationNotes: 所有漏斗值均为分析师估计。Antora 未披露官方销售管线数据。数值仅表示方向。
    claimRefs:
      - CU003
      - CU022
      - CU028
    data:
      items:
