- id: VSEC05
  title: Exit Analysis and Final Diligence Asks
  body: 'Exit options for Antora include three primary paths. The most likely near-term path is a strategic

    acquisition by a large industrial equipment or energy OEM — Siemens Energy, GE Vernova, ABB, Baker

    Hughes, or Eaton — each of which has an active industrial electrification strategy and would value

    Antora''s TPV technology, manufacturing capability, and customer relationships as a differentiated

    R&D acquisition [CV041][CV042]. Precedent transactions in adjacent hardware categories include

    Ameresco''s acquisition of energy efficiency project developers ($500M–1B range) and various utility

    acquisitions of distributed energy resources companies. A strategic exit could be achievable on a

    2026–2030 timeline if Antora demonstrates 50+ MWth of deployed or contracted capacity.


    The IPO path requires 2–3 years of visible revenue growth, a positive gross margin at project

    level, and a macroeconomic environment receptive to climate tech public offerings. The SPAC window

    for pre-revenue climate tech has largely closed as of 2026, making a conventional IPO the more

    credible path if it opens [CV043][CV044]. The private equity path is relevant as a secondary

    option if Antora reaches a level of de-risked project cash flows that support a PE roll-up strategy

    for industrial decarbonization infrastructure [CV045].


    The final diligence asks required before a material investment decision include: complete cap table

    and preference stack with liquidation waterfall analysis; at least one signed customer contract or

    detailed LOI; TPV production yield and efficiency distribution data from the manufacturing line;

    audited or reviewed financial statements; and a credible Series C timeline with projected milestones

    [CV046][CV047][CV048]. These asks are not aspirational — without each of them, the investment

    thesis cannot be adequately stress-tested and risk-adjusted against the implied valuation.

    '
