- id: VSEC04
  title: 'Scenario Analysis: Bull / Base / Bear'
  body: 'The bull case assumes Antora successfully executes on its 2026–2027 commercial roadmap: 2–3 named

    customers announced in public, GWh/year manufacturing capacity online at SD and PA facilities,

    TPV production-line efficiency sustaining >35%, and a Series C raised at or above Series B implied

    valuation. In this scenario, Antora''s 2028 revenue could reach $100–200M, and at an 8–12x forward

    revenue multiple (appropriate for a high-growth industrial energy hardware company with a

    defensible technology moat), enterprise valuation could reach $1.0–2.0B by 2030 [CV033][CV034].


    The base case assumes slower but not stalled progress: one named customer announced by end of

    2026, manufacturing expansion on schedule, regulatory clarity in 2–3 key states by 2027, and

    a Series C raised at modest step-up from Series B. Base-case 2028 revenue of $40–80M at 6–8x

    forward multiple implies an enterprise valuation of $500–800M — broadly in line with the estimated

    Series B implied post-money [CV035][CV036].


    The bear case assumes adoption stalls: no named customers through 2027, regulatory barriers prove

    intractable in key markets, Rondo Energy announces major scale-up, and Antora is forced to raise

    a Series C at valuation at or below Series B. In this scenario, the company becomes a long-duration

    bet on eventual regulatory resolution rather than near-term commercial scale, and expected investor

    returns from Series B are at risk of negative real return net of dilution and time value. This

    scenario is plausible if the December 2025 Utility Dive op-ed framing — "electricity rules slowing

    industrial decarbonization" — is not resolved within two regulatory cycles (2026–2028) [CV037][CV038].


    The probability-weighted return profile favors a patient, staged investment approach: committing

    capital proportional to conviction that customer proof will be disclosed, with the option to

    increase exposure if/when Antora names its first public customer at credible scale [CV039][CV040].

    '
