  evidenceGaps:
  - type: private-evidence-only
    severity: blocking
    topic: signed-customer-list
    missingEvidence: Signed customer list with contract values, deployment timelines, and commissioning status for any Antora
      customers.
    whyItMatters: Zero public customers is the single biggest commercial risk; this gap makes the bull-case investment scenario
      unverifiable and reduces confidence in the base-case.
    diligencePath: Request directly from Antora CEO/CCO in due diligence meeting. This is a gate-level ask for any material
      investment.
    relatedQuestionRefs:
    - QV007
  - type: private-evidence-only
    severity: blocking
    topic: cap-table-preference-stack
    missingEvidence: Complete cap table, liquidation preferences, anti-dilution provisions, and option pool for all rounds
      through Series B.
    whyItMatters: Without preference waterfall data, return scenarios cannot be modeled and down-round exposure is unknown.
    diligencePath: Request from Antora CFO or legal counsel. SEC Form D provides partial data (amount raised, exempt offering)
      but not cap table details.
    relatedQuestionRefs:
    - QV029
  - type: private-evidence-only
    severity: material
    topic: probability-weighted-return
    missingEvidence: Revenue trajectory, margin profile, and confirmed Series C timing data required to model probability-weighted
      returns precisely.
    whyItMatters: Returns depend on revenue, margin, and exit multiple, all of which are unknown without management-provided
      financials.
    diligencePath: Obtain audited financials and management revenue projections; build returns model from first principles.
    relatedQuestionRefs:
    - QV012
    - QV026
  - type: private-evidence-only
    severity: material
    topic: comparable-valuation-table
    missingEvidence: Private company valuation marks and cap table details for Rondo Energy, Form Energy, and other private
      comparables are not available publicly.
    whyItMatters: The comparable valuation table is built on estimated or market-reported data; actual valuation marks would
      substantially improve the precision of the scenario analysis.
