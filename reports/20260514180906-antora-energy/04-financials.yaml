      - TI001
      - TI002

  - id: unit-economics-cost-structure
    title: Unit economics and cost structure
    body: |
      Antora's unit economics center on three primary cost drivers: (1) the input cost of renewable
      electricity purchased to charge the thermal storage modules; (2) the manufactured cost of the
      carbon block thermal battery modules themselves (the physical storage medium and enclosure);
      and (3) installation, operations, and maintenance (O&M) costs over the contract lifetime.
      Renewable electricity purchase price is the dominant variable cost and the key lever in
      Antora's financial model. The cheaper the electricity Antora can purchase—whether from
      behind-the-meter renewables, grid-scale PPAs, or renewable energy certificates—the lower
      Antora's effective COGS per GJ of heat delivered and the higher the gross margin on each
      energy service contract. At current US utility-scale solar costs of approximately $20–40/MWh
      and typical industrial heat conversion ratios, the direct input energy cost per GJ of heat
      delivered is roughly $6–14, creating very thin or negative gross margin at current electricity
      prices for customers in high-electricity-cost regions. Achieving positive unit economics at
      scale requires either: (a) very cheap renewable electricity (direct wire, behind-meter, or
      sub-$20/MWh PPAs); or (b) a significant premium from the dual heat+electricity output of the
      TPV system; or (c) both.
      Module manufacturing cost is the second major driver. Antora has three factories (San Jose CA,
      Big Stone City SD, St. Mary's PA) and the module cost follows a manufacturing learning curve
      as production volume increases. Current per-module manufacturing cost is not publicly disclosed;
      comparable energy hardware learning curves suggest significant room for cost reduction as
      Antora scales from hundreds of MWh/year to GWh/year production capacity. Installation costs
      at industrial sites vary by customer facility configuration and are not publicly disclosed.
      O&M costs include carbon block replacement cadence, TPV cell maintenance, and site support;
      Antora has not disclosed O&M terms or costs publicly. No gross margin, EBITDA, payback period,
      or return on invested capital has been disclosed for any Antora deployment. These are material
      gaps that prevent underwriting of unit economics from public information alone.
    claimRefs:
      - CI008
      - CI009
      - CI010
      - CI011
      - CI012
      - CI013
    tableRefs:
      - TI003
    figureRefs:
      - FI001
      - FI002

  - id: traction-and-metrics
    title: Commercial traction and financial metrics
    body: |
      Antora has achieved the following disclosed commercial milestones as of May 2026: the world's
      first dedicated thermophotovoltaic (TPV) cell manufacturing line (completed 2023); successful
      first commercial deployment at an undisclosed customer site (announced 2023); and operational
      or under-construction status for three US manufacturing factories across California, South
      Dakota, and Pennsylvania. No revenue figure, revenue growth rate, annual recurring revenue
      (ARR), number of paying customers, customer contract value (TCV or ACV), utilization rate,
      deployed capacity (MWh), or other standard commercial-traction metric has been publicly
      disclosed as of the diligence date.
      The absence of public revenue metrics is typical for climate-hardware companies at Antora's
      stage (pre-scale commercial, first-of-kind technology, EaaS model with recognition tied to
      long-term contracts rather than upfront booking). However, it prevents any forward financial
      modeling from public data alone. The three-factory network implies that Antora has committed
      to a significant manufacturing ramp; the actual utilization of factory capacity versus nameplate
      capacity is unknown. Customer concentration risk is high at this early stage, as the first few
      industrial anchor customers represent disproportionate revenue and reference-site value.
      One adverse consideration for Antora's financial trajectory is the broader climate tech funding
      environment in 2025–2026. Climate technology startups in capital-intensive hardware sectors
      have faced extended runway pressures as investor patience for pre-profit hardware companies has
      shortened relative to the 2020–2022 peak climate tech funding cycle. Antora's $150M Series B
      in August 2024 preceded this tightening, providing a strong financial cushion; however, future
      rounds may face more demanding profitability timelines from investors if climate-hardware
      sentiment does not improve by the time Antora next accesses capital markets.
    claimRefs:
      - CI014
      - CI015
      - CI016
      - CI017
      - CI018
      - CI019
      - CI020

  - id: capital-adequacy
    title: Capital adequacy and financing outlook
    body: |
      Antora has raised more than $230M in total disclosed equity financing across multiple rounds:
      early-stage angel and seed financing; a Series A (approximate total undisclosed but estimated
      in the $30–60M range based on investment round announcements); and a Series B of $150M announced
      in August 2024. Government grants from ARPA-E, NSF, and the California Energy Commission have
      provided additional non-dilutive capital. The Series B investors include NextEra Energy Resources
      (strategic utility partner), BHP Ventures (strategic mining customer channel), Breakthrough
      Energy Ventures, Grantham Foundation, and others. The ARPA-E and NSF grant records filed as part
      of publicly searchable government award databases confirm non-dilutive program funding to Antora
      from 2017 onward; exact grant amounts are not consistently consolidated in any single public source.
      Capital adequacy from the $150M Series B depends on Antora's actual burn rate, which is not
      publicly disclosed. Based on the company's three-factory manufacturing network, its team size
      (implied by LinkedIn activity at 100–200+ employees), and comparable climate-hardware company
      burn rates, a reasonable working estimate of monthly cash consumption is $3–8 million per month.
      At this range, the August 2024 $150M Series B provides approximately 18–42 months of runway
      from close, implying a next-capital-event horizon in 2026–2028. This runway estimate is
      necessarily wide due to the absence of disclosed burn data.
      No debt financing, credit facility, or project finance obligation has been publicly disclosed
      by Antora as of May 2026. However, the EaaS model in which Antora retains ownership of
      installed assets creates a structural need for project-level financing as deployments scale—
      a capital structure evolution likely to emerge in the Series C or later. The three-factory
      construction program represents a committed CapEx obligation that has been funded in part by
      the Series B; the full CapEx of each factory is not publicly disclosed. Antora's US manufacturing
      and ARPA-E/DOE grant relationships improve its eligibility for Inflation Reduction Act
      manufacturing tax credits (Section 45X) and clean-energy investment tax credits, which could
      reduce future capital requirements.
    claimRefs:
      - CI021
      - CI022
      - CI023
      - CI024
      - CI025
