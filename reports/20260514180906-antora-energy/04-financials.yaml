callouts:
  - calloutType: risk
    title: No revenue or margin data publicly available — complete financial diligence blocker
    body: >-
      Antora has disclosed no revenue, gross margin, EBITDA, cash position, or burn rate as of May
      2026. While this is common at the Series B stage for climate hardware companies, it means that
      any investment decision must be made on a forward thesis only—no retrospective financial
      validation is possible from public sources. The five items in the Public Financial Gaps table
      (TI005) represent the minimum disclosures needed before responsible underwriting.
    claimRefs:
      - CI029
      - CI030
      - CI031

  - calloutType: risk
    title: Unit economics highly sensitive to renewable electricity input cost
    body: >-
      Antora's cost of goods sold is dominated by the price of renewable electricity used to charge
      its thermal batteries. At current US utility-scale solar PPA costs of $20–40/MWh, the electricity-
      only COGS per GJ of heat delivered approaches or exceeds the natural gas benchmark in many
      markets. Positive unit economics require very cheap electricity procurement (direct wire, behind-
      the-meter, or sub-$20/MWh), a meaningful premium from TPV electricity output, or both. This
      creates geographic and customer-site selectivity: not all industrial heat customers can provide
      Antora with an adequate electricity cost environment.
    claimRefs:
      - CI009
      - CI010
      - CI011

  - calloutType: insight
    title: EaaS model creates high capital intensity but improves revenue quality
    body: >-
      Antora's choice of an energy-as-a-service contract model—in which the company retains ownership
      of deployed thermal batteries—creates long-term, recurring contract revenue with strong visibility.
      However, it also means that every new deployment requires Antora to carry the asset on its own
      balance sheet, creating high capital intensity. At scale, this model will likely require project-
      level debt or tax-equity financing to recycle capital from early deployments; the absence of any
      disclosed debt or project finance facility as of May 2026 is a forward capital-structure risk.
    claimRefs:
      - CI001
      - CI027
      - CI028

