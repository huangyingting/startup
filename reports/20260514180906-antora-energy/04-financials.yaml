  - id: TI005
    title: Public financial gaps table
    columns:
      - Missing metric
      - Why it matters
      - Impact on diligence
      - Exact diligence path
    rows:
      - - Confirmed revenue (any period)
        - Indicates commercial traction and validates EaaS pricing model at real customer sites
        - Cannot model revenue trajectory or growth; investor conviction entirely on forward thesis
        - Request audited financials or revenue confirmation letter from CFO for last 12 months
      - - Gross margin (% or $/GJ)
        - Tells you whether the core product economics work; separates surviving startups from failing ones
        - Cannot assess whether EaaS model is viable at any scale without margin data
        - Request unit economics deck with one or more case study deployments; ask for COGS detail
      - - Cash on hand and monthly burn
        - Required to assess runway and timing of next equity raise
        - Cannot assess liquidity risk or dilution timeline without burn data
        - Request most recent board-approved budget and monthly cash flow for last 6 months
      - - Customer contract terms (TCV, duration, escalation)
        - Determines revenue quality, churn risk, and leverage in pricing renegotiation
        - Cannot assess revenue visibility or quality without contract economics
        - Request redacted versions of 2-3 executed EaaS contracts; request customer reference calls
      - - Project-level ROI and payback
        - Validates that individual deployments earn adequate return on factory output and CapEx
        - Cannot assess whether the EaaS model earns its cost of capital without project economics
        - Request project-level P&L for first commercial deployment (audited if available)
      - - Implied equity valuation (Series B)
        - Required to assess the price paid per unit of commercial progress; entry price for new round
        - Cannot assess investment attractiveness without valuation and ownership stack data
        - Request cap table, Series B term sheet, and Series B pre-money valuation from management
    notes: >-
      All items in this table are unavailable from public sources as of May 2026. These are the
      minimum disclosures required before any investment commitment can be responsibly made.
