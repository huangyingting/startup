chapter:
  number: 5
  title: Product & Technology
  summary: >-
    Databricks now ships a broad data-and-AI platform rather than a single lakehouse engine: governed ingestion and
    medallion pipelines, serverless SQL and BI, model-serving and external-model governance, plus the newer Lakebase
    operational database and Lakewatch security layer. The public record supports a real multi-cloud architecture with
    unified governance and active developer tooling, but it still leaves gaps around forward roadmap dates,
    product-family SLAs, and independently verified AI-security effectiveness.
sections:
  - id: product-scope-workflow
    title: Product scope and customer workflow coverage
    body: >-
      Databricks is best understood as a workflow platform that starts before analytics and extends beyond it. The
      product surface now spans ingestion and transformation patterns, bronze-silver-gold lakehouse organization,
      centralized governance, BI consumption, AI model deployment, and operational application databases. LakeFlow
      matters because it pulls ingestion, transformation, and orchestration closer to the platform rather than leaving
      those jobs entirely to partners. Unity Catalog and AI/BI matter because they move Databricks from
      technical-platform ownership toward business-facing semantics, lineage, and conversational analytics. Mosaic AI
      Model Serving extends that workflow into real-time and batch inference, while Lakebase pushes the platform further
      into operational application development by pairing Postgres with the lakehouse. The net result is a broader
      customer journey: ingest and clean data, govern it centrally, expose metrics and dashboards to business users,
      deploy models and external-model endpoints, and increasingly build applications or agents on top of the same
      governed data estate. That breadth is strategically valuable because it reduces tool sprawl, but it also means
      underwriting Databricks requires assessing how coherently these modules work together rather than judging a single
      warehouse SKU.
    claimRefs:
      - CE001
      - CE002
      - CE007
      - CE011
      - CE012
      - CE014
      - CE020
      - CE021
      - CE022
      - CE028
