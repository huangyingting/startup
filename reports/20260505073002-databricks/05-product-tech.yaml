callouts:
  - calloutType: strength
    title: Unity Catalog is the strategic control point that ties Databricks' expanding surface area together
    body: >-
      Databricks' strongest product-tech advantage is not any single compute engine; it is the fact that Unity Catalog
      now sits across data, AI assets, external systems, open formats, and BI semantics. That gives Databricks a
      plausible claim to be the governance and metadata control plane even when workloads span multiple clouds, formats,
      and user personas.
    claimRefs:
      - CE004
      - CE005
      - CE009
      - CE010
      - CE013
      - CE035
  - calloutType: risk
    title: Platform breadth increases operational and trust burden
    body: >-
      Databricks is adding more workflow stages and more critical workloads to one platform, but public evidence on
      service-family SLA history, AI-security efficacy, and Lakebase-at-scale performance is still incomplete. The
      active compute disruption visible on the AWS status page on the run date is a reminder that breadth does not
      remove reliability risk.
    claimRefs:
      - CE025
      - CE033
      - CE045
      - CE046
  - calloutType: insight
    title: Developer tooling cadence suggests Databricks wants to be automated infrastructure, not just an analyst UI
    body: >-
      Recent CLI and SDK releases, runtime bundling, and multi-cloud authentication paths point to a product strategy
      that assumes engineering teams will automate Databricks rather than only click through notebooks and dashboards.
      That matters because product durability increasingly depends on ecosystem integration and programmatic control.
    claimRefs:
      - CE037
      - CE038
      - CE039
