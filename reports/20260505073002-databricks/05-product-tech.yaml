  - id: TE002
    title: Workflow / use-case table
    columns:
      - User job
      - Current workflow
      - Databricks solution
      - Measurable benefit
      - Limitation
    rows:
      - - Ingest SaaS and database data
        - Teams often chain separate ingestion, replication, and orchestration tools before analytics
        - LakeFlow ingestion, transformation, and orchestration inside Databricks
        - LakeFlow was launched to reduce the need for bespoke or third-party ingestion stacks
        - Public evidence does not show connector reliability or realized replacement rates at scale.
      - - Create governed enterprise data products
        - Data lands in fragmented stores and governance tools with duplicated controls
        - Medallion layers plus Unity Catalog governance and lineage
        - Unified governance and lineage reduce audit friction and make downstream usage easier to trace
        - Public proof of governance-operating efficiency is still mostly vendor-authored.
      - - Let business users self-serve analytics
        - BI sits on separate semantic layers and seat-based licensing models
        - AI/BI Dashboards, Genie, Databricks SQL, and Business Semantics on governed data
        - No public per-seat BI fee and conversational analytics reduce access friction
        - Customer migration effort from incumbent BI tools is not publicly quantified.
      - - Deploy and manage AI inference
        - Teams manage separate model endpoints, APIs, and provider credentials
        - Mosaic AI Model Serving with REST APIs, serverless scaling, and centrally governed external models
        - Unified batch and real-time inference path simplifies deployment under one control plane
        - Independent latency, cost, and security comparisons are limited.
      - - Build operational apps on governed data
        - Operational databases and analytics warehouses are separated by ETL and separate tooling
        - Lakebase adds Postgres integrated with the lakehouse and Databricks Apps
        - >-
          VentureBeat reported early adopters cutting app-delivery times by 75%-95% or 56%-92% depending on customer
          example
        - Those performance outcomes are company-reported through press coverage and not yet broadly audited.
    notes: >-
      Benefits are only included where the retained sources provided a concrete workflow or outcome statement.
      Press-reported customer outcomes remain lower confidence than audited benchmark data.
    claimRefs:
      - CE011
      - CE013
      - CE020
      - CE021
      - CE022
      - CE023
      - CE030
      - CE040
      - CE043
  - id: TE003
    title: Technology / operating architecture table
    columns:
      - Layer / component
      - Role
      - Dependency
      - Risk
    rows:
      - - Account + control plane
        - Hosts web app, account services, APIs, and central coordination
        - Databricks-managed control plane and account services
        - Control-plane concentration creates blast-radius risk if central services degrade.
      - - Workspace + classic compute plane
        - Runs notebooks, jobs, and customer-managed compute in the customer cloud account
        - Customer cloud networking, identity, and classic cluster configuration
        - Security posture varies with workspace design and cloud-account hygiene.
      - - Serverless compute
        - Runs model serving and serverless SQL without customer-managed public IPs
        - Databricks-managed serverless infrastructure and separate terms enablement
        - Less customer control and public transparency on service-family SLAs and incident rates.
      - - Lakehouse data pipeline
        - Organizes data through bronze, silver, and gold quality layers
        - Storage systems, ingestion tools, and medallion discipline
        - Poor upstream data quality still propagates if silver/gold controls are weak.
      - - Unity Catalog metadata plane
        - Enforces governance, lineage, discovery, and federation
        - Open formats, external systems, and policy configuration across clouds
        - Metadata centralization is strategic strength but becomes a control-plane dependency.
      - - AI deployment layer
        - Serves internal and external models via REST APIs and AI Functions
        - Serverless compute, model registries, and third-party model providers such as OpenAI and Anthropic
        - Latency, cost, and policy outcomes partly depend on external-model vendors.
      - - Open ecosystem + partner cloud layer
        - Extends Databricks through Iceberg, BigQuery, Gemini, and GPU acceleration
        - Google Cloud, NVIDIA, and open-table-format interoperability
        - Differentiation is tied to partner performance and evolving open-format standards.
      - - Operational database layer
        - Runs Lakebase Postgres for AI-agent and operational apps
        - Neon/Mooncake-derived database tech plus Unity Catalog sync
        - Newer product category with less public scaling and reliability history than core lakehouse.
    notes: >-
      The table emphasizes operating-model dependencies rather than low-level implementation details. Public sources
      support the control-plane split, medallion pipeline, and partner dependencies but not internal service topology.
