  evidenceGaps:
    - type: missing-source
      severity: material
      topic: Service-level reliability metrics by region and product line
      missingEvidence: >-
        Databricks does not publicly publish product-family SLA percentages, incident counts, or MTTR by region for
        AI/BI, compute, Apps, SQL, and model serving.
      whyItMatters: >-
        Product diligence needs durable reliability evidence, not just a live status snapshot, to underwrite enterprise
        production risk.
      diligencePath: >-
        Request historical SLA reports, incident postmortems, and service-family uptime by cloud and region for the last
        12 months.
      relatedQuestionRefs:
        - QE022
      relatedTableRefs:
        - TE004
    - type: private-evidence-only
      severity: material
      topic: Forward product roadmap beyond announced 2024-2026 launches
      missingEvidence: >-
        Public materials show release cadence and launched products, but not a dated roadmap for post-May-2026 feature
        deliveries across AI, BI, and database products.
      whyItMatters: >-
        Roadmap credibility affects differentiation durability and implementation timing for enterprise buyers and
        investors.
      diligencePath: >-
        Request internal roadmap by quarter, launch criteria, and dependencies for Lakebase, AI/BI, Lakewatch, and
        serverless platform features.
      relatedQuestionRefs:
        - QE023
      relatedTableRefs:
        - TE005
    - type: missing-source
      severity: material
      topic: Independent proof of AI security and responsible-AI control efficacy
      missingEvidence: >-
        Databricks documents AI security resources and launched Lakewatch, but public independent evidence on detection
        quality, false positives, red-team results, or customer outcomes is sparse.
      whyItMatters: >-
        Trust and safety claims are central to regulated AI adoption and materially affect how much risk to assign to
        new AI-facing workloads.
      diligencePath: >-
        Request customer references, third-party assessments, red-team summaries, and benchmarking for Lakewatch and
        Databricks responsible-AI controls.
      relatedQuestionRefs:
        - QE024
      relatedTableRefs:
        - TE004
    - type: missing-source
      severity: minor
      topic: Broader developer-ecosystem adoption counts
      missingEvidence: >-
        Public pages expose release activity, stars, and one PyPI package version, but do not cleanly provide broader
        download totals, active-contributor trends, or usage counts across the wider Databricks developer ecosystem.
      whyItMatters: >-
        Developer-signal depth helps assess ecosystem stickiness and productization beyond enterprise sales-led
        deployment.
      diligencePath: >-
        Pull GitHub API contributor history, package-registry download statistics, Marketplace installation counts, and
        community-forum activity across major Databricks developer assets.
      relatedQuestionRefs:
        - QE025
      relatedTableRefs: []
