    title: Databricks Product Architecture Map
    type: stack
    layout: standard
    summary: >-
      Five-layer stack showing how Databricks ties user-facing analytics and app workflows to centralized governance,
      lakehouse pipelines, AI serving, and multi-cloud infrastructure. The architecture is broad, but the control plane
      and partner ecosystem remain critical dependencies.
    data:
      layers:
        - label: User surfaces
          detail: >-
            AI/BI Dashboards, Genie, Databricks Apps, Databricks SQL, CLI, and SDK entry points for analysts,
            developers, and business users.
        - label: Governance + semantics
          detail: >-
            Unity Catalog, business semantics, lineage, discovery, and row/column policies coordinate access across data
            and AI assets.
        - label: Processing + serving
          detail: >-
            LakeFlow ingestion/orchestration, Spark and SQL compute, Mosaic AI Model Serving, and external-model
            governance via REST APIs and AI Functions.
        - label: Data + operational stores
          detail: >-
            Bronze-silver-gold lakehouse layers plus Lakebase Postgres for operational apps and agent workflows, with
            one-click sync into the governed lakehouse.
        - label: Cloud + ecosystem dependencies
          detail: >-
            AWS, Azure, and GCP footprints plus Iceberg/Delta interoperability, NVIDIA GPU acceleration, and partner
            services such as BigQuery and Gemini.
