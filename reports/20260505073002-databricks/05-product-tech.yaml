  - id: architecture-deployment-dependencies
    title: Architecture, deployment model, and critical dependencies
    body: >-
      The most supportable public architecture picture is a hybrid one: Databricks manages a control plane, while
      classic compute still runs in customer cloud accounts and serverless compute runs in Databricks-managed
      infrastructure. Azure documentation and independent architecture analysis both describe the
      control-plane/compute-plane split, while Databricks' own architecture guidance frames the platform around control
      plane, compute plane, and storage. On the data path, Databricks keeps pushing the medallion pattern because
      bronze, silver, and gold layers make it easier to express ingestion, validation, and consumption steps as one
      governed pipeline. Unity Catalog then acts as the metadata and policy plane above those assets, and model serving
      exposes governed inference endpoints through REST APIs and serverless scaling. The dependency map is therefore not
      just hyperscalers. Databricks also depends on open-table-format politics, partner cloud services such as BigQuery
      and Gemini on Google Cloud, GPU acceleration paths such as NVIDIA RAPIDS, and external model providers such as
      OpenAI and Anthropic where customers want centrally governed third-party models. This architecture is flexible and
      differentiated, but it also means product quality depends on how well Databricks manages cloud boundaries,
      open-format interoperability, and external-service performance under one control plane.
    claimRefs:
      - CE003
      - CE015
      - CE016
      - CE017
      - CE018
      - CE019
      - CE020
      - CE021
      - CE022
      - CE023
      - CE024
      - CE034
