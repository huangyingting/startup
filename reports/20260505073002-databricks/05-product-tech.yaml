tables:
  - id: TE001
    title: Product module / asset matrix
    columns:
      - Module / product line
      - Primary user
      - Status / maturity
      - Differentiation
      - Diligence gap
    rows:
      - - Core lakehouse + medallion architecture
        - Data engineers and platform teams
        - Mature core workflow
        - Single governed path from raw to enriched data across bronze, silver, and gold layers
        - Need workload-level evidence on migration friction and performance by cloud.
      - - Unity Catalog
        - Data platform, governance, security, and analytics teams
        - Mature control-plane pillar
        - Open-format governance, lineage, federation, and row/column controls across data and AI assets
        - Need public evidence on adoption depth of newer business-semantics and AI-governance features.
      - - Databricks SQL + AI/BI
        - Analysts, business users, and semantic-layer owners
        - Mature analytics with expanding business-user reach
        - Native BI on governed data with conversational analytics and no public per-seat BI fee
        - Need public proof of production BI adoption, concurrency, and dashboard migration success.
      - - Mosaic AI Model Serving
        - ML engineers, application developers, and platform teams
        - Mature serving surface with expanding external-model governance
        - Unified REST deployment and serverless serving for internal and external models
        - Need independent latency, cost, and guardrail benchmarks versus alternatives.
      - - LakeFlow
        - Data engineering teams
        - Expanding; launched 2024 and still integrating partner overlap
        - Built-in ingestion, transformation, and orchestration reduce need for separate pipeline tooling
        - Need public evidence on connector breadth, reliability, and large-scale production references.
      - - Lakebase
        - Application developers and agent builders
        - Emerging but materially advanced; GA reported in 2026
        - Operational Postgres integrated with the lakehouse, branching, point-in-time recovery, scale to zero
        - Need customer volume, cost-to-serve, and multi-cloud availability detail.
      - - Lakewatch
        - Security teams and SecOps analysts
        - Newly launched in 2026
        - Extends Databricks data platform into AI-assisted SIEM workflows
        - Need public benchmarks, customer references, and false-positive / efficacy data.
      - - CLI + Python SDK
        - Developers and platform engineers
        - Active ecosystem tooling with recent releases
        - Multi-cloud automation and developer workflows beyond notebooks alone
        - Need broader usage and contributor trends across the full ecosystem.
    notes: >-
      Rows separate mature core platform layers from newer expansion products such as Lakebase and Lakewatch. “Status /
      maturity” reflects public release evidence, not internal revenue contribution.
