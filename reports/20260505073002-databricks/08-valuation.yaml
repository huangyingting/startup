  - id: T806
    title: Final diligence asks table
    columns:
      - Topic
      - Missing evidence
      - Why it matters
      - Owner / diligence path
    rows:
      - - Cap table and preferences
        - Current share count, round prices, liquidation preferences, tender discounts, and employee-liquidity terms
        - Common-equity upside may differ materially from the headline $134B valuation
        - Company / counsel / lead investor
      - - Revenue bridge
        - Quarterly bridge from run-rate disclosure to audited GAAP revenue and deferred revenue
        - Prevents overpaying off marketing denominators
        - Finance diligence / auditor
      - - Gross margin and SBC
        - Audited gross margin by product family and stock-comp burden
        - Determines whether AI growth is real software leverage or expensive cloud pass-through
        - Finance diligence / IPO readiness workstream
      - - Debt terms
        - Debt pricing, covenant package, maturity profile, and any security or cross-default features
        - Debt capacity affects true common-equity economics and risk
        - Treasury / lender diligence
      - - Customer concentration and NRR detail
        - Top-customer exposure, churn cohorts, NRR by AI and core platform products
        - Premium multiples require proof that the biggest growth engines are durable
        - Sales ops / customer analytics
      - - IPO readiness and liquidity path
        - Board-level IPO criteria, banker prep, and any current secondary windows
        - Entry return depends heavily on timing and the next real price-discovery event
        - CEO / CFO / bankers
    notes: These asks are the minimum package needed to turn a strong company view into a cleaner valuation view.
    claimRefs:
      - C386
      - C387
      - C417
      - C423
