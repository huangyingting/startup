  evidenceGaps:
    - type: private-evidence-only
      severity: material
      topic: Series J/K/L cap table and preference stack
      missingEvidence: >-
        Share price, liquidation preferences, seniority, participating rights, and employee-liquidity terms for the
        2024-2025 financing rounds are not public.
      whyItMatters: >-
        Post-money headline valuation can materially overstate common-equity value if preferences, tender discounts, or
        structured liquidity terms sit ahead of new money.
      diligencePath: >-
        Request the current cap table, financing documents, board-approved tender terms, and any secondary trade summary
        before underwriting common-equity upside.
      relatedQuestionRefs:
        - RQ805
    - type: missing-source
      severity: material
      topic: Secondary market price discovery after Series L
      missingEvidence: >-
        No reliable public tape shows secondary pricing, discounts, or liquidity terms after the December 2025 Series L
        round.
      whyItMatters: >-
        Without a secondary-market check, investors cannot tell whether the $134B headline is clearing in real trades or
        only in primary-round marketing.
      diligencePath: >-
        Request broker indications, tender participation data, employee-sale pricing, and any board-approved liquidity
        windows.
      relatedQuestionRefs:
        - RQ828
    - type: private-evidence-only
      severity: material
      topic: Audited margin, SBC, and debt-covenant bridge
      missingEvidence: >-
        Public materials still omit audited gross margin, SBC burden, debt pricing, covenant package, and a bridge from
        run-rate to GAAP revenue.
      whyItMatters: >-
        Late-stage price discipline depends on knowing how much of the valuation rests on software economics versus
        gross-to-net cloud pass-through, dilution, and leverage.
      diligencePath: >-
        Request audited financial statements, debt agreements, management reporting packs, and an IPO-style bridge from
        recognized revenue to run-rate disclosures.
      relatedQuestionRefs:
        - RQ829
    - type: enumeration-incomplete
      severity: minor
      topic: Comparable valuation table sample limits
      missingEvidence: >-
        The comparable table uses a practical sample of public software and AI names, but it does not include a full
        cap-structure-adjusted EV set or private secondary comps.
      whyItMatters: >-
        Databricks is private and uses post-money valuation, so any public comp table is only a directional
        triangulation unless enterprise value and preferred-security detail are added.
      diligencePath: >-
        Expand the comp set with banker EV bridges, secondary marks, and private transaction terms once non-public
        materials are available.
      relatedTableRefs:
        - T804
