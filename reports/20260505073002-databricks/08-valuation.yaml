chapter:
  number: 8
  title: Valuation
  summary: >-
    Databricks looks like a high-quality late-stage infrastructure asset, but the current $134B private mark still
    depends on management-led run-rate disclosure, premium AI framing, and non-public cap-table details. Public comps
    support a premium, yet not enough margin of safety for a clean buy call at the current price.
sections:
  - id: thesis-anti-thesis
    title: Investment thesis, anti-thesis, and recommendation
    body: >-
      Databricks still looks like one of the strongest late-stage infrastructure assets in private markets. Public
      evidence supports a rare combination of scale, growth, customer depth, and improving cash generation: the company
      moved from a $62 billion Series J in December 2024 to a >$100 billion Series K term sheet in August 2025 and then
      to a $134 billion Series L in December 2025, while disclosed revenue run-rate moved from an expected $3 billion by
      early 2025 to $4.8 billion in late 2025 and $5.4 billion by early 2026. AI is no longer a side narrative;
      management and independent coverage both point to AI revenue run-rate exceeding $1.4 billion, with retention above
      140% and an expanding cohort of million-dollar customers. The anti-thesis is that almost every bullish datapoint
      is still management-led run-rate disclosure rather than audited financial reporting. Investors can admire the
      asset and still conclude that the current entry price already capitalizes much of the good news. The honest
      recommendation is therefore track, not buy: company quality is high, but public evidence is not yet clean enough
      to prove that the current price leaves venture-style upside after accounting for denominator risk, private-market
      structure, and the still-open IPO timeline.
    claimRefs:
      - CV001
      - CV005
      - CV006
      - CV007
      - CV008
      - CV011
