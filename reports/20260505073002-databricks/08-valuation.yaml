  - id: T803
    title: Bull / base / bear scenario table
    columns:
      - Scenario
      - Assumptions
      - Valuation / return logic
      - Key risks
      - Probability signal
    rows:
      - - Bull
        - >-
          Run-rate approaches $8B-$8.5B, AI mix stays premium, and IPO buyers keep rewarding AI-control-plane names
          above ordinary software comps.
        - $180B-$220B; roughly 1.3x-1.6x gross from a $134B entry over a 2-3 year hold.
        - Premium multiple must persist despite public scrutiny and broader software repricing.
        - Possible, but requires both execution and a supportive IPO tape.
      - - Base
        - >-
          Run-rate reaches about $6.0B-$6.6B, disclosure improves only modestly, and Databricks rerates toward the upper
          end of public software comps.
        - $110B-$145B; roughly 0.8x-1.1x gross from a $134B entry.
        - Current headline price leaves limited room for normal multiple compression.
        - Most plausible on public evidence because it honors both quality and denominator caveats.
      - - Bear
        - >-
          Growth decelerates toward mature-software levels, AI economics look less differentiated, or public comps stay
          anchored near 10x-15x.
        - $55B-$85B; roughly 0.4x-0.6x gross from a $134B entry.
        - A good company can still produce a weak entry if public discipline arrives before disclosure quality improves.
        - Material downside if price discovery moves faster than Databricks disclosure.
      - - Probability-weighted posture
        - Base-skewed because quality is visible but price support is incomplete.
        - Supports track rather than buy.
        - Cap-table opacity and IPO timing keep dispersion wide.
        - Late-stage private pricing needs more than admiration for the asset.
    notes: >-
      Ranges are committee discussion tools built from current public comps and explicit denominator caveats, not
      management guidance.
