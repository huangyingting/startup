  - id: valuation-context
    title: Financing context, denominator caveats, and comparable framing
    body: >-
      The most important caveat in this chapter is denominator honesty. Databricks is private, so the headline valuation
      is a post-money round mark, not a continuously traded enterprise value. The company mostly discloses annualized
      revenue run-rate, not audited GAAP revenue, and public observers do not know the cap-table seniority, tender
      discounts, or debt covenants attached to the recent financing stack. That means a simple $134 billion divided by
      $4.8 billion or $5.4 billion run-rate ratio is useful, but it is not directly comparable to a public-company
      EV/NTM revenue multiple. Even with that limitation, the rough math is informative. Databricks screens around 25x
      to 28x run-rate depending on which public denominator one uses. That is well above current public data-platform
      names such as Snowflake, MongoDB, Confluent, and Elastic, and above a scaled workflow benchmark like ServiceNow.
      It is below the extreme AI scarcity multiple implied by Palantir, which matters because it shows Databricks is
      priced as a premium hybrid: better than ordinary data infrastructure, but not yet at the very top end of public AI
      exuberance. The comp set therefore supports a fair-to-stretched conclusion rather than an obviously absurd one.
      Databricks can justify a premium, but only if growth, AI monetization, and eventual disclosure quality remain
      unusually strong.
