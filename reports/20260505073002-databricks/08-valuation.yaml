  - id: T805
    title: Thesis-break and kill triggers table
    columns:
      - Trigger
      - Threshold / event
      - Transmission to thesis
      - Action implication
    rows:
      - - Growth deceleration
        - Public growth falls materially below the >55%-65% range before disclosure quality improves
        - Reduces the premium multiple that currently separates Databricks from ordinary data-infrastructure comps
        - Move from track toward avoid unless price resets sharply lower
      - - AI monetization disappointment
        - AI run-rate grows but gross margin or attach economics prove weak in diligence
        - Turns the AI premium into lower-quality pass-through revenue
        - Cut valuation range and require product-level margin evidence before investing
      - - Public multiple compression
        - Snowflake / MongoDB / ServiceNow-style revenue multiples contract further
        - Shrinks the market-clearing range for a future IPO
        - Do not underwrite today’s private mark on stale public multiples
      - - Cap-table overhang
        - Preferred structure, tender discounts, or debt covenants materially reduce common-equity value
        - Headline valuation ceases to represent what new common-equity capital can earn
        - Rebuild the model on common-equity economics, not post-money headline value
      - - IPO timeline slips
        - No meaningful IPO preparation or disclosure path appears after another financing cycle
        - Pushes liquidity farther out and leaves valuation in a private-mark feedback loop
        - Raise required return or wait for secondary liquidity at a discount
    notes: Triggers focus on observable underwriting breaks rather than broad company-quality concerns.
