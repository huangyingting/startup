  - id: T804
    title: Comparable valuation table
    columns:
      - Comparable
      - Valuation / market cap
      - Revenue denominator
      - Implied multiple / status
      - Relevance
      - Limitation
    rows:
      - - Databricks (subject)
        - $134B private post-money
        - $4.8B-$5.4B run-rate
        - ~24.8x-27.9x
        - Shows what new money is paying for scale plus AI premium.
        - Private post-money valuation and run-rate are not the same as public EV / NTM revenue.
      - - Snowflake
        - $49.85B market cap
        - $4.472B FY2026 product revenue
        - ~11.1x
        - Closest public data-platform peer with meaningful scale and cloud economics.
        - >-
          Public market cap is not enterprise value and product revenue is a cleaner denominator than Databricks
          discloses.
      - - MongoDB
        - $21.27B market cap
        - $2.01B FY2025 total revenue
        - ~10.6x
        - Useful high-growth developer-data comp with premium software narrative.
        - Database exposure and product mix differ from Databricks lakehouse plus AI platform.
      - - Confluent
        - $11.13B market cap
        - $1.167B 2025 revenue
        - ~9.5x
        - Helpful real-time data infra comp showing where narrower infrastructure trades.
        - Streaming focus is narrower than Databricks and should not be used as a direct valuation anchor alone.
      - - Elastic
        - $5.24B market cap
        - $1.483B 2025 revenue
        - ~3.5x
        - Shows the downside of ordinary infrastructure software without a strong current AI premium.
        - Search / observability mix and weaker growth make it more of a floor than a direct peer.
      - - ServiceNow
        - $94.84B market cap
        - $13.278B 2025 revenue
        - ~7.1x
        - Scaled workflow-software benchmark for what mature, highly profitable enterprise software can trade at.
        - >-
          ServiceNow has superior disclosure and a more mature model, so the comp mostly anchors the upper bound of
          ordinary software.
      - - Palantir
        - $350.05B market cap
        - $4.475B 2025 revenue
        - ~78.2x
        - >-
          Shows what a public AI-scarcity premium can look like when narrative and government/AI demand are both
          extreme.
        - Palantir is an outlier; using it as a direct Databricks anchor would overstate fair value.
    notes: >-
      Denominators are intentionally mixed and should be read directionally: current public market cap over latest
      annual revenue for public comps, versus private post-money over disclosed run-rate for Databricks.
