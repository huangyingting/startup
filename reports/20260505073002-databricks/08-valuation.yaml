  - id: scenario-analysis
    title: Scenario analysis and price sensitivity
    body: >-
      The scenario table should be read as a pricing discipline tool, not management guidance. In a bull case,
      Databricks keeps growth closer to current levels for longer, turns AI mix into a durable margin and platform
      premium, and reaches an IPO window while still looking more like an AI control plane than a mature data-warehouse
      vendor. That outcome can justify a valuation above the current mark. In a base case, the company continues to
      execute well, but public-market comp pressure and the move from run-rate rhetoric to IPO-grade scrutiny compress
      the premium enough that upside from a $134 billion entry is limited. In a bear case, the company is still good,
      but good is not enough: growth decelerates, AI monetization looks more like pass-through than software leverage,
      or public software multiples remain anchored near the current Snowflake / MongoDB / ServiceNow range. The result
      is that public evidence points to wide dispersion but a base-skewed distribution. That is why the chapter’s
      posture is positive on the asset and disciplined on price. The risk is not that Databricks is weak; it is that the
      current price leaves too little room for ordinary execution mistakes or a less forgiving IPO tape.
    claimRefs:
