  - id: T802
    title: Thesis / anti-thesis table
    columns:
      - Dimension
      - Thesis
      - Anti-thesis
      - What would change the view
    rows:
      - - Scale and growth
        - Run-rate rose from roughly $3B expected in early 2025 to $5.4B by early 2026, with growth still >55% to 65%.
        - The strongest datapoints are still management-led run-rate snapshots rather than audited financial statements.
        - An audited revenue bridge and quarter-by-quarter disclosure would strengthen conviction.
      - - AI monetization
        - >-
          AI products now look like a real second engine at >$1.4B run-rate and around one-quarter of run-rate by Sacra
          estimates.
        - AI mix can still overstate value if economics are pass-through heavy or margin-dilutive.
        - >-
          Gross-margin disclosure by AI product family would prove whether the premium is software quality or just
          higher workload volume.
      - - Customer depth
        - '>700 to 800 customers above $1M run-rate and >140% retention suggest durable expansion in large accounts.'
        - Public sources still do not disclose concentration, churn, or workload-level net expansion by product.
        - Customer-cohort disclosure and concentration data would materially improve underwriting.
      - - Comp premium
        - >-
          Databricks deserves a premium to Snowflake, MongoDB, Confluent, and Elastic because it combines data
          infrastructure with AI control-plane narrative.
        - At ~25x to 28x run-rate, the premium is already large relative to most public software benchmarks.
        - A lower entry price or a sustained public AI premium would make the premium easier to underwrite.
      - - Exit optionality
        - The IPO window could open in 2026 or later, creating a path to public repricing.
        - >-
          Timing remains management-controlled and disclosure-light; staying private longer can also defer price
          discovery.
        - A formal IPO timeline or confidential filing would improve exit confidence.
    notes: The anti-thesis focuses on price and disclosure, not on whether Databricks is strategically important.
