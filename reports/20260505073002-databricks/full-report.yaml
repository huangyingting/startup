              - C366
      - number: '7.2'
        title: Operational risk is transmitted through outages, shared responsibility, and partner concentration
        blocks:
          - type: paragraph
            body: >-
              Databricks’ operational risk is not just whether a core service stays up; it is how many critical
              workflows sit on top of cloud-specific deployments, partner models, and customer-side configuration. The
              official status page gives visibility, but third-party monitoring still shows enough Azure Databricks
              incident volume to treat reliability as an underwriting variable rather than a footnote. Databricks’ own
              documentation also makes clear that security and compliance are shared responsibilities across Databricks,
              customers, and cloud providers. That structure is normal for cloud infrastructure, but it means customer
              misconfiguration, workload placement, or control gaps can still become Databricks problems in practice
              when large enterprises evaluate renewals or incident response. At the same time, the company’s AI roadmap
              is increasingly entangled with Google Gemini, Anthropic Claude, SAP’s embedded data cloud route, and
              hyperscaler-native buyer relationships. These partnerships clearly accelerate distribution and feature
              breadth, yet they also create concentrated dependencies around account control, model access, and
              gross-margin leakage that public sources do not quantify.
            claimRefs:
              - C326
              - C327
              - C336
              - C337
              - C338
