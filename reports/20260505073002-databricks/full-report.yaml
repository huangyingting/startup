      - C362
      - C363
      - C364
  - id: F702
    title: Risk transmission map
    type: dag
    layout: wide
    summary: >-
      Databricks’ key risks flow through a small set of channels: legal burden, outages, and partner concentration all
      feed margin, growth durability, and valuation support.
    data:
      nodes:
        - id: legal
          label: Legal / regulatory burden
          detail: Copyright litigation plus AI Act and transfer obligations.
          tone: warning
        - id: ops
          label: Reliability incidents
          detail: Cloud-specific outages, operational disruptions, and weak RCA visibility.
          tone: warning
        - id: partners
          label: Partner concentration
          detail: Hyperscalers, SAP, and frontier-model providers influence product and GTM.
          tone: warning
        - id: trust
          label: Enterprise trust
          detail: Buyer willingness to deepen commitments after legal or uptime shocks.
          tone: warning
        - id: margin
          label: Margin pressure
          detail: Model-provider costs, partner economics, remediation, and compliance cost.
          tone: negative
        - id: growth
          label: Growth durability
          detail: Whether expansion into AI apps, Lakebase, and large accounts keeps compounding.
          tone: warning
        - id: financing
          label: Financing dependence
          detail: Need for debt, private rounds, or IPO timing support.
          tone: negative
        - id: valuation
          label: Valuation support
          detail: Whether the $134B mark stays defensible at entry.
          tone: negative
      edges:
        - from: legal
          to: trust
        - from: legal
          to: margin
        - from: ops
          to: trust
        - from: ops
          to: margin
        - from: partners
          to: margin
        - from: partners
          to: growth
        - from: trust
          to: growth
        - from: margin
          to: financing
        - from: growth
          to: valuation
        - from: financing
          to: valuation
    approximationNotes: 'The graph is qualitative and source-backed: it shows transmission channels rather than a synthetic risk model.'
