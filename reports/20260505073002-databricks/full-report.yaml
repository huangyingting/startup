      - number: '7.4'
        title: Mitigations are visible, but the kill criteria depend on closing private diligence gaps
        blocks:
          - type: paragraph
            body: >-
              Databricks’ strongest public mitigation is that it already looks like a company preparing for much more
              invasive diligence: trust materials are organized, privacy contracting is explicit, public-sector
              authorization exists, and the status surface is transparent enough for outside monitoring. Those are
              meaningful positives. But a risk chapter should convert them into concrete thresholds. The legal thesis
              breaks if copyright litigation escalates into class certification, injunctive relief, or reserve levels
              that change unit economics. The operational thesis weakens if outage frequency stays elevated without
              corresponding public or private evidence of SLO discipline and postmortem quality. The dependency thesis
              worsens if hyperscaler bundles or model-provider repricing change who controls the account or who captures
              the gross margin. And the valuation thesis remains fragile until private diligence closes four gaps that
              public materials do not answer: partner economics, customer concentration, debt covenants, and litigation
              downside. Without those, Databricks can still be an exceptional company while remaining a difficult
              late-stage entry price.
            claimRefs:
