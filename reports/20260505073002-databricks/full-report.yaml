      - number: '1.5'
        title: Milestones to reuse later, including the active adverse marker
        blocks:
          - type: paragraph
            body: >-
              The milestone record is rich enough that later chapters should not have to rediscover it. Databricks was
              founded in 2013, acquired MosaicML in 2023 to accelerate enterprise generative AI, moved in 2024 to
              acquire Tabular to converge Delta Lake and Apache Iceberg ecosystems, partnered with SAP in early 2025,
              and agreed in mid-2025 to acquire Neon to push deeper into operational databases for AI agents. Those
              strategic moves line up closely with the financing sequence from Series J to Series K to Series L and then
              the February 2026 debt-and-equity expansion. The one adverse event that clearly belongs in the chronology
              is the ongoing copyright litigation tied to Mosaic-era and DBRX-related model training. The Register and
              Saveri both indicate that the case survived a motion to dismiss in April 2026, so this is not a stale
              allegation that can be ignored. It should carry into later risk work as an active IP and model-governance
              issue.
