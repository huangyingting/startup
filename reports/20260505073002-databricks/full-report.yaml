  - id: F801
    title: Recommendation logic
    type: flow
    layout: standard
    summary: >-
      Decision chain from Databricks scale, disclosure quality, comp premium, and exit timing to the final
      recommendation.
    data:
      nodes:
        - id: n1
          label: Scale & growth
          description: $5.4B run-rate and >55%-65% growth remain elite by software standards.
        - id: n2
          label: AI proof
          description: AI run-rate above $1.4B supports a premium narrative rather than a legacy lakehouse story.
        - id: n3
          label: Disclosure gap
          description: Audited revenue, margins, cap-table terms, and debt covenants remain non-public.
        - id: n4
          label: Public comp anchor
          description: Most public software comps trade well below Databricks’ implied 25x-28x run-rate multiple.
        - id: n5
          label: Recommendation = track
          description: Strong asset quality, but current price still needs better disclosure or a lower entry point.
      edges:
        - from: n1
          to: n5
        - from: n2
          to: n5
        - from: n3
          to: n5
        - from: n4
          to: n5
