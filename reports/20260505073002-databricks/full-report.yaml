      - number: '3.4'
        title: Moat durability, open formats, and adverse evidence
        blocks:
          - type: paragraph
            body: >-
              Databricks' strongest differentiation still comes from combining open lakehouse positioning, governed
              data-and-AI workflows, and enough product breadth to span engineering and business users. Unity Catalog is
              the centerpiece because it expands beyond permissions into lineage, semantics, business metrics, and
              open-format governance, while AI/BI reduces one classic weakness versus Microsoft by offering native
              dashboards and conversational analytics without per-seat BI pricing. But the adverse evidence is material.
              Databricks itself is pushing Iceberg REST catalog support and external-engine interoperability, which is
              strategically smart but also lowers proprietary lock-in. BigQuery now has managed Iceberg support,
              Redshift highlights open formats and Iceberg-compatible access through the AWS lakehouse, and Snowflake
              has responded with its own Iceberg and Open Catalog posture. Fabric raises a different kind of threat:
              even if it is not as cloud-neutral as Databricks, it can use Microsoft procurement, Power BI distribution,
              and Copilot familiarity to win pragmatic standardization decisions. The upshot is that Databricks still
              appears better positioned than most single-product rivals, but its moat is no longer format lock-in. It
              depends on whether Databricks can remain the best governed control plane across open data, AI assets, and
              business semantics faster than cloud bundles commoditize the underlying infrastructure.
