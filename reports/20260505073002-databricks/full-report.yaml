      - number: '4.2'
        title: GTM motion and the public unit-economics proxies that actually exist
        blocks:
          - type: paragraph
            body: >-
              Databricks still does not publish CAC, payback, quota efficiency, or sales-cycle duration, so the right
              approach is to lean on public expansion proxies rather than fabricate SaaS precision. The best signals
              come from spending cohorts and retention. CNBC reported that Databricks had net retention above 140% in
              June 2025, nearly 50 customers spending more than $10 million annually in the first quarter of the new
              fiscal year, and roughly 8,000 employees while continuing to hire aggressively. By February 2026
              Databricks and CRN were both citing more than 800 customers consuming over $1 million in annual revenue
              run-rate and more than 70 above $10 million. Those cohorts strongly suggest a land-expand motion with
              material cross-sell potential across engineering, warehousing, BI, and AI workloads. Sacra also estimates
              average contract value around $208,696 as of June 2024, which is directionally useful but not a substitute
              for booked ARR disclosures. The chapter should therefore treat Databricks sales efficiency as promising
              but only partially observable: public evidence supports strong expansion within existing enterprise
              accounts, but it does not reveal the customer-acquisition cost, discounting intensity, or
              time-to-productivity needed for a full payback model.
            claimRefs:
              - C192
              - C193
              - C196
              - C023
              - C197
              - C219
              - C220
      - number: '4.3'
        title: Cost structure, gross-margin path, and why dual billing matters
        blocks:
          - type: paragraph
            body: >-
              The cleanest public margin insight is not a Databricks audited statement but the mechanics of the platform
              and comparator filings. Databricks itself says total cost of ownership spans two components: direct
              platform costs and the underlying cloud infrastructure costs needed to run workloads. Microsoft adds the
              operational detail that Azure Databricks customers are billed for both VMs and DBUs, that idle pools can
              still incur infrastructure billing, and that committed-use purchases lower DBU prices but do not eliminate
              the cloud bill. That means Databricks margin quality will depend on software take-rate, workload mix,
              negotiated hyperscaler economics, and how much new AI serving and database usage compresses margin before
              scale catches up. Snowflake’s 2026 10-K is a helpful upper-bound comparator: product gross margin was 72%
              even after $248.1 million of additional third-party cloud infrastructure expense, including AI inference.
              Confluent’s filing is the cautionary counterexample: it says public-cloud pricing materially affects gross
              margins, that Confluent Cloud historically carried a lower average price than its legacy platform, and
              that the company shifted toward free-trial and pay-as-you-go land motions with more near-term volatility.
              Independent Databricks-specific analysis points in the same direction. CloudForecast, Mammoth, and Revefi
              all highlight that DBU pricing plus separate cloud charges make spend harder to predict, especially as AI
              workloads spike. The implication is that Databricks could still have attractive software economics, but
              margin underwriting remains incomplete without audited gross-profit and operating-cash detail.
            claimRefs:
              - C177
              - C178
              - C179
