          category: platform
          note: Customer-cloud execution environments for classic workloads.
        - id: srv
          label: Databricks serverless compute
          category: platform
          note: Managed compute for serverless SQL and model serving.
        - id: uc
          label: Unity Catalog metadata plane
          category: platform
