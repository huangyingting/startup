  - id: F701
    title: Risk heatmap
    type: matrix
    layout: wide
    summary: >-
      Databricks’ heaviest residual risks cluster where legal exposure, partner concentration, and premium valuation
      reinforce one another.
    data:
      columns:
        - Likelihood
        - Impact
        - Mitigation maturity
        - Residual severity
      rows:
        - label: AI copyright litigation
          values:
            - label: medium
              tone: warning
              detail: Active U.S. and Canadian matters keep the issue live.
            - label: high
              tone: negative
              detail: Adverse rulings could hit cost, trust, and AI roadmap confidence.
            - label: medium
              tone: warning
              detail: Trust and legal materials exist, but reserve and insurance detail is private.
            - label: high
              tone: negative
              detail: Residual exposure stays high until provenance and downside are privately closed.
        - label: Privacy / AI regulation
          values:
            - label: medium-high
              tone: warning
              detail: AI Act and transfer rules are now live and still evolving.
            - label: high
              tone: warning
              detail: Regulatory scope creep can raise cost and slow regulated GTM.
            - label: medium-high
              tone: neutral
              detail: DPA, SCCs, DPF, and compliance artifacts are meaningful mitigations.
            - label: medium-high
              tone: warning
              detail: Coverage looks strong but not clearly uniform across every cloud and tier.
        - label: Outage / reliability
          values:
            - label: medium
              tone: warning
              detail: Recent outage frequency is material enough to monitor.
            - label: high
              tone: negative
              detail: Core analytics and AI workloads can be customer-critical.
            - label: medium
              tone: warning
              detail: Public status visibility exists, but SLO and RCA detail is thin.
            - label: medium-high
              tone: warning
              detail: Residual risk persists without enterprise reliability disclosure.
        - label: Partner / model concentration
          values:
            - label: high
              tone: negative
              detail: Strategic cloud, SAP, and model-provider ties are clearly visible.
            - label: high
              tone: negative
              detail: Availability, economics, and account control can move through these nodes.
            - label: medium
              tone: warning
              detail: Multi-cloud and multi-model breadth helps but does not remove concentration.
            - label: high
              tone: negative
              detail: Public sources do not quantify partner economics or fallback quality.
        - label: Valuation / financing
          values:
            - label: medium-high
              tone: warning
              detail: A $62B to $134B step-up in roughly a year compresses room for error.
            - label: high
              tone: negative
              detail: Missed execution or weaker IPO conditions would affect entry support quickly.
            - label: medium
              tone: warning
              detail: Free cash flow and revenue growth are positive, but key underwriting data stay private.
            - label: high
              tone: negative
              detail: Residual valuation risk remains high until private diligence closes concentration and covenant gaps.
    approximationNotes: >-
      This heatmap uses source-backed ordinal scoring to rank residual exposure rather than pretending to know synthetic
      probabilities.
    claimRefs:
