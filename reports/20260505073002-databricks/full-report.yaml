      - number: '3.3'
        title: Pricing, packaging, switching cost, and multi-homing
        blocks:
          - type: paragraph
            body: >-
              Pricing structure is one of the main reasons this market remains multi-homed. Databricks prices on a
              pay-as-you-go basis with per-second billing and committed-use discounts, but its public materials
              emphasize model structure more than a single simple list price. Snowflake is more explicit about billing
              mechanics: storage, compute, and data transfer are distinct, with compute metered in credits and even a
              small standard warehouse consuming 2 credits per hour. BigQuery exposes a similarly transparent structure
              through per-TiB scanning and slot-hour commitments. Fabric turns the buying decision into shared Capacity
              Units and reservation savings, while still preserving Power BI licensing nuances that can favor
              Microsoft-centric rollouts. Redshift sets clear low-entry serverless and provisioned starting prices and
              can ride existing AWS enterprise commitments. Confluent uses usage-based Kafka and Flink units that are
              attractive when streaming, not warehousing, is the center of gravity. The consequence is that Databricks'
              switching costs are real only after the platform owns governance, semantics, and multiple workload types.
              Before that, multi-homing is rational: enterprises can keep Snowflake for SQL-heavy sharing, BigQuery for
              GCP-resident analytics, Fabric for Power BI-heavy teams, Redshift for AWS-native warehousing, and
              Confluent for streaming while still using Databricks for engineering or AI.
            claimRefs:
