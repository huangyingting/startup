  - id: T303
    title: Pricing / packaging comparison
    columns:
      - Platform
      - Price / unit / contract model
      - Included capabilities
      - Discount / unknowns
      - Implication
    rows:
      - - Databricks
        - Pay-as-you-go, per-second billing; committed-use contracts available
        - Unified data, analytics, governance, SQL, AI, and AI/BI surfaces
        - >-
          Exact realized net pricing varies by SKU and cloud; public page stresses structure more than a single headline
          price
        - Flexible but harder for outsiders to benchmark precisely against simpler warehouse tariffs
      - - Snowflake
        - Storage + compute + data transfer; compute uses credits; small standard warehouse = 2 credits/hour
        - Managed SQL analytics and AI platform with separate virtual warehouses
        - Credit price depends on edition / cloud agreement; per-second billing has 60-second minimum per start
        - Transparent meter design but forecasting requires credit discipline
      - - BigQuery
        - On-demand $6.25 per TiB scanned or capacity pricing per slot-hour with editions
        - Serverless analytics, reservations, autoscaler, and AI features in BigQuery editions
        - Actual cost depends on bytes scanned or slot commitments
        - Easy low-friction entry but cost can jump with inefficient scans or sustained slot demand
      - - Microsoft Fabric
        - Shared Capacity Units via pay-as-you-go or reservation; ~41% reservation savings cited
        - Data engineering, warehousing, BI, AI experiences, and OneLake in one SaaS environment
        - Publish/share workflows still often require Power BI Pro; some value depends on existing Microsoft contracts
        - Bundle economics are strong in Microsoft estates even when pure feature-by-feature comparison is debatable
      - - AWS Redshift
        - Provisioned from $0.543/hour or serverless from $1.50/hour; RPU-hour billing per second
        - Warehouse, S3-lakehouse querying, zero-ETL, and AI integrations
        - Reservations can cut serverless compute cost up to 45%; exact TCO depends on S3 and adjacent AWS usage
        - Low entry point and AWS commitment leverage create a credible pricing wedge
      - - Confluent Cloud + Flink
        - Kafka autoscaling via eCKUs; Flink priced by CFUs per minute; annual commitments available
        - Streaming, schema, governance, and serverless Flink processing
        - Warehouse and BI spend still sits elsewhere; price advantage depends on streaming-first architecture
        - Attractive when teams want to transform or filter data before paying downstream warehouse costs
    notes: This table compares public billing mechanics and packaging posture rather than negotiated enterprise net price.
