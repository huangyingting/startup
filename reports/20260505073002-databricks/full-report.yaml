  - number: 4
    title: Financials
    sections:
      - number: '4.1'
        title: Revenue model, monetization surfaces, and public traction quality
        blocks:
          - type: paragraph
            body: >-
              Databricks now looks financially more like a broad consumption platform than a single analytics SKU. The
              reviewed public pricing and product surfaces show multiple monetization entry points: data engineering and
              warehousing compute, AI and model-serving workloads, AI/BI, and newer database products. The important
              underwriting distinction is that these are usage-based streams, not seat-based subscriptions. Databricks
              and Microsoft each describe DBU-driven billing with per-second granularity, while Microsoft also makes
              explicit that Azure customers pay both VM infrastructure charges and DBU platform charges. That dual-bill
              structure matters because public traction claims look strong but are not equivalent to realized software
              gross profit. On the traction side, company and independent sources line up on a sharp expansion path from
              $2.6 billion of recognized fiscal-2025 revenue to a $3.7 billion annualized rate by July 2025, then to
              $4.0 billion in September 2025 and $5.4 billion by February 2026. AI has become a material second engine
              rather than a marketing overlay: Databricks said AI products crossed $1.0 billion annualized revenue in
              September 2025 and $1.4 billion by February 2026, while CRN separately noted data warehousing still
              exceeded a $1.0 billion revenue run-rate. That is a healthier mix signal than a single narrowly defined
              warehouse story.
            claimRefs:
              - C176
              - C177
              - C178
              - C179
              - C180
              - C181
              - C182
              - C183
              - C184
              - C185
