  - number: 7
    title: Risks
    sections:
      - number: '7.1'
        title: Legal, regulatory, and security risk is real even with a strong public trust surface
        blocks:
          - type: paragraph
            body: >-
              Databricks has a stronger public compliance and trust posture than many private infrastructure vendors: it
              publishes a privacy notice, a downloadable DPA, a trust center, a due-diligence package, a legal hub, and
              technical documentation that explicitly describes security responsibilities. That matters because it
              reduces initial diligence friction and shows the company is built to sell into regulated enterprises. The
              residual risk is that documentation is not the same thing as cleared exposure. The EU AI Act is now live
              with phased obligations for general-purpose AI models, public-sector authorization is explicitly cloud-
              and package-specific, and Databricks remains inside an active copyright dispute tied to Mosaic and DBRX.
              The Books3 / RedPajama litigation is not a theoretical AI-policy debate; it is a live legal process with
              U.S. and Canadian dimensions, uncertain damages, and potential reputational spillover for enterprise AI
              buyers. Databricks therefore looks better prepared than many peers on paper, but still exposed to a
              combination of regulatory scope creep, model-governance scrutiny, and litigation outcomes that are
              difficult to price from public data alone.
            claimRefs:
              - C319
              - C322
              - C325
              - C326
              - C327
              - C328
              - C329
              - C330
              - C331
              - C332
