companyProfile:
  summary: >-
    Databricks is a late-stage private data-and-AI infrastructure company that grew out of the Apache Spark ecosystem
    and now sells a multicloud platform spanning data engineering, lakehouse storage and governance, warehousing, AI/BI,
    model and agent tooling, and adjacent database services. The company has reached rare private-market scale, with
    disclosed revenue run-rate above $5 billion, deep Fortune 500 penetration, and a fast-growing AI revenue stream, but
    public disclosure still lags what investors would normally expect to underwrite a $134 billion entry cleanly.
  foundedDate: '2013-01-01'
  founders:
    - name: Ali Ghodsi
      role: Co-founder, CEO
      background: UC Berkeley academic and Spark-era founder who became Databricks' principal public operator.
      claimRefs: []
    - name: Matei Zaharia
      role: Co-founder
      background: Creator of Apache Spark and a central technical founder behind the lakehouse and platform narrative.
      claimRefs: []
    - name: Ion Stoica
      role: Co-founder
      background: UC Berkeley professor and AMP Lab leader who anchored the company's distributed-systems credibility.
      claimRefs: []
  foundingLocation: Berkeley, California, USA
  headquarters: San Francisco, California, USA
  productSummary: >-
    Databricks sells a unified, usage-based data and AI platform that combines lakehouse storage formats, data
    engineering, warehousing, governance, AI/BI, model and agent tooling, and multicloud deployment across Azure, AWS,
    and Google Cloud.
  customerFocus: >-
    Large enterprises, digital-native companies, public-sector organizations, and data/AI teams that want a governed
    multicloud platform for analytics and production AI.
  businessModel: >-
    Primarily usage-based monetization through DBUs and adjacent serverless services, with expansion driven by workload
    growth, higher-value AI products, warehousing, governance, and broader platform adoption inside large accounts.
  stage: Late-stage private / pre-IPO
  fundingStatus: >-
    Public financing sequence moved from a $62B Series J in December 2024 to more than $100B in Series K terms and a
    $134B Series L in December 2025, followed by a February 2026 package combining equity and debt.
  disclosureProfile: private-disclosed
  claimRefs: []
chapters:
  - number: 1
    title: Company Overview
    sections:
      - number: '1.1'
        title: Identity, mission, and the current public company shape
        blocks:
          - type: paragraph
            body: >-
              Databricks now presents itself as a large late-stage private infrastructure company rather than a narrowly
              defined Spark vendor. The cleanest current identity source is the official about page, which calls
              Databricks the data and AI company and frames the Data Intelligence Platform as a unified foundation for
              data, governance, and AI. Headquarters are clearly anchored in San Francisco and the contact page provides
              a specific 160 Spear Street address, which makes the company easy to anchor geographically for later
              chapters. The public scale message has also changed over time in a way worth preserving: the about page
              still says more than 15,000 organizations use Databricks, while the current press kit and later 2025-2026
              press releases move that number to more than 20,000 customers. The safest reusable identity for the rest
              of the report is therefore a San Francisco-headquartered, privately held data-and-AI platform company with
              a multicloud operating model, broad enterprise reach, and explicit dependence on its own narrative around
              the Data Intelligence Platform.
            claimRefs:
              - C004
              - C005
              - C006
              - C007
              - C008
              - C009
              - C011
              - C052
      - number: '1.2'
        title: Founders, leadership bench, and governance disclosure limits
        blocks:
          - type: paragraph
            body: >-
              The founder record is unusually strong even if the full executive and board roster is not. Databricks says
              it was founded in 2013 by seven UC Berkeley AMP Lab researchers, and the official founders page names Ali
              Ghodsi, Ion Stoica, Matei Zaharia, Patrick Wendell, Reynold Xin, Andy Konwinski, and Arsalan
              Tavakoli-Shiraji. That matters because the company still derives legitimacy from technical origin stories:
              Berkeley and Spark are not marketing garnish but core proof of founder-market fit. The Berkeley profile
              for Ali Ghodsi and the CACM Spark paper reinforce that Databricks emerged from the same academic and
              open-source ecosystem that created Apache Spark. Public executive disclosure remains thinner than the
              founder disclosure. Ali Ghodsi is easy to verify as co-founder and CEO, but the reviewed board page mainly
              proves that a governance surface exists, not who all directors are or how committees and investor rights
              are allocated. That should be treated as a real diligence gap, not silently papered over.
            claimRefs:
              - C001
              - C002
              - C003
              - C013
              - C014
              - C015
              - C016
      - number: '1.3'
        title: Capital formation, investor map, and private-market maturity
        blocks:
          - type: paragraph
            body: >-
              Databricks has crossed into very large private-company financing territory, and the progression is well
              supported by both company and independent reporting. The decisive inflection was the December 2024 Series
              J announcement: Databricks said it was arranging $10 billion of expected non-dilutive financing at a $62
              billion valuation and expected to cross a $3 billion revenue run-rate while reaching positive free cash
              flow. By September 2025 the company said it had crossed a $4 billion run-rate, exceeded a $1 billion AI
              revenue run-rate, and closed a $1 billion Series K at a valuation above $100 billion. The December 2025
              Series L then pushed public valuation to $134 billion with a $4.8 billion run-rate, and the February 2026
              update said Databricks had crossed $5.4 billion in run-rate revenue while completing a package worth more
              than $7 billion including equity and debt. Those are unmistakable signs of late-stage private-market
              maturity and IPO optionality. What remains unresolved is the precise cap table and true cumulative capital
              raised after the mix of non-dilutive financing, equity, debt, and 2025 employee liquidity programs.
