  - number: 8
    title: Valuation
    sections:
      - number: '8.1'
        title: Investment thesis, anti-thesis, and recommendation
        blocks:
          - type: paragraph
            body: >-
              Databricks still looks like one of the strongest late-stage infrastructure assets in private markets.
              Public evidence supports a rare combination of scale, growth, customer depth, and improving cash
              generation: the company moved from a $62 billion Series J in December 2024 to a >$100 billion Series K
              term sheet in August 2025 and then to a $134 billion Series L in December 2025, while disclosed revenue
              run-rate moved from an expected $3 billion by early 2025 to $4.8 billion in late 2025 and $5.4 billion by
              early 2026. AI is no longer a side narrative; management and independent coverage both point to AI revenue
              run-rate exceeding $1.4 billion, with retention above 140% and an expanding cohort of million-dollar
              customers. The anti-thesis is that almost every bullish datapoint is still management-led run-rate
              disclosure rather than audited financial reporting. Investors can admire the asset and still conclude that
              the current entry price already capitalizes much of the good news. The honest recommendation is therefore
              track, not buy: company quality is high, but public evidence is not yet clean enough to prove that the
              current price leaves venture-style upside after accounting for denominator risk, private-market structure,
              and the still-open IPO timeline.
            claimRefs:
              - C367
              - C371
              - C372
              - C373
              - C374
              - C377
              - C378
              - C382
              - C383
              - C384
              - C385
              - C386
              - C387
              - C390
              - C421
      - number: '8.2'
        title: Financing context, denominator caveats, and comparable framing
        blocks:
          - type: paragraph
            body: >-
              The most important caveat in this chapter is denominator honesty. Databricks is private, so the headline
              valuation is a post-money round mark, not a continuously traded enterprise value. The company mostly
              discloses annualized revenue run-rate, not audited GAAP revenue, and public observers do not know the
              cap-table seniority, tender discounts, or debt covenants attached to the recent financing stack. That
              means a simple $134 billion divided by $4.8 billion or $5.4 billion run-rate ratio is useful, but it is
              not directly comparable to a public-company EV/NTM revenue multiple. Even with that limitation, the rough
              math is informative. Databricks screens around 25x to 28x run-rate depending on which public denominator
              one uses. That is well above current public data-platform names such as Snowflake, MongoDB, Confluent, and
              Elastic, and above a scaled workflow benchmark like ServiceNow. It is below the extreme AI scarcity
              multiple implied by Palantir, which matters because it shows Databricks is priced as a premium hybrid:
              better than ordinary data infrastructure, but not yet at the very top end of public AI exuberance. The
              comp set therefore supports a fair-to-stretched conclusion rather than an obviously absurd one. Databricks
              can justify a premium, but only if growth, AI monetization, and eventual disclosure quality remain
              unusually strong.
            claimRefs:
              - C372
              - C382
              - C386
              - C390
              - C393
              - C394
              - C395
              - C396
              - C397
              - C398
