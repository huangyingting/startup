              - C413
              - C414
              - C415
              - C416
              - C417
              - C418
              - C419
              - C420
              - C421
      - number: '8.4'
        title: Entry discipline, thesis-break triggers, and final diligence asks
        blocks:
          - type: paragraph
            body: >-
              What would move the call? A cleaner cap table, audited revenue and gross-margin disclosure, and evidence
              that the AI layer carries true software economics rather than just workload growth would all help
              materially. Price alone could also move the recommendation faster than another funding headline. A
              common-equity-equivalent entry below the low end of the current base range would create much more
              attractive asymmetry, especially if the company enters a formal IPO process with better disclosure.
              Conversely, the recommendation should worsen if Databricks loses the growth and retention profile that
              currently underwrites its premium or if private financing terms reveal that common-equity holders sit
              behind more structure than the headline valuation implies. The practical conclusion is that Databricks is
              investable as a company but not yet underwritten enough as a price. Investors should treat it as a live
              watchlist name with aggressive diligence, not as a blind late-stage momentum buy. The public record gets
              you to track with medium confidence and high risk, while the remaining diligence list determines whether
              the next move is up toward buy or down toward avoid.
            claimRefs:
              - C386
              - C387
              - C417
              - C421
              - C422
              - C423
