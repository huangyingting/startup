  - number: 5
    title: Product & Technology
    sections:
      - number: '5.1'
        title: Product scope and customer workflow coverage
        blocks:
          - type: paragraph
            body: >-
              Databricks is best understood as a workflow platform that starts before analytics and extends beyond it.
              The product surface now spans ingestion and transformation patterns, bronze-silver-gold lakehouse
              organization, centralized governance, BI consumption, AI model deployment, and operational application
              databases. LakeFlow matters because it pulls ingestion, transformation, and orchestration closer to the
              platform rather than leaving those jobs entirely to partners. Unity Catalog and AI/BI matter because they
              move Databricks from technical-platform ownership toward business-facing semantics, lineage, and
              conversational analytics. Mosaic AI Model Serving extends that workflow into real-time and batch
              inference, while Lakebase pushes the platform further into operational application development by pairing
              Postgres with the lakehouse. The net result is a broader customer journey: ingest and clean data, govern
              it centrally, expose metrics and dashboards to business users, deploy models and external-model endpoints,
              and increasingly build applications or agents on top of the same governed data estate. That breadth is
              strategically valuable because it reduces tool sprawl, but it also means underwriting Databricks requires
              assessing how coherently these modules work together rather than judging a single warehouse SKU.
            claimRefs:
              - C225
              - C226
              - C231
              - C235
              - C236
              - C238
              - C244
              - C245
              - C246
              - C252
              - C264
              - C267
      - number: '5.2'
        title: Architecture, deployment model, and critical dependencies
        blocks:
          - type: paragraph
            body: >-
              The most supportable public architecture picture is a hybrid one: Databricks manages a control plane,
              while classic compute still runs in customer cloud accounts and serverless compute runs in
              Databricks-managed infrastructure. Azure documentation and independent architecture analysis both describe
              the control-plane/compute-plane split, while Databricks' own architecture guidance frames the platform
              around control plane, compute plane, and storage. On the data path, Databricks keeps pushing the medallion
              pattern because bronze, silver, and gold layers make it easier to express ingestion, validation, and
              consumption steps as one governed pipeline. Unity Catalog then acts as the metadata and policy plane above
              those assets, and model serving exposes governed inference endpoints through REST APIs and serverless
              scaling. The dependency map is therefore not just hyperscalers. Databricks also depends on
              open-table-format politics, partner cloud services such as BigQuery and Gemini on Google Cloud, GPU
              acceleration paths such as NVIDIA RAPIDS, and external model providers such as OpenAI and Anthropic where
              customers want centrally governed third-party models. This architecture is flexible and differentiated,
              but it also means product quality depends on how well Databricks manages cloud boundaries, open-format
              interoperability, and external-service performance under one control plane.
            claimRefs:
              - C227
              - C239
              - C240
              - C241
              - C242
              - C243
              - C244
