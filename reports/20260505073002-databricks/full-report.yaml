  - number: 2
    title: Market Analysis
    sections:
      - number: '2.1'
        title: Market boundary and sizing lenses
        blocks:
          - type: paragraph
            body: >-
              Databricks should be bounded from its monetization surfaces outward rather than from every dollar labeled
              AI or cloud. The company presents a lakehouse-based platform that unifies storage, processing, governance,
              BI, and AI workloads, then layers agent development and governed business intelligence on top. That means
              the most relevant direct spend pools are lakehouse software and services, governed analytics, AI
              development on enterprise data, and public-sector data modernization. It should exclude generic cloud
              infrastructure, chips, foundation-model spending that never touches Databricks workflows, and broad
              consulting or systems-integration work that does not attach to the platform. Public market estimates
              confirm demand but also show why one headline TAM is misleading: Grand View pegs the core data lakehouse
              market at USD 13.94 billion in 2025, GMI at USD 14.2 billion, and TBRC at USD 10.33 billion, while IDC’s
              USD 337 billion 2025 AI-supporting-technology forecast is an outer envelope that is much broader than
              Databricks’ practical revenue pool. The right reading is that Databricks has macro tailwinds and a
              credible core category, but not a publicly isolatable SAM or SOM. That leaves the valuation debate
              anchored less on absolute TAM rhetoric and more on Databricks’ ability to consolidate budgets that would
              otherwise stay fragmented across warehouses, BI, governance, streaming, and bespoke AI stacks.
            claimRefs:
              - C053
              - C054
              - C055
