      - number: '6.4'
        title: Expansion logic is credible, but concentration and channel economics remain partially hidden
        blocks:
          - type: paragraph
            body: >-
              Databricks’ expansion logic is visible even without full cohort disclosure. The platform can start as a
              data-engineering or cloud-migration buy, then expand into governance, AI serving, AI/BI, operational data
              products, or customer-specific agent workflows. AT&T’s nearly 90,000 internal users on one architecture
              and Mastercard’s expansion from data pipelines into onboarding assistants are concrete examples of that
              widening use. Public partner surfaces reinforce the same pattern. Azure positions Databricks as a
              first-party Azure service, Google Cloud offers Databricks through Marketplace, and SAP now embeds SAP
              Databricks as a first-party service inside Business Data Cloud. Those routes should make Databricks easier
              to buy and harder to displace inside large enterprises. The unresolved issue is economic control. Public
              sources do not show how much revenue is partner-sourced, how concentrated the top customer set is, or
              whether the curated reference list overstates the ease of expansion. Databricks therefore looks strong on
              customer adoption quality and cross-sell logic, while still requiring private diligence on top-account
              concentration, channel mix, and term structure before treating customer durability as fully underwritten.
            claimRefs:
