figures:
  - id: FM001
    title: Market sizing lens
    type: pyramid
    layout: standard
    summary: >-
      Databricks should be valued against nested spending lenses: a broad AI envelope, a narrower core lakehouse
      category, an enterprise-weighted buyer slice, and then an undisclosed Databricks-specific SAM/SOM.
    data:
      nodes:
        - label: 'Worldwide AI-supporting technology spend: $337B in 2025'
          detail: IDC outer envelope covering software, infrastructure, and cloud renovation well beyond Databricks revenue.
          tone: neutral
        - label: 'Core data lakehouse market: $10.33B-$14.2B in 2025'
          detail: >-
            Range across TBRC, Grand View, and GMI for the narrower category most directly aligned with Databricks core
            platform.
          tone: positive
        - label: 'Enterprise-weighted demand: 71.4% large-enterprise share in 2024'
          detail: Grand View indicates category concentration in large organizations with governance-heavy budgets.
          tone: positive
        - label: 'Databricks-specific SAM/SOM: not publicly disclosed'
          detail: >-
            Public sources do not reveal workload mix, ACV, or segment conversion assumptions needed for a clean
            company-specific SAM or SOM.
          tone: warning
    approximationNotes: >-
      This figure is a boundary lens, not a strict TAM-SAM-SOM waterfall. Public sources support the outer envelope and
      core category, but they do not isolate a Databricks-specific SAM or SOM.
    claimRefs:
      - CM024
      - CM029
      - CM031
      - CM027
      - CM038
      - CM037
  - id: FM002
    title: Market estimate range
    type: range
    layout: wide
    summary: >-
      The best apples-to-apples public range is the 2025 core data lakehouse market, not the much broader
      AI-supporting-technology envelope.
    data:
      items:
        - label: 2025 core data lakehouse market (USD billions)
          low: 10.33
          mid: 13.94
          high: 14.2
          displayValue: $10.33B-$14.2B
          detail: >-
            Low = TBRC, mid = Grand View, high = GMI; all three are category estimates for the core lakehouse market
            rather than Databricks-specific revenue.
          tone: neutral
    approximationNotes: >-
      The range keeps one consistent unit and one category definition: 2025 core data lakehouse market size. Broader
      AI-supporting-technology spend is excluded from the range because it is not comparable.
    claimRefs:
      - CM024
      - CM029
      - CM031
