  evidenceGaps:
    - type: conflicting-data
      severity: material
      topic: Databricks SAM/SOM cannot be isolated from public market forecasts
      missingEvidence: >-
        No public source discloses Databricks workload mix, attach rates, or company-specific SAM/SOM by cloud,
        workload, or buyer segment.
      whyItMatters: >-
        Without a company-specific bridge from the core lakehouse category to actual monetizable segments, any
        Databricks SAM/SOM number would be a guess rather than a diligence-grade estimate.
      diligencePath: >-
        Request management’s internal market model by workload, cloud, and vertical; then reconcile it to disclosed
        product packaging, channel mix, and conversion assumptions.
      relatedQuestionRefs:
        - QM023
      relatedTableRefs:
        - TM002
    - type: private-evidence-only
      severity: material
      topic: Databricks public-sector and marketplace contract values are undisclosed
      missingEvidence: >-
        Public sources identify government, education, and marketplace channels but do not publish Databricks contract
        values, ACVs, or ARR by channel.
      whyItMatters: >-
        Public-sector and marketplace routes could matter disproportionately for adoption timing and margin quality, but
        the absence of contract economics blocks a reliable SOM by buyer segment.
      diligencePath: >-
        Request channel mix, top public-sector contract ranges, marketplace-originated ARR, and renewal rates by
        procurement path.
      relatedQuestionRefs:
        - QM024
      relatedTableRefs: []
    - type: missing-source
      severity: material
      topic: Databricks pilot-to-production conversion and committed usage are not public
      missingEvidence: >-
        No retained public source provides Databricks pilot-conversion rates, average contract duration, committed usage
        minimums, or expansion cadence from pilot to production.
      whyItMatters: >-
        Those metrics determine whether the strong demand backdrop converts into durable multiyear spend or remains
        concentrated in experimental workloads.
      diligencePath: >-
        Request cohort-level pilot-to-production data, average contract duration, committed consumption ranges, and
        win/loss reasons for stalled deployments.
      relatedQuestionRefs:
        - QM025
      relatedTableRefs: []
acknowledgedWarnings:
  - dimension: duplicateAnalysis
    reason: >-
      The detailed tables are audit-ready evidence ledgers, while the paired figures intentionally compress the same
      inputs into executive views that answer distinct synthesis questions about nested market lenses, qualitative buyer
      fit, and comparable public ranges.
