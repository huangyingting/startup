  - id: TM004
    title: Growth drivers and constraints table
    columns:
      - driver/constraint
      - direction
      - timing
      - implication
      - diligence ask
    rows:
      - - AI-supporting technology spend expansion
        - up
        - 12-36 months
        - Expands the macro budget pool for governed data and AI platforms
        - Request management’s internal split of revenue exposure to core lakehouse, BI, and GenAI workloads.
      - - Shift from experimentation to reinvention
        - up
        - current
        - Supports broader platform decisions that combine data, infrastructure, and AI rather than buying point tools
        - Request win-rate data versus point solutions and status-quo internal builds.
      - - Real-time data and streaming ROI
        - up
        - current
        - Improves the case for unified platforms that can feed AI with fresh, trusted data
        - Request attach rates between streaming, lakehouse, and AI workloads on Databricks.
      - - Large-enterprise budget concentration
        - up
        - current
        - Favours Databricks because the category is still enterprise-heavy and governance-heavy
        - Request Databricks revenue mix by enterprise size and average expansion path.
      - - Public-sector and education modernization
        - up
        - 12-24 months
        - Creates vertical demand where secure sharing and compliance matter more than greenfield AI hype
        - Request public-sector pipeline, contract sizes, and procurement-cycle benchmarks.
      - - Autonomous-agent governance immaturity
        - down
        - current
        - Slows rollout of higher-consequence AI workflows even when experimentation is widespread
        - Request production deployment counts for governed agents versus proofs of concept.
      - - Regulatory compliance timeline
        - down
        - 12-24 months
        - EU and trust frameworks raise the cost of deploying AI into sensitive workflows without controls
        - Request product roadmap evidence for AI transparency, monitoring, and high-risk use-case support.
      - - FinOps scrutiny and AI-spend governance
        - down
        - current
        - Budget owners are pushing harder on unit economics, forecasting, and policy before scaling spend
        - Request margin and payback assumptions for AI workloads, especially serverless and model-serving usage.
      - - Legacy data modernization backlog
        - down
        - current
        - >-
          Organizations still need data cleanup, governance, and modernization before AI budgets convert into durable
          platform spend
        - Request implementation timelines, migration blockers, and professional-services dependency.
      - - Incumbent competition and budget rationalization
        - down
        - current
        - Strong rivals and budget scrutiny can extend sales cycles and reduce contract duration confidence
        - Request win/loss data versus Snowflake, cloud-native substitutes, and internal platform teams.
    notes: >-
      The key underwriting question is not whether AI demand exists, but whether Databricks can turn broad demand into
      governed, retained, multiyear production spend faster than the friction builds.
