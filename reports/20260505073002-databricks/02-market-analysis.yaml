tables:
- id: T201
  title: Market definition table
  columns:
  - segment/category
  - included spend
  - excluded spend
  - buyer/payer
  - relevance
  rows:
  - - Unified lakehouse platform
    - Core platform spend for storage, processing, SQL, governance, and shared data infrastructure on a lakehouse architecture
    - Generic object storage, unmanaged compute, and point ETL spend with no Databricks workload
    - CIO, CDO, data-platform owner, and central IT budgets
    - Primary direct category for Databricks core platform land motions
  - - Governed analytics and BI
    - Databricks SQL, AI/BI, semantics, dashboards, and conversational analytics on governed enterprise data
    - Standalone BI seat licenses or reporting spend that never attaches to Databricks data and semantics
    - Analytics leaders, finance operations, business intelligence teams, and shared data budgets
    - Direct expansion vector from technical data teams into business-user workflows
  - - AI, ML, and agent development on enterprise data
    - Model development, agent evaluation, vector search, serving, and guardrailed GenAI workloads tied to enterprise data
    - Foundation-model API spend or generic inference spend that never uses Databricks data pipelines or governance
    - CTO, VP Engineering, ML platform lead, product engineering, and data science budgets
    - High-growth adjacency that broadens Databricks beyond classic analytics
  - - Public-sector data modernization
    - Agency data integration, compliance analytics, secure data sharing, and higher-education or government AI use cases
    - Generic systems integration, public-cloud migration, or consulting spend that does not land on Databricks workloads
    - Agency CIOs, program leaders, data offices, procurement, and education administrators
    - Distinct vertical motion with procurement and compliance-heavy sales dynamics
  - - Status-quo substitute stack
    - Legacy warehouses, fragmented ETL pipelines, point BI tools, self-managed Spark, and internal AI tooling that can be displaced
    - Net-new AI infrastructure spending that does not replace an existing workflow or data stack
    - Existing IT and analytics budget owners defending incumbent tools
    - Main source of displacement budget and the clearest practical substitute set
  - - Broad AI-supporting technology envelope
    - AI-supporting software, infrastructure, and cloud renovation counted by broad macro forecasts
    - Any assumption that all AI-supporting spend converts into Databricks revenue
    - CIO, CTO, cloud platform owner, and transformation budget pools
    - Useful outer bound for demand context, but too broad to call Databricks SAM
  notes: 'The boundary starts from Databricks monetization surfaces: lakehouse infrastructure, governed analytics, AI workloads on enterprise data, and public-sector modernization. Generic cloud infrastructure and broad AI-enablement spend remain context, not direct market size.'
