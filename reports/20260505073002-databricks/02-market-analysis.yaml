      - FM003
  - id: section-3
    title: Growth drivers, adoption constraints, and valuation relevance
    body: >-
      The demand backdrop is strong enough to justify continued category expansion. IDC expects AI-supporting-technology
      spend to reach USD 337 billion in 2025 and exceed USD 749 billion by 2028, while Confluent reports that 90% of
      surveyed IT leaders are increasing data-streaming investment and 44% report 5x ROI. Deloitte also says worker
      access to AI rose 50% in 2025 and that companies with 40% or more of projects in production are set to double in
      six months. But the same sources show the friction that matters for Databricks underwriting. Deloitte says only
      one in five companies has mature governance for autonomous AI agents and that enterprises feel less prepared in
      infrastructure, data, risk, and talent than they do strategically. McKinsey highlights security, inaccuracy,
      cybersecurity, and training gaps as major barriers. FinOps shows AI-spend governance moving up the priority stack,
      and CIO argues that outdated data estates still cannot feed AI systems well. The EU AI Act and NIST AI RMF
      reinforce that governed deployment, not raw experimentation, sets the pace for high-consequence use cases.
      Competition is also intense: Snowflake’s 2026 results show strong incumbent momentum and continued customer budget
      rationalization. For valuation, that means Databricks benefits from large secular demand, but durable upside still
      depends on converting governed pilots into repeatable production budgets faster than peers and substitutes.
