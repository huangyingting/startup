  - id: section-2
    title: Buyer segmentation, budgets, and adoption path
    body: >-
      The buyer map is broader than a single data-engineering budget. Official and partner materials show Databricks
      selling first to central data-platform teams, then to analytics leaders, data scientists, ML engineers,
      application developers, and public-sector data offices. Microsoft’s Azure Databricks overview explicitly groups
      data engineering, ML and AI, BI, and streaming analytics as core workloads, which implies multiple internal
      champions and budget owners. Databricks’ own AI/BI and Unity Catalog pages show a path from governed SQL and
      semantic layers into nontechnical business-user workflows, while Mosaic AI pushes into model and agent builders.
      Procurement also varies by segment: some deals can route through AWS Marketplace, Google Cloud, or Azure
      relationships, while public-sector programs emphasize agency compliance, fiscal decision-making, and secure data
      sharing across state, local, federal, and higher-education contexts. The enterprise-weighted character of the
      category still matters: Grand View says large enterprises represented 71.4% of 2024 data-lakehouse revenue, which
      fits Databricks’ multicloud, governance-heavy pitch and suggests the most important budgets sit with CIO, CDO,
      platform, and regulated-operations leaders rather than only isolated experimenters. These paths overlap, but they
      do not spend identically.
    claimRefs:
      - CM059
      - CM060
