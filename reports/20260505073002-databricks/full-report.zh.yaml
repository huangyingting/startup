  - id: TE002
    title: 工作流 / 用例表
    columns:
      - 用户任务
      - 当前工作流
      - Databricks 方案
      - 可衡量收益
      - 限制
    rows:
      - - 摄取 SaaS 和数据库数据
        - 团队通常在分析前串起独立的摄取、复制和编排工具
        - Databricks 内的 LakeFlow 摄取、转换和编排
        - LakeFlow 推出是为了减少对定制或第三方摄取栈的需求
        - 公开证据没有显示连接器可靠性或大规模实际替换率。
      - - 创建受治理的企业数据产品
        - 数据落在割裂的数据存储和治理工具里，控制重复
        - 奖牌分层加 Unity Catalog 治理和数据血缘
        - 统一治理和数据血缘降低审计摩擦，也让下游使用更容易追踪
        - 治理运营效率的公开证据目前主要仍来自供应商。
      - - 让业务用户自助分析
        - BI 依赖独立语义层和按席位授权模型
        - 受治理数据上的 AI/BI Dashboards、Genie、Databricks SQL 和 Business Semantics
        - 公开口径没有按席位 BI 费用，对话式分析降低访问摩擦
        - 客户从既有 BI 工具迁移的工作量没有公开量化。
      - - 部署和管理 AI 推理
        - 团队分别管理模型端点、API 和供应商凭据
        - Mosaic AI Model Serving，带 REST API、serverless 扩缩和集中治理的外部模型
        - 统一批处理和实时推理路径，在一个控制平面下简化部署
        - 独立的延迟、成本和安全比较有限。
      - - 在受治理数据上构建运营应用
        - 运营数据库和分析仓库被 ETL 与独立工具隔开
        - Lakebase 增加了与湖仓和 Databricks Apps 集成的 Postgres
        - VentureBeat 报道，早期采用者根据不同客户案例将应用交付时间缩短 75%-95% 或 56%-92%
        - 这些性能结果由公司通过媒体报道披露，尚未被广泛审计。
    notes: 只有在保留来源提供具体工作流或结果陈述时，才纳入收益。媒体报道的客户结果置信度低于经审计基准数据。
