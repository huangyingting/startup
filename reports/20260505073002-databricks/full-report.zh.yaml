      - number: '7.2'
        title: 运营风险会通过故障、共同责任和合作伙伴集中度传导
        blocks:
          - type: paragraph
            body: >-
              Databricks 的运营风险不只是核心服务能否保持可用，而是有多少关键工作流叠在特定云部署、合作伙伴模型和客户侧配置之上。官方状态页提供可见性，但第三方监控显示 Azure Databricks
              的事故量仍足以把可靠性作为承销变量，而不是脚注。Databricks 自己的文档也说明，安全和合规由
              Databricks、客户和云厂商共同承担。云基础设施里这种结构很常见，但大型企业评估续约或事故响应时，客户误配置、工作负载放置或控制缺口，实践中仍可能变成 Databricks 的问题。与此同时，公司的 AI
              路线图越来越深地绑定 Google Gemini、Anthropic Claude、SAP
              的嵌入式数据云路径，以及超大规模云厂商原生买家关系。这些合作明显加快分发、扩大功能宽度，但也在账户控制、模型访问和毛利率泄漏上形成集中依赖，公开来源没有量化这些风险。
