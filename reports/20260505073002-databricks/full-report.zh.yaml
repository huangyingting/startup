      - number: '8.3'
        title: 情景分析和价格敏感性
        blocks:
          - type: paragraph
            body: >-
              情景表应被视为定价纪律工具，而不是管理层指引。乐观情景下，Databricks 让增长更久接近当前水平，把 AI 收入占比转化为持久的利润率和平台溢价，并在 IPO 窗口到来时，看起来仍更像 AI
              控制平面，而不是成熟数据仓库厂商。这个结果可以支撑高于当前标记的估值。基准情景下，公司继续执行良好，但公开市场可比压力，以及从运行率叙事走向 IPO 级别审查的过程，会压缩溢价，使 $134 billion
              入场后的上行有限。悲观情景下，公司仍然不错，但“不错”不够：增长放缓，AI 变现更像成本转嫁而非软件杠杆，或公开软件倍数继续锚定在当前 Snowflake / MongoDB / ServiceNow
              区间附近。结果是，公开证据指向宽分散，但分布偏向基准情景。因此，本章对资产本身保持正面，对价格保持纪律。风险不在于 Databricks 疲弱，而在于当前价格给普通执行失误或更苛刻 IPO 市场留下的空间太小。
