  - id: FV002
    title: 估值敏感性
    type: bar
    layout: standard
    summary: Databricks 在公开可比公司倍数与 AI 溢价倍数区间切换时的方向性估值结果。
    data:
      items:
        - label: 基于 $5.5B 的 10x
          value: 55
          description: 若 Databricks 重新定价到成熟基础设施可比公司水平，这是悲观情景。
        - label: 基于 $6.1B 的 18x
          value: 110
          description: 沿用上市软件可比公司高端约束，对应基准区间低端。
        - label: 基于 $6.6B 的 22x
          value: 145
          description: 若 Databricks 相对 Snowflake 和 ServiceNow 保住溢价，对应基准区间高端。
        - label: 基于 $8.0B 的 25x
          value: 200
          description: 若 Databricks 在 IPO 窗口中守住 AI 溢价，对应乐观情景。
    approximationNotes: 估值来自公开可比公司加情景收入运行率假设；不是管理层指引，也不是企业价值测算。
