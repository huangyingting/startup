      - number: '1.2'
        title: 创始人、领导层纵深与治理披露边界
        blocks:
          - type: paragraph
            body: >-
              创始人记录异常扎实，尽管完整高管和董事会名单并不透明。Databricks 称公司由七名 UC Berkeley AMP Lab 研究人员在 2013 年创立，官方创始人页面列出 Ali Ghodsi、Ion
              Stoica、Matei Zaharia、Patrick Wendell、Reynold Xin、Andy Konwinski 和 Arsalan
              Tavakoli-Shiraji。这个事实重要，因为公司至今仍从技术起源故事中获得合法性：Berkeley 和 Spark 不是营销点缀，而是创始人-市场契合的核心证据。Ali Ghodsi 的 Berkeley
              个人资料和 CACM Spark 论文进一步证明，Databricks 来自创造 Apache Spark 的同一学术与开源生态。相比创始人披露，公开高管信息更薄。Ali Ghodsi 作为联合创始人兼 CEO
              很容易核验，但所审阅的董事会页面主要只能证明治理界面存在，不能说明所有董事是谁，也不能说明委员会和投资人权利如何分配。该点应作为真实尽调缺口处理，不能用文字带过。
