      - number: '7.4'
        title: 缓释措施看得见，但淘汰标准取决于私有尽调缺口能否补上
        blocks:
          - type: paragraph
            body: >-
              Databricks
              最强的公开缓释因素，是它已经像一家准备接受更深入尽调的公司：信任材料组织清晰，隐私合约明确，公共部门授权已经存在，状态披露也透明到足以让外部监控。这些都是有意义的正面因素。但风险章节应把它们转成具体阈值。如果版权诉讼升级到集体认证、禁令救济，或准备金水平改变单位经济性，法律投资逻辑就会失效。如果故障频率维持高位，又没有公开或私有证据证明
              SLO
              纪律和事故复盘质量，运营投资逻辑就会变弱。如果超大规模云厂商捆绑或模型供应商重新定价，改变谁控制账户、谁拿走毛利，依赖逻辑就会恶化。在私有尽调补上四个公开材料没有回答的问题之前，估值逻辑仍然脆弱：合作伙伴经济性、客户集中度、债务契约和诉讼下行空间。没有这些答案，Databricks
              仍可以是一家出色的公司，但晚期入场价格依然难下手。
