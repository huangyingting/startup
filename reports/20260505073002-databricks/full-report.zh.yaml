      - number: '8.4'
        title: 入场纪律、投资逻辑失效触发点和最终尽调问题
        blocks:
          - type: paragraph
            body: >-
              什么会改变判断？更干净的股权结构表、经审计收入和毛利率披露，以及证明 AI
              层具备真正软件经济性而不只是工作负载增长的证据，都会明显加分。价格本身也可能比另一条融资新闻更快改变建议。如果普通股等价入场价低于当前基准区间下沿，尤其是在公司带着更好披露进入正式 IPO
              流程时，不对称性会有吸引力得多。反过来，如果 Databricks 失去支撑其溢价的增长和留存画像，或私募融资条款显示普通股持有人排在比名义估值暗示更多的结构之后，建议应下调。实际结论是，Databricks
              作为公司可投，但作为价格尚未被充分承销。投资者应把它视为一个需要激进尽调的实时观察标的，而不是盲目的晚期动量买入。公开记录足以支持以中等信心、较高风险给出观察建议；剩余尽调清单决定下一步是上调到买入，还是下调到回避。
