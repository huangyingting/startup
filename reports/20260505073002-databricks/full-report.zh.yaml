  - id: TV006
    title: 最终尽调要求表
    columns:
      - 主题
      - 缺失证据
      - 重要性
      - 负责人 / 尽调路径
    rows:
      - - 股权结构表与优先条款
        - 当前股数、轮次价格、清算优先权、要约折价和员工流动性条款
        - 普通股上行空间可能与 $134B 头条估值有实质差异
        - 公司 / 律师 / 领投方
      - - 收入桥接
        - 从收入运行率披露到经审计 GAAP 收入和递延收入的季度桥接
        - 避免基于营销口径分母支付过高价格
        - 财务尽调 / 审计师
      - - 毛利率和 SBC
        - 按产品家族拆分的经审计毛利率和股权激励费用负担
        - 判断 AI 增长是真正的软件杠杆，还是昂贵的云成本转手收入
        - 财务尽调 / IPO 准备工作流
      - - 债务条款
        - 债务定价、契约条款包、到期结构，以及任何担保或交叉违约特征
        - 债务能力影响真实普通股经济性和风险
        - 资金管理团队 / 贷款方尽调
      - - 客户集中度和 NRR 细节
        - 头部客户敞口、流失队列、按 AI 和核心平台产品拆分的 NRR
        - 溢价倍数需要证明最大增长引擎具备持久性
        - 销售运营 / 客户分析
      - - IPO 准备度和流动性路径
        - 董事会层面的 IPO 标准、投行准备工作，以及任何当前老股交易窗口
        - 入场回报高度依赖时点和下一次真实价格发现事件
        - CEO / CFO / 投行
    notes: 这些要求是把强公司判断转化为更干净估值判断所需的最低材料包。
