  - id: TV002
    title: 投资逻辑 / 反向逻辑表
    columns:
      - 维度
      - 投资逻辑
      - 反向逻辑
      - 什么会改变判断
    rows:
      - - 规模与增长
        - 收入运行率从 2025 年初预期的大约 $3B 升至 2026 年初的 $5.4B，增速仍为 >55% 至 65%。
        - 最强数据点仍是管理层主导的收入运行率快照，而不是经审计财务报表。
        - 经审计的收入桥接和逐季度披露会增强确信度。
      - - AI 变现
        - 按 Sacra 估计，AI 产品的收入运行率已 >$1.4B，约占总收入运行率的四分之一，看起来已经是实质性第二引擎。
        - 如果经济性大量来自转手收入，或会摊薄利润率，AI 组合仍可能夸大价值。
        - 按 AI 产品家族披露毛利率，才能证明溢价来自软件质量，还是仅仅来自更高工作负载量。
      - - 客户深度
        - '>700 到 800 个客户收入运行率超过 $1M，留存率 >140%，说明大客户扩张具备韧性。'
        - 公开来源仍未按产品披露集中度、流失率或工作负载级净扩张。
        - 客户队列披露和集中度数据会显著改善承销质量。
      - - 可比公司溢价
        - Databricks 把数据基础设施和 AI 控制平面叙事合在一起，因此相对 Snowflake、MongoDB、Confluent 和 Elastic 应有溢价。
        - 按收入运行率约 25x 到 28x，溢价相对多数公开软件基准已经很大。
        - 更低入场价，或公开市场 AI 溢价持续存在，会让该溢价更容易承销。
      - - 退出可选性
        - IPO 窗口可能在 2026 年或之后打开，形成公开市场重新定价路径。
        - 时点仍由管理层控制，披露也很轻；更久留在私募市场也会推迟价格发现。
        - 正式 IPO 时间表或保密递表会提高退出信心。
    notes: 反向逻辑聚焦价格和披露，而不是 Databricks 是否具备战略重要性。
