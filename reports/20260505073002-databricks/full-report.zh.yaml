        - 从技术数据团队扩展到业务用户工作流的直接路径
      - - 基于企业数据的 AI、ML 和 agent 开发
        - 与企业数据相连的模型开发、agent 评估、向量搜索、服务化和带护栏的 GenAI 工作负载
        - 从不使用 Databricks 数据管道或治理的基础模型 API 支出或通用推理支出
        - CTO、工程副总裁、ML 平台负责人、产品工程和数据科学预算
