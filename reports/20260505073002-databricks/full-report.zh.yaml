  - number: 8
    title: 估值
    sections:
      - number: '8.1'
        title: 投资逻辑、反向逻辑和建议
        blocks:
          - type: paragraph
            body: >-
              Databricks 仍像私募市场里最强的晚期基础设施资产之一。公开证据支持一种罕见组合：规模、增长、客户深度和改善中的现金生成。公司从 2024 年 12 月 $62 billion 估值的 Series
              J，到 2025 年 8 月 >$100 billion 估值的 Series K 条款单，再到 2025 年 12 月 $134 billion 估值的 Series L；披露的收入运行率也从预计 2025
              年初达到 $3 billion，升至 2025 年底 $4.8 billion，并在 2026 年初达到 $5.4 billion。AI 已不再是旁线叙事；管理层和独立报道都指向 AI 收入运行率超过 $1.4
              billion，留存率高于
              140%，百万美元客户队列还在扩大。反向逻辑在于，几乎每个乐观数据点仍是管理层主导的运行率披露，而非经审计财务报告。投资者可以欣赏这项资产，同时仍判断当前入场价已经把许多好消息资本化。因此，坦率建议是观察而非买入：公司质量很高，但公开证据还不足够干净，无法证明扣除分母风险、私募市场结构和仍未确定的
              IPO 时间表之后，当前价格还留有风险投资式上行空间。
