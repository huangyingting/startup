      - number: '3.4'
        title: 护城河耐久性、开放格式与不利证据
        blocks:
          - type: paragraph
            body: >-
              Databricks 最强差异化仍来自三件事的组合：开放 lakehouse 定位、受治理数据与 AI 工作流，以及足以横跨工程和业务用户的产品宽度。Unity Catalog 是核心，因为它已从权限扩展到
              lineage、语义、业务指标和开放格式治理；AI/BI 则通过原生仪表盘和对话式分析，绕开按席位 BI 定价，削弱了相对 Microsoft 的一个经典短板。但不利证据很关键。Databricks 自己在推进
              Iceberg REST catalog 支持和外部引擎互操作，这在战略上聪明，但也降低专有锁定。BigQuery 现在有托管 Iceberg 支持，Redshift 强调通过 AWS lakehouse
              使用开放格式和 Iceberg 兼容访问，Snowflake 也以自己的 Iceberg 和 Open Catalog 姿态回应。Fabric 带来另一类威胁：即便它不如 Databricks 云中立，也能凭
              Microsoft 采购、Power BI 分发和 Copilot 熟悉度赢下务实标准化决策。结论是，Databricks
              看起来仍比大多数单产品对手位置更好，但其护城河不再是格式锁定。关键在于，在云捆绑包把底层基础设施商品化之前，Databricks 能否继续成为开放数据、AI 资产和业务语义上的最佳受治理控制平面。
