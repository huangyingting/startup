      - - 公共部门数据现代化
        - 机构数据集成、合规分析、安全数据共享，以及高等教育或政府 AI 用例
        - 不落在 Databricks 工作负载上的通用系统集成、公有云迁移或咨询支出
        - 机构 CIO、项目负责人、数据办公室、采购和教育管理者
        - 独立垂直行业打法，销售受采购和合规强影响
      - - 现状替代栈
        - 可被替换的传统数仓、碎片化 ETL 管道、单点 BI 工具、自管 Spark 和内部 AI 工具
