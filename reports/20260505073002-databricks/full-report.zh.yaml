      - number: '1.4'
        title: 规模信号、生态触达，以及可复用为事实底座的内容
        blocks:
          - type: paragraph
            body: >-
              最强公开规模信号不只是估值标题，而是 Databricks 客户质量和生态指标。公司材料如今声称全球客户超过 20,000 家、Fortune 500 渗透率 70%、员工超过 10,000 人、办公室超过 30
              个。独立报道补充了有用细节，但不能完全替代公司说法：CNBC 称 Databricks 在 2025 年 6 月约有 8,000 名员工、近 50 名客户年支出超过 $10M、截至 2025 年 1
              月的财年收入为 $2.6B。随后公司披露，2025 年 9 月、2025 年 12 月和 2026 年 2 月，年度收入 run-rate 超过 $1M 的客户群分别超过 650、700 和
              800。分发也不只是单一直营动作。SAP 称 Business Data Cloud 嵌入 Databricks 技术，Microsoft 和 Google 各自把 Databricks
              作为第一方云产品营销。合在一起，这些信号支持一个可复用判断：Databricks 是一家已具规模的企业平台，多云触达强，增购动能强，客户基础足以支撑大额支出队列。
