      - number: '5.2'
        title: 架构、部署模型与关键依赖
        blocks:
          - type: paragraph
            body: >-
              最有公开支撑的架构图是混合式：Databricks 管理 control plane，经典计算仍在客户云账户中运行，serverless 计算则运行在 Databricks 管理的基础设施上。Azure
              文档和独立架构分析都描述了 control-plane / compute-plane 分离，Databricks 自身架构指南也围绕 control plane、compute plane 和 storage
              来组织平台。在数据路径上，Databricks 持续推动 medallion pattern，因为 bronze、silver、gold 层让 ingestion、validation 和 consumption
              步骤更容易表达成一条受治理 pipeline。Unity Catalog 随后充当这些资产上方的 metadata 和 policy plane，model serving 则通过 REST APIs 和
              serverless scaling 暴露受治理 inference endpoints。因此，依赖图不只是超大云厂商。Databricks 还依赖开放表格式政治、Google Cloud 上的 BigQuery
              和 Gemini 等伙伴云服务、NVIDIA RAPIDS 等 GPU 加速路径，以及客户希望集中治理第三方模型时的 OpenAI、Anthropic
              等外部模型提供商。该架构灵活且有差异化，但也意味着产品质量取决于 Databricks 能否在同一 control plane 下管理好云边界、开放格式互操作和外部服务性能。
