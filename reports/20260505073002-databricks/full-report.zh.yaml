figures:
  - id: FO001
    title: 公司里程碑时间线
    type: timeline
    layout: wide
    summary: Databricks 的重大拐点显示，公司从开源根基转向后期私募市场规模和 AI 平台扩张，同时存在正在进行的法律悬压。
    data:
      items:
        - date: '2013-01-01'
          label: 源于 UC Berkeley
          detail: Databricks 围绕 AMP Lab / Spark 创始团队成形。
          tone: positive
        - date: '2023-07-19'
          label: MosaicML 交易完成
          detail: 补上企业级生成式 AI 模型训练和定制能力。
          tone: positive
        - date: '2024-06-04'
          label: Tabular 交易宣布
          detail: 推动 Delta Lake 与 Apache Iceberg 生态合流。
          tone: positive
        - date: '2024-12-17'
          label: Series J 轮，估值 $62B
          detail: 巨额融资，预计含 $10B 非稀释资本，并瞄准 $3B 收入运行率。
          tone: positive
        - date: '2025-02-13'
          label: SAP Business Data Cloud
          detail: SAP 称新平台原生嵌入 Databricks 技术。
          tone: positive
        - date: '2025-05-14'
          label: Neon 协议达成
          detail: 面向开发者和 AI 智能体推进无服务器 Postgres。
          tone: positive
        - date: '2025-09-08'
          label: Series K 轮，估值 >$100B
          detail: 收入运行率超过 $4B，AI 运行率超过 $1B。
          tone: positive
        - date: '2025-12-16'
          label: Series L 轮，估值 $134B
          detail: 收入运行率达到 $4.8B，七位数客户超过 700 家。
          tone: positive
        - date: '2026-02-09'
          label: '>$7B 融资包'
          detail: 股权融资加新增债务额度，为 Lakebase 和 Genie 扩张托底。
          tone: positive
        - date: '2026-04-21'
          label: 版权案继续推进
          detail: 与 DBRX/Mosaic 有关的作者主张未被驳回，诉讼继续。
          tone: warning
    approximationNotes: null
