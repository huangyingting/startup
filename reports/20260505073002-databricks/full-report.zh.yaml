  - id: TP003
    title: 定价 / 打包对比
    columns:
      - 平台
      - 价格 / 单位 / 合同模式
      - 包含能力
      - 折扣 / 未知项
      - 含义
    rows:
      - - Databricks
        - 按量付费、按秒计费；可签承诺用量合同
        - 统一的数据、分析、治理、SQL、AI 和 AI/BI 界面
        - 实际净价因 SKU 和云而异；公开页面强调计费结构，而非单一标价
        - 灵活，但外部人士更难与更简单的数据仓库资费精确对标
      - - Snowflake
        - 存储 + 计算 + 数据传输；计算使用 credit 点数；小型标准数据仓库 = 2 credits/hour
        - 托管 SQL 分析和 AI 平台，配独立虚拟数据仓库
        - Credit 单价取决于版本 / 云协议；按秒计费，但每次启动最低 60 秒
        - 计量设计透明，但预测成本需要严格管理 credit 点数
      - - BigQuery
        - 按需为每扫描 TiB $6.25，或按版本采用每 slot-hour 容量定价
        - BigQuery 各版本提供无服务器分析、预留、自动扩缩和 AI 功能
        - 实际成本取决于扫描字节数或 slot 承诺
        - 低摩擦进入容易，但低效扫描或持续 slot 需求会让成本跳升
      - - Microsoft Fabric
        - 通过按量付费或预留购买共享 Capacity Units；公开称预留可节省约 41%
        - 数据工程、数据仓库、BI、AI 体验和 OneLake 放在同一 SaaS 环境中
        - 发布 / 共享流程往往仍需 Power BI Pro；部分价值取决于既有 Microsoft 合同
        - 在 Microsoft 体系里，捆绑经济性很强，即便逐项功能对比仍有争议
      - - AWS Redshift
        - 预置型从 $0.543/hour 起，无服务器从 $1.50/hour 起；RPU-hour 按秒计费
        - 数据仓库、S3 湖仓查询、zero-ETL 和 AI 集成
        - 预留最多可降低无服务器计算成本 45%；准确 TCO 取决于 S3 和相邻 AWS 用量
        - 低入门价和 AWS 承诺消费杠杆，形成可信的价格切口
      - - Confluent Cloud + Flink
        - Kafka 通过 eCKUs 自动扩缩；Flink 按 CFUs / 分钟计价；可签年度承诺
        - 流式处理、数据模式、治理和无服务器 Flink 处理
        - 数据仓库和 BI 支出仍在别处；价格优势取决于流式优先架构
        - 团队想在支付下游数据仓库成本前转换或过滤数据时，吸引力更强
    notes: 本表比较公开计费机制和打包姿态，而不是谈判后的企业净价。
