  - number: 3
    title: 竞争格局
    sections:
      - number: '3.1'
        title: 竞争版图与买方替代方案
        blocks:
          - type: paragraph
            body: >-
              Databricks 不再只与经典云数仓竞争。其平台叙事覆盖主流云上的集成、存储、处理、治理、共享、分析和
              AI，因此相关集合包括直接数据平台同业、既有云套件、相邻流处理厂商，以及自管理开源堆栈这一现状选项。Snowflake 仍是最接近的直接同业，因为它销售面向分析和 AI
              的托管跨云平台，并有自己的治理和消费模型。BigQuery、Microsoft Fabric 和 AWS Redshift 是最大既有替代方案，因为它们各自能通过既有云关系吸收同一企业预算的一部分，再从分析延伸到
              AI 和治理。Confluent 与 Databricks 的重叠更窄，主要在流处理和实时处理，但它会争夺上游数据架构决策，从而压低数仓或 lakehouse 支出。最后一组替代仍很强：自管理
              Spark、Trino 和其他内部构建组合，让有能力的平台团队可以完全避开部分供应商支出，尽管需要承担更多运营负担。因此，Databricks 同时在与平台厂商、云捆绑包和内部自建路径竞争。
