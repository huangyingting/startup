    title: 增长驱动与约束表
    columns:
      - 驱动 / 约束
      - 方向
      - 时间
      - 影响
      - 尽调问题
    rows:
      - - 支撑 AI 的技术支出扩张
        - 上行
        - 12-36 个月
        - 扩大受治理数据与 AI 平台的宏观预算池
        - 要求管理层拆分核心湖仓、BI 与 GenAI 工作负载的收入敞口。
      - - 从试验转向业务重塑
        - 上行
        - 当前
        - 支撑更大的平台型采购：把数据、基础设施和 AI 合在一起，而不是买单点工具
        - 要求提供对阵单点方案和现有内部自建的胜率数据。
      - - 实时数据与流式处理 ROI
        - 上行
        - 当前
        - 强化统一平台的采购理由：用新鲜、可信的数据喂给 AI
        - 要求提供 Databricks 上流式处理、湖仓与 AI 工作负载的附加率。
      - - 大企业预算集中
        - 上行
        - 当前
        - 支持 Databricks，因为该品类仍以大企业和重治理场景为主
        - 要求按企业规模拆分 Databricks 收入结构，并提供平均扩张路径。
      - - 公共部门与教育现代化
        - 上行
        - 12-24 个月
        - 安全共享和合规比从零做 AI 的热潮更重要的垂直场景，会释放需求
        - 要求提供公共部门管线、合同规模和采购周期基准。
      - - 自主智能体治理不成熟
        - 下行
        - 当前
        - 即便试验铺开，也会拖慢高影响 AI 工作流落地
        - 要求提供受治理智能体的生产部署数量，并与概念验证（PoC）对比。
      - - 监管合规时间线
        - 下行
