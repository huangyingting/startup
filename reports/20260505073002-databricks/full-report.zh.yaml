  - number: 4
    title: 财务
    sections:
      - number: '4.1'
        title: 收入模型、变现表面与公开牵引力质量
        blocks:
          - type: paragraph
            body: >-
              Databricks 现在在财务上更像一个宽口径消费平台，而不是单一分析 SKU。已审阅的公开定价和产品表面显示出多个变现入口：数据工程和数仓计算、AI
              和模型服务工作负载、AI/BI，以及更新的数据库产品。承销时最重要的区别在于，这些是基于用量的收入流，不是基于席位的订阅。Databricks 和 Microsoft 均描述了由 DBU
              驱动、按秒粒度计费的模式；Microsoft 还明确指出，Azure 客户同时支付 VM 基础设施费用和 DBU
              平台费用。双账单结构很重要，因为公开牵引力说法很强，却不等同于已实现的软件毛利。牵引力方面，公司和独立来源在快速扩张路径上相互吻合：从 $2.6B 的已确认 fiscal-2025 收入，到 2025 年 7 月
              $3.7B 年化 run-rate，再到 2025 年 9 月 $4.0B、2026 年 2 月 $5.4B。AI 已从营销覆盖层变成实质第二引擎：Databricks 称 AI 产品在 2025 年 9 月跨过
              $1.0B 年化收入、到 2026 年 2 月达到 $1.4B；CRN 另称数据仓库收入 run-rate 仍超过 $1.0B。这个组合信号比单一窄口径数仓故事更健康。
