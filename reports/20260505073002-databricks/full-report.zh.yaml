  - id: TV003
    title: 乐观 / 基准 / 悲观情景表
    columns:
      - 情景
      - 假设
      - 估值 / 回报逻辑
      - 关键风险
      - 概率信号
    rows:
      - - 乐观
        - 收入运行率接近 $8B-$8.5B，AI 组合保持溢价，IPO 买方继续给 AI 控制平面公司高于普通软件可比公司的奖励。
        - $180B-$220B；以 $134B 入场并持有 2-3 年，毛回报大约 1.3x-1.6x。
        - 即使面对公开市场审查和更广泛软件重新定价，溢价倍数也必须维持。
        - 有可能，但需要执行到位且 IPO 市场配合。
      - - 基准
        - 收入运行率达到约 $6.0B-$6.6B，披露只小幅改善，Databricks 重新定价到公开软件可比公司的上沿。
        - $110B-$145B；以 $134B 入场，毛回报大约 0.8x-1.1x。
        - 当前头条价格给正常倍数压缩留下的空间有限。
        - 从公开证据看最合理，因为它同时承认质量和分母限制。
      - - 悲观
        - 增长放缓至成熟软件水平，AI 经济性差异化减弱，或公开可比公司仍锚定在约 10x-15x。
        - $55B-$85B；以 $134B 入场，毛回报大约 0.4x-0.6x。
        - 如果公开市场纪律先于披露质量改善到来，好公司也可能给出差的入场点。
        - 如果价格发现快于 Databricks 披露，下行空间很实质。
      - - 概率加权姿态
        - 偏向基准情景，因为质量可见，但价格支撑不完整。
        - 支持观察，而不是买入。
        - 股权结构表不透明和 IPO 时点让结果分散度保持很宽。
        - 后期私募定价不能只靠对资产的欣赏。
    notes: 区间是基于当前公开可比公司和明确分母限制搭建的投委会讨论工具，不是管理层指引。
