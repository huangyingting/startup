      - number: '4.3'
        title: 成本结构、毛利率路径，以及双账单为何重要
        blocks:
          - type: paragraph
            body: >-
              最干净的公开利润率线索不是 Databricks 审计报表，而是平台机制和可比公司申报文件。Databricks
              自己称，总拥有成本包括两部分：直接平台成本，以及运行工作负载所需的底层云基础设施成本。Microsoft 补充了运营细节：Azure Databricks 客户同时为 VM 和 DBU
              付费，闲置池仍可能产生基础设施账单，承诺用量采购可以降低 DBU 价格，但不能消除云账单。这意味着 Databricks 的利润率质量取决于软件抽成率、工作负载组合、谈判后的超大云厂商经济性，以及新 AI
              serving 和数据库用量在规模跟上前压缩利润率的程度。Snowflake 的 2026 10-K 是有用的上界可比：即便增加了 $248.1M 第三方云基础设施费用（包括 AI
              inference），产品毛利率仍为 72%。Confluent 的申报文件则是警示性反例：它称公有云定价会实质影响毛利率，Confluent Cloud 历史平均价格低于其
              传统平台，公司还转向免费试用和随用随付的落地动作，短期波动更大。独立 Databricks 专项分析也指向同一方向。CloudForecast、Mammoth 和 Revefi 都强调，DBU
              定价加单独云费用会让支出更难预测，尤其当 AI 工作负载尖峰出现时。含义是，Databricks 仍可能具备有吸引力的软件经济性，但缺少经审计的毛利和经营现金流细节，利润率承销仍不完整。
