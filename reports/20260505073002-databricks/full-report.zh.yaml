companyProfile:
  summary: >-
    Databricks 是一家后期非上市数据与 AI 基础设施公司，起步于 Apache Spark 生态，如今销售覆盖数据工程、lakehouse 存储与治理、数仓、AI/BI、模型与 agent
    工具，以及相邻数据库服务的多云平台。公司已达到私募市场罕见规模，披露收入 run-rate 超过 $5B，Fortune 500 渗透很深，AI 收入流增长很快；但公开披露仍低于投资人清晰承销 $134B 入场价通常需要的水平。
  foundedDate: '2013-01-01'
  founders:
    - name: Ali Ghodsi
      role: 联合创始人、CEO
      background: UC Berkeley 学者、Spark 时代创始人，后来成为 Databricks 最主要的对外经营者。
      claimRefs: []
    - name: Matei Zaharia
      role: 联合创始人
      background: Apache Spark 的创造者，也是 lakehouse 与平台叙事背后的核心技术创始人。
      claimRefs: []
    - name: Ion Stoica
      role: 联合创始人
      background: UC Berkeley 教授、AMP Lab 负责人，为公司的分布式系统信誉奠定底盘。
      claimRefs: []
  foundingLocation: Berkeley, California, USA
  headquarters: San Francisco, California, USA
  productSummary: >-
    Databricks 销售一个统一、按用量计费的数据与 AI 平台，将 lakehouse 存储格式、数据工程、数仓、治理、AI/BI、模型与 agent 工具，以及 Azure、AWS、Google Cloud
    上的多云部署整合在一起。
  customerFocus: 大型企业、数字原生公司、公共部门机构，以及希望为分析和生产级 AI 配一套受治理多云平台的数据 / AI 团队。
  businessModel: 主要靠 DBU 和相邻 serverless 服务按用量变现；增长来自工作负载扩张、更高价值的 AI 产品、数仓、治理，以及大客户内部更广的平台采用。
