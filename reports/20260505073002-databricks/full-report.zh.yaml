  - id: TI004
    title: 资本充足性表
    columns:
      - 资本指标
      - 公开数值 / 状态
      - 证据
      - 承销含义
      - 尽调要求
    rows:
      - - 手头现金
        - null
        - CNBC 称 2026 年 2 月融资包之后，Databricks 目前手头有数十亿美元现金，但未给出确切余额。
        - 流动性看起来充足，但无法建模精确现金。
        - 索取当前现金、受限现金和交割后流动性瀑布。
      - - 月度烧钱速度
        - null
        - 未公开披露月度烧钱；公司转而强调自由现金流为正。
        - 无法用公开数据计算精确现金跑道。
        - 索取月度现金消耗桥，以及增长放缓情景下的烧钱情景。
      - - 现金跑道（月）
        - null
        - 没有精确现金余额，也没有烧钱速度。
        - 尽管融资渠道强，现金跑道仍是证据缺口。
        - 索取基准、下行情景和并购调整后的现金跑道模型。
      - - 计划资金用途
        - AI 产品、收购、国际市场拓展、员工流动性、Lakebase、Genie
        - Series J 轮和 2026 年 2 月公司声明明确资金用于增长、产品、并购和流动性。
        - 资金看起来偏增长导向，而不是救助导向。
        - 索取董事会批准的资本计划和 12-24 个月投放预算。
      - - 下一轮触发因素
        - 暂无公开的即时触发因素；IPO / 私募融资看起来是可选项，而非紧急事项
        - 自由现金流为正，加上 >$7B 融资包，降低了近期融资依赖。
        - 近期资本风险看起来低，但市场窗口仍会影响 IPO 路径。
        - 确认管理层对 IPO、债务提款或下一轮私募融资的触发点。
      - - 债务 / 授信义务
        - 2026 年 2 月披露 ~$2B 额外债务额度；详细条款未披露
        - 债务扩大灵活性，但可能嵌入未公开的契约、定价和到期风险。
        - 未来充足性部分取决于未披露债务条款。
        - 索取债务协议、契约、到期阶梯和担保包。
    notes: 本表有意聚焦未来流动性和融资依赖，而不是重复报告其他地方已经建立的完整历史轮次时间线。
