  - id: TV004
    title: 可比估值表
    columns:
      - 可比公司
      - 估值 / 市值
      - 收入分母
      - 隐含倍数 / 状态
      - 参考意义
      - 局限
    rows:
      - - Databricks（标的）
        - $134B 私募投后估值
        - $4.8B-$5.4B 收入运行率
        - ~24.8x-27.9x
        - 显示新资金愿意为规模加 AI 溢价支付什么价格。
        - 私募投后估值和收入运行率，不等同于公开市场 EV / NTM 收入。
      - - Snowflake
        - $49.85B 市值
        - $4.472B FY2026 产品收入
        - ~11.1x
        - 最接近的公开数据平台同行，具备有意义的规模和云经济性。
        - 公开市值不是企业价值；产品收入比 Databricks 披露口径更适合作为干净分母。
      - - MongoDB
        - $21.27B 市值
        - $2.01B FY2025 总收入
        - ~10.6x
        - 有用的高增长开发者数据可比公司，带有高端软件叙事。
        - 数据库敞口和产品组合不同于 Databricks 的湖仓加 AI 平台。
      - - Confluent
        - $11.13B 市值
        - $1.167B 2025 收入
        - ~9.5x
        - 有用的实时数据基础设施可比公司，显示更窄基础设施公司的交易位置。
        - 流式处理聚焦比 Databricks 更窄，不应单独作为直接估值锚。
      - - Elastic
        - $5.24B 市值
        - $1.483B 2025 收入
        - ~3.5x
        - 展示缺少强劲当前 AI 溢价时，普通基础设施软件的下行位置。
        - 搜索 / 可观测性组合和更弱增长，让它更像估值下限，而不是直接同行。
      - - ServiceNow
        - $94.84B 市值
        - $13.278B 2025 收入
        - ~7.1x
        - 已具规模的工作流软件基准，显示成熟且高利润企业软件能交易在什么水平。
        - ServiceNow 披露更好、模型更成熟，因此这个可比公司主要锚定普通软件的上限。
      - - Palantir
        - $350.05B 市值
        - $4.475B 2025 收入
        - ~78.2x
        - 当叙事和政府 / AI 需求都极端时，公开市场 AI 稀缺溢价可以到什么水平。
        - Palantir 是异常值；把它直接作为 Databricks 锚点会高估公允价值。
    notes: 分母刻意混用，应只作方向性参考：公开可比公司用当前公开市值除以最新年度收入，Databricks 则用私募投后估值除以披露的收入运行率。
    enumerationScope:
      coverage: partial
      basis: >-
        This sample covers the main public software and AI references that have readable market-cap and revenue
        denominators, but it excludes private secondary marks, banker-style EV bridges, and detailed preferred-security
