  - number: 2
    title: 市场分析
    sections:
      - number: '2.1'
        title: 市场边界与规模测算口径
        blocks:
          - type: paragraph
            body: >-
              划定 Databricks 边界时，应从其变现表面向外推，而不是从所有贴着 AI 或云标签的美元开始。公司呈现的是一个基于 lakehouse 的平台，统一存储、处理、治理、BI 和 AI 工作负载，再在上层叠加
              agent 开发和受治理商业智能。因此，最相关的直接支出池是 lakehouse 软件与服务、受治理分析、基于企业数据的 AI 开发，以及公共部门数据现代化。应排除通用云基础设施、芯片、从不触及
              Databricks 工作流的基础模型支出，以及不绑定平台的广义咨询或系统集成工作。公开市场估算确认了需求，也说明为什么单一 TAM 标题会误导：Grand View 将 2025 年核心数据 lakehouse
              市场定在 USD 13.94B，GMI 为 USD 14.2B，TBRC 为 USD 10.33B；IDC 对 2025 年 AI 支撑技术的 USD 337B 预测则是更宽的外层包络，远大于
              Databricks 实际可争取的收入池。正确解读是：Databricks 有宏观顺风和可信核心品类，但没有公开可拆出的 SAM 或 SOM。因此，估值争论不应锚在绝对 TAM 话术，而应锚在
              Databricks 能否整合那些原本分散在数仓、BI、治理、流处理和定制 AI 堆栈中的预算。
