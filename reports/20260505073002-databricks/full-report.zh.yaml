        - 除 notebook 之外的多云自动化和开发者工作流
        - 需要完整生态中更广泛的使用量和贡献者趋势。
    notes: 各行把成熟核心平台层与 Lakebase、Lakewatch 等较新的扩张产品分开。“状态 / 成熟度”反映公开发布证据，而不是内部收入贡献。
