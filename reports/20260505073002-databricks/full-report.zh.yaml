chapters:
  - number: 1
    title: 公司概览
    sections:
      - number: '1.1'
        title: 身份、使命，以及当前公开可见的公司形态
        blocks:
          - type: paragraph
            body: >-
              Databricks 如今展示的是一家大型后期非上市基础设施公司，而不是一家窄口径 Spark 供应商。当前最干净的身份来源是官网 about 页面：它称 Databricks 是数据与 AI 公司，并把
              Data Intelligence Platform 定义为统一承载数据、治理和 AI 的基础底座。总部明确落在 San Francisco，联系页面给出 160 Spear Street
              的具体地址，后续章节可以据此把公司地理锚定。公开规模口径也在变化，值得保留：about 页面仍写着超过 15,000 家组织使用 Databricks，而当前新闻资料包和 2025–2026
              年后续新闻稿已把数字推进到超过 20,000 名客户。因此，报告后文最稳妥可复用的身份是：一家总部位于 San Francisco、非上市的数据与 AI
              平台公司，采用多云运营模式，企业覆盖面很广，并明确依赖自身围绕 Data Intelligence Platform 的叙事。
