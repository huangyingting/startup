  - id: TV005
    title: 投资逻辑破坏与终止触发表
    columns:
      - 触发项
      - 阈值 / 事件
      - 对投资逻辑的传导
      - 行动含义
    rows:
      - - 增长放缓
        - 披露质量改善前，公开增长显著低于 >55%-65% 区间
        - 压低当前把 Databricks 与普通数据基础设施可比公司区分开的溢价倍数
        - 除非价格大幅下调，否则从观察转向回避
      - - AI 变现不及预期
        - AI 收入运行率增长，但尽调证明毛利率或附加购买经济性偏弱
        - AI 溢价变成质量更低的转手收入
        - 下调估值区间，并在投资前要求产品级利润率证据
      - - 公开倍数压缩
        - Snowflake / MongoDB / ServiceNow 式收入倍数进一步收缩
        - 压缩未来 IPO 的市场出清区间
        - 不要用过时的公开市场倍数承销今天的私募标记
      - - 股权结构表悬压
        - 优先股结构、要约折价或债务契约实质性降低普通股价值
        - 头条估值不再代表新增普通股资本能够赚到的回报
        - 基于普通股经济性重建模型，而不是基于投后头条估值
      - - IPO 时间线滑坡
        - 又一轮融资周期后，仍看不到有意义的 IPO 准备或披露路径
        - 把流动性推得更远，并让估值困在私募标记反馈环中
        - 提高要求回报，或等待折价老股流动性
    notes: 触发项聚焦可观察的承销断点，而不是宽泛的公司质量担忧。
