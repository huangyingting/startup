  - number: 5
    title: 产品与技术
    sections:
      - number: '5.1'
        title: 产品范围与客户工作流覆盖
        blocks:
          - type: paragraph
            body: >-
              理解 Databricks，最好把它看成一个从分析之前开始、并延伸到分析之后的工作流平台。当前产品表面覆盖 ingestion 与 transformation 模式、bronze-silver-gold
              lakehouse 组织、集中治理、BI 消费、AI 模型部署和运营型应用数据库。LakeFlow 重要，因为它把 ingestion、transformation
              和编排拉近平台，而不是把这些任务完全留给伙伴。Unity Catalog 和 AI/BI 重要，因为它们推动 Databricks 从技术平台所有权走向面向业务的语义、lineage 和对话式分析。Mosaic
              AI Model Serving 把工作流延伸到实时和批量 inference，Lakebase 则通过把 Postgres 与 lakehouse
              配对，进一步推向运营型应用开发。最终结果是一条更宽的客户旅程：摄取并清洗数据，集中治理，把指标和 dashboards 暴露给业务用户，部署模型和外部模型 端点，并越来越多地在同一受治理数据资产之上构建应用或
              agents。这种宽度有战略价值，因为它减少工具蔓延；但也意味着承销 Databricks 时，需要评估这些模块协同得多连贯，而不是只判断单一数仓 SKU。
