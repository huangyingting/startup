      - number: '3.3'
        title: 定价、包装、切换成本与多栖使用
        blocks:
          - type: paragraph
            body: >-
              定价结构是该市场长期多栖使用的主要原因之一。Databricks 采用随用随付、按秒计费，并提供承诺用量折扣；但公开材料更强调模型结构，而不是一张简单标价表。Snowflake
              对计费机制披露更明确：存储、计算和数据传输彼此独立，计算以 credits 计量，即便小型 standard warehouse 也每小时消耗 2 credits。BigQuery 通过按 TiB 扫描和
              slot-hour 承诺展示类似透明结构。Fabric 把购买决策转成共享 Capacity Units 和预留节省，同时仍保留可能偏向 Microsoft 中心化 部署的 Power BI
              许可细节。Redshift 设定清晰低门槛的 serverless 和 provisioned 起价，并可借力既有 AWS 企业承诺。Confluent 使用基于用量的 Kafka 和 Flink
              单元，在流处理而非数仓是重心时很有吸引力。结果是，Databricks 的切换成本只有在平台拥有治理、语义和多种工作负载之后才真正成立。在那之前，多栖使用是理性的：企业可以保留 Snowflake 做 SQL
              密集型共享，BigQuery 做 GCP 驻留分析，Fabric 服务 Power BI 重度团队，Redshift 做 AWS 原生数仓，Confluent 处理流数据，同时仍用 Databricks 做工程或
              AI。
