      - number: '8.2'
        title: 融资背景、分母限制和可比框架
        blocks:
          - type: paragraph
            body: >-
              本章最重要的限制，是分母要诚实。Databricks 是私有公司，所以名义估值是投后轮次估值，不是连续交易的企业价值。公司主要披露年化收入运行率，而不是经审计 GAAP
              收入；外部观察者也不知道近期融资堆栈背后的股权结构优先级、要约折扣或债务契约。因此，用 $134 billion 除以 $4.8 billion 或 $5.4 billion
              运行率得到的简单倍数有参考价值，但不能直接等同于上市公司 EV/NTM 收入倍数。即便有这个限制，粗略计算仍有信息量。按不同公开分母测算，Databricks 大约落在 25x–28x 运行率。这个水平明显高于
              Snowflake、MongoDB、Confluent、Elastic 等当前公开数据平台公司，也高于 ServiceNow 这类规模化工作流标杆；但又低于 Palantir 所隐含的极端 AI
              稀缺性倍数。关键在于，Databricks 被定价成一个高溢价混合体：强于普通数据基础设施，但还没到公开市场 AI 狂热的最顶端。因此，可比公司集合支持“合理到偏高”的结论，而不是显然荒谬。Databricks
              可以证明溢价合理，但前提是增长、AI 变现和最终披露质量都保持异常强劲。
