  - id: TV001
    title: 建议摘要表
    columns:
      - 维度
      - 取值
      - 理由
    rows:
      - - 建议
        - 观察
        - 公司质量很强，但公开证据尚不足以支撑 $134B 估值下的清晰安全边际。
      - - 信心
        - 中
        - 可比公司信号方向清楚，但 Databricks 的关键分母仍是私募收入运行率，而不是经审计收入。
      - - 风险评级
        - 高
        - 股权结构表、债务条款和 IPO 时点仍未公开，结果分散度依旧很大。
      - - 估值立场
        - 偏高
        - 当前定价远高于多数公开数据平台可比公司；只有 Databricks 守住 AI 溢价，这一定价才站得住。
      - - 基准情景估值区间
        - $110B-$145B
        - 该区间假设公司继续增长，同时向公开可比公司的估值纪律有所压缩。
      - - 决策含义
        - 等待更低入场价或更完整披露
        - 更好的价格，或经审计的 IPO 式披露，比另一条融资新闻更能改变判断。
    notes: 建议明确对价格和分母敏感。
