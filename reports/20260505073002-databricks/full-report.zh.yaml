      - number: '7.3'
        title: 最大剩余风险可能是估值和执行，而不是眼前的财务压力
        blocks:
          - type: paragraph
            body: >-
              公开记录没有显示 Databricks 目前财务疲弱。公司称收入、AI 变现和自由现金流都在扩大，多个独立媒体也印证其融资额和私人估值快速抬升。正因如此，估值风险才重要。Databricks 的估值从 2025
              年 1 月的 $62 billion，升至 2025 年 8–9 月超过 $100 billion，又在 2025 年 12 月至 2026 年 2 月达到 $134
              billion，同时叠加了数十亿美元债务额度。公司还在试图跳出经典 lakehouse 叙事，扩展到 Lakebase、Agent Bricks、AI
              应用和更深的模型供应商关系。执行近乎完美时，高溢价仍可成立；但如果产品线膨胀、合作伙伴经济性、竞争捆绑或 IPO 时间表滑坡，这个估值就会变脆。Microsoft Fabric、AWS EMR 和
              Snowflake 都说明，Databricks 不是在真空里竞争；大型既有厂商已经在自有体系内推集成的数据 + AI 栈、云规模韧性和更低摩擦的采购。
