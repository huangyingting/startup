      - number: '4.2'
        title: GTM 动作与实际存在的公开单位经济代理指标
        blocks:
          - type: paragraph
            body: >-
              Databricks 仍不披露 CAC、回本期、quota 效率或销售周期，因此正确做法是依赖公开扩张代理指标，而不是捏造 SaaS 精确度。最好信号来自支出队列和留存。CNBC 报道称，Databricks 在
              2025 年 6 月净留存超过 140%，新财年第一季度近 50 名客户年支出超过 $10M，约有 8,000 名员工，同时仍在积极招聘。到 2026 年 2 月，Databricks 和 CRN
              都提到，年度收入 run-rate 超过 $1M 的客户超过 800 家，超过 $10M 的客户超过 70 家。这些队列强烈指向一种先落地再扩张的动作，在工程、数仓、BI 和 AI
              工作负载之间有实质交叉销售空间。Sacra 还估算，截至 2024 年 6 月，平均合同价值约 $208,696，这在方向上有用，但不能替代已签 ARR 披露。因此，本章应把 Databricks
              的销售效率视为有希望但只部分可见：公开证据支持既有企业账户内的强扩张，但没有揭示完整回本模型所需的获客成本、折扣强度或达产时间。
