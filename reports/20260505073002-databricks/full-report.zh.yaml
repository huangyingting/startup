  - id: TR005
    title: 缓释与终止标准表
    columns:
      - 风险
      - 可监控触发项
      - 阈值 / 事件
      - 行动含义
    rows:
      - - 版权诉讼
        - 法院裁定或和解姿态
        - 集体诉讼认证、禁令救济，或相对已披露自由现金流具有实质性的准备金需求
        - 在下行风险重新定价或计提准备金之前，把法律风险视为足以打破投资逻辑
      - - AI 监管
        - AI Act 适用范围扩大
        - Databricks 控制的模型或工作流明确落入提供方义务，但未披露合规映射
        - 假设合规成本更高、欧盟扩张更慢、合同摩擦更大
      - - 可靠性
        - 事件频率和恢复时间
        - 多个季度连续出现重大故障，或中位解决时间持续数小时
        - 按更慢的企业扩张和更高支持成本承销
      - - 合作伙伴集中度
        - 战略合作伙伴捆绑或重新定价
        - 超大规模云厂商或模型提供商变化压缩毛利率，或转移账户所有权
        - 下调终局利润率假设，并要求更清晰的合作伙伴经济性
      - - 资本依赖
        - 债务与流动性轨迹
        - 已披露现金生成或 IPO 准备度没有相应改善时，债务再次扩张
        - 把 $134B 估值视为偏高，而不仅是激进
      - - 披露质量
        - 私募尽调缺口持续存在
        - 对集中度、合作伙伴经济性、SLA 或诉讼准备金问题没有给出明确答案
        - 暂停，或按不确定性定价，而不是靠叙事动量承销
    notes: 这些阈值设计成可从公开新闻、法院案卷、事件跟踪器和管理层尽调材料中监控，而不是靠直觉判断。
