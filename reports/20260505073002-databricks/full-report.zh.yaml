      - number: '2.3'
        title: 增长驱动、采用约束与估值相关性
        blocks:
          - type: paragraph
            body: >-
              需求背景足以支撑品类继续扩张。IDC 预计 AI 支撑技术支出将在 2025 年达到 USD 337B、到 2028 年超过 USD 749B；Confluent 报告称 90% 受访 IT
              领导者正在增加数据流投资，44% 报告 5x ROI。Deloitte 也称，2025 年员工 AI 访问量增长 50%，且 40% 以上项目已进入生产的公司将在六个月内翻倍。但同一批来源也揭示了
              Databricks 承销真正需要关注的摩擦。Deloitte 称，只有五分之一公司具备成熟的自主 AI agent 治理，且企业在基础设施、数据、风险和人才上的准备程度不如战略层面。McKinsey
              把安全性、不准确性、网络安全和培训缺口列为主要障碍。FinOps 显示 AI 支出治理正在上移优先级，CIO 则指出过时数据资产仍无法很好地喂给 AI 系统。EU AI Act 与 NIST AI RMF
              进一步说明，高影响用例的节奏由受治理部署决定，而不是原始实验热情。竞争也很激烈：Snowflake 2026 年业绩显示既有厂商动能强劲，客户预算理性化仍在继续。落实到估值，Databricks
              受益于庞大长期需求，但持久上行仍取决于它能否比同业和替代方案更快把受治理试点转成可重复的生产预算。
