            body: >-
              公开耐久性证据偏正面，但尚不足以像承销一家充分披露的上市软件公司那样承销 Databricks。最强披露信号是公司持续净留存超过 140%，2025 年 9 月和 2026 年 2 月重复披露，并得到 CNBC
              和 CRN 佐证。大客户队列也指向同一方向：同一大致时期内，Databricks 从 650 多名增长到 800 多名 $1M 年度 run-rate 客户，$10M 客户从近 50 名增至超过 70
              名。这些都是真实扩张指标。但公开留存证据仍止步于投资人理想状态之前。没有公开 GRR，没有分段 churn，没有 cohort
              waterfall，也没有合同期限披露。评价页面只能作为方向性材料。Databricks 自己的 Gartner 回顾指向强 AI/BI 满意度，可访问的独立 review
              页面也持续出现关于成本控制、复杂性和上手体验的抱怨。正确结论是，Databricks 展现了强扩张和有意义产品价值，但公开来源仍不能按 cohort 或产品线证明续约耐久度。
