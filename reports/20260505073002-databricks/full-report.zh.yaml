  - id: TI005
    title: 公开财务缺口表
    columns:
      - 缺失指标
      - 为什么重要
      - 最佳公开代理指标
      - 精确尽调路径
    rows:
      - - 按工作负载划分的实际净价
        - 标价无法揭示净收入质量或折扣强度。
        - 只有公开 DBU 机制和承诺用量折扣。
        - 索取前 100 大合同样本，包含标价、折扣、云和产品组合。
      - - 经审计毛利率和贡献利润率
        - 增长可以很好看，利润率质量却恶化。
        - Snowflake 和 Confluent 文件提供可比项；Sacra 只给出 Databricks 的低置信度估计。
        - 索取按产品线划分的经审计毛利和基础设施成本分摊。
      - - 现金余额和债务条款
        - 没有精确流动性和义务，无法建模资本充足性。
        - CNBC 称 Databricks 拥有数十亿美元现金和约 $2B 债务额度。
        - 索取交割现金、债务文件、到期时间表和契约摘要。
      - - 月度烧钱和现金跑道
        - 现金跑道是私营公司最基础的承销测试。
        - 自由现金流为正说明压力较低，但不是完整跑道模型。
        - 索取过去 18 个月月度现金桥和下行情景跑道。
      - - CAC、回本周期和销售周期长度
        - 后期软件承销需要看清 GTM 效率。
        - NRR >140%、800+ 个 $1M 客户和 70+ 个 $10M 客户说明扩张强，但不说明获客效率。
        - 按细分市场索取队列 CAC、回本周期、管道转化和销售代表生产力。
      - - 客户集中度和头部账户敞口
        - 超大客户群可能掩盖对少数战略账户或渠道的依赖。
        - 公开来源显示有 70+ 个客户年化支出超过 $10M，但没有披露头部客户集中度。
        - 索取收入集中度、前 20 大账户趋势，以及超大规模云厂商 / 云市场渠道重叠。
    notes: 这些是把强劲公开增长叙事转成完整投资级财务模型的核心障碍。
