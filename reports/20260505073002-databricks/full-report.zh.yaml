      - - Workspace + classic 计算平面
        - 在客户云账户中运行 notebook、任务和客户管理的计算
        - 客户云网络、身份和 classic 集群配置
        - 安全姿态随 workspace 设计和云账户卫生而变化。
      - - Serverless 计算
        - 运行模型服务和 serverless SQL，无需客户管理公网 IP
        - Databricks 管理的 serverless 基础设施和单独条款启用
        - 客户控制更少，服务族 SLA 和事故率的公开透明度也更低。
      - - 湖仓数据流水线
        - 通过 bronze、silver、gold 质量层组织数据
        - 存储系统、摄取工具和奖牌架构规范
        - 如果 silver / gold 控制薄弱，上游低质量数据仍会传播。
      - - Unity Catalog 元数据平面
        - 执行治理、数据血缘、发现和联邦
        - 开放格式、外部系统和跨云策略配置
        - 元数据中心化是战略优势，也会变成控制平面依赖。
      - - AI 部署层
        - 通过 REST API 和 AI Functions 服务内部及外部模型
        - Serverless 计算、模型注册表，以及 OpenAI、Anthropic 等第三方模型提供商
        - 延迟、成本和策略结果部分取决于外部模型供应商。
      - - 开放生态 + 伙伴云层
        - 通过 Iceberg、BigQuery、Gemini 和 GPU 加速扩展 Databricks
        - Google Cloud、NVIDIA 和开放表格式互操作
        - 差异化与合作伙伴表现和开放格式标准演进绑定。
      - - 运营数据库层
        - 为 AI 智能体和运营应用运行 Lakebase Postgres
        - 源自 Neon / Mooncake 的数据库技术，加 Unity Catalog 同步
        - 相比核心湖仓，新产品类别公开的扩展和可靠性历史更少。
    notes: 本表强调运营模型依赖，而不是底层实现细节。公开来源支持控制平面拆分、奖牌式数据流水线和伙伴依赖，但不支持内部服务拓扑。
