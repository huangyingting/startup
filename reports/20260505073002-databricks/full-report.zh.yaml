  - id: FV004
    title: 投资 KPI
    type: kpi
    layout: standard
    summary: 按投委会口径呈现当前价格下 Databricks 投资判断中最关键的维度。
    data:
      items:
        - id: market
          label: 市场 / 类别
          value: Strong
          description: 数据 + AI 基础设施仍是庞大且扩张中的支出类别。
          tone: positive
        - id: proof
          label: 证据点
          value: Strong
          description: $5.4B 收入运行率、>140% 净留存率（NRR）和大账户深度异常强。
          tone: positive
        - id: economics
          label: 经济质量
          value: Partially verified
          description: 公开信息显示自由现金流（FCF）为正，但经审计利润率和股权激励费用（SBC）细节仍缺失。
          tone: neutral
        - id: valuation
          label: 估值
          value: Stretched
          description: 当前隐含倍数远高于大多数上市数据平台可比公司。
          tone: negative
        - id: liquidity
          label: 退出路径
          value: Unclear
          description: IPO 时点仍未确定，老股交易价格也未公开。
          tone: negative
        - id: evidence
          label: 证据质量
          value: Medium
          description: 公开证据足以支撑观察建议，但不足以给出干净的买入建议。
          tone: neutral
    approximationNotes: null
