    title: 估值 / 回报区间
    type: range
    layout: standard
    summary: 当前后期入场点下 Databricks 的低、中、高估值包络。
    data:
      items:
        - id: bear
          label: 悲观情景
          low: 55
          value: 70
          high: 85
        - id: base
          label: 基准情景
