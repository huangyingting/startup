  - id: FR001
    title: 风险热力图
    type: matrix
    layout: wide
    summary: Databricks 最重的剩余风险集中在法律暴露、合作伙伴集中度与高估值相互强化的地方。
    data:
      columns:
        - 发生可能性
        - 影响
        - 缓释成熟度
        - 剩余严重度
      rows:
        - label: AI 版权诉讼
          values:
            - label: 中
              tone: warning
              detail: 美国和加拿大仍有活跃案件，风险没有降温。
            - label: 高
              tone: negative
              detail: 不利裁决可能冲击成本、信任和 AI 路线图信心。
            - label: 中
              tone: warning
              detail: 信任与法律材料已经披露，但准备金和保险细节仍未公开。
            - label: 高
              tone: negative
              detail: 只有私下厘清来源和下行情景后，剩余暴露才会下降；在此之前仍高。
        - label: 隐私 / AI 监管
          values:
            - label: 中高
              tone: warning
              detail: AI Act 和数据传输规则已经生效，仍在演进。
            - label: 高
              tone: warning
              detail: 监管范围外扩可能推高成本，并拖慢受监管行业 GTM。
            - label: 中高
              tone: neutral
              detail: DPA、SCCs、DPF 和合规材料构成有意义的缓释。
            - label: 中高
              tone: warning
              detail: 覆盖面看起来强，但各云和各层级是否一致仍不清楚。
        - label: 中断 / 可靠性
          values:
            - label: 中
              tone: warning
              detail: 近期中断频率已经高到需要跟踪。
            - label: 高
              tone: negative
              detail: 核心分析和 AI 工作负载可能对客户至关重要。
            - label: 中
              tone: warning
              detail: 公开状态页有可见性，但 SLO 和 RCA 细节偏薄。
            - label: 中高
              tone: warning
              detail: 缺少企业级可靠性披露时，剩余风险仍在。
        - label: 合作伙伴 / 模型集中度
          values:
            - label: 高
              tone: negative
              detail: 战略云、SAP 和模型提供商关系清晰可见。
            - label: 高
              tone: negative
              detail: 可用性、经济性和账户控制都可能经由这些节点传导。
            - label: 中
              tone: warning
              detail: 多云和多模型宽度有帮助，但不能消除集中度。
            - label: 高
              tone: negative
              detail: 公开来源没有量化合作伙伴经济性或备用方案质量。
        - label: 估值 / 融资
