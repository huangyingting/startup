      - number: '4.4'
        title: 资本充足性、融资依赖与财务结论
        blocks:
          - type: paragraph
            body: >-
              公开证据指向较低近期融资压力，但仍留下重要承销空洞。Databricks 已从 2024 年 12 月 Series J 一揽子融资——目标是 AI 投资、收购、国际 GTM 扩张和员工流动性——推进到 2025
              年 9 月 Series K，再到 2026 年 2 月超过 $7B 的一揽子融资，其中约 $5B 为股权、约 $2B 为额外债务 capacity。叠加公司关于过去 12
              个月自由现金流为正的公开表述，Databricks 更像是在融资增长选项，而不是填补已披露的流动性危机。CNBC 还报道公司现在账上有数十亿美元现金，但没有精确余额、债务定价、契约组合、摊还时间表或月度 burn
              rate。这足以支持一个前瞻判断：相较许多后期 AI 公司，Databricks 收入质量强，短期资本强度风险低；但仍不足以完成贷款人式或 IPO 式流动性模型。本章的实际结论是，Databricks
              近期看起来财务耐久，拥有多个增长引擎和充足外部资本通道；但在把公开 run-rate 叙事视为完全承销前，尽调仍应优先核查已实现定价、经审计利润率、现金与债务时间表、客户集中度风险。
