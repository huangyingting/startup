      - number: '3.2'
        title: 直接同业、既有厂商与相邻挑战者
        blocks:
          - type: paragraph
            body: >-
              Snowflake 是最清晰的直接既有厂商，因为它已经具备规模：客户超过 13,300 家，733 名客户年支出超过 $1M，790 名 Forbes Global 2000 客户。它与 Databricks
              的差异在架构和经济性上：Snowflake 是一项托管公有云服务，存储、计算和云服务分层独立；Databricks 则倚重 lakehouse 架构、开源血统，以及从数据工程到 AI
              工作流的更宽主张。BigQuery 更像云原生替代，而不是同形态公司同业，但它重要，因为 Google 能把 serverless 分析产品与大型云销售动作和不断增强的 Apache Iceberg
              支持配在一起。Microsoft Fabric 是最重要的捆绑式进入者：它在 OneLake 上把数据工程、数仓、Power BI 和 Copilot 驱动工作流打包成 SaaS 环境，并叠加 Purview
              支持的治理和 Azure 采购杠杆。AWS Redshift 在已标准化 S3、SageMaker 和 AWS 运营的客户中仍是强大既有方案。Confluent 更窄，但战略相关，因为实时数据管道和基于
              Flink 的预处理可以在数据到达 Databricks 或 Snowflake 数仓之前先捕获价值。合起来看，这些替代方案说明：当买方想要一个受治理的多工作负载平台时，Databricks
              胜率更高；当客户已深处超大云厂商捆绑包，或只需要一个聚焦组件时，Databricks 的部分优势会消失。
