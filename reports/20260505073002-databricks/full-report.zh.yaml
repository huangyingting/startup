  - number: 7
    title: 风险
    sections:
      - number: '7.1'
        title: 法律、监管与安全风险真实存在，尽管公开信任表面很强
        blocks:
          - type: paragraph
            body: >-
              Databricks 的公开合规和信任姿态，比许多私有基础设施厂商更强：公司发布隐私通知、可下载的
              DPA、信任中心、尽调包、法律中心，并在技术文档里明确安全责任。这能降低初始尽调摩擦，也说明公司为进入受监管企业做了准备。剩余风险在于，文档齐备不等于风险已经出清。EU AI Act 已经生效，通用 AI
              模型义务分阶段落地；公共部门授权明确按云和软件包划分；Databricks 仍卷在与 Mosaic 和 DBRX 相关的版权纠纷中。Books3 / RedPajama 诉讼不是抽象的 AI
              政策讨论，而是一个正在推进的法律程序，横跨美国和加拿大，赔偿不确定，还可能外溢到企业 AI 买家的声誉判断。因此，Databricks
              在纸面准备上优于许多同业，但仍暴露在监管范围扩张、模型治理审查和诉讼结果的组合风险中，仅靠公开数据很难定价。
