      - number: '1.3'
        title: 资本形成、投资人版图与私募市场成熟度
        blocks:
          - type: paragraph
            body: >-
              Databricks 已进入超大型非上市公司融资区间，进程同时得到公司披露和独立报道支持。决定性拐点是 2024 年 12 月的 Series J 公告：Databricks 称正安排预期 $10B
              的非稀释性融资，估值 $62B，并预期收入 run-rate 跨过 $3B，同时实现正自由现金流。到 2025 年 9 月，公司称已跨过 $4B run-rate，AI 收入 run-rate 超过
              $1B，并以超过 $100B 的估值完成 $1B Series K。2025 年 12 月 Series L 又把公开估值推到 $134B，收入 run-rate 为 $4.8B；2026 年 2 月更新则称
              Databricks 已跨过 $5.4B 收入 run-rate，并完成超过 $7B 的一揽子融资，包含股权和债务。这些都是后期私募市场成熟度和 IPO
              可选性的明确信号。尚未解决的是精确股权结构表，以及在非稀释性融资、股权、债务和 2025 年员工流动性计划混合之后的真实累计融资额。
