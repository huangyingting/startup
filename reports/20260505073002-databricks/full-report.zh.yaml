        - 分析师、业务用户和语义层负责人
        - 成熟分析产品，业务用户触达正在扩大
        - 在受治理数据上提供原生 BI，带对话式分析且公开口径没有按席位 BI 费用
        - 需要公开证明生产环境 BI 采用、并发和仪表盘迁移成功。
      - - Mosaic AI Model Serving
