      - number: '2.2'
        title: 买方分层、预算与采用路径
        blocks:
          - type: paragraph
            body: >-
              买方地图比单一数据工程预算更宽。官方和伙伴材料显示，Databricks 先卖给中央数据平台团队，再延伸到分析负责人、数据科学家、ML 工程师、应用开发者和公共部门数据办公室。Microsoft 的 Azure
              Databricks 概览明确把数据工程、ML 与 AI、BI、流式分析列为核心工作负载，意味着内部拥护者和预算所有者不止一个。Databricks 自身的 AI/BI 和 Unity Catalog
              页面展示了一条路径：从受治理 SQL 与语义层，走进非技术业务用户工作流；Mosaic AI 则推向模型和 agent 构建者。采购也随分层变化：部分交易可通过 AWS Marketplace、Google
              Cloud 或 Azure 关系进入，公共部门项目则强调机构合规、财政决策，以及州、地方、联邦和高等教育场景中的安全数据共享。该品类的企业权重仍然关键：Grand View 称大型企业占 2024 年数据
              lakehouse 收入的 71.4%，这符合 Databricks 的多云、重治理推介，也说明最重要预算掌握在
              CIO、CDO、平台和受监管运营负责人手中，而不只是孤立实验团队。上述路径彼此重叠，但花钱方式不同。
