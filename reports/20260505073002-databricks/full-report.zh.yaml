      - number: '5.3'
        title: 信任、安全、隐私、合规与可靠性姿态
        blocks:
          - type: paragraph
            body: >-
              Databricks 有足够公开信任材料，能显示严肃企业姿态，但不足以把信任视为完全去风险。Trust Center
              称安全内建于平台每一层，并公开向买方指向加密、网络控制、审计、身份集成、访问控制和数据治理。合规页面列出一长串与受监管买方相关的框架，包括 FedRAMP、HIPAA、GDPR、PCI-DSS、ISO
              27001/27017/27018/27701 和 SOC；其中 SOC 3 公开，其他报告可通过尽调渠道获取。Serverless SQL 提供了一个具体架构信任信号，因为 Databricks 称这些
              warehouses 没有公共 IP 地址。与此同时，可靠性仍是活跃运营问题，而不是已解决的勾选项：在运行日期，AWS 状态页显示多个区域存在部分计算中断，尽管 AI/BI 和 Apps 大体正常。独立
              uptime 监控只能提供有限安慰，因为它们通常汇总 uptime，却不发布详细事故数据或根因。AI 安全 也仍在移动中，不是关闭问题。Databricks 公开讨论 AI 安全资源，并在 2026 年 3
              月推出 Lakewatch 作为 AI 辅助 SIEM 产品，但关于检测质量、误报或负责任 AI 控制在生产环境表现的独立证据仍很少。
