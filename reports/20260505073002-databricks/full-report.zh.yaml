            - label: 高
              tone: negative
              detail: 执行失手或 IPO 条件转弱，会很快影响入场支撑。
            - label: 中
              tone: warning
              detail: 自由现金流和收入增长是正面信号，但关键投资判断数据仍未公开。
            - label: 高
