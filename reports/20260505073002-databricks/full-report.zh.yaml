        - 成熟服务面，外部模型治理正在扩展
        - 面向内部和外部模型的统一 REST 部署和 serverless 服务
        - 需要相对替代方案的独立延迟、成本和护栏基准。
      - - LakeFlow
        - 数据工程团队
        - 正在扩展；2024 年推出，仍在整合合作伙伴重叠
        - 内置摄取、转换和编排，减少对独立数据流水线工具的需求
        - 需要公开证据证明连接器广度、可靠性和大规模生产引用。
      - - Lakebase
