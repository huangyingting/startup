              K、Series L 以及 2026 年 2 月债务加股权扩张的融资序列高度一致。时间线中明确应纳入的一项不利事件，是与 Mosaic 时代和 DBRX 相关模型训练有关的持续版权诉讼。The Register
              与 Saveri 均显示，该案在 2026 年 4 月驳回动议后仍存续，因此不是可以忽略的陈旧指控。后续风险工作应把它作为活跃的 IP 与模型治理问题延续。
