  - number: 6
    title: 客户
    sections:
      - number: '6.1'
        title: 客户分层与可见买方地图
        blocks:
          - type: paragraph
            body: >-
              Databricks 的公开客户图景很宽，但按购买语境拆开看最有用，而不是把它当成单一 logo 墙。公司自身 2025 和 2026 年披露如今把规模锚在超过 20,000 家组织和 70% Fortune
              500，而 CNBC 在 2025 年中仍引用超过 15,000 名客户。这个变化重要，因为它显示的是广度和动能，而不是一次性营销数字。可见买方地图也比核心数据工程销售更宽。Microsoft、Google
              Cloud 和 SAP 都把 Databricks 定位为企业分析与 AI 采购路径；具名账户覆盖电信、支付、媒体、零售、医疗健康和公共部门式工作负载。实践中，Databricks 卖给平台负责人、数据与 AI
              团队、治理负责人，并越来越多卖给使用 AI/BI 和受治理分析的业务用户。付款方通常是中央平台或云预算，但伙伴路径会影响采购和续约控制。这让 Databricks
              看起来像一家拥有多个买方中心的规模化企业平台，而不是单一工作负载工具。
