  - id: FV001
    title: 推荐逻辑
    type: flow
    layout: standard
    summary: 从 Databricks 规模、披露质量、可比公司溢价和退出时点一路推导到最终建议的决策链。
    data:
      nodes:
        - id: n1
          label: 规模与增长
          description: $5.4B 收入运行率和 >55%-65% 增长，按软件公司标准仍属顶尖。
        - id: n2
          label: AI 证据
          description: AI 收入运行率超过 $1.4B，支撑的是溢价叙事，而不是旧湖仓故事。
        - id: n3
          label: 披露缺口
          description: 经审计收入、利润率、股权结构条款和债务契约仍未公开。
        - id: n4
          label: 公开可比公司锚点
          description: 多数上市软件可比公司交易倍数明显低于 Databricks 隐含的 25x-28x 收入运行率倍数。
        - id: n5
          label: 建议 = 观察
          description: 资产质量强，但当前价格仍需要更好披露或更低入场点。
      edges:
        - from: n1
          to: n5
        - from: n2
          to: n5
        - from: n3
          to: n5
        - from: n4
          to: n5
