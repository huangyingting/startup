companyProfile:
  summary: >-
    Databricks is a late-stage private data-and-AI infrastructure company that grew out of the Apache Spark ecosystem and
    now sells a multicloud platform spanning data engineering, lakehouse storage and governance, warehousing, AI/BI,
    model and agent tooling, and adjacent database services. The company has reached rare private-market scale, with
    disclosed revenue run-rate above $5 billion, deep Fortune 500 penetration, and a fast-growing AI revenue stream, but
    public disclosure still lags what investors would normally expect to underwrite a $134 billion entry cleanly.
  foundedDate: '2013-01-01'
  founders:
    - name: Ali Ghodsi
      role: Co-founder, CEO
      background: UC Berkeley academic and Spark-era founder who became Databricks' principal public operator.
      claimRefs: []
    - name: Matei Zaharia
      role: Co-founder
      background: Creator of Apache Spark and a central technical founder behind the lakehouse and platform narrative.
      claimRefs: []
    - name: Ion Stoica
      role: Co-founder
      background: UC Berkeley professor and AMP Lab leader who anchored the company's distributed-systems credibility.
      claimRefs: []
  foundingLocation: Berkeley, California, USA
  headquarters: San Francisco, California, USA
  productSummary: >-
    Databricks sells a unified, usage-based data and AI platform that combines lakehouse storage formats, data
    engineering, warehousing, governance, AI/BI, model and agent tooling, and multicloud deployment across Azure, AWS,
    and Google Cloud.
  customerFocus: Large enterprises, digital-native companies, public-sector organizations, and data/AI teams that want a
    governed multicloud platform for analytics and production AI.
  businessModel: >-
    Primarily usage-based monetization through DBUs and adjacent serverless services, with expansion driven by workload
    growth, higher-value AI products, warehousing, governance, and broader platform adoption inside large accounts.
  stage: Late-stage private / pre-IPO
  fundingStatus: >-
    Public financing sequence moved from a $62B Series J in December 2024 to more than $100B in Series K terms and a
    $134B Series L in December 2025, followed by a February 2026 package combining equity and debt.
  disclosureProfile: private-disclosed
  claimRefs: []
