    rows:
      - - Unity Catalog governance spans data and AI assets
        - Snowflake, BigQuery, Fabric, and AWS are all improving governance around open formats and shared catalogs
        - High
        - Ask for win-loss data where governance breadth alone displaced a bundled incumbent
      - - Open-format leadership reduces buyer lock-in fears
        - >-
          The same openness also lowers Databricks-specific switching costs once Iceberg interoperability becomes table
          stakes
        - High
        - Test whether customers standardize on Databricks as control plane even when compute engines remain multi-homed
      - - AI/BI reduces need for separate BI tooling
        - Fabric can bundle Power BI, Copilot, and Microsoft procurement into a simpler executive purchase
        - High
        - Request attach-rate and expansion data for AI/BI versus Microsoft-centric accounts
      - - Multi-cloud posture broadens buyer pool
        - Hyperscalers can still use existing cloud spend commitments and service adjacency to narrow evaluation scope
        - Medium
        - Review large-account win rates by incumbent cloud home and by regulated vertical
      - - Open-source lineage supports internal credibility with engineers
        - Self-managed Spark, Trino, and stream-processing stacks remain credible for teams willing to absorb ops burden
        - Medium
        - >-
          Quantify how many large customers graduate from internal build to paid Databricks versus remaining
          self-managed
    notes: >-
      The main risk is not one superior point competitor but converging bundle and interoperability pressure across the
