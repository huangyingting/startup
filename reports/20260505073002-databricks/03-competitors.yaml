tables:
  - id: TP001
    title: Competitor profile table
    columns:
      - Competitor
      - Category
      - Scale / funding
      - Target segment
      - Primary differentiation
      - Key limitation vs Databricks
    rows:
      - - Databricks
        - Reference platform
        - $10B Series J expected financing at $62B valuation; 500+ $1M ARR-run-rate customers; 15,000+ organizations
        - Enterprise data engineering, analytics, governance, and AI teams
        - Multi-cloud lakehouse plus unified governance, AI/BI, and open-format posture
        - Public realized pricing and net retention by workload remain undisclosed; open formats reduce hard lock-in
      - - Snowflake
        - Direct incumbent
        - $1.23B Q4 FY26 product revenue; 733 $1M+ customers; 790 Forbes Global 2000 customers
        - SQL-led enterprise analytics, data sharing, and AI workloads
        - Large installed base with strong managed-service simplicity and cross-cloud reach
        - Compute-credit model and managed-service orientation make it less open-source-native than Databricks
      - - Google BigQuery
        - Incumbent cloud platform
        - Google Cloud revenue reached $12.0B in Q4 2024
        - GCP-centric analytics, AI, and lakehouse buyers
        - Serverless analytics plus managed Apache Iceberg support and Google AI distribution
        - >-
          Best fit is strongest inside Google Cloud buying relationships rather than as a neutral multi-cloud control
          plane
      - - Microsoft Fabric
        - Incumbent bundled suite
        - Microsoft Intelligent Cloud revenue reached $29.9B in FY25 Q4
        - Power BI, Azure, and business-user-centric analytics estates
        - End-to-end SaaS analytics with OneLake, Copilot, and Purview-backed governance
        - Microsoft ecosystem gravity is an advantage for Fabric but also makes it less cloud-neutral than Databricks
      - - AWS Redshift
        - Incumbent warehouse / lakehouse substitute
        - AWS segment sales reached $107.6B in 2024
        - AWS-native data warehousing, S3-lakehouse, and AI workloads
        - Low-entry pricing, deep AWS integration, zero-ETL, and S3/SageMaker adjacency
        - Orientation is still AWS-centered and SQL-warehouse-led rather than a neutral data-to-AI control plane
      - - Confluent Cloud + Flink
        - Adjacent real-time challenger
        - $922.1M FY2024 subscription revenue; $963.6M total revenue
        - Streaming-first engineering and real-time AI/data teams
        - Unified Kafka + Flink stack can shift transformations left before warehouse spend occurs
        - Not a full warehouse / BI / semantic-governance platform for broad enterprise analytics
      - - Self-managed Spark / Trino
        - Status quo / internal build
        - Open-source software; infrastructure and staffing borne internally
        - Skilled platform teams with strong infra control requirements
        - Maximum engine choice and avoidance of platform license lock-in
        - Operational burden, security, governance, and user enablement fall back on the customer
    notes: >-
      Rows compare the main ways a buyer can solve the same broad enterprise data-and-AI job, including direct peers,
      incumbent suites, adjacent streaming vendors, and internal build.
