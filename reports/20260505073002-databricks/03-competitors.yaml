  - id: pricing-distribution
    title: Pricing, packaging, switching cost, and multi-homing
    body: >-
      Pricing structure is one of the main reasons this market remains multi-homed. Databricks prices on a pay-as-you-go
      basis with per-second billing and committed-use discounts, but its public materials emphasize model structure more
      than a single simple list price. Snowflake is more explicit about billing mechanics: storage, compute, and data
      transfer are distinct, with compute metered in credits and even a small standard warehouse consuming 2 credits per
      hour. BigQuery exposes a similarly transparent structure through per-TiB scanning and slot-hour commitments.
      Fabric turns the buying decision into shared Capacity Units and reservation savings, while still preserving Power
      BI licensing nuances that can favor Microsoft-centric rollouts. Redshift sets clear low-entry serverless and
      provisioned starting prices and can ride existing AWS enterprise commitments. Confluent uses usage-based Kafka and
      Flink units that are attractive when streaming, not warehousing, is the center of gravity. The consequence is that
      Databricks' switching costs are real only after the platform owns governance, semantics, and multiple workload
      types. Before that, multi-homing is rational: enterprises can keep Snowflake for SQL-heavy sharing, BigQuery for
      GCP-resident analytics, Fabric for Power BI-heavy teams, Redshift for AWS-native warehousing, and Confluent for
      streaming while still using Databricks for engineering or AI.
    claimRefs:
      - CP003
      - CP005
      - CP006
      - CP007
      - CP017
      - CP018
      - CP019
      - CP025
      - CP026
      - CP032
      - CP033
      - CP034
      - CP037
      - CP038
      - CP041
      - CP042
    tableRefs:
      - TP003
  - id: moat-risks
    title: Moat durability, open formats, and adverse evidence
    body: >-
      Databricks' strongest differentiation still comes from combining open lakehouse positioning, governed data-and-AI
      workflows, and enough product breadth to span engineering and business users. Unity Catalog is the centerpiece
      because it expands beyond permissions into lineage, semantics, business metrics, and open-format governance, while
      AI/BI reduces one classic weakness versus Microsoft by offering native dashboards and conversational analytics
      without per-seat BI pricing. But the adverse evidence is material. Databricks itself is pushing Iceberg REST
      catalog support and external-engine interoperability, which is strategically smart but also lowers proprietary
      lock-in. BigQuery now has managed Iceberg support, Redshift highlights open formats and Iceberg-compatible access
      through the AWS lakehouse, and Snowflake has responded with its own Iceberg and Open Catalog posture. Fabric
      raises a different kind of threat: even if it is not as cloud-neutral as Databricks, it can use Microsoft
      procurement, Power BI distribution, and Copilot familiarity to win pragmatic standardization decisions. The upshot
      is that Databricks still appears better positioned than most single-product rivals, but its moat is no longer
      format lock-in. It depends on whether Databricks can remain the best governed control plane across open data, AI
      assets, and business semantics faster than cloud bundles commoditize the underlying infrastructure.
    claimRefs:
      - CP003
      - CP004
