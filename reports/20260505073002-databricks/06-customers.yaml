runDate: '2026-05-05'
company:
  name: Databricks
chapter:
  number: 6
  title: Customers
  summary: >-
    Databricks has unusually strong public customer proof for a private data-and-AI platform: more than 20,000 claimed
    customers, expanding $1M+ and $10M+ cohorts, and fresh named deployments across telecom, payments, retail, media,
    and healthcare. Public durability evidence is still incomplete, however, because net retention above 140% is visible
    while GRR, contract duration, and top-customer concentration remain undisclosed.
sections:
  - id: section-1
    title: Customer segmentation and visible buyer map
    body: >-
      Databricks’ public customer picture is broad, but it is most useful when separated into buying contexts rather
      than treated as a single logo wall. The company’s own 2025 and 2026 disclosures now anchor scale at more than
      20,000 organizations and 70% of the Fortune 500, while CNBC still referenced more than 15,000 customers in
      mid-2025. That progression matters because it shows both breadth and momentum instead of a one-off marketing
      number. The visible buyer map is also broader than a core data-engineering sale. Microsoft, Google Cloud, and SAP
      all position Databricks as a route to enterprise analytics and AI procurement, while named accounts span telecom,
      payments, media, retail, healthcare, and public-sector style workloads. In practice, Databricks is sold to
      platform leaders, data and AI teams, governance leaders, and increasingly business users who consume AI/BI and
      governed analytics. The payer is often a central platform or cloud budget, but partner routes can influence
      procurement and renewal control. This makes Databricks look like a scaled enterprise platform with multiple buyer
      centers rather than a single-workload tool.
    claimRefs:
      - C273
      - C274
      - C275
      - C314
      - C315
      - C316
      - C317
  - id: section-2
    title: Named deployment proof is strongest when it includes measurable outcomes
    body: >-
      The strongest public customer proof is not the existence of logos, but named deployments with specific outcomes.
      The July 2025 Databricks summit recap gives the cleanest recent set. 7-Eleven used Databricks for a multipurpose
      agentic marketing assistant across more than 13,000 stores and also used Databricks workflows to support a Unity
      Catalog migration. FOX Sports built Cleatus AI to answer fan questions in natural language and said AI-powered
      search produced a 2x improvement in query success. Mastercard gives both workflow and economics proof: its
      onboarding assistant was built with Databricks, it uses human-in-the-loop feedback, and Databricks said Mastercard
      cut query time by 80% and storage by 70% while reducing processing from months to days. AT&T is the best
      large-enterprise migration proof from a partner domain, with Microsoft documenting 300% five-year ROI, more than
      80 schema reductions, and roughly 3x faster data-science cycles on Azure Databricks. Insulet adds healthcare and
      manufacturing proof, with 12x faster processing and sharply lower data-stack cost. Together these references
      support real production use across multiple verticals and multiple deployment shapes, not just conference-stage
      demos.
    claimRefs:
