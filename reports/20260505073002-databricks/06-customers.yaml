  - id: section-3
    title: Durability is directionally strong, but public retention proof is still incomplete
    body: >-
      Public durability evidence is positive, but it is not complete enough to underwrite Databricks like a fully
      disclosed public software company. The strongest disclosed signal is the company’s sustained net retention above
      140%, repeated in September 2025, February 2026, and corroborated by CNBC and CRN. Large-account cohorts point in
      the same direction: Databricks moved from 650-plus to 800-plus $1M annual run-rate customers and from nearly 50 to
      more than 70 $10M customers in the same general period. Those are real expansion indicators. But public retention
      evidence still stops short of what an investor would ideally want. There is no public GRR, no segmented churn, no
      cohort waterfall, and no contract-term disclosure. Review surfaces are helpful only as directional color.
      Databricks’ own Gartner recap points to strong AI/BI satisfaction, while accessible independent review pages also
      surface consistent complaints about cost control, complexity, and onboarding. The right conclusion is that
      Databricks shows strong expansion and meaningful product value, but public sources still do not prove renewal
      durability by cohort or by product line.
    claimRefs:
      - C276
      - C277
      - C278
      - C279
      - C280
      - C281
      - C282
      - C306
      - C307
      - C308
      - C309
      - C310
      - C311
      - C312
  - id: section-4
    title: Expansion logic is credible, but concentration and channel economics remain partially hidden
    body: >-
      Databricks’ expansion logic is visible even without full cohort disclosure. The platform can start as a
      data-engineering or cloud-migration buy, then expand into governance, AI serving, AI/BI, operational data
      products, or customer-specific agent workflows. AT&T’s nearly 90,000 internal users on one architecture and
      Mastercard’s expansion from data pipelines into onboarding assistants are concrete examples of that widening use.
      Public partner surfaces reinforce the same pattern. Azure positions Databricks as a first-party Azure service,
      Google Cloud offers Databricks through Marketplace, and SAP now embeds SAP Databricks as a first-party service
      inside Business Data Cloud. Those routes should make Databricks easier to buy and harder to displace inside large
      enterprises. The unresolved issue is economic control. Public sources do not show how much revenue is
      partner-sourced, how concentrated the top customer set is, or whether the curated reference list overstates the
      ease of expansion. Databricks therefore looks strong on customer adoption quality and cross-sell logic, while
      still requiring private diligence on top-account concentration, channel mix, and term structure before treating
      customer durability as fully underwritten.
    claimRefs:
      - C277
      - C278
      - C291
      - C296
      - C303
      - C313
      - C314
      - C315
      - C316
      - C317
      - C318
