        - Supports trust-led and regulated-workload expansion
        - No public public-sector bookings or healthcare retention data
      - - Partner-routed enterprise buyers
        - Cloud architects, enterprise platform teams, SAP data owners
        - Buy via Azure, Google Cloud Marketplace, or SAP Business Data Cloud
        - Azure, Google Cloud, and SAP maintain active Databricks routes
        - Extends distribution and lowers procurement friction for some enterprises
        - Direct versus partner sourced customer mix is undisclosed
