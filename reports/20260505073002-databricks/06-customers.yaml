    rows:
      - - Net retention
        - '>140% overall NRR is publicly repeated in 2025-2026'
        - No GRR, logo churn, or 0-100 time-bucket retention series
        - A cohort figure would require actual percentage buckets rather than directional expansion signals.
      - - $1M+ and $10M+ cohorts
        - Public counts of 650+, 800+, nearly 50, and 70+ large accounts
        - No cohort renewal or contraction history for those whale bands
        - Spend-band counts show expansion, but they do not satisfy a retention-cohort data contract.
      - - Review and satisfaction signals
        - AI/BI review scores are strong while PeerSpot and Capterra surface cost and complexity complaints
        - No link between those reviews and actual paid renewal behavior
        - Review text helps with qualitative durability but cannot populate numeric cohort cells.
      - - Named customer stories
        - Mastercard, AT&T, FOX Sports, 7-Eleven, and Insulet show live deployments and outcomes
        - No public contract term, cohort, or renewal denominator for those references
        - Case studies prove production use, not retention percentages over time.
    notes: >-
      This extra table intentionally substitutes for the planned retention cohort figure because public sources did not
