  - id: T606
    title: Expansion and concentration risk table
    columns:
      - Expansion driver
      - Concentration risk
      - Impact
      - Diligence path
    rows:
      - - Usage-led platform expansion from data engineering into AI, BI, and operational use cases
        - $10M+ whale cohort is material but top-customer share is undisclosed
        - Strong growth with unknown revenue concentration at the very top of the base
        - Request top-10 and top-20 ARR share, gross retention, and product attach by whale cohort.
      - - Internal land-and-expand after platform standardization, as seen at AT&T and Mastercard
        - Switching-cost strength may hide dependence on a few deeply embedded accounts
        - Can improve durability, but also magnify downside if one strategic account slows consumption
        - Request usage concentration by workspace, region, and product family for the largest customers.
      - - Partner channels through Azure, Google Cloud, and SAP
        - Partner-routed deals may compress economics or shift renewal control
        - Channel leverage can help acquisition while reducing direct control over procurement and margin
        - Request direct versus partner sourced bookings, marketplace mix, and renewal ownership by channel.
      - - Referenceable AI use cases such as 7-Eleven, FOX Sports, Mastercard, and Insulet
        - Curated references may overstate average deployment success and understate failed pilots
        - Good public proof, but survivorship bias remains a real diligence issue
        - Request win/loss data, failed pilot counts, and references from the last four quarters by segment.
      - - Large review base and high AI/BI satisfaction alongside repeated cost complaints
        - Smaller or less-mature buyers may expand more slowly if cost governance is weak
        - Could cap adoption depth outside sophisticated enterprise teams even if top accounts keep expanding
        - Request cost-governance attach, training coverage, and support resolution metrics for smaller accounts.
    notes: Expansion logic is visible, but concentration and channel economics remain materially underdisclosed.
