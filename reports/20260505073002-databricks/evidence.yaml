evidenceGaps:
  - type: missing-source
    severity: material
    topic: Leadership and founder table governance coverage is partial.
    missingEvidence: >-
      A publicly reviewable board roster, committee structure, and voting/control-rights detail were not available in
      the reviewed Databricks governance pages.
    whyItMatters: >-
      Later governance and risk chapters need to know whether board oversight is founder-heavy, investor-heavy, or
      shared.
    diligencePath: >-
      Request the current board deck, board roster, observer list, committee charters, and any investor rights agreement
      that allocates nomination or veto rights.
    relatedQuestionRefs:
      - RQ010
    relatedTableRefs:
      - T102
  - type: private-evidence-only
    severity: material
    topic: Stakeholder or investor map cannot fully reconcile the current cap table.
    missingEvidence: >-
      Public sources disclose round leads and valuations, but they do not reconcile ownership percentages, warrant/debt
      terms, or the exact cumulative capital base after 2025-2026 financings.
    whyItMatters: >-
      Control, dilution, liquidation preference exposure, and true total capital raised all depend on the full
      post-Series-L and debt package.
    diligencePath: >-
      Request the current cap table, financing docs for Series J/K/L, debt agreements, secondary tender documents, and
      the investor rights side letters.
    relatedQuestionRefs:
      - RQ017
    relatedTableRefs:
      - T103
  - type: enumeration-incomplete
    severity: minor
    topic: Milestone table is a partial public chronology rather than a complete internal event log.
    missingEvidence: >-
      The public record is good enough for financing, acquisitions, partnerships, and the live litigation marker, but it
      does not expose every internal product, governance, or regional expansion milestone.
    whyItMatters: >-
      Later chapters will reuse this chronology as the public baseline, so missing internal milestones could change
      sequencing or causality.
    diligencePath: >-
      Request an internal corporate timeline covering financings, product launches, major customer wins, leadership
      changes, and material legal or regulatory events.
    relatedQuestionRefs: []
    relatedTableRefs:
      - T104
  - type: conflicting-data
    severity: material
    topic: Databricks SAM/SOM cannot be isolated from public market forecasts
    missingEvidence: >-
      No public source discloses Databricks workload mix, attach rates, or company-specific SAM/SOM by cloud, workload,
      or buyer segment.
    whyItMatters: >-
      Without a company-specific bridge from the core lakehouse category to actual monetizable segments, any Databricks
      SAM/SOM number would be a guess rather than a diligence-grade estimate.
    diligencePath: >-
      Request management’s internal market model by workload, cloud, and vertical; then reconcile it to disclosed
      product packaging, channel mix, and conversion assumptions.
    relatedQuestionRefs:
      - RQ023
    relatedTableRefs:
      - T202
  - type: private-evidence-only
    severity: material
    topic: Databricks public-sector and marketplace contract values are undisclosed
    missingEvidence: >-
      Public sources identify government, education, and marketplace channels but do not publish Databricks contract
      values, ACVs, or ARR by channel.
    whyItMatters: >-
      Public-sector and marketplace routes could matter disproportionately for adoption timing and margin quality, but
      the absence of contract economics blocks a reliable SOM by buyer segment.
    diligencePath: >-
      Request channel mix, top public-sector contract ranges, marketplace-originated ARR, and renewal rates by
      procurement path.
    relatedQuestionRefs:
      - RQ024
  - type: missing-source
    severity: material
    topic: Databricks pilot-to-production conversion and committed usage are not public
    missingEvidence: >-
      No retained public source provides Databricks pilot-conversion rates, average contract duration, committed usage
      minimums, or expansion cadence from pilot to production.
    whyItMatters: >-
      Those metrics determine whether the strong demand backdrop converts into durable multiyear spend or remains
      concentrated in experimental workloads.
    diligencePath: >-
      Request cohort-level pilot-to-production data, average contract duration, committed consumption ranges, and
      win/loss reasons for stalled deployments.
    relatedQuestionRefs:
      - RQ025
  - type: private-evidence-only
    severity: material
    topic: Databricks realized workload-level net pricing and gross margin
    missingEvidence: >-
      Public sources do not disclose realized net pricing, gross margin, or discount bands by Databricks workload,
      edition, or cloud contract.
    whyItMatters: >-
      Without realized pricing and margin data, it is hard to know whether Databricks wins on value or only on broad
      product scope versus Snowflake, Fabric, and hyperscaler alternatives.
    diligencePath: >-
      Request anonymized price books, top-20 account discounts, workload-level gross margin by product family, and
      examples of recent competitive bake-offs with net realized pricing.
    relatedQuestionRefs:
      - RQ322
  - type: missing-source
    severity: material
    topic: Direct displacement share from Microsoft Fabric
    missingEvidence: >-
      Public sources do not quantify how much of Fabric growth reflects direct Databricks or Snowflake replacement
      versus greenfield adoption inside existing Microsoft estates.
    whyItMatters: >-
      Bundle-led displacement is one of the clearest downside risks to Databricks expansion, especially in
      business-intelligence-heavy accounts.
    diligencePath: >-
      Request win-loss data by competitor, expansion versus rip-and-replace splits, and named examples where Databricks
      lost or won against Fabric in the last 12 months.
    relatedQuestionRefs:
      - RQ323
  - type: private-evidence-only
    severity: material
    topic: Production multi-homing rates across Databricks, Snowflake, BigQuery, Fabric, and Redshift
    missingEvidence: >-
      No retained public source quantifies how many large Databricks customers actively multi-home production workloads
      across the main retained alternatives.
    whyItMatters: >-
      Multi-homing directly determines whether Databricks becomes the durable control plane or just one compute layer
      among several.
    diligencePath: >-
      Request account-level overlap data, warehouse coexistence rates, workload split by platform, and churn or
      contraction reasons in multi-platform customers.
    relatedQuestionRefs:
      - RQ324
  - type: missing-source
    severity: minor
    topic: Frequency of self-managed Spark and Trino wins in regulated enterprises
    missingEvidence: >-
      Public open-source project pages show substitutes exist, but not how often regulated buyers still choose internal
      build instead of a managed platform.
    whyItMatters: >-
      Internal build remains a real status-quo substitute for skilled teams, especially where governance or sovereignty
      requirements make platform standardization slower.
    diligencePath: >-
      Request Databricks pipeline conversion data, customer migration histories, and vertical-specific internal-build
      loss reasons for financial services, healthcare, and public sector deals.
    relatedQuestionRefs:
      - RQ325
  - type: private-evidence-only
    severity: material
    topic: Exact liquidity and debt terms
    missingEvidence: >-
      Databricks does not publicly disclose exact cash on hand, debt pricing, maturity, covenant, or collateral terms
      for the roughly $2 billion of additional debt capacity disclosed in February 2026.
    whyItMatters: >-
      Without exact cash and debt terms, investors cannot test covenant headroom, refinancing risk, or true liquidity
      under downside scenarios.
    diligencePath: Request the latest treasury summary, debt agreements, lender deck, and post-close cash waterfall.
    relatedQuestionRefs:
      - RQ418
  - type: private-evidence-only
    severity: material
    topic: Monthly burn and runway months
    missingEvidence: No public source provides Databricks monthly burn, quarterly cash burn bridge, or runway months as of 2026.
    whyItMatters: >-
      Runway is the core solvency check for a private company and is necessary to judge how much financing dependency
      remains if growth slows.
    diligencePath: Request trailing 18-month monthly cash flow, headcount plan, and base/downside runway scenarios.
    relatedQuestionRefs:
      - RQ419
  - type: missing-source
    severity: material
    topic: Audited Databricks gross margin and working capital
    missingEvidence: >-
      Public sources show free-cash-flow status and third-party margin estimates, but there is no audited Databricks
      disclosure for gross margin, deferred revenue, working capital, or contribution margin by product.
    whyItMatters: Margin path is the main bridge between strong run-rate growth and durable long-term cash generation.
    diligencePath: >-
      Request audited or board-reviewed income statement detail, gross-profit bridge, and deferred-revenue /
      working-capital schedules.
    relatedQuestionRefs:
      - RQ420
  - type: missing-source
    severity: material
    topic: CAC, payback, and sales-cycle metrics
    missingEvidence: >-
      Public sources provide NRR and large-customer cohorts but no CAC, payback, sales-cycle length, pipeline
      conversion, or rep productivity metrics.
    whyItMatters: >-
      A late-stage software diligence process needs go-to-market efficiency metrics to judge whether growth is
      capital-efficient and repeatable.
    diligencePath: Request cohort CAC, payback by segment, sales-cycle distribution, and quota attainment by sales cohort.
    relatedQuestionRefs:
      - RQ421
  - type: missing-source
    severity: material
    topic: Customer concentration and top-account exposure
    missingEvidence: >-
      Public sources show many $10 million-plus customers but not the share of revenue held by the top 10 or top 20
      accounts or by cloud-channel concentration.
    whyItMatters: >-
      Large-account concentration can materially change revenue durability, pricing leverage, and dependence on a few
      strategic relationships.
    diligencePath: >-
      Request customer concentration schedules, cohort churn, and revenue split by direct versus cloud-channel
      relationships.
    relatedQuestionRefs:
      - RQ424
  - type: missing-source
    severity: material
    topic: Service-level reliability metrics by region and product line
    missingEvidence: >-
      Databricks does not publicly publish product-family SLA percentages, incident counts, or MTTR by region for AI/BI,
      compute, Apps, SQL, and model serving.
    whyItMatters: >-
      Product diligence needs durable reliability evidence, not just a live status snapshot, to underwrite enterprise
      production risk.
    diligencePath: >-
      Request historical SLA reports, incident postmortems, and service-family uptime by cloud and region for the last
      12 months.
    relatedQuestionRefs:
      - RQ522
    relatedTableRefs:
      - T504
  - type: private-evidence-only
    severity: material
    topic: Forward product roadmap beyond announced 2024-2026 launches
    missingEvidence: >-
      Public materials show release cadence and launched products, but not a dated roadmap for post-May-2026 feature
      deliveries across AI, BI, and database products.
    whyItMatters: >-
      Roadmap credibility affects differentiation durability and implementation timing for enterprise buyers and
      investors.
    diligencePath: >-
      Request internal roadmap by quarter, launch criteria, and dependencies for Lakebase, AI/BI, Lakewatch, and
      serverless platform features.
    relatedQuestionRefs:
      - RQ523
    relatedTableRefs:
      - T505
  - type: missing-source
    severity: material
    topic: Independent proof of AI security and responsible-AI control efficacy
    missingEvidence: >-
      Databricks documents AI security resources and launched Lakewatch, but public independent evidence on detection
      quality, false positives, red-team results, or customer outcomes is sparse.
    whyItMatters: >-
      Trust and safety claims are central to regulated AI adoption and materially affect how much risk to assign to new
      AI-facing workloads.
    diligencePath: >-
      Request customer references, third-party assessments, red-team summaries, and benchmarking for Lakewatch and
      Databricks responsible-AI controls.
    relatedQuestionRefs:
      - RQ524
    relatedTableRefs:
      - T504
  - type: missing-source
    severity: minor
    topic: Broader developer-ecosystem adoption counts
    missingEvidence: >-
      Public pages expose release activity, stars, and one PyPI package version, but do not cleanly provide broader
      download totals, active-contributor trends, or usage counts across the wider Databricks developer ecosystem.
    whyItMatters: >-
      Developer-signal depth helps assess ecosystem stickiness and productization beyond enterprise sales-led
      deployment.
    diligencePath: >-
      Pull GitHub API contributor history, package-registry download statistics, Marketplace installation counts, and
      community-forum activity across major Databricks developer assets.
    relatedQuestionRefs:
      - RQ525
  - type: missing-source
    severity: material
    topic: Public cohort retention by customer segment
    missingEvidence: No public 0-100 cohort table, GRR series, or gross-churn disclosure by segment was found for Databricks.
    whyItMatters: >-
      A customer chapter can show strong expansion and named deployments without proving true renewal durability.
      Segment-level gross retention would materially change underwriting confidence for a usage-based platform with
      whale cohorts.
    diligencePath: >-
      Request annual cohort waterfalls, GRR, logo churn, and usage-retention curves for enterprise, regulated, and
      AI-heavy customer bands.
    relatedQuestionRefs:
      - RQ018
    relatedTableRefs:
      - T604
  - type: private-evidence-only
    severity: material
    topic: Contract duration and renewal terms
    missingEvidence: Public sources do not disclose standard contract duration, renewal cadence, or term length by account size.
    whyItMatters: >-
      Without term structure, investors cannot separate sticky multiyear enterprise commitments from shorter renewals
      that may be more price-sensitive.
    diligencePath: >-
      Request standard order forms, renewal history by cohort, and weighted-average remaining term for top account
      bands.
    relatedQuestionRefs:
      - RQ020
    relatedTableRefs:
      - T604
  - type: private-evidence-only
    severity: material
    topic: Top-customer concentration
    missingEvidence: No public source disclosed revenue share for the top customer, top five, or top ten accounts.
    whyItMatters: >-
      The $10M+ customer cohort is large enough to matter, but without concentration data it is impossible to know
      whether a handful of accounts dominate growth.
    diligencePath: Request top-10 customer ARR share, gross retention, and cloud-channel overlap for the largest accounts.
    relatedQuestionRefs:
      - RQ021
    relatedTableRefs:
      - T606
  - type: private-evidence-only
    severity: material
    topic: Direct versus partner sourced customer mix
    missingEvidence: >-
      Public sources show Azure, Google Cloud, SAP, and federal routes, but not the share of bookings, revenue, or
      customers sourced through each channel.
    whyItMatters: >-
      Channel mix changes procurement friction, margin structure, and renewal control. It also affects how much economic
      power sits with hyperscalers or bundled partners.
    diligencePath: >-
      Request direct versus partner sourced bookings, renewal ownership, and marketplace gross-to-net economics by major
      channel.
    relatedQuestionRefs:
      - RQ023
    relatedTableRefs:
      - T606
  - type: enumeration-incomplete
    severity: minor
    topic: Named customer proof table is intentionally curated
    missingEvidence: >-
      The public customer table captures only the clearest named proofs with measurable outcomes or credible
      corroboration, not the full Databricks customer roster.
    whyItMatters: >-
      Databricks has a large and diverse customer base, so any public named-proof table will naturally overrepresent
      accounts willing to speak publicly.
    diligencePath: Ask for a private reference list by segment, geography, cloud, contract stage, and recent win/loss status.
    relatedQuestionRefs:
      - RQ026
    relatedTableRefs:
      - T603
  - type: missing-source
    severity: minor
    topic: Retention cohort figure substitution
    missingEvidence: >-
      No public time-bucket retention percentages were found to satisfy the cohort figure contract, so the chapter uses
      a retention table instead.
    whyItMatters: >-
      A visual cohort would be the cleanest way to assess durability, but fabricated percentages would be worse than an
      explicit gap.
    diligencePath: Request month-1, month-3, month-6, and year-1 retention cohorts by major customer band and product family.
    relatedQuestionRefs:
      - RQ018
    relatedTableRefs:
      - T604
  - type: private-evidence-only
    severity: material
    topic: Security incident history
    missingEvidence: >-
      Public sources do not provide a reliable count of customer-impacting security incidents or breach notifications
      for Databricks from 2024-2026.
    whyItMatters: Residual security risk is hard to size without actual incident frequency, severity, and remediation cadence.
    diligencePath: >-
      Request the internal incident register, customer notification log, third-party forensics summaries, and annual
      security KPI dashboard.
    relatedQuestionRefs:
      - RQ010
  - type: private-evidence-only
    severity: material
    topic: Partner economics and revenue share
    missingEvidence: >-
      Public sources do not disclose hyperscaler revenue-share terms, model-provider economics, or partner-sourced
      revenue mix for Databricks.
    whyItMatters: >-
      Partner concentration is hard to underwrite without knowing whether gross margin or account ownership depends on a
      few counterparties.
    diligencePath: >-
      Request cloud revenue-share schedules, model-provider commitments, partner-sourced ARR mix, and margin sensitivity
      analyses.
    relatedQuestionRefs:
      - RQ021
  - type: private-evidence-only
    severity: material
    topic: Customer concentration
    missingEvidence: >-
      Public sources do not disclose top-10 customer concentration, contract duration, or whale-customer churn for
      Databricks.
    whyItMatters: >-
      A private company with 70 $10M customers can still face meaningful concentration or renewal shocks even if overall
      scale is large.
    diligencePath: >-
      Request top-20 customer revenue concentration, contract term mix, renewal schedule, and gross retention by whale
      cohort.
    relatedQuestionRefs:
      - RQ022
  - type: private-evidence-only
    severity: material
    topic: Litigation reserves and insurance
    missingEvidence: >-
      Public sources reviewed do not disclose specific reserves, insurance coverage, or modeled downside for the Mosaic
      / DBRX copyright disputes.
    whyItMatters: >-
      Live litigation is easier to narrate than to price; reserve and insurance detail determine whether legal risk is
      nuisance, manageable, or thesis-breaking.
    diligencePath: >-
      Request litigation counsel memo, reserve analysis, insurance tower details, and board-level discussion of legal
      downside scenarios.
    relatedQuestionRefs:
      - RQ025
  - type: private-evidence-only
    severity: material
    topic: Reliability commitments and postmortems
    missingEvidence: >-
      Databricks does not publicly disclose detailed SLA credits, service-level objectives, postmortem cadence, or error
      budgets for enterprise reliability.
    whyItMatters: >-
      Outage counts alone do not tell investors whether the company is over- or under-invested in SRE and incident
      response.
    diligencePath: >-
      Request enterprise SLA templates, quarterly availability reports, root-cause review samples, and SLO /
      error-budget governance.
    relatedQuestionRefs:
      - RQ027
  - type: private-evidence-only
    severity: blocking
    topic: Valuation underwriting package
    missingEvidence: >-
      Public evidence still lacks partner economics, customer concentration, detailed debt covenants, and audited
      IPO-grade disclosure needed to fully underwrite a $134 billion valuation.
    whyItMatters: >-
      The company can be high quality and still have a fragile late-stage entry price if the missing variables break the
      bull case.
    diligencePath: >-
      Request audited financials, debt agreements, board materials for the 2025-2026 rounds, partner economics, and a
      full concentration schedule before treating price risk as contained.
    relatedQuestionRefs:
      - RQ030
  - type: enumeration-incomplete
    severity: minor
    topic: Regulatory / legal risk register partial coverage
    missingEvidence: >-
      The public risk register covers the highest-signal litigation, privacy, AI-regulation, and authorization items,
      but not any confidential disputes, regulatory inquiries, or private customer claims.
    whyItMatters: The table is useful for ranking public risk but should not be mistaken for a complete legal schedule.
    diligencePath: >-
      Request the full litigation schedule, threatened-claims tracker, regulatory correspondence log, and major customer
      dispute summary.
    relatedTableRefs:
      - T701
  - type: private-evidence-only
    severity: material
    topic: Series J/K/L cap table and preference stack
    missingEvidence: >-
      Share price, liquidation preferences, seniority, participating rights, and employee-liquidity terms for the
      2024-2025 financing rounds are not public.
    whyItMatters: >-
      Post-money headline valuation can materially overstate common-equity value if preferences, tender discounts, or
      structured liquidity terms sit ahead of new money.
    diligencePath: >-
      Request the current cap table, financing documents, board-approved tender terms, and any secondary trade summary
      before underwriting common-equity upside.
    relatedQuestionRefs:
      - RQ805
  - type: missing-source
    severity: material
    topic: Secondary market price discovery after Series L
    missingEvidence: >-
      No reliable public tape shows secondary pricing, discounts, or liquidity terms after the December 2025 Series L
      round.
    whyItMatters: >-
      Without a secondary-market check, investors cannot tell whether the $134B headline is clearing in real trades or
      only in primary-round marketing.
    diligencePath: >-
      Request broker indications, tender participation data, employee-sale pricing, and any board-approved liquidity
      windows.
    relatedQuestionRefs:
      - RQ828
  - type: private-evidence-only
    severity: material
    topic: Audited margin, SBC, and debt-covenant bridge
    missingEvidence: >-
      Public materials still omit audited gross margin, SBC burden, debt pricing, covenant package, and a bridge from
