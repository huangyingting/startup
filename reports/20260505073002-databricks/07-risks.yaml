  - id: T705
    title: Mitigation and kill criteria table
    columns:
      - Risk
      - Monitorable trigger
      - Threshold / event
      - Action implication
    rows:
      - - Copyright litigation
        - Court rulings or settlement posture
        - >-
          Class certification, injunctive relief, or reserve needs that are material relative to disclosed free cash
          flow
        - Treat legal risk as thesis-breaking until downside is repriced or reserved
      - - AI regulation
        - AI Act applicability expansion
        - >-
          Databricks-controlled models or workflows fall clearly into provider obligations without disclosed compliance
          mapping
        - Assume higher compliance cost, slower EU expansion, and greater contract friction
      - - Reliability
        - Incident frequency and recovery time
        - Repeated major outages or sustained multi-hour median resolution over successive quarters
        - Underwrite slower enterprise expansion and higher support cost
      - - Partner concentration
        - Bundling or repricing by strategic partners
        - Hyperscaler or model-provider changes compress gross margin or shift account ownership
        - Lower terminal margin assumptions and demand clearer partner economics
      - - Capital dependence
        - Debt and liquidity trajectory
        - Debt expands again without comparable improvement in disclosed cash generation or IPO readiness
        - Treat the $134B valuation as stretched rather than merely aggressive
      - - Disclosure quality
        - Private diligence gaps persist
        - No close on concentration, partner economics, SLA, or litigation-reserve questions
        - Pause or price for uncertainty instead of underwriting on narrative momentum
    notes: >-
      These thresholds are intended to be monitorable from public news, court dockets, incident trackers, and management
      diligence materials, not from intuition.
