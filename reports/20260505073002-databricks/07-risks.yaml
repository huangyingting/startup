  - id: S703
    title: The largest residual risk may be valuation and execution, not immediate distress
    body: >-
      Nothing in the public record suggests Databricks is financially weak today. The company says revenue, AI
      monetization, and free cash flow are all scaling, and multiple independent outlets corroborate a rapid step-up in
      capital raised and private valuation. That is precisely why valuation risk matters. Databricks moved from a $62
      billion valuation in January 2025 to more than $100 billion in August-September 2025 and then to $134 billion by
      December 2025-February 2026 while also layering in billions of debt capacity. Meanwhile it is trying to extend
      beyond the classic lakehouse story into Lakebase, Agent Bricks, AI apps, and deeper model-provider relationships.
      A premium mark can remain justified when execution is near-perfect, but it becomes fragile if product sprawl,
      partner economics, competitive bundling, or IPO timing slips. Microsoft Fabric, AWS EMR, and Snowflake all show
      that Databricks is not competing in a vacuum; large incumbents are already pitching integrated data-plus-AI
      stacks, cloud-scale resilience, and lower-friction procurement inside their own estates.
    claimRefs:
      - C346
      - C347
