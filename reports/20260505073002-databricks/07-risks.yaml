  evidenceGaps:
    - type: private-evidence-only
      severity: material
      topic: Security incident history
      missingEvidence: >-
        Public sources do not provide a reliable count of customer-impacting security incidents or breach notifications
        for Databricks from 2024-2026.
      whyItMatters: Residual security risk is hard to size without actual incident frequency, severity, and remediation cadence.
      diligencePath: >-
        Request the internal incident register, customer notification log, third-party forensics summaries, and annual
        security KPI dashboard.
      relatedQuestionRefs:
        - RQ010
    - type: private-evidence-only
      severity: material
      topic: Partner economics and revenue share
      missingEvidence: >-
        Public sources do not disclose hyperscaler revenue-share terms, model-provider economics, or partner-sourced
        revenue mix for Databricks.
      whyItMatters: >-
        Partner concentration is hard to underwrite without knowing whether gross margin or account ownership depends on
        a few counterparties.
      diligencePath: >-
        Request cloud revenue-share schedules, model-provider commitments, partner-sourced ARR mix, and margin
        sensitivity analyses.
      relatedQuestionRefs:
        - RQ021
    - type: private-evidence-only
      severity: material
      topic: Customer concentration
      missingEvidence: >-
        Public sources do not disclose top-10 customer concentration, contract duration, or whale-customer churn for
        Databricks.
      whyItMatters: >-
        A private company with 70 $10M customers can still face meaningful concentration or renewal shocks even if
        overall scale is large.
      diligencePath: >-
        Request top-20 customer revenue concentration, contract term mix, renewal schedule, and gross retention by whale
        cohort.
      relatedQuestionRefs:
        - RQ022
    - type: private-evidence-only
      severity: material
      topic: Litigation reserves and insurance
      missingEvidence: >-
        Public sources reviewed do not disclose specific reserves, insurance coverage, or modeled downside for the
        Mosaic / DBRX copyright disputes.
      whyItMatters: >-
        Live litigation is easier to narrate than to price; reserve and insurance detail determine whether legal risk is
        nuisance, manageable, or thesis-breaking.
      diligencePath: >-
        Request litigation counsel memo, reserve analysis, insurance tower details, and board-level discussion of legal
        downside scenarios.
      relatedQuestionRefs:
        - RQ025
    - type: private-evidence-only
      severity: material
      topic: Reliability commitments and postmortems
      missingEvidence: >-
        Databricks does not publicly disclose detailed SLA credits, service-level objectives, postmortem cadence, or
        error budgets for enterprise reliability.
      whyItMatters: >-
        Outage counts alone do not tell investors whether the company is over- or under-invested in SRE and incident
        response.
      diligencePath: >-
        Request enterprise SLA templates, quarterly availability reports, root-cause review samples, and SLO /
        error-budget governance.
      relatedQuestionRefs:
        - RQ027
    - type: private-evidence-only
      severity: blocking
      topic: Valuation underwriting package
      missingEvidence: >-
        Public evidence still lacks partner economics, customer concentration, detailed debt covenants, and audited
        IPO-grade disclosure needed to fully underwrite a $134 billion valuation.
      whyItMatters: >-
        The company can be high quality and still have a fragile late-stage entry price if the missing variables break
        the bull case.
      diligencePath: >-
        Request audited financials, debt agreements, board materials for the 2025-2026 rounds, partner economics, and a
        full concentration schedule before treating price risk as contained.
      relatedQuestionRefs:
        - RQ030
    - type: enumeration-incomplete
      severity: minor
      topic: Regulatory / legal risk register partial coverage
      missingEvidence: >-
        The public risk register covers the highest-signal litigation, privacy, AI-regulation, and authorization items,
        but not any confidential disputes, regulatory inquiries, or private customer claims.
      whyItMatters: The table is useful for ranking public risk but should not be mistaken for a complete legal schedule.
      diligencePath: >-
        Request the full litigation schedule, threatened-claims tracker, regulatory correspondence log, and major
        customer dispute summary.
      relatedTableRefs:
        - T701
acknowledgedWarnings:
  - dimension: duplicateAnalysis
    reason: >-
      T703 is the severity-ranked dependency register while F703 is the causal partner map; one supports row-level
      diligence actions and the other shows structural concentration.
  - dimension: duplicateAnalysis
    reason: >-
      T705 defines monitorable thesis-break thresholds, whereas F701 ranks current residual severity; both are needed
      because triggers and current heatmap position answer different diligence questions.
  - dimension: duplicateAnalysis
    reason: >-
      T705 lists actionable thesis-break criteria and F702 shows transmission channels into margin, growth, and
      valuation; retaining both avoids losing either monitorability or causal context.
