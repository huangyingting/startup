            - label: medium-high
              tone: neutral
              detail: DPA, SCCs, DPF, and compliance artifacts are meaningful mitigations.
            - label: medium-high
              tone: warning
              detail: Coverage looks strong but not clearly uniform across every cloud and tier.
        - label: Outage / reliability
          values:
            - label: medium
              tone: warning
              detail: Recent outage frequency is material enough to monitor.
            - label: high
              tone: negative
              detail: Core analytics and AI workloads can be customer-critical.
            - label: medium
              tone: warning
              detail: Public status visibility exists, but SLO and RCA detail is thin.
            - label: medium-high
              tone: warning
              detail: Residual risk persists without enterprise reliability disclosure.
        - label: Partner / model concentration
          values:
            - label: high
              tone: negative
              detail: Strategic cloud, SAP, and model-provider ties are clearly visible.
            - label: high
              tone: negative
              detail: Availability, economics, and account control can move through these nodes.
            - label: medium
              tone: warning
              detail: Multi-cloud and multi-model breadth helps but does not remove concentration.
            - label: high
              tone: negative
              detail: Public sources do not quantify partner economics or fallback quality.
