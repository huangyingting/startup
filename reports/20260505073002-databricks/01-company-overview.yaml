chapter:
  number: 1
  title: Company Overview
  summary: >-
    Databricks is a San Francisco-headquartered private data-and-AI platform company founded in 2013 by seven UC Berkeley AMP Lab researchers and still anchored publicly by Ali Ghodsi and its open-source roots. Public sources show a steep scale progression from a $62 billion Series J in December 2024 to a valuation above $100 billion in September 2025 and $134 billion by December 2025, while annualized revenue run-rate moved from a $3 billion target to $5.4 billion by February 2026. The company now claims more than 20,000 customers, more than 10,000 employees, and 30-plus offices, with additional validation from large-spend customer cohorts and multicloud distribution via Microsoft, Google Cloud, and SAP. The main company-overview diligence gaps are the exact post-Series-L cap table and debt structure, the full board roster and control-rights map, and the eventual exposure from the active DBRX-related copyright litigation.
sections:
- id: section-1
  title: Identity, mission, and the current public company shape
  body: >-
    Databricks now presents itself as a large late-stage private infrastructure company rather than a narrowly defined Spark vendor. The cleanest current identity source is the official about page, which calls Databricks the data and AI company and frames the Data Intelligence Platform as a unified foundation for data, governance, and AI. Headquarters are clearly anchored in San Francisco and the contact page provides a specific 160 Spear Street address, which makes the company easy to anchor geographically for later chapters. The public scale message has also changed over time in a way worth preserving: the about page still says more than 15,000 organizations use Databricks, while the current press kit and later 2025-2026 press releases move that number to more than 20,000 customers. The safest reusable identity for the rest of the report is therefore a San Francisco-headquartered, privately held data-and-AI platform company with a multicloud operating model, broad enterprise reach, and
    explicit dependence on its own narrative around the Data Intelligence Platform.
  claimRefs:
  - C004
  - C005
  - C006
  - C007
  - C008
  - C009
  - C011
  - C052
- id: section-2
  title: Founders, leadership bench, and governance disclosure limits
  body: >-
    The founder record is unusually strong even if the full executive and board roster is not. Databricks says it was founded in 2013 by seven UC Berkeley AMP Lab researchers, and the official founders page names Ali Ghodsi, Ion Stoica, Matei Zaharia, Patrick Wendell, Reynold Xin, Andy Konwinski, and Arsalan Tavakoli-Shiraji. That matters because the company still derives legitimacy from technical origin stories: Berkeley and Spark are not marketing garnish but core proof of founder-market fit. The Berkeley profile for Ali Ghodsi and the CACM Spark paper reinforce that Databricks emerged from the same academic and open-source ecosystem that created Apache Spark. Public executive disclosure remains thinner than the founder disclosure. Ali Ghodsi is easy to verify as co-founder and CEO, but the reviewed board page mainly proves that a governance surface exists, not who all directors are or how committees and investor rights are allocated. That should be treated as a real diligence gap, not
    silently papered over.
  claimRefs:
  - C001
  - C002
  - C003
  - C013
  - C014
  - C015
  - C016
- id: section-3
  title: Capital formation, investor map, and private-market maturity
  body: >-
    Databricks has crossed into very large private-company financing territory, and the progression is well supported by both company and independent reporting. The decisive inflection was the December 2024 Series J announcement: Databricks said it was arranging $10 billion of expected non-dilutive financing at a $62 billion valuation and expected to cross a $3 billion revenue run-rate while reaching positive free cash flow. By September 2025 the company said it had crossed a $4 billion run-rate, exceeded a $1 billion AI revenue run-rate, and closed a $1 billion Series K at a valuation above $100 billion. The December 2025 Series L then pushed public valuation to $134 billion with a $4.8 billion run-rate, and the February 2026 update said Databricks had crossed $5.4 billion in run-rate revenue while completing a package worth more than $7 billion including equity and debt. Those are unmistakable signs of late-stage private-market maturity and IPO optionality. What remains unresolved is the
    precise cap table and true cumulative capital raised after the mix of non-dilutive financing, equity, debt, and 2025 employee liquidity programs.
  claimRefs:
