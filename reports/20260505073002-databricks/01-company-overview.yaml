callouts:
- calloutType: strength
  title: Scaled private-market momentum is already public
  body: Few private software companies disclose a valuation and annualized revenue progression as frequently as Databricks did from late 2024 through early 2026. That makes Databricks unusually easy to anchor as a late-stage platform company rather than a speculative AI narrative alone.
  claimRefs:
  - C017
  - C018
  - C027
  - C032
  - C036
  - C037
- calloutType: risk
  title: The clean product-and-capital story still carries a live IP overhang
  body: The Mosaic-to-DBRX path left Databricks exposed to an active copyright case that survived a motion to dismiss in April 2026. That does not invalidate the company's scale, but it does mean later diligence should test model-governance controls, indemnities, and reserve assumptions.
  claimRefs:
  - C042
  - C048
  - C049
