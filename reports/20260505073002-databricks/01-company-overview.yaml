- id: section-4
  title: Scale signals, ecosystem reach, and what is reusable as ground truth
  body: >-
    The strongest public scale signals are not just valuation headlines; they are the quality of Databricks customer and ecosystem indicators. Company materials now claim more than 20,000 customers globally, 70% Fortune 500 penetration, more than 10,000 employees, and 30-plus offices. Independent reporting fills in useful texture without fully replacing company claims: CNBC said Databricks had roughly 8,000 employees in June 2025, nearly 50 customers spending more than $10 million annually, and $2.6 billion of revenue in the fiscal year ending January 2025. The company then disclosed successive cohorts of 650-plus, 700-plus, and 800-plus customers consuming more than $1 million of annual revenue run-rate across September 2025, December 2025, and February 2026. Distribution is also broader than a single direct-sales motion. SAP says Business Data Cloud embeds Databricks technology, while Microsoft and Google each market Databricks as a first-party cloud offering. Together those signals support
    a reusable picture of Databricks as a scaled enterprise platform with multicloud reach, strong upsell dynamics, and a customer base deep enough to support large-spend cohorts.
  claimRefs:
