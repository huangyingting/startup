  evidenceGaps:
  - type: missing-source
    severity: material
    topic: Leadership and founder table governance coverage is partial.
    missingEvidence: A publicly reviewable board roster, committee structure, and voting/control-rights detail were not available in the reviewed Databricks governance pages.
    whyItMatters: Later governance and risk chapters need to know whether board oversight is founder-heavy, investor-heavy, or shared.
    diligencePath: Request the current board deck, board roster, observer list, committee charters, and any investor rights agreement that allocates nomination or veto rights.
    relatedQuestionRefs:
    - RQ010
    relatedTableRefs:
    - T102
  - type: private-evidence-only
    severity: material
    topic: Stakeholder or investor map cannot fully reconcile the current cap table.
    missingEvidence: Public sources disclose round leads and valuations, but they do not reconcile ownership percentages, warrant/debt terms, or the exact cumulative capital base after 2025-2026 financings.
    whyItMatters: Control, dilution, liquidation preference exposure, and true total capital raised all depend on the full post-Series-L and debt package.
    diligencePath: Request the current cap table, financing docs for Series J/K/L, debt agreements, secondary tender documents, and the investor rights side letters.
    relatedQuestionRefs:
    - RQ017
    relatedTableRefs:
    - T103
  - type: enumeration-incomplete
    severity: minor
    topic: Milestone table is a partial public chronology rather than a complete internal event log.
    missingEvidence: The public record is good enough for financing, acquisitions, partnerships, and the live litigation marker, but it does not expose every internal product, governance, or regional expansion milestone.
    whyItMatters: Later chapters will reuse this chronology as the public baseline, so missing internal milestones could change sequencing or causality.
    diligencePath: Request an internal corporate timeline covering financings, product launches, major customer wins, leadership changes, and material legal or regulatory events.
    relatedQuestionRefs: []
    relatedTableRefs:
    - T104
