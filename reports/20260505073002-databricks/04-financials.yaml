  - id: T404
    title: Capital adequacy table
    columns:
      - Capital metric
      - Public value / status
      - Evidence
      - Underwriting implication
      - Diligence ask
    rows:
      - - Cash on hand
        - null
        - CNBC says Databricks now has billions in cash on hand after the Feb 2026 package, but gives no exact balance.
        - Liquidity appears ample, but exact cash cannot be modeled.
        - Request current cash, restricted cash, and post-close liquidity waterfall.
      - - Monthly burn
        - null
        - No public monthly burn disclosed; company instead emphasizes positive free cash flow.
        - Exact runway cannot be calculated from public data.
        - Request monthly cash burn bridge and scenario burn under slower growth.
      - - Runway months
        - null
        - No exact cash balance plus no burn rate.
        - Runway remains an evidence gap despite strong financing access.
        - Request base, downside, and acquisition-adjusted runway model.
      - - Planned use of funds
        - AI products, acquisitions, international GTM, employee liquidity, Lakebase, Genie
        - Series J and Feb 2026 company statements specify growth, product, M&A, and liquidity uses.
        - Capital appears growth-oriented rather than rescue-oriented.
        - Request board-approved capital plan and 12-24 month deployment budget.
      - - Next-round trigger
        - No immediate public trigger; IPO / private financing appears optional rather than urgent
        - Positive free cash flow plus >$7B financing package reduce near-term dependency.
        - Near-term capital risk looks low, but market timing can still shape the path to IPO.
        - Confirm management trigger points for IPO, debt drawdown, or another private round.
      - - Debt / credit obligations
        - ~$2B additional debt capacity disclosed in Feb 2026; detailed terms undisclosed
        - Debt broadens flexibility but may embed covenants, pricing, and maturity risk not public.
        - Forward adequacy depends partly on unseen debt terms.
        - Request debt agreements, covenants, maturity ladder, and security package.
    notes: >-
      This table intentionally focuses on forward liquidity and financing dependency rather than repeating the full
      historical round chronology already established elsewhere in the report.
    claimRefs:
      - C189
      - C190
      - C198
      - C199
  - id: T405
    title: Public financial gaps table
    columns:
      - Missing metric
      - Why it matters
      - Best public proxy
      - Exact diligence path
    rows:
      - - Realized net pricing by workload
        - List pricing does not reveal net revenue quality or discounting intensity.
        - Public DBU mechanics and commitment discounts only.
        - Request top-100 contract sample with list price, discount, cloud, and product mix.
      - - Audited gross margin and contribution margin
        - Growth can look excellent while margin quality deteriorates.
        - Snowflake and Confluent filings offer comparators; Sacra offers only a low-confidence estimate for Databricks.
        - Request audited gross profit and infrastructure cost allocation by product family.
      - - Cash balance and debt terms
        - Capital adequacy cannot be modeled without exact liquidity and obligations.
        - CNBC says Databricks has billions in cash and about $2B of debt capacity.
        - Request closing cash, debt docs, maturity schedule, and covenant summary.
      - - Monthly burn and runway
        - Runway is the basic underwriting test for a private company.
        - Positive free cash flow signals lower stress but not a full runway model.
        - Request trailing 18-month monthly cash bridge and downside runway scenarios.
      - - CAC, payback, and sales-cycle length
        - Late-stage software underwriting needs a go-to-market efficiency view.
        - >-
          NRR >140%, 800+ $1M customers, and 70+ $10M customers indicate strong expansion but not acquisition
          efficiency.
        - Request cohort CAC, payback, pipeline conversion, and rep productivity by segment.
      - - Customer concentration and top-account exposure
        - Very large cohorts can hide dependence on a few strategic accounts or channels.
        - Public sources show 70+ customers above $10M annualized spend but no top-customer concentration.
        - Request revenue concentration, top-20 account trends, and hyperscaler / marketplace channel overlap.
    notes: >-
      These are the core blockers to turning a strong public growth narrative into a full investment-grade financial
      model.
    claimRefs:
      - C189
      - C192
      - C193
      - C196
      - C218
