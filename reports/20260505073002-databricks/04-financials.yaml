  evidenceGaps:
    - type: private-evidence-only
      severity: material
      topic: Exact liquidity and debt terms
      missingEvidence: >-
        Databricks does not publicly disclose exact cash on hand, debt pricing, maturity, covenant, or collateral terms
        for the roughly $2 billion of additional debt capacity disclosed in February 2026.
      whyItMatters: >-
        Without exact cash and debt terms, investors cannot test covenant headroom, refinancing risk, or true liquidity
        under downside scenarios.
      diligencePath: Request the latest treasury summary, debt agreements, lender deck, and post-close cash waterfall.
      relatedQuestionRefs:
        - RQ418
    - type: private-evidence-only
      severity: material
      topic: Monthly burn and runway months
      missingEvidence: No public source provides Databricks monthly burn, quarterly cash burn bridge, or runway months as of 2026.
      whyItMatters: >-
        Runway is the core solvency check for a private company and is necessary to judge how much financing dependency
        remains if growth slows.
      diligencePath: Request trailing 18-month monthly cash flow, headcount plan, and base/downside runway scenarios.
      relatedQuestionRefs:
        - RQ419
    - type: missing-source
      severity: material
      topic: Audited Databricks gross margin and working capital
      missingEvidence: >-
        Public sources show free-cash-flow status and third-party margin estimates, but there is no audited Databricks
        disclosure for gross margin, deferred revenue, working capital, or contribution margin by product.
      whyItMatters: Margin path is the main bridge between strong run-rate growth and durable long-term cash generation.
      diligencePath: >-
        Request audited or board-reviewed income statement detail, gross-profit bridge, and deferred-revenue /
        working-capital schedules.
      relatedQuestionRefs:
        - RQ420
    - type: missing-source
      severity: material
      topic: CAC, payback, and sales-cycle metrics
      missingEvidence: >-
        Public sources provide NRR and large-customer cohorts but no CAC, payback, sales-cycle length, pipeline
        conversion, or rep productivity metrics.
      whyItMatters: >-
        A late-stage software diligence process needs go-to-market efficiency metrics to judge whether growth is
        capital-efficient and repeatable.
      diligencePath: Request cohort CAC, payback by segment, sales-cycle distribution, and quota attainment by sales cohort.
      relatedQuestionRefs:
        - RQ421
    - type: missing-source
      severity: material
      topic: Customer concentration and top-account exposure
      missingEvidence: >-
        Public sources show many $10 million-plus customers but not the share of revenue held by the top 10 or top 20
        accounts or by cloud-channel concentration.
      whyItMatters: >-
        Large-account concentration can materially change revenue durability, pricing leverage, and dependence on a few
        strategic relationships.
      diligencePath: >-
        Request customer concentration schedules, cohort churn, and revenue split by direct versus cloud-channel
        relationships.
      relatedQuestionRefs:
        - RQ424
