  - id: TI003
    title: Unit economics table
    columns:
      - Metric
      - Value
      - Confidence
      - Why it matters
      - Diligence ask
    rows:
      - - Recognized revenue for fiscal year ended Jan 2025 (USD billions)
        - 2.6
        - medium
        - Anchors run-rate claims in at least one reported fiscal-year revenue datapoint.
        - Confirm audited GAAP revenue, deferred revenue, and revenue recognition policy by product.
      - - Annualized revenue run-rate by Feb 2026 (USD billions)
        - 5.4
        - medium
        - Shows scale and acceleration entering 2026, but run-rate is not the same as recognized revenue.
        - Bridge run-rate to booked and recognized revenue by quarter.
      - - Net revenue retention
        - '>140%'
        - medium
        - Indicates strong expansion inside existing accounts and supports a usage-led land-expand thesis.
        - Provide cohort-level NRR by enterprise segment and by product family.
      - - $1M+ annual run-rate customers
        - 800
        - medium
        - Large high-spend cohort is a practical proxy for enterprise depth and cross-sell durability.
        - Provide cohort gross retention and gross-margin profile for these accounts.
      - - $10M+ annual run-rate customers
        - 70
        - medium
        - Very large accounts imply strategic embed but also raise concentration questions.
        - Provide top-10 customer exposure and any hyperscaler/channel overlap.
      - - Average contract value proxy (USD)
        - 208696
        - low
        - Third-party estimate provides directional context for typical deal size outside the very largest cohorts.
        - Validate against internal ACV / annual spend distribution.
      - - Public gross margin
        - null
        - low
        - Gross margin is the key missing bridge between strong usage growth and durable cash generation.
        - Provide audited gross profit by major workload and cloud.
      - - Public CAC / payback
        - null
        - low
        - Without CAC or payback, sales efficiency cannot be underwritten like a public SaaS company.
        - Provide blended and enterprise-only CAC, payback, and rep productivity curves.
      - - Free cash flow status
        - Positive over prior 12 months by Sep 2025 and Feb 2026
        - medium
        - Suggests improving operating leverage even without full margin disclosure.
        - Provide absolute operating cash flow, capex, and free cash flow by quarter.
    notes: >-
      Null fields are intentional where Databricks withholds public detail. The table keeps public proxies separate from
      missing underwriting inputs.
    claimRefs:
      - CI013
      - CI015
      - CI017
      - CI018
      - CI020
      - CI021
