  - id: capital-adequacy-verdict
    title: Capital adequacy, financing dependency, and the financial verdict
    body: >-
      Public evidence points to low near-term financing stress but still leaves important underwriting holes. Databricks
      has moved from the December 2024 Series J package, which targeted AI investment, acquisitions, international
      go-to-market expansion, and employee liquidity, to a September 2025 Series K and then the February 2026 package
      worth more than $7 billion, including about $5 billion of equity and about $2 billion of additional debt capacity.
      Combined with public statements that free cash flow was positive over the prior 12 months, that suggests
      Databricks is financing growth options rather than plugging a disclosed liquidity crisis. CNBC also reported that
      the company now has billions in cash on hand, but without a precise balance, debt pricing, covenant package,
      amortization schedule, or monthly burn rate. That is enough to support a forward verdict of strong revenue quality
      and low immediate capital-intensity risk relative to many late-stage AI companies, but not enough to complete a
      lender-style or IPO-style liquidity model. The chapter’s practical conclusion is that Databricks appears
      financially durable in the near term, with multiple growth engines and ample external capital access, yet
      diligence should still prioritize realized pricing, audited margins, cash and debt schedules, and concentration
      risk before treating the public run-rate narrative as fully underwritten.
    claimRefs:
      - C186
      - C187
      - C188
      - C189
