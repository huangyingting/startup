tables:
  - id: TI001
    title: Revenue streams table
    columns:
      - Revenue stream
      - Mechanism
      - Unit
      - Current value / status
      - Revenue quality
      - Diligence ask
    rows:
      - - Core data engineering compute
        - Jobs, all-purpose, and serverless workloads billed through DBUs and attached infrastructure usage
        - DBU-hour plus cloud infrastructure
        - Core monetization surface remains active and disclosed on pricing pages
        - Medium; pricing mechanics are public but realized net rates are not
        - Request workload-level realized price per DBU and gross margin by compute class.
      - - Databricks SQL / warehousing
        - Serverless SQL and related warehouse compute
        - DBU-hour
        - Greater than $1B revenue run-rate by Q3 2025
        - Medium; strong disclosed run-rate but not audited revenue recognition
        - Request warehousing revenue mix, warehouse attach, and margin by deployment mode.
      - - AI products
        - Model serving, AI Gateway, agent and model tooling on governed data
        - DBU-hour and payload-based usage
        - Crossed $1B run-rate in Sep 2025 and $1.4B by Feb 2026
        - Medium; multiple corroborating sources but still company-led disclosure
        - Request AI revenue split between serving, tooling, and partner-model pass-through.
      - - AI/BI
        - Native BI and conversational analytics embedded into the platform without per-seat BI licensing
        - Usage-based platform consumption
        - Publicly positioned as no per-seat or per-license BI fee
        - Medium; packaging is public but standalone revenue is undisclosed
        - Request AI/BI attach rate, user mix, and realized monetization per active account.
      - - Lakebase / database
        - Serverless Postgres and database serverless compute for AI agents
        - Database compute and storage usage
        - Strategic expansion area accelerated with 2026 financing; revenue not disclosed
        - Low; new product with no public revenue contribution disclosed
        - Request current bookings, customer count, and cost-to-serve by Lakebase workload.
      - - Professional services / support
        - Implementation, migration, and support services attached to platform deals
        - Services and support fees
        - Publicly unsegmented
        - Low; no public breakout
        - Request services mix, gross margin, and whether services are strategic or break-even.
    notes: >-
      Rows separate public monetization mechanisms from what remains undisclosed. Usage-based surfaces are visible;
      realized revenue mix is not.
