  - id: TI002
    title: Pricing / monetization table
    columns:
      - Offer / comparator
      - Price unit / contract
      - Public list / billing signal
      - Discounts / unknowns
      - Source
    rows:
      - - Databricks core platform
        - Pay-as-you-go DBUs
        - No up-front cost and per-second granularity
        - Realized net pricing and enterprise discount bands undisclosed
        - Databricks pricing page
      - - Azure Databricks commitments
        - 1-year or 3-year DBCU pre-purchase
        - Up to 37% savings versus pay-as-you-go DBUs
        - Savings apply to DBUs, not the full underlying cloud bill
        - Microsoft Azure pricing
      - - Databricks AI/BI
        - Embedded platform usage rather than BI seats
        - No per-seat or per-license BI fees
        - Actual monetization path and attach rate undisclosed
        - Databricks AI/BI page
      - - Snowflake
        - Compute and storage with list-price tables / calculator
        - Managed elastic compute plus separate storage pricing
        - Capacity storage discounts require contract tables not shown on marketing page
        - Snowflake pricing
      - - BigQuery
        - On-demand per TiB or reserved slots
        - On-demand analysis is $6.25 per TiB above the first free TiB monthly; capacity uses slots
        - Realized enterprise discounts vary by commitment and edition
        - Google BigQuery pricing
      - - Amazon Redshift
        - Provisioned or serverless RPUs
        - Serverless starts at $1.50 per hour and is billed per-second while active
        - Reservations reduce cost but create commitment structure and separate transfer/storage charges
        - Amazon Redshift pricing
    notes: >-
      The table mixes Databricks list mechanics with comparator monetization structures to show how usage-based
      data-platform economics are actually bought. It does not attempt to estimate Databricks realized net revenue per
      workload.
