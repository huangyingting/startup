  - id: TV005
    title: Thesis-break and kill triggers table
    summary: Five events that individually mandate a full thesis review and provisional avoid stance.
    columns:
      - Trigger
      - Threshold
      - Transmission to thesis
      - Action implication
    rows:
      - - Revenue below floor
        - Audited or management ARR confirmed below €50M for fiscal 2024
        - Valuation at €12B implies over 200x revenue; no defensible comparable
        - Full thesis review; provisional switch to avoid
      - - Bloomberg validated by independent MoD review
        - Bundeswehr or Ukrainian MoD independently confirms glitchy software or overpricing
        - Reference-customer credibility eliminated; primary revenue driver impaired
        - Full thesis review; demand erosion scenario activated
      - - UN CCW binding LAWS protocol adopted
        - Protocol prohibits or severely restricts AI kill-chain products Helsing currently deploys
        - Core product differentiation eliminated; product redesign at unknown cost
        - Full thesis review; bear case activated regardless of revenue status
      - - No new NATO-member government contract in H1 2026
        - Zero new signed MOD-level contracts by 30 June 2026
        - Commercial traction narrative breaks; Bundeswehr dependency concentration deepens
        - Downgrade to track until new contract evidence emerges
      - - Lead investor withdrawal
        - Prima Materia declines to participate or marks down in next financing round
        - Signals insider negative read on valuation or commercial trajectory
        - Full thesis review; refinancing path uncertain
    notes: >-
      Trigger thresholds are author-defined monitoring criteria anchored to publicly verifiable
      signals.
