  - id: section-4
    title: Comparable valuation and market context
    body: >-
      Helsing's €12B valuation is triangulated against four peer references. Anduril Industries,
      the closest structural peer as a US defence AI hardware-software hybrid, closed its Series F
      at $28B post-money in January 2025; Helsing trades at approximately 0.43x Anduril on a
      post-money basis, reflecting its smaller deployable fleet, earlier revenue stage, and European
      geographic concentration. Palantir Technologies, the public-market software-only ceiling,
      reported full-year 2024 revenue of $2.87B against a market capitalisation of approximately
      $70B—a trailing multiple of approximately 24x—functioning as the upper bound for pure-software
      defence AI multiples. Shield AI's most recent private round valued the company at $2.7B;
      because Shield AI has a narrower DoD-only product scope relative to Helsing's pan-NATO
      coverage, direct multiple comparison is approximate. L3Harris Technologies, a listed legacy
      defence prime with 2024 revenue of approximately $21B and a market cap of approximately $20B,
      illustrates how established hardware primes compress to roughly 1x revenue—a floor rather
      than a comparables ceiling. The global defence AI market is projected at $15-18B in 2024
      growing to $40-60B by 2030 at a 15-20% CAGR, a market size that supports a €12B Helsing
      premium only if near-term market-share capture and revenue realisation are confirmed. The
      composite comparable set implies a Helsing fair-value range of €8-18B, with €12B at the
      upper-mid band assuming revenue of €150-300M at 25-60x multiple. The comparable valuation
      table TV004 enumerates the full set. The investment KPIs figure FV004 defines the six key
      performance indicators to track through the 18-24 month hold-period.
    claimRefs:
