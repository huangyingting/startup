  - id: section-5
    title: Exit readiness, diligence asks, and thesis-break triggers
    body: >-
      Helsing's exit readiness is moderate for the 2027-2029 horizon. The Saab AB strategic stake
      constitutes a credible M&A path via acquisition by a European defence prime—Airbus, Thales,
      Leonardo, or Saab itself—likely at a 1.5-2.5x premium to the last private-round price. No
      near-term IPO has been signalled as of 2025; the regulatory complexity of a dual-use defence
      AI company, combined with European equity market depth limitations, makes a public listing
      structurally difficult in the 2-3 year horizon. Secondary transactions via specialist
      defence-tech funds represent the most liquid near-term exit path for early investors. Five
      thesis-break triggers are catalogued in table TV005, ordered by materiality: revenue confirmed
      below €50M in audited or management-presented disclosure; Bloomberg glitchy-software allegations
      validated by an independent Bundeswehr or Ukrainian MoD review; a UN CCW binding LAWS protocol
      adopted covering Helsing's current kill-chain product range; no new NATO-member government
      contract signed in H1 2026; and lead investor Prima Materia marking down or declining to
      participate in the next financing round. Any single trigger mandates a full thesis review and
      provisional switch to "avoid" pending further evidence. Five final diligence asks are
      prioritised in table TV006: audited or management-presented ARR and gross margin for fiscal
      2024; Ukraine revenue concentration as a percentage of total contract backlog; Bloomberg
      corroboration status from an independent MOD review; an LAWS IHL legal opinion covering
      current and planned kill-chain products; and Series E round timing and valuation anchor
      expectations. The panel's current stance is to track Helsing through H2 2026 Series E
      preparation while collecting diligence evidence on these five priority asks before any
      commitment.
    claimRefs:
