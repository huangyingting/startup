    - id: QV027
      type: enumeration
      question: What are the thesis-break triggers that mandate a material valuation revision?
      status: answered
      answer: >-
        Five triggers: (1) revenue confirmed below €50M; (2) Bloomberg allegations validated by
        independent MoD review; (3) UN CCW binding LAWS protocol adopted; (4) no new NATO-member
        government contract in H1 2026; (5) Prima Materia declines to participate in Series E.
        Each mandates a full thesis review. See table TV005.
