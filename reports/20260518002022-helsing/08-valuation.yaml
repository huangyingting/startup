      status: answered
      answer: >-
        L3Harris trades at approximately 1x revenue ($21B revenue, $20B market cap), illustrating the
        deep multiple compression applied to established hardware-heavy defence primes. Helsing's
        implied multiple (if revenue is €150-300M) of 40-80x revenue is an order of magnitude above
        listed primes, reflecting the AI-software growth premium but also execution risk for
        pre-scaled revenue companies.
      targets:
