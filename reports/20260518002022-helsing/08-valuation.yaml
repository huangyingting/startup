acknowledgedWarnings:
  - dimension: paywallRisk
    reason: >-
      Helsing is a pre-IPO European defence AI company with limited public disclosures. The
      restricted-access sources include Statista (paywall analyst market data), MarketsAndMarkets
      (paywall analyst data), and Helsing's own website (js-only) plus several broken Guardian and
      Axios pages. These represent the best available references for their respective evidence types
      and cannot be substituted with equivalent open-access sources. The paywalled market data
      sources (Statista, MarketsAndMarkets) provide market sizing estimates that are structurally
      necessary for the valuation comparable analysis. Additional ok-access sources (The Economist,
      MIT Technology Review, Breaking Defense, FlightGlobal, CBInsights, Dealroom, Bundesregierung,
      Europarl) are used as primary corroboration wherever possible.
