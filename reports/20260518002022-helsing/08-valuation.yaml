company:
  name: Helsing

chapter:
  number: 8
  title: Valuation & Recommendation
  summary: >-
    Helsing's May/June 2025 Series D at €12B post-money—€600M from Prima Materia, General Catalyst,
    and existing investors—makes it the highest-capitalised European defence AI startup by a material
    margin. The valuation is a 7x uplift from the July 2024 Series C (€5B post-money) in under twelve
    months, driven by the Ukraine-war demand surge and Eurofighter/FCAS contract momentum rather than
    disclosed revenue milestones. Because Helsing does not publish ARR, gross margin, or backlog, no
    revenue-multiple validation is possible using public information. Against comparables—Anduril ($28B
    Series F, January 2025), Palantir (~$70B public, ~24x trailing revenue), and Shield AI ($2.7B)—€12B
    appears to be at the upper-mid band of defensible range if Helsing's revenue is €150-300M, which
    cannot be confirmed. The recommendation is "research-more" at medium confidence and medium-high risk
    rating. Bull case (probability ~25%) targets €20-25B on continued Ukraine demand and FCAS integration
    revenue. Base case (~50%) holds at €10-14B as the next-round anchor assuming €100-200M revenue and
    ceasefire-stable defence spending. Bear case (~25%) prices a €3-6B down-round triggered by Ukraine
    demand collapse, Bloomberg software-reliability validation, or a binding LAWS protocol. Five
    thesis-break triggers and five priority diligence asks are catalogued before any upgrade to "track"
    or above.

sections:
  - id: section-1
    title: Valuation anchor and recommendation rationale
    body: >-
      Helsing's Series D, closed in June 2025, set the company's post-money valuation at €12B against
      €600M in new capital led by Prima Materia and General Catalyst. Total capital raised through
      Series D is approximately €1.37B: Series A approximately €100M (2021), Series B €223M at €1.7B
      post-money (September 2023), Series C €487M at €5B post-money (July 2024), and Series D €600M
      at €12B post-money (2025)—a 7x uplift from Series C in under twelve months. Helsing does not
      publicly disclose ARR, gross margin, or contract backlog, making the €12B price a
      narrative-anchored round that cannot be independently audited or revenue-multiple validated using
      public information. The recommendation is "research-more" at medium confidence and a medium-high
      risk rating: Helsing's strategic position in European defence AI is credible, the funding
      syndicate is sophisticated, and Anduril's $28B Series F provides an upper-bound structural
      comparable, but commercial opacity prevents a fundable investment thesis from being robustly
      stress-tested. The Saab strategic stake constitutes a credible M&A exit vector. The
      recommendation summary table TV001 codifies the recommendation, confidence, risk rating,
      recommended hold-period, and thesis-break criteria. The recommendation logic figure FV001 traces
      the primary evidence vectors leading to the research-more stance.
    claimRefs:
      - CV001
      - CV002
      - CV003
      - CV004
      - CV005
      - CV006
      - CV007
      - CV008
      - CV009
    tableRefs:
      - TV001
    figureRefs:
      - FV001

  - id: section-2
    title: Thesis and anti-thesis analysis
    body: >-
      The bull thesis rests on five structural pillars. First, European defence spending is re-rating
      upward post-2022: Germany's confirmed €71.9B 2025 defence budget and €100B Sondervermögen
      represent a once-in-generation procurement uplift, reinforced by EU rules requiring member
      states to increase defence expenditure and the European Parliament's new defence spending
      framework. Second, Helsing has secured MOD-level contracts across Eurofighter/Typhoon and the
      Future Combat Air System (FCAS) in Germany and the UK, demonstrating government-buyer traction
      at the platform integration level. Third, Helsing's AI-first software architecture, run-anywhere
      edge-AI design, and technical team drawn from DeepMind and Oxford create a durable moat relative
      to legacy defence contractors. Fourth, the EU defence AI sovereignty narrative—reinforced by the
      EU AI Act's defence exemptions and the EU Defence Fund—creates a structural policy tailwind
      exclusive to European-headquartered suppliers. Fifth, Prima Materia and General Catalyst provide
      a credible next-round franchise and strategic signalling. The anti-thesis is anchored by five
      countervailing forces: Vice Media's adverse investor-opposition reporting reflecting ESG
      reputational risk; Bloomberg's April 2025 unmitigated allegations of glitchy software and
      overpriced drones in Ukraine; the complete absence of any revenue or margin disclosure
      undermining independent thesis validation; the competitive threat from Anduril's European
      expansion as a better-capitalised direct rival; and the LAWS regulatory prohibition risk from
      the UN CCW process and ICRC advocacy. The thesis / anti-thesis table TV002 codifies the full
      argument pair across all five dimensions.
    claimRefs:
      - CV010
      - CV011
      - CV012
      - CV013
      - CV014
      - CV015
      - CV016
      - CV017
      - CV018
      - CV019
    tableRefs:
      - TV002

  - id: section-3
    title: Bull, base, and bear scenario analysis
    body: >-
      Three scenarios bracket the investment outcome. Bull case (weighted approximately 25%): the
      Ukraine war continues through 2026-2027; Germany's Sondervermögen generates a €500-800M
      Helsing contract backlog; revenue reaches €300-400M; LAWS regulatory risk remains contained
      within existing governance frameworks; Helsing's Series E prices at €20-25B post-money. The
      bull catalyst is completion of FCAS AI integration alongside at least one NATO-wide
      standardisation of Helsing software creating a network-effect revenue multiplier. Base case
      (weighted approximately 50%): a Ukraine-Russia ceasefire is signed in 2026; European defence
      spending stabilises at approximately 2% of GDP across NATO members; Helsing wins two to three
      additional NATO-member MOD contracts; revenue reaches €100-200M; the €12B Series D valuation
      holds and Series E prices at €14-18B post-money within 18-24 months. The base case signal is
      that the €12B Series D already implies the market is pricing this scenario, and the 7x uplift
      from Series C in 12 months is aggressive but within the upper band of defence AI multiples
      given the Ukraine demand environment. Bear case (weighted approximately 25%): Ukraine demand
      collapses by 40-60% following ceasefire; Bloomberg April 2025 allegations are validated by an
      independent Bundeswehr or Ukrainian MoD review, removing the reference-customer credibility
      pillar; or the UN CCW adopts a binding LAWS protocol in 2025-2026, eliminating Helsing's core
      kill-chain product differentiation. Any of these triggers individually, or in combination,
      would push the next-round implied valuation to €3-6B and mandate a full thesis review. The
      bull / base / bear scenario table TV003 captures assumptions, valuation ranges, and downside
      triggers. The valuation sensitivity figure FV002 and valuation / return range figure FV003
      illustrate the numerical ranges.
    claimRefs:
      - CV020
