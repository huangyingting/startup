    - id: QV029
      type: verification
      question: Is Helsing's dual software-hardware model more or less valuable than pure-software defence AI peers?
      status: answered
      answer: >-
        Less valuable in pure multiple terms but potentially more valuable in TAM and strategic moat.
        Hardware-software hybrids like Anduril trade at lower revenue multiples than pure-software
        companies (Palantir ~24x). However, the hardware integration creates switching costs and
        sole-source contract barriers that pure-software companies cannot replicate. Helsing's model
        is strategically stronger but multiple-compressed vs. Palantir.
      targets:
