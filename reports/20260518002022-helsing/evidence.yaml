evidenceGaps:
  - type: private-evidence-only
    severity: blocking
    topic: Revenue, gross margin, cash position, and burn rate not publicly disclosed
    missingEvidence: >-
      Helsing has disclosed no financial metrics as a private company. No audited P&L, cash flow statement, or
      management accounts are publicly available.
    whyItMatters: >-
      Financial underwriting requires confirmed revenue quality, margin structure, and runway. A €12B valuation cannot
      be tested against fundamentals without financial disclosure.
    diligencePath: >-
      Request audited consolidated financial statements for 2022–2025, including P&L, balance sheet, and cash flow
      statement under NDA.
    relatedQuestionRefs:
      - QO017
  - type: private-evidence-only
    severity: material
    topic: Full capitalization table post-Jun 2025 round not disclosed
    missingEvidence: >-
      Stake sizes following the June 2025 €600M round have not been reported. Prima Materia stake post-dilution and full
      preference share structure unknown.
    whyItMatters: >-
      Cap table structure determines governance rights, liquidity preferences, and effective founder control. Pre-money
      vs post-money mismatch affects secondary market pricing.
    diligencePath: >-
      Request current capitalization table showing all shareholders, preference share classes, anti-dilution provisions,
      and drag/tag rights under NDA.
    relatedQuestionRefs:
      - QO006
      - QO026
