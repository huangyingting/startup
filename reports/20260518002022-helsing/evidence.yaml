    severity: material
    topic: Bloomberg April 2025 adverse report — primary source not accessible
    missingEvidence: >-
      The April 2025 Bloomberg report alleging overpriced drones and software quality issues is not directly accessible
      in the research cache. Only secondary references to it are available.
    whyItMatters: >-
      The specific allegations and the identity/credibility of former employees cited matters for assessing the severity
      of product quality and cost concerns.
    diligencePath: >-
      Obtain full Bloomberg article via paid subscription or media access; seek Helsing's response and any independent
      verification of the cost and quality claims.
    relatedQuestionRefs:
      - QO012
      - QO024
