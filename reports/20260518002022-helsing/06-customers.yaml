callouts:
- id: CU-CALL-01
  type: risk
  title: Germany / Ukraine Concentration — Primary Revenue Risk
  body: >-
    Germany (as direct contracting party and financing sponsor) and Ukraine (as primary end
    user) account for the near-entirety of Helsing's confirmed deployed revenue. Any
    deterioration in the German political commitment to Ukraine defence financing, a ceasefire
    significantly reducing drone consumption, or a German budget crisis affecting the Bundeswehr
    modernisation programme would create a material revenue concentration shock. FCAS and Airbus
    Wingman provide long-horizon diversification paths but are not de-risking this concentration
    within a two-to-three year investment horizon.
  severity: major
  sourceRefs:
  - SU004
  - SU007
  - SU009
  claimRefs:
  - CU028
  - CU030
  - CU034
