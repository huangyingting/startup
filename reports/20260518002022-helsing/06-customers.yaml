chapter:
  number: 6
  letter: U
  title: Customers
  summary: >-
    Helsing's customer base is concentrated in NATO-aligned government defence ministries and
    European defence prime contractors as of mid-2026. The German Bundeswehr holds two
    production-grade programme engagements — Eurofighter Typhoon EK AI electronic warfare
    (sole-source contract, June 2024) and the FCAS AI backbone (September 2024) — while the
    Ukrainian Armed Forces represent the highest-volume deployment with approximately 4,000 HF-1
    loitering munitions in active combat use and 4,000-plus HX-2 swarm drones on order. Airbus
    holds an exclusive AI development agreement for the Wingman UCAV programme; Saab AB is both
    a Series C investor and Gripen pilot customer via Project Beyond. Customer concentration is
    high — Germany and Ukraine together account for the near-entirety of confirmed deployed
    revenue and programme commitments. No NRR or GRR data is publicly available; multi-programme
    expansion within Germany provides an indirect retention signal. Civil society opposition,
    UN CCW negotiations on autonomous weapons, and a single-prime UCAV dependency (Airbus) are
    the primary tail risks to customer durability.

