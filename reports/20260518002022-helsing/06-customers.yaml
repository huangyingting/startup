sections:
- id: S1
  title: Customer Base Segmentation
  body: >-
    Helsing's customer base is, as of mid-2026, concentrated in NATO-aligned government
    defence ministries and European defence prime contractors. The primary paying customer is
    the German Bundeswehr, which awarded a sole-source production contract for Helsing's
    AI-powered electronic warfare software on the Eurofighter Typhoon EK variant in June 2024,
    followed by the FCAS AI backbone engagement in September 2024. The Ukrainian Armed Forces
    represent Helsing's largest deployment volume: approximately 4,000 HF-1 loitering munitions
    have been delivered and are in active use, with a 4,000-plus-unit HX-2 swarm drone order
    signed in late 2024. The buyer-user-payer structure differs by platform: on the Ukrainian
    programmes, the German government (BMVg) co-finances procurement as the paying party, while
    Ukrainian armed-forces units are the direct operational users. Airbus Defence and Space holds
    an exclusive partnership for the Wingman unmanned combat air vehicle, functioning
    simultaneously as industrial partner, revenue source, and route-to-market for NATO-airspace
    drone programmes. Saab AB participates as investor and pilot customer, evaluating Helsing's
    Centaur AI for the Gripen JAS-39 under Project Beyond. Collectively, the portfolio spans
    two European militaries (Bundeswehr, Ukrainian AF) and two defence primes (Airbus, Saab),
    with FCAS providing a third state-level programme customer via the Franco-German-Spanish
    consortium. No commercial or civil customers have been publicly confirmed.
  claimRefs:
  - CU001
  - CU002
  - CU003
  - CU004
  - CU005
  - CU020
  tableRefs:
  - TU001
  figureRefs:
  - FU001

- id: S2
  title: Adoption Trajectory and Scale
  body: >-
    Helsing's adoption trajectory is characterised by volume and operational speed rather than
    conventional SaaS growth metrics. Ukraine stands out as the most operationally significant
    adoption signal: from an initial contract for HF-1 loitering munitions in 2023, the
    programme has scaled to approximately 4,000 units deployed to the Ukrainian Armed Forces
    by early 2025, supported by a German government DM 200 million financing commitment. The
    Ukrainian Ministry of Defence signed a large-scale HX-2 swarm drone order in September 2024,
    initially reported at 4,000-plus units, with Helsing's Resilience Factory distributed
    manufacturing targeting 6,000-plus units per month. The Typhoon EK AI system moved from
    contract award in June 2024 directly into programme integration; the delivery timeline for
    frontline aircraft has not been publicly confirmed. FCAS, contracted in September 2024,
    represents a decade-plus horizon engagement. The Airbus Wingman partnership, announced June
    2024, remains in development phase with no in-service date. While headline volume numbers
    are impressive, key denominators — total contracted units, revenue per unit, and delivery
    velocity — are not publicly disclosed, making it difficult to assess conversion from
    commitment to delivered revenue. The absence of reported cancellations, delays, or
    performance disputes is a positive, if baseline, signal.
  claimRefs:
  - CU006
  - CU007
  - CU008
  - CU009
  - CU010
  - CU011
  - CU012
  tableRefs:
  - TU002
  figureRefs:
  - FU002

- id: S3
  title: Named Customer Proof
  body: >-
    Helsing's most credible named-customer evidence comes from three relationships with
    production or near-production contracts. The German Bundeswehr Typhoon EK contract is the
    most thoroughly documented: a sole-source award by the German procurement office for
    AI-powered electronic warfare functionality, confirmed in multiple reputable outlets
    including Popular Mechanics and FlightGlobal, with political confirmation from the German
    government. The Ukrainian Armed Forces relationship is the highest-volume proof point:
    approximately 4,000 HF-1 units deployed in an active conflict theatre represent the largest
    known autonomous AI munitions deployment by any European AI company. However, independent
    assessment of field performance, target discrimination accuracy, or failure rates is not
    available; Helsing has not published trial results or after-action reviews. The Airbus
    Wingman programme is well documented as an exclusive arrangement for Airbus's next-generation
    unmanned combat aircraft, but it remains in development phase with no in-service aircraft or
    independently confirmed operational outcomes. Saab's Project Beyond AI trial is the
    least-evidenced named engagement: reported as a proof-of-concept evaluation with no public
    production commitment, contract value, or timeline disclosed. Two gaps are material: no
    government procurement database records are accessible in the classified defence context,
    and no G2, Gartner Peer Insights, or similar independent review channel exists for
    defence AI software of Helsing's type.
  claimRefs:
  - CU013
  - CU014
  - CU015
  - CU016
  - CU017
  - CU018
  - CU019
  tableRefs:
  - TU003
  figureRefs:
  - FU003

- id: S4
  title: Retention and Durability
  body: >-
    No retention metrics — net revenue retention, gross revenue retention, churn rate, or
    contract renewal rate — have been publicly disclosed by Helsing for any product. This is
    not unusual for defence AI software companies operating in classified procurement
    environments: customer relationships are governed by multi-year framework contracts,
    sovereign procurement rules, and classification restrictions that preclude public NRR or
    GRR reporting. The structural durability signals are positive but indirect. The German
    Bundeswehr relationship encompasses two distinct programmes (Typhoon EK EW and FCAS AI
    backbone), suggesting multi-programme expansion rather than single-point exposure. Defence
    platform integration contracts typically span five to twenty years with very high political
    switching costs, as replacing an AI system on a frontline fighter requires regulatory
    re-certification, platform revalidation, and operator retraining. No publicly confirmed
    Helsing contract cancellation, customer churn event, or failed pilot has been identified in
    accessible reporting as of mid-2026. The artist boycott letter signed by over 1,000 musicians
    and addressed to Spotify CEO Daniel Ek represents a reputational risk but has not
    demonstrably affected procurement relationships or contract retention. A Bloomberg article
    from April 2025 referencing Helsing facing questions was inaccessible due to a paywall, and
    its substance — including any customer-related disclosures — could not be assessed.
  claimRefs:
  - CU021
  - CU022
  - CU023
  - CU024
  - CU026
  - CU027
  tableRefs:
  - TU004
  figureRefs:
  - FU004

- id: S5
  title: Expansion and Concentration Risk
  body: >-
    Helsing's customer concentration is high by any standard. Germany (as direct contracting
    party for Typhoon EK and FCAS, and as financing sponsor for Ukraine drone deliveries) and
    Ukraine (as direct end user of HF-1 and HX-2 fleets) together account for the near-entirety
    of confirmed deployed units and known programme commitments. This creates a dual dependency:
    on a geopolitical situation (the ongoing Russia-Ukraine conflict and continued German
    political will to fund it) and on a single ministry of defence. The FCAS programme, if
    delivered, would diversify Helsing into a French-German-Spanish consortium, but this is a
    decade-or-more horizon. The Airbus Wingman exclusive arrangement provides potential leverage
    on NATO-wide UCAV programmes but creates a single-prime bottleneck; if Airbus changes
    strategic direction or the Wingman programme is de-scoped, Helsing loses its primary Western
    European UCAV route-to-market. Positive signals for expansion include CEO-level public
    statements about extending to NATO eastern flank countries, and European defence spending
    reaching record levels in 2024 — 23 of 32 NATO allies meeting the 2% GDP target. However,
    no named customers from Poland, the Baltic states, France, the UK, or other NATO allies have
    been publicly confirmed with production contracts as of mid-2026. Civil society opposition
    to autonomous lethal weapons — led by StopKillerRobots and echoed at the UN CCW level —
    represents a long-cycle regulatory tail risk that may restrict the addressable market or
    force product modifications over a ten-to-twenty-year horizon.
  claimRefs:
  - CU028
  - CU029
  - CU030
  - CU031
  - CU032
  - CU033
  - CU034
  - CU035
  tableRefs:
  - TU005
  figureRefs: []

