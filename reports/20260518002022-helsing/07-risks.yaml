company:
  name: Helsing

chapter:
  number: 7
  title: Risks
  summary: >-
    Helsing's 2026 risk surface is dominated by four clusters: regulatory and legal exposure from the
    international campaign against lethal autonomous weapons systems (LAWS) and IHL compliance obligations;
    technology and product execution risk anchored by Bloomberg's April 2025 adverse allegations of
    overpriced drones and glitchy software alongside the unproven pivot from AI software to drone hardware
    manufacturing; geopolitical and market risk from Ukraine war de-escalation and volatile European defense
    spending commitments; and competitive and operational risk from better-resourced US rivals including
    Anduril at a $28B valuation and customer concentration in Germany and Ukraine. The LAWS regulatory
    trajectory is the highest-severity long-horizon risk; Bloomberg allegations and software reliability
    in contested electromagnetic environments are the most acute near-term product risks; and the Ukraine
    demand concentration is the single most plausible revenue-step-down trigger for 2026.

sections:
  - id: section-1
    title: Regulatory and legal risk register
    body: >-
      Helsing operates at the intersection of three converging regulatory and legal risk vectors. First,
      the international campaign against lethal autonomous weapons systems (LAWS) is materially advancing:
      the ICRC has since 2015 called for legally binding rules on autonomous weapon systems, recommending
      prohibitions on weapons whose effects cannot be sufficiently predicted, and explicitly opposing
      autonomous targeting of persons. The Stop Killer Robots coalition—active in over 70 countries—is
      actively lobbying at the United Nations Convention on Certain Conventional Weapons (CCW), and the
      UN General Assembly held disarmament committee sessions in 2024 focused on LAWS governance. A
      binding LAWS treaty would directly threaten Helsing's HX-2 and HF-1 product lines. Second, IHL
      compliance is an ongoing operational constraint: Helsing's AI systems must respect the principles of
      distinction, proportionality and precaution under the Geneva Conventions as operationalized in the
      battlefield. In contested electronic warfare environments—including GPS spoofing and communications
      jamming—AI systems risk misclassifying targets or making disproportionate strike decisions, creating
      potential IHL violation exposure. Third, EU and NATO dual-use export control rules constrain where
      and how Helsing can sell its products; any expansion to non-NATO markets requires export licenses.
      NATO's Principles of Responsible Use of AI in Defence (2021) create a governance framework that
      Helsing must align with. The regulatory and legal risk register table TR001 enumerates the six
      top-severity risk items with probability, impact, mitigation maturity, and residual exposure. The
      risk heatmap figure FR001 scores probability, impact, and velocity across all five risk dimensions.
    claimRefs:
      - CR001
      - CR002
      - CR003
      - CR004
      - CR005
      - CR006
      - CR007
      - CR008
      - CR009
    tableRefs:
      - TR001
    figureRefs:
      - FR001

  - id: section-2
    title: Technology and product risk register
    body: >-
      Helsing faces a cluster of technology and product execution risks that have been partially surfaced
      in adversarial press. Bloomberg's April 2025 report alleged that Helsing had sold overpriced drones
      and that its software suffered from reliability problems in the field; former employees and investors
      were cited as sources of the glitchy software complaints. While Helsing has not confirmed these
      allegations and the Bloomberg story is behind a paywall, the claims are materially adverse: if
      corroborated, they would undermine the core "AI-in-the-loop" reliability pitch that justifies
      Helsing's premium valuation. A second technology risk is AI system performance in contested
      electromagnetic warfare (EW) environments. GPS spoofing, RF jamming, and adversarial sensor
      manipulation degrade the performance of AI inference pipelines that rely on clean sensor inputs.
      Helsing's Centaur AI pilot, Altra sensor fusion, and EW AI for Eurofighter Typhoon EK all operate
      in high-EW-contest environments where adversarial robustness is unproven at scale. The pivot from
      pure AI software toward drone hardware manufacturing—HX-2 kamikaze drones at 1,000+ per month
      capacity, HF-1 loitering munitions—increases execution complexity, capital intensity, and manufacturing
      execution risk, especially as the Resilience Factories programme is still in scale-up phase.
      The Rheinmetall manufacturing partnership that reportedly fell through in 2024 underlines that
      industrial partnerships for drone production are fragile. The operational risk register table TR002
      and risk transmission map figure FR002 show how software and manufacturing failures cascade through
      revenue, regulatory, and reputational dimensions.
    claimRefs:
      - CR010
      - CR011
      - CR012
      - CR013
      - CR014
      - CR015
      - CR016
      - CR017
      - CR018
      - CR019
    tableRefs:
      - TR002
    figureRefs:
      - FR002

  - id: section-3
    title: Partner and dependency risk register
    body: >-
      Helsing's revenue and strategic positioning are concentrated in a small set of state and partner
      relationships, each of which carries meaningful concentration and counterparty risk. Germany (via
      Bundeswehr procurement and Eurofighter EK AI contract) and Ukraine (via HX-2 and HF-1 deployment)
      together represent the majority of Helsing's disclosed revenue-generating relationships. A Ukraine
      war ceasefire or de-escalation would materially reduce the urgency of drone procurement from Kyiv.
      In February 2025, Trump administration policy shifts introduced tensions in US-Ukraine relations
      that rippled through European defense supply chains. Saab's strategic 5% stake and Airbus's
      wingman programme partnership create technology and program dependencies; the Rheinmetall
      manufacturing collaboration that failed in 2024 serves as evidence that such partnerships carry
      execution risk. Prima Materia (~17%) and General Catalyst (~12%) together hold ~29% of Helsing's
      equity, creating investor-concentration risk: a sentiment shift among these lead investors could
      complicate future fundraising. NATO's 2% GDP commitment adherence is politically contingent and
      can reverse with government changes in key alliance members. The partner and dependency risk
      register table TR003 enumerates the top five dependency risks. The dependency map figure FR003
      visualizes Helsing's key external dependencies and failure scenarios.
    claimRefs:
      - CR020
      - CR021
      - CR022
      - CR023
      - CR024
      - CR025
      - CR026
      - CR027
      - CR028
    tableRefs:
      - TR003
    figureRefs:
      - FR003

  - id: section-4
    title: People, execution, and reputational risk register
    body: >-
      Helsing carries meaningful key-person risk. Co-CEOs Torsten Reil and Gundbert Scherf, together
      with President Niklas Köhler, are the engineering and strategic leadership core; the departure of
      either co-CEO or the CPO would be a material adverse event given the company's pre-commercial
      stage and the importance of government relationship management in defense. Chairman Daniel Ek's
      dual visibility as Spotify's founder creates reputational overhang: Vice's reporting of artist
      boycotts against Ek specifically because of his Helsing involvement illustrates how the lethal
      AI controversy is directly affecting Helsing's ability to fundraise from ESG-sensitive LPs and
      recruit top machine learning talent who have public concerns about AI weaponization. Manufacturing
      execution risk at the Resilience Factories programme—scaling from prototype to 1,000+ HX-2 units
      per month—requires experienced production management that is harder to hire given the reputational
      complexity. The people and execution risk register table TR004 enumerates key-person, talent, and
      execution risks. Adverse-stance signals from the Vice and musician boycott corpus confirm that
      reputational risk is already active, not hypothetical.
    claimRefs:
      - CR029
      - CR030
      - CR031
      - CR032
      - CR033
      - CR034
    tableRefs:
      - TR004

  - id: section-5
    title: Competitive landscape, mitigations, and kill criteria
    body: >-
      Helsing faces well-capitalized US competitors. Anduril Industries raised a $1.5B Series F in
      January 2025 at approximately $28B valuation, is led by an experienced defense technology team
      with deep Pentagon relationships, and fields overlapping products including Lattice AI fusion
      software, autonomous drones, and autonomous underwater vehicles. Shield AI ($2.7B, autonomous
      fighter AI) also occupies part of Helsing's addressable space. Palantir, with a $70–100B public
      market cap and deep US/NATO government relationships, dominates defense AI analytics. Helsing's
      European-first framing is a genuine differentiator—EU sovereignty concerns create structural demand
      for non-US defense AI—but competitive risk from US entrants with better capitalization is real.
      Key mitigations include the Saab strategic stake (de-risking Gripen integration), the Airbus
      wingman exclusivity, Germany's €100B Bundeswehr Sondervermögen creating near-term funded demand,
      and Helsing's dual-use software-hardware stack that creates switching costs. Kill criteria for the
      Helsing investment thesis include: (i) a binding LAWS treaty that prohibits Helsing's HX-2 and
      HF-1 product classes; (ii) a Bloomberg-level adverse investigation that is corroborated and leads
      to contract suspension or key-investor withdrawal; (iii) an Anduril European market entry that
      breaks Helsing's NATO-client exclusivity; and (iv) a Ukraine ceasefire combined with German
      Sondervermögen reallocation. Mitigations and kill criteria table TR005 enumerates these.
    claimRefs:
      - CR035
      - CR036
      - CR037
      - CR038
      - CR039
      - CR040
      - CR041
    tableRefs:
      - TR005

