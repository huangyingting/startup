companyProfile:
  summary: Helsing SE is a Munich-based European defense AI company founded in March 2021 by Torsten Reil, Gundbert Scherf, and Niklas Köhler. It builds autonomous drone systems (HF-1, HX-2, SG-1 Fathom), AI software platforms (Altra, Centaur), and electronic warfare AI for NATO aircraft. After raising €600M at a €12B post-money valuation in June 2025, Helsing is Europe's most highly capitalised defense AI startup. Revenue and financial performance are not publicly disclosed.
  foundedDate: '2021-03-01'
  founders:
    - name: Torsten Reil
      role: Co-CEO
      background: Oxford computational biology PhD; co-founded NaturalMotion (sold to Zynga for ~$527M in 2012); AI and ML research background bridging academic credibility with tech entrepreneurship.
      claimRefs: [CO004]
    - name: Gundbert Scherf
      role: Co-CEO
      background: Former senior adviser at the German Federal Ministry of Defence; ex-McKinsey partner; direct institutional access to Bundeswehr procurement and NATO policy networks.
      claimRefs: [CO005]
    - name: Niklas Köhler
      role: President & CPO
      background: Machine learning engineer and lead product architect for Helsing's AI systems portfolio; responsible for core ML engineering architecture.
      claimRefs: [CO006]
  foundingLocation: Munich, Germany
  headquarters: Munich, Germany
  productSummary: Helsing produces a dual-layer product portfolio of AI software (Altra ISR platform, Centaur combat AI, electronic warfare AI for Eurofighter/Gripen) and autonomous hardware (HF-1 attack drone, HX-2 tactical drone, SG-1 Fathom maritime AI sonar) deployed across NATO member states.
  customerFocus: European NATO-member militaries, including the German Bundeswehr, UK MoD, French DGA, Ukrainian armed forces, and NATO Allied Command; Saab and Leonardo as strategic defense prime partners.
  businessModel: Government defense contracts (per-seat software licensing, per-unit hardware revenues, and maintenance/support); long-cycle procurement with high switching costs and sovereign customer concentration.
  stage: late-stage private
  fundingStatus: Privately funded; last public financing was a €600M Series D led by Prima Materia and General Catalyst in June 2025 at a €12B post-money valuation; total raised approximately €1.37B across four rounds since 2021.
  claimRefs: [CO001, CO002, CO003, CO004, CO005, CO006, CV001, CV002, CO029]
