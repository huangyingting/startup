    reason: >-
      Helsing is a private European defense company with few public primary sources.
      Several core sources (Politico, Bloomberg, CNBC, Guardian) are paywall or broken at
      cache time; NATO and Palantir official pages plus three OK-accessible press sources
      (TechCrunch, Vice, PopMech, Dealroom) provide sufficient corroborating coverage.
      The restricted share is expected to decline once the report-level aggregate is computed
      across chapters with more open-access market and regulatory sources.

chapter:
  number: 1
  title: Company Overview
  summary: >-
    Helsing SE is a Munich-based European defense AI company founded in March 2021 by Torsten
    Reil, Gundbert Scherf, and Niklas Köhler, with Daniel Ek (Spotify founder) as chairman and
    anchor investor. The company has grown from a pure-AI-software play to a full-stack defense
    technology firm producing autonomous drone systems (HF-1, HX-2, SG-1 Fathom), AI software
    platforms (Altra, Centaur), and electronic warfare AI for aircraft. Helsing has raised
    approximately €1.37B across four rounds through June 2025, reaching a €12B post-money
    valuation—Europe's most highly valued defense AI startup. With ~900 employees, active
    deployment in Ukraine, and flagship contracts with the German Bundeswehr and Airbus, Helsing
    has established itself as the leading European sovereign alternative to US defense AI firms
    such as Anduril and Palantir.

sections:
  - id: SO-identity
    title: Identity, Mission, and Legal Structure
    body: >
      Helsing SE is a European defense artificial intelligence company headquartered in Munich,
      Germany. The legal entity is incorporated as a Societas Europaea (SE), a supranational
      European corporate form that underscores the company's pan-European identity and its
      strategic positioning as a sovereign, non-US alternative in the defense AI space. Helsing
      operates subsidiaries in Estonia, France, and the United Kingdom, reflecting its engagement
      across NATO's eastern flank and key European defense markets. The company's stated mission
      is to develop AI systems that help democratic nations maintain a decisive technological
      advantage in modern warfare, with a particular focus on reducing the cognitive load on
      soldiers and pilots in high-tempo, contested environments.


      Helsing's product portfolio spans three distinct categories: (1) autonomous drone systems
      including the HF-1 loitering munition, the HX-2 swarm-capable strike drone, and the
      SG-1 Fathom autonomous underwater vehicle; (2) AI software platforms including Altra
      (sensor fusion and drone connectivity) and Centaur (AI co-pilot agent for fighter jets);
      and (3) electronic warfare AI embedded in the Eurofighter Typhoon EK. The company pivoted
      from pure AI software to integrated drone manufacturing in 2024, opening the Resilience
      Factory in southern Germany with initial production capacity exceeding 1,000 HX-2 drones
      per month. This pivot from software to systems represents a strategic shift from licensing
      AI to government primes toward becoming a vertically integrated defense technology prime
      in its own right.


      Helsing has approximately 900 employees as of early 2025, a rapid scale from its founding
      three-person team. The company's workforce spans Munich (HQ), London, Paris, Tallinn, and
      field offices supporting Ukraine operations. Revenue is not publicly disclosed; as a
      private company Helsing has no statutory obligation to file consolidated accounts or
      disclose financial performance. What is known is that contract revenues flow from German
      government procurement (Bundeswehr), direct sales to Ukraine, and partnership agreements
      with Airbus and Saab. Helsing's business model combines (a) government defense contracts
      for deployed AI systems, (b) per-unit hardware revenues from drone manufacturing, and
      (c) AI licensing and services under strategic partnership agreements.
    claimRefs: [CO001, CO002, CO003, CO028]
    tableRefs: [TO001]
    figureRefs: [FO002]

  - id: SO-founders
    title: Founders, Leadership, and Governance
    body: >
      Helsing was co-founded in March 2021 by three principals whose complementary backgrounds
      were deliberately assembled to bridge the AI research and European defense establishment
      divide. Torsten Reil (co-CEO) holds a doctorate in computational biology from the
      University of Oxford and previously co-founded NaturalMotion, a motion-synthesis AI
      company sold to Zynga for $527 million in 2012. Reil's academic and entrepreneurial
      credentials establish Helsing's technical credibility with both the AI research community
      and institutional investors. Gundbert Scherf (co-CEO) served in senior advisory roles at
      the German Federal Ministry of Defence and as a McKinsey partner, giving Helsing direct
      institutional access to European defense procurement, policy networks, and NATO interoperability
      requirements. Niklas Köhler (President and Chief Product Officer) is the machine learning
      engineering lead, responsible for the core AI architecture powering Helsing's suite of
      products. The three-way co-CEO and CPO structure is unusual and warrants governance scrutiny
      in due diligence: shared leadership at scale has historically created alignment friction,
      though in Helsing's case the functional split—Reil owns external credibility, Scherf owns
      government relationships, Köhler owns product—appears coherent.


      Daniel Ek, founder of Spotify and one of Europe's best-known technology entrepreneurs,
      chairs Helsing's board and committed the company's first €100 million through his family
      investment vehicle Prima Materia. Ek's chairmanship has provided Helsing with brand
      visibility disproportionate to its size and has facilitated access to European institutional
      and corporate investor networks. However, his involvement has also attracted controversy:
      in 2021, numerous musicians including Paul McCartney, Brian Eno, and Radiohead publicly
      criticized Spotify's CEO for funding a military AI company, generating adverse press
      coverage. Ek did not publicly respond to or retract his investment. As of mid-2025, Prima
      Materia is the lead investor in the June 2025 Series round and remains Helsing's largest
      individual shareholder with approximately 17% of equity.


      Key-person risk is notable across multiple dimensions. Reil's public profile is central
      to investor relationships and media narrative. Scherf's government access is a direct
      competitive moat that would be difficult to replicate in the event of his departure. Köhler
      owns the technical roadmap and organizational knowledge of the AI architecture. No public
      succession planning or governance documentation has been disclosed. The Board composition
      beyond Daniel Ek and investor representatives from General Catalyst is not publicly documented,
      and Helsing has not published any ESG, governance, or board transparency reports.
    claimRefs: [CO004, CO005, CO006, CO007, CO024]
    tableRefs: [TO002]

  - id: SO-funding
    title: Funding History and Capital Structure
    body: >
      Helsing has raised approximately €1.37 billion across four primary equity rounds between
      November 2021 and June 2025, representing one of the fastest capital accumulation trajectories
      in European defense technology history. The funding chronology establishes a consistent
      pattern of accelerating rounds driven by European defense spending urgency and Helsing's
      ability to win landmark government contracts between rounds.


      The Series A (November 2021): €100 million raised exclusively from Prima Materia, Daniel Ek's
      investment vehicle. Valuation at this stage was not formally disclosed but implied
      approximately €500 million post-money based on stake calculations in later rounds.
      The round emerged from stealth and immediately positioned Helsing as the European
      defense AI champion, triggering widespread media coverage across European technology
      press.


      The Series B (September 2023): €209 million raised at a pre-money valuation of €1.5 billion
      and post-money of approximately €1.7 billion. General Catalyst led the round with Saab AB
      participating as a strategic investor—Saab's participation was particularly significant as
      it established the first major European defense prime as both investor and customer, giving
      Helsing a direct pathway into the Saab Gripen program and Swedish defense procurement.
      At the time of announcement, TechCrunch reported this as breaking the record for the
      largest European AI investment.


      The Series C (July 2024): €450 million at a post-money valuation of €5 billion (approximately
      $487 million USD). General Catalyst again led the round, with Saab, Accel Partners, and
      Lightspeed Venture Partners as co-investors. Known stakeholder stakes following Series C:
      Prima Materia ~17%, General Catalyst ~12%, Saab ~5%. The round was used to fund the
      Resilience Factory manufacturing scale-up, expansion of the Ukraine drone program, and
      hiring to approximately 900 employees.


      The June 2025 round: €600 million led by Prima Materia at a post-money valuation of €12
      billion—more than double the Series C valuation in under a year. This dramatic re-rating
      reflects the acceleration in European defense spending commitments post-Ukraine (Germany
      committed to 3%+ GDP on defense), Helsing's demonstrated combat deployment of HX-2 drones
      in Ukraine, and the broader surge in investor appetite for European sovereign defense
      technology. Total capital raised reaches approximately €1.37 billion across all rounds.


      Helsing has not publicly disclosed any secondary transaction activity, debt facilities, or
      project finance arrangements. With private company status, audited financial statements
      are not available. Revenue quality, gross margin, and cash burn are all undisclosed—standard
      for a company at this stage that has not yet filed an S-1 or equivalent.
    claimRefs: [CO008, CO009, CO010, CO011, CO030, CO031, CO032, CO033]
    tableRefs: [TO003]
    figureRefs: [FO003]

  - id: SO-milestones
    title: Key Milestones and Strategic Evolution
    body: >
      Helsing's four-year trajectory from founding to €12 billion valuation is defined by three
      strategic phases: (1) stealth and launch (2021), where the company emerged from stealth
      with a pre-assembled team and immediate institutional credibility; (2) government contract
      validation (2022–2024), where Helsing converted its AI software capabilities into landmark
      contracts with the German Bundeswehr, Ukraine MoD, and European defense primes; and
      (3) manufacturing scale-up (2024–present), where the company pivoted from AI software
      licensing to integrated drone production.


      Critical milestone events by category: Founding milestones include the March 2021 incorporation
      in Munich and the November 2021 €100M Series A, establishing Helsing as Europe's best-funded
      defense AI startup from day one. Product milestones include the 2023 development of HF-1
      (the loitering munition eventually deployed in Ukraine), the 2024 rollout of HX-2 with
      swarm-capable AI, the Resilience Factory opening in southern Germany (February 2025, 1,000+/
      month capacity), and the Centaur AI agent combat trial in a Saab JAS 39 Gripen in May–June
      2025. Partnership milestones include the Saab strategic investment (September 2023), the
      Airbus exclusive Wingman partnership (June 2024), and the Mistral AI strategic collaboration
      (February 2025). Government contract milestones include the FCAS AI backbone contract
      (September 2023), the Eurofighter Typhoon EK electronic warfare AI contract (June 2024),
      Germany underwriting 4,000 HF-1 drones for Ukraine (February 2025), and 4,000+ HX-2 orders
      from Ukraine (September 2024).


      Adverse events are material: In 2021, a boycott campaign by musicians against Daniel Ek's
      involvement in Helsing generated significant negative media coverage and linked Helsing
      to broader debates about AI in warfare that continue today. The Rheinmetall partnership
      reportedly fell through in 2024, replaced by competitor Auterion—a signal that not all
      planned industrial partnerships materialize. In April 2025, Bloomberg published an adverse
      report citing former employees alleging overpriced drones, software quality concerns,
      and organizational growing pains. The company did not publicly respond to these allegations
      at the time of this report. The pivot to drone hardware manufacturing has prompted questions
      from analysts about whether Helsing is stretching its mission beyond its AI software
      core competency, with the manufacturing complexity potentially diluting engineering focus.
    claimRefs: [CO012, CO013, CO014, CO015, CO016, CO017, CO018, CO019, CO020, CO021, CO022, CO023, CO025, CO026, CO027]
    tableRefs: [TO004]
    figureRefs: [FO001]

