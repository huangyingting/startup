  researchQuestions:
    - id: QO001
      question: "When was Helsing founded and who are the co-founders with their professional backgrounds?"
      type: verification
      targets: ["contentRequirements/0", "contentRequirements/1"]
      status: answered
      answerSummary: "Founded March 2021 in Munich by Torsten Reil (Oxford PhD, NaturalMotion), Gundbert Scherf (ex-German MoD, McKinsey), and Niklas Köhler (ML engineer)."
    - id: QO002
      question: "What is Helsing's legal entity structure and why was SE chosen?"
      type: mechanism
      targets: ["contentRequirements/0"]
      status: answered
      answerSummary: "Incorporated as Helsing SE (Societas Europaea) to establish pan-European identity and operate within EU sovereign defense procurement frameworks."
    - id: QO003
      question: "What products does Helsing currently offer and how do they differ from each other?"
      type: enumeration
      targets: ["contentRequirements/0", "plannedTables/snapshot-kpi-table"]
      status: answered
      answerSummary: "Five core products: HF-1 (loitering munition), HX-2 (swarm strike drone), SG-1 Fathom (autonomous UUV), Altra (software platform), Centaur (AI co-pilot for fighters), plus Eurofighter EK EW AI."
    - id: QO004
      question: "What is Helsing's complete funding history including round sizes, valuations, and lead investors?"
      type: quantification
      targets: ["contentRequirements/2", "plannedTables/stakeholder-or-investor-map"]
      status: answered
      answerSummary: "Four rounds: €100M Series A (Prima Materia, 2021), €209M Series B (GC lead, 2023, €1.5B pre-money), €450M Series C (GC lead, Jul 2024, €5B), €600M (Prima Materia lead, Jun 2025, €12B). Total ~€1.37B."
    - id: QO005
      question: "What is Helsing's current post-money valuation and how has it changed over time?"
      type: quantification
      targets: ["contentRequirements/2", "contentRequirements/3"]
      status: answered
      answerSummary: "€12B post-money as of Jun 2025 round; was €5B post-Series C (Jul 2024); was €1.7B post-Series B (Sep 2023); valuation trajectory: 2021 ~€500M → 2023 €1.7B → 2024 €5B → 2025 €12B."
    - id: QO006
      question: "Who are all known investors and what are their approximate equity stakes?"
      type: enumeration
      targets: ["contentRequirements/2", "plannedTables/stakeholder-or-investor-map"]
      status: answered
      answerSummary: "Prima Materia ~17%, General Catalyst ~12%, Saab ~5% (post-Series C); Accel and Lightspeed participated in Series C but stakes undisclosed; Jun 2025 round dilution not yet reported."
    - id: QO007
      question: "What is the approximate headcount and how fast is Helsing growing its workforce?"
      type: quantification
      targets: ["contentRequirements/3"]
      status: partial
      answerSummary: "~900 employees as of early 2025 per TechCrunch; growth from near-zero in 2021. Official headcount not disclosed; LinkedIn-estimated figure only."
    - id: QO008
      question: "What government contracts has Helsing won and with which defense ministries?"
      type: enumeration
      targets: ["contentRequirements/4", "plannedTables/milestone-table"]
      status: answered
      answerSummary: "German Bundeswehr: Eurofighter EK EW AI (Jun 2024), FCAS AI backbone (Sep 2023), 4,000 HF-1 underwritten for Ukraine; Ukraine MoD: 4,000 HF-1 deployed, 4,000+ HX-2 ordered."
    - id: QO009
      question: "What is Torsten Reil's academic and entrepreneurial background and how does it fit defense AI?"
      type: verification
      targets: ["contentRequirements/1"]
      status: answered
      answerSummary: "Oxford computational biology PhD; co-founded NaturalMotion (motion AI, sold to Zynga ~$527M 2012); AI/ML background directly applicable to autonomous systems."
    - id: QO010
      question: "What is Gundbert Scherf's defense policy background and how does it create competitive advantage?"
      type: mechanism
      targets: ["contentRequirements/1"]
      status: answered
      answerSummary: "Ex-German Federal MoD and McKinsey; deep Bundeswehr procurement networks; directly responsible for securing Germany as anchor customer; moat is institutional access, not technical."
    - id: QO011
      question: "What key-person risks exist in Helsing's leadership structure?"
      type: adverse
      targets: ["contentRequirements/1", "plannedTables/leadership-and-founder-table"]
      status: answered
      answerSummary: "Three co-founders each own critical functions (tech, government BD, product); loss of any would materially impair capability. No public succession plans. Board composition not disclosed."
    - id: QO012
      question: "What adverse events or controversies has Helsing faced since founding?"
      type: adverse
      targets: ["contentRequirements/4"]
      status: answered
      answerSummary: "2021 musician boycott of Daniel Ek; April 2025 Bloomberg report alleging overpriced drones and software glitches; Rheinmetall partnership failed 2024; ongoing debate about hardware pivot diluting AI focus."
    - id: QO013
      question: "What is the nature and significance of the Airbus Wingman partnership?"
      type: verification
      targets: ["contentRequirements/4", "plannedTables/milestone-table"]
      status: answered
      answerSummary: "Exclusive AI partnership for Airbus's autonomous combat drone (Wingman) announced June 2024; Airbus chose Helsing over US alternatives; validates defense-prime customer model."
    - id: QO014
      question: "What is the nature of Saab's dual role as investor and strategic customer?"
      type: mechanism
      targets: ["contentRequirements/2", "plannedTables/stakeholder-or-investor-map"]
      status: answered
      answerSummary: "Saab invested in Series B and is also a customer for Gripen radar AI upgrade and Centaur AI pilot test; ~5% stake post-Series C; creates strategic alignment and potential conflict of interest."
    - id: QO015
      question: "What is the HX-2 drone and what is the Resilience Factory's production capacity?"
      type: quantification
      targets: ["contentRequirements/0", "contentRequirements/4"]
      status: answered
      answerSummary: "HX-2 is an AI-enabled swarm-capable strike drone; Resilience Factory produces 1,000+/month with scalability to tens of thousands; 6,000 in production as of Feb 2025."
    - id: QO016
      question: "What is the Centaur AI agent and what has it demonstrated in testing?"
      type: verification
      targets: ["contentRequirements/0", "plannedTables/milestone-table"]
      status: answered
      answerSummary: "Centaur is an AI co-pilot agent for fighter jets; tested in live Saab JAS 39 Gripen combat trial (Project Beyond) in May–June 2025; first AI co-pilot demonstration in an active combat aircraft."
    - id: QO017
      question: "Does Helsing have any public revenue disclosures or financial transparency?"
      type: adverse
      targets: ["contentRequirements/3"]
      status: answered
      answerSummary: "No. Helsing is a private company and has disclosed no revenue, gross margin, or cash burn metrics. Financial diligence requires NDA access to audited accounts."
    - id: QO018
      question: "What is the SG-1 Fathom and how does it fit Helsing's product strategy?"
      type: verification
      targets: ["contentRequirements/0"]
      status: answered
      answerSummary: "SG-1 Fathom is an autonomous underwater vehicle (AUV); 2m long, 60kg, 90-day submerged endurance; uses acoustic AI system 'Lura'; fits maritime domain alongside aerial products."
    - id: QO019
      question: "How does Helsing's valuation compare to US defense AI competitors like Anduril and Palantir?"
      type: comparison
      targets: ["contentRequirements/3"]
      status: answered
      answerSummary: "Anduril ~$28B (2025 Series F); Palantir public $50B+ market cap; Shield AI $2.7B. Helsing at €12B (~$13B) is mid-range but growing faster than any comparable company on a percentage basis."
    - id: QO020
      question: "What is the significance of Helsing's FCAS AI backbone contract?"
      type: verification
      targets: ["contentRequirements/4", "plannedTables/milestone-table"]
      status: answered
      answerSummary: "FCAS (Future Combat Air System) is the Franco-German-Spanish next-generation fighter program; Helsing winning the AI backbone contract in Sep 2023 positions it as the AI architect for Europe's most expensive defense program."
    - id: QO021
      question: "What happened with the Rheinmetall partnership and why did it fall through?"
      type: adverse
      targets: ["contentRequirements/4"]
      status: partial
      answerSummary: "Reported to have failed in 2024, replaced by competitor Auterion in the relevant program. Reasons not publicly disclosed by either party."
    - id: QO022
      question: "What is the Mistral AI partnership and what does it provide strategically?"
      type: verification
      targets: ["contentRequirements/4", "plannedTables/milestone-table"]
      status: answered
      answerSummary: "Strategic partnership announced February 2025; gives Helsing access to Mistral's open-weight LLMs for defense-specific AI applications; both companies share European sovereign AI positioning."
    - id: QO023
      question: "What are the key milestones Helsing has not yet achieved and what evidence gaps exist?"
      type: enumeration
      targets: ["contentRequirements/4"]
      status: answered
      answerSummary: "No publicly reported IPO plans, no confirmed US market entry, no published revenue milestones, no announced government customers outside Germany and Ukraine."
    - id: QO024
      question: "What was the Bloomberg adverse report in April 2025 and how did Helsing respond?"
      type: freshness
      targets: ["contentRequirements/4"]
      status: partial
      answerSummary: "Bloomberg reported allegations from former employees of overpriced drones and glitchy software. Helsing did not publicly respond at time of reporting. Independent verification of specific allegations not available."
    - id: QO025
      question: "What are the subsidiaries and international offices of Helsing and their roles?"
      type: enumeration
      targets: ["contentRequirements/0"]
      status: answered
      answerSummary: "Subsidiaries in Estonia (NATO eastern flank operations), France (FCAS partnership support, French defense market), UK (British defense market and talent). Munich is group HQ."
    - id: QO026
      question: "How does the Jun 2025 €600M round change Helsing's strategic position?"
      type: freshness
      targets: ["contentRequirements/2", "contentRequirements/3"]
      status: answered
      answerSummary: "€12B post-money makes Helsing Europe's most valued defense AI company. Prima Materia leading signals continued founder-aligned governance. Capital likely funds Resilience Factory scaling and international expansion."

