        title: Customer Base Segmentation
        blocks:
          - type: paragraph
            body: >-
              Helsing's customer base is, as of mid-2026, concentrated in NATO-aligned government defence ministries and
              European defence prime contractors. The primary paying customer is the German Bundeswehr, which awarded a
              sole-source production contract for Helsing's AI-powered electronic warfare software on the Eurofighter
              Typhoon EK variant in June 2024, followed by the FCAS AI backbone engagement in September 2024. The
              Ukrainian Armed Forces represent Helsing's largest deployment volume: approximately 4,000 HF-1 loitering
              munitions have been delivered and are in active use, with a 4,000-plus-unit HX-2 swarm drone order signed
              in late 2024. The buyer-user-payer structure differs by platform: on the Ukrainian programmes, the German
              government (BMVg) co-finances procurement as the paying party, while Ukrainian armed-forces units are the
              direct operational users. Airbus Defence and Space holds an exclusive partnership for the Wingman unmanned
              combat air vehicle, functioning simultaneously as industrial partner, revenue source, and route-to-market
              for NATO-airspace drone programmes. Saab AB participates as investor and pilot customer, evaluating
              Helsing's Centaur AI for the Gripen JAS-39 under Project Beyond. Collectively, the portfolio spans two
              European militaries (Bundeswehr, Ukrainian AF) and two defence primes (Airbus, Saab), with FCAS providing
              a third state-level programme customer via the Franco-German-Spanish consortium. No commercial or civil
              customers have been publicly confirmed.
