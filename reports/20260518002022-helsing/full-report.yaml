            body: >-
              Helsing faces a cluster of technology and product execution risks that have been partially surfaced in
              adversarial press. Bloomberg's April 2025 report alleged that Helsing had sold overpriced drones and that
              its software suffered from reliability problems in the field; former employees and investors were cited as
              sources of the glitchy software complaints. While Helsing has not confirmed these allegations and the
              Bloomberg story is behind a paywall, the claims are materially adverse: if corroborated, they would
              undermine the core "AI-in-the-loop" reliability pitch that justifies Helsing's premium valuation. A second
              technology risk is AI system performance in contested electromagnetic warfare (EW) environments. GPS
              spoofing, RF jamming, and adversarial sensor manipulation degrade the performance of AI inference
              pipelines that rely on clean sensor inputs. Helsing's Centaur AI pilot, Altra sensor fusion, and EW AI for
              Eurofighter Typhoon EK all operate in high-EW-contest environments where adversarial robustness is
              unproven at scale. The pivot from pure AI software toward drone hardware manufacturing—HX-2 kamikaze
              drones at 1,000+ per month capacity, HF-1 loitering munitions—increases execution complexity, capital
              intensity, and manufacturing execution risk, especially as the Resilience Factories programme is still in
              scale-up phase. The Rheinmetall manufacturing partnership that reportedly fell through in 2024 underlines
              that industrial partnerships for drone production are fragile. The operational risk register table TR002
              and risk transmission map figure FR002 show how software and manufacturing failures cascade through
