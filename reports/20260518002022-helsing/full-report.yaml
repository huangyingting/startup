      - number: '2.2'
        title: Market Sizing and TAM/SAM Analysis
        blocks:
          - type: paragraph
            body: >-
              Global defense AI market estimates vary significantly by scope and methodology. MarketsAndMarkets
              estimates the global military AI market at approximately $10.4B in 2024, projecting growth to $38.4B by
              2033 at a 13.8% CAGR. Statista's broader estimate places the 2023 global figure at $9.4B, projecting
              $38.9B by 2032 at an implied ~17% CAGR. These estimates diverge because they apply different scope
              definitions: some include all AI-adjacent defense technology (satellite imagery processing, logistics
              optimization), while others focus narrowly on AI inference at the tactical edge. Neither estimate provides
              a Europe-specific decomposition or isolates the AI software and autonomous-systems subcategory.

              A more reliable top-down anchor comes from SIPRI's 2025 military expenditure data: European NATO members
              collectively spent €383B ($415B) on defense in 2024, a real-terms 9.6% increase over 2023 and the largest
              single-year jump since the Cold War. Total NATO alliance spending reached $1.47T. Germany's 2024 defense
              budget was €72.8B, the second-largest NATO spender by absolute value. However, no authoritative
              decomposition of this total into an AI-specific allocation exists in public reporting—AI procurement is
              embedded within classified program line items.

              Using a conservative assumption that AI software and autonomous systems represent 1.5–2.5% of European
              NATO defense spending, the European defense AI SAM is approximately €5.7–9.6B ($6.2–10.4B)
              annually—broader than typical analyst estimates because it includes the full pipeline of classified
              programs. Helsing's near-term SOM is anchored by confirmed German Bundeswehr drone contracts, UK MoD AI
              engagements, and allied Ukraine drone procurement through government-to-government channels. A SOM of
              $200–650M annually represents a plausible near-term capture rate, though no revenue figure is publicly
              disclosed. Palantir's US government revenue of $828M in 2024 (full year, public filing) provides a
              comparable-vintage anchor for a scaled defense AI software player, though its market and product differ
              materially from Helsing's.

              Significant uncertainty remains: analyst TAM estimates are low-confidence because classified programs
              prevent independent sizing. Contradictory estimates (9.4B vs 10.4B baseline, 38B vs 39B by 2032) reflect
              different scope assumptions, not different data. The only reliable anchors are SIPRI's total spending data
              (high confidence, official national budgets) and Palantir's US government segment as an imperfect proxy. A
              bottoms-up SAM derived from announced program budgets is not possible without classified access.
