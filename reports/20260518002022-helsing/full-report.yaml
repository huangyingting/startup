      - number: '5.3'
        title: Manufacturing and Production Scale — Resilience Factories
        blocks:
          - type: paragraph
            body: >-
              Helsing has established what it calls a Resilience Factory in southern Germany, purpose-built to
              manufacture HX-2 strike drones at industrial scale. As of early 2025, the facility was producing more than
              1,000 HX-2 units per month, with public statements indicating that throughput is designed to be scalable
              to tens of thousands per month if demand warrants. Helsing frames this distributed manufacturing model as
              a strategic priority for European supply-chain resilience, reducing dependence on concentrated production
              nodes that could be disrupted by adversary action or geopolitical constraints. A separate manufacturing
              arrangement with Ukrainian industry underpins HF-1 production. One reported competitive advantage of the
              HX-2 is a lower per-unit cost compared to comparable Western loitering munitions such as the AeroVironment
              Switchblade, although independently verified unit-cost figures are not publicly available. The combination
              of in-house AI software and outsourced-but-controlled hardware manufacturing separates Helsing's model
              from pure hardware developers (who must own every subsystem) and pure software companies (who have no
              hardware delivery capability). This hybrid approach may allow Helsing to scale hardware production through
              manufacturing partners while retaining the margin-rich software and integration layer. Key production
              risks include supply-chain concentration in electronic components and the challenge of maintaining
              software quality at accelerating production rates.
