  - id: FE001
    title: Product Architecture Map — Helsing AI Software Stack
    type: stack
    layout: wide
    summary: >-
      Layered stack from hardware production at the base through AI core to mission-specific applications at the apex,
      showing how Helsing's software-layer strategy creates reusable AI capabilities across multiple product lines.
    data:
      layers:
        - label: Hardware & Manufacturing Layer
          detail: >-
            Resilience Factory (HX-2 >1,000/month); Ukrainian partner (HF-1); SG-1 Fathom hardware; Saab/Airbus
            platforms (Centaur/Wingman). Helsing does not own electronics manufacturing — partners provide airframes,
            sensors, motors.
        - label: Sensor Fusion Core
          detail: >-
            Multi-modal ingestion: infrared, electro-optical video, acoustic (Lura), radio-frequency. Real-time
            cross-sensor fusion weights; operates when individual sensors degraded or jammed.
        - label: AI/ML Inference Engine
          detail: >-
            GPS-denied autonomous navigation and targeting; swarm coordination protocol; trained on Ukraine operational
            data. Operates in contested EW environments where GPS and comms are disrupted.
        - label: Connectivity & Integration Layer (Altra)
          detail: >-
            Cross-vendor drone connectivity platform. Open API for third-party OEMs. Unifies data streams from
            heterogeneous fleets; underpins NATO interoperability.
        - label: Mission Application Layer
          detail: >-
            HX-2 strike/swarm; HF-1 loitering munition; SG-1 Fathom ASW; Centaur fighter AI; EW AI for Eurofighter
            Typhoon EK. Each mission app shares the AI/ML inference core.
    claimRefs:
      - CE021
      - CE014
      - CE022
    notes: >-
      Layer boundaries are analyst interpretation from public technical interviews and product descriptions; Helsing has
      not published architecture documentation.
  - id: FE002
    title: Customer Workflow / Operating Flow — HX-2 Strike Drone Mission Cycle
    type: flow
    layout: wide
    summary: >-
      Operational workflow from mission tasking through AI-enabled engagement, showing how Helsing's GPS-denied autonomy
      layer replaces the human-in-loop at each step.
    data:
      nodes:
        - id: n1
          label: Mission Tasking
          detail: Operator assigns target area and engagement parameters; HX-2 swarm receives mission brief via encrypted link
          type: step
        - id: n2
          label: Launch & Initial Navigation
          detail: >-
            HX-2 uses GPS (when available) for ingress; autonomously transitions to inertial / vision-based nav if
            jamming detected
          type: step
        - id: n3
          label: GPS/Comms Denial Zone
          detail: Adversary GPS jamming and RF suppression active; conventional drones become inoperable here
          type: decision
        - id: n4
          label: AI Autonomous Targeting
          detail: >-
            Helsing AI fuses IR and EO sensor data to identify and classify target without GPS; swarm members share
            sensor data
          type: step
        - id: n5
          label: Swarm Coordination
          detail: >-
            Multiple HX-2 units cooperatively allocate targets via distributed coordination protocol; no centralised
            comms required
          type: step
        - id: n6
          label: Engagement or Loiter
          detail: >-
            Selected unit strikes or continues loiter for additional intelligence collection; mission outcome recorded
            for AI retraining
          type: step
    claimRefs:
      - CE006
      - CE022
      - CE024
    notes: >-
      Workflow inferred from product descriptions and TechCrunch operational reporting. Helsing has not published
      operator manuals, rules of engagement, or technical flight-test data.
