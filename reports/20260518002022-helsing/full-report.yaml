  - number: 5
    title: Product & Technology
    sections:
      - number: '5.1'
        title: Product Portfolio — Six Platforms Across Air, Sea, and Software
        blocks:
          - type: paragraph
            body: >-
              Helsing's current product portfolio spans six distinct platforms. The HF-1 is a loitering munition with a
              plywood fuselage, designed for cost reduction, and equipped with AI that continues to operate when GPS and
              communications are jammed. Developed in partnership with Ukrainian industry, approximately 4,000 HF-1
              units had been deployed in active combat in Ukraine as of early 2025. The HX-2 is a more capable strike
              drone with swarm-intelligence features, enabling coordinated multi-unit operations without real-time human
              control. Ukraine ordered more than 4,000 HX-2 units in September 2024; by February 2025 more than 6,000
              were in production. The SG-1 Fathom is an autonomous underwater vehicle (AUV/UUV) weighing 60 kilograms
              and measuring 2 metres in length, designed for 90-day submerged endurance missions using an acoustic AI
              system Helsing calls Lura. Altra is a software platform that connects drones from different manufacturers
              on a single sensor-fusion layer; co-CEO Niklas Köhler has described it as the mechanism through which
              Helsing delivers value without owning proprietary electronics. Centaur is an AI agent designed to assist
              fighter jet pilots with complex real-time decisions; it was tested in a live combat trial called Project
              Beyond on a Saab JAS 39 Gripen in May and June 2025. Finally, Helsing won a sole-source contract from the
              German Bundeswehr in June 2024 to develop AI-enabled electronic warfare for the single-seat Eurofighter
              Typhoon EK, reducing the cognitive burden of mid-mission radar analysis on the pilot.
