      - number: '1.3'
        title: Funding History and Capital Structure
        blocks:
          - type: paragraph
            body: >
              Helsing has raised approximately €1.37 billion across four primary equity rounds between November 2021 and
              June 2025, representing one of the fastest capital accumulation trajectories in European defense
              technology history. The funding chronology establishes a consistent pattern of accelerating rounds driven
              by European defense spending urgency and Helsing's ability to win landmark government contracts between
              rounds.


              The Series A (November 2021): €100 million raised exclusively from Prima Materia, Daniel Ek's investment
              vehicle. Valuation at this stage was not formally disclosed but implied approximately €500 million
              post-money based on stake calculations in later rounds. The round emerged from stealth and immediately
              positioned Helsing as the European defense AI champion, triggering widespread media coverage across
              European technology press.


              The Series B (September 2023): €209 million raised at a pre-money valuation of €1.5 billion and post-money
              of approximately €1.7 billion. General Catalyst led the round with Saab AB participating as a strategic
              investor—Saab's participation was particularly significant as it established the first major European
              defense prime as both investor and customer, giving Helsing a direct pathway into the Saab Gripen program
              and Swedish defense procurement. At the time of announcement, TechCrunch reported this as breaking the
              record for the largest European AI investment.


              The Series C (July 2024): €450 million at a post-money valuation of €5 billion (approximately $487 million
              USD). General Catalyst again led the round, with Saab, Accel Partners, and Lightspeed Venture Partners as
              co-investors. Known stakeholder stakes following Series C: Prima Materia ~17%, General Catalyst ~12%, Saab
              ~5%. The round was used to fund the Resilience Factory manufacturing scale-up, expansion of the Ukraine
              drone program, and hiring to approximately 900 employees.


              The June 2025 round: €600 million led by Prima Materia at a post-money valuation of €12 billion—more than
              double the Series C valuation in under a year. This dramatic re-rating reflects the acceleration in
              European defense spending commitments post-Ukraine (Germany committed to 3%+ GDP on defense), Helsing's
              demonstrated combat deployment of HX-2 drones in Ukraine, and the broader surge in investor appetite for
              European sovereign defense technology. Total capital raised reaches approximately €1.37 billion across all
              rounds.


              Helsing has not publicly disclosed any secondary transaction activity, debt facilities, or project finance
              arrangements. With private company status, audited financial statements are not available. Revenue
              quality, gross margin, and cash burn are all undisclosed—standard for a company at this stage that has not
              yet filed an S-1 or equivalent.
