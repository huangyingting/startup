              continues through 2026-2027; Germany's Sondervermögen generates a €500-800M Helsing contract backlog;
              revenue reaches €300-400M; LAWS regulatory risk remains contained within existing governance frameworks;
              Helsing's Series E prices at €20-25B post-money. The bull catalyst is completion of FCAS AI integration
              alongside at least one NATO-wide standardisation of Helsing software creating a network-effect revenue
              multiplier. Base case (weighted approximately 50%): a Ukraine-Russia ceasefire is signed in 2026; European
              defence spending stabilises at approximately 2% of GDP across NATO members; Helsing wins two to three
              additional NATO-member MOD contracts; revenue reaches €100-200M; the €12B Series D valuation holds and
              Series E prices at €14-18B post-money within 18-24 months. The base case signal is that the €12B Series D
              already implies the market is pricing this scenario, and the 7x uplift from Series C in 12 months is
