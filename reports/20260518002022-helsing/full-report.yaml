            body: >-
              Helsing faces well-capitalized US competitors. Anduril Industries raised a $1.5B Series F in January 2025
              at approximately $28B valuation, is led by an experienced defense technology team with deep Pentagon
              relationships, and fields overlapping products including Lattice AI fusion software, autonomous drones,
              and autonomous underwater vehicles. Shield AI ($2.7B, autonomous fighter AI) also occupies part of
              Helsing's addressable space. Palantir, with a $70–100B public market cap and deep US/NATO government
