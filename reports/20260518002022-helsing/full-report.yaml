      - number: '5.5'
        title: Trust, Safety, Compliance, and Open Technical Gaps
        blocks:
          - type: paragraph
            body: >-
              Helsing operates at the intersection of AI and lethal autonomous weapons, attracting both contractual
              success and reputational scrutiny. The company endorsed NATO's 2021 Principles of Responsible Use of AI in
              Defence, which call for lawfulness, responsibility, explainability, traceability, reliability, and
              governability. Helsing also established an in-house ethics advisory process from an early stage, although
              the composition and outputs of that process are not publicly disclosed. The European Union's AI Act
              introduces obligations for high-risk AI systems; dual-use defence AI is subject to ongoing regulatory
              interpretation, with the Act's defence carve-out narrower than many companies expected. Export-control
              compliance is governed by German and EU regulations, and all hardware exports require specific licences.
              On the adverse side, musicians and creative professionals boycotted Spotify founder Daniel Ek's
              investments—including Helsing—in 2021 over concerns about autonomous weapons development, generating
              persistent reputational pressure. Several critical technical gaps remain open: Helsing has not published
              reliability rates, mean-time-between-failure, or independent test-and-evaluation results for any of its
              drone platforms. SG-1 Fathom's production readiness and operational timeline are not publicly confirmed.
              The scale and architecture of Helsing's ML training infrastructure are undisclosed. The unresolved
              international legal debate over autonomous lethal weapons systems—active at the UN Convention on Certain
              Conventional Weapons level—adds regulatory tail risk to the entire product category.
