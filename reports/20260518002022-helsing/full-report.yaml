      - number: '8.2'
        title: Thesis and anti-thesis analysis
        blocks:
          - type: paragraph
            body: >-
              The bull thesis rests on five structural pillars. First, European defence spending is re-rating upward
              post-2022: Germany's confirmed €71.9B 2025 defence budget and €100B Sondervermögen represent a
              once-in-generation procurement uplift, reinforced by EU rules requiring member states to increase defence
              expenditure and the European Parliament's new defence spending framework. Second, Helsing has secured
              MOD-level contracts across Eurofighter/Typhoon and the Future Combat Air System (FCAS) in Germany and the
              UK, demonstrating government-buyer traction at the platform integration level. Third, Helsing's AI-first
              software architecture, run-anywhere edge-AI design, and technical team drawn from DeepMind and Oxford
              create a durable moat relative to legacy defence contractors. Fourth, the EU defence AI sovereignty
              narrative—reinforced by the EU AI Act's defence exemptions and the EU Defence Fund—creates a structural
              policy tailwind exclusive to European-headquartered suppliers. Fifth, Prima Materia and General Catalyst
              provide a credible next-round franchise and strategic signalling. The anti-thesis is anchored by five
              countervailing forces: Vice Media's adverse investor-opposition reporting reflecting ESG reputational
              risk; Bloomberg's April 2025 unmitigated allegations of glitchy software and overpriced drones in Ukraine;
              the complete absence of any revenue or margin disclosure undermining independent thesis validation; the
              competitive threat from Anduril's European expansion as a better-capitalised direct rival; and the LAWS
              regulatory prohibition risk from the UN CCW process and ICRC advocacy. The thesis / anti-thesis table
              TV002 codifies the full argument pair across all five dimensions.
