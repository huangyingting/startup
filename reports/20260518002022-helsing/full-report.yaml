      - number: '1.2'
        title: Founders, Leadership, and Governance
        blocks:
          - type: paragraph
            body: >
              Helsing was co-founded in March 2021 by three principals whose complementary backgrounds were deliberately
              assembled to bridge the AI research and European defense establishment divide. Torsten Reil (co-CEO) holds
              a doctorate in computational biology from the University of Oxford and previously co-founded
              NaturalMotion, a motion-synthesis AI company sold to Zynga for $527 million in 2012. Reil's academic and
              entrepreneurial credentials establish Helsing's technical credibility with both the AI research community
              and institutional investors. Gundbert Scherf (co-CEO) served in senior advisory roles at the German
              Federal Ministry of Defence and as a McKinsey partner, giving Helsing direct institutional access to
              European defense procurement, policy networks, and NATO interoperability requirements. Niklas Köhler
              (President and Chief Product Officer) is the machine learning engineering lead, responsible for the core
              AI architecture powering Helsing's suite of products. The three-way co-CEO and CPO structure is unusual
              and warrants governance scrutiny in due diligence: shared leadership at scale has historically created
              alignment friction, though in Helsing's case the functional split—Reil owns external credibility, Scherf
              owns government relationships, Köhler owns product—appears coherent.


              Daniel Ek, founder of Spotify and one of Europe's best-known technology entrepreneurs, chairs Helsing's
              board and committed the company's first €100 million through his family investment vehicle Prima Materia.
              Ek's chairmanship has provided Helsing with brand visibility disproportionate to its size and has
              facilitated access to European institutional and corporate investor networks. However, his involvement has
              also attracted controversy: in 2021, numerous musicians including Paul McCartney, Brian Eno, and Radiohead
              publicly criticized Spotify's CEO for funding a military AI company, generating adverse press coverage. Ek
              did not publicly respond to or retract his investment. As of mid-2025, Prima Materia is the lead investor
              in the June 2025 Series round and remains Helsing's largest individual shareholder with approximately 17%
              of equity.


              Key-person risk is notable across multiple dimensions. Reil's public profile is central to investor
              relationships and media narrative. Scherf's government access is a direct competitive moat that would be
              difficult to replicate in the event of his departure. Köhler owns the technical roadmap and organizational
              knowledge of the AI architecture. No public succession planning or governance documentation has been
              disclosed. The Board composition beyond Daniel Ek and investor representatives from General Catalyst is
              not publicly documented, and Helsing has not published any ESG, governance, or board transparency reports.
