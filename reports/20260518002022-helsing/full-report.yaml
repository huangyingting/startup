              SaaS growth metrics. Ukraine stands out as the most operationally significant adoption signal: from an
              initial contract for HF-1 loitering munitions in 2023, the programme has scaled to approximately 4,000
              units deployed to the Ukrainian Armed Forces by early 2025, supported by a German government DM 200
              million financing commitment. The Ukrainian Ministry of Defence signed a large-scale HX-2 swarm drone
              order in September 2024, initially reported at 4,000-plus units, with Helsing's Resilience Factory
