  - id: FU001
    title: Customer Journey Map
    type: journey-map
    insight: >-
      Helsing's government and prime-contractor customers follow distinct paths: defence ministries typically enter
      through a sole-source or competitive tender directly into production, while industrial primes (Airbus, Saab) enter
      through an R&D partnership before transitioning to deployment. Both paths feature very high switching costs once
      integration is complete.
    data:
      items:
        - id: stage-discovery
          label: Discovery / Requirement Definition
          actor: Defence procurement office or prime contractor CTO
          description: >-
            Requirement emerges from a national defence modernisation programme (Bundeswehr Digitale Agenda, NATO
            Eastern Flank hardening) or a prime contractor AI platform strategy. Helsing is identified through industry
            conferences (Eurosatory, DSEI), Bundeswehr internal AI assessment, or prime contractor AI sourcing process.
          channels:
            - Industry conferences (DSEI, Eurosatory)
            - Ministry of Defence AI strategy documents
            - Prime contractor AI vendor selection process
        - id: stage-evaluation
          label: Technical Evaluation / PoC
          actor: Defence ministry technical office or prime contractor engineering team
          description: >-
            Proof of concept or technology demonstration is conducted — for Bundeswehr, a closed technical evaluation of
            Helsing's AI EW signal processing capability; for Saab, the Project Beyond Gripen AI trial. This stage may
            be classified and is not publicly visible. Duration varies from weeks (classified fast-track) to 12+ months
            (programme trial).
          channels:
            - Classified PoC programme
            - Industry trial (Project Beyond for Saab)
            - DSEI or closed demonstration
        - id: stage-contract
          label: Contract Award
          actor: Procurement office (Bundeswehr BAAINBw) or prime contractor
          description: >-
            Formal contract award — sole-source (Typhoon EK), competitive programme designation (FCAS backbone), or
            exclusive commercial agreement (Airbus Wingman). Contract terms are multi-year and typically classified at
            the line-item level.
          channels:
            - Bundeswehr BAAINBw (sole-source)
            - OCCAR European procurement agency
            - Direct commercial agreement (Airbus)
        - id: stage-integration
          label: Platform Integration and Delivery
          actor: Helsing engineering team + customer platform teams
          description: >-
            AI software is integrated into the target platform (Typhoon EK radar/EW systems, Wingman UCAV control
            architecture). This involves certification, system testing, and crew/operator training. Integration
            timeframes for certified military platforms are typically 12–36 months.
          channels:
            - Airbus / Eurofighter integration
            - Bundeswehr type certification process
            - Ukrainian AF field deployment
        - id: stage-expansion
          label: Multi-Programme Expansion
          actor: Defence ministry programme office + Helsing account leadership
          description: >-
            Once one programme succeeds, the procurement relationship expands to adjacent programmes — as evidenced by
            Germany's Typhoon EK contract leading directly to FCAS AI backbone designation within three months.
            Expansion is programme-driven, not self-serve; each new programme requires a separate procurement cycle.
          channels:
            - Programme office expansion
            - Joint ministerial programme review
            - FCAS consortium engagement
    sourceRefs:
      - SU001
      - SU009
      - SU012
  - id: FU002
    title: Adoption / Deployment Funnel
    type: funnel
    insight: >-
      The Helsing government procurement funnel is very narrow at the top (limited NATO-allied procurement offices
      capable of contracting AI EW/drone software) and has an unusually high conversion rate at the pilot-to-production
      stage, driven by sole-source and exclusive arrangements that bypass competitive tender at the final stage.
    data:
      items:
        - label: NATO-allied defence procurement offices with AI programme (addressable)
          value: 100
          description: NATO member states with active AI defence procurement budgets and platform modernisation programmes
        - label: Engaged in Helsing evaluation or discussion (estimated)
          value: 20
          description: Countries or primes in some form of dialogue with Helsing; most are not publicly confirmed
        - label: Signed pilot, PoC, or development agreement
          value: 10
