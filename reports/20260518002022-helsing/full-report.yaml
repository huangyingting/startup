  - number: 7
    title: Risks
    sections:
      - number: '7.1'
        title: Regulatory and legal risk register
        blocks:
          - type: paragraph
            body: >-
              Helsing operates at the intersection of three converging regulatory and legal risk vectors. First, the
              international campaign against lethal autonomous weapons systems (LAWS) is materially advancing: the ICRC
              has since 2015 called for legally binding rules on autonomous weapon systems, recommending prohibitions on
              weapons whose effects cannot be sufficiently predicted, and explicitly opposing autonomous targeting of
              persons. The Stop Killer Robots coalition—active in over 70 countries—is actively lobbying at the United
              Nations Convention on Certain Conventional Weapons (CCW), and the UN General Assembly held disarmament
              committee sessions in 2024 focused on LAWS governance. A binding LAWS treaty would directly threaten
              Helsing's HX-2 and HF-1 product lines. Second, IHL compliance is an ongoing operational constraint:
              Helsing's AI systems must respect the principles of distinction, proportionality and precaution under the
              Geneva Conventions as operationalized in the battlefield. In contested electronic warfare
              environments—including GPS spoofing and communications jamming—AI systems risk misclassifying targets or
              making disproportionate strike decisions, creating potential IHL violation exposure. Third, EU and NATO
              dual-use export control rules constrain where and how Helsing can sell its products; any expansion to
              non-NATO markets requires export licenses. NATO's Principles of Responsible Use of AI in Defence (2021)
              create a governance framework that Helsing must align with. The regulatory and legal risk register table
              TR001 enumerates the six top-severity risk items with probability, impact, mitigation maturity, and
              residual exposure. The risk heatmap figure FR001 scores probability, impact, and velocity across all five
              risk dimensions.
