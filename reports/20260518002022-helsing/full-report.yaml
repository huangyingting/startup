  - number: 2
    title: Market Analysis
    sections:
      - number: '2.1'
        title: Market Definition and Scope
        blocks:
          - type: paragraph
            body: >-
              The defense AI market relevant to Helsing encompasses three interrelated categories: (1) autonomous drone
              hardware and software stacks for military ISR (intelligence, surveillance, reconnaissance) and strike
              applications; (2) AI-enabled electronic warfare (EW) and sensor-fusion software for crewed combat aircraft
              and naval platforms; and (3) AI command-and-control (C2) and mission planning software deployed by
              national defense ministries and NATO. Helsing directly addresses all three.

              Excluded from Helsing's serviceable market are: commercial and agricultural UAVs, non-defense
              cybersecurity AI, logistics and supply-chain AI, consumer AI products, and defense hardware without a
              software AI layer (e.g., ammunition, armor, shipbuilding). These segments represent the majority of total
              defense spending but are not accessible to a defense-AI software and autonomous-systems vendor.

              Status-quo alternatives to Helsing's offering include: incumbent defense software platforms (Palantir
              AIPs, L3Harris WESCAM systems, Thales Group mission systems), in-house procurement-agency development
              programs (Bundeswehr IT center BAAINBw internal projects), and US-origin autonomous systems (General
              Atomics Reaper, Shield AI Nova derivatives) limited by sovereignty and export-control constraints.
              Adjacent markets where defense AI vendors could expand include border surveillance for EU agencies
              (Frontex), coast-guard and maritime AI, and dual-use AI for allied non-NATO partners (Australia, Japan,
              South Korea) subject to export licensing.

              The European defense AI market is defined by sovereign procurement authority— national defense ministries
              control access, classification levels gate vendor participation, and ITAR/EU dual-use controls shape the
              competitive moat for European-sovereign vendors. This structure is both a growth driver (European
              governments prefer European vendors to limit strategic dependency on US firms) and a constraint
              (classified program structure limits addressable market transparency).
