    title: Growth drivers and constraints table
    description: >-
      Key growth drivers and adoption constraints for the European defense AI market, with direction, timing,
      implication, and diligence asks.
    columns:
      - Driver/Constraint
      - Direction
      - Timing
      - Implication
      - Diligence Ask
    rows:
      - - War in Ukraine — proof of AI drone warfare at scale
        - Growth driver
        - 2022–ongoing
        - >-
          Validated AI-enabled drone superiority; accelerated NATO procurement timelines from 5+ yrs to 1–2 yrs for
          proven systems
        - Identify which specific Ukrainian operational lessons drove Helsing's BAAINBw contract award timing
      - - NATO 2% GDP spending pledge — rising budgets
        - Growth driver
        - 2025–2030
        - 23/32 NATO members met 2% target in 2025; sustained budget growth funds procurement pipeline
        - Track member-level AI budget allocation; verify 2026-2027 defense budget lines for AI systems
      - - German Zeitenwende — €100B Sondervermögen
        - Growth driver
        - 2022–2027
        - Dedicated fund bypasses annual budget politics; creates predictable multi-year procurement headroom
        - Verify remaining unspent Sondervermögen balance and % allocated to AI/autonomous systems
      - - European strategic autonomy — preference for sovereign AI vendors
        - Growth driver
        - 2024–2030
        - Political mandate for non-US defense AI supply chain; direct competitive moat for Helsing vs Palantir/Anduril
        - Assess whether formal procurement preferences for European vendors exist in BAAINBw or DE&S tender criteria
      - - AI-enabled electronic warfare demand
        - Growth driver
        - 2024–2028
        - EW is AI-intensive; Centaur AI for Eurofighter positions Helsing in NATO's highest-priority capability gap
        - >-
          Validate Eurofighter EK upgrade timeline and contract value; assess share of work vs Thales and BAE EW
          divisions
      - - Drone proliferation and NATO standardisation
        - Growth driver
        - 2024–2027
        - HF-1/HX-2 operational in Ukraine positions Helsing for NATO drone standard (STANAG) certification advantage
        - Track NATO drone interoperability agreements; verify Helsing participation in STANAG working groups
      - - EU AI Act defense exemption
        - Growth driver
        - 2024+
        - >-
          Art. 2(3) exempts national security/defense use from EU AI Act; no CE-marking or conformity assessment
          required
        - >-
          Confirm exemption applies to Helsing's specific products; monitor any proposed amendments to the defense
          carve-out
      - - Long defense procurement cycles (2–5 years)
        - Constraint
        - Ongoing
        - >-
          Contract awards lag capability demonstration by 2–5 years; revenue does not follow immediately from
          battlefield proof
        - >-
          Obtain signed backlog vs pipeline breakdown; assess milestone-based payment structure and revenue recognition
          policy
      - - Classification barriers to market sizing and investor diligence
        - Constraint
        - Ongoing
        - >-
          Classified program structure prevents public verification of contract values, revenue, and market sizing
          accuracy
        - >-
          Request government-cleared contract summaries or management accounts under NDA; validate stated revenue
          milestones
      - - Export control — EU dual-use regulation + Außenwirtschaftsgesetz
        - Constraint
