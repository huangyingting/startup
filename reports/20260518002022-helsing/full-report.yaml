  - number: 4
    title: Financials
    sections:
      - number: '4.1'
        title: Funding History and Round Details
        blocks:
          - type: paragraph
            body: >
              Helsing has completed four primary funding rounds since founding in March 2021, with each round materially
              larger than its predecessor and each accompanied by a step-change in implied valuation.


              **Series A (November 2021):** Helsing emerged from stealth with a €102.5M Series A led by Prima Materia,
              Daniel Ek's personal investment vehicle. This was one of the largest European defense AI seed-to-Series A
              rounds on record at the time. The company at this stage was primarily a software research organization
              with no deployed products. The round established Daniel Ek as the anchor investor and co-chairman.


              **Series B (September 2023):** Helsing raised €209M ($223M) in a Series B led by General Catalyst, with
              Saab joining as a strategic investor. The pre-money valuation was €1.5B, implying a post-money of over
              €1.7B. This was reported as the largest single European AI funding round at the time, surpassing Mistral
              AI's seed round in the same year. General Catalyst's lead position established a transatlantic VC
              relationship that would persist through subsequent rounds.


              **Series C (July 2024):** General Catalyst again led a €450M (~$487M) round valuing Helsing at
              approximately €5B. Additional investors included Accel, Lightspeed, and Saab (continuing participation).
              This round coincided with the announcement of major product milestones: the Airbus Wingman exclusive
              partnership, the German MoD Typhoon EK EW AI contract, and accelerated Ukraine HF-1 deliveries. The €5B
              valuation represented a 3× multiple over the Series B post-money in under twelve months.


              **June 2025 Round (€600M at €12B):** Daniel Ek through Prima Materia led a €600M raise valuing Helsing at
              €12B — a 2.4× step on the Series C valuation in under one year. This round brought total capital raised to
              approximately €1.37B. The timing followed the Centaur AI pilot Gripen tests (May–June 2025) and coincided
              with renewed artist boycott controversy. The €12B valuation would rank Helsing among the top five most
              valuable private technology companies in Europe at the time of the raise.


              The cumulative funding trajectory — €103M (2021), €312M (2023), €762M (2024), €1.37B (2025) — follows a
              hardware-plus-software company scaling pattern, with each round approximately doubling or tripling the
              previous total. Comparable hardware defense tech companies (Anduril: $4.6B total, Joby Aviation: ~$2B
              pre-IPO) have required similar capital depths to reach manufacturing scale.
