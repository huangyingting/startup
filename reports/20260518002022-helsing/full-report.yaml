      - number: '3.2'
        title: 'Head-to-Head: Helsing vs US Defense Tech Startups'
        blocks:
          - type: paragraph
            body: >
              Anduril Industries is the most frequently cited Helsing comparable: both are defense tech startups founded
              to bring software-first thinking to physical defense hardware, both target autonomous systems and AI
              command-and-control. But the parallels end quickly. Anduril was founded in 2017 (four years before
              Helsing), has raised $4.6B+ cumulatively (roughly 3.5× Helsing's €1.37B total), and operates at a scale
              (estimated revenues $500M+) that Helsing has not yet disclosed. Anduril's core product — the Lattice OS AI
              command-and-control platform connecting autonomous drones (Roadrunner jet-powered interceptor, Ghost-X
              loitering munition) — is conceptually comparable to Helsing's Altra software platform plus HF-1/HX-2
              hardware stack, but Anduril is US-DoD-focused with allied-nation expansion as a secondary priority.
              Helsing's claim to European sovereign supply chains and GDPR-compliant on-premise data handling is a
              genuine differentiator in European NATO procurement.


              Palantir Technologies is a public company (NYSE: PLTR, market cap ~$300B as of 2025) with three decades of
              intelligence community relationships in the US and UK. Its Gotham platform serves classified government
              intelligence analysis; Foundry serves enterprise data operations; and AIP (Artificial Intelligence
              Platform) launched in 2023 as its US Army / DoD AI layer. In the UK, Palantir operates the National Health
              Service data partnership and holds the Maven Smart System (MSS) contract with the UK Ministry of Defence.
              Palantir's scale, brand, and government relationships make it a formidable competitor on large multi-year
              NATO analytics contracts. However, Palantir does not produce physical autonomous weapons systems — it
              sells software and analytics, not strike drones. This makes Palantir a direct competitor on AI-for-command
              and AI-for-EW (electronic warfare), but not on the hardware/lethality side of Helsing's portfolio.


              Shield AI, founded in 2015, develops HIVEMIND autonomous flight software and V-BAT unmanned aircraft. It
              completed autonomous F-16 flight trials and targets US DoD autonomy programs. Shield AI's $2.7B valuation
              (2024) and US military focus make it a smaller but directly comparable autonomous systems competitor.
              Unlike Helsing, Shield AI does not have a meaningful European footprint or strategic government
              partnerships in the EU/NATO framework.


              The structural competitive advantage Helsing holds over all three US rivals in European markets is
              regulatory and political: European defense procurement authorities apply increasing pressure for European
              sovereign digital infrastructure in weapons systems, limiting US software companies in the most sensitive
              platform integrations. Helsing's legal incorporation as a Societas Europaea (SE), its exclusive
              partnerships with Airbus (Wingman) and Saab (investor), and its German government anchor contracts provide
              a political-moat that is hard for US rivals to replicate quickly.
