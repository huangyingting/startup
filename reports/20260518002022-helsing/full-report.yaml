      - number: '4.3'
        title: Valuation Progression and Peer Comparison
        blocks:
          - type: paragraph
            body: >
              Helsing's valuation trajectory is one of the steepest in European technology history: from implied ~€100M
              at Series A to €12B in June 2025 represents approximately 120× in under four years. This trajectory is
              driven by a combination of genuine product milestones (Ukraine deployment, Typhoon EK contract, Airbus
              Wingman partnership), rising European defense budgets creating demand visibility, and broader defense tech
              multiple expansion following Russia's 2022 Ukraine invasion.


              Compared to its primary US peers, Helsing's €12B (~$13B) valuation sits between Anduril's ~$28B (January
              2025) and Shield AI's ~$2.7B (2024). On a capital-raised basis, Helsing has raised approximately 30% of
              Anduril's total while achieving approximately 46% of Anduril's latest valuation — suggesting relatively
              higher capital efficiency on a valuation-per-dollar-raised metric. However, this comparison is complicated
              by the difference in revenue maturity: Anduril is believed to have $500M+ in estimated ARR while Helsing's
              revenues are not publicly disclosed.


              The revenue multiple implied by Helsing's valuation is impossible to calculate precisely because Helsing
              has not disclosed revenue. If Helsing is generating €50–200M in annual contract revenues (a reasonable
              range given its known contracts: Germany €x00M Typhoon EK, Germany-funded HF-1 production, Airbus
              partnership fee), the implied revenue multiple would be 65–240× — extremely high even by software
              standards, and likely reflecting forward-looking contract pipeline and option value rather than
              current-year financials.


              By comparison, Palantir trades at approximately 45–70× revenue (its Q4 2024 quarterly revenue annualizes
              to ~$3.3B, with market cap ~$300B), suggesting Helsing's implied multiple is significantly ahead of the
              public comparable. The premium is explainable by: (1) private company illiquidity premium, (2) expectation
              of accelerating contract awards from European defense spending growth, (3) hardware manufacturing
              optionality (Resilience Factories), and (4) scarcity value as the dominant European defense AI platform.


              The primary valuation risk is round-over-round multiple compression if European defense procurement cycles
              slow, if the Bloomberg adverse coverage materially affects near-term contracts, or if Anduril successfully
              establishes European anchors that diminish Helsing's sovereign premium.
