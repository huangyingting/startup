  - number: 3
    title: Competitors
    sections:
      - number: '3.1'
        title: Defense AI Competitive Landscape Overview
        blocks:
          - type: paragraph
            body: >
              The defense AI market in 2024–2026 is characterized by three distinct competitive tiers: US-native defense
              tech startups (Anduril, Palantir, Shield AI), legacy defense primes with AI divisions (Airbus, Thales,
              Leonardo, Elbit, BAE Systems, Northrop Grumman), and a thin layer of European defense tech companies, of
              which Helsing is the best-funded and most visible entrant.


              The US defense tech cohort collectively raised more than $3B in 2024 alone: Anduril closed a $1.5B Series
              F in August 2024 at a ~$14B valuation (later reported at $28B as of January 2025), while Palantir posted
              $828M in quarterly revenue in Q4 2024. These companies benefit from access to the $900B+ US defense budget
              and decades of DoD procurement relationships. By contrast, Helsing competes primarily in European defense
              markets where procurement cycles are longer, budgets historically smaller, and sovereign industrial policy
              creates both barriers and preferences that favor European companies.


              Post-Ukraine, European defense spending is surging. NATO members as a whole committed to 2%+ GDP defense
              targets, Germany passed a €100B Sondervermögen special defense fund, and European defense budgets are
              projected to reach record levels through 2030. This spending surge is Helsing's primary market tailwind,
              but it also attracts US defense tech companies seeking allied-nation revenue streams. NATO's Innovation
              Fund ($1B for dual-use tech) and the EU's European Defence Fund further accelerate competition.


              The defense AI market itself is estimated at $15B globally in 2024, growing toward $50B+ by 2030.
              Helsing's addressable slice — European NATO AI-enabled systems — is a fraction of the global figure, but
              Helsing's strategic positioning in key platforms (Eurofighter EK, FCAS, Saab Gripen, HF-1/HX-2 drones for
              Ukraine) gives it disproportionate visibility relative to its revenue base.
