              Helsing's Series D, closed in June 2025, set the company's post-money valuation at €12B against €600M in
              new capital led by Prima Materia and General Catalyst. Total capital raised through Series D is
              approximately €1.37B: Series A approximately €100M (2021), Series B €223M at €1.7B post-money (September
              2023), Series C €487M at €5B post-money (July 2024), and Series D €600M at €12B post-money (2025)—a 7x
              uplift from Series C in under twelve months. Helsing does not publicly disclose ARR, gross margin, or
              contract backlog, making the €12B price a narrative-anchored round that cannot be independently audited or
              revenue-multiple validated using public information. The recommendation is "research-more" at medium
              confidence and a medium-high risk rating: Helsing's strategic position in European defence AI is credible,
              the funding syndicate is sophisticated, and Anduril's $28B Series F provides an upper-bound structural
              comparable, but commercial opacity prevents a fundable investment thesis from being robustly
              stress-tested. The Saab strategic stake constitutes a credible M&A exit vector. The recommendation summary
