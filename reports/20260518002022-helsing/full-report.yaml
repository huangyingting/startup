chapters:
  - number: 1
    title: Company Overview
    sections:
      - number: '1.1'
        title: Identity, Mission, and Legal Structure
        blocks:
          - type: paragraph
            body: >
              Helsing SE is a European defense artificial intelligence company headquartered in Munich, Germany. The
              legal entity is incorporated as a Societas Europaea (SE), a supranational European corporate form that
              underscores the company's pan-European identity and its strategic positioning as a sovereign, non-US
              alternative in the defense AI space. Helsing operates subsidiaries in Estonia, France, and the United
              Kingdom, reflecting its engagement across NATO's eastern flank and key European defense markets. The
              company's stated mission is to develop AI systems that help democratic nations maintain a decisive
              technological advantage in modern warfare, with a particular focus on reducing the cognitive load on
              soldiers and pilots in high-tempo, contested environments.


              Helsing's product portfolio spans three distinct categories: (1) autonomous drone systems including the
              HF-1 loitering munition, the HX-2 swarm-capable strike drone, and the SG-1 Fathom autonomous underwater
              vehicle; (2) AI software platforms including Altra (sensor fusion and drone connectivity) and Centaur (AI
              co-pilot agent for fighter jets); and (3) electronic warfare AI embedded in the Eurofighter Typhoon EK.
              The company pivoted from pure AI software to integrated drone manufacturing in 2024, opening the
              Resilience Factory in southern Germany with initial production capacity exceeding 1,000 HX-2 drones per
              month. This pivot from software to systems represents a strategic shift from licensing AI to government
              primes toward becoming a vertically integrated defense technology prime in its own right.


              Helsing has approximately 900 employees as of early 2025, a rapid scale from its founding three-person
              team. The company's workforce spans Munich (HQ), London, Paris, Tallinn, and field offices supporting
              Ukraine operations. Revenue is not publicly disclosed; as a private company Helsing has no statutory
              obligation to file consolidated accounts or disclose financial performance. What is known is that contract
              revenues flow from German government procurement (Bundeswehr), direct sales to Ukraine, and partnership
              agreements with Airbus and Saab. Helsing's business model combines (a) government defense contracts for
              deployed AI systems, (b) per-unit hardware revenues from drone manufacturing, and (c) AI licensing and
              services under strategic partnership agreements.
