      - number: '2.4'
        title: Growth Drivers and Adoption Constraints
        blocks:
          - type: paragraph
            body: >-
              The dominant growth driver is the Russia-Ukraine war, which validated AI-assisted drone warfare at scale,
              demonstrated a 10:1 cost advantage of drone swarms over manned platform missions in contested airspace,
              and created an urgent demand signal across NATO. SIPRI data shows that 23 of 32 NATO members met the 2%
              GDP defense spending pledge in 2025, up from 11 members in 2023—reflecting political commitment translated
              into procurement budgets. European NATO members increased spending 9.6% in real terms in 2024, and
              Germany's Zeitenwende policy redirected €100B in additional investment through the Sondervermögen. The EU
              AI Act's explicit defense exemption (Article 2(3)) means defense AI vendors face no product-safety
              regulatory obstacle under EU law—a meaningful comparative advantage over commercial AI sectors. NATO's AI
              strategy and the responsible AI-in-defence principles create a framework that legitimizes sovereign
              European defense AI investment.

              Adoption constraints are structural and persistent. Procurement cycles run 2–5 years from specification to
              contract award, making revenue forecasting for any given quarter nearly impossible. Export control under
              EU dual-use regulation (Regulation 2021/821) and Germany's Außenwirtschaftsgesetz restricts deployment
              beyond NATO-aligned customers, capping the addressable market geographically. ITAR contamination risk from
              US-origin components could further limit technology transfer and third-party sales. The Campaign to Stop
              Killer Robots—a coalition of 270+ organizations in 68 countries including the stopkillerrobots.org
              network— represents ongoing reputational pressure that can affect talent recruitment and create political
              friction in sensitive export markets. The REAIM declaration (June 2023, 57 signatories) adds political
              compliance expectations: vendors who cannot demonstrate responsible AI processes risk exclusion from
              procurement processes in REAIM-aligned states. Finally, classified program structure prevents public
              verification of market sizing, contract backlog, and financial health— all of which are material diligence
              gaps that analysts and investors cannot resolve without government-cleared access or direct issuer
              disclosure.
