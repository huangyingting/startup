            body: >-
              No retention metrics — net revenue retention, gross revenue retention, churn rate, or contract renewal
              rate — have been publicly disclosed by Helsing for any product. This is not unusual for defence AI
              software companies operating in classified procurement environments: customer relationships are governed
              by multi-year framework contracts, sovereign procurement rules, and classification restrictions that
              preclude public NRR or GRR reporting. The structural durability signals are positive but indirect. The
              German Bundeswehr relationship encompasses two distinct programmes (Typhoon EK EW and FCAS AI backbone),
              suggesting multi-programme expansion rather than single-point exposure. Defence platform integration
              contracts typically span five to twenty years with very high political switching costs, as replacing an AI
              system on a frontline fighter requires regulatory re-certification, platform revalidation, and operator
              retraining. No publicly confirmed Helsing contract cancellation, customer churn event, or failed pilot has
              been identified in accessible reporting as of mid-2026. The artist boycott letter signed by over 1,000
