      - number: '4.2'
        title: Investor Base, Stakes, and Strategic Alignment
        blocks:
          - type: paragraph
            body: >
              Helsing's investor base is deliberately concentrated and strategically curated rather than broadly
              distributed across conventional venture capital funds. Three primary investors account for the majority of
              the equity base.


              **Prima Materia (~17% stake, lead investor):** Daniel Ek's personal investment vehicle has led or co-led
              every Helsing funding round. Prima Materia's ~17% ownership — reported from the time of the Series C —
              makes it the largest single institutional shareholder. Ek serves as co-chairman of Helsing, creating a
              principal investor-governance overlap uncommon in typical VC-backed companies. The June 2025 €600M raise
              being led by Prima Materia suggests Ek's personal commitment to Helsing remains the anchor of each round's
              syndicate formation.


              **General Catalyst (~12% stake):** The US-based VC firm led both the Series B and Series C and holds
              approximately 12% as of the Series C. General Catalyst's defense tech portfolio (it has backed Anduril and
              other defense-adjacent companies) gives it sector expertise. Its continued leadership in two successive
              rounds signals conviction; however, GC's ~12% stake means its financial return requires Helsing to exit at
              or above a ~€10B valuation just to return its invested capital at 1× on a fully diluted basis — creating
              alignment toward high-valuation outcomes.


              **Saab (~5% stake, strategic investor):** The Swedish aerospace and defense company joined in the Series B
              as both investor and strategic partner. Saab's 5% position is financially modest but strategically
              significant: it embeds Saab's aerospace engineering credibility into Helsing's institutional investor
              profile and creates a bilateral technology relationship (Helsing AI in Gripen/Centaur tests; Saab's radar
              and platform systems accessible to Helsing integration). Saab's participation also signals European
              prime-sector validation of Helsing's technical credibility.


              **Accel, Lightspeed, and others (Series C participants):** These conventional VC funds joined in the
              Series C; individual stake sizes have not been publicly disclosed. Their participation at €5B valuation
              suggests broad market confidence but also reflects the broader 2024 European defense tech investment surge
              rather than unique conviction specific to Helsing.


              The investor base composition has a notable structural feature: the absence of US government-connected
              sovereign wealth funds or NATO-adjacent institutional investors. This is consistent with Helsing's
              European sovereignty positioning but creates a potential funding gap if the company ever needs capital
              from investors with direct European defense ministry relationships (e.g., a European Investment Bank or
              European Defence Fund co-investment structure).
