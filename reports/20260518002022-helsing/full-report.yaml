      - number: '2.3'
        title: Buyer and Segment Analysis
        blocks:
          - type: paragraph
            body: >-
              Defense AI purchasing follows a two-tier structure: sovereign defense ministries control specification and
              funding, while prime contractors (Airbus, BAE Systems, Rheinmetall, Leonardo, KNDS) act as Tier-1 systems
              integrators that procure AI sub-systems under umbrella defense programs. Helsing sells directly to both
              tiers.

              The German Bundeswehr is Helsing's highest-confidence anchor buyer. Procurement for AI systems runs
              through BAAINBw (Bundesamt für Ausrüstung, Informationstechnik und Nutzung der Bundeswehr), Germany's
              federal procurement authority. The Zeitenwende special fund (€100B Sondervermögen, approved April 2022)
              and Germany's commitment to sustained 2%+ GDP defense spending create a multi-year procurement tailwind.
              UK MoD engagements are reported but contract values are not public; the UK National AI Defence Strategy
              (published 2023) prioritizes autonomous systems and AI-enabled ISR as procurement focus areas. Ukraine's
              armed forces have received Helsing HF-1 drones through allied government-to-government funding channels,
              making Ukraine an effective procurement channel funded by German, UK, and allied foreign military
              assistance budgets. Airbus Defence & Space is both a Tier-1 integrator (FCAS backbone, Wingman
              co-developer) and a strategic investor, giving Helsing embedded access to OCCAR (Organisation Conjointe de
              Coopération en matière d'ARmement) program budgets across Germany, France, and Spain.

              The NATO NSPA (NATO Support and Procurement Agency) represents a potential multilateral procurement
              channel for standardized NATO-aligned AI and drone systems, though no specific Helsing contract with NSPA
              has been reported. European prime contractors (Airbus, BAE, Rheinmetall, KNDS) represent a secondary
              demand channel through sub-system integration agreements. The adoption trigger across all segments is the
              combination of Ukraine operational proof and the NATO 2% GDP spending commitment, which together create
              political urgency and budget headroom simultaneously.
