figures:
  - id: FM001
    title: Market sizing lens
    description: "TAM/SAM/SOM pyramid illustrating Helsing's market from the broadest global defense AI total addressable market to the near-term serviceable obtainable market anchored by known engagements."
    type: pyramid
    layout: standard
    summary: "Three-layer sizing pyramid for Helsing: global defense AI TAM ($9.4–11.2B, 2024) narrows to a European sovereign AI SAM ($6–10B) and further to Helsing's near-term SOM ($0.2–0.65B) anchored by German Bundeswehr, UK MoD, and Ukraine channel engagements. All estimates carry low-to-medium confidence due to classification of program data."
    approximationNotes: "Global TAM from analyst estimates (MarketsAndMarkets, Statista); SAM extrapolated from SIPRI total at 1.5–2.5% AI fraction; SOM proxied from known contract categories. Values in $B unless noted."
    data:
      items:
        - label: "Global Defense AI TAM (2024 analysts)"
          value: "$9.4–11.2B (2024 est.); projected $28–45B by 2030–2032"
          note: "MarketsAndMarkets $10.4B; Statista $9.4B baseline. Low confidence: scope differs across sources."
          layer: 1
          claimRef: CM006
