  evidenceGaps:
    - type: private-evidence-only
      severity: material
      topic: "Helsing near-term SOM not independently verifiable — all contract values classified"
      missingEvidence: "No Helsing revenue figure has been disclosed. The Bundeswehr drone contract values, UK MoD contract scope, and Ukraine channel volume are all classified or undisclosed. The $200–650M SOM estimate is a proxy with no primary-source anchor."
      whyItMatters: "The SOM is the most critical market number for valuation anchoring. Without it, no revenue-based DCF or comparable transaction analysis is possible."
      diligencePath: "Request management accounts, signed backlog schedule, and milestone-based payment structure under NDA. Request government-cleared contract summaries from BAAINBw or DE&S."
      relatedQuestionRefs: [QM019]

    - type: missing-source
      severity: material
      topic: "No authoritative European defense AI SAM decomposition exists in public data"
      missingEvidence: "No primary source provides a decomposition of European total defense spending into AI-specific procurement categories. All SAM estimates are analyst extrapolations without primary-source validation. SIPRI and NATO data confirm total spending but not AI allocation."
      whyItMatters: "Without an authoritative SAM, the denominator for Helsing's market share is undefined, making market penetration assessment and valuation comparables impossible."
      diligencePath: "Commission a specialized defense economics analysis using classified budget line items; seek corroboration from defense attaché reports or NATO procurement statistics."
      relatedQuestionRefs: [QM023, QM024]

    - type: missing-source
      severity: minor
      topic: "NATO drone standardization progress — no authoritative procurement timeline"
      missingEvidence: "No public NATO document specifies a timeline for drone interoperability standards (STANAGs) that would give early-mover vendors like Helsing a formal first-mover advantage in NATO-wide procurement."
      whyItMatters: "If NATO standardization occurs and Helsing's HF-1/HX-2 platforms are not included in the baseline STANAG, the Ukraine operational advantage may not translate to NATO-wide procurement preference."
      diligencePath: "Request NATO standardization working group membership and draft STANAG progress reports; assess BAAINBw procurement tender language for platform-neutral vs platform-specific criteria."
      relatedQuestionRefs: [QM025]

    - type: enumeration-incomplete
      severity: minor
      topic: "Defense AI market sizing — systematic contradictions between analyst estimates preserved"
      missingEvidence: "MarketsAndMarkets and Statista estimates diverge on baseline ($10.4B vs $9.4B) and projection (38.4B vs 38.9B) due to undisclosed scope differences. The specific program inclusions/exclusions driving the divergence are not disclosed by either vendor."
      whyItMatters: "Scope divergence indicates that neither estimate is reliable as a market-sizing foundation. The true market size may be smaller or larger depending on classified program inclusion."
      diligencePath: "Obtain full methodology notes from MarketsAndMarkets and Statista under research license; cross-validate against SIPRI program-specific data and NATO DI&R reports."
      relatedTableRefs: [TM002]
      relatedQuestionRefs: [QM015, QM017]

