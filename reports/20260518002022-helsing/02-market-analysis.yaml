          note: "No primary source decomposes total defense into AI-specific spend. Estimate is analytical construct."
          layer: 2
          claimRef: CM014
        - label: "Helsing Near-Term SOM (2025–2027)"
          value: "$0.2–0.65B/yr (proxy from known engagement categories)"
          note: "Anchored by Bundeswehr drone contracts, UK MoD, Ukraine allied-funding channel. Revenue not disclosed."
