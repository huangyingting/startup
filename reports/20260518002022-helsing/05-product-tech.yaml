figures:
  - id: FE001
    title: Product Architecture Map — Helsing AI Software Stack
    type: stack
    layout: wide
    summary: >-
      Layered stack from hardware production at the base through AI core to mission-specific
      applications at the apex, showing how Helsing's software-layer strategy creates reusable
      AI capabilities across multiple product lines.
    data:
      layers:
        - label: Hardware & Manufacturing Layer
          detail: >-
            Resilience Factory (HX-2 >1,000/month); Ukrainian partner (HF-1); SG-1 Fathom hardware;
            Saab/Airbus platforms (Centaur/Wingman). Helsing does not own electronics manufacturing —
            partners provide airframes, sensors, motors.
        - label: Sensor Fusion Core
          detail: >-
            Multi-modal ingestion: infrared, electro-optical video, acoustic (Lura), radio-frequency.
            Real-time cross-sensor fusion weights; operates when individual sensors degraded or jammed.
        - label: AI/ML Inference Engine
          detail: >-
            GPS-denied autonomous navigation and targeting; swarm coordination protocol;
            trained on Ukraine operational data. Operates in contested EW environments
            where GPS and comms are disrupted.
        - label: Connectivity & Integration Layer (Altra)
          detail: >-
            Cross-vendor drone connectivity platform. Open API for third-party OEMs.
            Unifies data streams from heterogeneous fleets; underpins NATO interoperability.
        - label: Mission Application Layer
          detail: >-
            HX-2 strike/swarm; HF-1 loitering munition; SG-1 Fathom ASW; Centaur fighter AI;
            EW AI for Eurofighter Typhoon EK. Each mission app shares the AI/ML inference core.
    claimRefs:
      - CE021
      - CE014
      - CE022
    notes: >-
      Layer boundaries are analyst interpretation from public technical interviews and product
      descriptions; Helsing has not published architecture documentation.

  - id: FE002
    title: Customer Workflow / Operating Flow — HX-2 Strike Drone Mission Cycle
    type: flow
    layout: wide
    summary: >-
      Operational workflow from mission tasking through AI-enabled engagement, showing how
      Helsing's GPS-denied autonomy layer replaces the human-in-loop at each step.
    data:
      nodes:
        - id: n1
          label: Mission Tasking
          detail: Operator assigns target area and engagement parameters; HX-2 swarm receives mission brief via encrypted link
          type: step
        - id: n2
          label: Launch & Initial Navigation
          detail: HX-2 uses GPS (when available) for ingress; autonomously transitions to inertial / vision-based nav if jamming detected
          type: step
        - id: n3
          label: GPS/Comms Denial Zone
          detail: Adversary GPS jamming and RF suppression active; conventional drones become inoperable here
          type: decision
        - id: n4
          label: AI Autonomous Targeting
          detail: Helsing AI fuses IR and EO sensor data to identify and classify target without GPS; swarm members share sensor data
          type: step
        - id: n5
          label: Swarm Coordination
          detail: Multiple HX-2 units cooperatively allocate targets via distributed coordination protocol; no centralised comms required
          type: step
        - id: n6
          label: Engagement or Loiter
          detail: Selected unit strikes or continues loiter for additional intelligence collection; mission outcome recorded for AI retraining
          type: step
    claimRefs:
      - CE006
      - CE022
      - CE024
    notes: >-
      Workflow inferred from product descriptions and TechCrunch operational reporting. Helsing
      has not published operator manuals, rules of engagement, or technical flight-test data.

  - id: FE003
    title: Critical Dependency Map — Helsing Platform
    type: dag
    layout: wide
    summary: >-
      Key external dependencies that Helsing relies on for product delivery, technology development,
      and market access, showing single-point-of-failure risks.
    data:
      nodes:
        - id: d1
          label: Resilience Factory (Southern Germany)
          detail: Sole confirmed high-rate manufacturing site for HX-2; supply-chain concentration risk if facility disrupted
          type: dependency
        - id: d2
          label: Ukrainian Industrial Partner (HF-1)
          detail: Co-manufacturer for HF-1 loitering munition; partnership established for Ukrainian battlefield requirements
          type: dependency
        - id: d3
          label: Saab (Strategic Investor & Partner)
          detail: Gripen radar/AI upgrade customer; Project Beyond combat trial host; also a strategic investor in Helsing
          type: dependency
        - id: d4
          label: Airbus (Exclusive Wingman Partner)
          detail: Exclusive AI partner for Airbus Remote Carrier Wingman programme; loss of exclusivity would be material
          type: dependency
        - id: d5
          label: Mistral AI (European AI Sovereignty)
          detail: Strategic AI partnership announced Feb 2025; provides LLM and European-sovereignty AI capabilities
          type: dependency
      edges:
        - from: d1
          to: d2
          label: Parallel manufacturing tracks
        - from: d3
          to: d4
          label: Separate but complementary platform entry points
        - from: d3
          to: d5
          label: European defence AI ecosystem alignment
        - from: d1
          to: d3
          label: Production scale enables platform integration
    claimRefs:
      - CE026
      - CE033
    notes: >-
      Dependency criticality assessed from public partnership announcements and investor disclosures.
      Supply-chain specifics (component vendors, logistics partners) are not publicly disclosed.

  - id: FE004
    title: Product Maturity / Capability Map
    type: matrix
    layout: wide
    summary: >-
      Ordinal maturity assessment of Helsing's five active or near-production platforms across
      five capability dimensions. Ratings are evidence-based assessments derived from contract
      announcements, media coverage, and analyst inference.
    data:
      columns:
        - HF-1
        - HX-2
        - SG-1 Fathom
        - Altra
        - Centaur / EW AI
      rows:
        - label: Production Readiness
          values:
            - High — ~4,000 deployed in Ukraine combat
            - High — >6,000 in production; Resilience Factory >1,000/month
            - Low — prototype; production timeline unknown
            - Medium — deployed in Helsing programmes; no standalone commercial release
            - Low — trial-validated; no contract delivery confirmed
        - label: Combat Proven / Field-Tested
          values:
            - High — active frontline use in Ukraine
            - Medium — orders from Ukraine; mass production underway; limited field reports
            - Low — no operational deployment reported
            - Medium — underpins HX-2/HF-1 missions; standalone use unverified
            - Medium — Project Beyond trial completed; no production combat deployment
        - label: AI Autonomy Level
          values:
            - High — GPS-denied AI targeting in active combat
            - High — AI swarm coordination; comms-denied autonomous ops
            - Medium — Lura acoustic AI for detection; autonomy level undisclosed
            - Medium — sensor fusion layer; autonomy depends on connected platforms
            - High — real-time AI decision support; reduces pilot cognitive load
        - label: Competitive Moat
          values:
            - Medium — anti-jamming differentiated; competition intensifying
            - High — lower cost + AI swarm + European supply chain
            - High — 90-day endurance is class-leading if confirmed; no competitor comparison available
            - Medium — cross-vendor integration unique; no incumbent standard to defend yet
            - High — exclusive Airbus deal + Gripen integration; FCAS positioning
        - label: Commercial / Contract Evidence
          values:
            - High — 4,000 Bundeswehr-financed for Ukraine
            - High — 4,000+ Ukraine order; 6,000+ in production
            - Low — no named customer or contract publicly announced
            - Medium — used in Bundeswehr/Airbus programmes; standalone contract unknown
            - High — Bundeswehr sole-source EW contract; FCAS backbone contract
    claimRefs:
      - CE001
      - CE002
      - CE007
      - CE008
      - CE011
      - CE018
    notes: >-
      Ratings are analyst assessments based on public sources. High/Medium/Low reflect evidence
      quality, not absolute capability. SG-1 Fathom ratings reflect limited public information;
      actual capabilities may differ substantially from publicly available descriptions.

