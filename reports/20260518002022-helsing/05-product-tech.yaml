  - id: section-3
    title: Manufacturing and Production Scale — Resilience Factories
    body: >-
      Helsing has established what it calls a Resilience Factory in southern Germany, purpose-built to
      manufacture HX-2 strike drones at industrial scale. As of early 2025, the facility was producing
      more than 1,000 HX-2 units per month, with public statements indicating that throughput is designed
      to be scalable to tens of thousands per month if demand warrants. Helsing frames this distributed
      manufacturing model as a strategic priority for European supply-chain resilience, reducing dependence
      on concentrated production nodes that could be disrupted by adversary action or geopolitical
      constraints. A separate manufacturing arrangement with Ukrainian industry underpins HF-1 production.
      One reported competitive advantage of the HX-2 is a lower per-unit cost compared to comparable
      Western loitering munitions such as the AeroVironment Switchblade, although independently verified
      unit-cost figures are not publicly available. The combination of in-house AI software and
      outsourced-but-controlled hardware manufacturing separates Helsing's model from pure hardware
      developers (who must own every subsystem) and pure software companies (who have no hardware
      delivery capability). This hybrid approach may allow Helsing to scale hardware production
      through manufacturing partners while retaining the margin-rich software and integration layer.
      Key production risks include supply-chain concentration in electronic components and the challenge
      of maintaining software quality at accelerating production rates.
    claimRefs:
      - CE009
      - CE010
      - CE025
      - CE032
    tableRefs:
      - TE005
    figureRefs:
      - FE003

  - id: section-4
    title: Competitive Technical Differentiation
    body: >-
      Helsing's technical moat rests on three claimed differentiators. First, GPS-denied and
      communications-degraded AI operation: Helsing's algorithms continue to function in highly
      contested electromagnetic environments, which is where most peer-adversary warfare occurs.
      Western commercial drone platforms designed for permissive GPS environments are frequently
      defeated by Russian jamming in Ukraine; Helsing's field-tested products represent a working
      solution to this problem. Second, multi-domain sensor fusion: by integrating infrared, video,
      acoustic, and radio signals rather than relying on a single sensor modality, the platform is
      more robust to individual sensor failures or degradation. Third, cross-platform software
      interoperability: Altra's ability to integrate data from drones of multiple vendors positions
      Helsing as an indispensable integration layer for NATO partners operating heterogeneous fleets.
      Major competitor Anduril (US) competes on the autonomy and drone-swarm angle but operates
      primarily within US acquisition channels; Helsing's European regulatory standing and
      defence-industry relationships (Airbus, Saab) offer structural advantages in European procurement.
      The exclusive Airbus partnership for the Wingman autonomous drone program, signed in June 2024,
      provides a large-platform entry point unavailable to standalone AI startups. The FCAS AI backbone
      contract (September 2023) cements Helsing's position in Europe's most strategically significant
      next-generation air programme. However, Bloomberg reported in April 2025 that former employees and
      military experts raised concerns about drone pricing and software reliability; that reporting
      is paywalled and has not been independently verified through publicly available sources.
    claimRefs:
      - CE021
      - CE022
      - CE023
      - CE024
      - CE025
