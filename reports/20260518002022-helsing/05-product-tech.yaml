chapter:
  number: 5
  letter: E
  title: Product & Technology
  summary: >-
    Helsing has built a six-platform portfolio spanning loitering munitions (HF-1), strike drones (HX-2),
    autonomous underwater vehicles (SG-1 Fathom), multi-vendor connectivity software (Altra), fighter-jet AI (Centaur),
    and electronic-warfare AI for the Eurofighter Typhoon EK. The company's defining technical thesis—solving hard
    problems in the software layer rather than in hardware—produces AI that functions in GPS-denied and
    communications-jammed environments, underpinned by sensor fusion across infrared, video, sonar, and radio
    frequencies. The Resilience Factory in southern Germany has demonstrated capacity above 1,000 HX-2 units per
    month with a published roadmap to tens of thousands; however, independently verifiable reliability data,
    ML-infrastructure scale, and SG-1 production timelines remain undisclosed.

sections:
  - id: section-1
    title: Product Portfolio — Six Platforms Across Air, Sea, and Software
    body: >-
      Helsing's current product portfolio spans six distinct platforms. The HF-1 is a loitering munition
      with a plywood fuselage, designed for cost reduction, and equipped with AI that continues to operate
      when GPS and communications are jammed. Developed in partnership with Ukrainian industry, approximately
      4,000 HF-1 units had been deployed in active combat in Ukraine as of early 2025. The HX-2 is a
      more capable strike drone with swarm-intelligence features, enabling coordinated multi-unit operations
      without real-time human control. Ukraine ordered more than 4,000 HX-2 units in September 2024; by
      February 2025 more than 6,000 were in production. The SG-1 Fathom is an autonomous underwater
      vehicle (AUV/UUV) weighing 60 kilograms and measuring 2 metres in length, designed for 90-day
      submerged endurance missions using an acoustic AI system Helsing calls Lura. Altra is a software
      platform that connects drones from different manufacturers on a single sensor-fusion layer; co-CEO
      Niklas Köhler has described it as the mechanism through which Helsing delivers value without
      owning proprietary electronics. Centaur is an AI agent designed to assist fighter jet pilots with
      complex real-time decisions; it was tested in a live combat trial called Project Beyond on a Saab
      JAS 39 Gripen in May and June 2025. Finally, Helsing won a sole-source contract from the German
      Bundeswehr in June 2024 to develop AI-enabled electronic warfare for the single-seat Eurofighter
      Typhoon EK, reducing the cognitive burden of mid-mission radar analysis on the pilot.
    claimRefs:
