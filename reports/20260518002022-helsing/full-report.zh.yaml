      - number: '1.3'
        title: 融资历史与资本结构
        blocks:
          - type: paragraph
            body: >
              2021 年 11 月至 2025 年 6 月，Helsing 完成四轮主要股权融资，累计约 €1.37B，构成欧洲国防科技史上最快的资本积累曲线之一。融资节奏呈现出一条稳定模式：欧洲国防支出紧迫性上升，叠加
              Helsing 在两轮融资之间不断拿下标志性政府合同，推动轮次加速放大。


              Series A（2021 年 11 月）：€100M，全部来自 Daniel Ek 的投资工具 Prima Materia。该阶段估值未正式披露，但按后续轮次持股测算，投后约
              €500M。公司从隐身状态亮相，并立即被定位为欧洲国防 AI 冠军，引发欧洲科技媒体广泛报道。


              Series B（2023 年 9 月）：€209M，投前估值 €1.5B，投后约 €1.7B。General Catalyst 领投，Saab AB 作为战略投资者参与。Saab
              的参与尤其关键：这是首个以投资者和客户双重身份进入的欧洲大型国防主承包商，为 Helsing 打开进入 Saab Gripen 项目和瑞典国防采购的直接通道。公告发布时，TechCrunch 称其打破了欧洲 AI
              最大单笔投资纪录。


              Series C（2024 年 7 月）：€450M（约 $487M），投后估值 €5B。General Catalyst 再次领投，Saab、Accel Partners 和 Lightspeed
              Venture Partners 共同投资。Series C 后已知股东持股：Prima Materia 约 17%，General Catalyst 约 12%，Saab 约 5%。该轮资金用于
              Resilience Factory 制造扩产、乌克兰无人机项目扩张，以及招聘至约 900 名员工。


              2025 年 6 月轮：Prima Materia 领投 €600M，投后估值 €12B——不到一年时间较 Series C
              估值翻倍以上。如此剧烈的重估，反映了乌克兰战争后欧洲国防支出承诺加速（德国承诺国防支出占 GDP 3%+）、Helsing 的 HX-2
              无人机已在乌克兰实战部署，以及投资者对欧洲主权国防科技的兴趣整体升温。所有轮次合计融资约 €1.37B。


              Helsing 未公开披露任何二级交易、债务融资或项目融资安排。作为私人公司，审计财务报表不可获得。收入质量、毛利率和现金消耗均未披露——对一家尚未提交 S-1 或同等文件的公司来说，这属于该阶段常见状态。
