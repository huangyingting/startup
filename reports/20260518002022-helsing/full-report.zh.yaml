  - id: FU001
    title: 客户旅程图
    type: journey-map
    insight: Helsing 的政府客户和主承包商客户走两条不同路径：国防部通常通过单一来源或竞争性招标直接进入量产， 工业主承包商（Airbus、Saab）则先通过 R&D 合作切入，再转向部署。集成完成后，两条路径的 切换成本都很高。
    data:
      items:
        - id: stage-discovery
          label: 发现 / 需求定义
          actor: 国防采购办公室或主承包商 CTO
          description: >-
            需求来自国家国防现代化项目（Bundeswehr Digitale Agenda、NATO 东翼加固），或主承包商的 AI 平台战略。Helsing
            通过行业会议（Eurosatory、DSEI）、Bundeswehr 内部 AI 评估或 主承包商 AI 寻源流程被识别出来。
          channels:
            - 行业会议（DSEI、Eurosatory）
            - 国防部 AI 战略文件
            - 主承包商 AI 供应商选择流程
        - id: stage-evaluation
          label: 技术评估 / PoC
          actor: 国防部技术办公室或主承包商工程团队
          description: >-
            开展概念验证或技术演示——对 Bundeswehr 而言，是对 Helsing AI EW 信号处理能力的封闭技术评估； 对 Saab 而言，是 Project Beyond Gripen AI
            试验。该阶段可能保密，公开不可见。周期从数周 （保密快速通道）到 12+ 个月（项目试验）不等。
          channels:
            - 保密 PoC 项目
            - 行业试验（Saab 的 Project Beyond）
            - DSEI 或闭门演示
        - id: stage-contract
          label: 合同授予
          actor: 采购办公室（Bundeswehr BAAINBw）或主承包商
          description: 正式授予合同——单一来源（Typhoon EK）、竞争性项目指定（FCAS 骨干），或独家商业协议 （Airbus Wingman）。合同期限为多年，通常在明细项层面保密。
          channels:
            - Bundeswehr BAAINBw（单一来源）
            - OCCAR 欧洲采购机构
            - 直接商业协议（Airbus）
        - id: stage-integration
          label: 平台集成与交付
          actor: Helsing 工程团队 + 客户平台团队
          description: >-
            Helsing 把 AI 软件接入目标平台（Typhoon EK 雷达 / 电子战系统、Wingman UCAV 控制架构）。后续还要走认证、系统测试，并训练机组和操作员。已认证军用平台的集成周期通常为 12–36
            个月。
          channels:
            - Airbus / Eurofighter 集成
            - Bundeswehr 型号认证流程
            - 乌克兰空军战场部署
        - id: stage-expansion
          label: 多项目扩张
          actor: 国防部项目办公室 + Helsing 客户负责人
          description: 一个项目跑通后，采购关系会扩展到相邻项目——德国 Typhoon EK 合同在三个月内直接带来 FCAS AI 骨干指定，就是证据。扩张由项目驱动，不是自助式采购；每个新项目都要单独走一轮采购。
          channels:
            - 项目办公室扩张
            - 部长级联合项目评审
            - FCAS 联盟接洽
    sourceRefs:
      - SU001
      - SU009
      - SU012
