      - number: '6.2'
        title: 采用轨迹与规模
        blocks:
          - type: paragraph
            body: >-
              Helsing 的采用轨迹更像是数量和作战速度的故事，而不是传统 SaaS 增长指标。乌克兰是最具作战意义的采用信号：从 2023 年 HF-1 巡飞弹的初始合同开始，该项目到 2025 年初已扩大到约
              4,000 枚部署给乌克兰武装部队，并得到德国政府 DM 200 million 融资承诺支持。乌克兰国防部在 2024 年 9 月签署了大规模 HX-2 蜂群无人机订单，初始报道为 4,000
              多架；Helsing 的 Resilience Factory 分布式制造目标是每月 6,000 多架。Typhoon EK AI 系统在 2024 年 6
              月获合同后直接进入项目集成；前线飞机交付时间表尚未公开确认。FCAS 于 2024 年 9 月签约，是一个十年以上周期的项目。Airbus Wingman 合作在 2024 年 6
              月宣布，目前仍处于开发阶段，没有服役日期。虽然头部数量很亮眼，几个关键分母仍未公开：总签约数量、单机收入和交付速度，因此很难判断承诺如何转化为已交付收入。公开报道中没有取消、延迟或履约争议，是一个正面但偏基线的信号。
