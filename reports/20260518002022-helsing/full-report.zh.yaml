      - number: '5.3'
        title: 制造与产能规模 —— Resilience Factories
        blocks:
          - type: paragraph
            body: >-
              Helsing 在德国南部建成了其所谓的 Resilience Factory，专门用于工业化规模制造 HX-2 打击无人机。截至 2025 年初，该设施每月生产超过 1,000 架
              HX-2；公开表述显示，如果需求支撑，吞吐量设计上可扩展到每月数万架。Helsing
              将这种分布式制造模式定位为欧洲供应链韧性的战略重点，减少对集中生产节点的依赖，避免这些节点被对手行动或地缘政治限制打断。HF-1 生产则由另一套与乌克兰产业界的制造安排支撑。HX-2
              据称具备一项竞争优势：单机成本低于 AeroVironment Switchblade 等可比西方巡飞弹，但公开渠道没有独立核验的单机成本数据。Helsing 把自研 AI
              软件与外包但受控的硬件制造结合起来，区别于必须掌握每个子系统的纯硬件开发商，也区别于没有硬件交付能力的纯软件公司。这种混合路径或许能让 Helsing
              借助制造伙伴扩张硬件产能，同时把高毛利的软件和集成层留在手里。关键生产风险包括电子元器件供应链集中，以及在产能加速爬坡时保持软件质量的难度。
