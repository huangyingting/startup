      - number: '8.4'
        title: 可比估值与市场背景
        blocks:
          - type: paragraph
            body: >-
              Helsing 的 €12B 估值可由四个同业参照交叉校准。Anduril Industries 是最接近的结构性同业，作为美国防务 AI 软硬件混合公司，于 2025 年 1 月以 $28B 投后估值完成
              Series F；Helsing 按投后口径约为 Anduril 的 0.43x，反映其可部署机队更小、收入阶段更早、地理集中在欧洲。Palantir Technologies 是公开市场纯软件上限，2024
              全年收入 $2.87B，对应约 $70B 市值，过去十二个月倍数约 24x，可作为防务 AI 纯软件倍数上限。Shield AI 最近一轮私募估值 $2.7B；由于 Shield AI 产品范围更窄且仅面向
              DoD，而 Helsing 覆盖泛 NATO，直接倍数比较只能近似。L3Harris Technologies 是上市传统防务主承包商，2024 年收入约 $21B、市值约
              $20B，说明成熟硬件主承包商会压缩到约 1x 收入——这是地板，而不是可比上限。全球防务 AI 市场预计从 2024 年 $15-18B 增长到 2030 年 $40-60B，CAGR 为
              15-20%；只有近期市场份额获取和收入兑现得到确认，这样的市场规模才支撑 Helsing 的 €12B 溢价。综合可比集合隐含 Helsing 公允价值区间为 €8-18B；若收入为 €150-300M、倍数为
              25-60x，€12B 处在中上区间。可比估值表 TV004 列出完整集合。投资 KPI 图 FV004 定义了 18-24 个月持有期内需要跟踪的六项关键绩效指标。
