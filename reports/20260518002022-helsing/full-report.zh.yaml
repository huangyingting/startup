      - number: '7.2'
        title: 技术与产品风险登记表
        blocks:
          - type: paragraph
            body: >-
              Helsing 面对一组技术和产品执行风险，其中一部分已在负面媒体报道中浮出水面。Bloomberg 2025 年 4 月报道称，Helsing
              出售了定价过高的无人机，且其软件在战场上存在可靠性问题；报道引用前员工和投资人作为软件故障投诉来源。虽然 Helsing 未确认这些指控，Bloomberg
              报道也在付费墙后，但这些说法具有实质负面性：一旦得到佐证，将削弱 Helsing 以高估值为支撑的核心「AI 参与闭环」可靠性叙事。第二项技术风险是 AI 系统在争夺激烈的电磁战（EW）环境中的表现。GPS
              欺骗、RF 干扰和对抗性传感器操纵，会削弱依赖干净传感器输入的 AI 推理管线。Helsing 的 Centaur AI 飞行员、Altra 传感器融合，以及 Eurofighter Typhoon EK 电子战
              AI 都在高强度 EW 对抗环境中运行，其对抗鲁棒性尚未在规模化场景中证明。公司从纯 AI 软件转向无人机硬件制造——HX-2 自杀式无人机产能每月 1,000+ 架、HF-1
              巡飞弹——提高了执行复杂度、资本强度和制造执行风险，尤其是 Resilience Factories 项目仍处于扩产阶段。据报道，Rheinmetall 制造合作在 2024
              年流产，也说明无人机生产的工业伙伴关系很脆弱。运营风险登记表 TR002 和风险传导图 FR002 展示软件与制造失败如何向收入、监管和声誉维度级联扩散。
