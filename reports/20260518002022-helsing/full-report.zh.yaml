      - number: '3.2'
        title: 正面对比：Helsing vs 美国国防科技创业公司
        blocks:
          - type: paragraph
            body: >
              Anduril Industries 是最常被拿来与 Helsing 对比的公司：二者都是国防科技创业公司，都旨在把软件优先思维带入实体国防硬件，也都瞄准自主系统和 AI
              指挥控制。但相似之处很快就到头了。Anduril 成立于 2017 年（比 Helsing 早四年），累计融资 $4.6B+（约为 Helsing €1.37B 总额的 3.5×），规模也更大（估算收入
              $500M+），而 Helsing 尚未披露收入。Anduril 的核心产品——Lattice OS AI 指挥控制平台，连接自主无人机（Roadrunner 喷气动力拦截机、Ghost-X
              巡飞弹）——在概念上可与 Helsing 的 Altra 软件平台加 HF-1/HX-2 硬件栈类比，但 Anduril 聚焦美国 DoD，盟国扩张只是次要优先级。Helsing 对欧洲主权供应链和 GDPR
              合规本地数据处理的主张，是其在欧洲 NATO 采购中的真实差异点。


              Palantir Technologies 是上市公司（NYSE: PLTR，截至 2025 年市值约 $300B），在美国和英国情报界积累了三十年关系。其 Gotham 平台服务保密政府情报分析；Foundry
              服务企业数据运营；AIP（Artificial Intelligence Platform）于 2023 年推出，作为其美国陆军 / DoD AI 层。在英国，Palantir 运营 National
              Health Service 数据合作，并持有英国国防部 Maven Smart System（MSS）合同。Palantir 的规模、品牌和政府关系，使其在大型多年期 NATO 分析合同上成为强劲竞争者。但
              Palantir 不生产实体自主武器系统——它卖软件和分析，不卖打击无人机。因此，Palantir 在指挥 AI 和电子战 AI 上是直接竞争对手，但不在 Helsing 产品组合的硬件 / 杀伤侧竞争。


              Shield AI 成立于 2015 年，开发 HIVEMIND 自主飞行软件和 V-BAT 无人机。它完成了自主 F-16 飞行试验，并瞄准美国 DoD 自主项目。Shield AI 2024 年估值
              $2.7B，且聚焦美国军方，是规模更小但直接可比的自主系统竞争者。与 Helsing 不同，Shield AI 在 EU/NATO 框架内没有有意义的欧洲足迹或战略政府合作。


              Helsing 相比这三家美国竞争对手在欧洲市场的结构性竞争优势，来自监管和政治：欧洲国防采购机构越来越强调武器系统中的欧洲主权数字基础设施，这会限制美国软件公司进入最敏感的平台集成。Helsing 以
              Societas Europaea（SE）注册、与 Airbus（Wingman）和 Saab（投资者）建立独家合作、并拥有德国政府锚定合同，这些构成美国竞争对手很难快速复制的政治护城河。
