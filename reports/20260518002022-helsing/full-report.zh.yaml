            body: >-
              德国（作为直接签约方和融资赞助方）与乌克兰（作为主要终端用户）几乎贡献了 Helsing 已确认部署收入的全部。德国对乌克兰防务融资的政治承诺若恶化、停火显著降低无人机消耗，或德国预算危机影响
              Bundeswehr 现代化项目，都将造成重大的收入集中度冲击。FCAS 和 Airbus Wingman 提供长期分散路径，但无法在两到三年的投资周期内降低这项集中度风险。
