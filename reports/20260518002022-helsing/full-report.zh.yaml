      - number: '6.4'
        title: 留存与耐久性
        blocks:
          - type: paragraph
            body: >-
              Helsing 没有公开披露任何产品的留存指标，包括净收入留存率、总收入留存率、流失率或合同续约率。对在涉密采购环境中运营的防务 AI
              软件公司来说，这并不罕见：客户关系由多年框架合同、主权采购规则和保密限制约束，公共披露 NRR 或 GRR 的空间很小。结构性耐久信号为正，但都是间接的。德国 Bundeswehr
              关系涵盖两个不同项目（Typhoon EK 电子战和 FCAS AI 骨干），显示的是多项目扩张，而不是单点暴露。防务平台集成合同通常跨越五到二十年，政治切换成本极高；替换前线战斗机上的 AI
              系统，需要重新监管认证、重新验证平台并重新训练操作员。截至 2026 年中，公开报道中没有发现已确认的 Helsing 合同取消、客户流失事件或失败试点。超过 1,000 名音乐人签署并写给 Spotify
              CEO Daniel Ek 的艺术家抵制信代表声誉风险，但没有可证明地影响采购关系或合同留存。2025 年 4 月一篇提到 Helsing 面临质疑的 Bloomberg
              文章因付费墙无法访问，其内容，包括任何关于客户的披露，都无法评估。
