      - number: '6.5'
        title: 扩张与集中度风险
        blocks:
          - type: paragraph
            body: >-
              无论用什么标准看，Helsing 的客户集中度都很高。德国（作为 Typhoon EK 和 FCAS 的直接签约方、乌克兰无人机交付的融资赞助方）与乌克兰（作为 HF-1 和 HX-2
              机队的直接终端用户）合计几乎覆盖了已确认部署数量和已知项目承诺的全部。这形成双重依赖：一是地缘政治局势（持续的俄乌冲突，以及德国继续出资支持的政治意愿），二是单一国防部。如果 FCAS 交付，Helsing
              将进入法德西联合体，客户会有所分散，但这是十年甚至更长周期。Airbus Wingman 独家安排为 NATO 范围 UCAV 项目提供潜在杠杆，却也制造了单一主承包商瓶颈；如果 Airbus 改变战略方向，或
              Wingman 项目缩减范围，Helsing 将失去西欧 UCAV 的主要市场路径。扩张的正面信号包括 CEO 层面对进入 NATO 东翼国家的公开表态，以及 2024 年欧洲防务开支创纪录——32 个 NATO
              盟友中有 23 个达到 2% GDP 目标。不过，截至 2026 年中，波兰、波罗的海国家、法国、英国或其他 NATO 盟友尚无公开确认的量产合同客户。由 StopKillerRobots 牵头、并在联合国
              CCW 层面回响的民间社会对致命自主武器的反对，构成长期监管尾部风险，可能在十到二十年周期内限制可服务市场或迫使产品修改。
            claimRefs:
