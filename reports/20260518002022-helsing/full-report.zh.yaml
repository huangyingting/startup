  - number: 4
    title: 财务
    sections:
      - number: '4.1'
        title: 融资历史与轮次细节
        blocks:
          - type: paragraph
            body: >
              自 2021 年 3 月创立以来，Helsing 已完成四轮主要融资；每一轮都明显大于前一轮，也伴随隐含估值的台阶式上升。


              **Series A（2021 年 11 月）：** Helsing 从隐身状态亮相，由 Daniel Ek 的个人投资工具 Prima Materia 领投 €102.5M Series A。这是当时欧洲国防
              AI 从种子到 Series A 阶段最大规模轮次之一。公司在这个阶段主要还是软件研究组织，尚无已部署产品。该轮确立 Daniel Ek 作为锚定投资者和联席董事长。


              **Series B（2023 年 9 月）：** Helsing 完成 €209M（$223M）Series B，由 General Catalyst 领投，Saab 作为战略投资者加入。投前估值
              €1.5B，隐含投后超过 €1.7B。据报道，这是当时欧洲最大单笔 AI 融资，超过同年 Mistral AI 的种子轮。General Catalyst 的领投位置建立了跨大西洋 VC
              关系，并在后续轮次中延续。


              **Series C（2024 年 7 月）：** General Catalyst 再次领投 €450M（约 $487M）融资，Helsing 估值约 €5B。新增投资者包括 Accel、Lightspeed
              和持续参与的 Saab。该轮与多项重大产品里程碑同时发生：Airbus Wingman 独家合作、德国 MoD Typhoon EK EW AI 合同，以及乌克兰 HF-1 交付加速。€5B 估值较 Series
              B 投后不到十二个月提升 3×。


              **2025 年 6 月轮（€600M，估值 €12B）：** Daniel Ek 通过 Prima Materia 领投 €600M 融资，使 Helsing 估值达到 €12B——不到一年较 Series C
              估值提升 2.4×。该轮使累计融资达到约 €1.37B。融资时点紧随 Centaur AI 在 Gripen 上的飞行员测试（2025 年 5–6 月），并与艺术家抵制争议再度升温重合。按融资时估值计算，€12B
              足以让 Helsing 跻身欧洲估值最高的五家私人科技公司。


              累计融资轨迹——€103M（2021 年）、€312M（2023 年）、€762M（2024 年）、€1.37B（2025
              年）——符合硬件加软件公司扩张模式，每轮大约让此前累计总额翻倍或翻三倍。可比硬件国防科技公司（Anduril：累计 $4.6B；Joby Aviation：IPO 前约
              $2B）同样需要类似资本深度，才能达到制造规模。
