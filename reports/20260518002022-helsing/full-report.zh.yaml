      - number: '3.4'
        title: 竞争定位、护城河与风险
        blocks:
          - type: paragraph
            body: >
              Helsing 的首要竞争护城河是欧洲主权定位——法律注册形式（Societas Europaea）、与 Saab 和 Airbus 的独家合作、德国 MoD
              锚定合同，以及在乌克兰的实战部署共同组成这一定位。没有一家美国国防科技公司能在不投入多年政治和监管铺垫的情况下复制。


              第二层护城河是实战部署可信度。Helsing 的 HF-1 巡飞弹已在乌克兰规模化部署（德国订购 4,000 架、乌克兰订购 6,000+ 架 HX-2），提供了实战验证：集成 AI
              软件的无人机平台能够在当前最高强度的对抗环境中运作。相比 Anduril（尚未在活跃冲突中以这种规模部署系统）以及 Palantir 这类纯软件玩家，这一作战记录构成直接竞争优势，后者完全够不到这类验证。


              Centaur AI 飞行员项目（2025 年 5–6 月在 Gripen 上测试）以及 Eurofighter Typhoon EK 上的电子战 AI 集成，证明 Helsing
              不只在无人机硬件上竞争，也能进入有人飞机 AI 项目——这扩大了可服务市场，并将其与只聚焦无人系统的公司区分开。


              关键竞争风险：（1）美国国防科技公司（尤其 Anduril）正积极争取盟国合同，并可能与和 Helsing 竞争的欧洲主承包商建立独家合作；（2）2024 年 Rheinmetall
              合作告吹，说明主承包商关系很脆弱——Rheinmetall 选择了 Auterion；（3）2025 年 4 月 Bloomberg 负面报道指称无人机定价过高、软件故障频发，若欧洲 MoD
              变得更保守，会带来采购风险；（4）欧洲国防主承包商自身可能加速内部 AI 能力建设，而不是从 Helsing 采购。


              NATO 人工智能战略和 Allied Command Transformation AI 倡议提供了一个可能让所有竞争者同等受益的框架，但 Helsing
              深度嵌入德国和英国国防项目，因此更早触达这些框架。NATO Innovation Fund 的 $1B 国防科技授权，是对 Helsing 市场论点最清晰的机构背书，尽管它并不偏向任何单一供应商。
