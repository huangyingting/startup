  - id: TM004
    title: 增长驱动因素与约束表
    description: >-
      Key growth drivers and adoption constraints for the European defense AI market, with direction, timing,
      implication, and diligence asks.
    columns:
      - 驱动因素 / 约束
      - 方向
      - 时间
      - 影响
      - 尽调问题
    rows:
      - - 乌克兰战争 —— AI 无人机规模化作战得到验证
        - 增长驱动
        - 2022 年至今
        - AI 赋能无人机优势得到验证；已验证系统的 NATO 采购周期从 5 年以上压到 1–2 年
        - 确认哪些乌克兰具体作战经验推动了 Helsing 获得 BAAINBw 合同的时间点
      - - NATO 2% GDP 支出承诺 —— 预算上行
        - 增长驱动
        - 2025–2030
        - 2025 年 32 个 NATO 成员中 23 个达到 2% 目标；持续预算增长支撑采购管线
        - 跟踪成员国层面的 AI 预算分配；核验 2026–2027 年国防预算中的 AI 系统条线
      - - 德国 Zeitenwende —— €100B Sondervermögen
        - 增长驱动
        - 2022–2027
        - 专项基金绕开年度预算政治；创造可预期的多年采购空间
        - 核验 Sondervermögen 剩余未花余额，以及分配给 AI / 自主系统的比例
      - - 欧洲战略自主 —— 偏好主权 AI 供应商
        - 增长驱动
        - 2024–2030
        - 政治上要求非美国国防 AI 供应链；Helsing 相比 Palantir / Anduril 直接获得竞争护城河
        - 评估 BAAINBw 或 DE&S 招标标准中是否存在欧洲供应商正式采购偏好
      - - AI 赋能电子战需求
        - 增长驱动
        - 2024–2028
        - EW 对 AI 强依赖；面向 Eurofighter 的 Centaur AI 让 Helsing 卡位 NATO 最高优先级能力缺口
        - 核验 Eurofighter EK 升级时间线和合同金额；评估相对 Thales、BAE EW 部门的工作份额
      - - 无人机扩散与 NATO 标准化
        - 增长驱动
        - 2024–2027
        - HF-1 / HX-2 已在乌克兰投入作战，让 Helsing 有机会取得 NATO 无人机标准（STANAG）认证优势
        - 跟踪 NATO 无人机互操作协议；核验 Helsing 是否参与 STANAG 工作组
      - - EU AI Act 国防豁免
        - 增长驱动
        - 2024+
        - 第 2(3) 条将国家安全 / 国防用途排除在 EU AI Act 之外；无需 CE 标志或合格评定
        - 确认豁免适用于 Helsing 的具体产品；跟踪国防排除条款的拟议修订
      - - 国防采购周期长（2–5 年）
        - 约束
        - 持续
        - 授标比能力演示滞后 2–5 年；战场验证不会立刻转成收入
        - 获取已签订单积压与储备项目拆分；评估里程碑付款结构和收入确认政策
      - - 涉密壁垒影响市场规模测算和投资人尽调
        - 约束
        - 持续
        - 涉密项目结构阻碍公开核验合同金额、收入和市场规模测算准确性
        - 要求在 NDA 下提供经政府许可披露的合同摘要或管理账；核验公司披露的收入里程碑
      - - 出口管制 —— 欧盟两用物项法规 + Außenwirtschaftsgesetz
        - 约束
        - 持续
        - 限制 Helsing 只能部署给 NATO 阵营客户；若使用美国组件，存在 ITAR 污染风险
        - 审计组件供应链中的 ITAR 管制物项；评估出口许可证申请与批准时间线
    notes: 时间估计均为近似值；确切采购授标日期取决于涉密项目排期，公开报道无法取得。
