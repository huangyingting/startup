      - number: '8.3'
        title: 乐观、基准与悲观情景分析
        blocks:
          - type: paragraph
            body: >-
              三种情景圈定投资结果。乐观情景（权重大约 25%）：乌克兰战争持续到 2026-2027 年；德国 Sondervermögen 为 Helsing 产生 €500-800M 合同储备；收入达到
              €300-400M；LAWS 监管风险仍被控制在现有治理框架内；Helsing Series E 投后定价为 €20-25B。乐观催化剂是 FCAS AI 集成完成，并且至少一次 NATO 范围内将
              Helsing 软件标准化，形成网络效应收入倍数。基准情景（权重大约 50%）：乌克兰和俄罗斯在 2026 年签署停火；欧洲防务支出在 NATO 成员中稳定在约 GDP 2%；Helsing 新赢得两到三个
              NATO 成员国 MOD 合同；收入达到 €100-200M；€12B Series D 估值守住，并在 18-24 个月内以 €14-18B 投后完成 Series E。基准信号是，€12B Series D
              已经意味着市场按这一情景定价；在乌克兰需求环境下，12 个月内较 Series C 提升 7x 虽激进，但仍处于防务 AI 倍数的上沿。悲观情景（权重大约 25%）：停火后乌克兰需求下滑
              40-60%；Bloomberg 2025 年 4 月指控被 Bundeswehr 或乌克兰国防部的独立审查验证，移除参考客户可信度支柱；或联合国 CCW 在 2025-2026 年通过具有约束力的 LAWS
              协议，消除 Helsing 核心杀伤链产品差异化。任一触发因素单独或组合出现，都会把下一轮隐含估值压到 €3-6B，并要求全面复盘投资逻辑。乐观 / 基准 / 悲观情景表 TV003
              汇总假设、估值区间和下行触发因素。估值敏感性图 FV002 与估值 / 回报区间图 FV003 展示数值范围。
