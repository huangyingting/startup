      - number: '2.3'
        title: 买方与细分市场分析
        blocks:
          - type: paragraph
            body: >-
              国防 AI 采购呈两层结构：主权国防部控制规格和资金，主承包商（Airbus、BAE Systems、Rheinmetall、Leonardo、KNDS）作为 Tier-1 系统集成商，在总包国防项目下采购 AI
              子系统。Helsing 同时向两层销售。

              德国 Bundeswehr 是 Helsing 置信度最高的锚定买方。AI 系统采购通过 BAAINBw（Bundesamt für Ausrüstung, Informationstechnik und
              Nutzung der Bundeswehr）进行，BAAINBw 是德国联邦采购机构。Zeitenwende 特别基金（€100B Sondervermögen，2022 年 4
              月批准）以及德国持续把国防支出维持在 GDP 2%+ 的承诺，形成多年采购顺风。英国 MoD 合作已有报道，但合同金额未公开；英国 National AI Defence Strategy（2023
              年发布）把自主系统和 AI 赋能 ISR 列为采购重点。乌克兰武装部队通过盟友政府间资助渠道接收 Helsing HF-1
              无人机，使乌克兰成为一个由德国、英国和盟友对外军事援助预算支持的实际采购通道。Airbus Defence & Space 既是 Tier-1 集成商（FCAS 骨干、Wingman
              联合开发方），也是战略投资者，让 Helsing 嵌入 OCCAR（Organisation Conjointe de Coopération en matière
              d'ARmement）在德国、法国和西班牙的项目预算。

              NATO NSPA（NATO Support and Procurement Agency）代表了一个潜在多边采购渠道，可用于标准化、符合 NATO 标准的 AI 和无人机系统，但尚未有 Helsing 与
              NSPA 签署具体合同的报道。欧洲主承包商（Airbus、BAE、Rheinmetall、KNDS）通过子系统集成协议构成第二需求渠道。所有细分市场的采用触发点，是乌克兰实战证明与 NATO 2% GDP
              支出承诺的叠加：两者同时制造政治紧迫性和预算空间。
