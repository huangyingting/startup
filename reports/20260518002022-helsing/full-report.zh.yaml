  - number: 2
    title: 市场分析
    sections:
      - number: '2.1'
        title: 市场定义与范围
        blocks:
          - type: paragraph
            body: >-
              Helsing 所面对的国防 AI 市场包含三类相互关联的领域：（1）用于军事 ISR（情报、监视、侦察）和打击任务的自主无人机硬件与软件栈；（2）用于有人战斗机和海军平台的 AI
              赋能电子战（EW）与传感器融合软件；（3）由各国国防部和 NATO 部署的 AI 指挥控制（C2）与任务规划软件。Helsing 直接覆盖这三类。

              不在 Helsing 可服务市场内的领域包括：商用和农业 UAV、非国防网络安全 AI、物流和供应链 AI、消费级 AI 产品，以及没有软件 AI
              层的国防硬件（例如弹药、装甲、造船）。这些领域占国防总支出的多数，但对一家国防 AI 软件和自主系统供应商而言并不可进入。

              Helsing 产品的现状替代方案包括：既有国防软件平台（Palantir AIPs、L3Harris WESCAM systems、Thales Group mission
              systems）、采购机构内部开发项目（Bundeswehr IT center BAAINBw 内部项目），以及受主权和出口管制约束的美国来源自主系统（General Atomics Reaper、Shield
              AI Nova 衍生产品）。国防 AI 供应商可向相邻市场扩张，包括面向 EU 机构（Frontex）的边境监控、海岸警卫和海上 AI，以及面向盟友但非 NATO 伙伴（Australia、Japan、South
              Korea）的双用途 AI，前提是取得出口许可。

              欧洲国防 AI 市场由主权采购权定义——各国国防部控制准入，保密等级决定供应商能否参与，ITAR / EU
              双用途管制塑造欧洲主权供应商的竞争护城河。这种结构既是增长驱动因素（欧洲政府倾向欧洲供应商，以限制对美国公司的战略依赖），也是约束（保密项目结构限制可服务市场透明度）。
