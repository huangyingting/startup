      - number: '7.4'
        title: 人员、执行与声誉风险登记表
        blocks:
          - type: paragraph
            body: >-
              Helsing 存在明显核心人风险。联席 CEO Torsten Reil、Gundbert Scherf 与总裁 Niklas Köhler
              共同构成工程和战略领导核心；考虑到公司仍处于商业化前阶段，且政府关系管理至关重要，任何一位联席 CEO 或 CPO 离职都将构成重大不利事件。董事长 Daniel Ek 同时作为 Spotify
              创始人拥有高公众能见度，形成声誉压力：Vice 关于艺术家因 Ek 参与 Helsing 而抵制他的报道显示，致命 AI 争议已经直接影响 Helsing 从 ESG 敏感 LP 处募资、以及招聘对 AI
              武器化有公开担忧的顶尖机器学习人才的能力。Resilience Factories 项目的制造执行风险——从原型扩到每月 1,000+ 架
              HX-2——需要有经验的生产管理人才，而声誉复杂性让招聘更难。人员与执行风险登记表 TR004 列出核心人、人才和执行风险。Vice 与音乐人抵制语料中的反向立场信号确认，声誉风险已经发生，并非假设。
