  - number: 7
    title: 风险
    sections:
      - number: '7.1'
        title: 监管与法律风险登记表
        blocks:
          - type: paragraph
            body: >-
              Helsing 同时面对三条正在汇合的监管与法律风险线。第一，反对致命自主武器系统（LAWS）的国际运动正在实质推进：ICRC 自 2015
              年起呼吁为自主武器系统制定具有法律约束力的规则，建议禁止效果无法充分预测的武器，并明确反对自主锁定人员目标。Stop Killer Robots 联盟活跃于 70
              多个国家，正在联合国《特定常规武器公约》（CCW）框架下积极游说；联合国大会裁军委员会也在 2024 年举行了聚焦 LAWS 治理的会议。若 LAWS 条约具备约束力，将直接威胁 Helsing 的 HX-2 和
              HF-1 产品线。第二，国际人道法（IHL）合规是持续的作战约束：Helsing 的 AI 系统在战场落地时，必须遵守《日内瓦公约》下的区分、比例和预防原则。在 GPS
              欺骗和通信干扰等争夺激烈的电子战环境中，AI 系统可能误判目标或作出不成比例的打击决策，从而暴露在潜在 IHL 违规风险下。第三，欧盟和 NATO 的军民两用出口管制规则限制 Helsing
              产品的销售地点和方式；向非 NATO 市场扩张都需要出口许可证。NATO 2021 年《防务 AI 负责任使用原则》也为 Helsing 设定了必须对齐的治理框架。监管与法律风险登记表 TR001
              列出六项最高严重度风险，并标注概率、影响、缓释成熟度和剩余暴露。风险热力图 FR001 则横跨全部五个风险维度，为概率、影响和速度打分。
            claimRefs:
