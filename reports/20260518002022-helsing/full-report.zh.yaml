chapters:
  - number: 1
    title: 公司概览
    sections:
      - number: '1.1'
        title: 身份、使命与法律结构
        blocks:
          - type: paragraph
            body: >
              Helsing SE 是一家总部位于德国慕尼黑的欧洲国防人工智能公司。法律主体注册为 Societas Europaea（SE），这种超国家欧洲公司形态强化了公司的泛欧洲身份，也支撑其在国防 AI
              领域作为主权、非美国替代方案的战略定位。Helsing 在爱沙尼亚、法国和英国设有子公司，覆盖 NATO 东翼和欧洲关键国防市场。公司公开使命是开发 AI
              系统，帮助民主国家在现代战争中保持决定性技术优势，尤其是在高节奏、强对抗环境中降低士兵和飞行员的认知负荷。


              Helsing 的产品组合分为三类：（1）自主无人机系统，包括 HF-1 巡飞弹、具备蜂群能力的 HX-2 打击无人机，以及 SG-1 Fathom 自主水下航行器；（2）AI 软件平台，包括
              Altra（传感器融合与无人机连接）和 Centaur（战斗机 AI 副驾驶智能体）；（3）嵌入 Eurofighter Typhoon EK 的电子战 AI。2024 年，公司从纯 AI
              软件转向一体化无人机制造，在德国南部开设 Resilience Factory，初始产能每月超过 1,000 架 HX-2。这次从软件到系统的转向，意味着 Helsing 不再只是向政府主承包商授权
              AI，而是要自己成为纵向一体化的国防科技主承包商。


              截至 2025 年初，Helsing 员工约 900 人，较创立时三人团队扩张很快。员工分布在慕尼黑（总部）、伦敦、巴黎、塔林，以及支持乌克兰行动的前线办公室。公司未公开收入；作为私人公司，Helsing
              没有提交合并账目或披露财务表现的法定义务。已知合同收入来自德国政府采购（Bundeswehr）、对乌克兰的直接销售，以及与 Airbus、Saab 的合作协议。Helsing 的商业模式结合三类收入：（a）已部署
              AI 系统的政府国防合同，（b）无人机制造带来的按件硬件收入，（c）战略合作协议下的 AI 许可和服务。
