      - number: '5.2'
        title: 技术架构 —— AI 优先、软件层差异化
        blocks:
          - type: paragraph
            body: >-
              Helsing 的核心技术原则由 CPO Niklas Köhler 概括为：「把难题放在软件层解决，而不是电子硬件层。」实操上，Helsing 的 AI 系统设计目标是在 GPS
              信号被欺骗或干扰、无线电通信中断时仍能运行；这正是现代同级对手战争的主要威胁环境。核心 AI
              推理引擎吸收多模态传感器数据：红外图像、光电视频、声学信号（用于潜艇探测）和射频频谱。跨模态传感器融合让无人机和飞机即使在单个传感器退化时，也能拼出目标图像。HX-2 蜂群使用 Helsing
              的分布式协同算法，让多架设备在没有集中式指挥控制的情况下共同跟踪、接近并打击目标。Altra 平台把这套架构延伸给第三方无人机运营方，提供连接和融合层，统一不同平台的数据流。Centaur 将这套 AI
              决策栈接入驾驶舱，在高强度交战中向飞行员给出优先级排序的威胁评估和行动建议。Eurofighter Typhoon EK 的电子战 AI
              实时处理雷达辐射信号、识别发射源，并把反制选项推给单座飞行员；否则飞行员必须同时管理飞行和干扰任务，负荷过高。Helsing 于 2025 年 2 月宣布与法国大语言模型创业公司 Mistral AI
              建立战略合作，并把合作定位为欧洲 AI 主权的一部分。
