      - number: '3.3'
        title: 欧洲国防主承包商：既是竞争者也是伙伴
        blocks:
          - type: paragraph
            body: >
              传统欧洲国防主承包商——Airbus Defence & Space、Thales、Leonardo 和 Elbit Systems——相对 Helsing 处在结构性暧昧的位置：它们同时是 Helsing AI
              软件层最重要的潜在客户、最有能力把 AI 集成进现有平台的公司，也是受机构文化和 IP 控制偏好影响、最慢采用外部软件供应商的一群公司。


              Airbus Defence & Space 是 Helsing 生态中最具战略重要性的主承包商。2024 年，Airbus 与 Helsing 宣布独家合作，指定 Helsing 为 Airbus
              Wingman 自主无人机项目的 AI 软件提供商；Wingman 是无人忠诚僚机，设计用于在 FCAS 项目内与有人战斗机协同作战。该独家合作把 Airbus
              从竞争者转化为平台承载方和潜在放量渠道。但长期看，Airbus 仍保留竞争风险：随着 Wingman 项目成熟，Airbus 可能发展内部 AI 能力，或在软件层采用多供应商。


              Thales Group 是一家法国国防电子和 AI 公司，在法国、英国和澳大利亚拥有深厚欧洲政府关系。Thales 投资了 AI 决策支持系统（MAPS program）、自主无人机管理和电子战处理。与
              Helsing 不同，Thales 是一家年收入 $20B+ 的大型上市公司，已嵌入所有主要欧洲战斗机和海军项目。Thales 在电子战 AI 和传感器融合 AI 合同上与 Helsing
              直接竞争，但不太可能瞄准 Helsing 的巡飞弹硬件市场。


              Leonardo（意大利国防主承包商，收入 $16B）为意大利和 NATO 客户开发 Falco 无人机系列和 AI 指挥系统。与 Thales 类似，Leonardo 主要在软件和指挥层 AI 领域竞争，而
              Helsing 也活跃于此。意大利政府偏好国家冠军的产业政策，限制了 Helsing 直接进入意大利国防合同。


              Elbit Systems（以色列上市公司，市值 $9B+）是 AI 化程度最高的传统主承包商之一，拥有 Hermes 无人机系列、AI 赋能目标系统，以及在对抗环境中的大量实战经验。Elbit
              通过合作和许可生产进入欧洲国防市场。其经过实战验证的 AI 系统，是 Helsing HF-1/HX-2 产品在巡飞弹类别中的直接竞争对手。


              Helsing 与主承包商之间的竞争动态可以概括为：当欧洲政府更偏好敏捷、软件原生供应商而非传统集成商时，Helsing
              胜出；当采购要求完整生命周期支持、既有认证历史和部长级政治关系时，主承包商胜出。Helsing 最优策略是在主承包商形成有竞争力的内部 AI 能力之前，先嵌入由主承包商牵头的项目（正如它与 Airbus
              已经做到的那样）。
