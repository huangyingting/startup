      - number: '8.5'
        title: 退出就绪度、尽调问题与投资逻辑破裂触发因素
        blocks:
          - type: paragraph
            body: >-
              放在 2027-2029 年周期看，Helsing 的退出就绪度中等。Saab AB 的战略持股构成可信的 M&A 路径，即由 Airbus、Thales、Leonardo 或 Saab
              本身等欧洲防务主承包商收购，价格可能较上一轮私募价格溢价 1.5-2.5x。截至 2025 年，没有近期 IPO 信号；军民两用防务 AI 公司的监管复杂性，加上欧洲股票市场深度有限，使 2-3
              年内上市在结构上较难。早期投资人近期最有流动性的退出路径，是把老股卖给专业防务科技基金。表 TV005 列出五个投资逻辑破裂触发因素，并按重要性排序：经审计或管理层提供的披露确认收入低于
              €50M；Bloomberg 软件故障指控被 Bundeswehr 或乌克兰国防部独立审查验证；联合国 CCW 通过具有约束力的 LAWS 协议，覆盖 Helsing 当前杀伤链产品范围；2026
              年上半年没有签署新的 NATO 成员国政府合同；领投方 Prima Materia 在下一轮融资中下调估值或拒绝参与。任一单项触发都要求全面复盘投资逻辑，并在进一步证据出现前临时切换为「回避」。表 TV006
              优先列出五个最终尽调问题：2024 财年的经审计或管理层提供 ARR 与毛利率；乌克兰收入集中度占总合同储备的比例；来自独立 MOD 审查的 Bloomberg 指控佐证状态；覆盖当前和规划中杀伤链产品的
              LAWS / IHL 法律意见；以及 Series E 融资时间和估值锚点预期。当前小组立场是，在收集这五个优先问题的尽调证据之前，持续跟踪 Helsing 至 2026 年下半年 Series E
              准备阶段，不作投资承诺。
