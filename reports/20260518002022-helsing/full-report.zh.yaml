      - number: '8.2'
        title: 投资逻辑与反向逻辑分析
        blocks:
          - type: paragraph
            body: >-
              乐观逻辑建立在五个结构性支柱上。第一，2022 年后欧洲防务开支正在上修：德国已确认的 2025 年 €71.9B 国防预算和 €100B
              Sondervermögen，代表一代人一遇的采购抬升，并得到欧盟要求成员国提高防务支出、以及欧洲议会新防务支出框架的强化。第二，Helsing 已在德国和英国围绕 Eurofighter / Typhoon 与
              Future Combat Air System（FCAS）拿下 MOD 级合同，证明其在平台集成层面获得政府买方牵引。第三，Helsing 的 AI 优先软件架构、可在任意环境运行的边缘 AI 设计，以及来自
              DeepMind 和 Oxford 的技术团队，相比传统防务承包商形成了耐久护城河。第四，欧盟防务 AI 主权叙事——由欧盟《AI
              法案》防务豁免和欧盟防务基金强化——为总部在欧洲的供应商提供了专属结构性政策顺风。第五，Prima Materia 和 General Catalyst
              提供了可信的下一轮融资品牌和战略信号。反向逻辑则由五股力量支撑：Vice Media 关于投资人反对的负面报道反映 ESG 声誉风险；Bloomberg 2025 年 4
              月关于乌克兰软件故障和无人机定价过高的指控尚未被消解；完全缺乏收入或毛利披露，削弱独立验证投资逻辑的能力；Anduril 作为资本更充足的直接对手在欧洲扩张，构成竞争威胁；联合国 CCW 进程和 ICRC
              倡议带来 LAWS 监管禁令风险。投资逻辑 / 反向逻辑表 TV002 在五个维度上固化了完整论证对。
