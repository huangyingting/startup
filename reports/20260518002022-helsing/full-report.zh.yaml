  - number: 8
    title: 估值
    sections:
      - number: '8.1'
        title: 估值锚点与建议依据
        blocks:
          - type: paragraph
            body: >-
              Helsing 于 2025 年 6 月完成 Series D，本轮由 Prima Materia 和 General Catalyst 领投，新增资本 €600M，对应投后估值 €12B。截至 Series
              D，公司累计融资约 €1.37B：Series A 约 €100M（2021），Series B 为 €223M、投后 €1.7B（2023 年 9 月），Series C 为 €487M、投后 €5B（2024
              年 7 月），Series D 为 €600M、投后 €12B（2025）——不到十二个月较 Series C 提升 7x。Helsing 不公开披露 ARR、毛利率或合同储备，因此 €12B
              价格是一轮由叙事锚定的融资，无法用公开信息独立审计或用收入倍数验证。建议为「继续研究」，置信度中等、风险评级中高：Helsing 在欧洲防务 AI 的战略位置可信，融资财团成熟，Anduril 的 $28B
              Series F 提供了结构性可比上限，但商业透明度不足，无法对可出手的投资逻辑做稳健压力测试。Saab 战略持股构成可信的 M&A 退出路径。建议摘要表 TV001
              固化了建议、置信度、风险评级、建议持有期和投资逻辑破裂条件。建议逻辑图 FV001 追踪导向「继续研究」立场的主要证据向量。
