      - number: '6.3'
        title: 具名客户证明
        blocks:
          - type: paragraph
            body: >-
              Helsing 最可信的具名客户证据来自三段已量产或接近量产合同的关系。德国 Bundeswehr 的 Typhoon EK 合同记录最完整：德国采购办公室以单一来源方式授予 AI
              驱动电子战功能合同，Popular Mechanics、FlightGlobal 等多家可信媒体确认，德国政府也给出政治层面的确认。乌克兰武装部队关系是最大规模证明点：约 4,000 枚 HF-1
              在活跃冲突战区部署，构成欧洲 AI 公司已知最大规模的自主 AI 弹药部署。不过，公开渠道没有独立评估战场表现、目标识别准确率或故障率；Helsing 也没有发布试验结果或战后复盘。Airbus Wingman
              项目作为 Airbus 下一代无人作战飞机的独家安排，有充分文件记录，但仍处于开发阶段，没有服役飞机，也没有独立确认的作战结果。Saab 的 Project Beyond AI
              试验证据最弱：报道显示它是一次概念验证评估，没有公开的量产承诺、合同金额或时间表。两个缺口很重要：涉密防务场景下无法访问政府采购数据库记录；Helsing 这类防务 AI 软件也不存在 G2、Gartner
              Peer Insights 或类似独立评价渠道。
