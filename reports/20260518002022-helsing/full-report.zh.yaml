      - number: '5.4'
        title: 竞争性技术差异化
        blocks:
          - type: paragraph
            body: >-
              Helsing 的技术护城河建立在三项声称的差异化能力上。第一，在 GPS 不可用、通信受损的环境中运行 AI：Helsing 的算法在高度争夺的电磁环境里仍能工作，而同级对手战争大多发生在这种环境中。为宽松
              GPS 环境设计的西方商用无人机平台，在乌克兰经常被俄罗斯干扰击败；Helsing
              经过战场测试的产品，为这个问题提供了一个可运行解。第二，多域传感器融合：平台不是依赖单一传感器模态，而是整合红外、视频、声学和无线电信号，因此更能承受单个传感器失效或退化。第三，跨平台软件互操作：Altra
              能整合多个厂商无人机的数据，使 Helsing 成为 NATO 伙伴运营异构机队时不可或缺的集成层。主要竞争对手 Anduril（美国）也从自主能力和无人机蜂群角度竞争，但主要在美国采购渠道内运营；Helsing
              的欧洲监管地位和防务产业关系（Airbus、Saab）在欧洲采购中提供了结构性优势。2024 年 6 月签署的 Airbus Wingman 自主无人机项目独家合作，为 Helsing 提供了独立 AI
              创业公司难以获得的大平台入口。FCAS AI 骨干合同（2023 年 9 月）则巩固了 Helsing 在欧洲最具战略意义的下一代空中项目中的位置。不过，Bloomberg 在 2025 年 4
              月报道称，前员工和军事专家对无人机定价和软件可靠性提出担忧；该报道需付费订阅，且无法通过公开来源独立核验。
