  - number: 3
    title: 竞争对手
    sections:
      - number: '3.1'
        title: 国防 AI 竞争格局概览
        blocks:
          - type: paragraph
            body: >
              2024–2026 年的国防 AI 市场由三个清晰的竞争层级构成：美国本土国防科技创业公司（Anduril、Palantir、Shield AI）、设有 AI
              部门的传统国防主承包商（Airbus、Thales、Leonardo、Elbit、BAE Systems、Northrop Grumman），以及薄薄一层欧洲国防科技公司；Helsing
              是其中融资最多、能见度最高的进入者。


              仅 2024 年，美国国防科技公司合计融资就超过 $3B：Anduril 在 2024 年 8 月完成 $1.5B Series F，估值约 $14B（后续截至 2025 年 1 月被报道为
              $28B）；Palantir 2024 年 Q4 单季收入达到 $828M。这些公司受益于 $900B+ 美国国防预算和几十年的 DoD 采购关系。相比之下，Helsing
              主要在欧洲国防市场竞争。这里采购周期更长，预算历史上更小，主权产业政策既设置壁垒，也偏好欧洲公司。


              乌克兰战争之后，欧洲国防支出正在激增。NATO 成员整体承诺达到 GDP 2%+ 的国防支出目标，德国通过 €100B Sondervermögen 国防特别基金，欧洲国防预算预计到 2030
              年将持续刷新纪录。这波支出激增是 Helsing 最主要的市场顺风，但也吸引美国国防科技公司寻找盟国收入流。NATO Innovation Fund（面向双用途技术的 $1B）和 EU European
              Defence Fund 进一步加速竞争。


              国防 AI 市场本身 2024 年全球规模估计为 $15B，并将到 2030 年增长至 $50B+。Helsing 可服务的切片——欧洲 NATO AI 赋能系统——只是全球规模的一小部分，但 Helsing
              在关键平台（Eurofighter EK、FCAS、Saab Gripen、面向乌克兰的 HF-1/HX-2 无人机）中的战略位置，使其相对自身收入基础拥有不成比例的能见度。
