      - number: '4.2'
        title: 投资者基础、持股与战略一致性
        blocks:
          - type: paragraph
            body: >
              Helsing 的投资者基础是刻意集中、按战略目标挑选的，而不是广泛分散在常规 VC 基金之间。三类主要投资者占据大部分股权。


              **Prima Materia（约 17% 持股，领投方）：** Daniel Ek 的个人投资工具领投或共同领投了 Helsing 每一轮融资。Prima Materia 约 17% 持股——该数字自
              Series C 时起被报道——使其成为最大单一机构股东。Ek 担任 Helsing 联席董事长，形成主投人和治理角色重叠，这在典型 VC 支持公司中并不常见。2025 年 6 月 €600M 融资由 Prima
              Materia 领投，说明 Ek 对 Helsing 的个人承诺仍是每轮融资组团的锚。


              **General Catalyst（约 12% 持股）：** 这家美国 VC 领投 Series B 和 Series C，并截至 Series C 持有约 12%。General Catalyst
              的国防科技投资组合（其投资过 Anduril 和其他国防相邻公司）赋予其行业经验。连续两轮领投释放出强信念；但 GC 约 12% 持股意味着，若只按完全摊薄口径收回 1× 本金，Helsing 也需要以约
              €10B 或更高估值退出——这会推动其偏向高估值结果。


              **Saab（约 5% 持股，战略投资者）：** 这家瑞典航空航天与国防公司在 Series B 作为投资者和战略伙伴加入。Saab 5% 持股在财务上不大，但战略意义明显：它把 Saab
              的航空航天工程可信度嵌入 Helsing 的机构投资者画像，并形成双边技术关系（Helsing AI 进入 Gripen/Centaur 测试；Saab 雷达和平台系统可供 Helsing 集成）。Saab
              参与也向市场释放出欧洲主承包商阵营认可 Helsing 技术可信度的信号。


              **Accel、Lightspeed 和其他投资者（Series C 参与者）：** 这些传统 VC 基金在 Series C 加入；单个持股规模未公开披露。它们以 €5B 估值参与，说明市场信心较广，但也反映了
              2024 年欧洲国防科技投资热潮，而不是只针对 Helsing 的独特信念。


              投资者构成有一个值得注意的结构特征：缺少与美国政府相连的主权财富基金，或与 NATO 相邻的机构投资者。这与 Helsing 的欧洲主权定位一致，但如果公司未来需要来自直接拥有欧洲国防部关系的投资者资金（例如
              European Investment Bank 或 European Defence Fund 共同投资结构），可能出现融资缺口。
