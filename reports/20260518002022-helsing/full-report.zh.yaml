  - id: FE001
    title: 产品架构图 — Helsing AI 软件栈
    type: stack
    layout: wide
    summary: 从底层硬件生产，到 AI 核心，再到顶层特定任务应用的分层栈，展示 Helsing 的软件层战略如何在 多条产品线复用 AI 能力。
    data:
      layers:
        - label: 硬件与制造层
          detail: >-
            Resilience Factory（HX-2 每月 >1,000 台）；乌克兰伙伴（HF-1）；SG-1 Fathom 硬件； Saab / Airbus 平台（Centaur / Wingman）。Helsing
            不拥有电子制造——机体、传感器、 电机由伙伴提供。
        - label: 传感器融合核心
          detail: 多模态输入：红外、光电视频、声学（Lura）、射频。实时跨传感器融合加权；在单个传感器退化 或被干扰时仍可运行。
        - label: AI / ML 推理引擎
          detail: GPS 拒止环境下的自主导航与目标指示；蜂群协同协议；用乌克兰作战数据训练。在 GPS 和通信 受扰的对抗性 EW 环境中运行。
        - label: 连接与集成层（Altra）
          detail: 跨供应商无人机连接平台。面向第三方 OEM 的开放 API。统一异构机队数据流；支撑 NATO 互操作性。
        - label: 任务应用层
          detail: HX-2 打击 / 蜂群；HF-1 巡飞弹；SG-1 Fathom ASW；Centaur 战斗机 AI；Eurofighter Typhoon EK 的 EW AI。每个任务应用共享 AI / ML 推理核心。
    claimRefs:
      - CE021
      - CE014
      - CE022
    notes: 层边界来自分析师对公开技术访谈和产品描述的解读；Helsing 未发布架构文档。
  - id: FE002
    title: 客户工作流 / 作战流程 — HX-2 打击无人机任务周期
    type: flow
    layout: wide
    summary: 从任务下达到 AI 赋能交战的作战流程，展示 Helsing 的 GPS 拒止自主层如何在每一步替代人在回路。
    data:
      nodes:
        - id: n1
          label: 任务下达
          detail: 操作员分配目标区域和交战参数；HX-2 蜂群通过加密链路接收任务简报
          type: step
        - id: n2
          label: 发射与初始导航
          detail: HX-2 在可用时使用 GPS 进入目标区；若检测到干扰，自主切换到惯性 / 视觉导航
          type: step
        - id: n3
          label: GPS / 通信拒止区
          detail: 对手 GPS 干扰和 RF 压制生效；常规无人机在此无法运行
          type: decision
        - id: n4
          label: AI 自主目标指示
          detail: Helsing AI 融合 IR 和 EO 传感器数据，在无 GPS 情况下识别并分类目标；蜂群成员共享传感器数据
          type: step
        - id: n5
          label: 蜂群协同
          detail: 多架 HX-2 通过分布式协同协议协作分配目标；无需集中式通信
          type: step
        - id: n6
          label: 交战或巡飞
          detail: 被选中单元实施打击，或继续巡飞以收集更多情报；任务结果记录下来，用于 AI 再训练
          type: step
    claimRefs:
      - CE006
      - CE022
      - CE024
    notes: 工作流根据产品描述和 TechCrunch 作战报道推断。Helsing 未发布操作员手册、交战规则或技术飞行测试数据。
