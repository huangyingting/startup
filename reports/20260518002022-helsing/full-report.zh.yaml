  - id: TV005
    title: 投资逻辑断裂与终止触发项表
    summary: Five events that individually mandate a full thesis review and provisional avoid stance.
    columns:
      - 触发项
      - 阈值
      - 对投资逻辑的传导
      - 行动含义
    rows:
      - - 收入低于底线
        - 经审计或管理层确认的 2024 财年 ARR 低于 €50M
        - €12B 估值意味着收入倍数超过 200x；没有可辩护可比对象
        - 全面复核投资逻辑；暂时切换为回避
      - - Bloomberg 报道经独立国防部审查证实
        - Bundeswehr 或乌克兰国防部独立确认软件故障或定价过高
        - 标杆客户可信度被清除；主要收入驱动受损
        - 全面复核投资逻辑；需求侵蚀情景启动
      - - UN CCW 通过具约束力的 LAWS 议定书
        - 议定书禁止或严重限制 Helsing 当前部署的 AI 杀伤链产品
        - 核心产品差异化被抹平；产品重设计成本未知
        - 全面复核投资逻辑；无论收入状态如何都启动悲观情景
      - - 2026 年上半年没有新的 NATO 成员国政府合同
        - 到 2026 年 6 月 30 日新增国防部级已签合同为零
        - 商业牵引叙事破裂；对 Bundeswehr 的依赖集中加深
        - 下调为观察，直到出现新合同证据
      - - 领投方撤出
        - Prima Materia 下一轮融资拒绝参与或下调估值
        - 释放内部人看空估值或商业轨迹的信号
        - 全面复核投资逻辑；再融资路径不确定
    notes: 触发阈值是作者定义的监测标准，以可公开验证信号为锚。
