  - number: 5
    title: 产品与技术
    sections:
      - number: '5.1'
        title: 产品组合——横跨空中、海上与软件的六个平台
        blocks:
          - type: paragraph
            body: >-
              Helsing 目前的产品组合横跨六个独立平台。HF-1 是一款巡飞弹，采用胶合板机身以压低成本，并配有 AI；即使 GPS 和通信被干扰，AI 仍能运行。HF-1 由 Helsing
              与乌克兰产业界联合开发，截至 2025 年初，约 4,000 架已在乌克兰实战部署。HX-2 是能力更强的打击无人机，具备群体智能能力，可以在没有实时人工控制的情况下协调多机行动。乌克兰在 2024 年 9
              月订购了超过 4,000 架 HX-2；到 2025 年 2 月，投产数量已超过 6,000 架。SG-1 Fathom 是一款自主水下航行器（AUV/UUV），重 60 公斤、长 2 米，使用 Helsing
              称为 Lura 的声学 AI 系统，面向 90 天潜航任务。Altra 是一个软件平台，把不同厂商的无人机接入同一层传感器融合网络；联席 CEO Niklas Köhler 称，Helsing
              正是靠这一机制在不拥有自研电子硬件的情况下交付价值。Centaur 是一个 AI 智能体，帮助战斗机飞行员处理复杂的实时决策；它在 2025 年 5 月和 6 月的 Project Beyond 实战试验中，装上
              Saab JAS 39 Gripen 接受测试。最后，Helsing 于 2024 年 6 月获得德国 Bundeswehr 的单一来源合同，为单座 Eurofighter Typhoon EK 开发 AI
              驱动的电子战能力，减轻飞行员在任务中分析雷达的认知负荷。
