      - number: '2.2'
        title: 市场规模与 TAM/SAM 分析
        blocks:
          - type: paragraph
            body: >-
              全球国防 AI 市场估算因口径和方法差异很大。MarketsAndMarkets 估算，2024 年全球军事 AI 市场约 $10.4B，并预计到 2033 年增长至 $38.4B，CAGR 为
              13.8%。Statista 更宽口径的估算把 2023 年全球规模放在 $9.4B，并预计到 2032 年达到 $38.9B，隐含 CAGR 约 17%。这些估算分化，是因为范围定义不同：有些纳入所有与 AI
              相邻的国防技术（卫星图像处理、物流优化），有些则只聚焦战术边缘的 AI 推理。两者都没有给出欧洲专门拆分，也没有单独剥离 AI 软件和自主系统子类别。

              更可靠的自上而下锚点来自 SIPRI 的 2025 年军费数据：欧洲 NATO 成员国 2024 年国防支出合计 €383B（$415B），较 2023 年实际增长 9.6%，为冷战以来最大单年增幅。NATO
              联盟总支出达到 $1.47T。德国 2024 年国防预算为 €72.8B，按绝对值为 NATO 第二大支出国。但公开报道中没有权威拆分能把这笔总额分解到 AI 专项拨款——AI 采购嵌在保密项目条线中。

              若保守假设 AI 软件和自主系统占欧洲 NATO 国防支出的 1.5–2.5%，欧洲国防 AI 的 SAM 约为每年
              €5.7–9.6B（$6.2–10.4B）——比典型分析师估算更宽，因为这里纳入了保密项目的完整管线。Helsing 近期 SOM 由已确认的德国 Bundeswehr 无人机合同、英国 MoD AI
              合作，以及通过政府间渠道进行的盟友乌克兰无人机采购支撑。每年 $200–650M 的 SOM 是一个合理的近期捕获率，但公司未公开任何收入数字。Palantir 2024 年美国政府收入
              $828M（全年，公开申报）可作为一个已规模化国防 AI 软件玩家的同代锚点，尽管其市场和产品与 Helsing 有实质差异。

              重大不确定性仍在：保密项目阻碍独立测算，分析师 TAM 估算可信度较低。相互矛盾的估算（基线 9.4B vs 10.4B，2032 年 38B vs 39B）反映的是口径假设不同，而不是数据不同。唯一可靠锚点是
              SIPRI 总支出数据（高置信度，官方国家预算）和 Palantir 美国政府业务这个并不完美的代理。没有保密权限，无法根据已公布项目预算自下而上推导 SAM。
