      - number: '1.4'
        title: 关键里程碑与战略演进
        blocks:
          - type: paragraph
            body: >
              Helsing 从创立到 €12B 估值只用了四年，其轨迹可分为三个战略阶段：（1）隐身与发布（2021 年），公司带着预先组建的团队和即时机构可信度亮相；（2）政府合同验证（2022–2024
              年），Helsing 将 AI 软件能力转化为与德国 Bundeswehr、乌克兰 MoD 和欧洲国防主承包商的标志性合同；（3）制造扩产（2024 年至今），公司从 AI 软件授权转向一体化无人机生产。


              按类别看，关键里程碑包括：创立里程碑为 2021 年 3 月在慕尼黑注册成立，以及 2021 年 11 月 €100M Series A，使 Helsing 从第一天起就成为欧洲融资最多的国防 AI
              创业公司。产品里程碑包括 2023 年开发 HF-1（后续在乌克兰部署的巡飞弹）、2024 年推出具备蜂群能力 AI 的 HX-2、德国南部 Resilience Factory 开业（2025 年 2
              月，月产能 1,000+），以及 2025 年 5–6 月 Centaur AI 智能体在 Saab JAS 39 Gripen 上完成战斗试验。合作里程碑包括 Saab 战略投资（2023 年 9
              月）、Airbus 独家 Wingman 合作（2024 年 6 月）和 Mistral AI 战略合作（2025 年 2 月）。政府合同里程碑包括 FCAS AI 骨干合同（2023 年 9
              月）、Eurofighter Typhoon EK 电子战 AI 合同（2024 年 6 月）、德国为乌克兰承销 4,000 架 HF-1 无人机（2025 年 2 月），以及乌克兰订购 4,000+ 架
              HX-2（2024 年 9 月）。


              负面事件具有实质影响：2021 年，音乐人针对 Daniel Ek 参与 Helsing 发起抵制，带来显著负面媒体报道，并把 Helsing 卷入关于战争中使用 AI 的更大争论，争论延续至今。2024
              年，Rheinmetall 合作据称告吹，转而由竞争对手 Auterion 取代——这说明并非所有计划中的产业合作都会落地。2025 年 4 月，Bloomberg
              发表负面报道，援引前员工说法，指称无人机定价过高、软件质量存在问题、组织成长伴随阵痛。截至本报告时，公司未公开回应这些指控。从 AI 软件核心能力转向无人机硬件制造，也引发分析师质疑：Helsing
              是否把使命拉得过宽，制造复杂度可能稀释工程重心。
