  - id: TV006
    title: 最终尽调问题表
    summary: Five prioritised diligence asks before any upgrade to track or above.
    columns:
      - 问题
      - 需要什么
      - 为什么重要
      - 若证实对投资逻辑的影响
    rows:
      - - ARR 与毛利率披露
        - 经审计或管理层提供的 2024 财年收入与毛利率
        - 可验证收入倍数，并与 Palantir / Anduril 做可比基准
        - 确认或推翻 €12B 估值在当前倍数区间内合理
      - - 乌克兰收入集中度
        - 来自乌克兰的收入占 2024 年合同积压总额比例
        - 若高于 40%，停火情景下需求坍塌就是重大投资逻辑风险
        - 量化悲观情景概率；支撑情景权重
      - - Bloomberg 报道佐证状态
        - Bundeswehr 或乌克兰国防部对 2025 年 4 月指控的独立审查
        - 未解决的负面报道是重大产品质量风险
        - 有利解决将移除悲观触发项；负面确认将触发投资逻辑断裂
      - - LAWS / IHL 法律意见
        - 覆盖当前及计划中杀伤链产品的独立 IHL 法律意见
        - 没有法律评估，UN CCW 流程带来的监管风险无法量化
        - 将 LAWS 风险降至可管理合规成本，而非生死级产品禁令
      - - Series E 融资预期
        - Series E 的时间、估值锚和投资者联盟
        - 决定持有期稀释路径和下一次上调估值触发项
        - 定义 18-24 个月投资窗口内退出或继续持有决策
    notes: 尽调问题由作者按对投资逻辑的重要性排序；可随新证据修订。
