      - number: '5.5'
        title: 信任、安全、合规与开放技术缺口
        blocks:
          - type: paragraph
            body: >-
              Helsing 处在 AI 与致命自主武器的交叉点上，一方面赢得合同，另一方面承受声誉审视。公司认可 NATO 2021 年《防务 AI
              负责任使用原则》，其中要求合法性、责任、可解释性、可追溯性、可靠性和可治理性。Helsing 也从早期开始建立内部伦理顾问流程，但这一流程的成员构成和产出并未公开披露。欧盟《AI 法案》为高风险 AI
              系统引入义务；军民两用防务 AI 仍处在监管解释中，而且该法案的防务豁免比许多公司预期更窄。出口管制合规受德国和欧盟法规约束，所有硬件出口都需要具体许可证。负面一侧，音乐人和创意专业人士在 2021
              年因担忧自主武器开发，抵制 Spotify 创始人 Daniel Ek 的投资，包括 Helsing，由此形成持续的声誉压力。几个关键技术缺口仍未补上：Helsing
              没有公布任何无人机平台的可靠性率、平均故障间隔时间或独立测试评估结果。SG-1 Fathom 的量产就绪度和作战时间表未获公开确认。Helsing 的 ML
              训练基础设施规模和架构也未披露。围绕致命自主武器系统的国际法律争议仍未解决，并在联合国《特定常规武器公约》层面持续推进，给整个品类增加了监管尾部风险。
            claimRefs:
              - CE028
              - CE029
              - CE034
          - type: table
            tableRef: TE004
            claimRefs:
              - CE030
              - CE031
  - number: 6
    title: 客户情况
    sections:
      - number: '6.1'
        title: 客户基础分层
        blocks:
          - type: paragraph
            body: >-
              截至 2026 年中，Helsing 的客户基础集中在 NATO 阵营政府国防部和欧洲防务主承包商。主要付费客户是德国 Bundeswehr；它在 2024 年 6 月为 Helsing 的
              Eurofighter Typhoon EK 变体 AI 电子战软件授予单一来源生产合同，随后又在 2024 年 9 月启动 FCAS AI 骨干项目。乌克兰武装部队是 Helsing 最大规模的部署方：约
              4,000 枚 HF-1 巡飞弹已经交付并投入实战，另有 4,000 多架 HX-2 蜂群无人机订单于 2024
              年末签署。不同平台的买方、用户和付款方结构并不相同：在乌克兰项目中，德国政府（BMVg）作为付款方共同资助采购，而乌克兰武装部队单位是直接作战用户。Airbus Defence and Space 拥有
              Wingman 无人作战飞机的独家合作关系，同时承担工业伙伴、收入来源和 NATO 空域无人机项目市场路径三种角色。Saab AB 既是投资人也是试点客户，在 Project Beyond 下评估 Helsing
              的 Centaur AI 用于 Gripen JAS-39。整体看，组合覆盖两支欧洲军队（Bundeswehr、乌克兰武装部队）和两家防务主承包商（Airbus、Saab），FCAS
              又通过法德西联合体提供了第三个国家级项目客户。目前没有公开确认的商业或民用客户。
