      - number: '2.4'
        title: 增长驱动因素与采用约束
        blocks:
          - type: paragraph
            body: >-
              最主要的增长驱动因素是俄乌战争：它大规模验证了 AI 辅助无人机战，证明在对抗空域中无人机蜂群相对有人平台任务具备 10:1 成本优势，并在 NATO 内部制造了紧迫需求信号。SIPRI 数据显示，2025 年
              32 个 NATO 成员中已有 23 个达到 GDP 2% 的国防支出承诺，高于 2023 年的 11 个——政治承诺正在转化为采购预算。欧洲 NATO 成员国 2024 年实际支出增长 9.6%，德国
              Zeitenwende 政策通过 Sondervermögen 追加 €100B 投资。EU AI Act 对国防的明确豁免（第 2(3) 条）意味着国防 AI 供应商在 EU
              法下不面临产品安全监管障碍——相比商业 AI 领域，这是有意义的比较优势。NATO 的 AI 战略和负责任国防 AI 原则，为主权欧洲国防 AI 投资提供了合法化框架。

              采用约束是结构性的，而且会长期存在。采购周期从规格制定到合同授予通常需要 2–5 年，使任何单季度收入预测几乎不可能。EU 双用途法规（Regulation 2021/821）和德国
              Außenwirtschaftsgesetz 下的出口管制限制了向 NATO 对齐客户之外部署，从地理上封顶了可服务市场。美国来源组件带来的 ITAR
              污染风险，可能进一步限制技术转让和第三方销售。Campaign to Stop Killer Robots——一个覆盖 68 个国家、270+ 个组织的联盟，其中包括 stopkillerrobots.org
              网络——代表持续声誉压力，可能影响人才招聘，并在敏感出口市场制造政治摩擦。REAIM 宣言（2023 年 6 月，57 个签署方）增加了政治合规预期：无法证明负责任 AI 流程的供应商，可能被 REAIM
              对齐国家的采购流程排除。最后，保密项目结构阻止外界公开核验市场规模、合同积压和财务健康——这些都是重大尽调缺口，分析师和投资者若没有政府保密准入或发行方直接披露，无法解决。
