      - number: '1.2'
        title: 创始人、领导层与治理
        blocks:
          - type: paragraph
            body: >
              Helsing 于 2021 年 3 月由三位核心创始人共同创立，这套互补背景是刻意拼出的组合，目的是打通 AI 研究和欧洲国防建制之间的断层。Torsten Reil（联合 CEO）拥有 University
              of Oxford 计算生物学博士学位，曾联合创办动作合成 AI 公司 NaturalMotion，并在 2012 年以 $527M 出售给 Zynga。Reil 的学术和创业履历，让 Helsing 在 AI
              研究界和机构投资者面前具备技术可信度。Gundbert Scherf（联合 CEO）曾任德国联邦国防部高级顾问和 McKinsey 合伙人，使 Helsing 能直接触达欧洲国防采购、政策网络和 NATO
              互操作要求。Niklas Köhler（总裁兼首席产品官）负责机器学习工程，是支撑 Helsing 产品套件的核心 AI 架构负责人。三人分担联合 CEO 与 CPO
              的结构并不常见，尽调需要盯紧治理问题：公司放大后，共享领导权历史上容易产生协同摩擦；但在 Helsing 的案例里，功能分工看起来清晰——Reil 负责外部可信度，Scherf 负责政府关系，Köhler
              负责产品。


              Spotify 创始人、欧洲最知名科技企业家之一 Daniel Ek 担任 Helsing 董事会主席，并通过其家族投资工具 Prima Materia 投入公司首笔 €100M。Ek 的主席身份给
              Helsing 带来了与公司规模不成比例的品牌能见度，也帮公司接入欧洲机构和企业投资者网络。但他的参与也引发争议：2021 年，包括 Paul McCartney、Brian Eno 和 Radiohead
              在内的多名音乐人公开批评 Spotify CEO 资助一家军事 AI 公司，带来负面媒体报道。Ek 没有公开回应，也没有撤回投资。截至 2025 年中，Prima Materia 是 2025 年 6
              月该轮融资的领投方，并仍是 Helsing 最大单一股东，持股约 17%。


              关键人物风险体现在多个维度。Reil 的公共形象是投资者关系和媒体叙事的核心。Scherf 的政府触达本身就是直接竞争护城河，一旦离职很难复制。Köhler 掌握技术路线图和 AI
              架构的组织知识。公司未披露公开的继任计划或治理文件。除 Daniel Ek 和 General Catalyst 投资者代表之外，董事会构成没有公开文件；Helsing 也未发布任何
              ESG、治理或董事会透明度报告。
