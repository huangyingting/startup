      - number: '7.5'
        title: 竞争格局、缓释措施与否决条件
        blocks:
          - type: paragraph
            body: >-
              Helsing 面对资本雄厚的美国竞争对手。Anduril Industries 在 2025 年 1 月以约 $28B 估值完成 $1.5B Series F，由经验丰富且与 Pentagon
              关系深厚的防务科技团队领导，并已推出重叠产品，包括 Lattice AI 融合软件、自主无人机和自主水下航行器。Shield AI（$2.7B，自主战斗机 AI）也占据 Helsing
              可服务空间的一部分。Palantir 公开市场市值 $70–100B，与美国 / NATO 政府关系深厚，主导防务 AI 分析。Helsing 的欧洲优先叙事是真实差异化——欧盟主权焦虑为非美国防务 AI
              创造结构性需求——但资本实力更强的美国进入者带来的竞争风险也真实存在。关键缓释因素包括 Saab 战略持股（降低 Gripen 集成风险）、Airbus Wingman 排他性、德国 €100B
              Bundeswehr Sondervermögen 带来的近期已资助需求，以及 Helsing 军民两用软硬件栈形成的切换成本。Helsing 投资逻辑的否决条件包括：（i）具有约束力的 LAWS 条约禁止
              Helsing 的 HX-2 和 HF-1 产品类别；（ii）Bloomberg 级别的负面调查获得佐证，并导致合同暂停或关键投资人退出；（iii）Anduril 进入欧洲市场并打破 Helsing 的 NATO
              客户排他性；（iv）乌克兰停火叠加德国 Sondervermögen 重新分配。缓释措施与否决条件表 TR005 列出上述内容。
