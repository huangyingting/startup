      - number: '7.3'
        title: 合作伙伴与依赖风险登记表
        blocks:
          - type: paragraph
            body: >-
              Helsing 的收入和战略定位集中在少数国家和伙伴关系上，每一项都带有显著的集中度和交易对手风险。德国（通过 Bundeswehr 采购和 Eurofighter EK AI 合同）与乌克兰（通过 HX-2 和
              HF-1 部署）合计代表了 Helsing 披露的收入型关系中的大部分。乌克兰战争若停火或降级，将显著降低基辅采购无人机的紧迫性。2025 年 2 月，Trump
              政府政策转向引发美乌关系紧张，并传导到欧洲防务供应链。Saab 的 5% 战略持股和 Airbus 的 Wingman 项目合作构成技术和项目依赖；2024 年流产的 Rheinmetall
              制造合作说明这类伙伴关系带有执行风险。Prima Materia（约 17%）和 General Catalyst（约 12%）合计持有 Helsing 约 29%
              股权，形成投资人集中风险：这些领投方的情绪变化可能让未来融资复杂化。NATO 2% GDP 承诺的遵守取决于政治环境，关键盟友政府更迭后可能逆转。合作伙伴与依赖风险登记表 TR003
              列出五项最主要依赖风险。依赖地图 FR003 可视化 Helsing 的关键外部依赖和失败场景。
