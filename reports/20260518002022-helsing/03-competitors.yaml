company:
  name: Helsing

chapter:
  order: 3
  number: 3
  title: Competitors
  summary: >-
    Helsing occupies a structurally distinct niche in the defense AI landscape: a European-native,
    software-first company with growing hardware integration, serving NATO-aligned governments
    exclusively. Its primary US rivals — Anduril, Palantir, and Shield AI — are larger, better
    funded, and US-DoD-centric; none possesses Helsing's European sovereign positioning or its
    combined soft-hard product stack. Legacy European primes (Airbus, Thales, Leonardo, Elbit)
    are both competitors for defense AI contracts and strategic partners, a structural duality that
    defines Helsing's go-to-market in Europe. The key competitive risk is the US defense tech
    migration into Europe via allied-nation programs and NATO frameworks.

sections:
  - id: SP-landscape
    title: Defense AI Competitive Landscape Overview
    body: >
      The defense AI market in 2024–2026 is characterized by three distinct competitive tiers:
      US-native defense tech startups (Anduril, Palantir, Shield AI), legacy defense primes with
      AI divisions (Airbus, Thales, Leonardo, Elbit, BAE Systems, Northrop Grumman), and a thin
      layer of European defense tech companies, of which Helsing is the best-funded and most
      visible entrant.


      The US defense tech cohort collectively raised more than $3B in 2024 alone: Anduril closed
      a $1.5B Series F in August 2024 at a ~$14B valuation (later reported at $28B as of January
      2025), while Palantir posted $828M in quarterly revenue in Q4 2024. These companies benefit
      from access to the $900B+ US defense budget and decades of DoD procurement relationships.
      By contrast, Helsing competes primarily in European defense markets where procurement cycles
      are longer, budgets historically smaller, and sovereign industrial policy creates both
      barriers and preferences that favor European companies.


      Post-Ukraine, European defense spending is surging. NATO members as a whole committed to
      2%+ GDP defense targets, Germany passed a €100B Sondervermögen special defense fund, and
      European defense budgets are projected to reach record levels through 2030. This spending
      surge is Helsing's primary market tailwind, but it also attracts US defense tech companies
      seeking allied-nation revenue streams. NATO's Innovation Fund ($1B for dual-use tech) and
      the EU's European Defence Fund further accelerate competition.


      The defense AI market itself is estimated at $15B globally in 2024, growing toward $50B+
      by 2030. Helsing's addressable slice — European NATO AI-enabled systems — is a fraction of
      the global figure, but Helsing's strategic positioning in key platforms (Eurofighter EK, FCAS,
      Saab Gripen, HF-1/HX-2 drones for Ukraine) gives it disproportionate visibility relative to
      its revenue base.
    claimRefs: [CP001, CP002, CP003, CP004, CP005]
    tableRefs: [TP001]
    figureRefs: [FP001]

  - id: SP-us-rivals
    title: "Head-to-Head: Helsing vs US Defense Tech Startups"
    body: >
      Anduril Industries is the most frequently cited Helsing comparable: both are defense tech
      startups founded to bring software-first thinking to physical defense hardware, both target
      autonomous systems and AI command-and-control. But the parallels end quickly. Anduril was
      founded in 2017 (four years before Helsing), has raised $4.6B+ cumulatively (roughly
      3.5× Helsing's €1.37B total), and operates at a scale (estimated revenues $500M+) that
      Helsing has not yet disclosed. Anduril's core product — the Lattice OS AI command-and-control
      platform connecting autonomous drones (Roadrunner jet-powered interceptor, Ghost-X loitering
      munition) — is conceptually comparable to Helsing's Altra software platform plus HF-1/HX-2
      hardware stack, but Anduril is US-DoD-focused with allied-nation expansion as a secondary
      priority. Helsing's claim to European sovereign supply chains and GDPR-compliant on-premise
      data handling is a genuine differentiator in European NATO procurement.


      Palantir Technologies is a public company (NYSE: PLTR, market cap ~$300B as of 2025) with
      three decades of intelligence community relationships in the US and UK. Its Gotham platform
      serves classified government intelligence analysis; Foundry serves enterprise data operations;
      and AIP (Artificial Intelligence Platform) launched in 2023 as its US Army / DoD AI layer.
      In the UK, Palantir operates the National Health Service data partnership and holds the Maven
      Smart System (MSS) contract with the UK Ministry of Defence. Palantir's scale, brand, and
      government relationships make it a formidable competitor on large multi-year NATO analytics
      contracts. However, Palantir does not produce physical autonomous weapons systems — it sells
      software and analytics, not strike drones. This makes Palantir a direct competitor on
      AI-for-command and AI-for-EW (electronic warfare), but not on the hardware/lethality side
      of Helsing's portfolio.


      Shield AI, founded in 2015, develops HIVEMIND autonomous flight software and V-BAT
      unmanned aircraft. It completed autonomous F-16 flight trials and targets US DoD autonomy
      programs. Shield AI's $2.7B valuation (2024) and US military focus make it a smaller but
      directly comparable autonomous systems competitor. Unlike Helsing, Shield AI does not have
      a meaningful European footprint or strategic government partnerships in the EU/NATO framework.


      The structural competitive advantage Helsing holds over all three US rivals in European
      markets is regulatory and political: European defense procurement authorities apply increasing
      pressure for European sovereign digital infrastructure in weapons systems, limiting US software
      companies in the most sensitive platform integrations. Helsing's legal incorporation as a
      Societas Europaea (SE), its exclusive partnerships with Airbus (Wingman) and Saab (investor),
      and its German government anchor contracts provide a political-moat that is hard for US rivals
      to replicate quickly.
    claimRefs: [CP006, CP007, CP008, CP009, CP010, CP011, CP012]
    tableRefs: [TP002]
    figureRefs: [FP002]

  - id: SP-primes
    title: European Defense Primes as Competitors and Partners
    body: >
      The legacy European defense primes — Airbus Defence & Space, Thales, Leonardo, and Elbit
      Systems — sit in a structurally ambiguous position relative to Helsing: they are simultaneously
      the most significant potential customers for Helsing's AI software layers, the companies best
      positioned to integrate AI into existing platforms, and the slowest to adopt external software
      vendors due to institutional culture and IP control preferences.


      Airbus Defence & Space is the most strategically important prime in Helsing's ecosystem. In
      2024, Airbus and Helsing announced an exclusive partnership making Helsing the AI software
      provider for Airbus's Wingman autonomous drone program — the unmanned loyal wingman designed
      to operate alongside crewed fighters within the FCAS program. This exclusive partnership
      converts Airbus from a competitor into a platform host and potential volume channel. However,
      Airbus retains competitive risk in the long run: as the Wingman program matures, Airbus could
      develop internal AI capabilities or multi-source the software layer.


      Thales Group is a French defense electronics and AI company with deep European government
      relationships in France, the UK, and Australia. Thales has invested in AI decision support
      systems (MAPS program), autonomous drone management, and electronic warfare processing.
      Unlike Helsing, Thales is a large public company with $20B+ in annual revenue and existing
      integration into every major European fighter and naval program. Thales competes directly
      with Helsing on AI-for-EW and AI-for-sensor-fusion contracts, but is unlikely to target
      Helsing's loitering munition hardware market.


      Leonardo (Italian defense prime, $16B revenue) develops the Falco drone family and AI
      command systems for Italian and NATO customers. Like Thales, Leonardo primarily competes in
      the software and command-layer AI space where Helsing is also active. The Italian
      government's industrial policy preference for national champions limits Helsing's direct
      access to Italian defense contracts.


      Elbit Systems (Israeli public company, $9B+ market cap) is one of the most AI-forward
      legacy primes, with the Hermes drone family, AI-enabled targeting systems, and substantial
      operational experience in contested environments. Elbit operates in European defense markets
      through partnerships and licensed production. Its combat-proven AI systems are a direct
      competitor to Helsing's HF-1/HX-2 products in the loitering munition category.


      The competitive dynamics between Helsing and the primes can be summarized as: Helsing wins
      when European governments prefer agile software-native vendors over legacy integrators;
      primes win when procurement requires full lifecycle support, existing certification histories,
      and political relationships at the ministerial level. Helsing's best strategy is to embed
      into prime-led programs (as it has done with Airbus) before the primes develop competitive
      internal AI capabilities.
    claimRefs: [CP013, CP014, CP015, CP016, CP017, CP018]
    tableRefs: [TP003]
    figureRefs: [FP003]

  - id: SP-positioning
    title: Competitive Positioning, Moats, and Risks
    body: >
      Helsing's primary competitive moat is its European sovereign positioning — a combination of
      legal incorporation (Societas Europaea), exclusive partnerships with Saab and Airbus, anchor
      contracts with the German MoD, and operational deployment in Ukraine that no US defense tech
      company can replicate without years of political and regulatory groundwork.


      A secondary moat is combat-deployment credibility. Helsing's HF-1 loitering munition has
      been deployed at scale in Ukraine (4,000 units ordered by Germany, 6,000+ HX-2 ordered for
      Ukraine), providing real-world validation that AI-software-integrated drone platforms work
      in the highest-intensity contested environment currently available. This operational record
      is a direct competitive advantage over Anduril (which has not yet deployed systems at this
      scale in active conflict) and entirely out of reach for pure-software players like Palantir.


      The Centaur AI pilot program (tested in Gripen, May–June 2025) and the EW AI integration
      on Eurofighter Typhoon EK demonstrate Helsing's ability to compete on crewed-aircraft AI
      programs, not just drone hardware — broadening its addressable market and differentiating
      it from companies focused solely on unmanned systems.


      Key competitive risks: (1) US defense tech companies (especially Anduril) are actively
      pursuing allied-nation contracts and could form exclusive partnerships with European primes
      competing with Helsing; (2) the Rheinmetall partnership that fell through in 2024 illustrates
      the fragility of prime relationships — Rheinmetall chose Auterion instead; (3) the April 2025
      Bloomberg adverse coverage alleging overpriced drones and glitchy software creates procurement
      risk if European MoDs become risk-averse; (4) the European defense prime themselves could
      accelerate internal AI capability building rather than sourcing from Helsing.


      NATO's artificial intelligence strategy and the Allied Command Transformation AI initiatives
      provide a framework that potentially benefits all competitors equally, but Helsing's deep
      embedding in German and UK defense programs gives it better early access to these frameworks.
      The NATO Innovation Fund's $1B defense tech mandate is the clearest institutional endorsement
      of Helsing's market thesis, though it does not favor any single vendor.
    claimRefs: [CP019, CP020, CP021, CP022, CP023, CP024, CP025]
    tableRefs: [TP004]
    figureRefs: [FP004, FP005]

