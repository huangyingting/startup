company:
  name: Motive Technologies
chapter:
  number: 3
  title: Competitors
  summary: >
    Motive competes in a crowded fleet management and telematics market dominated by Samsara (IOT), Geotab, and Verizon Connect. Samsara is the primary direct rival with $1.46B ARR (+32% YoY) vs. Motive's $501M ARR; however Motive holds a cost and SMB/mid-market advantage. Geotab leads in connected-vehicle count (4.6M) but has no AI-safety focus. Verizon Connect targets enterprise with carrier-grade infrastructure. Motive's multi-layer switching costs—proprietary hardware, compliance data history, workflow integrations—create durable retention. The Samsara trade-secret litigation in Delaware remains the primary adversarial risk.

