    id: KP002
    title: Samsara's 3× Scale Creates a Widening AI Data Moat
    body: "Samsara processed 14 trillion data points in FY2025 vs. Motive's 1.3M active drivers. As AI model quality correlates with training data volume, Samsara's larger scale creates a compounding advantage in safety model accuracy — Motive must grow faster or develop richer per-driver data density to close this gap."
    claimRefs: [CP020, CP021]
