  summary: >-
    Motive serves 100,000+ customers across trucking, oil & gas, construction, field services, and agriculture.
    The 494 large enterprise accounts (>$100K ACV, +58% YoY) represent ~30% of ARR and demonstrate strong
    up-market momentum. Named customer outcomes include Western Express (42% rollover reduction across 3,600
    vehicles), Ernst Concrete (2,000% ROI / $6.5M savings), and KLX Energy (91% reduction in unsafe driving
    events). G2 ranks Motive the #1 fleet management platform across multiple 2024-2025 quarters with a 4.4/5
    score from 2,900+ reviews. NDR of 126% (large) and 110% (core) signals durable expansion. Customer
    concentration risk is modest at the SMB level; top-10 enterprise accounts represent an unknown but growing
    revenue share requiring diligence.

