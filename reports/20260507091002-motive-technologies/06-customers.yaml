callouts:
- calloutType: strength
  title: Western Express and Ernst Concrete Provide Best-in-Class Named Proof
  body: >-
    Western Express (42% rollover reduction across 3,600 vehicles) and Ernst Concrete (2,000% ROI,
    $6.5M savings in 13 months) represent some of the most quantified, production-validated customer
    outcomes in the fleet telematics sector. Combined with KLX Energy's 91% unsafe driving reduction,
    these three case studies provide compelling ROI proof across trucking, construction, and oil & gas
    verticals that can accelerate enterprise sales cycles.
  claimRefs:
  - CU004
  - CU005
  - CU006

- calloutType: risk
  title: NPS Gap (29 vs Samsara 34) and SMB Billing Complaints Signal Retention Risk
  body: >-
    Motive's NPS of 29 ranks below Samsara (34), Lytx (54), and Spireon (52), driven primarily by
    adverse reviews in the SMB segment around billing disputes and contract cancellation difficulty.
    While the 110-126% NDR masks these signals, the underlying voluntary churn rate is not disclosed.
    If contractual lock-in is the primary retention mechanism rather than genuine satisfaction, renewal
    risk upon contract expiration could be higher than the NDR suggests.
  claimRefs:
  - CU009
  - CU016
  - CU029

- calloutType: insight
  title: 58% YoY Enterprise Growth Points Toward Samsara-Comparable Scale by 2026
  body: >-
    The 58% YoY growth in large customers (>$100K ACV) from ~312 to 494 accounts is the most important
    leading indicator for Motive's valuation re-rating potential. At this pace, Motive approaches
    Samsara's 715 large accounts at 2021 IPO by mid-2026, which could support multiple expansion from
    the current 6x ARR toward 8-10x if enterprise momentum is sustained post-IPO.
  claimRefs:
  - CU002
  - CU027
  - CU035
