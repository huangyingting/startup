  - id: BV002
    type: body
    title: Valuation Methodology and Comparable Set
    body: >-
      Motive's primary valuation methodology is NTM ARR multiple analysis, consistent with how high-growth fleet
      telematics SaaS businesses are valued at IPO stage. At the implied $3.08B valuation on $501M trailing ARR (6.1x)
      and estimated $635M NTM ARR (4.9x), Motive sits at the public SaaS market median (6-7x EV/NTM Revenue). The
      primary comparable is Samsara (NYSE: IOT), trading at 13-14x EV/Revenue on 29-30% ARR growth, GAAP profitable, 78%
      gross margin — a valuation premium justified by Samsara's 3.5x ARR scale advantage and profitability milestone.
      Secondary comparables include Geotab (private, ~$1B+ estimated ARR, estimated 6-10x ARR if public) and Verizon
      Connect (embedded in Verizon, estimated 3-6x ARR standalone). Fleet telematics M&A transactions (Mix
      Telematics/PowerFleet at ~4x revenue; PeopleNet/Trimble) set an M&A floor of $1.5-2.5B, well below the current
      entry. Applying a rule-of-40 framework yields a score of approximately 13-18 (28% growth + improving FCF margin),
      below the top-quartile SaaS benchmark of 35+, but improving and consistent with a 6-7x multiple. Revenue per
      employee of $95K for Motive vs $136K for Samsara signals a 30% efficiency gap that is a margin improvement
      opportunity post-IPO.
    claimRefs:
      - CV002
      - CV003
      - CV004
      - CV013
      - CV014
      - CV016
      - CV033
      - CV034
      - CV040
    tableRefs:
      - TV004
  - id: BV003
    type: body
    title: Bull, Base, and Bear Scenarios
    body: >-
      Three valuation scenarios bracket the investment return profile. Bear case ($3.0B, 2.6% downside): ARR growth
      decelerates to 20%, NTM ARR of $600M, 5x multiple reflecting adverse litigation outcome or market de-rating —
      effectively flat from the current $3.08B entry. Base case ($3.8B, 23% upside): ARR growth sustains at 27%, NTM ARR
      of $635M, 6x multiple reflecting continued enterprise momentum and litigation management without an adverse
      verdict. Bull case ($5.4B, 75% upside): ARR growth accelerates to 35%, favorable litigation resolution, NTM ARR of
      $675M, 8x multiple reflecting enterprise-first re-rating and gross margin improvement to 72-74%.
      Probability-weighted expected value: bear 20%, base 50%, bull 30% → implied value ~$4.0B (+30% upside). The key
      catalysts for the bull case are: (1) favorable Samsara trade secret settlement or dismissal; (2) sustained 40-50%
      enterprise account growth through 2026; (3) gross margin expansion to 72%+ validating the software mix shift; (4)
      GAAP profitability timeline visibility by H2 2026. The asymmetric downside (bear case only 2.6% below entry) vs
      upside (bull case 75%) creates a favorable risk-reward profile if the litigation risk is bounded.
    claimRefs:
      - CV009
      - CV010
      - CV011
      - CV012
      - CV017
      - CV024
      - CV028
      - CV031
      - CV037
    tableRefs:
      - TV003
    figureRefs:
      - FV002
      - FV003
  - id: BV004
    type: body
    title: Thesis-Break Triggers and Final Diligence Asks
    body: >-
      The investment thesis breaks if any of the following events occur: (1) adverse Samsara trade secret verdict with
      substantial damages (>$200M) or a product injunction requiring feature redesign — immediate thesis review; (2) ARR
      growth falls below 18% for two consecutive quarters post-IPO — signals structural deceleration; (3) IPO prices
      below $2.5B implied valuation — signals institutional investor rejection of the thesis; (4) a major enterprise
      account (>$5M ACV) defects to Samsara publicly during the IPO roadshow. Key monitoring indicators post-IPO:
      enterprise customer count (>$100K ACV) growth rate, quarterly NDR disclosure, Samsara litigation calendar
      milestones, gross margin trajectory, and India engineering headcount quality indicators. Final diligence asks
      before committing include: full S-1 risk factor review for litigation exposure quantification; gross revenue
      retention rate (GRR) data separate from NDR to confirm voluntary retention; enterprise sales pipeline breakdown
      post-S-1 (Q1 2026 bookings); independent legal opinion on Samsara trade secret case timeline; India engineering
      quality and 6-month attrition KPIs; and confirmation of top-10 customer revenue concentration (confirming no
      single customer >5% ARR). The exit readiness is otherwise strong: S-1 filed, institutional-quality investor base,
      FCF-positive, strong NDR, and clear enterprise growth narrative.
    claimRefs:
      - CV020
      - CV021
      - CV022
      - CV036
    tableRefs:
      - TV005
      - TV006
