callouts:
  - calloutType: recommendation
    title: 'CONDITIONAL BUY: Strong Economics Offset by Litigation Uncertainty'
    body: >-
      Motive's fundamentals — 28% ARR growth, 126% NDR for enterprise, FCF-positive operations, and a 58% enterprise
      account growth rate — are among the strongest in the fleet AI/telematics category. At 6x NTM ARR (market median),
      the entry is fair. The CONDITIONAL qualifier reflects the unresolved Samsara trade secret lawsuit as a material
      thesis-break risk. If the litigation resolves favorably within 12 months of IPO, the investment case strengthens
      materially toward $4-5B valuation.
    claimRefs:
      - CV007
      - CV015
      - CV032
  - calloutType: risk
    title: Samsara Trade Secret Case Is the Single Most Important Monitoring Variable
    body: >-
      The $30.3M arbitration damages are manageable. The unresolved trade secret claims in California federal court are
      not. An adverse verdict with injunctive relief would require product redesign, create post-IPO earnings risk, and
      likely de-rate the stock by 25-40%. Investors must monitor PACER docket milestones and request regular legal
      updates from management.
    claimRefs:
      - CV008
      - CV018
      - CV030
  - calloutType: insight
    title: Expected Value of +30% Upside Makes Risk-Reward Favorable at Current Entry
    body: >-
      Probability-weighted expected value analysis (bear 20%, base 50%, bull 30%) yields approximately $4.0B — a 30%
      return from the $3.08B implied entry. The bear case is only -2.6% downside because Motive's FCF-positive SaaS
      metrics prevent a catastrophic de-rating even in adverse scenarios. This asymmetric risk-reward profile makes the
      entry compelling despite the high overall risk rating.
    claimRefs:
      - CV037
      - CV009
      - CV010
      - CV011
