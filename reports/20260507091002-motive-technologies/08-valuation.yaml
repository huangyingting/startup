  title: Valuation
  summary: >-
    Motive Technologies' implied private valuation of approximately $3.08B (~6x NTM ARR) represents a discount to
    Samsara's current 13-14x ARR multiple, reflecting slower growth (27% vs Samsara's 29-30%), lower gross margin (70%
    vs 78%), and active Samsara trade secret litigation overhang. The base case valuation is $3.8B (6x NTM ARR of
    ~$635M); bull case $5.4B (8x on strong enterprise growth), bear case $3.0B (5x on litigation adverse outcome or
    growth deceleration). Recommendation is CONDITIONAL BUY: strong unit economics (NDR 126%, FCF positive), clear
    enterprise growth momentum (494 large accounts +58% YoY), and favorable regulatory tailwinds support the thesis, but
    the unresolved Samsara trade secret case is a material thesis-break risk. Entry at the current ~$3.08B implied
    valuation offers a reasonable risk-adjusted return with a 40-65% upside to the $4.3-5.1B range if the litigation
    resolves favorably and enterprise momentum sustains.
