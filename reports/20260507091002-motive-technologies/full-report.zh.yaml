  - number: 7
    title: 风险
    sections:
      - number: '7.1'
        title: 法律与诉讼风险
        blocks:
          - type: paragraph
            body: >-
              Motive 当前最严重的风险，是北加州联邦法院的 Samsara 诉讼组合（自 Delaware 移送，案号 1:24-cv-00084）。案件始于 2024
              年，指控包括商业秘密侵占、专利侵权、虚假广告和不正当竞争。September 2025，ITC 就专利主张作出有利于 Motive 的裁决——这是一次重要胜利，清除了进口禁令威胁。不过，截至 May
              2026，商业秘密侵占主张仍未解决。在另一项仲裁中，Motive 被裁定向 Samsara 支付 $30.3 million 损害赔偿，并收到永久禁令，需移除一项比较 AI 行车记录仪基准研究，因为仲裁员认定
              Motive 作出了“字面虚假”陈述。$30.3M 负债已确认，并在 S-1 中披露；剩余商业秘密敞口尚无法量化，视被指侵占范围而定，可能从数千万到数亿美元不等。Samsara 还在推进
              IPR2026-00034 程序，试图在 ITC 裁决后使 Motive 专利无效。Omnitracs 案已于 April 2025 清除。合并诉讼负担带来法律辩护成本、管理层分心，也在 IPO
              阶段形成实质估值压制。若商业秘密裁决不利，且包含要求重设产品功能的禁令，IPO 后运营风险会很高。
