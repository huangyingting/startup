              Motive 带着 $501 M ARR、70% 毛利率、28% ARR 增长，以及据称自 late 2024 起现金流转正进入公开市场，财务健康度明显强于许多 2021 年前后的软件
              IPO。不过，净亏损扩大（2025 年九个月 $138.5 M，对比上年同期 $113.9 M）说明公司仍在 AI、国际扩张和市场拓展上重投入，增长加速叙事与盈利叙事之间存在张力。
