  - number: 2
    title: 市场分析
    sections:
      - number: '2.1'
        title: 市场定义与边界
        blocks:
          - type: paragraph
            body: >
              Motive Technologies
              竞争的市场被其称为“实体运营管理”：一个宽口径类别，覆盖资产密集行业用来管理车队、移动设备、实体资产和现场员工的软件、硬件和数据服务，包括卡车运输、物流、建筑、油气、制造、农业、公用事业和政府。该类别位于更大的商用车远程信息处理和车队管理市场之内，而不同分析机构对范围的定义差异很大。


              窄口径定义聚焦商用车的车队追踪、ELD 合规、司机安全和维护管理，对应市场规模估计从 $24.3 billion（GMI, 2024）到 $61.5 billion（GVR, 2024）不等，差异主要来自是否纳入
              OEM 内置系统和更广义的联网车辆硬件。Motive 和 Samsara 在公开文件中使用的更宽实体运营定义，把设备监控、支出管理、员工工时考勤，以及道路车辆和非道路设备的资产可见性都纳入，将 TAM 扩大到超过
              $96 billion（Samsara S-1, 2021）乃至超过 $100 billion（Motive S-1, 2025）。


              尽调中最相关的市场边界是：（1）面向商业机动车承运人的 ELD / HOS 合规软件（核心市场，在受监管的美国细分市场已接近饱和）；（2）AI
              驱动的车队安全与远程信息处理（增长细分；行车记录仪、司机辅导、事故预防）；（3）道路车辆之外的设备和资产监控；（4）车队支出管理（燃油卡、费用控制）。每一层都会提升单客户收入，并把可服务市场大幅推高到 ELD
              基线之上。
