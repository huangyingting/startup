            title: Samsara 商业秘密案是严重度最高的未解决风险
            body: >-
              $30.3M 虚假广告仲裁损害赔偿已确认，且可控。北加州联邦法院未解决的商业秘密侵占主张，是严重度最高的未决风险，未量化的损害赔偿敞口可能升至数亿美元。若裁决不利并附带禁令救济，Motive
              可能需要重设产品，并在 IPO 上遭遇重大挫折。这是该投资最主要的投资逻辑击穿风险。
