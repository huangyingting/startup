      - number: '7.2'
        title: 竞争与市场结构风险
        blocks:
          - type: paragraph
            body: >-
              Motive 是该品类 #2；#1 Samsara 按 ARR 计算规模大 3.5x（$1.75B vs $501M），已经实现 GAAP 盈利，毛利率更高（78% vs 70%），企业客户数超过
              5x。Samsara 的规模优势让它能在 AI 模型训练（更多司机数据）、更激进的企业销售和产品宽度扩张上投入更多。这种竞争压力，是 Motive 企业上行战略的首要风险。Platform Science 获
              Volkswagen 支持，并与 Navistar、Kenworth OEM 集成，构成长期结构性威胁：新商用卡车出厂预装 Platform Science 软件后，Motive
              硬件加软件模式可争取的后装设备机会会缩小。不过，约 13 million 辆商用车的存量基础，在这种 OEM 替代变得实质化前提供了充足跑道。Geotab（$681M 收入）和 Verizon
              Connect（42K 客户）在 SMB 和中端市场竞争。AI 模型商品化是中期风险：来自 Google、NVIDIA 和开源体系的通用视觉 AI 模型持续提升后，除非 Motive
              不断用更多边缘案例和垂直场景改进模型，否则基于实体经济训练数据的自研 AI 优势可能被侵蚀。Samsara 的诉讼压力叠加竞争规模优势，使竞争环境持续严峻。
