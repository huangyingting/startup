      - number: '4.3'
        title: 亏损、现金流与盈利路径
        blocks:
          - type: paragraph
            body: >
              截至 September 30, 2025 的九个月净亏损为 $138.5 million（按确认收入计净利率 -42%），主要由大规模获客的销售和营销投入，以及 AI 产品开发的 R&D 支出驱动。尽管
              GAAP 口径净亏损，Motive 称自 late 2024 起经营现金流为正——这是关键里程碑，说明已安装 SaaS 订阅基盘产生的现金足以覆盖运营成本，新增投资则流向增长。July 2025 的 $150M
              融资（隐含估值 ~$3.08B）被指定用于产品扩张和市场拓展投资，包括显著扩大 India 工程团队。R&D 估计占收入 30-35%，S&M 占 35-40%，符合激进增长阶段。以当前规模（~$500M
              ARR），$500M+ 基盘上的毛利率或运营效率每改善 1 个百分点，都会带来 $5M+ 年化 EBIT 影响；因此盈利路径主要取决于收入规模和固定成本杠杆，而不是结构性模式变化。公司未在 S-1
              中披露持续经营风险或重大缺陷。
