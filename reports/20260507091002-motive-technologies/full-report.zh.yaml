companyProfile:
  summary: >
    Motive Technologies（前身为 KeepTruckin）是一家 AI 驱动的 Physical Operations Cloud 平台，服务卡车运输、油气、建筑和现场服务等实体经济行业。平台把 AI 视频安全（AI
    Dashcam Plus，搭载 Qualcomm Dragonwing QCS6490）、FMCSA 认证的 ELD/HOS 合规、GPS 车队管理和支出管理（燃油卡）整合进一个云原生系统。公司 ARR 为 $501M（28%
    YoY），客户超过 100K，大客户 NDR 为 126%，并已提交 S-1（December 2025）；Motive 是与 Samsara 并列的两家 AI 车队远程信息处理市场领导者之一。
