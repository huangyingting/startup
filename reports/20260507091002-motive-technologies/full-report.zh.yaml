        - label: 8x NTM ARR 倍数
          value: 5080
          detail: 乐观情景；企业客户加速 + 诉讼解决
        - label: 10x NTM ARR 倍数
          value: 6350
          detail: 乐观上行情景；增长和盈利路径可比 Samsara
