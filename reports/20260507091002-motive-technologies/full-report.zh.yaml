      - number: '6.4'
        title: 扩张轨迹与集中度风险
        blocks:
          - type: paragraph
            body: >-
              企业客户增长是 Motive 最主要的估值驱动：大型账户 494 个（同比 +58%），意味着到 September 2026 该队列可能超过 750 个，接近 Samsara 2021 IPO 时的 715
              个大型账户。按 126% NDR 计算，每个大型账户每年带来约 $79K 增量 ARR，持续放大企业 ARR 贡献。2024-2025
              年的关键企业客户突破包括在卡车运输和油气垂直替换传统供应商（Omnitracs、PeopleNet）。September 2025，ITC 对 Samsara 专利案作出有利于 Motive
              的裁决，移除了企业销售中的不确定性，使此前因诉讼暂停评估的客户重新启动采购沟通。客户集中度风险看起来温和：据信没有单一客户超过 ARR 的 5%（与 Samsara 等车队远程信息处理 SaaS
              先例一致），但二手来源尚未明确确认，仍需在 S-1
              风险因素中核验。北美地域集中度长期看是扩张机会（欧洲、LATAM、APAC），但如果国际增长需要在监管合规和本地销售基础设施上大幅追加投入，也会引入执行风险。Motive 服务覆盖美国 50 个州，卡车 SMB
              客群带来广泛地域覆盖，相比纯企业客户模式能降低收入集中度。
            claimRefs:
              - CU002
              - CU019
              - CU022
              - CU025
              - CU027
              - CU034
