      - number: '3.3'
        title: 切换成本与锁定机制
        blocks:
          - type: paragraph
            body: >
              车队远程信息处理存在多层切换成本，强烈利好既有供应商留存。仅硬件更换（车载网关和 AI 行车记录仪）资本成本就达到每车 $200-500；中型运营商若全车队替换，就是一笔数十万美元级决策。合规数据——多年
              ELD、HOS、IFTA 和安全检查记录——存放在供应商平台；迁移这些历史数据很复杂，并在切换期带来监管过渡风险。第三方调度、薪酬、ERP 和货运撮合平台系统的工作流集成需要在换供应商后重建，带来 IT
              成本和运营停机。司机和车队经理再培训也会吃掉大量生产力。Motive 大客户 126% NDR 直接量化了装机基盘的粘性——客户不流失，反而扩张支出——并优于 Samsara 同一客群的 120%
              NRR。Motive 和 Verizon Connect 都执行标准多年合同（通常 2-3 年），作为额外合同锁定层，进一步强化经济和运营切换壁垒。
            claimRefs:
              - CP012
              - CP013
              - CP018
              - CP024
              - CP030
