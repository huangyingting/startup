      - number: '3.2'
        title: Samsara 作为主要直接竞争对手
        blocks:
          - type: paragraph
            body: >
              Samsara 是 Motive 最关键的竞争对手。Samsara 拥有 $1.46B ARR 和 $20B 市值，在 R&D、销售和 AI 模型训练上资源显著更多。Samsara 在 FY2025 处理 14
              trillion 个数据点（50% YoY 增长），而 Motive 是 1.3M 名联网司机；这种数据量差距可能随时间复利，转化为安全评分和预测性维护上的 AI 模型准确率优势。Samsara
              自行发布的对比材料将 Motive 描述为企业可扩展性和 API 深度不足。不过，Motive 以更适合中端车队的价格、更高 NDR（126%，对比 Samsara 大客户 120% NRR），以及
              September 2025 ITC 胜诉来反击；该裁定认定 Motive 的行车记录仪产品未侵犯 Samsara 专利。并行的 Delaware 商业秘密诉讼仍在推进：Samsara 指称 Motive
              高管用假客户账户访问 Samsara 机密系统，并招募员工提取专有数据；Motive 否认该主张。两家公司 ARR 均以 28-33% YoY 增长，说明市场仍在扩张，而不是纯粹零和竞争。
