      - number: '5.5'
        title: 关键论据
        blocks:
          - type: callout
            title: 一体化平台形成多层护城河
            body: >
              Motive 把 AI Dashcam、ELD 合规、车队追踪和支出管理整合在一个 AWS 托管平台上，形成的切换成本远高于任何单一模块。车队运营商会积累多年合规数据、AI
              辅导下的司机行为记录和燃油支出分析，这些都不容易迁移。由 Qualcomm QCS6490 驱动的 AI Omni 模型可同时运行 30+ 个行为检测器，形成硬件 AI
              边缘；没有类似硅投入的纯软件竞争者很难复制。
            calloutType: strength
            claimRefs:
              - CE008
              - CE027
              - CE001
          - type: callout
            title: 误报提醒与 AI 偏见风险
            body: >
              用户评论持续提到误报提醒（把安全驾驶错误标记出来）是实质产品质量问题。提醒疲劳会降低司机采用度和对辅导系统的配合，削弱核心安全价值主张。劳工工会对 AI
              司机监控系统的偏见和可解释性审查正在增加，构成监管风险；Motive 可能需要把可解释性功能和偏见审计加入产品路线图，从而推高开发成本。
            calloutType: risk
            claimRefs:
