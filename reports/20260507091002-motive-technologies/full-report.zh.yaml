      - number: '8.4'
        title: 投资逻辑击穿触发器与最终尽调问题
        blocks:
          - type: paragraph
            body: >-
              若发生以下任一事件，投资逻辑即被击穿：(1) Samsara 商业秘密案不利裁决，伴随重大损害赔偿（>$200M）或要求重设功能的产品禁令——立即复核投资逻辑；(2) IPO 后连续两个季度 ARR 增长低于
              18%——显示结构性减速；(3) IPO 定价隐含估值低于 $2.5B——显示机构投资者否定该逻辑；(4) 重要企业账户（>$5M ACV）在 IPO 路演期间公开流失到 Samsara。IPO
              后关键监测指标包括：企业客户数（>$100K ACV）增长率、季度 NDR 披露、Samsara 诉讼日程节点、毛利率轨迹、印度工程团队人数质量指标。投入前最后尽调问题包括：完整审阅 S-1
              风险因素以量化诉讼敞口；取得与 NDR 分开的总收入留存率（GRR）数据，确认自愿留存；S-1 后企业销售管线拆分（Q1 2026 订单）；Samsara 商业秘密案时间线的独立法律意见；印度工程质量和 6
              个月流失 KPI；确认前 10 大客户收入集中度（确认没有单一客户 >5% ARR）。除此之外，上市退出准备度较强：S-1 已提交，投资者基础具备机构质量，FCF 转正，NDR 强劲，企业增长叙事清晰。
