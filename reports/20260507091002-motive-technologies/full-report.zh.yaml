      - number: '5.3'
        title: AI Omni 模型与竞争性技术差异
        blocks:
          - type: paragraph
            body: >
              Motive 的 AI Omni 模型是其安全和实体运营能力核心中的自研视觉基础模型。与通用视觉模型不同，AI Omni
              用实体经济运营数据训练——卡车道路视频、油田车辆移动、建筑设备和现场服务工作流——因此能准确识别通用模型可能误判的行业特定风险。模型可检测分心驾驶、跟车过近、急刹、疲劳指标（反复车道偏离）、吸烟和前向停车风险。ABI
              Research 与 Frost and Sullivan 将 Motive 和 Samsara 评为商用远程信息处理领域两家领先 AI 创新者，验证了 Motive 的产品定位。关键担忧在于：Samsara 在
              FY2025 处理 14 trillion 个数据点（50% YoY），而 Motive 的训练语料库未披露但规模更小——这种规模差距可能随时间复利为模型准确率优势。TrustRadius
              客户评论反复提到误报率问题，说明模型仍有改进空间；Qualcomm QCS6490 提升的算力余量正是为解决这一问题而设计。
            claimRefs:
              - CE005
              - CE014
              - CE023
              - CE029
              - CE031
      - number: '5.4'
        title: 安全、合规与信任
        blocks:
          - type: paragraph
            body: >
              Motive 持有 SOC 2 Type II 认证，对传输中和静态数据提供端到端加密，并配备基于角色的访问控制和完整审计日志。ELD 平台在所有必需技术规格上保持 FMCSA
              认证：数据准确性、防篡改、司机日志可移植、自动故障通知和 HOS 违规提醒。AI Dashcam Plus 的防篡改硬件设计和线缆断开提醒满足 FMCSA 连续日志要求。Motive 的 Driver
              Privacy Mode（可临时关闭面向司机的摄像头）在司机信任上区别于 Samsara。针对司机辅导中 AI
              偏见的监管审查正在上升，尤其是劳工工会担心系统基于路况作出不公平惩罚；这构成新兴合规和声誉风险，Motive 需要在近期产品路线图中主动加入可解释性功能和独立偏见审计，尤其是在受监管行业的企业客户越来越要求 AI
              治理文件时。
            claimRefs:
              - CE013
              - CE015
              - CE020
              - CE031
              - CE034
