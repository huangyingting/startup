            body: >
              Motive 约 70% 的毛利率反映了硬件加软件的商业模式。硬件（车载网关、AI 行车记录仪、资产追踪器）通常按成本或接近成本销售，毛利主要来自高毛利 SaaS 订阅。结构上这与 Samsara IPO
              时的模式类似，不过随着软件占比随规模提升，Samsara 毛利率已改善到 77-78%。整体平均 ACV 约 $5,010（= $501M ARR / 100K+ 客户），由 Motive 历史上的
              SMB/卡车运输重心拉动。不过，494 家大型客户（>$100K ACV，同比增长 58% YoY）构成一个快速增长的高 ACV 客群，平均每账户约 $304K，已接近 Samsara 同规模细分市场的
              $323K 平均 ARPU。大型客户 126% NDR、核心客户 110% NDR 证实装机基盘内扩张收入动能强，提供了耐久的有机增长引擎。
