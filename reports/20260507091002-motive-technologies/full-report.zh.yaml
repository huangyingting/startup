      - number: '6.3'
        title: 留存、满意度与扩张动态
        blocks:
          - type: paragraph
            body: >-
              Motive 大客户 126%、核心客户 110% 的净美元留存率（NDR）展示出强劲的先落地再扩张机制。扩张路径遵循可预测的模块采用顺序：ELD/HOS 合规（强制入口点，低 ACV）→ GPS 车队追踪 →
              AI 行车记录仪安全 → 资产追踪 → 司机工作流 → 支出管理（燃油卡 + 费用）。随着车队规模扩大并采用更多模块，一个账户可从 $5K 年合同提升到 $100K+。Spend Management
              产品（2023-2024 年推出）是近期交叉销售项，每个账户每年增加 $5-20K，并贡献了大型账户 126% NDR。G2 在多个 2024-2025 季度将 Motive 评为 #1
              车队管理领导者，2,900+ 条评论评分 4.4/5，客户满意度分数高出 Samsara 15-18%。Capterra 基于 1,600+ 条评论给 Motive 4.5/5。与此同时，独立 NPS 为
              29（Comparably）——低于 Samsara（34）、Lytx（54）和 Spireon（52），排第 4——显示满意度仍有缺口，尤其是在 SMB。Capterra 和 BBB
              上的负面评论集中在账单争议、合同取消困难和客服响应时间。三年期多年企业合同制造合同留存，支撑已披露 NDR 指标，但也可能掩盖自愿留存率；公司未单独披露自愿留存。客户支持为 24/7
              电话加应用内聊天，企业账户配专属 CSM；Forbes Advisor 指出，支持响应时间是 SMB 客户反复提到的负面主题。
