      - number: '5.2'
        title: AI Dashcam Plus：硬件与边缘 AI 技术
        blocks:
          - type: paragraph
            body: >
              AI Dashcam Plus 是 Motive 的主要硬件产品和技术差异化点。它搭载 Qualcomm Dragonwing QCS6490 处理器——一颗商用 IoT 级芯片，处理能力是 Motive
              上一代行车记录仪的 3x——可同时运行超过 30 个 AI 模型，实时检测高风险驾驶行为。Dragonwing QCS6490
              为边缘计算机视觉专门打造，提供车载推理，降低延迟，无需等待云端往返即可立即触发车内提醒。两个同步前向镜头提供立体视觉和深度感知，用于准确检测 Forward Collision Warning、Lane
              Swerving 和 Close Following。1440p 变焦镜头支持 Automated License Plate Recognition（ALPR，2026 年推出）。双 SIM、多运营商 LTE
              确保即便在单一运营商覆盖有限的乡村走廊，也能持续上传视频和追踪。内置备用电池和防篡改检测机制在碰撞场景和线缆断开时保持录制连续性，确保保险和诉讼证据完整。夜视、降噪音频和 Driver Privacy Mode
              补全了功能集。
            claimRefs:
