      - number: '2.2'
        title: 市场规模与渗透率
        blocks:
          - type: paragraph
            body: >
              北美车队管理市场是 Motive 最相关的地理细分市场，贡献全球商用车远程信息处理收入约 34%。截至 2023，北美商用车中估计部署了 17.4 million
              个活跃车队管理单元，在非私人持有商用车中的渗透率为 53.3%。预计到 2028 年渗透率将达到 80.6%，意味着单位数仍会以 11.9% CAGR 强劲增长——五年内从 17.4 million 增至
              30.5 million。


              底层的美国卡车运输行业在 2024 年创造 $906 billion 货运收入，注册卡车 14.89 million 辆，活跃机动车承运人约 580,000 家。其中 91.5% 运营 10
              辆或更少卡车——这种集中度长期塑造了 Motive 以 SMB 为中心的市场拓展策略。美国超过 1.1 million 家公司运营至少五辆商用车，构成 Motive 这类平台可触达的车队运营商宇宙。


              ELD 强制令创造了合规底线：截至 2024 年，美国约 4.8 million 辆卡车配备 ELD 单元，受监管长途承运商几乎全面采用。全球 ELD 市场在 2025 年为 $7.6
              billion。不过，Samsara 的市场分析（以当前 $1.46B ARR 约占 $96B+ TAM 的 ~1% 为依据）显示，即使最成功的玩家也只拿下可触达机会的一小部分，说明市场仍处在早期到中期采用阶段。
