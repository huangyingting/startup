      - number: '7.4'
        title: 财务、人员与宏观风险
        blocks:
          - type: paragraph
            body: >-
              Motive 的 IPO 执行风险很高：此次发行处在 2026 年市场，亏损软件公司面临更严格的投资者审视；Motive 隐含 6x ARR 倍数已反映诉讼和增长折价。若宏观环境恶化或利率上行，IPO
              窗口可能收窄，Motive 可能被迫接受更低估值或推迟发行。IPO 后锁定期到期会带来内部股东卖压（4,508 名员工、Sequoia、IVP、BlackRock）。宏观风险集中在卡车货运周期：类似
              2022-2023 的货运衰退会减少活跃商用车，推高 SMB 流失。油气垂直集中度带来大宗商品价格敏感性——油价急跌会压缩 Halliburton/KLX Energy
              车队预算。人员风险包括印度工程团队扩张执行（数百名新员工）和对 CEO Shoaib Makani 的关键人依赖。Motive 拓展 Spend Management 会增加 PCI 合规要求。$30.3M
              仲裁付款削弱有效现金跑道，但公司 post-July 2025 的现金状况（$200M+）仍足以支撑近期运营。9 个月运营亏损 $138.5M 表明，要实现 GAAP
              盈利，要么收入显著放量，要么经营费用纪律需要强于当前轨迹。
