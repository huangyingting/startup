      - number: '1.4'
        title: 规模、里程碑与不利事件
        blocks:
          - type: paragraph
            body: >
              Motive 服务约 100,000 家企业客户，覆盖卡车运输、建筑、能源、现场服务、制造和公共部门；平台活跃司机超过 1.3 million 名。公司 S-1 披露，截至 September 30,
              2025，核心客户（年合同额 >$7,500，+17 % YoY）为 9,201 家，大型企业客户（ACV >$100,000，+58 % YoY）为 494 家。大型客户净美元留存率（NDR）达 126
              %；核心客户为 110 %。毛利率约 70 %。截至 September 2025 的过去十二个月收入约 $429 million，前九个月净亏损 $138.5 million。公司称 late 2024
              已实现现金流转正。


              公司举办首届 Vision 24 客户大会，吸引近 500 名车队领导者，并在 2024 年推出 AI Omnivision 套件和 AI Coach 产品。April 2025 的 Vision 25
              上，Motive 发布扩展 AI 产品套件，包括 Fatigue Index detection、Lane Swerving Detection、Unsafe Parking Detection 和 AI
              Workforce Management 系统。公司 2025 年收购 InceptEV，补强 EV 车队管理能力，包括续航预测和充电规划。


              不利一面是，Samsara 于 January 2024 提起联邦诉讼，指控专利侵权、虚假广告、窃取商业秘密，以及未经授权访问平台（Samsara 称 Motive 员工用假账户访问其平台超过 20,600
              次）。Motive 同月反诉。April 2025，San Francisco 陪审团一致认定 Motive 未侵犯 Omnitracs/Solera 提起的专利主张。September 8, 2025，ITC
              法官 Doris Johnson Hines 认定不存在有效的 Samsara 专利侵权，也不存在 Section 337 违规。尽管如此，Samsara 在 Delaware
              联邦法院关于商业秘密、虚假广告和不正当竞争的案件仍在推进。Delaware 法院另于 2025 年裁定，Motive 的网络责任保险公司必须在 Samsara 诉讼中为其抗辩，但拒绝覆盖 Motive
              自身主动起诉的部分。截至 September 30, 2025，员工数为 4,508；公司还在 India 扩大研发，并于 August 2025 进入 UK 市场。
