  - id: FV001
    type: flow
    title: 投资建议逻辑流
    summary: 串起规模、验证、经济性、风险和估值证据，推导最终的有条件买入建议，并展示哪些条件会改变判断。
    layout: standard
    approximationNotes: 该逻辑流体现分析师判断；各阶段阈值由分析师设定，并非公司披露指标。
    claimRefs:
      - CV007
      - CV008
      - CV015
      - CV032
    data:
      nodes:
        - id: fv1
          label: 规模验证
          detail: $501M ARR；100K+ 客户；1.3M 联网司机
        - id: fv2
          label: 收入质量
          detail: ARR 增长 28%；大型客户 NDR 126%；FCF 为正
        - id: fv3
          label: 企业客户动能
          detail: 494 个大型账户，YoY +58%；平均 ACV $304K
        - id: fv4
          label: 竞争护城河
          detail: 切换成本；FMCSA 合规数据积累；AI 训练护城河（中）
        - id: fv5
          label: 风险评估
          detail: Samsara 商业秘密案（高）；竞争（中）；宏观环境（低-中）
        - id: fv6
          label: 估值入场点
          detail: ~$3.08B；6x NTM ARR；市场中位数；合理，不偏高
        - id: fv7
          label: 有条件买入
          detail: 若诉讼走向温和则买入；基准 / 乐观情景上行空间 23-75%
        - id: fv8
          label: 观察
          detail: 若 Samsara 判决不利，或 ARR 增长 <18%
