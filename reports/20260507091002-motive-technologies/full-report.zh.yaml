      - number: '1.2'
        title: 领导层与治理
        blocks:
          - type: paragraph
            body: >
              Shoaib Makani（CEO 兼联合创始人）毕业于 London School of Economics，创立 KeepTruckin 前曾任职于 Khosla Ventures、AdMob 和
              Google。外界几乎把 Motive 的战略与他本人绑定；Samsara 的 2024 诉讼也将其个人列名，称其涉嫌指挥不当竞争行为。Obaid Khan（联合创始人兼 COO）有立法事务背景，Ryan
              Johns（技术联合创始人）此前担任 Tapjoy 工程副总裁。三位联合创始人仍担任核心职务，并构成原始创始团队，关键人物集中风险偏高。


              Chirag Shah 担任 CFO；公司推进 IPO 准备和多年审计、面向公开市场时，这一岗位很关键。Chief Legal Officer Shu White 在 ITC 对 Samsara
              作出不利裁定后负责 Motive 的对外沟通。董事会方面，Kleiner Perkins 合伙人 Ilya Fushman 于 July 2025 重新加入并担任董事；他最初在 2015 年领投 Motive 的
              Series A。前 HP 和 eBay CEO Meg Whitman 于 2025 年加入董事会，在 IPO 前补强了重要的上市公司治理经验。除上述人员外，已审阅公开资料未披露完整董事会构成。
