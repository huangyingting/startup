      - number: '6.2'
        title: 具名客户验证与部署结果
        blocks:
          - type: paragraph
            body: >-
              Motive 已发布 224 个具名客户引用，横跨多个行业和部署规模。已量化结果的关键生产部署包括 Western Express（3,600 辆车，侧翻减少 42%，安全带违规减少 65%，AI
              行车记录仪全车队部署）、Ernst Concrete（13 个月内 2,000% ROI，总节省 $6.5 million，手机使用减少 97%，建筑车队生产部署）、KLX Energy Services（每
              1,000 英里不安全驾驶事件减少 91%，有责事故减少 68%，每月节省燃油 $12,000，油气现场作业），以及 Southwind（节省 $2 million 事故成本）。其他企业账户包括 FedEx
              Freight、Halliburton、Maersk、KONE 和
              Cintas，贸易媒体报道确认这些部署已进入生产。所有主要案例研究都体现有记录结果的生产部署，而非试点。证据质量主要来自公司发布（部分有贸易媒体确认），独立验证有限。不过，相比早期同行，引用数量（224
              个）、广度（10+ 垂直行业）和 ROI 指标具体度（2,000% ROI、91% 不安全驾驶减少）都很有说服力。基于分析师市场对比，企业平均 ROI 回本约 7 个月，优于 Samsara 的 12 个月和
