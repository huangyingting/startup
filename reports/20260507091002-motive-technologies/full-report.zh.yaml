  - number: 6
    title: 客户情况
    sections:
      - number: '6.1'
        title: 客户基盘分层与规模
        blocks:
          - type: paragraph
            body: >-
              截至 September 2025，Motive 服务超过 100,000 家客户，连接司机 1.3 million 名。客户基盘覆盖五个主要垂直行业：卡车运输（历史锚点，以 SMB 车主经营者和 LTL/TL
              承运商为主）、油气（Halliburton、KLX Energy）、建筑（Ernst Concrete、Davey Tree）、现场服务（KONE、Cintas、ABM Industries）和物流（FedEx
              Freight、Maersk）。地域上以北美为主，S-1 未披露实质性国际 ARR。整体平均 ACV 约 $5,010/客户（= $501M ARR / 100K 账户），反映历史客户基盘中 SMB
              权重较高。分布高度双峰：494 个大型企业账户（>$100K ACV）平均每账户约 ~$304K，贡献约 30% 总 ARR；其余 99,500+ 个 SMB 账户平均年支出约 $3,500。SMB
              客户通过自助数字渠道获客（ELD 合规强制令驱动自然需求），企业账户则需要专门的外勤销售团队、6-18 个月销售周期和多站点试点项目。Motive
              的销售组织分为内部销售（SMB/中端市场）、中端市场团队（50-500 辆车）和外勤企业团队（500+ 辆车）。卡车运输 SMB 细分市场受益于 FMCSA ELD
              强制合规这一监管底线，即便没有主动扩张，也能支撑耐久的低流失订阅。油气和建筑垂直行业每次部署 ACV 最高，按企业账户数增长也最快。
