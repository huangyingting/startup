      - number: '8.2'
        title: 估值方法与可比公司组
        blocks:
          - type: paragraph
            body: >-
              Motive 的核心估值方法是 NTM ARR 倍数分析，符合高增长车队远程信息处理 SaaS 公司在 IPO 阶段的估值方式。按 $501M 过去 12 个月 ARR 对应 $3.08B
              隐含估值（6.1x），以及估计 $635M NTM ARR（4.9x）计算，Motive 处于上市 SaaS 市场中位数（6-7x EV/NTM 收入）。主要可比公司是 Samsara（NYSE: IOT），其在
              29-30% ARR 增长、GAAP 盈利、78% 毛利率下以 13-14x EV/收入倍数交易；这一溢价由 Samsara 3.5x ARR 规模优势和盈利里程碑支撑。次级可比包括 Geotab（私人公司，估计
              ARR ~$1B+，若上市估计 6-10x ARR）和 Verizon Connect（嵌在 Verizon 体系内，独立估计 3-6x ARR）。车队远程信息处理 M&A 交易（Mix
              Telematics/PowerFleet 约 4x 收入；PeopleNet/Trimble）给出的 M&A 底线为 $1.5-2.5B，远低于当前入场估值。按 40 法则框架，Motive 得分约
              13-18（28% 增长 + 改善中的 FCF 利润率），低于 SaaS 头部四分位 35+ 基准，但正在改善，也与 6-7x 倍数一致。Motive 每名员工收入 $95K，Samsara 为 $136K，显示
              30% 效率差距，也意味着 IPO 后仍有利润率改善空间。
