      - number: '1.5'
        title: 关键论据
        blocks:
          - type: callout
            title: 一体化平台带来深度客户嵌入
            body: >
              Motive 的 IoT 加 SaaS 一体化打法，在合规、安全、远程信息处理和支出工作流上同时制造高切换成本。大型客户 126% 的净美元留存率（NDR）显示增购和留存动能强；企业 ACV 为
              $375K，明显高于 Samsara IPO 时的 $303K，说明 Motive 在单个企业账户中拿到更高的钱包份额。
            calloutType: strength
            claimRefs:
              - CO025
              - CO026
          - type: callout
            title: Samsara Delaware 诉讼仍是 IPO 的重大压制因素
            body: >
              虽然赢下 ITC 专利裁定，Motive 仍要面对 Delaware 联邦法院关于商业秘密挪用、虚假广告、不正当竞争和额外专利主张的现行程序。Samsara 指称 Motive 高管指挥假账户访问 Samsara
              平台（被指超过 20,600 次访问），这会引入声誉和法律风险；若 Delaware 案件在上市前升级为惩罚性赔偿主张，IPO 投资者情绪尤其可能受影响。
