      - number: '8.3'
        title: 乐观、基准与悲观情景
        blocks:
          - type: paragraph
            body: >-
              三种估值情景框定投资回报。悲观情景（$3.0B，2.6% 下行）：ARR 增长放缓至 20%，NTM ARR 为 $600M，5x 倍数反映不利诉讼结果或市场降级——基本与当前 $3.08B
              入场持平。基准情景（$3.8B，23% 上行）：ARR 增长维持在 27%，NTM ARR 为 $635M，6x 倍数反映企业动能延续，且诉讼管理未出现不利裁决。乐观情景（$5.4B，75% 上行）：ARR
              增长加速至 35%，诉讼有利解决，NTM ARR 为 $675M，8x 倍数反映企业优先叙事重估，毛利率改善至 72-74%。概率加权预期价值：悲观 20%、基准 50%、乐观 30% → 隐含价值约
              $4.0B（+30% 上行）。乐观情景的关键催化包括：(1) Samsara 商业秘密案有利和解或驳回；(2) 2026 年企业账户增长持续 40-50%；(3) 毛利率扩张至 72%+，验证软件组合迁移；(4)
              到 H2 2026 看见 GAAP 盈利时间表。下行不对称（悲观情景仅比入场低 2.6%）相对于上行（乐观情景 75%），如果诉讼风险有边界，风险回报有利。
