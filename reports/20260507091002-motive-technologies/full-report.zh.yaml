      - number: '2.3'
        title: 买方与细分市场格局
        blocks:
          - type: paragraph
            body: >
              车队管理买方横跨多种行业、规模和采购模式。在交通与物流（占远程信息处理市场 >43%）中，买方通常是承运商和 3PL 的车队经理或 VP 级运营高管。在建筑、油气和制造中，买方包括
              HSE（健康、安全与环境）负责人、运营经理，以及负责设备利用率和合规的 CFO。预算所有者通常是运营或安全团队；当总拥有成本审批超过 $250K 时，财务会介入。


              美国多数机动车承运人（91.5% 运营 ≤10 辆卡车）是车主经营者或微型企业，技术决策更看重成本、合规必要性和易用性，而不是企业级功能宽度。这个 SMB 细分市场是 Motive 的历史强项，平均 ACV
              接近每年 $5,000。相比之下，大型企业（>100 辆卡车，占承运人 <0.7%，却贡献不成比例的车队收入）带来更高 ACV 和多产品采用，是 Motive 正通过企业市场拓展投入追逐的扩张市场。


              非卡车垂直行业——建筑、油气和制造——比受监管的卡车运输更早处于数字化转型曲线。这些行业既要监控道路车辆，也要监控非道路重型设备（挖掘机、叉车、钻机），采用车队管理软件的动力来自安全强制要求、保险成本压力和运营效率
              ROI。它们代表 Motive 在监管驱动的卡车基盘之外有意义的 TAM 扩张机会。
