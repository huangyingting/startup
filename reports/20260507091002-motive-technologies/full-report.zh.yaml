chapters:
  - number: 1
    title: 公司概况
    sections:
      - number: '1.1'
        title: 公司身份与使命
        blocks:
          - type: paragraph
            body: >
              Motive Technologies 于 June 1, 2013 在 San Francisco, California 以 KeepTruckin 原名注册成立。公司由 Shoaib
              Makani（CEO）、Obaid Khan（COO）和 Ryan Johns（技术联合创始人）共同创立，最初用一款电子日志应用把卡车运营带到线上，满足联邦 ELD 强制规则下的服务时长（HOS）合规要求。


              April 2022，公司更名为 Motive，使命也从卡车运输扩展到整个“实体经济”，覆盖卡车与物流、建筑、油气、农业、现场服务、制造、公用事业和公共部门。更名与 $150 million Series F
              同步发生，公司同时提出自动化运营平台愿景：把车辆、设备和设施接入云端，再用 AI 自动化安全、合规、远程信息处理、支出管理和员工监督，最后收进一个一体化系统。


              截至报告日期，Motive 总部位于 1355 Market Street, 11th Floor, San Francisco, CA 94103。公司在 December 2025 提交 S-1
              后仍为私营公司，目标是在 NYSE 以 MTVE 代码上市。公司的产品标语是“面向实体经济的一体化运营平台”。CEO Shoaib Makani
              将该平台描述为“实体经济企业的中央操作系统，把车辆、司机和设备的数据统一到一个界面”。
