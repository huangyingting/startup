      - number: '2.5'
        title: 关键论据
        blocks:
          - type: callout
            title: 市场处于中期采用阶段，剩余空间很大
            body: >-
              北美商用车渗透率为 53.3%（2023），并预计到 2028 年达到 80.6%，车队管理市场仍保留大量空白机会。现有龙头 Samsara 已有 $1.46B ARR，却估计只拿下 $96B+ TAM 的约
              1%；这意味着 Motive 的市场份额大概率也只是个位数，两家公司都有巨大增长空间，不必陷入零和竞争。
            calloutType: insight
            claimRefs:
              - CM008
              - CM017
          - type: callout
            title: TAM 定义膨胀风险
            body: >-
              Motive 声称 $100B+ TAM，其中包括设备监控、支出管理和员工模块，但这些模块尚未贡献实质收入。投资者做近期估值锚定时，应使用更窄的 $21B 北美商用车远程信息处理 SAM；$100B+
              更适合作为长期可选性。
            calloutType: insight
            claimRefs:
              - CM004
              - CM015
              - CM037
          - type: callout
            title: ELD 续约周期创造切换机会
            body: >-
              2017–2019 年的初始 ELD 强制要求推动了车队采用，合同期通常为 5 年。2024–2026 年续约窗口是罕见切换时点——车队运营商正主动评估，是留在传统 ELD
              供应商（Omnitracs、Trimble），还是升级到 Motive 和 Samsara 这样的 AI 原生平台。这个续约周期是结构性顺风，未来未必会以同样规模重现。
            calloutType: insight
            claimRefs:
              - CM020
  - number: 3
    title: 竞争格局
    sections:
      - number: '3.1'
        title: 竞争格局概览
        blocks:
          - type: paragraph
            body: >
              Motive 所在市场呈现清晰的分层竞争结构。Samsara（NYSE: IOT）是最主要的直接对手，ARR 规模为 Motive 的 3×（$1.46B vs.
              $501M），在中端市场和企业车队细分里正面竞争，产品范围高度重叠——两家公司都想成为“实体运营云”。Geotab 按联网车辆数（4.6M）是最大私营玩家，收入 $681M，但缺少 Motive 对 AI
              安全的强调。Verizon Connect 把 Verizon 的运营商基础设施带入车队管理，价格低于 Motive（$20-28/vehicle/month），重点放在可靠性而不是 AI 创新。Lytx
              是视频远程信息处理专家，正通过 2025/2026 的 Lytx+ 和 LytxOne 发布转向完整车队平台，直接挑战 Motive 的行车记录仪领导地位。Trimble 占据企业货运/TMS
              空间，深度服务大型承运人的 ERP 集成。Platform Science 等 OEM 内置平台（由 Volvo 和 Daimler truck groups 支持）通过提供出厂安装的软件生态，对 Motive
              的硬件层构成更长期威胁。late 2025，Geotab 收购 Verizon Connect 国际业务单元，推动远程信息处理市场整合，并可能扩大 Geotab 的直销覆盖。
