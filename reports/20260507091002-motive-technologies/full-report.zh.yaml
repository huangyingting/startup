      - number: '1.3'
        title: 融资历程与资本
        blocks:
          - type: paragraph
            body: >
              自 2013 年以来，Motive 多轮股权融资合计约 $717 million。锚定投资方是 Kleiner Perkins（2015 年领投 Series A，并领投 July 2025
              延伸融资），共同投资方包括 Google Ventures（GV）、Insight Partners、Greenoaks、Index Ventures、G2 Venture
              Partners、BlackRock、IVP、Scale Venture Partners，以及最近加入的 AllianceBernstein。


              关键节点是 May 2022 的 Series F：公司以 $2.85 billion 投后估值融资 $150 million，坐实独角兽地位，约为 2.85x。此前 June 2021，公司完成 $190
              million Series E（由 G2VP 和 BlackRock 领投）。July 2025，Motive 又融资 $150 million，仍由 Kleiner Perkins
              领投，AllianceBernstein 作为新投资方加入。2025 轮融资与公司宣布自 late 2024 起现金流转正、ARR 接近 $500 million 同步披露，因此更像战略性 IPO
              前融资，而非由流动性压力驱动的事件。Forge 二级市场截至 July 2025 给出的 Series F senior 隐含估值为 $3.08 billion。


              Motive 于 September 2, 2025 保密提交 IPO 申请，并在 December 23, 2025 公开递交 S-1 注册文件，目标登陆 NYSE、代码 MTVE，账簿管理人为 J.P.
              Morgan、Citi、Barclays、Jefferies 等。S-1 显示公司拟融资至少 $100 million。截至 May 2026，IPO 尚未定价，也未开始公开交易；二级市场指示价接近
              $20/share。
