            body: >
              Motive Technologies 通过 December 23, 2025 向 SEC 提交的 S-1 文件披露财务情况（CIK 1646681）。截至 September 30, 2025，ARR 达到
              $501 million，较约 $391M 同比增长 28%。已确认 LTM 收入约 $429 million，反映 SaaS 合同 ARR 与确认收入之间正常的递延收入差。2025 年前九个月收入为
              $327.3 million，同比增长 22%。公司目标在 NYSE 以 MTVE 代码上市，J.P. Morgan 为主承销商。ARR 增速已从 2021-2022 年的 40%+ 放缓到 2025 年的
              27-28%，符合规模化和市场成熟规律；但相对更广泛 SaaS 市场仍然强劲，也低于公开市场龙头 Samsara 的 32% ARR 增速。
