              Motive carries $138.5M in net losses over nine months and is entering its IPO in a 2026 market environment
              where software multiples are significantly below 2021 peaks. The Delaware trade-secret litigation creates
              a material overhang. If IPO pricing disappoints or is delayed, Motive may need to sustain higher burn on
