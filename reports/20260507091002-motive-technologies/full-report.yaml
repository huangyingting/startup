      - number: '1.4'
        title: Scale, Milestones, and Adverse Events
        blocks:
          - type: paragraph
            body: |
              Motive serves roughly 100,000 business customers across trucking, construction,
              energy, field services, manufacturing, and the public sector, with over 1.3 million
              drivers actively using the platform. The company's S-1 disclosed that as of
              September 30, 2025, it had 9,201 core customers (>$7,500 annual contract value,
              +17 % YoY) and 494 large enterprise customers (>$100,000 ACV, +58 % YoY). Net
              Dollar Retention for large customers reached 126 %; core customers 110 %. Gross
              margin stood at approximately 70 %. Revenue for the twelve months ended September
              2025 was approximately $429 million, with a net loss of $138.5 million for the
              first nine months. The company reported becoming cash-flow positive in late 2024.

              The company held its inaugural Vision 24 customer conference, attracting nearly
              500 fleet leaders, and launched the AI Omnivision suite and AI Coach products in
              2024. In April 2025 at Vision 25, Motive debuted an expanded AI product suite
              including Fatigue Index detection, Lane Swerving Detection, Unsafe Parking
              Detection, and an AI Workforce Management system. The company acquired InceptEV
              in 2025 to bolster EV fleet management capabilities including range prediction
              and charge planning.

              On the adverse side, Samsara filed a federal lawsuit in January 2024 alleging
              patent infringement, false advertising, trade-secret theft, and unauthorized
              platform access (Samsara asserts Motive employees accessed its platform more than
              20,600 times using fake accounts). Motive counter-sued the same month. In April
              2025 a San Francisco jury unanimously cleared Motive of patent infringement
              claims brought by Omnitracs/Solera. On September 8, 2025, ITC Judge Doris
              Johnson Hines found no valid Samsara patent infringement and no Section 337
              violations. Nonetheless, Samsara's Delaware federal case for trade secrets, false
              advertising, and unfair competition remains active. A Delaware court separately
              ruled in 2025 that Motive's cyber liability insurers must defend it in the Samsara
              litigation, though coverage for Motive's own affirmative suit was denied.
              Headcount stood at 4,508 as of September 30, 2025, with additional R&D expansion
              in India and a UK market launch in August 2025.
