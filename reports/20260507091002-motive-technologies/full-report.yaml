        - Alert; increase diligence on enterprise cohort
      - - Freight market recession
        - ATA tonnage down >15% YoY for two months
        - SMB churn spike; ARR headwind
        - Revise ARR model; increase bear case weight
  - id: TV006
    title: Final Diligence Asks Table
    description: Outstanding evidence gaps requiring investor due diligence before final commitment.
    claimRefs:
      - CV022
    columns:
      - Topic
      - Missing Evidence
      - Why It Matters
      - Diligence Path
    rows:
      - - Samsara trade secret exposure
        - S-1 risk factor exact quantification
        - Could be $200M+ bear case; not publicly estimated
        - Legal counsel review of S-1 risk factors and PACER docket
      - - Gross Revenue Retention (GRR)
        - Not disclosed separately from NDR
        - Voluntary churn could be masked by contractual lock-in
        - Request GRR cohort data in investor presentation
      - - Enterprise pipeline (post-S-1)
        - Q1 2026 enterprise bookings not yet reported
        - Confirms or denies 58% large account growth sustainability
        - Request at roadshow; ask for pipeline conversion data
      - - India engineering quality
        - No public KPIs on retention or output
        - $150M capital deployed; execution risk if attrition high
        - Request 6-month India headcount and attrition data
      - - Customer concentration (top-10)
        - Top-10 customer revenue share not disclosed
        - If top-10 >30% ARR, concentration risk is material
        - Verify in S-1 risk factors; request in diligence
