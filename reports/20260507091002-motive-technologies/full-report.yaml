              Motive's 126% net dollar retention for large customers is among the strongest in the SaaS fleet management
              sector, exceeding Samsara's 120% NRR. This metric validates the land-and-expand model: customers not only
              stay but significantly increase their spend year-over-year, providing organic ARR growth that partially
              offsets new-customer acquisition costs.
