  - number: 6
    title: Customers
    sections:
      - number: '6.1'
        title: Customer Base Segmentation and Scale
        blocks:
          - type: paragraph
            body: >-
              Motive serves more than 100,000 customers with 1.3 million connected drivers as of September 2025. The
              customer base spans five primary verticals: trucking (the historical anchor, predominantly SMB
              owner-operators and LTL/TL carriers), oil & gas (Halliburton, KLX Energy), construction (Ernst Concrete,
              Davey Tree), field services (KONE, Cintas, ABM Industries), and logistics (FedEx Freight, Maersk). The
              geographic concentration is predominantly North American, with no material international ARR disclosed in
              the S-1. Average overall ACV is approximately $5,010 per customer (= $501M ARR / 100K accounts),
              reflecting the significant SMB weighting of the historical customer base. The distribution is highly
              bimodal: 494 large enterprise accounts (>$100K ACV) averaging ~$304K per account account for approximately
              30% of total ARR, while the remaining 99,500+ SMB accounts average approximately $3,500 in annual spend.
              SMB customers are acquired via self-serve digital channels (ELD compliance mandate drives organic demand)
              while enterprise accounts require a dedicated field sales team, 6-18 month sales cycles, and multi-site
              pilot programs. Motive's sales organization is segmented into inside sales (SMB/mid-market), a mid-market
              team (50-500 vehicles), and a field enterprise team (500+ vehicles). The trucking SMB segment benefits
              from FMCSA ELD mandate compliance as a regulatory floor, ensuring durable low-churn subscriptions even
              without active expansion. The oil & gas and construction verticals generate the highest ACV per deployment
              and are growing fastest by enterprise account count.
            claimRefs:
              - CU001
              - CU011
              - CU012
              - CU014
              - CU025
              - CU026
      - number: '6.2'
        title: Named Customer Proof and Deployment Outcomes
        blocks:
          - type: paragraph
            body: >-
              Motive has published 224 named customer references spanning multiple industries and deployment scales. Key
              production deployments with quantified outcomes include Western Express (3,600 vehicles, 42% rollover
              reduction, 65% reduction in seat belt violations, AI dashcam full fleet deployment), Ernst Concrete
              (2,000% ROI within 13 months, $6.5 million in total savings, 97% reduction in cell phone use, production
              deployment across construction fleet), KLX Energy Services (91% reduction in unsafe driving events per
              1,000 miles, 68% reduction in at-fault incidents, $12,000/month fuel savings, oil & gas field operations),
              and Southwind ($2 million in accident cost savings). Additional enterprise accounts include FedEx Freight,
              Halliburton, Maersk, KONE, and Cintas, with deployments confirmed as production by trade press coverage.
              All major case studies reflect production deployments with documented outcomes — not pilots. The evidence
              quality is primarily company-published (with some trade press confirmation), which limits independent
              verification. However, the volume (224 references), breadth (10+ verticals), and specificity of ROI
              metrics (2,000% ROI, 91% unsafe driving reduction) are compelling relative to early-stage peers. Average
              enterprise ROI payback of approximately 7 months compares favorably to Samsara's 12 months and Lytx's 18
              months based on analyst market comparisons.
            claimRefs:
              - CU004
              - CU005
              - CU006
              - CU010
              - CU015
              - CU017
              - CU018
      - number: '6.3'
        title: Retention, Satisfaction, and Expansion Dynamics
        blocks:
          - type: paragraph
            body: >-
              Motive's Net Dollar Retention of 126% for large customers and 110% for core customers demonstrates strong
              land-and-expand mechanics. The expansion path follows a predictable module adoption sequence: ELD/HOS
              compliance (mandatory entry point, low ACV) → GPS fleet tracking → AI dashcam safety → asset tracking →
              driver workflow → spend management (fuel card + expense). This progression can increase an account from a
              $5K annual contract to $100K+ as fleet size grows and additional modules are adopted. The Spend Management
              product (launched 2023-2024) represents a recent cross-sell adding $5-20K per account per year and
              contributing to the 126% NDR for large accounts. G2 ranks Motive as the #1 fleet management leader across
              multiple 2024-2025 quarters with a 4.4/5 rating from 2,900+ reviews, with customer satisfaction scores
              15-18% above Samsara. Capterra rates Motive at 4.5/5 from 1,600+ reviews. However, independent NPS of 29
              (Comparably) — placing Motive 4th vs Samsara (34), Lytx (54), and Spireon (52) — signals satisfaction
              gaps, particularly in SMB. Adverse reviews on Capterra and BBB concentrate on billing disputes, contract
              cancellation difficulty, and customer support response times. Three-year multi-year enterprise contracts
              create contractual retention that supports reported NDR metrics but may obscure the voluntary retention
              rate, which has not been separately disclosed. Customer support is 24/7 phone plus in-app chat with
              dedicated CSM for enterprise accounts; Forbes Advisor notes support response time as a recurring adverse
              theme for SMB customers.
            claimRefs:
              - CU003
              - CU007
              - CU008
              - CU009
              - CU016
              - CU020
              - CU023
              - CU024
              - CU026
              - CU029
              - CU032
      - number: '6.4'
        title: Expansion Trajectory and Concentration Risk
        blocks:
          - type: paragraph
            body: >-
              Enterprise customer growth is Motive's primary valuation driver: 494 large accounts (+58% YoY) implies the
              cohort could reach 750+ by September 2026 — approaching Samsara's 715 large accounts at its 2021 IPO. Each
              large account generates ~$79K in incremental ARR annually at 126% NDR, compounding the enterprise ARR
              contribution. Key enterprise wins in 2024-2025 include displacing legacy providers (Omnitracs, PeopleNet)
              across trucking and oil & gas verticals. The ITC patent win over Samsara in September 2025 removed an
              enterprise sales overhang, enabling renewed procurement conversations at accounts that had paused
              evaluation due to litigation uncertainty. Customer concentration risk appears modest: no single customer
              is believed to exceed 5% of ARR (consistent with fleet telematics SaaS precedent at Samsara), but this has
              not been explicitly confirmed in secondary sources and requires S-1 risk factor verification. Geographic
              concentration in North America represents a long-term expansion opportunity (Europe, LATAM, APAC) but
              introduces execution risk if international growth requires significant incremental investment in
              regulatory compliance and local sales infrastructure. Motive serves customers across all 50 US states,
              with the trucking SMB segment providing broad geographic coverage that de-concentrates revenue relative to
              a purely enterprise-focused model.
            claimRefs:
              - CU002
              - CU019
              - CU022
              - CU025
              - CU027
              - CU034
      - number: '6.5'
        title: Exhibits
        blocks:
          - type: callout
            title: Western Express and Ernst Concrete Provide Best-in-Class Named Proof
            body: >-
              Western Express (42% rollover reduction across 3,600 vehicles) and Ernst Concrete (2,000% ROI, $6.5M
              savings in 13 months) represent some of the most quantified, production-validated customer outcomes in the
              fleet telematics sector. Combined with KLX Energy's 91% unsafe driving reduction, these three case studies
              provide compelling ROI proof across trucking, construction, and oil & gas verticals that can accelerate
              enterprise sales cycles.
            calloutType: strength
            claimRefs:
              - CU004
              - CU005
              - CU006
          - type: callout
            title: NPS Gap (29 vs Samsara 34) and SMB Billing Complaints Signal Retention Risk
            body: >-
              Motive's NPS of 29 ranks below Samsara (34), Lytx (54), and Spireon (52), driven primarily by adverse
              reviews in the SMB segment around billing disputes and contract cancellation difficulty. While the
              110-126% NDR masks these signals, the underlying voluntary churn rate is not disclosed. If contractual
              lock-in is the primary retention mechanism rather than genuine satisfaction, renewal risk upon contract
              expiration could be higher than the NDR suggests.
            calloutType: risk
            claimRefs:
              - CU009
              - CU016
              - CU029
          - type: callout
            title: 58% YoY Enterprise Growth Points Toward Samsara-Comparable Scale by 2026
            body: >-
              The 58% YoY growth in large customers (>$100K ACV) from ~312 to 494 accounts is the most important leading
              indicator for Motive's valuation re-rating potential. At this pace, Motive approaches Samsara's 715 large
              accounts at 2021 IPO by mid-2026, which could support multiple expansion from the current 6x ARR toward
              8-10x if enterprise momentum is sustained post-IPO.
            calloutType: insight
            claimRefs:
              - CU002
              - CU027
              - CU035
