      - number: '3.3'
        title: Switching Costs and Lock-in Dynamics
        blocks:
          - type: paragraph
            body: >
              Fleet telematics exhibits multi-layer switching costs that strongly favor incumbent retention. Hardware
              replacement (vehicle gateways and AI dashcams) runs $200-500 per vehicle in capital cost alone, making a
              full fleet-wide swap a multi-hundred-thousand-dollar decision for mid-sized operators. Compliance data —
              years of ELD, HOS, IFTA, and safety inspection records — is stored in the vendor's platform; migrating
              this historical data is complex and creates regulatory transition risk during the changeover period.
              Workflow integrations with third-party dispatch, payroll, ERP, and load-board systems require rebuilding
              after a vendor switch, adding both IT cost and operational downtime. Driver and fleet manager retraining
              consumes significant productivity. Motive's NDR of 126% for large customers directly quantifies the
              stickiness of its installed base — customers expand spending rather than churn — and compares favorably to
              Samsara's 120% NRR for the same cohort. Both Motive and Verizon Connect enforce standard multi-year
              contracts (typically 2-3 years) as an additional contractual lock-in layer that reinforces the economic
              and operational barriers to switching.
            claimRefs:
              - CP012
              - CP013
              - CP018
              - CP024
              - CP030
      - number: '3.4'
        title: Moat Durability and Displacement Risk
        blocks:
          - type: paragraph
            body: >
              Motive's key moats are its AI Omni vision model (physical-economy specialized, trained on 1.3M+ connected
              drivers), its 100K+ customer install base generating ongoing training data, multi-layer switching costs,
              and its strong brand in the trucking mid-market built over a decade as KeepTruckin and then Motive.
              Displacement risks include: Samsara's 3× data scale advantage in AI training (14T data points vs. Motive's
              undisclosed but smaller corpus) that could compound into model accuracy superiority over time; Lytx's
              2025/2026 full-platform expansion (Lytx+, LytxOne) that could commoditize the AI dashcam value
              proposition; OEM-embedded platforms such as Platform Science, backed by Volvo and Daimler truck groups,
              that threaten to undercut Motive's hardware-layer margins by embedding software directly at the factory;
              and the Geotab-Verizon Connect consolidation in late 2025 potentially creating a larger direct-sales
              competitor with combined scale. The unresolved Samsara trade-secret litigation, if decided against Motive,
              could result in injunctions disrupting the product roadmap or forcing IPO-timeline adjustments. Despite
              these risks, Motive's IPO filing on NYSE as MTVE increases enterprise buyer trust and adds a transparency
              layer that could accelerate large-fleet sales cycles.
            claimRefs:
              - CP020
              - CP021
              - CP022
              - CP023
              - CP027
              - CP028
      - number: '3.5'
        title: Exhibits
        blocks:
          - type: callout
            title: Delaware Litigation Is the Primary Near-Term Risk
            body: >-
              The Samsara trade-secret lawsuit in Delaware (alleging fake accounts, employee poaching, and system
              infiltration) remains unresolved. If Samsara obtains an injunction, it could disrupt Motive product
              development, delay the IPO, or force costly settlements — representing the single most significant
              near-term competitive risk.
            calloutType: risk
