companyProfile:
  summary: >
    Motive Technologies (formerly KeepTruckin) is an AI-driven Physical Operations Cloud platform serving the physical
    economy — trucking, oil and gas, construction, and field services. The platform integrates AI video safety (AI
    Dashcam Plus, powered by Qualcomm Dragonwing QCS6490), FMCSA-certified ELD/HOS compliance, GPS fleet management, and
    spend management (fuel cards) in a single cloud-native system. With $501M ARR (28% YoY), 100K+ customers, 126% NDR
    for large accounts, and a filed S-1 (December 2025), Motive is one of the two AI telematics market leaders alongside
    Samsara.
  foundedDate: '2013-01-01'
  founders:
    - name: Shoaib Makani
      role: CEO and Co-Founder
      background: >
        Founded KeepTruckin in 2013 to digitize trucking compliance; led the company through rebranding to Motive
        Technologies and pivot to AI-powered Physical Operations Cloud.
      claimRefs:
        - CO007
  foundingLocation: San Francisco, California
  headquarters: San Francisco, California
  productSummary: >
    Motive's platform comprises four integrated modules: AI Dashcam Plus (Qualcomm QCS6490, 30+ AI models, stereo
    vision, 1440p/ALPR), ELD/HOS compliance (FMCSA-certified Driver App), Fleet Management (GPS tracking, asset
    tracking, IFTA, dispatch), and Spend Management (branded fuel cards, expense tracking). The proprietary AI Omni
    model is trained on physical-economy operations data from 1.3M+ connected drivers.
  customerFocus: >
    Primarily trucking carriers and owner-operators; expanding to oil and gas, construction, field services, and any
    business operating physical assets. Key enterprise customers include FedEx Freight, Maersk, Halliburton, KONE,
    Cintas, Davey Tree, and ABM.
  businessModel: >
    Hardware-plus-SaaS subscription (AI dashcam sold at hardware cost with recurring SaaS fee) supplemented by
    transaction-based spend management revenue from fuel card interchange. Land-and-expand motion drives NDR of 126%
    (large accounts) and 110% (core accounts).
  stage: late-stage private
  disclosureProfile: private-disclosed
  fundingStatus: >
    Total raised ~$434M through Series F (May 2022, $2.85B valuation). Additional $150M raised in July 2025
    secondary/primary round at implied ~$3.08B. S-1 filed December 23, 2025 (CIK 1646681); NYSE: MTVE pending IPO with
    J.P. Morgan as lead underwriter.
