chapters:
  - number: 1
    title: Company Overview
    sections:
      - number: '1.1'
        title: Company Identity and Mission
        blocks:
          - type: paragraph
            body: |
              Motive Technologies was incorporated on June 1, 2013, under the original name
              KeepTruckin in San Francisco, California. The company was co-founded by Shoaib
              Makani (CEO), Obaid Khan (COO), and Ryan Johns (Technical Co-founder) to bring
              trucking operations online, initially through an electronic logbook app for
              hours-of-service (HOS) compliance under federal ELD mandate requirements.

              In April 2022 the company rebranded to Motive, reflecting an expanded mission
              beyond trucking to address the entire "physical economy" — encompassing
              trucking and logistics, construction, oil and gas, agriculture, field services,
              manufacturing, utilities, and the public sector. The name change coincided with
              a $150 million Series F round and articulated the vision of an Automated
              Operations Platform that connects vehicles, equipment, and facilities to the
              cloud and applies AI to automate safety, compliance, telematics, spend
              management, and workforce oversight in a single integrated system.

              As of the report date Motive is headquartered at 1355 Market Street, 11th Floor,
              San Francisco, CA 94103, and continues to operate as a private company following
              a December 2025 S-1 filing targeting a NYSE listing under the ticker MTVE.
              The company's product tagline is "Integrated Operations Platform for the Physical
              Economy." CEO Shoaib Makani describes the platform as "a central operating system
              for physical economy businesses, unifying data from vehicles, drivers, and
              equipment into a single interface."
            claimRefs:
              - CO001
              - CO002
              - CO003
              - CO004
              - CO005
              - CO006
              - CO007
      - number: '1.2'
        title: Leadership and Governance
        blocks:
          - type: paragraph
            body: |
              Shoaib Makani (CEO and Co-founder) holds a degree from the London School of
              Economics and previously worked at Khosla Ventures, AdMob, and Google before
              co-founding KeepTruckin. He remains publicly synonymous with Motive's strategy
              and was personally named in Samsara's 2024 lawsuit as allegedly directing
              competitive misconduct. Obaid Khan (Co-founder and COO) brings a legislative
              affairs background, while Ryan Johns (Technical Co-founder) previously served
              as VP of Engineering at Tapjoy. The three co-founders retain leading roles and
              constitute the original founding team, indicating elevated key-person
              concentration risk.

              Chirag Shah serves as CFO, a critical hire as the company navigates its IPO
              preparation and multi-year audit requirements for public markets. Shu White,
              Chief Legal Officer, led Motive's communications following the ITC ruling
              against Samsara. On the board, Ilya Fushman (Kleiner Perkins partner) rejoinedas
              a director in July 2025 after originally leading Motive's Series A in 2015; former
              HP and eBay CEO Meg Whitman joined the board in 2025, adding significant public-
              company governance experience ahead of the IPO. The full board composition beyond
              these names is not disclosed in public sources reviewed.
            claimRefs:
              - CO008
              - CO009
              - CO010
              - CO011
              - CO012
              - CO013
              - CO014
      - number: '1.3'
        title: Funding History and Capital
        blocks:
          - type: paragraph
            body: |
              Motive has raised approximately $717 million in total equity financing across
              multiple rounds since 2013. The anchor investor is Kleiner Perkins (led Series A
              in 2015 and the July 2025 extension), with co-investors including Google Ventures
              (GV), Insight Partners, Greenoaks, Index Ventures, G2 Venture Partners, BlackRock,
              IVP, Scale Venture Partners, and most recently AllianceBernstein.

              The pivotal Series F in May 2022 raised $150 million at a $2.85 billion post-money
              valuation, cementing Motive's unicorn status at roughly 2.85x. A June 2021 Series E
              of $190 million (led by G2VP and BlackRock) preceded it. In July 2025 Motive raised
              a further $150 million, again led by Kleiner Perkins with AllianceBernstein joining
              as a new investor. The 2025 round was announced alongside cash-flow positivity (since
              late 2024) and an ARR approaching $500 million, making it more of a strategic
              pre-IPO capital raise than a liquidity-driven event. The Forge secondary market
              implied a $3.08 billion Series F senior valuation as of July 2025.

              Motive confidentially filed for an IPO on September 2, 2025, and publicly submitted
              its S-1 registration on December 23, 2025, targeting the NYSE under ticker MTVE with
              bookrunners J.P. Morgan, Citi, Barclays, Jefferies, and others. The S-1 indicates
              an intent to raise at least $100 million. As of May 2026 the IPO has not yet priced
              or begun public trading, with secondary market indications near $20/share.
            claimRefs:
              - CO015
              - CO016
              - CO017
              - CO018
              - CO019
