chapter:
  number: 7
  title: Risks
  summary: >-
    Motive faces a high-severity active litigation threat from Samsara (trade secret misappropriation
    claims in Northern District of California, ongoing as of May 2026; $30.3M false-advertising
    arbitration damages already awarded). IPO execution risk is elevated in 2026 market conditions
    with software multiples well below 2021 peaks. Competitive risk from Samsara (3x ARR scale,
    higher gross margin) and OEM-embedded platforms (Platform Science) is material. Operational
    risks include hardware supply chain concentration on Qualcomm QCS6490, AI safety liability
    from false positives/negatives in driver coaching, and customer support scalability. Regulatory
    risk is net-positive (FMCSA changes mandate more digital compliance tools) but ELD
    certification removal and AEB mandates create operational risk. Talent and macroeconomic
    risks round out the risk profile as moderate but manageable.

