callouts:
- calloutType: risk
  title: Samsara Trade Secret Case is the Highest-Severity Unresolved Risk
  body: >-
    The $30.3M false advertising arbitration damages are confirmed and manageable. The unresolved
    trade secret misappropriation claims in Northern California federal court represent the
    highest-severity open risk, with unquantified damages exposure that could range into
    the hundreds of millions. An adverse verdict with injunctive relief could require product
    redesign and create a material IPO setback. This is the primary thesis-break risk for
    the investment.
  claimRefs:
  - CR001
  - CR003
  - CR029

- calloutType: risk
  title: Samsara's 3.5x ARR Scale Creates Durable Competitive Headwind
  body: >-
    Samsara's GAAP profitability and 3.5x ARR scale allow it to outspend Motive on R&D, enterprise
    sales, and AI model training. If Motive's enterprise up-market strategy does not yield sustained
    ARR growth above 25%, the scale gap will widen rather than narrow, making a multiple re-rating
    less likely.
  claimRefs:
  - CR005
  - CR031

- calloutType: insight
  title: FMCSA Changes Are Net-Positive for Motive's Compliance Product
  body: >-
    The FMCSA 2025-2026 regulatory overhaul (SMS redesign, electronic DVIR, digital DQ files)
    increases the compliance burden for fleet operators and creates natural expansion opportunities
    for Motive's compliance management modules. Regulatory tailwinds typically strengthen
    platform stickiness and reduce voluntary churn as operators become more deeply integrated
    with Motive's compliance workflows.
  claimRefs:
  - CR007
  - CR032
