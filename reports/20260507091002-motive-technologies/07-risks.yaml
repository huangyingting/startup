  claims:
  - id: CR001
    statement: >-
      Samsara's trade secret misappropriation claims against Motive are being litigated in the
      Northern District of California as of May 2026 (transferred from Delaware, Case 1:24-cv-00084);
      the case includes allegations of patent infringement, trade secret theft, false advertising,
      and unfair competition. Patent claims were cleared by ITC ruling in September 2025.
    type: third-party-reported
    topic: Active Samsara litigation status
    sourceRefs:
    - SR001
    - SR002
    - SR003
    confidence: high
    freshness: current
    answersQuestionRefs:
    - QR001
    - QR002
  - id: CR002
    statement: >-
      In a separate arbitration, Motive was awarded $30.3 million in damages to Samsara for
      false advertising related to a comparative AI dashcam benchmarking study; Motive received
      a permanent injunction ordering it to remove the study from its platforms — a confirmed
      financial liability now disclosed in the S-1.
    type: third-party-reported
    topic: False advertising arbitration damages
    sourceRefs:
    - SR005
    - SR006
    confidence: high
    freshness: recent
    answersQuestionRefs:
    - QR001
    - QR003
  - id: CR003
    statement: >-
      The remaining trade secret misappropriation claims in California federal court have not yet
      been adjudicated as of May 2026; if Samsara prevails, damages could range from tens of millions
      to hundreds of millions depending on the scope of alleged misappropriation; the S-1 classifies
      this as a material litigation risk.
    type: inferred
    topic: Trade secret litigation financial exposure
    sourceRefs:
    - SR001
    - SR023
    confidence: medium
    freshness: current
    answersQuestionRefs:
    - QR001
    - QR003
  - id: CR004
    statement: >-
      Motive's 2026 IPO occurs in a market environment where NTM software ARR multiples average
      7-8x for public SaaS peers, significantly below the 20-30x peak multiples of 2021; Motive's
      implied 6x ARR multiple reflects both market conditions and litigation overhang, limiting
      IPO upside in the near term.
    type: inferred
    topic: IPO multiple compression risk
    sourceRefs:
    - SR012
    - SR013
    confidence: medium
    freshness: current
    answersQuestionRefs:
    - QR004
    - QR005
  - id: CR005
    statement: >-
      Samsara has approximately $1.75B ARR (2026) vs. Motive's $501M — a 3.5x scale gap — and
      has reached GAAP profitability while Motive carries $138M in nine-month net losses; this
      creates a risk of Samsara accelerating enterprise wins and outspending Motive on R&D and
      sales in a sustained competitive campaign.
    type: third-party-reported
    topic: Samsara scale advantage and competitive threat
    sourceRefs:
    - SR024
    - SR026
    confidence: high
    freshness: recent
    answersQuestionRefs:
    - QR006
    - QR007
  - id: CR006
    statement: >-
      Platform Science (backed by Volkswagen and partnered with Navistar/Kenworth) offers OEM-embedded
      fleet management software pre-installed on new commercial vehicles; if this becomes the default
      platform for new truck purchases, Motive and Samsara face a structural TAM displacement risk
      that could limit penetration of new fleet additions over time.
    type: third-party-reported
    topic: OEM platform displacement risk
    sourceRefs:
    - SR010
    - SR011
    confidence: medium
    freshness: recent
    answersQuestionRefs:
    - QR008
    - QR009
  - id: CR007
    statement: >-
      FMCSA's 2026 regulatory changes — including ELD device certification tightening (with some
      devices removed from certified list), electronic DVIR authorization, and digital driver
      qualification file requirements — create near-term compliance work for fleet operators and
      opportunity for Motive to deepen platform stickiness through compliance-enabling updates.
    type: third-party-reported
    topic: FMCSA regulatory risk and opportunity
    sourceRefs:
    - SR007
    - SR009
    - SR028
    confidence: medium
    freshness: current
    answersQuestionRefs:
    - QR010
    - QR011
  - id: CR008
    statement: >-
      Motive's AI Dashcam Plus uses a single-source Qualcomm Dragonwing QCS6490 chipset; if Qualcomm
      faces supply constraints, geopolitical restrictions (e.g., Taiwan-China tensions affecting
      TSMC supply), or price increases, Motive's hardware gross margin and production scheduling
      would be directly impacted with limited near-term substitution alternatives.
    type: inferred
    topic: Qualcomm hardware supply chain concentration
    sourceRefs:
    - SR014
    - SR015
    confidence: medium
    freshness: recent
    answersQuestionRefs:
    - QR012
    - QR013
  - id: CR009
    statement: >-
      AI safety systems that generate false-positive driver coaching events (incorrectly flagging
      safe behavior as unsafe) create labor relations risk; driver pushback against dashcam
      monitoring is documented, with some trucker communities and unions opposing AI surveillance
      programs, potentially creating adoption friction in union-heavy fleets.
    type: third-party-reported
    topic: AI safety liability and driver pushback
    sourceRefs:
    - SR016
    - SR017
    confidence: medium
    freshness: recent
    answersQuestionRefs:
    - QR014
    - QR015
  - id: CR010
    statement: >-
      Motive announced in July 2025 a hiring initiative for hundreds of engineers in India, competing
      for AI talent with large tech firms and domestic Indian engineering companies; the competition
      for qualified AI/ML engineers with physical-world sensor data experience creates talent
      retention risk and cost pressure.
    type: company-claimed
    topic: Talent competition and India hiring risk
    sourceRefs:
    - SR018
    - SR025
    confidence: high
    freshness: recent
    answersQuestionRefs:
    - QR016
    - QR017
  - id: CR011
    statement: >-
      A trucking freight market downturn (similar to 2019-2020 or 2022-2023 freight recession) would
      reduce the total number of active commercial vehicles in North America, directly shrinking
      Motive's addressable SMB customer base and potentially driving higher churn among owner-operators
      and small fleets who reduce operations or exit the market.
    type: inferred
    topic: Macroeconomic freight cycle risk
    sourceRefs:
    - SR020
    - SR021
    confidence: medium
    freshness: recent
    answersQuestionRefs:
    - QR018
    - QR019
  - id: CR012
    statement: >-
