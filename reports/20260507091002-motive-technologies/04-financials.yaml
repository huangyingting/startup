callouts:
  - calloutType: strength
    title: NDR of 126% Confirms Durable Expansion Revenue
    body: >
      Motive's 126% net dollar retention for large customers is among the strongest in the SaaS fleet management sector,
      exceeding Samsara's 120% NRR. This metric validates the land-and-expand model: customers not only stay but
      significantly increase their spend year-over-year, providing organic ARR growth that partially offsets
      new-customer acquisition costs.
    claimRefs:
      - CI006
      - CI010
  - calloutType: risk
    title: GAAP Losses and IPO Timing Create Execution Risk
    body: >
      Motive carries $138.5M in net losses over nine months and is entering its IPO in a 2026 market environment where
      software multiples are significantly below 2021 peaks. The Delaware trade-secret litigation creates a material
      overhang. If IPO pricing disappoints or is delayed, Motive may need to sustain higher burn on its $150M+ cash
      reserve while navigating competitive pressures.
    claimRefs:
      - CI004
      - CI013
      - CI023
