  title: Financials
  summary: >
    Motive Technologies disclosed financials via S-1 filing (December 2025, CIK 1646681). ARR reached $501M (+28% YoY)
    as of September 2025; LTM revenue of ~$429M at 22% YoY growth; gross margin ~70%. Net loss was $138.5M for the first
    nine months of 2025 (-42% net margin), though the company reports cash-flow positive operations since late 2024.
    Large customer segment (>$100K ACV) grew 58% YoY to 494 accounts, now representing ~30% of ARR. NDR of 126% (large)
    and 110% (core) signals durable expansion revenue. Last private valuation was $2.85B (May 2022 Series F); secondary
    market indicated ~$3.08B in July 2025; IPO pricing will establish public market multiple.
