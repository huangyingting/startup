chapter:
  number: 2
  title: Market Analysis
  summary: 'Motive Technologies competes in the physical operations management market — encompassing fleet telematics, ELD
    compliance, AI safety, equipment monitoring, and spend management for asset-heavy industries. The global commercial vehicle
    telematics market was valued at $24–62B in 2024 (varying by scope), with North America at ~34% share. North American fleet
    management penetration stands at 53% of commercial vehicles (2023), rising to ~81% by 2028. Motive targets a $100B+ physical
    operations TAM, though a more conservative North American SAM of ~$21B is more defensible for near-term analysis. ELD
    mandate renewal cycles (2024–2026) create a key switching opportunity, while AI adoption (56% of vendors already deploying),
    fleet electrification, and non-trucking vertical expansion drive long-term growth. Headwinds include SMB hardware cost
    barriers, driver privacy concerns, and a 10% projected decline in US truck registrations in 2025.

    '
