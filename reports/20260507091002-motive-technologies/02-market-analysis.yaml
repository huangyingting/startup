callouts:
- type: key-finding
  title: Market Is in Mid-Adoption With Significant Runway
  body: At 53.3% commercial vehicle penetration in North America (2023) and a forecast to 80.6% by 2028, the fleet management
    market retains substantial greenfield opportunity. The incumbent Samsara — with $1.46B ARR — estimates it has captured
    approximately 1% of a $96B+ TAM, implying Motive's market share is similarly single-digit percentage, leaving enormous
    room for both competitors to grow without zero-sum competition.
  claimRefs:
  - CM008
  - CM017
- type: risk-flag
  title: Definitional TAM Inflation Risk
  body: Motive's stated TAM of $100B+ includes equipment monitoring, spend management, and workforce modules that are not
    yet generating material revenue. Investors should use the narrower $21B North American commercial vehicle telematics SAM
    for near-term valuation anchoring and reserve the $100B+ figure for long-term optionality.
  claimRefs:
  - CM004
  - CM015
  - CM037
- type: key-finding
  title: ELD Renewal Cycle Creates Switching Opportunity
  body: Initial ELD mandates drove fleet adoption in 2017–2019 on 5-year contracts. The 2024–2026 renewal window is a rare
    switching moment — fleet operators are actively evaluating whether to stay with legacy ELD providers (Omnitracs, Trimble)
    or upgrade to AI-native platforms like Motive and Samsara. This renewal cycle is a structural tailwind that may not repeat
    at the same scale.
  claimRefs:
  - CM020
