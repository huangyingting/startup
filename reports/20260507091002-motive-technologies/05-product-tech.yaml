callouts:
  - calloutType: strength
    title: Integrated Platform Creates Multi-Layer Moat
    body: >
      Motive's integration of AI Dashcam, ELD compliance, fleet tracking, and spend management on a single AWS-hosted
      platform creates switching costs far exceeding any individual module. Fleet operators accumulate years of
      compliance data, AI-coached driver behavior records, and fuel spend analytics that cannot be easily migrated. The
      Qualcomm QCS6490-powered AI Omni model running 30+ simultaneous behavior detectors represents the hardware AI edge
      that no pure-software competitor can easily replicate without similar silicon investment.
    claimRefs:
      - CE008
      - CE027
      - CE001
  - calloutType: risk
    title: False-Positive Alerts and AI Bias Risk
    body: >
      User reviews consistently cite false-positive alerts (incorrectly flagging safe driving) as a material product
      quality concern. Alert fatigue reduces driver adoption and cooperative use of the coaching system — undermining
      the core safety value proposition. Growing labor union scrutiny of AI driver monitoring systems for bias and
      explainability represents a regulatory risk that could require Motive to add explainability features and bias
      audits to its product roadmap, increasing development costs.
    claimRefs:
      - CE014
      - CE031
