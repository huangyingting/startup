chapter:
  number: 1
  title: Company Overview
  summary: >-
    Company Overview for Helsing synthesizes public evidence on defense AI / autonomous systems, retaining
    private-metric gaps where the source base is incomplete.
sections:
  - id: company-overview-section-1
    title: Evidence base
    body: >-
      Company Overview section 1 triangulates public evidence for Helsing against the chapter mission: Establish
      identity, leadership, funding, scale, and milestones that every later chapter can reuse as ground truth. Helsing
      develops AI for democratic defense customers across software, sensors, drones, air combat autonomy, and maritime
      autonomy. The diligence read is deliberately conservative: public sources can identify the company, product
      surface, financing context, customer or partner proof, and category tailwinds, but they do not expose the full
      management data room. The retained claims in this section therefore separate observed public facts from estimated
      or inferred operating implications. For underwriting, the practical question is not whether the company has
      credible external validation; it does. The harder question is whether that validation converts into repeatable
      economics at the price implied by the latest private financing. Critical regulatory, legal, ethical, and
      reputational risk from autonomous weapons and export-controlled defense systems. Revenue, backlog, and unit
      economics by defense program remain private or classified. The referenced claim set (CO001, CO002, CO003, CO004)
      supports the section's evidence boundaries and keeps unsupported private metrics as explicit diligence asks rather
      than invented facts.
    claimRefs:
      - CO001
      - CO002
      - CO003
      - CO004
      - CO005
      - CO006
      - CO007
    tableRefs:
      - TO001
    figureRefs:
      - FO001
  - id: company-overview-section-2
    title: Operating implications
    body: >-
      Company Overview section 2 triangulates public evidence for Helsing against the chapter mission: Establish
      identity, leadership, funding, scale, and milestones that every later chapter can reuse as ground truth. The
      company raised €450M in 2024 and €600M in 2025, with public reports putting valuation well above $1B. The
      diligence read is deliberately conservative: public sources can identify the company, product surface, financing
      context, customer or partner proof, and category tailwinds, but they do not expose the full management data room.
      The retained claims in this section therefore separate observed public facts from estimated or inferred operating
      implications. For underwriting, the practical question is not whether the company has credible external
      validation; it does. The harder question is whether that validation converts into repeatable economics at the
      price implied by the latest private financing. Valuation is aggressive relative to limited public revenue and
      margin disclosure. Export-control licenses, end-use monitoring, and targeting-governance controls need legal
      review. The referenced claim set (CO008, CO009, CO010, CO011) supports the section's evidence boundaries and keeps
      unsupported private metrics as explicit diligence asks rather than invented facts.
    claimRefs:
      - CO008
      - CO009
      - CO010
      - CO011
      - CO012
      - CO013
      - CO014
    tableRefs:
      - TO002
    figureRefs:
      - FO002
  - id: company-overview-section-3
    title: Risk and disconfirmation
    body: >-
      Company Overview section 3 triangulates public evidence for Helsing against the chapter mission: Establish
      identity, leadership, funding, scale, and milestones that every later chapter can reuse as ground truth. Helsing
      announced HX-2 as a mass-producible intelligent strike drone and Altra as a recce-strike software platform. The
      diligence read is deliberately conservative: public sources can identify the company, product surface, financing
      context, customer or partner proof, and category tailwinds, but they do not expose the full management data room.
      The retained claims in this section therefore separate observed public facts from estimated or inferred operating
      implications. For underwriting, the practical question is not whether the company has credible external
      validation; it does. The harder question is whether that validation converts into repeatable economics at the
      price implied by the latest private financing. Government procurement concentration and classified contract terms
      make customer durability hard to underwrite publicly. Battlefield performance claims and manufacturing throughput
      require primary customer diligence. The referenced claim set (CO015, CO016, CO017, CO018) supports the section's
      evidence boundaries and keeps unsupported private metrics as explicit diligence asks rather than invented facts.
    claimRefs:
      - CO015
      - CO016
      - CO017
      - CO018
      - CO019
      - CO020
      - CO021
    tableRefs:
      - TO003
    figureRefs:
      - FO003
  - id: company-overview-section-4
    title: Diligence view
    body: >-
      Company Overview section 4 triangulates public evidence for Helsing against the chapter mission: Establish
      identity, leadership, funding, scale, and milestones that every later chapter can reuse as ground truth. Helsing
      describes a human-in-or-on-the-loop principle for critical defense decisions. The diligence read is deliberately
      conservative: public sources can identify the company, product surface, financing context, customer or partner
      proof, and category tailwinds, but they do not expose the full management data room. The retained claims in this
      section therefore separate observed public facts from estimated or inferred operating implications. For
      underwriting, the practical question is not whether the company has credible external validation; it does. The
      harder question is whether that validation converts into repeatable economics at the price implied by the latest
      private financing. Critical regulatory, legal, ethical, and reputational risk from autonomous weapons and
      export-controlled defense systems. Revenue, backlog, and unit economics by defense program remain private or
      classified. The referenced claim set (CO022, CO023, CO024, CO025) supports the section's evidence boundaries and
      keeps unsupported private metrics as explicit diligence asks rather than invented facts.
    claimRefs:
      - CO022
      - CO023
      - CO024
      - CO025
      - CO026
      - CO027
      - CO028
    tableRefs:
      - TO004
    figureRefs: []
