      - number: '8.3'
        title: Risk and disconfirmation
        blocks:
          - type: paragraph
            body: >-
              Valuation section 3 triangulates public evidence for Helsing against the chapter mission: Convert evidence
              into recommendation, confidence, risk rating, valuation stance, scenarios, and diligence asks. Helsing
              announced HX-2 as a mass-producible intelligent strike drone and Altra as a recce-strike software
              platform. The diligence read is deliberately conservative: public sources can identify the company,
              product surface, financing context, customer or partner proof, and category tailwinds, but they do not
              expose the full management data room. The retained claims in this section therefore separate observed
              public facts from estimated or inferred operating implications. For underwriting, the practical question
              is not whether the company has credible external validation; it does. The harder question is whether that
              validation converts into repeatable economics at the price implied by the latest private financing.
              Government procurement concentration and classified contract terms make customer durability hard to
              underwrite publicly. Battlefield performance claims and manufacturing throughput require primary customer
              diligence. The referenced claim set (CV015, CV016, CV017, CV018) supports the section's evidence
              boundaries and keeps unsupported private metrics as explicit diligence asks rather than invented facts.
