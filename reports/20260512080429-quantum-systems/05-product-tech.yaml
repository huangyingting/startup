sections:
  - id: evidence-base
    title: Evidence base
    body: >-
      Evidence base. Quantum Systems has unusually concrete product evidence for
      a private defense technology company. Vector AI, Trinity Pro, and Twister
      have official product pages or datasheets, while customer and reseller
      sources add corroboration around deployment contexts. The architecture
      appears to combine airframes, payloads, edge compute, encrypted links,
      mission software, and support workflows; it is not merely an AI wrapper.
      Still, public materials are marketing and technical sheets, not
      independent qualification reports. The critical diligence lens is
      therefore maturity under contested conditions: encryption implementation,
      EW/GNSS resilience, reliability, supply-chain security, maintainability,
      and field support must be validated with operators and procurement teams
      before assuming technical claims convert into durable moat. Additional
      diligence interpretation: the retained public sources establish direction
      and corroboration, but the chapter avoids converting incomplete private
      data into false precision. Each section should be read as an
      evidence-weighted view, with explicit follow-up paths for management data,
      customer references, and compliance documents that remain outside the
      public record.
    claimRefs:
      - CE001
      - CE002
      - CE003
      - CE004
      - CE005
      - CE006
      - CE007
      - CE008
      - CE009
    tableRefs:
