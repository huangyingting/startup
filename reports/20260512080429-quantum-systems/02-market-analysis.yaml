sections:
  - id: evidence-base
    title: Evidence base
    body: >-
      Evidence base. The market is tactical ISR and dual-use unmanned aerial
      systems for government, defense, security, and selected industrial
      workflows. Broad military-drone forecasts are useful only after narrowing
      the boundary, because consumer drones, strategic combat aircraft, maritime
      systems, and generic autonomy software do not map cleanly to Quantum
      Systems revenue. The most relevant adoption drivers are NATO and European
      defense spending, Ukraine-driven demand for battle-tested systems, and
      formal U.S. and Australian procurement proof. The most important
      constraints are export control, procurement timing, support obligations,
      and country-specific industrial-policy preferences. The analysis therefore
      uses several sizing lenses and deliberately preserves contradictions
      between broad market reports and narrower Quantum-specific evidence.
      Additional diligence interpretation: the retained public sources establish
      direction and corroboration, but the chapter avoids converting incomplete
      private data into false precision. Each section should be read as an
      evidence-weighted view, with explicit follow-up paths for management data,
      customer references, and compliance documents that remain outside the
      public record.
    claimRefs:
      - CM001
      - CM002
      - CM003
      - CM004
      - CM005
      - CM006
      - CM007
      - CM008
      - CM009
    tableRefs:
