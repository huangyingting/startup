sections:
  - id: evidence-base
    title: Evidence base
    body: >-
      Evidence base. Quantum Systems is best understood as a private,
      growth-stage defense technology company rather than a conventional
      commercial drone vendor. The public record anchors identity in official
      company pages, a May 2025 financing release, independent funding coverage,
      and customer/procurement proof. The company has named products, named
      government customers, and visible expansion into the United States and
      Ukraine, but the same record leaves important private-company gaps. This
      section separates verified public milestones from unsupported metrics:
      funding, product scope, and selected customers are sourced; ARR, gross
      margin, exact customer count, and board terms are not. That distinction
      matters because later chapters should reuse the company identity while
      carrying explicit nulls for unavailable operating metrics and treating the
      security incident and Ukraine exposure as diligence items, not footnotes.
    claimRefs:
      - CO001
      - CO002
      - CO003
      - CO004
      - CO005
      - CO006
      - CO007
      - CO008
      - CO009
    tableRefs:
