sections:
  - id: evidence-base
    title: Evidence base
    body: >-
      Evidence base. The public evidence supports a high-quality company but not
      an aggressive price-insensitive investment decision. Quantum Systems has
      real products, meaningful funding, strategic demand, and named customers,
      while defense-autonomy comparables show the market is willing to fund
      large outcomes. However, the latest public valuation evidence is
      milestone-driven and private; current revenue, backlog, gross margin, cash
      runway, retention, and cap-table terms are not disclosed. The appropriate
      stance is therefore track or research-more with price discipline. A buy
      case needs management financials and customer reference proof; an avoid
      case would require adverse evidence such as export-control breach,
      customer cancellation, or material cyber failure. Additional diligence
      interpretation: the retained public sources establish direction and
      corroboration, but the chapter avoids converting incomplete private data
      into false precision. Each section should be read as an evidence-weighted
      view, with explicit follow-up paths for management data, customer
      references, and compliance documents that remain outside the public
      record.
    claimRefs:
      - CV001
      - CV002
      - CV003
      - CV004
      - CV005
      - CV006
      - CV007
      - CV008
      - CV009
    tableRefs:
