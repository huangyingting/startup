              采购证据锚定了公司身份。公司有具名产品、具名政府客户，也能看到向美国和乌克兰扩张的动作；但同一套记录也留下了私营公司常见的关键缺口。本节把已验证的公开里程碑和未获支撑的指标拆开：融资、产品范围和部分客户有来源；ARR、毛利率、准确客户数和董事会条款没有来源。这一区分很重要，因为后续章节应复用公司身份，同时对拿不到的经营指标保留明确空值，并把安全事件和乌克兰敞口当作尽调事项，而不是脚注。
