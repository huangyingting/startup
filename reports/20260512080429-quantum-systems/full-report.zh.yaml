companyProfile:
  summary: >-
    Quantum Systems 是一家源自慕尼黑的私营防务科技公司，做 AI 驱动的无人系统；公开主打 Vector AI、Trinity Pro 和 Twister 平台。公开证据显示，公司在 2025 年完成大额 Series
    C，拥有战略航空航天与防务投资方、欧洲融资支持和具名政府客户，但未披露当前经审计财务数据或留存指标。
