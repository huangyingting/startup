        blocks:
          - type: paragraph
            body: >-
              证据基础。这个市场是面向政府、防务、安全和部分工业流程的战术 ISR 与军民两用无人航空系统。宽口径军用无人机预测只有在边界收窄后才有用，因为消费级无人机、战略作战飞机、海事系统和通用自主软件，都不能干净映射到
              Quantum Systems 的收入。最相关的采用动力来自 NATO
              与欧洲国防支出、乌克兰催生的战场验证系统需求，以及美国和澳大利亚正式采购证据。最重要的约束则是出口管制、采购节奏、支持义务和各国特定的产业政策偏好。因此，本分析采用多个市场规模视角，并有意保留宽口径市场报告与更窄
              Quantum
              专属证据之间的矛盾。补充尽调解读：保留下来的公开来源能确认方向并相互印证，但本章避免把不完整的私有数据换算成虚假的精确度。每一节都应按证据权重阅读；管理层数据、客户访谈和合规文件仍在公开记录之外，需要明确跟进。
