sections:
  - id: evidence-base
    title: Evidence base
    body: >-
      Evidence base. The financial story is promising but not fully
      underwritable from public evidence. The company has reported rapid growth
      and large financing rounds; Sacra provides a directional revenue estimate;
      public procurement sources show meaningful contract values. Yet audited
      revenue, current ARR, gross margin, cash balance, burn, backlog, customer
      concentration, and software attach rates remain private. That means the
      chapter treats reported growth and contract evidence as proof of traction,
      not proof of profitability. The core underwriting issue is whether
      hardware deliveries, support obligations, manufacturing scale-up, and
      joint ventures can convert into durable gross margin and cash conversion
      at the pace implied by late-stage defense-tech valuations. Additional
      diligence interpretation: the retained public sources establish direction
      and corroboration, but the chapter avoids converting incomplete private
      data into false precision. Each section should be read as an
      evidence-weighted view, with explicit follow-up paths for management data,
      customer references, and compliance documents that remain outside the
      public record.
    claimRefs:
      - CI001
      - CI002
      - CI003
      - CI004
      - CI005
      - CI006
      - CI007
      - CI008
      - CI009
    tableRefs:
