  - number: 3
    title: Competitors
    sections:
      - number: '3.1'
        title: Evidence base
        blocks:
          - type: paragraph
            body: >-
              Evidence base. Quantum Systems competes in a crowded defense-autonomy field where buyers can choose
              trusted small-drone vendors, broader autonomy platforms, aerospace primes, public UAS incumbents, and
              domestic build programs. The company has differentiated evidence around Vector AI, Twister, Ukraine
              feedback loops, and NATO-aligned customer proof, but competitors have their own strengths: U.S.
              manufacturing narratives, public-company disclosure, prime-contractor bundling, maritime specialization,
              or larger funding rounds. The competitive question is not whether Quantum Systems has real products; it
              does. The question is whether those products and channels create durable pricing power once buyers compare
              endurance, payloads, secure supply, exportability, service obligations, and domestic-preference
              requirements across multiple vendors. Additional diligence interpretation: the retained public sources
              establish direction and corroboration, but the chapter avoids converting incomplete private data into
              false precision. Each section should be read as an evidence-weighted view, with explicit follow-up paths
              for management data, customer references, and compliance documents that remain outside the public record.
            claimRefs:
