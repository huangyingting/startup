              adverse frame includes Ukraine operational exposure, export licensing, sanctions screening, component
              dependency, production scale-up, and customer concentration. None of the retained sources establishes a
              fatal lawsuit or sanction, but several show why an investor should require enhanced legal, cyber,
              operational, and customer diligence. The most important distinction is between risks that can be monitored
