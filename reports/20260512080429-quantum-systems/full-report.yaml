              rather than a conventional commercial drone vendor. The public record anchors identity in official company
              pages, a May 2025 financing release, independent funding coverage, and customer/procurement proof. The
              company has named products, named government customers, and visible expansion into the United States and
              Ukraine, but the same record leaves important private-company gaps. This section separates verified public
              milestones from unsupported metrics: funding, product scope, and selected customers are sourced; ARR,
              gross margin, exact customer count, and board terms are not. That distinction matters because later
              chapters should reuse the company identity while carrying explicit nulls for unavailable operating metrics
