              Evidence base. The public evidence supports a high-quality company but not an aggressive price-insensitive
              investment decision. Quantum Systems has real products, meaningful funding, strategic demand, and named
              customers, while defense-autonomy comparables show the market is willing to fund large outcomes. However,
