  - number: 7
    title: Risks
    sections:
      - number: '7.1'
        title: Evidence base
        blocks:
          - type: paragraph
            body: >-
              Evidence base. The risk profile is high but legible. Quantum Systems operates in defense UAS, war-adjacent
              production, cross-border export-control regimes, and sensitive data environments. The clearest
              company-specific adverse item is the 2025 subcontractor-account security incident; the broader adverse
              frame includes Ukraine operational exposure, export licensing, sanctions screening, component dependency,
              production scale-up, and customer concentration. None of the retained sources establishes a fatal lawsuit
              or sanction, but several show why an investor should require enhanced legal, cyber, operational, and
              customer diligence. The most important distinction is between risks that can be monitored and mitigated,
              such as export processes, and risks that could break the thesis, such as a major cyber compromise or
              cancelled government program. Additional diligence interpretation: the retained public sources establish
              direction and corroboration, but the chapter avoids converting incomplete private data into false
              precision. Each section should be read as an evidence-weighted view, with explicit follow-up paths for
              management data, customer references, and compliance documents that remain outside the public record.
