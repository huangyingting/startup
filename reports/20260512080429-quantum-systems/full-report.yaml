  - number: 6
    title: Customers
    sections:
      - number: '6.1'
        title: Evidence base
        blocks:
          - type: paragraph
            body: >-
              Evidence base. Customer evidence is the strongest public part of the Quantum Systems case. The source base
              includes U.S. Army selection, Australian DEF129-SUAS contracts, Spain tenders, Bundeswehr Twister
              coverage, Ukraine production and interceptor demand, and commercial mapping evidence through
              RocketDNA/Rocketmine. These are not just website logos; several are procurement or deployment sources. The
              limitation is equally important: no public source discloses customer count, retention, NRR, top-customer
              concentration, satisfaction, or renewal behavior. The chapter therefore scores adoption proof as strong
              for named defense customers and weak for subscription-style durability metrics. Reference calls and
              contract review are required to convert adoption into revenue-quality confidence. Additional diligence
              interpretation: the retained public sources establish direction and corroboration, but the chapter avoids
              converting incomplete private data into false precision. Each section should be read as an
              evidence-weighted view, with explicit follow-up paths for management data, customer references, and
              compliance documents that remain outside the public record.
