company:
  name: upGrad
chapter:
  number: 3
  title: Competitors
  summary: upGrad competes in India's professional online education market against Simplilearn, Great Learning (operationally
    impaired post-Byju's collapse), Jaro Education (listed/profitable), NIIT, Imarticus Learning, and global players Coursera
    and LinkedIn Learning. upGrad's strongest moats are university degree-granting partnerships (LJMU, Deakin, MICA, IIT Madras)
    and its 2,500+ hiring-partner placement network. Key risks include AI commoditization of live-cohort premiums and consumer
    trust erosion from placement guarantee complaints.
sections:
- id: section-1
  title: Competitive landscape overview
  body: 'upGrad competes across three tiers: (1) direct online higher education and upskilling peers operating in India''s
    post-K12 professional segment; (2) global platform players with India presence; and (3) legacy offline incumbents now
    building digital capabilities. The direct competitive set includes Simplilearn, Great Learning (Byju''s subsidiary, operationally
    impaired), NIIT, Jaro Education, and Imarticus Learning. Adjacent players include Coursera, edX/2U, and LinkedIn Learning
    as global MOOC platforms competing for enterprise L&D budgets.


    The competitive landscape post-2022 edtech shakeout is consolidating: Byju''s suffered financial collapse with approximately
    Rs 22,000 crore in liabilities and massive layoffs by 2024; Vedantu pivoted to K-12 profitability; Unacademy exited from
    several verticals. This consolidation has benefited upGrad as the largest surviving premium B2C player in professional
    upskilling. However, Coursera and LinkedIn Learning are aggressively expanding enterprise contracts, Simplilearn has maintained
    strong technical skills market share, and PhysicsWallah''s PW Skills is a new low-price disruptor in technical bootcamps.'
  claimRefs:
  - CP001
  - CP002
  - CP003
  - CP004
  tableRefs:
  - TP001
- id: section-2
  title: Competitor profiles
  body: 'Simplilearn is upGrad''s closest direct competitor in technical upskilling. Acquired by Blackstone in 2021 for approximately
    $250M, it reported annual revenue in the $80-110M range with global reach through Purdue University and Caltech partnerships.
    Great Learning, acquired by Byju''s in 2021, operated under financial stress post-2023, with course interruptions and
    placement issues reported in 2024; its competitive intensity is materially impaired. NIIT is the legacy IT training incumbent,
    serving enterprise clients but lacking prestige in the premium PG segment.


    Jaro Education (BSE/NSE: JARO) is the only major India professional edtech company with consistent public profitability:
    FY24 revenue Rs 391 crore, PAT Rs 39 crore (10% net margins), focused on online MBA and PGDM programs in partnership with
    B-schools such as SPJIMR and IIM Nagpur. Coursera reported 148M registered learners globally as of FY2024 with enterprise
    revenue approximately $258M across 7,000+ clients. LinkedIn Learning has 27M+ active learners globally with enterprise
    subscriptions covering Fortune 500 companies, but lacks credit-bearing credentials. PhysicsWallah''s PW Skills launched
    professional courses at Rs 5,000-Rs 25,000 price points in 2023-24, targeting the lower end of the upskilling market.'
  claimRefs:
  - CP005
  - CP006
  - CP007
  - CP008
  - CP009
  - CP010
- id: section-3
  title: Feature and capability comparison
  body: 'upGrad''s differentiating features include: (1) university-branded online degrees (LJMU, Deakin, MICA, IIT Madras)
    that carry formal degree credentials not replicated by Simplilearn, PW Skills, or NIIT; (2) live-online cohort learning
    with dedicated student success managers; (3) placement support through 2,500+ hiring partners; and (4) a full-stack enterprise
    platform (upGrad Enterprise) serving 250+ clients including GCCs and IT multinationals. Simplilearn offers stronger point-skill
    certifications (Google Cloud, AWS, Microsoft partnerships) but lacks degree-bearing programs. Coursera for Business serves
    7,000+ enterprise clients globally with AI Coach and Skill Academy features launched in 2024-25.


    On pricing, upGrad''s PGP programs range from Rs 75,000 to Rs 3,00,000. Simplilearn''s certificate programs run Rs 15,000-Rs
    80,000; Jaro Education''s online MBA runs Rs 5-8 lakh; Coursera Plus is approximately Rs 33,000 per year; PW Skills bootcamps
    are Rs 5,000-Rs 25,000. Each competitor occupies a distinct price tier, meaning direct price competition is limited except
    at the certificate level where Simplilearn and PW Skills compete directly.'
  claimRefs:
  - CP011
  - CP012
  - CP013
  - CP014
  - CP015
  tableRefs:
  - TP002
  - TP003
  figureRefs:
