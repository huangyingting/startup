  evidenceGaps:
  - type: missing-source
    severity: material
    topic: NPS / CSAT not disclosed
    missingEvidence: upGrad has not publicly disclosed NPS or CSAT scores; consumer forum data is anecdotal.
    whyItMatters: Satisfaction metrics are critical for assessing churn risk and enterprise renewal quality.
    diligencePath: Request NPS by program cohort and segment from management during diligence.
    relatedQuestionRefs:
    - QU012
    relatedTableRefs:
    - TU004
  - type: missing-source
    severity: minor
    topic: Tier 2/3 enrollment breakdown
    missingEvidence: No quantified breakdown of learner base by city tier; 10% Tier 2/3 is an estimate.
    whyItMatters: Tier 2/3 expansion is cited as key growth vector; actual penetration data would validate or challenge this
      thesis.
    diligencePath: Request enrollment breakdown by city tier from management.
    relatedQuestionRefs:
    - QU013
    - QU021
    relatedTableRefs:
    - TU001
  - type: private-evidence-only
    severity: material
    topic: LTV/CAC calculation
    missingEvidence: No public disclosure of upGrad's LTV/CAC calculation; estimates derived from revenue and disclosed metrics.
    whyItMatters: LTV/CAC is fundamental for unit economics assessment; without it, profitability path analysis is limited.
    diligencePath: Request cohort-level LTV analysis from management; cross-reference with investor presentations.
    relatedQuestionRefs:
    - QU014
    relatedTableRefs:
    - TU002
  - type: missing-source
    severity: minor
    topic: NBFC default rate exposure
    missingEvidence: No public disclosure of NBFC loan default rates attributable to upGrad enrollments.
    whyItMatters: If NBFC partners experience high default rates from edtech enrollments, they could tighten approval criteria,
      suppressing demand.
    diligencePath: Request NBFC partner default rate data; review NBFC credit policy changes.
    relatedQuestionRefs:
    - QU023
    relatedTableRefs:
    - TU005
  - type: missing-source
    severity: minor
    topic: Non-IT enterprise sector breakdown
    missingEvidence: No breakdown of 600+ enterprise clients by sector beyond IT services; BFSI and manufacturing share unknown.
    whyItMatters: Diversification beyond IT services is important for revenue resilience if IT hiring slows.
    diligencePath: Request enterprise client breakdown by sector from management.
    relatedQuestionRefs:
    - QU019
    relatedTableRefs:
    - TU001
  - type: missing-source
    severity: minor
    topic: Completion rate comparison to competitors
    missingEvidence: No independently published completion rate data for Jaro Education or Great Learning for direct comparison.
    whyItMatters: upGrad's completion rate claim (65-75%) needs competitive context to assess SSM model differentiation.
    diligencePath: Request competitor completion rate data from analyst firms; use alumni forum cross-analysis.
    relatedQuestionRefs:
    - QU020
    relatedTableRefs:
    - TU004
  - type: missing-source
    severity: minor
    topic: Refund dispute rate not disclosed
    missingEvidence: upGrad does not disclose refund dispute rate as percentage of enrollments; only consumer forum volume
      is available.
    whyItMatters: Refund dispute rate indicates consumer satisfaction health and contingent liability exposure under Consumer
      Protection Act 2019.
    diligencePath: Request refund dispute rate and resolution timeline data from management; cross-reference with consumer
      court filings.
    relatedQuestionRefs:
    - QU022
    relatedTableRefs:
    - TU004
