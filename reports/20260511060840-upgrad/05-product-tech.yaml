  evidenceGaps:
  - type: missing-source
    severity: minor
    topic: Placement AI effectiveness validation
    missingEvidence: No third-party audit or effectiveness study of upGrad's placement AI algorithm; placement rates are company-claimed.
    whyItMatters: Placement AI is a key differentiator claim; without validation, placement success rates are difficult to
      verify.
    diligencePath: Request upGrad placement outcome data by program cohort; review hiring partner feedback; request audit
      of placement tracking methodology.
    relatedQuestionRefs:
    - QE016
    relatedTableRefs:
    - TE002
  - type: missing-source
    severity: minor
    topic: Blockchain credential rollout scale
    missingEvidence: No public confirmation of blockchain credential pilot scale or number of credentials issued.
    whyItMatters: Blockchain credentials could be a moat for enterprise verification; scale of pilot determines maturity.
    diligencePath: Request pilot enrollment data; check blockchain credential issuance on-chain.
    relatedQuestionRefs:
    - QE018
    relatedTableRefs:
    - TE005
  - type: missing-source
    severity: material
    topic: AI-generated content quality controls
    missingEvidence: No public disclosure of upGrad's quality review process for AI-generated courseware.
    whyItMatters: AI content errors in technically complex subjects (data science, law, healthcare) could damage brand credibility.
    diligencePath: Request editorial review process documentation; review learner NPS by AI-generated vs human-authored courses.
    relatedQuestionRefs:
    - QE019
    relatedTableRefs:
    - TE004
  - type: missing-source
    severity: minor
    topic: Program completion rate benchmarks
    missingEvidence: No publicly disclosed program completion rates for upGrad B2C programs; estimates of 65-75% are based
      on industry benchmarks.
    whyItMatters: Completion rates affect refund liabilities and net revenue quality; low completion erodes SSM moat claims.
    diligencePath: Request cohort-level completion rate data from management; cross-reference with SSM model claims.
    relatedQuestionRefs:
    - QE021
    relatedTableRefs:
    - TE002
  - type: missing-source
    severity: minor
    topic: Skills Passport deployment status
    missingEvidence: No confirmed production deployment of Skills Passport product as of May 2026; in early development.
    whyItMatters: Skills Passport is a key differentiator for enterprise retention; delayed deployment weakens the moat.
    diligencePath: Request product demo and enterprise pilot client list.
    relatedQuestionRefs:
    - QE023
    relatedTableRefs:
    - TE005
  - type: missing-source
    severity: minor
    topic: Vernacular content catalog coverage
    missingEvidence: No quantified data on percentage of upGrad's catalog available in Hindi, Tamil, or Telugu as of 2026.
    whyItMatters: Tier 2/3 strategy effectiveness depends on vernacular catalog coverage; without data, expansion potential
      is uncertain.
    diligencePath: Request catalog metadata showing language availability breakdown.
    relatedQuestionRefs:
    - QE024
    relatedTableRefs:
    - TE001
