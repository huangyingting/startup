  evidenceGaps:
  - type: private-evidence-only
    severity: blocking
    topic: Cash on balance sheet and detailed burn rate
    missingEvidence: upGrad has not disclosed cash on balance sheet or monthly burn rate in any public communication as of
      May 2026.
    whyItMatters: Cash position determines IPO readiness and whether additional dilutive funding is required; without it,
      capital adequacy cannot be fully assessed.
    diligencePath: Request March 2026 balance sheet from management; review auditor's going concern notes if any.
    relatedQuestionRefs:
    - QI014
    relatedTableRefs:
    - TI004
  - type: private-evidence-only
    severity: material
    topic: Segment-level gross margins (B2C vs B2B)
    missingEvidence: No public disclosure of program-level or segment-level gross margins; all estimates are derived from
      analyst benchmarks.
    whyItMatters: Segment gross margins are the primary determinant of margin durability and IPO valuation multiple.
    diligencePath: Request management P&L by segment; review internal MIS data in DD.
    relatedQuestionRefs:
    - QI008
    - QI022
    relatedTableRefs:
    - TI002
  - type: missing-source
    severity: material
    topic: Contingent liabilities from placement guarantees and consumer complaints
    missingEvidence: No quantified contingent liability note in public financial summaries for placement guarantee claims
      or consumer court orders.
    whyItMatters: If CCPA or consumer courts rule against upGrad at scale, refund liabilities could be material.
    diligencePath: Review legal register in DD; check CCPA enforcement orders; review consumer court filings.
    relatedQuestionRefs:
    - QI016
    relatedTableRefs:
    - TI005
  - type: private-evidence-only
    severity: material
    topic: Headcount and cost base post-restructuring
    missingEvidence: Current headcount (FY25/FY26) is not publicly confirmed; estimates range from 8,000-12,000 based on LinkedIn
      data.
    whyItMatters: Headcount drives the cost base; accurate employee count is essential for cost structure and margin modeling.
    diligencePath: Request HR data in DD; cross-check LinkedIn headcount filter for upGrad employees.
    relatedQuestionRefs:
    - QI021
    relatedTableRefs:
    - TI002
  - type: missing-source
    severity: minor
    topic: KnowledgeHut subsidiary-level profitability
    missingEvidence: No separate disclosure of KnowledgeHut EBITDA or PAT in available financial summaries.
    whyItMatters: If KnowledgeHut is EBITDA-negative, it is dragging consolidated margins; if positive, it provides a capital-efficient
      growth engine.
    diligencePath: Request KnowledgeHut subsidiary P&L in DD; review acquisition accounting.
    relatedQuestionRefs:
    - QI024
    relatedTableRefs:
    - TI001
