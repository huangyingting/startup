company:
  name: upGrad
chapter:
  number: 4
  title: Financials
  summary: upGrad achieved its first EBITDA-positive year in FY25 (+Rs 15 crore) on gross revenue of Rs 1,943 crore (5% YoY
    growth), with net loss narrowing to Rs 273 crore from Rs 560 crore in FY24. The company's revenue recognition model defers
    significant cash collected (Rs 556 crore deferred revenue in FY25), making gross revenue a better indicator of business
    health than Ind-AS operating revenue. Total equity funding is approximately $782M; Temasek's $60M round at $2.25B valuation
    in October 2024 provided runway for IPO preparation. The path to sustained profitability depends on B2B enterprise margin
    improvement and reducing student acquisition costs.
sections:
- id: section-1
  title: Revenue streams and recognition
  body: 'upGrad''s revenue architecture has two primary streams: (1) B2C tuition fees from PGP, executive education, and online
    degree programs—the dominant stream at approximately 65-70% of gross revenue; and (2) B2B enterprise contracts from workforce
    upskilling for GCCs, IT companies, and manufacturing sector clients—approximately 30-35% of gross revenue and growing
    faster.


    Revenue recognition under Ind-AS follows a deferred revenue model: tuition fees are collected upfront or through NBFC
    loans (with upGrad receiving the proceeds), but recognized over the program duration. This creates a significant deferred
    revenue balance: Rs 556 crore in FY25 and Rs 507 crore in FY24. The gap between gross collected revenue (Rs 1,943 crore)
    and Ind-AS operating revenue (Rs 1,569 crore) in FY25 reflects this deferral dynamic. Analysts and investors should track
    gross revenue as the demand signal and Ind-AS revenue for profitability analysis.


    KnowledgeHut (acquired 2021) contributes international revenue primarily from Southeast Asia, Middle East, and North America,
    estimated at 20-25% of total company revenue in FY25. Enterprise contracts carry higher immediate revenue recognition
    (service delivery-based) versus consumer programs.'
  claimRefs:
  - CI001
  - CI002
  - CI003
  - CI004
  tableRefs:
  - TI001
- id: section-2
  title: Revenue trajectory and EBITDA path
  body: 'upGrad''s revenue trajectory shows recovery from peak losses in FY23 (net loss Rs 2,591 crore during aggressive expansion)
    to meaningful improvement by FY25. Gross revenue grew from Rs 1,876 crore (FY24) to Rs 1,943 crore (FY25), representing
    5% YoY growth—modest but positive after two years of restructuring. The critical milestone was EBITDA turning positive
    in FY25 at +Rs 15 crore, compared to EBITDA loss of Rs 285 crore in FY24.


    Net loss narrowed dramatically: Rs 2,591 crore (FY23) → Rs 560 crore (FY24) → Rs 273 crore (FY25), a reduction of Rs 287
    crore YoY. This improvement reflects operational cost restructuring (headcount reductions of approximately 2,000+ employees
    between 2022-2024), program portfolio rationalization, and enterprise revenue growth with better margin profiles. FY26
    guidance from management implies continued margin improvement toward positive adjusted PAT.'
  claimRefs:
  - CI005
  - CI006
  - CI007
  - CI008
  - CI009
  tableRefs:
  - TI003
  figureRefs:
  - FI001
  - FI003
- id: section-3
  title: Cost structure and unit economics
  body: 'upGrad''s cost structure has three primary buckets: (1) student acquisition cost (SAC)—the largest opex item, driven
    by digital advertising, counselor commissions, and partner channel fees; (2) content delivery and learning experience
    costs (faculty fees, platform hosting, student success managers); and (3) corporate overhead (G&A, legal, finance). The
    SAC reduction program in FY24-25 is the primary driver of the EBITDA improvement.


    Gross margin estimates for upGrad range from 40-55% on a per-program basis, with enterprise contracts estimated at 60-70%
    gross margin (versus 35-45% for high-touch B2C PGP programs). The deferred revenue model means working capital is structurally
    favorable: upGrad typically collects course fees before recognizing revenue, generating a positive cash float. Capex is
    modest (primarily cloud infrastructure and owned tech platform maintenance).'
  claimRefs:
  - CI010
  - CI011
  - CI012
  - CI013
  tableRefs:
  - TI002
  figureRefs:
  - FI002
- id: section-4
  title: Capital adequacy and funding runway
  body: 'upGrad has raised approximately $782M in total equity funding since 2015. The most recent round was Temasek''s $60M
    investment in October 2024 at a flat valuation of $2.25B—unchanged from the June 2022 round of $225M. The flat valuation
    over two years reflects investor caution post-edtech funding winter and upGrad''s loss position, but also affirms continued
    institutional confidence at the existing price.


    With EBITDA turning positive, cash burn has reduced materially. The deferred revenue balance (Rs 556 crore) provides a
    working capital cushion. Management has indicated an IPO plan targeting SEBI filing in late 2026 or H1 2027, which would
    provide additional capital and liquidity for shareholders. A pre-IPO secondary sale was reportedly in progress as of early
    2026 to give early investors an exit mechanism.'
  claimRefs:
  - CI014
  - CI015
  - CI016
  - CI017
  - CI018
  tableRefs:
  - TI004
  figureRefs:
  - FI004
- id: section-5
  title: Revenue quality and financial verdict
  body: 'Revenue quality is mixed. Positive signals: (1) high deferred revenue balance indicates strong demand and advance
    cash collection; (2) enterprise segment growing faster with better margins; (3) first EBITDA positive year demonstrates
    operating leverage. Concerns: (1) B2C revenue growth of ~5% is below market growth rates (~23% CAGR), suggesting market
    share loss or deliberate portfolio rationalization; (2) placement guarantee contingent liabilities are not clearly disclosed
    in available financials; (3) NBFC loan partnerships create co-credit risk if default rates rise.


    Key diligence questions for financial due diligence: (a) What are the program-level gross margins broken out by B2C and
    B2B? (b) What is the EMI/NBFC default rate and what clawbacks does upGrad face? (c) How much of the FY25 net loss is from
    amortization of goodwill from KnowledgeHut and Impartus acquisitions? (d) What is the FY26 revenue and EBITDA guidance?
    (e) What is the cash on balance sheet as of March 2026?'
  claimRefs:
  - CI019
  - CI020
  - CI021
  - CI022
  tableRefs:
  - TI005
