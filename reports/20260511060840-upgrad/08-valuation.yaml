- id: section-3
  title: Scenario analysis and sensitivity
  body: 'Bull case ($3.0-3.5B): NBFC financing remains accessible; FY26 EBITDA reaches Rs 100-150 crore; enterprise segment
    grows to 30% of revenue; AI tutor launch accelerates Tier 2/3 enrollment; UGC framework remains stable; revenue reaches
    Rs 2,500 crore by FY27. At 5-6x FY27 revenue or 20-25x FY27 EBITDA, enterprise value is $3.0-3.5B. IPO path viable in
    FY27-28.


    Base case ($1.8-2.5B): Moderate revenue growth (8-12% YoY); EBITDA improves to Rs 100-200 crore by FY27; NBFC credit moderately
    tightens (15% impact on conversion); competitive pressure from Coursera holds enterprise segment share; leadership transition
    stabilizes. DCF base case at 12% WACC yields $1.8-2.5B.


    Bear case ($800M-1.2B): NBFC tightens materially (30% demand impact); UGC framework tightens for online degrees; Mayank
    Kumar-level execution gaps persist; EBITDA reverts to negative (-Rs 100 crore); revenue growth stalls at 3-5% YoY. Distressed
    revenue multiple of 2-3x would imply $800M-1.2B—potential down-round scenario from current $2.25B.'
  claimRefs:
  - CV009
  - CV010
  - CV011
  figureRefs:
  - FV004
- id: section-4
  title: Exit readiness and diligence asks
  body: 'Exit options for upGrad: (1) IPO—most likely primary exit; India edtech IPO requires Rs 200+ crore EBITDA for credible
    public market story; achievable by FY27-28 in bull scenario. BSE/NSE listing with Jaro Education as comparable. (2) Strategic
    acquisition—Byju''s implosion has left M&A appetite limited; potential acquirers include Reliance Education (not announced),
    Times Internet Group, or a Singapore/UAE sovereign wealth fund seeking India education exposure. (3) Secondary—Temasek
    or other late-stage investors could seek secondary liquidity at $1.8-2.5B in a 2-3 year horizon; secondary at discount
    to primary would be indicative of investor impatience with IPO timeline.


    Final diligence asks: (1) FY26 H1 management accounts with segment EBITDA; (2) NBFC approval rate trend (monthly); (3)
    debt covenant terms and current compliance; (4) B2C program completion rates by cohort; (5) UGC correspondence on online
    degree standards; (6) enterprise client list under NDA; and (7) DPDPA compliance roadmap.'
  claimRefs:
  - CV012
  - CV013
  - CV014
