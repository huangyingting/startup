- id: TV005
  title: Thesis-break and kill triggers table
  columns:
  - Trigger
  - Threshold
  - Transmission to Thesis
  - Action Implication
  rows:
  - - NBFC approval rate decline
    - Bajaj Finance/HDFC Credila edtech approval rate falls >30% YoY
    - B2C demand conversion collapses; revenue growth goes negative
    - Re-evaluate; reduce position or pass on new commitment
  - - UGC online degree framework reversal
    - UGC mandates on-campus component for all online degrees
    - Degree product line (20% revenue) must be restructured
    - Investment thesis break; exit or deep discount to NAV
  - - CCPA formal enforcement action
    - CCPA issues penalty or cease-and-desist on placement guarantee ads
    - Conversion rate decline; brand damage; revenue decline
    - Reduce position; monitor for compliance resolution
  - - EBITDA reversion to negative
    - FY26 EBITDA < -Rs 50 crore
    - Funding risk; down-round; debt covenant pressure
    - Investment thesis break; require new financing commitment before entry
  - - Founder departure or equity sale
    - Ronnie Screwvala sells >10% equity stake in secondary
    - Governance signal; potential vision change; new majority owner risk
    - Diligence trigger; assess new governance structure
  - - Enterprise revenue decline
    - B2B enterprise revenue declines YoY for 2 consecutive quarters
    - Diversification thesis fails; full dependency on vulnerable B2C
    - Reduce position; monitor customer concentration data
  notes: Thesis-break triggers are analyst constructs. Monitoring these indicators would require access to non-public management
    information.
