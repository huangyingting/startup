company:
  name: upGrad
chapter:
  number: 8
  title: Valuation
  summary: 'upGrad''s $2.25B valuation (Oct 2024, Temasek) implies approximately 12x FY25 gross revenue and approximately
    1,700x FY25 EBITDA—expensive on current earnings but reasonable on a forward basis if the EBITDA improvement trajectory
    continues to Rs 200-400 crore by FY27. The investment thesis rests on: (1) India''s large professional upskilling TAM
    with 23-26% CAGR; (2) upGrad''s defensible university credential infrastructure; and (3) the EBITDA recovery that distinguishes
    upGrad from Byju''s. The anti-thesis is that the addressable market is narrower than advertised, NBFC credit tightening
    compresses demand, and AI disrupts the live-cohort delivery model before upGrad achieves scale profitability. Recommendation:
    Track with selective engagement—current valuation is fair only in the bull case. Entry discipline required; watch FY26
    EBITDA and NBFC approval rate as primary thesis signals.'
sections:
- id: section-1
  title: Investment thesis and recommendation
  body: 'The investment thesis for upGrad rests on three pillars: (1) India''s professional upskilling market is large (~$4.5B
    SAM, 23-26% CAGR) and underpenetrated; upGrad is the clear #1 platform by revenue and brand in the premium segment; (2)
    the university-credentialed delivery model creates switching costs and a quality signal that MOOCs cannot replicate; and
    (3) the FY25 EBITDA recovery to +Rs 15 crore demonstrates a viable path to profitability absent a macro shock—distinguishing
    upGrad meaningfully from the Byju''s governance and financial failures.


    The anti-thesis is equally compelling: the addressable market for learners who can afford Rs 1L+ programs, access NBFC
    financing, and have reasonable placement prospects may be smaller than the quoted TAM suggests; competitive pressure from
    Coursera''s AI-first content and LinkedIn Learning''s bundled model is real; and the leadership transition (Mayank Kumar
    exit) raises execution risk at a critical EBITDA juncture.


    Recommendation: Track (do not initiate at current $2.25B valuation without stronger FY26 EBITDA evidence). Target entry
    at $1.5-1.8B if EBITDA falters or in a down-round scenario. Bull case entry at $2.25B is defensible if FY26 EBITDA clears
    Rs 80-100 crore.'
  claimRefs:
  - CV001
  - CV002
  - CV003
  - CV004
  tableRefs:
  - TV001
  - TV002
  figureRefs:
  - FV001
- id: section-2
  title: Valuation context and comparables
  body: 'upGrad''s $2.25B valuation (Temasek Oct 2024) is benchmarked against: (1) global edtech revenue multiples—Coursera
    trades at approximately 2-3x NTM revenue; 2U trades at distressed sub-1x; (2) India edtech private transactions—upGrad
    itself raised at $1.2B (2021) and $2.25B (2024); Byju''s peak was $22B (impaired); (3) India-listed comparable Jaro Education
    trades at approximately 4-5x revenue at sub-$500M market cap on a profitable but smaller revenue base.


    Valuation methods appropriate for upGrad: (a) Revenue multiple—12x FY25 gross revenue is aggressive versus public comps;
    5-7x forward revenue (FY27E) would imply Rs 2,200-3,100 crore revenue needed to justify $2.25B—achievable only in the
    bull scenario; (b) DCF—requires sustained EBITDA margin of 8-12% by FY28 and 15%+ revenue CAGR; DCF base case yields $1.5-2.0B
    enterprise value; (c) EV/EBITDA—not meaningful at current ~Rs 15 crore EBITDA; meaningful only on FY27E EBITDA of Rs 200-400
    crore at 20-30x gives $1.2-2.4B.'
  claimRefs:
  - CV005
  - CV006
  - CV007
  - CV008
