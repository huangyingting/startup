company:
  name: "upGrad"
chapter:
  number: 1
  title: "Company Overview"
  summary: >-
    upGrad is India's largest online higher education and professional upskilling platform, founded in 2015 in Mumbai
    by Ronnie Screwvala, Mayank Kumar, Phalgun Kompalli, and Ravijot Chugh. As of May 2026, upGrad operates at
    ~₹1,943 crore gross revenue, achieved its first EBITDA-positive year in FY25, and is valued at $2.25B following
    a $60M Temasek round in October 2024, with IPO plans anticipated for late 2026 or 2027.

sections:
  - id: section-1
    title: "Identity, founding, and operating model"
    body: >
      upGrad Education Private Limited (operating as "upGrad") is India's largest online higher education and
      professional upskilling platform. It was founded in January 2015 and is headquartered in Mumbai, Maharashtra,
      India. The company's stated mission is to enable individuals to achieve career-defining outcomes through
      technology-enabled learning at scale. upGrad positions itself as a lifelong-learning partner rather than a
      traditional course provider, offering credentials ranging from short-duration certifications to full online
      degree programs in partnership with accredited universities globally.

      The core business operates across two structural pillars: a direct-to-consumer (B2C) segment that sells degrees,
      postgraduate programs, executive education, and bootcamps to working professionals and recent graduates; and a
      B2B enterprise segment (upGrad Enterprise) that provides workforce upskilling contracts to large corporations
      and GCCs across technology, BFSI, manufacturing, and services sectors. The consumer segment generates the
      majority of revenue via tuition fees and a revenue-sharing model with university partners, while the enterprise
      segment operates on institutional contracts with reported 80%+ repeat-client rates in FY25.

      upGrad operates its content and delivery through technology-enabled learning systems including recorded content,
      live classes, mentorship programs, and in-person immersive sessions. The company acquired Impartus (video
      learning infrastructure, 2021) and KnowledgeHut (professional certifications, 2021) to extend its platform
      capability and global reach. As of FY25, the company reports presence in over 100 countries, with international
      revenue contributing approximately 20-25% of total revenue.
    claimRefs:
      - CO001
      - CO002
      - CO003
      - CO004
      - CO005
      - CO006

  - id: section-2
    title: "Founders, leadership, and governance"
    body: >
      upGrad was co-founded by four individuals with complementary backgrounds. Ronnie Screwvala, the non-executive
      chairman and largest individual shareholder (approximately 45% stake), is a well-known Indian entrepreneur who
      built and sold the UTV Group (media and entertainment) to Disney for approximately $1.4 billion. His involvement
      gives upGrad both brand credibility and media-sector experience. Mayank Kumar, a former McKinsey consultant and
      the original Managing Director, drove the company's operational growth from 2015 until stepping down from
      day-to-day operations in late 2024 to pursue a new venture in global talent mobility. He retains approximately
      8% shareholding and a board seat. Phalgun Kompalli and Ravijot Chugh are also co-founders and continue to be
      involved in strategic and product functions respectively.

      Following Mayank Kumar's departure from day-to-day operations in October 2024, Ronnie Screwvala took a more
      hands-on operating role. This governance shift has been described by the company and media as a deliberate move
      to strengthen investor confidence ahead of a planned IPO. upGrad appointed CP Gurnani (former Tech Mahindra CEO)
      as an independent board director in 2024, adding execution credibility at the board level.

      The company's governance structure is that of a private Indian company registered under the Companies Act.
      Control sits with Ronnie Screwvala's family trust as the majority shareholder, with Temasek holding
      approximately 17-18% after the October 2024 round and IIFL, IFC, ETS Capital, and others as institutional
      minority shareholders. The founder-dominant cap table limits independent governance checks relative to a
      publicly listed company, which is a diligence flag for the pre-IPO period.
    claimRefs:
      - CO007
      - CO008
      - CO009
      - CO010
      - CO011
      - CO012
      - CO013
      - CO014
    tableRefs:
      - TO002

  - id: section-3
    title: "Funding history, investors, and valuation"
    body: >
      upGrad became a unicorn in February 2021 when IIFL infused $25 million at a $1.2 billion valuation. The
      company's most significant single raise was a $225 million round in June 2022 led by Lupa Systems (the Murdoch
      family vehicle), Educational Testing Service (ETS), and existing investors including Temasek. A subsequent
      $210 million round in August 2022 with participation from ETS Global, Bodhi Tree Systems, Kaizen Management
      Advisors, IIFL, and IFC brought the total cumulative raise to approximately $782 million in equity, plus
      additional debt financing.

      The most recent equity event—October 2024—saw Temasek invest $60 million at a flat $2.25 billion valuation,
      representing no increase from the mid-2022 peak valuation, reflecting the post-pandemic edtech sector
      contraction and upGrad's continued net losses at the time of that round. Ronnie Screwvala also separately
      acquired Bharti Enterprises' ~1% stake for approximately $20 million, cementing his position at 45%.

      The $2.25 billion valuation implies roughly 9.6x FY25 gross revenue (~$233M). This multiple is elevated
      relative to publicly listed Indian education companies but may be defensible if upGrad demonstrates a clear
      IPO-credible profitability trajectory. As of May 2026, no DRHP has been filed with SEBI. The company's stated
      target of an IPO "within 7-8 quarters" from late 2024 positions a filing in late 2026 or H1 2027 as the
      working timeline.
    claimRefs:
      - CO015
      - CO016
      - CO017
      - CO018
      - CO019
      - CO020
      - CO021
      - CO022
    tableRefs:
      - TO001
      - TO003
    figureRefs:
      - FO003

  - id: section-4
    title: "Scale, enrollment, and key metrics"
    body: >
      upGrad reports a cumulative learner base exceeding 10 million registered users across its platforms as of 2025,
      with active program enrollments growing 50% year-on-year in FY24. The company reported 55,000+ career
      transitions in FY24, citing outcome data as a key differentiator vs. self-paced MOOC competitors. Technology
      and AI courses account for approximately 20% of total revenue in FY25, while management programs (MBA,
      executive education) remain the largest segment. University partnerships include Liverpool John Moores
      University, Deakin University (Australia), MICA (Ahmedabad), IIT Madras, and several other institutions.

      The enterprise B2B division serves clients across GCCs, IT, BFSI, manufacturing, and services sectors.
      International revenue contributed approximately 20-25% of upGrad's total revenue in FY25, with Southeast Asia
      and the Middle East as key markets. Demand for AI-focused enterprise upskilling doubled year-on-year in FY25.

      Adverse signals are present at scale: significant volumes of student complaints related to refund policies,
      placement outcome misrepresentation, and course delivery quality appear across consumer forums, Reddit, and
      consumer complaint platforms. These complaints constitute an ongoing reputation and regulatory risk. upGrad
      has not publicly disclosed a comprehensive response or remediation program as of May 2026.
    claimRefs:
      - CO023
      - CO024
      - CO025
      - CO026
      - CO027
      - CO028
      - CO029
      - CO030
    tableRefs:
      - TO004
    figureRefs:
      - FO001
      - FO002

