      - number: '2.4'
        title: Growth drivers and constraints
        blocks:
          - type: paragraph
            body: >
              The India professional upskilling market benefits from several structural demand drivers. NEP 2020
              explicitly promotes online and flexible learning, while UGC's 2022-2024 reforms allowing fully online
              degrees from accredited universities have expanded the addressable credential base. India's technology
              employment boom— with GCCs growing rapidly in Bengaluru, Hyderabad, and Pune—sustains demand for AI, data
              science, and engineering management programs. The country's demographic dividend (large working-age
              population with high aspirations) provides organic growth.

              Constraints include: (1) post-pandemic demand normalization from the 2020-2022 surge; (2) employer
              skepticism about online credentials, especially for top-tier roles; (3) competitive intensity from
              free/low-cost platforms (Coursera, SWAYAM NPTEL) that undercut upGrad's premium pricing; (4) high consumer
              complaint rates around placement outcome promises creating brand risk; and (5) digital divide limiting
              Tier 3/rural market expansion.

              AI adoption is a significant dual-force: it creates new upskilling demand (AI/ML courses) while also
              threatening to commoditize course content delivery, potentially reducing switching costs and allowing
              smaller competitors to deliver comparable quality at lower cost. upGrad's enterprise B2B division has seen
              AI-upskilling demand double year-on-year in FY25, suggesting near-term tailwinds, but the long-term
              differentiation durability is uncertain.
            claimRefs:
              - CM015
              - CM016
              - CM017
              - CM018
              - CM019
              - CM020
