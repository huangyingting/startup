      - number: '2.3'
        title: Buyer and segment map
        blocks:
          - type: paragraph
            body: >
              upGrad's primary buyer in the B2C segment is a working professional aged 25-40, primarily in metro cities
              (Bengaluru, Mumbai, Delhi-NCR, Hyderabad, Pune) earning Rs 5-25 lakh per annum. The buyer is also the
              user; they self-fund their education or use EMI options (average course costs range Rs 50,000 to Rs
              5,00,000+). Key buyer motivations include career transitions (e.g., engineer to product manager), salary
              increments, and access to internationally recognized credentials. Alumni networks and placement support
              are critical decision triggers; upGrad's sales process is highly personalized with dedicated counselors.

              The B2B enterprise buyer is a Chief People Officer, VP-HR, or L&D Head at a large enterprise (typically
              500+ employees). The procurement decision is institutional, driven by annual talent development budgets.
              upGrad competes on program quality, faculty credibility, AI-personalization of content, and outcomes
              (certifications). Repeat contracts represent over 80% of the enterprise client base in FY25.

              Tier 2 and Tier 3 city professionals are an emerging and strategically important segment as mobile
              penetration deepens. English-language instruction remains a market constraint for this segment, though
              vernacular content is increasing. Online degree adoption has been boosted by UGC's 2022-2024 regulatory
              reforms allowing universities to offer fully online degree programs.
            claimRefs:
              - CM010
              - CM011
