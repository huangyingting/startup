        title: Product module and SKU map
        blocks:
          - type: paragraph
            body: >-
              upGrad's product portfolio spans approximately 200+ active programs across five categories: (1) PG
              Certificates and PGPs (12 months, Rs 75K-2L)—the core revenue driver; (2) Online Degrees (24-36 months, Rs
