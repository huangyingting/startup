      - number: '3.2'
        title: Competitor profiles
        blocks:
          - type: paragraph
            body: >-
              Simplilearn is upGrad's closest direct competitor in technical upskilling. Acquired by Blackstone in 2021
              for approximately $250M, it reported annual revenue in the $80-110M range with global reach through Purdue
              University and Caltech partnerships. Great Learning, acquired by Byju's in 2021, operated under financial
              stress post-2023, with course interruptions and placement issues reported in 2024; its competitive
              intensity is materially impaired. NIIT is the legacy IT training incumbent, serving enterprise clients but
              lacking prestige in the premium PG segment.


              Jaro Education (BSE/NSE: JARO) is the only major India professional edtech company with consistent public
              profitability: FY24 revenue Rs 391 crore, PAT Rs 39 crore (10% net margins), focused on online MBA and
              PGDM programs in partnership with B-schools such as SPJIMR and IIM Nagpur. Coursera reported 148M
              registered learners globally as of FY2024 with enterprise revenue approximately $258M across 7,000+
              clients. LinkedIn Learning has 27M+ active learners globally with enterprise subscriptions covering
              Fortune 500 companies, but lacks credit-bearing credentials. PhysicsWallah's PW Skills launched
              professional courses at Rs 5,000-Rs 25,000 price points in 2023-24, targeting the lower end of the
              upskilling market.
            claimRefs:
              - CP005
              - CP006
              - CP007
              - CP008
              - CP009
              - CP010
      - number: '3.3'
        title: Feature and capability comparison
        blocks:
          - type: paragraph
            body: >-
              upGrad's differentiating features include: (1) university-branded online degrees (LJMU, Deakin, MICA, IIT
              Madras) that carry formal degree credentials not replicated by Simplilearn, PW Skills, or NIIT; (2)
              live-online cohort learning with dedicated student success managers; (3) placement support through 2,500+
              hiring partners; and (4) a full-stack enterprise platform (upGrad Enterprise) serving 250+ clients
              including GCCs and IT multinationals. Simplilearn offers stronger point-skill certifications (Google
              Cloud, AWS, Microsoft partnerships) but lacks degree-bearing programs. Coursera for Business serves 7,000+
              enterprise clients globally with AI Coach and Skill Academy features launched in 2024-25.


              On pricing, upGrad's PGP programs range from Rs 75,000 to Rs 3,00,000. Simplilearn's certificate programs
              run Rs 15,000-Rs 80,000; Jaro Education's online MBA runs Rs 5-8 lakh; Coursera Plus is approximately Rs
              33,000 per year; PW Skills bootcamps are Rs 5,000-Rs 25,000. Each competitor occupies a distinct price
              tier, meaning direct price competition is limited except at the certificate level where Simplilearn and PW
              Skills compete directly.
