              senior professionals; (4) Short courses and certifications (1-3 months, Rs 10K-40K); and (5) Enterprise
              L&D programs (custom). Domain coverage includes: Data Science and AI (~40% of enrollment), Technology
              (Cloud, DevOps, Coding), Management (MBA, Strategy, Marketing), Law (NLU partnership), and Healthcare
              (emerging).


              KnowledgeHut (acquired 2021) extends the portfolio with technical skills bootcamps (Agile, AWS, data
              engineering) targeting international markets. The combined product matrix gives upGrad breadth from
              short-form technical certifications to full degrees—a range no single competitor matches.
