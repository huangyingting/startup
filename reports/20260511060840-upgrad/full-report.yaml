        title: People, execution, and market risks
        blocks:
          - type: paragraph
            body: >-
              People risk is material: Mayank Kumar (Co-Founder, MD) resigned in October 2024 after reportedly
              disagreeing with Ronnie Screwvala on expansion strategy and cost structure. upGrad is now founder-led by
              Ronnie Screwvala, who holds ~45% equity and has a public media/entertainment background (UTV Group).
              Execution risk in the edtech domain—particularly for academic operations, UGC compliance, and enterprise
              L&D—may increase without a co-founder with deep education operations background. New CPO Phalgun Kompalli
              and CHRO Ravijot Chugh are relatively new to their roles.


              Market structural risks: (1) generative AI is accelerating content creation for competitors; Coursera,
              LinkedIn Learning, and Microsoft Learn all have AI-first content delivery at lower cost points, which
              could compress upGrad's pricing power on non-degree programs; (2) India's IT sector hiring cycle—a
              prolonged IT hiring slowdown would reduce demand for data science and technology programs (40%+ of
              enrollment); (3) competition intensification from Jaro Education (profitable, listed) and new entrants in
