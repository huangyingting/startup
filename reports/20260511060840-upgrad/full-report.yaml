      - number: '1.4'
        title: Scale, enrollment, and key metrics
        blocks:
          - type: paragraph
            body: >
              upGrad reports a cumulative learner base exceeding 10 million registered users across its platforms as of
              2025, with active program enrollments growing 50% year-on-year in FY24. The company reported 55,000+
              career transitions in FY24, citing outcome data as a key differentiator vs. self-paced MOOC competitors.
              Technology and AI courses account for approximately 20% of total revenue in FY25, while management
              programs (MBA, executive education) remain the largest segment. University partnerships include Liverpool
              John Moores University, Deakin University (Australia), MICA (Ahmedabad), IIT Madras, and several other
              institutions.

              The enterprise B2B division serves clients across GCCs, IT, BFSI, manufacturing, and services sectors.
              International revenue contributed approximately 20-25% of upGrad's total revenue in FY25, with Southeast
              Asia and the Middle East as key markets. Demand for AI-focused enterprise upskilling doubled year-on-year
              in FY25.

              Adverse signals are present at scale: significant volumes of student complaints related to refund
              policies, placement outcome misrepresentation, and course delivery quality appear across consumer forums,
              Reddit, and consumer complaint platforms. These complaints constitute an ongoing reputation and regulatory
              risk. upGrad has not publicly disclosed a comprehensive response or remediation program as of May 2026.
