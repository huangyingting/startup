chapters:
  - number: 1
    title: Company Overview
    sections:
      - number: '1.1'
        title: Identity, founding, and operating model
        blocks:
          - type: paragraph
            body: >
              upGrad Education Private Limited (operating as "upGrad") is India's largest online higher education and
              professional upskilling platform. It was founded in January 2015 and is headquartered in Mumbai,
              Maharashtra, India. The company's stated mission is to enable individuals to achieve career-defining
              outcomes through technology-enabled learning at scale. upGrad positions itself as a lifelong-learning
              partner rather than a traditional course provider, offering credentials ranging from short-duration
              certifications to full online degree programs in partnership with accredited universities globally.

              The core business operates across two structural pillars: a direct-to-consumer (B2C) segment that sells
              degrees, postgraduate programs, executive education, and bootcamps to working professionals and recent
              graduates; and a B2B enterprise segment (upGrad Enterprise) that provides workforce upskilling contracts
              to large corporations and GCCs across technology, BFSI, manufacturing, and services sectors. The consumer
              segment generates the majority of revenue via tuition fees and a revenue-sharing model with university
              partners, while the enterprise segment operates on institutional contracts with reported 80%+
              repeat-client rates in FY25.

              upGrad operates its content and delivery through technology-enabled learning systems including recorded
              content, live classes, mentorship programs, and in-person immersive sessions. The company acquired
              Impartus (video learning infrastructure, 2021) and KnowledgeHut (professional certifications, 2021) to
              extend its platform capability and global reach. As of FY25, the company reports presence in over 100
              countries, with international revenue contributing approximately 20-25% of total revenue.
            claimRefs:
              - CO001
              - CO002
              - CO003
              - CO004
              - CO005
              - CO006
      - number: '1.2'
        title: Founders, leadership, and governance
        blocks:
          - type: paragraph
            body: >
              upGrad was co-founded by four individuals with complementary backgrounds. Ronnie Screwvala, the
              non-executive chairman and largest individual shareholder (approximately 45% stake), is a well-known
              Indian entrepreneur who built and sold the UTV Group (media and entertainment) to Disney for approximately
              $1.4 billion. His involvement gives upGrad both brand credibility and media-sector experience. Mayank
              Kumar, a former McKinsey consultant and the original Managing Director, drove the company's operational
              growth from 2015 until stepping down from day-to-day operations in late 2024 to pursue a new venture in
              global talent mobility. He retains approximately 8% shareholding and a board seat. Phalgun Kompalli and
              Ravijot Chugh are also co-founders and continue to be involved in strategic and product functions
              respectively.

              Following Mayank Kumar's departure from day-to-day operations in October 2024, Ronnie Screwvala took a
              more hands-on operating role. This governance shift has been described by the company and media as a
              deliberate move to strengthen investor confidence ahead of a planned IPO. upGrad appointed CP Gurnani
              (former Tech Mahindra CEO) as an independent board director in 2024, adding execution credibility at the
              board level.

              The company's governance structure is that of a private Indian company registered under the Companies Act.
              Control sits with Ronnie Screwvala's family trust as the majority shareholder, with Temasek holding
              approximately 17-18% after the October 2024 round and IIFL, IFC, ETS Capital, and others as institutional
              minority shareholders. The founder-dominant cap table limits independent governance checks relative to a
              publicly listed company, which is a diligence flag for the pre-IPO period.
