      - number: '7.3'
        title: Partner and dependency risk
        blocks:
          - type: paragraph
            body: >-
              upGrad's top dependency risks are: (1) NBFC credit risk—60%+ of B2C premium enrollments are financed via
              NBFC EMI. If Bajaj Finance, HDFC Credila, or other NBFC partners tighten edtech loan approval criteria
              (due to rising default rates or regulatory pressure on unsecured personal loans), demand conversion could
              fall 30-40% in the short term without alternative financing. This is a near-term risk given RBI's scrutiny
              of unsecured retail lending in 2024.


              (2) University partner risk—if LJMU, Deakin, or MICA withdraw from the upGrad partnership (contractual
              dispute, quality concerns, or international regulatory changes), the associated degree programs would need
              to be wound down or migrated to a new partner—a 12-24 month disruption. The degree programs represent
              approximately 20-25% of revenue.


              (3) Cloud/platform vendor risk—dependency on AWS, Zoom API, Salesforce, and Razorpay creates a
              multi-vendor failure scenario. Individual vendor outages have manageable impact; a simultaneous AWS and
              Zoom failure would halt live delivery entirely for the duration.
            claimRefs:
