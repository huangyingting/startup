  - number: 7
    title: Risks
    sections:
      - number: '7.1'
        title: Regulatory and legal risk
        blocks:
          - type: paragraph
            body: >-
              upGrad's three material regulatory exposures are: (1) UGC online degree framework—the regulatory
              architecture that permits university-partnered fully online degree delivery could change if UGC tightens
              quality standards, mandates on-campus components, or withdraws approved university permissions. This is
              the highest-impact risk because it would eliminate the international degree and online MBA products that
              command 2-3x premium pricing versus certificate programs.


              (2) Consumer Protection and ASCI placement guarantee enforcement—CCPA is reviewing placement guarantee
              advertising claims by India edtech platforms. If upGrad is ordered to restate or remove placement
              guarantee language, conversion rates on high-ticket programs could fall materially. The Consumer
              Protection Act 2019 also exposes upGrad to class-action-style complaints that could lead to refund orders
              at scale.


              (3) DPDPA 2023 (Digital Personal Data Protection Act)—upGrad collects extensive learner behavioral,
              demographic, and assessment data. DPDPA implementation will require consent frameworks, data principal
              rights, and potentially cross-border transfer restrictions that affect KnowledgeHut's international data
              flows. Non-compliance risks include penalties up to Rs 250 crore per breach. No formal enforcement action
              as of May 2026.
            claimRefs:
              - CR001
              - CR002
              - CR003
              - CR004
          - type: table
            tableRef: TR001
            claimRefs:
              - CR001
              - CR002
              - CR003
