      - number: '7.2'
        title: Operational and quality risk
        blocks:
          - type: paragraph
            body: >-
              upGrad's operational risks center on three areas: (1) platform reliability and live-session continuity—any
              extended Zoom API outage or AWS infrastructure failure during live class delivery would disrupt the core
              product and expose upGrad to refund obligations under its service terms; (2) AI content quality risk—the
              GenAI courseware integration (in progress 2024-25) introduces the risk of factually inaccurate content in
              technically complex subjects (data science, law, healthcare); a high-profile AI content failure could
              significantly damage brand credibility; (3) data security and breach risk—with 3M+ learner records
              including financial, biometric (proctoring), and behavioral data, a significant data breach would create
              both regulatory exposure under DPDPA and reputational damage.


              Secondary operational risks include: placement success rate deterioration if hiring market weakens (IT
              sector hiring slowdown 2023-24 has already suppressed some placement outcomes), and the scalability
              challenge of maintaining SSM model quality as the learner base grows.
            claimRefs:
              - CR005
