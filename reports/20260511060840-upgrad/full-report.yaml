    title: Financials
    sections:
      - number: '4.1'
        title: Revenue streams and recognition
        blocks:
          - type: paragraph
            body: >-
              upGrad's revenue architecture has two primary streams: (1) B2C tuition fees from PGP, executive education,
              and online degree programs—the dominant stream at approximately 65-70% of gross revenue; and (2) B2B
              enterprise contracts from workforce upskilling for GCCs, IT companies, and manufacturing sector
              clients—approximately 30-35% of gross revenue and growing faster.


              Revenue recognition under Ind-AS follows a deferred revenue model: tuition fees are collected upfront or
              through NBFC loans (with upGrad receiving the proceeds), but recognized over the program duration. This
              creates a significant deferred revenue balance: Rs 556 crore in FY25 and Rs 507 crore in FY24. The gap
              between gross collected revenue (Rs 1,943 crore) and Ind-AS operating revenue (Rs 1,569 crore) in FY25
              reflects this deferral dynamic. Analysts and investors should track gross revenue as the demand signal and
              Ind-AS revenue for profitability analysis.


              KnowledgeHut (acquired 2021) contributes international revenue primarily from Southeast Asia, Middle East,
              and North America, estimated at 20-25% of total company revenue in FY25. Enterprise contracts carry higher
              immediate revenue recognition (service delivery-based) versus consumer programs.
            claimRefs:
              - CI001
              - CI002
              - CI003
              - CI004
