  - number: 3
    title: Competitors
    sections:
      - number: '3.1'
        title: Competitive landscape overview
        blocks:
          - type: paragraph
            body: >-
              upGrad competes across three tiers: (1) direct online higher education and upskilling peers operating in
              India's post-K12 professional segment; (2) global platform players with India presence; and (3) legacy
              offline incumbents now building digital capabilities. The direct competitive set includes Simplilearn,
              Great Learning (Byju's subsidiary, operationally impaired), NIIT, Jaro Education, and Imarticus Learning.
              Adjacent players include Coursera, edX/2U, and LinkedIn Learning as global MOOC platforms competing for
              enterprise L&D budgets.


              The competitive landscape post-2022 edtech shakeout is consolidating: Byju's suffered financial collapse
              with approximately Rs 22,000 crore in liabilities and massive layoffs by 2024; Vedantu pivoted to K-12
              profitability; Unacademy exited from several verticals. This consolidation has benefited upGrad as the
              largest surviving premium B2C player in professional upskilling. However, Coursera and LinkedIn Learning
              are aggressively expanding enterprise contracts, Simplilearn has maintained strong technical skills market
              share, and PhysicsWallah's PW Skills is a new low-price disruptor in technical bootcamps.
            claimRefs:
              - CP001
              - CP002
              - CP003
              - CP004
          - type: table
            tableRef: TP001
