      - number: '4.3'
        title: Cost structure and unit economics
        blocks:
          - type: paragraph
            body: >-
              upGrad's cost structure has three primary buckets: (1) student acquisition cost (SAC)—the largest opex
              item, driven by digital advertising, counselor commissions, and partner channel fees; (2) content delivery
              and learning experience costs (faculty fees, platform hosting, student success managers); and (3)
              corporate overhead (G&A, legal, finance). The SAC reduction program in FY24-25 is the primary driver of
              the EBITDA improvement.


              Gross margin estimates for upGrad range from 40-55% on a per-program basis, with enterprise contracts
              estimated at 60-70% gross margin (versus 35-45% for high-touch B2C PGP programs). The deferred revenue
              model means working capital is structurally favorable: upGrad typically collects course fees before
              recognizing revenue, generating a positive cash float. Capex is modest (primarily cloud infrastructure and
              owned tech platform maintenance).
