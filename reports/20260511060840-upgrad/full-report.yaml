      - number: '1.3'
        title: Funding history, investors, and valuation
        blocks:
          - type: paragraph
            body: >
              upGrad became a unicorn in February 2021 when IIFL infused $25 million at a $1.2 billion valuation. The
              company's most significant single raise was a $225 million round in June 2022 led by Lupa Systems (the
              Murdoch family vehicle), Educational Testing Service (ETS), and existing investors including Temasek. A
              subsequent $210 million round in August 2022 with participation from ETS Global, Bodhi Tree Systems,
              Kaizen Management Advisors, IIFL, and IFC brought the total cumulative raise to approximately $782 million
              in equity, plus additional debt financing.

              The most recent equity event—October 2024—saw Temasek invest $60 million at a flat $2.25 billion
              valuation, representing no increase from the mid-2022 peak valuation, reflecting the post-pandemic edtech
              sector contraction and upGrad's continued net losses at the time of that round. Ronnie Screwvala also
              separately acquired Bharti Enterprises' ~1% stake for approximately $20 million, cementing his position at
              45%.

              The $2.25 billion valuation implies roughly 9.6x FY25 gross revenue (~$233M). This multiple is elevated
              relative to publicly listed Indian education companies but may be defensible if upGrad demonstrates a
              clear IPO-credible profitability trajectory. As of May 2026, no DRHP has been filed with SEBI. The
              company's stated target of an IPO "within 7-8 quarters" from late 2024 positions a filing in late 2026 or
              H1 2027 as the working timeline.
