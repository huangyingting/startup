      - number: '4.2'
        title: Revenue trajectory and EBITDA path
        blocks:
          - type: paragraph
            body: >-
              upGrad's revenue trajectory shows recovery from peak losses in FY23 (net loss Rs 2,591 crore during
              aggressive expansion) to meaningful improvement by FY25. Gross revenue grew from Rs 1,876 crore (FY24) to
              Rs 1,943 crore (FY25), representing 5% YoY growth—modest but positive after two years of restructuring.
              The critical milestone was EBITDA turning positive in FY25 at +Rs 15 crore, compared to EBITDA loss of Rs
              285 crore in FY24.


              Net loss narrowed dramatically: Rs 2,591 crore (FY23) → Rs 560 crore (FY24) → Rs 273 crore (FY25), a
              reduction of Rs 287 crore YoY. This improvement reflects operational cost restructuring (headcount
              reductions of approximately 2,000+ employees between 2022-2024), program portfolio rationalization, and
              enterprise revenue growth with better margin profiles. FY26 guidance from management implies continued
              margin improvement toward positive adjusted PAT.
