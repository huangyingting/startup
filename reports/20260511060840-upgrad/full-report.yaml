  - number: 2
    title: Market Analysis
    sections:
      - number: '2.1'
        title: Market definition and boundary
        blocks:
          - type: paragraph
            body: >
              upGrad competes in two addressable markets that are distinct but adjacent: (1) the India online
              professional upskilling and higher education (PG/executive) market, encompassing degree programs,
              postgraduate programs, executive education, and bootcamps for working adults; and (2) the B2B corporate
              learning and development (L&D) market for workforce upskilling across Indian and global enterprises. These
              two markets have different buyer journeys, budget owners, and unit economics but share content
              infrastructure.

              The broader India edtech market is estimated at approximately $7.5 billion in 2025, encompassing K-12 test
              preparation, K-12 school supplementary, language learning, and professional/higher education. upGrad's
              serviceable market is the professional and higher education slice: approximately $4.0-4.5 billion in 2025,
              growing at approximately 23-26% CAGR toward $10+ billion by 2030. The corporate L&D segment is separately
              estimated at $800M-$1.2B annually for India-focused enterprise contracts.

              The market boundary is set by three factors: (a) geographic focus on India as the primary market (~75-80%
              of revenue) with Southeast Asia and the Middle East as secondary markets; (b) credential type—upGrad
              focuses on post-K12 certificates, PGPs, and online degrees rather than test-prep; and (c) learner
              profile—employed adults, not students.
            claimRefs:
              - CM001
              - CM002
              - CM003
              - CM004
          - type: table
            tableRef: TM001
            claimRefs:
              - CM001
              - CM002
              - CM003
      - number: '2.2'
        title: 'Market sizing: TAM, SAM, SOM'
        blocks:
          - type: paragraph
            body: >
              The total addressable market (TAM) for online education in India in 2026 is estimated at $8.6 billion when
              including K-12, test prep, higher education, professional upskilling, and language learning segments. The
              serviceable addressable market (SAM) for upGrad—professional online higher education and upskilling for
              adults— is approximately $4.0-4.5 billion in 2025. The serviceable obtainable market (SOM) is constrained
              by upGrad's current market share (~4-5% of SAM at ~$185M recognized revenue in FY25), realistic
              competitive dynamics, and geographic concentration in India metros.

              India's online higher education market specifically (UG and PG online degrees + executive programs) was
              approximately Rs 30,000 crore (~$3.6B) in FY2023, forecast to grow to Rs 85,000 crore (~$10.2B) by FY2028
              at a CAGR of approximately 23.1%. Industry analysts (Technavio, IMARC Group, Renub Research) have
              published varying India edtech TAM estimates ranging from $7.5B to $8.6B for 2025-2026, with 2030+
              forecasts ranging $29-33B depending on segment scope. The wide range reflects methodology differences in
              whether K-12 and informal learning are included.

              The corporate/enterprise upskilling segment (B2B L&D) represents approximately 20-30% of the professional
              upskilling addressable market, or roughly $800M-$1.2B annually in 2025 for India. upGrad Enterprise serves
              GCCs, IT, BFSI, and manufacturing sector clients across India and internationally, with international
              enterprise clients estimated to account for 20-25% of total company revenue.
            claimRefs:
              - CM005
              - CM006
              - CM007
              - CM008
              - CM009
