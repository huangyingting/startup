      - number: '4.4'
        title: Capital adequacy and funding runway
        blocks:
          - type: paragraph
            body: >-
              upGrad has raised approximately $782M in total equity funding since 2015. The most recent round was
              Temasek's $60M investment in October 2024 at a flat valuation of $2.25B—unchanged from the June 2022 round
              of $225M. The flat valuation over two years reflects investor caution post-edtech funding winter and
              upGrad's loss position, but also affirms continued institutional confidence at the existing price.


              With EBITDA turning positive, cash burn has reduced materially. The deferred revenue balance (Rs 556
              crore) provides a working capital cushion. Management has indicated an IPO plan targeting SEBI filing in
