      - number: '5.3'
        title: Technology architecture and operating model
        blocks:
          - type: paragraph
            body: >-
              upGrad's technology stack is a proprietary multi-tenant cloud platform hosted primarily on AWS, with
              modules for: content management (recorded and live), live session delivery (Zoom API integration for live
              classes), LMS (assessment, assignment, progress tracking), admissions CRM (Salesforce-integrated),
              placement portal, and enterprise analytics dashboard. The platform was rebuilt in 2019-21 with a
              microservices architecture to enable B2B white-labeling and international scaling.


              Live session delivery relies on Zoom API for large-cohort sessions (100-500 students) with in-house
              breakout room and interaction tools layered on top. Content production uses a proprietary CMS with
              generative AI integration (in progress as of 2024-25) to reduce content creation time by an estimated
              30-40%. Proctoring for assessments uses third-party AI proctoring (Mettl or similar). Payments are
              processed through Razorpay and PayU with NBFC integration via APIs.
