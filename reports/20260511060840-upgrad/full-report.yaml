      - number: '4.5'
        title: Revenue quality and financial verdict
        blocks:
          - type: paragraph
            body: >-
              Revenue quality is mixed. Positive signals: (1) high deferred revenue balance indicates strong demand and
              advance cash collection; (2) enterprise segment growing faster with better margins; (3) first EBITDA
              positive year demonstrates operating leverage. Concerns: (1) B2C revenue growth of ~5% is below market
              growth rates (~23% CAGR), suggesting market share loss or deliberate portfolio rationalization; (2)
              placement guarantee contingent liabilities are not clearly disclosed in available financials; (3) NBFC
              loan partnerships create co-credit risk if default rates rise.


