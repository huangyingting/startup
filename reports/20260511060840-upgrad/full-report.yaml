      - number: '8.4'
        title: Exit readiness and diligence asks
        blocks:
          - type: paragraph
            body: >-
              Exit options for upGrad: (1) IPO—most likely primary exit; India edtech IPO requires Rs 200+ crore EBITDA
              for credible public market story; achievable by FY27-28 in bull scenario. BSE/NSE listing with Jaro
              Education as comparable. (2) Strategic acquisition—Byju's implosion has left M&A appetite limited;
              potential acquirers include Reliance Education (not announced), Times Internet Group, or a Singapore/UAE
              sovereign wealth fund seeking India education exposure. (3) Secondary—Temasek or other late-stage
              investors could seek secondary liquidity at $1.8-2.5B in a 2-3 year horizon; secondary at discount to
              primary would be indicative of investor impatience with IPO timeline.


              Final diligence asks: (1) FY26 H1 management accounts with segment EBITDA; (2) NBFC approval rate trend
              (monthly); (3) debt covenant terms and current compliance; (4) B2C program completion rates by cohort; (5)
              UGC correspondence on online degree standards; (6) enterprise client list under NDA; and (7) DPDPA
              compliance roadmap.
