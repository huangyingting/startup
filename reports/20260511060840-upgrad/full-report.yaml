      - number: '1.5'
        title: Exhibits
        blocks:
          - type: callout
            title: First EBITDA-positive year in FY25 is a credible pre-IPO milestone
            body: >
              upGrad's shift to positive EBITDA (+15 crore INR) in FY25 alongside a net loss halving to 273 crore INR
              represents a concrete inflection point. Combined with 80%+ B2B repeat rates and 20-25% international
              revenue contribution, the financial trajectory supports an IPO narrative, though net profitability remains
              elusive and the EBITDA margin is thin enough to reverse on a single restructuring charge.
            calloutType: strength
            claimRefs:
              - CO025
              - CO026
              - CO027
          - type: callout
            title: Flat valuation and leadership vacuum create pre-IPO execution risk
            body: >
              The October 2024 Temasek investment at the same $2.25B valuation as mid-2022 signals market hesitation
              about growth trajectory. Simultaneously, Mayank Kumar's departure from operations leaves an execution gap
              that the founder chairman is filling. This combination—stagnant valuation, leadership transition, and
              ongoing net losses—creates a precarious pre-IPO window that requires careful management.
            calloutType: risk
            claimRefs:
              - CO019
