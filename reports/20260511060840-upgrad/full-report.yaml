  - number: 8
    title: Valuation
    sections:
      - number: '8.1'
        title: Investment thesis and recommendation
        blocks:
          - type: paragraph
            body: >-
              The investment thesis for upGrad rests on three pillars: (1) India's professional upskilling market is
              large (~$4.5B SAM, 23-26% CAGR) and underpenetrated; upGrad is the clear #1 platform by revenue and brand
              in the premium segment; (2) the university-credentialed delivery model creates switching costs and a
              quality signal that MOOCs cannot replicate; and (3) the FY25 EBITDA recovery to +Rs 15 crore demonstrates
              a viable path to profitability absent a macro shock—distinguishing upGrad meaningfully from the Byju's
              governance and financial failures.


              The anti-thesis is equally compelling: the addressable market for learners who can afford Rs 1L+ programs,
              access NBFC financing, and have reasonable placement prospects may be smaller than the quoted TAM
              suggests; competitive pressure from Coursera's AI-first content and LinkedIn Learning's bundled model is
              real; and the leadership transition (Mayank Kumar exit) raises execution risk at a critical EBITDA
              juncture.


              Recommendation: Track (do not initiate at current $2.25B valuation without stronger FY26 EBITDA evidence).
              Target entry at $1.5-1.8B if EBITDA falters or in a down-round scenario. Bull case entry at $2.25B is
              defensible if FY26 EBITDA clears Rs 80-100 crore.
            claimRefs:
              - CV001
              - CV002
              - CV003
              - CV004
