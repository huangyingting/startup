  - number: 6
    title: Customers
    sections:
      - number: '6.1'
        title: Customer base segmentation
        blocks:
          - type: paragraph
            body: >-
              upGrad's customer base has two primary buyer segments: (1) B2C individual learners and (2) B2B
              enterprise/GCC clients, plus a smaller international segment via KnowledgeHut.


              B2C learners: Approximately 500,000 active learners on platform (cumulative enrollments 3M+). Core
              demographic: urban Indian working professional, 25-35 years old, Tier 1 city (Mumbai, Bangalore, Delhi
              NCR, Hyderabad), employed in IT/tech, seeking career transition into data science, AI, or management
              roles. Payer and user are the same individual; financing arranged via NBFC (Bajaj Finance/HDFC Credila)
              for 60%+ of enrollments. Average program ticket size Rs 1-1.5L. Channel is primarily direct digital
              (Google/Meta ads) with counselor-assisted conversion.


              B2B enterprise: 600+ enterprise clients including GCCs (Global Capability Centers), Indian tech majors,
              and large domestic corporates. Named clients include Infosys, Wipro, Cognizant, Amazon, Paytm, and HDFC
              Bank. Contract value ranges from Rs 50L to Rs 5Cr+ annually. Buyer is L&D head or CHRO; user is the
              employee; payer is the enterprise.


              International: KnowledgeHut serves individual professionals in Southeast Asia, Middle East, and North
              America, with English-language technical certifications (Agile, AWS, data) priced in USD/AED.
            claimRefs:
