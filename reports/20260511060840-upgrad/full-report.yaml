      - number: '7.4'
        title: Financial and business model risk
        blocks:
          - type: paragraph
            body: >-
              upGrad's financial risks focus on the sustainability of its EBITDA recovery trajectory. FY25 EBITDA of +Rs
              15 crore (vs -Rs 285 crore in FY24) represents a significant turnaround, but the margin is thin (0.8% of
              gross revenue) and dependent on continued opex discipline. Key financial risks: (1) if revenue growth
              stalls (FY25 grew only 3.6% YoY), the EBITDA margin could erode quickly as fixed costs (content
              production, SSM workforce) remain elevated; (2) upGrad has debt facilities (details not fully disclosed)
              that may carry financial covenants linked to EBITDA or revenue; covenant breach would force accelerated
              repayment or equity dilution; (3) B2C unit economics are sensitive to CAC (Rs 20K-35K per learner) versus
              LTV (Rs 1-1.5L ticket minus NBFC fees, refunds, and delivery costs). LTV/CAC compression from rising ad
              costs or falling conversion rates would reverse the EBITDA improvement.


              Additional financial risk: working capital strain from the mismatch between NBFC upfront fee collection
              and monthly content delivery costs.
