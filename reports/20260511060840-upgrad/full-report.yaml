      - number: '8.2'
        title: Valuation context and comparables
        blocks:
          - type: paragraph
            body: >-
              upGrad's $2.25B valuation (Temasek Oct 2024) is benchmarked against: (1) global edtech revenue
              multiples—Coursera trades at approximately 2-3x NTM revenue; 2U trades at distressed sub-1x; (2) India
              edtech private transactions—upGrad itself raised at $1.2B (2021) and $2.25B (2024); Byju's peak was $22B
              (impaired); (3) India-listed comparable Jaro Education trades at approximately 4-5x revenue at sub-$500M
              market cap on a profitable but smaller revenue base.


              Valuation methods appropriate for upGrad: (a) Revenue multiple—12x FY25 gross revenue is aggressive versus
              public comps; 5-7x forward revenue (FY27E) would imply Rs 2,200-3,100 crore revenue needed to justify
              $2.25B—achievable only in the bull scenario; (b) DCF—requires sustained EBITDA margin of 8-12% by FY28 and
              15%+ revenue CAGR; DCF base case yields $1.5-2.0B enterprise value; (c) EV/EBITDA—not meaningful at
              current ~Rs 15 crore EBITDA; meaningful only on FY27E EBITDA of Rs 200-400 crore at 20-30x gives
              $1.2-2.4B.
            claimRefs:
              - CV005
