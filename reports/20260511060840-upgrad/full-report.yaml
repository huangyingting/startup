      - number: '8.3'
        title: Scenario analysis and sensitivity
        blocks:
          - type: paragraph
            body: >-
              Bull case ($3.0-3.5B): NBFC financing remains accessible; FY26 EBITDA reaches Rs 100-150 crore; enterprise
              segment grows to 30% of revenue; AI tutor launch accelerates Tier 2/3 enrollment; UGC framework remains
              stable; revenue reaches Rs 2,500 crore by FY27. At 5-6x FY27 revenue or 20-25x FY27 EBITDA, enterprise
              value is $3.0-3.5B. IPO path viable in FY27-28.


              Base case ($1.8-2.5B): Moderate revenue growth (8-12% YoY); EBITDA improves to Rs 100-200 crore by FY27;
              NBFC credit moderately tightens (15% impact on conversion); competitive pressure from Coursera holds
              enterprise segment share; leadership transition stabilizes. DCF base case at 12% WACC yields $1.8-2.5B.


              Bear case ($800M-1.2B): NBFC tightens materially (30% demand impact); UGC framework tightens for online
              degrees; Mayank Kumar-level execution gaps persist; EBITDA reverts to negative (-Rs 100 crore); revenue
              growth stalls at 3-5% YoY. Distressed revenue multiple of 2-3x would imply $800M-1.2B—potential down-round
              scenario from current $2.25B.
            claimRefs:
              - CV009
              - CV010
              - CV011
