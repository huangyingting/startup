  - number: 5
    title: Product & Technology
    sections:
      - number: '5.1'
        title: Product definition in customer workflow terms
        blocks:
          - type: paragraph
            body: >-
              upGrad's core product is an end-to-end career-outcomes platform for working professionals. In the B2C
              segment, the customer workflow is: (1) discovery via digital ads or organic search; (2) counselor-assisted
              program selection call; (3) application and NBFC/self-pay enrollment; (4) program delivery through live
              cohort sessions (2-3 sessions/week), recorded modules, assignments, and peer collaboration; (5) mentorship
              with industry practitioners; (6) placement support through career portal and recruiter access; and (7)
              certificate or degree issuance by university partner.


              In the B2B enterprise segment, the customer workflow is: (1) RFP or enterprise sales cycle; (2) custom
              program design with L&D team; (3) LMS integration or hosted enrollment; (4) cohort delivery to employee
              batches; (5) completion tracking and analytics dashboard; (6) certification and skills verification
              reports. The B2B platform is white-labelable for large enterprise clients.
