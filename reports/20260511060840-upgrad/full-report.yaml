      - number: '5.5'
        title: Trust, compliance, and quality controls
        blocks:
          - type: paragraph
            body: >-
              upGrad's quality framework centers on three areas: (1) program accreditation—all degree programs are
              delivered under university license (UGC-compliant or internationally accredited); (2) assessment
              integrity—AI proctoring for all formal assessments; and (3) placement verification—hiring partner
              agreements and placement tracking dashboard. Data privacy compliance is under India's DPDPA (Digital
              Personal Data Protection Act 2023) framework; upGrad collects learner data including demographics,
              behavioral, and assessment data.


              Consumer trust risks include: placement guarantee misrepresentation complaints (ongoing regulatory
              scrutiny), refund policy disputes, and the potential for AI-generated course content to reduce perceived
              quality if not carefully managed. The UGC's online degree framework requires universities to meet minimum
              standards; upGrad's role as a service provider means liability rests with the university partner in the
              event of accreditation challenges.
