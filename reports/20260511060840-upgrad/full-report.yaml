      - number: '2.5'
        title: Exhibits
        blocks:
          - type: callout
            title: 'Structural tailwinds: NEP 2020, GCC boom, and AI upskilling demand'
            body: >
              India's NEP 2020 policy push, UGC's online degree liberalization, and the rapid growth of GCCs (Global
              Capability Centers) in Indian metro cities create structural demand for exactly the credentials and
              enterprise upskilling programs that upGrad provides. AI/ML course demand doubling in FY25 signals the
              company is positioned in the highest-growth demand vertical.
            calloutType: strength
            claimRefs:
              - CM015
              - CM016
              - CM017
          - type: callout
            title: Post-pandemic normalization and free-platform competition constrain growth
            body: >
              The post-2022 edtech sector contraction was severe across India. upGrad's FY25 gross revenue growth was
              approximately 5.5% in recognized revenue terms—well below the market's theoretical 23-26% CAGR. This
              suggests upGrad is not keeping pace with market growth, likely reflecting demand normalization,
              competitive pressure from Coursera and SWAYAM, and brand damage from consumer complaint exposure.
            calloutType: risk
            claimRefs:
              - CM018
