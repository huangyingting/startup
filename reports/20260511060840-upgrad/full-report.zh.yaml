      - number: '6.5'
        title: 扩张、集中度与渠道风险
        blocks:
          - type: paragraph
            body: >-
              upGrad 企业板块呈现先落地、再扩张：企业客户从一个部门（通常是 IT 或数据团队）起步，在续约周期扩展到更多团队。企业收入中，前 10 大企业客户估计占约 25-35%——集中度中等，但不至于令人警惕。


              B2C 获客高度依赖付费数字渠道（Google/Meta 广告），贡献约 60-70% 新报名。这形成集中风险：Google/Meta
              广告成本上升或平台政策变化，都会显著推高获客成本（CAC）；高端项目每名学习者的 CAC 已估计为 Rs 20,000-35,000。


              渠道多元化努力包括大学合作（来自合作校园网络的线索）、校友推荐项目，以及企业雇主渠道（雇主补贴员工项目）。相较数字付费获客，这些渠道规模仍小。
