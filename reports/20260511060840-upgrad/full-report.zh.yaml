  - number: 3
    title: 竞争对手
    sections:
      - number: '3.1'
        title: 竞争格局概览
        blocks:
          - type: paragraph
            body: >-
              upGrad 的竞争横跨三层：（1）在印度 K12 后职业细分市场运营的在线高等教育和技能提升直接同业；（2）在印度有业务的全球平台玩家；（3）正在建设数字能力的传统线下存量玩家。直接竞争集合包括
              Simplilearn、Great Learning（Byju's 子公司，运营受损）、NIIT、Jaro Education 和 Imarticus Learning。相邻玩家包括
              Coursera、edX/2U 和 LinkedIn Learning，它们作为全球 MOOC 平台争夺企业 L&D 预算。


              2022 年后教育科技出清，竞争格局正在整合：Byju's 到 2024 年陷入财务崩塌，负债约 Rs 22,000 crore，并大规模裁员；Vedantu 转向 K-12 盈利；Unacademy
              退出多个垂直领域。这轮整合让 upGrad 作为职业技能提升领域最大幸存高端 B2C 玩家受益。不过，Coursera 和 LinkedIn Learning 正在激进扩张企业合同，Simplilearn
              仍保有强技术技能市场份额，PhysicsWallah 的 PW Skills 则是在技术训练营中的新低价破坏者。
