      - number: '8.3'
        title: 情景分析与敏感性
        blocks:
          - type: paragraph
            body: >-
              乐观情景（$3.0-3.5B）：NBFC 融资仍可获得；FY26 EBITDA 达到 Rs 100-150 crore；企业业务增长至收入的 30%；AI tutor 上线推动 Tier 2/3 城市报名；UGC
              框架保持稳定；FY27 收入达到 Rs 2,500 crore。按 FY27 收入 5-6x 或 FY27 EBITDA 20-25x 计算，企业价值为 $3.0-3.5B。FY27-28 具备 IPO 路径。


              基准情景（$1.8-2.5B）：收入温和增长（同比 8-12%）；到 FY27，EBITDA 提升至 Rs 100-200 crore；NBFC 信用适度收紧（对转化率影响 15%）；Coursera
              的竞争压力压住企业业务份额；管理层交接企稳。按 12% WACC 计算，DCF 基准情景为 $1.8-2.5B。


              悲观情景（$800M-1.2B）：NBFC 明显收紧（需求受 30% 影响）；UGC 对在线学位框架收紧；Mayank Kumar 级别的执行缺口持续；EBITDA 重新转负（-Rs 100
              crore）；收入增长停在同比 3-5%。困境收入倍数 2-3x 将指向 $800M-1.2B——相对当前 $2.25B，存在降估值融资可能。
            claimRefs:
              - CV009
              - CV010
              - CV011
          - type: figure
            figureRef: FV004
            claimRefs:
              - CV001
              - CV002
              - CV003
              - CV004
      - number: '8.4'
        title: 退出准备度与尽调问题
        blocks:
          - type: paragraph
            body: >-
              upGrad 的退出选项：（1）IPO——最可能的主要退出路径；印度教育科技要讲出可信的公开市场故事，需要 Rs 200+ crore EBITDA，乐观情景下 FY27-28 可达到。可在 BSE/NSE
              上市，Jaro Education 可作为可比公司。（2）战略收购——Byju's 崩盘后，M&A 胃口有限；潜在买方包括 Reliance Education（未宣布）、Times Internet
              Group，或希望配置印度教育资产的新加坡 / UAE 主权财富基金。（3）老股交易——Temasek 或其他后期投资人可能在 2-3 年维度、按 $1.8-2.5B
              寻求老股流动性；如果老股相对新股折价，将说明投资人对 IPO 时间表失去耐心。


              最终尽调问题：（1）FY26 H1 管理账，需含分部 EBITDA；（2）NBFC 审批率趋势（月度）；（3）债务约束条款及当前合规状态；（4）按队列拆分的 B2C 项目完成率；（5）UGC
              关于在线学位标准的往来文件；（6）受 NDA 约束的企业客户名单；（7）DPDPA 合规路线图。
