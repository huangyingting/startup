      - number: '7.3'
        title: 合作伙伴与依赖风险
        blocks:
          - type: paragraph
            body: >-
              upGrad 的主要依赖风险包括：（1）NBFC 信用风险——60%+ B2C 高端报名通过 NBFC EMI 融资。如果 Bajaj Finance、HDFC Credila 或其他 NBFC
              合作方因违约率上升或无抵押个人贷款监管压力而收紧教育科技贷款审批标准，缺少替代融资时，短期需求转化可能下降 30-40%。考虑到 RBI 在 2024 年审查无抵押零售贷款，这是近期风险。


              （2）大学合作风险——如果 LJMU、Deakin 或 MICA 退出与 upGrad 的合作（因合同纠纷、质量担忧或国际监管变化），相应学位项目需要收尾或迁移到新合作方，带来 12-24
              个月扰动。学位项目约占收入 20-25%。


              （3）云 / 平台供应商风险——对 AWS、Zoom API、Salesforce 和 Razorpay 的依赖，构成多供应商失效场景。单个供应商宕机影响可控；如果 AWS 和 Zoom
              同时失效，直播交付将在整个故障期间完全停摆。
            claimRefs:
