      - number: '8.2'
        title: 估值背景与可比公司
        blocks:
          - type: paragraph
            body: >-
              upGrad 的 $2.25B 估值（Temasek 2024 年 10 月）可放在三组参照里看：（1）全球教育科技收入倍数——Coursera 约按 2-3x NTM 收入交易；2U 处于困境，低于
              1x；（2）印度教育科技私募交易——upGrad 本身曾以 $1.2B（2021 年）和 $2.25B（2024 年）估值融资；Byju's 峰值为 $22B（已减值）；（3）印度上市可比公司 Jaro
              Education 按约 4-5x 收入交易，市值低于 $500M，收入基数更小但已盈利。


              适合 upGrad 的估值方法包括：（a）收入倍数——按 FY25 总收入 12x 计，较上市可比公司偏激进；如果采用 5-7x 远期收入（FY27E），要支撑 $2.25B 估值，需要 Rs
              2,200-3,100 crore 收入，只有乐观情景才可能达到；（b）DCF——要求 FY28 EBITDA 利润率稳定在 8-12%，且收入 CAGR 超过 15%；DCF 基准情景给出的企业价值为
              $1.5-2.0B；（c）EV/EBITDA——当前 EBITDA 约 Rs 15 crore，参考意义不大；只有按 FY27E EBITDA Rs 200-400 crore、20-30x 倍数计算，才对应
              $1.2-2.4B。
            claimRefs:
              - CV005
              - CV006
              - CV007
              - CV008
