  - number: 2
    title: 市场分析
    sections:
      - number: '2.1'
        title: 市场定义与边界
        blocks:
          - type: paragraph
            body: >
              upGrad 所在的两个可寻址市场彼此独立但相邻：（1）印度在线职业技能提升和高等教育（PG/高管）市场，覆盖学位项目、研究生项目、高管教育和面向在职成人的训练营；（2）B2B
              企业学习与发展（L&D）市场，服务印度和全球企业的员工技能提升。这两个市场的买方旅程、预算归属和单位经济不同，但共用内容基础设施。

              更广义的印度教育科技市场 2025 年估计约为 $7.5 billion，覆盖 K-12 考试培训、K-12 校外补充、语言学习和职业 / 高等教育。upGrad 的可服务市场是职业和高等教育切片：2025 年约
              $4.0-4.5 billion，预计以约 23-26% CAGR 增长，到 2030 年超过 $10+ billion。企业 L&D 板块另行估计为每年 $800M-$1.2B，面向印度企业合同。

              市场边界由三点决定：（a）地理上以印度为主市场（约 75-80% 收入），东南亚和中东为次级市场；（b）资质类型——upGrad 聚焦 K12 后证书、PGP
              和在线学位，而非考试培训；（c）学习者画像——在职成人，而不是学生。
