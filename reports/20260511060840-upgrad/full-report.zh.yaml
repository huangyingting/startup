            body: >
              upGrad 在 FY25 实现 EBITDA 转正（+15 crore INR），同时净亏损减半至 273 crore INR，构成具体拐点。叠加 80%+ B2B 复购率和 20-25%
              国际收入占比，财务轨迹支撑 IPO 叙事；但净利润仍未转正，EBITDA 利润率薄到一次重组费用就可能打回负值。
