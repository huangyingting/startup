  - number: 7
    title: 风险
    sections:
      - number: '7.1'
        title: 监管与法律风险
        blocks:
          - type: paragraph
            body: >-
              upGrad 有三项重大监管暴露：（1）UGC 在线学位框架——允许大学合作方交付全在线学位的监管架构，如果 UGC
              收紧质量标准、要求校内环节，或撤回已批准大学权限，就可能变化。这是影响最大的风险，因为它会打掉国际学位和在线 MBA 产品；这类产品相对证书项目有 2-3x 溢价。


              （2）Consumer Protection 和 ASCI 就业保证执法——CCPA 正在审查印度教育科技平台的就业保证广告声明。如果 upGrad
              被要求重述或移除就业保证措辞，高客单价项目转化率可能显著下滑。Consumer Protection Act 2019 也让 upGrad 面临类似集体诉讼的投诉，可能导致大规模退款命令。


              （3）DPDPA 2023（Digital Personal Data Protection Act）——upGrad 收集大量学习者行为、人口统计和评估数据。DPDPA
              落地将要求同意框架、数据主体权利，以及可能影响 KnowledgeHut 国际数据流的跨境传输限制。违规风险包括每次泄露最高 Rs 250 crore 罚款。截至 2026 年 5 月，尚无正式执法行动。
            claimRefs:
              - CR001
              - CR002
              - CR003
              - CR004
