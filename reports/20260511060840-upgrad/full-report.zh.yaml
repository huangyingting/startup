      - number: '7.4'
        title: 财务与商业模式风险
        blocks:
          - type: paragraph
            body: >-
              upGrad 的财务风险集中在 EBITDA 修复能否持续。FY25 EBITDA 为 +Rs 15 crore（FY24 为 -Rs 285 crore），扭亏幅度很大，但利润率很薄（占总收入
              0.8%），也依赖继续压住运营开支。核心财务风险有三点：（1）如果收入增长停滞（FY25 同比仅增长 3.6%），内容制作、SSM 团队等固定成本仍在高位，EBITDA 利润率可能很快被吃掉；（2）upGrad
              有债务融资安排（细节未完全披露），可能附带与 EBITDA 或收入挂钩的财务约束；一旦违约，公司会被迫提前还款或通过股权稀释解决；（3）B2C 单位经济模型对 CAC（每名学员 Rs 20K-35K）与
              LTV（Rs 1-1.5L 客单价，扣除 NBFC 费用、退款和交付成本）之间的差额很敏感。广告成本上升或转化率下降压缩 LTV/CAC，会逆转 EBITDA 改善。


              另一项财务风险是营运资本压力：NBFC 前置收费与每月内容交付成本之间存在错配。
