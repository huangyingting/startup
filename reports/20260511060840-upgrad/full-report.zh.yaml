              upGrad 产品组合横跨约 200+ 活跃项目，分为五类：（1）PG 证书和 PGP（12 个月，Rs 75K-2L）——核心收入驱动；（2）通过 LJMU、Deakin、MICA 和 IIT Madras
              提供的在线学位（24-36 个月，Rs 3L-5L）；（3）面向资深专业人士的高管教育（3-6 个月，Rs 1.5L-4L）；（4）短课和认证（1-3 个月，Rs 10K-40K）；（5）企业 L&D
              项目（定制）。领域覆盖包括：数据科学和 AI（约 40% 报名）、技术（云、DevOps、编程）、管理（MBA、战略、营销）、法律（NLU 合作）和医疗健康（新兴）。


              KnowledgeHut（2021 年收购）用技术技能训练营（Agile、AWS、数据工程）扩展产品组合，目标是国际市场。合并后的产品矩阵让 upGrad
              覆盖从短期技术认证到完整学位的宽度——没有单一竞争对手能匹配这一范围。
