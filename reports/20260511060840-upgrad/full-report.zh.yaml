  - number: 4
    title: 财务
    sections:
      - number: '4.1'
        title: 收入来源与确认
        blocks:
          - type: paragraph
            body: >-
              upGrad 的收入架构有两条主线：（1）来自 PGP、高管教育和在线学位项目的 B2C 学费——主导收入流，约占总收入 65-70%；（2）来自 GCC、IT 公司和制造业客户员工技能提升的 B2B
              企业合同——约占总收入 30-35%，且增长更快。


              Ind-AS 下的收入确认采用递延收入模式：学费由学员预付，或通过 NBFC 贷款支付（款项由 upGrad 收到），但按项目周期确认收入。这形成了可观的递延收入余额：FY25 为 Rs 556
              crore，FY24 为 Rs 507 crore。FY25 总收款收入（Rs 1,943 crore）与 Ind-AS 经营收入（Rs 1,569
              crore）之间的差距，正来自这种递延机制。分析师和投资者应把总收入作为需求信号，把 Ind-AS 收入用于盈利能力分析。


              KnowledgeHut（2021 年收购）主要从东南亚、中东和北美贡献国际收入，估计 FY25 占公司总收入 20-25%。相比消费者项目，企业合同收入确认更快（按服务交付确认）。
            claimRefs:
              - CI001
              - CI002
              - CI003
              - CI004
