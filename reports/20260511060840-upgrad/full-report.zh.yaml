figures:
  - id: FO001
    title: upGrad 公司里程碑时间线
    type: timeline
    layout: wide
    summary: 2015 至 2026 年，upGrad 在创立、融资、收购、领导层更替和财务表现上的关键里程碑。
    data:
      items:
        - label: 创立
          date: 2015-01
          detail: upGrad 由 Ronnie Screwvala、Mayank Kumar、Phalgun Kompalli 和 Ravijot Chugh 在孟买创立
          tone: positive
        - label: MICA 合作
          date: 2016-01
          detail: 旗舰 Digital Marketing 项目与 MICA 上线；首个重要大学合作
          tone: positive
        - label: LJMU 合作
          date: 2018-01
          detail: 与 Liverpool John Moores University 合作；支持国际认证在线学位
          tone: positive
        - label: 独角兽
          date: 2021-02
          detail: IIFL 和 IFC 以 $1.2B 估值投资；upGrad 成为印度最新教育科技独角兽
          tone: positive
        - label: 收购
          date: 2021-08
          detail: 收购 KnowledgeHut（约 $35M）和 Impartus；扩大全球覆盖并补强视频 LMS 能力
          tone: positive
        - label: 融资 $225M
          date: 2022-06
          detail: Lupa Systems 和 ETS 领投 $225M 轮，估值 $2.25B——单笔最大融资
          tone: positive
        - label: 融资 $210M
          date: 2022-08
          detail: 来自 ETS Global、Bodhi Tree、Kaizen、IFC 和 IIFL 的追加 $210M
          tone: positive
        - label: 创始人轮
          date: 2023-03
          detail: Ronnie Screwvala 在教育科技下行期投资约 $36M，传递信心
          tone: neutral
        - label: 领导层变化
          date: 2024-10
          detail: Mayank Kumar 退出运营；Screwvala 接手运营角色；Temasek 以持平估值投资 $60M
          tone: neutral
