            body: >-
              upGrad 的差异化功能包括：（1）大学品牌在线学位（LJMU、Deakin、MICA、IIT Madras），带有 Simplilearn、PW Skills 或 NIIT
              难以复制的正式学位资质；（2）配备专属学生成功经理的在线直播班课；（3）通过 2,500+ 招聘伙伴提供就业支持；（4）全栈企业平台（upGrad Enterprise），服务包括 GCC 和 IT
