        blocks:
          - type: paragraph
            body: >-
              自 2015 年以来，upGrad 累计股权融资约 $782M。最近一轮是 Temasek 于 2024 年 10 月按 $2.25B 持平估值投资 $60M——与 2022 年 6 月 $225M
              融资估值相同。两年估值持平，反映教育科技融资寒冬后投资者谨慎，也反映 upGrad 当时仍在亏损；但它也证明机构投资者仍愿按既有价格提供信心。


              EBITDA 转正后，现金消耗已明显下降。递延收入余额（Rs 556 crore）提供营运资本缓冲。管理层表示 IPO 计划目标是在 2026 年末或 2027 年 H1 向 SEBI
              申报，这将为股东提供额外资本和流动性。截至 2026 年初，据报道公司正在推进 IPO 前二级市场出售，为早期投资者提供退出机制。
