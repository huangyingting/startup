      - number: '7.5'
        title: 团队、执行与市场风险
        blocks:
          - type: paragraph
            body: >-
              团队风险不小：联合创始人、MD Mayank Kumar 于 2024 年 10 月辞职，据报道原因是与 Ronnie Screwvala 在扩张策略和成本结构上存在分歧。upGrad 现在由创始人 Ronnie
              Screwvala 主导，他持有约 45% 股权，过往背景主要在大众媒体和娱乐行业（UTV Group）。在线教育业务的执行风险可能上升，尤其是学术运营、UGC 合规和企业
              L&D；公司少了一位有深度教育运营背景的联合创始人。新任 CPO Phalgun Kompalli 和 CHRO Ravijot Chugh 上任时间也相对不长。


              市场结构性风险有三点：（1）生成式 AI 正在加快竞争对手的内容生产；Coursera、LinkedIn Learning 和 Microsoft Learn 都以更低成本做 AI 优先的内容交付，可能挤压
              upGrad 在非学位项目上的定价权；（2）印度 IT 行业招聘周期——如果 IT 招聘长期放缓，数据科学和技术项目的需求会下滑，这些项目占报名量的 40% 以上；（3）Jaro
              Education（已盈利、已上市）以及在线 MBA/PGDM 新进入者会加剧竞争。
            claimRefs:
              - CR016
              - CR017
              - CR018
              - CR019
