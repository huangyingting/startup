            body: >-
              upGrad 的护城河在三方面处于中等到偏强水平：（1）大学关系构成内容和资质护城河，需要多年复制；（2）通过 2,500+
              招聘伙伴形成雇主网络效应，搭出竞争者难以规模化复制的就业生态；（3）高端细分市场的品牌信任在 Byju's 出清后得到强化。B2C
              学习者切换成本中等：授予学位的项目在就读期间形成锁定，但证书项目学习者经常同时使用 upGrad、Simplilearn 和 Coursera。企业切换成本更高，来自 LMS 集成和定制项目开发。


