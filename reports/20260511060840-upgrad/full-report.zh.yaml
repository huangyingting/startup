            body: >-
              upGrad
              的主要技术差异点有三项：（1）学生成功经理（SSM）模式——在人参与环节之上叠加数据驱动的早期预警系统，标记高风险学习者并触发顾问触达，以提升完课率；（2）大学合作基础设施，支持正式学位在线规模化交付；（3）把学习者画像与招聘伙伴机会匹配的就业匹配
              AI 引擎。


              产品路线图（2025-2027）优先推进：（a）GenAI 驱动的个性化学习路径（upGrad AI Tutor，beta）；（b）面向企业的微证书和可堆叠资质；（c）面向 Tier 2/3
              城市的本地语言内容（Hindi、Tamil、Telugu）；（d）面向企业 HR 系统、可直接验证学习者资质的 Skills Passport 产品。关键 IP 资产包括：课程设计（自有但未正式申请专利）、SSM
              操作手册和就业匹配算法。未提交重大专利；IP 护城河主要来自流程和关系。
            claimRefs:
              - CE012
              - CE013
              - CE014
              - CE015
