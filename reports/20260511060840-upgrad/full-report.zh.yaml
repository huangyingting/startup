      - number: '2.3'
        title: 买方与细分市场地图
        blocks:
          - type: paragraph
            body: >
              upGrad 在 B2C 板块的主要买方，是 25-40 岁在职专业人士，主要位于一线城市（Bengaluru、Mumbai、Delhi-NCR、Hyderabad、Pune），年收入 Rs 5-25
              lakh。买方也是用户；他们自费教育或使用 EMI 方案（平均课程成本从 Rs 50,000 到 Rs
              5,00,000+）。核心购买动机包括职业转型（例如从工程师转为产品经理）、加薪，以及获得国际认可资质。校友网络和就业支持是关键决策触发点；upGrad 销售流程高度个性化，配有专属顾问。

              B2B 企业买方是大企业（通常 500+ 员工）的首席人力官、VP-HR 或 L&D 负责人。采购决策由机构作出，由年度人才发展预算驱动。upGrad 以项目质量、师资可信度、内容 AI
              个性化和结果（认证）竞争。FY25，重复合同占企业客户基数超过 80%。

              随着移动渗透加深，Tier 2 和 Tier 3 城市专业人士成为新兴且具有战略意义的群体。英语授课仍是该群体的市场约束，尽管本地语言内容在增加。UGC 在 2022-2024
              年的监管改革允许大学提供全在线学位项目，推动了在线学位采用。
