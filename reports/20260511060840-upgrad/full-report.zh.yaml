      - number: '2.2'
        title: 市场规模：TAM、SAM、SOM
        blocks:
          - type: paragraph
            body: >
              若纳入 K-12、考试培训、高等教育、职业技能提升和语言学习，2026 年印度在线教育总可寻址市场（TAM）估计为 $8.6 billion。upGrad
              的服务可寻址市场（SAM）——面向成人的职业在线高等教育和技能提升——2025 年约为 $4.0-4.5 billion。服务可获得市场（SOM）受 upGrad 当前市场份额（以 FY25 约 $185M
              确认收入计，约占 SAM 的 4-5%）、现实竞争格局和印度都市集中度约束。

              印度在线高等教育市场本身（UG 和 PG 在线学位 + 高管项目）在 FY2023 约为 Rs 30,000 crore（约 $3.6B），预计到 FY2028 增至 Rs 85,000 crore（约
              $10.2B），CAGR 约 23.1%。Technavio、IMARC Group、Renub Research 等行业分析机构发布的印度教育科技 TAM 估计差异较大：2025-2026 年介于 $7.5B
              到 $8.6B，2030+ 预测介于 $29-33B，取决于是否纳入 K-12 和非正式学习。

              企业 / 公司技能提升板块（B2B L&D）约占职业技能提升可寻址市场的 20-30%，也就是 2025 年印度每年约 $800M-$1.2B。upGrad Enterprise 服务印度及国际的
              GCC、IT、BFSI 和制造业客户，国际企业客户估计贡献公司总收入的 20-25%。
