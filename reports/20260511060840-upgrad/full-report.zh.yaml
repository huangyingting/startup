      - number: '5.5'
        title: 信任、合规与质量控制
        blocks:
          - type: paragraph
            body: >-
              upGrad 的质量框架围绕三点：（1）项目认证——所有学位项目都在大学许可下交付（符合 UGC 或国际认证）；（2）评估诚信——所有正式评估使用 AI
              监考；（3）就业验证——招聘伙伴协议和就业跟踪仪表盘。数据隐私合规遵循印度 DPDPA（Digital Personal Data Protection Act 2023）框架；upGrad
              收集学习者数据，包括人口统计、行为和评估数据。


              消费者信任风险包括：就业保证误导投诉（持续监管审查）、退款政策纠纷，以及若管理不慎，AI 生成课程内容可能降低感知质量。UGC 的在线学位框架要求大学满足最低标准；upGrad
              作为服务提供商，在认证出现问题时责任落在大学合作方身上。
            claimRefs:
              - CE016
              - CE017
              - CE018
