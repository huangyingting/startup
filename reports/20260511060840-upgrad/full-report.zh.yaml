      - number: '4.3'
        title: 成本结构与单位经济
        blocks:
          - type: paragraph
            body: >-
              upGrad 的成本结构有三大类：（1）学生获取成本（SAC）——最大 opex
              项，由数字广告、顾问佣金和合作伙伴渠道费用驱动；（2）内容交付和学习体验成本（师资费用、平台托管、学生成功经理）；（3）公司开销（G&A、法律、财务）。FY24-25 的 SAC 降本项目，是 EBITDA
              改善的主要驱动。


              upGrad 单项目毛利率估计在 40-55% 区间，企业合同毛利率估计为 60-70%（相比之下，高触达 B2C PGP 项目为 35-45%）。递延收入模式让营运资本结构上有利：upGrad
              通常先收课程费再确认收入，形成正向现金浮存。资本开支不大，主要是云基础设施和自有技术平台维护。
