      - number: '1.4'
        title: 规模、招生与关键指标
        blocks:
          - type: paragraph
            body: >
              upGrad 报告称，截至 2025 年，其各平台累计注册学习者超过 10 million，FY24 活跃项目报名同比增长 50%。公司称 FY24 有 55,000+ 职业转型，并把结果数据作为相较自定进度
              MOOC 竞争者的关键差异点。FY25，技术和 AI 课程约占总收入 20%；管理类项目（MBA、高管教育）仍是最大板块。大学合作方包括 Liverpool John Moores
              University、Deakin University（Australia）、MICA（Ahmedabad）、IIT Madras 以及若干其他机构。

              企业 B2B 部门服务 GCC、IT、BFSI、制造业和服务业客户。FY25，国际收入约占 upGrad 总收入 20-25%，东南亚和中东是关键市场。FY25，企业 AI 技能提升需求同比翻倍。

              规模扩大也伴随负面信号：消费者论坛、Reddit 和消费者投诉平台上，出现大量与退款政策、就业结果误导和课程交付质量相关的学生投诉。这些投诉构成持续的声誉和监管风险。截至 2026 年 5 月，upGrad
              尚未公开披露全面回应或整改计划。
