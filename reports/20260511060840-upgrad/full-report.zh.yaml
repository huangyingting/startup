      - number: '6.2'
        title: 采用轨迹与活跃使用
        blocks:
          - type: paragraph
            body: >-
              upGrad 累计学习者基数从约 100K 报名（FY20）增长到 3M+ 累计（FY25），FY25 活跃学习者约 500K。收入从 Rs 571 crore（FY22）增至 Rs 1,943
              crore（FY25），说明采用强劲；但净亏损路径也说明，每获取一名新学习者都要投入大量营销成本。


              企业采用增长显著：FY25 企业客户达到 600+，FY20 约为 100。upGrad 称每年交付 3 million 小时企业学习。国际 KnowledgeHut 板块每年通过在线和训练营形式服务约 200K
              学习者。


              B2C 复购结构性较低：多数学习者完成一个项目后不会回来学习第二个项目（班课分析显示第二项目报名率 <15%）。B2B 企业续约率更高；完成一个班课的企业客户，通常会在后续员工批次上延长或扩大合同。
            claimRefs:
              - CU004
              - CU005
              - CU006
          - type: table
            tableRef: TU002
            claimRefs:
              - CU004
              - CU005
              - CU006
      - number: '6.3'
        title: 已命名客户证明与背书质量
        blocks:
          - type: paragraph
            body: >-
              upGrad 已命名企业客户包括多家印度 IT 服务标杆公司（Infosys、Wipro、Cognizant）和数字优先公司（Amazon
              India、Paytm、Zomato）。这些客户的层级为企业销售动作提供了社会背书。


              B2C 客户证明来自就业评价和校友网络。upGrad 称拥有 800K+ 校友；代表性结果包括学习者从非技术岗位转到 Google、Flipkart、Deloitte
              等公司的数据科学家职位。这些评价由公司筛选，未独立验证。


              企业客户背书质量较高，但带有量化结果（员工绩效改善、培训后留存提升）的详细案例研究有限。多数可得证明是评价或品牌标识背书，而不是 ROI 量化案例研究——相较 Coursera for Business 或
              LinkedIn Learning 的企业资质报告，这是一个缺口。
