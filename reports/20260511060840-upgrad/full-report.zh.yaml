      - number: '4.2'
        title: 收入轨迹与 EBITDA 路径
        blocks:
          - type: paragraph
            body: >-
              upGrad 的收入轨迹显示，公司从 FY23 激进扩张时期的峰值亏损（净亏损 Rs 2,591 crore）中恢复，到 FY25 已显著改善。总收入从 FY24 的 Rs 1,876 crore 增至 FY25
              的 Rs 1,943 crore，同比增长 5%——经历两年重组后，增速温和但转正。关键里程碑是 FY25 EBITDA 转正至 +Rs 15 crore，而 FY24 EBITDA 亏损为 Rs 285
              crore。


              净亏损大幅收窄：Rs 2,591 crore（FY23）→ Rs 560 crore（FY24）→ Rs 273 crore（FY25），同比减少 Rs 287
              crore。这一改善来自运营成本重组（2022-2024 年约裁减 2,000+ 员工）、项目组合合理化，以及利润率更好的企业收入增长。管理层 FY26 指引暗示利润率将继续改善，走向调整后 PAT 转正。
