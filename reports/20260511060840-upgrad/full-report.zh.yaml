  - number: 6
    title: 客户
    sections:
      - number: '6.1'
        title: 客户群细分
        blocks:
          - type: paragraph
            body: >-
              upGrad 客户群有两类主要买方：（1）B2C 个人学习者；（2）B2B 企业 / GCC 客户，另有通过 KnowledgeHut 覆盖的规模较小的国际板块。


              B2C 学习者：平台约有 500,000 活跃学习者（累计报名 3M+）。核心人群是印度城市在职专业人士，25-35 岁，Tier 1 城市（Mumbai、Bangalore、Delhi
              NCR、Hyderabad），在 IT/科技行业工作，寻求转向数据科学、AI 或管理岗位。付款方和用户是同一个人；60%+ 报名通过 NBFC（Bajaj Finance/HDFC
              Credila）安排融资。平均项目客单价 Rs 1-1.5L。渠道主要是直接数字渠道（Google/Meta 广告），由顾问辅助转化。


              B2B 企业：600+ 企业客户，包括 GCC（全球能力中心）、印度科技龙头和大型本土企业。已命名客户包括 Infosys、Wipro、Cognizant、Amazon、Paytm 和 HDFC
              Bank。合同金额每年从 Rs 50L 到 Rs 5Cr+ 不等。买方是 L&D 负责人或 CHRO；用户是员工；付款方是企业。


              国际：KnowledgeHut 服务东南亚、中东和北美的个人专业人士，提供以 USD/AED 定价的英语技术认证（Agile、AWS、数据）。
            claimRefs:
              - CU001
              - CU002
              - CU003
