  - id: FR001
    title: 风险热力图
    type: matrix
    layout: standard
    summary: 2x2 风险热力图，按可能性和影响映射 upGrad 的主要风险，识别优先暴露项。
    data:
      columns:
        - 低影响
        - 高影响
      rows:
        - label: 高可能性
          values:
