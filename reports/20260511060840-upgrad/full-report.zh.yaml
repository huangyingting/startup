chapters:
  - number: 1
    title: 公司概览
    sections:
      - number: '1.1'
        title: 身份、创立与运营模式
        blocks:
          - type: paragraph
            body: >
              upGrad Education Private Limited（以「upGrad」运营）是印度最大的在线高等教育和职业技能提升平台。公司创立于 2015 年 1
              月，总部位于印度马哈拉施特拉邦孟买。公司宣称的使命是借助规模化技术学习，帮助个人取得决定职业路径的成果。upGrad
              把自己定位成终身学习伙伴，而不是传统课程提供商；它与全球认证大学合作，提供从短期证书到完整在线学位项目的各类资质。

              核心业务有两根结构性支柱：直接面向消费者（B2C）的业务，向在职专业人士和应届毕业生销售学位、研究生项目、高管教育和训练营；以及 B2B 企业业务（upGrad
              Enterprise），面向科技、BFSI、制造业和服务业的大企业与 GCC 提供员工技能提升合同。消费者业务通过学费和大学合作方分成贡献大部分收入；企业业务依靠机构合同，FY25 报告重复客户率超过 80%。

              upGrad 通过技术化学习系统交付内容，包括录播内容、直播课、导师项目和线下沉浸式课程。公司在 2021 年收购 Impartus（视频学习基础设施）和
              KnowledgeHut（职业认证），扩大平台能力和全球覆盖。FY25，公司报告业务覆盖 100 多个国家，国际收入约占总收入 20-25%。
            claimRefs:
              - CO001
              - CO002
              - CO003
              - CO004
              - CO005
              - CO006
      - number: '1.2'
        title: 创始人、领导层与治理
        blocks:
          - type: paragraph
            body: >
              upGrad 由四位背景互补的人共同创立。Ronnie Screwvala 是非执行董事长和最大个人股东（约 45% 持股），也是知名印度创业者，曾创办 UTV Group（媒体和娱乐）并以约 $1.4
              billion 出售给 Disney。他的参与为 upGrad 带来品牌信用和媒体行业经验。Mayank Kumar 曾任 McKinsey 顾问，也是最初的董事总经理；他从 2015 年起推动公司运营增长，直到
              2024 年末退出日常运营，转向全球人才流动领域的新创业项目。他保留约 8% 股权和董事会席位。Phalgun Kompalli 和 Ravijot Chugh 也是联合创始人，分别继续参与战略和产品职能。

              Mayank Kumar 于 2024 年 10 月退出日常运营后，Ronnie Screwvala 更深介入经营。公司和媒体都把这次治理变化描述为一项有意安排，用来在计划 IPO 前增强投资者信心。upGrad
              在 2024 年任命前 Tech Mahindra CEO CP Gurnani 为独立董事，为董事会增加执行可信度。

              公司治理结构是按 Companies Act 注册的印度私人公司。控制权在 Ronnie Screwvala 家族信托手中，该信托为大股东；Temasek 在 2024 年 10 月融资后持股约
              17-18%，IIFL、IFC、ETS Capital 等机构为少数股东。创始人主导的股权结构，相比上市公司削弱了独立治理制衡，这是 IPO 前尽调的警示项。
