  - number: 8
    title: 估值
    sections:
      - number: '8.1'
        title: 投资逻辑与建议
        blocks:
          - type: paragraph
            body: >-
              upGrad 的投资逻辑有三根支柱：（1）印度职业技能提升市场很大（约 $4.5B SAM，23-26% CAGR），渗透率仍低；在高端细分里，upGrad
              按收入和品牌都是明确的第一平台；（2）大学背书的交付模式形成切换成本，也给出 MOOCs 复制不了的质量信号；（3）FY25 EBITDA 修复至 +Rs 15
              crore，证明在没有宏观冲击时，公司有可行的盈利路径——这一点把 upGrad 与 Byju's 的治理和财务失灵明显区分开。


              反向逻辑同样有分量：真正买得起 Rs 1L+ 项目、能拿到 NBFC 融资、且有合理就业前景的学员市场，可能小于引用 TAM 暗示的规模；Coursera 的 AI 优先内容和 LinkedIn Learning
              的捆绑模式带来的竞争压力是真实的；Mayank Kumar 离开造成管理层交接，发生在 EBITDA 的关键节点，抬高了执行风险。


              建议：观察（在当前 $2.25B 估值下，若没有更强的 FY26 EBITDA 证据，不建议进入）。如果 EBITDA 走弱或出现降估值融资，可在 $1.5-1.8B 估值区间考虑进入。乐观情景下，如果 FY26
              EBITDA 超过 Rs 80-100 crore，按 $2.25B 进入仍可辩护。
            claimRefs:
              - CV001
              - CV002
              - CV003
              - CV004
