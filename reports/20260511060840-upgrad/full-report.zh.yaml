        title: 竞争对手画像
        blocks:
          - type: paragraph
            body: >-
              Simplilearn 是 upGrad 在技术技能提升领域最接近的直接竞争对手。Blackstone 于 2021 年以约 $250M 收购 Simplilearn；其年收入在 $80-110M 区间，并通过
              Purdue University 和 Caltech 合作覆盖全球。Great Learning 于 2021 年被 Byju's 收购，2023 年后承受财务压力，2024
              年出现课程中断和就业问题报告；其竞争强度已明显受损。NIIT 是传统 IT 培训存量玩家，服务企业客户，但在高端 PG 细分市场缺乏声望。


              Jaro Education（BSE/NSE: JARO）是印度职业教育科技中唯一持续公开盈利的主要公司：FY24 收入 Rs 391 crore，PAT Rs 39 crore（10% 净利率），聚焦与
              SPJIMR、IIM Nagpur 等商学院合作的在线 MBA 和 PGDM 项目。Coursera 截至 FY2024 全球注册学习者 148M，企业收入约 $258M，覆盖 7,000+
              客户。LinkedIn Learning 全球活跃学习者 27M+，企业订阅覆盖 Fortune 500 公司，但缺少授予学分的资质。PhysicsWallah 的 PW Skills 在 2023-24 年以
              Rs 5,000-Rs 25,000 价格带推出职业课程，瞄准技能提升市场低端。
