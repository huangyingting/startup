  - id: FV001
    title: 投资建议逻辑流
    type: flow
    layout: standard
    summary: 从市场、验证、风险和估值证据推导投资建议的链条。
    data:
      nodes:
        - id: market
          label: 市场：$4.5B SAM\n23-26% CAGR（已证实）
        - id: product
          label: 产品：大学学历证书\n+ SSM 模型（差异化）
        - id: financials
          label: 财务：EBITDA +Rs 15Cr\n（已恢复但脆弱）
        - id: risks
          label: 风险：NBFC + UGC\n+ 竞争（中高）
        - id: valuation
          label: 估值：$2.25B\n（FY25 收入 12x，昂贵）
        - id: recommendation
          label: 建议：观察\n（$1.5-1.8B 时入场，或\nFY26 EBITDA > Rs 80Cr）
      edges:
        - from: market
          to: recommendation
          label: 支撑投资逻辑
        - from: product
          to: recommendation
          label: 护城河可防守
        - from: financials
          to: recommendation
          label: 积极信号但脆弱
        - from: risks
          to: recommendation
          label: 限制入场价格
        - from: valuation
          to: recommendation
          label: 需要 EBITDA 触发条件
    approximationNotes: 逻辑流由分析师基于本尽调报告 8 个章节的证据构建。
    claimRefs:
      - CV001
      - CV003
      - CV009
