      - number: '1.3'
        title: 融资历史、投资者与估值
        blocks:
          - type: paragraph
            body: >
              2021 年 2 月，IIFL 按 $1.2 billion 估值注入 $25 million，upGrad 成为独角兽。公司最大一笔单轮融资是 2022 年 6 月的 $225 million，由 Lupa
              Systems（Murdoch 家族载体）、Educational Testing Service（ETS）和包括 Temasek 在内的既有投资者领投。随后 2022 年 8 月，ETS
              Global、Bodhi Tree Systems、Kaizen Management Advisors、IIFL 和 IFC 参与 $210 million 融资，使累计股权融资约达 $782
              million，另有债务融资。

              最近一次股权事件发生在 2024 年 10 月：Temasek 按 $2.25 billion 持平估值投资 $60 million，较 2022 年中峰值估值没有上调，反映出疫情后教育科技板块收缩，以及
              upGrad 在该轮融资时仍处于净亏损状态。Ronnie Screwvala 还另行以约 $20 million 收购 Bharti Enterprises 约 1% 股权，把自身持股巩固在 45%。

              $2.25 billion 估值约等于 FY25 总收入（约 $233M）的 9.6x。相较印度上市教育公司，这一倍数偏高；但如果 upGrad 能证明利润路径足以支撑 IPO，估值或许仍可辩护。截至 2026
              年 5 月，公司尚未向 SEBI 提交 DRHP。公司从 2024 年末起提出「7-8 个季度内」IPO 的目标，对应工作时间表是 2026 年末或 2027 年 H1 申报。
