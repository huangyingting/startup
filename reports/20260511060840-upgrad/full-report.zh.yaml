      - number: '7.2'
        title: 运营与质量风险
        blocks:
          - type: paragraph
            body: >-
              upGrad 的运营风险集中在三处：（1）平台可靠性和直播课连续性——直播课交付期间，任何较长的 Zoom API 中断或 AWS 基础设施故障都会扰乱核心产品，并按服务条款让 upGrad
              面临退款义务；（2）AI 内容质量风险——GenAI 课件集成（2024-25 年推进中）把事实不准确内容带入技术复杂学科（数据科学、法律、医疗健康）的风险抬高；一次高知名度 AI
              内容事故就可能重创品牌可信度；（3）数据安全和泄露风险——3M+ 学习者记录包含金融、生物识别（监考）和行为数据，重大数据泄露将同时带来 DPDPA 下的监管暴露和声誉损害。


              次级运营风险包括：招聘市场走弱时就业成功率下滑（2023-24 年 IT 行业招聘放缓已经压低部分就业结果），以及随着学习者基数增长，维持 SSM 模式质量的扩展挑战。
            claimRefs:
              - CR005
              - CR006
              - CR007
              - CR008
