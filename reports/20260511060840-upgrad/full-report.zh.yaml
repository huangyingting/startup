      - number: '2.4'
        title: 增长驱动与约束
        blocks:
          - type: paragraph
            body: >
              印度职业技能提升市场受益于多重结构性需求驱动。NEP 2020 明确推动在线和灵活学习，UGC 在 2022-2024 年的改革允许认证大学开设全在线学位，扩大了可服务资质基础。印度科技就业繁荣——GCC 在
              Bengaluru、Hyderabad 和 Pune 快速增长——持续支撑 AI、数据科学和工程管理项目需求。印度的人口红利（庞大且抱负强的劳动年龄人口）提供内生增长。

              约束包括：（1）2020-2022 年激增后的疫情后需求正常化；（2）雇主对在线资质的怀疑，尤其是顶级岗位；（3）Coursera、SWAYAM NPTEL 等免费 / 低价平台压低 upGrad
              的溢价定价；（4）围绕就业结果承诺的高消费者投诉率带来品牌风险；（5）数字鸿沟限制 Tier 3 / 农村市场扩张。

              AI 采用是一股明显的双向力量：它创造新的技能提升需求（AI/ML 课程），同时也可能把课程内容交付商品化，降低切换成本，让更小的竞争者以更低成本交付相近质量。upGrad 的企业 B2B 部门 FY25 AI
              技能提升需求同比翻倍，说明短期有顺风；但长期差异化能撑多久仍不确定。
