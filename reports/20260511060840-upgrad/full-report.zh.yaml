      - number: '4.5'
        title: 收入质量与财务结论
        blocks:
          - type: paragraph
            body: >-
              收入质量喜忧参半。正面信号包括：（1）高递延收入余额说明需求强、预收现金能力强；（2）企业板块增长更快且利润率更好；（3）首次 EBITDA 转正证明经营杠杆已经出现。担忧包括：（1）B2C 收入约 5%
              增长低于市场增速（约 23% CAGR），说明可能存在份额流失或主动收缩项目组合；（2）就业保证相关或有负债，在可得财务资料中披露不清；（3）NBFC 贷款合作在违约率上升时会带来共同信用风险。


              财务尽调的关键问题是：（a）B2C 与 B2B 分拆后的项目级毛利率是多少？（b）EMI/NBFC 违约率是多少，upGrad 面临哪些 clawback？（c）FY25 净亏损中有多少来自
              KnowledgeHut 和 Impartus 收购商誉摊销？（d）FY26 收入和 EBITDA 指引是多少？（e）截至 2026 年 3 月，资产负债表上有多少现金？
