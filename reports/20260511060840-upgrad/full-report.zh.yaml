  - number: 5
    title: 产品与技术
    sections:
      - number: '5.1'
        title: 用客户流程定义产品
        blocks:
          - type: paragraph
            body: >-
              upGrad 的核心产品，是面向在职专业人士的端到端职业结果平台。在 B2C 板块，客户流程是：（1）通过数字广告或自然搜索发现；（2）在顾问协助下完成项目选择电话；（3）申请并通过 NBFC /
              自费报名；（4）通过直播班课（每周 2-3 次）、录播模块、作业和同伴协作完成项目交付；（5）由行业从业者提供导师辅导；（6）通过职业门户和招聘方访问获得就业支持；（7）由大学合作方发放证书或学位。


              在 B2B 企业板块，客户流程是：（1）RFP 或企业销售周期；（2）与 L&D 团队定制项目设计；（3）LMS
              集成或托管式报名；（4）向员工批次交付班课；（5）完课跟踪和分析仪表盘；（6）认证和技能验证报告。B2B 平台可为大型企业客户白标化。
            claimRefs:
              - CE001
              - CE002
              - CE003
