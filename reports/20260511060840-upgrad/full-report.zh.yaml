      - number: '6.4'
        title: 留存、满意度与班课耐久性
        blocks:
          - type: paragraph
            body: >-
              B2C 留存与 SaaS 结构不同：学习者不会续订订阅。关键留存指标是项目完课率（upGrad 高端项目估计为 65-75%，高于 MOOC 行业平均 40-50%，但低于直播班课模式预期的
              85-90%）。SSM 模式被认为推动完课率高于行业平均。


              B2B 企业净收入留存率（Net Revenue Retention）未公开披露。不过，upGrad 拥有 600+ 客户群，并交付 3M+ 小时学习，说明留存合理。Infosys、Amazon
              等已命名客户合同按年运行，续约取决于学习者满意度分数和业务结果验证。


              消费者满意度喜忧参半：NPS 分数未公开披露。Voxya、Quora
              等消费者投诉论坛显示，投诉量偏高，主要集中在退款处理速度、就业保证落空和客服响应。相较正面评价，这些投诉数量不成比例，但构成品牌净推荐值（Net Promoter Score）的长尾风险。
            claimRefs:
              - CU010
              - CU011
              - CU012
