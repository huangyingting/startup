companyProfile:
  summary: upGrad is India's largest professional online education platform, founded in 2015 by Ronnie Screwvala, Mayank Kumar,
    and Phalgun Kompalli. It delivers PG programs, online degrees, executive education, and enterprise L&D through a live-cohort
    model partnered with LJMU, Deakin University, IIT Madras, and MICA. upGrad has 3M+ cumulative learners, 600+ enterprise
    clients, and reached EBITDA positivity in FY25 after a multi-year profitability drive—differentiating it sharply from
    Byju's governance and financial collapse.
  foundedDate: '2015-01-01'
  founders:
  - name: Ronnie Screwvala
    role: Co-Founder and Chairman
    background: Media entrepreneur (UTV Group founder); primary governance, strategy, and fundraising figure; holds ~45% equity.
    claimRefs:
    - CO005
  - name: Mayank Kumar
    role: Co-Founder and MD (exited Oct 2024)
    background: Academic operations and platform scaling leader; resigned October 2024 creating execution risk.
    claimRefs:
    - CO009
  - name: Phalgun Kompalli
    role: Co-Founder and CPO
    background: Product and technology leader; remains active post-Mayank Kumar exit.
    claimRefs:
    - CO005
  foundingLocation: Mumbai, Maharashtra, India
  headquarters: Mumbai, Maharashtra, India
  productSummary: upGrad delivers PG Certificates, online degrees (LJMU, Deakin, IIT Madras, MICA), executive education, short
    courses, and enterprise L&D. The platform uses a live-cohort model with Zoom-delivered sessions, a proprietary LMS, the
    Student Success Manager (SSM) model for completion improvement, and a placement AI matching learners to 2,500+ hiring
    partners.
  customerFocus: Urban Indian working professionals (25-35, IT/tech), enterprises/GCCs for employee upskilling, and international
    learners via KnowledgeHut.
  businessModel: B2C program fees (NBFC-financed), B2B enterprise contracts, and international bootcamp revenue (KnowledgeHut).
  stage: late-stage private
  fundingStatus: Raised approximately $782M total equity; latest $60M from Temasek at $2.25B post-money valuation (October
    2024).
