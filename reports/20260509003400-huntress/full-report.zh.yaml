      - number: '5.5'
        title: ThreatOps SOC——人工增强的安全运营
        blocks:
          - type: paragraph
            body: >
              Huntress ThreatOps 团队是公司的核心竞争差异。SOC 配备前 NSA Tailored Access Operations（TAO）网络作战人员和顶尖安全研究员，24/7
              运转；分析师分布在美国、英国和澳大利亚，形成跟随太阳的覆盖。2024 年，SOC 总人数超过 100 名威胁专家，但 Huntress 未公布精确分析师数量。Huntress 披露的 2024
              年运营指标包括：发送 >78,000 份已确认高危 / 严重终端事件报告；>8,000 份高危 / 严重身份事件报告；终端威胁平均响应时间约 8 分钟，身份威胁约 3 分钟；误报率 <1%；客户满意度
              98.8%。SOC 采用 tier-1/tier-2/tier-3 升级模型：tier-1 分析师分诊自动告警，tier-2 确认事件并起草修复报告，tier-3
              做深度威胁狩猎。每个经验证事件都会触发一份定制事件报告，通过 MSP 门户或集成的 PSA 工单系统交付可执行修复步骤。正是人工 SOC 层，把 Huntress 与依赖客户自助复核告警的纯自动化 EDR
              厂商区分开。Huntress 也通过其开源 GitHub（huntresslabs）参与社区安全研究，包括 RogueApps OAuth 威胁目录，以及 threat-intel 仓库中来自博客研究的 YARA
              签名和 IOC。年度社区 CTF（Capture the Flag）活动进一步展示研究能力，也吸引检测工程人才。
