  - id: FR001
    title: 风险热力图——可能性 vs. 影响
    type: matrix
    layout: standard
    summary: >
      风险热力图按可能性（低 / 中 / 高）和影响（低 / 中 / 高 / 关键）绘制 Huntress 的关键风险类别。右上象限（高可能性、关键影响）包含 SOC
      流失和渠道集中度。监管与平台安全风险影响高，但概率较低。竞争替代处于中等可能性、高影响。
