companyProfile:
  summary: >
    Huntress 是一家网络安全公司，专门通过托管服务提供商（MSP）渠道，为中小企业（SMB）提供托管检测与响应（MDR）服务。公司 2015 年由 Kyle Hanslovan（CEO，前 NSA）和 Chris
    Bisnett（CTO，前 NSA）创立，已经做出面向 SMB 的头部安全运营平台，把自动化威胁狩猎和 24/7 人工运营的 ThreatOps SOC 结合在一起。2024 年 6 月 Series D 后估值超过
    $1.5B，Huntress 已成为该品类的定义者：130,000+ SMB 无力负担企业级安全，却面对同样企业级的威胁。
