      - number: '5.7'
        title: 技术差异、缺口与技术风险
        blocks:
          - type: paragraph
            body: >
              Huntress 的关键技术差异包括：（1）从第一天起就专为 MSP 多租户构建，不同于为渠道改造的企业 EDR 平台；（2）非内核 Agent 架构，避开 2024 年 7 月 CrowdStrike
              Falcon 宕机暴露出的那类终端稳定性风险；（3）以持久化立足点为先的检测理念，能捕捉传统 AV 漏掉的威胁；（4）低于 $5/endpoint/month 的定价，使 SMB 能大规模部署；（5）规模化人工
              SOC，在不要求客户具备 SIEM 专业能力的情况下，把误报率压到 <1%。不过，必须记录重要缺口和反向信号。2024 年 5 月加入的 macOS 支持，不能管理或配置内置 AV
              工具（XProtect、Defender for Mac），相对 Windows 限制了预防能力。Linux 支持仍较基础，功能对齐未完成；截至 2026 年 5 月，Linux Agent 的 SIEM
              syslog 摄取仍不可用。没有移动端（iOS/Android）覆盖。Huntress 管理层承认 SIEM 产品相对最终目标能力仍在早期开发阶段。G2 和 Gartner Peer Insights
              用户评论提到报告定制弱、告警通知延迟、失败登录事件可见性有限，以及门户 UI/UX 笨重。SOC 依赖人工分析师——这一模式带来质量，但随着受监控终端规模增长，可能面临毛利压力和扩展约束；Huntress
              管理层也承认，长期需要 AI 增强。SIEM 和 ITDR 的数据驻留承诺未公开记录，对有严格数据治理要求的医疗和公共部门客户是一个缺口。来自下沉企业市场的厂商（CrowdStrike Falcon
              Go、SentinelOne）和 MSP 原生同业（Blackpoint Cyber）的竞争，可能在 2–3 年内压缩差异化窗口。
