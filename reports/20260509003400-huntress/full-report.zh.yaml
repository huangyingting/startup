      - number: '2.3'
        title: 买家、用户与付款方分层
        blocks:
          - type: paragraph
            body: |
              Huntress 的 GTM 通过两层渠道运行：（1）MSP 伙伴作为直接买家和付款方，按端点/身份采购
              Huntress 许可，再加价或打包进自己的服务费；（2）SMB 企业作为终端用户，通过 MSP 间接体验产品。
              这形成复合买家动态：MSP 的核心决策是是否在自己的安全栈中标准化采用 Huntress；SMB 的角色主要是
              终端消费者，其结果决定留存。

              按客户分层，Huntress 目标包括：
              - 医疗 SMB（14,000 家医疗客户）：诊所、门诊、专科医疗提供商——受监管、对泄露敏感，且常运行老旧系统。
              - 州和地方政府（SLED）：资金不足的 IT 部门，必须满足合规要求，同时遭遇民族国家行为体增加的勒索软件攻击。
              - 金融服务 SMB：社区银行、信用社、独立顾问——受州和联邦金融监管以及网络保险要求约束。
              - 普通 SMB（客户基盘多数）：专业服务、零售、酒店、制造业，通常 10–250 名员工，IT 支持完全依赖 MSP。

              预算所有权在多数伙伴主导交易中属于 MSP 的 vCISO 或客户经理。直销 SMB 交易中，决策者通常是 IT 负责人、
              CEO 或 CFO。采用触发因素包括：（1）同行企业发生勒索软件险情或实际泄露，（2）网络保险续保要求提供
              端点检测证据，（3）MSP 在续约时做上售，（4）监管合规审计要求。
