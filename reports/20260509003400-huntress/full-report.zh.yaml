      - number: '3.3'
        title: 企业与平台竞争对手画像
        blocks:
          - type: paragraph
            body: |
              CROWDSTRIKE（企业既有龙头）：Nasdaq 上市（CRWD），截至 2024 年中市值约 $70B+。Falcon 平台覆盖 EDR、
              XDR、MDR（Falcon Complete）、Next-Gen SIEM、身份保护和云安全。FY2024 ARR 超过 $3.7B。企业聚焦：
              Falcon Complete MDR 面向大企业部署定价（通常 300+ 端点起，$8–$15+/端点/月区间）。2024 年 7 月
              CrowdStrike 宕机事件——一次有缺陷的传感器更新造成全球 IT 中断，影响数百万 Windows 系统——是重大声誉事件。
              对 MSP 来说，这次事件强化了对单一企业厂商内核级代理过度依赖的担忧。Huntress 的轻代理、内核安全路径直接针对
              这一风险做竞争定位。CrowdStrike 确实通过经销商触达 SMB，但并未针对 Huntress 典型 MSP 伙伴服务的
              50 人以下 SMB 做优化。

              SENTINELONE（AI 优先 XDR）：NYSE 上市（S），截至 2024 年末市值约 $15B+。Singularity 平台包括
              AI 驱动 EDR、自主响应（专利 1-click rollback）、Purple AI 自然语言查询和 Vigilance MDR 服务。
              ARR 约 $720M+（FY2025）。其理念比 Huntress 的人工主导 SOC 更偏自动化优先。公司正通过 MSP 扩大渠道，
              触达 SMB。1-click rollback 是相对手工修复的强技术差异化。定价处于中档（托管层级约 $6–$10/端点/月），
              对预算敏感的 MSP 来说能与 Huntress 竞争。SentinelOne 更宽的企业聚焦和平台复杂度，可能限制其进入
              Huntress 擅长的微型 SMB（<25 名员工）。

              MALWAREBYTES / THREATDOWN（AV 层级现状竞争）：Malwarebytes 服务小企业（Teams 产品，20+ 端点），
              并将 B2B 市场品牌重塑为 ThreatDown。ThreatDown 套餐包括 Core（下一代 AV）、Advanced EDR 和可选附加项。
              不包含全栈 24/7 SOC 或人工主导威胁狩猎。价格点：入门级约 $4–$6/设备/年（月度显著低于 Huntress）。
              Malwarebytes 主要作为现状既有厂商竞争；其客户通常在经历险情或遇到网络保险要求后升级到 Huntress。
              它不是功能可比的 MDR 替代品，而是低端价格型替代方案。
