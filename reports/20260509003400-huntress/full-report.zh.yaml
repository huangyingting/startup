  - number: 6
    title: 客户情况
    sections:
      - number: '6.1'
        title: 客户画像与理想客户特征
        blocks:
          - type: paragraph
            body: >
              Huntress 的终端客户是中小企业（SMB），通常有 5 到 500 名员工——这些组织负担不起专职内部安全运营团队，却面对与大型企业相同的勒索软件、商务邮件攻击（BEC）和身份类威胁。典型由
              Huntress 防护的客户包括牙科诊所、律师事务所、CPA 事务所、区域会计事务所、K-12 学区、市政政府、社区健康诊所和独立保险代理机构。


              面向这些客户的销售话术很直接：「你现有的杀毒软件挡不住现代勒索软件——我们会在攻击者加密你的文件前发现并驱逐他，而且你的 MSP 不需要为此雇一名安全分析师。」这能打动 SMB，因为勒索团伙特别瞄准缺少检测能力的
              SMB，而一次入侵的成本远高于 Huntress 的费用。


              获客完全是间接的：SMB 不直接向 Huntress 购买。当其 MSP（托管服务提供商）把 Huntress Agent 部署为托管安全栈的一部分时，SMB 才获得 Huntress
              覆盖。这形成了双边客户结构：MSP 是付费购买客户（B2B）；SMB 是受保护的受益方。尽调中真正相关的客户流失单位是 MSP 合作伙伴，而不是单个 SMB 企业。


              三股力量让 SMB 安全采购触发点在结构上变强：（1）网络保险承保方越来越多把终端检测和 MFA 作为承保条件；（2）医疗、法律、金融服务类 SMB 面临监管合规要求（HIPAA、FTC Safeguards
              Rule、州隐私法）；（3）针对 SMB 的勒索频率上升，Huntress 自身 2025 Cyber Threat Report 记录了 RAT、RMM
              滥用和演进中的勒索软件扩散。这些力量是长期顺风，结构性扩大可触达买方池，并降低 Huntress 核心产品的价格敏感度。
            claimRefs:
              - CU001
              - CU002
              - CU003
              - CU004
      - number: '6.2'
        title: 客户规模、覆盖范围与采用轨迹
        blocks:
          - type: paragraph
            body: |
              截至 2024 年 9 月，Huntress 公开披露了以下规模数据（由 ForgePoint Capital 和公司新闻稿等多个独立来源确认）：
              - 120,000+ 家 SMB 企业受保护
              - 3M+ 个终端受管理
              - 1M+ 个身份受保护（ITDR 覆盖的 M365/Google Workspace 身份）
              - 4,000+ 家 MSP 渠道合作伙伴

              到 2025 年初，MSSP Alert 的更新指标确认规模继续提升：
              - 4M+ 个终端（较 2024 年 9 月增加 33%）
              - 2M+ 个身份（较 2024 年 9 月增加 100%）
              - 7,000+ 家 MSP 合作伙伴（较 2024 年 9 月增加 75%）

              这些指标反映两条复合增长回路：（1）现有 MSP 合作伙伴新增 SMB 客户，或在现有客户中扩大覆盖（终端或身份扩张）；（2）渠道中新增净新 MSP 合作伙伴。

              医疗是披露最突出的垂直行业：Huntress 自家博客确认保护 14,000+ 家医疗组织，约占全部受保护企业的 11.7%。这一垂直集中度反映了由 HIPAA 合规要求和医疗勒索攻击严重性驱动的有意商业化投入。

              隐含平均值（均为估计）：
              - 每家 MSP 合作伙伴平均受保护企业数：约 17 家（120,000 家企业 / 7,000 家合作伙伴）
              - 每家受保护企业平均终端数：约 25–33 个（4M 个终端 / 120,000 家企业）
              - 每家受保护企业平均身份数：约 17 个（2M 个身份 / 120,000 家企业）

              这些平均值反映了 Huntress 的 SMB 集中度：一家 30 人牙科诊所可能有 30 个终端和 35 个 M365 身份，与这些隐含平均值相符，也验证了客户画像。
