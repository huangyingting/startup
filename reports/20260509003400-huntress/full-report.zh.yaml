      - number: '3.2'
        title: 直接与最近似同行画像
        blocks:
          - type: paragraph
            body: |
              BLACKPOINT CYBER（最接近的直接竞争对手）：成立于 2014 年，总部位于马里兰州 Annapolis（距离
              Huntress 位于 MD 州 Columbia 的总部 15 英里）。公司做 MSP 聚焦 MDR，CompassOne 平台统一 EDR、
              身份保护和 SOC。2023 年 5 月完成由 Francisco Partners 领投的 $190M Series C，当时是 MSP 聚焦
              网络安全公司中规模最大的单轮融资。渠道模式几乎与 Huntress 相同：按端点许可，通过 MSP 伙伴销售，
              界面对白标友好。Blackpoint 声称传统 EDR 会漏掉 72% 的攻击，并以告警前实时 SOC 动作为差异化。
              CompassOne 更名（2024–2025 年）代表公司从纯 MDR 向更广安全平台扩张。融资规模（$190M）低于
              Huntress（$310M），且公司未公开披露可与 Huntress 的 $100M ARR 和 120,000+ 已防护企业指标对比的
              ARR 或客户数。PeerSpot 用户评论明确点名 Blackpoint 是替代方案，其中一名用户建议“像 Blackpoint 一样，
              从 EDR 演进到 MDR”。

              ARCTIC WOLF（中端市场 MDR）：成立于 2012 年，总部位于明尼苏达州 Eden Prairie，并在德州 San Antonio
              运营。公司以服务为先，提供 Concierge Security Team 模式和 Aurora Superintelligence Platform。
              规模：全球 10,000+ 客户、1,000+ 安全工程师、200+ 平台集成。2021 年完成 $401M Series F，
              估值 $4.3B；曾多次探索 IPO（2022 年、2024 年延后）。Aurora Agentic SOC（2025 年）用 AI 自动化威胁调查，
              但决策环节仍保留人类。每天完成 202+ 次 Security Posture in-Depth Reviews（SPiDRs）。公司声称可将
              攻击频率降低 90%，影响降低 90%。Arctic Wolf 的目标客户更多是中端市场和企业，而不是 SMB；其价格通常高于
              Huntress，对 MSP 渠道的强调也没那么强。对 Huntress 的 SMB 基盘而言，它更像品类验证者和潜在未来 M&A 竞争者，
              而不是日常主要竞争威胁。
