      - number: '4.2'
        title: 收入牵引与增长画像
        blocks:
          - type: paragraph
            body: |
              Huntress 曾在三个时点公开披露 ARR 里程碑：
              - 2023 年某个时点为 $70M ARR（由增长轨迹推断）
              - 2024 年 9 月为 $100M ARR（ForgePoint Capital 和公司声明确认）
              - 连续三年 ARR 同比增长 70%+

              在 $100M ARR 和 70% 同比增长下，Huntress 从 12 个月前约 $59M ARR 增长到 $100M。Rule of 40 分数
              （增长率 + 估计 FCF 利润率）表现有利，前提是 70% 增长率被当前烧钱下的负自由现金流部分抵消。
              一个未经验证的第三方估计（LATKA）显示 2025 年 ARR 约 $120M，意味着同比增速降至约 20%——这会是轨迹上的
              重大变化，需要尽调审查，但该估计未经验证，也与公司披露的 70%+ 趋势不一致。

              公司已防护 120,000+ 家企业（2024 年 9 月）、4M+ 端点（2025 年初）和 7,000+ MSP 伙伴。按每端点
              $3.50/月计算，平均端点收入隐含年度端点收入约 $168M/年（4M 端点 × $3.50 × 12）——高于披露的 $100M ARR，
              说明端点数可能偏保守、价格差异很大，或并非所有端点都按平均费率计费。这个缺口是尽调事项。

              Deloitte Technology Fast 500（2025）：Huntress 排名第 149，证明其在 2021–2024 年期间，相对技术同行
              持续保持高收入增长。
