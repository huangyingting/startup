      - number: '2.2'
        title: 市场规模与增长轨迹
        blocks:
          - type: paragraph
            body: |
              SMB 网络安全市场的规模估算随分析师方法不同而差异很大。Growth Market Reports 估计，2024 年全球
              SMB 网络安全市场为 $39.8B，并以 13.2% CAGR 增长，到 2033 年达到 $110.2B。Techaisle 预计
              2024 年全球 SMB IT 安全支出为 $90B，同比增长 9.4%。Analysys Mason 更保守，预计 SMB 网络安全
              子市场到 2028 年为 $52B。这些估算分歧来自口径不同：“SMB IT 安全支出”（Techaisle）纳入更宽泛的
              IT 预算，而 Growth Market Reports 和 Analysys Mason 的 “SMB 网络安全市场”估算聚焦专门安全产品
              与服务。

              MDR 子市场是 Huntress 最直接的类别。Mordor Intelligence 估计其 2025 年规模为 $4.19B，
              以 21.95% CAGR 增长，到 2030 年达到 $11.3B。这个类别窄于总体 SMB 安全市场，但捕捉了
              Huntress 能收取的人工作业托管服务溢价。Techaisle 数据显示，托管检测与响应是 SMB 和中端市场企业
              中增长最快的安全类别，预计采用率提升 112%——高于所有其他安全类别。

              Huntress 当前 $100M ARR 意味着其在 MDR 子市场（2025 年估计 $4.2B）中的份额约为 2.4–2.5%，
              在广义 SMB 网络安全 TAM（2024 年估计 $39.8B）中的份额低于 0.3%。两个数字都说明上行空间很大。
              公司 $1.5B 估值约等于 15x ARR，意味着投资人预期未来 5 年 Huntress 会在 MDR 和 SMB 安全板块
              大幅提升市场份额。
