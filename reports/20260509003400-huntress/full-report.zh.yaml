    data:
      items:
        - label: 悲观情景（2027-2028）
          low: 1200
          mid: 1350
          high: 1500
          unit: USD M
          detail: $150M ARR × 8-10x；增长放缓、毛利率承压、Microsoft 竞争
          claimRefs:
            - CV019
        - label: 基准情景（2026-2027）
          low: 2500
          mid: 3000
          high: 3500
          unit: USD M
          detail: $200M ARR × 12-17x；MDR 稳定增长、平台适度扩张、正常市场环境
          claimRefs:
            - CV018
        - label: 乐观情景（2027）
          low: 4000
          mid: 5000
          high: 6000
          unit: USD M
          detail: $250M+ ARR × 16-24x；NRR+GM 披露强、SIEM 规模化、有利 SaaS 倍数
          claimRefs:
            - CV017
        - label: M&A 退出（战略买家）
          low: 1800
          mid: 2750
          high: 3750
          unit: USD M
          detail: $150-250M ARR × 12-15x 战略溢价；PANW、Cisco、Broadcom 可能收购
          claimRefs:
            - CV020
    approximationNotes: 所有区间都是研究团队基于 2024 年公开市场可比倍数构建的分析结果。没有经审计财务数据或确认的 NRR。区间反映概率加权的不确定性， 不是置信区间。
    claimRefs:
      - CV017
      - CV018
      - CV019
      - CV020
  - id: FV004
    title: 投资 KPI
    type: kpi
    layout: standard
    summary: |
      面向投委会使用的 Huntress 七项投资维度评分：市场、验证、护城河、经济性、风险、估值和证据质量。
      突出阻止信心从 WATCH 升级到 BUY 的证据缺口。
    data:
      items:
        - label: 市场机会
          value: High
          detail: 33M+ 家 SMB，覆盖率 <15%；MDR 市场以 25%+ CAGR 增长；全球渗透不足
          tone: positive
          claimRefs:
            - CV001
        - label: 牵引力验证
          value: High
          detail: $100M ARR，同比增长 70%+（已确认 3 年），7,000+ 家 MSP 合作伙伴，120K+ 家企业
          tone: positive
          claimRefs:
            - CV002
        - label: 竞争护城河
          value: Medium-High
          detail: MSP 渠道飞轮耐久；Microsoft 捆绑是真风险；ITDR/SIEM 拉开差异
          tone: positive
          claimRefs:
            - CV003
        - label: 单位经济
          value: Unknown
          detail: NRR 未披露；毛利率未披露（估计 65-72%）；烧钱比率估计约 0.6（高效）
          tone: warning
          claimRefs:
            - CV013
        - label: 风险画像
          value: Medium-High
          detail: NRR 不透明、毛利率受压风险、IPO 延迟、Microsoft 竞争、单一渠道依赖
          tone: adverse
          claimRefs:
            - CV005
        - label: 估值立场
          value: Fair (15x ARR)
          detail: 高于 MDR 可比公司（6.5-9x），低于软件可比公司（20-22x）；倍数自 2024 年 6 月以来未更新
          tone: neutral
          claimRefs:
            - CV007
        - label: 证据质量
          value: Medium (private company)
          detail: 没有审计财务、没有 S-1、没有 NRR；2 个独立数据点确认 $100M ARR
          tone: warning
          claimRefs:
            - CV009
    approximationNotes: KPI 评级是研究团队的定性评估。「证据质量」衡量公开数据的深度和独立性，不评价公司实际表现。
    claimRefs:
      - CV001
      - CV002
      - CV007
      - CV009
