      - number: '1.3'
        title: 融资历史与资本结构
        blocks:
          - type: paragraph
            body: |
              Huntress 多轮合计融资约 $308–$310M。公司早期自力更生，之后在投资人质疑
              SMB 市场的背景下争取机构资本。到 Series B（约 2021 年完成）时，Huntress 已说服机构支持者
              接受 SMB 论点。Series C 让公司从单一产品公司转向多产品平台。2024 年 6 月的 $150M
              Series D 由 Kleiner Perkins 和 Meritech Capital 领投，现有投资方 Sapphire Ventures 参与，
              将公司此前估值翻了一倍以上，推至 $1.5B 以上，标志着独角兽身份。早期投资方
              ForgePoint Capital 和 JMI Equity 仍在股权表上。按照 CEO Hanslovan 的说法，Series D
              计划成为 IPO 前最后一轮私募融资；约一半资金用于 R&D 和 M&A，其余用于 GTM 扩张。
              公司还收购了 Curricula（安全意识培训）和 Level Effect（威胁检测），补充能力版图。
              总融资有时被写作 $268M（完整轮次入账前口径），有时按来源方法写作 $308M+；
              多个独立来源之间，Series D 后 $308–$310M 的数字最一致。
