      - number: '8.6'
        title: 退出准备度与最终尽调问题
        blocks:
          - type: paragraph
            body: |
              IPO 准备度：CEO 在 2024 年底公开表述的目标是「2025 年底至 2026 年中」。截至 2026 年 5 月，
              SEC 尚未收到 S-1。时间表至少后移 6-12 个月。可能原因：① 2026 年初公开市场窗口不利；
              ② 组织准备（经审计财务、CFO 资历、董事会重组）未完成；③ ARR 增长降到支撑溢价估值所需水平以下。
              没有公开 S-1 意味着经审计财务、收入队列数据和 NRR 都不可得，投资人不确定性被推到最高。

              战略 M&A 准备度：Huntress 对多类战略买家都是有吸引力的补强型收购标的。MSP 渠道（7,000+ 家合作伙伴、
              120,000+ 家 SMB）是很难自然复制的分销资产。潜在买家：Palo Alto Networks（扩大 MSP/SMB 触达；
              补足 Prisma 和 Cortex）；Cisco（填补 SMB 细分中的 Talos MDR 缺口）；Broadcom（撬动 Symantec MSP 渠道）；
              Qualys（扩展托管服务产品）。若以 $150-200M ARR 上的 12-15x ARR 完成 M&A，交易价值为 $1.8-3.0B——
              相对基准 IPO（$3B）仍有竞争力。

              最终尽调问题（按优先级）：
              1. NRR 和 GRR：最重要的单项披露；按当前估值投资前必须拿到。目标：经验证 NRR 高于 110%，才能支撑当前倍数。
              2. 经审计毛利率：需要访问 P&L。目标：确认综合毛利率高于 70%，才能按软件公司估值处理。
              3. 最新 ARR（2024 年 9 月后）：最后一次确认 ARR 是 2024 年 9 月（$100M）。两年增长未确认，造成重大不确定性。
              目标：管理层披露 2026 年 Q1 ARR 和增长率。
              4. IPO 时间表与 S-1 状态：由 CEO/CFO 确认时间表和 S-1 起草里程碑。若延迟超过 2027 年 Q2，需要评估过桥融资。
              5. MSP 合作伙伴集中度：前 20 大 MSP 合作伙伴收入占比与流失历史。目标：任何单一合作伙伴不超过 ARR 的 5%。
