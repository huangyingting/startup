          - type: callout
            title: G2
            body: >
              Huntress 连续 9 个季度保持 G2 EDR #1 排名（由 2024 年夏季 G2 报告和 Huntress 新闻稿确认），在与 CrowdStrike、SentinelOne 和 Microsoft
              Defender 竞争的产品中十分突出。G2 排名由经验证终端用户评论驱动，是可靠的独立客户满意度信号。这一排名尤其有意义，因为 G2 的 SMB 评论者群体与 Huntress 的目标客户基础高度匹配。
