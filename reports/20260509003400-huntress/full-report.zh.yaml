      - number: '5.2'
        title: 核心 EDR——持久化立足点、Agent 架构与 ThreatOps
        blocks:
          - type: paragraph
            body: >
              Huntress Managed EDR 围绕「持久化立足点」构建——攻击者在拿到初始访问后，用来在 Windows 和 macOS 系统中保持隐蔽存在的注册表键、计划任务、服务条目、启动项以及
              LOLBin（living-off-the-land binary）调用。与预防型 AV 不同，Huntress 的思路从攻击者可能已经在内网这一假设出发；Agent 安装后立即深度盘点持久化机制，之后持续巡检。

              核心 Agent（HuntressAgent.exe）用 Go 编写，无外部依赖，通过 TLS 1.2/1.3 与 AWS 上的 Huntress 云基础设施通信；正常情况下约消耗 1% CPU 和 20MB
              RAM（巡检时 CPU 可短暂升至 5–10%）。第二个 Agent HuntressRio（Rio EDR）负责行为遥测和进程监控，通常使用约 400MB RAM，并会随负载自适应。平台把 Windows
              10/11 和 Server 2016+ 作为一等支持对象；macOS 支持覆盖 Ventura 13 到 Tahoe 26（macOS 16），2024 年 5 月加入主动修复能力。Linux 支持覆盖
              Ubuntu 22.04+、Debian 11+、RHEL 8.6+、CentOS Stream 9/10、SUSE 12/15 和 Fedora 41/42，要求 kernel
              5.14.50+（64-bit）；相对 Windows，这块覆盖仍有限——面向 Linux 的 SIEM syslog 摄取仍标注为「即将推出」，与 Windows 的功能对齐也未完成。Agent 还包含
              Ransomware Canaries（触发即时告警的轻量诱饵文件）、External Recon（开放端口扫描）和 Managed Antivirus（Windows 上集中管理 Microsoft
              Defender）。在 macOS 上，Huntress 可读取 XProtect 和 Defender 遥测，但不能变更配置或管理排除项——这是相对 Windows 能力的明确限制。24/7 SOC 内的
              ThreatOps 分析师会复核全部自动告警；公司称，在 3M+ 受监控终端中，误报率低于 1%。
            claimRefs:
