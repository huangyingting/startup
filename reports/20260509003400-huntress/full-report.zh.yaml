      - number: '6.3'
        title: 具名客户证据与参考质量
        blocks:
          - type: paragraph
            body: >
              由于采用间接 MSP 渠道模式，Huntress 的客户证据呈现为几种形态。具名终端客户案例有限，因为 SMB 通常把 Huntress 作为其 MSP 安全栈的一部分来使用，而不是与 Huntress
              直接建立关系。最可验证的客户证据来自三类：


              （1）行业层面计数：Huntress 明确披露保护 14,000+ 家医疗组织（博客，2025）和 120,000+ 家企业总数（ForgePoint Capital，2024 年 9
              月）。这些计数是主要采用证据，而不是具名标识。


              （2）MSP 合作伙伴证言：Huntress 网站和合作伙伴社区页面展示了来自 IT 服务提供商的具名 MSP 证言，这些 MSP 已在自身客户群中部署 Huntress。证言记录了生产部署、威胁检测结果和
              SOC 响应价值。G2 和 Spiceworks 上的多位 MSP 运营者也以具名评论描述生产部署捕捉到活跃威胁。


              （3）第三方评论文档：G2 评论者（经验证用户账号）记录了具体威胁检测事件——包括抓到无文件攻击和勒索软件前置的 LOLBAS 威胁——提供了结果层面的证据，而不只是满意度评分。Gartner Peer
              Insights 同样记录了 SMB 环境中的生产部署结果。


              （4）行业事件证据：Huntress 定期发布威胁报告和事件文档（例如 2025 Cyber Threat
              Report），描述其平台检测并修复的真实攻击。即便客户名称被匿名，这些事件叙事也构成隐含的具名部署证据。


              关键限制：Huntress 不发布传统企业案例研究，即包含具名企业标识、ARR 贡献和可量化 ROI 结果的那类材料。客户证据更多是体量型（120K+
              家企业）和定性型（评论平台），而不是企业安全厂商常见的具名账号参考格式。考虑到 SMB 间接模式，这可以理解，但会限制尽调中的参考质量。
