      - number: '7.5'
        title: 竞争与执行风险
        blocks:
          - type: paragraph
            body: >
              网络安全终端市场是企业软件中竞争最激烈的细分之一。CrowdStrike Falcon Go 和 Falcon Complete 以 SMB 价格提供企业级 EDR，并拥有品牌认知优势。SentinelOne
              Singularity 平台提供可比的 AI 驱动检测，在规模采购时单终端成本可能更低。两家公司都在投入更适合 MSP 的包装和定价，以在 SMB 渠道直接竞争 Huntress。


              Sophos 在 SMB 市场拥有 35+ 年装机基础，并以与 Huntress 类似的价格点运营自有 Sophos MDR 服务，也有既有 MSP 渠道关系。Blackpoint Cyber、Field
              Effect、Adlumin 等新进入者专为 MSP/SMB MDR 市场打造，直接争夺 Huntress 的核心 MSP 合作伙伴关系。


              Huntress 的多产品扩张包括 SIEM、ISPM 和 ESPM，这些产品在 2024-2026 年上线或进入 GA，带来执行风险。每个新产品都需要专门的商业化、客户成功和支持资源。SIEM
              是技术复杂且高度竞争的品类，由 Splunk（Cisco）、Microsoft Sentinel 和 IBM QRadar 主导。Huntress 的 Smart Filtering SIEM 思路瞄准 SMB
              无力管理企业 SIEM 复杂性的痛点，但早期产品存在采用风险。关键人物风险集中在 CEO Kyle Hanslovan 身上，他是公司的公众面孔，主导威胁情报沟通，并推动 MSP 合作伙伴战略。如果
              Hanslovan 或联合创始人 Bisnett、Ferrell 离开，会给这家以政府背景运营者文化作为核心人才磁铁的公司带来显著领导力风险。
