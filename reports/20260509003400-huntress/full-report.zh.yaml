    title: 公司概览
    sections:
      - number: '1.1'
        title: 身份与商业模式
        blocks:
          - type: paragraph
            body: |
              Huntress 是一家未上市的托管安全平台，总部位于马里兰州 Columbia
              （最初在 MD 州 Ellicott City）。公司由前 National Security Agency（NSA）
              网络行动人员于 2015 年创立，切入了一个独特市场：把企业级网络安全交给
              “Fortune 5,000,000”——这个由中小企业构成、长期缺乏服务的巨大群体。
              按数量计算，SMB 占美国企业的 99%，却一直被最好的安全工具排除在价格门外。
              Huntress 采用订阅 SaaS 模式，主要通过 4,000+ 托管服务提供商（MSP）渠道分销，
              这些 MSP 再保护 120,000+ SMB 终端客户。公司平台整合托管端点检测与响应（EDR）、
              身份威胁检测与响应（ITDR）、新推出的安全信息和事件管理（SIEM）产品，以及
              通过收购 Curricula 获得的安全意识培训。每个产品层级背后都有 24/7 人工主导的
              Security Operations Center（SOC），由精英威胁猎手值守；Huntress 称之为
              “human-augmented security”。这一定位把 Huntress 放在 CrowdStrike 等纯产品厂商
              和全服务 MSSP 之间：用 SMB 能承受的价格交付托管结果。截至 2024 年 9 月，
              公司 ARR 已突破 $100M，并在 2024 年 6 月 Series D 后成为独角兽（估值超过 $1.5B）；
              这是目标 IPO 前的最后一轮私募融资。
