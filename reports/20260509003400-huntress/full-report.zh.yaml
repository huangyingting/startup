            title: NRR 和 GRR 未披露——验证投资逻辑的关键缺口
            body: >
              Huntress 未公开披露净留存率（NRR）或总留存率（GRR）——这两项是验证支撑 70%+ ARR 增长的扩张模型最关键指标。没有 NRR
              数据，投资人无法确认增长来自新合作伙伴获取（韧性较弱），还是同一合作伙伴扩张（韧性更强）。如果 NRR 低于 100%，则说明现有合作伙伴内部出现收缩，并会从根本上改变估值逻辑。
