      - number: '5.6'
        title: MSP 集成架构与平台基础设施
        blocks:
          - type: paragraph
            body: >
              Huntress 的架构从一开始就面向多租户 MSP 交付。统一合作伙伴门户为每个客户提供隔离，同时汇总展示全部受管组织的资产视图。Agent 部署与所有主要 RMM 平台集成：Kaseya
              VSA、NinjaRMM（NinjaOne）、Datto RMM 等都支持基于 PowerShell 的批量部署脚本，这些脚本维护在 huntresslabs/deployment-scripts GitHub
              仓库中。PSA 集成包括 ConnectWise Manage、Datto Autotask 和 HaloPSA——Huntress
              确认事件后，每个系统都会收到自动生成的工单，工单中嵌入事件状态和修复步骤。集成使用 OAuth2 或 API key 认证，通过组织映射把 Huntress 账号单元对齐到 PSA
              客户记录，确保告警精准路由。Huntress Agent 使用 TLS 1.2/1.3 进行云通信；不支持明文传输。云基础设施托管在 AWS；Huntress
              未公布具体云区域部署细节，对有数据驻留要求的客户构成尽调缺口。SIEM 日志摄取架构在源 Agent 层使用 Smart Filtering，降低上行带宽和存储成本。Huntress 平台免费开放给 MSP
              合作伙伴用于自身内部安全，在客户推出前降低部署风险，并鼓励伙伴熟悉平台。
