      - number: '4.5'
        title: 财务尽调阻碍与收入质量评估
        blocks:
          - type: paragraph
            body: |
              收入质量驱动因素（正向）：
              - 100% 经常性订阅收入，采用月度/年度条款，降低收入集中风险
              - MSP 渠道创造自然扩张机制：每个新 MSP 都会带来多个 SMB 客户
              - 净收入留存（NRR）未披露，但基于 MSP 增加客户和产品带来的按端点扩张，预计较高（>115%）
              - 年合同价值（ACV）未披露；按 MSP 伙伴客户基盘规模估计，每个 MSP 的 ACV 为 $10K–$100K

              收入质量风险：
              - 未披露 NRR、GRR 或客户流失率
              - 未按产品线披露 ACV
              - 端点到 ARR 的隐含数学缺口（见 SI002）需要尽调
              - LATKA 未验证的 2025 年 ARR 约 $120M 估计，如果准确，意味着增长可能从 70%+ 显著降至约 20%；必须与公司披露核对
              - 国际收入贡献未披露；国际扩张带来汇率和监管复杂度
              - SOC 人工可扩展性是关键毛利率风险：如果勒索软件事件量激增，SOC 加班成本可能暂时压缩利润率，且没有相应 ARR 增长

              关键尽调阻碍：
              - 没有公开可得的审计财务报表（私营公司）
              - 毛利率未披露；估计 65–72%，但未经验证
              - 烧钱率未披露；仅通过 burn ratio 代理估算
              - NRR/GRR 未披露
              - 客户层面的 cohort 数据（按 MSP 伙伴 vintage 划分的 ARR）不可得
            claimRefs:
              - CI020
              - CI021
              - CI022
              - CI023
