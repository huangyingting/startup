        - Huntress 落入 Rapid7 可比组（低于 3x 倍数）；$200M ARR 按 10x = $2B — 低于后期投资人 Series D 进入价
        - 做空 IPO；关注 Microsoft 市占率数据是否确认 MDR 价格压缩
      - - Microsoft MDR/Defender 在 MSP 渠道渗透率超过 30%
        - Defender 部署在 Huntress MSP 覆盖端点的 >30%
        - 端点直接流失风险；Huntress 要么降价，要么丢量；毛利率压力叠加
        - 按季度跟踪 ConnectWise、Kaseya 渠道数据中的 Defender 附加率
