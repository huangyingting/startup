      - number: '5.8'
        title: 附录
        blocks:
          - type: callout
            title: 非内核 Go Agent 避开 CrowdStrike 式稳定性风险
            body: >
              Huntress 的 HuntressAgent 用 Go 编写，无外部依赖，并运行在用户态（非内核）层。这一架构与 CrowdStrike Falcon 的内核级传感器形成直接对照；后者 2024 年 7
              月的故障更新导致全球 IT 中断，影响航空公司、银行和医院。非内核方案牺牲了一部分预防层深度，但消除了内核级 Agent 携带的那类使 OS 失稳的风险。2024 年 7 月之后，MSP
              越来越明确把这一点列为选型标准。
            calloutType: strength
            claimRefs:
              - CE003
          - type: callout
            title: SIEM 具备战略重要性，但已承认仍处早期开发
            body: >
              Huntress 管理层在 XChange 2025 公开承认，Managed SIEM 产品相对既定终局仍「在推进中」。SIEM 是 Huntress
              合规扩张战略（CMMC、HIPAA、PCI-DSS）的核心，也是更广泛平台交叉销售逻辑的核心——但行业数据显示，只有 10% 的 MSP 会把 SIEM 部署到超过 10% 的客户群。如果 SIEM
              开发速度放缓，或产品无法支撑 MSP 大规模部署，支撑 $1.5B+ 估值的平台扩张叙事可能受损。
            calloutType: risk
            claimRefs:
              - CE016
              - CE037
          - type: callout
            title: macOS 和 Linux 覆盖缺口让混合环境保护不完整
            body: >
              macOS AV 管理是只读的（不能配置 XProtect 或 Defender for Mac 设置），Linux 功能对齐也明显落后于 Windows。拥有大量 macOS 或 Linux
              资产的组织，无法只靠 Huntress 完成托管 AV 卫生。这是 Huntress 自身支持文档记录的缺口，不是传闻。CrowdStrike、SentinelOne 等竞争对手提供更深的 macOS/Linux
              功能集，可能影响服务异构客户环境的 MSP。
            calloutType: risk
            claimRefs:
              - CE007
              - CE008
          - type: callout
            title: RogueApps 开源项目证明威胁情报可信度
            body: >
              huntresslabs/rogueapps GitHub 仓库编目了真实入侵中观察到的 OAuth/OIDC 应用技战术，为防守方提供具体的检测与威慑资源。这是一项真正的社区贡献，验证了 ThreatOps
              团队的攻防深度，也建立从业者信任。该仓库还帮助 Huntress 在 M365 OAuth 威胁检测中形成 ITDR 先发定位，把研究转化为持久的产品差异。
