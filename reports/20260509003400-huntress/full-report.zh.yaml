        - MSP 合作伙伴集中度
        - 前 20 大 MSP 合作伙伴 ARR 占比未披露；没有流失率或续约率数据
        - 100% 依赖渠道让 MSP 集中度成为直接收入风险；头部合作伙伴流失 = 重大台阶式下滑
        - 在 NDA 下要求前 10 大合作伙伴集中度数据；在任何新投资中谈判审计权
      - - 6（中）
        - 国际收入与管线
        - 国际收入被列为 Series D 轮资金用途优先项，但 ARR 贡献未披露
        - 国际化增加地域风险（GDPR、汇率），也带来收入多元化；当前贡献可能 <10%
        - 要求按地域拆分 ARR，并提供各地区国际 MSP 合作伙伴数量
    notes: 优先级反映对估值决策的重要性。第 1-3 项是当前估值下建立确信度的阻断项。第 4-6 项对风险校准重要，但单项不会阻断投资逻辑。
    claimRefs:
      - CV033
      - CV034
      - CV035
      - CV036
