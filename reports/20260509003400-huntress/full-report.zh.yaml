      - number: '2.5'
        title: 规模估算缺口与方法论注意事项
        blocks:
          - type: paragraph
            body: |
              本分析使用的市场规模估算之间存在显著方法差异。关键注意事项：

              Techaisle 的 $90B 数字包含所有 SMB IT 安全支出类别（端点、网络、云、身份、邮件），可能重复计算
              通过平台交易流动的支出。Growth Market Reports 的 $39.8B 更保守，只包含专门安全产品/服务收入。
              本报告未对两个数字做独立审计。

              Mordor Intelligence 给出的 $4.19B MDR 市场规模（2025 年）统计的是全球市场，横跨企业和 SMB——
              SMB 专属 MDR 子板块没有单独披露。Huntress 主要争夺 MDR 中的 SMB 切片；根据 SMB 在安全支出中的
              份额（Analysys Mason 对 2028 年总网络安全支出的预测约为 62%），该切片可能占 MDR 总市场的
              30–40%，但 SMB MDR 数字是估算，不是直接披露。

              对 Huntress 而言，MSP 渠道网络安全子市场（Analysys Mason 口径下 2022–2028 年为 $7B–$10B）
              与其分销模式最相关，但该数字在付费墙后，本报告无法独立验证。
            claimRefs:
              - CM021
              - CM022
              - CM023
      - number: '2.6'
        title: 展示项
        blocks:
          - type: callout
            title: MDR 类别以 22% CAGR 增长，Huntress 处在震中
            body: |
              随着勒索软件攻击复杂度上升、SMB 面临保险公司强制 EDR 要求，MDR 市场正以约 22% CAGR 增长，
              且没有减速迹象。Huntress 是专为 SMB 打造的 MDR 厂商，并已连续两年实现 70%+ 增长，意味着其增速
              是整体 MDR 市场的 3 倍。这说明公司在拿份额，而不只是被市场潮水托起。
            calloutType: strength
            claimRefs:
              - CM007
              - CM008
              - CM016
          - type: callout
            title: TAM 估算差异巨大，提示尽调风险
            body: |
              2024 年 SMB 网络安全 TAM 估算从 $39.8B（Growth Market Reports）到 $90B（Techaisle），相差 2.3 倍。
              这不是噪音，而是真实的口径差异。投资人应把 Analysys Mason 的 $52B 估算视为 Huntress 实际可触达市场中
              最保守且可信的数字，因为它聚焦 MSP 介入的安全渠道。$39.8B 的自下而上估算则是尽调中最可辩护的锚点。
            calloutType: risk
            claimRefs:
              - CM004
              - CM005
              - CM006
              - CM022
          - type: callout
            title: 网络保险已成为非可选采用驱动因素
            body: |
              2022 年以来，包括 Lloyd's of London 和美国主要承保机构在内的保险方，已把经验证的 EDR 部署作为
              网络保险承保前提。对服务合规要求客户（医疗、金融服务）的 MSP 来说，这会转化为对 Huntress 级工具的
              合规驱动拉动，不再取决于客户是否已经相信安全成熟度。这一结构性需求驱动因素降低了 Huntress 对安全预算
              周期时点的依赖。
            calloutType: insight
            claimRefs:
              - CM017
              - CM018
  - number: 3
    title: 竞争对手
    sections:
      - number: '3.1'
        title: 竞争格局概览
        blocks:
          - type: paragraph
            body: |
              Huntress 的竞争格局横跨四类：（1）MSP 聚焦、处在同一价格带和渠道模式的 MDR 同行（Blackpoint Cyber）；
              （2）部分触达 SMB 的企业 MDR/EDR 平台（Arctic Wolf、CrowdStrike Falcon Complete、
              SentinelOne Singularity）；（3）AV/轻量 EDR 层级的传统端点保护厂商（Malwarebytes/ThreatDown、
              Sophos、ESET）；（4）现状替代品——“没有托管安全”（Windows Defender + 手工 IT 支持）。

              对 Huntress 来说，最重要的竞争维度是 MSP 介入的渠道。需要直接企业采购周期或复杂部署的厂商，实际上会被排除在
              Huntress 由 MSP 管理的 SMB 可触达市场之外。这个结构性过滤器显著缩小了有效直接竞争者范围。在 MSP 渠道中，
              Blackpoint Cyber 是最可比替代方案；Arctic Wolf 在 MSP 中端市场层级竞争，但更偏企业。

              厂商对比平台（G2、Gartner Peer Insights、PeerSpot）持续把 Huntress 排在 SMB MDR 类别第一。
              在 G2 上，截至 2024 年中，Huntress 已连续 9+ 个季度获得 EDR 第一，数百条评价下评分为 4.9/5。
              PeerSpot 用户评论特别把 Blackpoint Cyber 列为 MSP 评估 Huntress 替代方案时的主要对照。行业评论提到
              Huntress 的 SOC 响应能力强（用户报告响应时间低于 60 秒），且按端点定价有竞争力。
            claimRefs:
              - CP001
              - CP002
              - CP003
