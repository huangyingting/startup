      - number: '3.6'
        title: 展示项
        blocks:
          - type: callout
            title: Blackpoint Cyber 是 Huntress 最危险的近端竞争对手
            body: |
              Blackpoint Cyber 几乎共享 Huntress 的所有结构属性：MSP 渠道聚焦、相近价格带的按端点定价、
              人工主导 SOC 和伙伴优先品牌。两家公司相距约 10 英里成立，并在同一市场板块成长。Blackpoint 的
              $190M 融资和 CompassOne 更名，表明其正在认真投入产品扩张。关键未知数——Blackpoint 的 ARR 和客户数——
              是重大尽调缺口，投资前应通过市场情报或渠道伙伴调研补上。
            calloutType: risk
            claimRefs:
              - CP004
              - CP005
              - CP006
          - type: callout
            title: CrowdStrike 2024 年 7 月宕机为 Huntress 创造结构性顺风
            body: |
              2024 年 7 月 19 日，CrowdStrike Falcon 传感器更新 bug 造成全球 IT 中断，影响航空公司、银行、医院和应急服务。
              对 MSP 来说，这次事件是内核级代理风险的直观提醒。Huntress 的非内核架构在随后几个季度成为明确销售差异点。
              虽然 CrowdStrike 实施宕机后架构调整后，这一竞争优势可能削弱，但该事件验证了 MSP 对低端点稳定性风险安全厂商的偏好。
            calloutType: strength
            claimRefs:
              - CP010
              - CP016
              - CP022
          - type: callout
            title: AI 驱动 MDR 自动化可能压缩 Huntress 的人工 SOC 优势
            body: |
              SentinelOne 的 Purple AI、CrowdStrike 的 Charlotte AI 和 Arctic Wolf 的 Aurora Agentic SOC 都试图自动化
              Tier 1/2 SOC 分析师流程，而这一流程目前支撑 Huntress 的人力规模化优势。如果 AI 将人工 SOC 成本降低 60–80%，
              企业平台可能在 3–4 年内以 Huntress 的价格点提供可比托管响应。Huntress 的反制策略（投资 AI 来增强自有 SOC）
              应在尽调中做压力测试：人员计划、AI 投入和 SOC 自动化路线图到底是什么？
            calloutType: risk
            claimRefs:
              - CP019
              - CP020
  - number: 4
    title: 财务
    sections:
      - number: '4.1'
        title: 收入来源与商业模式架构
        blocks:
          - type: paragraph
            body: |
              Huntress 的收入全部来自通过 MSP 渠道销售的订阅合同。MSP 按单位授权 Huntress，并把成本加价或打包进
              面向 SMB 终端客户的托管服务费。收入在订阅期内（月度或年度）按比例确认，因此 ARR 高度可预测、可重复。
              公司未披露重大专业服务、实施或咨询收入，也不运营市场平台或交易型模式。

              产品组合通过四个不同单位产生收入：
              (1) Managed EDR/端点保护：按端点/月；主要收入驱动因素。
              (2) 身份威胁检测（ITDR）：按身份/月；M365/Google Workspace 客户的增长型附加产品；2024 年 9 月为
              1M+ 身份，2025 年初为 2M+。
              (3) SIEM：2024 年推出；按事件或租户定价模式（具体价格未公开披露）；对 ARR 的贡献仍处早期。
              (4) 安全意识培训（SAT，通过 Curricula）：按用户/月；扩大平台 TAM。

              收入集中风险：MSP 渠道是 Huntress 唯一分销渠道。若前 20 大 MSP 伙伴流失，将构成重大收入事件。
              没有客户集中度披露。

              国际收入：根据现有披露，仍处早期或规模很小。Series D 公告把国际扩张列为资金用途重点，说明截至 2024 年，
              国际 ARR 贡献可能低于总额的 10%。
