  - id: FV001
    title: 推荐逻辑
    type: flow
    layout: wide
    summary: |
      梳理 Huntress 从证据基础（市场、验证、护城河、经济性、风险、估值）到 WATCH/HOLD 建议的逻辑链，
      展示证据缺口（NRR、毛利率）如何阻止信心从 WATCH 升级到 BUY。
    data:
      nodes:
        - id: market
          label: 大 TAM（33M+ 家 SMB）
          detail: SMB 细分供给不足；终端覆盖率 <15%；MDR 市场以 25%+ CAGR 增长
          tone: positive
        - id: proof
          label: 验证：$100M ARR、70%+ 增长
          detail: ARR 连续三年同比增长 70%+；7,000+ 个 MSP 伙伴；2024 年 9 月确认
          tone: positive
        - id: moat
          label: 护城河：MSP 渠道飞轮
          detail: 7,000 个 MSP 关系就是分销护城河；竞争对手需要多年复制
          tone: positive
        - id: gaps
          label: 证据缺口（NRR、GM）
          detail: NRR 未披露；毛利率未披露；无 S-1；IPO 时间线后移
          tone: adverse
        - id: risks
          label: 关键风险
          detail: Microsoft 竞争；SOC 人力压缩毛利率；IPO 延迟；单一渠道依赖
          tone: warning
        - id: valuation
          label: 估值：15x ARR（$1.5B+）
          detail: 当前阶段公允；高于 MDR 同业（6.5-9x）；低于纯软件公司（20-22x）
          tone: neutral
        - id: recommendation
          label: 建议：WATCH/HOLD
          detail: WATCH 面向新投资者；HOLD 面向现有 A-C 轮股东。升级到 BUY 需要 NRR ≥110% + GM ≥70%
          tone: neutral
      edges:
        - from: market
          to: proof
          label: 验证 TAM
        - from: proof
          to: moat
          label: 渠道建立于
        - from: moat
          to: valuation
          label: 支撑溢价
        - from: gaps
          to: recommendation
          label: 阻断 BUY 信号
        - from: risks
          to: recommendation
          label: 压制信心
        - from: valuation
          to: recommendation
          label: 框定回报画像
        - from: proof
          to: recommendation
          label: 支撑 HOLD
    approximationNotes: 流程逻辑是研究团队的分析框架。建议仅基于公开可得信息；未接触公司财务或数据室。
