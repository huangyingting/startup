      - number: '5.3'
        title: 身份威胁检测与响应（ITDR）
        blocks:
          - type: paragraph
            body: >
              Huntress Managed ITDR 保护 Microsoft 365 和 Google Workspace 身份环境，提供持续 24/7
              监控和经人工确认的自动化响应。产品可检测账号接管、会话劫持（token/cookie 盗窃）、不可能旅行、权限提升、未经授权的收件箱转发规则、商务邮件攻击（BEC）模式，以及恶意 OAuth
              应用授权。一旦确认威胁，ITDR 可自动终止活跃会话、禁用账号并撤销 token。身份事件平均响应时间约 3 分钟，快于 EDR 约 8 分钟的
              MTTR，因为身份动作（撤销会话）比终端隔离需要更少取证确认。Huntress 曾称自己是首家在 Microsoft 365 环境交付主动式 OAuth 应用威胁防护的厂商，并在 GitHub 开源
              RogueApps 仓库，编目被滥用的 OAuth/OIDC 应用。2025 年 4 月，Huntress 发布增强版 ITDR，在自动化响应和 Entra（Azure AD）Conditional Access
              集成覆盖上做了改进。根据公司 2025 Managed ITDR Report，身份攻击约占所有跟踪安全事件的 40%，支撑了该产品的战略重要性。目前 ITDR 覆盖重点仍是 Microsoft 365 和
              Entra ID；Google Workspace 虽有覆盖，但属于次重点。公开材料未记录对其他 SaaS 身份提供商（Okta、Ping 等）的覆盖，是一个尽调缺口。
            claimRefs:
              - CE013
              - CE014
              - CE015
              - CE011
              - CE030
      - number: '5.4'
        title: SIEM、SAT 与新兴态势产品
        blocks:
          - type: paragraph
            body: >
              Huntress Managed SIEM 于 2024 年 9 月上线，目标是打破传统企业 SIEM「要么全上、要么不上」的模式。它采用「Smart
              Filtering」——只收集与安全相关的日志，而不是摄取全部数据。定价按数据源（防火墙、VPN、身份、终端数量）计算，而非按数据量计费，消除了过去让 SMB 望而却步的成本不可预测性。SIEM 支持 20+
              集成，包括 Fortinet、Palo Alto Networks、1Password、Keeper、Duo 等；数据最长保留七年，以满足合规需求。支持的合规框架包括 PCI-DSS、SOC
              2、HIPAA、CMMC Level 2，以及 Australian Signals Directorate 的 Essential Eight。SIEM 将遥测回流到 Huntress
              SOC，提升终端、身份和网络数据源之间的威胁关联。根据 CRN 对 XChange 2025 的报道，Huntress 管理层承认 SIEM 相对最终目标能力仍处于「早期开发」，但改善曲线在加速。使用 SIEM
              的 MSP 中，只有 10% 能把 SIEM 部署到超过 10% 的客户群；Huntress 希望用更简化、可扩展的部署模型解决这个问题。

              通过收购 Curricula 获得的 Managed Security Awareness Training（SAT）提供专家托管的钓鱼模拟，场景来自 Huntress 威胁情报；还包括即时 Phishing
              Defense Coaching、多渠道模拟（电子邮件、SMS、语音、Slack/Teams）、游戏化培训内容、按用户计的风险评分，以及自动化合规报告。SAT 平台与 Microsoft 集成（目录同步），并包含
              Content Creator Tool，可构建自定义场景。

              两个新产品——Managed ISPM（Identity Security Posture Management）和 Managed ESPM（Endpoint Security Posture
              Management）——于 2026 年 3 月进入早期访问。2025 年 11 月，Huntress 收购伦敦 M365 加固专家 Inside Agent 后，用不到四个月做出了 ISPM。ISPM 按
              CIS Microsoft 365 Benchmark 标准执行 100+ 项环境检查，覆盖 Entra、Exchange、Intune、SharePoint 和 Teams。ESPM 与 Microsoft
              Defender for Endpoint 集成，用于漏洞管理，阻断恶意 RMM 工具，并控制终端上的应用执行。
