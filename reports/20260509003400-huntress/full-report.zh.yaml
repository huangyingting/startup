      - number: '4.3'
        title: 成本结构与利润率驱动因素
        blocks:
          - type: paragraph
            body: |
              Huntress 的收入成本（CoGS）主要是 SOC 人工（24/7 安全分析师）、云基础设施（端点向 Huntress 云上报）
              和威胁情报运营。不同于纯软件公司，人工主导 SOC 是有意义的可变成本，会随端点数量扩张。可比托管安全公司
              （Arctic Wolf、Deepwatch、eSentire）的行业基准显示，毛利率在 60–75% 区间。

              关键成本结构假设（均未经验证 / 估计）：
              - SOC 人工：估计占收入 25–35%（主要 CoGS 项）；包括 24/7 分析师团队、轮班覆盖、培训和事件响应能力。
              - 云基础设施：估计占收入 5–10%；端点数据遥测对基础设施要求很高。
              - 销售和营销：每个 MSP 伙伴的获客和赋能成本；高增长 SaaS 公司在增长阶段通常占收入 30–40%。
              - R&D：SIEM、ITDR 扩张和 AI 工具的产品开发；估计占 25–35%。
              - G&A：公司管理开销；估计占 10–15%。

              员工数：2024 年 6 月约 360 人，2024 年底估计 400–450 人。在 $100M ARR 和约 400 名员工下，
              ARR/FTE 约为 $250K——低于纯 SaaS 基准（约 $400K+），但对拥有重要 SOC 服务组件的公司而言合理。

              毛利率扩张路径：随着产品平台从纯 MDR 扩到 SIEM + ITDR + SAT，纯软件层（SIEM、ITDR）的毛利率高于
              人工服务 MDR 层。平台组合向软件迁移，可能在 3–5 年内把毛利率从当前估计的 65–72% 推向 75%+。
            claimRefs:
