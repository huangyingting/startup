      - number: '3.5'
        title: 护城河耐久度与商品化风险
        blocks:
          - type: paragraph
            body: |
              Huntress 最主要的商品化风险是 AI 驱动的 MDR 自动化。随着 AI 模型在威胁检测和自主修复上变强
              （SentinelOne 的 Purple AI、Arctic Wolf 的 Aurora Agentic SOC 和 CrowdStrike 的 Charlotte AI 都是证据），
              Huntress SOC 的人工成本优势可能被侵蚀。如果 AI 能自动化 80%+ 的 SOC 分析师流程，AI 优先平台的按端点经济性会被压缩，
              进而让 CrowdStrike 或 SentinelOne 以更低价格提供有竞争力的托管响应。

              第二个风险是 MSP 整合：如果大型 MSP 被直接安全厂商收购或合并（例如 CrowdStrike 收购某个 MSP 平台），
              Huntress 的渠道可能受扰动。该风险目前较低（主要安全厂商尚无重大 MSP 收购），但需要持续跟踪。

              反驳商品化的论点包括：（1）攻击复杂度也随 AI 上升，新型威胁仍需要人类判断；（2）Huntress 的 SMB 威胁情报数据集
              具有专属性——用 Fortune 500 遥测训练出的企业 AI 模型，可能很难处理 SMB 专属攻击模式；（3）Huntress 自己的
              AI 投资（2025 年产品路线图有报道）可能守住平价。Huntress 的渠道关系深度（7,000+ 已将 Huntress 集成进自身栈的
              MSP 伙伴）是一种粘性留存优势，纯产品功能难以复制。
            claimRefs:
              - CP019
              - CP020
              - CP021
              - CP022
