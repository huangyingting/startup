      - number: '6.5'
        title: 客户满意度与评论平台信号
        blocks:
          - type: paragraph
            body: >
              独立评论平台数据持续把 Huntress 放在评分最高的托管 EDR 厂商之列，尤其在 SMB 和 MSP 细分中更强：


              G2：截至 2024 年夏季，Huntress 已连续 9 个季度在 EDR（终端检测与响应）类别排名 #1，依据是用户满意度和市场存在度评分。G2 评论者反复提到 24/7 SOC 响应、MSP
              部署简单、威胁告警可执行，是关键差异。G2 竞争对手对比数据也显示，在 MSP/SMB 用例中，Huntress 相对 Blackpoint Cyber、CrowdStrike 和 SentinelOne
              表现有利。


              Gartner Peer Insights：Huntress 在托管检测与响应类别拥有强评分，评论者特别提到产品适合资源受限的 IT 环境。


              Capterra：客户评论强调基于 Agent 的部署简单，以及 SOC 生成修复指引质量高，整体满意度评分强。


              Trustpilot：评论体现了整体正面情绪，尤其来自 MSP；他们把 Huntress 描述为托管安全栈的核心组件。


              Reddit r/MSP 社区：从业者讨论持续推荐 Huntress 作为面向 SMB 的 MSP 的首选 MDR 选项，并强力背书其捕捉无文件攻击和端点 AV 产品漏掉的 LOLBAS 威胁的能力。


              反向评论主题：部分客户提到年度涨价（从 $2.50 到 $3.50/endpoint），但未有等价功能增加。少数人提到偶发误报，以及需要 MSP 介入处理告警。
            claimRefs:
              - CU018
              - CU019
              - CU020
              - CU021
              - CU022
      - number: '6.6'
        title: 渠道经济性、留存韧性与集中度风险
        blocks:
          - type: paragraph
            body: >
              Huntress 的全部分销模式都经由 MSP 合作伙伴流转，因此其留存动态与直销 SMB 厂商有结构性差异。


              MSP 切换成本高：一家 MSP 一旦标准化采用 Huntress，切换会造成大量运营扰动——需要在所有客户终端重新部署 Agent、重新培训技术人员、重新配置告警工作流。嵌入之后，Huntress 往往会留下。


              反向集中度风险很严重：如果一家大型 MSP 合作伙伴流失，其所有 SMB 客户会同时离开。单个大型 MSP 流失不是一次客户事件，而是一次组合事件。这是 Huntress 客户章节中最核心的反向风险。


              净留存率（NRR）和总留存率（GRR）未公开披露。基于连续 3 年 70%+ ARR 增长和扩张机制（每个合作伙伴随时间增加更多终端、更多身份、更多产品），NRR 推断远高于 100%——可能在 115–130%
              区间——但这是推断，不是事实。


              Huntress 在现有 MSP 关系内的扩张机制包括：

              （1）MSP 新增 SMB 客户带来自然终端扩张；

              （2）在现有终端客户上增购身份（ITDR）——约 6 个月内身份数从 1M 到 2M；

              （3）2024 年上线 SIEM 增购；

              （4）通过 Curricula 交叉销售 Security Awareness Training（SAT）。


              每家 MSP 合作伙伴平均 ARR：以 $100M ARR / 7,000 家合作伙伴计算，约 $14K/year。这个平均数掩盖了分布差异——前 5–10% 合作伙伴可能贡献 30–50%
              ARR，长尾贡献其余部分。按合作伙伴计的客户集中度未知且未披露。
            claimRefs:
