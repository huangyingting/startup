      - number: '8.2'
        title: 建议、信心与估值立场
        blocks:
          - type: paragraph
            body: >
              投资建议：观察（新投资人）/ 持有（现有 Series A-C 股东）。对 Series D 投资人（Kleiner Perkins、Meritech、Sapphire）而言：基准情景 2-3 年回报
              2x；乐观情景 3-4x；悲观情景在清算优先权保护下大致持平。


              信心：中等。正向案例由已确认的 $100M ARR、经验证的 70%+ YoY 增长和连续三年稳定表现支撑。负向案例被缺少经审计财务报表、NRR 未披露、毛利未披露，以及截至 2026 年 5 月未提交 S-1
              所遮蔽。


              风险评级：中高。三项主导风险——NRR 不透明、毛利低于 SaaS 门槛（70%）、IPO 延迟——单独看都重要，叠加后更重。没有任何单一风险必然兑现，但若同时兑现，概率加权后的下行很严重（悲观情景
              $1.2-1.5B，相比 Series D 价格 $1.5B+）。


              估值立场：当前阶段估值合理。基于 $100M ARR 的 15x ARR 倍数，符合一家高增长、披露不完整的托管安全私营公司——高于纯 MDR 可比公司（Arctic Wolf 6.5x、Blackpoint
              9x），低于纯软件上市可比公司（CrowdStrike 21x、SentinelOne 22x）。相对 MDR
              同业的溢价由更快增长支撑；相对上市软件同业的折价由服务毛利压缩解释。不过，当前倍数可能已经滞后——估值在 2024 年 6 月确定，ARR 到 2026 年中可能已增长至 $130-150M（由 70%
              增长轨迹放缓至约 30% 推算），这会把当前价格下的有效倍数降至 10-12x——如果 IPO 定价向 $3B+ 收敛，Huntress 可能具备吸引力。


              目标回报 / 持有 / 退出：新投资人若按当前 $1.5B+ 估值标记进入，基准情景要在 IPO 时达到 $3B 才能实现 2x 回报，需要持有 24-36 个月。3x
              回报（$4.5B）需要乐观情景条件。若没有优先股保护条款，在这一价格进入的悲观情景回报为持平到负数。
