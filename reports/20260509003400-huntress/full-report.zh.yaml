      - number: '7.2'
        title: 运营与安全风险
        blocks:
          - type: paragraph
            body: >
              Huntress 完全运行在 Amazon Web Services（AWS）上，形成单一云依赖风险。2021 年 12 月，AWS us-east-1 区域故障影响了包括安全厂商在内的数千家 SaaS
              提供商。对于 24/7 托管安全提供商，任何检测或告警能力中断都会造成客户暴露和 SLA 违约责任。Huntress 未公开披露其云冗余架构、故障切换流程或 RTO/RPO
              目标；这些都是使命关键安全服务的关键尽调事项。


              24/7 SOC 模型是 Huntress 的核心竞争差异，但也是关键运营风险。安全分析师行业年流失率为 15-25%。Huntress 提到会用 AI 和自动化处理 tier-1
              分诊，降低分析师负荷，但人工复核仍是价值主张的核心。如果分析师流失超过可管理水平，或人才成本通胀进一步压缩利润，人工增强模型会面临执行风险。


              作为高知名度安全厂商，Huntress 本身是国家级行为体和勒索团伙的优先目标。2020 年 SolarWinds 供应链攻击证明，安全厂商可能通过自身软件分发或更新机制被攻破。Huntress
              必须维持极高的内部安全卫生；Huntress 平台一旦被攻破，将对客户信任造成灾难性打击，甚至可能危及公司生存。产品集成风险包括 Curricula（SAT）和 Inside
              Agent（ISPM）收购；被收购代码库会带来新的攻击面、集成缺陷和数据模型不兼容。
            claimRefs:
              - CR007
              - CR008
              - CR009
              - CR010
              - CR011
              - CR012
