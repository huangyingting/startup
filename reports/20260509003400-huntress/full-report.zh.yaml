  - id: TM004
    title: 增长驱动因素与约束表
    columns:
      - 驱动因素 / 约束因素
      - 方向
      - 时点
      - 对 Huntress 的影响
      - 尽调问题
    rows:
      - - 勒索软件更多瞄准 SMB
        - 驱动因素
        - 当前（2024–2026）
        - 最强需求加速器；入侵新闻推动 MSP 升级技术栈
        - 跟踪 DBIR 和 Huntress 威胁报告，观察 SMB 入侵率趋势
      - - AI 驱动攻击规模化
        - 驱动因素
        - 当前且在加速
        - 抬高人工主导 MDR 的价值；Huntress SOC 团队与纯自动化工具拉开差异
        - 评估 Huntress SOC 能否扩充人力容量，跟上 AI 攻击量
      - - 网络保险 EDR 强制要求
        - 驱动因素
        - 当前（2023–2026）
        - 形成非可选合规触发点；MSP 借保险要求向上销售 Huntress
        - 确认保险机构是否明确把 Huntress 这一类 EDR 列为要求
      - - 监管扩张（HIPAA、CCPA、州法）
        - 驱动因素
        - 当前且在扩大
        - 医疗和金融 SMB 因合规而采用；支撑 Huntress 垂直扩张
        - 跟踪影响 SLED 和医疗 SMB 合规要求的监管变化
      - - MDR 品类增长（21.95% CAGR）
        - 驱动因素
        - 2025–2030
        - 市场顺风直接支撑 Huntress 的收入增长目标
        - 确认 MDR 品类增长不会因 SOC 功能自动化而挤压人工主导 SOC
      - - SMB 预算敏感
        - 约束因素
        - 持续存在
        - 价格点限制单席支出；迫使公司保持竞争性定价
        - 评估 Huntress 定价相对竞品和 SMB 预算调查的位置
      - - MSP 技术标准化周期
        - 约束因素
        - 12–24 个月周期
        - MSP 不常更换技术栈；流失和新增赢单周期都长
        - 评估 Huntress 的 MSP 流失率和平均合作伙伴年限
      - - 从现有 AV/EDR 切换的成本
        - 约束因素
        - 当前
        - 已深度使用现有工具的 SMB 或 MSP，需要入侵事件或续约窗口才会切换
        - 评估从仅 AV 的既有厂商替换过来的平均周期和赢率
      - - 买方使用 AI 辅助采购
        - 约束因素或驱动因素
        - 新兴（2025–2026）
        - LLM 辅助供应商评估可能偏好文档充分、G2/Gartner 资料强的厂商；竞争门槛被拉平
        - 跟踪 Huntress 在 AI 引用的供应商对比平台上的存在感
    notes: 所有约束严重度评级都是分析师的定性判断。时点估计基于当前市场观察，可能变化。约束或驱动因素的划分反映当前主导趋势方向。
