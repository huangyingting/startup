      - number: '1.2'
        title: 创始人、领导层与治理
        blocks:
          - type: paragraph
            body: |
              Huntress 由 Kyle Hanslovan（CEO）、Chris Bisnett（CTO）和 John Ferrell
              （工程副总裁）共同创立，三人都曾是 NSA Tailored Access Operations（TAO）
              网络行动人员。攻击安全背景塑造了公司的威胁狩猎哲学：先深刻理解攻击者打法，
              再构建防御。Hanslovan 是公司的公众面孔和战略领导者，常在安全会议和行业媒体露面。
              他反复强调，Huntress 进入的是别人回避的市场；这个判断直到 Series B 才赢得机构投资人认可。
              现任董事会包括所有主要投资方代表：Kleiner Perkins、Meritech Capital、
              Sapphire Ventures、ForgePoint Capital 和 JMI Equity。员工数从 Series D 公告时
              （2024 年 6 月）约 360 人，增至 2024 年底估计 400+ 人。随着 Huntress 追求
              MSP 渠道之外的分销伙伴关系，公司补上了更深的管理层：2025 年聘任渠道与联盟副总裁
              Tuan Nguyen。Hanslovan 的公开角色非常突出，因此关键人风险偏高；但创始团队仍在，
              相比单一创始人模式，单人依赖有所降低。
            claimRefs:
