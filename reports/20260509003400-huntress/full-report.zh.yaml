  - number: 5
    title: 产品与技术
    sections:
      - number: '5.1'
        title: 平台产品组合概览
        blocks:
          - type: paragraph
            body: >
              Huntress 已从单一产品 EDR 厂商，演进为面向 SMB/MSP 安全栈的多产品「智能体安全平台」。截至 2026 年 5 月，平台包含六条主要产品线：（1）Managed EDR——旗舰产品，覆盖
              Windows、macOS 和有限的 Linux 终端，提供持久化立足点检测和 24/7 ThreatOps 人工分诊；（2）Managed ITDR——面向 Microsoft 365 和 Google
              Workspace 的身份威胁检测；（3）Managed SIEM——2024 年 9 月上线的日志管理与合规报告；（4）Managed Security Awareness
              Training（SAT）——通过收购 Curricula 获得，提供钓鱼模拟和基于行为的辅导；（5）Managed ISPM——Microsoft 365 身份安全态势管理，在 2025 年 11 月收购
              Inside Agent 后不到四个月内开发完成；（6）Managed ESPM——终端安全态势管理。截至 2026 年 3 月，ISPM 和 ESPM 处于早期访问，计划在 2026
              年夏季正式可用（GA）。所有产品共用托管在 AWS 上的云原生多租户架构，开放统一合作伙伴门户，并把威胁遥测送入集中式 24/7 SOC，由人工增强分析。公司也免费向 MSP
              开放平台供其内部安全使用，降低渠道采用阻力。
