      - number: '8.5'
        title: 可比公司组合
        blocks:
          - type: paragraph
            body: |
              上市公司可比（纯软件端点安全，倍数最高）：
              CrowdStrike (NASDAQ: CRWD) 是黄金标准可比公司：FY2025（截至 2025 年 1 月）约 $4B ARR，
              市值 $80-90B，约 21x ARR 倍数，毛利率 >75%，40 法则得分超过 50（32% 增长 + 30%+ FCF 利润率）。
              CrowdStrike 持续享受溢价倍数，验证了高增长网络安全 SaaS 在规模化后可以拿到 20x+。
              Huntress 想冲这个倍数，但必须补上毛利率差距才站得住。

              SentinelOne (NYSE: S)：FY25 Q3（截至 2024 年 10 月的季度）约 $700M ARR，市值 $14-18B，
              约 20-25x ARR，毛利率 >70%。SentinelOne 说明，只要 YoY 增长高于 30%，高增长端点安全公司即便
              仍在烧钱，也能获得溢价倍数。随着增长从 70%+ 降至约 33%，倍数已从 40x+ 压到约 22x，印证了
              支配 Huntress IPO 情景测算的增长 / 倍数关系。

              Palo Alto Networks (NASDAQ: PANW)：约 $8B NGS ARR，约 $100B 市值，约 12-13x NGS ARR。
              其「平台化」策略——把 SIEM、端点、云和身份捆进单一平台——是 Huntress 多产品扩张最清晰的竞争参照。

              Rapid7 (NASDAQ: RPD)：约 $800M ARR，约 $1.5-2B 市值，约 2-3x ARR。警示性可比公司——YoY 增长
              降至 10% 以下后，倍数在 18 个月内从 10x+ 快速压到低于 3x。这是 Huntress 最重要的下行可比。

              Qualys (NASDAQ: QLYS)：约 $500M ARR，约 $4B 市值，约 8x ARR。成熟、低增长网络安全 SaaS，YoY 增长
              12%，代表 Huntress 在长期降速情景下的估值底线。

              私营公司可比（MDR 导向）：
              Arctic Wolf：2022 年在约 $200M ARR 时估值 $1.3B（6.5x ARR）——最直接的私营可比；较低倍数同时
              反映 2022 年市场环境和更高服务强度。Arctic Wolf 也曾在 2021 年 1 月（下行前）以 $4.3B 估值融资，
              说明即便头部 MDR 厂商也遭遇显著倍数压缩。

              Blackpoint Cyber：2023 年 $190M Series C（领投：Bain Capital Tech Opportunities），估值未披露；
              估计在约 $100M ARR 时约 $800M-1B（约 9x ARR）。纯 MDR 导向，未披露平台扩张。

              收购可比：Sophos 于 2019 年被 Francisco Partners 以约 $3.9B 收购，当时收入约 $400M（约 10x）。
              Sophos 的 MSP 渠道模式使其成为 Huntress 最好的 M&A 先例；收购时 10x 倍数说明，对渠道资源丰富的
              安全厂商，战略买家会在成长型私营倍数上支付适度溢价。
