      - number: '4.6'
        title: 展示项
        blocks:
          - type: callout
            title: 端点数学缺口需要立即尽调
            body: |
              4 百万个端点 × $3.50/月 × 12 = 隐含 $168M ARR；按这个端点数，Huntress 的 ARR 应显著高于披露的 $100M。
              $68M 缺口（隐含值的 40%）必须由以下组合解释：老客户低价、大型伙伴批量折扣、计费滞后、未计费试用端点，
              或端点数口径（例如非活跃代理）。这是本章最高优先级的定量尽调事项。
            calloutType: risk
            claimRefs:
              - CI009
          - type: callout
            title: LATKA ARR 估算意味着增长严重减速
            body: |
              未经验证的 LATKA 数据估计显示，Huntress 2025 年 ARR 约为 $120M；相较 2024 年 9 月确认的 $100M，
              这只代表约 20% 同比增长，明显偏离此前披露的 70%+ 趋势。如果准确，将显著削弱公司的估值倍数轨迹和
              IPO 准备度。投资人必须把从公司取得当前 ARR 作为首要财务尽调任务。
            calloutType: risk
            claimRefs:
              - CI008
              - CI022
          - type: callout
            title: 100% 经常性收入与 MSP 渠道扩张飞轮
            body: >
              Huntress 通过不断扩大的 MSP 渠道交付 100% 订阅模式，天然带来扩张引擎：每新增一个 MSP 合作伙伴，就等于打包带来一批 SMB 客户，也就是说拿下一个新合作伙伴，往往对应几十家 SMB
              增量。公司已有 7,000 家合作伙伴，平均每家覆盖约 17 家 SMB 企业，这个渠道飞轮相对直销企业客户，构成了显著的结构性收入质量优势。
