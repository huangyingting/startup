  - number: 7
    title: 风险
    sections:
      - number: '7.1'
        title: 监管与法律风险
        blocks:
          - type: paragraph
            body: >
              Huntress 处在多个重监管领域的交叉点。作为面向医疗、金融服务和法律行业 SMB 的托管安全提供商，Huntress 间接处理受 HIPAA（健康）、GLBA/FTC Safeguards
              Rule（金融）和律师-客户保密权约束的数据。公司必须与所有医疗 MSP 合作伙伴及其下游 SMB 客户保持 HIPAA Business Associate Agreement（BAA）覆盖。任何一个未覆盖的
              BAA 都会产生直接 HIPAA 责任。HHS Office for Civil Rights（OCR）正积极对服务受 HIPAA 约束实体的技术供应商执行 HIPAA；自 2022
              年以来，针对网络安全供应商的执法行动有所增加。


              SEC 新网络安全事件披露规则（2023 年 7 月通过，2023 年 12 月生效）要求上市公司在 4 个工作日内通过 Form 8-K 披露重大网络安全事件。虽然 Huntress
              本身是私营公司，但其上市企业 MSP 合作伙伴受该规则约束；Huntress 平台上的任何影响上市公司客户的事件，都可能触发合作伙伴层面的监管义务，并给 Huntress 造成声誉损害。


              FTC Safeguards Rule（2023 年修订）收紧了对金融机构的要求，包括 Huntress 在会计和银行领域的许多 MSP 客户，要求围绕信息安全计划标准、事件响应计划和年度报告。随着
              Huntress 向欧盟国际扩张，GDPR 暴露正在出现。处理来自欧盟员工的终端遥测，需要 GDPR Article 6 下的合法基础、与每个 MSP 合作伙伴签署 Data Processing
              Agreement，以及为流向 Huntress 美国 AWS 基础设施的数据建立跨境传输机制。单个欧盟客户事件中的不合规，最高可触发全球年营业额 4% 的罚款。IP 风险存在但不急迫：截至 2026 年 5
              月，未发现针对 Huntress 的活跃诉讼，不过 CrowdStrike、SentinelOne 和 Microsoft 合计持有数千项网络安全专利。
            claimRefs:
