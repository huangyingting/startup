      - number: '6.7'
        title: 附录
        blocks:
          - type: callout
            title: 渠道依赖——大型 MSP 流失是组合层面事件
            body: >
              Huntress 100% 通过 MSP 渠道分销，带来不对称流失风险：大型 MSP 合作伙伴一旦离开，其所有受保护 SMB 企业会同时离开。单个管理 500–1,000 家 SMB 客户的大型 MSP，可能对应
              $7M–$14M ARR（按平均合作伙伴 ARR $14K 估算，且大型伙伴很可能高于此）。这不是客户流失事件，而是组合事件。投资人必须把 MSP 合作伙伴集中度数据（前十大合作伙伴 ARR
              瀑布图）列为第一优先级尽调事项。
            calloutType: risk
