      - number: '1.4'
        title: 规模指标与里程碑
        blocks:
          - type: paragraph
            body: |
              Huntress 于 2024 年 9 月 16 日达到 $100M ARR——SaaS 语境中的 “centaur status”——
              此前连续两年保持超过 70% 的同比收入增长。当天，平台保护了 300 万个以上端点、
              100 万个以上身份，并通过 4,000+ MSP 伙伴防护 120,000+ 家企业。Huntress 已拓展至
              APAC 和 EMEA，并进入医疗、州和地方政府、金融服务等新垂直领域。公司的医疗暴露尤其明显：
              包括 14,000 家医疗公司，其中许多依赖 United/Change Healthcare 网络。Series C 之后，
              产品广度显著扩张：推出 ITDR（Microsoft 365 和 Google Workspace 身份保护）、
              收购 Curricula 补上安全意识培训，并在 2024 年发布托管 SIEM 产品。Huntress 在 2025 年
              Deloitte Technology Fast 500™ 中排名第 149，证明其持续高增长轨迹。截至 2024 年夏季，
              G2 已连续 9 个季度将 Huntress 评为端点检测与响应第一名。研究日期时，公司没有公开的不利监管、
              诉讼或制裁记录。
