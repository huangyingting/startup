      - number: '8.7'
        title: 附录
        blocks:
          - type: callout
            title: NRR 不透明是估值摆动最大的单一因素
            body: |
              Huntress 从未公开披露净留存率（NRR）。在 B2B SaaS 中，NRR 是与收入倍数相关性最高的指标：
              NRR 高于 120% 的公司可以拿到 20x+；低于 110% 通常按 8-10x 交易。渠道模式（MSP 中介）意味着
              NRR 必须在 MSP 层面衡量。如果 NRR 高于 120%，Huntress 值得在当前 15x 之上享受溢价；如果低于
              110%，当前倍数站不住。这是 IPO 前最紧急的披露缺口。
            calloutType: risk
            claimRefs:
              - CV034
          - type: callout
            title: 15x ARR 倍数可以自洽，但对管理服务业务已在高位
            body: |
              Huntress 在 Series D 的 15x ARR 高于直接 MDR 同行（Arctic Wolf 6.5x、Blackpoint 约 9x），低于纯软件
              上市可比（CrowdStrike 21x、SentinelOne 22x）。相对 MDR 同行的溢价由更快增长支撑。但若要把 15x 带到
              IPO，Huntress 必须证明毛利率向 70%+ 扩张，或维持 30%+ YoY 增长。
            calloutType: insight
            claimRefs:
              - CV007
              - CV022
              - CV023
              - CV027
          - type: callout
            title: IPO 时间表已经后移，老股流动性压力正在累积
            body: |
              CEO Kyle Hanslovan 在 2024 年底把 IPO 目标定在 18-24 个月内（2025 年底至 2026 年中）。
              截至 2026 年 5 月，S-1 尚未提交。这一 6-12 个月的延迟增加了员工股权悬顶，削弱了招聘竞争力，
              也提高了错过有利 IPO 窗口的风险。若延迟超过 2027 年 Q2，很可能需要过桥融资或老股流动性计划来留住关键员工。
            calloutType: risk
            claimRefs:
              - CV030
              - CV031
