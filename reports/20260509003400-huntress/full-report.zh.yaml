      - number: '4.4'
        title: 资本充足性、烧钱与跑道
        blocks:
          - type: paragraph
            body: |
              按轮次排列的融资历史（时间顺序；融资金额取整）：
              - Seed：约 $10M（2018，ForgePoint Capital）
              - Series A：未披露（2020，ForgePoint Capital）
              - Series B：约 $40M（2021，JMI Equity + ForgePoint）
              - Series C：约 $60M（2022，JMI Equity）
              - Series D：$150M（2024 年 6 月，Kleiner Perkins 领投，Meritech Capital + Sapphire Ventures）
              - 总融资：约 $310M

              烧钱与跑道：Huntress 未公开披露烧钱率或现金头寸。行业分析师（MVP analysis）估计 burn ratio 约为 0.6
              （烧钱 / 新增 ARR）；在 $100M ARR 基数上以 70% 增长，意味着年度 ARR 增加约 $70M，估计年烧钱约 $42M。
              按这个烧钱率，Series D 的 $150M 可从 2024 年 6 月起提供约 3.5 年跑道。不过，burn ratio 是二手估算，
              未经验证。

              Series D 资金用途：Huntress CEO Kyle Hanslovan 提到三项主要用途——（1）SIEM 产品开发，让 MSP 更容易获得；
              （2）国际市场扩张；（3）进入医疗、SLED 和金融服务等垂直市场。

              IPO 时间表：截至 2024 年 9 月，公司目标是在 18–24 个月内 IPO（2025 年末至 2026 年中）。截至 2026 年 5 月，
              尚未公开提交 S-1。IPO 时间表可能因公开市场环境或组织准备度延后。这是重大资本市场风险。

              债务：研究期间未发现公开信贷额度、收入型融资或风险债披露。公司似乎仅由股权融资支持。
