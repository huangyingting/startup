  - id: FE003
    title: Huntress Product Maturity / Capability Map
    type: matrix
    layout: wide
    summary: |
      Assesses Huntress across six product dimensions using a four-point maturity scale:
      strong, developing, early, absent. Evaluated against Windows, macOS, Linux, and
      identity/SaaS environments. Highlights the Windows-first maturity profile and gaps
