company:
  name: Huntress

chapter:
  number: 5
  title: Product & Technology
  summary: |
    Huntress operates a multi-product managed security platform purpose-built for small and
    mid-sized businesses served through MSP partners. The core portfolio spans Managed EDR
    (endpoint detection with 24/7 human ThreatOps), Managed ITDR (Microsoft 365 and Google
    Workspace identity protection), Managed SIEM (launched September 2024), and Managed
    Security Awareness Training (SAT). Two new posture products—Managed ISPM and Managed
    ESPM—entered Early Access in 2026, with GA targeted for Summer 2026. The platform's
    technical differentiation rests on a proprietary persistent-footholds detection engine,
    a non-kernel Go-written agent (~1% CPU, 20MB RAM), and a 24/7 human SOC achieving
    <1% false positives and ~8 min MTTR. Key gaps include limited macOS AV management
    (read-only telemetry), basic Linux feature parity, no mobile (iOS/Android) coverage,
    and a SIEM product still in early development relative to enterprise alternatives.

sections:
  - id: SE001
    title: Platform Product Portfolio Overview
    body: |
      Huntress has evolved from a single-product EDR vendor into a multi-product "Agentic
      Security Platform" targeting the SMB/MSP security stack. As of May 2026 the platform
      includes six primary product lines: (1) Managed EDR—the flagship, covering Windows,
      macOS, and limited Linux endpoints with persistent-footholds detection and 24/7 ThreatOps
      human triage; (2) Managed ITDR—identity threat detection for Microsoft 365 and Google
      Workspace; (3) Managed SIEM—log management and compliance reporting launched September
      2024; (4) Managed Security Awareness Training (SAT)—phishing simulation and behavior-based
      coaching acquired through the Curricula purchase; (5) Managed ISPM—Microsoft 365 identity
      security posture management, developed in under four months after the November 2025
      Inside Agent acquisition; and (6) Managed ESPM—endpoint security posture management.
      ISPM and ESPM are in Early Access as of March 2026, with General Availability planned
      for Summer 2026. All products share a cloud-native, multi-tenant architecture hosted on
      AWS, expose a unified partner portal, and feed threat telemetry into the centralized
      24/7 SOC for human-augmented analysis. The company also makes the platform available at
      no charge for MSPs' own internal security use, reducing adoption friction in the channel.
    claimRefs: [CE001, CE002, CE022, CE024, CE026, CE038]

  - id: SE002
    title: Core EDR — Persistent Footholds, Agent Architecture, and ThreatOps
    body: |
      Huntress Managed EDR is built around the concept of "persistent footholds"—the registry
      keys, scheduled tasks, service entries, startup items, and living-off-the-land binary
      (LOLBin) invocations that attackers use to maintain hidden presence on Windows and macOS
      systems after initial access. Unlike preventative AV, Huntress's approach begins from the
      assumption that attackers may already be inside; its agent performs a deep survey of
      persistence mechanisms immediately on installation and continuously thereafter.
      The core agent (HuntressAgent.exe) is written in Go with no external dependencies,
      communicates over TLS 1.2/1.3 to Huntress cloud infrastructure on AWS, and consumes
      approximately 1% CPU and 20MB RAM under normal conditions (surveying conditions can spike
      to 5–10% CPU temporarily). A second agent, HuntressRio (Rio EDR), handles behavioral
      telemetry and process monitoring; it typically uses ~400MB RAM and is adaptive under
      load. The platform supports Windows 10/11 and Server 2016+ as first-class citizens;
      macOS support covers Ventura 13 through Tahoe 26 (macOS 16), added in May 2024 with
      active remediation capabilities. Linux support covers Ubuntu 22.04+, Debian 11+, RHEL
      8.6+, CentOS Stream 9/10, SUSE 12/15, and Fedora 41/42 on kernel 5.14.50+ (64-bit);
      this coverage remains limited relative to Windows—SIEM syslog ingestion for Linux is
      listed as "coming soon" and feature parity with Windows is incomplete. The agent also
      includes Ransomware Canaries (lightweight decoy files triggering immediate alerts),
      External Recon (open-port scanning), and Managed Antivirus (centralized Microsoft
      Defender management on Windows). On macOS, Huntress can read XProtect and Defender
      telemetry but cannot apply configuration changes or manage exclusions—a noted limitation
      vs. Windows capability. ThreatOps analysts in the 24/7 SOC review all automated alerts,
      achieving a company-reported false positive rate below 1% across 3M+ monitored endpoints.
    claimRefs: [CE003, CE004, CE005, CE006, CE007, CE008, CE009, CE012]

  - id: SE003
    title: Identity Threat Detection & Response (ITDR)
    body: |
      Huntress Managed ITDR protects Microsoft 365 and Google Workspace identity environments
      with continuous 24/7 monitoring and human-validated automated response. The product detects
      account takeovers, session hijacking (token/cookie theft), impossible travel, privilege
      escalation, unauthorized inbox-forwarding rules, business email compromise (BEC) patterns,
      and rogue OAuth application consent grants. When a confirmed threat is detected, ITDR can
      automatically terminate active sessions, disable accounts, and revoke tokens. The mean
      time to respond for identity incidents is approximately 3 minutes—faster than EDR's
      ~8-minute MTTR because identity actions (session revocation) require less forensic
      confirmation than endpoint quarantine. Huntress has claimed to be the first vendor to
      deliver proactive OAuth application threat protection in Microsoft 365 environments,
      cataloguing abused OAuth/OIDC apps in its open-source RogueApps repository on GitHub.
      In April 2025, Huntress unveiled an enhanced ITDR solution with improvements to automated
      response and coverage for Entra (Azure AD) Conditional Access integration. Per the
      company's 2025 Managed ITDR Report, identity-based attacks represent approximately 40%
      of all tracked security incidents, underpinning the strategic importance of the product.
      ITDR coverage currently emphasizes Microsoft 365 and Entra ID; Google Workspace coverage
      is offered but considered secondary. Coverage of other SaaS identity providers (Okta,
      Ping, etc.) is not documented in publicly available materials and represents a diligence gap.
    claimRefs: [CE013, CE014, CE015, CE011, CE030]

  - id: SE004
    title: SIEM, SAT, and Emerging Posture Products
    body: |
      Huntress Managed SIEM launched in September 2024, designed to disrupt the traditional
      all-or-nothing enterprise SIEM model by applying "Smart Filtering"—collecting only
      security-relevant logs rather than ingesting all data. Pricing is based on data sources
      (firewall, VPN, identity, endpoint count), not on data volume, eliminating the cost
      unpredictability that has historically deterred SMBs. The SIEM supports 20+ integrations
      including Fortinet, Palo Alto Networks, 1Password, Keeper, Duo, and others, with data
      retained up to seven years for compliance purposes. Compliance frameworks supported include
      PCI-DSS, SOC 2, HIPAA, CMMC Level 2, and the Australian Signals Directorate's Essential
      Eight. The SIEM feeds telemetry back into the Huntress SOC, improving threat correlation
      across endpoint, identity, and network data sources. Per CRN reporting from XChange 2025,
      Huntress leadership acknowledged the SIEM is still in "early development" relative to its
      eventual target capability but is on an accelerating improvement curve. Only 10% of MSPs
      using SIEM manage to deploy it across more than 10% of their client base—a problem Huntress
      aims to address with a simplified, scalable deployment model.
      Managed Security Awareness Training (SAT), acquired through the Curricula purchase, offers
      expert-managed phishing simulations using real attack scenarios from Huntress threat
      intelligence, just-in-time Phishing Defense Coaching, multi-channel simulation (email, SMS,
      voice, Slack/Teams), gamified training content, risk scoring per user, and automated
      compliance reporting. The SAT platform integrates with Microsoft (directory sync) and
      includes a Content Creator Tool for custom scenario building.
      Two new products—Managed ISPM (Identity Security Posture Management) and Managed ESPM
      (Endpoint Security Posture Management)—entered Early Access in March 2026. ISPM was built
      in under four months after Huntress acquired Inside Agent (a London-based M365 hardening
      specialist) in November 2025. ISPM performs 100+ environment checks against CIS Microsoft
      365 Benchmark standards, covering Entra, Exchange, Intune, SharePoint, and Teams.
      ESPM integrates with Microsoft Defender for Endpoint for vulnerability management, blocks
      rogue RMM tools, and controls application execution on endpoints.
    claimRefs: [CE016, CE017, CE018, CE019, CE020, CE021, CE022, CE023, CE024, CE025, CE026]

  - id: SE005
    title: ThreatOps SOC — Human-Augmented Security Operations
    body: |
      The Huntress ThreatOps team is the company's primary competitive differentiator. Staffed
      by former NSA Tailored Access Operations (TAO) cyber operators and elite security
      researchers, the SOC operates 24/7 with analysts distributed across the United States,
      United Kingdom, and Australia for follow-the-sun coverage. The total SOC headcount exceeds
      100 threat experts as of 2024, though Huntress does not publish a precise analyst count.
      Operational metrics disclosed by Huntress for 2024 include: >78,000 confirmed high/critical
      endpoint incident reports sent; >8,000 high/critical identity incident reports; mean time
      to respond ~8 minutes for endpoint threats and ~3 minutes for identity threats; false
      positive rate <1%; and customer satisfaction score of 98.8%. The SOC follows a
      tier-1/tier-2/tier-3 escalation model: tier-1 analysts triage automated alerts, tier-2
      confirms incidents and drafts remediation reports, and tier-3 conducts deep-dive threat
      hunting. Every verified incident triggers a custom incident report with actionable
      remediation steps delivered via the MSP portal or integrated PSA ticketing. The human
      SOC layer is what distinguishes Huntress from pure-automation EDR vendors that rely on
      self-service alert review. Huntress also contributes to community security research through
      its open-source GitHub presence (huntresslabs), including the RogueApps OAuth threat
      catalogue and the threat-intel repository with YARA signatures and IOCs from blog post
      research. Annual community CTF (Capture the Flag) events further demonstrate research
      capability and attract detection engineering talent.
    claimRefs: [CE009, CE010, CE011, CE012, CE031, CE032, CE034]

  - id: SE006
    title: MSP Integration Architecture & Platform Infrastructure
    body: |
      Huntress is architecturally designed for multi-tenant MSP delivery. The unified partner
      portal provides per-client isolation with aggregated fleet views across all managed
      organizations. Agent deployment integrates with all major RMM platforms: Kaseya VSA,
      NinjaRMM (NinjaOne), Datto RMM, and others support PowerShell-based mass deployment scripts
      maintained in the huntresslabs/deployment-scripts GitHub repository. PSA integrations
      include ConnectWise Manage, Datto Autotask, and HaloPSA—each receiving auto-generated
      tickets when Huntress confirms an incident, with incident status and remediation steps
      embedded in the ticket. Integration uses OAuth2 or API key authentication, with
      organizational mapping aligning Huntress account units to PSA customer records for precise
      alert routing. The Huntress Agent uses TLS 1.2/1.3 for cloud communication; no cleartext
      transmission is supported. Cloud infrastructure is hosted on AWS; Huntress does not publish
      specific cloud region deployment details, representing a diligence gap for customers with
      data residency requirements. The SIEM log ingestion architecture uses Smart Filtering at
      the source agent layer, reducing upstream bandwidth and storage cost. The Huntress platform
      is available to MSP partners for their own internal security use at no charge, reducing
      deployment risk and encouraging platform familiarity before client rollout.
    claimRefs: [CE027, CE028, CE029, CE003, CE017, CE038]

  - id: SE007
    title: Technical Differentiation, Gaps, and Technology Risk
    body: |
      Huntress's key technical differentiations are: (1) purpose-built for MSP multi-tenancy
      from day one, unlike enterprise EDR platforms retrofitted for the channel; (2) non-kernel
      agent architecture, avoiding the class of endpoint stability risk exposed by the July 2024
      CrowdStrike Falcon outage; (3) persistent-footholds-first detection philosophy that catches
      threats conventional AV misses; (4) sub-$5/endpoint/month pricing enabling broad SMB
      deployment; and (5) human SOC at scale delivering <1% false positives without requiring
      customer SIEM expertise. However, material gaps and adverse signals must be noted.
      macOS support, added May 2024, cannot manage or configure built-in AV tools (XProtect,
      Defender for Mac)—limiting preventive capability relative to Windows. Linux support remains
      basic with incomplete feature parity; SIEM syslog ingestion from Linux agents is not yet
      available as of May 2026. There is no mobile (iOS/Android) coverage. The SIEM product is
      acknowledged by Huntress leadership to be in early development relative to its ultimate
      target capability. G2 and Gartner Peer Insights user reviews cite weak reporting customization,
      delayed alert notifications, limited visibility on failed login events, and a clunky UI/UX
      in the portal. The SOC relies on human analysts—a model that delivers quality but may face
      margin pressure and scalability constraints as the monitored endpoint base grows, and which
      Huntress management acknowledges will require AI augmentation over time. Data residency
      commitments for SIEM and ITDR are not publicly documented, a gap for healthcare and
      public-sector clients with strict data governance requirements. Competition from enterprise
      vendors expanding downmarket (CrowdStrike Falcon Go, SentinelOne) and MSP-native peers
      (Blackpoint Cyber) could compress differentiation windows within 2–3 years.
    claimRefs: [CE006, CE007, CE008, CE033, CE035, CE036, CE037]

