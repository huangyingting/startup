      missingEvidence: "Data residency commitments for Huntress SIEM and ITDR cloud storage are not documented publicly; specific AWS regions are undisclosed."
      whyItMatters: "Healthcare, financial services, and public-sector clients with HIPAA, GDPR, or data sovereignty requirements cannot confirm compliance without residency commitments."
      diligencePath: "Request AWS region commitments and DPA in contract negotiations; check Huntress Trust Center if published."
