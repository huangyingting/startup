slug: huntress
runDate: '2026-05-09'
company:
  name: Huntress
chapter:
  number: 4
  title: Financials
  summary: |
    Huntress has achieved $100M ARR as of September 2024 with 70%+ year-over-year growth for
    three consecutive years, reaching unicorn valuation ($1.5B+) at approximately 15x ARR at
    Series D. Revenue is 100% subscription recurring (SaaS-like recognition) delivered via MSP
    channel, with per-endpoint and per-identity/user pricing. The company's financial profile
    reflects a high-growth SaaS model with a human-services component (24/7 SOC) that compresses
    gross margins relative to pure-software peers. Gross margin is estimated at 65–72%, consistent
    with comparable managed security companies, but is not publicly disclosed. Total funding of
    ~$310M through Series D provides 24–36 months of estimated runway at current burn rates,
    supporting the planned IPO trajectory. Critical financial diligence gaps include: no audited
    financial statements, no disclosed gross margin, no customer-level unit economics (CAC/LTV
    at the MSP partner level), and no confirmed ARR post-September 2024 beyond unverified estimates.
sections:
  - id: SI001
    title: Revenue Streams and Business Model Architecture
    body: |
      Huntress generates revenue exclusively from subscription contracts sold through its MSP
      channel. The MSP licenses Huntress on a per-unit basis and marks up or bundles the cost
      into their managed service fee to SMB end-customers. Revenue is recognized ratably over
      the subscription period (monthly or annual), producing highly predictable, recurring ARR.
      There is no material professional services, implementation, or consulting revenue
      disclosed. The company does not operate a marketplace or transactional model.

      The product portfolio generates revenue across four distinct units:
      (1) Managed EDR/endpoint protection: per-endpoint/month; the primary revenue driver.
      (2) Identity Threat Detection (ITDR): per-identity/month; growing add-on for M365/Google
      Workspace customers; 1M+ identities as of Sep 2024, 2M+ as of early 2025.
      (3) SIEM: launched 2024; per-event or per-tenant pricing model (specific pricing not publicly
      disclosed); early-stage contribution to ARR.
      (4) Security Awareness Training (SAT via Curricula): per-user/month; expanded platform TAM.

      Revenue concentration risk: the MSP channel is Huntress's sole distribution channel.
      The loss of top-20 MSP partners would represent a material revenue event. No customer
      concentration disclosures are available.

      International revenue: described as early stage or minimal based on available disclosures.
      The Series D announcement cited international expansion as a use-of-funds priority, suggesting
      international ARR contribution is <10% of total as of 2024.
    claimRefs:
      - CI001
      - CI002
      - CI003
      - CI004
    tableRefs:
      - TI001
      - TI002
  - id: SI002
    title: Revenue Traction and Growth Profile
    body: |
      Huntress has publicly disclosed ARR milestones at three points:
      - $70M ARR at some point in 2023 (inferred from growth trajectory)
      - $100M ARR as of September 2024 (confirmed by ForgePoint Capital and company statements)
      - 70%+ year-over-year ARR growth for three consecutive years

      At $100M ARR with 70% YoY growth, Huntress grew from approximately $59M ARR (12 months
      earlier) to $100M. The Rule of 40 score (growth rate + estimated FCF margin) is favorable
      assuming a growth rate of 70% partially offset by negative free cash flow at current burn.
      An unverified third-party estimate (LATKA) suggests ARR of ~$120M in 2025, implying
      deceleration to ~20% YoY growth—a material change in trajectory that requires diligence
      scrutiny but is unverified and inconsistent with the company's disclosed 70%+ trend.

      The company has 120,000+ businesses defended (Sep 2024), 4M+ endpoints (early 2025), and
      7,000+ MSP partners. Average revenue per endpoint at $3.50/month yields implied annual
      endpoint revenue of approximately $168M/year (4M endpoints × $3.50 × 12)—which exceeds
      the disclosed $100M ARR, suggesting either endpoint count is conservative, pricing varies
      widely, or not all endpoints are billed at the average rate. This gap is a diligence item.

      Deloitte Technology Fast 500 (2025): Huntress ranked 149th, confirming sustained high
      revenue growth relative to its technology peer set across the 2021–2024 period.
    claimRefs:
      - CI005
      - CI006
      - CI007
      - CI008
      - CI009
    figureRefs:
      - FI001
      - FI002
  - id: SI003
    title: Cost Structure and Margin Drivers
    body: |
      Huntress's cost of goods sold (CoGS) is primarily SOC labor (24/7 security analysts),
      cloud infrastructure (endpoints reporting to the Huntress cloud), and threat intelligence
      operations. Unlike pure software companies, the human-led SOC is a meaningful variable
      cost that scales with endpoint count. Industry benchmarks for comparable managed security
      companies (Arctic Wolf, Deepwatch, eSentire) suggest gross margins in the 60–75% range.

      Key cost structure assumptions (all unverified / estimated):
      - SOC labor: estimated 25–35% of revenue (primary CoGS item); includes 24/7 analyst staff,
        shift coverage, training, and incident response capacity.
      - Cloud infrastructure: estimated 5–10% of revenue; endpoint data telemetry is
        infrastructure-intensive.
      - Sales and marketing: per-MSP partner acquisition and enablement costs; typical for
        high-growth SaaS companies at 30–40% of revenue at growth stage.
      - R&D: product development for SIEM, ITDR expansion, and AI tooling; estimated 25–35%.
      - G&A: corporate overhead; estimated 10–15%.

      Headcount: approximately 360 employees as of June 2024, estimated 400–450 by end-2024.
      At $100M ARR and ~400 headcount, the ARR/FTE ratio is approximately $250K—below pure-SaaS
      benchmarks (~$400K+) but reasonable for a company with a significant SOC services component.

      Gross margin expansion path: as the product platform expands from pure MDR to SIEM + ITDR
      + SAT, the software-only layers (SIEM, ITDR) carry higher gross margins than the
      human-services MDR layer. Platform mix shift toward software could expand gross margins
      from a current estimated 65–72% toward 75%+ over 3–5 years.
    claimRefs:
      - CI010
      - CI011
      - CI012
      - CI013
      - CI014
    tableRefs:
      - TI003
    figureRefs:
      - FI003
      - FI004
  - id: SI004
    title: Capital Adequacy, Burn, and Runway
    body: |
      Funding history by round (chronological; funding amounts rounded):
      - Seed: ~$10M (2018, ForgePoint Capital)
      - Series A: undisclosed (2020, ForgePoint Capital)
      - Series B: ~$40M (2021, JMI Equity + ForgePoint)
      - Series C: ~$60M (2022, JMI Equity)
      - Series D: $150M (June 2024, Kleiner Perkins lead, Meritech Capital + Sapphire Ventures)
      - Total raised: ~$310M

      Burn and runway: Huntress has not publicly disclosed burn rate or cash position. Industry
      analysts (MVP analysis) estimated a burn ratio of approximately 0.6 (burn/new ARR), which
      at 70% growth on $100M ARR base implies annual ARR adds of ~$70M and an estimated burn
      of ~$42M/year. At this burn rate, $150M from Series D would provide ~3.5 years of runway
      from June 2024. However, the burn ratio is a secondary-source estimate and is not verified.

      Use of Series D proceeds: Huntress CEO Kyle Hanslovan cited three primary uses—(1) SIEM
      product development to democratize access for MSPs, (2) international market expansion,
      and (3) vertical market expansion into healthcare, SLED, and financial services.

      IPO timeline: As of September 2024, the company targeted an IPO within 18–24 months
      (late 2025 to mid-2026). As of May 2026, no S-1 has been publicly filed. The IPO timeline
      may have been delayed by public market conditions or organizational readiness. This is a
      significant capital markets risk.

      Debt: No public credit facilities, revenue-based financing, or venture debt disclosures
      found during research. Company appears equity-funded only.
    claimRefs:
      - CI015
      - CI016
      - CI017
      - CI018
      - CI019
    tableRefs:
      - TI004
  - id: SI005
    title: Financial Diligence Blockers and Revenue Quality Assessment
    body: |
      Revenue quality drivers (positive):
      - 100% recurring subscription revenue with monthly/annual terms reduces revenue concentration risk
      - MSP channel creates natural expansion mechanism: each new MSP adds multiple SMB clients
      - Net Revenue Retention (NRR) not disclosed but expected to be high (>115%) based on
        per-endpoint expansion as MSPs add clients and products
      - Annual contract value (ACV) not disclosed; per-MSP ACV estimated at $10K–$100K depending
        on size of partner's customer base

      Revenue quality risks:
      - No disclosed NRR, GRR, or customer churn rate
      - No disclosed ACV by product line
      - Endpoint-to-ARR implied math gap (see SI002) requires diligence
      - LATKA unverified ARR estimate of ~$120M for 2025 implies potentially significant growth
        deceleration from 70%+ to ~20% if accurate; must be verified against company disclosures
      - International revenue contribution not disclosed; international expansion creates currency
        and regulatory complexity
      - SOC labor scalability is the key gross margin risk: if ransomware incident volume surges,
        SOC overtime costs could temporarily compress margins without corresponding ARR growth

      Critical diligence blockers:
      - No audited financial statements publicly available (private company)
      - Gross margin not disclosed; estimated 65–72% but unverified
      - Burn rate not disclosed; estimated via burn ratio proxy only
      - NRR/GRR not disclosed
      - Customer-level cohort data (ARR by vintage MSP partner cohort) not available
    claimRefs:
      - CI020
      - CI021
      - CI022
      - CI023
    tableRefs:
      - TI005
