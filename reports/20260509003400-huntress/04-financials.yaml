callouts:
  - calloutType: risk
    title: Endpoint Math Gap Requires Immediate Diligence
    body: |
      At 4 million endpoints × $3.50/month × 12 = $168M implied ARR, Huntress's endpoint count
      implies substantially higher ARR than the disclosed $100M. The $68M gap (40% of implied)
      must be explained by some combination of: legacy lower pricing, volume discounts for large
      partners, billing lag, non-billed trial endpoints, or endpoint count methodology (e.g., 
      inactive agents). This is the highest-priority quantitative diligence item in this chapter.
    claimRefs:
      - CI009
  - calloutType: risk
    title: LATKA ARR Estimate Implies Severe Growth Deceleration
    body: |
      An unverified LATKA data estimate suggests Huntress ARR of ~$120M in 2025, which would
      represent only ~20% YoY growth from the confirmed $100M in September 2024—a dramatic
      deceleration from the reported 70%+ trend. If accurate, this would materially reduce
      the company's valuation multiple trajectory and IPO readiness. Investors must obtain
      current ARR from the company as the top financial diligence priority.
    claimRefs:
      - CI008
      - CI022
  - calloutType: strength
    title: 100% Recurring Revenue with MSP Channel Expansion Flywheel
    body: |
      Huntress's 100% subscription model delivered through a growing MSP channel creates a
      natural expansion engine: each MSP partner represents a bundle of SMB clients, meaning
      one new partner acquisition equals dozens of SMB additions. With 7,000 partners and
      ~17 SMB businesses per partner on average, the channel flywheel is a significant
      structural revenue quality advantage vs. direct enterprise sales.
    claimRefs:
      - CI001
      - CI020
acknowledgedWarnings:
  - dimension: unverifiedSource
    reason: >
      Source SI013 (LATKA) is a third-party data provider that aggregates unverified founder- submitted revenue
      estimates. The LATKA $120M 2025 ARR estimate is explicitly flagged as unverified in this chapter and is used only
      to surface a diligence risk, not as a confirmed data point. Sources SI017, SI033, SI035, SI036, SI037, SI038 were
      cited from secondary references and press coverage that was not retrieved directly via fetch-url in this session;
      the funding amounts and dates they reference are corroborated by multiple independently fetched primary sources
      (ForgePoint, JMI, CRN, Kleiner Perkins, Crunchbase News, SEC EDGAR).
