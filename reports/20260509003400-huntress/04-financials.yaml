  evidenceGaps:
    - type: missing-source
      severity: critical
      topic: Audited gross margin and P&L
      missingEvidence: >-
        No audited financial statements are publicly available. Gross margin (estimated 65–72%) is benchmarked against
        comparable companies but unverified for Huntress specifically.
      whyItMatters: >-
        Gross margin is the most important financial metric for SaaS/managed services valuation comps. A 10-point
        difference in gross margin (65% vs. 75%) translates directly to company valuation.
      diligencePath: Obtain audited P&L in data room. At minimum, request gross margin % and CoGS breakdown from CFO presentation.
      relatedQuestionRefs:
        - QI006
    - type: missing-source
      severity: critical
      topic: Net Revenue Retention (NRR) and Gross Revenue Retention (GRR)
      missingEvidence: >-
        NRR and GRR are not publicly disclosed. The expansion model depends on high NRR; without it, the ARR growth
        trajectory and valuation multiple are not validatable.
      whyItMatters: >-
        NRR is the single most important metric for SaaS/subscription company valuation. Industry benchmarks suggest
        >115% NRR for high-growth MDR; Huntress's actual figure is unknown.
      diligencePath: Request NRR and GRR by annual cohort from Huntress CFO in data room. Request churn analysis by partner segment.
      relatedQuestionRefs:
        - QI012
    - type: missing-source
      severity: material
      topic: Burn rate and cash position
      missingEvidence: >-
        Annual burn rate is estimated at $42–$80M via burn ratio proxy but is not independently verified. Cash on hand
        is not disclosed.
      whyItMatters: >-
        Without confirmed burn rate, runway calculation is imprecise. An IPO delay beyond mid-2026 with
        higher-than-estimated burn could require an additional financing round.
      diligencePath: Request operating cash flow statements and current cash balance from CFO.
      relatedQuestionRefs:
        - QI007
        - QI023
    - type: missing-source
      severity: material
      topic: 2025 ARR and post-Sep 2024 revenue milestones
      missingEvidence: >-
        No confirmed ARR figure post-September 2024 has been publicly disclosed. The LATKA estimate (~$120M 2025) is
        unverified and inconsistent with the prior 70%+ growth trend.
      whyItMatters: Growth deceleration from 70%+ to 20% would be a material change in investment thesis and valuation multiple.
      diligencePath: Request current ARR from Huntress as first diligence priority. Compare to trailing growth rate.
      relatedQuestionRefs:
        - QI026
