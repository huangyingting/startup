  evidenceGaps:
    - type: private-evidence-only
      severity: material
      topic: C-suite composition
      missingEvidence: Full executive team beyond co-founders (CFO, CMO, COO) is not publicly disclosed.
      whyItMatters: >-
        CFO appointment and readiness is a key IPO prerequisite; absence of public CFO implies either a gap or
        non-disclosure.
      diligencePath: Request org chart and named C-suite from Huntress directly.
      relatedQuestionRefs:
        - QO013
    - type: private-evidence-only
      severity: material
      topic: Full board governance and governance rights
      missingEvidence: Complete board composition, voting rights, and protective provisions are not publicly disclosed.
      whyItMatters: Board control structure affects IPO readiness and investor protections for incoming equity holders.
      diligencePath: Request board composition, shareholder agreement, and voting rights documentation.
      relatedQuestionRefs:
        - QO012
      relatedTableRefs:
        - TO002
        - TO003
    - type: missing-source
      severity: material
      topic: Acquisition prices for Curricula and Level Effect
      missingEvidence: Exact acquisition prices for Curricula (est. ~$22M) and Level Effect are not publicly confirmed by Huntress.
      whyItMatters: Acquisition prices affect total capital deployed and whether M&A returns justify Series D allocation to M&A.
      diligencePath: Request deal terms and purchase price allocations from Huntress.
      relatedQuestionRefs:
        - QO015
    - type: private-evidence-only
      severity: minor
      topic: Burn ratio and path to profitability
      missingEvidence: The burn ratio of 0.6 is from analyst secondary sources, not Huntress-disclosed financials; full P&L is private.
      whyItMatters: Pre-IPO investors need verified unit economics to assess profitability path and IPO readiness.
      diligencePath: Request audited financials or management accounts from Huntress.
      relatedQuestionRefs:
