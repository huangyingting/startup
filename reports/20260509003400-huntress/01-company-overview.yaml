company:
  name: Huntress
chapter:
  number: 1
  title: Company Overview
  summary: |
    Huntress is a Maryland-based managed cybersecurity company founded in 2015 by former NSA cyber
    operators Kyle Hanslovan, Chris Bisnett, and John Ferrell. The company provides a managed
    security platform—combining EDR, ITDR, SIEM, and security awareness training—purpose-built for
    small and mid-sized businesses (SMBs) and the managed service providers (MSPs) that serve them.
    Huntress reached $100M ARR in September 2024 and raised a $150M Series D in June 2024 at a
    $1.5B+ valuation led by Kleiner Perkins, Meritech Capital, and Sapphire Ventures. The company
    secures 3M+ endpoints, 1M+ identities, and defends 120,000+ businesses via 4,000+ MSP partners.
sections:
  - id: SO001
    title: Identity and Business Model
    body: |
      Huntress is a privately held managed security platform headquartered in Columbia, Maryland
      (originally Ellicott City, MD). Founded in 2015 by former National Security Agency (NSA)
      cyber operators, the company occupies a distinctive niche: delivering enterprise-grade
      cybersecurity to the "Fortune 5,000,000"—the vast underserved universe of small and mid-sized
      businesses that represent 99% of US companies by count but have historically been priced out
      of best-in-class security tooling. Huntress operates a subscription SaaS model distributed
      primarily through a channel of 4,000+ managed service providers (MSPs), who in turn protect
      120,000+ SMB end-customers. The company's platform integrates managed endpoint detection and
      response (EDR), identity threat detection and response (ITDR), a newly launched security
      information and event management (SIEM) product, and security awareness training (acquired
      via Curricula). Every product tier is backed by a 24/7 human-led Security Operations Center
      (SOC) staffed by elite threat hunters, a differentiator Huntress calls "human-augmented
      security." This positions Huntress between pure product vendors like CrowdStrike and
      full-service MSSPs, delivering managed outcomes at SMB-accessible price points. As of
      September 2024 the company had crossed $100M ARR and achieved unicorn status ($1.5B+
      valuation) following its June 2024 Series D round—the last private round before a
      targeted IPO.
    claimRefs:
      - CO001
      - CO002
      - CO003
      - CO004
      - CO005
    figureRefs:
      - FO002
  - id: SO002
    title: Founders, Leadership, and Governance
    body: |
      Huntress was co-founded by Kyle Hanslovan (CEO), Chris Bisnett (CTO), and John Ferrell (VP
      Engineering), all former NSA Tailored Access Operations (TAO) cyber operators. Their
      offensive-security backgrounds inform the company's threat-hunting philosophy: understanding
      attacker tradecraft deeply before building defenses. Hanslovan serves as the public face and
      strategic leader, regularly appearing at security conferences and in industry press. He
      emphasizes that Huntress occupies a market others shunned—a conviction that took until Series
      B to win over institutional investors. The current board includes representatives from all
      major investors: Kleiner Perkins, Meritech Capital, Sapphire Ventures, ForgePoint Capital,
      and JMI Equity. Headcount grew from approximately 360 at the time of the Series D
      announcement (June 2024) to an estimated 400+ by year-end 2024. Leadership depth beyond the
      three founders has expanded with the addition of a VP of Channels and Alliances (Tuan Nguyen,
      hired in 2025) as Huntress pursues distribution partnerships beyond the MSP channel.
      Key-person risk is elevated given Hanslovan's prominent public role, but the founding team's
      continued presence reduces single-person dependency relative to solo-founder models.
    claimRefs:
      - CO006
      - CO007
      - CO008
      - CO009
      - CO010
    tableRefs:
      - TO002
  - id: SO003
    title: Funding History and Capital Structure
    body: |
      Huntress has raised approximately $308–$310M in total funding across multiple rounds. The
      company bootstrapped early before securing institutional capital, which it pursued against
      investor skepticism about the SMB market. By the Series B (completed c. 2021), Huntress had
      convinced institutional backers of the SMB thesis. The Series C positioned Huntress to
      transition from a single-product company to a multi-product platform. The June 2024 Series D
      of $150M—led by Kleiner Perkins and Meritech Capital with participation from existing backer
      Sapphire Ventures—more than doubled the company's prior valuation to above $1.5B, marking
      unicorn status. Prior investors ForgePoint Capital and JMI Equity remain on the cap table.
      Per CEO Hanslovan, the Series D is intended to be the final private raise before an IPO;
      approximately half the proceeds are earmarked for R&D and M&A, with the remainder for
      go-to-market expansion. The company also acquired Curricula (security awareness training) and
      Level Effect (threat detection) as complementary capability buys. Total raised is sometimes
      cited at $268M (pre-full-round accounting) and other times at $308M+ depending on source
      methodology; the post-Series D figure of $308–$310M appears most consistent across
      multiple independent sources.
    claimRefs:
      - CO011
      - CO012
      - CO013
      - CO014
      - CO015
    tableRefs:
      - TO003
      - TO004
  - id: SO004
    title: Scale Metrics and Milestones
    body: |
      Huntress reached $100M ARR on September 16, 2024—a milestone termed "centaur status" in SaaS
      parlance—after sustaining over 70% year-over-year revenue growth for two consecutive years.
      At that date the platform secured more than 3 million endpoints, protected more than 1 million
      identities, and defended 120,000+ businesses via 4,000+ MSP partners. Huntress has expanded
      geographically into APAC and EMEA and entered new vertical markets including healthcare, state
      and local government, and financial services. The company's healthcare exposure notably
      includes 14,000 healthcare companies, many relying on the United/Change Healthcare network.
      Product breadth expanded substantially post-Series C with the launch of ITDR (Microsoft 365
      and Google Workspace identity protection), acquisition of Curricula for security awareness
      training, and the 2024 launch of a managed SIEM product. Huntress ranked 149th on the 2025
      Deloitte Technology Fast 500™, confirming its sustained hypergrowth trajectory. G2 ranked
      Huntress #1 in endpoint detection and response for 9 consecutive quarters as of Summer 2024.
      The company holds no public adverse regulatory, litigation, or sanctions records as of the
      research date.
    claimRefs:
      - CO016
      - CO017
      - CO018
      - CO019
      - CO020
      - CO021
    tableRefs:
      - TO001
    figureRefs:
      - FO001
      - FO003
  - id: SO005
    title: Adverse and Risk Signals
    body: |
      No material litigation, regulatory enforcement actions, or sanctions have been publicly
      reported against Huntress as of May 2026. The company's SOC team publishes detailed
      transparency reports through quarterly and annual threat intelligence publications, positioning
      it as a credible voice on SMB threat landscape rather than a target. One noted risk factor is
      the company's healthcare customer concentration: 14,000 healthcare clients (a disclosed figure
      from CEO comments) means exposure to healthcare sector disruptions. During the 2024
      Change Healthcare ransomware incident, Hanslovan publicly acknowledged that many of his
      healthcare clients were impacted by the billing disruption—not by breaches of Huntress
      systems. Investor dilution risk is present given substantial venture funding, but the
      company's consistent growth trajectory and move toward IPO mitigates concerns about
      forced recapitalization. The burn ratio was reported at 0.6 as of 2024, indicating capital
      efficiency ahead of most SaaS peers. Headcount data from third-party databases (LATKA)
      suggests rapid hiring toward 815 by 2025, which if confirmed would imply ARR per employee
      declining from $278K to ~$147K—a standard growth-phase dynamic but worth monitoring
      for cost discipline. The 0.7% false positive rate on alerts, cited by independent analysts,
      is a quality signal but is a company-promoted figure not independently audited.
    claimRefs:
      - CO022
      - CO023
      - CO024
      - CO025
