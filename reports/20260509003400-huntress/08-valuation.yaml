callouts:
  - calloutType: risk
    title: NRR Opacity Is the Single Largest Valuation Swing Factor
    body: |
      Net Revenue Retention has never been publicly disclosed by Huntress. It is the metric most
      correlated with revenue multiple in B2B SaaS: companies with NRR above 120% command 20x+;
      below 110% trade at 8-10x. The channel model (MSP intermediation) means NRR must be
      measured at the MSP level. If NRR is above 120%, Huntress deserves a premium to current
      15x; if below 110%, the current multiple is unjustified. This is the most urgent
      pre-IPO disclosure gap.
    claimRefs: [CV034]

  - calloutType: insight
    title: 15x ARR Multiple Is Defensible but at the High End for a Managed-Services Business
    body: |
      Huntress's 15x ARR at Series D sits above direct MDR peers (Arctic Wolf 6.5x, Blackpoint
      ~9x) and below pure-software public comps (CrowdStrike 21x, SentinelOne 22x). The premium
      over MDR peers is justified by faster growth. But sustaining 15x into the IPO requires
      demonstrating gross margin expansion toward 70%+ or maintaining 30%+ YoY growth.
    claimRefs: [CV007, CV022, CV023, CV027]

  - calloutType: risk
    title: IPO Timeline Has Already Slipped — Secondary Liquidity Pressure Building
    body: |
      CEO Kyle Hanslovan targeted an IPO within 18-24 months in late 2024 (late 2025-mid 2026).
      As of May 2026, no S-1 has been filed. This 6-12 month slip increases employee equity
      overhang, reduces competitive recruiting leverage, and raises the risk of missing a
      favorable IPO window. A delay beyond Q2 2027 would likely require a bridge or secondary
      liquidity program to retain key employees.
    claimRefs: [CV030, CV031]

