  evidenceGaps:
    - type: private-evidence-only
      severity: blocking
      topic: NRR and gross margin (blocking diligence items)
      missingEvidence: "Huntress has never publicly disclosed net revenue retention (NRR) or gross margin. These are the two highest-impact valuation metrics and are expected to be included in S-1 filings. No proxy calculation is possible from public data."
      whyItMatters: "NRR is the single highest-correlation metric with SaaS revenue multiple. A 10-point gross margin difference (65% vs. 75%) translates to a 5-8x multiple shift. Without these, the investment case cannot be validated at current valuation."
      diligencePath: "S-1 required for NRR and audited gross margin. Interim: request CFO management presentation with cohort data and CoGS breakdown under NDA."
      relatedQuestionRefs: [QV002, QV012, QV021]

    - type: stale
      severity: material
      topic: ARR update post-September 2024
      missingEvidence: "The last confirmed ARR figure is $100M as of September 2024. No company update has been published in the 20 months since. LATKA's unverified estimate of ~$120M for 2025 is the only third-party data point."
      whyItMatters: "Stale ARR creates material uncertainty about whether the 70%+ growth trajectory has been sustained or decelerated. IPO valuation depends critically on the current growth rate."
      diligencePath: "Request management disclosure of Q1 2026 ARR; obtain trailing 12-month ARR and cohort analysis in data room. Monitor for any company press releases or VC portfolio updates."
      relatedQuestionRefs: [QV002]

