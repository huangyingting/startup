companyProfile:
  summary: >
    Huntress is a cybersecurity company that provides managed detection and response (MDR) services exclusively to small
    and mid-sized businesses (SMBs) through a managed service provider (MSP) channel. Founded in 2015 by Kyle Hanslovan
    (CEO, ex-NSA) and Chris Bisnett (CTO, ex-NSA), the company has built the leading SMB-focused security operations
    platform, combining automated threat hunting with a 24/7 human-operated ThreatOps SOC. At $1.5B+ valuation (Series
    D, June 2024), it is the category-defining MDR vendor for the 130,000+ SMBs that cannot afford enterprise-grade
    security but face enterprise-grade threats.
  foundedDate: '2015-01-01'
  founders:
    - name: Kyle Hanslovan
      role: CEO
      background: Ex-NSA offensive cyber operator; built Huntress as a mission-driven SMB security company.
      claimRefs:
        - CO007
    - name: Chris Bisnett
      role: CTO
      background: Ex-NSA technical counterpart to Hanslovan; leads platform architecture and ThreatOps capabilities.
      claimRefs:
        - CO007
    - name: John Ferrell
      role: Co-founder
      background: Third co-founder; early product and go-to-market contributor.
      claimRefs:
        - CO007
  foundingLocation: Columbia, Maryland
  headquarters: Ellicott City, Maryland, USA
  productSummary: >
    Huntress offers Managed EDR (endpoint detection and response), SIEM, Security Awareness Training (SAT), MDR for
    Microsoft 365, and Identity Threat Detection & Response (ITDR). All products are delivered through MSP partners who
    manage the Huntress platform on behalf of their SMB clients. The ThreatOps team provides 24/7 human triage of
    alerts, generating one-click remediation actions that MSPs execute without requiring SMB clients to maintain
    in-house security expertise.
  customerFocus: >
    SMBs (5–500 employees) across healthcare, financial services, legal, SLED (state/local/education), and horizontal
    business sectors. All customers are served indirectly through MSP partners.
  businessModel: >
    Per-endpoint subscription pricing delivered exclusively through MSP channel partners. MSPs buy wholesale at
    $2–4/endpoint/month and resell with margin to SMB end-customers. Revenue scales with MSP partner count, endpoints
    under management, and product attach rate (SIEM, SAT, ITDR).
  stage: Series D
