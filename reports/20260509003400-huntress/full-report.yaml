        - from: competitive-risk
          to: arr-growth
          label: pricing pressure / churn
        - from: competitive-risk
          to: margin-compress
          label: pricing compression
        - from: ipo-risk
          to: valuation-risk
          label: bridge round dilution
        - from: nrr-decline
          to: valuation-risk
          label: growth narrative damaged
        - from: arr-growth
          to: valuation-risk
          label: growth deceleration
        - from: margin-compress
          to: valuation-risk
