    summary: >
      Risk heatmap plotting Huntress's key risk categories by likelihood (Low/Medium/High) and impact
      (Low/Medium/High/Critical). The upper-right quadrant (High likelihood, Critical impact) contains SOC attrition and
      channel concentration. Regulatory and platform security risks are high-impact but lower-probability. Competitive
      displacement sits at Medium likelihood and High impact.
    data:
      columns:
        - Low Impact
        - Medium Impact
        - High Impact
        - Critical Impact
      rows:
        - label: High Likelihood
          values:
            - —
            - Financial model risk
            - SOC analyst attrition
            - Channel concentration (top MSP)
        - label: Medium Likelihood
          values:
            - Export control
            - GDPR/EU expansion
            - Competitive displacement (MSFT)
            - AWS outage; IPO delay
        - label: Low Likelihood
          values:
            - CCPA enforcement
            - IP/patent litigation
            - HIPAA enforcement
            - Platform security breach
    approximationNotes: >-
      Likelihood and impact ratings are qualitative estimates based on public information and industry precedent; not
      based on Huntress-provided risk assessments.
    claimRefs:
      - CR001
      - CR007
      - CR013
      - CR019
      - CR025
  - id: FR002
    title: Risk Transmission Map - How Risks Flow to Valuation
    type: dag
    layout: standard
    summary: >
      Shows how Huntress's primary risk categories propagate to financial outcomes. Operational risks (AWS outage, SOC
      attrition) flow to customer churn and NRR degradation. Regulatory risks flow to compliance costs and market access
      constraints. Competitive risks flow to ARR growth rate and margin compression. All paths converge on valuation
      multiple risk.
    data:
      nodes:
        - id: aws-risk
          label: AWS / Operational Risk
          type: risk
        - id: soc-risk
          label: SOC Attrition Risk
          type: risk
        - id: reg-risk
          label: Regulatory Risk (HIPAA/GDPR)
          type: risk
        - id: channel-risk
          label: Channel Concentration Risk
          type: risk
        - id: competitive-risk
          label: Microsoft / Competitor Threat
          type: risk
        - id: ipo-risk
          label: IPO Delay / Burn Risk
          type: risk
        - id: sla-breach
          label: SLA Breach / Customer Churn
          type: transmission
        - id: nrr-decline
          label: NRR Decline
          type: outcome
        - id: arr-growth
          label: ARR Growth Deceleration
          type: outcome
        - id: margin-compress
          label: Gross Margin Compression
          type: outcome
        - id: valuation-risk
          label: Valuation Multiple Risk
          type: terminal
      edges:
        - from: aws-risk
          to: sla-breach
          label: platform outage
        - from: soc-risk
          to: sla-breach
          label: service quality degradation
        - from: sla-breach
          to: nrr-decline
          label: churn triggers
        - from: reg-risk
          to: arr-growth
          label: market access blocked
        - from: channel-risk
          to: nrr-decline
