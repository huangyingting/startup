  - number: 6
    title: Customers
    sections:
      - number: '6.1'
        title: Customer Profile and Ideal Customer Characteristics
        blocks:
          - type: paragraph
            body: |
              Huntress's end-customers are small and mid-sized businesses (SMBs) typically employing
              between 5 and 500 people—organizations that cannot afford dedicated in-house security
              operations teams but face the same ransomware, business email compromise (BEC), and
              identity-based threats as large enterprises. Typical Huntress-defended customers include
              dental offices, law firms, CPA practices, regional accounting firms, K-12 school
              districts, municipal governments, community health clinics, and independent insurance
              agencies.

              The pitch to these customers is direct: "Your existing antivirus won't stop modern
              ransomware—we will detect and evict the attacker before they encrypt your files, and
              your MSP doesn't need to hire a security analyst to make it happen." This resonates
              because SMBs are disproportionately targeted by ransomware gangs who know they lack
              detection capabilities, and because the cost of a breach vastly exceeds the cost of
              Huntress.

              Customer acquisition is entirely indirect: SMBs do not buy from Huntress directly.
              They receive Huntress coverage when their MSP (managed service provider) deploys the
              Huntress agent as part of the MSP's managed security stack. This creates a two-sided
              customer dynamic: the MSP is the buying customer (B2B); the SMB is the protected
              beneficiary. For diligence purposes, the relevant customer churn unit is the MSP
              partner, not the individual SMB business.

              The SMB security buying trigger has become structurally stronger due to three forces:
              (1) Cyber insurance underwriters increasingly require endpoint detection and MFA as
              conditions of coverage; (2) Healthcare, legal, and financial services SMBs face
              regulatory compliance mandates (HIPAA, FTC Safeguards Rule, state privacy laws);
              (3) Ransomware frequency targeting SMBs has grown, with Huntress's own 2025 Cyber
              Threat Report documenting proliferating RATs, RMM-abuse, and evolving ransomware.
              These forces are secular tailwinds that structurally expand the addressable buyer pool
              and reduce price sensitivity for Huntress's core offering.
            claimRefs:
              - CU001
              - CU002
              - CU003
              - CU004
      - number: '6.2'
        title: Customer Scale, Reach, and Adoption Trajectory
        blocks:
          - type: paragraph
            body: |
              As of September 2024, Huntress publicly disclosed the following scale figures (confirmed
              by multiple independent sources including ForgePoint Capital and company press releases):
              - 120,000+ SMB businesses defended
              - 3M+ endpoints managed
              - 1M+ identities protected (M365/Google Workspace identities under ITDR coverage)
              - 4,000+ MSP partners in the channel

              By early 2025, updated metrics from MSSP Alert confirmed continued scale gains:
              - 4M+ endpoints (33% increase from September 2024)
              - 2M+ identities (100% increase from September 2024)
              - 7,000+ MSP partners (75% increase from September 2024)

              These metrics reflect two compounding growth loops: (1) Existing MSP partners adding
              new SMB clients or expanding coverage within existing clients (endpoint or identity
              expansion); (2) Net new MSP partners being added to the channel.

              Healthcare stands out as the most prominently disclosed vertical: Huntress's own blog
              confirmed defending 14,000+ healthcare organizations, representing ~11.7% of all
              defended businesses. This vertical concentration reflects intentional go-to-market
              investment driven by HIPAA compliance requirements and the severity of healthcare
              ransomware attacks.

              Implied averages (all estimated):
              - Average defended businesses per MSP partner: ~17 (120,000 businesses / 7,000 partners)
              - Average endpoints per defended business: ~25–33 (4M endpoints / 120,000 businesses)
              - Average identities per defended business: ~17 (2M identities / 120,000 businesses)

              These averages reflect Huntress's SMB concentration: a 30-person dental office might
              have 30 endpoints and 35 M365 identities, aligning well with these implied averages
              and confirming the customer profile.
            claimRefs:
              - CU005
              - CU006
              - CU007
              - CU008
              - CU009
      - number: '6.3'
        title: Named Customer Proof and Reference Quality
        blocks:
          - type: paragraph
            body: |
              Huntress's customer evidence takes several forms due to the indirect MSP channel model.
              Named end-customer case studies are limited because SMBs typically receive Huntress
              coverage as part of their MSP's stack rather than as a direct relationship with Huntress.
              The most verifiable customer proof comes from three categories:

              (1) Sector-level counts: Huntress explicitly disclosed 14,000+ healthcare organizations
              defended (blog, 2025) and 120,000+ total businesses (ForgePoint Capital, Sep 2024).
              These counts are the primary adoption proof rather than named logos.

              (2) MSP partner testimonials: Huntress's website and partner community pages feature
              named MSP testimonials from IT service providers who have deployed Huntress across their
              customer base. These testimonials document production deployment, threat detection
              outcomes, and the SOC response value. Multiple MSP operators on G2 and Spiceworks
              provide named reviews describing production deployments catching active threats.

              (3) Third-party review documentation: G2 reviewers (verified user accounts) have
              documented specific threat detection events—including catching fileless attacks and
              LOLBAS threats that preceded ransomware—providing outcome-level proof rather than
              simple satisfaction ratings. Gartner Peer Insights similarly documents production
              deployment outcomes in SMB environments.

              (4) Industry incident proofs: Huntress regularly publishes threat reports and incident
              documentation (e.g., the 2025 Cyber Threat Report) that describe real-world attacks
              detected and remediated through its platform. These represent implicit named-deployment
              proof via incident narratives even where customer names are anonymized.

              Key limitation: Huntress does not publish traditional enterprise case studies with named
              enterprise logos, ARR contribution, and measurable ROI outcomes. The customer proof is
              volumetric (120K+ businesses) and qualitative (review platforms) rather than the
              named-account reference format typical of enterprise security vendors. This is
              appropriate given the SMB indirect model but limits reference quality for diligence.
            claimRefs:
              - CU010
              - CU011
              - CU015
              - CU016
              - CU017
      - number: '6.4'
        title: Vertical Market Penetration and Segment Strategy
        blocks:
          - type: paragraph
            body: |
              Huntress has moved from a broad SMB-horizontal approach toward explicit vertical
              market investment, naming healthcare, financial services, and SLED as priority verticals
              in its Series D messaging and creating dedicated vertical web pages.

              Healthcare is the most developed vertical. Huntress has dedicated healthcare-specific
              landing pages, blog content, and case studies emphasizing HIPAA compliance support,
              ransomware defense for patient records, and the vulnerability of under-resourced
              healthcare IT. The 14,000+ healthcare organizations figure was prominently disclosed
              in a 2025 Huntress blog post.

              Financial services is the second-named vertical. The FTC Safeguards Rule (effective
              for most non-bank financial institutions since June 2023) mandates qualified information
              security programs including continuous monitoring—a requirement Huntress's managed EDR
              directly satisfies. Small RIAs, CPA firms, mortgage brokers, insurance agencies, and
              community banks are natural targets for MSP-delivered Huntress coverage.

              SLED (State/Local/Education) is the third vertical. K-12 school districts and
              municipalities are among the most targeted ransomware victims because their IT
              budgets are minimal and their data is sensitive. Huntress's sub-$5/endpoint/month
              pricing is achievable within SLED budgets in a way that enterprise MDR at $15–$40/
              endpoint is not.

              Legal sector: law firms holding client confidential data face increasing state bar
              association ethics obligations requiring adequate cybersecurity; Huntress actively
              markets to this segment.

              Geographic: Primarily US-based customer base as of 2024. Canada is an established
              secondary market. APAC and EMEA expansion were listed as Series D use-of-funds
              priorities, signaling international customers represent a small minority of current
              ARR but are a growth priority.
            claimRefs:
              - CU012
              - CU013
              - CU014
              - CU029
      - number: '6.5'
        title: Customer Satisfaction and Review Platform Signals
        blocks:
          - type: paragraph
            body: |
              Independent review platform data consistently places Huntress among the top-rated
              managed EDR vendors, with particular strength in the SMB and MSP segments:

              G2: Huntress has been ranked #1 in the EDR (Endpoint Detection and Response) category
              for 9 consecutive quarters as of Summer 2024, based on user satisfaction and market
              presence scores. G2 reviewers consistently cite the 24/7 SOC response, ease of MSP
              deployment, and actionable threat alerts as key differentiators. G2 competitor
              comparison data positions Huntress favorably against Blackpoint Cyber, CrowdStrike,
              and SentinelOne for the MSP/SMB use case.

              Gartner Peer Insights: Huntress carries strong ratings in the Managed Detection and
              Response category, with reviewers specifically noting the product's appropriateness for
              resource-constrained IT environments.

              Capterra: Customer reviews emphasize agent-based deployment simplicity and quality of
              SOC-generated remediation guidance, with strong overall satisfaction ratings.

              Trustpilot: Reviews reflect positive overall sentiment, particularly from MSPs describing
              Huntress as a core component of their managed security stack.

              Reddit r/MSP community: Practitioner discussions consistently recommend Huntress as
              the preferred MDR option for SMB-focused MSPs, with strong endorsements for catching
              fileless attacks and LOLBAS threats that endpoint AV products miss.

              Adverse review themes: Some customers cite annual price increases (from $2.50 to
              $3.50/endpoint) without equivalent feature additions. A minority mention occasional
              false positives and the need for MSP involvement to resolve alerts.
            claimRefs:
              - CU018
              - CU019
              - CU020
              - CU021
              - CU022
      - number: '6.6'
        title: Channel Economics, Retention Durability, and Concentration Risk
        blocks:
          - type: paragraph
            body: |
              Huntress's entire distribution model flows through MSP partners, creating a
              structurally different retention dynamic than direct-to-SMB vendors.

              MSP switching costs are high: an MSP standardizing on Huntress faces substantial
              operational disruption to switch—agent re-deployment across all customer endpoints,
              retraining of technicians, reconfiguration of alert workflows. Once embedded, Huntress
              tends to stay.

              The inverse concentration risk is severe: if a large MSP partner churns, all of its
              SMB clients leave simultaneously. A single large-MSP churn event is not a customer
              event—it is a portfolio event. This is the defining adverse risk in Huntress's
              customer chapter.

              Net Revenue Retention (NRR) and Gross Revenue Retention (GRR) are not publicly
              disclosed. Based on 70%+ ARR growth for 3 years and the expansion mechanics (more
              endpoints, more identities, more products per partner over time), NRR is inferred to
              be well above 100%—likely in the 115–130% range—but this is inference, not fact.

              Huntress's expansion mechanics within existing MSP relationships include:
              (1) Natural endpoint expansion as MSPs add SMB clients;
              (2) Identity (ITDR) upsell on existing endpoint customers—1M to 2M identities in ~6 months;
              (3) SIEM upsell launched 2024;
              (4) Security Awareness Training (SAT) cross-sell via Curricula.

              Average ARR per MSP partner: ~$14K/year at $100M ARR / 7,000 partners. This average
              obscures a wide distribution—the top 5–10% of partners likely contribute 30–50% of
              ARR, while the long tail contributes the remainder. Customer concentration by partner
              is unknown and undisclosed.
            claimRefs:
              - CU023
              - CU024
              - CU025
              - CU026
              - CU027
              - CU028
      - number: '6.7'
        title: Exhibits
        blocks:
          - type: callout
            title: Channel Dependency — Large-MSP Churn is a Portfolio-Level Event
            body: |
              Huntress's 100% MSP-channel distribution model creates an asymmetric churn risk:
              when a large MSP partner leaves, all of its defended SMB businesses leave simultaneously.
              A single large MSP managing 500–1,000 SMB clients could represent $7M–$14M of ARR
              (at $14K average partner ARR, with large partners likely exceeding this). This is not
              a customer churn event—it is a portfolio event. Investors must obtain MSP partner
              concentration data (top-10-partner ARR waterfall) as a first-priority diligence item.
            calloutType: risk
            claimRefs:
              - CU027
              - CU028
          - type: callout
            title: G2
            body: |
              Huntress's sustained #1 G2 EDR ranking over 9 consecutive quarters (confirmed by the
              Summer 2024 G2 report and Huntress press release) is exceptional for a product competing
              against CrowdStrike, SentinelOne, and Microsoft Defender. G2 rankings are driven by
              verified end-user reviews and are a reliable independent signal of customer satisfaction.
              This ranking is particularly meaningful because G2's SMB reviewer pool exactly matches
              Huntress's target customer base.
            calloutType: strength
            claimRefs:
              - CU018
          - type: callout
            title: Healthcare Vertical — 14,000+ Orgs Signals Deep Penetration and Regulatory Tailwind
            body: |
              With 14,000+ healthcare organizations defended—representing ~11.7% of Huntress's total
              customer base—healthcare has achieved disproportionate penetration. HIPAA compliance
              requirements, ransomware severity in healthcare, and the high consequence of downtime
              create a structurally strong buying trigger. The regulatory tailwind is durable and
              expanding as CMS and HHS tighten cybersecurity requirements for healthcare providers.
            calloutType: strength
            claimRefs:
              - CU011
              - CU012
          - type: callout
            title: NRR and GRR Not Disclosed — Critical Gap for Investment Thesis Validation
            body: |
              Huntress has not publicly disclosed Net Revenue Retention (NRR) or Gross Revenue
              Retention (GRR)—the two most important metrics for validating the expansion model
              underpinning 70%+ ARR growth. Without NRR data, investors cannot confirm whether
              growth is driven by new partner acquisition (less durable) or same-partner expansion
              (more durable). An NRR below 100% would indicate contraction within existing partners
              and would fundamentally change the valuation thesis.
            calloutType: risk
            claimRefs:
              - CU023
              - CU026
