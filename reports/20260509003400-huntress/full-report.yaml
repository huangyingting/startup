  - id: FV001
    title: Recommendation Logic
    type: flow
    layout: wide
    summary: |
      Maps the logical chain from Huntress's evidence base (market, proof, moat, economics, risk,
      valuation) to the WATCH/HOLD recommendation, illustrating how evidence gaps (NRR, gross
      margin) block conviction upgrade from WATCH to BUY.
    data:
      nodes:
        - id: market
          label: Large TAM (33M+ SMBs)
          detail: Underserved SMB segment; <15% endpoint coverage; MDR market growing 25%+ CAGR
          tone: positive
        - id: proof
          label: 'Proof: $100M ARR, 70%+ growth'
          detail: Three consecutive years of 70%+ YoY ARR growth; 7,000+ MSP partners; confirmed Sep 2024
          tone: positive
        - id: moat
          label: 'Moat: MSP Channel Flywheel'
          detail: 7,000 MSP relationships = distribution moat; competitors must replicate over years
          tone: positive
        - id: gaps
          label: Evidence Gaps (NRR, GM)
          detail: NRR undisclosed; gross margin undisclosed; no S-1; IPO timeline slipped
          tone: adverse
        - id: risks
          label: Key Risks
          detail: Microsoft competition; SOC labor margin compression; IPO delay; single-channel dependency
          tone: warning
        - id: valuation
          label: 'Valuation: 15x ARR ($1.5B+)'
          detail: Fair value at current stage; above MDR peers (6.5-9x); below pure-software (20-22x)
          tone: neutral
        - id: recommendation
          label: 'Recommendation: WATCH/HOLD'
          detail: WATCH for new investors; HOLD for existing A-C shareholders. Upgrade to BUY requires NRR ≥110% + GM ≥70%
          tone: neutral
      edges:
        - from: market
          to: proof
          label: validates TAM
        - from: proof
          to: moat
          label: channel built on
        - from: moat
          to: valuation
          label: justifies premium
        - from: gaps
          to: recommendation
          label: blocks BUY signal
        - from: risks
          to: recommendation
          label: constrains confidence
        - from: valuation
          to: recommendation
          label: frames return profile
        - from: proof
          to: recommendation
          label: supports HOLD
    approximationNotes: >-
      Flow logic is research-team analytical framework. Recommendation is based on publicly available information only;
      no access to company financials or data room.
    claimRefs:
      - CV001
      - CV007
      - CV008
      - CV009
  - id: FV002
    title: Valuation Sensitivity
    type: bar
    layout: standard
    summary: |
      Sensitivity of Huntress's implied IPO valuation to ARR multiple, holding ARR constant at
      the base-case $200M. Illustrates the $2B range between bear-case (8x) and bull-case (20x)
      multiples, driven primarily by gross margin and NRR transparency.
    data:
      items:
        - label: '8x ARR (bear: GM<65%, NRR<110%)'
          value: 1600
          detail: Comparable to Rapid7 (3x) adjusted upward for higher growth; pure managed-services valuation
          tone: adverse
          claimRefs:
            - CV019
        - label: 10x ARR (MDR services comp floor)
          value: 2000
          detail: Consistent with Blackpoint Cyber estimated multiple and Arctic Wolf 2022 round
          tone: warning
          claimRefs:
            - CV028
        - label: 12x ARR (platform premium over MDR)
          value: 2400
          detail: Reflects partial platform mix shift; GM ~65-68%; NRR ~110-113%
          tone: neutral
          claimRefs:
            - CV018
        - label: 15x ARR (current Series D mark)
          value: 3000
          detail: Current reference multiple; defensible for 70%+ growth with 100% recurring revenue
          tone: neutral
          claimRefs:
            - CV007
        - label: 17x ARR (platform growth premium)
          value: 3400
          detail: SIEM/ITDR at >20% of ARR; GM approaching 70%; NRR >115% confirmed
          tone: positive
          claimRefs:
            - CV017
        - label: '20x ARR (bull: high-growth SaaS comp)'
          value: 4000
          detail: Comparable to SentinelOne / CrowdStrike at 30%+ growth; requires GM >72% and NRR >120%
          tone: positive
          claimRefs:
            - CV017
        - label: '22x ARR (upside: CrowdStrike-class)'
          value: 4400
          detail: Pure software peers benchmark; would require GM >75% and FCF breakeven — unlikely pre-IPO
          tone: positive
          claimRefs:
            - CV022
    approximationNotes: >-
      Sensitivity analysis holds ARR at $200M (base-case estimate). Actual IPO ARR and multiples will differ. Multiple
      benchmarks derived from 2024 public cybersecurity comp set.
    claimRefs:
      - CV017
      - CV018
      - CV019
      - CV022
      - CV023
  - id: FV003
    title: Valuation / Return Range
    type: range
    layout: wide
    summary: |
      Illustrates the range of Huntress's implied valuation across bull, base, and bear cases,
      and for a strategic M&A alternative, showing the explicit low/mid/high bounds for each
      scenario based on ARR and multiple assumptions.
    data:
      items:
        - label: Bear Case (2027-2028)
          low: 1200
          mid: 1350
          high: 1500
          unit: USD M
          detail: $150M ARR × 8-10x; growth deceleration, gross margin pressure, Microsoft competition
          claimRefs:
            - CV019
        - label: Base Case (2026-2027)
          low: 2500
          mid: 3000
          high: 3500
          unit: USD M
          detail: $200M ARR × 12-17x; steady MDR growth, modest platform expansion, normal market conditions
          claimRefs:
            - CV018
        - label: Bull Case (2027)
          low: 4000
          mid: 5000
          high: 6000
          unit: USD M
          detail: $250M+ ARR × 16-24x; strong NRR+GM disclosure, SIEM at scale, favorable SaaS multiples
          claimRefs:
            - CV017
        - label: M&A Exit (Strategic)
          low: 1800
          mid: 2750
          high: 3750
          unit: USD M
          detail: $150-250M ARR × 12-15x strategic premium; PANW, Cisco, Broadcom as potential acquirers
          claimRefs:
            - CV020
    approximationNotes: >-
      All ranges are research-team analytical constructs based on 2024 public market comp multiples. No audited
      financials or confirmed NRR available. Ranges reflect probability-weighted uncertainty, not confidence intervals.
    claimRefs:
      - CV017
      - CV018
      - CV019
      - CV020
  - id: FV004
    title: Investment KPIs
    type: kpi
    layout: standard
    summary: |
      IC-ready scoring of Huntress across seven investment dimensions: market, proof, moat,
      economics, risk, valuation, and evidence quality. Highlights the evidence gaps that
      prevent conviction upgrade from WATCH to BUY.
    data:
      items:
        - label: Market Opportunity
          value: High
          detail: 33M+ SMBs, <15% covered; MDR market growing 25%+ CAGR; underpenetrated globally
          tone: positive
          claimRefs:
            - CV001
        - label: Proof of Traction
          value: High
          detail: $100M ARR, 70%+ YoY growth (3 years confirmed), 7,000+ MSP partners, 120K+ businesses
          tone: positive
          claimRefs:
            - CV002
        - label: Competitive Moat
          value: Medium-High
          detail: MSP channel flywheel is durable; Microsoft bundling is a real risk; ITDR/SIEM differentiate
          tone: positive
          claimRefs:
            - CV003
        - label: Unit Economics
          value: Unknown
          detail: NRR undisclosed; gross margin undisclosed (est. 65-72%); burn ratio ~0.6 est. (efficient)
          tone: warning
          claimRefs:
            - CV013
        - label: Risk Profile
          value: Medium-High
          detail: NRR opacity, gross margin compression risk, IPO delay, Microsoft competition, single-channel dependency
          tone: adverse
          claimRefs:
            - CV005
        - label: Valuation Stance
          value: Fair (15x ARR)
          detail: Above MDR comps (6.5-9x), below software comps (20-22x); multiple stale since Jun 2024
          tone: neutral
          claimRefs:
            - CV007
        - label: Evidence Quality
          value: Medium (private company)
          detail: No audited financials, no S-1, no NRR; 2 independent data points confirm $100M ARR
          tone: warning
          claimRefs:
            - CV009
    approximationNotes: >-
      KPI ratings are research-team qualitative assessments. Evidence Quality reflects the depth and independence of
      publicly available data, not judgment on the company's actual performance.
    claimRefs:
      - CV001
      - CV002
      - CV007
      - CV009
