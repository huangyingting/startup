  - number: 8
    title: Valuation
    sections:
      - number: '8.1'
        title: Investment Thesis and Anti-Thesis
        blocks:
          - type: paragraph
            body: |
              THESIS: Huntress is the best-positioned pure-play MDR vendor serving the underserved SMB
              segment via the MSP channel. The company has achieved the $100M ARR milestone with three
              consecutive years of 70%+ YoY growth—a rate that places it in the top decile of B2B SaaS
              at this stage. The TAM is structurally large: 33 million SMBs in the US alone with fewer
              than 15% having any dedicated endpoint security beyond bundled AV. Huntress's channel
              model (7,000+ MSP partners) creates a distribution flywheel that is capital-efficient
              and defensible—competitors must build equivalent MSP relationships to displace Huntress
              at scale. The platform expansion from pure EDR into identity (ITDR, 2M+ identities by
              early 2025), SIEM (launched 2024), and security awareness training (SAT via Curricula)
              increases total addressable revenue per MSP partner by 3-5x, extending the growth runway.
              The Series D at $1.5B+ from Kleiner Perkins (lead), Meritech Capital, and Sapphire Ventures
              signals tier-1 VC conviction in the IPO path and validates a 15x ARR entry multiple.

              ANTI-THESIS: The bull case rests on multiple assumptions that are currently unverifiable:
              (1) NRR has never been publicly disclosed—if it is below 110%, the 15x multiple and
              growth story are both at risk; (2) gross margins are undisclosed and structurally compressed
              by the 24/7 SOC human labor component, which may be 25-35% of revenue—if blended gross
              margins are below 65%, the company cannot justify a SaaS-like multiple at IPO; (3) Microsoft
              Defender for Business is bundled into M365 Business Premium at $22/user/month, creating
              a pricing gravity toward free or near-free endpoint coverage that MSPs can deliver without
              Huntress; (4) the IPO targeted for "late 2025–mid 2026" has already slipped (no S-1 filed
              as of May 2026), creating growing equity overhang and capital markets timing risk; (5) the
              MSP channel is Huntress's only distribution lever—the loss of top-20 MSP partners would
              represent a material revenue event with no direct sales fallback. The thesis breaks if any
              two of these risks materialize simultaneously.
            claimRefs:
              - CV001
              - CV002
              - CV003
              - CV004
              - CV005
              - CV006
      - number: '8.2'
        title: Recommendation, Confidence and Valuation Stance
        blocks:
          - type: paragraph
            body: |
              RECOMMENDATION: WATCH (for new investors) / HOLD (for existing Series A-C shareholders).
              For Series D investors (Kleiner Perkins, Meritech, Sapphire): base-case 2x return over
              2-3 years; bull-case 3-4x; bear-case approximately flat with liquidation preference protection.

              CONFIDENCE: Medium. The positive case is supported by confirmed $100M ARR, verified 70%+
              YoY growth, and three years of consistent performance. The negative case is obscured by
              the absence of audited financial statements, undisclosed NRR, undisclosed gross margin,
              and no S-1 on file as of May 2026.

              RISK RATING: Medium-High. The three dominant risks—NRR opacity, gross margin below
              SaaS-threshold (70%), and IPO delay—are individually material and compounding. No single
              risk is certain to materialize, but the probability-weighted downside from simultaneous
              realization is severe (bear-case $1.2-1.5B vs. Series D price of $1.5B+).

              VALUATION STANCE: AT FAIR VALUE for current stage. The 15x ARR multiple on $100M ARR
              is consistent with a high-growth, partially-disclosed private company in the managed
              security segment—above pure-MDR comps (Arctic Wolf 6.5x, Blackpoint 9x) and below pure-
              software public comps (CrowdStrike 21x, SentinelOne 22x). The premium over MDR peers
              is justified by faster growth; the discount to public software peers is justified by
              services margin compression. However, the current multiple may be stale—the valuation
              was set in June 2024 and ARR has likely grown to $130-150M by mid-2026 (implied by 70%
              trajectory decelerating to ~30%), which would reduce the effective multiple to 10-12x
              at current price—making Huntress potentially attractive if IPO pricing converges to $3B+.

              TARGET RETURN/HOLD/EXIT: For a new investor entering at current $1.5B+ valuation mark,
              the base-case 2x return to $3B at IPO requires 24-36 months hold. A 3x return ($4.5B)
              requires bull-case conditions. Bear-case entry at this price is flat-to-negative without
              preferred stock protection terms.
            claimRefs:
              - CV007
              - CV008
              - CV009
              - CV010
              - CV011
      - number: '8.3'
        title: Financing Context, Entry Discipline and Preference Overhang
        blocks:
          - type: paragraph
            body: |
              Huntress has raised approximately $310M across five rounds from 2018 to June 2024:
              Seed (~$10M, 2018, ForgePoint Capital); Series A (undisclosed, 2020, ForgePoint);
              Series B (~$40M, 2021, JMI Equity + ForgePoint); Series C (~$60M, 2022, JMI Equity);
              Series D ($150M, June 2024, Kleiner Perkins lead + Meritech + Sapphire Ventures).
              Total capital raised of ~$310M against $100M ARR implies a capital-to-ARR ratio of 3.1x,
              at the upper end of Bessemer's "good" benchmark (2-3x) for SaaS companies, reflecting
              the SOC labor costs that prevent free cash flow generation typical of pure-software peers.

              The Series D post-money valuation of $1.5B+ carries standard preferred-stock mechanics:
              liquidation preference, anti-dilution protection, and possibly ratchets (not publicly
              disclosed). In a bear-case IPO at $1.5B, Series D investors recover capital but common
              shareholders (including employees) receive minimal proceeds. This preference overhang
              is material and standard for a late-stage VC-backed company; it does not change the
              growth thesis but affects the downside payoff distribution.

              Entry discipline for new investors: public evidence supports the 15x ARR multiple as
              of the June 2024 data point. However, investors entering in secondary market transactions
              should seek a 20-25% discount to the last-round mark to account for liquidity discount,
              NRR opacity risk, and IPO delay risk. At $1.0-1.2B entry (implied 10-12x ARR on ~$100M),
              the risk-reward is favorable: 3x+ to bull-case $5B, 2.5x to base-case $3B, and flat-to-
              positive even in the bear case. No secondary transaction data is publicly available as
              of May 2026, suggesting limited secondary market activity to date.

              Burn and runway: the estimated burn ratio of 0.6 (burn/new ARR) at 70% growth implies
              ~$42M annual burn; at this rate, the $150M Series D provides approximately 3.5 years of
              runway from June 2024 (through ~late 2027), sufficient to reach IPO under base and bull
              cases without requiring additional financing. The runway estimate is low-confidence due
              to absence of disclosed burn rate or cash position.
            claimRefs:
              - CV012
              - CV013
              - CV014
              - CV015
              - CV016
      - number: '8.4'
        title: Bull, Base and Bear Scenarios
        blocks:
          - type: paragraph
            body: |
              Bull case (IPO 2027, favorable conditions): Huntress demonstrates $250M+ ARR at 25-30%
              YoY growth, delivers audited gross margins above 75% (driven by SIEM and ITDR software
              layers displacing SOC-heavy MDR as a share of revenue), and confirms NRR above 120%
              based on per-endpoint and per-identity expansion. Public cybersecurity markets remain
              favorable with CrowdStrike and SentinelOne sustaining 20x+ multiples. At 20x ARR,
              the implied valuation is approximately $5B. Probability signal: Low-Medium (~20-25%).
              The main positive catalyst is SIEM adoption—if Huntress's MSP-optimized SIEM reaches
              $50M+ ARR by 2026, the platform mix shift to software is credible.

              Base case (IPO 2026-2027, normal conditions): Huntress reaches approximately $200M ARR
              at 15-20% growth in the IPO year, consistent with the standard deceleration seen in SaaS
              businesses scaling from $100M to $200M. Gross margins are 65-72% (unchanged from current
              estimated range); NRR is approximately 115%. At 15x ARR multiple, implied valuation is
              approximately $3B. This represents 2x on the Series D. Probability signal: Medium (~45-50%).
              The base case requires sustained MSP partner expansion (to 10,000+ partners) and ITDR
              continuing to grow from 2M to 5M+ identities.

              Bear case (IPO delay or multiple compression): ARR decelerates to approximately $150M
              at 10-15% growth (caused by MSP churn, Microsoft competition, or limited international
              traction) and gross margins compress below 65%. At 8-10x ARR multiple, implied valuation
              is $1.2-1.5B—at or below the Series D price. Probability signal: Low-Medium (~25-30%).
              Bear-case triggers include: NRR disclosure revealing churn above 10%, gross margin
              audited below 62%, or public market SaaS multiple compression below 10x sector-wide.

              Downside trigger: any single bear-case trigger combined with continued IPO delay beyond
              Q4 2027 would likely result in a down-round or forced trade sale at below-$1.5B, activating
              Series D liquidation preference mechanics and concentrating proceeds to preferred holders.
            claimRefs:
              - CV017
              - CV018
              - CV019
              - CV020
              - CV021
      - number: '8.5'
        title: Comparable Company Set
        blocks:
          - type: paragraph
            body: |
              Public company comps (pure-software endpoint security, highest multiples):
              CrowdStrike (NASDAQ: CRWD) is the gold-standard comparable: ~$4B ARR in FY2025 (ended
              January 2025), $80-90B market cap, ~21x ARR multiple, >75% gross margins, Rule of 40
              score above 50 (32% growth + 30%+ FCF margin). CrowdStrike's sustained premium multiple
              validates that high-growth cybersecurity SaaS can command 20x+ at scale. Huntress
              aspires to this multiple but must close the gross margin gap to justify it.

              SentinelOne (NYSE: S): ~$700M ARR in FY25 Q3 (quarter ended October 2024), $14-18B
              market cap, ~20-25x ARR, >70% gross margins. SentinelOne illustrates how high-growth
              endpoint security commands premium multiples even while burning cash, as long as growth
              is above 30% YoY. The multiple has compressed from 40x+ to ~22x as growth decelerated
              from 70%+ to ~33%, confirming the growth/multiple relationship that governs Huntress's
              IPO scenario math.

              Palo Alto Networks (NASDAQ: PANW): ~$8B NGS ARR, ~$100B market cap, ~12-13x NGS ARR.
              Its "platformization" strategy—bundling SIEM, endpoint, cloud, and identity into a single
              platform—is the clearest competitive analog to Huntress's multi-product expansion.

              Rapid7 (NASDAQ: RPD): ~$800M ARR, ~$1.5-2B market cap, ~2-3x ARR. The cautionary comp—
              growth deceleration to below 10% YoY produced rapid multiple compression from 10x+ to
              sub-3x within 18 months. This is the most important downside comp for Huntress.

              Qualys (NASDAQ: QLYS): ~$500M ARR, ~$4B market cap, ~8x ARR. Mature, low-growth
              cybersecurity SaaS at 12% YoY—represents Huntress's valuation floor in a prolonged
              deceleration scenario.

              Private company comps (MDR-focused):
              Arctic Wolf: $1.3B valuation in 2022 at ~$200M ARR (6.5x ARR)—the most direct private
              comparable; lower multiple reflects both 2022 market conditions and higher services
              intensity. Arctic Wolf also raised at a $4.3B valuation in January 2021 (pre-downturn),
              illustrating significant multiple compression even for leading MDR vendors.

              Blackpoint Cyber: $190M Series C in 2023 (lead: Bain Capital Tech Opportunities) at an
              undisclosed valuation; estimated at approximately $800M-1B at ~$100M ARR (~9x ARR).
              Pure MDR focus, no platform expansion disclosed.

              Acquisition comp: Sophos was acquired by Francisco Partners at approximately $3.9B in
              2019 at roughly $400M in revenue (~10x). Sophos's MSP-channel model makes it the best
              M&A precedent for Huntress; the 10x multiple at acquisition suggests strategic buyers
              pay a modest premium to growth-stage private multiples for channel-rich security vendors.
            claimRefs:
              - CV022
              - CV023
              - CV024
              - CV025
              - CV026
              - CV027
              - CV028
      - number: '8.6'
        title: Exit Readiness and Final Diligence Asks
        blocks:
          - type: paragraph
            body: |
              IPO readiness: The CEO targeted "late 2025–mid 2026" in public statements in late 2024.
              As of May 2026, no S-1 has been filed with the SEC. The timeline has slipped by at
              least 6-12 months. Possible causes: (1) public market window was unfavorable in early
              2026; (2) organizational readiness (audited financials, CFO credentialing, board
              reconstitution) not complete; (3) ARR growth decelerated below the level required for
              a premium valuation. The absence of a public S-1 filing means no audited financials,
              revenue cohort data, or NRR are publicly available—maximizing investor uncertainty.

              Strategic M&A readiness: Huntress represents an attractive tuck-in acquisition for
              several strategic buyers. The MSP channel (7,000+ partners, 120,000+ SMBs) is a
              distribution asset that is difficult to replicate organically. Potential acquirers:
              Palo Alto Networks (expand MSP/SMB reach; complement Prisma and Cortex); Cisco (fill
              Talos MDR gap in SMB segment); Broadcom (leverage Symantec MSP channel); Qualys
              (expand managed service offering). An M&A transaction at 12-15x ARR on $150-200M ARR
              would yield $1.8-3.0B—a competitive outcome relative to the base-case IPO ($3B).

              Final diligence asks (priority-ordered):
              1. NRR and GRR: the single most important disclosure; must be obtained before any
              investment at current valuation. Target: verified NRR above 110% to justify current
              multiple.
              2. Audited gross margin: P&L access required. Target: confirmed blended gross margin
              above 70% to justify software-company valuation treatment.
              3. Updated ARR (post-September 2024): the last confirmed ARR was September 2024
              ($100M). Two years of unconfirmed growth creates significant uncertainty. Target:
              management disclosure of Q1 2026 ARR and growth rate.
              4. IPO timeline and S-1 status: confirmed timeline from CEO/CFO with S-1 drafting
              milestones. Delay beyond Q2 2027 would require a bridge financing assessment.
              5. MSP partner concentration: top-20 MSP partner revenue share and churn history.
              Target: no single partner above 5% of ARR.
            claimRefs:
              - CV029
              - CV030
              - CV031
              - CV032
              - CV033
      - number: '8.7'
        title: Exhibits
        blocks:
          - type: callout
            title: NRR Opacity Is the Single Largest Valuation Swing Factor
            body: |
              Net Revenue Retention has never been publicly disclosed by Huntress. It is the metric most
              correlated with revenue multiple in B2B SaaS: companies with NRR above 120% command 20x+;
              below 110% trade at 8-10x. The channel model (MSP intermediation) means NRR must be
              measured at the MSP level. If NRR is above 120%, Huntress deserves a premium to current
              15x; if below 110%, the current multiple is unjustified. This is the most urgent
              pre-IPO disclosure gap.
            calloutType: risk
            claimRefs:
              - CV034
          - type: callout
            title: 15x ARR Multiple Is Defensible but at the High End for a Managed-Services Business
            body: |
              Huntress's 15x ARR at Series D sits above direct MDR peers (Arctic Wolf 6.5x, Blackpoint
              ~9x) and below pure-software public comps (CrowdStrike 21x, SentinelOne 22x). The premium
              over MDR peers is justified by faster growth. But sustaining 15x into the IPO requires
              demonstrating gross margin expansion toward 70%+ or maintaining 30%+ YoY growth.
            calloutType: insight
            claimRefs:
              - CV007
              - CV022
              - CV023
              - CV027
          - type: callout
            title: IPO Timeline Has Already Slipped — Secondary Liquidity Pressure Building
            body: |
              CEO Kyle Hanslovan targeted an IPO within 18-24 months in late 2024 (late 2025-mid 2026).
              As of May 2026, no S-1 has been filed. This 6-12 month slip increases employee equity
              overhang, reduces competitive recruiting leverage, and raises the risk of missing a
              favorable IPO window. A delay beyond Q2 2027 would likely require a bridge or secondary
              liquidity program to retain key employees.
            calloutType: risk
            claimRefs:
