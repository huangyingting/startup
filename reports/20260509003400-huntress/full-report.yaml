  - id: TV005
    title: Thesis-Break and Kill Triggers Table
    columns:
      - Trigger
      - Threshold
      - Transmission to Thesis
      - Action Implication
    rows:
      - - NRR disclosed below 110%
        - NRR < 110% at S-1 filing
        - Direct multiple compression from 15x to 8-10x; growth sustainability impaired; channel model flaw exposed
        - Exit or reduce position immediately; MSP churn above 10% = structural problem
      - - Gross margin audited below 62%
        - Blended gross margin < 62% at S-1
        - >-
          SOC labor cost structure not scalable; path to software-like margins closed; raises ceiling from 15x to 10x or
          below
        - Re-model as services business (10x revenue ceiling); revise valuation down to $1-1.5B range
      - - ARR growth decelerates below 20%
        - Trailing 12-month ARR growth <20% at IPO filing
        - >-
          Huntress falls into Rapid7 comp bucket (sub-3x multiple); $200M ARR at 10x = $2B — below Series D entry for
          late investors
        - Short IPO; watch for Microsoft market share data confirming MDR price compression
      - - Microsoft MDR/Defender penetration above 30% in MSP channel
        - Defender deployed on >30% of Huntress MSP-covered endpoints
        - Direct endpoint churn risk; Huntress must cut price or lose volume; gross margin pressure compounds
        - Monitor ConnectWise, Kaseya channel data for Defender attach rates quarterly
      - - IPO delayed beyond Q2 2027 with no secondary liquidity event
        - S-1 not filed by June 2027
        - Employee equity overhang accelerates attrition; key engineering talent exits; growth engine at risk
        - Seek secondary purchase at 20-30% discount to last round; obtain board observer rights if possible
      - - Top-5 MSP partner exits or contract non-renewal
        - Loss of any single partner >3% ARR
        - Concentration risk confirmed; revenue step-down accelerates churn signal; multiple compression
        - Require customer concentration disclosures before any new investment at current valuation
    notes: >-
      Kill triggers are research-team constructs based on analogous SaaS/MDR investment diligence frameworks. Thresholds
      are indicative; actual triggers depend on full financial disclosure.
    claimRefs:
      - CV029
      - CV030
      - CV031
      - CV032
  - id: TV006
    title: Final Diligence Asks Table
    columns:
      - Priority
      - Topic
      - Missing Evidence
      - Why It Matters
      - Diligence Path
    rows:
      - - 1 (Critical)
        - Net Revenue Retention (NRR)
        - NRR never publicly disclosed; MSP-level vs. SMB-level NRR methodology unknown
        - Single highest-correlation metric with valuation multiple; undisclosed = worst-case assumed by investors
        - 'S-1 filing required; interim: request management disclosure of NRR by annual cohort with churn waterfall'
      - - 2 (Critical)
        - Audited Gross Margin
        - Gross margin undisclosed; estimated 65-72% but unverified; SOC labor as % of revenue unknown
        - >-
          10-point GM difference (65% vs. 75%) translates to 5-8x multiple shift; determines SaaS vs. services comp
          bucket
        - 'S-1 filing required; interim: request CFO presentation with CoGS breakdown and gross margin by product line'
      - - 3 (Critical)
        - ARR Update (post-Sep 2024)
        - 'Last confirmed ARR: $100M (Sep 2024); now 20+ months stale; no company update available'
        - >-
          Stale ARR creates uncertainty about whether 70%+ growth trajectory sustained; LATKA unverified estimate
          ($120M) inconsistent
        - Request Q1 2026 ARR and trailing 12-month growth rate from management or investor update
      - - 4 (High)
        - IPO Timeline and S-1 Status
        - No S-1 filed as of May 2026; CEO target of 'late 2025-mid 2026' missed; no public explanation
        - Extended private period raises equity overhang, attrition risk, and capital markets timing risk
        - Request board-level IPO roadmap with S-1 drafting milestones; inquire about 2027 window assessment
      - - 5 (High)
        - MSP Partner Concentration
        - Top-20 MSP partner ARR share not disclosed; no churn or renewal rate available
        - 100% channel dependency makes MSP concentration a direct revenue risk; top partner loss = material step-down
        - Request top-10 partner concentration data under NDA; negotiate audit rights in any new investment
      - - 6 (Medium)
        - International Revenue and Pipeline
        - International revenue cited as Series D use-of-funds priority but ARR contribution not disclosed
        - >-
          International adds geographic risk (GDPR, currency) and revenue diversification; current contribution likely
          <10%
        - Request ARR split by geography and number of international MSP partners by region
    notes: >-
      Priority order reflects materiality to valuation decision. Items 1-3 are blocking for conviction at current
      valuation. Items 4-6 are important for risk calibration but do not individually block the thesis.
    claimRefs:
      - CV033
      - CV034
      - CV035
      - CV036
