callouts:
  - calloutType: strength
    title: MDR Category Growing 22% CAGR — Huntress Positioned at Epicenter
    body: |
      The MDR market is growing at a ~22% CAGR with no sign of deceleration as ransomware
      attack complexity increases and SMBs face mandatory EDR requirements from insurance carriers.
      Huntress is the purpose-built SMB-focused MDR vendor and has achieved 70%+ growth for two
      consecutive years, meaning it is growing 3x faster than the overall MDR market. This implies
      market share gains, not just market-tide lifting.
    claimRefs: [CM007, CM008, CM016]

  - calloutType: risk
    title: Wide TAM Estimate Variance Signals Diligence Risk
    body: |
      SMB cybersecurity TAM estimates range from $39.8B (Growth Market Reports) to $90B (Techaisle)
      for 2024—a 2.3x range. This is not noise; it reflects genuine scope differences. Investors
      should treat the $52B Analysys Mason estimate as the most conservative credible figure for
      Huntress's actually addressable market, as it focuses on the MSP-mediated security channel.
      The $39.8B bottom-up estimate is the most defensible anchor for diligence.
    claimRefs: [CM004, CM005, CM006, CM022]

  - calloutType: insight
    title: Cyber Insurance Is Now a Non-Discretionary Adoption Driver
    body: |
      Since 2022, underwriters including Lloyd's of London and major US carriers have made verified
      EDR deployment a precondition for cyber insurance coverage. For MSPs who serve compliance-
      required clients (healthcare, financial services), this translates to a compliance-driven
      pull for Huntress-class tools that does not depend on security maturity conviction. This
      structural demand driver reduces Huntress's dependence on security budget cycle timing.
    claimRefs: [CM017, CM018]

acknowledgedWarnings:
  - dimension: unverifiedSource
    reason: >
      Sources SM007 (Analysys Mason) and SM009 (Cognitive Market Research) returned 403 paywalled
      or bot-blocked responses. Both are cited via secondary sources (web search results,
      MVP analysis) that clearly quote the underlying figures; the facts are corroborated by
      multiple independent analyst sources cited in the same research round. The methodologies
      and figures from these sources are well-established in industry reporting and are flagged
      as medium-confidence estimates in the analysis.
  - dimension: unverifiedSource
    reason: >
      Source SM006 (Expert Insights MDR statistics article) and SM025 (Microsoft SMB Cybersecurity
      Report PDF) were not retrieved via the fetch-url script during this research round. SM006
      is an aggregator article whose claims are corroborated by the primary Mordor Intelligence
      report (SM004). SM025 (Microsoft PDF) is cited only for general SMB attack statistics
      that are corroborated by multiple other sources in this chapter (SM002, SM005, SM020).
      Both sources have been removed from primary claim sourceRefs where uncorroborated, and
      their claims are supported by independently fetched sources.

