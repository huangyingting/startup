company:
  name: Huntress

chapter:
  number: 2
  title: Market Analysis
  summary: |
    Huntress competes at the intersection of three growing markets: SMB cybersecurity (TAM ~$39.8B
    in 2024, growing at ~13% CAGR to $110B by 2033), managed detection and response (MDR, $4.2B
    in 2025, growing at ~22% CAGR to $11.3B by 2030), and the MSP-mediated security channel.
    The SMB segment is structurally underserved—99% of US businesses are SMBs, yet historically
    most enterprise-grade security tools were priced and sized for the Fortune 500. Demand is
    accelerating due to ransomware surge, AI-powered attacks, regulatory pressure, and digital
    transformation. Key adoption constraints include SMB budget sensitivity, limited in-house
    IT staff, and difficulty deploying complex security stacks. Huntress's channel-first MSP
    model directly addresses these constraints; the MSP market itself represents a multiplicative
    force, routing security spend from thousands of MSPs to hundreds of thousands of SMBs.
    Multiple sizing estimates disagree significantly on total market, reflecting genuine
    methodological divergence that analysts and investors should treat as a range, not a point.

sections:
  - id: SM001
    title: Market Boundaries and Definitions
    body: |
      Huntress operates in a market bounded by three nested categories: (1) global SMB
      cybersecurity spending, which encompasses all security products and services purchased by
      businesses with fewer than 500 employees; (2) the managed security services / MDR subset,
      where a vendor provides human-led continuous monitoring, detection, and response rather than
      software licenses alone; and (3) the MSP-mediated cybersecurity channel, in which managed
      service providers bundle security into their IT services stack for SMB clients.

      Excluded from Huntress's directly addressable market are: pure enterprise security (Fortune
      500 / large enterprise contracts requiring minimum 300+ endpoint deployments and enterprise
      procurement cycles), consumer security products (antivirus for individuals), and standalone
      firewall or network-perimeter hardware. The status-quo substitute for Huntress is a fragmented
      stack of point products (antivirus + endpoint agent + manual SOC monitoring) managed by an
      underfunded in-house IT generalist or a bare-bones MSP—a substitute that provides substandard
      protection but exists at zero incremental cost to the customer.

      Adjacencies include SIEM (now a Huntress product), security awareness training (addressed
      via Curricula acquisition), identity and access management (IAM), and vulnerability
      management. Huntress is actively expanding into all of these adjacencies, enlarging its SAM.
    claimRefs: [CM001, CM002, CM003]

  - id: SM002
    title: Market Sizing and Growth Trajectories
    body: |
      Market sizing for the SMB cybersecurity space varies substantially by analyst methodology.
      Growth Market Reports estimates the global SMB cybersecurity market at $39.8 billion in 2024,
      growing at a 13.2% CAGR to reach $110.2 billion by 2033. Techaisle projects global SMB IT
      security spending at $90 billion for 2024, a 9.4% year-over-year increase. Analysys Mason
      sizes the SMB cybersecurity sub-market more conservatively at $52 billion by 2028. These
      estimates diverge because of scope differences: "SMB IT security spend" (Techaisle) counts
      broader IT budget, while "SMB cybersecurity market" estimates from Growth Market Reports
      and Analysys Mason focus on dedicated security products and services.

      The MDR sub-market, Huntress's most direct category, is sized by Mordor Intelligence at
      $4.19 billion in 2025, growing at a 21.95% CAGR to $11.3 billion by 2030. This is a
      narrower category than total SMB security but captures the human-led managed service
      premium that Huntress commands. Techaisle data shows Managed Detection and Response
      is the single fastest-growing security category for SMBs and midmarket firms, with a
      projected 112% adoption increase—the highest of any security category.

      Huntress's current $100M ARR implies a market share of approximately 2.4–2.5% of the
      MDR sub-market ($4.2B, 2025 estimate) and less than 0.3% of the broad SMB cybersecurity
      TAM ($39.8B, 2024 estimate). Both figures underscore substantial headroom. The company's
      $1.5B valuation at approximately 15x ARR implies investor expectation of material market
      share gains in the MDR and SMB security segments over the next 5 years.
    claimRefs: [CM004, CM005, CM006, CM007, CM008, CM009]

  - id: SM003
    title: Buyer, User, and Payer Segmentation
    body: |
      Huntress's go-to-market operates through a two-tier channel structure: (1) MSP partners as
      direct buyers and payers (they purchase Huntress licenses per endpoint/identity and mark up
      or bundle into their service fee), and (2) SMB businesses as end-users who experience the
      product indirectly through their MSP. This creates a compound buyer dynamic: the MSP's
      primary decision is whether to standardize on Huntress within their security stack, while
      the SMB's role is primarily as the end-consumer whose outcome drives retention.

      By customer segment, Huntress targets:
      - Healthcare SMBs (14,000 healthcare clients): Medical practices, clinics, specialty
        healthcare providers—regulated, breach-sensitive, often running legacy systems.
      - State and local government (SLED): Underfunded IT departments with mandatory compliance
        requirements and rising ransomware targeting by nation-state actors.
      - Financial services SMBs: Community banks, credit unions, independent advisors—subject to
        state and federal financial regulation and cyber insurance requirements.
      - General SMBs (majority of base): Professional services, retail, hospitality, manufacturing
        with 10–250 employees, relying entirely on MSP for IT support.

      Budget ownership lies with the MSP's vCISO or account manager in most partner-led deals.
      For direct SMB deals, the decision maker is typically the IT director, CEO, or CFO.
      Adoption triggers include: (1) a near-miss ransomware event or actual breach at a peer
      business, (2) cyber insurance renewal requiring endpoint detection evidence, (3) MSP
      upsell motion during contract renewal, and (4) regulatory compliance audit requirement.
    claimRefs: [CM010, CM011, CM012, CM013, CM014]

  - id: SM004
    title: Growth Drivers and Adoption Constraints
    body: |
      The primary demand drivers accelerating SMB cybersecurity adoption in 2024–2026 are:

      Ransomware surge and SMB targeting: SMBs now constitute 46% of all cybersecurity breach
      incidents (Verizon DBIR), and 82% of SMBs reported falling victim to ransomware in 2021
      (Huntress/MVP research). Average SMB breach cost rose from $2.92M in 2022 to $3.31M in
      2023. The threat is no longer theoretical, which is the most powerful demand accelerant.

      AI-powered attack scaling: Threat actors now use AI to automate phishing at scale, produce
      convincing business email compromise (BEC), and accelerate credential stuffing. The 2025
      Huntress Cyber Threat Report documents proliferating remote access trojans (RATs),
      sub-17-hour ransomware deployment windows, and living-off-the-land techniques that bypass
      traditional AV. Each new attack capability increases the value of human-led MDR.

      Cyber insurance requirements: Insurance underwriters increasingly mandate verified EDR
      deployment as a precondition for coverage. This creates a non-discretionary adoption trigger
      that MSPs can use to standardize their customer base on security products like Huntress.

      Regulatory pressure: HIPAA (healthcare), state-level data breach notification laws, and
      emerging federal cybersecurity frameworks create compliance-driven demand especially in
      healthcare and SLED segments where Huntress is expanding.

      Adoption constraints include: SMB budget sensitivity (average monthly IT security budget for
      a 25-employee SMB may be $200–$500, limiting per-seat spend); MSP channel fragmentation
      (an individual MSP's ability to standardize on Huntress depends on their own security
      maturity); switching costs from incumbent AV/EDR vendors that are already deployed;
      and "good enough" perception—many SMBs feel existing AV provides adequate protection
      until they experience a breach.
    claimRefs: [CM015, CM016, CM017, CM018, CM019, CM020]

  - id: SM005
    title: Sizing Gaps and Methodological Caveats
    body: |
      Significant methodological variation exists across the market sizing estimates used in
      this analysis. Key caveats:

      The Techaisle $90B figure includes all SMB IT security spend categories (endpoint, network,
      cloud, identity, email) and may double-count spend that flows through platform deals. The
      Growth Market Reports $39.8B is more conservative and includes only dedicated security
      product/service revenue. Neither figure has been independently audited for this report.

      The MDR market size of $4.19B (Mordor Intelligence, 2025) counts the global market across
      enterprise and SMB—the SMB-specific MDR sub-segment is not separately published. Huntress
      competes primarily for the SMB slice of MDR, which may be 30–40% of the total MDR market
      based on SMB share of security spending (~62% of total cybersecurity spend per Analysys Mason
      projection for 2028), but the SMB MDR figure is an estimate, not directly reported.

      The MSP-channel cybersecurity sub-market ($7B–$10B, 2022–2028 per Analysys Mason) is the
      most relevant addressable market for Huntress given its distribution model, but this figure
      is paywalled and cannot be independently verified in this report.
    claimRefs: [CM021, CM022, CM023]

