  topStrengths:
    - MSP-exclusive distribution creates a deeply loyal, high-LTV channel with 7,000+ partners
      generating compounding network effects and strong retention.
    - Product platform breadth (EDR, SIEM, SAT, ITDR, M365 MDR) drives meaningful multi-product
      revenue expansion within the existing partner base.
    - ThreatOps SOC-as-a-service differentiator is authentic and hard to replicate quickly;
      ex-NSA founders bring credibility and operational depth unmatched in the SMB segment.
  topRisks:
    - Microsoft Defender free bundling and CrowdStrike/SentinelOne SMB tier expansion could compress
      MSP willingness-to-pay and erode Huntress's per-endpoint pricing power over time.
    - Revenue and ARR are not publicly disclosed; the $1.5B+ valuation is priced on estimated
      $100–150M ARR with no verified gross margin or NRR data available.
    - SMB concentration exposes Huntress to macro-driven MSP budget pressure; a downturn could
      trigger MSP partner churn or endpoint count reduction faster than in enterprise segments.
  unresolvedGaps:
    - Verified ARR, revenue growth rate, gross margin, and NRR are all non-public; must be resolved
      in data room before valuation confidence can exceed medium.
    - Top-5 MSP partner revenue concentration and individual partner churn rate are unknown; a
      small number of large MSPs may represent disproportionate revenue risk.
    - Path to IPO or exit timeline unclear; at $1.5B+ valuation and ~$150M ARR, IPO window likely
      requires $200–250M+ ARR which is 1–2 years away at estimated current growth.
