callouts:
  - calloutType: risk
    title: Blackpoint Cyber Is Huntress's Most Dangerous Near-Term Competitor
    body: |
      Blackpoint Cyber shares almost every structural attribute with Huntress: MSP channel focus,
      per-endpoint pricing at a comparable tier, human-led SOC, and a partner-first brand.
      Founded 10 miles apart, both companies have grown in the same market segment. Blackpoint's
      $190M raise and CompassOne rebrand indicate serious product expansion investment. The key
      unknowns—Blackpoint's ARR and customer count—are material diligence gaps that should be
      closed via market intelligence or channel partner surveys before investing.
    claimRefs: [CP004, CP005, CP006]

  - calloutType: strength
    title: CrowdStrike July 2024 Outage Created Structural Tailwind for Huntress
    body: |
      The July 19, 2024 CrowdStrike Falcon sensor update bug caused global IT disruption affecting
      airlines, banks, hospitals, and emergency services. For MSPs, the event was a visceral
      reminder of kernel-level agent risk. Huntress's non-kernel architecture became an explicit
      sales differentiator in the following quarters. While this competitive advantage may erode
      as CrowdStrike implements post-outage architectural changes, the episode validated MSP
      preference for security vendors with lower endpoint stability risk.
    claimRefs: [CP010, CP016, CP022]

  - calloutType: risk
    title: AI-Driven MDR Automation Could Compress Huntress's Human SOC Advantage
    body: |
      SentinelOne's Purple AI, CrowdStrike's Charlotte AI, and Arctic Wolf's Aurora Agentic SOC
      all aim to automate the Tier 1/2 SOC analyst workflow that currently gives Huntress its
      human-at-scale advantage. If AI reduces human SOC cost by 60–80%, enterprise platforms
      could offer comparable managed response at Huntress's price point within 3–4 years.
      Huntress's counter-strategy (investing in AI to augment its own SOC) should be stress-tested
      in diligence: what is the headcount plan, AI investment, and SOC automation roadmap?
    claimRefs: [CP019, CP020]

