  topStrengths:
  - Credible AI/geoscience platform with official sensor, data-system, model, patent, and hiring evidence.
  - Mingomba provides unusually tangible proof for a private exploration startup and is tied to strategic copper demand.
  - Large investor base and SEC/private-market financing signals show strong capital access.
  topRisks:
  - Mingomba mine development faces permitting, deep wet-rock, capex, community, and early-2030s schedule risk.
  - No public revenue, cash, burn, cap table, ownership waterfall, offtake, or unit economics.
  - Valuation appears stretched on public evidence unless private data validates project economics and repeatability.
  unresolvedGaps:
  - Audited financials, cash, burn, cap table, liquidation preferences, and current runway.
  - Mingomba permit matrix, EIA, land/water/community approvals, feasibility model, capex, opex, resource/reserve details, and offtake plan.
  - Signed customer/partner agreements, economic terms, renewal or repeat-use evidence, and concentration exposure.
  - 'Model-performance validation: hit rates, false positives, blinded tests, and evidence of repeat discoveries beyond Mingomba.'
