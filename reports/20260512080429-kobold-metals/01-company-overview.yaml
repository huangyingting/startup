sections:
- id: identity-and-business-model
  title: Identity and business model
  body: 'Identity and business model is evaluated using fetched public evidence dated to the 2026 run date, with KoBold Metals treated as a private AI-enabled mineral exploration and mine-development company. The chapter separates direct official claims, independent reporting, regulatory filings, market data, and adverse evidence rather than treating the AI narrative as sufficient. Key evidence includes: KoBold describes itself as a scientific mineral exploration and development company focused on critical minerals, using AI and human expertise. KoBold says it was founded in 2018 by Kurt House, Josh Goldman, and Jeff Jurinak to address the critical-mineral supply gap. The public science page describes novel sensors, centralized data systems, and predictive models as the core of KoBold technology. Mining Technology reported a January 2025 $537 million financing that valued KoBold at $2.96 billion. SEC company-submissions data lists KoBold Form D filings from 2022, 2023, 2024, 2025, and a 2026 amendment. Clay and CB Insights describe KoBold as a private Series C-stage company with roughly $1.2 billion of total funding. Mingomba is presented by KoBold and independent Zambia coverage as
    the flagship copper project and first discovery proof point. Forbes and Zambia Monitor provide adverse evidence that deep-mine execution and copper prices remain material risks. The implication is evidence-sensitive: the public record supports strategic relevance and serious execution, but private financials, permits, project economics, customer contracts, and ownership terms remain necessary for investment-grade underwriting. This section therefore emphasizes what is known, what is only inferred, and which diligence path would change the conclusion for an investor reviewing KoBold on 2026-05-12. The analysis also preserves uncertainty because mining projects can fail through permitting, geology, water, capex, commodity cycles, community opposition, or financing structure even when exploration technology is differentiated.'
