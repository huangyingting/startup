sections:
- id: customer-and-partner-segments
  title: Customer and partner segments
  body: 'Customer and partner segments is evaluated using fetched public evidence dated to the 2026 run date, with KoBold Metals treated as a private AI-enabled mineral exploration and mine-development company. The chapter separates direct official claims, independent reporting, regulatory filings, market data, and adverse evidence rather than treating the AI narrative as sufficient. Key evidence includes: CB Insights lists BHP and Rio Tinto as KoBold customers, but revenue contribution and contract size are not public. Blackridge reported BHP would collaborate with KoBold to explore battery minerals including copper and nickel. KoBold says it is open to partnerships with companies, academic institutions, and governments. The Zambia supplier page and Mingomba supplier fair show a local contractor and supplier ecosystem. KoBold announced a Burundi government agreement to digitize geological data. KoBold and AVZ announced a framework for KoBold to acquire AVZ interests in Manono in the DRC. KoBold’s Lobito corridor MOU reference ties Mingomba volumes to infrastructure viability. Zambia Monitor is adverse evidence that commodity cycles can affect partner and customer outcomes. The implication
    is evidence-sensitive: the public record supports strategic relevance and serious execution, but private financials, permits, project economics, customer contracts, and ownership terms remain necessary for investment-grade underwriting. This section therefore emphasizes what is known, what is only inferred, and which diligence path would change the conclusion for an investor reviewing KoBold on 2026-05-12. The analysis also preserves uncertainty because mining projects can fail through permitting, geology, water, capex, commodity cycles, community opposition, or financing structure even when exploration technology is differentiated.'
