sections:
- id: regulatory-and-legal-risk
  title: Regulatory and legal risk
  body: 'Regulatory and legal risk is evaluated using fetched public evidence dated to the 2026 run date, with KoBold Metals treated as a private AI-enabled mineral exploration and mine-development company. The chapter separates direct official claims, independent reporting, regulatory filings, market data, and adverse evidence rather than treating the AI narrative as sufficient. Key evidence includes: KoBold policies establish legal and ethics baselines but do not prove mine-specific permits or environmental approvals. SEC filings provide financing records but not operating performance, cash balance, or project economics. Forbes reported Mingomba faces deep, wet-rock execution challenges around a $2.3 billion build. Zambia Monitor reported copper-price pressure as KoBold advanced Mingomba. Business & Human Rights Resource Centre and FootPrint Coalition show community and human-rights scrutiny around critical-minerals mining. Benzinga reported KoBold DRC expansion ambitions, adding jurisdictional and anti-corruption exposure. DOE and copper-industry sources show critical minerals and copper supply chains are policy-sensitive and environmentally scrutinized. McKinsey’s copper supply-gap
    analysis indicates that development delays can persist even in favorable demand environments. The implication is evidence-sensitive: the public record supports strategic relevance and serious execution, but private financials, permits, project economics, customer contracts, and ownership terms remain necessary for investment-grade underwriting. This section therefore emphasizes what is known, what is only inferred, and which diligence path would change the conclusion for an investor reviewing KoBold on 2026-05-12. The analysis also preserves uncertainty because mining projects can fail through permitting, geology, water, capex, commodity cycles, community opposition, or financing structure even when exploration technology is differentiated.'
  claimRefs:
  - CR001
  - CR002
  - CR003
  - CR004
  - CR005
  - CR006
  - CR007
  - CR008
  tableRefs:
  - TR001
