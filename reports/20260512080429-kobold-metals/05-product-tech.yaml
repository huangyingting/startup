sections:
- id: product-workflow
  title: Product workflow
  body: 'Product workflow is evaluated using fetched public evidence dated to the 2026 run date, with KoBold Metals treated as a private AI-enabled mineral exploration and mine-development company. The chapter separates direct official claims, independent reporting, regulatory filings, market data, and adverse evidence rather than treating the AI narrative as sufficient. Key evidence includes: KoBold’s science page says Hyperpod collects RGB, hyperspectral, and LiDAR data ten times faster than industry practice. KoBold describes data systems and predictive models that organize earth-crust data and inform exploration decisions. Greenhouse, BEV, Remote Impact, and GEO Careers postings show active hiring for software, data science, ML, and applied science roles. Justia and Google Patents list KoBold patent US12105230B2 for a muon detector used in muon tomography. Kurt House and Josh Goldman biographies emphasize the combination of mineral exploration, data science, and software engineering. Mfikeyi Makayi and Mingomba pages show mine-development execution capability in Zambia. EARTH AI, VRIFY, Hexagon, and DroneDeploy provide external benchmarks for exploration and mining technology capabilities.
    KoBold publishes ethics, privacy, and supplier materials but no public model-performance audit or security certification. The implication is evidence-sensitive: the public record supports strategic relevance and serious execution, but private financials, permits, project economics, customer contracts, and ownership terms remain necessary for investment-grade underwriting. This section therefore emphasizes what is known, what is only inferred, and which diligence path would change the conclusion for an investor reviewing KoBold on 2026-05-12. The analysis also preserves uncertainty because mining projects can fail through permitting, geology, water, capex, commodity cycles, community opposition, or financing structure even when exploration technology is differentiated.'
