sections:
- id: revenue-model-and-traction
  title: Revenue model and traction
  body: 'Revenue model and traction is evaluated using fetched public evidence dated to the 2026 run date, with KoBold Metals treated as a private AI-enabled mineral exploration and mine-development company. The chapter separates direct official claims, independent reporting, regulatory filings, market data, and adverse evidence rather than treating the AI narrative as sufficient. Key evidence includes: KoBold is private, and public sources do not disclose revenue, ARR, gross margin, CAC, cash, or burn. Mining Technology and MarketScreener reported the January 2025 financing at $537 million. Clay and Tracxn place KoBold total funding around $1.2 billion. KoBold’s 2026 Form D/A reported a $292 million offering amount and $280 million sold. KoBold’s November 2025 Form D reported a $200 million offering and $163.4 million sold at filing. Mingomba sources cite multibillion-dollar development cost and roughly 300,000 tonnes/year potential output. Hiive and Prime Unicorn Index provide secondary/private-market signals but are not audited company financials. Forbes and Zambia Monitor show that capex, copper prices, and deep-rock execution are financial risks. The implication is evidence-sensitive:
    the public record supports strategic relevance and serious execution, but private financials, permits, project economics, customer contracts, and ownership terms remain necessary for investment-grade underwriting. This section therefore emphasizes what is known, what is only inferred, and which diligence path would change the conclusion for an investor reviewing KoBold on 2026-05-12. The analysis also preserves uncertainty because mining projects can fail through permitting, geology, water, capex, commodity cycles, community opposition, or financing structure even when exploration technology is differentiated.'
