  summary: >-
    KoBold Metals is a private, AI-enabled mineral exploration and development company focused on critical minerals.
    Public evidence supports a differentiated science-and-field model, large venture/institutional funding, and a
    flagship Zambia copper asset, but does not disclose enough financial, permit, cap-table, or project-economics detail
    for a price-insensitive buy recommendation.
