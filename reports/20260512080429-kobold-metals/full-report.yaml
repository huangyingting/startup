    sections:
      - number: '2.1'
        title: Market boundary
        blocks:
          - type: paragraph
            body: >-
              Market boundary is evaluated using fetched public evidence dated to the 2026 run date, with KoBold Metals
              treated as a private AI-enabled mineral exploration and mine-development company. The chapter separates
              direct official claims, independent reporting, regulatory filings, market data, and adverse evidence
              rather than treating the AI narrative as sufficient. Key evidence includes: USGS provides copper supply
              and demand statistics that anchor the commodity-market boundary. CME Group said copper entered 2026 after
              a 41% rally in 2025 and moved above $6 per pound in January. Sprott, J.P. Morgan, and S&P Global frame
              copper as supported by deficits yet exposed to volatility and costs. BHP and Rio Tinto both publicly frame
              copper as central to decarbonization and electrification. Mingomba coverage cites a target near 300,000
              tonnes of copper annually and early-2030s output timing. EARTH AI, Ivanhoe Electric, and VRIFY show that
              AI/data exploration is a real competitive technology category. Zambia Monitor and Forbes highlight adverse
              macro and execution pressures around Mingomba. TMTPost and Mining Indaba cite multibillion-dollar Mingomba
              development cost, showing that market entry is capital intensive. The implication is evidence-sensitive:
              the public record supports strategic relevance and serious execution, but private financials, permits,
              project economics, customer contracts, and ownership terms remain necessary for investment-grade
              underwriting. This section therefore emphasizes what is known, what is only inferred, and which diligence
              path would change the conclusion for an investor reviewing KoBold on 2026-05-12. The analysis also
              preserves uncertainty because mining projects can fail through permitting, geology, water, capex,
              commodity cycles, community opposition, or financing structure even when exploration technology is
              differentiated.
