  - number: 8
    title: Valuation
    sections:
      - number: '8.1'
        title: Recommendation and confidence
        blocks:
          - type: paragraph
            body: >-
              Recommendation and confidence is evaluated using fetched public evidence dated to the 2026 run date, with
              KoBold Metals treated as a private AI-enabled mineral exploration and mine-development company. The
              chapter separates direct official claims, independent reporting, regulatory filings, market data, and
              adverse evidence rather than treating the AI narrative as sufficient. Key evidence includes: The clearest
              public valuation marker is the January 2025 $537 million financing at a reported $2.96 billion valuation.
              Clay and Tracxn put KoBold total raised around $1.2 billion, consistent with a capital-intensive private
              development model. Hiive and Prime Unicorn Index provide secondary-market signals but not audited company
              valuation evidence. The 2026 SEC amendment shows $280 million sold in a private offering but no revenue,
              margin, or cash balance. Mingomba’s multibillion-dollar capex and early-2030s production target make
              valuation milestone-sensitive. Copper-market sources show a supportive but volatile macro backdrop for
              valuation scenarios. BHP, Rio Tinto, First Quantum, Ivanhoe, and MP Materials sources are comparables but
              not direct KoBold multiples. Forbes and Zambia Monitor provide adverse evidence that execution or
              copper-price shocks can invalidate a premium valuation. The implication is evidence-sensitive: the public
              record supports strategic relevance and serious execution, but private financials, permits, project
              economics, customer contracts, and ownership terms remain necessary for investment-grade underwriting.
              This section therefore emphasizes what is known, what is only inferred, and which diligence path would
              change the conclusion for an investor reviewing KoBold on 2026-05-12. The analysis also preserves
              uncertainty because mining projects can fail through permitting, geology, water, capex, commodity cycles,
              community opposition, or financing structure even when exploration technology is differentiated.
