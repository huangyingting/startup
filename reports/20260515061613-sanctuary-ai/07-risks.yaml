  - id: s704
    title: Financial and Funding Risks
    body: >
      Sanctuary AI is a private company and has disclosed no revenue, ARR, gross margin, operating loss,
      or burn rate. The company has raised approximately US$100M in its Series B (June 2024) and previously
      raised CAD $58.5M in Series A funding (March 2023) plus a CAD $30M loan from Export Development
      Canada (June 2024). Total financing represents a material capital base for a pre-revenue hardware
      company, but without disclosed financials, the runway is entirely opaque to external investors.

      Hardware commercialization is capital-intensive. Humanoid robot manufacturers require significant
      investment in tooling, manufacturing equipment, supply chain, quality assurance, field service, and
      warranty reserves. Unlike software businesses where gross margins can fund growth, robotics hardware
      businesses typically operate at negative free cash flow until manufacturing scale generates unit
      economics that support margin. At sub-100 unit production volumes, Sanctuary AI almost certainly
      operates at deeply negative unit margins.

      The Export Development Canada loan imposes a fixed repayment obligation regardless of revenue
      performance. Without visibility into Sanctuary AI's revenue trajectory, it is impossible to assess
      whether the CAD $30M obligation creates liquidity risk. Dependence on continued venture capital
      funding means that any deterioration in investor sentiment toward AI robotics — whether driven by
      macro conditions, competitor failures, or Sanctuary AI's own commercial setbacks — could constrain
      the company's ability to raise its next round at acceptable terms.

      Long sales cycles in industrial robotics (typically 12-24+ months from initial engagement to
      commercial deployment) extend the time to revenue and amplify cash consumption. The combination
      of pre-revenue status, unknown burn rate, hardware cost structure, and EDC loan repayment obligations
      represents a material liquidity risk profile that cannot be characterized more precisely without
      private financial disclosure.
