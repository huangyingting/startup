callouts:
  - calloutType: risk
    title: Zero Disclosed Customers Is the Primary Thesis-Break Signal
    body: >-
      As of May 2026, Sanctuary AI has disclosed no commercial customers, no revenue, and no confirmed
      continuation of its only named engagement (Magna International). Every competitor in the humanoid
      robot space — Figure (BMW), Agility (Amazon), 1X (commercial deployments) — has named production
      customers. The absence of even one reference customer is the single most important negative signal
      in this analysis. Until a named production customer is announced, the commercial viability thesis
      rests entirely on technology demonstrations and investor confidence.
    claimRefs:
      - CR008
      - CR009
      - CR010
      - CR011
      - CR041

  - calloutType: risk
    title: Financial Opacity Makes Runway Assessment Impossible
    body: >-
      Sanctuary AI has never disclosed revenue, burn rate, or cash runway. The company has raised
      approximately US$100M in its Series B (June 2024) and received a CAD $30M EDC loan. Without
      financial statements, investors cannot determine whether the company has sufficient capital to
      reach its next commercial milestone. Hardware commercialization is capital-intensive; the combination
      of unknown burn, high capex, and a fixed loan obligation creates a risk profile that cannot be
      assessed from the outside.
    claimRefs:
      - CR024
      - CR025
      - CR026
      - CR027

  - calloutType: risk
    title: Microsoft Dependency Is Both Opportunity and Concentration Risk
    body: >-
      Microsoft is simultaneously Sanctuary AI's most valuable strategic partner and its most concentrated
      single-vendor dependency. Azure cloud infrastructure, AI model development collaboration, and joint
      go-to-market exposure at Hannover Messe 2025 are all tied to this single relationship. No alternative
      cloud provider or AI model partner has been disclosed. If Microsoft were to reduce, reprice, or exit
      this relationship, Sanctuary AI would face simultaneous technical infrastructure disruption and
      go-to-market impact.
    claimRefs:
      - CR031
      - CR032

  - calloutType: insight
    title: Hydraulic Differentiation May Become Liability in Electric-Dominated Market
    body: >-
      Sanctuary AI's hydraulic actuation design is architecturally distinctive but runs counter to the
      market direction. All major competitors use electric actuation. Industry procurement specifications
      for food-grade, pharmaceutical, and semiconductor manufacturing environments typically exclude
      hydraulic systems due to contamination risk. If the humanoid robotics market standardizes on electric
      actuation — as the overwhelming competitor landscape suggests — Sanctuary AI's IP advantage in
      hydraulic dexterous manipulation could become a strategic liability rather than a moat.
    claimRefs:
      - CR001
      - CR004
      - CR014
      - CR035
      - CR043

