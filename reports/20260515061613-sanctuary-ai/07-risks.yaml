chapter:
  number: 7
  title: Risks
  summary: >-
    Sanctuary AI's risk profile as of May 2026 is characterized by five principal vectors: (1) technical risk from
    unproven hydraulic actuation durability, cloud infrastructure dependency on Microsoft Azure, and a sim-to-real
    transfer gap that has never been validated in sustained production deployment; (2) market risk from zero disclosed
    commercial customers, an unclear outcome from the only named partnership (Magna International), and intense
    competition from better-capitalized rivals with deployed customers; (3) execution risk from a leadership transition
    in November 2024, undisclosed headcount, and the absence of a disclosed manufacturing scale-up partner; (4)
    financial risk from unknown burn rate and runway against a high-capex hardware commercialization pathway; and
    (5) strategic and regulatory risk from deep Microsoft partnership concentration, hydraulic design differentiation
    in an electric-dominated market, and the absence of any workplace safety certification for humanoid robot
    deployment. Multiple kill criteria remain unresolvable without private disclosure.

sections:
  - id: s701
    title: Technical and Product Risks
    body: >
      Sanctuary AI's Phoenix robot relies on a 21-degree-of-freedom hydraulic hand that the company describes as
      industry-leading in dexterity. Hydraulic actuation delivers higher force density than comparable electric
      systems but introduces a set of reliability and operational risks that electric-actuated competitors do not
      face. Hydraulic fluid circuits are susceptible to leakage, thermal expansion, seal degradation, and
      contamination. In production industrial environments — food processing, pharmaceuticals, semiconductor
      manufacturing, or medical device assembly — hydraulic fluid spills are not merely a maintenance issue but a
      regulatory and product-liability issue. No public disclosure exists of Sanctuary AI's hydraulic fluid
      containment design, seal life specifications, maintenance intervals, or contamination-risk mitigations.

      The Carbon AI cognitive software runs inference through Microsoft Azure cloud infrastructure. This dependency
      creates a single point of failure for robot operation in environments without reliable internet connectivity,
      in air-gapped facilities (defense, nuclear, pharmaceutical), and in any scenario where Azure experiences an
      outage or price-tier change. Sanctuary AI's website confirms the Microsoft collaboration but does not disclose
      edge inference capability, local fallback logic, or latency tolerance specifications.

      The sim-to-real transfer gap — the difference between robot performance in simulation environments and real
      physical deployments — is Sanctuary AI's most technically consequential unresolved risk. The company has
      demonstrated impressive manipulation capabilities on YouTube and at trade shows such as Hannover Messe 2025.
      However, no sustained production deployment data, error rate statistics, or uptime metrics have been disclosed.
      The March 2025 sim-to-real dexterous manipulation demo confirms progress but does not validate commercial
      reliability. Until sustained deployment data is published, the transfer gap remains a material assumption
      in any investment thesis.

      Patent strength is a double-edged risk. Morgan Stanley ranked Sanctuary AI #3 globally in humanoid IP as
      of February 2025, which is a positive signal. However, many patents in the portfolio are still pending,
      meaning competitors can study published applications and design around claims before they grant. A rejection
      or narrowing of key pending patents — particularly those covering the hydraulic hand or Carbon AI reasoning
      architecture — would materially weaken Sanctuary AI's IP moat.
