callouts:
  - calloutType: risk
    title: Founder Departure and Leadership Transition
    body: Co-founder Suzanne Gildert, who served as Chief Science Officer and was instrumental in the Carbon AI platform development, departed the company in November 2024. This represents a material founder and technical leadership loss. The company framed the transition as planned, but no succession plan or replacement CSO has been publicly identified. Impact on the technical roadmap and AI development continuity is unknown.
    claimRefs:
      - CO006
      - CO007
  - calloutType: risk
    title: Conflicting Funding Reports and Lack of Disclosure
    body: Sanctuary AI's Series B financing exhibits conflicting reports. The June 2024 press release announced USD $100M with multiple named strategic investors. Separately, Export Development Canada disclosed a CAD $30M loan (~USD $22M) in the same timeframe. It is unclear whether the EDC contribution is included in the $100M total or is a separate facility. No pre-money valuation, post-money valuation, debt-equity split, or cap table details have been disclosed. This lack of transparency complicates diligence and valuation estimation.
    claimRefs:
      - CO009
      - CO010
      - CO011
      - CO022
      - CO023
  - calloutType: insight
    title: Strategic Investor Alignment with Go-To-Market
    body: The Series B investor roster includes Microsoft (AI models and Azure infrastructure), Magna International (automotive-grade manufacturing), Accenture (enterprise services and deployment), and telecommunications players Bell and Verizon. This suggests a go-to-market strategy targeting industrial automation (via Magna), enterprise services (via Accenture), and potentially telecom-managed logistics or retail deployments (via Bell/Verizon). The alignment of strategic investors with operational capabilities reduces go-to-market execution risk relative to a purely financial investor base.
    claimRefs:
      - CO009
      - CO010
      - CO026
      - CO027
