  - id: scale-milestones
    title: Scale, Milestones, and Operational Reach
    body: |
      Sanctuary AI has not disclosed revenue, ARR, headcount, customer count, or robot unit production numbers. The company's careers page lists open positions across robotics engineering, AI/ML research, simulation, mechanical design, electrical engineering, and operations, suggesting a technical team likely in the 100-300 person range based on role diversity and funding scale, though this is an estimate.

      Key product and technical milestones from 2024 through May 2026 include: April 25, 2024 Phoenix Gen 7 humanoid robot unveiled; December 16, 2024 Phoenix Gen 8 unveiled with unspecified hardware and software improvements; December 12, 2024 21 degrees-of-freedom hydraulic hand technology demonstrated, highlighting dexterous manipulation capabilities; December 19, 2024 new tactile sensor technology unveiled to improve in-hand object sensing; February 11, 2025 Morgan Stanley's humanoid robotics intellectual property rankings placed Sanctuary at number three globally (up from number four in November 2024), indicating active patent filing and IP development; March 18, 2025 sim-to-real transfer of dexterous manipulation policies demonstrated, showing capability to train behaviors in simulation and transfer to physical robots; April 1, 2025 participation in Hannover Messe trade show with Microsoft, signaling industrial automation go-to-market focus; May 15, 2025 (run date) zero-shot in-hand manipulation demo published, showing autonomous reorientation of a lettered cube without explicit task training.

      Partnership milestones include the April 11, 2024 announcement of a strategic manufacturing partnership with Magna International, a Tier 1 automotive supplier, intended to pilot robotics manufacturing at scale; and the May 1, 2024 announcement of collaboration with Microsoft on AI model development for general-purpose robots (likely leveraging Azure OpenAI and related infrastructure).

      No customer names, pilot sites, deployment counts, or commercial traction metrics have been disclosed. The absence of named customers or publicly announced pilots is a material diligence gap, particularly relative to competitors such as Agility Robotics (Amazon partnership), Apptronik (Mercedes partnership), and Figure AI (BMW partnership).
