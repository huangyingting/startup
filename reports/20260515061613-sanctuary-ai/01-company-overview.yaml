  - id: founders-leadership
    title: Founders, Leadership, and Governance
    body: |
      Geordie Rose (CEO, co-founder) is a physicist and serial entrepreneur who previously founded D-Wave Systems, a quantum computing company that reached commercial deployment and significant venture backing. Rose's technical background in complex hardware-software systems and his prior fundraising track record position him as a credible deep-tech founder. His public presence includes media interviews, conference presentations, and press release quotations establishing him as the primary spokesperson for Sanctuary's mission and product vision. Key-person risk is material: Rose is the face of the company, the primary capital-raiser, and the strategic decision-maker with no publicly identified successor.

      Suzanne Gildert (co-founder, former Chief Science Officer) was a D-Wave alumna with expertise in quantum computing, AI, and cognitive architectures. Gildert was instrumental in the early technical direction of the Carbon AI platform. On November 9, 2024, Sanctuary announced a "significant leadership transition" without specifying Gildert's ongoing role or departure; secondary coverage and archived news references suggest she left the company at that juncture. This constitutes a material founder departure and potential risk to the technical roadmap, though the company framed the transition as planned.

      Olivia Norton (COO, co-founder) handles operations, partnerships, and scaling activities. Her background is less publicly documented than Rose or Gildert, but her co-founder status and operational role indicate involvement in manufacturing partnerships (e.g., with Magna), deployment logistics, and investor relations.

      No board of directors, independent directors, advisors, or investor board seats have been publicly disclosed. Governance structure, equity ownership distribution, and founder vesting terms are unknown. The lack of disclosed governance transparency increases diligence risk, particularly given the November 2024 leadership change and the absence of public filings (Sanctuary is a private Canadian entity with no SEC or equivalent regulatory disclosures).
