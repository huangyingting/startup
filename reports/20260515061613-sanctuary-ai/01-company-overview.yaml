  name: Sanctuary AI
chapter:
  number: 1
  title: Company Overview
  summary: Sanctuary Cognitive Systems Corporation (Vancouver, BC; founded 2018) develops general-purpose humanoid robots and AI control systems for industrial automation. The company's core products are the Phoenix humanoid robot (Gen 8 unveiled Dec 2024) and Carbon AI cognitive platform. Sanctuary raised a reported US$100M Series B in June 2024 with named investors Microsoft, Accenture, Magna, Bell, Verizon Ventures, BDC Capital, EDC, Workday Ventures, and Evok Innovations, bringing disclosed funding to approximately $160M. Leadership transitioned in November 2024 with co-founder Suzanne Gildert's departure. Revenue, ARR, headcount, and valuation remain undisclosed.
sections:
  - id: identity-overview
    title: Identity, Product, and Business Model
    body: |
      Sanctuary Cognitive Systems Corporation (operating as Sanctuary AI) is a Vancouver, British Columbia-based robotics and artificial intelligence company founded in 2018 by Geordie Rose (CEO), Suzanne Gildert (former Chief Science Officer, departed November 2024), and Olivia Norton (COO). The founders came from D-Wave Systems, a quantum computing pioneer, bringing deep technical backgrounds in physics, AI research, and industrial operations.

      Sanctuary's stated mission is to create general-purpose humanoid robots capable of performing a wide range of human tasks across industrial, logistics, retail, and potentially consumer settings. The company's product architecture rests on two integrated platforms: Phoenix, a humanoid robot form factor currently in its eighth generation (Gen 8 unveiled December 16, 2024), and Carbon, the proprietary AI control system described as mimicking human brain subsystems including memory, vision, audition, and touch.

      The business model is B2B-focused with deployment pilots in logistics warehouses, manufacturing facilities, and potentially retail environments. Unlike fixed industrial robots or single-task automation, Sanctuary positions Phoenix as a general-purpose platform trained through teleoperation, reinforcement learning, and sim-to-real transfer techniques to adapt to varied workflows without custom programming for each task. No specific customers, deployment scale, pricing structure, or revenue figures have been publicly disclosed as of the May 2026 run date.

      The company operates from Vancouver, British Columbia, Canada, with research, engineering, and piloting functions centralized at the headquarters. Legal registration is under Sanctuary Cognitive Systems Corporation. International expansion plans, if any, have not been announced.
