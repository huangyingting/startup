  - id: funding-capital
    title: Funding History, Valuation, and Capital Structure
    body: |
      Sanctuary AI's funding history exhibits both confirmed rounds and conflicting reports requiring careful citation. The earliest disclosed round is a CAD $58.5 million Series A closed in March 2023, according to secondary coverage including Pitchbook and Tracxn references. No investor names or valuation for Series A have been confirmed in primary sources.

      In June 2024, Sanctuary announced a US$100 million Series B financing via GlobeNewswire press release dated June 12, 2024. Named investors in the Series B included Microsoft, Accenture, Bell, Verizon Ventures, BDC Capital, Export Development Canada (EDC), Magna, Workday Ventures, and Evok Innovations. The press release described the round as enabling "continued product development, scaling of manufacturing capabilities with Magna, and expansion of AI model training in partnership with Microsoft." No pre-money or post-money valuation was disclosed.

      Conflicting reports exist regarding Export Development Canada's contribution. BetaKit and Globe and Mail articles from June 2024 separately reference a CAD $30 million loan (approximately US$22M at June 2024 exchange rates) from EDC, without clarifying whether this amount is a component of the $100M Series B or a parallel debt facility. The most plausible interpretation is that the Series B total of $100M includes the EDC debt contribution alongside equity commitments from other named investors, though this remains unconfirmed. An evidence gap exists for the precise capital structure, debt/equity split, interest terms, and valuation.

      In July 2024, BDC Capital's Thrive Venture Fund and InBC announced a strategic investment in Sanctuary without disclosing dollar amounts; this may overlap with the June Series B or represent a separate smaller commitment.

      Cumulative disclosed funding is approximately CAD $58.5M (Series A) plus US$100M (Series B) equals roughly US$160M depending on exchange rate and timing assumptions. No secondary sales, down rounds, debt facilities beyond the EDC loan, or bridge rounds have been disclosed. Valuation has never been publicly stated. Private market valuation multiples are unknown, though peer humanoid robotics companies Figure AI (approximately $2.6B post-Series B Feb 2024) and 1X Technologies (approximately $1-1.5B implied per media coverage) provide rough comparables suggesting Sanctuary could command a valuation in the $500M-$1.5B range if the $100M Series B was priced at typical late-stage ratios, but this is pure speculation absent hard data.
