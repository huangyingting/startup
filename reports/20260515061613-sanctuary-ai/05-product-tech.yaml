figures:
  - id: FE001
    title: Carbon AI Platform Architecture Stack
    type: stack
    layout: wide
    summary: >-
      Sanctuary AI's product architecture is a four-layer vertical stack: (1) a physical hardware
      layer comprising the Phoenix robot body and proprietary hydraulic/actuator systems; (2) a
      sensing layer incorporating vision, audio, and tactile modalities; (3) the Carbon AI cognitive
      software layer with specialized modules for memory, perception, planning, and control; and
      (4) an AI training infrastructure layer anchoring sim-to-real, teleoperation, and
      reinforcement learning pipelines.
    data:
      layers:
        - id: hardware
          label: Physical Hardware Platform
          modules:
            - "Phoenix Gen 8 robot body (anthropomorphic, ~human scale)"
            - "21-DoF hydraulic dexterous hand"
            - "Hydraulic actuators (joints and manipulation)"
            - "Tactile sensor array (proprietary, integrated Dec 2024)"
        - id: sensing
          label: Multi-Modal Sensing Layer
          modules:
            - "Computer vision (RGB + depth cameras)"
            - "Auditory processing (microphone array)"
            - "Tactile feedback (in-hand pressure/slip sensors)"
            - "Proprioception (joint encoders, IMU)"
        - id: carbon-ai
          label: "Carbon AI Cognitive Software (Proprietary)"
          modules:
            - "Memory module (episodic + semantic task context)"
            - "Visual cortex analog (scene understanding, object recognition)"
            - "Auditory cortex analog (instruction parsing)"
            - "Motor cortex analog (policy execution, torque generation)"
            - "Sim-to-real transfer runtime"
            - "Zero-shot generalization inference"
        - id: training
          label: AI Training and Infrastructure Layer
          modules:
            - "Teleoperation data collection (human demonstrations)"
            - "Reinforcement learning in simulation"
            - "Simulation environment (physics engine, domain randomization)"
            - "Azure AI model training (inferred, via Microsoft partnership)"
