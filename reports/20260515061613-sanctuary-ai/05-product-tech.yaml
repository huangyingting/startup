  evidenceGaps:
    - type: private-evidence-only
      severity: material
      topic: hardware-architecture
      missingEvidence: Public technical datasheet for Phoenix Gen 7 and Gen 8 (height, weight, payload, DoF map, runtime, IP rating)
      whyItMatters: Without specifications, buyers cannot assess Phoenix's fitness for specific tasks, compare it to competitive robots, or assess safety and integration requirements
      diligencePath: Request full hardware specification sheet from Sanctuary AI; compare against Agility, Apptronik, and Unitree published datasheets
      relatedQuestionRefs: [QE001]
    - type: private-evidence-only
      severity: material
      topic: software-platform
      missingEvidence: Carbon AI architecture documentation — module boundaries, model types, inference latency, context window, training data volume and diversity
      whyItMatters: Carbon AI is the core IP differentiator; without architectural details, claims of brain-inspired superiority over LLM-based competitors cannot be independently assessed
      diligencePath: Request technical white paper or architecture briefing; benchmark against published visuomotor policies from competitors
      relatedQuestionRefs: [QE007]
    - type: missing-source
      severity: material
      topic: compliance
      missingEvidence: Safety certifications (ISO 10218, CE marking, UL listing) and any regulatory approvals for Phoenix robots operating in human environments
      whyItMatters: Without certifications, Phoenix cannot be legally deployed for commercial use in the EU or most US states; absence of certifications is a go-to-market blocker
      diligencePath: Request ISO certification records; inquire about WorkSafeBC approval for pilot environments; assess timeline to CE/UL compliance
      relatedQuestionRefs: [QE018]
    - type: private-evidence-only
      severity: minor
      topic: product-roadmap
      missingEvidence: Sanctuary AI product roadmap for future Phoenix generations, feature milestones, and release cadence
      whyItMatters: Investors cannot model R&D timeline risk or competitive cadence without a disclosed roadmap; generation upgrade cadence affects product defensibility
      diligencePath: Request internal roadmap presentation; assess generation-to-generation improvement velocity from Gen 7 to Gen 8
      relatedQuestionRefs: [QE020]
    - type: private-evidence-only
      severity: minor
      topic: hardware-architecture
      missingEvidence: Tactile sensor technical specifications (sensor density, modalities, latency, integration API) and performance benchmarks
      whyItMatters: Tactile sensing is a key differentiator claim; without specs the advantage cannot be compared to competitor touch-sensing systems
      diligencePath: Request sensor specifications and integration documentation; compare against published tactile sensor designs from academic labs
      relatedQuestionRefs: [QE017]
    - type: missing-source
      severity: material
      topic: manufacturing-partnership
      missingEvidence: Current status of the Magna International manufacturing partnership; whether production units have been manufactured and at what volume
      whyItMatters: Magna partnership was cited in Series B as enabling production scale; if discontinued, it represents both a diligence red flag and a manufacturing readiness gap
      diligencePath: Contact Magna directly for partnership status; request Series B use-of-proceeds and manufacturing plan update from Sanctuary
      relatedQuestionRefs: []
