  - id: FE002
    title: Phoenix Robot Deployment Workflow
    type: flow
    layout: standard
    summary: >-
      The end-to-end Phoenix robot deployment workflow progresses from task identification and
      training pipeline execution through policy validation, on-site deployment, and telemetry
      feedback. Carbon AI mediates every stage, converting customer task definitions into trained
      robot policies that execute autonomously on Phoenix hardware.
    data:
      nodes:
        - id: n1
          label: "1. Customer Task Scoping"
          description: "Industrial operator identifies target tasks (e.g., pick-pack, assembly); Sanctuary team scopes task complexity and training requirements"
        - id: n2
          label: "2. Teleoperation Data Collection"
          description: "Human operators demonstrate task using motion capture or haptic hardware; demonstration data feeds Carbon AI imitation learning pipeline"
        - id: n3
          label: "3. Simulation Training (RL + domain randomization)"
          description: "Reinforcement learning agent trains in simulation with domain randomization; Carbon AI cognitive modules refined from imitation + RL signals"
        - id: n4
          label: "4. Sim-to-Real Transfer"
          description: "Trained policy deployed directly on Phoenix hardware without manual fine-tuning; validated via March 2025 dexterous manipulation demo"
        - id: n5
          label: "5. On-Site Deployment"
          description: "Phoenix robot deployed at customer facility; Carbon AI executes task policy; tactile sensors close feedback loop for grasp adaptation"
        - id: n6
          label: "6. Zero-Shot Generalization"
          description: "Carbon AI applies learned policies to novel objects/configurations without retraining; demonstrated via May 2025 cube reorientation"
        - id: n7
          label: "7. Telemetry and Continuous Learning"
          description: "On-device and cloud telemetry feeds back into training pipeline; new demonstrations and edge-case data improve policy quality"
      edges:
        - from: n1
          to: n2
        - from: n2
          to: n3
        - from: n3
          to: n4
