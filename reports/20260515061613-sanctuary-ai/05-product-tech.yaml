  - id: s502
    title: Hardware Architecture — Gen 7, Gen 8, Hydraulic Hand, and Sensing
    body: |
      Phoenix robots are designed with an anthropomorphic form factor—two arms, two legs, a torso,
      and a head—matching the proportions of an adult human worker. The company has published video
      demonstrations but has not disclosed detailed specifications including height, weight, payload
      capacity, battery runtime, or maximum speed for any generation. This absence of public
      hardware specs is unusual relative to electric-drive competitors (Unitree, Agility, Apptronik)
      that regularly publish datasheets.

      The most technically distinctive hardware announcement from Sanctuary is the 21 degrees-of-
      freedom (DoF) hydraulic dexterous hand unveiled December 12, 2024. At 21 DoF, this hand
      matches or exceeds the mobility of the human hand. The use of hydraulic actuation—rather than
      the electric servo or tendon-driven designs used by most competitors—reflects a deliberate
      architecture decision: hydraulic systems offer higher compliance, superior force regulation,
      and continuous torque without cogging, enabling the fine in-hand manipulation demonstrated in
      the May 2025 zero-shot cube-reorientation video.

      Sanctuary also unveiled a novel tactile sensor technology on December 19, 2024, with an
      integration update published February 26, 2025. Tactile sensing is a critical gap in most
      humanoid platforms: without it, robots cannot reliably grasp diverse objects or detect slippage.
      The sim-to-real transfer demonstration on March 18, 2025 showed that policies trained in
      simulation can be deployed directly on physical hardware—an important validation of the
      training pipeline efficiency. No technical details on how the tactile sensors integrate with
      Carbon AI or how sim-to-real transfer accuracy is quantified have been publicly disclosed.
