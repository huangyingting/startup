callouts:
  - calloutType: strength
    title: "21-DoF Hydraulic Hand Is Best-in-Class Manipulation Platform"
    body: >-
      Sanctuary's hydraulic dexterous hand with 21 degrees of freedom has no publicly matched
      equivalent among funded humanoid robotics competitors. The zero-shot cube reorientation
      demonstration (May 2025) is the most technically demanding in-hand manipulation demo
      published by any humanoid company to date. If Sanctuary can maintain this dexterity
      advantage into production units, it creates a defensible niche in fine-manipulation
      applications (electronics assembly, pharmaceutical handling, precision part placement) where
      parallel-jaw or simpler gripper designs cannot compete.
    claimRefs:
      - CE009
      - CE010
      - CE014
      - CE038
  - calloutType: strength
    title: "Morgan Stanley IP Rank #3 Validates Active Patent Strategy"
    body: >-
      Independent IP ranking from Morgan Stanley research (February 2025) places Sanctuary third
      globally for humanoid robotics patents—ahead of Figure AI, Apptronik, and Boston Dynamics.
      Given Sanctuary's smaller size relative to most competitors, this ranking suggests unusually
      high IP productivity per engineering dollar. The vertically integrated strategy (motor,
      actuation, sensors, AI all proprietary) is consistent with this density of filings and
      creates legal barriers for competitors trying to replicate the hydraulic-hand design.
    claimRefs:
      - CE026
      - CE027
      - CE028
  - calloutType: risk
    title: "Hydraulic Actuation Limits Commercial Addressable Market"
    body: >-
      While Sanctuary's hydraulic hand excels at dexterity, hydraulic systems are disqualified
      from a meaningful fraction of potential deployment environments: food processing (contamination
      risk), cleanrooms (fluid vapor), medical/pharmaceutical settings (sterility), and any
      outdoor or uncontrolled environment where leaks are unacceptable. Electric competitors (Figure,
      Agility, Apptronik) face no such restriction. Sanctuary has not disclosed plans for an
      electric-hand variant or a hybrid architecture, suggesting either a commitment to hydraulics or
      an unannounced roadmap pivot. This gap is a material diligence concern for investors evaluating
      total addressable market.
    claimRefs:
      - CE010
      - CE024
      - CE025
  - calloutType: risk
    title: "No Named Customers or Validated Deployments — Demo-Stage Risk"
    body: >-
      As of May 2026, Sanctuary has no publicly named customers, confirmed pilot sites, or
      disclosed productivity metrics from any customer deployment. The Magna partnership (April
      2024) has had no public updates in over twelve months. Compared to Agility Robotics (Amazon
      deployment), Figure AI (BMW deployment), and Apptronik (Mercedes deployment), Sanctuary's
      go-to-market traction is materially unvalidated. Without customer proof points, every
      technical claim rests solely on controlled demonstrations—a risk multiplier for investors
      evaluating commercial readiness.
    claimRefs:
      - CE029
      - CE032
      - CE034
      - CE037
