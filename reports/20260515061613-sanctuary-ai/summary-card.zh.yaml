    - Phoenix 的单位经济模型（物料清单、毛利率、服务强度）以及计划采用的商业模式（销售、租赁、RaaS 或服务）。
    - 灵巧操作主张是否能在精心演示之外、按生产负载周期获得独立技术验证。
