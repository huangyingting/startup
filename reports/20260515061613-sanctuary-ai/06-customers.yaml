  - id: s603
    title: Competitor Customer Benchmarking — Context for Sanctuary AI's Position
    body: |
      Sanctuary AI's customer traction is materially weaker than its closest competitors as of
      May 2026. Figure AI announced a production deployment partnership with BMW Manufacturing
      Co. in January 2024 for use in automotive manufacturing lines. Agility Robotics, which
      has been deploying its Digit robot in Amazon fulfillment centers and GXO Logistics
      facilities since 2023–2024, has transitioned from pilot to ongoing commercial operation
      in at least two named enterprise accounts. 1X Technologies has deployed humanoid robots
      for commercial warehouse operations in Scandinavia. Boston Dynamics' Spot quadruped, while
      not a humanoid, has multiple confirmed enterprise customers including Ford and BMW, and
      serves as a reference point for commercial robotics deployment timelines.

      Against this backdrop, Sanctuary AI's single unconfirmed pilot with Magna is a notably
      thin customer proof compared to both direct humanoid peers and the broader industrial
      robotics sector. Morgan Stanley's February 2025 ranking of Sanctuary AI at #3 globally
      in humanoid IP reflects intellectual property strength, not customer traction — an important
      distinction for commercial diligence. IP rankings may indicate long-term competitive
      positioning but do not provide evidence of near-term customer willingness to pay.

      CB Insights and Tracxn humanoid market analyses do not list Sanctuary AI as having
      confirmed production deployments as of their most recent coverage. The broader humanoid
      robotics sector itself faces skepticism: IEEE Spectrum's "humanoid robot bubble" piece
      and Rodney Brooks's ongoing commentary on deployment timelines note that the vast majority
      of announced commercial partnerships have not progressed to scaled production operations.
      Sanctuary AI's position is consistent with this broader industry pattern, but the lack of
      any production customer is a distinguishing risk factor relative to Figure AI and Agility
      Robotics, which have moved beyond the pilot phase.
