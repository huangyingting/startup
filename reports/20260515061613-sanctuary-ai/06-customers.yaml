        Outcome data from the Magna International pilot — deployment duration, task types,
        error rates, productivity improvements, and current production vs discontinued status —
        have not been publicly disclosed. A co-branded case study or joint press release would
        close this gap.
      whyItMatters: >-
        The Magna pilot is the only customer evidence for Sanctuary AI. Without outcome data
        or production status confirmation, it cannot be used as meaningful customer proof.
        Investment judgment depends critically on whether this pilot converted.
      diligencePath: >-
