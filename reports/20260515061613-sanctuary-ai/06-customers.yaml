  - id: s604
    title: Customer Acquisition Strategy — Limited Evidence
    body: |
      Sanctuary AI's customer acquisition approach is inferred primarily from company statements
      and investor communications, as no formal GTM documentation or customer-facing materials
      have been publicly disclosed. The company positions itself as a direct B2B enterprise
      sales organization targeting industrial operators who need to automate structured manual
      tasks. The co-pilot model — requiring a human operator to supervise Phoenix during initial
      task learning — is described as the pathway from first deployment to autonomous operation,
      implying an extended onboarding sales cycle.

      Strategic investors including Accenture, Microsoft, and Workday Ventures are plausible
      channel enablers: Accenture serves as a technology integrator for industrial clients,
      Microsoft provides cloud infrastructure and enterprise relationships, and Workday Ventures
      connects Sanctuary to HR-technology-adjacent enterprises interested in workforce
      augmentation. However, none of these relationships have been explicitly described as
      channel sales agreements with revenue-sharing or customer referral terms.

      No sales team size, quota structure, lead generation strategy, or customer acquisition
      cost (CAC) data has been disclosed. The company's LinkedIn presence and job postings
      through mid-2026 show continued technical hiring but no prominent head-of-sales or
      chief revenue officer listings, which may indicate the company is not yet in a
      structured commercial scaling phase. The average sales cycle length, deal size
      parameters, or contract duration templates are entirely unknown from public sources.
      This absence of go-to-market evidence is consistent with a technology-first development
      phase but creates significant uncertainty for commercial trajectory forecasting.
