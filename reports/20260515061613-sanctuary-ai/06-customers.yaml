  - id: s605
    title: Adverse Signals, Concentration Risk, and Evidence Gaps
    body: |
      Sanctuary AI's customer position presents several adverse signals that materially affect
      investment judgment. First, the singular dependence on one unconfirmed pilot (Magna) is an
      extreme customer concentration risk. If any future customer announcement occurs at scale,
      Sanctuary would be transitioning from zero to one, and the initial deployment would define
      a disproportionate share of their total revenue and operational learning curve. Any setback
      in that single relationship would have outsized impact.

      Second, the departure of Chief Science Officer Suzanne Gildert in the November 2024
      leadership transition introduces uncertainty about the technical leadership continuity
      supporting both product development and customer pilots. Gildert co-founded Sanctuary AI
      with Geordie Rose after both previously co-founded D-Wave Systems; her departure removes
      a foundational figure whose credibility with potential enterprise customers in deep-tech
      sectors was an asset.

      Third, Rodney Brooks, one of the most respected voices in robotics research, has
      consistently argued in publicly accessible writings that general-purpose humanoid robots
      will not achieve commercial scale within the next decade due to unresolved task
      generalization and deployment economics challenges. His predictions scorecard and humanoid
      robot commentary are consistent adverse signals from an authoritative independent source.
      IEEE Spectrum's analysis of the "humanoid robot bubble" similarly notes that many
      high-profile humanoid deployments announced in 2023–2025 have not converted to volume
      commercial agreements.

      Fourth, the 24-month period from May 2024 to May 2026 produced zero disclosed new customer
      announcements following the Magna pilot and the $100M Series B in June 2024. This silence
      across a period when Sanctuary's capitalization and technical milestones were both advancing
      suggests either deliberate suppression of commercial news, slow enterprise sales cycle
      progression, or actual lack of commercial agreements. All three interpretations are
      material to investment judgment. The evidence gaps documented in this chapter — no customer
      count, no ARR, no named deployments, no testimonials — collectively represent the largest
      diligence gap in Sanctuary AI's public record.
