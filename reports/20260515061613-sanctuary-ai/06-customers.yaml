callouts:
  - calloutType: risk
    title: Zero Confirmed Production Customers — Critical Commercial Gap
    body: >-
      Sanctuary AI has zero publicly confirmed production-stage customers as of May 2026.
      The only named engagement (Magna, April 2024) lacks follow-up disclosure of outcomes
      or production status, raising the probability that the pilot concluded without a
      commercial agreement. For a company that raised US$100M in Series B funding in June
      2024, the absence of any paying customer announcement over the subsequent 24 months
      is a critical adverse signal for commercial viability.
    claimRefs:
      - CU004
      - CU007
      - CU008
      - CU030

  - calloutType: risk
    title: Investor-Customer Overlap Reduces Independence of Magna Evidence
    body: >-
      Magna International is simultaneously a strategic investor in Sanctuary AI's Series B
      and the only named pilot customer. This dual role compromises the independence of the
      Magna engagement as customer proof: Magna's investment may have been conditioned on
      pilot participation, and outcomes may be subject to investment agreement disclosure
      restrictions. Any positive data from Magna would carry a lower independence weight
      in diligence than an arms-length commercial customer relationship.
    claimRefs:
      - CU006
      - CU021
      - CU025

  - calloutType: risk
    title: Industry Skeptics Question General-Purpose Humanoid Commercialization Timeline
    body: >-
      Rodney Brooks, co-founder of iRobot and a leading authority on robotics research,
      has argued in published writings that general-purpose humanoid robots will not achieve
      meaningful commercial scale within the next decade due to unresolved task generalization
      challenges. IEEE Spectrum's "humanoid robot bubble" analysis independently noted that
      investor enthusiasm is materially ahead of commercial deployment reality across the
      sector. Sanctuary AI's undisclosed customer base is consistent with these skeptical
      assessments and is the most significant evidence gap requiring management clarification
      before investment.
