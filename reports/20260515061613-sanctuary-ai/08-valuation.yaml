  - id: funding-history
    title: Funding History and Implied Valuation Range
    body: >
      Sanctuary AI has raised capital across at least four identifiable tranches. The earliest disclosed
      institutional capital was a Series A raising approximately CAD $58.5M (roughly USD $43M at contemporaneous
      exchange rates) in early 2023, supported by Evok Innovations and other Canadian technology investors. A
      prior seed or pre-Series A round likely exists but remains undisclosed. In June 2024, the company announced
      a USD $100M raise described in the GlobeNewswire press release as "Series B" but cross-referenced in
      PitchBook and CBInsights databases as "Series C," reflecting the terminological inconsistency that
      frequently arises when convertible instruments, government loans, and separate strategic closes are
      consolidated into a single reported total. BDC Capital's Thrive Venture Fund was identified as the lead
      investor, with InBC Strategic Investments—a British Columbia government-backed fund—and several corporate
      strategic investors co-participating. The same month, Export Development Canada provided a non-dilutive
      CAD $30M loan, further inflating the total capital infusion reported in media.

      Using a standard 2x–6x capital-raised valuation proxy—the typical range for pre-revenue deep-tech companies
      at comparable stages—the $243.8M total raised implies a valuation floor near $487M (2x) and a ceiling near
      $1.46B (6x). The midpoint of this range is approximately $730M. Importantly, this proxy assumes investors
      received at-market entry pricing without strategic discounts or government subsidies affecting the effective
      cost of capital. Because BDC Capital and EDC are government-affiliated entities with mandates that extend
      beyond financial return, their participation may have been priced differently than arms-length commercial VC,
      potentially compressing the implied multiple below market norms.

      No secondary market transactions, tender offers, or data-room disclosures have surfaced that would refine
      this range. The absence of a Series D through May 2026—approximately 24 months after the Series C—raises
      questions about the company's capital-raising trajectory. At an estimated burn of $60M–$90M per year
      (benchmarked against comparable-stage humanoid robotics peers), the Series C proceeds would be substantially
      depleted by mid-2026, implying either reduced spending, undisclosed revenue, or an upcoming fundraise.
    claimRefs:
