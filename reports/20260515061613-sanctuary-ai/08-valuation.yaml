  - id: comparable-companies
    title: Comparable Company Analysis
    body: >
      Constructing a valuation comp set for Sanctuary AI requires bridging three categories: (1) humanoid robot
      startups with disclosed valuations, (2) service and industrial robotics companies with disclosed valuations
      or acquisition prices, and (3) AI-robotics platform companies with SaaS or licensing revenue. No single
      comparable captures all dimensions simultaneously.

      Figure AI is the most closely analogous public benchmark. In February 2024, Figure AI raised $675M at a
      $2.6B post-money valuation, led by a consortium including Microsoft, OpenAI, Nvidia, Samsung, and Jeff
      Bezos. The round was accompanied by a disclosed BMW manufacturing pilot, providing commercial validation
      that Sanctuary lacks. At $2.6B valuation on $675M raised, Figure AI commands a 3.85x capital-raised
      multiple. Extrapolating this multiple to Sanctuary's $243.8M raised implies a theoretical valuation near
      $940M, though the absence of a disclosed Sanctuary customer would require a discount to this figure.

      Agility Robotics raised approximately $150M in 2023 from Amazon Industrial Innovation Fund, establishing
      an implied enterprise-customer validation that Sanctuary has not replicated. Agility's valuation was not
      disclosed. Apptronik raised $350M in 2024 backed by GV (Google Ventures) and Honda, also without disclosed
      valuation. Boston Dynamics, acquired by Hyundai Motor Group in 2021 for an enterprise value of
      approximately $1.1B (including prior SoftBank investment), provides the only fully disclosed robotics
      M&A transaction benchmark; at the time of acquisition, Boston Dynamics had limited recurring revenue and
      was primarily valued on IP, brand, and strategic optionality. Tesla's Optimus program is embedded within
      the Tesla corporate entity and cannot be valued independently.

      Sanctuary's Morgan Stanley patent ranking of #3 globally in humanoid robotics IP (February 2025, upgraded
      from #4 in November 2024) provides a partial IP quality signal. However, patent count and ranking are
      imperfect proxies for commercializable value; IP alone without customer traction typically commands a lower
      multiple than revenue-generating peers. The IP premium over a no-customer baseline is estimated at
      10%–25%, largely derived from the defensive moat value of blocking competitor designs and the potential for
      licensing revenue in future periods.
