  - id: adverse-signals
    title: Adverse Signals and Downside Risk Assessment
    body: >
      Multiple signals introduce material downside to Sanctuary AI's implied valuation range.

      The most significant adverse signal is the complete absence of confirmed commercial customers. As of
      May 2026, no enterprise deployment announcement, revenue disclosure, or customer testimonial has been
      published. The Magna International manufacturing pilot—announced in April 2024 alongside the Phoenix Gen 7
      reveal—has not been followed by a commercial contract announcement. Pilot-to-commercial conversion in
      humanoid robotics is historically low due to integration complexity, safety certification timelines, and
      total-cost-of-ownership concerns for the buyer. The likelihood that the Magna pilot has advanced to a
      recurring commercial relationship without public announcement is possible but unverified.

      Co-founder Suzanne Gildert (Chief Science Officer) departed in the November 2024 leadership transition.
      Gildert was one of the two founders (alongside CEO Geordie Rose) who established Sanctuary's
      general-intelligence AI methodology and had previously co-founded D-Wave Systems. Key-person risk in a
      pre-commercial AI company is a material valuation discount factor; the departure of the Chief Science
      Officer during the critical pre-commercialization phase raises questions about research direction stability.

      Industry skepticism from respected voices compounds the risk. IEEE Spectrum's article "The Humanoid Robot
      Bubble" documents the gap between industry marketing claims and real-world performance on cost and
      operational-time benchmarks. Rodney Brooks, one of the most cited robotics researchers globally and a
      serial entrepreneur, has maintained a public predictions track record consistently identifying overly
      optimistic timelines for humanoid and autonomous robots. Figure AI's $2.6B valuation with confirmed BMW
      partnership creates competitive crowding at the high-confidence end of the space, leaving less capital and
      attention for companies without disclosed customers.

      In the bear scenario, if Sanctuary AI fails to announce a commercial customer by late 2026 and requires a
      down-round to extend runway, the implied post-money valuation could compress to $150M–$350M—below the
      preference stack threshold—resulting in substantial dilution for earlier common shareholders and
      potentially triggering anti-dilution protections for Series C preferred investors.
