      - number: '7.4'
        title: 财务与融资风险
        blocks:
          - type: paragraph
            body: >
              Sanctuary AI 是私营公司，未披露收入、ARR、毛利率、经营亏损或烧钱速度。公司在 Series B（2024 年 6 月）中融资约 US$100M， 此前还完成 CAD $58.5M Series A
              融资（2023 年 3 月），并获得 Export Development Canada 的 CAD $30M 贷款（2024 年 6 月）。
              对一家收入前硬件公司而言，总融资额构成了实质资本基础；但没有财务披露时，外部投资者完全看不清现金跑道。

              硬件商业化资本密集。人形机器人制造商需要大量投资模具、制造设备、供应链、质量保证、现场服务和保修准备金。软件业务可以用毛利支持增长，
              机器人硬件业务则通常要等制造规模带来可支撑利润率的单位经济模型后，才可能摆脱负自由现金流。在低于 100 台的产量下，Sanctuary AI 几乎肯定处于深度负单位毛利。

              Export Development Canada 贷款带来固定还款义务，不随收入表现变化。看不见 Sanctuary AI 的收入轨迹，就无法评估 CAD $30M 义务是否造成流动性风险。
              公司依赖持续风险投资融资，意味着若投资人对 AI 机器人情绪恶化——无论由宏观环境、竞争对手失败，还是 Sanctuary AI 自身商业挫折触发—— 都可能限制公司以可接受条款完成下一轮融资。

              工业机器人销售周期长（从初始接触到商业部署通常 12-24+ 个月），会拉长收入变现时间并放大现金消耗。收入前状态、未知烧钱速度、硬件成本结构和 EDC 贷款还款义务叠加，
              构成重大流动性风险；没有私人财务披露，无法更精确刻画。
