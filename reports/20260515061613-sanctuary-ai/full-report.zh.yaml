  - number: 8
    title: 估值
    sections:
      - number: '8.1'
        title: 估值概览与信息限制
        blocks:
          - type: paragraph
            body: >
              Sanctuary AI 是加拿大私营公司，没有法律义务向 SEC、SEDAR 或任何其他公开监管机构提交财务报表。截至 May
              2026，公司未披露任何融资轮估值、年经常性收入（ARR）、客户数或员工数。本章使用的所有财务指标，要么是新闻稿层面的事实（融资金额、投资方名称），要么是分析师根据可比人形机器人和服务机器人公司推算的估计值。信息不透明是估值分析最大的约束。

              最近一次已确认融资是在 May–July 2024 完成的 Series C，BDC Capital（Thrive Venture Fund）领投，InBC Strategic
              Investments、Obvious Ventures、Verizon Ventures、Accenture Ventures、Microsoft、Magna International、Workday
              Ventures 和 Bell 跟投。媒体报道给出的融资规模约为 $99.8M–$100M。June 2024，Export Development Canada 另外提供 CAD $30M（约 USD
              $22M）的政府支持研发贷款。所有轮次累计披露资本约 $243.8M。截至 May 2026 运行日，公司尚未宣布 Series D。

              在没有披露财务指标的情况下，可用的估值代理有三类：（1）对照同类私营机器人公司的融资倍数；（2）使用同行公司（Figure AI、Boston Dynamics）披露估值的可比交易分析；（3）基于 Morgan
              Stanley 专利排名数据和 Microsoft Azure AI 合作的 IP 与战略伙伴溢价。三种方法不确定性都很高，应视为方向性区间，而不是点估值。估计公允价值区间为 $400M–$1.5B，中点接近
              $700M。
