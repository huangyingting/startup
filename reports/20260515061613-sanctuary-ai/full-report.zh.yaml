      - number: '6.5'
        title: 反向信号、集中度风险与证据缺口
        blocks:
          - type: paragraph
            body: |
              Sanctuary AI 的客户位置暴露出几项会实质影响投资判断的反向信号。第一，公司单独依赖一个未确认试点（Magna），这是极端客户集中度风险。
              若未来出现任何规模化客户公告，Sanctuary 都是在从零到一，初始部署将定义其总收入和运营学习曲线中不成比例的一大部分。
              该单一关系中的任何挫折都会产生放大影响。

              第二，首席科学官 Suzanne Gildert 在 2024 年 11 月领导层调整中离任，让支撑产品开发和客户试点的技术领导连续性出现不确定性。
              Gildert 曾与 Geordie Rose 联合创办 Sanctuary AI；此前两人也共同创办 D-Wave Systems。她的离任带走了一位奠基人物，
              而她在深科技领域潜在企业客户中的可信度原本是一项资产。

              第三，Rodney Brooks 是机器人研究中最受尊重的声音之一。他在公开文章中持续主张，由于任务泛化和部署经济性挑战尚未解决，
              通用人形机器人未来十年内不会实现商业规模化。他的预测记分卡和人形机器人评论，是来自权威独立来源的一致反向信号。
              IEEE Spectrum 对“humanoid robot bubble”的分析也指出，2023–2025 年宣布的许多高调人形机器人部署，并未转化为批量商业协议。

              第四，从 2024 年 5 月到 2026 年 5 月的 24 个月里，Magna 试点和 2024 年 6 月 $100M Series B 之后，没有披露任何新客户公告。
              这段时间里 Sanctuary 的资本化和技术里程碑都在推进，但商业消息沉默；这可能是公司刻意压住商业新闻，也可能是企业销售周期推进缓慢，
              或确实缺乏商业协议。三种解释都影响投资判断。本章记录的证据缺口——没有客户数量、没有 ARR、没有具名部署、没有客户证言——合在一起，
              构成 Sanctuary AI 公开记录中最大的尽调缺口。
