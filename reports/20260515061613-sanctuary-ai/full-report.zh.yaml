  - number: 7
    title: 风险
    sections:
      - number: '7.1'
        title: 技术与产品风险
        blocks:
          - type: paragraph
            body: >
              Sanctuary AI 的 Phoenix 机器人依赖 21 自由度液压手；公司称其灵巧度行业领先。液压驱动的力密度高于可比电驱系统，但也带来电驱竞争对手无需面对的一组可靠性和运营风险。
              液压流体回路容易泄漏、热膨胀、密封件退化和污染。在食品加工、制药、半导体制造或医疗器械装配等生产型工业环境中，液压油泄漏不只是维护问题， 而是监管和产品责任问题。Sanctuary AI
              没有公开披露液压流体封装设计、密封件寿命规格、维护间隔或污染风险缓释措施。

              Carbon AI 认知软件通过 Microsoft Azure 云基础设施运行推理。没有可靠互联网连接的环境、气隙设施（国防、核能、制药），以及 Azure 出现宕机或价格层级变化的场景，
              都会把这一依赖变成机器人运行的单点故障。Sanctuary AI 网站确认了 Microsoft 合作，但未披露边缘推理能力、本地回退逻辑或延迟容忍规格。

              sim-to-real 迁移缺口——机器人在仿真环境和真实物理部署中的表现差异——是 Sanctuary AI 最具技术后果的未解风险。公司在 YouTube 和 Hannover Messe 2025
              等展会上展示了令人印象深刻的操作能力。但持续生产部署数据、错误率统计或正常运行时间指标都未披露。2025 年 3 月的 sim-to-real 灵巧操作演示证明了进展，
              但没有验证商业可靠性。在持续部署数据发布前，迁移缺口仍是任何投资逻辑中的重大假设。

              专利强度是一把双刃剑。Morgan Stanley 截至 2025 年 2 月将 Sanctuary AI 列为全球人形 IP 第 #3，这是正面信号。但组合中许多专利仍处于申请中，
              竞争对手可以在授权前研究已公布申请，并绕开权利要求设计。若关键待审专利被驳回或缩窄——尤其是覆盖液压手或 Carbon AI 推理架构的专利—— Sanctuary AI 的 IP 护城河将被实质削弱。
