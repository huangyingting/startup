      - number: '6.3'
        title: 竞争对手客户基准——Sanctuary AI 位置的参照
        blocks:
          - type: paragraph
            body: |
              截至 2026 年 5 月，Sanctuary AI 的客户牵引力明显弱于最接近的竞争对手。Figure AI 在 2024 年 1 月宣布与 BMW Manufacturing Co.
              达成生产部署合作，用于汽车制造线。Agility Robotics 自 2023–2024 年起将 Digit 机器人部署到 Amazon 履约中心和 GXO Logistics 设施，
              已在至少两个具名企业账户中从试点转为持续商业运营。1X Technologies 已在斯堪的纳维亚部署人形机器人用于商业仓库运营。Boston Dynamics 的四足机器人
              Spot 虽非人形机器人，但拥有包括 Ford 和 BMW 在内的多个已确认企业客户，可作为商业机器人部署时间线的参照点。

              在这一背景下，无论相比直接人形机器人同业，还是更广泛工业机器人行业，Sanctuary AI 与 Magna 的单一未确认试点都是相当薄的客户证明。
              Morgan Stanley 2025 年 2 月将 Sanctuary AI 人形 IP 列为全球 #3，反映的是知识产权强度，而非客户牵引；这是商业尽调中必须区分的一点。
              IP 排名可能说明长期竞争位置，但无法证明近期客户愿意付费。

              CB Insights 和 Tracxn 的人形市场分析在最新覆盖中，均未把 Sanctuary AI 列为拥有已确认生产部署的公司。更广泛的人形机器人行业本身也面临质疑：
              IEEE Spectrum 的“humanoid robot bubble”文章和 Rodney Brooks 对部署时间线的持续评论都指出，绝大多数已宣布的商业合作并未推进到规模化生产运营。
              Sanctuary AI 的处境符合这一行业模式，但相对已走过试点阶段的 Figure AI 和 Agility Robotics，没有任何生产客户是一个突出的风险因素。
