      - number: '4.2'
        title: 成本结构与单位经济模型
        blocks:
          - type: paragraph
            body: >
              Sanctuary AI 的成本结构主要由 R&D 支出（AI 与机器人工程师人力）、硬件 COGS，以及企业销售和合作伙伴管理中的 SG&A 构成。作为一家估计拥有 200-300 人组织规模的 Series
              B 机器人公司，按可比阶段机器人同业和已披露 BC 薪资数据估算，年度运营费用约为 $60M-$90M。这个估计没有任何公开 Sanctuary 财务披露确认。


              机器人制造 COGS 包括材料（执行器、传感器、处理器、结构件）、Magna 合同制造人工和质量保证。按估计硬件 ASP $125K、行业典型机器人毛利率（硬件 40-60%）计算，隐含每台 COGS 为
              $50,000-$75,000。这些数字完全来自模型；Sanctuary 尚未披露单位经济模型。


              R&D 强度预计较高（估计占总 OpEx 的 50-60%），与商业化前阶段可比人形机器人初创公司一致。Carbon AI 的 AI 训练管线——包括通过人类遥操作收集数据、GPU
              计算基础设施和模型迭代周期——构成了显著经常性成本，其中一部分由 Microsoft Azure AI 合作补贴。


              劳动力成本套利是单位经济模型的关键论点：如果一台 ASP $125K 的 Phoenix 人形机器人（或 RaaS 模式下 $5-$8/hour）能够替代一名 $45,000/year 的仓库或制造工人，并在
              5-8 年回本，价值主张可能有吸引力。但这个分析忽略了维护成本、正常运行时间波动、集成成本和软件升级要求——这些因素都会把真实总拥有成本推高到朴素硬件成本比较之上。
