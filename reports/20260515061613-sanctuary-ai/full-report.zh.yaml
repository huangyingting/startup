            body: >
              Sanctuary AI 的公开牵引信号仅限于融资历史和合作公告。2024 年 6 月完成的 $100M Series B，战略投资方包括 Microsoft、Accenture、Magna
              International、Workday、Bell、BDC Capital、EDC 和 Evok Innovations。Series A（$30M）于 2022
              年完成，在此之前还有一轮金额未披露的种子轮。已披露总融资约为 $160M，不过更早的 Pre-Series A 融资仍不清楚。


              合作质量可作为商业牵引的代理指标。Microsoft 的 Azure AI 投资和共同开发关系，暗示商业试点管线可能经由 Azure marketplace 或 Accenture
              咨询实践导入。Accenture 的技术伙伴投资，暗示 Sanctuary 机器人至少进入了 Accenture 的企业产品目录，尽管尚未公开披露由 Accenture 促成的客户部署。Magna
              International 的投资暗示制造产能承诺与预期生产规模相匹配，而不仅仅是供货协议。


              员工数轨迹是间接牵引信号。LinkedIn 数据显示，Sanctuary AI 已从 2022 年 Series A 完成时的小团队增长到约 200-300 名员工（精确人数未经验证），符合资本部署模式。2024
              年 11 月联合创始人离任（Suzanne Gildert，联合创始人兼 Chief Science Officer）是 Sanctuary 公司历史中披露的最重要负面事件，代表了技术 AI
              路线图上的关键人风险。


              外部技术验证信号：2024 年 12 月 21-DoF 液压手演示，以及 Morgan Stanley IP 排名（截至 2025 年 2 月全球
              #3），是技术进展最强的独立验证代理。公司尚未公开披露收入、合同金额或试点客户指标。
