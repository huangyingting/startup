      - number: '5.2'
        title: 硬件架构——Gen 7、Gen 8、液压手与传感
        blocks:
          - type: paragraph
            body: |
              Phoenix 采用拟人形态：双臂、双腿、躯干和头部，比例接近成年工人。公司发布过视频演示，但没有披露任何一代产品的详细规格，
              包括身高、体重、载荷、电池续航或最高速度。相比 Unitree、Agility、Apptronik 等经常发布数据表的电驱竞争对手，
              这种缺少公开硬件规格的做法并不常见。

              Sanctuary 最具技术辨识度的硬件发布，是 2024 年 12 月 12 日推出的 21 自由度（DoF）液压灵巧手。21 DoF 让这只手达到或超过人手灵活度。
              Sanctuary 选择液压驱动，而不是多数竞争对手采用的电伺服或腱驱设计，反映了明确的架构取舍：液压系统顺应性更高、力控更好，
              且可提供没有齿槽效应的连续扭矩，从而支撑 2025 年 5 月零样本立方体重定向视频中的精细手内操作。

              Sanctuary 还在 2024 年 12 月 19 日发布了新型触觉传感器技术，并在 2025 年 2 月 26 日发布集成更新。触觉感知是多数人形机器人平台的关键短板：
              没有触觉，机器人就难以稳定抓取多样物体或检测打滑。2025 年 3 月 18 日的 sim-to-real 迁移演示显示，在仿真中训练的策略可以直接部署到实体硬件上，
              这是训练管线效率的重要验证。触觉传感器如何与 Carbon AI 集成、sim-to-real 迁移精度如何量化，均未公开披露技术细节。
