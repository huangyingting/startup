      - number: '2.2'
        title: 市场规模与增长预测
        blocks:
          - type: paragraph
            body: >
              Goldman Sachs Research 在 2024 年 2 月发布估计，乐观采用情景下，全球人形机器人市场到 2035 年可能达到 $38 billion；基准情景为 $6 billion，保守情景为
              $1 billion，反映采用时点和渗透率上的极大不确定性。该机构建模的潜在部署领域包括制造（$14B）、物流和仓储（$10B）、零售（$5B）、医疗健康（$4B）和其他服务（$5B）。这些估计假设机器人单价从
              2025 年每台 $150,000 降至 2035 年低于 $50,000。在乐观情景下，2025 至 2035 年隐含复合年增长率约为
              40-50%，前提是技术成本下降和买方采用里程碑能够兑现，而这些尚未得到验证。


              International Federation of Robotics（IFR）报告称，2023 年全球安装工业机器人 553,052 台，同比增长 6%，累计运营存量超过 3.9 million 台。截至
              2026 年，人形机器人占比可以忽略不计。CB Insights 识别出截至 2025 年初 27 家融资充分的人形机器人初创公司，累计披露融资超过 $3 billion。World Economic Forum
              Future of Jobs 2025 报告预测，到 2030 年，自动化将在全球替代 92 million 个岗位并创造 170 million
              个新岗位，为包括人形机器人在内的自动化技术提供了广义宏观需求信号。


              换用不同市场规模测算框架，结果会大幅分化。一个自下而上的劳动力替代模型，使用 U.S. Bureau of Labor Statistics 关于物料搬运工和仓库工人的数据（2024 年美国约 4.3
              million 个岗位），显示如果 10 年内渗透率达到 2-10%，潜在 SOM 为 100,000 至 500,000 台人形机器人；按每台 $50K 计算，隐含累计资本支出为 $5B 至 $25B。截至
              2026 年中，尚不存在商业规模部署，因此所有规模估计都带有极大不确定性。
