      - number: '8.6'
        title: 附录
        blocks:
          - type: callout
            title: Morgan Stanley 专利排名
            body: >
              根据 Morgan Stanley 的 Humanoid 100 报告，Sanctuary AI 在 February 2025 的人形机器人 IP 全球排名为 #3，较 November 2024 的 #4
              上调。该排名表明，公司拥有可防御的知识产权组合，即使没有商业牵引也具备竞争价值，并为估值提供部分底部。结合 Microsoft Azure AI 合作和 21-DoF 液压手演示（December 2024），其
              IP 位置支撑了不可忽视的战略收购溢价。
            calloutType: strength
            claimRefs:
              - CV021
              - CV022
          - type: callout
            title: 零披露收入且无已确认客户
            body: >
              截至 May 2026，Sanctuary AI 尚未宣布任何商业客户、经常性收入或部署合同。April 2024 宣布的 Magna International
              制造业试点之后，没有商业协议跟进。收入验证缺失是压低 IP 乐观情景的主要折价因素。若没有至少一个披露的商业部署，任何高于 $500M 的估值都更多反映投机性 IP 和平台可选性，而不是已经证明的业务价值。
            calloutType: risk
            claimRefs:
              - CV005
              - CV023
              - CV024
              - CV029
          - type: callout
            title: 数据室访问前维持继续研究建议
            body: >
              若要上调至观察或买入，至少需要满足以下之一：（1）披露 Series D 估值高于 $800M，并由公平交易的机构投资者领投；（2）确认商业客户并签署经常性部署合同；或（3）经审计 ARR 高于
              $10M，显示早期商业化。到 May 2026 运行日，上述条件均未满足。概率加权期望估值约 $618M，低于融资倍数代理中点 $730M，反映了完整财务不透明下应有的信息风险溢价。
            calloutType: recommendation
            claimRefs:
              - CV040
              - CV009
              - CV005
          - type: callout
            title: 2x–6x 已融资资本倍数代理
            body: >
              $400M–$1.5B 的隐含估值区间基于一个假设：Series C 阶段尚未产生收入的深科技公司，估值通常可以达到其累计融资额的 2x–6x。该区间对照 Figure AI（3.85x）、可比 AI
              硬件初创公司，以及标准 VC 按市值计价惯例。如果 Sanctuary 的优先股堆叠、反稀释条款或政府投资者定价把有效入场倍数压到低于市场常态，该假设可能失效。
            calloutType: assumption
