            title: TCO 打平缺口阻碍近期采用
            body: >-
              按当前估计，每台 $100K-$150K 的价格加上 $50K-$100K 集成成本，人形机器人 5 年总拥有成本约为 $200K-$250K。一名典型仓库工人的全口径成本约为 $52K/year。机器人必须达到
              90%+ 利用率，并稳定运行 3-4 年才能打平。截至 2026 年 5 月，没有厂商发布经过验证的基准，证明这在生产环境中可以实现。这个 TCO 缺口是 Sanctuary
              和所有人形机器人厂商近期采用的最大障碍。
