      - number: '8.2'
        title: 融资历史与隐含估值区间
        blocks:
          - type: paragraph
            body: >
              Sanctuary AI 至少通过四个可识别批次募集资本。最早披露的机构资本是 early 2023 的 Series A，融资约 CAD $58.5M（按当时汇率约 USD $43M），由 Evok
              Innovations 和其他加拿大科技投资者支持。更早的种子轮或 pre-Series A 可能存在，但未披露。June 2024，公司宣布一笔 USD $100M 融资；GlobeNewswire 新闻稿称为
              “Series B”，但 PitchBook 和 CBInsights 数据库交叉引用为 “Series C”，反映了可转债、政府贷款和独立战略交割被合并进一个报道总额时常见的术语不一致。BDC Capital
              的 Thrive Venture Fund 被列为领投方，InBC Strategic Investments——British Columbia
              政府支持的基金——以及多家企业战略投资者共同参与。同月，Export Development Canada 提供一笔非稀释性 CAD $30M 贷款，进一步抬高了媒体报道的资本注入总额。

              采用标准的 2x–6x 已融资资本估值代理——这是可比阶段尚未产生收入的深科技公司的常见区间——$243.8M 的累计融资意味着估值底部约 $487M（2x），顶部约 $1.46B（6x）。该区间中点约
              $730M。关键是，这一代理假设投资者以市场化入场价格进入，没有战略折扣或政府补贴影响有效资本成本。由于 BDC Capital 和 EDC 是政府关联实体，使命不止于财务回报，它们的定价可能不同于公平交易的商业
              VC，可能把隐含倍数压到低于市场常态。

              没有出现二级市场交易、要约回购或数据室披露来校准这个区间。到 May 2026 仍未完成 Series D——距 Series C 约 24 个月——使公司的融资轨迹存疑。按每年 $60M–$90M
              的估计烧钱速度（对照同阶段人形机器人同行），Series C 资金到 mid-2026 会基本耗尽，意味着公司要么压低支出，要么有未披露收入，要么即将融资。
