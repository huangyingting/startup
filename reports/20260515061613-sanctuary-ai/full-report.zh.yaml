            title: 相对 Figure AI 的融资缺口很实质
            body: >-
              Sanctuary AI 已披露融资约 $160M，而 Figure AI 为 $675M+。这 $515M 差距限制了 Sanctuary 在制造规模、机器人代际开发、企业销售人员和 AI
              模型训练基础设施上的投入能力。在一场资本密集、争夺率先商业部署的竞赛中，除非 Sanctuary 完成更多融资，或实现收入牵引以延长现金跑道，否则融资缺口就是有意义的战略风险。
