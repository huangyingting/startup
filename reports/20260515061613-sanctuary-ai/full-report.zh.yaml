  - number: 6
    title: 客户情况
    sections:
      - number: '6.1'
        title: 客户基础概览——披露缺失
        blocks:
          - type: paragraph
            body: |
              截至 2026 年 5 月，Sanctuary AI 的客户基础几乎完全未披露。除 2024 年 4 月与 Magna International 的单一战略试点合作外，
              公司没有公开客户数量、年经常性收入（ARR）、活跃部署或具名生产客户。本分析时点，Sanctuary AI 官网没有客户证言、参考账户、案例研究或能证明活跃使用的 logo。

              公司瞄准 B2B 工业市场，主要是仓储、汽车制造、零售运营和餐饮服务。Sanctuary 对外定位是向面临结构性劳动力短缺的工业运营商提供 Phoenix 人形机器人，
              作为劳动力补充。公司将 co-pilot 模式描述为客户上线路径：初始部署时由人类监督员看管机器人。尽管目标清晰，但没有合同、部署协议或试点后续延展被公开确认。

              Microsoft、Accenture、Magna International、Verizon Ventures、Workday Ventures、BDC Capital 和 InBC 等战略投资人，
              可能代表通往企业客户的间接渠道；这在早期 B2B 机器人公司中很常见。但在 Sanctuary AI 案例中，投资人关系是否转化为商业客户协议尚未确认。
              公司 2025 年 4 月与 Microsoft 在 Hannover Messe 联合展示，显示其仍在努力触达制造垂直的工业买家，但公开记录中没有看到该活动带来交易。
              已表述的市场野心与有记录的客户牵引之间的证据缺口，是本章最重要风险。
