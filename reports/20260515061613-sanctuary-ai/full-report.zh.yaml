              Sanctuary 的液压手在灵巧性上突出，但液压系统会被相当一部分潜在部署环境排除：食品加工（污染风险）、洁净室（流体蒸汽）、医疗 / 制药场景（无菌要求），
              以及任何无法接受泄漏的户外或非受控环境。Figure、Agility、Apptronik 等电驱竞争对手没有这种限制。Sanctuary 尚未披露电驱手版本或混合架构计划，
              这要么说明它坚持液压路线，要么说明路线图转向尚未公布。对评估总可用市场的投资者来说，这是重大的尽调问题。
