  - number: 5
    title: 产品与技术
    sections:
      - number: '5.1'
        title: 产品概览——Phoenix 机器人与市场定位
        blocks:
          - type: paragraph
            body: >
              Sanctuary AI 的核心商业产品是 Phoenix，一款通用人形机器人，面向仓库、制造设施，以及未来可能进入的零售等由人类搭建的工作环境。

              Phoenix 搭配 Carbon，这是 Sanctuary 自研的 AI 认知控制系统。公司称 Carbon 模仿人脑子系统，覆盖记忆、视觉、听觉和触觉。

              Sanctuary 将这套组合包装成垂直整合系统：从定制电机设计、液压驱动，到自研感知、规划和生成式 AI 层，全部自成一体；

              这也是它相对常用第三方执行器和现成 AI 框架的竞争对手所强调的差异点。


              截至 2026 年 5 月，Sanctuary 已连续推出八代 Phoenix，其中 Gen 7 于 2024 年 4 月 25 日发布，Gen 8 于

              2024 年 12 月 16 日发布。公司技术页面明确称：“from motor design to generative AI algorithms for superhuman task

              performance, our solutions are designed, built, owned, and patented by Sanctuary.” 这把 Sanctuary
              定位为全栈机器人公司，

              而不是系统集成商；这意味着 R&D 投入更高，但 IP 控制更强，若能规模化商业化，也可能拥有更宽利润率。


              GTM 策略是 B2B，瞄准需要在物流、汽车制造、食品加工等劳动密集型场景中自动化结构化手工任务的工业运营商。截至 2026 年 5 月运行日，

              除 2024 年 4 月宣布、后来未再确认状态的 Magna International 制造试点外，公司没有公开具名客户、试点场地、出货量披露或商业牵引指标。
