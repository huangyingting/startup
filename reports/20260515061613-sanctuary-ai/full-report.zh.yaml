              美国结构性劳动力供需失衡（截至 2026 年 4 月，职位空缺 8.1M、失业工人 7.4M）和 OECD 老龄化人口结构，为人形机器人创造了一个持久需求信号，不依赖短期技术成熟度。即使商业部署相对当前预测滞后
              2-3 年，底层需求驱动仍是结构性的，而非周期性的，能够支撑该行业的持续投资者兴趣和 Sanctuary 的融资能力。
