      - number: '3.4'
        title: 护城河耐久性与失败先例
        blocks:
          - type: paragraph
            body: >
              Sanctuary 的 IP 位置（截至 2025 年 2 月 Morgan Stanley 排名 #3）显示其相较同业有一定专利覆盖，但 IP 排名是滞后指标——资金充足的竞争者，包括 Figure AI 和
              Tesla，很可能也在激进申请专利。如果认知系统中的架构选择形成路径依赖，Carbon AI 平台的模块化可能提供持久差异化；但 API
              时代风险真实存在：随着前沿基础模型（GPT-5、Gemini、Claude）通过 VLA（vision-language-action）API 具备机器人控制能力，自研认知架构的价值可能被压缩。如果 Azure
              OpenAI 集成成为标准部署路径，Microsoft 合作可能部分隔离 Sanctuary 的这一风险。


              Magna International 制造合作对生产规模具有战略意义，但其耐久性取决于 Sanctuary 能否达到触发批量承诺的商业里程碑。该合作看起来并非排他，Magna
              也可能把类似安排扩展给其他人形机器人厂商。Microsoft 和 Accenture 分发合作同样不是排他的。


              反向先例提供了冷静的历史背景。Honda ASIMO 是一个持续 22 年的 R&D 项目（2000-2022），耗费数十亿美元研发资金，却未能实现规模化商业部署；Honda
              找不到可行商业路径后将其搁置。SoftBank Pepper 于 2014 年发布，单价约 $2,000，在 2021 年停产前销量约 27,000
              台，原因是商业采用不佳。两次失败共享同一种失败模式：在真实世界价格和真实世界运行条件下，任务效用不足——这正是包括 Sanctuary 在内所有当前人形机器人初创公司面对的挑战。Unitree 的低于 $20K
              的 G1 价位从低端带来商品化压力，而基础模型 API 则从高端带来潜在替代。
            claimRefs:
              - CP024
