  - number: 3
    title: 竞争格局
    sections:
      - number: '3.1'
        title: 竞争格局概览
        blocks:
          - type: paragraph
            body: >
              截至 2026 年中，人形机器人竞争格局包括直接人形机器人同业、相邻移动操作平台、既有工业机器人厂商和替代自动化方案。在直接人形机器人竞争者中，Figure AI 在融资上领先（$675M+），也是最早宣布具名
              OEM 客户的公司（2024 年 1 月宣布 BMW 试点）。获得 OpenAI 支持、已融资约 $125M 的 1X Technologies，在工业 EVE
              产品之外，将重心转向家庭辅助机器人（NEO）。Agility Robotics（融资 $250M，Amazon 战略投资）于 2023 年在 Amazon 仓库试点设施部署 Digit
              机器人，是物流场景中最可信的真实世界人形机器人部署验证。Apptronik（融资 $160M，与 Google DeepMind 合作）开发了 Apollo，采用 NASA
              传承设计，目标场景是制造和医疗健康。Boston Dynamics 于 2024 年推出 Atlas 商业版，从长期 R&D 姿态转向商业化，并有 Hyundai 约 $1.1B 收购作为后盾。Tesla
              Optimus 仍在 Tesla 内部部署，Musk 声称目标到 2025 年在 Tesla 工厂使用最多 1,000 台（时间表未经验证）；如果对外商业化，将形成巨大的潜在规模优势。中国的 Unitree
              Robotics 以约 $16,000 提供 G1 人形机器人，在成本上挑战美国高端竞争者。


              Sanctuary 处在中等融资梯队（$160M），落后 Figure AI 约 $515M。既有工业机器人
              OEM（ABB、KUKA、Fanuc、Yaskawa）尚未发布通用人形机器人平台，但它们拥有既有客户关系、服务基础设施和制造规模，可能成为市场 incumbents。Honda ASIMO（2022 年搁置）和
              SoftBank Pepper（2021 年停产）是通用人形机器人商业化失败的历史尝试，为所有当前入局者提供了反向先例。
