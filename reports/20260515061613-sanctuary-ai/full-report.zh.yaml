              Dynamics。考虑到 Sanctuary 规模小于多数竞争对手，这一排名说明其每一工程美元产出的 IP 异常高。垂直整合策略（电机、驱动、 传感器、AI
              全部自研）与这种高密度提交相一致，也为试图复制液压手设计的竞争对手设置了法律壁垒。
