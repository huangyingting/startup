      - number: '4.4'
        title: 资本充足性与财务判断
        blocks:
          - type: paragraph
            body: |
              按已披露资金和同阶段公司的烧钱速度估算，Sanctuary AI 在 2024 年 6 月 Series B 轮交割后
              还有 24-36 个月现金跑道，资本窗口大致延伸到 2026 年中至 2027 年中。该估算假设年烧钱
              $60M-$90M（中位情景 $75M），且短期内没有显著收入贡献。若进入更高烧钱情景（$90M+），
              现金跑道将缩短至 Series B 轮交割后约 24 个月（2026 年中），公司必须加快收入落地，或
              推进 Series C 融资。

              对机构投资者而言，财务结论高度依赖后续验证。Sanctuary AI 面临几项财务风险：(1) 未公开披露收入，
              商业模式没有任何财务验证；(2) 相比 Figure AI 存在 $515M 融资缺口，限制竞争规模；(3) 联合创始人离任，
              带来关键人物和 IP 连续性风险；(4) 与 Microsoft、Accenture、Magna 的合作均非排他，且没有合同性收入承诺；
              (5) Unitree 从低端切入，压缩入门级人形机器人应用的潜在定价权。

              可能改写结论的财务机会包括：(1) 公布具名商业客户，或披露带有生产率指标的试点，可大幅降低商业模式风险；
              (2) Series C 融资若超过 $200M，可延长现金跑道，并传递投资人信心仍在的信号；(3) 与非机器人企业达成
              Carbon AI 平台授权，可证明软件收入能多元化；(4) 借助 BDC/EDC 关系拿下政府或国防合同，可带来非周期性收入。
              截至 2026 年 5 月，上述事项均未公开披露。

              相比同业，Sanctuary 的资本效率仍不确定。Sanctuary 资本基础为 $160M，低于 Agility 的 $250M 和
              Figure AI 的 $675M，这可能说明资本效率更高，也可能意味着关键 R&D 和销售职能投入不足。Morgan Stanley
              将其 IP 排名列为第 #3，以及 21-DoF 灵巧手演示，都显示 R&D 投入有产出，但商业转化尚未证明。
