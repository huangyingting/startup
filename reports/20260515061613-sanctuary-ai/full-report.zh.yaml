      - number: '2.3'
        title: 买方与细分市场格局
        blocks:
          - type: paragraph
            body: >
              人形机器人的买方-用户-付款方结构因细分市场而显著不同。在制造业，买方通常是工厂运营或自动化工程团队，用户是生产线主管或技术员，付款方是用于提高生产率的企业资本开支预算。预算所有权在运营或工程负责人手中，而非
              IT。在物流和仓储中，买方是电商运营商或 3PL 的履约运营或供应链负责人。用户是仓库现场经理。截至 2024 年，Amazon 运营超过 750,000
              台移动机器人，但尚未大规模部署人形机器人。采用触发因素包括旺季劳动力短缺，以及 TCO 与临时工成本打平。


              在零售和酒店业，采用驱动因素包括年员工流失率超过 100% 和最低工资上涨。约束因素包括客户接受度（恐怖谷担忧）和未经验证的 ROI。医疗和养老是高潜力但高度监管的细分市场。U.S. Bureau of
              Labor Statistics 预计，由于退休因素，到 2032 年每年会出现 203,000
              个护理岗位空缺。约束因素包括严格的医疗器械监管、责任风险和患者同意问题。国防和政府细分市场在危险环境自动化上有长期潜力，政府采购由资本开支拨款和战备要求驱动，不过目前没有任何人形机器人厂商拥有重要国防合同。
