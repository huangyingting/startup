      - number: '7.5'
        title: 战略、监管与劳动力风险
        blocks:
          - type: paragraph
            body: >
              Sanctuary AI 最集中的战略依赖是 Microsoft 合作。Microsoft 为 Carbon AI 推理提供 Azure 云基础设施，参与 AI 模型开发合作，并通过 Hannover Messe
              2025 等联合亮相提供共同营销。若 Microsoft 因收购竞争性人形 AI 平台、战略转向或商业争议而缩减、重定价或终止合作，Sanctuary AI 的技术基础设施和企业 GTM 策略都会受扰动。
              合作的合同条款、排他性约定或定价结构均未公开披露。

              人形机器人与人类工人在工业场所并肩作业的监管框架仍处早期。在加拿大，WorkSafeBC 和各省职业健康与安全机构监管工作场所安全， 但尚未为人形机器人工友场景建立专门标准。在美国，OSHA
              现有机器人安全标准（主要基于工业机器人 ISO 10218）并非为双足、 具备高级操作能力的通用人形机器人设计。缺少清晰监管框架带来两类风险：(1)
              当人形机器人造成工伤时，客户面对责任法律不确定性，可能推迟采用； (2) Sanctuary AI 可能遭遇追溯性监管要求，被迫进行昂贵的机器人设计修改或运营限制。

              在市场走向电驱的背景下，Sanctuary AI 的液压定位带来长期战略对齐风险。如果主流工业机器人安全标准、保险政策或客户采购要求开始指定仅限电驱 （部分洁净室规格已出现这种情况），Sanctuary AI
              将面临被迫架构转向。公司目前提供竞争差异化的 IP 组合集中在液压灵巧手技术上， 因此转向电驱的技术成本会很高。

              Honda ASIMO、SoftBank Pepper 等失败的通用人形机器人项目，是历史前车之鉴：即便资本充足、技术成熟的项目，也可能无法达成商业可行性。
              这些前辈面对类似挑战：演示强、客户部署有限、最终商业停摆。虽然 Sanctuary AI 在 2024-2026 年的进展使其不同于早期失败项目， 但结构性相似仍是投资者应当权衡的可信反向信号。
