            body: >
              Sanctuary AI 尚未披露收入、ARR、员工数、客户数或机器人产量。公司招聘页面列出了机器人工程、AI/ML 研究、仿真、机械设计、电气工程和运营等开放岗位；按岗位多样性和融资规模估算，技术团队可能在
              100-300 人区间，但这只是估计。


              2024 年至 2026 年 5 月的关键产品和技术里程碑包括：2024 年 4 月 25 日发布 Phoenix Gen 7 人形机器人；2024 年 12 月 16 日发布 Phoenix Gen
              8，硬件和软件改进未具体说明；2024 年 12 月 12 日演示 21 个自由度液压手技术，突出灵巧操作能力；2024 年 12 月 19 日发布新的触觉传感器技术，以改善手内物体感知；2025 年 2 月
              11 日，Morgan Stanley 人形机器人知识产权排名将 Sanctuary 列为全球第三（较 2024 年 11 月第四名上升），显示公司仍在积极申请专利并开发 IP；2025 年 3 月 18
              日演示灵巧操作策略的仿真到现实迁移，显示公司可在仿真中训练行为并迁移到实体机器人；2025 年 4 月 1 日与 Microsoft 一起参加 Hannover Messe 展会，释放工业自动化
              go-to-market 信号；2025 年 5 月 15 日（运行日期）发布零样本手内操作演示，展示机器人在没有显式任务训练的情况下自主调整带字母立方体朝向。


              合作里程碑包括 2024 年 4 月 11 日宣布与 Tier 1 汽车供应商 Magna International 建立战略制造合作，目标是规模化试点机器人制造；以及 2024 年 5 月 1 日宣布与
              Microsoft 合作开发通用机器人 AI 模型（可能使用 Azure OpenAI 和相关基础设施）。


              公司尚未披露客户名称、试点地点、部署数量或商业牵引指标。没有具名客户或公开试点，是一个实质尽调缺口；相较 Agility Robotics（Amazon 合作）、Apptronik（Mercedes 合作）和
              Figure AI（BMW 合作）等竞争对手，这一点尤其突出。
