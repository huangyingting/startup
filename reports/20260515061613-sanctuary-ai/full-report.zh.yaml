      - number: '5.6'
        title: 证据展示
        blocks:
          - type: callout
            title: 21-DoF 液压手是同类最佳操作平台
            body: >-
              在已融资的人形机器人竞争对手中，Sanctuary 的 21 自由度液压灵巧手没有公开可匹配的同类产品。2025 年 5 月的零样本立方体重定向演示，
              是截至目前任何人形机器人公司发布过的技术难度最高的手内操作演示。若 Sanctuary 能把这种灵巧优势保留到量产机组中，它将在精细操作应用
              （电子装配、药品处理、精密零件放置）中形成可防守的利基；平行夹爪或更简单的夹爪设计难以竞争。
