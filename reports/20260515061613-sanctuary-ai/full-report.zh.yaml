          - type: callout
            title: Microsoft 依赖既是机会也是集中度风险
            body: >-
              Microsoft 同时是 Sanctuary AI 最有价值的战略伙伴，也是最集中的单一供应商依赖。Azure 云基础设施、AI 模型开发协作，以及在 Hannover Messe 2025
              的联合市场曝光，都绑在这一段关系上。公司没有披露其他云服务商或 AI 模型伙伴。如果 Microsoft 降低投入、重新定价或退出这段关系，Sanctuary AI 会同时遭遇技术基础设施中断和市场推进受挫。
