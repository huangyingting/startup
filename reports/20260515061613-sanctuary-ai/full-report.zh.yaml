            title: 零披露客户是首要投资逻辑破坏信号
            body: >-
              截至 2026 年 5 月，Sanctuary AI 没有披露商业客户、收入，也没有确认其唯一具名合作（Magna International）仍在继续。人形机器人领域的每个竞争对手——
              Figure（BMW）、Agility（Amazon）、1X（商业部署）——都有具名生产客户。连一个参考客户都没有，是本分析中最重要的负面信号。
              在具名生产客户公布之前，商业可行性逻辑完全建立在技术演示和投资人信心之上。
            calloutType: risk
            claimRefs:
              - CR008
              - CR009
              - CR010
              - CR011
              - CR041
          - type: callout
            title: 财务不透明导致无法评估现金跑道
            body: >-
              Sanctuary AI 从未披露收入、烧钱速度或现金跑道。公司在 Series B（2024 年 6 月）中融资约 US$100M，并获得 CAD $30M EDC 贷款。
              没有财务报表，投资者无法判断公司是否有足够资金抵达下一个商业里程碑。硬件商业化资本密集；未知烧钱速度、高资本开支和固定贷款义务叠加， 形成外部无法评估的风险画像。
