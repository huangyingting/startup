chapters:
  - number: 1
    title: 公司概况
    sections:
      - number: '1.1'
        title: 身份、产品与商业模式
        blocks:
          - type: paragraph
            body: >
              Sanctuary Cognitive Systems Corporation（以 Sanctuary AI 名义运营）是一家总部位于加拿大 British Columbia 省温哥华的机器人与人工智能公司，由
              Geordie Rose（CEO）、Suzanne Gildert（前 Chief Science Officer，2024 年 11 月离任）和 Olivia Norton（COO）于 2018
              年创立。三位创始人来自量子计算先驱 D-Wave Systems，带来了物理、AI 研究和工业运营上的深厚技术背景。


              Sanctuary 的公开使命是打造通用人形机器人，让机器人能在工业、物流、零售以及潜在消费场景中执行广泛人类任务。公司的产品架构建立在两个一体化平台上：Phoenix，即目前已到第八代的人形机器人形态（Gen
              8 于 2024 年 12 月 16 日发布）；以及 Carbon，即公司自研 AI 控制系统，公司称其模仿人脑子系统，包括记忆、视觉、听觉和触觉。


              商业模式聚焦 B2B，部署试点面向物流仓库、制造设施以及潜在零售环境。不同于固定式工业机器人或单任务自动化，Sanctuary 把 Phoenix
              定位为通用平台，靠遥操作、强化学习和仿真到现实迁移技术训练，让它适配不同工作流，而无需为每个任务定制编程。截至 2026 年 5 月运行日期，公司尚未公开披露具体客户、部署规模、定价结构或收入数字。


              公司在加拿大 British Columbia 省温哥华运营，研发、工程和试点职能集中在总部。法律登记主体为 Sanctuary Cognitive Systems
              Corporation。公司尚未宣布任何国际扩张计划。
            claimRefs:
              - CO001
              - CO002
              - CO003
              - CO004
              - CO005
              - CO020
      - number: '1.2'
        title: 创始人、领导层与治理
        blocks:
          - type: paragraph
            body: >
              Geordie Rose（CEO、联合创始人）是一名物理学家和连续创业者，此前创办 D-Wave Systems，这家量子计算公司实现了商业部署并获得了大量风险投资支持。Rose
              在复杂软硬件系统上的技术背景，以及此前的融资履历，让他成为可信的深科技创始人。他的公开露出包括媒体采访、会议演讲和新闻稿引语，确立了他作为 Sanctuary
              使命和产品愿景主要发言人的角色。关键人风险很实质：Rose 是公司的门面、主要融资人和战略决策者，公开资料中没有指向明确的继任者。


              Suzanne Gildert（联合创始人、前 Chief Science Officer）曾任职 D-Wave，专长包括量子计算、AI 和认知架构。Gildert 对 Carbon AI
              平台早期技术方向至关重要。2024 年 11 月 9 日，Sanctuary 宣布一次「重大领导层变动」，但未说明 Gildert
              后续角色或离任；二级报道和归档新闻引用显示，她在该节点离开公司。这构成了实质性的创始人离任，也可能给技术路线图带来风险，不过公司将此次变动描述为有计划安排。


              Olivia Norton（COO、联合创始人）负责运营、合作伙伴关系和规模化工作。相比 Rose 或 Gildert，她的履历公开信息较少，但其联合创始人身份和运营角色显示，她参与制造合作（例如与
              Magna）、部署物流和投资者关系。


              公司尚未公开披露董事会、独立董事、顾问或投资方董事席位。治理结构、股权所有权分布和创始人归属条款均未知。治理透明度不足提高了尽调风险，尤其考虑到 2024 年 11
              月的领导层变动，以及公司缺少公开监管文件（Sanctuary 是一家加拿大私营实体，没有 SEC 或同等监管披露）。
