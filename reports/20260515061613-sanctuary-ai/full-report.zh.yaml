  - number: 4
    title: 财务情况
    sections:
      - number: '4.1'
        title: 收入来源与变现框架
        blocks:
          - type: paragraph
            body: >
              截至 2026 年 5 月，Sanctuary AI 没有公开披露收入。公司曾概述 Robotics-as-a-Service（RaaS）收入模型，这与行业同业（Agility Robotics、Figure
              AI）一致：硬件部署在客户设施中，按使用量或订阅收费，而不是一次性售出。相比硬件直接销售，这种模式会推迟收入确认，但能提高客户终身价值，也通过降低前期资本要求来支持企业采用。


              Sanctuary 估计硬件 ASP 为每台 $100,000-$150,000，这一估计由分析师根据可比人形机器人价格推导，并未得到公司确认。按 $5-$8 每机器人小时的 RaaS 混合费率（与每小时
              $25-$35 加福利的人类工人相比，符合劳动力套利经济性），在双班制、50% 利用率下，每台机器人年收入约为 $44,000-$70,000。这意味着，只有当 Sanctuary
              在结构化制造或物流环境中实现高利用率部署，单位经济模型才有实质意义。


              次级收入来源包括：（1）通过 Carbon AI 平台向第三方硬件应用授权 AI 软件（未公开确认）；（2）通过 Accenture 合作，为企业部署和集成获取专业服务收入（结构上可能，但未披露）；（3）由
              Export Development Canada（EDC）关系和 BDC Capital 参与支持的潜在政府和国防合同。上述收入来源均未获得商业披露确认。


              Sanctuary 当前收入阶段是商业化前或早期商业化。公司 Series B
              投资方名单（Microsoft、Accenture、Magna、Workday、Bell、BDC、EDC、Evok）显示其与收入路径存在战略匹配，但并不确认公司已经产生收入。战略投资方常常为了期权价值和合作入口而投资，而不是因为商业收入即将到来。
