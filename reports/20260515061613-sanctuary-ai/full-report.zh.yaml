      - number: '3.2'
        title: 竞争者画像与差异化
        blocks:
          - type: paragraph
            body: >
              Figure AI 于 2024 年 2 月以约 $2.6B 的 Series B 后投后估值融资 $675M+，具名投资方包括 Microsoft、OpenAI、NVIDIA 和 Jeff Bezos。2024
              年 1 月宣布的 BMW 制造试点，是美国人形机器人初创公司中最具商业可信度的验证。Figure AI 用端到端神经网络方法控制机器人，这一点不同于 Sanctuary 的 Carbon AI 认知架构。


              1X Technologies（前身为 Halodi Robotics）由 OpenAI 支持，融资约 $125M，其产品路线图转向家庭辅助机器人 NEO，同时保留工业 EVE 平台。家庭市场转向扩大了 1X
              的目标可服务市场，但也反映近期工业部署经济性仍有不确定性。OpenAI 的战略投资为任务理解提供了前沿语言和视觉模型入口。


              Agility Robotics 已融资约 $250M，包括 Amazon 领投的战略投资，并于 2023 年在 Amazon 仓库试点设施部署 Digit 机器人。Amazon
              投资创造了战略锚定客户关系，但也可能限制 Agility 服务其他物流运营商。Digit 的形态（双足、有手臂、没有灵巧手）限制了任务多样性，弱于 Sanctuary 的 21-DoF 液压手。


              Apptronik 在 2024 年 9 月完成 $160M Series A，Google 为战略投资方，并与 Google DeepMind 合作开展机器人学习。Apollo 瞄准制造（Houston
              地区）和医疗健康应用，并承继了 Apptronik 过去用于宇航员服装机器人的 NASA 背景。


              Boston Dynamics 于 2024 年推出 Atlas 商业版（电驱动，取代 2024 年 4 月停用的液压研究版）。Hyundai 的收购（约 $1.1B）提供制造支持和潜在汽车部署路径。Boston
              Dynamics 拥有 30+ 年 R&D 可信度，但尚未证明商业人形机器人能规模化部署。


              Tesla Optimus Gen 2 已在 Tesla 工厂内部部署，Musk 称目标到 2025 年部署 1,000 台，并最终年产数百万台。Tesla 在电机、电池和 AI 芯片（Dojo
              超级计算机）上的垂直整合，如果对外商业化，将形成独特成本结构。截至 2026 年 5 月，产品尚未对外销售。


              中国 Unitree Robotics 提供约 $16,000 的 G1 人形机器人和约 $90,000 的 H1，相比美国同业具有 8 倍或更高成本优势。Unitree
              的快速硬件迭代和中国制造成本基础在价格上挑战西方高端竞争者，不过 AI 复杂度和任务完成率仍落后美国领先者。
