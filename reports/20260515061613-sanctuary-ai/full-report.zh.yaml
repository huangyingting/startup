      - number: '7.3'
        title: 执行与运营风险
        blocks:
          - type: paragraph
            body: >
              Sanctuary AI 联合创始人、前首席科学官 Suzanne Gildert 在 2024 年 11 月领导层调整中离任。Gildert 与 Geordie Rose 共同创办公司， 她对 Phoenix
              认知和机器人架构的技术贡献，是公司早期差异化的核心。公司尚未公开宣布接任的首席科学官或首席技术官。Sanctuary 历史上依赖两位创始人级技术专家；
              在这种背景下缺少具名技术负责人，会让持续产品推进以及面向企业客户和投资人的深层技术可信度产生执行风险。

              2024 年 4 月宣布的 Magna International 制造合作，是 Sanctuary AI 获取汽车级制造规模和具名工业伙伴的唯一已披露路径。没有后续更新，也没有活跃 Magna
              部署的可见证据，因此该合作状态是首要执行不确定性。若 Magna 已退出合作，Sanctuary AI 没有披露可替代的制造规模化伙伴； 在公司需要从原型生产转向商业批量制造的阶段，这是关键缺口。

              人才留存是叠加的执行风险。AI 和机器人强人才市场竞争激烈：超大规模云厂商（Google DeepMind、Microsoft、Amazon、Meta）、
              自动驾驶公司、资金充足的人形机器人初创公司（Figure、1X、Physical Intelligence），都在争夺同一批机器人工程师、机器学习研究员和具身 AI 专家。 Sanctuary AI 位于
              Vancouver AI 生态，该生态还包括 Cohere、D-Wave 等资金充足的公司。没有薪酬数据、员工数或留存指标披露时，外界无法评估 Sanctuary AI 守住人才基础的能力。

              Sanctuary AI 要从 R&D 阶段原型演示转向商业批量部署，需要资本密集型制造能力；公司没有公开确认已经获得这些能力。机器人制造爬坡——模具、质量保证、
              供应链搭建、现场服务网络——通常需要多年提前期，并且需要显著高于 R&D 支出的资本开支。
