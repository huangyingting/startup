        - 门店运营、门店 opex 预算
        - 近期优先级较低；客户接受风险高
      - - 医疗与养老护理
        - 助力搬运机器人、护理辅助、感染控制
        - 医疗器械（FDA 批准）、药品、EHR / 软件
        - 医院管理、养老院运营、facility opex
        - 长期潜力高；监管门槛最高；Sanctuary 目前未瞄准
      - - 服务与现场作业
        - 危险 / 远程任务机器人（建筑、公用事业、巡检）
        - 固定工业自动化、专用巡检机器人
        - 设施运营或现场作业团队
