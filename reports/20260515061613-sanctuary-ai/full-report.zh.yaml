            body: >-
              Sanctuary 在 2024 年 12 月演示的 21-DoF 液压灵巧手，在当前人形机器人竞争者中具有技术辨识度。没有同业公开展示过同等级自由度操作能力。结合 Morgan Stanley #3 IP
              排名（2025 年 2 月），Sanctuary 看起来在灵巧操作上拥有真正由专利支撑的技术差异化；而灵巧操作正是公司瞄准制造和物流用例的前提。
