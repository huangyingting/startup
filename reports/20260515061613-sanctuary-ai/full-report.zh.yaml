      - number: '8.3'
        title: 可比公司分析
        blocks:
          - type: paragraph
            body: >
              为 Sanctuary AI 搭建估值可比组，需要桥接三类公司：（1）披露估值的人形机器人初创公司；（2）披露估值或收购价格的服务和工业机器人公司；（3）拥有 SaaS 或授权收入的 AI
              机器人平台公司。没有单一可比公司能同时覆盖所有维度。

              Figure AI 是最接近的公开基准。February 2024，Figure AI 以 $2.6B 投后估值融资 $675M，由 Microsoft、OpenAI、Nvidia、Samsung、Jeff
              Bezos 等组成的财团领投。该轮同时披露 BMW 制造业试点，提供了 Sanctuary 缺乏的商业验证。按 $2.6B 估值和 $675M 融资额计算，Figure AI 的已融资资本倍数为
              3.85x。把这一倍数外推到 Sanctuary 的 $243.8M 融资额，理论估值接近 $940M；但 Sanctuary 未披露客户，需要对该数字打折。

              Agility Robotics 在 2023 年从 Amazon Industrial Innovation Fund 融资约 $150M，建立了隐含的企业客户验证，而 Sanctuary
              尚未复制。Agility 未披露估值。Apptronik 在 2024 年获 GV（Google Ventures）和 Honda 支持融资 $350M，也未披露估值。Boston Dynamics 在 2021
              年被 Hyundai Motor Group 以约 $1.1B 企业价值收购（包含此前 SoftBank 投资），提供了唯一完全披露的机器人 M&A 交易基准；收购时，Boston Dynamics
              经常性收入有限，估值主要来自 IP、品牌和战略可选性。Tesla 的 Optimus 项目嵌在 Tesla 公司主体内，无法独立估值。

              Sanctuary 在 Morgan Stanley 人形机器人 IP 排名中位列全球 #3（February 2025，由 November 2024 的 #4 上调），提供了部分 IP
              质量信号。但专利数量和排名并不能完美代表可商业化价值；没有客户牵引时，单靠 IP 通常拿不到创收同行的倍数。相对于无客户基线的 IP 溢价估计为
              10%–25%，主要来自阻挡竞争对手设计的防御性护城河价值，以及未来授权收入的可能性。
