      - number: '8.4'
        title: 反向信号与下行风险评估
        blocks:
          - type: paragraph
            body: >
              多重信号给 Sanctuary AI 的隐含估值区间带来实质下行。

              最重要的反向信号，是完全没有已确认商业客户。截至 May 2026，公司没有发布企业部署公告、收入披露或客户证言。April 2024 随 Phoenix Gen 7 发布一同宣布的 Magna
              International 制造业试点，之后没有跟进商业合同公告。人形机器人从试点转商业的历史转化率低，原因包括集成复杂、安全认证周期长，以及买方对总拥有成本的担忧。Magna
              试点可能已经推进为经常性商业关系且未公开宣布，但这一点未获验证。

              联合创始人 Suzanne Gildert（首席科学官）在 November 2024 领导层调整中离职。Gildert 是两位创始人之一（另一位是 CEO Geordie Rose），共同建立了
              Sanctuary 的通用智能 AI 方法论，此前还联合创办 D-Wave Systems。商业化前 AI 公司看重关键人物风险，这会显著压低估值；首席科学官在商业化前关键阶段离开，使研究方向稳定性受到质疑。

              业内权威声音的怀疑进一步放大风险。IEEE Spectrum 文章 “The Humanoid Robot Bubble” 记录了行业营销口径与现实成本、运行时长基准之间的差距。Rodney Brooks
              是全球引用最多的机器人研究者之一，也是连续创业者，他公开维护的预测记录持续指出人形机器人和自主机器人的时间表过于乐观。Figure AI 在已确认 BMW 合作的情况下拿到 $2.6B
              估值，挤占了该领域高确定性端的资本和注意力，未披露客户的公司更难获得资源。

              在悲观情景下，如果 Sanctuary AI 到 late 2026 仍未宣布商业客户，并需要降价轮延长现金跑道，隐含投后估值可能压缩至
              $150M–$350M——低于优先股堆叠门槛——导致早期普通股股东被大幅稀释，并可能触发 Series C 优先股投资者的反稀释保护。
            claimRefs:
              - CV023
              - CV024
              - CV025
              - CV026
              - CV027
