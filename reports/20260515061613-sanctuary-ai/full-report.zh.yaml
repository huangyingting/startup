      - number: '6.4'
        title: 获客策略——证据有限
        blocks:
          - type: paragraph
            body: |
              Sanctuary AI 没有公开正式 GTM 文件或面向客户的材料，因此获客方式主要只能从公司表述和投资人沟通中推断。公司把自己定位为直销型 B2B 企业销售组织，
              面向需要自动化结构化手工任务的工业运营商。co-pilot 模式需要人类操作员在初始任务学习阶段监督 Phoenix，公司将其描述为从首次部署走向自主运行的路径，
              这意味着上线路径和销售周期都更长。

              Accenture、Microsoft、Workday Ventures 等战略投资人可能提供渠道助力：Accenture 是工业客户的技术集成商，Microsoft 提供云基础设施和企业关系，
              Workday Ventures 可把 Sanctuary 连接到对劳动力增强感兴趣、与 HR 技术相邻的企业。但这些关系都没有被明确描述为带收入分成或客户转介绍条款的渠道销售协议。

              销售团队规模、配额结构、线索生成策略或获客成本（CAC）数据均未披露。公司 LinkedIn 和截至 2026 年中的招聘信息显示技术岗位仍在招聘，
              但没有明显的销售负责人或首席营收官职位，这可能说明公司尚未进入结构化商业规模化阶段。平均销售周期、交易规模参数和合同期限模板，在公开来源中完全未知。
              GTM 证据缺失与技术优先开发阶段相一致，但也让商业轨迹预测存在显著不确定性。
