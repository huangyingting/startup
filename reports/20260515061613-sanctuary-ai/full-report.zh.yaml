      - number: '6.2'
        title: Magna International 试点——唯一确认合作
        blocks:
          - type: paragraph
            body: |
              Sanctuary AI 唯一公开确认的客户合作，是与 Magna International 的战略伙伴关系。Magna 是加拿大 Tier-1 汽车零部件制造商，全球拥有超过 350 座制造设施。
              该合作于 2024 年 4 月 11 日通过 Sanctuary AI 新闻页面宣布，并获得 Betakit、The Robot Report 等加拿大和机器人媒体报道。公告称，
              Phoenix 机器人将在 Magna 制造设施场景中部署，目标是验证机器人在工业场景执行结构化手工任务的能力。

              截至 2026 年 5 月，也就是初次公告后 13 个月，Sanctuary AI 或 Magna 均未发布后续新闻稿、结果报告或案例研究来确认 Magna 试点结果。
              也没有 Magna 高管被引用背书 Phoenix 表现。按行业标准，这种沉默并不寻常；成功试点通常会在六到十二个月内产生联名宣传。
              这种缺席强烈暗示：试点可能已经结束但未达成商业协议，可能被搁置，也可能仍受禁止公开披露的保密协议约束。

              Magna 合作的性质和范围很关键。Magna International 也是 Sanctuary AI 2024 年 6 月宣布的 Series B 轮战略投资人，
              这意味着双方关系同时包含财务投资和运营试点评估。投资人兼潜在客户的双重角色在早期机器人公司中很常见，但会让外界更难判断合作深度，
              也削弱其作为客户证明的独立性。若试点最终没有转化为商业协议，将对 Sanctuary AI 的商业化叙事构成重大挫折。
