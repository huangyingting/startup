      - number: '2.4'
        title: 增长驱动因素与采用约束
        blocks:
          - type: paragraph
            body: >
              劳动力短缺和工资通胀是主要需求驱动因素。美国 JOLTS 数据显示，2026 年 4 月职位空缺为 8.1 million 个，失业工人为 7.4 million
              人，结构性劳动力供需失衡仍在持续。仓储和物流岗位年流失率为 40-60%。物料搬运工工资在 2020-2025 年间年均增长 4.2%，跑赢生产率提升，改善了机器人替代的回本测算。OECD
              国家的人口趋势（老龄化、日本、韩国和欧洲部分地区劳动年龄人口下降）创造了一个持续 10-15 年的需求信号，不依赖短期技术成熟度。


              监管和政策驱动因素包括 OSHA 人体工学标准、碳足迹减排目标和产业政策激励（U.S. CHIPS Act、EU Horizon 机器人资助、中国 Made in China 2025 目标）。AI
              基础模型成熟（视觉-语言-动作模型、行为克隆、仿真到现实迁移）降低了 Sanctuary 的 Carbon 平台训练新任务策略的时间和成本，是通用可行性的关键使能因素。


              技术和经济约束仍然严峻。一台人形机器人 5 年总拥有成本包括采购价（截至 2026 年为 $100K-$150K）、集成服务（$50K-$100K）和年度维护（$10K-$20K/year），合计约
              $200K-$250K。相比一名仓库工人约 $52K 的年度总薪酬，机器人必须达到 90%+ 利用率，才能在 3 年回本期内打平。截至 2026 年 5
              月，没有厂商发布来自客户部署、经过验证的生产率基准。非结构化环境中人机协作安全标准（ISO TC
              299）尚未覆盖通用人形机器人。机器人造成工伤的责任框架仍不清楚。资本密集度制造了鸡生蛋、蛋生鸡的采用难题；技术成熟度风险也让人形机器人区别于成熟自动化替代方案。Rodney Brooks 和 IEEE
              Spectrum 分析把这些商业化障碍称为当前人形机器人初创公司的结构性风险，而不只是短期风险。
