      - number: '2.5'
        title: 附录
        blocks:
          - type: callout
            title: 市场规模不确定性极高
            body: >-
              Goldman Sachs 对人形机器人市场的预测从 2035 年 $1B（保守）到 $38B（乐观）不等，跨度达 38 倍，反映采用时点、成本下降和技术成熟度上的深层不确定性。自 2024
              年以来，没有分析机构能够实质收窄这个区间，因为缺少商业规模部署来校准预测。尽调不应在不了解假设及其敏感性的情况下依赖 $38B 这个标题数字。
