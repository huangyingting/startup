      - number: '5.5'
        title: 竞争定位——液压灵巧性 vs. 电驱规模化
        blocks:
          - type: paragraph
            body: |
              2023 年以来，人形机器人竞争格局明显升温。Sanctuary 面对多家资金充足的电驱玩家：Figure AI（已融资 $675M+，在 BMW 生产部署）、
              1X Technologies（电驱人形机器人 EVE 和 NEO，OpenAI 合作）、Agility Robotics（Digit 已部署到 Amazon，商业验证最成熟）、
              Apptronik（Apollo，NASA 背景，Mercedes-Benz 合作）、Boston Dynamics（Atlas，数十年 R&D，但没有商业人形机器人产品）、
              Unitree（低成本 H1 和 G1，面向科研和较轻商业应用）。此外，Tesla Optimus 也是潜在进入者，资本充足，并具备消费级制造能力。

              Sanctuary 相对这一赛道的差异化主要压在三项主张上：(1) 21-DoF 液压手，灵巧度超过多数竞争对手夹爪；(2) Carbon AI 的仿生认知架构，
              公司认为它比规模化 transformer 模型更适合人类任务泛化；(3) 垂直 IP 整合，让 Sanctuary 控制技术栈每一层。不过，液压手优势可能被其引入的运营复杂度削弱，
              Carbon AI 架构也尚未通过公开基准验证。

              IEEE Spectrum 分析师、Rodney Brooks 等独立机器人研究者质疑，人形机器人估值是否反映了近期商业就绪度。Brooks 记录在案的预测指出，
              机器人部署一贯比技术演示暗示的时间更长。Sanctuary 未披露商业部署、客户名称和单位经济模型，很难与演示阶段竞争对手区分开来。
              与已披露生产部署的同业相比（Agility 在 Amazon，Figure 在 BMW），按公开证据看，Sanctuary 的牵引力明显更弱。
