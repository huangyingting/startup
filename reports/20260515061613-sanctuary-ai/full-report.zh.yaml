  - number: 2
    title: 市场分析
    sections:
      - number: '2.1'
        title: 市场边界与定义
        blocks:
          - type: paragraph
            body: >
              Sanctuary AI
              瞄准的是人形机器人市场，属于更广义的工业自动化和服务机器人行业的一个子集。市场边界覆盖具有人类形态的实体机器人（双足行走、类人上半身、灵巧操作器），目标是在为人类工人设计的环境中运行，而无需专门改造基础设施。纳入支出类别包括：人形机器人本体资本开支、相关
              AI 控制软件和仿真平台、部署服务（集成、训练、维护），以及经常性软件订阅或按任务收费许可。排除类别包括传统工业机械臂（SCARA、6
              轴关节型机器人、没有腿或完整躯干的协作机器人）、不具备操作能力的自主移动机器人（AMR）、外骨骼和可穿戴辅助设备、远程呈现机器人，以及纯软件自动化（RPA、工作流 bot）。


              现状替代品因用例而异。在仓储和物流中，人形机器人面对的是输送系统、固定龙门架上的传统工业机械臂、轮式底盘上的协作机械臂（cobot）、自动叉车，以及由外骨骼或拣选辅助系统增强的人类劳动力。在制造装配中，替代方案包括专用自动化单元、SCARA
              机器人、高速 pick-and-place 用 delta 机器人，以及人工装配线。在零售和酒店场景中，替代品是专业服务机器人（清洁机器人、配送机器人、信息亭）、人类员工和自助服务亭。


              相邻领域包括通用移动操作平台（非人形但具备灵巧性）、机器人 AI 基础模型（行为克隆、模仿学习、视觉-语言-动作模型）、仿真和数字孪生平台（Isaac
              Sim、MuJoCo、Gazebo），以及传感器技术（触觉传感器、深度相机、力矩传感器）。Sanctuary 的 Carbon AI 控制系统把公司放在机器人硬件和具身 AI 软件的交汇处，也模糊了机器人 OEM
              与 AI 平台提供商之间的边界。
