      - number: '5.4'
        title: 技术依赖、风险与 IP 格局
        blocks:
          - type: paragraph
            body: |
              Sanctuary 最大的技术依赖是 Microsoft：AI 模型开发合作、潜在 Azure 基础设施依赖，以及 Hannover Messe 联合露面，都指向它与
              Microsoft AI 生态的深度整合。如果 Sanctuary 的 Carbon AI 训练管线与 Azure ML 或 Azure OpenAI 紧密绑定，定价变化、API 废弃，
              或合作关系恶化，都可能实质影响 AI 开发路线图。没有公开来源确认 Sanctuary 是否具备多云冗余。

              相比电驱竞争对手，21-DoF 灵巧手以及更广泛机器人设计中可能采用的液压驱动，会引入运营风险。液压系统需要定期更换流体、维护密封件，
              在现场环境中也容易泄漏。在食品加工、洁净室或敏感材料场景中，液压油污染是足以排除部署的安全与合规风险。相较无刷电机，
              液压系统的重量和复杂度劣势也会影响载荷与续航经济性。Sanctuary 是否计划未来推出纯电版本或混合设计，尚未披露。

              IP 方面，Morgan Stanley 在 2024 年 11 月将 Sanctuary 人形机器人专利排名列为全球第四，2025 年 2 月列为第三，反映其在电机设计、
              操作算法和传感器集成上持续提交专利。公司在 patents.google.com 上以 Sanctuary Cognitive Systems Corporation 检索可见结果，
              确认其仍在积极推进专利申请；但具体专利号、权利要求范围、申请司法辖区和授权状态都没有公开逐项列明。2024 年 4 月宣布、且进入 Series B
              投资人名单的 Magna 制造合作，理论上可提供规模化制造能力；但截至 2026 年 5 月，没有公开更新说明 Magna 的生产角色，
              也没有披露任何由 Magna 制造的 Phoenix 机组。

              Sanctuary 的 GitHub 组织存在，但公开代码活动很少，说明公司没有推进开源开发者策略。除产品公告讨论外，未发现 Hacker News 技术深度讨论、
              Stack Overflow 标签、npm 或 PyPI 包，或开发者社区信号。这限制了外部对 Carbon AI 技术主张的独立验证，也减少了可加速第三方集成的自然开发者采用。
