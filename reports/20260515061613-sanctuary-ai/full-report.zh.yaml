      - number: '1.3'
        title: 融资历史、估值与资本结构
        blocks:
          - type: paragraph
            body: >
              Sanctuary AI 的融资历史同时包含已确认轮次和互相冲突的报道，需要谨慎引用。最早披露的轮次是 2023 年 3 月完成的 CAD $58.5 million Series A，依据包括
              Pitchbook 和 Tracxn 引用在内的二级报道。Series A 的投资方名称或估值没有获得一手资料确认。


              2024 年 6 月，Sanctuary 通过 2024 年 6 月 12 日 GlobeNewswire 新闻稿宣布 US$100 million Series B。Series B 的具名投资方包括
              Microsoft、Accenture、Bell、Verizon Ventures、BDC Capital、Export Development Canada（EDC）、Magna、Workday
              Ventures 和 Evok Innovations。新闻稿称该轮融资将支持「持续产品开发、与 Magna 扩大制造能力，以及与 Microsoft 合作扩展 AI 模型训练」。公司未披露投前或投后估值。


              关于 Export Development Canada 的出资，公开报道存在冲突。BetaKit 和 Globe and Mail 在 2024 年 6 月分别提到 EDC 提供 CAD $30 million
              贷款（按 2024 年 6 月汇率约 US$22M），但没有说明这笔金额是 $100M Series B 的一部分，还是并行债务工具。最合理的解读是，Series B 总额 $100M 包含 EDC
              债务出资以及其他具名投资方的股权承诺，但这一点仍未确认。精确资本结构、债务 / 股权拆分、利息条款和估值均存在证据缺口。


              2024 年 7 月，BDC Capital 的 Thrive Venture Fund 和 InBC 宣布对 Sanctuary 进行战略投资，但未披露金额；这笔投资可能与 6 月 Series B
              重叠，也可能是一笔较小的独立承诺。


              累计披露融资约为 CAD $58.5M（Series A）加 US$100M（Series B），按汇率和时点假设约等于 US$160M。除 EDC 贷款外，公司未披露老股交易、down round、债务工具或
              bridge round。公司从未公开披露估值。私募市场估值倍数未知，不过同业人形机器人公司 Figure AI（2024 年 2 月 Series B 后投后估值约 $2.6B）和 1X
              Technologies（媒体报道隐含约 $1-1.5B）提供粗略参照，显示如果 $100M Series B 以典型后期轮比例定价，Sanctuary 可能拿到 $500M-$1.5B
              区间估值；但缺少硬数据时，这完全是推测。
