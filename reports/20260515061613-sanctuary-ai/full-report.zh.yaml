        - 第三方机器人硬件 OEM 销售
        - 技术 / 创新团队、平台买方
        - 跨垂直；凸显 Sanctuary 的软件 + 硬件公司定位
    notes: >-
      支出边界基于 Sanctuary 公开表述的产品范围和市场可比对象；所有排除类别均由二级市场定义（IFR、IBISWorld、Goldman Sachs）确认。鉴于 Sanctuary 截至 May 2026
