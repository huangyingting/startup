  - id: FE001
    title: Carbon AI 平台架构栈
    type: stack
    layout: wide
    summary: >-
      Sanctuary AI 的产品架构是一套四层垂直栈：（1）物理硬件层，包括 Phoenix 机器人机身和自研液压 / 执行器系统；（2）感知层，纳入视觉、音频和触觉模态；（3）Carbon AI
      认知软件层，包含记忆、感知、规划和控制等专用模块；（4）AI 训练基础设施层，承载 sim-to-real、遥操作和强化学习管线。
    data:
      layers:
        - id: hardware
          label: 物理硬件平台
          modules:
            - Phoenix Gen 8 机器人机身（仿人形，约人类尺度）
            - 21-DoF 液压灵巧手
            - 液压执行器（关节与操作）
            - 触觉传感器阵列（自研，Dec 2024 集成）
        - id: sensing
          label: 多模态感知层
          modules:
            - 计算机视觉（RGB + 深度摄像头）
            - 听觉处理（麦克风阵列）
            - 触觉反馈（手内压力 / 滑移传感器）
            - 本体感知（关节编码器、IMU）
        - id: carbon-ai
          label: Carbon AI 认知软件（自研）
          modules:
            - 记忆模块（情景 + 语义任务上下文）
            - 视觉皮层类比模块（场景理解、物体识别）
            - 听觉皮层类比模块（指令解析）
            - 运动皮层类比模块（策略执行、扭矩生成）
            - Sim-to-real 迁移运行时
            - 零样本泛化推理
        - id: training
          label: AI 训练与基础设施层
          modules:
            - 遥操作数据采集（人类示范）
            - 仿真中的强化学习
            - 仿真环境（物理引擎、域随机化）
            - Azure AI 模型训练（推断，基于 Microsoft 合作关系）
    approximationNotes: 层级结构根据产品描述、合作公告和技术演示推断。内部模块名称和接口属于 Sanctuary 自有信息，未公开记录。Azure 依赖基于 Microsoft 合作关系推断；未确认其为独家云服务商。
    claimRefs:
      - CE004
      - CE015
      - CE016
      - CE017
      - CE020
      - CE021
  - id: FE002
    title: Phoenix 机器人部署工作流
    type: flow
    layout: standard
    summary: 端到端 Phoenix 机器人部署流程从任务识别、训练管线执行，推进到策略验证、现场部署和遥测反馈。Carbon AI 贯穿每个阶段，把客户任务定义转化为训练好的机器人策略，并在 Phoenix 硬件上自主执行。
    data:
      nodes:
        - id: n1
          label: 1. 客户任务界定
          description: 工业运营商识别目标任务（如拣选包装、装配）；Sanctuary 团队评估任务复杂度和训练需求
        - id: n2
          label: 2. 遥操作数据采集
          description: 人类操作员使用动作捕捉或触觉硬件演示任务；演示数据进入 Carbon AI 模仿学习管线
        - id: n3
          label: 3. 仿真训练（RL + 域随机化）
          description: 强化学习智能体在带域随机化的仿真环境中训练；Carbon AI 认知模块通过模仿 + RL 信号迭代
        - id: n4
          label: 4. Sim-to-real 迁移
          description: 训练好的策略无需手工微调，直接部署到 Phoenix 硬件；通过 March 2025 灵巧操作演示验证
        - id: n5
          label: 5. 现场部署
          description: Phoenix 机器人部署在客户现场；Carbon AI 执行任务策略；触觉传感器闭合反馈回路以适应抓取
        - id: n6
          label: 6. 零样本泛化
          description: Carbon AI 将已学习策略用于新物体 / 新配置，无需重新训练；通过 May 2025 方块重定向演示展示
        - id: n7
          label: 7. 遥测与持续学习
          description: 端侧和云端遥测回流训练管线；新的演示和边缘案例数据提升策略质量
      edges:
        - from: n1
          to: n2
        - from: n2
          to: n3
        - from: n3
          to: n4
        - from: n4
          to: n5
        - from: n5
          to: n6
        - from: n5
          to: n7
        - from: n7
          to: n2
    approximationNotes: 工作流根据公开产品描述、训练管线表述和演示证据推断。Sanctuary 未公开披露确切步骤边界、时间线和数据量。
