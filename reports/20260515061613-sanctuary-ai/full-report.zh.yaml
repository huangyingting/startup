      - number: '8.5'
        title: 结论与投资建议
        blocks:
          - type: paragraph
            body: >
              Sanctuary AI 在人形机器人格局中占据技术上可信的位置——专利 IP 全球排名 #3、与 Microsoft Azure AI 共同开发、Gen 8 Phoenix 平台配备 21-DoF 液压手，并与
              Magna International 建立制造合作——但公司没有披露任何收入、估值、客户或员工数。在本阶段尽调中，无法有信心地配置资本。

              按乐观（20%）、基准（55%）和悲观（25%）情景加权，估值得到的期望值约为 $600M–$750M。乐观情景（$1.2B，概率 20%）假设公司以高于 $1B 的披露估值完成 Series
              D，并有商业客户公告和正向 Microsoft 合作指标支持。基准情景（$650M，概率 55%）假设公司继续处于商业化前开发阶段，新增战略投资者维持 IP 和平台价值。悲观情景（$200M，概率
              25%）假设降价轮、到 Q4 2026 没有商业客户，并可能出现领导层流失。

              概率加权结果 = 0.20 × $1.2B + 0.55 × $650M + 0.25 × $200B = $240M + $357.5M + $50M =
              $647.5M。与基于融资额代理的隐含中点（$730M）相比，$648M 的概率加权估值有小幅折价，符合潜在投资者应向一家零公开财务披露公司要求的信息风险溢价。

              建议为继续研究。若要上调至观察或买入，需要出现以下任一项：（1）披露 Series D 估值高于
              $800M，且新的公平交易机构投资者领投；（2）确认商业客户部署并产生经常性收入；（3）大型工业或科技平台提出战略收购要约，并以披露价格创造流动性。缺少这些催化剂，现在投入资本为时过早。
            claimRefs:
              - CV040
              - CV021
              - CV022
              - CV003
              - CV005
              - CV009
              - CV029
