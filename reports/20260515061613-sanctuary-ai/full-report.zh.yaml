      - number: '7.2'
        title: 市场与竞争风险
        blocks:
          - type: paragraph
            body: >
              Sanctuary AI 最紧迫的近期风险，是截至 2026 年 5 月完全没有披露商业客户。唯一公开具名客户合作，是 2024 年 4 月 11 日宣布的 Magna International
              战略制造试点。后续没有任何公告确认该关系延续、扩大到生产规模或商业条款。Magna 自身投资人沟通中也没有提到活跃的 Sanctuary AI 机器人部署。
              这种沉默说明试点可能已经结束，或仍处于延长评估阶段；这对 Sanctuary AI 的商业叙事构成重大压力。

              自 Sanctuary AI 2024 年 6 月 Series B 以来，竞争环境已实质恶化。Figure AI 拿下 BMW Group 的生产合作，用于制造部署——这是与 Sanctuary AI
              目标市场直接可比的客户类型。Agility Robotics 拿下 Amazon 作为仓库部署客户，确认 Sanctuary AI 所瞄准的可服务市场已经被竞争对手服务。 1X Technologies 追加融资
              $110M，并报告活跃商业部署。Boston Dynamics 已在多个工业垂直建立 Atlas 和 Spot 的企业销售。Neura Robotics 和 UBTech 也带着资金充足的项目加入竞争。

              所有主要竞争对手——Figure、1X、Agility、Boston Dynamics、Unitree——的商业机器人都采用电驱。液压驱动带来生态碎片化劣势： 围绕电驱系统建立的客户、维护队伍和供应链，较难迁移到
              Sanctuary AI 的液压平台。若市场标准化到电驱——考虑到竞争对手压倒性的偏好，这看起来很可能—— Sanctuary AI 的液压差异化可能从优势变成竞争负担。

              Goldman Sachs 预计 2035 年人形机器人市场将达到 $38B，但 IEEE Spectrum 和独立分析师对近期采用时间线提出了可信担忧。Rodney Brooks 是该领域最受尊重的从业者之一，
              他持续预测通用人形机器人到 2020 年代末仍会面对商业可行性的重大障碍。在 Sanctuary AI 将技术演示转化为有公开参考案例的付费、重复客户之前， 公司的商业可行性仍未得到证明。
