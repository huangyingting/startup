      - number: '5.3'
        title: 软件平台——Carbon AI、训练管线与泛化
        blocks:
          - type: paragraph
            body: |
              Carbon AI 是 Sanctuary 自研的认知控制平台。公司称它受大脑启发，整合记忆、视觉、听觉和触觉等子系统，类似人脑皮层区域。
              与基于 transformer 的视觉运动策略不同（例如 Figure AI 与 OpenAI 的路线，或 1X Technologies 自研 LLM 的路线），
              Carbon AI 架构没有公开技术细节。仿生叙事意味着它可能是模块化系统，由专门模块处理不同感知和规划领域；但具体神经网络架构、
              推理栈和训练数据规模都是专有信息。

              训练管线结合三种机制：(1) 遥操作数据采集，人类操作员穿戴动作捕捉或触觉外骨骼系统演示任务，生成模仿学习数据集；(2) 强化学习，
              智能体在仿真中根据奖励信号优化；(3) sim-to-real 迁移，将仿真中训练的策略部署到实体硬件。2025 年 3 月的 sim-to-real 演示验证了
              这条管线能在无需实体机器人手工微调的情况下迁移灵巧操作策略，是能力成熟度的重要信号。

              2025 年 5 月的零样本手内操作演示显示，Phoenix 液压手在没有任务专项训练的情况下，可自主重定向带字母的立方体。零样本泛化是操作系统最难的测试，
              因为策略必须在没见过具体任务的情况下推理物体几何和接触关系。若该演示能在多样条件下复现，它就是 Sanctuary 公开技术组合中最强信号之一。
              但这次演示使用的是受控单物体场景；在非结构化环境中面对多样真实物体的表现，尚未公开基准测试。

              2024 年 5 月 1 日宣布的 Microsoft 合作，重点是为通用机器人开发 AI 模型。该合作很可能借助 Azure OpenAI 和 Azure ML 基础设施训练
              Carbon AI 模型，但具体使用哪些 Azure 服务尚未确认。2025 年 4 月，Sanctuary 与 Microsoft 一同在 Hannover Messe 展示 Phoenix，
              释放出通过 Microsoft 企业渠道争取工业自动化客户的信号。
