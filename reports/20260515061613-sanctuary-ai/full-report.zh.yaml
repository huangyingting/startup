      - number: '3.3'
        title: Sanctuary AI 差异化与竞争位置
        blocks:
          - type: paragraph
            body: >
              Sanctuary AI 的竞争差异化建立在三根支柱上：Carbon AI 认知架构、21-DoF 液压灵巧手，以及 Morgan Stanley IP 排名（截至 2025 年 2 月全球 #3）。Carbon
              AI 不同于端到端神经网络方法（Figure AI、Tesla FSD 衍生路线）：它采用模块化认知架构，模仿人脑子系统（记忆、视觉、听觉、触觉），Sanctuary
              称这能带来更可泛化的任务学习。但这种架构差异尚未通过头对头基准比较验证。


              2024 年 12 月 12 日演示的 21-DoF 液压灵巧手，在当前人形机器人竞争者中具有技术辨识度——多数同业（Figure AI、Apptronik、Tesla）采用电驱动，且尚未发布同等级 DoF
              规格。液压驱动可提供高力重比，适合需要精密握力的制造任务，但相比电驱替代方案，也增加了系统复杂度、维护要求和潜在可靠性风险。


              合作生态——Microsoft（Azure AI 基础设施、Azure OpenAI 合作）、Accenture（企业部署服务）和 Magna
              International（汽车级制造）——提供了多数人形机器人同业缺少的分发和制造使能。如果合作能转化为客户引荐和部署交易，这个生态将成为有意义的 go-to-market 差异化。


              关键竞争弱点：Sanctuary 未披露任何具名商业客户或试点部署，而 Figure AI（BMW）、Agility Robotics（Amazon）和 Apptronik（据报道为
              Mercedes-Benz）都有具名制造或物流锚点。相对 Figure AI 的 $515M 融资缺口限制了 R&D 开支和制造规模。2024 年 11 月联合创始人离任（Suzanne
              Gildert，CSO）构成技术领导风险。公司集中在加拿大 / 北美，也限制了全球市场覆盖，弱于拥有日本、欧洲或韩国制造关系的同业。
