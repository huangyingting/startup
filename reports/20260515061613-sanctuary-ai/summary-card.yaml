summary:
  headline: >-
    Sanctuary AI has top-tier humanoid-robotics IP and credible strategic backers, but the absence of disclosed
    customers, revenue, or valuation — combined with the November 2024 co-founder departure and contradictory financing
    reports — makes underwriting premature.
