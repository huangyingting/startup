      - number: '2.2'
        title: Market Sizing and Growth Projections
        blocks:
          - type: paragraph
            body: |
              Goldman Sachs Research published a February 2024 estimate projecting the global humanoid robotics
              market could reach $38 billion by 2035 under an optimistic adoption scenario, with a base case of
              $6 billion and a conservative case of $1 billion, reflecting extreme uncertainty in adoption timing
              and penetration rates. The firm models potential deployment across manufacturing ($14B), logistics
              and warehousing ($10B), retail ($5B), healthcare ($4B), and other services ($5B). These estimates
              assume unit prices declining from $150,000 per robot in 2025 to under $50,000 by 2035. The implied
              compound annual growth rate under the optimistic scenario from 2025 to 2035 is approximately 40-50%,
              contingent on technology cost reduction and buyer adoption milestones that have not yet been validated.

              The International Federation of Robotics (IFR) reported 553,052 industrial robots installed globally
              in 2023, a 6% increase year-over-year, with cumulative operational stock exceeding 3.9 million units.
              Humanoid robots represent a negligible share as of 2026. CB Insights identified 27 well-funded humanoid
              robotics startups as of early 2025, with cumulative disclosed funding exceeding $3 billion. The World
              Economic Forum Future of Jobs 2025 report projects that automation will displace 92 million jobs and
              create 170 million new jobs globally by 2030, providing a broad macro-demand signal for automation
              technologies including humanoid robots.

              Alternative market sizing lenses yield widely divergent estimates. A bottom-up labor-substitution
              model using U.S. Bureau of Labor Statistics data for material movers and warehouse workers
              (approximately 4.3 million U.S. jobs in 2024) suggests a potential SOM of 100,000 to 500,000
              humanoid robot units over 10 years if penetration reaches 2-10%, implying $5B to $25B cumulative
              capital spend at $50K per unit. All sizing estimates carry extreme uncertainty as no commercial-scale
              deployments exist as of mid-2026.
