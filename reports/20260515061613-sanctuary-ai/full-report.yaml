      - number: '5.3'
        title: Software Platform — Carbon AI, Training Pipeline, and Generalization
        blocks:
          - type: paragraph
            body: |
              Carbon AI is Sanctuary's proprietary cognitive control platform. The company describes it as
              a brain-inspired system that integrates subsystems for memory, vision, audition, and touch—
              analogous to cortical regions in the human brain. Unlike transformer-based visuomotor policies
              (e.g., the approaches used by Figure AI with OpenAI, or 1X Technologies with its own LLM
              research), Carbon AI's architecture is not publicly documented in technical detail. The
              biomimetic framing suggests a modular system where specialized modules handle different sensory
              and planning domains, but the specific neural network architectures, inference stack, and
              training data volumes are proprietary.

              The training pipeline combines three mechanisms: (1) teleoperation data collection, where
              human operators wear motion capture or haptic exoskeleton systems to demonstrate tasks and
              generate imitation learning datasets; (2) reinforcement learning, where agents optimize in
              simulation against reward signals; and (3) sim-to-real transfer, where policies trained in
              simulation are deployed on physical hardware. The March 2025 sim-to-real demonstration
              validated that this pipeline can transfer dexterous manipulation policies without manual
              fine-tuning on the physical robot—a significant capability maturity signal.

              The zero-shot in-hand manipulation demonstration (May 2025) showed Phoenix's hydraulic hand
              autonomously reorienting a lettered cube without task-specific training. Zero-shot
              generalization is the hardest test of a manipulation system because it requires the policy
              to reason about object geometry and contact without seeing the exact task before. This
              demonstration, if reproducible in diverse conditions, represents one of the strongest
              technical signals in Sanctuary's public portfolio. However, the demo used a controlled
              single-object scenario; performance on diverse real-world objects in unstructured conditions
              has not been publicly benchmarked.

              Microsoft collaboration, announced May 1, 2024, focuses on developing AI models for
              general-purpose robots. This partnership likely leverages Azure OpenAI and Azure ML
              infrastructure for Carbon AI model training, though the exact Azure services used are not
              confirmed. Sanctuary demonstrated Phoenix at Hannover Messe in April 2025 alongside Microsoft,
              signaling intent to pursue industrial automation customers through Microsoft's enterprise
              channel.
