              - CR031
              - CR032
          - type: callout
            title: Hydraulic Differentiation May Become Liability in Electric-Dominated Market
            body: >-
              Sanctuary AI's hydraulic actuation design is architecturally distinctive but runs counter to the market
              direction. All major competitors use electric actuation. Industry procurement specifications for
              food-grade, pharmaceutical, and semiconductor manufacturing environments typically exclude hydraulic
              systems due to contamination risk. If the humanoid robotics market standardizes on electric actuation — as
              the overwhelming competitor landscape suggests — Sanctuary AI's IP advantage in hydraulic dexterous
              manipulation could become a strategic liability rather than a moat.
            calloutType: insight
