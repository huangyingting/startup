      - number: '5.5'
        title: Competitive Positioning — Hydraulic Dexterity vs. Electric Scale
        blocks:
          - type: paragraph
            body: |
              The humanoid robotics competitive landscape has intensified dramatically since 2023. Sanctuary
              competes against well-funded electric-drive players: Figure AI ($675M+ raised, BMW production
              deployment), 1X Technologies (electric humanoid EVE and NEO, OpenAI partnership), Agility
              Robotics (Digit deployed at Amazon, most mature commercial validation), Apptronik (Apollo,
              NASA heritage, Mercedes-Benz partnership), Boston Dynamics (Atlas, decades of R&D, no
              commercial humanoid product), and Unitree (low-cost H1 and G1 robots targeting research
              and lighter commercial applications). Additionally, Tesla's Optimus program represents a
              potential well-capitalized entrant with consumer-scale manufacturing capability.

              Sanctuary's differentiation relative to this field rests primarily on three claims: (1) the
              21-DoF hydraulic hand, which exceeds the dexterity of most competitor grippers; (2) Carbon
              AI's biomimetic cognitive architecture, which the company argues is better suited to human-
              task generalization than scaled transformer models; and (3) vertical IP integration, which
              gives Sanctuary control over every layer of the stack. However, the hydraulic-hand advantage
              may be muted by the operational complexity it introduces, and Carbon AI's architecture remains
              unvalidated against open benchmarks.

              Critics, including IEEE Spectrum analysts and independent robotics researchers such as Rodney
              Brooks, have questioned whether humanoid robot valuations reflect near-term commercial
              readiness. Brooks' documented predictions note that robotics deployments consistently take
              longer than technology demonstrations imply. Sanctuary's lack of disclosed commercial
              deployments, customer names, and unit economics makes it difficult to distinguish it from
              demo-stage competitors. Against peers that have disclosed production deployments (Agility at
              Amazon, Figure at BMW), Sanctuary's traction is materially weaker on the publicly available
              evidence.
