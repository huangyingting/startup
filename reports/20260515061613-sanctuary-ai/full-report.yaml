  - number: 5
    title: Product & Technology
    sections:
      - number: '5.1'
        title: Product Overview — Phoenix Robots and Market Positioning
        blocks:
          - type: paragraph
            body: |
              Sanctuary AI's primary commercial offering is Phoenix, a general-purpose humanoid robot
              designed for deployment in human-built work environments including warehouses, manufacturing
              facilities, and potentially retail settings. Phoenix is paired with Carbon, a proprietary AI
              cognitive control system that the company describes as mimicking human brain subsystems
              including memory, vision, audition, and touch. Sanctuary frames this pairing as a vertically
              integrated system—from custom motor design and hydraulic actuation through proprietary
              perception, planning, and generative AI layers—as a differentiator over competitors who
              typically integrate third-party actuators and off-the-shelf AI frameworks.

              Through May 2026, Sanctuary has unveiled eight successive generations of Phoenix, with Gen 7
              announced April 25, 2024 and Gen 8 announced December 16, 2024. The company's technology
              page explicitly states that "from motor design to generative AI algorithms for superhuman task
              performance, our solutions are designed, built, owned, and patented by Sanctuary." This
              positions Sanctuary as a full-stack robotics company rather than a system integrator, which
              implies higher R&D investment but stronger IP control and potentially wider margins if
              commercialized at scale.

              The go-to-market strategy is B2B, targeting industrial operators who need to automate
              structured manual tasks in logistics, automotive manufacturing, food processing, and similar
              labor-intensive settings. No publicly named customers, pilot sites, unit volume disclosures,
              or commercial traction metrics exist as of the May 2026 run date, beyond the Magna
              International manufacturing pilot announced in April 2024 whose status has not been
              subsequently confirmed.
