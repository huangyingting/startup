          - type: callout
            title: Financial Opacity Makes Runway Assessment Impossible
            body: >-
              Sanctuary AI has never disclosed revenue, burn rate, or cash runway. The company has raised approximately
              US$100M in its Series B (June 2024) and received a CAD $30M EDC loan. Without financial statements,
              investors cannot determine whether the company has sufficient capital to reach its next commercial
              milestone. Hardware commercialization is capital-intensive; the combination of unknown burn, high capex,
              and a fixed loan obligation creates a risk profile that cannot be assessed from the outside.
            calloutType: risk
            claimRefs:
              - CR024
