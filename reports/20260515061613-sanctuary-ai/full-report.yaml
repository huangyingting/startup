      - number: '4.2'
        title: Cost Structure and Unit Economics
        blocks:
          - type: paragraph
            body: |
              Sanctuary AI's cost structure is dominated by R&D expense (headcount for AI and robotics engineers),
              hardware COGS, and SG&A in enterprise sales and partnership management. As a Series B robotics company
              with an estimated 200-300 person organization, annual operating expense is estimated at $60M-$90M per
              year based on comparable-stage robotics peers and disclosed BC payroll data. This estimate is not
              confirmed by any public Sanctuary financial disclosure.

              Robot manufacturing COGS includes materials (actuators, sensors, processors, structural components),
              Magna contract manufacturing labor, and quality assurance. At an estimated hardware ASP of $125K and
              industry-typical robotics gross margin (40-60% for hardware), implied COGS per unit ranges from
              $50,000-$75,000. These figures are entirely modeled; Sanctuary has not disclosed unit economics.

              R&D intensity is expected to be high (estimated 50-60% of total OpEx), consistent with comparable
              humanoid robotics startups at the pre-commercial stage. The AI training pipeline for Carbon AI —
              including data collection via human teleoperation, GPU compute infrastructure, and model iteration
              cycles — represents a significant recurring cost that is partially subsidized by the Microsoft Azure
              AI partnership.

              Labor cost arbitrage is a key unit economics argument: if a Phoenix humanoid at $125K ASP (or
              $5-$8/hour on RaaS) can substitute for a $45,000/year warehouse or manufacturing worker in a 5-8
              year payback period, the value proposition is potentially compelling. However, this analysis ignores
              maintenance costs, uptime variability, integration costs, and software upgrade requirements — all of
              which inflate the true cost of ownership beyond naive hardware cost comparisons.
