        title: Exhibits
        blocks:
          - type: callout
            title: Founder Departure and Leadership Transition
            body: >-
              Co-founder Suzanne Gildert, who served as Chief Science Officer and was instrumental in the Carbon AI
              platform development, departed the company in November 2024. This represents a material founder and
              technical leadership loss. The company framed the transition as planned, but no succession plan or
