      - number: '5.4'
        title: Technical Dependencies, Risks, and IP Landscape
        blocks:
          - type: paragraph
            body: |
              Sanctuary's most significant technical dependency is Microsoft: the AI model development
              partnership, potential Azure infrastructure reliance, and Hannover Messe co-appearance all
              indicate a deep integration with Microsoft's AI ecosystem. If Sanctuary's Carbon AI training
              pipeline is tightly coupled to Azure ML or Azure OpenAI, a pricing change, API deprecation,
              or deterioration of the partnership relationship could materially impact the AI development
              roadmap. No public source confirms whether Sanctuary has any multi-cloud redundancy.

              The hydraulic actuation choice for the 21-DoF hand and likely the broader robot design
              introduces operational risks relative to electric competitors. Hydraulic systems require
              periodic fluid changes, seal maintenance, and are susceptible to leaks in field environments.
              In food processing, cleanroom, or sensitive-materials settings, hydraulic fluid contamination
              is a disqualifying safety and compliance risk. The mass and complexity penalties of hydraulic
              systems—relative to brushless electric motors—also affect payload and runtime economics.
              Whether Sanctuary plans a future electric-only variant or hybrid design has not been
              disclosed.

              On IP, Morgan Stanley ranked Sanctuary fourth globally for humanoid robotics patents in
              November 2024 and third in February 2025, reflecting active filings across motor design,
              manipulation algorithms, and sensor integration. The company's patents.google.com search
              returns results for Sanctuary Cognitive Systems Corporation confirming active patent
              prosecution, but specific patent numbers, claims scope, filing jurisdictions, and grant
              status are not enumerated publicly. The Magna manufacturing partnership, announced April 2024
              and included in the Series B investor roster, would theoretically provide scale manufacturing
              capability, but no public updates on Magna's production role or any Magna-manufactured Phoenix
              units have been disclosed through May 2026.

              Sanctuary's GitHub organization exists but has minimal public code activity, suggesting the
              company has not pursued an open-source developer strategy. No Hacker News technical deep-
              dives, Stack Overflow tags, npm or PyPI packages, or developer community signals beyond
              product announcement discussions have been identified. This limits independent validation of
              Carbon AI's technical claims and reduces organic developer adoption that could accelerate
              third-party integrations.
