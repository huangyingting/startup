      - number: '2.3'
        title: Buyer and Segment Landscape
        blocks:
          - type: paragraph
            body: |
              The buyer-user-payer structure for humanoid robotics varies significantly by segment. In manufacturing,
              the buyer is typically the plant operations or automation engineering team, the user is the production
              line supervisor or technician, and the payer is corporate capex budget for productivity improvement.
              Budget ownership sits with operations or engineering leadership, not IT. In logistics and warehousing,
              the buyer is fulfillment operations or supply chain leadership at e-commerce operators or 3PLs.
              The user is the warehouse floor manager. Amazon operates over 750,000 mobile robots as of 2024 but
              has not deployed humanoid robots at scale. Adoption triggers include peak-season labor scarcity and
              TCO parity with temp labor.

              In retail and hospitality, adoption drivers include labor turnover exceeding 100% annually and minimum
              wage increases. Constraints include customer acceptance (uncanny valley concerns) and unproven ROI.
              Healthcare and elder care represent a high-potential but highly regulated segment. The U.S. Bureau of
              Labor Statistics projects 203,000 annual nursing job openings through 2032 due to retirements.
              Constraints include stringent medical device regulation, liability risk, and patient consent concerns.
              Defense and government segments offer long-term potential for hazardous environment automation, with
              government procurement driven by capex appropriations and readiness mandates, though no humanoid
              vendor currently has a significant defense contract.
