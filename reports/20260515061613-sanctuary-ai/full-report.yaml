  - id: FE001
    title: Carbon AI Platform Architecture Stack
    type: stack
    layout: wide
    summary: >-
      Sanctuary AI's product architecture is a four-layer vertical stack: (1) a physical hardware layer comprising the
      Phoenix robot body and proprietary hydraulic/actuator systems; (2) a sensing layer incorporating vision, audio,
      and tactile modalities; (3) the Carbon AI cognitive software layer with specialized modules for memory,
      perception, planning, and control; and (4) an AI training infrastructure layer anchoring sim-to-real,
      teleoperation, and reinforcement learning pipelines.
    data:
      layers:
        - id: hardware
          label: Physical Hardware Platform
          modules:
            - Phoenix Gen 8 robot body (anthropomorphic, ~human scale)
            - 21-DoF hydraulic dexterous hand
            - Hydraulic actuators (joints and manipulation)
            - Tactile sensor array (proprietary, integrated Dec 2024)
        - id: sensing
          label: Multi-Modal Sensing Layer
          modules:
            - Computer vision (RGB + depth cameras)
            - Auditory processing (microphone array)
            - Tactile feedback (in-hand pressure/slip sensors)
            - Proprioception (joint encoders, IMU)
        - id: carbon-ai
          label: Carbon AI Cognitive Software (Proprietary)
          modules:
            - Memory module (episodic + semantic task context)
            - Visual cortex analog (scene understanding, object recognition)
            - Auditory cortex analog (instruction parsing)
            - Motor cortex analog (policy execution, torque generation)
            - Sim-to-real transfer runtime
            - Zero-shot generalization inference
        - id: training
          label: AI Training and Infrastructure Layer
          modules:
            - Teleoperation data collection (human demonstrations)
            - Reinforcement learning in simulation
            - Simulation environment (physics engine, domain randomization)
            - Azure AI model training (inferred, via Microsoft partnership)
    approximationNotes: >-
      Layer structure inferred from product descriptions, partnership announcements, and technical demonstrations.
      Internal module names and interfaces are Sanctuary-proprietary and not publicly documented. Azure dependency is
      inferred from the Microsoft partnership; not confirmed as exclusive cloud provider.
    claimRefs:
      - CE004
      - CE015
      - CE016
      - CE017
      - CE020
      - CE021
  - id: FE002
    title: Phoenix Robot Deployment Workflow
    type: flow
    layout: standard
    summary: >-
      The end-to-end Phoenix robot deployment workflow progresses from task identification and training pipeline
      execution through policy validation, on-site deployment, and telemetry feedback. Carbon AI mediates every stage,
      converting customer task definitions into trained robot policies that execute autonomously on Phoenix hardware.
    data:
      nodes:
        - id: n1
          label: 1. Customer Task Scoping
          description: >-
            Industrial operator identifies target tasks (e.g., pick-pack, assembly); Sanctuary team scopes task
            complexity and training requirements
        - id: n2
          label: 2. Teleoperation Data Collection
          description: >-
            Human operators demonstrate task using motion capture or haptic hardware; demonstration data feeds Carbon AI
            imitation learning pipeline
        - id: n3
          label: 3. Simulation Training (RL + domain randomization)
          description: >-
            Reinforcement learning agent trains in simulation with domain randomization; Carbon AI cognitive modules
            refined from imitation + RL signals
        - id: n4
          label: 4. Sim-to-Real Transfer
          description: >-
            Trained policy deployed directly on Phoenix hardware without manual fine-tuning; validated via March 2025
            dexterous manipulation demo
        - id: n5
          label: 5. On-Site Deployment
          description: >-
            Phoenix robot deployed at customer facility; Carbon AI executes task policy; tactile sensors close feedback
            loop for grasp adaptation
        - id: n6
          label: 6. Zero-Shot Generalization
          description: >-
            Carbon AI applies learned policies to novel objects/configurations without retraining; demonstrated via May
            2025 cube reorientation
        - id: n7
          label: 7. Telemetry and Continuous Learning
          description: >-
            On-device and cloud telemetry feeds back into training pipeline; new demonstrations and edge-case data
            improve policy quality
      edges:
        - from: n1
          to: n2
        - from: n2
          to: n3
        - from: n3
          to: n4
        - from: n4
          to: n5
        - from: n5
          to: n6
        - from: n5
          to: n7
        - from: n7
          to: n2
    approximationNotes: >-
