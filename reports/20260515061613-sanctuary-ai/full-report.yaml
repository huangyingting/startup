companyProfile:
  summary: >-
    Sanctuary AI (Sanctuary Cognitive Systems Corporation) is a Vancouver-based humanoid robotics company founded in
    2018 by Geordie Rose, Suzanne Gildert, and Olivia Norton. It develops the Phoenix general-purpose humanoid robot —
    now in its eighth generation — paired with the Carbon AI cognitive control system, and has invested heavily in
    dexterous manipulation, with widely covered demonstrations of a 21 degrees-of-freedom hydraulic hand, sim-to-real
    transfer, and zero-shot in-hand manipulation. Morgan Stanley research has ranked Sanctuary AI in the global top tier
    for humanoid-robotics IP, and the company has announced partnerships with Magna and Microsoft. However, the company
    has never disclosed a valuation, revenue, ARR, customer names, or pilot sites; co-founder and Chief Science Officer
    Suzanne Gildert departed in a November 9 2024 leadership transition; and the structure of the June 2024 financing
    (US$100M Series B versus CAD $30M EDC loan) remains contradicted across public sources.
