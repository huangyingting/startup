          - type: callout
            title: Microsoft Dependency Is Both Opportunity and Concentration Risk
            body: >-
              Microsoft is simultaneously Sanctuary AI's most valuable strategic partner and its most concentrated
              single-vendor dependency. Azure cloud infrastructure, AI model development collaboration, and joint
              go-to-market exposure at Hannover Messe 2025 are all tied to this single relationship. No alternative
              cloud provider or AI model partner has been disclosed. If Microsoft were to reduce, reprice, or exit this
              relationship, Sanctuary AI would face simultaneous technical infrastructure disruption and go-to-market
              impact.
            calloutType: risk
