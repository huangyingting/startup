            title: Morgan Stanley Patent Ranking
            body: >
              Sanctuary AI ranked #3 globally in humanoid robotics IP in February 2025 per Morgan Stanley's Humanoid 100
              report, upgraded from #4 in November 2024. This ranking signals a defensible intellectual property
              portfolio that has competitive value independent of commercial traction, and provides a partial floor to
              valuation. Combined with the Microsoft Azure AI collaboration and the 21-DoF hydraulic hand demonstration
              (December 2024), the IP position supports a non-trivial strategic acquisition premium.
            calloutType: strength
            claimRefs:
              - CV021
              - CV022
          - type: callout
            title: Zero Disclosed Revenue and No Confirmed Customers
            body: >
              As of May 2026, Sanctuary AI has not announced any commercial customer, recurring revenue, or deployment
              contract. The Magna International manufacturing pilot announced in April 2024 has not been followed by a
              commercial agreement. This absence of revenue validation is the primary discount factor against the IP
              bull case. Without at least one disclosed commercial deployment, any valuation above $500M reflects
              speculative IP and platform optionality rather than demonstrated business value.
            calloutType: risk
            claimRefs:
              - CV005
              - CV023
              - CV024
              - CV029
          - type: callout
            title: Research-More Recommendation Pending Data-Room Access
            body: >
              Upgrading to track or buy requires at minimum one of: (1) a disclosed Series D valuation above $800M with
              an arms-length institutional lead; (2) a confirmed commercial customer with recurring deployment contract;
              or (3) an audited ARR figure above $10M suggesting early commercialization. None of these conditions are
              met as of the May 2026 run date. The probability-weighted expected valuation of approximately $618M is
              below the funding-multiple proxy midpoint of $730M, reflecting the information-risk premium appropriate
              for a company with complete financial opacity.
            calloutType: recommendation
            claimRefs:
              - CV040
              - CV009
              - CV005
          - type: callout
            title: 2x–6x Capital-Raised Multiple Proxy
            body: >
              The implied valuation range of $400M–$1.5B rests on the assumption that pre-revenue deep-tech companies at
              the Series C stage typically command 2x–6x their total raised capital. This range is benchmarked against
              Figure AI (3.85x), comparable AI-hardware startups, and standard VC mark-to-market conventions. The
              assumption could be invalidated if Sanctuary's preference stack, anti-dilution provisions, or government
              investor pricing compressed the effective entry multiple below market norms.
