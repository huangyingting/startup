  - number: 8
    title: Valuation
    sections:
      - number: '8.1'
        title: Valuation Overview and Information Limitations
        blocks:
          - type: paragraph
            body: >
              Sanctuary AI is a private Canadian corporation with no legal obligation to file financial statements with
              the SEC, SEDAR, or any other public regulator. As of May 2026, the company has disclosed no valuation
              across any of its funding rounds, no annual recurring revenue, no customer count, and no headcount figure.
              All financial metrics applied in this chapter are either press-release-level facts (funding amounts,
              investor names) or analyst-derived estimates benchmarked against comparable humanoid and service robotics
              companies. This information opacity is the single most important constraint on valuation analysis.

              The most recent confirmed funding event is the Series C closed in May–July 2024, with BDC Capital (Thrive
              Venture Fund) as lead investor alongside InBC Strategic Investments, Obvious Ventures, Verizon Ventures,
              Accenture Ventures, Microsoft, Magna International, Workday Ventures, and Bell. The stated raise size in
              press coverage was approximately $99.8M–$100M. In June 2024, Export Development Canada separately provided
              a CAD $30M (~USD $22M) government-backed loan for R&D purposes. Total cumulative disclosed capital stands
              at approximately $243.8M across all rounds. No Series D has been announced as of the May 2026 run date.

              Given the absence of disclosed financial metrics, three valuation proxies are available: (1)
              funding-multiple benchmarking against comparable private robotics companies; (2) comparable transaction
              analysis using disclosed valuations of peer companies (Figure AI, Boston Dynamics); and (3) IP and
              strategic-partnership premium based on Morgan Stanley's patent-ranking data and the Microsoft Azure AI
              collaboration. All three approaches carry significant uncertainty and should be treated as orientation
              ranges rather than point estimates. The estimated fair-value range is $400M–$1.5B, with the midpoint near
              $700M.
