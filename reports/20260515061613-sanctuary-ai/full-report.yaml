      - number: '7.5'
        title: Strategic, Regulatory and Workforce Risks
        blocks:
          - type: paragraph
            body: >
              Sanctuary AI's most concentrated strategic dependency is its partnership with Microsoft. Microsoft
              provides Azure cloud infrastructure for Carbon AI inference, AI model development collaboration, and
              co-marketing through joint appearances at events like Hannover Messe 2025. If Microsoft were to reduce,
              reprice, or terminate this partnership — through an acquisition of a competing humanoid AI platform, a
              strategic pivot, or a commercial dispute — Sanctuary AI would face disruption to both its technical
              infrastructure and its enterprise go-to-market strategy. No public disclosure of the partnership's
              contractual terms, exclusivity provisions, or pricing structure is available.

              The regulatory landscape for humanoid robots operating in industrial workplaces alongside human workers is
              nascent. In Canada, WorkSafeBC and provincial occupational health and safety bodies govern workplace
              safety but have not established specific standards for humanoid robot co-worker scenarios. In the US,
              OSHA's existing robot safety standards (primarily based on ISO 10218 for industrial robots) were not
              designed for bipedal, general-purpose humanoid robots with advanced manipulation capabilities. The absence
              of a clear regulatory framework creates two risks: (1) customers face legal uncertainty about liability
              when a humanoid robot causes a workplace injury, potentially delaying adoption; and (2) Sanctuary AI may
              face retrospective regulatory requirements that necessitate costly robot design modifications or
              operational restrictions.

              Sanctuary AI's hydraulic positioning in a market trending toward electric actuation creates a long-term
              strategic alignment risk. If the prevailing industrial robotics safety standards, insurance policies, or
              customer procurement requirements come to specify electric-only actuation (as has occurred in some
              clean-room specifications already), Sanctuary AI would face a forced architectural pivot. The company's IP
              portfolio, which currently provides competitive differentiation, is concentrated in hydraulic dexterous
              hand technology — making an electric pivot technically costly.

              Historical precedents from failed general-purpose humanoid robot programmes — Honda ASIMO, SoftBank Pepper
              — illustrate that even well-capitalized, technically sophisticated programmes can fail to achieve
              commercial viability. These predecessors faced similar challenges: strong demonstrations, limited customer
              deployments, and eventual commercial discontinuation. While Sanctuary AI's 2024-2026 progress
              distinguishes it from earlier failures, the structural parallels are a credible adverse signal that
              investors should weigh.
