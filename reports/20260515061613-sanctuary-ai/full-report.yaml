      - number: '8.5'
        title: Conclusion and Investment Recommendation
        blocks:
          - type: paragraph
            body: >
              Sanctuary AI occupies a technically credible position in the humanoid robotics landscape—patent IP ranked
              #3 globally, a co-development relationship with Microsoft Azure AI, a Gen 8 Phoenix platform with a 21-DoF
              hydraulic hand, and a manufacturing partnership with Magna International—but the absence of any disclosed
              revenue, valuation, customer, or headcount makes confident capital allocation impossible at this stage of
              diligence.

              The probability-weighted valuation using bull (20%), base (55%), and bear (25%) scenarios produces an
              expected value of approximately $600M–$750M. Bull scenario ($1.2B, prob 20%) assumes a confirmed Series D
              at a disclosed valuation above $1B, supported by commercial customer announcement and positive Microsoft
              partnership metrics. Base scenario ($650M, prob 55%) assumes continued pre-commercial development with
              additional strategic investors maintaining the IP and platform value. Bear scenario ($200M, prob 25%)
              assumes a down-round, no commercial customer by Q4 2026, and potential leadership attrition.

              Probability-weighted outcome = 0.20 × $1.2B + 0.55 × $650M + 0.25 × $200B = $240M + $357.5M + $50M =
              $647.5M. At the implied midpoint of the funding-based proxy ($730M), the probability-weighted valuation of
              $648M represents a slight discount, consistent with the information risk premium that a prospective
              investor should demand for a company with zero public financial disclosure.

              The recommendation is research-more. Upgrading to track or buy requires any of the following: (1) a
              disclosed Series D valuation above $800M with a new arms-length institutional lead investor; (2) a
              confirmed commercial customer deployment generating recurring revenue; (3) a strategic acquisition offer
              from a major industrial or technology platform that creates liquidity at a disclosed price. Absent these
              catalysts, capital commitment is premature.
            claimRefs:
              - CV040
              - CV021
              - CV022
              - CV003
              - CV005
              - CV009
              - CV029
              - CV035
