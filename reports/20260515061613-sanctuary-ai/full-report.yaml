            body: |
              The sole publicly confirmed customer engagement for Sanctuary AI is a strategic partnership
              with Magna International, a Canadian Tier-1 automotive parts manufacturer with over 350
              manufacturing facilities globally. The partnership was announced on April 11, 2024, via
              Sanctuary AI's news page and covered by Canadian and robotics media including Betakit and
              The Robot Report. The announcement stated that Phoenix robots would be deployed in a Magna
              manufacturing facility setting, with the goal of validating the robot's capability to
              perform structured manual tasks in an industrial context.

              No follow-up press releases, outcome reports, or case studies confirming the results of
              the Magna pilot have been published by Sanctuary AI or Magna as of May 2026 — a period
              of 13 months after the initial announcement. No Magna executive has been quoted endorsing
              Phoenix's performance. The silence is unusual by industry standards, where successful pilots
              typically generate co-branded publicity within six to twelve months. This absence strongly
              implies either the pilot concluded without a commercial agreement, was placed on hold, or
              remains under a non-disclosure agreement that bars public disclosure.

              The nature and scope of the Magna engagement are important to understand. Magna International
              was also a strategic investor in Sanctuary AI's Series B round announced in June 2024,
              meaning the relationship combines financial investment with operational pilot evaluation.
              This dual role — investor and potential customer — is common in early-stage robotics but
              complicates interpretation of the partnership's depth and independence as customer proof.
              If the pilot concluded without conversion to a commercial agreement, it would represent
