  - number: 4
    title: Financials
    sections:
      - number: '4.1'
        title: Revenue Streams and Monetization Framework
        blocks:
          - type: paragraph
            body: |
              Sanctuary AI operates without publicly disclosed revenue as of May 2026. The company has outlined a
              Robotics-as-a-Service (RaaS) revenue model, consistent with industry peers (Agility Robotics, Figure
              AI), wherein hardware is deployed at customer facilities and billed on a usage or subscription basis
              rather than sold outright. This model delays revenue recognition relative to outright hardware sales
              but creates higher lifetime customer value and supports enterprise adoption by reducing upfront capital
              requirements.

              Sanctuary's estimated hardware ASP of $100,000-$150,000 per unit is analyst-derived from comparable
              humanoid robot prices and has not been confirmed by the company. At RaaS blended rates of $5-$8 per
              robot-hour (consistent with labor arbitrage economics vs. human workers at $25-$35/hr with benefits),
              annual revenue per robot would be approximately $44,000-$70,000 at 50% utilization on a two-shift
              basis. This implies meaningful unit economics only if Sanctuary achieves high-utilization deployments
              in structured manufacturing or logistics environments.

              Secondary revenue streams include: (1) AI software licensing via the Carbon AI platform for
              third-party hardware applications (not publicly confirmed), (2) professional services revenues via
              the Accenture partnership for enterprise deployment and integration (structural possibility but not
              disclosed), and (3) potential government and defense contracts supported by the Export Development
              Canada (EDC) relationship and BDC Capital involvement. None of these revenue streams has been
              confirmed with commercial disclosure.

              Sanctuary's current revenue stage is pre-commercial or early-commercial. The company's Series B
              investor roster (Microsoft, Accenture, Magna, Workday, Bell, BDC, EDC, Evok) suggests strategic
              alignment with revenue pathways but does not confirm revenue generation. Strategic investors
              frequently invest for option value and partnership access, not because commercial revenue is
              imminent.
