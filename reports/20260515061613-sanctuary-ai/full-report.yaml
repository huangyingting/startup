            body: |
              Sanctuary AI's customer base as of May 2026 is almost entirely undisclosed. The company
              has made no public announcement of a customer count, annual recurring revenue, active
              deployments, or named production customers beyond a single strategic pilot engagement with
              Magna International in April 2024. Sanctuary AI's official website contains no customer
              testimonials, reference accounts, case studies, or logos demonstrating active usage at the
              time of this analysis.

              The company targets B2B industrial markets, primarily warehousing, automotive manufacturing,
              retail operations, and food service. Sanctuary's stated positioning is to provide Phoenix
              humanoid robots as a workforce supplement to industrial operators facing structural labor
              shortages. The co-pilot model — in which a human supervisor oversees the robot during
              initial deployments — is described as the customer onboarding pathway. Despite these stated
              targets, no contracts, deployment agreements, or post-pilot continuations have been publicly
              confirmed.

              Strategic investors — including Microsoft, Accenture, Magna International, Verizon Ventures,
              Workday Ventures, BDC Capital, and InBC — may represent an indirect channel to enterprise
              customers, as is common in early-stage B2B robotics companies. However, the conversion of
              investor relationships into commercial customer agreements is unconfirmed in Sanctuary AI's
              case. The company's presentation at Hannover Messe with Microsoft in April 2025 signals
              continued efforts to reach industrial buyers in the manufacturing vertical, but no deals
              emerged from that event in the public record. The evidence gap between stated market
              ambitions and documented customer traction is the most significant risk in this chapter.
