chapters:
  - number: 1
    title: Company Overview
    sections:
      - number: '1.1'
        title: Identity, Product, and Business Model
        blocks:
          - type: paragraph
            body: >
              Sanctuary Cognitive Systems Corporation (operating as Sanctuary AI) is a Vancouver, British Columbia-based
              robotics and artificial intelligence company founded in 2018 by Geordie Rose (CEO), Suzanne Gildert
              (former Chief Science Officer, departed November 2024), and Olivia Norton (COO). The founders came from
              D-Wave Systems, a quantum computing pioneer, bringing deep technical backgrounds in physics, AI research,
              and industrial operations.


              Sanctuary's stated mission is to create general-purpose humanoid robots capable of performing a wide range
              of human tasks across industrial, logistics, retail, and potentially consumer settings. The company's
              product architecture rests on two integrated platforms: Phoenix, a humanoid robot form factor currently in
              its eighth generation (Gen 8 unveiled December 16, 2024), and Carbon, the proprietary AI control system
              described as mimicking human brain subsystems including memory, vision, audition, and touch.


              The business model is B2B-focused with deployment pilots in logistics warehouses, manufacturing
              facilities, and potentially retail environments. Unlike fixed industrial robots or single-task automation,
              Sanctuary positions Phoenix as a general-purpose platform trained through teleoperation, reinforcement
              learning, and sim-to-real transfer techniques to adapt to varied workflows without custom programming for
              each task. No specific customers, deployment scale, pricing structure, or revenue figures have been
              publicly disclosed as of the May 2026 run date.


              The company operates from Vancouver, British Columbia, Canada, with research, engineering, and piloting
              functions centralized at the headquarters. Legal registration is under Sanctuary Cognitive Systems
              Corporation. International expansion plans, if any, have not been announced.
            claimRefs:
              - CO001
              - CO002
              - CO003
              - CO004
              - CO005
              - CO020
      - number: '1.2'
        title: Founders, Leadership, and Governance
        blocks:
          - type: paragraph
            body: >
              Geordie Rose (CEO, co-founder) is a physicist and serial entrepreneur who previously founded D-Wave
              Systems, a quantum computing company that reached commercial deployment and significant venture backing.
              Rose's technical background in complex hardware-software systems and his prior fundraising track record
              position him as a credible deep-tech founder. His public presence includes media interviews, conference
              presentations, and press release quotations establishing him as the primary spokesperson for Sanctuary's
              mission and product vision. Key-person risk is material: Rose is the face of the company, the primary
              capital-raiser, and the strategic decision-maker with no publicly identified successor.


              Suzanne Gildert (co-founder, former Chief Science Officer) was a D-Wave alumna with expertise in quantum
              computing, AI, and cognitive architectures. Gildert was instrumental in the early technical direction of
              the Carbon AI platform. On November 9, 2024, Sanctuary announced a "significant leadership transition"
              without specifying Gildert's ongoing role or departure; secondary coverage and archived news references
              suggest she left the company at that juncture. This constitutes a material founder departure and potential
              risk to the technical roadmap, though the company framed the transition as planned.


              Olivia Norton (COO, co-founder) handles operations, partnerships, and scaling activities. Her background
              is less publicly documented than Rose or Gildert, but her co-founder status and operational role indicate
              involvement in manufacturing partnerships (e.g., with Magna), deployment logistics, and investor
              relations.


              No board of directors, independent directors, advisors, or investor board seats have been publicly
              disclosed. Governance structure, equity ownership distribution, and founder vesting terms are unknown. The
              lack of disclosed governance transparency increases diligence risk, particularly given the November 2024
              leadership change and the absence of public filings (Sanctuary is a private Canadian entity with no SEC or
              equivalent regulatory disclosures).
