      - number: '2.5'
        title: Exhibits
        blocks:
          - type: callout
            title: Extreme Market Sizing Uncertainty
            body: >-
              The Goldman Sachs humanoid robot market projection ranges from $1B (conservative) to $38B (optimistic) by
              2035, a 38x spread that reflects deep uncertainty in adoption timing, cost reduction, and technology
              maturity. No analyst firm has been able to narrow this range materially since 2024 because no
              commercial-scale deployments exist to calibrate projections. Diligence should not rely on the $38B
              headline figure without understanding the assumptions and their sensitivities.
            calloutType: risk
            claimRefs:
              - CM006
              - CM007
              - CM034
          - type: callout
            title: TCO Parity Gap Blocks Near-Term Adoption
            body: >-
              At current estimated prices of $100K-$150K per unit plus $50K-$100K integration, the total 5-year
              ownership cost for a humanoid robot is approximately $200K-$250K. A typical warehouse worker costs
              approximately $52K/year all-in. The robot must achieve 90%+ utilization and perform reliably for 3-4 years
              to break even. No vendor has published validated benchmarks proving this is achievable in production
              environments as of May 2026. This TCO gap is the single largest near-term adoption barrier for Sanctuary
              and all humanoid robot vendors.
            calloutType: risk
            claimRefs:
              - CM026
              - CM027
              - CM028
          - type: callout
            title: Labor Shortage Is a Multi-Year Structural Driver
            body: >-
              The U.S. structural labor supply-demand imbalance (8.1M openings vs 7.4M unemployed workers as of April
              2026) and aging OECD demographics create a durable demand signal for humanoid robotics that persists
              independent of near-term technology readiness. Even if commercial deployment lags by 2-3 years relative to
              current projections, the underlying demand driver is structural and not cyclical, supporting continued
              investor interest in the sector and Sanctuary's fundraising capacity.
            calloutType: insight
            claimRefs:
              - CM019
              - CM025
  - number: 3
    title: Competitors
    sections:
