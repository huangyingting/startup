      - number: '7.6'
        title: Exhibits
        blocks:
          - type: callout
            title: Zero Disclosed Customers Is the Primary Thesis-Break Signal
            body: >-
              As of May 2026, Sanctuary AI has disclosed no commercial customers, no revenue, and no confirmed
              continuation of its only named engagement (Magna International). Every competitor in the humanoid robot
              space — Figure (BMW), Agility (Amazon), 1X (commercial deployments) — has named production customers. The
              absence of even one reference customer is the single most important negative signal in this analysis.
              Until a named production customer is announced, the commercial viability thesis rests entirely on
              technology demonstrations and investor confidence.
