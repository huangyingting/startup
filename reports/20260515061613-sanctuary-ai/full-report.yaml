      - number: '2.4'
        title: Growth Drivers and Adoption Constraints
        blocks:
          - type: paragraph
            body: |
              Labor shortage and wage inflation are the primary demand drivers. U.S. JOLTS data showed 8.1 million
              job openings and 7.4 million unemployed workers in April 2026, sustaining a structural labor
              supply-demand imbalance. Warehouse and logistics roles face annual turnover rates of 40-60%. Wage
              growth for material movers averaged 4.2% annually from 2020-2025, outpacing productivity gains and
              improving the payback calculation for robot substitution. Demographic trends in OECD countries
              (aging populations, declining working-age populations in Japan, South Korea, and parts of Europe)
              create a durable 10-15 year demand signal independent of near-term technology readiness.

              Regulatory and policy drivers include OSHA ergonomic standards, carbon footprint reduction targets,
              and industrial policy incentives (U.S. CHIPS Act, EU Horizon robotics grants, China Made in China
              2025 targets). AI foundational model maturation (vision-language-action models, behavior cloning,
              sim-to-real transfer) reduces the time and cost for Sanctuary's Carbon platform to train new task
              policies and is a critical enabler for general-purpose viability.

              Technical and economic constraints remain severe. Total cost of ownership for a humanoid robot over
              5 years includes purchase price ($100K-$150K as of 2026), integration services ($50K-$100K), and
              annual maintenance ($10K-$20K/year), totaling approximately $200K-$250K. Compared to a warehouse
              worker earning approximately $52K total compensation annually, the robot must achieve 90%+ utilization
              to break even on a 3-year payback. As of May 2026, no vendor has published validated productivity
              benchmarks from customer deployments. Safety standards for human-robot collaboration in unstructured
              environments (ISO TC 299) do not yet cover general-purpose humanoids. Liability frameworks for
              robot-caused workplace injuries remain unclear. Capital intensity creates a chicken-and-egg adoption
              problem, and technology maturity risk distinguishes humanoid robots from mature automation alternatives.
              Rodney Brooks and IEEE Spectrum analysis cite these commercialization barriers as structural, not just
              transient, risks for current humanoid startups.
