  - number: 7
    title: Risks
    sections:
      - number: '7.1'
        title: Technical and Product Risks
        blocks:
          - type: paragraph
            body: >
              Sanctuary AI's Phoenix robot relies on a 21-degree-of-freedom hydraulic hand that the company describes as
              industry-leading in dexterity. Hydraulic actuation delivers higher force density than comparable electric
              systems but introduces a set of reliability and operational risks that electric-actuated competitors do
              not face. Hydraulic fluid circuits are susceptible to leakage, thermal expansion, seal degradation, and
              contamination. In production industrial environments — food processing, pharmaceuticals, semiconductor
              manufacturing, or medical device assembly — hydraulic fluid spills are not merely a maintenance issue but
              a regulatory and product-liability issue. No public disclosure exists of Sanctuary AI's hydraulic fluid
              containment design, seal life specifications, maintenance intervals, or contamination-risk mitigations.

              The Carbon AI cognitive software runs inference through Microsoft Azure cloud infrastructure. This
              dependency creates a single point of failure for robot operation in environments without reliable internet
              connectivity, in air-gapped facilities (defense, nuclear, pharmaceutical), and in any scenario where Azure
              experiences an outage or price-tier change. Sanctuary AI's website confirms the Microsoft collaboration
              but does not disclose edge inference capability, local fallback logic, or latency tolerance
              specifications.

              The sim-to-real transfer gap — the difference between robot performance in simulation environments and
              real physical deployments — is Sanctuary AI's most technically consequential unresolved risk. The company
              has demonstrated impressive manipulation capabilities on YouTube and at trade shows such as Hannover Messe
              2025. However, no sustained production deployment data, error rate statistics, or uptime metrics have been
              disclosed. The March 2025 sim-to-real dexterous manipulation demo confirms progress but does not validate
              commercial reliability. Until sustained deployment data is published, the transfer gap remains a material
              assumption in any investment thesis.

              Patent strength is a double-edged risk. Morgan Stanley ranked Sanctuary AI #3 globally in humanoid IP as
              of February 2025, which is a positive signal. However, many patents in the portfolio are still pending,
              meaning competitors can study published applications and design around claims before they grant. A
              rejection or narrowing of key pending patents — particularly those covering the hydraulic hand or Carbon
              AI reasoning architecture — would materially weaken Sanctuary AI's IP moat.
            claimRefs:
              - CR001
              - CR002
              - CR003
              - CR004
              - CR005
              - CR006
              - CR007
