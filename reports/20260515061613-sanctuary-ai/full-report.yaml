      - number: '4.4'
        title: Capital Adequacy and Financial Verdict
        blocks:
          - type: paragraph
            body: |
              Based on disclosed capital and comparable-stage burn rates, Sanctuary AI has an estimated runway of
              24-36 months from the June 2024 Series B close, implying an effective capital horizon through
              mid-2026 to mid-2027. This estimate assumes $60M-$90M annual burn (mid-case $75M) and no
              significant revenue contribution in the near term. Under a higher-burn scenario ($90M+), runway
              shortens to approximately 24 months from Series B close (mid-2026), creating urgency for either
              revenue acceleration or a Series C raise.

              The financial verdict for institutional investors is highly conditional. Sanctuary AI has the following
              financial risk factors: (1) no publicly disclosed revenue, creating zero financial validation of the
              commercial model; (2) a $515M funding gap vs. Figure AI that constrains competitive scale; (3)
              co-founder departure introducing key-person and IP continuity risk; (4) non-exclusive partnerships
              that provide no contractual revenue commitment from Microsoft, Accenture, or Magna; and (5) Unitree
              competition from below that compresses potential pricing power in entry-level humanoid applications.

              Financial opportunities that could alter the verdict: (1) a named commercial customer announcement
              or disclosed pilot with productivity metrics would substantially de-risk the commercial model; (2) a
              Series C raise closing above $200M would extend runway and signal continued investor confidence;
              (3) a Carbon AI platform licensing deal with a non-robotics enterprise would demonstrate software
              revenue diversification; (4) a government or defense contract (enabled by BDC/EDC relationships)
              would provide non-cyclical revenue. None of these has been publicly disclosed as of May 2026.

              Capital efficiency relative to peers is uncertain — Sanctuary's $160M capital base vs. Agility's
              $250M and Figure AI's $675M suggests either greater capital efficiency or underinvestment in critical
              R&D and sales functions. The Morgan Stanley IP #3 ranking and 21-DoF hand demonstration suggest
