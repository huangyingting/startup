      - number: '7.2'
        title: Market and Competitive Risks
        blocks:
          - type: paragraph
            body: >
              Sanctuary AI's most pressing near-term risk is the complete absence of disclosed commercial customers as
              of May 2026. The only publicly named customer engagement was the strategic manufacturing pilot with Magna
              International, announced April 11, 2024. No subsequent announcement has confirmed the continuation,
              production scale-up, or commercial terms of that relationship. Magna's own investor communications make no
              reference to active Sanctuary AI robot deployments. The silence suggests the pilot may have ended or
              remains in an extended evaluation phase — a material overhang on Sanctuary AI's commercial narrative.

              The competitive environment has materially worsened since Sanctuary AI's Series B in June 2024. Figure AI
              secured a production partnership with BMW Group for manufacturing deployment — a directly comparable
              customer type to Sanctuary AI's target market. Agility Robotics secured Amazon as a warehouse deployment
              customer, confirming that the addressable market Sanctuary AI targets is now being served by competitors.
              1X Technologies raised an additional $110M and reports active commercial deployments. Boston Dynamics has
              established enterprise sales of Atlas and Spot across multiple industrial verticals. Neura Robotics and
              UBTech have joined the competitive landscape with well-funded programmes.

              All principal competitors — Figure, 1X, Agility, Boston Dynamics, Unitree — use electric actuation for
              their commercial robots. Hydraulic actuation creates an ecosystem fragmentation disadvantage: customers,
              maintenance crews, and supply chains built around electric-drive systems are less transferable to
              Sanctuary AI's hydraulic platform. If the market standardizes on electric actuation — which appears likely
              given the overwhelming competitor preference — Sanctuary AI's hydraulic differentiation could become a
              competitive liability rather than an advantage.

              Goldman Sachs projects the humanoid robot market at $38B by 2035, but IEEE Spectrum and independent
              analysts have raised credible concerns about near-term adoption timelines. Rodney Brooks, one of the
              field's most respected practitioners, has consistently predicted that general-purpose humanoid robots face
