  claims:
    - id: CI001
      statement: Sanctuary AI operates a Robotics-as-a-Service (RaaS) revenue model wherein robots are deployed at customer facilities and billed on a usage or subscription basis, consistent with industry peers Agility Robotics and Figure AI.
      type: company-claimed
      topic: revenue-model
      freshness: current
      confidence: medium
      sourceRefs: [SI001, SI007, SI010]
      answersQuestionRefs: [QI001]
    - id: CI002
      statement: At RaaS blended rates of $5-$8 per robot-hour, annual revenue per robot at 50% utilization on a two-shift basis is approximately $44,000-$70,000, potentially creating compelling unit economics relative to human labor costs of $45,000-$60,000 per worker per year.
      type: estimated
      topic: revenue-model
      freshness: current
      confidence: low
      sourceRefs: [SI010, SI011]
      answersQuestionRefs: [QI010]
    - id: CI003
      statement: Secondary revenue streams for Sanctuary AI potentially include Carbon AI platform licensing, Accenture professional services co-sell, and government and defense contracts enabled by EDC and BDC relationships, none of which have been publicly confirmed as generating revenue.
      type: inferred
      topic: revenue-model
      freshness: current
      confidence: low
      sourceRefs: [SI003, SI007]
      answersQuestionRefs: [QI012, QI017]
    - id: CI004
      statement: Sanctuary AI's strategic investor roster (Microsoft, Accenture, Magna, Workday, Bell, BDC, EDC, Evok) provides structural alignment with commercial revenue pathways, as strategic investors typically invest for deployment optionality with their own enterprise operations.
      type: inferred
      topic: revenue-model
      freshness: current
      confidence: medium
      sourceRefs: [SI003, SI012]
      answersQuestionRefs: [QI012]
    - id: CI005
      statement: Revenue from AI software licensing via Carbon AI for third-party hardware applications has not been publicly confirmed and is speculative; Sanctuary has not disclosed any licensing agreements or SaaS revenue as of May 2026.
      type: observed
      topic: revenue-model
      freshness: current
      confidence: medium
      sourceRefs: [SI001, SI002, SI007]
      answersQuestionRefs: [QI001]
    - id: CI006
      statement: The Accenture partnership creates a structural possibility for professional services revenues from enterprise deployment and integration projects, but no Accenture-brokered Sanctuary deployment or revenue has been publicly disclosed as of May 2026.
      type: observed
      topic: revenue-model
      freshness: current
      confidence: medium
      sourceRefs: [SI003, SI012]
      answersQuestionRefs: [QI001]
    - id: CI007
      statement: Sanctuary AI's hardware ASP is analyst-estimated at $100,000-$150,000 per Phoenix unit, based on comparable humanoid robot pricing; this estimate has not been confirmed by any company disclosure or commercial transaction.
      type: estimated
      topic: pricing
      freshness: current
      confidence: low
      sourceRefs: [SI010, SI011]
      answersQuestionRefs: [QI009]
    - id: CI008
      statement: At an estimated ASP of $125,000 versus a human worker cost of approximately $45,000 per year, the hardware payback period without RaaS pricing is approximately 5-8 years excluding maintenance, integration costs, and software upgrades.
      type: estimated
      topic: pricing
      freshness: current
      confidence: low
      sourceRefs: [SI010, SI011]
      answersQuestionRefs: [QI010, QI018]
    - id: CI009
      statement: Estimated gross margin on Sanctuary AI hardware at an ASP of $125,000 and COGS of $50,000-$75,000 per unit implies a 40-60% gross margin, consistent with industrial robot hardware peers but unconfirmed by any Sanctuary financial disclosure.
      type: estimated
      topic: cost-structure
      freshness: current
      confidence: low
      sourceRefs: [SI010, SI011]
      answersQuestionRefs: [QI010, QI004]
