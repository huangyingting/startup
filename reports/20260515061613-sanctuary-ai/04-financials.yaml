callouts:
  - calloutType: risk
    title: No Disclosed Revenue — Commercial Model Unvalidated
    body: >-
      Sanctuary AI has disclosed no revenue, no customer names, and no pilot deployment results as of May
      2026. This represents the most significant financial risk for institutional investors: the commercial
      model cannot be validated from public information. RaaS pricing viability, customer willingness to
      pay, and robot uptime in real-world settings are all unverified. Data room access and customer
      reference calls are essential before any investment decision.
    claimRefs: [CI025, CI026, CI027]
  - calloutType: risk
    title: Capital Runway Pressure — Series C Required by 2026-2027
    body: >-
      At estimated burn rates of $60M-$90M per year and approximately $90M-$100M of undeployed Series B
      capital, Sanctuary's runway extends through mid-2026 to mid-2027 under base-case assumptions. The
      company will need to raise additional capital or achieve meaningful revenue within this window to
      avoid a funding constraint. A Series C of $150M-$300M would be consistent with peer fundraising
      dynamics and would provide the capital for manufacturing scale and customer acquisition.
    claimRefs: [CI023, CI024, CI028]
  - calloutType: insight
    title: Strategic Investor Roster Is a Proxy for Revenue Pipeline
    body: >-
      Sanctuary AI's Series B investor roster (Microsoft, Accenture, Magna, Workday, Bell, BDC, EDC,
      Evok) signals a commercial pipeline with qualified enterprise customers. Strategic investors at
      this stage typically invest for deployment optionality — they are likely evaluating or piloting
      Sanctuary robots in their own operations, even if no results have been publicly disclosed. This
      creates a plausible path to first disclosed revenue via one of these investors.
    claimRefs: [CI019, CI020, CI029]
