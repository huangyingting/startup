company:
  name: Sanctuary AI
chapter:
  number: 4
  title: Financials
  summary: >-
    Sanctuary AI has raised approximately $160M in disclosed capital (Series B June 2024, $100M) with no
    publicly disclosed revenue. The company's estimated burn rate implies a runway of 24-36 months from
    Series B close under conservative assumptions, with capital adequacy conditional on achieving commercial
    milestones. Revenue model is service-robotics-as-a-service (RaaS) with potential hardware ASP of
    $100K-$150K. Public financial disclosures are absent as a private Canadian company; all financial
    estimates are analyst-derived. Capital adequacy requires additional fundraising by 2026-2027 or
    revenue acceleration, posing a significant diligence gap.
sections:
  - id: revenue-model
    title: Revenue Streams and Monetization Framework
    body: |
      Sanctuary AI operates without publicly disclosed revenue as of May 2026. The company has outlined a
      Robotics-as-a-Service (RaaS) revenue model, consistent with industry peers (Agility Robotics, Figure
      AI), wherein hardware is deployed at customer facilities and billed on a usage or subscription basis
      rather than sold outright. This model delays revenue recognition relative to outright hardware sales
      but creates higher lifetime customer value and supports enterprise adoption by reducing upfront capital
      requirements.

      Sanctuary's estimated hardware ASP of $100,000-$150,000 per unit is analyst-derived from comparable
      humanoid robot prices and has not been confirmed by the company. At RaaS blended rates of $5-$8 per
      robot-hour (consistent with labor arbitrage economics vs. human workers at $25-$35/hr with benefits),
      annual revenue per robot would be approximately $44,000-$70,000 at 50% utilization on a two-shift
      basis. This implies meaningful unit economics only if Sanctuary achieves high-utilization deployments
      in structured manufacturing or logistics environments.

      Secondary revenue streams include: (1) AI software licensing via the Carbon AI platform for
      third-party hardware applications (not publicly confirmed), (2) professional services revenues via
      the Accenture partnership for enterprise deployment and integration (structural possibility but not
      disclosed), and (3) potential government and defense contracts supported by the Export Development
      Canada (EDC) relationship and BDC Capital involvement. None of these revenue streams has been
      confirmed with commercial disclosure.

      Sanctuary's current revenue stage is pre-commercial or early-commercial. The company's Series B
      investor roster (Microsoft, Accenture, Magna, Workday, Bell, BDC, EDC, Evok) suggests strategic
      alignment with revenue pathways but does not confirm revenue generation. Strategic investors
      frequently invest for option value and partnership access, not because commercial revenue is
      imminent.
    claimRefs: [CI001, CI002, CI003, CI004, CI005, CI006, CI007, CI008]
    tableRefs: [TI001, TI002]
    figureRefs: [FI001]
  - id: cost-structure
    title: Cost Structure and Unit Economics
    body: |
      Sanctuary AI's cost structure is dominated by R&D expense (headcount for AI and robotics engineers),
      hardware COGS, and SG&A in enterprise sales and partnership management. As a Series B robotics company
      with an estimated 200-300 person organization, annual operating expense is estimated at $60M-$90M per
      year based on comparable-stage robotics peers and disclosed BC payroll data. This estimate is not
      confirmed by any public Sanctuary financial disclosure.

      Robot manufacturing COGS includes materials (actuators, sensors, processors, structural components),
      Magna contract manufacturing labor, and quality assurance. At an estimated hardware ASP of $125K and
      industry-typical robotics gross margin (40-60% for hardware), implied COGS per unit ranges from
      $50,000-$75,000. These figures are entirely modeled; Sanctuary has not disclosed unit economics.

      R&D intensity is expected to be high (estimated 50-60% of total OpEx), consistent with comparable
      humanoid robotics startups at the pre-commercial stage. The AI training pipeline for Carbon AI —
      including data collection via human teleoperation, GPU compute infrastructure, and model iteration
      cycles — represents a significant recurring cost that is partially subsidized by the Microsoft Azure
      AI partnership.

      Labor cost arbitrage is a key unit economics argument: if a Phoenix humanoid at $125K ASP (or
      $5-$8/hour on RaaS) can substitute for a $45,000/year warehouse or manufacturing worker in a 5-8
      year payback period, the value proposition is potentially compelling. However, this analysis ignores
      maintenance costs, uptime variability, integration costs, and software upgrade requirements — all of
      which inflate the true cost of ownership beyond naive hardware cost comparisons.
    claimRefs: [CI009, CI010, CI011, CI012, CI013, CI014]
    tableRefs: [TI003]
    figureRefs: []
  - id: public-traction
    title: Public Financial Traction Signals
    body: |
      Sanctuary AI's public traction signals are limited to its capital raise history and partnership
      announcements. The $100M Series B closed June 2024 with a strategic investor roster including
      Microsoft, Accenture, Magna International, Workday, Bell, BDC Capital, EDC, and Evok Innovations.
      The Series A ($30M) was raised in 2022 and an undisclosed seed round preceded it. Total disclosed
      capital is approximately $160M, though earlier pre-Series A funding remains unclear.

      Partnership quality serves as a proxy for commercial traction. Microsoft's Azure AI investment and
      co-development relationship implies a commercial pilot pipeline routed through Azure marketplace or
      Accenture consulting practices. Accenture's technology partner investment implies Sanctuary robots are
      in at least Accenture's enterprise offering catalog, though no Accenture-brokered customer deployment
      has been publicly disclosed. Magna International's investment implies manufacturing capacity
      commitments aligned to anticipated production scale, not merely a supply agreement.

      Headcount trajectory is an indirect traction signal. LinkedIn data indicates Sanctuary AI has grown
      to approximately 200-300 employees (unverified exact count) from a smaller team at Series A close in
      2022, consistent with capital deployment patterns. The November 2024 co-founder departure (Suzanne
      Gildert, co-founder and Chief Science Officer) is the most significant disclosed adverse event in
      Sanctuary's corporate history, representing a key-person risk to the technical AI roadmap.

      External technology validation signals: the December 2024 demonstration of the 21-DoF hydraulic hand
      and the Morgan Stanley IP ranking (#3 globally as of February 2025) are the strongest independently
      validated proxies for technical progress. No revenue, contract value, or pilot customer metrics have
      been publicly disclosed.
    claimRefs: [CI015, CI016, CI017, CI018, CI019, CI020, CI021, CI022]
    tableRefs: [TI004]
    figureRefs: [FI004]
  - id: capital-adequacy
    title: Capital Adequacy and Financial Verdict
    body: |
      Based on disclosed capital and comparable-stage burn rates, Sanctuary AI has an estimated runway of
      24-36 months from the June 2024 Series B close, implying an effective capital horizon through
      mid-2026 to mid-2027. This estimate assumes $60M-$90M annual burn (mid-case $75M) and no
      significant revenue contribution in the near term. Under a higher-burn scenario ($90M+), runway
      shortens to approximately 24 months from Series B close (mid-2026), creating urgency for either
      revenue acceleration or a Series C raise.

      The financial verdict for institutional investors is highly conditional. Sanctuary AI has the following
      financial risk factors: (1) no publicly disclosed revenue, creating zero financial validation of the
      commercial model; (2) a $515M funding gap vs. Figure AI that constrains competitive scale; (3)
      co-founder departure introducing key-person and IP continuity risk; (4) non-exclusive partnerships
      that provide no contractual revenue commitment from Microsoft, Accenture, or Magna; and (5) Unitree
      competition from below that compresses potential pricing power in entry-level humanoid applications.

      Financial opportunities that could alter the verdict: (1) a named commercial customer announcement
      or disclosed pilot with productivity metrics would substantially de-risk the commercial model; (2) a
      Series C raise closing above $200M would extend runway and signal continued investor confidence;
      (3) a Carbon AI platform licensing deal with a non-robotics enterprise would demonstrate software
      revenue diversification; (4) a government or defense contract (enabled by BDC/EDC relationships)
      would provide non-cyclical revenue. None of these has been publicly disclosed as of May 2026.

      Capital efficiency relative to peers is uncertain — Sanctuary's $160M capital base vs. Agility's
      $250M and Figure AI's $675M suggests either greater capital efficiency or underinvestment in critical
      R&D and sales functions. The Morgan Stanley IP #3 ranking and 21-DoF hand demonstration suggest
      productive R&D deployment, but commercial conversion remains unproven.
    claimRefs: [CI023, CI024, CI025, CI026, CI027, CI028, CI029, CI030, CI031, CI032]
    tableRefs: [TI005]
    figureRefs: [FI002, FI003]
