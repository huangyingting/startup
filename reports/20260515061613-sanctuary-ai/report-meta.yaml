  foundingLocation: Vancouver, British Columbia, Canada
  headquarters: Vancouver, British Columbia, Canada
  productSummary: Phoenix is a bipedal general-purpose humanoid robot, now in Generation 8 (December 2024), paired with Carbon, an in-house AI cognitive control system. The product roadmap emphasizes dexterous bimanual manipulation, with a 21 degrees-of-freedom hydraulic hand (December 2024), tactile-sensing skin (December 2024), sim-to-real transfer of manipulation policies (March 2025), and zero-shot in-hand manipulation demonstrations (May 2025).
  customerFocus: B2B industrial customers in industrial automation, logistics, and retail labor-substitution workflows; no specific customer names, pilot sites, or contracted deployments have been publicly disclosed.
  businessModel: B2B-focused humanoid-robot platform targeting industrial automation, logistics, and retail; commercial model (robot sale, leasing, robot-as-a-service, or services contract) and unit economics have not been publicly disclosed.
  stage: Series B private
  fundingStatus: Sanctuary AI raised CAD $58.5M Series A in March 2023 and announced a US$100M Series B on June 12, 2024 with strategic investors including Microsoft, Accenture, Bell, Verizon Ventures, BDC Capital, Export Development Canada, Magna, Workday Ventures, and Evok Innovations. Public reporting is contradictory on whether the CAD $30M EDC loan announced June 2024 is part of the US$100M Series B or a separate instrument. BDC Thrive and InBC announced an undisclosed strategic investment in July 2024. No valuation has ever been disclosed.
