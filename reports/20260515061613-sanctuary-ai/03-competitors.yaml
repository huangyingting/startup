  claims:
    - id: CP001
      statement: Sanctuary AI competes in the humanoid robotics market with a mid-tier funding position of approximately $160M, positioned between well-funded US leaders such as Figure AI ($675M+) and low-cost Chinese competitors such as Unitree ($16K price point).
      type: observed
      topic: competitive-landscape
      freshness: current
      confidence: medium
      sourceRefs: [SP021, SP024]
      answersQuestionRefs: [QP001]
    - id: CP002
      statement: Figure AI has raised approximately $675M+ at an approximately $2.6B post-Series B valuation (February 2024), with named investors including Microsoft, OpenAI, NVIDIA, and Jeff Bezos, and announced a BMW manufacturing pilot in January 2024.
      type: third-party-reported
      topic: competitor-profiles
      freshness: current
      confidence: high
      sourceRefs: [SP001, SP016, SP024]
      answersQuestionRefs: [QP001, QP010, QP013, QP014]
    - id: CP003
      statement: 1X Technologies has raised approximately $125M including a strategic investment from OpenAI, and pivoted its product roadmap toward the NEO home assistance robot alongside its industrial EVE platform.
      type: third-party-reported
      topic: competitor-profiles
      freshness: current
      confidence: medium
      sourceRefs: [SP002, SP011]
      answersQuestionRefs: [QP003, QP013]
    - id: CP004
      statement: Agility Robotics has raised approximately $250M including an Amazon strategic lead investment, and deployed its Digit robot in an Amazon warehouse pilot facility in 2023 — the most credible logistics humanoid deployment validation to date.
      type: third-party-reported
      topic: competitor-profiles
      freshness: current
      confidence: high
      sourceRefs: [SP003, SP017, SP024]
      answersQuestionRefs: [QP002, QP013, QP016]
    - id: CP005
      statement: Boston Dynamics launched a commercial electric version of Atlas in 2024, backed by Hyundai parent acquisition (approximately $1.1B in 2021), transitioning from its 30-year R&D posture to commercial humanoid deployment.
      type: third-party-reported
      topic: competitor-profiles
      freshness: current
      confidence: medium
      sourceRefs: [SP005, SP014, SP019]
      answersQuestionRefs: [QP005, QP013]
    - id: CP006
      statement: Tesla Optimus remains deployed internally at Tesla factory operations as of May 2026, with Elon Musk citing targets of up to 1,000 units for Tesla factories by 2025 (unverified), and no external commercial availability announced.
      type: third-party-reported
      topic: competitor-profiles
      freshness: current
      confidence: medium
      sourceRefs: [SP006]
