callouts:
  - calloutType: risk
    title: Funding Gap vs. Figure AI Is Material
    body: >-
      Sanctuary AI has raised approximately $160M in disclosed capital, versus Figure AI's $675M+. This
      $515M differential constrains Sanctuary's ability to invest in manufacturing scale, robot generation
      development, enterprise sales headcount, and AI model training infrastructure. In a capital-intensive
      race to first mover commercial deployment, the funding gap is a meaningful strategic risk unless
      Sanctuary closes additional rounds or achieves revenue traction to extend runway.
    claimRefs: [CP009, CP010, CP021]
  - calloutType: risk
    title: Zero Named Commercial Customers vs. Peers
    body: >-
      Sanctuary AI has disclosed no named commercial customers or pilot deployment partners as of May 2026,
      while two direct competitors (Figure AI with BMW and Agility Robotics with Amazon) have announced
      named OEM relationships. This gap is material for institutional investors evaluating commercial
      validation and for potential enterprise customers requiring proof-of-concept references. Partnership
      ecosystem (Microsoft, Accenture, Magna) is a partial offset but does not substitute for named
      customer proof.
    claimRefs: [CP022, CP025]
  - calloutType: insight
    title: Hydraulic Hand and IP Position Are Genuine Differentiators
    body: >-
      The 21-DoF hydraulic dexterous hand demonstrated by Sanctuary in December 2024 is technically
      distinctive among current humanoid competitors. No peer has publicly demonstrated equivalent
      degree-of-freedom manipulation capability. Combined with the Morgan Stanley #3 IP ranking (February
      2025), Sanctuary appears to have genuine patent-backed technological differentiation in dexterous
      manipulation, which is a prerequisite for the manufacturing and logistics use cases the company
      is targeting.
    claimRefs: [CP020, CP032]
