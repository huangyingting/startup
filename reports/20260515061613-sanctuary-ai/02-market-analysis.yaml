  claims:
    - id: CM001
      statement: The humanoid robotics market boundary encompasses physical robots with human-like form factors (bipedal locomotion, anthropomorphic upper body, dexterous manipulators) designed to operate in human environments without specialized infrastructure modification.
      type: observed
      topic: market-boundary
      freshness: current
      confidence: medium
      sourceRefs: [SM014, SM018]
      answersQuestionRefs: [QM001]
    - id: CM002
      statement: Included spend categories in the humanoid robotics market are capital expenditure on robot units, AI control software and simulation platforms, deployment services (integration, training, maintenance), and recurring software subscriptions.
      type: observed
      topic: market-boundary
      freshness: current
      confidence: medium
      sourceRefs: [SM014, SM018]
      answersQuestionRefs: [QM001]
    - id: CM003
      statement: Status-quo substitutes for humanoid robots in warehousing and logistics include conveyor systems, industrial arms on fixed gantries, collaborative robot arms (cobots) on wheeled bases, autonomous forklifts, and human labor augmented by exoskeletons.
      type: observed
      topic: market-substitutes
      freshness: current
      confidence: medium
      sourceRefs: [SM007, SM010, SM018]
      answersQuestionRefs: [QM012]
    - id: CM004
      statement: Status-quo substitutes for humanoid robots in manufacturing assembly include dedicated automation cells, SCARA robots, delta robots for high-speed pick-and-place, and manual assembly lines.
      type: observed
      topic: market-substitutes
      freshness: current
      confidence: medium
      sourceRefs: [SM007, SM018]
      answersQuestionRefs: [QM012]
    - id: CM005
      statement: Sanctuary AI's Carbon AI control system positions the company at the intersection of robotics hardware and embodied AI software, differentiating it from pure hardware OEMs and pure software providers.
      type: company-claimed
      topic: market-boundary
      freshness: current
      confidence: medium
      sourceRefs: [SM014, SM015]
      answersQuestionRefs: []
    - id: CM006
      statement: Goldman Sachs Research published a February 2024 estimate projecting the global humanoid robotics market could reach $38 billion by 2035 under an optimistic adoption scenario.
      type: third-party-reported
      topic: market-sizing
      freshness: current
      confidence: high
      sourceRefs: [SM001, SM011]
      answersQuestionRefs: [QM007, QM024]
    - id: CM007
      statement: Goldman Sachs published a base case of $6 billion and a conservative case of $1 billion for the humanoid robotics market by 2035, reflecting extreme uncertainty in adoption timing and penetration rates.
      type: third-party-reported
      topic: market-sizing
      freshness: current
      confidence: high
      sourceRefs: [SM001, SM009]
      answersQuestionRefs: [QM007]
    - id: CM008
      statement: Goldman Sachs estimates humanoid robot unit prices declining from $150,000 per robot in 2025 to under $50,000 by 2035 due to manufacturing scale and component cost reduction.
      type: third-party-reported
      topic: market-sizing
      freshness: current
      confidence: medium
      sourceRefs: [SM001]
      answersQuestionRefs: [QM006]
    - id: CM009
      statement: CB Insights identified 27 well-funded humanoid robotics startups as of early 2025, with cumulative disclosed funding exceeding $3 billion.
      type: third-party-reported
      topic: market-sizing
      freshness: current
      confidence: medium
      sourceRefs: [SM006]
      answersQuestionRefs: [QM003, QM024]
    - id: CM010
      statement: The International Federation of Robotics reported 553,052 industrial robots installed globally in 2023, a 6% increase year-over-year, with cumulative operational stock exceeding 3.9 million units; humanoid robots represent a negligible share.
      type: third-party-reported
      topic: market-sizing
      freshness: current
      confidence: high
      sourceRefs: [SM002, SM012]
      answersQuestionRefs: [QM003]
    - id: CM011
      statement: The U.S. Bureau of Labor Statistics estimates approximately 4.3 million material movers and warehouse workers in the U.S. labor force as of 2024, representing a potential humanoid robot SOM proxy of $5B-$25B cumulative capital spend at $50K per unit if 2-10% of roles are substituted.
      type: third-party-reported
      topic: market-sizing
      freshness: current
      confidence: high
      sourceRefs: [SM003, SM004]
      answersQuestionRefs: [QM008]
    - id: CM012
      statement: The serviceable addressable market for humanoid robots in manufacturing and logistics is estimated at approximately $5-8 billion by 2030, contingent on cost reduction to below $75K per unit and achievement of 90%+ task completion rates.
      type: estimated
      topic: market-sizing
      freshness: current
      confidence: low
      sourceRefs: [SM001, SM011]
      answersQuestionRefs: [QM006]
    - id: CM013
      statement: In the manufacturing segment, the humanoid robot buyer is typically the plant automation or engineering team, the payer is the corporate capex budget, and the budget owner is the operations VP or plant GM.
      type: observed
      topic: buyer-segmentation
      freshness: current
      confidence: medium
      sourceRefs: [SM007, SM009]
      answersQuestionRefs: [QM011, QM015]
    - id: CM014
      statement: In the logistics and warehousing segment, the buyer is 3PL ops or e-commerce fulfillment leadership; adoption triggers include peak-season labor scarcity and TCO parity with temporary labor over 3-5 years.
      type: observed
      topic: buyer-segmentation
      freshness: current
      confidence: medium
      sourceRefs: [SM008, SM009]
      answersQuestionRefs: [QM011, QM015]
    - id: CM015
      statement: Amazon operates over 750,000 mobile robots as of 2024 but has not deployed humanoid robots at commercial scale.
      type: third-party-reported
      topic: buyer-segmentation
      freshness: current
      confidence: medium
      sourceRefs: [SM011, SM009]
      answersQuestionRefs: [QM015]
    - id: CM016
      statement: In healthcare and elder care, humanoid robots would need to be funded through facility opex budgets (not insurance reimbursement), with buyers being hospital administrators and nursing home operators.
      type: observed
      topic: buyer-segmentation
      freshness: current
      confidence: medium
      sourceRefs: [SM008, SM018]
      answersQuestionRefs: [QM011]
    - id: CM017
      statement: The U.S. Bureau of Labor Statistics projects 203,000 annual nursing job openings through 2032 due to retirements, creating a durable healthcare automation demand signal.
      type: third-party-reported
      topic: buyer-segmentation
      freshness: current
      confidence: high
      sourceRefs: [SM003, SM004]
      answersQuestionRefs: [QM015]
    - id: CM018
      statement: The retail and hospitality segment faces annual labor turnover exceeding 100% and rising minimum wages, creating structural automation motivation, but customer acceptance constraints (uncanny valley) are a material adoption risk.
      type: observed
      topic: buyer-segmentation
      freshness: current
      confidence: medium
      sourceRefs: [SM008, SM009]
      answersQuestionRefs: [QM015]
    - id: CM019
      statement: U.S. JOLTS data (April 2026) showed 8.1 million job openings and 7.4 million unemployed workers, sustaining a structural labor supply-demand imbalance that is a primary demand driver for humanoid robots.
      type: third-party-reported
      topic: market-drivers
      freshness: current
      confidence: high
      sourceRefs: [SM004, SM003]
      answersQuestionRefs: [QM008]
    - id: CM020
      statement: Warehouse and logistics roles face annual turnover rates of 40-60%, driving recurring hiring costs and creating ongoing automation incentive for logistics operators.
      type: observed
      topic: market-drivers
      freshness: current
      confidence: medium
      sourceRefs: [SM009, SM011]
      answersQuestionRefs: [QM015]
    - id: CM021
      statement: Wage growth for material movers averaged 4.2% annually from 2020-2025, outpacing productivity gains and improving the payback calculation for robot substitution over the same period.
      type: estimated
      topic: market-drivers
      freshness: current
      confidence: medium
      sourceRefs: [SM003, SM004]
      answersQuestionRefs: [QM009]
    - id: CM022
      statement: OSHA ergonomic standards, EU Machinery Directive updates, and U.S. CHIPS Act manufacturing credits provide regulatory and policy tailwinds for humanoid robot adoption in manufacturing settings.
      type: observed
      topic: market-drivers
      freshness: current
      confidence: medium
      sourceRefs: [SM005, SM009]
      answersQuestionRefs: [QM013, QM014]
    - id: CM023
      statement: Industrial policy programs including China Made in China 2025 robotics targets, EU Horizon robotics grants, and U.S. advanced manufacturing credits provide government support for humanoid robot development and deployment.
      type: observed
      topic: market-drivers
      freshness: current
      confidence: medium
      sourceRefs: [SM005, SM009]
