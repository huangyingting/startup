sections:
  - id: S801a
    title: Investment Thesis and Anti-Thesis
    body: >
      Perplexity AI presents a rare opportunity to invest in the only scaled independent challenger to Google Search in
      the AI-native answer-engine category. With $500M ARR as of April 2026, 45M monthly active users, and a valuation
      trajectory that moved from $0.5B (January 2024) to $20B (September 2025) in twenty months, the company has
      demonstrated the fastest ARR ramp among AI search-focused startups. The core thesis rests on three structural
      pillars: (1) the search paradigm is shifting from link retrieval to citation-backed answers for research-intensive
      queries, creating a winner-take-most opportunity in the estimated $430B AI-augmented search market by 2028; (2)
      Perplexity has assembled a distribution moat through SoftBank–Airtel integration, NVIDIA backing, Samsung device
      pre-installs, and enterprise agreements with 20,000+ organisations; (3) the company's verticalisation into
      Perplexity Finance, Comet browser, and agentic "Deep Research" differentiate it beyond pure search into a general
      knowledge-work platform. The anti-thesis is equally structured: Google's distribution lock-in and unlimited R&D
      budget could commoditise the core product before Perplexity reaches profitability; active copyright litigation
      from Dow Jones, New York Times, and six other publishers creates a binary legal overhang that could reset the cost
      structure; and the $20B valuation at 40× forward ARR demands sustained hypergrowth that has historically proven
      fragile for AI search challengers, as the Neeva failure demonstrates.
    tableRefs:
      - TV001
      - TV006
    figureRefs:
      - FV001
  - id: S802a
    title: Valuation Context and Entry Discipline
    body: >
      Perplexity closed its Series E at $20B post-money valuation in September 2025, raising $200M from SoftBank,
      NVIDIA, IVP, and others. As of April–May 2026 the secondary market implied valuation is approximately $18.7B on
      observed share transactions, representing an 11.8% discount to the primary round, suggesting some price discovery
      and reduced frothiness from the $21.2B peak. At $500M ARR the implied multiple is 40× forward revenue,
      significantly above the 25–30× median for primary AI-company rounds identified by Aventis Advisors and above
      Anthropic's effective 12.7× at the same point in 2026. The elevated multiple is partially justified by
      Perplexity's 400%+ year-over-year ARR growth (from ~$100M to ~$500M over twelve months) but demands a growth
      sustainability premium that introduces valuation risk. Entry discipline matters: the evidence supports a
      CONDITIONAL POSITIVE recommendation at entry valuations at or below $20B pre-money; the risk-adjusted profile
      improves materially at $15–16B (fair value) and becomes attractive below $12B. Secondary market access is
      restricted to accredited investors; no IPO is expected before 2028 per CEO statements, meaning a minimum 2-year
      hold horizon from mid-2026. The Series E share price equivalent is approximately $69.54 (post-split) with an
      estimated $2B of secondary volume in the 90 days prior to April 2026, indicating healthy liquidity for a pre-IPO
      name.
    tableRefs:
      - TV002
    figureRefs:
      - FV002
  - id: S803a
    title: Bull, Base, and Bear Scenarios
    body: >
      The three scenarios vary principally on copyright litigation resolution, Google competitive response, and ARR
      growth sustainability. In the bull case (20% probability), the Dow Jones and NYT lawsuits settle by mid-2027 for
      an aggregate $250–350M with perpetual licensing terms that the company can absorb; ARR reaches $1.0B by Q4 2027 on
      the back of Comet browser distribution and expanded enterprise seats; and the IPO prices in 2028 at $50B+,
      delivering 2.5× on a $20B entry. In the base case (50% probability), litigation settles for $300–500M total over
      2026–2028 with ongoing licensing payments that compress gross margins by 5–8 percentage points; ARR reaches $1.2B
      by 2027 but YoY growth decelerates to 60%; IPO in 2028–2029 prices at $30–40B, delivering 1.5–2.0× on a $20B
      entry. In the bear case (30% probability), an adverse Dow Jones appellate ruling requires structural licensing
      fees on all web-sourced answers, reducing gross margin below 40% and triggering a business model reset; Google AI
      Overviews achieve user-perceived parity with Perplexity by Q4 2026, decelerating ARR growth below 40% YoY; ARR
      plateaus at $600M by 2027; and the company cannot close a flat round before 2028, resulting in a forced down-round
      valuation of $8–12B and delivering 0.40–0.60× on a $20B entry. The probability-weighted expected return at $20B
      entry is approximately 1.5× gross over a 3-year hold, which marginally clears a 1.25× threshold for a high-risk
      private-market position only when sized appropriately.
    tableRefs:
      - TV003
    figureRefs:
      - FV003
  - id: S804a
    title: Comparable Set Analysis
    body: >
      The comparable set spans three tiers: private AI frontier companies (OpenAI, Anthropic), the public search
      incumbent (Alphabet), and AI-search cautionary comparables (Neeva, DuckDuckGo). OpenAI is the strongest
      architectural comparable—both companies monetise AI-native information access with subscription and enterprise
      tiers—but OpenAI's scale ($25B ARR, $852B valuation) makes direct multiple application misleading. Anthropic's
      $380B valuation at $30B ARR (April 2026) represents a 12.7× multiple, substantially below Perplexity's 40×, though
      Anthropic's much larger ARR base explains part of the gap (revenue multiples compress as scale increases). The
      Aventis Advisors 2025 analysis of AI company primary round multiples shows a median of 25–30× for top-tier AI
      companies, placing Perplexity above the sector median. Alphabet's 7× revenue multiple reflects maturity,
      profitability, and diversification—not relevant as a direct comparable but useful as a long-run mean-reversion
      benchmark. The Neeva precedent (AI search engine backed by ex-Googlers, shut down and sold to Snowflake in 2023
      for well below primary-round valuation) is the strongest adverse comparable, showing that AI search challengers
      without a differentiated distribution and monetisation path cannot sustain operations against Google's
      default-engine lock-in. DuckDuckGo, with an estimated $1.5B valuation at $60–80M revenue (18–25×), provides a
      small-cap reference point but lacks Perplexity's growth trajectory and enterprise penetration.
    tableRefs:
      - TV004
    figureRefs:
      - FV004
  - id: S805a
    title: Recommendation, Exit Readiness, and Final Diligence Asks
    body: >
      The overall investment recommendation for Perplexity AI is CONDITIONAL POSITIVE with MEDIUM confidence and a HIGH
      risk rating. The valuation stance is STRETCHED at $20B entry but FAIR at $15–16B and ATTRACTIVE below $12B entry.
      The key conditions that must be met before committing capital are: (1) confirmation that gross margin ex-licensing
      is ≥55%; (2) sight of the company's legal reserve and projected settlement range; (3) verified enterprise NRR
      ≥110%; and (4) evidence that ARR growth is tracking above $600M as of June 2026. Exit readiness is early—no IPO
      filing, no disclosed profitability milestone, and the S-1 preparation timeline of at least 12 months from a
      probable 2027 kickoff means that most investors will rely on secondary liquidity or continuation fund structures.
      The investor syndicate (NVIDIA, SoftBank, IVP, NEA, Bezos Expeditions) includes strategic and institutional
      partners capable of providing bridge capital in adverse scenarios. Thesis-break triggers that would cause an exit
      recommendation are: an adverse copyright appellate ruling reducing sustainable gross margin below 40%; Google AI
      Overviews achieving parity with three consecutive months of Perplexity ARR growth below 40% YoY; or failure to
      close an up-round at ≥$20B before Q1 2028. The top five diligence asks for completion before capital commitment
      are detailed in T806.
    tableRefs:
      - TV005
