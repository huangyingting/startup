chapters:
  - number: 1
    title: Company Overview
    sections:
      - number: '1.1'
        title: Identity and Business Model
        blocks:
          - type: paragraph
            body: |
              Perplexity AI, Inc. was incorporated in August 2022 and is headquartered at 115 Sansome Street,
              Suite 900, San Francisco, California 94104. The company operates as an AI-powered answer engine
              and conversational search platform that retrieves real-time information from the web, synthesises
              it using large language models, and returns cited, direct answers rather than a list of links.
              This positions Perplexity as a direct challenger to traditional search engines, most notably Google.

              The company's primary product is the Perplexity answer engine, accessible via web and mobile apps.
              The free tier provides unlimited standard searches; Perplexity Pro (USD 20/month) unlocks premium
              model access, larger context windows, and advanced features including image generation and file
              upload. Perplexity Enterprise Pro targets organisations, offering single sign-on, admin controls,
              domain-restricted data handling, and dedicated API access. As of late 2025 the company served
              over 20,000 enterprise customers, with more than 80 million lifetime app downloads across iOS
              and Android. The business model combines subscription revenue (B2C Pro and B2B Enterprise) with
              a publisher-facing revenue-sharing programme and advertising products still in early development.

              Perplexity's differentiation rests on three pillars: always-cited sourcing that reduces
              hallucination trust risk, real-time web retrieval that prevents knowledge-cutoff staleness, and
              a conversational interface that supports multi-turn, context-aware queries. Its retrieval-augmented
              generation (RAG) architecture indexes live web content on demand and threads source citations
              directly into each answer, letting users verify claims. This approach has driven viral adoption
              among researchers, students, and knowledge workers who prioritise accuracy over speed.
