      - number: '1.2'
        title: Founders and Leadership
        blocks:
          - type: paragraph
            body: |
              Perplexity was co-founded by four AI researchers who met through networks linking top US
              institutions and Bay Area AI labs. Aravind Srinivas (CEO, born c. 1994, Chennai, India) earned
              his PhD from UC Berkeley and completed research stints at Google Brain and OpenAI before
              co-founding Perplexity. At 31 years old he is one of the youngest CEOs running a company
              valued above $10 billion and has been named to Time's "100 Most Influential People in AI 2024."

              Denis Yarats (CTO) holds a PhD from NYU and spent years as a research scientist at Meta AI
              (FAIR) and Quora before joining Srinivas at Perplexity. Johnny Ho (CSO) brings engineering
              and quantitative trading experience. Andy Konwinski is the fourth co-founder and also
              co-founded Databricks; he now serves primarily as a board member. The combination of
              deep-learning research pedigrees (Berkeley, NYU, Google Brain, Meta AI, OpenAI) and
              applied engineering experience across Quora, Databricks, and quantitative finance represents
              strong founder-market fit for an AI infrastructure product.

              Beyond founders, key executives include Dmitry Shevelenko (Chief Business Officer), Tony Wu
              (VP Engineering), Henry Modisett (VP Design), and Nate Kupp (VP Infrastructure). The board
              includes Andy Konwinski, Denis Yarats, Cack Wilhelm (General Partner, IVP), and Pete Sonsini
              (Co-founder, Laude Ventures). Joshua Müller (DTCP) holds a board observer seat. No material
              leadership departures have been reported through the analysis date. However, key-person
              dependence on Aravind Srinivas is elevated given his role as the company's primary public
              spokesperson and strategic decision-maker.
