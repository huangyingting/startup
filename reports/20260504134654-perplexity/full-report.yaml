  - number: 2
    title: Market Analysis
    sections:
      - number: '2.1'
        title: Market Definition and Boundaries
        blocks:
          - type: paragraph
            body: |
              Perplexity AI participates in three overlapping market definitions, each with distinct
              buyers, revenue models, and competitive sets:

              **Core AI search engine market:** AI-native platforms that answer natural language queries
              with synthesised, cited responses in real time. This definition includes Perplexity,
              ChatGPT's search mode, Google's AI Overviews (within Search), and Microsoft Copilot's
              search integration. Excluded are traditional keyword search (classic Google/Bing results
              pages), general-purpose LLM chat (e.g., Claude conversation without web access), and
              productivity copilots (Microsoft 365 Copilot, Notion AI). Revenue comes from subscriptions,
              enterprise licensing, and nascent advertising on AI-generated answer pages.

              **Enterprise AI knowledge management market:** A distinct B2B spend category where
              organisations deploy AI to search and summarise internal and external knowledge bases.
              Perplexity Enterprise Pro competes here with Glean, Guru, and Microsoft Copilot for M365.
              Budget owners are IT/knowledge management executives and heads of digital transformation.
              This segment is largely separate from consumer search advertising and carries higher
              per-seat pricing with longer sales cycles.

              **Search advertising adjacency:** The long-term strategic TAM is the global search
              advertising market (USD 200B+ in 2025, potentially USD 435B+ by 2030), dominated by
              Google. Perplexity does not yet generate meaningful advertising revenue but its publisher
              revenue-sharing model is a precursor to an ad-supported tier. This adjacency is the primary
              driver of investor valuation premiums — if AI search can capture even 5% of Google's search
              ad revenue, that represents USD 8–10 billion in addressable annual revenue at current rates.

              Status-quo substitutes include Google Search (links with AI Overviews), Bing Copilot,
              ChatGPT (general LLM), and specialist tools (Wolfram Alpha for maths, PubMed for research,
              Bloomberg Terminal for finance). Many users use multiple tools simultaneously, which
              lowers switching barriers but also limits Perplexity's ability to capture exclusive usage.
            claimRefs:
              - C043
              - C044
              - C045
              - C046
      - number: '2.2'
        title: Market Sizing — Multiple Lenses
        blocks:
          - type: paragraph
            body: |
              Three complementary sizing lenses bound Perplexity's market opportunity:

              **Lens 1: Core AI search engine software/service market.** Grand View Research estimated
              the global AI search engine market at USD 16.0 billion in 2024, projecting a compound
              annual growth rate (CAGR) of 15.6% through 2033, implying a market of approximately
              USD 60–74 billion by 2033–2034. Astute Analytica's narrower 2025 estimate of USD 17.3 billion
              is consistent with this figure. Market.us projects a USD 73.7 billion AI search market by
              2034, also at a 15.6% CAGR. These estimates are loosely correlated because they share
              similar methodologies and likely cite similar sources.

              **Lens 2: Generative AI chatbot/assistant market share.** First Page Sage tracks AI chatbot
              traffic share monthly: as of April 2026, ChatGPT holds ~60%, Google Gemini ~15%,
              Microsoft Copilot ~13%, and Perplexity ~5.5%. SE Ranking's 2025 study found Perplexity
              at 3.1% of generative AI search traffic in early 2024, rising to approximately 6.2% by
              2025. This top-down lens suggests Perplexity's current SAM share is approximately 5–6%,
              implying a current SAM revenue potential of USD 800M–1B if the core market is ~USD 17B.
              However, the company's actual ARR of ~USD 200M is far below this ceiling, reflecting
              early monetisation and free-tier dominance.

              **Lens 3: Search advertising disruption scenario.** AlixPartners (2025) and AllAboutAI
              (2025) note that AI search platforms could capture revenues nearing USD 379 billion
              by 2030 if current AI adoption trajectories hold and AI-generated answers replace
              traditional search result pages, enabling new advertising formats. This represents a
              structural disruption scenario rather than a near-term probability. At Perplexity's
              ~5% market share, a 2030 participation in even 10% of this market would imply USD 19B
              in annual revenue — far above current run rates but consistent with the valuation premium
              being applied today. Critically, this scenario assumes Perplexity survives copyright
              litigation and develops a commercially viable advertising product.

              Contradictory estimates from optis.digital and navistratanalytics.com cite a USD 305.7B
              AI search TAM in 2025, which is almost certainly based on a far broader definition
              including all AI software and services with a search component. This figure should be
              treated as an outlier for Perplexity's core market analysis.
            claimRefs:
              - C047
              - C048
              - C049
              - C050
              - C051
              - C052
              - C053
              - C054
      - number: '2.3'
        title: Buyer and Payer Segmentation
        blocks:
          - type: paragraph
            body: |
              Perplexity serves three principal buyer/user/payer profiles with distinct adoption paths
              and budget ownership:

              **B2C Consumer segment (primary):** Individuals — predominantly researchers, students,
              knowledge workers, and professionals — who seek citation-anchored answers faster than
              traditional search. The free tier acts as the acquisition engine; conversion to Pro
              (USD 20/month) is self-service, driven by hitting free-tier usage limits. Budget owner
              is the individual consumer; adoption trigger is a high-value research task that demonstrates
              Pro's multi-model and file-upload capabilities. This segment drives Perplexity's 45M MAU
              base but contributes a relatively modest share of revenue given the large free-tier proportion.

              **B2B Enterprise segment (high-value, growing):** Organisations (consulting, healthcare,
              legal, technology, finance) that purchase Perplexity Enterprise Pro through a direct sales
              motion. Key sectors include professional services (Deloitte, AlixPartners), healthcare (Mayo
              Clinic), legal (Latham and Watkins), and tech (Stripe, Databricks, Nvidia). Budget owner
              is typically the IT, digital transformation, or knowledge management executive.
              Procurement is IT-led with compliance requirements (SOC2, GDPR, HIPAA). Adoption
              trigger is a demonstrable productivity gain — reported time savings of 60–68% on research
              and proposal drafting tasks. With over 20,000 enterprise customers, this segment is
              Perplexity's current highest-margin revenue driver.

              **Platform/OEM/Carrier segment (emerging):** Device manufacturers (Samsung, Motorola),
              carriers (Bharti Airtel in India), and platforms (Snapchat) embedding Perplexity's search
              capability in consumer-facing products. Budget owner is the business development team at
              the platform partner; Perplexity receives a distribution fee or revenue-share. This segment
              has the highest volume potential but the lowest per-query revenue rate. The Airtel
              partnership pushed Perplexity to the top of India's App Store in 2025.
            claimRefs:
              - C055
              - C056
              - C057
              - C058
              - C059
              - C060
      - number: '2.4'
        title: Growth Drivers and Adoption Constraints
        blocks:
          - type: paragraph
            body: |
              **Growth drivers:**
              LLM capability improvements are reducing hallucination rates and expanding the range of
              query types that AI search handles reliably, expanding TAM beyond power users to mainstream
              consumers. Enterprise AI search adoption grew 340% from 2023 to 2025, and over 75% of
              Fortune 500 firms now use some form of AI search tool, per published survey data.
              Consumer behavior is shifting: AI-generated answers appear in over one-third of Google
              queries (via AI Overviews), normalising the expectation of direct answers. Perplexity's
              citation model specifically benefits from users' growing distrust of uncited AI-generated
              content following high-profile hallucination incidents at competitors.

              Mobile and carrier distribution is a critical near-term growth driver: the Airtel partnership
              alone could expose Perplexity to hundreds of millions of users in India, a market where Google
              is dominant but where regulatory scrutiny and local alternatives are growing. Average
              Perplexity session length of approximately 9+ minutes significantly exceeds Bing's average
              and approaches ChatGPT, indicating strong engagement retention.

              **Adoption constraints:**
              Google's position is the dominant structural constraint: despite AI search disruption
              narratives, Google maintained approximately 90% of traditional search market share in 2025,
              benefiting from enormous corpus advantage (decades of search index), advertiser relationships,
              browser/device defaults (Chrome, Android), and its own AI Overviews integration. These
              create high switching costs for users who rely on Google's personalised history, Maps
              integration, Shopping, and local results — none of which Perplexity replicates.

              Copyright litigation directly threatens Perplexity's content-access model: adverse rulings
              could force expensive content licensing agreements that raise the marginal cost of each
              answer, compress margins, or require architectural changes to the RAG system. The EU AI Act
              and national privacy regulations (GDPR in Europe, state-level laws in the US) add compliance
              overhead for the enterprise segment. Trust and hallucination remain barriers — only 65% of
              users report trusting the first AI-generated answer, and in regulated industries (finance,
              healthcare) higher accuracy thresholds are required before displacing incumbent research
              workflows. Two-thirds of enterprises are still in the pilot or early-implementation phase
              for AI search tools.
            claimRefs:
              - C061
              - C062
              - C063
              - C064
              - C065
              - C066
              - C067
      - number: '2.5'
        title: Sizing Gaps and Contradictory Estimates
        blocks:
          - type: paragraph
            body: |
              Several material gaps limit the precision of this market analysis:

              No audited revenue data exists for Perplexity or most AI search competitors beyond
              Google, which does not disaggregate AI search revenue from its Search and Other segment
              ($175B+ in 2023). This makes SAM penetration calculations speculative — actual paid
              conversion rates from Perplexity's 45M MAU are not publicly disclosed, preventing a
              reliable revenue-per-user benchmark.

              Analyst TAM figures span three orders of magnitude (USD 17B to USD 379B) depending on
              whether the definition covers only AI search software, AI search advertising, or all
              AI-influenced digital spend. The widest estimates include all advertising that may
              eventually transition to AI-mediated formats, which may be appropriate for a 2030
              bull case but overstates the immediately addressable market. This report preserves
              both conservative and expansive estimates rather than resolving the contradiction.

              Geographic segmentation is poorly documented: Perplexity's user growth in India
              (Airtel partnership) and Japan/Asia (SoftBank distribution) may materially alter
              the TAM calculus, but no analyst report specifically sizes these markets for AI search.
              The Japanese publisher lawsuits further complicate market access in Asia.

              The competitive boundary between AI chatbot and AI search is blurring: OpenAI's
              ChatGPT now features web search; Google's Gemini integrates conversational answers.
              Market share data that separates these tools (e.g., First Page Sage's generative AI
              chatbot ranking) may undercount or overcount Perplexity depending on the traffic
              methodology used.
            claimRefs:
              - C068
              - C069
              - C070
      - number: '2.6'
        title: Exhibits
        blocks:
          - type: callout
            title: 'Definitional Inflation: USD 17B vs USD 379B TAM'
            body: |
              Analyst TAM estimates for AI search span 22× depending on scope. Investors pricing Perplexity
              at USD 20B are implicitly underwriting the large-TAM scenario (AI search advertising disruption),
              not the conservative software-only estimate. This creates meaningful valuation risk if AI
              advertising products fail to materialise.
            calloutType: insight
            claimRefs:
              - C047
              - C049
              - C054
          - type: callout
            title: Google's AI Overviews Narrows Perplexity's Window
            body: |
              Google's integration of AI-generated summaries directly in search results (AI Overviews)
              addresses the most obvious consumer pain point Perplexity solves, without requiring users
              to change their default search tool. Perplexity's differentiation must increasingly rely
