  - number: 3
    title: Competitors
    sections:
      - number: '3.1'
        title: Competitive Landscape Overview
        blocks:
          - type: paragraph
            body: >
              Perplexity AI competes across three distinct battlefields simultaneously: the mass consumer AI search
              market, the enterprise knowledge-management segment, and the niche privacy/power-user search tier. Each
              battlefield has structurally different dynamics, buyer motivations, and incumbent advantages.


              In the consumer AI search market, Perplexity is a well-funded challenger facing two hyperscale incumbents
              — Google (with AI Overviews and Gemini) and Microsoft (with Copilot integrated into Bing and Microsoft
              365) — plus a formidable AI-native peer in OpenAI's ChatGPT. Google and Microsoft benefit from billions of
              existing users, default OS/browser placements, and multi-decade brand trust, while ChatGPT enjoys the
              fastest-ever software product growth trajectory with approximately 800 million weekly active users as of
              September 2025. Perplexity's ~45 million MAU is a fraction of these incumbents' scale.


              In the enterprise AI knowledge-management segment, Perplexity Enterprise Pro competes against
              purpose-built internal search platforms — most prominently Glean ($7.2 billion valuation, $100M+ ARR) and
              Coveo (Gartner Magic Quadrant leader). Both Glean and Coveo are optimised for internal, permissioned data
              retrieval with deep integration into enterprise SaaS stacks. Perplexity's comparative advantage here is
              its real-time external web synthesis capability, but it lacks Glean's depth of internal data access
              controls and personalisation.


              In the niche/privacy-user tier, Kagi, You.com, and Brave Search serve distinct audiences — privacy
              advocates, productivity-oriented professionals, and developer/researcher communities — who are unlikely to
              be Perplexity's primary acquisition targets but represent potential churn sources from the power-user
              segment.


              The status-quo alternative — Google traditional search — still accounts for approximately 90% of global
              search market share by queries. The majority of Perplexity's growth comes from a growing cohort of users
              who supplement, not replace, Google with AI-native search. Behavioural multi-homing is widespread and
              represents both a growth mechanism and a retention risk.
            claimRefs:
              - C078
              - C079
              - C080
              - C081
              - C082
      - number: '3.2'
        title: 'Incumbent Competitors: ChatGPT, Google Gemini, and Microsoft Copilot'
        blocks:
          - type: paragraph
            body: >
              OpenAI's ChatGPT is Perplexity's most significant direct AI-native competitor. As of September 2025,
              ChatGPT has surpassed 800 million weekly active users and processes over one billion queries daily.
              OpenAI's annualised revenue run rate reached approximately $20 billion by late 2025, driven by consumer
              subscriptions (ChatGPT Plus at $20/month, ChatGPT Team at $25-30/user/month) and enterprise API contracts.
              OpenAI's valuation was $300 billion after its March 2025 fundraise, with 92% of Fortune 100 companies
              reportedly using OpenAI services. ChatGPT's core search feature (Browse/Search) directly replicates
              Perplexity's cited-answer proposition, and its multi-modal capabilities, coding strength, and agentic
              workflow features give it a broader total addressable use case than Perplexity's research focus.


              Google's response to Perplexity has been its fastest-ever product iteration in search. AI Overviews
              (formerly Search Generative Experience) appeared in over one-third of Google Search queries in 2025,
              delivering AI-synthesised answers at the top of the results page across Google's approximately 90% global
              search market share. Google Gemini Advanced ($19.99/month individual, enterprise on request via Google
              Workspace) has outperformed other models on multiple 2025 reasoning benchmarks and offers the largest
              context window (up to 2 million tokens) available in a consumer product. Google's structural advantages —
              default search status on Android (which runs ~72% of global smartphones), Chrome browser, and Google
              Workspace — are regulatory-scrutinised but operationally intact through 2025.


              Microsoft Copilot integrates AI across Bing search (~4% global market share, ~11-12% desktop market
              share), Windows, Edge, and Microsoft 365. Copilot has approximately 218 million active users, with
              Microsoft's total ad revenue (Bing Ads plus LinkedIn and gaming) exceeding $20 billion in 2025.
              Microsoft's distribution advantage is its enterprise software footprint: Bing is embedded in 48% of
              Fortune 500 companies' Microsoft enterprise platforms. Copilot Pro (integrated into Microsoft 365 apps)
              creates switching cost through deep workflow integration that Perplexity cannot replicate with its current
              product scope.
            claimRefs:
              - C083
              - C084
              - C085
              - C086
              - C087
              - C088
              - C089
              - C090
              - C091
      - number: '3.3'
        title: Niche and Emerging Challengers
        blocks:
          - type: paragraph
            body: >
              Beyond the hyperscale incumbents, Perplexity faces a set of smaller but strategically relevant challengers
              that compete for the privacy-conscious, power-user, or developer-oriented segments.


              Kagi is a subscription-only (starting at $5/month for 300 searches, $10/month for unlimited) privacy-first
              search engine that explicitly targets power users frustrated with ad-supported models. Kagi uses its own
              indices (Teclis, TinyGem) supplemented by anonymised third-party sources, with no advertising and no user
              tracking. Its customisation capabilities (domain blocking, personal result boosting, Lens filters) are
              differentiators in the power-user segment that Perplexity does not offer. However, Kagi's scale is tiny
              relative to Perplexity and the barrier of a paid model with no free tier significantly limits its user
              funnel.


              You.com positions itself as a productivity-focused AI assistant blending web search, document
              summarisation, code generation, and a plug-in ecosystem. You.com appeals to teams and professionals
              wanting a customisable AI workspace rather than a pure search tool. It competes at the margin with
              Perplexity Pro for the professional productivity use case.


              Brave Search is integrated natively into the Brave browser (a privacy-respecting browser with
              approximately 82 million monthly active users) and provides free AI search with optional paid tiers. Its
              independent web index (built to reduce reliance on Google/Bing) and privacy-first architecture give it a
              structural credibility advantage among privacy advocates. Brave's tight browser integration creates a form
              of distribution that Perplexity lacks at this scale.


              Phind targets the developer vertical with a code-optimised AI search interface. It represents a risk of
              vertical fragmentation — where specialists build narrow AI search products that capture high-value
              sub-segments before generalist platforms like Perplexity can establish dominance there.
            claimRefs:
              - C092
              - C093
              - C094
              - C095
              - C096
      - number: '3.4'
        title: 'Enterprise AI Search: Glean and Coveo'
        blocks:
          - type: paragraph
            body: >
              Enterprise AI knowledge management is the highest-ARPU segment Perplexity is targeting with its Enterprise
              Pro product, and it is also the most structurally defensible by incumbents.


              Glean is the primary enterprise internal search competitor. Founded in 2019 (Palo Alto, CA) and backed by
              Sequoia Capital, Glean achieved a $7.2 billion valuation as of its 2025 funding rounds and has surpassed
              $100 million ARR. Glean was named to the CNBC Disruptor 50 in 2025. Its platform provides unified search
              across enterprise SaaS (Google Workspace, Microsoft 365, Slack, Salesforce, Confluence, GitHub, etc.) with
              strong permissioning, personalised intent-based results, and agentic AI workflow automation. Glean's deep
              enterprise integration depth — covering over 100 connectors — represents a structural moat that Perplexity
              Enterprise Pro, with its external-web-first architecture, does not yet match. Sam Altman (OpenAI) cited
              Glean as among the most credible competitive threats to OpenAI's enterprise search expansion. Glean's
              limitation: it does not provide real-time external web synthesis, which is Perplexity's core capability.


              Coveo (TSX: CVO) is publicly listed and serves enterprise search for both internal (knowledge management)
              and external (eCommerce product discovery, customer support) use cases. Coveo was named a Leader in the
              2025 Gartner Magic Quadrant for Search and Product Discovery. Its differentiation is explainable AI
              relevance modelling and omnichannel personalisation — capabilities most relevant to retail, financial
              services, and B2B SaaS support organisations. Coveo's competitive overlap with Perplexity is narrower
              (primarily internal enterprise knowledge retrieval).


              Perplexity's competitive positioning in enterprise is therefore as a hybrid external-internal intelligence
              layer rather than a pure internal search tool, which defines both its differentiated use case and its
              current capability gaps versus Glean.
            claimRefs:
              - C097
              - C098
              - C099
              - C100
              - C101
      - number: '3.5'
        title: Moat Analysis, Switching Costs, and Displacement Risk
        blocks:
          - type: paragraph
            body: >
              Perplexity's sustainable competitive advantage depends on three potential moat sources: proprietary usage
              data compounding model quality over time, brand association with "verified research" (particularly among
              academics and professionals), and enterprise workflow integration through API and connector partnerships.


              The durability of these moats is contested. The core citation-backed AI answer product has been replicated
              at scale by Google AI Overviews and ChatGPT Search within 18 months of Perplexity's public launch.
              Per-query unit economics are structurally disadvantaged relative to Google: each Perplexity query runs a
              live LLM inference call at significant compute cost, while Google's traditional search query involves
              fraction-of-a-cent index lookups at ten times the scale. At 780 million monthly queries, Perplexity's
              compute costs are estimated to be a key profitability barrier.


              Switching costs in AI search are lower than most enterprise software categories. Users can and do
              multi-home across platforms: a typical power user may use Google for habitual lookups, Perplexity for
              research, and ChatGPT for creative/coding tasks simultaneously. However, enterprise deployment switching
              costs are higher: organisations that embed Perplexity Enterprise into internal knowledge workflows via API
              integrations face re-integration costs that create retention stickiness.


              The publisher lawsuit exposure creates a unique competitive risk: if courts compel Perplexity to restrict
              its content aggregation or pay significant licensing fees (as appears to be required following the Dow
              Jones, NYT, Britannica, and Japanese publisher cases), its content coverage and economics may deteriorate
              relative to Google (which has established licensing relationships) and OpenAI (which has signed licensing
              deals with AP, Axel Springer, and others).


              Adverse evidence: an April 2026 analysis titled "How Perplexity Lost the AI War" (sourced from a YouTube
              strategic analysis) concludes that the structural disadvantage — LLM-per-query cost versus Google's
              hyperscale index — is not solvable without a fundamental business model pivot or a transformative
              distribution partnership. This represents a credible contra-indicator to the thesis that Perplexity can
              sustain differentiation at scale.
            claimRefs:
              - C102
              - C103
              - C104
              - C105
              - C106
              - C107
