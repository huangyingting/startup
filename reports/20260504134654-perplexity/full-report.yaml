  - number: 5
    title: Product & Technology
    sections:
      - number: '5.1'
        title: Product Lines and User-Facing Features
        blocks:
          - type: paragraph
            body: |
              Perplexity AI operates five distinct product lines as of 2026: (1) the core Answer Engine 
              (web, iOS, Android, browser extension), (2) Deep Research for multi-step autonomous 
              research workflows, (3) Pages for publishing AI-generated structured documents, (4) Shopping 
              with native checkout integration, and (5) the Comet browser. An evolving sixth surface, Spaces,
              provides persistent knowledge repositories combining uploaded documents with live web retrieval.

              The core product is a real-time retrieval-augmented generation (RAG) answer engine that 
              distinguishes itself from traditional search by delivering synthesized, cited prose answers 
              rather than ranked link lists. Every response is grounded in freshly retrieved web content 
              with inline source citations — a design choice that reduces hallucination and enables user 
              verification of claims.

              Deep Research extends the core into autonomous multi-step workflows: the system decomposes 
              a complex query into sub-questions, executes 50+ web searches, synthesizes 100+ sources, and 
              produces a structured, cited report. This functionality targets high-value professional use 
              cases including legal, financial, academic, and competitive research workflows.

              Pages converts research sessions into shareable, visually formatted documents — bridging AI 
              search output and knowledge management. Shopping, launched November 2024, embeds product 
              discovery and direct checkout (via PayPal/Venmo integration) within the search experience, 
              positioning Perplexity as a commerce intermediary.
            claimRefs:
              - C149
              - C150
              - C151
              - C152
              - C153
      - number: '5.2'
        title: Model Architecture and AI Technology Stack
        blocks:
          - type: paragraph
            body: |
              Perplexity's AI stack centres on the proprietary Sonar model family, a suite of 
              retrieval-augmented LLMs optimised for web-grounded generation. The flagship Sonar model 
              is built on Meta's Llama 3.3 70B base, continually fine-tuned by Perplexity for factual 
              accuracy, citation grounding, and real-time web retrieval. It supports a 128K token context 
              window and achieves 121 tokens/second streaming throughput in production.

              Sonar Pro extends the context window to 200K tokens, doubles citation density, and supports 
              image inputs, making it suitable for enterprise-grade multi-step research. Sonar Reasoning 
              Pro applies explicit chain-of-thought processing for multi-hop analytical queries. Sonar Deep 
              Research is optimised for exhaustive synthesis from hundreds of sources, typically powering 
              the Deep Research product feature.

              The core technical differentiation is a hybrid dense/sparse retrieval pipeline — combining 
              neural (semantic) search with keyword-based retrieval — executed before generation. This 
              architecture grounds responses in current facts and provides auditable citation chains, with 
              independent benchmarks estimating Perplexity's factual error rate at 3–8% versus 10–17% for 
              pure generative models.

              Beyond its proprietary Sonar models, Perplexity routes queries to third-party frontier LLMs 
              as user-selectable options: GPT-5 (OpenAI), Claude 4.5/4.6 (Anthropic), Gemini (Google), 
              and Mistral Large — accessed via API licensing. Routing decisions factor in query intent, 
              complexity, user plan tier, and required modality.

              The Comet browser, launched July 2025 on Chromium, integrates the full Sonar stack into the 
              browser layer with multi-agent architecture enabling parallel task execution across tabs. 
              Comet was initially exclusive to Perplexity Max subscribers ($200/month) before global free 
              rollout in October 2025.
