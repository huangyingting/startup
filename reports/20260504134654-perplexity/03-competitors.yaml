  - id: T304
    title: Moat Durability and Competitive Risk Register
    description: Assessment of Perplexity's claimed moat sources, the associated threats, severity, and diligence asks.
    enumerationScope:
      coverage: exhaustive
      basis: >-
        Covers all material moat claims identified through public research; all material competitive threats that could
        erode each moat. Based on public information and third-party analysis as of Q4 2025.
    columns:
      - Moat Claim
      - Threat
      - Severity
      - Status
      - Mitigation / Diligence Ask
    rows:
      - - 'Brand association: ''trusted research AI'''
        - Google/ChatGPT citation replication at hyperscale erodes Perplexity's uniqueness
        - High
        - Eroding — Citation as default feature now table stakes
        - >-
          Monitor NPS among research-heavy users; assess whether Perplexity retains citation quality leadership in
          independent benchmarks
      - - Multi-model routing flexibility
        - OpenAI, Google offer single-model services that match or exceed routed model quality
        - Medium
        - Partially defensible — Routing reduces model-lock-in risk for users
        - >-
          Assess whether routing translates to measurable quality improvement over single-model outputs; benchmark
          systematically
      - - Proprietary usage data / query learning
        - At ~780M queries/month, Perplexity's data is dwarfed by Google (8.5B/day) and ChatGPT (1B/day)
        - High
        - Weak — Insufficient data scale relative to incumbents to generate data-network-effect moat
        - >-
          Request data usage policy; assess whether query data feeds proprietary model fine-tuning or is third-party
          only
      - - Enterprise API and connector integrations
        - Glean's 100+ connectors and Microsoft/Google native integrations provide deeper enterprise entrenchment
        - Medium-High
        - Early — Limited connectors; enterprise integration depth immature
        - >-
          Review connector roadmap; assess how many Fortune 500 customers have embedded Perplexity API in internal
          workflows
      - - Publisher and content relationships
        - >-
          Active lawsuits with major publishers (Dow Jones, NYT, Nikkei/Asahi, Britannica/Webster) risk content
          restriction or licensing costs
        - High
        - >-
          Adverse — Multiple active cases; Yomiuri seeking $14.7M+; Britannica/Webster and Dow Jones cases proceeding to
          trial
        - >-
          Track case outcomes; assess licensing cost range and impact on gross margin; compare Google's established
          licensing practice
      - - Distribution via carrier/OEM partnerships
        - Google's and Apple's default placement agreements create permanent headwind on mobile
        - High
        - >-
          Adverse — Airtel/SoftBank/KDDI partnerships impressive but insufficient to offset Google/Apple defaults at
          scale
        - Assess whether carrier partnerships convert to retained MAU or high churn; request carrier-attributed DAU data
    claimRefs:
      - C102
      - C103
      - C104
      - C105
      - C106
      - C107
