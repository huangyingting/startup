  - id: T605
    title: Expansion and Concentration Risk Table
    description: Key expansion drivers and concentration risks with impact and diligence paths.
    columns:
      - Expansion Driver / Risk
      - Type
      - Impact
      - Diligence Path
    rows:
      - - Free-to-paid conversion (consumer)
        - expansion driver
        - Each 1% additional conversion on 45M MAU = ~540K new paid users at $20/month = ~$130M ARR annually
        - Request free-tier cohort conversion rates by acquisition channel; validate Airtel post-trial conversion
      - - Enterprise seat expansion (land-and-expand)
        - expansion driver
        - If NRR exceeds 110%, enterprise ARR compounds quickly; seat expansion within 20K+ org base
        - Request per-account expansion rate; assess whether usage-based pricing is planned
      - - Carrier post-trial conversion (Airtel, SoftBank, DT)
        - expansion driver / risk
        - >-
          360M+ users with free Pro — if 0.5% convert at $20/month = $43M ARR; if conversion is negligible, investment
          is sunk user acquisition cost
        - Request Airtel post-trial conversion rate; assess SoftBank deal economics
      - - SoftBank dual investor-reseller dependency
        - concentration risk
        - >-
          SoftBank is top investor (Series E) + Enterprise Pro reseller in Japan; any shift in SoftBank priorities could
          reduce both enterprise revenue and funding access simultaneously
        - Assess independence of investment and commercial terms; review change-of-control provisions
      - - AI search commoditisation
        - concentration risk
        - Google AI Overviews and ChatGPT Search offer free competitors, compressing Perplexity's paid value proposition
        - Monitor Pro subscription conversion trends as Google/OpenAI capabilities advance
      - - Content supply (publishers/platforms) access
        - concentration risk
        - >-
          Active lawsuits from NYT, Dow Jones, Reddit may constrain web indexing; fewer indexable sources would degrade
          answer quality
        - Track active litigation outcomes; assess whether publisher licensing would be required at scale
