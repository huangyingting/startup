      - number: '7.2'
        title: 竞争与市场替代风险
        blocks:
          - type: paragraph
            body: >
              Perplexity AI 面对的是拥有结构性分发优势的既有巨头，这些优势无法在短期内复制。Google 每天处理约 8.5 billion 次查询，而 Perplexity 2026 年中预测为每月 1.2
              billion 次查询，量级差距为 212×。Google 的 AI Overviews 现在约占所有搜索结果屏幕的一半，直接在用户默认使用的 Google 生态里复制了 Perplexity 的「综合 +
              引用」价值主张。Microsoft Bing AI 和 OpenAI 的 SearchGPT 也处在同一答案引擎空间，并拥有原生浏览器分发（Microsoft Edge、Windows 默认）以及可与
              Perplexity Sonar API 足迹匹敌甚至超越的开发者 API 生态。


              核心投资逻辑被打破的情景是功能平价：如果 Google AI Overviews 或 ChatGPT Search 到 2026 年第四季度实现与 Perplexity
              相当的引用透明度和响应速度，边际专业消费者用户就没有强理由为独立订阅支付 $20/month。Perplexity 查询量同比增长 800% 很亮眼，但起点很小；Google 全球搜索份额在 2025
              年才首次跌破 90%。Sonar API 的竞争护城河也有风险：如果 OpenAI、Anthropic 或 Google 以更低价格推出基于网页事实的推理 API，并配上更大的模型基准，Perplexity
              的开发者渠道会失去定价权和差异化理由。


              Perplexity 的 Comet 浏览器试图把护城河从搜索延伸到浏览，把公司定位成环境计算平台，而不是纯搜索工具。但 Comet 面临的用户行为壁垒，与 Chromium/WebKit
              双寡头之外所有此前浏览器新进入者相同。更重要的是，Comet 绕过付费墙的能力已经产生自己的诉讼向量（Chicago Tribune），使法律风险成为竞争策略的直接产品后果。
