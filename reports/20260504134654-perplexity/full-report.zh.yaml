  - number: 6
    title: 客户
    sections:
      - number: '6.1'
        title: 客户基础分层与地理分布
        blocks:
          - type: paragraph
            body: >
              Perplexity AI 服务四类清晰的客户群体，它们在变现画像、使用场景和获客经济性上差异很大。按数量看最大的一类是免费消费者层级：截至 2025 年末约 43–45 million
              月活跃用户（MAU），主要免费使用核心答案引擎。第二类是付费消费者订阅用户（Pro 为 $20/month，Max 为 $200/month），是 ARR 的主要来源；转化率估计为 MAU 的 2–4%，对应约
              900K–1.8M 付费消费者订阅用户。


              第三类是企业组织：到 2025 年中超过 20,000 家，价格为
              $40/user/month。企业客户包括多个行业中的知名名字：科技（NVIDIA、Stripe、Snowflake、Databricks、Vercel、Replit）、金融服务（Bridgewater）、媒体（Universal
              McCann）、医疗健康（Thrive Global）、法律（Latham & Watkins）、体育（Cleveland Cavaliers）和电信（SoftBank）。


              第四类是运营商分发用户，这是最新、也可能按绝对用户数最大的群体。Bharti Airtel 2025 年 7 月的协议，让印度全部 360 million Airtel 客户（移动、宽带、DTH）获得 12
              个月免费 Perplexity Pro 订阅。日本 SoftBank 和德国 Deutsche Telekom 也代表类似分发安排。


              从地理看，印度尼西亚约占用户 25%，印度约 22%（Airtel 协议后超过美国），美国约 16%。Airtel 协议后，印度用户数同比增长 640%；这是 AI
              消费产品史上由单一合作伙伴驱动的最剧烈用户增长事件之一。
