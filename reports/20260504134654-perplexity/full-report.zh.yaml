      - number: '1.2'
        title: 创始人与领导团队
        blocks:
          - type: paragraph
            body: |
              Perplexity 由四位 AI 研究人员共同创立，他们因美国顶尖院校与湾区 AI 实验室网络相识。
              Aravind Srinivas（CEO，约 1994 年出生，印度 Chennai）在 UC Berkeley 获得博士学位，
              联合创立 Perplexity 前曾在 Google Brain 和 OpenAI 做研究。31 岁的他是估值超过
              $10 billion 公司中最年轻的 CEO 之一，并入选 Time 的 “100 Most Influential People in AI 2024”。

              Denis Yarats（CTO）拥有 NYU 博士学位，加入 Srinivas 创办 Perplexity 前，曾在 Meta AI
              （FAIR）和 Quora 做多年研究科学家。Johnny Ho（CSO）带来工程和量化交易经验。Andy
              Konwinski 是第四位联合创始人，也曾联合创立 Databricks；他目前主要担任董事。团队把
              深度学习研究履历（Berkeley、NYU、Google Brain、Meta AI、OpenAI）和 Quora、Databricks、
              量化金融的应用工程经验放在一起，创始人与 AI 基础设施产品的市场匹配度很强。

              创始人之外，关键高管包括 Dmitry Shevelenko（首席商务官）、Tony Wu
              （工程副总裁）、Henry Modisett（设计副总裁）和 Nate Kupp（基础设施副总裁）。
              董事会成员包括 Andy Konwinski、Denis Yarats、Cack Wilhelm（IVP 普通合伙人）
              和 Pete Sonsini（Laude Ventures 联合创始人）。Joshua Müller（DTCP）拥有董事会观察员席位。
              截至分析日，尚未报告重大高管离职。不过，Aravind Srinivas 是公司最主要的公共发声者和
              战略决策者，关键人依赖偏高。
