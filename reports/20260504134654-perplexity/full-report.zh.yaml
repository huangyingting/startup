      - number: '7.5'
        title: 缓释策略与否决标准
        blocks:
          - type: paragraph
            body: >
              Perplexity 已在法律、监管和运营风险维度部署结构性缓释。法律方面，公司据称正与主要出版商讨论内容授权；News Corp 等已经与 OpenAI
              达成和解或签署内容协议，形成了可作为谈判解决基础的市场出清价格区间。NVIDIA 主权 AI 合作使受监管行业企业客户可以实现 EU 境内数据驻留，处理最紧迫的 GDPR 基础设施风险。


              战略上，投资人财团包括 NVIDIA（硬件对齐）、SoftBank（通过 7,000 人销售团队在日本分发）、Airtel（360 million 印度客户分发），以及 Jeff
              Bezos、IVP、Accel（资本深度和企业网络）。这个财团提供运营护城河和分发替代项，部分隔离 Perplexity 免受美国内容裁决不利影响。Enterprise Pro
              的合同化数据隔离为受监管行业建立了可信合规层，降低 GDPR 训练数据暴露。B2B API 和 Sonar 基础设施也让收入不再只依赖消费者订阅。


              Perplexity 的投资否决标准包括：（1）Dow Jones 或 NYT 案件出现不利终局判决，要求按篇支付内容授权费，使毛利率结构性受损并跌破 40%；（2）Google AI Overviews
              实现引用透明度平价，且 Perplexity ARR 增速到 2026 年第四季度可测地降至同比 80% 以下；（3）CEO Aravind Srinivas
              离职且没有可信技术继任者到位；（4）随着资金可支撑期收窄，未能在 2028 年第一季度前以持平或上轮融资估值完成 Series F；或（5）EU AI Act 执法行动阻止 Perplexity 企业层在 EU
              市场运营，除非完成进一步合规整改。
