      - number: '1.3'
        title: 融资历史与资本结构
        blocks:
          - type: paragraph
            body: |
              2022 年 9 月至 2025 年 9 月，Perplexity 在七轮已披露融资中累计募资约 USD 1.22 billion；
              估值从创立时低于 USD 100 million，约 36 个月内升至 USD 20 billion——这种爬升速度，
              在超高增长消费互联网周期之外很少出现。

              2022 年 9 月的 USD 3.1 million 种子轮由 Elad Gil 领投，Nat Friedman 参投。2023 年
              3 月的 Series A（USD 25.6 million，NEA 领投）提供了 18 个月现金跑道，也验证了产品市场假设。
              2024 年 1 月的 Series B（USD 73.6 million，估值 USD 520 million，IVP 领投）引入
              Nvidia、Jeff Bezos（Bezos Expeditions）和 Databricks，显示战略玩家对 AI 基础设施的信心。
              2024 年两笔融资——4 月 Series C（USD 63 million，估值 USD 1 billion，Daniel Gross 领投）
              和 8 月 Series C 延展轮（USD 250 million，估值 USD 3 billion，SoftBank Vision Fund 2 领投）——
              让估值在八个月内增加逾两倍。2024 年 12 月的 Series D（USD 500 million，估值 USD 9 billion，
              IVP 领投，SoftBank 和 Nvidia 继续加码）又在四个月内让估值翻了三倍。2025 年 5 月的
              Series E（USD 500 million，估值 USD 14 billion，Accel 领投）及后续延展轮——2025 年
              7 月 USD 100 million，估值 USD 18 billion；2025 年 9 月 USD 200 million，估值 USD 20 billion——
              表明即便版权诉讼升温，投资人信心仍在。

              各轮重要投资方包括 IVP、SoftBank Vision Fund 2、Nvidia、Accel、NEA、Bessemer Venture
              Partners、Databricks、Jeff Bezos、Daniel Gross、Garry Tan、Stanley Druckenmiller、
              Andrej Karpathy、Tobi Lutke、Elad Gil 和 Nat Friedman。公司未披露任何债务、可转债或
              老股交易计划，资本结构复杂度有限；不过，以当前估值做老股交易在商业上会很有吸引力。
