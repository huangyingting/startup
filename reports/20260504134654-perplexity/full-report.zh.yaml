      - number: '6.4'
        title: 留存、满意度与耐久性
        blocks:
          - type: paragraph
            body: >
              Perplexity 在 G2 上获得 4.5/5 评分，来自 270+
              条评论，显示企业和专业用户满意度较强。用户提到的核心优点包括答案准确且带引用、实时网页集成、干净无广告界面，以及多模型灵活性。这些属性与产品的核心设计理念一致。


              主要投诉类别包括：（1）准确性担忧——答案有时过度依赖低质量来源，或对复杂学术查询深度不足；（2）价格敏感——相对免费层能力，一些用户认为 $20/month Pro
              方案偏贵；（3）专业研究功能缺口（学术数据库、Bloomberg terminal、实时金融数据）。


              NRR、GRR、队列留存和订阅流失率均未公开。最可靠的留存代理指标是 42% 回访用户流量率（2025 年第三季度）和 7.9 分钟平均会话时长。企业侧，数据 7 天后删除、缺少深度工作流集成（没有
              CRM/ERP 连接器），说明切换成本中等，达不到核心记录系统软件的高粘性。


              Reddit 诉讼（2025 年 10 月）引入了对抗性声誉风险：Reddit 指控 Perplexity 尽管收到停止侵权通知，仍进行「工业规模」抓取。这延续了平台关系紧张的模式（还涉及 NYT、Dow
              Jones、Nikkei），也给依赖时事覆盖的用户带来持续数据访问不确定性。
