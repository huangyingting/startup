      - number: '2.4'
        title: 增长驱动与采用约束
        blocks:
          - type: paragraph
            body: |
              **增长驱动：**
              LLM 能力提升正在降低幻觉率，也扩大了 AI 搜索可可靠处理的查询类型，把 TAM 从高阶用户推向主流消费者。
              公开调查数据显示，企业 AI 搜索采用率从 2023 年到 2025 年增长 340%，超过 75% 的 Fortune 500
              公司已经使用某种 AI 搜索工具。消费者行为也在变化：AI 生成答案已出现在超过三分之一的 Google
              查询中（通过 AI Overviews），把直接答案变成默认期待。竞争对手发生高知名度幻觉事件后，
              用户对无引用 AI 生成内容的信任下降，Perplexity 的引用模式因此受益。

              移动端和运营商分发是近期关键增长驱动：仅 Airtel 合作就可能让 Perplexity 接触印度数亿用户。
              在印度，Google 仍占主导，但监管审视和本地替代方案正在增加。Perplexity 平均会话时长约 9+
              分钟，显著高于 Bing 平均水平，并接近 ChatGPT，说明参与度留存强。

              **采用约束：**
              Google 的地位是最主要的结构性约束：尽管 AI 搜索颠覆叙事升温，Google 在 2025 年仍保持约
              90% 的传统搜索市场份额，受益于巨大的语料优势（数十年搜索索引）、广告主关系、浏览器 / 设备默认入口
              （Chrome、Android）以及自有 AI Overviews 集成。用户依赖 Google 的个性化历史、Maps 集成、
              Shopping 和本地结果，这些都造成高切换成本，而 Perplexity 都尚未复制。

              版权诉讼直接威胁 Perplexity 的内容访问模式：不利判决可能迫使公司签署昂贵的内容授权协议，
              推高每个答案的边际成本、压缩利润率，或要求 RAG 系统架构调整。EU AI Act 和各国隐私法规
              （欧洲 GDPR、美国州级法律）给企业细分增加合规负担。信任和幻觉仍是障碍——只有 65% 用户表示
              信任第一个 AI 生成答案；在金融、医疗等受监管行业，取代既有研究流程前需要更高准确率门槛。
              三分之二企业仍处于 AI 搜索工具的试点或早期实施阶段。
            claimRefs:
              - CM019
              - CM020
              - CM021
              - CM022
              - CM023
              - CM024
              - CM025
