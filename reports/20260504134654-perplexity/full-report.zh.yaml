  - number: 2
    title: 市场分析
    sections:
      - number: '2.1'
        title: 市场定义与边界
        blocks:
          - type: paragraph
            body: |
              Perplexity AI 同时落在三个重叠的市场定义中，每个市场的买方、收入模式和竞争集合都不同：

              **核心 AI 搜索引擎市场：**AI 原生平台，用自然语言查询实时生成综合、带引用的回答。
              这一定义包括 Perplexity、ChatGPT 的搜索模式、Google 的 AI Overviews（在 Search 内）
              和 Microsoft Copilot 的搜索集成。不包括传统关键词搜索（经典 Google/Bing 结果页）、
              通用 LLM 聊天（例如无网页访问的 Claude 对话）和生产力 copilot（Microsoft 365 Copilot、
              Notion AI）。收入来自订阅、企业授权，以及 AI 生成答案页上刚起步的广告。

              **企业 AI 知识管理市场：**一个独立的 B2B 支出类别，组织部署 AI 搜索并总结内部和外部知识库。
              Perplexity Enterprise Pro 在这里与 Glean、Guru 和 Microsoft Copilot for M365 竞争。
              预算负责人是 IT / 知识管理高管和数字化转型负责人。该细分与消费者搜索广告大体分离，
              单席价格更高，销售周期也更长。

              **搜索广告相邻市场：**长期战略 TAM 是全球搜索广告市场（2025 年 USD 200B+，
              到 2030 年可能 USD 435B+），由 Google 主导。Perplexity 尚未产生有意义的广告收入，
              但其出版商收入分成模式是广告支持层级的前身。这个相邻市场是投资人给出估值溢价的主要原因——
              如果 AI 搜索能拿下 Google 搜索广告收入哪怕 5%，按当前水平也对应 USD 8–10 billion
              可寻址年收入。

              现状替代品包括 Google Search（链接 + AI Overviews）、Bing Copilot、ChatGPT（通用 LLM）
              以及专业工具（Wolfram Alpha 做数学、PubMed 做研究、Bloomberg Terminal 做金融）。
              很多用户同时使用多个工具，这降低了切换门槛，也限制了 Perplexity 捕获独占使用时长的能力。
