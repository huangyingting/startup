  - number: 7
    title: 风险
    sections:
      - number: '7.1'
        title: 法律与监管风险
        blocks:
          - type: paragraph
            body: >
              Perplexity AI 在 AI 搜索赛道承受最集中的诉讼风险。旗舰案件 Dow Jones & Company, Inc. v. Perplexity AI, Inc.（SDNY，案号
              1:24-cv-07984）在 2025 年进入关键拐点：法院发布意见和命令，驳回了 Perplexity 的完整驳回动议组合。法院拒绝了 Rule 12(b)(2) 下的管辖权异议、28 U.S.C. §
              1404(a) 下将审判地转移至加州的请求，以及对十项版权作品的部分 Rule 12(b)(6) 驳回请求。该意见认定 Perplexity
              在纽约运营，在当地雇佣包括联合创始人兼首席战略官在内的关键人员，并专门向纽约消费者营销产品。原告指控三种独立侵权模式：（1）批量复制受版权保护文章进入 RAG
              索引；（2）响应用户提示时逐字复现输出，包括一个记录在案的实例：一名 Pro 用户收到完整 New York Post 文章的逐字内容；（3）把幻觉文本错误归因于原告商标。事实发现截止 2026 年 6 月 4
              日；专家发现截止 2026 年 9 月 2 日；陪审团审判预计在 2027 年。


              自 2025 年第三季度以来，诉讼组合明显扩大。New York Times 于 2025 年 12 月提起版权侵权和错误归因诉讼。Chicago Tribune
              同月起诉，并增加一项不同主张：Perplexity 的 Comet 浏览器绕过 Tribune 付费墙生成文章摘要，从浏览器产品层面带来新的责任。Nikkei 和 Asahi Shimbun 于 2025 年 8
              月在东京起诉，索赔 $19 million；Yomiuri Shimbun 另行在日本起诉。Britannica 和 Merriam-Webster 于 2025 年 9 月起诉。Reddit 于 2025 年
              10 月起诉，指控工业规模平台抓取。Amazon 于 2025 年 11 月升级了关于 AI 购物中「不光彩手段」的指控。


              监管方面，Perplexity 于 2026 年 3 月在维也纳设立 EU 法人实体，并聘请 Prighter Group 担任其 EEA 的 GDPR 代表。不过，免费层和 Pro
              层默认选择加入训练数据用途，仍为欧洲消费者保留 GDPR 执法残余风险。EU AI Act 于 2024 年 8 月生效，高风险系统义务自 2026 年 8 月起适用。如果 Perplexity
              工具被部署在人力筛选、金融建议或生物识别画像等场景——这些都在 Annex III 下被列为高风险——公司将面临强制合格评定、透明度登记和严格的数据保护对齐。欧盟委员会提议的「Digital Omnibus on
              AI」可能调整期限，但不会取消合规义务。
