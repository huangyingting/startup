  - number: 5
    title: 产品与技术
    sections:
      - number: '5.1'
        title: 产品线与面向用户的功能
        blocks:
          - type: paragraph
            body: >
              截至 2026 年，Perplexity AI 运营五条清晰的产品线：（1）核心 Answer Engine（web、iOS、Android、浏览器扩展），（2）用于多步骤自主研究流程的 Deep
              Research，（3）发布 AI 生成结构化文档的 Pages，（4）嵌入原生结账集成的 Shopping，以及（5）Comet 浏览器。正在演进的第六个入口
              Spaces，则把上传文档与实时网络检索结合，形成持久知识库。


              核心产品是一个实时检索增强生成（RAG）答案引擎。它区别于传统搜索的地方在于，不给用户排序链接列表，而是直接生成带引用的综合性文字答案。每个回答都以新近检索到的网页内容为依据，并带有行内来源引用；这个设计降低幻觉，也让用户可以核验主张。


              Deep Research 把核心能力扩展到自主多步骤工作流：系统把复杂问题拆成子问题，执行 50+ 次网页搜索，综合 100+
              个来源，然后产出结构化、带引用的报告。该功能瞄准法律、金融、学术、竞争研究等高价值专业场景。


              Pages 把研究会话转成可分享、视觉格式化的文档，连接 AI 搜索输出与知识管理。Shopping 于 2024 年 11 月推出，把商品发现和直接结账（通过 PayPal/Venmo 集成）嵌入搜索体验，使
              Perplexity 具备商业中介的定位。
