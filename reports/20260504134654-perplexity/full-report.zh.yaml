      - number: '2.2'
        title: 市场规模测算——多重视角
        blocks:
          - type: paragraph
            body: |
              三组互补测算口径为 Perplexity 的市场机会划出边界：

              **口径 1：核心 AI 搜索引擎软件 / 服务市场。**Grand View Research 估计，2024 年全球
              AI 搜索引擎市场规模为 USD 16.0 billion，并预计到 2033 年复合年增长率（CAGR）为 15.6%，
              对应 2033–2034 年约 USD 60–74 billion 的市场。Astute Analytica 对 2025 年更窄口径的
              估计为 USD 17.3 billion，与这一数字一致。Market.us 也预计，到 2034 年 AI 搜索市场将达到
              USD 73.7 billion，CAGR 同为 15.6%。这些估计彼此并非独立，因为方法相近，也可能引用了相似来源。

              **口径 2：生成式 AI 聊天机器人 / 助手市场份额。**First Page Sage 按月跟踪 AI 聊天机器人流量份额：
              截至 2026 年 4 月，ChatGPT 约 60%，Google Gemini 约 15%，Microsoft Copilot 约 13%，
              Perplexity 约 5.5%。SE Ranking 的 2025 年研究发现，Perplexity 在生成式 AI 搜索流量中的份额
              从 2024 年初的 3.1% 升至 2025 年约 6.2%。这个自上而下口径显示，Perplexity 当前 SAM 份额
              约为 5–6%；如果核心市场约为 USD 17B，则当前 SAM 收入潜力为 USD 800M–1B。不过，公司实际
              ARR 约 USD 200M，远低于这个上限，反映出早期变现和免费层级占主导。

              **口径 3：搜索广告被颠覆情景。**AlixPartners（2025）和 AllAboutAI（2025）指出，
              如果当前 AI 采用轨迹延续，且 AI 生成答案取代传统搜索结果页并催生新广告格式，AI 搜索平台到
              2030 年可能捕获接近 USD 379 billion 的收入。这是结构性颠覆情景，不是近期概率判断。
              按 Perplexity 约 5% 的市场份额，即便到 2030 年只参与其中 10%，也意味着 USD 19B 年收入——
              远高于当前收入运行率，但与今天给出的估值溢价一致。关键是，这一情景假设 Perplexity 能挺过版权诉讼，
              并开发出商业可行的广告产品。

              optis.digital 和 navistratanalytics.com 给出的相互矛盾估计称，2025 年 AI 搜索 TAM 为
              USD 305.7B；该数字几乎可以确定基于更宽泛定义，把所有带搜索组件的 AI 软件和服务都算入其中。
              对 Perplexity 的核心市场分析而言，这个数字应视为离群值。
