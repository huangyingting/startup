chapters:
  - number: 1
    title: 公司概况
    sections:
      - number: '1.1'
        title: 身份与商业模式
        blocks:
          - type: paragraph
            body: |
              Perplexity AI, Inc. 成立于 2022 年 8 月，总部位于 115 Sansome Street,
              Suite 900, San Francisco, California 94104。公司运营 AI 驱动的答案引擎
              和对话式搜索平台，从网页检索实时信息，用大语言模型综合后返回带引用的直接答案，
              而不是链接列表。因此，Perplexity 直接站到传统搜索引擎的对面，尤其是 Google。

              公司的主产品是 Perplexity 答案引擎，可通过网页和移动应用访问。
              免费层级提供不限量标准搜索；Perplexity Pro（USD 20/month）解锁高级模型访问、
              更大上下文窗口，以及图像生成、文件上传等高级功能。Perplexity Enterprise Pro 面向组织，
              提供单点登录、管理控制、限定域的数据处理和专用 API 访问。截至 2025 年末，公司服务
              超过 20,000 家企业客户，iOS 和 Android 累计应用下载量超过 80 million。商业模式把
              订阅收入（B2C Pro 与 B2B Enterprise）、面向出版商的收入分成计划，以及仍处早期开发的
              广告产品组合在一起。

              Perplexity 的差异化靠三根支柱撑着：始终附引用的来源链，降低幻觉带来的信任风险；
              实时网页检索，避免模型知识截止造成信息过期；对话式界面，支持多轮、带上下文的查询。
              其检索增强生成（RAG）架构按需索引实时网页内容，并把来源引用直接嵌入每个答案，
              方便用户核验主张。这一路线推动研究人员、学生和知识工作者自发采用，他们比速度更看重准确性。
