      - number: '5.5'
        title: 合规、信任与产品路线图
        blocks:
          - type: paragraph
            body: >
              Perplexity Enterprise Pro 已取得 SOC 2 Type II 认证，覆盖保密性、可用性和处理完整性。HIPAA 合规（含 BAA）和 PCI DSS 认证也在 Enterprise
              Pro/Max 层级提供。GDPR 合规则通过欧洲数据处理标准应对。关键在于，这些合规承诺只适用于企业方案；消费者和标准 API 用户没有同等数据保护保证，消费者层级数据默认可能被用于模型训练。


              2026 年，Perplexity 成立 Secure Intelligence Institute（SII），与学术界和产业伙伴合作，推进 AI 安全、隐私和安全性方面的基础与应用研究。SII 代表公司对负责任
              AI 的声誉承诺，但其研究产出和治理结构尚未公开详细披露。


              Perplexity 于 2026 年 2 月取消答案内广告，把品牌变现完全转向 Shopping 中的有机内容质量。竞争重心也因此从付费位置转向结构化商品数据质量和品类权威。


              2024–2026 年的关键路线图里程碑包括：Deep Research 推出（2025 年初）、Shopping（2024 年 11 月）、Comet 向 Max 用户预览（2025 年 7 月）、Comet
              全球免费开放（2025 年 10 月）、Secure Intelligence Institute 成立（2026 年）、移除广告（2026 年 2 月），以及继续扩大国际运营商 / OEM
              分发（Airtel、Telkomsel、SoftBank）。


              截至 2026 年初，Perplexity AI 没有公开申请专利。技术差异化建立在自研 Sonar 模型微调、检索流水线实现和用户体验设计之上，全部以商业秘密为基础。如果公司未来寻求上市或战略收购并需要 IP
              评估，这会成为尽调缺口。
