      - number: '8.5'
        title: 建议、退出准备度与最终尽调问题
        blocks:
          - type: paragraph
            body: >
              对 Perplexity AI 的总体投资建议为有条件正面，置信度中，风险评级高。估值立场是 $20B 入场偏紧，$15–16B 为公允，低于 $12B
              具吸引力。投入资本前必须满足的关键条件包括：（1）确认不含授权成本的毛利率 ≥55%；（2）看到公司的法律准备金和预计和解区间；（3）验证企业 NRR ≥110%；以及（4）证明截至 2026 年 6 月 ARR
              增长轨迹高于 $600M。退出准备度仍早：没有 IPO 申报、没有披露盈利里程碑，且 S-1 准备时间从可能的 2027 年启动起至少需要 12
              个月，意味着多数投资者将依赖二级流动性或延续基金结构。投资人财团（NVIDIA、SoftBank、IVP、NEA、Bezos
              Expeditions）包括能够在不利情景下提供过桥资本的战略和机构伙伴。会触发退出建议、打破投资逻辑的信号包括：版权上诉不利裁决使可持续毛利率降至 40% 以下；Google AI Overviews
              达到平价，且 Perplexity ARR 连续三个月同比增长低于 40%；或未能在 2028 年第一季度前以 ≥$20B 完成上调估值融资。资本投入前需要完成的五大尽调问题见 T806。
