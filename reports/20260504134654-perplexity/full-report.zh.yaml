      - number: '6.5'
        title: 扩张渠道与集中度风险
        blocks:
          - type: paragraph
            body: >
              Perplexity 的扩张策略沿三条路径展开：（1）消费者订阅向上销售（免费→Pro→Max），（2）企业席位扩张（在组织内先落地、再扩张），以及（3）运营商 / OEM
              分发（Airtel、SoftBank、Deutsche Telekom），用于规模化获客。


              运营商分发模式最激进：向数亿用户提供免费 Pro 访问，作为漏斗顶部打法，并期待试用后转化其中一部分。Airtel 协议的结构是每个新增用户短期收入为零，因此是一项昂贵的获客投资，回本取决于免费一年后的付费转化。


              集中度风险在于：SoftBank 同时是 Perplexity 最大的 Series E 投资方、日本顶级企业分销商，以及 Airtel 在亚洲的同类渠道方；这种投资人—客户—渠道双重依赖，在企业 SaaS
              中并不常见。如果 SoftBank 优先级变化，收入和分发可能同时受影响。


              企业扩张受席位定价（无用量计费层级）和中等切换成本（无 CRM/ERP 集成）约束，限制了先落地、再扩张的速度。国际用户增长中相当一部分依赖 2–3
              家运营商，如果运营商协议不续约或转化率不及预期，漏斗顶部会变得脆弱。
