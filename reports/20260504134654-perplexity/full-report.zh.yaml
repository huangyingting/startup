            - 自然搜索（口碑）
            - App Store 安装
            - 运营商捆绑激活
            - API 文档
            - Product Hunt / 科技媒体
          emotion: 好奇；拿 Google / ChatGPT 作对比
          label: 发现
        - stage: 首次使用
          actors:
            - 免费消费者
            - 企业试点用户
          touchpoints:
            - Answer Engine（网页查询）
            - Deep Research 试用
            - Focus 模式（学术、Reddit）
          emotion: 对引用透明度印象深；测试准确性
          label: 首次使用
        - stage: 习惯形成
          actors:
            - 回访免费用户
            - Pro 订阅用户
          touchpoints:
            - 日常研究查询
            - Pro Deep Research
            - Spaces（知识库）
            - 安装 Comet 浏览器
          emotion: 满意度高；开始形成工作流依赖
          label: 习惯形成
        - stage: 转化
          actors:
            - 免费 → Pro（$20/mo）
            - 个人用户 → Enterprise（$40/seat）
            - API 试点 → 付费 API
          touchpoints:
            - 触发 Pro 付费墙（日限额）
            - Enterprise IT 评估
            - 合规检查（SOC2、HIPAA）
          emotion: 价格带来转化摩擦；Enterprise：合规推动决策
          label: 转化
        - stage: 扩张
          actors:
            - 企业买家
            - 运营商激活的 Pro 用户（免费期后）
          touchpoints:
            - 席位扩张
            - Spaces 团队部署
            - Enterprise 管理员仪表盘
            - SoftBank/Airtel 续约
          emotion: 嵌入工作流后粘性高；订阅不续约则有流失风险
          label: 扩张
