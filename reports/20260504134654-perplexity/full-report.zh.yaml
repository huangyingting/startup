        - 要求每账户扩张率；评估是否计划采用按用量计费
      - - 运营商试用后转化（Airtel、SoftBank、DT）
        - 扩张驱动因素 / 风险
        - 360M+ 用户免费使用 Pro——如果 0.5% 以 $20/月转化 = $43M ARR；如果转化可以忽略，投资就变成沉没获客成本
        - 要求 Airtel 试用后转化率；评估 SoftBank 交易经济性
      - - SoftBank 双重投资方 / 经销商依赖
        - 集中风险
        - SoftBank 是头部投资方（Series E）+ 日本 Enterprise Pro 经销商；如果 SoftBank 优先事项变化，可能同时压低企业收入和融资通道
        - 评估投资条款和商业条款的独立性；审查控制权变更条款
      - - AI 搜索商品化
        - 集中风险
        - Google AI Overviews 和 ChatGPT Search 提供免费竞品，挤压 Perplexity 的付费价值主张
        - 随着 Google/OpenAI 能力推进，监控 Pro 订阅转化趋势
