      - number: '2.3'
        title: 买方与付款方分层
        blocks:
          - type: paragraph
            body: |
              Perplexity 服务三类主要买方 / 用户 / 付款方画像，它们的采用路径和预算归属不同：

              **B2C 消费者细分（主要）：**个人用户——以研究人员、学生、知识工作者和专业人士为主——
              希望比传统搜索更快获得带引用锚点的答案。免费层级承担获客引擎；用户触达免费额度上限后，
              自助转化为 Pro（USD 20/month）。预算负责人是个人消费者；采用触发点是一次高价值研究任务，
              足以展示 Pro 的多模型和文件上传能力。这个细分贡献了 Perplexity 的 45M MAU 基础，
              但由于免费层级占比很大，收入占比相对有限。

              **B2B 企业细分（高价值、增长中）：**咨询、医疗、法律、科技、金融等组织，通过直销购买
              Perplexity Enterprise Pro。关键行业包括专业服务（Deloitte、AlixPartners）、医疗（Mayo
              Clinic）、法律（Latham and Watkins）和科技（Stripe、Databricks、Nvidia）。预算负责人通常是
              IT、数字化转型或知识管理高管。采购由 IT 牵头，并带有合规要求（SOC2、GDPR、HIPAA）。
              采用触发点是可证明的生产力提升——据报告，研究和提案撰写任务可节省 60–68% 时间。
              该细分已有超过 20,000 家企业客户，是 Perplexity 当前利润率最高的收入驱动。

              **平台 / OEM / 运营商细分（新兴）：**设备制造商（Samsung、Motorola）、运营商
              （印度 Bharti Airtel）和平台（Snapchat）把 Perplexity 搜索能力嵌入面向消费者的产品。
              预算负责人是平台伙伴的业务拓展团队；Perplexity 获得分发费或收入分成。该细分规模潜力最大，
              但单次查询收入最低。Airtel 合作在 2025 年把 Perplexity 推上印度 App Store 榜首。
