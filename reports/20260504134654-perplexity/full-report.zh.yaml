      - number: '8.3'
        title: 牛市、基准与熊市情景
        blocks:
          - type: paragraph
            body: >
              三个情景主要取决于版权诉讼解决方式、Google 竞争反应和 ARR 增长可持续性。牛市情景（20% 概率）下，Dow Jones 和 NYT 诉讼到 2027 年中以合计 $250–350M
              和永久授权条款和解，公司可以吸收；ARR 借助 Comet 浏览器分发和企业席位扩张，在 2027 年第四季度达到 $1.0B；IPO 在 2028 年以 $50B+ 定价，以 $20B 入场可实现
              2.5×。基准情景（50% 概率）下，诉讼在 2026–2028 年以总额 $300–500M 和解，持续授权付款压缩 5–8 个百分点毛利率；ARR 到 2027 年达到 $1.2B，但同比增速降至
              60%；IPO 于 2028–2029 年以 $30–40B 定价，以 $20B 入场实现 1.5–2.0×。熊市情景（30% 概率）下，Dow Jones
              上诉出现不利裁决，要求所有基于网页来源的答案支付结构性授权费，毛利率降至 40% 以下并触发商业模式重置；Google AI Overviews 到 2026 年第四季度达到用户感知上的 Perplexity
              平价，使 ARR 同比增长降至 40% 以下；ARR 到 2027 年停在 $600M；公司无法在 2028 年前完成持平轮，最终被迫以 $8–12B 估值下调融资，以 $20B 入场仅实现
              0.40–0.60×。按概率加权，$20B 入场的预期回报约为 3 年总额 1.5×，只有在仓位控制得当时，才勉强超过高风险私人市场头寸 1.25× 的门槛。
