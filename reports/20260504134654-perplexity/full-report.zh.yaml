      - number: '2.5'
        title: 规模测算缺口与矛盾估计
        blocks:
          - type: paragraph
            body: |
              若干重大缺口限制了本市场分析的精度：

              除 Google 外，Perplexity 和多数 AI 搜索竞争对手都没有经审计收入数据；Google 也不把 AI 搜索收入
              从 Search and Other 分部（2023 年 $175B+）中拆分披露。因此，SAM 渗透率计算带有推测性——
              Perplexity 45M MAU 中的实际付费转化率未公开披露，无法建立可靠的单用户收入基准。

              分析师 TAM 数字横跨三个数量级（USD 17B 到 USD 379B），取决于定义只覆盖 AI 搜索软件、
              AI 搜索广告，还是所有受 AI 影响的数字支出。最宽口径把最终可能转向 AI 中介格式的全部广告都算入，
              对 2030 年乐观情景或许合适，但会高估眼下可触达市场。本报告保留保守与扩张两类估计，而不是强行消解矛盾。

              地理分层记录不足：Perplexity 在印度（Airtel 合作）和日本 / 亚洲（SoftBank 分发）的用户增长
              可能实质改变 TAM 计算，但没有分析师报告专门测算这些 AI 搜索市场。日本出版商诉讼又进一步复杂化
              亚洲市场准入。

              AI 聊天机器人与 AI 搜索的竞争边界正在模糊：OpenAI 的 ChatGPT 已具备网页搜索；Google 的 Gemini
              集成了对话式回答。把这些工具分开的市场份额数据（例如 First Page Sage 的生成式 AI 聊天机器人排名）
              可能低估也可能高估 Perplexity，取决于流量统计方法。
            claimRefs:
              - CM026
              - CM027
              - CM028
      - number: '2.6'
        title: 图表
        blocks:
