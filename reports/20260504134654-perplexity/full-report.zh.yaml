      - number: '3.4'
        title: 企业 AI 搜索：Glean 与 Coveo
        blocks:
          - type: paragraph
            body: >
              企业 AI 知识管理是 Perplexity 用 Enterprise Pro 产品瞄准的最高 ARPU 细分，也是现任者结构性防御最强的细分。


              Glean 是主要的企业内部搜索竞争对手。Glean 成立于 2019 年（Palo Alto, CA），由 Sequoia Capital 支持； 截至 2025 年融资轮，其估值达到 $7.2
              billion，ARR 已超过 $100 million。Glean 入选 2025 年 CNBC Disruptor 50。其平台在企业 SaaS（Google Workspace、Microsoft
              365、Slack、Salesforce、Confluence、 GitHub 等）中提供统一搜索，具备强权限控制、基于意图的个性化结果和智能体 AI 工作流自动化。Glean 的企业集成深度 覆盖超过 100
              个连接器，构成结构性护城河；外部网页优先架构的 Perplexity Enterprise Pro 目前还赶不上。 Sam Altman（OpenAI）曾称 Glean 是 OpenAI
              企业搜索扩张中最可信的竞争威胁之一。Glean 的限制在于： 它不提供实时外部网页综合，而这是 Perplexity 的核心能力。


              Coveo（TSX: CVO）是上市公司，服务内部（知识管理）和外部（电商产品发现、客户支持）两类企业搜索用例。 Coveo 被评为 2025 Gartner Magic Quadrant for Search
              and Product Discovery 的领导者。其差异化在于 可解释 AI 相关性建模和全渠道个性化——这些能力对零售、金融服务和 B2B SaaS 支持组织最有价值。Coveo 与 Perplexity
              的竞争重叠较窄，主要在内部企业知识检索。


              因此，Perplexity 在企业市场的竞争定位，是外部 + 内部混合情报层，而不是纯内部搜索工具；这同时界定了它的 差异化用例和相对 Glean 的当前能力缺口。
            claimRefs:
              - CP020
              - CP021
              - CP022
