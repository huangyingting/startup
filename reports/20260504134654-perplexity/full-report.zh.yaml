      - number: '7.3'
        title: 运营与技术风险
        blocks:
          - type: paragraph
            body: >
              Perplexity AI 的推理栈依赖第三方 LLM API，包括 OpenAI GPT-4o、Anthropic Claude 和 Meta Llama 模型，同时使用自研 Sonar 模型和租用的云端
              GPU 容量。这些关键输入没有任何一个由 Perplexity 端到端控制。任一主要 LLM 供应商的模型退役、API 限流、涨价或合同终止，都将迫使公司快速替换模型，并可能在过渡期损害答案质量。这种依赖还限制
              Perplexity 向模型实验室争取独占权或专项微调的能力，而这些实验室本身也是 AI 搜索领域的直接或间接竞争者。


              服务可靠性是未量化但重大的风险。截至 2026 年 5 月，虽未发现 Perplexity AI 有公开记录的重大宕机，但公司不到三年内从零扩张到每月 780 million
              次查询，意味着基础设施很可能经历过显著压力事件。缺少公开 SLA 披露或事故复盘，使独立可靠性评估无法进行。Dow Jones 和 NYT
              版权诉讼还增加了运营合规负担：法院要求的数据保全令迫使公司保留聊天日志和训练数据集，而这些数据最初并非为长期保存设计，从而在诉讼合规与用户隐私义务之间制造张力。


              答案准确性对企业分部是重大风险。Perplexity 的幻觉率被认为在通用基准上与 GPT-4 相当；绝对水平中等，但在高风险专业场景中可能很重要。Dow Jones 法院意见记录了一个具体实例：一名 Pro
              用户生成了完整逐字 New York Post 文章；同一机制也可能产出被错误归因于可信出版物的幻觉内容，使法律、金融或医疗部署中的企业客户面临下游责任。
