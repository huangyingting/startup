      - number: '6.2'
        title: 用户采用轨迹与参与度
        blocks:
          - type: paragraph
            body: >
              无论按哪项消费者 AI 指标看，Perplexity 的增长轨迹都异常突出。MAU 从 2024 年 1 月的 10 million 增至 2025 年末约 45 million，不到两年增长
              4.5x。月网页访问量从 52.4 million（2024 年 3 月）增至 160 million（2025 年 3 月），同比增长 200%+。到 2025 年末，移动应用下载量达到 80–100
              million，主要由应用商店分发和运营商捆绑激活带动。


              2025 年 6 月日活跃用户（DAU）估计为 4.4M–6.6M，对应 DAU/MAU 比率 10–15%。虽然低于社交媒体基准（Facebook DAU/MAU 约
              50%），但这符合工具型产品特征：用户按需使用，而不是习惯性刷用。2025 年平均会话时长 7.9 分钟，优于 Google Search 5–6 分钟均值，说明单次访问参与度更深。


              到 2025 年 5 月，查询量达到每月 780 million 次；Airtel 新闻稿（2025 年 7 月）称全球每周回答超过 150 million 个问题，与该协议签署时 600M+
              的月化运行速率一致。查询增长率持续快于 MAU 增长，说明重度用户强度在上升。


              2025 年第三季度，月流量的 42% 来自回访用户；这是一项粘性信号，与习惯性研究场景一致。但回访免费用户和付费订阅用户之间的区别没有公开，因此难以判断这项回访率能否转化为商业耐久性。
