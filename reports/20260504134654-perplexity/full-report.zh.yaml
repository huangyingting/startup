      - number: '8.4'
        title: 可比公司组分析
        blocks:
          - type: paragraph
            body: >
              可比公司组分三层：私有 AI 前沿公司（OpenAI、Anthropic）、上市搜索既有巨头（Alphabet），以及 AI 搜索警示性可比公司（Neeva、DuckDuckGo）。OpenAI
              是最强的架构可比对象——两家公司都通过订阅和企业层级变现 AI 原生信息访问——但 OpenAI 的规模（$25B ARR、$852B 估值）使直接套用倍数容易误导。Anthropic 2026 年 4 月以
              $30B ARR 对应 $380B 估值，倍数为 12.7×，明显低于 Perplexity 的 40×；不过 Anthropic 更大的 ARR 基数解释了部分差距（收入倍数会随规模扩大而压缩）。Aventis
              Advisors 2025 年对 AI 公司主轮融资倍数的分析显示，顶级 AI 公司中位数为 25–30×，Perplexity 高于行业中位数。Alphabet 的 7×
              收入倍数反映成熟度、盈利能力和多元化，不适合作为直接可比，但可作为长期均值回归基准。Neeva 先例（由前 Google 员工创办的 AI 搜索引擎，2023 年关闭并以远低于主轮估值的价格卖给
              Snowflake）是最强负面可比，说明没有差异化分发和变现路径的 AI 搜索挑战者，很难对抗 Google 的默认引擎锁定。DuckDuckGo 估值估计 $1.5B、收入
              $60–80M（18–25×），可作为小盘参考，但缺少 Perplexity 的增长轨迹和企业渗透。
