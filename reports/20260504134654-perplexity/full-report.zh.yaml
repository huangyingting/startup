      - number: '1.4'
        title: 规模、增长指标与产品里程碑
        blocks:
          - type: paragraph
            body: |
              Perplexity 在 2024–2025 年的增长轨迹，即便按 AI 创业公司标准也很突出。
              月活跃用户从 2024 年 1 月的约 10 million 增至 2025 年末超过 45 million，
              月查询量在 2025 年 5 月达到 780 million（约每天 26 million 次查询）。应用累计下载量
              超过 80 million，说明消费者需求并未停留在早期尝鲜。员工数从 2024 年初约 52 人增至
              2025 年末估计 1,386 人，不到两年增长约 26 倍。

              收入从 2023 年约 USD 1 million，增至 2024 年估计 USD 20 million；到 2025 年末，
              年化收入运行率突破 USD 200 million。如果当前增速维持，Sacra 的预测模型显示到 2026 年底
              ARR 约为 USD 500 million，意味着 2024 年收入同比增长约 800%。2024 年 4 月 Enterprise Pro
              发布后，企业采用提速，已有超过 20,000 家组织接入。

              关键产品里程碑包括：2022 年 12 月答案引擎公开发布；2024 年 5 月推出 Perplexity Pages
              （结构化内容创作）；2024 年 7 月推出 Publisher Program（与 TIME、Der Spiegel 等媒体伙伴收入分成）；
              2025 年 2 月推出 Deep Research（多步智能体研究报告）；2025 年 7 月推出 Comet，
              这是一款基于 Chromium、集成智能体网页导航的 AI 浏览器。Perplexity 还与 Bharti Airtel（印度）
              和 Snapchat 合作，把搜索能力嵌入第三方场景。
