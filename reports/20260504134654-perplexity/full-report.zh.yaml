      - number: '6.3'
        title: 具名客户验证与企业部署
        blocks:
          - type: paragraph
            body: >
              以一家处于当前阶段的 AI 初创公司看，Perplexity 的具名企业参考客户名单很强。官方 Enterprise Pro 发布博客（2024 年 4 月）披露了跨行业 15+ 家具名客户；这类用例颗粒度在
              AI 公司公告中并不常见。


              最有说服力的证言来自 Databricks CEO Ali Ghodsi：「Perplexity Enterprise Pro 让 Databricks
              大幅加快研发，也让工程、营销和销售团队更容易更快执行。我们估计它每月帮助团队节省 5k 个工作小时。」按 $150/hour 的全负荷成本计算，5,000 小时意味着每月约 $750K 生产力价值，而可能支出仅为
              $40/seat/month。


              HP 用 Perplexity 做销售团队的潜客研究；Zoom 用于产品团队的定向搜索；Latham & Watkins（一家全球律所）用于法律研究；Cleveland Cavaliers
              用于票务销售趋势分析和合作伙伴挖掘；Thrive Global 用于创建经同行评审的健康内容。USADA 案例研究展示了产品在受监管研究工作流中的应用。


              这组客户证据的定性局限在于，多数用例只在发布时描述，续约率、席位扩张、NRR，或两年后是否仍是活跃客户，数据有限。企业验证是真实的，但缺少投资判断所需的纵向耐久性证据。
