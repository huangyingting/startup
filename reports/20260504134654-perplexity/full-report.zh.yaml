      - number: '8.2'
        title: 估值语境与入场纪律
        blocks:
          - type: paragraph
            body: >
              Perplexity 于 2025 年 9 月完成 Series E，投后估值 $20B，从 SoftBank、NVIDIA、IVP 等筹得 $200M。截至 2026 年 4–5
              月，基于观察到的股份交易，二级市场隐含估值约 $18.7B，较主轮融资折价 11.8%，说明相较 $21.2B 峰值已经出现一定价格发现、泡沫感下降。以 $500M ARR 计算，隐含倍数为 40×
              前瞻收入，明显高于 Aventis Advisors 识别的 AI 公司主轮融资 25–30× 中位数，也高于 Anthropic 在 2026 年同一时点的有效 12.7×。Perplexity 400%+ 的
              ARR 同比增长（十二个月内从约 $100M 到约 $500M）部分解释了高倍数，但也要求支付增长可持续性溢价，从而引入估值风险。入场纪律很重要：证据支持在入场融资前估值不高于 $20B
              时给出有条件正面建议；风险调整后画像在 $15–16B（公允价值）显著改善，低于 $12B 时具吸引力。二级市场访问限于合格投资者；按 CEO 表述，2028 年前不预期 IPO，意味着从 2026 年中起至少
              2 年持有期。Series E 对应股价约 $69.54（拆股后），2026 年 4 月前 90 天估计二级交易量 $2B，显示这家上市前公司流动性健康。
