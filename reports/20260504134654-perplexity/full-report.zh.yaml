      - number: '4.4'
        title: 资本充足性与融资策略
        blocks:
          - type: paragraph
            body: >
              Perplexity 在 2025 年通过 Series E 的三笔融资合计筹得约 $800 million：2025 年 5 月由 Accel 领投、估值 $14 billion 的约 $500
              million；2025 年 7 月 NVIDIA、NEA、SoftBank Vision Fund、IVP 参与、估值 $18 billion 的约 $100 million；以及 2025 年 9 月估值
              $20 billion 的约 $200 million。截至 2025 年末，公司自成立以来累计融资约 $1.5 billion。


              具体现金余额和资金可支撑期没有公开披露。以 2024 年 $65 million 烧钱规模为基线，并假设烧钱随员工数和基础设施扩张而增加（2025 年年化可能为 $150-250
              million），Perplexity 2025 年筹得的 $800 million 可在当前烧钱水平下支撑约 3–5 年运营，前提是收入不出现显著低于预期。ARR 从 2025 年 9 月的 $200
              million 加速到 2026 年 3 月的 $450 million+，说明业务正在快速接近一个阶段：收入可以覆盖更大比例的运营，外部资本依赖随之下降。


              业务的资本密集度主要不是 capex，而是非资本开支：算力作为
              opex，云基础设施租用。没有显著实体资产基础有利于资本效率，但也意味着公司不会积累可为债务融资提供抵押的硬资产。公开资料中没有已披露的债务或项目融资义务。


              下一轮融资触发点很可能取决于 ARR 增长相对烧钱的表现。按当前 ARR 轨迹（2026 年初 $450-500 million）计算，并假设会计口径归一、免费层算力成本受控后毛利率改善到
              50–70%，Perplexity
              可能正在接近一个阶段：外部增资变成可选项，而不是生存必需。但这高度取决于出版商诉讼如何解决（诉讼可能带来每年数千万到数亿美元的内容授权成本），也取决于超大规模云厂商等既有巨头的竞争反击是否进一步压低增长率。


              估值 / ARR 倍数约 100x（基于 $20 billion 估值和 2025 年 9 月 $200 million ARR），相对多数上市 SaaS 可比公司偏高，反映市场给 AI
              原生增长率和企业及智能体式 AI 机会中的可选性定了高溢价。随着 ARR 向 $500 million 增长，隐含倍数会明显下降，可能支撑未来 IPO 或二级交易。
