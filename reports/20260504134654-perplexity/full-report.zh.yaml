        - 专业人士、开发者、学生
        - 插件 / 应用生态；可定制 AI 工作区；灵活模型路由
        - 品牌认知较弱；来源引用一致性较弱
      - - Brave Search
        - 利基 — 隐私浏览器集成搜索
        - Brave 浏览器 MAU ~82M；私营
        - 重视隐私的普通消费者
        - 独立网页索引；浏览器原生分发；设计上不跟踪
        - AI 综合能力不够先进；主要面向消费者
      - - Traditional Google Search（现状替代）
        - 现状替代品
        - ~90% 全球市场份额；每日查询 8.5B+
        - 全球所有互联网用户
        - 无处不在；零摩擦；习惯性默认入口；索引全面
        - 没有带引用的综合答案；广告干扰多；输出链接，而非答案
