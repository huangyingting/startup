  - number: 8
    title: 估值
    sections:
      - number: '8.1'
        title: 投资逻辑与反方逻辑
        blocks:
          - type: paragraph
            body: >
              Perplexity AI 提供了一个罕见机会：投资 AI 原生答案引擎品类中唯一已规模化、独立挑战 Google Search 的公司。截至 2026 年 4 月，公司 ARR 为 $500M，月活跃用户
              45M，估值轨迹在二十个月内从 $0.5B（2024 年 1 月）升至 $20B（2025 年 9 月），体现出 AI 搜索类初创公司中最快的 ARR
              爬坡。核心逻辑建立在三根结构性支柱上：（1）搜索范式正从链接检索转向带引用背书的答案，尤其适用于研究密集型查询，并在 2028 年估计 $430B 的 AI
              增强搜索市场中创造赢家拿走大部分的机会；（2）Perplexity 已通过 SoftBank–Airtel 集成、NVIDIA 背书、Samsung 设备预装，以及与 20,000+
              家组织的企业协议，搭起分发护城河；（3）公司向 Perplexity Finance、Comet 浏览器和智能体式「Deep
              Research」纵向延伸，使其不止于纯搜索，而更像通用知识工作平台。反方逻辑同样清晰：Google 的分发锁定和无限研发预算，可能在 Perplexity 达到盈利前就商品化其核心产品；Dow
              Jones、New York Times 和另外六家出版商的活跃版权诉讼形成二元法律压力，可能重置成本结构；$20B 估值对应 40× 前瞻 ARR，要求持续超高速增长，而 Neeva 的失败已经说明 AI
              搜索挑战者的这种增长历来脆弱。
