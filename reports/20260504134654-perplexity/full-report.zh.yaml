  - number: 4
    title: 财务情况
    sections:
      - number: '4.1'
        title: 收入模式与定价架构
        blocks:
          - type: paragraph
            body: >
              Perplexity AI 通过四条主要收入流变现：消费者订阅、企业订阅、API/Sonar 按用量授权，以及新兴的出版商收入分成变现层。 消费者订阅（Perplexity
              Pro，$20/month）是最清晰、最可扩展的收入路径。Enterprise Pro 订阅起价 $40/user/month（按年计费为 $400/seat），面向需要有保障数据隐私（SOC 2 Type
              II、HIPAA、GDPR、 PCI DSS 合规）、更高查询额度和管理控制的组织。


              API/Sonar 产品采用 token + request 定价模型：Sonar（标准版）价格为每 1 million input tokens $1、 每 1 million output tokens
              $1，外加每 1 thousand requests $5；Sonar Pro 为每 1 million input tokens $3、每 1 million output tokens $15，外加每 1
              thousand searches $5；Sonar Deep Research 为每 million tokens（input/inference/output）$2/$3/$8，外加每 1 thousand
              searches $5。分层 API 架构让 Perplexity 可以从绕开订阅模式的开发者和企业 API 消费者那里获取边际收入，也支持与运营商和技术伙伴做白标及 OEM 集成。


              Perplexity 的第四条收入流是出版商收入分成模式，2025 年在 Comet Plus 伞下推出。该模式下，Perplexity 设立 $42.5 million 出版商收入池；Comet Plus
              订阅层级为 $5/month，其中 80% 订阅收入按内容参与指标 （直接访问、被引用内容、AI 辅助任务完成）流向出版商。早期伙伴包括 Blavity、Der Spiegel、Gannett、 The
              Independent 和 Time。该模式一方面回应版权诉讼风险，另一方面也试图在潜在法院强制授权要求之前， 搭建一个已授权内容生态。


              第三方估计显示，Perplexity 约 70% 收入来自订阅（消费者 + 企业），30% 来自企业 / API 交易和其他商业安排。 随着 Perplexity
              转向订阅优先的信任主张，广告和上下文商务正在被降权。
