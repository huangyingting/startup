      - number: '7.4'
        title: 财务与执行风险
        blocks:
          - type: paragraph
            body: >
              相对所处阶段，Perplexity AI 的资本位置很强：Series E 累计融资约 $1.5 billion，估值 $20 billion；截至 2026 年 4 月，ARR 轨迹接近 $500
              million。估计每月烧钱 $20–60 million，意味着如果增长支出维持当前水平，2025 年 9 月融资后的资金可支撑期约 20–24 个月。但这个估计不包括潜在法律和解成本或损害赔偿：如果 Dow
              Jones 或 NYT 案件导致按篇计费的 RAG 授权费，并追溯或前瞻性地适用于完整内容语料库，成本影响可能很大。


              $20 billion 估值、约 $500 million ARR，对应约 40× 前瞻收入倍数。只要 ARR 同比增长超过 150%，这个倍数还能辩护；一旦增长放缓就很脆弱。如果年增速跌破
              100%——随着基数变大，这种情景越来越可能——下一轮融资将面临有意义的倍数压缩。公司没有披露通往 GAAP 盈利、正自由现金流或任何 IPO 时间表的路径，摊薄性融资是唯一可见的资本选项。


              关键人物依赖是董事会层面的执行风险。CEO Aravind Srinivas 的技术专长，以及他与 NVIDIA 的 Jensen Huang、SoftBank 的 Masayoshi Son 的个人关系，嵌入了
              Perplexity 最具战略意义的合作。CTO Denis Yarats 和 CSO Johnny Ho 提供了一定梯队深度，但没有记录在案的继任计划。公司约 1,386 名员工对应 $20 billion
              估值，意味着资本效率预期极高；同时管理七起诉讼、重大产品发布（Comet、企业扩张）和国际监管合规，组织冗余很少。
            claimRefs: []
