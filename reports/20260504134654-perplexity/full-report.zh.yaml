      - number: '4.2'
        title: 收入牵引与增长轨迹
        blocks:
          - type: paragraph
            body: >
              Perplexity 的 ARR 轨迹是 B2C AI 软件史上最快的一批。Perplexity 从 2024 年约 $20 million ARR 出发， 到 2025 年初达到 $100 million
              ARR，同比增长 400%。到 2025 年 9 月，ARR 达到 $200 million （由跟踪融资和收入信号的 ARR Club 确认）。2025 自然年收入据报为 $232 million。到 2026
              年 3 月， ARR 已加速至超过 $450 million，并在 2026 年 4 月达到 $500 million ARR 里程碑，反映定价层级扩张和 新企业产品发布带来的影响。


              用户增长支撑了这条收入轨迹。月活跃用户从约 30 million（2025 年 4 月）增至超过 45 million（2025 年末）， 并在 2026 年初超过 100 million；月查询量在 2025
              年 5 月达到 780 million。到 2025 年中，企业客户数 超过 20,000 家。不过，关键转化指标——付费订阅用户数、企业席位数和 API 客户数——均未公开披露，
              精确重建单位经济效益仍带有推测性。


              私营公司情报平台 Sacra 预测，如果当前增长轨迹维持，Perplexity 到 2026 年底可能达到 $656 million ARR。 这一预测基于 Sacra
              对订阅和企业扩张的收入建模，并非公司披露指引。


              收入质量整体偏正面：订阅式 SaaS，以月度经常性收入为主；未披露收入集中在少数企业客户；收入组合正在多元化 （API + 企业 + 出版商）。不过，NRR、流失和 CAC
              数据缺失，无法完整评估收入质量。多轮融资中， Accel、NVIDIA、SoftBank Vision Fund 等机构投资人已在尽调中确认收入增长。
