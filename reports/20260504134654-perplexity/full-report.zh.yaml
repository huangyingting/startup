      - number: '5.2'
        title: 模型架构与 AI 技术栈
        blocks:
          - type: paragraph
            body: >
              Perplexity 的 AI 栈以自研 Sonar 模型家族为核心。这是一组为基于网页事实的生成优化的检索增强 LLM。旗舰 Sonar 模型基于 Meta 的 Llama 3.3 70B 基座模型，由
              Perplexity 持续微调，目标是事实准确性、引用扎实度和实时网页检索。该模型支持 128K token 上下文窗口，生产环境流式吞吐达到 121 tokens/second。


              Sonar Pro 将上下文窗口扩展到 200K token，引用密度翻倍，并支持图像输入，适合企业级多步骤研究。Sonar Reasoning Pro 为多跳分析查询加入显式思维链处理。Sonar Deep
              Research 则为从数百个来源做穷尽式综合而优化，通常支撑 Deep Research 产品功能。


              核心技术差异化在于一条混合稠密 / 稀疏检索流水线：先把神经（语义）搜索与基于关键词的检索结合，再进入生成环节。这个架构把回答锚定在当前事实中，并提供可审计的引用链；独立基准估计 Perplexity
              的事实错误率为 3–8%，而纯生成模型为 10–17%。


              除自研 Sonar 模型外，Perplexity 还把查询路由到第三方前沿 LLM，作为用户可选项：GPT-5（OpenAI）、Claude 4.5/4.6（Anthropic）、Gemini（Google）和
              Mistral Large，均通过 API 授权接入。路由决策会考虑查询意图、复杂度、用户套餐层级和所需模态。


              Comet 浏览器于 2025 年 7 月基于 Chromium 推出，把完整 Sonar 栈集成到浏览器层，并采用多智能体架构，让任务可跨标签页并行执行。Comet 最初仅面向 Perplexity Max
              订阅用户（$200/month），2025 年 10 月才在全球免费开放。
