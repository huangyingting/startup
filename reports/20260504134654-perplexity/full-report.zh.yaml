      - number: '5.3'
        title: API、集成与开发者平台
        blocks:
          - type: paragraph
            body: >
              Perplexity 的开发者平台由三个 API 入口组成：Sonar API（带引用的网页事实答案）、Agent API（多步骤智能体式工作流）和 Embeddings API。所有端点都兼容
              OpenAI，让现有 OpenAI 客户端库只需少量改动即可接入；这是一种有意为之的采用策略，瞄准已经使用 OpenAI 的庞大开发者群体。


              Sonar API 是主要产生收入的 API 入口，分四个模型层级：Sonar（每 1M 输入 / 输出 token $1/$1）、Sonar Pro（$3/$15）、Sonar Deep Research（输入
              / 输出 $2/$3，另加每 1,000 次搜索请求 $5）和 Sonar Reasoning Pro。Perplexity 提供 Python 与 TypeScript SDK、示例教程，并接入 Vercel
              AI Gateway、BazaarLink 等 API 聚合平台。


              企业集成延伸到 Spaces 产品中的 Google Drive、Microsoft SharePoint、GitHub 和上传 PDF，让用户可以基于专有数据发起知识查询。Comet 浏览器增加 Gmail 和
              Google Calendar 集成，用于邮件摘要和日程自动化。这些集成通过企业部署中的网络效应抬高数据护城河。


              Agent API 的用例包括自主填写表单、在线购物编排、会议排期和研究流水线搭建。这个 API 入口是 Comet 智能体式浏览器自动化功能的技术基础。
            claimRefs:
              - CE014
              - CE015
              - CE016
              - CE017
              - CE035
      - number: '5.4'
        title: 基础设施、性能与可靠性
        blocks:
          - type: paragraph
            body: >
              Perplexity 的生产基础设施运行在 Amazon Web Services 上，使用 EC2 GPU 实例（NVIDIA A100/H100 系列）做模型推理，S3 做数据存储和模型权重缓存，Lambda
              做编排，EKS 做 Kubernetes 容器管理。生产、预发和测试环境分别使用独立 AWS 账号，以强化数据隔离并防止跨环境污染。


              网络与应用安全由 Cloudflare 全球网络（DDoS 防护、WAF、限速、SSL/TLS 终止）和 Wiz（云安全监控与误配置检测）提供。所有生产环境访问都要求带 MFA 的 SSO，并通过 AWS IAM
              采用即时访问模型；访问权限至少每季度复核一次。所有公司设备通过 MDM 策略和 EDR 方案强制执行终端安全。


              Perplexity 没有公开披露可用性 SLA、事故指标或历史可用性数据。按 Enterprise Pro 定价惯例（$40/user/month），企业合同可以假设包含定制 SLA
              承诺，但条款并未公开。缺少带历史可用性记录的公开状态页，是可靠性透明度缺口。


              性能方面，Sonar 基础模型以 121 tokens/second 流式输出。与 Google 或 ChatGPT 的单次查询延迟基准没有独立公开，尽管 Perplexity
              声称自己为实时消费者网页查询做了优化。独立评估中的幻觉率（3–8%，对比仅生成模型的 10–17%）使 RAG 架构成为质量差异化因素。
            claimRefs:
              - CE018
              - CE019
              - CE020
