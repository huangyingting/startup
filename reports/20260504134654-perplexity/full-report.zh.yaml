      - number: '4.3'
        title: 成本结构、毛利率和单位经济效益
        blocks:
          - type: paragraph
            body: >
              Perplexity 的成本结构主要压在 AI 推理算力（每次查询触发的 LLM 模型调用）和云基础设施上。2024 年，Perplexity 在 AI 模型 API 上花费约 $8 million，在 AWS
              算力基础设施上花费 $15 million。随着查询量从每月 400 million 次（2024 年初，来自 NVIDIA 的 Perplexity 专题）增至每月 780 million 次（2025 年 5
              月），总算力支出也按比例上升，2025 年年化很可能已超过 $30-50 million。


              披露口径下的毛利率存在重大会计争议。Perplexity 公开称 2024–2025 年毛利率约 60%。但调查报道（The Information，经 Milled/Deep Dive 报道）显示，约 $33
              million 免费层用户算力成本被归入研发费用，而不是收入成本（COGS）。按标准 SaaS 会计，免费用户查询会消耗可计费推理容量，应计入接近 COGS 的项目。如果重新分类，披露毛利率会大幅下降；以
              Perplexity 2024 年 $34 million 收入、$65 million 总支出看，甚至可能转负。


              真实的单次查询经济账没有披露。以 Sonar API 定价作代理，一次典型的 Sonar Pro 800-token 输出，仅输出 token 成本就约 $0.012，意味着免费层每次查询的补贴不可忽视。在每月
              780 million 次查询、假设付费占比 40% 的情况下，免费层查询成本负担估计为每月 $2-5 million，对真实毛利率形成明显拖累。


              员工成本（2025 年末估计约 1,386 人）是第二大成本池。旧金山 AI 行业平均总薪酬为每人 $250,000-$350,000，Perplexity 的年化薪酬等价规模约 $350-500
              million，很可能已经超过收入，也说明公司仍处于重投入和增长模式，而不是接近盈利。


              按 $232 million 收入除以 1,386 名员工计算，单员工收入约 $167,000，低于盈利软件公司每人 $200,000+ 的 SaaS 效率基准；不过对一家高速增长、尚未盈利的 AI
              初创公司来说，这个对比不能直接套用。
