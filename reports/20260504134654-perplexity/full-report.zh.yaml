  - number: 3
    title: 竞争格局
    sections:
      - number: '3.1'
        title: 竞争格局概览
        blocks:
          - type: paragraph
            body: >
              Perplexity AI 同时在三个战场竞争：大众消费者 AI 搜索市场、企业知识管理细分，以及隐私 / 高阶用户搜索小众层。 每个战场的结构动态、买方动机和现任者优势都不同。


              在消费者 AI 搜索市场，Perplexity 是资本充足的挑战者，面对两个超大规模现任者——Google（AI Overviews 和 Gemini）与 Microsoft（Copilot 集成进 Bing 和
              Microsoft 365）——以及 AI 原生同类中的强敌 OpenAI ChatGPT。Google 和 Microsoft 拥有数十亿既有用户、操作系统 / 浏览器默认入口和数十年品牌信任； ChatGPT
              则拥有软件产品史上最快的增长轨迹，截至 2025 年 9 月周活跃用户约 800 million。Perplexity 约 45 million MAU，只是这些现任者规模的一小部分。


              在企业 AI 知识管理细分，Perplexity Enterprise Pro 与专门构建的内部搜索平台竞争——最突出的是 Glean （估值 $7.2 billion，ARR $100M+）和
              Coveo（Gartner Magic Quadrant 领导者）。Glean 和 Coveo 都围绕企业 SaaS 技术栈里的内部、带权限数据检索做了深度优化。Perplexity
              在这里的相对优势，是实时外部网页综合能力； 但它缺少 Glean 在内部数据访问控制和个性化上的深度。


              在小众 / 隐私用户层，Kagi、You.com 和 Brave Search 分别服务隐私倡导者、重生产力的专业人士和 开发者 / 研究者社区。这些人不太可能是 Perplexity
              的主要获客目标，但可能成为高阶用户细分的流失来源。


              现状替代方案——Google 传统搜索——按查询量仍占全球搜索市场约 90%。Perplexity 的大部分增长来自一批增加中的用户： 他们用 AI 原生搜索补充 Google，而不是替代
              Google。行为上的多栖使用很普遍，既是增长机制，也是留存风险。
            claimRefs:
              - CP001
              - CP002
              - CP003
              - CP004
              - CP005
          - type: figure
            figureRef: FP001
            claimRefs: []
      - number: '3.2'
        title: 现任巨头：ChatGPT、Google Gemini 与 Microsoft Copilot
        blocks:
          - type: paragraph
            body: >
              OpenAI 的 ChatGPT 是 Perplexity 最重要的直接 AI 原生竞争对手。截至 2025 年 9 月，ChatGPT 已超过 800 million 周活跃用户，每天处理超过 1
              billion 次查询。OpenAI 年化收入运行率到 2025 年末约达 $20 billion，驱动来自消费者订阅（ChatGPT Plus，$20/month；ChatGPT
              Team，$25-30/user/month） 和企业 API 合同。OpenAI 在 2025 年 3 月融资后估值为 $300 billion，据报道 92% 的 Fortune 100 公司在使用
              OpenAI 服务。ChatGPT 的核心搜索功能（Browse/Search）直接复制了 Perplexity 带引用答案的价值主张； 其多模态能力、代码能力和智能体工作流功能，又让它可覆盖的用例总盘子比
              Perplexity 的研究焦点更大。


              Google 对 Perplexity 的回应，是搜索业务史上最快的产品迭代。AI Overviews（前身为 Search Generative Experience）在 2025 年出现在超过三分之一的
              Google Search 查询中，在 Google 约 90% 全球搜索市场份额 的结果页顶部给出 AI 综合答案。Google Gemini Advanced（个人 $19.99/month，企业通过
              Google Workspace 按需报价）在多项 2025 年推理基准上超过其他模型，并提供消费者产品中最大的上下文窗口（最高 2 million tokens）。 Google 的结构性优势——Android
              默认搜索地位（Android 运行约 72% 全球智能手机）、Chrome 浏览器和 Google Workspace——受到监管审视，但到 2025 年运营上仍完整。


              Microsoft Copilot 把 AI 集成进 Bing 搜索（约 4% 全球市场份额、约 11-12% 桌面市场份额）、Windows、 Edge 和 Microsoft 365。Copilot 约有
              218 million 活跃用户，Microsoft 总广告收入（Bing Ads 加 LinkedIn 和游戏）在 2025 年超过 $20 billion。Microsoft
              的分发优势来自企业软件版图：Bing 嵌入了 48% Fortune 500 公司使用的 Microsoft 企业平台。Copilot Pro（集成进 Microsoft 365 应用）通过深度
              工作流集成制造切换成本，Perplexity 以当前产品范围无法复制。
