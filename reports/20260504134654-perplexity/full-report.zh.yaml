      - number: '3.3'
        title: 小众与新兴挑战者
        blocks:
          - type: paragraph
            body: >
              在超大规模现任者之外，Perplexity 还面对一组规模较小但战略上相关的挑战者，它们争夺重视隐私、高阶用户或 开发者导向的细分人群。


              Kagi 是仅订阅制（300 次搜索 $5/month 起，不限量 $10/month）、隐私优先的搜索引擎，明确面向厌倦广告支持模式的高阶用户。 Kagi
              使用自有索引（Teclis、TinyGem），并辅以匿名化第三方来源；无广告，也不跟踪用户。其定制能力 （域名屏蔽、个人结果加权、Lens 过滤器）是高阶用户细分的差异化点，Perplexity
              并不提供。不过，相比 Perplexity，Kagi 规模很小；付费模式且没有免费层级，显著限制了用户漏斗。


              You.com 把自己定位为以生产力为核心的 AI 助手，融合网页搜索、文档总结、代码生成和插件生态。You.com 吸引希望获得可定制 AI
              工作空间的团队和专业人士，而不是只要纯搜索工具。它在专业生产力用例边缘与 Perplexity Pro 竞争。


              Brave Search 原生集成在 Brave 浏览器中（一个重视隐私、月活跃用户约 82 million 的浏览器），提供免费 AI 搜索和可选付费层级。其独立网页索引（为降低对 Google/Bing
              的依赖而建设）和隐私优先架构，让它在隐私倡导者中 具备结构性可信度优势。Brave 紧密的浏览器集成形成一种分发能力，Perplexity 在这个规模上并不具备。


              Phind 瞄准开发者垂直领域，提供代码优化的 AI 搜索界面。它代表垂直碎片化风险：专门玩家打造狭窄的 AI 搜索产品，在 Perplexity 这类通用平台建立主导地位前，就先拿下高价值子细分。
            claimRefs:
              - CP015
              - CP016
              - CP017
              - CP018
              - CP019
