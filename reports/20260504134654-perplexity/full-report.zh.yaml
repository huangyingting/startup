        - 大众消费者 + 企业
        - 覆盖最广用例；品牌最强；92% Fortune 100 渗透率；多模态；智能体化
        - 研究深度聚焦较弱；无搜索模式时引用质量不稳定；企业定价更高
      - - Google Gemini / AI Overviews
        - 在位者 — AI 增强传统搜索
        - ~90% 全球搜索市场份额；Alphabet 2024 年收入 $339B
        - 大众消费者 + Google Workspace 企业客户
        - Android 和 Chrome 默认入口；最大上下文窗口（2M tokens）；2025 年基准最佳；实时索引
        - UX 对研究场景聚焦较弱；传统广告模式造成激励错配；企业 AI 迭代较慢
      - - Microsoft Copilot / Bing AI
        - 在位者 — AI 增强搜索 + 生产力
        - 218M Copilot 用户；~4% 全球搜索市场；广告收入 >$20B
        - 企业（Microsoft 365）+ Bing 桌面用户
        - 深度集成 Microsoft 365；企业默认部署；借 Teams / SharePoint 做强知识管理
        - 消费者搜索品牌较弱；Bing 移动端份额几乎可忽略；研究深度不及 Perplexity
      - - Glean
        - 相邻竞争 — 企业内部 AI 搜索
        - $7.2B 估值；$100M+ ARR；Series F 融资 $150M（2025）
        - 大型企业（IT、知识管理）
        - 100+ 企业 SaaS 连接器；深度权限控制；智能体工作流自动化；Altman 称其为头号威胁
        - 无实时外部网页综合；主要只处理内部数据；不能替代网页研究
      - - 'Coveo (TSX: CVO)'
        - 相邻竞争 — 企业搜索 + 电商
        - 上市公司；$250M+ ARR（估计）；2025 Gartner MQ 领导者
        - 企业（零售、B2B SaaS、金融服务）
        - 可解释相关性 AI；全渠道个性化；面向外部客户的客服搜索
        - 对外部研究用例适配较弱；集成复杂度更高
      - - Kagi
        - 利基 — 隐私优先的重度用户搜索
        - 规模小（估计 <100K 付费订阅者）；私营，未融资自力发展
        - 隐私倡导者、学者、重度用户
        - 无广告；自有索引；用户控制 / 定制化程度最高；不跟踪
        - 缺少免费层限额带来的转化漏斗；规模很小；AI 综合能力较窄
      - - You.com
