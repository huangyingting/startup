            title: 定义膨胀：USD 17B 与 USD 379B TAM
            body: |
              分析师对 AI 搜索 TAM 的估计因口径不同相差 22 倍。给 Perplexity USD 20B 定价的投资人，
              实际上押注的是大 TAM 情景（AI 搜索广告颠覆），而不是保守的仅软件估计。如果 AI 广告产品
              落不了地，这会带来实质估值风险。
            calloutType: insight
