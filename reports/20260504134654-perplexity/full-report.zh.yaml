      - number: '3.5'
        title: 护城河、切换成本与被替代风险
        blocks:
          - type: paragraph
            body: >
              Perplexity 的可持续竞争优势取决于三类潜在护城河：自有使用数据随时间复利模型质量、与“可验证研究” 绑定的品牌心智（尤其在学术和专业人群中），以及通过 API 和连接器伙伴关系完成企业工作流集成。


              这些护城河能否持久仍有争议。Perplexity 公开发布后 18 个月内，Google AI Overviews 和 ChatGPT Search 已经在规模上复制了这个“带引用 AI
              答案”核心产品。按查询计的单位经济效益相对 Google 处于结构性劣势： 每次 Perplexity 查询都要运行一次实时 LLM 推理调用，计算成本显著；而 Google 传统搜索查询是在十倍规模上做
              低于一美分零头的索引查找。按 780 million 月查询量估算，Perplexity 的计算成本被认为是盈利能力的关键障碍。


              AI 搜索的切换成本低于多数企业软件类别。用户可以、也确实会跨平台多栖使用：典型高阶用户可能同时用 Google 做习惯性查询、用 Perplexity 做研究、用 ChatGPT 做创作 /
              代码任务。不过，企业部署的切换成本更高： 通过 API 集成把 Perplexity Enterprise 嵌入内部知识工作流的组织，会面临重新集成成本，从而形成留存黏性。


              出版商诉讼敞口形成独特竞争风险：如果法院迫使 Perplexity 限制内容聚合或支付显著授权费用（从 Dow Jones、 NYT、Britannica 和日本出版商案件看，这种要求似乎可能出现），相对
              Google（已有授权关系）和 OpenAI （已与 AP、Axel Springer 等签署授权协议），Perplexity 的内容覆盖和经济性可能恶化。


              反向证据：2026 年 4 月一篇题为 “How Perplexity Lost the AI War” 的分析（来自 YouTube 战略分析） 得出结论称，结构性劣势——每次查询都跑 LLM 的成本 vs
              Google 的超大规模索引——如果没有根本商业模式转向或 变革性分发合作，就无法解决。这是对 Perplexity 能否在规模上维持差异化的可信反向指标。
            claimRefs:
