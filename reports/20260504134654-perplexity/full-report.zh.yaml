      - 方向
      - 时点
      - 对 Perplexity 的影响
      - 尽调问题
    rows:
      - - LLM 能力提升（幻觉率下降）
        - 增长驱动因素
        - 持续，2024–2026
        - 扩大可覆盖查询类型；提升消费者信任
        - Perplexity 如何选择并切换底层 LLM 提供商来维持质量？
      - - 企业 AI 搜索采用率增长（2023–2025 年 340%）
        - 增长驱动因素
        - 2024–2026
        - 验证 B2B 变现路径；支撑 Enterprise Pro 定价
        - 核实企业客户留存（NRR）和席位扩张率
      - - 消费者行为转向直接 AI 答案
        - 增长驱动因素
        - 2024–2027
        - 整个 AI 搜索赛道受益；Perplexity 受益于引用差异化
        - 跟踪 Google 零点击搜索挤占 Perplexity 点击的比例
      - - 移动端 / 运营商 OEM 预装（Airtel、Samsung）
        - 增长驱动因素
        - 2025–2026
        - 在新兴市场大规模低 CAC 获客
        - 确认收入分成经济账；评估 OEM 排他条款
      - - 出版商收入分成计划（TIME、Der Spiegel）
        - 增长驱动因素（风险缓释）
        - 2024–2026
        - 降低诉讼风险；构建内容合作护城河
        - 已签约出版商数量；已分配收入；排他条款
      - - Google 在 Search 中集成 AI Overviews
        - 约束因素
        - 2024–2027
        - Google 降低用户切换动力；压缩 Perplexity 的差异化窗口
        - 监测 Perplexity MAU 增速与 Google AI Overviews 采用率
      - - 版权诉讼（NYT、Dow Jones、日本出版商）
        - 约束因素
        - 2024–2027
        - 不利判决可能抬高内容访问成本，或限制 RAG 抓取；若禁令获批，产品模式面临生存风险
        - 评估诉讼时间线、合理使用抗辩强度和最坏情形授权成本模型
      - - 欧盟 AI 法案及全球 AI 监管
        - 约束因素
        - 2025–2027
        - 企业合规成本上升；数据处理和抓取可能受限
        - 识别对欧盟销售的影响；核实数据驻留合规能力
      - - 用户信任 / 幻觉风险
        - 约束因素
        - 持续
        - 降低受监管行业转化率；需要持续投入模型质量
        - 在标准化基准上，Perplexity 的幻觉率相对 Google 和 ChatGPT 如何？
      - - Google 搜索默认入口（Chrome、Android、iOS）
        - 约束因素
        - 结构性
        - 要求用户主动切换工具；限制被动发现
        - 跟踪推荐 / 直接流量结构；评估法院可能要求 Google 调整默认设置的影响（DOJ 案件）
      - - LLM 计算成本对利润率的压力
        - 约束因素
        - 2024–2027
        - RAG 架构每次查询都要实时 API 调用；毛利率对 GPU / 推理价格敏感
        - 单次查询模型计算成本 vs. Pro 订阅收入；评估利润率敏感性
    notes: 时点仅为指示性；鉴于 AI 发展和诉讼节奏，所有约束与驱动因素都可能快速变化。
