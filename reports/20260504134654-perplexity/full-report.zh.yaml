          - type: callout
            title: Google AI Overviews 正在压缩 Perplexity 的窗口期
            body: |
              Google 把 AI 生成摘要直接整合进搜索结果（AI Overviews），不要求用户改变默认搜索工具，
              就解决了 Perplexity 面向消费者最显眼的痛点。Perplexity 的差异化必须越来越依赖引用质量、
              深度和企业功能，而不再是直接答案的新鲜感。
            calloutType: risk
            claimRefs:
              - CM019
              - CM023
          - type: callout
            title: 企业生产力 ROI 推动 B2B 扩张
            body: |
              企业客户称，研究和提案流程可节省 60–68% 时间，与更广泛 AI 搜索市场 240% 的平均 ROI 一致。
              专业服务、医疗和法律垂直行业构成高毛利、经常性收入切入口；一旦部署，替代风险较低。
