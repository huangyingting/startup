      - number: '1.5'
        title: 负面事件与法律挑战
        blocks:
          - type: paragraph
            body: |
              Perplexity 面临与内容获取做法相关的重大法律风险。2024 年 10 月，Dow Jones（The Wall Street
              Journal）和 New York Post 在美国联邦地区法院提起版权侵权诉讼，指控 Perplexity 的 RAG 系统
              未经授权抓取并复现出版商文章，通过伪装爬虫绕过 robots.txt 限制，并让用户“跳过链接”，
              从而减少流量以及广告 / 订阅收入。2025 年 12 月，The New York Times 另行提起诉讼，
              指控相似，并进一步称幻觉内容被错误归因给 NYT 记者，造成声誉损害。日本出版商
              Yomiuri Shimbun、Asahi Shimbun 和 Nikkei Inc. 于 2025 年在东京法院提起诉讼，
              各自要求禁令并索赔约 USD 15 million。

              Perplexity 的抗辩基于合理使用和转换性价值；公司也尝试通过 Publisher Program（收入分成）
              以及与 Getty Images 的授权协议缓解风险。批评者认为，相对于内容消耗规模，这些举措在商业上
              仍不充分。法律结果将实质影响 Perplexity 的内容获取成本结构；如果法院限制实时网页抓取，
              还可能影响其核心产品架构。

              诉讼之外，Perplexity 还因涉嫌违反 robots.txt 指令面临监管和声誉审视，多篇调查报道已有记录。
              截至分析日，尚无正式监管执法行动（FTC、EU）提起，但 AI 内容抓取的监管环境正在快速演化。
