callouts:
  - calloutType: strength
    title: Exceptional Funding Velocity and Investor Quality
    body: |
      Perplexity achieved a $20 billion valuation in approximately 36 months from founding —
      one of the fastest trajectories in AI startup history. The investor base includes
      strategic players (Nvidia, SoftBank, Bezos) whose interests align with Perplexity's
      GPU compute and distribution ambitions, reducing pure financial risk.
    claimRefs:
      - C010
