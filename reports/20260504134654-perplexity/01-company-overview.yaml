  - id: s3
    title: Funding History and Capital Structure
    body: |
      Perplexity has raised approximately USD 1.22 billion across seven disclosed rounds between
      September 2022 and September 2025, with a valuation trajectory that rose from sub-USD 100
      million at inception to USD 20 billion in roughly 36 months — an ascent rarely seen outside
      of hypergrowth consumer internet cycles.

      The seed round of USD 3.1 million in September 2022 was led by Elad Gil with participation
      from Nat Friedman. The March 2023 Series A (USD 25.6 million, led by NEA) provided 18 months
      of runway and validated the product-market hypothesis. The January 2024 Series B (USD 73.6
      million at USD 520 million valuation, led by IVP) brought in Nvidia, Jeff Bezos (Bezos
      Expeditions), and Databricks, signalling AI-infrastructure conviction from strategic players.
      Two tranches in 2024 — an April Series C (USD 63 million at USD 1 billion, led by Daniel
      Gross) and an August Series C extension (USD 250 million at USD 3 billion, led by SoftBank
      Vision Fund 2) — more than tripled the valuation within eight months. The December 2024
      Series D (USD 500 million at USD 9 billion, led by IVP with SoftBank and Nvidia re-upping)
      tripled it again in four months. The May 2025 Series E (USD 500 million at USD 14 billion,
      led by Accel) and subsequent extensions — USD 100 million at USD 18 billion (July 2025)
      and USD 200 million at USD 20 billion (September 2025) — reflect continued investor
      confidence despite mounting copyright litigation.

      Notable investors across rounds include IVP, SoftBank Vision Fund 2, Nvidia, Accel, NEA,
      Bessemer Venture Partners, Databricks, Jeff Bezos, Daniel Gross, Garry Tan, Stanley
      Druckenmiller, Andrej Karpathy, Tobi Lutke, Elad Gil, and Nat Friedman. The absence of
      any disclosed debt, convertible notes, or secondary programmes limits capital-structure
      complexity, though secondaries at these valuations would be commercially attractive.
