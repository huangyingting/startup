  - id: s5
    title: Adverse Events and Legal Challenges
    body: |
      Perplexity faces significant legal exposure related to its content acquisition practices.
      In October 2024 Dow Jones (The Wall Street Journal) and the New York Post filed a copyright
      infringement lawsuit in US District Court, alleging that Perplexity's RAG system scrapes
      and reproduces publisher articles without authorisation, bypasses robots.txt restrictions
      through obfuscated crawlers, and enables users to "skip the links," reducing traffic and
      ad/subscription revenue. In December 2025, The New York Times filed a separate lawsuit
      with similar allegations, additionally citing false attribution of hallucinated content
      to NYT journalists as causing reputational harm. Japanese publishers — Yomiuri Shimbun,
      Asahi Shimbun, and Nikkei Inc. — filed lawsuits in Tokyo courts in 2025, each seeking
      injunctions and approximately USD 15 million in damages.

      Perplexity's defence invokes fair use and transformative value, and the company has
      attempted mitigation through its Publisher Program (revenue-sharing) and a licensing deal
      with Getty Images. Critics argue these steps are commercially inadequate relative to the
      scale of content consumption. The legal outcomes will materially affect Perplexity's
      content acquisition cost structure and, potentially, its core product architecture if
      courts restrict real-time web scraping.

      Beyond litigation, Perplexity has faced regulatory and reputational scrutiny for alleged
      violations of robots.txt directives, which multiple investigative reports have documented.
      No formal regulatory enforcement actions (FTC, EU) have been filed as of the analysis date,
      but the regulatory environment for AI content scraping is evolving rapidly.
    claimRefs:
      - CO032
      - CO033
      - CO034
      - CO041
      - CO042
