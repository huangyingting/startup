      - CO013
      - CO014
      - CO015
      - CO016
  - calloutType: strength
    title: Strong Product-Market Fit and Consumer Adoption
    body: |
      780 million monthly queries and 45 million+ MAU within three years of launch, with
      consistent ~20% month-over-month growth through 2025, demonstrates durable consumer
      demand. Enterprise penetration (20,000+ customers) adds a monetisable B2B layer.
    claimRefs:
      - CO020
      - CO021
      - CO038
  - calloutType: risk
    title: Material Copyright and Legal Exposure
    body: |
      Three active copyright infringement lawsuits (Dow Jones, NYT, Japanese publishers)
      challenge Perplexity's core content-acquisition architecture. Adverse rulings could
      force costly licensing agreements, restrict RAG web scraping, or require product
      redesign, directly threatening the real-time answer engine's functionality and cost base.
    claimRefs:
      - CO032
      - CO033
      - CO034
  - calloutType: risk
    title: Key-Person Concentration in CEO Aravind Srinivas
    body: |
      Aravind Srinivas is the company's primary public voice, strategic decision-maker, and
      brand asset. His departure or incapacitation would likely trigger investor and customer
      concerns disproportionate to his operational role.
    claimRefs:
      - CO003
