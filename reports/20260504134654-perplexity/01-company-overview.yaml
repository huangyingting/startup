  - id: s4
    title: Scale, Growth Metrics, and Product Milestones
    body: |
      Perplexity's growth trajectory in 2024–2025 has been exceptional even by AI-startup standards.
      Monthly active users grew from roughly 10 million in January 2024 to over 45 million in late
      2025, while monthly query volume reached 780 million in May 2025 (approximately 26 million
      queries per day). The app accumulated over 80 million lifetime downloads, demonstrating
      consumer durability beyond initial curiosity waves. Headcount grew from approximately 52
      employees in early 2024 to an estimated 1,386 by late 2025, a roughly 26-fold increase
      in under two years.

      Revenue progressed from approximately USD 1 million in 2023 to an estimated USD 20 million
      in 2024, with annualised run-rate crossing USD 200 million by late 2025. Sacra's projections
      model roughly USD 500 million ARR by end-2026 if current growth rates sustain, implying
      approximately 800% revenue growth year-on-year in 2024. Enterprise adoption accelerated
      after the April 2024 Enterprise Pro launch, with over 20,000 organisations onboarded.

      Key product milestones include: December 2022 public launch of the answer engine; the May
      2024 introduction of Perplexity Pages (structured content creation); the July 2024 Publisher
      Program (revenue-sharing with media partners including TIME and Der Spiegel); the February
      2025 launch of Deep Research (multi-step agentic research reports); and the July 2025 launch
      of Comet, a Chromium-based AI browser integrating agentic web navigation. Perplexity has
      also partnered with Bharti Airtel (India) and Snapchat to embed its search capability in
      third-party surfaces.
