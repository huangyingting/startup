chapter:
  number: 1
  title: Company Overview
  summary: |
    Perplexity AI is a San Francisco-based AI-powered answer engine founded in August 2022 by four
    researchers from leading AI labs. In under three years it grew from a seed-funded startup to a
    $20 billion company with $1.22 billion raised, ~45 million monthly active users, and ~$200 million
    in annualised recurring revenue. The company faces mounting copyright litigation from major news
    publishers but continues to attract elite capital and enterprise adoption.
sections:
  - id: s1
    title: Identity and Business Model
    body: |
      Perplexity AI, Inc. was incorporated in August 2022 and is headquartered at 115 Sansome Street,
      Suite 900, San Francisco, California 94104. The company operates as an AI-powered answer engine
      and conversational search platform that retrieves real-time information from the web, synthesises
      it using large language models, and returns cited, direct answers rather than a list of links.
      This positions Perplexity as a direct challenger to traditional search engines, most notably Google.

      The company's primary product is the Perplexity answer engine, accessible via web and mobile apps.
      The free tier provides unlimited standard searches; Perplexity Pro (USD 20/month) unlocks premium
      model access, larger context windows, and advanced features including image generation and file
      upload. Perplexity Enterprise Pro targets organisations, offering single sign-on, admin controls,
      domain-restricted data handling, and dedicated API access. As of late 2025 the company served
      over 20,000 enterprise customers, with more than 80 million lifetime app downloads across iOS
      and Android. The business model combines subscription revenue (B2C Pro and B2B Enterprise) with
      a publisher-facing revenue-sharing programme and advertising products still in early development.

      Perplexity's differentiation rests on three pillars: always-cited sourcing that reduces
      hallucination trust risk, real-time web retrieval that prevents knowledge-cutoff staleness, and
      a conversational interface that supports multi-turn, context-aware queries. Its retrieval-augmented
      generation (RAG) architecture indexes live web content on demand and threads source citations
      directly into each answer, letting users verify claims. This approach has driven viral adoption
      among researchers, students, and knowledge workers who prioritise accuracy over speed.
    claimRefs:
      - CO001
      - CO002
      - CO003
      - CO018
      - CO019
      - CO022
      - CO038
      - CO039
  - id: s2
    title: Founders and Leadership
    body: |
      Perplexity was co-founded by four AI researchers who met through networks linking top US
      institutions and Bay Area AI labs. Aravind Srinivas (CEO, born c. 1994, Chennai, India) earned
      his PhD from UC Berkeley and completed research stints at Google Brain and OpenAI before
      co-founding Perplexity. At 31 years old he is one of the youngest CEOs running a company
      valued above $10 billion and has been named to Time's "100 Most Influential People in AI 2024."

      Denis Yarats (CTO) holds a PhD from NYU and spent years as a research scientist at Meta AI
      (FAIR) and Quora before joining Srinivas at Perplexity. Johnny Ho (CSO) brings engineering
      and quantitative trading experience. Andy Konwinski is the fourth co-founder and also
      co-founded Databricks; he now serves primarily as a board member. The combination of
      deep-learning research pedigrees (Berkeley, NYU, Google Brain, Meta AI, OpenAI) and
      applied engineering experience across Quora, Databricks, and quantitative finance represents
      strong founder-market fit for an AI infrastructure product.

      Beyond founders, key executives include Dmitry Shevelenko (Chief Business Officer), Tony Wu
      (VP Engineering), Henry Modisett (VP Design), and Nate Kupp (VP Infrastructure). The board
      includes Andy Konwinski, Denis Yarats, Cack Wilhelm (General Partner, IVP), and Pete Sonsini
      (Co-founder, Laude Ventures). Joshua Müller (DTCP) holds a board observer seat. No material
      leadership departures have been reported through the analysis date. However, key-person
      dependence on Aravind Srinivas is elevated given his role as the company's primary public
      spokesperson and strategic decision-maker.
    claimRefs:
