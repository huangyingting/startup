  - id: s4
    title: Growth Drivers and Adoption Constraints
    body: |
      **Growth drivers:**
      LLM capability improvements are reducing hallucination rates and expanding the range of
      query types that AI search handles reliably, expanding TAM beyond power users to mainstream
      consumers. Enterprise AI search adoption grew 340% from 2023 to 2025, and over 75% of
      Fortune 500 firms now use some form of AI search tool, per published survey data.
      Consumer behavior is shifting: AI-generated answers appear in over one-third of Google
      queries (via AI Overviews), normalising the expectation of direct answers. Perplexity's
      citation model specifically benefits from users' growing distrust of uncited AI-generated
      content following high-profile hallucination incidents at competitors.

      Mobile and carrier distribution is a critical near-term growth driver: the Airtel partnership
      alone could expose Perplexity to hundreds of millions of users in India, a market where Google
      is dominant but where regulatory scrutiny and local alternatives are growing. Average
      Perplexity session length of approximately 9+ minutes significantly exceeds Bing's average
      and approaches ChatGPT, indicating strong engagement retention.

      **Adoption constraints:**
      Google's position is the dominant structural constraint: despite AI search disruption
      narratives, Google maintained approximately 90% of traditional search market share in 2025,
      benefiting from enormous corpus advantage (decades of search index), advertiser relationships,
      browser/device defaults (Chrome, Android), and its own AI Overviews integration. These
      create high switching costs for users who rely on Google's personalised history, Maps
      integration, Shopping, and local results — none of which Perplexity replicates.

      Copyright litigation directly threatens Perplexity's content-access model: adverse rulings
      could force expensive content licensing agreements that raise the marginal cost of each
      answer, compress margins, or require architectural changes to the RAG system. The EU AI Act
      and national privacy regulations (GDPR in Europe, state-level laws in the US) add compliance
      overhead for the enterprise segment. Trust and hallucination remain barriers — only 65% of
      users report trusting the first AI-generated answer, and in regulated industries (finance,
      healthcare) higher accuracy thresholds are required before displacing incumbent research
      workflows. Two-thirds of enterprises are still in the pilot or early-implementation phase
      for AI search tools.
    claimRefs:
      - CM019
      - CM020
      - CM021
      - CM022
      - CM023
      - CM024
      - CM025
