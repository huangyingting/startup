      - TM004
  - id: s5
    title: Sizing Gaps and Contradictory Estimates
    body: |
      Several material gaps limit the precision of this market analysis:

      No audited revenue data exists for Perplexity or most AI search competitors beyond
      Google, which does not disaggregate AI search revenue from its Search and Other segment
      ($175B+ in 2023). This makes SAM penetration calculations speculative — actual paid
      conversion rates from Perplexity's 45M MAU are not publicly disclosed, preventing a
      reliable revenue-per-user benchmark.

      Analyst TAM figures span three orders of magnitude (USD 17B to USD 379B) depending on
      whether the definition covers only AI search software, AI search advertising, or all
      AI-influenced digital spend. The widest estimates include all advertising that may
      eventually transition to AI-mediated formats, which may be appropriate for a 2030
      bull case but overstates the immediately addressable market. This report preserves
      both conservative and expansive estimates rather than resolving the contradiction.

      Geographic segmentation is poorly documented: Perplexity's user growth in India
      (Airtel partnership) and Japan/Asia (SoftBank distribution) may materially alter
      the TAM calculus, but no analyst report specifically sizes these markets for AI search.
      The Japanese publisher lawsuits further complicate market access in Asia.

      The competitive boundary between AI chatbot and AI search is blurring: OpenAI's
      ChatGPT now features web search; Google's Gemini integrates conversational answers.
      Market share data that separates these tools (e.g., First Page Sage's generative AI
      chatbot ranking) may undercount or overcount Perplexity depending on the traffic
      methodology used.
    claimRefs:
      - CM026
      - CM027
      - CM028
