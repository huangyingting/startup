      - Direction
      - Timing
      - Implication for Perplexity
      - Diligence Ask
    rows:
      - - LLM capability improvements (lower hallucination rates)
        - Growth driver
        - Ongoing 2024–2026
        - Expands addressable query types; broadens consumer trust
        - How does Perplexity select and swap underlying LLM providers to maintain quality?
      - - Enterprise AI search adoption growth (340% 2023–2025)
        - Growth driver
        - 2024–2026
        - Validates B2B monetisation path; supports Enterprise Pro pricing
        - Verify enterprise customer retention (NRR) and seat expansion rates
      - - Consumer behavioural shift toward direct AI answers
        - Growth driver
        - 2024–2027
        - Tailwind for all AI search; Perplexity benefits from citation differentiator
        - Track share of zero-click Google searches displacing Perplexity clicks
      - - Mobile / carrier OEM embedding (Airtel, Samsung)
        - Growth driver
        - 2025–2026
        - Low-CAC user acquisition at massive scale in emerging markets
        - Confirm revenue-share economics; assess OEM exclusivity clauses
      - - Publisher revenue-sharing program (TIME, Der Spiegel)
        - Growth driver (mitigant)
        - 2024–2026
        - Reduces litigation risk; builds content partnership moat
        - Number of publishers signed; revenue distributed; exclusivity terms
      - - Google AI Overviews integration in Search
        - Constraint
        - 2024–2027
        - Google reducing motivation for users to switch; narrows Perplexity's differentiation window
        - Monitor Perplexity MAU growth rate vs. Google AI Overviews adoption
      - - Copyright litigation (NYT, Dow Jones, Japanese publishers)
        - Constraint
        - 2024–2027
        - >-
          Adverse rulings could raise content-access costs or restrict RAG scraping; existential risk to product model
          if injunctions granted
        - Assess litigation timeline, fair-use strength, and worst-case licensing cost model
      - - EU AI Act and global AI regulation
        - Constraint
        - 2025–2027
        - Compliance overhead for enterprise; potential restrictions on data processing and scraping
        - Identify EU sales impact; data-residency compliance capability
      - - User trust / hallucination risk
        - Constraint
        - Ongoing
        - Reduces conversion in regulated industries; requires ongoing model quality investment
        - What is Perplexity's hallucination rate vs. Google and ChatGPT on standardised benchmarks?
      - - Google's search defaults (Chrome, Android, iOS)
        - Constraint
        - Structural
        - Requires users to actively switch tools; limits passive discovery
