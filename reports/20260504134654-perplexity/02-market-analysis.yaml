chapter:
  number: 2
  title: Market Analysis
  summary: |
    Perplexity AI competes in the emerging AI-powered search engine market, a segment currently
    valued at approximately USD 16–17 billion (2025) and projected to grow to USD 40–74 billion
    by 2030–2034, embedded within a much larger USD 200 billion+ global search advertising
    ecosystem. The company holds roughly 5–6% of the generative AI search assistant market and
    is the clear citation-first search leader. Key growth drivers include LLM capability gains,
    enterprise productivity ROI, and device/carrier embedding. Primary constraints are Google's
    90% traditional-search moat, copyright litigation that could restrict content access,
    trust/hallucination risks, and evolving EU AI regulation.
sections:
  - id: s1
    title: Market Definition and Boundaries
    body: |
      Perplexity AI participates in three overlapping market definitions, each with distinct
      buyers, revenue models, and competitive sets:

      **Core AI search engine market:** AI-native platforms that answer natural language queries
      with synthesised, cited responses in real time. This definition includes Perplexity,
      ChatGPT's search mode, Google's AI Overviews (within Search), and Microsoft Copilot's
      search integration. Excluded are traditional keyword search (classic Google/Bing results
      pages), general-purpose LLM chat (e.g., Claude conversation without web access), and
      productivity copilots (Microsoft 365 Copilot, Notion AI). Revenue comes from subscriptions,
      enterprise licensing, and nascent advertising on AI-generated answer pages.

      **Enterprise AI knowledge management market:** A distinct B2B spend category where
      organisations deploy AI to search and summarise internal and external knowledge bases.
      Perplexity Enterprise Pro competes here with Glean, Guru, and Microsoft Copilot for M365.
      Budget owners are IT/knowledge management executives and heads of digital transformation.
      This segment is largely separate from consumer search advertising and carries higher
      per-seat pricing with longer sales cycles.

      **Search advertising adjacency:** The long-term strategic TAM is the global search
      advertising market (USD 200B+ in 2025, potentially USD 435B+ by 2030), dominated by
      Google. Perplexity does not yet generate meaningful advertising revenue but its publisher
      revenue-sharing model is a precursor to an ad-supported tier. This adjacency is the primary
      driver of investor valuation premiums — if AI search can capture even 5% of Google's search
      ad revenue, that represents USD 8–10 billion in addressable annual revenue at current rates.

      Status-quo substitutes include Google Search (links with AI Overviews), Bing Copilot,
      ChatGPT (general LLM), and specialist tools (Wolfram Alpha for maths, PubMed for research,
      Bloomberg Terminal for finance). Many users use multiple tools simultaneously, which
      lowers switching barriers but also limits Perplexity's ability to capture exclusive usage.
    claimRefs:
      - CM001
      - CM002
      - CM003
      - CM004
    tableRefs:
      - TM001
  - id: s2
    title: Market Sizing — Multiple Lenses
    body: |
      Three complementary sizing lenses bound Perplexity's market opportunity:

      **Lens 1: Core AI search engine software/service market.** Grand View Research estimated
      the global AI search engine market at USD 16.0 billion in 2024, projecting a compound
      annual growth rate (CAGR) of 15.6% through 2033, implying a market of approximately
      USD 60–74 billion by 2033–2034. Astute Analytica's narrower 2025 estimate of USD 17.3 billion
      is consistent with this figure. Market.us projects a USD 73.7 billion AI search market by
      2034, also at a 15.6% CAGR. These estimates are loosely correlated because they share
      similar methodologies and likely cite similar sources.

      **Lens 2: Generative AI chatbot/assistant market share.** First Page Sage tracks AI chatbot
      traffic share monthly: as of April 2026, ChatGPT holds ~60%, Google Gemini ~15%,
      Microsoft Copilot ~13%, and Perplexity ~5.5%. SE Ranking's 2025 study found Perplexity
      at 3.1% of generative AI search traffic in early 2024, rising to approximately 6.2% by
      2025. This top-down lens suggests Perplexity's current SAM share is approximately 5–6%,
      implying a current SAM revenue potential of USD 800M–1B if the core market is ~USD 17B.
      However, the company's actual ARR of ~USD 200M is far below this ceiling, reflecting
      early monetisation and free-tier dominance.

      **Lens 3: Search advertising disruption scenario.** AlixPartners (2025) and AllAboutAI
      (2025) note that AI search platforms could capture revenues nearing USD 379 billion
      by 2030 if current AI adoption trajectories hold and AI-generated answers replace
      traditional search result pages, enabling new advertising formats. This represents a
      structural disruption scenario rather than a near-term probability. At Perplexity's
      ~5% market share, a 2030 participation in even 10% of this market would imply USD 19B
      in annual revenue — far above current run rates but consistent with the valuation premium
      being applied today. Critically, this scenario assumes Perplexity survives copyright
      litigation and develops a commercially viable advertising product.

      Contradictory estimates from optis.digital and navistratanalytics.com cite a USD 305.7B
      AI search TAM in 2025, which is almost certainly based on a far broader definition
      including all AI software and services with a search component. This figure should be
      treated as an outlier for Perplexity's core market analysis.
