  - id: s3
    title: Buyer and Payer Segmentation
    body: |
      Perplexity serves three principal buyer/user/payer profiles with distinct adoption paths
      and budget ownership:

      **B2C Consumer segment (primary):** Individuals — predominantly researchers, students,
      knowledge workers, and professionals — who seek citation-anchored answers faster than
      traditional search. The free tier acts as the acquisition engine; conversion to Pro
      (USD 20/month) is self-service, driven by hitting free-tier usage limits. Budget owner
      is the individual consumer; adoption trigger is a high-value research task that demonstrates
      Pro's multi-model and file-upload capabilities. This segment drives Perplexity's 45M MAU
      base but contributes a relatively modest share of revenue given the large free-tier proportion.

      **B2B Enterprise segment (high-value, growing):** Organisations (consulting, healthcare,
      legal, technology, finance) that purchase Perplexity Enterprise Pro through a direct sales
      motion. Key sectors include professional services (Deloitte, AlixPartners), healthcare (Mayo
      Clinic), legal (Latham and Watkins), and tech (Stripe, Databricks, Nvidia). Budget owner
      is typically the IT, digital transformation, or knowledge management executive.
      Procurement is IT-led with compliance requirements (SOC2, GDPR, HIPAA). Adoption
      trigger is a demonstrable productivity gain — reported time savings of 60–68% on research
      and proposal drafting tasks. With over 20,000 enterprise customers, this segment is
      Perplexity's current highest-margin revenue driver.

      **Platform/OEM/Carrier segment (emerging):** Device manufacturers (Samsung, Motorola),
      carriers (Bharti Airtel in India), and platforms (Snapchat) embedding Perplexity's search
      capability in consumer-facing products. Budget owner is the business development team at
      the platform partner; Perplexity receives a distribution fee or revenue-share. This segment
      has the highest volume potential but the lowest per-query revenue rate. The Airtel
      partnership pushed Perplexity to the top of India's App Store in 2025.
    claimRefs:
      - CM013
      - CM014
      - CM015
      - CM016
