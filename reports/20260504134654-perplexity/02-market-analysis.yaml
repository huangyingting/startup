        - Constraint
        - 2024–2027
        - RAG architecture requires live API calls per query; gross margins sensitive to GPU/inference pricing
        - Model compute cost per query vs. Pro subscription revenue; assess margin sensitivity
    notes: >-
      Timing is indicative; all constraints and drivers are subject to rapid change given the pace of AI development and
