      Values are estimates in millions of users. Global internet users from ITU 2025; AI search-aware from
      McKinsey/Semrush survey proxies; Perplexity lifetime installs and MAU from company-reported / third-party data.
      Paid users estimated from ARR (USD 200M) at USD 240/user/year blended rate — highly uncertain.
    claimRefs:
      - CM008
      - CM013
      - CM014
      - CM026
callouts:
  - calloutType: insight
    title: 'Definitional Inflation: USD 17B vs USD 379B TAM'
    body: |
      Analyst TAM estimates for AI search span 22× depending on scope. Investors pricing Perplexity
      at USD 20B are implicitly underwriting the large-TAM scenario (AI search advertising disruption),
      not the conservative software-only estimate. This creates meaningful valuation risk if AI
      advertising products fail to materialise.
    claimRefs:
      - CM005
      - CM007
      - CM012
  - calloutType: risk
    title: Google's AI Overviews Narrows Perplexity's Window
    body: |
      Google's integration of AI-generated summaries directly in search results (AI Overviews)
      addresses the most obvious consumer pain point Perplexity solves, without requiring users
      to change their default search tool. Perplexity's differentiation must increasingly rely
      on citation quality, depth, and enterprise features rather than the novelty of direct answers.
    claimRefs:
      - CM019
      - CM023
  - calloutType: strength
    title: Enterprise Productivity ROI Drives B2B Expansion
    body: |
      Enterprise customers report 60–68% time savings on research and proposal workflows,
      consistent with the broader AI search market average ROI of 240%. Professional services,
      healthcare, and legal verticals represent a high-margin, recurring revenue wedge with low
      substitution risk once deployed.
    claimRefs:
      - CM014
      - CM021
