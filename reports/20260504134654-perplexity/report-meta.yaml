companyProfile:
  summary: "Perplexity AI is a San Francisco-based AI startup founded in August 2022 by Aravind Srinivas, Denis Yarats, Johnny Ho, and Andy Konwinski — all alumni of OpenAI, Google DeepMind, and Meta. The company operates an AI-native 'answer engine' that synthesises real-time web content into cited, conversational responses, positioning itself as a direct challenger to Google Search. With $500M ARR, 45M monthly active users, and 20,000+ enterprise organisations as of May 2026, it has achieved the fastest ARR ramp among AI-search focused startups, growing from $20M ARR in 2024 to $500M in 24 months."
