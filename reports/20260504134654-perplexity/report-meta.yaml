  productSummary: "Core product is the Perplexity answer engine (web + Pro tiers). Pro subscription ($20/month) unlocks advanced model access, higher query limits, and file uploads. Enterprise tier (Perplexity Enterprise One) serves 20,000+ organisations. Adjacent products include Perplexity Finance (real-time financial data and analysis), Perplexity API (developer access), and Comet browser (in development). Deep Research mode provides multi-step agentic research synthesis."
  customerFocus: "Dual-market: B2C (knowledge workers, students, researchers via web and mobile apps) and B2B (enterprise teams via Perplexity Enterprise One). Top enterprise sectors include financial services, legal, and technology."
  businessModel: "Subscription-led: Pro tier ($20/month) for consumers; Enterprise One licensing for organisations. Emerging monetisation channels: programmatic advertising ('Ask' ads), API usage, and affiliate/commerce integrations. No advertising on Pro tier."
