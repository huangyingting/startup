  - id: T502
    title: Workflow / Use-Case Table
    description: Representative user workflows replaced or enhanced by Perplexity products.
    columns:
      - User Job
      - Current Workflow
      - Perplexity Solution
      - Measurable Benefit
      - Known Limitation
    rows:
      - - Consumer factual research
        - Google search → read multiple pages → synthesise mentally
        - 'Answer Engine: typed query → cited prose answer in <2 seconds'
        - ~10x time reduction; citations allow verification
        - Summarisation may omit nuance; not suitable for real-time stock/sports data
      - - Professional competitive intelligence
        - Manual web scraping, analyst notes, hours per report
        - 'Deep Research: single prompt → multi-source cited report with subheadings'
        - 30–60 minute task collapsed to minutes; source traceability maintained
        - Non-public databases (Gartner, Bloomberg terminal) not accessed; paywalled content cited but not retrieved
      - - Enterprise knowledge retrieval
        - Keyword search across SharePoint/Drive + manual reading
        - 'Spaces: combined proprietary doc RAG + live web for hybrid knowledge queries'
        - Reduced time-to-answer in enterprise workflows; citable internal + external sources
        - Requires manual data ingestion; IT admin setup needed; no real-time data connectors to HRIS/ERP
      - - Online product purchase
        - Google → comparison site → retailer checkout (3+ steps)
        - 'Shopping: product discovery + PayPal checkout inside one Perplexity session'
        - Friction reduction; intent-aligned recommendations; no paid placement
        - Merchant coverage still growing; not all categories covered; no price-match guarantee
      - - Routine browser task automation
        - Manual tab management, copy-paste between sites, form filling
        - 'Comet: multi-agent automation executing multi-step tasks from a single prompt'
        - Collapsed multi-step workflows into single interactions
        - Requires Comet browser install; agentic accuracy degrades with complex site layouts; privacy trade-offs
