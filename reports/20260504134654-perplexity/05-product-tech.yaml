  - id: sec503
    title: API, Integrations and Developer Platform
    body: |
      Perplexity's developer platform comprises three API surfaces: the Sonar API (web-grounded 
      answers with citations), the Agent API (multi-step agentic workflows), and the Embeddings 
      API. All endpoints are OpenAI-compatible, enabling existing OpenAI client libraries to 
      connect with minimal code changes — a deliberate adoption strategy targeting the large base 
      of developers already using OpenAI.

      The Sonar API is the primary revenue-generating API surface, with four model tiers: Sonar 
      ($1/$1 per 1M input/output tokens), Sonar Pro ($3/$15), Sonar Deep Research ($2/$3 input/output 
      plus $5 per 1,000 search requests), and Sonar Reasoning Pro. Perplexity provides Python and 
      TypeScript SDKs, cookbook tutorials, and integrations with Vercel AI Gateway, BazaarLink, and 
      other API aggregation platforms.

      Enterprise integrations extend to Google Drive, Microsoft SharePoint, GitHub, and uploaded 
      PDFs within the Spaces product, enabling knowledge-grounded queries over proprietary data. 
      The Comet browser adds Gmail and Google Calendar integration for email summarisation and 
      scheduling automation. These integrations increase data moat through network effects within 
      enterprise deployments.

      Agent API use cases include autonomous form completion, online shopping orchestration, meeting 
      scheduling, and research pipeline construction. This API surface is the technical foundation 
      for Comet's agentic browser automation features.
    claimRefs:
      - C162
      - C163
      - C164
      - C165
      - C183
  - id: sec504
    title: Infrastructure, Performance and Reliability
    body: |
      Perplexity's production infrastructure runs on Amazon Web Services, using EC2 GPU instances 
      (NVIDIA A100/H100 series) for model inference, S3 for data storage and model weight caching, 
      Lambda for orchestration, and EKS for Kubernetes container management. Separate AWS accounts 
      are maintained for production, staging, and testing environments to enforce data isolation and 
      prevent cross-environment contamination.

      Network and application security is provided by Cloudflare's global network (DDoS protection, 
      WAF, rate limiting, SSL/TLS termination) and Wiz for cloud security monitoring and 
      misconfiguration detection. All access to production environments requires SSO with MFA and 
      operates on a just-in-time access model via AWS IAM, with access privilege reviews at minimum 
      quarterly frequency. Endpoint security is enforced through MDM policies and EDR solutions 
      on all company devices.

      Perplexity does not publicly disclose uptime SLAs, incident metrics, or historical 
      availability data. Enterprise contracts are assumed to include custom SLA commitments based 
      on Enterprise Pro pricing norms ($40/user/month), but these terms are not public. The absence 
      of a public status page with historical uptime represents a reliability transparency gap.

      On performance, the Sonar base model streams at 121 tokens/second. Per-query latency 
      benchmarks against Google or ChatGPT are not independently published, though Perplexity 
      claims to be optimised for real-time consumer web queries. Hallucination rates in independent 
      evaluations (3–8% versus 10–17% for generative-only models) position the RAG architecture 
      as a quality differentiator.
