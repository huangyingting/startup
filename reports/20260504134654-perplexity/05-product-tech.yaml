  - id: sec505
    title: Compliance, Trust, and Product Roadmap
    body: |
      Perplexity Enterprise Pro is SOC 2 Type II certified, covering confidentiality, availability, 
      and processing integrity. HIPAA compliance (with BAA) and PCI DSS certification are also 
      available at the Enterprise Pro/Max tier. GDPR compliance is addressed through European data 
      handling standards. Critically, these compliance commitments apply only to enterprise plans — 
      consumer and standard API users do not receive the same data protection guarantees, and 
      consumer-tier data may be used for model training by default.

      In 2026, Perplexity founded the Secure Intelligence Institute (SII) to pursue fundamental 
      and applied research in AI security, privacy, and safety in collaboration with academic and 
      industry partners. The SII represents a reputational commitment to responsible AI but its 
      research outputs and governance structure are not yet publicly detailed.

      Perplexity eliminated in-answer advertising in February 2026, pivoting brand monetisation 
      entirely to organic content quality within Shopping. This shifts competitive dynamics toward 
      structured product data quality and category authority rather than paid placement.

      Key roadmap milestones from 2024–2026 include: Deep Research launch (early 2025), Shopping 
      (November 2024), Comet preview to Max users (July 2025), Comet free globally (October 2025), 
      Secure Intelligence Institute founding (2026), ad removal (February 2026), and continued 
      international carrier/OEM distribution expansion (Airtel, Telkomsel, SoftBank).

      No patents have been publicly filed by Perplexity AI as of early 2026. Technical differentiation 
      rests on proprietary Sonar model fine-tuning, retrieval pipeline implementation, and user 
      experience design — all trade-secret based. This makes IP a diligence gap if the company 
      were to pursue a public offering or strategic acquisition requiring IP assessment.
