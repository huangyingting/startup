sections:
  - id: sec501
    title: Product Lines and User-Facing Features
    body: |
      Perplexity AI operates five distinct product lines as of 2026: (1) the core Answer Engine 
      (web, iOS, Android, browser extension), (2) Deep Research for multi-step autonomous 
      research workflows, (3) Pages for publishing AI-generated structured documents, (4) Shopping 
      with native checkout integration, and (5) the Comet browser. An evolving sixth surface, Spaces,
      provides persistent knowledge repositories combining uploaded documents with live web retrieval.

      The core product is a real-time retrieval-augmented generation (RAG) answer engine that 
      distinguishes itself from traditional search by delivering synthesized, cited prose answers 
      rather than ranked link lists. Every response is grounded in freshly retrieved web content 
      with inline source citations — a design choice that reduces hallucination and enables user 
      verification of claims.

      Deep Research extends the core into autonomous multi-step workflows: the system decomposes 
      a complex query into sub-questions, executes 50+ web searches, synthesizes 100+ sources, and 
      produces a structured, cited report. This functionality targets high-value professional use 
      cases including legal, financial, academic, and competitive research workflows.

      Pages converts research sessions into shareable, visually formatted documents — bridging AI 
      search output and knowledge management. Shopping, launched November 2024, embeds product 
      discovery and direct checkout (via PayPal/Venmo integration) within the search experience, 
      positioning Perplexity as a commerce intermediary.
    claimRefs:
      - C149
      - C150
