      - number: '3.6'
        title: 护城河耐久性评估
        blocks:
          - type: paragraph
            body: >-
              Nimble 护城河耐久性面临两大威胁：集中度风险和资本不对称。FedEx 分销优势取决于商业关系；FedEx 任何战略变化——竞争性收购、转向或重新谈判——都可能实质削弱 Nimble
              的网络护城河。资本深度是第二个约束：Nimble 累计融资 $221 million，而 Locus 为 $438 million、Exotec 为 $446 million，Symbotic
              还拥有公开市场资本；Nimble 面对的是资源显著更多的对手。积极一面是，部署后的切换成本很高：深度 WMS/ERP 集成、设施专属配置，以及 Nimble
              云平台内的数据锁定，都会强化留存。数据飞轮随规模复合，RaaS 合同打包 SLA 保证和分析更新，形成多年供应商锁定。FedEx
              网络护城河、数据飞轮和切换成本合在一起，构成耐久但集中的护城河；单一物流伙伴集中是主要耐久性风险。
            claimRefs:
              - CP028
              - CP029
              - CP038
              - CP040
              - CP041
      - number: '3.7'
        title: 反向与批判视角
        blocks:
          - type: paragraph
            body: >-
              独立 SWOT 评估指出了几项脆弱性。Nimble 依赖 FedEx 关系，意味着分销护城河依赖伙伴而非自有资产；这是结构性脆弱点，拥有自有网络的竞争者（如 Amazon
              Robotics）没有同样问题。相比上市竞争者 Symbotic（$22.4B 积压订单）和独角兽规模竞争者 Locus（融资 $438M）、Exotec（融资 $446M），Nimble 累计融资
              $221M，在资本密集型制造和部署业务中构成明显资本劣势。Nimble 没有经过独立验证的自主 3PL
              履约市场份额数据，无法仅靠外部数据三角定位其竞争位置。定价不透明虽是企业机器人领域常态，但也限制潜在客户做竞争比较。
