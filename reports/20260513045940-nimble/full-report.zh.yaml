      - number: '6.2'
        title: 采用与部署轨迹
        blocks:
          - type: paragraph
            body: >-
              Nimble 的采用曲线反映出 2022 年 Series C 融资后在 FedEx 网络内快速扩张。公司披露，截至 2024 年已有 130+ 个活跃履约中心部署，代表着 FedEx Supply Chain
              北美设施版图上的多年建设。累计拣选物品已达到 15 million，处理过 500,000+ 个唯一 SKU——这些指标同时证明使用规模和产品类型覆盖宽度。员工数已增至
              200+，与跨多个地理分散设施管理机器人部署的运营复杂度相符。入选 2024 年 Deloitte Technology Fast 500 榜单为收入增长提供第三方佐证，但具体收入仍未披露。截至 2022 年累计
              $63 million 的 Series C 融资提供了必要的基础设施投入，使公司从少数试点站点扩展到 130+ 个生产部署。基于机器人即服务实施的行业基准，从初始评估到全面铺开的部署漏斗通常跨越 90 到
              270 天，但 Nimble 特定部署周期未公开披露。关键采用推动因素包括 FedEx 渠道（消除直接企业销售摩擦）、RaaS 模式（为品牌客户移除资本支出门槛），以及与 FedEx 现有 WMS
              基础设施的集成。活跃站点和累计拣选的同比增长未按年度间隔报告，限制了外部对精确采用速度轨迹的可见度。
