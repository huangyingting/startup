      - number: '4.3'
        title: 成本结构与利润率分析
        blocks:
          - type: paragraph
            body: >-
              Nimble 成本结构体现了资本密集型硬件软件混合业务特征。主要成本驱动包括：机器人制造和部署成本（硬件 COGS）、FedEx
              设施运营成本（租金、公用事业和物流伙伴费用）、云基础设施与软件开发费用，以及持续改进 AI 模型所需的 R&D 人员成本。可比规模的 RaaS/FaaS 业务毛利率通常在 20% 到 55%：Locus
              Robotics 在 pre-IPO 材料中披露的毛利率约 27-31%，Symbotic 报告 FY2024 Q4 毛利率约 17%。考虑到 Nimble 范围更宽（完整 FaaS，而非单任务
              RaaS），毛利率可能落在 20-35% 区间；设施运营成本形成压力，软件收入提供支撑。数据飞轮成熟后，运营杠杆会显现：AI
              准确率提升减少机器人停机，进而降低服务成本并提高单设施利用率。资本开支主要由机器人制造驱动；在 FaaS 模式下，部署一个完整 Nimble 履约中心需要 Nimble
              吸收显著初始资本开支，形成营运资本强度，现金流收支平衡前必须依靠融资支撑。Nimble 未披露制造成本，但可比机器人部署显示，每个设施初始设备和集成成本约 $2-5M。
            claimRefs:
              - CI012
              - CI013
              - CI014
              - CI015
              - CI016
