      - number: '5.3'
        title: 差异化、知识产权和数据优势
        blocks:
          - type: paragraph
            body: >-
              Nimble 的核心技术差异化在于通用抓取能力，以及大规模部署带来的数据飞轮。GP 抓取系统能处理 RightHand 或 Covariant 专用机器人也覆盖的物品，但 Nimble
              的范围延伸到完整履约栈，而不只是拣选任务。自监督学习路径——机器人从数百万次真实拣选中生成自己的训练数据——构成有意义的技术护城河：它不吃标注成本，并随每一次新部署复利。Nimble
              的专利申请覆盖机器人操控方法、物流软件系统和多模态感知路径；Simon Kalouche 来自 Carnegie Mellon 的研究和商业工作已有多项授权专利和待审申请。数据优势继续复利：15 million+
              次运营拣选、覆盖 500,000+ 个 SKU，形成了新进入者若没有同等部署规模就无法复制的训练语料。此外，FedEx 联盟带来数据集成优势——Nimble 系统运行在 FedEx
              的物流数据环境中，可能支持预测性库存布点和运输优化，而独立机器人公司拿不到这种环境。没有第三方基准研究公开比较 Nimble 与竞争对手的 AI 拣选准确率，因此技术优越性主张很难独立验证。
            claimRefs:
              - CE011
              - CE012
              - CE013
              - CE014
              - CE015
          - type: figure
            figureRef: FE004
            claimRefs: []
      - number: '5.4'
        title: 部署、集成、可靠性和路线图
        blocks:
          - type: paragraph
            body: >-
              Nimble 将 AFC 部署在 FedEx 现有设施内，借用 FedEx 的地产点位和基础设施，同时安装 Nimble
              的机器人系统、软件和流程工作流。部署周期未公开披露，但可比仓储机器人项目从签约到上线通常需要 2-6 个月。与客户 ERP / OMS 系统的集成通过 Nimble 的 Cloud Logistics
              Platform 完成；该平台为 Shopify、NetSuite、SAP 等主流平台提供预置连接器。SLA
              未公开披露，但企业履约场景通常包括正常运行时间保证、吞吐承诺和按客户定制的错误率目标。产品路线图未公开披露。公开信号显示，重点可能包括：扩大 SKU
              覆盖宽度（瞄准新产品品类）、提高单设施吞吐（更快机器人和更高密度存储）、加深面向企业客户的软件集成深度。可靠性风险包括规模化后的机器人硬件 MTBF（平均故障间隔时间）、边缘 SKU
              的抓取错误率，以及峰值负载下的软件系统稳定性。Nimble 未发布公开的正常运行时间或准确率数据，这符合私有企业机器人公司的常见做法。
            claimRefs:
              - CE016
              - CE017
              - CE018
              - CE019
          - type: table
            tableRef: TE005
            claimRefs: []
      - number: '5.5'
        title: 信任、安全、安保和合规
        blocks:
          - type: paragraph
            body: >-
              Nimble 的机器人履约系统在实体仓储环境中与人类员工并行运行，因此必须遵守 OSHA 工作场所安全法规和 ANSI/RIA
              机器人安全标准。关键安全系统包括：人机临近区域的速度与力量限制、机器人作业区的物理防护、紧急停止系统，以及共享人机工作流的协同安全规程。Cloud Logistics Platform
              处理客户库存和订单数据，这些数据属于商业敏感信息，需要 SOC 2 Type II 合规或同等数据安全控制。Nimble 尚未公开确认获得 SOC 2 认证。平台处理的任何 PII（例如客户收货地址）都需要符合
              GDPR/CCPA。Nimble 运营的 FedEx 设施内的库存物理安全遵循 FedEx 既有安全规程。Nimble 未公开报告产品召回、安全事件或 OSHA 处罚。鉴于其机器人传感器和 AI
              组件，该技术受出口管制法规约束；目前未公开披露违规或调查。
            claimRefs:
              - CE020
              - CE021
              - CE022
          - type: table
            tableRef: TE004
            claimRefs: []
  - number: 6
    title: 客户情况
    sections:
      - number: '6.1'
        title: 客户基础细分
        blocks:
          - type: paragraph
            body: >-
              Nimble 瞄准定义清晰的客户画像：把仓储和履约外包给第三方物流（3PL）运营商的中端到企业级电商品牌。主要买方画像有两类：希望降低劳动力成本、提高吞吐的 3PL 运营商（付款方 / 运营方），或与 FedEx
              Supply Chain 履约中心签约的品牌（用户 / 付款方）。垂直集中度高：服饰和时尚是最大的可服务细分，因为 SKU 变化多、拣选多变体商品复杂，而这正是 Nimble 的 AI
              抓取强项。健康与美容是第二大垂直，特点是易碎品、受监管包装和高订单量。电子配件和宠物用品是次级垂直，各自有不同处理要求。地域上，Nimble 只覆盖北美，通过 FedEx
              的履约网络在美国和加拿大部署。渠道结构是间接的：多数情况下，Nimble 不直接卖给电商品牌；它在 FedEx Supply Chain 设施内运营，由 3PL 关系决定哪些品牌获得 Nimble
              驱动的履约。典型部署规模为每个设施每天 1,000 到 50,000 单，企业品牌处于更高区间。这种渠道模式让 Nimble 接触既有企业客户，同时限制了它直接经营品牌关系、获取一手留存和满意度数据的能力。
            claimRefs:
              - CU001
              - CU002
              - CU003
              - CU004
              - CU005
          - type: table
            tableRef: TU001
            claimRefs:
              - CU001
