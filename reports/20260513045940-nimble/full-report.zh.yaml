companyProfile:
  summary: >-
    Nimble 是一家总部在 San Francisco 的自动化履约机器人公司，2017 年由 Simon Kalouche（Carnegie Mellon PhD、NASA JPL）创立。公司提供 Autonomous
    Fulfillment Center（AFC）平台，将自研多指机器人手臂、计算机视觉和云端物流软件层组合在一起，并通过机器人即服务（RaaS）模式部署。Nimble 借助与 FedEx 的战略联盟，在北美 130+
    个仓库运营；FedEx 既是 Series C 领投方，也是分销渠道。截至 May 2026，Nimble 已在三轮融资中筹集约 $221M，达到 $1B 独角兽估值，累计完成 15M+ 次对象拣选，每年处理 475 million
    件退货。公司面向希望自动化劳动密集型拣选流程的中端 D2C 品牌和 3PL 运营商。
