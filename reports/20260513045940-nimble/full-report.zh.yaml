    title: 公司概况
    sections:
      - number: '1.1'
        title: 身份与使命
        blocks:
          - type: paragraph
            body: >
              Nimble（原 Nimble Robotics, Inc.）是一家自动化电商履约技术公司，总部位于 California 州 San Francisco。公司由 Simon Kalouche 于 2017
              年创立，核心产品是一款智能通用仓储机器人，能在一个交钥匙机器人履约中心内完成全部关键履约任务：存取、拣选、包装和分拣。全球超过 90%
              的仓库仍然很少使用或完全没有使用机器人，端到端仓储自动化因此拥有广阔可服务市场。Nimble
              给出的使命是「发明自主物流，从仓库地面到消费者家门口的一切」。公司以机器人第三方物流（3PL）服务运营技术，服务由遍布美国的自动化履约中心网络交付，让电商品牌能通过陆运向超过 96% 的美国人口提供免费
              2-day 或更快配送。Nimble 目前处于 Series C 阶段，投后估值 $1 billion，参与快速扩张的仓储自动化和履约即服务市场竞争。
