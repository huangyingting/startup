      - number: '5.2'
        title: 技术架构与运营模式
        blocks:
          - type: paragraph
            body: >-
              Nimble 的技术栈由四个集成层组成。感知与 AI 层包括面向不同 SKU
              类型的目标检测、深度感知和抓取规划计算机视觉；用于抓取异形物品的触觉反馈系统；以及自监督学习流水线，可直接从运营数据持续改进模型，不需要人工标注。运动与控制层负责机械臂路径规划、设施内移动底盘导航和实时安全系统。物流编排层把订单路由进拣选、包装和分拣工作流，并接入
              FedEx shipping APIs，实时选择承运商和生成标签。Cloud Logistics Platform
              是客户可访问的软件层：它提供统一仪表盘，用于订单管理、库存状态、退货处理和分析。关键硬件包括自研多指夹爪机械臂、用于导航的移动底盘、深度相机、RGB 相机和力 /
              扭矩传感器。系统架构按容错设计：单台机器人故障会由设施内其他单元自动补位。Nimble 创始人 Simon Kalouche 拥有 CMU 机器人学博士学位，曾在 CMU 和 NASA JPL
              制作研究机器人，为硬件平台设计提供深厚学术根基。
            claimRefs:
              - CE005
              - CE006
              - CE007
              - CE008
              - CE009
              - CE010
