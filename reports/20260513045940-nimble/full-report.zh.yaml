  - number: 4
    title: 财务情况
    sections:
      - number: '4.1'
        title: 收入模式与变现
        blocks:
          - type: paragraph
            body: >-
              Nimble 的主要收入模式是履约即服务收费结构：电商品牌和 3PL
              运营商按已履约单位或订单付费，而不是投资机器人基础设施。这与仓储自动化中更广泛的机器人即服务（RaaS）变现模式一致。公开分析（SpeedCommerce，2025）显示，Nimble
              收费处于标准履约费率范围内，通常每单 $3-10，具体取决于 SKU 复杂度和数量层级；但没有公开的具体费率表。可识别收入流有四类：（1）按单位或订单收取的履约费，构成主要收入线；（2）通过 FedEx
              联盟收取退货处理费，分享 FedEx 网络每年 475 million 件退货的一部分价值；（3）Nimble 运营的 FedEx 设施内库存仓储费；（4）与 WMS/OMS/TMS 使用绑定的 Cloud
              Logistics Platform 订阅或软件授权费。考虑到 FaaS 的类订阅属性，收入确认很可能按订单或按月收费，但没有 GAAP 披露可验证。混合收入模式与 Locus Robotics（按机器人订阅）和
              RightHand Robotics（按拣选订阅）等可比 RaaS 公司相似；但 Nimble 覆盖完整履约栈，每个客户可捕获的收入点多于单任务机器人提供商。
