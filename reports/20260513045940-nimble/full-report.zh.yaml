  - id: FU001
    title: 客户旅程图
    slug: customer-journey-map
    type: journey-map
    description: 典型客户旅程：电商品牌或 3PL 运营商采用 Nimble 自主履约系统，从认知走到多站点扩张。
    data:
      items:
        - label: 认知
          role: Marketing / Sales
          description: 电商品牌或 3PL 运营商通过 FedEx 转介、行业会议或媒体报道了解 Nimble
        - label: 评估
          role: Operations / Procurement
          description: 评估机器人吞吐、SKU 兼容性、WMS 集成要求和 RaaS 定价模型
        - label: 试点
          role: Operations
          description: 在一个履约中心试点部署；评估期通常为 90–180 天，并设定明确成功指标
        - label: 签约
          role: Finance / Legal
          description: 签订多年期 RaaS 合同；定价通常绑定按件拣选量或按站点收费结构
        - label: 上线
          role: Operations / IT
          description: 完成全面部署并接入仓库管理系统；操作员培训和安全认证完成
        - label: 扩张
          role: Account Management
          description: 在客户或 FedEx 网络内推进到更多履约中心；第二、第三个站点上线
        - label: 续约
          role: Finance / Strategy
          description: 多年期合同到期后续约；下一代机器人型号或更广 SKU 覆盖带来追加销售机会
