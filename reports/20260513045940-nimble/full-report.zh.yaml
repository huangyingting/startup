            figureRef: FI003
            claimRefs: []
      - number: '4.4'
        title: 商业化动作与销售效率
        blocks:
          - type: paragraph
            body: >-
              Nimble 的商业化策略面向中端和企业级电商品牌及 3PL 运营商：这些客户无法证明大额机器人资本开支合理，但需要履约速度和成本效率。获客来自 FedEx 联盟商业网络（显著渠道杠杆）、直销，以及通过
              Cloud Logistics Platform 的 WMS/ERP 连接器实现的技术伙伴集成。相较纯机器人公司，FedEx 联盟提供渠道分销，降低独立获客成本。新设施部署销售周期估计为 3-9 个月，符合涉及
              IT、运营和采购利益相关方的企业履约合同特征。合同期限为多年，与 Nimble 代表客户吸收的资本投资一致；考虑到集成深度，客户流失会让双方都付出高成本。公开数据无法提供 CAC 代理，但 FedEx
              渠道关系意味着其出站销售成本低于没有分销伙伴的可比竞争者。根据 Markets and Markets 和 Fortune Business Insights 的行业估计，Nimble 目标中端板块（每日
              1,000-50,000 单的品牌）代表约 $15-30B 可服务市场。Nimble 自身没有公开客户获取指标、回本周期估计或 LTV/CAC 比率。
            claimRefs:
              - CI017
              - CI018
              - CI019
              - CI020
      - number: '4.5'
        title: 资本充足性与融资评估
        blocks:
          - type: paragraph
            body: >-
              Nimble 已在三轮中融资 $221M：$50M Series A（March 2021，Greenoaks Capital）、$65M Series B（March 2023，Deer Park Road）和
              $106M Series C（October 2024，FedEx 领投）。按估计每月烧钱 $3-8M 计算——基于 200+ 员工、每名员工平均全成本 $250K/year，加上设施和制造成本——Series
              C 可把现金跑道从交割日起延长约 18-30 个月，即大约覆盖至 Q1-Q4 2026。这意味着 Nimble 需要在 late 2026 前融资 Series D 或实现现金流收支平衡。在 $1B Series
              C 估值和 $221M 累计融资下，早期轮次稀释意味着创始人与员工到当前阶段约被稀释 40-60%（该轮次结构下的典型结果）。债务融资未公开披露，但 RaaS 行业常用机器人部署项目融资，可补充股权。对
              FedEx 的战略资本依赖构成集中度风险：FedEx 作为 Series C 领投方参投能对齐激励，但也造成对 FedEx 持续战略支持的依赖。当前资本位置看似足以支撑 18-30
              个月，但如果没有额外融资，不足以支撑漫长增长期，尤其考虑到扩大机器人制造和部署新履约设施的资本强度。
            claimRefs:
              - CI021
              - CI022
              - CI023
              - CI024
              - CI025
              - CI026
