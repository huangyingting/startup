      - number: '1.3'
        title: 董事会与治理
        blocks:
          - type: paragraph
            body: >
              Nimble 董事会聚集了一批资历极深的 AI 与机器人领域人物。Stanford Sequoia 计算机科学教授、Stanford HAI 联席主任、Google Cloud 前 AI 首席科学家
              Fei-Fei Li 自 2021 年 Series A 起担任董事；她也是早期种子投资人和顾问。Boston Dynamics 创始人兼董事长、现代机器人领域标志性人物 Marc Raibert
              也在董事会任职。Google X 与 Waymo 创始人、Udacity 联合创始人 Sebastian Thrun 为董事会带来自主系统经验。Cedar Pine LLC 董事总经理 Stephen
              Weiss（Series B 领投方）代表投资人治理。这样的董事会构成体现了 Nimble 的策略：把深厚学术与产业机器人经验嵌入治理层，降低单纯依赖 CEO 的关键人风险。董事会在 Series C
              期间保持稳定，没有公开披露的董事会层面变化。考虑到 Simon Kalouche 既是唯一创始人又是 CEO，关键人风险仍然偏高。
