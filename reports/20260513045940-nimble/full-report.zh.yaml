      severity. Coverage is partial.
    enumerationScope:
      coverage: partial
      basis: >-
        Derived from publicly available federal regulations (OSHA CFR, BIS EAR 15 CFR 730-774), voluntary industry
        standards (ANSI/RIA R15.06-2012, ISO 10218), EU legislative text (EU AI Act 2024), state privacy statutes
        (California AB 1008, Illinois BIPA), federal court record databases (PACER, Justia), and patent landscape
        analysis by independent IP analysts. Covers all publicly verifiable obligations applicable to a warehouse
        robotics company operating in North America with AI and dual-use components.
    columns:
      - 规则 / 许可 / 案件
      - 司法辖区
      - 状态
      - 可能性
