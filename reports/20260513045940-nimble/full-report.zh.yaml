      - number: '1.5'
        title: 产品与技术
        blocks:
          - type: paragraph
            body: >
              Nimble 的核心产品是一款智能通用仓储机器人：移动操作臂把定制硬件和 AI 软件结合起来，AI 软件用大规模自研数据集做深度模仿学习训练。机器人使用多种可互换夹爪；拣选时，AI
              会为每件独特商品自动选择最合适的夹爪，因此能处理真实电商仓库中的数百万种 SKU。在生产环境中，Nimble 报告拣选准确率为 99.9%。接入既有仓库管理系统（WMS）无需改代码；Nimble 的 AI
              集成层会解读既有人工作业界面，最快可在一天内完成完整生产部署，且不产生集成成本。系统可与 Shopify、NetSuite、Skubana 等主要电商平台集成。硬件之外，Nimble Cloud
              Logistics Platform 负责编排机器人群，并为品牌提供统一的 WMS、OMS、TMS、IMS 和 RMS
              解决方案，交付实时库存可见性和供应链控制。端到端交钥匙系统替代十多种单点履约设备和软件方案。公司声称，相比传统履约替代方案，成本最高可下降 70%。全电动机器人设计也支撑了 Nimble 的可持续定位。
