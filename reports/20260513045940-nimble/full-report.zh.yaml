  - id: FP003
    title: Nimble 护城河与就绪度 KPI 仪表盘
    slug: moat-readiness-kpis
    type: kpi
    description: 基于可得证据的研究员分析，对 Nimble 关键竞争护城河维度按 1–10 分评分（1=弱，10=很强）。
    sourceRefs:
      - SP001
      - SP003
      - SP007
      - SP016
    data:
      items:
        - label: FedEx 网络分发护城河
          value: 9
          description: 130+ 个仓库、每年 475M 件退货、美国 96% 人口 1–2 天陆运覆盖；没有竞争对手能提供可比的集成网络入口
        - label: 数据飞轮强度
          value: 8
          description: 15M+ 次拣选、500K 个 SKU；部署规模超过小型对手后，AI 持续改进，优势扩大
        - label: 技术差异化
          value: 8
          description: 端到端单机器人 GP 系统替代 6+ 个点状方案；Covariant 和 Exotec Skypicker 正在起势，但 FaaS 覆盖范围尚不等同
        - label: 软件平台护城河
          value: 7
          description: 统一 Cloud Logistics Platform 在纯机器人公司中少见；企业 WMS 厂商加入机器人集成会带来风险
        - label: 部署后切换成本
          value: 8
          description: 深度 WMS/OMS 集成、数据锁定、SLA 捆绑和设施专属配置抬高切换摩擦
        - label: 相对竞争对手的资本护城河
          value: 5
          description: $221M 累计融资，相较于 Locus 与 Exotec 的 $438M-$446M；Symbotic 的公开市场资本形成显著不对称
  - id: FI001
    title: Nimble 收入模型桥：从客户活动到毛利润
    slug: revenue-model-bridge
    type: flow
    description: 基于 FaaS 模式架构，展示客户电商活动如何转化为 Nimble 收入流和估计毛利润贡献。
