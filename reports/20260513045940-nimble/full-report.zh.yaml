              技术层面最接近 Nimble 的竞争者是 Covariant、RightHand Robotics 和 Berkshire Grey（2023 年被 SoftBank 收购）。Covariant 已融资约
              $245 million，专注在 3PL 和 CPG 环境中用深度学习抓取不规则、高混合度物品；其模型用多站点运营数据训练，但提供的是 AI 软件层，而非端到端履约栈。RightHand Robotics 融资约
              $126.88 million，在 March 2025 获得 Rockwell Automation 少数股权投资，并在 August 2024 任命 Yaro Tenzer 为 CEO；其 RightPick
