      - number: '7.3'
        title: 运营、质量和网络安全风险
        blocks:
          - type: paragraph
            body: >
              Nimble 的运营风险围绕硬件可靠性、AI 抓取准确率、云平台可用性、网络安全和供应链韧性展开。仓储环境中的机器人手臂承受高强度工况：在温度变化、振动和偶发冲击载荷下连续执行拣放循环。仓储机器人手臂的行业
              MTBF 数据通常在 2,000 到 8,000 小时之间，具体取决于应用强度；如果 Nimble 系统低于这一区间，履约 SLA 罚款和客户流失会直接发生。Nimble 公开声称生产环境拣选准确率为
              99.9%，但边缘 SKU 的长尾——包括异形物品、缠绕软货，或极轻、极重物体——仍是持续准确率挑战。若拣选准确率降到客户约定的 SLA 阈值以下，将触发罚款，极端情况下还会导致站点退役。Cloud
              Logistics Platform 是所有 130 多个站点的编排层；影响该平台的 AWS 或 GCP
              宕机会同时扰乱每个活跃部署的订单管理、库存可见性和机器人调度。多区域云架构可以缓释这一风险，但也引入自身运营复杂度和成本。网络安全方面，仓储运营数据包括实时库存水平、订单模式、品牌特定 SKU
              组合和履约速度指标；对于订单流经 Nimble 系统的品牌客户而言，这些数据具有商业敏感性。数据泄露或未授权访问事件可能让 Nimble 面临违约索赔、州数据泄露通知法下的监管罚款和重大声誉损害。SOC-2
              Type II 认证是 SaaS 供应商服务企业物流客户时的行业标准预期；Nimble 尚未公开确认认证状态。供应链风险主要由 NVIDIA GPU 可得性驱动：没有公开披露替代 AI 计算供应商，意味着
              NVIDIA 配额削减、出口限制或涨价会直接影响机器人生产单位经济性和部署规模。主要来自亚洲制造商的专用传感器增加第二层供应脆弱性，某些品类交期长达 16 到 26 周。
