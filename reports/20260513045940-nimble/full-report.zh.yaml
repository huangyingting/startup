      - number: '7.5'
        title: 财务风险、缓释措施、监测触发器和否决标准
        blocks:
          - type: paragraph
            body: >
              财务和商业模式风险为 Nimble 的整体风险画像增加第五个维度。Nimble 尚未盈利，在 130 多个站点部署资本密集型硬件，且未公开披露收入、毛利率或 EBITDA。公司通过四次融资事件约融资 221
              million 美元；不过，机器人硬件部署的资本密集属性意味着持续现金消耗很大。2023 至 2024 年的高利率提高了 3PL
              运营商的资本成本，可能拖慢新增部署决策管线，并拉长新增站点产生收入的时间。若电商订单量持续放缓，每次拣选吞吐收入会下降，而固定部署成本不会同比例下降，从而压缩单位经济性。可信的风险缓释需要可衡量触发器、预先承诺的响应协议和清晰的投资逻辑打破标准。对于
              FedEx 集中风险，主要缓释措施是在 Q4 2026 前与至少两家额外非 FedEx 物流运营商签署有约束力的商业协议；监测触发器是 Series C 完成后 12 个月内没有签署新合同；投资逻辑打破标准是
              FedEx 终止或大幅缩小合同范围，且手中没有替代渠道。对于监管风险，必须主动审计每个活跃站点的 OSHA 合规，推进 ANSI/RIA 认证，并在任何国际运输前评估 BIS 出口许可证义务。对于 IP
              风险，进入新产品品类前应完成正式自由实施分析；投资逻辑打破标准是禁令阻断核心技术在北美商业化。对于关键人风险，董事会应保留书面 CEO 继任计划，并招聘一名具名副手或
              CTO。对于硬件可靠性，应维持双供应商采购计划和 MTBF 改进路线图。本节缓释与否决标准表，为任何投资持有期内的持续风险监测提供结构化框架。
