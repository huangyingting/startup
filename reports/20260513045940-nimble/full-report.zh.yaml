      - 剩余风险暴露
      - 尽调路径
    rows:
      - - Amazon Robotics 仓库自动化专利组合（800+ 项有效专利）
        - 美国（USPTO）
        - 有效——广泛覆盖输送、分拣、AI 拣选权利要求
        - 中
        - 高
        - 规模化前做 FTO 分析；围绕核心抓取算法提交防御性专利
        - 高——若商业规模下被认定侵权，存在禁令风险
        - 委托独立知识产权律师出具 FTO 意见；审查 Amazon Robotics 700 和 901 专利类别
      - - OSHA 29 CFR 1910.212 / 1910.217——机器防护和机械动力压力机标准
        - 美国（联邦——OSHA）
        - 适用——机器人在 130+ 个设施中靠近人类工人运行
        - 低-中
        - 高
        - 每个站点部署安全协议；ANSI/RIA 符合性计划
        - 中——若安全审计发现缺口，存在被 OSHA 开具违规通知的风险和工伤责任
        - 索取 OSHA 合规审计记录；检查活跃站点的安全联锁
      - - BIS Export Administration Regulations（EAR）15 CFR 730-774——两用 AI
        - 美国（联邦——BIS）
        - 适用——AI 推理硬件具备两用潜力
        - 低
        - 中
        - 聘请 BIS 律师；国际发货前筛查出口许可
        - 中——没有许可会阻断国际扩张；违规会触发处罚
        - 获取正式 BIS 出口管制分类意见；落地出口合规计划
      - - EU AI Act——高风险 AI 系统分类（2024 分阶段实施）
        - 欧盟
        - 2024-2026 分阶段生效；若 Nimble 进入欧盟市场则适用
        - 近期低；3 年视角中
        - 中
        - 跟踪欧盟扩张计划；进入前建立符合性评估能力
        - 近期低；若未建合规计划就推进欧盟扩张，则为中
        - 跟踪 EU AI Act 实施时间表；评估仓库机器人符合性评估要求
      - - ANSI/RIA R15.06-2012——工业机器人安全标准（自愿）
        - 美国（ANSI 行业标准）
        - 自愿——事实上的商业和保险要求
        - 中
        - 中
        - 推动 ANSI/RIA 认证，作为商业差异点和保险要求
        - 中——若不合规，存在合同终止风险和保险覆盖缺口
        - 向 Nimble 确认 ANSI/RIA 认证状态；索取 FedEx 安全审计报告
      - - WARN Act 29 USC 2101——大规模裁员和设施关闭提前通知
        - 美国（联邦）
        - 休眠——仅在大规模裁员或关闭事件发生时触发
        - 低
        - 低
        - 任何重组或站点关闭情形都需法律顾问介入
        - 低——仅在下行情景相关；目前未触发
        - 任何重组情景的法律审查都应纳入 WARN Act 合规
