      - number: '4.2'
        title: 公开牵引信号与规模指标
        blocks:
          - type: paragraph
            body: >-
              Nimble 已披露多项可作为收入代理的运营牵引指标。截至 mid-2026，公开数据包括：已部署设施累计拣选 15 million+ 件对象；处理 500,000+ 个 SKU，显示目录深度可观；以及通过
              FedEx 联盟覆盖 130+ 个北美履约中心。这些运营指标与估计年化收入约 $87 million（CompWorth 估计）一致；该估计假设年单位拣选量为 10-15 million，混合费用为每单位
              $5-8。第三方数据显示，Nimble 到 late 2024 员工数达 200+ 人，符合一家硬件软件混合公司在该收入规模上的特征。Nimble 入选 2024 Deloitte Technology Fast
              500，并曾入选 Inc. 5000，说明收入增长速度有意义。公开资料未确认具体收入 CAGR，但 18 个月内从 Series B 到 Series C、再加上 FedEx
              联盟扩容，显示增长轨迹很快。公司声称相较传统 3PL 可让从点击到交付成本最高下降 40%；若得到验证，将支撑规模化后的定价权和利润率留存。
            claimRefs:
              - CI006
              - CI007
              - CI008
              - CI009
