      - number: '6.5'
        title: 扩张动态和集中风险
        blocks:
          - type: paragraph
            body: >-
              Nimble 的扩张机会集中在 FedEx Supply Chain 网络内，这既给出有吸引力的近期增长路径，也带来显著集中风险。FedEx 在全球运营超过 2,000 个设施，其中约 130+ 个目前使用
              Nimble——仅既有渠道关系内就暗含大量空白空间。先落地再扩张的动作设计得很顺：先在一个 FedEx 设施试点，再跨同一 3PL 网络多站点铺开，这是自然扩张模型，也得到 130
              个站点数据佐证。不过，对单一渠道伙伴近乎完全依赖是实质性风险：FedEx 的战略、财务或运营决策都可能直接限制 Nimble 的增长轨迹。如果 FedEx 缩减 3PL
              业务、转向竞争机器人供应商，或重组伙伴关系，Nimble 短期内通过替代渠道重定向的能力有限。FedEx 投资人关系部分缓释这一风险——财务利益一致让渠道突然终止的可能性较低——但不能消除集中敞口。服饰和健康 /
              美容的垂直集中让 Nimble 暴露于行业特定电商周期；DTC 品牌增长放缓或消费转向线下门店，都可能压低其核心服务垂直的订单量。北美地域集中限制了近期收入多元化。FedEx
              渠道模式部分抵消了企业采购摩擦，绕过典型 6 到 18 个月直接企业销售周期，但也引入自身依赖动态。
