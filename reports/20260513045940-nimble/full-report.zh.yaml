            body: >
              Nimble 已在四次公开披露的融资事件中筹集约 $221 million。March 2021，公司完成 $50 million Series A，由 DNS Capital 和 GSR Ventures
              领投，Accel、Reinvent Capital 参投；该轮还包括知名个人投资人 Fei-Fei Li（种子投资人）和 Andy Rachleff。March 2023，Cedar Pine 领投 $65
              million Series B，DNS Capital、GSR Ventures 和 Breyer Capital 参投；Series B 与 Nimble 机器人 3PL
              服务商业发布同步发生。September 2024，FedEx 单独对 Nimble 作出战略投资，并宣布商业联盟，将 Nimble 技术接入北美 FedEx Fulfillment；FedEx
              公司轮的具体金额未单独披露。October 2024，Nimble 完成由 FedEx 领投、Cedar Pine 联合领投的 $106 million Series C，投后估值升至 $1
              billion。融资资金将用于扩大机器人制造、增加系统部署和持续 R&D。没有公开披露的老股交易、债务融资或更多私募轮次。
