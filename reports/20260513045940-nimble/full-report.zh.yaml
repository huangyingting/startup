      - number: '7.4'
        title: 伙伴、依赖和人员风险
        blocks:
          - type: paragraph
            body: >
              伙伴集中风险是 Nimble 最重要的结构性脆弱点。FedEx Supply Chain 同时是 Nimble 的 Series C
              领投方、主要商业渠道，以及所有已公开活跃部署的运营方。这种三重重叠在仓储机器人行业没有历史先例：单一交易对手控制分销入口、运营场景和相当一部分治理影响力。FedEx 已披露正在 Drive efficiency
              program 下重组 Express 和 Ground 部门，这给所有 FedEx 业务单元的资本优先级带来不确定性。虽然 Nimble 与 FedEx Fulfillment
              的协议看起来运营深度很高，但合同条款，包括最低承诺量、退出条款，以及任何独家或优先安排的期限，都未公开披露。即使是逐步收缩而非立即终止，FedEx 关系流失也会消除 Nimble
              几乎全部已知收入基础，且没有公开宣布的替代渠道。组件依赖风险构成第二层结构性脆弱点：NVIDIA GPU 计算支撑每台已部署机器人的 AI 推理能力，且没有公开披露替代芯片来源。AWS 或 GCP 为 Cloud
              Logistics Platform 提供云托管，形成平台依赖，代表单点故障。亚洲传感器供应商增加供应链复杂度和长交期。人员风险锚定在 Simon Kalouche 作为唯一创始人兼 CEO
              的角色上。Kalouche 是最初的技术愿景提出者、Nimble 深度模仿学习流水线的架构师、主要对外发言人，也是 CEO。公司未公开宣布 CTO，意味着技术权力集中在创始人 CEO 身上。来自
              FAANG、Amazon Robotics 和资金充足机器人初创公司的竞争性人才压力，给高级工程师和 ML 研究员带来留任风险。包括 Fei-Fei Li、Marc Raibert 和 Sebastian
              Thrun 在内的董事会构成，提供了有意义的技术治理深度，部分抵消关键人风险；但如果 CEO 意外离任，它无法完全替代一位具名继任者。人员与执行风险登记表列出每项组织风险及其严重性、可能性和尽调路径。
