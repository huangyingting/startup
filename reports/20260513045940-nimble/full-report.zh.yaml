  - number: 5
    title: 产品与技术
    sections:
      - number: '5.1'
        title: 产品定义与客户工作流集成
        blocks:
          - type: paragraph
            body: >-
              Nimble 的主要产品是 Autonomous Fulfillment Center（AFC），一个交钥匙机器人仓库部署，用来替代传统 3PL 关系。在客户工作流中，Nimble AFC
              处理从库存接收到末端发运之间的每个实体和数字步骤：入库接收与上架、智能存储与库存管理、订单触发拣选、定制包装与贴标、出库分拣和退货处理。它替代了典型的六个以上独立系统组合：输送系统、拣选模块、AS/RS
              存储、WMS 软件、OMS 软件、运输 TMS 和 IMS（库存管理）。客户界面是 Cloud Logistics Platform，一款统一 SaaS 应用，可提供跨全部运营的实时可见性。与
              Shopify、NetSuite 和其他领先电商及 ERP 平台的 API 集成，让客户无需定制集成工作即可连接。目标客户是每日发货 1,000-50,000 单的中端电商品牌，产品类别 SKU
              混合度高，包括服装、健康 / 美妆、消费电子和宠物用品。部署模式不要求客户投入资本：Nimble 在 FedEx 设施内安装系统，并收取按单位计费的履约费。
            claimRefs:
              - CE001
              - CE002
              - CE003
              - CE004
          - type: table
            tableRef: TE001
