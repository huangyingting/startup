        - label: 企业级零售商（自营）
          values:
            - ~18%（估计）
            - 供应链高级副总裁 / CFO
            - CapEx 回本；全渠道一致性
            - 中——站点部署，不是 3PL 模式
        - label: 制造商 / 工业企业
          values:
            - ~10%（估计）
            - 制造 / 运营副总裁
            - 入库、出库自动化
            - 低——超出 Nimble 3PL 范围
        - label: SMB 电商品牌
          values:
            - ~5%（新兴）
