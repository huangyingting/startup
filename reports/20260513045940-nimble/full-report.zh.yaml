  - number: 2
    title: 市场分析
    sections:
      - number: '2.1'
        title: 市场边界与定义
        blocks:
          - type: paragraph
            body: >
              仓储自动化市场覆盖用于机械化或完全自动化核心仓储运营的硬件、软件和服务：入库接收、存取、单件拣选、包装、分拣和出库发运。硬件包括自主移动机器人（AMR）、机器人手臂和操作臂、自动化存储与检索系统（AS/RS）、输送与分拣系统，以及自动导引车（AGV）。软件包括仓库管理系统（WMS）、订单管理、车队编排，以及基于
              AI 的视觉和控制层。服务包括部署、集成、维护，以及订阅式机器人即服务（RaaS）产品。该市场不包括最后一公里配送机器人、自动驾驶卡车，以及未连接到仓储或履约运营的工业工厂自动化。

              Nimble 的服务市场定义更窄：面向电商品牌的全机器人第三方物流（3PL）服务，由 Nimble 运营自动化栈，并按单位或订单收费，而不是销售硬件。相邻的「履约即服务」或「机器人
              3PL」品类是更广义仓储自动化市场的子集，也与 3PL 外包物流市场高度重叠。全球超过 90% 的仓库仍然很少使用或完全没有使用机器人；主流现状替代方案仍是劳动密集型人工履约，可能自营，也可能由人工 3PL
              承担。从现有人工 3PL 切换的理论成本低（没有长期硬件承诺），但实际成本高（SKU 设置、集成和迁移期 SLA 风险）。相邻市场包括最后一公里自动配送和供应链软件平台，但这些都不纳入 Nimble
              的总可用市场（TAM）定义。
