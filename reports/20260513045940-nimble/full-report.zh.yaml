      - number: '8.4'
        title: 可比公司和退出准备度
        blocks:
          - type: paragraph
            body: >-
              Nimble 的可比公司组横跨公开仓储自动化公司、私有机器人独角兽，以及履约物流领域的 M&A 先例。公开可比公司包括 Symbotic（SYM）、AutoStore（AUTO）和 KION
              Group（KGX:GR）。鉴于其 AI 驱动仓储自动化模式，以及类似 FedEx 的战略伙伴集中（Walmart 占 Symbotic 收入 >90%），Symbotic
              是最直接的公开可比公司。AutoStore 2024 年业绩（NOK 6.7B 收入，盈利）代表 Nimble 的理想目标状态。KION Group 是德国物料搬运巨头，收入超过
              €11B，并拥有自动化仓储部门，为战略收购方兴趣和行业倍数提供背景。私有可比公司包括 Exotec（€2B 估值、€100M ARR）、Fabric（仓储微履约，融资 $200M+）和 Berkshire
              Grey（警示案例——SPAC 失败）。M&A 先例包括 Shopify 收购 6 River Systems（$450M，2019 年）和 Amazon 收购 Kiva Systems（$775M，2012
              年），显示战略收购方愿意为已验证的履约机器人技术支付显著溢价。Nimble 的退出准备度中等：FedEx 联盟创造了自然收购方路径，技术已在 130+ 个设施商业验证，但公司尚未盈利，也缺少 IPO
              准备所需的经审计财务。3-5 年内 M&A 退出是最可能的流动性情景，FedEx（通过行使收购选择权）、UPS、Amazon 或 DHL 是主要战略买方。IPO 准备取决于能否实现 $300M+ 收入、正
              EBITDA，以及有利的机器人 IPO 市场条件。
            claimRefs:
              - CV016
