  - id: FI002
    title: 单位经济性桥：从输入到估计单均价值
    slug: unit-economics-bridge
    type: flow
    description: 从关键运营输入到估计单均收入和毛利润的定性流，展示 Nimble 单位经济性的驱动因素。
    sourceRefs:
      - SI023
      - SI006
    data:
      nodes:
        - id: u1
          label: 订单量（件 / 天）
          detail: 核心收入驱动；随客户 GMV 和 Nimble 产能扩张
        - id: u2
          label: SKU 复杂度 / 拣选难度
          detail: 组合更复杂、不规则度更高会推高按件费用；Nimble AI 可处理 500K+ 个 SKU
        - id: u3
          label: 单均综合收入：~$5-8
          detail: 每单履约费 + 仓储分摊 + 退货费 + SaaS 分摊（估计）
        - id: u4
          label: 单均可变 COGS
          detail: 机器人运营成本、设施成本分摊、FedEx 伙伴费用、云基础设施分摊
        - id: u5
          label: 单均毛利润：~$1-3（估计）
          detail: 综合收入扣除可变 COGS；毛利率区间 20-35%
        - id: u6
          label: 经营杠杆（AI 成熟度）
          detail: 数据飞轮随时间降低 COGS：错误更少、停机更少、利用率更高
