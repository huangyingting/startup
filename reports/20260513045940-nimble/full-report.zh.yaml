  - number: 8
    title: 估值
    sections:
      - number: '8.1'
        title: 投资逻辑、反向逻辑和建议
        blocks:
          - type: paragraph
            body: >-
              Nimble 以 $1B Series C
              估值呈现出高把握、高风险的风险投资机会。核心乐观逻辑建立在五根支柱上：（1）机器人即服务（RaaS）商业模式，通过多年客户合同和高切换成本产生按单元计费的经常性履约费用；（2）与 FedEx 的独家战略联盟，让
              Nimble 可使用 130+ 个北美履约中心的不动产基础设施，而无需自己承担租赁义务；（3）自研数据飞轮——已处理 15M+ 次拣选——让 AI
              拣选模型越来越准确，也让新进入者更难以同等成本复制；（4）具备深厚 AI / 机器人履历的领导团队（Simon Kalouche、Fei-Fei Li、Marc Raibert、Sebastian
              Thrun）；（5）估计约 $87M 的年收入运行率，说明 Series C 阶段已有有意义的商业牵引力。主要反向逻辑集中在：（1）未经验证的 11.5x EV/Revenue
              倍数，假设该板块在倍数严重压缩（Locus Robotics、Berkshire Grey）的情况下仍能维持大幅增长；（2）FedEx 战略依赖——如果 FedEx 退出联盟，Nimble
              的设施网络和渠道分销都会消失；（3）未披露经审计财务、单位经济性或毛利率，无法独立作出投资判断；（4）硬件驱动 RaaS 经济性资本密集，需要频繁股权融资。总体建议为观察 / 继续研究：Nimble
              确有战略和技术差异化，但相对公开可比公司的估值溢价，需要先验证财务表现，才支持买入决定。买入触发器包括确认毛利率 ≥30%、年收入增长 ≥40%，以及 FedEx 所有权治理清晰。
