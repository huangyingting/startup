      - number: '8.5'
        title: 投资逻辑打破触发器和最终尽调事项
        blocks:
          - type: paragraph
            body: >-
              三类主要投资逻辑打破事件会把建议从观察 / 继续研究转为回避。第一，FedEx 战略重新校准：任何公开信号显示 FedEx 正在减少、暂停或退出 Nimble
              联盟——无论源于领导层变动、物流网络重组，还是伙伴关系终止——都会移除核心渠道分销优势，并引发严重生存性问题。第二，收入年增长低于 25%：在 11.5x 入场倍数下，增长低于 25%
              时，如果没有倍数扩张，数学上不可能实现正回报，而整个板块的倍数一直在收缩。第三，降价融资：任何后续股权融资估值低于 $1B，都将释放市场重新定价信号，并触发进一步损害 Series C
              投资者回报的反稀释条款。正向看，若确认毛利率 ≥30%，且经审计收入高于 $100M，建议将上调为买入。最关键的未完成尽调事项包括：经审计收入和毛利率数据（需要 NDA）、FedEx
              持股比例和治理权、全部三轮优先股的清算优先权堆叠、设施层面单位经济性（CAC、LTV、回本周期）以及 FedEx 之外的客户收入集中度。与 Series B 和 Series A
              投资者进行投资人对投资人的背调，也会显著提高信心。WSJ、Sifted 和 New York Times 对仓储机器人盈利挑战的报道提供了重要反向背景，必须与 Nimble
              的正面披露一起权衡。反向证据并不推翻投资逻辑，但强化了在投入前拿到经审计财务的必要性。
