          detail: GP 机器人系统在一个自主工作流中完成拣选、打包、贴标
        - id: n5
          label: FedEx 出库发货
          detail: 已履约订单通过 FedEx 1–2 天陆运发出；承运费通常由客户支付
        - id: n6
          label: 退货接收并补货
