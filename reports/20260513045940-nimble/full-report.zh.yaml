  - id: FE001
    title: Nimble 产品架构：技术栈分层
    slug: product-architecture-map
    type: stack
    description: Nimble 的产品架构按四层展开，从硬件底座到面向客户的软件，展示关键组件和层间依赖。
    sourceRefs:
      - SE001
      - SE003
      - SE004
    data:
      layers:
        - label: 客户界面层
          detail: 云物流平台：WMS、OMS、TMS、IMS、退货管理、分析仪表板和 ERP 连接器（Shopify、NetSuite、SAP）
          modules:
            - 订单管理（OMS）
            - 库存管理（IMS）
            - 运输管理（TMS）
            - 退货门户
            - 分析仪表板
            - ERP/API 连接器
        - label: 物流编排层
          detail: 订单路由、拣选任务排序、打包工作流管理、承运商选择（FedEx API）、标签生成和分拣控制
          modules:
            - 订单路由器
            - 拣选调度器
            - 打包工位控制器
            - FedEx 承运商 API
            - 分拣控制器
        - label: AI 与感知层
          detail: 物体检测、抓取规划、自监督学习流水线、SKU 识别和触觉反馈处理
          modules:
            - 计算机视觉（2D/3D）
            - 抓取规划 AI
            - 自监督学习流水线
            - SKU 识别模型
            - 触觉反馈处理器
        - label: 硬件与基础设施层
          detail: 带多指夹爪的 GP 机械臂、移动底座（AMR）、深度相机、RGB 相机、力 / 扭矩传感器、FedEx 设施基础设施
          modules:
            - GP 机械臂 + 夹爪
            - 移动底座（AMR）
            - 深度 / RGB 相机阵列
            - 力 / 扭矩传感器
            - FedEx 设施（物业、公用工程、安保）
