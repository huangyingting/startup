        - label: 3PL 运营商
          values:
            - ~39%
            - 运营副总裁 / CFO
            - 替代人工；每平方英尺吞吐量
            - 直接——Nimble 本身就是机器人 3PL
        - label: 电商 / DTC 品牌
          values:
            - ~28%
