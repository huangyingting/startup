      - number: '3.5'
        title: 定价与商业模式比较
        blocks:
          - type: paragraph
            body: >-
              在仓储机器人领域，商业模式差异化和技术差异化同样重要。Nimble 以履约即服务提供商运营：客户按已履约单位或订单付费，无需前期资本投入；价格按客户定制，未公开发布。Locus Robotics
              使用带季节性可扩缩的 RaaS 模式，客户可随需求波动增加或移除 AMR。Exotec、Symbotic 和 GreyOrange 使用资本密集型安装模式，前期系统成本显著。RightHand Robotics
              针对 RightPick 平台提供按拣选计费的 RaaS 模式。整个竞争集合中，定价不透明是常态：没有主要玩家公开具体单位费率。结构性差异在于，Nimble 模式把全部资本风险转移到 Nimble
              自身，对无法证明大额资本开支合理性的中端品牌更友好；相应负担则落在 Nimble 的资产负债表上，而不是客户的资产负债表上。
