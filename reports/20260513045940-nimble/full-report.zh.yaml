              Nimble 创立以来已拿下多项重要商业和运营里程碑。March 2021 宣布 Series A 时，机器人已部署在多个美国履约中心，并为 Fortune 500 客户每天拣选超过 100,000 件商品。到
              late 2021，Nimble 已在 500,000 个独特 SKU 中拣选超过 15 million 件对象，覆盖服装、电子、健康与美妆、鞋类和消费包装品；具名客户包括 Best Buy、Victoria's
              Secret、Puma、NFI/CalCartage、iHerb、Adore Me 和 Weee!。March 2023，Nimble 同时宣布 Series B 和机器人 3PL
