      - number: '2.6'
        title: 反向证据与规模测算风险
        blocks:
          - type: paragraph
            body: >
              可信分析机构对仓储自动化市场规模的估计差异很大：Precedence Research 预测 2026 年为 $29.3 billion，Mordor Intelligence 预测为 $34.2
              billion；同一自然年、使用重叠的公开与专有数据，差距达到 17%。差异来自市场边界定义不同（仅硬件 vs. 硬件加软件加服务）、地理边界选择和 CAGR 建模假设。两家公司都未公开披露收入数据方法论。对
              Nimble 的 TAM 叙事而言，实际含义是可服务市场大概率在 $29–34 billion 之间——规模可观，但精度不足以支撑单点 TAM 口径。

              另一种怀疑视角是：Nimble 和市场参与者常引用的 90%+ 仓库未自动化统计，把长期理论机会和短期可服务市场混在一起。很多未自动化设施的经济性本就边缘（低量、不规则
              SKU、短租期），因此渗透曲线可能更偏后段。TAWI 引用的 Gartner 供应链自动化预测指出，40% 仓库运营商把劳动力稀缺列为最大单一风险；但同一预测也指出，多数真实 SKU
              组合中的复杂任务仍未实现完全自动化。Nimble 的模仿学习路径正是针对这一张力，但尚未在大规模上解决。分析师预测因此可能高估短期 TAM 渗透，同时低估单件拣选自动化的长期机会；一旦技术突破，价值会复合放大。
            claimRefs:
              - CM009
              - CM041
              - CM042
              - CM043
              - CM044
  - number: 3
    title: 竞争格局
    sections:
      - number: '3.1'
        title: 竞争格局概览
        blocks:
          - type: paragraph
            body: >-
              2026 年的自主履约机器人市场混合了上市既有玩家、资金充足的独角兽和专业 AI 初创公司。Nimble 主要竞争在 AI 驱动单件拣选和履约即服务（FaaS）板块，关键竞争维度是自主化水平、SKU
              覆盖宽度、软件集成深度、部署灵活性和定价模式。竞争集合分为三组：大型平台竞争者 Symbotic、Locus Robotics 和 GreyOrange，靠资本和部署规模竞争；3D 存储与货到人专家 Exotec
              和 Geek+，靠存储密度和吞吐量竞争；AI 单件拣选专家 Covariant、RightHand Robotics 和 Berkshire Grey（现由 SoftBank
              持有），直接比拼机器人手臂智能和高混合度拣选能力。Nimble 定位为唯一端到端全自主履约提供商，再加上 FedEx 分销网络入口，形成差异化品类定义；截至 2026，没有单一对手能完整复制。近期主要竞争压力来自
              Symbotic 通过 Walmart APD 项目扩张微履约、Exotec 的 Skypicker 手臂，以及 Locus Robotics 在全球 350+ 站点持续扩大的 3PL AMR 部署规模。
