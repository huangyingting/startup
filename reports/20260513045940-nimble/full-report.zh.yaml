      - number: '6.4'
        title: 留存、重复使用和客户满意度
        blocks:
          - type: paragraph
            body: >-
              Nimble 的留存和客户满意度数据未公开披露，这符合此阶段私有 B2B 机器人公司的情况。净留存率（NRR）、总留存率（GRR）和流失率在本研究识别的任何新闻稿、访谈或第三方来源中都没有报告。FedEx
              关系提供了重要的结构性留存代理：作为投资方和主要渠道伙伴，FedEx 有很强动力维持并扩大 Nimble 部署关系，说明运营商层面具备韧性。机器人行业 RaaS
              合同的多年期特征——基于可比部署通常为三到五年——也意味着活跃站点近期流失风险相对低。G2、Trustpilot、Gartner Peer Insights 或可比平台上没有发现 NPS 分数、客户满意度指数或
              CSAT 数据；工业机器人系统很少出现在面向消费者的软件评价平台上，这并不意外。2024 年 Deloitte Technology Fast 500
              认可提供了客户牵引力的间接信号，因为收入增长是该榜单的主要标准，意味着客户仍在购买和扩张。早期客户流失信号可能来自 Brandless 案例：关系结束由客户自身经营失败驱动，而非产品不满意。FU004
              中呈现的队列数据，是基于已知 FedEx 关系持续时间和机器人即服务留存行业基准估计而来，不应解读为 Nimble 披露的数据。
