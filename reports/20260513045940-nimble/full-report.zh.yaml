      - number: '7.2'
        title: 监管和法律风险
        blocks:
          - type: paragraph
            body: >
              Nimble 的监管风险集中在四个领域：工作场所安全、出口管制、新兴 AI 监管和知识产权。在工作场所安全方面，OSHA 29 CFR 1910.212（机器防护）和 29 CFR
              1910.217（机械动力压力机）对任何靠近人类员工运行的机器人系统施加强制标准。这些要求直接适用于 Nimble 在 FedEx Supply Chain 设施内、跨 130
              多个活跃站点运行的自主拣选机器人。工业机器人的自愿性 ANSI/RIA R15.06-2012 安全标准，是事实上的行业合规预期。虽然联邦层面没有法律强制，买方和保险商通常要求符合该标准；未达标会让 Nimble
              面临产品责任索赔和合同违约。U.S. Consumer Product Safety Commission 对产品安全拥有广泛权限；如果已部署的 Nimble
              机器人导致工人受伤或财产损失，产品责任敞口可能随之而来。在出口管制方面，Nimble 的 AI 硬件和软件组件，包括基于 NVIDIA GPU 的推理系统，可能受 Bureau of Industry and
              Security 管理的 Export Administration Regulations 约束。军民两用 AI 机器人组件运往某些司法辖区可能需要出口许可证。EU AI Act 将在 2026
              年全面生效，把用于安全关键基础设施的 AI 系统归为高风险；如果 Nimble 进入欧洲市场，可能需要合格评定和注册。在美国国内，如果 Nimble
              的计算机视觉系统捕捉仓库工人的生物识别标识符，California AB 1008 和 Illinois BIPA 可能适用。法律侧，截至研究日期，法院记录数据库中未识别出针对 Nimble
              的公开诉讼。不过，仓储自动化专利格局密集：Amazon Robotics（前称 Kiva Systems）持有大量专利，覆盖基于传送带的订单履约、机器人分拣和 AI 辅助拣选，可能与 Nimble
              架构重叠。尚未公开确认已完成正式的自由实施分析。WARN Act 在 Nimble 被迫进行大规模裁员时施加义务；如果 FedEx 渠道流失迫使裁员，这一要求就会变得相关。
