      - number: '2.4'
        title: 增长驱动因素
        blocks:
          - type: paragraph
            body: >
              三股结构性力量支撑仓储自动化市场在 early 2030s 之前维持高 CAGR。第一，劳动力市场持续失灵：截至 2026，美国仍有超过 800,000 个仓储和物流岗位空缺，78%
              的设施报告招聘明显困难，年流失率平均为 36–45%。自 2020 年以来，仓储工资上涨 22%，入门岗位平均每小时 $19–22；2025 年平均招聘填补时间为 42 天，高于 2021 年的 28
              天。劳动力不稳定把运营成本推高到行业常态之上 15–25%。机器人消除了这一依赖：AMR 辅助运营让单名工人生产率提升 2–3×，降低受伤暴露，并能在数天内扩容到峰值需求，而人工扩编需要 6–8 周。

              第二，电商结构性增长：自 2019 年以来，订单处理量增加 95%；2024 年美国电商年销售额超过 $1 trillion；消费者对 2-day 或更快配送的期待，已成为 DTC
              和平台型市场竞争的基线要求。Nimble 每开一个履约节点，都能扩大 2-day 配送覆盖，而不需要按比例增加人工。

              第三，技术成熟：AI 驱动的通用拣选、SLAM 导航和 RaaS 订阅模式已经汇合，让自动化能在比过去更小的规模上跑通经济性。自动化如今可带来 25–30% 的人工成本下降，准确率接近 99%；2025
              年全球售出 450,000+ 台物流机器人，2019 年为 75,000 台，六年增长 500%。全电动自动化系统的能效和 ESG 合规收益，在受监管市场中进一步形成顺风。
            claimRefs:
              - CM027
              - CM028
              - CM029
              - CM030
              - CM031
