      - number: '4.6'
        title: 财务结论与尽调阻碍
        blocks:
          - type: paragraph
            body: >-
              Nimble 财务画像显示收入质量潜力高（经常性 FaaS 费用、多年合同、高切换成本），但短期资本强度也高。毛利率会受到结构性约束，直到 AI 成熟降低服务成本、设施利用率提高。以 $87M 估计收入对应
              $1B 估值，约为 11x
              EV/Revenue；对高增长机器人即服务公司而言可以解释，但退出时需要实质收入增长来支撑。关键财务尽调阻碍包括：（1）没有经验证收入或毛利率披露；（2）公开来源没有单位经济模型（CAC、LTV、回本周期）；（3）未确认现金头寸或烧钱速度；（4）单次部署制造成本未知；（5）FedEx
              自身贡献的收入与独立客户量之间的比例未知，形成集中度风险，没有 NDA 权限无法量化。对这些缺口的反向解读是：把 CompWorth 的 $87M
              估计作为唯一收入代理，证据较弱；如果公司仍在商业化早期，实际收入可能显著更低；如果 FedEx 合同已经很大，实际收入也可能更高。标准尽调做法要求先取得经审计财务报表、银行流水和客户合同，再得出投资结论。
            claimRefs:
              - CI027
              - CI028
              - CI029
              - CI030
              - CI031
