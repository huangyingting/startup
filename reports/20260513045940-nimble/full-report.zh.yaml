              - CU030
      - number: '6.3'
        title: 具名客户证据和背书质量
        blocks:
          - type: paragraph
            body: >-
              Nimble 的具名客户证据受限于公司间接、经渠道中介的商业模式，以及私有公司身份。FedEx Supply Chain 是文档最清楚的生产部署：新闻稿、投资人沟通和第三方新闻报道确认，FedEx
              既是领投方，也是 Nimble 自主履约系统在 130+ 个站点的活跃运营方。这构成运营商层面真正的生产规模证据，但没有揭示 Nimble 在这些 FedEx
              设施内履约的品牌客户身份。直接面向消费者的生活方式产品品牌 Brandless 曾在早期报道中被提及为客户，但 Brandless 随后经历破产和重组，削弱了该案例的背书质量。除这两个具名实体外，Nimble
              披露其在服饰、健康 / 美容、电子和宠物用品等垂直有业务存在，并暗示每个垂直都有生产部署——但没有公开点名具体品牌。这符合 B2B 机器人即服务公司的常见情况：品牌客户可能不同意公开披露，签约主体也是 3PL
              运营商（FedEx）而非品牌。因此，背书质量在运营商（FedEx）层面最强，在终端品牌客户层面基本没有公开文档。若尽调需要品牌层面背书，就必须在 NDA 保护下访问 Nimble
              客户名单，并由公司安排直接背调电话。
