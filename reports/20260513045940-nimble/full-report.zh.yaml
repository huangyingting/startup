      - number: '8.3'
        title: 乐观、基准和悲观情景分析
        blocks:
          - type: paragraph
            body: >-
              三个结构化情景界定了 $1B 入场估值下的结果范围。乐观情景中，Nimble 借 FedEx 分销伙伴关系，从 130 个北美设施扩展到 2028 年 500+ 个，收入从约 $87M 增至每年
              $450-500M，CAGR 为 40-50%。若退出收入倍数为 5x——在 IPO 或被 FedEx、UPS、DHL 等物流集团战略收购时可能实现——隐含企业价值达到
              $2.25-2.5B。计入三轮优先股带来的稀释和优先股堆叠负担后，普通股从 $1B 入场获得 1.5-2.5x 回报是可能的。关键乐观假设是：FedEx 继续扩张履约网络；AI 成熟度降低服务成本后，毛利率提高到
              35-45%；机器人 IPO 的公开市场情绪在 2027-2028 年恢复。基准情景中，Nimble 到 2028 年收入增至 $240-260M，CAGR 为 30-35%，维持 FedEx 关系，并以
              3-4x 收入（$720M-$1.04B）被战略买方收购。在 $1B 入场下，计入稀释后，该情景的投入资本回报约为 0-1.0x——基本持平或小幅收益。悲观情景中，FedEx
              战略优先级因新领导层或物流周期下行而转移，设施铺开放缓，Nimble 收入停滞在 $90-120M。在资本密集型 RaaS 模式下无法实现盈利，Nimble 面临降价融资或以 1-2x
              收入（$90-240M）困境出售，导致 Series C 投资者资本亏损。概率加权预期回报约为 0.9-1.2x——这更符合观察 / 继续研究建议，而非买入。
