  - number: 7
    title: 风险
    sections:
      - number: '7.1'
        title: 风险登记概览和严重性排序
        blocks:
          - type: paragraph
            body: >
              Nimble 的风险画像横跨六个领域：监管与法律、运营与质量、伙伴与渠道集中、人员与执行、财务与商业模式，以及技术与供应链。在这些领域中，三项风险在近期最可能打破投资逻辑。第一，FedEx
              渠道集中极端：Nimble 约 130 个活跃履约站点中，超过 130 个都流经 FedEx Supply Chain，而 FedEx 同时是领投方、商业运营方和分销守门人。FedEx 已宣布在 Drive
              efficiency program 下重组 Express 和 Ground 部门，给该伙伴的长期承诺带来战略不确定性。如果 FedEx 退出关系，Nimble
              将失去几乎全部收入，且没有披露替代渠道。第二，关键人风险高，因为 Simon Kalouche 是唯一创始人并担任 CEO，且没有公开宣布 CTO 搭档，战略和技术权力集中在一个人身上。第三，NVIDIA GPU
              依赖限制生产扩张：没有公开披露替代 AI 芯片供应商，意味着任何 NVIDIA 供应中断或配额削减都会直接拖慢机器人制造。第二梯队风险包括 OSHA 安全义务、ANSI/RIA 标准、潜在 EU AI Act
              适用性和 BIS 出口管制等监管合规缺口。来自 Amazon Robotics 和现有专利组合的 IP
              诉讼风险也在这一梯队，商业敏感仓储数据带来的网络安全暴露同样如此。本节配套的风险热力图和传导图，把这些定性排序转成按概率、影响和业务风险传播结构化呈现的视图。本节监管与法律风险登记表，为 Nimble
              作为美国仓储机器人公司运营所适用的全部已识别监管和法律敞口提供基础枚举视图。
