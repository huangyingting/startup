      - number: '2.2'
        title: 市场规模——TAM、SAM 与 SOM
        blocks:
          - type: paragraph
            body: >
              分析师对 2026 年全球仓储自动化 TAM 的估计差异明显：Precedence Research 估为 $29.3 billion；Mordor Intelligence 估为 $34.2
              billion；SellersCommerce 的行业综合值约为 $30.0 billion。差异来自不同边界定义：Mordor 纳入更宽的硬件与软件范围，Precedence
              则采用更窄、硬件优先的边界。主要来源对 2026–2031 年 CAGR 的共识为 14–16%，意味着到 2031–2035 年市场规模可达 $65–107
              billion。增长最快的技术子板块是单件拣选机器人，CAGR 为 15.27%（Mordor），与 Nimble 核心技术直接相关。2025 年，移动机器人占 41.36% 市场份额。

              Nimble 的可服务市场（SAM）是北美电商和 3PL 仓储自动化：2025 年北美约占全球市场收入 35.5%（Mordor），意味着 2026 年北美子市场约 $10–12
              billion。在北美，电商与零售板块约占仓储自动化支出的 28%，3PL 提供商占 38.96%；二者合计约 67%，即 Nimble 可服务边界约 $7–8 billion。AMR
              专项市场（MarketsandMarkets）到 2032 年全球将达 $7.07 billion，CAGR 为 14.4%；其中北美 3PL 聚焦子板块在 2025–2026 年约为 $1.6–3.5
              billion。Nimble 当前运营份额（估计收入约 $87M）即便在狭义 SAM 中渗透率也远低于 1%——上行空间显著，但仍处早期。若 Nimble 的机器人运营模式扩展到所有外包履约，全球 3PL
              市场（2026 年 $1.8 trillion）构成长期终极 TAM；但这一上限更偏理论，短期难以触达。
