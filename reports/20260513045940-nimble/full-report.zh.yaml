      - number: '8.2'
        title: 当前估值背景和倍数分析
        blocks:
          - type: paragraph
            body: >-
              Nimble 的 $1B Series C 估值（October 2024）基于 CompWorth $87M 收入估计，隐含约 11.5x EV/Revenue
              倍数。该倍数相对公开可比公司组存在显著溢价。Symbotic（SYM, NASDAQ）报告 FY2025 收入 $1.54B，对应约 $4.7B 市值，隐含 3.1x 收入倍数——较 2022 年峰值
              20-30x 倍数明显压缩。AutoStore（公开上市，Oslo）在约 $620M 年收入上交易于约 5.7x 收入。Locus Robotics 曾在 2022 年以 $3.3B 峰值估值融资，2023 年
              9 月申请 Chapter 11 破产，展示了资本密集型 RaaS 模式未能达到盈亏平衡时的下行风险。Berkshire Grey 于 2021 年通过 SPAC 上市，隐含估值 $2.7B，2023 年末以约
              $0.23 每股私有化。这些警示性可比公司实质影响当前入场价格下的风险校准。Exotec（法国，私有）是最接近的商业模式类比——估值约 €2B、ARR 约 €100M
              的机器人即服务独角兽——提供更乐观的可比参照。Shopify 2019 年以 $450M 收购 6 River Systems，为 AMR / 履约机器人玩家建立了下限 M&A 先例。Nimble
              相对公开可比公司的溢价，部分由更高增长率潜力、FedEx 战略期权价值、包含软件的商业模式，以及私有市场非流动性溢价支撑。不过，在 $1B 入场价下，要作为财务回报站得住脚，需要 40%+ 持续增长。
            claimRefs:
