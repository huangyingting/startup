      - number: '1.2'
        title: 创立故事与管理团队
        blocks:
          - type: paragraph
            body: >
              Simon Kalouche 2017 年离开 Stanford AI Lab 的 PhD 项目后创立 Nimble；当时他在 Fei-Fei Li 教授指导下研究深度模仿学习。Kalouche 拥有 Ohio
              State University 荣誉机械工程 B.S.（2014）和 Carnegie Mellon University 机器人学 M.S.（2014–2016）。在 Carnegie
              Mellon，他开发了首批低成本准直驱（QDD）执行器；MIT Mini Cheetah、Boston Dynamics 平台等领先机器人后来广泛采用这类执行器。在
              Stanford，他专注把深度模仿学习用于机器人操作任务。看到大规模自动化仓库拣选的商业机会后，他在 2017 年离开 Stanford，创立 Nimble，将深度模仿学习商业化到电商物流。截至
              2025，Nimble 管理团队包括 CFO 兼 COO Jennifer Johnston、运营 VP Jordan Dawson、履约运营 VP Melissa Curry、硬件 VP Matthew
              Shekels、企业销售 VP Jonathan Briggs，以及计算机视觉负责人 Siva Chaitanya Mynepalli。Kalouche 仍担任 CEO，也是唯一创始人。公司员工约 200+
              人；Series A 时约 25 人，early 2023 增至约 100 人，此后继续扩张。
