      - number: '2.3'
        title: 买方分层与预算所有者
        blocks:
          - type: paragraph
            body: >
              仓储自动化支出集中在三类主要买方。第三方物流（3PL）运营商是最大单一群体，约占 2025 年仓储自动化市场支出的 39%（Mordor）。3PL 有强采用动机：他们要服务多个客户、处理多样
              SKU，反复面对用工短缺，并在吞吐量和成本上竞争。Nimble 自身也以机器人 3PL 提供商身份在该板块运营。第二大板块是电商和 DTC 品牌，它们要么运营自有履约中心，要么选择自动化 3PL
              伙伴；该板块占仓储自动化支出 28%。企业零售商（自营履约）构成第三类，直接投资自有仓储自动化，以减少对人工的依赖并兑现当日达承诺。制造商和工业公司构成规模较小的次级买方基础。

              预算归属因板块而异。3PL 运营商部署时，运营商承担 CapEx 或 RaaS 成本，再把单位经济模型传导给客户。品牌直连部署时，运营和供应链高管拥有预算，超过 $1–2 million 的投资通常需要 CFO
              批准。RaaS 和订阅式机器人把 CapEx 转为 OpEx，正在降低预算授权门槛，并打开 SMB 板块；这对 Nimble「无前期硬件成本」服务模式是结构性顺风。中型仓库（2025 年收入的
              36.78%）和小型仓库（CAGR 15.19%，增长最快）是经济性改善后新出现的采用边界。
            claimRefs:
              - CM021
