  evidenceGaps:
  - type: private-evidence-only
    severity: blocking
    topic: audited-revenue-gross-margin
    missingEvidence: Audited income statement confirming annual revenue, gross margin percentage, and COGS breakdown for FY2024
      and FY2025.
    whyItMatters: >-
      Without audited financials, the $87M revenue estimate is unverifiable and the 11.5x entry multiple cannot be independently
      underwritten; all scenario analysis and recommendation confidence are materially compromised.
    diligencePath: Request NDA data room access; standard Series C due diligence right includes audited financial statements.
    relatedQuestionRefs:
    - QV031
  - type: private-evidence-only
    severity: material
    topic: fedex-ownership-governance
    missingEvidence: >-
      FedEx's exact ownership percentage in Nimble, board representation, anti-dilution rights, and any right-of-first-refusal
      for acquisition.
    whyItMatters: >-
      FedEx's governance position determines whether other strategic acquirers can bid competitively; a first-refusal right
      could limit exit optionality and depress acquisition price.
    diligencePath: >-
      Request cap table and investor rights agreement under NDA; cross-reference SEC Form D filings for any public disclosures.
    relatedQuestionRefs:
    - QV021
  - type: private-evidence-only
    severity: material
    topic: liquidation-preference-cap-table
    missingEvidence: Liquidation preference terms, participation rights, and anti-dilution provisions for all three preferred
      rounds.
    whyItMatters: >-
      A 2-3x participating preference stack across $221M raised could absorb all proceeds in a sub-$1.5B exit, leaving common
      equity and later-round investors with minimal returns even in the base scenario.
    diligencePath: Request waterfall analysis model and certificate of incorporation under NDA.
    relatedQuestionRefs:
    - QV022
  - type: enumeration-incomplete
    severity: material
    topic: comparable-valuation-table-coverage
    missingEvidence: >-
      Private company valuation data for Fabric, Berkshire Grey exact financials, and 6 River Systems revenue at acquisition
      are not publicly available; the comparable set excludes privately funded companies with non-disclosed financials.
    whyItMatters: >-
      A more complete comparable set with verified revenue multiples would tighten the multiple range used in scenario analysis
      and reduce uncertainty in the base-case valuation.
    diligencePath: >-
      Supplement with CB Insights, Pitchbook, or Capital IQ comparable analysis under subscription access; interview sector
      analysts at Bloomberg Intelligence or S&P Global.
    relatedTableRefs:
    - TV004
    relatedQuestionRefs:
    - QV031
  - type: missing-source
    severity: material
    topic: unit-economics-facility-level
    missingEvidence: >-
      No public data on Nimble's facility-level unit economics: CAC per customer, LTV per facility, payback period, or per-pick
      contribution margin.
    whyItMatters: >-
      Unit economics at the facility level are the primary determinant of whether gross margins can improve to the 35-45%
      range required for the bull scenario; without them, the path to profitability is speculative.
    diligencePath: >-
      Request management presentation on facility-level P&L; conduct reference checks with Nimble facility managers or customers.
    relatedQuestionRefs:
    - QV031
