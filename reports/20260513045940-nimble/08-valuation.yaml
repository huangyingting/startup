- id: TV005
  title: Thesis-break and kill triggers table
  slug: thesis-break-and-kill-triggers-table
  description: >-
    Specific triggers that would break the Nimble investment thesis, with threshold, transmission mechanism, and recommended
    action.
  columns:
  - Trigger
  - Threshold / Signal
  - Thesis Impact
  - Timeline
  - Recommended Action
  rows:
  - - FedEx alliance reduction or exit
    - Public announcement of facility ramp pause, contract restructuring, or partnership termination
    - Destroys channel distribution moat; 130+ facilities become operationally at-risk
    - Immediate on signal
    - Sell / exit; thesis no longer holds at any reasonable valuation
  - - Revenue growth below threshold
    - Confirmed YoY revenue growth <25% for two consecutive periods
    - Makes 11.5x entry multiple indefensible on financial basis alone
    - Next financing round or data access
    - Downgrade to avoid; request full financials before any additional commitment
  - - Down-round or flat-round financing
    - Subsequent equity raise at valuation ≤$1B
    - Market signal of missed milestones; triggers anti-dilution and erodes common equity value
    - Next 12-24 months
    - Treat as severe adverse signal; assess cap table restructuring impact
  - - Gross margin confirmed below 20%
    - Audited GM <20% at Series C scale ($87M+ revenue)
    - Unit economics incompatible with profitability at realistic scale; mirrors Locus trajectory
    - On NDA or data access
    - Avoid; capital intensity without margin improvement leads to capital trap
  - - Key leadership departure
    - CEO Simon Kalouche departure without planned succession
    - Single-founder key-person risk materializes; institutional knowledge concentrated
    - Ongoing monitoring
    - Flag as material risk; request succession plan and retention agreements
  notes: >-
    Triggers are based on inferred model sensitivities and sector comp analysis. Specific contractual terms with FedEx are
    not publicly available, which increases uncertainty in trigger identification.
