  - id: partner-dependency-people-risks
    title: Partner, Dependency, and People Risks
    contentRequirementIndex: 3
    body: >
      Partner concentration risk is Nimble's single most consequential structural
      vulnerability. FedEx Supply Chain is simultaneously Nimble's lead Series C
      investor, its primary commercial channel, and the operator of all publicly
      disclosed active deployments. This triple-overlap creates a concentration
      scenario with no historical analog in the warehouse robotics industry: a
      single counterparty controls distribution access, operational context, and
      a significant slice of governance influence. FedEx has disclosed an ongoing
      restructuring of its Express and Ground divisions under the Drive efficiency
      program, which introduced uncertainty about capital priorities across all
      FedEx business units. While Nimble's agreement with FedEx Fulfillment appears
      operationally deep, the contractual terms including minimum commitment volumes,
      exit provisions, and the duration of any exclusive or preferred arrangement
      have not been publicly disclosed. Loss of the FedEx relationship, even through
      a gradual wind-down rather than immediate termination, would eliminate
      substantially all of Nimble's known revenue base with no publicly announced
      replacement channel. Component dependency risk adds a second layer of
      structural vulnerability: NVIDIA GPU compute underpins the AI inference
      capability of every deployed robot, and no alternative chip source has been
      publicly disclosed. AWS or GCP serves as the cloud host for the Cloud
      Logistics Platform, creating a platform dependency that represents a single
      point of failure. Asian sensor vendors add supply chain complexity and long
      lead times. People risk is anchored in Simon Kalouche's role as sole founder
      and CEO. Kalouche is the original technical visionary, the architect of
      Nimble's deep imitation learning pipeline, the primary external spokesperson,
      and the CEO. No CTO has been publicly announced, meaning that technical
      authority is concentrated in the founder-CEO role. Competitive talent pressure
      from FAANG, Amazon Robotics, and well-funded robotics startups creates
      retention risk at the senior engineer and ML researcher level. The board's
      composition including Fei-Fei Li, Marc Raibert, and Sebastian Thrun provides
      meaningful technical governance depth that partially offsets key-person risk,
      but cannot fully substitute for a named successor in the event of an unplanned
      CEO departure. The people and execution risk register details each organizational
      risk with severity, likelihood, and diligence path.
