  evidenceGaps:
    - type: access-blocked
      severity: material
      topic: regulatory-compliance-audit-history
      missingEvidence: >-
        Nimble's internal OSHA inspection history, SOC-2 Type II audit reports,
        UL certification status, and any investor-disclosed material risk factors
        are not publicly available. No safety incident logs, compliance
        certifications, or board-level risk disclosures have been found in public
        sources as of the research date.
      whyItMatters: >-
        Without internal compliance documentation, it is impossible to verify
        whether Nimble has received regulatory citations, audit findings, or
        undisclosed material risk disclosures that could materially increase
        the risk profile beyond public reporting.
      diligencePath: >-
        Request OSHA compliance audit records, safety incident logs, SOC-2 Type
        II reports, UL certification documentation, and board-level risk disclosure
        summaries from Nimble management in formal due diligence.
      relatedQuestionRefs:
        - QR003
        - QR007
        - QR017

    - type: private-evidence-only
      severity: material
      topic: ip-freedom-to-operate-analysis
      missingEvidence: >-
        No public freedom-to-operate analysis has been identified for Nimble's
        AI grasping technology relative to the Amazon Robotics, Boston Dynamics,
        and major OEM patent portfolios. Nimble's defensive patent portfolio size
        and composition are not publicly disclosed.
      whyItMatters: >-
        Undisclosed FTO gaps could result in patent infringement claims or
        injunctions that block Nimble's core technology commercialization in
        North America, constituting a potential thesis-break scenario.
      diligencePath: >-
        Engage independent IP counsel to conduct FTO analysis; request Nimble's
        defensive patent portfolio inventory and any existing FTO opinion letters;
        review Amazon Robotics patent classes 700 and 901 for overlap assessment.
      relatedQuestionRefs:
        - QR012

    - type: private-evidence-only
      severity: blocking
      topic: fedex-contract-and-revenue-concentration
      missingEvidence: >-
        The FedEx commercial agreement's specific terms including minimum volume
        commitments, exclusivity provisions, exit clauses, and pricing are not
        publicly disclosed. The precise percentage of Nimble's revenue attributable
        to FedEx versus other channels is unknown.
      whyItMatters: >-
        Revenue concentration and contractual protection against partner withdrawal
        are the two most critical financial risk factors; quantifying both is
        essential for assessing the magnitude and probability of the FedEx
        concentration risk.
      diligencePath: >-
        Review FedEx commercial contract in due diligence; request revenue
        breakdown by channel, minimum commitment data, and FedEx exit provisions
        from Nimble CFO and general counsel.
      relatedQuestionRefs:
        - QR021
        - QR022
      relatedTableRefs:
        - TR003

    - type: enumeration-incomplete
      severity: minor
      topic: regulatory-legal-risk-register-completeness
      missingEvidence: >-
        The regulatory and legal risk register covers publicly documented
        obligations and publicly available regulatory guidance. Private regulatory
        correspondence, confidential legal settlements, undisclosed enforcement
        actions, and non-public IP dispute communications are not captured in
        the register.
      whyItMatters: >-
        Any undisclosed enforcement actions, private regulatory warnings, or
        confidential legal disputes would materially increase the risk profile
        beyond what the public register reflects.
      diligencePath: >-
        Request management representations and warranties regarding regulatory
        citations and pending legal proceedings; request complete litigation hold
        disclosures and any pending regulatory inquiries in due diligence.
      relatedQuestionRefs:
        - QR009
      relatedTableRefs:
        - TR001
