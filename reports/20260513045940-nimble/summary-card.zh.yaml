summary:
  headline: Nimble 是一个有吸引力的仓储机器人投资标的，支点是 $1B Series C 估值、FedEx 规模分销和自监督 AI 护城河；但短期风险主要来自极高的 FedEx 集中度，以及尚未验证的收入 / 利润率说法。
