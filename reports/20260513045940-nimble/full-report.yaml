              alliance, capturing a share of the 475 million returns annually in the FedEx network; (3) warehouse
              storage fees for inventory held within Nimble-operated FedEx facilities; and (4) Cloud Logistics Platform
              subscription or software licensing fees tied to WMS/OMS/TMS usage. Revenue recognition is likely on a
              per-order or monthly fee basis given the subscription-like nature of FaaS, but no GAAP disclosure is
              available for verification. The blended revenue model mirrors comparable RaaS companies such as Locus
              Robotics (per-robot subscription) and RightHand Robotics (per-pick subscription), though Nimble's
