        title: Product Definition and Customer Workflow Integration
        blocks:
          - type: paragraph
            body: >-
              Nimble's primary product is the Autonomous Fulfillment Center (AFC)—a turnkey robotics-enabled warehouse
              deployment that replaces a traditional 3PL relationship. In a customer's workflow, the Nimble AFC handles
              every physical and digital step between inventory receipt and final-mile shipment: inbound receiving and
              put-away, intelligent storage and inventory management, order-triggered picking, custom packing and
              labeling, outbound sortation, and returns processing. This replaces a typical stack of six or more
              separate systems: conveyor systems, pick modules, AS/RS storage, WMS software, OMS software, shipping TMS,
              and IMS (inventory management). The customer interface is the Cloud Logistics Platform, a unified SaaS
              application that provides real-time visibility across all operations. API integrations with Shopify,
              NetSuite, and other leading e-commerce and ERP platforms allow customers to connect without custom
              integration work. Target customers are mid-market e-commerce brands shipping 1,000-50,000 orders per day
              from product categories with high SKU mix including apparel, health/beauty, consumer electronics, and pet
              products. The deployment model requires no customer capital: Nimble installs the system in a FedEx
              facility and charges a per-unit fulfillment fee.
