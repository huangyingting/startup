      - number: '8.5'
        title: Thesis-Break Triggers and Final Diligence Asks
        blocks:
          - type: paragraph
            body: >-
              Three primary thesis-break events would shift the recommendation from track/research-more to avoid. First,
              FedEx strategic realignment: any public signal that FedEx is reducing, pausing, or exiting its Nimble
              alliance—whether through leadership change, logistics network restructuring, or partnership
              termination—would remove the primary channel distribution advantage and raise serious viability questions.
              Second, revenue growth below 25% per year: given the 11.5x entry multiple, growth below 25% makes it
              mathematically impossible to achieve a positive return without multiple expansion, which has been
              contracting across the sector. Third, a down-round: any subsequent equity raise below $1B valuation would
              signal market reassessment and trigger anti-dilution provisions that further impair Series C investor
              returns. On the positive side, a confirmed gross margin ≥30% with audited revenue above $100M would
              upgrade the recommendation to buy. The most critical outstanding diligence items are: audited revenue and
              gross margin data (NDA required), FedEx ownership stake and governance rights, liquidation preference
              stack across all three preferred rounds, unit economics at the facility level (CAC, LTV, payback), and
              customer revenue concentration outside FedEx. Investor-to-investor reference checks with Series B and
              Series A investors would also significantly improve confidence. WSJ, Sifted, and New York Times coverage
              of warehouse robotics profitability challenges provide important adverse context that must be weighed
              against Nimble's positive disclosures. The adverse evidence does not invalidate the thesis but reinforces
              the need for audited financials before committing.
