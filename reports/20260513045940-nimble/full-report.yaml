      - number: '1.2'
        title: Founding Story and Leadership Team
        blocks:
          - type: paragraph
            body: >
              Simon Kalouche founded Nimble in 2017 after leaving a PhD program at Stanford's AI Lab, where he was
              studying deep imitation learning under Professor Fei-Fei Li. Kalouche holds a B.S. in Honors Mechanical
              Engineering from Ohio State University (2014) and an M.S. in Robotics from Carnegie Mellon University
              (2014–2016), where he developed the first low-cost quasi-direct-drive (QDD) actuators—now widely used in
              leading robots including MIT's Mini Cheetah and Boston Dynamics platforms. At Stanford, he focused on
              applying deep imitation learning to robotic manipulation tasks. Recognizing the commercial opportunity to
              automate warehouse picking at scale, he departed Stanford in 2017 to found Nimble and commercialize deep
              imitation learning for e-commerce logistics. As of 2025, Nimble's executive team includes Jennifer
              Johnston as CFO and COO; Jordan Dawson as VP of Operations; Melissa Curry as VP of Fulfillment Operations;
              Matthew Shekels as VP of Hardware; Jonathan Briggs as VP of Enterprise Sales; and Siva Chaitanya Mynepalli
              as Head of Computer Vision. Kalouche retains the CEO role and is the sole founder. The company employs
              approximately 200+ people, having grown from 25 at the time of the Series A in 2021 to approximately 100
              by early 2023 and continuing to expand.
