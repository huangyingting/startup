      - number: '2.2'
        title: Market Sizing — TAM, SAM, and SOM
        blocks:
          - type: paragraph
            body: >
              Analyst estimates for the global warehouse automation TAM in 2026 diverge meaningfully: Precedence
              Research sizes it at $29.3 billion; Mordor Intelligence at $34.2 billion; and SellersCommerce's industry
              composite at approximately $30.0 billion. These estimates reflect different perimeter definitions—Mordor
              includes a broader hardware-and-software envelope while Precedence applies a narrower hardware-first
              boundary. Across all major sources, the CAGR consensus for the 2026–2031 period is 14–16%, implying a
              market of $65–107 billion by 2031–2035. The fastest-growing technology sub-segment is piece-picking robots
              at a 15.27% CAGR (Mordor), directly relevant to Nimble's core technology. Mobile robots held 41.36% of
              market share in 2025.

              The serviceable addressable market (SAM) for Nimble is North American e-commerce and 3PL warehouse
              automation: North America held approximately 35.5% of global market revenue in 2025 (Mordor), implying a
              2026 North American sub-market of $10–12 billion. Within North America, the e-commerce and retail segment
              represented approximately 28% of warehouse automation spending, and 3PL providers held 38.96%—together
              ~67%, or approximately $7–8 billion, of Nimble's serviceable perimeter. The AMR-specific market
              (MarketsandMarkets) will reach $7.07 billion globally by 2032 at a 14.4% CAGR, with the North American
              3PL-focused sub-segment at approximately $1.6–3.5 billion in 2025–2026. Nimble's current share of
              operations (estimated ~$87M revenue) represents well under 1% penetration of even the narrow
              SAM—meaningful headroom but early stage. The global 3PL market at $1.8 trillion (2026) represents the
              ultimate long-run TAM if Nimble's robotic operating model expands across all outsourced fulfillment,
              though this ceiling is theoretical rather than near-term accessible.
