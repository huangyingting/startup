  - number: 7
    title: Risks
    sections:
      - number: '7.1'
        title: Risk Register Overview and Severity Ranking
        blocks:
          - type: paragraph
            body: >
              Nimble's risk profile spans six domains: regulatory and legal, operational and quality, partner and
              channel concentration, people and execution, financial and business model, and technology and supply
              chain. Across these domains, three risks stand out as potentially thesis-breaking in the near term. First,
              FedEx channel concentration is extreme: more than 130 of Nimble's approximately 130 active fulfillment
              sites flow through FedEx Supply Chain, which is simultaneously lead investor, commercial operator, and
              distribution gatekeeper. FedEx's announced restructuring of its Express and Ground divisions under the
              Drive efficiency program introduces strategic uncertainty about the partner's long-term commitment. If
              FedEx were to exit the relationship, Nimble would lose substantially all of its revenue with no disclosed
              alternative channel. Second, key-person risk is elevated because Simon Kalouche is the sole founder and
              serves as CEO without a publicly announced CTO counterpart, concentrating both strategic and technical
              authority in one individual. Third, the NVIDIA GPU dependency constrains production scaling: no publicly
              disclosed alternative AI chip supplier means that any NVIDIA supply disruption or allocation cut would
              directly slow robot manufacturing. At the second tier sit regulatory compliance gaps including OSHA safety
              obligations, ANSI/RIA standards, potential EU AI Act applicability, and BIS export controls. IP litigation
              risk from the Amazon Robotics and incumbent patent portfolio also occupies this tier, along with
              cybersecurity exposure from the commercially sensitive warehouse data Nimble's platform processes. The
              risk heatmap and transmission map that accompany this section translate these qualitative rankings into a
              structured view of probability, impact, and risk propagation across the business. The regulatory and legal
              risk register in this section provides the foundational enumerated view of all identified regulatory and
              legal exposures applicable to Nimble's operations as a warehouse robotics company in the United States.
            claimRefs:
              - CR026
              - CR027
              - CR028
              - CR032
              - CR020
