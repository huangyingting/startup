  - number: 2
    title: Market Analysis
    sections:
      - number: '2.1'
        title: Market Boundary and Definition
        blocks:
          - type: paragraph
            body: >
              The warehouse automation market encompasses hardware, software, and services deployed to mechanize or
              fully automate core warehouse operations: inbound receiving, storage and retrieval, piece-picking,
              packing, sortation, and outbound shipping. Hardware includes autonomous mobile robots (AMRs), robotic arms
              and manipulators, automated storage and retrieval systems (AS/RS), conveyor and sortation systems, and
              guided vehicles (AGVs). Software includes warehouse management systems (WMS), order management, fleet
              orchestration, and AI-based vision and control layers. Services include deployment, integration,
              maintenance, and subscription-based robotics-as-a-service (RaaS) offerings. The market excludes last-mile
              delivery robotics, autonomous trucking, and industrial factory automation not connected to warehouse or
              fulfillment operations.

              Nimble's served market is more narrowly defined: fully robotic third-party logistics (3PL) services for
              e-commerce brands, where Nimble operates the automation stack and charges on a per-unit or per-order basis
              rather than selling hardware. The adjacent "fulfillment-as-a-service" or "robotic 3PL" category is a
              subset of the broader warehouse automation market and overlaps significantly with the 3PL outsourced
              logistics market. More than 90% of warehouses globally still operate with minimal or no robotics—the
              dominant status-quo substitute is manual labor-intensive fulfillment, either in-house or via human-staffed
              3PLs. Switching cost from incumbent manual 3PLs is low in theory (no long-term hardware commitment) but
              high in practice (SKU setup, integration, and SLA risk during transition). Adjacent markets include
              last-mile autonomous delivery and supply-chain software platforms, but these are excluded from Nimble's
              TAM definition.
