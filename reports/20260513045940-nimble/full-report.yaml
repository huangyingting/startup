      - number: '2.6'
        title: Adverse Evidence and Sizing Risks
        blocks:
          - type: paragraph
            body: >
              Market sizing estimates for warehouse automation diverge significantly among credible analyst firms:
              Precedence Research projects $29.3 billion for 2026 while Mordor Intelligence projects $34.2 billion—a 17%
              spread for the same calendar year, using overlapping public and proprietary data. This divergence stems
              from differing market perimeter definitions (hardware-only vs. hardware-plus-software-plus-services),
              geographic boundary choices, and CAGR modeling assumptions. Neither firm discloses its revenue data
              methodology publicly. The practical implication for Nimble's TAM framing is that the addressable market is
              likely between $29 and $34 billion—material but not precise enough for a single-point TAM claim.

              A second skeptical lens: the 90%+ unautomated warehouse statistic frequently cited by Nimble and market
              participants conflates long-run theoretical opportunity with near-term addressable market. Many
              unautomated facilities are economically marginal (low volume, irregular SKUs, short lease terms), which
              means the penetration curve is likely back-loaded. The Gartner supply chain automation forecast cited by
              TAWI flags that 40% of warehouse operators rank labor scarcity as their single biggest risk, but also that
              full automation of complex tasks remains technically unsolved for most real-world SKU mixes—a tension
              Nimble's imitation-learning approach specifically targets but has not yet resolved at mass scale. Analyst
              forecasts may therefore overstate near-term TAM penetration while underestimating the long-run opportunity
              in piece-picking automation, where technical breakthroughs compound value.
