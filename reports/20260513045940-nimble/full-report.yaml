      - number: '8.4'
        title: Comparable Companies and Exit Readiness
        blocks:
          - type: paragraph
            body: >-
              The comparable set for Nimble spans public warehouse automation companies, private robotics unicorns, and
              M&A precedents in the fulfillment logistics sector. Public comps include Symbotic (SYM), AutoStore (AUTO),
              and KION Group (KGX:GR). Symbotic is the most direct public comp given its AI-driven warehouse automation
              model and FedEx-like strategic partner concentration (Walmart represents >90% of Symbotic's revenue).
              AutoStore's 2024 results (NOK 6.7B revenue, profitable) represent the aspirational target state for
              Nimble. KION Group, the German material handling giant with €11B+ revenue and automated warehousing
              division, provides an industry context for strategic acquirer interest and sector multiples. Private comps
              include Exotec (€2B valuation, €100M ARR), Fabric (warehouse micro-fulfillment, $200M+ raised), and
              Berkshire Grey (cautionary—SPAC failure). M&A precedents include the 6 River Systems acquisition by
              Shopify ($450M, 2019) and Kiva Systems acquisition by Amazon ($775M, 2012), demonstrating strategic
              acquirer willingness to pay substantial premiums for proven fulfillment robotics technology. Nimble's exit
              readiness is moderate: the FedEx alliance creates a natural acquirer path, the technology is commercially
              validated at 130+ facilities, but the company is pre-profitable and lacks audited financials needed for
              IPO readiness. An M&A exit within 3-5 years is the most likely liquidity scenario, with FedEx (through
              exercising an acquisition option), UPS, Amazon, or DHL as primary strategic buyers. IPO readiness is
              conditional on achieving $300M+ revenue, positive EBITDA, and favorable robotics IPO market conditions.
            claimRefs:
