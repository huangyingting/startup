      - number: '5.2'
        title: Technology Architecture and Operating Model
        blocks:
          - type: paragraph
            body: >-
              Nimble's technology stack consists of four integrated layers. The perception and AI layer includes
              computer vision for object detection, depth sensing, and grasp planning across diverse SKU types; a
              tactile feedback system for grasping irregularly shaped items; and a self-supervised learning pipeline
              that improves models continuously from operational data without requiring human annotation. The motion and
              control layer handles robotic arm path planning, mobile base navigation within the facility, and real-time
              safety systems. The logistics orchestration layer routes orders through picking, packing, and sortation
              workflows, integrating with FedEx shipping APIs for real-time carrier selection and label generation. The
              Cloud Logistics Platform is the software layer accessible by customers: it provides a unified dashboard
              for order management, inventory status, returns processing, and analytics. Key hardware components include
              a proprietary robotic arm with multi-finger gripper, a mobile base for navigation, depth cameras, RGB
              cameras, and force/torque sensors. The system architecture is designed to be fault-tolerant: individual
              robot failures are automatically compensated by other units in the facility. Simon Kalouche, Nimble's
              founder, holds a CMU robotics PhD and previously built research robots at CMU and NASA JPL, providing deep
              academic roots for the hardware platform design.
