      - number: '2.4'
        title: Growth Drivers
        blocks:
          - type: paragraph
            body: >
              Three structural forces underpin the warehouse automation market's high sustained CAGR through the early
              2030s. First, persistent labor market dysfunction: as of 2026, over 800,000 warehouse and logistics jobs
              remain unfilled in the United States, 78% of facilities report significant hiring difficulty, and annual
              turnover averages 36–45%. Warehouse wages rose 22% since 2020 to an entry-level average of $19–22 per
              hour, and the average job posting took 42 days to fill in 2025, up from 28 in 2021. Workforce instability
              drives operating costs 15–25% above industry norms. Robots eliminate this dependency: AMR-assisted
              operations achieve 2–3× productivity per worker, reduce injury exposure, and scale to peak demand in days
              rather than the 6–8 weeks required for human workforce ramp.

              Second, e-commerce structural growth: order processing volumes increased 95% since 2019, US e-commerce
              exceeded $1 trillion in annual sales in 2024, and consumer expectations for 2-day or faster delivery are
              now effectively a baseline requirement for DTC and marketplace competition. Each additional fulfillment
              node Nimble opens expands its 2-day delivery coverage without proportional labor additions.

              Third, technology maturation: AI-driven general-purpose picking, SLAM navigation, and RaaS subscription
              models have converged to make automation economically viable at smaller scale than previously possible.
              Automation now delivers 25–30% labor cost reduction and accuracy rates approaching 99%, with 450,000+
              logistics robots sold globally in 2025 versus 75,000 in 2019—a 500% increase in six years. The energy
              efficiency and ESG compliance benefits of all-electric automated systems add further tailwinds in
              regulated markets.
            claimRefs:
              - CM027
              - CM028
              - CM029
              - CM030
              - CM031
              - CM032
