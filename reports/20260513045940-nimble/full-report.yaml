      - SP003
      - SP007
      - SP016
    data:
      items:
        - label: FedEx Network Distribution Moat
          value: 9
          description: >-
            130+ warehouses, 475M returns/yr, 96% US pop for 1-2 day ground; no competitor offers comparable integrated
            network access
        - label: Data Flywheel Strength
          value: 8
          description: 15M+ picks, 500K SKUs; continuously improving AI with growing advantage over smaller-deployed rivals
        - label: Technology Differentiation
          value: 8
          description: >-
            End-to-end single-robot GP system replaces 6+ point solutions; Covariant and Exotec Skypicker are emerging
            but not yet equivalent in FaaS scope
        - label: Software Platform Moat
          value: 7
          description: >-
            Unified Cloud Logistics Platform rare among pure-play robotics companies; risk from enterprise WMS vendors
            adding robotics integrations
        - label: Post-Deployment Switching Cost
          value: 8
