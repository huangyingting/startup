      - number: '6.4'
        title: Retention, Repeat Usage, and Customer Satisfaction
        blocks:
          - type: paragraph
            body: >-
              Retention and customer satisfaction data for Nimble are not publicly disclosed, which is expected for a
              private B2B robotics company at this stage. Net Revenue Retention (NRR), Gross Revenue Retention (GRR),
              and churn rates have not been reported in any press release, interview, or third-party source identified
              during this research. The FedEx relationship provides an important structural proxy for retention: as both
              investor and primary channel partner, FedEx has deep incentives to maintain and expand the Nimble
              deployment relationship, suggesting durability at the operator level. The multi-year nature of RaaS
              contracts in the robotics industry—typically three to five years based on comparable deployments—also
              implies relatively low near-term churn risk for active sites. No NPS score, customer satisfaction index,
              or CSAT data has been found on G2, Trustpilot, Gartner Peer Insights, or comparable platforms, which is
              typical for industrial robotics systems that are rarely reviewed on consumer-oriented software platforms.
              The Deloitte Technology Fast 500 recognition in 2024 provides an indirect signal of customer traction, as
              revenue growth is the primary criterion for that list, implying that customers are continuing to purchase
              and expand. Early customer attrition signals could emerge from the Brandless example, where a customer's
              business failure rather than product dissatisfaction drove the end of the relationship. The cohort data
              presented in FU004 is estimated based on the known FedEx relationship longevity and industry benchmarks
              for robotics-as-a-service retention; it should not be interpreted as Nimble-disclosed data.
