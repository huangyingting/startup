      - number: '1.3'
        title: Board and Governance
        blocks:
          - type: paragraph
            body: >
              Nimble's board of directors is an exceptionally credentialed group of AI and robotics luminaries. Fei-Fei
              Li, Sequoia Professor of Computer Science at Stanford, co-director of Stanford HAI, and former Chief
              Scientist of AI at Google Cloud, has been a board member since the Series A in 2021—she was both an early
              seed investor and advisor. Marc Raibert, founder and chairman of Boston Dynamics and a defining figure in
              modern robotics, also serves on the board. Sebastian Thrun, founder of Google X and Waymo and co-founder
              of Udacity, brings autonomous-systems expertise to the board. Stephen Weiss, Managing Director at Cedar
              Pine LLC (lead investor in the Series B), represents investor governance. This board composition reflects
              Nimble's strategy of embedding deep academic and industry robotics expertise at the governance level,
              reducing key-person dependence on the CEO alone. The board has remained stable through the Series C, with
              no publicized board-level changes. Key-person risk remains elevated given Simon Kalouche's role as sole
              founder and CEO.
