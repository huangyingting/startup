      - number: '1.6'
        title: Milestones, Scale, and Market Position
        blocks:
          - type: paragraph
            body: >
              Nimble has reached several significant commercial and operational milestones since its founding. By the
              time of the Series A announcement in March 2021, robots were deployed in multiple U.S. fulfillment centers
              and picking over 100,000 items per day for Fortune 500 customers. By late 2021, Nimble had picked more
              than 15 million objects across 500,000 unique product SKUs—spanning apparel, electronics, health and
              beauty, footwear, and consumer packaged goods—with named customers including Best Buy, Victoria's Secret,
              Puma, NFI/CalCartage, iHerb, Adore Me, and Weee!. In March 2023, Nimble simultaneously announced its
              Series B and the launch of its robotic 3PL service, pivoting from a hardware-and-integration model to an
              operations-as-a-service model. The September–October 2024 FedEx investment and Series C represent the
              company's most significant commercial validation—FedEx, with $88 billion in annual revenue and more than
              130 warehouse and fulfillment operations in North America, entered a commercial agreement to scale its
              FedEx Fulfillment service using Nimble's technology. Analysts estimate Nimble operates in a market with
              764 active competitors including 155 funded rivals, but track Nimble as one of the most well-capitalized
              and technically differentiated players. Third-party estimates put Nimble's annual revenue at approximately
              $87 million, though the company has not publicly disclosed revenue, ARR, or gross margin data.
