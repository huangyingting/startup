      - number: '1.4'
        title: Funding History and Investors
        blocks:
          - type: paragraph
            body: >
              Nimble has raised approximately $221 million across four disclosed funding events. In March 2021, the
              company closed a $50 million Series A led by DNS Capital and GSR Ventures, with participation from Accel
              and Reinvent Capital; this round also included notable individual investors—Fei-Fei Li (seed investor) and
              Andy Rachleff. In March 2023, Cedar Pine led a $65 million Series B, with DNS Capital, GSR Ventures, and
              Breyer Capital participating; the Series B coincided with the commercial launch of Nimble's robotic 3PL
              service. In September 2024, FedEx made a separate strategic investment in Nimble and announced a
              commercial alliance to integrate Nimble technology into FedEx Fulfillment across North America; the
              precise dollar amount of the FedEx corporate round was not separately disclosed. In October 2024, Nimble
              closed a $106 million Series C led by FedEx and co-led by Cedar Pine, elevating the company to a $1
              billion post-money valuation. Proceeds are earmarked for robot manufacturing scale-up, additional system
              deployments, and continued R&D. No secondary transactions, debt facilities, or additional private rounds
              have been publicly disclosed.
