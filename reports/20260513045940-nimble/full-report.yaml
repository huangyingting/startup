      - number: '1.5'
        title: Products and Technology
        blocks:
          - type: paragraph
            body: >
              Nimble's core product is an intelligent, general-purpose warehouse robot—a mobile manipulator combining
              custom hardware with AI software trained via deep imitation learning on large proprietary datasets. The
              robot uses multiple interchangeable gripper types; its AI automatically selects the best gripper for each
              unique item at pick time, enabling handling of the millions of SKUs found in real-world e-commerce
              warehouses. In production, Nimble reports 99.9% picking accuracy. Integration with existing warehouse
              management systems (WMS) requires zero code changes; Nimble's AI-based integration layer interprets
              existing human operator interfaces, enabling a full production deployment in as little as one day at no
              integration cost. The system integrates with major e-commerce platforms including Shopify, NetSuite, and
              Skubana. Alongside the hardware, Nimble's Cloud Logistics Platform orchestrates robot fleets and provides
              brands with a unified WMS, OMS, TMS, IMS, and RMS solution, delivering real-time inventory visibility and
              supply chain control. The end-to-end turnkey system replaces over a dozen individual fulfillment equipment
              and software solutions. The company claims cost reductions of up to 70% versus legacy fulfillment
              alternatives. The all-electric robot design supports Nimble's sustainability positioning.
