      - number: '8.2'
        title: Current Valuation Context and Multiple Analysis
        blocks:
          - type: paragraph
            body: >-
              Nimble's $1B Series C valuation (October 2024) implies an EV/Revenue multiple of approximately 11.5x on
              the CompWorth revenue estimate of $87M. This multiple stands at a material premium to the public
              comparable set. Symbotic (SYM, NASDAQ) reported $1.54B in FY2025 revenue against a market cap of
              approximately $4.7B, implying a 3.1x revenue multiple—a compression from peak 2022 multiples of 20-30x.
              AutoStore (public, Oslo) trades at approximately 5.7x revenue on ~$620M annual revenue. Locus Robotics,
              which raised at a $3.3B peak valuation in 2022, filed for Chapter 11 bankruptcy in September 2023,
              demonstrating the downside risk of capital-intensive RaaS models that fail to reach breakeven. Berkshire
              Grey, which went public via SPAC at a $2.7B implied valuation in 2021, was taken private in late 2023 at
              approximately $0.23 per share. These cautionary comparables materially affect risk calibration at the
              current entry price. Exotec (France, private) is the closest business-model analog—a robotics-as-a-service
              unicorn at approximately €2B valuation and ~€100M ARR—and provides a more optimistic comp. The 6 River
              Systems acquisition by Shopify for $450M in 2019 establishes a lower-bound M&A precedent for
              AMR/fulfillment robotics players. Nimble's premium to public comps is partially justified by: higher
              growth rate potential, FedEx strategic option value, software-inclusive business model, and private market
              illiquidity premium. However, it requires 40%+ sustained growth to be defensible as a financial return at
              a $1B entry.
