      - number: '7.2'
        title: Regulatory and Legal Risks
        blocks:
          - type: paragraph
            body: >
              Nimble's regulatory risk is concentrated in four areas: workplace safety, export controls, emerging AI
              regulation, and intellectual property. On workplace safety, OSHA 29 CFR 1910.212 (machine guarding) and 29
              CFR 1910.217 (mechanical power presses) impose mandatory standards on any robotic system operating in
              proximity to human workers. These requirements are directly applicable to Nimble's autonomous picking
              robots in FedEx Supply Chain facilities across 130-plus active sites. The voluntary ANSI/RIA R15.06-2012
              safety standard for industrial robots is the de facto industry compliance expectation. While not legally
              mandated at the federal level, purchasers and insurers commonly require conformance, and failure to meet
              it would expose Nimble to product liability claims and contract breach. The U.S. Consumer Product Safety
              Commission has broad authority over product safety; if a deployed Nimble robot causes a worker injury or
              property damage, product-liability exposure could follow. On export controls, Nimble's AI hardware and
              software components including NVIDIA GPU-based inference systems may be subject to the Export
              Administration Regulations administered by the Bureau of Industry and Security. Dual-use AI robotics
              components could require export licenses for shipment to certain jurisdictions. The EU AI Act, fully in
              force by 2026, classifies AI systems used in safety-critical infrastructure as high-risk, potentially
              requiring conformity assessments and registration if Nimble enters European markets. Domestically,
              California AB 1008 and Illinois BIPA may apply to Nimble's computer vision systems if they capture
              biometric identifiers from warehouse workers. On the legal side, no public litigation against Nimble has
              been identified in court record databases as of the research date. However, the warehouse-automation
              patent landscape is dense: Amazon Robotics formerly known as Kiva Systems holds extensive patents covering
              conveyor-based order fulfillment, robotic sorting, and AI-assisted picking that could overlap with
              Nimble's architecture. A formal freedom-to-operate analysis has not been publicly confirmed. The WARN Act
              imposes obligations if Nimble were required to conduct mass layoffs, which is relevant in a downside
              scenario where FedEx channel loss forces headcount reduction.
            claimRefs:
              - CR001
              - CR002
              - CR003
              - CR004
              - CR005
              - CR006
