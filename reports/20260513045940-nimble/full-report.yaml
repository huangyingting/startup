      - number: '6.3'
        title: Named Customer Proof and Reference Quality
        blocks:
          - type: paragraph
            body: >-
              Named customer proof for Nimble is limited by the company's indirect, channel-mediated business model and
              its status as a private company. FedEx Supply Chain is the most clearly documented production deployment:
              press releases, investor communications, and third-party news coverage confirm that FedEx is both a lead
              investor and an active operator of Nimble's autonomous fulfillment systems across 130+ sites. This
              constitutes genuine production-scale evidence at the operator level, though it does not reveal the
              identities of the brand customers whose orders Nimble fulfills within those FedEx facilities. Brandless, a
              direct-to-consumer lifestyle product brand, was referenced in early-stage coverage as a customer, but
              Brandless subsequently went through bankruptcy and restructuring, limiting the reference quality of this
              example. Beyond these two named entities, Nimble has disclosed vertical presence in apparel,
              health/beauty, electronics, and pet products, with implied production deployments in each—but without
              publicly naming the specific brands. This is typical for B2B robotics-as-a-service companies where brand
              customers may not consent to public disclosure and where the 3PL operator (FedEx) is the contracting
              entity rather than the brand. Reference quality is therefore strongest at the operator (FedEx) level and
              essentially undocumented at the end-brand customer level. Diligence requiring brand-level references would
              require NDA-protected access to Nimble's customer list and direct reference calls arranged through the
              company.
