chapters:
  - number: 1
    title: Company Overview
    sections:
      - number: '1.1'
        title: Identity and Mission
        blocks:
          - type: paragraph
            body: >
              Nimble (formerly Nimble Robotics, Inc.) is an autonomous e-commerce fulfillment technology company
              headquartered in San Francisco, California. Founded in 2017 by Simon Kalouche, the company's core product
              is an intelligent, general-purpose warehouse robot capable of performing all critical fulfillment
              tasks—storage and retrieval, picking, packing, and sorting—within a single turnkey robotic fulfillment
              center. More than 90% of warehouses globally still operate with minimal or no robotics, leaving a vast
              addressable market for end-to-end warehouse automation. Nimble's stated mission is to "invent autonomous
              logistics, everything from the warehouse floor to the consumer's door." The company operates its
              technology as a robotic third-party logistics (3PL) service delivered from a network of geographically
              distributed autonomous fulfillment centers across the United States, enabling e-commerce brands to offer
              free 2-day or faster delivery to more than 96% of the U.S. population via ground shipping. Nimble is
              currently at the Series C stage with a $1 billion post-money valuation and competes in the rapidly
              expanding warehouse automation and fulfillment-as-a-service market.
