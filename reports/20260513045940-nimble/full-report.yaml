      - number: '8.3'
        title: Bull, Base, and Bear Scenario Analysis
        blocks:
          - type: paragraph
            body: >-
              Three structured scenarios bracket the range of outcomes from the $1B entry valuation. In the bull case,
              Nimble capitalizes on the FedEx distribution partnership to scale from 130 to 500+ North American
              facilities by 2028, growing revenue from ~$87M to $450-500M annually at 40-50% CAGR. At a 5x revenue exit
              multiple—achievable at IPO or strategic acquisition by a logistics conglomerate such as FedEx, UPS, or
              DHL—the implied enterprise value reaches $2.25-2.5B. After accounting for dilution and preference overhang
              from three preferred rounds, common equity returns of 1.5-2.5x are plausible from the $1B entry. The key
              bull assumptions are: FedEx continues expanding the fulfillment network, gross margins improve to 35-45%
              as AI maturity reduces service costs, and public market sentiment for robotics IPOs recovers by 2027-2028.
              In the base case, Nimble grows to $240-260M in revenue by 2028 at 30-35% CAGR, sustains the FedEx
              relationship, and is acquired by a strategic buyer at 3-4x revenue ($720M-$1.04B). At $1B entry, this
              scenario yields approximately 0-1.0x return on invested capital—effectively flat or modest gains—after
              dilution. In the bear case, FedEx's strategic priorities shift under new leadership or logistics cycle
              downturn, facility rollout slows, and Nimble's revenue stalls at $90-120M. Unable to reach profitability
              under the capital-intensive RaaS model, Nimble faces a down-round or distressed sale at 1-2x revenue
              ($90-240M), resulting in capital loss for Series C investors. The probability-weighted expected return is
              approximately 0.9-1.2x—consistent with a track/research-more recommendation rather than a buy.
