      - number: '2.3'
        title: Buyer Segments and Budget Owners
        blocks:
          - type: paragraph
            body: >
              Warehouse automation spending concentrates in three primary buyer archetypes. Third-party logistics (3PL)
              operators are the single largest segment, representing approximately 39% of warehouse automation market
              spending in 2025 (Mordor). 3PLs have strong adoption incentives: they must serve multiple clients with
              diverse SKUs, face recurring labor shortfalls, and compete on throughput and cost. Nimble itself operates
              within this segment as a robotic 3PL provider. The second major segment is e-commerce and DTC brands that
              either operate their own fulfillment centers or select automated 3PL partners; this segment held 28% of
              warehouse automation spending. Enterprise retailers (in-house fulfillment) compose a third segment,
              investing directly in their own warehouse automation to reduce dependency on manual labor and serve
              same-day delivery promises. Manufacturers and industrial companies form a smaller secondary buyer base.

              Budget ownership varies by segment. In 3PL-operator deployments, the operator bears the CapEx or RaaS cost
              and passes through unit economics to clients. In brand-direct deployments, operations and supply-chain
              executives own the budget, often under CFO approval for investments above $1–2 million. The shift toward
              RaaS and subscription-based robotics (converting CapEx to OpEx) is reducing the budget-authority threshold
              and opening the SMB segment—a structural tailwind for Nimble's "no upfront hardware cost" service model.
              Medium-sized warehouses (36.78% of 2025 revenue) and small warehouses (fastest-growing at 15.19% CAGR)
              represent the emerging edge of adoption as economics improve.
            claimRefs:
