  evidenceGaps:
  - type: enumeration
    severity: high
    topic: named-customer-roster
    missingEvidence: Full list of e-commerce brand customers using Nimble's systems within the FedEx network; specific brand names, deployment dates, and outcome
      data.
    whyItMatters: Cannot assess reference quality, customer diversity, or vertical penetration depth without knowing the actual end-brand customers beyond FedEx and
      Brandless.
    diligencePath: Request NDA-gated customer reference list from Nimble management; seek introductions to FedEx Supply Chain operations leadership; review LinkedIn
      for customer testimonials.
    relatedQuestionRefs:
    - QU013
    relatedTableRefs:
    - TU003
  - type: quantification
    severity: high
    topic: retention-metrics
    missingEvidence: Net Revenue Retention (NRR), Gross Revenue Retention (GRR), churn rate, and cohort retention data for Nimble's customer and operator base.
    whyItMatters: Without retention metrics it is impossible to assess customer durability or determine whether growth is driven by new site acquisitions versus expansion
      within existing customers.
    diligencePath: Request management presentation with cohort data; ask about average contract length and renewal rates; review any Series D fundraising materials
      for retention metrics.
    relatedQuestionRefs:
    - QU016
    - QU018
  - type: quantification
    severity: high
    topic: revenue-concentration
    missingEvidence: Percentage of Nimble's revenue attributable to the FedEx Supply Chain relationship versus other operators or direct customers.
    whyItMatters: Revenue concentration in a single partner is the primary financial risk; quantifying it is essential for assessing the magnitude of the channel
      dependency.
    diligencePath: Request revenue breakdown by channel or customer in management diligence; look for any investor presentations or board materials that disclose
      revenue mix.
    relatedQuestionRefs:
    - QU021
  - type: comparison
    severity: medium
    topic: competitive-customer-mix-comparison
    missingEvidence: Detailed public data on customer vertical mix and concentration for comparable robotics-as-a-service competitors such as Locus Robotics and GreyOrange.
    whyItMatters: Without a competitive baseline it is difficult to assess whether Nimble's channel concentration risk is unusually high relative to B2B robotics
      peers.
    diligencePath: Review public competitor case studies, press releases, and investor presentations; consult analyst reports on warehouse robotics competitive positioning.
    relatedQuestionRefs:
    - QU004
  - type: quantification
    severity: medium
    topic: year-over-year-adoption
    missingEvidence: Annual deployment growth figures (sites added per year) and historical milestones showing the deployment trajectory over time.
    whyItMatters: Without time-series data on site additions, it is impossible to determine whether adoption is accelerating or decelerating.
    diligencePath: Review historical press releases and investor announcements for site count milestones; ask management for historical deployment timeline.
    relatedQuestionRefs:
    - QU007
    - QU010
