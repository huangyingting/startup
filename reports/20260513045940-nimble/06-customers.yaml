- id: adoption-deployment-trajectory
  title: Adoption and Deployment Trajectory
  body: Nimble's adoption trajectory reflects rapid scaling within the FedEx network following the Series C fundraise in 2022. The company has disclosed 130+ active
    fulfillment center deployments as of 2024, representing a multi-year build-out across FedEx Supply Chain's North American facility footprint. Cumulative objects
    picked has reached 15 million, with 500,000+ unique SKUs handled—metrics that demonstrate both scale of usage and breadth of product type coverage. Employee headcount
    has grown to 200+, consistent with the operational complexity of managing robotics deployments across multiple geographically distributed facilities. Inclusion
    on the Deloitte Technology Fast 500 list in 2024 provides third-party corroboration of revenue growth, though specific revenue figures remain undisclosed. The
    Series C funding of $63 million cumulative (as of 2022) enabled the infrastructure investment necessary to scale from a handful of pilot sites to 130+ production
    deployments. The deployment funnel—from initial evaluation to full rollout—typically spans 90 to 270 days based on industry benchmarks for robotics-as-a-service
    implementations, though Nimble-specific deployment timelines have not been publicly disclosed. Key adoption enablers include the FedEx channel (which removes
    direct enterprise sales friction), the RaaS model (which eliminates capital barriers for brand customers), and the integration with FedEx's existing WMS infrastructure.
    Year-over-year growth in active sites and cumulative picks is not reported at annual intervals, limiting external visibility into the precise adoption rate trajectory.
  contentRequirementIndex: 1
