figures:
- id: FU001
  title: Customer Journey Map
  slug: customer-journey-map
  type: journey-map
  description: Typical customer journey for an e-commerce brand or 3PL operator adopting Nimble's autonomous fulfillment system, from awareness through multi-site
    expansion.
  data:
    items:
    - label: Awareness
      role: Marketing / Sales
      description: E-commerce brand or 3PL operator learns about Nimble via FedEx referral, industry conference, or press coverage
    - label: Evaluation
      role: Operations / Procurement
      description: Technical evaluation of robot throughput, SKU compatibility, WMS integration requirements, and RaaS pricing model
    - label: Pilot
      role: Operations
      description: Pilot deployment in one fulfillment center; typically 90–180 day evaluation period with defined success metrics
    - label: Contract
      role: Finance / Legal
      description: Multi-year RaaS contract signed; pricing typically tied to per-unit pick volume or per-site fee structure
    - label: Go-Live
      role: Operations / IT
      description: Full deployment and integration with warehouse management system; operator training and safety certification completed
    - label: Expansion
      role: Account Management
      description: Rollout to additional fulfillment centers within the customer or FedEx network; second and third sites go live
    - label: Renewal
      role: Finance / Strategy
      description: Contract renewal at end of multi-year term; upsell opportunities for next-generation robot models or expanded SKU coverage
