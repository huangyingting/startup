  evidenceGaps:
  - type: private-evidence-only
    severity: material
    topic: nimble-technical-benchmarks
    missingEvidence: No independent third-party benchmark study comparing Nimble's pick accuracy rate, throughput per facility, or error rate versus Covariant, RightHand
      Robotics, or Exotec Skypicker has been published.
    whyItMatters: Without benchmark data, technical superiority claims cannot be independently verified, creating an information asymmetry that could mask latent
      performance gaps.
    diligencePath: Commission a technical audit by an independent robotics evaluation firm (e.g., ARC Advisory Group, MHI member organizations) to benchmark pick
      accuracy, throughput, and error rates under production conditions.
    relatedQuestionRefs:
    - QE008
  - type: private-evidence-only
    severity: material
    topic: soc2-certification
    missingEvidence: Nimble has not publicly confirmed SOC 2 Type II certification for its Cloud Logistics Platform, which is a standard enterprise requirement for
      software handling commercial inventory and order data.
    whyItMatters: Absence of SOC 2 certification could block enterprise customer acquisition and expose Nimble to data security liability in customer contracts.
    diligencePath: Request SOC 2 Type II audit report under NDA from Nimble's security team. Verify with Nimble's enterprise customer references.
  - type: private-evidence-only
    severity: minor
    topic: product-roadmap
    missingEvidence: Nimble's official product roadmap is not publicly available. Future feature investments, new vertical plans, and international expansion timeline
      are unknown.
    whyItMatters: Without a roadmap, assessing whether Nimble's product will remain competitive against AI-focused rivals over a 3-5 year investment horizon is difficult.
    diligencePath: Request product roadmap and 12-18 month feature backlog from CTO under NDA.
    relatedQuestionRefs:
    - QE018

