- id: TE002
  title: Customer Workflow and Use Case Table
  slug: workflow-use-case-table
  description: Key customer workflows served by Nimble's platform, the current (pre-Nimble) approach, Nimble's solution, measurable benefit claimed, and known limitations.
  columns:
  - User Job / Workflow
  - Current Approach
  - Nimble Solution
  - Measurable Benefit Claimed
  - Limitation
  rows:
  - - Order fulfillment (pick-pack-ship)
    - Human pickers + conveyor + manual pack stations in leased 3PL warehouse
    - GP robot autonomously picks, packs, and labels order
    - Up to 40% lower click-to-deliver cost; 24/7 operation; no labor dependency
    - Throughput ceiling per facility; not yet proven at largest enterprise scale
  - - Inventory storage and management
    - Manual put-away + WMS software (separate vendor)
    - Automated put-away + integrated IMS within Cloud Platform
    - Real-time inventory accuracy; reduced mis-picks
    - Storage density vs. dedicated AS/RS (e.g., Exotec Skypod)
  - - Returns receiving and restocking
    - Manual unpack, inspect, restock by 3PL staff
    - Automated receive, inspect, restock via FedEx returns network
    - Access to 475M returns/yr FedEx volume; faster restock cycle
    - Condition inspection accuracy for high-value items (apparel, electronics)
  - - Carrier selection and shipping
    - Manual carrier comparison + separate TMS
    - Integrated FedEx carrier selection via Cloud Logistics Platform TMS
    - 1-2 day ground to 96% US population; no carrier shopping friction
    - Carrier lock-in to FedEx for primary shipping; limited multi-carrier
  - - ERP/OMS integration
    - Custom API builds per 3PL partner
    - Pre-built Shopify, NetSuite, SAP connectors in Cloud Platform
    - Plug-and-play onboarding; reduced integration time
    - Connector coverage may lag new ERP/e-com platform releases
  notes: Workflow analysis based on Nimble product website, third-party reviews, and fulfillment industry benchmarks. Benefit claims are company-stated; independent
    customer outcome data is limited.
  sourceRefs:
  - SE001
  - SE002
  - SE005
  - SE010
- id: TE003
  title: Technology and Operating Architecture Table
  slug: technology-architecture-table
  description: Nimble's technology stack layers, role of each layer, dependencies, and key technical risks.
  columns:
  - Layer/Component
  - Role
  - Key Dependency
  - Technical Risk
  rows:
  - - Perception AI (vision + depth + tactile)
    - Object detection, grasp planning, SKU identification
    - GPU compute clusters; training data from operational picks
    - Edge-case SKU failures (reflective, deformable, irregular shapes)
  - - Self-supervised learning pipeline
    - Model improvement from unlabeled operational data
    - Volume of operational picks (15M+ and growing)
    - Model drift if SKU distribution shifts; adversarial examples
  - - Motion planning and robotic control
    - Arm path planning, collision avoidance, trajectory optimization
    - Low-latency compute at edge; hardware reliability
    - Real-time planning failures under high throughput; hardware MTBF
  - - Mobile base navigation (AMR layer)
    - Facility navigation, inter-station movement, human-safe routing
    - Facility map and sensor fusion
    - Peak-season traffic congestion; sensor drift in dynamic environments
  - - Cloud Logistics Platform (WMS/OMS/TMS/IMS)
    - Customer-facing order management, inventory, shipping, analytics
    - AWS/Azure cloud infrastructure; FedEx API uptime
    - Platform SLA during peak; data security for customer inventory info
  - - FedEx logistics API integration
    - Carrier selection, label generation, pickup scheduling, returns
    - FedEx commercial API availability and SLAs
    - FedEx API changes or deprecations breaking Nimble software; dependency on FedEx uptime
  - - ERP/OMS connector layer
    - Customer system integration (Shopify, NetSuite, SAP, etc.)
    - Third-party API compatibility and versioning
    - Connector maintenance as customer platforms update; long-tail ERP support
  notes: Architecture assessment based on Nimble technical blog posts, Simon Kalouche interviews, CMU research background, and comparable robotics platform architectures.
    No official architecture documentation is publicly available.
