companyProfile:
  summary: Nimble is a San Francisco-based autonomous fulfillment robotics company founded in 2017 by Simon Kalouche (Carnegie Mellon PhD, NASA JPL). The company offers an Autonomous Fulfillment Center
    (AFC) platform — combining proprietary multi-finger robotic arms, computer vision, and a cloud logistics software layer — deployed through a Robot-as-a-Service model. Nimble operates in 130+ North American
    warehouses via a strategic alliance with FedEx, which is both lead investor (Series C) and distribution channel. As of May 2026, Nimble has raised ~$221M across three rounds, reached a $1B unicorn valuation,
    processed 15M+ object picks, and handles 475 million returns annually. The company targets mid-market D2C brands and 3PL operators seeking to automate labor-intensive picking workflows.
  foundedDate: '2017-01-01'
  founders:
  - name: Simon Kalouche
    role: Founder and CEO
    background: Carnegie Mellon University robotics PhD; NASA Jet Propulsion Laboratory researcher; inventor of NINJA (novel jumping robot); multiple granted patents in robotic manipulation.
    claimRefs:
    - CO009
    - CO010
  foundingLocation: San Francisco, California
  headquarters: San Francisco, California
  productSummary: Nimble's Autonomous Fulfillment Center (AFC) platform integrates a general-purpose (GP) multi-finger robotic arm, a proprietary computer vision and depth-sensing stack, autonomous mobile
    storage robots (AMRs), and the Nimble Cloud Logistics Platform (SaaS layer with ERP/OMS connectors for Shopify, NetSuite, SAP). The system handles 500K+ SKU types without retooling and delivers FedEx-grade
    next-day or 2-day ground shipping for 96% of the US population.
  customerFocus: Mid-market D2C e-commerce brands and 3PL operators in apparel, health/beauty, electronics, and pet products verticals; deployed exclusively through the FedEx fulfillment network.
  businessModel: 'Robot-as-a-Service (RaaS): recurring per-pick or per-order fee; includes hardware deployment, software, and maintenance. No capex for customers; Nimble owns and operates the hardware.'
  stage: late-stage private (Series C, unicorn)
  fundingStatus: 'Series C: $106M (October 2024, FedEx-led) at $1B post-money valuation. Prior rounds: Series A $50M (March 2021, Greenoaks Capital), Series B $65M (March 2023, Deer Park Road). Total raised
    ~$221M.'
