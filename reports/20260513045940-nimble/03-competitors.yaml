- id: platform-scale-competitors
  title: Platform and Scale Competitors
  body: Symbotic, Locus Robotics, GreyOrange, Exotec, and Geek+ compete on platform scale and capital depth. Symbotic reported approximately $618 million in quarterly
    revenue as of Q4 fiscal 2025 and holds a $22.4 billion order backlog, anchored by the January 2025 acquisition of Walmart's Advanced Systems and Robotics business
    for $520 million total; it is expanding into micro-fulfillment via a 400-APD Walmart deployment program that narrows competitive distance from Nimble's e-commerce
    focus. Locus Robotics—at $2 billion valuation and $438 million raised—leads in 3PL AMR deployments with 6 billion cumulative picks and 350+ sites, with major
    customers including DHL Supply Chain and GEODIS. Exotec, valued at $2 billion with 100+ Skypod deployments at Uniqlo, Decathlon, and Gap, recently added piece-picking
    capability through its Skypicker arm rated at 600 items per hour, moving into direct overlap with Nimble. GreyOrange differentiates through its hardware-agnostic
    GreyMatter orchestration platform claiming 2-4x productivity gains and 45% lower fulfillment cost per unit. Geek+ leads globally in AMR hardware breadth with
    picking, sorting, and forklift robots deployed at Nike and Walmart. None of these competitors offer Nimble's FaaS model backed by FedEx's integrated distribution
    network.
