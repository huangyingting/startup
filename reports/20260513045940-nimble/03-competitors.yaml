  evidenceGaps:
  - type: missing-source
    severity: material
    topic: nimble-market-share
    missingEvidence: No independent analyst report quantifies Nimble's discrete market share in the autonomous 3PL fulfillment segment. All major competitors are
      private or non-disclosing on revenue, making share calculation impractical.
    whyItMatters: Without market share data, it is impossible to triangulate Nimble's competitive position from external data alone or verify company-claimed leadership.
    diligencePath: Commission a custom market study from a logistics research firm (e.g., CBRE Research, Gartner, or ARC Advisory) or contact Nimble directly for
      customer count and GMV data under NDA.
    relatedQuestionRefs:
    - QP024
  - type: missing-source
    severity: minor
    topic: nimble-pricing-opacity
    missingEvidence: Nimble's specific per-unit or per-order pricing is not publicly disclosed, and no third-party source has published indicative rate benchmarks.
      Competitor pricing comparisons are similarly unavailable.
    whyItMatters: Pricing opacity limits competitive comparison for prospective customers and makes it difficult to model Nimble's unit economics or compare cost
      competitiveness.
    diligencePath: Request pricing under NDA from Nimble sales team; cross-reference with 3PL industry pricing benchmarks from Armstrong & Associates or Cushman &
      Wakefield.
    relatedQuestionRefs:
    - QP028
  - type: private-evidence-only
    severity: minor
    topic: berkshire-grey-profile
    missingEvidence: Berkshire Grey post-acquisition operational data including revenue, deployment count, and robot fleet size is unavailable as it is now a SoftBank
      portfolio company without public reporting obligations.
    whyItMatters: Berkshire Grey's continued competitive presence as a SoftBank asset cannot be assessed without current operational data.
    diligencePath: Monitor SoftBank annual reports and robotics portfolio disclosures; check Berkshire Grey website for customer and product announcements.
  - type: missing-source
    severity: minor
    topic: competitive-risks
    missingEvidence: Independent third-party adverse analysis of Nimble's competitive positioning is limited to SWOT sites with standard template output; no deep
      investigative journalism or analyst downgrades found.
    whyItMatters: Partial adverse coverage means risks may be understated in the competitive analysis.
    diligencePath: Search court records (PACER), USPTO trademark/patent filings for competitive disputes, and consult with 3PL operators who have evaluated Nimble.
    relatedQuestionRefs:
    - QP021

