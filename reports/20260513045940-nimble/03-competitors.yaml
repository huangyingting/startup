- id: nimble-competitive-position
  title: Nimble's Competitive Position and Differentiation
  body: 'Nimble''s competitive position is defined by four structural advantages. First, general-purpose robotic capability: a single robot handles picking, packing,
    sorting, storage, and retrieval, replacing a multi-vendor patchwork of 6+ point solutions. Second, FedEx distribution network: 130+ North American warehouses,
    475 million annual returns, and 96% US population coverage with 1-2 day ground shipping—a footprint requiring hundreds of millions in capital to replicate. Third,
    a unified Cloud Logistics Platform bundling WMS, OMS, TMS, IMS, and returns management—rare among pure-play robotics companies. Fourth, a RaaS model with zero
    upfront capital that eliminates deployment friction for mid-market e-commerce brands. The data flywheel from 15 million+ cumulative picks across 500,000+ SKUs
    creates compounding AI accuracy advantages. Together, these advantages support the claim of up to 40% savings in click-to-deliver cost. No competitor in 2026
    combines all four structural elements in a single offering.'
  claimRefs:
  - CP011
  - CP012
  - CP013
  - CP014
  - CP015
  - CP026
  - CP027
  - CP038
  - CP043
