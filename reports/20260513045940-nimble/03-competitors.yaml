- id: ai-picking-specialists
  title: 'Direct Competitors: AI Piece-Picking Specialists'
  body: 'The closest technology-level rivals to Nimble are Covariant, RightHand Robotics, and Berkshire Grey (acquired by SoftBank in 2023). Covariant has raised
    approximately $245 million and focuses on deep-learning grasping of irregular, high-mix items in 3PL and CPG environments; its models are trained on multi-site
    operational data but it offers an AI software layer rather than an end-to-end fulfillment stack. RightHand Robotics raised approximately $126.88 million, secured
    a Rockwell Automation minority investment in March 2025, and appointed Yaro Tenzer as CEO in August 2024; its RightPick 4 platform is purpose-built for order
    fulfillment across retail, e-commerce, and pharmaceutical verticals. Berkshire Grey, formerly backed by approximately $263M in funding, is no longer an independent
    competitor following its SoftBank acquisition in 2023. Nimble''s key advantage over this group is scope: while rivals provide robotic picking arms or AI software
    modules, Nimble provides a complete fulfillment center—warehouse space, inbound/outbound logistics via FedEx, and a unified cloud software stack—at zero upfront
    capital. The data flywheel from 15 million+ picks across 500,000+ SKUs creates compounding AI quality advantages over rivals.'
  claimRefs:
  - CP007
  - CP008
  - CP009
  - CP020
