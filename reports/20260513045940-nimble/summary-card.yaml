summary:
  headline: >-
    Nimble is a compelling warehouse robotics bet anchored by a $1B Series C valuation, FedEx scale distribution, and a
    self-supervised AI moat, but near-term risk is dominated by extreme FedEx concentration and unverified
    revenue/margin claims.
