  evidenceGaps:
  - type: private-evidence-only
    severity: blocking
    topic: nimble-financials
    missingEvidence: No audited revenue, gross margin, burn rate, or unit economics data is publicly available for Nimble. The $87M CompWorth estimate is based on
      proprietary signals and is unverified.
    whyItMatters: Without financial disclosure, investment decisions at the $1B valuation level cannot be made on reasonable evidentiary footing. Revenue quality,
      margin path, and cash adequacy are all unknown.
    diligencePath: Request management accounts (P&L, balance sheet, cash flow statement) under NDA. Cross-check revenue estimate with reference customers and FedEx
      commercial agreement terms.
    relatedQuestionRefs:
    - QI006
    - QI010
    - QI019
  - type: missing-source
    severity: material
    topic: fedex-revenue-concentration
    missingEvidence: The revenue contribution from FedEx as a customer (versus independent customer volume) is unknown, making it impossible to quantify FedEx concentration
      risk.
    whyItMatters: If FedEx represents more than 30-50% of Nimble's revenue, the strategic dependency risk is substantially higher than represented in a diversified
      customer narrative.
    diligencePath: Request revenue breakdown by customer segment under NDA; cross-reference with FedEx commercial agreement structure.
    relatedQuestionRefs:
    - QI029
  - type: private-evidence-only
    severity: material
    topic: unit-economics
    missingEvidence: CAC, LTV, payback period, per-facility deployment cost, and manufacturing cost are all undisclosed, preventing unit economics modeling.
    whyItMatters: Unit economics determine whether the FaaS model is financially sustainable at scale or requires perpetual capital injection.
    diligencePath: Request unit economics model, customer cohort data, and facility-level P&L from CFO under NDA.

