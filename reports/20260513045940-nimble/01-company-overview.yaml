company:
  name: Nimble
chapter:
  number: 1
  title: Company Overview
  summary: >
    Nimble is a San Francisco-based autonomous fulfillment company founded in 2017 by Simon Kalouche that builds AI-powered,
    general-purpose warehouse robots and operates a robotic third-party logistics (3PL) network for e-commerce brands.
    The company raised $106M in a Series C at a $1B valuation in October 2024 led by FedEx, bringing total disclosed
    capital to $221M, and counts Fei-Fei Li, Marc Raibert, and Sebastian Thrun among its board directors.

sections:
  - id: identity-and-mission
    title: Identity and Mission
    body: >
      Nimble (formerly Nimble Robotics, Inc.) is an autonomous e-commerce fulfillment technology company headquartered
      in San Francisco, California. Founded in 2017 by Simon Kalouche, the company's core product is an intelligent,
      general-purpose warehouse robot capable of performing all critical fulfillment tasks—storage and retrieval,
      picking, packing, and sorting—within a single turnkey robotic fulfillment center. More than 90% of warehouses
      globally still operate with minimal or no robotics, leaving a vast addressable market for end-to-end warehouse
      automation. Nimble's stated mission is to "invent autonomous logistics, everything from the warehouse floor to
      the consumer's door." The company operates its technology as a robotic third-party logistics (3PL) service
      delivered from a network of geographically distributed autonomous fulfillment centers across the United States,
      enabling e-commerce brands to offer free 2-day or faster delivery to more than 96% of the U.S. population via
      ground shipping. Nimble is currently at the Series C stage with a $1 billion post-money valuation and competes
      in the rapidly expanding warehouse automation and fulfillment-as-a-service market.
    claimRefs: [CO001, CO006, CO007, CO008, CO010, CO034, CO031]
    tableRefs: [TO001]
    figureRefs: [FO003]

  - id: founding-and-leadership
    title: Founding Story and Leadership Team
    body: >
      Simon Kalouche founded Nimble in 2017 after leaving a PhD program at Stanford's AI Lab, where he was studying
      deep imitation learning under Professor Fei-Fei Li. Kalouche holds a B.S. in Honors Mechanical Engineering
      from Ohio State University (2014) and an M.S. in Robotics from Carnegie Mellon University (2014–2016), where
      he developed the first low-cost quasi-direct-drive (QDD) actuators—now widely used in leading robots including
      MIT's Mini Cheetah and Boston Dynamics platforms. At Stanford, he focused on applying deep imitation learning
      to robotic manipulation tasks. Recognizing the commercial opportunity to automate warehouse picking at scale,
      he departed Stanford in 2017 to found Nimble and commercialize deep imitation learning for e-commerce logistics.
      As of 2025, Nimble's executive team includes Jennifer Johnston as CFO and COO; Jordan Dawson as VP of Operations;
      Melissa Curry as VP of Fulfillment Operations; Matthew Shekels as VP of Hardware; Jonathan Briggs as VP of
      Enterprise Sales; and Siva Chaitanya Mynepalli as Head of Computer Vision. Kalouche retains the CEO role
      and is the sole founder. The company employs approximately 200+ people, having grown from 25 at the time
      of the Series A in 2021 to approximately 100 by early 2023 and continuing to expand.
    claimRefs: [CO002, CO003, CO004, CO005, CO029, CO044, CO019, CO035]
    tableRefs: [TO002]

  - id: board-and-governance
    title: Board and Governance
    body: >
      Nimble's board of directors is an exceptionally credentialed group of AI and robotics luminaries. Fei-Fei Li,
      Sequoia Professor of Computer Science at Stanford, co-director of Stanford HAI, and former Chief Scientist of
      AI at Google Cloud, has been a board member since the Series A in 2021—she was both an early seed investor and
      advisor. Marc Raibert, founder and chairman of Boston Dynamics and a defining figure in modern robotics, also
      serves on the board. Sebastian Thrun, founder of Google X and Waymo and co-founder of Udacity, brings
      autonomous-systems expertise to the board. Stephen Weiss, Managing Director at Cedar Pine LLC (lead investor
      in the Series B), represents investor governance. This board composition reflects Nimble's strategy of
      embedding deep academic and industry robotics expertise at the governance level, reducing key-person
      dependence on the CEO alone. The board has remained stable through the Series C, with no publicized
      board-level changes. Key-person risk remains elevated given Simon Kalouche's role as sole founder and CEO.
    claimRefs: [CO015, CO025, CO026, CO027, CO028]

  - id: funding-history
    title: Funding History and Investors
    body: >
      Nimble has raised approximately $221 million across four disclosed funding events. In March 2021, the company
      closed a $50 million Series A led by DNS Capital and GSR Ventures, with participation from Accel and Reinvent
      Capital; this round also included notable individual investors—Fei-Fei Li (seed investor) and Andy Rachleff.
      In March 2023, Cedar Pine led a $65 million Series B, with DNS Capital, GSR Ventures, and Breyer Capital
      participating; the Series B coincided with the commercial launch of Nimble's robotic 3PL service. In September
      2024, FedEx made a separate strategic investment in Nimble and announced a commercial alliance to integrate
      Nimble technology into FedEx Fulfillment across North America; the precise dollar amount of the FedEx corporate
      round was not separately disclosed. In October 2024, Nimble closed a $106 million Series C led by FedEx and
      co-led by Cedar Pine, elevating the company to a $1 billion post-money valuation. Proceeds are earmarked for
      robot manufacturing scale-up, additional system deployments, and continued R&D. No secondary transactions,
      debt facilities, or additional private rounds have been publicly disclosed.
    claimRefs: [CO013, CO014, CO017, CO018, CO021, CO022, CO023, CO024]
    tableRefs: [TO003]

  - id: products-and-technology
    title: Products and Technology
    body: >
      Nimble's core product is an intelligent, general-purpose warehouse robot—a mobile manipulator combining
      custom hardware with AI software trained via deep imitation learning on large proprietary datasets. The
      robot uses multiple interchangeable gripper types; its AI automatically selects the best gripper for each
      unique item at pick time, enabling handling of the millions of SKUs found in real-world e-commerce warehouses.
      In production, Nimble reports 99.9% picking accuracy. Integration with existing warehouse management systems
      (WMS) requires zero code changes; Nimble's AI-based integration layer interprets existing human operator
      interfaces, enabling a full production deployment in as little as one day at no integration cost. The system
      integrates with major e-commerce platforms including Shopify, NetSuite, and Skubana. Alongside the hardware,
      Nimble's Cloud Logistics Platform orchestrates robot fleets and provides brands with a unified WMS, OMS, TMS,
      IMS, and RMS solution, delivering real-time inventory visibility and supply chain control. The end-to-end
      turnkey system replaces over a dozen individual fulfillment equipment and software solutions. The company
      claims cost reductions of up to 70% versus legacy fulfillment alternatives. The all-electric robot design
      supports Nimble's sustainability positioning.
    claimRefs: [CO009, CO010, CO011, CO012, CO040, CO041, CO033]
    figureRefs: [FO002]

  - id: milestones-and-market-position
    title: Milestones, Scale, and Market Position
    body: >
      Nimble has reached several significant commercial and operational milestones since its founding. By the time
      of the Series A announcement in March 2021, robots were deployed in multiple U.S. fulfillment centers and
      picking over 100,000 items per day for Fortune 500 customers. By late 2021, Nimble had picked more than
      15 million objects across 500,000 unique product SKUs—spanning apparel, electronics, health and beauty,
      footwear, and consumer packaged goods—with named customers including Best Buy, Victoria's Secret, Puma,
      NFI/CalCartage, iHerb, Adore Me, and Weee!. In March 2023, Nimble simultaneously announced its Series B
      and the launch of its robotic 3PL service, pivoting from a hardware-and-integration model to an
      operations-as-a-service model. The September–October 2024 FedEx investment and Series C represent the
      company's most significant commercial validation—FedEx, with $88 billion in annual revenue and more than
      130 warehouse and fulfillment operations in North America, entered a commercial agreement to scale its
      FedEx Fulfillment service using Nimble's technology. Analysts estimate Nimble operates in a market with
      764 active competitors including 155 funded rivals, but track Nimble as one of the most well-capitalized
      and technically differentiated players. Third-party estimates put Nimble's annual revenue at approximately
      $87 million, though the company has not publicly disclosed revenue, ARR, or gross margin data.
    claimRefs: [CO016, CO030, CO031, CO032, CO035, CO036, CO039, CO042, CO043]
    tableRefs: [TO004]
    figureRefs: [FO001]

