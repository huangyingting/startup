callouts:
  - calloutType: strength
    title: World-Class Board Anchors Scientific Credibility
    body: >
      Nimble's board of directors—Fei-Fei Li (Google AI pioneer, Stanford professor), Marc Raibert (Boston Dynamics
      founder), and Sebastian Thrun (Google X/Waymo founder)—is among the most credentialed in the warehouse
      robotics sector. This governance signal significantly reduces technological risk perception for prospective
      enterprise customers and institutional investors.
    claimRefs: [CO025, CO026, CO027, CO022]

  - calloutType: risk
    title: Execution and Scaling Risk Identified by Analysts
    body: >
      Third-party analysts flag manufacturing capacity, enterprise sales velocity (12–18 month cycles), and customer
      support infrastructure as significant execution blockers. The company has not publicly disclosed revenue, gross
      margin, or cash runway, making independent financial assessment difficult. Customer concentration (FedEx) adds
      dependency risk.
    claimRefs: [CO037, CO038, CO039]

  - calloutType: insight
    title: FedEx Partnership Doubles as Distribution and Moat
    body: >
      FedEx's simultaneous role as lead investor in the Series C and commercial partner for FedEx Fulfillment creates
      a powerful distribution moat: Nimble gains access to FedEx's 130+ North American warehouses and $88B revenue
      customer base, while FedEx gains a differentiated autonomous fulfillment capability. This dual investor/customer
      relationship is rare and structurally difficult for competitors to replicate.
    claimRefs: [CO021, CO022, CO042]

