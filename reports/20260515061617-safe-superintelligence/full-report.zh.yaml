  - number: 2
    title: 市场分析
    sections:
      - number: '2.1'
        title: 市场边界与定义
        blocks:
          - type: paragraph
            body: >
              AI 市场没有公认边界，这种模糊对任何市场规模测算都很关键。

              本分析中的相关市场包括四个板块：（1）基础模型训练与推理——开发和部署支撑现代 AI 服务的大规模神经网络；（2）AI 安全研究与工具—— 解释性、对齐、评估和红队能力，这些能力正越来越多地被政府、监管者和 AI
              实验室要求；（3）AI 合规与治理技术——由 EU AI Act 和 NIST AI Risk Management Framework 催化的审计、认证和风险管理软件；（4）AI 硬件与云算力——GPU 和
              TPU 基础设施，是基础模型开发 必不可少的供给侧投入。主要总可用市场（TAM）不包括把 AI 当作一个功能嵌入的通用企业软件应用（例如嵌入 AI 的 CRM）、 AI 驱动的消费产品，以及并非专门面向 AI
              的网络安全工具。基础模型的现状替代方案包括传统机器学习流水线、基于规则的专家系统， 以及高人力密集型流程；在受监管、成本敏感的垂直行业里，这些替代方案仍然是有意义的竞争对手。SSI 的使命是打造安全超级智能，
              它由此站在前沿基础模型开发与高级 AI 安全研究的交汇处；这意味着，若公司最终打开市场机会，可能横跨上述四个板块。
