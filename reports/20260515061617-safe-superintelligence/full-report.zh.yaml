      - number: '1.5'
        title: 关键里程碑与公司沿革
        blocks:
          - type: paragraph
            body: >
              SSI 的公司历史很短，却事件密集，映照出前沿 AI 赛道的高速节奏。2024 年 6 月 19 日，公司正式面向外界宣布； 同一天，Sutskever 在 X 上确认自己离开
              OpenAI，转向一个“对我个人有意义的项目”。宣布后数月， SSI 即在 2024 年 9 月完成 $1B 种子轮融资，拿钱速度在创业史上罕见。整个 2024 年下半年，公司几乎完全隐身：
              没有发表研究论文，没有公开技术声明，也没有披露产品路线图。这种不透明既吸引投资者，也偶尔引发怀疑；一些批评者质疑 SSI 的命题究竟有实质内容，还是主要是为了融资打造的品牌叙事。2025 年 2–3
              月，Greenoaks 领投后，SSI 估值从 $5B 跳至 $30B。2025 年 4 月，公司迎来第一个重要公开合作：Google Cloud 宣布将担任 SSI 的主要算力提供方， 为 AI 研发提供
              TPU 芯片。2025 年上半年，Meta Platforms 试图整体收购 SSI；据报道，Sutskever 拒绝了该提议， 释放出坚持独立的信号。2025 年 7 月，联合创始人 Daniel Gross
              离开 SSI，加入 Meta Superintelligence Labs； 这个 Meta 新 AI 部门部分建立在从 SSI 和其他实验室吸纳的人才之上。Gross 离职后，Sutskever 正式被任命为
              CEO。 截至 2026 年 5 月，SSI 仍处于研究模式，没有公开产品发布，并维持史上资本最充裕的隐身 AI 研究实验室姿态。
            claimRefs:
