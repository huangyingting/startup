      - number: '3.2'
        title: 能力、定价与分销对比
        blocks:
          - type: paragraph
            body: |
              按能力看，截至 2026 年 5 月，SSI 披露的技术产出为零。Anthropic、OpenAI、Google DeepMind 和 xAI 都已有公开部署的前沿模型，
              可以被基准测试、评估和购买。OpenAI 的 GPT-4o 与 o3 系列、Anthropic 的 Claude 3.5 与 3.7 系列、Google 的 Gemini 1.5 与 2.0 Ultra、
              xAI 的 Grok 3，代表当前前沿。各提供商价格持续压缩：2023 至 2025 年间，OpenAI 的 GPT-4 级模型输入 token 价格下降超过 90%，
              背后是效率提升和竞争压力。Mistral 提供开放权重模型，边际推理成本几乎为零，对商业 API 市场价格形成下压。Meta 的 Llama 家族
              （Llama 2、Llama 3.1、Llama 3.3）开源且免费可用，为商业定价设置了地板。Google DeepMind 受益于与 Google Cloud 的垂直整合，
              在所有竞争对手中拥有最低的有效算力成本。SSI 没有定价、没有 GTM 动作、没有分销渠道——无法在商业维度上与任何同行比较。
              它未来可能的分销渠道只有 API 访问、许可和政府合同，而且全部仍属推测。信任与监管姿态在纸面上对 SSI 更有利：
              它明确的安全优先使命，以及拒绝在没有安全保证前部署，与 EU AI Act 系统性风险监管和 NIST AI RMF 采用方向一致。
              Anthropic 的公益公司（Public Benefit Corporation）结构是最接近的治理类比，但 Anthropic 通过具约束力的治理文件作出了更明确承诺。
