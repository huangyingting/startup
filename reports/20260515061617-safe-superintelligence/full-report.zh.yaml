  - number: 7
    title: 风险
    sections:
      - number: '7.1'
        title: 技术执行与使命可行性风险
        blocks:
          - type: paragraph
            body: |
              SSI 面临的最根本风险，是它的使命可能在任何合理时间表内都无法实现，甚至根本无法实现。按 SSI
              的定义，安全超级智能既要在所有相关领域达到人类级或超人类认知表现，又要同时满足一个尚未定义、
              但大概率极高的安全标准。科学界并没有共识认为这能在某个特定时间内实现；专家群体的估计从 5 年
              到永远不会实现都有。AI 安全研究社区已经指出，从当前 AI 系统通往安全超级智能，中间横着几个
              未解决的技术问题：对齐问题（确保先进 AI 系统在分布漂移下仍按人类价值行动）、可解释性问题
              （理解先进 AI 系统内部到底在计算什么）、可扩展性问题（扩大 Transformer 架构是否能无限期带来
              能力提升），以及安全—能力权衡问题（安全约束是否会带来能力惩罚，而没有这些约束的竞争实验室
              不必承担）。SSI 对这四个问题的技术路径都未知，因为 SSI 没有发表任何研究。没有公开研究就留下
              认知空白：外界无法判断 SSI 的安全方法论可信、创新，还是不足。风险不只是 SSI 失败——更是公司
              花掉 $3B+ 做研究，却产出零篇可发表洞见、零技术成果、零可证明进展；与此同时，竞争者在发表、
              部署和迭代。SSI 的隐身姿态取消了外部同行评审这个纠错机制。如果 SSI 的研究方法有缺陷，它可能
              要等到投入多年和数十亿美元之后才发现，而且得不到更广泛 AI 安全社区的外部纠偏。关键执行风险
              还包括没有产品反馈回路（不部署就没有真实世界性能数据），以及 SSI 的时间表假设可能系统性乐观。
