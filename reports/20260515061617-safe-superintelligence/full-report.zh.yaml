        - from: phase-2
          to: phase-3
        - from: phase-3
          to: phase-4
        - from: phase-4
          to: success
        - from: phase-4
          to: failure
        - from: phase-1
          to: failure
        - from: phase-2
          to: failure
        - from: phase-3
          to: failure
    approximationNotes: 时间线仅作说明。SSI 可能在任一阶段成功或失败退出，不必遵循该顺序。
