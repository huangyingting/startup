companyProfile:
  summary: >
    Safe Superintelligence Inc.（SSI）是一家专注 AI 安全的纯研究实验室，由 Ilya Sutskever（OpenAI 前首席科学家）、 Daniel Gross（Apple 前机器学习负责人、YC
    前合伙人）和 Daniel Levy（OpenAI 前研究员）于 2024 年 6 月创立。 公司唯一公开目标是打造「安全超级智能」——一个能力超过任何现有系统、且设计上内生安全的 AI 系统。SSI 已完成两轮融资， 累计约
    $3B，最高估值达 $30B（2025 年 3 月）；公司约有 50 名顶尖研究员和工程师，在 Palo Alto 和 Tel Aviv 运营。 截至 2026 年 5 月，SSI
    没有产品、客户、收入，也没有发表研究论文。其计算基础设施主要由 Google Cloud（TPU）提供。 公司刻意保持隐身，几乎不披露研究方向或方法论的技术细节。
