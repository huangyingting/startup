      - number: '7.2'
        title: 关键人物、结构与财务风险
        blocks:
          - type: paragraph
            body: |
              SSI 的关键人物风险极度集中在 Ilya Sutskever 身上。整家公司的估值、投资论点和人才吸引
              策略，都依赖 Sutskever 继续参与。OpenAI 有分布式领导团队和董事会治理，Anthropic 有 Dario 和
              Daniela Amodei 以及庞大的高管层；相比之下，SSI 的公众身份和技术愿景几乎完全等同于 Sutskever。
              Daniel Gross 带来运营和投资人网络信用；Daniel Levy 带来优化研究专长。但如果没有 Sutskever，
              两人都不太可能支撑公司维持当前估值。Sutskever 一旦离开——无论是自愿、健康原因、地缘政治限制，
              还是被竞争对手招走——都可能触发投资人重新评估估值，甚至导致融资冻结。结构上，SSI 是一家
              Delaware C-corporation，并带有公益公司特征；约束投资人权利、创始人控制和使命保护
              的具体法律结构尚未公开披露。关键结构风险包括：缺少独立于创始人的董事会（未披露董事会构成）、
              缺少财务控制（没有 CFO，也未披露审计职能）、缺少研究项目治理机制（没有 SAB，也没有外部技术
              评审），以及没有 Sutskever 的继任计划。短期财务风险由已融到的 $3B 管住——按前沿 AI 规模的算力
              加人才成本估算，年烧钱速度为 $1–2B，SSI 从 2025 年 3 月轮次关闭起约有 2–3 年资金续航。下一轮融资
              必须在 2027 年 12 月前完成；如果融不到，结果就是终局。零收入模式意味着没有财务自给的备用路径；
              SSI 完全依赖 VC 继续支持。
