  - number: 4
    title: 财务情况
    sections:
      - number: '4.1'
        title: 收入模型与 GTM 动作
        blocks:
          - type: paragraph
            body: |
              截至 2026 年 5 月，Safe Superintelligence Inc. 没有收入、没有收入模型，也没有披露商业化时间表。公司声明的商业模式，
              是把打造安全超级智能作为唯一目标，明确拒绝竞争对手面对的商业产品压力。这是刻意且结构性的选择：SSI 的创立理念认为，
              收入义务和短期商业压力会破坏安全优先的研究环境。因此，收入缺位并不是 SSI 自身内部框架下的失败指标，而是未来可见时期内预期的运营状态。
              SSI 达成研究目标后可能选择的未来收入模型包括：前沿 AI 能力 API 许可（类似 OpenAI 的 API 业务）、向企业客户和政府直接许可、
              围绕模型权重或衍生品的版税安排，以及面向国家安全 AI 研究的政府合同。但这些路径没有任何一个被披露，甚至也没有被公开暗示。
              SSI 没有销售团队、没有营销职能、没有客户成功组织、也没有合作伙伴生态；这意味着即使今天有产品，也没有将其变现的上市基础设施。
              因为没有客户，也就没有获客成本（CAC）或回本周期指标。因为没有留存关系可衡量，也就没有客户终身价值（LTV）或净留存率（NRR）指标。
              公司完全运行在投资者命题之上：按安全优先标准推进的前沿 AI 研究，最终会产出值得变现的资产。
