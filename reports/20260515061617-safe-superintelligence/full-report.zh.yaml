    title: 公司概况
    sections:
      - number: '1.1'
        title: 创立故事与使命
        blocks:
          - type: paragraph
            body: >
              Safe Superintelligence Inc. 于 2024 年 6 月 19 日成立，距离 Ilya Sutskever 正式离开 OpenAI 约一个月。 OpenAI 是他在 2015
              年共同创立、并担任首席科学家的公司。Sutskever 离职前，OpenAI 在 2023 年 11 月爆发董事会危机： 他先投票罢免 CEO Sam Altman，随后又转向，签署要求 Altman
              复职的公开信。这场风波暴露了 OpenAI 内部对 AI 安全优先级与商业化之间的深层分歧；Sutskever 将这种裂痕视为创办 SSI 的核心原因。Sutskever 与两位联合创始人 Daniel
              Gross（Apple 前 AI 业务负责人、Y Combinator 前合伙人）和 OpenAI 前研究员 Daniel Levy 一起，在社交媒体上宣布 SSI，标语是：“超级智能已触手可及。”
              公司的创立命题直接而激进：没有商业产品、没有收入义务、没有短期期限， SSI 就能把安全超级智能当作一个纯技术问题推进。SSI 认为，隔绝商业压力之后，安全与能力可以同步提升，而不是相互牺牲。 SSI
              注册为营利实体，不同于 OpenAI 最初的非营利结构；投资者持有的本质上是一张押注 AGI 或超级智能问世的股权期权。 创始团队把运营分设在 California 的 Palo Alto 和 Israel 的
              Tel Aviv，借助 Gross 与 Sutskever 深厚的以色列关系， 从两个中心招募顶尖技术人才。
