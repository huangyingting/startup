      - number: '7.3'
        title: 监管、竞争与系统性风险
        blocks:
          - type: paragraph
            body: |
              SSI 的监管风险带有悖论：作为一家尚未部署、尚未商业化、聚焦安全的实验室，它面临的即时监管审视
              少于 OpenAI 或 Google DeepMind。但监管方向正在转向加强对所有前沿 AI 开发的监督，而不只是监督
              部署。EU AI Act（2024 年 8 月生效）、美国 AI 行政命令，以及 G7 和英国 AI Safety Summit 层面
              正在形成的国际 AI 安全框架，都指向对前沿 AI 开发提出强制评估、披露，甚至许可要求。SSI 的隐身
              姿态——不发表、不披露、不配合任何外部评估——正越来越难以适配新兴监管环境。如果监管者要求前沿
              模型在部署前接受强制评估（类似药物试验），SSI 的产品就无法部署，除非经过大量第三方安全评估；
              但 SSI 内部安全方法论尚未被验证能满足这类要求。竞争风险重大且在上升。OpenAI、Anthropic 和
              Google DeepMind 都在推进前沿 AI 研究，团队规模大得多（100–1,000+ 名研究员），已有部署产品能
              产生真实世界数据和收入，也有活跃的安全研究项目通过发表获得外部验证。SSI 50 人团队和单一产品
              聚焦，把公司压在一项单一赌注上。如果任何竞争者先于 SSI 实现定性能力突破——尤其是能展示安全
              属性的突破——SSI 作为「安全优先」实验室的价值主张就会坍塌。系统性风险还包括地缘政治情景：SSI
              的 Palo Alto + Tel Aviv 运营模式暴露于美国—以色列地缘政治动态、算力硬件潜在出口管制限制，以及
              人才流动限制。SSI 没有披露任何网络安全框架，意味着它唯一的资产——研究成果——可能容易遭到国家级
              间谍活动攻击；Financial Times 报道也明确提示了这一风险。
