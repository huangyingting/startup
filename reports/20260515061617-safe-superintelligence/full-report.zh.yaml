  - number: 3
    title: 竞争格局
    sections:
      - number: '3.1'
        title: 竞争格局概览
        blocks:
          - type: paragraph
            body: |
              SSI 身处竞争极其激烈的前沿 AI 生态，却没有收入、没有已部署模型，也没有披露任何可用于差异化的研究产出。竞争集合分为三层。
              第一层是占主导地位的基础模型既有玩家：OpenAI（成立于 2015 年，累计融资超过 $30B，2025 年收入 $13.1B，约 3,000 名员工，
              GPT-4o 和 o 系列模型已部署）、Google DeepMind（Alphabet 子公司，算力几乎不设上限，全球约 10,000 名 AI 员工，Gemini 模型家族）、
              Anthropic（成立于 2021 年，累计融资约 $7.3B，估值 $18.4B，约 1,500 名员工，Claude 模型已商业部署；安全优先使命与 SSI 最相近）。
              第二层包括 xAI（Elon Musk，融资 $6B，估值 $50B，Grok 模型，媒体存在感强）、Meta AI（内部实验室，拥有 Llama 开源模型家族；
              2025 年 7 月为 Meta Superintelligence Labs 吸纳 SSI 联合创始人 Daniel Gross），以及 Mistral AI（法国创业公司，
              融资约 $1.1B，估值约 $6B，具备开源和欧洲存在感）。第三层包括 Cohere 这类企业导向 AI API 提供商（融资约 $500M，NLP 企业 API），
              以及不断增加的专业实验室。SSI 的定位只有一点独特：它没有已部署产品，并明确拒绝在安全目标达成前构建产品。这种纯粹性既可能是护城河，
              也是根本性的商业负担。
