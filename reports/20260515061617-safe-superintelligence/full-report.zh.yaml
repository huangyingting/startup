      - number: '5.3'
        title: 差异化、安全定义与信任姿态
        blocks:
          - type: paragraph
            body: |
              SSI 的主要技术差异点不是已验证技术，而是一项使命承诺：它声称从第一性原理同时开发安全与能力，而不是把安全事后补装到一个有能力的系统上。
              Sutskever 公开主张，这种方法类似核反应堆安全：安全被内置进反应堆设计，而不是作为外部防护事后添加；因此，它会比竞争对手路线得到质量上更安全的结果。
              这个论点有逻辑价值，但还没有任何技术产出验证。SSI 很可能在推进的实际安全技术——解释性研究、神经网络内部机制透明性、训练期对齐方法、
              以及宪法式或基于流程的监督——都是 Anthropic、DeepMind Safety 和学术机构正在活跃研究的领域。SSI 在这些方向上没有可观察的技术护城河，
              因为它什么都没有披露。不发表研究本身就是风险：如果 SSI 正在探索非标准方法，缺少同行评议会让错误在没有外部纠偏的情况下累积。
              如果 SSI 只是在私下推进标准方法，那么护城河主要是速度和规模，而不是方法论。Daniel Levy 在 OpenAI 的优化研究背景表明，
              SSI 可能拥有训练效率优势，可以降低单位能力增益所需算力——这可能是重要的经济和竞争差异点。不过，这完全是推测。SSI 的信任和合规姿态很薄：
              公司没有披露安全委员会、外部红队计划、NIST 或 AISI 安全认证、负责任披露政策，也没有事故响应计划。因此，按第三方标准看，
              SSI 是最难治理的前沿 AI 实验室之一，尽管它声称自己最重视安全。
