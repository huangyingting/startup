      - number: '8.3'
        title: 反向估值观点与投资论点的关键风险
        blocks:
          - type: paragraph
            body: |
              多个可信来源的反向观点挑战 $30 billion 估值。Financial Times 认为，使命—商业悖论让 SSI 在结构上
              无法产生任何传统基础上足以支撑估值的现金流，投资人承担了彩票式风险，却没有充分定价。The Wall
              Street Journal 形容 SSI「没有产品、没有客户，短期内也没有计划拥有任何一个」——把该估值界定为
              机构规模上的投机叙事。The Economist 指出一个估值陷阱：在 $30B+ 估值下，SSI 下一轮融资必须维持
              或超过这个数字，而这要求展示技术进展；但 SSI 的隐身姿态让外部无法验证。投资论点的具体风险包括：
              （1）创始人离开——按 WSJ 分析，Sutskever 离开可能触发 50–80% 估值修正；（2）竞争者突破——如果
              OpenAI 或 Anthropic 先于 SSI 实现 AGI，SSI 未来产品的理论价值会坍塌（第二名很少能捕获可比价值）；
              （3）监管阻断——如果超级智能因监管框架无法合法部署，无论技术是否成功，商业兑现价值都是零；
              （4）使命漂移——如果投资人迫使商业转向，SSI 会失去差异化定位，却不一定拿到可部署产品；
              （5）资本耗尽——若 2027 年底前无法完成下一轮融资，结果就是终局。汇总下行情景——多个风险同时兑现——
              会让当前投资人几乎全损。考虑到结果的二元性（成功：可能具备变革性；失败：回收接近零），这个估值
              只能作为前沿 AI 押注多元化组合中的小仓位成立，而不适合作为集中投资或锚定投资。
