            body: |
              SSI 已通过两轮已披露融资累计募集约 $3B：2024 年 9 月估值 $5B 的 $1B 轮（Sequoia、a16z、DST Global 和 SV Angel 领投），
              以及 2025 年 3 月估值 $30B 的 $2B 轮（Greenoaks Capital 领投）。两轮条款——投资者权利、优先股结构、治理条款、董事会组成、
              清算优先权和信息权——均未公开披露；对任何外部分析师来说，这是一个实质性信息缺口。按每年 $200–600M 的估计烧钱速度，
              已募集的 $3B 在高烧钱和低烧钱情景下分别提供约 5 年和 15 年现金跑道。若取 $400M 年烧钱的中位估计，现金跑道自 2025 年 3 月融资日算起
              约 7.5 年；理论上，公司可以运营到约 2032 年再耗尽现有资本。不过，这一现金跑道估计假设烧钱速度不变；实际轨迹很可能随模型规模扩大而阶梯式上升。
              随着前沿训练运行扩大到每次需要 $100M 或更多——Epoch AI 数据支持这一趋势——几年内，仅年度算力成本就可能超过当前融资所能覆盖的水平，
              因而公司需要在任何商业产品出现前，至少再完成一次重大融资。公司未披露债务、项目融资或政府拨款。融资风险高度集中：
              如果 AI 投资环境恶化，或 Sutskever 离开公司，按可比估值继续融资的能力并不确定。$30B 估值意味着投资者相信 SSI 的研究最终会创造
