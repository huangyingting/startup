      - number: '2.2'
        title: 市场规模：TAM、SAM 与 SOM 三个视角
        blocks:
          - type: paragraph
            body: >
              全球 AI 市场规模因分析方法和范围定义不同而差异显著。Bloomberg Intelligence 和多家研究机构估计， 2024 年全球 AI 市场约为 $184B，覆盖硬件、软件和服务。Goldman
              Sachs 与 Bloomberg 预计，到 2030 年该市场将达到 约 $826B，隐含复合年增长率约 28%。这些数字覆盖从芯片到应用的完整 AI
              技术栈。更窄的基础模型子市场——覆盖最大规模的训练和推理算力—— 按行业分析估计，2024 年约为 $10B 至 $15B；随着模型规模和部署快速扩张，它的增长速度快于整体市场。Epoch AI
              对训练算力成本的实证分析发现， 目前最大规模训练运行每次需要 $50M 到超过 $100M；前沿模型的算力需求大约每 6 到 12 个月翻倍一次，压缩了资金不足的新进入者窗口。 AI
              安全研究市场仍处萌芽期：政府和学术资金构成大部分支出，2023–2024 年全球估计为 $500M 至 $2B；商业安全工具规模低于 $1B。 按传统口径，SSI
              目前的可服务市场（SAM）为零——公司没有产品，也没有收入。其潜在可获取市场（SOM）完全取决于它能否达成研究目标， 并随后选择变现；届时它可能进入上述四个市场板块中的任意一个或全部。最有意义的最终变现可比对象是
              Anthropic： 它从同样以纯安全研究为起点的路径中，做出了约 $3B 的 ARR。
