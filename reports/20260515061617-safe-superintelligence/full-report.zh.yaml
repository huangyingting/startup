      - number: '1.4'
        title: 融资历史与投资者基础
        blocks:
          - type: paragraph
            body: >
              SSI 的融资轨迹是 AI 创业史上最醒目的一条。2024 年 9 月，也就是创立仅三个月后，SSI 披露 $1B 种子轮融资， 估值 $5B。领投阵容包括 Sequoia Capital、Andreessen
              Horowitz（a16z）、DST Global 和 SV Angel。 这笔 $1B 融资几乎没有任何运营历史支撑，完全靠 Ilya Sutskever 的信誉与 SSI 使命本身撑起。到 2025 年 2
              月， Reuters 报道 SSI 正在洽谈新一轮融资，公司估值将达到 $20B。2025 年 3 月，Wall Street Journal 确认 SSI 完成 约 $2B 融资，由 Greenoaks
              Capital 领投，公司估值 $30B——是 2024 年 9 月估值的 6 倍；当时公司约有 20 名员工。 据报道，投资者把 Sutskever 的个人声誉与技术履历视为该估值的主要依据。两轮合计融资约
              $3B。尽管没有收入和产品， SSI 已跻身全球最有价值的 AI 创业公司之一，仅落后于 OpenAI（2025 年末估值 $500B），并接近 Anthropic 的估值。
              这些资金指定用于算力基础设施、人才招聘和研究运营。SSI 未披露烧钱速度，但考虑到前沿 AI 研究成本，估计规模相当可观。
