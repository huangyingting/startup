    title: 随时间演进的风险流程
    type: flow
    summary: SSI 从 2026 年到产品完成的连续风险演变，展示风险画像如何随时间切换。
    data:
      nodes:
        - id: phase-1
          label: 阶段 1（2026–2027）：执行风险主导——SSI 能否取得研究进展？
        - id: phase-2
          label: 阶段 2（2027–2028）：财务风险浮现——SSI 能否融到下一轮？
        - id: phase-3
          label: 阶段 3（2028–2030）：竞争风险加剧——SSI 会不会被超越？
        - id: phase-4
          label: 阶段 4（2030+）：监管风险具体化——SSI 能否部署产品？
        - id: success
          label: 成功情景：产品部署，使命达成
        - id: failure
          label: 失败情景：放弃使命，或以困境估值被收购
      edges:
        - from: phase-1
