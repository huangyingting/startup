      - number: '5.2'
        title: 技术架构与运营基础设施
        blocks:
          - type: paragraph
            body: |
              SSI 已确认的基础设施，是通过 2025 年 4 月与 Google Cloud 的合作建立的 Google Cloud TPU 算力集群。TPU（Tensor Processing Unit）
              是 Google 自研 ASIC，为大规模矩阵乘法工作负载优化；矩阵乘法正是基于 transformer 的大语言模型训练中的核心计算原语。
              Google Cloud 在 2024–2025 年向外部客户和合作伙伴开放的 TPU v5 与 v6 代际，代表该硬件的当前代，能为前沿规模模型提供有竞争力的训练吞吐。
              SSI 选择 Google Cloud TPU，而不是行业标准的 Nvidia GPU 集群，这一点值得注意：它让公司深度依赖 Google 的硬件架构和软件栈
              （XLA compiler、JAX framework）；这套栈不同于多数 AI 研究员使用的 PyTorch/CUDA 栈。这一架构选择可能反映出更有利的算力价格、
              个人关系（Sutskever 曾与 Google Brain 校友大量共训），或出于对 TPU 栈计算效率优势的战略偏好。考虑到 TPU 依赖，
              可能的软件框架是 JAX（Google 的函数式机器学习框架），但这并未确认。训练数据管线——网页抓取、精选数据集或专有数据采购——完全未披露。
              SSI 的技术运营模式要求 Palo Alto 与 Tel Aviv 办公室持续协同；这种规模的远程研究协作需要稳健的版本控制、实验跟踪
              （可能是 MLflow 或 Weights & Biases）和分布式训练基础设施。上述运营细节没有任何一项被公开披露。知识产权姿态也未知：
              SSI 未披露专利申请、模型权重版权登记或训练数据许可协议，导致公司研究产出最终知识产权价值高度不透明。
