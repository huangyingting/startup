      - number: '4.2'
        title: 成本结构与烧钱速度估计
        blocks:
          - type: paragraph
            body: |
              SSI 的成本结构由两类支出主导：算力和人才。算力端，公司 2025 年 4 月与 Google Cloud 的合作让它能使用 TPU v5 与 v6 基础设施；
              具体条款没有公开披露，但基于 Epoch AI 记录的可比前沿训练运行成本和公开定价基准，估计年成本在 $100M 到 $500M 之间，
              取决于训练运行的规模和频率。训练一个可比 GPT-4 或 Claude 3 的前沿规模模型，现在每次大约要花 $50M 到 $100M 或更多；
              一家每年进行多次训练运行的研究实验室，会很快触及该区间高端。人才端，截至 2025 年中，SSI 约有 50 名员工——刻意保持精干、精英化。
              按前沿 AI 研究岗位的典型薪酬水平（基本工资加股权，资深研究员总年薪 $500,000 到 $1M 或更高），年度人员成本约为 $25M 到 $50M。
              合计看，估计总年度烧钱约为 $200M 到 $600M；区间很宽，反映出训练频率未披露，以及 Google Cloud 合同条款的不确定性。
              除算力和人员之外的运营费用——Palo Alto 与 Tel Aviv 办公空间、差旅、设备和行政开销——相对算力账单较小，每年也许再增加 $10–20M。
              SSI 没有产品收入，因此没有销货成本。毛利率也不适用；资本充足性分析完全取决于烧钱速度和现金跑道。
