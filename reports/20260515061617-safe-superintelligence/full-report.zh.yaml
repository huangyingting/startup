      - number: '2.3'
        title: 买方与细分市场地图
        blocks:
          - type: paragraph
            body: >
              基础模型能力和 AI 安全服务的买方可分为五个重要细分。超大规模云厂商——Amazon AWS、Microsoft Azure 和 Google Cloud——
              同时是基础模型能力的用户、基础设施提供方和转售方，AI 支出嵌入由资深工程领导掌握的数十亿美元云预算。企业科技公司是增长最快的 商业细分；McKinsey 2024 Global AI Survey 显示，55%
              的大型企业至少在一个业务职能中使用 AI，采用动因来自成本效率和竞争压力， 预算归 CTO 和 CIO 管。政府和国防买方增长很快，动因是国家安全任务，以及 US CHIPS Act、EU AI Act
              等法规要求；采购周期长， 安全许可要求带来高切换成本。AI 研究实验室——包括 Anthropic、xAI、Mistral 和 Cohere——是算力和安全评估能力的直接买方；
              它们的预算由创始人与董事会控制，时间视角比商业企业更长。学术机构购买价格可负担的推理和训练 API，资金来自 NSF、NIH 和 DARPA 拨款；预算规模有限，但对安全规范和人才管线影响很大。SSI
              目前没有买方关系，也没有渠道。从研究走到收入，必须先拿出可验证的技术结果， 再搭建分销能力；无论研究质量如何，这都是一个多年挑战。
