  - number: 6
    title: 客户情况
    sections:
      - number: '6.1'
        title: 客户版图：谁会购买超级智能？
        blocks:
          - type: paragraph
            body: |
              Safe Superintelligence 没有客户。它没有卖出任何东西，没有执行任何商业合同，没有签署任何意向书，也没有披露任何具名潜在买方。
              这不是疏忽，也不是时点问题，而是公司的刻意结构性特征。SSI 的创立章程明确排除了中间产品销售；公司打算只发布一个完成的安全超级智能，
              而不是向中间模型提供 API 访问。因此，本章的客户分析完全是推测：它基于当前 AI 采购模式的类比，推演如果一个超级智能产品在
              2028–2032 年时间框架内完成，谁可能合理购买。最可能的三个买方细分是：（1）追求战略 AI 优势的政府和国家安全机构，
              （2）希望把超级智能能力整合进现有基础设施的大型科技平台，（3）寻求获得可改变科学研究能力的研究机构或国际组织。
              每个细分的采购机制、合同要求和部署约束都截然不同。美国政府——尤其是 Department of Defense、Intelligence Community 和 DARPA——
              是最自然的早期买方原型：它已表现出为战略 AI 优势付费的意愿，拥有敏感军民两用技术的采购渠道（ITAR 管制框架、OTA 合同），
              也具备控制一个具有潜在生存风险系统部署的监管能力。政府买方原型也与 SSI 的“核安全”类比一致——核武器和核电站都由政府控制；
              超级智能若采用类似治理模式，采购自然会集中在主权实体。企业科技买方（云服务商、大型软件平台）代表第二条路径：
              Microsoft（OpenAI 股权伙伴）、Google（SSI 算力伙伴）、Amazon 和 Meta 这样的公司，都有强烈战略动机去收购或许可超级智能能力。
              但 SSI 的使命约束，可能会禁止按其投资者接受的条款进行商业许可。
