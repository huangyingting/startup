      - number: '3.3'
        title: 护城河耐久性、切换成本与锁定效应
        blocks:
          - type: paragraph
            body: |
              以 SSI 当前阶段看，护城河分析大多是假设。公司没有已部署产品、没有客户关系、没有已验证技术产出；也就是说，它的护城河完全由三部分构成：
              （a）创始人声誉与人才集结，（b）未来研究可能形成的知识产权，（c）使命纯粹性，它向监管者和未来企业买方释放安全承诺信号。
              如果没有技术产出配合，这三项都很窄，也不耐久。Anthropic 的护城河成熟得多：它把 Constitutional AI 作为已发表且差异化的安全对齐方法；
              拥有不断增长的企业客户群和多年合同（切换成本：中高）；Amazon 和 Google 是其战略基础设施投资方；PBC 治理结构在法律上绑定安全承诺。
              OpenAI 拥有最强的分销护城河——ChatGPT 数亿用户、通过 Microsoft 合作深度整合 Azure，以及围绕 GPT-4 级模型构建的 API 生态，
              其中已有数十万企业应用。Google DeepMind 借 Alphabet 的 TPU 基础设施投资，拥有难以击败的算力护城河。xAI 受益于 Elon Musk 的
              X 平台分发（约 250M 用户）和 Tesla 数据访问。在当前市场阶段，多归属很常见：企业买方经常并行评估多个基础模型，这意味着先发锁定尚未决定胜负。
              但随着微调、RAG 流水线和应用层集成加深，切换成本会上升。SSI 进入这个市场时有严重的时点劣势——每延迟一个季度，既有玩家形成的锁定都会加深。
