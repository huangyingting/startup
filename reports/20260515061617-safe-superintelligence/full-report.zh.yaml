  - number: 8
    title: 估值
    sections:
      - number: '8.1'
        title: 估值背景：零收入对应 $30B
        blocks:
          - type: paragraph
            body: |
              Safe Superintelligence 在 2025 年 2–3 月融资轮中的估值为 $30 billion（Bloomberg），该轮最终融资
              $3 billion。相比 2024 年 9 月确立的 $5 billion 种子阶段估值，短短六个月上涨 4 倍。$30 billion
              估值让 SSI 成为全球估值最高的私营科技公司之一——可比对象是那些年收入数十亿美元、已经成熟盈利的
              公司——但 SSI 本身没有收入，也没有商业产品。投资人明确把这笔估值解释为一场期权式押注：如果 SSI
              成功做出安全超级智能，结果价值将按万亿美元计，而不是十亿美元计。按 10% 成功概率（一些 VC 隐含
              使用的粗略估计），$30 trillion 结果乘以 10% 概率，得到 $3 trillion 期望价值——如果同时接受这两个
              假设，$30 billion 看起来反而保守。不过，这套分析要求接受三点：（1）所称成功概率合理；（2）SSI
              能捕获超级智能总价值中的有意义份额；（3）从现在到任何退出之间，投资人的股权不会被大幅稀释。
              三个假设都高度可争议。Financial Times 认为，这个估值制造了结构性悖论：在 $30B 估值下，投资人
              隐含期待商业回报，但 SSI 章程主动抵抗会产生这些回报的商业压力。The Wall Street Journal 指出，
              SSI 实际上被定价成一张风投彩票——风险画像也是彩票式——却卖给通常需要更可预测回报的机构投资者。
            claimRefs:
              - CV001
              - CV002
              - CV003
              - CV004
              - CV005
