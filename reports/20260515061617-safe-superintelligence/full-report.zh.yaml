      - number: '2.4'
        title: 增长驱动因素与采用约束
        blocks:
          - type: paragraph
            body: |
              AI 安全市场的首要增长驱动，是监管强制要求。EU AI Act 于 2025 年生效，把训练算力超过 10^25 FLOPs 的基础模型纳入系统性风险条款，
              要求所有面向 EU 的 AI 开发者承担强制安全评估和合规义务。NIST AI Risk Management Framework 于 2023 年 1 月发布，正在塑造企业
              AI 采购标准，并催生风险管理工具的早期市场。UK AI Safety Institute 于 2023 年 11 月成立，EU 和 US 的类似机构也代表了政府对
              AI 安全评估能力的需求；如果 SSI 选择服务该市场，其研究产出可能切入这一需求。OECD 记录了 70 多个国家 AI 战略，显示由政策驱动的
              市场建设正在广泛展开。需求端，企业 AI 采用正在加速：McKinsey 报告称，截至 2024 年，受访大型企业中超过一半至少在一个职能中使用 AI。
              采用约束同样很重。资本密集度是最高的结构性门槛：前沿模型每次训练运行成本为 $10M 到 $100M 或更高；按每美元 FLOPs 计，算力成本在下降，
              但随着模型规模扩大，绝对支出仍在上升。全球合格 AI 安全研究员估计只有 1,000 到 3,000 人；这是严峻的供给约束，影响包括 SSI 在内的所有实验室。
              受监管行业的信任赤字显著拖慢企业采用。企业在自有 API 和微调模型上深度建设后，切换成本上升，潜在锁定风险随之出现。美国监管不确定性也是
              一个重要约束：尚未落地的联邦 AI 立法可能限制前沿开发，或要求新的合规基础设施。
