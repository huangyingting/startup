      - number: '1.3'
        title: 商业模式与组织结构
        blocks:
          - type: paragraph
            body: >
              SSI 是全球最反常的 AI 创业公司：一个纯研究实验室，没有商业产品、没有披露的收入来源、没有客户，也没有近期创收计划。 公司采用营利公司结构，可以接受风险资本投资并向员工授予股权，但创立理念明确拒绝
              OpenAI、Anthropic、Google DeepMind 等竞争对手所承受的产品驱动压力。按照 SSI 公开的创立声明，其商业模式意味着“安全、安全保障与进步”都能
              与短期商业压力隔离。公司只聚焦一件事：“一个目标、一个产品：安全超级智能。” 这不是聊天机器人、 API 服务、企业产品或消费应用，而是一场长期 R&D 押注：率先开发出超越人类智能、同时保持安全和对齐的 AI
              系统。 SSI 的组织刻意保持精干——截至 2025 年中约 50 名员工，主要是研究员和工程师。公司没有销售团队、产品经理或营销职能。 SSI 在 California 的 Palo Alto 和 Israel
              的 Tel Aviv 设双总部，方便从全球两个领先 AI 研究生态中深挖人才。 2025 年 4 月宣布的 Google Cloud 合作把 Google Cloud 确立为 SSI
              的主要算力提供方，使公司无需直接持有硬件， 也能使用大规模 AI 模型训练必需的 TPU（Tensor Processing Unit）基础设施。
