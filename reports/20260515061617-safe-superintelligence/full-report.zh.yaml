              Ilya Sutskever 也许是史上履历最硬的创业公司 AI 研究负责人。他共同创建 AlexNet、共同创立 OpenAI，并领导 GPT 系列、DALL-E 和 o1
              研究，几乎站在现代深度学习每一次基础突破的中心。这份履历是 SSI 以约 20 名员工、 零收入拿到 $30B 估值的主要原因；这样的案例在创业史上没有先例。
