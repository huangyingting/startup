      - number: '6.3'
        title: 客户采用风险与反向观点
        blocks:
          - type: paragraph
            body: |
              SSI 的客户风险画像不同于任何传统企业软件公司。首要采用风险不是「客户会不会想买」——真正的
              超级智能需求会非常强——而是「产品在物理上能不能做出来」，以及「公司会在什么条款下允许销售」。
              几个反向观点对客户风险很关键。第一是监管采用风险：一旦部署超级智能，EU AI Act（针对具有
              系统性风险的通用 AI 系统的被禁止 AI 实践）、美国 AI 治理行政命令和国际条约体系都会立刻审视。
              目前没有任何监管框架具备治理已部署超级智能的法律架构，也就是说，无论买方需求多强，监管者都
              可能阻止 SSI 销售产品。第二是使命与商业冲突：SSI 投资人拿到的是一家「在实现安全超级智能前
              不追求商业产品」公司的股权——这条章程约束可能在法律上阻止早期商业化，即便 SSI 想创造收入。
              Financial Times 的分析强调了这个结构性矛盾。第三是买方集中风险：即使 SSI 做出了产品，能够
              负责任部署超级智能的买方也极少。买方集合过于集中，意味着面对单一买方（例如美国政府）时，
              SSI 基本没有定价权，客户集中度风险也会极端放大。第四，如果竞争对手（OpenAI、Anthropic、
              Google DeepMind 或中国实验室）更早做出超级智能，SSI 就会失去先发优势——而且它可能身处一场
              结构上难以取胜的竞赛，因为使命驱动的安全约束会让它比安全意识较弱的竞争者更慢。
