      - number: '8.2'
        title: 可比公司分析与估值方法
        blocks:
          - type: paragraph
            body: |
              标准可比公司分析在 SSI 身上失效，因为没有真正可比对象：没有另一家上市或私营公司同时具备
              （a）零收入，（b）产品前状态，（c）前沿 AI 安全使命，（d）$30B+ 估值。最相关的可比对象是其他早期
              融资阶段的前沿 AI 实验室，但它们都有根本差异。OpenAI 在 Series A 阶段（2019 年 $1B Microsoft
              交易）已有部署产品（GPT-2 已发布）和商业授权收入；该阶段估值约 $3B 到 $5B，比处在结构上更弱
              商业化阶段的 SSI 低 6 倍到 10 倍。Anthropic 在 Series B（2023 年）估值约 $4.1B，当时已有部署的
              Claude 产品和增长中的收入——明显低于商业化程度更低的 SSI。这些可比对象表明，SSI 的溢价无法用
              收入倍数、产品成熟度或团队规模解释。溢价完全来自 Sutskever 的声誉，以及市场感知中 SSI 实现
              超级智能结果的概率和幅度。折现现金流分析做不了：没有可折现现金流，没有披露折现率，没有收入预测，
              也没有产品时间表。概率加权结果分析是最合适的框架，但它要求给使命成功分配概率（据不同专家估计，
              10 年内 10–30%）、给结果赋值（无法估计，但如果 SSI 从超级智能中捕获显著价值，可能是 $1T–$100T），
              并对稀释、监管风险和时间打折。即便使用激进假设（$30T 结果、20% 概率、最终 30% 股权捕获、40%
              折扣），稀释前期望价值约为 ~$1.8T——在假设从当前到该量级退出约有 60:1 稀释的情况下，可以支撑
              当下 $30B 估值。更保守的假设会给出显著低于 $30B 的估值。概率加权分析说明，这个估值在乐观假设下
              可辩护，在悲观假设下不可辩护——与风投组合理论一致。
