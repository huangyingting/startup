      - number: '1.2'
        title: 领导团队与创始人背景
        blocks:
          - type: paragraph
            body: >
              Ilya Sutskever 1986 年出生于俄罗斯 Nizhny Novgorod（当时名为 Gorky），5 岁移民以色列，16 岁又迁往加拿大。 他就读 University of
              Toronto，在“AI 教父” Geoffrey Hinton 指导下获得计算机科学本科、硕士和博士学位。2012 年， Sutskever 共同创建
              AlexNet，这个卷积神经网络点燃了现代深度学习革命；2015 年，他共同创立 OpenAI，并以首席科学家身份 领导 GPT 模型、DALL-E、CLIP 等突破性研究。他还主导了包括 o1
              系列在内的推理模型开发。Sutskever 连续三年获得 NeurIPS Test of Time Award（2022–2024），成为史上被引用最多的计算机科学家之一。他拥有以色列和加拿大国籍。 到 2025
              年 7 月，Sutskever 出任 SSI CEO；Daniel Gross 则在 Meta 试图收购 SSI 未果后，离职加入 Meta Superintelligence Labs。 Gross 1991
              年出生于 Jerusalem，创办 Greplin（后更名为 Cue，这是一款个人搜索引擎，2013 年被 Apple 以约 $40–60M 收购）， 曾担任 Apple 机器学习负责人，作为 Y
              Combinator 合伙人专注 AI，并与 Nat Friedman 共同运营 AI Grant 项目。 Time 100 在 2023 年将 Gross 列为 AI 领域最具影响力人物之一。第三位联合创始人
              Daniel Levy 此前在 OpenAI 优化研究团队任职。 三人把 Sutskever 无可匹敌的深度学习资历、Gross 的创业履历与资本通路、Levy 的对齐研究经验拼在一起；因此，SSI 也许是
              史上创始团队履历最硬的 AI 创业公司。
