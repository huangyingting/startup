  - number: 5
    title: 产品与技术
    sections:
      - number: '5.1'
        title: 产品定义与研究架构
        blocks:
          - type: paragraph
            body: |
              SSI 明确把自己的产品定义为“安全超级智能”——一个在所有相关认知领域超过人类水平、同时满足未定义但大概率极高安全标准的 AI 系统。
              这个产品并不存在。截至 2026 年 5 月，SSI 没有发表研究论文、没有发布模型，也没有向公众披露技术信息。公司采取严格隐身姿态，
              连研究方法、架构选择、安全定义和进展里程碑都不披露。不同于 Anthropic（已发表 Constitutional AI、Responsible Scaling Policy（负责任扩展政策）
              和多篇解释性论文）或 Google DeepMind（广泛发表 Gemini 架构、RLHF 变体和安全技术），SSI 可验证技术产出为零。Sutskever 在公开露面中
              给过一些方向信号：他把 SSI 的安全目标类比为“核安全”——把安全嵌入系统基础设计，而不是事后再加安全过滤器缓解风险。他还表示，
              SSI 在模型达到自身安全标准前不会部署任何模型，从而移除“尽早发布、快速迭代”的常见商业激励。技术研究平台是 Google Cloud TPU 基础设施，
              这一点由 2025 年 4 月合作公告确认。团队背景——Sutskever 的 transformer 与 scaling 工作、Daniel Levy 的 OpenAI 优化研究——
              暗示公司可能仍在基于 transformer 的大语言模型框架内推进，而不是追求根本性新架构；但这只是推断，不是披露。SSI 的研究模型意味着，
              它不嵌入任何现有买方的客户工作流；没有部署、没有集成、没有可靠性 SLA，也没有路线图。
