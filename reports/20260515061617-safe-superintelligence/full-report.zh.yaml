      - number: '6.2'
        title: GTM 策略与商业化路径
        blocks:
          - type: paragraph
            body: |
              SSI 没有披露 GTM 策略、销售团队结构、定价模型、分销方式或商业合作协议。商业基础设施缺位，与公司公开立场一致：在安全超级智能建成前，
              它不会销售任何东西。要描绘可能的 GTM 情景，只能从这个产品的推测性特征出发。
              情景 A — 政府优先许可：SSI 在国家安全框架下，把超级智能许可给美国政府，类似 Palantir 向政府机构提供 AI 分析。
              这一情景符合核安全类比（政府控制的战略技术），可带来大额、非经常性合同收入，并避开竞争激烈的商业市场。缺点：采购周期长（12–36 个月）、
              政治风险以及潜在国际限制。
              情景 B — 封闭研究合作许可：SSI 在严格用例限制下，向少数经过深度审查的研究机构或企业许可系统访问。这一模式类似 OpenAI 最早期的访问协议
              （Microsoft 2019 年投入 $1B），但规模大得多。缺点：受限访问模式导致收入规模有限。
              情景 C — 战略收购或合并：SSI 在产品完成前被大型科技公司收购；投资者通过收购溢价回收资本。缺点：SSI 的 PBC 结构和使命限制，
              可能让收购在法律或声誉层面变得困难。情景 D — 失败：SSI 耗尽资本，或未能达成技术目标；产品永远不会发布。鉴于使命的技术难度，
              这是现实可能性。上述情景都不需要传统销售组织或标准客户成功手册。唯一一致的主题是，无论 SSI 最终采用何种 GTM 形式，
              都会受其安全使命约束：它不能把系统卖给会不负责任部署的买方，这实际上把可触达买方范围限制在受监管、可问责的实体。
