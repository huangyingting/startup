        - id: "success"
          label: "Success scenario: product deployed, mission achieved"
        - id: "failure"
          label: "Failure scenario: mission abandoned or acquisition at distressed valuation"
      edges:
        - from: "phase-1"
          to: "phase-2"
        - from: "phase-2"
          to: "phase-3"
        - from: "phase-3"
          to: "phase-4"
        - from: "phase-4"
          to: "success"
        - from: "phase-4"
          to: "failure"
        - from: "phase-1"
          to: "failure"
        - from: "phase-2"
          to: "failure"
        - from: "phase-3"
          to: "failure"
    approximationNotes: "Timeline is illustrative. SSI may exit any phase via success or failure independently of the sequence."
    claimRefs: [CR001, CR009, CR016, CR012]

