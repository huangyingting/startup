      rows:
        - label: "Technical"
          values: ["Data pipeline copyright", "Scaling law plateau", "Alignment problem unsolved", "Mission technically infeasible"]
        - label: "Key person"
          values: ["Levy departure", "Gross departure", "Core team attrition (>30%)", "Sutskever departure"]
        - label: "Financial"
          values: ["Valuation compression", "Compute cost overrun", "Down-round funding", "Capital exhaustion / failure to raise"]
        - label: "Regulatory"
          values: ["Data licensing exposure", "Export control on TPUs", "EU AI Act deployment block", "US federal prohibition on deployment"]
        - label: "Competitive"
          values: ["Chinese lab improvement", "Anthropic safety competition", "Google DeepMind AGI", "OpenAI achieves AGI first"]
    approximationNotes: "Severity assessment is qualitative. Risks are placed by estimated impact on SSI's mission-achievement probability."
    claimRefs: [CR001, CR006, CR009, CR012, CR016]

  - id: FR003
    title: "Risk-over-time flow"
    type: flow
    summary: "Sequential risk evolution for SSI from 2026 to product completion — showing how risk profile shifts over time."
    data:
      nodes:
