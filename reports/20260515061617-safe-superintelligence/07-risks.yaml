    title: "Technical risk dependency graph"
    type: dag
    summary: "Dependency graph of SSI's core technical risks — showing how execution failures cascade from foundational assumptions to final product delivery."
    data:
      nodes:
        - id: "scaling-assumption"
          label: "Scaling hypothesis holds (transformer scaling → superintelligence)"
        - id: "alignment-solved"
          label: "Alignment problem solved (safety embeddable in training)"
        - id: "compute-available"
          label: "Compute available (Google Cloud TPU at sufficient scale)"
        - id: "talent-retained"
          label: "Research talent retained (50-person team stays)"
        - id: "research-progress"
          label: "Measurable research progress achieved"
        - id: "product-completion"
          label: "Safe superintelligence product completed"
      edges:
        - from: "scaling-assumption"
          to: "research-progress"
        - from: "alignment-solved"
          to: "research-progress"
        - from: "compute-available"
          to: "research-progress"
        - from: "talent-retained"
          to: "research-progress"
        - from: "research-progress"
          to: "product-completion"
    approximationNotes: "Each edge represents a necessary (not sufficient) dependency; failure of any single antecedent node could block product completion."
    claimRefs: [CR001, CR002, CR003, CR004, CR005]

