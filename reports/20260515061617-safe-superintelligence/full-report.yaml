      - number: '3.2'
        title: Capability, Pricing, and Distribution Comparison
        blocks:
          - type: paragraph
            body: |
              In capability terms, SSI has disclosed zero technical outputs as of May 2026. Anthropic,
              OpenAI, Google DeepMind, and xAI all have publicly deployed frontier models that can be
              benchmarked, evaluated, and purchased. OpenAI's GPT-4o and o3 series, Anthropic's Claude 3.5
              and 3.7 series, Google's Gemini 1.5 and 2.0 Ultra, and xAI's Grok 3 represent the current
              frontier. Pricing across these providers has been compressing steadily: OpenAI's input token
              pricing fell by over 90 percent for GPT-4-class models between 2023 and 2025, driven by
              efficiency gains and competitive pressure. Mistral offers open-weight models at effectively
              zero marginal inference cost, exerting downward pricing pressure on the commercial API market.
              Meta's Llama family (Llama 2, Llama 3.1, Llama 3.3) is open-source and freely available,
              creating a floor on commercial pricing. Google DeepMind benefits from vertical integration
              with Google Cloud, giving it the lowest effective compute cost among all competitors. SSI
              has no pricing, no GTM motion, and no distribution channel — it cannot be compared on
              commercial dimensions to any peer. Its only potential future distribution channels are API
              access, licensing, and government contracts, all of which remain entirely speculative. The
              trust and regulatory posture comparison is more favorable to SSI on paper: its explicit
              safety-first mission and refusal to deploy without safety guarantees aligns with the
              direction of EU AI Act systemic risk regulation and NIST AI RMF adoption. Anthropic's
