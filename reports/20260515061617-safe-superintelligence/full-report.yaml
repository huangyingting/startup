  - number: 5
    title: Product & Technology
    sections:
      - number: '5.1'
        title: Product Definition and Research Architecture
        blocks:
          - type: paragraph
            body: |
              SSI's product is explicitly stated as "safe superintelligence" — an AI system that
              surpasses human-level intelligence across all relevant cognitive domains while meeting
              an undefined but presumably very high safety standard. This product does not exist.
              As of May 2026, SSI has published no research papers, released no models, and made
              no technical disclosures to the public. The company operates under a strict stealth
              posture that extends to its research methodology, architectural choices, safety
              definitions, and progress milestones. Unlike Anthropic (which has published Constitutional
              AI, the Responsible Scaling Policy, and numerous interpretability papers) or Google
              DeepMind (which publishes extensively on Gemini architecture, RLHF variants, and safety
              techniques), SSI has produced zero verifiable technical output. Sutskever has offered
              some directional signals in public appearances: he defined SSI's safety goal as analogous
              to "nuclear safety" — embedding safety into the foundational design of the system rather
              than adding safety filters as a post-hoc mitigation. He has also indicated that SSI will
              not deploy any model until it meets its safety standards, removing the usual commercial
              incentive to release early and iterate. The technical research platform is Google Cloud
              TPU infrastructure, confirmed by the April 2025 partnership announcement. The team
              background — Sutskever's transformer and scaling work, Daniel Levy's OpenAI optimization
              research — suggests the company is building in the framework of transformer-based large
              language models rather than pursuing fundamentally novel architectures, though this is
              inference not disclosure. SSI's research model means it does not function in the customer
              workflow of any existing buyer; it has no deployment, no integration, no reliability SLA,
              and no roadmap.
