      - number: '1.2'
        title: Leadership Team and Founder Backgrounds
        blocks:
          - type: paragraph
            body: >
              Ilya Sutskever, born in 1986 in Nizhny Novgorod (then Gorky), Russia, immigrated to Israel at age five and
              later moved to Canada at sixteen, attending the University of Toronto where he earned his bachelor's,
              master's, and PhD in computer science under the supervision of Geoffrey Hinton, the "Godfather of AI."
              Sutskever co-created AlexNet in 2012—the convolutional neural network that sparked the modern deep
              learning revolution—and co-founded OpenAI in 2015 where he served as Chief Scientist overseeing
              breakthrough research in GPT models, DALL-E, and CLIP. He led the development of reasoning models
              including the o1 series. Sutskever has won the NeurIPS Test of Time Award three consecutive times
              (2022–2024), making him one of the most cited computer scientists in history. He holds Israeli and
              Canadian citizenship. By July 2025, as Sutskever became CEO of SSI, Daniel Gross had departed to join Meta
              Superintelligence Labs after Meta attempted (and failed) to acquire SSI. Gross, born in Jerusalem in 1991,
              founded Greplin (later renamed Cue, a personal search engine acquired by Apple for approximately $40–60
              million in 2013), led Apple's machine learning director role, served as a Y Combinator partner focused on
              AI, and ran the AI Grant program alongside Nat Friedman. Time 100 listed Gross as one of the most
              influential people in AI in 2023. Daniel Levy, the third co-founder, previously served at OpenAI on the
              optimization research team. The founding trio brought together Sutskever's unmatched deep learning
              credentials, Gross's entrepreneurial pedigree and capital access, and Levy's alignment research
              expertise—a combination that made SSI arguably the most credentialed AI startup founding team in history.
