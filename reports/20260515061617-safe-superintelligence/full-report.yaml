    title: Company Overview
    sections:
      - number: '1.1'
        title: Founding Story and Mission
        blocks:
          - type: paragraph
            body: >
              Safe Superintelligence Inc. was founded on June 19, 2024, approximately one month after Ilya Sutskever
              formally departed OpenAI—the company he had co-founded in 2015 and served as Chief Scientist. Sutskever's
              departure followed the November 2023 boardroom crisis at OpenAI, in which he had voted to remove CEO Sam
              Altman, then reversed course and signed a letter calling for Altman's reinstatement. The episode exposed
              deep internal tensions at OpenAI over the prioritization of AI safety versus commercialization, a rift
              that Sutskever cited as central to his decision to launch SSI. Alongside co-founders Daniel Gross—former
              head of Apple's AI efforts and ex-Y Combinator partner—and Daniel Levy, a former OpenAI researcher,
              Sutskever announced SSI on social media with the tagline: "Superintelligence is within reach." The
              company's founding thesis is straightforward and radical: by operating with no commercial products, no
              revenue obligations, and no short-term deadlines, SSI can pursue safe superintelligence as a pure
              technical problem. This insulation from commercial pressure, SSI argues, allows safety and capabilities to
              be advanced in tandem rather than trading off against each other. SSI was incorporated as a for-profit
              entity—unlike the original OpenAI nonprofit structure—meaning investors take equity stakes in what is
              essentially an option on the development of artificial general intelligence or superintelligence. The
              founding team split operations between Palo Alto, California and Tel Aviv, Israel, leveraging Gross and
              Sutskever's deep Israeli connections to recruit top technical talent from both hubs.
