      - number: '3.3'
        title: Moat Durability, Switching Costs, and Lock-In
        blocks:
          - type: paragraph
            body: |
              Moat analysis for SSI at its current stage is largely hypothetical. The company has no
              deployed product, no customer relationships, and no demonstrated technical output — meaning
              its moat is entirely composed of (a) founder reputation and talent assembly, (b) future
              potential IP from research, and (c) mission purity that signals safety commitment to
              regulators and future enterprise buyers. All three are narrow and non-durable without
              accompanying technical production. Anthropic's moat is substantially more developed:
              it has the Constitutional AI approach to safety alignment as a published, differentiated
              methodology; a growing enterprise customer base with multi-year contracts (switching cost:
              medium-high); Amazon and Google as strategic infrastructure investors; and a PBC governance
              structure that legally binds safety commitments. OpenAI has the strongest distribution moat
              — ChatGPT's hundreds of millions of users, deep Azure integration via Microsoft partnership,
              and API ecosystem with hundreds of thousands of enterprise applications built on GPT-4
              class models. Google DeepMind has an unbeatable compute moat via Alphabet's TPU infrastructure
              investment. xAI benefits from Elon Musk's X platform distribution (approximately 250 million
              users) and Tesla data access. Multi-homing is common at this stage of the market: enterprise
              buyers frequently evaluate multiple foundation models in parallel, meaning first-mover lock-in
              is not yet decisive. However, as fine-tuning, RAG pipelines, and application-layer integration
              deepen, switching costs will rise. SSI enters this market with a severe timing disadvantage —
              every quarter of delay increases the lock-in achieved by incumbents.
