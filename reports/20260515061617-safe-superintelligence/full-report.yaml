      - number: '1.3'
        title: Business Model and Organizational Structure
        blocks:
          - type: paragraph
            body: >
              SSI operates as the world's most unusual AI startup: a pure research laboratory with no commercial
              product, no disclosed revenue stream, no customers, and no near-term plans to generate income. The company
              is structured as a for-profit corporation, allowing it to accept venture capital investment and grant
              equity to employees, but the founding philosophy explicitly rejects the product-driven pressure that
              characterizes competitors such as OpenAI, Anthropic, and Google DeepMind. According to SSI's published
              founding statement, the company's business model means "safety, security, and progress are all insulated
              from short-term commercial pressures." The company has articulated a singular focus: "one goal and one
              product: a safe superintelligence." This is intentionally not a chatbot, API service, enterprise product,
              or consumer application—it is a long-horizon R&D bet on being first to develop an AI system that surpasses
              human intelligence while remaining safe and aligned. SSI's organizational structure is lean by
              design—approximately 50 employees as of mid-2025, primarily researchers and engineers. There are no sales
              teams, product managers, or marketing functions. The company maintains dual-headquarters in Palo Alto,
              California and Tel Aviv, Israel, enabling deep talent recruitment from two of the world's leading AI
              research ecosystems. The Google Cloud partnership announced in April 2025 established Google Cloud as
              SSI's primary compute provider, giving the company access to TPU (Tensor Processing Unit) infrastructure
              essential for large-scale AI model training without needing to own hardware directly.
