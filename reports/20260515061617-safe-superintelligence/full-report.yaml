      - number: '1.4'
        title: Funding History and Investor Base
        blocks:
          - type: paragraph
            body: >
              SSI's funding trajectory is one of the most striking in AI startup history. In September 2024— just three
              months after founding—SSI disclosed a $1 billion seed round at a $5 billion valuation. The round was led
              by a consortium including Sequoia Capital, Andreessen Horowitz (a16z), DST Global, and SV Angel. This $1
              billion raise with essentially zero operational history was driven entirely by the credibility of Ilya
              Sutskever and the premise of SSI's mission. By February 2025, Reuters reported SSI was in discussions for
              a new funding round that would value the company at $20 billion. In March 2025, the Wall Street Journal
              confirmed SSI had raised approximately $2 billion in a round led by Greenoaks Capital, valuing the company
              at $30 billion—six times its September 2024 valuation and achieved with approximately 20 employees at the
              time. Investors reportedly cited Sutskever's personal reputation and technical track record as the primary
              justification for the valuation. Total capital raised across both rounds is approximately $3 billion. This
              places SSI, despite having no revenue and no products, as one of the most valuable AI startups globally,
              trailing only OpenAI (valued at $500 billion in late 2025) and approaching Anthropic's valuation. The
              capital is earmarked for compute infrastructure, talent acquisition, and research operations. SSI's burn
              rate remains undisclosed but is estimated to be substantial given the cost of frontier AI research.
