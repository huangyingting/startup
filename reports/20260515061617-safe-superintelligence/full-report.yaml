      - number: '1.5'
        title: Key Milestones and Corporate History
        blocks:
          - type: paragraph
            body: >
              SSI's corporate history is short but eventful, reflecting the breakneck pace of the frontier AI landscape.
              The company was announced to the world on June 19, 2024, the same day Sutskever posted on X confirming he
              was leaving OpenAI for a "personally meaningful project." Just months after announcement, SSI closed its
              $1 billion seed round in September 2024, a speed-to-capital ratio unmatched in startup history. Through
              late 2024, the company operated in near-total stealth—no published research papers, no public technical
              statements, no product roadmap disclosures. This opacity drew both investor fascination and occasional
              skepticism, with some critics questioning whether SSI's premise was substantive or primarily a branding
              exercise for fundraising. In February–March 2025, SSI's valuation jumped from $5 billion to $30 billion
              following the Greenoaks-led round. April 2025 brought the first significant public partnership: Google
              Cloud announced it would serve as SSI's primary compute provider, supplying TPU chips for AI research and
              development. In the first half of 2025, Meta Platforms attempted to acquire SSI outright, an overture
              Sutskever reportedly rebuffed, signaling his commitment to independence. In July 2025, co-founder Daniel
              Gross departed SSI to join Meta Superintelligence Labs, the new AI division Meta launched partly through
              the talent acquired from SSI and other labs. Sutskever was formally named CEO upon Gross's departure. As
              of May 2026, SSI continues to operate in research mode with no public product announcements, maintaining
              its posture as the most capital-rich stealth AI research lab in history.
