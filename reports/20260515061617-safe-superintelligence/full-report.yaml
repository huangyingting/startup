      - number: '7.2'
        title: Key Person, Structural, and Financial Risks
        blocks:
          - type: paragraph
            body: |
              SSI has an extreme key person concentration in Ilya Sutskever. The entire company's
              valuation, investor thesis, and talent attraction strategy depends on Sutskever's
              continued involvement. Unlike OpenAI (which has a distributed leadership team and
              board governance), or Anthropic (which has Dario and Daniela Amodei plus extensive
              senior leadership), SSI's public identity and technical vision is nearly entirely
              Sutskever. Daniel Gross brings operational and investor network credibility; Daniel Levy
              brings optimization research expertise. But neither would be likely to sustain the
              company at its current valuation absent Sutskever. Sutskever's departure — whether
              voluntary, due to health, geopolitical restrictions, or competitive recruitment —
              would likely trigger investor reconsideration of the valuation and potentially a
              funding freeze. Structurally, SSI operates as a Delaware C-corporation with benefit
              corporation characteristics; the exact legal structure governing investor rights,
              founder control, and mission protection has not been publicly disclosed. Key structural
              risks include: absence of a board of directors with independence from founders (no
              disclosed board composition), absence of financial controls (no CFO, no disclosed
              audit function), absence of governance mechanisms for the research program (no SAB,
              no external technical review), and absence of succession planning for Sutskever.
              Financial risk is managed in the near term by the $3B raised — at estimated burn of
              $1–2B/year (compute + talent at frontier AI scale), SSI has approximately 2–3 years
              of runway from its March 2025 round close. The next funding round will be required
              before December 2027; failure to raise would be terminal. The zero-revenue model
              means there is no financial self-sufficiency fallback; SSI is entirely dependent on
              continued VC support.
