companyProfile:
  summary: >
    Safe Superintelligence Inc. (SSI) is a pure-play AI safety research lab founded in June 2024 by Ilya Sutskever
    (former OpenAI Chief Scientist), Daniel Gross (former Apple ML lead and YC partner), and Daniel Levy (former OpenAI
    researcher). The company's sole stated goal is to build "safe superintelligence" — an AI system that is both more
    capable than any current system and inherently safe by design. SSI has raised approximately $3 billion across two
    rounds at a peak valuation of $30 billion (March 2025), employs roughly 50 elite researchers and engineers, and
    operates from Palo Alto and Tel Aviv. As of May 2026, SSI has no products, no customers, no revenue, and no
    published research papers. Its computing infrastructure is provided primarily by Google Cloud (TPUs). The company
    operates in deliberate stealth, disclosing almost no technical details about its research direction or methodology.
