      - number: '8.2'
        title: Comparable Company Analysis and Valuation Methodology
        blocks:
          - type: paragraph
            body: |
              Standard comparable company analysis fails for SSI because there are no true comparables:
              no other publicly traded or private company combines (a) zero revenue, (b) pre-product
              status, (c) a frontier AI safety mission, and (d) a $30B+ valuation. The most relevant
              comps are other frontier AI labs at early funding stages, though all have fundamental
              differences. OpenAI at Series A level (2019 $1B Microsoft deal) had a deployed product
              (GPT-2 published) and commercial licensing revenue; it was valued at approximately $3B
              to $5B at that stage — 6x to 10x lower than SSI at a structurally less commercial stage.
              Anthropic was valued at approximately $4.1B in its Series B (2023) with deployed Claude
              product and growing revenue — significantly lower than SSI at less commercial stage.
              These comps suggest SSI carries a premium that is not explained by revenue multiples,
              product maturity, or team size comparisons. The premium is entirely attributable to
              Sutskever's reputation and the perceived probability and magnitude of the SSI
              superintelligence outcome. A discounted cash flow analysis is impossible: there are
              no cash flows to discount, no disclosed discount rate, no revenue projections, and
              no product timeline. A probability-weighted outcome analysis — the most appropriate
              framework — requires assigning a probability to mission success (10–30% over 10 years,
              per various expert estimates), an outcome value (impossible to estimate but potentially
              $1T–$100T if SSI captures significant value from superintelligence), and a discount
              for dilution, regulatory risk, and time. Even aggressive assumptions ($30T outcome,
              20% probability, 30% eventual equity capture, 40% discount) yield a ~$1.8T expected
              value before dilution — which would support a current valuation of $30B (assuming
              ~60:1 dilution from current to any exit at that magnitude). More conservative assumptions
              produce valuations substantially below $30B. The probability-weighted analysis
              demonstrates that the valuation is defensible under optimistic assumptions and
              indefensible under pessimistic ones — consistent with venture portfolio theory.
            claimRefs:
              - CV006
              - CV007
              - CV008
              - CV009
              - CV010
              - CV011
