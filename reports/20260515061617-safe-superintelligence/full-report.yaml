  - number: 7
    title: Risks
    sections:
      - number: '7.1'
        title: Technical Execution and Mission Feasibility Risk
        blocks:
          - type: paragraph
            body: |
              The most fundamental risk facing SSI is the possibility that its mission is technically
              infeasible on any reasonable timeline — or at all. Safe superintelligence, as defined
              by SSI, requires achieving human-level or superhuman cognitive performance across all
              relevant domains while simultaneously satisfying an undefined but presumably very high
              safety standard. There is no scientific consensus that this is achievable in any
              particular timeframe; estimates in the expert community range from 5 years to never.
              The AI safety research community has identified several unsolved technical problems
              that stand between current AI systems and safe superintelligence: the alignment problem
              (ensuring advanced AI systems behave in accordance with human values under distribution
              shift), the interpretability problem (understanding what advanced AI systems are actually
              computing internally), the scalability problem (whether scaling transformer architectures
              continues to yield capability improvements indefinitely), and the safety-capabilities
              tradeoff problem (whether safety constraints impose capability penalties that competing
              labs without those constraints would not face). SSI's technical approach to all four
              is unknown, because SSI has not published any research. The absence of published research
              creates an epistemic void: it is impossible to assess whether SSI's safety methodology
              is credible, innovative, or insufficient. The risk is not merely that SSI fails —
              it is that the company spends $3B+ on research that produces zero publishable insights,
              zero technical output, and zero demonstrable progress, while competitors publish,
              deploy, and iterate. SSI's stealth posture eliminates external peer review as an error-
              correction mechanism. If SSI's research methodology is flawed, it may not discover
              this until it has invested years and billions of dollars — without external correction
              from the broader AI safety community. Key execution risks also include the absence of
              product feedback loops (no deployment means no real-world performance data) and
              the possibility that SSI's timeline assumptions are systematically optimistic.
            claimRefs:
