      - number: '5.2'
        title: Technical Architecture and Operating Infrastructure
        blocks:
          - type: paragraph
            body: |
              SSI's confirmed infrastructure consists of Google Cloud TPU compute clusters, established
              through the April 2025 partnership with Google Cloud. TPU (Tensor Processing Unit) hardware
              is Google's custom ASIC optimized for large-scale matrix multiplication workloads —
              the core computational primitive in transformer-based large language model training.
              The TPU v5 and v6 generations, which Google Cloud made available to external customers
              and partners through 2024–2025, represent the current generation of this hardware and
              offer competitive training throughput for frontier-scale models. The decision to use
              Google Cloud TPUs rather than Nvidia GPU clusters (the industry standard) is notable:
              it creates a deep technical dependency on Google's hardware architecture and software
              stack (XLA compiler, JAX framework), which differ from the PyTorch/CUDA stack most
              AI researchers use. This architectural choice may reflect access to favorable compute
              pricing, personal relationships (Sutskever trained extensively with Google Brain alumni),
              or a strategic preference for the TPU stack's computational efficiency advantages.
              The likely software framework is JAX (Google's functional machine learning framework)
              given the TPU dependency, though this is not confirmed. The training data pipeline —
              web crawls, curated datasets, or proprietary data acquisition — is completely undisclosed.
              SSI's technical operating model requires continuous coordination between the Palo Alto
              and Tel Aviv offices; remote research collaboration at this scale requires robust version
              control, experiment tracking (likely MLflow or Weights & Biases), and distributed training
              infrastructure. None of these operational details have been publicly disclosed. IP posture
              is unknown: SSI has not disclosed patent filings, copyright registrations for model weights,
              or licensing agreements for training data, creating opacity around the eventual IP value
              of the company's research output.
