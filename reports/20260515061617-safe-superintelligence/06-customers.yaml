chapter:
  number: 6
  title: "Customers and Go-to-Market: A Zero-Customer Pre-Revenue Company"
  summary: >
    SSI has zero customers, zero revenue, and no disclosed go-to-market strategy as of May 2026.
    The company sells nothing and has stated it will not sell anything until it has built safe
    superintelligence — a product that does not exist. Speculation about eventual customers
    centers on government and defense agencies, enterprise AI infrastructure buyers, and national
    AI competitiveness programs. No named prospect, pilot, or letter of intent has been
    disclosed. This chapter necessarily operates in inference mode: the customer analysis is an
    assessment of who SSI's customers could plausibly be when/if it has a product, and whether
    the go-to-market pathway is coherent given the company's mission constraints.

sections:
  - id: customer-landscape
    title: "Customer Landscape: Who Could Buy Superintelligence?"
    body: |
      Safe Superintelligence has no customers. It has not sold anything, executed any commercial
      contract, signed any letter of intent, or disclosed any named prospective buyer. This is
      not an oversight or a timing issue — it is a deliberate structural feature of the company.
      SSI's founding charter explicitly forecloses the sale of intermediate products; the company
      intends to release only a completed safe superintelligence, not API access to intermediate
      models. As a result, the customer analysis in this chapter is entirely speculative:
      it projects who could plausibly purchase a superintelligence product if one were completed
      in the 2028–2032 timeframe, based on analogies from current AI procurement patterns.
      The three most plausible buyer segments are: (1) governments and national security agencies
      seeking strategic AI superiority, (2) large technology platforms seeking to integrate
      superintelligence capabilities into existing infrastructure, and (3) research institutions
      or international bodies seeking access to capabilities that would transform scientific
      research. Each segment has profoundly different procurement mechanics, contractual
      requirements, and deployment constraints. The US government — particularly the Department
      of Defense, Intelligence Community, and DARPA — is the most natural early buyer archetype:
      it has demonstrated willingness to pay for strategic AI superiority, procurement channels
      for sensitive dual-use technology (ITAR-controlled frameworks, OTA contracting), and
      the regulatory capacity to control deployment of a system with existential risk potential.
      The government buyer archetype also aligns with SSI's "nuclear safety" analogy —
      nuclear weapons and nuclear power plants are government-controlled; a similar governance
      model for superintelligence would naturally concentrate procurement in sovereign entities.
      Enterprise technology buyers (cloud providers, major software platforms) represent a
      second path: companies like Microsoft (OpenAI equity partner), Google (SSI's compute
      partner), Amazon, and Meta would each have strong strategic incentives to acquire or
      license superintelligence capabilities. However, SSI's mission constraints may prohibit
      commercial licensing under the terms its investors accepted.
    claimRefs: [CU001, CU002, CU003, CU004, CU005]
    tableRefs: [TU001, TU002]
    figureRefs: [FU001]

  - id: go-to-market
    title: "Go-to-Market Strategy and Commercial Pathway"
    body: |
      SSI has disclosed no go-to-market strategy, sales team structure, pricing model,
      distribution approach, or commercial partnership agreements. The absence of commercial
      infrastructure is consistent with the company's stated position: it will not sell
      anything until safe superintelligence is built. Mapping plausible go-to-market scenarios
      requires projecting from the product's speculative characteristics.
      Scenario A — Government-first licensing: SSI licenses its superintelligence to the
      US government under a national security framework, similar to how Palantir provides
      AI analytics to government agencies. This scenario is consistent with the nuclear safety
      analogy (government-controlled strategic technology), would generate large, non-recurring
      contract revenue, and avoids the competitive commercial market. Cons: long procurement
      cycles (12–36 months), political risk, and potential international restrictions.
      Scenario B — Closed research partnership licensing: SSI licenses access to the system
      to a small number of deeply vetted research institutions or corporations under strict
      use-case restrictions. This model resembles how OpenAI's earliest access agreements
      worked (Microsoft in 2019 at $1B) but at vastly larger scale. Cons: limited revenue
      scale given the restricted access model.
      Scenario C — Strategic acquisition or merger: SSI is acquired by a major technology
      company before completing its product; investors return capital through acquisition premium.
      Cons: SSI's PBC structure and mission restrictions may make acquisition legally or
      reputationally difficult. Scenario D — Failure: SSI runs out of capital or fails to
      achieve its technical goals; no product is ever released. This is a real possibility
      given the technical difficulty of the mission. None of these scenarios requires a
      conventional sales organization or standard customer success playbook. The one consistent
      theme is that SSI's eventual go-to-market — whatever form it takes — will be constrained
      by its safety mission: it cannot sell to buyers who would deploy the system irresponsibly,
      which effectively restricts the addressable buyer set to regulated, accountable entities.
    claimRefs: [CU006, CU007, CU008, CU009, CU010, CU011]
    tableRefs: [TU003, TU004]
    figureRefs: [FU002, FU003]

  - id: adoption-risks
    title: "Customer Adoption Risk and Adverse Views"
    body: |
      The customer risk profile for SSI is unlike any conventional enterprise software company.
      The primary adoption risk is not "will customers want to buy this?" — demand for a true
      superintelligence would be intense — but rather "is the product physically achievable?"
      and "under what terms would the company allow sale?". Several adverse views are material
      to customer risk. First, regulatory adoption risk: a deployed superintelligence would face
      immediate regulatory scrutiny from the EU AI Act (prohibited AI practices for general-purpose
      AI systems with systemic risk), US executive AI governance orders, and international treaty
      regimes. No regulatory framework currently has the legal architecture to govern a deployed
      superintelligence, meaning SSI's product could be blocked from sale by regulators regardless
      of buyer demand. Second, mission-commerce conflict: SSI's investors received equity in a
      company that will "not pursue commercial products until safe superintelligence is achieved"
      — this charter constraint may legally prevent early commercialization even if SSI wanted to
      generate revenue. Financial Times analysis highlights this structural contradiction. Third,
      buyer concentration risk: even if SSI achieves its product, the set of buyers who could
      responsibly deploy a superintelligence is tiny. A concentrated buyer set means SSI would
      have essentially no pricing power relative to a monopsony buyer (the US government, for
      example) and extreme customer concentration risk. Fourth, if superintelligence arrives
      earlier from a competitor (OpenAI, Anthropic, Google DeepMind, or a Chinese lab), SSI
      loses its first-mover advantage — and may be in a race it is structurally constrained
      from winning because its mission-driven safety constraints slow it relative to less
      safety-conscious competitors.
    claimRefs: [CU012, CU013, CU014, CU015, CU016, CU017, CU018]
    tableRefs: [TU005]
    figureRefs: [FU004]

