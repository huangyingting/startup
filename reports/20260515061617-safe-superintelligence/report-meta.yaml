companyProfile:
  summary: >
    Safe Superintelligence Inc. (SSI) is a pure-play AI safety research lab founded in June 2024
    by Ilya Sutskever (former OpenAI Chief Scientist), Daniel Gross (former Apple ML lead and YC partner),
    and Daniel Levy (former OpenAI researcher). The company's sole stated goal is to build
    "safe superintelligence" — an AI system that is both more capable than any current system
    and inherently safe by design. SSI has raised approximately $3 billion across two rounds
    at a peak valuation of $30 billion (March 2025), employs roughly 50 elite researchers and
    engineers, and operates from Palo Alto and Tel Aviv. As of May 2026, SSI has no products,
    no customers, no revenue, and no published research papers. Its computing infrastructure
    is provided primarily by Google Cloud (TPUs). The company operates in deliberate stealth,
    disclosing almost no technical details about its research direction or methodology.
  foundedDate: "2024-06-19"
  founders:
    - name: "Ilya Sutskever"
      role: "CEO (from July 2025)"
      background: "Co-creator of AlexNet; former OpenAI co-founder and Chief Scientist; PhD under Geoffrey Hinton at U of Toronto; coined the term 'deep learning era'."
      claimRefs: [CO005, CO008]
    - name: "Daniel Gross"
      role: "Co-founder (departed July 2025 to Meta Superintelligence Labs)"
      background: "Former Apple ML lead (sold Cue to Apple for ~$40M); YC partner (2015–2017); AI investor."
