company:
  name: "Safe Superintelligence Inc."
chapter:
  number: 1
  title: "Company Overview"
  summary: >
    Safe Superintelligence Inc. (SSI) is a pure AI safety research laboratory founded in June 2024
    by former OpenAI Chief Scientist Ilya Sutskever, Daniel Gross, and Daniel Levy. With $1 billion
    raised at a $5 billion valuation in September 2024 and a subsequent $2 billion raise at a
    $30 billion valuation in March 2025, SSI operates as the world's first "straight-shot" superintelligence
    lab with no commercial products, no revenue, and an explicit focus on building safe superintelligence
    as its singular mission. By July 2025, Daniel Gross had departed to join Meta, leaving Sutskever
    as CEO with a lean team of approximately 50 researchers.

sections:
  - id: founding-story
    title: "Founding Story and Mission"
    body: >
      Safe Superintelligence Inc. was founded on June 19, 2024, approximately one month after
      Ilya Sutskever formally departed OpenAI—the company he had co-founded in 2015 and served as
      Chief Scientist. Sutskever's departure followed the November 2023 boardroom crisis at OpenAI,
      in which he had voted to remove CEO Sam Altman, then reversed course and signed a letter
      calling for Altman's reinstatement. The episode exposed deep internal tensions at OpenAI
      over the prioritization of AI safety versus commercialization, a rift that Sutskever cited
      as central to his decision to launch SSI. Alongside co-founders Daniel Gross—former head of
      Apple's AI efforts and ex-Y Combinator partner—and Daniel Levy, a former OpenAI researcher,
      Sutskever announced SSI on social media with the tagline: "Superintelligence is within reach."
      The company's founding thesis is straightforward and radical: by operating with no commercial
      products, no revenue obligations, and no short-term deadlines, SSI can pursue safe
      superintelligence as a pure technical problem. This insulation from commercial pressure,
      SSI argues, allows safety and capabilities to be advanced in tandem rather than trading off
      against each other. SSI was incorporated as a for-profit entity—unlike the original OpenAI
      nonprofit structure—meaning investors take equity stakes in what is essentially an option on
      the development of artificial general intelligence or superintelligence. The founding team
      split operations between Palo Alto, California and Tel Aviv, Israel, leveraging Gross and
      Sutskever's deep Israeli connections to recruit top technical talent from both hubs.
    claimRefs: [CO001, CO002, CO003, CO004, CO005, CO006]
    tableRefs: [TO001]
    figureRefs: [FO001, FO003]

  - id: leadership-team
    title: "Leadership Team and Founder Backgrounds"
    body: >
      Ilya Sutskever, born in 1986 in Nizhny Novgorod (then Gorky), Russia, immigrated to Israel
      at age five and later moved to Canada at sixteen, attending the University of Toronto where he
      earned his bachelor's, master's, and PhD in computer science under the supervision of Geoffrey
      Hinton, the "Godfather of AI." Sutskever co-created AlexNet in 2012—the convolutional neural
      network that sparked the modern deep learning revolution—and co-founded OpenAI in 2015 where he
      served as Chief Scientist overseeing breakthrough research in GPT models, DALL-E, and CLIP. He
      led the development of reasoning models including the o1 series. Sutskever has won the NeurIPS
      Test of Time Award three consecutive times (2022–2024), making him one of the most cited
      computer scientists in history. He holds Israeli and Canadian citizenship. By July 2025, as
      Sutskever became CEO of SSI, Daniel Gross had departed to join Meta Superintelligence Labs
      after Meta attempted (and failed) to acquire SSI. Gross, born in Jerusalem in 1991, founded
      Greplin (later renamed Cue, a personal search engine acquired by Apple for approximately
      $40–60 million in 2013), led Apple's machine learning director role, served as a Y Combinator
      partner focused on AI, and ran the AI Grant program alongside Nat Friedman. Time 100 listed
      Gross as one of the most influential people in AI in 2023. Daniel Levy, the third co-founder,
      previously served at OpenAI on the optimization research team. The founding trio brought
      together Sutskever's unmatched deep learning credentials, Gross's entrepreneurial pedigree and
      capital access, and Levy's alignment research expertise—a combination that made SSI arguably
      the most credentialed AI startup founding team in history.
    claimRefs: [CO007, CO008, CO009, CO010, CO011, CO012, CO013]
    tableRefs: [TO002]

  - id: business-model
    title: "Business Model and Organizational Structure"
    body: >
      SSI operates as the world's most unusual AI startup: a pure research laboratory with no
      commercial product, no disclosed revenue stream, no customers, and no near-term plans to
      generate income. The company is structured as a for-profit corporation, allowing it to accept
      venture capital investment and grant equity to employees, but the founding philosophy explicitly
      rejects the product-driven pressure that characterizes competitors such as OpenAI, Anthropic,
      and Google DeepMind. According to SSI's published founding statement, the company's business
      model means "safety, security, and progress are all insulated from short-term commercial
      pressures." The company has articulated a singular focus: "one goal and one product: a safe
      superintelligence." This is intentionally not a chatbot, API service, enterprise product, or
      consumer application—it is a long-horizon R&D bet on being first to develop an AI system that
      surpasses human intelligence while remaining safe and aligned. SSI's organizational structure
      is lean by design—approximately 50 employees as of mid-2025, primarily researchers and
      engineers. There are no sales teams, product managers, or marketing functions. The company
      maintains dual-headquarters in Palo Alto, California and Tel Aviv, Israel, enabling deep
      talent recruitment from two of the world's leading AI research ecosystems. The Google Cloud
      partnership announced in April 2025 established Google Cloud as SSI's primary compute provider,
      giving the company access to TPU (Tensor Processing Unit) infrastructure essential for
      large-scale AI model training without needing to own hardware directly.
    claimRefs: [CO014, CO015, CO016, CO017, CO018]
    tableRefs: [TO003]

  - id: funding-milestones
    title: "Funding History and Investor Base"
    body: >
      SSI's funding trajectory is one of the most striking in AI startup history. In September 2024—
      just three months after founding—SSI disclosed a $1 billion seed round at a $5 billion
      valuation. The round was led by a consortium including Sequoia Capital, Andreessen Horowitz
      (a16z), DST Global, and SV Angel. This $1 billion raise with essentially zero operational
      history was driven entirely by the credibility of Ilya Sutskever and the premise of SSI's
      mission. By February 2025, Reuters reported SSI was in discussions for a new funding round that
      would value the company at $20 billion. In March 2025, the Wall Street Journal confirmed SSI
      had raised approximately $2 billion in a round led by Greenoaks Capital, valuing the company
      at $30 billion—six times its September 2024 valuation and achieved with approximately 20
      employees at the time. Investors reportedly cited Sutskever's personal reputation and technical
      track record as the primary justification for the valuation. Total capital raised across both
      rounds is approximately $3 billion. This places SSI, despite having no revenue and no products,
      as one of the most valuable AI startups globally, trailing only OpenAI (valued at $500 billion
      in late 2025) and approaching Anthropic's valuation. The capital is earmarked for compute
      infrastructure, talent acquisition, and research operations. SSI's burn rate remains
      undisclosed but is estimated to be substantial given the cost of frontier AI research.
    claimRefs: [CO019, CO020, CO021, CO022, CO023, CO024]
    tableRefs: [TO004]
    figureRefs: [FO002]

  - id: milestones-timeline
    title: "Key Milestones and Corporate History"
    body: >
      SSI's corporate history is short but eventful, reflecting the breakneck pace of the frontier
      AI landscape. The company was announced to the world on June 19, 2024, the same day Sutskever
      posted on X confirming he was leaving OpenAI for a "personally meaningful project." Just months
      after announcement, SSI closed its $1 billion seed round in September 2024, a speed-to-capital
      ratio unmatched in startup history. Through late 2024, the company operated in near-total
      stealth—no published research papers, no public technical statements, no product roadmap
      disclosures. This opacity drew both investor fascination and occasional skepticism, with some
      critics questioning whether SSI's premise was substantive or primarily a branding exercise
      for fundraising. In February–March 2025, SSI's valuation jumped from $5 billion to $30 billion
      following the Greenoaks-led round. April 2025 brought the first significant public partnership:
      Google Cloud announced it would serve as SSI's primary compute provider, supplying TPU chips
      for AI research and development. In the first half of 2025, Meta Platforms attempted to
      acquire SSI outright, an overture Sutskever reportedly rebuffed, signaling his commitment to
      independence. In July 2025, co-founder Daniel Gross departed SSI to join Meta Superintelligence
      Labs, the new AI division Meta launched partly through the talent acquired from SSI and other
      labs. Sutskever was formally named CEO upon Gross's departure. As of May 2026, SSI continues
      to operate in research mode with no public product announcements, maintaining its posture as
      the most capital-rich stealth AI research lab in history.
    claimRefs: [CO025, CO026, CO027, CO028, CO029, CO030]

