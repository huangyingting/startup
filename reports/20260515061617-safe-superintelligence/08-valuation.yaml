      - ["Distress: Technical dead-end or capital exhaustion", "20–30%", "$0–$500M (IP/talent fire sale)", "100% but tiny", "$0–$500M expected", "Total loss scenario"]
      - ["Acquisition: Acquired pre-product at significant premium", "10–15%", "$50–100B acquisition price", "100% of proceeds", "$50B–$100B outcome", "$30B current valuation defensible for this scenario"]
    notes: "All probabilities and outcome values are illustrative; expert estimates on superintelligence timelines range from 5 to >50 years with enormous uncertainty. Probability-weighted expected value across scenarios is consistent with a $30B valuation under moderate-to-optimistic assumptions."
    claimRefs: [CV009, CV010, CV011, CV016]

  - id: TV004
    title: "Valuation methodology comparison table"
    columns: ["Methodology", "Applicability to SSI", "Result", "Key Assumption", "Assessment"]
    rows:
