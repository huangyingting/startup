company:
  name: "Safe Superintelligence Inc."

chapter:
  number: 2
  title: "Market Analysis: Foundation Model and AI Safety Markets"
  summary: >
    The global AI market is estimated at approximately $184B in 2024 and forecast to reach $826B by 2030.
    The foundation model sub-market (training and inference) is $10–15B and growing rapidly; the commercial
    AI safety market remains nascent at under $1B. SSI has no current addressable market — it is a
    pre-product research lab — but its long-horizon bet targets the winner-take-most frontier AI market
    that incumbent labs like OpenAI ($13.1B revenue, 2025) and Anthropic (~$3B ARR) are actively monetizing.

sections:
  - id: market-boundary
    title: "Market Boundary and Definition"
    body: |
      The AI market has no universally agreed boundary, and that ambiguity is material to any sizing exercise.
      For this analysis, the relevant market comprises four segments: (1) foundation model training and inference
      — the development and deployment of large-scale neural networks that underpin modern AI services; (2) AI
      safety research and tooling — interpretability, alignment, evaluation, and red-teaming capabilities that
      governments, regulators, and AI labs increasingly require; (3) AI compliance and governance technology —
      the audit, certification, and risk-management software catalyzed by the EU AI Act and NIST AI Risk
      Management Framework; and (4) AI hardware and cloud compute — the GPU and TPU infrastructure that serves
      as the essential supply-side input to foundation model development. Excluded from the primary TAM are
      general enterprise software applications that use AI as a feature (e.g., CRM with embedded AI), AI-powered
      consumer products, and cybersecurity tools that are not AI-specific. Status-quo substitutes for foundation
      models include traditional machine learning pipelines, rule-based expert systems, and human-labor-intensive
      processes — all of which remain meaningful competitors in regulated and cost-sensitive verticals. SSI's
      mission — building safe superintelligence — positions it at the intersection of frontier foundation model
      development and advanced AI safety research, meaning its eventual market opportunity could span all four
      segments above.
    claimRefs: [CM001, CM002, CM003, CM004, CM005]
    tableRefs: [TM001]

  - id: market-sizing
    title: "Market Sizing: TAM, SAM, and SOM Lenses"
    body: |
      Global AI market sizing varies significantly by analyst methodology and scope definition. Bloomberg
      Intelligence and multiple research houses place the 2024 global AI market at approximately $184 billion,
      encompassing hardware, software, and services. Goldman Sachs and Bloomberg project this to reach
      approximately $826 billion by 2030, implying a compound annual growth rate of roughly 28 percent.
      These figures include the full AI stack from chips through applications. The narrower foundation model
      sub-market — covering compute for training and inference at the largest scale — is estimated at
      $10 to $15 billion in 2024 by industry analysis and is growing faster than the overall market as
      model scale and deployment expand rapidly. Epoch AI's empirical analysis of training compute costs
      finds that the largest training runs now require $50 million to more than $100 million per run, and
      that compute requirements for frontier models have been doubling roughly every six to twelve months,
      compressing the window for underfunded entrants. The AI safety research market remains nascent: government
      and academic funding accounts for most spending, estimated at $500 million to $2 billion globally in
      2023–2024, with commercial safety tooling representing less than $1 billion. SSI's serviceable addressable
      market in the conventional sense is currently zero — the company has no product and generates no revenue.
      Its potential SOM is contingent entirely on achieving its research objective and then choosing to monetize,
      which could place it in any or all of the four market segments defined above. The most meaningful
      comparable for eventual monetization is Anthropic, which extracted approximately $3 billion in ARR from
      a related starting point of pure safety research.
    claimRefs: [CM006, CM007, CM008, CM009, CM013, CM014, CM015, CM030, CM035]
    tableRefs: [TM002]
    figureRefs: [FM001, FM002]

  - id: buyer-segmentation
    title: "Buyer and Segment Map"
    body: |
      Buyers of foundation model capabilities and AI safety services fall into five meaningful segments.
      Hyperscalers — Amazon AWS, Microsoft Azure, and Google Cloud — are simultaneously users, infrastructure
      providers, and resellers of foundation model capacity, with AI spending embedded in multi-billion-dollar
      cloud budgets controlled by senior engineering leadership. Enterprise technology companies are the fastest-
      growing commercial segment, with McKinsey's 2024 Global AI Survey finding 55 percent of large companies
      using AI in at least one business function, with adoption driven by cost efficiency and competitive
      pressure; budget ownership resides with Chief Technology Officers and Chief Information Officers.
      Government and defense buyers are growing rapidly, motivated by national security mandates and the
      requirements of legislation such as the US CHIPS Act and EU AI Act; procurement cycles are long and
      clearance requirements create high switching costs. AI research labs — including Anthropic, xAI, Mistral,
      and Cohere — are direct buyers of compute and safety evaluation capacity; their budgets are controlled
      by founders and boards with longer time horizons than commercial enterprises. Academic institutions are
      buyers of affordable inference and training APIs, funded through NSF, NIH, and DARPA grants, with
      limited budget scale but high influence on safety norms and talent pipelines. SSI currently has no buyer
      relationships and no channel. The adoption path from research to revenue requires first achieving a
      demonstrable technical result and then constructing distribution — a multi-year challenge regardless
      of research quality.
    claimRefs: [CM016, CM017, CM018, CM019, CM020, CM021]
    tableRefs: [TM003]
    figureRefs: [FM003, FM004]

  - id: growth-drivers-constraints
    title: "Growth Drivers and Adoption Constraints"
    body: |
      The primary growth driver for the AI safety market is regulatory mandation. The EU AI Act, which became
      effective in 2025, classifies foundation models with training compute exceeding 10^25 FLOPs as subject
      to systemic risk provisions, creating mandatory safety evaluation and compliance obligations across all
      EU-exposed AI developers. The NIST AI Risk Management Framework, published in January 2023, is shaping
      enterprise AI procurement criteria and creating a nascent market for risk management tooling. The UK
      AI Safety Institute, established in November 2023, and analogous bodies in the EU and US represent
      government demand for AI safety evaluation capacity — a market SSI could serve with its research
      outputs if it chooses to. The OECD has documented more than 70 national AI strategies, signaling broad
      policy-driven market creation. On the demand side, enterprise AI adoption is accelerating: McKinsey
      reports more than half of surveyed large companies are using AI in at least one function as of 2024.
      Adoption constraints are substantial. Capital intensity is the highest structural barrier: frontier
      model training costs $10 million to $100 million or more per training run, and compute costs have
      been halving in terms of FLOPs per dollar but rising in absolute terms as model scale increases.
      The global pool of qualified AI safety researchers is estimated at only one thousand to three thousand
      people — a severe supply constraint that affects all labs, including SSI. Trust deficits in regulated
      industries slow enterprise adoption significantly. Switching costs are increasing as enterprises build
      deeply on proprietary APIs and fine-tuned models, creating potential lock-in risks. Regulatory
      uncertainty in the United States represents a meaningful constraint: pending federal AI legislation
      could restrict frontier development or require new compliance infrastructure.
    claimRefs: [CM022, CM023, CM024, CM025, CM026, CM027, CM028, CM029, CM031, CM032, CM033, CM034, CM036, CM037, CM038]
    tableRefs: [TM004]

