  evidenceGaps:
    - type: private-evidence-only
      severity: material
      topic: SSI-SOM-estimation
      missingEvidence: "No disclosed monetization model or product roadmap from SSI; SOM upon commercialization cannot be estimated without knowing the product type, pricing, and target segment."
