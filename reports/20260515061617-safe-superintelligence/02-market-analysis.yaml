      diligencePath: "Request technical briefing from SSI leadership on product intent; compare to Anthropic's Claude commercialization path as base case."
      relatedQuestionRefs: [QM023]

    - type: conflicting-data
      severity: minor
      topic: analyst-methodology-comparison
      missingEvidence: "Analysts use inconsistent market boundary definitions; no independent reconciliation of IDC, Gartner, Bloomberg, and McKinsey AI market estimates exists."
      whyItMatters: "TAM disagreement of 2–3x across reputable sources makes sizing exercises unreliable; investment decisions based on the high end of estimates carry hidden risk."
      diligencePath: "Request methodology documentation from Gartner and IDC; triangulate against disclosed public-company AI revenues as a bottom-up check."
      relatedQuestionRefs: [QM026]

    - type: missing-source
      severity: minor
      topic: AI-safety-market-size
      missingEvidence: "No authoritative market sizing study exists for the commercial AI safety tooling market as a standalone segment; estimates of less than $1B are inferred from fragmented data."
      whyItMatters: "If the commercial AI safety market is materially larger than estimated, SSI's eventual SAM improves; if smaller, the market may not support $30B valuation via AI safety alone."
      diligencePath: "Commission or source specialist AI safety market sizing research; cross-check with EU AI Act compliance spending forecasts from law firms and consulting groups."

    - type: stale
      severity: minor
      topic: compute-cost-trajectory
      missingEvidence: "Most training cost data is from 2022–2024; 2025–2026 cost trajectories for SSI's specific TPU-based architecture on Google Cloud are undisclosed."
