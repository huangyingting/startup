  evidenceGaps:
    - type: "private-evidence-only"
      severity: "material"
      topic: "financials"
      missingEvidence: >
        Audited financial statements for Qonto SA for FY2023 and FY2024 are not publicly available.
        Revenue, EBITDA, net income, and cash-flow metrics are all company-claimed or journalist-
        estimated. The $500M ARR figure cited in fintech press has not been corroborated by any
        regulatory filing, audited annual report, or independent data provider.
      whyItMatters: >
        All three valuation scenarios (bull/base/bear) rest directly on the ARR estimate. A material
        shortfall below €400M would compress multiples and fair value, potentially below the bear case.
        Profitability confirmation ('2023') is CEO-stated without an auditor sign-off, which limits its
        use as a high-confidence valuation input.
      diligencePath: >
        Request FY2023 and FY2024 audited IFRS P&L, balance sheet, and cash-flow statement in the
        investor data room. Confirm the auditor, accounting methodology, and definition of 'profitability'
        (EBITDA vs. operating profit vs. net income) used in CEO statements.
      relatedQuestionRefs:
        - "QV002"
        - "QV030"

    - type: "private-evidence-only"
      severity: "material"
      topic: "cap-table"
      missingEvidence: >
        The preference structure, liquidation seniority, anti-dilution provisions, drag-along rights,
        and cap-table ownership percentages for Qonto's Series D (and earlier rounds) are entirely
        undisclosed. No secondary transaction has been publicly reported to provide a market-clearing
        price discovery event.
      whyItMatters: >
        In a below-Series-D-price exit scenario, the preference waterfall could absorb the majority
        of proceeds before reaching common shareholders or early-round preferred holders. Without
        understanding the liquidation stack, the equity value available to any specific investor
        class cannot be modelled.
      diligencePath: >
        Obtain the Series D term sheet, cap table (fully diluted by class and round), and the
        preference waterfall model from company legal counsel. Request disclosure of any ratchet,
        anti-dilution, or co-investment rights attached to the Series D.
      relatedQuestionRefs:
        - "QV017"
        - "QV018"

    - type: "access-blocked"
      severity: "minor"
      topic: "analyst-coverage"
      missingEvidence: >
        Specialist analyst coverage of Qonto's implied valuation in 2026 (CB Insights, PitchBook,
        Dealroom, Forrester) sits behind paywalls and could not be accessed during research. It is
        therefore uncertain whether any public analyst has published a current fair-value estimate
        that would update the comparable-based range used here.
      whyItMatters: >
        Third-party analyst marks are an important cross-check on the author's multiple-based
        estimates. Paywall-gated sources might contain more recent secondary transaction data or
        analyst-modelled valuations that would narrow the bull/base/bear range.
      diligencePath: >
        Subscribe to CB Insights Fintech 500 or PitchBook data, or obtain brokerage research
        from a firm covering European fintech (e.g. Bernstein, Berenberg, Jefferies European tech
        team) to access institutional-quality valuation benchmarks for private-market comps.
      relatedQuestionRefs:
