  - id: "comparable-company-analysis"
    title: "Comparable Company Analysis"
    body: >
      The relevant comparable set spans public European fintechs, listed global neobanks, and private
      European challengers. No single comparable is a perfect match; Qonto's hybrid subscription-plus-
      transaction model, SMB focus, EU-only geography, and payment-institution-not-bank status create
      a composite comp set that must be weighted carefully.

      Wise plc (LSE listed) is the strongest public-market anchor for Qonto. Both are European,
      regulated, SMB-oriented payments platforms with subscription and transaction revenue. Wise trades
      at approximately 5-7× revenue (£7-8B market cap vs. ~£1.2B revenue run-rate as of early 2026).
      This is the closest structural comparable and sets the floor for Qonto's base-case valuation.

      Adyen N.V. (Euronext Amsterdam, listed) is a premium but instructive benchmark. At 20-25× revenue
      with EBITDA margins above 40%, Adyen represents what a fully licensed, scaled European fintech
      commands in the public market. Qonto cannot yet justify this multiple without a banking licence
      and demonstrated enterprise-grade margins.

      Revolut (private, ~$33B 2021 valuation) is a direct competitor but not a reliable comp:
      its last-round valuation was struck at peak exuberance, its multi-product global model
      (consumer + business) is structurally different, and it has not completed an IPO where price
      discovery would occur. N26 (€7-8B in 2021) and SumUp (~€8B in 2022) similarly suffer from stale
      private-market marks that pre-date the 2022-2026 compression cycle.

      Nubank (NYSE listed, Brazil) provides a high-growth neobank anchor at $15-20B, but its
      emerging-market context, consumer focus, and 100M+ customer scale make it a loose comparable.
      Monzo (UK, ~£4-5B 2024 secondary) and Starling Bank (UK, ~£2.5B 2022) are the closest structural
      peers by business model and geography, both suggesting European regulated neobanks trading in the
      3-6× revenue range in recent transactions.

      Taken together, the comparable set supports a 2026 valuation range of approximately €2.5-4.5B for
      Qonto depending on banking licence trajectory, with the midpoint at €3-3.5B (7-8× ARR). The
      Series D price of €4.4B sits at the high end of the comp range and requires banking licence
      realization to be justified at par.
