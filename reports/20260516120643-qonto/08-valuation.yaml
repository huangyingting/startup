    - id: "CV002"
      statement: >-
        The Qonto Series D was led by Tiger Global and TCV, with participation from Alkeon Capital,
        DST Global, Eurazeo, KKR, Insight Partners, and Exor Seeds alongside existing investors
        including Valar Ventures, Alven Capital, and Tencent.
      type: "observed"
      topic: "investors"
