  claims:
    - id: "CV001"
      statement: >-
        Qonto raised €486M in a Series D round in January 2022, resulting in a post-money valuation of
        €4.4B (~$5B USD at the time), making it one of the most highly valued European fintech companies.
      type: "observed"
      topic: "valuation"
      sourceRefs:
