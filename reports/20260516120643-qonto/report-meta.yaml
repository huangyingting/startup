companyProfile:
  summary: Qonto was founded in Paris in 2016 by Alexandre Prot and Steve Naudé as a digital-first business bank for European
    SMEs and freelancers. The company offers an integrated suite of financial services — business current accounts, virtual
    and physical debit cards, domestic and SEPA transfers, invoice management, expense tracking, and real-time accounting
    integrations — through a single mobile and web interface regulated under an ACPR payment institution licence. Qonto has
    grown to approximately 500,000 SME customers across France, Germany, Spain, Italy, Portugal, and the Netherlands, reported
    €200M ARR in 2024 with a claim of breakeven profitability, and raised €622M across five rounds including a €486M Series
    D at a €4.4B valuation in January 2022.
  foundedDate: '2016-07-01'
  founders:
  - name: Alexandre Prot
    role: CEO & Co-Founder
  - name: Steve Naudé
    role: President & Co-Founder
  foundingLocation: Paris, France
  headquarters: Paris, France
  productSummary: 'Business banking platform: current accounts (IBAN), SEPA credit transfers, instant payments, virtual and
    physical Mastercard debit/prepaid cards, expense management with receipt capture, VAT e-invoicing, accounting API integrations
    (Xero, QuickBooks, Datev, Pennylane), and payroll integration. Operates under ACPR payment institution licence; partners
    with a licensed credit institution for account guarantees up to €100K.'
  customerFocus: European SMEs (1–250 employees) and freelancers, with primary focus on France (largest market) and Germany
    (via Penta acquisition). Target segments include tech, creative, services, and retail SMEs seeking a lightweight alternative
    to legacy retail banks.
  businessModel: 'Monthly or annual SaaS subscription tiering (Starter, Smart, Premium, Essential, Business, Enterprise) plus
    per-transaction fees for international transfers, card top-ups, and optional add-on modules. Revenue mix: subscription
    fees (~70% estimated), transaction fees (~20%), and ancillary services.'
  stage: Series D (2022), late-stage private
  fundingStatus: €622M raised; most recent round was €486M Series D (Jan 2022) led by TCV, Tiger Global, and Valar Ventures
    at €4.4B valuation. No public funding announcement since 2022; 2024 profitability suggests reduced capital need.
