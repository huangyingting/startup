company:
  name: "Qonto"
chapter:
  number: 2
  title: "Market Analysis"
  summary: >
    Qonto operates in the European B2B business banking market for SMBs and freelancers—a segment estimated at €25B+
    in annual fee-and-payment revenue across 26 million EU businesses. The addressable opportunity narrows
    meaningfully when bounded by Qonto's current 8-country footprint (TAM lens: ~€18–22B; SAM: ~€3–5B reachable
    given digital-first adoption curve; SOM: ~€1–2B at realistic penetration in Qonto's active markets). Growth is
    propelled by PSD2/Open Banking mandates, the EU Instant Payments Regulation (April 2024), SEPA Instant's
    accelerating adoption, and a wave of digital-native SMB founders who reject branch banking. Constraints are
    meaningful: incumbent loyalty is sticky, credit licensing gaps cap Qonto's revenue per account, switching costs
    linked to payroll and accounting integrations slow churn from traditional banks, and DORA compliance
    requirements add operational burden. The main status-quo substitute remains traditional incumbents (BNP, SocGen,
    Deutsche Bank, Unicredit, BBVA) who collectively serve >90% of European SMBs today. Key diligence tensions:
    market-size estimates vary widely (€8B to €40B+ depending on boundary), neobank penetration data is inconsistent
    across sources, and no single authoritative CAGR for "European SMB neobanking" has been published.

sections:
  - id: "market-definition"
    title: "Market Definition and Boundaries"
    body: >
      The core market Qonto addresses is business banking services for SMBs (defined in the EU as enterprises with
      fewer than 250 employees and annual turnover under €50M) and freelancers (self-employed individuals, micro-
      entrepreneurs). This population numbers approximately 26 million enterprises across the EU, of which roughly
      23 million are micro-enterprises (0–9 employees). France alone accounts for approximately 4 million SMBs and
      freelancers, consistent with Qonto's home-market focus.

      Included spend within the market boundary: (1) business account subscription fees, (2) domestic and
      international payment fees (SEPA, SWIFT), (3) card interchange revenue, (4) credit products (overdraft, pay-
      later, term loans), (5) value-added SaaS modules (invoicing, expense management, accounting automation), and
      (6) float/interest income earned on customer deposits. Combined, these revenue pools generate an estimated
      €25B+ per annum in addressable fee revenue across the EU when incumbents and challengers are aggregated.

      Excluded from the primary boundary: retail/consumer personal accounts, corporate treasury management for large
      enterprises (>250 employees), investment banking and capital markets, insurance, and pure FX/remittance
      services for individuals. Adjacent to the primary boundary—and meaningful for Qonto's expansion roadmap—are
      invoice financing, FX for SMBs, business insurance, and B2B payments infrastructure (embedded finance). These
      adjacencies represent substantial follow-on addressable revenue but require additional licensing (notably a
      full banking licence, which Qonto applied for in July 2025).

      The principal status-quo substitutes are: (a) traditional incumbent banks (BNP Paribas, Société Générale,
      Deutsche Bank, Commerzbank, Unicredit, ING, BBVA, Santander), which collectively serve over 90% of EU SMBs
      and charge €30–100/month for basic business current accounts; (b) accounting-led platforms (Sage, QuickBooks,
      Pennylane) that replicate invoicing and expense management but not core banking; and (c) standalone expense
      tools (Spendesk, Pleo, Expensify) that layer on top of existing bank accounts. The central switching barrier
      is multi-sided: changing a primary business bank account requires porting payroll mandates, updating supplier
      IBANs, migrating accounting integrations, and potentially re-applying for credit facilities.
    claimRefs:
      - CM001
      - CM002
      - CM003
      - CM004
      - CM005
      - CM006
      - CM007
    tableRefs:
      - TM001

  - id: "market-sizing"
    title: "Market Sizing: TAM / SAM / SOM"
    body: >
      Three complementary lenses converge on a plausible market size range, though estimates diverge materially
      depending on geographic scope, revenue line inclusion, and data recency.

      Lens 1 — Bottom-up revenue pool: Applying an average blended revenue per SMB of ~€600–900/year (subscription
      + transaction fees, excluding credit) to the 26M EU SMBs yields a fee-only TAM of approximately €16–23B/year.
      Adding credit and float income expands this to €25–35B. This lens treats every EU SMB as reachable, which
      overstates near-term opportunity for a digital-first challenger limited to 8 countries.

      Lens 2 — Top-down market research: McKinsey's 2023 Global Payments Report identifies the EMEA region as
      growing at double-digit rates in payments revenue, with instant-payments-driven growth expected to lift SEPA
      volumes by 2027. Specialist reports from Mordor Intelligence and Grand View Research (not fully accessible
      during research) have cited European digital-banking market sizes in the €8–15B range for SMB-specific
      services. Statista's neobanking market outlook estimates NII-basis global neobank revenues at $1.66T by 2026,
      with Europe accounting for approximately 15–20% of that figure—implying ~$250–330B in neobank NII globally,
      but this aggregates consumer and business segments.

      Lens 3 — Country-level build-up for Qonto's active markets: France (~4M SMBs, ~€5B addressable), Germany
      (~3.5M SMBs, ~€4B), Italy (~3.6M SMBs, ~€4B), Spain (~3.3M SMBs, ~€3.5B). These four markets alone suggest
      a SAM of ~€12–16B. Applying a realistic digital-first penetration ceiling of 20–25% and Qonto's current ~2%
      share of its home French market, the implied SOM for Qonto's primary 4 markets at maturity is approximately
      €1–2B in annual fee revenue—consistent with a 5–10× revenue scale-up from Qonto's estimated €200M+ current
      ARR.

      Market growth: Multiple sources corroborate a 15–20% CAGR for European SMB fintech from 2023–2028. McKinsey
      projects overall EMEA payments revenue growing at 6–8% CAGR to 2027; the SMB digital-banking segment outpaces
      this average due to low base. The EU Instant Payments Regulation (Regulation (EU) 2024/886, in force April
      2024) mandates that all eurozone PSPs offer instant credit transfers by January 2025 (credit institutions) and
      October 2025 for EMIs/PIs—a structural tailwind that reduces friction for Qonto-type propositions vs.
      incumbent batch-processing infrastructure. SEPA Instant Credit Transfer (SCT Inst) was operational from
      November 2017, and SCT Inst's share of total SEPA Credit Transfers is expected to reach 45% of SEPA's 23B
      annual transactions if regulators proceed with full adoption measures per McKinsey's base case.

      Contradictory estimate note: Mordor Intelligence and Grand View Research reports (both not fully accessible)
      and analyst summaries of their work cite headline European digital-banking TAM figures ranging from €8B to
      €40B+, depending on whether the analysis includes SMB credit, consumer digital banking, and embedded finance.
      These estimates are preserved as the range band in figure FM002 rather than being collapsed to a single
      midpoint.
