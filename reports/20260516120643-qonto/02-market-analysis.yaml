  - id: "diligence-gaps"
    title: "Sizing and Adoption Diligence Gaps"
    body: >
      Several material uncertainties persist after cross-referencing available public sources:

      Market size range breadth: The primary market-size gap is the absence of a single authoritative, recent
      (2024–2026), publicly accessible study on the European SMB business banking addressable market broken down
      by product line, geography, and challenger vs. incumbent split. Published estimates range from €8B to €40B+
      depending on scope (SMB-only vs. all digital banking, fee-only vs. fee-plus-credit). Diligence should
      commission an independent segmented market model.

      Neobank penetration measurement: Qonto claims 600,000 customers across 8 countries, representing roughly 2–3%
      of the 26M EU SMB base. Generalist penetration estimates of "5–10% of SMBs" for European neobanks conflict
      with this: if the 5% lower bound is correct, approximately 1.3M EU SMBs currently hold a neobank account,
      and Qonto's 600,000 implies a ~45% neobank market share—which seems high given Revolut Business's 30,000+
      new businesses per month claim and N26 Business's presence. This inconsistency should be resolved with
      independent customer panel data.

      Revolut Business competitive overlap: Revolut reports 30,000+ new businesses joining per month, which
      annualizes to 360,000+ new customers per year. If accurate and sustained, Revolut could approach Qonto's
      total customer base within 1–2 years. However, Revolut's global scope (150+ countries) makes European SMB-
      specific market share comparison difficult.

      Credit market sizing absent: The SMB credit market (invoice financing, overdraft, term loans) for European
      SMBs is estimated at 2–3× the fee-revenue pool, potentially €50–75B in annual origination. None of the
      accessible sources provide a specific breakdown for challenger fintech credit share vs. incumbent share in
      this sub-market. This is the most valuable revenue expansion vector for Qonto post-banking-licence, and its
      size is poorly documented in public sources.

      CAGR validation: The 15–20% CAGR for "European SMB fintech" appears in multiple secondary publications but
      traces to market research firms (Mordor Intelligence, Grand View Research) whose underlying methodology is
      not publicly accessible. The McKinsey Global Payments Report supports a more conservative 6–8% CAGR for
      overall EMEA payments—and explicitly notes that the SMB digital segment outpaces the mean—but does not
      quantify the SMB-specific growth rate separately.
    claimRefs:
      - CM032
      - CM033
      - CM034
      - CM035

callouts:
  - calloutType: "strength"
    title: "Regulatory Tailwinds Favor Digital-First Challengers"
    body: >
      The EU Instant Payments Regulation (April 2024) and continued PSD2 implementation remove two historical
      incumbent advantages—payment speed and data lock-in—at a regulatory level. Qonto, already operating on SEPA
      Instant infrastructure, is structurally better positioned than incumbents to deliver real-time payment
      experiences to SMBs without legacy batch-processing constraints. Combined with the Open Banking mandate
      enabling third-party account aggregation, these regulatory catalysts are accelerating the competitive window
      for challengers.
    claimRefs:
      - CM022
      - CM023
      - CM024

  - calloutType: "risk"
    title: "Credit Gap and Incumbent Lock-in Limit Revenue Ceiling"
    body: >
      Without a banking licence (applied for July 2025, approval likely 2027–2028), Qonto cannot offer balance-
      sheet credit—overdraft, term loans, revolving facilities—which is the single product most strongly correlated
      with SMB banking loyalty. Incumbents use credit as the anchor that makes switching painful even when NPS is
      poor. Until Qonto closes this gap, its revenue per account is structurally below incumbent ARPU for mid-
      market SMBs (10–250 employees), and its ability to capture high-value customer relationships in the €39+/
      month ARPU bands remains constrained.
    claimRefs:
      - CM027
      - CM028
      - CM029

