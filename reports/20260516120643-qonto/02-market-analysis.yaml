        - "QM008"
        - "QM023"

    - id: "CM004"
      statement: >-
        The primary status-quo substitutes for Qonto are incumbent banks for core banking, accounting-led platforms
        (Sage, QuickBooks, Pennylane) for invoicing and expense management, and standalone expense management tools
        (Spendesk, Pleo, Expensify) that layer on top of existing bank accounts.
      type: "observed"
      topic: "substitutes"
      sourceRefs:
        - SM016
        - SM018
        - SM020
      confidence: "medium"
      freshness: "current"
      answersQuestionRefs:
