    - id: "CM003"
      statement: >-
        Traditional European incumbent banks (BNP Paribas, Société Générale, Deutsche Bank, Commerzbank, Unicredit,
        ING, BBVA, Santander) collectively serve over 90% of EU SMBs and charge €30–100/month for basic business
        current accounts.
      type: "observed"
      topic: "competitive-landscape"
      sourceRefs:
        - SM018
        - SM016
        - SM019
      confidence: "high"
      freshness: "current"
      answersQuestionRefs:
