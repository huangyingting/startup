  claims:
    - id: "CM001"
      statement: >-
        The EU defines SMBs as enterprises with fewer than 250 employees and annual turnover under €50M. Approximately
        26 million SMBs exist in the EU, of which ~23 million are micro-enterprises (0–9 employees).
      type: "observed"
      topic: "market-definition"
      sourceRefs:
        - SM003
        - SM016
        - SM017
        - SM018
