  researchQuestions:
    - id: "QM001"
      question: "How many SMBs (enterprises with <250 employees) exist across the EU as of 2024–2026?"
      type: "quantification"
      targets:
        - "contentRequirements/0"
      status: "answered"
      answerSummary: "Approximately 26 million SMBs in the EU, with ~23 million being micro-enterprises (0–9 employees), per Eurostat SME definitions corroborated by industry sources."

    - id: "QM002"
      question: "What is the total addressable market (TAM) for European SMB business banking services in 2025–2026?"
      type: "quantification"
      targets:
        - "contentRequirements/1"
      status: "answered"
      answerSummary: "Bottom-up estimate of €16–23B (fee-only) to €25–35B (including credit/float). Analyst estimates range more widely (€8–40B+) depending on scope."

    - id: "QM003"
      question: "What revenue per SMB do incumbents generate annually from business banking fees and services?"
      type: "quantification"
      targets:
        - "contentRequirements/1"
      status: "answered"
      answerSummary: "Traditional banks charge €30–100/month (€360–1,200/year) for basic business accounts; blended ARPU across all products is estimated at €600–900/year for SMBs."

    - id: "QM004"
      question: "What is Qonto's serviceable addressable market (SAM) given its 8-country European footprint?"
      type: "quantification"
      targets:
        - "contentRequirements/1"
      status: "answered"
      answerSummary: "~€12–16B in Qonto's four core markets (FR, DE, IT, ES); ~€18–22B including all 8 active markets. Digitally-reachable SAM narrows to ~€3–5B with 20–25% adoption ceiling."

    - id: "QM005"
      question: "What is the estimated serviceable obtainable market (SOM) for Qonto at 5-year maturity?"
      type: "quantification"
      targets:
        - "contentRequirements/1"
      status: "answered"
      answerSummary: "~€1–2B annual fee revenue, implied by current ~€200M ARR (unconfirmed) growing at 15–20% CAGR. Confidence is low without confirmed revenue."

    - id: "QM006"
      question: "What is the projected CAGR for European SMB fintech from 2023–2028?"
      type: "quantification"
      targets:
        - "contentRequirements/1"
        - "contentRequirements/3"
      status: "answered"
      answerSummary: "15–20% CAGR cited in specialist reports (Mordor Intelligence, GVR). McKinsey's EMEA payments CAGR is a more conservative 6–8%; SMB-digital segment outpaces overall mean."

    - id: "QM007"
      question: "What is the current neobank penetration rate among European SMBs?"
      type: "quantification"
      targets:
        - "contentRequirements/2"
        - "contentRequirements/3"
      status: "answered"
      answerSummary: "Estimated 5–10% but inconsistent across sources. Qonto's 600K customers in 8 countries represent ~2–3% of 26M EU SMBs. Triangulation suggests 1–1.5M EU SMBs hold a neobank account."

    - id: "QM008"
      question: "Which incumbent banks dominate European SMB business banking and what market share do they hold?"
      type: "enumeration"
      targets:
        - "contentRequirements/0"
        - "contentRequirements/2"
      status: "answered"
      answerSummary: "BNP Paribas, Société Générale (France), Deutsche Bank, Commerzbank (Germany), Unicredit (Italy), ING (NL/BE), BBVA/Santander (Spain) are the dominant incumbents; collectively serve >90% of EU SMBs."

    - id: "QM009"
      question: "How does PSD2 affect competitive dynamics for challenger neobanks in the EU SMB market?"
      type: "mechanism"
      targets:
        - "contentRequirements/3"
      status: "answered"
      answerSummary: "PSD2 mandates open API access to bank accounts for licensed TPPs, enabling account aggregation and payment initiation. This lowers barriers for challengers but adoption has been slower than expected per EBA."

    - id: "QM010"
      question: "What does the EU Instant Payments Regulation (2024/886) require of PSPs and by when?"
      type: "verification"
      targets:
        - "contentRequirements/3"
      status: "answered"
      answerSummary: "Regulation (EU) 2024/886 entered into force April 2024; credit institutions must send/receive SCT Inst by January 2025; EMIs/PIs by October 2025. All must offer instant payments at no premium above standard SEPA transfer."

    - id: "QM011"
      question: "What share of SEPA Credit Transfer volume is currently processed via SCT Inst (instant payments)?"
      type: "quantification"
      targets:
        - "contentRequirements/3"
      status: "answered"
      answerSummary: "As of 2022–2023, SCT Inst constituted ~12% of SEPA credit transfer volume in eurozone; McKinsey projects this could reach 45% by 2027 under pro-regulatory scenario."

    - id: "QM012"
      question: "What are the primary switching cost factors preventing SMBs from moving from incumbent banks?"
      type: "mechanism"
      targets:
        - "contentRequirements/3"
      status: "answered"
      answerSummary: "Payroll mandate migration, supplier IBAN updates, Direct Debit mandates, accounting software integrations, and loss of credit facilities are the primary switching costs; can take weeks for a 10–50 person firm."

    - id: "QM013"
      question: "What segments of SMBs is Qonto primarily targeting, and how does budget ownership differ by segment?"
      type: "enumeration"
      targets:
        - "contentRequirements/2"
      status: "answered"
      answerSummary: "Four primary segments: freelancers/auto-entrepreneurs (~50% of Qonto customers), micro-businesses (1–9), small businesses (10–49), medium businesses (50–249), plus VC-backed startups. Budget owner is founder/sole proprietor at micro level; transitions to CFO at 50+ employees."

    - id: "QM014"
      question: "What is Qonto's approximate market share in its home market of France?"
      type: "quantification"
      targets:
        - "contentRequirements/2"
      status: "partial"
      answerSummary: "Qonto has 600,000+ customers across 8 countries; given ~50%+ estimated French customer concentration, this implies ~300,000 French customers vs. ~4M French SMBs = ~7.5% market share in France—but customer geography split is unconfirmed."

    - id: "QM015"
      question: "What is the EU DORA regulation and how does it constrain SMB neobanks?"
      type: "mechanism"
      targets:
        - "contentRequirements/3"
      status: "answered"
      answerSummary: "DORA (Regulation (EU) 2022/2554) applies from January 2025; requires ICT risk management frameworks, incident reporting, third-party provider due diligence; disproportionately burdens challengers vs. incumbents with existing compliance infrastructure."

    - id: "QM016"
      question: "What are the key adjacencies to Qonto's core business banking offering, and how large are they?"
      type: "quantification"
      targets:
        - "contentRequirements/0"
      status: "answered"
      answerSummary: "Invoice financing, FX for SMBs, business insurance, and B2B embedded lending are the primary adjacencies. SMB credit market alone estimated at 2–3× the fee pool (€50–75B annual origination EU-wide); no challenger-specific breakdown available."

    - id: "QM017"
      question: "How does Revolut Business's scale compare to Qonto in the European SMB market as of 2026?"
      type: "comparison"
      targets:
        - "contentRequirements/2"
      status: "partial"
      answerSummary: "Revolut Business reports 30,000+ new businesses/month globally. Qonto has 600,000 total customers across 8 EU markets. Direct like-for-like EU SMB comparison is difficult as Revolut operates in 150+ countries and aggregates consumer and business figures."

    - id: "QM018"
      question: "Has any neobank targeting European SMBs disclosed adverse regulatory sanctions or fines in 2024–2026?"
      type: "adverse"
      targets:
        - "contentRequirements/4"
      status: "answered"
      answerSummary: "N26 received orders from German regulator BaFin in 2021 limiting new customer onboarding due to AML failings. Qonto received a June 2025 Paris court ruling requiring €672,139 reimbursement for fraud (strong authentication failure). These represent documented adverse events."

    - id: "QM019"
      question: "What is the revenue split between subscription fees, transaction fees, and credit/float for European SMB neobanks?"
      type: "quantification"
      targets:
        - "contentRequirements/1"
      status: "partial"
      answerSummary: "Qonto does not disclose revenue breakdown publicly. McKinsey notes commercial segment now generates 53% of EMEA payments revenues vs. consumer; interest/float income rose sharply with rising rates (NII share jumped from 33% to 45% in one year in EMEA in 2022)."

    - id: "QM020"
      question: "What market research methodologies have been used to estimate the €25B European SMB banking TAM?"
      type: "verification"
      targets:
        - "contentRequirements/4"
      status: "partial"
      answerSummary: "The €25B+ figure circulates as an industry benchmark but its methodology is not publicly sourced to a single authoritative study. Bottom-up build from Eurostat SMB counts × revenue benchmarks yields similar range."

    - id: "QM021"
      question: "What is the adoption rate of digital banking among EU SMBs as of 2024–2026?"
      type: "freshness"
      targets:
        - "contentRequirements/2"
        - "contentRequirements/3"
      status: "partial"
      answerSummary: "Statista data (paywalled) on neobanking adoption shows rapid growth since 2020; European digital banking penetration for SMBs is estimated at 40–60% for online banking broadly but <10% for pure neobank primary account."

    - id: "QM022"
      question: "Do conflicting market size estimates for European SMB banking exist, and what explains the divergence?"
      type: "adverse"
      targets:
        - "contentRequirements/4"
      status: "answered"
      answerSummary: "Yes. Estimates range from €8B (SMB-only, fee-only) to €40B+ (including consumer, credit, embedded finance adjacencies). Scope differences (SMB vs. all digital banking) and revenue line inclusions are the primary driver."

    - id: "QM023"
      question: "What is the average monthly fee charged by incumbent banks in France, Germany, Italy, and Spain for basic SMB accounts?"
      type: "quantification"
      targets:
        - "contentRequirements/0"
        - "contentRequirements/1"
      status: "answered"
      answerSummary: "Traditional bank monthly fees for basic SMB business accounts range from €30–100/month (€360–1,200/year) across EU markets; some offer free basic tiers with fee-generating services attached."

    - id: "QM024"
      question: "How does Qonto's pricing compare to traditional incumbents on an ARPU basis?"
      type: "comparison"
      targets:
        - "contentRequirements/2"
      status: "answered"
      answerSummary: "Qonto Basic at €9/month is materially below incumbent base fees (€30–100/month), though Qonto's ARPU is boosted by Smart (€19) and Premium (€39) plans plus add-ons. Actual blended ARPU is unconfirmed."

    - id: "QM025"
      question: "What is the total number of businesses joining Revolut Business per month as of 2025–2026?"
      type: "freshness"
      targets:
        - "contentRequirements/2"
      status: "answered"
      answerSummary: "Revolut Business reports 30,000+ new businesses joining per month as of its 2024 award claim; this is a marketing figure and may include global non-EU markets."

    - id: "QM026"
      question: "What regulatory timeline does SEPA Instant Credit Transfer face for mandatory adoption in the Eurozone?"
      type: "verification"
      targets:
        - "contentRequirements/3"
      status: "answered"
      answerSummary: "EU Instant Payments Regulation (EU) 2024/886 entered into force April 2024. Eurozone credit institutions had to offer SCT Inst by 9 January 2025; EMIs and PIs by 9 October 2025. Non-euro EEA countries have later deadlines."

    - id: "QM027"
      question: "What growth rate does McKinsey project for EMEA payments revenue, and does this support the 15–20% SMB neobank CAGR?"
      type: "comparison"
      targets:
        - "contentRequirements/3"
      status: "answered"
      answerSummary: "McKinsey projects 6–8% CAGR for EMEA payments revenues overall to 2027. SMB neobanking sub-segment outpaces this due to low penetration base, but the specific SMB-neobank CAGR of 15–20% is from less authoritative sources."

    - id: "QM028"
      question: "Has any independent study contradicted the 26 million EU SMB count estimate?"
      type: "adverse"
      targets:
        - "contentRequirements/4"
      status: "answered"
      answerSummary: "No contradicting study found; the 26M figure is widely cited and consistent with Eurostat's last published SME statistics (2020–2022 data). Exact count varies by definition of micro (0 employees included or not)."

    - id: "QM029"
      question: "What is bunq's stated customer count and target segment for business banking in Europe?"
      type: "verification"
      targets:
        - "contentRequirements/2"
      status: "answered"
      answerSummary: "Bunq positions itself as sustainable business banking for European SMBs; its homepage states business plan onboarding in 5 minutes. Specific customer count not disclosed on public-facing pages."

    - id: "QM030"
      question: "What is the estimated market size for SMB invoice financing and embedded lending in the EU?"
      type: "quantification"
      targets:
        - "contentRequirements/0"
        - "contentRequirements/1"
      status: "partial"
      answerSummary: "SMB credit market estimated at 2–3× the fee pool (€50–75B annual origination EU-wide); however, no authoritative challenger-specific or digital-primary lender breakdown is available from accessible sources."

  evidenceGaps:
    - type: "inaccessible-paywall"
      severity: "material"
      topic: "market-sizing"
      missingEvidence: >
        Mordor Intelligence and Grand View Research SMB digital banking market reports were not accessible during
        research (404/403). These reports are frequently cited in secondary coverage as sources for the €8–15B
        European digital banking SMB TAM estimate. Without accessing the underlying methodology, the confidence
        in analyst-derived TAM estimates remains low.
      whyItMatters: >
        The market size underpins Qonto's long-term revenue potential narrative. Without an authoritative study,
        TAM claims in investor materials are difficult to independently validate.
      diligencePath: >
        Commission or purchase Mordor Intelligence / Grand View Research report; alternatively, build a proprietary
        model from Eurostat SMB counts, ECB banking data, and country-level banking fee benchmarks.
      relatedQuestionRefs:
        - "QM002"
        - "QM019"
        - "QM020"

    - type: "private-evidence-only"
      severity: "material"
      topic: "neobank-penetration"
      missingEvidence: >
        No authoritative, publicly accessible data source provides a breakdown of European SMB neobank adoption
        by country or segment with a consistent methodology as of 2024–2026. The 5–10% penetration figure
        circulates in trade press but lacks a traceable primary source.
      whyItMatters: >
        Penetration rate is the key input for SAM sizing and competitive intensity modeling. An inconsistency
        was identified: 5% penetration of 26M SMBs = 1.3M accounts; Qonto's 600K + Revolut Business +
        N26 Business + bunq likely exceeds 1.3M, suggesting either penetration is higher or some estimates
        double-count multi-bank users.
      diligencePath: >
        Commission customer panel survey across France, Germany, Italy, Spain with primary banking account
        question; subscribe to Frost & Sullivan or Capgemini financial services SMB tracker.
      relatedQuestionRefs:
        - "QM007"
        - "QM014"
        - "QM017"
        - "QM021"
        - "QM022"

    - type: "conflicting-estimates"
      severity: "moderate"
      topic: "market-sizing"
      missingEvidence: >
        Market size estimates for European SMB/digital banking range from €8B to €40B+, creating a factor-5
        uncertainty that makes it impossible to use a single number with high confidence. The divergence
        reflects different scope assumptions (SMB-only vs. all digital banking, fees-only vs. including credit).
      whyItMatters: >
        A 5× range in TAM is material for any investment thesis. The lower bound suggests Qonto's SOM ambitions
        require majority neobank market share (implausible near-term); the upper bound suggests the market is
        large enough to support multiple billion-euro challengers.
      diligencePath: >
        Construct scope-consistent proprietary model: start from Eurostat SME statistics, apply revenue-per-
        account benchmarks from ECB banking data, disaggregate by product line (fees, credit, float), and
        validate with a bank industry contact.
      relatedQuestionRefs:
        - "QM002"
        - "QM006"
        - "QM028"
        - "QM030"

