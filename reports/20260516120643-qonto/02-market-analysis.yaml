    - id: "CM006"
      statement: >-
        The principal switching barrier for SMBs changing primary bank accounts is the operational cost of
        migrating payroll mandates, supplier IBANs, Direct Debit mandates, and accounting integrations—a process
        that can take weeks for a 10–50 person business.
      type: "inferred"
      topic: "switching-costs"
      sourceRefs:
