      statement: >-
        The European B2B business banking market for SMBs is estimated at €25B+ in annual addressable fee revenue
        across the EU, combining account subscription fees, payment fees, card interchange, and float income.
        This is a widely cited industry benchmark; the underlying methodology is not traceable to a single
        authoritative public study.
