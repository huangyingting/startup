        Key adjacencies to Qonto's core business banking offering include invoice financing, foreign exchange for
        SMBs, business insurance, and B2B embedded lending—all requiring additional licensing (notably a full banking
        licence, applied for July 2025) to offer on Qonto's own balance sheet.
      type: "inferred"
      topic: "market-adjacencies"
      sourceRefs:
        - SM022
        - SM016
      confidence: "medium"
      freshness: "current"
      answersQuestionRefs:
