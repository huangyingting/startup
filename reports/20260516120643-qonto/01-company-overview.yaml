  - id: "leadership-and-governance"
    title: "Leadership and Governance"
    body: >
      Qonto was co-founded by Alexandre Prot (CEO) and Steve Anavi (President), both of whom remain in their
      executive roles as of May 2026. Alexandre Prot is the son of Baudouin Prot, the former Chairman of BNP Paribas,
      giving him an unusual depth of personal exposure to traditional banking's strengths and shortcomings before
      co-founding Qonto. Steve Anavi brings a complementary entrepreneurial background. Both founders set out to build
      the solution they wished had existed when they themselves managed business finances, and their combined vision
      has driven the product roadmap since 2017.

      Key-person risk is material: there are no confirmed public disclosures of a strong third-tier executive bench
      below the two co-founders, and both Prot and Anavi are publicly identified as the defining faces of Qonto in
      all press coverage and investor communications. Governance is backed by an institutional investor roster that
      includes Valar Ventures, Alven Capital, Tencent, Tiger Global, DST Global, TCV, Alkeon Capital, Eurazeo, KKR,
      Insight Partners, and the European Investment Bank—providing board-level oversight. The company participates in
      France's Next40 index, signalling public recognition among the most promising French tech companies. Material
      leadership changes since founding appear limited to organic growth of the management team; no CEO or President
      departures have been publicly reported. Diligence should confirm the full C-suite composition, board seat
      allocations by investor, and any pending leadership transitions ahead of a potential IPO.
    claimRefs:
      - CO009
      - CO010
      - CO011
      - CO012
      - CO013
    tableRefs:
      - TO002

  - id: "funding-and-valuation"
    title: "Funding History and Valuation"
    body: >
      Qonto has raised approximately €622M in total primary equity funding across five disclosed rounds spanning
      2017–2022. The company began with a €1.6M seed round in January 2017 from Alven Capital and Valar Ventures,
      followed by a €10M Series A in July 2017, a Series B of approximately €20M in 2018, and a Series C of €104M in
      January 2020 that brought in Tencent as a strategic investor alongside returning backers. The landmark Series D
      raised €486M in January 2022 at a €4.4B valuation (~$5B USD at the time), making Qonto one of Europe's most
      valuable fintech companies and providing the capital base for sustained European expansion and product
      investment.

      The Series D was led by Tiger Global and TCV, with participation from Alkeon Capital, DST Global, Eurazeo, KKR,
      Insight Partners, Exor Seeds, and Gaingels, alongside existing investors. Valar Ventures, Alven Capital,
      Tencent, and the European Investment Bank remain on the register from earlier rounds. No further primary equity
      round has been confirmed as of May 2026, and no secondary transaction or disclosed debt facility has been
      publicly reported since the Series D. The valuation of €4.4B dates to January 2022; any current implied
      valuation is uncertain without a new primary round or disclosed secondary transaction. Total funding of €622M is
      confirmed across both the official Qonto LinkedIn page and the Qonto press/newsroom page.
    claimRefs:
      - CO014
      - CO015
      - CO016
      - CO017
