        Qonto does not publish audited financial statements or quarterly revenue metrics. Revenue, gross margin,
        EBITDA, and specific ARR figures are all private. The €200M+ ARR figure cited in specialist press is
        unverifiable from public sources. Profitability in 2023 was CEO-confirmed in July 2025 but without
        specific P&L detail.
