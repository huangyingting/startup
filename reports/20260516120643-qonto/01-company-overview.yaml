  - id: "milestones"
    title: "Company Milestones"
    body: >
      Qonto's development breaks into five phases: founding and regulatory establishment (2016–2018), European
      expansion (2019–2020), capitalisation and consolidation (2021–2022), acquisitions (2022–2024), and product
      broadening (2024–2026). The company soft-launched in France in July 2016, formalized in 2017 with its first
      funding rounds. The ACPR payment institution licence in July 2018 was the critical regulatory milestone
      enabling full commercial operations. Qonto expanded to Germany, Italy, and Spain in 2019, and simultaneously
      invested in its own Core Banking System to reduce dependence on third-party banking infrastructure.

      The January 2022 Series D (€486M, €4.4B valuation) was followed two months later by the acquisition of Penta,
      a German neobank for SMBs, which accelerated Qonto's German market penetration and brought its client count
      above 250,000. In March 2024, Qonto acquired Regate, a French SaaS firm providing collaborative accounting and
      bookkeeping software for accounting firms and their clients—now offered as "Regate by Qonto" in the integration
      marketplace. In May 2025, Qonto launched a physical payment terminal (POS device), entering the in-person
      payments market. In June 2025, a Paris commercial court ordered Qonto to reimburse the full €672,139 lost by
      the Fédération Française de Pentathlon Moderne (FFPM) due to a 2023 fraud enabled by spoofing attacks,
      ruling that Qonto had failed to implement adequate strong authentication procedures. In July 2025, Qonto
      applied for a full banking licence (établissement de crédit) from the ACPR, with CEO Prot stating the company
      became profitable in 2023 ahead of target. Expansion into Austria, Belgium, Portugal, and the Netherlands
      represents the most recent geographic frontier as of 2026.
