      sources serve as secondary corroboration only. No material claim rests solely on a restricted source.
chapter:
  number: 1
  title: "Company Overview"
  summary: >
    Qonto is a Paris-headquartered French payment institution (neobank) founded in 2017 by Alexandre Prot and Steve
    Anavi to serve European SMBs and freelancers with modern business banking. It has raised €622M in total funding,
    including a €486M Series D in January 2022 at a €4.4B valuation, and serves 600,000+ business customers across
    8 European countries as of May 2026, with 1,600–1,700 employees and an NPS of 70+. The CEO confirmed Qonto
    reached profitability in 2023, and in July 2025 the company applied for a full banking licence from the ACPR.
    A June 2025 court order required Qonto to reimburse €672,139 to the French Modern Pentathlon Federation following
    a 2023 fraud incident, representing the primary documented adverse regulatory/legal event.
sections:
  - id: "identity-and-business-model"
    title: "Identity and Business Model"
    body: >
      Qonto is a French payment institution operating under the trade name Qonto (legal entity: Qonto SA, registered
      at RCS Paris n° 819 489 626). Headquartered at 18 rue de Navarin, 75009 Paris, France, the company was founded
      in 2017 by Alexandre Prot and Steve Anavi with a mission to give European SMEs the financial tools they deserve.
      Qonto is not a bank but a regulated payment institution licensed by France's Autorité de Contrôle Prudentiel et
      de Résolution (ACPR) under registration number CIB 16958, granted on 21 June 2018. As of May 2026, Qonto
      operates across 8 European countries: France, Germany, Italy, Spain, Austria, Belgium, Portugal, and the
      Netherlands.

      The business model centres on a subscription-based all-in-one finance management platform for SMBs and
      freelancers. Plans range from Basic (€9/month) to Smart (€19/month) and Premium (€39/month), with add-on
      modules for advanced cash flow management and accounts receivable automation. Revenue streams include monthly
      subscription fees, card interchange, SEPA and SWIFT transfer fees, and interest remuneration income. Core
      product features include a European IBAN business account, Mastercard debit and credit cards (spending limits up
      to €400,000/month), SEPA and SWIFT international transfers, e-invoicing (including certified EU e-invoicing),
      accounts payable automation, expense management, and embedded financing (pay-later and loans directly into the
      Qonto account). Since 2019, Qonto has operated its own Core Banking System (CBS), giving it full control over
      transaction processing and enabling rapid product iteration. The platform integrates with 4,791 third-party
      tools including DATEV, Google Sheets, Zapier, QuickBooks, and accounting suites across all target markets.
    claimRefs:
      - CO001
      - CO002
      - CO003
      - CO004
      - CO005
      - CO006
      - CO007
      - CO008
    tableRefs:
      - TO001
    figureRefs:
