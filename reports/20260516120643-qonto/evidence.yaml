      public sources. Profitability in 2023 was CEO-confirmed in July 2025 but without specific P&L detail.
    whyItMatters: >
      Revenue and profitability details are critical inputs for any valuation diligence exercise. Without confirmed
      financials, the €4.4B Series D valuation (January 2022) cannot be benchmarked against current performance.
    diligencePath: >
