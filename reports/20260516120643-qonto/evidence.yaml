    keyQuote: >-
      Regulation (EU) 2024/886, commonly referred to as the Instant Payments Regulation (IPR), entered into force in
      April 2024, bringing significant changes to the SEPA Regulation. This new regulation introduces new mandatory
      requirements for instant credit transfers in euro, impacting Payment Service Providers (PSPs) located in the
      European Economic Area (EEA) whereby some of them already entered into force for eurozone-based PSPs on 9 January
      2025 and 9 October 2025 respectively.
