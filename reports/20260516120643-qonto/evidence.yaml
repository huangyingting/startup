    statement: >-
      Qonto is a French payment institution (neobank) founded in Paris in 2017, operating under the legal entity Qonto
      SA, registered at RCS Paris n° 819 489 626, headquartered at 18 rue de Navarin, 75009 Paris, France.
    type: observed
    topic: identity
