  - id: CO003
    statement: >-
      Qonto is a licensed payment institution regulated by the French ACPR (Autorité de Contrôle Prudentiel et de
      Résolution) under CIB number 16958, granted on 21 June 2018. It is not a bank.
    type: observed
    topic: regulatory
    sourceRefs:
