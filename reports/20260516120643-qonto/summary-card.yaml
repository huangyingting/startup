      Intensifying competition from Revolut Business (well-funded, pan-European), Tide (UK expansion), ANNA, and
      incumbent banks digitising SME offerings
    - >-
      Regulatory cost escalation: PSD2/3, DORA, anti-money-laundering obligations increase compliance burden across 6
      markets
    - 'Penta/Kontist integration complexity: German market underperforming, technology stack harmonisation unresolved'
    - >-
      Macro sensitivity: SME customer base is prone to higher churn during economic downturns; credit market tightening
      could reduce expansion revenue
    - No disclosed NRR or churn data; inability to validate growth sustainability from public evidence
  unresolvedGaps:
