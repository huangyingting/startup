  evidenceGaps:
    - type: "private-evidence-only"
      severity: "material"
      topic: "retention-metrics"
      missingEvidence: >
        Qonto does not publicly disclose gross revenue retention (GRR), net revenue retention (NRR),
        or cohort-level annual churn rates. No subscription tier breakdown (share of customers on Basic
        vs. Smart vs. Premium) is publicly available.
      whyItMatters: >
        GRR and NRR are critical inputs for valuation diligence. NRR >100% would confirm the
        land-and-expand motion is working; GRR <85% would indicate meaningful downgrade or churn
        pressure. The subscription tier mix determines blended ARPU and revenue quality.
      diligencePath: >
        Request cohort retention tables (monthly and annual), GRR and NRR by year 2021–2025, and
        subscription tier distribution from the investor data room. Ask management to confirm the
        share of customers who have upgraded tiers in the past 12 months.
      relatedQuestionRefs:
        - "QU016"
        - "QU017"

    - type: "private-evidence-only"
      severity: "material"
      topic: "customer-acquisition-economics"
      missingEvidence: >
        Customer acquisition cost (CAC) by channel, payback period, and lifetime value (LTV) are not
        publicly disclosed. The SME vs. freelancer customer split is also undisclosed, limiting
        understanding of segment economics and ARPU variability.
      whyItMatters: >
        CAC/LTV ratio is a foundational metric for assessing unit economics and sustainable growth.
        Without it, the claim of profitability since 2023 cannot be fully validated. The SME-to-
        freelancer split affects margin analysis, as SME accounts typically carry higher ARPU and
        multi-card revenue.
      diligencePath: >
        Request CAC by channel (digital SEO/SEM, accountant referral, organic), payback period by
        cohort year, and the SME-to-freelancer customer count and revenue breakdown from management.
      relatedQuestionRefs:
        - "QU021"
        - "QU026"

    - type: "enumeration-incomplete"
      severity: "material"
      topic: "named customer proof"
      missingEvidence: >
        No comprehensive list of named enterprise or mid-market customers (10–250 employees) is
        publicly available for Qonto. The named customer proof table (TU003) is a sample of publicly
        attributable references only and likely understates the actual enterprise customer base.
      whyItMatters: >
        B2B SaaS diligence typically requires 5–10 customer reference calls to validate outcomes,
        retention, and platform maturity. The absence of a named customer list limits independent
        corroboration of Qonto's enterprise traction claims.
      diligencePath: >
        Request a list of 10+ reference customers (10+ employee SMBs) willing to speak with diligence
        team. Prioritise customers in France and Germany across at least 3 different industry verticals.
        Confirm whether any enterprise accounts (50–250 employees) are in the base.
      relatedQuestionRefs: []
      relatedTableRefs:
        - TU003
