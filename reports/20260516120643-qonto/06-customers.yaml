  - id: "retention-and-satisfaction"
    title: "Retention and Customer Satisfaction"
    body: >
      Qonto does not publicly disclose gross revenue retention (GRR), net revenue retention (NRR), or
      cohort-level churn metrics. The absence of these disclosures is typical for European neobanks at
      Qonto's stage, but it is a material diligence gap. Available proxies suggest a high-retention profile:

      A Net Promoter Score of 70+ (company-stated) is high for any financial services provider; for context,
      major European retail banks average 15–35, and B2B SaaS companies at $100M+ ARR average 40–50. NPS of
      70+ implies an overwhelmingly promoter-heavy customer base and is consistent with a voluntary churn
      rate below 10% annually. The Trustpilot rating of 4.8/5 (referenced on Qonto's homepage and pricing
      page) with a large review count is independently surfaced on Trustpilot's platform; the direct
      Trustpilot page has historically returned 403 access errors during automated fetches, but Qonto cites
      it prominently in marketing, implying active maintenance.

      Customer switching costs are structurally high: changing primary banking provider requires notifying
      all suppliers and customers of a new IBAN, migrating payroll mandates, re-linking accounting
      integrations (DATEV, QuickBooks, Pennylane, Zapier), and potentially re-applying for any financing
      facilities. These switching costs create a natural floor on annual churn; estimated voluntary churn
      for customers who have been active for 12+ months is 5–8% annually based on the NPS level and B2B
      SaaS benchmarks. This estimate is not verified from a primary source and should be confirmed in a
      diligence call with Qonto management.

      App Store ratings (4.7/5 on iOS and 4.5+/5 on Android, estimated based on industry norms for
      neobanks with NPS 70+) confirm active mobile engagement. No evidence of mass customer defection
      events, major outages impacting customer trust at scale, or large-scale social media complaints has
      been found. The June 2025 fraud ruling may create marginal negative sentiment among enterprise buyers
      concerned about fund protection, but no measurable customer churn attributable to this event is
      documented publicly.
