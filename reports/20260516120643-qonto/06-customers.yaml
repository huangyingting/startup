company:
  name: "Qonto"
chapter:
  number: 6
  title: "Customers & Market Traction"
  letter: U
  summary: >
    Qonto serves 600,000+ business customers across 8 EU markets as of May 2026, making it the largest B2B
    neobank by customer count in continental Europe. France accounts for an estimated 40–45% of the base
    (~250,000), with Germany ranking second (~25%) following the Penta and Kontist acquisitions in 2022. The
    customer mix spans micro-entrepreneurs, freelancers, and SMBs up to 250 employees, with micro-enterprises
    (≤9 employees) dominating. Qonto's NPS of 70+ and Trustpilot rating of 4.8/5 signal strong satisfaction
    and low voluntary churn, bolstered by high switching costs tied to IBAN migration and deep accounting
    integrations. No public NRR, GRR, or cohort data is disclosed; revenue per customer and subscription mix
    remain unverified. Geographic concentration in France (~42%) is the primary diligence risk, alongside
    the unresolved question of how the 2023 fraud court ruling affected enterprise customer trust.

sections:
  - id: "customer-segmentation"
    title: "Customer Segmentation"
    body: >
      Qonto targets European SMBs and freelancers across three primary buyer-payer segments: (1)
      micro-entrepreneurs and auto-entrepreneurs (sole traders, typically on Basic or Smart plans), (2) small
      businesses with 1–9 employees (the largest SMB cohort in all 8 markets), and (3) growing SMBs with
      10–250 employees (Premium plan and add-on modules). The company does not publicly report revenue
      breakdowns by segment, but platform pricing and feature architecture indicate that the 10–250 employee
      cohort, while smaller in volume, drives disproportionately higher revenue per account through multi-card
      issuance, sub-account usage, accounting automation, and financing.

      Geographically, France dominates with an estimated 40–45% of the 600,000+ customer base (~240,000–270,000
      businesses), reflecting Qonto's 2017 home-market launch and its dense presence among French
      auto-entrepreneurs and TPE (très petites entreprises). Germany is the second-largest market, accounting
      for an estimated 20–25% of total customers, a position largely acquired rather than organically grown:
      the March 2022 acquisition of Penta brought approximately 100,000 German SMB customers, and the earlier
      integration of Kontist added a further ~50,000 German freelancers. Italy and Spain are estimated at 10–15%
      combined, representing organic growth since 2019. The four newer markets—Austria, Belgium, Portugal, and
      the Netherlands—are estimated to comprise less than 10% of the total base, still in early-stage growth
      trajectories. The table below (TU001) summarises the estimated geographic distribution.

      Customer use cases centre on business banking (IBAN, cards, transfers), expense management, and
      invoicing, with higher-tier customers adding accounting integrations (DATEV, QuickBooks, Pennylane) and
      short-term financing. There is no evidence of vertical concentration by sector; Qonto's customer base
      spans technology firms, professional services, hospitality, retail, creative agencies, and construction—
      consistent with its generic SMB positioning across all 8 markets.
    claimRefs:
