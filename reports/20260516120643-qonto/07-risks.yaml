callouts:
  - calloutType: risk
    title: "ACPR Banking Licence: The Binary Risk Event"
    body: >-
      The ACPR banking licence application (filed July 2025) is the most consequential binary risk
      event for Qonto over the next 24 months. Approval unlocks insured deposits, balance-sheet
      lending, and deposit insurance parity with Revolut Bank. Denial forces Qonto to remain a payment
      institution, maintaining the structural product gap and requiring capital to remain deployed at
      the Series D EUR 4.4B mark in a compressed market. Diligence must include a granular assessment
      of ACPR governance, capital, and AML requirements vs Qonto's current readiness.
    claimRefs: [CR001, CR002, CR003, CR031]

  - calloutType: risk
    title: "CBS Single-Point-of-Failure: Low Probability, Very High Consequence"
    body: >-
      Qonto's proprietary in-house CBS has no vendor fallback. A full outage simultaneously affects
      600K+ customers across 8 EU countries, triggers DORA's 4-hour ACPR reporting threshold, and
      creates supervisory scrutiny during the banking licence application window. This is a low-
      probability but very-high-consequence risk that is partially unmitigated given the absence of
      a disclosed RTO/RPO and the lack of third-party CBS vendor as fallback.
    claimRefs: [CR011, CR012, CR005, CR032]

  - calloutType: insight
    title: "June 2025 Court Ruling: Precedent Risk Matters More Than the Amount"
    body: >-
      The EUR 672,139 court order is financially immaterial to Qonto's revenue scale, but the legal
      precedent is significant. The ruling establishes that French courts may assign partial liability
      to payment institutions for social-engineering fraud, even without direct platform compromise.
      This precedent will attract plaintiff counsel to future Qonto fraud incidents and warrants
      investment in fraud detection controls and legal risk reserves beyond the immediate ruling amount.
    claimRefs: [CR006, CR007, CR042]
