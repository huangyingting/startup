chapter:
  number: 7
  title: "Risks"
  letter: R
  summary: >
    Qonto's risk profile is elevated for a Series D fintech, driven by four primary concerns: (1) the July 2025
    ACPR banking licence application, whose denial or delay would lock Qonto out of balance-sheet lending and
    require €100M–€300M minimum capital for approval; (2) dependence on a fully proprietary in-house Core Banking
    System (CBS) since 2019, creating a single-point-of-failure with no vendor fallback, amplified by DORA
    compliance obligations; (3) the June 2025 French court order requiring €672,139 reimbursement following a
    2023 fraud incident, documenting residual litigation and reputational exposure; and (4) Revolut Business
    aggressively targeting Qonto's French SMB customer base. Financial risks include potential valuation
    compression from the Series D mark (€4.4B, January 2022) and interchange fee compression from EU regulation.
    Mitigations include confirmed profitability since 2023, €622M total raised, ACPR payment institution licence
    CIB 16958, and multi-bank safeguarding. No thesis-breaking regulatory event has yet occurred.

