      - number: '3.4'
        title: Pricing and Packaging Analysis
        blocks:
          - type: paragraph
            body: >
              Qonto's pricing tiers (Basic 9 EUR per month, Smart 19 EUR per month, and Premium 39 EUR per month) are
              among the most clearly structured and predictable in the European SME neobank market. Unlike Wise
              Business, which charges percentage-based fees on all transfers, Qonto includes 20 free SEPA transfers per
              month on its Basic plan with no percentage surcharges on domestic payments. Unlike Revolut Business, which
              starts with a restricted free tier and then charges per transaction above a monthly allowance, Qonto's
              entry plan provides predictable monthly costs for SMBs with moderate transaction volumes.

              Memo Bank represents an extreme of the pricing spectrum at 250 EUR per month entry, reflecting its full
              banking licence and credit product suite, but this positions it primarily for established mid-market SMBs
              rather than the early-growth companies that form Qonto's core market. N26 Business at zero to 9.90 EUR per
              month serves the low end but is structurally limited to freelancers, reducing its relevance as a pricing
              competitor for corporate SMBs.

              All major competitors including Revolut Business, Wise Business, and N26 Business have increased their
              pricing or narrowed their free tier features since 2022, consistent with a broader shift in the neobank
              sector toward unit-economics discipline. Qonto's pricing structure is well-positioned for value-conscious
              growth-stage SMBs seeking a clear, comprehensive package rather than a la carte pay-as-you-go models. See
              TP003 for the full pricing comparison matrix.
