      - number: '5.5'
        title: Roadmap and Differentiation
        blocks:
          - type: paragraph
            body: >
              Qonto's product roadmap from 2024 through 2026 reflects a deliberate strategy of expanding from core
              payment infrastructure toward credit, AI-powered automation, and full banking capabilities. Qonto Credit,
              launched in 2024, introduced pay-later, term loans, and revenue-based financing directly into business
              accounts, placing credit risk on Qonto's balance sheet for the first time and expanding revenue streams
              beyond subscription fees and interchange. The credit underwriting methodology and loan book quality
              metrics remain private, constituting a diligence gap as the book scales.

              In 2025, Qonto rolled out AI-powered features across the product suite: invoice OCR for automated receipt
              capture and categorisation, AI-assisted invoice generation, and spend analytics dashboards. These features
              directly compete with standalone accounting automation tools and deepen the integration lock-in that
              already exists through the DATEV, Pennylane, and Sage partnerships. The most strategically significant
              roadmap item is the full banking licence (etablissement de credit) application filed with ACPR in
              approximately May 2025 and announced publicly in July 2025. Approval, a multi-year process, would unlock
              savings accounts, investment products, and full credit origination without partner-bank intermediation,
              requiring bank-level capital adequacy ratios.

              Geographic deepening in the Netherlands and Belgium in 2026 includes localization of product features and
              integrations with Exact Online, the dominant accounting software in those markets. IPO plans have been
              speculated in the French financial press for 2026 to 2027, with Euronext Paris as the most cited venue,
              but have not been confirmed by Qonto management. The combination of expanding credit capabilities, AI
              differentiation, banking licence progression, and integration moat positions Qonto as a platform-led
              challenger to the full SMB banking stack.
