      - number: '1.3'
        title: Funding History and Valuation
        blocks:
          - type: paragraph
            body: >
              Qonto has raised approximately €622M in total primary equity funding across five disclosed rounds spanning
              2017–2022. The company began with a €1.6M seed round in January 2017 from Alven Capital and Valar
              Ventures, followed by a €10M Series A in July 2017, a Series B of approximately €20M in 2018, and a Series
              C of €104M in January 2020 that brought in Tencent as a strategic investor alongside returning backers.
              The landmark Series D raised €486M in January 2022 at a €4.4B valuation (~$5B USD at the time), making
              Qonto one of Europe's most valuable fintech companies and providing the capital base for sustained
              European expansion and product investment.

              The Series D was led by Tiger Global and TCV, with participation from Alkeon Capital, DST Global, Eurazeo,
              KKR, Insight Partners, Exor Seeds, and Gaingels, alongside existing investors. Valar Ventures, Alven
              Capital, Tencent, and the European Investment Bank remain on the register from earlier rounds. No further
              primary equity round has been confirmed as of May 2026, and no secondary transaction or disclosed debt
              facility has been publicly reported since the Series D. The valuation of €4.4B dates to January 2022; any
              current implied valuation is uncertain without a new primary round or disclosed secondary transaction.
              Total funding of €622M is confirmed across both the official Qonto LinkedIn page and the Qonto
              press/newsroom page.
