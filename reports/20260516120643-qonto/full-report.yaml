  - id: TV005
    title: Thesis-Break and Kill Triggers Table
    layout: standard
    columns:
      - Trigger
      - Threshold
      - Impact on Thesis
      - Recommended Action
    rows:
      - - ACPR Banking Licence Denied
        - Formal ACPR rejection notice published
        - Eliminates primary upside catalyst; caps revenue ceiling; removes IPO case above €3B
        - Downgrade to Avoid; request data-room disclosure for strategic exit scenario
      - - Audited Revenue Shortfall
        - FY2024 audited ARR below €300M (>35% below claimed $500M)
        - Undermines base-case valuation; implies ARR multiple compression below 3×; down-round likely
        - Downgrade to Avoid; exit position if liquidity available at any price above bear case
      - - Down-Round Primary Equity Raise
        - New primary equity raised at <€3B post-money
        - Series D investors face mark-to-market loss; triggers ratchet/anti-dilution provisions depending on terms
        - Downgrade to Research-More; reassess thesis with updated cap table and preference waterfall
      - - Revolut EU Market Share Gain >25% SMB
        - Revolut European business customer base exceeds 1.5M (Qonto-equivalent market leadership at risk)
        - Competitive moat degraded; customer acquisition cost rises; churn risk increases
        - Watch closely; if CAC increases >20% in core markets, downgrade recommendation
      - - Key-Person Departure
        - CEO Alexandre Prot or President Steve Anavi departs without planned succession
        - Investor confidence and product continuity at risk; governance questions intensify pre-IPO
        - Downgrade to Research-More; engage management on succession planning
    notes: >
      Triggers are based on publicly available evidence and reasonable inferences from disclosed risk factors.
      Thresholds are illustrative; the actual impact depends on precise cap-table terms (not publicly disclosed) and
      market conditions at the time of the trigger event.
    claimRefs:
      - CV017
      - CV024
      - CV029
      - CV032
      - CV033
      - CV041
  - id: TV006
    title: Final Diligence Asks Table
    layout: wide
    columns:
      - Topic
      - Missing Evidence
      - Why It Matters
      - Diligence Path
    rows:
      - - Audited Financials
        - FY2023 and FY2024 audited IFRS P&L, balance sheet, and cash flow statement
        - >-
          No audited financials are publicly available; ARR, EBITDA margin, and profitability claims rest on CEO
          statements; any material shortfall would reset the valuation
        - >-
          Request in data room; confirm FY2023 'profitability' defined consistently (EBITDA vs. net income vs.
          operating) with auditor sign-off
      - - Cap Table and Preference Waterfall
        - >-
          Full cap table with round-by-round ownership %, liquidation preference amounts, anti-dilution provisions, and
          Series D term sheet
        - >-
          Unknown preference structure could absorb most proceeds in a below-Series-D-price exit; participation rights
          could further reduce common shareholder value
        - Obtain term sheets and cap-table model for each scenario (base/bull/bear) from legal counsel
      - - Banking Licence Status
        - ACPR correspondence, preliminary assessment letters, outstanding conditions for licence grant
        - >-
          Banking licence is the primary bull-case catalyst; licence denial or 3+ year delay is the primary bear-case
          trigger; current status is opaque beyond the July 2025 application date
        - Request regulatory correspondence; engage ACPR directly via licensed legal counsel; check public ACPR registry
      - - ARR Composition and Retention
        - >-
          ARR breakdown by subscription tier (Basic/Smart/Premium), country, and revenue line (subscription vs.
          interchange vs. float); NRR or gross revenue retention metrics
        - >-
          Subscription ARR has different durability than interchange ARR; geographic concentration affects risk; NRR
          drives valuation premium or discount vs. pure SaaS comps
        - Request management accounts with ARR waterfall, cohort retention data, and churn by tier and country
      - - Debt and Credit Facility
        - >-
          Any credit lines, asset-backed facilities, EIB loan terms, or off-balance-sheet structures used to fund the
          lending book
        - >-
          If Qonto extends credit products, the funding structure affects capital adequacy and risk profile; relevant to
          banking licence assessment
        - Request balance sheet with full liability breakdown; confirm EIB facility terms and covenant structure
    notes: >
      These represent the minimum diligence required before upgrading the recommendation from Track to Buy. Additional
      diligence on customer concentration (top-20 accounts as % ARR), fraud/AML control framework (post-Pentathlon
      ruling), and executive compensation/vesting structure is also recommended.
    claimRefs:
      - CV004
      - CV006
      - CV016
      - CV017
      - CV029
      - CV033
      - CV034
