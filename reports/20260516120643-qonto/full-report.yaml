      - number: '3.3'
        title: Feature and Capability Comparison
        blocks:
          - type: paragraph
            body: >
              Across eight key product capabilities evaluated for six competitors, Qonto leads the competitive set with
              the broadest depth in SME-specific functionality. Multi-user role management (supporting custom spending
              limits, card issuance per user, and approval workflows) is fully available on Qonto and Revolut Business,
              but unavailable on N26 Business and only partially available on Wise Business and Holvi. This capability
              is structurally critical for Qonto's target segment of companies with 5 to 50 employees who need to
              delegate financial authority without losing oversight or control.

              SEPA Instant transfers are available on Qonto (confirmed May 2026), Revolut Business (confirmed), and Memo
              Bank (confirmed), but are inconsistently available on N26 Business and Holvi. Multi-currency accounts are
              a clear differentiator for Revolut Business and Wise Business over Qonto, though Qonto offers partial
              multi-currency functionality. This is one area where Revolut Business retains a structural advantage.

              On accounting integrations specifically the DATEV ecosystem in Germany and Pennylane in France Qonto leads
              the competitive set with 4,791 documented integrations. No direct competitor has publicly matched this
              breadth or depth. Qonto is also the only provider in its direct competitive set to offer EU-certified
              e-invoicing across all 8 operating countries, an increasingly important regulatory requirement as national
              e-invoicing mandates expand across France, Germany, Italy, and Spain.

              API access with full documentation is available on Qonto, Revolut Business, and Wise Business, but only
              partially or without documentation on N26 Business and Memo Bank, and absent on Holvi. Physical Mastercard
              and Visa cards are universally available across all six evaluated providers, confirming that card issuance
              has become a commodity feature. The bar chart (FP002) compares total feature counts across the competitive
              set, confirming Qonto's leadership with 9 of 10 evaluated capabilities present, ahead of Revolut Business
              at 8, Wise Business at 6, and N26 Business and Memo Bank at 5 each.
