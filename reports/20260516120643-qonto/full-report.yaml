  - id: FV001
    title: Recommendation Logic
    type: flow
    summary: >-
      Chain from Qonto's scale, proof points, risks, and valuation context to the Track recommendation and
      upgrade/downgrade triggers.
    data:
      nodes:
        - id: scale
          label: Scale & Proof
          detail: 600K+ EU SMB customers; profitability confirmed 2023; NPS 70+; 8-country ACPR-regulated footprint
        - id: risk
          label: Key Risks
          detail: Stale 2022 valuation (€4.4B); no audited financials; banking licence unresolved; key-person concentration
        - id: comps
          label: Valuation Context
          detail: Wise 5-7× revenue; public comps compressed 40-60%; base-case fair value €2.5-3.5B (6-8× ARR)
        - id: gaps
          label: Information Gaps
          detail: No public IFRS filings; ARR company-claimed only; preference waterfall undisclosed; licence status opaque
        - id: recommendation
          label: Track
          detail: >-
            Compelling thesis but critical data gaps and stale price prevent Buy conviction; monitor for upgrade
            triggers
        - id: upgrade
          label: Buy Upgrade Triggers
          detail: Audited ARR ≥€400M + banking licence progress + entry price ≤€3B
        - id: downgrade
          label: Avoid Downgrade Triggers
          detail: Licence denial + down-round primary raise + audited revenue shortfall vs. claims
      edges:
        - from: scale
          to: recommendation
          label: supports
        - from: risk
          to: recommendation
          label: constrains
        - from: comps
          to: recommendation
          label: anchors price
        - from: gaps
          to: recommendation
          label: limits confidence
        - from: recommendation
          to: upgrade
          label: path to Buy
        - from: recommendation
          to: downgrade
          label: path to Avoid
    claimRefs:
      - CV007
      - CV009
      - CV024
      - CV033
  - id: FV002
    title: Valuation Sensitivity Bar Chart
    type: bar
    summary: Implied Qonto enterprise value (€B) at varying ARR revenue multiples from 3× to 12×, anchored on ~€460M base ARR.
    data:
      items:
        - label: 3× ARR (bear floor)
          value: 1.4
          unit: €B
          note: Represents severe multiple compression scenario; bear-case lower bound
        - label: 4× ARR (bear case)
          value: 1.8
          unit: €B
          note: Licence-denied, Revolut share-gain scenario
        - label: 6× ARR (base low)
          value: 2.8
          unit: €B
          note: Wise-range multiple; lower end of base-case fair value
        - label: 7× ARR (base mid)
          value: 3.2
          unit: €B
          note: Central base-case estimate; Wise 5-7× midpoint with EU moat premium
        - label: 8× ARR (base high)
          value: 3.7
          unit: €B
          note: Upper end of base case; supported by Monzo and Starling secondary comps
        - label: 10× ARR (bull case)
          value: 4.6
          unit: €B
          note: Banking licence granted; IPO premium; requires confirmed profitability and growth
        - label: 12× ARR (bull ceiling)
          value: 5.5
          unit: €B
          note: Near Series D price parity; requires banking licence + >25% ARR growth
    approximationNotes: >
      ARR base of €460M derived from company-claimed $500M at EUR/USD 1.09. All EV estimates exclude net debt, cash, and
      preference adjustments. Actual enterprise value may differ from equity value once preference waterfall is applied.
