      - number: '3.6'
        title: Exhibits
        blocks:
          - type: callout
            title: Purpose-Built SME Positioning
            body: >
              Qonto's core differentiation from Revolut Business and N26 Business is structural, not merely cosmetic.
              While consumer-first neobanks have retrofitted business features onto personal banking rails, Qonto was
              architected from day one for SMBs and freelancers. This manifests in unique capabilities that cannot be
              quickly copied: EU-certified e-invoicing compliant with national mandates across 8 countries, DATEV
              integration native to German accounting workflows used by over one million accountants, and multi-user
              role management with approval workflows suited to 5 to 50 person finance teams. With 600,000+ business
              customers, 4,791 integrations, and a Trustpilot rating of 4.8 out of 5, Qonto has established a SME-first
              brand and product identity that incumbents and horizontal neobanks struggle to credibly replicate.
            calloutType: strength
            claimRefs:
