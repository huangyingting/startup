      - number: '1.6'
        title: Exhibits
        blocks:
          - type: callout
            title: Regulatory Moat and Own Infrastructure
            body: >
              Qonto holds a full ACPR payment institution licence (CIB 16958, 2018) with EU passporting rights, removing
              a significant barrier to entry in additional European markets. Since 2019 it operates on its own Core
              Banking System (CBS), providing control over transaction processing and enabling faster product iteration
              without reliance on banking-as-a-service middleware. This combination of regulatory standing and
              proprietary infrastructure is a durable structural advantage over fintech challengers still dependent on
              bank partners.
