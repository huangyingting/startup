      - number: '8.6'
        title: Exit Readiness and Final Diligence Asks
        blocks:
          - type: paragraph
            body: >
              Qonto's exit readiness in May 2026 is intermediate: the operational foundations for an IPO exist (scale,
              profitability, multi-country regulatory status, institutional investor syndicate) but the necessary
              preconditions for a near-term public offering are not yet in place. No IPO timeline has been publicly
              announced. The banking licence application creates a natural hold period: investors and the company will
              likely await the ACPR outcome before committing to an IPO path, as the licence would materially change the
              financial profile presented to public-market investors.

              Three exit paths are viable. First, an IPO on Euronext Paris or the LSE, most likely in 2027-2028
              following banking licence resolution. Qonto would need to publish audited IFRS financial statements,
              establish an independent board, and reach a market cap above €3B to achieve meaningful free float.
              France's Next40 membership signals regulatory and political alignment with a Paris listing. Second, a
              strategic acquisition by a European incumbent bank (BNP Paribas, Société Générale, ING, Santander) seeking
              digital SMB distribution and modern core banking technology. At €2.5-4B, the asset is accessible to large
              European banks seeking fintech capabilities. Third, a secondary transaction allowing early-vintage
              investors (Valar, Alven) to realize gains while later investors maintain exposure. Secondary transaction
              pricing would be the most direct read on current fair value but no such transaction has been publicly
              disclosed.

              The thesis-break threshold is the banking licence outcome. A denial or indefinite deferral would remove
              the primary upside catalyst, cap revenue per customer, and likely trigger a down-round primary equity
              raise. A June 2025 court ruling requiring fraud reimbursement signals compliance gaps that ACPR will
              scrutinize in the licence review. Investors should also monitor Revolut's European market share progress
              and any audited revenue disclosure from Qonto that could confirm or undermine the $500M ARR claim.
            claimRefs:
              - CV016
              - CV017
              - CV025
              - CV029
