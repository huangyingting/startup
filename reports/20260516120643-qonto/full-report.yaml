  - number: 6
    title: Customers
    sections:
      - number: '6.1'
        title: Customer Segmentation
        blocks:
          - type: paragraph
            body: >
              Qonto targets European SMBs and freelancers across three primary buyer-payer segments: (1)
              micro-entrepreneurs and auto-entrepreneurs (sole traders, typically on Basic or Smart plans), (2) small
              businesses with 1–9 employees (the largest SMB cohort in all 8 markets), and (3) growing SMBs with 10–250
              employees (Premium plan and add-on modules). The company does not publicly report revenue breakdowns by
              segment, but platform pricing and feature architecture indicate that the 10–250 employee cohort, while
              smaller in volume, drives disproportionately higher revenue per account through multi-card issuance,
              sub-account usage, accounting automation, and financing.

              Geographically, France dominates with an estimated 40–45% of the 600,000+ customer base (~240,000–270,000
              businesses), reflecting Qonto's 2017 home-market launch and its dense presence among French
              auto-entrepreneurs and TPE (très petites entreprises). Germany is the second-largest market, accounting
              for an estimated 20–25% of total customers, a position largely acquired rather than organically grown: the
              March 2022 acquisition of Penta brought approximately 100,000 German SMB customers, and the earlier
              integration of Kontist added a further ~50,000 German freelancers. Italy and Spain are estimated at 10–15%
              combined, representing organic growth since 2019. The four newer markets—Austria, Belgium, Portugal, and
              the Netherlands—are estimated to comprise less than 10% of the total base, still in early-stage growth
              trajectories. The table below (TU001) summarises the estimated geographic distribution.

              Customer use cases centre on business banking (IBAN, cards, transfers), expense management, and invoicing,
              with higher-tier customers adding accounting integrations (DATEV, QuickBooks, Pennylane) and short-term
              financing. There is no evidence of vertical concentration by sector; Qonto's customer base spans
              technology firms, professional services, hospitality, retail, creative agencies, and construction—
              consistent with its generic SMB positioning across all 8 markets.
