      - number: '1.4'
        title: Key Metrics and Scale
        blocks:
          - type: paragraph
            body: >
              As of May 2026, Qonto reports 600,000+ business customers across 8 European countries, confirmed across
              multiple official pages including the About, Trust, and Press sections of qonto.com. The company has also
              assisted 250,000 entrepreneurs in creating their companies through its integrated company-registration
              service. Qonto's Net Promoter Score (NPS) is reported at 70+, which the company describes as among the
              highest in the European banking sector. The Trustpilot rating is 4.8 out of 5, referenced directly on the
              Qonto homepage. The company employs 1,600–1,700 people (the About page states "1,700 strong" while the
              Press page states "1,600+" as of May 2026).

              Revenue data was not publicly confirmed until July 2025, when CEO Alexandre Prot disclosed at a press
              conference that Qonto had become profitable in 2023, ahead of its original target. No specific revenue
              figure has been published; a figure of €200M+ ARR has been cited in specialist fintech publications for
              2024 but has not been independently verified from official filings or press releases. Total financed
              capital via Qonto's lending products is stated as €100M on the official About page. The company is a
              member of France's Next40 index of most promising startups. In July 2025, Qonto applied for a full banking
              licence (établissement de crédit) from the ACPR, a multi-year process intended to allow Qonto to offer
              credit, savings, and investment products directly. No IPO timeline has been publicly disclosed.
