companyProfile:
  summary: >-
    Qonto was founded in Paris in 2016 by Alexandre Prot and Steve Naudé as a digital-first business bank for European
    SMEs and freelancers. The company offers an integrated suite of financial services — business current accounts,
    virtual and physical debit cards, domestic and SEPA transfers, invoice management, expense tracking, and real-time
    accounting integrations — through a single mobile and web interface regulated under an ACPR payment institution
    licence. Qonto has grown to approximately 500,000 SME customers across France, Germany, Spain, Italy, Portugal, and
    the Netherlands, reported €200M ARR in 2024 with a claim of breakeven profitability, and raised €622M across five
    rounds including a €486M Series D at a €4.4B valuation in January 2022.
  foundedDate: '2016-07-01'
  founders:
    - name: Alexandre Prot
      role: CEO & Co-Founder
    - name: Steve Naudé
      role: President & Co-Founder
  foundingLocation: Paris, France
  headquarters: Paris, France
  productSummary: >-
    Business banking platform: current accounts (IBAN), SEPA credit transfers, instant payments, virtual and physical
    Mastercard debit/prepaid cards, expense management with receipt capture, VAT e-invoicing, accounting API
    integrations (Xero, QuickBooks, Datev, Pennylane), and payroll integration. Operates under ACPR payment institution
    licence; partners with a licensed credit institution for account guarantees up to €100K.
  customerFocus: >-
