      - number: '4.6'
        title: 'Financial Verdict: Revenue Quality, Margin Path, Capital Intensity, and Diligence Blockers'
        blocks:
          - type: paragraph
            body: >
              Revenue quality is high by subscription standards: recurring monthly fees, predictable interchange from a
              growing card base, and financing interest create a defensible recurring-revenue mix. Interchange
              dependency introduces downside risk — Mastercard retains approximately 1.2-1.5% of transaction value
              before Qonto earns its share — making blended gross margins lower than pure-SaaS peers. The margin path is
              positive: CEO-confirmed profitability in 2023 ahead of schedule, combined with the proprietary CBS and new
              in-house card processor, suggest sustained improvement. Capital intensity is moderate: the absence of
              physical branches and ownership of core infrastructure reduces ongoing capex requirements, though
              compliance and product engineering headcount remains the dominant cost driver. Capital adequacy appears
              sound given the no-fresh-fundraise statement for the banking licence; however, this should be
              stress-tested against the full capital requirement schedule disclosed in the ACPR application (not
              public). Four primary diligence blockers remain: (1) no audited financial statements or public revenue
              filing; (2) the €200M+ ARR figure is management-disclosed, not independently verified; (3) the €4.4B
              Series D valuation is from January 2022 and may be compressed given global fintech multiples; (4) churn
              rates, CAC, LTV, and exact unit economics by plan tier are entirely private. Any diligence process must
              request FY2023-2025 audited P&L, management accounts for Q1 2026, ARR bridge by cohort, full credit loss
              data for Pay Later, and the banking-licence capital adequacy model.
            claimRefs:
              - CI024
              - CI025
              - CI034
              - CI035
              - CI038
              - CI043
      - number: '4.7'
        title: Exhibits
        blocks:
          - type: callout
            title: Recurring Revenue Mix and CEO-Confirmed Profitability Ahead of Schedule
            body: >
              Qonto's blend of subscription fees (high predictability, low per-plan churn risk) and growing add-on and
              financing revenue creates a defensible recurring-revenue base. CEO confirmation of profitability in 2023 —
              achieved ahead of the original target and sufficient to fund a banking licence without a major fundraise —
              is a material positive signal. The proprietary CBS and in-house card processor structurally improve gross
              margin over time.
            calloutType: strength
            claimRefs:
              - CI013
              - CI014
              - CI040
              - CI041
          - type: callout
            title: Stale Valuation, No Audited Financials, and Interchange Margin Risk
            body: >
              The EUR 4.4B Series D valuation dates to January 2022 and may not reflect current market conditions given
              significant compression of public neobank multiples since 2022. No audited P&L has been published; the EUR
              200M+ ARR figure remains management-disclosed and unverified. Card interchange revenue is margin-dilutive
              because Mastercard retains approximately 1.2-1.5% of transaction value. SMB structural churn risk further
              limits subscription revenue predictability.
            calloutType: risk
            claimRefs:
              - CI021
              - CI024
              - CI035
              - CI037
              - CI038
          - type: callout
            title: Four Diligence Actions to Resolve Financial Blockers
            body: >
              Any investment process should prioritise: (1) audited P&L for FY2023 and FY2024 with a specific ARR bridge
              by cohort and market; (2) management accounts for Q1 2026 and a 12-month forward plan; (3) credit loss
              data for the Pay Later book including NPL ratio and delinquency curve; (4) the banking-licence capital
              adequacy model submitted to the ACPR including the capital requirement schedule and regulatory timeline.
            calloutType: recommendation
