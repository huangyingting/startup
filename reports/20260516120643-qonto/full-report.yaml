          - type: callout
            title: Founder Key-Person Concentration and Confirmed Legal Liability
            body: >
              Qonto's governance is strongly concentrated in its two co-founders (Prot as CEO, Anavi as President), with
              no publicly confirmed successor pipeline. The company's last known primary valuation of €4.4B dates to
              January 2022 and may not reflect current market conditions given the sharp re-rating of growth-stage
              fintech valuations since 2022. A June 2025 Paris court ruling ordered Qonto to reimburse €672,139 to the
              French Modern Pentathlon Federation, finding that Qonto failed to implement adequate strong authentication
              controls. These three vectors— key-person risk, valuation staleness, and confirmed litigation
              liability—should be addressed in any investment diligence.
