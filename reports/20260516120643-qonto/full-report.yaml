        title: Public Traction Metrics and Private-Metric Gaps
        blocks:
          - type: paragraph
            body: >
              Qonto's publicly confirmed metrics as of May 2026 are: 600,000+ business customers (Qonto press page and
              multiple third-party confirmations), operations across 8 European countries, 1,600+ employees, 4,791
              integrations, and NPS of 70+. Pay Later has facilitated €50M in financing since March 2024 (CEO statement,
              July 2025). The company has financed over €100M for European businesses through its broader embedded
              financing platform. Revenue is entirely private: the €200M+ ARR figure cited in specialist press (Finextra
              2024, European tech reporting) originates from CEO commentary or analyst inference and has not been
              independently audited. Growth from 65,000 customers (early 2020) to 220,000 (February 2022) to 600,000+
              (2025-2026) implies a CAGR of approximately 45-55% over six years, though the pace appears to be
              moderating as Qonto expands into less digitally-saturated markets. Key private metrics without public
              disclosure include: net revenue retention, monthly/annual churn rate by plan tier, ARPU trend, exact ARR
              and growth rate, EBITDA and net income, CAC by channel, LTV by cohort, and financing credit loss rates.
