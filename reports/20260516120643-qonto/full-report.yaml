      - number: '7.4'
        title: Partner and Dependency Risks
        blocks:
          - type: paragraph
            body: >
              Qonto has five critical external dependencies that represent concentration risk: Mastercard (card
              network), safeguarding banks (Crédit Mutuel Arkéa, Société Générale, Natixis, Rothschild Martin Maurel),
              cloud infrastructure (undisclosed hyperscaler), ACPR (regulatory approval authority), and payment
              guarantee providers (Crédit Agricole CIB, BNP Paribas).


              Mastercard dependency is the highest-severity partner risk. Qonto's entire card payment infrastructure —
              debit and credit cards, card-not-present, spending controls, and card issuance across 8 EU markets —
              relies exclusively on Mastercard. Contract terms are not public; a termination or materially adverse
              renegotiation would require a 12–24 month emergency migration. Mastercard has financial incentive to
              maintain the relationship given Qonto's scale, but the power asymmetry favours Mastercard in any
              negotiation.


              Safeguarding bank dependency is distributed but real. Customer funds are ring-fenced per PSD2 at four
              banks. If a systemic event affected two or more safeguarding banks simultaneously, customer funds could be
              temporarily inaccessible pending bank resolution proceedings. Critically, these funds are NOT covered by
              FGDR deposit insurance, creating a customer-level insolvency risk that cannot be remediated without a
              banking licence.


              Cloud infrastructure risk is opaque. Qonto has not disclosed its cloud providers. Under DORA, Qonto must
              register critical ICT third-party providers with ACPR and maintain concentration risk monitoring. A
              hyperscaler outage affecting Qonto's primary cloud region would immediately impact CBS availability. This
              diligence gap requires direct disclosure from Qonto management.
