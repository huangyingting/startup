      - number: '6.3'
        title: Named Customer Proof and References
        blocks:
          - type: paragraph
            body: >
              Qonto publishes customer testimonials on its website and blog, but named production deployments with
              quantified outcomes are sparse in third-party-accessible sources. The available evidence falls into three
              tiers: (1) anonymous user reviews on G2, GetApp, and OMR covering onboarding speed and card management,
              (2) aggregated satisfaction metrics (NPS 70+, Trustpilot 4.8/5) without identifying individual customers,
              and (3) a small number of named case studies embedded in the Qonto blog for illustrative SMBs (typically
              micro-enterprises in France).

              On G2, Qonto holds a strong average review score with recurring themes of frictionless digital onboarding,
              responsive customer support, and a clean user interface—confirming production deployment rather than pilot
              status. GetApp reviewers highlight ease of invoice management and multi-card issuance for teams. The OMR
              platform (a German-language software review site) features positive reviews from German SMBs post-Penta
              migration, confirming continuity of the acquired customer base. Review content consistently references
              active use of the expense management and accounting integration features, indicating customers are not on
              dormant or trial plans.

              The most notable adverse reference is the June 2025 Paris court ruling against Qonto in the case brought
              by the Fédération Française de Pentathlon Moderne: the court ordered Qonto to reimburse €672,139 following
              52 fraudulent payment transactions in October 2023, finding that Qonto had failed to implement adequate
              strong authentication. This is a documented production incident involving an identifiable named customer.
              No evidence of additional named customers publicly reporting similar fraud or payment failures has been
              found; the incident appears isolated.

              Diligence should request a reference list of 10+ named enterprise or mid-market customers (10–250
              employees) willing to speak on record, as the public evidence base covers primarily micro-enterprise
              deployments.
