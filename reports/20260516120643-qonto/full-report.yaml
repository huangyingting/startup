      - number: '5.6'
        title: Exhibits
        blocks:
          - type: callout
            title: Proprietary CBS and Deep Integration Moat
            body: >
              Qonto's self-built Core Banking System in operation since 2019, combined with 4,791 documented accounting
              integrations, creates a technical and commercial moat that would require any competitor years to
              replicate. By building its own CBS, Qonto eliminated the BaaS middleware dependency that constrains most
              neobank competitors and gained the ability to iterate on core financial product features at its own pace.
              The DATEV, Pennylane, Sage, Exact, and QuickBooks integrations create deep workflow lock-in for the SMB
              finance stack: once an accountant and SMB are both embedded in the Qonto plus DATEV workflow, the cost of
              switching to a competitor that lacks equivalent integration depth is prohibitively high. No direct
              competitor neobank including Revolut Business (fewer than 50 direct integrations), Wise Business (no
              accounting-grade integrations), or N26 Business (no published integration ecosystem) comes close to
              matching Qonto's integration breadth as of May 2026.
