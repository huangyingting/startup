      - number: '7.2'
        title: Regulatory and Legal Risks
        blocks:
          - type: paragraph
            body: >
              Regulatory risk is Qonto's primary risk dimension. As an ACPR-supervised payment institution (CIB 16958),
              Qonto operates at the intersection of PSD2, DORA, EU AI Act, and AMLD6 — four major EU regulatory
              frameworks that have all entered or are entering their most demanding compliance phases simultaneously.


              The ACPR banking licence application (filed July 2025) is the single most consequential regulatory event
              in Qonto's near-term future. ACPR requires applicants to meet CET1 capital ratios of at least 8% against
              risk-weighted assets, present a governance board with substantive banking experience, maintain robust
              AML/CFT programmes, and demonstrate DORA-compliant ICT resilience. The approval process typically takes
              18–24 months per ACPR and Financial Times guidance, implying a decision window of Q1–Q3 2027. Denial would
              lock Qonto out of balance-sheet lending, maintaining the product gap with Revolut Bank.


              DORA compliance (effective January 17 2025) imposes four specific obligations: ICT risk management
              framework, major incident reporting within 4 hours, ICT third-party risk management programme, and annual
              digital resilience testing. EBA's DORA technical standards require payment institutions to classify their
              CBS as a critical ICT system and demonstrate end-to-end recovery test results. Qonto's in-house CBS
              creates compliance complexity absent for peers using established vendors.


              The EU AI Act's high-risk AI obligations apply from August 2026. Qonto's AI-driven fraud scoring and
              automated financing decisions fall within scope, requiring conformity assessments, transparency logging,
              and human oversight — with non-compliance fines of up to €30M or 6% of global turnover.


              Legal risk is anchored by the June 2025 French court order (€672,139 reimbursement). The ruling
              establishes a legal precedent that payment institutions may bear partial liability for social-engineering
              fraud on their platforms. GDPR enforcement risk exists given CNIL's active fintech investigation
              programme. IP risks from the Penta and Kontist acquisitions remain an open question requiring primary
              diligence.
