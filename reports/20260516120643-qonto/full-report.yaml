      - number: '4.2'
        title: GTM Motion and Sales Efficiency
        blocks:
          - type: paragraph
            body: >
              Qonto's go-to-market is digital-first and predominantly self-serve: any eligible European business can
              open an account in approximately 10 minutes without branch visits or paper forms. This low-friction
              onboarding structurally compresses customer acquisition cost (CAC) versus traditional banks and most
              incumbent neobanks that still require manual verification or physical presence. The product drives
              distribution: 4,791 integrations with tools ranging from DATEV, Google Sheets, Zapier, and Sage to Cegid,
              QuickBooks, and Pennylane create an ecosystem flywheel where accountants and CFOs encounter Qonto within
              their existing workflows. The March 2024 Regate acquisition deepened the accountant channel, embedding
              Qonto in the accounts-payable and accounts-receivable workflows that accountants manage on behalf of SMB
              clients. Referral and word-of-mouth from a reported NPS of 70+ provide additional organic acquisition.
              Analyst estimates for digital SMB banking CAC range from €50-150 per customer; Qonto's predominantly
              inbound digital model is likely at the lower end. At a €9-19/month base plan, payback on CAC is estimated
              at 12-18 months; at the €39/month premium tier, payback can compress to 6-9 months. No official CAC or LTV
              data have been publicly disclosed.
