      - number: '2.2'
        title: 'Market Sizing: TAM / SAM / SOM'
        blocks:
          - type: paragraph
            body: >
              Three complementary lenses converge on a plausible market size range, though estimates diverge materially
              depending on geographic scope, revenue line inclusion, and data recency.

              Lens 1 — Bottom-up revenue pool: Applying an average blended revenue per SMB of ~€600–900/year
              (subscription + transaction fees, excluding credit) to the 26M EU SMBs yields a fee-only TAM of
              approximately €16–23B/year. Adding credit and float income expands this to €25–35B. This lens treats every
              EU SMB as reachable, which overstates near-term opportunity for a digital-first challenger limited to 8
              countries.

              Lens 2 — Top-down market research: McKinsey's 2023 Global Payments Report identifies the EMEA region as
              growing at double-digit rates in payments revenue, with instant-payments-driven growth expected to lift
              SEPA volumes by 2027. Specialist reports from Mordor Intelligence and Grand View Research (not fully
              accessible during research) have cited European digital-banking market sizes in the €8–15B range for
              SMB-specific services. Statista's neobanking market outlook estimates NII-basis global neobank revenues at
              $1.66T by 2026, with Europe accounting for approximately 15–20% of that figure—implying ~$250–330B in
              neobank NII globally, but this aggregates consumer and business segments.

              Lens 3 — Country-level build-up for Qonto's active markets: France (~4M SMBs, ~€5B addressable), Germany
              (~3.5M SMBs, ~€4B), Italy (~3.6M SMBs, ~€4B), Spain (~3.3M SMBs, ~€3.5B). These four markets alone suggest
              a SAM of ~€12–16B. Applying a realistic digital-first penetration ceiling of 20–25% and Qonto's current
              ~2% share of its home French market, the implied SOM for Qonto's primary 4 markets at maturity is
              approximately €1–2B in annual fee revenue—consistent with a 5–10× revenue scale-up from Qonto's estimated
              €200M+ current ARR.

              Market growth: Multiple sources corroborate a 15–20% CAGR for European SMB fintech from 2023–2028.
              McKinsey projects overall EMEA payments revenue growing at 6–8% CAGR to 2027; the SMB digital-banking
              segment outpaces this average due to low base. The EU Instant Payments Regulation (Regulation (EU)
              2024/886, in force April 2024) mandates that all eurozone PSPs offer instant credit transfers by January
              2025 (credit institutions) and October 2025 for EMIs/PIs—a structural tailwind that reduces friction for
              Qonto-type propositions vs. incumbent batch-processing infrastructure. SEPA Instant Credit Transfer (SCT
              Inst) was operational from November 2017, and SCT Inst's share of total SEPA Credit Transfers is expected
              to reach 45% of SEPA's 23B annual transactions if regulators proceed with full adoption measures per
              McKinsey's base case.

              Contradictory estimate note: Mordor Intelligence and Grand View Research reports (both not fully
              accessible) and analyst summaries of their work cite headline European digital-banking TAM figures ranging
              from €8B to €40B+, depending on whether the analysis includes SMB credit, consumer digital banking, and
              embedded finance. These estimates are preserved as the range band in figure FM002 rather than being
              collapsed to a single midpoint.
