      - number: '2.3'
        title: Buyer and User Segmentation
        blocks:
          - type: paragraph
            body: >
              Qonto's customer base segments across four primary cohorts, each with distinct budget ownership patterns,
              decision timelines, and adoption drivers.

              Freelancers and micro-entrepreneurs (0 employees): This segment is Qonto's largest by customer count,
              representing approximately 50% of Qonto's 600,000 clients per company communications. Budget ownership is
              sole proprietor or auto-entrepreneur. Monthly willingness-to-pay for basic business banking is €0–20,
              making the Basic plan (€9/month) the primary conversion point. Switching cost is low (no payroll, minimal
              IBAN changes) but inertia is high; incumbents offer free basic accounts in some markets (e.g., La Banque
              Postale, ING free account). Adoption path: digital-native onboarding, social referral, and integration
              with solo freelancing tools (invoicing, Urssaf payments in France).

              Micro-businesses (1–10 employees): Growing segment for Qonto, with more complex needs—multi-user accounts,
              card issuance for team members, expense approvals, VAT management. Budget owned by founder/owner-manager.
              Monthly spend typically €19–39. Key pain point: incumbent banks bundle these businesses into generic SMB
              products without the UX quality Qonto offers. Adoption path: word-of-mouth from freelancer segment,
              fintech- savvy founder communities, accountant recommendations.

              SMBs (10–250 employees): Higher revenue per account (€39–150+/month with add-ons), longer sales cycle,
              more procurement gatekeeping. Budget owned jointly by CFO/finance manager and CEO. Key decision factors:
              accounting integration quality (DATEV for Germany, FEC for France), multi-entity support, team expense
              workflows. Adoption constraint: incumbent bank credit relationships create lock-in. Qonto's acquisition of
              Regate (March 2024) specifically targets this cohort's accounting complexity.

              Startups and scale-ups (50–250 employees, VC-backed): Often the most vocal Qonto advocates, with VC
              investor mandates and accelerator recommendations driving adoption. Finance decisions made by CFO or Head
              of Finance. Require multi-currency support, sophisticated expense management, and integration with
              treasury tools. Monthly ARPU can exceed €200+. Churn risk is higher at IPO or acquisition when larger
              banks re-enter the conversation.

              Budget ownership: In all segments, the primary account decision-maker is the founder/CEO or CFO—not a
              dedicated IT buyer. This positions Qonto as a product-led-growth acquisition rather than an enterprise
              sales motion, consistent with its sub-30-minute digital onboarding claim. Payer (who pays the invoice)
              equals user (who opens the account) in nearly all segments below 50 employees.
            claimRefs:
