      - number: '4.5'
        title: Capital Adequacy and Financing Dependency
        blocks:
          - type: paragraph
            body: >
              Qonto has raised approximately €622M across five equity rounds (Seed through Series D). The Series D in
              January 2022 — led by Tiger Global with co-investors Tencent, DST Global, Valar Ventures, and Alkeon
              Capital — valued Qonto at €4.4B and remains the most recent primary equity round. CEO Alexandre Prot
              stated in July 2025 that Qonto's financial solidity since reaching profitability in 2023 means it can fund
              the required regulatory capital for a full banking licence (établissement de crédit) without a major
              equity fundraise — a signal of meaningful cash preservation. No debt facility or credit line has been
              publicly announced. The Pay Later BNPL book (€50M facilitated through July 2025) represents a receivables
              exposure; without disclosure of credit loss rates, credit risk is unknown. Banking licence approval is
              expected to take several years, during which Qonto continues under its payment institution licence. The
              2022 valuation of €4.4B implies a revenue multiple of approximately 20-22x on a €200M ARR estimate — high
              relative to current public comparable neobank multiples of 5-12x, suggesting material valuation risk if
              Qonto seeks a new primary round or IPO.
            claimRefs:
