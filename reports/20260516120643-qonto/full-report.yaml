      - number: '2.4'
        title: Growth Drivers and Adoption Constraints
        blocks:
          - type: paragraph
            body: >
              The structural forces shaping European SMB neobank adoption are a mix of regulatory catalysts, demographic
              shifts, and technological enablers, offset by trust barriers, credit limitations, and compliance costs.

              Key growth drivers include:

              PSD2 and Open Banking: The EU's Payment Services Directive 2 (PSD2, Directive 2015/2366), implemented
              across EU member states from 2018–2019, mandated open API access to bank account data for licensed
              third-party providers (TPPs), enabling account aggregation and payment initiation services. While adoption
              of TPP-driven PSD2 services has been slower than anticipated (EBA notes continued friction in API
              implementation), the regulatory framework permanently lowered the cost of financial data access and
              strengthened the regulatory legitimacy of payment institutions like Qonto.

              EU Instant Payments Regulation (IPR): Regulation (EU) 2024/886, which entered into force on 9 April 2024,
              makes instant euro credit transfers mandatory for all eurozone PSPs. The first compliance deadline
              (January 2025) required credit institutions to send and receive SCT Inst; the October 2025 deadline
              extends this to EMIs and PIs. This creates infrastructure parity between challengers and incumbents on
              speed, removing a historical incumbent advantage.

              Digital-native SMB founders: The generational shift toward digital-first business management is
              accelerating. Millennials and Gen Z founders expect mobile-first banking UX, real-time notifications, API
              integrations, and instant account opening—none of which traditional branches deliver. Statista's Digital
              Banks market analysis confirms this as the primary driver of neobank growth globally.

              SEPA harmonisation: The SCT Inst scheme has grown progressively since its 2017 launch, with McKinsey
              projecting SCT Inst could reach 45% of SEPA credit transfers by 2027 under a pro-regulatory scenario.
              Qonto already issues European IBANs and offers SEPA Instant, giving it full infrastructure parity with
              incumbents.

              Key adoption constraints include:

              Trust deficit: New entrant neobanks face a fundamental trust asymmetry vs. incumbents with decades of
              brand history and deposit guarantee schemes. The June 2025 Paris court ruling against Qonto (€672K
              reimbursement for fraud failure) and periodic high-profile neobank incidents (N26 regulator sanctions in
              2021) reinforce incumbent banks' trust advantage.

              Credit licensing gap: Qonto currently operates as a payment institution, not a bank, limiting its ability
              to offer credit directly on its balance sheet. SMBs that need overdraft facilities or term loans must
              either go elsewhere or use Qonto's partner-financed pay-later and loan products. Qonto's July 2025 banking
              licence application addresses this but the process takes 2–4 years.

              Switching costs: Moving a primary business bank account requires updating supplier mandates, payroll
              integrations, Direct Debit mandates, and accounting software connections. For a 20-person business this
              can take weeks of operational effort, creating a structural moat for incumbents even when NPS is low.

              DORA compliance burden: The EU's Digital Operational Resilience Act (DORA, Regulation (EU) 2022/2554),
              applying from January 2025, requires all financial entities to meet ICT risk management, incident
              reporting, and third-party provider standards. Compliance is disproportionately costly for challenger
              fintechs relative to incumbents who already have compliance infrastructure.

              Capital intensity of credit: Expanding into invoice financing and term lending requires significant
              capital allocation and regulatory approval, raising the cost of competing in high-value SMB relationships
              where credit is the primary lock-in product.
