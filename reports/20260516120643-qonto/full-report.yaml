  - number: 2
    title: Market Analysis
    sections:
      - number: '2.1'
        title: Market Definition and Boundaries
        blocks:
          - type: paragraph
            body: >
              The core market Qonto addresses is business banking services for SMBs (defined in the EU as enterprises
              with fewer than 250 employees and annual turnover under €50M) and freelancers (self-employed individuals,
              micro- entrepreneurs). This population numbers approximately 26 million enterprises across the EU, of
              which roughly 23 million are micro-enterprises (0–9 employees). France alone accounts for approximately 4
              million SMBs and freelancers, consistent with Qonto's home-market focus.

              Included spend within the market boundary: (1) business account subscription fees, (2) domestic and
              international payment fees (SEPA, SWIFT), (3) card interchange revenue, (4) credit products (overdraft,
              pay- later, term loans), (5) value-added SaaS modules (invoicing, expense management, accounting
              automation), and (6) float/interest income earned on customer deposits. Combined, these revenue pools
              generate an estimated €25B+ per annum in addressable fee revenue across the EU when incumbents and
              challengers are aggregated.

              Excluded from the primary boundary: retail/consumer personal accounts, corporate treasury management for
              large enterprises (>250 employees), investment banking and capital markets, insurance, and pure
              FX/remittance services for individuals. Adjacent to the primary boundary—and meaningful for Qonto's
              expansion roadmap—are invoice financing, FX for SMBs, business insurance, and B2B payments infrastructure
              (embedded finance). These adjacencies represent substantial follow-on addressable revenue but require
              additional licensing (notably a full banking licence, which Qonto applied for in July 2025).

              The principal status-quo substitutes are: (a) traditional incumbent banks (BNP Paribas, Société Générale,
              Deutsche Bank, Commerzbank, Unicredit, ING, BBVA, Santander), which collectively serve over 90% of EU SMBs
              and charge €30–100/month for basic business current accounts; (b) accounting-led platforms (Sage,
              QuickBooks, Pennylane) that replicate invoicing and expense management but not core banking; and (c)
              standalone expense tools (Spendesk, Pleo, Expensify) that layer on top of existing bank accounts. The
              central switching barrier is multi-sided: changing a primary business bank account requires porting
              payroll mandates, updating supplier IBANs, migrating accounting integrations, and potentially re-applying
              for credit facilities.
