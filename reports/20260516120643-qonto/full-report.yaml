  - number: 7
    title: Risks
    sections:
      - number: '7.1'
        title: Risk Overview and Severity Matrix
        blocks:
          - type: paragraph
            body: >
              Qonto's risk profile in May 2026 is elevated relative to a typical Series D SaaS company, driven by the
              coincidence of three simultaneous regulatory investment programmes (DORA compliance since January 2025, EU
              AI Act high-risk AI obligations by August 2026, and the July 2025 banking licence application) alongside
              organic operational risks from running a €622M-funded payment institution at scale across 8 EU countries.


              The highest-severity risk is the ACPR banking licence application. If denied or delayed by 24+ months,
              Qonto remains a payment institution unable to offer insured deposits or balance-sheet lending, widening
              the product gap with Revolut Bank and incumbent banks. The banking licence approval would also require
              raising €100M–€300M in additional capital, creating a material fundraising event in a compressed fintech
              valuation environment.


              The second highest-severity risk is CBS operational failure. Qonto's fully proprietary in-house Core
              Banking System has no vendor fallback. A full CBS outage simultaneously affects all 600,000+ customers
              across 8 countries, with recovery dependent entirely on internal engineering. Under DORA, a major CBS
              outage triggers a 4-hour ACPR reporting obligation and potential supervisory escalation.


              Legal and regulatory risks are anchored by the June 2025 court order requiring €672,139 reimbursement to
              the French Modern Pentathlon Federation following a 2023 fraud incident. While the financial amount is
              immaterial relative to Qonto's revenue scale, the ruling establishes a legal precedent for payment
              institution liability in social-engineering fraud and creates reputational risk in the French professional
              community.


              Financial risks include valuation compression from the Series D €4.4B mark (January 2022), which was set
              at peak fintech multiples that have since compressed 40–60% across comparables. Interchange fee
              compression from EU regulation and interest rate risk on safeguarded deposits are secondary financial risk
              factors. Competitive risk from Revolut Business is real but manageable given Qonto's entrenched 600K+
              customer base and French market leadership.
