      - number: '4.3'
        title: Cost Structure, Gross Margin Drivers, and Service-Delivery Costs
        blocks:
          - type: paragraph
            body: >
              Qonto's operating cost structure reflects a software-plus-payments architecture. Personnel is the dominant
              cost line at an estimated 60-65% of total operating expenses, driven by the 1,600+ employee base across
              product engineering, compliance, operations, customer support, and revenue teams. Card and payment
              processing costs — covering Mastercard interchange pass-through, SEPA/SWIFT rail fees, and physical card
              issuance — are estimated at 10-15% of opex. Marketing and customer acquisition absorbs another 10-15%,
              primarily digital advertising and partnership costs. Regulatory compliance, including PSD2 obligations,
              KYC/AML infrastructure (outsourced in part to Fourthline for France, Spain, and Italy), and
              banking-licence preparation, accounts for an estimated 5-10%. Cloud/IT infrastructure rounds out costs at
              approximately 5%. Gross margin is estimated at 60-75%, consistent with the software-plus-payments peer
              set; the lower bound reflects periods of heavy interchange reliance, while the upper bound reflects the
              higher-margin subscription revenue mix. Qonto's ownership of its own Core Banking System (CBS) since 2019
              removes a material middleware cost that SaaS-based banking platforms incur, supporting margin improvement
              over time. The addition of an in-house card processor in 2024-2025 (per CEO statement at the July 2025
              banking licence press conference) further reduces variable processing costs. The Pay Later BNPL book
              introduces a modest receivables exposure of approximately €50M originated since March 2024.
            claimRefs:
