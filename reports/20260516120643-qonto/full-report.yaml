      - number: '7.6'
        title: People, Execution Risks, and Mitigation Framework
        blocks:
          - type: paragraph
            body: >
              Beyond core regulatory and operational risks, Qonto faces execution risk from the simultaneous management
              of five demanding programmes: banking licence application, DORA compliance, EU AI Act implementation,
              geographic expansion, and CBS scaling from 600K to potentially 1M+ customers. This execution bandwidth
              risk is particularly acute given leadership concentration in two founders.


              Key person mitigation: the absence of a disclosed succession plan or named C-suite layer below Prot and
              Anavi is a governance gap. Investor diligence should request the full C-suite org chart, key-man insurance
              arrangements, board composition, and retention agreements for critical engineering and compliance roles.


              DORA mitigation: Qonto's 2024 investment in CBS resilience documentation and incident response tooling
              (per company communications) represents progress, but independent ACPR assessment of DORA compliance
              maturity is the binding test. The ICT risk register, third-party ICT provider list, and penetration
              testing schedule should be diligence asks.


              Monitoring indicators: ACPR banking licence application status (ACPR acknowledgement, formal review
              phase); CBS outage duration metrics in public status pages; CNIL enforcement register for any Qonto
              mention; fraud incident statistics from annual ACPR public reports on payment institution conduct; and
              Revolut Business market share data in France.


              Thesis-break triggers: (1) ACPR denies banking licence application; (2) CBS outage exceeding 4 hours
              triggers DORA major incident procedure and supervisory review; (3) ACPR issues enforcement action for AML,
              DORA, or governance deficiencies during the banking licence review period; (4) a second significant fraud
              court ruling suggesting systemic fraud control failures; (5) Qonto's down-round fundraising for banking
              licence capital at below €2.5B valuation.
