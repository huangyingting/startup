      - number: '5.2'
        title: Product Module and Asset Map
        blocks:
          - type: paragraph
            body: >
              Qonto's product suite as of May 2026 comprises nine distinct modules, each targeting a specific pain point
              in the SMB finance stack. The core module is the business account with a dedicated European IBAN,
              available across all 8 operating markets (France, Germany, Italy, Spain, Austria, Belgium, Portugal,
              Netherlands) with real-time balance notifications and safeguarded deposits under ACPR rules. Building on
              this, IBAN and SEPA transfer functionality spans SEPA Instant Credit Transfer (under 10 seconds), standard
              SEPA Credit Transfer (SEPA SCT), and SWIFT for international payments, with bulk payment upload via CSV
              available on all paid plans.

              Mastercard business cards are issued per employee on all plans above the Basic single-user tier, including
              both physical and virtual card variants, with custom per-card spending limits, real-time freeze and
              unblock controls, and integrated receipt capture. The expense management module layers approval workflows
              and auto-categorisation atop the card infrastructure, available from the Smart plan (3 users) upward.
              Invoicing and certified EU e-invoicing extends Qonto into the accounts-receivable workflow: certified in
              all 8 markets, covering PDF, UBL, and Factur-X formats, with automatic payment reminders.

              The payroll module, currently in a growth and beta stage, enables payroll disbursement directly from the
              Qonto account with integration hooks to payroll providers, though geographic rollout is not yet complete
              across all markets. Qonto Credit (launched 2024) covers pay-later, term loans, and revenue-based financing
              for SMBs with 10 to 250 employees, representing the company's first foray into on-balance-sheet credit
              origination. Accounting integrations encompassing DATEV, Pennylane, Sage, Exact, QuickBooks, and Zapier
              automations across 4,791 documented integrations constitute one of Qonto's most durable competitive
              advantages. The REST API (50+ endpoints, OAuth 2.0, webhook notifications) rounds out the product map,
              available to Premium and Qonto X plan subscribers and forming the foundation of Qonto's developer
              ecosystem.
