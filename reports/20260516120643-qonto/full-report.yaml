          - type: callout
            title: Cloud and KYC Vendor Concentration Risk
            body: >
              Qonto's entire workload runs on a single cloud provider (AWS), and its customer onboarding depends on an
              unnamed third-party KYC provider. An AWS EU region outage, which has occurred historically, directly
              impacts Qonto's payment processing, card operations, and customer-facing applications. The undisclosed
              card processing vendor introduces a further concentration risk in the authorisation and settlement layer:
              the specific processor SLA and failover arrangements are not publicly available for investor scrutiny. The
              unnamed KYC provider adds regulatory dependency: any compliance failure by the KYC vendor, or a vendor
              outage, could halt all new customer onboarding and trigger ACPR scrutiny. In addition, ISO 27001 and SOC 2
              Type II certification status are unconfirmed from public sources, representing a procurement barrier for
              enterprise customers that require certified security governance as a condition of supplier approval.
