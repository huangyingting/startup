      - number: '7.3'
        title: Operational Risks
        blocks:
          - type: paragraph
            body: >
              Qonto's primary operational risk is CBS reliability. The proprietary in-house CBS, built since 2019, has
              delivered competitive product agility but creates an unusual single-point-of-failure exposure. Unlike
              peers using Mambu or Thought Machine, Qonto has no vendor support channel for CBS incidents, and all
              DORA-required resilience tooling must be built internally. A full CBS outage would simultaneously affect
              all 600,000+ Qonto customers across 8 EU countries, trigger DORA's 4-hour ACPR reporting obligation, and
              potentially prompt supervisory inquiry.


              Fraud and AML risk represents the second operational risk tier. The June 2025 court ruling illustrates
              that social-engineering fraud targeting Qonto accounts can generate direct financial liability for the
              company. La Tribune documents a 40% increase in "faux conseiller bancaire" fraud in France in 2023-2024.
              Qonto's digital-only model provides no in-branch fraud verification pathway, creating structurally higher
              exposure. AML/KYC compliance across 600K+ business customers is operationally intensive, and any ACPR
              enforcement finding would compound regulatory risk with the pending banking licence application.


              Cybersecurity risk is elevated given Qonto's payment data volume. A GDPR-notifiable breach would trigger
              72-hour CNIL notification and potential fines up to 4% of global annual turnover. DORA imposes explicit
              cybersecurity testing (penetration testing, red-team exercises) with ACPR oversight, adding regulatory
              reporting obligations to any security incident.


              Key person risk is material: Alexandre Prot (CEO) and Steve Anavi (President) are co-founders who are the
              primary public face of Qonto in all regulatory, investor, and media engagements. No named C-suite
              succession layer has been publicly disclosed. Sudden departure of either co-founder during the banking
              licence application phase would be highly disruptive to ACPR's governance assessment.
