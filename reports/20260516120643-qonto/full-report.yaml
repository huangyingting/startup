          - type: callout
            title: Revolut Business Commoditization Threat
            body: >
              Revolut Business represents the single most material competitive risk to Qonto's market position over the
              2026 to 2028 horizon. Backed by a 33 billion USD+ valuation and a consumer base of 45 million+ personal
              users that provides a powerful organic acquisition channel for business accounts, Revolut Business has
              been systematically adding SME-specific features including expense management, team cards, analytics, and
              accounting connections since 2023. If Revolut achieves even partial parity on Qonto's workflow depth while
              leveraging its superior multi-currency offering and lower entry-tier pricing, it could commoditize Qonto's
              core value proposition. Additionally, Revolut's UK banking licence (granted 2024) and Lithuanian EU
              banking licence enable credit products that Qonto cannot offer as a payment institution, creating a
              structural gap in Qonto's product coverage that Revolut can exploit in the 10 to 250 employee SMB segment
              where credit access is a primary driver of banking loyalty.
