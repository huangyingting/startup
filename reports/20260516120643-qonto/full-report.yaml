      - number: '3.5'
        title: Moat Durability and Competitive Risk
        blocks:
          - type: paragraph
            body: >
              Qonto's competitive moats can be evaluated across six dimensions. Its purpose-built SME UX with integrated
              expense management, e-invoicing, and multi-user workflow is currently the strongest single differentiator,
              but faces increasing pressure from Revolut Business's accelerating SME feature investment. Qonto's
              accounting integration depth (DATEV, Pennylane, 4,791+ partners) has the highest near-term durability, as
              no competitor has publicly committed resources to replicating this breadth, particularly in the DATEV
              ecosystem critical to German accountants serving over one million users.

              Qonto's EU multi-country regulatory infrastructure built over 6+ years using its ACPR CIB 16958 payment
              institution licence and EU passporting rights constitutes a meaningful barrier to new entrants.
              Replicating an 8-country EU-compliant presence from scratch would require 3 to 5 years and tens of
              millions in regulatory capital. The customer data and switching cost moat is also significant: migrating
              from Qonto to a competitor requires updating payroll IBANs, re-linking accounting software, porting direct
              debit mandates, and retraining finance teams, typically a 2 to 4 week effort for a company with 5 to 50
              employees.

              Qonto's brand equity (NPS 70+, Trustpilot 4.8 out of 5) supports organic acquisition and retention. The
              primary residual risk is Revolut Business's multi-currency advantage and growing SME product investment,
              which could close the workflow depth gap within 18 to 36 months. The credit gap remains Qonto's single
              most material structural exposure: as a payment institution it cannot offer balance-sheet lending until
              its banking licence application completes, which is a 2 to 4 year regulatory process. See TP004 for the
              full risk register and FP003 for quantitative moat indicators.
