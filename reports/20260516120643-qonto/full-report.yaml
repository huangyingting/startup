      - number: '8.4'
        title: Bull / Base / Bear Scenarios
        blocks:
          - type: paragraph
            body: >
              Three scenarios bracket the range of credible outcomes for a Qonto investment in 2026, anchored on revenue
              multiple analysis relative to comparable public and private fintechs.

              In the Base Case (medium probability), Qonto continues profitable growth across its 8-country EU
              footprint. ARR remains approximately €460M (~$500M) and grows at 15-20% over the next 24 months. The
              banking licence application progresses but is not yet granted. At a 6-8× ARR multiple— consistent with
              Wise's public-market trading range and slightly below unlisted European growth fintechs—the implied
              enterprise value is €2.5-3.5B. This represents a 20-43% discount to the Series D price. A new primary
              round or secondary transaction in this range would clear the market.

              In the Bull Case (low-medium probability), the ACPR grants Qonto a full banking licence by H2 2026 or H1
              2027. This unlocks credit origination, savings, and investment products that expand ARR by 30-50% within
              18 months post-approval. Revenue growth accelerates above 25%, EBITDA margins expand to 20%+, and the
              company files for IPO on Euronext Paris at a premium multiple (10-12× ARR on a forward basis). Implied
              enterprise value: €4.5-5.5B—at or slightly above the Series D price, representing modest positive returns
              for 2022 investors.

              In the Bear Case (low-medium probability), the ACPR banking licence application is denied or delayed
              beyond 2027, coinciding with a further compression in public fintech multiples. Revenue growth decelerates
              to below 10%, driven by customer acquisition cost pressures as Revolut accelerates European SMB marketing
              spend. Fintech multiple compression pushes comparable transactions to 3-4× ARR. Implied enterprise value:
              €1.5-2.0B—a 55-66% haircut to the Series D mark. Under this scenario, Series D investors face a down-round
              or flat exit; earlier-vintage investors may still realize positive returns depending on preference
              structure.

              The bull-case upside is bounded by the absence of a banking licence, since Qonto without credit
              origination is structurally limited in revenue per customer vs. licensed incumbents. The bear-case
              downside is bounded by the genuine strategic value of Qonto's EU-wide customer base and regulatory
              footprint to a bank or large payment processor seeking European SMB distribution.
