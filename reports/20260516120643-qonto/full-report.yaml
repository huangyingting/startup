      - number: '8.3'
        title: Valuation Context and Entry Discipline
        blocks:
          - type: paragraph
            body: >
              Qonto's €4.4B post-money valuation was set on 5 January 2022 when €486M was raised in a Series D led by
              Tiger Global and TCV. That round was priced at approximately $5B USD at prevailing exchange rates—a
              premium reflecting the peak of the 2021-2022 European private fintech cycle, during which comparable
              challengers (Revolut $33B, N26 €7-8B, SumUp €8B) were all marked near or at all-time highs. No subsequent
              primary equity round has been publicly announced; the €4.4B mark remains the sole disclosed equity price
              as of May 2026.

              Against the company-claimed ~€460M ARR, the implied ARR multiple at the Series D price is approximately
              9.6×. In May 2026, this multiple appears stretched relative to the public-market anchor: Wise plc trades
              at roughly 5-7× revenue on the London Stock Exchange, Adyen trades at 20-25× revenue (but is fully
              licensed, listed, and growing faster), and Nubank at 15-20× reflects high-growth emerging-market
              economics. European unlisted challengers trading at single-digit ARR multiples in secondary markets—where
              visible—are consistent with the 6-8× base-case range estimated here.

              Entry discipline requires accounting for: (i) dilution from the Series D preferred structure (terms
              undisclosed, but Series D investors at €4.4B will hold meaningful liquidation preference); (ii) potential
              future dilution from the banking licence application (capital requirements for an établissement de crédit
              in France are non-trivial); and (iii) the time value of a 4-year-old price in a materially different rate
              environment. The 2022 round closed when ECB rates were near zero; the 2024-2026 rate environment has reset
              discount rates for all long-duration growth assets by 200-300bps, which alone justifies a 20-30% markdown
              on terminal-value-heavy growth businesses even with identical operating results.

              Publicly available evidence does not support the Series D price as a current fair value without a material
              catalyst (banking licence, new round, or demonstrated ARR acceleration well above current estimates).
              Investors acquiring at €4.4B should assume a near-term unrealized loss relative to a market-clearing exit
              price in 2026.
