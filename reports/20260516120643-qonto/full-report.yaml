    title: Company Overview
    sections:
      - number: '1.1'
        title: Identity and Business Model
        blocks:
          - type: paragraph
            body: >
              Qonto is a French payment institution operating under the trade name Qonto (legal entity: Qonto SA,
              registered at RCS Paris n° 819 489 626). Headquartered at 18 rue de Navarin, 75009 Paris, France, the
              company was founded in 2017 by Alexandre Prot and Steve Anavi with a mission to give European SMEs the
              financial tools they deserve. Qonto is not a bank but a regulated payment institution licensed by France's
              Autorité de Contrôle Prudentiel et de Résolution (ACPR) under registration number CIB 16958, granted on 21
              June 2018. As of May 2026, Qonto operates across 8 European countries: France, Germany, Italy, Spain,
              Austria, Belgium, Portugal, and the Netherlands.

              The business model centres on a subscription-based all-in-one finance management platform for SMBs and
              freelancers. Plans range from Basic (€9/month) to Smart (€19/month) and Premium (€39/month), with add-on
              modules for advanced cash flow management and accounts receivable automation. Revenue streams include
              monthly subscription fees, card interchange, SEPA and SWIFT transfer fees, and interest remuneration
              income. Core product features include a European IBAN business account, Mastercard debit and credit cards
              (spending limits up to €400,000/month), SEPA and SWIFT international transfers, e-invoicing (including
              certified EU e-invoicing), accounts payable automation, expense management, and embedded financing
              (pay-later and loans directly into the Qonto account). Since 2019, Qonto has operated its own Core Banking
              System (CBS), giving it full control over transaction processing and enabling rapid product iteration. The
              platform integrates with 4,791 third-party tools including DATEV, Google Sheets, Zapier, QuickBooks, and
              accounting suites across all target markets.
