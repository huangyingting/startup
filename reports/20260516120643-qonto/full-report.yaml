  - number: 4
    title: Financials
    sections:
      - number: '4.1'
        title: Revenue Streams, Pricing Model, and Revenue Mix
        blocks:
          - type: paragraph
            body: >
              Qonto monetises through seven distinct revenue streams. The anchor is a tiered subscription model: Basic
              at €9/month (excl. VAT) covers account fundamentals and basic invoicing; Smart at €19/month adds shared
              access and pre-accounting tools; Premium at €39/month targets faster-growing businesses needing higher
              transaction volumes and better international rates. All plans operate on a no-commitment monthly basis.
              Add-on modules — Cash Flow Management Plus at €29/month (billed annually) and Accounts Receivable Plus at
              €35/month — extend upsell revenue for higher-tier subscribers. Card interchange income flows from Qonto's
              Mastercard partnership; FX commissions range from 2% (One Card) to 1% (Plus Card) to 0% (Metal X Card),
              creating a tiered monetisation on international spend. Transfer fees apply to SWIFT transactions above
              plan allowances. Since March 2024 Qonto earns financing interest through its in-house Pay Later product at
              1.17%/month on amounts up to €10,000. Finally, Qonto remunerates customer balances at up to 4% annually
              (ECB-linked) for customers executing at least five eligible transactions per month, simultaneously
              increasing engagement and generating float income. Revenue recognition is straightforward for subscription
              fees (monthly cash); interchange and transfer fees are transaction-contingent and higher-variance.
              Financing interest is amortised over the 90-day repayment period. The largest recognition risk is
              interchange margin compression if Mastercard revises pass-through rates or EU regulatory interchange caps
              tighten.
            claimRefs:
              - CI001
              - CI002
              - CI003
              - CI004
              - CI007
