      - number: '1.2'
        title: Leadership and Governance
        blocks:
          - type: paragraph
            body: >
              Qonto was co-founded by Alexandre Prot (CEO) and Steve Anavi (President), both of whom remain in their
              executive roles as of May 2026. Alexandre Prot is the son of Baudouin Prot, the former Chairman of BNP
              Paribas, giving him an unusual depth of personal exposure to traditional banking's strengths and
              shortcomings before co-founding Qonto. Steve Anavi brings a complementary entrepreneurial background. Both
              founders set out to build the solution they wished had existed when they themselves managed business
              finances, and their combined vision has driven the product roadmap since 2017.

              Key-person risk is material: there are no confirmed public disclosures of a strong third-tier executive
              bench below the two co-founders, and both Prot and Anavi are publicly identified as the defining faces of
              Qonto in all press coverage and investor communications. Governance is backed by an institutional investor
              roster that includes Valar Ventures, Alven Capital, Tencent, Tiger Global, DST Global, TCV, Alkeon
              Capital, Eurazeo, KKR, Insight Partners, and the European Investment Bank—providing board-level oversight.
              The company participates in France's Next40 index, signalling public recognition among the most promising
              French tech companies. Material leadership changes since founding appear limited to organic growth of the
              management team; no CEO or President departures have been publicly reported. Diligence should confirm the
              full C-suite composition, board seat allocations by investor, and any pending leadership transitions ahead
              of a potential IPO.
