      - number: '7.5'
        title: Financial and Business Model Risks
        blocks:
          - type: paragraph
            body: >
              Qonto's financial risk profile is anchored by three structural concerns: valuation compression, capital
              intensity for the banking licence transition, and interchange fee compression from EU regulation.


              The Series D valuation of €4.4B (January 2022) was set at peak fintech multiples. Bloomberg's analysis of
              comparable European B2B fintechs indicates 40–60% secondary market haircuts since 2022. While Qonto
              confirmed 2023 profitability and ~$500M ARR, no audited statements are available for independent
              verification. KKR, Tiger Global, and other institutional investors have typical 5–7 year fund horizons,
              creating latent pressure for a liquidity event at or above the Series D price — a mark that current market
              conditions make challenging.


              The banking licence transition requires raising an estimated €100M–€300M in new capital to meet CET1
              minimum requirements against risk-weighted assets from any lending products. Whether current operating
              cash generation can fund this without an external raise is unknown from public data. A raise in the
              current environment likely comes at a lower valuation than the 2022 mark, creating down-round risk for
              existing investors.


              Interchange fee compression represents a revenue-erosion risk. EU IFR caps consumer card interchange at
              0.3% (credit) and 0.2% (debit). Qonto's SMB/freelancer Mastercards are partially shielded by the
              commercial card exemption, but PSR proposals to extend IFR caps to commercial/business cards would
              directly compress interchange revenue. ECB rate cuts in 2024-2025 have already compressed float income on
              safeguarded deposits, eliminating a revenue buffer.


              Competitive revenue risk from Revolut Business's zero-fee entry tier threatens Qonto's subscription
              revenue in the price-sensitive entry tier segment. While Qonto's deeper French market integration and
              product breadth provide switching cost protection, continued pricing pressure could require fee structure
              adjustments that compress subscription margins.
