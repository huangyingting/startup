      - number: '3.2'
        title: Direct Neobank Competitor Profiles
        blocks:
          - type: paragraph
            body: >
              Revolut Business is Qonto's most formidable competitor. Founded in 2015 and valued at approximately 33
              billion USD in its 2021 fundraise, Revolut Business offers multi-currency accounts in 25+ currencies,
              strong FX capabilities at low cost, team cards, and expense management. Its primary competitive advantages
              over Qonto are its multi-currency breadth and the scale of its global consumer user base, which provides a
              substantial organic acquisition funnel for business accounts. However, Revolut's consumer-first heritage
              means its SME workflow features remain less deep than Qonto's purpose-built offering, particularly in
              accounting integrations and e-invoicing.

              N26 Business, founded in 2013 and valued at approximately 7 billion EUR, is structurally limited: its
              business accounts are designed exclusively for freelancers and self-employed individuals working under
              their own name. Incorporated companies cannot open an N26 Business account, severely narrowing its
              addressable SME market and removing it as a material competitive threat in Qonto's corporate segment.

              Wise Business (founded 2011, valued at approximately 7 billion GBP at its 2021 IPO) is the leading
              cross-border payments platform for SMBs, serving hundreds of thousands of businesses with best-in-class FX
              rates. However, Wise is not a full-service business bank. It operates on a pay-as-you-go model, lacks deep
              accounting workflow integrations comparable to Qonto's, and does not offer a full-featured multi-user team
              management in all markets.

              Memo Bank (founded 2017, 90 million EUR raised) is a French full-banking-licence SMB bank offering credit
              products, but is France-only and priced at 250 EUR per month for its entry tier, which is fourteen times
              Qonto's Basic plan and limits its addressable market to established mid-market SMBs. Holvi (founded 2011,
              acquired by OP Financial Group in 2016) and Shine (acquired by Societe Generale in 2020) are further
              constrained by their corporate ownership structures and geographic limitations. Starling Business and Tide
              are excellent UK-focused challengers but have no EU presence or IBAN capability, making them effectively
              non-competitive in Qonto's 8 operating EU markets. Incumbent banks like BNP Paribas offer a full product
              suite and credit facilities but with legacy UX, high fees, and branch-centric service models. See TP001
              for the full competitor profile matrix.
