      - number: '7.2'
        title: 监管与法律风险
        blocks:
          - type: paragraph
            body: >
              监管风险是 Qonto 的首要风险维度。作为 ACPR 监管的支付机构（CIB 16958），Qonto 处在 PSD2、DORA、EU AI Act、AMLD6
              四大欧盟监管框架交汇处；这些框架都已进入或即将进入最严格的合规阶段。


              ACPR 银行牌照申请（2025 年 7 月提交）是 Qonto 近期最关键的监管事件。ACPR 要求申请方相对风险加权资产维持至少 8% 的 CET1 资本比率，提出具备实质银行经验的治理董事会，维持稳健
              AML/CFT 方案，并证明符合 DORA 的 ICT 韧性。根据 ACPR 和 Financial Times 指引，审批流程通常需要 18–24 个月，意味着决策窗口在 2027 年
              Q1–Q3。若被拒，Qonto 将被锁在表内贷款之外，继续保留与 Revolut Bank 的产品差距。


              DORA 合规（2025 年 1 月 17 日生效）施加四项具体义务：ICT 风险管理框架、重大事件 4 小时内报告、ICT 第三方风险管理方案，以及年度数字韧性测试。EBA 的 DORA 技术标准要求支付机构将
              CBS 归类为关键 ICT 系统，并展示端到端恢复测试结果。Qonto 的内部自研 CBS 带来同行使用成熟供应商时没有的合规复杂度。


              EU AI Act 的高风险 AI 义务自 2026 年 8 月适用。Qonto 的 AI 驱动欺诈评分和自动化融资决策落入适用范围，需要合格评定、透明度日志和人工监督；不合规罚款最高可达 €30M
              或全球营业额的 6%。


              法律风险以 2025 年 6 月法国法院判令（赔付 €672,139）为锚点。该判决确立了一个法律先例：支付机构可能对其平台上的社会工程欺诈承担部分责任。考虑到 CNIL 正在积极调查金融科技，GDPR
              执法风险存在。Penta 和 Kontist 收购带来的 IP 风险仍是开放问题，需要一手尽调。
