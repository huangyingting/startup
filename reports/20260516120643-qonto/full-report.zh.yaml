      - number: '4.5'
        title: 资本充足性与融资依赖
        blocks:
          - type: paragraph
            body: >
              Qonto 已通过五轮股权融资（Seed 到 Series D）累计融资约 €622M。2022 年 1 月的 Series D 由 Tiger Global 领投，Tencent、DST
              Global、Valar Ventures、Alkeon Capital 跟投，将 Qonto 估值定为 €4.4B，至今仍是最近一轮新股融资。CEO Alexandre Prot 2025 年 7
              月表示，Qonto 自 2023 年实现盈利后财务稳健，可以在没有大规模股权融资的情况下为完整银行牌照（établissement de
              crédit）所需监管资本提供资金——这是现金保存能力较强的信号。公司未公开宣布任何债务融资或授信额度。Pay Later 先买后付（BNPL）账簿（截至 2025 年 7 月促成
              €50M）构成应收款敞口；在信用损失率未披露的情况下，信用风险未知。银行牌照审批预计需要数年，在此期间 Qonto 仍在支付机构牌照下运营。2022 年 €4.4B 估值对应约 20-22x 的收入倍数（按
              €200M ARR 估算），相较当前上市可比新银行 5-12x 的倍数偏高；如果 Qonto 寻求新一轮新股融资或 IPO，存在实质估值风险。
