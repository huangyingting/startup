      - number: '1.2'
        title: 领导团队与治理
        blocks:
          - type: paragraph
            body: >
              Qonto 由 Alexandre Prot（CEO）和 Steve Anavi（总裁）共同创立；截至 2026 年 5 月，两人仍担任高管职务。Alexandre Prot 是 BNP Paribas 前董事长
              Baudouin Prot 之子，这让他在联合创立 Qonto 前就近距离接触到传统银行的强项和短板。Steve Anavi 则带来互补的创业背景。两位创始人当初想打造一套他们管理企业财务时希望拥有的工具；自
              2017 年以来，产品路线图一直由这套共同愿景驱动。

              关键人风险很实在：公开资料没有确认两位联合创始人之下存在强大的第三梯队高管储备；在所有媒体报道和投资者沟通中，Prot 与 Anavi 都是 Qonto 的标志性面孔。治理层背后是机构投资者阵容，包括 Valar
              Ventures、Alven Capital、Tencent、Tiger Global、DST Global、TCV、Alkeon Capital、Eurazeo、KKR、Insight Partners 和
              European Investment Bank，提供董事会层面的监督。公司入选法国 Next40
              指数，意味着其已获得法国最有潜力科技公司阵营的公共认可。创立以来，重大领导层变化似乎主要来自管理团队自然扩张；公开资料未显示 CEO 或总裁离任。尽调应在潜在 IPO 前确认完整 C-suite
              构成、各投资方董事席位分配，以及是否存在待定领导层交接。
