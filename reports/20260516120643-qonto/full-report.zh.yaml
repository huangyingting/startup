      - number: '4.6'
        title: 财务结论：收入质量、利润率路径、资本强度与尽调阻断项
        blocks:
          - type: paragraph
            body: >
              按订阅标准看，收入质量较高：月费经常性强，不断扩大的卡基础带来可预测的交换费，融资利息也加入组合，构成较有防御性的经常性收入。对交换费的依赖带来下行风险——在 Qonto 分成前，Mastercard 会保留约
              1.2-1.5% 交易额——使混合毛利率低于纯 SaaS 同行。利润率路径为正：CEO 确认 2023 年提前盈利，再叠加自研 CBS
              和新的内部卡处理器，说明改善有望延续。资本强度中等：没有实体网点且拥有核心基础设施，降低了持续资本支出需求，但合规和产品工程人力仍是主要成本驱动。鉴于公司称银行牌照无需新增融资，资本充足性看起来稳健；不过仍应对照
              ACPR 申请中披露的完整资本要求时间表（未公开）做压力测试。四个主要尽调阻断项仍在：(1) 没有审计财务报表或公开收入申报；(2) €200M+ ARR 来自管理层披露，未获独立验证；(3) €4.4B
              Series D 估值来自 2022 年 1 月，在全球金融科技倍数压缩后可能被压低；(4) 按套餐档位划分的流失率、CAC、LTV 和确切单元经济完全不公开。任何尽调流程都必须要求 FY2023-2025
              审计损益表、2026 年 Q1 管理账、按队列划分的 ARR 桥接表、Pay Later 全量信用损失数据，以及银行牌照资本充足模型。
            claimRefs:
              - CI024
              - CI025
              - CI034
              - CI035
              - CI038
              - CI043
      - number: '4.7'
        title: 附录
        blocks:
          - type: callout
            title: 经常性收入组合与 CEO 确认提前盈利
            body: >
              Qonto 的订阅费（高可预测性、单个套餐层面的流失风险低）与不断增长的附加服务和融资收入结合，形成较有防御性的经常性收入基础。CEO 确认 2023
              年实现盈利——早于原目标，且足以在没有重大融资的情况下支持银行牌照申请——是一个重要正面信号。自研 CBS 和内部卡处理器会随时间从结构上改善毛利率。
            calloutType: strength
            claimRefs:
              - CI013
              - CI014
              - CI040
              - CI041
          - type: callout
            title: 估值过期、无审计财务报表与交换费毛利率风险
            body: >
              EUR 4.4B Series D 估值定于 2022 年 1 月；考虑到 2022 年以来上市新银行倍数大幅压缩，该估值可能无法反映当前市场环境。公司未发布审计损益表；EUR 200M+ ARR
              仍由管理层披露，且未验证。银行卡交换费收入会稀释毛利率，因为 Mastercard 会保留约 1.2-1.5% 的交易额。SMB 的结构性流失风险进一步限制了订阅收入的可预测性。
            calloutType: risk
            claimRefs:
              - CI021
              - CI024
              - CI035
              - CI037
              - CI038
          - type: callout
            title: 四项尽调动作，化解财务阻断项
            body: >
              任何投资流程都应优先处理：(1) FY2023 与 FY2024 审计损益表，并附按队列和市场拆分的具体 ARR 桥接表；(2) 2026 年 Q1 管理账和未来 12 个月计划；(3) Pay Later
              账簿信用损失数据，包括 NPL 比率和逾期曲线；(4) 提交给 ACPR 的银行牌照资本充足模型，包括资本要求时间表和监管时间线。
