      - number: '8.4'
        title: 乐观 / 基准 / 悲观情景
        blocks:
          - type: paragraph
            body: >
              三种情景框定 2026 年投资 Qonto 的可信结果区间，锚点是相对可比公开和私营金融科技公司的收入倍数分析。

              基准情景（中等概率）下，Qonto 在 8 个欧盟国家的足迹上继续盈利增长。ARR 约为 €460M（约 $500M），未来 24 个月增长 15-20%。银行牌照申请取得进展，但尚未获批。按 6-8× ARR
              倍数——与 Wise 公开市场交易区间一致，并略低于欧洲未上市成长型金融科技公司——隐含企业价值为 €2.5-3.5B，较 Series D 价格折价
              20-43%。若新一轮新股融资或老股交易落在该区间，市场可以出清。

              乐观情景（中低概率）下，ACPR 在 H2 2026 或 H1 2027 前授予 Qonto 全银行牌照。信贷发放、储蓄和投资产品随之打开，获批后 18 个月内 ARR 扩大 30-50%。收入增速提升至 25%
              以上，EBITDA 利润率扩大至 20%+，公司按溢价倍数在 Euronext Paris 递交 IPO（按前瞻口径 10-12× ARR）。隐含企业价值：€4.5-5.5B——等于或略高于 Series D
              价格，为 2022 年投资人带来温和正回报。

              悲观情景（中低概率）下，ACPR 银行牌照申请被拒或拖到 2027 年以后，同时公开市场金融科技倍数进一步压缩。随着 Revolut 加大欧洲 SMB 营销投入，客户获取成本承压，收入增速降至 10%
              以下。金融科技倍数压缩把可比交易推到 3-4× ARR。隐含企业价值：€1.5-2.0B，较 Series D 标记打折 55-66%。在该情景下，Series D
              投资人面临降价融资或平价退出；更早轮次投资人能否实现正回报，取决于优先权结构。

              乐观情景的上行受限于银行牌照缺位；没有信贷发放，Qonto 的单客收入相对持牌传统机构存在结构性上限。悲观情景的下行则受到 Qonto 欧盟范围客户基础和监管足迹的真实战略价值支撑，这些资产对希望切入欧洲 SMB
              分销的银行或大型支付处理商仍有吸引力。
