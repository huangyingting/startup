      - number: '8.5'
        title: 可比公司分析
        blocks:
          - type: paragraph
            body: >
              相关可比集覆盖欧洲上市金融科技公司、全球上市新银行以及欧洲私营挑战者。没有单一可比公司完全匹配；Qonto 的订阅加交易混合模式、SMB
              重点、仅欧盟地理范围、以及支付机构而非银行的状态，决定了需要搭建复合可比集并谨慎加权。

              Wise plc（LSE 上市）是 Qonto 最强的公开市场锚点。两者都是欧洲、受监管、面向 SMB 的支付平台，收入来自订阅和交易。Wise 约按 5-7× 收入交易（截至 2026 年初，市值
              £7-8B，收入运行率约 £1.2B）。这是结构上最接近的可比公司，也为 Qonto 的基准估值设定底线。

              Adyen N.V.（Euronext Amsterdam 上市）是高溢价但有参考价值的基准。Adyen 以 20-25× 收入交易，EBITDA 利润率高于
              40%，展示了完全持牌且规模化的欧洲金融科技公司在公开市场能拿到的定价。没有银行牌照且未证明企业级利润率之前，Qonto 还不能支撑这一倍数。

              Revolut（私营，2021 年估值约 $33B）是直接竞争对手，但不是可靠可比：上一轮估值定在狂热峰值，多产品全球模式（消费者 + 企业）结构不同，也尚未完成能发现价格的 IPO。N26（2021 年
              €7-8B）和 SumUp（2022 年约 €8B）同样受过时私营市场标记拖累，这些标记早于 2022-2026 年压缩周期。

              Nubank（NYSE 上市，巴西）提供 $15-20B 的高增长新银行锚点，但新兴市场背景、消费者重点和 100M+ 客户规模使其只能松散可比。Monzo（英国，2024 年老股交易约 £4-5B）和
              Starling Bank（英国，2022 年约 £2.5B）按商业模式和地理更接近，二者都指向欧洲受监管新银行在近期交易中按 3-6× 收入区间定价。

              合并来看，可比集支持 Qonto 2026 年估值区间约 €2.5-4.5B，取决于银行牌照路径；中点为 €3-3.5B（7-8× ARR）。Series D 的 €4.4B
              位于可比区间高端，需要银行牌照落地才能按平价站住。
