      - number: '3.2'
        title: 直接新银行竞争者画像
        blocks:
          - type: paragraph
            body: >
              Revolut Business 是 Qonto 最强劲的竞争对手。Revolut Business 创立于 2015 年，在 2021 年融资时估值约 $33B；它提供 25+ 种货币的多币种账户、低成本强
              FX 能力、团队卡和费用管理。相对 Qonto，其主要竞争优势是多币种广度，以及全球消费者用户基数带来的规模，这为企业账户提供了可观的自然获客漏斗。不过，Revolut 的消费者优先基因意味着其 SME
              工作流功能仍不如 Qonto 的专门构建方案深入，尤其是在会计集成和电子发票上。

              N26 Business 创立于 2013 年，估值约 €7B；它在结构上受限：其企业账户专为以个人名义工作的自由职业者和自雇人士设计。注册公司无法开立 N26 Business 账户，这严重缩窄了其可触达
              SME 市场，也使其在 Qonto 的企业客群中不构成重大竞争威胁。

              Wise Business（2011 年创立，2021 年 IPO 时估值约 £7B）是面向 SMB 的领先跨境支付平台，以最佳级别 FX 汇率服务数十万家企业。不过，Wise
              不是全服务商业银行。它采用按用量付费模式，缺少可与 Qonto 相比的深度会计工作流集成，也不是在所有市场都提供完整的多人团队管理。

              Memo Bank（2017 年创立，融资 90 million EUR）是持有法国完整银行牌照的 SMB 银行，提供信贷产品，但只在法国运营，入门档价格为每月 250 EUR，是 Qonto Basic 套餐的
              14 倍，因此可触达市场被限制在已成熟的中端 SMB。Holvi（2011 年创立，2016 年被 OP Financial Group 收购）和 Shine（2020 年被 Societe Generale
              收购）进一步受制于公司所有权结构和地域限制。Starling Business 和 Tide 是优秀的英国本土挑战者，但没有欧盟存在或 IBAN 能力，在 Qonto 运营的 8
              个欧盟市场实际上不具竞争性。BNP Paribas 等在位银行提供完整产品套件和信贷额度，但 UX 陈旧、费用高且服务模式围绕网点。完整竞争者矩阵见 TP001。
