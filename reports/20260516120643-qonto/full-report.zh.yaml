      - number: '5.4'
        title: 集成、信任与合规
        blocks:
          - type: paragraph
            body: >
              Qonto 持有 ACPR 支付机构牌照 CIB 16958，于 2018 年 6 月 21 日获批。这是其在 PSD2 通行权下向全部 8 个欧盟运营市场提供支付服务的基础监管资质。所有交易都实现 PSD2
              强客户认证（SCA），包括银行卡支付的 3DS2，满足 EBA 监管技术标准。一个值得注意的负面事件：2025 年 6 月巴黎法院判令 Qonto 向 French Modern Pentathlon
              Federation 赔付 672,139 euros，源于 2023 年一起欺诈事件；法院认为，不充分的推送通知式 SCA 流程是原因之一。这是 Qonto 之后已修复的具体历史缺口。

              GDPR 合规写在 Qonto Privacy Policy（legal.qonto.com/en/privacy）中，覆盖欧盟数据驻留、数据主体权利、与第三方处理方签署的 DPA
              协议，以及数据泄露通知义务。AML/CFT 方案已获 ACPR 批准，包括开户 KYC、持续交易监控和 SAR 申报义务。2026 年 5 月公开来源尚不能确认 ISO 27001 和 SOC 2 Type II
              认证状态，这是企业客户采购和机构投资人审查的重大尽调缺口。

              集成方面，Qonto 在 DATEV、Pennylane、Sage、Exact、QuickBooks、Zapier 等上的 4,791 个集成生态，显著领先任何直接新银行竞争对手，为 SMB
              财务栈形成深度工作流锁定。下方依赖图映射了 Qonto 的关键外部依赖，包括 AWS、Mastercard、SEPA/ECB 通道、ACPR、KYC 服务商和会计 ISV；这些依赖任何中断都会实质影响 Qonto
              服务客户的能力。
