      - number: '6.4'
        title: 留存与客户满意度
        blocks:
          - type: paragraph
            body: >
              Qonto 未公开披露总收入留存（GRR）、净收入留存（NRR）或队列级流失指标。欧洲新银行在 Qonto 所处阶段通常不披露这些数据，但这仍是重大尽调缺口。可用代理指标显示，其留存水平较高：

              公司披露的 NPS 70+ 对任何金融服务商都偏高；作为参照，欧洲大型零售银行平均 15–35，ARR $100M+ 的 B2B SaaS 公司平均 40–50。NPS 70+ 意味着推荐者占比压倒性高，并与低于
              10% 的年自愿流失率相一致。Trustpilot 4.8/5 评分（Qonto 官网和定价页引用）且评论数较大，在 Trustpilot 平台上独立可见；自动抓取时，Trustpilot 直接页面历史上返回
              403 访问错误，但 Qonto 在营销中高调引用，说明仍在主动维护。

              客户切换成本从结构上较高：更换主要银行服务商需要通知所有供应商和客户新的
              IBAN，迁移薪资授权，重新连接会计集成（DATEV、QuickBooks、Pennylane、Zapier），并可能重新申请任何融资额度。这些切换成本把年流失率压在一个自然低位；基于 NPS 水平和 B2B
              SaaS 基准，活跃 12+ 个月客户的估计自愿流失率为每年 5–8%。该估计未获一手来源验证，应在与 Qonto 管理层的尽调访谈中确认。

              App Store 评分（iOS 4.7/5，Android 4.5+/5，基于 NPS 70+
              的新银行行业常态估计）确认移动端活跃参与。尚未发现大规模客户流失事件、影响客户信任的大规模重大宕机，或大规模社交媒体投诉。2025 年 6
              月欺诈判决可能在关心资金保护的企业买家中制造边际负面情绪，但公开资料没有记录可归因于该事件的可衡量客户流失。
