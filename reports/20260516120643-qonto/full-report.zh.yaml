      - number: '7.3'
        title: 运营风险
        blocks:
          - type: paragraph
            body: >
              Qonto 的首要运营风险是 CBS 可靠性。自 2019 年起建设的内部自研 CBS 带来了产品敏捷性优势，但也形成不寻常的单点故障敞口。不同于使用 Mambu 或 Thought Machine
              的同行，Qonto 在 CBS 事故中没有供应商支持渠道，所有 DORA 要求的韧性工具都必须内部建设。CBS 全面宕机会同时影响 8 个欧盟国家的全部 600,000+ Qonto 客户，触发 DORA 4
              小时内向 ACPR 报告的义务，并可能引发监管问询。


              欺诈和 AML 风险是第二层运营风险。2025 年 6 月法院判决说明，针对 Qonto 账户的社会工程欺诈可能给公司带来直接财务责任。La Tribune 记录，法国 2023-2024 年“faux
              conseiller bancaire”欺诈增加 40%。Qonto 的纯数字模式没有网点内欺诈核验路径，结构上暴露更高。对 600K+ 企业客户执行 AML/KYC 合规运营强度高，任何 ACPR
              执法发现都会与待批银行牌照申请叠加，放大监管风险。


              考虑到 Qonto 处理的支付数据量，网络安全风险偏高。GDPR 可通知数据泄露会触发 72 小时内向 CNIL 通知，并可能面临最高全球年营业额 4% 的罚款。DORA 在 ACPR
              监督下明确要求网络安全测试（渗透测试、红队演练），任何安全事件都会增加监管报告义务。


              关键人风险重要：Alexandre Prot（CEO）和 Steve Anavi（President）是联合创始人，也是 Qonto
              在所有监管、投资人和媒体沟通中的主要公众面孔。公司未公开披露具名高管继任层。任一联合创始人在银行牌照申请阶段突然离开，都会严重扰乱 ACPR 的治理评估。
