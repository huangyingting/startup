      - number: '2.5'
        title: 规模测算与采用尽调缺口
        blocks:
          - type: paragraph
            body: >
              交叉核对现有公开来源后，仍有几项重大不确定性：

              市场规模区间过宽：首要市场规模缺口是，缺少一份权威、近期（2024–2026）、公开可获取的研究，按产品线、地域、挑战者与在位者拆分欧洲 SMB 商业银行可触达市场。公开估算从 €8B 到 €40B+
              不等，取决于范围（仅 SMB vs. 全部数字银行；仅手续费 vs. 手续费加信贷）。尽调应委托独立分层市场模型。

              新银行渗透率测量：Qonto 称其在 8 个国家拥有 600,000 名客户，约占 2600 万欧盟 SMB 基数的 2–3%。这与“欧洲新银行占 5–10% SMB”这一通用渗透率估算冲突：如果 5%
              下限正确，则目前约 130 万家欧盟 SMB 持有新银行账户，而 Qonto 的 600,000 名客户意味着约 45% 新银行市场份额——考虑到 Revolut Business 每月新增 30,000+
              家企业的说法和 N26 Business 的存在，这个数字显得偏高。应通过独立客户面板数据解决这一不一致。

              Revolut Business 竞争重叠：Revolut 报告每月有 30,000+ 家新企业加入，年化为 360,000+ 名新客户。如果准确且可持续，Revolut 可能在 1–2 年内接近 Qonto
              当前总客户基数。不过，Revolut 的全球范围（150+ 个国家）让欧洲 SMB 专属市场份额比较变得困难。

              信贷市场规模缺失：欧洲 SMB 的信贷市场（发票融资、透支、定期贷款）估计为手续费收入池的 2–3 倍，年发放额可能为
              €50–75B。可获取来源没有给出该子市场中挑战者金融科技信贷份额与在位者份额的具体拆分。这是 Qonto 获得银行牌照后最有价值的收入扩张向量，但公开资料对其规模记录很差。

              CAGR 验证：“欧洲 SMB 金融科技”15–20% CAGR 出现在多篇二级出版物中，但源头是 Mordor Intelligence、Grand View Research
              等市场研究机构，其底层方法论并不公开。McKinsey Global Payments Report 支持 EMEA 整体支付更保守的 6–8% CAGR，并明确指出 SMB 数字板块跑赢平均水平，但没有单独量化
              SMB 专属增速。
            claimRefs:
              - CM032
              - CM033
              - CM034
              - CM035
      - number: '2.6'
        title: 展品
        blocks:
          - type: callout
            title: 监管顺风利好数字优先挑战者
            body: >
              欧盟即时支付条例（2024 年 4 月）和 PSD2 持续落地，在监管层面移除了两个历史性在位优势——支付速度和数据锁定。Qonto 已运行在 SEPA Instant
              基础设施上，不受传统批处理限制，相比在位银行更适合向 SMB 交付实时支付体验。加上开放银行授权支持第三方账户聚合，这些监管催化正在加速挑战者的竞争窗口。
            calloutType: strength
            claimRefs:
              - CM022
              - CM023
              - CM024
          - type: callout
            title: 信贷缺口和在位者锁定限制收入天花板
            body: >
              没有银行牌照（2025 年 7 月已申请，获批可能在 2027–2028 年）时，Qonto 不能提供资产负债表信贷——透支、定期贷款、循环额度；而这是与 SMB
              银行忠诚度相关性最强的单一产品。在位银行用信贷作锚，即便 NPS 差，切换仍然痛。除非 Qonto 补上这一缺口，否则其单账户收入在结构上低于中端 SMB（10–250 名员工）的在位银行 ARPU；在
              €39+/月 ARPU 价格带捕获高价值客户关系的能力也会受限。
            calloutType: risk
            claimRefs:
              - CM027
              - CM028
              - CM029
  - number: 3
    title: 竞争格局
    sections:
      - number: '3.1'
        title: 竞争格局概览
        blocks:
          - type: paragraph
            body: >
              2026 年，欧洲 B2B SME 银行市场高度分散，并在快速演化。Qonto 位于三类竞争者交汇处：全球和泛欧洲新银行、专门面向 SME 的银行，以及正在数字化转型的传统在位银行。

              第一层是全球和泛欧洲新银行，包括 Revolut Business、N26 Business、Wise Business、Holvi 和 Shine，它们与 Qonto 争夺数字优先的 SMB
              和自由职业者。这些玩家的重心差异很大：Revolut Business 的多币种和 FX 主张最广；N26 Business 在结构上仅限以个人名义工作的自由职业者；Wise Business
              是支付优先平台，而非全服务银行；Holvi 服务有限地域内的微型企业；Shine 是法国自由职业者新银行，受被 Societe Generale 收购约束。

              第二层包括 Memo Bank 等专门面向 EU SME 的银行。Memo Bank 持有完整法国银行牌照并提供信贷产品，但只在法国运营，价格显著高于 Qonto（每月 250 EUR 起 vs Qonto 每月
              9 EUR 起）。

              第三层是聚焦英国的挑战者（Starling Business、Tide）。英国脱欧后，它们的英国银行牌照不再具备欧盟护照权，因此在 Qonto
              的核心市场——法国、德国、意大利、西班牙、奥地利、比利时、葡萄牙和荷兰——相关性有限。在位银行（BNP Paribas、Deutsche Bank、Societe Generale）按数量仍掌握大多数 SMB
              关系，但受困于遗留 UX、高费用和缓慢创新周期；Qonto 的产品正是为替代这些痛点而设计。下方定位图展示各竞争者在 SME 专注度和整体产品深度两条轴上的位置，确认 Qonto
              在竞争集合内两个维度均处于领先。Qonto 在 SME 专注度（x 轴，9/10）和产品深度（y 轴，9/10）上得分最高，明显领先 Revolut Business（6、7），更远领先 N26
              Business（5、4）等消费者优先平台和 BNP Paribas（3、8）等在位者。
