      - number: '4.2'
        title: GTM 模式与销售效率
        blocks:
          - type: paragraph
            body: >
              Qonto 的获客以数字化优先、以自助为主：任何符合条件的欧洲企业都可以在约 10
              分钟内开户，无需到网点或提交纸质表单。这种低摩擦开户流程从结构上压低获客成本（CAC），低于传统银行，也低于多数仍需人工核验或现场办理的既有新银行。产品本身拉动分发：从 DATEV、Google
              Sheets、Zapier、Sage 到 Cegid、QuickBooks、Pennylane，4,791 个工具集成形成生态飞轮，会计师和 CFO 在既有工作流里就会遇到 Qonto。2024 年 3 月收购
              Regate 后，会计师渠道进一步加深，Qonto 嵌入了会计师代 SMB 客户管理的应付账款和应收账款流程。据报道 NPS 达 70+，推荐和口碑又带来额外自然获客。分析师估计，数字 SMB 银行每客户 CAC
              为 €50-150；Qonto 以入站数字渠道为主，可能落在区间低端。基础套餐 €9-19/月时，CAC 回本周期估计为 12-18 个月；€39/月高级档位可压缩到 6-9 个月。公司尚未公开披露官方 CAC
              或客户终身价值（LTV）数据。
