  - number: 4
    title: 财务情况
    sections:
      - number: '4.1'
        title: 收入来源、定价模型与收入结构
        blocks:
          - type: paragraph
            body: >
              Qonto 通过七条不同收入流变现。锚点是分层订阅模型：Basic €9/月（不含 VAT），覆盖账户基础和基础开票；Smart €19/月，增加共享访问和预会计工具；Premium
              €39/月，面向需要更高交易量和更好国际费率的快速成长企业。所有套餐均按无承诺月度方式运行。附加模块——Cash Flow Management Plus €29/月（按年计费）和 Accounts
              Receivable Plus €35/月——为高档订阅用户扩展增购收入。银行卡交换收入来自 Qonto 与 Mastercard 的合作；FX 佣金从 2%（One Card）到 1%（Plus Card）再到
              0%（Metal X Card）不等，对国际支出形成分层变现。超过套餐额度的 SWIFT 交易需支付转账费。自 2024 年 3 月起，Qonto 通过自有 Pay Later 产品赚取融资利息，金额最高
              €10,000，利率 1.17%/月。最后，对每月至少执行五笔合格交易的客户，Qonto 最高按年化 4%（与 ECB
              挂钩）给客户余额付息，同时提升参与度并产生浮存收入。订阅费收入确认直接（月度现金）；交换费和转账费取决于交易，波动更高。融资利息在 90 天还款期内摊销。最大的收入确认风险是，如果 Mastercard
              调整传导费率，或欧盟监管收紧交换费上限，交换费利润率会被压缩。
