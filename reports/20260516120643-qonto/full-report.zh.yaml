      - number: '6.2'
        title: 客户增长轨迹
        blocks:
          - type: paragraph
            body: >
              自 2017 年 7 月商业化上线以来，Qonto 客户基础快速复合增长。公司到 2018 年中约达到 10,000 名客户；2019 年底扩展到德国、意大利和西班牙后突破 50,000；COVID-19
              期间数字银行采用加速，2020 年底超过 130,000。250,000 客户里程碑在 2022 年 3 月随 Penta 收购正式宣布。Finextra 2022 年末报道称，Qonto 目标到 2022
              年底达到 700,000 客户——公司未按期达到该目标，说明整合成本和欧洲宏观逆风之后，自然增长放缓。500,000 里程碑通过 2026 年 1 月 BusinessWire 公告确认；到 2026 年 5
              月，官网显示 600,000+。

              2017 到 2026 年约 50x 增长，对应 9 年 CAGR 约 55%，相对传统银行非常突出，但随着客户基础成熟正在放缓。年度客户数增长估计为 2022–2024 年 30–50%，2025–2026 年
              15–25%，符合新银行走出超高速增长并接近核心市场（法国）饱和时的典型 SaaS 增长模式。CrowdFundInsider 2024 年 12 月报道称，Qonto
              的数字银行采用率在法国关键指标上已经“超过传统银行”。Qonto 的 4,791 个第三方集成会放大粘性：客户每接入一个新工具，就多一个留存锚点；接入会计软件或薪资工具的客户明显更难被挖走。

              年化活跃使用代理指标包括：(a) 支付交易量（未公开披露），(b) 卡交易笔数（未公开披露），(c) Trustpilot 评论速度——仍活跃，平均 4.8/5，(d) App Store 和 Google
              Play 评分，Qonto 在这些渠道保持高分。公司未公开披露队列留存数据或月活账户指标。
