chapters:
  - number: 1
    title: 公司概况
    sections:
      - number: '1.1'
        title: 公司身份与商业模式
        blocks:
          - type: paragraph
            body: >
              Qonto 是法国支付机构，以 Qonto 为商号运营（法律实体：Qonto SA，注册于 RCS Paris n° 819 489 626）。公司总部位于法国巴黎 75009 区 rue de Navarin
              18 号，由 Alexandre Prot 和 Steve Anavi 于 2017 年创立，使命是给欧洲 SME 配上它们应得的金融工具。Qonto 不是银行，而是受监管的支付机构；其牌照由法国
              Autorité de Contrôle Prudentiel et de Résolution（ACPR）颁发，注册号 CIB 16958，授权日期为 2018 年 6 月 21 日。截至 2026 年 5
              月，Qonto 在 8 个欧洲国家运营：法国、德国、意大利、西班牙、奥地利、比利时、葡萄牙和荷兰。

              商业模式围绕面向 SMB 和自由职业者的一体化订阅式财务管理平台展开。套餐从 Basic（€9/月）到 Smart（€19/月）和
              Premium（€39/月）不等，并可加购高级现金流管理和应收账款自动化模块。收入来自月度订阅费、银行卡交换费、SEPA 与 SWIFT 转账费，以及利息报酬收入。核心产品包括欧洲 IBAN
              商业账户、Mastercard 借记卡和信用卡（消费限额最高 €400,000/月）、SEPA 与 SWIFT
              国际转账、电子发票（含经认证的欧盟电子发票）、应付账款自动化、费用管理和嵌入式融资（先买后付和贷款直接入 Qonto 账户）。自 2019 年起，Qonto 运行自有 Core Banking
              System（CBS），掌握交易处理，产品迭代更快。平台接入 4,791 个第三方工具，包括 DATEV、Google Sheets、Zapier、QuickBooks，以及各目标市场的会计套件。
