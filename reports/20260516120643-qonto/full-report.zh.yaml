      - number: '5.5'
        title: 路线图与差异化
        blocks:
          - type: paragraph
            body: >
              Qonto 2024 至 2026 年产品路线图体现出一条明确策略：从核心支付基础设施扩展到信贷、AI 驱动自动化和完整银行能力。Qonto Credit 于 2024
              年推出，把延后付款、定期贷款和收入型融资直接放入企业账户，首次把信用风险放到 Qonto 资产负债表上，也把收入来源扩展到订阅费和交换费之外。信用承销方法和贷款账簿质量指标仍未公开，随着账簿扩大会构成尽调缺口。

              2025 年，Qonto 在整个产品套件推出 AI 驱动功能：用于自动票据捕捉和分类的发票 OCR、AI 辅助开票，以及支出分析看板。这些功能直接与独立会计自动化工具竞争，并加深已经通过
              DATEV、Pennylane、Sage 合作形成的集成锁定。最具战略意义的路线图事项是完整银行牌照（établissement de crédit）申请：约 2025 年 5 月向 ACPR 提交，并在
              2025 年 7 月公开宣布。审批是多年过程，一旦获批，将在无需合作银行中介的情况下解锁储蓄账户、投资产品和完整信贷发放能力，同时要求达到银行级资本充足率。

              2026 年在荷兰和比利时的纵深拓展包括本地化产品功能，以及接入这些市场的主导会计软件 Exact Online。法国财经媒体猜测 IPO 计划可能在 2026 至 2027 年推进，Euronext Paris
              是最常被提及的上市地点，但 Qonto 管理层尚未确认。信贷能力扩张、AI 差异化、银行牌照推进和集成护城河叠加，使 Qonto 成为以平台为牵引、挑战完整 SMB 银行栈的选手。
