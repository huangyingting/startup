      - number: '5.6'
        title: 附录
        blocks:
          - type: callout
            title: 自研 CBS 与深度集成护城河
            body: >
              Qonto 自 2019 年投入运行的自建核心银行系统，加上 4,791 个有记录会计集成，形成技术和商业护城河，任何竞争对手都需要多年才能复制。自建 CBS 让 Qonto 摆脱了束缚多数新银行竞争对手的
              BaaS 中间件依赖，并获得按自身节奏迭代核心金融产品功能的能力。DATEV、Pennylane、Sage、Exact、QuickBooks 集成为 SMB 财务栈制造深度工作流锁定：一旦会计师和 SMB 都嵌入
              Qonto + DATEV 工作流，切换到缺乏同等集成深度的竞争对手成本极高。截至 2026 年 5 月，没有任何直接新银行竞争对手，包括 Revolut Business（直接集成少于 50 个）、Wise
              Business（无会计级集成）或 N26 Business（未发布集成生态），能接近 Qonto 的集成广度。
            calloutType: strength
            claimRefs:
              - CE011
              - CE025
              - CE036
          - type: callout
            title: 云与 KYC 供应商集中风险
            body: >
              Qonto 全部工作负载都跑在单一云服务商（AWS）上，客户开户依赖一家未命名第三方 KYC 服务商。AWS 欧盟区域历史上曾发生宕机，这会直接影响 Qonto
              的支付处理、卡业务和面向客户的应用。未披露的卡处理供应商又在授权和清算层引入集中风险：具体处理器 SLA 和故障切换安排没有公开，投资人无法审查。未命名 KYC 服务商增加监管依赖：KYC
              供应商任何合规失败或宕机，都可能叫停所有新客户开户，并触发 ACPR 审查。此外，公开来源尚不能确认 ISO 27001 和 SOC 2 Type II
              认证状态；对于把认证安全治理作为供应商准入条件的企业客户，这是采购障碍。
