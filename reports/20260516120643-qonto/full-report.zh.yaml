      - number: '8.2'
        title: 投资建议与风险评级
        blocks:
          - type: paragraph
            body: >
              基于现有证据，建议为观察，置信度为中。风险评级为高；按最后披露的 €4.4B 价格看，估值立场为偏高。

              观察是合适判断，因为投资逻辑确实有吸引力——已确认盈利、ARR 规模大、欧盟监管护城河已搭好、银行牌照带来可选性——但关键数据缺口限制了更高置信度。FY2023 或 FY2024
              经审计财报均未公开。上一轮新股估值标记已经过时 4+ 年。优先清算瀑布、股权结构表和银行牌照时间线都不透明。

              按 €4.4B 入场，价格隐含约 9.6× ARR，明显高于可比欧洲上市金融科技公司（Wise：5-7× 收入），也大致只与最具成长溢价的公司对齐（Adyen：20-25×
              收入，但已盈利、上市且规模化增长更快）。2026 年 5 月的市场背景已经是压缩后的环境，私营金融科技定价必须锚定公开市场倍数，而不是 2021-2022
              年峰值。若要有可信入场点，€2.5-3.5B（基准情景公允价值）需要通过新一轮新股融资或老股交易体现，并较 Series D 价格有明显折让。投资人应把 ACPR 银行牌照进程、ARR
              轨迹，以及任何新股权或债务融资公告作为升级至买入建议的主要触发点。

              若满足以下条件，买入判断才站得住：(a) 经审计收入确认 ARR ≥€400M，(b) 银行牌照获批或披露实质进展，(c) EBITDA 利润率确认高于 15%，且 (d) 入场价格反映基准情景倍数（6-8×
              ARR，约 €2.5-3.5B）。若牌照被拒、新股融资 出现降价融资，或经审计财务数据显示收入显著低于公司主张，则应转为继续研究或回避。
