      - number: '8.6'
        title: 退出准备度与最终尽调问题
        blocks:
          - type: paragraph
            body: >
              截至 May 2026，Qonto 的退出准备度处于中间状态：IPO 的运营基础已经存在（规模、盈利、多国监管身份、机构投资人辛迪加），但近期公开发行所需前提尚未到位。公司未公开宣布 IPO
              时间表。银行牌照申请自然形成持有期：投资人和公司很可能等待 ACPR 结果，再决定是否走 IPO 路径，因为牌照会实质改变呈现给公开市场投资人的财务画像。

              三条退出路径可行。第一，2027-2028 年在银行牌照结果明确后，最可能选择 Euronext Paris 或 LSE IPO。Qonto 需要发布经审计 IFRS 财报、建立独立董事会，并达到 €3B
              以上市值，才能形成有意义的流通股。France Next40 成员身份意味着其与巴黎上市的监管和政治取向一致。第二，由寻求数字 SMB 分销和现代核心银行技术的欧洲传统银行（BNP Paribas、Société
              Générale、ING、Santander）战略收购。按 €2.5-4B，欧洲大型银行有能力买下这一资产以补齐金融科技能力。第三，老股交易
              让早期投资人（Valar、Alven）实现收益，后期投资人继续持有敞口。老股交易定价 将是读取当前公允价值最直接的信号，但尚未公开披露这类交易。

              投资逻辑失效阈值是银行牌照结果。若被拒或无限期推迟，主要上行催化剂会消失，单客收入被封顶，并可能触发新股降价融资。2025 年 6 月法院判决要求赔付欺诈损失，提示 ACPR
              在牌照审查中会仔细审视的合规缺口。投资人还应跟踪 Revolut 在欧洲市场份额的进展，以及 Qonto 是否披露经审计收入，以确认或削弱 $500M ARR 主张。
