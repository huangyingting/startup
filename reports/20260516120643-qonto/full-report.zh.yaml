  - number: 6
    title: 客户情况
    sections:
      - number: '6.1'
        title: 客户分层
        blocks:
          - type: paragraph
            body: >
              Qonto 面向欧洲 SMB 和自由职业者，覆盖三个主要买方 / 付款方客群：(1) micro-entrepreneurs 和 auto-entrepreneurs（个体经营者，通常使用 Basic 或
              Smart 套餐），(2) 1–9 名员工的小企业（全部 8 个市场中最大的 SMB 队列），(3) 10–250 名员工的成长型 SMB（Premium
              套餐和附加模块）。公司未公开披露按客群划分的收入，但平台定价和功能架构显示，10–250 员工队列虽然数量更小，却通过多卡发行、子账户使用、会计自动化和融资贡献了不成比例的更高单账户收入。

              地域上，法国占主导，估计占 600,000+ 客户基础的 40–45%（约 240,000–270,000 家企业），反映 Qonto 2017 年在本土市场启动，以及在法国 auto-entrepreneurs
              和 TPE（très petites entreprises）中的高密度存在。德国是第二大市场，估计占总客户 20–25%；这一位置主要靠收购而非自然增长取得：2022 年 3 月收购 Penta 带来约
              100,000 名德国 SMB 客户，更早整合 Kontist 又增加约 50,000 名德国自由职业者。意大利和西班牙合计估计为 10–15%，代表 2019
              年以来的自然增长。奥地利、比利时、葡萄牙、荷兰四个较新市场估计不到总基础的 10%，仍处于早期增长轨迹。下表（TU001）概述估计地域分布。

              客户用例集中在企业银行服务（IBAN、卡、转账）、费用管理和开票；高档位客户会增加会计集成（DATEV、QuickBooks、Pennylane）和短期融资。没有证据显示按行业存在垂直集中；Qonto
              客户基础横跨科技公司、专业服务、酒店餐饮、零售、创意机构和建筑业，与其在全部 8 个市场的通用 SMB 定位一致。
