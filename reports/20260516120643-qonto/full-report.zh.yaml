      - number: '6.5'
        title: 扩张与集中风险
        blocks:
          - type: paragraph
            body: >
              Qonto 的“先落地再扩张”动作遵循经典新银行模式：先用 Basic（€9/月）获客，随着员工数增长和功能采用加深，升级销售到 Smart（€19/月）或
              Premium（€39/月），再叠加会计自动化（Regate by Qonto）、延后付款融资和实体终端等增量模块。4,791
              个集成库既是粘性机制，也是扩张杠杆：客户每启用一个新集成，切换成本都会上升，平台依赖也会加深。

              法国地域集中是主要集中风险。法国估计贡献总客户收入的 40–45%（假设各市场 ARPU 类似，按客户占比推算）。如果法国对支付机构的监管处理变化、法国 SMB /
              自由职业者数字化采用恶化，或资金充足的法国既有银行进入数字新银行领域，Qonto 增长可能受到不成比例影响。四个较新市场（奥地利、比利时、葡萄牙、荷兰）是有意的多元化，但合计规模仍小（约 10%）。德国（估计
              25%）提供有意义的多元化，不过 Penta / Kontist 客户基础部分来自收购、非自然增长，可能仍保留对旧 Penta 品牌的残余忠诚，而非对 Qonto 的深度依附。

              账户层面的客户集中度不重要：Qonto 的 600,000+ 客户都是 SMB，单一客户不太可能贡献超过 0.1% 收入。不过，Penta 收购带来了一批经历过两次品牌迁移的德国客户；尽调应核查
              Penta/Kontist 迁移基础的留存队列，并与德国自然获客客户对比。

              渠道获客主要依赖数字渠道（SEO/SEM、App Store、口碑）、会计师推荐和平台合作伙伴。公开证据显示，没有占获客量不成比例的主导第三方经销商或渠道合作伙伴。Qonto
              的会计集成生态（DATEV、Pennylane）创造了间接获客渠道，但尚未识别单一渠道依赖。Regate 收购增加了自有会计软件用户基础，可作为交叉销售目标。
