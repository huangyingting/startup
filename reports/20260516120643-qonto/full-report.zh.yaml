      - number: '3.5'
        title: 护城河耐久性与竞争风险
        blocks:
          - type: paragraph
            body: >
              Qonto 的竞争护城河可从六个维度评估。当前最强的单一差异化点，是其专为 SME 设计的 UX，并集成费用管理、电子发票和多人工作流；但 Revolut Business 对 SME
              功能的投入正在加速，压力上升。Qonto 的会计集成深度（DATEV、Pennylane、4,791+ 个合作伙伴）短期耐久性最高，因为尚无竞争者公开投入资源复制这种广度，尤其是在 DATEV
              生态中；该生态对服务超过一百万用户的德国会计师至关重要。

              Qonto 用 ACPR CIB 16958 支付机构牌照和欧盟护照权，在 6+ 年里搭建出欧盟多国监管基础设施，这对新进入者构成有意义的门槛。从零复制一个覆盖 8 国且符合欧盟要求的存在，需要 3 到 5
              年和数千万监管资本。客户数据和切换成本护城河同样显著：从 Qonto 迁移到竞争者，需要更新工资 IBAN、重新连接会计软件、迁移 Direct Debit 授权并重新培训财务团队；对一家 5 到 50
              人公司而言，通常需要 2 到 4 周。

              Qonto 的品牌权益（NPS 70+、Trustpilot 4.8/5）支撑自然获客和留存。主要剩余风险是 Revolut Business 的多币种优势和不断增强的 SME 产品投入；它可能在 18 到 36
              个月内缩小工作流深度差距。信贷缺口仍是 Qonto 最重大的结构性暴露：作为支付机构，在银行牌照申请完成前，它不能提供资产负债表贷款；这是一个 2 到 4 年监管流程。完整风险登记见 TP004，量化护城河指标见
              FP003。
