      - number: '4.3'
        title: 成本结构、毛利率驱动因素与服务交付成本
        blocks:
          - type: paragraph
            body: >
              Qonto 的运营成本结构体现了“软件 + 支付”架构。人员是最大成本项，估计占总运营费用的 60-65%，由产品工程、合规、运营、客服和收入团队 1,600+ 名员工驱动。卡与支付处理成本——包括
              Mastercard 交换费转付、SEPA/SWIFT 通道费用和实体卡发行——估计占运营费用 10-15%。营销和获客再吃掉 10-15%，主要是数字广告和合作伙伴成本。监管合规，包括 PSD2
              义务、KYC/AML 基础设施（在法国、西班牙、意大利部分外包给 Fourthline）以及银行牌照准备，估计占 5-10%。云 / IT 基础设施约占 5%。毛利率估计为 60-75%，与“软件 +
              支付”同类公司一致；下限反映重度依赖交换费的阶段，上限反映更高毛利的订阅收入组合。Qonto 自 2019 年起拥有自研核心银行系统（CBS），省掉了 SaaS
              型银行平台承担的一项重要中间件成本，支撑利润率随时间改善。公司在 2024-2025 年新增内部卡处理器（据 CEO 在 2025 年 7 月银行牌照发布会上的表述），进一步降低可变处理成本。Pay Later
              先买后付（BNPL）账簿自 2024 年 3 月以来约发放 €50M，带来适度应收账款敞口。
            claimRefs:
              - CI020
