      - number: '6.3'
        title: 具名客户证据与参考
        blocks:
          - type: paragraph
            body: >
              Qonto 在官网和博客发布客户评价，但第三方可访问来源中，带量化结果的具名生产部署很少。现有证据分三层：(1) G2、GetApp、OMR 上的匿名用户评论，覆盖开户速度和卡管理；(2) 聚合满意度指标（NPS
              70+、Trustpilot 4.8/5），不识别单个客户；(3) Qonto 博客中少量具名案例，用作 SMB 示例（通常是法国微型企业）。

              在 G2 上，Qonto 平均评分较强，反复出现的主题是无摩擦数字开户、响应迅速的客户支持和干净的用户界面——这确认了生产部署，而不是试点状态。GetApp 评论者强调发票管理便利，以及面向团队的多卡发行。OMR
              平台（德语软件评测网站）展示了 Penta 迁移后德国 SMB 的正面评价，确认被收购客户基础仍在延续。评论内容持续提到费用管理和会计集成功能的活跃使用，说明客户不是沉睡或试用套餐。

              最值得注意的负面参考是 2025 年 6 月巴黎法院针对 Qonto 的判决，案件由 Fédération Française de Pentathlon Moderne 提起：法院判令 Qonto 在 2023
              年 10 月 52 笔欺诈支付交易之后赔付 €672,139，认定 Qonto
              未能实施充分强认证。这是一起涉及可识别具名客户的有记录生产事故。尚未发现其他具名客户公开报告类似欺诈或支付失败的证据；该事件看起来是孤立事件。

              尽调应要求一份 10+ 名愿意公开交流的具名企业或中型市场客户（10–250 名员工）参考名单，因为公开证据基础主要覆盖微型企业部署。
