      - number: '1.5'
        title: 公司里程碑
        blocks:
          - type: paragraph
            body: >
              Qonto 的发展可分为五个阶段：创立与监管落地（2016–2018）、欧洲扩张（2019–2020）、资本化与整合（2021–2022）、收购（2022–2024）和产品拓宽（2024–2026）。公司
              2016 年 7 月在法国软启动，2017 年正式化并完成首批融资。2018 年 7 月取得 ACPR 支付机构牌照，是其开启完整商业运营的关键监管里程碑。Qonto 于 2019
              年扩张至德国、意大利和西班牙，同时投入自有 Core Banking System，以降低对第三方银行基础设施的依赖。

              2022 年 1 月 Series D（€486M，估值 €4.4B）完成两个月后，Qonto 收购面向 SMB 的德国新银行 Penta，加快德国市场渗透，并将客户数推高至 250,000 以上。2024 年
              3 月，Qonto 收购法国 SaaS 公司 Regate；后者为会计师事务所及其客户提供协作式会计和记账软件，现在以 “Regate by Qonto” 形式出现在集成市场。2025 年 5 月，Qonto
              推出实体支付终端（POS 设备），进入线下支付市场。2025 年 6 月，巴黎商事法院命令 Qonto 向 Fédération Française de Pentathlon Moderne（FFPM）赔偿因
              2023 年仿冒攻击导致损失的全部 €672,139，法院认定 Qonto 未落实足够强认证程序。2025 年 7 月，Qonto 向 ACPR 申请完整银行牌照（établissement de
              crédit）；CEO Prot 表示公司已在 2023 年提前实现盈利。截至 2026 年，扩张至奥地利、比利时、葡萄牙和荷兰是最近的地域前沿。
