  - id: TE002
    title: 客户工作流和用例表
    columns:
      - 用户任务
      - 当前流程（使用 Qonto 前）
      - Qonto 方案
      - 可衡量收益
      - 限制
    rows:
      - - 向供应商付款（SEPA/SWIFT）
        - 登录传统银行，手动输入 IBAN，等待 1 至 3 天完成 SEPA Credit Transfer
        - 通过 CSV 或 API 批量上传 SEPA；SEPA Instant 低于 10 秒；状态实时可见
        - SEPA Instant 从 3 天缩短到低于 10 秒；批量排程每月节省数小时
        - 非 SEPA 转账仍收 SWIFT 费用；SEPA Instant 要求收款银行支持 SCT Inst
      - - 管理团队费用
        - 员工使用个人卡，提交纸质票据，财务在 Excel 中手工对账
        - 每名员工配公司 Mastercard；通过应用拍照上传票据；自动分类；审批流
        - 支出实时可见；费用关账时间从数天缩短到数小时
        - 需要 Qonto Smart 或 Premium 套餐；OCR 准确率并非 100%
      - - 生成并发送发票
        - 在 Word/Excel 中制作发票，把 PDF 发邮件给客户，再手工催收
        - 从 Qonto 应用开具认证电子发票；自动付款提醒；到账后自动对账
        - 发票创建时间从 30 分钟缩短到低于 5 分钟；自动提醒减少逾期付款
        - 高级发票融资（保理）尚未覆盖所有套餐
      - - 控制团队消费限额
        - 员工共用一张公司借记卡，缺少细粒度限额和可见性
        - 按员工配卡，设置自定义消费限额和实时控制；可即时冻结 / 解冻
        - 消除共用卡风险；即时控制员工支出
        - Basic 套餐不可用（仅 1 名用户）
      - - 会计对账
        - 将银行流水导出为 CSV，导入 Xero/DATEV，再手工把交易匹配到发票
        - 自动同步至 DATEV/Pennylane/QuickBooks；自动分类；FEC 导出；实时会计视图
        - 典型 SMB 每月对账时间从 8 至 16 小时缩短到低于 2 小时
        - 质量取决于集成伙伴；部分集成是批量同步（非实时）
    notes: |
      工作流基于 Qonto 官方产品页面、帮助中心和已发布客户案例研究，审阅时间为 2026 年 5 月。
    enumerationScope:
      coverage: partial
      basis: >-
        Five primary SMB finance workflows addressed by Qonto based on official use-case documentation and customer case
        studies as of May 2026
    claimRefs:
      - CE006
      - CE007
      - CE008
      - CE009
      - CE010
