            title: 监管护城河与自有基础设施
            body: >
              Qonto 持有完整 ACPR 支付机构牌照（CIB 16958，2018），并享有欧盟护照权，为其进入更多欧洲市场扫除重要门槛。自 2019 年起，公司运行自有 Core Banking
              System（CBS），掌握交易处理，无需依赖 banking-as-a-service 中间件即可更快迭代产品。这组监管资质和自研基础设施，构成了相对仍依赖银行合作伙伴的金融科技挑战者的持久结构性优势。
