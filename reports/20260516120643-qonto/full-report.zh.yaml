      - number: '3.6'
        title: 展品
        blocks:
          - type: callout
            title: 专为 SME 构建的定位
            body: >
              Qonto 与 Revolut Business、N26 Business 的核心差异是结构性的，不只是表面功能。消费者优先新银行是在个人银行轨道上改装企业功能；Qonto 从第一天起就为 SMB
              和自由职业者设计。这体现在难以快速复制的独特能力上：在 8 个国家满足各国强制要求的欧盟认证电子发票、原生接入德国会计工作流的 DATEV 集成（该工作流被超过一百万名会计师使用），以及适合 5 到 50
              人财务团队的多人角色管理和审批流程。凭借 600,000+ 家企业客户、4,791 个集成和 Trustpilot 4.8/5 评分，Qonto 已建立起 SME
              优先的品牌和产品身份；在位银行和横向新银行很难可信地复制。
            calloutType: strength
            claimRefs:
              - CP016
              - CP028
              - CP031
          - type: callout
            title: Revolut Business 商品化威胁
            body: >
              展望 2026–2028 年，Revolut Business 是 Qonto 市场位置面临的单一最大竞争风险。Revolut 背靠 $33B+ 估值和 45 million+
              个人用户；这套消费者基数为企业账户提供强大的自然获客渠道。自 2023 年以来，Revolut Business 系统性加入 SME 专属功能，包括费用管理、团队卡、分析和会计连接。如果 Revolut 在
              Qonto 工作流深度上达到哪怕部分平权，同时利用更强的多币种供给和更低入门价格，就可能把 Qonto 的核心价值主张商品化。此外，Revolut 的英国银行牌照（2024
              年获批）和立陶宛欧盟银行牌照支持其提供信贷产品；Qonto 作为支付机构无法提供这些产品，这在 10 到 250 人 SMB 客群中形成产品覆盖的结构性缺口，而信贷准入是该客群银行忠诚度的主要驱动。
            calloutType: risk
