companyProfile:
  summary: >-
    Qonto 由 Alexandre Prot 和 Steve Naudé 于 2016 年在巴黎创立，定位为面向欧洲 SME
    和自由职业者的数字优先商业银行。公司通过一个移动端与网页端界面，提供一体化金融服务套件：商业活期账户、虚拟和实体借记卡、境内与 SEPA 转账、发票管理、费用追踪和实时会计集成；该业务持有 ACPR 支付机构牌照。Qonto
    已在法国、德国、西班牙、意大利、葡萄牙和荷兰服务约 500,000 家 SME 客户，2024 年据报 ARR 为 €200M，并声称达到盈亏平衡；公司累计五轮融资 €622M，包括 2022 年 1 月以 €4.4B 估值完成的
    €486M Series D 轮。
