      - number: '5.3'
        title: 技术与运营架构
        blocks:
          - type: paragraph
            body: >
              Qonto 技术栈分为六层，从面向客户的界面一直到云和合规基础设施。最上层是基于浏览器的网页应用和 iOS/Android 移动应用，前端采用 React，在所有运营市场以六种语言交付 Qonto 产品。下一层是
              Qonto 自有 REST API（文档位于 developer.qonto.com），开放 50+ 个端点，使用 OAuth 2.0 认证和版本化发布，使第三方集成和企业自动化不必为现有 API
              使用者引入破坏性变更。

              架构核心是 Qonto 自研核心银行系统（CBS），自 2019 年起内部建设，不依赖银行即服务（BaaS）中间件供应商。CBS
              处理完整交易生命周期：账户账本管理、余额计算、付款发起和对账。这套自研设计消除了新银行竞争对手常见的一类第三方基础设施依赖，也让 Qonto 能按自己的节奏迭代核心金融产品功能。在 CBS 之上，Qonto
              的支付通道层连接 SEPA Instant（ECB 网络）、SEPA Credit Transfer、国际转账用 SWIFT，以及用于发卡和处理的 Mastercard 卡组织。公司未公开披露用于
              Mastercard 授权和清算的具体发卡处理器。

              云基础设施完全由 Amazon Web Services（AWS）提供，这一点由 AWS 的 Qonto 案例研究确认。Qonto 在符合 GDPR 数据驻留要求的欧盟 AWS
              区域运行工作负载，并采用多可用区部署。Qonto 的 StackShare 资料确认后端使用 Ruby on Rails，主数据库为 PostgreSQL，监控使用 Datadog。专用数据和 AI
              层处理交易分类、欺诈检测、支出分析，以及 AI 驱动的发票 OCR。最后，合规层覆盖 ACPR 批准的 AML/CFT 方案、第三方 KYC 服务商（未公开命名）和 GDPR 合规数据处理流程。KYC
              服务商依赖是高风险集中点：该服务商任何中断都会直接叫停 Qonto 的新客户开户流程。
