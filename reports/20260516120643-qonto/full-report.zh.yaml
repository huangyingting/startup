      - number: '2.3'
        title: 买方与用户分群
        blocks:
          - type: paragraph
            body: >
              Qonto 的客户基数可分为四个主要队列；每个队列的预算归属、决策周期和采用驱动因素都不同。

              自由职业者和微型创业者（0 名员工）：按客户数看，这是 Qonto 最大的客群；公司沟通显示，其约占 Qonto 600,000 名客户的 50%。预算归个人业主或 auto-entrepreneur
              所有。基础商业银行月度支付意愿为 €0–20，因此 Basic 套餐（€9/月）是主要转化点。切换成本低（无工资、IBAN 变更少），但惯性强；部分市场在位银行提供免费基础账户（如 La Banque
              Postale、ING 免费账户）。采用路径是数字原生开户、社交推荐，以及与单人自由职业工具（法国的开票、Urssaf 缴款）集成。

              微型企业（1–10 名员工）：Qonto 的成长客群，需求更复杂，包括多人账户、团队成员发卡、费用审批和 VAT 管理。预算由创始人 / 业主经理掌握。月度支出通常为
              €19–39。核心痛点是：在位银行把这类企业打包进通用 SMB 产品，缺少 Qonto 提供的 UX 质量。采用路径包括来自自由职业者客群的口碑、懂金融科技的创始人社群和会计师推荐。

              SMB（10–250 名员工）：单账户收入更高（€39–150+/月，含附加模块），销售周期更长，采购把关更多。预算由 CFO / 财务经理和 CEO 共同掌握。关键决策因素包括会计集成质量（德国的
              DATEV、法国的 FEC）、多实体支持和团队费用流程。采用约束是：在位银行的信贷关系形成锁定效应。Qonto 收购 Regate（2024 年 3 月）正是为了服务该队列的会计复杂性。

              创业公司和规模化公司（50–250 名员工，VC 支持）：通常是 Qonto 最主动发声的拥护者，VC 投资人要求和加速器推荐推动采用。财务决策由 CFO 或 Head of Finance
              做出。它们需要多币种支持、更成熟的费用管理，以及与司库工具集成。月度 ARPU 可超过 €200+。IPO 或被收购后，更大银行重新进入对话，流失风险更高。

              预算归属：所有客群中，主账户决策者都是创始人 / CEO 或 CFO，而不是专职 IT 买方。因此，Qonto 更像产品驱动增长获客，而不是企业销售动作；这也与其“30 分钟内”数字开户说法一致。在几乎所有 50
              人以下客群中，付款者（支付账单的人）就是用户（开户的人）。
