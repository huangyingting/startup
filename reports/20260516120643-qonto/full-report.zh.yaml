  - id: TM004
    title: 增长驱动因素与采纳约束
    columns:
      - 因素
      - 类型
      - 机制
      - 影响
      - 证据
    rows:
      - - 欧盟即时支付法规（IPR 2024）
        - 驱动因素
        - 要求 PSP 在 2025 年 1 月 / 10 月前提供 SCT Inst；削弱既有银行速度优势
        - 高
        - Regulation (EU) 2024/886；EPC SCT Inst 方案；ECB 即时支付追踪器
      - - PSD2 / 开放银行
        - 驱动因素
        - 要求银行账户开放 API；让 TPP 能做账户聚合和支付发起
        - 中
        - PSD2 Directive 2015/2366；EBA 关于 SCA 的 RTS；finance.ec.europa.eu
      - - 数字原生中小企业创始人（代际变化）
        - 驱动因素
        - 千禧一代 / Gen-Z 创始人期待移动优先 UX、即时通知；排斥网点银行
        - 高
        - Statista 数字银行市场分析；Revolut Business 每月新增 30k+ 企业
      - - SEPA Instant 增长轨迹
        - 驱动因素
        - 在监管推动情景下，SCT Inst 在 SEPA CT 中的占比预计到 2027 年达 45%
        - 中
        - McKinsey Global Payments Report 2023；ECB SCT Inst 指标
      - - 相对既有银行的信任差距
        - 约束
        - 既有银行积累了数十年品牌信任；针对挑战者的法院裁决会放大风险感知
        - 高
        - 2025 年 6 月巴黎法院对 Qonto 的裁决；2021 年 N26 监管处罚
      - - 信贷牌照缺口（支付机构 vs. 银行）
        - 约束
        - 支付机构不能吸收存款，也不能发放资产负债表内信贷；需要完整银行牌照
        - 高
        - ACPR 牌照分类；Qonto 2025 年 7 月提交银行牌照申请
      - - 切换成本（薪资、会计、IBAN）
        - 约束
        - 迁移银行账户要更新薪资、依赖 IBAN 的授权和会计集成
        - 中
        - 行业切换成本文献；观察到的留存指标
      - - DORA 合规负担（自 2025 年 1 月起）
        - 约束
        - EU DORA（Regulation (EU) 2022/2554）要求建立 ICT 风险管理框架；挑战者承担的负担更重
        - 中
        - EBA DORA 指引；finance.ec.europa.eu 数字金融概览
    claimRefs:
      - CM022
