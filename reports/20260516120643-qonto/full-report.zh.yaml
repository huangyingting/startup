      - number: '1.3'
        title: 融资历史与估值
        blocks:
          - type: paragraph
            body: >
              Qonto 已在 2017–2022 年披露的五轮融资中累计获得约 €622M 新股融资。公司 2017 年 1 月先从 Alven Capital 和 Valar Ventures 获得 €1.6M
              种子轮，随后在 2017 年 7 月完成 €10M Series A，2018 年完成约 €20M Series B，2020 年 1 月完成 €104M Series C，战略投资者 Tencent
              加入，老股东继续跟投。关键的 Series D 于 2022 年 1 月完成，募资 €486M，估值 €4.4B（按当时汇率约 $5B），使 Qonto
              成为欧洲估值最高的金融科技公司之一，并为持续欧洲扩张和产品投入提供资本底座。

              Series D 由 Tiger Global 和 TCV 领投，Alkeon Capital、DST Global、Eurazeo、KKR、Insight Partners、Exor Seeds 和
              Gaingels 以及既有投资者参投。Valar Ventures、Alven Capital、Tencent 和 European Investment Bank 仍是早期轮次留下的股东。截至 2026 年 5
              月，没有进一步新股融资获得确认；Series D 之后也没有公开报道老股交易或已披露债务额度。€4.4B 估值来自 2022 年 1 月；没有新一轮新股融资或披露的老股交易，当前隐含估值无法确定。累计融资
              €622M 得到 Qonto 官方 LinkedIn 页面和 Qonto 新闻页面共同确认。
