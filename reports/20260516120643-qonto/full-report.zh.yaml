      - number: '7.6'
        title: 人员、执行风险与缓释框架
        blocks:
          - type: paragraph
            body: >
              除核心监管和运营风险外，Qonto 还要同时推进五项高强度任务：银行牌照申请、DORA 合规、EU AI Act 落地、地域扩张，以及把 CBS 从 600K 客户扩到可能
              1M+。两位创始人集中掌舵，这使执行带宽风险格外突出。


              关键人风险缓释：未披露继任计划，Prot 和 Anavi 之下也没有公开具名的高管层，是治理缺口。投资人尽调应索取完整高管组织架构、关键人保险安排、董事会构成，以及关键工程和合规岗位的留任协议。


              DORA 缓释：Qonto 2024 年在 CBS 韧性文档和事件响应工具上的投入（据公司沟通）显示已有进展，但 DORA 合规成熟度最终要看 ACPR 的独立评估。尽调应索取 ICT 风险台账、第三方 ICT
              供应商清单和渗透测试计划。


              监测指标：ACPR 银行牌照申请状态（ACPR 确认受理、正式审查阶段）；公开状态页上的 CBS 故障时长指标；CNIL 执法登记中是否提及 Qonto；ACPR 年度支付机构行为公开报告里的欺诈事件统计；以及
              Revolut Business 在法国的市场份额数据。


              投资逻辑失效触发点：(1) ACPR 拒绝银行牌照申请；(2) CBS 故障超过 4 小时，触发 DORA 重大事件程序和监管审查；(3) ACPR 在银行牌照审查期内因 AML、DORA
              或治理缺陷采取执法行动；(4) 第二起重大欺诈法院判决暗示欺诈控制系统性失灵；(5) Qonto 以低于 €2.5B 估值为银行牌照资本进行降价融资。
