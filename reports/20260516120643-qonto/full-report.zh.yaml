  - number: 7
    title: 风险
    sections:
      - number: '7.1'
        title: 风险概览与严重性矩阵
        blocks:
          - type: paragraph
            body: >
              Qonto 2026 年 5 月的风险画像相较典型 Series D SaaS 公司更高，原因是三项监管投资计划同时叠加（2025 年 1 月起的 DORA 合规、2026 年 8 月前 EU AI Act
              高风险 AI 义务、以及 2025 年 7 月银行牌照申请），同时还要管理一家融资 €622M、在 8 个欧盟国家规模化运营的支付机构自身运营风险。


              最高严重性风险是 ACPR 银行牌照申请。如果被拒或延迟 24+ 个月，Qonto 将继续只是支付机构，不能提供有保险保障的存款或表内贷款，与 Revolut Bank
              和传统银行的产品差距会扩大。银行牌照获批还需要额外筹集 €100M–€300M 资本，在金融科技估值被压缩的环境中形成重大融资事件。


              第二高严重性风险是 CBS 运营故障。Qonto 完全自研的内部核心银行系统没有供应商备用方案。CBS 全面宕机会同时影响 8 个国家的全部 600,000+ 客户，恢复完全依赖内部工程。在 DORA 下，重大
              CBS 宕机会触发 4 小时内向 ACPR 报告的义务，并可能升级为监管关注。


              法律和监管风险锚定在 2025 年 6 月法院判令 Qonto 因 2023 年欺诈事件向 French Modern Pentathlon Federation 赔付 €672,139。相对 Qonto
              收入规模，金额不重要，但该判决为支付机构在社会工程欺诈中承担责任立下法律先例，并在法国专业群体中制造声誉风险。


              财务风险包括 Series D €4.4B 估值（2022 年 1 月）被压缩；该估值形成于金融科技倍数峰值，而可比公司倍数已压缩
              40–60%。欧盟监管压缩交换费，以及受保障存款的利率风险，是次要财务风险因素。来自 Revolut Business 的竞争风险真实存在，但考虑到 Qonto 已扎根的 600K+
              客户基础和法国市场领导地位，仍可管理。
