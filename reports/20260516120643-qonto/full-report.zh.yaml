      - number: '2.2'
        title: 市场规模测算：TAM / SAM / SOM
        blocks:
          - type: paragraph
            body: >
              三种互补视角指向一个大体可信的市场规模区间，但不同估算会因地理范围、收入线纳入方式和数据新旧而明显分歧。

              视角 1 —— 自下而上的收入池：对 2600 万家欧盟 SMB 套用平均混合单户收入约 €600–900/年（订阅 + 交易费，不含信贷），得到仅手续费 TAM 约
              €16–23B/年。加入信贷和浮存收入后，规模扩大至 €25–35B。该视角把每一家欧盟 SMB 都视为可触达，因此会高估一家仅覆盖 8 国的数字优先挑战者的近期机会。

              视角 2 —— 自上而下的市场研究：McKinsey 2023 Global Payments Report 指出，EMEA 地区支付收入以两位数速度增长，并预计即时支付驱动的增长将在 2027 年前抬升
              SEPA 交易量。Mordor Intelligence 和 Grand View Research 的专项报告（研究期间无法完整获取）曾给出欧洲数字银行市场 €8–15B 的规模区间，针对 SMB
              服务。Statista 的新银行市场展望估计，按 NII 口径，全球新银行收入到 2026 年将达到 $1.66T，欧洲约占 15–20%，隐含欧洲新银行 NII 约
              $250–330B；但该口径合并了消费者和企业板块。

              视角 3 —— Qonto 活跃市场的国家级拼接：法国（约 400 万家 SMB，约 €5B 可触达）、德国（约 350 万家 SMB，约 €4B）、意大利（约 360 万家 SMB，约 €4B）、西班牙（约
              330 万家 SMB，约 €3.5B）。仅这四个市场就指向约 €12–16B 的 SAM。若采用 20–25% 的现实数字优先渗透率上限，并考虑 Qonto 当前在法国本土市场约 2% 份额，则 Qonto 主要
              4 个市场成熟期的隐含 SOM 约为每年 €1–2B 手续费收入——与 Qonto 当前估计 €200M+ ARR 的 5–10 倍收入扩张一致。

              市场增长：多方来源相互印证，2023–2028 年欧洲 SMB 金融科技 CAGR 为 15–20%。McKinsey 预计 EMEA 整体支付收入到 2027 年 CAGR 为 6–8%；SMB
              数字银行板块因基数低，增速高于平均水平。欧盟即时支付条例（Regulation (EU) 2024/886，2024 年 4 月生效）要求所有欧元区 PSP 在 2025 年 1 月（信贷机构）和 2025 年
              10 月（EMI/PI）前提供即时贷记转账——这是结构性顺风，降低 Qonto 这类主张相对在位批处理基础设施的摩擦。SEPA Instant Credit Transfer（SCT Inst）自 2017 年
              11 月起运行；若监管机构按 McKinsey 基准情景推进全面采用措施，SCT Inst 在 SEPA 贷记转账总量中的占比预计可达到 SEPA 每年 23B 笔交易的 45%。

              相互矛盾的估算说明：Mordor Intelligence 和 Grand View Research 报告（均无法完整获取）以及分析师对其工作的摘要，给出的欧洲数字银行 TAM 标题数字从 €8B 到
              €40B+ 不等，取决于是否纳入 SMB 信贷、消费者数字银行和嵌入式金融。这些估算被保留为图 FM002 中的区间带，而不是压缩为单一中点。
