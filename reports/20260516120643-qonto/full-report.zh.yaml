        - 无 FGDR 存款保险；客户暴露于破产风险
      - - 云基础设施
        - 未披露超大规模云厂商（可能是 AWS / GCP / Azure）
        - 承载所有 Qonto 服务的 CBS 和应用
        - 未知 —— 未披露单区域还是双区域部署
