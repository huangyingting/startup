      - number: '1.4'
        title: 关键指标与规模
        blocks:
          - type: paragraph
            body: >
              截至 2026 年 5 月，Qonto 报告在 8 个欧洲国家拥有 600,000+ 家企业客户；qonto.com 的 About、Trust 和 Press
              等多个官方页面均可确认。公司还通过集成的公司注册服务帮助 250,000 名创业者完成公司设立。Qonto 的净推荐值（NPS）为 70+，公司称其位居欧洲银行业最高水平之列。Trustpilot 评分为
              4.8/5，Qonto 首页直接引用。员工数在 1,600–1,700 人之间（About 页面称 “1,700 strong”，Press 页面截至 2026 年 5 月称 “1,600+”）。

              收入数据直到 2025 年 7 月才由公开渠道确认，当时 CEO Alexandre Prot 在一场新闻发布会上披露 Qonto 已于 2023
              年盈利，早于原定目标。公司尚未发布具体收入数字；专业金融科技媒体曾引用 2024 年 €200M+ ARR，但该数字未通过官方文件或新闻稿独立验证。Qonto 官方 About 页面称，其借贷产品累计提供融资资本
              €100M。公司是法国 Next40 最具潜力创业公司指数成员。2025 年 7 月，Qonto 向 ACPR 申请完整银行牌照（établissement de crédit）；这是一个多年流程，目标是让
              Qonto 直接提供信贷、储蓄和投资产品。公司未公开披露 IPO 时间表。
