      - number: '7.4'
        title: 合作伙伴与依赖风险
        blocks:
          - type: paragraph
            body: >
              Qonto 有五项构成集中风险的关键外部依赖：Mastercard（卡网络）、客户资金保障银行（Crédit Mutuel Arkéa、Société Générale、Natixis、Rothschild
              Martin Maurel）、云基础设施（未披露超大规模云厂商）、ACPR（监管审批机关）以及支付担保提供方（Crédit Agricole CIB、BNP Paribas）。


              Mastercard 依赖是严重性最高的伙伴风险。Qonto 的全部卡支付基础设施——借记卡和信用卡、非刷卡交易、支出控制，以及 8 个欧盟市场的发卡——都完全依赖
              Mastercard。合同条款不公开；若终止或重新谈判显著不利，Qonto 需要 12–24 个月紧急迁移。鉴于 Qonto 的规模，Mastercard 有财务动机维持关系，但任何谈判中权力不对称都偏向
              Mastercard。


              客户资金保障银行依赖是分散但真实的。按 PSD2，客户资金在四家银行隔离保护。若系统性事件同时影响两家或更多保障银行，客户资金可能在银行处置程序期间暂时不可用。关键在于，这些资金不受 FGDR
              存款保险覆盖，形成客户层面的破产风险；没有银行牌照就无法修复。


              云基础设施风险不透明。Qonto 未披露云服务商。根据 DORA，Qonto 必须向 ACPR 登记关键 ICT 第三方提供商，并维持集中风险监控。若超大规模云厂商宕机影响 Qonto 的主云区域，CBS
              可用性会立即受影响。该尽调缺口需要 Qonto 管理层直接披露。
