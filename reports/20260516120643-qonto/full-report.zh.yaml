  - id: TV005
    title: 投资逻辑破裂与否决触发条件表
    layout: standard
    columns:
      - 触发项
      - 阈值
      - 对投资逻辑的影响
      - 建议行动
    rows:
      - - ACPR 银行牌照被拒
        - ACPR 发布正式拒绝通知
        - 主要上行催化消失；收入天花板被压住；€3B 以上 IPO 案例不再成立
        - 下调至回避；要求数据室披露战略退出情景
      - - 经审计收入低于预期
        - FY2024 经审计 ARR 低于 €300M（比声称的 $500M 低 >35%）
        - 削弱基准估值；意味着 ARR 倍数压缩至 3× 以下；大概率降轮
        - 下调至回避；若能以高于悲观情景的任何价格获得流动性，则退出持仓
      - - 新股融资降轮
        - 新股融资投后估值 <€3B
        - Series D 投资者面临按市值计价亏损；是否触发估值调整 / 反稀释条款，取决于具体条款
        - 下调至继续研究；结合更新后的股权结构表和清算优先权瀑布重估投资逻辑
      - - Revolut 欧盟中小企业市占率 >25%
        - Revolut 欧洲企业客户数超过 1.5M（Qonto 同量级市场领导地位承压）
        - 竞争护城河削弱；获客成本上升；流失风险增加
        - 密切观察；如果核心市场 CAC 上升 >20%，下调建议
      - - 关键人物离任
        - CEO Alexandre Prot 或总裁 Steve Anavi 离任，且没有规划好的继任安排
        - 投资者信心和产品连续性承压；IPO 前治理疑问加剧
        - 下调至继续研究；就继任规划与管理层沟通
    notes: |
      触发条件基于公开证据，以及对已披露风险因素的合理推断。阈值仅供说明；实际影响取决于触发事件发生时的精确股权结构条款（未公开披露）和市场环境。
    claimRefs:
      - CV017
      - CV024
      - CV029
      - CV032
      - CV033
      - CV041
  - id: TV006
    title: 最终尽调要求表
    layout: wide
    columns:
      - 主题
      - 缺失证据
      - 为何重要
      - 尽调路径
    rows:
      - - 经审计财务报表
        - FY2023 和 FY2024 经审计 IFRS 损益表、资产负债表和现金流量表
        - 目前没有公开的经审计财务报表；ARR、EBITDA 利润率和盈利说法都来自 CEO 表述；若出现重大缺口，估值需要重置
        - 在数据室索取；确认 FY2023「盈利」口径前后一致（EBITDA、净利润还是经营利润），并有审计师签字确认
      - - 股权结构表与清算优先权瀑布
        - 完整股权结构表，按轮次列出持股比例、清算优先权金额、反稀释条款和 Series D 条款清单
        - 优先权结构不明，若以低于 Series D 价格退出，退出价款可能大多被优先权吃掉；参与分配权还会进一步压低普通股东价值
        - 向法律顾问索取各情景（基准 / 乐观 / 悲观）的条款清单和股权结构模型
      - - 银行牌照状态
        - ACPR 往来函件、初步评估函、牌照获批的未决条件
        - 银行牌照是乐观情景的主要催化剂；牌照被拒或延迟 3+ 年，是悲观情景的主要触发因素；除 2025 年 7 月申请日期外，当前状态并不透明
        - 索取监管往来函件；通过持牌法律顾问直接沟通 ACPR；核查 ACPR 公开登记册
      - - ARR 构成与留存
        - 按订阅档位（Basic/Smart/Premium）、国家和收入线（订阅、交换费、浮息）拆分 ARR；NRR 或总收入留存指标
        - 订阅 ARR 的耐久性不同于交换费 ARR；地理集中度会改变风险；NRR 决定相对纯 SaaS 可比公司的估值溢价或折价
        - 索取管理账，包含 ARR 瀑布、队列留存数据，以及按档位和国家拆分的流失率
      - - 债务与信贷额度
        - 用于支持放贷账簿的任何信贷额度、资产支持融资、EIB 贷款条款或表外结构
        - 如果 Qonto 延展信贷产品，资金结构会影响资本充足率和风险画像，也关系到银行牌照评估
        - 索取包含完整负债拆分的资产负债表；确认 EIB 融资条款和契约结构
    notes: |
      这是把建议从观察上调为买入前所需的最低尽调。还建议进一步尽调客户集中度（前 20 大账户占 ARR 比例）、欺诈 / AML 控制框架（Pentathlon 判决后）以及高管薪酬 / 归属结构。
    claimRefs:
      - CV004
      - CV006
      - CV016
      - CV017
      - CV029
      - CV033
      - CV034
