  - id: FV001
    title: 建议逻辑
    type: flow
    summary: 从 Qonto 的规模、验证点、风险和估值背景，推导至观察建议及上调/下调触发因素的链条。
    data:
      nodes:
        - id: scale
          label: 规模与验证
          detail: 600K+ 欧盟 SMB 客户；2023 年确认盈利；NPS 70+；ACPR 监管覆盖 8 国
        - id: risk
          label: 关键风险
          detail: 2022 年 €4.4B 估值已陈旧；无经审计财务；银行牌照未决；关键人物集中度高
        - id: comps
          label: 估值背景
          detail: Wise 为 5–7× 收入；上市可比公司压缩 40–60%；基准情景公允价值 €2.5–3.5B（6–8× ARR）
        - id: gaps
          label: 信息缺口
          detail: 无公开 IFRS 文件；ARR 仅为公司声称；优先权瀑布未披露；牌照状态不透明
        - id: recommendation
          label: 观察
          detail: 投资逻辑有吸引力，但关键数据缺口和上轮价格已过时，削弱买入确信度；继续观察上调触发因素
        - id: upgrade
          label: 上调至买入的触发因素
          detail: 经审计 ARR ≥€400M + 银行牌照进展 + 入场价格 ≤€3B
        - id: downgrade
          label: 下调至回避的触发因素
          detail: 牌照被拒 + 降价轮新股融资 + 经审计收入低于公司声称
      edges:
        - from: scale
          to: recommendation
          label: 支撑
        - from: risk
          to: recommendation
          label: 约束
        - from: comps
          to: recommendation
          label: 锚定价格
        - from: gaps
          to: recommendation
          label: 限制确信度
        - from: recommendation
          to: upgrade
          label: 通向买入
        - from: recommendation
          to: downgrade
          label: 通向回避
    claimRefs:
      - CV007
      - CV009
      - CV024
      - CV033
  - id: FV002
    title: 估值敏感性条形图
    type: bar
    summary: 在 3× 到 12× ARR 收入倍数下，Qonto 隐含企业价值（€B），以约 €460M 基准 ARR 锚定。
    data:
      items:
        - label: 3× ARR（悲观底部）
          value: 1.4
          unit: €B
          note: 代表严重倍数压缩情景；悲观情景下限
        - label: 4× ARR（悲观情景）
          value: 1.8
          unit: €B
          note: 牌照被拒、Revolut 抢份额情景
        - label: 6× ARR（基准低位）
          value: 2.8
          unit: €B
          note: Wise 区间倍数；基准情景公允价值下沿
        - label: 7× ARR（基准中位）
          value: 3.2
          unit: €B
          note: 基准情景中枢估计；Wise 5–7× 中点叠加欧盟护城河溢价
        - label: 8× ARR（基准高位）
          value: 3.7
          unit: €B
          note: 基准情景上沿；Monzo 和 Starling 老股交易可比项支撑
        - label: 10× ARR（乐观情景）
          value: 4.6
          unit: €B
          note: 银行牌照获批；IPO 溢价；需要确认盈利和增长
        - label: 12× ARR（乐观上限）
          value: 5.5
          unit: €B
          note: 接近 Series D 价格平价；需要银行牌照 + >25% ARR 增长
    approximationNotes: |
      €460M ARR 基准来自公司声称的 $500M，并按 EUR/USD 1.09 折算。所有企业价值估计均不计净债务、现金和优先权调整。实际企业价值在应用优先权瀑布后可能不同于股权价值。
    claimRefs:
      - CV007
      - CV019
      - CV020
      - CV021
  - id: FV003
    title: 估值 / 回报区间
    type: range
    summary: Qonto 2026 年乐观/基准/悲观企业价值区间，以可比倍数和 ARR 估计锚定。
    data:
