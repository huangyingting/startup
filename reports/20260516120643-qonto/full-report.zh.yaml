  - number: 5
    title: 产品与技术
    sections:
      - number: '5.1'
        title: 产品定义与客户工作流
        blocks:
          - type: paragraph
            body: >
              Qonto 将自身产品定义为专为欧洲 SMB
              和自由职业者设计的一体化财务管理平台。它不是通用银行账户，而是围绕小企业主的日常运营工作流搭建：支付供应商、管理团队费用、创建并发送发票、核对账务、获得短期信贷。客户旅程从开户开始，SMB
              或自由职业者可在线开通企业账户，并在 5 分钟内获得专属欧洲 IBAN，绕开法国和德国传统银行在网点流程与纸质材料下通常需要的 2-4 周。

              开户完成后，典型 SMB 的主工作流形成一个结构化闭环。企业账户是中心枢纽，实时接收存款和收到的 SEPA 转账，并通过即时通知提醒。对外付款可通过 SEPA Instant（10 秒内完成）、标准 SEPA
              Credit Transfer 或面向国际供应商的 SWIFT 发起，全部从 Qonto 网页端或移动应用完成。团队费用通过按员工发行的实体或虚拟 Mastercard
              商务卡管理；财务经理可以为每张卡设置支出限额、即时冻结或解冻，并通过移动 OCR 捕捉票据，省掉小团队常见的共享单卡和纸质收据流程。

              在开票环节，Qonto 提供经认证的欧盟电子发票（PDF、UBL、Factur-X 格式），符合法国 B2B 电子发票强制要求和意大利 SDI 系统。自由职业者和 SMB
              可以直接在应用内开具发票，并自动发送付款提醒。会计对账通过与 DATEV（德国）、Pennylane（法国）、Sage、Exact、QuickBooks 的直接集成完成，所有交易自动分类；典型 SMB
              的月度对账时间从估计 8-16 小时压缩到 2 小时以内。客户工作流最新加入的是 Qonto Credit，符合条件的 SMB 可直接从 Qonto
              账户获得延后付款、定期贷款和收入型融资，在不离开平台的情况下完成财务流程。
