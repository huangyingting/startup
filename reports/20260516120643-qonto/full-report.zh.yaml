      - number: '3.3'
        title: 功能与能力比较
        blocks:
          - type: paragraph
            body: >
              在针对六个竞争者评估的八项关键产品能力中，Qonto 以最广的 SME 专属功能深度领先竞争集合。多人角色管理（支持自定义消费限额、按用户发卡和审批流程）在 Qonto 和 Revolut Business
              上完整可用，但 N26 Business 不提供，Wise Business 和 Holvi 仅部分可用。对于 Qonto 的目标客群——5 到 50
              人、需要下放财务权限又不失去监督和控制的公司——这一能力具有结构性重要性。

              SEPA Instant 转账在 Qonto（2026 年 5 月确认）、Revolut Business（已确认）和 Memo Bank（已确认）可用，但在 N26 Business 和 Holvi
              上可用性不一致。相对 Qonto，多币种账户是 Revolut Business 和 Wise Business 的明确差异化点；尽管 Qonto 提供部分多币种功能。这是 Revolut Business
              保持结构性优势的领域之一。

              在会计集成，尤其是德国 DATEV 生态和法国 Pennylane 上，Qonto 以 4,791 个有记录的集成领先竞争集合。公开资料显示，没有直接竞争者匹配这一广度或深度。Qonto
              也是其直接竞争集合中唯一在全部 8 个运营国家提供欧盟认证电子发票的提供商；随着法国、德国、意大利和西班牙等国家电子发票强制要求扩展，这一能力越来越重要。

              Qonto、Revolut Business 和 Wise Business 提供完整文档的 API 访问；N26 Business 和 Memo Bank 仅部分提供或无文档，Holvi 则缺失。实体
              Mastercard 和 Visa 卡在所有六家被评估提供商中普遍可用，说明发卡已成为商品化功能。柱状图（FP002）比较竞争集合的功能总数，确认 Qonto 以 10 项评估能力中的 9 项领先，Revolut
              Business 为 8 项，Wise Business 为 6 项，N26 Business 和 Memo Bank 各为 5 项。
