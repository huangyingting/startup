  - number: 2
    title: 市场分析
    sections:
      - number: '2.1'
        title: 市场定义与边界
        blocks:
          - type: paragraph
            body: >
              Qonto 的核心市场是面向 SMB（欧盟定义为员工少于 250 人、年营业额低于 €50M 的企业）和自由职业者（自雇个人、微型创业者）的商业银行服务。欧盟范围内约有 2600 万家这类企业，其中约 2300
              万家是微型企业（0–9 名员工）。仅法国就约有 400 万家 SMB 和自由职业者，这与 Qonto 聚焦本土市场一致。

              市场边界内的支出包括：（1）商业账户订阅费；（2）国内与国际支付费用（SEPA、SWIFT）；（3）银行卡交换收入；（4）信贷产品（透支、先买后付、定期贷款）；（5）增值 SaaS
              模块（开票、费用管理、会计自动化）；（6）客户存款产生的浮存 / 利息收入。把在位者和挑战者合并计算，这些收入池估计每年在欧盟产生 €25B+ 可触达手续费收入。

              主边界外包括：零售 / 消费者个人账户、大型企业（>250 名员工）公司司库管理、投资银行和资本市场、保险，以及面向个人的纯 FX / 汇款服务。与主边界相邻、且对 Qonto
              扩张路线有意义的领域包括发票融资、面向 SMB 的 FX、商业保险和 B2B 支付基础设施（嵌入式金融）。这些相邻领域代表可观的后续可触达收入，但需要额外牌照（尤其是完整银行牌照，Qonto 已于 2025 年
              7 月申请）。

              主要现状替代方案有：（a）传统在位银行（BNP Paribas、Société Générale、Deutsche
              Bank、Commerzbank、Unicredit、ING、BBVA、Santander），合计服务超过 90% 的欧盟 SMB，并对基础商业活期账户收取
              €30–100/月；（b）会计驱动平台（Sage、QuickBooks、Pennylane），可复制开票和费用管理，但不提供核心银行服务；（c）独立费用工具（Spendesk、Pleo、Expensify），叠加在既有银行账户之上。核心切换壁垒是多边的：更换主商业银行账户，需要迁移工资授权、更新供应商
              IBAN、迁移会计集成，并且可能重新申请信贷额度。
