      - number: '2.4'
        title: 增长驱动与采用约束
        blocks:
          - type: paragraph
            body: >
              影响欧洲 SMB 新银行采用的结构性力量，是监管催化、人口代际变化和技术赋能的组合；信任壁垒、信贷限制和合规成本则形成抵消。

              关键增长驱动包括：

              PSD2 与开放银行：欧盟 Payment Services Directive 2（PSD2，Directive 2015/2366）自 2018–2019
              年在欧盟成员国落地，要求银行账户数据向持牌第三方提供商（TPP）开放 API，支持账户聚合和支付发起服务。尽管 TPP 驱动的 PSD2 服务采用慢于预期（EBA 指出 API
              落地仍有摩擦），监管框架已永久降低金融数据获取成本，并强化 Qonto 这类支付机构的监管合法性。

              欧盟即时支付条例（IPR）：Regulation (EU) 2024/886 于 2024 年 4 月 9 日生效，要求所有欧元区 PSP 必须提供即时欧元贷记转账。首个合规期限（2025 年 1
              月）要求信贷机构发送和接收 SCT Inst；2025 年 10 月期限将要求扩展至 EMI 和 PI。这会在速度上让挑战者与在位者基础设施拉平，移除传统在位优势。

              数字原生 SMB 创始人：企业管理转向数字优先的代际变化正在加速。Millennials 和 Gen Z 创始人期待移动优先银行 UX、实时通知、API
              集成和即时开户——这些都不是传统网点能交付的。Statista 的 Digital Banks 市场分析确认，这是全球新银行增长的主要驱动因素。

              SEPA 协调：SCT Inst 自 2017 年推出以来逐步增长；McKinsey 预计，在监管友好情景下，SCT Inst 到 2027 年可达到 SEPA 贷记转账的 45%。Qonto 已经签发欧洲
              IBAN 并提供 SEPA Instant，因此与在位银行具备完整基础设施平权。

              关键采用约束包括：

              信任赤字：新进入者新银行相对拥有几十年品牌历史和存款担保计划的在位银行，存在根本的信任不对称。2025 年 6 月巴黎法院对 Qonto 的裁决（因欺诈失效赔偿 €672K）以及周期性高关注度新银行事件（N26
              2021 年遭监管制裁），都强化了在位银行的信任优势。

              信贷牌照缺口：Qonto 目前是支付机构，不是银行，因此无法用自有资产负债表直接提供信贷。需要透支额度或定期贷款的 SMB，要么转向其他机构，要么使用 Qonto 由合作伙伴出资的先买后付和贷款产品。Qonto
              2025 年 7 月的银行牌照申请正面回应这一缺口，但流程需要 2–4 年。

              切换成本：迁移主商业银行账户，需要更新供应商授权、工资集成、Direct Debit 授权和会计软件连接。对一家 20 人公司来说，这可能需要数周运营投入；即便 NPS 很低，也给在位银行形成结构性护城河。

              DORA 合规负担：欧盟 Digital Operational Resilience Act（DORA，Regulation (EU) 2022/2554）自 2025 年 1 月适用，要求所有金融实体满足
              ICT 风险管理、事件报告和第三方提供商标准。相比已经拥有合规基础设施的在位银行，挑战者金融科技公司的合规成本不成比例地高。

              信贷的资本强度：扩展至发票融资和定期贷款需要大量资本配置和监管批准，在高价值 SMB 关系中抬高竞争成本；这些关系里，信贷是主要锁定产品。
