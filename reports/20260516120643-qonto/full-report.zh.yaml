      - number: '5.2'
        title: 产品模块与资产图谱
        blocks:
          - type: paragraph
            body: >
              截至 2026 年 5 月，Qonto 产品套件由九个独立模块组成，每个模块都瞄准 SMB 财务栈中的具体痛点。核心模块是带专属欧洲 IBAN 的企业账户，在全部 8
              个运营市场（法国、德国、意大利、西班牙、奥地利、比利时、葡萄牙、荷兰）可用，提供实时余额通知，并按照 ACPR 规则隔离保护存款。以此为基础，IBAN 与 SEPA 转账功能覆盖 SEPA Instant
              Credit Transfer（10 秒内）、标准 SEPA Credit Transfer（SEPA SCT）和用于国际付款的 SWIFT；所有付费套餐都支持通过 CSV 批量上传付款。

              所有高于 Basic 单用户档的套餐都按员工发行 Mastercard 商务卡，包含实体卡和虚拟卡，可自定义单卡支出限额、实时冻结和解冻，并集成票据捕捉。费用管理模块在卡基础设施之上叠加审批工作流和自动分类，从
              Smart 套餐（3 用户）起可用。开票和经认证的欧盟电子发票把 Qonto 延伸到应收账款工作流：在全部 8 个市场获得认证，覆盖 PDF、UBL、Factur-X 格式，并自动发送付款提醒。

              薪资模块目前处于增长和 beta 阶段，支持直接从 Qonto 账户发放薪资，并与薪资服务商预留集成接口，但尚未在所有市场完成地域推广。Qonto Credit（2024 年推出）覆盖 SMB
              的延后付款、定期贷款和收入型融资，适用于 10-250 名员工企业，代表公司首次进入表内信贷发放。DATEV、Pennylane、Sage、Exact、QuickBooks 以及 Zapier 自动化等
              4,791 个有记录集成，构成 Qonto 最持久的竞争优势之一。REST API（50+ 端点、OAuth 2.0、webhook 通知）补齐产品图谱，向 Premium 和 Qonto X 套餐订阅者开放，是
              Qonto 开发者生态的基础。
