      - number: '3.4'
        title: 定价与打包分析
        blocks:
          - type: paragraph
            body: >
              Qonto 的价格档位（Basic 每月 9 EUR、Smart 每月 19 EUR、Premium 每月 39 EUR）是欧洲 SME 新银行市场中结构最清晰、可预测性最高的一组。Wise Business
              对所有转账按百分比收费；不同于 Wise，Qonto 在 Basic 套餐中每月包含 20 笔免费 SEPA 转账，并且境内支付不加百分比附加费。Revolut Business
              从受限免费档起步，超过月度额度后按交易收费；不同于 Revolut，Qonto 入门套餐为中等交易量 SMB 提供可预测月度成本。

              Memo Bank 代表价格谱系的极端，入门档每月 250 EUR，反映其完整银行牌照和信贷产品套件；但这也使其主要面向成熟的中端 SMB，而非构成 Qonto 核心市场的早期成长公司。N26 Business
              每月 0 到 9.90 EUR 服务低端市场，但结构上仅限自由职业者，降低了其作为企业 SMB 定价竞争者的相关性。

              Revolut Business、Wise Business 和 N26 Business 等主要竞争者自 2022 年以来都提高了价格或收窄免费档功能，这与新银行行业转向单位经济纪律的大趋势一致。Qonto
              的价格结构适合注重价值的成长阶段 SMB；它们寻求清晰、完整的套餐，而不是菜单式按用量付费模型。完整定价比较矩阵见 TP003。
