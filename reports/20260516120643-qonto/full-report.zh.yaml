      - number: '4.4'
        title: 公开牵引指标与私有指标缺口
        blocks:
          - type: paragraph
            body: >
              Qonto 截至 2026 年 5 月公开确认的指标包括：600,000+ 企业客户（Qonto 新闻页及多个第三方确认）、覆盖 8 个欧洲国家、1,600+ 名员工、4,791 个集成，以及 NPS
              70+。Pay Later 自 2024 年 3 月以来促成 €50M 融资（CEO 2025 年 7 月表述）。公司还通过更广泛的嵌入式融资平台为欧洲企业提供超过 €100M
              融资。收入完全不公开：专业媒体引用的 €200M+ 年经常性收入（ARR）（Finextra 2024、欧洲科技报道）来自 CEO 评论或分析师推断，尚未经过独立审计。从 65,000 名客户（2020
              年初）增长到 220,000 名（2022 年 2 月），再到 600,000+（2025-2026 年），意味着六年 CAGR 约 45-55%，但随着 Qonto
              进入数字化渗透率较低的市场，增速似乎在放缓。尚未公开披露的关键私有指标包括：净收入留存、按套餐档位划分的月度 / 年度流失率、ARPU 趋势、确切 ARR 及增长率、EBITDA 与净利润、按渠道划分的
              CAC、按队列划分的 LTV，以及融资信用损失率。
