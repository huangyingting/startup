              ACPR 银行牌照申请（2025 年 7 月提交）是未来 24 个月 Qonto 最关键的二元风险事件。获批将打开受保存款、资产负债表贷款，并让其在存款保险上与 Revolut Bank 平齐。若被拒，Qonto
