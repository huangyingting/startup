chapter:
  number: 3
  letter: "P"
  title: "Competitors"
  summary: >
    Qonto competes in a three-tier European SME banking landscape: (1) global and pan-European neobanks
    (Revolut Business, N26 Business, Wise Business, Holvi, Shine) that overlap with Qonto's core customer
    segments; (2) purpose-built EU SME banks with full banking licences (Memo Bank); and (3) UK-focused
    challengers (Starling Business, Tide) with no EU presence post-Brexit, plus incumbent universal banks
    (BNP Paribas) that still serve the majority of European SMBs via legacy channels. Qonto leads its
    competitive set on SME workflow depth, EU e-invoicing certification, accounting integrations (4,791
    partners including DATEV and Pennylane), and multi-country EU regulatory footprint across 8 markets.
    Revolut Business is the primary commoditization risk, investing aggressively in SME-specific features
    and reporting strong business account growth. Qonto's core moats are its purpose-built SME UX and
    workflow depth, regulatory infrastructure (ACPR CIB 16958 with EU passporting), accumulated customer
    data and switching costs, and brand equity (NPS 70+, Trustpilot 4.8/5). The credit gap remains
    Qonto's most material structural vulnerability until its 2025 banking licence application completes.

sections:
  - id: "competitive-landscape"
    title: "Competitive Landscape Overview"
    body: >
      The European B2B SME banking market in 2026 is highly fragmented and evolving rapidly. Qonto sits at
      the intersection of three competitor categories: global and pan-European neobanks, purpose-built SME
      banking specialists, and legacy incumbent banks undergoing digital transformation.

      The first tier consists of global and pan-European neobanks including Revolut Business, N26 Business,
      Wise Business, Holvi, and Shine, that compete with Qonto for digital-first SMBs and freelancers. These
      players vary widely in their focus: Revolut Business offers the broadest multi-currency and FX
      proposition; N26 Business is structurally limited to freelancers working under their own name; Wise
      Business is a payments-first platform rather than a full-service bank; Holvi serves micro-businesses
      in a limited geography; and Shine is a French freelancer neobank constrained by its acquisition by
      Societe Generale.

      The second tier includes purpose-built EU SME banks such as Memo Bank, which holds a full French
      banking licence and offers credit products but operates only in France at a significantly higher price
      point than Qonto (from 250 EUR per month vs Qonto's 9 EUR per month).

      The third tier consists of UK-focused challengers (Starling Business, Tide) whose post-Brexit UK
      banking licences confer no EU passporting rights, limiting their relevance in Qonto's core markets
      of France, Germany, Italy, Spain, Austria, Belgium, Portugal, and the Netherlands. Incumbent banks
      (BNP Paribas, Deutsche Bank, Societe Generale) continue to hold the majority of SMB relationships
      by volume but suffer from legacy UX, high fees, and slow innovation cycles that Qonto's product is
      specifically designed to displace. The positioning map below illustrates how each competitor sits on
      axes of SME specialization and overall product depth, confirming Qonto's leadership position on both
      dimensions within the competitive set. Qonto scores highest on both SME focus (x-axis, scored 9/10)
      and product depth (y-axis, scored 9/10), well ahead of Revolut Business (6, 7) and far ahead of
      consumer-first platforms like N26 Business (5, 4) and incumbents like BNP Paribas (3, 8).
    claimRefs:
      - CP001
      - CP002
      - CP003
      - CP004
      - CP005
      - CP006
      - CP007
      - CP008
      - CP009
    figureRefs:
      - FP001

  - id: "neobank-profiles"
    title: "Direct Neobank Competitor Profiles"
    body: >
      Revolut Business is Qonto's most formidable competitor. Founded in 2015 and valued at approximately
      33 billion USD in its 2021 fundraise, Revolut Business offers multi-currency accounts in 25+ currencies,
      strong FX capabilities at low cost, team cards, and expense management. Its primary competitive
      advantages over Qonto are its multi-currency breadth and the scale of its global consumer user base,
      which provides a substantial organic acquisition funnel for business accounts. However, Revolut's
      consumer-first heritage means its SME workflow features remain less deep than Qonto's purpose-built
      offering, particularly in accounting integrations and e-invoicing.

      N26 Business, founded in 2013 and valued at approximately 7 billion EUR, is structurally limited: its
      business accounts are designed exclusively for freelancers and self-employed individuals working under
      their own name. Incorporated companies cannot open an N26 Business account, severely narrowing its
      addressable SME market and removing it as a material competitive threat in Qonto's corporate segment.

      Wise Business (founded 2011, valued at approximately 7 billion GBP at its 2021 IPO) is the leading
      cross-border payments platform for SMBs, serving hundreds of thousands of businesses with best-in-class
      FX rates. However, Wise is not a full-service business bank. It operates on a pay-as-you-go model,
      lacks deep accounting workflow integrations comparable to Qonto's, and does not offer a full-featured
      multi-user team management in all markets.

      Memo Bank (founded 2017, 90 million EUR raised) is a French full-banking-licence SMB bank offering
      credit products, but is France-only and priced at 250 EUR per month for its entry tier, which is
      fourteen times Qonto's Basic plan and limits its addressable market to established mid-market SMBs.
      Holvi (founded 2011, acquired by OP Financial Group in 2016) and Shine (acquired by Societe Generale in
      2020) are further constrained by their corporate ownership structures and geographic limitations.
      Starling Business and Tide are excellent UK-focused challengers but have no EU presence or IBAN
      capability, making them effectively non-competitive in Qonto's 8 operating EU markets. Incumbent banks
      like BNP Paribas offer a full product suite and credit facilities but with legacy UX, high fees, and
      branch-centric service models. See TP001 for the full competitor profile matrix.
    claimRefs:
      - CP001
      - CP002
      - CP003
      - CP004
      - CP005
      - CP006
      - CP007
      - CP008
      - CP009
    tableRefs:
      - TP001

  - id: "feature-comparison"
    title: "Feature and Capability Comparison"
    body: >
      Across eight key product capabilities evaluated for six competitors, Qonto leads the competitive set
      with the broadest depth in SME-specific functionality. Multi-user role management (supporting custom
      spending limits, card issuance per user, and approval workflows) is fully available on Qonto and
      Revolut Business, but unavailable on N26 Business and only partially available on Wise Business and
      Holvi. This capability is structurally critical for Qonto's target segment of companies with 5 to 50
      employees who need to delegate financial authority without losing oversight or control.

      SEPA Instant transfers are available on Qonto (confirmed May 2026), Revolut Business (confirmed), and
      Memo Bank (confirmed), but are inconsistently available on N26 Business and Holvi. Multi-currency
      accounts are a clear differentiator for Revolut Business and Wise Business over Qonto, though Qonto
      offers partial multi-currency functionality. This is one area where Revolut Business retains a
      structural advantage.

      On accounting integrations specifically the DATEV ecosystem in Germany and Pennylane in France Qonto
      leads the competitive set with 4,791 documented integrations. No direct competitor has publicly matched
      this breadth or depth. Qonto is also the only provider in its direct competitive set to offer
      EU-certified e-invoicing across all 8 operating countries, an increasingly important regulatory
      requirement as national e-invoicing mandates expand across France, Germany, Italy, and Spain.

      API access with full documentation is available on Qonto, Revolut Business, and Wise Business, but
      only partially or without documentation on N26 Business and Memo Bank, and absent on Holvi. Physical
      Mastercard and Visa cards are universally available across all six evaluated providers, confirming that
      card issuance has become a commodity feature. The bar chart (FP002) compares total feature counts
      across the competitive set, confirming Qonto's leadership with 9 of 10 evaluated capabilities present,
      ahead of Revolut Business at 8, Wise Business at 6, and N26 Business and Memo Bank at 5 each.
    claimRefs:
      - CP016
      - CP017
      - CP018
      - CP019
    tableRefs:
      - TP002
    figureRefs:
      - FP002

  - id: "pricing-analysis"
    title: "Pricing and Packaging Analysis"
    body: >
      Qonto's pricing tiers (Basic 9 EUR per month, Smart 19 EUR per month, and Premium 39 EUR per month)
      are among the most clearly structured and predictable in the European SME neobank market. Unlike Wise
      Business, which charges percentage-based fees on all transfers, Qonto includes 20 free SEPA transfers
      per month on its Basic plan with no percentage surcharges on domestic payments. Unlike Revolut Business,
      which starts with a restricted free tier and then charges per transaction above a monthly allowance,
      Qonto's entry plan provides predictable monthly costs for SMBs with moderate transaction volumes.

      Memo Bank represents an extreme of the pricing spectrum at 250 EUR per month entry, reflecting its
      full banking licence and credit product suite, but this positions it primarily for established
      mid-market SMBs rather than the early-growth companies that form Qonto's core market. N26 Business at
      zero to 9.90 EUR per month serves the low end but is structurally limited to freelancers, reducing its
      relevance as a pricing competitor for corporate SMBs.

      All major competitors including Revolut Business, Wise Business, and N26 Business have increased their
      pricing or narrowed their free tier features since 2022, consistent with a broader shift in the neobank
      sector toward unit-economics discipline. Qonto's pricing structure is well-positioned for
      value-conscious growth-stage SMBs seeking a clear, comprehensive package rather than a la carte
      pay-as-you-go models. See TP003 for the full pricing comparison matrix.
    claimRefs:
      - CP020
      - CP021
      - CP022
      - CP023
      - CP024
      - CP025
    tableRefs:
      - TP003

  - id: "moat-analysis"
    title: "Moat Durability and Competitive Risk"
    body: >
      Qonto's competitive moats can be evaluated across six dimensions. Its purpose-built SME UX with
      integrated expense management, e-invoicing, and multi-user workflow is currently the strongest single
      differentiator, but faces increasing pressure from Revolut Business's accelerating SME feature
      investment. Qonto's accounting integration depth (DATEV, Pennylane, 4,791+ partners) has the highest
      near-term durability, as no competitor has publicly committed resources to replicating this breadth,
      particularly in the DATEV ecosystem critical to German accountants serving over one million users.

      Qonto's EU multi-country regulatory infrastructure built over 6+ years using its ACPR CIB 16958
      payment institution licence and EU passporting rights constitutes a meaningful barrier to new entrants.
      Replicating an 8-country EU-compliant presence from scratch would require 3 to 5 years and tens of
      millions in regulatory capital. The customer data and switching cost moat is also significant: migrating
      from Qonto to a competitor requires updating payroll IBANs, re-linking accounting software, porting
      direct debit mandates, and retraining finance teams, typically a 2 to 4 week effort for a company with
      5 to 50 employees.

      Qonto's brand equity (NPS 70+, Trustpilot 4.8 out of 5) supports organic acquisition and retention.
      The primary residual risk is Revolut Business's multi-currency advantage and growing SME product
      investment, which could close the workflow depth gap within 18 to 36 months. The credit gap remains
      Qonto's single most material structural exposure: as a payment institution it cannot offer
      balance-sheet lending until its banking licence application completes, which is a 2 to 4 year
      regulatory process. See TP004 for the full risk register and FP003 for quantitative moat indicators.
    claimRefs:
      - CP026
      - CP027
      - CP028
      - CP029
      - CP030
      - CP031
      - CP032
    tableRefs:
      - TP004
    figureRefs:
      - FP003

