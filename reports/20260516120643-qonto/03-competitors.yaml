  - id: "competitor-profiles"
    title: "Key Competitor Profiles: Scale, Funding, Product Scope, and Strategic Direction"
    body: >
      Revolut Business: Revolut was founded in 2015 in the UK and offers business accounts alongside its
      consumer product. As of 2026, Revolut claims 30,000+ new businesses joining per month and has a consumer
      base reported at 45M+ users globally (per Wikipedia and trade press). Revolut's business product offers
      multi-currency accounts (25+ currencies), card issuance, expense management, Revolut Pay (merchant
      acceptance), analytics, and integrations with Xero, Sage, and QuickBooks. It obtained a UK banking
      licence in July 2024 after a three-year process, which unlocks balance-sheet credit products in the UK
      market. In the EU, Revolut operates under a Lithuanian banking licence. Business plans range from Basic
      (£10/month) to Scale (£90/month), with Enterprise pricing for large clients. Its reported secondary-market
      valuation reached approximately $45B in 2024. Revolut's strategic direction is aggressively horizontal:
      expanding across consumer, business, crypto, insurance, and B2B payments simultaneously — making it a
      platform competitor rather than an SMB specialist.

      N26 Business: N26 was founded in 2013 in Berlin and operates as a fully licensed German bank (BaFin
      regulated), with Series E funding and a reported valuation of $9B at peak (2021). N26 Business Smart is
      its core business offering at €4.90/month, featuring unlimited free SEPA transactions, cashback (0.1%),
      and 10 sub-accounts (Spaces). However, N26's most significant structural limitation for the SMB market
      is explicit: the N26 Business account is designed for freelancers and self-employed individuals who work
      under their own name. N26 cannot accommodate company names on accounts, making it effectively irrelevant
      for incorporated SMBs, startups, and limited companies — which represent the majority of Qonto's target
      market. N26 faced BaFin regulatory sanctions in 2021 related to AML compliance; these restrictions were
      lifted but represent a reputational risk. Trustpilot data (39,614+ reviews, 4/5 score) shows recurring
      complaints about account suspensions without explanation.

      Holvi: Holvi is a Finnish payment institution founded in 2011, authorised by the Finnish Financial
      Supervisory Authority (FIN-FSA), and acquired by BBVA in 2016. It operates across the EEA under EU
      passporting. Holvi targets solopreneurs and small teams, combining business banking, invoicing, and
      bookkeeping from a €9/month entry plan. It offers free SEPA transfers (up to 500/month), debit and virtual
      cards, receipt scanning, and bookkeeping. Holvi recently added payments in 18 currencies. BBVA's ownership
      gives Holvi financial stability but limits its ability to innovate independently or raise external capital
      for competitive expansion. Its market footprint is narrower than Qonto's 8-country reach.

      Bunq: Bunq B.V. was founded in 2012 by Ali Niknam in Amsterdam, Netherlands. Bunq holds a full Dutch
      banking licence and offers both personal and business accounts. In 2021, it raised €193M in a Series A
      — the largest in European fintech at the time — at a €1.6B valuation. Bunq has 427 employees (2024) and
      serves the European Economic Area. Its business product offers up to 25 accounts, multi-currency (20+),
      expense management, 50+ bookkeeping integrations, and a strong sustainability branding (eco-friendly focus,
      tree planting per transaction). Bunq requires all business users to hold a personal Bunq account, creating
      a friction point for businesses wanting purely corporate-segregated banking. Its pricing is competitive:
      a free tier for freelancers, with paid plans for additional features. Bunq's strategic direction is
      personal-first, which creates natural tension with Qonto's business-first positioning.

      Wise Business: Wise (formerly TransferWise) is a UK-headquartered global payments platform serving
      700,000+ businesses with £12B in monthly transactions. Wise Business is not a traditional bank but
      provides multi-currency accounts (accepting payments in USD, EUR, GBP, and others), team debit cards,
      batch transfers (up to 1,000 contacts), and accounting integrations. 70% of its transfers arrive within
      20 seconds. Wise's primary value proposition is near-interbank FX rates with transparent fees, making it
      a complement rather than substitute to a primary business bank for most EU SMBs. However, as Wise expands
      its team spend management and account features, the overlap with Qonto's core banking proposition grows.

      Kontist: Kontist is a German mobile banking application for freelancers featuring real-time tax estimation
      and business banking. Operating on Solaris banking infrastructure (a licensed German bank), Kontist offers
      a free tier and paid plans with overdraft facilities. Kontist's differentiator is its embedded tax
      calculation — automatically estimating tax liabilities on each transaction. It is more limited in scope
      than Qonto (freelancer-only, German market) and represents a niche rather than a broad SMB banking threat.
