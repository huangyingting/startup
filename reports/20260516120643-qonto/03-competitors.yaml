artifact: "competitors"
slug: "qonto"
runDate: "2026-05-16"
company:
  name: "Qonto"
chapter:
  number: 3
  title: "Competitors"
  summary: >
    Qonto competes in a tiered landscape: (1) direct neobank peers targeting European SMBs (Revolut Business,
    N26 Business, Holvi, Bunq), (2) multi-market challengers expanding into Europe (Wise Business, Airwallex),
    (3) US-origin entrants with EU ambitions (Mercury, Stripe), and (4) entrenched incumbents (BNP Paribas,
    Société Générale, Deutsche Bank, Commerzbank) that still serve >90% of EU SMBs. Qonto's strongest
    competitive differentiators are its SMB-only focus, localized IBANs (FR/DE/IT/ES), a 4791-integration
    ecosystem anchored by DATEV and Pennylane, and its ACPR payment institution licence with EU passporting.
    The primary threat is Revolut Business, which reports 30,000+ new business signups per month and holds a full
    UK banking licence, enabling credit products Qonto cannot yet offer as a payment institution. N26 Business
    is limited to freelancers working under their own name—a structural constraint that sharply reduces its
    addressable market. Holvi's BBVA ownership constrains independent roadmap execution. Bunq's personal-first
    model and Dutch roots limit SMB-specific depth in Qonto's core markets. The key moat risks are: Revolut's
    aggressive growth trajectory (which could close Qonto's customer-count lead within 1–2 years), the credit
    gap (Qonto cannot offer balance-sheet lending until its banking licence application completes, a 2–4 year
    process), and price commoditization pressure as feature parity between challengers converges. The Penta
    acquisition in 2022 secured the German market, and DATEV integration is a durable, accountant-mediated
    distribution moat that is difficult for non-German-native competitors to replicate.


localEvidence:
  searchQueries:
    - query: "Revolut Business Europe SMB market share customers 2026"
    - query: "N26 Business account freelancer incorporated company name restriction 2026"
    - query: "Holvi BBVA acquisition payment institution features pricing 2026"
    - query: "Bunq business banking licence valuation funding 2026"
    - query: "Wise Business multi-currency payments 700000 businesses 2026"
    - query: "Airwallex EU Netherlands DNB regulated SMB banking 2026"
    - query: "Mercury business banking US only EU expansion 2026"
    - query: "Qonto DATEV integration German accountant distribution moat 2026"
    - query: "European SMB neobank competitive landscape pricing comparison 2026"
    - query: "Qonto banking licence ACPR application credit 2026"
  evidenceGaps:
    - type: "inaccessible-paywall"
      severity: "material"
      topic: "revolut-business-eu-market-share"
      missingEvidence: >-
        Revolut Business does not publicly disclose country-level EU business customer breakdown or specific
        France/Germany market penetration data. The 30,000+ new businesses/month claim is an aggregate global
        figure from Revolut's official marketing page, not broken down by EU country. Exact EU-only growth rate
        is unavailable without internal company data.
      whyItMatters: >-
        Understanding Revolut's France/Germany share specifically is important to assess the direct threat
        to Qonto's core markets, not just global growth competition.
      diligencePath: >-
        Request Revolut Business's country-level customer data in a data room context; alternatively,
        triangulate from app download rankings and market surveys such as Statista or YouGov fintech adoption.
      relatedQuestionRefs:
        - "QP001"
        - "QP026"
    - type: "inaccessible-paywall"
      severity: "moderate"
      topic: "kontist-qonto-integration-status"
      missingEvidence: >-
        Kontist's website and public channels do not confirm the operational integration status with Qonto's
        core platform as of May 2026. It is unclear whether Kontist operates as a fully absorbed Qonto product
        or continues as a standalone application under Qonto's ownership.
      whyItMatters: >-
        Kontist's integration status determines whether its freelancer-market real-time tax feature is available
        to Qonto users or remains a separate competitive offering.
      diligencePath: >-
        Review Qonto's official product release notes, Kontist blog, and German tech press for integration
        updates; request clarification from Qonto's IR/communications team.
      relatedQuestionRefs:
        - "QP021"
  researchQuestions:
    - id: "QP001"
      question: >-
        What is Revolut Business's current market position, user base, and monthly growth rate in Europe
        as of 2026?
      type: "quantification"
      targets:
        - "contentRequirements/1"
      status: "partial"
      answerSummary: >-
        Revolut Business reports 30,000+ new businesses joining per month (per official website, 2026). Consumer
        base cited at 45M+ globally. Valuation at ~$45B in 2024 secondary sale. EU operations under Lithuanian
        banking licence.

    - id: "QP002"
      question: >-
        How does N26 Business's product scope compare to Qonto, and what structural limitations does it have
        in 2026?
      type: "comparison"
      targets:
        - "contentRequirements/1"
        - "contentRequirements/2"
      status: "answered"
      answerSummary: >-
        N26 Business Smart is €4.90/month for freelancers/self-employed only. Critical limitation: no company
        name accounts; excludes incorporated businesses. This severely restricts N26's SMB addressable market
        vs Qonto.

    - id: "QP003"
      question: >-
        What are Holvi's ownership, regulatory status, target market, and pricing as of 2026?
      type: "enumeration"
      targets:
        - "contentRequirements/1"
      status: "answered"
      answerSummary: >-
        Holvi is owned by BBVA since 2016, authorized by FIN-FSA as a payment institution, targets solopreneurs
        and small teams, from €9/month. Offers banking, invoicing, bookkeeping; 500 free SEPA transfers/month;
        18 currency payments added recently.

    - id: "QP004"
      question: >-
        What are Bunq's funding, valuation, banking licence status, and key business product features as of
        2026?
      type: "enumeration"
      targets:
        - "contentRequirements/1"
      status: "answered"
      answerSummary: >-
        Bunq raised €193M Series A (2021) at €1.6B valuation; 427 employees (2024); full Dutch banking licence;
        personal + business accounts; free freelancer tier; 20+ currencies; 50+ bookkeeping integrations;
        sustainability angle.

    - id: "QP005"
      question: >-
        Does Revolut Business have a full EU banking licence, and what credit products can it offer in 2026?
      type: "enumeration"
      targets:
        - "contentRequirements/1"
        - "contentRequirements/3"
      status: "answered"
      answerSummary: >-
        Revolut obtained a UK banking licence in July 2024 and operates under a Lithuanian banking licence in
        the EU, enabling credit products. This gives it superior credit capability vs Qonto's payment institution
        status.

    - id: "QP006"
      question: >-
        What is Qonto's pricing structure as of 2026, and how does it compare to key competitors?
      type: "comparison"
      targets:
        - "contentRequirements/2"
      status: "answered"
      answerSummary: >-
        Qonto: Basic €9/mo, Smart €19/mo, Premium €39/mo. Revolut Business: Basic £10/mo (~€11.6), Grow £30/mo,
        Scale £90/mo. N26 Business Smart: €4.90/mo (freelancers only). Holvi: from €9/mo. Bunq: free freelancer
        tier, paid plans available. Traditional banks: €30–80+/month.

    - id: "QP007"
      question: >-
        How many accounting integrations does Qonto have, and what makes DATEV integration significant for
        the German market as of 2026?
      type: "enumeration"
      targets:
        - "contentRequirements/3"
        - "contentRequirements/2"
      status: "answered"
      answerSummary: >-
        Qonto lists 4,791 integrations including three DATEV integrations (critical for German accountants with
        1M+ DATEV users), Pennylane, Google Sheets, Zapier, and QuickBooks. DATEV creates accountant-mediated
        distribution moat in Germany.

    - id: "QP008"
      question: >-
        When did Qonto acquire Penta, and what market advantage did this provide in 2026?
      type: "enumeration"
      targets:
        - "contentRequirements/1"
        - "contentRequirements/3"
      status: "answered"
      answerSummary: >-
        Qonto announced the acquisition of Penta in January 2022, closing later that year. Penta was a
        Berlin-based SMB neobank, giving Qonto German market presence, German IBANs, and local customer base
        without starting from zero.

    - id: "QP009"
      question: >-
        What is the total number of Qonto customers as of 2025–2026, and how does this compare to competitors?
      type: "quantification"
      targets:
        - "contentRequirements/1"
      status: "answered"
      answerSummary: >-
        Qonto's official pricing page cites 600,000 business customers. Revolut Business adds 30,000+/month.
        Qonto's customer count may be overtaken by Revolut Business within 1–2 years at current growth rates.

    - id: "QP010"
      question: >-
        What is Wise Business's competitive positioning relative to Qonto, and does it represent a direct
        threat to Qonto's core market in 2026?
      type: "comparison"
      targets:
        - "contentRequirements/0"
        - "contentRequirements/2"
      status: "answered"
      answerSummary: >-
        Wise Business serves 700K+ businesses with £12B monthly; specializes in multi-currency FX payments;
        positioned as a complement (not substitute) for Qonto in most use cases. Expanding team card and
        accounting features increase adjacency.

    - id: "QP011"
      question: >-
        Is Mercury available for EU-based businesses in 2026, and what is its threat level to Qonto?
      type: "enumeration"
      targets:
        - "contentRequirements/0"
      status: "answered"
      answerSummary: >-
        Mercury serves 300K+ US businesses with $20B+ monthly volume and is primarily US-focused. Not available
        for EU-based businesses as of May 2026. Threat level is low-medium (potential future entrant).

    - id: "QP012"
      question: >-
        What is Airwallex's regulatory and competitive status in the EU market as of 2026?
      type: "enumeration"
      targets:
        - "contentRequirements/0"
      status: "answered"
      answerSummary: >-
        Airwallex is regulated in EU (Netherlands DNB licence R179622, Lithuania), offers global payments and
        FX; not primarily an SMB banking platform; focused on mid-market global payments. Low overlap with
        Qonto's freelancer/micro-SMB core.

    - id: "QP013"
      question: >-
        What regulatory sanctions has N26 faced, and what do these mean for competitive trust positioning
        in 2026?
      type: "enumeration"
      targets:
        - "contentRequirements/4"
      status: "answered"
      answerSummary: >-
        N26 received BaFin transaction monitoring restrictions in 2021 and paid €4.25M in AML fines. While
        restrictions were lifted, Trustpilot reviews show recurring account suspension complaints. Qonto
        has not faced comparable regulatory penalties from ACPR.

    - id: "QP014"
      question: >-
        How do switching costs differ for Qonto's primary-account customers vs. multi-homing customers?
      type: "comparison"
      targets:
        - "contentRequirements/3"
      status: "answered"
      answerSummary: >-
        Primary-account switching requires updating Direct Debit mandates, payroll IBANs, accounting software,
        e-commerce payouts — 2–4 weeks of work for a 10–50 person business. Multi-homing users face lower
        barriers (add Qonto as secondary account); adoption is faster but revenue per account is lower.

    - id: "QP015"
      question: >-
        How does Qonto's localized IBAN strategy (FR/DE/IT/ES) create competitive differentiation vs.
        Lithuanian or Dutch IBAN competitors in 2026?
      type: "comparison"
      targets:
        - "contentRequirements/2"
        - "contentRequirements/3"
      status: "answered"
      answerSummary: >-
        French (FR) and German (DE) IBANs are recognized as domestic by local suppliers, government bodies,
        and payroll systems. Some French/German organizations require domestic IBANs for direct debit mandates.
        Revolut Business and Wise Business issue Lithuanian IBANs, which some clients reject. This is a trust
        and compliance differentiator for Qonto.

    - id: "QP016"
      question: >-
        What is Qonto's moat durability rating across its five key competitive dimensions as of 2026?
      type: "comparison"
      targets:
        - "contentRequirements/4"
      status: "answered"
      answerSummary: >-
        DATEV integration: high durability (3–5 years). ACPR licence/passporting: medium (Revolut has stronger
        banking licence). Localized IBANs: medium (erodes with EU market education). Penta/German footprint:
        medium-high (sustained by DATEV). SMB-only product focus: medium (Revolut's SMB team is investing
        aggressively).

    - id: "QP017"
      question: >-
        What is Bunq's strategic direction and how does its personal-first model affect its SMB competitive
        threat to Qonto in 2026?
      type: "comparison"
      targets:
        - "contentRequirements/1"
        - "contentRequirements/3"
      status: "answered"
      answerSummary: >-
        Bunq requires personal account for business access, limiting appeal for business-first customers. Its
        sustainability branding targets a consumer segment that partially overlaps with Qonto's freelancer users.
        Not a major threat to Qonto's corporate SMB segment.

    - id: "QP018"
      question: >-
        What is the competitive risk of Banking-as-a-Service (BaaS) platforms enabling rapid new entrants
        to the European SMB banking market by 2026–2028?
      type: "adverse"
      targets:
        - "contentRequirements/4"
      status: "answered"
      answerSummary: >-
        BaaS providers (Solaris, Swan, Treezor) allow new challengers to launch SMB banking products in 6–12
        months. Core features are commoditizing. Qonto's defense must come from deep accounting integrations,
        credit capability, and localization — not basic banking features.

    - id: "QP019"
      question: >-
        Does Revolut Business's consumer user base (45M+ personal users) create a distribution advantage over
        Qonto for business account acquisition in 2026?
      type: "comparison"
      targets:
        - "contentRequirements/3"
        - "contentRequirements/4"
      status: "answered"
      answerSummary: >-
        Yes. Revolut's 45M+ consumer users represent a significant organic acquisition funnel: consumers who
        encounter Revolut Business via their personal app. Qonto has no comparable consumer-to-business
        cross-sell channel. This asymmetric distribution advantage will intensify as Revolut Business grows.

    - id: "QP020"
      question: >-
        What are the user experience and customer service strengths and weaknesses of Qonto vs. competitors,
        as reported in 2026 review data?
      type: "verification"
      targets:
        - "contentRequirements/2"
        - "contentRequirements/4"
      status: "answered"
      answerSummary: >-
        GetApp review data (249 verified reviews): Qonto scores 4.3/5 value for money, 4.7/5 features, 4.5/5
        ease of use. Positives: responsive customer service, intuitive interface, strong integrations. Negatives:
        account suspensions, limited loan options, international transfer fees. N26 Trustpilot shows recurring
        suspension complaints (39K reviews, 4/5 overall).

    - id: "QP021"
      question: >-
        What is the competitive significance of the Kontist brand in Germany, and has it been integrated into
        Qonto's product as of 2026?
      type: "enumeration"
      targets:
        - "contentRequirements/0"
      status: "partial"
      answerSummary: >-
        Kontist.com still operates as a standalone freelancer banking app in Germany as of May 2026, running on
        Solaris infrastructure. It is not yet fully integrated into Qonto's product suite, though Qonto acquired
        it. Kontist's real-time tax estimation differentiates it from Qonto's current feature set.

    - id: "QP022"
      question: >-
        How does Holvi's Finnish authorization and BBVA ownership affect its competitive positioning and
        strategic independence in 2026?
      type: "comparison"
      targets:
        - "contentRequirements/1"
        - "contentRequirements/4"
      status: "answered"
      answerSummary: >-
        BBVA's ownership provides financial stability but limits Holvi's ability to raise external capital or
        pivot independently. Holvi's FIN-FSA authorization gives EU passporting but as a payment institution
        (not full bank). The BBVA umbrella may create strategic conflicts if BBVA pursues competing products.

    - id: "QP023"
      question: >-
        What pricing pressure exists on the entry-tier market segment (freelancers) where Bunq offers a free
        tier and N26 charges €4.90/month in 2026?
      type: "adverse"
      targets:
        - "contentRequirements/2"
        - "contentRequirements/4"
      status: "answered"
      answerSummary: >-
        Bunq's free freelancer tier and N26's €4.90/month plan create pricing pressure on Qonto's €9/month
        Basic plan in the freelancer segment. Qonto differentiates on invoicing, DATEV, and support quality —
        but cannot compete on pure price in this segment. Margin dilution risk if Qonto responds with price
        cuts.

    - id: "QP024"
      question: >-
        What is the competitive threat level from Airwallex for the EU SMB market in 2026, and does its
        regulatory status enable direct SMB banking competition?
      type: "adverse"
      targets:
        - "contentRequirements/0"
      status: "answered"
      answerSummary: >-
        Airwallex EU (Netherlands DNB licence, Lithuania) offers global payments, FX, team cards, and embedded
        finance. Primarily mid-market / tech-company focused; not yet competing in Qonto's freelancer/micro-SMB
        core. Medium-term threat as feature sets converge.

    - id: "QP025"
      question: >-
        How does Stripe Atlas's product positioning relate to Qonto's competitive landscape in Europe as of
        2026?
      type: "enumeration"
      targets:
        - "contentRequirements/0"
      status: "answered"
      answerSummary: >-
        Stripe Atlas focuses on US company formation and Delaware incorporation; it has served 100K+ startups
        globally but does not offer EU banking services directly. Not a direct Qonto competitor in 2026.

    - id: "QP026"
      question: >-
        What evidence exists that Revolut Business is specifically targeting Qonto's French and German SMB
        markets in 2026?
      type: "enumeration"
      targets:
        - "contentRequirements/4"
      status: "partial"
      answerSummary: >-
        Revolut Business advertises in French and German markets and its pricing page shows EUR pricing. The
        claim of 30K+ new businesses per month implies significant EU-market penetration. Specific France/Germany
        share data is not publicly available, but Revolut's EU scale is clearly competitive.

    - id: "QP027"
      question: >-
        What is the estimated time for Qonto to obtain a full banking licence from ACPR, and what credit
        products would this unlock in 2026–2028?
      type: "adverse"
      targets:
        - "contentRequirements/4"
      status: "answered"
      answerSummary: >-
        Qonto filed a banking licence application with ACPR in July 2025. The process typically takes 2–4 years
        in France. If approved ~2027–2029, Qonto could offer balance-sheet overdraft, invoice financing, and
        term loans, closing the credit gap vs Revolut and N26.

    - id: "QP028"
      question: >-
        What do user reviews reveal about Qonto's specific strengths and weaknesses relative to competitors
        in 2026?
      type: "verification"
      targets:
        - "contentRequirements/4"
      status: "answered"
      answerSummary: >-
        GetApp (249 reviews as of March 2026): strengths are intuitive UI, fast setup, integrations, responsive
        support. Weaknesses: limited loan options, high fees for international transfers, customer support
        becomes unreachable in complex issues. Overall positive — 83% positive on navigation, 4.5/5 ease of use.

