sections:
  - id: "competitive-landscape"
    title: "Competitive Landscape: Peers, Incumbents, Adjacents, and Likely Entrants"
    body: >
      Qonto's competitive landscape can be segmented into four tiers, each with distinct strategic implications
      for Qonto's positioning and defensibility.

      Tier 1 — Direct Neobank Peers (European SMB focus): The most relevant direct competitors are Revolut
      Business, N26 Business, Holvi, and Bunq. All four offer digital business accounts with overlapping core
      features (IBAN, Mastercard/Visa, SEPA payments). However, important structural differences exist. Revolut
      Business is the most threatening: it has the broadest consumer user base (reported growth of 30K+ new
      business signups per month), multi-currency capabilities in 25+ currencies, and has obtained a full UK
      banking licence — allowing credit products that Qonto cannot yet offer. N26 Business is hamstrung by a
      critical limitation: its business accounts are exclusively for freelancers and self-employed individuals
      working under their own name; N26 explicitly states it cannot accommodate company names on accounts,
      excluding the larger SMB and micro-business segment that constitutes the majority of Qonto's customer
      base. Holvi, originally Finnish, is owned by BBVA since 2016 and targets solopreneurs and small teams,
      offering banking, invoicing, and bookkeeping from €9/month but with a more limited market footprint.
      Bunq is a Dutch full-service bank (banking licence, €1.6B valuation at 2021 Series A), serving both
      personal and business accounts with a sustainability angle; its requirement for a personal Bunq account
      to access business banking creates friction for business-first customers.

      Tier 2 — Multi-Market Challengers (Adjacent): Wise Business (formerly TransferWise) serves 700,000+
      global businesses with £12B in monthly transactions, focusing on multi-currency payments and FX efficiency
      rather than comprehensive SMB banking. Most Qonto customers who need SWIFT and multi-currency FX use
      Wise as a complement rather than substitute — but Wise's expanding feature set (team cards, accounting
      integrations) moves it incrementally closer to core banking competition. Airwallex is an Australian-origin
      global payments platform regulated in the EU (Netherlands DNB, Lithuania) with strong capabilities in FX
      and cross-border payments, primarily targeting mid-market businesses — slightly above Qonto's core
      freelancer/micro-business segment but converging.

      Tier 3 — Likely Entrants: Mercury (US-based, 300K+ business customers, $20B+ monthly transaction volume)
      is primarily US-focused but represents a potential European entrant given its positioning around
      startup/tech-company banking. Stripe Atlas (100K+ startups served) focuses on US company formation and
      banking infrastructure — not a direct EU competitor today, but Stripe's embedded finance capabilities
      could enter adjacent SMB banking verticals. Neither Mercury nor Stripe Atlas offers EU-based banking
      services as of May 2026.

      Tier 4 — Incumbent Banks (Status Quo and Substitute): BNP Paribas, Société Générale (France), Deutsche
      Bank and Commerzbank (Germany), ING, Santander, BBVA, and Unicredit collectively serve the vast majority
      of European SMBs. Their pricing (€30–80+/month for basic accounts) is structurally higher than neobank
      competitors, and their onboarding processes (branch visits, paper documentation) are incompatible with
      digital-native SMB expectations. However, they hold decisive advantages in credit (overdraft, term loans,
      invoice financing) and trust — particularly in Germany, where Mittelstand businesses have century-long
      banking relationships with Deutsche Bank or Commerzbank.

      Internal Build and Platform Substitute: Some larger SMBs use accounting platforms (Sage, QuickBooks,
      Pennylane) with embedded payment capabilities as a partial substitute for a dedicated business bank. These
      platforms can handle invoicing and bookkeeping but lack the regulatory infrastructure for a primary IBAN
      or direct card issuance.
