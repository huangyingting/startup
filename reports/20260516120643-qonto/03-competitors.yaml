callouts:
  - calloutType: "strength"
    title: "Purpose-Built SME Positioning"
    body: >
      Qonto's core differentiation from Revolut Business and N26 Business is structural, not merely
      cosmetic. While consumer-first neobanks have retrofitted business features onto personal banking
      rails, Qonto was architected from day one for SMBs and freelancers. This manifests in unique
      capabilities that cannot be quickly copied: EU-certified e-invoicing compliant with national mandates
      across 8 countries, DATEV integration native to German accounting workflows used by over one million
      accountants, and multi-user role management with approval workflows suited to 5 to 50 person finance
      teams. With 600,000+ business customers, 4,791 integrations, and a Trustpilot rating of 4.8 out of 5,
      Qonto has established a SME-first brand and product identity that incumbents and horizontal neobanks
      struggle to credibly replicate.
    claimRefs:
      - CP016
      - CP028
      - CP031

  - calloutType: "risk"
    title: "Revolut Business Commoditization Threat"
    body: >
      Revolut Business represents the single most material competitive risk to Qonto's market position over
      the 2026 to 2028 horizon. Backed by a 33 billion USD+ valuation and a consumer base of 45 million+
      personal users that provides a powerful organic acquisition channel for business accounts, Revolut
      Business has been systematically adding SME-specific features including expense management, team cards,
      analytics, and accounting connections since 2023. If Revolut achieves even partial parity on Qonto's
      workflow depth while leveraging its superior multi-currency offering and lower entry-tier pricing, it
      could commoditize Qonto's core value proposition. Additionally, Revolut's UK banking licence (granted
      2024) and Lithuanian EU banking licence enable credit products that Qonto cannot offer as a payment
      institution, creating a structural gap in Qonto's product coverage that Revolut can exploit in the
      10 to 250 employee SMB segment where credit access is a primary driver of banking loyalty.
    claimRefs:
      - CP027
      - CP035
      - CP038

