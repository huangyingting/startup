  - calloutType: "strength"
    title: "DATEV Integration Creates Accountant-Mediated Distribution Moat in Germany"
    body: >
      Qonto's three DATEV integrations (Belegbilderservice, Rechnungsdatenservice, RZ-Bankinfo) embed Qonto
      into the workflow of Germany's 1M+ DATEV-using accountants. German Steuerberater are the dominant
      referral channel for SMB banking decisions; a bank embedded in DATEV becomes the default recommendation.
      Revolut Business, N26 Business, and Holvi lack comparable DATEV integration depth, making this a
      durable, accountant-mediated distribution moat.
    claimRefs:
