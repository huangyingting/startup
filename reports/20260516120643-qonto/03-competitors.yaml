  - calloutType: "risk"
    title: "Credit Gap Limits Qonto to the Role of Secondary Bank for Larger SMBs"
    body: >
      Qonto operates as a payment institution, not a bank, and cannot offer balance-sheet credit (overdraft,
      term loans, invoice financing) directly. This restricts Qonto's addressable ARPU in the 10–250 employee
      segment, where credit access is the primary driver of banking loyalty. Revolut Business (UK/Lithuanian
      banking licence), N26 (German banking licence), and Bunq (Dutch banking licence) all have credit
      capability. Qonto's July 2025 banking licence application is the correct strategic response, but the
      2–4 year regulatory timeline leaves a material window during which Revolut can deepen credit-led lock-in.
    claimRefs:
      - CP025
      - CP035

  - calloutType: "insight"
    title: "N26 Business's Structural Limitations Open Qonto's Path to Mid-Market Germany"
    body: >
      N26 Business accounts explicitly cannot accommodate company names — only freelancers and self-employed
      individuals working under their own name. This excludes incorporated SMBs, GmbHs, UGs, and limited
      companies from N26's business product, leaving the entire German incorporated-SMB segment underserved
      by neobank-quality UX. Qonto, post-Penta acquisition, has German IBANs, DATEV integration, and product
      depth for incorporated businesses — a structural competitive gap that N26 cannot address without
      rebuilding its business product from scratch.
    claimRefs:
      - CP011
      - CP024
      - CP013

