  - id: "feature-pricing-comparison"
    title: "Feature Capability and Pricing Comparison"
    body: >
      Feature parity across European SMB neobanks has converged significantly in core areas (SEPA payments,
      card issuance, mobile app, basic expense tracking). The key points of differentiation that matter to
      SMB buyers — and where Qonto holds structural advantages — are localized IBANs, accounting integrations,
      invoicing depth, and multi-user team features.

      Localized IBANs: Qonto issues French, German, Italian, and Spanish IBANs — allowing customers to receive
      payments appearing from a local bank. Revolut Business, N26 Business, and Bunq typically issue Lithuanian
      or generic SEPA IBANs, which some SMB clients (particularly in France and Germany) report creates friction
      with certain corporate buyers or government bodies requiring domestic IBANs. This is a meaningful
      trust/compliance advantage in Qonto's core markets.

      Accounting integrations: Qonto lists 4,791 integrations including three DATEV integrations (critical for
      German accountants and Steuerberater), Pennylane (Qonto subsidiary), Google Sheets, Zapier, and QuickBooks.
      Revolut Business integrates with Xero, Sage, QuickBooks, and 45+ tools — a broad but less Germany-specific
      set. N26 Business offers PDF/CSV export and hashtag categorization but lacks depth in accounting
      integrations, particularly DATEV. Holvi offers connect-to-accounting-software capabilities but fewer
      named integrations. Bunq claims 50+ bookkeeping integrations.

      Invoicing depth: Qonto's Accounts Receivable Plus add-on (€35/month billed annually) enables automated
      invoicing, recurring invoices, and project tracking. Holvi has strong invoicing for solopreneurs.
      N26 Business has limited invoicing — primarily PDF/CSV statement download. Revolut Business's invoicing
      is basic relative to Qonto's depth. Wise Business offers invoice creation with payment link.

      Credit / overdraft: This is the critical capability gap for Qonto as a payment institution. Revolut
      Business (UK banking licence) and N26 (full German bank) can offer credit. Bunq can offer credit products
      as a licensed bank. Qonto cannot offer balance-sheet credit directly until its banking licence application
      completes (filed July 2025; expected 2–4 year process). Kontist offers overdraft via Solaris. Traditional
      incumbents lead in credit.

      Pricing: Qonto's entry plan (€9/month) is competitive with Holvi (€9/month) and cheaper than Revolut
      Business (£10 ≈ €11.6/month) for basic tiers. N26 Business Smart at €4.90/month is cheaper but covers
      only freelancers. Bunq offers a free freelancer tier. Traditional banks charge €30–80+/month. Qonto's
      Smart (€19/month) and Premium (€39/month) plans represent good value for SMBs needing multi-user
      features and higher transaction volumes.

      Multi-currency and international payments: Revolut Business is the clear leader in FX breadth (25+
      currencies at interbank rate within allowance, 150+ payment destinations). Wise Business has best-in-class
      FX rates. Airwallex specializes in cross-border FX. Qonto offers SWIFT transfers in 32 currencies via its
      Premium plan but is not a primary FX platform. For EU-domestic SMBs, this gap is less critical; for
      internationally active SMBs, Revolut or Wise is the preferred complementary tool.
