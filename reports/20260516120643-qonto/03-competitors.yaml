callouts:
  - calloutType: "risk"
    title: "Revolut Business Growth Rate Is the Primary Competitive Threat"
    body: >
      Revolut Business claims 30,000+ new business signups per month, annualizing to 360,000+ new business
      customers per year. Qonto, which reached 600,000 customers in roughly 7 years, is growing more slowly.
      Revolut's UK banking licence now enables credit — a capability Qonto lacks until its 2025-filed banking
      licence application succeeds. Without credit capability, Qonto cannot be the primary financial partner
      for SMBs in the 10–250 employee segment, limiting ARPU and deepening multi-homing risk.
