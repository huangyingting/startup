  - id: "switching-costs-and-lockin"
    title: "Switching Costs, Multi-Homing, Lock-In, and Distribution Power"
    body: >
      Switching costs in SMB banking are asymmetric: high when leaving a primary account, moderate when
      adopting an additional (complementary) neobank. The result is a market characterized by significant
      multi-homing — most SMBs hold both a traditional bank account and at least one neobank, rather than
      fully porting.

      Primary-account switching costs: Replacing a primary bank account requires updating supplier payment
      mandates (Direct Debit), payroll SEPA credit transfers to employee accounts, accounting software IBAN
      configuration, e-commerce platform payouts, government/tax authority payment references, and credit
      facility applications. For a business with 10–50 employees, this migration can take 2–4 weeks of
      operations team time and poses cash-flow risk during transition. This structural friction protects all
      incumbents, including Qonto against churn, but also limits the pace at which Qonto can displace
      traditional banks from the primary-account position.

      Multi-homing behavior: A significant portion of Qonto's 600K customers likely maintain a parallel
      traditional bank account, using Qonto primarily for everyday transactions, card spend, and invoicing —
      while keeping their incumbent for credit facilities, payroll, and larger cash reserves. This dual-banking
      pattern benefits Qonto's growth (lower barriers to initial adoption) but caps revenue per account until
      Qonto can offer credit and become the full financial operating system.

      DATEV and accountant-mediated distribution: Qonto's three DATEV integrations (DATEV Belegbilderservice,
      DATEV Rechnungsdatenservice, DATEV RZ-Bankinfo) represent a unique distribution moat in Germany.
      German-market accountants (Steuerberater) are the primary referral source for SMB banking decisions;
      a neobank that integrates natively with DATEV — Germany's dominant accounting software with 1M+ users —
      gains referral density that Revolut Business or N26 (which lack comparable DATEV depth) cannot easily
      replicate. This is a supply-side distribution advantage that reinforces Qonto's German market position
      post-Penta acquisition.

      Partner and ecosystem lock-in: Qonto's Regate accounting platform (acquired as part of Pennylane
      ecosystem) and the Qonto-Pennylane integration create stickiness for accountants who use Pennylane to
      manage client finances — a "professional intermediary" lock-in strategy that mirrors how Xero and
      QuickBooks built moats through accountant channel relationships. Holvi's BBVA ownership gives it some
      cross-sell potential but does not create a comparable ecosystem depth. Revolut Business's 45+ integrations
      are broad but not as deeply embedded in the accountant workflow in Qonto's core markets.

      Network effects: Qonto's 600K customer base creates modest network-effect components: referral programs,
      shared accountant workflows via Regate/Pennylane, and brand recognition in the startup community. These
      are not viral network effects (the product does not become more valuable per se as more businesses join)
      but represent referral density and community trust that new entrants lack. Revolut benefits from
      stronger consumer-to-business network effects: consumer users (45M+) who encounter Revolut Business
      via their personal app represent a significant organic acquisition channel that Qonto cannot replicate.
