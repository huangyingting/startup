  evidenceGaps:
    - type: "private-evidence-only"
      severity: "material"
      topic: "market-share"
      missingEvidence: >
        No third-party market share data by country is publicly available for the European SME neobank
        segment. Customer counts disclosed by Qonto (600,000+), Revolut Business (~500,000 for business
        tier), and Memo Bank (~20,000) are self-reported and not independently audited.
      whyItMatters: >
        Without country-level market share data, it is impossible to assess whether Qonto is growing its
        lead or being commoditized by Revolut in key markets (France, Germany, Italy).
      diligencePath: >
        Request Qonto internal cohort data by market, churn rates by competitor, and net new customer
        attribution data in the investor data room.
      relatedQuestionRefs:
        - QP027
        - QP029

    - type: "private-evidence-only"
      severity: "material"
      topic: "competitor-financials"
      missingEvidence: >
        Revenue, burn rate, and gross margin data for direct competitors (Revolut Business segment, N26
        Business, Wise Business unit) are not publicly available in granular per-product form, making
        revenue-per-account and unit-economics comparisons impossible from public sources.
      whyItMatters: >
        Understanding whether competitors are profitable at the SMB segment level is critical for assessing
        their ability to sustain pricing competition or acquisition bids.
      diligencePath: >
        Use Wise's UK Companies House filings (public) as a proxy; seek analyst reports or competitor
        investor filings for revenue benchmarks.
      relatedQuestionRefs:
        - QP010
        - QP016

    - type: "private-evidence-only"
      severity: "minor"
      topic: "competitor-roadmaps"
      missingEvidence: >
        No competitor (Revolut Business, N26, Wise) has publicly disclosed a detailed 12-24 month product
        roadmap that would allow assessment of when their accounting integration or e-invoicing features
        will reach Qonto's current level.
      whyItMatters: >
        The roadmap gap is the key question for competitive moat durability. Without visibility into
        competitor development timelines, the 12-18 month advantage Qonto holds in SME workflow depth may
        compress faster than expected.
      diligencePath: >
        Triangulate from competitor job postings, API documentation updates, and beta product announcements
        in specialist fintech press.
      relatedQuestionRefs:
        - QP022
        - QP025
