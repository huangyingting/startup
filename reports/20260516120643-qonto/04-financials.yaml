  researchQuestions:
    - id: "QI001"
      question: "What are Qonto's exact subscription pricing tiers and features included in each plan as of 2026?"
      type: "quantification"
      targets:
        - "contentRequirements/0"
        - "plannedTables/pricing-monetization-table"
      status: "answered"

    - id: "QI002"
      question: "What is the estimated revenue breakdown between subscription fees, interchange, transfer fees, FX, and financing income?"
      type: "quantification"
      targets:
        - "contentRequirements/0"
        - "plannedTables/revenue-streams-table"
        - "plannedFigures/revenue-model-bridge"
      status: "answered"
      answerSummary: >
        Subscription fees contribute an estimated 55-65% of total ARR, card interchange ~15-20%,
        transfer/FX fees ~10-15%, financing (Pay Later interest) ~5-7%, and balance remuneration
        income the remainder, derived from published pricing, customer count, and volume proxies.

    - id: "QI003"
      question: "What is Qonto's reported ARR and how has it trended from 2020 to 2026?"
      type: "quantification"
      targets:
        - "contentRequirements/3"
        - "plannedFigures/financial-estimate-range"
      status: "answered"
      answerSummary: >
        Qonto confirmed ARR exceeded EUR 200M by early 2024. Estimated progression:
        EUR 30-40M (2021), EUR 70-90M (2022), EUR 130-150M (2023), EUR 200M+ (2024),
        implying a 3-year CAGR of approximately 50% from 2021 to 2024.

    - id: "QI004"
      question: "Has Qonto publicly confirmed specific revenue or EBITDA figures for FY2023 or FY2024?"
      type: "verification"
      targets:
        - "contentRequirements/3"
        - "contentRequirements/5"
      status: "unresolved"

    - id: "QI005"
      question: "What is Qonto's blended gross margin and how does it compare to neobank and payments peers as of 2026?"
      type: "comparison"
      targets:
        - "contentRequirements/2"
        - "plannedTables/unit-economics-table"
      status: "answered"
      answerSummary: >
        No gross margin has been disclosed. Estimated blended gross margin is 60-75% based on
        high-margin subscription ARR (~60% of revenue mix), interchange net yield (0.3-0.5%),
        and low marginal delivery cost, consistent with SaaS-fintech hybrid peers at similar ARR scale.

    - id: "QI006"
      question: "What are the economics of Qonto's Mastercard card interchange relationship in 2026?"
      type: "mechanism"
      targets:
        - "contentRequirements/0"
        - "contentRequirements/2"
      status: "answered"
      answerSummary: >
        Qonto earns card interchange on a revenue-sharing basis through its Mastercard partnership.
        FX commissions are disclosed at 2% (One Card), 1% (Plus Card), and 0% (Metal X Card).
        EU interchange regulation caps debit interchange at 0.2% per transaction, constraining upside.

    - id: "QI007"
      question: "What is Qonto's customer acquisition cost by acquisition channel and has it been disclosed publicly?"
      type: "quantification"
      targets:
        - "contentRequirements/1"
        - "plannedTables/unit-economics-table"
      status: "unresolved"

    - id: "QI008"
      question: "What is Qonto's customer payback period by pricing tier, and how does it compare to industry benchmarks?"
      type: "quantification"
      targets:
        - "contentRequirements/1"
        - "plannedFigures/unit-economics-bridge"
      status: "answered"
      answerSummary: >
        CAC is undisclosed. Using an estimated blended CAC of EUR 200-500 for digital self-serve
        SMB acquisition and ARPU of EUR 19-39/month (Smart/Premium), implied payback is 12-18 months,
        consistent with digital-first SMB banking peers and broadly capital-efficient at scale.

    - id: "QI009"
      question: "What is the composition of Qonto's Go-To-Market channel mix including self-serve, accountant partners, and referrals?"
      type: "mechanism"
      targets:
        - "contentRequirements/1"
      status: "answered"
      answerSummary: >
        Qonto uses a predominantly self-serve digital funnel, supplemented by accountant referral
        networks (expanded via the Regate acquisition), DATEV integration for German market penetration,
        and indirect partner channels. Channel split by acquisition volume is not publicly disclosed.

    - id: "QI010"
      question: "How does Qonto use accountant partners and the Regate acquisition as a GTM channel as of 2026?"
      type: "mechanism"
      targets:
        - "contentRequirements/1"
      status: "answered"

    - id: "QI011"
      question: "What is Qonto's total headcount breakdown by function as of 2026?"
      type: "quantification"
      targets:
        - "contentRequirements/2"
      status: "answered"
      answerSummary: >
        Qonto had 1,600+ employees as of 2025 across Paris, Berlin, Milan, Barcelona, and Belgrade.
        Functional breakdown is undisclosed, but the multi-market footprint implies significant
        investment in product engineering, compliance, and international go-to-market teams.

    - id: "QI012"
      question: "What are Qonto's largest operating cost line items and how have they evolved from 2020 to 2026?"
      type: "quantification"
      targets:
        - "contentRequirements/2"
        - "plannedFigures/capital-intensity-cash-flow-map"
      status: "answered"
      answerSummary: >
        The largest cost items are estimated as headcount (70-75% of opex given 1,600+ FTE),
        followed by payment infrastructure and card-network fees, regulatory/compliance,
        and amortisation of Penta and Regate acquisition intangibles. No audited breakdown available.

    - id: "QI013"
      question: "What is Qonto's estimated cash position and monthly burn rate as of early 2026?"
      type: "quantification"
      targets:
        - "contentRequirements/4"
        - "plannedTables/capital-adequacy-table"
      status: "unresolved"

    - id: "QI014"
      question: "What are the interest rate, maximum amount, and eligibility criteria for Qonto's Pay Later product in 2026?"
      type: "mechanism"
      targets:
        - "contentRequirements/0"
        - "contentRequirements/4"
      status: "answered"

    - id: "QI015"
      question: "How much financing has Qonto originated through its Pay Later and broader financing platform since launch?"
      type: "quantification"
      targets:
        - "contentRequirements/3"
        - "contentRequirements/4"
      status: "answered"

    - id: "QI016"
      question: "What are the details of Qonto's full funding history by round including amounts, dates, and investors?"
      type: "enumeration"
      targets:
        - "contentRequirements/4"
        - "plannedTables/capital-adequacy-table"
      status: "answered"

    - id: "QI017"
      question: "What was the Series D valuation, who led the round, and what conditions were attached to the 2022 raise?"
      type: "quantification"
      targets:
        - "contentRequirements/4"
        - "plannedTables/capital-adequacy-table"
      status: "answered"

    - id: "QI018"
      question: "What is Qonto's current estimated fair market valuation given fintech multiple compression since the 2022 Series D?"
      type: "quantification"
      targets:
        - "contentRequirements/4"
        - "contentRequirements/5"
        - "plannedFigures/financial-estimate-range"
      status: "answered"
      answerSummary: >
        Estimated current fair-market range is EUR 1.5-3.0B, implying 5-10x estimated 2024 ARR.
        This represents a 32-66% markdown from the EUR 4.4B Series D price, consistent with the
        valuation compression seen at Klarna, N26, and other European fintech unicorns since 2022.

    - id: "QI019"
      question: "Has Qonto raised any debt financing, structured any credit facility, or issued convertible notes since 2022?"
      type: "verification"
      targets:
        - "contentRequirements/4"
        - "plannedTables/capital-adequacy-table"
      status: "answered"
      answerSummary: >
        No evidence of public debt financing, credit facilities, or convertible notes since the
        January 2022 Series D has been found in available sources. Qonto's CEO has stated that
        no new equity raise is needed to fund the banking-licence capital requirements.

    - id: "QI020"
      question: "What are the minimum capital requirements for Qonto's banking licence application with the French ACPR?"
      type: "quantification"
      targets:
        - "contentRequirements/4"
      status: "unresolved"

    - id: "QI021"
      question: "What is Qonto's customer churn rate and retention profile by plan tier and market as of 2026?"
      type: "quantification"
      targets:
        - "contentRequirements/3"
        - "plannedTables/unit-economics-table"
      status: "unresolved"

    - id: "QI022"
      question: "What is Qonto's year-over-year ARR growth rate and how does it trend from 2021 to 2026?"
      type: "quantification"
      targets:
        - "contentRequirements/3"
        - "plannedFigures/financial-estimate-range"
      status: "answered"
      answerSummary: >
        ARR CAGR is estimated at 45-55% from 2021 to 2024 (approximately EUR 35M to EUR 200M+).
        Growth has decelerated as the base grew: from likely >100% YoY in 2021-2022 to an estimated
        33-50% YoY in 2024, consistent with maturing growth-stage fintech benchmarks.

    - id: "QI023"
      question: "What is the revenue quality and predictability of Qonto's subscription versus interchange model?"
      type: "mechanism"
      targets:
        - "contentRequirements/0"
        - "contentRequirements/5"
      status: "answered"

    - id: "QI024"
      question: "What are the four primary financial diligence blockers for an investor evaluating Qonto as of 2026?"
      type: "adverse"
      targets:
        - "contentRequirements/5"
        - "plannedTables/public-financial-gaps-table"
      status: "answered"

    - id: "QI025"
      question: "How do Qonto's unit economics compare to Revolut Business, Tide, or Monzo Business at equivalent scale in 2026?"
      type: "comparison"
      targets:
        - "contentRequirements/1"
        - "contentRequirements/5"
      status: "answered"
      answerSummary: >
        Disclosed unit economics are unavailable for all peers. Qonto's implied ARPU of ~EUR 333/year
        (EUR 200M ARR / 600K customers) is broadly consistent with its published pricing and above
        typical Revolut Business entry-tier economics, suggesting above-average premium-tier penetration.

    - id: "QI026"
      question: "How do ECB policy rate changes impact Qonto's float and balance remuneration income stream in 2026?"
      type: "mechanism"
      targets:
        - "contentRequirements/0"
        - "contentRequirements/2"
      status: "answered"
      answerSummary: >
        Qonto remunerates customer balances at up to 4% (ECB-linked), earning the spread between
        ECB deposit rate and the rate passed to customers. A 100bps ECB rate reduction reduces float
        income by an estimated EUR 5-15M annually, representing a material but manageable revenue headwind.

    - id: "QI027"
      question: "What is Qonto's net revenue retention from plan upgrades and add-on adoption in 2026?"
      type: "quantification"
      targets:
        - "contentRequirements/3"
        - "plannedTables/unit-economics-table"
      status: "answered"
      answerSummary: >
        NRR is not disclosed. Based on the tiered subscription structure (Basic→Smart→Premium upgrades)
        and add-on module adoption (Cash Flow Plus, Accounts Payable), NRR is estimated at 100-115%,
        consistent with B2B fintech SMB platforms with positive expansion revenue dynamics.

