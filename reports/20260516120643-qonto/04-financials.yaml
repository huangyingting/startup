callouts:
  - calloutType: "strength"
    title: "Recurring Revenue Mix and CEO-Confirmed Profitability Ahead of Schedule"
    body: >
      Qonto's blend of subscription fees (high predictability, low per-plan churn risk) and growing
      add-on and financing revenue creates a defensible recurring-revenue base. CEO confirmation of
      profitability in 2023 — achieved ahead of the original target and sufficient to fund a banking
      licence without a major fundraise — is a material positive signal. The proprietary CBS and
      in-house card processor structurally improve gross margin over time.
    claimRefs:
      - CI013
      - CI014
      - CI040
      - CI041

  - calloutType: "risk"
    title: "Stale Valuation, No Audited Financials, and Interchange Margin Risk"
    body: >
      The EUR 4.4B Series D valuation dates to January 2022 and may not reflect current market conditions
      given significant compression of public neobank multiples since 2022. No audited P&L has been
      published; the EUR 200M+ ARR figure remains management-disclosed and unverified. Card interchange
      revenue is margin-dilutive because Mastercard retains approximately 1.2-1.5% of transaction value.
      SMB structural churn risk further limits subscription revenue predictability.
    claimRefs:
      - CI021
      - CI024
      - CI035
      - CI037
      - CI038

  - calloutType: "recommendation"
    title: "Four Diligence Actions to Resolve Financial Blockers"
    body: >
      Any investment process should prioritise: (1) audited P&L for FY2023 and FY2024 with a specific
      ARR bridge by cohort and market; (2) management accounts for Q1 2026 and a 12-month forward plan;
      (3) credit loss data for the Pay Later book including NPL ratio and delinquency curve; (4) the
      banking-licence capital adequacy model submitted to the ACPR including the capital requirement
      schedule and regulatory timeline.
    claimRefs:
      - CI043

