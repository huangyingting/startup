  - id: "capital-adequacy"
    title: "Capital Adequacy and Funding Position"
    body: >
      Qonto has raised €622M in total equity across five funding rounds from 2017 to January 2022,
      culminating in a €486M Series D led by Tiger Global and TCV at a €4.4 billion valuation. This
      capital base positions Qonto well relative to the minimum capital requirements for its current
      status as an EU payment institution regulated by the ACPR.

      As a Payment Institution (PI) under PSD2, Qonto's minimum own-funds requirement is determined
      using the ACPR's method-based calculation: for a PI processing significant payment volumes, this
      typically ranges from €350,000 to approximately €6 million using the European Banking Authority's
      standardised method. Qonto's raised capital far exceeds these requirements, confirming that
      regulatory capital adequacy for its current PI status is not a constraint on operations.

      The material capital question is forward-looking: Qonto's banking licence application (filed
      approximately May 2025 and publicly announced July 2025) would, if approved, require Qonto to
      meet full bank-level capital adequacy under the Capital Requirements Regulation (CRR) and
      Capital Requirements Directive IV (CRD IV). A full banking licence requires a minimum CET1
      capital ratio of 8%+ of risk-weighted assets (RWAs). If Qonto's loan book and balance sheet
      grow significantly post-licensing, the required regulatory capital could reach €50–150M or more,
      potentially necessitating a fresh equity raise or debt-capital instrument.

      CEO confirmation of profitability in 2023 materially changes the runway picture. A profitable
      company burning less cash than projected from the January 2022 Series D would extend runway
      beyond the typical 3–4 year horizon of a €486M raise, potentially to 5+ years (through 2026–2027
      or beyond), reducing near-term financing pressure but not eliminating the strategic decision
      around banking licence capitalisation.

      The European Investment Bank's participation in Qonto's funding (confirmed in the 2022 Series D
      investor list) provides both economic capital and an implicit public-sector endorsement of
      Qonto's SME financing mission. The EIB instrument (whether equity, debt, or quasi-equity) has
      not been publicly disclosed. No debt financing facility, credit line, or secondary share
      transaction has been publicly announced since the January 2022 Series D.
