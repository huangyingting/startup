chapter:
  number: 4
  letter: "I"
  title: "Financials"
  summary: >
    Qonto operates a hybrid subscription-plus-transaction revenue model with five primary revenue
    streams: monthly subscription fees, card interchange income, SEPA/SWIFT payment fees, float and
    interest income on customer deposits, and embedded finance/credit products. CEO Alexandre Prot
    confirmed Qonto achieved profitability in 2023, ahead of its original target, representing a
    significant milestone among European fintech unicorns. Annual recurring revenue is estimated at
    €200M+ for 2024 based on specialist fintech press, though this figure has not been confirmed from
    audited accounts or official filings. Qonto has raised €622M in total equity across five rounds,
    including a €486M Series D at a €4.4B valuation in January 2022. Key diligence blockers include
    the absence of audited P&L statements, unconfirmed unit economics (ARPU, CAC, NRR, gross margin),
    and an unresolved capital plan for its 2025 banking licence application with the ACPR. Float income
    is a growing but ECB-rate-dependent revenue stream. The banking licence application may require a
    fresh equity raise to meet bank-level capital adequacy requirements.

sections:
  - id: "revenue-model"
    title: "Revenue Model and Streams"
    body: >
      Qonto's revenue architecture is a hybrid subscription-plus-transaction model that captures value
      from SMB customers across five distinct streams, each with different unit economics, growth
      drivers, and margin profiles.

      The primary revenue stream is monthly subscription fees from Qonto's tiered plan structure:
      Basic at €9/month, Smart at €19/month, Premium at €39/month (all excluding VAT), and the
      enterprise Qonto X plan at custom pricing. With over 600,000 business accounts across eight
      European markets as of May 2026, subscription fees provide the most predictable and recurring
      component of Qonto's revenue base. Assuming a blended ARPU of approximately €250–350 per year
      across the plan mix, subscription revenue alone could represent €150–200M of annualised revenue,
      consistent with the €200M+ ARR figure reported in specialist fintech press.

      The second revenue stream is card interchange income earned on Mastercard business card
      transactions. Under the EU Interchange Fee Regulation (IFR), interchange is capped at 0.3% for
      credit and 0.2% for debit card transactions. Qonto's commercial card spend (with limits up to
      €400,000/month per account) generates interchange at approximately 0.2–0.5% of GMV, providing a
      volume-linked revenue stream that grows with customer spending rather than account count alone.

      SEPA and SWIFT payment fees above the free monthly allowance (20 SEPA/month on Basic, 30 on
      Smart, 60 on Premium) provide a moderate per-transaction revenue contribution. SEPA Instant
      mandates under EU regulation are gradually compressing the incremental fee opportunity, but SWIFT
      international transfers (from approximately €5/outgoing) remain meaningful for internationally
      active SMBs.

      Float and interest income on safeguarded customer deposits represents a materially growing
      revenue stream during the 2022–2025 elevated ECB rate environment. Qonto offers up to 4% per
      annum on customer balances, implying that Qonto retains a net spread above its funding cost.
      With an estimated 600,000+ customers each holding an average of €15,000–€25,000 in their
      accounts, the total deposit base could reach €9–15 billion, generating significant gross interest
      income before the portion passed to customers. However, the ECB rate-cutting cycle that began
      in 2024 (cutting rates from 4.0% to approximately 2.5% by mid-2025) represents a structural
      headwind to this stream as the interest rate environment normalises.

      Embedded finance and credit products (pay-later, term loans, revenue-based financing) are
      Qonto's earliest-stage stream. The official About page confirms €100M+ financed for European
      businesses, but no revenue or loan book figures have been disclosed publicly. Comparable European
      B2B neobanks that have published unit economics show subscription revenue at 50–65% of total
      revenue, interchange and transaction fees at 20–35%, and interest/credit income at 5–25%, a mix
      consistent with Qonto's estimated revenue composition as it matures its credit offering.
