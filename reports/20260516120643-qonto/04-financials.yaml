  - id: "cost-structure"
    title: "Cost Structure and Gross Margin"
    body: >
      Qonto's cost structure reflects the typical profile of an engineering-led, multi-country fintech
      operating a proprietary Core Banking System. Because Qonto does not publish audited financial
      statements, all cost estimates are derived from industry benchmarks, comparable company analysis,
      and publicly known operational facts (headcount, markets, product scope).

      Product and technology costs are estimated to represent the largest OpEx category at
      approximately 30–40% of total operating expenses. Qonto's 1,600–1,700 employees include a
      significant engineering population responsible for maintaining its proprietary Core Banking
      System (built since 2019), developing new product features across eight markets, and running the
      data and AI infrastructure that powers fraud detection, KYC automation, and expense
      categorisation capabilities. This infrastructure investment is a structural cost that creates
      long-run competitive advantage but weighs on near-term margins.

      Sales and marketing expenses are estimated at 20–25% of total OpEx. Qonto's strong NPS of 70+
      and word-of-mouth acquisition model structurally reduce the paid marketing spend required to
      acquire new customers compared to competitors reliant on digital advertising. However, expansion
      into Germany, Italy, Spain, and newer markets requires local brand investment, field sales for
      the enterprise segment (Qonto X), and partner channel development.

      Operations and customer support costs — covering multi-language (6-language) customer support,
      KYC/AML onboarding operations, payment operations, and card management — are estimated at
      approximately 20–25% of OpEx. These are semi-variable costs that scale with customer count and
      transaction volume but benefit from automation investments in AI-assisted onboarding and support.

      General and administrative costs (finance, HR, legal, management) are estimated at 8–12% of
      total OpEx. Compliance and regulatory costs (ACPR reporting, AML program management, EMI capital
      maintenance) add a further 5–10% that is characteristic of regulated financial institutions.
      The combination of a high-margin subscription base and low-cost payments processing suggests
      Qonto's gross margin structure is broadly comparable to European fintech peers that have
      published results, such as Wise (60–75% gross margin on its technology segment) and Starling
      Bank (positive gross margin on net interest income and fees). The primary gross margin headwind
      remains card interchange costs and SEPA infrastructure fees, which compress the net revenue
      contribution from transaction streams.
