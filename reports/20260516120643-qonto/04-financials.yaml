  - id: "unit-economics"
    title: "Unit Economics and Pricing Efficiency"
    body: >
      Qonto's unit economics profile reflects a B2B SaaS-adjacent business with payments and financial
      services characteristics: high gross margins relative to pure banking, strong recurring revenue,
      and unit acquisition costs that benefit from organic and word-of-mouth channels. However, the
      complete unit economics picture is not publicly available, and all estimates carry low confidence
      until confirmed in a data room.

      Annual Revenue Per User (ARPU) is the foundational unit economics metric for Qonto's
      subscription model. Based on the estimated €200M+ ARR and a customer base of approximately
      500,000–600,000 active accounts, the implied blended ARPU is approximately €300–450 per account
      per year. This range is consistent with a subscription mix weighted toward Smart (€228/year) and
      Premium (€468/year) plans, with a long tail of Basic-plan customers (€108/year) and a smaller
      but high-ARPU Qonto X enterprise cohort. Transaction-based revenues (interchange, SEPA fees)
      are additive to the subscription ARPU baseline.

      Customer Acquisition Cost (CAC) is not publicly disclosed by Qonto. Industry benchmarks for
      European B2B neobanks suggest CACs ranging from €50 to €150 per customer depending on channel
      mix. Qonto's reported NPS of 70+ and its emphasis on word-of-mouth and referral acquisition
      suggest a blended CAC toward the lower end of the range, potentially €80–120. This structural
      cost advantage compared to paid-acquisition-led competitors significantly improves the LTV/CAC
      ratio. The estimated LTV/CAC ratio of 8–15x is derived from a three-year cumulative ARPU of
      approximately €1,000–1,200 (growing year-over-year via plan upgrades and usage expansion)
      divided by an estimated CAC of €80–120.

      Gross margin is estimated at 65–75% based on the SaaS-plus-payments comp set. The primary cost
      of goods sold (COGS) components are card processing fees charged by Mastercard and card
      processors (typically 0.5–1.5% of GMV), SEPA and SWIFT infrastructure costs (including payment
      rail fees and safeguarding account costs), and variable KYC/onboarding costs. These are
      partially offset by the float income spread retained by Qonto above the amount passed to
      customers.

      Net Revenue Retention (NRR) is not publicly disclosed by Qonto. For comparable B2B SaaS-adjacent
      businesses, best-in-class NRR ranges from 105–130%, driven by plan upgrades and usage-based fee
      expansion. Qonto's tiered pricing structure (with natural upgrade paths from Basic to Smart to
      Premium to Qonto X) and expanding add-on product suite suggest NRR above 100%, but this requires
      cohort-level data room confirmation. The CAC payback period is estimated at 12–18 months based on
      industry benchmarks for comparable European B2B fintech businesses, though Qonto's reliance on
      organic acquisition may imply a materially shorter payback period than paid-acquisition peers.
