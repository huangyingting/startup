  evidenceGaps:
    - type: "private-evidence-only"
      severity: "blocking"
      topic: "financials"
      missingEvidence: >
        Qonto has never published audited financial statements. The EUR 200M+ ARR figure reported in
        specialist press originates from CEO statements, not public filings. There is no independently
        verified revenue, EBITDA, net income, or cash-flow data available from public sources.
      whyItMatters: >
        Without audited financials, no defensible DCF or comparables-based valuation can be performed.
        The profitability claim cannot be magnitude-quantified or reconciled against historical burn rates
        without a P&L.
      diligencePath: >
        Request FY2022, FY2023, and FY2024 audited P&L and balance sheet, management accounts for
        Q1-Q2 2026, and an ARR bridge by market and cohort.
      relatedQuestionRefs:
        - "QI003"
        - "QI004"
        - "QI013"

    - type: "private-evidence-only"
      severity: "material"
      topic: "unit-economics"
      missingEvidence: >
        Customer acquisition cost, monthly churn rate by plan tier, lifetime value, net revenue retention,
        and payback period have not been publicly disclosed. Estimates in this chapter are derived from
        peer benchmarks and are subject to significant uncertainty.
      whyItMatters: >
        Unit economics at the plan-tier level determine whether growth is capital-efficient and whether
        the subscription revenue base is durable given SMB structural churn.
      diligencePath: >
        Request cohort retention curves by plan tier and market, blended CAC by acquisition channel,
        LTV by tier, NRR, and plan upgrade/downgrade rates for the trailing 12 months.
      relatedQuestionRefs:
        - "QI007"
        - "QI008"
        - "QI021"
        - "QI027"
      relatedTableRefs:
        - "TI003"

    - type: "stale"
      severity: "material"
      topic: "valuation"
      missingEvidence: >
        The most recent primary equity valuation of EUR 4.4B dates to January 2022. No secondary
        transaction, new primary round, or independent mark has been confirmed since then. Growth-stage
        fintech multiples have compressed significantly in 2022-2026.
      whyItMatters: >
        If Qonto requires a new capital raise for banking licence requirements, the reset valuation
        could be materially lower than the 2022 series price, creating dilution risk for existing
        investors.
      diligencePath: >
        Request cap table with latest fair-value mark if available, secondary-market transaction data,
        and the full banking-licence capital requirement model.
      relatedQuestionRefs:
        - "QI018"
        - "QI019"
        - "QI020"
      relatedTableRefs:
        - "TI004"
