company:
  name: "Qonto"
chapter:
  number: 4
  letter: "I"
  title: "Financials"
  summary: >
    Qonto's revenue model combines recurring subscription fees (Basic €9/month, Smart €19/month, Premium
    €39/month), card interchange from its Mastercard partnership, SEPA/SWIFT transfer fees, FX commissions,
    embedded financing interest (Pay Later at 1.17%/month), add-on module fees, and balance remuneration
    income. With 600,000+ customers and a CEO-confirmed profitability milestone in 2023, the theoretical
    subscription ARR alone is €144-180M; industry reporting suggests total ARR exceeded €200M by 2024-2025.
    The company raised ~€622M across five rounds through January 2022 (last primary round: €486M Series D
    at €4.4B valuation) and states no new equity raise is required to fund banking licence capital
    requirements. Primary diligence blockers are the absence of audited financial statements, an unverified
    €200M+ ARR claim, a stale 2022 valuation, and undisclosed churn/unit economics data.

