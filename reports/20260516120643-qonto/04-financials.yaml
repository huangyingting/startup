  claims:
    - id: "CI001"
      statement: >-
        Qonto's primary revenue stream is monthly subscription fees across its tiered plans (Basic
        \u20ac9/mo, Smart \u20ac19/mo, Premium \u20ac39/mo, and custom Qonto X), providing predictable, recurring
        revenue that scales with customer count.
      type: "observed"
      topic: "revenue-model"
      sourceRefs:
        - SI022
        - SI011
      confidence: "high"
      freshness: "current"
      answersQuestionRefs:
        - "QI001"
        - "QI002"
    - id: "CI002"
      statement: >-
        Qonto earns card interchange income on Mastercard business card transactions at approximately
        0.2\u20130.5% of card GMV, consistent with Mastercard interchange rates for EU commercial cards
        under the Interchange Fee Regulation cap of 0.3% for credit and 0.2% for debit.
      type: "estimated"
      topic: "revenue-model"
      sourceRefs:
        - SI022
        - SI006
      confidence: "medium"
      freshness: "current"
      answersQuestionRefs:
        - "QI003"
    - id: "CI003"
      statement: >-
        Qonto charges SEPA transfer fees above the free monthly allowance (e.g., 20 SEPA/month on
        Basic, 30 on Smart) and SWIFT international transfer fees starting at approximately \u20ac5 per
        outgoing transfer, representing a moderate per-transaction revenue contribution.
      type: "observed"
      topic: "revenue-model"
      sourceRefs:
        - SI022
        - SI011
      confidence: "high"
      freshness: "current"
      answersQuestionRefs:
