callouts:
  - calloutType: "strength"
    title: "Proprietary CBS and Deep Integration Moat"
    body: >
      Qonto's self-built Core Banking System in operation since 2019, combined with 4,791 documented
      accounting integrations, creates a technical and commercial moat that would require any competitor years
      to replicate. By building its own CBS, Qonto eliminated the BaaS middleware dependency that constrains
      most neobank competitors and gained the ability to iterate on core financial product features at its own
      pace. The DATEV, Pennylane, Sage, Exact, and QuickBooks integrations create deep workflow lock-in for
      the SMB finance stack: once an accountant and SMB are both embedded in the Qonto plus DATEV workflow,
      the cost of switching to a competitor that lacks equivalent integration depth is prohibitively high. No
      direct competitor neobank including Revolut Business (fewer than 50 direct integrations), Wise Business
      (no accounting-grade integrations), or N26 Business (no published integration ecosystem) comes close to
      matching Qonto's integration breadth as of May 2026.
    claimRefs:
      - CE011
      - CE025
      - CE036

  - calloutType: "risk"
    title: "Cloud and KYC Vendor Concentration Risk"
    body: >
      Qonto's entire workload runs on a single cloud provider (AWS), and its customer onboarding depends on
      an unnamed third-party KYC provider. An AWS EU region outage, which has occurred historically, directly
      impacts Qonto's payment processing, card operations, and customer-facing applications. The undisclosed
      card processing vendor introduces a further concentration risk in the authorisation and settlement layer:
      the specific processor SLA and failover arrangements are not publicly available for investor scrutiny.
      The unnamed KYC provider adds regulatory dependency: any compliance failure by the KYC vendor, or a
      vendor outage, could halt all new customer onboarding and trigger ACPR scrutiny. In addition, ISO 27001
      and SOC 2 Type II certification status are unconfirmed from public sources, representing a procurement
      barrier for enterprise customers that require certified security governance as a condition of supplier
      approval.
    claimRefs:
      - CE012
      - CE015
      - CE024
      - CE026

