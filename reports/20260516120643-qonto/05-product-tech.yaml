  - id: "technology-architecture"
    title: "Technology Architecture and Operating Model"
    body: >
      Qonto operates a vertically integrated technology stack, with its own Core Banking System (CBS) at the
      foundation. Built in-house since 2019 after the company outgrew third-party CBS vendors, the proprietary
      CBS handles transaction processing, ledger management, account lifecycle, and real-time reconciliation
      without external dependency on a vendor's release cycle. This is the single most significant technical
      differentiator among European B2B neobanks: competitors such as N26 and Tide rely on licensed CBS
      software or BaaS platforms, while Qonto owns its core.

      The CBS runs on cloud infrastructure with containerised workloads, consistent with Kubernetes
      orchestration as inferred from engineering job descriptions referencing container technologies and
      DevOps tooling. The API layer is RESTful and documented at developers.qonto.com; it supports OAuth 2.0
      authentication and server-side webhooks for real-time account event notifications. The front-end
      clients — iOS (Swift), Android (Kotlin), and web (React/TypeScript) — connect to the API gateway.
      Ruby on Rails has been cited in Qonto engineering job postings as the primary back-end language
      alongside Go for performance-critical services, though the full stack has not been officially
      published by the company.

      Payments processing uses SEPA Instant Credit Transfer (SCT Inst) for near-real-time euro transfers
      within the Single Euro Payments Area and SWIFT for international wire transfers. Card processing runs
      through the Mastercard network, with 3D Secure 2 (EMV 3DS2) implemented for card-not-present
      authentication. The platform architecture also embeds the Regate accounting engine (acquired March
      2024) for AP/AR automation and integrates the Penta and Kontist technology bases (both acquired 2022)
      for German-market onboarding and freelancer banking flows.
