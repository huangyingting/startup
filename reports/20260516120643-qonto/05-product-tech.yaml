  evidenceGaps:
    - type: "private-evidence-only"
      severity: "material"
      topic: "technology-architecture"
      missingEvidence: >
        Qonto's Core Banking System (CBS) internals, architecture decisions, and technical debt are not
        publicly documented. The CBS is described as proprietary and self-built since 2019, but no technical
        audits, uptime SLA guarantees, or architecture diagrams are publicly available.
      whyItMatters: >
        CBS reliability is foundational to Qonto's ability to operate at scale and add new product modules.
        Technical debt in the CBS could slow innovation or create operational incidents at scale.
      diligencePath: >
        Request a technical architecture review session with Qonto's CTO and engineering leads; obtain
        historical uptime data and incident post-mortems.
      relatedQuestionRefs:
        - "QE011"
        - "QE016"

    - type: "private-evidence-only"
      severity: "material"
      topic: "security-certification"
      missingEvidence: >
        ISO 27001 and SOC 2 Type II certification status are not publicly confirmed for Qonto. Third-party
        security audit reports and penetration test results are not publicly available.
      whyItMatters: >
        Absence of recognised security certification is a procurement barrier for enterprise customers and a
        diligence gap for institutional investors assessing operational risk.
      diligencePath: >
        Request ISO 27001 or SOC 2 certificate (if held), most recent penetration test summary, and security
        governance committee charter in investor data room.
      relatedQuestionRefs:
        - "QE024"

    - type: "private-evidence-only"
      severity: "minor"
      topic: "credit-risk"
      missingEvidence: >
        Qonto's credit underwriting methodology, loan book size, default rates, and recovery processes for
        Qonto Credit (launched 2024) are not publicly disclosed. The 100M+ financed figure is from the About
        page with no breakdown by product type, risk tier, or market.
      whyItMatters: >
        Credit risk is a new operational dimension for Qonto that was absent pre-2024. Without loan book
        quality data, it is impossible to assess whether Qonto Credit is a credit risk that could require
        unexpected provisioning or capital.
      diligencePath: >
        Request outstanding loan book by product (pay-later vs. term loans vs. RBF), default rate, provision
        coverage, and capital allocation for credit products.
      relatedQuestionRefs:
        - "QE030"

