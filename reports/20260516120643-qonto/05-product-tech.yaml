  - id: "integrations-trust"
    title: "Integrations, Trust, and Compliance"
    body: >
      Qonto operates under ACPR payment institution licence CIB 16958, granted 21 June 2018, which is the
      foundational regulatory credential enabling payment services across all 8 EU operating markets under
      PSD2 passporting rights. PSD2 Strong Customer Authentication (SCA) is implemented across all
      transactions, including 3DS2 for card payments, satisfying EBA regulatory technical standards. A notable
      adverse event: a June 2025 Paris court ruling ordered Qonto to reimburse 672,139 euros to the French
      Modern Pentathlon Federation following a 2023 fraud incident attributed in part to inadequate
      push-notification SCA procedures, a specific historical gap that Qonto has since addressed.

      GDPR compliance is documented in Qonto's Privacy Policy (legal.qonto.com/en/privacy), covering EU data
      residency, data subject rights, DPA agreements with third-party processors, and breach notification
      obligations. The AML/CFT programme is ACPR-approved and includes KYC at onboarding, ongoing transaction
      monitoring, and SAR filing obligations. ISO 27001 and SOC 2 Type II certification status are not
      confirmed from publicly available sources as of May 2026, representing a material diligence gap for
      enterprise customer procurement and institutional investor review.

      On the integration side, Qonto's ecosystem of 4,791 integrations across DATEV, Pennylane, Sage, Exact,
      QuickBooks, and Zapier is significantly ahead of any direct competitor neobank, creating deep workflow
      lock-in for the SMB finance stack. Qonto's critical external dependencies including AWS, Mastercard,
      SEPA/ECB rails, ACPR, KYC providers, and accounting ISVs are mapped in the dependency figure below;
      any disruption to these dependencies would materially affect Qonto's ability to serve customers.
