sections:
  - id: "product-definition"
    title: "Product Definition and Customer Workflow"
    body: >
      Qonto is an all-in-one finance platform designed to consolidate the combination of a traditional
      business bank account, corporate card programme, invoicing software, expense management tool, and
      accounting integration layer into a single subscription for European SMEs and freelancers. The customer
      workflow begins with a fully digital onboarding process: a business or freelancer creates an account
      online or via the iOS/Android app, completes identity verification (KYC) through document upload and
      video or selfie checks, and receives a European IBAN within minutes to hours. From that point, the
      customer manages all financial activity from a single Qonto dashboard.

      Day-to-day, customers use an EU IBAN for incoming transfers and direct debits, issue Mastercard
      virtual cards immediately and physical cards within days, initiate SEPA Instant or SWIFT international
      transfers, capture receipts via mobile OCR matched to card transactions, and generate and send invoices
      that are automatically reconciled with account movements. For accounting-intensive users, Qonto exports
      transactions, VAT codes, and document images directly to DATEV, QuickBooks, Pennylane, and Google
      Sheets, eliminating manual data entry. The spend analytics dashboard surfaces cash-flow trends, VAT
      summaries, team-level breakdowns, and budget alerts in real time.

      The workflow is intentionally linear and low-friction: Qonto replaces multi-vendor complexity with a
      single subscription, a single log-in, and a single API surface. The platform is built mobile-first but
      offers full feature parity between mobile (iOS, Android) and web browser, differentiating it from
      legacy tools that treat mobile as a read-only companion. The NPS of 70+ confirms strong customer
      satisfaction with both the product and the delivery channel.
    claimRefs:
      - CE001
      - CE002
      - CE007
      - CE024
      - CE031
      - CE032
      - CE036
