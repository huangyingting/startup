  - id: "technology-architecture"
    title: "Technology and Operating Architecture"
    body: >
      Qonto's technology stack is structured in six layers, from customer-facing interfaces down to cloud and
      compliance infrastructure. At the top, browser-based and iOS/Android mobile applications built on a
      React frontend deliver the Qonto product in six languages across all operating markets. Below that,
      Qonto's own REST API (documented at developer.qonto.com) exposes 50+ endpoints with OAuth 2.0
      authentication and versioned releases, enabling third-party integrations and enterprise automation
      without introducing breaking changes for existing API consumers.

      The architectural centrepiece is Qonto's proprietary Core Banking System (CBS), built in-house since
      2019 without reliance on Banking-as-a-Service middleware providers. The CBS handles the full transaction
      processing lifecycle: account ledger management, balance calculation, payment initiation, and
      reconciliation. This proprietary design eliminates a category of third-party infrastructure dependency
      common among neobank competitors, and enables Qonto to iterate on core financial product features at its
      own pace. On top of the CBS, Qonto's payment rails layer connects to SEPA Instant (ECB network), SEPA
      Credit Transfer, and SWIFT for international transfers, and the Mastercard scheme for card issuance and
      processing. The specific card-issuing processor used for Mastercard authorisation and settlement is not
      publicly disclosed.

      Cloud infrastructure is provided entirely by Amazon Web Services (AWS), confirmed by the AWS case study
      for Qonto. Qonto operates workloads in EU AWS regions consistent with GDPR data residency requirements
      with multi-availability-zone deployments. The StackShare profile for Qonto confirms Ruby on Rails for
      the backend, PostgreSQL as the primary database, and Datadog for monitoring. A dedicated data and AI
      layer handles transaction categorisation, fraud detection, spend analytics, and AI-powered invoice OCR.
      Finally, the compliance layer encompasses the ACPR-approved AML/CFT programme, a third-party KYC
      provider (not publicly named), and GDPR-compliant data handling procedures. The KYC provider dependency
      represents a high-risk concentration point: any disruption to the provider would directly halt Qonto's
      new customer onboarding flow.
    claimRefs:
      - CE011
      - CE012
      - CE013
      - CE014
