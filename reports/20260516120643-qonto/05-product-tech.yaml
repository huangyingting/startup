  - id: "trust-security-compliance"
    title: "Trust, Security, and Compliance"
    body: >
      Qonto holds ACPR payment institution licence CIB 16958, granted on 21 June 2018, which authorises it
      to provide payment services across the EU via passporting and requires 100% of customer funds to be
      safeguarded in segregated accounts at regulated credit institutions. As of May 2026, Qonto safeguards
      customer deposits at Crédit Mutuel Arkéa, Société Générale, Natixis, and Rothschild Martin Maurel —
      four diversified counterparties, reducing concentration risk. These funds are ring-fenced from
      Qonto's own operating capital and are not exposed to Qonto's balance sheet.

      Card security is implemented via Mastercard 3D Secure 2 (EMV 3DS2) for card-not-present transactions
      and standard EMV chip verification for physical card payments. Virtual card numbers are unique per
      merchant for subscription management, limiting exposure in any single merchant breach. Customers can
      freeze or unfreeze cards, set per-transaction limits, and disable categories via the mobile app in
      real time.

      Data protection: Qonto processes personal and financial data under GDPR across all 8 EU operating
      countries, with privacy policy and data processing agreements published at legal.qonto.com. The EU
      e-invoicing product is certified under applicable EU directive requirements, enabling legally compliant
      VAT-reporting e-invoices. As of May 2026, Qonto has not publicly disclosed ISO 27001 or SOC 2 Type II
      certifications, representing a material diligence gap. PCI DSS compliance is implied by the Mastercard
      programme but no public attestation is available. No major platform data breach or security incident
      has been publicly documented; the main adverse event is the June 2025 court order requiring Qonto
      to reimburse €672,139 to the French Modern Pentathlon Federation following a social-engineering fraud
      incident — a customer fraud case, not a platform compromise.
    claimRefs:
      - CE016
      - CE018
      - CE019
      - CE020
      - CE021
      - CE022
      - CE029
      - CE037
    tableRefs:
      - TE004

