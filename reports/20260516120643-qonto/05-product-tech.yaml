  - id: "deployment-integrations-roadmap"
    title: "Deployment, Integrations, and Roadmap"
    body: >
      Qonto is fully SaaS-delivered with no on-premise component. Customers access the platform via web
      browser or native iOS/Android apps. The iOS app carries a 4.7+ App Store rating and the Android app
      a comparable Google Play rating, reflecting strong customer satisfaction with the mobile delivery
      channel. Platform reliability is monitored on a public status page at status.qonto.com, tracking
      uptime for core services including accounts, payments, cards, and the API.

      The integration ecosystem covers 4,791 third-party connectors as of May 2026, spanning accounting
      suites (DATEV for Germany, QuickBooks, Pennylane, FEC export for France), productivity tools (Google
      Sheets, Zapier, Make), ERP connectors (Xero, Sage), and HR/payroll connectors. Qonto's public REST
      API enables custom integrations and is documented at developers.qonto.com with an OpenAPI schema,
      sandbox environment, and client libraries. Webhooks deliver real-time notifications for account events
      such as incoming transfers, card authorisations, and invoice payments, enabling automated finance
      workflows. Qonto's GitHub organisation (github.com/qonto) publishes open-source libraries including
      API client helpers and integration tooling.

      Roadmap signals visible from public sources include: (a) the full banking licence application (ACPR,
      July 2025), which would enable deposit remuneration, credit products, and embedded lending;
      (b) the physical POS terminal launched May 2025, entering the in-person merchant payments market;
      (c) multi-currency accounts and AI-driven expense categorisation referenced in 2025 product
      communications and engineering job postings. No formal public roadmap with specific release dates has
      been published by Qonto.
