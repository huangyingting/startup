  - id: "competitive-differentiation"
    title: "Competitive Differentiation and IP"
    body: >
      Qonto's primary technology moat is its proprietary Core Banking System. Owning the CBS means Qonto
      can modify transaction routing, fee structures, reconciliation logic, and new product features without
      waiting for a third-party vendor release cycle. Competitors using licensed or BaaS-delivered CBS
      (Treezor, Solarisbank, Banking Circle) are constrained by vendor roadmaps and data portability limits.
      This advantage compounds over time: every year Qonto operates its CBS, the engineering team's
      institutional knowledge of the codebase deepens and the moat widens.

      A second differentiator is the Mastercard partnership, which provides card programme economics
      (interchange income) and access to Mastercard's global merchant acceptance network, 3DS fraud
      infrastructure, and commercial card programme capabilities including B2B virtual card and lodged card
      products. This partnership is a licensed arrangement requiring certification and ongoing compliance,
      creating a structural barrier for new entrants who must independently negotiate similar card network
      contracts.

      Third, Qonto's ACPR payment institution licence (CIB 16958) and pending full banking licence
      application represent regulatory IP requiring years of compliance investment that would take new
      entrants 18–36 months to replicate. The banking licence, if granted, would expand the moat further
      by enabling deposit interest, credit, and savings products unavailable to payment institutions.

      On data and integration: Qonto's 4,791-connector ecosystem and API-first architecture create switching
      costs as customers embed Qonto into their accounting and ERP workflows. The deeper the integration,
      the higher the friction and cost to migrate to a competing platform. The Regate acquisition (2024)
      deepened the AP/AR automation capability, extending the integration moat into finance function
      automation at a level that pure neobanks without an accounting layer cannot easily replicate.
    claimRefs:
