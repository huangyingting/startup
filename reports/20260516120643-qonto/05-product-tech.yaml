      - FE002

  - id: "product-module-map"
    title: "Product Module Map and SKU Overview"
    body: >
      Qonto's commercial offering is organised across three subscription tiers plus optional add-on modules.
      The Basic plan (€9/month) covers a European IBAN, one Mastercard physical card, SEPA transfers, and
      basic expense tracking. The Smart plan (€19/month) adds virtual card issuance, multi-user account
      access with role-based permissions, and deeper accounting integrations. The Premium plan (€39/month)
      extends to unlimited virtual cards, priority support, advanced analytics, and higher transfer limits.
      An Enterprise tier covers multi-entity management, API-level access, and dedicated account management
      at custom pricing.

      Add-on modules sold separately include advanced cash flow management (real-time forecasting, multi-
      account consolidation) and accounts receivable automation (automated reminders, payment tracking,
      Regate-powered reconciliation). The full product module map spans: (1) Business Accounts — EU IBAN,
      multi-currency support, sub-accounts; (2) Corporate Cards — Mastercard debit and credit, virtual and
      physical, up to €400,000/month per team; (3) Payments — SEPA Instant Credit Transfer, SEPA Direct
      Debit, SWIFT international; (4) Invoicing — outgoing invoices, EU-certified e-invoicing; (5) Expense
      Management — receipt capture via mobile OCR, multi-level approval workflows, team budgets; (6) AP
      Automation — supplier invoice ingestion, payment scheduling; (7) Accounting Integrations — 4,791
      third-party connectors; (8) Cash Flow — real-time treasury view, cash forecast, multi-account
      aggregation; (9) POS Terminal — physical payment terminal launched May 2025.
    claimRefs:
