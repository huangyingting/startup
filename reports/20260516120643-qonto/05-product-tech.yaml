chapter:
  number: 5
  letter: "E"
  title: "Product & Technology"
  summary: >
    Qonto offers nine mature product modules covering business banking, cards, expense management, certified EU
    e-invoicing, accounting integrations (4,791 partners), embedded credit, payroll, and a developer API. The
    technology foundation is a proprietary Core Banking System (CBS) built in-house since 2019, running on AWS
    cloud infrastructure across EU regions. Key differentiators are the depth of SME workflow integration, the
    breadth of accounting ISV partnerships (DATEV, Pennylane, Sage, Exact), and certified EU e-invoicing
    leadership across all 8 operating markets. The product roadmap includes Qonto Credit expansion, AI-powered
    accounting automation launched in 2025, progression of the full banking licence application filed with ACPR
    in May 2025, and deepening of the Netherlands and Belgium presence in 2026. Key technology risks include
    AWS and KYC vendor concentration, unconfirmed ISO 27001 and SOC 2 Type II certification, and the
    emergence of credit risk as Qonto Credit scales beyond its 2024 launch.

sections:
  - id: "product-definition"
    title: "Product Definition and Customer Workflow"
    body: >
      Qonto defines its product as an all-in-one finance management platform specifically designed for European
      SMBs and freelancers. Unlike a general-purpose bank account, Qonto's product is built around the daily
      operational workflows of small business owners: paying suppliers, managing team expenses, creating and
      sending invoices, reconciling accounting, and accessing short-term credit. The customer journey begins at
      onboarding, where an SMB or freelancer can open a business account and receive a dedicated European IBAN
      in under five minutes online, bypassing the two-to-four weeks typically required by incumbent French and
      German banks using in-branch processes and paper documentation.

      Once onboarded, the primary workflow for a typical SMB follows a structured loop. The business account
      serves as the central hub, receiving deposits and incoming SEPA transfers in real time with instant
      notifications. Outgoing payments are made via SEPA Instant (completing in under 10 seconds), standard
      SEPA Credit Transfer, or SWIFT for international suppliers, all initiated from the Qonto web or mobile
      application. Team expenses are managed through individual physical or virtual Mastercard business cards
      issued per employee, with finance managers able to set per-card spending limits, block or unblock cards
      instantly, and capture receipts via mobile OCR — eliminating the shared single card and paper receipt
      workflows prevalent in small teams.

      For invoicing, Qonto provides certified EU e-invoicing (PDF, UBL, and Factur-X formats) that complies
      with France's B2B e-invoicing mandate and Italy's SDI system, allowing freelancers and SMBs to issue
      invoices directly from the application and automate payment reminders. Accounting reconciliation is
      handled through direct integrations with DATEV (Germany), Pennylane (France), Sage, Exact, and
      QuickBooks, with auto-categorisation applied to all transactions, cutting monthly reconciliation time from
      an estimated eight to sixteen hours to under two hours for a typical SMB. The most recent addition to the
      customer workflow is Qonto Credit, which allows qualifying SMBs to access pay-later, term loans, and
      revenue-based financing directly into their Qonto account, completing the finance workflow without
      leaving the platform.
    claimRefs:
      - CE006
      - CE007
      - CE008
      - CE009
      - CE010
    tableRefs:
      - TE002
    figureRefs:
      - FE002

  - id: "product-modules"
    title: "Product Module and Asset Map"
    body: >
      Qonto's product suite as of May 2026 comprises nine distinct modules, each targeting a specific pain
      point in the SMB finance stack. The core module is the business account with a dedicated European IBAN,
      available across all 8 operating markets (France, Germany, Italy, Spain, Austria, Belgium, Portugal,
      Netherlands) with real-time balance notifications and safeguarded deposits under ACPR rules. Building on
      this, IBAN and SEPA transfer functionality spans SEPA Instant Credit Transfer (under 10 seconds),
      standard SEPA Credit Transfer (SEPA SCT), and SWIFT for international payments, with bulk payment
      upload via CSV available on all paid plans.

      Mastercard business cards are issued per employee on all plans above the Basic single-user tier,
      including both physical and virtual card variants, with custom per-card spending limits, real-time freeze
      and unblock controls, and integrated receipt capture. The expense management module layers approval
      workflows and auto-categorisation atop the card infrastructure, available from the Smart plan (3 users)
      upward. Invoicing and certified EU e-invoicing extends Qonto into the accounts-receivable workflow:
      certified in all 8 markets, covering PDF, UBL, and Factur-X formats, with automatic payment reminders.

      The payroll module, currently in a growth and beta stage, enables payroll disbursement directly from the
      Qonto account with integration hooks to payroll providers, though geographic rollout is not yet complete
      across all markets. Qonto Credit (launched 2024) covers pay-later, term loans, and revenue-based
      financing for SMBs with 10 to 250 employees, representing the company's first foray into on-balance-sheet
      credit origination. Accounting integrations encompassing DATEV, Pennylane, Sage, Exact, QuickBooks, and
      Zapier automations across 4,791 documented integrations constitute one of Qonto's most durable
      competitive advantages. The REST API (50+ endpoints, OAuth 2.0, webhook notifications) rounds out the
      product map, available to Premium and Qonto X plan subscribers and forming the foundation of Qonto's
      developer ecosystem.
    claimRefs:
