        July 2025 announcement. ACPR decisions are not published in real time and IPO plans are speculative.
      whyItMatters: >
        The banking licence and IPO trajectory are two of the most consequential near-term events for Qonto's
        capital structure, valuation, and product scope. Without confirmation, diligence models carry high
        scenario variance.
      diligencePath: >
        Request ACPR correspondence on banking licence application status; confirm CEO statements on IPO
