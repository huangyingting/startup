chapter:
  number: 5
  letter: E
  title: "Product & Technology"
  summary: >
    Qonto's product platform centres on an in-house Core Banking System (CBS) built since 2019, which eliminates
    external CBS vendor dependencies and enables faster feature iteration than competitors reliant on licensed
    systems. The platform spans business accounts with EU IBAN, Mastercard debit and credit cards (up to
    €400,000/month), SEPA Instant and SWIFT transfers, EU-certified e-invoicing, AP/AR automation, expense
    management, and 4,791 third-party integrations across 8 EU countries on a subscription model. The July 2025
    ACPR banking licence application, if approved, would unlock deposit remuneration and credit products,
    materially expanding the product surface and revenue potential.

