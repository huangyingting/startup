  evidenceGaps:
    - type: "missing-source"
      severity: "material"
      topic: "security"
      missingEvidence: >
        Qonto does not publicly disclose ISO 27001, SOC 2 Type II, or PCI DSS attestations on its
        trust page or in any publicly accessible document. Absence of public disclosure leaves the
        security certification posture unverifiable from public sources alone.
      whyItMatters: >
        Security certifications are standard requirements for enterprise customer procurement and
        institutional investor diligence. Without independent audit attestation, it is not possible
        to assess whether Qonto's information security controls meet industry benchmarks or
        regulatory best practice for a regulated financial institution.
      diligencePath: >
        Request ISO 27001 certificate, SOC 2 Type II report, and PCI DSS Attestation of Compliance
        (AoC) directly from Qonto management in the data room. If unavailable, request the date of
        last independent security audit and the auditor's identity.
      relatedQuestionRefs:
        - QE012

    - type: "private-evidence-only"
      severity: "material"
      topic: "CBS"
      missingEvidence: >
        Qonto has not published a technical whitepaper, architecture document, or sufficiently
        detailed engineering blog post describing its CBS ledger design, payment processing pipeline,
        settlement flows, reconciliation logic, or disaster recovery provisions at a level adequate
        for technical due diligence.
      whyItMatters: >
        The in-house CBS is Qonto's primary technology moat. Without architecture documentation,
        a diligence team cannot assess the robustness of the CBS, identify single points of failure,
        evaluate disaster recovery (RTO/RPO), confirm multi-region or active-active failover, or
        benchmark design choices against industry standards such as ISO 20022 or PCI DSS.
      diligencePath: >
        Request a technical architecture overview of the CBS covering ledger design, transaction
        processing pipeline, disaster recovery provisions (RTO/RPO targets and test results), and
        any third-party dependency within the core payment processing chain. Also request historical
        uptime statistics and two to three post-incident review samples.
      relatedQuestionRefs:
        - QE017
        - QE021

    - type: "stale"
      severity: "material"
      topic: "banking-licence"
      missingEvidence: >
        The ACPR full banking licence application was submitted in July 2025, but no public update on
        its review status, expected decision timeline, or any ACPR queries or conditions has been
        found in sources available as of May 2026.
      whyItMatters: >
        The banking licence would substantially expand Qonto's product capabilities and revenue
        potential. If it is denied or delayed beyond 2026, all roadmap items dependent on it —
        deposit remuneration, credit products, embedded lending — cannot proceed, which may
        materially affect the investment thesis and terminal valuation.
      diligencePath: >
        Request management confirmation of the current ACPR process status including documentation
        submitted, any queries raised by ACPR, expected timeline, and any informal indications of
        conditions or supplementary requirements. Cross-reference with ACPR public consultation
        records and any correspondence that can be disclosed.
      relatedQuestionRefs:
        - QE024

    - type: "missing-source"
      severity: "minor"
      topic: "tech-stack"
      missingEvidence: >
        Qonto's official technology stack has not been publicly disclosed. Programming languages,
        frameworks, database technology, and cloud provider choice are inferred from job postings
        and open-source repository activity, which may be incomplete, outdated, or unrepresentative
        of production architecture.
      whyItMatters: >
        Understanding the production tech stack is important for assessing engineering scalability,
        technical debt risk, and integration friction from acquired companies (Penta, Kontist,
        Regate) which may have differing stacks. Incorrect inferences could lead to flawed risk
        assessments of the CBS or mobile platform.
      diligencePath: >
        Request a technology overview from Qonto engineering leadership covering primary languages,
        frameworks, cloud provider, database technology, CBS runtime, and mobile framework choices.
        Cross-reference with recent engineering job description analysis and any public tech talks.
      relatedQuestionRefs:
        - QE026

    - type: "missing-source"
      severity: "minor"
      topic: "competitive-differentiation"
      missingEvidence: >
        Detailed technical comparisons of Qonto's CBS capabilities against Revolut Business (which
        also operates a proprietary infrastructure), N26 (uses Mambu CBS), or Tide (uses Banking
        Circle) are not publicly available in sufficient depth to assess the relative magnitude of
        Qonto's CBS moat.
      whyItMatters: >
        Without rigorous technical comparison, assessing the CBS moat rests on inference rather than
        direct evidence. If competitors' technical capabilities are closer to Qonto's than assumed,
        the differentiation argument and associated valuation premium weaken.
      diligencePath: >
        Commission a technical due diligence deep-dive comparing Qonto's CBS to at least two
        competitor architectures using published job descriptions, tech blogs, engineering talks,
        and regulatory filings. Request Qonto's own internal competitive technical analysis from
        the data room.
      relatedQuestionRefs:
        - QE025
