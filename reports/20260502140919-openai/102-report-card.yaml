topStrengths:
  - >-
    OpenAI combines 900M+ weekly active users, 50M+ subscribers, 9M+ paying business users, and 1M+
    businesses, which is exceptionally rare for a private software company.
  - >-
    The platform spans consumer subscriptions, business workspaces, Codex, APIs, agents, and workflow
    automation rather than depending on a single product surface.
  - >-
    Public customer proof now includes operational case studies across ecommerce, engineering, banking,
    manufacturing, media, food distribution, and sports organizations.
  - >-
    Enterprise appears to represent more than 40% of revenue, which supports a more durable mix than a purely
    consumer AI business.
  - >-
    OpenAI has unmatched strategic capital access, including the $122B close at an $852B post-money valuation
    and multiple hyperscaler/strategic relationships.
  - >-
    Product breadth is reinforced by official security, privacy, compliance, and admin-control surfaces that
    improve enterprise adoption credibility.
  - >-
    The company has real global workflow adoption rather than simple logo collection, with quantified case
    studies from Wayfair, Rakuten, STADLER, Choco, Axios, and VfL Wolfsburg.
topRisks:
  - >-
    $852B post-money valuation implies about 35.5x annualized revenue run rate using the public $2B monthly
    anchor, leaving limited room for execution misses.
  - >-
    OpenAI still does not publicly disclose gross margin, NRR, GRR, churn, concentration, burn, or full
    partner-economics sensitivity.
  - >-
    Governance remains unusual because the business is controlled through the OpenAI Foundation / OpenAI Group
    PBC structure.
  - >-
    Legal and privacy pressure remains active, including the New York Times-related data preservation dispute
    and broader model-training litigation risk.
  - >-
    Compute economics and cloud-partner dependence remain difficult to underwrite despite OpenAI's scale and
    strategic relationships.
  - >-
    Workflow reliability matters more as OpenAI moves into connectors, actions, and agentic execution;
    operational incidents can affect trust even when core models perform well.
  - >-
    Frontier AI regulation is tightening, especially under the EU AI Act and related safety/compliance
    expectations for GPAI providers.
unresolvedGaps:
  - ARR is not separately disclosed from the public revenue run-rate anchor.
  - Revenue growth percentage is not underwritable from the retained public evidence set.
  - Gross margin, contribution margin, and cloud/partner take rates are not publicly disclosed.
  - NRR, GRR, logo churn, and cohort retention are not publicly disclosed.
  - >-
    Total cumulative funding is not reconciled from retained evidence beyond the latest disclosed financing
    marks.
  - Company headcount is not retained as a validated current metric in the evidence ledger.
  - >-
    Audited revenue quality, customer concentration, partner economics, cap-table preferences, and litigation
    reserve detail still require private diligence.
