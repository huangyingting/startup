schemaVersion: startup-diligence-report-v2
artifact: market-macro
slug: openai
runDate: '2026-05-02'
company:
  name: OpenAI
  website: https://openai.com/
chapter:
  number: 2
  title: Market Sizing & Macro Analysis
  summary: >
    OpenAI sits inside a generative-AI market that is still being defined across overlapping layers: consumer AI
    assistants, enterprise productivity software, developer tools, model APIs, and agentic workflow automation. External
    market estimates vary widely but still support a large and fast-growing category, while OpenAI's own disclosures
    imply near-term commercialization is already material: 500M weekly ChatGPT users in 2025, 900M+ weekly active users
    in 2026, and 9M+ paying business users. The opportunity is attractive, but budget conversion still depends on
    governance, ROI proof, workflow redesign, and risk-management readiness.
  claimRefs:
    - C021
    - C022
    - C023
    - C025
    - C026
callouts:
  - type: opportunity
    title: The near-term prize is not "all AI spend" but high-frequency knowledge work.
    body: >
      OpenAI's strongest market wedge is recurring, high-frequency workflows across coding, data analysis, research,
      search, and agentic task execution. That puts its practical SAM closer to software, cloud, and labor-augmentation
      budgets than to a single monolithic "AI market" number.
    claimRefs:
      - C024
      - C025
      - C027
      - C028
  - type: risk-alert
    title: Adoption can outrun procurement readiness.
    body: |
      NIST's generative-AI risk profile underscores that governance, testing, misuse prevention,
      accountability, and implementation controls can materially slow enterprise rollout even when model
      capability is improving quickly. OpenAI's market capture therefore depends on change-management and
      trust conversion, not only model quality.
    claimRefs:
      - C023
      - C030
tables:
  - id: T201
    title: Market definition and included spend
    columns:
      - Lens
      - Included spend
      - Excluded spend
      - Why it matters for OpenAI
    rows:
      - - Consumer AI assistant market
        - Paid ChatGPT-style subscriptions, search, media generation, and prosumer productivity
        - Pure advertising-supported search, generic consumer internet usage without AI monetization
        - OpenAI already has 50M+ subscribers and uses consumer scale as a workplace distribution channel.
      - - Developer AI tooling market
        - Coding agents, API consumption, inference services, and model-powered software tooling
        - Traditional non-AI dev tools not yet displaced or augmented by model usage
        - Codex and API usage make developer budgets a core monetization pool.
      - - Enterprise AI productivity and workflow software
        - Knowledge-work copilots, workspace agents, analytics, customer support, and internal workflow automation
        - Broader SaaS spend with no AI layer or no model workload
        - ChatGPT Business, Enterprise, and agents compete directly for software and labor-productivity budgets.
      - - AI infrastructure and model platform
        - Model access, token usage, containers, tool calls, data residency, and enterprise platform controls
        - Semiconductor manufacturing or hyperscaler capex not monetized through OpenAI
        - OpenAI captures value through API, tools, and platform economics without owning all underlying compute.
      - - Public-sector and regulated deployment
        - >-
          Government, healthcare, education, and regulated-enterprise use cases where trust, compliance, and security
          matter
        - General-purpose experimentation without procurement or compliance pathway
        - OpenAI's compliance posture expands SAM but also raises adoption friction.
    notes: >-
      OpenAI participates across several adjacent markets; using one umbrella TAM number would overstate the precision
      of the opportunity and understate budget-pool differences.
    claimRefs:
      - C024
      - C027
      - C028
      - C029
