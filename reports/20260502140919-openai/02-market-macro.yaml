sections:
  - number: '2.1'
    title: Market definition
    body: |
      OpenAI's addressable market is best treated as an overlap between consumer AI assistance, developer
      tooling, enterprise productivity software, and agentic workflow automation. A single generic "AI TAM"
      is too blunt because the actual budget owners differ: individuals, engineering teams, CIO functions,
      and regulated buyers each evaluate ROI and risk differently.
    claimRefs:
      - C024
      - C027
      - C028
  - number: '2.2'
    title: Sizing lenses and why they differ
    body: |
      Third-party market estimates vary significantly, with Grand View Research sizing the global generative
      AI market at $22.21B in 2025 and $324.68B by 2033, while Mordor Intelligence sizes it at $21.1B in
      2025 and $126.66B by 2031. The spread itself is informative: the category boundary is still moving.
      For OpenAI, the more useful question is whether real usage is converting into software and workflow
      budgets faster than analyst models can refresh.
    claimRefs:
      - C021
      - C022
      - C025
  - number: '2.3'
    title: Practical SAM for OpenAI
    body: |
      OpenAI's practical SAM is not the entire generative-AI industry. It is the subset of spend where users
      repeatedly need reasoning, coding, search, data analysis, content generation, and agentic task
      execution. The company explicitly targets those workflows through Business, Enterprise, API, Codex,
      and agent products, which means it can monetize both seat-based and usage-based software budgets.
    claimRefs:
      - C024
      - C025
      - C027
      - C028
  - number: '2.4'
    title: Growth drivers
    body: |
      The strongest demand accelerants are OpenAI's distribution advantage, agentic workflow expansion, and
      multi-layer monetization. Consumer familiarity reduces awareness friction at work; coding and data
      analysis create daily-use cases; and API plus tools pricing lets OpenAI capture spend from builders
      even when customers do not standardize on ChatGPT seats.
    claimRefs:
      - C024
      - C026
      - C027
      - C028
  - number: '2.5'
    title: Adoption constraints and market attractiveness
    body: |
      The market is attractive, but adoption is not frictionless. NIST's generative-AI risk profile shows
      why governance, testing, accountability, and implementation controls can slow enterprise deployment.
      That constraint matters because OpenAI increasingly depends on regulated and enterprise workflows for
      margin-rich growth. The result is an attractive market with excellent category momentum, but one where
      trust conversion and ROI proof remain gating factors.
    claimRefs:
      - C023
      - C026
      - C030
