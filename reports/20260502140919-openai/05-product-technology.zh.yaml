  - id: T505
    title: 安全、隐私与合规矩阵
    columns:
      - 控制领域
      - 公开锚点
      - 覆盖产品
      - 投资解读
      - 尽调请求
    rows:
      - - 数据训练控制
        - 默认不使用企业数据训练
        - API、Business、Enterprise、Edu、Healthcare、Teachers
        - 是企业采用的核心前提
        - 需要合同条款、例外和执行机制细节。
      - - 保留控制
        - 自定义保留与按请求提供的 zero data retention
        - API 与企业产品
        - 对监管与隐私敏感场景很重要
        - 按地区与功能面核实。
      - - 身份与管理
        - SAML SSO、MFA、SCIM、RBAC、domain verification、admin console
        - Business 与 Enterprise
        - 大客户采购的竞争性必要条件
        - 需要管理负担、审计能力和预配流程证据。
      - - 合规姿态
        - SOC 2 Type 2、ISO 27001/27017/27018/27701、ISO 42001、PCI-DSS、CSA STAR
        - API 与 business 服务
        - 相比许多 AI 原生厂商，当前信任姿态较强
        - 需要在尽调中直接确认覆盖范围和证书最新状态。
      - - 隐私法与行业支持
        - 支持 GDPR、CCPA、HIPAA、FERPA，并提供 DPA 与 BAA
        - Business 与 API 产品
        - 扩大受监管市场的可进入性
        - 需明确哪些功能在行业范围内，哪些不在。
      - - 透明度与治理
        - 政府请求、儿童安全、DSA 报告，以及 trust portal
        - 企业信任项目
        - 表明围绕部署形成了更成熟的治理层
        - 需要证据证明审核与政策运营能跟上产品扩张。
    notes: OpenAI 的信任姿态是一项战略资产。剩余问题不是“是否有控制”，而是这些控制能否在每个 connector、 agent 和数据边界上稳定生效。
    claimRefs:
      - C055
      - C056
      - C057
      - C058
  - id: T506
    title: 可靠性与实施表
    columns:
      - 领域
      - 证据
      - 含义
      - 关注点
    rows:
      - - API 可用性
        - 12 个 API 组件的 99.99% uptime
        - 开发者工作负载在头部指标上很可靠
        - 聚合 uptime 可能掩盖模型级或套餐级差异。
      - - ChatGPT 可用性
        - 12 个 ChatGPT 组件的 99.80% uptime
        - 产品在大规模上总体可靠
        - 低于 API，且更容易暴露 connector/admin 复杂性。
      - - Codex 可用性
        - 5 个组件的 99.98% uptime
        - 编码产品在头部指标上接近平台级可靠性
        - 需要高价值工作流级别的事故细节。
      - - FedRAMP 组件
        - 1 个组件的 99.93% uptime
        - 表明公共部门准备工作已在运营化
        - 留存证据对具体范围仍较稀少。
      - - 当前事件
        - ChatGPT workspace connector write actions 出现多日部分中断
        - 说明 OpenAI 正在运营真实的跨工具动作系统，而不只是只读检索
        - connector actions 与 approvals 是实时运营风险面。
    notes: 总体可靠性看起来不错，但当前连接器事件提醒我们：agent 平台会继承其所编排工具的脆弱性。
    claimRefs:
      - C059
