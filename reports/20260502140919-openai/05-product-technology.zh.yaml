        - 让 ChatGPT 更容易嵌入现有工作流，并提高切换成本
        - 需要完整 connector 目录和动作级可用性。
      - - ChatGPT 消费级与专业面
        - Canva、Spotify、PDF、演示文稿、表格
        - ChatGPT overview
        - 表明 OpenAI 正在从纯聊天扩展到文档与应用工作流
        - 需要这些触面的企业权限模型。
      - - Workspace agents
        - 跨 tickets、documents 与 messaging 的工具动作
