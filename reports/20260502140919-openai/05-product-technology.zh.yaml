schemaVersion: startup-diligence-report-v2
artifact: product-technology
slug: openai
runDate: '2026-05-02'
company:
  name: OpenAI
  website: https://openai.com/
chapter:
  number: 5
  title: 产品与技术
  summary: >
    OpenAI 现在更像一个全栈 AI 平台，而不是单一模型供应商。其产品面覆盖消费级 ChatGPT、Business 工作区、Enterprise 控制层、工作区智能体、编码代理、多模态
    API、部署工具，以及信任/合规基础设施。技术护城河 来自广度与开发者采用，但同样的广度也带来更大的运营面，连接器可靠性、管理工具和治理能力必须同步提升。
  claimRefs:
    - C050
    - C053
    - C054
    - C057
    - C059
callouts:
  - type: key-insight
    title: OpenAI 的产品优势在于把终端工作流软件与开发者平台绑在一起。
    body: |
      ChatGPT、Codex、工作区智能体与 API 平台彼此强化。OpenAI 已不再只是卖模型，而是在把编排、界面、集成与企业控制能力打包成一个统一的运行栈。
    claimRefs:
      - C050
      - C052
      - C054
      - C055
      - C056
  - type: risk-alert
    title: 产品广度提高了治理与可靠性要求。
    body: |
      OpenAI 正在销售连接器、agent actions、语音、管理控制台、审计能力与合规控制。公开状态页已经显示了
      真实的 connector write 中断，这提醒我们：运营一个跨工具代理平台，比交付一个聊天界面难得多。
    claimRefs:
      - C057
      - C059
tables:
  - id: T501
    title: 产品模块矩阵
    columns:
      - 模块
      - 主要用户
      - 可用性证据
      - 核心能力
      - 差异化
      - 尽调缺口
    rows:
      - - ChatGPT 核心助手
        - 消费者与专业人士
        - ChatGPT overview 页面
        - 通用助手，具备 GPT-5.4 以及 Deep Research、apps、PDF、演示文稿和表格等能力
        - 在留存证据中拥有最强的顶层分发与用户熟悉度
        - 需要按功能族查看使用与转化队列。
      - - ChatGPT Business / Enterprise
        - 团队与大型企业
        - Business overview 与 pricing 页面
        - 共享工作区、高级模型、管理控制、集成、record mode、shared projects 与 custom workspace GPTs
        - 它打包销售生产力特性与治理，而不仅是模型接口
        - 需要更清晰的功能分层和大规模管理负担说明。
      - - Workspace agents
        - 运营、销售、IT、财务、产品团队
        - Workspace agents 页面
        - 共享代理可跨工具运行定期工作流，并具备调度、审批与监控
        - 把 OpenAI 向上推到工作流自动化层
        - 仍处于预览阶段，生产成熟度尚未公开。
      - - Codex
        - 开发者与工程团队
        - Business overview 与 ChatGPT overview 页面
        - 在工作区栈中生成、审查并执行代码
        - 将编码留在 OpenAI 更广的工作流内，而非独立工具链
        - 需要针对编码工作流的采用、质量与安全控制数据。
      - - API 平台
        - 开发者与产品团队
        - API 平台页面
        - Frontier 模型、多模态输入、Agent Builder、Agents SDK、ChatKit、evals 与 fine-tuning
        - 把模型访问与编排原语、部署辅助结合在一起
        - 需要更多关于延迟、租户隔离与生产级隔离的细节。
      - - Realtime 与语音栈
        - 客服与对话式产品构建者
        - API 平台页面
        - 基于 Realtime API 构建语音代理和实时交互
        - 将 OpenAI 从文本扩展到更低延迟的交互面
        - 需要各模态下的 SLA 与成本性能取舍。
    notes: 该产品地图说明 OpenAI 正在围绕模型销售工作流、控制层和部署工具。这扩大了护城河，也扩大了实施负担。
    claimRefs:
      - C050
      - C052
      - C053
      - C054
