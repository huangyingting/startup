sections:
  - number: '5.1'
    title: 产品范围与平台方向
    body: |
      OpenAI 的产品范围已经从聊天界面和 API 扩展为更广的运行栈。当前公开面包括 ChatGPT、ChatGPT Business
      与 Enterprise、Codex、工作区智能体、已连接应用，以及带有智能体构建与部署原语的开发者
      平台。其战略意义在于：OpenAI 可以同时在终端工作流层与基础设施层捕获价值。
    claimRefs:
      - C050
      - C053
      - C054
  - number: '5.2'
    title: 技术护城河
    body: |
      其技术护城河并不主要来自某一个孤立模型特性，而是来自产品系统设计。OpenAI 把模型访问、用户界面、
      连接器、agent 编排、评估工具和企业控制层放在同一栈中。这带来采用杠杆，并提高切换成本，尤其是在客户
      同时使用 ChatGPT 工作区和 API 平台时。
    claimRefs:
      - C051
      - C052
      - C054
  - number: '5.3'
    title: 安全、隐私与合规姿态
    body: |
      OpenAI 现在展示出相当成熟的企业信任面：默认不使用企业数据训练、保留控制、SAML SSO、MFA、SCIM、
      RBAC、SOC 2 Type 2、多项 ISO 认证、ISO 42001、CSA STAR、PCI-DSS，以及隐私法支持。对于一个相对
      年轻的 AI 平台来说，这一位置很强，但投资人仍需要确认各证书的覆盖范围，以及这些控制能否在各产品面上
      一致运行。
    claimRefs:
      - C055
      - C056
      - C057
      - C058
  - number: '5.4'
    title: 可靠性与运营风险
    body: |
      公开状态页显示 API、ChatGPT 与 Codex 都具备较强的聚合可用性，但同时也暴露了一个影响 ChatGPT
      workspace actions 的 connector-write 实时事件。这一点很关键，因为 OpenAI 最新的战略层——可跨工具
      执行动作的 agents——也同步扩大了失败面。可靠性必须在 connector 和 action 层面判断，而不仅是模型端点层面。
    claimRefs:
      - C059
  - number: '5.5'
    title: 产品结论
    body: |
      OpenAI 的产品平台异常广，并且越来越具备企业就绪度。核心上行在于，公司可以同时变现模型、工作流与开发者
      工具。核心产品风险在于，公司如今必须运营一个复杂的多表面平台，其中治理、connector 深度和动作可靠性
      与模型质量同样重要。
    claimRefs:
      - C050
      - C054
      - C057
      - C059
