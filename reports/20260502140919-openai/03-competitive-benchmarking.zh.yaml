chapter:
  number: 3
  title: 竞争格局基准分析
  summary: >
    OpenAI 同时在多个战场竞争：高端消费者助手、开发者 API、企业 copilot、编程智能体，以及工作流自动化。 直接对标对象横跨
    Anthropic、Google、Microsoft，以及不断增强的开放权重替代方案。OpenAI 的优势在于 产品与分发广度；风险则在于竞争对手能够把相近能力捆绑进现有软件套件，或者用更低成本的开放模型压缩其定价权。
  claimRefs:
    - C031
    - C032
    - C033
    - C034
    - C037
callouts:
  - type: key-insight
    title: OpenAI 的优势在于生态广度，而不是某一个孤立功能。
    body: |
      OpenAI 同时覆盖消费者分发、企业工作区产品、API 工具、编程智能体和快速扩展中的企业栈。竞争对手通常 通过一个主要切入点进入——套件捆绑、企业安全，或低成本模型——而不是同样的全栈组合。
    claimRefs:
      - C031
      - C032
      - C033
      - C034
      - C035
  - type: risk-alert
    title: 开源 / 开放权重与套件捆绑会同时压缩定价权。
    body: |
      BenchLM 这类独立榜单以及各家官方价格页说明，竞争压力来自两端：开放权重模型挑战 API 溢价，
      而 Microsoft 和 Google 则能依托更大的生产力套件与企业采购关系进行捆绑。
    claimRefs:
      - C036
      - C037
      - C038
