        - 官方价格页显示了较低的商业入门价格和包含式企业聊天
        - 需要测试 OpenAI 被买作第二套 AI 栈的频率，而非标准平台。
      - - 开放权重商品化
        - 更便宜的替代会压缩 API 与编程利润率
        - 独立榜单突出低成本开放权重挑战者
