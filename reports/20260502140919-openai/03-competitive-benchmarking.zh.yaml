      - - 能力收敛
        - 对手现在都在卖 agents、coding 和企业治理
        - Anthropic、Google 和 Microsoft 官方页面都呈现明显功能重叠
        - 差异化必须建立在工作流深度与采用质量，而非 checklist。
      - - 采购碎片化
        - 买方可能标准化到套件 AI，同时允许少量专家工具并存
        - Copilot 与 Gemini 都嵌在更大的生产力生态里
        - 需要验证 OpenAI 能否成为 system of record，而非侧挂工具。
      - - 执行面过宽
        - OpenAI 同时覆盖消费者、企业、API 与智能体产品
        - 广度是护城河，同时也是管理负担
        - 需要追踪按产品面的毛利率、路线图优先级和产品一致性。
    notes: OpenAI 的护城河仍然真实，但并非垄断式。竞争持续性取决于它能否在抵御捆绑与商品化压力的同时，持续保持显著的质量与工作流优势。
