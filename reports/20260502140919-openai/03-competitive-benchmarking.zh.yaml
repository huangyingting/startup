sections:
  - number: '3.1'
    title: 竞争格局
    body: |
      OpenAI 的竞争对手并不是单一的某个前沿模型实验室。Anthropic 是在编程、API 与企业工作流中最直接的替代；
      Google 与 Microsoft 则通过套件分发和管理员控制竞争；开放权重模型则通过成本与可部署性竞争。这意味着
      OpenAI 面对的是一场多线作战，而不是简单的双寡头竞争。
    claimRefs:
      - C031
      - C032
      - C033
      - C036
  - number: '3.2'
    title: 定价与打包
    body: |
      官方价格页表明，OpenAI 并不靠“最低价格”获胜。它的 ChatGPT Business 为每用户每月 25 新元；
      Anthropic Team 为每席位每月 20 美元（年付）；Google Gemini Business 起价每席位每月 21 美元；
      Microsoft 365 Copilot Business 则是每用户每月 18 美元（年付）。因此，OpenAI 需要靠产品广度与
      工作流 ROI 来证明其溢价定位。
    claimRefs:
      - C031
      - C032
      - C033
      - C034
  - number: '3.3'
    title: 差异化与切换成本
    body: |
      OpenAI 的核心差异化在于广度：同一供应商覆盖消费者使用、Business 工作区、Enterprise 部署、编程智能体、
      API 工具和按使用量计费的开发者变现。客户一旦同时使用多个触面，切换成本会提高；但如果竞争套件能够在
      现有合同和管理员系统内提供“足够好”的 AI，切换壁垒就会被削弱。
    claimRefs:
      - C031
      - C035
      - C037
  - number: '3.4'
    title: 套件捆绑与开放权重压力
    body: |
      最关键的反向证据并不是某一个对手在所有维度都更强，而是买方越来越容易获得更便宜或更嵌入式的替代方案。
      Microsoft 可以把 Copilot 捆进 Microsoft 体系，Google 可以把 Gemini 捆进 Workspace 和 Cloud，
      开放权重模型则在成本或主权更重要时压缩定价空间。
    claimRefs:
      - C033
      - C034
      - C036
      - C038
  - number: '3.5'
    title: 定位结论
    body: |
      当客户希望用同一供应商同时覆盖消费者分发、企业工作区 AI、API 访问，以及编程/智能体工作流时，
      OpenAI 仍然是当前最强的定位者。但竞争风险在于市场可能分裂：套件厂商赢下捆绑生产力，专业玩家赢下
      安全或编程场景，开放权重模型赢下价格。OpenAI 的护城河可信，但若没有持续的产品领先，也并不安全。
    claimRefs:
      - C031
      - C035
      - C036
      - C038
