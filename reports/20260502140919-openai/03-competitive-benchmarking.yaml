  - id: T305
    title: Moat durability and competitive risk register
    columns:
      - Risk
      - Why it matters
      - Current evidence
      - Mitigant or diligence ask
    rows:
      - - Suite bundling pressure
        - Google and Microsoft can hide AI cost inside larger contracts
        - Official pricing pages show low business-seat entry points and included enterprise chat
        - Test how often OpenAI is bought as a second AI stack versus standard platform.
      - - Open-weight commoditization
        - Cheaper alternatives pressure API and coding margins
        - Independent benchmark sources highlight low-cost open-weight challengers
        - Measure whether OpenAI keeps a quality edge on high-value tasks after adjusting for cost.
      - - Capability convergence
        - Competitors now all market agents, coding, and enterprise controls
        - Official pages across Anthropic, Google, and Microsoft show rapid feature overlap
        - Differentiate on workflow depth and adoption, not checklist parity.
      - - Procurement fragmentation
        - Buyers may standardize on suite AI while allowing limited specialist usage
        - Copilot and Gemini both embed in wider productivity ecosystems
        - Determine whether OpenAI can become the system of record rather than a sidecar.
      - - Execution sprawl
        - OpenAI spans consumer, enterprise, API, and agent products simultaneously
        - Breadth is a moat but also a managerial burden
        - Track product coherence, gross margin by surface, and roadmap prioritization.
    notes: >-
      OpenAI's moat is still real, but it is not monopoly-like. Competitive durability depends on maintaining a
      meaningful quality and workflow advantage while defending against bundling and commoditization.
    claimRefs:
      - C031
      - C033
      - C036
      - C037
      - C038
