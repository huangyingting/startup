sections:
  - number: '3.1'
    title: Competitive landscape
    body: |
      OpenAI's competitive set cannot be reduced to one frontier-model rival. Anthropic is the cleanest direct
      substitute in coding, API, and enterprise workflows; Google and Microsoft compete through suite
      distribution and admin control; and open-weight models compete on cost and deployability. This means
      OpenAI is fighting a multi-front war rather than a simple two-player race.
    claimRefs:
      - C031
      - C032
      - C033
      - C036
  - number: '3.2'
    title: Pricing and packaging
    body: >
      Official pricing pages show that OpenAI does not dominate by price alone. Its ChatGPT Business plan is

      SGD 25 per user per month, while Anthropic Team is $20 per seat per month annually, Google's Gemini

      Business edition starts at $21 per seat per month, and Microsoft 365 Copilot Business starts at $18 per

      user per month paid yearly. OpenAI therefore needs product breadth and workflow ROI to justify premium
      positioning.
    claimRefs:
      - C031
      - C032
      - C033
      - C034
  - number: '3.3'
    title: Differentiation and switching costs
    body: |
      OpenAI's core differentiator is breadth: one provider covers consumer usage, business workspaces,
      enterprise deployment, coding agents, API tools, and usage-based developer monetization. Switching
      costs rise when customers use several of those surfaces together, but they remain vulnerable if rival
      suites can offer "good enough" AI inside existing contracts and admin systems.
    claimRefs:
      - C031
      - C035
      - C037
  - number: '3.4'
    title: Bundling and open-weight pressure
    body: |
      The most important adverse evidence is not that one rival is strictly better on all dimensions; it is
      that buyers increasingly have cheaper or more embedded alternatives. Microsoft can bundle Copilot into
      the Microsoft estate, Google can bundle Gemini into Workspace and Cloud, and open-weight models can
      compress pricing where sovereignty or cost matters more than absolute quality.
    claimRefs:
      - C033
      - C034
      - C036
      - C038
  - number: '3.5'
    title: Positioning verdict
    body: |
      OpenAI still looks best positioned where customers want one vendor for consumer distribution, enterprise
      workspace AI, API access, and coding/agent workflows. The competitive risk is that the market may split:
      incumbents win on bundled productivity, specialists win on security or coding, and open-weight models
      win on price. OpenAI's moat remains credible, but it is not safe without continued product leadership.
    claimRefs:
      - C031
      - C035
      - C036
      - C038
