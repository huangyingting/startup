evidenceGaps:
  - gap: >-
      OpenAI does not publicly disclose gross margin, contribution margin, or detailed cloud partner economics in
      retained sources.
    impact: high
    diligencePath: >-
      Request management reporting that breaks out API, consumer, and enterprise gross margin plus revenue-share and
      hosting obligations by partner.
  - gap: Headcount, functional mix, and geographic staffing are not disclosed in retained public sources.
    impact: medium
    diligencePath: Request current org chart, employee count, contractor count, and hiring plan by major function and region.
  - gap: >-
      Public sources do not provide a full current cap table, liquidation stack, or warrant-by-warrant dilution schedule
      after the recapitalization and 2026 close.
    impact: high
    diligencePath: Review the full capitalization table, board consents, warrant terms, and side letters tied to strategic investors.
  - gap: >-
      Customer concentration, retention, burn, and cash-flow quality remain opaque despite strong disclosed top-line
      scale.
    impact: high
    diligencePath: Request cohort retention, top-customer exposure, net revenue, CAC, burn, runway, and compute purchase commitments.
  - gap: >-
      A clean SAM for OpenAI within enterprise software, developer tooling, and regulated-workflow budgets is not
      directly published in retained sources.
    impact: high
    diligencePath: >-
      Build a bottom-up SAM from seat counts, developer spend, and workflow-specific software budgets across coding,
      analytics, support, and operations.
  - gap: Geography-level adoption and monetization splits are not disclosed in retained evidence.
    impact: medium
    diligencePath: Request regional revenue, enterprise seat mix, and usage distribution by major geography.
  - gap: >-
      Retained sources do not quantify what share of OpenAI enterprise usage is experimentation versus
      production-critical workflow spend.
    impact: high
    diligencePath: Request cohort usage depth, deployment stages, expansion rates, and production versus pilot account counts.
  - gap: >-
      Retained evidence does not provide one apples-to-apples independent benchmark across OpenAI, Anthropic, Google,
      Microsoft, and open-weight models for the same enterprise workflow set.
    impact: medium
    diligencePath: >-
      Run a controlled benchmark pack across coding, analytics, agent orchestration, and enterprise search tasks using
      the current commercial plans.
  - gap: >-
      Public seat pricing does not capture discounting, enterprise contract bundling, or credits negotiated in large
      accounts.
    impact: medium
    diligencePath: Collect enterprise quote sheets and negotiated terms from reference customers or procurement teams.
  - gap: The exact share of OpenAI usage at risk from open-weight substitution is not visible in retained public sources.
    impact: high
    diligencePath: >-
      Break down developer and enterprise workloads by latency, privacy, and quality sensitivity to estimate where
      open-weight models are viable substitutes.
  - gap: Gross margin and contribution margin by consumer, enterprise, API, and coding surface are not publicly disclosed.
    impact: high
    diligencePath: Request segment-level P&L with hosting, partner share, support, and R&D allocations.
  - gap: CAC, LTV, payback, NRR, GRR, and logo churn are not publicly disclosed.
    impact: high
    diligencePath: Request go-to-market cohort economics and retention dashboards by product surface and segment.
  - gap: Burn, runway, and compute purchase commitments remain opaque despite huge financing rounds.
    impact: high
    diligencePath: Request monthly cash burn, capex or reserved compute commitments, debt terms, and liquidity forecast.
  - gap: >-
      OpenAI does not publicly document detailed production architecture, isolation boundaries, or model-serving
      topology across ChatGPT, Codex, and API tenants.
    impact: medium
    diligencePath: >-
      Request architecture diagrams covering model-serving isolation, control plane, data plane, and failure domains by
      product surface.
  - gap: >-
      Connector inventory, connector action coverage, and rollback or failure semantics are only partially visible from
      public pages.
    impact: high
    diligencePath: Request connector catalog, action matrix, approval model, and incident history for read and write actions.
  - gap: Workspace agents are in research preview, so production readiness and adoption benchmarks are not yet transparent.
    impact: medium
    diligencePath: Request GA roadmap, pilot conversion, error rates, admin burden, and customer references by workflow type.
  - gap: OpenAI does not publicly disclose NRR, GRR, churn, cohort retention, or revenue concentration.
    impact: high
    diligencePath: Request cohort retention, renewal, expansion, churn, and top-customer schedules by segment.
  - gap: Case studies are strong but may overrepresent successful deployments rather than the whole customer portfolio.
    impact: medium
    diligencePath: Request production-versus-pilot split, deployment failure rates, and customer-success funnel data.
  - gap: Support quality, escalation rates, and enterprise incident communication standards are not publicly quantified.
    impact: medium
    diligencePath: Request support SLAs, escalation metrics, RCA cadence, and major-incident communications examples by plan.
  - gap: >-
      OpenAI does not publicly disclose the detailed economics, caps, and downside sensitivity of Microsoft-related
      revenue share and cloud dependency.
    impact: high
    diligencePath: Request full partnership term summary, cap schedule, take-rate sensitivity, and contingency plans by cloud vendor.
  - gap: Ongoing litigation exposure and remaining governance review pathways are not fully visible from public materials.
    impact: high
    diligencePath: >-
      Request outside-counsel summary of material lawsuits, preservation orders, regulatory reviews, and potential
      remedies.
  - gap: >-
      Public reliability data is aggregate and does not reveal connector-level SLA attainment or enterprise-specific
      incident burden.
    impact: medium
    diligencePath: Request incident history, RCA archive, SLA credits, and reliability metrics by product surface and action type.
  - gap: Public materials do not disclose gross margin, contribution margin, burn, or free-cash-flow conversion.
    impact: high
    diligencePath: Request audited financial statements, gross-to-net bridge, and compute-plus-partner cost allocation by segment.
  - gap: Public evidence does not show NRR, GRR, churn, or customer concentration.
    impact: high
    diligencePath: Request retention cohorts, top-customer schedule, renewal calendar, and segment-level expansion metrics.
  - gap: >-
      IPO readiness remains directionally plausible but unverified on governance, internal controls, and
      minority-investor protections.
    impact: medium
    diligencePath: >-
      Request S-1 readiness materials, board and rights structure summary, auditor status, and preferred-share
      liquidation details.
