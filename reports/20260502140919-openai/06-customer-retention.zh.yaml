sections:
  - number: '6.1'
    title: 客户质量概览
    body: |
      OpenAI 的公开客户证据已经超越了模糊的企业叙事。公司现在展示了广泛的客户触达、大规模工作场景用户数，
      以及多个带有工作流级结果的具名部署。这足以支持一个结论：OpenAI 已经在企业生产力和嵌入式 AI 用例上
      获得了真实客户牵引。
    claimRefs:
      - C060
      - C061
      - C066
  - number: '6.2'
    title: 具名部署实际证明了什么
    body: |
      这些具名参考展示了不同模式。CyberAgent 和 STADLER 证明了知识工作场景中的高频员工使用。Wayfair 展示了
      带来显著自动化与数据质量改善的生产级运营嵌入。Rakuten 展示了工程和可靠性收益。TRUSTBANK 则证明了
      面向消费者推荐和多 agent 编排的价值。它们共同说明 OpenAI 并不依赖单一部署模式。
    claimRefs:
      - C062
      - C063
      - C064
      - C065
      - C066
  - number: '6.3'
    title: 留存信号与留存证明的区别
    body: |
      这里最重要的分析区分是：OpenAI 的扩张证据很强，但留存证明仍有限。高使用率、席位数和客户结果说明它
      确实有价值，但公司仍未公开 NRR、GRR、流失、集中度或组合层面的支持指标。投资人应把当前客户材料视为
      强有力的扩张证据，而不是队列耐久性的最终证明。
    claimRefs:
      - C062
      - C063
      - C067
  - number: '6.4'
    title: 客户风险信号
    body: |
      主要客户风险包括集中度不透明、试点到生产的转化不均，以及随着 OpenAI 深入 connectors 和可执行 agents，
      可靠性敏感度上升。实时的 workspace connector 事件表明，影响客户信任的不只是模型质量，也包括工作流执行
      质量与管理员体验。
    claimRefs:
      - C067
      - C068
  - number: '6.5'
    title: 客户结论
    body: |
      客户质量看起来很强，并且越来越具备企业级特征。OpenAI 现在已经拥有足够多的具名证据，支持“客户确实在用
      平台做真实工作”这一高置信度判断。未解决的问题是留存经济学：在公司披露续约、流失和集中度指标之前，客户
      质量应被评价为“强信号，但留存证明不完整”。
    claimRefs:
      - C060
      - C062
      - C063
      - C067
