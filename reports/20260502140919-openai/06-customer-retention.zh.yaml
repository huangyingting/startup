schemaVersion: startup-diligence-report-v2
artifact: customer-retention
slug: openai
runDate: '2026-05-02'
company:
  name: OpenAI
  website: https://openai.com/
chapter:
  number: 6
  title: 客户与留存质量
  summary: >
    OpenAI 的客户证据现在已经具备广度、全球性和越来越明确的结果导向。官方材料显示，超过 100 万家企业在使用 OpenAI，超过 900 万名付费企业用户在工作中依赖
    ChatGPT，并且在零售、制造、金融、科技与媒体等行业拥有 具名部署。证据的强项在于运营用例和使用强度信号；弱项在于公开留存、流失、NRR、GRR、集中度和支持质量指标 仍基本未披露。
  claimRefs:
    - C060
    - C061
    - C062
    - C063
    - C064
    - C065
callouts:
  - type: key-insight
    title: OpenAI 的客户基础看起来是真实且有规模的，而不只是 logo 墙。
    body: |
      留存的案例研究描述了生产级部署与具体结果：席位数、日常使用率、工单自动化、商品标签修正、时间节省和 MTTR 改善。这比许多早期 AI 厂商常见的品牌背书证据要强得多。
    claimRefs:
      - C060
      - C062
      - C063
      - C064
      - C065
      - C066
  - type: risk-alert
    title: 扩张证据强于留存证据。
    body: |
      OpenAI 会公开客户胜利和使用效果，但不会公开 NRR、流失、logo 留存、支持 SLA 或收入集中度。投资人可以
      得出“客户正在部署”的结论，但还不能得出“队列耐久性已被证明”或“大客户是否主导经济性”的结论。
    claimRefs:
      - C061
      - C067
      - C068
tables:
  - id: T601
    title: 客户增长与采用锚点
    columns:
      - 指标
      - 数值
      - 日期背景
      - 解读
      - 注意事项
    rows:
      - - 使用 OpenAI 的企业
        - 1,000,000+
        - 2026 年 customer stories 页面
        - 证明商业触达范围非常广
        - 企业数不等于付费合同数或留存收入账户数。
      - - 付费企业用户
        - 9,000,000+
        - 2026 年 2 月融资公告
        - 说明工作场景采用深度很高
        - 用户数不等于客户数；席位结构未知。
      - - Wayfair 企业席位
        - 1,200+
        - 2026 年 3 月案例研究
        - 展示了大席位部署潜力
        - 只是单个案例，不能代表整体平均值。
      - - CyberAgent 月活使用率
        - 93%
        - 2026 年 4 月案例研究
        - 表明内部参与度非常强
        - 为公司自报指标，不等于付费留存。
      - - STADLER 日活使用率
        - 85%+
        - 2026 年 3 月案例研究
        - 一旦嵌入工作流，产品黏性较强
        - 属于单一公司案例，且有明显自上而下推动。
    notes: OpenAI 确实给出了有意义的客户规模信号，但公开指标混合了 businesses、seats 和 users。它们支持采用强度， 但不构成干净的留存数学。
    claimRefs:
      - C060
      - C061
      - C062
      - C063
      - C066
  - id: T602
    title: 客户分层地图
    columns:
      - 细分
      - 代表客户
      - 区域
      - 用例
      - 客户质量信号
    rows:
      - - 大型企业运营
        - Wayfair
        - 北美
        - 商品目录增强、供应商支持、agent 工作流
        - 在数百万商品和 1200+ 企业席位上形成生产级部署。
      - - 大型企业工程
        - Rakuten
        - 亚太与大洋洲
        - 事故响应、CI/CD 审查、自主开发
        - 说明其支持的是安全敏感的技术工作流，而非轻量试验。
      - - 中型市场知识工作
        - CyberAgent
        - 亚太与大洋洲
        - 研究、起草、代码审查、文档、跨职能使用
        - 93% 月活率支持真实内部拉动。
      - - 中型工业生产力
        - STADLER
        - 欧洲与英国
        - 起草、摘要、翻译、结构化思考
        - 30-40% 节省时间与 85%+ 日活说明重复使用价值。
      - - 面向消费者的金融平台
        - TRUSTBANK
        - 亚太与大洋洲
        - 推荐 agent 与礼品发现个性化
        - 说明 OpenAI 支持的不只是员工 Copilot，也包括终端用户体验。
    notes: 客户证据横跨内部生产力、工程、工作流自动化和面向消费者的推荐系统。这种广度支持其在多个采购中心中具备 产品市场契合度。
    claimRefs:
      - C062
      - C063
      - C064
      - C065
      - C066
  - id: T603
    title: 具名客户证据与结果
    columns:
      - 客户
      - 产品面
      - 公开结果
      - 重要性
      - 证据质量
    rows:
      - - CyberAgent
        - ChatGPT Enterprise, Codex
        - 93% 月活率，覆盖几乎所有部门
        - 说明其是跨职能采用，而非狭窄试点
        - 高，因为明确披露了使用深度。
      - - Wayfair
        - API, ChatGPT Enterprise
        - 250 万标签修正、每月 4.1 万工单自动化、1200+ 席位
        - 展示了大规模运营部署及可量化流程效果
        - 高，因为披露了多项运营指标。
      - - Rakuten
        - Codex
        - MTTR 下降约 50%，项目周期从季度压缩到数周
        - 验证其在可靠性与软件交付工作流中的价值
        - 高，因为工作流与效果都很具体。
      - - STADLER
        - ChatGPT
        - 125+ custom GPTs、30-40% 时间节省、2.5x 更快初稿、>85% 日活
        - 说明在非技术知识工作中形成高频习惯使用
        - 高，因为结果与日常使用直接相关。
      - - TRUSTBANK
        - API-based agent 体验
        - 在 76 万礼品平台上，AI 辅助用户转化率更高
        - 展示了面向消费者的个性化价值
        - 中，因为转化改善为方向性描述，未量化幅度。
    notes: 最有价值的客户证据不是品牌背书，而是具体的运营杠杆。OpenAI 现在已经具备若干此类证据。
    claimRefs:
      - C062
      - C063
      - C064
      - C065
  - id: T604
    title: 留存、流失、满意度与支持指标
    columns:
      - 指标
      - 公开数值
      - 证据
      - 解读
      - 明确尽调请求
    rows:
      - - NRR
        - null
        - 没有公开留存指标
        - 核心扩张质量仍无法公开承销
        - 提供按 enterprise、mid-market 和 API 队列拆分的 NRR。
      - - GRR
        - null
        - 没有公开留存指标
        - logo 和收入耐久性都无法判断
        - 提供按队列划分的 GRR 与续约瀑布。
      - - Logo churn
        - null
        - 没有公开留存指标
        - 无法判断部署能否穿越采购与治理审查
        - 提供按细分和区域划分的年度 gross logo churn。
      - - CSAT / NPS
        - null
        - 没有公开留存指标
        - 案例研究暗示满意度，但支持质量未被量化
        - 提供按套餐拆分的 CSAT、NPS 与工单解决质量。
      - - 产品参与度
        - CyberAgent 93% MAU；STADLER >85% 日活
        - 官方案例研究
        - 一旦嵌入工作，使用强度很可观
        - 提供组合层面的 seat activation 与 weekly active usage 趋势。
      - - 支持工作流满意度
        - Wayfair 供应商满意度提高
        - 官方案例研究
        - 是积极信号，但未在整个客户群中标准化
        - 提供支持 SLA 达成率与升级率。
    notes: 公开客户证据展示的是使用与结果，而不是投资人通常需要的留存数学。
    claimRefs:
      - C062
      - C063
      - C067
  - id: T605
    title: 扩张驱动因素与集中度风险
    columns:
      - 驱动或风险
      - 证据
      - 投资解读
      - 尽调跟进
    rows:
      - - 多表面扩张
        - 客户会在不同职能中同时使用 ChatGPT、Enterprise、Codex、API 与 agents
        - 形成自然 upsell 路径与更强工作流黏性
        - 量化各账户的跨产品渗透率。
      - - 培训与赋能
        - CyberAgent 使用内部排名、Slack 提醒与 OpenAI 培训
        - 客户成功和赋能很可能对采用起到实质作用
        - 评估客户成功 playbook 与服务负担。
      - - 运营嵌入
        - Wayfair 和 Rakuten 把 OpenAI 嵌入核心工作流，而非旁路实验
        - 生产集成提高切换成本与参考价值
        - 请求披露收入中来自生产部署与试点部署的占比。
      - - 集中度不透明
        - 公共材料未披露前十大账户集中度
        - 在极高估值下，集中度不透明属于承销风险
        - 提供前十大客户清单和续约日历。
      - - 可靠性与 connector 信任
        - OpenAI 状态页显示 live workspace connector write disruption
        - agent 类产品可能提高支持负担与信任敏感度
        - 审查事故日志、connector 级 SLA 与企业沟通样本。
    notes: OpenAI 最强的扩张驱动是工作流广度与 developer/workspace 交叉销售。最大的隐藏风险则是客户集中度， 叠加仍不透明的留存指标。
    claimRefs:
      - C062
      - C063
      - C064
      - C067
      - C068
