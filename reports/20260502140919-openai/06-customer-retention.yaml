sections:
  - number: '6.1'
    title: Customer quality overview
    body: |
      OpenAI's public customer evidence has moved beyond vague enterprise aspiration. The company now shows broad
      customer reach, large workplace user counts, and multiple named deployments with workflow-level outcomes.
      That is enough to conclude that OpenAI has real customer traction across both business productivity and
      embedded AI use cases.
    claimRefs:
      - C060
      - C061
      - C066
  - number: '6.2'
    title: What the named deployments actually prove
    body: |
      The named references show several distinct patterns. CyberAgent and STADLER demonstrate habitual employee
      usage for knowledge work. Wayfair shows production operational embedding with material automation and data
      quality impact. Rakuten shows engineering and reliability gains. TRUSTBANK demonstrates consumer-facing
      recommendation and multi-agent orchestration. Together, these suggest OpenAI is not dependent on one single
      deployment pattern.
    claimRefs:
      - C062
      - C063
      - C064
      - C065
      - C066
  - number: '6.3'
    title: Retention evidence versus retention proof
    body: |
      The main analytical distinction is that OpenAI has strong expansion evidence but limited retention proof.
      High usage rates, seat counts, and customer outcomes imply value, but the company still does not publicly
      disclose NRR, GRR, churn, concentration, or portfolio-level support metrics. Investors should treat current
      customer materials as strong top-of-funnel and expansion evidence, not as final proof of cohort durability.
    claimRefs:
      - C062
      - C063
      - C067
  - number: '6.4'
    title: Customer risk signals
    body: |
      The main customer risks are concentration opacity, uneven pilot-to-production conversion, and reliability
      sensitivity as OpenAI moves deeper into connectors and action-taking agents. The live workspace connector
      incident shows that trust can be affected not only by model quality, but also by workflow execution quality
      and admin experience.
    claimRefs:
      - C067
      - C068
  - number: '6.5'
    title: Customer verdict
    body: |
      Customer quality appears strong and increasingly enterprise-grade. OpenAI now has enough named proof to
      support a high-confidence view that customers are deploying the platform for real work. The unresolved
      question is retention economics: until the company discloses renewal, churn, and concentration metrics,
      customer quality should be rated as "strong signal, incomplete retention proof."
    claimRefs:
      - C060
      - C062
      - C063
      - C067
