schemaVersion: startup-diligence-report-v2
artifact: customer-retention
slug: openai
runDate: '2026-05-02'
company:
  name: OpenAI
  website: https://openai.com/
chapter:
  number: 6
  title: Customer Retention & Quality
  summary: >
    OpenAI's customer proof is now broad, global, and increasingly outcome-specific. Official materials point to more
    than 1 million businesses using OpenAI, 9 million paying business users, and named deployments across retail,
    manufacturing, finance, technology, and media. The strength of the evidence lies in operational use cases and
    adoption signals; the weakness is that public retention, churn, NRR, GRR, concentration, and support quality metrics
    remain largely undisclosed.
  claimRefs:
    - C060
    - C061
    - C062
    - C063
    - C064
    - C065
callouts:
  - type: key-insight
    title: OpenAI's customer base appears real and scaled, not just logo-decorated.
    body: >
      The retained case studies describe production deployments with concrete outcomes: seat counts, daily usage, ticket
      automation, catalog corrections, time savings, and MTTR reduction. That is materially stronger than the logo walls
      typical of earlier-generation AI vendors.
    claimRefs:
      - C060
      - C062
      - C063
      - C064
      - C065
      - C066
  - type: risk-alert
    title: Expansion evidence is stronger than retention evidence.
    body: |
      OpenAI publicly shows customer wins and usage outcomes, but not NRR, churn, logo retention, support SLAs,
      or revenue concentration. Investors can conclude that customers are deploying; they cannot yet conclude how
      durable the cohorts are or whether the largest accounts dominate the economics.
    claimRefs:
      - C061
      - C067
      - C068
tables:
  - id: T601
    title: Customer growth and adoption anchors
    columns:
      - Metric
      - Value
      - Date context
      - Interpretation
      - Caveat
    rows:
      - - Businesses using OpenAI
        - 1,000,000+
        - Customer stories page, 2026
        - Confirms very broad commercial reach
        - Business count does not equal paying contract count or retained revenue.
      - - Paying business users
        - 9,000,000+
        - February 2026 financing announcement
        - Shows significant workplace adoption depth
        - Users are not the same as customers; seat mix is unknown.
      - - Wayfair enterprise seats
        - 1,200+
        - March 2026 case study
        - Demonstrates large-seat deployment potential
        - Single case study, not portfolio-wide average.
      - - CyberAgent monthly active usage
        - 93%
        - April 2026 case study
        - Indicates unusually strong internal engagement
        - Company-reported and not a proxy for paid retention.
      - - STADLER daily active usage
        - 85%+
        - March 2026 case study
        - Suggests product stickiness once embedded in workflows
        - One company with strong top-down enablement.
    notes: >-
      OpenAI does provide meaningful customer-scale signals, but the public metrics mix businesses, seats, and users.
      They support adoption strength, not clean retention math.
    claimRefs:
      - C060
      - C061
      - C062
      - C063
      - C066
  - id: T602
    title: Customer segmentation map
    columns:
      - Segment
      - Example customer
      - Region
      - Use case
      - Customer quality signal
    rows:
      - - Large enterprise operations
        - Wayfair
        - North America
        - Catalog enrichment, supplier support, agentic workflows
        - Production deployment across millions of products and 1,200+ enterprise seats.
      - - Large enterprise engineering
        - Rakuten
        - Asia-Pacific & Oceania
        - Incident response, CI/CD review, autonomous development
        - Demonstrates security-sensitive technical workflows rather than light experimentation.
      - - Mid-market knowledge work
        - CyberAgent
        - Asia-Pacific & Oceania
        - Research, drafting, code review, documentation, cross-functional use
        - 93% monthly active usage supports real internal pull.
      - - Mid-market industrial productivity
        - STADLER
        - Europe & UK
        - Drafting, summarization, translation, structured thinking
        - 30-40% time savings and 85%+ daily usage suggest repeated utility.
      - - Consumer-facing financial platform
        - TRUSTBANK
        - Asia-Pacific & Oceania
        - Recommendation agent and gift discovery personalization
        - Shows OpenAI supporting end-customer experience, not only employee copilots.
    notes: >-
      Customer proof spans internal productivity, engineering, workflow automation, and consumer-facing recommendation
      systems. That breadth supports product-market fit across multiple buying centers.
    claimRefs:
      - C062
      - C063
      - C064
      - C065
      - C066
  - id: T603
    title: Named customer proof and outcomes
    columns:
      - Customer
      - Product surface
      - Public outcome
      - Why it matters
      - Reference quality
    rows:
      - - CyberAgent
        - ChatGPT Enterprise, Codex
        - 93% monthly active usage across nearly all departments
        - Strong evidence of cross-functional adoption rather than narrow pilot use
        - High, because usage depth is explicit.
      - - Wayfair
        - API, ChatGPT Enterprise
        - 2.5M corrected tags, 41K tickets automated monthly, 1,200+ seats
        - Shows large-scale operational deployment with measurable process impact
        - High, because multiple operating metrics are disclosed.
      - - Rakuten
        - Codex
        - ~50% reduction in MTTR and quarter-to-weeks build compression
        - Validates value in reliability and software delivery workflows
        - High, because workflow and impact are concrete.
      - - STADLER
        - ChatGPT
        - 125+ custom GPTs, 30-40% time savings, 2.5x faster drafts, >85% daily usage
        - Suggests high-frequency habitual usage in non-technical knowledge work
        - High, because outcomes map to everyday usage.
      - - TRUSTBANK
        - API-based agent experience
        - Higher conversion rates for AI-assisted users on a 760,000-item gift platform
        - Demonstrates consumer-facing personalization value
        - Medium, because conversion uplift is directional rather than numerically quantified.
    notes: >-
      The best customer proof is not generic brand affinity; it is concrete operating leverage. OpenAI now has several
      such references.
    claimRefs:
      - C062
      - C063
      - C064
      - C065
  - id: T604
    title: Retention, churn, satisfaction, and support metrics
    columns:
      - Metric
      - Public value
      - Evidence
      - Interpretation
      - Exact diligence ask
    rows:
      - - NRR
        - null
        - No public retained metric
        - Core expansion quality is still unproven publicly
        - Provide NRR by enterprise, mid-market, and API cohorts.
      - - GRR
        - null
        - No public retained metric
        - Logo and revenue durability cannot be underwritten
        - Provide GRR and renewal waterfall by cohort.
      - - Logo churn
        - null
        - No public retained metric
        - Hard to tell whether deployments survive procurement and governance reviews
        - Provide annual gross logo churn by segment and region.
      - - CSAT / NPS
        - null
        - No public retained metric
        - Case studies imply satisfaction, but support quality is not measured
        - Provide CSAT, NPS, and ticket-resolution quality by plan.
      - - Product engagement
        - 93% MAU at CyberAgent; >85% daily usage at STADLER
        - Official case studies
        - Usage intensity is promising where OpenAI is embedded in work
        - Provide portfolio-wide seat activation and weekly active usage trends.
      - - Support workflow satisfaction
        - Higher supplier satisfaction at Wayfair
        - Official case study
        - Positive signal, but not standardized across the customer base
        - Provide customer support SLA attainment and escalation rates.
    notes: Public customer evidence shows usage and outcomes, but not the retention math that investors typically want.
    claimRefs:
      - C062
      - C063
      - C067
  - id: T605
    title: Expansion drivers and concentration risks
    columns:
      - Driver or risk
      - Evidence
      - Investor read
      - Diligence follow-up
    rows:
      - - Multi-surface expansion
        - Customers use ChatGPT, Enterprise, Codex, API, and agents across different functions
        - Creates natural upsell paths and stickier workflows
        - Measure product-cross-sell penetration by account.
      - - Training and enablement
        - CyberAgent used internal rankings, Slack nudges, and OpenAI-hosted training sessions
        - Customer success and enablement appear to matter materially for adoption
        - Review customer-success playbooks and required services burden.
      - - Operational embedding
        - Wayfair and Rakuten embed OpenAI into core workflows rather than side experiments
        - Production integration raises switching costs and reference quality
        - Request percentage of revenue from production versus pilot deployments.
      - - Concentration opacity
        - Public materials do not disclose top-account concentration
        - High valuation plus opaque concentration is an underwriting risk
        - Provide top-10 customer schedule and renewal calendar.
      - - Reliability and connector trust
        - OpenAI status page showed a live workspace connector write disruption
        - Agent-style products may raise support burden and trust sensitivity
        - Review incident logs, connector-specific SLAs, and enterprise communications.
    notes: >-
      OpenAI's strongest expansion drivers are workflow breadth and developer/workspace cross-sell. The largest hidden
      risk is customer concentration combined with still-opaque retention metrics.
    claimRefs:
      - C062
      - C063
      - C064
      - C067
      - C068
