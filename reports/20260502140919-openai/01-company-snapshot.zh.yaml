startupIntroduction:
  summary: |
    OpenAI 是一家 AI 研究与部署公司，其公开使命是确保 AGI 惠及全人类。公司于 2015 年以非营利
    形式成立，2019 年设立营利性子公司，并在 2025 年宣布改由 OpenAI Foundation 与 OpenAI Group
    PBC 构成新的治理结构。在商业化层面，OpenAI 覆盖 ChatGPT 消费者订阅、ChatGPT Business 与
    Enterprise、Codex 代理式编程、API 产品，以及企业工作流自动化。
