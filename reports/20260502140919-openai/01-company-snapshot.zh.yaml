sections:
  - number: '1.1'
    title: 身份与使命
    body: |
      OpenAI 将自己定义为一家 AI 研究与部署公司，而不是单纯的产品供应商。公司依然围绕“确保 AGI
      惠及全人类”来阐述自身使命，这一使命仍是其品牌、治理以及对巨额资本需求解释的核心。
    claimRefs:
      - C001
      - C019
  - number: '1.2'
    title: 结构与治理
    body: |
      对尽调而言，最关键的区别在于 OpenAI 不是一家传统意义上的风投支持公司。OpenAI Foundation
      控制 OpenAI Group PBC，任命 Group 董事会，并保留使命导向的治理权。结构页还披露了一个不寻常的
      股权分布：Foundation 26%、Microsoft 约 27%、员工与投资人 47%。这一安排会改变少数投资人对
      控制权、退出节奏和治理救济的理解。
    claimRefs:
      - C004
      - C005
      - C006
      - C007
  - number: '1.3'
    title: 资本形成与投资人基础
    body: |
      OpenAI 在约一年时间里经历了三个估值锚点：2025 年 3 月投后 3000 亿美元、2026 年 2 月投前
      7300 亿美元、以及 2026 年 3 月投后 8520 亿美元。其资本结构已不再是纯粹的风险投资股权，而是
      融合了战略云伙伴、芯片伙伴、机构资产管理人和循环授信支持。投资人需要判断这些资本究竟是在买时间、
      买基础设施优势，还是仅仅在跟上模型经济学的消耗速度。
    claimRefs:
      - C010
      - C011
      - C012
      - C013
  - number: '1.4'
    title: 商业化与使用规模
    body: |
      最新官方披露显示，OpenAI 已达到私营软件公司极少见的产品触达规模：每周活跃用户超过 9 亿、
      订阅用户超过 5000 万、付费企业用户超过 900 万、API 每分钟处理超过 150 亿 token、每月收入
      20 亿美元。这些证据支持其类别领导地位和强大的分发能力，但并未揭示经审计的收入质量、毛利率或
      分客户群的留存率。
    claimRefs:
      - C011
      - C012
      - C013
  - number: '1.5'
    title: 产品与变现场景
    body: |
      OpenAI 的变现覆盖消费者订阅、Business 与 Enterprise 席位、API 使用、Codex 以及代理式工作流
      产品。公司把 ChatGPT 定位为工作入口，而 API 平台和 Codex 则把变现延伸到开发者与嵌入式企业软件。
      因此，这一投资故事既是软件故事，也是基础设施路由故事。
    claimRefs:
      - C012
      - C016
      - C017
  - number: '1.6'
    title: 主要风险摘要
    body: |
      公司层级的主要风险包括估值压缩、私有经济数据不透明、对主要算力与云伙伴的依赖、围绕公司结构的
      审视，以及可能改变长期现金流分配的合作条款。OpenAI 仍可能是市场上上行空间最高的私营 AI 资产
      之一，但当前证据更支持“价格敏感”的承销姿态，而不是无条件追价。
    claimRefs:
      - C004
      - C012
      - C015
      - C018
