topStrengths:
  - OpenAI 同时拥有 9 亿+周活用户、5000 万+订阅者、900 万+付费企业用户和 100 万+企业客户，这种规模组合在私人软件公司中极为罕见。
  - 平台横跨消费者订阅、企业工作区、Codex、API、智能体与工作流自动化，而非依赖单一产品表面。
  - 公开客户证明已从 logo 展示升级为运营层面案例，覆盖电商、工程、银行、制造、媒体、食品分销和体育组织。
  - 企业业务似乎已贡献超过 40% 的收入，使其收入结构比纯消费型 AI 业务更具韧性。
  - OpenAI 拥有无与伦比的战略资本获取能力，包括完成 $122B 融资并对应 $852B 投后估值，以及多家超大规模云与战略伙伴关系。
  - 官方安全、隐私、合规与管理控制能力进一步增强了产品广度和企业采用可信度。
  - 公司具备真实的全球工作流采用，而不仅是客户 logo；Wayfair、Rakuten、STADLER、Choco、Axios 和 VfL Wolfsburg 等案例都给出了量化证明。
topRisks:
  - 按公开每月 $2B 收入锚点计算，$852B 投后估值约对应 35.5 倍年化收入运行率，几乎不给执行失误留下空间。
  - OpenAI 仍未公开披露毛利率、NRR、GRR、流失率、客户集中度、现金消耗以及完整的合作伙伴经济敏感性。
  - 由于 OpenAI Foundation / OpenAI Group PBC 架构，公司的治理安排仍然非常特殊。
  - 法律与隐私压力仍然活跃，包括与 The New York Times 相关的数据保留争议，以及更广泛的模型训练诉讼风险。
  - 尽管 OpenAI 具备规模与战略伙伴关系，算力经济性和云伙伴依赖仍然难以承保。
  - 随着 OpenAI 深入连接器、动作执行和代理式工作流，运营可靠性的重要性上升；即使核心模型表现稳定，事故也会损害客户信任。
  - 前沿 AI 监管要求正在持续收紧，尤其是 EU AI Act 及 GPAI 提供方相关的安全与合规要求。
unresolvedGaps:
  - ARR 未从公开收入运行率锚点中单独披露。
  - 基于当前保留的公开证据，无法承保收入同比增速。
  - 毛利率、贡献利润率以及云/合作伙伴分成比例尚未公开披露。
  - NRR、GRR、logo 流失率与 cohort 留存均未公开披露。
  - 除最新融资估值锚点外，保留证据无法完整对账公司的累计融资总额。
  - 证据台账中未保留公司当前 headcount 的有效验证指标。
  - 经审计的收入质量、客户集中度、合作伙伴经济、股权优先权条款以及诉讼准备金细节仍需私有尽调。
