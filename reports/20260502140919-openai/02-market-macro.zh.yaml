schemaVersion: startup-diligence-report-v2
artifact: market-macro
slug: openai
runDate: '2026-05-02'
company:
  name: OpenAI
  website: https://openai.com/
chapter:
  number: 2
  title: 市场规模与宏观分析
  summary: >
    OpenAI 所处的是一个仍在快速重构边界的生成式 AI 市场，覆盖消费者 AI 助手、企业生产力软件、开发者工具、 模型 API，以及代理式工作流自动化等多层空间。外部市场估算差异很大，但方向上都支持一个高速扩张的大市场；
    与此同时，OpenAI 自身披露也说明近端商业化已相当实质：2025 年 ChatGPT 每周用户 5 亿，2026 年每周活跃 用户超过 9 亿，付费企业用户超过 900 万。机会足够大，但预算转化仍取决于治理、ROI
    证明、流程重构和风险管理准备度。
  claimRefs:
    - C021
    - C022
    - C023
    - C025
    - C026
callouts:
  - type: opportunity
    title: 近期真正的机会，不是“所有 AI 支出”，而是高频知识工作。
    body: |
      OpenAI 最强的切入点是编程、数据分析、研究、搜索和代理式任务执行等高频工作流。这意味着它的实际 SAM 更接近软件、云和劳动增效预算，而不是单一、笼统的“AI 市场”数字。
    claimRefs:
      - C024
      - C025
      - C027
      - C028
  - type: risk-alert
    title: 采用速度可能跑赢采购与治理准备度。
    body: |
      NIST 的生成式 AI 风险画像强调，治理、测试、滥用防范、问责与实施控制都可能实质性拖慢企业落地，
      即便模型能力还在快速提升。因此，OpenAI 的市场获取不仅取决于模型质量，也取决于组织变革与信任转化。
    claimRefs:
      - C023
      - C030
tables:
  - id: T201
    title: 市场定义与纳入支出
    columns:
      - 视角
      - 纳入支出
      - 排除支出
      - 对 OpenAI 的意义
    rows:
      - - 消费者 AI 助手市场
        - 类 ChatGPT 的付费订阅、搜索、媒体生成与专业用户生产力
        - 未货币化的普通互联网使用或纯广告驱动搜索
        - OpenAI 已拥有 5000 万以上订阅用户，并把消费者规模转化为工作场景分发渠道。
      - - 开发者 AI 工具市场
        - 编程智能体、API 消费、推理服务与模型驱动的软件工具
        - 尚未被 AI 增强或替代的传统开发工具
        - Codex 与 API 使用使开发者预算成为核心变现池。
      - - 企业 AI 生产力与工作流软件
        - 知识工作 copilot、工作区智能体、分析、客服和内部自动化
        - 不含 AI 层的广义 SaaS 支出
        - ChatGPT Business、Enterprise 与 agents 直接争夺软件与劳动增效预算。
      - - AI 基础设施与模型平台
        - 模型访问、token 使用、容器、工具调用、数据驻留与企业平台控制
        - 不经由 OpenAI 变现的半导体制造或超大云厂商 capex
        - OpenAI 通过 API、工具与平台经济捕获价值，而非拥有全部底层算力。
      - - 公共部门与受监管部署
        - 政府、医疗、教育和受监管企业中的隐私/安全敏感工作流
        - 没有采购或合规路径的泛实验性使用
        - OpenAI 的合规姿态扩大 SAM，但也提升采用摩擦。
    notes: OpenAI 同时参与多个相邻市场；若只使用一个总括 TAM，会高估机会精确度，也会低估不同预算池之间的差异。
    claimRefs:
      - C024
      - C027
      - C028
      - C029
  - id: T202
    title: 细分与买方地图
    columns:
      - 细分
      - 主要买方
      - 核心工作流
      - OpenAI 触面
      - 变现路径
    rows:
      - - 消费者与专业个人用户
        - 终端用户
        - 搜索、写作、学习、规划、创作
        - ChatGPT
        - 月度订阅
      - - SMB 与团队生产力
        - 团队负责人或职能经理
        - 共享 GPT、工作区知识、内部应用
        - ChatGPT Business
        - 按席位订阅
      - - 企业级转型
        - CIO、CTO、COO、职能负责人
        - 企业知识、分析、编程、客服、工作流自动化
        - ChatGPT Enterprise、workspace agents、Codex
        - 企业合同加使用量增购
      - - 开发者与构建者
        - 工程负责人或开发者
        - 应用开发、集成、自动化、编码
        - API 平台、Codex、工具
        - 按 token / 工具调用计费
      - - 受监管与公共部门部署
        - 采购、合规、IT 安全
        - 受政策约束的部署、隐私敏感工作流、受治理约束的智能体
        - Enterprise、API、隐私与安全控制
        - 带合规能力的合同式部署
    notes: 这一买方地图说明 OpenAI 同时暴露在多个预算所有者之下：个人、部门经理、CIO 组织与开发者。
    claimRefs:
      - C024
      - C027
      - C028
      - C029
  - id: T203
    title: OpenAI 的市场规模测算视角
    columns:
      - 视角
      - 2025 基线
      - 终局估计
      - 时间范围
      - 含义
    rows:
      - - Grand View Research 生成式 AI 市场
        - $22.21B
        - $324.68B
        - 2033
        - 说明类别足够大，但可能低估了纯软件定义之外的劳动替代和工作流支出。
      - - Mordor Intelligence 生成式 AI 市场
        - $21.10B
        - $126.66B
        - 2031
        - 更保守的终局口径仍足以支持平台领导者实现风险投资级增长。
      - - OpenAI 消费者/工作场景采用代理
        - 500M 每周用户
        - 900M+ 每周活跃用户
        - 2025 到 2026
        - 用户增长速度说明类别采用可能快于许多第三方市场模型刷新速度。
      - - OpenAI 付费企业代理
        - null
        - 9M+ 付费企业用户
        - 2026
        - 工作场景渗透已大到足以支撑软件预算捕获。
      - - OpenAI 企业收入占比代理
        - null
        - 40%+ 收入占比
        - 2026
        - 表明可变现的 SAM 正在从纯消费者订阅转向企业工作流。
    notes: 这些测算视角互为补充而非相加。外部 TAM 用于给出类别边界，而 OpenAI 自身披露的采用指标则更接近实际可变现需求。
    claimRefs:
      - C021
      - C022
      - C025
      - C026
  - id: T204
    title: 增长驱动与采用约束
    columns:
      - 因素
      - 方向
      - 证据
      - 尽调含义
    rows:
      - - 多触面分发
        - 正向
        - OpenAI 以消费者采用作为工作场景和企业扩张的入口
        - 这一分发杠杆可能让 CAC 低于纯企业型对手。
      - - 代理式工作流需求
        - 正向
        - OpenAI 明确把 agents、coding、data analysis 作为企业目标工作流
        - 预算池从对话工具扩展到流程级软件支出。
      - - 开发者变现
        - 正向
        - API 定价、工具调用、容器与编程产品形成多层收费结构
        - 提高单个开发者或企业账号的混合 ARPU 潜力。
      - - 合规与信任准备度
        - 混合
        - 安全、隐私与合规页面提升了受监管买方的可进入性
        - 只有在采购团队真正接受控制框架时，SAM 才能落地。
      - - 治理与实施负担
        - 负向
        - NIST 强调生成式 AI 需要风险管理、实施与监督控制
        - 即便终端需求强，企业落地也可能卡住。
      - - 预算与 ROI 不确定性
        - 负向
        - 企业仍需证明 AI 真正改变劳动经济，而不仅是增加实验量
        - 席位增长并不自动等于可持续的高利润企业收入池。
    notes: OpenAI 受益于类别加速，但当前采用约束主要落在企业变革管理和治理准备，而不是基础认知教育。
    claimRefs:
      - C023
      - C024
      - C027
      - C028
      - C030
  - id: T205
    title: 买方预算所有权与渗透逻辑
    columns:
      - 预算池
      - 典型所有者
      - 触发支出条件
      - 渗透信号
      - 开放问题
    rows:
      - - 个人生产力
        - 个人用户
        - 相比免费层体现出更高效用
        - 5000 万以上订阅用户
        - 其中有多少是持久付费而非新鲜感驱动？
      - - 团队软件与协作
        - 部门负责人
        - 共享 GPT、工作区知识、内部应用
        - Business 与 Enterprise 的功能深度
        - 团队会多快标准化到 OpenAI，而不是套件型厂商？
      - - 工程与产品预算
        - 工程副总裁或 CTO
        - 编程提效、代理式开发、API 集成
        - Codex 增长与 API 定价广度
        - 工程预算是长期性支出还是短期实验？
      - - 企业转型预算
        - CIO、COO、CFO
        - 工作流重构、自动化、分析、AI coworkers
        - 付费企业用户 900 万+、企业收入占比 40%+
        - 企业使用中有多大比例是真正关键任务，而不是助手级增强？
      - - 受监管采购
        - 安全、法务、合规、采购
        - 需要隐私、保留、审计和认证
        - 安全与隐私认证
        - 哪些行业仍会因数据、主权或安全问题受阻？
    notes: OpenAI 的有效 SOM 取决于哪类预算所有权会最先完成集中：个人生产力、工程预算，还是企业级流程改造预算。
    claimRefs:
      - C025
      - C026
      - C028
      - C029
