sections:
  - number: '2.1'
    title: 市场定义
    body: |
      OpenAI 的可服务市场最好理解为消费者 AI 助手、开发者工具、企业生产力软件与代理式工作流自动化的交集。
      若只用一个笼统的“AI TAM”，会忽略真实预算所有者的差异：个人、工程团队、CIO 组织与受监管买方，
      对 ROI 和风险的判断完全不同。
    claimRefs:
      - C024
      - C027
      - C028
  - number: '2.2'
    title: 规模视角及其差异原因
    body: |
      第三方市场估算差异明显：Grand View Research 认为 2025 年全球生成式 AI 市场为 222.1 亿美元，
      到 2033 年增至 3246.8 亿美元；Mordor Intelligence 则认为 2025 年为 211 亿美元，到 2031 年
      增至 1266.6 亿美元。这个区间本身就说明类别边界仍在移动。对 OpenAI 来说，更关键的问题是：
      真实使用量是否正比分析师模型更快地转化为软件与工作流预算。
    claimRefs:
      - C021
      - C022
      - C025
  - number: '2.3'
    title: OpenAI 的实际 SAM
    body: |
      OpenAI 的实际 SAM 并不是整个生成式 AI 产业，而是那些持续需要推理、编程、搜索、数据分析、
      内容生成与代理式任务执行的支出子集。公司正通过 Business、Enterprise、API、Codex 和 agents
      产品瞄准这些工作流，因此既能变现席位预算，也能变现按使用量计费的软件预算。
    claimRefs:
      - C024
      - C025
      - C027
      - C028
  - number: '2.4'
    title: 增长驱动
    body: |
      最强的需求加速器包括 OpenAI 的分发优势、代理式工作流扩张，以及多层级变现结构。消费者熟悉度降低了
      工作场景的教育成本；编程和数据分析提供了高频日常用例；API 与工具定价则让 OpenAI 即便在客户未完全
      标准化到 ChatGPT 席位时，也能从开发者侧捕获预算。
    claimRefs:
      - C024
      - C026
      - C027
      - C028
  - number: '2.5'
    title: 采用约束与市场吸引力
    body: |
      市场很有吸引力，但采用并非没有摩擦。NIST 的生成式 AI 风险画像说明，治理、测试、问责与实施控制都
      会拖慢企业部署。由于 OpenAI 越来越依赖受监管和企业工作流来实现更高质量的增长，这一点尤为重要。
      因此，这是一块吸引力极强、类别动量极好的市场，但“信任转化”和“ROI 证明”仍是关键闸门。
    claimRefs:
      - C023
      - C026
      - C030
