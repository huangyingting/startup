schemaVersion: startup-diligence-report-v2
artifact: investment-valuation
slug: openai
runDate: '2026-05-02'
company:
  name: OpenAI
  website: https://openai.com/
chapter:
  number: 8
  title: 投资与估值
  summary: |
    OpenAI 是极少数明显值得认真承销的私营公司之一，但当前估值需要异常出色的执行才能持续成立。已披露的
    8520 亿美元投后估值和每月 20 亿美元收入，意味着约 35.5x 的年化收入运行率倍数；而 2026 年 2 月的
    7300 亿美元投前估值也意味着约 30.4x。只有在企业收入占比继续上升、利润率质量显著改善、伙伴经济关系
    保持有利、且治理/监管风险受控的情况下，这些倍数才可能成立。结论：research-more；估值昂贵，缺失桥梁
    仍然过大。
  claimRefs:
    - C080
    - C081
    - C082
    - C083
    - C084
    - C086
    - C087
    - C088
recommendation:
  action: research-more
  confidence: medium
  riskRating: significant
  valuationStance: expensive
  targetReturn: null
  suggestedHoldPeriod: 如果入场纪律与私有尽调明显改善，可按 3-5 年持有期观察。
  exitRoute: IPO 仍是最可能的规模化退出路径，但时间点与结构仍不确定。
  positionSizing: >-
    仅在公开数据视角下列入观察名单；若参与私募，也应小仓位、设定估值上限，并以前置深度尽调为条件。
  claimRefs:
    - C080
    - C081
    - C082
    - C084
    - C087
    - C088
callouts:
  - type: key-insight
    title: OpenAI 已拥有顶级规模证明。
    body: |
      9 亿+周活用户、5000 万+订阅者、900 万+付费企业用户、100 万+企业客户，以及每月 20 亿美元收入，
      都支持“OpenAI 已是平台级，而非创业级”的判断。极少有私营公司能给出相近的需求表面。
    claimRefs:
      - C080
      - C081
      - C085
  - type: risk-alert
    title: 当前价格已经预支了异常理想的结果。
    body: |
      按约 35.5x 年化收入运行率计算，2026 年 3 月估值看起来比 Anthropic 官方 Series G 倍数更激进，也几乎
      没给利润率、治理、监管或算力经济关系上的失误留下缓冲。CNBC 随后关于增长不及预期的报道进一步说明，
      下行倍数压缩不能被忽视。
    claimRefs:
      - C081
      - C082
      - C086
      - C088
tables:
