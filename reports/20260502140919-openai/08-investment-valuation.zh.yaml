sections:
  - number: '8.1'
    title: 投资论点
    body: |
      OpenAI 是极少数明确符合 frontier platform 候选条件的私营公司之一，而不只是一个投机性的 AI startup。
      它拥有庞大的用户触达、显著的企业采用、强大的产品广度，以及几乎无可匹敌的战略资本和基础设施获取能力。
      如果这些规模最终转化为以企业收入为主、单位经济学改善的高质量收入，那么 thesis 会非常强。
    claimRefs:
      - C080
      - C081
      - C060
      - C084
      - C085
  - number: '8.2'
    title: 反论点
    body: |
      反论点主要集中在估值与证据质量。OpenAI 当前的私募估值意味着极高预期，但公开证据仍未展示毛利率、贡献利润、
      NRR、流失、burn 或完整的伙伴经济关系。治理与监管复杂性还额外叠加了一个 public markets 可能不会忽视的折价因素。
    claimRefs:
      - C082
      - C060
      - C084
      - C087
      - C088
  - number: '8.3'
    title: 估值立场
    body: |
      当前估值立场应被理解为 expensive，而不只是 stretched。按约 35.5x 年化收入运行率计算，2026 年 3 月
      的估值明显高于公开证据可以舒适支持的区间，尤其是在单位经济学和治理问题仍未解决的情况下。OpenAI 未来
      可能会“长进这个估值”，但公开证据并不足以支持今天在该价格附近无保护入场。
    claimRefs:
      - C081
      - C082
      - C088
  - number: '8.4'
    title: IPO 与退出就绪度
    body: |
      OpenAI 具备 IPO 所需的规模叙事，但并不具备干净的承销画像。收入和客户触达已经达到 IPO 级别，而治理、隐私
      诉讼、伙伴集中度和利润率不透明仍低于理想 public-market readiness。最可能的退出路径仍然是 IPO，但不应把
      “可能的退出路径”误解为“已经准备好上市”。
    claimRefs:
      - C081
      - C082
      - C084
      - C087
  - number: '8.5'
    title: 最终推荐
    body: |
      最终推荐是 research-more，估值立场为 expensive，置信度为 medium，风险等级为 significant。OpenAI
      过于重要，不能忽视；但从公开证据看，它又过于昂贵、结构上过于不透明，难以被高置信度承销。最合理的姿态
      是“有纪律的好奇心”：保持贴近，但在当前或更高价格上投入资本前，要求更深的私有证据。
    claimRefs:
      - C081
      - C084
      - C087
      - C088
