  - id: T802
    title: 投资论点与反论点
    columns:
      - 方向
      - 论点
      - 证据
      - 什么会改变判断
    rows:
      - - Thesis
        - OpenAI 是真正的平台级 AI 领导者
        - 9 亿+周活用户、5000 万+订阅者、900 万+付费企业用户、100 万+企业客户
        - 需要经审计的收入净额桥接和可持续队列经济学。
      - - Thesis
        - ChatGPT、Business 工作区、Codex、agents 与 APIs 的广度创造多重变现回路
        - 产品、客户和财务章节都显示出跨表面采用
        - 需要证明随着企业和编码占比提升，利润率同步改善。
      - - Thesis
        - 战略资本和伙伴获取能力本身就是护城河
        - 3000 亿、7300 亿和 8520 亿美元估值节点，以及 Amazon、Nvidia、SoftBank、Microsoft 关系
        - 需要确认伙伴经济关系在规模化后仍然有利。
      - - Anti-thesis
        - 当前估值可能已经定价了近乎完美执行
        - 7300 亿投前和 8520 亿投后意味着当前年化收入锚点约 30x-35x
        - 需要更低入场价或新的财务证明。
      - - Anti-thesis
        - 收入质量仍未在公开层面被证明
        - 没有公开毛利率、NRR、流失、burn 或完整 take-rate 披露
        - 需要私有财务包，覆盖留存、利润率与集中度。
      - - Anti-thesis
        - 治理与监管复杂性会压制上市就绪度
        - Foundation/PBC 结构、NYT 相关隐私冲突、EU AI Act 义务
        - 需要更清晰的法律和治理去顶压因素，以及上市控制权蓝图。
    notes: 资产质量极强；反论点主要集中在价格、披露和结构。
    claimRefs:
      - C080
      - C081
      - C083
      - C060
      - C084
      - C085
      - C087
      - C088
