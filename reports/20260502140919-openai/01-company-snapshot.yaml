sections:
  - number: '1.1'
    title: Identity and mission
    body: |
      OpenAI describes itself as an AI research and deployment company, not just a product vendor. The
      company still frames its mission around ensuring that AGI benefits all of humanity, and that mission
      remains central to its branding, governance, and public explanations of why it needs such unusual
      amounts of capital.
    claimRefs:
      - C001
      - C019
  - number: '1.2'
    title: Structure and governance
    body: |
      The core diligence distinction is that OpenAI is not a conventional venture-backed corporation. The
      OpenAI Foundation controls OpenAI Group PBC, appoints the Group board, and retains mission-oriented
      governance rights. The structure page also discloses an unusual ownership split: the Foundation at
      26%, Microsoft at roughly 27%, and employees plus investors at 47%. That arrangement changes how
      minority investors should think about control, exit timing, and governance recourse.
    claimRefs:
      - C004
      - C005
      - C006
      - C007
  - number: '1.3'
    title: Capital formation and investor base
    body: |
      OpenAI has moved through three valuation anchors in roughly twelve months: $300B post-money in March
      2025, $730B pre-money in February 2026, and $852B post-money at the March 2026 close. The capital
      stack is no longer pure venture equity; it is a blended system of strategic cloud providers, silicon
      partners, institutional asset managers, and revolving-credit support. Investors need to underwrite
      whether capital is buying time, infrastructure advantage, or simply keeping pace with model economics.
    claimRefs:
      - C010
      - C011
      - C012
      - C013
  - number: '1.4'
    title: Commercial and usage scale
    body: |
      The latest official disclosures show OpenAI at a level of product reach rarely seen in private
      software companies: more than 900M weekly active users, more than 50M subscribers, more than 9M
      paying business users, more than 15B API tokens per minute, and $2B in revenue per month. That
      evidence supports category leadership and broad distribution strength, but it does not reveal audited
      revenue quality, gross margin, or retention by customer cohort.
    claimRefs:
      - C011
      - C012
      - C013
  - number: '1.5'
    title: Product and monetization surface
    body: |
      OpenAI is monetizing across consumer subscriptions, business and enterprise seats, API usage, Codex,
      and agentic workflow products. The company positions ChatGPT as the front door for work, while the
      API platform and Codex extend monetization into developers and embedded enterprise software. The
      resulting investment case is partly a software case and partly an infrastructure-routing case.
    claimRefs:
      - C012
      - C016
      - C017
  - number: '1.6'
    title: Key risks summary
    body: |
      The main company-level risks are valuation compression, opaque private economics, dependence on major
      compute and cloud partners, structure-related scrutiny, and partnership terms that can alter long-term
      cash-flow sharing. OpenAI may still be one of the highest-upside private AI assets in the market, but
      the evidence base currently supports a price-sensitive rather than unconditional underwriting posture.
    claimRefs:
      - C004
      - C012
      - C015
      - C018
