schemaVersion: startup-diligence-report-v2
artifact: company-snapshot
slug: openai
runDate: '2026-05-02'
company:
  name: OpenAI
  website: https://openai.com/
chapter:
  number: 1
  title: Startup Introduction & Company Snapshot
  summary: >
    OpenAI has moved from a nonprofit lab into one of the most valuable private AI platforms in the market. Official
    company disclosures now describe an organization with a nonprofit parent, a public benefit corporation operating
    arm, $122 billion of committed capital closed at an $852 billion post-money valuation, more than 900 million weekly
    active users, more than 50 million subscribers, and more than 40% of revenue coming from enterprise. The company is
    no longer just a model vendor; it is trying to become the consumer, developer, enterprise, and infrastructure
    control point for agentic AI.
  claimRefs:
    - C001
    - C004
    - C011
    - C012
    - C015
startupIntroduction:
  summary: |
    OpenAI is an AI research and deployment company whose stated mission is to ensure that AGI benefits
    all of humanity. It was founded in 2015 as a nonprofit, created a for-profit subsidiary in 2019,
    and now operates through the OpenAI Foundation and OpenAI Group PBC structure announced in 2025.
    Commercially, OpenAI spans ChatGPT consumer subscriptions, ChatGPT Business and Enterprise,
    agentic coding through Codex, API products, and enterprise workflow automation.
  foundedDate: null
  foundedYear: 2015
  founders:
    - name: Sam Altman
      role: Co-founder and CEO
      background: Leads OpenAI and is listed by the company as co-founder and CEO in 2026 funding communications.
      claimRefs:
        - C020
  foundingLocation: San Francisco, California
  headquarters: San Francisco, California
  website: https://openai.com/
  productSummary: >-
    OpenAI monetizes across ChatGPT plans, enterprise workspace products, API access, Codex, agents, and model
    distribution through multiple cloud and infrastructure partners.
  customerFocus: >-
    Consumers, developers, startups, enterprises, governments, and global knowledge-work teams adopting AI for coding,
    search, writing, data analysis, automation, and workflow execution.
  businessModel: >-
    Subscription revenue, usage-based API revenue, enterprise contracts, and platform economics supported by large-scale
    compute and cloud partnerships.
  stage: Late-stage private frontier AI platform and infrastructure company
  fundingStatus: >-
    Closed a $122 billion funding round on 2026-03-31 at an $852 billion post-money valuation after first announcing
    $110 billion of new investment at a $730 billion pre-money valuation on 2026-02-27.
  claimRefs:
    - C001
    - C002
    - C003
    - C004
    - C011
    - C012
    - C016
callouts:
  - type: key-insight
    title: OpenAI now looks more like an AI operating system than a single-product company.
    body: >
      Official 2026 disclosures combine consumer scale, developer scale, enterprise monetization, and infrastructure
      expansion in one flywheel: more than 900 million weekly active users, more than 50 million consumer subscribers,
      more than 9 million paying business users, more than 15 billion API tokens per minute, and enterprise revenue
      above 40% of total revenue.
    claimRefs:
      - C011
      - C012
      - C013
      - C016
  - type: risk-alert
    title: The underwriting problem is governance-adjusted valuation, not demand generation.
    body: |
      OpenAI has clear product-market fit, but investors still face mission-governed control, large
      compute obligations, evolving Microsoft economics, unresolved legal scrutiny around the structure,
      and an $852 billion valuation that leaves little room for operating mistakes or slower growth.
    claimRefs:
      - C004
      - C007
      - C012
      - C015
      - C018
tables:
  - id: T101
    title: Snapshot KPIs and diligence status
    columns:
      - Metric
      - Public value
      - Growth signal
      - Benchmark
      - Confidence
      - Diligence gap
    rows:
      - - Post-money valuation
        - $852 billion
        - Closed valuation as of 2026-03-31 after the February pre-money anchor
        - One of the largest private-company valuations globally
        - High
        - Confirm liquidation preferences, secondary pricing, and fully diluted ownership after the recapitalization.
      - - Committed capital in latest close
        - $122 billion
        - Largest single private tech financing disclosed by the company
        - Far above typical late-stage venture rounds
        - High
        - Separate cash proceeds, credit support, and any contingent tranches by investor.
      - - New investment announced before final close
        - $110 billion
        - February 2026 pre-close anchor showed SoftBank, NVIDIA, and Amazon as cornerstone partners
        - Signals strategic capital plus infrastructure support
        - High
        - Reconcile the February announcement to the March close and any investors added later.
      - - Revenue pace
        - $2 billion per month
        - OpenAI says it grew from $1B in revenue within a year of ChatGPT launch to $1B per quarter by end-2024
        - Exceptional growth even versus major internet platforms
        - Medium
        - Obtain audited revenue, gross margin, deferred revenue, and cloud partner take rates.
      - - Weekly active users
        - 900 million+
        - Company says ChatGPT is nearing 1 billion weekly active users
        - Category-defining consumer scale
        - Medium
        - Verify DAU/WAU quality, geography mix, and overlap between free and paid usage.
      - - Consumer subscribers
        - 50 million+
        - Subscriber momentum accelerated in early 2026 per company disclosure
        - Massive paid consumer base for an AI product
        - Medium
        - Break out Plus, Pro, Go, Business-seat crossover, and churn.
      - - Paying business users
        - 9 million+
        - Paid workplace adoption now materially large enough to influence overall mix
        - Strong B2B distribution signal
        - Medium
        - Separate self-serve business users from enterprise contract users and expansion cohorts.
      - - Enterprise revenue mix
        - 40%+
        - Company expects enterprise to reach parity with consumer by end-2026
        - Suggests meaningful diversification beyond subscriptions
        - Medium
        - Validate net revenue, cohort retention, and concentration among the largest enterprise accounts.
      - - API throughput
        - 15 billion+ tokens per minute
        - Reflects large developer and enterprise usage intensity
        - Among the broadest disclosed API-scale signals in AI
        - Medium
        - Map throughput to monetized workloads, blended pricing, and serving cost.
      - - Foundation equity stake
        - 26%
        - Worth approximately $130B at the current valuation per official structure page
        - Unusual mission-linked governance stake
        - High
        - Confirm warrant mechanics, governance rights, and how the stake interacts with future fundraising.
      - - Headcount
        - null
        - Not publicly disclosed in retained evidence
        - Important operating-efficiency input remains opaque
        - Low
        - Request current employee and contractor counts by function and geography.
    notes: >-
      OpenAI publishes unusually strong top-line and usage signals for a private company, but unit economics, retention,
      and concentration remain private and should be treated as diligence gaps rather than inferred.
    claimRefs:
      - C007
      - C011
      - C012
      - C013
