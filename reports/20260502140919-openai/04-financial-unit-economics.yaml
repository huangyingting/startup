schemaVersion: startup-diligence-report-v2
artifact: financial-unit-economics
slug: openai
runDate: '2026-05-02'
company:
  name: OpenAI
  website: https://openai.com/
chapter:
  number: 4
  title: Financial & Unit Economics
  summary: >
    OpenAI discloses enough to show extraordinary top-line scale, but not enough to underwrite classic software unit
    economics with confidence. The company says revenue reached $1B within a year of ChatGPT's launch, $1B per quarter
    by the end of 2024, and $2B per month by March 2026, with enterprise already above 40% of revenue. At the same time,
    the business still depends on massive external capital, partner economics, and compute expansion. Revenue quality is
    strong directionally; margin quality remains largely private.
  claimRefs:
    - C039
    - C040
    - C041
    - C044
callouts:
  - type: key-insight
    title: OpenAI has already crossed the threshold from startup metrics to platform-scale financial signals.
    body: >
      The company now publishes monthly revenue, enterprise mix, API throughput, and large financing events. That is
      enough to confirm commercial scale, but not enough to validate gross margin, payback, or free cash flow after
      cloud and partner economics.
    claimRefs:
      - C039
      - C040
      - C041
      - C044
  - type: risk-alert
    title: Capital formation and revenue scale are visible; capital efficiency is not.
    body: |
      OpenAI's financing history, revenue-share arrangements, revolving credit expansion, and compute-heavy
      strategy imply a capital-intensive operating model. Without public gross margin, CAC, retention, and burn
      data, investors are underwriting scale before seeing full economic quality.
    claimRefs:
      - C042
      - C043
      - C044
      - C047
tables:
  - id: T401
    title: Revenue streams and monetization mechanics
    columns:
      - Revenue stream
      - Mechanic
      - Public evidence
      - Quality note
      - Diligence ask
    rows:
      - - Consumer subscriptions
        - Monthly subscription plans through ChatGPT
        - 50M+ subscribers disclosed in March 2026 financing post
        - High-volume recurring revenue, but mix by plan is undisclosed
        - Break out Go, Plus, Pro, and other consumer plan mix and churn.
      - - Business seats
        - Per-user monthly pricing
        - ChatGPT Business listed at SGD 25 per user per month
        - Attractive recurring seat economics in theory, but realized discounting is unknown
        - Provide realized ARPU and discount schedule by customer cohort.
      - - Enterprise contracts
        - Custom enterprise pricing
        - Enterprise is custom priced and already represents 40%+ of total revenue
        - Highest-likelihood source of durable high-value revenue, but contract structure is opaque
        - Provide average contract value, renewal terms, and concentration.
      - - API usage
        - Token-based pricing plus tool-call and container pricing
        - GPT-5.5, GPT-5.4, multimodal, web search, and containers all have list pricing
        - Highly monetizable, but margins depend on inference cost and partner terms
        - Break out net API revenue, gross margin, and compute pass-through economics.
      - - Coding and agent products
        - Usage pricing and embedded monetization
        - Business Codex uses pay-as-you-go pricing and Codex usage is growing rapidly
        - Could be a high-expansion wedge, but realized willingness-to-pay is still unclear
        - Separate agent revenue from general API and workspace revenue.
    notes: >-
      OpenAI monetizes through multiple mechanisms at once. The question is no longer whether it can charge; it is
      whether the blended mix supports durable software-like margins.
    claimRefs:
      - C039
      - C041
      - C045
      - C046
