      - C040
      - C041
      - C044
  - id: T404
    title: Funding, capital, and partner economics
    columns:
      - Item
      - Public anchor
      - Financial effect
      - Key question
    rows:
      - - March 2025 round
        - $40B at $300B post-money
        - Expanded compute and product investment capacity
        - How much of the round was primary cash versus strategic consideration?
      - - February 2026 package
        - $110B at $730B pre-money
        - Tied capital directly to Amazon, NVIDIA, and SoftBank relationships
        - How much value was cash versus infrastructure commitments?
      - - March 2026 close
        - $122B committed capital at $852B post-money
        - Locked in a massive financing step-up
        - What are the preference, governance, and dilution terms?
      - - Microsoft economics
        - Revenue share from OpenAI to Microsoft continues through 2030 subject to a cap
        - Affects gross-margin and free-cash-flow conversion
        - What is the effective blended take rate after the amended agreement?
      - - Foundation / shareholder split
        - Foundation 26%, Microsoft ~27%, employees and investors 47%
        - Governance and value-capture structure is unusual
        - How do warrant mechanics and future rounds alter ownership?
    notes: >-
      OpenAI's financial model cannot be separated from partner economics and governance design. Capital is both an
      input and a competitive lever.
    claimRefs:
      - C042
      - C043
      - C044
      - C047
      - C048
  - id: T405
    title: Unit economics and explicit gaps
    columns:
      - Metric
      - Public value
      - Confidence
      - Why it matters
      - Specific diligence request
    rows:
      - - Gross margin
        - null
        - Low
        - Determines whether OpenAI is becoming a software company or a compute reseller
        - Provide gross margin by consumer, enterprise, API, and coding products.
      - - Contribution margin
        - null
        - Low
        - Shows whether distribution and support scale efficiently
        - Provide contribution margin after hosting, support, and partner revenue share.
      - - CAC
        - null
        - Low
        - Needed to evaluate seat growth quality
        - Provide blended and segment CAC for consumer, business, and enterprise.
      - - LTV
        - null
        - Low
        - Needed to compare growth durability against pricing pressure
        - Provide LTV assumptions with retention, gross margin, and expansion inputs.
      - - Payback
        - null
        - Low
        - Needed to assess capital efficiency
        - Provide sales and marketing payback by channel and segment.
      - - NRR / GRR
        - null
        - Low
        - Critical for enterprise underwriting
        - Provide enterprise NRR, GRR, logo churn, and cohort retention.
      - - Burn and runway
        - null
        - Low
        - Key for valuation and financing risk
        - Provide monthly net burn, operating cash flow, capex or compute commitments, and liquidity runway.
      - - Customer concentration
        - null
        - Low
        - Strategic cloud, public sector, and large enterprise concentration can distort quality
        - Provide top-10 customer and partner concentration by revenue and compute dependency.
    notes: >-
      OpenAI's public financial story is unusually rich on scale and unusually thin on unit economics. Every key
      underwriting metric below gross revenue remains a live diligence request.
    claimRefs:
      - C049
