sections:
  - number: '4.1'
    title: Revenue quality
    body: |
      OpenAI's revenue scale is no longer speculative. The company says it reached $1B in revenue within a
      year of ChatGPT's launch, $1B per quarter by the end of 2024, and $2B per month by March 2026. That
      progression supports a high-confidence conclusion that demand is real. The open question is whether
      this revenue behaves like durable software revenue after discounts, cloud costs, and partner shares.
    claimRefs:
      - C039
      - C040
  - number: '4.2'
    title: Pricing and monetization architecture
    body: |
      OpenAI monetizes through a layered stack rather than a single pricing model: subscriptions, seats,
      custom enterprise contracts, token-priced APIs, and tools pricing. That architecture is strategically
      valuable because it raises cross-sell potential, but it also complicates revenue-quality analysis
      unless management can show margin by surface and customer cohort.
    claimRefs:
      - C045
      - C046
  - number: '4.3'
    title: Capital intensity and partner economics
    body: |
      The financial model is capital intensive by construction. OpenAI's 2025 and 2026 financings, revolving
      credit expansion, and amended Microsoft agreement all point to a business that must continuously pair
      revenue growth with infrastructure access and strategic capital. Investors should not assume that
      top-line scale automatically converts into free cash flow.
    claimRefs:
      - C042
      - C043
      - C044
      - C047
  - number: '4.4'
    title: Unit economics blind spots
    body: |
      The biggest unresolved gap is not demand; it is unit economics. Public evidence does not disclose gross
      margin, CAC, LTV, payback, NRR, GRR, burn, or concentration. Those omissions are material because the
      company operates in a compute-heavy category with meaningful partner economics and a very high valuation.
    claimRefs:
      - C049
  - number: '4.5'
    title: Financial verdict
    body: |
      OpenAI's revenue quality looks strong at the top-line level and increasingly enterprise-influenced, but
      the evidence base still does not support a software-like margin conclusion. The financial verdict is
      therefore "commercially validated, economically incomplete": investors can believe in the revenue scale
      while still requiring direct diligence on margin, retention, and cash efficiency.
    claimRefs:
      - C039
      - C041
      - C049
