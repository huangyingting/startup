      - C056
  - id: T504
    title: Integration and API matrix
    columns:
      - Surface
      - Integration or interface
      - Public proof
      - Why it matters
      - Gap
    rows:
      - - ChatGPT Business
        - 60+ apps including Slack, Google Drive, SharePoint, GitHub, and Atlassian
        - Business pricing page
        - Makes ChatGPT more useful in existing workflows and raises switching costs
        - Need full connector catalog and action-level availability.
      - - ChatGPT consumer and pro surfaces
        - Canva, Spotify, PDFs, presentations, spreadsheets
        - ChatGPT overview
        - Shows OpenAI is expanding beyond plain chat into document and app workflows
        - Need enterprise permission model for these surfaces.
      - - Workspace agents
        - Tool use across tickets, documents, and messaging
        - Workspace agents page
        - Moves from retrieval into action-taking automation
        - Need failure-handling, rollback, and audit details.
      - - API platform
        - Agent Builder, Agents SDK, ChatKit, evals, fine-tuning
        - API platform page
        - Helps developers build and deploy agents with fewer third-party pieces
        - Need clarity on production observability and versioning.
      - - Realtime API
        - Voice-agent support
        - API platform page
        - Extends OpenAI into support and interaction-heavy workloads
        - Need latency, concurrency, and security boundaries for live sessions.
    notes: >-
      The integration surface is no longer incidental. It is central to OpenAI's product strategy and one of the main
      reasons the company can defend against pure-model commoditization.
    claimRefs:
      - C051
      - C053
      - C054
  - id: T505
    title: Security, privacy, and compliance matrix
    columns:
      - Control area
      - Public anchor
      - Covered products
      - Investor read
      - Diligence ask
    rows:
      - - Data training controls
        - No training on business data by default
        - API, Business, Enterprise, Edu, Healthcare, Teachers
        - Essential for enterprise adoption
        - Request contract language, exceptions, and operational enforcement detail.
      - - Retention controls
        - Custom retention and zero data retention for qualifying API use cases
        - API and enterprise products
        - Important for regulated and privacy-sensitive workloads
        - Confirm by region and by feature surface.
      - - Identity and admin
        - SAML SSO, MFA, SCIM, RBAC, domain verification, admin console
        - Business and Enterprise
        - Competitive parity requirement for large accounts
        - Request admin burden, auditability, and provisioning workflow evidence.
      - - Compliance posture
        - SOC 2 Type 2, ISO 27001/27017/27018/27701, ISO 42001, PCI-DSS, CSA STAR
        - API and business services
        - Strong current trust posture relative to many AI-native vendors
        - Confirm scope boundaries and latest certificates directly in diligence.
      - - Privacy law and sector support
        - GDPR, CCPA, HIPAA, FERPA support plus DPA and BAA availability
        - Business and API products
        - Expands regulated-market readiness
        - Clarify exactly which features are in or out of sector-specific scope.
      - - Transparency and governance
        - Government request reporting, child safety reporting, DSA reporting, trust portal
        - Corporate trust program
        - Signals a maturing governance layer around deployment
        - Need evidence that moderation and policy operations scale with product sprawl.
    notes: >-
      OpenAI's trust posture is a strategic asset. The remaining question is not whether controls exist, but how
      consistently they work across every connector, agent, and data boundary.
    claimRefs:
      - C055
      - C056
      - C057
      - C058
  - id: T506
    title: Reliability and implementation table
    columns:
      - Area
      - Evidence
      - What it suggests
      - Concern
    rows:
      - - API availability
        - 99.99% uptime across 12 API components
        - Strong headline reliability for developer workloads
        - Aggregate uptime may hide model- or tier-specific variance.
      - - ChatGPT availability
        - 99.80% uptime across 12 ChatGPT components
        - Product is broadly reliable at scale
        - Lower than API uptime and more exposed to connector/admin complexity.
      - - Codex availability
        - 99.98% uptime across 5 components
        - Coding product has near-platform reliability at headline level
        - Need incident detail by high-value workflow.
      - - FedRAMP component
        - 99.93% uptime across one component
        - Suggests public-sector readiness work is operationalized
        - Scope details are still sparse in retained evidence.
      - - Current incident
        - Workspace connector write actions partially disrupted for multiple days
        - Confirms OpenAI is operating real cross-tool action systems, not only read-only retrieval
        - Connector actions and approvals are a live operational risk surface.
    notes: >-
      Reliability looks good at an aggregate level, but the active connector incident is a useful reminder that agent
      platforms inherit the fragility of the tools they orchestrate.
    claimRefs:
      - C059
