sections:
  - number: '5.1'
    title: Product scope and platform direction
    body: |
      OpenAI's product scope has expanded from a chat interface and API into a broad operating stack. The current
      public surface includes ChatGPT, ChatGPT Business and Enterprise, Codex, workspace agents, connected apps,
      and a developer platform with agent-building and deployment primitives. That matters strategically because it
      lets OpenAI capture value at both the end-user workflow layer and the infrastructure layer.
    claimRefs:
      - C050
      - C053
      - C054
  - number: '5.2'
    title: Technical moat
    body: |
      The technical moat is less about one isolated model feature and more about product system design. OpenAI
      combines model access, user interfaces, connectors, agent orchestration, evaluation tools, and enterprise
      controls in one stack. That creates adoption leverage and raises switching costs, especially when customers
      use both ChatGPT workspaces and the API platform.
    claimRefs:
      - C051
      - C052
      - C054
  - number: '5.3'
    title: Security, privacy, and compliance posture
    body: |
      OpenAI now presents a fairly mature enterprise trust surface: no training on business data by default,
      retention controls, SAML SSO, MFA, SCIM, RBAC, SOC 2 Type 2, multiple ISO certifications, ISO 42001,
      CSA STAR, PCI-DSS, and privacy-law support. That is a strong position for a relatively young AI platform,
      though investors still need to confirm certificate scope and operational consistency across products.
    claimRefs:
      - C055
      - C056
      - C057
      - C058
  - number: '5.4'
    title: Reliability and operational risk
    body: |
      The public status page indicates strong aggregate uptime for APIs, ChatGPT, and Codex, but also highlights
      a live connector-write incident affecting ChatGPT workspace actions. That is important because OpenAI's
      newest strategic layer—agents that act across tools—also expands the failure surface. Reliability will need
      to be judged at the connector and action layer, not just at the model endpoint layer.
    claimRefs:
      - C059
  - number: '5.5'
    title: Product verdict
    body: |
      OpenAI's product platform is unusually broad and increasingly enterprise-ready. The core upside is that
      OpenAI can monetize models, workflows, and developer tooling simultaneously. The core product risk is that
      the company now has to operate a complex multi-surface platform where governance, connector depth, and
      action reliability matter as much as model quality.
    claimRefs:
      - C050
      - C054
      - C057
      - C059
