sections:
  - number: '7.1'
    title: 风险总览
    body: |
      OpenAI 的风险画像属于那种法律、治理和基础设施依赖都紧贴核心业务模型的 frontier AI 平台。最重要的风险
      不是边缘场景，而是公司结构、融资、监管与部署方式的直接结果。
    claimRefs:
      - C069
      - C070
      - C071
      - C075
      - C076
  - number: '7.2'
    title: 治理与法律暴露
    body: |
      治理仍是一个活跃尽调问题，因为 OpenAI 的结构即使放在 founder-control 或 dual-class 公司中也非常特殊。
      公司称 Foundation 通过特殊投票和治理权控制 PBC，而 CNBC 报道称，在与加州和特拉华州监管方沟通及外部
      压力下，nonprofit control 被明确保留。除此之外，NYT 数据保留争议也说明：法律程序可以强迫公司做出与
      隐私定位相冲突的运营选择。
    claimRefs:
      - C069
      - C070
      - C076
  - number: '7.3'
    title: 监管与安全风险
    body: |
      监管环境正在朝着 OpenAI 所构建系统的核心区域收紧。EU AI Act 已经对 GPAI 施加义务，并将在 2026 和
      2027 年引入更广的透明度与高风险责任。OpenAI 的应对是把安全治理进一步制度化，包括可延迟发布的独立
      Safety and Security Committee，但实际的合规与文档负担仍可能继续上升。
    claimRefs:
      - C072
      - C074
      - C075
  - number: '7.4'
    title: 伙伴与运营集中度
    body: |
      相比更早期的合作结构，OpenAI 已提升了一部分灵活性，但集中度仍然很高。Microsoft 仍是 primary cloud
      partner，持有至 2032 年的非独占 IP 许可、持续到 2030 年的收入分成安排，并持有约 27% 股权。与此同时，
      OpenAI 深入 connectors 和 agent actions 后，也创造了更多运营失效点，这一点已被公开状态页上的 live
      workspace connector 事故所证明。
    claimRefs:
      - C069
      - C071
      - C077
      - C079
  - number: '7.5'
    title: 风险结论
    body: |
      OpenAI 的风险评级应理解为“偏高，但尚非灾难性”。公司拥有可信的缓释措施——董事会层面的安全监督、企业隐私
      控制、透明度报告，以及更灵活的合作条款——但残余风险仍高，因为治理、法律和基础设施问题都可能直接传导到
      客户信任、利润率和融资结果。
    claimRefs:
      - C071
      - C072
      - C073
      - C076
      - C077
