  - id: T702
    title: 监管与法律风险表
    columns:
      - 风险领域
      - 证据
      - 重要性
      - 缓释证据
      - 尽调请求
    rows:
      - - 治理与慈善法审查
        - OpenAI 称重组在加州和特拉华州 AG 办公室沟通近一年后完成；CNBC 报道 nonprofit 控制是在外部压力后保留
        - 公司结构对监管者和批评者都异常显眼
        - Foundation 控制权与独立董事会仍然存在
        - 请求法律顾问备忘录，说明剩余监管审批、条件与挑战路径。
      - - 诉讼驱动的数据保留
        - OpenAI 称 NYT 命令强制保留 consumer ChatGPT 和 API 内容，并与隐私承诺冲突
        - 法院命令可与删除预期和国际隐私姿态冲突
        - 数据被隔离、法律保留、访问受控，并排除 Enterprise、Edu 和 ZDR 客户
        - 请求诉讼时间表、保全范围、上诉状态和客户通知协议。
      - - GPAI 合规
        - EU AI Act 对 GPAI 引入透明度、版权和系统性风险义务，部分规则已生效
        - OpenAI 很可能是欧洲监管关注的 GPAI 核心对象
        - 安全与安全委员会、透明度报告、合规控制
        - 请求欧盟合规路线图、模型分类判断与资源配置计划。
      - - 平台透明度与内容治理义务
        - Trust 页面发布 DSA 资源、请求统计与内容审核材料
        - 随着平台覆盖面和多模态能力扩大，报告负担会增加
        - 已有透明度报告节奏与 trust portal
        - 请求事故报告阈值和监管沟通日志。
    notes: 法律与监管暴露已经不是理论问题。OpenAI 已经在真实的报告、治理与隐私压力框架下运营。
    claimRefs:
      - C069
      - C070
      - C074
      - C075
      - C076
  - id: T703
    title: 伙伴与集中度风险表
    columns:
      - 集中领域
      - 公开证据
      - 风险传导
      - 缓释项
      - 剩余缺口
    rows:
      - - 云依赖
        - Microsoft 仍是 OpenAI 的 primary cloud partner；产品优先在 Azure 发布，除非 Microsoft 无法或不选择支持所需能力
        - 算力获取和经济性仍对单一大对手敏感
        - OpenAI 现在可以把产品服务给任何云上的客户
        - 实际多云容量结构与故障转移准备情况并未公开。
      - - 股东影响力
        - Microsoft 约持有 27%，Foundation 持有 26%，剩余 47% 属于员工和投资人
        - 治理、经济性和战略可选性仍然纠缠在一起
        - Foundation 保留对 Group 董事会的任命与替换权
        - 请求 side letters、否决权与保留事项清单。
      - - IP 与收入分成经济关系
        - Microsoft 持有至 2032 年的非独占 IP 许可；OpenAI 向 Microsoft 的收入分成持续到 2030 年且有总额上限
        - 影响毛利率、退出灵活性与议价能力
        - 修订协议降低了独占性并简化了部分条款
        - 实际 take rate、cap 大小和情景敏感性仍属私有。
      - - 客户集中度
        - 公共材料披露了具名部署，但未披露前十大账户暴露
        - 若少数大型企业账户主导收入，冲击会被放大
        - 广泛 business 数量与多元案例研究提供一定分散信号
        - 请求前十大客户清单和续约日历。
    notes: OpenAI 降低了一部分独占性风险，但没有消除集中度风险。其伙伴栈仍然是运营和经济性的核心。
    claimRefs:
      - C069
      - C071
      - C079
  - id: T704
    title: 运营与安全风险表
    columns:
      - 风险领域
      - 证据
      - 可能性
      - 缓释证据
      - 尽调请求
    rows:
      - - Connector 与工作流可靠性
        - 状态页显示 workspace connector write actions 连续多日中断
        - Medium
        - 聚合 uptime 披露、管理员恢复路径、审批与监控控制
        - 请求 connector 事故历史和 write-action RCA 档案。
      - - 安全与隐私控制漂移
        - 安全页面列出 SOC 2、ISO、ISO 42001、PCI-DSS、CSA STAR、audit logs、bug bounty 和 data residency
        - Medium
        - 第三方审计、安全门户、加密、访问控制、漏洞赏金
        - 按产品面确认最新证书范围和例外。
      - - 安全治理执行
        - SSC 可接收模型评估汇报，并在疑虑未解决时延迟发布
        - Medium
        - 董事会委员会监督以及与安全组织和 AI Safety Institutes 的外部协作
        - 请求延迟发布实例、override 权限与升级协议。
      - - 数据治理信任
        - Enterprise privacy 页面承诺所有权、默认不训练、保留控制和 SAML SSO
        - Medium
        - 明确的企业承诺以及对法律保留数据的单独处理
        - 测试这些承诺在诉讼和事故场景下能否持续稳定执行。
    notes: OpenAI 的缓释体系不弱，但产品面正在扩展到更多动作密集和合规敏感的工作流。
    claimRefs:
      - C072
      - C073
      - C077
      - C078
  - id: T705
    title: 缓释框架与 kill criteria
    columns:
      - 风险集群
      - 缓释证据
      - 残余风险
      - Stop-loss / kill criteria
    rows:
      - - 治理与重组
        - Foundation 控制、PBC 结构、独立董事会、AG 沟通
        - High
        - 出现实质性不利裁定或监管行动，阻断或逆转结构；或发现治理权弱于公开描述。
      - - 伙伴集中度
        - 非独占 IP 许可与跨云服务权限
        - High
        - Microsoft 关系显著恶化、算力获取中断，或经济条款显著恶化毛利率潜力。
      - - 诉讼与隐私
        - 法律保留隔离、Enterprise/Edu/ZDR 排除、持续上诉
        - Medium-high
        - 数据保留义务被扩大到影响企业数据承诺，或触发重大隐私法冲突。
      - - 安全与监管
        - SSC 监督、system cards、透明度报告、AI Act 对齐工作
        - Medium-high
        - 发生重大安全事故、监管认定 GPAI 不合规，或无法在关键市场发布核心模型。
      - - 可靠性与客户信任
        - 状态报告、管理控制、审计日志、connector 治理
        - Medium
        - 动作层反复事故、与可靠性相关的企业 churn，或持续 SLA 失守。
    notes: 风险框架应通过明确的停损条件进行监控，而不是只依赖“AI 领先者叙事”带来的主观舒适感。
    claimRefs:
      - C069
      - C071
      - C072
      - C076
      - C077
