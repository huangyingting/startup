schemaVersion: startup-diligence-report-v2
artifact: risk-regulatory
slug: openai
runDate: '2026-05-02'
company:
  name: OpenAI
  website: https://openai.com/
chapter:
  number: 7
  title: 风险与监管
  summary: >
    OpenAI 体现的是一家 frontier AI 基础设施公司的风险画像，并叠加了非常规治理复杂性。最高风险集群包括治理与 重组审查、围绕 Microsoft 与云基础设施的伙伴集中度、诉讼驱动的隐私冲突、frontier
    model 监管，以及当平台 进入 connectors 和自主动作后暴露出的运营可靠性。缓释措施确实存在，而且正在制度化，但残余风险仍高，因为 这些问题都可能直接传导到客户信任、利润率结构与融资灵活性。
  claimRefs:
    - C069
    - C070
    - C071
    - C072
    - C075
    - C076
callouts:
  - type: key-insight
    title: OpenAI 最大的风险是结构性的，而不是表面的。
    body: |
      治理设计、云与股东集中度、诉讼引发的隐私义务，以及 AI 监管都紧贴公司的核心运营模型。这些不是靠更好的 对外叙事就能解决的边缘问题。
    claimRefs:
      - C069
      - C070
      - C071
      - C075
      - C076
  - type: risk-alert
    title: 运营和法律摩擦会很快传导成客户与估值压力。
    body: |
      法院要求的数据保留、持续演进的 GPAI 监管，以及实时 connector 事故，都说明法律和运营事件会穿透隐私姿态、
      企业信任、续约风险和利润率。OpenAI 的规模同时放大了上行和爆炸半径。
    claimRefs:
      - C075
      - C076
      - C077
      - C078
