      - Assumptions
      - Valuation view
      - Return logic
      - Probability signal
    rows:
      - - Bull
        - >-
          $2B monthly revenue is sustained and expands, enterprise mix rises above 50%, margin structure
          improves, partner terms stay manageable, and IPO investors continue to reward frontier AI scarcity
        - $850B-$1.1T could be supportable over time
        - Upside exists if OpenAI becomes the default AI operating layer with better-than-feared economics
        - Possible, but requires exceptional execution.
      - - Base
        - >-
          Revenue remains very large but quality is mixed by compute cost, partner share, and incomplete
          retention proof; public investors apply less exuberant but still premium multiples
        - $450B-$650B fair-value band before preference/cash adjustments
        - Limited upside versus the current private mark
        - Most prudent public-data stance.
      - - Bear
        - >-
          Growth slows, compute commitments outrun cash efficiency, governance/regulatory issues worsen, or
          public AI multiples compress materially
        - $250B-$400B downside band
        - Meaningful downside from current private marks
        - Cannot be dismissed.
