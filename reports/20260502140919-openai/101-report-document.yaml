figures:
  - id: F901
    title: Recommendation logic
    type: logic-chain
    layout: wide
    summary: >-
      Public evidence supports an elite-scale AI platform, but valuation and missing disclosure bridges keep
      the recommendation at research-more.
    data:
      items: []
      nodes:
        - label: Scale proof
          detail: OpenAI reports 900M+ weekly active users, 50M+ subscribers, and 9M+ paying business users.
          tone: positive
        - label: Platform breadth
          detail: >-
            The company spans ChatGPT, enterprise workspaces, Codex, agents, APIs, and growing workflow
            automation.
          tone: positive
        - label: Enterprise monetization
          detail: OpenAI says enterprise contributes more than 40% of revenue and serves 1M+ businesses.
          tone: opportunity
        - label: Valuation constraint
          detail: >-
            $852B post-money is roughly 35.5x annualized revenue run rate based on the public $2B monthly
            anchor.
          tone: high
        - label: Missing bridges
          detail: Gross margin, NRR, churn, concentration, partner economics, and full burn are not public.
          tone: risk
        - label: Recommendation
          detail: >-
            Research more; the asset is strategically important, but the current mark already prices in
            extraordinary execution.
          tone: neutral
      edges: []
      points: []
      columns: []
      rows: []
      series: []
      layers: []
    approximationNotes: >-
      Synthesizes public evidence only; private financial and governance diligence could materially change the
      stance.
