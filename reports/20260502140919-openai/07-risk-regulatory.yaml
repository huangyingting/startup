schemaVersion: startup-diligence-report-v2
artifact: risk-regulatory
slug: openai
runDate: '2026-05-02'
company:
  name: OpenAI
  website: https://openai.com/
chapter:
  number: 7
  title: Risk & Regulatory
  summary: >
    OpenAI carries the risk profile of a frontier infrastructure company with unusual governance complexity. The top
    risk clusters are governance and restructuring scrutiny, partner concentration around Microsoft and cloud
    infrastructure, litigation-driven privacy conflicts, frontier-model regulation, and operational reliability as the
    platform expands into connectors and autonomous actions. Mitigations are real and increasingly formalized, but
    residual risk remains high because these issues can propagate directly into customer trust, margin structure, and
    financing flexibility.
  claimRefs:
    - C069
    - C070
    - C071
    - C072
    - C075
    - C076
callouts:
  - type: key-insight
    title: OpenAI's biggest risks are structural, not cosmetic.
    body: >
      Governance design, cloud and shareholder concentration, litigation-driven privacy obligations, and AI regulation
      all sit close to the company's core operating model. These are not peripheral issues that can be solved with
      better messaging alone.
    claimRefs:
      - C069
      - C070
      - C071
      - C075
      - C076
  - type: risk-alert
    title: Operational and legal friction can translate quickly into customer and valuation pressure.
    body: |
      A court-directed data retention order, evolving GPAI regulation, and live connector incidents all show how
      legal and operational events can travel through privacy posture, enterprise trust, renewal risk, and margin.
      OpenAI's scale amplifies both the upside and the blast radius.
    claimRefs:
      - C075
      - C076
      - C077
      - C078
