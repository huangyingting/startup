sections:
  - number: '7.1'
    title: Risk overview
    body: |
      OpenAI's risk profile is that of a frontier AI platform whose legal, governance, and infrastructure
      dependencies sit very close to the core business model. The most material risks are not fringe scenarios;
      they are direct consequences of how the company is structured, financed, regulated, and deployed.
    claimRefs:
      - C069
      - C070
      - C071
      - C075
      - C076
  - number: '7.2'
    title: Governance and legal exposure
    body: |
      Governance remains a live diligence issue because OpenAI's structure is unusual even by founder-control or
      dual-class standards. The company says the Foundation controls the PBC through special voting and governance
      rights, while CNBC reported that nonprofit control was explicitly retained after discussions with California
      and Delaware authorities and amid external pressure. On top of this, litigation such as the NYT data-retention
      dispute shows how legal proceedings can force operational choices that conflict with privacy positioning.
    claimRefs:
      - C069
      - C070
      - C076
  - number: '7.3'
    title: Regulatory and safety risk
    body: |
      The regulatory environment is tightening around exactly the kind of systems OpenAI builds. The EU AI Act
      already applies GPAI obligations and will add broader transparency and high-risk obligations across 2026 and
      2027. OpenAI's response has been to formalize its safety governance, including an independent Safety and
      Security Committee with authority to delay releases, but the practical burden of compliance and documentation
      will likely continue rising.
    claimRefs:
      - C072
      - C074
      - C075
  - number: '7.4'
    title: Partner and operational concentration
    body: |
      OpenAI has improved flexibility relative to earlier partnership structures, but concentration remains high.
      Microsoft is still the primary cloud partner, retains a non-exclusive IP license through 2032, receives
      revenue share through 2030, and holds roughly 27% equity. At the same time, OpenAI's expansion into
      connectors and agent actions creates more operational failure modes, as shown by the live workspace connector
      incident on the public status page.
    claimRefs:
      - C069
      - C071
      - C077
      - C079
  - number: '7.5'
    title: Risk verdict
    body: |
      OpenAI's risk rating should be considered elevated rather than catastrophic. The company has credible
      mitigations—board-level safety oversight, enterprise privacy controls, transparency reporting, and more
      flexible partnership terms—but residual risk remains high because governance, legal, and infrastructure issues
      can all translate directly into customer trust, margin, and financing outcomes.
    claimRefs:
      - C071
      - C072
      - C073
      - C076
      - C077
