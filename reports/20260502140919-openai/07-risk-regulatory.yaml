  - id: T702
    title: Regulatory and legal risk table
    columns:
      - Risk area
      - Evidence
      - Why it matters
      - Mitigation evidence
      - Diligence ask
    rows:
      - - Governance and charity-law scrutiny
        - >-
          OpenAI says recapitalization followed nearly a year of dialogue with the Attorneys General of California and
          Delaware; CNBC reported nonprofit control was retained after outside pressure
        - Corporate structure remains unusually visible to regulators and critics
        - Foundation control rights and independent board remain in place
        - Request counsel memo on remaining regulatory approvals, conditions, and challenge pathways.
      - - Litigation-driven data retention
        - >-
          OpenAI says the NYT order forced retention of consumer ChatGPT and API content and conflicted with privacy
          commitments
        - Court-directed retention can clash with deletion expectations and international privacy posture
        - Data is segregated, legally held, access-controlled, and excludes Enterprise, Edu, and ZDR customers
        - Request litigation schedule, preservation scope, appeal status, and customer-notice protocol.
      - - GPAI compliance
        - EU AI Act imposes GPAI transparency, copyright, and systemic-risk obligations; some rules already effective
        - OpenAI is a likely GPAI focal company in Europe
        - Safety and security committee, transparency reporting, compliance controls
        - Request EU compliance roadmap, model classification view, and resourcing plan.
      - - Platform transparency and moderation obligations
        - Trust page publishes DSA resources, request statistics, and moderation materials
        - Reporting burden will rise with platform reach and multimodal features
        - Existing transparency-reporting cadence and trust portal
        - Request incident reporting thresholds and regulator engagement logs.
    notes: >-
      Legal and regulatory exposure is no longer theoretical. OpenAI already operates under real reporting, governance,
      and privacy-pressure regimes.
    claimRefs:
      - C069
      - C070
      - C074
      - C075
      - C076
  - id: T703
    title: Partner and concentration risk table
    columns:
      - Concentration area
      - Public evidence
      - Risk transmission
      - Mitigant
      - Remaining gap
    rows:
      - - Cloud dependency
        - >-
          Microsoft remains OpenAI's primary cloud partner; products ship first on Azure unless Microsoft cannot or
          chooses not to support needed capabilities
        - Compute access and economics remain sensitive to one major counterparty
        - OpenAI can now serve products across any cloud provider
        - Actual multi-cloud capacity mix and fallback readiness are not public.
      - - Shareholder influence
        - Microsoft holds roughly 27%; Foundation 26%; remaining 47% held by employees and investors
        - Governance, economics, and strategic optionality remain intertwined
        - Foundation retains appointment and replacement rights over the Group board
        - Request side letters, vetoes, and reserved-matter schedules.
      - - IP and revenue-share economics
        - >-
          Microsoft holds a non-exclusive OpenAI IP license through 2032; OpenAI revenue-share payments continue through
          2030 subject to a cap
        - Affects gross margin, exit flexibility, and bargaining power
        - Amended agreement reduced exclusivity and simplified some terms
        - Effective take rate, cap size, and scenario sensitivity are still private.
      - - Customer concentration
        - Public materials disclose named deployments but not top-account exposure
        - Revenue shocks could be amplified if a few large enterprise accounts dominate
        - Broad business count and diverse case-study set provide some diversification signal
        - Request top-10 customer schedule and renewal calendar.
    notes: >-
      OpenAI has reduced some exclusivity risk, but not concentration risk. The partner stack is still central to both
      operations and economics.
    claimRefs:
      - C069
      - C071
      - C079
  - id: T704
    title: Operational and security risk table
    columns:
      - Risk area
      - Evidence
      - Likelihood
      - Mitigation evidence
      - Diligence ask
    rows:
      - - Connector and workflow reliability
        - Status page shows workspace connector write actions disrupted for multiple days
        - Medium
        - Aggregate uptime disclosure, admin re-enable path, approval and monitoring controls
        - Request connector incident history and write-action RCA library.
      - - Security and privacy control drift
        - >-
          Security page lists SOC 2, ISO, ISO 42001, PCI-DSS, CSA STAR, audit logs, bug bounty, and data residency
          controls
        - Medium
        - Third-party audits, security portal, encryption, access controls, bug bounty
        - Confirm latest certificate scope and exceptions by product surface.
      - - Safety oversight execution
        - SSC can receive model-evaluation briefings and delay releases if concerns are unresolved
        - Medium
        - Board committee oversight and external collaborations with safety organizations and AI safety institutes
        - Request examples of delayed launches, override rights, and escalation protocols.
      - - Data governance trust
        - Enterprise privacy page promises ownership, no training by default, retention controls, and SAML SSO
        - Medium
        - Clear enterprise commitments and separate handling for legal-hold data
        - Test whether commitments remain operationally consistent during litigation and incident scenarios.
    notes: >-
      OpenAI's mitigations are substantial, but the product surface is expanding into more action-heavy and
      compliance-sensitive workflows.
    claimRefs:
      - C072
      - C073
      - C077
      - C078
  - id: T705
    title: Mitigation framework and kill criteria
    columns:
      - Risk cluster
      - Mitigation evidence
      - Residual risk
      - Stop-loss / kill criteria
    rows:
      - - Governance and restructuring
        - Foundation control, PBC structure, independent board, AG engagement
        - High
        - >-
          Material adverse ruling or regulatory action that blocks or unwinds the structure, or evidence that governance
          rights are weaker than represented.
      - - Partner concentration
        - Non-exclusive IP license and multi-cloud serving permission
        - High
        - >-
          Major Microsoft relationship deterioration, compute access disruption, or economics that materially worsen
          gross-margin potential.
      - - Litigation and privacy
        - Legal-hold segregation, exclusions for Enterprise/Edu/ZDR, continued appeals
        - Medium-high
        - >-
          Expansion of retention obligations in ways that affect enterprise data promises or trigger material
          privacy-law conflicts.
      - - Safety and regulation
        - SSC oversight, system cards, transparency reports, AI Act alignment work
        - Medium-high
        - >-
          Major safety incident, regulator finding of GPAI noncompliance, or inability to ship core models in a major
          market.
      - - Reliability and customer trust
        - Status reporting, admin controls, audit logs, connector governance
        - Medium
        - Repeated action-layer incidents, enterprise churn linked to reliability, or sustained SLA underperformance.
    notes: >-
      The risk framework should be monitored with explicit stop conditions, not only narrative comfort about AI
      leadership.
    claimRefs:
      - C069
      - C071
      - C072
      - C076
      - C077
