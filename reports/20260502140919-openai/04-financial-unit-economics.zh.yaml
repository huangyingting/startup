sections:
  - number: '4.1'
    title: 收入质量
    body: |
      OpenAI 的收入规模已不再具有猜测性。公司称，在 ChatGPT 推出后一年内收入达到 10 亿美元，
      2024 年底已达每季度 10 亿美元，2026 年 3 月更达到每月 20 亿美元。这一轨迹足以高置信度说明
      需求真实存在。真正未解的问题是：在折扣、云成本与伙伴分成之后，这些收入是否仍像高质量软件收入。
    claimRefs:
      - C039
      - C040
  - number: '4.2'
    title: 定价与变现架构
    body: |
      OpenAI 并不是只依赖单一价格模型，而是通过订阅、席位、定制企业合同、按 token 计费的 API，以及
      工具类定价来分层变现。这种架构在战略上很有价值，因为它提升了交叉销售潜力；但如果管理层无法按产品面
      和客户队列证明利润率，这套架构也会让收入质量分析变得更加复杂。
    claimRefs:
      - C045
      - C046
  - number: '4.3'
    title: 资本密集度与伙伴经济关系
    body: |
      这一财务模型在设计上就具有资本密集特征。OpenAI 在 2025 和 2026 年的大规模融资、循环授信扩张，
      以及修订后的 Microsoft 协议，都指向一个必须持续把收入增长与基础设施获取、战略资本绑定的业务。
      投资人不能把顶线规模自动等同于自由现金流能力。
    claimRefs:
      - C042
      - C043
      - C044
      - C047
  - number: '4.4'
    title: 单位经济学盲区
    body: |
      最大的未解问题不是需求，而是单位经济学。公开证据没有披露毛利率、CAC、LTV、回收期、NRR、GRR、
      burn 或客户集中度。这些缺口很关键，因为公司所处的是一个重算力行业，同时又叠加了重要的伙伴经济关系
      和极高估值。
    claimRefs:
      - C049
  - number: '4.5'
    title: 财务结论
    body: |
      从顶线来看，OpenAI 的收入质量很强，而且正在更多地由企业收入驱动；但当前证据仍不足以支持“软件式
      高利润率”这一结论。因此，财务结论应理解为“商业已验证，经济性仍不完整”：投资人可以相信收入规模，
      但仍必须直接尽调利润率、留存和现金效率。
    claimRefs:
      - C039
      - C041
      - C049
