schemaVersion: startup-diligence-report-v2
artifact: financial-unit-economics
slug: openai
runDate: '2026-05-02'
company:
  name: OpenAI
  website: https://openai.com/
chapter:
  number: 4
  title: 财务与单位经济学
  summary: >
    OpenAI 已披露足够多的数据来证明其顶线规模极其巨大，但还不足以让投资人高置信度承销典型的软件单位经济学。 公司称，在 ChatGPT 推出后一年内收入达到 10 亿美元，2024 年底已达每季度 10 亿美元，2026 年 3
    月已达 每月 20 亿美元，且企业收入占比已超过 40%。与此同时，这一业务仍然依赖巨额外部资本、合作伙伴经济关系 与算力扩张。收入质量在方向上很强，但利润率质量仍大多处于私有状态。
  claimRefs:
    - C039
    - C040
    - C041
    - C044
callouts:
  - type: key-insight
    title: OpenAI 的财务信号已跨过“创业公司”阶段，进入平台级规模。
    body: |
      公司现在会公开月度收入、企业收入占比、API 吞吐，以及超大规模融资事件。这足以确认商业规模， 但仍不足以验证毛利率、回收期或自由现金流在扣除云与合作伙伴经济关系后的真实质量。
    claimRefs:
      - C039
      - C040
      - C041
      - C044
  - type: risk-alert
    title: 融资能力和收入规模可见，但资本效率不可见。
    body: |
      OpenAI 的融资历史、收入分成安排、循环授信扩张以及重算力战略都意味着其运营模式资本密集。在缺少
      毛利率、CAC、留存与 burn 数据的情况下，投资人本质上是在先承销规模、后验证经济质量。
    claimRefs:
      - C042
      - C043
      - C044
      - C047
tables:
  - id: T401
    title: 收入来源与变现机制
    columns:
      - 收入来源
      - 机制
      - 公开证据
      - 质量备注
      - 尽调请求
    rows:
      - - 消费者订阅
        - 通过 ChatGPT 进行月度订阅
        - 2026 年 3 月融资公告披露订阅用户超过 5000 万
        - 属于高频经常性收入，但各套餐结构未披露
        - 拆分 Go、Plus、Pro 等消费者计划的构成和流失率。
      - - Business 席位
        - 按用户月费计价
        - ChatGPT Business 标价每用户每月 25 新元
        - 理论上具备较好的经常性席位经济学，但实际折扣未知
        - 提供按客户队列分层的实际 ARPU 与折扣政策。
      - - Enterprise 合同
        - 定制化企业定价
        - Enterprise 为定制定价，且企业已占总收入 40%+
        - 最有可能形成高质量收入，但合同结构不透明
        - 提供平均合同价值、续约条款和客户集中度。
      - - API 使用
        - token 定价，加工具调用和容器定价
        - GPT-5.5、GPT-5.4、多模态、web search 与 containers 均有公开定价
        - 变现潜力强，但毛利率取决于推理成本和伙伴条款
        - 拆分 API 净收入、毛利率和算力转嫁经济关系。
      - - 编程与智能体产品
        - 按使用量计费与嵌入式变现
        - Business Codex 采用按量计费，Codex 使用增长很快
        - 可能成为高扩张楔子，但实际付费意愿仍不清楚
        - 将智能体收入与一般 API/工作区收入拆分。
    notes: OpenAI 同时通过多种机制变现。关键问题已经不再是“能否收费”，而是“混合收入结构能否支撑软件式利润率”。
    claimRefs:
      - C039
      - C041
      - C045
      - C046
  - id: T402
    title: 已公布的定价与打包锚点
    columns:
      - 触面
      - 价格锚点
      - 单位
      - 注意事项
      - 证据基础
    rows:
      - - ChatGPT Business
        - SGD 25
        - user / month
        - 适用年付与防滥用限制
        - 官方 Business 定价页
      - - Business Codex
        - 固定席位费为 0
        - pay-as-you-go
        - 实际成本取决于使用强度
        - 官方 Business 定价页
      - - GPT-5.5 API input
        - $5.00
        - per 1M tokens
        - 为标价而非实际混合 ASP
        - 官方 API 定价页
      - - GPT-5.5 API output
        - $30.00
        - per 1M tokens
        - 服务成本可能压缩净利润率
        - 官方 API 定价页
      - - Web search tool
        - $10.00
        - per 1k calls
        - 工具变现可能改善混合 ARPU
        - 官方 API 定价页
      - - Containers
        - $0.03
        - per 1 GB container session
        - 额外的算力变现层
        - 官方 API 定价页
      - - Enterprise
        - Custom
        - contract
        - 大概率包含折扣与个性化条款
        - 官方 Business 定价页
    notes: 公布的价格体现变现意图，而不代表实际收入质量。折扣、credits、伙伴经济关系与使用结构都可能实质改变实际经济性。
    claimRefs:
      - C045
      - C046
  - id: T403
    title: 公开财务锚点
    columns:
      - 指标
      - 数值
      - 日期或期间
      - 置信度
      - 解读
    rows:
      - - 收入达到 10 亿美元
        - 'Yes'
        - ChatGPT 推出后一年内
        - 中
        - 说明商业化速度极快。
      - - 收入节奏
        - 每季度 10 亿美元
        - 2024 年底
        - 中
        - 说明在 2026 年跳升前已经形成规模。
      - - 收入节奏
        - 每月 20 亿美元
        - 2026 年 3 月
        - 中
        - 若持续，相当于年化 240 亿美元收入运行率。
      - - 企业收入占比
        - 40%+
        - 2026 年 3 月
        - 中
        - 收入质量正在向企业软件收入靠拢。
      - - API 吞吐
        - 每分钟 150 亿+ token
        - 2026 年 3 月
        - 中
        - 开发者和企业需求已大到足以显著影响整体财务。
      - - 循环授信额度
        - 47 亿美元
        - 2026 年 3 月
        - 高
        - 表明资产负债表具备灵活性，但也说明资金需求持续存在。
      - - 银行渠道个人投资参与
        - 30 亿美元+
        - 2026 年 3 月
        - 高
        - 说明所有权更广，但并不自动改善经营经济性。
    notes: 大多数收入锚点仍然是公司自行披露而非经审计数据。它们适合作为规模信号，但不能等同于 GAAP 质量财报。
    claimRefs:
      - C039
      - C040
      - C041
      - C044
  - id: T404
    title: 融资、资本与伙伴经济关系
    columns:
      - 项目
      - 公开锚点
      - 财务影响
      - 核心问题
    rows:
      - - 2025 年 3 月融资
        - 400 亿美元、投后估值 3000 亿美元
        - 扩大算力与产品投入能力
        - 其中有多少是真正一级资金，多少是战略对价？
      - - 2026 年 2 月融资包
        - 1100 亿美元、投前估值 7300 亿美元
        - 把资本与 Amazon、NVIDIA、SoftBank 关系直接绑定
        - 其中多少价值来自现金，多少来自基础设施承诺？
      - - 2026 年 3 月完成交割
        - 1220 亿美元承诺资本、投后估值 8520 亿美元
        - 锁定了超大幅度的融资跃升
        - 优先权、治理与稀释条款是什么？
      - - Microsoft 经济关系
        - OpenAI 向 Microsoft 的收入分成持续到 2030 年，且有总额上限
        - 影响毛利率与自由现金流转化
        - 修订协议后的有效综合 take rate 是多少？
      - - Foundation / 股东结构
        - Foundation 26%、Microsoft 约 27%、员工与投资人 47%
        - 这一治理与价值分配结构非常不寻常
        - 认股权安排和未来融资将如何改变持股？
    notes: OpenAI 的财务模型不能与伙伴经济关系和治理设计分开看。资本既是输入，也是竞争杠杆。
    claimRefs:
      - C042
      - C043
      - C044
      - C047
      - C048
  - id: T405
    title: 单位经济学与明确缺口
    columns:
      - 指标
      - 公开数值
      - 置信度
      - 重要性
      - 具体尽调请求
    rows:
      - - Gross margin
        - null
        - Low
        - 决定 OpenAI 更像软件公司还是算力转售商
        - 提供消费者、企业、API 与编程产品的分项毛利率。
      - - Contribution margin
        - null
        - Low
        - 反映分发与支持是否可规模化
        - 提供扣除托管、伙伴分成与支持成本后的贡献利润率。
      - - CAC
        - null
        - Low
        - 用于判断席位增长质量
        - 提供消费者、Business 与 Enterprise 的综合和分层 CAC。
      - - LTV
        - null
        - Low
        - 用于评估在价格竞争下的增长耐久性
        - 提供基于留存、毛利率和扩张的 LTV 假设。
      - - Payback
        - null
        - Low
        - 用于评估资本效率
        - 提供按渠道和细分市场拆分的销售与营销回收期。
      - - NRR / GRR
        - null
        - Low
        - 企业承销的关键指标
        - 提供企业 NRR、GRR、logo churn 与 cohort retention。
      - - Burn and runway
        - null
        - Low
        - 估值与融资风险的关键输入
        - 提供月度净 burn、经营现金流、capex 或算力承诺，以及流动性跑道。
      - - Customer concentration
        - null
        - Low
        - 战略云、公共部门和大型企业集中度会扭曲收入质量
        - 提供前十大客户与伙伴在收入和算力依赖中的占比。
    notes: OpenAI 的公开财务故事在规模上异常丰富，在单位经济学上却异常稀薄。所有低于毛收入层面的关键承销指标仍是活跃尽调请求。
    claimRefs:
      - C049
