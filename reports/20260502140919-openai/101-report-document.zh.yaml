        - 在未披露利润率和留存的情况下出现更高一轮融资。
      - - 财务质量
        - 要求经审计的收入净额桥接和毛利率桥接
        - 若毛利率结构性过低，将无法支撑高溢价软件式倍数。
      - - 客户耐久性
        - 要求 NRR、GRR、流失和集中度数据
        - 前十大账户主导收入，或续约质量明显弱于当前暗示。
      - - 治理与法律
        - 要求更清晰的上市公司治理路径和诉讼地图
        - 出现对结构、隐私姿态或上市路径具有实质约束的不利裁决/监管干预。
      - - 伙伴经济关系
        - 要求完整的 Microsoft 与算力经济敏感性分析
        - 若实际云/收入分成条款更严苛，将进一步压缩当前估值假设下的上行空间。
