  - id: F102
    title: OpenAI 融资与治理里程碑
    type: timeline
    layout: standard
    summary: OpenAI 从非营利创立走向前沿级 PBC 平台的公开里程碑。
    data:
      items:
        - date: '2015'
          label: 以非营利形式成立
          detail: OpenAI 表示公司于 2015 年以使命驱动的非营利实验室形式创立。
          tone: neutral
        - date: '2019'
          label: 设立营利性子公司
          detail: 为了扩大研究与部署规模，OpenAI 设立营利性子公司，同时仍由非营利母体控制。
          tone: neutral
        - date: '2022-05'
          label: 管理层角色更新
          detail: Greg Brockman 出任 President，Brad Lightcap 出任 COO，反映公司进入规模化阶段。
          tone: positive
        - date: '2024-03'
          label: 董事会刷新
          detail: Sue Desmond-Hellmann、Nicole Seligman、Fidji Simo 加入董事会，Sam Altman 回归。
          tone: neutral
        - date: '2025-03-31'
          label: 以 3000 亿美元估值宣布 400 亿美元融资
          detail: OpenAI 将该轮融资与 ChatGPT 每周 5 亿用户及 SoftBank 支持绑定披露。
          tone: positive
        - date: '2025-10-28'
          label: 宣布 Foundation / PBC 结构
          detail: OpenAI Foundation 与 OpenAI Group PBC 成为新的正式结构。
          tone: neutral
        - date: '2026-02-27'
          label: 披露 1100 亿美元预交割融资包
          detail: Amazon、NVIDIA、SoftBank 在 7300 亿美元投前估值下承诺资本与基础设施支持。
          tone: positive
        - date: '2026-03-31'
          label: 以 8520 亿美元投后估值完成 1220 亿美元交割
          detail: OpenAI 同时披露每月 20 亿美元收入与广泛投资人参与。
          tone: positive
        - date: '2026-04-27'
          label: Microsoft 合作修订
          detail: OpenAI 获得多云产品灵活性，Microsoft 保留封顶收入分成与重大股东地位。
          tone: opportunity
    approximationNotes: 部分条目使用公告日期，因为真实交割机制与实施日期并未完全公开。
