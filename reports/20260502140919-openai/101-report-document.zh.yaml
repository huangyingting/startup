figures:
  - id: F901
    title: 建议逻辑
    type: logic-chain
    layout: wide
    summary: 公开证据支持 OpenAI 是一家具备精英级规模的 AI 平台，但估值与披露缺口使建议维持在 research-more。
    data:
      nodes:
        - label: 规模证明
          detail: OpenAI 披露拥有 9 亿+周活用户、5000 万+订阅者和 900 万+付费企业用户。
          tone: positive
        - label: 平台广度
          detail: 公司覆盖 ChatGPT、企业工作区、Codex、agents、API 与不断扩展的工作流自动化。
          tone: positive
        - label: 企业变现
          detail: OpenAI 表示企业业务贡献了 40%+ 的收入，并服务 100 万+企业。
          tone: opportunity
        - label: 估值约束
          detail: 按公开每月 $2B 收入锚点计算，$852B 投后估值约为 35.5 倍年化收入运行率。
          tone: high
        - label: 缺失桥梁
          detail: 毛利率、NRR、流失率、集中度、合作伙伴经济与完整 burn 数据仍未公开。
          tone: risk
        - label: 最终建议
          detail: research-more；资产战略意义极高，但当前价格已隐含非常理想的执行结果。
          tone: neutral
    approximationNotes: 仅基于公开证据综合判断；若获得私有财务和治理材料，建议可能上调或下调。
    claimRefs:
      - C013
      - C026
      - C080
      - C061
      - C060
      - C039
      - C012
      - C044
      - C081
      - C088
      - C049
      - C089
  - id: F101
    title: OpenAI 公司快照逻辑图
    type: logic-chain
    layout: wide
    summary: OpenAI 承销逻辑的公司层级地图：分发规模、变现场景、基础设施杠杆、治理约束与估值压力。
    data:
      nodes:
        - label: 消费者分发
          detail: ChatGPT 每周活跃用户超过 9 亿、订阅用户超过 5000 万，构成工作场景采用的顶层漏斗。
          tone: positive
        - label: 企业变现
          detail: 付费企业用户超过 900 万，企业收入占比超过 40%，显示工作场景扩张已具实质规模。
          tone: positive
        - label: 开发者平台
          detail: API 每分钟处理超过 150 亿 token，Codex 每周用户超过 200 万，说明开发者触面已形成独立资产。
          tone: opportunity
        - label: 基础设施护城河
          detail: >-
            资本、云与芯片关系横跨 Microsoft、Amazon、NVIDIA、Oracle、CoreWeave、Google Cloud、AMD、Trainium、Cerebras 与
            Broadcom。
          tone: opportunity
        - label: 治理约束
          detail: OpenAI Foundation 控制 OpenAI Group PBC，并保留使命优先的董事会权力。
          tone: neutral
        - label: 估值与法律压力
          detail: 8520 亿美元投后估值、不断变化的 Microsoft 经济条款，以及围绕公司结构的审视，使执行失误容错极低。
          tone: risk
    approximationNotes: 图示基于公开披露综合而成；私有经济数据与完整董事权利包并未完全公开。
