      EV/revenue and ignore cash, preferences, and debt-like commitments.
    claimRefs:
      - C081
      - C083
      - C088
sections:
  - number: '8.1'
    title: Investment thesis
    body: |
      OpenAI is one of the very few private companies that clearly qualifies as a frontier platform candidate rather
      than a speculative AI startup. It has massive user reach, meaningful enterprise adoption, strong product
      breadth, and unmatched access to strategic capital and infrastructure. The thesis is strongest if that scale
      converts into durable enterprise-heavy revenue with improving unit economics.
    claimRefs:
      - C080
      - C081
      - C060
      - C084
      - C085
  - number: '8.2'
    title: Anti-thesis
    body: |
      The anti-thesis is mostly about valuation and evidence quality. OpenAI's current private marks imply
      exceptional expectations, yet public evidence still does not show gross margin, contribution margin, NRR,
      churn, burn, or full partner economics. Governance and regulatory complexity add an additional discount that
      public markets may not overlook.
    claimRefs:
      - C082
      - C060
      - C084
      - C087
      - C088
  - number: '8.3'
    title: Valuation stance
    body: |
      The current valuation stance is expensive rather than merely stretched. At around 35.5x annualized revenue
      run rate, the March 2026 mark sits above what public evidence can comfortably justify, especially given the
      unresolved unit-economics and governance questions. OpenAI may still earn into the valuation over time, but
      public evidence does not support paying for that outcome today without protection.
    claimRefs:
      - C081
      - C082
      - C088
  - number: '8.4'
    title: IPO and exit readiness
    body: |
      OpenAI has the scale narrative for an IPO, but not yet the clean underwriting profile. Revenue and customer
      reach are IPO-sized, while governance, privacy litigation, partner concentration, and margin opacity remain
      below ideal public-market readiness. The likely exit route is still IPO, but investors should not confuse
      probable exit route with readiness quality.
    claimRefs:
      - C081
      - C082
      - C084
      - C087
  - number: '8.5'
    title: Final recommendation
    body: |
      The final recommendation is research-more with an expensive valuation stance, medium confidence, and
      significant risk rating. OpenAI is too important to ignore, but too expensive and too structurally opaque to
      underwrite confidently from public evidence alone. The right posture is disciplined curiosity: stay close,
      but demand deeper private proof before committing capital at or above current marks.
    claimRefs:
      - C081
      - C084
      - C087
      - C088
