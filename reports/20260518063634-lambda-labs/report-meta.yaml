      claimRefs: [CO001, CO007]
  foundingLocation: San Francisco, California
  headquarters: San Francisco, California
  productSummary: >-
    Lambda sells GPU compute and AI infrastructure across five product tiers: (1) On-Demand GPU
    Instances (B200 at $6.69/hr, H100 at $3.99/hr, A100 at $2.79/hr) with zero egress fees;
    (2) 1-Click Clusters — self-serve InfiniBand-connected GPU clusters from 16 to 2,000+ B200 or
    H100 GPUs with Kubernetes/Slurm orchestration; (3) Private Cloud — dedicated, single-tenant
    GPU infrastructure deployed on-premises or co-location; (4) Superclusters — hyperscaler-grade
    multi-thousand-GPU AI factory deployments; and (5) Lambda Stack — a software layer including
    Kubernetes/Slurm orchestration, Lambda Chat, and Lambda API (OpenAI-compatible). Hardware
    uses NVIDIA HGX B200, H100, GB300 NVL72, VR200 NVL72 systems over NVIDIA Quantum-2
    InfiniBand with SHARP acceleration. Data centers are Tier 3 / Tier 4 with AWS Direct Connect,
    GCP Interconnect, Azure ExpressRoute, and OCI FastConnect cloud interconnects.
  customerFocus: >-
    AI researchers, enterprise ML teams, model training labs, and hyperscalers needing
    cost-efficient, high-density GPU compute with InfiniBand interconnects and no egress lock-in.
    Named customers include Pika (video generation), fal.ai (open-source AI), Meshy (3D generative
    AI), Genesis Therapeutics (drug discovery), and Iambic Therapeutics. Four hyperscaler customers
    are undisclosed except for Microsoft.
  businessModel: >-
    Consumption-based pay-per-GPU-hour billing for on-demand instances; term-based reservations
    for 1-Click Clusters and Private Cloud. Revenue is hardware utilization minus GPU capex,
    networking, and facility costs. GPU margin depends on NVIDIA allocation (strategic, via NVIDIA's
    Series D equity stake) and spot/forward purchase mix. Revenue and gross margin are not publicly
    disclosed.
  stage: late-stage private
  fundingStatus: >-
    Series E ($1.5B+, Nov 2025, TWG Global / USIT lead); Series D ($480M, Feb 2025, Andra Capital /
    SGW lead, NVIDIA / Andrej Karpathy investors); Series C ($320M, Feb 2024); total equity
    ~$2.3B+. $1B senior secured credit facility (May 2026) for data center buildout. Total capital
    ~$3.3B+.
  disclosureProfile: private-undisclosed
