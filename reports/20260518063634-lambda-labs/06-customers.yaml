runDate: '2026-05-18'
company:
  name: Lambda Labs
chapter:
  number: 6
  title: Customers
  summary: >-
    Lambda Labs reported 10,000+ active customers as of May 2026, spanning enterprise ML teams,
    AI research organizations, healthcare and drug discovery companies, media and entertainment
    startups, and individual developers. Named production customers include Microsoft (hyperscaler),
    Pika (video generation), Iambic Therapeutics, fal, Meshy, Genesis Therapeutics, and Oumi.
    An unnamed AI Hyperscaler deployed a 2,000-GPU Supercluster in 90 days. All customer proof
    is sourced exclusively from Lambda's own materials; independent corroboration is limited.
    Retention metrics (NRR, GRR, churn) are not publicly disclosed. Developer community sentiment
    is broadly positive, with GPU availability cited as a recurring friction point. Revenue
    concentration from undisclosed hyperscaler contract terms is a material diligence gap.

sections:
  - id: customer-segmentation
    title: Customer Base Segmentation
    summary: >-
      Lambda serves 10,000+ active customers across enterprise ML, AI research, healthcare,
      media, and developer segments, with primary concentration in the United States.
    body: >-
      Lambda Labs serves a broad range of customers across the AI compute ecosystem. As of May
      2026, Lambda reported 10,000+ active customers, spanning enterprise ML teams, AI research
      organizations, healthcare and drug discovery companies, media and entertainment studios,
      and individual developers and researchers. Geographically, the customer base is primarily
      concentrated in the United States, with meaningful adoption in Europe and internationally
      among developer communities. Buyer types include enterprise organizations procuring compute
      for production AI workloads, academic institutions running large-scale research experiments,
      and individual practitioners accessing on-demand GPUs for model development. Hyperscalers
      and large-scale AI labs represent a distinct, higher-value customer segment that uses the
      Supercluster and Private Cloud products. Lambda's self-serve model reduces onboarding
      friction for smaller users while reserved and dedicated offerings serve enterprise
      commitments. Life sciences, media and entertainment, and developer tools verticals each
      have multiple named production customers, demonstrating cross-industry adoption.
    tableRefs:
      - TU001

  - id: adoption-trajectory
    title: Adoption Trajectory
    summary: >-
      Lambda grew from hundreds of customers in 2022 to 10,000+ by May 2026, driven by
      1-Click Clusters, Supercluster deployments, and open-source community partnerships.
    body: >-
      Lambda's active customer count has grown from an estimated few hundred in early 2022 to
      over 10,000 by May 2026, representing more than 20× growth in approximately four years.
      Key inflection points include the launch of on-demand H100 instances in 2023, the
      introduction of 1-Click Clusters in 2024, and the Supercluster program beginning in late
      2024. The Series D ($480M, February 2025) and Series E ($1.5B, November 2025) fundraising
      rounds accelerated infrastructure capacity and customer acquisition. Lambda's self-serve
      model with no minimum commitment reduced friction for smaller users, while reserved and
      Supercluster offerings attracted larger enterprise commitments. Developer advocacy through
      open-source partnerships — including OLMo training with Allen AI and Ollama distribution
      — contributed to organic top-of-funnel growth. The on-demand provisioning model enables
      rapid activation: customers can provision GPU instances and run their first workload within
      minutes of account creation. All customer count figures are company-stated and unaudited;
      no independent verification of active customer definitions is available.
    tableRefs:
      - TU002
    figureRefs:
      - FU001
      - FU002

  - id: named-customer-proof
    title: Named Customer Proof
    summary: >-
      Named production customers span drug discovery, video generation, open-source inference,
      3D generative AI, and hyperscaler infrastructure; all references are company-sourced.
    body: >-
      Lambda has disclosed named production customers across several verticals. Microsoft is
      the only publicly named hyperscaler customer; three additional hyperscalers are described
      without identification. Drug discovery companies Iambic Therapeutics and Genesis
      Therapeutics use Lambda GPU Cloud for protein structure prediction and molecular property
      modeling. Media startup Pika uses Lambda 1-Click Clusters for video generation. Developer
      infrastructure company fal uses Lambda for open-source AI inference serving. Three-dimensional
      generative AI company Meshy deploys on-demand GPUs through Lambda. Healthcare AI company
      Oumi achieved a 70% compute cost reduction and 20% quality improvement via the Lambda and
      Oumi partnership. An unnamed AI Hyperscaler deployed a 2,000-GPU Supercluster in 90 days
      using Lambda infrastructure. All named customer references are sourced from Lambda's own
      website and press materials. Independent third-party corroboration is limited, and
      hyperscaler customer identities beyond Microsoft remain NDA-protected.
    tableRefs:
      - TU003
    figureRefs:
      - FU003

  - id: retention-durability
    title: Retention and Durability
    summary: >-
      Lambda has not publicly disclosed NRR, GRR, or churn metrics. Developer sentiment is
      broadly positive; GPU availability and low switching barriers are key retention uncertainties.
    body: >-
      Lambda has not publicly disclosed retention metrics including Net Revenue Retention (NRR),
      Gross Revenue Retention (GRR), or customer churn rate. Developer community sentiment assessed
      through Hacker News threads and Reddit discussions is broadly positive, with customers
      praising price-performance advantages and ease of GPU provisioning. However, GPU availability
      constraints — particularly during high-demand periods — are a recurring complaint and a
      documented source of developer friction. NPS and CSAT scores have not been released. Lambda's
      on-demand billing model with no minimum commitment reduces switching costs for price-sensitive
      developers, creating potential churn exposure. Enterprise customers using reserved instances
      or private cloud deployments face higher switching costs, suggesting a two-tier retention
      structure: developer accounts with low stickiness and enterprise accounts with higher
      durability. No cohort-level data or contract renewal rate is publicly available, representing
      a material diligence gap that requires direct data room access to resolve.
    tableRefs:
      - TU004
    figureRefs:
      - FU004

  - id: expansion-concentration-risk
    title: Expansion and Concentration Risk
    summary: >-
      Lambda's expansion path from on-demand to Supercluster creates up-sell opportunity, but
      undisclosed hyperscaler contract terms and low switching barriers pose material risk.
    body: >-
      Lambda's expansion model progresses customers from on-demand instances to 1-Click Clusters,
      then to reserved capacity, and ultimately to Private Cloud or Supercluster deployments. This
      progression creates both a growth opportunity and a retention mechanism, as higher tiers
      involve greater switching costs and longer commitment cycles. However, significant concentration
      risks apply. Lambda has disclosed at least four hyperscaler customers including Microsoft, but
      contract sizes and renewal terms are NDA-protected. If a small number of hyperscaler accounts
      represent the majority of bookings, non-renewal events would have outsized revenue impact.
      Lambda's on-demand pricing model creates relatively low barriers to switching across GPU
      cloud providers. The competitive landscape — including CoreWeave, Nebius, Vast.ai, and native
      hyperscaler GPU options (AWS, Azure, GCP) — maintains persistent pricing pressure. Lambda's
      lack of a proprietary AI software layer or platform-as-a-service offering reduces the
      stickiness of its infrastructure relative to vertically integrated alternatives.
    tableRefs:
      - TU005

