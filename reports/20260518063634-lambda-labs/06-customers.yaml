          description: >-
            Estimated enterprise accounts with reserved or private cloud commitments; not
            formally disclosed by Lambda.
        - label: Named Reference / Supercluster Customers
          value: 8
          description: >-
            Publicly disclosed named production customers in Lambda's materials as of May 2026.
    claimRefs:
