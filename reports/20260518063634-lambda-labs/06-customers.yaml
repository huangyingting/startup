    title: Adoption Deployment Funnel
    titleSlug: adoption-deployment-funnel
    type: funnel
    insight: >-
      Lambda's acquisition funnel is broad at the developer layer but narrows sharply to cluster
      and enterprise tiers, with fewer than 1% of registered accounts reaching Supercluster-scale
      deployments. Enterprise and hyperscaler accounts represent the primary revenue concentration
      point despite being a small fraction of total account count.
