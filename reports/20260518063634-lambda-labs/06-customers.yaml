callouts:
  - calloutType: risk
    title: Retention Metrics Entirely Absent
    body: >-
      Lambda has not publicly disclosed NRR, GRR, or churn rate. The combination of low switching
      costs (no-minimum-commitment on-demand pricing) and undisclosed retention cohorts represents
      a material diligence gap for understanding revenue durability and predictability.
    claimRefs:
      - CU017
      - CU018
      - CU032
  - calloutType: assumption
    title: Customer Proof Is Exclusively Company-Sourced
    body: >-
      All named customer case studies and outcome claims are sourced from Lambda's own website,
      blog, and press releases. No third-party analyst, customer survey, or independent review
      corroborates the reported outcomes or customer relationships at scale as of May 2026.
    claimRefs:
      - CU036
  - calloutType: insight
    title: Oumi Quantified ROI Is the Strongest Single Proof Point
    body: >-
      The Oumi partnership case study — reporting 70% compute cost reduction and 20% quality
      improvement — is the only named customer reference with specific, quantified outcome metrics.
      This data point anchors customer value claims but is insufficient to generalize outcomes
      across Lambda's full 10,000+ customer base.
    claimRefs:
      - CU009

