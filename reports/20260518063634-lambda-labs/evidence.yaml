evidenceGaps:
  - type: private-evidence-only
    severity: blocking
    topic: Revenue and financial performance — fully private
    missingEvidence: >-
      Lambda has not disclosed revenue, gross margin, burn rate, EBITDA, or unit economics at any point in its history.
      The $2.3B+ equity raise and $3.3B+ total capital cannot be assessed against fundamentals.
    whyItMatters: >-
      Without financials, the investment case rests on operational signals and investor brand rather than verifiable
      unit economics; valuation is entirely mark-to-market from the last funding round.
    diligencePath: Request audited FY2022–FY2025 financials, management accounts, and customer concentration table under NDA.
    relatedQuestionRefs:
      - QO013
  - type: private-evidence-only
    severity: material
    topic: Post-money valuation — not disclosed for any round
    missingEvidence: >-
      Lambda has not published post-money valuation for its Series C, D, or E rounds. Unlike most unicorn-and-above
      companies, no third-party has confirmed a specific valuation figure.
    whyItMatters: Without valuation, comparisons to CoreWeave ($23B IPO) and investment return calculations are speculative.
    diligencePath: Request latest 409A valuation or board-approved valuation model under NDA; compare to CoreWeave revenue multiples.
    relatedQuestionRefs:
      - QO023
  - type: private-evidence-only
    severity: material
    topic: Headcount — not officially disclosed
    missingEvidence: >-
      Lambda's employee count, functional breakdown, and location distribution are not officially disclosed. LinkedIn
      estimate (~500–1,000) is unverified.
    whyItMatters: Headcount is a proxy for burn rate, R&D investment, and operating leverage at scale.
    diligencePath: Request official headcount and org chart under NDA; supplement with LinkedIn analysis.
    relatedQuestionRefs:
      - QO014
  - type: private-evidence-only
    severity: material
    topic: Credit facility terms — lenders and covenant details undisclosed
    missingEvidence: >-
      The $1B senior secured credit facility closed May 7, 2026 has no publicly disclosed lender names, interest rate,
      maturity, covenants, or collateral terms.
    whyItMatters: >-
      Senior secured debt has payment priority over equity; covenants may restrict operational decisions or future
      fundraising.
    diligencePath: Request credit agreement and any amendment under NDA.
    relatedQuestionRefs:
      - QO005
  - type: enumeration-incomplete
    severity: minor
    topic: Stakeholder or investor map — early-round investors not named
    missingEvidence: >-
      Series A and B investors (except 1517 Fund, Crescent Cove, and USIT mentioned in the Series D press release as
      existing investors) are not individually named in any public source.
    whyItMatters: Full cap table and early investor pro-rata rights could affect governance and future financing flexibility.
    diligencePath: Request cap table with fully diluted ownership breakdown under NDA.
    relatedTableRefs:
      - TO003
    relatedQuestionRefs:
      - QO006
  - type: missing-source
    severity: minor
    topic: CEO Michel Combes background — limited public record in AI context
    missingEvidence: >-
      No detailed independent profile of Michel Combes specific experience with AI infrastructure vs. traditional
      telecoms is available in public sources.
    whyItMatters: New CEO AI domain competency is a key execution risk for Lambda hyperscaler buildout strategy.
    diligencePath: Request CEO reference checks from prior employers and a 100-day plan under NDA.
    relatedQuestionRefs:
      - QO007
  - type: enumeration-incomplete
    severity: minor
    topic: Leadership and founder table — board composition and full executive roster not public
    missingEvidence: >-
      Lambda has not published a full board of directors list. Below the named C-suite executives, VP-level and
      director-level officers are not individually identified in any public source.
    whyItMatters: >-
      Board composition governs strategic decisions including fundraising, M&A, and CEO accountability. Full exec roster
      determines organizational depth.
    diligencePath: Request org chart, board composition, and executive roster under NDA; supplement with LinkedIn mapping.
    relatedTableRefs:
      - TO002
    relatedQuestionRefs:
      - QO014
  - type: enumeration-incomplete
    severity: minor
    topic: Milestone table — pre-2024 rounds and early company history not fully documented
    missingEvidence: >-
      Lambda has not published a comprehensive timeline of all funding rounds, product launches, and operational
      milestones. Series A and B details, exact founding-year milestones, and pre-2024 operational history are
      reconstructed from limited public sources.
    whyItMatters: >-
      Gaps in the milestone record may indicate unreported adverse events, competitive setbacks, or material changes
      that affected the company trajectory.
    diligencePath: Request company-authored milestone log and corporate history under NDA.
    relatedTableRefs:
      - TO004
    relatedQuestionRefs:
      - QO024
  - type: private-evidence-only
    severity: material
    topic: Hyperscaler customer identity and revenue concentration — three of four undisclosed
    missingEvidence: >-
      Lambda names only Microsoft among its four hyperscaler customers. The other three identities are undisclosed, and
      revenue concentration across the four is unknown.
    whyItMatters: >-
      If 2 to 3 hyperscalers represent more than 50% of revenue, contract non-renewal creates a severe revenue cliff.
      Understanding concentration is essential for investment risk assessment.
    diligencePath: >-
      Request customer revenue concentration table showing top 5 and top 10 customers as percentage of total ARR under
      NDA.
    relatedQuestionRefs:
      - QO011
  - type: private-evidence-only
    severity: blocking
    topic: Lambda market share and revenue — no public financial disclosure
    missingEvidence: >-
      Lambda has not disclosed ARR, utilization rates, revenue by customer segment, or gross margin. Market share in the
      GPU cloud services market cannot be estimated from public sources alone.
    whyItMatters: >-
      Without Lambda revenue data, SAM penetration and SOM claims are speculative; investment decisions require
      triangulation from NDA financials.
    diligencePath: >-
      Request audited FY2024–FY2025 P&L, customer revenue concentration, utilization rates, and segment-level gross
      margins under NDA.
    relatedQuestionRefs:
      - QM005
      - QM020
