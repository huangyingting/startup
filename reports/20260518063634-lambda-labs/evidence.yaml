      infra) for overlapping time horizons due to definitional differences.
    whyItMatters: >-
      Investment thesis sensitivity to TAM assumptions is high; a $20B vs. $200B market implies very different
      penetration rates and valuation multiples for Lambda.
    diligencePath: >-
      Commission a custom market sizing study defining Lambda's exact product-addressable market; use CoreWeave S-1 as
      comparator anchor.
    relatedQuestionRefs:
