  - id: section-I4
    title: "Financial gaps, diligence blockers, and financial verdict"
    body: >-
      Lambda is a private company with no legal obligation to publish financial statements, and it has not
      done so. The financial chapter is therefore materially incomplete for investment underwriting. The
      following facts are publicly unavailable: revenue (total, by product line, by customer tier), gross
      margin and cost of revenue, operating expenses (R&D, S&G&A, headcount cost), EBITDA, net income,
      free cash flow, cash and cash equivalents, burn rate, runway, credit facility covenants, and GPU
      utilization rate. What the public record does support is a pricing model, a customer count, a capital
      raise history, and analogues from CoreWeave's IPO filings that provide a general benchmark for GPU
      cloud financials. CoreWeave's S-1 and early public filings (ir.coreweave.com) provide the closest
      public comparable; NVIDIA's annual report and GPU pricing schedules provide cost-side inputs for
      triangulated estimates. The financial verdict is: Lambda's business model is economically attractive
      at scale (GPU-cloud margins in the 40–60% gross range), its capital base is sizeable relative to
      stage, and its 10,000+ customer diversification is a positive signal. The core diligence blocker is
      the absence of any income-statement or balance-sheet data. A prospective investor cannot close the
      financial analysis without private data room access. The risk of capital intensity is real: if GPU
      utilization drops materially, fixed interest expense on the $1B credit facility creates cash flow
      pressure. Dilution risk is also present given the large equity raises, though total shares outstanding
      are unknown.
