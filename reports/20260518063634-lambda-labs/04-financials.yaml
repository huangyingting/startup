  - id: section-I3
    title: "Capital adequacy: equity raised, credit facility, and deployment against GPU capex"
    body: >-
      Lambda has raised approximately $2.3 billion in total equity across its Series D ($480M, February 2025)
      and Series E ($1.5B+, November 2025) plus earlier rounds, with NVIDIA, Andrej Karpathy, ARK Invest,
      IQT, TWG Global, and USIT among its investors. The Series E terms included strategic manufacturing
      partners Pegatron, Supermicro, Wistron, and Wiwynn in the Series D, signaling an integrated approach
      to GPU supply chain financing. In May 2026 Lambda additionally secured a $1 billion senior secured
      credit facility, bringing its total accessible capital to approximately $3.3 billion. The credit
      facility is a typical senior secured instrument for GPU-cloud providers—used to finance GPU
      procurement without diluting equity holders further—though its interest rate, covenant structure,
      and draw conditions have not been publicly disclosed. At a hardware cost of approximately $250,000–
      $350,000 per H100 8-GPU server, Lambda's total capital base ($3.3B+) could theoretically support
      procurement of 9,400–13,200 H100 server units (75,000–105,000 H100 GPUs) if fully deployed to
      hardware. In practice, Lambda must also fund data center lease costs, power infrastructure, and
      operating expenses from the same pool, so GPU procurement capacity is lower. Lambda's 10,000+
      customers across 4 hyperscalers suggests demand is not the capital constraint; the binding constraint
      is GPU procurement and data center capacity deployment speed. Capital adequacy for the next 12–24
      months appears sufficient given the combined equity and credit base, but the runway beyond that
      depends on utilization rates, revenue growth, and the refinancing conditions on the credit facility.
