callouts:
  - calloutType: strength
    title: "Transparent pricing and zero-egress policy are positive revenue quality indicators"
    body: >-
      Lambda's publicly listed GPU-hour prices and zero-egress policy mean customers can calculate their
      total cost of ownership without hidden fees, which supports higher utilization and reduces customer
      price negotiation friction. The cluster pricing premium ($9.36–9.86/GPU/hr vs $3.99 on-demand for H100)
      demonstrates pricing power for high-value cluster workloads.
    claimRefs:
      - CI001
      - CI003
      - CI004
      - CI010
  - calloutType: risk
    title: "Capital intensity and fixed credit costs create material downside if GPU utilization drops"
    body: >-
      Lambda's $1B senior secured credit facility adds significant fixed interest expense (estimated
      $50–80M/year at market rates) that creates cash flow pressure if GPU utilization falls below 70%.
      The GPU-cloud business model requires sustained high utilization to service debt and fund operations.
      A market-wide GPU price reduction (e.g., from NVIDIA Blackwell supply expansion) could reduce
      per-GPU revenue while fixed costs remain constant.
    claimRefs:
      - CI016
      - CI019
      - CI028
      - CI039
      - CI040
  - calloutType: risk
    title: "Private company financial opacity is the binding underwriting constraint"
    body: >-
      Lambda has disclosed no revenue, gross margin, burn rate, cash position, or GPU utilization data.
      A prospective investor cannot complete standard financial underwriting—DCF, comps, or scenario
      analysis—without accessing Lambda's private data room. The total capital raised ($3.3B+) provides
      a capital adequacy signal but not an income statement.
    claimRefs:
      - CI032
      - CI033
      - CI034
      - CI035
      - CI042
