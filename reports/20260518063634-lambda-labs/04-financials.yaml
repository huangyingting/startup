  evidenceGaps:
    - type: private-evidence-only
      severity: blocking
      topic: Lambda annual revenue and gross margin
      missingEvidence: >-
        Lambda's total revenue (annual or run-rate), gross margin percentage, and revenue by product
        line are not publicly disclosed. No third-party source provides a verified revenue estimate.
      whyItMatters: >-
        Revenue and gross margin are the two most essential financial metrics for investment underwriting.
        Without these, a DCF, comps, or scenario analysis cannot be closed.
      diligencePath: >-
        Request audited income statement for the most recent 12 months; minimum requirement is monthly
        revenue run rate by GPU tier and gross margin waterfall.
      relatedQuestionRefs:
        - QI024
    - type: private-evidence-only
      severity: blocking
      topic: Lambda cash position, burn rate, and runway
      missingEvidence: >-
        Lambda has not disclosed cash and cash equivalents, monthly operating burn rate, or projected
        runway. These are essential for assessing capital adequacy.
      whyItMatters: >-
        Capital adequacy judgment based solely on gross raise is insufficient; actual cash deployment
        and burn determine real runway.
      diligencePath: >-
        Request most recent treasury dashboard, monthly cash statement for the past 12 months, and
        board-approved runway projection.
      relatedQuestionRefs:
        - QI026
    - type: private-evidence-only
      severity: material
      topic: Lambda GPU fleet utilization rate
      missingEvidence: >-
        Lambda has not disclosed its fleet-wide GPU utilization rate. The 80% utilization assumption
        used in unit-economics modeling is an industry benchmark, not Lambda-specific data.
      whyItMatters: >-
        GPU utilization is the single largest driver of per-GPU revenue and gross margin. A 10-point
        decline in utilization (80% → 70%) reduces gross revenue per GPU by ~$288/month, materially
        affecting financial projections.
      diligencePath: >-
        Request monthly fleet-wide GPU utilization rate by tier for the past 12 months; separately
        request utilization rate trend for the 1-Click Cluster product specifically.
      relatedQuestionRefs:
        - QI023
    - type: private-evidence-only
      severity: material
      topic: Lambda credit facility terms and covenants
      missingEvidence: >-
        The interest rate, financial covenants, maintenance tests, maturity, and draw conditions of
        Lambda's $1B senior secured credit facility have not been publicly disclosed.
      whyItMatters: >-
        Covenant breach risk is a binary financial stress trigger; without knowing the maintenance tests,
        it is impossible to assess downside scenarios involving utilization shortfall or revenue decline.
      diligencePath: >-
        Request full credit agreement; specifically leverage and liquidity covenants, interest rate
        spread, maturity date, and prepayment premium schedule.
      relatedQuestionRefs:
        - QI025
    - type: private-evidence-only
      severity: material
      topic: Lambda total GPU fleet size
      missingEvidence: >-
        Lambda has not disclosed the total number of GPUs deployed, available, or on order as of May 2026.
      whyItMatters: >-
        Fleet size is necessary to model total revenue capacity and validate the capital deployment
        against GPU server cost assumptions.
      diligencePath: >-
        Request total GPU inventory by model (H100, B200, A100) as of the most recent month end,
        plus committed future delivery schedule under existing procurement agreements.
      relatedQuestionRefs:
        - QI023
    - type: access-blocked
      severity: minor
      topic: Lambda financial health analysis (paywalled)
      missingEvidence: >-
        The Information article on Lambda's financial health and unit economics is behind a paywall and
        could not be fully reviewed.
      whyItMatters: >-
        Trade press financial analysis often contains financial estimates and management commentary
        not available from official sources.
      diligencePath: >-
        Acquire The Information subscription or request through a diligence partner.
      relatedQuestionRefs:
        - QI027
