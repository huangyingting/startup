  - id: section-I2
    title: "Unit economics and cost structure: GPU depreciation, power, and gross margin estimates"
    body: >-
      GPU-cloud unit economics are driven by three main cost buckets: GPU hardware depreciation, power and
      cooling, and data center lease/networking. An NVIDIA H100 server (8 GPUs) costs approximately
      $250,000–$350,000 wholesale; depreciated over 3–5 years, this yields roughly $350–1,000/month per
      GPU in hardware cost. At Lambda's on-demand H100 price of $3.99/GPU/hr and 80% average utilization,
      a single H100 generates approximately $2,300/month gross revenue. Against ~$600–1,000/month estimated
      total cost of goods (hardware depreciation + power + data center), this implies a gross contribution
      margin per GPU of approximately 50–70% at 80% utilization—broadly consistent with the 40–60% gross
      margin estimates that industry analysts apply to GPU cloud providers at scale. However, these are
      estimates derived from public GPU pricing and industry cost benchmarks, not Lambda's actual reported
      financials. Lambda's total cost structure also includes capital costs on the $1B credit facility
      (interest expense at market rates), data center build-out and lease commitments, and operating
      expenses (headcount, sales, R&D) that are not publicly disclosed. The $1B senior secured credit
      facility secured in May 2026 likely adds meaningful fixed interest expense that reduces net margin
      relative to gross margin. Gross margin of 40–60% at adequate GPU utilization is achievable; net
      margin profile remains fully private.
