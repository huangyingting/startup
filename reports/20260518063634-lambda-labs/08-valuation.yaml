  - id: valuation-context
    title: Valuation Context and Comparable Analysis
    body: >-
      Lambda Labs' Series E valuation is not directly disclosed but can be estimated from multiple
      proxy signals. The Series D ($480M, confirmed via SEC Form D) reportedly valued Lambda at
      approximately $5B per contemporary analyst and press reporting. The Series E ($1.5B+, confirmed
      via Form D for the November 2025 round) represents a step-up of approximately 2x on that mark,
      implying a $10–15B post-money valuation. This is consistent with the broader AI cloud infrastructure
      re-rating driven by CoreWeave's March 2025 IPO at $19B market cap, based on $1.9B FY2024 revenue
      disclosed in its S-1 filing — approximately a 10x last-twelve-months revenue multiple.

      Lambda's estimated ARR of $400–800M, while not publicly confirmed, places the $10–15B implied
      valuation at 15–25x ARR. This premium over CoreWeave's IPO multiple is analytically defensible given
      Lambda's earlier absolute revenue scale (higher potential growth rate), NVIDIA equity partnership
      differentiation, and the broader AI cloud multiple expansion observed in 2025–2026. However, the
      wide range reflects genuine uncertainty: at $400M ARR × 25x the mark is aggressive, while at $800M
      ARR × 15x the mark is reasonable. Critical diligence verification — specifically 2025 and 2026 ARR
      from CFO Charles Fisher — is required to determine whether the current entry price is fair, cheap,
      or expensive relative to fundamentals.

      Adjusting for Lambda's $1B debt, the enterprise value is approximately $11–16B, and the equity value
      accessible to Series E investors is accordingly reduced by the credit facility and any preference
      overhang from Series D. Without full cap table visibility, the effective IRR for new investors is
      difficult to model precisely, reinforcing the diligence ask on preference terms.
