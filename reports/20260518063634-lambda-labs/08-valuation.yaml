  - id: exit-readiness
    title: Exit Readiness and Final Diligence Asks
    body: >-
      Lambda Labs' exit readiness is conditional on achieving $1B+ ARR with a demonstrable margin
      trajectory, a prerequisite for a credible IPO candidacy in the 2027–2029 window. At estimated
      $400–800M ARR as of mid-2026, Lambda is approximately 2–3 years from IPO readiness assuming
      continued growth. The strategic acquirer universe includes hyperscalers that might prefer to
      own preferred GPU supply outright, large enterprise infrastructure companies (Oracle, IBM) seeking
      AI cloud capability, and sovereign wealth funds with long-horizon infrastructure appetites.

      Before committing capital at current Series E terms, five diligence asks are essential. First and
      most critical: 2025 ARR confirmation and 2026 guidance from CFO Charles Fisher, as the entire
      valuation framework depends on this single data point. Second: customer NRR by segment — specifically
      separating hyperscaler and enterprise long-tail cohorts — to assess whether Lambda's 10,000+
      customer base drives durable revenue or fragile spot-market activity. Third: full credit facility
      covenant terms, to enable independent modeling of liquidity risk and thesis-break trigger calibration.
      Fourth: top-10 customer concentration and average contract lengths, to quantify the hyperscaler
      churn risk in absolute revenue terms. Fifth: GPU capex pipeline and depreciation schedule from the
      CFO, necessary to model cash burn, stranded asset risk, and required capital through the B200-to-B300
      GPU generation transition.

      These five items, together with the CEO 100-day plan and evidence of CFO integration, constitute
      the minimum information set for underwriting Lambda at current terms with reasonable confidence.
