chapter:
  number: 8
  title: Valuation
  summary: >-
    Lambda Labs earns a conditional buy recommendation with medium confidence and high risk. The
    company's NVIDIA equity partnership, hyperscaler demand validation, and differentiated GPU-native
    platform support an estimated $10–15B implied post-Series E valuation — fair relative to CoreWeave's
    $19B IPO at approximately 10x 2024 revenue of $1.9B, and reasonable given Lambda's earlier growth
    stage and estimated $400–800M ARR. The base case projects $8–12B implied value by 2027 at $600–900M
    ARR × 12–15x multiple (1.5–2.5x return on Series E terms); the bull case reaches $22–35B at
    $1.2–1.8B ARR × 18–22x multiple (3–5x return); and the bear case falls to $2.5–7B if hyperscaler
    churn and GPU spot price compression compound the CEO transition risk (0.3–0.5x return). Thesis-break
    conditions center on NVIDIA allocation loss, two or more hyperscaler customer departures, H100 spot
    price sustained below $0.75/GPU-hr, CEO or CTO exit within 12 months of the May 2026 transition, or
    covenant breach on the $1B credit facility. Five final diligence asks must be completed before
    committing capital: 2025/2026 ARR confirmation, customer NRR by segment, credit facility covenant
    terms, top-10 customer concentration data, and GPU capex pipeline details.

sections:
  - id: investment-thesis
    title: Investment Thesis and Anti-Thesis
    body: >-
      Lambda Labs has assembled a capital stack exceeding $3.3B (including $2.3B+ equity across Series A
      through Series E and a $1B senior secured credit facility) to build a GPU-native AI cloud at
      gigawatt scale. The core thesis rests on five pillars: NVIDIA equity partnership providing supply
      priority and roadmap visibility; a 10,000+ customer base anchored by four hyperscalers and Microsoft;
      full-stack GPU differentiation (InfiniBand fabric, Lambda Stack, 1-Click Clusters) that creates
      switching costs above the bare-metal rental market; an addressable market growing toward $50B+ by
      2028 driven by accelerating LLM training and inference workloads; and a Series E pricing that appears
      fair relative to CoreWeave's March 2025 public market comparable at 10x revenue.

      The anti-thesis is grounded in five structural risks. First, hyperscaler in-house buildout: AWS,
      Azure, and GCP are each investing heavily in proprietary GPU capacity, potentially reducing their
      dependence on third-party cloud providers like Lambda. Second, CEO transition: the May 2026
      appointment of Michel Combes — an experienced telecoms infrastructure operator with no AI cloud
      domain background — introduces execution uncertainty during a critical scaling phase. Third, GPU
      spot price compression: H100 on-demand pricing has fallen approximately 70% from peak, and
      continued compression threatens per-unit economics. Fourth, capital structure leverage: the $1B
      credit facility with undisclosed covenants creates a fixed-cost obligation that amplifies revenue
      volatility. Fifth, NRR opacity: Lambda has not disclosed customer net revenue retention rate or
      top-customer concentration, obscuring the true durability of its revenue base.
