  evidenceGaps:
    - type: private-evidence-only
      severity: material
      topic: lambda-arr-nrr-data
      missingEvidence: >-
        Lambda Labs has not publicly disclosed its annual recurring revenue, customer net revenue
        retention rate, churn rate by segment, or cohort-level retention data. These are the most
        critical missing inputs for the valuation framework: the difference between $400M ARR and
        $800M ARR moves the implied multiple from aggressive (25x) to reasonable (15x), and NRR
        below 100% for the hyperscaler cohort would signal a fragile revenue base inconsistent with
        a $10–15B valuation.
      whyItMatters: >-
        Without ARR and NRR data, the base case return analysis (1.5–2.5x on $10–15B entry) cannot be
        validated. If Lambda's actual ARR is at the low end of analyst estimates and NRR is below 110%,
        the bear case becomes the most likely scenario, implying material capital impairment for Series
        E investors. ARR confirmation is the single gating item before upgrading from conditional buy
        to unconditional buy.
      diligencePath: >-
        Request 2025 ARR confirmation letter from CFO Charles Fisher; segment NRR data by hyperscaler
        vs. enterprise long-tail cohort from CRM or billing system; cross-reference with top-10
        customer concentration data to assess revenue durability.
      relatedQuestionRefs:
        - QV022
        - QV028
      relatedTableRefs:
        - TV004

    - type: private-evidence-only
      severity: material
      topic: credit-facility-covenant-terms
      missingEvidence: >-
        Lambda Labs has not publicly disclosed the specific terms, covenants, or obligations of its
        $1B senior secured credit facility closed May 7, 2026. Standard covenants for this type of
        leveraged facility would include minimum revenue thresholds, EBITDA floors or leverage ratios,
        minimum liquidity requirements, and Material Adverse Change (MAC) clauses. Without these
        terms, the probability and timing of a covenant breach under the bear scenario cannot be
        independently modeled.
      whyItMatters: >-
        The $1B credit facility is the primary source of financial fragility in Lambda's risk profile.
        If GPU spot prices compress or hyperscaler revenue contracts, revenue coverage ratios could
        breach covenant minimums, triggering lender remedies including obligation acceleration. The
        kill criterion of "covenant breach event" cannot be properly calibrated without knowledge of
        the specific covenant thresholds.
      diligencePath: >-
        Request the full credit agreement from Lambda management or legal counsel; focus on minimum
        revenue, leverage, and MAC provisions; model covenant headroom under bear case ARR assumptions
        to determine whether the facility provides operating runway or constitutes a near-term
        liquidity risk.
      relatedQuestionRefs:
        - QV008

    - type: private-evidence-only
      severity: minor
      topic: cap-table-and-exit-terms
      missingEvidence: >-
        Lambda Labs has not publicly disclosed its full capitalization table, preference stack terms,
        or exit waterfall mechanics for Series D and Series E investors. The effective IRR for a Series
        E investor depends on the liquidation preference multiple, participation rights, and anti-dilution
        terms. Similarly, the IPO and strategic exit timeline depends on investors' redemption rights
        and drag-along provisions that are not publicly available.
      whyItMatters: >-
        Preference overhang can materially reduce common equity value and compress IRR for new investors
        if the preference stack is structured with participating preferred or high liquidation multiples.
        In a bear case exit at $7B, a 2x participating preferred preference stack on $2.3B+ of equity
        could absorb a significant portion of the exit proceeds before the base shares receive return.
      diligencePath: >-
        Request full capitalization table from Lambda management; confirm liquidation preference
        structure for Series D and Series E; model effective IRR under bull/base/bear exit scenarios
        with full waterfall analysis.
      relatedQuestionRefs:
        - QV018
        - QV025

