callouts:
  - calloutType: recommendation
    title: "Conditional BUY at current Series E terms — medium confidence, high risk"
    body: >-
      Lambda Labs is a well-positioned AI cloud infrastructure company with genuine structural
      advantages: NVIDIA equity partnership, hyperscaler demand validation, and a full-stack GPU platform.
      The Series E implied valuation of $10–15B is fair — not cheap — relative to CoreWeave's
      $19B IPO comparable. The conditional qualifier is non-negotiable: without 2025 ARR confirmation,
      customer NRR by segment, and covenant terms, the investment cannot be underwritten with high
      confidence. Complete the five diligence asks before closing.
    claimRefs:
      - CV001
      - CV002
      - CV014
      - CV015
      - CV043
      - CV044
      - CV045

  - calloutType: strength
    title: NVIDIA equity partnership and GPU access are genuine structural advantages
    body: >-
      Lambda's NVIDIA equity partnership — originating from the Series D — is the single most
      defensible element of the investment thesis. Preferred GPU allocation and roadmap access cannot
      be replicated by capital alone; CoreWeave has a comparable NVIDIA relationship but Lambda's
      $10–15B valuation implies a meaningful discount to CoreWeave's post-IPO trading range, making
      the thesis attractive if ARR confirms at the upper end of analyst estimates.
    claimRefs:
      - CV005
      - CV002
      - CV022
      - CV028

  - calloutType: risk
    title: CEO transition and hyperscaler churn are the primary downside catalysts
    body: >-
      The simultaneous appointment of a new CEO (May 2026) and CFO (February 2026), combined with
      undisclosed customer NRR data and an opaque credit facility, represent compounded opacity at the
      worst possible time in Lambda's growth cycle. If one hyperscaler departs in the 12 months
      following the CEO transition — a plausible scenario given that new leadership requires
      relationship management — the bear case economics become the base case. The kill criterion of
      two hyperscaler departures within 12 months should be treated as a binding exit trigger.
    claimRefs:
