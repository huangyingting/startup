      - CV008
      - CV035
      - CV038

  - calloutType: assumption
    title: Base case assumes ARR of $600–900M can be confirmed by CFO diligence
    body: >-
      The entire base-case return framework ($8–12B exit, 1.5–2.5x return) depends on Lambda
      executing the CEO transition and reaching $600–900M ARR by 2027. If actual 2025 ARR is below
      $400M, the base case collapses into the bear scenario and the $10–15B entry price embeds
      significant downside. Confirming 2025 ARR is the single most important diligence action before
      committing capital.
    claimRefs:
