  - id: scenarios
    title: "Bull / Base / Bear Scenarios"
    body: >-
      The valuation framework for Lambda Labs pivots on two primary drivers: 2027 ARR and the revenue
      multiple at which a liquidity event is achievable. Both are uncertain, justifying a scenario
      framework rather than a point estimate.

      In the bull case (25% probability), Lambda successfully executes its gigawatt-scale buildout, retains
      all hyperscaler customers, achieves operational execution under the new CEO, and rides AI compute
      demand acceleration to $1.2–1.8B ARR by 2027. At an 18–22x multiple consistent with high-growth AI
      infrastructure companies at the time of a 2028–2029 IPO or secondary, the implied valuation reaches
      $22–35B, representing a 3–5x return on the current estimated Series E entry price of $10–15B.

      In the base case (50% probability), Lambda executes the CEO transition without material customer
      attrition, achieves moderate GPU capacity expansion, and grows ARR to $600–900M by 2027. At a
      12–15x multiple reflecting slower growth and elevated leverage, the implied valuation is $8–12B.
      This represents a 1.5–2.5x return depending on Series E entry price — a satisfactory but
      non-exceptional outcome for a high-risk private growth investment.

      In the bear case (25% probability), hyperscaler in-house buildout accelerates, GPU spot prices
      decline further compressing per-unit margins, and the CEO transition introduces customer attrition.
      ARR stagnates at $300–400M. At a distressed 6–8x multiple, the implied valuation is $2.5–7B —
      representing a 0.3–0.5x return that would be a material loss for Series E investors who paid
      approximately $10–15B in post-money terms.
