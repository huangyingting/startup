  - id: thesis-break
    title: Thesis-Break Conditions and Kill Criteria
    body: >-
      Lambda Labs' investment thesis is built on a set of enabling assumptions that, if violated, would
      fundamentally undermine the return outlook and warrant exit or significant position reduction. Five
      specific kill triggers are identified:

      First, NVIDIA GPU allocation loss or downgrade: if NVIDIA reduces Lambda's preferred allocation
      below 50% of committed procurement volumes, Lambda's supply advantage — the foundational
      differentiator of its value proposition — collapses. This is monitored through NVIDIA quarterly
      earnings commentary on customer allocations and Lambda procurement announcements.

      Second, hyperscaler customer churn: departure of two or more of the four hyperscaler customers
      within any 12-month window signals that the hyperscaler demand thesis is structurally broken.

      Third, GPU spot price collapse: H100 spot pricing sustained below $0.75/GPU-hr for 90+ days signals
      a structural commodity-ization of GPU compute that would compress Lambda's per-unit margins below
      sustainable thresholds even with differentiated features.

      Fourth, CEO or CTO departure: if Michel Combes or Stephen Balaban departs within 12 months of the
      May 2026 leadership transition, the organization faces compounded leadership instability that
      historically correlates with customer and talent attrition.

      Fifth, credit covenant breach: any breach of the $1B credit facility covenants would trigger lender
      remedies, potentially including accelerated repayment, materially impairing Lambda's ability to
      fund GPU procurement and operational commitments.
