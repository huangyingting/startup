callouts:
  - calloutType: risk
    title: NVIDIA supply concentration is the single highest-severity dependency
    body: >-
      Lambda's near-total GPU dependency on NVIDIA — for B200, H100, A100, and GH200 products —
      creates a supplier that controls both the commodity and its allocation. NVIDIA's preferred
      allocation policy favors AWS, Azure, and GCP before pure-cloud providers. Lambda's Series D
      equity stake from NVIDIA provides relationship capital but no contractual supply guarantee.
      Any supply disruption, allocation downgrade, or pricing reset by NVIDIA directly impairs
      Lambda's capacity to grow or fulfill existing commitments.
    claimRefs:
      - CR001
      - CR002
      - CR035

  - calloutType: risk
    title: CEO transition at peak capital deployment is the highest execution risk
    body: >-
      The May 2026 appointment of Michel Combes as CEO — replacing co-founder Stephen Balaban —
      occurs at the worst possible time: Lambda is deploying gigawatt-scale AI factories, managing
      hyperscaler customer relationships, and integrating a $1B+ credit facility into its financial
      model. Combes brings telecoms infrastructure credibility but no AI cloud operational history.
      Any misalignment between Combes and the technical leadership could accelerate hyperscaler
      customer churn or derail the Series F / IPO preparation.
    claimRefs:
      - CR008
      - CR009
      - CR017

  - calloutType: insight
    title: Financial opacity is the largest structural diligence gap
    body: >-
      Lambda does not disclose revenue, ARR, gross margin, customer NRR, or credit facility covenant
      terms in any public document. This opacity prevents investors from independently validating the
      investment thesis, stress-testing the debt structure, or assessing the economic buffer against
      GPU price declines. All risk severity ratings in this chapter are therefore wider than they
      would be with financial disclosure, and the kill criteria in TR005 should be treated as floor
      thresholds rather than precise triggers.
    claimRefs:
      - CR024
      - CR030
      - CR031
      - CR039

