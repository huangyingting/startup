chapter:
  number: 7
  title: Risks
  summary: >-
    Lambda Labs faces a high-severity, multi-dimensional risk profile anchored by near-total NVIDIA GPU supply
    dependency, intensifying hyperscaler in-house buildout, a fresh CEO transition in May 2026, and a $1B+
    credit facility creating fixed cost obligations. Regulatory risks include US AI chip export controls and
    evolving GDPR/CCPA obligations. Security and operational risks are partially mitigated by SOC 2 Type II and
    ISO 27001, but SLA terms and incident history remain undisclosed. Kill criteria center on loss of NVIDIA
    preferred allocation, departure of two or more hyperscaler customers, or early Combes/Balaban exit.

sections:
  - id: regulatory-legal-compliance
    title: Regulatory, legal, and compliance risks
    body: >-
      Lambda Labs operates GPU cloud infrastructure handling AI workloads for enterprise and research customers
      globally, creating multi-layered regulatory obligations. The most material near-term regulatory risk is US
      export control enforcement under the Export Administration Regulations (EAR), administered by the Bureau
      of Industry and Security (BIS). The Biden-era AI chip export rule (October 2023, expanded November 2023
      and January 2025) restricts H100 and B200 exports to Tier D countries, imposes compute thresholds for
      Tier A countries, and requires licenses for certain end-uses involving AI training above performance
      thresholds. Lambda must screen all customers and deployment configurations for Entity List restrictions,
      license exceptions, and Performance Level thresholds. Failure to comply could result in denial orders,
      civil fines up to $1.5M per violation, and criminal penalties.

      Data privacy is the second major regulatory stack. As a cloud provider processing AI training data for
      enterprise customers in the EU and US, Lambda is subject to GDPR, CCPA/CPRA, and state privacy laws.
      Lambda's SOC 2 Type II and ISO 27001 certifications demonstrate control maturity, but specific Data
      Processing Agreement terms with hyperscaler customers remain undisclosed. EU AI Act implementation
      (effective August 2026 for high-risk AI systems) adds compliance obligations for providers of general-purpose
      AI infrastructure, potentially requiring conformance documentation and incident reporting. Lambda has not
      publicly disclosed any regulatory investigations, litigation, or enforcement proceedings as of May 2026,
      but absence of disclosure does not confirm absence of risk.
    claimRefs:
      - CR013
      - CR014
      - CR011
      - CR044
      - CR045
      - CR025
    tableRefs:
      - TR001

  - id: operational-quality-security
    title: Operational, quality, and security risks
    body: >-
      Lambda's operational risk profile is dominated by uptime reliability, data security, and physical
      infrastructure resilience. Lambda serves 10,000+ customers including four hyperscalers—where brief
      outages can trigger SLA penalties, customer churn, and reputational damage at the fastest-growing
      segment of the AI cloud market. Lambda has disclosed approximately 97% uptime on B200 clusters, which
      is directionally positive but implies roughly 262 hours per year of potential downtime. For
      enterprise customers like Iambic Therapeutics (drug discovery) and Pika (video generation), AI compute
      outages have direct production impact.

      Security risk is heightened by Lambda's position as custodian of proprietary models, training data, and
      compute configurations for frontier AI labs. The attack surface includes Lambda's public-facing APIs
      (Lambda API, Lambda Chat), multi-tenant cluster environments (1-Click Clusters supporting 16 to 2,000+
      GPUs), and administrative systems managing gigawatt-scale deployments. Lambda holds SOC 2 Type II and
      ISO 27001 certifications, which demonstrate meaningful control frameworks, but these do not eliminate
      sophisticated attack risk. Lambda has not disclosed a public bug bounty program, historical incident
      log, or post-mortem documentation for any security or availability events—all of which are baseline
      expectations for enterprise cloud providers competing against AWS, Azure, and GCP.
    claimRefs:
      - CR010
      - CR011
      - CR027
      - CR037
      - CR042
      - CR036
      - CR032
      - CR043
    tableRefs:
      - TR002
    figureRefs:
      - FR001

  - id: partner-supply-chain-dependency
    title: Partner, supply chain, and technology dependency risks
    body: >-
      Lambda's supply chain risk is dominated by near-total dependence on NVIDIA for GPU hardware. All major
      Lambda products—B200 1-Click Clusters, H100 On-Demand Instances, A100 Private Cloud, GH200 research
      instances—run on NVIDIA GPUs. NVIDIA controls GPU supply allocation and pricing, with preferred allocation
      flowing to hyperscalers and large OEMs before pure-cloud providers like Lambda. During H100 supply
      constraints in 2023-2024, spot prices reached $8/hr before falling to $2-3/hr as supply normalized.
      The B200 generation introduces similar dynamics: allocation priority favors NVIDIA's largest customers
      by procurement volume, putting Lambda in competition with AWS, Azure, GCP, and Oracle for the same
      hardware. While NVIDIA's Series D investment provides some relationship benefit, this does not
      contractually guarantee preferred allocation.

      The hyperscaler competitive threat amplifies supply chain risk. AWS (Trainium, P4/P5 instances), Azure
      (NVIDIA preferred cloud partner with B200 access), GCP (TPU pods plus H100/A100 instances), and Oracle
      (aggressive OCI GPU capacity expansion) are all building dedicated AI cloud infrastructure with bundled
      storage, networking, and ML tooling that Lambda cannot easily replicate. CoreWeave's March 2025 IPO at
      approximately $23 billion established a public market reference for pure-play AI cloud, but CoreWeave's
      close OpenAI relationship and $8.65B raise create asymmetric competitive advantages. Technology
      transition risk compounds the supply chain story: GPU generations turn every 12 to 18 months, creating
      stranded capital risk on Lambda's financed GPU fleet if demand dynamics shift between capital deployment
      and useful life.
    claimRefs:
