  evidenceGaps:
    - type: private-evidence-only
      severity: material
      topic: credit-facility-covenants
      missingEvidence: >-
        Lambda Labs has not publicly disclosed the specific financial covenants of its $1B senior
        secured credit facility. Standard covenants for this type of facility would include minimum
        revenue growth thresholds, liquidity ratios, EBITDA floors, and collateral coverage ratios.
        Without covenant terms, the probability and timing of a covenant breach event cannot be
        independently quantified.
      whyItMatters: >-
        The credit facility is the primary financial stress transmission mechanism in Lambda's risk
        profile. Covenant breach would trigger lender remedies, potentially including acceleration of
        the full $1B obligation, which would impair Lambda's ability to fund ongoing GPU procurement.
      diligencePath: >-
        Request credit agreement from Lambda management during formal due diligence; focus on minimum
        revenue, leverage ratio covenants, and any MAC (Material Adverse Change) clauses.
      relatedQuestionRefs:
        - QR003

    - type: private-evidence-only
      severity: material
      topic: gpu-capex-run-rate
      missingEvidence: >-
        Lambda Labs has not publicly disclosed its annual GPU procurement run rate, capital expenditure
        schedule, or hardware depreciation model. These figures are essential for modeling cash burn,
        revenue per GPU-hour breakeven, and stranded asset risk during GPU generation transitions.
      whyItMatters: >-
        Without capex visibility, investors cannot independently assess whether the $1B credit facility
        and $1.5B+ Series E provide sufficient runway through the B200-to-B300 GPU generation transition,
        or whether additional capital raises will be required.
      diligencePath: >-
        Request Lambda's GPU procurement pipeline, depreciation schedule, and capex guidance from CFO
        Charles Fisher during due diligence access; cross-reference with NVIDIA earnings call commentary
        on Lambda as a customer.
      relatedQuestionRefs:
        - QR004

    - type: private-evidence-only
      severity: minor
      topic: power-utility-contracts
      missingEvidence: >-
        Lambda Labs has not publicly disclosed the terms, counterparties, or status of power utility
        contracts for its gigawatt-scale data center facilities. Utility interconnection agreements,
        capacity commitments, and permitting timelines for large power users (>100 MW) are standard
        elements of data center diligence that are not available in Lambda's public communications.
      whyItMatters: >-
        Gigawatt-scale AI factory buildout is constrained by power availability. If utility contracts
        or permitting are delayed, Lambda's capacity growth timeline slips, threatening its ability to
        fulfill hyperscaler commitments and generate the revenue required to service the credit facility.
      diligencePath: >-
        Request site-specific power agreements and permitting status for all Lambda data center facilities
        under construction; assess utility interconnection queue position.
      relatedQuestionRefs:
        - QR011

    - type: access-blocked
      severity: material
      topic: dpa-enterprise-terms
      missingEvidence: >-
        Lambda Labs' Data Processing Agreements with enterprise customers are private contractual
        documents not publicly disclosed. The specific terms governing data residency, retention,
        processor sub-processor chains, GDPR Article 28 obligations, and Standard Contractual Clauses
        cannot be assessed from public Lambda trust materials.
      whyItMatters: >-
        For enterprise customers in regulated industries (pharma, fintech, healthcare), DPA quality
        is a procurement gate. If Lambda's DPA terms are substandard relative to AWS/Azure, it could
        limit addressable market expansion. Non-compliant DPA terms in EU deployments could trigger
        GDPR enforcement actions.
      diligencePath: >-
        Request a sample enterprise DPA from Lambda sales or legal; compare to AWS DPA and Azure DPA
        baseline terms for enterprise SaaS/cloud providers.
      relatedQuestionRefs:
        - QR018
      relatedTableRefs:
        - TR001

    - type: private-evidence-only
      severity: material
      topic: customer-nrr-churn
      missingEvidence: >-
        Lambda Labs has not disclosed its customer net revenue retention rate, churn rate, average
        contract value, or cohort-level retention data. These are the primary metrics for assessing
        whether Lambda's 10,000+ customer base generates durable recurring revenue or is susceptible
        to fragmentation as hyperscalers build competing in-house capacity.
      whyItMatters: >-
        If hyperscaler customers (which likely represent a disproportionate share of revenue) have
        low NRR or short contract durations, Lambda's revenue visibility is weaker than the customer
        count headline suggests. A 10,000+ customer base with poor hyperscaler retention is less
        valuable than a 2,000 customer base with 130%+ NRR.
      diligencePath: >-
        Request customer cohort data, NRR by segment, average contract length, and top-10 customer
        concentration from Lambda management during due diligence.
      relatedQuestionRefs:
        - QR021
      relatedTableRefs:
        - TR003

