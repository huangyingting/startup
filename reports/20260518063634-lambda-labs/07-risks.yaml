  - id: people-execution-governance
    title: People, execution, and governance risks
    body: >-
      The most material people risk in Lambda's current profile is the May 2026 CEO transition from co-founder
      Stephen Balaban to Michel Combes, a former global telecoms infrastructure operator (AT&T, SoftBank).
      Combes brings significant enterprise operational and financial discipline but arrives at a critical
      inflection: Lambda is deploying gigawatt-scale AI factories, integrating 10,000+ customers, and managing
      a complex capital structure with $1B+ in debt. AI infrastructure operational intuition—GPU procurement
      cycles, cluster reliability engineering, MLPerf competitive positioning—is not easily transferred from
      telecoms infrastructure, and Combes has no publicly documented AI cloud background. Stephen Balaban
      moves to CTO, which preserves technical leadership continuity, but execution quality during any CEO
      transition is systemically lower, particularly in hyperscaler contract renegotiation cycles.

      Lambda also faces talent risk in a hyper-competitive market for ML engineers, systems engineers, and
      data center operations staff. Lambda's culture emphasizes hiring exceptional engineers (evidenced by
      20+ published papers and MLPerf benchmark leadership), but without disclosed headcount or attrition
      data, investors cannot assess hiring velocity or key-person exposure. CFO Charles Fisher joined in
      February 2026—three months before the CEO transition—creating simultaneous C-suite learning curves.
      Governance risk is lower than a typical startup (co-founders retained, professional management in
      place, Series E board structure), but private-company governance opacity means board composition,
      voting agreements, and founder control terms are undisclosed.
    claimRefs:
      - CR008
      - CR009
      - CR034
      - CR038
      - CR041
      - CR005
    tableRefs:
      - TR004

  - id: mitigation-posture-kill-criteria
    title: Mitigation posture and kill criteria
    body: >-
      Lambda's strongest structural mitigations are NVIDIA's equity stake in the company (Series D), which
      creates relationship capital that pure-cloud competitors lack; SOC 2 Type II and ISO 27001 certifications,
      which reduce security audit friction for regulated enterprise buyers; a $1.5B+ Series E that provides
      operational capital buffer through multiple GPU procurement cycles; and the $1B senior secured credit
      facility (upsized and extended May 2026), which provides debt liquidity for ongoing GPU deployment.
      Charles Fisher's CFO appointment brings financial discipline; Michel Combes adds enterprise operational
      credibility; and Stephen Balaban's CTO retention preserves the technical depth that built Lambda's
      competitive differentiation.

      However, several critical mitigation elements are absent from the public record. Lambda has not disclosed
      specific SLA terms, indemnity structures, or uptime commitments to hyperscaler customers. Credit facility
      covenant terms are private, preventing assessment of financial stress triggers. Revenue, gross margin,
      and customer NRR are undisclosed, making it impossible to quantify the economic buffer against GPU price
      declines or customer churn events. Kill criteria for the investment thesis center on three threshold
      events: loss of NVIDIA preferred GPU allocation (would directly constrain Lambda's growth capacity),
      departure of two or more hyperscaler customers within twelve months (revenue cliff against fixed debt
      obligations), and Combes or Balaban exit within the first twelve months of the current leadership
      structure (governance instability at peak capital deployment). Below the kill threshold, monitoring
      indicators include public GPU spot price indices, Lambda customer announcements, and credit facility
      amendment filings.
    claimRefs:
      - CR003
      - CR004
      - CR005
      - CR011
      - CR018
