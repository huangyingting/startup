  topStrengths:
    - >-
      NVIDIA equity partnership (Series D strategic investor) provides preferred GPU allocation and roadmap access that
      pure-capital competitors cannot replicate
    - >-
      Four hyperscaler customers including Microsoft publicly confirmed, validating enterprise-grade product quality and
      reliability
    - >-
      Zero ingress/egress fees, InfiniBand connectivity, SOC 2 Type II / ISO 27001, and Kubernetes/Slurm-native platform
      differentiate against commodity cloud alternatives
    - >-
      97% active training time on OLMo 512-GPU B200 cluster (3min 42s median fault recovery) demonstrates
      production-grade reliability at hyperscaler scale
    - >-
      10,000+ customers and $3.3B+ total capital support multi-year runway with reduced dilution risk from non-dilutive
      $1B credit facility
  topRisks:
    - >-
      CEO transition (Stephen Balaban → Michel Combes, May 2026) simultaneously with CFO appointment (Charles Fisher,
      Feb 2026) introduces unproven leadership execution at a critical growth inflection
    - >-
      ARR, gross margin, NRR, and credit facility covenant terms are entirely undisclosed — investment cannot be
      underwritten without CFO diligence; estimated $400–800M ARR range is too wide to price confidently
    - >-
      NVIDIA GPU supply dependency: Lambda's competitive advantage collapses if NVIDIA terminates preferred allocation
      or redirects supply to CoreWeave, AWS, or Microsoft Azure
    - >-
      Hyperscaler customer concentration: four undisclosed customers likely represent >50% of revenue; two departures in
      the 12 months post-CEO transition could trigger bear-case economics
    - >-
      Rapidly falling H100 spot prices (CoreWeave $1.49–$1.79/hr vs. Lambda $3.99/hr) signal gross margin compression
      risk if GPU supply normalizes in 2026–2027
  unresolvedGaps:
    - >-
      2025 audited or management ARR, gross margin, and NRR by customer segment — the single most important data gap;
      range ($400M–$800M) is too wide to value confidently
    - >-
      Credit facility ($1B, May 2026) covenant terms, coverage ratios, and cure periods — material for default risk
      assessment
    - >-
      Top-10 customer revenue concentration and churn history — required to assess hyperscaler departure risk
      quantitatively
    - >-
      GPU capex pipeline and forward purchase commitments for B200/GB300 — needed to assess whether $3.3B+ total capital
      is adequate for the planned buildout
    - >-
      CEO transition execution evidence (6–12 months post-May 2026 appointment) — Michel Combes's track record at
      hyperscale GPU cloud is undemonstrated
