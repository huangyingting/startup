callouts:
  - calloutType: strength
    title: Quantitative ML performance proof at production scale
    body: >-
      Lambda's performance claims are backed by published production numbers: 97% active training time and 3m42s
      median fault recovery in OLMo Hybrid, FlashAttention-4 achieving 1,613 TFLOPs/s (71% hardware utilization,
      1.3x over cuDNN) on B200, and MLPerf v6.0 showing 29% Blackwell Ultra improvement with an additional 9% from
      Lambda's software optimization layer. These are quantified, reproducible benchmarks rather than marketing claims.
    claimRefs:
      - CE017
      - CE018
      - CE020
      - CE021
      - CE031
      - CE032
  - calloutType: risk
    title: NVIDIA single-vendor concentration is a structural dependency risk
    body: >-
      Lambda's full product portfolio — GPU compute, InfiniBand networking, NVLink, CUDA stack, and roadmap items —
      depends on NVIDIA hardware and roadmap execution. Supply disruptions, allocation changes, or NVIDIA pricing
      renegotiation would propagate directly to Lambda's capacity, costs, and delivery timelines. This dependency is
      structural and shared with CoreWeave and cloud hyperscalers, but it represents an unmitigatable concentration
      risk for Lambda-specific diligence.
    claimRefs:
      - CE037
      - CE038
      - CE039
  - calloutType: insight
    title: Zero-egress-fee pricing is a structural differentiator, not a discount
    body: >-
      Lambda's $0 data-transfer policy is embedded across all product tiers and documented on the pricing page. Unlike
      AWS, Azure, and GCP, which charge per-GB egress, Lambda eliminates this cost center entirely. For iterative
      training workloads with large checkpoint volumes or inference workloads serving large model outputs, this
      structural pricing difference compounds over time and represents a measurable cost advantage rather than a
      promotional discount.
    claimRefs:
      - CE016
      - CE024
      - CE035
  - calloutType: recommendation
    title: Validate FedRAMP and HIPAA BAA status before diligence for regulated buyers
    body: >-
      Lambda's trust page does not mention FedRAMP authorization or HIPAA Business Associate Agreements as of May 2026.
      This limits Lambda's addressable market among US federal agencies and HIPAA covered entities. Any investor or
      buyer targeting Lambda for regulated-industry customers should obtain direct confirmation of these compliance
      roadmap items from Lambda management before committing to a deployment plan.
    claimRefs:
      - CE011
      - CE012
      - CE013
