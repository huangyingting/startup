  evidenceGaps:
    - type: private-evidence-only
      severity: minor
      topic: lambda-stack
      missingEvidence: >-
        Lambda Stack's internal API specifications, orchestration protocols, and job scheduler internals beyond
        the documented Kubernetes and Slurm interfaces are not publicly available.
      whyItMatters: >-
        Undocumented internals create integration uncertainty for customers building custom tooling on top of
        Lambda Stack and limit independent validation of the claimed CNCF conformance depth.
      diligencePath: >-
        Request Lambda Stack architecture documentation and API reference during customer due diligence.
        Ask specifically for CNCF conformance test results and any proprietary scheduler extensions.
      relatedQuestionRefs:
        - QE025
    - type: missing-source
      severity: material
      topic: capacity-allocation
      missingEvidence: >-
        Lambda's capacity allocation policy between On-Demand, 1-Click Cluster, and Private Cloud during
        peak infrastructure demand is not publicly documented.
      whyItMatters: >-
        Without knowing prioritization rules, customers cannot assess the risk of capacity preemption or
        delayed provisioning during high-demand periods, which is material for SLA planning.
      diligencePath: >-
        Ask Lambda directly for written capacity allocation policies, priority queuing rules, and any SLA
        documentation covering peak-demand periods and inter-tier conflict resolution.
      relatedQuestionRefs:
        - QE026
    - type: missing-source
      severity: minor
      topic: compliance-gaps
      missingEvidence: >-
        Lambda does not appear to hold FedRAMP authorization or HIPAA Business Associate Agreement coverage
        based on its public trust page as of May 2026.
      whyItMatters: >-
        These gaps limit Lambda's addressable market among US federal agencies and HIPAA covered entities,
        which include healthcare providers, life sciences companies, and government AI programs.
      diligencePath: >-
        Confirm with Lambda's compliance team whether FedRAMP and HIPAA BAA are on the 2026 roadmap.
        Request timeline and current compliance certification boundary documentation.
