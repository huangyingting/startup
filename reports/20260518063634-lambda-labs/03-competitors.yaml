  - id: section-P2
    title: "Direct competitor profiles: CoreWeave, Vast.ai, and the hyperscaler field"
    body: >-
      CoreWeave is Lambda's clearest direct rival in the premium GPU-cloud segment. Its S-1 and investor-relations
      materials confirm IPO-stage capitalization and a customer roster that includes OpenAI, Mistral AI, IBM, and Jane
      Street—names that lean heavily toward frontier model labs and institutional finance. SemiAnalysis awarded
      CoreWeave a Platinum ClusterMAX rating, the highest infrastructure-quality designation in their 2026 review,
      signaling top-tier InfiniBand reliability for large training runs. CoreWeave does not publish a public rate
      card; pricing requires direct sales engagement, which creates cost opacity that benefits enterprises with
      negotiating leverage but disadvantages smaller teams. CoreWeave's post-IPO balance sheet gives it the ability
      to commit multi-year capacity to anchor customers—a deal structure Lambda, as a late-Series E private company,
      cannot replicate at the same scale today.

      Vast.ai's marketplace model is complementary-to-competitive: its 68+ GPU types and per-second billing serve
      cost-sensitive developers who prioritize price flexibility over production SLAs. Vast.ai's SOC 2 certification
      and documented API/CLI toolkit make it credible for batch and research workloads, but it lacks Lambda's
      InfiniBand cluster fabric, making it unsuitable for large synchronized training runs. AWS p4d/p4de/p5 instances
      provide up to 8x NVIDIA A100 per instance with EFA networking, competing on training runs but bundled into
      AWS's compliance and billing ecosystem that adds hidden cost via egress fees. Azure's NDas A100 series has
      structural distribution leverage through Microsoft enterprise agreements, offering AI compute alongside Teams,
      365, and OpenAI services in a single vendor relationship. Google Cloud differentiates on TPU v5—hardware
      unavailable anywhere else—that serves teams heavily invested in the Google ML research ecosystem.
