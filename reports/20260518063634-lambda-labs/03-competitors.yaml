  - id: section-P3
    title: "Pricing, packaging, and compliance: where Lambda has structural advantages and where gaps remain"
    body: >-
      Lambda's H100 SXM at $3.99/GPU/hr and B200 SXM6 at $6.69/GPU/hr are publicly listed prices with no egress
      fees—a deliberate transparency play that contrasts with CoreWeave's contact-sales model and AWS's complex
      on-demand plus egress structure. The zero-egress policy represents a material cost advantage for training
      workloads that move large datasets: AWS and Azure egress fees can add 5–15% to effective compute costs for
      data-intensive pipelines, while Lambda charges nothing. Vast.ai spot pricing can undercut Lambda for batch
      jobs—estimated $2.50–4.00/GPU/hr for H100 spot versus Lambda's $3.99 on-demand—but without the InfiniBand
      backbone, guaranteed uptime SLAs, or compliance infrastructure Lambda provides. Lambda holds SOC 2 Type II
      and ISO 27001 certifications, matching baseline enterprise requirements. However, Lambda does not publicly
      list HIPAA, FedRAMP, or GovCloud certifications that regulated enterprise buyers (healthcare, government,
      financial services) may require, while AWS and Azure carry all three. Google Cloud adds TPU v5 hardware that
      is unavailable on Lambda—a differentiator for teams optimizing for Google's ML stack. Lambda's 1-Click
      Clusters scale from 16 to 2,000+ NVIDIA B200 or H100 GPUs with InfiniBand Quantum-2 SHARP connectivity,
      matching CoreWeave's infrastructure tier at transparently published per-GPU pricing.
