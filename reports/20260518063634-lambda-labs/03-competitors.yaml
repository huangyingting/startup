callouts:
  - calloutType: strength
    title: "Zero-egress pricing is a structural cost moat against hyperscalers for large training workloads"
    body: >-
      Lambda's zero ingress/egress fee policy removes a hidden cost that adds 5–15% to effective GPU compute
      bills on AWS, Azure, and Google Cloud for workloads that move large datasets repeatedly. This advantage is
      structurally hard for hyperscalers to close without cannibalizing their own network revenue lines.
    claimRefs:
      - CP003
      - CP026
      - CP033
  - calloutType: risk
    title: "CoreWeave's OpenAI/Microsoft anchor relationships are Lambda's hardest competitive gap to close"
    body: >-
      CoreWeave's multi-year compute contracts with OpenAI and Microsoft give it frontier-lab credibility and
      reference accounts that Lambda cannot replicate without similar anchor customers. CoreWeave's IPO-grade
      balance sheet enables capacity commitments early-stage private providers cannot match on the same terms.
    claimRefs:
      - CP011
      - CP013
      - CP034
      - CP035
  - calloutType: insight
    title: "Lambda's ML research output is unusual for a GPU cloud provider and increasingly important for developer trust"
    body: >-
      Publishing 20+ peer-reviewed ML papers per year and running public benchmarks like OLMo Hybrid and
      FlashAttention-4 is rare among infrastructure-only providers. This positions Lambda as a research-grade
      infrastructure partner—a distinction that matters to the AI startup and research community Lambda is building.
    claimRefs:
      - CP030
      - CP031
      - CP032
      - CP039
