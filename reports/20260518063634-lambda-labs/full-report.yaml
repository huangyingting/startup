        blocks:
          - type: paragraph
            body: >-
              Lambda Labs structures its cloud platform around four distinct product tiers, each targeting different
              customer archetypes by scale, isolation, and control. On-Demand GPU instances serve individual researchers
              and small teams who need immediate access to modern accelerators — including NVIDIA H100 SXM5 (80 GB HBM3)
              and B200 SXM6 (180 GB HBM3e) — without advance reservation. 1-Click Clusters extend that self-service
              model to distributed training and inference at 16-to-2000+ GPU scale, connecting nodes via NVIDIA
              Quantum-2 InfiniBand with SHARP acceleration to reduce inter-GPU latency and enable multi-node runs
              without custom networking work by the customer.


              Private Cloud steps above 1-Click Clusters to dedicated single-tenant environments of 1,000+ GPUs with
              direct low-level access. This tier targets frontier labs and enterprises that require workload isolation,
              custom networking, and full control over the software stack. Superclusters represent the fourth and
              highest tier: gigawatt-scale AI factories built for hyperscalers and frontier model developers. Lambda
              built a complete Supercluster for a confidential hyperscaler in 90 days, serving as documented proof of
              operational delivery velocity.


              Cross-cutting all tiers, Lambda offers Lambda Chat as a consumer and research surface for open models
              including DeepSeek-R1, Llama, and Mochi, and a well-documented REST API at docs.lambdalabs.com/api/cloud
              for programmatic instance management. The no-egress-fee pricing policy — zero data-transfer charges for
              all tiers — is a consistent commercial differentiator. Each buyer type has distinct evaluation criteria:
              researchers navigate On-Demand pricing and availability; ML teams assess 1-Click Cluster networking and
              fault recovery; enterprises weigh Private Cloud isolation and compliance posture; hyperscalers evaluate
              Supercluster delivery timelines and engineering support.
