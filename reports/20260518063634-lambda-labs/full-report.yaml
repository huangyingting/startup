  productSummary: >-
    Lambda sells GPU compute and AI infrastructure across five product tiers: (1) On-Demand GPU Instances (B200 at
    $6.69/hr, H100 at $3.99/hr, A100 at $2.79/hr) with zero egress fees; (2) 1-Click Clusters — self-serve
    InfiniBand-connected GPU clusters from 16 to 2,000+ B200 or H100 GPUs with Kubernetes/Slurm orchestration; (3)
    Private Cloud — dedicated, single-tenant GPU infrastructure deployed on-premises or co-location; (4) Superclusters —
    hyperscaler-grade multi-thousand-GPU AI factory deployments; and (5) Lambda Stack — a software layer including
    Kubernetes/Slurm orchestration, Lambda Chat, and Lambda API (OpenAI-compatible). Hardware uses NVIDIA HGX B200,
    H100, GB300 NVL72, VR200 NVL72 systems over NVIDIA Quantum-2 InfiniBand with SHARP acceleration. Data centers are
    Tier 3 / Tier 4 with AWS Direct Connect, GCP Interconnect, Azure ExpressRoute, and OCI FastConnect cloud
    interconnects.
  customerFocus: >-
