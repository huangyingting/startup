              complex capital structure with $1B+ in debt. AI infrastructure operational intuition—GPU procurement
              cycles, cluster reliability engineering, MLPerf competitive positioning—is not easily transferred from
              telecoms infrastructure, and Combes has no publicly documented AI cloud background. Stephen Balaban moves
              to CTO, which preserves technical leadership continuity, but execution quality during any CEO transition
              is systemically lower, particularly in hyperscaler contract renegotiation cycles.

              Lambda also faces talent risk in a hyper-competitive market for ML engineers, systems engineers, and data
              center operations staff. Lambda's culture emphasizes hiring exceptional engineers (evidenced by 20+
              published papers and MLPerf benchmark leadership), but without disclosed headcount or attrition data,
              investors cannot assess hiring velocity or key-person exposure. CFO Charles Fisher joined in February
              2026—three months before the CEO transition—creating simultaneous C-suite learning curves. Governance risk
              is lower than a typical startup (co-founders retained, professional management in place, Series E board
              structure), but private-company governance opacity means board composition, voting agreements, and founder
