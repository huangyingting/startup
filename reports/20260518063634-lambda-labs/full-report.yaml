          tone: positive
        - id: opex_interest
          label: Opex + credit interest (unknown)
          detail: Operating expenses and credit facility interest costs are not publicly disclosed.
          tone: negative
        - id: net_margin
          label: Net margin (unknown)
          detail: Net profitability is entirely private; cannot model without income statement data.
          tone: negative
      edges:
        - from: gpu_cost
