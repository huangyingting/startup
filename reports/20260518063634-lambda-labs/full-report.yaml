  - id: FU001
    title: Customer Journey Map
    titleSlug: customer-journey-map
    type: journey-map
    insight: >-
      Lambda's customer journey compresses from awareness to first GPU workload in minutes via self-serve provisioning,
      but the path from developer to enterprise Supercluster customer spans months of expanded usage and relationship
      development, with advocacy customers providing the highest-trust external proof points.
    data:
      items:
        - id: stage-awareness
          label: Awareness
          actor: Developer / ML Engineer
          description: >-
            Discovers Lambda through developer community channels — Hacker News, Reddit r/LocalLLaMA, Twitter/X posts,
            or peer recommendations. Enterprise buyers may engage via industry conference presence, Lambda blog
            coverage, or open-source partnership visibility (OLMo, Ollama).
          channels:
            - Hacker News / Reddit
            - Lambda blog
            - Developer Twitter/X
            - Open-source communities
        - id: stage-trial
          label: Trial & Evaluation
          actor: Developer / ML Engineer
          description: >-
            Self-serve account creation with no minimum commitment. Developer provisions an on-demand GPU instance, runs
            a benchmark or first model, and evaluates price-performance versus AWS, Azure, or CoreWeave alternatives.
          channels:
            - lambda.ai self-serve portal
            - Lambda documentation
            - Community benchmarks
        - id: stage-activation
          label: First Production Workload
          actor: Developer / Startup ML Team
          description: >-
            Customer runs first production or recurring training workload on Lambda on-demand GPUs. Provisioning
            completes in minutes; the first compute job typically runs on the same day as account creation.
          channels:
            - On-demand GPU portal
            - Lambda REST API
        - id: stage-adoption
          label: Scale to Clusters
          actor: Growing ML Team
          description: >-
            As workload scale increases, customer migrates to 1-Click Clusters for multi-GPU distributed training. This
            tier introduces InfiniBand-connected GPU clusters and Lambda's network-optimized infrastructure at 16–512
            GPU scale.
          channels:
            - 1-Click Cluster portal
            - Lambda support
        - id: stage-expansion
          label: Enterprise Expansion
          actor: Enterprise / Hyperscaler
          description: >-
            High-value customers migrate to reserved instances, Private Cloud, or dedicated Supercluster deployments.
            This tier involves longer commitments, dedicated infrastructure, and account management engagement.
          channels:
            - Reserved capacity portal
            - Enterprise sales team
            - Supercluster program
        - id: stage-advocacy
          label: Reference Customer
          actor: Enterprise / Production Customer
          description: >-
            Customers who achieve significant outcomes (Oumi: 70% cost reduction; Pika: video generation at scale)
            become reference customers, contributing to Lambda's sales pipeline and developer community credibility
            through case studies and partnerships.
          channels:
            - Lambda customer stories
            - Press releases
            - Partnership blog posts
    claimRefs:
