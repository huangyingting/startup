    title: Risk heatmap — Lambda Labs 2026 risk landscape
    type: matrix
    layout: wide
    summary: >-
      Qualitative risk heatmap showing Lambda's 2026 key risks by likelihood (columns) and impact (rows). High-impact,
      high-likelihood risks — hyperscaler in-house buildout and CEO transition — represent the primary investment
      watchpoints.
    data:
      columns:
