chapters:
  - number: 1
    title: Company Overview
    sections:
      - number: '1.1'
        title: Company Identity and Mission
        blocks:
          - type: paragraph
            body: >
              Lambda, headquartered in San Francisco, CA, operates as "The Superintelligence Cloud" — an AI-first

              GPU cloud infrastructure provider offering on-demand and reserved GPU compute for model training,
              fine-tuning,

              and inference workloads. Founded in 2012 by Stephen Balaban and Michael Balaban at the Noisebridge
              hackerspace

              in San Francisco's Mission District, Lambda started as a provider of deep learning workstations and
              servers

              before pivoting to cloud GPU services. The company's official website is https://lambda.ai (formerly

              lambdalabs.com). Lambda is a private company at Series E stage (as of May 2026), with no public filing

              obligations and no disclosed audited revenue.


              Lambda's product model is infrastructure-as-a-service at multiple tiers: On-Demand GPU Instances (single

              nodes, self-serve); 1-Click Clusters (16 to 2,000+ GPU InfiniBand-connected clusters); Private Cloud

              (single-tenant 1,000+ GPU clusters); and Superclusters (gigawatt-scale AI factories for hyperscalers and

              frontier model labs). The company also provides Lambda Stack (Kubernetes/Slurm orchestration), Lambda Chat

              (open-source model hosting), and Lambda API (programmatic cloud access). Lambda competes primarily against

              CoreWeave, Vast.ai, and the major hyperscalers (AWS, Google Cloud, Azure, OCI) for GPU cloud workloads.

              Its stated differentiation is AI-native infrastructure design, zero ingress/egress fees, InfiniBand
              fabric,

              and NVIDIA hardware access (including the latest B200 and GB300 NVL72 systems). Lambda holds SOC 2 Type II

              and ISO 27001 certifications and connects to cloud interconnects via AWS Direct Connect, GCP Interconnect,

              OCI FastConnect, and Azure ExpressRoute.
