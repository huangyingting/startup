      utilization rate, data center lease cost, and credit facility interest burden.
    data:
      nodes:
        - id: gpu_cost
          label: GPU hardware procurement
          detail: H100 server ~$250K–350K wholesale; depreciated over 3–5 years = $350–1,000/GPU/month.
