      - number: '1.4'
        title: Products, Scale, and Customer Base
        blocks:
          - type: paragraph
            body: |
              Lambda's product stack spans the full range of GPU compute delivery:

              On-Demand Instances are the entry point — single-node GPU servers available via self-serve at published
              pricing. As of May 2026: NVIDIA HGX B200 SXM6 (180GB) at $6.69/GPU/hr, H100 SXM (80GB) at $3.99/GPU/hr,
              A100 SXM (80GB) at $2.79/GPU/hr, A100 SXM (40GB) at $1.99/GPU/hr, and V100 (16GB) at $0.79/GPU/hr.
              Lambda charges zero ingress/egress fees — a competitive pricing signal versus hyperscalers.

              1-Click Clusters™ are self-serve InfiniBand-connected GPU clusters from 16 to 2,000+ GPUs with
              Kubernetes and Slurm orchestration included. Pricing for 1-Click Cluster B200 nodes: $9.86/GPU/hr
              (16 GPU), $9.36/GPU/hr (64 GPU), $8.87/GPU/hr (256+ GPU) — reflecting volume discounts at scale.

              Superclusters are custom gigawatt-scale AI factory builds for hyperscalers and frontier model labs.
              Lambda reports completing a full cluster build for a confidential "AI Hyperscaler" in 90 days — a
              key customer win demonstrating speed-to-deploy capability.

              Lambda reports 10,000+ active customers (company-stated, May 2026), four hyperscaler customers
              including Microsoft, and that its infrastructure indirectly serves "hundreds of millions of people."
              Named customers include Pika (video generation), Iambic Therapeutics (drug discovery), fal
              (open-source AI), Meshy (3D generative AI), and Genesis Therapeutics. A healthcare provider
              customer reported a 70% cost reduction using Oumi + Lambda infrastructure. Lambda has published
              20+ peer-reviewed ML papers in the past 12 months and held Platinum sponsor status at NVIDIA GTC
              2026 (March 2026).
            claimRefs:
              - CO018
              - CO019
              - CO020
              - CO021
