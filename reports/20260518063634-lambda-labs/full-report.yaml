      - number: '1.3'
        title: Funding History and Capital Strategy
        blocks:
          - type: paragraph
            body: |
              Lambda's funding trajectory is one of the most aggressive in the AI cloud infrastructure sector.
              The company raised $320M in a Series C in February 2024. On February 19, 2025, Lambda announced a
              $480M Series D co-led by Andra Capital and SGW, with strategic investors including NVIDIA, Andrej
              Karpathy (angel), ARK Invest, Fincadia Advisors, G Squared, IQT (In-Q-Tel), and hardware supply
              chain partners Pegatron, Supermicro, Wistron, and Wiwynn. The NVIDIA investment is particularly
              notable as it cements a strategic supplier relationship at the equity level.

              On November 18, 2025, Lambda announced a Series E of $1.5B+ led by TWG Global (Thomas Tull and
              Mark Walter) and USIT. This was one of the largest single private AI infrastructure rounds in 2025.
              Total equity raised across all rounds is approximately $2.3B+. Additionally, Lambda secured a senior
              secured credit facility: an initial facility closed in August 2025 and was upsized to $1B on
              May 7, 2026. This brings total capital (equity + debt) to approximately $3.3B+. The debt facility
              provides non-dilutive runway for data center buildout and hardware procurement without further equity
              dilution.

              Lambda has not disclosed a post-money valuation for any round, which is atypical for companies of
              this scale and likely reflects founder preference to avoid mark-to-market pressure. No secondary
              transactions or tender offers have been publicly reported.
