  - number: 2
    title: Market Analysis
    sections:
      - number: '2.1'
        title: Market Boundary and Definition
        blocks:
          - type: paragraph
            body: |
              Lambda's primary market is AI cloud infrastructure — the provisioning of GPU compute for model
              training, fine-tuning, and inference workloads on behalf of AI labs, enterprises, startups, and
              hyperscalers. This market sits within the broader cloud computing and data center infrastructure
              sector but is defined by its AI-specific characteristics: NVIDIA GPU density, InfiniBand or
              high-speed interconnect fabrics, AI-optimized storage, and AI orchestration layers (Kubernetes,
              Slurm). The market definition must distinguish between: (1) GPU cloud services for general AI
              workloads (Lambda's primary segment — On-Demand Instances, 1-Click Clusters); (2) dedicated
              AI factory and supercluster builds for hyperscalers and frontier model labs (Lambda's Supercluster
              product tier); and (3) the broader public cloud market (AWS, Azure, GCP) which includes GPU
              instances as a subset of general-purpose compute.

              Included spend in Lambda's addressable market: GPU instance compute charges, cluster reservation
              fees, storage (S3-compatible), and managed infrastructure services for AI workloads. Excluded
              spend: general-purpose CPU compute, CDN, software-as-a-service, and application-layer AI services
              (e.g., OpenAI API). Status-quo substitutes include: AWS EC2 P4/P5 (A100/H100 instances) for
              enterprises with existing AWS relationships; Azure N-series GPU VMs for OpenAI ecosystem customers;
              Google Cloud A3 (H100 VMs) and TPU pods for TensorFlow-first workloads; and on-premises GPU
              servers from NVIDIA DGX / SuperPOD for enterprises with sufficient capex budget. CoreWeave and
              Vast.ai are the closest direct competitors in the specialized GPU cloud segment.

              The adjacency opportunity includes: (1) bare metal GPU deployment for sovereign AI initiatives;
              (2) edge AI inference (smaller but adjacent); and (3) AI-as-a-service hosted model endpoints
              (Lambda Chat begins this adjacency). Lambda's market boundary definition matters because it
              determines whether the TAM is the full $500B+ cloud market (too broad) or the more constrained
              $50–150B GPU-for-AI market (more relevant).
            claimRefs:
              - CM001
              - CM002
              - CM003
              - CM004
