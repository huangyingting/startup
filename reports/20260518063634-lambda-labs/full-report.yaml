              - CV026
              - CV027
              - CV033
      - number: '8.4'
        title: Thesis-Break Conditions and Kill Criteria
        blocks:
          - type: paragraph
            body: >-
              Lambda Labs' investment thesis is built on a set of enabling assumptions that, if violated, would
              fundamentally undermine the return outlook and warrant exit or significant position reduction. Five
              specific kill triggers are identified:

              First, NVIDIA GPU allocation loss or downgrade: if NVIDIA reduces Lambda's preferred allocation below 50%
              of committed procurement volumes, Lambda's supply advantage — the foundational differentiator of its value
              proposition — collapses. This is monitored through NVIDIA quarterly earnings commentary on customer
              allocations and Lambda procurement announcements.

              Second, hyperscaler customer churn: departure of two or more of the four hyperscaler customers within any
              12-month window signals that the hyperscaler demand thesis is structurally broken.

              Third, GPU spot price collapse: H100 spot pricing sustained below $0.75/GPU-hr for 90+ days signals a
              structural commodity-ization of GPU compute that would compress Lambda's per-unit margins below
              sustainable thresholds even with differentiated features.

              Fourth, CEO or CTO departure: if Michel Combes or Stephen Balaban departs within 12 months of the May 2026
              leadership transition, the organization faces compounded leadership instability that historically
              correlates with customer and talent attrition.

              Fifth, credit covenant breach: any breach of the $1B credit facility covenants would trigger lender
              remedies, potentially including accelerated repayment, materially impairing Lambda's ability to fund GPU
              procurement and operational commitments.
            claimRefs:
              - CV034
              - CV035
              - CV036
              - CV037
              - CV038
              - CV039
              - CV040
          - type: table
            tableRef: TV005
            claimRefs:
              - CV034
              - CV035
              - CV036
              - CV037
              - CV038
      - number: '8.5'
        title: Exit Readiness and Final Diligence Asks
        blocks:
          - type: paragraph
            body: >-
              Lambda Labs' exit readiness is conditional on achieving $1B+ ARR with a demonstrable margin trajectory, a
              prerequisite for a credible IPO candidacy in the 2027–2029 window. At estimated $400–800M ARR as of
              mid-2026, Lambda is approximately 2–3 years from IPO readiness assuming continued growth. The strategic
              acquirer universe includes hyperscalers that might prefer to own preferred GPU supply outright, large
              enterprise infrastructure companies (Oracle, IBM) seeking AI cloud capability, and sovereign wealth funds
              with long-horizon infrastructure appetites.

              Before committing capital at current Series E terms, five diligence asks are essential. First and most
              critical: 2025 ARR confirmation and 2026 guidance from CFO Charles Fisher, as the entire valuation
              framework depends on this single data point. Second: customer NRR by segment — specifically separating
              hyperscaler and enterprise long-tail cohorts — to assess whether Lambda's 10,000+ customer base drives
              durable revenue or fragile spot-market activity. Third: full credit facility covenant terms, to enable
              independent modeling of liquidity risk and thesis-break trigger calibration. Fourth: top-10 customer
              concentration and average contract lengths, to quantify the hyperscaler churn risk in absolute revenue
              terms. Fifth: GPU capex pipeline and depreciation schedule from the CFO, necessary to model cash burn,
              stranded asset risk, and required capital through the B200-to-B300 GPU generation transition.

              These five items, together with the CEO 100-day plan and evidence of CFO integration, constitute the
              minimum information set for underwriting Lambda at current terms with reasonable confidence.
            claimRefs:
              - CV041
              - CV042
              - CV043
              - CV044
              - CV045
          - type: table
            tableRef: TV006
            claimRefs:
              - CV043
              - CV044
              - CV045
          - type: figure
            figureRef: FV004
            claimRefs:
              - CV001
              - CV010
              - CV014
              - CV015
              - CV023
              - CV026
      - number: '8.6'
        title: Exhibits
        blocks:
          - type: callout
            title: Conditional BUY at current Series E terms — medium confidence, high risk
            body: >-
              Lambda Labs is a well-positioned AI cloud infrastructure company with genuine structural advantages:
              NVIDIA equity partnership, hyperscaler demand validation, and a full-stack GPU platform. The Series E
              implied valuation of $10–15B is fair — not cheap — relative to CoreWeave's $19B IPO comparable. The
              conditional qualifier is non-negotiable: without 2025 ARR confirmation, customer NRR by segment, and
              covenant terms, the investment cannot be underwritten with high confidence. Complete the five diligence
              asks before closing.
            calloutType: recommendation
            claimRefs:
              - CV001
              - CV002
              - CV014
              - CV015
              - CV043
              - CV044
              - CV045
          - type: callout
            title: NVIDIA equity partnership and GPU access are genuine structural advantages
            body: >-
              Lambda's NVIDIA equity partnership — originating from the Series D — is the single most defensible element
              of the investment thesis. Preferred GPU allocation and roadmap access cannot be replicated by capital
              alone; CoreWeave has a comparable NVIDIA relationship but Lambda's $10–15B valuation implies a meaningful
              discount to CoreWeave's post-IPO trading range, making the thesis attractive if ARR confirms at the upper
              end of analyst estimates.
            calloutType: strength
            claimRefs:
              - CV005
              - CV002
              - CV022
              - CV028
          - type: callout
            title: CEO transition and hyperscaler churn are the primary downside catalysts
            body: >-
              The simultaneous appointment of a new CEO (May 2026) and CFO (February 2026), combined with undisclosed
              customer NRR data and an opaque credit facility, represent compounded opacity at the worst possible time
              in Lambda's growth cycle. If one hyperscaler departs in the 12 months following the CEO transition — a
              plausible scenario given that new leadership requires relationship management — the bear case economics
              become the base case. The kill criterion of two hyperscaler departures within 12 months should be treated
              as a binding exit trigger.
            calloutType: risk
            claimRefs:
              - CV007
              - CV008
              - CV035
              - CV038
          - type: callout
            title: Base case assumes ARR of $600–900M can be confirmed by CFO diligence
            body: >-
              The entire base-case return framework ($8–12B exit, 1.5–2.5x return) depends on Lambda executing the CEO
              transition and reaching $600–900M ARR by 2027. If actual 2025 ARR is below $400M, the base case collapses
              into the bear scenario and the $10–15B entry price embeds significant downside. Confirming 2025 ARR is the
              single most important diligence action before committing capital.
            calloutType: assumption
            claimRefs:
              - CV015
              - CV026
              - CV027
              - CV045
