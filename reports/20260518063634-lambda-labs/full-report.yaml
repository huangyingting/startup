        - id: power_dc
          label: Power and data center costs
          detail: ~$100–200/GPU/month for power/cooling + ~$100–200/month for DC lease; varies by facility.
          tone: warning
        - id: total_cogs
          label: Total estimated COGS
          detail: ~$600–1,200/GPU/month combining hardware depreciation, power, and DC costs.
          tone: warning
        - id: demand_revenue
          label: On-demand revenue at 80% utilization
          detail: H100 at $3.99/hr × 24hr × 30d × 0.80 = ~$2,312/GPU/month.
          tone: positive
        - id: cluster_premium
          label: Cluster reservation premium
          detail: 1-Click Cluster B200 rates at $8.87–9.86/GPU/hr vs on-demand create higher gross revenue per reserved GPU.
          tone: positive
        - id: gross_margin
