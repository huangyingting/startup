  - id: FR002
    title: Risk transmission map — how Lambda risks propagate
    type: dag
    layout: wide
    summary: >-
      Causal risk propagation map showing how primary Lambda risks at the supply, competitive, and financial levels
      cascade into revenue impact and valuation compression.
    data:
      nodes:
        - id: nvidia_supply
          label: NVIDIA GPU Supply Disruption
          detail: Preferred allocation not guaranteed; hyperscalers get priority; H100/B200 allocation constrained
        - id: hyperscaler_buildout
          label: Hyperscaler In-House Buildout
          detail: AWS Trainium, Azure B200 capacity, GCP TPU/H100, Oracle OCI — all building competing GPU cloud
        - id: coreweave_competition
          label: CoreWeave Competitive Pressure
          detail: IPO March 2025 ~$23B valuation; OpenAI anchor customer; $8.65B raised; similar product set
        - id: ceo_transition
          label: CEO Transition Execution Risk
          detail: Michel Combes new May 2026; no prior AI cloud background; Stephen Balaban moved to CTO
        - id: gpu_price_decline
          label: GPU Price Commoditization
          detail: H100 fell $8→$2-3/hr; B200 trajectory uncertain; oversupply possible 2026-2027
        - id: debt_service
          label: $1B Credit Facility Obligations
          detail: Senior secured debt; covenants unknown; refinancing risk if revenue underperforms
        - id: customer_concentration
          label: Hyperscaler Revenue Concentration
          detail: 4 hyperscalers represent unknown % of revenue; single-customer exits create cliff risk
        - id: export_controls
          label: US AI Chip Export Controls
          detail: BIS EAR restrictions on H100/B200 exports; lambda international customers at risk
        - id: power_permitting
          label: Power & Permitting Delays
          detail: Gigawatt-scale expansion requires utility contracts and multi-year permitting
        - id: talent_risk
          label: Talent Acquisition Risk
          detail: Competitive market for ML/systems engineers; CEO transition may signal instability
        - id: revenue_impact
          label: Revenue Impact
          detail: Direct revenue reduction from customer loss, price decline, or capacity unavailability
        - id: valuation_compression
          label: Valuation Compression
          detail: Reduced revenue + increased debt stress → lower Series F / IPO valuation
      edges:
        - from: nvidia_supply
          to: revenue_impact
          label: Capacity constraint limits available GPU-hours
        - from: nvidia_supply
          to: gpu_price_decline
          label: Supply expansion drives spot price down
        - from: hyperscaler_buildout
          to: customer_concentration
          label: Hyperscalers shift workloads in-house
        - from: hyperscaler_buildout
          to: gpu_price_decline
          label: Hyperscaler scale drives GPU spot price compression
        - from: coreweave_competition
          to: customer_concentration
          label: CoreWeave competes for same enterprise AI customers
        - from: coreweave_competition
          to: gpu_price_decline
          label: Competitive pricing pressure on GPU-hour rates
        - from: ceo_transition
          to: talent_risk
          label: Leadership uncertainty triggers engineer attrition
        - from: ceo_transition
          to: customer_concentration
          label: New CEO lacks AI cloud relationships; hyperscaler churn risk
        - from: gpu_price_decline
          to: revenue_impact
          label: Lower per-GPU-hour revenue on fixed cost base
        - from: gpu_price_decline
          to: debt_service
          label: Revenue decline threatens interest coverage ratio
        - from: customer_concentration
          to: revenue_impact
          label: Hyperscaler exit creates immediate revenue cliff
        - from: debt_service
          to: valuation_compression
          label: Covenant stress signals financial distress to capital markets
        - from: revenue_impact
