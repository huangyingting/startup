              tone: negative
        - label: High Impact
          values:
            - label: Regulatory enforcement (EAR violations); Litigation
              tone: warning
            - label: GPU price collapse; Credit facility covenant breach; Security breach
              tone: negative
            - label: Customer concentration loss; Debt service stress
              tone: negative
        - label: Medium Impact
          values:
