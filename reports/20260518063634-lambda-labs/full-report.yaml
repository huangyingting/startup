      - number: '2.4'
        title: Growth Drivers and Constraints
        blocks:
          - type: paragraph
            body: |
              The AI GPU cloud market is subject to exceptional growth tailwinds and several material structural
              constraints that limit supply-side scaling.

              Primary growth drivers: (1) AI model scaling laws — while training compute is plateauing for
              frontier labs, inference compute is scaling 100x per generation per Lambda's own analysis
              (citing open-source reasoning models like DeepSeek-R1). This creates sustained and growing
              demand for inference GPU capacity. (2) Enterprise AI adoption — McKinsey's 2024 State of AI
              survey found that 65%+ of enterprises are regularly using generative AI, with investment expected
              to increase. Enterprise ML teams require dedicated GPU infrastructure separate from general
              cloud. (3) Open-source model proliferation — models like Llama-3, DeepSeek, and Mistral require
              GPU compute to serve at scale; Lambda Chat and Lambda API directly address this market.
              (4) NVIDIA GPU supply expansion — NVIDIA's Blackwell (B200, GB300) ramp is increasing total
              available supply, benefiting cloud providers who can access the new hardware generation first.

              Primary constraints: (1) GPU supply scarcity — NVIDIA remains the near-monopoly GPU supplier
              for AI training; supply is allocated partly through strategic relationships (Lambda's equity
              tie is an advantage). (2) Power and real estate — building Tier 4 data centers at gigawatt
              scale is a multi-year process; land, permitting, and utility interconnect are bottlenecks.
              (3) Capital intensity — each GPU cluster of 256+ H100s costs $10M+ in hardware alone;
              building a supercluster of 10,000+ GPUs requires $500M+ in capex, implying continued large
              fundraising or debt facility reliance. (4) Hyperscaler competition — AWS, Azure, and GCP
              are all aggressively expanding GPU capacity; their scale, customer relationships, and
              software ecosystem advantages create a durable incumbent moat for enterprise buyers.
