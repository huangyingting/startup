  - id: FI001
    title: Revenue model bridge
    type: waterfall
    layout: wide
    summary: >-
      Lambda converts GPU utilization into revenue across three pricing tiers; cluster premiums and zero-egress
      structure improve realized revenue per GPU-hour versus hyperscaler comparable.
    data:
      items:
        - label: On-demand GPU baseline revenue
          value: 100
          detail: H100 at $3.99/GPU/hr, A100 at $2.79/GPU/hr; base revenue from flexible workloads.
          tone: positive
        - label: Cluster reservation premium
          value: 25
          detail: 1-Click Cluster rates run $9.36–9.86/GPU/hr (B200), a ~2.3× premium to on-demand H100.
          tone: positive
        - label: Zero-egress savings passed to customer (demand driver)
          value: 10
          detail: No egress fees improve effective value vs hyperscalers, supporting higher GPU utilization.
          tone: positive
        - label: Utilization sensitivity (80% assumption)
          value: -20
          detail: At 80% utilization, 20% of capacity is idle; below 70% utilization compresses gross revenue materially.
          tone: warning
        - label: Estimated gross contribution margin
          value: 75
          detail: ~48–74% estimated gross margin on H100 at 80% utilization per public cost benchmarks.
          tone: positive
        - label: Fixed interest on $1B credit facility
          value: -5
          detail: Senior secured debt at market rates (est. 5–8% pa) adds fixed cash cost below gross margin.
          tone: warning
