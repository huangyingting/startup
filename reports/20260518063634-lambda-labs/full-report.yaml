      - number: '5.3'
        title: Quality, reliability, and compliance posture
        blocks:
          - type: paragraph
            body: >-
              Lambda has obtained SOC 2 Type II certification and ISO 27001 certification, the two most commonly
              required enterprise security attestations. These certifications are supported by a zero-trust security
              architecture that enforces VPC isolation, single-tenant compute (no shared nodes across customers), and no
              shared networking at the cluster level. Data centers are Tier 3 or Tier 4 rated with redundant power,
              cooling, and physical access controls. Lambda operates 24/7/365 with ML engineering and SRE teams
              providing around-the-clock support and automated fault recovery.


              Production reliability evidence is strongest from the OLMo Hybrid training run with Allen Institute for AI
              (Ai2), conducted on 512 NVIDIA B200 GPUs (64 HGX B200 systems). Over that multi-week run, Lambda recorded
              97% active training time — a figure that excludes fault recovery overhead — and a median GPU fault
              recovery time of 3 minutes and 42 seconds. Those numbers meet or exceed the reliability benchmarks
              required by most enterprise and frontier-lab customers for long-horizon training jobs.


              From a data governance perspective, Lambda's trust page states that customer workloads are isolated at the
              compute and network layers, with no cross-tenant access. The no-training-on-customer-data policy is
              consistent with the privacy requirements of healthcare, life sciences, and financial services buyers. The
              zero-trust posture combined with certification status gives Lambda a compliance profile competitive with
              AWS, Azure, and GCP for regulated workloads, though Lambda does not publish a FedRAMP Authorization or
              HIPAA Business Associate Agreement on its public trust page, which is a gap for US government and HIPAA
              covered-entity buyers.
