        title: 'Revenue model and monetization strategy: GPU-hours, cluster reservations, and the private-cloud tier'
        blocks:
          - type: paragraph
            body: >-
              Lambda monetizes through three primary revenue mechanisms. First, on-demand GPU instances priced by the
              hour—B200 SXM6 at $6.69/GPU/hr, H100 SXM at $3.99/GPU/hr, A100 SXM 80GB at $2.79/GPU/hr, A100 SXM 40GB at
              $1.99/GPU/hr, and V100 at $0.79/GPU/hr—serve individual developers and small ML teams that need flexible,
              uncommitted access. Second, 1-Click Cluster reservations at premium cluster rates ($9.86/GPU/hr for 16-GPU
              B200, $9.36/GPU/hr for 64-GPU, $8.87/GPU/hr for 256+ GPUs) serve teams running synchronized distributed
              training with InfiniBand connectivity. The cluster pricing is notably higher than on-demand, implying a
              meaningful revenue premium for bundled InfiniBand fabric and reservation guarantees. Third, a private
              cloud tier offers single-tenant clusters of 1,000+ GPUs for enterprise buyers requiring dedicated
              infrastructure, likely at negotiated enterprise pricing. Lambda differentiates from hyperscalers with zero
              ingress/egress fees, which improves realized revenue per workload by removing the cost offsets customers
              would otherwise need to subtract.

              Revenue recognition is likely usage-based (accrued by GPU-hour), which means Lambda's revenue is directly
              tied to GPU utilization rates rather than contracted ARR. This structure creates high revenue quality when
              utilization is high (minimal deferred revenue, immediate cash receipt for usage) but also high revenue
              volatility if utilization fluctuates. Lambda claims 10,000+ active customers and serves 4 hyperscalers
              including Microsoft, which diversifies its customer base considerably relative to CoreWeave's more
