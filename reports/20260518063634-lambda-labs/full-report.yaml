companyProfile:
  summary: >-
    Lambda Labs (Lambda) is a San Francisco-based AI cloud infrastructure company founded in 2012 by brothers Stephen
    Balaban and Michael Balaban. Originally a deep learning workstation maker, Lambda pivoted to GPU cloud services
    circa 2020 and has since grown to serve 10,000+ customers — including four hyperscalers with Microsoft publicly
    identified — on a portfolio spanning On-Demand GPU Instances, 1-Click Clusters (16–2,000+ GPUs), Private Cloud, and
    Superclusters. Lambda raised $480M Series D (Feb 2025) with NVIDIA as a strategic equity investor, followed by a
    $1.5B+ Series E (Nov 2025) led by TWG Global, and a $1B senior secured credit facility (May 2026), bringing total
    capital to ~$3.3B+. In May 2026, Lambda appointed Michel Combes as CEO and rebranded as "The Superintelligence
    Cloud," signaling a strategic shift toward hyperscaler-grade AI factory infrastructure. NVIDIA equity participation,
    SOC 2 Type II / ISO 27001 compliance, and zero ingress/egress fees are Lambda's principal competitive
    differentiators against CoreWeave and hyperscaler alternatives.
  foundedDate: '2012-01-01'
  founders:
    - name: Stephen Balaban
      role: Co-founder and CTO (previously CEO through May 2026)
      background: >-
        Built Lambda from a deep learning workstation startup in 2012 to a $2.3B-funded GPU cloud platform; led
