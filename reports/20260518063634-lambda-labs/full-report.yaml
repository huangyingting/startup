        title: Operational, quality, and security risks
        blocks:
          - type: paragraph
            body: >-
              Lambda's operational risk profile is dominated by uptime reliability, data security, and physical
              infrastructure resilience. Lambda serves 10,000+ customers including four hyperscalers—where brief outages
              can trigger SLA penalties, customer churn, and reputational damage at the fastest-growing segment of the
              AI cloud market. Lambda has disclosed approximately 97% uptime on B200 clusters, which is directionally
              positive but implies roughly 262 hours per year of potential downtime. For enterprise customers like
              Iambic Therapeutics (drug discovery) and Pika (video generation), AI compute outages have direct
              production impact.

              Security risk is heightened by Lambda's position as custodian of proprietary models, training data, and
              compute configurations for frontier AI labs. The attack surface includes Lambda's public-facing APIs
              (Lambda API, Lambda Chat), multi-tenant cluster environments (1-Click Clusters supporting 16 to 2,000+
              GPUs), and administrative systems managing gigawatt-scale deployments. Lambda holds SOC 2 Type II and ISO
              27001 certifications, which demonstrate meaningful control frameworks, but these do not eliminate
              sophisticated attack risk. Lambda has not disclosed a public bug bounty program, historical incident log,
              or post-mortem documentation for any security or availability events—all of which are baseline
              expectations for enterprise cloud providers competing against AWS, Azure, and GCP.
