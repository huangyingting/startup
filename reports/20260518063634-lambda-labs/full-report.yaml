      - number: '7.3'
        title: Partner, supply chain, and technology dependency risks
        blocks:
          - type: paragraph
            body: >-
              Lambda's supply chain risk is dominated by near-total dependence on NVIDIA for GPU hardware. All major
              Lambda products—B200 1-Click Clusters, H100 On-Demand Instances, A100 Private Cloud, GH200 research
              instances—run on NVIDIA GPUs. NVIDIA controls GPU supply allocation and pricing, with preferred allocation
              flowing to hyperscalers and large OEMs before pure-cloud providers like Lambda. During H100 supply
              constraints in 2023-2024, spot prices reached $8/hr before falling to $2-3/hr as supply normalized. The
              B200 generation introduces similar dynamics: allocation priority favors NVIDIA's largest customers by
              procurement volume, putting Lambda in competition with AWS, Azure, GCP, and Oracle for the same hardware.
              While NVIDIA's Series D investment provides some relationship benefit, this does not contractually
              guarantee preferred allocation.

              The hyperscaler competitive threat amplifies supply chain risk. AWS (Trainium, P4/P5 instances), Azure
              (NVIDIA preferred cloud partner with B200 access), GCP (TPU pods plus H100/A100 instances), and Oracle
              (aggressive OCI GPU capacity expansion) are all building dedicated AI cloud infrastructure with bundled
              storage, networking, and ML tooling that Lambda cannot easily replicate. CoreWeave's March 2025 IPO at
              approximately $23 billion established a public market reference for pure-play AI cloud, but CoreWeave's
              close OpenAI relationship and $8.65B raise create asymmetric competitive advantages. Technology transition
              risk compounds the supply chain story: GPU generations turn every 12 to 18 months, creating stranded
              capital risk on Lambda's financed GPU fleet if demand dynamics shift between capital deployment and useful
              life.
