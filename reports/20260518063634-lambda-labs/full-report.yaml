            body: >-
              Lambda's competitive universe spans pure-play GPU cloud providers, hyperscaler compute attachments, and
              spot GPU marketplaces. CoreWeave is the most direct rival—a well-capitalized pure-play that IPO'd at
              approximately $23 billion valuation in March 2025 after raising $8.65 billion in pre-IPO equity, with
              anchor relationships at OpenAI and Microsoft. Vast.ai operates a GPU marketplace aggregator model with
              20,000+ GPUs, 700,000+ transactions per month, and 68+ GPU types, competing primarily on price and
              selection breadth for batch and experimental workloads. The three major hyperscalers—AWS, Azure, and
              Google Cloud—compete indirectly but with formidable distribution advantages: AWS offers p4d/p4de/p5 GPU
              instances with Elastic Fabric Adapter networking, Azure's NDas A100 series integrates deeply with
              Microsoft 365 and OpenAI services, and Google Cloud provides H100/A100 VMs alongside proprietary TPU v5
              hardware unavailable on any competing platform. Oracle Cloud Infrastructure (OCI) is an aggressive entrant
              offering large GPU clusters at competitive pricing. Nebius, formerly Yandex Cloud, raised approximately
              $700 million in 2024 and is building European GPU-cloud capacity targeting EU data-residency buyers.
              Lambda's positioning anchors on developer-friendly pricing transparency—no egress fees, public list rates
              for on-demand and cluster instances—combined with technical depth in GPU orchestration and growing ML
