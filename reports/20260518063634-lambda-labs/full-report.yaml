      - number: '5.2'
        title: Technical architecture and ML infrastructure stack
        blocks:
          - type: paragraph
            body: >-
              Lambda's technical differentiation is rooted in a full-stack approach to ML infrastructure. The core
              compute layer uses NVIDIA HGX B200 systems with NVLink interconnects within a node and NVIDIA Quantum-2
              InfiniBand between nodes, with SHARP (Scalable Hierarchical Aggregation and Reduction Protocol) enabling
              in-network collective operations that cut gradient synchronization overhead for large-scale distributed
              training. Lambda operates data centers rated Tier 3 or Tier 4 with high-density power and liquid cooling
              support, a physical infrastructure requirement for thermally demanding Blackwell-generation GPUs.


              The software stack — Lambda Stack — is Kubernetes-native and CNCF-conformant. It supports Slurm scheduling
              for HPC-style batch workloads alongside Kubernetes for containerized training and inference pipelines. ML
              workflow tools including Kubeflow, MLflow, and KubeRay are natively available, reducing integration
              overhead for teams migrating from self-managed clusters. An S3-compatible storage layer uses a Filesystem
              S3 Adapter with no ingress or egress fees, which materially lowers cost for iterative training workloads
              with large checkpoint and dataset volumes.


              Lambda supports multi-cloud interconnects — AWS Direct Connect, GCP Interconnect, OCI FastConnect, and
              Azure ExpressRoute — enabling hybrid deployment patterns where customers use Lambda for GPU-intensive
              workloads while retaining other cloud services for data pipelines or serving. The observability stack
              includes Prometheus, Grafana, and Alertmanager, giving ML engineering teams standard tooling for cluster
              health without additional integration work. Lambda's REST API covers instance lifecycle management and is
              fully documented at docs.lambdalabs.com/api/cloud.
