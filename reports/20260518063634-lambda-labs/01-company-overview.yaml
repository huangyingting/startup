company:
  name: Lambda Labs
chapter:
  number: 1
  title: Company Overview
  summary: |
    Lambda (marketed as "Lambda Labs" and "The Superintelligence Cloud") is a San Francisco-based AI cloud
    infrastructure company founded in 2012 that provides GPU-as-a-service across on-demand instances,
    1-Click Clusters, private cloud, and gigawatt-scale supercluster builds for hyperscalers and frontier AI labs.
    With over $2.3B in equity raised across Series A through Series E (most recently $1.5B+ in November 2025 led by
    TWG Global) and an additional $1B senior secured credit facility closed May 7, 2026, Lambda has accumulated
    over $3.3B in total capital. The company serves 10,000+ active customers — including four hyperscalers and
    Microsoft — and executed a CEO transition in May 2026, moving co-founder Stephen Balaban to CTO and appointing
    telecoms infrastructure operator Michel Combes as CEO, signaling a shift toward professional management for
    scale.

sections:
  - id: SO-identity
    title: Company Identity and Mission
    body: |
      Lambda, headquartered in San Francisco, CA, operates as "The Superintelligence Cloud" — an AI-first
      GPU cloud infrastructure provider offering on-demand and reserved GPU compute for model training, fine-tuning,
      and inference workloads. Founded in 2012 by Stephen Balaban and Michael Balaban at the Noisebridge hackerspace
      in San Francisco's Mission District, Lambda started as a provider of deep learning workstations and servers
      before pivoting to cloud GPU services. The company's official website is https://lambda.ai (formerly
      lambdalabs.com). Lambda is a private company at Series E stage (as of May 2026), with no public filing
      obligations and no disclosed audited revenue.

      Lambda's product model is infrastructure-as-a-service at multiple tiers: On-Demand GPU Instances (single
      nodes, self-serve); 1-Click Clusters (16 to 2,000+ GPU InfiniBand-connected clusters); Private Cloud
      (single-tenant 1,000+ GPU clusters); and Superclusters (gigawatt-scale AI factories for hyperscalers and
      frontier model labs). The company also provides Lambda Stack (Kubernetes/Slurm orchestration), Lambda Chat
      (open-source model hosting), and Lambda API (programmatic cloud access). Lambda competes primarily against
      CoreWeave, Vast.ai, and the major hyperscalers (AWS, Google Cloud, Azure, OCI) for GPU cloud workloads.
      Its stated differentiation is AI-native infrastructure design, zero ingress/egress fees, InfiniBand fabric,
      and NVIDIA hardware access (including the latest B200 and GB300 NVL72 systems). Lambda holds SOC 2 Type II
      and ISO 27001 certifications and connects to cloud interconnects via AWS Direct Connect, GCP Interconnect,
      OCI FastConnect, and Azure ExpressRoute.
    claimRefs: [CO001, CO002, CO003, CO004, CO005]
    tableRefs: [TO001]
    figureRefs: [FO002]

  - id: SO-leadership
    title: Founders, Leadership, and Governance
    body: |
      Lambda was co-founded by brothers Stephen Balaban (previously CEO, now CTO) and Michael Balaban (CPO).
      Stephen Balaban is a machine learning researcher and engineer who built Lambda's technical architecture
      and led it for over 12 years. Michael Balaban has focused on product strategy. On May 4, 2026, Lambda
      announced a CEO transition: Michel Combes — a seasoned global infrastructure and telecoms operator —
      replaced Stephen Balaban as CEO, with Balaban moving to CTO. Combes brings operating experience from
      large-scale infrastructure businesses, signaling Lambda's transition toward hyperscale professional
      management. The leadership team announced on May 5, 2026 includes several recently hired executives:
      Charles Fisher (CFO, appointed February 19, 2026, previously CFO at Turo), Robert Brooks IV (Chief
      Commercial Officer), Jerry Hunter (Vice Chairman, Compute Delivery — a former AWS infrastructure leader
      and ex-Snap COO with 30+ years hyperscale experience), Leonard Speiser (COO), David Connolly (Chief Legal
      Officer), Ariel Nissan (General Counsel), Paul Zhao (Head of Product), and Collin Roe-Raymond (Chief
      Design Officer).

      The rapid leadership build-out in 2025–2026 — CFO, CEO, Vice Chairman, and other C-suite hires — is
      consistent with Series E capital deployment, IPO or strategic transaction preparation, and hyperscale
      operations maturity. John Donovan (former AT&T CEO) serves on the board or as an advisor. Key-person risk
      is concentrated on Stephen Balaban (as CTO, he owns all technical architecture) and Michel Combes (as new
      CEO, his execution capability and ramp are still unproven at Lambda's scale). Lambda has not publicly
      disclosed a board composition beyond advisor-level names. The full cap table and governance documents
      are private.
    claimRefs: [CO006, CO007, CO008, CO009, CO010, CO011]
    tableRefs: [TO002]

  - id: SO-funding
    title: Funding History and Capital Strategy
    body: |
      Lambda's funding trajectory is one of the most aggressive in the AI cloud infrastructure sector.
      The company raised $320M in a Series C in February 2024. On February 19, 2025, Lambda announced a
      $480M Series D co-led by Andra Capital and SGW, with strategic investors including NVIDIA, Andrej
      Karpathy (angel), ARK Invest, Fincadia Advisors, G Squared, IQT (In-Q-Tel), and hardware supply
      chain partners Pegatron, Supermicro, Wistron, and Wiwynn. The NVIDIA investment is particularly
      notable as it cements a strategic supplier relationship at the equity level.

      On November 18, 2025, Lambda announced a Series E of $1.5B+ led by TWG Global (Thomas Tull and
      Mark Walter) and USIT. This was one of the largest single private AI infrastructure rounds in 2025.
      Total equity raised across all rounds is approximately $2.3B+. Additionally, Lambda secured a senior
      secured credit facility: an initial facility closed in August 2025 and was upsized to $1B on
      May 7, 2026. This brings total capital (equity + debt) to approximately $3.3B+. The debt facility
      provides non-dilutive runway for data center buildout and hardware procurement without further equity
      dilution.

      Lambda has not disclosed a post-money valuation for any round, which is atypical for companies of
      this scale and likely reflects founder preference to avoid mark-to-market pressure. No secondary
      transactions or tender offers have been publicly reported.
    claimRefs: [CO012, CO013, CO014, CO015, CO016, CO017]
    tableRefs: [TO003]
    figureRefs: [FO003]

  - id: SO-products
    title: Products, Scale, and Customer Base
    body: |
      Lambda's product stack spans the full range of GPU compute delivery:

      On-Demand Instances are the entry point — single-node GPU servers available via self-serve at published
      pricing. As of May 2026: NVIDIA HGX B200 SXM6 (180GB) at $6.69/GPU/hr, H100 SXM (80GB) at $3.99/GPU/hr,
      A100 SXM (80GB) at $2.79/GPU/hr, A100 SXM (40GB) at $1.99/GPU/hr, and V100 (16GB) at $0.79/GPU/hr.
      Lambda charges zero ingress/egress fees — a competitive pricing signal versus hyperscalers.

      1-Click Clusters™ are self-serve InfiniBand-connected GPU clusters from 16 to 2,000+ GPUs with
      Kubernetes and Slurm orchestration included. Pricing for 1-Click Cluster B200 nodes: $9.86/GPU/hr
      (16 GPU), $9.36/GPU/hr (64 GPU), $8.87/GPU/hr (256+ GPU) — reflecting volume discounts at scale.

      Superclusters are custom gigawatt-scale AI factory builds for hyperscalers and frontier model labs.
      Lambda reports completing a full cluster build for a confidential "AI Hyperscaler" in 90 days — a
      key customer win demonstrating speed-to-deploy capability.

      Lambda reports 10,000+ active customers (company-stated, May 2026), four hyperscaler customers
      including Microsoft, and that its infrastructure indirectly serves "hundreds of millions of people."
      Named customers include Pika (video generation), Iambic Therapeutics (drug discovery), fal
      (open-source AI), Meshy (3D generative AI), and Genesis Therapeutics. A healthcare provider
      customer reported a 70% cost reduction using Oumi + Lambda infrastructure. Lambda has published
      20+ peer-reviewed ML papers in the past 12 months and held Platinum sponsor status at NVIDIA GTC
      2026 (March 2026).
    claimRefs: [CO018, CO019, CO020, CO021, CO022, CO023, CO024]
    tableRefs: []
    figureRefs: []

  - id: SO-milestones
    title: Milestones and Strategic Trajectory
    body: |
      Lambda's trajectory spans four phases: technical foundation (2012–2019, deep learning workstations
      and early GPU cloud), early cloud growth (2019–2023), capital acceleration (2024–2025, Series C/D/E),
      and professional management scaling (2026). Key inflection points include the February 2025 Series D
      with NVIDIA as a strategic investor — cementing the NVIDIA relationship at the equity level and
      signaling GPU supply chain security. The November 2025 Series E at $1.5B+ was the largest single
      capital event and rebranded Lambda as "The Superintelligence Cloud," targeting hyperscaler-grade
      workloads. The May 2026 CEO transition from Balaban to Combes represents the most significant
      governance change in Lambda's history.

      Lambda's technical trajectory includes: OLMo Hybrid training with Allen Institute for AI (Ai2)
      achieving 97% active training time on 512 B200 GPUs with median fault recovery of 3 minutes 42
      seconds (January 2026); Llama-3.1-70B MFU optimization from 23.83% to 50.20%; FlashAttention-4
      integration on NVIDIA Blackwell; and MLPerf Inference v6.0 participation. The $1B credit facility
      (May 7, 2026) provides runway for data center buildout without equity dilution. Lambda's strategic
      trajectory points toward: (1) hyperscaler supercluster contracts as the primary revenue driver;
      (2) continued NVIDIA supply chain differentiation via strategic relationship; (3) potential IPO or
      strategic transaction preparation given the CFO hire, CEO professionalization, and capital accumulation.
    claimRefs: [CO025, CO026, CO027, CO028, CO029, CO030]
    tableRefs: [TO004]
    figureRefs: [FO001]

