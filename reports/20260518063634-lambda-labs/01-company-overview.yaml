      missingEvidence: "Lambda has not disclosed revenue, gross margin, burn rate, EBITDA, or unit economics at any point in its history. The $2.3B+ equity raise and $3.3B+ total capital cannot be assessed against fundamentals."
      whyItMatters: "Without financials, the investment case rests on operational signals and investor brand rather than verifiable unit economics; valuation is entirely mark-to-market from the last funding round."
      diligencePath: "Request audited FY2022–FY2025 financials, management accounts, and customer concentration table under NDA."
