callouts:
  - calloutType: strength
    title: NVIDIA Strategic Partnership — Equity-Level Supply Chain Lock-in
    body: |
      NVIDIA's participation as a strategic investor in Lambda's Series D (Feb 2025) is a material
      competitive differentiator. As both hardware supplier and equity holder, NVIDIA has aligned
      incentives to ensure Lambda receives preferred access to the most constrained GPU supply
      (B200, GB300 NVL72). This relationship is difficult for pure-financial competitors (CoreWeave,
      Vast.ai) to replicate without a similar equity-alignment structure. The NVIDIA GTC 2026
      Platinum sponsorship and the announcement of Vera CPUs, Bare Metal Instances, and STX for
      Lambda Cloud further cement this roadmap partnership.
    claimRefs: [CO015, CO027]

  - calloutType: risk
    title: CEO Transition Risk — Unproven External Hire at Inflection Point
    body: |
      Michel Combes was appointed CEO in May 2026 — the most significant governance change in Lambda's
      12-year history. As a telecoms/infrastructure operator, Combes brings scalable operations experience
      but lacks Lambda's AI-native DNA. The transition occurs at a critical inflection: $3.3B+ in capital
      deployed, 10,000+ customers, and a supercluster buildout roadmap for multiple hyperscalers. Stephen
      Balaban's move to CTO preserves technical continuity, but the new CEO's execution pace relative to
      Lambda's historically engineering-driven culture poses integration risk.
    claimRefs: [CO008, CO009]

  - calloutType: risk
    title: Revenue Opacity — Full Financial Performance Unavailable
    body: |
      Lambda has not publicly disclosed revenue, gross margin, EBITDA, or burn rate at any point in its
      history. The company's $2.3B+ equity raise and $1B debt facility cannot be assessed against
      fundamental unit economics without access to private financials. Customer count (10,000+) and
      GPU pricing ($0.79–$6.69/GPU/hr) provide some triangulation, but without utilization rates or
      contract durations, the revenue estimate range is very wide (~$200M–$1B+ ARR is plausible).
      Diligence requires NDA access to audited financials.
    claimRefs: [CO030, CO031]

  - calloutType: recommendation
    title: "Priority Diligence: Validate Hyperscaler Contract Terms and Revenue Concentration"
    body: |
      Lambda's four hyperscaler customers (including Microsoft) are likely the dominant revenue
      contributors. Without public disclosure, the revenue concentration risk from these four
      customers is unknown but potentially very high. Diligence should prioritize: (1) contract
      duration and renewal terms for each hyperscaler; (2) revenue percentage from top 5 customers;
      (3) unit economics of the Supercluster product vs. 1-Click Clusters vs. On-Demand Instances.
    claimRefs: [CO022, CO023]

