callouts:
  - calloutType: insight
    title: NVIDIA Data Center Revenue as Demand Proxy — But Not the GPU Cloud TAM
    body: |
      NVIDIA's $47.5B data center segment revenue in FY2025 is frequently cited as evidence of massive
      AI infrastructure market size. However, this figure includes hardware purchases by hyperscalers
      for their own internal AI model training (Meta, Microsoft, Google) that never flows into the
      GPU cloud rental market. The rental market accessible to Lambda is the subset where end customers
      pay for GPU-hours from cloud providers, estimated at $20–60B by 2028 — 2–5x smaller than the
      NVIDIA hardware proxy implies. Investors should not equate NVIDIA's hardware revenue to Lambda's
      total addressable market.
    claimRefs: [CM006, CM021]

  - calloutType: risk
    title: Hyperscaler Counter-Build Creates Permanent Structural Competitive Pressure
    body: |
      AWS, Azure, and GCP are all expanding their GPU infrastructure aggressively, and CoreWeave IPO'd
      in March 2025 at $23B creating a well-capitalized direct competitor. Lambda's differentiation on
      pricing, InfiniBand performance, and zero-egress fees is durable in the short term but could
      compress if hyperscalers match on price and performance. Lambda's key defensible advantages are:
      NVIDIA equity relationship, speed-to-deploy for Supercluster builds, and AI-native developer
      community trust built since 2012. These are real but not permanent moats.
    claimRefs: [CM018, CM022]

  - calloutType: assumption
    title: Inference Scaling as 100x Demand Driver — Lambda's Stated Thesis
    body: |
      Lambda's May 2026 blog post explicitly claims that open-source reasoning models will drive
      "100x inference compute" demand growth, creating a secular tailwind for GPU cloud providers.
      This thesis is consistent with observable trends (o1, DeepSeek-R1, chain-of-thought reasoning
      models requiring 10–100x more inference compute per token vs. base models) but remains an
      unproven extrapolation. If reasoning model inference efficiency improves faster than demand
      grows, GPU demand could plateau. Diligence should stress-test this assumption.
    claimRefs: [CM016, CM017]

