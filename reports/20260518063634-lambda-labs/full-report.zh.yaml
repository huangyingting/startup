  - id: FI001
    title: 收入模型桥
    type: waterfall
    layout: wide
    summary: Lambda 将 GPU 利用率转化为三个定价层级的收入；集群溢价和零出站费结构，让每 GPU 小时收到的收入高于超大规模云可比项。
