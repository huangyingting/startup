  - number: 4
    title: 财务情况
    sections:
      - number: '4.1'
        title: 收入模式与货币化策略：GPU 小时、集群预留和 Private Cloud 层
        blocks:
          - type: paragraph
            body: >-
              Lambda 通过三种主要机制变现。第一，按小时定价的按需 GPU 实例——B200 SXM6 $6.69/GPU/hr、H100 SXM $3.99/GPU/hr、A100 SXM 80GB
              $2.79/GPU/hr、A100 SXM 40GB $1.99/GPU/hr、V100 $0.79/GPU/hr——服务需要灵活、无承诺访问的个人开发者和小型 ML 团队。第二，1-Click Cluster
              预留采用更高的集群价格（16-GPU B200 $9.86/GPU/hr、64-GPU $9.36/GPU/hr、256+ GPU $8.87/GPU/hr），服务运行同步分布式训练且 需要 InfiniBand
              连接的团队。集群价格明显高于按需实例，意味着打包的 InfiniBand fabric 和预留保障带来实质收入溢价。第三，Private Cloud 层为需要专用基础设施的企业买家提供 1,000+ GPU
              单租户集群，价格很可能通过企业谈判确定。Lambda 以零入站 / 出站费用区别于超大规模云厂商； 客户原本需要扣除的成本抵消被移除后，单个工作负载的实际收入会改善。

              收入确认很可能按用量（按 GPU-hour 累计），这意味着 Lambda 的收入直接绑定 GPU 利用率，而非合同 ARR。高利用率时，这种结构带来较高收入质量
              （递延收入少，使用后即时收款）；利用率波动时，收入也会更不稳定。Lambda 称拥有 10,000+ 活跃客户，并服务 4 家超大规模云厂商（包括 Microsoft）； 相比 CoreWeave
              更集中于前沿实验室的客户结构，Lambda 的客户基础更分散。没有公开收入数字。
