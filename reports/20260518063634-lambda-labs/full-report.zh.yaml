            body: >-
              Lambda 没有公开披露留存指标，包括净留存率（NRR）、总留存率（GRR）或客户流失率。从 Hacker News 帖子和 Reddit 讨论看，开发者社区情绪整体正面，客户赞赏性价比优势和 GPU
              开通便利性。不过，GPU 可用性约束——尤其在高需求时段——是反复出现的抱怨，也是有记录的开发者摩擦来源。NPS 和 CSAT 分数尚未发布。Lambda
              的按需计费模式没有最低承诺，降低了价格敏感开发者的切换成本，也带来潜在流失暴露。使用预留实例或私有云部署的企业客户面临更高切换成本，暗示留存结构分为两层：开发者账户粘性低，企业账户耐久性更高。公司没有公开队列级数据或合同续约率，这构成重大尽调缺口，需要直接进入数据室解决。
