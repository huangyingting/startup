  - number: 7
    title: 风险
    sections:
      - number: '7.1'
        title: 监管、法律与合规风险
        blocks:
          - type: paragraph
            body: >-
              Lambda Labs 在全球为企业和研究客户运营处理 AI 工作负载的 GPU
              云基础设施，因此承担多层监管义务。近期最重要的监管风险是美国《出口管理条例》（EAR）下的出口管制执法，由工业与安全局（BIS）管理。拜登时期的 AI 芯片出口规则（2023 年 10 月，2023 年 11
              月和 2025 年 1 月扩展）限制 H100 和 B200 向 Tier D 国家出口，对 Tier A 国家设置算力门槛，并要求某些超过性能门槛的 AI 训练终端用途取得许可。Lambda
              必须筛查所有客户和部署配置，覆盖实体清单限制、许可例外和性能等级门槛。违规可能导致拒绝令、每次违规最高 $1.5M 的民事罚款，以及刑事处罚。

              数据隐私是第二个主要监管栈。作为为欧盟和美国企业客户处理 AI 训练数据的云提供商，Lambda 受 GDPR、CCPA/CPRA 和各州隐私法约束。Lambda 的 SOC 2 Type II 和 ISO
              27001 认证显示控制成熟度，但与超大规模云客户签订的具体数据处理协议条款仍未披露。欧盟《AI 法案》实施（高风险 AI 系统条款于 2026 年 8 月生效）将给通用 AI
              基础设施提供商增加合规义务，可能要求符合性文档和事故报告。Lambda 截至 2026 年 5 月没有公开披露任何监管调查、诉讼或执法程序，但没有披露并不证明没有风险。
