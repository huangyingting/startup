        - 向 AI 实验室、企业和初创公司出租 GPU 算力（按需和预留），用于模型训练、微调和推理
        - GPU 实例费用、集群预留、InfiniBand 网络、AI 存储、编排
        - 通用 CPU 算力、CDN、SaaS AI 应用层（如 OpenAI API）
        - AI 实验室 CTO / 基础设施负责人、企业 ML 平台团队、初创公司创始人
        - 主市场——Lambda On-Demand、1-Click Clusters
      - - AI 工厂和超集群建设
        - 为超大规模云厂商和前沿模型实验室定制建设吉瓦级 GPU 集群
        - 硬件、网络、数据中心建设、运营、托管基础设施
        - 软件开发、模型训练服务、推理优化
        - 超大规模云厂商基础设施 VP、前沿实验室 CEO / CTO
        - 主市场——Lambda Superclusters；收入集中度高
      - - 开发者自助 GPU 租赁
        - 个人开发者、ML 研究者和小团队按用量获取 GPU
        - 按需实例费用、API 访问、存储
        - 预留容量、私有云、专用硬件
        - ML 工程师、研究者、初创公司开发团队
        - 客户数驱动项——Lambda 的 10K+ 客户；单客收入较低
      - - 现状替代方案：AWS EC2 P4/P5
        - 通过 AWS EC2 在 AWS 生态内使用 NVIDIA A100/H100 实例
        - EC2 实例费用加数据传输（出站费）、SageMaker
        - 专用 InfiniBand 网络、纯 NVIDIA GPU 访问、零出站费模式
        - 已承诺使用 AWS 的企业
        - 竞争压力——AWS 规模和生态对上 Lambda 的 AI 原生定价
      - - 现状替代方案：Azure N-series / NDv4
        - Azure 上的 NVIDIA A100/H100 实例，与 OpenAI 深度集成
        - 实例费用加出站费、Azure ML 许可、支持
        - 与 Lambda 等价的 InfiniBand 网络、零出站费定价
        - Microsoft 生态内企业、OpenAI API 客户
        - 竞争压力——Azure 与 OpenAI 的关系是独特护城河
      - - 现状替代方案：Google Cloud A3/TPU
        - NVIDIA H100（A3 VMs）和自有 TPU pods，面向 TensorFlow 工作负载
        - 实例费用、TPU pod 预留、Vertex AI
        - NVIDIA GPU 对等性、InfiniBand、非 TensorFlow 工作负载
        - 已在 GCP 上的 ML 团队、Google AI 研究生态
        - 部分替代——TPU 不能与 Lambda 的 NVIDIA 技术栈互换
      - - 现状替代方案：本地 GPU 服务器
        - 直接购买 NVIDIA DGX 系统、SuperPOD 或 OEM 服务器
        - 前期资本开支（每个集群 $5–30M+）、电力、托管机房、人员
        - 弹性、快速采购、托管运营、InfiniBand 网络
        - 有多年 AI 路线图和资本开支预算的企业
        - 部分替代——CapEx 与 OpEx 取舍；Lambda 以灵活性竞争
      - - 相邻市场：主权和国家级 AI 基础设施
        - 政府资助的国家级 AI 计算集群，用于国防、研究和公共部门
        - 资本补助、政府采购预算
        - 商业云经济性
        - 国防部门、国家研究机构
        - 新兴相邻市场——IQT 投资方关系显示该细分可触达
    notes: >-
      市场边界限定在面向 AI 工作负载的 GPU 算力供给。Lambda 的客户侧产品覆盖细分 1–3；Supercluster 建设则把业务延伸到面向超大规模云厂商的细分 2。排除支出边界反映 Lambda 截至
      2026-05-18 已发布的产品范围。替代方案分类依据公开定价和客户细分分析。
    claimRefs:
