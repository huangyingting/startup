              tone: negative
        - label: 高影响
          values:
            - label: 监管执法（违反 EAR）；诉讼
              tone: warning
            - label: GPU 价格崩跌；信贷额度契约违约；安全事件
              tone: negative
            - label: 客户集中度流失；偿债压力
              tone: negative
        - label: 中等影响
          values:
            - label: 不符合 EU AI Act；反垄断审查
              tone: neutral
            - label: 人才流失；电力许可延迟；API/DDoS 中断
              tone: warning
            - label: CoreWeave 竞争性价格压力；GDPR/CCPA 合规缺口
              tone: warning
  - id: FR002
    title: 风险传导图 —— Lambda 风险如何扩散
    type: dag
    layout: wide
    summary: 因果风险传播图展示 Lambda 在供应、竞争和财务层面的主要风险，如何层层传导到收入冲击和估值压缩。
    data:
      nodes:
        - id: nvidia_supply
          label: NVIDIA GPU 供应中断
          detail: 优先分配不保证；超大规模云厂商优先；H100/B200 分配受限
        - id: hyperscaler_buildout
          label: 超大规模云厂商自建
          detail: AWS Trainium、Azure B200 容量、GCP TPU/H100、Oracle OCI —— 都在建设竞争性 GPU 云
        - id: coreweave_competition
          label: CoreWeave 竞争压力
          detail: 2025 年 3 月 IPO，估值约 $23B；OpenAI 是锚定客户；已融资 $8.65B；产品组合相近
        - id: ceo_transition
          label: CEO 交接执行风险
          detail: Michel Combes 2026 年 5 月新上任；此前无 AI 云背景；Stephen Balaban 转任 CTO
        - id: gpu_price_decline
          label: GPU 价格商品化
          detail: H100 从 $8/小时降至 $2-3/小时；B200 走势不确定；2026-2027 年可能供给过剩
        - id: debt_service
          label: $1B 信贷额度义务
          detail: 高级担保债务；契约未知；若收入不及预期，存在再融资风险
        - id: customer_concentration
          label: 超大规模云厂商收入集中
          detail: 4 家超大规模云厂商占收入比例未知；单一客户退出会制造断崖风险
        - id: export_controls
          label: 美国 AI 芯片出口管制
          detail: BIS EAR 限制 H100/B200 出口；Lambda 国际客户面临风险
        - id: power_permitting
          label: 电力与许可延迟
          detail: 吉瓦级扩张需要公用事业合同和多年许可
        - id: talent_risk
          label: 人才招聘风险
          detail: ML / 系统工程师市场竞争激烈；CEO 交接可能传递不稳定信号
        - id: revenue_impact
          label: 收入冲击
          detail: 客户流失、价格下降或产能不可用，会直接减少收入
        - id: valuation_compression
          label: 估值压缩
          detail: 收入下降 + 债务压力上升 → Series F / IPO 估值降低
      edges:
        - from: nvidia_supply
          to: revenue_impact
          label: 产能约束限制可售 GPU 小时
        - from: nvidia_supply
          to: gpu_price_decline
          label: 供给扩张压低现货价格
        - from: hyperscaler_buildout
          to: customer_concentration
          label: 超大规模云厂商将工作负载迁回自有基础设施
        - from: hyperscaler_buildout
          to: gpu_price_decline
          label: 超大规模云厂商规模压缩 GPU 现货价格
        - from: coreweave_competition
          to: customer_concentration
          label: CoreWeave 争夺同一批企业 AI 客户
        - from: coreweave_competition
          to: gpu_price_decline
          label: 竞争性定价压低 GPU 小时费率
        - from: ceo_transition
          to: talent_risk
          label: 领导层不确定性触发工程师流失
        - from: ceo_transition
          to: customer_concentration
          label: 新 CEO 缺少 AI 云关系；超大规模云厂商有流失风险
        - from: gpu_price_decline
          to: revenue_impact
          label: 固定成本基础上，每 GPU 小时收入下降
        - from: gpu_price_decline
          to: debt_service
          label: 收入下滑威胁利息覆盖率
        - from: customer_concentration
          to: revenue_impact
          label: 超大规模云厂商退出会立刻造成收入断崖
        - from: debt_service
          to: valuation_compression
          label: 契约压力向资本市场传递财务困境信号
        - from: revenue_impact
          to: valuation_compression
          label: 收入缺口拉低 Series F / IPO 估值锚
        - from: export_controls
          to: customer_concentration
          label: 国际客户限制压缩可服务市场
        - from: power_permitting
          to: revenue_impact
          label: 产能延迟减少可售 GPU 小时
