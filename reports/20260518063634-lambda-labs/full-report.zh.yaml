      - number: '7.3'
        title: 合作伙伴、供应链与技术依赖风险
        blocks:
          - type: paragraph
            body: >-
              Lambda 的供应链风险主要来自对 NVIDIA GPU 硬件近乎完全的依赖。Lambda 的所有主要产品——B200 1-Click Clusters、H100 On-Demand
              Instances、A100 Private Cloud、GH200 研究实例——都运行在 NVIDIA GPU 上。NVIDIA 控制 GPU 供应分配和定价，优先分配会先流向超大规模云厂商和大型
              OEM，再轮到 Lambda 这样的纯云提供商。2023–2024 年 H100 供应紧张期间，现货价格曾达到 $8/hr，随后在供应正常化后降至 $2–3/hr。B200
              世代引入相似动态：分配优先级按采购量偏向 NVIDIA 最大客户，使 Lambda 与 AWS、Azure、GCP 和 Oracle 争夺同一批硬件。NVIDIA 的 Series D
              投资带来一定关系利益，但并不在合同上保证优先分配。

              超大规模云竞争威胁放大了供应链风险。AWS（Trainium、P4/P5 实例）、Azure（拥有 B200 访问权的 NVIDIA 优选云合作伙伴）、GCP（TPU pods 加 H100/A100 实例）和
              Oracle（积极扩张 OCI GPU 容量）都在建设专用 AI 云基础设施，并捆绑存储、网络和 ML 工具，Lambda 很难轻易复制。CoreWeave 2025 年 3 月以约 $23B 估值 IPO，为纯
              AI 云建立了公开市场参照，但 CoreWeave 与 OpenAI 的紧密关系和 $8.65B 融资带来不对称竞争优势。技术换代风险又叠加供应链问题：GPU 世代每 12 至 18
              个月轮换，如果需求动态在资本部署和有用寿命之间发生变化，Lambda 通过融资持有的 GPU 机队会面临搁浅资本风险。
