      - number: '4.3'
        title: 资本充足性：股权融资、信贷额度，以及对 GPU 资本开支的投放
        blocks:
          - type: paragraph
            body: >-
              Lambda 已累计完成约 $2.3 billion 股权融资，包括 Series D（$480M，2025 年 2 月）、Series E（$1.5B+，2025 年 11 月）及更早轮次； 投资方包括
              NVIDIA、Andrej Karpathy、ARK Invest、IQT、TWG Global 和 USIT。Series D 还纳入战略制造伙伴 Pegatron、Supermicro、Wistron 和
              Wiwynn，显示公司用一体化方式为 GPU 供应链融资。2026 年 5 月，Lambda 又获得 $1 billion 优先担保信贷额度，使可用总资本达到约 $3.3 billion。该信贷额度是 GPU
              云提供商常见的优先担保工具——用于为 GPU 采购融资，同时避免进一步稀释股东——但利率、契约结构和提款条件 未公开披露。按每台 H100 8-GPU 服务器约 $250,000– $350,000
              硬件成本计算，Lambda 的总资本基础（$3.3B+）理论上可支持采购 9,400–13,200 台 H100 服务器（75,000–105,000 个 H100
              GPU），前提是全部投入硬件。实际中，Lambda 还必须用同一资金池支付数据中心租赁、电力基础设施和运营 费用，因此 GPU 采购能力更低。Lambda 10,000+ 客户和 4
              家超大规模云厂商客户表明，需求不是资本约束；真正卡住的是 GPU 采购和数据中心容量部署速度。 考虑股权和信贷基础，未来 12–24
              个月资本充足性看起来足够，但更长期跑道取决于利用率、收入增长和信贷额度再融资条件。
