      - number: '2.3'
        title: 买方分层与采用动态
        blocks:
          - type: paragraph
            body: |
              Lambda 的买方分层对应着结构性不同的采购、预算和采用模式。

              Segment 1 — AI 实验室与前沿模型公司：买方是 OpenAI、Anthropic、Google DeepMind、Meta AI 等公司的
              CTO / 基础设施负责人。预算通常是专门的 ML 基础设施拨款，每年 $50M–$1B+。采用触发点是需要超过超大规模云厂商短期内
              可靠供给能力的 GPU 容量。Lambda 对这一分部的价值主张：快速供给、与 NVIDIA 硬件获取同等、InfiniBand 性能，以及不依赖
              单一超大规模云厂商。该分部驱动 Supercluster 合同需求。

              Segment 2 — 企业 AI 团队：买方是金融、医疗、媒体和科技企业的 AI/ML 平台负责人。预算来自 IT 基础设施或创新预算
              （每年 $1M–$50M）。采用触发点是 GPU 算力 ROI 可被证明（通常是成本相对 AWS 或 Azure 更低，或在超大规模云厂商存在配额
              等待名单时仍可用）。Lambda 的价值主张：公开的低开销价格（如 H100 $3.99/GPU/hr、不收出站费）、自助式 1-Click Clusters，
              以及满足重视安全企业买家的 SOC 2 / ISO 27001 合规。

              Segment 3 — AI 初创公司与开发者：买方是个人工程师、研究团队和 ML 初创公司。预算较小（每年 $10K–$500K）。采用触发点
              是成本和可用性。Lambda 的开发者信号强：Andrej Karpathy 的天使投资提供可信度，Lambda Chat 和 Lambda API 提供入口，
              深度学习社区自 2012 年起就在使用 Lambda 硬件。该分部客户数很大（10,000+ 活跃客户），但收入占比可能较小。

              Segment 4 — 超大规模云厂商与基础设施运营商：买方是 Microsoft、Meta 等公司的供应链和云基础设施 VP。预算来自
              数十亿美元级资本计划。采用触发点是自身建设 GPU 基础设施速度不够快。Lambda 的价值主张：90 天 supercluster 建设能力
              （已有案例）和 NVIDIA 供应链获取。该分部客户数少（4 家超大规模云厂商），但很可能主导收入。
