            body: >-
              Lambda Labs 已经拼出超过 $3.3B 的资本结构（包括 Series A 到 Series E 的 $2.3B+ 股权融资，以及 $1B 高级有担保信贷额度），用于建设吉瓦级 GPU 原生 AI
              云。核心投资逻辑建立在五个支柱上：NVIDIA 股权合作带来供应优先级和路线图可见度；10,000+ 客户基础由四家超大规模云厂商和 Microsoft 锚定；全栈 GPU 差异化（InfiniBand
              网络结构、Lambda Stack、1-Click Clusters）在裸金属租赁市场之上创造切换成本；受 LLM 训练和推理工作负载加速驱动，可服务市场到 2028 年迈向 $50B+；Series E
              定价相对 CoreWeave 2025 年 3 月以 10x 收入倍数上市的公开市场可比，看起来合理。

              反向逻辑建立在五个结构性风险上。第一，超大规模云厂商自建：AWS、Azure、GCP 都在大举投资自有 GPU 容量，可能降低对 Lambda 等第三方云提供商的依赖。第二，CEO 交接：2026 年 5 月任命
              Michel Combes——一位经验丰富但没有 AI 云领域背景的电信基础设施运营者——在关键扩张阶段引入执行不确定性。第三，GPU 现货价格压缩：H100 按需价格已较峰值下跌约
              70%，继续压缩会威胁单位经济性。第四，资本结构杠杆：$1B 信贷额度的契约条款未披露，形成会放大收入波动的固定成本义务。第五，NRR 不透明：Lambda
              没有披露客户净留存率或头部客户集中度，遮蔽了收入基础的真实耐久性。
