  - id: FU001
    title: 客户旅程图
    titleSlug: customer-journey-map
    type: journey-map
    insight: Lambda 的客户旅程可以靠自助配置，在几分钟内从认知走到首个 GPU 工作负载；但从开发者升级为企业级 Supercluster 客户，需要数月的用量扩张和关系经营，标杆客户提供外部最可信的证明。
    data:
      items:
        - id: stage-awareness
          label: 认知
          actor: 开发者 / ML 工程师
          description: >-
            客户通过开发者社区渠道发现 Lambda —— Hacker News、Reddit r/LocalLLaMA、Twitter/X 帖子，或同行推荐。企业买家可能通过行业会议露出、Lambda
            博客报道，或开源合作可见度（OLMo、Ollama）接触 Lambda。
          channels:
            - Hacker News / Reddit
            - Lambda 博客
            - 开发者 Twitter/X
            - 开源社区
        - id: stage-trial
          label: 试用与评估
          actor: 开发者 / ML 工程师
          description: 自助创建账号，无最低承诺。开发者开通按需 GPU 实例，跑基准测试或第一个模型，并把性价比与 AWS、Azure 或 CoreWeave 替代方案比较。
          channels:
            - lambda.ai 自助门户
            - Lambda 文档
            - 社区基准测试
        - id: stage-activation
          label: 首个生产工作负载
          actor: 开发者 / 初创 ML 团队
          description: 客户在 Lambda 按需 GPU 上跑首个生产或周期性训练工作负载。配置几分钟内完成；第一项计算任务通常在账号创建当天就能运行。
          channels:
            - 按需 GPU 门户
            - Lambda REST API
        - id: stage-adoption
          label: 扩展到集群
          actor: 成长期 ML 团队
          description: >-
            工作负载规模上来后，客户迁移到 1-Click Clusters，跑多 GPU 分布式训练。该层级引入 InfiniBand 连接的 GPU 集群，以及 Lambda 面向 16–512 块 GPU
            规模优化的网络基础设施。
          channels:
            - 1-Click Cluster 门户
            - Lambda 支持
        - id: stage-expansion
          label: 企业级扩张
          actor: 企业 / 超大规模云厂商
          description: 高价值客户迁移到预留实例、Private Cloud 或专属 Supercluster 部署。该层级意味着更长期承诺、专用基础设施和客户经理对接。
          channels:
            - 预留容量门户
            - 企业销售团队
            - Supercluster 项目
        - id: stage-advocacy
          label: 标杆客户
          actor: 企业 / 生产客户
          description: 取得显著成果的客户（Oumi：成本降低 70%；Pika：大规模视频生成）会成为标杆客户，通过案例研究和合作伙伴关系，为 Lambda 的销售管道和开发者社区信誉背书。
          channels:
            - Lambda 客户案例
            - 新闻稿
            - 合作博客文章
    claimRefs:
      - CU001
      - CU034
      - CU038
      - CU040
    sourceRefs:
