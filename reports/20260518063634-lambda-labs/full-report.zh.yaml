          tone: warning
        - id: power_dc
          label: 电力与数据中心成本
          detail: 电力 / 冷却约 ~$100–200/GPU/month + DC 租赁约 ~$100–200/month；按设施而变。
          tone: warning
        - id: total_cogs
          label: 估计总 COGS
          detail: 硬件折旧、电力和数据中心成本合计约 ~$600–1,200/GPU/month。
          tone: warning
        - id: demand_revenue
          label: 80% 利用率下的按需收入
          detail: H100 按 $3.99/hr × 24hr × 30d × 0.80 = 约 ~$2,312/GPU/month。
          tone: positive
        - id: cluster_premium
          label: 集群预留溢价
          detail: 1-Click Cluster B200 费率为 $8.87–9.86/GPU/hr，相比按需模式，每块预留 GPU 可产生更高总收入。
          tone: positive
        - id: gross_margin
          label: 估计毛利率
          detail: 基于三角测算的 COGS 和公开定价，H100 GPU 在 80% 利用率下约 ~48–74%。
          tone: positive
        - id: opex_interest
          label: Opex + 信贷利息（未知）
          detail: 运营费用和信贷额度利息成本均未公开披露。
          tone: negative
        - id: net_margin
          label: 净利率（未知）
          detail: 净盈利能力完全未公开；没有损益表数据无法建模。
          tone: negative
      edges:
