      - number: '4.4'
        title: 财务缺口、尽调障碍和财务结论
        blocks:
          - type: paragraph
            body: >-
              Lambda
              是私人公司，没有披露财务报表的法律义务，也没有主动披露。因此，财务章节在投资承销中存在重大缺口。以下事实均无公开数据：收入（总额、按产品线、按客户层级）、毛利率与收入成本、运营费用（R&D、S&G&A、员工成本）、EBITDA、净利润、自由现金流、现金及现金等价物、烧钱速度、现金跑道、信贷额度契约条款，以及
              GPU 利用率。公开记录能支撑的只有定价模型、客户数量、融资历史，以及 CoreWeave IPO 文件给出的 GPU 云财务通用参照。CoreWeave 的 S-1
              招股说明书和早期上市公司文件（ir.coreweave.com）是最接近的公开可比；NVIDIA 年度报告和 GPU 价格表提供成本侧输入，可用于三角估算。财务结论是：Lambda
              的商业模式在规模化后经济性有吸引力（GPU 云毛利率约 40–60%），资本基础相对于阶段足够大，10,000+
              客户分散度也是正面信号。核心尽调阻碍是没有任何利润表或资产负债表数据。潜在投资者没有私有数据室访问权限，就无法完成财务分析。资本密集风险真实存在：一旦 GPU 利用率明显下滑，$1B
              信贷额度的固定利息支出会压迫现金流。大额股权融资也带来稀释风险，但总流通股数未知。
