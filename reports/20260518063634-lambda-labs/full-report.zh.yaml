  - id: TP004
    title: 护城河耐久度与竞争风险登记表
    columns:
      - 护城河因素
      - Lambda 优势
      - 主要威胁 / 竞争对手
      - 趋势
      - 尽调核验事项
    rows:
      - - 定价透明与零出站费用
        - 公开价目表叠加零出站费用，消除训练工作负载的成本不确定性
        - Vast.ai 竞价定价；CoreWeave 面向大客户的谈判费率
        - 超大规模云厂商出站费用仍未调整，该优势在增强
        - 核实零出站费用政策是否有合同保障；检查企业合同例外
      - - NVIDIA 硬件获取与时间窗口
        - 较早拿到 Blackwell B200/GB300 NVL72；参与 MLPerf v6.0 Blackwell Ultra 基准贡献
        - CoreWeave（Platinum ClusterMAX；同等 NVIDIA 资源）；AWS/Azure（同为 NVIDIA 合作伙伴）
        - 更多供应商同步拿到 NVIDIA 硬件，优势在被压缩
        - 评估 Lambda 在 NVIDIA GPU 供应分配中的层级，相对 CoreWeave 和超大规模云厂商处于什么位置
      - - ML 研究产出与开发者可信度
        - 20+ 篇同行评审论文；OLMo Hybrid 97% 训练正常运行时间；FlashAttention-4；MFU 改进
        - CoreWeave（ML 研究产出有限）；超大规模云厂商（研究实验室独立于计算品牌）
        - 优势在增强；Lambda 正在切出独特的研究基础设施身份
        - 跟踪论文引用、开发者情绪，以及 Lambda 产出开源成果的采用情况
      - - InfiniBand 集群基础设施
        - 1-Click Clusters 采用带 SHARP 的 NVIDIA Quantum-2；公开定价支持 16–2,000+ GPU 规模
        - CoreWeave（Platinum ClusterMAX InfiniBand 集群）；AWS EFA；Azure InfiniBand HPC
        - 中性；大型训练的行业标准，仅靠这一点难以形成持久差异化
        - 以同等 H100/B200 集群规模，对比 Lambda 与 CoreWeave 的 InfiniBand 性能
      - - 客户基础广度与超大规模云厂商关系
        - 10,000+ 客户，包括 4 家超大规模云厂商和 Microsoft；AI 初创客户基础多元
        - CoreWeave（OpenAI/Microsoft 锚定客户；集中但价值高）；超大规模云厂商（既有企业客户基础）
        - Lambda 客户数量更广，但在顶级前沿实验室层面的深度较弱
        - 量化收入集中度：前 10 大客户占比、超大规模云厂商贡献、流失指标
      - - 资本与资产负债表
        - $2.3B+ 股权融资；$1B 信贷额度（May 2026）；Series E $1.5B+（Nov 2025）
        - CoreWeave（已融资 $8.65B+；上市公司资产负债表）；超大规模云厂商（万亿美元级 capex）
        - CoreWeave IPO 后、超大规模云厂商 capex 扩张后，相对优势在减弱
        - 评估 $1B 信贷额度和 Series E 资金转化为 GPU 库存的部署时间表
