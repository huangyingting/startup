      - number: '7.4'
        title: 人才、执行与治理风险
        blocks:
          - type: paragraph
            body: >-
              Lambda 当前画像中最重要的人才风险，是 2026 年 5 月 CEO 从联合创始人 Stephen Balaban 交接给 Michel Combes；Combes
              曾是全球电信基础设施运营者（AT&T、SoftBank）。Combes 带来显著的企业运营和财务纪律，但加入时点正处关键拐点：Lambda 正在部署吉瓦级 AI 工厂、整合 10,000+ 客户，并管理含
              $1B+ 债务的复杂资本结构。AI 基础设施的运营直觉——GPU 采购周期、集群可靠性工程、MLPerf 竞争定位——不容易从电信基础设施迁移而来，且 Combes 没有公开记录的 AI 云背景。Stephen
              Balaban 转任 CTO，保留了技术领导连续性；但任何 CEO 交接都会系统性降低执行质量，尤其是在超大规模云合同重新谈判周期。

              Lambda 还面临 ML 工程师、系统工程师和数据中心运营人员的超竞争人才市场风险。Lambda 文化强调招聘杰出工程师（20+ 论文发表和 MLPerf
              基准领先可作佐证），但在未披露员工数或流失数据的情况下，投资者无法评估招聘速度或关键人暴露。CFO Charles Fisher 于 2026 年 2 月加入——距 CEO
              交接仅三个月——使高管层同时经历学习曲线。治理风险低于典型初创公司（联合创始人留任、职业管理层到位、Series E 董事会结构），但私人公司治理不透明意味着董事会构成、投票协议和创始人控制条款均未披露。
