      - number: '2.4'
        title: 增长驱动与约束
        blocks:
          - type: paragraph
            body: |
              AI GPU 云市场拥有异常强的增长顺风，但也面临数个限制供给侧扩张的实质性结构约束。

              主要增长驱动：（1）AI 模型扩展律——尽管前沿实验室的训练计算正在趋于平台期，按 Lambda 自身分析，推理计算每一代会放大
              100x（引用 DeepSeek-R1 等开源推理模型）。这会带来持续且增长的推理 GPU 容量需求。（2）企业 AI 采用——McKinsey 2024
              State of AI 调查显示，65%+ 企业已经常规使用生成式 AI，投资预计还会增加。企业 ML 团队需要独立于通用云的专用 GPU 基础设施。
              （3）开源模型扩散——Llama-3、DeepSeek、Mistral 等模型需要 GPU 算力才能规模化服务；Lambda Chat 和 Lambda API 直接面向
              该市场。（4）NVIDIA GPU 供应扩张——NVIDIA Blackwell（B200、GB300）爬坡提高总可用供给，最先获取新硬件世代的云提供商会受益。

              主要约束：（1）GPU 供应稀缺——NVIDIA 仍是 AI 训练 GPU 的近乎垄断供应商；供应部分通过战略关系分配（Lambda 的股权绑定是优势）。
              （2）电力和地产——建设吉瓦级 Tier 4 数据中心需要多年；土地、许可和公用事业互联都是瓶颈。（3）资本密集——单个 256+ H100
              GPU 集群仅硬件就需 $10M+；建设 10,000+ GPU 的 supercluster 需要 $500M+ 资本开支，意味着仍要依赖大额融资或债务额度。
              （4）超大规模云竞争——AWS、Azure 和 GCP 都在激进扩张 GPU 容量；它们的规模、客户关系和软件生态优势，为企业买家构成持久在位者护城河。
            claimRefs:
