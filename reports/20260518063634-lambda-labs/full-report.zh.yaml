      - number: '3.3'
        title: 定价、包装与合规：Lambda 的结构性优势和仍然存在的缺口
        blocks:
          - type: paragraph
            body: >-
              Lambda 的 H100 SXM $3.99/GPU/hr、B200 SXM6 $6.69/GPU/hr 都是公开标价，并且不收出站费；这是有意为之的透明度打法，与 CoreWeave 的联系销售报价模式和
              AWS 复杂的按需 + 出站费结构形成对照。零出站费政策对搬运大数据集的训练工作负载构成实质成本优势：在 AWS 和 Azure 上，出站费可能让数据密集型流水线的有效计算成本增加 5–15%，Lambda
              则不收费。Vast.ai 现货价格在批处理任务上可能低于 Lambda—— 估计 H100 现货为 $2.50–4.00/GPU/hr，而 Lambda 按需价为 $3.99——但没有 Lambda 提供的
              InfiniBand 骨干网、可用性 SLA 或合规 基础设施。Lambda 持有 SOC 2 Type II 和 ISO 27001 认证，达到企业基线要求。不过，Lambda 未公开列出
              HIPAA、FedRAMP 或 GovCloud 认证； 医疗、政府、金融服务等受监管企业买家可能需要这些认证，而 AWS 和 Azure 三者皆有。Google Cloud 还拥有 Lambda 无法提供的
              TPU v5 硬件， 对为 Google ML 技术栈优化的团队构成差异。Lambda 的 1-Click Clusters 可从 16 个扩展到 2,000+ 个 NVIDIA B200 或 H100
