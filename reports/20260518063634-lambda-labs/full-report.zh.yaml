              - CM021
          - type: callout
            title: 超大规模云厂商自建，造成永久性的结构竞争压力
            body: |
              AWS、Azure 和 GCP 都在激进扩张 GPU 基础设施；CoreWeave 2025 年 3 月以 $23B 估值 IPO，成为资本充足的直接竞争者。Lambda 在价格、
              InfiniBand 性能和零出站费上的差异化，短期内有韧性；但如果超大规模云厂商在价格和性能上跟进，差异可能被压缩。Lambda 的关键可防守
              优势是：NVIDIA 股权关系、Supercluster 建设速度，以及自 2012 年积累的 AI 原生开发者社区信任。这些优势真实存在，但不是永久护城河。
            calloutType: risk
            claimRefs:
              - CM018
              - CM022
          - type: callout
            title: 推理扩展作为 100x 需求驱动——Lambda 的公开论点
            body: |
              Lambda 2026 年 5 月博客明确称，开源推理模型会推动「100x inference compute」需求增长，为 GPU 云提供商带来长期顺风。该论点与可观察
              趋势一致（o1、DeepSeek-R1、思维链推理模型每 token 需要的推理计算比基础模型高 10–100 倍），但仍是未经验证的
              外推。如果推理模型效率提升快于需求增长，GPU 需求可能进入平台期。尽调应压力测试这一假设。
