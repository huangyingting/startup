      - number: '8.4'
        title: 投资逻辑破裂条件与否决标准
        blocks:
          - type: paragraph
            body: >-
              Lambda Labs 的投资逻辑建立在一组赋能假设上；一旦这些假设被破坏，回报前景会被根本削弱，并应触发退出或大幅减仓。报告识别了五个具体否决触发器：

              第一，NVIDIA GPU 分配丧失或降级：如果 NVIDIA 将 Lambda 的优先分配降至承诺采购量的 50% 以下，Lambda 的供应优势——其价值主张的基础差异化——就会崩塌。该项通过 NVIDIA
              季度财报中关于客户分配的评论和 Lambda 采购公告监测。

              第二，超大规模云客户流失：四家超大规模云客户中若有两家或更多在任意 12 个月窗口内离开，说明超大规模云需求逻辑已经结构性破裂。

              第三，GPU 现货价格崩塌：H100 现货价格连续 90+ 天低于 $0.75/GPU-hr，说明 GPU 算力出现结构性商品化，会把 Lambda 的单位利润压到即便拥有差异化功能也难以持续的水平以下。

              第四，CEO 或 CTO 离任：如果 Michel Combes 或 Stephen Balaban 在 2026 年 5 月领导层交接后的 12
              个月内离开，公司将面临叠加的领导不稳定，而这种不稳定在历史上与客户和人才流失相关。

              第五，信贷契约违约：任何 $1B 信贷额度契约违约都会触发贷款人救济，可能包括加速偿还，并实质损害 Lambda 为 GPU 采购和运营承诺融资的能力。
            claimRefs:
              - CV034
              - CV035
              - CV036
              - CV037
              - CV038
              - CV039
              - CV040
          - type: table
            tableRef: TV005
            claimRefs:
              - CV034
              - CV035
              - CV036
              - CV037
              - CV038
      - number: '8.5'
        title: 退出准备度与最终尽调要求
        blocks:
          - type: paragraph
            body: >-
              Lambda Labs 的退出准备度取决于能否实现 $1B+ ARR，并证明毛利轨迹；这是 2027–2029 年窗口内具备可信 IPO 候选资格的前提。按 2026 年中估计 $400–800M ARR
              计算，假设继续增长，Lambda 距离 IPO 准备就绪约 2–3 年。战略收购方范围包括希望直接拥有优先 GPU 供应的超大规模云厂商、寻求 AI
              云能力的大型企业基础设施公司（Oracle、IBM），以及有长期基础设施偏好的主权财富基金。

              在按当前 Series E 条款投入资本前，五项尽调要求不可或缺。第一且最关键：由 CFO Charles Fisher 确认 2025 ARR 和 2026
              指引，因为整个估值框架依赖这一单一数据点。第二：按分层拆分的客户 NRR——尤其区分超大规模云和企业长尾队列——以评估 Lambda 的 10,000+
              客户基础究竟驱动耐久收入，还是脆弱的现货市场活动。第三：完整信贷额度契约条款，用于独立建模流动性风险并校准投资逻辑破裂触发器。第四：前 10
              大客户集中度和平均合同期限，用绝对收入口径量化超大规模云客户流失风险。第五：来自 CFO 的 GPU 资本开支管线和折旧计划，这是建模现金消耗、搁浅资产风险，以及从 B200 到 B300 GPU
              世代过渡期间所需资本的必要输入。

              这五项，加上 CEO 100 天计划和 CFO 融入证据，构成在当前条款下以合理信心承销 Lambda 所需的最低信息集。
            claimRefs:
              - CV041
              - CV042
              - CV043
              - CV044
              - CV045
