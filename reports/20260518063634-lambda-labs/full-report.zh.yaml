      - number: '1.2'
        title: 创始人、领导层与治理
        blocks:
          - type: paragraph
            body: |
              Lambda 由 Stephen Balaban（此前任 CEO，现任 CTO）和 Michael Balaban（CPO）兄弟共同创立。
              Stephen Balaban 是机器学习研究者和工程师，搭建了 Lambda 的技术架构，并主导公司超过 12 年。
              Michael Balaban 负责产品战略。2026 年 5 月 4 日，Lambda 宣布 CEO 交接：拥有全球基础设施和电信运营
              经验的 Michel Combes 接替 Stephen Balaban 出任 CEO，Balaban 转任 CTO。Combes 的大型基础设施业务
              运营经验，意味着 Lambda 正从创业者驱动转向超大规模运营的职业化管理。2026 年 5 月 5 日公布的领导团队
              包含多名近期加入的高管：Charles Fisher（CFO，2026 年 2 月 19 日任命，此前任 Turo CFO）、Robert
              Brooks IV（首席商务官）、Jerry Hunter（副董事长，Compute Delivery——前 AWS 基础设施负责人、前 Snap
              COO，拥有 30+ 年超大规模经验）、Leonard Speiser（COO）、David Connolly（首席法务官）、Ariel Nissan
              （总法律顾问）、Paul Zhao（产品负责人）和 Collin Roe-Raymond（首席设计官）。

              2025–2026 年，Lambda 快速补齐 CFO、CEO、副董事长和其他 C-suite 岗位；这与 Series E 资本投放、IPO
              或战略交易准备，以及超大规模运营成熟度提升一致。John Donovan（前 AT&T CEO）担任董事会成员或顾问。
              关键人物风险集中在 Stephen Balaban（作为 CTO 掌握全部技术架构）和 Michel Combes（作为新 CEO，其在
              Lambda 规模下的执行能力和爬坡仍未验证）。除顾问级姓名外，Lambda 尚未公开董事会构成。完整股权结构表
              和治理文件仍属私有。
