chapters:
  - number: 1
    title: 公司概况
    sections:
      - number: '1.1'
        title: 公司身份与使命
        blocks:
          - type: paragraph
            body: >
              Lambda 总部位于 San Francisco, CA，以 "The Superintelligence Cloud" 为定位，是一家 AI 优先的 GPU
              云基础设施提供商，为模型训练、微调和推理工作负载提供按需与预留 GPU 算力。公司 2012 年由 Stephen Balaban 和 Michael Balaban 在 San Francisco
              Mission District 的 Noisebridge 黑客空间 创立，最初销售深度学习工作站和服务器，随后转向云端 GPU 服务。公司官网为 https://lambda.ai （此前为
              lambdalabs.com）。截至 2026 年 5 月，Lambda 仍是 Series E 阶段私营公司，没有公开披露义务， 也未披露经审计收入。

              Lambda 的产品模型是多层级基础设施即服务：On-Demand GPU Instances（单节点、自助式）；1-Click Clusters（16 到 2,000+ 个 GPU 的 InfiniBand
              连接集群）；Private Cloud（单租户 1,000+ GPU 集群）； 以及 Superclusters（面向超大规模云厂商和前沿模型实验室的吉瓦级 AI 工厂）。公司还提供 Lambda Stack
              （Kubernetes/Slurm 编排）、Lambda Chat（开源模型托管）和 Lambda API（程序化云访问）。Lambda 主要 与 CoreWeave、Vast.ai
              以及主要超大规模云厂商（AWS、Google Cloud、Azure、OCI）争夺 GPU 云工作负载。 它声称的差异化在于 AI 原生基础设施设计、零入站 / 出站费用、InfiniBand fabric，以及
              NVIDIA 硬件获取 （包括最新 B200 和 GB300 NVL72 系统）。Lambda 持有 SOC 2 Type II 和 ISO 27001 认证，并通过 AWS Direct Connect、GCP
              Interconnect、OCI FastConnect 和 Azure ExpressRoute 接入云互联。
