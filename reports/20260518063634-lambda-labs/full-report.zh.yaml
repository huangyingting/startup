      - number: '4.2'
        title: 单位经济模型与成本结构：GPU 折旧、电力和毛利率估算
        blocks:
          - type: paragraph
            body: >-
              GPU 云单位经济模型由三大成本桶驱动：GPU 硬件折旧、电力与制冷、数据中心租赁 / 网络。一台 NVIDIA H100 服务器（8 个 GPU）批发成本约 $250,000–$350,000；按 3–5
              年折旧，约等于每 GPU 每月 $350–1,000 硬件成本。按 Lambda H100 按需价格 $3.99/GPU/hr、平均利用率 80% 计算， 单个 H100 每月产生约 $2,300
              总收入。对照估计每月 ~$600–1,000 的总 COGS（硬件折旧 + 电力 + 数据中心），单 GPU 毛贡献利润率约为 50–70%； 这与行业分析师对规模化 GPU 云提供商采用的 40–60%
              毛利率估计大体一致。不过，这些只是由公开 GPU 价格和行业成本基准推导出的估计，并非 Lambda 实际披露财务。Lambda 的总成本结构还包括 $1B
              信贷额度的资本成本（按市场利率计的利息支出）、数据中心建设和租赁承诺，以及未公开的运营费用 （员工、销售、R&D）。2026 年 5 月获得的 $1B
              优先担保信贷额度，可能带来实质固定利息支出，使净利润率低于毛利率。若 GPU 利用率足够，40–60% 毛利率可以达到；净利润率画像仍完全私有。
