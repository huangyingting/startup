  - id: FR001
    title: 风险热力图 —— Lambda Labs 2026 风险图谱
    type: matrix
    layout: wide
    summary: 定性风险热力图按发生可能性（列）和影响（行）呈现 Lambda 的 2026 年关键风险。高影响、高可能性风险 —— 超大规模云厂商自建和 CEO 交接 —— 是主要投资观察点。
    data:
      columns:
        - 低可能性
        - 中等可能性
        - 高可能性
      rows:
        - label: 严重影响
          values:
            - label: 物理基础设施灾难性故障
              tone: warning
            - label: NVIDIA 供应冲击；技术换代导致资产搁浅
              tone: negative
