      - number: '3.4'
        title: 护城河耐久性、商品化风险，以及来自超大规模云厂商和纯 GPU 云公司的战略威胁
        blocks:
          - type: paragraph
            body: >-
              Lambda 最耐久的竞争优势有三项：（a）价格透明和零出站费经济性，能消除大型训练工作负载的成本不确定性；（b）NVIDIA 合作深度，体现为 更早拿到 Blackwell Ultra 硬件，以及 MLPerf
              Inference v6.0 结果显示较上一代 Blackwell GPU 性能提升 29%；（c）不断增加的 ML 研究产出—— 过去 12 个月 20+ 篇同行评议论文，以及 OLMo Hybrid（512
              个 B200 GPU 上 97% 活跃训练时间）和 Llama-3.1-70B MFU 从 23.83% 提升 到 50.20% 等基准测试——让 Lambda
              更像可信的研究基础设施伙伴，而不是商品化机柜提供商。Lambda Stack 的 Kubernetes 和 Slurm 编排层 也在原始 GPU-hour
              价格之外增加工作流切换成本。这些优势真实存在，但并非永久。CoreWeave 的 IPO 级资本实力和超大规模云级 SLA，让它能在 最苛刻的企业客户面前出价压过 Lambda；与
              OpenAI、Microsoft 的锚定客户关系建立了 Lambda 很难轻易复制的品牌底座。超大规模云 厂商的捆绑能力意味着，企业买家可以把 GPU 计算直接加进现有 AWS、Azure 或 Google
              协议，无需引入新供应商或重新完成安全审查——这是一道 结构性在位者壁垒。Lambda 的私营公司身份，限制了大型企业买家偏好的合同可信度和资产负债表承诺。最急迫的商品化风险是价格压缩：当 NVIDIA
              同时向更多云提供商释放更多 Blackwell Ultra 以及未来世代硬件时，每 GPU 小时价差可能收窄，速度快过 Lambda 仅靠集群编排建立差异的能力。 战略要务是通过 Lambda Stack
              加深客户锁定，扩大 ML 研究护城河，并在价格商品化前把 $1B 信贷额度和 Series E 资本转化为集群规模。
