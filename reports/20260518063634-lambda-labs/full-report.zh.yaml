      - number: '1.6'
        title: 图表与案例
        blocks:
          - type: callout
            title: NVIDIA 战略伙伴关系——股权层面的供应链锁定
            body: |
              NVIDIA 作为战略投资方参与 Lambda Series D（2025 年 2 月），构成实质性竞争差异。NVIDIA 既是硬件供应商，
              也是股权持有人，因此有动机确保 Lambda 优先获得最紧缺的 GPU 供应（B200、GB300 NVL72）。纯财务型竞争者
              （CoreWeave、Vast.ai）若没有类似股权绑定结构，很难复制这种关系。NVIDIA GTC 2026 白金赞助身份，
              以及为 Lambda Cloud 发布 Vera CPUs、Bare Metal Instances 和 STX，进一步巩固了路线图层面的合作。
            calloutType: strength
            claimRefs:
              - CO015
              - CO027
          - type: callout
            title: CEO 交接风险——拐点时刻引入未经验证的外部人选
            body: |
              Michel Combes 于 2026 年 5 月获任 CEO——这是 Lambda 12 年历史中最重要的治理变化。作为电信 / 基础设施运营者，
              Combes 带来可扩展运营经验，但缺少 Lambda 的 AI 原生基因。交接发生在关键拐点：$3.3B+ 资本已到位、客户 10,000+，
              还要为多家超大规模云厂商推进 supercluster 建设路线图。Stephen Balaban 转任 CTO 保住技术连续性，但新 CEO 的
              执行节奏能否适配 Lambda 过去工程驱动的文化，仍有整合风险。
            calloutType: risk
            claimRefs:
              - CO008
              - CO009
          - type: callout
            title: 收入不透明——完整财务表现不可得
            body: |
              Lambda 历史上从未公开披露收入、毛利率、EBITDA 或烧钱速度。没有私有财务数据，就无法把 $2.3B+ 股权融资和
              $1B 债务额度放回基本面单位经济模型里评估。客户数（10,000+）和 GPU 价格（$0.79–$6.69/GPU/hr）能提供部分
              交叉验证，但缺少利用率和合同期限，收入估算区间会非常宽（约 $200M–$1B+ ARR 均属可能）。尽调需要在 NDA 下
              获取经审计财务数据。
            calloutType: risk
            claimRefs:
              - CO030
              - CO031
          - type: callout
            title: 优先尽调：验证超大规模云厂商合同条款和收入集中度
            body: |
              Lambda 的四家超大规模云厂商客户（包括 Microsoft）很可能是主要收入贡献者。缺少公开披露时，来自这四家客户的
              收入集中度风险未知，但可能很高。尽调应优先验证：（1）每家超大规模云厂商的合同期限和续约条款；（2）前 5 大
              客户收入占比；（3）Supercluster、1-Click Clusters 与 On-Demand Instances 的单位经济模型差异。
            calloutType: recommendation
            claimRefs:
              - CO022
              - CO023
  - number: 2
    title: 市场分析
    sections:
      - number: '2.1'
        title: 市场边界与定义
        blocks:
          - type: paragraph
            body: |
              Lambda 的主要市场是 AI 云基础设施——代表 AI 实验室、企业、创业公司和超大规模云厂商，为模型训练、微调和推理
              工作负载供应 GPU 算力。这个市场属于更大的云计算和数据中心基础设施领域，但由 AI 特有要素定义：NVIDIA GPU 密度、
              InfiniBand 或高速互联 fabric、AI 优化存储，以及 AI 编排层（Kubernetes、Slurm）。市场定义必须区分三类：（1）
              面向通用 AI 工作负载的 GPU 云服务（Lambda 的主要分部——On-Demand Instances、1-Click Clusters）；（2）面向
              超大规模云厂商和前沿模型实验室的专用 AI 工厂与 supercluster 建设（Lambda 的 Supercluster 产品层）；（3）更广义
              的公有云市场（AWS、Azure、GCP），其中 GPU 实例只是通用计算的一个子集。

              Lambda 可服务市场包含的支出：GPU 实例计算费用、集群预留费用、存储（S3-compatible），以及面向 AI 工作负载的托管
              基础设施服务。排除支出：通用 CPU 计算、CDN、软件即服务，以及应用层 AI 服务（如 OpenAI API）。现状替代方案包括：
              对已有 AWS 关系的企业来说，AWS EC2 P4/P5（A100/H100 实例）；对 OpenAI 生态客户来说，Azure N-series GPU VMs；
              对 TensorFlow 优先工作负载来说，Google Cloud A3（H100 VMs）和 TPU pods；以及对资本开支预算充足的企业来说，
              NVIDIA DGX / SuperPOD 本地 GPU 服务器。CoreWeave 和 Vast.ai 是专业 GPU 云分部里最接近的直接竞争者。

              相邻机会包括：（1）面向主权 AI 计划的裸金属 GPU 部署；（2）边缘 AI 推理（规模更小但相邻）；（3）AI-as-a-service
              托管模型端点（Lambda Chat 已经切入）。Lambda 的市场边界定义很重要，因为它决定 TAM 究竟是完整 $500B+ 云市场
              （过宽），还是更收敛且更相关的 $50–150B AI GPU 市场。
