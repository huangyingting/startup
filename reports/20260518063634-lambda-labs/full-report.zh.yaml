      - number: '8.2'
        title: 估值背景与可比公司分析
        blocks:
          - type: paragraph
            body: >-
              Lambda Labs 的 Series E 估值没有直接披露，但可以用多个代理信号估算。Series D（$480M，经 SEC Form D 确认）据同期分析师和媒体报道估值约 $5B。Series
              E（$1.5B+，经 2025 年 11 月轮次的 Form D 确认）相对该水平约 2x 上调，暗示投后估值为 $10–15B。这与 CoreWeave 2025 年 3 月 IPO 带动的 AI
              云基础设施重估一致：CoreWeave 上市市值 $19B，其 S-1 披露 FY2024 收入 $1.9B，对应过去 12 个月收入约 10x 倍数。

              Lambda 估计 ARR 为 $400–800M，虽未获公开确认，但把 $10–15B 的隐含估值放在 15–25x ARR 区间。相对 CoreWeave IPO 倍数的溢价在分析上可以辩护，因为
              Lambda 的绝对收入规模更早（潜在增长率更高）、NVIDIA 股权合作形成差异化，同时 2025–2026 年 AI 云倍数整体扩张。不过，宽区间反映真实不确定性：如果是 $400M ARR ×
              25x，估值偏激进；如果是 $800M ARR × 15x，估值合理。必须完成关键尽调核验——尤其是向 CFO Charles Fisher 核实 2025 和 2026
              ARR——才能判断当前入场价相对基本面是合理、便宜还是昂贵。

              计入 Lambda 的 $1B 债务后，企业价值约为 $11–16B；Series E 投资者可取得的股权价值相应受到信贷额度以及 Series D
              任何优先权负担的压缩。没有完整股权结构表，就难以精确建模新投资者的有效 IRR，这进一步强化了对优先权条款的尽调要求。
