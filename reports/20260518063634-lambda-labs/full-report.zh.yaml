  - number: 5
    title: 产品与技术
    sections:
      - number: '5.1'
        title: 产品组合与客户工作流定位
        blocks:
          - type: paragraph
            body: >-
              Lambda Labs 围绕四个清晰产品层级组织云平台，每一层按规模、隔离程度和控制权服务不同客户类型。On-Demand GPU 实例面向需要即时使用现代加速器的个人研究者和小团队——包括 NVIDIA
              H100 SXM5（80 GB HBM3）和 B200 SXM6（180 GB HBM3e），无需提前预留。1-Click Clusters 把自助模式扩展到 16 至 2000+ GPU
              规模的分布式训练和推理，通过 NVIDIA Quantum-2 InfiniBand 和 SHARP 加速连接节点，降低 GPU 间延迟，让客户无需自行处理网络即可跑多节点任务。


              Private Cloud 位于 1-Click Clusters 之上，提供 1,000+ GPU
              的专用单租户环境和直接底层访问。该层级面向前沿实验室和企业，它们需要工作负载隔离、自定义网络以及对软件栈的完整控制。Superclusters 是第四个、也是最高层级：为超大规模云厂商和前沿模型开发者建设的吉瓦级
              AI 工厂。Lambda 曾在 90 天内为一家保密超大规模云厂商交付完整 Supercluster，构成运营交付速度的书面证据。


              横跨所有层级，Lambda 提供 Lambda Chat，作为面向消费者和研究的开放模型入口，覆盖 DeepSeek-R1、Llama、Mochi 等模型；同时在
              docs.lambdalabs.com/api/cloud 提供文档完善的 REST
              API，用于程序化管理实例。零出站流量费政策——所有层级的数据传输费用为零——是持续存在的商业差异点。不同买家有不同评估标准：研究者看 On-Demand 定价和可用性；ML 团队评估 1-Click
              Cluster 的网络和故障恢复；企业权衡 Private Cloud 的隔离与合规态势；超大规模云厂商评估 Supercluster 交付周期和工程支持。
