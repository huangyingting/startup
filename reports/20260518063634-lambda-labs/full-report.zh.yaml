      - number: '2.2'
        title: 市场规模——TAM、SAM 与 SOM
        blocks:
          - type: paragraph
            body: |
              评估 AI GPU 云市场必须使用多套独立口径；单一来源估计会因市场边界假设和预测窗口不同而相差 3–10 倍。

              自上而下看需求：NVIDIA 数据中心业务在 2025 财年（截至 2025 年 1 月）收入为 $47.5B，反映 GPU 云提供商为服务终端
              客户所必须采购的硬件需求。计入数据中心 COGS、利润率和软件栈后，这意味着云基础设施 TAM 至少有每年 $100–200B。
              更保守的读法是：Synergy Research Group 估计 GPU 云市场（云提供商向终端客户出租 GPU 算力）在 2025 年约为
              $20–30B，到 2028 年以 25–35% CAGR 增长至 $50–60B。

              自下而上看分部：按工作负载计，AI 训练市场（前沿训练和微调）估计占 GPU 云需求的 40%；推理增长更快，预计到 2027 年
              在量级上超过训练。Goldman Sachs 估计，到 2030 年生成式 AI 基础设施年支出将超过 $200B，云端超大规模厂商和 AI 原生
              云提供商是主要承接方。

              Lambda 的 SAM：Lambda 服务 GPU 云市场中的自助和企业分部，而非由超大规模云厂商托管服务承接的消费级 AI 产品。
              Lambda 的 SAM 是 AI 实验室、ML 团队、企业和超大规模云厂商建设或扩张 AI 基础设施所产生的 AI 云支出子集；按不同口径，
              预计 2027 年为 $20–60B。Lambda 的 SOM 受 GPU 供应、数据中心容量和竞争定位约束；若超大规模云厂商 Supercluster 建设
              如 $3.3B 融资所暗示般加速，到 2027 年达到 $500M–$2B ARR 是合理的乐观 SOM 估计。
