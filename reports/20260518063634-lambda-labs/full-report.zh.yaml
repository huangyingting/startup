  - id: TM004
    title: 增长驱动因素与约束表
    columns:
      - 驱动因素或约束
      - 方向
      - 类别
      - 时间
      - 对 Lambda 的影响
      - 尽调待核实
    rows:
      - - AI 模型推理扩张（“每代推理量 100x”）
        - 顺风
        - 需求驱动因素
        - 当前，并加速至 2027 年
        - Lambda 的 On-Demand 和 1-Click Cluster 产品中，推理需求增长快于训练；相较专有 API，开源模型托管的经济性更偏向 Lambda
        - 核实推理与训练的收入拆分；评估推理工作负载的 GPU 利用率
      - - NVIDIA Blackwell（B200、GB300）供给爬坡
        - 顺风
        - 供给驱动因素
        - 2025–2027
        - 拥有 NVIDIA 战略投资人关系的 Lambda 优先拿到新硬件；竞争对手排队时它可提供 B200；Blackwell GPU 的价格溢价保护毛利率
        - 在 NDA 约束下确认 NVIDIA 供货协议的规模与分配条款
      - - 企业 AI 采用（到 2024 年 65%+ 使用生成式 AI）
        - 顺风
        - 需求驱动因素
        - 当前，并增长至 2028 年
        - 企业 ML 团队构成大型经常性收入细分；SOC 2 / ISO 27001 合规打开受监管行业
        - 按行业索取企业客户队列数据；ARR 和续约率
      - - 开源模型扩散（Llama、DeepSeek、Mistral）
        - 顺风
        - 需求驱动因素
        - 当前
        - Lambda 的 AI 原生堆栈和 Lambda Chat 为开源模型开发者提供自然入口；相对不优先服务 OSS 社区的超大规模云厂商形成竞争护城河
        - 分析 Lambda Chat 使用增长；开发者社区互动指标
      - - NVIDIA 近乎垄断导致 GPU 供应稀缺
        - 逆风
        - 供给约束
        - 结构性延续至 2027+
        - Lambda 与 NVIDIA 的股权关系可部分缓解这一点；但任何 NVIDIA 供应扰动都会影响包括 Lambda 在内的所有 GPU 云厂商
        - 审计硬件供货协议条款；确认 2026 年各季度已分配 GPU 数量
      - - 数据中心电力和土地可用性
        - 逆风
        - 基础设施约束
        - 2025–2028
        - 吉瓦级 Supercluster 建设需要公用事业承诺和许可审批；这会卡住超大规模云厂商合同执行时间表
        - 索取数据中心管线，按设施列出电力承诺和许可状态
      - - 超大规模云厂商竞争回应（AWS、Azure、GCP 扩张 GPU）
        - 逆风
        - 竞争约束
        - 当前，并在加剧
        - 超大规模云厂商正在扩张 GPU 容量；软件生态、合规和客户关系护城河让 Lambda 很难迁移企业工作负载
        - 对标 Lambda 相对 AWS/Azure/GCP 的胜率；评估 Supercluster 合同中是否有排他条款
      - - GPU 集群建设资本密集（每个 Supercluster $500M+）
        - 逆风
        - 财务约束
        - 结构性
        - Lambda $3.3B+ 累计资本已被硬件采购部分消耗；每签一个新 Supercluster 合同都需要继续债务或股权融资
        - 确认已宣布 Supercluster 管线中已落实与未落实资金的资本计划
      - - GPU 价格随时间下行
        - 混合
        - 市场动态
        - 2026–2028
        - 供应增加后 H100 价格下跌；Blackwell 爬坡成熟后 B200 溢价可能压缩；商品化 GPU 档位面临毛利压力
        - 测算 24 个月内 GPU 每小时定价对毛利率的敏感性
      - - 主权 AI 和政府云需求（IQT 信号）
        - 顺风
        - 新细分驱动因素
        - 2026–2028
        - IQT（In-Q-Tel）投资人关系打开潜在的美国政府和国防 AI 算力需求；涉密分级和合规要求可能限制 Lambda，也可能形成差异化
        - 了解政府合同管线，以及限制外资股东的安全许可要求
    notes: >-
      增长驱动因素和约束来自 Lambda 博客文章、NVIDIA 财务披露、McKinsey AI 调查数据和行业分析师报告。时间窗口基于截至 2026-05-18 的公开信息估计。除博客层面的评论外，Lambda 针对各项驱动 /
      约束的实际策略并未公开披露。
    claimRefs:
      - CM016
      - CM017
      - CM018
      - CM019
      - CM020
