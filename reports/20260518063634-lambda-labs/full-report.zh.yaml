      - number: '7.2'
        title: 运营、质量与安全风险
        blocks:
          - type: paragraph
            body: >-
              Lambda 的运营风险画像主要由正常运行可靠性、数据安全和物理基础设施韧性决定。Lambda 服务 10,000+ 客户，其中包括四家超大规模云厂商；在 AI 云市场增长最快的细分中，即便短暂停机也可能触发
              SLA 罚款、客户流失和声誉损害。Lambda 披露 B200 集群约 97% 正常运行时间，方向上正面，但也意味着每年潜在停机约 262 小时。对 Iambic Therapeutics（药物发现）和
              Pika（视频生成）等企业客户而言，AI 算力中断会直接影响生产。

              Lambda 作为前沿 AI 实验室自研模型、训练数据和算力配置的托管方，安全风险更高。攻击面包括 Lambda 面向公众的 API（Lambda API、Lambda Chat）、多租户集群环境（支持 16 至
              2,000+ GPU 的 1-Click Clusters），以及管理吉瓦级部署的行政系统。Lambda 持有 SOC 2 Type II 和 ISO 27001
              认证，说明控制框架有实质基础，但这些认证不能消除高级攻击风险。Lambda 没有披露公开漏洞赏金计划、历史事故日志，或任何安全和可用性事件的复盘文档；这些都是与 AWS、Azure、GCP
              竞争的企业云提供商的基线预期。
