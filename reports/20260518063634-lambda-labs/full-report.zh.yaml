      - number: '1.5'
        title: 里程碑与战略轨迹
        blocks:
          - type: paragraph
            body: |
              Lambda 的轨迹分为四个阶段：技术基础期（2012–2019，深度学习工作站和早期 GPU 云）、早期云增长期（2019–2023）、
              资本加速期（2024–2025，Series C/D/E）和职业化管理扩张期（2026）。关键拐点包括 2025 年 2 月 Series D：
              NVIDIA 作为战略投资方进入，既把 NVIDIA 关系锁定到股权层面，也释放 GPU 供应链安全信号。2025 年 11 月的
              $1.5B+ Series E 是最大单笔资本事件，并把 Lambda 重塑为 "The Superintelligence Cloud"，瞄准超大规模云厂商级
              工作负载。2026 年 5 月从 Balaban 到 Combes 的 CEO 交接，是 Lambda 历史上最重要的治理变化。

              Lambda 的技术轨迹包括：与 Allen Institute for AI（Ai2）开展 OLMo Hybrid 训练，在 512 个 B200 GPU 上达到
              97% 活跃训练时间，故障恢复中位数 3 分 42 秒（2026 年 1 月）；Llama-3.1-70B MFU 从 23.83% 优化到
              50.20%；在 NVIDIA Blackwell 上集成 FlashAttention-4；并参加 MLPerf Inference v6.0。$1B 信贷额度
              （2026 年 5 月 7 日）为数据中心建设提供非稀释跑道。Lambda 的战略轨迹指向三件事：（1）以超大规模云厂商
              Supercluster 合同作为主要收入驱动；（2）靠战略关系继续维持 NVIDIA 供应链差异化；（3）CFO 引入、CEO 职业化
              和资本积累，显示公司可能在准备 IPO 或战略交易。
