      - number: '8.6'
        title: 展品
        blocks:
          - type: callout
            title: 当前 Series E 条款下有条件买入——中等信心、高风险
            body: >-
              Lambda Labs 是定位良好的 AI 云基础设施公司，具备真实的结构性优势：NVIDIA 股权合作、超大规模云需求验证，以及全栈 GPU 平台。Series E 隐含估值 $10–15B 相对
              CoreWeave $19B IPO 可比是合理的——但不便宜。条件限定不可谈判：没有 2025 ARR 确认、按分层拆分的客户 NRR 和契约条款，就无法以高信心完成投资承销。交割前必须完成五项尽调要求。
            calloutType: recommendation
            claimRefs:
              - CV001
              - CV002
              - CV014
              - CV015
              - CV043
              - CV044
              - CV045
          - type: callout
            title: NVIDIA 股权合作和 GPU 访问是真正的结构性优势
            body: >-
              Lambda 与 NVIDIA 的股权合作——源自 Series D——是投资逻辑中最有防守力的单一元素。优先 GPU 分配和路线图访问权无法只靠资本复制；CoreWeave 拥有可比的 NVIDIA 关系，但
              Lambda 的 $10–15B 估值相对 CoreWeave IPO 后交易区间隐含明显折价。如果 ARR 能在分析师估计上沿得到确认，投资逻辑具备吸引力。
            calloutType: strength
            claimRefs:
              - CV005
              - CV002
              - CV022
              - CV028
          - type: callout
            title: CEO 交接和超大规模云客户流失是主要下行催化剂
            body: >-
              新 CEO（2026 年 5 月）和 CFO（2026 年 2 月）同时到任，再叠加未披露的客户 NRR 数据和不透明信贷额度，使 Lambda 在增长周期最糟糕的时点承受复合不透明。如果 CEO 交接后的 12
              个月内有一家超大规模云客户离开——考虑到新领导层需要管理客户关系，这是一个合理情景——悲观情景的经济性会变成基准情景。12 个月内流失两家超大规模云客户的否决标准，应视为有约束力的退出触发器。
            calloutType: risk
            claimRefs:
              - CV007
              - CV008
              - CV035
              - CV038
          - type: callout
            title: 基准情景假设 CFO 尽调能确认 ARR 达 $600–900M
            body: >-
              整个基准情景回报框架（$8–12B 退出、1.5–2.5x 回报）都押在两件事上：Lambda 顺利完成 CEO 交接，并在 2027 前把 ARR 做到 $600–900M。如果实际 2025 ARR 低于
              $400M，基准情景就会滑入悲观情景，$10–15B 入场价也会埋下明显下行风险。投入资金前，确认 2025 ARR 是最重要的一项尽调动作。
            calloutType: assumption
            claimRefs:
              - CV015
