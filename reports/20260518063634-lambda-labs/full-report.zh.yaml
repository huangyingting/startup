      - number: '8.3'
        title: 乐观 / 基准 / 悲观情景
        blocks:
          - type: paragraph
            body: >-
              Lambda Labs 的估值框架取决于两个主要变量：2027 年 ARR，以及流动性事件可实现的收入倍数。两者都不确定，因此应使用情景框架，而不是单点估计。

              乐观情景（25% 概率）下，Lambda 成功执行吉瓦级建设，留住全部超大规模云客户，在新 CEO 下完成运营执行，并乘上 AI 算力需求加速，到 2027 年 ARR 达到 $1.2–1.8B。若
              2028–2029 年 IPO 或老股交易时获得与高增长 AI 基础设施公司一致的 18–22x 倍数，隐含估值达到 $22–35B，相当于在当前估计 Series E 入场价 $10–15B 上获得 3–5x
              回报。

              基准情景（50% 概率）下，Lambda 完成 CEO 交接且没有实质客户流失，实现中等 GPU 容量扩张，到 2027 年 ARR 增至 $600–900M。若倍数为
              12–15x，反映增长放缓和杠杆较高，隐含估值为 $8–12B。根据 Series E 入场价不同，这对应 1.5–2.5x 回报；对高风险私人成长投资而言结果可接受，但并不突出。

              悲观情景（25% 概率）下，超大规模云厂商自建加速，GPU 现货价格进一步下跌并压缩单位利润，CEO 交接引发客户流失。ARR 停滞在 $300–400M。若使用受压的 6–8x 倍数，隐含估值为
