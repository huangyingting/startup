      - number: '5.3'
        title: 质量、可靠性与合规态势
        blocks:
          - type: paragraph
            body: >-
              Lambda 已获得 SOC 2 Type II 和 ISO 27001 认证，这是企业最常要求的两类安全证明。支撑认证的是零信任安全架构，它执行 VPC
              隔离、单租户计算（客户之间不共享节点）和集群层面的非共享网络。数据中心为 Tier 3 或 Tier 4，具备冗余电力、冷却和物理访问控制。Lambda 以 24/7/365 模式运行，由 ML 工程和 SRE
              团队提供全天候支持与自动故障恢复。


              生产可靠性的最强证据来自 Lambda 与 Allen Institute for AI（Ai2）进行的 OLMo Hybrid 训练任务，该任务运行在 512 块 NVIDIA B200 GPU（64 套
              HGX B200 系统）上。在这次数周训练中，Lambda 记录了 97% 的有效训练时间——该数字不包含故障恢复开销——以及 3 分 42 秒的 GPU
              故障恢复时间中位数。这些数字达到或超过多数企业和前沿实验室客户对长周期训练任务的可靠性门槛。


              从数据治理看，Lambda 的信任页面称客户工作负载在计算层和网络层隔离，租户之间没有交叉访问。其“不用客户数据训练模型”政策符合医疗、生命科学和金融服务买家的隐私要求。零信任态势叠加认证状态，使 Lambda
              在受监管工作负载上具备可与 AWS、Azure、GCP 竞争的合规画像；不过，Lambda 没有在公开信任页面发布 FedRAMP 授权或 HIPAA 商业伙伴协议，这对美国政府和 HIPAA
              覆盖实体买家是一个缺口。
