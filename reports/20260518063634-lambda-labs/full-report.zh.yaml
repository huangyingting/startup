      - number: '1.4'
        title: 产品、规模与客户基础
        blocks:
          - type: paragraph
            body: |
              Lambda 的产品栈覆盖 GPU 算力交付全谱系：

              On-Demand Instances 是入口产品——按公开价格自助获取单节点 GPU 服务器。截至 2026 年 5 月：NVIDIA HGX
              B200 SXM6（180GB）$6.69/GPU/hr，H100 SXM（80GB）$3.99/GPU/hr，A100 SXM（80GB）$2.79/GPU/hr，A100
              SXM（40GB）$1.99/GPU/hr，V100（16GB）$0.79/GPU/hr。Lambda 不收任何入站 / 出站费用；相对超大规模云厂商，
              这是明确的价格竞争信号。

              1-Click Clusters™ 是自助式 InfiniBand 连接 GPU 集群，规模从 16 到 2,000+ 个 GPU，并内置 Kubernetes
              和 Slurm 编排。1-Click Cluster B200 节点价格为：16 GPU $9.86/GPU/hr，64 GPU $9.36/GPU/hr，256+ GPU
              $8.87/GPU/hr——体现规模折扣。

              Superclusters 是为超大规模云厂商和前沿模型实验室定制的吉瓦级 AI 工厂。Lambda 称曾在 90 天内为一位保密的
              "AI Hyperscaler" 完成完整集群建设；这是一项关键客户胜利，也证明其快速部署能力。

              Lambda 称拥有 10,000+ 活跃客户（公司口径，2026 年 5 月）、四家超大规模云厂商客户（包括 Microsoft），并称其
              基础设施间接服务「数亿人」。署名客户包括 Pika（视频生成）、Iambic Therapeutics（药物发现）、fal（开源 AI）、
              Meshy（3D 生成式 AI）和 Genesis Therapeutics。一家医疗服务提供商客户称，使用 Oumi + Lambda 基础设施后成本
              降低 70%。过去 12 个月，Lambda 发表 20+ 篇同行评议 ML 论文，并在 NVIDIA GTC 2026（2026 年 3 月）担任
              白金赞助商。
