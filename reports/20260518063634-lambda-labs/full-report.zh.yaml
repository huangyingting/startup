      - number: '2.5'
        title: 规模测算缺口与矛盾
        blocks:
          - type: paragraph
            body: |
              AI GPU 云市场规模测算存在大量矛盾和估计不确定性；尽调团队应明确保留这些矛盾，而不是用单一数字抹平。

              核心矛盾：（1）NVIDIA 数据中心收入（FY2025 为 $47.5B）意味着巨额硬件采购预算流向数据中心运营商——但「云到终端客户」的 GPU
              租赁市场小得多，因为相当大一部分 NVIDIA 硬件流向超大规模云厂商，用于其内部模型训练（Meta、Microsoft/OpenAI、Google），而不是
              GPU 云提供商。把 NVIDIA 硬件收入当作云市场 TAM，会明显高估租赁市场。（2）多家分析机构（IDC、Gartner、Synergy）定义不同：有的
              包含全部 AI 基础设施硬件，有的只计云服务收入。即便预测窗口相近，估计也会随边界定义从 $20B 到 $150B+ 不等。（3）Goldman Sachs
              2023 年 AI 基础设施报告（"Too Much Spend, Too Little Benefit"）质疑了大规模 AI 基础设施投资的 ROI；如果早期 AI 投资产出低于预期，
              企业需求增长可能放缓，这一点很相关。

              Lambda 的缺口：没有公开来源确认 Lambda 当前 ARR、利用率或市场份额。Lambda 总资本 $3.3B+ 暗示收入 / 资本比率可能对应
              $200M–$1B ARR 区间，但在没有私有财务数据时完全是推测。因此 SOM 估计仍为低置信度，任何投资决策前都应通过 NDA 获取数据交叉验证。
            claimRefs:
              - CM021
              - CM022
              - CM023
              - CM024
              - CM025
      - number: '2.6'
        title: 图表与案例
        blocks:
          - type: callout
            title: NVIDIA 数据中心收入可作需求代理——但不是 GPU 云 TAM
            body: |
              NVIDIA FY2025 数据中心业务收入 $47.5B 常被用来证明 AI 基础设施市场巨大。但这一数字包括超大规模云厂商为自身内部 AI 模型训练
              （Meta、Microsoft、Google）采购的硬件，这些硬件不会进入 GPU 云租赁市场。Lambda 可触达的租赁市场，是终端客户向云提供商支付
              GPU-hour 的子集，预计到 2028 年为 $20–60B——比 NVIDIA 硬件代理值小 2–5 倍。投资人不应把 NVIDIA 硬件收入等同于 Lambda 的总可用市场。
            calloutType: insight
            claimRefs:
