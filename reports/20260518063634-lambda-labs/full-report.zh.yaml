      - number: '6.5'
        title: 扩张与集中风险
        blocks:
          - type: paragraph
            body: >-
              Lambda 的扩张模型把客户从按需实例推进到 1-Click Clusters，再到预留容量，最终进入 Private Cloud 或 Supercluster
              部署。这条路径既创造增长机会，也形成留存机制，因为更高层级牵涉更高切换成本和更长承诺周期。不过，重大集中风险同样存在。Lambda 披露至少四家超大规模云客户，包括 Microsoft，但合同规模和续约条款受
              NDA 保护。如果少数超大规模云账户贡献了大部分订单额，不续约事件会造成超比例收入冲击。Lambda 的按需定价模式使客户跨 GPU 云提供商切换的门槛相对较低。竞争格局——包括
              CoreWeave、Nebius、Vast.ai 以及原生超大规模云 GPU 选项（AWS、Azure、GCP）——持续带来定价压力。Lambda 缺少自研 AI
              软件层或平台即服务产品，相比垂直整合替代方案，其基础设施粘性更低。
