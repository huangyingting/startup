      - - NVIDIA GPU 分配削减或优先合作关系下调
        - GPU 分配量较承诺采购量减少 >50%
        - 退出或立即减仓
        - NVIDIA 财报电话会供应评论；Lambda 采购公告；数据中心容量指引
      - - 超大规模云厂商客户流失
        - 四家超大规模云厂商客户中有两家或更多在 12 个月内离开 Lambda
        - 退出 — 集中风险兑现，收入可见度崩塌
        - Lambda 客户公告；超大规模云厂商云基础设施业绩；媒体报道
      - - GPU 现货价格崩塌
        - H100 按需现货价格连续 90+ 天低于 $0.75/GPU-hr
        - 重估投资逻辑；若利润率修复路径不可信，则减仓
        - CoreWeave、Vast.ai、Lambda 公开价格页；GPU 现货市场指数；财报评论
      - - CEO 或 CTO 离任
        - Michel Combes 或 Stephen Balaban 在 2026 年 5 月交接后的 12 个月内离开 Lambda
        - 退出 — 领导层不稳定叠加，通常伴随客户和人才流失
        - Lambda 公开公告；LinkedIn 资料变更；媒体报道
      - - 信贷额度契约违约
        - 公开披露 $1B 信贷额度发生契约违约事件
        - 退出 — 契约违约会触发贷款人救济，包括可能要求债务加速到期
        - Lambda SEC 文件或债务修订披露；CFO 公开表态
    notes: 终止门槛是分析师依据 GPU 云运营商先例和信贷市场惯例作出的估计。实际契约门槛属于私人信息；这里的数字触发项是投前监测用的保守代理指标。
  - id: TV006
    title: 最终尽调要求表
    columns:
      - 尽调事项
      - 理由
      - 优先级
      - 数据负责人
    claimRefs:
      - CV043
      - CV044
      - CV045
    rows:
      - - 确认 2025 年 ARR，并提供 2026 年 ARR 指引
        - 整个估值框架都围绕这一项；ARR 是 $400M 还是 $800M，会把倍数区间从激进拉回合理
        - 关键 — 没有这项不得提交投资承诺
        - CFO Charles Fisher；管理层数据室
      - - 按客群拆分的客户 NRR（超大规模云厂商 vs. 企业长尾）
        - 量化收入耐久度；超大规模云厂商客群 NRR 低于 100%，就意味着流失风险，并推翻集中度论证
        - 关键 — 没有这项不得提交投资承诺
        - CEO / CFO；CRM 或计费系统队列数据
      - - 信贷额度契约条款（最低收入、杠杆率、MAC 条款）
        - 校准投资逻辑失效触发门槛、建模悲观情景下流动性风险都需要这项
        - 关键 — 风险评级承销必须取得
        - CFO / 总法律顾问；信贷协议
      - - 前 10 大客户集中度和平均合同期限
        - 以绝对收入量化超大规模云厂商流失影响；合同期限决定 NRR 下限
        - 高 — 流失风险建模的关键输入
        - CEO / 销售负责人；CRM 数据
      - - GPU 资本开支管线、采购排期和折旧模型
        - 建模现金消耗、B200→B300 过渡期搁浅资产风险和 Series F 必要性都需要这项
        - 高 — 资本充足性分析必须取得
        - CFO；财务团队；资本开支模型
    notes: 这五项构成将建议置信度从中等上调到高所需的最低信息集。其他事项（CEO 100 天计划、员工期权池、公用事业合同）次一级，但在完整数据室访问期内也应索取。
