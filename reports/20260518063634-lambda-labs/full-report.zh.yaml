          tone: positive
        - label: 集群预留溢价
          value: 25
          detail: 1-Click Cluster 费率为 $9.36–9.86/GPU/hr（B200），较按需 H100 约有 ~2.3× 溢价。
          tone: positive
        - label: 零出站费让利客户（需求驱动）
          value: 10
          detail: 没有出站费，相比超大规模云厂商提升有效价值，支撑更高 GPU 利用率。
          tone: positive
        - label: 利用率敏感性（80% 假设）
          value: -20
          detail: 在 80% 利用率下，20% 容量闲置；低于 70% 时，总收入会被明显压缩。
          tone: warning
        - label: 估计毛贡献率
          value: 75
          detail: 按公开成本基准估算，H100 在 80% 利用率下毛利率约 ~48–74%。
          tone: positive
        - label: $1B 信贷额度的固定利息
          value: -5
          detail: 高级担保债务按市场利率计息（估计年化 5–8%），在毛利下方增加固定现金成本。
          tone: warning
