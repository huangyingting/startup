      - number: '5.4'
        title: 路线图与研发轨迹
        blocks:
          - type: paragraph
            body: >-
              Lambda 的 2026 路线图锚定 NVIDIA Blackwell 世代及其后续产品。3 月的 GTC 2026 上，Lambda 宣布支持 NVIDIA Vera CPU（在 GPU 节点旁提供高带宽
              ARM 架构 CPU 容量）、面向需要直接硬件访问且不愿承担虚拟化开销用户的 Bare Metal Instances、用于数据中心规模光互连的 NVIDIA Photonics 集成，以及面向下一代交换连接的
              NVIDIA STX（SuperTrunk Architecture）支持。


              软件侧，Lambda 的研究工程团队持续在自有硬件上优化训练效率。2026 年发布的 MLPerf Inference v6.0 结果显示，Lambda 的 Blackwell Ultra 世代比上一代
              Blackwell 快 29%，Lambda 的软件优化层在相同硬件上又带来 9% 性能增益。在 MLPerf 测试中，Lambda 的 Smart Expert Routing 实现把 P99 首 token
              时间延迟相对基线配置降低 31%。


              资本投入强化了路线图方向。Lambda 募集 $480M 用于扩展云平台，随后又从 TWG Global 和 USIT 完成超过 $1.5B 的第二轮融资，用于建设超级智能云基础设施。投资者的投资逻辑与
              Lambda 的 Supercluster 产品方向一致：在规模上提供容量密集、前沿实验室级基础设施。2026 年 5 月前的 12 个月里，Lambda 发表了 20 多篇经同行评审的 ML 论文，其中包括
              ICLR 2026 的 12 篇论文，进一步强化了其刻意打造的研究级可信度。
