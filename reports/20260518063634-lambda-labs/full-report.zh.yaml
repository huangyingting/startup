companyProfile:
  summary: >-
    Lambda Labs（Lambda）是一家总部位于 San Francisco 的 AI 云基础设施公司，2012 年由 Stephen Balaban 和 Michael Balaban 兄弟创立。公司最初做深度学习工作站，约
    2020 年转向 GPU 云服务，此后服务 10,000+ 客户——其中包括四家超大规模云厂商，Microsoft 已公开可确认——产品覆盖 On-Demand GPU Instances、 1-Click
    Clusters（16–2,000+ GPU）、Private Cloud 和 Superclusters。Lambda 在 2025 年 2 月完成 $480M Series D，NVIDIA 作为战略股权投资方参与；2025 年
    11 月又完成 TWG Global 领投的 $1.5B+ Series E，并在 2026 年 5 月获得 $1B 优先担保信贷额度，总资本达到约 $3.3B+。2026 年 5 月，Lambda 任命 Michel Combes
    为 CEO，并将品牌重塑为 "The Superintelligence Cloud"，指向超大规模云厂商级 AI 工厂基础设施。NVIDIA 股权参与、SOC 2 Type II / ISO 27001 合规以及零入站 /
    出站费用，是 Lambda 相对 CoreWeave 和超大规模云替代方案的主要差异点。
