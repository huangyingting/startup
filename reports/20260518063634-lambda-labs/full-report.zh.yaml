            - label: 强
              tone: positive
              detail: 已 GA；自助扩展范围 16 到 512+ GPU。
            - label: 强
              tone: positive
              detail: OLMo Hybrid（512 块 B200）正常运行时间 97%；故障恢复中位数 3 分 42 秒。
            - label: 中
              tone: neutral
              detail: 适用 SOC 2 和 ISO 27001；未单独公布集群级 SLA。
            - label: 强
              tone: positive
              detail: 控制台驱动开通；Kubernetes/Slurm；Lambda Stack 有文档。
            - label: 中
              tone: neutral
              detail: 规模上限和下一代 GPU 可用性未正式沟通。
        - label: Private Cloud
          values:
            - label: 强
              tone: positive
              detail: 已 GA；可用专属 1000+ GPU 单租户集群。
            - label: 中
              tone: neutral
              detail: 已提及生产交付（90 天 Supercluster）；缺少 Private Cloud 专属基准。
            - label: 强
              tone: positive
              detail: 单租户隔离、VPC、零共享计算、SOC 2 Type II、ISO 27001。
            - label: 中
              tone: neutral
              detail: 已描述硬件访问和低层配置；Private Cloud 的 API 深度未记录。
            - label: 弱
              tone: warning
              detail: 新签 Private Cloud 合同的定价和容量未公开披露。
        - label: Supercluster
          values:
            - label: 强
              tone: positive
              detail: GA；首个 Supercluster 在 90 天内交付给保密的超大规模云厂商。
            - label: 强
              tone: positive
              detail: 90 天交付速度和吉瓦级设计已在生产中验证。
            - label: 强
              tone: positive
              detail: 超大规模云厂商级隔离；包含 ML 工程运维；支持定制电力和冷却。
            - label: 低
              tone: warning
