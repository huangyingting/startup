      - number: '3.2'
        title: 直接竞争者画像：CoreWeave、Vast.ai 与超大规模云厂商
        blocks:
          - type: paragraph
            body: >-
              CoreWeave 是 Lambda 在高端 GPU 云分部最清晰的直接对手。其 S-1 和投资者关系材料确认了 IPO 阶段资本实力，客户名单包括 OpenAI、 Mistral AI、IBM 和 Jane
              Street——明显偏向前沿模型实验室和机构金融。SemiAnalysis 在 2026 年评审中授予 CoreWeave Platinum ClusterMAX
              评级，这是最高基础设施质量评级，说明其大型训练运行的 InfiniBand 可靠性处于顶级。CoreWeave 不公开价格表；报价需要直接
              销售沟通。这种成本不透明有利于拥有议价能力的企业，却会让小团队处于劣势。CoreWeave 上市后的资产负债表，让它能向锚定客户 承诺多年容量；作为 Series E 后期私营公司，Lambda
              目前无法在同等规模复制这种交易结构。

              Vast.ai 的交易平台模型既互补又竞争：68+ GPU 类型和按秒计费，服务重视价格灵活性而非生产级 SLA 的成本敏感开发者。Vast.ai 的 SOC 2 认证和有文档的 API/CLI
              工具包，使其足以承接批处理和研究工作负载，但缺少 Lambda 的 InfiniBand 集群 fabric，不适合大型同步训练。 AWS p4d/p4de/p5 实例每个最多提供 8x NVIDIA A100
              和 EFA 网络，能竞争训练运行，但被捆在 AWS 的合规与计费生态里，出站费会增加 隐性成本。Azure 的 NDas A100 series 借 Microsoft 企业协议获得结构性分发杠杆，把 AI
              算力与 Teams、365 和 OpenAI 服务装进同一供应商关系。 Google Cloud 以 TPU v5 做差异化——其他平台无法提供这种硬件，适合深度投入 Google ML 研究生态的团队。
