      - number: '1.3'
        title: 融资历史与资本策略
        blocks:
          - type: paragraph
            body: |
              Lambda 的融资轨迹是 AI 云基础设施领域最激进的一条。公司 2024 年 2 月完成 $320M Series C。2025 年
              2 月 19 日，Lambda 宣布由 Andra Capital 和 SGW 共同领投 $480M Series D，战略投资方包括 NVIDIA、
              Andrej Karpathy（天使）、ARK Invest、Fincadia Advisors、G Squared、IQT（In-Q-Tel），以及硬件供应链
              伙伴 Pegatron、Supermicro、Wistron 和 Wiwynn。NVIDIA 投资尤其关键，它把战略供应商关系锁定到股权层面。

              2025 年 11 月 18 日，Lambda 宣布完成由 TWG Global（Thomas Tull 和 Mark Walter）与 USIT 领投的
              $1.5B+ Series E。这是 2025 年规模最大的单笔私营 AI 基础设施融资之一。各轮累计股权融资约 $2.3B+。
              此外，Lambda 获得优先担保信贷额度：初始额度于 2025 年 8 月关闭，并在 2026 年 5 月 7 日上调至 $1B。
              这使总资本（股权 + 债务）达到约 $3.3B+。债务额度为数据中心建设和硬件采购提供非稀释跑道，避免进一步
              稀释股权。

              Lambda 没有披露任何一轮的投后估值；对这种规模的公司而言并不常见，可能反映创始人倾向于避开按市值重估
              压力。没有公开报道称公司发生过老股交易或要约收购。
