    rows:
      - - 智能摄像头：多路对象检测与分析
        - CPU/MCU 吞吐有限；云端卸载带来带宽和延迟成本
        - Hailo-15H SoC 以单芯片在 <5W 下提供端侧 AI + ISP + 编码
        - 省掉云端视频传输成本；本地推理延迟 <20ms
        - DFC 编译需要为 Hailo-15H 架构重新编译模型；并非所有模型不改就能编译
      - - 汽车 ADAS：行人与车辆检测、车道分割
        - NVIDIA Drive orin 或 Texas Instruments TDA4VM，功耗 / 成本更高
        - Hailo-8 AEC-Q100 伴随 AI 芯片，功耗 <5W；与既有 SoC 集成
        - 与同等 TOPS 的 GPU 推理相比，功耗降低 50–80%；已获汽车级认证
        - 需要完整重新编译为 DFC 格式；ISO 26262 功能安全需要 OEM 级集成投入
      - - 工业机器视觉：缺陷检测、条码读取
        - 带 GPU 的工业 PC，或基于 CPU 的 OpenCV 流水线，功耗 / 尺寸较高
        - Advantech/Axiomtek 模块上的 Hailo-8 或 Hailo-15H，配 TAPPAS 流水线
        - 以 DIN-rail 外形在系统总功耗 <10W 下跑 AI 推理
        - 多步骤检测序列中 TAPPAS 流水线较复杂；开箱即用的工业协议有限
      - - 开发者 / 创客：在 Raspberry Pi 上快速 AI 原型验证
        - 外部 GPU 服务器或云端 ML API 做推理；在 RPi 功耗水平下没有本地边缘 AI
        - Raspberry Pi AI HAT+（Hailo-8L，13 TOPS，零售价约 $70），配 TAPPAS GStreamer 演示
        - $70 零售价跑 LLM 级推理；在 Pi 5 上以 >30 FPS 跑 YOLOv8
        - 自定义模型的 DFC 编译需要搭 Linux 工作站；流程对新手不友好
      - - 边缘 LLM 推理：端侧大语言模型助手（约 6B 参数）
        - 只能云端推理（OpenAI API），依赖网络，有延迟和隐私暴露
        - Hailo-10H M.2 模块在本地以 <10W 跑量化 6B 参数模型
        - 私有、低延迟的端侧 LLM；不依赖云；可用于隔离网络环境
        - INT4 量化相较 FP16/BF16 会降低模型质量；上限约 6B 参数；截至 2026 年 SDK 仍在成熟
    notes: 工作流对比基于 Hailo 官方材料和行业基准。收益主张来自公司，仍需第三方验证。
