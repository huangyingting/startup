      - number: '8.3'
        title: 乐观、基准、悲观情景与资本结构
        blocks:
          - type: paragraph
            body: >
              乐观情景（3 年退出周期企业价值 $2–4B）需要满足：（1）至少 2 家具名 Tier-1 汽车 OEM 确认使用 Hailo 芯片的量产 SOP 日期；（2）Hailo-10H 在边缘生成式
              AI（sub-5W LLM）中建立市场领先位置；（3）收入达到 $150–250M ARR，毛利率高于 50%；（4）新的战略投资方（Qualcomm、NXP 或大型汽车
              OEM）以溢价估值入股。基于现有证据，该情景概率权重约为 20–25%。

              基准情景（$800M–1.5B）需要：（1）通过 Advantech、Axiomtek、ADLINK 渠道和新 OEM 持续实现工业 OEM 增长；（2）至少 1 家汽车 OEM
              进入量产；（3）以持平到小幅溢价于 2022 年的估值（$1.13B–$1.5B）完成 Series D；（4）Hailo-10H 在企业边缘 LLM 应用中获得开发者牵引。收入目标约 $50–150M
              ARR。该情景权重约为 40–45%。

              悲观情景（$200–500M）需要：（1）未来 2 年没有具名汽车 OEM SOP 确认；（2）资本紧张迫使公司困境出售或 down-round；（3）NVIDIA Jetson Orin Nano 在工业
              OEM 渠道形成竞争替代；（4）开发者社区采用因 SDK 复杂度停滞。收入会维持在 $30M ARR 以下。该情景权重约为 30–35%。

              资本结构背景：Hailo 已经在多轮融资中累计获得约 $206M。按半导体初创公司标准风险投资经济学，Series A–C 经历显著稀释后，现有投资人（BNY Mellon、D1 Capital、Poalim
              Equity、ARK Invest 等）仍持有可观股份。任何按最后已知估值（$1.13B）进行的新投资，都必须确认现有投资人自 2022 年以来没有大幅下调账面估值。
