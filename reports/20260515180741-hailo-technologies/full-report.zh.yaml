  - id: FR001
    title: 风险热力图
    type: matrix
    layout: wide
    summary: |
      风险热力图按发生可能性（列）和缓释后的残余严重性（行）定位 Hailo 的关键风险。单元格标出具体风险及其语气（正向缓释 = 警示；缓释有限 = 负面；生存级 = 负面）。
    data:
      columns:
        - 低可能性
        - 中等可能性
        - 高可能性
        - 极高可能性
      rows:
        - label: 关键级严重性
          values:
            - label: 台湾冲突 → TSMC
              tone: negative
              detail: 若 TSMC 无法访问，属生存级风险；无缓释
            - label: 资本耗尽
              tone: negative
              detail: 4 年融资空窗；烧钱速度与收入未知
            - label: 汽车 SOP 失败
              tone: negative
              detail: 最可能的收入关键风险；管线未具名
            - label: ''
              tone: neutral
              detail: 未识别出已评估的关键级 / 极高可能性风险
        - label: 高严重性
          values:
            - label: ASIL-D 缺口
              tone: warning
              detail: 挡住最高等级汽车设计
            - label: NVIDIA SDK 生态锁定
              tone: warning
              detail: CUDA 切换成本压低 design win rate
            - label: 以色列 miluim 扰动
              tone: warning
              detail: 自 Oct 2023 冲突持续；征召反复
            - label: 出口管制阻断中国
              tone: warning
              detail: BIS 收紧；TSMC 代工芯片可能成为目标
        - label: 中等严重性
          values:
            - label: SDK 安全漏洞
              tone: neutral
              detail: 无已知 CVE；嵌入式安全风险
            - label: 关键人员离职（创始人）
              tone: warning
              detail: CEO / CTO 在战略和融资上是单点故障
            - label: EU AI Act 合规负担
              tone: warning
              detail: 汽车 / 监控新高风险 AI 合规要求
            - label: ''
              tone: neutral
              detail: 未识别出中等严重性 / 极高可能性风险
        - label: 低严重性
          values:
            - label: 以色列国防出口管制
              tone: neutral
              detail: 通用芯片；触发可能性低
            - label: GDPR / 监控合规
              tone: neutral
              detail: 责任主要在 OEM 客户，而非芯片供应商
            - label: 开发者生态流失
              tone: neutral
              detail: RPi 开发者流失符合预期；漏斗仍有价值
            - label: ''
              tone: neutral
              detail: ''
    claimRefs:
