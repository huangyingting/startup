      - number: '1.4'
        title: 关键里程碑与公司轨迹
        blocks:
          - type: paragraph
            body: >
              Hailo 的里程碑轨迹横跨创立、产品开发、商业发布、分销放量和平台扩展。公司 2017 年成立后，迅速组建了世界级芯片设计团队。首款产品 Hailo-8 芯片在 2019/2020
              年商业化发布，并在安防摄像头和工业系统中获得设计定点。2020 年 Series B 支撑了 TSMC 生产扩产。到 2022 年，公司已进入独角兽行列，并面向全球 OEM 客户批量出货 Hailo-8。

              2023 年和 2024 年，Hailo 明显扩展产品组合。Hailo-15 AI Vision Processor 系列（Hailo-15H 和 Hailo-15L）面向智能摄像头发布，把 AI
              计算与视频处理集成在一起。Hailo-10H 生成式 AI 加速器公布，瞄准刚兴起的边缘 LLM 市场。与 Raspberry Pi 的合作（AI HAT+）打开了开发者 / 创客市场，让 Hailo 的 NPU
              技术更易触达，并强化了开发者心智。

              到 2025 年，Hailo 已在 CES 2025 上公开演示 Hailo-10H 在边缘运行 LLM/VLM 应用。Hailo 的软件套件（Dataflow Compiler、HailoRT、Model
              Zoo）通过版本跟踪逐步成熟，公司还举办年度 Hackathon（2024-2025 版本于 2025 年 3 月举行）来扩展开发者社区。2026 年计划参加的活动包括 XPONENTIAL（2026 年 5
              月，底特律）和 Computex（2026 年 6 月，台北），显示公司继续向 Physical AI 和机器人市场扩张。
