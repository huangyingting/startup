        - id: tsmc
          label: TSMC 代工
          detail: 唯一制造伙伴。TSMC N7 / N6 / 先进节点。台湾集中风险。
          tone: warning
        - id: dfc-sdk
          label: DFC + SDK 工具链
          detail: 开发者采用取决于 DFC 编译成功。工具链复杂度是首要采用风险。
          tone: warning
        - id: oss-frameworks
          label: OSS 框架（PyTorch / TF / ONNX）
          detail: DFC 接收在这些框架中训练的模型。生态兼容性决定模型覆盖。
          tone: neutral
        - id: distribution
          label: STMicro / Renesas 分销
          detail: 全球渠道分销。触达工业 / 汽车 OEM 采购。
          tone: positive
        - id: rpi-design-win
          label: Raspberry Pi Design Win
          detail: 消费者销量锚点。AI HAT+ 拉动大众市场芯片需求。对开发者形成品牌验证。
          tone: positive
        - id: oem-customers
          label: OEM 客户
          detail: Advantech、Axiomtek、汽车 Tier-1。Design win 决定量产收入。
          tone: positive
      edges:
        - from: tsmc
          to: hailo-chip
          label: 制造
        - from: oss-frameworks
          to: dfc-sdk
          label: 模型输入
        - from: dfc-sdk
          to: hailo-chip
          label: 支持部署
        - from: hailo-chip
          to: distribution
          label: 渠道销售
        - from: hailo-chip
          to: rpi-design-win
          label: HAT+ 内置 Hailo-8L
        - from: distribution
          to: oem-customers
          label: 销售给
        - from: rpi-design-win
          to: oem-customers
          label: 开发者心智份额
  - id: FE004
    title: 产品成熟度和能力地图
    type: matrix
    layout: wide
    summary: |
      从量产准备度、软件生态成熟度、生态 / 伙伴支持和竞争差异化四个关键轴，评估 Hailo 五款芯片产品的成熟度和能力。
    claimRefs:
      - CE001
      - CE002
      - CE003
      - CE004
      - CE005
      - CE033
      - CE040
    data:
      columns:
        - 量产准备度
        - 软件生态
        - 伙伴 / 生态支持
        - 竞争差异化
      rows:
        - label: Hailo-8
          values:
            - label: 高 — 2020 年起出货，AEC-Q100
              tone: positive
              detail: 量产多年；汽车认证；供应链已建立
            - label: 高 — DFC v3.33.1，Model Zoo 100+ 模型
              tone: positive
              detail: 最成熟 SDK；模型覆盖最大；TAPPAS 支持完善
            - label: 高 — RPi、Advantech、Axiomtek、STMicro / Renesas
              tone: positive
              detail: 最广泛伙伴集成；覆盖消费级到工业
            - label: 中 — TOPS/W 领先优势被新进入者侵蚀
              tone: neutral
              detail: 在 <5W 边缘场景仍具竞争力；受 Jetson Orin、Axelera 压力
        - label: Hailo-8L
          values:
            - label: 高 — 已量产，驱动 RPi AI HAT+
              tone: positive
              detail: 消费者销量验证；成本优化；良率高
            - label: 高 — 与 Hailo-8 相同的 DFC v3.33.1 工具链
              tone: positive
              detail: 与 Hailo-8 共享生态；RPi 社区支持
            - label: 高 — RPi 大众市场；广泛创客社区
              tone: positive
              detail: 所有 Hailo 芯片中最大的开发者社区
            - label: 高 — RPi 级功耗和成本档唯一芯片
              tone: positive
              detail: 在 $10–15 芯片成本、13 TOPS 下没有直接竞争者
        - label: Hailo-10H
          values:
            - label: 中 — 2024 年发布，正在爬坡
              tone: neutral
              detail: 早期量产；客户爬坡未完全披露；销量不确定
            - label: 中 — DFC v5.3.0，更新、实战验证较少
              tone: neutral
              detail: DFC v5 较新；社区示例少于 DFC v3；LLM 量化工作流仍在成熟
            - label: 低-中 — 仅有早期伙伴集成
              tone: neutral
              detail: 披露的 OEM design win 有限；Hailo-10H M.2 主要为直销渠道
            - label: 高 — <10W LLM 推理 40 TOPS INT4 的先发者
              tone: positive
              detail: 发布时，在 6B 参数 LLM 的该功耗 / 性能点没有直接竞争者
        - label: Hailo-15H
          values:
            - label: 高 — 已为智能摄像头 OEM 量产
              tone: positive
              detail: 可供摄像头 OEM 使用；ISP + 编码集成已完成
            - label: 中 — DFC v5.3.0 工具链，模型支持在增长
              tone: neutral
              detail: DFC v5 新于 v3；TAPPAS 中面向摄像头的管线在增加
            - label: 中 — 小众摄像头 OEM 生态
              tone: neutral
              detail: 面向专用摄像头 OEM，而非广义嵌入式市场；伙伴集合较窄
            - label: 高 — 20 TOPS、<5W 档唯一集成 NPU + ISP + 编码器的 SoC
              tone: positive
              detail: 相比 Ambarella 或单独 ISP + NPU 组合，集成独特
        - label: Hailo-15L
          values:
            - label: 中 — 已供货，处于样品阶段
              tone: neutral
              detail: 商业送样；量产爬坡时间不清楚
            - label: 低-中 — 专门文档有限
              tone: neutral
              detail: 专属资源少于 Hailo-8；共享 DFC v5 工具链
            - label: 低 — 公开集成有限
              tone: warning
              detail: 公开集成伙伴最少；成本档入门产品
            - label: 中 — 成本有竞争力的入门摄像头芯片
              tone: neutral
              detail: 面向价格敏感 OEM；产品线中低于 Hailo-15H 的独特定位
  - id: FU001
    title: 客户旅程图
    type: journey-map
    layout: wide
    summary: |
      Hailo 四个主要细分市场的获客和扩张旅程，从初始发现到 design-in、量产部署，再到后续产品世代或新垂直行业的潜在扩张。
    data:
      nodes:
        - id: discovery
          label: 发现
          detail: OEM 或开发者通过 STMicro / Renesas 渠道、Raspberry Pi HAT+、展会或开发者社区内容发现 Hailo
          tone: neutral
        - id: evaluation
          label: 评估 / 原型验证
          detail: 工程师通过 HailoRT SDK 集成 Hailo-8 / 10H；评估 TOPS/W、SDK 复杂度、模型兼容性；开发者摩擦点
          tone: warning
        - id: design-in
          label: Design-In 决策
          detail: OEM 决定将 Hailo 纳入产品 BOM；汽车涉及 3-5 年设计周期；工业 / 创客短得多（3-12 个月）
          tone: positive
        - id: production
          label: 量产爬坡
          detail: Hailo 芯片进入 OEM 产品量产；Advantech / Axiomtek / Raspberry Pi 代表已确认量产；汽车 SOP 尚未确认
          tone: positive
        - id: expansion
          label: 扩张 / 下一代
          detail: OEM 将 Hailo 设计进下一代产品（Advantech 多 SKU 证据）；或扩张到新垂直行业（如为 GenAI 用例加入 Hailo-10H）
          tone: positive
        - id: risk-exit
          label: 流失风险：切换到竞争对手
          detail: 竞争对手切换风险：高性能需求转向 NVIDIA Jetson，视觉专用设计转向集成式 SoC（Ambarella / Qualcomm），中国 OEM 转向国产 NPU
          tone: negative
    claimRefs:
      - CU001
      - CU021
      - CU029
      - CU030
  - id: FU002
