chapters:
  - number: 1
    title: 公司概况
    sections:
      - number: '1.1'
        title: 身份、产品模式与业务描述
        blocks:
          - type: paragraph
            body: >
              Hailo Technologies Ltd. 是一家总部位于以色列特拉维夫的以色列 AI 半导体公司，成立于 2017
              年。公司设计自研神经处理单元（NPU）芯片，专门为边缘端深度学习推理优化——摄像头、汽车、工业系统、无人机和零售设备无需云连接也能运行 AI 应用。Hailo 的商业模式是无晶圆厂半导体 IP
              与芯片销售：Hailo 设计芯片，将制造外包给代工厂（主要是 TSMC），再向 OEM 客户以及 STMicroelectronics、Renesas 等分销伙伴销售芯片和模块。

              公司产品策略是把数据中心级 AI 性能放进边缘功耗包络。旗舰 Hailo-8 提供 26 TOPS（每秒万亿次操作），明显高于竞品 MCU 和 SoC 方案，同时功耗低于 5W。2024 年推出的
              Hailo-10H 面向边缘生成式 AI，提供 40 TOPS INT4 性能，并搭载板载内存，可运行最高约 60 亿参数的大语言模型。Hailo-15 系列把 AI
              计算、完整图像信号处理器（ISP）和编码器集成在一起，面向智能摄像头。收入来自芯片销售、模块销售以及软件授权 / 支持安排。

              Hailo 网站版权显示为「All Rights Reserved 2026 Hailo Technologies Ltd.」，截至 2026
              年研究日，活跃产品线覆盖五个不同芯片家族。公司在全球运营，分销覆盖大中华区、欧洲、印度、日本、北美和南美。Hailo 还获得过 EU Horizon 2020 R&I 资金（grant agreement No.
              849921），说明其获得欧洲创新机构认可。
