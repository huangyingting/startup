      - number: '5.2'
        title: 硬件架构、核心技术与 IP 差异化
        blocks:
          - type: paragraph
            body: >
              Hailo 的核心创新是 “Structure-Defined Dataflow”（SDF）架构——一种从零设计的神经处理单元，把通用 Von Neumann
              计算模型替换为固定功能硅布局，使其映射神经网络计算图。在 SDF 架构中，不同硬件核心分别负责不同操作类型（卷积、批归一化、池化、激活和逐元素运算），数据按映射到硅片上的计算图确定性流动，而不是在共享内存和
              ALU 之间循环。这消除了推理时拖累 GPU 和 CPU 效率的内存瓶颈，使 Hailo-8 能在低于 5W 功耗下达到 26 TOPS；公司称，在标准 DNN 推理负载上，其 TOPS/瓦表现比通用
              GPU/CPU 方案高一个数量级。

              SDF 方法本质上是面向神经网络的空间计算：计算过程静态且确定，因此功耗和延迟高度可预测。汽车和工业部署中，安全关键系统需要确定性的最坏情况执行时间保证，这种可预测性很有价值。Hailo-8 采用 TSMC
              16nm FinFET 制造；更新的 Hailo-10H 和 Hailo-15H 产品线预计会使用更先进的 TSMC 节点，以提高性能密度。IP 防御性来自 SDF 架构深度——客户必须使用 Dataflow
              Compiler，不存在通用 CUDA 式路径；同时，任意神经网络拓扑要映射到固定功能硅网格，需要完整重构编译器并投入大量系统工程。这会为已经按 Hailo
              优化模型流水线的客户制造切换成本，也会让编译器工具链复杂度成为潜在采用门槛。
