      - number: '2.2'
        title: TAM、SAM 与 SOM 测算
        blocks:
          - type: paragraph
            body: >
              根据 Precedence Research，全球边缘 AI 市场在 2025 年约为 $25.65B，预计 CAGR 为 20.46%，到 2035 年达到 $165.05B。北美在 2025 年约占 40%
              市场份额，折合约 $10B；亚太是增长最快的地区。软件板块是最大单一组成部分，边缘云基础设施是增长最快的子板块——两者都不属于 Hailo 的硬件芯片收入模式。

              对 Hailo 而言，相关 TAM 是边缘 AI 硬件加速器子板块。Precedence 另一份边缘 AI 硬件市场报告提供了更窄口径。Hailo 的 SAM 进一步受限于其主动推进的垂直领域：安防摄像头、汽车
              ADAS、工业自动化、机器人、零售和无人机。基于 Precedence 2025 年 TAM 以及垂直份额估计——安防和汽车是最大的 AI 硬件部署板块——Hailo 可触达 SAM 估计为 2025 年
              $5–8B，并随大盘按比例增长。

              可获取市场（SOM）目前无法验证，因为 Hailo 未披露收入、出货量或客户数量。Dahua Security、TT Control、Limelight 4 和 Evolv
              的设计定点表明公司有实质性量产部署，但部署规模未知。自 2022 年 5 月 Series C 以来四年没有进一步披露融资，可能说明现金流可持续，也可能只是延后披露；无论哪种情况，都不足以支撑高置信度 SOM
              估计。尽调应通过分销伙伴渠道数据或 TSMC 代工量承诺寻找收入代理指标。
