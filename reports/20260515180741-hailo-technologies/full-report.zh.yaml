      - number: '2.5'
        title: 测算缺口与矛盾证据
        blocks:
          - type: paragraph
            body: >
              在接受本章任何市场规模数字前，必须先标记多层证据不确定性。第一，Precedence Research 的 $25.65B TAM 是广义「边缘 AI 市场」，包括边缘云微型数据中心和软件平台——这些都不是
              Hailo 服务的板块。更窄的边缘 AI 硬件 NPU 芯片市场可能只有广义 TAM 的 20–40%，意味着 2025 年更保守的硬件 TAM 约为 $5–10B。这个区别会实质影响 Hailo 隐含的 SAM
              和估值倍数。

              第二，Hailo 没有披露收入、出货量、客户数量或毛利率，SOM 因而完全不透明。截至 2026 年研究日，没有独立分析机构报告（Gartner、IDC、Forrester）专门测算边缘 NPU
              芯片市场并给出厂商份额。Crunchbase 档案确认了 Series C，但没有经营指标。Crunchbase 档案的 Wayback Machine 存档也没有额外财务披露。因此，「早期渗透」的 SOM
              估计只是从设计定点证据推断出来，而不是有收入支撑的结论。

              第三，亚太市场动态——尤其是中国摄像头 OEM 对本土芯片（Rockchip、HiSilicon）的采用——可能实质性压缩 Hailo 在中国安防摄像头细分市场的可触达份额。AI
              半导体出口管制风险又进一步复杂化大中华区商业化。这些动态没有体现在广义 TAM 估计中，对 Hailo 而言构成有意义的 SAM 收缩风险。
            claimRefs:
              - CM036
              - CM037
              - CM038
