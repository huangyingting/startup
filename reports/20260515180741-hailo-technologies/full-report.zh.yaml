      - number: '4.2'
        title: 商业化动作与销售效率
        blocks:
          - type: paragraph
            body: >
              Hailo 的商业化动作以 OEM 为先、由分销商锚定。公司依赖两层渠道结构：Tier-1 分销协议（STMicroelectronics、Renesas、Arrow、Avnet）负责触达工业和摄像头 OEM
              采购，直接技术应用工程团队负责设计定点支持。2022 年 3 月宣布的 STMicroelectronics 合作，让 Hailo 接入 STMicro 的全球半导体分销网络，覆盖欧洲、美洲和亚太数万家 OEM
              客户。Renesas 设计协作则提供了进入日本和亚洲工业 OEM 买方的类似覆盖。

              消费者侧商业化是次级渠道：Raspberry Pi Foundation 合作把 Hailo-8L 集成为 AI HAT+ 计算单元，并通过 Raspberry Pi 授权经销网络销售。这个渠道不需要 9–18
              个月设计导入周期，就能大规模播种开发者社区，但单颗毛利低于 OEM 量产出货。通过 GitHub Model Zoo（600+ 星标）、community.hailo.ai 论坛和 hailo-platform
              PyPI 包形成的开发者社区，代表一种类似硬件初创公司开发者牵引的自下而上商业化拉力。不过，与 NVIDIA 的 NGC 模型注册库和 TensorRT 生态相比，这个生态仍很小。

              销售周期数据没有公开。嵌入式 AI 芯片的 OEM 设计导入周期，通常从初始评估到批量采购订单需要 9–18 个月。公开数据无法计算客户获取成本（CAC）和回本周期。Evolv、NTT Smart City 和
              Automata 部署确认至少三个企业或商业项目已经进入量产，但商业条款——单价、合同规模、出货承诺——未知。Hailo 公司概览提到超过 400 个设计定点合作，但其中量产与评估阶段的比例未披露、也未验证。
