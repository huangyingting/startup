      - number: '3.6'
        title: 图表与证据
        blocks:
          - type: callout
            title: 能效领先——Hailo-8 在 5W 以下类别拿到最佳 TOPS/W
            body: >
              Hailo-8 在低于 5W 下提供 26 TOPS，在独立基准测试的边缘 AI 芯片中，是其功耗类别里的最高
              TOPS/W。这一技术领先嵌在硅片中（结构定义数据流架构），竞争对手无法通过软件更新复制，并直接回应摄像头、无人机和机器人中电池供电、散热受限 OEM 设计的功耗预算约束。叠加
              STMicroelectronics 分销协议，Hailo 相对 NVIDIA 更高功耗的 Jetson 产品组合形成了可防守的细分市场位置。
            calloutType: strength
            claimRefs:
