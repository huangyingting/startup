          - type: callout
            title: CUDA 生态护城河——NVIDIA Jetson 锁定效应构成替代壁垒
            body: >
              NVIDIA Jetson 的 CUDA/TensorRT/DeepStream 生态是边缘 AI 中最深的开发者锁定。已经投入 TensorRT 模型优化、CUDA 自定义内核和 JetPack 集成的
              OEM，若切换到 Hailo，需要 3–6 个月重新工程化。HackerNews 和 Hailo 自有社区论坛的开发者社区显示，Hailo 经常被作为 Jetson
              的成本和功耗替代方案评估，但转化需要真实约束，而不是单纯偏好，Jetson 才会丢掉设计定点。这种存量优势意味着 Hailo 的增长主要受限于全新 OEM 设计，而不是替代活跃 Jetson 项目。
            calloutType: risk
            claimRefs:
