      - number: '6.2'
        title: 已披露客户佐证与采用证据
        blocks:
          - type: paragraph
            body: >
              最强的已披露客户证据来自开发者/maker 和工业板块。Raspberry Pi Foundation 的 AI HAT+ 产品线是知名度最高的公开客户佐证：Raspberry Pi 官方将 Hailo-8L 和
              Hailo-8 列为其 AI HAT+ 产品家族 2 个 SKU 的 AI 加速器，Hailo-10H 也出现在 AI Camera 产品中。这构成已确认的量产部署——AI HAT+ 是在 Raspberry
              Pi 官方商店上架的成品零售产品——而不只是参考设计或试点。Raspberry Pi 关系的战略价值不止于单位出货量：它带来开发者生态曝光、品牌背书，并让嵌入式开发者能低摩擦评估 Hailo
              硬件，再推荐进入量产设计。

              Advantech 在 MIC-AI730 和 AIR-030 AI 推理产品中集成 Hailo-8，这一点有 Advantech 产品 datasheet 记录，并由 Hailo 伙伴目录确认。Axiomtek
              的 AECG100 Edge AI Platform with Hailo-8 列在 Axiomtek 产品页。面向 Raspberry Pi 和嵌入式 Linux 社区的摄像头模块厂商 Arducam 提供兼容
              Hailo 的 AI 摄像头模块。ADLINK Technology 在其边缘计算组合中列出 Hailo AI 加速器模块。基于公开产品列表和 datasheet
              可得性，这些已点名工业部署处于活跃量产，而不是试点。

              汽车证据仍属间接：Hailo 官方汽车页面提到 ADAS、座舱 AI 和环视应用，并注明 AEC-Q100 资质和 ISO 26262 文档支持。但没有任何 Tier-1 汽车
              OEM——Bosch、Continental、Aptiv、Visteon、Denso 或其他公司——公开将 Hailo 认定为硅供应商。这并不罕见：汽车设计导入通常在量产 SOP 前处于 NDA
              之下；但也意味着，Hailo 声称的汽车管线无法通过公开证据独立验证。

              STMicroelectronics 和 Renesas 是已确认的分销伙伴，不是终端客户。两家公司的分销协议把 Hailo 的销售触达扩展到各自的嵌入式 OEM 客户基础——STMicro
              带来欧洲工业/汽车触达，Renesas 带来日本和亚洲嵌入式 OEM 关系。这些合作通过双方和 Hailo 的新闻稿得到确认。
