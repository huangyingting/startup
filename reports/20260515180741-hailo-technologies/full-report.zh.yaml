  - id: TV004
    title: 可比估值表
    enumerationScope:
      coverage: partial
      basis: >
        Selected comparables based on product adjacency, stage similarity, and publicly available financial data.
        Mobileye, Ambarella, Lattice, Astera Labs, and Kneron represent different facets of the edge AI chip and AI
        accelerator comparables universe as of May 2026.
    columns:
      - 可比对象
      - 使用指标
      - 倍数 / 估值
      - 阶段 / 收入可见度
      - 与 Hailo 的相关性
      - 局限
    rows:
      - - 'Mobileye（2022 年 10 月 IPO；NASDAQ: MBLY）'
        - IPO 时追踪收入约 $1.9B；企业价值约 $16B
        - 约 8x 追踪收入
        - 上市公司；经审计；具名 OEM 客户（BMW、Nissan、VW）；收入可见度强
        - 最可比的汽车 AI 芯片公司；同样聚焦 ADAS
        - Mobileye IPO 时收入 $1.9B，而 Hailo 估算为 $20–80M；阶段和规模差异显著
      - - 'Ambarella（NASDAQ: AMBA）'
        - FY2024 收入约 $220M；市值约 $2–3B（2025 年区间）
        - 约 9–14x 追踪收入（2023–2025 年区间）
        - 上市公司；经审计；具名客户；智能摄像头 design win 可见
        - 最接近的产品可比：用于摄像头和汽车 ADAS 的边缘视觉 AI 芯片
        - Ambarella 收入约为 Hailo 估算收入的 5-10x；有直接定价数据
      - - 'Lattice Semiconductor（NASDAQ: LSCC）'
        - 收入约 ARR $700M–900M；市值约 $6–10B 区间（2022–2024）
        - 约 8–15x 追踪收入；高毛利率（约 63%）支撑溢价
        - 上市公司；收入多元；FPGA / AI 推理与边缘工作负载重叠
        - 边缘 AI 推理重叠（基于 FPGA 的 NPU 竞争者）；高毛利半导体模式可比
        - 架构不同（FPGA）；收入基数大得多；不直接聚焦汽车
      - - 'Astera Labs（NASDAQ: ALAB；2024 年 3 月 IPO）'
        - IPO 企业价值约 $10B，彼时估算收入有限；AI 基础设施标的
        - '>20x 远期收入（IPO 时 AI 基础设施溢价）'
        - 上市公司；AI 基础设施互连；2024 年 IPO 市场给予 GenAI 基础设施溢价
        - 数据中心 AI 互连有重叠；显示市场愿为 AI 基础设施溢价付费
        - 终端市场不同（数据中心 vs 边缘）；IPO 时点受益于 GenAI 热潮
      - - Kneron（私营；AI NPU 初创公司）
        - 最近已知轮次累计融资约 $200M；估值约 $1B 区间（2022）
        - 未公开披露；约 $1B 区间可与尚未形成商业牵引的 Hailo 对比
        - 私营公司；财务披露有限；边缘 NPU 初创阶段可比
        - 阶段相近的直接私营同行；投资人类型相似
        - 无公开财务；客户证明有限；汽车聚焦弱于 Hailo
      - - NVIDIA Jetson（嵌入式，NVIDIA 旗下）
        - NVIDIA FY2025 总收入约 $130B；Jetson 嵌入式收入分部未拆出
        - N/A — 不是独立可比对象
        - 上市公司；生态占主导；开发者生态价值的间接基准
        - 为开发者生态价值和切换成本基准设置上限
        - 无法从 NVIDIA 整体业务中剥离；不适合直接比较倍数
    notes: |
      所有可比估值均基于公开财务数据。Hailo 收入估算为 ARR $20–80M；实际收入未披露。套用于 Hailo 估算收入的倍数仅供说明。2022-2023 年半导体行业估值收缩意味着不能适用 2021 年高峰倍数。
    claimRefs:
      - CV008
      - CV009
      - CV010
      - CV011
      - CV012
      - CV026
  - id: TV005
    title: 论点失效与终止触发项表
    columns:
      - 触发项
      - 阈值 / 终止事件
      - 对论点的传导
      - 行动含义
    rows:
      - - Q4 2026 前仍未宣布新融资
        - Series D 仍未宣布，且没有现金流为正运营的证据
        - 资本论点失效：公司可能陷入困境或重组；估值落入熊市情景
        - 暂停；任何承诺前要求完整财务披露；在最近已知估值基础上打 50%+ 折扣
      - - end-2026 尽调时仍无具名汽车 OEM
        - 即便在 NDA 和投资人确认框架下，也没有 Tier-1 OEM 愿意确认
        - 汽车收入论点失效；降级为仅工业 / 开发者业务模型
        - 将远期收入估算下调至 ARR $20–40M 区间；套用 Ambarella 式倍数 = $100–400M EV
      - - 现有具名客户确认 design win 流失给 NVIDIA / Qualcomm
        - Advantech、Axiomtek 或 RPi 在下一代产品中放弃 Hailo，改用替代平台
        - 商业护城河论点失效；需质疑其他客户是否会跟进
        - 重新评估 win rate 假设；提高竞争风险折扣
      - - TSMC 供应中断 >30 天
        - TSMC 确认暂停 Hailo 晶圆生产，或地缘政治事件扰乱台湾晶圆厂运营
        - 生存级供应风险；短期无可行缓释
        - 立即暂停投资；评估减值情景；每日监控 TSMC 形势
      - - 联合创始人离职（Orr Danon 或 Avi Baum 任一）
        - 公开宣布或确认任一联合创始人离职
        - 关键人员论点失效；投资人信心和 OEM 关系承压
        - 要求董事会和管理团队稳定计划；重新评估融资风险；可能暂停流程
      - - EU AI Act 不合规导致 OEM 拒绝
        - 具名欧盟 OEM 因 EU AI Act 文档失败拒绝 Hailo 芯片
        - 欧洲市场论点受损；客户集中风险上升
        - 要求 EU AI Act 合规路线图；问题解决前，对欧洲市场收入打折
    notes: |
      终止触发项是投资风险管理的监控阈值。这些事件不一定导致立即退出投资，但应触发强制复核，并很可能下调估值。
    claimRefs:
      - CV013
      - CV015
      - CV022
      - CV027
      - CV028
  - id: TV006
    title: 最终尽调要求表
    columns:
      - 主题
      - 缺失证据
      - 重要性
      - 负责人 / 尽调路径
    rows:
      - - 经审计财务报表
        - FY2022、FY2023、FY2024 利润表、资产负债表、现金流量表 — 均未披露
        - 缺少收入和烧钱速度，所有估值倍数只能套在估算区间上，不确定性 ±50%
        - Hailo CFO；在 data room 要求提供；向审计师（Ernst & Young 或同等机构）核验
      - - 汽车 design-win 管线（NDA 下）
        - 具名 OEM、design-in 阶段、SOP 目标、量产承诺、合同最低量
        - 汽车是牛市情景的主要驱动；管线质量决定 $2–4B 估值能否成立
        - Hailo CEO / CRO；需要 NDA；向 OEM 采购或供应链联系人核验
      - - ECCN 分类和中国出口管制意见
        - Hailo-8、Hailo-10H、Hailo-15H 的 Hailo 芯片 ECCN；EAR 合规法律意见
        - 若芯片受 EAR 管制，中国市场准入受威胁；可能涉及可服务 TAM 的 25-40%
        - Hailo 法务 / 合规团队；美国出口管制律师意见函
      - - 资本续航和 Series D 时间线
        - 当前现金及等价物；月度烧钱速度；Series D 流程是否已启动
        - 资本充足性是最有时间压力的风险；投资人承诺前必须确认现金续航
        - Hailo CFO；若流程已启动，询问 Series D 领投方；审阅融资讨论董事会会议纪要
      - - ISO 26262 ASIL-D 认证状态
        - ASIL-B 和 ASIL-D 正式安全论证文件；任何 Tier-1 OEM 安全验证证明
        - 最高价值自动驾驶项目必须具备；若没有 ASIL-D，汽车机会有上限
        - Hailo 汽车工程负责人；安全认证文件包；Tier-1 OEM 验证材料
      - - 竞争 win/loss 数据（过去 24 个月）
        - Hailo 赢下和输掉哪些 design competition；输给哪些竞争对手；按细分市场的 win rate
        - Win rate 是商业健康的领先指标；不利数据意味着竞争风险正在兑现
        - Hailo CRO / 销售；与 OEM 采购联系人交叉核验，以获得独立验证
    notes: |
      六项尽调均被列为当前 $1.13B 最近已知估值下投资决策的阻断项。部分回复（例如汽车管线只提供六项数据中的两项）应视为不足以支持完整承诺，但可支持较小的探索性仓位。
    claimRefs:
      - CV019
      - CV020
      - CV021
      - CV022
      - CV023
