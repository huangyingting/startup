      - number: '3.3'
        title: 能力、定价与商业化对比
        blocks:
          - type: paragraph
            body: >
              在性能维度，根据 Electronic Design 的 Hailo 与 NVIDIA 对比分析，Hailo-8（26 TOPS，<5W）在独立基准测试的边缘 AI 芯片中，拿到了 5W 以下类别最高的
              TOPS/W。NVIDIA Jetson Orin Nano 提供 40 TOPS，但功耗 10W——功耗翻倍，TOPS 只高 1.5 倍。Ambarella CV5 在 2–4W 下提供约 8 TOPS，原始
              TOPS 明显落后于 Hailo-8，但在安防摄像头 ISP 集成上更强。Intel Myriad X 在 1–4W 下仅提供 4 TOPS，绝对性能明显落后 Hailo。

              定价上，Hailo-8 和 Hailo-8L 据报在量产规模下单芯片价格为 $7–20，符合中端边缘 AI 平均售价（ASP）。NVIDIA Jetson Nano 开发套件为 $499，量产 SOM 定价据称为
              $100–250。Ambarella CV5 批量定价未披露，但估计在 $15–40 区间。这个定价位置说明，Hailo 的目标甜点是成本敏感的 OEM 设计；在这些设计里，Jetson 的功耗和成本太高。

              商业化和分销方面，Hailo 与 STMicroelectronics、Renesas 的合作借助成熟嵌入式系统销售网络，带来广泛 OEM 渠道覆盖。相较 Intel 面向 Myriad X 的直销模式和
              Ambarella 更有限的分销，这是一项有意义优势。Raspberry Pi AI HAT+ 合作提供了独特开发者心智，摄像头导向的竞争对手（Ambarella、NXP）都没有复制。NVIDIA
              的直销企业模式销售成本更高，但能触达更大的项目预算。STMicro 合作公告确认了一项覆盖 Hailo 全芯片线的全球分销协议，代表 Tier-1 分销商对其商业化的实质承诺。
