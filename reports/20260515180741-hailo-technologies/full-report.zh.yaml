  - number: 2
    title: 市场分析
    sections:
      - number: '2.1'
        title: 市场边界与定义
        blocks:
          - type: paragraph
            body: >
              Hailo Technologies 所处的是边缘 AI 推理芯片市场——它不同于云端和数据中心 AI
              加速器。市场边界包括硅片（芯片、SoC、模块）以及紧密配套的软件栈（编译器、运行时、模型库），这些产品在功耗受限的终端设备上执行深度学习推理，不依赖持续云连接。排除项包括云 GPU 租赁、服务器侧 AI
              推理、AI 训练硬件，以及广义 IoT 平台软件。现状替代方案是通用 CPU 和微控制器，它们在出货量上仍占主导，但无法匹配专用 NPU 的 TOPS/W 比率。值得跟踪的相邻市场包括带嵌入式 NPU
              的视觉处理器（Hailo-15 类别）、Ambarella 的 ISP-AI 一体化 SoC，以及外溢到工业部署的 Qualcomm 移动 AI 芯片组。

              市场研究中的定义张力很大：Precedence Research 对「边缘 AI」的定义很宽，把边缘云基础设施（带 GPU 的微型数据中心）也纳入其中，相比更窄的「边缘 NPU 芯片」定义，会抬高 TAM。对
              Hailo 而言，相关边界是功耗包络大约低于 10–15W 设备的硬件推理加速器市场，这与 Hailo-8、Hailo-8L、Hailo-10H 和 Hailo-15 产品家族匹配。这个更窄视角给出的 SAM
              估计更保守，但更可执行。Hailo 的六大垂直产品策略（安防、汽车、工业、零售、机器人、无人机）也说明，公司自己用部署场景而非芯片架构来定义其服务市场。
