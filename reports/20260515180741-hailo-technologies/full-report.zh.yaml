  - number: 3
    title: 竞争格局
    sections:
      - number: '3.1'
        title: 竞争格局概览
        blocks:
          - type: paragraph
            body: >
              2026 年的边缘 AI 推理芯片市场至少包含六个不同竞争层级，没有任何厂商在所有功耗包络和垂直领域建立主导地位。高性能层级（10–275 TOPS，10–60W）中，NVIDIA Jetson Orin
              是主导存量玩家，拥有庞大的 CUDA/TensorRT 生态和数百万已部署设备。在视觉 SoC 类别（面向摄像头、集成 ISP+AI+编码器的芯片）中，Ambarella CV3 和 CV5 是
              Hailo-15H 的主要竞争对手。在超低功耗 MCU 类别（<1 TOPS，<0.5W）中，ARM Ethos NPU IP 和 NXP i.MX Series 通过 MCU
              级集成竞争。在中端边缘推理类别（4–30 TOPS，1–6W）中，Hailo-8 面临范围更窄但更尖锐的竞争，竞品包括 Intel Movidius Myriad X（停产中）、Qualcomm QCS 工业
              SoC 和 Rockchip RK3588。

              现状替代方案仍然普遍：大多数已部署工业摄像头和嵌入式系统仍在 Raspberry Pi Compute Module、Jetson Nano 或嵌入式 x86 处理器上用 CPU/GPU 推理。「什么都不做 /
              云端推理」也是重要替代方案——早期采用阶段的 OEM 经常先用云 AI API 做原型，再决定是否投入端侧硅片。大型 OEM 自研芯片（例如 Dahua 在 Hailo 部署之外也有自己的 AI
              芯片部门）是高出货量客户的潜在进入者风险。最可能的新进入者是中国本土 NPU 厂商（Rockchip、BM1684、Kneron），它们可能通过本地采购偏好在大中华区安防摄像头细分市场替代 Hailo。
