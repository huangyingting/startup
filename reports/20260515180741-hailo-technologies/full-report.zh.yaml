      - number: '4.3'
        title: 成本结构与毛利率
        blocks:
          - type: paragraph
            body: >
              作为无晶圆厂半导体公司，Hailo 的销货成本主要包括支付给合同制造商的晶圆制造成本（技术材料中的制程节点引用广泛暗示
              TSMC，但没有公开确认的供应合同），再加上芯片封装、测试和物流。固定研发成本——芯片设计、EDA 工具、IP 授权、流片后验证——在标准半导体会计下作为运营费用而非 COGS 处理，因此 Hailo
              规模化后结构上具备高毛利率特征。

              可比无晶圆厂边缘 AI 和计算机视觉芯片公司基准支持 Hailo 芯片线 50–65% 的毛利率区间。Ambarella（AMBA）是商业模式上最可比的上市计算机视觉 SoC 公司，2022–2024
              年滚动毛利率约为 55–65%。Electronic Design Magazine 的独立基准发现，Hailo-8 在 5W 以下类别的 TOPS/W 优于 Jetson
              Orin，这与溢价定价和利润率定位一致。按 Hailo-8 估计量产 ASP 的低端 $7/chip 和 50% 毛利率计算，单芯片毛利约 $3.50；按 $20/chip ASP 和 65% 毛利率计算，毛利约
              $13/chip。这些估计的置信度很低。

              运营费用主要由研发薪酬驱动。按估计 200–300 名员工计算——核心是特拉维夫总部的芯片工程师，以及软件和销售工程师——基于以色列科技行业薪酬基准，年度工资和福利支出估计为
              $30–60M。叠加市场营销、G&A、EDA 工具和 IP 授权，总运营费用大约可能为每年 $35–70M。轻资产无晶圆厂模式避免了制造 CAPEX，但 Hailo
              仍需承担非经常性工程（NRE）和流片费用（先进节点单次流片通常 $5–20M），这些费用会按里程碑达成情况资本化或费用化。公开记录没有 CAPEX 承诺或制造投资。
