      - number: '6.4'
        title: 留存可见度、扩张潜力与集中度风险
        blocks:
          - type: paragraph
            body: >
              Hailo 没有披露任何客户留存指标：NRR、GRR、流失率、合同续约数据或客户满意度分数在任何板块都不可公开获得。半导体 OEM
              模式通常在活跃设计家族内部呈现高留存（芯片一旦设计导入，就会贯穿产品生命周期），但收入跟随量产出货，而不是订阅付款。对于 Advantech 和 Axiomtek 这样的工业 OEM
              客户，跨产品世代的重复合作是强留存信号——两家公司都继续推出新的 Hailo 集成产品，说明商业关系仍然健康——但出货量数据没有披露。

              集中度风险重大且不对称。未具名汽车 OEM 管线代表潜在最大收入机会，也承载最高执行不确定性：汽车设计周期从设计导入到 SOP 通常需要 3–5 年；如果规划中的汽车项目无法转化为 SOP
              收入，商业基础就会回落到 ASP 更低的工业和开发者渠道。反向分析师指出，Hailo 自 2022 年 5 月 Series C 以来 4
              年融资空窗，意味着公司要么有强有机现金生成（无法验证），要么存在资本约束；如果汽车管线不能落地，后者可能挤压商业策略。

              扩张路径包括：（1）新一代芯片（面向边缘生成式 AI 的 Hailo-10H 创造新客户机会）；（2）通过 Renesas 和 STMicro
              渠道在亚洲做地域扩张；（3）进入机器人、无人机和工业检测等垂直领域；（4）如果 Hailo 向上游软件栈移动，可能产生专业服务或软件层收入。除现有 OEM 渠道外，这些扩张路径均未确认客户牵引。
