      - number: '1.5'
        title: 规模指标、覆盖缺口与反向信号
        blocks:
          - type: paragraph
            body: >
              Hailo 是私营公司，运营规模很难精确评估。根据 LinkedIn 指标以及其在芯片设计、软件和商业化职能上的工程运营规模，公司大约有 200–300 名员工。Hailo
              未公开披露收入、客户数或出货量。Raspberry Pi AI HAT+ 集成自 2023 年 6 月出货，为 Hailo-8L 芯片在大众消费价格带的出货量提供了间接证据。

              公开记录中的关键缺口包括：没有披露收入（哪怕区间）、没有出货量、没有客户数量、没有毛利率数据，对 IP 授权收入与芯片 / 模块销售之间的拆分信息也有限。公司的下一轮融资或退出路径未说明。Hailo-8
              Commercial Version IC 的停产通知（由 Industrial Version IC 替代）是一个小型反向信号，暗示早期产品代际存在挑战；不过这次切换看起来受控，Industrial
              版本仍处于活跃状态。

              反向因素包括：作为以色列半导体公司，在地区紧张局势（2023 年 10 月冲突及后续）中承受地缘政治风险；AI 芯片技术可能受到出口管制；NVIDIA Jetson Orin
              更激进进入边缘市场，带来竞争护城河风险；以及广泛市场覆盖高度依赖单一主要分销伙伴 STMicroelectronics
              的集中度风险。公司把自身架构类比为「数据中心级」性能，这是公司口径，尚未被同行评议文献独立验证，不过 Raspberry Pi 基准测试提供了部分佐证。
