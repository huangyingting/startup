  - number: 5
    title: 产品与技术
    sections:
      - number: '5.1'
        title: 产品线、SKU 与客户用例
        blocks:
          - type: paragraph
            body: >
              Hailo Technologies 提供 5 款不同芯片产品，覆盖不同边缘 AI 性能层级和部署场景。Hailo-8（26 TOPS、<5W、TSMC 16nm）是旗舰边缘 AI
              推理加速器，支持目标检测、分割、分类、姿态估计等通用计算机视觉任务。Hailo-8L（13 TOPS）面向成本和功耗敏感、吞吐量要求较低的应用，也是 Raspberry Pi AI HAT+
              内部使用的芯片（零售价约 $70）。Hailo-10H（40 TOPS INT4 / 20 TOPS FP16）定位为生成式 AI 边缘处理器，于 2024 年发布，设计目标是在 M.2 模块上本地运行最高约
              6B 参数的大语言模型，不依赖云连接。Hailo-15H 将 20 TOPS AI 算力与完整 Image Signal Processor（ISP）、H.265/H.264 编码器和 4K
              传感器输入支持集成在一起，面向监控、零售分析和工业检测中的智能摄像头 SoC。Hailo-15L 为成本敏感型摄像头应用提供入门级视觉处理。

              关键客户用例横跨 4 个垂直领域：（1）智能安防摄像头——单颗 Hailo-15H SoC 上的多路视频分析；（2）汽车 ADAS——AEC-Q100 认证形态中的 Hailo-8
              负责多传感器目标检测、行人/车辆分类和车道分割；（3）工业机器视觉——Axiomtek 和 Advantech 平台上的缺陷检测、条码/OCR 读取和质量检测；（4）开发者和 maker
              社区——Raspberry Pi AI HAT+ 让 YOLO 级模型能在低于 5W 功耗下快速原型验证。垂直覆盖面说明产品有灵活性；Raspberry Pi
              的导入则带来高出货量消费级渠道需求，独立于企业设计导入周期持续产生芯片订单。
