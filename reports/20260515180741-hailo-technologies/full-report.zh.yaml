          tone: warning
        - id: renesas
          label: Renesas Electronics
          detail: 亚洲 / 日本分销和汽车渠道伙伴
          tone: warning
        - id: rpi
          label: Raspberry Pi Foundation
          detail: 开发者生态锚点；AI HAT+ 产品提供开发者漏斗
          tone: positive
        - id: auto-oems
          label: 未具名汽车 OEM
          detail: 主要收入机会；design-in 状态未验证；名称未披露
          tone: negative
        - id: osat
          label: OSAT 封装供应商
          detail: 先进芯片封装；Hailo-10H 用 CoWoS 或同等方案
          tone: warning
        - id: investors
          label: Series D 投资人（所需）
          detail: 需要未来融资；截至 May 2026 无披露承诺
          tone: negative
        - id: eu-regulator
          label: EU AI Act 监管方
          detail: 针对汽车和监控客户的 EU AI Act 合规要求
          tone: warning
        - id: bis-gov
          label: 美国 BIS 出口管制
          detail: 美国工业与安全局；影响 AI 芯片对华销售的出口规则
          tone: warning
