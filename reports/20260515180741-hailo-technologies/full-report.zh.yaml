  - number: 7
    title: 风险
    sections:
      - number: '7.1'
        title: 技术与竞争风险
        blocks:
          - type: paragraph
            body: >
              Hailo 最持续的结构性风险来自 NVIDIA Jetson 的生态竞争。NVIDIA 已经建立起由 CUDA、TensorRT、DeepStream、Isaac ROS 构成的开发者生态，拥有数百万已部署
              Jetson 设备、完整模型支持和持续开发者工具投入。即便 Hailo 提供更好的 TOPS/瓦，已经熟悉 TensorRT 的 OEM 工程师仍有强切换成本留在
              NVIDIA：软件集成工作、调试工具链和开发者论坛支持在 NVIDIA 生态中深得多。这不是技术落后判断——Hailo-8 的 26 TOPS、低于 5W，功耗效率确实优于 Jetson Orin Nano（40
              TOPS、10W）——但 SDK 切换成本构成了持久竞争壁垒。

              Hailo 的 Structure-Defined Dataflow 架构要求神经网络模型在部署前由 Hailo Dataflow Compiler
              编译成硬件执行图。这个编译步骤引入模型兼容性风险：并非所有神经网络架构都能顺利映射到数据流图结构；新型模型架构（例如重 transformer 的视觉模型、扩散模型）可能需要大量工程工作才能高效编译。Hacker
              News 和嵌入式工程论坛上的开发者社区反馈持续指出，相比 NVIDIA TensorRT “一次编译，到处运行”的体验，Hailo 的编译器工作流是摩擦点。

              Qualcomm（Snapdragon X）、MediaTek（Dimensity）、Samsung（Exynos）和 NXP（i.MX）把 NPU 集成进主流 SoC，构成较长期的结构性威胁：如果每颗主 SoC
              都内置足够好的片上 NPU，Hailo-8 这类离散独立 AI 加速器的价值主张会被削弱。对于当前 SoC NPU 性能仍不足的汽车或工业应用，这还不是迫近风险；但放在 5–10
              年维度看，这是战略风险。Qualcomm 的 AI 100 和 QCS8550 已经面向工业推理和机器人，提供集成 wireless+NPU 的方案，降低 OEM 设计者的 BOM 复杂度。

              Hailo-10H（40 TOPS INT4，边缘生成式 AI）打开了新的竞争维度：端侧 LLM 推理。这个市场仍处早期，竞争格局尚未定型，但 Apple（Neural
              Engine）、Qualcomm（Snapdragon 中的 NPE）和 Google（Edge TPU）都在投资端侧 AI 推理。Hailo-10H 在 sub-5W 细分市场的差异化，可能在竞争对手追平前提供
              12–24 个月窗口。
