        - 核验 Hailo 的 EU AI Act 产品文档包；至少与一家具名欧洲 OEM 确认
      - - 美国 BIS 出口管制规则（Oct 2022、Oct 2023）— 对华 AI 芯片出口限制
        - 美国联邦
        - 生效中；BIS Entity List 和 AI 芯片管制
        - 中 — Hailo 芯片由 TSMC 代工（涉及美国技术）；中国敞口不清楚
        - 高 — 若管制收紧，可能失去中国市场；安防监控是关键用例
        - Hailo 必须跟踪 BIS Entity List 新增主体；保留美国法律顾问处理 EAR 合规
        - 中 — 取决于具体芯片参数相对 BIS 阈值；需取得 EAR99 / ECCN 分类
        - 索取 Hailo 全部 SKU 的 ECCN 分类；评估哪些芯片为 EAR99、哪些受控
      - - ISO 26262 功能安全 — 自动驾驶 ASIL-D 要求
        - 国际（汽车行业）
        - 事实标准；Tier-1 OEM 的 ASIL-D 应用要求具备
        - 高 — Hailo 支持 ISO 26262 文档，但 ASIL-D 完整认证状态不清楚
        - 高 — 若无法达到 ASIL-D，将失去最高等级汽车设计赢单
        - AEC-Q100 提供组件可靠性基础；ASIL-D 还要求形成正式 safety case
        - 重大 — 需要 ASIL-D 的汽车设计可能只能限于较低自动驾驶等级
        - 通过 Tier-1 伙伴推荐人确认 Hailo 的 ISO 26262 ASIL-B/ASIL-D 认证状态
