      - number: '8.2'
        title: 可比估值分析
        blocks:
          - type: paragraph
            body: >
              Hailo 没有披露收入，因此基于可比公司的估值必须先估算收入，再应用适用的公开市场倍数。半导体市场在 2022–2023 年大幅重估，边缘 AI 芯片公司交易倍数从 2021 年峰值的 15–30x 降至
              3–15x forward revenue。当前基准显示：

              最可比的汽车 AI 半导体公司 Mobileye，于 2022 年 10 月以约 $16B 企业价值 IPO，当时 trailing revenue 约 $1.9B，意味着约 8x trailing
              revenue。Mobileye 在 IPO 时拥有来自多个具名 OEM 客户（BMW、Nissan、Volkswagen 等）的可见、经审计收入——证据门槛明显高于 Hailo 目前水平。如果 Hailo
              达到类似 Mobileye 的收入牵引和可见度，在 3–5 年退出周期上，$2–4B 企业价值可能说得通。

              最接近的公开可比公司 Ambarella（面向摄像头和汽车的边缘 AI 视觉芯片）在 2023–2025 年以 4–10x revenue 交易，FY2024 收入约 $220M。对 Hailo 估计
              $30–80M ARR 收入区间应用 5–10x 倍数，隐含企业价值为 $150M–$800M——显著低于 Hailo 最后已知 $1.13B 估值。这说明在当前 $1.13B 标记下，Hailo
              要么被定价为收入高于当前估计，要么被赋予了反映预期汽车 SOP 收入的前瞻增长溢价。

              Lattice Semiconductor（边缘 FPGA/AI 推理）在 2022–2025 年以 10–20x revenue 交易，ARR 约 $700M–900M，对应 $7B–18B
              市值——溢价来自无晶圆厂半导体公司常见的高毛利率（60%+）。Hailo 的毛利画像未知，但可能相似。Astera Labs（AI 基础设施连接）在披露收入有限的情况下以约 $10B 估值 IPO，说明市场愿意为
              GenAI 基础设施支付溢价。两家公司由于终端市场和商业阶段不同，都不能直接套用到 Hailo。
