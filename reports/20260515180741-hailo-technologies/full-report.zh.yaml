      - number: '1.2'
        title: 创始人、领导层与治理
        blocks:
          - type: paragraph
            body: >
              Hailo 由 Orr Danon（CEO）、Avi Baum（CTO）、Hadar Zeitlin 和 Daniel Schillo 于 2017 年共同创立，四人都来自以色列精英军事情报 8200
              部队和半导体行业。CEO Orr Danon 此前在 Motorola 和 Intel Israel 任职，在信号处理和芯片架构上积累很深。CTO Avi Baum 拥有电气工程高等学位，曾在
              Intel/Mobileye 参与深度学习硬件。两位创始人一开始就押注同一个判断：冯·诺依曼架构做深度学习本质上效率低下，专用的「结构定义数据流」架构会主导边缘推理。

              现任高管团队包括 Yaron Garmazi（CFO & COO）、Max Glover（CRO，首席营收官）、Moran Kogan Dori（人力资源 VP），以及分管研发、系统、产品和 Physical
              AI 的 VP 级负责人。以 Hailo 所处阶段看，这套班底深度值得注意，说明组织成熟度高于典型 Series C 初创公司。关键人风险为中等：CEO Orr Danon 和 CTO Avi Baum
              是公司技术愿景与投资人关系的核心，但 VP 级团队提供了连续性。

              董事会构成没有完整公开，但已知拥有董事会席位的机构投资者包括 General Catalyst、Berkshire Partners、NEC、Munich Re Ventures 和 ABB Technology
              Ventures。以色列 VC Awz Ventures 也是投资方。作为以色列公司，Hailo 面临地缘政治治理议题，包括 AI 芯片技术可能被以色列国防部门纳入出口管制和军民两用分类。
