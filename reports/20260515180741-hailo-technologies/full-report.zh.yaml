      - number: '3.5'
        title: 护城河耐久性、商品化风险与反向证据
        blocks:
          - type: paragraph
            body: >
              Hailo 的主要护城河是结构数据流架构——这是嵌入硅片的真实架构差异，若没有大量研发投入，很难复制。不过这条护城河正在边缘被侵蚀：ARM Ethos NPU 正以很低的额外硅成本被越来越多主流 SoC
              集成，中国本土 NPU（Rockchip RK3588 NPU）也在摄像头应用中缩小 TOPS/W 差距。生成式 AI 边缘定位（Hailo-10H）是领先当前竞争的战略动作，但 NVIDIA 即将推出的嵌入式
              Orin NX 后续代际，以及 Qualcomm 路线图，都会在 12–18 个月内覆盖同一细分市场。

              开发者社区的反向证据指向两类反复出现的风险。第一，Hailo Dataflow Compiler 的复杂度造成明显开发者摩擦——2022 年一条 Hacker News 讨论提到模型移植、编译时间和 SDK
              版本管理上的痛点。这些社区信号说明 Hailo 的开发者体验可能明显落后 NVIDIA。第二，Hailo-8 Commercial IC EOL（由 Industrial IC 做生命周期替换）给已部署
              Commercial IC 的 OEM 带来供应链切换风险，可能扰动活跃量产项目。

              出口管制风险是最难量化的竞争护城河破坏因素。如果 Hailo 芯片被归为受以色列出口管制规则约束的军民两用 AI 半导体，或如果 US BIS 把实体清单或技术管制扩展到覆盖 Hailo
              架构，大中华区分销可能遭到严重削弱。基于 APAC / 大中华区安防摄像头部署份额估计，这会让 Hailo 的 TAM 减少约 30–40%。
