            body: >
              Hailo 已在至少四个不同垂直领域拿到已确认的量产部署：安防摄像头（Dahua Security）、工业自动化（TT Control 越野 ECU）、智能安检（Evolv eXpedite）以及创客 /
              开发者细分市场（Raspberry Pi AI HAT+ 和 AI HAT+ 2）。这些跨垂直胜利降低了单一细分集中度风险，也证明 Hailo 芯片家族已在不同运行环境中通过量产资格验证。
