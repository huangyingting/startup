      - number: '7.3'
        title: 地缘政治、出口管制与监管风险
        blocks:
          - type: paragraph
            body: >
              Hailo 注册并总部位于以色列。2023 年 10 月显著升级的以色列-哈马斯冲突，为所有以色列科技公司引入多维运营风险。以色列法律要求多数服役年龄男性公民服预备役（miluim），重大军事征召（如 2023
              年 10 月及随后发生的征召）会直接减少工程人力。行业报告显示，2023–2024 年，预备役征召使以色列科技公司整体经历了 10–20% 的临时人员减少，部分时期扰动显著。对于一家 200–300
              名工程师的公司，高峰征召期间可能意味着 20–60 名工程师同时不可用。Hailo 没有披露运营影响，但以色列媒体报道，该国创业生态整体遭受明显扰动。

              Hailo 潜在中国市场存在重大出口管制风险。美国工业与安全局（BIS）通过 Entity List 以及 2022 年 10 月和 2023 年 10 月的出口管制规则，逐步收紧对先进 AI
              加速器的出口限制。Hailo 芯片由 TSMC 代工（因 TSMC 使用美国技术许可而受美国出口管制影响），且 Hailo 是以色列公司（在 BIS
              当前框架下不直接受对中国出口限制约束），但更广泛的地缘政治环境给 Hailo 在大中华区销售制造了不确定性——该地区是智能城市和监控 AI 芯片的重要市场。任何美国-中国技术脱钩升级，只要把 TSMC 代工的
              AI 芯片纳入更严格管制，都可能损害 Hailo 的中国市场准入。

              2024 年 8 月生效的欧盟《人工智能法案》（EU AI Act）对部署在高风险场景的 AI 系统施加风险分类要求，包括汽车 ADAS、生物识别监控和关键基础设施。Hailo
              的汽车和监控客户直接落在高风险类别，需要合规评估、AI 组件的 CE 标识和技术文档。Hailo 必须确保芯片和配套软件文档能帮助 OEM 客户履行 EU AI Act 义务——这会增加欧洲销售流程中的合规开销。

              Hailo 单一依赖 TSMC 代工，形成地缘政治集中度风险：如果台海紧张升级为军事冲突，或美国-台湾半导体供应链限制落地，Hailo 的先进制程芯片没有替代代工厂。TSMC 是唯一能够提供 Hailo
              当前硅片所需 7nm/5nm 节点的代工厂；Samsung 和 Intel Foundry Services 对 Hailo 这一级别公司并非可行替代。
