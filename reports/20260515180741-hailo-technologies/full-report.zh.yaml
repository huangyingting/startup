      - number: '5.4'
        title: 信任、合规、部署架构与产品路线图
        blocks:
          - type: paragraph
            body: >
              Hailo 已投入汽车和工业市场准入所需的信任与认证基础设施。Hailo-8 已取得 AEC-Q100 Grade 2 汽车资质，证明芯片能在汽车温度和可靠性要求下稳定运行，也是 Tier-1 OEM
              评估的前提。公司提供支持 ISO 26262 ASIL 合规分析的功能安全文档；不过，完整 ASIL-B/C/D 认证通常需要 OEM
              层面的系统集成分析，不能只靠芯片级资质。面向智能摄像头市场，Hailo-15H 将 AI 算力、ISP 和编码器整合进单芯片，并采用加固计算架构，减少系统组件数量，从而简化安防摄像头 OEM 认证。

              软件信任层面，Hailo Dataflow Compiler 和模型编译流程引入了 IP 考量：编译后的 Hailo
              二进制模型与硬件锁定，无法轻易提取或在竞品硬件上执行，为部署自有训练模型的客户提供一定程度的模型 IP 保护。作为以色列 AI 芯片公司，Hailo 存在出口管制风险：以色列出口法下的两用分类，以及汽车 AI
              芯片可能涉及的美国 ITAR/EAR 考量，都需要法律审查。

              产品路线图显示，公司仍在当前 5 芯片家族之外积极开发。Hailo-10H（2024 年推出）代表首款生成式 AI 边缘推理芯片，面向正在出现的本地 LLM 市场（保护隐私的 AI
              助手、端侧处理）。Physical AI——用于自主操作的机器人感知——截至 2026 年也是活跃应用开发方向。Hailo 参加 Computex 2026 和 XPONENTIAL
              2026（无人机/机器人展会），说明公开确认范围之外仍有持续产品开发公告。公司 2026 年的市场定位暗示 Hailo-10H 之后还有下一代芯片，但尚未正式披露。
