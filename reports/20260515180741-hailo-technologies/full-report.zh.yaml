              截至 2026 年 5 月，Hailo 未披露收入、出货量、毛利率或客户数量。自 Series C（2022 年 5
              月）以来四年没有进一步披露融资，意味着没有公开融资事件可以锚定收入估计。设计定点确认了市场牵引力，但无法量化规模。因此，SOM 渗透率只能推断，不能实测；现阶段任何基于收入的估值倍数本质上都带有投机性。
