      - - 软件 IP / 模型安全
        - 编译后的 Hailo 二进制模型与 Hailo 硅片硬件锁定
        - DFC 编译模型无法在非 Hailo 硬件上执行
        - 模型可移植性有限；已部署模型会让客户部分锁定 Hailo 硬件
      - - GDPR / 数据隐私（摄像头应用）
        - 取决于 OEM/系统集成商实现；不由 Hailo 直接负责
        - 端侧推理减少数据传输，有助于摄像头分析满足 GDPR
        - Hailo 不认证终端系统隐私合规；取决于客户实现
    notes: 合规状态基于 Hailo 官方质量页面和汽车文档。第三方认证审计未公开。
