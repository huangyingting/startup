      - CE011
      - CE012
      - CE031
      - CE038
    data:
      layers:
        - label: 客户应用层
          detail: OEM 产品固件、智能摄像头分析应用、汽车 ADAS 栈、Raspberry Pi 创客项目，以及使用 TAPPAS 或自定义管线的工业检测系统。
          tone: positive
        - label: TAPPAS 应用框架
          detail: 基于 GStreamer 的多路视频 AI 管线框架。简化摄像头分析管线构建。依赖：GStreamer 开源生态。
          tone: neutral
        - label: Hailo Model Zoo + HailoRT Runtime（软件运行层）
          detail: 100+ 预编译模型（YOLOv5/8、ResNet、EfficientDet）。HailoRT 管理推理执行、排队和 PCIe / SPI 传输。在主机 Linux / 嵌入式 OS 上运行。
          tone: positive
        - label: Hailo Dataflow Compiler（DFC v3 / v5，数据流编译器）
          detail: 将 PyTorch / TensorFlow / ONNX 模型转换为 Hailo 硬件二进制。执行量化、图优化和 SDF 映射。开发者采用的关键瓶颈。
          tone: warning
        - label: Hailo SDF 硅片（Hailo-8 / 8L / 10H / 15H / 15L）
