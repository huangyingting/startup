          - type: callout
            title: 15W 以下边缘 AI NPU 尚无主导厂商——市场仍在混战
            body: >
              尽管 NVIDIA 在 10W 以上占据主导，15W 以下边缘 AI NPU 市场截至 2026 年仍然碎片化，没有单一厂商份额估计超过 25–30%。Hailo、Ambarella、Intel、NXP 和
              Qualcomm 都在相互重叠但不同的细分中竞争，并各自在主要细分市场拥有可防守位置。这种碎片化有利于 Hailo 的多垂直策略，但也意味着，只要 Hailo
              在某个垂直没有主导设计定点，该垂直仍会处于竞争中，并容易被资源更强、拥有相邻垂直经验的竞争对手替代。
