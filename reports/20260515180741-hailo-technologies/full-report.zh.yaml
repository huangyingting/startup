  - number: 6
    title: 客户情况
    sections:
      - number: '6.1'
        title: 客户分层与垂直优先级
        blocks:
          - type: paragraph
            body: >
              Hailo 面向 4 类不同客户，每类客户的买方画像、设计周期和收入潜力都不同。汽车 Tier-1 板块代表最高 ASP 机会，也是 Hailo 对外沟通中最清晰的战略意图：Hailo-8 已获 AEC-Q100
              认证，公司向 Tier-1 伙伴提供 ISO 26262 功能安全文档。Hailo 的新闻材料和投资人沟通中提到多个未具名汽车 OEM 合作，但截至 2026 年 5 月，没有任何 OEM 被公开点名为量产客户。

              工业嵌入式计算板块给出了目前最清晰的商业采用证据。Advantech 是全球最大的嵌入式计算 OEM 之一，FY2023 收入 $1.9B，在 MIC 和 AIR 产品家族中推出多款集成 Hailo-8 的 AI
              推理板卡。Axiomtek 是具备全球分销能力的台湾嵌入式计算厂商，出货集成 Hailo-8 的 AECG100 edge AI 平台。另一家大型嵌入式 OEM ADLINK Technology
              也在产品组合中列出 Hailo AI 加速器模块。这 3 家工业客户合计覆盖工业自动化、机器视觉和智能制造等垂直领域，具备有意义的出货量。

              由 Raspberry Pi AI HAT+（2023 年 11 月推出）锚定的开发者和 maker 生态，提供了最大的单位出货信号。Raspberry Pi 全产品线每年销量约 7 million 块板卡；AI
              HAT+ 在这个装机基础中的采用量尚未量化，但考虑到 HAT+ 在 Raspberry Pi 官方产品目录中的醒目位置，方向上偏正面。标准 AI HAT+ 由 Hailo-8L（13 TOPS）驱动；AI
              HAT+ 2 由 Hailo-8（26 TOPS）驱动。活跃 GitHub 仓库、教程内容和 Hacker News 社区讨论进一步反映了开发者参与度；不过，开发者社区也将非轻微的 SDK 复杂度列为摩擦点。

              智能摄像头和监控板块（Axis、Hikvision、Bosch Security、Hanwha）是目标垂直领域——Hailo-15H SoC 专为 AI 摄像头应用设计，集成 ISP、编码器和 AI 加速器。截至
              2026 年 5 月，尚无监控摄像头 OEM 被点名确认为 Hailo 客户或量产伙伴。
