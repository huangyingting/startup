              $2.5–5M 的基准烧钱假设，Series C 资金到 2025 年 Q1–Q2 已基本消耗。这个空窗要求立即开展财务尽调：在任何估值或投资分析推进前，先索取经审计财务报表、当前现金余额和月度烧钱速度。
