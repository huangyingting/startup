          tone: positive
  - id: FE002
    title: 客户工作流和运营流程
    type: flow
    layout: wide
    summary: |
      从客户选择神经网络模型，到编译、硬件集成、在 Hailo 边缘 AI 芯片上量产部署的分步流程，展示开发者或 OEM 必须走完的四个阶段。
    claimRefs:
      - CE010
      - CE013
      - CE015
      - CE024
      - CE032
      - CE035
    data:
      nodes:
        - id: model-select
          label: 1. 模型选择
          detail: 客户在 PyTorch 或 TensorFlow 中选择或训练 DNN 模型。可使用 Hailo Model Zoo 的常见任务预训练模型（YOLO、ResNet），或训练自定义模型。
          tone: positive
        - id: dfc-compile
          label: 2. DFC 编译
          detail: 模型通过 Hailo Dataflow Compiler（DFC）编译。自定义模型需要量化感知准备。通过迭代 profiling 验证架构兼容性。
          tone: warning
        - id: hardware-integrate
          label: 3. 硬件集成
          detail: Hailo-8 / 10H / 15H 芯片集成进 OEM PCB，或通过 M.2 模块接入。HailoRT 安装在主机处理器上。配置 TAPPAS 以适配管线架构。
          tone: neutral
        - id: validation
          label: 4. 验证和调优
          detail: 量化后验证推理准确率。可能需要按模型调优。汽车部署需要 AEC-Q100 测试。
          tone: neutral
        - id: production
          label: 5. 量产部署
          detail: 通过 Hailo 直销或 STMicro / Renesas 分销下达批量芯片订单。OEM 出货内嵌 Hailo 芯片的产品。通过 HailoRT 进行软件更新。
          tone: positive
      edges:
        - from: model-select
          to: dfc-compile
          label: PyTorch / ONNX 模型
        - from: dfc-compile
          to: hardware-integrate
          label: 已编译 HEF 二进制
        - from: hardware-integrate
          to: validation
          label: 系统测试
        - from: validation
          to: production
          label: 批量批准
