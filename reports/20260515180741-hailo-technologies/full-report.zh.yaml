      - number: '7.4'
        title: 运营、供应链与人员风险
        blocks:
          - type: paragraph
            body: >
              Hailo 采用无晶圆厂半导体模式，将芯片制造外包给 TSMC，将封装/测试外包给亚洲 OSAT（外包半导体封装测试）供应商。该模式消除了自建晶圆厂的资本开支，但制造了集中供应链风险。除上文提到的 TSMC
              地缘政治风险外，先进半导体供应链在 2020–2022 年经历显著扰动（COVID 相关晶圆厂产能约束），又在 2024 年再度紧张（先进封装短缺、AI 芯片项目导致 CoWoS 需求饱和）。像 Hailo
              这样的小型无晶圆厂公司，在 TSMC 产能分配中的优先级低于 NVIDIA（数据中心收入 $44B），存在 tape-out 排期或晶圆分配延迟风险。

              关键人风险集中在 Hailo 两位联合创始人：CEO Orr Danon 和 President/CTO Avi Baum。公司沟通将两人描述为主要技术和商业愿景驱动者。Hailo 没有公开披露
              CFO，也没有披露高管团队板凳深度。任一联合创始人离开，都可能损害投资人信心、客户关系和未来融资能力。以色列预备役义务还增加了联合创始人风险：两位创始人大概率承担 miluim 义务。

              Hailo Dataflow Compiler SDK 除竞争摩擦外，本身也是技术风险面：编译器中的 bug、模型兼容性缺口或破坏性变更，会直接影响 OEM 客户部署或更新 AI 模型的能力。如果某个大型 OEM
              客户遭遇关键 SDK bug，导致量产发布延误，由此产生的关系损害可能威胁未来设计导入。Hailo 工程团队必须在硬件开发之外维持高质量软件开发速度；以当前规模看，这是艰难的双线执行。

              汽车板块存在真实质量风险：哪怕 AI 芯片故障只是间接原因，单次现场召回也可能给汽车 Tier-1 带来数亿美元责任，并给芯片供应商造成持久声誉损害。Hailo 的 AEC-Q100
              资质覆盖组件可靠性，但尚未确认生产中完整支持 ISO 26262 ASIL-D（自动驾驶所需最高功能安全等级），这限制了 Hailo 芯片可进入的自动驾驶等级上限。
