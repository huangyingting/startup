  - number: 4
    title: 财务情况
    sections:
      - number: '4.1'
        title: 收入来源与定价模型
        blocks:
          - type: paragraph
            body: >
              Hailo 的收入主要来自一次性硬件芯片销售。客户通常是安防摄像头、工业自动化、汽车 ADAS、机器人、无人机和零售领域的原始设备制造商（OEM），通过直接接洽或
              STMicroelectronics、Renesas、Arrow Electronics、Avnet 等授权分销商采购 Hailo 芯片。截至 2026 年 5 月，公司提供四个主要 SKU：Hailo-8（26
              TOPS，<5W）、Hailo-8L（13 TOPS，入门档）、Hailo-15H（面向摄像头 OEM、集成 ISP + NPU 的 SoC）以及 Hailo-10H（面向生成式 AI 边缘推理的 40 TOPS
              INT4）。SDK 工具链——Dataflow Compiler、HailoRT 运行时、Model Zoo——免费分发，不形成软件授权收入流。官方产品和开发者文档没有提到按部署收费的特许权使用费或订阅授权。

              定价只在面向消费者的产品上部分可见。搭载 Hailo-8L 的 Raspberry Pi AI HAT+ 零售价约 $70，其中 Hailo 芯片层面的收入只是一部分；Hailo、Raspberry Pi
              Foundation 与 Arrow 之间的具体渠道利润分配并不公开。Hailo-8 开发者模块在爱好者市场的零售价估计为 $69–99；量产批量定价未披露。Hailo-15H 和 Hailo-10H
              定价没有公开列示，这符合设计定点合作中 OEM NDA 级定价的常态。Evolv Technology 安检部署和 Automata
              机器人装配单元证明已有产生量产收入的合作，但两家伙伴都未披露出货量或单台商业条款。

              收入确认结构上是一次性的：Hailo 在芯片交付时收款，没有递延订阅或消耗组件。这会形成随设计定点周期波动的块状收入；OEM 嵌入式芯片从设计选择到量产，通常需要 12–24 个月。通过 Raspberry Pi
              触达的消费者和创客细分市场提供更连续、但毛利更低的出货渠道。Hailo 在 CES 2025 博客上演示的 Hailo-10H 定位于高端 GenAI 边缘层级，但截至 2026 年 5
              月，尚未确认量产爬坡或商业定价。
