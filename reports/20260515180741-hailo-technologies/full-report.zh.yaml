      - CR008
      - CR017
      - CR019
      - CR023
      - CR026
      - CR038
  - id: FR002
    title: 风险传导图
    type: dag
    layout: wide
    summary: |
      风险传导图展示主要风险触发项（地缘政治、资本、竞争、监管）如何经由中间影响，冲击 Hailo 的收入、客户关系和估值。
    data:
      nodes:
        - id: israel-conflict
          label: 以色列-Hamas 冲突
          detail: 自 Oct 2023 以来持续；触发 miluim 征召、投资人不确定性和供应链焦虑
          tone: negative
        - id: miluim-disruption
          label: miluim 工程扰动
          detail: 征召高峰期人员减少 10-20%；延迟芯片 tape-out 和 SDK 发布
          tone: negative
        - id: capital-risk
          label: 资本充足性风险
          detail: 4 年融资空窗；若收入不足以支撑烧钱，可能现金吃紧
          tone: negative
        - id: automotive-delay
          label: 汽车收入延迟
          detail: 3-5 年设计周期；汽车 SOP 收入未确认；管线不透明
          tone: negative
        - id: nvidia-competition
          label: NVIDIA 生态主导
          detail: CUDA / TensorRT 切换成本压低 win rate；开发者偏好 Jetson
          tone: negative
        - id: sdk-friction
          label: SDK 复杂度壁垒
          detail: Hailo Dataflow Compiler 摩擦拉长 OEM 从评估到量产的转化时间
          tone: warning
        - id: tsmc-risk
          label: TSMC 集中风险
          detail: 单一代工依赖；台湾地缘政治和产能分配风险
          tone: negative
        - id: export-controls
          label: 美国 / 欧盟出口管制
          detail: BIS AI 芯片出口规则；中国市场可能受限；EU AI Act 合规
          tone: warning
        - id: revenue-impact
          label: 收入不及预期 / 延迟
          detail: 汽车 SOP 延迟、工业采用较慢、中国准入缩小共同作用
          tone: negative
        - id: valuation-pressure
          label: 估值压缩
          detail: 资本风险 + 收入延迟 + 竞争压力 = 持平或 down round；M&A 压力
          tone: negative
      edges:
        - from: israel-conflict
          to: miluim-disruption
        - from: israel-conflict
          to: capital-risk
        - from: miluim-disruption
          to: automotive-delay
        - from: miluim-disruption
          to: sdk-friction
        - from: capital-risk
          to: valuation-pressure
        - from: automotive-delay
          to: revenue-impact
        - from: nvidia-competition
          to: sdk-friction
        - from: sdk-friction
          to: automotive-delay
        - from: tsmc-risk
          to: automotive-delay
        - from: export-controls
          to: revenue-impact
        - from: revenue-impact
          to: valuation-pressure
    claimRefs:
      - CR015
      - CR016
      - CR023
      - CR032
      - CR033
      - CR039
  - id: FR003
    title: 依赖地图
    type: dag
    layout: wide
    summary: |
      关键依赖地图，展示 Hailo 在供应链、分销、监管和财务维度的外部依赖。节点语气反映 Hailo 替换或缓释该依赖的能力。
