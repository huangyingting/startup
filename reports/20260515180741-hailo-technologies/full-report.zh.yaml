      - number: '3.2'
        title: 竞争对手画像与战略方向
        blocks:
          - type: paragraph
            body: >
              NVIDIA Jetson Orin（2022 年推出，Orin NX/Nano 于 2023 年更新）覆盖 10–275 TOPS，六个 SKU 从 $499（Nano）到 $999（AGX
              Orin）。NVIDIA 以完整 CUDA/TensorRT/DeepStream 支持瞄准机器人、自动驾驶汽车、工业自动化和智慧基础设施。规模无人能比：NVIDIA FY2024 数据中心收入约
              $44B，Jetson 装机基础超过一百万个已部署模块。战略方向是更高 TOPS 和多模态 AI（具备 LLM 能力的 Orin）。主要限制是功耗（10–60W）和成本，这让 Jetson
              不适合电池供电、成本敏感的大众市场摄像头。

              Ambarella CV3/CV5 是汽车和安防摄像头 SoC，在单芯片中集成 ISP、编码器和 CNN 加速器。CV5 在约 2–4W 下提供约 8 TOPS，并在高分辨率安防摄像头中拥有强装机基础。CV3
              面向 ADAS，支持 Level 2+ 环视 AI。Ambarella 的差异化在于深度 ISP 集成——这与 Hailo-15H 直接重叠——以及十多年 IP 摄像头硅片经验带来的中国、韩国摄像头 OEM
              关系。公司 FY2024 收入约 $220M，仅硬件业务已实现盈利。

              Intel Movidius Myriad X（MA2485）在约 1–4W 下提供 4 TOPS，但 Intel 已发布 Myriad 客户迁移至新平台的指导，给既有 Myriad X 设计定点带来遗留和
              EOL 风险。NXP i.MX9 系列面向汽车和工业 MCU 应用，提供低于 2 TOPS 的神经处理加速——显著低于 Hailo 性能区间，但具备 Hailo 缺失的汽车 ASIL-D 认证。ARM Ethos
              NPU（N78、N68）以 IP 形式授权给 SoC 集成商，因此是间接竞争者——ARM 让所有集成 Cortex-A 处理器的 MediaTek、Samsung 和 NXP 设备都能加入
              NPU，但自己不直接销售芯片。
