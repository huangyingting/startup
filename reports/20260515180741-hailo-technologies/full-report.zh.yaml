      - number: '2.3'
        title: 买方与细分市场拆分
        blocks:
          - type: paragraph
            body: >
              Hailo 的商业买方分散在至少六个不同 OEM 细分市场，每个细分市场的采购周期、预算所有者和采用触发因素都不同。安防摄像头 OEM——包括 Dahua Security
              等大型中国厂商——构成近期最高出货量细分市场。这些买方受监管强制 AI 功能驱动（人员检测、车牌识别、行为分析），通过直接芯片采购或 Renesas、STMicro 分销渠道拿货，并在新摄像头设计周期的 SoC
              级集成阶段选芯片（通常 12–18 个月）。

              汽车 ADAS 买方（Tier-1 集成商和 OEM 整车厂）代表价值最高的细分市场。预算掌握在整车项目经理和技术决策者手中，他们会比较 TOPS、功耗预算、ASIL 功能安全等级和工具链成熟度。采用触发因素包括
              EuroNCAP 和 NCAP 星级要求、OEM 强制的环视与 ADAS 系统升级，以及把智能驾驶功能打包进去的政府电动车转型项目。Hailo-8 和 Hailo-15H 定位于此；Hailo-10H 生成式
              AI 加速器则定位于下一代座舱 AI 应用，包括视觉语言模型。

              创客和开发者细分市场——以 Raspberry Pi AI HAT+
              采用者为代表——是另一类买方：个人开发者、研究人员和初创公司产品团队通过零售分销商（Arrow、Avnet、element14）采购。虽然单位经济较小，但这个细分市场拉宽生态覆盖，并推动 Model Zoo
              采用，从而间接降低企业评估风险。零售、工业自动化、智慧城市和无人机买方补齐其余细分；共同特征是量产承诺前都需要数月芯片评估。
