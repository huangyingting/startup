      - number: '1.3'
        title: 融资历史、估值与资本结构
        blocks:
          - type: paragraph
            body: >
              Hailo 已完成约 $206M 机构融资，横跨四轮。2017 年的种子 / 预种子轮奠定公司基础。2018 年完成 $12.5M Series A，2020 年完成由 General Catalyst 领投的
              $60M Series B。里程碑式的 $136M Series C 于 2022 年 5 月完成，投后估值 $1.13B，由 Munich Re Ventures 和 NEC Corporation
              领投。Series C 共同投资方包括 Poalim Equity、PICO Venture Partners 和既有投资人。这一轮让 Hailo 成为少数以色列深科技半导体独角兽之一。

              Series C 之后，截至 2026 年研究日，Hailo 未宣布任何进一步股权融资。公司也没有公开 IPO 时间表。芯片在先进制程上的流片成本高昂（TSMC N7/N6 单次流片可达
              $30–80M+），Hailo 的资本需求并不低，未来可能需要继续融资，或与更大的半导体公司达成战略合作。公开记录中没有老股交易。Hailo 约 $206M 的累计融资低于部分竞争对手（例如 Cerebras 约
              $720M），但考虑到公司无晶圆厂模式，并聚焦目标边缘场景而非超大规模云厂商数据中心芯片，这一融资规模仍算够用。

              收入未披露，这符合以色列私营半导体公司的常态。无晶圆厂芯片公司的毛利率通常在 50–65% 之间；考虑到 Hailo 同时销售芯片和模块，BOM
              成本会把其毛利率更可能压在区间低端。公司没有公开财务报表或监管文件；对于未在 Tel Aviv Stock Exchange 上市的以色列私营公司，这也是常态。
