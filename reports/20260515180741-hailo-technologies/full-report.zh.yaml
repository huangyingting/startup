      - number: '5.3'
        title: 软件栈、开发者工具与生态整合
        blocks:
          - type: paragraph
            body: >
              Hailo 的软件栈由 4 层组成：Hailo Dataflow Compiler（DFC）、HailoRT 运行时库、TAPPAS 应用框架和 Hailo Model Zoo。DFC
              是开发者采用的关键路径：它接收训练好的神经网络模型（来自 PyTorch、TensorFlow 或 ONNX），自动完成量化、图优化和硬件映射，并编译成可在 Hailo 硅片上执行的优化二进制表示。DFC
              version 3.33.1 支持 Hailo-8 和 Hailo-8L；DFC version 5.3.0 支持更新的 Hailo-15H/L 和 Hailo-10H 架构。DFC v3 与 v5
              的分裂让跨多芯片家族部署的开发者面临 SDK 版本碎片化。

              HailoRT 是在芯片上执行已编译模型的嵌入式运行时库，负责推理流水线排队、数据传输和热管理。TAPPAS 是基于 GStreamer 的应用框架，简化智能摄像头和视频分析部署中多路 AI
              流水线应用的构建。Hailo Model Zoo 维护在 GitHub（github.com/hailo-ai/hailo_model_zoo），提供 100 多个预训练、预编译模型，包括
              YOLOv5、YOLOv8、ResNet 变体、EfficientDet 等，大幅缩短标准计算机视觉任务的部署时间。

              Hacker News 和 GitHub issue 上的开发者社区信号显示，Model Zoo 确实显著加速了受支持架构的部署，但 DFC 编译流程比 NVIDIA TensorRT
              路径复杂得多：自定义或新型模型架构需要量化感知训练、逐层细致分析和反复 DFC profiling，才能可靠地在硬件上执行。这种复杂度是研究和创业公司社区的采用门槛；不过，对于使用 Model Zoo
              成熟架构的生产部署，问题相对小。
