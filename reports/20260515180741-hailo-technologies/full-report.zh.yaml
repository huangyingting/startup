      - number: '3.4'
        title: 切换成本、锁定效应与分销权力
        blocks:
          - type: paragraph
            body: >
              一旦 OEM 选择边缘 AI 芯片，并完成 SDK 集成、模型移植和量产硬件验证，切换到替代芯片的成本就很高——通常需要 3–6 个月重新移植，并可能需要重做
              PCB。这种锁定动态让所有存量厂商受益，包括拿下设计定点后的 Hailo。SDK 护城河最深的是 NVIDIA（TensorRT 是 GPU 推理的行业标准优化器），因此锁定强于 Hailo 的 Dataflow
              Compiler。Hailo 的锁定在模型层面：编译后的 HEF（Hailo Executable Format）文件是专有格式，不能移植到其他平台，已在 Hailo 硬件上验证的模型会形成依赖。

              分销权力偏向 NVIDIA（直销企业客户 + JetPack OTA 更新生态）、由 STMicro 分销的 Hailo（广泛嵌入式 OEM 渠道）和 NXP（深厚汽车 Tier-1 关系）。Ambarella
              与中国、韩国摄像头厂商关系强，但在该细分之外覆盖有限。Hailo 的 Renesas 合作增加了日本 / 亚洲分销能力，但 Renesas-Hailo 联合客户项目尚未公开确认具名设计定点。

              多平台试用风险真实存在：评估阶段，OEM 经常在 Hailo 和 NVIDIA Jetson 上并行做原型。一旦其中一个平台被选入量产，另一个就会被放弃。开发者社区（Hacker News 和 Hailo
              社区论坛可见）显示，Hailo 经常被作为 Jetson 替代方案评估，转化主要取决于功耗预算和单位成本约束，而不是生态偏好。这说明 Hailo 要替代 Jetson，必须赢在功耗 / 成本上，而不是 SDK
              质量或生态宽度上。
