      - number: '6.3'
        title: 渠道伙伴生态与 GTM 覆盖
        blocks:
          - type: paragraph
            body: >
              Hailo 的主要商业动作是 OEM
              设计导入，而不是直接企业销售。公司依赖三层渠道：分销伙伴（STMicroelectronics、Renesas）、系统集成商和模块厂商（Advantech、Axiomtek、ADLINK），以及由开发者社区带动的自然采用（Raspberry
              Pi AI HAT+、Arducam 摄像头模块）。STMicroelectronics 是全球最大的半导体分销商之一，直接触达数十万 OEM 客户。Renesas Electronics 在日本、东南亚和汽车
              Tier-1 供应链中拥有强嵌入式 OEM 关系。这 2 家分销伙伴大幅放大了 Hailo 的可触达客户基础，远超一支 200–300 人直接销售团队自身能覆盖的范围。

              Hailo 的开发者生态由 HailoRT 推理运行时、带预编译模型的 Hailo Model Zoo，以及 Hailo Dataflow Compiler 支撑。Raspberry Pi
              社区为评估和原型验证提供了庞大且技术参与度高的开发者基础。社区信号——GitHub star、教程互动、论坛活跃度——显示开发者正在积极探索；但开发者反馈也暴露出明显 SDK 复杂度：Hailo Dataflow
              Compiler 需要显式重新编译模型并映射硬件图，比 NVIDIA TensorRT 或 OpenVINO 工作流更复杂。独立开发者讨论已经承认，这种 SDK 摩擦是采用门槛。

              Hailo 声称在系统集成商、解决方案提供商和独立软件供应商之间拥有 100 多个生态伙伴。该数字来自公司口径，无法独立验证。EU Horizon 2020
              赠款关联为进入欧洲汽车供应链关系提供了路径，但该项目带来的具体 OEM 设计导入尚未公开确认。
