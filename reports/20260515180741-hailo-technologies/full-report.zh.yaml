              Precedence Research 的 $25.65B TAM 包含边缘云基础设施、AI 软件平台和托管边缘服务——这些收入流都不是 Hailo 作为芯片供应商参与的市场。用这个数字作 TAM 分母，会把
              Hailo 表观 SAM 比率相较硬件 NPU 专属 TAM 放大 2.5–4 倍。在独立分析机构发布带厂商份额的专门边缘 NPU 芯片市场报告之前，本章所有 SAM 和 SOM 计算都存在重大不确定性。
