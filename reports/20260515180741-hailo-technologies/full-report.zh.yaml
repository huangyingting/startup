      - number: '8.4'
        title: 关键尽调要求
        blocks:
          - type: paragraph
            body: >
              在作出任何投资决定前，需要 6 类阻断级证据。第一，FY2022、FY2023 和 FY2024
              的经审计财务报表是必需项，用于计算烧钱速度、毛利率和实际收入，并据此应用任何估值倍数。没有这些材料，本报告所有估值数字都只是高不确定性的分析师估计。

              第二，汽车设计导入管线必须在 NDA 下披露：具名 OEM、设计导入阶段、SOP 目标日期、预计出货量和已签约最低采购承诺。单这一项数据就可能根据管线质量让估值移动 $500M–$2B。

              第三，需要披露资本跑道：当前现金及等价物、预计月度烧钱速度，以及 Series D 流程是否已经启动或计划启动。考虑到 Series C 后 4 年空窗，这是时间敏感的关键尽调项。

              第四，必须确认公司的出口管制合规状态：所有芯片 SKU 的 ECCN 分类、任何 BIS 许可申请或拒绝记录，以及按当前和预期未来规则进入中国市场的法律意见。

              第五，应审查两位联合创始人的关键人留任合同和继任计划，尤其考虑以色列预备役义务。

              第六，竞争胜负数据：过去 24 个月，Hailo 参与竞争并输掉了哪些设计导入，输给了哪家竞争对手？胜率是判断竞争风险是否实质影响商业牵引的最佳前置指标。
