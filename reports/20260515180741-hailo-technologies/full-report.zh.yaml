    rows:
      - - 隐私与数据主权监管（GDPR、各国 AI 法）
        - 驱动
        - 当前
        - 要求本地部署推理；监控 / 生物识别场景无法把数据外发到云端
        - 欧洲安防摄像头和智慧城市 OEM 对 Hailo 形成强需求拉动
        - 跟踪针对视频数据的 GDPR 执法；EU AI Act 合规时间表
      - - IoT 设备普及和 5G 边缘计算
        - 驱动
        - 当前–3 年
        - 数十亿联网端点需要本地推理；5G 支撑边缘计算优先架构
        - 放大边缘 NPU 采购的 OEM 总可用市场（TAM）
        - 监测目标地区智慧城市和工业 IoT 建设
      - - AI 模型小型化（量化、剪枝）
        - 驱动
        - 当前
        - 10 亿参数以下的可用模型能在 <5W 芯片上运行；Hailo-8 的 TOPS 足以覆盖更多任务
        - 单颗芯片可覆盖更多用例；降低设计导入门槛
        - 跟踪开源模型库增长和 INT4 量化采用率
      - - 生成式 AI 边缘需求（设备端 LLM/VLM）
        - 驱动
        - 1–3 年
        - 企业隐私和延迟要求把 LLM 推理推向设备端；Hailo-10H 瞄准这一需求
        - 打开新的可触达垂直市场，ASP 潜力更高；CES 2025 演示验证方向
        - 跟踪 Hailo-10H 设计定点转化；评估 INT4 模型质量相对云端的表现
      - - SDK / 工具链复杂度
        - 约束
        - 当前
        - Dataflow Compiler 需要专家级模型优化；每个模型移植耗时 4–8 周
        - 拖慢 OEM 从评估到设计导入的转化；造成开发者流失
        - 审核 Dataflow Compiler v5.3 发布说明；跟踪社区论坛问题解决率
      - - 安全认证要求（ASIL、IEC 61508）
        - 约束
        - 当前–持续
        - 车规和工业部署在芯片选型后还需要 12–24 个月独立验证
        - 拉长从设计定点到收入的周期；可能拖后 Hailo 在汽车领域的起量
        - 向 Hailo 索取 ASIL-B/D 认证路线图；核查第三方验证伙伴
      - - NVIDIA Jetson 生态切换成本
        - 约束
        - 当前
        - CUDA/TensorRT 生态锁定使现有 Jetson 客户转用 Hailo 的切换成本很高
        - 限制 Hailo 渗透既有 Jetson 设计项目；迫使公司聚焦全新项目
        - 识别 Hailo 管线中全新项目与 Jetson 迁移评估的比例
    notes: 驱动和约束按 2026 年 5 月时点评估。生成式 AI 边缘驱动因素（Hailo-10H）仍是新兴且未经确认的收入贡献项；因目前仍处早期设计定点阶段，时间归类为 1–3 年。
