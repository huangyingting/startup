  - id: FV001
    title: 建议逻辑
    type: flow
    layout: wide
    summary: |
      从证据类别（市场规模、商业证明、竞争护城河、财务经济性、风险画像、估值）到继续研究建议的决策流，展示逻辑链条和阻碍形成有把握投资决策的关键证据缺口。
    data:
      nodes:
        - id: market
          label: 市场机会
          detail: 边缘 AI TAM 到 2028 年 $15B+（IDC）；汽车 ADAS、智能摄像头、工业、边缘 GenAI — 市场大且增长
          tone: positive
        - id: tech-proof
          label: 技术差异化
          detail: 真实：26 TOPS、<5W 领先 sub-5W 档；Hailo-10H 是首款 sub-5W GenAI 芯片；有独立基准测试
          tone: positive
        - id: commercial-proof
          label: 商业证明
          detail: 部分：开发者 / 工业已确认（RPi、Advantech、Axiomtek）；汽车未验证；收入未披露
          tone: warning
        - id: competitive-moat
          label: 竞争护城河
          detail: 中等：通过 STMicro / Renesas 分销具有耐久性；SDK 复杂度是相对 NVIDIA 的护城河缺口
          tone: warning
        - id: financial-econ
          label: 财务经济性
          detail: 未知：无收入、无毛利率、无烧钱速度披露；资本充足性不确定
          tone: negative
        - id: risk-profile
          label: 风险画像
          detail: 高：资本风险 + 地缘政治（以色列）+ TSMC 集中 + 汽车管线不透明
          tone: negative
        - id: valuation
          label: 估值评估
          detail: 基于估算收入，相对可比对象偏高；只有汽车管线真实且近期兑现时才算合理
          tone: warning
        - id: recommendation
          label: 继续研究
          detail: 技术强，商业证据不足；没有经审计财务和汽车 OEM 确认前，不应承诺投资
          tone: warning
      edges:
        - from: market
          to: recommendation
        - from: tech-proof
          to: recommendation
        - from: commercial-proof
          to: recommendation
        - from: competitive-moat
          to: recommendation
        - from: financial-econ
          to: recommendation
        - from: risk-profile
          to: recommendation
        - from: valuation
          to: recommendation
    claimRefs:
      - CV001
      - CV002
      - CV003
      - CV006
      - CV019
  - id: FV002
    title: 估值敏感性
    type: bar
    layout: wide
    summary: |
      企业价值隐含值对收入倍数和收入估算组合的敏感性。每个条形代表不同（收入估算、倍数）情景下的估值结果，展示从熊市低端到牛市高端的区间。
    data:
      items:
        - label: 熊市：$20M ARR × 5x
          value: 100
          detail: 低端收入估算（仅工业）套用低迷半导体倍数；困境情景
        - label: 熊市：$20M ARR × 10x
          value: 200
          detail: 低端收入加小幅溢价；需要可信的近期增长路径
        - label: 基准：$50M ARR × 8x
          value: 400
          detail: 中端收入套用同行可比的 Ambarella 式倍数；一个汽车 SOP 的基准情景
        - label: 基准：$80M ARR × 10x
          value: 800
          detail: 高端基准收入加合理增长溢价；需要汽车 SOP 和 Series D
        - label: 基准：$80M ARR × 14x
          value: 1120
          detail: 最近已知估值（$1.13B）在 $80M ARR 下的隐含倍数；需要强劲增长轨迹
        - label: 牛市：$150M ARR × 12x
          value: 1800
          detail: 牛市收入（汽车 SOP + 工业）加增长溢价；要求强执行
        - label: 牛市：$250M ARR × 16x
          value: 4000
          detail: 高牛市：多个汽车 design win 已确认；Hailo-10H GenAI 牵引；战略溢价
    claimRefs:
      - CV008
      - CV009
      - CV013
      - CV014
      - CV029
  - id: FV003
    title: 估值 / 回报区间
    type: range
    layout: wide
    summary: |
      熊市、基准和牛市情景下的隐含企业价值区间，并列示以最近已知估值（$1.13B）进行假设投资的回报倍数假设。
    data:
      items:
        - label: 熊市情景 EV
          low: 200
          mid: 350
          high: 500
          displayValue: $200M–$500M
          detail: 无汽车 SOP；资本事件；困境 M&A 或 down round；以 $1.13B 进入将产生负回报
          tone: negative
        - label: 基准情景 EV
          low: 800
          mid: 1150
          high: 1500
          displayValue: $800M–$1.5B
          detail: 一个汽车 SOP；工业增长；Series D 持平至小幅溢价；以 $1.13B 进入约 0-1.3x 回报
          tone: neutral
        - label: 牛市情景 EV
          low: 2000
          mid: 3000
          high: 4000
          displayValue: $2B–$4B
          detail: 多个汽车 SOP；Hailo-10H GenAI 牵引；战略溢价或 IPO；相对 $1.13B 约 1.8-3.5x 回报
          tone: positive
        - label: 最近已知估值（参考）
          low: 1130
          mid: 1130
          high: 1130
          displayValue: $1.13B (May 2022)
          detail: Series C 估值；回报计算参考点；2022 年 5 月后无新估值事件
          tone: neutral
    claimRefs:
      - CV013
      - CV014
      - CV015
      - CV016
  - id: FV004
    title: 投资 KPI
    type: kpi
    layout: standard
    summary: |
      面向 IC 的关键投资维度评分卡。每项 KPI 反映截至 May 2026 可得的最佳证据；所有评分都纳入一个根本约束：Hailo 财务未披露，且多项关键证据缺失。
    data:
      items:
        - label: 市场机会
          value: 8/10
          detail: 边缘 AI TAM 大（到 2028 年 $15B+）且增长；汽车 ADAS + 边缘 GenAI 是主要顺风
          status: positive
        - label: 技术差异化
          value: 8/10
          detail: sub-5W 的 TOPS/W 领先真实；Hailo-10H 先发；数据流架构是可防守 IP
          status: positive
        - label: 商业证明
          value: 4/10
          detail: 工业 / 开发者已确认；汽车未验证；收入未披露；客户数量未知
          status: warning
        - label: 竞争护城河
          value: 5/10
          detail: 分销合作（STMicro、Renesas）耐久；相对 NVIDIA 生态，SDK 摩擦是护城河缺口
          status: warning
        - label: 财务经济性
          value: 2/10
          detail: 收入、毛利率、烧钱速度均未披露；无法评估单颗经济性或盈亏平衡
          status: negative
        - label: 资本充足性
          value: 3/10
          detail: 4 年融资空窗；无披露收入；烧钱速度未知；潜在现金吃紧风险
          status: negative
        - label: 风险画像
          value: 3/10
          detail: 高：地缘政治（以色列冲突）、TSMC 集中、汽车管线不透明、资本风险
          status: negative
        - label: 估值吸引力
          value: 4/10
          detail: $1.13B 最近已知标记相对估算收入下的可比隐含区间偏高；仅在牛市情景合理
          status: warning
        - label: 证据质量
          value: 3/10
          detail: 技术已验证；商业证明部分成立；财务完全缺失；汽车无法确认
          status: negative
        - label: 总体 IC 评分
          value: 4.4/10
          detail: 继续研究：技术和市场强；商业和财务证据不足以支持有把握承诺
          status: warning
