        title: 资本充足性与融资依赖
        blocks:
          - type: paragraph
            body: >
              Hailo 累计完成约 $206M 外部融资：未披露金额的 Seed 轮、$12.5M Series A（2019 年）、$60M Series B（2021 年），以及 2022 年 5 月完成、投后估值
              $1.13B 的 $136M Series C。公司概况章节列出了完整融资时间线；本章聚焦未来资本充足性。Series C 由 Munich Re Ventures 和 NEC Corporation
              共同领投，General Catalyst、NorthGate Capital 和 ABB 参投。NEC 既是投资方，也是企业 AI 部署伙伴，强化了智能城市和工业边缘 AI 的 GTM 逻辑。

              2022 年 5 月至 2026 年 5 月没有任何已公告融资事件——间隔 4 年——这是公开记录里最突出的资本充足性信号。按基准假设，一家约 250 人的深科技半导体公司每月烧钱 $2.5–5M，$136M
              Series C 资金大约会在 2024 年中至 2025 年底耗尽。现有空窗可由 3 种情景解释：（1）Hailo
              靠芯片销量达到现金流收支平衡或正自由现金流；（2）公司已私下融资（风险债、老股交易或未披露轮次）；（3）公司陷入财务压力。截至 2026 年初，芯片设计和软件工程岗位仍在招聘，与第三种情景不相符。

              未发现公开披露的债务、授信额度、项目融资义务或 earn-out。HackerNews 上的开发者社区评论包含反向信号，提到 SDK
              复杂度和定价摩擦；部分观察者将其解读为商业压力，但这只是轶事信息，不是机构级证据。受监测公开来源中未出现来自 Series C 投资人的反向信号，例如重组、down-round 或契约违约。
