evidenceGaps:
  - type: private-evidence-only
    severity: material
    topic: financial opacity
    missingEvidence: Revenue, ARR, gross margin, unit shipment volumes, and customer count for Hailo Technologies
    whyItMatters: >-
      Without revenue data it is impossible to assess whether Hailo is growing, profitable, or burning through its $136M
      Series C. The 4-year gap since the last funding round could indicate either self-sufficiency or a difficult
      fundraising environment.
    diligencePath: >-
      Request confidential financial package from Hailo directly; review any investor data room materials from Series C
      investors; cross-reference LinkedIn hiring trends and job posting velocity as indirect proxies.
    relatedQuestionRefs:
      - QO009
      - QO010
  - type: private-evidence-only
    severity: material
    topic: board composition
    missingEvidence: Complete board of directors composition, board seat assignments, and investor voting rights
    whyItMatters: >-
      Board composition determines governance quality, founder control vs. investor control, and strategic
      decision-making on exits, future fundraising, and M&A.
    diligencePath: >-
      Request corporate governance documents from Hailo legal; check Israeli Companies Registrar (Rasham HaChevarot) for
      any public filings.
    relatedQuestionRefs:
      - QO016
    relatedTableRefs:
