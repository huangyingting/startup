  - id: buyer-segmentation
    title: Buyer and Segment Segmentation
    body: >
      Hailo's commercial buyer landscape is fragmented across at least six distinct OEM segments, each with
      different procurement cycles, budget owners, and adoption triggers. Security camera OEMs — including
      large Chinese manufacturers such as Dahua Security — constitute the highest-volume near-term segment.
      These buyers are driven by regulation-mandated AI features (person detection, license plate recognition,
      behaviour analytics), use direct chip sourcing or distribution through Renesas and STMicro, and select
      chips at the SoC-level integration stage of a new camera design cycle (typically 12–18 months).

      Automotive ADAS buyers (Tier-1 integrators and OEM vehicle manufacturers) represent the highest-value
      segment. Budget ownership sits with vehicle programme managers and technical decision-makers who
      benchmark TOPS, power budget, ASIL functional safety ratings, and toolchain maturity. Adoption triggers
      include EuroNCAP and NCAP star-rating requirements, OEM-mandated surround-view and ADAS system
      upgrades, and government electric vehicle transition programmes that bundle in intelligent driving features.
      Hailo's Hailo-8 and Hailo-15H are positioned here; the Hailo-10H generative AI accelerator is positioned
      for next-generation in-cabin AI applications including vision language models.

      The maker and developer segment — exemplified by Raspberry Pi AI HAT+ adopters — represents a
      distinct buyer archetype: individual developers, researchers, and start-up product teams who purchase
      through retail distributors (Arrow, Avnet, element14). While unit economics are smaller, this segment
      drives ecosystem breadth and Model Zoo adoption, which indirectly de-risks enterprise evaluations.
      Retail, industrial automation, smart city, and drone buyers complete the segmentation; all share the
      common characteristic of requiring multi-month chip evaluation before production commitment.
