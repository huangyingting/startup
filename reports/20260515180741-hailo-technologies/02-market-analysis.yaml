  evidenceGaps:
    - type: private-evidence-only
      severity: critical
      topic: Hailo revenue and unit economics
      missingEvidence: >
        Hailo has not disclosed any revenue, ARR, unit shipments, gross margin, or customer count as of
        May 2026. This makes SOM, unit economics, and financial traction entirely unverifiable from public sources.
      whyItMatters: >
        Without revenue data it is impossible to verify whether Hailo's 2025 market penetration is consistent
        with the $1.13B valuation implied by the 2022 Series C. Revenue opacity also prevents SAM-to-SOM
        conversion ratio analysis that would anchor any DCF or comparable company valuation approach.
      diligencePath: >
        Request confidential financial package from Hailo directly; seek investor data room access from
        Series C participants (Munich Re Ventures, NEC, General Catalyst); cross-reference TSMC channel
        volume allocations and STMicroelectronics distribution revenue as indirect proxies.
      relatedQuestionRefs: [QM011, QM025]

    - type: missing-source
      severity: material
      topic: independent vertical-level market sizing for Hailo SAM
      missingEvidence: >
        No independent analyst report publishes edge NPU chip market sizing at the vertical (security cameras,
        automotive ADAS, industrial) level with sufficient granularity to construct a defensible Hailo SAM.
        Precedence Research provides only top-line TAM and regional splits.
      whyItMatters: >
        Without vertical-level sizing, the SAM estimate of $5–8B is a proportional guess rather than a
        bottom-up calculation, materially understating or overstating the market opportunity depending on
        vertical-by-vertical chip-content assumptions.
      diligencePath: >
        Source IHS Markit (S&P Global Mobility) automotive semiconductor unit data; Omdia or Yole
        Développement camera chip market reports; ABI Research IoT semiconductor segmentation; vertical-specific
        RFP/contract data from STMicro distribution channel.
      relatedQuestionRefs: [QM010, QM018]

    - type: missing-source
      severity: material
      topic: Asia Pacific edge AI chip competitive dynamics and Hailo exposure to domestic Chinese alternatives
      missingEvidence: >
        No independent source quantifies the share of the Chinese security camera chip market served by
        domestic suppliers (HiSilicon, Rockchip, Novatek) vs. international suppliers such as Hailo.
        This directly affects the realistic addressable portion of the Asia Pacific edge AI opportunity.
      whyItMatters: >
        If Chinese OEMs preferentially source from domestic chip vendors under regulatory or procurement
        preference pressures, Hailo's Greater China SAM may be significantly smaller than suggested by
        broad APAC market projections.
      diligencePath: >
        Source Yole Développement or Gartner semiconductor competitive intelligence on Chinese edge AI
        chip vendor share; review China Ministry of Industry and Information Technology (MIIT) technology
        preference policies; interview Hailo Greater China channel partner on domestic competitive dynamics.
      relatedQuestionRefs: [QM009, QM027]

    - type: methodology-gap
      severity: moderate
      topic: conflicting TAM definitions and SOM distortion
      missingEvidence: >
        The Precedence Research TAM includes edge cloud micro-data-centre infrastructure and AI software
        platforms that Hailo does not serve. No public source provides a hardware-NPU-only TAM figure,
        making the SAM/SOM ratio structurally uncertain.
      whyItMatters: >
        Using the broad TAM as denominator overstates Hailo's apparent penetration by 2.5–4x and may
        inflate investor expectations about market size and Hailo's share of it.
      diligencePath: >
        Commission a bespoke edge NPU hardware market sizing from Yole Développement or Omdia;
        alternatively, reconstruct bottom-up from public unit volumes of competing chip vendors
        (NVIDIA Jetson, Ambarella, NXP i.MX) multiplied by estimated ASPs.
      relatedQuestionRefs: [QM017, QM018]

    - type: missing-source
      severity: moderate
      topic: confirmed Hailo automotive ADAS production design wins
      missingEvidence: >
        No public source confirms a named production automotive ADAS design win for Hailo chips in a vehicle
        programme. Application pages and partner ecosystem content describe the vertical but do not name
        a production automotive OEM customer or vehicle programme.
      whyItMatters: >
        Automotive is the highest-value edge AI chip segment. Without a confirmed production design win,
        Hailo's automotive revenue contribution is speculative and the timeline to automotive revenue
        (typically 5–8 years from design selection to volume production) is unknown.
      diligencePath: >
        Request named automotive customer references from Hailo; review Hailo job postings for ASIL
        certification roles as a proxy for production programme activity; track Tier-1 partner press
        releases for Hailo design-in announcements.
      relatedQuestionRefs: [QM013, QM025]
