callouts:
  - calloutType: strength
    title: Broad Vertical Coverage with Multiple Production Design Wins
    body: >
      Hailo has achieved confirmed production deployments across at least four distinct verticals —
      security cameras (Dahua Security), industrial automation (TT Control off-road ECU), smart screening
      (Evolv eXpedite), and the maker/developer segment (Raspberry Pi AI HAT+ and AI HAT+ 2). These
      multi-vertical wins reduce single-segment concentration risk and demonstrate that Hailo's chip
      families are production-qualified across diverse operating environments.
    claimRefs:
      - CM008
      - CM021
      - CM016

  - calloutType: risk
    title: Revenue Opacity Prevents Verified SOM Penetration Assessment
    body: >
      Hailo has not disclosed revenue, unit shipments, gross margin, or customer count as of May 2026.
      The 4-year gap since the Series C (May 2022) with no further reported fundraising means there is
      no public financing event to anchor a revenue estimate. Design wins confirm market traction but
      do not quantify its scale. SOM penetration is therefore inferred rather than measured, making
      any valuation multiple based on revenue fundamentally speculative at this stage.
    claimRefs:
      - CM025
      - CM036

  - calloutType: insight
    title: TAM Definition Inconsistency Creates Distorted SOM Calculation
    body: >
      The Precedence Research $25.65B TAM includes edge cloud infrastructure, AI software platforms,
      and managed edge services — all revenue streams that Hailo does not participate in as a chip vendor.
      Using this figure as the TAM denominator inflates Hailo's apparent SAM ratio by 2.5–4x versus
      a hardware-NPU-specific TAM. Until an independent analyst publishes a dedicated edge NPU chip market
      report with vendor share, all SAM and SOM calculations in this chapter carry material uncertainty.
    claimRefs:
      - CM037
      - CM001

