chapter:
  number: 2
  title: Market Analysis
  summary: >
    The global edge AI market reached $25.65B in 2025 and is projected to grow to $165.05B by 2035 at a 20.46% CAGR,
    driven by privacy regulations, IoT proliferation, and AI model miniaturization. Hailo's serviceable market spans
    security cameras, automotive ADAS, industrial automation, robotics, and drones — an estimated $5–8B SAM in 2025
    within the broader TAM — but verifiable SOM penetration remains opaque due to undisclosed revenue.

sections:
  - id: market-boundary
    title: Market Boundary and Definition
    body: >
      Hailo Technologies operates in the edge AI inference chip market — a distinct segment from cloud and
      data-centre AI accelerators. The market boundary encompasses silicon (chips, SoCs, modules) and closely
      associated software stacks (compilers, runtimes, model zoos) that execute deep learning inference on
      power-constrained endpoint devices without continuous cloud connectivity. Excluded spend includes cloud
      GPU rental, server-side AI inference, AI training hardware, and broad IoT platform software.
      Status-quo substitutes are general-purpose CPUs and microcontrollers, which remain dominant by volume
      but cannot match the TOPS-per-watt ratio of dedicated NPUs. Adjacencies worth tracking include vision
      processors with embedded NPUs (Hailo-15 category), combined ISP-AI SoCs from Ambarella, and
      Qualcomm mobile AI chipsets that spill into industrial deployments.

      The definitional tension in market research is significant: Precedence Research defines "edge AI" broadly
      to include edge cloud infrastructure (micro-data-centres with GPUs), which inflates the TAM relative to
      a narrower "edge NPU chip" definition. For Hailo specifically, the relevant boundary is the hardware
      inference accelerator market for devices with power envelopes below approximately 10–15W —
      matching its Hailo-8, Hailo-8L, Hailo-10H, and Hailo-15 product families.
      This narrower lens yields a more conservative but more actionable SAM estimate. Hailo's six-vertical
      product strategy (security, automotive, industrial, retail, robotics, drones) confirms the company
      itself uses deployment context — not chip architecture — to define its served market.
    claimRefs:
      - CM001
      - CM002
      - CM014
      - CM015
    tableRefs:
      - TM001
    figureRefs:
      - FM001

  - id: market-sizing
    title: TAM, SAM, and SOM Sizing
    body: >
      The global edge AI market totalled approximately $25.65B in 2025 according to Precedence Research, with
      a projected CAGR of 20.46% reaching $165.05B by 2035. North America held roughly 40% of market share
      in 2025, equating to approximately $10B, while Asia Pacific was the fastest-growing region. The software
      segment represented the single largest component, and edge cloud infrastructure was the fastest-growing
      subsegment — both of which lie outside Hailo's hardware-chip revenue model.

      For Hailo specifically, the relevant TAM is the edge AI hardware accelerator sub-segment. A secondary
      Precedence report on the edge AI hardware market provides a narrower lens. Hailo's SAM is further
      constrained to verticals it actively pursues: security cameras, automotive ADAS, industrial automation,
      robotics, retail, and drones. Using Precedence's 2025 TAM and vertical share estimates — with security
      and automotive representing the largest AI hardware deployment segments — the Hailo-addressable
      SAM is estimated at $5–8B in 2025, growing proportionally with the broader market.

      The SOM (serviceable obtainable market) is currently unverifiable because Hailo has not disclosed
      revenue, unit shipments, or customer count. Design wins at Dahua Security, TT Control, Limelight 4,
      and Evolv indicate meaningful production deployments, but the scale of those deployments is unknown.
      The 4-year gap since the May 2022 Series C without further disclosed fundraising could signal
      either cash-flow sustainability or deferred disclosure — in either case it does not support a confident
      SOM estimate. Diligence should seek a revenue proxy through distribution partner channel data or
      foundry volume commitments from TSMC.
