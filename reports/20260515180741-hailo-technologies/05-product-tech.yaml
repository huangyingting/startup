  - id: hardware-architecture
    title: Hardware Architecture, Core Technology, and IP Differentiation
    body: >
      Hailo's central innovation is the "Structure-Defined Dataflow" (SDF) architecture — a
      clean-slate neural processing unit design that replaces the general-purpose Von Neumann
      compute model with a fixed-function silicon layout that mirrors the computation graph of
      a neural network. In SDF architecture, separate hardware cores are dedicated to each
      operation type (convolution, batch normalization, pooling, activation, and elementwise
      operations), and data flows deterministically through the computation graph mapped to
      silicon rather than cycling through shared memory and ALUs. This eliminates the memory
      bottleneck that degrades GPU and CPU efficiency during inference, enabling the Hailo-8 to
      achieve 26 TOPS at fewer than 5 watts — a TOPS-per-watt ratio that the company claims
      outperforms general-purpose GPU/CPU solutions by an order of magnitude on standard
      DNN inference workloads.

      The SDF approach is a form of spatial computing for neural networks: computation is
      static and deterministic, making power and latency highly predictable. This predictability
      is valuable in automotive and industrial deployments where safety-critical systems require
      deterministic worst-case execution time guarantees. The Hailo-8 is manufactured on TSMC
      16nm FinFET, while the newer Hailo-10H and Hailo-15H lines are expected to use more
      advanced TSMC nodes for improved performance density. IP defensibility stems from the
      depth of the SDF architecture — it requires complete re-architecting of the compiler
      (the Dataflow Compiler is mandatory, no generic CUDA-like path exists) and significant
      systems engineering investment to map arbitrary neural network topologies onto the
      fixed-function silicon grid. This creates switching costs for customers who have optimized
      their model pipelines for Hailo, but also creates compiler toolchain complexity as a
      potential adoption barrier.
