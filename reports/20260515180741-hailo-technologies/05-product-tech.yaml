  - id: software-ecosystem
    title: Software Stack, Developer Tooling, and Ecosystem Integration
    body: >
      Hailo's software stack comprises four layers: the Hailo Dataflow Compiler (DFC), HailoRT
      runtime library, TAPPAS application framework, and the Hailo Model Zoo. The DFC is the
      critical path for developer adoption: it takes trained neural network models (from PyTorch,
      TensorFlow, or ONNX) and compiles them into optimized binary representations that execute
      on Hailo silicon, performing quantization, graph optimization, and hardware mapping
      automatically. DFC version 3.33.1 supports Hailo-8 and Hailo-8L; DFC version 5.3.0
      supports the newer Hailo-15H/L and Hailo-10H architectures. The split between DFC v3 and
      v5 creates SDK version fragmentation for developers deploying across multiple chip families.

      HailoRT is the embedded runtime library that executes compiled models on the chip, managing
      inference pipeline queuing, data transfers, and thermal management. TAPPAS is a GStreamer-
      based application framework that simplifies building multi-stream AI pipeline applications
      for smart camera and video analytics deployments. The Hailo Model Zoo, maintained on GitHub
      (github.com/hailo-ai/hailo_model_zoo), provides over 100 pre-trained and pre-compiled
      models including YOLOv5, YOLOv8, ResNet variants, EfficientDet, and others, dramatically
      reducing time-to-deployment for standard computer vision tasks.

      Developer community signals on Hacker News and GitHub issues indicate that while the
      Model Zoo significantly accelerates deployment for supported architectures, the DFC
      compilation workflow is materially more complex than NVIDIA's TensorRT path: custom or
      novel model architectures require quantization-aware training, careful layer-by-layer
      analysis, and iterative DFC profiling before reliable hardware execution. This complexity
      is an adoption barrier in the research and startup community, though it is less problematic
      for production deployments using proven architectures from the Model Zoo.
