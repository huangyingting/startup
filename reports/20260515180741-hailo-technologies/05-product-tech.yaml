  evidenceGaps:
    - type: private-evidence-only
      severity: material
      topic: DFC v3 to v5 migration documentation
      missingEvidence: "No public migration guide or confirmed community report of successful DFC v3 to v5 migration for complex model pipelines. Community discussions suggest non-trivial workflow changes are required."
      whyItMatters: "Customers with Hailo-8 deployments upgrading to Hailo-10H or Hailo-15H face potential re-compilation and re-optimization costs. Understanding migration friction is essential for total cost of ownership assessment."
      diligencePath: "Request DFC v3 to v5 migration documentation from Hailo developer relations. Run benchmark compilation of Hailo-8-optimized models on DFC v5 to quantify effort. Review GitHub issues in hailo-ai/hailort for migration-related bug reports."
      relatedQuestionRefs: [QE023]

    - type: missing-source
      severity: material
      topic: independent inference latency benchmarks
      missingEvidence: "No publicly available independent third-party benchmark measuring YOLOv8 or similar inference latency and throughput on Hailo-8 under real-world conditions (not Hailo-authored benchmarks)."
      whyItMatters: "Company-claimed TOPS figures may not reflect realized throughput for specific model architectures. Independent benchmarks are required for credible comparison with NVIDIA Jetson Orin and Coral Edge TPU."
      diligencePath: "Commission independent benchmark test using Hailo-8 M.2 module with standard YOLOv8 and ResNet-50 at batch size 1. Compare latency and throughput to Jetson Orin NX and Coral M.2 Accelerator using identical test conditions."
      relatedQuestionRefs: [QE024]

    - type: private-evidence-only
      severity: material
      topic: TSMC supply chain commitments and risk
      missingEvidence: "Hailo's TSMC wafer purchase commitments, allocation agreements, and contingency plans for supply chain disruption are not publicly disclosed. No public statement on single-foundry risk mitigation."
      whyItMatters: "As a fabless company relying on TSMC as sole foundry, any TSMC capacity constraint, geopolitical event affecting Taiwan, or allocation dispute could directly halt Hailo's chip supply and revenue."
      diligencePath: "Request TSMC foundry agreement summary from CFO or COO. Inquire whether TSMC backup foundry or alternate process node has been evaluated. Review force majeure provisions in customer supply agreements."
      relatedQuestionRefs: [QE029]

    - type: missing-source
      severity: material
      topic: multi-model concurrent inference documentation
      missingEvidence: "Public documentation on Hailo's ability to run multiple neural network models concurrently on a single chip is limited. Hardware resource sharing and time-multiplexing specifics are not clearly documented."
      whyItMatters: "Many production deployments require simultaneous execution of detection, classification, and tracking models. Hardware limitations here affect addressable use cases and competitive positioning."
      diligencePath: "Review DFC documentation for resource partitioning and time-multiplexing support. Request Hailo solution engineering benchmark for multi-model concurrent inference on Hailo-8 and Hailo-15H."
      relatedQuestionRefs: [QE028]

    - type: enumeration-incomplete
      severity: minor
      topic: Coral Edge TPU and Axelera AI comparison
      missingEvidence: "Direct head-to-head benchmarks comparing Hailo-8 with Google Coral Edge TPU and Axelera AI Metis M.2 accelerator at the same power class were not found in publicly available sources."
      whyItMatters: "Informed positioning requires validated performance comparisons at the same power envelope. Coral and Axelera are the most direct power-class competitors to Hailo-8."
      diligencePath: "Commission or obtain independent benchmark comparing Hailo-8, Coral Edge TPU, and Axelera Metis on MobileNet-v2, YOLOv5s, and ResNet-50 at batch=1 and <5W system power."
