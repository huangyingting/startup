  - id: trust-compliance-roadmap
    title: Trust, Compliance, Deployment Architecture, and Product Roadmap
    body: >
      Hailo has invested in trust and certification infrastructure essential for automotive and
      industrial market entry. The Hailo-8 has achieved AEC-Q100 Grade 2 automotive qualification,
      which certifies the chip for reliable operation across automotive temperature and reliability
      requirements and is a prerequisite for Tier-1 OEM evaluation. The company provides functional
      safety documentation supporting ISO 26262 ASIL compliance analysis, though full ASIL-B/C/D
      certification typically requires OEM-level system integration analysis rather than
      chip-level qualification alone. For the smart camera market, the Hailo-15H integrates the
      AI compute, ISP, and encoder into a single chip with a hardened compute architecture that
      simplifies security camera OEM certification by reducing system component count.

      On the software trust side, the Hailo Dataflow Compiler and model compilation process
      introduce IP considerations: compiled Hailo binary models are hardware-locked and cannot
      be trivially extracted or executed on competing hardware, providing a degree of model IP
      protection for customers deploying proprietary trained models. Export control risk is
      relevant for an Israeli AI chip company: dual-use classifications under Israeli export
      law and potential US ITAR/EAR considerations for automotive AI chips merit legal review.

      The product roadmap shows active development beyond the current five-chip family.
      Hailo-10H (launched 2024) represents the first generative AI edge inference chip and
      targets the emerging local LLM market (privacy-preserving AI assistants, on-device
      processing). Physical AI — robot perception for autonomous manipulation — is an active
      application development area as of 2026. Hailo's participation in Computex 2026 and
      XPONENTIAL 2026 (drone/robotics trade show) signals ongoing product development announcements
      beyond what is publicly confirmed. A next-generation chip beyond Hailo-10H is implied by
      the company's 2026 marketing positioning but has not been officially disclosed.
