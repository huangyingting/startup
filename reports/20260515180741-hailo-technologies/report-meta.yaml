companyProfile:
  summary: >-
    Hailo Technologies Ltd. is an Israeli fabless AI semiconductor company that designs purpose-built neural
    processing units (NPUs) for deep learning inference at the edge. Founded in 2017 by veterans of Israel's
    Unit 8200, Hailo achieved unicorn status in May 2022 with a $136M Series C at a $1.13B post-money valuation.
    The company's product portfolio spans the Hailo-8 (26 TOPS) and Hailo-8L edge accelerators, the Hailo-10H
    (40 TOPS INT4) generative AI accelerator, and the Hailo-15 AI vision processor SoC family. Commercial traction
    is demonstrated through the Raspberry Pi AI HAT+ design win and distribution partnerships with STMicroelectronics
    and Renesas, but revenue and customer count remain undisclosed. No new equity funding has been announced in the
    four years since the Series C, creating material uncertainty about capital position and burn rate.
  foundedDate: '2017-01-01'
