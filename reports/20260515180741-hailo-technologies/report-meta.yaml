  productSummary: >-
    Hailo sells edge AI accelerator chips (Hailo-8, Hailo-8L, Hailo-10H), AI vision processor SoCs (Hailo-15H/L),
    modules (Hailo-8 M.2), and accompanying software tools (Hailo Dataflow Compiler, HailoRT, TAPPAS) to OEM
    manufacturers in automotive, smart cameras, industrial, and robotics markets. Distribution is through direct
    OEM design wins, STMicroelectronics, Renesas, and embedded computing partners.
  customerFocus: >-
    Automotive Tier-1 OEMs (ADAS/IVI), smart camera and surveillance OEMs, industrial automation manufacturers,
    embedded computing OEMs, and the developer/maker ecosystem (Raspberry Pi).
  businessModel: >-
    Fabless semiconductor chip and module sales to OEM customers, supplemented by software licensing and support.
    Revenue is generated per-unit chip at design-win volume, with extended lifecycle from multi-year automotive
    production commitments.
