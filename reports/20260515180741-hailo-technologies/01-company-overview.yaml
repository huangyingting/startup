callouts:
  - calloutType: strength
    title: Unicorn Valuation with Focused Edge AI Thesis
    body: >
      Hailo reached unicorn status in May 2022 at $1.13B valuation with a clear, defensible thesis: purpose-built
      dataflow NPUs for edge inference outperform general-purpose solutions on performance-per-watt and cost at scale.
      The Raspberry Pi AI HAT+ design win demonstrates broad market applicability and developer ecosystem momentum.
    claimRefs:
      - CO013
      - CO014
      - CO022

  - calloutType: risk
    title: Revenue and Financial Opacity
    body: >
      Hailo has disclosed no revenue, gross margin, or unit shipment data, which is typical for Israeli private
      semiconductor companies but makes it impossible to verify commercialization progress or assess capital
      efficiency from public data alone. The $136M Series C was raised in May 2022, and no subsequent funding
      has been announced through the May 2026 research date — a four-year gap that may indicate either
      strong operating cash flows or constrained fundraising appetite in a difficult semiconductor funding market.
    claimRefs:
      - CO017
      - CO027

  - calloutType: risk
    title: Geopolitical and Operational Risk (Israel)
    body: >
      Hailo's R&D operations are concentrated in Tel Aviv, Israel. The October 2023 Hamas-Israel conflict and
      ongoing regional tensions create real operational risk including personnel disruption, supply chain concerns,
      and potential customer hesitation. Several multinational corporations have reassessed their Israel technology
      exposure since 2023.
    claimRefs:
      - CO030
      - CO031

