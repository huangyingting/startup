company:
  name: Hailo Technologies

chapter:
  number: 1
  title: Company Overview
  summary: >
    Hailo Technologies is an Israeli AI semiconductor unicorn founded in 2017 that designs purpose-built neural processing units (NPUs)
    for deep learning inference at the edge. The company achieved unicorn status with a $136M Series C at a $1.13B post-money valuation
    in May 2022, and has built a broad product line spanning low-power edge accelerators (Hailo-8, Hailo-8L), vision processor SoCs
    (Hailo-15H/L), and generative AI accelerators (Hailo-10H). Key design wins include integration with Raspberry Pi AI HAT+ and
    distribution partnerships with STMicroelectronics.

sections:
  - id: identity-and-model
    title: Identity, Product Model, and Business Description
    body: >
      Hailo Technologies Ltd. is an Israeli AI semiconductor company headquartered in Tel Aviv, Israel, founded in 2017.
      The company designs proprietary Neural Processing Unit (NPU) chips optimized exclusively for deep learning inference
      at the edge — enabling AI applications in cameras, automobiles, industrial systems, drones, and retail devices
      without requiring cloud connectivity. Hailo's business model is a fabless semiconductor IP and chip sales model:
      Hailo designs chips, contracts manufacturing to foundries (primarily TSMC), and sells chips and modules to OEM
      customers and through distribution partners such as STMicroelectronics and Renesas.

      The company's product strategy is to provide data-center-class AI performance within an edge power envelope.
      The flagship Hailo-8 delivers 26 TOPS (tera-operations per second) — significantly outperforming competing MCU and
      SoC solutions — while consuming less than 5W. The Hailo-10H, launched in 2024, targets generative AI at the edge
      with 40 TOPS of INT4 performance and onboard memory capable of running large language models up to ~6 billion
      parameters. The Hailo-15 series integrates AI compute with a full image signal processor (ISP) and encoder for
      smart cameras. Revenue comes from chip sales, module sales, and software licensing/support arrangements.

      Hailo's website copyright reads "All Rights Reserved 2026 Hailo Technologies Ltd.", and active product lines span
      five distinct chip families as of the 2026 research date. The company operates globally with distribution in Greater
      China, Europe, India, Japan, North America, and South America. Hailo also received EU Horizon 2020 R&I funding
      (grant agreement No. 849921), indicating recognition by European innovation bodies.
    claimRefs:
      - CO001
      - CO002
      - CO003
      - CO004
      - CO005
      - CO006
    tableRefs:
      - TO001
    figureRefs:
      - FO003

  - id: founders-leadership-governance
    title: Founders, Leadership, and Governance
    body: >
      Hailo was co-founded in 2017 by Orr Danon (CEO), Avi Baum (CTO), Hadar Zeitlin, and Daniel Schillo, all veterans
      of Israel's elite Unit 8200 military intelligence and semiconductor industry. CEO Orr Danon has deep expertise in
      signal processing and chip architecture from prior roles at Motorola and Intel Israel. CTO Avi Baum holds advanced
      degrees in electrical engineering and previously worked on deep learning hardware at Intel/Mobileye. Both founders
      had a clear thesis from inception: the Von Neumann architecture is fundamentally inefficient for deep learning,
      and purpose-built "structure-defined dataflow" architectures would dominate edge inference.

      The current executive team includes Yaron Garmazi (CFO & COO), Max Glover (CRO, Chief Revenue Officer),
      Moran Kogan Dori (VP Human Resources), and VP-level leaders across R&D, Systems, Product, and Physical AI.
      This bench depth is notable for a company of Hailo's stage and indicates organizational maturity beyond a
      typical Series C startup. Key-person risk is moderate: Orr Danon as CEO and Avi Baum as CTO are central to
      the company's technical vision and investor relationships, though the VP-level bench provides continuity.

      The board composition is not publicly disclosed in detail, but known institutional investors with board representation
      include General Catalyst, Berkshire Partners, NEC, Munich Re Ventures, and ABB Technology Ventures. Israeli VC
      Awz Ventures is also an investor. The geopolitical context of being an Israeli company introduces governance
      considerations including potential export control and dual-use classification of AI chip technology by Israeli
      defense authorities.
    claimRefs:
      - CO007
      - CO008
      - CO009
      - CO010
      - CO011
      - CO012
