  - id: funding-and-capitalization
    title: Funding History, Valuation, and Capital Structure
    body: >
      Hailo has raised approximately $206M in institutional funding across four rounds. The seed/pre-seed round in 2017
      established the company. A $12.5M Series A was closed in 2018, followed by a $60M Series B in 2020 led by General
      Catalyst. The landmark $136M Series C closed in May 2022 at a $1.13 billion post-money valuation, led by Munich Re
      Ventures and NEC Corporation. Co-investors in Series C included Poalim Equity, PICO Venture Partners, and existing
      investors. This round made Hailo one of only a handful of Israeli deep-tech semiconductor unicorns.

      Post-Series C, Hailo has not announced any further equity funding as of the 2026 research date. No IPO timeline
      has been publicly disclosed. The company's capital needs are significant given the cost of chip tape-outs on
      advanced nodes (a single tape-out on TSMC N7/N6 can cost $30–80M+), suggesting potential for future fundraising
      or strategic partnerships with larger semiconductor players. Secondary transactions have not been publicly reported.
      Hailo's total raised of ~$206M is modest compared to some competitors (e.g., Cerebras ~$720M) but adequate given
      the company's fabless model and focus on targeted edge use cases rather than hyperscaler datacenter chips.

      Revenue is undisclosed, typical for a private Israeli semiconductor company. Gross margin for fabless chip
      companies typically ranges from 50–65%, with Hailo's mix of chip and module sales likely toward the lower end
      given BOM costs. No financial statements or regulatory filings are publicly accessible, which is the norm for
      Israeli private companies not listed on the Tel Aviv Stock Exchange.
    claimRefs:
      - CO013
      - CO014
      - CO015
