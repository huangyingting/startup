  evidenceGaps:
    - type: private-evidence-only
      severity: material
      topic: financial opacity
      missingEvidence: Revenue, ARR, gross margin, unit shipment volumes, and customer count for Hailo Technologies
      whyItMatters: Without revenue data it is impossible to assess whether Hailo is growing, profitable, or burning through its $136M Series C. The 4-year gap since the last funding round could indicate either self-sufficiency or a difficult fundraising environment.
      diligencePath: Request confidential financial package from Hailo directly; review any investor data room materials from Series C investors; cross-reference LinkedIn hiring trends and job posting velocity as indirect proxies.
      relatedQuestionRefs: [QO009, QO010]

    - type: private-evidence-only
      severity: material
      topic: board composition
      missingEvidence: Complete board of directors composition, board seat assignments, and investor voting rights
      whyItMatters: Board composition determines governance quality, founder control vs. investor control, and strategic decision-making on exits, future fundraising, and M&A.
      diligencePath: Request corporate governance documents from Hailo legal; check Israeli Companies Registrar (Rasham HaChevarot) for any public filings.
      relatedQuestionRefs: [QO016]
      relatedTableRefs: [TO002]

    - type: missing-source
      severity: minor
      topic: IPO and exit path
      missingEvidence: Any indication of IPO filing, SPAC discussions, or M&A interest from 2023–2026
      whyItMatters: Exit path visibility is key for investor return planning. Four years without a new fundraise or exit event is noteworthy in a market where many AI chip companies have either gone public or been acquired.
      diligencePath: Monitor Israeli and US financial press; track NASDAQ/NYSE SPAC registrations; interview Series C investors for update.
      relatedQuestionRefs: [QO017]

    - type: missing-source
      severity: minor
      topic: export controls
      missingEvidence: Whether Hailo's NPU products are subject to Israeli Ministry of Defense export control classification
      whyItMatters: AI chip export controls are increasingly relevant given US-China tensions and Israeli security considerations; unrecognized restrictions could limit addressable market.
      diligencePath: Review Israeli Defense Export Controls regulations; interview legal counsel; check any public regulatory filings.
      relatedQuestionRefs: [QO014, QO015]

    - type: inferred-only
      severity: moderate
      topic: valuation mechanism
      missingEvidence: Detailed revenue and ARR figures that would allow reconstruction of the revenue multiple or strategic premium embedded in Hailo's $1.13B valuation
      whyItMatters: Without revenue data, it is impossible to determine whether the $1.13B valuation reflects a reasonable multiple (e.g., 10–30x ARR) or a pure strategic premium. This is material for assessing investment attractiveness at any future round.
      diligencePath: Request confidential financial model or term sheet from Series C investors (Munich Re Ventures, NEC); obtain industry comparable multiples from edge AI chip exits such as Mobileye.
      relatedQuestionRefs: [QO018]
      relatedTableRefs: [TO003]

    - type: missing-source
      severity: minor
      topic: milestone completeness
      missingEvidence: Internal operational milestones such as customer count, volume shipments by year, and detailed R&D phase gates between Hailo-8 commercial launch and Hailo-15/Hailo-10H development
      whyItMatters: The public milestone record is limited to fundraising events and product launches; operational execution milestones that would validate team delivery velocity are not publicly available.
      diligencePath: Request product roadmap and milestone tracking from Hailo leadership; review investor update materials from Series C investors.
      relatedQuestionRefs: [QO011, QO020]
