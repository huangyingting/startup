  - id: diligence-asks
    title: Critical Diligence Requirements
    body: >
      Before any investment decision, six categories of evidence are required with blocking-severity
      status. First, audited financial statements for FY2022, FY2023, and FY2024 are essential to
      calculate burn rate, gross margin, and actual revenue against which any valuation multiple
      can be applied. Without this, all valuation figures in this report are analyst estimates with
      high uncertainty.

      Second, the automotive design-win pipeline must be disclosed under NDA: named OEMs, design-in
      stage, SOP target dates, projected volumes, and contracted minimum purchase commitments. This
      single data point could shift the valuation by $500M–$2B depending on pipeline quality.

      Third, capital runway disclosure is required: current cash and equivalents, projected monthly
      burn rate, and whether a Series D process is active or planned. Given the 4-year gap since
      Series C, this is a critical time-sensitive diligence item.

      Fourth, the company's export control compliance posture must be confirmed: ECCN classification
      for all chip SKUs, any BIS license applications or denials, and legal opinion on China market
      access under current and anticipated future rules.

      Fifth, key-person retention contracts and succession plans should be reviewed for both co-founders,
      particularly given Israeli military reserve duty obligations.

      Sixth, competitive win/loss data: what design wins has Hailo competed for and lost in the last
      24 months, and to which competitor? Win rate is the single best leading indicator of whether
      the competitive risk is materially impacting commercial traction.
