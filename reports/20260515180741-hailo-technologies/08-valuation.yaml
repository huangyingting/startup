  evidenceGaps:
    - type: private-evidence-only
      severity: blocking
      topic: audited financial statements and revenue
      missingEvidence: >
        Hailo has not disclosed any financial statements. Revenue, gross margin, burn rate,
        and cash position are entirely unknown from public sources. All valuation analysis
        in this chapter is based on estimated revenue ranges with high uncertainty.
      whyItMatters: >
        Without audited financials, no investment decision at any valuation can be made responsibly.
        The $1.13B last-known valuation cannot be confirmed, challenged, or benchmarked.
      diligencePath: >
        Request audited financial statements FY2022–FY2024 from Hailo data room; verify with
        Big-4 auditor. Require at minimum: income statement, balance sheet, and cash flow statement.
      relatedQuestionRefs: [QV021]

    - type: incomplete-coverage
      severity: material
      topic: comparable valuation table partial comparable set coverage
      missingEvidence: >
        TV004 (Comparable Valuation Table) covers a partial set of publicly available
        comparables. Private-round comps for analogous AI-chip startups such as Kneron,
        Blaize, and Untether AI are not publicly disclosed, and M&A exit multiples for
        recent semiconductor acquisitions (e.g., Xilinx/AMD, Arm/SoftBank) are not fully
        incorporated due to data availability constraints.
      whyItMatters: >
        A partial comparable set may overweight the few available public semi-AI comps,
        skewing revenue-multiple and EV/Sales benchmarks. Any valuation range derived
        from this table carries material spread risk.
      diligencePath: >
        Obtain a credentialed comp set from a tier-1 investment bank or data provider
        (PitchBook, CB Insights) covering ≥10 AI-edge semiconductor companies across
        at least two exit types (IPO, M&A). Request deal team to supplement with
        precedent transaction multiples.
      relatedTableRefs: [TV004]
