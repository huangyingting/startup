  - id: CI038
    statement: 'The primary financial diligence blockers for underwriting Hailo are: (1) no disclosed revenue, (2) no confirmed gross margin, (3) no confirmed cash balance or burn rate, (4) no customer-level revenue breakdown, and (5) the unexplained four-year fundraising gap since May 2022.

      '
    type: observed
