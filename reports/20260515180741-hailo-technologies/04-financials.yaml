figures:
- id: FI001
  title: Revenue Model Bridge
  type: flow
  layout: wide
  summary: 'Hailo''s revenue flows from OEM chip purchase through distributor channels, arriving as one-time chip-sale revenue at delivery. This bridge illustrates how customer activity converts into gross profit and how the operating expense burden relates to the gross contribution line.

    '
  data:
    nodes:
    - id: n1
      label: OEM / Customer Design Win
      detail: Camera, industrial, automotive, robotics, or retail OEM selects Hailo chip in product design
    - id: n2
      label: Distributor Channel
      detail: STMicro, Renesas, Arrow, Avnet stock and sell to OEM procurement; channel margin deducted before Hailo receives revenue
    - id: n3
      label: Chip Revenue (One-Time, at Delivery)
      detail: Hailo receives per-chip revenue at chip delivery; est. $7–20/chip (H8); est. $5–10 (H8L)
    - id: n4
      label: SDK / Toolchain (Zero Revenue)
      detail: Dataflow Compiler and HailoRT runtime distributed free; zero licensing or royalty revenue generated
    - id: n5
      label: Gross Profit (Est. 50–65%)
      detail: After TSMC wafer cost, packaging, and testing deducted from ASP; est. $3.50–13/chip benchmarked to Ambarella
    - id: n6
      label: R&D + Opex Consumption
      detail: Est. $35–70M/year primarily in R&D payroll; reduces gross profit toward operating loss or potential breakeven
    edges:
    - from: n1
      to: n2
      label: Purchase order via distributor channel
    - from: n2
      to: n3
      label: Chip revenue net of distributor margin
    - from: n4
      to: n3
      label: No SDK revenue; toolchain cost absorbed in opex
    - from: n3
      to: n5
      label: Revenue minus COGS yields gross profit
    - from: n5
      to: n6
      label: Gross profit funds R&D burn rate
  approximationNotes: All revenue and margin figures are estimates. Hailo has not disclosed revenue, COGS, or gross margin. Channel margin deduction percentage is unknown. Gross margin range is benchmarked to Ambarella (AMBA) and comparable fabless chip companies. SDK cost absorption treatment reflects inferred accounting convention.
  claimRefs:
  - CI001
  - CI012
  - CI013
  - CI014
  - CI029
