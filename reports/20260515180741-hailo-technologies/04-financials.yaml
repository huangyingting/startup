- id: capital-adequacy
  title: Capital Adequacy and Financing Dependency
  body: 'Hailo has raised approximately $206M in total external financing: an undisclosed Seed round, Series A of $12.5M (2019), Series B of $60M (2021), and Series C of $136M (May 2022) at a $1.13B post-money valuation. The Company Overview chapter contains the full funding chronology; this chapter focuses on forward capital adequacy. The Series C was co-led by Munich Re Ventures and NEC Corporation, with participation from General Catalyst, NorthGate Capital, and ABB. NEC''s strategic role as both investor and enterprise AI deployment partner reinforces the smart city and industrial edge AI GTM thesis.

    The absence of any announced fundraising event between May 2022 and May 2026 — a four-year gap — is the most prominent capital adequacy signal in the public record. Under base-case assumptions of $2.5–5M monthly burn appropriate for a ~250-employee deep-tech semiconductor company, the $136M Series C would have been exhausted by approximately mid-2024 to late-2025. Three scenarios are consistent with the observed gap: (1) Hailo has achieved cash-flow breakeven or positive free cash flow from chip sale volumes; (2) the company has raised capital privately (venture debt, secondary transaction, or undisclosed round); or (3) the company is in financial distress. Open hiring roles in chip design and software engineering as of early 2026 are inconsistent with scenario three.

    No publicly disclosed debt, credit facility, project-finance obligation, or earn-out has been identified. Developer-community commentary on HackerNews includes adverse signals about SDK complexity and pricing friction that some observers interpret as commercial pressure, though this is anecdotal rather than institutional evidence. No adverse signals from Series C investors (restructuring, down-round, or covenant breach) appear in any monitored public source.

    '
