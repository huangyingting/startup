  evidenceGaps:
  - type: private-evidence-only
    severity: critical
    topic: Revenue, gross margin, and P&L — all undisclosed
    missingEvidence: 'Hailo has published no revenue figure, gross margin, operating loss, EBITDA, or any income statement metric as of May 2026. No press release, investor deck, or regulatory filing discloses financial performance. All financial estimates in this chapter are scenario bounds derived from peer benchmarks with very low confidence.

      '
    whyItMatters: 'Without revenue data it is impossible to determine whether Hailo has achieved product-market fit at commercial scale, whether the $1.13B Series C valuation is defensible on a revenue multiple, or whether the business model is unit-economics-positive. All underwriting exercises are blocked.

      '
    diligencePath: 'Request signed NDA and access to audited financial statements (FY2023, FY2024, FY2025); request management P&L and cash flow projections; cross-reference STMicroelectronics distribution channel sell-through data as an indirect proxy for Hailo chip volumes.

      '
    relatedQuestionRefs:
    - QI015
    - QI024
  - type: private-evidence-only
    severity: critical
    topic: Cash balance, burn rate, and runway as of mid-2026
    missingEvidence: 'The four-year gap between Series C (May 2022) and the research date (May 2026) without any announced fundraising creates complete uncertainty about Hailo''s financial health. Under base-case burn scenarios, the Series C would have been substantially consumed by Q1–Q2 2026. Whether Hailo is cash-flow positive, has raised undisclosed capital, or is capital-constrained cannot be determined from public sources.

      '
    whyItMatters: 'Runway uncertainty is the most important financial risk factor for any investor or acquirer. If Hailo is approaching cash constraints, the negotiating dynamics, valuation, and timeline are fundamentally altered relative to a well-capitalised company.

      '
    diligencePath: 'Request current bank statements or treasury summary; management 12-month cash flow projection; any Israel Innovation Authority grant disclosures; signed debt or credit facility documentation; Series D process update if an active fundraising process is underway.

      '
    relatedQuestionRefs:
    - QI018
    - QI019
    - QI027
  - type: missing-source
    severity: material
    topic: TSMC supply agreement terms and wafer pricing
    missingEvidence: 'TSMC is the inferred primary contract manufacturer for Hailo''s 7nm and 8nm chips, but no supply agreement, wafer pricing, minimum purchase commitment, or capacity allocation has been publicly confirmed. This directly affects COGS estimates, capital intensity at scale-up, and the working capital cycle.

      '
    whyItMatters: 'Minimum purchase commitments at TSMC typically require 3–6 month advance wafer starts and may include take-or-pay provisions that create fixed cash obligations regardless of demand. The magnitude relative to Hailo''s revenue is unknown and could materially affect free cash flow.

      '
    diligencePath: 'Request Hailo-TSMC supply agreement through data room access; benchmark against public fabless company disclosures (Ambarella, Lattice) for comparable TSMC commitment structures.

      '
    relatedQuestionRefs:
    - QI011
    - QI012
    - QI007
  - type: missing-source
    severity: material
    topic: Customer-level revenue concentration and production volumes
    missingEvidence: 'No public source discloses the number of active production customers, revenue share attributable to top 3–5 customers, or per-customer chip volumes. Hailo references 400+ design-win engagements, but the share in production versus evaluation stage is unknown and unverified.

      '
    whyItMatters: 'High customer concentration in an OEM chip business creates material revenue risk if a top customer exits, redesigns, or delays production. Without concentration data, downside scenarios cannot be modelled and revenue quality cannot be assessed.

      '
    diligencePath: 'Request customer-level revenue breakdown in data room; conduct reference calls with Evolv, Automata, NTT, and Dahua where accessible; request confirmation of customers in volume production versus pilot or evaluation stage.

      '
    relatedQuestionRefs:
    - QI014
    - QI028
  - type: methodology-gap
    severity: moderate
    topic: Revenue scenario range too wide for investment-grade underwriting
    missingEvidence: 'The revenue estimate range of $5–70M for FY2025 compounds multiple unconfirmed inputs: ASP (unconfirmed), volume (unconfirmed), channel mix (unconfirmed), and Hailo-10H contribution (pre-revenue). Each input adds multiplicative uncertainty, making the range structurally too wide for any single-point valuation exercise.

      '
    whyItMatters: 'Wide revenue uncertainty translates directly to wide valuation uncertainty. At $5M revenue, the $1.13B Series C valuation implies severe overvaluation; at $70M, a 16x multiple is within growth-stage range. The range''s width prevents investment-grade analysis.

      '
    diligencePath: 'Narrow by obtaining at least one of: STMicro distribution channel sell-through volume for Hailo chips in FY2025; Raspberry Pi AI HAT+ total units sold since launch; any Hailo management revenue guidance from investor conversations.

      '
    relatedQuestionRefs:
    - QI024
    - QI014
