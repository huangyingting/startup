company:
  name: Hailo Technologies
chapter:
  number: 4
  title: Financials
  summary: 'Hailo Technologies operates a fabless chip-sale model: one-time revenue per unit shipped, no per-deployment royalties, and SDK tools distributed free of charge. The company has raised approximately $206M across Seed through Series C rounds, most recently $136M in May 2022 at a $1.13B valuation co-led by Munich Re Ventures and NEC Corporation. No public financial disclosures exist as of May 2026: revenue, gross margin, operating burn, and cash balance are all undisclosed. Based on fabless semiconductor peer benchmarks (primarily Ambarella AMBA), gross margin is estimated at 50–65% of chip ASP with very low confidence. The four-year gap since Series C without announced further fundraising is the most significant financial uncertainty, implying the company has either reached cash-flow sustainability, executed an undisclosed liquidity event, or is approaching a capital adequacy constraint. The primary diligence blockers are complete absence of P&L, revenue metrics, customer-level shipment data, and confirmed TSMC contract terms.

    '
sections:
- id: revenue-model
  title: Revenue Streams and Pricing Model
  body: 'Hailo generates revenue primarily through one-time hardware chip sales. Customers — typically original equipment manufacturers (OEMs) in security cameras, industrial automation, automotive ADAS, robotics, drones, and retail — purchase Hailo chips through direct engagement or authorised distributors including STMicroelectronics, Renesas, Arrow Electronics, and Avnet. The company offers four primary SKUs as of May 2026: Hailo-8 (26 TOPS, <5W), Hailo-8L (13 TOPS, entry-tier), Hailo-15H (ISP + NPU integrated SoC for camera OEMs), and Hailo-10H (40 TOPS INT4 for generative AI edge inference). The SDK toolchain — Dataflow Compiler, HailoRT runtime, Model Zoo — is distributed free of charge, creating no software-licensing revenue stream. Official product and developer documentation contains no reference to per-deployment royalties or subscription licensing.

    Pricing is partially visible only for consumer-facing products. The Raspberry Pi AI HAT+ (powered by Hailo-8L) retails at approximately $70, from which Hailo''s chip-level revenue is a fraction — the exact channel margin split between Hailo, the Raspberry Pi Foundation, and Arrow is not public. The Hailo-8 developer module retails at an estimated $69–99 in hobby markets; production volume pricing is not disclosed. Hailo-15H and Hailo-10H pricing are not publicly listed, consistent with OEM-NDA-level pricing for design-win engagements. The Evolv Technology security screening deployment and Automata robotic assembly cell demonstrate production revenue-generating engagements, but neither partner discloses volume or per-unit commercial terms.

    Revenue recognition is structurally one-time: Hailo receives payment at chip delivery, with no deferred subscription or consumption component. This creates lumpy revenue tied to design-win cycles, which for OEM embedded chips typically span 12–24 months from design selection to production volume. The consumer and maker segment via Raspberry Pi provides a more continuous but lower-margin volume channel. The Hailo-10H demonstrated on Hailo''s CES 2025 blog positions a premium GenAI edge tier, but no production ramp or commercial pricing has been confirmed as of May 2026.

    '
