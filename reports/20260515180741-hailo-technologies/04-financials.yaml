- id: cost-structure
  title: Cost Structure and Gross Margin
  body: 'As a fabless semiconductor company, Hailo''s cost of goods sold consists primarily of wafer fabrication costs paid to a contract manufacturer (TSMC is widely inferred from process node references in technical materials, though no supply contract is publicly confirmed), plus chip packaging, testing, and logistics. Fixed R&D costs — chip design, EDA tooling, IP licensing, post-silicon validation — are treated as operating expenses rather than COGS under standard semiconductor accounting, giving Hailo a structurally high gross margin profile at scale.

    Peer benchmarks from comparable fabless edge AI and computer vision chip companies support a gross margin range of 50–65% for Hailo''s chip lines. Ambarella (AMBA), the most comparable public company in terms of computer vision SoC business model, reported trailing gross margins of approximately 55–65% over 2022–2024. The Electronic Design Magazine independent benchmark found Hailo-8''s TOPS-per-watt superior to Jetson Orin in the sub-5W class, which is consistent with premium pricing and margin positioning. At the low end of the Hailo-8 estimated volume ASP of $7/chip and a 50% gross margin, per-chip gross profit is approximately $3.50; at $20/chip ASP and 65% margin, gross profit is approximately $13/chip. These estimates carry very low confidence.

    Operating expense is dominated by R&D payroll. With an estimated 200–300 employees — principally chip engineers in Tel Aviv HQ plus software and sales engineers — annual salary and benefits expense is estimated at $30–60M using Israeli technology sector compensation benchmarks. Adding marketing, G&A, EDA tooling, and IP licensing, total operating expense is plausibly $35–70M per year. The asset-light fabless model avoids fabrication CAPEX, but Hailo incurs non-recurring engineering (NRE) and tape-out fees (typically $5–20M per advanced node tape-out) that are capitalised or expensed depending on milestone achievement. No CAPEX commitments or fabrication investments have been publicly disclosed.

    '
