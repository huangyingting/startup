  evidenceGaps:
    - type: private-evidence-only
      severity: blocking
      topic: ECCN classification and China export control status
      missingEvidence: >
        Hailo has not publicly disclosed the Export Control Classification Number (ECCN) for
        Hailo-8, Hailo-10H, or Hailo-15H. Without this, it is impossible to assess whether
        China sales are restricted under US BIS rules.
      whyItMatters: >
        If Hailo chips are controlled under EAR and require a license for China sales, the
        company's addressable market in the smart city and surveillance segments is materially
        reduced.
      diligencePath: >
        Request Hailo's ECCN classification opinion from US export control counsel; compare
        chip parameters to BIS performance thresholds in 15 CFR Part 774.
      relatedQuestionRefs: [QR012]

    - type: private-evidence-only
      severity: blocking
      topic: ISO 26262 ASIL-D full certification status
      missingEvidence: >
        Hailo confirms ISO 26262 documentation availability but has not confirmed ASIL-D
        certification for any chip or system-level configuration. ASIL-D is required for
        autonomous driving safety-critical functions.
      whyItMatters: >
        Without confirmed ASIL-D, Hailo is limited to lower autonomy level applications;
        the highest-value automotive programs (L2+ ADAS) may require competitors with
        full ASIL-D certification.
      diligencePath: >
        Request Hailo's formal ISO 26262 ASIL-B and ASIL-D safety case documentation;
        verify with a Tier-1 automotive OEM reference customer.
      relatedQuestionRefs: [QR014]

    - type: private-evidence-only
      severity: material
      topic: capital runway and current cash position
      missingEvidence: >
        Hailo has not disclosed balance sheet, revenue, or cash position. Burn rate and
        runway estimates are analyst estimates only. Actual financial position is unknown.
      whyItMatters: >
        Capital adequacy is the most time-sensitive risk dimension. Without financial
        data, the probability and timing of a capital crisis cannot be assessed.
      diligencePath: >
        Request audited financial statements for FY2022, FY2023, FY2024 in data room;
        obtain CFO presentation on runway, burn rate, and revenue forecast.
      relatedQuestionRefs: [QR028]

    - type: missing-source
      severity: material
      topic: Hailo operational continuity during Israel conflict
      missingEvidence: >
        No Hailo-specific disclosure exists about the operational impact of Israel-Hamas
        conflict on its engineering team, product schedule, or customer engagements.
      whyItMatters: >
        Without Hailo's own assessment, investors cannot quantify the specific engineering
        disruption vs. the industry-wide estimates for Israeli tech companies.
      diligencePath: >
        Request Hailo management presentation on conflict operational impact covering
        Oct 2023 – May 2026; review employee communications and schedule variance data.
      relatedQuestionRefs: [QR017]

    - type: enumeration-incomplete
      severity: material
      topic: regulatory-legal-risk-register
      missingEvidence: >
        The regulatory and legal risk register enumerates identified frameworks as of May 2026 but
        does not cover all potential evolving regulations including US AI safety legislation, potential
        new BIS controls, Israeli defense export licensing, and sector-specific data protection rules.
      whyItMatters: >
        Regulatory risk evolves rapidly in AI and semiconductor sectors; an incomplete register
        may understate total regulatory exposure.
      diligencePath: >
        Engage specialized AI/semiconductor regulatory counsel to conduct full regulatory exposure
        assessment across all jurisdictions Hailo sells into.
      relatedTableRefs: [TR001]
