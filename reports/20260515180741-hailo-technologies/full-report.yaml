  - number: 5
    title: Product & Technology
    sections:
      - number: '5.1'
        title: Product Line, SKUs, and Customer Use Cases
        blocks:
          - type: paragraph
            body: >
              Hailo Technologies offers five distinct chip products targeting different edge AI performance tiers and
              deployment contexts. The Hailo-8 (26 TOPS, <5W, TSMC 16nm) is the flagship edge AI inference accelerator,
              supporting general computer vision tasks including object detection, segmentation, classification, and
              pose estimation. The Hailo-8L (13 TOPS) targets cost- and power-sensitive applications requiring lower
              throughput, serving as the chip inside the Raspberry Pi AI HAT+ (retailing at approximately $70). The
              Hailo-10H (40 TOPS INT4 / 20 TOPS FP16) is positioned as a generative AI edge processor, announced in 2024
              and designed to run large language models up to approximately 6 billion parameters locally on M.2 modules
              without cloud connectivity. The Hailo-15H integrates 20 TOPS of AI compute with a full Image Signal
              Processor (ISP), H.265/H.264 encoder, and support for 4K sensor inputs, targeting smart camera
              systems-on-chip for surveillance, retail analytics, and industrial inspection. The Hailo-15L provides
              entry-level vision processing for cost-sensitive camera applications.

              Key customer use cases span four verticals: (1) smart security cameras — multi-stream video analytics on
              single Hailo-15H SoC; (2) automotive ADAS — multi-sensor object detection, pedestrian/vehicle
              classification, and lane segmentation on Hailo-8 in AEC-Q100-qualified form factors; (3) industrial
              machine vision — defect detection, barcode/OCR reading, and quality inspection on Axiomtek and Advantech
              platforms; and (4) developer and maker community — Raspberry Pi AI HAT+ enabling rapid prototyping with
              YOLO-class models at sub-5W power. The breadth of verticals demonstrates product flexibility, while the
              Raspberry Pi win provides high-volume consumer channel demand that generates recurring chip orders
              independently of enterprise design win cycles.
