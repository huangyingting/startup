  - id: FR001
    title: Risk Heatmap
    type: matrix
    layout: wide
    summary: >
      Risk heatmap positioning Hailo's key risks by likelihood (columns) and residual severity after mitigations (rows).
      Cell content identifies the specific risk and its tone (positive mitigation = warning; limited mitigation =
      negative; existential = negative).
    data:
      columns:
        - Low Likelihood
        - Medium Likelihood
        - High Likelihood
        - Very High Likelihood
      rows:
        - label: Critical Severity
          values:
            - label: Taiwan conflict → TSMC
              tone: negative
              detail: Existential if TSMC inaccessible; no mitigation
            - label: Capital exhaustion
              tone: negative
              detail: 4-year funding gap; burn rate vs revenue unknown
            - label: Automotive SOP failure
              tone: negative
              detail: Most likely revenue-critical risk; unnamed pipeline
            - label: ''
              tone: neutral
              detail: No assessed critical / very-high-likelihood risks identified
        - label: High Severity
          values:
            - label: ASIL-D gap
              tone: warning
              detail: Blocks highest-level automotive designs
            - label: NVIDIA SDK ecosystem lock-in
              tone: warning
              detail: Design win rate suppressed by CUDA switching cost
            - label: Israel miluim disruption
              tone: warning
              detail: Ongoing conflict since Oct 2023; recurring call-ups
            - label: Export control China block
              tone: warning
              detail: BIS tightening; TSMC-fabbed chips potential target
        - label: Medium Severity
          values:
            - label: SDK security vulnerability
              tone: neutral
              detail: No known CVEs; embedded security risk
            - label: Key-person departure (founder)
              tone: warning
              detail: CEO/CTO single-point-of-failure for strategy and financing
            - label: EU AI Act compliance overhead
              tone: warning
              detail: New high-risk AI conformity requirements for automotive/surveillance
            - label: ''
              tone: neutral
              detail: No medium-severity very-high-likelihood risks identified
        - label: Low Severity
          values:
            - label: Israeli defense export controls
              tone: neutral
              detail: General-purpose chips; low likelihood of triggering
            - label: GDPR / surveillance compliance
              tone: neutral
              detail: Liability primarily on OEM customer, not chip supplier
            - label: Developer ecosystem churn
              tone: neutral
              detail: RPi developer attrition is expected; funnel still valuable
            - label: ''
              tone: neutral
              detail: ''
    claimRefs:
      - CR001
      - CR008
      - CR017
      - CR019
      - CR023
      - CR026
      - CR038
  - id: FR002
    title: Risk Transmission Map
    type: dag
    layout: wide
    summary: >
      Risk transmission map showing how primary risk triggers (geopolitical, capital, competitive, regulatory) flow
      through intermediate effects to impact Hailo's revenue, customer relationships, and valuation.
    data:
      nodes:
        - id: israel-conflict
          label: Israel-Hamas Conflict
          detail: Ongoing since Oct 2023; triggers miluim call-ups, investor uncertainty, supply chain anxiety
          tone: negative
        - id: miluim-disruption
          label: Miluim Engineering Disruption
          detail: 10-20% headcount reduction during peak call-ups; delays chip tape-out and SDK releases
          tone: negative
        - id: capital-risk
          label: Capital Adequacy Risk
          detail: 4-year funding gap; potential cash crunch if revenue insufficient to sustain burn
          tone: negative
        - id: automotive-delay
          label: Automotive Revenue Delay
          detail: 3-5 year design cycles; automotive SOP revenue not confirmed; pipeline opaque
          tone: negative
        - id: nvidia-competition
          label: NVIDIA Ecosystem Dominance
          detail: CUDA/TensorRT switching costs suppress win rate; developer preference for Jetson
          tone: negative
        - id: sdk-friction
          label: SDK Complexity Barrier
          detail: Hailo Dataflow Compiler friction increases OEM evaluation-to-production conversion time
          tone: warning
        - id: tsmc-risk
          label: TSMC Concentration Risk
          detail: Single foundry dependency; Taiwan geopolitical and capacity allocation risks
          tone: negative
        - id: export-controls
          label: US/EU Export Controls
          detail: BIS AI chip export rules; potential China market restriction; EU AI Act compliance
          tone: warning
        - id: revenue-impact
          label: Revenue Shortfall / Delay
          detail: Combination of delayed automotive SOP, slower industrial adoption, and reduced China access
          tone: negative
        - id: valuation-pressure
          label: Valuation Compression
          detail: Capital risk + revenue delay + competitive pressure = flat or down round; M&A pressure
          tone: negative
      edges:
        - from: israel-conflict
          to: miluim-disruption
        - from: israel-conflict
          to: capital-risk
        - from: miluim-disruption
          to: automotive-delay
        - from: miluim-disruption
          to: sdk-friction
        - from: capital-risk
          to: valuation-pressure
        - from: automotive-delay
          to: revenue-impact
        - from: nvidia-competition
          to: sdk-friction
        - from: sdk-friction
          to: automotive-delay
        - from: tsmc-risk
          to: automotive-delay
        - from: export-controls
          to: revenue-impact
        - from: revenue-impact
          to: valuation-pressure
    claimRefs:
      - CR015
      - CR016
      - CR023
      - CR032
      - CR033
      - CR039
