  - number: 7
    title: Risks
    sections:
      - number: '7.1'
        title: Technology and Competitive Risk
        blocks:
          - type: paragraph
            body: >
              Hailo's most persistent structural risk is ecosystem competition from NVIDIA Jetson. NVIDIA has built a
              developer ecosystem — CUDA, TensorRT, DeepStream, Isaac ROS — with millions of deployed Jetson units,
              comprehensive model support, and continuous developer tooling investment. An OEM engineer who already
              knows TensorRT has strong switching costs to remain on NVIDIA even when Hailo offers better TOPS-per-watt,
              because the software integration effort, debugging toolchain, and developer forum support are vastly
              deeper in the NVIDIA ecosystem. This is not a technology inferiority claim — Hailo-8's 26 TOPS at less
              than 5W is genuinely superior to Jetson Orin Nano (40 TOPS at 10W) on power efficiency — but the SDK
              switching cost constitutes a durable competitive barrier.

              Hailo's Structure-Defined Dataflow architecture requires neural network models to be compiled into a
              hardware execution graph by the Hailo Dataflow Compiler before deployment. This compilation step
              introduces model compatibility risk: not all neural network architectures map cleanly to the dataflow
              graph structure, and novel model architectures (e.g., transformer-heavy vision models, diffusion models)
              may require significant engineering effort to compile efficiently. Developer community feedback on Hacker
              News and embedded engineering forums consistently flags the compiler workflow as a friction point relative
              to NVIDIA TensorRT's "compile once, run anywhere" experience.

              The integration of NPUs into mainstream SoCs by Qualcomm (Snapdragon X), MediaTek (Dimensity), Samsung
              (Exynos), and NXP (i.MX) represents a longer-term structural threat: if every host SoC includes an
              adequate on-die NPU, the value proposition of a discrete standalone AI accelerator like Hailo-8
              diminishes. This is not an imminent risk for automotive or industrial applications where current SoC NPU
              performance is insufficient, but it is a strategic risk over a 5-10 year horizon. Qualcomm's AI 100 and
              QCS8550 already target industrial inference and robotics with integrated wireless+NPU solutions that
              reduce BOM complexity for OEM designers.

              The Hailo-10H (40 TOPS INT4, generative AI at edge) opens a new competitive dimension: on-device LLM
              inference. This market is nascent and the competitive landscape less established, but Apple (Neural
              Engine), Qualcomm (NPE in Snapdragon), and Google (Edge TPU) are all investing in on-device AI inference.
              Hailo-10H's differentiation in the sub-5W segment may provide a 12-24 month window before competitive
              parity.
