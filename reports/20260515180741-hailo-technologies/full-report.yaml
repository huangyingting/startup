  - id: FV001
    title: Recommendation Logic
    type: flow
    layout: wide
    summary: >
      Decision flow from evidence categories (market size, commercial proof, competitive moat, financial economics, risk
      profile, valuation) to the research-more recommendation, showing the logical chain and key evidence gaps that
      block a confident investment decision.
    data:
      nodes:
        - id: market
          label: Market Opportunity
          detail: >-
            Edge AI TAM $15B+ by 2028 (IDC); automotive ADAS, smart cameras, industrial, GenAI at edge — large and
            growing
          tone: positive
        - id: tech-proof
          label: Technology Differentiation
          detail: 'Genuine: 26 TOPS at <5W leads sub-5W class; Hailo-10H first sub-5W GenAI chip; independently benchmarked'
          tone: positive
        - id: commercial-proof
          label: Commercial Proof
          detail: >-
            Partial: developer/industrial confirmed (RPi, Advantech, Axiomtek); automotive unverified; revenue
            undisclosed
          tone: warning
        - id: competitive-moat
          label: Competitive Moat
          detail: 'Moderate: distribution through STMicro/Renesas is durable; SDK complexity is moat gap vs NVIDIA'
          tone: warning
        - id: financial-econ
          label: Financial Economics
          detail: 'Unknown: no revenue, no gross margin, no burn rate disclosure; capital adequacy uncertain'
          tone: negative
        - id: risk-profile
          label: Risk Profile
          detail: 'High: capital risk + geopolitical (Israel) + TSMC concentration + automotive pipeline opacity'
          tone: negative
        - id: valuation
          label: Valuation Assessment
          detail: Elevated vs comparables at estimated revenue; fair only if automotive pipeline is real and near-term
          tone: warning
        - id: recommendation
          label: RESEARCH-MORE
          detail: >-
            Technology strong, commercial evidence insufficient; do not commit without audited financials and automotive
            OEM confirmation
          tone: warning
      edges:
        - from: market
          to: recommendation
        - from: tech-proof
          to: recommendation
        - from: commercial-proof
          to: recommendation
        - from: competitive-moat
          to: recommendation
        - from: financial-econ
          to: recommendation
        - from: risk-profile
          to: recommendation
        - from: valuation
          to: recommendation
    claimRefs:
      - CV001
      - CV002
      - CV003
      - CV006
      - CV019
  - id: FV002
    title: Valuation Sensitivity
    type: bar
    layout: wide
    summary: >
      Implied enterprise value sensitivity to revenue multiple and revenue estimate combination. Each bar represents a
      valuation outcome under different (revenue estimate, multiple) scenarios, showing the range from bear-case low to
      bull-case high.
    data:
      items:
        - label: 'Bear: $20M ARR × 5x'
          value: 100
          detail: Low-end revenue estimate (industrial-only) at depressed semiconductor multiples; distressed scenario
        - label: 'Bear: $20M ARR × 10x'
          value: 200
          detail: Low-end revenue with slight premium; requires credible near-term growth path
        - label: 'Base: $50M ARR × 8x'
          value: 400
          detail: Mid-range revenue at peer-comparable Ambarella-like multiple; base case with one automotive SOP
        - label: 'Base: $80M ARR × 10x'
          value: 800
          detail: High-end base revenue at reasonable growth premium; requires automotive SOP and Series D
        - label: 'Base: $80M ARR × 14x'
          value: 1120
          detail: Last known valuation ($1.13B) implied multiple at $80M ARR; requires strong growth trajectory
        - label: 'Bull: $150M ARR × 12x'
          value: 1800
          detail: Bull-case revenue (automotive SOP + industrial) at growth premium; strong execution required
        - label: 'Bull: $250M ARR × 16x'
          value: 4000
          detail: 'High bull: multiple confirmed automotive wins; Hailo-10H GenAI traction; strategic premium'
    claimRefs:
      - CV008
      - CV009
      - CV013
      - CV014
      - CV029
  - id: FV003
    title: Valuation / Return Range
    type: range
    layout: wide
    summary: >
      Implied enterprise value range across bear, base, and bull scenarios with associated return multiple assumptions
      from a hypothetical investment at last known valuation ($1.13B).
    data:
      items:
        - label: Bear Scenario EV
          low: 200
          mid: 350
          high: 500
          displayValue: $200M–$500M
          detail: No automotive SOP; capital event; distressed M&A or down round; implied negative return from $1.13B entry
          tone: negative
        - label: Base Scenario EV
          low: 800
          mid: 1150
          high: 1500
          displayValue: $800M–$1.5B
          detail: One automotive SOP; industrial growth; Series D at flat-to-slight premium; ~0-1.3x return from $1.13B entry
          tone: neutral
        - label: Bull Scenario EV
          low: 2000
          mid: 3000
          high: 4000
          displayValue: $2B–$4B
          detail: Multiple automotive SOPs; Hailo-10H GenAI traction; strategic premium or IPO; ~1.8-3.5x return from $1.13B
          tone: positive
        - label: Last Known Valuation (reference)
          low: 1130
          mid: 1130
          high: 1130
          displayValue: $1.13B (May 2022)
          detail: Series C valuation; reference point for return calculation; no new valuation events since May 2022
          tone: neutral
    claimRefs:
      - CV013
      - CV014
      - CV015
      - CV016
  - id: FV004
    title: Investment KPIs
    type: kpi
    layout: standard
    summary: >
      IC-ready scorecard across key investment dimensions. Each KPI reflects best available evidence as of May 2026; all
      scores incorporate the fundamental constraint that Hailo's financials are undisclosed and multiple key evidence
      items are missing.
    data:
      items:
        - label: Market Opportunity
          value: 8/10
          detail: Edge AI TAM large ($15B+ by 2028) and growing; automotive ADAS + GenAI at edge are major tailwinds
          status: positive
        - label: Technology Differentiation
          value: 8/10
          detail: Genuine TOPS/W leadership in sub-5W; Hailo-10H first-mover; dataflow architecture is defensible IP
          status: positive
        - label: Commercial Proof
          value: 4/10
          detail: Industrial/developer confirmed; automotive unverified; revenue undisclosed; customer count unknown
          status: warning
        - label: Competitive Moat
          value: 5/10
          detail: Distribution partnerships (STMicro, Renesas) are durable; SDK friction is moat gap vs NVIDIA ecosystem
          status: warning
        - label: Financial Economics
          value: 2/10
          detail: Revenue, gross margin, burn rate all undisclosed; cannot assess unit economics or breakeven
          status: negative
        - label: Capital Adequacy
          value: 3/10
          detail: 4-year funding gap; no disclosed revenue; burn rate unknown; potential capital crunch risk
          status: negative
        - label: Risk Profile
          value: 3/10
          detail: 'High: geopolitical (Israel conflict), TSMC concentration, automotive pipeline opacity, capital risk'
          status: negative
        - label: Valuation Attractiveness
          value: 4/10
          detail: $1.13B last-known mark is elevated vs comparable-implied range at estimated revenue; fair only in bull case
          status: warning
        - label: Evidence Quality
          value: 3/10
          detail: Technology verified; commercial proof partial; financials completely absent; automotive unconfirmable
          status: negative
        - label: Overall IC Score
          value: 4.4/10
          detail: >-
            research-more: technology and market strong; commercial and financial evidence insufficient for confident
            commitment
          status: warning
    claimRefs:
      - CV001
      - CV002
      - CV006
      - CV007
      - CV030
