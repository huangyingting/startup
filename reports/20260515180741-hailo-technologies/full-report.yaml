              - CM001
  - number: 3
    title: Competitors
    sections:
      - number: '3.1'
        title: Competitive Landscape Overview
        blocks:
          - type: paragraph
            body: >
              The edge AI inference chip market in 2026 contains at least six distinct competitive tiers, none of which
              has established a dominant position across all power envelopes and verticals. At the high-performance tier
              (10–275 TOPS, 10–60W), NVIDIA Jetson Orin is the dominant incumbent with a massive CUDA/TensorRT ecosystem
              and millions of deployed units. In the vision SoC category (integrated ISP+AI+encoder chips for cameras),
              Ambarella CV3 and CV5 are the primary competitors to Hailo-15H. In the ultra-low-power MCU category (<1
              TOPS, <0.5W), ARM Ethos NPU IP and NXP i.MX Series compete via MCU-level integration. In the mid-tier edge
              inference category (4–30 TOPS, 1–6W), Hailo-8 faces narrower but sharper competition from Intel Movidius
              Myriad X (discontinuing), Qualcomm QCS industrial SoCs, and Rockchip RK3588.

              Status-quo substitutes remain prevalent: most deployed industrial cameras and embedded systems still use
              CPU/GPU inference on Raspberry Pi Compute Module, Jetson Nano, or embedded x86 processors. The "do nothing
              / cloud inference" substitute is also significant — OEMs in early-adopter phases frequently prototype with
              cloud AI APIs before committing to on-device silicon. Internal chip builds by large OEMs (e.g. Dahua's own
              AI chip division alongside its Hailo deployment) represent a likely-entrant risk for high-volume
              customers. The most likely new entrant is a Chinese domestic NPU vendor (Rockchip, BM1684, Kneron)
              displacing Hailo in the Greater China security camera segment through local sourcing preference.
