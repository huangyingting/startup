      - number: '7.4'
        title: Operational, Supply Chain, and People Risk
        blocks:
          - type: paragraph
            body: >
              Hailo operates a fabless semiconductor model, outsourcing chip manufacturing to TSMC and assembly/ test to
              OSAT (outsourced semiconductor assembly and test) providers in Asia. This model eliminates capital
              expenditure for fab ownership but creates concentrated supply chain risk. Beyond the geopolitical TSMC
              risk noted above, advanced semiconductor supply chains experienced significant disruptions in 2020–2022
              (COVID-related fab capacity constraints) and again in 2024 (advanced packaging shortages, CoWoS demand
              saturation from AI chip programs). A small fabless company like Hailo has lower priority than NVIDIA ($44B
              data center revenue) in TSMC capacity allocation, creating risk of delays in tape-out schedules or wafer
              allocation.

              Key-person risk is concentrated in Hailo's two co-founders: CEO Orr Danon and President/CTO Avi Baum. Both
              individuals are described in company communications as the primary technology and business vision drivers.
              Hailo has not publicly disclosed a CFO or disclosed bench depth in its executive team. The departure of
              either co-founder would likely impair investor confidence, customer relationships, and the ability to
              close future funding rounds. Israeli military reserve duty creates an additional co-founder risk: both
              founders are presumably subject to miluim obligations.

              The Hailo Dataflow Compiler SDK represents a technical risk surface beyond competitive friction: bugs,
              model compatibility gaps, or breaking changes in the compiler can directly impair OEM customers' ability
              to deploy or update their AI models. If a major OEM customer encounters a critical SDK bug that delays a
              production release, the resulting relationship damage could threaten future design wins. Hailo's
              engineering team must maintain a high-quality software development velocity alongside hardware development
              — a challenging dual-track execution at this scale.

              Quality risk is real in the automotive segment: a single field recall attributable to AI chip malfunction
              — even indirectly — can impose multi-hundred-million-dollar liability on the automotive Tier-1 and create
              lasting reputation damage for the chip supplier. Hailo's AEC-Q100 qualification addresses component
              reliability, but ISO 26262 ASIL-D (the highest functional safety level required for autonomous driving) is
              not confirmed as fully supported in production, creating a ceiling on the autonomy levels Hailo chips can
              be designed into.
