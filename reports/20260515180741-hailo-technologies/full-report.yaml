      - number: '1.2'
        title: Founders, Leadership, and Governance
        blocks:
          - type: paragraph
            body: >
              Hailo was co-founded in 2017 by Orr Danon (CEO), Avi Baum (CTO), Hadar Zeitlin, and Daniel Schillo, all
              veterans of Israel's elite Unit 8200 military intelligence and semiconductor industry. CEO Orr Danon has
              deep expertise in signal processing and chip architecture from prior roles at Motorola and Intel Israel.
              CTO Avi Baum holds advanced degrees in electrical engineering and previously worked on deep learning
              hardware at Intel/Mobileye. Both founders had a clear thesis from inception: the Von Neumann architecture
              is fundamentally inefficient for deep learning, and purpose-built "structure-defined dataflow"
              architectures would dominate edge inference.

              The current executive team includes Yaron Garmazi (CFO & COO), Max Glover (CRO, Chief Revenue Officer),
              Moran Kogan Dori (VP Human Resources), and VP-level leaders across R&D, Systems, Product, and Physical AI.
              This bench depth is notable for a company of Hailo's stage and indicates organizational maturity beyond a
              typical Series C startup. Key-person risk is moderate: Orr Danon as CEO and Avi Baum as CTO are central to
              the company's technical vision and investor relationships, though the VP-level bench provides continuity.

              The board composition is not publicly disclosed in detail, but known institutional investors with board
              representation include General Catalyst, Berkshire Partners, NEC, Munich Re Ventures, and ABB Technology
              Ventures. Israeli VC Awz Ventures is also an investor. The geopolitical context of being an Israeli
              company introduces governance considerations including potential export control and dual-use
              classification of AI chip technology by Israeli defense authorities.
