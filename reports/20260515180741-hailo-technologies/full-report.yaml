  - number: 2
    title: Market Analysis
    sections:
      - number: '2.1'
        title: Market Boundary and Definition
        blocks:
          - type: paragraph
            body: >
              Hailo Technologies operates in the edge AI inference chip market — a distinct segment from cloud and
              data-centre AI accelerators. The market boundary encompasses silicon (chips, SoCs, modules) and closely
              associated software stacks (compilers, runtimes, model zoos) that execute deep learning inference on
              power-constrained endpoint devices without continuous cloud connectivity. Excluded spend includes cloud
              GPU rental, server-side AI inference, AI training hardware, and broad IoT platform software. Status-quo
              substitutes are general-purpose CPUs and microcontrollers, which remain dominant by volume but cannot
              match the TOPS-per-watt ratio of dedicated NPUs. Adjacencies worth tracking include vision processors with
              embedded NPUs (Hailo-15 category), combined ISP-AI SoCs from Ambarella, and Qualcomm mobile AI chipsets
              that spill into industrial deployments.

              The definitional tension in market research is significant: Precedence Research defines "edge AI" broadly
              to include edge cloud infrastructure (micro-data-centres with GPUs), which inflates the TAM relative to a
              narrower "edge NPU chip" definition. For Hailo specifically, the relevant boundary is the hardware
              inference accelerator market for devices with power envelopes below approximately 10–15W — matching its
              Hailo-8, Hailo-8L, Hailo-10H, and Hailo-15 product families. This narrower lens yields a more conservative
              but more actionable SAM estimate. Hailo's six-vertical product strategy (security, automotive, industrial,
              retail, robotics, drones) confirms the company itself uses deployment context — not chip architecture — to
              define its served market.
