  - number: 4
    title: Financials
    sections:
      - number: '4.1'
        title: Revenue Streams and Pricing Model
        blocks:
          - type: paragraph
            body: >
              Hailo generates revenue primarily through one-time hardware chip sales. Customers — typically original
              equipment manufacturers (OEMs) in security cameras, industrial automation, automotive ADAS, robotics,
              drones, and retail — purchase Hailo chips through direct engagement or authorised distributors including
              STMicroelectronics, Renesas, Arrow Electronics, and Avnet. The company offers four primary SKUs as of May
              2026: Hailo-8 (26 TOPS, <5W), Hailo-8L (13 TOPS, entry-tier), Hailo-15H (ISP + NPU integrated SoC for
              camera OEMs), and Hailo-10H (40 TOPS INT4 for generative AI edge inference). The SDK toolchain — Dataflow
              Compiler, HailoRT runtime, Model Zoo — is distributed free of charge, creating no software-licensing
              revenue stream. Official product and developer documentation contains no reference to per-deployment
              royalties or subscription licensing.

              Pricing is partially visible only for consumer-facing products. The Raspberry Pi AI HAT+ (powered by
              Hailo-8L) retails at approximately $70, from which Hailo's chip-level revenue is a fraction — the exact
              channel margin split between Hailo, the Raspberry Pi Foundation, and Arrow is not public. The Hailo-8
              developer module retails at an estimated $69–99 in hobby markets; production volume pricing is not
              disclosed. Hailo-15H and Hailo-10H pricing are not publicly listed, consistent with OEM-NDA-level pricing
              for design-win engagements. The Evolv Technology security screening deployment and Automata robotic
              assembly cell demonstrate production revenue-generating engagements, but neither partner discloses volume
              or per-unit commercial terms.

              Revenue recognition is structurally one-time: Hailo receives payment at chip delivery, with no deferred
              subscription or consumption component. This creates lumpy revenue tied to design-win cycles, which for OEM
              embedded chips typically span 12–24 months from design selection to production volume. The consumer and
              maker segment via Raspberry Pi provides a more continuous but lower-margin volume channel. The Hailo-10H
              demonstrated on Hailo's CES 2025 blog positions a premium GenAI edge tier, but no production ramp or
              commercial pricing has been confirmed as of May 2026.
