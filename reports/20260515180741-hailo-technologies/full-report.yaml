chapters:
  - number: 1
    title: Company Overview
    sections:
      - number: '1.1'
        title: Identity, Product Model, and Business Description
        blocks:
          - type: paragraph
            body: >
              Hailo Technologies Ltd. is an Israeli AI semiconductor company headquartered in Tel Aviv, Israel, founded
              in 2017. The company designs proprietary Neural Processing Unit (NPU) chips optimized exclusively for deep
              learning inference at the edge — enabling AI applications in cameras, automobiles, industrial systems,
              drones, and retail devices without requiring cloud connectivity. Hailo's business model is a fabless
              semiconductor IP and chip sales model: Hailo designs chips, contracts manufacturing to foundries
              (primarily TSMC), and sells chips and modules to OEM customers and through distribution partners such as
              STMicroelectronics and Renesas.

              The company's product strategy is to provide data-center-class AI performance within an edge power
              envelope. The flagship Hailo-8 delivers 26 TOPS (tera-operations per second) — significantly outperforming
              competing MCU and SoC solutions — while consuming less than 5W. The Hailo-10H, launched in 2024, targets
              generative AI at the edge with 40 TOPS of INT4 performance and onboard memory capable of running large
              language models up to ~6 billion parameters. The Hailo-15 series integrates AI compute with a full image
              signal processor (ISP) and encoder for smart cameras. Revenue comes from chip sales, module sales, and
              software licensing/support arrangements.

              Hailo's website copyright reads "All Rights Reserved 2026 Hailo Technologies Ltd.", and active product
              lines span five distinct chip families as of the 2026 research date. The company operates globally with
              distribution in Greater China, Europe, India, Japan, North America, and South America. Hailo also received
              EU Horizon 2020 R&I funding (grant agreement No. 849921), indicating recognition by European innovation
              bodies.
