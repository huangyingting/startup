      - number: '8.3'
        title: Bull, Base, Bear Scenarios and Capital Structure
        blocks:
          - type: paragraph
            body: >
              The bull scenario ($2–4B enterprise value on a 3-year exit horizon) requires: (1) at least two named
              Tier-1 automotive OEMs confirming production SOP dates with Hailo chips; (2) Hailo-10H establishing a
              market-leading position in generative AI at edge (LLMs at sub-5W); (3) revenue reaching $150–250M ARR with
              gross margins above 50%; and (4) a new strategic investor (Qualcomm, NXP, or a large automotive OEM)
              taking a strategic stake at a premium valuation. This scenario is probability-weighted at approximately
              20–25% based on available evidence.

              The base scenario ($800M–1.5B) requires: (1) continued industrial OEM growth through Advantech, Axiomtek,
              ADLINK channel and new OEMs; (2) at least one automotive OEM entering production; (3) a Series D raised at
              a flat-to-slight premium vs. 2022 ($1.13B–$1.5B); and (4) Hailo-10H gaining developer traction with
              enterprise edge LLM applications. Revenue target ~$50–150M ARR. This scenario is weighted at approximately
              40–45%.

              The bear scenario ($200–500M) requires: (1) no named automotive OEM SOP confirmation in the next 2 years;
              (2) capital crunch forcing a distressed sale or down-round; (3) competitive displacement by NVIDIA Jetson
              Orin Nano in the industrial OEM channel; and (4) developer community adoption stagnating due to SDK
              complexity. Revenue would remain below $30M ARR. This scenario is weighted at approximately 30–35%.

              Capital structure context: Hailo has raised ~$206M total across multiple rounds. Assuming standard
              semiconductor startup venture economics with significant dilution across Series A–C, existing investors
              (BNY Mellon, D1 Capital, Poalim Equity, ARK Invest, and others) hold substantial stakes. Any new
              investment at the last-known valuation ($1.13B) would require confirming that existing investor marks have
              not been written down significantly since 2022.
            claimRefs:
              - CV013
              - CV014
              - CV015
              - CV016
              - CV017
              - CV018
