        title: GTM Motion and Sales Efficiency
        blocks:
          - type: paragraph
            body: >
              Hailo's go-to-market motion is OEM-first, distributor-anchored. The company relies on a two-tier channel
              structure: tier-1 distributor agreements (STMicroelectronics, Renesas, Arrow, Avnet) for reach into
              industrial and camera OEM procurement, combined with direct technical applications-engineering engagement
              for design-win support. The STMicroelectronics partnership announced in March 2022 provides access to
              STMicro's global semiconductor distribution network covering tens of thousands of OEM customers across
              Europe, the Americas, and Asia Pacific. The Renesas design collaboration provides analogous reach into
              Japanese and Asian industrial OEM buyers.

              Consumer GTM is a secondary channel: the Raspberry Pi Foundation partnership integrates Hailo-8L as the AI
              HAT+ compute element, sold through Raspberry Pi's authorised reseller network. This channel provides
              developer community seeding at scale without 9–18 month design-in cycles, but at lower per-unit margins
              than OEM production volumes. The developer community via GitHub Model Zoo (600+ stars), the
              community.hailo.ai forum, and the hailo-platform PyPI package represents a bottom-up GTM pull analogous to
              hardware-startup developer-led patterns. However, this ecosystem is small compared to NVIDIA's NGC model
              registry and TensorRT ecosystem.

              Sales cycle data is not publicly available. OEM design-in cycles for embedded AI chips typically run 9–18
              months from initial evaluation to volume purchase order. Customer Acquisition Cost (CAC) and payback
              period cannot be computed from public data. The Evolv, NTT Smart City, and Automata deployments confirm at
              least three enterprise or commercial programmes have reached production, but the commercial terms —
              per-unit price, contract size, volume commitments — are unknown. Hailo's company overview references more
              than 400 design-win engagements, though the share in production versus evaluation stage is undisclosed and
