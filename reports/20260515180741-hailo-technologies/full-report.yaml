      - number: '1.5'
        title: Scale Metrics, Coverage Gaps, and Adverse Signals
        blocks:
          - type: paragraph
            body: >
              Hailo's operational scale is difficult to assess precisely given the company's private status. The company
              employs approximately 200–300 people based on LinkedIn indicators and the scale of its engineering
              operations across chip design, software, and go-to-market functions. Hailo has not publicly disclosed
              revenue, customer count, or unit shipment volumes. The Raspberry Pi AI HAT+ integration — which shipped
              from June 2023 — provides indirect evidence of Hailo-8L chip volumes at a mass-market consumer price
              point.

              Key gaps in the public record include: no disclosed revenue (even a range), no unit shipment figures, no
              customer count, no gross margin data, and limited information on IP licensing revenue versus chip/module
              sales. The company's next funding round or exit path is unspecified. The end-of-life notification on the
              Hailo-8 Commercial Version IC (to be replaced by the Industrial Version IC) is a minor adverse signal
              suggesting early product generation challenges, though the transition appears managed and the Industrial
              version remains active.

              Adverse considerations include: the geopolitical risk of being an Israeli semiconductor company during
              regional tensions (October 2023 conflict and ongoing), potential export control restrictions on AI chip
              technology, the competitive moat risk from NVIDIA Jetson Orin entering the edge market more aggressively,
              and the concentration risk from a single primary distribution partner (STMicroelectronics) for broad
              market reach. The company's comparison of its architecture to "data center-class" performance is a company
              claim not independently verified in peer-reviewed literature, though the Raspberry Pi benchmarks provide
              partial corroboration.
