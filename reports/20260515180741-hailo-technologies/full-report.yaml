  - number: 6
    title: Customers
    sections:
      - number: '6.1'
        title: Customer Segments and Vertical Priorities
        blocks:
          - type: paragraph
            body: >
              Hailo addresses four distinct customer segments, each with different buyer profiles, design cycles, and
              revenue potential. The automotive Tier-1 segment represents the highest ASP opportunity and the clearest
              strategic intent in Hailo's communications: the Hailo-8 is AEC-Q100 qualified and ISO 26262 functional
              safety documentation is provided to Tier-1 partners. Multiple unnamed automotive OEM partnerships are
              referenced in Hailo's press materials and investor communications, but no OEM has been named publicly as a
              production customer as of May 2026.

              The industrial embedded-computing segment provides the clearest current proof of commercial adoption.
              Advantech — one of the world's largest embedded computing OEMs with $1.9B in FY2023 revenue — produces
              multiple Hailo-8-integrated AI inference boards in its MIC and AIR product families. Axiomtek, a Taiwanese
              embedded computing vendor with global distribution, ships the AECG100 edge AI platform with Hailo-8
              integration. ADLINK Technology, another major embedded OEM, also lists Hailo AI accelerator modules in its
              product portfolio. These three industrial customers together represent meaningful volume across industrial
              automation, machine vision, and smart manufacturing verticals.

              The developer and maker ecosystem, anchored by the Raspberry Pi AI HAT+ (launched November 2023), provides
              the largest unit-volume signal. Raspberry Pi sells approximately 7 million boards annually across its
              product line; AI HAT+ adoption within this install base is unquantified but directionally positive given
              the HAT+'s prominent placement in Raspberry Pi's official product catalog. The Hailo-8L (13 TOPS) powers
              the standard AI HAT+; the Hailo-8 (26 TOPS) powers the AI HAT+ 2. Developer engagement is further
              reflected in active GitHub repositories, tutorial content, and Hacker News community discussions, though
              the developer community also reports non-trivial SDK complexity as a friction point.

              The smart camera and surveillance segment (Axis, Hikvision, Bosch Security, Hanwha) is referenced as a
              target vertical — the Hailo-15H SoC was specifically designed for AI camera applications with integrated
              ISP, encoder, and AI accelerator. No surveillance camera OEM has been named as a confirmed Hailo customer
              or production partner as of May 2026.
