      - number: '2.5'
        title: Sizing Gaps and Contradictory Evidence
        blocks:
          - type: paragraph
            body: >
              Multiple layers of evidence uncertainty must be flagged before accepting any market sizing figure in this
              chapter. First, the Precedence Research TAM of $25.65B is a broad "edge AI market" that includes edge
              cloud micro-data-centres and software platforms — segments Hailo does not serve. The narrower edge AI
              hardware NPU chip market is likely 20–40% of the broad TAM, implying a more conservative hardware TAM of
              approximately $5–10B in 2025. The distinction is consequential for Hailo's implied SAM and valuation
              multiple.

              Second, Hailo has not disclosed revenue, unit shipments, customer count, or gross margin. This creates a
              complete opacity over SOM. No independent analyst report (Gartner, IDC, Forrester) specifically sizes the
              edge NPU chip market with vendor share attribution as of the 2026 research date. The Crunchbase profile
              confirms Series C but provides no operating metrics. The Wayback Machine archive of the Crunchbase profile
              does not reveal additional financial disclosures. This opacity means that the SOM estimate of "early-stage
              penetration" is an inference from design-win evidence rather than a revenue-backed claim.

              Third, Asia Pacific market dynamics — particularly Chinese camera OEM adoption of domestically-sourced
              chips (Rockchip, HiSilicon) — could materially reduce Hailo's addressable share of the security camera
              segment in the PRC. Export control risk on AI semiconductors further complicates the Greater China
              go-to-market. These dynamics are not captured in broad TAM estimates and represent a meaningful SAM
              shrinkage risk for Hailo specifically.
            claimRefs:
              - CM036
              - CM037
              - CM038
      - number: '2.6'
        title: Exhibits
        blocks:
          - type: callout
            title: Broad Vertical Coverage with Multiple Production Design Wins
            body: >
              Hailo has achieved confirmed production deployments across at least four distinct verticals — security
              cameras (Dahua Security), industrial automation (TT Control off-road ECU), smart screening (Evolv
              eXpedite), and the maker/developer segment (Raspberry Pi AI HAT+ and AI HAT+ 2). These multi-vertical wins
              reduce single-segment concentration risk and demonstrate that Hailo's chip families are
              production-qualified across diverse operating environments.
            calloutType: strength
            claimRefs:
              - CM008
              - CM021
              - CM016
          - type: callout
            title: Revenue Opacity Prevents Verified SOM Penetration Assessment
            body: >
              Hailo has not disclosed revenue, unit shipments, gross margin, or customer count as of May 2026. The
              4-year gap since the Series C (May 2022) with no further reported fundraising means there is no public
              financing event to anchor a revenue estimate. Design wins confirm market traction but do not quantify its
              scale. SOM penetration is therefore inferred rather than measured, making any valuation multiple based on
              revenue fundamentally speculative at this stage.
            calloutType: risk
            claimRefs:
              - CM025
              - CM036
          - type: callout
            title: TAM Definition Inconsistency Creates Distorted SOM Calculation
            body: >
              The Precedence Research $25.65B TAM includes edge cloud infrastructure, AI software platforms, and managed
              edge services — all revenue streams that Hailo does not participate in as a chip vendor. Using this figure
              as the TAM denominator inflates Hailo's apparent SAM ratio by 2.5–4x versus a hardware-NPU-specific TAM.
              Until an independent analyst publishes a dedicated edge NPU chip market report with vendor share, all SAM
              and SOM calculations in this chapter carry material uncertainty.
            calloutType: insight
            claimRefs:
