    data:
      layers:
        - label: Customer Application Layer
          detail: >-
            OEM product firmware, smart camera analytics apps, automotive ADAS stacks, Raspberry Pi maker projects,
            industrial inspection systems using TAPPAS or custom pipelines.
          tone: positive
        - label: TAPPAS Application Framework
          detail: >-
            GStreamer-based pipeline framework for multi-stream video AI. Simplifies building camera analytics
            pipelines. Dependency: GStreamer open-source ecosystem.
          tone: neutral
        - label: Hailo Model Zoo + HailoRT Runtime
          detail: >-
            100+ pre-compiled models (YOLOv5/8, ResNet, EfficientDet). HailoRT manages inference execution, queuing,
            PCIe/SPI transfers. Runs on host Linux/embedded OS.
          tone: positive
        - label: Hailo Dataflow Compiler (DFC v3/v5)
          detail: >-
            Converts PyTorch/TensorFlow/ONNX models to Hailo hardware binaries. Performs quantization, graph
            optimization, SDF mapping. Critical developer adoption bottleneck.
          tone: warning
        - label: Hailo SDF Silicon (Hailo-8/8L/10H/15H/15L)
          detail: >-
            Structure-Defined Dataflow NPU. Fixed-function compute cores for CNN operations. TSMC manufactured. 13–40
            TOPS range. <5W power envelope.
          tone: positive
