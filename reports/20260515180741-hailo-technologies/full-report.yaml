              Platform with Hailo-8 is listed on Axiomtek's product page. Arducam, a camera module maker targeting the
              Raspberry Pi and embedded Linux community, offers Hailo-compatible AI camera modules. ADLINK Technology
              lists Hailo AI accelerator modules in its edge computing portfolio. These named industrial deployments are
              in active production — not pilot — based on public product listings and datasheet availability.

              Automotive evidence is circumstantial: Hailo's official automotive page references ADAS, cockpit AI, and
              surround-view applications, and notes AEC-Q100 qualification and ISO 26262 documentation support. However,
              no Tier-1 automotive OEM — Bosch, Continental, Aptiv, Visteon, Denso, or others — has publicly identified
              Hailo as a silicon supplier. This is not unusual: automotive design wins typically remain under NDA until
              production start-of-production (SOP), but it means that the claimed automotive pipeline cannot be
