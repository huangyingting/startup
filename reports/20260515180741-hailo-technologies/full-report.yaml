      design-in, production deployment, and potential expansion to subsequent product generations or new verticals.
    data:
      nodes:
        - id: discovery
          label: Discovery
          detail: >-
            OEM or developer discovers Hailo via STMicro/Renesas channel, Raspberry Pi HAT+, trade show, or developer
            community content
          tone: neutral
        - id: evaluation
          label: Evaluation / Prototyping
          detail: >-
            Engineers integrate Hailo-8/10H via HailoRT SDK; evaluate TOPS/W, SDK complexity, model compatibility;
            developer friction point
          tone: warning
        - id: design-in
          label: Design-In Decision
          detail: >-
            OEM commits to Hailo in product BOM; automotive involves 3-5 year design cycle; industrial/maker much
            shorter (3-12 months)
          tone: positive
        - id: production
          label: Production Ramp
          detail: >-
            Hailo chip enters mass production on OEM product; Advantech/Axiomtek/Raspberry Pi represent confirmed
            production; automotive SOP not yet confirmed
          tone: positive
        - id: expansion
          label: Expansion / Next Generation
          detail: >-
            OEM designs Hailo into next product generation (Advantech multi-SKU evidence); or expands to new verticals
            (e.g. adding Hailo-10H for GenAI use case)
          tone: positive
        - id: risk-exit
          label: 'Churn Risk: Competitor Switch'
          detail: >-
            Competitor switch risk: NVIDIA Jetson for higher-perf needs, integrated SoC (Ambarella/Qualcomm) for
            vision-specific designs, domestic NPU for Chinese OEMs
          tone: negative
    claimRefs:
