        - Automotive revenue thesis broken; downgrade to industrial/developer-only business model
        - Reduce forward revenue estimate to $20–40M ARR range; apply Ambarella-like multiple = $100–400M EV
      - - Confirmed design-win loss to NVIDIA/Qualcomm from existing named customer
        - Advantech, Axiomtek, or RPi abandons Hailo for alternative platform in next-gen product
        - Commercial moat thesis broken; questions whether other customers will follow
        - Re-assess win rate assumptions; increase competitive risk discount
