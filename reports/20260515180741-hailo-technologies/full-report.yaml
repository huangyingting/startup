              NVIDIA analysis. NVIDIA Jetson Orin Nano delivers 40 TOPS but at 10W — twice the power consumption for
              1.5x the TOPS. Ambarella CV5 delivers approximately 8 TOPS at 2–4W, significantly trailing Hailo-8 in raw
              TOPS but with stronger ISP integration for security cameras. Intel Myriad X delivers only 4 TOPS at 1–4W,
              trailing Hailo substantially on absolute performance.

              On pricing, Hailo-8 and Hailo-8L are reported to be priced in the $7–20 per-chip range at production
