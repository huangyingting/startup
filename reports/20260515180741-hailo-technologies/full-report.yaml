      - number: '2.2'
        title: TAM, SAM, and SOM Sizing
        blocks:
          - type: paragraph
            body: >
              The global edge AI market totalled approximately $25.65B in 2025 according to Precedence Research, with a
              projected CAGR of 20.46% reaching $165.05B by 2035. North America held roughly 40% of market share in
              2025, equating to approximately $10B, while Asia Pacific was the fastest-growing region. The software
              segment represented the single largest component, and edge cloud infrastructure was the fastest-growing
              subsegment — both of which lie outside Hailo's hardware-chip revenue model.

              For Hailo specifically, the relevant TAM is the edge AI hardware accelerator sub-segment. A secondary
              Precedence report on the edge AI hardware market provides a narrower lens. Hailo's SAM is further
              constrained to verticals it actively pursues: security cameras, automotive ADAS, industrial automation,
              robotics, retail, and drones. Using Precedence's 2025 TAM and vertical share estimates — with security and
              automotive representing the largest AI hardware deployment segments — the Hailo-addressable SAM is
              estimated at $5–8B in 2025, growing proportionally with the broader market.

              The SOM (serviceable obtainable market) is currently unverifiable because Hailo has not disclosed revenue,
              unit shipments, or customer count. Design wins at Dahua Security, TT Control, Limelight 4, and Evolv
              indicate meaningful production deployments, but the scale of those deployments is unknown. The 4-year gap
              since the May 2022 Series C without further disclosed fundraising could signal either cash-flow
              sustainability or deferred disclosure — in either case it does not support a confident SOM estimate.
              Diligence should seek a revenue proxy through distribution partner channel data or foundry volume
              commitments from TSMC.
