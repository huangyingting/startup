      - number: '2.4'
        title: Growth Drivers and Adoption Constraints
        blocks:
          - type: paragraph
            body: >
              The principal growth drivers for edge AI chip adoption are structural and reinforcing. IoT device
              proliferation — with tens of billions of connected endpoints projected by 2030 — is creating a vast
              installed base of hardware that is increasingly being retrofit or shipped with AI inference capability.
              The global 5G rollout enables edge compute deployments that require local inference rather than
              round-tripping to the cloud, particularly in industrial and smart-city contexts. AI model miniaturization
              (quantization, pruning, knowledge distillation) continues to shrink the compute requirements for capable
              models, making sub-10W edge NPUs viable for tasks previously requiring server-grade hardware. Falling chip
              costs and manufacturing scale — TSMC's mature 16nm and 7nm nodes — are improving edge AI chip economics
              year over year.

              Privacy and data sovereignty regulations are a powerful demand catalyst. GDPR and national equivalents
              constrain video surveillance data egress; on-device inference avoids the liability of transmitting
              biometric or behavioural data to cloud servers. This driver is particularly strong in European smart city,
              industrial, and security camera deployments — all segments where Hailo has named customer or partner proof
              points.

              Adoption constraints are equally material. High SDK and toolchain complexity is the most frequently cited
              friction: the Hailo Dataflow Compiler requires deep model optimization knowledge, and community forum
              activity (community.hailo.ai, GitHub Model Zoo issues) shows persistent developer friction converting
              PyTorch/ONNX models to Hailo-native format. Safety certification requirements in automotive (ISO 26262
              ASIL) and industrial (IEC 61508) add 12–24 months of independent validation time before production
              deployments can proceed. NVIDIA Jetson's large installed base and CUDA ecosystem also creates a high
              switching cost barrier for existing Jetson design-win programmes.
            claimRefs:
