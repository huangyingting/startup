      - number: '8.2'
        title: Comparable Valuation Analysis
        blocks:
          - type: paragraph
            body: >
              In the absence of Hailo revenue disclosure, comparable-based valuation requires estimating revenue and
              applying relevant public market multiples. The semiconductor market re-rated sharply in 2022–2023, with
              edge AI chip companies trading at 3–15x forward revenue versus the 15–30x peak multiples of 2021. Current
              benchmarks suggest:

              Mobileye, the most comparable automotive AI semiconductor company, IPO'd at approximately $16B enterprise
              value in October 2022 on trailing revenue of ~$1.9B, implying roughly 8x trailing revenue. Mobileye had
              visible, audited revenue from multiple named OEM customers (BMW, Nissan, Volkswagen, etc.) at IPO — a
              substantially higher evidence bar than Hailo currently provides. If Hailo achieves Mobileye-like revenue
              traction and visibility, a $2–4B enterprise value might be defensible on a 3-5 year exit horizon.

              Ambarella, the closest public comparable (edge AI vision chips for cameras and automotive), traded at
              4–10x revenue over 2023–2025 with FY2024 revenue of approximately $220M. Applying a 5–10x multiple to an
              estimated Hailo revenue range of $30–80M ARR yields an implied enterprise value of $150M–$800M —
              significantly below Hailo's last known $1.13B valuation. This suggests that at the current $1.13B mark,
              Hailo is priced either for higher revenue than current estimates suggest, or for a forward growth premium
              reflecting anticipated automotive SOP revenue.

              Lattice Semiconductor (edge FPGA/AI inference) traded at 10–20x revenue with ~$700M–900M ARR in 2022–2025,
              implying $7B–18B market cap — a premium driven by high gross margins (60%+) typical of fabless
              semiconductor companies. Hailo's gross margin profile is unknown but likely similar. Astera Labs (AI
              infrastructure connectivity) IPO'd at approximately $10B on limited disclosed revenue, suggesting the
              market was willing to pay GenAI infrastructure premiums. Neither comparable directly applies to Hailo
              given different end-markets and business stage.
