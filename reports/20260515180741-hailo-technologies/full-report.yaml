              provides developer ecosystem exposure, brand validation, and a low-friction path for embedded developers
              to evaluate Hailo hardware before recommending it for production designs.

              Advantech's integration of Hailo-8 in the MIC-AI730 and AIR-030 AI inference products is documented in
