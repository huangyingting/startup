      - number: '1.4'
        title: Key Milestones and Company Trajectory
        blocks:
          - type: paragraph
            body: >
              Hailo's milestone arc spans founding, product development, commercial launch, distribution scale-up, and
              platform expansion. The company was founded in 2017 and rapidly assembled a world-class chip design team.
              The Hailo-8 chip — the first product — was commercially launched in 2019/2020, achieving design wins in
              security cameras and industrial systems. The 2020 Series B enabled TSMC production scaling. By 2022, the
              company had achieved unicorn status and was shipping Hailo-8 at volume to OEM customers globally.

              In 2023 and 2024, Hailo expanded its product portfolio significantly. The Hailo-15 AI Vision Processor
              series (Hailo-15H and Hailo-15L) was launched for smart camera applications, integrating AI compute with
              video processing. The Hailo-10H generative AI accelerator was announced, targeting the emerging edge LLM
              market. The partnership with Raspberry Pi (AI HAT+) opened the developer/maker market, democratizing
              access to Hailo's NPU technology and generating strong developer mindshare.

              By 2025, Hailo had demonstrated at CES 2025 with the first public demo of the Hailo-10H running LLM/VLM
              applications at the edge. Hailo's software suite (Dataflow Compiler, HailoRT, Model Zoo) matured with
              version tracking, and the company organized annual Hackathons (2024-2025 edition in March 2025) to grow
              the developer community. Events planned for 2026 include participation in XPONENTIAL (May 2026, Detroit)
              and Computex (June 2026, Taipei), indicating continued expansion into physical AI and robotics markets.
