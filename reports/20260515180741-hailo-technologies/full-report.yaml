      - number: '7.3'
        title: Geopolitical, Export Control, and Regulatory Risk
        blocks:
          - type: paragraph
            body: >
              Hailo is incorporated and headquartered in Israel. The Israel-Hamas conflict, which escalated
              significantly in October 2023, introduced multi-dimensional operational risks for all Israeli technology
              companies. Israeli law requires military reserve duty (miluim) for most male citizens of service age, and
              major military call-ups (as occurred in October 2023 and subsequently) directly reduce engineering
              headcount. Industry reports indicate that Israeli tech companies collectively experienced 10–20% temporary
              headcount reductions due to reserve duty calls in 2023–2024, with some periods of significant disruption.
              For a company of 200–300 engineers, this could mean 20–60 engineers unavailable simultaneously during peak
              call-up events. Hailo has not disclosed the operational impact, but Israeli media have reported that the
              country's startup ecosystem broadly experienced significant disruption.

              Export control risk is material for Hailo's potential China market. The US Bureau of Industry and Security
              (BIS) has progressively tightened export controls on advanced AI accelerators through the Entity List and
              the October 2022 and October 2023 Export Control rules. While Hailo's chips are fabbed at TSMC (subject to
              US export controls via TSMC's US technology licensing) and Hailo is an Israeli company (not directly
              subject to Chinese export restrictions under BIS's current framework), the broader geopolitical climate
              creates uncertainty about Hailo's ability to sell in Greater China — a major market for smart city and
              surveillance AI chips. Any escalation of US-China tech decoupling that brings TSMC-fabbed AI chips under
              tighter controls could impair Hailo's China market access.

              The EU Artificial Intelligence Act (EU AI Act), which entered into force in August 2024, imposes risk
              classification requirements on AI systems deployed in high-risk contexts including automotive ADAS,
              biometric surveillance, and critical infrastructure. Hailo's automotive and surveillance customers are
              directly in high-risk categories requiring conformity assessments, CE marking for AI components, and
              technical documentation. Hailo must ensure its chips and associated software documentation enable OEM
              customers to meet their EU AI Act obligations — creating additional compliance overhead for the sales
              process in Europe.

              The concentration of TSMC as Hailo's sole foundry creates a geopolitical concentration risk: if Taiwan
              Strait tensions escalate to a military confrontation or if US-Taiwan semiconductor supply chain
              restrictions are imposed, Hailo would have no alternative foundry for its advanced-process chips. TSMC is
              the only foundry capable of the 7nm/5nm nodes used for Hailo's current silicon, as Samsung and Intel
              Foundry Services are not viable alternatives for a company of Hailo's scale.
            claimRefs:
