              Concentration risk is material and asymmetric. The unnamed automotive OEM pipeline represents potentially
              the largest revenue opportunity but carries the highest execution uncertainty: automotive design cycles
              run 3-5 years from design-in to start-of-production, and if planned automotive wins do not convert to SOP
              revenue, the commercial base defaults to lower-ASP industrial and developer channels. Adverse analysts
              have noted that Hailo's 4-year funding gap since the May 2022 Series C suggests either strong organic cash
              generation (unverifiable) or capital constraint that could pressure commercial strategy if the automotive
              pipeline does not materialize.

              Expansion vectors include: (1) new chip generations (Hailo-10H for generative AI at edge creating new
              customer opportunities), (2) geographic expansion in Asia via Renesas and STMicro channels, (3) vertical
              expansion into robotics, drones, and industrial inspection, and (4) potential professional services or
              software layer revenue if Hailo moves up the stack. None of these expansion vectors has confirmed customer
