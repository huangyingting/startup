      - number: '7.2'
        title: Business, Capital, and Market Execution Risk
        blocks:
          - type: paragraph
            body: >
              Hailo's capital adequacy is the most time-sensitive risk dimension. The company raised $206M total through
              its May 2022 Series C ($136M). At a typical semiconductor startup burn rate of $30–50M per year (200–300
              employees at $100–180K fully loaded average annual cost, plus chip development and tape-out costs), the
              $136M Series C proceeds would be largely consumed by 2024–2026. No new round has been announced since May
              2022, implying either (a) the company has achieved organic cash generation from chip sales, (b) the
              company is operating on a lean burn with remaining reserves, or (c) a fundraising process has been
              unsuccessful. The 4-year funding gap is atypical for a semiconductor growth-stage company that has not yet
              disclosed commercial traction.

              Customer concentration is a related business risk. Hailo's highest-potential revenue segment — automotive
              Tier-1 OEMs — has not produced any publicly named production customer. If automotive design wins are
              delayed or lost, the commercial base reverts to lower-ASP industrial embedded OEM channel (Advantech,
              Axiomtek) and the developer market (Raspberry Pi), which likely cannot support the company's cost
              structure at current scale without significant revenue growth. Concentration in unnamed automotive
              customers also means that a single major customer loss could be material.

              Automotive design cycles are structurally long (3–5 years from design-in to start-of-production), meaning
              that Hailo must survive as an independent entity for the expected duration before automotive revenue
              materializes. This creates a "valley of death" financing risk: the company must fund R&D, new chip
              generations (Hailo-15H, Hailo-10H), and operations during the multi-year wait for automotive SOP revenue
              to begin. No Israeli semiconductor company with Hailo's profile has publicly disclosed surviving this
              valley without either a follow-on capital raise or M&A.

              Revenue opacity makes it impossible to assess commercial velocity from public sources. Hailo does not
              disclose revenue, customer count, ASP, or bookings. This opacity is typical for Israeli private companies
              but creates disproportionate uncertainty for outside investors who must rely on comparable analysis and
              channel checks.
