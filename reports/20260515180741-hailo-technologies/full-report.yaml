      - number: '3.4'
        title: Switching Cost, Lock-in, and Distribution Power
        blocks:
          - type: paragraph
            body: >
              Once an OEM selects an edge AI chip and completes SDK integration, model porting, and production hardware
              validation, the switching cost to an alternative chip is high — typically requiring 3–6 months of
              re-porting effort and potential PCB redesign. This lock-in dynamic benefits all incumbents including Hailo
              once a design win is secured. The SDK moat is deepest for NVIDIA (TensorRT is the industry-standard
              optimizer for GPU inference), creating stronger lock-in than Hailo's Dataflow Compiler. Hailo's lock-in is
              model-level: compiled HEF (Hailo Executable Format) files are proprietary and not portable to other
              platforms, creating dependency for models already validated on Hailo hardware.

              Distribution power favours NVIDIA (direct enterprise sales + JetPack OTA update ecosystem), STMicro-
              distributed Hailo (broad embedded OEM channel), and NXP (deep automotive tier-1 relationships). Ambarella
              has strong OEM relationships with Chinese and Korean camera makers but limited reach outside that segment.
              Hailo's Renesas partnership adds Japan/Asia distribution but Renesas-Hailo joint customer programmes are
              not publicly confirmed with named design wins.

              Multi-homing risk is real: during the evaluation phase, OEMs frequently parallel-prototype on both Hailo
              and NVIDIA Jetson. Once one platform is selected for production, the other is dropped. The developer
              community (as observed on Hacker News and the Hailo community forum) shows that Hailo is frequently
              evaluated as a Jetson alternative, with conversion dependent primarily on power budget and unit cost
              constraints rather than ecosystem preference. This suggests Hailo must win on power/cost to displace
              Jetson, not on SDK quality or ecosystem breadth.
