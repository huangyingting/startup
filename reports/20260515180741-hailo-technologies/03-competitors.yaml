callouts:
  - calloutType: strength
    title: Power Efficiency Lead — Hailo-8 Achieves Best-in-Class TOPS/W in Sub-5W Class
    body: >
      Hailo-8's 26 TOPS at under 5W represents the highest TOPS-per-watt in its power class among
      independently benchmarked edge AI chips. This technical lead is embedded in silicon (the
      Structure-Defined Dataflow architecture), cannot be replicated via software updates by competitors,
      and directly addresses the power budget constraints of battery-powered and thermally-constrained OEM
      designs in cameras, drones, and robotics. Combined with the STMicroelectronics distribution
      agreement, this creates a defensible niche against NVIDIA's higher-power Jetson portfolio.
    claimRefs:
      - CP008
      - CP010
      - CP020

  - calloutType: risk
    title: CUDA Ecosystem Moat — NVIDIA Jetson Lock-in Creates Displacement Barrier
    body: >
      NVIDIA Jetson's CUDA/TensorRT/DeepStream ecosystem represents the deepest developer lock-in in edge
      AI. OEMs that have invested in TensorRT model optimization, CUDA custom kernels, and JetPack
      integration face a 3–6 month re-engineering cycle to switch to Hailo. The developer community on
      HackerNews and Hailo's own community forum shows that Hailo is frequently evaluated as a cost and
      power alternative to Jetson, but conversion requires a genuine constraint — not just preference —
      for Jetson to lose a design win. This incumbent advantage means Hailo's growth is primarily limited
      to greenfield OEM designs rather than displacement of active Jetson programmes.
    claimRefs:
      - CP016
      - CP029
      - CP031
      - CP037

  - calloutType: insight
    title: No Dominant Sub-15W Edge AI NPU Vendor — Market Remains Contested
    body: >
      Despite NVIDIA's dominance above 10W, the sub-15W edge AI NPU market remains fragmented with no
      single vendor exceeding an estimated 25–30% share as of 2026. Hailo, Ambarella, Intel, NXP, and
      Qualcomm all compete in overlapping but distinct niches — each with defensible positions in their
      primary segment. This fragmentation favours Hailo's multi-vertical strategy but also means that
      any vertical where Hailo lacks a dominant design win remains contested and vulnerable to
      displacement by a better-resourced competitor with adjacent vertical expertise.
    claimRefs:
      - CP038
      - CP002

