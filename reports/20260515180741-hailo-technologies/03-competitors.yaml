  evidenceGaps:
    - type: missing-source
      severity: critical
      topic: competitor volume pricing data
      missingEvidence: >
        No edge AI chip vendor — NVIDIA (Jetson SOM production), Ambarella (CV5), or Hailo — publicly
        discloses production volume chip pricing. All pricing estimates in this chapter are derived from
        developer kit MSRPs, distributor listings, and teardown analyses.
      whyItMatters: >
        Without verified pricing, Hailo's claimed cost competitiveness vs Ambarella and Qualcomm cannot
        be confirmed. If Hailo's volume pricing is not materially below Ambarella's, the power efficiency
        advantage alone may not be sufficient to justify platform migration for camera OEMs.
      diligencePath: >
        Obtain volume pricing sheets from Hailo's distribution partners (STMicro, Renesas); request
        competitive pricing intelligence from OEMs that have dual-sourced Hailo and Ambarella.
      relatedQuestionRefs: [QP016, QP022]

    - type: missing-source
      severity: material
      topic: independent head-to-head benchmark of Hailo-8 vs Ambarella CV5
      missingEvidence: >
        No independent third-party benchmark compares Hailo-8 and Ambarella CV5 on equivalent security
        camera inference tasks (object detection accuracy, latency, power) as of May 2026. The Electronic
        Design comparison covered Hailo-8 vs Jetson but not Ambarella.
      whyItMatters: >
        Ambarella CV5 is Hailo's most direct competitor in the security camera SoC segment. Without a
        head-to-head benchmark, differentiation claims for Hailo-15H vs CV5 are based on spec sheets
        rather than validated real-world performance.
      diligencePath: >
        Commission independent benchmark with EEMBC (Embedded Microprocessor Benchmark Consortium) MLPerf
        Tiny; obtain OEM evaluation board test results; review academic published comparisons.
      relatedQuestionRefs: [QP003, QP008]

    - type: private-evidence-only
      severity: material
      topic: Hailo automotive pipeline evidence
      missingEvidence: >
        No public source confirms any production automotive ADAS design win for Hailo. Application pages
        and CES 2025 demos indicate the vertical is targeted but do not disclose named vehicle programmes
        or OEM customers in automotive.
      whyItMatters: >
        Automotive represents the highest ASP edge AI chip segment. Without automotive design win evidence,
        Hailo's automotive revenue contribution is speculative and the ASIL gap is unmitigated.
      diligencePath: >
        Request automotive design-win evidence from Hailo investor relations; track job postings for
        ASIL functional safety engineers as proxy for active programme commitments.
      relatedQuestionRefs: [QP005, QP017]

    - type: missing-source
      severity: moderate
      topic: NVIDIA Jetson installed base and market share data
      missingEvidence: >
        NVIDIA does not publicly disclose Jetson-specific unit shipments or revenue. The "1M+ deployments"
        estimate is sourced from media reports and community estimates, not official NVIDIA disclosure.
      whyItMatters: >
        Without confirmed Jetson market share, the extent of ecosystem network effects and switching-cost
        moat is estimated qualitatively rather than quantitatively, affecting the validity of competitive
        intensity assessments.
      diligencePath: >
        Source NVIDIA embedded systems revenue from public earnings disclosures (included in Automotive
        segment); cross-reference JetPack SDK download statistics if available from community data.
      relatedQuestionRefs: [QP004, QP006]
