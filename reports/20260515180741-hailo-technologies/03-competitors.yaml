  - id: feature-comparison
    title: Capability, Pricing, and GTM Comparison
    body: >
      On the performance dimension, Hailo-8 (26 TOPS at <5W) achieves the highest TOPS-per-watt ratio in
      the sub-5W class among independently benchmarked edge AI chips, according to the Electronic Design
      Hailo vs NVIDIA analysis. NVIDIA Jetson Orin Nano delivers 40 TOPS but at 10W — twice the power
      consumption for 1.5x the TOPS. Ambarella CV5 delivers approximately 8 TOPS at 2–4W, significantly
      trailing Hailo-8 in raw TOPS but with stronger ISP integration for security cameras. Intel Myriad X
      delivers only 4 TOPS at 1–4W, trailing Hailo substantially on absolute performance.

      On pricing, Hailo-8 and Hailo-8L are reported to be priced in the $7–20 per-chip range at production
      volume — consistent with mid-tier edge AI ASP. NVIDIA Jetson Nano devkit is $499, with production SOM
      pricing reportedly $100–250. Ambarella CV5 volume pricing is undisclosed but estimated in the $15–40
      range. The pricing positioning suggests Hailo's target sweet spot is cost-sensitive OEM designs where
      Jetson's power and cost are prohibitive.

      On GTM and distribution, Hailo's STMicroelectronics and Renesas partnerships provide broad OEM channel
      coverage with established embedded system sales networks. This is a meaningful advantage over Intel's
      direct sales model for Myriad X and Ambarella's more limited distribution. The Raspberry Pi AI HAT+
      partnership provides unique developer mindshare that none of the camera-focused competitors (Ambarella,
      NXP) have replicated. NVIDIA's direct enterprise sales model has a higher cost-of-sale but reaches
      larger programme budgets. The STMicro partnership announcement confirmed a global distribution agreement
      covering Hailo's full chip line, representing a material GTM commitment from a Tier-1 distributor.
    claimRefs:
