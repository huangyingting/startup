  - id: competitor-profiles
    title: Competitor Profiles and Strategic Direction
    body: >
      NVIDIA Jetson Orin (launched 2022, Orin NX/Nano updated 2023) spans 10–275 TOPS across six SKUs from
      $499 (Nano) to $999 (AGX Orin). NVIDIA targets robotics, autonomous vehicles, industrial automation,
      and smart infrastructure with full CUDA/TensorRT/DeepStream support. Scale is unmatched: NVIDIA had
      ~$44B in data centre revenue in FY2024 and the Jetson installed base exceeds one million deployed modules.
      Strategic direction is toward higher TOPS and multi-modal AI (LLM-capable Orin). The primary limitation
      is power (10–60W) and cost — disqualifying Jetson for battery-powered, cost-sensitive mass-market cameras.

      Ambarella CV3/CV5 are automotive and security camera SoCs that integrate ISP, encoder, and CNN
      accelerator in a single chip. CV5 delivers ~8 TOPS at approximately 2–4W and has a strong installed
      base in high-resolution security cameras. CV3 targets ADAS with Level 2+ surround-view AI. Ambarella's
      differentiation is deep ISP integration — a direct competitive overlap with Hailo-15H — and strong
      relationships with Chinese and Korean camera OEMs established over a decade of IP-camera silicon.
      Revenue was approximately $220M in FY2024 and the company is profitable on hardware alone.

      Intel Movidius Myriad X (MA2485) delivers 4 TOPS at approximately 1–4W but Intel has announced
      migration guidance for Myriad customers toward newer platforms, creating legacy and EOL risk for
      existing Myriad X design wins. NXP i.MX9 series targets automotive and industrial MCU applications
      with sub-2 TOPS neural processing acceleration — significantly below Hailo's performance range but
      with automotive ASIL-D certification that Hailo lacks. ARM Ethos NPU (N78, N68) is IP licensed to SoC
      integrators, making it an indirect competitor — ARM enables every MediaTek, Samsung, and NXP device
      that integrates Cortex-A processors to include an NPU, but does not sell chips directly.
    claimRefs:
