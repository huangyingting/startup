  evidenceGaps:
    - type: private-evidence-only
      severity: blocking
      topic: automotive customer identity
      missingEvidence: >
        No Tier-1 automotive OEM customer has been publicly named by Hailo or any third-party source.
        Hailo's automotive pipeline is referenced in funding communications but unverifiable externally.
      whyItMatters: >
        Automotive represents the highest-ASP segment and could be the primary revenue driver.
        Without named OEM confirmation, the automotive thesis cannot be validated through public research.
      diligencePath: >
        Request named OEM list under NDA in data room; obtain SOP dates and design-in stage for each.
        Cross-check via automotive Tier-1 OEM 10-K supplier disclosures where available.
      relatedQuestionRefs: [QU005]

    - type: private-evidence-only
      severity: blocking
      topic: customer count and revenue
      missingEvidence: >
        Hailo discloses no customer count, revenue per segment, or total revenue. All quantitative
        commercial performance metrics are unavailable from public sources.
      whyItMatters: >
        Investor due diligence on commercial traction requires revenue data. Without it, valuation
        relies on comparable chip company multiples applied to estimated revenue ranges.
      diligencePath: >
        Request audited financials or CFO-presented revenue breakdown by segment in diligence data room.
        Compare against Series C pitch deck projections if available.
      relatedQuestionRefs: [QU006, QU016]

    - type: missing-source
      severity: material
      topic: retention and churn metrics
      missingEvidence: >
        No NRR, GRR, churn rate, or contract renewal data is available for any Hailo customer segment.
        The chip OEM model lacks subscription-style retention visibility.
      whyItMatters: >
        Without retention data, it is impossible to assess whether Hailo wins are sticky or whether
        customers are trialing and then switching to competing platforms for subsequent generations.
      diligencePath: >
        Ask Hailo to provide: (1) list of OEM customers who designed in Hailo-8 and have since started
        a follow-on design; (2) any OEM who evaluated and rejected Hailo for a subsequent generation.
      relatedQuestionRefs: [QU006, QU021]

    - type: enumeration-incomplete
      severity: material
      topic: named customer proof table
      missingEvidence: >
        The Named Customer Proof Table covers publicly confirmable deployments only; Hailo likely has
        additional OEM customers not publicly disclosed. Automotive OEM list is entirely absent.
      whyItMatters: >
        Incomplete enumeration may understate commercial traction or, conversely, may cause over-reliance
        on the few confirmed public customers.
      diligencePath: >
        Obtain full partner/customer list from Hailo's CRM or partner directory during diligence.
      relatedQuestionRefs: [QU002]

    - type: private-evidence-only
      severity: material
      topic: conversion rate developer to production
      missingEvidence: >
        No data is available on what proportion of Raspberry Pi AI HAT+ developers convert to
        production OEM design-in recommendations or repeat purchases.
      whyItMatters: >
        The developer funnel value depends on conversion. If developer adoption does not lead to
        production design-in, the RPi relationship is marketing value only, not a commercial driver.
      diligencePath: >
        Ask Hailo for any tracked conversion data from developer evaluation to production purchase.
        Survey a sample of RPi AI HAT+ buyers on intended production use.
      relatedQuestionRefs: [QU016]
