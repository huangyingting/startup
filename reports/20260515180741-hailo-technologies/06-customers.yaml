  - id: retention-concentration-risk
    title: Retention Visibility, Expansion Potential, and Concentration Risk
    body: >
      Hailo discloses no customer retention metrics: NRR, GRR, churn rate, contract renewal data, or
      customer satisfaction scores are not publicly available for any segment. The semiconductor OEM model
      typically exhibits high retention within an active design family (chips are designed in and stay in
      for the product lifecycle), but revenue follows production volumes rather than subscription payments.
      For industrial OEM customers like Advantech and Axiomtek, repeat engagement across product generations
      is a strong indicator of retention — both companies continue to introduce new Hailo-integrated products,
      suggesting ongoing commercial relationship health — but volume data is undisclosed.

      Concentration risk is material and asymmetric. The unnamed automotive OEM pipeline represents
      potentially the largest revenue opportunity but carries the highest execution uncertainty: automotive
      design cycles run 3-5 years from design-in to start-of-production, and if planned automotive wins
      do not convert to SOP revenue, the commercial base defaults to lower-ASP industrial and developer
      channels. Adverse analysts have noted that Hailo's 4-year funding gap since the May 2022 Series C
      suggests either strong organic cash generation (unverifiable) or capital constraint that could
      pressure commercial strategy if the automotive pipeline does not materialize.

      Expansion vectors include: (1) new chip generations (Hailo-10H for generative AI at edge creating
      new customer opportunities), (2) geographic expansion in Asia via Renesas and STMicro channels,
      (3) vertical expansion into robotics, drones, and industrial inspection, and (4) potential
      professional services or software layer revenue if Hailo moves up the stack. None of these expansion
      vectors has confirmed customer traction beyond the existing OEM channel.
