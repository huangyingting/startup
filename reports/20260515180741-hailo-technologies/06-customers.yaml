  - id: named-customer-proof
    title: Named Customer Proof Points and Adoption Evidence
    body: >
      The strongest named customer evidence is in the developer/maker and industrial segments. Raspberry Pi
      Foundation's AI HAT+ product line is the highest-profile public customer proof: Raspberry Pi officially
      lists the Hailo-8L and Hailo-8 as the AI accelerator for two SKUs of its AI HAT+ product family,
      and the Hailo-10H is featured in the AI Camera product. This constitutes confirmed production
      deployment — the AI HAT+ is a finished retail product listed on the Raspberry Pi official store —
      not merely a reference design or pilot. The strategic value of the Raspberry Pi relationship extends
      beyond unit volume: it provides developer ecosystem exposure, brand validation, and a low-friction
      path for embedded developers to evaluate Hailo hardware before recommending it for production designs.

      Advantech's integration of Hailo-8 in the MIC-AI730 and AIR-030 AI inference products is documented
      in Advantech product datasheets and confirmed by Hailo's partner directory. Axiomtek's AECG100
      Edge AI Platform with Hailo-8 is listed on Axiomtek's product page. Arducam, a camera module maker
      targeting the Raspberry Pi and embedded Linux community, offers Hailo-compatible AI camera modules.
      ADLINK Technology lists Hailo AI accelerator modules in its edge computing portfolio. These named
      industrial deployments are in active production — not pilot — based on public product listings and
      datasheet availability.

      Automotive evidence is circumstantial: Hailo's official automotive page references ADAS, cockpit AI,
      and surround-view applications, and notes AEC-Q100 qualification and ISO 26262 documentation support.
      However, no Tier-1 automotive OEM — Bosch, Continental, Aptiv, Visteon, Denso, or others — has
      publicly identified Hailo as a silicon supplier. This is not unusual: automotive design wins typically
      remain under NDA until production start-of-production (SOP), but it means that the claimed automotive
      pipeline cannot be independently verified through public evidence.

      STMicroelectronics and Renesas are confirmed distribution partners, not end-customers. Both companies'
      distribution agreements expand Hailo's sales reach to their respective embedded OEM customer bases —
      STMicro brings European industrial/automotive reach; Renesas brings Japanese and Asian embedded OEM
      relationships. These partnerships are confirmed through press releases from both companies and from
      Hailo.
