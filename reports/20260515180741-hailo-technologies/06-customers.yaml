  - id: channel-partners-ecosystem
    title: Channel Partner Ecosystem and Go-to-Market Reach
    body: >
      Hailo's primary commercial motion is OEM design-in rather than direct enterprise sales. The company
      relies on a three-tier channel: distribution partners (STMicroelectronics, Renesas), system integrators
      and module makers (Advantech, Axiomtek, ADLINK), and developer community-led organic adoption
      (Raspberry Pi AI HAT+, Arducam camera modules). STMicroelectronics is among the world's largest
      semiconductor distributors with direct relationships with hundreds of thousands of OEM customers.
      Renesas Electronics has strong embedded OEM relationships in Japan, Southeast Asia, and automotive
      Tier-1 supply chains. These two distribution partners substantially multiply Hailo's addressable
      customer base beyond what a direct sales force of 200-300 employees could reach.

      Hailo's developer ecosystem is supported by the HailoRT inference runtime, the Hailo Model Zoo with
      pre-compiled models, and the Hailo Dataflow Compiler. The Raspberry Pi community provides a large,
      technically engaged developer base for evaluation and prototyping. Community signals — GitHub stars,
      tutorial engagement, forum activity — indicate active exploration but developer feedback surfaces
      meaningful SDK complexity: the Hailo Dataflow Compiler requires explicit model recompilation and
      hardware-graph mapping that is more involved than NVIDIA's TensorRT or OpenVINO workflows. This SDK
      friction is an acknowledged adoption barrier in independent developer discussions.

      Hailo claims to have over 100 ecosystem partners across system integrators, solution providers, and
      independent software vendors. This figure is company-claimed and cannot be independently verified.
      The EU Horizon 2020 grant connection provides a pathway into European automotive supply chain
      relationships, though specific OEM design wins from this program are not publicly confirmed.
