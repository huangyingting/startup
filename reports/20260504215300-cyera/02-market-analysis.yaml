  title: Market Analysis
  summary: >-
    Cyera sells into a market where AI governance, compliance, and breach economics are all pulling enterprises toward
    deeper data visibility and control.
sections:
  - id: s1
    title: Market Boundary
    body: >-
      Cyera is not targeting generic cybersecurity spend. Its core market is the intersection of data security posture
      management, data loss prevention, and AI-era governance. That market is growing because enterprises no longer view
      data as a passive asset; they view it as the fuel and the liability layer behind AI deployment.
    claimRefs:
      - C005
      - C006
  - id: s2
    title: Demand Drivers
    body: >-
      Two forces are doing most of the work here. First, enterprise AI adoption is accelerating faster than many
      governance programs can keep up. Second, the cost and reputational damage of data failures remain high. Those
      conditions create urgency for a platform that helps organizations identify sensitive data quickly and apply
      governance without manually mapping every environment.
    claimRefs:
      - C006
      - C007
  - id: s3
    title: Adoption Constraints
    body: >-
      The market is strong, but crowded. Security teams are already dealing with alert fatigue, platform sprawl, and
      tool overlap. Cyera benefits from this environment because the problem is urgent, but it also faces a difficult
      proof burden: to show that it simplifies operations rather than becoming one more layer in an already overbought
      stack.
    claimRefs:
      - C008
