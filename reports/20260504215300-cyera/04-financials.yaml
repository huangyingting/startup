  title: Financials
  summary: >-
    Cyera’s financial story is straightforward at the top line — huge rounds at ever-higher valuations — but still only
    partially transparent at the operating level.
sections:
  - id: s1
    title: Capital Formation
    body: >-
      Cyera is now one of the most heavily funded private cybersecurity companies. More than $1.3 billion had been
      raised by the Series E, and more than $1.7 billion after the Series F. That level of capital supports aggressive
      hiring, acquisitions, global expansion, and platform breadth, but it also raises the performance bar dramatically.
    claimRefs:
      - C011
      - C012
  - id: s2
    title: Revenue Signal vs. Valuation
    body: >-
      The most notable operating signal in public coverage is the suggestion that Cyera was approaching $100 million in
      annual revenue around the time of the $6 billion Series E. Even if that figure is directionally right, the
      multiple implied by a $6-9 billion valuation remains demanding. Investors are clearly underwriting a much larger
      future platform, not current-year economics alone.
    claimRefs:
      - C012
      - C013
  - id: s3
    title: What Remains Private
    body: >-
      Cyera does not publish detailed revenue composition, gross margin, burn, or retention in its public press
      materials. That leaves an important ambiguity: whether the company is already building a highly efficient security
      platform, or simply compressing years of growth into a period of very high spending and favorable AI enthusiasm.
    claimRefs:
      - C014
