evidenceGaps:
  - type: private-evidence-only
    severity: material
    topic: Operating efficiency
    missingEvidence: Public sources do not disclose margin, burn efficiency, or retention.
    whyItMatters: These metrics determine whether the current valuation reflects durable platform quality or only speed of growth.
    diligencePath: Request board deck metrics on net retention, gross margin, cash burn, and enterprise expansion cohorts.
  - type: private-evidence-only
    severity: material
    topic: Retention and efficiency data
    missingEvidence: Net retention, burn multiple, and product-level monetization are not public.
    whyItMatters: These metrics are crucial for judging whether Cyera deserves a premium platform multiple at $9B.
    diligencePath: Request cohort analysis, NRR, gross margin, and sales-efficiency metrics from management.
