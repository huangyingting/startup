company:
  name: Cyera
chapter:
  number: 1
  title: Company Overview
  summary: >-
    Cyera is one of the fastest-rising private cybersecurity companies of the AI era, using data security posture
    management and adjacent controls as the wedge into enterprise AI governance.
sections:
  - id: s1
    title: Identity and Mission
    body: >-
      Cyera’s core identity is an AI-native data security platform built for the cloud era. The company’s messaging is
      less about endpoint protection or classic network security and more about knowing where sensitive data lives, who
      can access it, how it moves, and how enterprises can adopt AI without losing control. That focus has become
      strategically relevant as AI projects turn data visibility from a compliance concern into a board-level
      operational issue.
    claimRefs:
      - C002
  - id: s2
    title: Founders and Background
    body: >-
      Public profiles identify Yotam Segev and Tamar Bar-Ilan as the founders and principal product leaders behind
      Cyera. Their background in elite Israeli technical and security environments gives the company the kind of origin
      story enterprise security buyers and investors understand well. It also helps explain why the company scaled into
      a capital-intensive, category-defining narrative quickly.
    claimRefs:
      - C001
  - id: s3
    title: Scale and Momentum
    body: >-
      Cyera’s financing and hiring trajectory moved into another league in 2025. The company first reached a $6 billion
      valuation in the Series E and later a $9 billion valuation in the Series F, while reporting nearly 800 employees,
      operations in 10-plus countries, and meaningful penetration into the Fortune 500. That pace makes Cyera important
      not just as a startup but as a category signal for AI-era enterprise security spend.
    claimRefs:
      - C003
      - C004
