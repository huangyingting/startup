company:
  name: Cyera
subtitle: 'AI-Era Data Security Control Plane: VC Diligence Report'
coverageNotes: >-
  Cyera publishes strong first-party funding and traction signals, but like most late-stage private security companies
  it does not publish full operating metrics, which limits precision on efficiency and valuation.
