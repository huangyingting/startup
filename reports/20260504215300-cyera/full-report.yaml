companyProfile:
  summary: >-
    Cyera has become one of the defining private cybersecurity companies of the AI cycle by turning data security into
    the control layer for enterprise AI adoption. Rapid funding, elite customers, platform breadth, and fast hiring all
    support the leadership narrative, but the company is now priced as though that leadership is already durable and
    fully proven.
  foundedDate: '2021-01-01'
  founders:
    - name: Yotam Segev
      role: Co-Founder and CEO
      background: CEO and public architect of Cyera’s AI-era data security positioning.
      claimRefs: []
    - name: Tamar Bar-Ilan
      role: Co-Founder and CTO
      background: Technical co-founder driving Cyera’s product depth and platform architecture.
      claimRefs: []
  foundingLocation: Israel
  headquarters: New York, NY / Tel Aviv, Israel
  productSummary: >-
    Cyera provides AI-native discovery, classification, DSPM, DLP, and AI governance capabilities to help enterprises
    secure sensitive data across modern environments.
  customerFocus: Large enterprises with significant cloud, SaaS, AI, and compliance exposure.
  businessModel: Enterprise software platform sold to security, data, and AI stakeholders across large organizations.
  stage: Late-stage private
  fundingStatus: Raised $540M Series E at $6B valuation in 2025 and later $400M Series F at $9B; over $1.7B total funding reported.
  claimRefs: []
chapters:
  - number: 2
    title: Company Overview
    sections:
      - number: '2.1'
        title: Identity and Mission
        blocks:
          - type: paragraph
            body: >-
              Cyera’s core identity is an AI-native data security platform built for the cloud era. The company’s
              messaging is less about endpoint protection or classic network security and more about knowing where
              sensitive data lives, who can access it, how it moves, and how enterprises can adopt AI without losing
              control. That focus has become strategically relevant as AI projects turn data visibility from a
              compliance concern into a board-level operational issue.
            claimRefs:
              - C002
      - number: '2.2'
        title: Founders and Background
        blocks:
          - type: paragraph
            body: >-
              Public profiles identify Yotam Segev and Tamar Bar-Ilan as the founders and principal product leaders
              behind Cyera. Their background in elite Israeli technical and security environments gives the company the
              kind of origin story enterprise security buyers and investors understand well. It also helps explain why
              the company scaled into a capital-intensive, category-defining narrative quickly.
            claimRefs:
              - C001
      - number: '2.3'
        title: Scale and Momentum
        blocks:
          - type: paragraph
            body: >-
              Cyera’s financing and hiring trajectory moved into another league in 2025. The company first reached a $6
              billion valuation in the Series E and later a $9 billion valuation in the Series F, while reporting nearly
              800 employees, operations in 10-plus countries, and meaningful penetration into the Fortune 500. That pace
              makes Cyera important not just as a startup but as a category signal for AI-era enterprise security spend.
            claimRefs:
              - C003
              - C004
      - number: '2.4'
        title: Exhibits
        blocks:
          - type: callout
            title: Cyera is being valued like a category leader, not a feature vendor
            body: >-
              The pace of funding, hiring, and platform expansion shows investors see Cyera as an AI-era security
              control plane rather than just another posture-management tool.
            calloutType: insight
            claimRefs:
              - C002
              - C003
              - C004
          - type: table
            tableRef: T101
            claimRefs:
              - C001
              - C002
              - C003
              - C004
          - type: table
            tableRef: T102
            claimRefs:
              - C001
              - C004
          - type: table
            tableRef: T103
            claimRefs:
              - C003
              - C004
  - number: 3
    title: Market Analysis
    sections:
      - number: '3.1'
        title: Market Boundary
        blocks:
          - type: paragraph
            body: >-
              Cyera is not targeting generic cybersecurity spend. Its core market is the intersection of data security
              posture management, data loss prevention, and AI-era governance. That market is growing because
              enterprises no longer view data as a passive asset; they view it as the fuel and the liability layer
              behind AI deployment.
            claimRefs:
              - C005
              - C006
      - number: '3.2'
        title: Demand Drivers
        blocks:
          - type: paragraph
            body: >-
              Two forces are doing most of the work here. First, enterprise AI adoption is accelerating faster than many
              governance programs can keep up. Second, the cost and reputational damage of data failures remain high.
              Those conditions create urgency for a platform that helps organizations identify sensitive data quickly
              and apply governance without manually mapping every environment.
            claimRefs:
              - C006
              - C007
      - number: '3.3'
        title: Adoption Constraints
        blocks:
          - type: paragraph
            body: >-
              The market is strong, but crowded. Security teams are already dealing with alert fatigue, platform sprawl,
              and tool overlap. Cyera benefits from this environment because the problem is urgent, but it also faces a
              difficult proof burden: to show that it simplifies operations rather than becoming one more layer in an
              already overbought stack.
            claimRefs:
              - C008
      - number: '3.4'
        title: Exhibits
        blocks:
          - type: callout
            title: AI makes data security more strategic
            body: >-
              The more enterprises push data into copilots and agents, the more they need a system that can classify,
              control, and govern that data continuously.
            calloutType: insight
            claimRefs:
              - C006
              - C007
          - type: table
            tableRef: T201
            claimRefs:
              - C005
              - C006
              - C007
          - type: table
            tableRef: T202
            claimRefs:
              - C006
              - C007
              - C008
  - number: 4
    title: Competitors
    sections:
      - number: '4.1'
        title: Direct Competitive Set
        blocks:
          - type: paragraph
            body: >-
              Cyera is surrounded by credible competitors. Legacy data-security vendors bring brand trust and installed
              base; newer DSPM and AI-security platforms bring category focus and modern architectures. That means Cyera
              is not trying to educate the market from scratch — a benefit — but it is also fighting in an increasingly
              noisy field.
            claimRefs:
              - C009
      - number: '4.2'
        title: Current Edge
        blocks:
          - type: paragraph
            body: >-
              Cyera’s clearest public edge is breadth. The company is trying to collapse discovery, classification, DLP,
              identity context, and AI governance into a single control plane. If buyers really want fewer tools, that
              is an important advantage. If buyers prefer best-of-breed layers, the platform story becomes harder.
            claimRefs:
              - C010
      - number: '4.3'
        title: What To Watch
        blocks:
          - type: paragraph
            body: >-
              The competitive question is not whether rivals exist — they do. The question is whether Cyera can keep
              expanding faster than the market fragments, and whether its rapid growth continues to translate into
              customer love rather than a temporary AI-budget wave.
            claimRefs:
              - C009
              - C010
      - number: '4.4'
        title: Exhibits
        blocks:
          - type: callout
            title: Crowded market means execution matters more than acronym leadership
            body: >-
              Cyera may be growing quickly, but the company still has to prove that its unified-platform thesis beats
              specialists and incumbents over time.
            calloutType: risk
            claimRefs:
              - C009
              - C010
          - type: table
            tableRef: T301
            claimRefs:
              - C009
              - C010
  - number: 5
    title: Financials
    sections:
      - number: '5.1'
        title: Capital Formation
        blocks:
          - type: paragraph
            body: >-
              Cyera is now one of the most heavily funded private cybersecurity companies. More than $1.3 billion had
              been raised by the Series E, and more than $1.7 billion after the Series F. That level of capital supports
              aggressive hiring, acquisitions, global expansion, and platform breadth, but it also raises the
              performance bar dramatically.
            claimRefs:
              - C011
              - C012
      - number: '5.2'
        title: Revenue Signal vs. Valuation
        blocks:
          - type: paragraph
            body: >-
              The most notable operating signal in public coverage is the suggestion that Cyera was approaching $100
              million in annual revenue around the time of the $6 billion Series E. Even if that figure is directionally
              right, the multiple implied by a $6-9 billion valuation remains demanding. Investors are clearly
              underwriting a much larger future platform, not current-year economics alone.
            claimRefs:
              - C012
              - C013
      - number: '5.3'
        title: What Remains Private
        blocks:
          - type: paragraph
            body: >-
              Cyera does not publish detailed revenue composition, gross margin, burn, or retention in its public press
              materials. That leaves an important ambiguity: whether the company is already building a highly efficient
              security platform, or simply compressing years of growth into a period of very high spending and favorable
              AI enthusiasm.
            claimRefs:
              - C014
      - number: '5.4'
        title: Exhibits
        blocks:
          - type: callout
            title: Cyera is already valued for category leadership
            body: >-
              At $6-9B, Cyera is no longer being priced as an early security startup. Investors are effectively assuming
              it becomes a durable control point in the AI data-security stack.
            calloutType: insight
            claimRefs:
              - C012
              - C013
              - C014
          - type: table
            tableRef: T401
            claimRefs:
              - C011
              - C012
              - C013
          - type: table
            tableRef: T402
            claimRefs:
              - C014
  - number: 6
    title: Product & Technology
    sections:
      - number: '6.1'
        title: Core Product Thesis
        blocks:
          - type: paragraph
            body: >-
              Cyera’s product thesis is that data visibility should be continuous and contextual, not periodic and
              manual. The platform is meant to discover sensitive data, understand where it sits, map access and
              identity context around it, and help customers secure AI use without losing speed. That is attractive
              because data itself is now the core AI attack surface.
            claimRefs:
              - C015
      - number: '6.2'
        title: Why the Platform Story Matters
        blocks:
          - type: paragraph
            body: >-
              Security teams are overloaded. A vendor that can plausibly combine DSPM, DLP, and AI governance inside one
              platform has an obvious wedge with buyers who want consolidation. Cyera’s product messaging is built
              around that idea, including claims that Omni DLP cuts false-positive toil and that AI Guardian extends the
              platform into responsible AI use cases.
            claimRefs:
              - C015
              - C016
      - number: '6.3'
        title: Technical Risk Surface
        blocks:
          - type: paragraph
            body: >-
              The product risk is not that Cyera lacks features. The risk is that buyers may already have several
              overlapping tools and demand proof that Cyera truly reduces complexity, deployment burden, and operational
              noise. If the platform becomes one more console rather than a control plane, the story weakens quickly.
            claimRefs:
              - C016
              - C017
      - number: '6.4'
        title: Exhibits
        blocks:
          - type: callout
            title: Cyera is aligned with the new AI control point
            body: >-
              As AI shifts security concern toward data, a platform built around data visibility and control naturally
              becomes more strategic.
            calloutType: strength
            claimRefs:
              - C015
              - C016
          - type: table
            tableRef: T501
            claimRefs:
              - C015
              - C016
              - C017
  - number: 7
    title: Customers
    sections:
      - number: '7.1'
        title: Traction Signal
        blocks:
          - type: paragraph
            body: >-
              For a security startup, the strongest public customer marker is Cyera’s claim to serve 20% of the Fortune
              500. Even allowing for generous company framing, that is meaningful. It suggests the company has moved
              beyond design partners into a real enterprise buying motion.
            claimRefs:
              - C018
      - number: '7.2'
        title: Who Buys
        blocks:
          - type: paragraph
            body: >-
              The buyer profile looks like what investors want: telecom, financial services, healthcare, retail, media,
              and other data-heavy enterprises with meaningful compliance and AI exposure. These are high-value buyers,
              but also demanding ones. If Cyera retains them, it strengthens the platform thesis considerably.
            claimRefs:
              - C019
      - number: '7.3'
        title: Ecosystem Advantage
        blocks:
          - type: paragraph
            body: >-
              Cyera also benefits from being adjacent to the platforms where enterprise data actually lives: cloud
              providers, data clouds, and enterprise AI stacks. That ecosystem alignment helps distribution and
              credibility, though it also means the company must coexist with large partners that may become competitors
              in adjacent workflows.
            claimRefs:
              - C020
      - number: '7.4'
        title: Exhibits
        blocks:
          - type: callout
            title: The buyers are the right buyers
            body: >-
              Cyera’s traction matters because it appears to be landing inside exactly the enterprises most exposed to
              AI governance and data-control pain.
            calloutType: strength
            claimRefs:
              - C018
              - C019
          - type: table
            tableRef: T601
            claimRefs:
              - C018
              - C019
              - C020
  - number: 8
    title: Risks
    sections:
      - number: '8.1'
        title: Execution Risk at Valuation Scale
        blocks:
          - type: paragraph
            body: >-
              Once a security company is valued at $6-9 billion, the question is no longer whether the market exists.
              The question is whether the company can keep compounding fast enough to justify that price. Any softness
              in growth, expansion, or product cohesion becomes more expensive when investors have already priced in
              category leadership.
            claimRefs:
              - C024
      - number: '8.2'
        title: Competitive and Budget Risk
        blocks:
          - type: paragraph
            body: >-
              Enterprise security categories tend to fragment, converge, and relabel quickly. That means Cyera must keep
              proving that its unified platform actually reduces complexity. If customers still need multiple
              overlapping vendors, the consolidation thesis weakens and spending can slow.
            claimRefs:
              - C023
      - number: '8.3'
        title: Regulatory and Trust Risk
        blocks:
          - type: paragraph
            body: >-
              Cyera’s product is built around the most sensitive part of the enterprise: the data itself. That creates
              trust obligations. Regulatory expectations, governance demands, and AI-risk scrutiny will only increase,
              and any material failure in customer trust would hit the company hard.
            claimRefs:
              - C021
              - C022
      - number: '8.4'
        title: Exhibits
        blocks:
          - type: callout
            title: The multiple leaves little room for narrative slip
            body: >-
              Cyera can still be a very good company and a difficult investment if growth normalizes faster than
              investors expect.
            calloutType: risk
            claimRefs:
              - C023
              - C024
          - type: table
            tableRef: T701
            claimRefs:
              - C021
              - C022
              - C023
              - C024
  - number: 9
    title: Valuation
    sections:
      - number: '9.1'
        title: Why the Valuation Is Understandable
        blocks:
          - type: paragraph
            body: >-
              Cyera is operating at the center of a powerful AI-era security narrative and has backed it with
              extraordinary private-market momentum. Few companies can claim the combination of platform breadth,
              Fortune 500 penetration, and capital support that Cyera has assembled in such a short period.
            claimRefs:
              - C025
              - C026
      - number: '9.2'
        title: Why It Still Feels Rich
        blocks:
          - type: paragraph
            body: >-
              The problem is not quality; it is price. Even if the business is approaching $100 million in annual
              revenue, the company is still being valued at a level that implies durable platform control, outstanding
              retention, and continued category expansion. Public evidence is strong, but it is not yet complete enough
              to remove all doubt.
            claimRefs:
              - C025
              - C026
              - C027
      - number: '9.3'
        title: Investment View
        blocks:
          - type: paragraph
            body: >-
              Cyera is attractive strategically but difficult tactically. It deserves a place high on any AI-security
              watchlist, yet the most disciplined view is to treat the valuation as stretched until there is better
              evidence on operating efficiency and long-term platform stickiness.
            claimRefs:
              - C026
              - C027
      - number: '9.4'
        title: Exhibits
        blocks:
          - type: callout
            title: Track; avoid forcing the price
            body: >-
              Cyera is one of the best-positioned recent private unicorns in AI security, but the current valuation
              appears stretched enough that patience and additional operating proof are warranted.
            calloutType: recommendation
            claimRefs:
              - C025
              - C027
          - type: table
            tableRef: T801
            claimRefs:
              - C025
              - C026
              - C027
