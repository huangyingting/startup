  title: Valuation
  summary: Cyera is a real category leader candidate, but the current valuation already assumes a great deal of future success.
sections:
  - id: s1
    title: Why the Valuation Is Understandable
    body: >-
      Cyera is operating at the center of a powerful AI-era security narrative and has backed it with extraordinary
      private-market momentum. Few companies can claim the combination of platform breadth, Fortune 500 penetration, and
      capital support that Cyera has assembled in such a short period.
    claimRefs:
      - C025
      - C026
  - id: s2
    title: Why It Still Feels Rich
    body: >-
      The problem is not quality; it is price. Even if the business is approaching $100 million in annual revenue, the
      company is still being valued at a level that implies durable platform control, outstanding retention, and
      continued category expansion. Public evidence is strong, but it is not yet complete enough to remove all doubt.
    claimRefs:
      - C025
      - C026
      - C027
  - id: s3
    title: Investment View
    body: >-
      Cyera is attractive strategically but difficult tactically. It deserves a place high on any AI-security watchlist,
      yet the most disciplined view is to treat the valuation as stretched until there is better evidence on operating
      efficiency and long-term platform stickiness.
    claimRefs:
      - C026
      - C027
