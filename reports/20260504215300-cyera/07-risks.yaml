  title: Risks
  summary: >-
    Cyera’s risks are the classic ones for an elite private security company: valuation pressure, product-overlap
    pressure, and the difficulty of remaining a must-have platform as the market matures.
sections:
  - id: s1
    title: Execution Risk at Valuation Scale
    body: >-
      Once a security company is valued at $6-9 billion, the question is no longer whether the market exists. The
      question is whether the company can keep compounding fast enough to justify that price. Any softness in growth,
      expansion, or product cohesion becomes more expensive when investors have already priced in category leadership.
    claimRefs:
      - C024
  - id: s2
    title: Competitive and Budget Risk
    body: >-
      Enterprise security categories tend to fragment, converge, and relabel quickly. That means Cyera must keep proving
      that its unified platform actually reduces complexity. If customers still need multiple overlapping vendors, the
      consolidation thesis weakens and spending can slow.
    claimRefs:
      - C023
  - id: s3
    title: Regulatory and Trust Risk
    body: >-
      Cyera’s product is built around the most sensitive part of the enterprise: the data itself. That creates trust
      obligations. Regulatory expectations, governance demands, and AI-risk scrutiny will only increase, and any
      material failure in customer trust would hit the company hard.
    claimRefs:
      - C021
      - C022
