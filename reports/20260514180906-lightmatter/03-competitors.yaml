callouts:
  - calloutType: risk
    title: "NVIDIA-Ayar Labs Relationship is the Highest Competitive Risk"
    body: "Ayar Labs' strategic investment from NVIDIA creates a co-design pathway that could lock Lightmatter out of the GPU-adjacent AI training market if TeraPHY chiplets are integrated into future NVIDIA accelerator packages. This scenario would reduce Lightmatter's addressable market to custom ASIC and HPC segments, materially compressing the opportunity."
    claimRefs: [CP006, CP020, CP022]

  - calloutType: strength
    title: "114.6 Tbps Bandwidth Density is Genuine Differentiation"
    body: "Lightmatter's Passage M1000 at 114.6 Tbps bidirectional is the highest-published bandwidth density in the CPO segment by a significant margin. This positions Lightmatter uniquely for 1T+ parameter model training requirements that drive the most aggressive hyperscaler capex programs—a tier where Ayar TeraPHY and Intel OCI chiplet do not compete on equivalent specifications."
    claimRefs: [CP013, CP014, CP024]

  - calloutType: risk
    title: "Marvell/Celestial AI Adds Distribution Leverage Lightmatter Lacks"
    body: "Marvell's acquisition of Celestial AI (est. $1–2B) combines Photonic Fabric CPO technology with Marvell's established hyperscaler distribution and silicon networking relationships. This creates a competitive threat that is harder to counter than pure technical competition: Marvell can bundle CPO into existing optical interconnect contracts, bypassing the stand-alone design win process that Lightmatter must navigate."
    claimRefs: [CP003, CP008, CP021, CP023]

  - calloutType: insight
    title: "Manufacturing Maturity Gap is the Decisive Near-Term Competitive Factor"
    body: "All of Lightmatter's technical differentiation is nullified if manufacturing at production yields cannot be achieved. Intel's 8M+ PIC shipment track record represents 10 years of process development that Lightmatter must compress into 2–3 years to remain competitive on the commercialization timeline. The decisive question is not whether Lightmatter's technology is superior—it is—but whether the company can translate that superiority into production-validated, customer-qualified volume within the CPO adoption window."
    claimRefs: [CP009, CP015, CP017, CP025]

