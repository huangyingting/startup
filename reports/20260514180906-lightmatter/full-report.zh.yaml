      - number: '1.3'
        title: 融资历史、估值与投资方
        blocks:
          - type: paragraph
            body: >
              Lightmatter 已通过多轮股权融资累计募集 $850M，并在 2024 年 10 月达到 $4.4B 投后估值。最近且规模最大的一次融资是 2024 年 10 月完成的 $400M Series
              D。这一轮相较此前轮次明显上调，反映投资人强烈押注硅光子类别会成为前沿 AI 基础设施的关键使能层。


              公司网站明确确认，截至 2024 年 10 月累计融资 $850M、估值 $4.4B。这些数字与多份第三方报道一致，也印证了从早期种子轮、Series A、Series B 到 Series C
              的融资轨迹。Lightmatter 早期轮次包括 2022–2023 年完成的 Series C，以及 2019–2021 年的 Series A/B。由于 Lightmatter
              是私营公司，公开文件或监管披露无法完全确认更早轮次的具体估值和投资方名称。


              据报道，Lightmatter 融资历史中的关键投资方包括 GV（前 Google Ventures）、Spark Capital、SIP Global Partners、Fidelity
              Investments、Temasek Holdings 等，但完整股权结构表未公开披露。这些投资方名称出现在多篇已发表报道中。Lightmatter 未从公开市场融资，仍是注册于 Delaware
              的私营公司（Lightmatter, Inc.）。


              $4.4B 的 Series D 估值让 Lightmatter 成为这一阶段全球估值最高的硅光子创业公司之一，既反映公司技术差异化，也反映投资人对 AI 基础设施标的的强烈兴趣。公司累计融资
              $850M，为制造放量、产品开发和商业扩张提供了充足现金跑道，以支撑潜在 IPO 或并购之前的投入。
