            body: >-
              Guide VLSP 光引擎是一种软件定义、现场可更换、具备明确 MTBF
              的激光源。它创造了一条经常性耗材收入流——相当于光子数据中心里的墨盒；对希望在资本密集型中介层平台之外获得经常性收入的投资人来说，经济性有吸引力。
