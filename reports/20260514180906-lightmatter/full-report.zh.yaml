      - number: '4.3'
        title: 成本结构与单位经济
        blocks:
          - type: paragraph
            body: >
              Lightmatter 的成本结构由研发支出主导。按约 331 名员工（LinkedIn 估计）、其中估计 70–75% 为工程岗位、每名工程师全成本 $180K–$270K/yr 计算，总人力成本为每年
              $53–$84M。再加上流片成本（每次光子晶圆运行 $5–$20M）、TSMC 先进封装 NRE（每次合作 $10–$30M）、实验室和测试设备，以及 G&A 开支，年度总烧钱速度估计为
              $60–$90M/yr。这与 200–400 人规模、仍处于量产前阶段的光子半导体创业公司一致。


              量产规模下的单位经济更具推测性。Passage M1000 的 4,000 mm² 光子中介层需要 TSMC CoWoS-L 或同等级先进封装——这是最昂贵的基板工艺之一。早期量产（100–1,000
              个单元）下，每个中介层模块的估计 COGS 为 $15,000–$30,000，售价可能在 $30,000–$100,000 之间，取决于带宽层级和客户 NRE 贡献。这意味着早期产量下毛利率为
              33–70%，随着良率提升和封装成本下降，向 50–60% 压缩。光子组件 BOM 包括：激光源（$500–$2,000）、光子裸片（$2,000–$5,000）、OSAT
              封装（$5,000–$15,000）、测试和良率损失（早期量产约 ~30–40%）以及系统集成。这些数字来自行业估计，并非 Lightmatter 披露数据。
