      - number: '8.3'
        title: 情景分析：牛市、基准与熊市
        blocks:
          - type: paragraph
            body: >
              三种情景覆盖的结果跨度很大，反映出深科技硬件商业采用的二元性。牛市情景要求 2027 年前宣布两个 hyperscaler design win，2028 年开始量产爬坡，到 2030 年收入达到
              $300–500M。在该情景下，Lightmatter 通过 IPO 或收购实现 $8–12B 估值，相当于以 $4.4B 进入价格取得 1.8–2.7x
              回报。这要求良率、商业和资本风险同时解除——可以做到，但收入前硬件公司历史上很少跑通。


              基准情景假设 2027 年拿到一个 hyperscaler design win，2028–2029 年有限量产爬坡，2030 年收入达到 $100–200M，随后以 $3–5B 被战略收购或
              IPO。按进入价格计算，回报为 0.7–1.1x，本质上是收回本金或小幅亏损。基准情景是单一最可能情景（35–45% 概率），但在 $4.4B 进入价格下不是好的投资结果。


              熊市情景假设到 2028 年仍没有 design win，Lightmatter 要么以较低估值（$1–2B）做一轮承压 Series E，要么以 $0.5–1.5B 出售给 hyperscaler
              或战略买家。对应回报为 0.1–0.3x，Series D 投资人需要减记。考虑到竞争格局（Ayar Labs 面向 NVIDIA、Intel 的在位优势），以及 $4B+
              估值收入前深科技硬件公司的历史高失败率（Cerebras、Graphcore、SambaNova），熊市情景概率估计为 40–55%。


              在 $4.4B 进入价格下，情景分析显示风险 / 回报不对称且不利：投资预期价值约为进入价格的 0.85–1.1x，无法补偿 5–8 年持有期里的流动性风险、技术风险和退出时间成本。
