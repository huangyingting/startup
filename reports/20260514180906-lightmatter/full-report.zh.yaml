  - number: 7
    title: 风险
    sections:
      - number: '7.1'
        title: 监管、法律与 IP 风险
        blocks:
          - type: paragraph
            body: >
              Lightmatter 的监管风险显著且被低估。Bureau of Industry and Security（BIS）已扩大 Export Administration
              Regulations（EAR）覆盖范围，将用于 AI 训练计算的使能技术纳入其中，包括高带宽互连。Passage M1000 是一种为 AI 训练集群提供 114.6 Tbps 的互连，自 2022 年 10
              月以来逐步扩张的监管范围已经覆盖这类产品。BIS 2023 年 10 月规则覆盖与受控系统相关、达到总带宽阈值的互连组件；2024 年 10 月规则进一步扩大覆盖。Lightmatter
              尚未披露出口合规立场，也未披露是否就 EAR 对 M1000 的适用性取得法律意见。


              CHIPS Act（Section 103）对作为 CHIPS Act 受益方的 GlobalFoundries 施加国家安全护栏。GF
              被禁止在受覆盖外国扩大半导体制造，也不得与受覆盖实体开展联合研究。Lightmatter 的供应链必须确保使用 GF 制造不与 GF 的 CHIPS Act 合规义务冲突；这是一种部分超出 Lightmatter
              直接控制的供应链缠绕风险。


              知识产权风险是双向的。Intel 持有 400+ 项硅光子专利。硅光子 CPO 领域有来自 Intel、TSMC、Marvell 和 IBM 的 2,000+ 项活跃专利。Lightmatter 尚未披露任何
              IP 争议，但高专利密度要求在大规模量产交付前持续开展 freedom-to-operate（FTO）分析。任何未披露的现有技术冲突，如果在超大规模云厂商 design-win
              承诺之后才被发现，都会对商业造成严重打击。


              国会围绕 AI 半导体管制的立法活动一直在扩张，包括 NDAA FY2025 和拟议 AI Chip Control Acts。未来 2–3 年，Lightmatter
              产品面临的监管环境预计会进一步收紧，而不是放松。
