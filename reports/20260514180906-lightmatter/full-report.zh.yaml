      - number: '7.3'
        title: 伙伴与依赖风险
        blocks:
          - type: paragraph
            body: >
              Lightmatter 的商业和技术成功依赖一组高度集中的外部伙伴和依赖项；这些因素单独和合计都会带来实质风险。晶圆厂依赖最尖锐：GlobalFoundries 是唯一的光子中介层代工厂，TSMC
              实际上是所需规模下唯一的 CoWoS-L 先进封装供应商。任一晶圆厂出现产能约束、工艺良率问题或地缘政治扰动，都会让 M1000 项目停摆。


              超大规模云厂商评估伙伴依赖，是晶圆厂依赖在商业侧的对应物。Lightmatter 必须在 Series D 后 24–42 个月现金跑道内，赢下至少一个超大规模云厂商或 AI 芯片公司 design-win。前
              5 个潜在客户（4 家超大规模云厂商 + NVIDIA）几乎代表全部近期收入。NVIDIA 已经把自身 CPO 战略押给 Ayar Labs，因此 Lightmatter 依赖
              Google、Meta、Microsoft、Amazon、AMD 或某家定制 AI 芯片厂商主动选择 M1000。


              标准组织依赖（OIF、IEEE 802.3）风险较低，但仍相关：OIF Common Electrical I/O 和 CPO 标准是超大规模云厂商评估框架的基础。如果 CPO
              标准演进方向更偏向共同集成光子（Ayar Labs TeraPHY），而不是共封装中介层（Lightmatter Passage），Lightmatter 就需要调整技术路线。


              台湾地缘政治依赖是尾部风险，但在 5 年视角下概率并非微不足道：台海危机会同时扰乱 TSMC CoWoS 封装，并可能触发美国—台湾技术合作审查，把晶圆厂和封装中断叠加成生死级供应链事件。
