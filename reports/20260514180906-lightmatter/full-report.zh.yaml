        - 早 2 年；NVIDIA 背书带来溢价
      - - Cerebras Systems（AI 芯片，私有）
        - 私有市场峰值估值
        - $4B+（2021，收入前）
        - 深科技硬件估值可比；AI 基础设施
        - 未能把估值转化为商业证明；走向下调估值融资
      - - Graphcore（AI 芯片，已被收购）
