      - number: '4.2'
        title: 市场进入动作与商业策略
        blocks:
          - type: paragraph
            body: >
              Lightmatter 的市场进入策略是直接、高接触度的企业销售，目标客户是超大规模云厂商和 AI 芯片公司。2024 年末宣布的早期访问项目邀请少数合格合作伙伴接收 Passage M1000
              EVK，并参与协同设计讨论。这一路径与其他光子和先进封装创业公司（Ayar Labs、Marvell/Inphi）的商业化模式相似：先通过 EVK 项目建立技术可信度，再把 1–2
              个锚定客户转化为量产合同，并在此基础上扩张。


              商业推进包含三道关口：（1）EVK 采样和初始集成（当前阶段，2025–2026）；（2）设计导入承诺和联合流片规划（目标 2026–2027）；（3）量产爬坡和规模供应协议（目标 2027–2029）。GTM
              团队由 CEO Nick Harris 和直销企业销售职能牵头——Lightmatter 的 12 人领导团队中包含具有超大规模云厂商业务发展背景的人士。缺少具名客户或公开披露意向书，是首要商业风险。在
              $4.4B 估值下，投资人已经把（2）关口在 18–24 个月内转化计入价格。任何延迟都会实质影响估值支撑和融资选择权。


              定价策略未公开披露。参照行业可比的半导体定制 ASIC 定价模型，Lightmatter 可能采用 NRE 成本回收（每项目 $10–$50M）、量产定价（每个中介层单元
              $5,000–$50,000），以及潜在经常性光引擎耗材收入（Guide VLSP 灯源更换）的组合。随着规模扩大，ASP 将随时间压缩，这与硅光子商品化定价轨迹一致。
