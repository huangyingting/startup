  - number: 2
    title: 市场分析
    sections:
      - number: '2.1'
        title: 市场边界与定义
        blocks:
          - type: paragraph
            body: >
              Lightmatter 面向的市场位于硅光子、共封装光学（CPO）和 AI
              数据中心网络的交叉处。硅光子是最宽的市场边界：使用硅基光子组件进行光传输的半导体器件，包括收发器、波分复用（WDM）引擎、交换结构和互连基板。Lightmatter 具体瞄准 CPO
              子赛道——与计算裸片（GPU、NPU、XPU）物理集成或近距离集成的光子组件，用来消除芯片周长处的带宽瓶颈。


              可服务市场包括：共封装光交换 / NIC 方案、多芯片模块的光子中介层、面向 AI 集群的光引擎和 DWDM 激光源，以及把光子裸片和电子裸片共置的先进封装方案。Lightmatter
              主要市场不包括：独立可插拔收发器（SFP/QSFP 形态）、长距离相干密集 WDM 传输、传统无源光网络（PON），以及消费 / 移动硅光子组件。这些被排除的细分市场按收入计占硅光子总 TAM 的 60%
              以上，但由完全不同的供应链和客户群服务。


              Lightmatter 必须替代的现状方案包括：（1）可插拔 400G/800G/1.6T 收发器模块（当前主导，供应商包括 Coherent、II-VI、Lumentum）；（2）机架内互连的铜 DAC 和
              AOC 线缆；（3）传统电交换 ASIC（Broadcom Tomahawk 5、Marvell Teralynx）加可插拔拆分输出。相邻机会包括 HPC
              互连（InfiniBand、Ethernet），但该领域相邻而非同一市场，需要不同产品配置。
            claimRefs:
              - CM001
              - CM002
              - CM009
              - CM019
          - type: table
            tableRef: TM001
