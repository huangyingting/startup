        - $5.1B（2021，收入前）
        - 收入前 AI 硬件基础设施可比
        - 后续商业化遇到挑战；收入低于预期
      - - Marvell Technology CPO（上市）
        - 收入倍数
        - 8–12x 收入（全公司）
        - AI 网络芯片；CPO 路线图；超大规模云厂商客户
        - 业务多元；CPO 只占一部分；已有收入基础
    notes: 可比公司集来自 Reuters、Forbes、PitchBook、Bloomberg 和公开财务文件。所有倍数与估值均为近似值，可能修订。
