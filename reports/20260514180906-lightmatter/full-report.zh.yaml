  - id: TV005
    title: 投资逻辑破裂与终止触发条件表
    columns:
      - 触发条件
      - 阈值
      - 对投资逻辑的传导
      - 行动含义
    rows:
      - - 到 Q4 2027 仍无设计定点
        - 零个具名设计定点公告
        - 商业逻辑失效；基准 / 悲观情景概率升至 60-70%
        - 重新评估持仓；要求过桥条款或退出
      - - Intel/Ayar 赢下 2 个以上超大规模云厂商
        - 在 2 个以上超大规模云厂商拿到具名量产 CPO 项目
        - TAM 收缩到仅 AMD/Google/Microsoft；收入天花板下调
        - 将乐观情景概率下修至 <10%；重新评估入场倍数
      - - M1000 良率失败，需要重新流片
        - 宣布流片延迟 >6 个月
        - 现金跑道被压缩；EVK 时间表推迟 12-18 个月
        - 评估烧钱升级；评估过桥选项
      - - 向超大规模云厂商交付需 BIS 许可证
        - 法律意见：前三大客户地区需要出口许可证
        - TAM 与收入天花板降低；合规成本上升
        - 修订收入模型；评估监管风险保险
      - - Series E 估值低于 $4.4B
        - 宣布以 <$4.4B 投前估值融资
        - 投资被下调估值；优先权悬挂风险上升
        - 按新一轮价格标记；复核清算优先权瀑布
      - - 宣布 Nick Harris 离任 CEO
        - LinkedIn 公告或新闻稿
        - 关键人物风险触发；投资人信心可能削弱
        - 要求董事会复核继任安排和产品路线图
    notes: 终止标准是二元阈值事件。单一触发条件不一定自动要求退出，但任何突破都会触发 IC 强制复评。
    claimRefs:
      - CV020
      - CV021
      - CV023
    enumerationScope:
      coverage: exhaustive
      basis: >-
        Kill criteria derived from Lightmatter investment thesis analysis, kill criteria framework from Chapter 7, and
        VC-standard hardware diligence trigger frameworks from PitchBook and CBInsights comparable company analysis.
  - id: TV006
    title: 最终尽调要求表
    columns:
      - 主题
      - 缺失证据
      - 重要性
      - 负责人 / 尽调路径
    rows:
      - - M1000 良率数据
        - 来自 GF 认证批次的裸片良率数据；晶圆批次历史；裸片成本模型
        - 单位经济性与商业可行性的首要决定因素；阻塞项
        - Lightmatter CEO/CTO；要求 NDA 数据室
      - - 设计定点确认
        - 具名超大规模云厂商或 AI 芯片公司正处于 EVK 到设计定点讨论中
        - 最重要的商业证明点；若无 NDA 下披露则构成阻塞
        - Lightmatter CEO；NDA 保护的客户参考名单
      - - TSMC CoWoS 供应协议
        - 已签署或谈判中的 M1000 先进封装产能协议
        - 若封装未确认，量产爬坡就不在计划内
        - Lightmatter 供应链团队；TSMC 战略客户经理
      - - BIS 出口合规姿态
        - M1000 的 ECCN 分类；关键客户地区的出口许可证要求
        - TAM 与收入天花板取决于是否需要许可证
        - Lightmatter GC 或外部出口律师；BIS 法律意见
      - - 股权结构表清算瀑布
        - Series A–D 优先权条款；有效保本收购价格
        - 决定基准 / 悲观情景的回报画像；影响员工留任激励
        - Lightmatter CFO；复核 Series D 条款清单
      - - Guide VLSP 客户牵引力
        - 任何具名客户；出货量；独立光引擎收入
        - 在 M1000 贡献收入前，验证商业执行能力
        - Lightmatter 销售团队；NDA 客户参考核查
    notes: 第 1–2 项是阻塞项。第 3–5 项是重大项。第 6 项是信息项。所有事项都应在投资委员会最终批准前解决。
    claimRefs:
      - CV022
      - CV023
      - CV024
      - CV025
    enumerationScope:
      coverage: exhaustive
      basis: >-
        Diligence asks represent the complete set of blocking and material information gaps identified across all 8
        chapters of this diligence report. Exhaustive review of public and private evidence sources confirms no other
        blocking items have been identified.
