chapters:
  - number: 1
    title: 公司概况
    sections:
      - number: '1.1'
        title: 身份与使命
        blocks:
          - type: paragraph
            body: >
              Lightmatter, Inc. 是一家美国光子计算公司，总部位于 800 W El Camino Real, Suite 350, Mountain View, CA 94040。公司于 2017
              年注册成立并开始运营，技术根源可追溯到 MIT 的光子学研究。Lightmatter 的公司使命是搭建支撑大规模 AI
              的光子基础设施——互连、激光器，并最终延伸到计算本身。公司的运营判断是：电互连已经触及基础物理极限。带宽受芯片封装周长（shoreline）约束，这个边界只线性增长，而 GPU 核心面积按 r²
              扩张，算力容量与数据搬运能力之间的错配持续拉大。


              Lightmatter 将自己定位为解决前沿 AI 基础设施中最关键的单一瓶颈。按公司自己的分析，模型参数三年增长 240×，集群规模增长 10×，但互连带宽仅提升
              2×。缺口继续扩大后，若互连技术没有突破，下一代 AI 训练在经济上将难以成立。Lightmatter 的答案是光子学：光子传输没有电阻损耗，交叉路径互不干扰，一根光纤可同时承载多路信号。公司的 Edgeless
              I/O 架构把 I/O 布局扩展到整个裸片面积，而不是限制在芯片边缘，使带宽密度按裸片面积而非周长扩展。


              截至 2026 年 5 月，Lightmatter 是私营公司，主要网站为 lightmatter.co。公司还在 Massachusetts 州 Boston、Taiwan 的 Hsinchu 以及
              Canada Ontario 省 Toronto 设有办公室。Lightmatter 的产品面向超大规模云厂商、AI 芯片公司（XPU/GPU 制造商）和正在建设或扩建前沿 AI
              训练与推理集群的数据中心运营商。公司的商业模式围绕硬件产品销售和光子互连技术授权展开，具体包括评估套件和可量产模块，供下一代 AI 基础设施集成。
