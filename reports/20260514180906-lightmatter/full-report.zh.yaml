      - number: '3.3'
        title: 能力对比
        blocks:
          - type: paragraph
            body: >
              就原始带宽密度而言，Lightmatter 的 Passage M1000 以 4,000 mm² 光子中介层提供 114.6 Tbps 双向带宽，领先所有已发布竞争对手。Ayar Labs TeraPHY
              每个引擎超过 8 Tbps——这是一种根本不同的架构（chiplet 级 vs. 全中介层），需要多个引擎才能达到类似聚合带宽。Intel OCI chiplet 为每 chiplet 4
              Tbps。带宽对比有一定误导性，因为这些系统瞄准不同集成层级：Lightmatter 的中介层替代整个交换结构，而 Ayar 和 Intel 瞄准芯片到芯片 I/O。


              功耗效率方面，Lightmatter 声称 M1000 达到 2.3 pJ/bit——属于已发表数字中的最低梯队。Ayar Labs 和 Intel 也为各自 chiplet
              级产品发表了可比效率数据。制造成熟度则由 Intel 明显领先：Intel 自 2016 年起大规模出货硅光子产品，并在多个 OSAT 完成工艺认证。Ayar Labs 已通过 TSMC N3
              认证，但尚未公开宣布量产。Lightmatter 未披露良率数据或量产里程碑。客户集成是近期最关键的竞争维度，Ayar（NVIDIA 关系）和 Intel（既有数据中心客户基础）优于
              Lightmatter，后者没有公开确认的设计导入。所有玩家的标准参与都在向 OIF CPO IA 和 UCIe 收敛，降低未来锁定风险。
