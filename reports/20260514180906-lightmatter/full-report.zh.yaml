      - number: '7.5'
        title: 缓释成熟度与终止标准
        blocks:
          - type: paragraph
            body: >
              Lightmatter 的风险缓释成熟度高低不一。技术执行风险的缓释最成熟：Guide VLSP 独立产品提供光学子系统学习，有助于降低 M1000 光引擎集成风险；Edgeless I/O 架构把带宽分布在许多
              die-to-die 光通道上，可能比单片光学设计更能容忍单个通道良率缺陷。监管风险缓释最不成熟：公司没有公开披露出口合规立场，而一家 200 人创业公司要为潜在数十个超大规模云厂商和国际客户评估搭建 BIS
              合规出口管制所需的法律和合规基础设施，能力有限。


              投资逻辑的终止标准框架很清楚。五个二元触发事件将表明投资逻辑失败，需要组合减记或重组：（1）到 2027 年 Q4 仍未宣布 M1000 design-win；（2）Intel 或 Ayar Labs
              宣布向两个或更多超大规模云厂商量产供应 CPO；（3）Lightmatter 报告重大良率失败，需要在 GlobalFoundries 对 M1000 重新流片，并使 EVK 时间线延长 6+ 个月；（4）BIS
              执法行动或法律意见认定，M1000 向拥有非美国数据中心的美国超大规模云厂商客户部署时需要出口许可证；（5）Series E 在没有同步 design-win 公告的情况下，以低于 $4.4B 估值完成降价融资。


              应建立监控信号：跟踪超大规模云厂商 CPO 供应商公告；监控 BIS Federal Register 规则扩展；跟踪 GlobalFoundries 300mm 光子良率发表；关注 TSMC CoWoS
              产能利用率报告；并监控 Lightmatter 员工数和招聘信息，将其作为项目状态和财务健康的领先指标。
