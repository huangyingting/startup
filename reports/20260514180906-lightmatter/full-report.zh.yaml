  - number: 6
    title: 客户情况
    sections:
      - number: '6.1'
        title: 客户分层与目标范围
        blocks:
          - type: paragraph
            body: >
              Lightmatter 的可触达客户范围，取决于少数既有技术能力、又有预算权把共封装光学集成进 AI
              基础设施的组织。核心客群是超大规模云厂商：Google（Alphabet）、Meta、Microsoft（Azure）和 Amazon（AWS）合计约占硅光子终端需求的 58.72%，并运营大规模 AI
              训练集群（10,000+ GPU pod）；Passage M1000 的带宽优势在这些场景中最有意义。这些组织各自都有专门的硅和光子团队，运行数十亿美元级基础设施采购项目，也有足够工程深度与
              Lightmatter 的光子中介层协同设计定制硅。预算权掌握在基础设施 VP 和数据中心技术战略团队手里，采购周期为 18–36 个月。


              次级客群是 AI 芯片公司：NVIDIA、AMD、Intel 以及定制 ASIC 厂商（Google TPU 团队、Amazon Trainium、Microsoft Maia）。这些组织同时可能是客户（如果把
              Passage 集成进芯片封装）、竞争对手（Intel Silicon Photonics）和战略伙伴。NVIDIA 投资 Ayar Labs 让双方关系更复杂，但并未消除 Lightmatter 与
              AMD、定制 ASIC 客户或 NVIDIA 本身合作的机会，尤其是在竞争格局变化时。HPC 国家实验室（Argonne、Oak
              Ridge、LLNL）是第三层客群，预算更小（$10–100M/yr），评估周期更长，但由于其职责是推动技术边界，可能更快率先采用。


              Lightmatter 客户范围的决定性特征是极端集中。前 5 个潜在客户（4 家超大规模云厂商 + NVIDIA）代表了近期商业机会的绝大部分。赢下其中 1–2 个项目就是成功；若全部输给 Ayar Labs
              或 Intel，则意味着失败。这种二元集中度同时给投资逻辑带来极端上行和极端下行。
