  - number: 3
    title: 竞争格局
    sections:
      - number: '3.1'
        title: 竞争格局概览
        blocks:
          - type: paragraph
            body: >
              共封装光学和光子互连竞争格局已围绕五类战略原型集中。第一类是存量规模领导者：Intel Silicon Photonics 是唯一具备实质制造规模（出货 >8M PIC、片上激光器 >32M）、成熟 OSAT
              关系，以及经验证的数据中心光组件供应链的玩家。Intel 的竞争优势是制造成熟度，而不是带宽密度——其在 OFC 2025 发布的 OCI chiplet 提供 4 Tbps，远低于 Lightmatter
              M1000 的 114.6 Tbps。第二类是直接 CPO 挑战者：Ayar Labs（2015 年创立，MIT 分拆项目，融资约 $200M）凭借超过每引擎 8 Tbps 的 TeraPHY chiplet 与
              Lightmatter 正面竞争，该方案与 TSMC N3 共封装，并获得 NVIDIA 支持。Ranovus（Canada Ottawa）用量子点激光器提供 12.8 Tb/s XPU
              CPO。第三类是超大规模云厂商支持的整合者：Marvell 于 2025 年收购 Celestial AI（估计 $1–2B），把 Photonic Fabric
              光解耦技术加入已经向所有主要超大规模云厂商出货的产品组合。第四类是电交换存量厂商：Broadcom Tomahawk 5（51.2 Tbps）仍是占主导的交换结构，供应能力已验证，但在 800G+ 下无法匹配
              CPO 效率。第五类是超大规模云厂商内部研发：Google、Microsoft 和 Meta 各自都有内部光子互连研究项目，若成功，可能绕开 CPO 供应商。
