      - number: '2.4'
        title: 增长驱动因素与采用约束
        blocks:
          - type: paragraph
            body: >
              首要增长驱动因素是 AI 训练带宽墙。即便电铜互连达到 112G PAM4 和 224G PAM4，也无法提供训练 1T+ 参数 mixture-of-experts
              模型所需的聚合带宽，尤其是在数千个加速器裸片之间。Lightmatter 自己的 arXiv 论文（2510.15893）显示，3D CPO 集成可将训练时间缩短 2.7×，并为大语言模型带来 8× 扩展能力，为
              CPO 价值主张提供第三方技术验证。McKinsey 的光基础设施分析预计到 2027 年收发器供应短缺 40–60%；超大规模云厂商已经因光连接约束而分配 GPU 额度，形成对替代方案的迫切需求。


              功耗效率驱动同样重要。CPO 消除了可插拔收发器的 SerDes 到光纤转换损耗，在 800G+ 速度下，相比可插拔替代方案可将交换机功耗降低约 30%。对运行 1 GW
              数据中心容量的超大规模云厂商而言，网络功耗节省 30%，按 $0.05–$0.10/kWh 电价计算，可转化为每年 $150–300M 的能源成本削减。OIF 已发布 CPO 实施协议，定义 400G-DR4 和
              800G-DR8 接口，降低集成风险。


              采用约束同样实质。复杂 3D 光子中介层（Lightmatter 的 4,000 mm² M1000 中介层）的制造良率尚未在量产规模验证。受 HBM 和 GPU 需求推动，TSMC
              先进封装（CoWoS-L、SoIC）已经产能紧张，带来供应风险。客户重新架构——把 GPU/NPU 芯片改线，使其暴露光 I/O 而非电 SerDes——每个客户需 $10–50M NRE，并需要 2–3
              代芯片周期。OIF CPO 实施协议也设定了最低认证里程碑，拉长商业化时间表。这些约束解释了为什么经过多年评估，仍没有超大规模云厂商公开承诺 CPO 量产。
