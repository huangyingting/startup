  - number: 8
    title: 估值
    sections:
      - number: '8.1'
        title: 投资逻辑与反向逻辑
        blocks:
          - type: paragraph
            body: >
              Lightmatter 的投资逻辑建立在四个收敛因素上。第一，可触达市场大且紧迫：AI 训练互连带宽需求增长速度超过电互连技术扩展能力，正在形成结构性技术替代事件；Lightmatter
              的共封装光学技术正是为捕捉这一事件而设计。硅光子总市场预计到 2029 年达到 $7.2–7.4B（MarketsandMarkets、IDC），其中 CPO
              是增长最快的细分。第二，技术确实差异化：Passage M1000 以 2.3 pJ/bit 实现 114.6 Tbps 双向带宽，相比替代方案是可衡量的阶跃式提升；光子中介层架构支持「Edgeless
              I/O」带宽扩展，电系统无法匹配。第三，团队可信：Nick Harris（MIT 光子学博士）、具备深厚光子专业能力的联合创始团队、MIT 和 Stanford 学术背景，以及
              GV、Spark、Fidelity、Temasek 等机构投资人背书，都为执行质量提供强先验。第四，战略投资人入口（GV/Google、董事
              Vaid/Microsoft）为四大超大规模云厂商生态中的两家创造优先商业进入机会。


              反向逻辑同样有力。$4.4B 估值对应的是一家预收入、资本密集型硬件公司，而市场上尚无 CPO
              厂商向具名超大规模云厂商实现量产出货。入场价格要求乐观情景退出才能产生正回报，基准情景至多返还本金。竞争风险严峻：Intel 有在位优势，Ayar Labs 有 NVIDIA，Marvell
              有网络关系。技术风险显著：M1000 的 4,000 mm² 光子中介层没有良率先例，并依赖两家晶圆厂；历史上，这类依赖会造成供应链脆弱性。监管风险被低估：BIS 出口管制和 CHIPS Act 条件可能限制
              TAM 并抬高合规成本。客户证据缺口——$4.4B 估值却没有具名客户——是本报告中破坏性最大的反向事实。


              区分投资逻辑与反向逻辑的摇摆因素有三项：（1）M1000 良率数据显示其具备商业可行性；（2）2026–2027 年至少宣布一个
              design-win；（3）确认监管暴露可通过标准合规建设管理。如果三项摇摆因素全部正向解决，投资逻辑就非常有吸引力。如果三项全部负向解决，这笔投资应减记。
            claimRefs:
              - CV001
              - CV002
              - CV003
              - CV004
              - CV005
