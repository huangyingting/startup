      - number: '3.2'
        title: 竞争对手画像
        blocks:
          - type: paragraph
            body: >
              Ayar Labs 是 Lightmatter 最接近的直接竞争对手。Ayar 于 2015 年作为 MIT 分拆项目创立，累计融资约 $200M，NVIDIA
              是战略投资方——这是关键差异点，同时提供资本和清晰的客户验证信号。Ayar 的 TeraPHY chiplet 采用与 TSMC N3 先进节点协同设计的封装内光 I/O 架构，每个光引擎提供 8+
              Tbps。SuperNova 外部光源把激光管理与计算裸片解耦，实现热隔离。NVIDIA 背书让 Ayar 在以 GPU 为中心的 AI
              训练市场具备可防守位置，但也把风险集中到单一超大规模云厂商相邻客户。Intel Silicon Photonics 受益于十年制造投入、既有代工产能，以及通过 Intel 数据中心业务部门的分销能力。OFC
              2025 的 OCI chiplet 展示了 Intel 对 CPO 的投入，但 4 Tbps 规格让 Lightmatter 的 M1000 处于另一个层级。Intel 的规模是护城河，限制则是带宽密度差距。


              Marvell 收购 Celestial AI，把面向 LLM 训练的光解耦架构 Photonic Fabric 带入一家拥有成熟超大规模云厂商关系、且市值 $25B+ 的公司。合并后的实体是严肃的长期威胁，因为
              Marvell 可把 CPO 交叉销售给既有网络硅客户。Ranovus 通过量子点激光技术（更低功耗、更高耐温）差异化，并瞄准 12.8 Tb/s 的 XPU 互连；由于总部在
              Ottawa，其美国生态优势较弱。Broadcom 虽然不是 CPO 供应商，但构成间接竞争威胁：Tomahawk 5 每多一个季度用电互连满足超大规模云厂商需求，CPO 采用就会再推迟一个季度。
