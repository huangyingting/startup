      - number: '6.2'
        title: 采用轨迹与商业进展
        blocks:
          - type: paragraph
            body: >
              Lightmatter 的商业进展完全处在 early-access 阶段。2025 年 Q4 宣布的 Passage M1000 EVK 样品项目，是第一个商业客户参与里程碑。公司网站提到面向合格 AI
              基础设施伙伴的「早期访问项目」，但没有公开伙伴名称、项目范围或商业承诺。这是复杂半导体产品标准的早期商业化路径：向 2–5 家合格伙伴提供样品，收集集成反馈，验证技术性能，再转化为 design-win
              承诺。挑战在于，在 $4.4B 估值下，投资人期待的商业验证要高于 EVK 阶段通常能提供的水平。


              CPO 在超大规模云厂商中的采用轨迹遵循成熟的半导体认证节奏。阶段 1（EVK 评估，2025–2026）：伙伴收到 EVK，进行实验室集成测试，并按规格验证光学性能。阶段
              2（系统验证，2026–2027）：EVK 在可运行 AI 集群配置中演示，并与可插拔替代方案做性能基准比较。阶段 3（Design win，2026–2027）：超大规模云厂商承诺联合 tape-out，签署
              NRE 合同，协同设计 ASIC 进入开发。阶段 4（试生产，2027–2028）：生产 100–1,000 台，开展客户验收测试。阶段 5（规模量产，2028+）：签署规模生产供货协议。Lightmatter
              目前 M1000 处于阶段 1，EVK100 处于阶段 2–3。当前阶段到产生收入的阶段 4/5 之间大约还有 2–3 年；这条时间线必须与 $4.4B 估值可被支撑的窗口对齐。


              没有任何超大规模云厂商公开确认与 Lightmatter 开展 CPO 评估项目。可比 CPO 厂商（Ayar Labs、Intel）同样没有宣布具名客户量产项目。该阶段全行业不披露客户属正常现象，但考虑到
              EVK 样品公告，Lightmatter 甚至没有未具名客户背书，仍值得注意。
