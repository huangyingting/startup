  - number: 4
    title: 财务情况
    sections:
      - number: '4.1'
        title: 收入来源与商业模式
        blocks:
          - type: paragraph
            body: >
              截至 2026 年 5 月，Lightmatter 没有公开披露收入。公司潜在收入来源分为三个先后出现的类别。第一，工程和评估收入：来自超大规模云厂商和 AI 芯片公司早期访问项目的
              EVK（工程验证套件）费用。Passage M1000 EVK 目前处于采样阶段，这一阶段的半导体公司早期访问项目费用通常为每次合作
              $500K–$5M。这类收入周期短、非经常性，可以验证商业进展，但不能建立可持续商业模式。第二，量产模块销售：一旦 M1000 退出 EVK 阶段并达到良率里程碑，Passage
              中介层模块收入将来自量产合同。典型超大规模云厂商项目若每年采购 1,000–10,000 个单元、单价 $10,000–$50,000，可产生每年 $10–$500M 的量产收入。第三，IP
              授权：Lightmatter 的 100+ 专利组合带来授权费或交叉授权安排的潜力，尤其是若 OIF CPO 标准化形成必要专利池。不过，IP 授权收入在 2027–2028
              年前不太可能形成实质贡献，也不属于近期财务计划。现阶段三类收入都带有推测性；公司 2025–2026 年财务完全由投资人资本驱动，而非客户收入。
