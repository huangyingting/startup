        - 到 2027 年拿下 2 个超大规模云厂商设计定点；2028 年量产；到 2030 年收入 $300–500M；10–15x 倍数
        - $4.4B 入场、$8–12B 退出，对应 1.8–2.7x
        - 需要良率、商业化、监管同时成功
        - 15–25%
      - - 基准（$3–5B 退出，2029–2031）
        - 到 2027 年拿下 1 个设计定点；部分爬坡；到 2030 年收入 $100–200M；基于有限收入以 15–25x 倍数 M&A
        - $4.4B 入场，对应 0.7–1.1x；基本只是收回本金
        - TSMC 产能、单一客户依赖、时间风险
        - 35–45%
      - - 悲观（$0.5–1.5B 退出，2027–2030）
        - 到 2028 年没有设计定点；Series E 下调估值融资或困境 M&A
        - $4.4B 入场，对应 0.1–0.3x；Series D 投资人减记
        - Intel/Ayar 赢下全部项目；良率受挫；监管阻断
        - 30–45%
      - - 上行可选性（$15–20B IPO，2030+）
        - 多个设计定点；IPO 路径；收入 $500M+；10 年期 AI 硬件平台
        - $4.4B 入场，对应 3.4–4.5x
        - 需要持有 5 年；对执行力的信心要求极高
        - 5–10%
    notes: 概率估计只是示意，不是精确预测。各情景并非互斥。期望值计算：~(0.20×10B + 0.40×4B + 0.38×1B + 0.07×17B) / 4.4B ≈ 1.0–1.2x 入场价——不足以匹配风险投资风险画像。
    claimRefs:
