      - number: '2.2'
        title: 市场规模：TAM、SAM 与 SOM
        blocks:
          - type: paragraph
            body: >
              硅光子 TAM 主要由两家头部分析师估计锚定。MarketsandMarkets 估算全球硅光子市场 2025 年为 $2.65B，并预计到 2030 年增长至 $9.65B，CAGR 为
              29.5%——这是投资材料中引用最广的数字。Mordor Intelligence 给出的基数略高，2025 年为 $2.83B，到 2031 年达到 $13.18B，CAGR 为 27.19%。Grand
              View Research 给出的 2025 年中位区间估计约为 $2.4–2.7B。分析师估计之间的分散（基数 $2.65B–$2.83B；2030–31 年
              $9.65B–$13.18B）反映了方法论差异：哪些收入算作“硅光子”，哪些算作相邻光传输和封装支出。


              Lightmatter 的可服务市场（SAM）是 CPO 子赛道。IDC 和 HPCwire 的估计显示，到 2027 年 CPO 将占硅光子市场的 15–25%，意味着 2025 年 SAM 约为
              $400–$660M，并到 2030 年增长至 $1.5–$2.4B。MarketsandMarkets 另有一份共封装光学市场报告，预计该市场自 2025 年起实现强劲双位数增长。按 3
              年周期（2026–2028）估算，Lightmatter 的可获取市场（SOM）为 $50–$200M，假设拿下 2–5 个超大规模云厂商或 AI 芯片协同项目，每个项目 NRE 与早期量产合同价值
              $20–$50M。公司未披露公开收入，因此 SOM 估计带有推测性，并完全取决于商业公告。


              AI 驱动的数据中心资本开支激增提供了宏观支撑：Google、Meta、Microsoft 和 Amazon 仅在 2024 年就合计承诺超过 $200B 的 AI 基础设施资本开支，Statista 跟踪的全球
              AI 数据中心资本开支到 2027 年超过 $250B。IDC 预测 AI 服务器市场到 2027 年达到 $150B，其中网络基础设施占总资本开支的 12–15%——意味着 2027 年网络支出为
              $18–22B；若采用加速，CPO 可能拿到有意义份额。
