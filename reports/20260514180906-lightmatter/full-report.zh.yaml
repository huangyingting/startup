      - number: '1.4'
        title: 关键里程碑
        blocks:
          - type: paragraph
            body: >
              Lightmatter 从 2017 年 MIT 分拆项目走到 $4.4B 估值的光子计算公司，背后是近十年技术和商业成果的持续累积。创始团队很早就判断，电互连会成为 AI
              扩展的约束条件，并据此搭建研究路线图。公司最初的产品工作聚焦光子集成电路和光计算基础模块，之后转向更直接的机会：面向 AI 数据中心的光子互连。


              2019 至 2024 年间，公司在产品开发上完成多项技术里程碑，包括 Passage 平台和 Guide VLSP 光引擎。Passage M1000 3D Photonic Superchip 已在
              Supercomputing 2025 和 OFC 2025 公开展示，代表全球首个用于 3D 芯片堆叠的光子中介层。2024 年 10 月发表在 arXiv 的标志性论文（论文 2510.15893，将发表于
              Hot Interconnects 2025）显示，采用 Passage 的 3D CPO GPU 和交换机可将训练时间缩短 2.7×，并为超过一万亿参数的前沿 AI 模型释放 8× 扩展能力。


              公司已经搭建了强大的制造伙伴生态，包括 TSMC、GlobalFoundries、Tower Semiconductor、Amkor 和 ASE，使其能够接触最高产量的半导体晶圆厂和 OSAT
              供应商。Lightmatter 也活跃于关键行业标准组织：OIF、IEEE、Advanced Photonics Coalition、UALink、Ultra Ethernet、OCP、Jedec 和 UCIe
              Consortium。参与这些标准组织，使公司有机会影响下一代光子互连标准，并提升与 AI 芯片供应商的互操作性。
