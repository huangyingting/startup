      - number: '7.4'
        title: 人才、团队与执行风险
        blocks:
          - type: paragraph
            body: >
              光子 IC 设计工程师是半导体行业最稀缺的人才之一；全球具备 CPO 产品设计所需波导、调制器和光子 VLSI 技能的工程师不到 5,000 人。这种人才稀缺让
              Lightmatter、Intel、NVIDIA、Marvell 以及资金充足的 CPO 创业公司（Ayar Labs、Celestial
              AI、Ranovus）在一个很小的人才池里激烈竞争。关键光子设计工程师流失会不成比例地影响 Lightmatter 产品路线图，因为光子 VLSI 设计工具并非标准化工具，机构经验也无法从普通 EE
              人才市场快速补齐。


              关键人物依赖集中在创始技术团队。CEO Nick Harris（MIT 光子学博士）和联合创始人 Darius Bunandar 设计了最初的 Passage
              光子中介层架构；如果他们在量产爬坡前离开，会留下传统招聘无法填补的知识缺口。深科技硬件创业公司的学术分析估计，创始团队在商业爬坡前离开，会让产品失败或转向概率增加 40–60%。


              公司层面的执行风险，在于同时管理多个高复杂度项目：向 3–5 家 early-access 伙伴交付 M1000 EVK、跟进 EVK100 评估、推进 Guide VLSP 独立项目、准备 Series E
              融资，以及搭建监管合规能力。对一家约 200 人的创业公司来说，这一执行面已经接近组织能力上限。优先级失误——例如把资源投向 Guide VLSP、却延误 M1000 质量问题——会是最可能的执行失败模式。


              董事会构成风险不大但存在：董事 Kushagra Vaid（Microsoft）带来战略入口和行业可信度，但如果 Microsoft 自身 CPO 战略与 Lightmatter
              路线图分化，也会产生潜在利益冲突。尽调中应确认治理一致性。
