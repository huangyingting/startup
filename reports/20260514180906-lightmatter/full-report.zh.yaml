      - number: '6.4'
        title: 留存、重复使用与满意度
        blocks:
          - type: paragraph
            body: >
              截至 2026 年 5 月，Lightmatter 没有量产客户群，因此传统意义上的留存和满意度指标不适用。可用代理指标包括：（1）领导层留存——Nick Harris（CEO）、Darius Bunandar
              以及核心创始团队仍完整，说明团队满意度和使命一致性仍在；（2）投资人重复参与——GV、Spark Capital、SIP Global、Fidelity、Temasek 等多家投资人从 Series A 到
              Series D 连续参投，说明投资人认可进展；（3）EVK 项目延续——M1000 EVK 样品公告意味着 early-access 伙伴尚未终止项目，这是一个偏弱的正面信号。


              对 EVK 阶段的光子半导体公司来说，「客户满意度」等同于「继续评估」：对 EVK 性能满意的伙伴会推进到 design-win 讨论；不满意的通常会悄然退出。目前没有公开公告显示 EVK
              伙伴终止评估，这与技术继续推进相一致。不过，EVK100 项目早于 M1000 进入样品阶段，却仍未发布 design-win 公告，这是轻微担忧；已完成评估但未推进到 design win 的 EVK100
              客户，可能暗示 3.2 Tbps 层级存在产品适配问题，尽管这也可能只是正常认证周期。


              Guide VLSP 光引擎可独立于 Passage 中介层销售，可能拥有不连接完整 CPO 集成项目的独立客户。Lightmatter 尚未披露 Guide VLSP 客户名称或出货量。如果 Guide 在
              Passage 之外也有牵引力，它将构成近期收入验证，并增强更广泛的商业逻辑。
            claimRefs:
              - CU015
              - CU016
              - CU017
              - CU018
