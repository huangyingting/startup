      - number: '5.4'
        title: 部署就绪度与技术成熟度
        blocks:
          - type: paragraph
            body: >
              Lightmatter 各产品的成熟度差异很大。截至 2025 年 Q4，Passage M1000 EVK 处于样品阶段，这是商业验证最早期。EVK
              样品意味着产品已经实体制造，并可交付给合格伙伴做集成测试，但生产良率、可靠性和规模采购规格尚未发布。M1000 的 4,000 mm²
              光子中介层属于量产尝试中最大的一类复杂光子裸片；从统计缺陷密度看，更大裸片天然良率更低，而该风险尚未公开刻画。Passage L200 已在 OFC 2025（2025 年 3 月）展示，实现 32–64
              Tbps 总带宽；展示属于预生产状态，能证明光学架构可行，但不能验证生产良率或客户集成。EVK100 是组合中最成熟的产品，推出更早，集成挑战也没那么激进。


              在 114.6 Tbps 工作条件下的可靠性，除了仿真和实验室演示外，尚未在同行评审文献中得到验证。已部署的超大规模云厂商系统必须维持 500,000+ 小时 MTBF（57+ 年平均故障间隔），这需要
              M1000 规模系统尚未具备的光子组件可靠性数据。超大规模云厂商数据中心的认证和资质要求包括热循环、振动、湿度以及长周期光功率稳定性测试；Passage M1000 尚未发布其中任何一项结果。这对 EVK
              阶段产品是正常状态，关键在于量产认证时间线能否赶上商业窗口。


              标准合规性较强：Lightmatter 参与 OIF（CPO Implementation Agreement）、IEEE（802.3dj，面向 200G 通道速率）、UCIe（die-to-die 互连标准）和
              UALink（新兴 AI 加速器互连标准）。OIF 会员身份和 CPO IA 对齐，确保 Passage 产品未来可与 TSMC 伙伴芯片公司的协同设计 ASIC 互操作。UCIe 兼容性则支持未来与
              Intel、AMD 和定制 ASIC 厂商的 UCIe 原生 chiplet 集成。
