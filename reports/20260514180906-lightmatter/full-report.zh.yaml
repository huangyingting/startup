      - number: '1.2'
        title: 领导层、创始人与治理
        blocks:
          - type: paragraph
            body: >
              Lightmatter 由 Nicholas (Nick) Harris、Darius Bunandar、Prineha Narang 和 Thomas Graham 于 2017
              年联合创立，四人均有学术光子学和量子计算研究背景。Nick Harris 担任 CEO 兼联合创始人。Harris 在 MIT 完成光子学博士，研究可编程光子电路和纳米光子学。他的博士研究直接支撑了
              Lightmatter 的基础技术。


              创始团队学术背景很强：成员曾在 Nature、Science、Physical Review Letters、ISSCC、ISCA 等顶级科学期刊发表论文，合计贡献超过 100
              项专利。公司引用的一项突出履历是，部分团队成员曾参与奥斯卡获奖影片 Interstellar 使用的黑洞模拟软件，体现出深厚的计算物理能力。


              Lightmatter 团队覆盖硅光子、高速 SerDes 设计、先进半导体封装、AI 系统架构和超大规模数据中心基础设施。公司 LinkedIn 资料在数据访问日显示员工数为 201–500 人，平台可见员工约
              331 人。公司领导董事会和具体董事成员未在公开渠道披露，与这家私营公司的披露政策一致。Harris 曾代表 Lightmatter 在 OFC 2025 公开亮相，发布 Passage L200 3D
              Co-Packaged Optics 和 Passage M1000 3D Photonic Superchip。


              Lightmatter 的价值观强调速度、第一性原理思维，以及影响力高于头衔。公司建立了重视科学严谨、跨职能协作和审慎扩张的文化。作为创始人兼 CEO，Nick Harris
              构成关键人物依赖；对这一阶段和成立年份的收入前或早期收入技术创业公司而言，这是标准风险。
