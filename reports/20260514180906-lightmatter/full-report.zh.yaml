      - number: '3.5'
        title: 护城河耐久性与商品化风险
        blocks:
          - type: paragraph
            body: >
              Lightmatter 的竞争护城河建立在三根支柱上：（1）受 100+ 项专利保护的 Edgeless I/O 架构，提供竞争对手尚未在已发布产品中复制的带宽密度领先；（2）在 114.6 Tbps 上验证的
              3D 光子中介层集成方案，这一技术成果需要多年工程深度才能复现；（3）来自 MIT、具备深厚光子学能力、且能吸引顶尖人才的世界级创始团队。这些优势在近期（2025–2028）真实且可防守。


              但商品化风险同样真实。硅光子本质上是 5–10 年周期里的半导体制造赛道；规模足够大时，晶圆厂（TSMC、GlobalFoundries、Samsung）可以向任何资金充足的芯片设计方提供 silicon
              photonics 工艺。Intel 已经以规模化证明这一点。Marvell 收购 Celestial AI 显示 CPO 架构空间正在压缩。若超大规模云厂商围绕 OIF CPO
              接口标准化，互操作性要求可能削弱专有架构价值。替代计算（量子、神经形态）超过 10 年的开发周期构成长远但非近期的颠覆风险。近期最可信的护城河侵蚀情景，是 NVIDIA 与 Ayar Labs 合作加深，封住
              GPU 相邻市场，迫使 Lightmatter 只能在定制 ASIC 和 HPC 细分中竞争。
            claimRefs:
              - CP024
              - CP025
              - CP026
              - CP027
              - CP028
              - CP029
              - CP030
      - number: '3.6'
        title: 展示要点
        blocks:
          - type: callout
            title: NVIDIA-Ayar Labs 关系是最高竞争风险
            body: >-
              Ayar Labs 获得 NVIDIA 战略投资，形成一条协同设计路径；若 TeraPHY chiplet 集成进未来 NVIDIA 加速器封装，Lightmatter 可能被挡在 GPU 相邻 AI
              训练市场之外。这一情景会把 Lightmatter 的可服务市场压缩到定制 ASIC 和 HPC 细分，实质收窄机会。
            calloutType: risk
            claimRefs:
              - CP006
              - CP020
              - CP022
          - type: callout
            title: 114.6 Tbps 带宽密度构成真实差异化
            body: >-
              Lightmatter 的 Passage M1000 提供 114.6 Tbps 双向带宽，是 CPO 赛道已发布方案中最高的带宽密度，且领先幅度显著。这让 Lightmatter 在 1T+
              参数模型训练需求上具备独特位置；这类需求驱动最激进的超大规模云厂商资本开支项目，而 Ayar TeraPHY 和 Intel OCI chiplet 在同等规格上并不竞争。
            calloutType: strength
            claimRefs:
              - CP013
              - CP014
              - CP024
          - type: callout
            title: Marvell/Celestial AI 补上 Lightmatter 缺少的分销杠杆
            body: >-
              Marvell 收购 Celestial AI（估计 $1–2B），把 Photonic Fabric CPO 技术与 Marvell
              既有超大规模云厂商分销和硅网络关系结合起来。这种竞争威胁比纯技术竞争更难应对：Marvell 可把 CPO 打包进既有光互连合同，绕过 Lightmatter 必须走的独立设计导入流程。
            calloutType: risk
