      - number: '8.2'
        title: 估值背景与可比公司
        blocks:
          - type: paragraph
            body: >
              Lightmatter 的 $4.4B Series D
              投前估值，需要放进三把尺子里看：（1）同阶段深科技硬件创业公司的可比融资；（2）上市半导体和光子公司交易倍数；（3）在牛市、基准、熊市情形下，Lightmatter 收入轨迹能撑起的内在价值。


              私募可比轮次看，Ayar Labs 在 2022 年 Series C 的估值约 $350M，尽管技术成熟度相近，却比 Lightmatter 当前价格低约 12.6 倍。Cerebras 曾在尚未有收入时拿到
              $4B+ 估值，随后遭遇商业化挑战。Graphcore 2021 年在收入前阶段估值 $2.8B，2024 年被 SoftBank 收购时价格已较峰值大幅折让。这些样本说明，收入前深科技硬件公司如果估值已到
              $4B+，除非快速拿出商业化证明，否则很难为投资人打出正回报。


              上市可比公司看，光子系统公司 Coherent Corp（原 II-VI）约按 2–3x 收入交易。MACOM Technology 有既定客户关系，交易倍数为 5–7x 收入。Intel 有数十年客户历史，约为
              2–3x 收入。若给 Lightmatter 到 2030 年潜在 $200–500M 收入套用 10–15x 前瞻收入倍数——这更适合已有确定 design win 的高增长半导体公司——内在价值区间为
              $2–7.5B；只有在乐观收入假设下才对得上 $4.4B 估值。


              估值的核心观察是：$4.4B 价格隐含投资人相信 Lightmatter 会在 5 年内做到 $300–440M 收入并享受 10x
              倍数，或者会以高于收入内在价值的战略溢价被收购。两种情形都可能发生，但都需要目前尚不存在的商业证明。
            claimRefs:
              - CV006
              - CV007
              - CV008
              - CV009
              - CV010
