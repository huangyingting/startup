      - number: '6.3'
        title: 具名客户证据与商业验证
        blocks:
          - type: paragraph
            body: >
              本章最重要的发现，是 Lightmatter 的 CPO 产品完全缺乏具名客户证据。截至 2026 年 5 月，没有超大规模云厂商、AI 芯片公司或 HPC 中心公开被列为 Lightmatter 客户或
              design-win 伙伴。公司网站提到「早期访问伙伴」，但没有点名。Series D 轮媒体报道（Wall Street Journal、Fortune、BusinessWire）也没有客户引述或具名
              design-win 公告。


              对一家估值 $4.4B 的公司来说，这种不披露程度并不常见。相似估值阶段的可比深科技硬件公司（Ayar
              Labs、Graphcore、Cerebras）至少会披露客户类别，即便不披露单个名称。缺失原因可能是真实存在的超大规模云厂商 NDA；评估期要求保密属于标准做法。另一种可能是，除非正式 LOI
              阶段讨论外，目前还没有具有约束力的客户承诺。


              对 Lightmatter $4.4B 投资案例来说，客户证据缺口是最主要的反向发现。没有具名客户，估值完全压在技术里程碑和团队质量上——这两点确实亮眼，但在资本密集型硬件类别里，Intel、Ayar Labs
              和 Marvell 都在争夺同一批 design win，仅靠这些不足以支撑 $4.4B 的预收入估值。尽调要求很明确：投入资本前，要求提供受 NDA 保护的客户参考名单、初步 LOI 以及 EVK
              项目参与条款。
