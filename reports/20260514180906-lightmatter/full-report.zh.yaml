      - number: '7.2'
        title: 运营、质量与技术执行风险
        blocks:
          - type: paragraph
            body: >
              Passage M1000 是商业化尝试中最激进的硅光子制造挑战。4,000 mm² 光子中介层裸片大于任何已知商用硅光子量产裸片。Poisson 良率模型预测，在标准光子工艺上，这一尺寸的裸片良率只有
              10–30%，商业上处于边缘。Lightmatter 尚未披露良率数据；EVK 样品阶段仍缺乏良率披露，对投资人是实质信息缺口。


              制造质量风险还会叠加。GlobalFoundries 的 45CLO 硅光子工艺，尚未公开证明在超过 1,000 mm² 裸片上可达到商业良率。共封装光学模块的热管理又是一道额外难题：光学组件比电器件更怕热，与高
              TDP GPU 裸片共址会产生热串扰，需要主动热控制；M1000 规模下尚未展示这一点。MT ferrule 光纤阵列必须在 10,000+ 次热循环、HALT 测试以及 10–15
              年数据中心运行寿命中维持精确光学对准；OIF 标准定义的这些认证要求，不可能在 12 个月 EVK 到 design-win 的时间线内完成。


              TSMC CoWoS 先进封装产能风险是真实的：NVIDIA Blackwell（B200/GB200）生产已经消耗了截至 2025 年几乎全部 CoWoS-L 产能。Lightmatter 尚未确认与 TSMC
              签署 CoWoS 供应协议。双晶圆厂依赖（GF 负责中介层 + TSMC 负责封装）意味着任何一家出现产能或良率问题，都会直接传导到项目交付时间线。


              AI 应用中的硅光子面临全行业共同的可扩展性挑战：大面积 PIC 良率的代工瓶颈、光纤阵列贴装自动化、光电集成密度，在所有可用代工厂中都尚未解决。Lightmatter 正试图第一次在商业规模上解决这些问题。
