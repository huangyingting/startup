      - number: '5.6'
        title: 图表
        blocks:
          - type: callout
            title: Edgeless I/O 是真正、已发表的技术突破
            body: >-
              arXiv 论文（2510.15893）对 2.7× 训练加速主张给出了独立同行评审验证，这是竞争 CPO 厂商尚未发布的差异化可信信号。Edgeless I/O
              概念在物理上根基扎实：带宽随裸片面积扩展，是光通过大型中介层路由的自然属性，不是对现有 SerDes 设计的渐进改良。
            calloutType: strength
            claimRefs:
              - CE015
              - CE016
              - CE026
          - type: callout
            title: 4,000 mm² 中介层良率是关键的未验证风险
            body: >-
              M1000 的 4,000 mm² 光子中介层，是已发布 CPO 产品中最大的复杂光子裸片结构。良率会随裸片面积指数级下降；在典型硅光子缺陷密度（0.1–0.3 defects/cm²）下，4,000 mm²
              裸片最佳也只有 25–60% 良率。Lightmatter 尚未发布良率数据；若量产经济性按 50% 良率计算，所需售价会远高于初步估计。
