      - number: '3.4'
        title: 切换成本与锁定动态
        blocks:
          - type: paragraph
            body: >
              一旦超大规模云厂商承诺某种集成架构，共封装光学会形成很高的切换成本。光子中介层必须与计算裸片协同设计，需要共同流片决策，实际上把 CPO 供应商锁定 2–3
              代芯片。谁先赢得初始超大规模云厂商设计导入，谁就拥有强先发优势；反过来，任何在第一轮竞争评估中落败的供应商都会暴露关键脆弱性。Ayar Labs 与 NVIDIA 的关系，让其在 GPU
              相邻市场拥有结构性优势：如果 Ayar 的 TeraPHY chiplet 被集成进 NVIDIA 下一代 AI 加速器封装，其他 CPO 供应商将在多年内无法进入 NVIDIA 的设计导入。


              Lightmatter 的 Edgeless I/O 架构形成独特的锁定动态：由于带宽随裸片面积而非周长扩展，中介层既更差异化，也更难替换。客户一旦重构芯片 I/O 以利用 Edgeless I/O，迁移到替代
              CPO 方案就需要再次经历完整芯片重设计周期。如果 Lightmatter 赢下设计导入，这会带来强留存；但也会放大早期竞争评估失利的成本。当前分销优势偏向
              Intel（既有数据中心销售渠道）、Marvell（超大规模云厂商网络关系）和 Ayar（NVIDIA 协同设计）。Lightmatter 缺乏同等分销杠杆，只能靠技术差异化赢单。
