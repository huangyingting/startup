      - number: '6.5'
        title: 扩张潜力与集中度风险
        blocks:
          - type: paragraph
            body: >
              Lightmatter 的扩张路径很清晰，但高度依赖一两个锚定胜利。即便量产起点在 2027–2028 年，一个超大规模云厂商 design win 也能验证商业牵引力、支撑 $4.4B
              估值，并可能带动超大规模云厂商和 AI 芯片公司生态中的更多客户对话。反过来，如果到 2027 年仍没有任何量产项目，公司就需要估值重置，并可能面临降价融资或以压缩估值被收购。


              客户集中度风险极高且有意为之。M1000 的 TAM 需要超大规模云厂商 AI 训练集群，而全球买家只有 4–5 家。成功情景下，头 1–2 个客户会在前 1–3 年贡献 80–90%
              收入，形成重大依赖风险，类似其他企业级深科技硬件公司（如 Cerebras、Graphcore）。向 HPC 和云托管扩张能带来出货量，但带宽要求更低（EVK100
              层级），毛利率也更受挤压。地理集中度同样值得注意：大部分可触达市场在美国，欧洲和亚洲是次级需求；三者都受同一轮 AI capex 周期时点风险影响。


              另一条扩张路径是 AI 芯片协同集成：NVIDIA、AMD 或定制 ASIC 厂商如果把 Passage M1000 集成进芯片封装，Lightmatter 的收入就会随 AI
              芯片销售扩张，而不必直接触达超大规模云厂商。Ayar Labs 正在与 NVIDIA 走这一路径。如果 Lightmatter 能与 AMD、Google TPU、Amazon Trainium 或
              Microsoft Maia 建立可比关系，收入扩张潜力会显著高于直接销售给超大规模云厂商。
