      - number: '8.5'
        title: 最终尽调需求与退出就绪度
        blocks:
          - type: paragraph
            body: >
              Lightmatter 的尽调需求按是否阻断投资排序。两项是阻断项（没有它们，$4.4B 估值下的投资无法成立）：（1）在 NDA 保护下取得 GlobalFoundries M1000
              光子中介层良率数据，包括晶圆批次良率、缺陷密度测量，以及公司在预计产量下的 die 成本模型；（2）在 NDA 保护下确认，至少有一家具名 hyperscaler 或 AI 芯片公司正在推进从 EVK 转向
              design win 的活跃讨论，并披露项目时间表和预计承诺日期。


              三项是重要项（最终承诺前必需，但单独不构成阻断）：（1）TSMC CoWoS-L 产能确认——已签署或正在谈判的供给协议，锁定 2027–2028 年开始 M1000 量产爬坡所需的先进封装产能；（2）BIS
              出口合规状态——关于 M1000 ECCN 分类的法律意见，以及向国际 hyperscaler 数据中心交付是否需要出口许可证；（3）股权结构瀑布模型——完整清算优先权表，显示 Series D
              投资人在什么有效收购价格下回本，以及员工留任股权能否在 $2–4B 收购中保留下来。


              三项是信息项（有助于增强信念，但不阻断）：（1）Guide VLSP 独立客户名单（即便 1–2 个名字，也能验证商业执行能力）；（2）EVK100 design-win
              转化管线状态（理解较低门槛产品是否取得任何商业进展）；（3）Series E 融资计划——时间表、目标估值和已接触的领投方。


              退出就绪度评估：Lightmatter 2026 年还不具备 IPO 条件——没有收入、没有具名客户、没有量产客户，且 3 年内看不到盈利路径。只有在确认 design win 并取得初始量产收入后，IPO
              才现实（最早 2029 年）。现阶段更可能的退出是被 hyperscaler（Google/GV 关系）、芯片公司（AMD，潜在还有
              Intel）或系统公司（Cisco、Nokia）战略并购。战略并购溢价很大程度取决于买方的竞争紧迫感——在 Intel 和 Ayar 参与争夺的 CPO 市场里，hyperscaler 或芯片公司可能愿意支付
              $5–8B，在竞争对手之前拿下 Lightmatter 的技术和团队。
