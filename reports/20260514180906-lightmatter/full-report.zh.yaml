            title: 超大规模云厂商买方集中既是机会也是风险
            body: >-
              前 4 大超大规模云厂商约占终端用户硅光子需求的 ~58.7%。对 Lightmatter 而言，赢下 1–2
              个超大规模云厂商项目即可建立收入并验证市场。但这种极端集中也意味着，一次认证延迟或竞争失败就可能彻底切断近期收入路径。
            calloutType: insight
            claimRefs:
