      - number: '8.4'
        title: 建议与决策框架
        blocks:
          - type: paragraph
            body: >
              建议：**跟踪 / 有条件通过**


              Lightmatter 是世界级团队，正在推进一项真正重要、处在硅光子前沿的技术。可触达市场很大，技术差异化可测量，投资人组合也高质量。如果价格反映商业阶段——例如 $1.5–2.5B
              估值，更适合一家收入前、已有 EVK 阶段牵引力的光子半导体公司——这会是一笔有吸引力的投资。


              但在 $4.4B 投前、尚无收入的价格上，投资前必须满足三个条件：（1）在 NDA 保护下确认，至少有一家具名 hyperscaler 或 AI 芯片公司正在推进从 EVK 转向 design win
              的活跃讨论；（2）M1000 光子中介层良率数据表明，在预计产量下单位经济性具备商业可行性；（3）确认 BIS 出口管制风险可通过标准合规建设管理，且面向拥有国际数据中心的美国 hyperscaler
              部署不需要出口许可证。若三项都满足，牛市情景概率将从当前 15–25% 提高到 35–45%，投资预期价值改善至约 1.4–1.8x；考虑到变革性上行可选性，作为一笔风险投资仓位勉强可以接受。


              thesis-break 监控框架应跟踪第 7 章定义的七项 kill criteria。近期最关键的信号，是 Q4 2027 前出现任何 design-win
              公告——这将是投资论点最重要的正向事件。反过来，如果 Intel 或 Ayar Labs 在两家或更多 hyperscaler 处宣布量产 CPO，将是最重要的负向事件，实际上会抹掉大部分可触达 TAM。


              最终尽调需求按优先级排列：良率数据（最重要，阻断项）、活跃 design-win 讨论确认（最重要，阻断项）、TSMC CoWoS
              供给协议确认（重要，必需），以及出口合规状态（重要，必需）。没有这四项，公开证据无法支撑 $4.4B 价格。
            claimRefs:
              - CV016
              - CV017
              - CV018
              - CV019
              - CV020
