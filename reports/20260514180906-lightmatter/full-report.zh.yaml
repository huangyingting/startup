      - number: '8.6'
        title: 附录
        blocks:
          - type: callout
            title: 跟踪 / 有条件通过：技术有吸引力，估值需要尽调解锁
            body: >-
              Lightmatter 是世界级团队，押注一项真正重要的技术。但 $4.4B、尚无收入的进入价格，要求牛市情景才能打出正回报。承诺投资前必须确认三项阻断性数据：M1000 良率可行性、活跃 design-win
              讨论确认，以及监管放行。没有这些，建议就是跟踪。
            calloutType: recommendation
            claimRefs:
              - CV016
              - CV017
              - CV018
          - type: callout
            title: 进入价格下预期价值约 1.0–1.2x——不足以补偿风险投资风险
            body: >-
              在当前证据水平下，概率加权情景分析给出的预期回报约为 $4.4B 进入价格的 1.0–1.2x。该回报无法补偿深科技硬件投资常见的流动性溢价、技术风险和 5–8
              年持有期。只有阻断性尽调项得到正面解决，这笔投资才具备风险投资级别的合理性。
            calloutType: risk
            claimRefs:
              - CV011
              - CV012
              - CV013
              - CV015
          - type: callout
            title: 多数情景下，战略并购比 IPO 更可能
            body: >-
              在基准和牛市情景中，Lightmatter 最现实的退出更可能是战略收购，而非
              IPO：公司技术门槛很高，产品对基础设施至关重要，潜在买家（Google、Microsoft、Intel、AMD、Cisco）都有战略理由在合适价格上拥有这项技术。GV/Google
              关系和董事会通道，形成了一条自然的并购评估路径。
            calloutType: insight
            claimRefs:
              - CV023
              - CV024
              - CV025
          - type: callout
            title: 收入模型假设 2027 年拿到 Design Win，2028 年进入商业量产
            body: 所有正回报情景都依赖至少一个 design win 在 Q4 2027 前宣布，并在 2028 年开始商业量产。任一里程碑推迟 12 个月，投资预期价值都会因额外资本消耗和竞争追赶风险下降约 25–30%。
            calloutType: assumption
            claimRefs:
              - CV014
              - CV015
              - CV022
