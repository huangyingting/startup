      - number: '1.5'
        title: 反向信号与风险标记
        blocks:
          - type: paragraph
            body: >
              作为私营公司，Lightmatter 的披露天然有限。公司不向 SEC
              或任何同等监管机构提交公开财务报表。收入数字、客户名称和具体商业进展无法通过公开一手来源确认。这一信息缺口是后期私营公司尽调的内在特征，本报告在各处明确标记。


              这一阶段的深科技硬件创业公司常见风险之一，是商业化延迟：从技术演示到产生收入的量产部署，之间的距离可能比资本市场预期更远。截至 2026 年 5 月，Lightmatter
              的评估套件（EVK）被描述为“正在采样”，并向早期访问合作伙伴开放。这意味着公司核心产品处于量产前或早期量产阶段，这一阶段资本开支高，也容易受客户认证延期影响。


              公司的核心技术——共封装光学和 3D
              光子集成——确实新颖，规模化制造难度很高。关键风险包括先进封装良率挑战，对多个专业伙伴（TSMC、GlobalFoundries、Tower、Amkor、ASE）的供应链依赖，以及客户采用门槛：超大规模云厂商必须重新设计系统架构才能集成
              CPO 技术。竞争格局也在加剧，Ayar Labs 获 NVIDIA 和其他行业领导者支持，Celestial AI 则被 Marvell 收购。这些反向信号和更广泛的风险图谱，将在风险章节进一步展开。


              行业分析师研究指出，CPO/光子集成类别存在多项逆风，会影响 Lightmatter。标准化封装不足推高一次性工程（NRE）成本，定制工具使单设计成本超过 USD 5 million。300 mm
              光子代工产能有限，到 2027 年仍构成约束；McKinsey 预测收发器供应将短缺 40–60%。这些结构性行业约束独立于公司技术优劣，都会给 Lightmatter 的商业化时间表和定价权带来实际风险。


              截至运行日期，公开来源未发现监管制裁、诉讼或重大领导层离职的证据。公司 LinkedIn 资料显示员工数持续增长且仍在招聘，说明没有已知的组织危机。
