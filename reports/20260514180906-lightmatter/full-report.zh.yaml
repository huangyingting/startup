  - number: 5
    title: 产品与技术
    sections:
      - number: '5.1'
        title: 产品定义与组合
        blocks:
          - type: paragraph
            body: >
              Lightmatter 的产品组合由两套互补系统构成：Passage 共封装光学（CPO）互连平台，以及 Guide VLSP（Versatile Light Source Platform）光引擎。两者共同覆盖
              AI 数据中心从激光生成、光路由到芯片级集成的完整光子数据路径。


              Passage 平台分三档产品，面向不同集成深度和性能层级。Passage EVK100（3.2 Tbps、16λ DWDM、112G PAM4）是入门档产品，针对存量 AI
              集群配置和初始客户集成。Passage L200（32–64 Tbps 总带宽、112G PAM4，已在 OFC 2025 展示）面向当前一代 GPU/NPU 系统的中端 CPO 集成。Passage M1000
              EVK（114.6 Tbps 双向、2.3 pJ/bit、4,000 mm² 光子中介层、1,024 条 SerDes 通道）是旗舰产品，面向万亿参数 AI
              训练基础设施；目前处于早期访问伙伴的样品阶段。Guide VLSP 提供 16 波长 DWDM 激光输出，单根光纤 100+ mW，并支持软件定义控制；当热约束使激光无法与计算芯粒共址时，它为 Passage
              系统提供光源。


              产品组合策略体现了有意的分层路径：EVK100 为评估 CPO 集成的客户提供近期入口；L200 覆盖当前一代带宽层级（400G–800G 过渡）；M1000 瞄准 1T+ 参数模型训练的未来需求，也是
              Lightmatter 差异化逻辑的核心。由此形成一条采用漏斗：客户先从 EVK100 起步，验证技术平台，再升级到 M1000 以获得最高带宽。
            claimRefs:
              - CE001
              - CE002
              - CE003
              - CE004
              - CE005
          - type: table
            tableRef: TE001
            claimRefs:
              - CE001
              - CE002
              - CE003
              - CE004
              - CE005
      - number: '5.2'
        title: 产品线架构与定位
        blocks:
          - type: paragraph
            body: >
              每一档 Passage 产品对应一种不同的集成范式。EVK100（3.2 Tbps）采用 16λ DWDM 和 112G PAM4 SerDes，兼容现有 PCIe 和 CXL 互连标准。它以 Guide
              VLSP 作为外部光源，设计目标是在不要求完整芯片重构的情况下展示 CPO 集成，从而加快客户评估。L200（32–64 Tbps）是 CPO 过渡点：它以中端带宽实现 Edgeless I/O 架构，已在
              OFC 2025 展示，并兼容 112G PAM4 电接口。L200 的量产时间线尚未公开披露。M1000（114.6 Tbps）在 4,000 mm² 光子中介层上采用 3D 共封装集成，配置 1,024 条
              SerDes 通道，支持 2.3 pJ/bit 能效。其 Edgeless I/O 实现让带宽随完整计算裸片面积扩展，从而支持受周边电 SerDes 限制时物理上无法实现的架构。


              Guide VLSP（光引擎）值得作为独立产品单独看待。它以软件定义、现场可更换的形态，提供 16 波长 DWDM 输出，单根光纤 100+ mW。Guide 既可配合 Passage
              M1000，为光子中介层提供激光输入，也可作为其他光子集成架构的独立光源。软件定义波长选择使光网络无需硬件改动即可动态重构；对于管理复杂 AI 集群拓扑的运营方，这是一项差异化能力。Guide
              定价未公开披露，但它代表一条独立的经常性收入流（具有明确 MTBF 的可更换耗材），与资本密集型中介层平台相分离。
