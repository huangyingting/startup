        - id: unit_econ
          label: 单位经济性不成立
          detail: 良率推高裸片成本，M1000 按 $/Tbps 计不敌可插拔光模块
        - id: runway
          label: 现金跑道压缩
          detail: 烧钱速度升至每月 $20-25M；设计定点前 Series D 资金耗尽
        - id: tam_loss
          label: TAM 缩水
          detail: 中国和受限地区从可服务市场中剔除
        - id: series_e_risk
          label: Series E 困境
          detail: 缺少商业验证，被迫按持平或下调估值融资
        - id: valuation
          label: 估值压缩
          detail: 估值需低于 $4.4B；前轮投资人受优先权保护
      edges:
        - from: yield
          to: unit_econ
          label: 推动
        - from: yield
          to: runway
          label: 推高烧钱速度
        - from: tsmc
          to: nodw
          label: 拖慢项目
        - from: regulatory
          to: tam_loss
          label: 限制地域
        - from: nodw
          to: series_e_risk
          label: 抽走验证
        - from: competitor
          to: tam_loss
          label: 切分市场
        - from: unit_econ
          to: nodw
          label: 削弱客户 ROI
        - from: tam_loss
          to: series_e_risk
          label: 削弱增长叙事
        - from: runway
          to: series_e_risk
          label: 倒逼融资时点
        - from: series_e_risk
          to: valuation
          label: 触发
    claimRefs:
      - CR003
      - CR004
      - CR007
      - CR022
      - CR029
      - CR034
  - id: FR003
    title: 依赖关系图
    type: dag
    layout: wide
    summary: 有向无环图梳理 Lightmatter 对晶圆厂、封装、客户、标准和资本的关键依赖——单点失效关系高度集中。
    data:
      nodes:
        - id: lightmatter
          label: Lightmatter
          detail: 无晶圆厂光子 IP 公司；约 200 人；已融资 $480M
        - id: gf
          label: GlobalFoundries 300mm 晶圆厂
          detail: 唯一光子中介层代工厂；45CLO 硅光子工艺
        - id: tsmc_pkg
          label: TSMC CoWoS-L
          detail: 用于 3D 芯片堆叠的先进封装；该规模下唯一商业供应商
        - id: oif
          label: OIF / IEEE 标准
          detail: CPO 认证框架和互操作标准
        - id: hyperscaler
          label: 超大规模云厂商设计定点
          detail: Google、Meta、Microsoft 或 Amazon——前四大客户贡献 M1000 TAM 的 80% 以上
        - id: ai_chip_co
          label: AI 芯片公司（AMD / Google TPU）
          detail: 借助芯片公司集成打开第二条收入路径；NVIDIA 已选择 Ayar
        - id: series_e
          label: Series E / 资本市场
          detail: 量产收入前需要 $200-400M；必须在 2027-2028 年完成
        - id: bis_compliance
          label: BIS 出口合规
          detail: 所有客户交付均需满足 EAR 合规；需要总法律顾问 / 外部律师支持
      edges:
        - from: lightmatter
          to: gf
          label: 在此制造
        - from: lightmatter
          to: tsmc_pkg
          label: 在此封装
        - from: lightmatter
          to: oif
          label: 按此认证
        - from: lightmatter
          to: hyperscaler
          label: 必须拿下
        - from: lightmatter
          to: ai_chip_co
          label: 备选目标
        - from: lightmatter
          to: series_e
          label: 需要
        - from: lightmatter
          to: bis_compliance
          label: 受制于
        - from: gf
          to: hyperscaler
          label: 良率支撑
        - from: tsmc_pkg
          to: hyperscaler
          label: 封装支撑
    claimRefs:
      - CR003
      - CR004
      - CR013
      - CR030
      - CR019
  - id: FV001
    title: 建议逻辑
    type: flow
    layout: wide
    summary: 流程图展示市场、技术、客户、风险和估值证据如何推导出「观察 / 有条件放弃」建议，并标出可上调建议的条件路径。
    data:
      nodes:
        - id: market
          label: 市场信号：强
          detail: 硅光子 TAM 到 2029 年达 $7.2B；CPO 采用拐点在 2027-2028 年
        - id: tech
          label: 技术信号：强
          detail: M1000 规格同类最佳；Edgeless I/O 有差异化；80 多项专利
        - id: customers
          label: 客户信号：弱
          detail: 无具名客户；仅 EVK 送样；无设计定点
        - id: risks
          label: 风险信号：高
          detail: 良率未知；TSMC 产能不确定；BIS 合规未披露
        - id: valuation
          label: 估值信号：偏高
          detail: 收入前估值 $4.4B；只有乐观情景才能带来正回报
        - id: current
          label: 当前建议：观察
          detail: 技术有吸引力；估值昂贵；客户验证缺失
        - id: condition_yield
          label: 条件 1：良率数据
          detail: NDA 下确认 M1000 裸片良率具备商业可行性（>25%）
        - id: condition_dw
          label: 条件 2：设计定点讨论
          detail: 确认具名超大规模云厂商正从 EVK 转向设计定点
        - id: condition_reg
          label: 条件 3：监管放行
          detail: 确认出口合规可控；不存在阻断性许可要求
        - id: upgrade
          label: 上调后建议：有条件买入
          detail: 若 3 个条件全部满足：预期价值提升至约 1.4-1.8x；仍需监控打破投资逻辑的信号
      edges:
        - from: market
          to: current
          label: 支持
        - from: tech
          to: current
          label: 支持
        - from: customers
          to: current
          label: 削弱
        - from: risks
          to: current
          label: 削弱
        - from: valuation
          to: current
          label: 约束
        - from: current
          to: condition_yield
          label: 需要
        - from: current
          to: condition_dw
          label: 需要
        - from: current
          to: condition_reg
          label: 需要
        - from: condition_yield
          to: upgrade
          label: 满足后支撑
        - from: condition_dw
          to: upgrade
          label: 满足后支撑
        - from: condition_reg
          to: upgrade
          label: 满足后支撑
    claimRefs:
      - CV016
      - CV017
      - CV018
      - CV019
      - CV020
  - id: FV002
    title: 估值 / 回报区间
    type: range
    layout: standard
    summary: 区间图展示乐观、基准、悲观情景下的估值结果，以及按 $4.4B Series D 入场价计算的对应回报。
    data:
      items:
        - label: 悲观情景退出估值
          low: 500
          high: 1500
          note: 困境 M&A 或下调估值融资；按 $4.4B 入场价计算为 0.1–0.3x；Series D 需减记
        - label: 基准情景退出估值
          low: 3000
          high: 5000
          note: 1 个设计定点、部分爬坡、M&A 或 IPO；入场价的 0.7–1.1x；收回本金
        - label: 乐观情景退出估值
          low: 8000
          high: 12000
          note: 2 个设计定点、量产爬坡、强势 IPO 或战略 M&A；入场价的 1.8–2.7x
        - label: 上行期权估值
          low: 15000
          high: 20000
          note: 多个设计定点后规模化 IPO；入场价的 3.4–4.5x；低概率 5–10% 情景
    claimRefs:
      - CV011
      - CV012
      - CV013
      - CV014
      - CV015
  - id: FV003
    title: 估值敏感性
    type: bar
    layout: standard
    summary: 柱状图展示 Lightmatter 隐含估值对关键收入和倍数假设的敏感性，说明 $4.4B 入场价要求各维度假设均高于平均水平。
    data:
      items:
        - label: 2030 年收入：$50M × 10x
          value: 500
        - label: 2030 年收入：$100M × 10x
          value: 1000
        - label: 2030 年收入：$200M × 15x
          value: 3000
        - label: 2030 年收入：$300M × 15x
          value: 4500
        - label: 2030 年收入：$400M × 20x
          value: 8000
        - label: 2030 年收入：$500M × 20x
          value: 10000
        - label: 入场价 $4.4B（基准）
          value: 4400
    claimRefs:
      - CV007
      - CV008
      - CV009
      - CV010
  - id: FV004
    title: 投资 KPI
    type: kpi
    layout: standard
    summary: 可供投委会使用的 KPI 评分卡，按 0-10 分评估 Lightmatter 的 8 个投资维度，并标注置信度和证据质量。
    data:
      items:
        - label: 市场机会（TAM / 紧迫性）
          value: 8/10
          note: 市场大、在增长、窗口期紧；CPO 采用拐点在 2027-2028 年
        - label: 技术差异化（护城河深度）
          value: 8/10
          note: 规格同类最佳；80 多项专利；Edgeless I/O 架构；若能落地，可形成真正护城河
        - label: 商业验证（客户牵引）
          value: 2/10
          note: 无具名客户；仅 EVK 送样；本报告最弱维度
        - label: 团队质量（执行置信度）
          value: 8/10
          note: MIT / Stanford 背景；机构投资人持续跟投；创始团队强
        - label: 竞争位置（护城河耐久性）
          value: 5/10
          note: Intel 在位优势；Ayar Labs 有 NVIDIA 支持；Marvell 有客户关系；市场竞争激烈
        - label: 单位经济性（可行性）
          value: 3/10
          note: 良率数据未披露；单位经济性未知；存在 10-30% 良率风险
        - label: 风险画像（净风险）
          value: 3/10
          note: 技术、商业、监管和资本风险同时存在
        - label: 估值纪律（入场价）
          value: 4/10
          note: 收入前估值 $4.4B；需要乐观情景支撑；基准情景最多收回本金
    claimRefs:
      - CV016
      - CV017
      - CV018
      - CV019
      - CV020
