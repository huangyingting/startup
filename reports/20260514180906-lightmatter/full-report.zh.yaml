        title: 公开财务缺口与反向发现
        blocks:
          - type: paragraph
            body: >
              对 Lightmatter 的财务尽调受到一个核心限制：公司没有公开财务披露。Lightmatter 是 Delaware C-corporation，没有公开债务或股权证券，因此不需要向 SEC
              提交财务报表，只需提交 Form D 豁免发行通知。以下关键缺口使完整的财务承销无法完成。第一，收入：公开披露收入为零。新闻稿没有提到
              ARR、合同金额或订单活动。第二，毛利率：光子中介层生产良率和单位经济性没有公开数据。第三，烧钱速度：只能根据员工数和行业基准估计，不来自已发布财务数据。第四，资本效率：累计融资 $850M，相比 Arm（IPO
              前已盈利）或 NVIDIA（更早阶段已产生收入）并不占优，说明 Lightmatter 走的是一条更长、更吃资本的路径。第五，客户集中度：即便未来出现具名客户，早期量产如果集中在 1–3
              个超大规模云厂商项目，也会带来显著收入风险。反向观点是，Lightmatter 以 $0 收入支撑 $60–$90M/yr 烧钱速度和 $4.4B
              估值，对硬件创业公司来说资本效率比不利——类似那些在预收入阶段消耗资本、却未能在预期时间内达成量产里程碑的芯片公司。
