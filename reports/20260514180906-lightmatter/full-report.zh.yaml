      - number: '2.3'
        title: 买方与用户分层
        blocks:
          - type: paragraph
            body: >
              Lightmatter 的买方范围窄且高度集中。超大规模云厂商——Google（Alphabet）、Meta、Microsoft（Azure）和
              Amazon（AWS）——构成主导终端用户群，约占硅光子终端用户需求的 58.72%。这些组织大规模运行自有 AI 训练集群（10,000+ GPU/NPU pod），拥有可协同设计 CPO
              集成的内部硅团队，也同时具备预算权和工程深度来认证新的互连架构。CPO 采购决策掌握在基础设施 VP 和数据中心技术战略团队手中，从初步评估到量产的采购周期为 18–36 个月。


              AI 芯片公司（NVIDIA、AMD、Intel）是第二类买方——它们同时是竞争者（Intel Silicon Photonics）、客户（若将 Lightmatter Passage
              集成进自家芯片封装）和合作伙伴。NVIDIA 投资 Ayar Labs，说明其偏好供应商竞争，而非单一来源 CPO。AMD 和定制 ASIC 供应商（Gaudi、Trainium）是合理的 Passage
              集成客户。这里的预算负责人是平台工程团队，交易规模可从协同设计费用到价值 $50–300M 的量产合同不等。


              HPC 中心（国家实验室、大学、研究联盟）构成第三类客户——预算较小（每年网络 $10–100M）、评估周期更长，且风险偏好低，限制了近期收入贡献。数据中心托管运营商（Equinix、Digital
              Realty）是更外围的细分，CPO 准备度落后超大规模云厂商 3–5 年。Gartner 的 AI 基础设施技术成熟度曲线将 2025 年的 CPO
              放在“幻灭低谷”到“启蒙坡道”的过渡阶段，这与超大规模云厂商早期评估、但尚无确认量产的状态一致。
