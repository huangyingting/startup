      - number: '2.5'
        title: 市场规模与采用尽调缺口
        blocks:
          - type: paragraph
            body: >
              三个尽调缺口限制了对 Lightmatter 市场机会的信心。第一，没有分析师机构发布独立的 CPO 互连 TAM，把 Lightmatter
              的可服务市场从更广泛的硅光子行业中剥离出来。MarketsandMarkets、Mordor Intelligence 和 Grand View Research 都把 CPO 纳入硅光子，但不拆分 CPO
              专属收入预测。因此 CPO SAM 只能按总市场比例估算，引入显著不确定性（15–25% 区间意味着 SAM 估计相差 65%）。第二，尽管 Lightmatter 的 EVK
              状态是“正在采样”，仍没有超大规模云厂商公开确认量产 CPO 采购。缺少客户证据点——即便是匿名参考客户——使 $4.4B
              估值下的商业进展完全未经验证。第三，两组主要分析师估计（MarketsandMarkets 预计 2030 年 $9.65B，Mordor 预计 2031 年 $13.18B）长期预测相差约
              36%，且双方都没有独立验证对方的方法论。这些缺口对投资逻辑很关键，并将在第 6 章（客户情况）进一步讨论。
            claimRefs:
              - CM031
              - CM032
              - CM033
              - CM034
              - CM035
      - number: '2.6'
        title: 展示要点
        blocks:
          - type: callout
            title: 大市场、高增长，并有结构性顺风
            body: 硅光子是增长最快的半导体子行业之一，CAGR 为 27–30%，由 AI 训练资本开支和带宽稀缺推动。光收发器市场存在结构性供给不足（到 2027 年缺口 40–60%），使 CPO 作为架构替代方案具备紧迫性。
            calloutType: strength
            claimRefs:
              - CM003
              - CM004
              - CM022
          - type: callout
            title: CPO 专属 TAM 仍缺少分析验证
            body: >-
              没有主要分析师发布独立的 CPO 互连 TAM。Lightmatter 的 SAM 必须按更广泛硅光子市场的 15–25% 估计，导致 SAM 区间相差 65%。这一缺口削弱投资人对市场规模的信心；若 CPO
              采用慢于整体光子趋势，也会带来执行风险。
            calloutType: risk
