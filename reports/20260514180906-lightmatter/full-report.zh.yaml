      - number: '5.3'
        title: 技术架构：Edgeless I/O 与 3D 光子集成
        blocks:
          - type: paragraph
            body: >
              Lightmatter 的核心架构创新是 Edgeless I/O：光 I/O 带宽可以随裸片面积扩展，而不是受裸片周长限制。传统半导体封装中，SerDes 通道放在裸片边缘，总 I/O
              带宽被裸片周长固定住。一个 10mm × 10mm 裸片即便配 112G PAM4 SerDes，周边最多也只能容纳约 500 条通道，合计 50 Tbps；无论内部计算逻辑多强都无法突破。Edgeless
              I/O 通过完整光子中介层面积路由光 I/O，打破这一约束，使 M1000 可在 4,000 mm² 面积上实现 114.6 Tbps，同时把计算裸片周边留给其他 I/O。


              3D 集成方案使用 TSMC 先进封装（CoWoS-L 或 SoIC），把计算裸片（GPU/NPU）堆叠在光子中介层之上或放在其旁边。传统上 ASIC 需要通过 PCB
              走线连接可插拔收发模块；该方案去掉这段走线，降低光路损耗和电光转换能耗。arXiv 论文（2510.15893）通过展示万亿参数 MoE 模型 2.7× 训练加速和 8× 扩展能力验证了这一方法；在传统电
              SerDes 下，由于总带宽和功耗约束，这一结果无法实现。Lightmatter 借用的 TSMC CoWoS-L 平台（用于 NVIDIA H100/H200 HBM
              集成）正是同一先进封装工艺，供应链层面证明该工艺存在且可扩展。GlobalFoundries 的 300mm 硅光子代工厂负责光子集成电路（PIC）晶圆制造；GlobalFoundries 与 Intel
              并列，是全球仅有的两家量产硅光子代工厂之一。


              Guide VLSP 采用量子级联或 VCSEL 阵列设计（未公开披露），在 C-band 或 O-band DWDM 光谱上提供 16
              个波长通道，并支持软件定义波长切换。软件定义架构让数据中心运营方无需重接光纤布线，就能动态重配光路径；对管理 PB 级训练任务的超大规模云厂商，这是重要的运营优势。
