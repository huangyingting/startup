companyProfile:
  summary: >
    Lightmatter, Inc. is a Mountain View, CA-based photonic computing company founded in 2017 by MIT photonics researchers. The company designs silicon photonic interconnects and co-packaged optics (CPO) solutions targeting the exascale AI data center market. Its core products—the Passage interconnect platform and Guide light engine—aim to eliminate the electrical interconnect bandwidth bottleneck that constrains next-generation AI training clusters. Lightmatter raised $400M in its October 2024 Series D at a $4.4B pre-money valuation, bringing total capital raised to $850M. As of May 2026 the company is pre-revenue with no named production customers, having announced the Passage M1000 3D Photonic Superchip in early 2025 and targeting its first customer design wins.
  foundedDate: "2017-01-01"
  founders:
    - name: "Nicholas (Nick) Harris"
      role: "CEO & Co-Founder"
      background: "PhD, MIT photonics; built programmable photonic circuits; prior internships in quantum optics; leads company strategy and technology vision"
      claimRefs: [CO007]
    - name: "Darius Bunandar"
      role: "Co-Founder"
      background: "MIT PhD; quantum photonics and integrated photonics; contributed to foundational IP on silicon photonic modulators"
      claimRefs: [CO007]
    - name: "Prineha Narang"
      role: "Co-Founder"
      background: "Harvard faculty; computational materials science and photonics theory; broad academic publication record"
      claimRefs: [CO007]
    - name: "Thomas Graham"
      role: "Co-Founder"
      background: "Operations and business development; cross-functional leadership enabling rapid product development and commercial engagement"
      claimRefs: [CO007]
  foundingLocation: "Cambridge, MA (MIT)"
  headquarters: "800 W El Camino Real, Suite 350, Mountain View, CA 94040"
  productSummary: >
    Lightmatter sells co-packaged optics and silicon photonic interconnect modules for AI data centers. The Passage interconnect platform (Passage L200 and Passage M1000) replaces electrical copper interconnects with optical connections, enabling higher bandwidth density and lower power consumption at scale. The Guide light engine provides the laser source for co-packaged optics assemblies. The Passage M1000 3D Photonic Superchip, announced at OFC 2025, combines an optical I/O chiplet with advanced packaging to achieve terabit-class interconnect bandwidth for GPU/XPU clusters.
  customerFocus: "Hyperscalers (cloud providers), AI chip companies (XPU/GPU OEMs), and data center operators building frontier AI training and inference clusters"
  businessModel: "Hardware product sales (interconnect modules, light engines, evaluation kits) and technology licensing of photonic interconnect IP to semiconductor OEMs and hyperscalers"
  stage: "Series D — late private-stage, pre-revenue, targeting first commercial design wins"
  fundingStatus: "$400M Series D (October 2024) at $4.4B pre-money valuation; $850M total raised; investors include GV, Spark Capital, SIP Global Partners, Fidelity, and Temasek"
