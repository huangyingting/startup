callouts:
  - calloutType: strength
    title: "Edgeless I/O Is a Genuine, Published Technical Breakthrough"
    body: "The arXiv paper (2510.15893) provides independent peer-reviewed validation of the 2.7× training speedup claim—a differentiated credibility signal that competing CPO vendors have not published. The Edgeless I/O concept is fundamentally sound physics: bandwidth scaling with die area is a natural property of photonic routing through a large interposer, not an incremental improvement on existing SerDes design."
    claimRefs: [CE015, CE016, CE026]

  - calloutType: risk
    title: "4,000 mm² Interposer Yield Is the Critical Unvalidated Risk"
    body: "The M1000's 4,000 mm² photonic interposer is the largest complex photonic die structure among published CPO products. Yield falls exponentially with die area—a 4,000 mm² die at typical silicon photonics defect densities (0.1–0.3 defects/cm²) would yield 25–60% at best. Lightmatter has not published yield data, and the production economics at 50% yield would require a much higher sell price than initial estimates suggest."
    claimRefs: [CE017, CE018, CE028]

  - calloutType: insight
    title: "Guide VLSP Creates a Recurring Revenue Stream"
    body: "The Guide VLSP light engine is a software-defined, field-replaceable laser source with a defined MTBF. This creates a recurring consumable revenue stream—analogous to ink cartridges for photonic data centers—that is economically attractive for investors seeking recurring revenue alongside the capital-intensive interposer platform."
    claimRefs: [CE007, CE009, CE010]

  - calloutType: risk
    title: "TSMC CoWoS-L Capacity Constraint Could Delay M1000 Production"
    body: "TSMC's CoWoS-L advanced packaging capacity is in high demand from NVIDIA (H100/H200 HBM), AMD (Instinct MI300), and other AI chip programs. Lightmatter's M1000 production ramp depends on securing dedicated CoWoS-L allocation, which requires either a pre-committed volume agreement or acceptance of queue position behind larger customers. This supply chain dependency is a material execution risk for the 2027 production target."
    claimRefs: [CE020, CE028]

