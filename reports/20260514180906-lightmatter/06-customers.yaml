callouts:
  - calloutType: risk
    title: "Zero Named Customers at $4.4B Valuation Is the Core Diligence Failure"
    body: "No named hyperscaler, AI chip company, or HPC partner has been publicly confirmed as a Lightmatter customer or design-win partner. At $4.4B pre-revenue valuation, this is the most significant adverse finding in this report. Every comparable deep-tech hardware company at this valuation stage has at least disclosed customer categories, partnership LOIs, or design-win intent—Lightmatter has not."
    claimRefs: [CU011, CU012, CU013]

  - calloutType: risk
    title: "Binary Customer Concentration Creates Extreme Outcome Variance"
    body: "Winning or losing a single hyperscaler program is effectively binary for Lightmatter's near-term revenue and valuation support. The top 5 potential customers (4 hyperscalers + NVIDIA) represent 80–90% of near-term addressable revenue. This is structurally similar to other enterprise deep-tech hardware companies that have experienced dramatic valuation compression when anchor customer decisions were delayed or lost to competitors."
    claimRefs: [CU019, CU020, CU021]

  - calloutType: insight
    title: "GV and Microsoft Board Representation Are Implicit Commercial Relationships"
    body: "GV (Google Ventures) and board member Kushagra Vaid (Microsoft) provide implicit commercial access to two of the four largest hyperscaler ecosystems. While these represent investor relationships rather than confirmed customer commitments, they materially improve Lightmatter's access to technical evaluation programs at Google and Microsoft relative to a pure startup with no strategic investors."
    claimRefs: [CU023, CU004, CU014]

  - calloutType: strength
    title: "EVK Sampling Announcement Confirms Product Is Physically Real"
    body: "The Passage M1000 EVK sampling announcement (Q4 2025) confirms the product is physically manufactured and deliverable—not just a paper architecture. This is a meaningful milestone for a 3D photonic interposer that has never been produced at this scale. EVK sampling is the prerequisite for all future commercial milestones and establishes that the technology has crossed the laboratory-to-product threshold."
    claimRefs: [CU006, CU007, CU008]

