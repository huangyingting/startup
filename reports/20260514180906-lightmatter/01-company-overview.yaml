    title: "Deep Technical Differentiation"
    body: "Lightmatter's Edgeless I/O architecture and 3D photonic interposer represent a genuine breakthrough in chip-scale interconnect design. The company's academic founding team and >100 patent portfolio give it meaningful IP moats in a difficult-to-replicate technical domain."
    claimRefs: [CO002, CO009, CO025]

  - calloutType: risk
    title: "Private Company Disclosure Opacity"
    body: "Lightmatter does not disclose revenue, customer names, or margin profile publicly. Investors conducting diligence must rely on company-provided data-room disclosures, which we were unable to access. All financial metrics are estimated or unavailable."
    claimRefs: [CO026, CO027]

  - calloutType: insight
    title: "Strategic Manufacturing Partnerships"
    body: "Lightmatter's partnerships with TSMC and GlobalFoundries provide access to high-volume manufacturing that smaller photonic startups cannot easily replicate. This manufacturing depth is a key competitive moat and a prerequisite for hyperscaler adoption."
    claimRefs: [CO023, CO024]

