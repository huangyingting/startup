callouts:
  - calloutType: strength
    title: "Large, Fast-Growing Market with Structural Tailwinds"
    body: "Silicon photonics is one of the fastest-growing semiconductor sub-sectors at 27–30% CAGR, driven by AI training capex and bandwidth scarcity. The market is structurally under-supplied on optical transceivers (40–60% gap through 2027), creating urgency for CPO as an architectural alternative."
    claimRefs: [CM003, CM004, CM022]

  - calloutType: risk
    title: "CPO-Specific TAM Remains Analytically Unvalidated"
    body: "No major analyst publishes a standalone CPO interconnect TAM. Lightmatter's SAM must be estimated as 15–25% of the broader silicon photonics market, creating a 65% spread in the SAM range. This gap limits investor confidence in market sizing and creates execution risk if CPO adoption is slower than the broader photonics trend."
    claimRefs: [CM031, CM032]

  - calloutType: insight
    title: "Hyperscaler Buyer Concentration is Both Opportunity and Risk"
    body: "The top 4 hyperscalers represent ~58.7% of end-user silicon photonics demand. For Lightmatter, winning 1–2 hyperscaler programs would establish revenue and market validation. However, this extreme concentration means a single qualification delay or competitive loss could eliminate the near-term revenue pathway entirely."
    claimRefs: [CM014, CM017, CM033]

  - calloutType: risk
    title: "No Named Customer Commitments Despite EVK Sampling"
    body: "Despite the Passage EVK being 'sampling now,' no hyperscaler or AI chip company has publicly confirmed an evaluation or production program. This is a significant gap relative to the $4.4B valuation and requires resolution before conviction in the market opportunity translates to commercial traction."
    claimRefs: [CM034, CM035]

