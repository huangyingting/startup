callouts:
  - calloutType: risk
    title: "Pre-Revenue at $4.4B: Execution Risk Is Priced for Perfection"
    body: "Lightmatter's $4.4B valuation with no disclosed revenue implies a 52x post-money / total-capital multiple. At $60–90M/yr burn, the company needs to demonstrate production revenue within 2–3 years to avoid a down round. The capital structure is solvent for the near term, but hyperscaler qualification delays could create a funding cliff at or before the Series D capital is depleted."
    claimRefs: [CI019, CI020, CI022]

  - calloutType: strength
    title: "Blue-Chip Investor Roster Provides Strategic Ecosystem Coverage"
    body: "GV (Google Ventures), Fidelity, Temasek, and SIP Global Partners represent strategic coverage of three key hyperscaler ecosystems (Google, Microsoft through board member Vaid) plus institutional capital. This reduces the risk of a cold funding environment and provides access to commercial relationships that pure financial VCs cannot offer."
    claimRefs: [CI017, CI018, CI019]

  - calloutType: risk
    title: "Hardware Gross Margins Compress Rapidly Once Volume Pricing Begins"
    body: "Advanced photonic interposers are expensive to manufacture but historically follow the semiconductor pricing decline curve. At $15,000–$30,000 COGS per unit in early production, any customer pressure on ASP—particularly from hyperscalers with strong procurement leverage—would rapidly compress margins toward 30–40%. This is the adverse scenario for hardware semiconductor companies and is the most cited risk by hardware VC investors."
    claimRefs: [CI011, CI012, CI013, CI025]

  - calloutType: insight
    title: "Funding Runway Is Adequate But Does Not Buffer Major Commercial Delays"
    body: "The $400M Series D provides an estimated 4–7 year runway at current burn. However, if hyperscaler qualification extends to 2028–2029 with no revenue, Lightmatter would face a Series E raise in a potentially less favorable market. The adequacy of capital is conditional on the commercial timeline, not absolute."
    claimRefs: [CI020, CI021, CI026]

