      - number: '6.4'
        title: Retention, Repeat Usage, and Satisfaction
        blocks:
          - type: paragraph
            body: >
              Lightmatter has no production customer base as of May 2026, making retention and satisfaction metrics
              inapplicable in the traditional sense. The proxy metrics available are: (1) leadership retention—Nick
              Harris (CEO), Darius Bunandar, and the core founding team remain intact, indicating team satisfaction and
              mission alignment; (2) investor repeat participation—multiple investors (GV, Spark Capital, SIP Global,
              Fidelity, Temasek) have participated in successive rounds from Series A through Series D, indicating
              investor satisfaction with progress; (3) EVK program continuation—the announcement of M1000 EVK sampling
              suggests early-access partners have not terminated the program, which is a weak positive signal.


              For photonic semiconductor companies at the EVK stage, "customer satisfaction" is equivalent to "continued
              evaluation"—partners who are satisfied with EVK performance advance to design-win discussions; those who
              are not typically exit silently. No public announcement of an EVK partner terminating evaluation has been
              made, which is consistent with continued technical progress. However, the absence of published design-win
              announcements from the EVK100 program (which entered sampling earlier than M1000) is a mild concern—EVK100
              customers who have completed evaluation and not advanced to design wins may indicate product-fit issues at
              the 3.2 Tbps tier, though this could also reflect normal qualification timelines.


              The Guide VLSP light engine, available separately from the Passage interposer, may have standalone
              customers not connected to the full CPO integration program. Lightmatter has not disclosed Guide VLSP
              customer names or unit volumes. If Guide has traction independent of Passage, it would represent a
              near-term revenue validation that strengthens the broader commercial thesis.
