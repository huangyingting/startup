      - number: '1.2'
        title: Leadership, Founders, and Governance
        blocks:
          - type: paragraph
            body: >
              Lightmatter was co-founded in 2017 by Nicholas (Nick) Harris, Darius Bunandar, Prineha Narang, and Thomas
              Graham, all of whom have roots in academic photonics and quantum computing research. Nick Harris serves as
              CEO and Co-Founder. Harris completed his PhD at MIT in photonics, where he worked on programmable photonic
              circuits and nanophotonics. His doctoral research directly informed the foundational technology at
              Lightmatter.


              The founding team possesses a strong academic pedigree: team members have published in top scientific
              journals including Nature, Science, Physical Review Letters, ISSCC, and ISCA, and have collectively
              contributed to more than 100 patents. A notable team credential cited by the company is that some team
              members contributed to black hole simulation software used in the Academy Award-winning film Interstellar,
              reflecting deep computational physics expertise.


              Lightmatter's team combines expertise across silicon photonics, high-speed SerDes design, advanced
              semiconductor packaging, AI systems architecture, and hyperscale data center infrastructure. The LinkedIn
              profile of the company reports 201–500 employees as of the data access date, with approximately 331
              employees visible on the platform. The company's leadership board and specific board members remain
              undisclosed on public channels, consistent with the private company's disclosure policy. Harris has
              represented Lightmatter publicly at OFC 2025, where he unveiled the Passage L200 3D Co-Packaged Optics and
              the Passage M1000 3D Photonic Superchip.


              Lightmatter's values emphasize speed, first-principles thinking, and impact over title. The company has
              built a culture focused on scientific rigor, cross-functional collaboration, and deliberate scaling.
              Key-person dependency on Nick Harris, as founder and CEO, is a standard risk for a pre-revenue or
              early-revenue technology startup of this stage and vintage.
