  - number: 5
    title: Product & Technology
    sections:
      - number: '5.1'
        title: Product Definition and Portfolio
        blocks:
          - type: paragraph
            body: >
              Lightmatter's product portfolio consists of two complementary systems: the Passage co-packaged optics
              (CPO) interconnect platform and the Guide VLSP (Versatile Light Source Platform) light engine. Together,
              they address the complete photonic data path from laser generation through optical routing and chip-level
              integration for AI data centers.


              The Passage platform spans three product tiers targeting different integration and performance levels. The
              Passage EVK100 (3.2 Tbps, 16λ DWDM, 112G PAM4) is the entry-tier product targeting legacy AI cluster
              configurations and initial customer integration. The Passage L200 (32–64 Tbps aggregate, 112G PAM4,
              demonstrated at OFC 2025) targets mid-tier CPO integration for current-generation GPU/NPU systems. The
              Passage M1000 EVK (114.6 Tbps bidirectional, 2.3 pJ/bit, 4,000 mm² photonic interposer, 1,024 SerDes
              lanes) is the flagship product targeting trillion-parameter AI training infrastructure—currently in
              sampling phase with early-access partners. The Guide VLSP provides 16-wavelength DWDM laser output at 100+
              mW per fiber with software-defined control, serving as the light source for Passage systems in
              configurations where the laser cannot be co-located with the compute die due to thermal constraints.


              The portfolio strategy reflects a deliberate tiering approach: EVK100 provides a near-term entry point for
              customers evaluating CPO integration; L200 addresses the current-generation bandwidth tier (400G–800G
              transition); M1000 targets the future requirement for 1T+ parameter model training that drives
              Lightmatter's differentiation thesis. This creates an adoption funnel where customers can begin with
              EVK100, qualify the technology platform, and graduate to M1000 for maximum bandwidth.
            claimRefs:
              - CE001
              - CE002
              - CE003
              - CE004
              - CE005
          - type: table
            tableRef: TE001
            claimRefs:
              - CE001
              - CE002
              - CE003
              - CE004
              - CE005
      - number: '5.2'
        title: Product Line Architecture and Positioning
        blocks:
          - type: paragraph
            body: >
              Each Passage product tier addresses a distinct integration paradigm. The EVK100 (3.2 Tbps) uses 16λ DWDM
              with 112G PAM4 SerDes, compatible with existing PCIe and CXL interconnect standards. It operates with the
              Guide VLSP as an external light source and is designed to demonstrate CPO integration without requiring a
              full chip re-architecture—enabling faster customer evaluation. The L200 (32–64 Tbps) represents the CPO
              transition point: it implements the Edgeless I/O architecture at mid-tier bandwidth, demonstrated at OFC
              2025, and is compatible with 112G PAM4 electrical interfaces. Production timeline has not been publicly
              disclosed for L200. The M1000 (114.6 Tbps) uses 3D co-packaged integration on a 4,000 mm² photonic
              interposer with 1,024 SerDes lanes, supporting 2.3 pJ/bit efficiency. Its Edgeless I/O implementation
              scales bandwidth with the full compute die area, enabling architectures that are physically impossible
              with perimeter-limited electrical SerDes.


              The Guide VLSP (light engine) deserves separate attention as a standalone product. It delivers
              16-wavelength DWDM output at 100+ mW per fiber in a software-defined, field-replaceable form factor. Guide
              is designed to work with both the Passage M1000 (providing laser input to the photonic interposer) and as
              an independent light source for other photonic integration architectures. The software-defined wavelength
              selection enables dynamic reconfiguration of the optical network without hardware changes—a differentiated
              capability for operators managing complex AI cluster topologies. Guide pricing is not publicly disclosed
              but represents an independent recurring revenue stream (replaceable consumable with a defined MTBF)
              separate from the capital-intensive interposer platform.
