              Lightmatter's Passage M1000 at 114.6 Tbps bidirectional is the highest-published bandwidth density in the
              CPO segment by a significant margin. This positions Lightmatter uniquely for 1T+ parameter model training
              requirements that drive the most aggressive hyperscaler capex programs—a tier where Ayar TeraPHY and Intel
