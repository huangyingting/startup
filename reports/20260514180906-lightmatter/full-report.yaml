      - number: '3.3'
        title: Capability Comparison
        blocks:
          - type: paragraph
            body: >
              On raw bandwidth density, Lightmatter's Passage M1000 leads all published competitors at 114.6 Tbps
              bidirectional from a 4,000 mm² photonic interposer. Ayar Labs TeraPHY exceeds 8 Tbps per engine—a
              fundamentally different architecture (chiplet-scale vs. full-interposer) that requires multiple engines to
              reach comparable aggregate bandwidth. Intel OCI chiplet is at 4 Tbps per chiplet. The bandwidth comparison
              is somewhat misleading because these systems target different integration levels: Lightmatter's interposer
              replaces the entire switch fabric, while Ayar and Intel target chip-to-chip I/O.


              On power efficiency, Lightmatter claims 2.3 pJ/bit for the M1000—among the lowest published figures. Ayar
              Labs and Intel have published comparable efficiency figures for their chiplet-scale products.
              Manufacturing maturity is where Intel leads substantially: Intel has shipped silicon photonic products at
              volume since 2016 and has qualified its process at multiple OSATs. Ayar Labs is TSMC N3-qualified but has
              not publicly announced volume production. Lightmatter has not disclosed yield data or volume production
              milestones. Customer integration—the most critical near-term competitive dimension—favors Ayar (NVIDIA
              relationship) and Intel (existing data center customer base) over Lightmatter, which has no publicly
              confirmed design wins. Standards participation across all players is converging on OIF CPO IA and UCIe,
              reducing future lock-in risk.
