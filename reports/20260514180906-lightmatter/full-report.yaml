            title: NVIDIA-Ayar Labs Relationship is the Highest Competitive Risk
            body: >-
              Ayar Labs' strategic investment from NVIDIA creates a co-design pathway that could lock Lightmatter out of
              the GPU-adjacent AI training market if TeraPHY chiplets are integrated into future NVIDIA accelerator
              packages. This scenario would reduce Lightmatter's addressable market to custom ASIC and HPC segments,
