      - number: '2.3'
        title: Buyer and User Segmentation
        blocks:
          - type: paragraph
            body: >
              Lightmatter's buyer universe is narrow and highly concentrated. Hyperscalers—Google (Alphabet), Meta,
              Microsoft (Azure), and Amazon (AWS)—represent the dominant end-user segment with approximately 58.72% of
              silicon photonics end-user demand. These organizations run proprietary AI training clusters at scale
              (10,000+ GPU/NPU pods), operate in-house silicon teams capable of co-designing CPO integration, and have
              both the budget authority and the engineering depth to qualify new interconnect architectures. The buying
              decision for CPO sits with infrastructure VPs and data center technology strategy teams, with procurement
              timelines of 18–36 months from initial evaluation to volume production.


              AI chip companies (NVIDIA, AMD, Intel) are a second buyer segment—they are simultaneously competitors
              (Intel Silicon Photonics), customers (if they integrate Lightmatter Passage into their chip packages), and
              partners. NVIDIA's investment in Ayar Labs signals it prefers supplier competition rather than
              sole-sourcing CPO. AMD and custom ASIC vendors (Gaudi, Trainium) are plausible Passage integration
              customers. The budget owner here is the platform engineering team, and deal sizes could range from
              co-design fees to volume production contracts worth $50–300M.


              HPC centers (national laboratories, universities, research consortia) represent a third segment—smaller
              budgets ($10–100M/yr networking), longer evaluation cycles, and risk aversion that limits near-term
              revenue contribution. Data center colocation operators (Equinix, Digital Realty) are a tertiary segment
              that lag hyperscalers by 3–5 years in CPO readiness. Gartner's hype cycle for AI infrastructure places CPO
              at the "Trough of Disillusionment" to "Slope of Enlightenment" transition in 2025, consistent with early
              hyperscaler evaluation but no confirmed volume production.
