      basis: >-
        Thesis and anti-thesis arguments derived from full evidence synthesis across Chapters 2-7 of this diligence
        report, cross-referenced against comparable company outcomes (Graphcore, Cerebras, Ayar Labs) and public market
        comparable multiples.
  - id: TV003
    title: Bull / base / bear scenario table
    columns:
      - Scenario
      - Assumptions
      - Valuation / Return Logic
      - Key Risks
      - Probability Signal
    rows:
      - - Bull ($8–12B exit, 2029–2031)
        - 2 hyperscaler design wins by 2027; production 2028; $300–500M rev by 2030; 10–15x multiple
        - 1.8–2.7x on $4.4B entry at $8–12B exit
        - Requires simultaneous yield, commercial, regulatory success
        - 15–25%
      - - Base ($3–5B exit, 2029–2031)
        - 1 design win by 2027; partial ramp; $100–200M rev by 2030; M&A at 15–25x on limited revenue
        - 0.7–1.1x on $4.4B entry; effectively returns capital
        - TSMC access, single customer dependency, timing risk
        - 35–45%
      - - Bear ($0.5–1.5B exit, 2027–2030)
        - No design wins by 2028; Series E down round or distressed M&A
        - 0.1–0.3x on $4.4B entry; write-down for Series D investors
        - Intel/Ayar win all programs; yield setback; regulatory blocker
        - 30–45%
      - - Upside optionality ($15–20B IPO, 2030+)
        - Multiple design wins; IPO path; $500M+ revenue; 10-year AI hardware platform
        - 3.4–4.5x on $4.4B entry
        - Requires 5-year hold; very high execution confidence required
        - 5–10%
    notes: >-
      Probability estimates are illustrative, not precise. Scenarios are not mutually exclusive. Expected value
      calculation: ~(0.20×10B + 0.40×4B + 0.38×1B + 0.07×17B) / 4.4B ≈ 1.0–1.2x entry — insufficient for a venture risk
      profile.
    claimRefs:
      - CV011
      - CV012
      - CV013
      - CV014
      - CV015
