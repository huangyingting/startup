      - number: '7.4'
        title: People, Talent, and Execution Risk
        blocks:
          - type: paragraph
            body: >
              Photonic IC design engineers are among the rarest in the semiconductor industry — globally fewer than
              5,000 engineers have the waveguide, modulator, and photonic VLSI skills required for CPO product design.
              This talent scarcity creates intense competition between Lightmatter, Intel, NVIDIA, Marvell, and
              well-funded CPO startups (Ayar Labs, Celestial AI, Ranovus) for a tiny talent pool. Loss of key photonic
              design engineers would disproportionately impact Lightmatter's product roadmap because photonic VLSI
              design tools are non-standard and institutional expertise cannot be rapidly hired from the general EE
              talent market.


              Key-person dependency is concentrated in the founding technical team. CEO Nick Harris (MIT photonics PhD)
              and co-founder Darius Bunandar designed the original Passage photonic interposer architecture; their
              departure before production ramp would leave a knowledge gap that is not addressable through conventional
              hiring. Academic analysis of deep-tech hardware startups estimates that founding-team departure before
              commercial ramp increases the probability of product failure or pivot by 40–60%.


              The execution risk at the company level is the simultaneous management of multiple high-complexity
              programs: M1000 EVK delivery to 3–5 early-access partners, EVK100 evaluation follow-up, Guide VLSP
              standalone program, Series E fundraise preparation, and regulatory compliance build-out. For a ~200-person
              startup, this execution surface is at the limit of organizational capacity. Prioritization failures —
              dedicating resources to Guide VLSP while delaying M1000 quality issues — would be the most likely
              execution failure mode.


              The board composition risk is modest but present: board member Kushagra Vaid (Microsoft) provides
              strategic access and industry credibility, but also creates a potential conflict of interest if
              Microsoft's own CPO strategy diverges from Lightmatter's roadmap. Governance alignment should be confirmed
              in diligence.
            claimRefs:
              - CR018
              - CR024
              - CR040
              - CR031
              - CR035
