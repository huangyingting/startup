  - id: TV005
    title: Thesis-break and kill triggers table
    columns:
      - Trigger
      - Threshold
      - Transmission to Thesis
      - Action Implication
    rows:
      - - No design win by Q4 2027
        - Zero named design-win announcements
        - Commercial thesis fails; base/bear case probability shifts to 60-70%
        - Re-evaluate position; request bridge terms or exit
      - - Intel/Ayar wins 2+ hyperscalers
        - Named production CPO programs at 2+ hyperscalers
        - TAM shrinks to AMD/Google/Microsoft only; revenue ceiling lowered
        - Revise bull case probability to <10%; reassess entry multiple
      - - M1000 yield failure requiring re-spin
        - Tape-out delay >6 months announced
        - Runway compressed; EVK timeline pushed 12-18 months
        - Assess burn escalation; evaluate bridge options
      - - BIS license required for hyperscaler delivery
        - 'Legal opinion: export license required for top 3 customer geographies'
        - TAM and revenue ceiling reduced; compliance cost increases
        - Revise revenue model; evaluate regulatory risk insurance
      - - Series E at below $4.4B valuation
        - Fundraise announced at <$4.4B pre-money
        - Investment marked down; preference overhang risk increases
        - Mark to new round price; review liquidation preference waterfall
      - - Nick Harris CEO departure announced
        - LinkedIn announcement or press release
        - Key-person risk triggers; investor confidence may erode
        - Request board review of succession and product roadmap
    notes: >-
      Kill criteria are binary threshold events. No single trigger automatically requires exit, but any breach triggers
      mandatory IC re-assessment.
    claimRefs:
      - CV020
      - CV021
      - CV023
    enumerationScope:
      coverage: exhaustive
      basis: >-
        Kill criteria derived from Lightmatter investment thesis analysis, kill criteria framework from Chapter 7, and
        VC-standard hardware diligence trigger frameworks from PitchBook and CBInsights comparable company analysis.
  - id: TV006
    title: Final diligence asks table
    columns:
      - Topic
      - Missing Evidence
      - Why It Matters
      - Owner / Diligence Path
    rows:
      - - M1000 Yield Data
        - Die yield data from GF qualification runs; wafer lot history; die cost model
        - Primary determinant of unit economics and commercial viability; blocking item
        - Lightmatter CEO/CTO; request NDA data room
      - - Design Win Confirmation
        - Named hyperscaler or AI chip co in active EVK-to-design-win discussion
        - Most important commercial proof-point; blocking without NDA disclosure
        - Lightmatter CEO; NDA-protected customer reference list
      - - TSMC CoWoS Supply Agreement
        - Signed or in-negotiation capacity agreement for M1000 advanced packaging
        - Without confirmed packaging, production ramp is not on schedule
        - Lightmatter supply chain team; TSMC strategic account manager
      - - BIS Export Compliance Posture
        - ECCN classification for M1000; export license requirements for key customer geographies
        - TAM and revenue ceiling depend on whether licenses are required
        - Lightmatter GC or outside export counsel; BIS legal opinion
      - - Cap Table Liquidation Waterfall
        - Series A–D preference terms; effective breakeven acquisition price
        - Determines return profile in base/bear cases; employee retention incentive
        - Lightmatter CFO; Series D term sheet review
      - - Guide VLSP Customer Traction
        - Any named customers; unit volumes; revenue from standalone light engine
        - Validates commercial execution capability before M1000 revenue
        - Lightmatter sales team; NDA customer reference check
    notes: >-
      Items 1–2 are blocking. Items 3–5 are material. Item 6 is informational. All items should be addressed before
      investment committee final approval.
    claimRefs:
      - CV022
      - CV023
      - CV024
      - CV025
    enumerationScope:
      coverage: exhaustive
      basis: >-
        Diligence asks represent the complete set of blocking and material information gaps identified across all 8
        chapters of this diligence report. Exhaustive review of public and private evidence sources confirms no other
        blocking items have been identified.
