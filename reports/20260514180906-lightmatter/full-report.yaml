      - number: '4.4'
        title: Capital Adequacy and Funding History
        blocks:
          - type: paragraph
            body: >
              Lightmatter has raised $850M in total venture and strategic capital across four rounds, confirmed by SEC
              Form D filings (CIK 0001768622). The Series D of $400M (October 2024) at a $4.4B post-money valuation is
              the most recent and largest round. Prior rounds include Series A (~$11M, 2019), Series B (~$80M, 2021),
              and Series C (~$150–200M, 2023). Key investors include GV (Google Ventures), Spark Capital, SIP Global
              Partners, Fidelity, and Temasek—a blue-chip roster with both strategic and financial alignment.


              Capital adequacy analysis: at $60–$90M/yr burn, the $400M Series D implies 4–7 years of runway (2024–2028
              to 2031 horizon), assuming no revenue contribution and no further fundraising. This is sufficient to reach
              the critical design-win and production ramp milestones if the commercial timeline stays on track. However,
              if hyperscaler qualification timelines extend beyond 2028, Lightmatter would need to raise an additional
              round—likely at a valuation that depends heavily on commercial progress. The $4.4B valuation implies a
              post-money / total-raised ratio of 5.2x, which is within the range for deep-tech hardware companies but
              high for a pre-revenue entity. Comparable hardware semiconductors at Series D (Ayar Labs, Celestial AI
              pre-acquisition) typically raise at 10–20x forward revenue multiples, which would imply Lightmatter needs
              $220–$440M in forward annual revenue to justify the current valuation—a target that requires multiple
              hyperscaler production programs.


              Board composition per SEC Form D (2024) includes: Nick Harris (CEO), Darius Bunandar (co-founder), Erik
