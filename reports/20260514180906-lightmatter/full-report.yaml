  - number: 3
    title: Competitors
    sections:
      - number: '3.1'
        title: Competitive Landscape Overview
        blocks:
          - type: paragraph
            body: >
              The co-packaged optics and photonic interconnect competitive landscape has consolidated around five
              strategic archetypes. First, incumbent volume leaders: Intel Silicon Photonics is the only player with
              meaningful manufacturing scale (>8M PICs shipped, >32M on-chip lasers), established OSAT relationships,
              and a validated supply chain for data center optical components. Intel's competitive advantage is
              manufacturing maturity, not bandwidth density—its OCI chiplet delivers 4 Tbps at OFC 2025, well below
              Lightmatter's M1000 at 114.6 Tbps. Second, direct CPO challengers: Ayar Labs (founded 2015, MIT spinout,
              ~$200M raised) competes head-on with the TeraPHY chiplet exceeding 8 Tbps per engine, co-packaged with
              TSMC N3, and backed by NVIDIA. Ranovus (Ottawa, Canada) offers 12.8 Tb/s XPU CPO using quantum dot lasers.
              Third, hyperscaler-backed consolidators: Marvell acquired Celestial AI in 2025 (est. $1–2B), adding
              Photonic Fabric optical disaggregation technology to a portfolio that already ships to every major
              hyperscaler. Fourth, electrical switching incumbents: Broadcom's Tomahawk 5 (51.2 Tbps) remains the
              dominant switching fabric with proven supply, though it cannot match CPO efficiency at 800G+. Fifth,
              internal hyperscaler development: Google, Microsoft, and Meta each have internal photonic interconnect
              research programs that could disintermediate CPO vendors if successful.
            claimRefs:
              - CP001
              - CP002
              - CP003
              - CP004
              - CP005
          - type: table
            tableRef: TP001
            claimRefs:
