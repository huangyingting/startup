      - number: '1.3'
        title: Funding History, Valuation, and Investors
        blocks:
          - type: paragraph
            body: >
              Lightmatter has raised a total of $850M in equity financing across multiple rounds, reaching a post-money
              valuation of $4.4 billion in October 2024. The most recent and largest financing event was a $400M Series
              D round, completed in October 2024. This round represents a significant step-up from prior rounds and
              reflects strong investor conviction in the silicon photonics category as a critical enabling layer for
              frontier AI infrastructure.


              The company's website explicitly acknowledges a total funding of $850M and a valuation of $4.4B as of
              October 2024. These figures align with multiple third-party reports and corroborate the trajectory of
              fundraising across earlier seed, Series A, Series B, and Series C stages. Lightmatter's earlier rounds
              included a Series C completed in 2022–2023 and a Series A/B in 2019–2021. Specific earlier round
              valuations and investor names are not fully confirmed via public filings or regulatory disclosures given
              Lightmatter's private status.


              Key investors across Lightmatter's financing history are reported to include GV (formerly Google
              Ventures), Spark Capital, SIP Global Partners, Fidelity Investments, and Temasek Holdings among others,
              though the full cap table is not publicly disclosed. These investor names have been associated with the
              company in various published reports. Lightmatter has not raised public market capital and remains a
              privately held corporation (Lightmatter, Inc.) incorporated in Delaware.


              The Series D valuation of $4.4B positions Lightmatter as one of the most highly valued silicon photonics
              startups in the world at this stage, reflecting both the company's technology differentiation and the
              intense investor interest in AI infrastructure plays. The company's total capital raised of $850M provides
              a substantial runway to fund manufacturing scale-up, product development, and commercial expansion ahead
              of a potential IPO or acquisition.
