            title: Marvell/Celestial AI Adds Distribution Leverage Lightmatter Lacks
            body: >-
              Marvell's acquisition of Celestial AI (est. $1–2B) combines Photonic Fabric CPO technology with Marvell's
              established hyperscaler distribution and silicon networking relationships. This creates a competitive
              threat that is harder to counter than pure technical competition: Marvell can bundle CPO into existing
