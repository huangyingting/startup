  - number: 4
    title: Financials
    sections:
      - number: '4.1'
        title: Revenue Streams and Business Model
        blocks:
          - type: paragraph
            body: >
              Lightmatter has no publicly disclosed revenue as of May 2026. The company's potential revenue streams fall
              into three sequential categories. First, engineering and evaluation revenue: EVK (Engineering Validation
              Kit) fees from early-access programs at hyperscalers and AI chip companies. The Passage M1000 EVK is
              currently in sampling phase, and early-access program fees typically range from $500K–$5M per engagement
              for semiconductor companies at this stage. These represent short-duration, non-recurring revenues that
              validate commercial traction but do not establish a sustainable business model. Second, production module
              sales: once the M1000 exits EVK phase and achieves yield milestones, Passage interposer module revenue
              would follow from production contracts. A typical hyperscaler program at 1,000–10,000 units per year at
              $10,000–$50,000 per unit would yield $10–$500M/yr in production revenue. Third, IP licensing:
              Lightmatter's 100+ patent portfolio creates the potential for licensing fees or cross-licensing
              arrangements, particularly if OIF CPO standardization creates a pool of essential patents. However, IP
              licensing revenue is unlikely to be material before 2027–2028 and is not part of the near-term financial
              plan. All three streams are speculative at this stage; the company's 2025–2026 financials are entirely
              driven by investor capital, not customer revenue.
            claimRefs:
              - CI001
              - CI002
              - CI003
              - CI004
