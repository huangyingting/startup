              - CM009
      - number: '2.2'
        title: 'Market Sizing: TAM, SAM, and SOM'
        blocks:
          - type: paragraph
            body: >
              The silicon photonics TAM is anchored by two leading analyst estimates. MarketsandMarkets sizes the global
              silicon photonics market at $2.65B in 2025, projecting growth to $9.65B by 2030 at a CAGR of 29.5%—the
              most widely cited figure in investor materials. Mordor Intelligence offers a slightly larger base of
              $2.83B in 2025, reaching $13.18B by 2031 at 27.19% CAGR. Grand View Research provides a mid-range estimate
              of approximately $2.4–2.7B for 2025. The dispersion across analyst estimates ($2.65B–$2.83B base;
              $9.65B–$13.18B by 2030–31) reflects methodological differences in what counts as "silicon photonics"
              revenue versus adjacent optical transport and packaging spend.


              Lightmatter's serviceable addressable market (SAM) is the CPO sub-segment. IDC and HPCwire estimates
              suggest CPO will represent 15–25% of the silicon photonics market by 2027, implying a 2025 SAM of
              approximately $400–$660M growing to $1.5–$2.4B by 2030. MarketsandMarkets publishes a separate co-packaged
              optics market report projecting strong double-digit growth from 2025. Lightmatter's serviceable obtainable
              market (SOM) in a 3-year horizon (2026–2028) is estimated at $50–$200M assuming 2–5 hyperscaler or AI chip
              co programs at $20–$50M NRE and early production contract value. No public revenue has been disclosed,
              making SOM estimation speculative and dependent entirely on commercial announcements.


              The AI-driven datacenter capex surge provides macro support: Google, Meta, Microsoft, and Amazon have
              collectively committed over $200B in AI infrastructure capital expenditure for 2024 alone, and Statista
              tracks global AI data center capex at $250B+ through 2027. IDC forecasts the AI server market reaching
              $150B by 2027, with networking infrastructure representing 12–15% of total capex—implying $18–22B in
              networking spend by 2027, of which CPO could capture a meaningful share if adoption accelerates.
            claimRefs:
