      - number: '1.4'
        title: Key Milestones
        blocks:
          - type: paragraph
            body: >
              Lightmatter's trajectory from a 2017 MIT spinout to a $4.4B photonic computing company represents a decade
              of compounding technical and commercial achievements. The company's founding team recognized early that
              electrical interconnects would become the binding constraint on AI scaling, and built their research
              roadmap accordingly. Initial product work focused on photonic integrated circuits and optical computing
              primitives, before the company pivoted to the more immediate opportunity in photonic interconnects for AI
              data centers.


              The company achieved multiple technical milestones in product development between 2019 and 2024, including
              the development of the Passage platform and the Guide VLSP light engine. The Passage M1000 3D Photonic
              Superchip was demonstrated publicly at Supercomputing 2025 and OFC 2025, representing the world's first
              photonic interposer for 3D chip stacking. A landmark publication in October 2024 on arXiv (paper
              2510.15893, to be published in Hot Interconnects 2025) demonstrated that 3D CPO (Passage-enabled) GPUs and
              switches result in a 2.7× reduction in time-to-train and unlock 8× scale-up capability for frontier AI
              models exceeding one trillion parameters.


              The company has assembled a strong ecosystem of manufacturing partners including TSMC, GlobalFoundries,
              Tower Semiconductor, Amkor, and ASE—giving it access to the highest-volume semiconductor fabs and OSAT
              providers. Lightmatter is also active in key industry standards bodies: OIF, IEEE, Advanced Photonics
              Coalition, UALink, Ultra Ethernet, OCP, Jedec, and UCIe Consortium. This standards engagement positions
              the company to influence next-generation photonic interconnect standards and improve interoperability with
              AI chip vendors.
