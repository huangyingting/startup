      - number: '8.3'
        title: 'Scenario Analysis: Bull, Base, and Bear Cases'
        blocks:
          - type: paragraph
            body: >
              The three scenarios span a wide outcome range reflecting the binary nature of deep-tech hardware
              commercial adoption. The bull case requires two hyperscaler design wins announced by 2027, production ramp
              beginning 2028, and $300–500M revenue by 2030. In this scenario, Lightmatter achieves a valuation of
              $8–12B at IPO or acquisition, representing 1.8–2.7x return on $4.4B entry. This requires simultaneous
              resolution of yield, commercial, and capital risks — achievable but historically uncommon for pre-revenue
              hardware companies.


              The base case assumes one hyperscaler design win in 2027, limited production ramp in 2028–2029 with
              $100–200M revenue by 2030, followed by a strategic acquisition or IPO at $3–5B. This represents 0.7–1.1x
              return at entry — effectively return of capital or a modest loss. The base case is the most likely single
              scenario (35–45% probability) but is a poor investment outcome at the $4.4B entry price.


              The bear case assumes no design wins through 2028, requiring either a distressed Series E at a down
              valuation ($1–2B) or an M&A exit to a hyperscaler or strategic buyer at $0.5–1.5B. This represents a
              0.1–0.3x return — a write-down for Series D investors. Given the competitive dynamics (Ayar Labs for
              NVIDIA, Intel's incumbency) and the historically high failure rate of pre-revenue deep-tech hardware
              companies at $4B+ valuations (Cerebras, Graphcore, SambaNova), the bear case probability is estimated at
              40–55%.


              The asymmetric risk/return profile at $4.4B entry is unfavorable under this scenario analysis: the
              expected value of the investment is approximately 0.85–1.1x return at entry, which does not compensate for
              the illiquidity risk, technology risk, and time-to-exit of a 5–8 year hold.
            claimRefs:
              - CV011
              - CV012
              - CV013
              - CV014
              - CV015
          - type: table
            tableRef: TV003
            claimRefs:
              - CV011
              - CV012
              - CV013
              - CV014
              - CV015
          - type: figure
