  - number: 7
    title: Risks
    sections:
      - number: '7.1'
        title: Regulatory, Legal, and IP Risk
        blocks:
          - type: paragraph
            body: >
              Lightmatter's regulatory risk profile is material and underappreciated. The Bureau of Industry and
              Security (BIS) has expanded Export Administration Regulations (EAR) to cover enabling technologies for AI
              training compute, including high-bandwidth interconnects. The Passage M1000 — an interconnect enabling
              114.6 Tbps for AI training clusters — falls within the scope of regulations that have been progressively
              expanding since October 2022. The BIS October 2023 rule covers interconnect components enabling aggregate
              bandwidth thresholds associated with controlled systems; the October 2024 rule extends coverage further.
              Lightmatter has not disclosed its export compliance posture or whether it has obtained legal opinions on
              EAR applicability to the M1000.


              The CHIPS Act (Section 103) imposes national security guardrails on GlobalFoundries as a CHIPS Act
              recipient. GF is prohibited from expanding semiconductor manufacturing in covered foreign countries and
              from engaging in joint research with covered entities. Lightmatter's supply chain must ensure its use of
              GF manufacturing does not conflict with GF's CHIPS Act compliance obligations — a supply chain
              entanglement risk that is partially outside Lightmatter's direct control.


              The intellectual property risk operates in both directions. Intel holds 400+ silicon photonics patents.
              The silicon photonics CPO space has over 2,000 active patents from Intel, TSMC, Marvell, and IBM.
              Lightmatter has not disclosed any IP disputes, but the high patent density requires ongoing
              freedom-to-operate (FTO) analysis before high-volume production delivery. Any undisclosed prior-art
              conflicts discovered after hyperscaler design-win commitments would be severely damaging commercially.


              Congressional legislative activity has been consistently expansive on AI semiconductor controls through
              NDAA FY2025 and proposed AI Chip Control Acts. The regulatory environment for Lightmatter's product is
              expected to tighten further, not ease, over the next 2–3 years.
            claimRefs:
              - CR011
              - CR012
              - CR013
              - CR014
              - CR015
