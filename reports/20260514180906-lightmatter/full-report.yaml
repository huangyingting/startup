      - number: '7.3'
        title: Partner and Dependency Risk
        blocks:
          - type: paragraph
            body: >
              Lightmatter's commercial and technical success depends on a concentrated set of external partners and
              dependencies that individually and collectively create material risk. The fab dependency is the most
              acute: GlobalFoundries is the sole photonic interposer foundry, and TSMC is effectively the only provider
              of CoWoS-L advanced packaging at the required scale. A capacity constraint, process yield issue, or
              geopolitical disruption at either fab would halt the M1000 program.


              The hyperscaler evaluation partner dependency is the commercial equivalent of the fab dependency.
              Lightmatter must win at least one hyperscaler or AI chip co design-win within the 24–42 month runway from
              the Series D. The top 5 potential customers (4 hyperscalers + NVIDIA) represent essentially all near-term
              revenue. NVIDIA has already committed its CPO strategy to Ayar Labs, leaving Lightmatter dependent on
              Google, Meta, Microsoft, Amazon, AMD, or a custom AI chip vendor making an affirmative choice for the
              M1000.


              The standards body dependency (OIF, IEEE 802.3) is lower risk but relevant: the OIF Common Electrical I/O
              and CPO standards are the basis for hyperscaler evaluation frameworks. If the CPO standards evolve toward
              architectures that favor co-integrated photonics (Ayar Labs TeraPHY) over co-packaged interposers
              (Lightmatter Passage), Lightmatter would need to pivot its technical approach.


              The Taiwan geopolitical dependency is a tail risk with non-trivial probability over a 5-year horizon: a
              Taiwan Strait crisis would simultaneously disrupt TSMC's CoWoS packaging and potentially trigger
              U.S.-Taiwan technology collaboration reviews, compounding fab and packaging disruption into an existential
              supply chain event.
            claimRefs:
              - CR003
              - CR004
              - CR006
              - CR007
              - CR028
