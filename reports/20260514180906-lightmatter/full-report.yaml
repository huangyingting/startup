      - number: '8.4'
        title: Recommendation and Decision Framework
        blocks:
          - type: paragraph
            body: >
              Recommendation: **Track / Conditional Pass**


              Lightmatter is a world-class team executing on a genuinely important technology at the frontier of silicon
              photonics. The addressable market is large, the technology differentiation is measurable, and the investor
              syndicate is high-quality. At a price that reflected the commercial stage — a $1.5–2.5B valuation
              appropriate for a pre-revenue photonic semiconductor company with EVK-stage traction — this would be a
              compelling investment.


              At $4.4B pre-money pre-revenue, the investment requires three conditions to be met before commitment: (1)
              NDA-protected confirmation of at least one active EVK-to-design-win conversion discussion at a named
              hyperscaler or AI chip co; (2) yield data on the M1000 photonic interposer showing commercially viable
              unit economics at projected production volumes; (3) confirmation that the BIS export control exposure is
              manageable with standard compliance build-out and does not require export licenses for U.S. hyperscaler
              deployments with international data centers. If all three conditions are met, the bull-case probability
              increases to 35–45% from the current 15–25%, and the expected value of the investment improves to
              approximately 1.4–1.8x — marginally acceptable for a venture-stage position given the transformative
              upside optionality.


              The thesis-break monitoring framework should track the seven kill criteria defined in Chapter 7. The most
              critical near-term signal is any design-win announcement before Q4 2027 — which would be the single most
              important positive event for the investment thesis. Conversely, an Intel or Ayar Labs production CPO
              announcement at two or more hyperscalers would be the single most important negative event, effectively
              eliminating the majority of the addressable TAM.


              The final diligence asks are prioritized: yield data (most important, blocking), active design-win
              discussion confirmation (most important, blocking), TSMC CoWoS supply agreement confirmation (material,
              required), and export compliance posture (material, required). Without these four items, the $4.4B price
              cannot be justified on available public evidence.
            claimRefs:
              - CV016
              - CV017
              - CV018
              - CV019
              - CV020
          - type: table
            tableRef: TV001
            claimRefs:
              - CV016
              - CV017
