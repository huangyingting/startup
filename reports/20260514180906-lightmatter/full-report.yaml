              navigate.
            calloutType: risk
            claimRefs:
              - CP003
              - CP008
              - CP021
              - CP023
          - type: callout
            title: Manufacturing Maturity Gap is the Decisive Near-Term Competitive Factor
            body: >-
              All of Lightmatter's technical differentiation is nullified if manufacturing at production yields cannot
              be achieved. Intel's 8M+ PIC shipment track record represents 10 years of process development that
              Lightmatter must compress into 2–3 years to remain competitive on the commercialization timeline. The
              decisive question is not whether Lightmatter's technology is superior—it is—but whether the company can
              translate that superiority into production-validated, customer-qualified volume within the CPO adoption
              window.
