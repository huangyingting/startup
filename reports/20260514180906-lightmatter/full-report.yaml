      - - 'Bull: Team quality and MIT pedigree support execution confidence'
        - Strong founding team; repeat institutional investors
        - Key founder departure before production ramp
      - - 'Bear: $4.4B pre-revenue requires bull case to generate positive returns'
        - Base case returns ~capital; bear case is write-down
        - Named hyperscaler design win announced with production timeline
      - - 'Bear: No named customers at this valuation is an unusual adverse signal'
        - No named EVK partners; no design win press releases
        - Lightmatter names 1+ customer or discloses program scale
      - - 'Bear: Intel incumbency and Ayar Labs NVIDIA backing creates structural disadvantage'
        - Intel 20+ years of fab relationships; Ayar backed by NVIDIA
        - Intel exits CPO market or NVIDIA abandons Ayar Labs
      - - 'Bear: Yield risk on 4,000mm² die may make unit economics unviable'
        - No yield data disclosed; Poisson model = 10-30%
        - Independent yield data confirms >30% commercial yield
    notes: >-
      Both thesis and anti-thesis are evidence-supported. The swing factors that separate them (yield data, design win,
      competitor outcomes) are knowable through diligence.
    claimRefs:
