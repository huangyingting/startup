      - number: '7.5'
        title: Mitigation Maturity and Kill Criteria
        blocks:
          - type: paragraph
            body: >
              Risk mitigation at Lightmatter is at varying stages of maturity. The technology execution risks have the
              most advanced mitigation: the Guide VLSP standalone product provides optical subsystem learning that
              de-risks M1000 light engine integration; the Edgeless I/O architecture distributes bandwidth across many
              die-to-die optical channels, potentially tolerating individual channel yield defects better than a
              monolithic optical design. The regulatory risk mitigation is least developed: no export compliance posture
              has been publicly disclosed, and a 200-person startup has limited capacity to build the legal and
              compliance infrastructure required for BIS-compliant export controls across potentially dozens of
              hyperscaler and international customer evaluations.


              The kill criteria framework for the investment thesis is clear. Five binary trigger events would indicate
              thesis failure requiring either portfolio write-down or restructuring: (1) No M1000 design-win
              announcement by Q4 2027; (2) Intel or Ayar Labs announces production CPO supply at two or more
              hyperscalers; (3) Lightmatter reports a major yield failure requiring M1000 re-spin at GlobalFoundries,
              extending EVK timelines by 6+ months; (4) BIS enforcement action or legal opinion finding that M1000
              requires export licenses for U.S. hyperscaler customers with non-U.S. data centers; (5) A Series E down
              round at below $4.4B valuation without a concurrent design-win announcement.


              Monitoring signals should be established: hyperscaler CPO vendor announcement tracking; BIS Federal
              Register monitoring for rule expansions; GlobalFoundries 300mm photonics yield publication tracking; TSMC
              CoWoS capacity utilization reporting; and Lightmatter headcount/job posting monitoring as a leading
              indicator of program status and financial health.
            claimRefs:
              - CR022
              - CR023
              - CR025
              - CR029
              - CR034
              - CR039
