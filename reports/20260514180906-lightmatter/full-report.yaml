      - number: '3.2'
        title: Competitor Profiles
        blocks:
          - type: paragraph
            body: >
              Ayar Labs is Lightmatter's closest direct competitor. Founded in 2015 as an MIT spinout, Ayar has raised
              approximately $200 million, with NVIDIA as a strategic investor—a critical differentiator that provides
              both capital and a clear customer validation signal. Ayar's TeraPHY chiplet delivers 8+ Tbps per light
              engine using an in-package optical I/O architecture co-designed with TSMC N3 advanced node. The SuperNova
              external light source decouples laser management from the compute die, enabling thermal isolation. Ayar's
              NVIDIA backing creates a defensible position in the GPU-centric AI training market, but also concentrates
              risk on a single hyperscaler-adjacent customer. Intel Silicon Photonics benefits from a decade of
              manufacturing investment, established foundry capacity, and distribution through Intel's data center
              business unit. The OCI chiplet at OFC 2025 demonstrates Intel's CPO commitment, but the 4 Tbps
              specification leaves Lightmatter's M1000 in a different tier. Intel's scale is its moat; its limitation is
              the bandwidth density gap.


              Marvell's acquisition of Celestial AI brings Photonic Fabric—an optical disaggregation architecture for
              LLM training—into a company with established hyperscaler relationships and a $25B+ market cap. The
              combined entity is a serious long-term threat because Marvell can cross-sell CPO into its existing
              networking silicon relationships. Ranovus differentiates through quantum dot laser technology (lower
              power, higher temperature tolerance) and targets XPU interconnect at 12.8 Tb/s, with less U.S. ecosystem
              advantage given its Ottawa base. Broadcom, while not a CPO vendor, represents an indirect competitive
              threat: every quarter that Tomahawk 5 meets hyperscaler needs with electrical interconnects is a quarter
              that CPO adoption defers.
            claimRefs:
              - CP006
              - CP007
              - CP008
              - CP009
