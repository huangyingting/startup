      - number: '6.3'
        title: Named Customer Proof and Commercial Validation
        blocks:
          - type: paragraph
            body: >
              The most significant finding in this chapter is the complete absence of named customer proof-points for
              Lightmatter's CPO products. As of May 2026, no hyperscaler, AI chip company, or HPC center has been
              publicly named as a Lightmatter customer or design-win partner. The company's website references "early
              access partners" but does not name them. Press coverage of the Series D round (Wall Street Journal,
              Fortune, BusinessWire) does not include any customer quotes or named design-win announcements.


              This is an unusual level of non-disclosure for a company at the $4.4B valuation stage. Comparable
              deep-tech hardware companies at similar valuations (Ayar Labs, Graphcore, Cerebras) have at least
              disclosed customer categories even if not individual names. The absence may reflect genuine NDAs with
              hyperscaler partners who require confidentiality during the evaluation phase—which would be standard
              practice. Alternatively, it may reflect that no binding customer commitments yet exist beyond informal
              LOI-stage discussions.


              The customer-proof gap is the primary adverse finding for Lightmatter's investment case at $4.4B. Without
              named customers, the valuation rests entirely on technology milestones and team quality—both genuinely
              impressive, but insufficient alone to justify a $4.4B pre-revenue valuation in a capital-intensive
              hardware category where Intel, Ayar Labs, and Marvell are all competing for the same design wins. The
              diligence ask is clear: request NDA-protected customer reference list, preliminary LOIs, and EVK program
              participation terms before committing capital.
