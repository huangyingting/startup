      - number: '3.5'
        title: Moat Durability and Commoditization Risk
        blocks:
          - type: paragraph
            body: >
              Lightmatter's competitive moat rests on three pillars: (1) the Edgeless I/O architecture protected by 100+
              patents, providing bandwidth-density leadership that competitors have not replicated in published
              products; (2) the 3D photonic interposer integration approach validated at 114.6 Tbps—a technical
              achievement that requires years of engineering depth to reproduce; and (3) a world-class founding team
              from MIT with deep photonics expertise and the ability to attract top talent. These are real and
              defensible advantages in the near term (2025–2028).


              However, commoditization risks are real. Silicon photonics is fundamentally a semiconductor manufacturing
              play over a 5–10 year horizon, and at sufficient scale, foundries (TSMC, GlobalFoundries, Samsung) can
              offer photonics-on-silicon processes to any well-funded chip designer. Intel has already demonstrated this
              at volume. Marvell's acquisition of Celestial AI shows that the CPO architecture space is compressing. If
              hyperscalers standardize on OIF CPO interfaces, interoperability requirements could reduce the value of
              proprietary architectures. The 10+ year development horizon for alternative computing (quantum,
              neuromorphic) represents a long-term but not near-term disruption risk. Near-term, the most credible moat
              erosion scenario is a NVIDIA-Ayar Labs deepened partnership that forecloses the GPU-adjacent market,
              forcing Lightmatter to compete only in custom ASIC and HPC segments.
            claimRefs:
              - CP024
              - CP025
              - CP026
              - CP027
              - CP028
              - CP029
              - CP030
      - number: '3.6'
        title: Exhibits
        blocks:
