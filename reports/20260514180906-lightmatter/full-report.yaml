  - number: 2
    title: Market Analysis
    sections:
      - number: '2.1'
        title: Market Boundaries and Definitions
        blocks:
          - type: paragraph
            body: >
              The market Lightmatter addresses sits at the intersection of silicon photonics, co-packaged optics (CPO),
              and AI data center networking. Silicon photonics is the broadest market boundary: semiconductor devices
              that use silicon-based photonic components for optical transmission, including transceivers,
              wavelength-division multiplexing (WDM) engines, switch fabrics, and interconnect substrates. Lightmatter
              specifically targets the CPO sub-segment—photonic components physically integrated with or in close
              proximity to compute dies (GPUs, NPUs, XPUs) to eliminate the bandwidth bottleneck at the chip perimeter.


              Included in the addressable market: co-packaged optical switch/NIC solutions, photonic interposers for
              multi-chip modules, light engines and DWDM laser sources for AI clusters, and advanced packaging solutions
              that co-locate photonic and electronic dies. Excluded from Lightmatter's primary market: standalone
              pluggable transceivers (SFP/QSFP form factors), long-haul coherent dense WDM transport, legacy passive
              optical networks (PON), and consumer/mobile silicon photonics components. These excluded segments
              represent over 60% of the total silicon photonics TAM by revenue but are served by an entirely different
              supply chain and customer base.


              Status-quo substitutes that Lightmatter must displace include: (1) pluggable 400G/800G/1.6T transceiver
              modules (dominant today, with vendors including Coherent, II-VI, Lumentum); (2) copper DAC and AOC cables
              for in-rack interconnects; and (3) conventional electrical switch ASICs (Broadcom Tomahawk 5, Marvell
              Teralynx) with pluggable breakout. The adjacent opportunity includes HPC interconnects (InfiniBand,
              Ethernet), which are adjacent but require different product configurations.
            claimRefs:
              - CM001
              - CM002
              - CM009
              - CM019
          - type: table
            tableRef: TM001
            claimRefs:
