      - number: '5.3'
        title: 'Technology Architecture: Edgeless I/O and 3D Photonic Integration'
        blocks:
          - type: paragraph
            body: >
              Lightmatter's core architectural innovation is Edgeless I/O: the principle that optical I/O bandwidth can
              scale with die area rather than perimeter. In conventional semiconductor packaging, SerDes lanes are
              placed at the die perimeter, limiting total I/O bandwidth to a fixed function of die circumference. A 10mm
              × 10mm die with 112G PAM4 SerDes can have at most ~500 lanes at perimeter—50 Tbps aggregate—regardless of
              how powerful the internal compute logic is. Edgeless I/O breaks this constraint by routing optical I/O
              through the full photonic interposer area, enabling 114.6 Tbps from the M1000's 4,000 mm² area while
              leaving the compute die perimeter free for other I/O.


              The 3D integration approach stacks the compute die (GPU/NPU) on top of or adjacent to the photonic
              interposer using TSMC advanced packaging (CoWoS-L or SoIC). This eliminates the PCB trace that
              traditionally connects an ASIC to a pluggable transceiver module, reducing optical path loss and
              electrical-to-optical conversion energy. The arXiv paper (2510.15893) validates this approach by
              demonstrating 2.7× training speedup and 8× scale-up for trillion-parameter MoE models—a result that would
              be impossible with conventional electrical SerDes due to the aggregate bandwidth and power constraints.
              TSMC's CoWoS-L platform (used for NVIDIA H100/H200 HBM integration) is the same advanced packaging process
              Lightmatter leverages, providing supply chain validation that the process exists and scales.
              GlobalFoundries' 300mm silicon photonics foundry provides the photonic integrated circuit (PIC) wafer
              fabrication, with GlobalFoundries being one of two volume silicon photonics foundries globally (alongside
              Intel).


              The Guide VLSP uses a quantum cascade or VCSEL array design (not publicly disclosed) delivering 16
              wavelength channels across the C-band or O-band DWDM spectrum, with software-defined wavelength switching.
              The software-defined architecture enables the data center operator to repurpose optical paths dynamically
              without rewiring the fiber plant—a material operational advantage for hyperscalers managing petabyte-scale
              training jobs.
