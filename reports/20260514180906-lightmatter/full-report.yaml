  - number: 6
    title: Customers
    sections:
      - number: '6.1'
        title: Customer Segments and Target Universe
        blocks:
          - type: paragraph
            body: >
              Lightmatter's addressable customer universe is defined by a small number of organizations with both the
              technical capability and budget authority to integrate co-packaged optics into AI infrastructure. The
              primary segment is hyperscalers: Google (Alphabet), Meta, Microsoft (Azure), and Amazon (AWS) collectively
              account for approximately 58.72% of silicon photonics end-user demand and operate the large-scale AI
              training clusters (10,000+ GPU pods) where Passage M1000's bandwidth advantage is most relevant. These
              organizations each have dedicated silicon and photonics teams, run multi-billion-dollar infrastructure
              procurement programs, and have the engineering depth to co-design custom silicon with Lightmatter's
              photonic interposer. Budget authority rests with infrastructure VPs and data center technology strategy
              teams, with procurement timelines of 18–36 months.


              The secondary segment is AI chip companies: NVIDIA, AMD, Intel, and custom ASIC vendors (Google TPU team,
              Amazon Trainium, Microsoft Maia). These organizations are simultaneously customers (if they integrate
              Passage into their chip packages), competitors (Intel Silicon Photonics), and strategic partners. NVIDIA's
              investment in Ayar Labs complicates the relationship but does not eliminate Lightmatter's opportunity with
              AMD, custom ASIC customers, or with NVIDIA itself if competitive dynamics shift. HPC national laboratories
              (Argonne, Oak Ridge, LLNL) represent a tertiary customer segment with smaller budgets ($10–100M/yr) and
              longer evaluation cycles but potentially faster first-mover adoption given their mandate to push
              technology boundaries.


              The defining characteristic of Lightmatter's customer universe is its extreme concentration. The top 5
              potential customers (4 hyperscalers + NVIDIA) represent the overwhelming majority of near-term commercial
              opportunity. Winning 1–2 of these programs represents success; losing all of them to Ayar Labs or Intel
              would represent failure. This binary concentration creates both extreme upside and extreme downside for
              the investment thesis.
