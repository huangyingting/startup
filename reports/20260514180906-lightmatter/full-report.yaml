      - number: '4.5'
        title: Public Financial Gaps and Adverse Findings
        blocks:
          - type: paragraph
            body: >
              The financial diligence on Lightmatter is materially constrained by the absence of public financial
              disclosures. As a Delaware C-corporation with no public debt or equity securities, Lightmatter is not
              required to file financial statements with the SEC—only Form D exempt offering notices. The following
              critical gaps prevent full financial underwriting. First, revenue: zero publicly disclosed revenue. No
              press releases reference ARR, contract value, or booking activity. Second, gross margin: no public data on
              photonic interposer production yield or unit economics. Third, burn rate: estimated only from headcount
              and industry benchmarks—not from published financials. Fourth, capital efficiency: the $850M capital
              raised compares unfavorably to companies like Arm (profitable pre-IPO) or NVIDIA (revenue-generating from
              much earlier), suggesting Lightmatter is on a longer, more capital-intensive path. Fifth, customer
              concentration: even if named customers eventually emerge, concentration in 1–3 hyperscaler programs at
              early production would create significant revenue risk. The adverse view is that Lightmatter's burn of
              $60–$90M/yr against $0 in revenue at $4.4B valuation represents an unfavorable capital efficiency ratio
