            title: 4,000 mm² Interposer Yield Is the Critical Unvalidated Risk
            body: >-
              The M1000's 4,000 mm² photonic interposer is the largest complex photonic die structure among published
              CPO products. Yield falls exponentially with die area—a 4,000 mm² die at typical silicon photonics defect
              densities (0.1–0.3 defects/cm²) would yield 25–60% at best. Lightmatter has not published yield data, and
              the production economics at 50% yield would require a much higher sell price than initial estimates
              suggest.
