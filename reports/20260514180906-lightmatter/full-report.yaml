      - number: '6.2'
        title: Adoption Trajectory and Commercial Progress
        blocks:
          - type: paragraph
            body: >
              Lightmatter's commercial progress is entirely at the early-access stage. The Passage M1000 EVK sampling
              program, announced in Q4 2025, represents the first commercial customer engagement milestone. The
              company's website references an "early access program" for qualified AI infrastructure partners, but no
              partner names, program scope, or commercial commitments have been publicly disclosed. This is the standard
              early-commercialization approach for complex semiconductor products: sample to 2–5 qualified partners,
              collect integration feedback, validate technical performance, and convert to design-win commitments. The
              challenge is that at a $4.4B valuation, investors expect more commercial validation than the EVK stage
              typically provides.


              The adoption trajectory for CPO at hyperscalers follows a well-established semiconductor qualification
              cadence. Stage 1 (EVK evaluation, 2025–2026): partner receives EVK, conducts lab integration testing,
              validates optical performance against spec. Stage 2 (System validation, 2026–2027): EVK demonstrated in a
              functional AI cluster configuration; performance benchmarks compared against pluggable alternatives. Stage
              3 (Design win, 2026–2027): hyperscaler commits to joint tape-out; NRE contract signed; co-designed ASIC
              enters development. Stage 4 (Pilot production, 2027–2028): 100–1,000 units produced, customer acceptance
              testing. Stage 5 (Volume production, 2028+): production supply agreement at scale. Lightmatter is
              currently in Stage 1 for M1000, and Stage 2–3 for EVK100. The gap between the current stage and
              revenue-generating Stage 4/5 is approximately 2–3 years—a timeline that must align with the $4.4B
              valuation support horizon.


              No hyperscaler has publicly confirmed a CPO evaluation program with Lightmatter. Comparable CPO vendors
              (Ayar Labs, Intel) have similarly not announced named customer production programs. The sector-wide
              pattern of non-disclosure at this stage is normal, but the total absence of even unnamed customer
              acknowledgments at Lightmatter is notable given the EVK sampling announcement.
