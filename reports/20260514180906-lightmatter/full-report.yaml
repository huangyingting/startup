companyProfile:
  summary: >
    Lightmatter, Inc. is a Mountain View, CA-based photonic computing company founded in 2017 by MIT photonics
    researchers. The company designs silicon photonic interconnects and co-packaged optics (CPO) solutions targeting the
    exascale AI data center market. Its core products—the Passage interconnect platform and Guide light engine—aim to
    eliminate the electrical interconnect bandwidth bottleneck that constrains next-generation AI training clusters.
    Lightmatter raised $400M in its October 2024 Series D at a $4.4B pre-money valuation, bringing total capital raised
    to $850M. As of May 2026 the company is pre-revenue with no named production customers, having announced the Passage
    M1000 3D Photonic Superchip in early 2025 and targeting its first customer design wins.
