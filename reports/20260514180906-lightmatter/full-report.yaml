      - number: '3.4'
        title: Switching Costs and Lock-In Dynamics
        blocks:
          - type: paragraph
            body: >
              Co-packaged optics creates substantial switching costs once a hyperscaler commits to an integration
              architecture. The photonic interposer must be co-designed with the compute die, requiring joint tape-out
              decisions that effectively lock in the CPO vendor for 2–3 chip generations. This creates a strong
              first-mover advantage for whichever vendor wins the initial hyperscaler design wins—and a critical
              vulnerability for any vendor that loses the first competitive evaluation. Ayar Labs' NVIDIA relationship
              gives it a structural advantage in the GPU-adjacent market: if Ayar's TeraPHY chiplet is integrated into
              NVIDIA's next-generation AI accelerator package, competing CPO vendors face a multi-year exclusion from
              NVIDIA's design wins.


              Lightmatter's Edgeless I/O architecture creates a unique lock-in dynamic: because bandwidth scales with
              die area rather than perimeter, the interposer is both more differentiated and harder to swap. Once a
              customer re-architects its chip I/O to leverage Edgeless I/O, migrating to an alternative CPO solution
              requires another full chip re-design cycle. This creates strong retention—if Lightmatter wins a design
              win—but also amplifies the cost of losing early competitive evaluations. Distribution advantages currently
              favor Intel (existing data center sales channels), Marvell (hyperscaler networking relationships), and
              Ayar (NVIDIA co-design). Lightmatter must win through technical differentiation alone since it lacks
              equivalent distribution leverage.
            claimRefs:
              - CP019
              - CP020
              - CP021
              - CP022
              - CP023
