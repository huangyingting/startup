chapters:
  - number: 1
    title: Company Overview
    sections:
      - number: '1.1'
        title: Identity and Mission
        blocks:
          - type: paragraph
            body: >
              Lightmatter, Inc. is a US-based photonic computing company headquartered at 800 W El Camino Real, Suite
              350, Mountain View, CA 94040. The company was incorporated and began operations in 2017, with roots
              tracing to photonics research conducted at MIT. Lightmatter's corporate mission is to build the photonic
              infrastructure enabling AI at scale—interconnects, lasers, and eventually compute itself. The company's
              operating thesis is that electrical interconnects have reached a fundamental physical limit: bandwidth is
              constrained by the perimeter (shoreline) of the chip package, a boundary that scales linearly while GPU
              core area scales as r², creating a widening mismatch between compute capacity and data movement capacity.


              Lightmatter positions itself as solving the single most critical bottleneck in frontier AI infrastructure.
              According to the company's own analysis, model parameters have grown 240× in three years while cluster
              sizes have grown 10×, yet interconnect bandwidth has only improved 2×. This growing gap makes
              next-generation AI training economically infeasible without a breakthrough in interconnect technology.
              Lightmatter's answer is photonics: photons travel without resistive loss, cross paths without
              interference, and carry multiple signals simultaneously on a single fiber. The company's Edgeless I/O
              architecture extends I/O placement across the entire die area rather than limiting it to chip edges,
              unlocking bandwidth-density scaling proportional to die area rather than perimeter.


              As of May 2026, Lightmatter is a private company with its primary website at lightmatter.co. The company
              operates additional offices in Boston, Massachusetts; Hsinchu, Taiwan; and Toronto, Ontario, Canada.
              Lightmatter's products are aimed at hyperscalers, AI chip companies (XPU/GPU manufacturers), and data
              center operators building or expanding frontier AI training and inference clusters. The company's business
              model is built around hardware product sales and licensing of photonic interconnect technology,
              specifically evaluation kits and production-ready modules for integration into next-generation AI
              infrastructure.
