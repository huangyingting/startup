      - number: '8.5'
        title: Final Diligence Asks and Exit Readiness
        blocks:
          - type: paragraph
            body: >
              The diligence asks for Lightmatter are prioritized by blocking status. Two items are blocking (without
              them, an investment at $4.4B cannot be justified): (1) NDA-protected yield data for the M1000 photonic
              interposer at GlobalFoundries, including wafer lot yields, defect density measurements, and the company's
              die cost model at projected production volumes; and (2) NDA-protected confirmation that at least one named
              hyperscaler or AI chip co is in an active EVK-to-design-win conversion discussion, with disclosure of the
              program timeline and expected commitment date.


              Three items are material (required before final commitment, but not alone blocking): (1) TSMC CoWoS-L
              capacity confirmation — a signed or in-negotiation supply agreement that secures advanced packaging
              capacity for M1000 production ramp beginning 2027–2028; (2) BIS export compliance posture — a legal
              opinion on the ECCN classification of the M1000 and whether export licenses are required for delivery to
              international hyperscaler data centers; (3) cap table waterfall model — the full liquidation preference
              schedule showing the effective acquisition price at which Series D investors break even, and whether
              employee retention equity is structured to survive a $2–4B acquisition.


              Three items are informational (helpful for conviction but not blocking): (1) Guide VLSP standalone
              customer list (even 1–2 names would validate commercial execution capability); (2) EVK100 design-win
              conversion pipeline status (to understand whether the more modest product has achieved any commercial
              progress); (3) Series E fundraise plan — timeline, target valuation, and lead investors engaged.


              Exit readiness assessment: Lightmatter is not IPO-ready in 2026 — no revenue, no named customers, no
              production customers, and no path to profitability within 3 years. An IPO is realistic only after a
              confirmed design-win and initial production revenue (earliest 2029). Strategic M&A by a hyperscaler
              (Google/GV relationship), a chip company (AMD, potentially Intel), or a systems company (Cisco, Nokia) is
              the most likely exit scenario at this stage. The strategic M&A premium would be determined largely by the
              competitive urgency of the acquirer — in a contested CPO market with Intel and Ayar, a hyperscaler or chip
              company might pay $5–8B to acquire Lightmatter's technology and team before a competitor does.
            claimRefs:
              - CV021
              - CV022
              - CV023
              - CV024
              - CV025
