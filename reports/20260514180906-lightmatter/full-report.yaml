      basis: >-
        Scenarios derived from comparable semiconductor startup outcome analysis from PitchBook and Reuters, public
        comparable trading multiples from Bloomberg and Forbes, deep-tech hardware cohort data from CBInsights, and
        Lightmatter-specific valuation analysis from prior chapters.
