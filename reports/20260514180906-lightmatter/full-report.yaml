      - number: '8.6'
        title: Exhibits
        blocks:
          - type: callout
            title: 'Track / Conditional Pass: Technology Compelling, Valuation Requires Diligence Unlock'
            body: >-
              Lightmatter is a world-class team on a genuinely important technology. But $4.4B pre-revenue is an entry
              price that requires the bull case to generate positive returns. Three blocking data points must be
              confirmed before commitment: M1000 yield viability, active design-win discussion confirmation, and
              regulatory clearance. Without these, the recommendation is Track.
            calloutType: recommendation
            claimRefs:
              - CV016
              - CV017
              - CV018
          - type: callout
            title: Expected Value at Entry Is Approximately 1.0–1.2x — Insufficient for Venture Risk
            body: >-
              A probability-weighted scenario analysis at current evidence levels generates an expected return of
              approximately 1.0–1.2x on the $4.4B entry price. This does not compensate for the illiquidity premium,
              technology risk, and 5–8 year hold period typical for deep-tech hardware investments. The investment only
              makes venture-grade sense if the blocking diligence items resolve positively.
            calloutType: risk
            claimRefs:
              - CV011
              - CV012
              - CV013
              - CV015
          - type: callout
            title: Strategic M&A Is a More Likely Exit Than IPO in Most Scenarios
            body: >-
              Lightmatter's most realistic exit in the base and bull cases is strategic acquisition rather than IPO: the
              company is deeply technical, the product is infrastructure-critical, and the buyer universe (Google,
              Microsoft, Intel, AMD, Cisco) all have strategic reasons to own this technology at the right price. The
              GV/Google relationship and board access create an organic M&A evaluation pathway.
            calloutType: insight
            claimRefs:
              - CV023
              - CV024
              - CV025
          - type: callout
            title: Revenue Model Assumes Design Win by 2027 and Commercial Production by 2028
            body: >-
              All positive return scenarios depend on at least one design win being announced by Q4 2027 and commercial
              production commencing in 2028. If either of these milestones slips by 12 months, the expected value of the
              investment decreases by approximately 25–30% due to additional capital consumption and competitive
              catch-up risk.
            calloutType: assumption
            claimRefs:
              - CV014
              - CV015
              - CV022
