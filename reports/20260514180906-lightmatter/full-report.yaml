      - number: '6.5'
        title: Expansion Potential and Concentration Risk
        blocks:
          - type: paragraph
            body: >
              The expansion pathway for Lightmatter is clearly defined but highly dependent on one or two anchor wins. A
              single hyperscaler design-win—even at a 2027–2028 production start—would validate commercial traction,
              support the $4.4B valuation, and likely trigger additional customer conversations across the hyperscaler
              and AI chip co segments. Conversely, the absence of any production program through 2027 would require a
              valuation reset and either a down round or an acquisition at a compressed valuation.


              Customer concentration risk is extreme and intentional. Lightmatter's TAM for the M1000 requires
              hyperscaler AI training clusters—a universe of 4–5 buyers globally. The revenue concentration in a
              successful scenario would have the top 1–2 customers representing 80–90% of revenue in years 1–3, creating
              significant dependency risk similar to other enterprise deep-tech hardware companies (e.g., Cerebras,
              Graphcore). Diversification into HPC and cloud colocation provides volume but at lower bandwidth
              requirements (EVK100 tier) and compressed margins. The geographic concentration risk is also notable: most
              of the addressable market is in the U.S., with secondary demand in Europe and Asia—all subject to the same
              AI capex cycle timing risk.


              An alternative expansion path is AI chip co-integration: NVIDIA, AMD, or a custom ASIC vendor integrating
              Passage M1000 into their chip package would create a multiplier effect where Lightmatter revenue scales
              with AI chip sales rather than requiring direct hyperscaler engagement. This is the model Ayar Labs is
              pursuing with NVIDIA. If Lightmatter can win a comparable relationship with AMD, Google TPU, Amazon
              Trainium, or Microsoft Maia, the revenue expansion potential would be substantially larger than direct
              hyperscaler sales.
