      - number: '4.3'
        title: Cost Structure and Unit Economics
        blocks:
          - type: paragraph
            body: >
              Lightmatter's cost structure is dominated by research and development expenditure. At ~331 employees
              (LinkedIn estimate), with an estimated 70–75% in engineering roles, blended loaded cost per engineer of
              $180K–$270K/yr implies a total headcount cost of $53–$84M/yr. Adding tape-out costs ($5–$20M per photonic
              wafer run), TSMC advanced packaging NRE ($10–$30M per engagement), laboratory and test equipment, and G&A
              overhead, total annual burn is estimated at $60–$90M/yr. This is consistent with photonic semiconductor
              startups at the 200–400 employee scale that are operating at pre-production stage.


              Unit economics at production scale are more speculative. The Passage M1000's 4,000 mm² photonic interposer
              requires TSMC CoWoS-L or equivalent advanced packaging—among the most expensive substrate processes
              available. Estimated COGS per interposer module at early production (100–1,000 units) is $15,000–$30,000,
              with a sell price that might range from $30,000–$100,000 depending on the bandwidth tier and customer NRE
              contribution. This implies a gross margin of 33–70% at early volumes, compressing toward 50–60% as yields
              improve and packaging costs decline. The photonic component bill of materials includes: laser source
              ($500–$2,000), photonic die ($2,000–$5,000), OSAT packaging ($5,000–$15,000), testing and yield loss
              (~30–40% at early production), and system integration. These figures are industry-derived estimates, not
              Lightmatter-disclosed data.
