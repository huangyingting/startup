      - number: '4.2'
        title: Go-to-Market Motion and Commercial Strategy
        blocks:
          - type: paragraph
            body: >
              Lightmatter's go-to-market strategy is a direct, high-touch enterprise sales approach targeting
              hyperscalers and AI chip companies. The early-access program—announced in late 2024—invites a small number
              of qualified partners to receive Passage M1000 EVKs and engage in co-design discussions. This approach
              mirrors the commercialization patterns of other photonic and advanced packaging startups (Ayar Labs,
              Marvell/Inphi): establish technical credibility through EVK programs, convert 1–2 anchor customers into
              production contracts, and scale from there.


              The commercial motion involves three gates: (1) EVK sampling and initial integration (current phase,
              2025–2026); (2) design-win commitment and joint tape-out planning (target 2026–2027); (3) production ramp
              and volume supply agreement (target 2027–2029). The GTM team is led by CEO Nick Harris and a direct
              enterprise sales function—Lightmatter's 12-member leadership team includes individuals with hyperscaler
              business development backgrounds. The absence of named customers or publicly disclosed letters of intent
              is the primary commercial risk. At a $4.4B valuation, investors are pricing in gate (2) conversion within
              18–24 months. Any delay materially impacts valuation support and funding optionality.


              Pricing strategy is not publicly disclosed. Based on industry comparable semiconductor custom ASIC pricing
              models, Lightmatter is likely to employ a combination of NRE cost recovery ($10–$50M per program), volume
              production pricing ($5,000–$50,000 per interposer unit), and potential recurring light engine consumable
              revenue (Guide VLSP lamp replacement). ASP will compress over time as volume scales, consistent with
              silicon photonics commodity pricing trajectories.
