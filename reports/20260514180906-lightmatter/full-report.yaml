      - number: '2.5'
        title: Sizing and Adoption Diligence Gaps
        blocks:
          - type: paragraph
            body: >
              Three diligence gaps limit conviction in Lightmatter's market opportunity. First, no analyst firm
              publishes a standalone CPO interconnect TAM that isolates Lightmatter's addressable market from the
              broader silicon photonics sector. MarketsandMarkets, Mordor Intelligence, and Grand View Research each
              include CPO within silicon photonics but do not break out CPO-specific revenue forecasts. This forces the
              CPO SAM to be estimated as a percentage of the total market, introducing significant uncertainty (15–25%
              range represents a 65% spread in the SAM estimate). Second, no hyperscaler has publicly confirmed volume
              CPO purchasing despite Lightmatter's "sampling now" EVK status. The absence of customer proof-points—even
              unnamed reference customers—leaves commercial traction entirely unverified at the $4.4B valuation. Third,
              the two primary analyst estimates (MarketsandMarkets at $9.65B by 2030 vs. Mordor at $13.18B by 2031)
              diverge by approximately 36% in their long-term projections, and neither independently validates the
              other's methodology. These gaps are material to the investment thesis and are addressed further in Chapter
              6 (Customers).
            claimRefs:
              - CM031
              - CM032
              - CM033
              - CM034
              - CM035
      - number: '2.6'
        title: Exhibits
        blocks:
          - type: callout
            title: Large, Fast-Growing Market with Structural Tailwinds
            body: >-
              Silicon photonics is one of the fastest-growing semiconductor sub-sectors at 27–30% CAGR, driven by AI
              training capex and bandwidth scarcity. The market is structurally under-supplied on optical transceivers
              (40–60% gap through 2027), creating urgency for CPO as an architectural alternative.
            calloutType: strength
            claimRefs:
              - CM003
              - CM004
              - CM022
          - type: callout
            title: CPO-Specific TAM Remains Analytically Unvalidated
            body: >-
              No major analyst publishes a standalone CPO interconnect TAM. Lightmatter's SAM must be estimated as
              15–25% of the broader silicon photonics market, creating a 65% spread in the SAM range. This gap limits
              investor confidence in market sizing and creates execution risk if CPO adoption is slower than the broader
              photonics trend.
            calloutType: risk
            claimRefs:
              - CM031
              - CM032
          - type: callout
            title: Hyperscaler Buyer Concentration is Both Opportunity and Risk
            body: >-
              The top 4 hyperscalers represent ~58.7% of end-user silicon photonics demand. For Lightmatter, winning 1–2
              hyperscaler programs would establish revenue and market validation. However, this extreme concentration
              means a single qualification delay or competitive loss could eliminate the near-term revenue pathway
              entirely.
            calloutType: insight
            claimRefs:
              - CM014
              - CM017
              - CM033
          - type: callout
            title: No Named Customer Commitments Despite EVK Sampling
            body: >-
              Despite the Passage EVK being 'sampling now,' no hyperscaler or AI chip company has publicly confirmed an
              evaluation or production program. This is a significant gap relative to the $4.4B valuation and requires
              resolution before conviction in the market opportunity translates to commercial traction.
