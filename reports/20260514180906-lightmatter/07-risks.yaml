callouts:
  - calloutType: risk
    title: "4,000 mm² Photonic Die Yield Is the Primary Unresolved Investment Risk"
    body: "The M1000 photonic interposer at 4,000 mm² faces Poisson yield model predictions of 10–30% on standard photonics processes — commercially marginal. No yield data has been disclosed. This single question drives unit economics, pricing competitiveness, margin, and the capital required for production ramp. It must be answered under NDA before capital commitment."
    claimRefs: [CR001, CR002, CR026]

  - calloutType: risk
    title: "BIS Export Controls May Materially Restrict Lightmatter's Addressable Market"
    body: "BIS October 2023 and 2024 rules have expanded to cover enabling interconnect technologies for AI training compute above specified bandwidth thresholds. The M1000's 114.6 Tbps performance likely triggers EAR review. Lightmatter has not publicly disclosed its ECCN classification or export compliance posture — a diligence gap that must be closed before deployment to customers with international data center footprints."
    claimRefs: [CR011, CR012, CR015]

  - calloutType: risk
    title: "NVIDIA's Investment in Ayar Labs Structurally Closes the Largest Market Segment"
    body: "NVIDIA holds approximately 70–80% of AI training accelerator share. Its strategic investment in Ayar Labs creates a preferential CPO path for NVIDIA GPU packages, effectively closing the most valuable single CPO TAM segment to Lightmatter. The investment thesis depends on Lightmatter winning AMD, Google TPU, Amazon Trainium, and/or Microsoft Maia — all of which are smaller, longer-cycle opportunities than the NVIDIA GPU ecosystem."
    claimRefs: [CR007, CR006, CR010]

  - calloutType: assumption
    title: "Kill Criteria Monitoring Requires Active Tracking of 7 Binary Triggers"
    body: "The investment thesis has seven clearly defined kill criteria. All seven must be monitored in parallel. The most likely first trigger is 'no design-win announcement by Q4 2027' — a 24-month window from the current EVK sampling stage that aligns with the design-win decision cadence for CPO qualification at hyperscalers."
    claimRefs: [CR034, CR039, CR022]

