  - number: 7
    title: Risks
    sections:
      - number: '7.1'
        title: Regulatory and Legal Risks
        blocks:
          - type: paragraph
            body: >-
              Netskope operates as a cloud-security proxy for enterprise traffic across 50+ countries, creating a broad
              regulatory surface. GDPR is the highest-severity active obligation: Netskope processes personal data on
              behalf of EU-based enterprise customers through its EMEA PoPs, requiring Data Processing Agreements
              (DPAs), Standard Contractual Clauses (SCCs) for EU-US transfers post-Schrems II, and demonstrable data
              residency controls. The company holds ISO 27001 and ISO 27701 certifications and publishes a GDPR-specific
              compliance page, providing credible baseline mitigation. FedRAMP High authorization (January 2024, FedRAMP
              Marketplace ID FR2019032016) adds continuous monitoring obligations, annual 3PAO assessment requirements,
              and sponsor (US Dept. of Veterans Affairs) approval for significant changes—a governance overhead that
              must be staffed and maintained indefinitely. CCPA/CPRA applies to California-based customer employees
              whose traffic Netskope inspects; PDPL (Saudi Arabia), PDPA (Thailand/Singapore), and LGPD (Brazil) add
              jurisdiction-specific requirements as Netskope expands its APAC and LATAM customer base. Potential Export
              Administration Regulation (EAR) exposure exists because TLS inspection and deep-packet analysis
              technologies may be subject to dual-use export classification in certain jurisdictions. The 10-K (FY2026,
              January 31, 2026) discloses no material pending legal proceedings. The UK Ministry of Justice procurement
              registry lists Netskope as a government-approved supplier, confirming active UK government sector exposure
              and implied compliance obligations under UK GDPR.
