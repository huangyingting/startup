              latency versus service-chained multi-vendor stacks. The NewEdge private network enforces a 50ms TLS
              inspection SLA globally, a verifiable performance commitment competitors have not matched publicly.

              SD-WAN is a material capability gap: Netskope's Borderless SD-WAN is an add-on product rather than
