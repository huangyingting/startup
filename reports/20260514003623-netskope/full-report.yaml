  - number: 5
    title: Product & Technology
    sections:
      - number: '5.1'
        title: Platform Architecture & NewEdge Network
        blocks:
          - type: paragraph
            body: >-
              Netskope One is a cloud-native security platform built around three architectural pillars: the NewEdge
              Network, the Zero Trust Engine, and a unified product suite. NewEdge is Netskope's proprietary global
              cloud network with 50+ points of presence (PoPs) built entirely by Netskope — not leased from a
              third-party CDN — and connected to major SaaS providers via private peering. This gives enterprise traffic
              a direct path from the endpoint to Microsoft 365, Google Workspace, Salesforce, AWS, and Azure without
              traversing the public internet between the security inspection point and the application. The Zero Trust
              Engine performs all security checks — CASB, SWG, ZTNA, DLP, threat protection — in a single-pass inline
              cloud proxy, preserving context (user identity, device posture, cloud service, activity type, and data
              content) across all policy decisions. Architecture is delivered as a cloud service only; no hardware
              appliances are required or sold.
