    type: bar
    layout: standard
    summary: >-
      Bar chart illustrating implied enterprise value in billions of USD across eight EV/NTM revenue multiple scenarios
      from 3x (deep bear) to 13x (Cloudflare peer re-rating), with Netskope's current approximately 5x multiple
      identified as the base-case anchor. Bull case at 7-9x implies $5.9-7.9B EV; bear case at 3-4x implies $2.5-3.3B
      EV. The chart illustrates the asymmetric upside/downside from the current approximately $4.2B EV baseline.
