    title: Netskope Customer Journey Map
    type: journey-map
    layout: wide
    summary: >-
      Stages of the enterprise buyer journey from awareness through expanded adoption, showing touchpoints, buyer roles,
      and expansion triggers.
    claimRefs:
      - CU001
      - CU026
      - CU014
      - CU009
      - CU015
    data:
      items:
        - actor: CISO / CIO
          touchpoints:
            - Gartner SSE/SASE MQ report
            - Analyst recommendation
            - Partner introduction
            - Peer referral at conference
          emotion: Concerned about legacy VPN/firewall complexity and cloud visibility gaps
          painpoint: Multiple point solutions; no unified cloud visibility
          opportunity: Position Netskope One as platform consolidator vs. point tool
          label: Awareness
        - actor: Security Architect / Network Engineer
          touchpoints:
            - POC trial with CASB
            - NewEdge latency benchmarking
            - Gartner Peer Insights reviews
            - Vendor RFP process
          emotion: Skeptical of performance impact; requires proof of zero friction
          painpoint: SSL inspection compatibility concerns; deployment complexity fears
          opportunity: Orbia/BDO reference calls; 4-month deployment case study
          label: Evaluation
        - actor: CISO + CFO + Procurement
          touchpoints:
            - Channel partner negotiation
            - 1-3 year subscription contract
            - Annual billing commitment
          emotion: Focused on TCO vs. multi-vendor alternative; wants flexibility
          painpoint: High initial price vs. Zscaler; 1–3 year lock-in risk
          opportunity: Bundle CASB + SWG as entry; defer ZTNA and DLP to renewal
          label: Purchase
        - actor: Network Engineering / IT Ops Team
          touchpoints:
            - Netskope Customer Success team
            - NewEdge network on-ramp
            - Identity integration (Entra ID)
            - Policy configuration
          emotion: Anxious about deployment disruption; wants rapid time-to-value
          painpoint: Initial config complexity; certificate MitM tuning required
          opportunity: 4-month Orbia deployment proves rapid rollout; Academy training
          label: Onboarding
        - actor: CISO / Platform Owner
          touchpoints:
            - QBR with CSM
            - New product demo (AI Gateway, DLP, SD-WAN)
            - NRR expansion contract
          emotion: Confident in platform; open to adding capabilities
          painpoint: Budget competition from other security tools; procurement lag
          opportunity: GenAI security use case (BDO ChatGPT controls) drives rapid upsell
          label: Expansion
