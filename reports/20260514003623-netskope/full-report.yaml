            body: >-
              Netskope's financial profile is characterized by high revenue quality (118% NRR, 96% GRR, per-seat
              subscription model), rapid gross margin expansion toward 70%+, and a structural FCF inflection that
              arrived in H1 FY2026. The IPO provided a large capital buffer. The primary financial risks are: (1) the
              $700M convertible notes overhang requires careful review of conversion price and maturity; (2) S&M and R&D
              ratios, while declining, remain above 80% of revenue combined, leaving limited room for unexpected
              downturns; (3) the accumulated deficit of $2.1B is not a near-term solvency issue at current burn rates,
              but signals the total capital required to build this platform; and (4) the FY2026 annual revenue and
              margin outlook is not formally guided, requiring modeling from the $707M ARR base.

              Critical diligence gaps include: undisclosed CAC by channel (direct vs. reseller), no gross margin
              breakdown by product tier or module, no sector-level ARR split (enterprise vs. federal vs. mid-market),
              and NewEdge multi-year CapEx plan not publicly detailed. Any underwriting model for Netskope must
              explicitly handle these gaps as unknowns. The financial evidence base available from the S-1 is unusually
              rich for a pre-IPO cybersecurity company, and the operational metrics (NRR, GRR, FCF trajectory) are
              sufficient to support a base-case investment thesis. The edge cases—pricing pressure from Palo Alto and
              Zscaler, federal contract variability, and convertible note outcomes—require management presentation to
              resolve.
