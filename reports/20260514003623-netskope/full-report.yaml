      - number: '1.2'
        title: Founders, Leadership, and Governance
        blocks:
          - type: paragraph
            body: >-
              Netskope was founded by four technologists: Sanjay Beri (CEO, Chairman), Krishna Narayanaswamy (CTO), Ravi
              Ithal (Chief Architect), and Lebin Cheng (departed 2018). Beri conceived the founding vision—delivering
              data-centric, cloud-native security—which he famously sketched on a Starbucks napkin before pitching to
              former Symantec executives. Beri (born 1976) is the company's primary external spokesperson and strategic
              driver and represents the most material key-person dependency. His compensation as CEO for FY2025 was
              approximately $973,000 in salary and bonuses, per Yahoo Finance executive disclosures.

              Krishna Narayanaswamy, the CTO, brings over 25 years of expertise in deep packet inspection, security, and
              behavioral anomaly detection. He holds more than 50 patents and previously served as a Distinguished
              Engineer at Juniper Networks (2004-2012) and founded Top Layer Networks (1997-2004) before co-founding
              Netskope. Ravi Ithal serves as Chief Architect, focusing on security architecture and platform depth.

              Lebin Cheng, the fourth co-founder who served as VP of App Engineering, departed in 2018 and subsequently
              founded ArecaBay and CloudVector. His departure did not visibly disrupt company growth, though it reduced
              founding-team breadth. The executive team has been reinforced by external hires: Drew Del Matto (CFO,
              formerly Citrix and Fortinet, joined 2019; MBA) leads financial operations, and Raphaël Bousquet (CRO)
              oversees global go-to-market. The board includes Enrique Salem (former Symantec CEO, joined October 2013),
              Kimberly Alexy (Audit Committee Chair), Eric Wolford (Governance Chair), Arif Janmohamed, and Will
              Griffith. As a public company, Netskope is now subject to Nasdaq listing standards and SEC reporting
              requirements. No material leadership changes were confirmed as of May 2026.
