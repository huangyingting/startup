      - number: '2.3'
        title: Buyer and User Segmentation
        blocks:
          - type: paragraph
            body: >-
              The primary economic buyer for Netskope and peer SASE vendors is the Chief Information Security Officer
              (CISO), sometimes in partnership with the Chief Information Officer (CIO) for large multi-year platform
              contracts. The technical champion—who evaluates, recommends, and operates the solution—is the IT Security
              team, security architect, or security operations center (SOC) manager. Finance and procurement serve as
              formal payer/approver, typically requiring business case justification, multi-year ROI models, and
              competitive pricing benchmarks. End users (network operations, IT operations, or developers) interact with
              the product day-to-day but rarely have budget authority.

              Netskope's customer base tilts heavily toward large enterprises, with 30%+ Fortune 100 penetration and
              over 4,000 enterprise customers. The highest-value segments are: (1) Regulated industries—financial
              services, healthcare, energy—where DLP, CASB, and audit logging are compliance requirements driving
              mandatory spend; (2) Global 2000 enterprises with large, distributed, cloud-heavy workforces requiring
              consistent policy enforcement across geographies; and (3) Cloud-native and digital-first enterprises
              (technology, e-commerce, SaaS companies) that have abandoned on-premises infrastructure entirely and need
              ZTNA and CASB natively integrated.

              Mid-market enterprises (500–5,000 employees) represent a growing but underserved segment for Netskope. The
              Wiz 2026 CISO Budget Benchmark survey of 300+ CISOs shows 85% increased cybersecurity budgets in 2026,
              with 88% planning increased cloud security investment. The Dell'Oro Group notes security budgets are
              consolidating around two SaaS pillars— SASE/SSE edge security and AI-infused next-gen SIEM—reducing
              allocations for legacy appliances and point products. This budget consolidation strongly benefits
              Netskope's platform-centric sales motion.
