  - id: FR001
    title: Risk Heatmap — Likelihood vs. Impact by Risk Category
    type: matrix
    layout: wide
    summary: >-
      Risk heatmap mapping eight Netskope risk categories across five likelihood levels (Very Low to Very High) and four
      impact levels (Low to Critical). Security breach and FedRAMP revocation are Critical-impact, Low-likelihood risks.
      Channel partner concentration, NRR compression, and Microsoft competitive threat are High-impact,
      Medium-likelihood risks requiring active monitoring. Regulatory GDPR and operational complexity are Medium-impact,
      Medium-likelihood risks.
    claimRefs:
      - CR001
      - CR010
      - CR020
      - CR029
      - CR036
    data:
      columns:
        - Likelihood
        - Impact
        - Residual Exposure
      rows:
        - label: Security Breach (inline proxy)
          values:
            - Low-Medium
            - Critical
            - High — existential brand/ARR risk if data exfiltrated through proxy
        - label: FedRAMP Authorization Revocation
          values:
            - Low
            - Critical
            - High — federal revenue pipeline lost; requires remediation cycle
        - label: GDPR Enforcement Action
          values:
            - Medium
            - High
            - Medium — DPAs and ISO 27701 provide credible mitigation; residual in SCCs
        - label: Channel Partner Concentration
          values:
            - Medium
            - High
            - High — top partner concentration undisclosed; direct sales thin (4.7%)
        - label: Microsoft SSE Competitive Displacement
          values:
            - Medium
            - High
            - Medium — Netskope's DLP depth and CASB heritage reduce near-term displacement risk
        - label: NRR Compression (below 110%)
          values:
            - Medium
            - High
            - Medium — 116% NRR provides buffer; compression trend warrants monitoring
        - label: Convertible Note Dilution / Cash Obligation
          values:
            - Low-Medium
            - Medium
            - Medium — terms not fully disclosed; stock below IPO price increases cash-settlement risk
        - label: CEO / CTO Key Person Departure
          values:
            - Low
            - High
