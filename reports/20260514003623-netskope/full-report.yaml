          detail: Platformization and native SSE bundling reduce expansion ARR
        - id: f3
          label: Channel Partner Loss or Re-prioritization
          detail: 95.3% indirect revenue; top partner concentration risk
        - id: f4
          label: NRR Compression (below 110%)
          detail: Central financial risk indicator; 116% → 110% = ~$60M ARR headwind
        - id: f5
          label: Revenue Miss vs. Consensus
          detail: Analyst FY2027 consensus at ~$880M; miss triggers multiple compression
