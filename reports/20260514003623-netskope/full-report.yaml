              24%+ revenue growth driven by SASE platform consolidation wins, NRR recovery to 118%+ indicating
              successful expansion into new modules including AgentSkope and ZTNA, and successful refinancing of the
              $700.3M convertible notes. This scenario implies an NTM revenue of approximately $880M and would require
              peers to maintain elevated multiples. Probability signal: 25%. Base case ($10-13/share, 5-6x NTM): assumes
