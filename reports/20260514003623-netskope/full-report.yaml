  - id: FI002
    title: Unit economics bridge
    type: flow
    layout: standard
    summary: >-
      Flow from new-logo S&M investment through initial ACV, NRR-driven expansion, and the GRR-constrained customer
      lifetime that defines long-run LTV.
    approximationNotes: >-
      CAC is not directly disclosed in Netskope's S-1. The proxy calculation uses aggregate S&M spend divided by net new
      ARR per period, which overstates true CAC for new logos by including expansion and retention spend. LTV is
      estimated as ACV divided by churn rate using GRR as the churn proxy. All estimates are directional and require
      company-disclosed CAC/payback data to confirm.
    data:
      nodes:
        - id: n1
          label: S&M investment (new logo)
          detail: >-
            H1 FY2026 S&M: $147.4M total (blended new + expansion); declining as % of revenue (44.9% H1 FY2026 vs. 64.7%
            FY2024)
        - id: n2
          label: Initial contract ACV
          detail: 'Avg ARR per customer: $163.8K (Jul 2025); $148.7K prior year; expanding YoY = upsell at onboarding'
        - id: n3
          label: NRR-driven expansion
          detail: '118% NRR: existing base grows 18% net per year; expansion ARR compounds independently of new logos'
        - id: n4
          label: GRR-constrained churn
          detail: '96% GRR: ~4% annual churn; est. >20-year avg customer lifetime at current rates'
        - id: n5
          label: Estimated customer LTV
          detail: 'LTV proxy = ACV / churn rate: $163.8K / 0.04 = $4.1M per customer lifetime; directional estimate only'
        - id: n6
          label: CAC payback (proxy)
          detail: Not disclosed; proxy >24 months based on aggregate S&M / net new ARR; confirm by channel in diligence
      edges:
        - from: n1
          to: n2
          label: Acquisition investment
        - from: n2
          to: n3
          label: Upsell on platform tiers
        - from: n3
          to: n4
          label: Partially offset by churn
        - from: n4
          to: n5
          label: Net retained ARR x lifetime
        - from: n2
          to: n6
          label: Payback = CAC / ACV
    claimRefs:
      - CI004
      - CI005
      - CI006
      - CI024
      - CI025
      - CI036
