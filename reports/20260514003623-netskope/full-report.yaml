              stockholders' deficit. Critically, free cash flow has inflected: H1 FY2026 FCF was $(2.2M)—near
              breakeven—versus $(126.5M) in H1 FY2025 and $(151.1M) for all of FY2025. At near-zero quarterly burn, the
