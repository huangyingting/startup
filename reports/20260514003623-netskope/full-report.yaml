  - number: 4
    title: Financials
    sections:
      - number: '4.1'
        title: Revenue Model and Streams
        blocks:
          - type: paragraph
            body: >-
              Netskope generates substantially all revenue from subscription licenses to its Netskope One cloud-native
              security platform. The model is per-seat, per-year, with customers purchasing annual or multi-year
              contracts that are recognized ratably over the contract term. Platform tiers—Core (SSE baseline), Advanced
              (adds SSPM, SkopeAI behavioral analytics), and Ultimate (full SASE with NewEdge SD-WAN)—allow
              upsell-driven ARR expansion within existing accounts. The result is a durable expansion engine: NRR of
              118% means existing customers organically grow Netskope's ARR by approximately 18% annually, net of churn.

              Fiscal year 2025 revenue was $538.3 million (+32% YoY from $406.9M in FY2024). The H1 FY2026 result of
              $328.5 million (+31% YoY) implies a full-year run-rate of approximately $657 million, consistent with the
              $707 million ARR base as of July 31, 2025. Revenue mix is roughly 57% Americas and 43% international, with
              international revenue stable as a percentage across H1 FY2025 and H1 FY2026, confirming that international
              expansion is scaling proportionally with domestic growth. A small professional-services component
              (implementation, migration, managed services) exists but is immaterial and not separately disclosed. The
              company operates on a January 31 fiscal year-end; "FY2026" in this chapter refers to the year ending
              January 31, 2026.
