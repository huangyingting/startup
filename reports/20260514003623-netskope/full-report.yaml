            body: >-
              Six critical diligence asks remain before an investment decision can be made with high confidence. Most
              important is the full indenture and term sheet for the $700.3M convertible notes: conversion price,
              maturity date(s), interest rate, put/call provisions, and change-of-control clauses. If the conversion
              price is above the current stock price of $10.56, cash settlement at maturity represents a material future
              obligation. Second: NRR by customer cohort and segment (SMB, commercial, enterprise, federal) broken out
