            title: Regulatory Tailwinds Create Non-Discretionary Spending
            body: >-
              EU NIS2 (effective October 2024) and DORA (January 2025) impose mandatory data protection and operational
              resilience requirements that drive CASB, DLP, and access-logging spending regardless of macroeconomic
              conditions. This regulatory engine represents a structural tailwind for Netskope's European pipeline.
            calloutType: strength
            claimRefs:
              - CM028
              - CM029
          - type: callout
            title: SASE Growth Moderating from Pandemic Peak
            body: >-
              ETR data from early 2026 shows SASE spending growth rates moderating from pandemic-era peaks. Market
              growth is expected to continue at 20–29% but without the extraordinary step-changes seen in 2020–2021.
              Further convergence among market leaders rather than accelerating new market creation is the expected
              near-term dynamic.
            calloutType: risk
            claimRefs:
              - CM039
              - CM034
  - number: 3
    title: Competitors
    sections:
      - number: '3.1'
        title: Competitive Landscape Overview
        blocks:
          - type: paragraph
            body: >-
              Netskope operates in a maturing enterprise SSE/SASE market where competitive structure has consolidated
              around a small number of scaled players. Gartner's 2025 SSE Magic Quadrant identifies Netskope, Zscaler,
              and Palo Alto Networks as the three Leaders—a designation reinforcing the top tier's durability. Zscaler
              holds the strongest revenue position at approximately $3.2 billion ARR entering fiscal 2026, benefiting
              from an early zero-trust networking lead, 150+ data centers, and a dominant Zero Trust Exchange platform
              processing over 300 billion transactions per day. Palo Alto Networks offers the broadest platform depth,
              integrating Prisma Access, AI/ML-driven security, and SD-WAN through its full SASE product line.

              Among challengers, Cato Networks has built the most architecturally differentiated platform by natively
              converging ZTNA, SWG, FWaaS, and SD-WAN into a single cloud stack—a structural advantage over Netskope's
              add-on SD-WAN approach. Cisco commands the largest enterprise portfolio and scored highest (42/50) on the
              sase.cloud 2026 SASE vendor scorecard, reflecting MSP-readiness and breadth. Cloudflare One leverages 320+
              global PoPs to offer competitive ZTNA and SWG at aggressive price points, particularly for developer and
              SMB segments. Fortinet FortiSASE targets mid-market and branch-heavy organizations with combined SD-WAN
              and SSE, while Microsoft is a growing status-quo threat through bundled ZTNA/SWG in M365 subscriptions.
              Netskope ranked 5th at 38/50 on the sase.cloud scorecard— behind Cisco, Cato, Palo Alto, and
              Zscaler—reflecting strength in data-centric security but trailing peers in platform breadth and SD-WAN
              maturity.
