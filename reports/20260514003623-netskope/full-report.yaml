  - number: 8
    title: Valuation
    sections:
      - number: '8.1'
        title: Investment Thesis and Recommendation
        blocks:
          - type: paragraph
            body: >-
              Netskope's investment thesis rests on four pillars: (1) best-in-class inline proxy SSE architecture with
              FedRAMP High authorization creating a defensible federal sector moat unavailable to most competitors; (2)
              strong enterprise traction with approximately one-third of the Fortune 100 as customers and ARR >$100K
              customer count of 1,531 representing 86% of ARR; (3) durable revenue growth at 32% YoY to $709.1M in
              FY2026 with 116% NRR demonstrating strong upsell and cross-sell in the installed base; and (4) an AI
              security pivot via AgentSkope targeting the fast-growing GenAI governance market. The anti-thesis is
              equally substantial: the stock is 44% below its November 2025 IPO price of $19/share; $700.3M in
              convertible notes create potential cash settlement overhang; NRR has compressed from 118% (H1 FY2026) to
              116% (full year FY2026) suggesting competitive pressure; and Microsoft Entra SSE native expansion within
              M365 E3/E5 threatens Netskope's mid-market growth vector. Channel concentration at 95.3% of FY2026 revenue
              through indirect partners adds structural fragility. The overall recommendation is CAUTIOUS PASS / TRACK
              at the current $10.56 price. The valuation discount to peers is real but conditional on sustaining growth
              above 20% and stabilizing NRR. Buy criteria: NRR stabilization at or above 116% for two consecutive
              quarters AND refinancing or conversion of the $700.3M notes AND continued revenue growth above 18%.
