            body: >-
              Gross margin expansion is the most impressive financial trend in Netskope's S-1. Gross margin improved
              from 59.8% in FY2024 to 64.6% in FY2025 to 70.9% in H1 FY2026—a gain of more than 1,100 basis points in
              approximately 18 months. This trajectory is driven by scale leverage on the NewEdge private network (120+
              PoPs globally), which carries fixed infrastructure costs that spread across a larger subscription base as
              ARR grows. Approaching the 70%+ gross margin tier positions Netskope alongside Zscaler's 79% gross margin
              as a credible SaaS-infrastructure hybrid.

              Operating expenses in FY2025 totaled $603.6 million (112% of revenue), versus $347.9M gross profit,
              producing an operating loss of $(255.7M) at a -47.5% operating margin. In H1 FY2026, operating expenses of
              $324.1M against gross profit of $232.8M produced an operating loss of $(91.3M) at -27.8%—a 20
              percentage-point improvement in one year. Non-GAAP operating loss (adjusting primarily for stock-based
              compensation) improved from $(123M) in H1 FY2025 to $(63M) in H1 FY2026, a 49% improvement. Incremental
              non-GAAP operating margins across five recent quarters have been 12%, 72%, 72%, 100%, and 58%, signaling
              that marginal revenue contributions are now highly profitable. Stock-based compensation is declining:
              $61.0M in FY2024, $50.8M in FY2025, and $17.6M in H1 FY2026.
