          detail: NTSK at $10.56; further decline increases note dilution risk
        - id: f7
          label: Convertible Note Pressure ($700.3M outstanding)
          detail: Cash settlement risk if stock below conversion price at maturity
        - id: f8
          label: Talent Attrition (engineering and sales)
          detail: Underwater equity reduces retention incentive; Teamblind layoff reports
        - id: f9
          label: Product Investment Gap
          detail: Talent loss slows AI Security and SD-WAN roadmap execution
        - id: f10
          label: Accelerated Competitive Disadvantage
          detail: Product gaps widen competitive moat erosion risk
