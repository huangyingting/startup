              the top 5 and top 10 indirect partners as a percentage of FY2026 ARR; at 95.3% indirect revenue, a major
              partner defection would be material and is not currently visible in public filings. Fourth: AgentSkope
              commercial pipeline and ARR contribution as of Q1 FY2027 (April 2026), since this is the primary growth
              catalyst for the bull case and currently unquantified. Fifth: competitive win/loss data versus Zscaler and
              Microsoft Entra SSE from the last four quarters with deal volume, win rates, and competitive displacement
              metrics. Sixth: employee attrition data post-IPO by function, given that equity compensation for many
              employees is likely underwater at current stock prices. Exit readiness: the IPO has already been
              completed. For new public market investors, exit liquidity is available through normal market trading.
