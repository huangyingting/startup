        title: Customer Workflow & Deployment
        blocks:
          - type: paragraph
            body: >-
              Enterprise customers deploy the Netskope client (AgentSkope) on managed endpoints, which tunnels all web,
              cloud, and private-app traffic to the nearest NewEdge PoP via a lightweight agent supporting Windows,
              macOS, iOS, Android, and ChromeOS. For unmanaged (BYOD) scenarios, Netskope offers agentless reverse-proxy
              CASB via API integrations with major SaaS providers, eliminating the need for device-side software
              installation. The Zero Trust Engine at the PoP decodes the full context of each transaction — who
              (identity from AD, Okta, SAML), what device (posture score), which service (from the 70,000-app catalog),
              what action (download, upload, share), and what data (DLP classification) — before enforcing policy.
              Integration with enterprise security stacks is provided via the Cloud Exchange (CE) platform, which
              includes a public library of SIEM, SOAR, XDR, and threat intel plugins hosted on GitHub. UEBA detects
              behavioral anomalies such as unusual download volumes or off-hours access patterns. G2 and PeerSpot
              reviews highlight deployment simplicity but flag SIEM integration friction and occasional compatibility
              issues with major OS updates.
