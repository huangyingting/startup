          value: 2.5
          detail: ~$2.5B EV; approximately $5-6 per share; growth decelerates to 8-12%; NRR falls below 110%
        - label: Bear High (4x NTM)
          value: 3.3
          detail: ~$3.3B EV; approximately $7-8 per share; 12-15% growth; NRR holds 110-113%
        - label: Base Low (5x NTM)
          value: 4.2
          detail: ~$4.2B EV; approximately $10.56 per share (current market price); 16-18% growth; NRR 115-116%
        - label: Base High (6x NTM)
          value: 5
          detail: ~$5.0B EV; approximately $13 per share; 18-20% growth; NRR stable at 116%; FCF positive
        - label: Bull Low (7x NTM)
          value: 5.9
          detail: ~$5.9B EV; approximately $15-16 per share; 22-24% growth; NRR recovers to 117%
        - label: Bull Mid (8x NTM)
          value: 6.7
          detail: ~$6.7B EV; approximately $17-18 per share; 24-26% growth; NRR at 118%; AgentSkope traction
        - label: Bull High (9x NTM)
          value: 7.6
          detail: ~$7.6B EV; approximately $20-21 per share; 25%+ growth; SASE consolidation win; notes refinanced
        - label: Cloudflare Peer (13x NTM)
