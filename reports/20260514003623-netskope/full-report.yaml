              subscriptions, with Netskope priced at a premium to market median, justified by DLP and CASB depth.
              Zscaler's modular approach (ZIA + ZPA separately priced) means comparable feature parity is typically more
              expensive than Netskope's bundled offer. Palo Alto's shift to site-based licensing is intended to simplify
              enterprise budgeting. Cloudflare's usage-based model creates pricing pressure at the lower end of the
