              FY2026) means the bear case does not involve immediate insolvency risk, but could require dilutive equity
              financing. The GRR of ~96% provides a floor under revenue destruction scenarios. Analyst consensus for NTM
              revenue (~$835M) implies the market currently prices a mid-base scenario with limited upside premium.
