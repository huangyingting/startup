  topStrengths:
    - >-
      Best-in-class inline SSE architecture via proprietary NewEdge private cloud (50+ PoPs); FedRAMP High authorization
      for US federal market
    - 116% NRR and 4,733 customers (including ~1/3 of Fortune 100) demonstrate strong expansion and retention economics
    - >-
      32% YoY revenue growth sustained at $709M scale; H1 FY2026 FCF near-breakeven at −$2.2M (a 50-point improvement
      YoY)
    - AI-native DLP and AgentSkope AI agent security position Netskope for emerging enterprise AI governance spend
    - >-
      Public company multiple at ~5x NTM revenue is a 50% discount to direct SSE/SASE peers (Zscaler ~10x, Cloudflare
      ~13x)
  topRisks:
    - >-
      Microsoft Entra SSE native integration with Microsoft 365 / Entra ID creates bundling pressure at the mid-market
      and existing MSFT-centric enterprises
    - >-
      $700.3M convertible notes and $2.1B accumulated deficit constrain financial flexibility; equity dilution risk if
      conversion or secondary offering at depressed prices
    - NRR trending down (118% → 116%); further compression would impair growth durability and re-rating narrative
    - >-
      Channel concentration (95.3% indirect) limits direct customer insight and pricing power; top partner dependency
      undisclosed
    - >-
      Stock at 44% below IPO price creates employee option underwater risk and retention challenges in competitive Bay
      Area / Bangalore talent markets
  unresolvedGaps:
