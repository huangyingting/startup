  - id: market-sizing
    title: Market Sizing and Analyst Estimates
    body: >-
      Published analyst estimates for the SASE and SSE market vary significantly due to
      differences in scope definition and methodology. MarketsandMarkets, the most widely cited
      source in industry analyses, projects the global SASE market at $19.19 billion in 2026,
      growing to $68.06 billion by 2032 at a 28.8% CAGR. Mordor Intelligence offers a
      lower-bound estimate of $15.54 billion in 2026, growing to approximately $39.14 billion
      by 2031 at roughly 20% CAGR. The $97 billion forecast cited by sase.cloud for 2030
      likely includes adjacent networking markets in addition to pure SASE.

      For Netskope's specifically addressable segment (enterprise SASE with ≥500 employees,
      cloud-forward architectures), the Serviceable Addressable Market (SAM) is estimated at
      approximately $8–$10 billion in 2026, reflecting approximately 50–55% of the total
      SASE TAM after excluding SMB, government, and infrastructure-heavy sectors where
      Netskope has less product-market fit. Netskope's ARR of approximately $707 million as
      of November 2025 implies a penetration rate of roughly 3.7–4.6% of the SASE TAM, or
      approximately 7–9% of the estimated enterprise SAM. This headroom implies substantial
      growth potential even without market share gains, given the overall market is growing at
      20–29% annually.

      Contradictory outlier estimates exist: Coherent Market Insights places the SASE market at
      $59.26 billion in 2026, roughly 3× the MarketsandMarkets figure, likely using an
      exceptionally broad market definition. Global Market Insights' SASE estimate of $2.8 billion
      for 2026 appears to use a narrow SWG/CASB-only scope. These extremes illustrate the
      dependence of market size estimates on definitional boundary choices and should be
      weighted accordingly, with MarketsandMarkets and Mordor Intelligence providing the most
      commonly referenced midpoints.
