callouts:
  - calloutType: insight
    title: "Market Definitional Spread of >10× Across Analysts"
    body: >-
      SASE market estimates range from $1.55 billion (narrow SSE, 2026) to $59 billion
      (broadest zero-trust definition). Investors and acquirers citing SASE market size
      should always specify the definitional scope; MarketsandMarkets ($19.2B) and Mordor
      ($15.5B) represent the most cited midpoints for the full SASE market.
    claimRefs:
      - CM008
      - CM009
      - CM011
      - CM012

  - calloutType: strength
    title: "Regulatory Tailwinds Create Non-Discretionary Spending"
    body: >-
      EU NIS2 (effective October 2024) and DORA (January 2025) impose mandatory data
      protection and operational resilience requirements that drive CASB, DLP, and
      access-logging spending regardless of macroeconomic conditions. This regulatory
      engine represents a structural tailwind for Netskope's European pipeline.
    claimRefs:
      - CM028
      - CM029

  - calloutType: risk
    title: "SASE Growth Moderating from Pandemic Peak"
    body: >-
      ETR data from early 2026 shows SASE spending growth rates moderating from pandemic-era
      peaks. Market growth is expected to continue at 20–29% but without the extraordinary
      step-changes seen in 2020–2021. Further convergence among market leaders rather than
      accelerating new market creation is the expected near-term dynamic.
    claimRefs:
      - CM039
      - CM034

