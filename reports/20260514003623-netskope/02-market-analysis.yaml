  evidenceGaps:
    - type: private-evidence-only
      severity: material
      topic: SAM-sizing
      missingEvidence: >-
        No independent analyst has published a specific enterprise SASE SAM (500+ employees,
        cloud-forward) figure for 2026; the $8–10B estimate is a derived analytical construct.
      whyItMatters: >-
        Investors assessing Netskope's growth ceiling need a credible SAM, not just TAM;
        without it, the penetration story is directional only.
      diligencePath: >-
        Obtain analyst briefings from Gartner or IDC for enterprise SASE sub-segment sizing;
        review SEC filings of Zscaler and Palo Alto Networks for revenue base as comparable proxy.
      relatedQuestionRefs: [QM010]

    - type: missing-source
      severity: minor
      topic: Gartner-2026-MQ-update
      missingEvidence: >-
        No Gartner SASE or SSE Magic Quadrant published for 2026 was found during this
        research cycle; the most recent confirmed Gartner SSE MQ is from May 2025.
      whyItMatters: >-
        The 2026 Magic Quadrant may reflect market share shifts, entrant vendors, or
        repositioning of Netskope vs. Zscaler/Palo Alto that would affect competitive assessment.
      diligencePath: >-
        Monitor Gartner for 2026 Magic Quadrant for SSE Platforms (typically published mid-year);
        review NTSK investor relations for any Gartner citations in 2026 earnings.
      relatedQuestionRefs: [QM017]

    - type: missing-source
      severity: minor
      topic: enterprise-SASE-deployment-failures
      missingEvidence: >-
        No major publicly reported SASE deployment failures or vendor abandonments were
        found in public sources; constraint data relies on industry survey summaries.
      whyItMatters: >-
        Case-level failure examples would sharpen the adoption-constraint risk model and
        identify specific competitive displacement scenarios.
      diligencePath: >-
        Search Gartner Peer Insights, G2, and TrustRadius for negative SASE reviews;
        review RFP databases for failed SASE projects.
      relatedQuestionRefs: [QM020]

    - type: missing-source
      severity: minor
      topic: Netskope-FedRAMP-authorization
      missingEvidence: >-
        Netskope's FedRAMP authorization status as of May 2026 was not confirmed in this
        research cycle; this affects government segment opportunity sizing.
      whyItMatters: >-
        Without FedRAMP authorization, Netskope cannot compete for US federal contracts;
        this limits government segment SAM capture.
      diligencePath: >-
        Check FedRAMP.gov marketplace for Netskope listings; review NTSK 10-K for regulatory
        compliance disclosures.

