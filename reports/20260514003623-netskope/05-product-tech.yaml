company:
  name: Netskope
chapter:
  number: 5
  title: Product & Technology
  summary: >-
    Netskope One is a unified SASE/SSE platform delivered cloud-natively across the proprietary NewEdge
    network — 50+ globally distributed points of presence peered directly with Microsoft, Google, AWS,
    and other hyperscalers. The platform's Zero Trust Engine performs single-pass, context-aware
    policy evaluation for CASB, Next-Gen SWG, ZTNA (Private Access), DLP, FWaaS, and AI Security
    in one inline inspection pass, eliminating multi-hop latency from legacy appliance stacks.
    Netskope holds FedRAMP High authorization (January 2024, VA-sponsored) and is recognized as a
    Gartner SSE and SASE Magic Quadrant Leader. Key differentiators include the proprietary NewEdge
    infrastructure, a 70,000-app cloud catalog, ML-based DLP, and the recently launched AgentSkope
    for securing enterprise AI agents. Known gaps include a myopic large-enterprise focus (Gartner),
    limited console language support, integration complexity with third-party SIEM tools, and absence
    of public latency benchmarks.

sections:
  - id: platform-architecture-and-newedge
    title: Platform Architecture & NewEdge Network
    body: >-
      Netskope One is a cloud-native security platform built around three architectural pillars: the
      NewEdge Network, the Zero Trust Engine, and a unified product suite. NewEdge is Netskope's
      proprietary global cloud network with 50+ points of presence (PoPs) built entirely by Netskope —
      not leased from a third-party CDN — and connected to major SaaS providers via private peering.
      This gives enterprise traffic a direct path from the endpoint to Microsoft 365, Google Workspace,
      Salesforce, AWS, and Azure without traversing the public internet between the security inspection
      point and the application. The Zero Trust Engine performs all security checks — CASB, SWG, ZTNA,
      DLP, threat protection — in a single-pass inline cloud proxy, preserving context (user identity,
      device posture, cloud service, activity type, and data content) across all policy decisions.
      Architecture is delivered as a cloud service only; no hardware appliances are required or sold.
    claimRefs: [CE001, CE002, CE003, CE004, CE005, CE022, CE035]
    tableRefs: [TE003]
    figureRefs: [FE001]

  - id: product-module-map
    title: Product Module Map
    body: >-
      Netskope One's security product suite covers the full SSE/SASE perimeter. CASB (Cloud Access
      Security Broker) is the platform's original product, covering 70,000+ cloud services with
      inline and API-based monitoring for sanctioned and unsanctioned apps. Next-Gen SWG extends
      web gateway functionality with full TLS inspection and real-time threat protection. Private
      Access (ZTNA) replaces legacy VPN with identity-and-context-based access to private apps.
      DLP operates across data-in-motion and data-at-rest channels with ML classifiers and 3,000+
      pre-built policy templates. DSPM continuously discovers sensitive data in cloud stores (S3,
      GCS). SSPM audits SaaS configuration drift against benchmarks for M365, Salesforce, and
      GitHub. FWaaS provides cloud-native L3-L7 firewall services. Secure SD-WAN (via the
      2022 Infiot acquisition) delivers branch connectivity. AI Security products — AI Gateway,
      AI Guardrails, GenAI Security, and AgentSkope — govern enterprise use of generative AI and
      AI agent workflows. Advanced Analytics provides UEBA and cross-platform telemetry dashboards.
    claimRefs: [CE006, CE007, CE008, CE009, CE010, CE011, CE012, CE013, CE014, CE015, CE028, CE034, CE039, CE040]
    tableRefs: [TE001, TE002]
    figureRefs: []

  - id: customer-workflow-and-deployment
    title: Customer Workflow & Deployment
    body: >-
      Enterprise customers deploy the Netskope client (AgentSkope) on managed endpoints, which tunnels
      all web, cloud, and private-app traffic to the nearest NewEdge PoP via a lightweight agent
      supporting Windows, macOS, iOS, Android, and ChromeOS. For unmanaged (BYOD) scenarios,
      Netskope offers agentless reverse-proxy CASB via API integrations with major SaaS providers,
      eliminating the need for device-side software installation. The Zero Trust Engine at the PoP
      decodes the full context of each transaction — who (identity from AD, Okta, SAML), what device
      (posture score), which service (from the 70,000-app catalog), what action (download, upload,
      share), and what data (DLP classification) — before enforcing policy. Integration with
      enterprise security stacks is provided via the Cloud Exchange (CE) platform, which includes
      a public library of SIEM, SOAR, XDR, and threat intel plugins hosted on GitHub. UEBA detects
      behavioral anomalies such as unusual download volumes or off-hours access patterns.
      G2 and PeerSpot reviews highlight deployment simplicity but flag SIEM integration friction
      and occasional compatibility issues with major OS updates.
    claimRefs: [CE023, CE024, CE025, CE026, CE029, CE030, CE031, CE033, CE036]
    tableRefs: []
    figureRefs: [FE002]

  - id: technical-differentiation-and-ip
    title: Technical Differentiation & IP
    body: >-
      Netskope's primary technical moats are the proprietary NewEdge infrastructure and the
      single-pass inspection architecture. Building and owning 50+ globally distributed PoPs
      with direct peering to hyperscalers required capital that most competitors have not matched;
      the S-1 shows multi-year capital intensity (FCF deeply negative until H1 FY2026) driven in
      part by this network investment. The single-pass Zero Trust Engine contrasts with legacy
      multi-appliance stacks that inspect traffic multiple times, increasing latency. Netskope's
      ML-based DLP with OCR and the 70,000-app cloud catalog represent proprietary data assets
      accumulated over twelve years of cloud app telemetry. The AgentSkope product (launched
      February 2025) for agentic AI governance extends the Zero Trust Engine to AI agent workloads,
      a category where Netskope has an early-mover position. The netskopeoss GitHub organization
      hosts 49 public repositories, including Terraform providers for platform configuration and
      a public threat intelligence IOC feed with 157 stars, evidencing an active developer ecosystem.
    claimRefs: [CE027, CE032, CE037, CE038]
    tableRefs: []
    figureRefs: [FE003]

  - id: trust-compliance-and-product-risks
    title: Trust, Compliance & Product Risks
    body: >-
      Netskope achieved FedRAMP High Authorization for its GovCloud platform in January 2024,
      assessed by Coalfire and sponsored by the U.S. Department of Veterans Affairs. This enables
      deployment in federal environments handling highly sensitive unclassified data. Netskope also
      holds SOC 2 Type II, ISO 27001, and CSA STAR certifications per S-1 disclosure, and operates
      under a shared-responsibility cloud security model. Gartner recognized Netskope as a Leader
      in both the 2025 SSE and SASE Magic Quadrant reports, noting its strong technical capabilities
      and brand awareness. However, Gartner's 2025 assessment flagged notable weaknesses: myopic
      focus on large enterprises (limiting addressable market), limited console language support,
      and a relatively slow pace of introducing new innovations compared to Zscaler. User reviews
      on G2 and PeerSpot corroborate integration complexity with SIEM tools, higher-than-average
      pricing, and occasional OS-compatibility regressions. These known risks are partially offset
      by Netskope's FedRAMP High certification, declining support complaints over time, and the
      continued investment in product innovation evidenced by the AgentSkope, AI Gateway, and
      SD-WAN roadmap items.
    claimRefs: [CE016, CE017, CE018, CE019, CE020, CE021]
    tableRefs: [TE004, TE005]
    figureRefs: [FE004]

