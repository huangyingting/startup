figures:
  - id: FE001
    title: Product Architecture Map
    type: stack
    layout: wide
    summary: >-
      Netskope One Platform organized as four architectural layers from AI/emerging security at the
      top through the security services suite, the Zero Trust Engine control plane, and the proprietary
      NewEdge global network at the infrastructure layer. All security services share a single policy
      engine and inspection pass.
    claimRefs: [CE001, CE003, CE004, CE005, CE022, CE027, CE032]
    data:
      layers:
        - label: "AI & Emerging Security Layer"
          modules:
            - "AgentSkope (AI Agent Broker)"
            - "AI Gateway (LLM Prompt/Response Inspection)"
            - "AI Guardrails (Policy Enforcement for GenAI)"
            - "GenAI Security (Shadow AI Visibility)"
          note: "Launched Feb 2025 (AgentSkope); extends Zero Trust Engine to agentic AI workloads"
        - label: "Security Services Layer (SSE)"
          modules:
            - "CASB (70,000+ apps, inline + API)"
            - "Next-Gen SWG (TLS inspection, URL filtering)"
            - "Private Access / ZTNA (VPN replacement)"
            - "DLP (ML classifiers, 3,000+ templates)"
            - "DSPM / SSPM (cloud posture management)"
            - "FWaaS (L3–L7 firewall from PoPs)"
            - "Remote Browser Isolation (RBI)"
            - "Secure SD-WAN (Infiot, acquired 2022)"
          note: "All services run in single-pass inspection; no separate appliances required"
        - label: "Control & Intelligence Layer"
          modules:
            - "Zero Trust Engine (identity + device + app + data context)"
            - "Advanced Analytics (UEBA, cross-product telemetry)"
            - "Threat Research Labs (proprietary IOC feed)"
            - "Cloud Exchange (SIEM/SOAR/XDR plugin platform)"
          note: "Single management console; shared policy engine across all SSE products"
        - label: "Infrastructure Layer — NewEdge Network"
          modules:
            - "50+ globally distributed PoPs (proprietary, not CDN-leased)"
            - "Direct private peering: Microsoft, Google, AWS, Salesforce, Workday"
            - "Internet Exchange (IXP) interconnects for reduced latency"
            - "Netskope GovCloud (FedRAMP High, VA-sponsored)"
          note: "Proprietary network; multi-year CapEx investment; no public latency SLA published"

