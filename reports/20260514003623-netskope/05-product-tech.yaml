  evidenceGaps:
    - type: missing-source
      severity: moderate
      topic: newedge-latency-benchmarks
      missingEvidence: >-
        No public, independent latency benchmarks exist comparing Netskope NewEdge PoP inspection
        latency vs. Zscaler ZIA or Palo Alto Prisma Access for common enterprise traffic patterns.
        Netskope's marketing claims single-pass inspection reduces latency vs. multi-appliance stacks,
        but no peer-reviewed or third-party benchmark validates this claim for real-world enterprise
        scenarios (QE018).
      whyItMatters: >-
        Latency-sensitive use cases (VoIP, real-time collaboration, high-frequency cloud app users)
        are a key decision criterion for SASE platform selection. Without independent benchmarks,
        enterprise buyers cannot objectively compare Netskope's claimed latency advantage, and
        Gartner's critique of slow innovation pace may mask underperformance in this area.
      diligencePath: >-
        Request a proof-of-concept with latency measurement from Netskope for the enterprise's
        dominant cloud app usage patterns. Compare against Zscaler POC. Reference SE18K or
        independent SSE benchmark reports if published. Check ENT-specific reference customer
        performance data under NDA.
      relatedQuestionRefs: [QE018]

    - type: missing-source
      severity: moderate
      topic: sd-wan-infiot-integration-depth
      missingEvidence: >-
        The depth of technical integration between Netskope's SSE platform and the acquired Infiot
        SD-WAN technology is not publicly verifiable. Netskope markets a single-vendor SASE offering,
        but independent analysts (Gartner, Forrester) have not explicitly validated that the Infiot
        SD-WAN and Netskope SSE share a unified management plane or data plane, vs. being loosely
        coupled via APIs. Questions QE010 and QE024 remain partially unanswered.
      whyItMatters: >-
        A loosely integrated SD-WAN bolt-on reduces the operational simplicity advantage Netskope
        claims vs. Zscaler + third-party SD-WAN combinations. Branch office deployments may require
        separate management consoles, undermining the single-vendor SASE value proposition and
        increasing deployment complexity.
      diligencePath: >-
        Request a SASE architecture reference document showing SD-WAN control and data plane
        integration with the Zero Trust Engine. Review joint customer case studies. Ask Gartner
        for unpublished details from the 2025 SASE MQ research on SD-WAN integration maturity.
      relatedQuestionRefs: [QE010]

    - type: private-evidence-only
      severity: minor
      topic: dlp-classification-accuracy-benchmarks
      missingEvidence: >-
        Netskope does not publish DLP classification accuracy metrics, false-positive rates, or
        performance benchmarks comparing its ML-based classifiers to legacy on-premises DLP vendors.
        Questions QE025 (DLP comparison vs. Symantec/Forcepoint) remain unresolved, and QE027
        (patent portfolio) is undisclosed because relevant IP is maintained as trade secrets.
      whyItMatters: >-
        Enterprise buyers in regulated industries (healthcare, financial services) rely on DLP
        accuracy rates and regulatory coverage to justify procurement. Without public benchmarks,
        the differentiation claim of Netskope's ML-based DLP vs. incumbent vendors is unverifiable
        pre-purchase, increasing sales cycle friction and implementation risk.
      diligencePath: >-
        Request enterprise reference contacts from Netskope in peer industries (FSRV, HIPAA-covered
        entities) for DLP accuracy validation. Review any published Netskope CISA advisory partnerships
        or government customer performance reports. Request patent portfolio summary under NDA.
      relatedQuestionRefs: [QE012, QE025, QE027]
