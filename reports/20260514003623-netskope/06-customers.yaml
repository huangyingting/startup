    - Mixed enterprise / mid-market
    - Medium (TrustRadius)
    - 35 reviews is a thin sample for a 4,733-customer base; request access to Gartner PI or G2 detailed review data
  - - Support satisfaction
    - Mixed — proactive at premium tier; poor response times reported at standard tier
    - All customers
    - Medium (PeerSpot/TrustRadius)
    - Request CSAT or NPS scores by support tier; check if SLAs vary by ARR band
  notes: "NRR and GRR are the primary retention metrics disclosed by Netskope. Absolute renewal rate % is not disclosed. TrustRadius and PeerSpot
