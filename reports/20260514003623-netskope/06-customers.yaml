company:
  name: Netskope

chapter:
  number: 6
  title: Customers
  summary: |-
    Netskope had 4,733 customers as of January 31, 2026 (+21% YoY), with approximately one-third of the Fortune 100 and 19% of the Forbes Global 2000. NRR was 116% (FY2026, 10-K) with GRR ~96% (S-1). Five named production deployments (BDO UK, Colgate-Palmolive, Orbia, ManTech International, GBfoods) provide quantified outcomes. Channel partners accounted for 95.3% of FY2026 revenue. Adverse evidence from PeerSpot and TrustRadius consistently identifies support quality, SSL inspection friction, and admin complexity as recurring pain points.
sections:
- id: customer-base-overview
  title: "Customer Base Overview"
  body: >
    As of January 31, 2026, Netskope reported 4,733 customers, a 21% year-over-year increase from
    3,913 at January 31, 2025. Approximately one-third of the Fortune 100 and 19% of the Forbes
    Global 2000 are customers. Large enterprises dominate the mix: 1,531 customers have ARR over
    $100,000, representing 86% of total ARR—up 22% YoY. Revenue skews toward the Americas (56%)
    with EMEA at 25% and APJ at 19%. Channel partners account for 95.3% of revenue, consistent
    with a land-and-expand motion mediated largely by resellers and MSSPs. Primary buyer personas
    are CISOs and CIOs in regulated industries including financial services, healthcare, technology,
    and government. The customer base spans large-enterprise and mid-market segments, with growing
    public sector penetration post-FedRAMP High authorization in January 2024.
  claimRefs: [CU001, CU002, CU003, CU004, CU005, CU006, CU007, CU008]
  tableRefs: [TU001, TU002]
  figureRefs: [FU001, FU002]

- id: named-customer-proof
  title: "Named Customer Proof"
  body: >
    Netskope's customer page highlights five named production deployments spanning professional
    services, consumer goods, chemicals, defense, and food manufacturing. BDO UK (8,000+ employees,
    #5 global accounting firm) deployed CASB, Next-Gen SWG, and Private Access—achieving near-zero
    VPN outages (availability improved from 98.5% to 99.9%) and automated AI content controls for
    ChatGPT. Colgate-Palmolive (34,000 employees, 200+ countries) deployed CASB and DLP to protect
    formulas and R&D IP across a multinational environment. Orbia (24,000 employees) deployed SSE
    across 200 sites and 14,000 users in four months with 10× threat-prevention improvement and
    less than one year payback. ManTech International deployed Zero Trust architecture with no
    end-user friction. GBfoods replaced legacy VPNs with Netskope's centralized cloud platform.
    All five are explicitly production deployments with quoted outcomes, not pilot references.
  claimRefs: [CU009, CU010, CU011, CU012, CU013, CU014, CU015, CU016, CU017, CU018]
  tableRefs: [TU003]
  figureRefs: [FU003]

- id: retention-and-durability
  title: "Retention and Durability"
  body: >
    Net Revenue Retention (NRR) was 116% at January 31, 2026, up from 113% at January 31, 2025
    (10-K). The S-1 reported Gross Revenue Retention (GRR) of 96% as of July 31, 2025, indicating
    very low gross churn. A substantial majority of customers have 1–3-year subscription contracts
    billed annually. Netskope is transitioning multi-year billing to annual billing, compressing
    deferred revenue growth but not underlying retention. The company holds a 4.8/5 rating on
    Gartner Peer Insights for SSE (as of June 2025), a 4.6/5 for SASE, and 8.8/10 on TrustRadius
    across 35 reviews. These peer ratings indicate strong retention intent; however, independent
    quantification of renewal rates by cohort or vertical is not publicly disclosed.
  claimRefs: [CU019, CU020, CU021, CU022, CU023, CU024, CU025]
  tableRefs: [TU004]
  figureRefs: [FU004]

- id: expansion-and-concentration
  title: "Expansion and Concentration Risk"
  body: >
    Netskope's land-and-expand model typically begins with CASB or SWG adoption, followed by
    upsell into ZTNA/Private Access, DLP, SD-WAN, and AI Gateway. Case studies document this
    pattern: BDO started with CASB and added SWG and Private Access; Orbia began with SWG and
    CASB and layered in FWaaS and DLP. Channel partner concentration is significant: 95.3% of
    FY2026 revenue ($675.7M) flowed through indirect channels; direct end-customer revenue was
    only $33.3M (4.7%). Top customer ARR concentration is not publicly disclosed, but the large
    1,531-customer $100K+ ARR segment ($600M+ implied) suggests no single customer dominance.
    Geographic growth is weighted toward Americas; EMEA and APJ represent expansion levers. The
    Microsoft partnership (Purview, Sentinel, Copilot integrations) creates a co-sell opportunity
    but also a competitive adjacency risk if Microsoft deepens native SSE capabilities.
  claimRefs: [CU026, CU027, CU028, CU029, CU030, CU031, CU032, CU033]
  tableRefs: [TU005]
  figureRefs: []

- id: adverse-signals
  title: "Adverse Evidence and Customer Complaints"
  body: >
    Independent review platforms surface recurring friction points. PeerSpot aggregates feedback
    noting poor support quality as a consistent issue—one reviewer stated the support team provided
    a bad experience during a critical escalation. SSL/TLS inspection via man-in-the-middle proxy
    causes compatibility issues with sensitive enterprise applications requiring fine-tuning.
    Administrative complexity—setup, migration, and policy management—is cited across TrustRadius
    and PeerSpot as a barrier to self-sufficient operation. Some reviewers in Asia-Pacific noted
    latency issues in specific regions (Philippines mentioned). Pricing is consistently characterized
    as "medium to expensive" compared to Zscaler and Microsoft, which may impede mid-market
    expansion. NRR declined from 118% (H1 FY2026, per S-1) to 116% (FY2026 full year, per 10-K),
    suggesting modest second-half softness or increased contraction. These adverse signals are
    consistent with a broad-platform vendor selling to complex enterprise environments where
    deployment friction is expected but manageable at the 116% NRR level.
  claimRefs: [CU034, CU035, CU036, CU037, CU038, CU039, CU040]
  tableRefs: []
  figureRefs: []

