  evidenceGaps:
  - id: customer-top-concentration-undisclosed
    title: "Top Customer Revenue Concentration Not Disclosed"
    description: >
      Netskope does not disclose the percentage of ARR or revenue attributable to its top 10 or
      top 25 customers in public filings. With 95.3% of revenue through indirect channels, direct
      customer-level concentration is also obscured by partner aggregation. This is a standard
      gap for enterprise SaaS companies but limits diligence on concentration risk.
    impact: medium
    relatedQuestionRefs: [QU018]
    type: private-evidence-only
    severity: minor
    topic: customer-concentration
    missingEvidence: Top 10 and top 25 customer ARR concentration percentages, direct customer-level revenue breakdown, partner-by-partner 
      revenue split.
    whyItMatters: Customer concentration affects revenue risk profile. High concentration in a few large accounts or a few channel partners 
      creates vulnerability to churn or partner loss that is not visible in aggregate metrics.
    diligencePath: Request top 10/25 customer ARR breakdown and top 5 channel partner revenue concentration in management presentation. 
      Review channel partner agreements for termination clauses.
  - id: post-10k-arr-not-disclosed
    title: "Total ARR Not Disclosed in FY2026 10-K"
    description: >
      The FY2026 10-K (January 31, 2026) does not disclose absolute ARR. The most recent ARR
      figure is $707M from the S-1 (as of July 31, 2025). Given FY2026 revenue of $709M and
      NRR of 116%, ARR as of January 31, 2026 is estimated between $800M and $900M but this
      cannot be confirmed without a public disclosure. Quarterly earnings calls post-10-K may
      provide updated ARR.
    impact: low
    relatedQuestionRefs: [QU019]
    type: private-evidence-only
    severity: minor
    topic: arr-disclosure
    missingEvidence: Total ARR as of January 31, 2026. The 10-K does not disclose ARR; last ARR disclosure was $707M as of July 31, 2025 per
      the S-1.
    whyItMatters: ARR is the primary growth indicator for SaaS businesses. Without a January 2026 ARR figure, forward revenue visibility 
      relies on the July 2025 baseline plus growth inferences from NRR trends.
    diligencePath: Monitor quarterly earnings releases and investor day presentations post-10-K. Request ARR as of Q4 FY2026 in diligence 
      data room. Estimate from revenue * (1+NRR-expansion-pct) as proxy.
  - id: competitive-win-rate-not-public
    title: "Competitive Win Rate Against Zscaler and Palo Alto Not Disclosed"
    description: >
      Netskope does not disclose win rates in competitive situations, deal pipeline conversion
      rates, or displacement statistics. PeerSpot/TrustRadius review comparisons provide
      qualitative customer perspective (pricing relative to Zscaler, admin complexity vs.
      Microsoft), but no quantitative competitive win data is available publicly. Internal
      analysis or channel partner interviews would be required to estimate win rates.
    impact: medium
    relatedQuestionRefs: [QU021]
    type: missing-source
    severity: minor
    topic: competitive-win-rate
    missingEvidence: Competitive win rates against Zscaler and Palo Alto Prisma SASE, pipeline conversion rates, and displacement statistics
      in head-to-head competitive situations.
    whyItMatters: Win rate against Zscaler is a key indicator of Netskope's competitive position in the core SSE market. Declining win rates
      would be an early warning signal before NRR compression appears.
    diligencePath: Request competitive win/loss analysis from management. Cross-reference with channel partner interviews. Review Gartner 
      Magic Quadrant evaluation criteria and customer decision rationale.
  - id: named-customer-proof-partial
    title: Named Customer Proof Table Is a Sample Only
    description: |-
      Five named production deployments are publicly documented on netskope.com/customers as of June 2025. With 4,733 total customers, this is a representative sample, not an exhaustive enumeration. No named customers from financial services, healthcare, or public sector are in public case studies. Quality of proof varies: BDO and Orbia have detailed published case studies with quantified outcomes; ManTech and GBfoods have testimonial-level evidence only. Complete customer reference lists are not publicly disclosed.
    impact: medium
    relatedTableRefs:
    - TU003
    relatedQuestionRefs:
    - QU009
    - QU013
    type: enumeration-incomplete
    severity: minor
    topic: named-customers
    missingEvidence: Named production customer deployments beyond the five documented on netskope.com/customers. No public case studies from
      financial services, healthcare, or federal government verticals exist. Full customer reference list is proprietary.
    whyItMatters: The five named customers are a representative sample of 4,733 total. Absence of named customers in high-value regulated 
      verticals (financial services, healthcare, federal) limits proof of penetration in these premium-margin segments.
    diligencePath: Request curated reference customer list for financial services and healthcare verticals. Review FedRAMP marketplace for 
      listed agency customers. Engage Gartner and Forrester Wave analysts for anonymized reference context.
