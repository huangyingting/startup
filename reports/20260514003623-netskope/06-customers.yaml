- id: TU005
  title: Expansion and Concentration Risk Table
  columns:
  - Expansion Driver
  - Concentration Risk
  - Impact
  - Diligence Path
  rows:
  - - 'Product cross-sell: CASB → ZTNA → DLP → Analytics'
    - Product-module revenue concentration within accounts
    - 'High positive: land-and-expand drives 116% NRR'
    - Request multi-product adoption rate by cohort; how many customers have ≥3 products?
  - - AI security upsell (AI Gateway, Guardrails, AgentSkope)
    - Revenue tied to GenAI adoption pace in enterprise
    - 'Medium positive: early mover advantage but rapid competitor replication'
    - Track AI Gateway customer count and ARR separately; monitor Zscaler/PANW AI security releases
  - - Channel partner dependence
    - 95.3% indirect revenue; top partners undisclosed
    - 'High negative: any major partner loss directly impairs revenue'
    - Request top-10 partner revenue concentration %; confirm partner contract exclusivity/non-exclusivity
  - - Microsoft partnership (Purview, Sentinel, Copilot)
    - Co-sell creates dependency on Microsoft relationship continuity
    - Medium positive near-term; medium negative long-term if Microsoft expands native SSE
    - Monitor Microsoft Entra SSE expansion roadmap; assess if Microsoft partnership cannibalizes Netskope sales
  - - Public sector growth
    - Complex procurement; FedRAMP requirement creates barrier but also moat
    - 'Medium positive: underexploited $5B+ US federal cybersecurity TAM'
    - Track FedRAMP-authorized revenue growth; confirm VA sponsorship renewal; assess state/local progress
  - - Geographic expansion (EMEA / APJ)
    - EMEA/APJ regulatory complexity (GDPR, data localization)
    - 'Medium positive: 43.5% of revenue already international'
    - Request EMEA/APJ NRR vs. Americas NRR; assess latency complaints in APJ impact on renewal
  notes: "Customer concentration data (top 10/25 customers as % of ARR) is not publicly disclosed. The indirect channel model means Netskope has
    limited direct visibility into end-customer concentration. The Microsoft partnership is both the largest expansion opportunity and the largest
    competitive dependency risk."
