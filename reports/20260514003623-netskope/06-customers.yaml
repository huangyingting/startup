  - - Gross Revenue Retention (GRR)
    - 96% (Jul 31, 2025, per S-1)
    - All customers
    - High (S-1 filing)
    - Confirm GRR as of January 31, 2026; verify whether annual billing transition affected gross churn calculation
  - - NRR trend (H1 vs. full-year FY2026)
    - 118% (H1 FY2026, S-1) → 116% (FY2026 full year, 10-K)
    - All customers
    - High (two filings)
    - 'Investigate drivers of H2 compression: price contraction, churn in mid-market, or billing timing effects'
  - - Contract term
    - 1–3 years; annual billing (majority)
    - All customers
    - High (10-K)
    - Request renewal rate % and average contract duration at renewal; confirm if enterprise contracts skew to 3-year
  - - Gartner Peer Insights — SSE
    - 4.8/5 (as of June 12, 2025)
    - Enterprise IT practitioners
    - High (Gartner PI)
    - Monitor score changes; check reviews for consistent pain-point themes vs. isolated issues
  - - Gartner Peer Insights — SASE
    - 4.6/5 (as of June 13, 2025)
    - Enterprise IT practitioners
    - High (Gartner PI)
    - Same as above; SASE score slightly lower may reflect newer product maturity
