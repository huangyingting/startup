  - id: funding-history-investors
    title: Funding History and Investor Base
    body: >-
      Netskope raised approximately $1.44 billion across nine rounds before its September 2025
      IPO. The funding trajectory began with $5.5 million in seed capital from Social Capital in
      2013 and progressed through progressively larger venture rounds. The company reached unicorn
      status in November 2018 with its $168.7 million Series F led by Lightspeed Venture Partners,
      valuing the business above $1 billion. The Series G in February 2020 ($340 million, Sequoia
      Capital) approximately tripled the valuation to $3 billion during peak pandemic-era
      cloud-security demand, with Private Access also launching that month.

      The Series H in July 2021 ($300 million, ICONIQ Growth) set the pre-IPO high-water mark at
      $7.5 billion. A January 2023 convertible note round raised $401 million led by Morgan
      Stanley—the largest pre-IPO financing—with participation from Goldman Sachs Asset Management,
      Ontario Teachers' Pension Plan (OTPP), and CPP Investments. This institutional validation
      maintained the $7.5 billion valuation. However, secondary market analysis from PM Insights
      indicated an implied valuation of approximately $5.12 billion by August 2025, a 31.73%
      discount to the Series H—reflecting broader enterprise SaaS multiple compression. That
      secondary market discount compared to a $7.3 billion IPO valuation suggests the public
      markets valued the company at a premium relative to late private-market sentiment.

      The IPO raised approximately $908 million (gross) at $19 per share and was 20+ times
      oversubscribed. With the over-allotment, total net proceeds reached $992.2 million. Key
      long-term venture backers include ICONIQ Capital, Sequoia Capital, Lightspeed Venture
      Partners, Accel, and Sapphire Ventures—with institutional involvement from Goldman Sachs,
      Morgan Stanley, CPP Investments, and OTPP rounding out a well-diversified cap table.
