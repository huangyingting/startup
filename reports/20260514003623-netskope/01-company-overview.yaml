chapter:
  number: 1
  title: Company Overview
  summary: >-
    Netskope, founded in 2012 and headquartered in Santa Clara, California, went public on the
    Nasdaq (NTSK) on September 18, 2025, raising approximately $992 million in net proceeds.
    Its cloud-native Netskope One platform delivers CASB, SWG, ZTNA, DLP, FWaaS, and SD-WAN
    capabilities to over 4,000 enterprises including 30%+ of the Fortune 100, with ARR of
    approximately $707 million as of late 2025 and H1 2025 revenue of $328 million.

sections:
  - id: identity-and-business-model
    title: Company Identity and Business Model
    body: >-
      Netskope, Inc. is a cybersecurity company providing a unified cloud-native security and
      networking platform headquartered at 2445 Augustine Drive, Suite 301, Santa Clara,
      California 95054. Originally incorporated in 2012 as Skope, Inc., it adopted the Netskope
      name in November 2012. The company went public on the Nasdaq Global Select Market on
      September 18, 2025 under the ticker symbol NTSK, completing one of the largest cybersecurity
      IPOs of the year with gross proceeds of approximately $908 million and net proceeds of
      approximately $992.2 million after the full exercise of the underwriters' over-allotment
      option.

      Netskope's core business is the delivery of Security Service Edge (SSE) and Secure Access
      Service Edge (SASE) capabilities through its Netskope One platform—a unified, cloud-native
      solution integrating security and networking. Product offerings span Cloud Access Security
      Broker (CASB), Next-Generation Secure Web Gateway (SWG), Zero Trust Network Access (ZTNA),
      Data Loss Prevention (DLP), Cloud Security Posture Management (CSPM), Firewall-as-a-Service
      (FWaaS), and Software-Defined Wide Area Network (SD-WAN). The Zero Trust Engine enforces
      real-time, context-aware policies for users, devices, and data across cloud, SaaS, and
      private application environments. Delivery is via the proprietary NewEdge network, launched
      in 2019 with 50 initial points of presence and subsequently expanded to more than 60 global
      data centers.

      The company operates a subscription-based SaaS business model, generating recurring revenue
      primarily through multi-year enterprise contracts priced by user count, data volume, features
      deployed, and support tier. Customers typically begin with core modules such as CASB or SWG
      and expand via cross-sell into ZTNA, FWaaS, and advanced analytics, driving high net
      retention and growing average revenue per customer over time. As of the IPO S-1 filing,
      Netskope reported $600 million in annual revenue for fiscal 2024, growing to an ARR
      exceeding $700 million by late 2025 reflecting sustained 30%+ year-over-year growth.
