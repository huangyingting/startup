  - calloutType: risk
    title: "Post-IPO Stock Performance Below Offering Price"
    body: >-
      NTSK traded at approximately $10.56 as of May 13, 2026—roughly 44% below the $19 IPO
      price—indicating disappointing post-IPO market performance. This could pressure management,
      create overhang from lock-up expirations (~March 2026), and complicate employee equity
      retention.
    claimRefs:
      - CO052
      - CO018
      - CO019

