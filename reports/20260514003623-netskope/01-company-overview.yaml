  - id: scale-metrics-market-position
    title: Scale, Financial Metrics, and Market Position
    body: >-
      As of late 2025, Netskope serves more than 4,000 enterprise customers across 30+ countries,
      including more than 30% of the Fortune 100. The company employs approximately 3,100 people
      globally, with concentrations in North America (~1,600), Asia (~977), and Europe (~413),
      operating offices in Santa Clara, St. Louis, Sydney, Brussels, São Paulo, Bengaluru, Tokyo,
      and Singapore.

      Revenue reached $600 million in fiscal year 2024 and grew to an ARR of approximately $707
      million by November 2025. First-half 2025 revenue was $328 million (up from $251 million in
      H1 2024), representing approximately 30% year-over-year growth. Despite this scale, Netskope
      operates at a net loss: H1 2025 net loss of $170 million improved from $207 million in H1
      2024, with the company targeting positive free cash flow in fiscal 2025. The FY2025 10-K
      annual report was filed with the SEC on March 31, 2026, but detailed financials including
      gross margin, NRR, and unit economics were not retrieved in this research cycle.

      Netskope has been named a Leader in the Gartner Magic Quadrant for SASE Platforms and SSE
      for four consecutive years through May 2025, alongside Zscaler and Palo Alto Networks. The
      company's NewEdge network, expanded to 60+ global data centers from its 2019 launch,
      provides real-time security without performance degradation—a key enterprise selling point.
      NTSK shares traded at approximately $10.56 at the close of May 13, 2026, approximately
      44% below the $19 IPO price, reflecting post-debut market conditions.

      Key unsupported metrics as of this report's runDate include gross margin percentage,
      net revenue retention rate, and customer acquisition cost—all private disclosures pending
      review of the March 2026 10-K.
