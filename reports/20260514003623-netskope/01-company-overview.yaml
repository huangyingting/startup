  - id: milestones
    title: Key Milestones
    body: >-
      Netskope's history spans from 2012 inception through multiple financing, product, and
      governance milestones. The company emerged from stealth in October 2013 with its first
      publicly available CASB product, and Enrique Salem joined the board that month. The July
      2017 acquisition of Sift Security added IaaS cloud security capabilities. NewEdge network
      infrastructure launched in July 2019. The February 2020 Series G and simultaneous launch
      of Private Access leveraged COVID-driven remote-work demand to accelerate growth.

      The Series H in July 2021 reached a $7.5 billion valuation—the pre-IPO high-water mark.
      The January 2023 convertible note round, at a maintained $7.5 billion valuation, saw Goldman
      Sachs and Morgan Stanley join the cap table. By August 2025, secondary market data showed
      the implied valuation had declined to ~$5.1 billion before the S-1 was filed that month.
      The IPO priced at $19/share on September 17, 2025, began trading September 18, and closed
      with full over-allotment by September 22, raising $992.2 million net. NTSK now trades as a
      public security on Nasdaq, with quarterly earnings obligations and lock-up expirations
      (typically 180 days post-IPO, around March 2026) adding structural overhang.

      Notable adverse flags include the departure of co-founder Lebin Cheng in 2018, the
      secondary-market valuation decline from $7.5 billion to ~$5.1 billion between 2021 and
      mid-2025, and NTSK stock trading approximately 44% below the IPO price as of May 2026.
      No mass layoffs specific to Netskope were confirmed in public sources through the runDate.
