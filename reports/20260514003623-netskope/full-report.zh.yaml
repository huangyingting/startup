- id: TR002
  title: 运营与安全风险台账
  columns:
  - 风险
  - 类别
  - 可能性
  - 影响
  - 当前缓释措施
  - 剩余敞口
  - 监控指标
  rows:
  - - 通过内联代理的安全漏洞（经 NewEdge 的数据泄露）
    - 安全
    - Low-Medium
    - Critical
    - ISO 27001/27701、SOC 2 Type II、FedRAMP High；自有接入节点基础设施；数据路径中无第三方 CDN；渗透测试；漏洞赏金计划
    - 单次漏洞事件可能引发大规模客户流失和 SEC 网络安全披露；因代理架构，品牌损害远超事件本身规模
    - 监控 SEC 8-K 网络安全披露；追踪 NewEdge 组件的 CVE 披露；检查 status.netskope.com 未披露事件
  - - SSL/TLS 检查中断——证书钉扎与金融应用兼容性
    - 运营
    - Medium
    - Medium
    - 按应用配置 SSL 绕过策略；发布绕过配置指南；客户成功主导的引导流程调优排除列表
    - 客户持续反映不满（G2、Capterra、eSecurityPlanet 评价印证）；支持升级；金融服务行业流失风险加大
    - 追踪 SSL 相关支持工单量；每季度监控 G2/Capterra 评价主题；按行业审查 NRR
  - - NewEdge 接入节点宕机或区域可用性中断
    - 基础设施
    - Low
    - High
    - 全球 50+ 自有接入节点；地理冗余；含事件历史的公开状态页面；合同中的 SLA 承诺
    - 接入节点集中于主要都会区；区域宕机影响该地理范围内所有客户；触发合同 SLA 违约信用额度
    - 监控 status.netskope.com 运行时间历史；追踪客户合同中的 SLA 信用条款；审查 APJ 接入节点密度（占收入 18.5%）
  - - AI 驱动 DLP 误报/漏报率
    - 产品
    - Medium
    - Medium
    - 持续模型重训练；客户可配置的敏感度阈值；例外工作流；高严重度告警人工审核
    - 误报阻断合法业务流程并增加管理负担；漏报允许真实数据泄露；两者均削弱对 DLP 产品的信心
    - 追踪与 DLP 精度相关的支持升级；监控评价平台中的 DLP 质量负面提及；审查产品文档中的精度基准
  - - 支持质量——响应时间与升级处理
    - 客户成功
    - Medium
    - Medium
    - 24/7 全球支持层级；企业账户配备专属客户成功经理；渠道账户提供合作伙伴支持
    - PeerSpot/G2/Capterra 的负面评价持续引用升级响应迟缓问题；支持质量差距可能在续约时造成 NRR 收窄
    - 追踪 NPS/CSAT 评分；监控 G2/Capterra 支持相关评价主题；审查支持工单先于不续约的流失队列
  - - 产品复杂性与策略管理的管理员开销
