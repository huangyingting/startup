      - AI Gateway（LLM提示词/响应检测）
      - AI Guardrails（生成式AI策略执行）
      - GenAI Security（Shadow AI可见性）
      note: Launched Feb 2025 (AgentSkope); extends Zero Trust Engine to agentic AI workloads
    - label: 安全服务层（SSE）
      modules:
      - CASB（70,000+应用，内联+API）
      - 下一代SWG（TLS检测、URL过滤）
      - Private Access / ZTNA（VPN替代方案）
      - DLP（机器学习分类器，3,000+模板）
      - DSPM / SSPM（云态势管理）
      - FWaaS（基于接入节点的L3-L7防火墙）
      - 远程浏览器隔离（RBI）
      - 安全SD-WAN（Infiot，2022年收购）
      note: All services run in single-pass inspection; no separate appliances required
    - label: 控制与智能层
      modules:
      - 零信任引擎（身份+设备+应用+数据上下文）
      - 高级分析（UEBA、跨产品遥测）
      - 威胁研究实验室（专有IOC情报）
      - Cloud Exchange（SIEM/SOAR/XDR插件平台）
      note: Single management console; shared policy engine across all SSE products
    - label: 基础设施层——NewEdge网络
      modules:
      - 50+全球分布接入节点（自有，非CDN租用）
      - 直接专有对等互联：Microsoft、Google、AWS、Salesforce、Workday
      - 互联网交换节点（IXP）互联以降低延迟
      - Netskope GovCloud（FedRAMP High，VA资助）
