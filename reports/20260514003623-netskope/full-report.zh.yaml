  - number: '1.3'
    title: 融资历史与投资者构成
    blocks:
    - type: paragraph
      body: >-
        Netskope 在2025年9月 IPO 前共完成九轮融资，累计筹资约 $1.44B。融资历程始于2013年 Social Capital 提供的 $5.5M
        种子资金，此后历经规模持续扩大的风险投资轮次。公司于2018年11月以 Lightspeed Venture Partners 主导的 $168.7M F 轮融资晋升独角兽地位，估值突破 $1B。2020年2月的
        G 轮融资（$340M，Sequoia Capital 领投）将估值约提升至三倍至 $3B，同期恰逢疫情驱动的云安全需求高峰，Private Access 亦于当月推出。

        2021年7月的 H 轮融资（$300M，ICONIQ Growth 领投）将 IPO 前估值高水位推至 $7.5B。2023年1月的可转换票据轮由 Morgan Stanley 主导，募集
        $401M，系最大规模 IPO 前融资，Goldman Sachs Asset Management、安大略省教师养老金计划（OTPP）及 CPP Investments 参与其中，维持了 $7.5B
        估值。然而，PM Insights 二级市场分析显示，至2025年8月，隐含估值降至约 $5.12B，较 H 轮折价31.73%，折射出企业 SaaS 估值倍数的整体压缩。该二级市场折价与 $7.3B 的 IPO
        估值相比，表明公开市场对公司的定价高于私募市场末期情绪。

        IPO 以每股 $19 募集约 $908M（总收益），认购超额达20倍以上。含超额配售后，净收益合计达 $992.2M。主要长期风险投资支持方包括 ICONIQ Capital、Sequoia
        Capital、Lightspeed Venture Partners、Accel 及 Sapphire Ventures——Goldman Sachs、Morgan Stanley、CPP
        Investments 及 OTPP 的机构参与进一步完善了多元化股权结构。
