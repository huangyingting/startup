  - number: '4.3'
    title: 成本结构与毛利率
    blocks:
    - type: paragraph
      body: >-
        毛利率扩张是 Netskope S-1 中最亮眼的财务趋势。毛利率从 FY2024的59.8%提升至 FY2025的64.6%，再至 H1
        FY2026的70.9%——约18个月内提升逾1,100个基点。这一轨迹由 NewEdge 私有网络（全球120余个 PoP）的规模杠杆驱动：固定基础设施成本随 ARR
        增长摊薄至更大订阅基数。逼近70%+毛利率区间，使 Netskope 得以与 Zscaler 79%毛利率并肩，成为可信的 SaaS 基础设施混合型企业。

        FY2025运营费用合计 $603.6M（占收入112%），毛利润为 $347.9M，产生营业亏损 $(255.7M)，营业利润率为-47.5%。H1 FY2026运营费用 $324.1M、毛利润
        $232.8M，产生营业亏损 $(91.3M)，利润率为-27.8%——一年改善20个百分点。非GAAP 营业亏损（主要调整股权激励）从 H1 FY2025的 $(123M) 改善至 H1 FY2026的
        $(63M)，改善幅度49%。最近五个季度增量非GAAP 营业利润率分别为12%、72%、72%、100%及58%，表明边际收入贡献现已高度盈利。股权激励持续下降：FY2024为 $61.0M，FY2025为
        $50.8M，H1 FY2026为 $17.6M。
