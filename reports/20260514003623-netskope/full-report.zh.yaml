- id: TR001
  title: 监管/法律风险台账
  columns:
  - 风险/规则
  - 司法管辖区
  - 当前状态
  - 可能性
  - 严重程度
  - 缓释措施
  - 剩余敞口
  - 尽调路径
  rows:
  - - GDPR——欧盟数据隐私与跨境传输限制
    - 欧盟/欧洲经济区（+ 英国 GDPR）
    - 活跃——DPA 已发布；ISO 27701 认证；欧盟接入节点保障数据驻留
    - Medium
    - High
    - 与客户签订数据处理协议（DPA）；欧美数据传输采用标准合同条款（SCC）；通过 EMEA 接入节点实现欧盟数据驻留；ISO 27701 隐私认证
    - 若 SCC 失效或 DPA 模板遗漏分处理者义务将面临执法行动；Schrems III 诉讼可能使现有传输机制无效
    - 核实 DPA 模板完整性；确认 SCC 覆盖所有分处理者；检查产品中的数据驻留切换功能
  - - CCPA/CPRA——加利福尼亚州消费者隐私
    - 美国加利福尼亚州
    - 活跃——通过企业客户流量处理消费者数据
    - Low-Medium
    - Medium
    - 以企业处理为主；适用企业间豁免条款；隐私政策已发布
    - CPRA 下 B2B 豁免范围收窄；若企业客户利用 Netskope 处理的数据违反 CCPA，Netskope 面临连带责任
    - 确认所有产品线的 B2B 豁免覆盖范围；审查数据销售/共享的退出流程
  - - FedRAMP High——年度 3PAO 审计与持续监控
    - 美国（联邦）
    - 活跃——2024 年 1 月获授权（FR2019032016）；VA 赞助；持续监控进行中
    - Low
    - High
    - 专用 GovCloud 环境；年度 3PAO 评估；ISSO 团队负责持续监控；FedRAMP 市场清单当前有效
    - 若持续监控发现问题未整改将面临授权撤销；重大变更审批可能延误；联邦合同管线面临风险
    - 核实 3PAO 评估时效性；检查 FedRAMP 控制面板中的未结行动方案（POA&M）；确认 ISSO 人员配置
  - - 国际数据隐私——PDPL（沙特阿拉伯）、PDPA（泰国/新加坡）、LGPD（巴西）
    - 亚太地区/拉丁美洲（多个司法管辖区）
    - 新兴——客户合同持续扩展；本地法律审查进行中
    - Medium
    - Medium
    - 通过区域接入节点提供数据本地化选项；聘请当地法律顾问；按司法管辖区签订合同性 DPA
    - 无本地接入节点的市场面临监管罚款；过渡期间法律不确定性；合同重新谈判成本
    - 将客户合同司法管辖区映射至接入节点覆盖范围；确认 PDPL/LGPD 合规缺口评估已完成
  - - SSL/TLS 中间人检查——ECPA 与雇员监控法规
    - 美国（联邦+州级）、欧盟、亚太地区
    - 有条件——需获得同意和发出通知；因司法管辖区而异
    - Low-Medium
    - Medium
    - 客户负责通知员工并获取同意；Netskope 为敏感应用类别提供绕过控制；产品文档涵盖合规指南
    - 若员工监控策略不完善，企业客户面临民事责任；欧盟《GDPR》第 88 条（员工数据）下的监管审查
    - 审查产品级同意/绕过文档；确认客户可接受使用政策涵盖员工监控；测试受监管应用类别的绕过策略
  - - 出口管制——TLS 检查技术的 EAR/两用风险
    - 美国（联邦）、英国、欧盟
    - 潜在——未披露执法行动；技术尚在审查中
    - Low
    - Medium
    - 产品分类法律审查；无已披露的出口合规问题；标准企业软件授权
    - TLS 检查若被列为两用技术，将限制在制裁司法管辖区的销售；出口许可要求产生摩擦
    - 委托开展 SSL 检查引擎的 EAR ECCN 分类审查；确认客户部署的当前司法管辖区
  notes: >-
    可能性与严重程度为截至 2026 年 5 月监管环境分析、公开披露及行业基准的定性评估。根据 FY2026 10-K，无重大未决法律诉讼。GDPR 与 FedRAMP
    为严重程度最高的活跃义务。鉴于接入节点持续扩张，国际数据隐私义务评级为中等严重程度。英国 GDPR 风险经英国司法部采购清单（供应商 ID 44566）确认。
  enumerationScope:
    coverage: partial
    basis: >-
      Register covers the six highest-priority regulatory and legal risk categories identified through SEC filing
      review, FedRAMP marketplace verification, UK government procurement registry, and Forrester ZTNA landscape
      analysis. Additional jurisdiction-specific obligations (Canada PIPEDA, Japan APPI, India PDPB) exist but are
      lower-severity given current customer concentration in Americas (56.5%) and EMEA (25%). IP litigation and
      M&A-inherited obligations from the Infiot acquisition are not separately enumerated due to no public disclosure
      of claims.
