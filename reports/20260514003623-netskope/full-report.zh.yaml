  - number: '7.3'
    title: 合作伙伴与依赖风险
    blocks:
    - type: paragraph
      body: >-
        渠道集中度是Netskope最具结构性意义的依赖风险：FY2026收入的95.3%（7.09亿美元中的6.757亿美元）流经间接渠道合作伙伴——经销商、MSP及SI——直销仅占4.7%。尽管公司未披露头部合作伙伴的收入集中度，但如此规模的间接收入意味着前5至10家渠道合作伙伴极可能占据重大份额，一旦任一主要合作伙伴在平台化交易中将优先权转向Palo
        Alto Networks或Zscaler，将带来流失或脱离风险。Microsoft同时是Netskope最大的集成合作伙伴与最具可信度的竞争威胁：Microsoft Entra
        SSE（2024年推出）、Global Secure Access及Defender for Cloud Apps日益将SSE邻近能力捆绑入Microsoft 365
        E3/E5，为中端市场交易带来价格压缩风险。Palo Alto Networks激进的"平台化"策略向客户提供多年期付款延期，以促其整合至Prisma Access，与Netskope
        One直接竞争。对AWS、Azure和GCP的基础设施依赖（NewEdge接入节点与超大规模数据中心相邻或同址部署）造成三家云服务商集中风险；Broadcom收购VMware移除了一个重要的企业基础设施集成合作伙伴。SASE.cloud供应商分析及Forrester
        ZTNA全景图均确认Netskope的竞争定位，但同时将Microsoft和Palo Alto标记为不断升级的风险因素。
