  - number: '6.3'
    title: 留存率与持续性
    blocks:
    - type: paragraph
      body: >
        截至2026年1月31日，净收入留存率（NRR）达116%，高于2025年1月31日的113%（10-K）。S-1披露截至2025年7月31日的毛收入留存率（GRR）为96%，显示整体客户流失极低。绝大多数客户持有1至3年按年计费订阅合同。Netskope正将多年期计费转换为年度计费，压缩递延收入增速，但不影响底层留存率。公司在Gartner
        Peer Insights SSE评价中获得4.8/5（截至2025年6月），SASE评价4.6/5，TrustRadius
