  - number: '4.2'
    title: 单位经济与销售效率
    blocks:
    - type: paragraph
      body: >-
        Netskope 已披露部分的单位经济指标表现强劲，未披露部分则缺乏透明度。118%的 NRR（较上年113%提升）是定义性特征——意味着 Netskope 理论上无需新增客户即可实现收入增长。96%的
        GRR（较上年95%提升）意味着综合年度流失率约为4%，折算平均客户生命周期超过20年。截至2025年7月31日，每客户平均 ARR 为 $163.8K，较上年同期 $148.7K
        增长，确认现有客户群随模块增购合同价值持续扩大。

        在客户获取方面，H1 FY2026 S&M 支出绝对值有所下降（$147.4M，H1 FY2025为 $151.6M），而收入增长31%。S&M 占收入比从 FY2024的64.7%降至
        FY2025的52.2%，再降至 H1 FY2026的44.9%——这是 IPO 后品牌知名度与企业口碑驱动的显著效率拐点。同期 R&D
        占收入比同样从55.2%降至47.2%再至42.8%。关键的未量化指标是按渠道划分的 CAC 回收期。综合 S&M 总支出与各期净新增 ARR，新客户的代理回收期可能超过24个月，这在企业安全 SaaS
        领域属正常水平，但需在尽职调查中按细分确认。
