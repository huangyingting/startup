  - number: '4.4'
    title: 资本充足性与融资
    blocks:
    - type: paragraph
      body: >-
        2025年 IPO 成功后，Netskope 资本状况大幅改善。截至2025年7月31日，IPO 前现金、现金等价物及有价证券合计 $261.4M。IPO 于2025年在
        Nasdaq（代码：NTSK）完成，以每股 $19 募资约 $908M，按定价计算 IPO 后市值约 $7.3B。上市首日股价大涨，路透社报道开盘交易隐含估值约为 $9.5B。预估 IPO 后现金约为
        $1.1B（IPO 前 $261.4M 加 IPO 净收益约 $876M，已扣除承销费用）。

        主要资本风险是截至2025年7月31日在外流通的 $700.3M 可转换票据。转换条款、到期日及利率已在 S-1
        中披露，但在公开摘要中未获全面确认；这些票据代表重大的或有稀释或现金义务。截至2025年7月31日，累计亏损达 $(2.119B)，IPO 前股东权益为负值 $(612.1M)。IPO
        时，优先股（$1,050.6M）转换为普通股，部分逆转了股东权益赤字。关键在于，自由现金流（FCF）已出现拐点：H1 FY2026 FCF 为 $(2.2M)——接近盈亏平衡——而 H1 FY2025为
        $(126.5M)，FY2025全年为 $(151.1M)。在季度消耗接近于零的情况下，约 $1.1B 的 IPO 后现金储备按当前运营节奏提供了实际上无限的资金跑道。
