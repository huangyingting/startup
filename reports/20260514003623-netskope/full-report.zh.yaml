  - 优先级
  - 数据来源
  - 依据
  rows:
  - - 可转换票据条款——转换价格、到期日、看跌/看涨期权、控制权变更条款
    - Critical
    - 数据室/完整契约协议
    - 若转换价格超过当前股价$10.56，现金偿付风险将形成重大未来义务
  - - 按客户群与细分市场（SMB、商业、企业、联邦）分季度拆分的NRR
    - Critical
    - 管理层陈述/CFO电话会
    - NRR从118%压缩至116%可能集中于中端市场；需分部数据以量化Microsoft威胁
  - - 渠道合作伙伴收入集中度——前5和前10名合作伙伴占FY2026 ARR的比例
    - Critical
    - 数据室/合作伙伴管理团队
    - 间接收入占比95.3%，单一主要合作伙伴流失即可导致营收重大缺口
  - - AgentSkope商业管道及截至FY2027 Q1（2026年4月）的ARR贡献
    - High
    - 产品/销售电话
    - 乐观情景的主要增长催化剂；目前尚未公开量化；必须验证时间节点与规模
  - - 过去4个季度对阵Zscaler和Microsoft Entra SSE的竞争胜负数据
    - High
    - 销售运营/数据室
    - 量化Microsoft威胁与Zscaler价格压力；是NRR走势建模的必要输入
  - - IPO后按职能划分的员工流失率；股权薪酬刷新计划
    - Medium
    - 人力资源数据室
    - 股价较IPO低44%致大量期权深度虚值；工程团队人才风险尤为突出
  - - 可转换票据再融资进展与董事会层面的资本结构审查
    - High
