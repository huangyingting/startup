  - number: '7.4'
    title: 财务与商业模式风险
    blocks:
    - type: paragraph
      body: >-
        Netskope的财务风险格局由三大向量主导：可转换票据压制因素、IPO股价跑输及NRR压缩。截至2026年1月31日（10-K），公司有7.003亿美元可转换票据未偿还。转换条款与到期日未在公开摘要中单独披露，但若转换价格高于当前股价（2026年5月13日为10.56美元，较19美元IPO价格低44%），持有人届时可能选择现金结算而非转股，形成未来现金义务。股价较IPO价格下跌44%限制了Netskope以非稀释性价格融资的能力，并造成"IPO压制"——早期投资者与员工面临锁定期内的账面亏损，产生离职动机。NRR压缩（FY2026上半年S-1显示118%
        →
        FY2026全年10-K显示116%）暗示下半年收缩或净扩张减速。若NRR持续向110%压缩，增长叙事将显著弱化，且已可见的收入估值倍数压缩（股价约为FY2026收入的10倍，相比IPO时的26倍）将延续。自由现金流（FCF）在FY2026上半年为-220万美元——接近盈亏平衡，但对收入减速或CAC上升敏感。21亿美元累计亏损虽不构成运营约束，却传递了公开市场投资者须承接的长期未盈利历史信号。分析师共识（StockAnalysis.com）显示收入增长预测从32%（FY2026）放缓至约24%（FY2027），表明市场已部分定价减速风险。
