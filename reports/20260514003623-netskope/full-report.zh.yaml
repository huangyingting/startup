  - number: '5.2'
    title: 产品模块图谱
    blocks:
    - type: paragraph
      body: >-
        Netskope One 的安全产品套件覆盖完整的 SSE/SASE 防护边界。CASB（云访问安全代理）是平台的原始产品，通过内联与 API 监控覆盖70,000余项云服务，管理受批准与未受批准的应用。下一代
        SWG 以全量 TLS 检测与实时威胁防护扩展 Web 网关功能。Private Access（ZTNA）以基于身份与上下文的私有应用访问替代传统 VPN。DLP 通过 ML
        分类器与3,000余个预置策略模板，跨动态数据与静态数据通道运作。DSPM 持续发现云存储（S3、GCS）中的敏感数据。SSPM 针对 M365、Salesforce 及 GitHub 的基准对 SaaS
        配置漂移进行审计。FWaaS 提供云原生 L3-L7 防火墙服务。安全 SD-WAN（经2022年 Infiot 收购获得）提供分支机构连接。AI 安全产品——AI Gateway、AI
        Guardrails、GenAI Security 及 AgentSkope——管控企业对生成式 AI 及 AI 代理工作流的使用。Advanced Analytics 提供 UEBA 与跨平台遥测仪表板。
