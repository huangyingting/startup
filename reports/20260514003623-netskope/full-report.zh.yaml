  - number: '5.3'
    title: 客户工作流与部署
    blocks:
    - type: paragraph
      body: >-
        企业客户在受管终端上部署 Netskope 客户端（AgentSkope），通过支持 Windows、macOS、iOS、Android 及 ChromeOS 的轻量级代理将所有
        Web、云及私有应用流量隧道至最近的 NewEdge 接入节点（PoP）。针对非受管（BYOD）场景，Netskope 通过与主要 SaaS 服务商的 API 集成提供无代理反向代理
        CASB，消除设备端软件安装需求。PoP 处的零信任引擎在执行策略前解码每笔交易的完整上下文——谁（来自 AD、Okta、SAML
        的身份）、何种设备（态势评分）、访问哪个服务（来自70,000应用目录）、执行何种操作（下载、上传、共享）及涉及何种数据（DLP 分类）。与企业安全堆栈的集成通过 Cloud
        Exchange（CE）平台提供，该平台包含托管于 GitHub 的 SIEM、SOAR、XDR 及威胁情报插件公共库。UEBA 检测行为异常，如异常下载量或非工作时段访问模式。G2 与 PeerSpot
        评测强调了部署简便性，但指出 SIEM 集成摩擦及偶发的主要操作系统更新兼容性问题。
