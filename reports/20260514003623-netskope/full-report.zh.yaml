  - number: '1.2'
    title: 创始人、领导层与公司治理
    blocks:
    - type: paragraph
      body: >-
        Netskope 由四位技术专家联合创立：Sanjay Beri（CEO、董事长）、Krishna Narayanaswamy（CTO）、Ravi Ithal（首席架构师）及 Lebin
        Cheng（已于2018年离职）。Beri 构思了公司创立愿景——打造以数据为核心的云原生安全——据说他在一张星巴克餐巾纸上草拟方案后便向前 Symantec
        高管路演。Beri（1976年生）是公司主要对外发言人及战略推动者，构成最关键的核心人物依赖风险。据 Yahoo Finance 高管披露，其 FY2025 薪酬约为 $973,000（薪资与奖金合计）。

        CTO Krishna Narayanaswamy 拥有逾25年深度包检测、安全及行为异常检测领域经验，持有50余项专利，曾任 Juniper Networks 杰出工程师（2004-2012年），并于联合创立
        Netskope 前创办 Top Layer Networks（1997-2004年）。Ravi Ithal 担任首席架构师，专注于安全架构与平台深度建设。

        第四位联合创始人 Lebin Cheng 曾任应用工程副总裁，于2018年离职后相继创立 ArecaBay 与
        CloudVector。其离职未对公司增长造成明显冲击，但削弱了创始团队的宽度。公司通过外部招募强化管理层：Drew Del Matto（CFO，曾任职 Citrix 与 Fortinet，2019年加入，持
        MBA 学位）主导财务运营，Raphaël Bousquet（CRO）统筹全球市场拓展。董事会成员包括 Enrique Salem（前 Symantec CEO，2013年10月加入）、Kimberly
        Alexy（审计委员会主席）、Eric Wolford（治理委员会主席）、Arif Janmohamed 及 Will Griffith。作为上市公司，Netskope 现须遵守 Nasdaq 上市标准及 SEC
        信息披露要求。截至2026年5月，无重大领导层变动经证实。
