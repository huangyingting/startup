  - number: '3.2'
    title: 主要竞争对手深度剖析
    blocks:
    - type: paragraph
      body: >-
        Zscaler 是 Netskope 在营收规模上最直接的竞争对手。FY2025 ARR 为 $3.015B（同比+22%），Q1 FY2026 ARR 为
        $3.204B（同比+26%），截至2025年7月31日递延收入 $2.468B，预示强劲前向可见度。其 Zero Trust Exchange 凭借零信任网络访问的宽度及检测基础设施规模构建差异化。Palo
        Alto Networks Prisma SASE 提供最强的 AI/ML 安全能力与最深的平台整合，但 Gartner
        指出其定价复杂及主要面向英语支持为弱点；该供应商此后已转向基于站点的许可模式以解决打包复杂性。

        Cato Networks 于2023年以 $3B 估值融资 $238M，在倾向单一供应商 SASE 方案的从业者中被视为架构上更优越：其原生骨干网络通过90余个 PoP 的私有全球网络将所有 SASE
        组件统一于单一云平台。Cloudflare One 部署320余个全球 PoP，以按用量计费模式面向开发者主导及云原生企业。Fortinet FortiSASE 结合 SD-WAN 传统优势与
        SSE，服务中端市场及现有 Fortinet 客户。Microsoft Entra Internet Access 借助其主导性身份平台与 M365 捆绑，以近乎零增量成本提供 ZTNA 与 SWG，对已标准化于
        Microsoft 生态的客户形成价格压力，冲击纯 SSE 供应商。
