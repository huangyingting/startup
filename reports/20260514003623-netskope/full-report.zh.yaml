  - number: '2.4'
    title: 增长驱动力与采用障碍
    blocks:
    - type: paragraph
      body: >-
        支撑2026年及以后 SASE/SSE 采用的结构性增长驱动力有五项。其一，混合与远程办公的永久性转变消除了企业边界，亟需云原生访问安全，而传统 VPN
        及本地代理架构已无法高效满足这一需求。其二，云迁移（SaaS 激增、IaaS 扩张）暴露出大量新攻击面——CASB 与 CSPM 支出随云资产增长而扩大。其三，法规要求加速 DLP 及访问日志强制性支出：欧盟
        NIS2 指令（2024年10月生效）及 DORA（数字运营韧性法案，2025年1月生效）对数据保护与事件报告提出要求，SASE 平台有助于满足合规；美国零信任行政令推动联邦及联邦承包商采用。其四，AI
        与行为分析功能（集成于 Netskope One 等平台）在威胁检测、异常识别及自主策略调整方面创造差异化价值。其五，供应商整合压力——管理25种以上安全工具的企业——在 RFP 中更倾向于大型 SASE
        平台供应商，以降低总拥有成本。

        减缓采用的实质性障碍有三。遗留基础设施复杂性是最常被提及的障碍：从硬件设备与多供应商堆栈迁移至 SASE 需要分阶段多年期转型计划、专业项目管理及大量变更管理投入。单一供应商 SASE
        加剧的供应商锁定风险，令企业在长期承诺上犹豫不决。此外，企业在 SASE 架构与云安全运营方面的技能缺口延迟了部署，推动了对托管 SASE 服务而非自服务的需求，并可能延长销售周期。ETR 调研数据显示，SASE
        市场增速正从疫情高峰回落，预期是头部厂商进一步整合，而非新进入者爆炸式增长。
