    blocks:
    - type: paragraph
      body: >-
        SASE 与 SSE 市场的已发布分析师估算因覆盖范围定义与研究方法的差异而存在显著分歧。MarketsandMarkets 是行业分析中引用最广泛的来源，预测全球 SASE 市场2026年规模为
        $19.19B，以28.8% CAGR 增长至2032年的 $68.06B。Mordor Intelligence 给出下限估算：2026年 $15.54B，以约20% CAGR 增长至2031年的约
        $39.14B。sase.cloud 引用的2030年 $97B 预测可能在纯 SASE 基础上纳入了毗邻网络市场。

        对于 Netskope 具体可寻址细分市场（员工数≥500、云优先架构的企业 SASE），2026年可服务市场（SAM）估算约为 $8B–$10B，约占 SASE 总可寻址市场（TAM）的50–55%（剔除
        Netskope 产品市场契合度较弱的中小企业、政府及基础设施密集型行业）。以2025年11月 ARR 约 $707M 计算，Netskope 对 SASE TAM 的渗透率约为3.7–4.6%，或约占企业
        SAM 的7–9%。在整体市场以每年20–29%增速扩张的背景下，即使不考虑市场份额增益，上述空间亦意味着可观的增长潜力。

        异常值估算亦存在矛盾：Coherent Market Insights 将2026年 SASE 市场置于 $59.26B，约为 MarketsandMarkets
        数值的3倍，很可能采用了极宽泛的市场定义；Global Market Insights 的2026年 SASE 估算为 $2.8B，似乎仅涵盖 SWG/CASB
        窄口径范围。上述极端值说明市场规模估算高度依赖定义边界的选择，应区别赋权，以 MarketsandMarkets 与 Mordor Intelligence 的估算作为最常参考的中位数据点。
