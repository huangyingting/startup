- number: 7
  title: 风险
  sections:
  - number: '7.1'
    title: 监管与法律风险
    blocks:
    - type: paragraph
      body: >-
        Netskope作为企业流量的云安全代理，业务覆盖50余国，构成广泛的监管敞口。GDPR是最高严重级别的现行义务：Netskope经由EMEA接入节点（PoP）代表欧盟企业客户处理个人数据，须签订数据处理协议（DPA）、遵循Schrems
        II后欧美传输适用的标准合同条款（SCC），并落实可核查的数据驻留控制。公司持有ISO 27001与ISO 27701认证，并发布GDPR专项合规页面，提供具备可信度的基准缓释措施。FedRAMP
        High授权（2024年1月，FedRAMP Marketplace ID
        FR2019032016）新增持续监控义务、年度第三方评估机构（3PAO）评估要求，以及重大变更须获担保机构（美国退伍军人事务部）审批——这一治理开销须长期配备人员并持续维护。CCPA/CPRA适用于Netskope所检查流量对应的加州客户员工；随着Netskope扩大APAC与LATAM客户基础，PDPL（沙特阿拉伯）、PDPA（泰国/新加坡）和LGPD（巴西）增加了司法管辖区专属要求。因TLS检查与深包分析技术在特定司法管辖区可能受两用出口管制分类约束，潜在的出口管理条例（EAR）敞口客观存在。10-K（FY2026，2026年1月31日）未披露任何重大待决法律程序。英国司法部采购注册将Netskope列为政府批准供应商，确认其积极参与英国政府部门业务并承担英国GDPR隐含合规义务。
