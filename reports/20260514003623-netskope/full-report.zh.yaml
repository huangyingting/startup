      body: >
        Netskope客户页面展示五个具名生产部署案例，涵盖专业服务、消费品、化工、国防及食品制造行业。BDO UK（逾8,000名员工，全球第五大会计师事务所）部署了云访问安全代理（CASB）、次世代安全 Web
        网关（SWG）及Private
        Access，实现近零VPN中断（可用性从98.5%提升至99.9%），并为ChatGPT自动化AI内容管控。Colgate-Palmolive（34,000名员工，覆盖200余国）部署CASB与数据防泄漏（DLP），在跨国环境中保护配方及研发知识产权。Orbia（24,000名员工）在四个月内跨200个站点、14,000名用户完成安全服务边缘（SSE）部署，威胁防御效能提升10倍，回报期不足一年。ManTech
        International部署零信任架构，终端用户无感知。GBfoods以Netskope集中式云平台替代传统VPN。上述五个案例均为明确的生产部署，附有量化成果引述，并非试点参考。
