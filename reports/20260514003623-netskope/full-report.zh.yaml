    title: 扩张与集中度风险
    blocks:
    - type: paragraph
      body: >
        Netskope的拓展-扩张模式通常始于CASB或SWG采用，随后向上销售至ZTNA/Private Access、DLP、SD-WAN及AI
        Gateway。案例研究印证这一路径：BDO从CASB起步，后加入SWG与Private
        Access；Orbia以SWG与CASB为起点，再叠加FWaaS与DLP。渠道合作伙伴集中度显著：FY2026收入的95.3%（6.757亿美元）经由间接渠道流入；直接终端客户收入仅3,330万美元（4.7%）。头部客户ARR集中度未公开披露，但1,531家ARR超10万美元的客户群（隐含逾6亿美元ARR）表明不存在单一客户主导。地理增长偏重美洲；EMEA与APJ为扩张杠杆。Microsoft合作关系（Purview、Sentinel、Copilot集成）创造协同销售机会，但若Microsoft深化原生SSE能力，亦带来竞争毗邻风险。
