- number: 2
  title: 市场分析
  sections:
  - number: '2.1'
    title: 市场界定与边界
    blocks:
    - type: paragraph
      body: >-
        Netskope 的主要竞争领域是安全服务边缘（SSE）市场，该市场是 Gartner 于2019年首次定义的更广泛安全访问服务边缘（SASE）框架的子集。SSE
        涵盖云交付的安全能力——云访问安全代理（CASB）、安全 Web 网关（SWG）、零信任网络访问（ZTNA）、数据防泄漏（DLP）及防火墙即服务（FWaaS）——无论用户物理位置如何，均可保障对云、SaaS
        及私有应用的访问安全。完整 SASE 在 SSE 基础上增加网络路由能力，主要是软件定义广域网（SD-WAN），将安全与网络整合于单一云原生平台。

        市场边界的界定对规模估算至关重要。窄口径 SSE 估算通常为2026年 $1.5B–$5.3B，仅反映安全软件支出。包含网络与 SD-WAN 的更广口径 SASE 估算，据 MarketsandMarkets 与
        Mordor Intelligence，2026年为 $15.5B–$19.2B。更宽泛的零信任安全估算——含终端、身份及数据控制——年规模可达 $44B–$60B。Netskope 的直接产品覆盖 SSE
        能力及 SD-WAN 集成（Netskope One SD-WAN），使其在完整 SASE 定义下参与全面竞争。

        不在 Netskope 可寻址市场范围内的支出包括：独立的终端检测与响应（EDR）、传统 SIEM、基于硬件的防火墙设备、电子邮件安全点产品、身份与访问管理（IAM）及移动设备管理（MDM）。替代方案包括现状
        VPN 基础设施（通常由 IT 运营团队管理）、本地代理设备及拼凑式多供应商安全堆栈——这些正是 Netskope 在企业销售周期中最常替代的场景。超大规模云服务商及大型科技公司中存在内部自建方案（定制
        SD-WAN 或代理实现），但属于次要替代细分市场。
