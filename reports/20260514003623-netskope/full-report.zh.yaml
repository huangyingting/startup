  - 关系类型
  - 收入/运营集中度
  - 替代可得性
  - 中断风险
  - 尽调路径
  rows:
  - - 间接渠道合作伙伴（经销商、MSP、系统集成商）
    - 收入交付——占 FY2026 收入 95.3%（$675.7M）
    - 关键——头部合作伙伴未披露；汇总集中度高
    - 低——直销团队规模小（收入占比 4.7%）；重建需 2–3 年
    - 主要合作伙伴向 Palo Alto/Zscaler 转向可能引发快速收入冲击；关键地区市场覆盖缺失
    - 请求前 5 大合作伙伴收入集中度；审查合作伙伴协议条款，包括独家性与终止条款；评估合作伙伴健康评分
  - - Microsoft（M365 集成、Entra SSE、Copilot Security）
    - 集成合作伙伴 + 竞争邻接
    - 高——M365 集成对 CASB/DLP 用例至关重要；Entra SSE 直接竞争
    - 中等——Zscaler 与 Palo Alto 提供同等 M365 集成
    - Microsoft Entra SSE 捆绑入 E5 授权，削弱 Netskope 面向中端市场的价值主张；API 集成访问丧失将降低产品能力
    - 每季度监控 Microsoft Entra SSE 功能发布；追踪 E5 捆绑条款；评估客户对话中 Microsoft 原生 SSE 的竞品评估情况
  - - Palo Alto Networks（竞争性平台化整合）
    - 提供付款递延以整合客户的竞争对手
    - 高度竞争压力——PANW Prisma Access 与 Netskope One 直接重叠
    - 中等——Netskope 的 DLP 深度与 CASB 传承仍为差异化优势
    - PANW 平台化交易在续约时取代 Netskope；为与之竞争而折扣导致利润收窄；混合厂商账户的 NRR 承压
    - 在客户对话中追踪 PANW 平台化交易频率；监控 PANW 定价条款与递延方案；审查 Netskope 对 PANW 的胜/负数据
  - - AWS、Azure、GCP（NewEdge 接入节点的超大规模云商基础设施）
    - 基础设施依赖——NewEdge 接入节点毗邻超大规模云商数据中心托管
    - 中等——50+ 接入节点分布于多家云商；非单一云依赖
    - 中等——公司自有接入节点硬件；并非纯云托管；可随时间迁移
    - 超大规模云商定价变化或数据出口成本上涨可能压缩毛利率；API 集成废弃可能影响产品集成
    - 审查接入节点托管合同条款与定价；评估产品集成对超大规模云商 API 的依赖深度；监控云服务商 SSE 公告
  - - 身份提供商（Okta、Azure AD/Entra ID、基于 SAML 的 IdP）
    - 关键产品集成——零信任策略执行需绑定 IdP
    - 高度运营依赖——ZPA 与 ZTNA 策略执行需实时 IdP 集成
    - 切换成本低——使用 Okta/Azure AD 的客户深度锁定；Netskope 须支持所有主流 IdP
    - IdP API 变更或废弃可能破坏策略执行；Okta 安全事件（2023）暴露了对第三方 IdP 安全状态的依赖
    - 审查 IdP 集成测试覆盖率与监控情况；评估企业客户 IdP 服务商的 SLA；追踪 IdP 服务商安全公告
  - - Broadcom/VMware（已移除的主要集成伙伴与潜在收购方）
    - 前合作伙伴——VMware NSX 与 SD-WAN 曾与 Netskope 竞争并集成
    - 直接收入贡献低；战略层面——已失去潜在收购退出路径和集成目标
    - 不适用——关系已因 Broadcom 收购而中断
    - Netskope 失去一条可信的收购退出路径；从 VMware SD-WAN 迁移的企业客户可能不会选择 Netskope 的 SD-WAN（源自 Infiot）；存在潜在集成缺口
    - 评估 Broadcom/VMware 后 SD-WAN 竞争定位；追踪 VMware 客户迁移模式；审查 Infiot SD-WAN 集成深度与 VMware 替代方案的对比
  notes: >-
    间接渠道收入集中度数据来自 FY2026 10-K（95.3% 间接）。头部合作伙伴集中度未公开披露；评估基于同类型渠道重型 SaaS 厂商的行业惯例。Microsoft 与 Palo Alto 风险评估综合了
    SASE.cloud 厂商分析、Forrester ZTNA 格局及 CSHub 竞争分析。所有评级截至 2026 年 5 月。
