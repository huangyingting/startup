  - number: '7.5'
    title: 人员、执行与风险缓释
    blocks:
    - type: paragraph
      body: >-
        Netskope的人员风险集中于两位联合创始人。CEO Sanjay Beri自创立以来领导公司逾15年；其离职将在关键的IPO后规模化阶段危及客户关系、合作伙伴信任及战略一致性。CTO Krishna
        Narayanaswamy联合创立Netskope，主导AI/ML产品架构（包括AgentSkope）；其离职将威胁AI安全差异化论点。Teamblind
        2024年帖子提及Netskope裁员，与IPO后寻求盈利路径的SaaS公司优化行为一致，但裁员规模尚未公开确认。工程团队分布于湾区（总部）与班加罗尔研发中心，两地人才市场竞争激烈。执行风险集中于三点：（1）中端市场扩张——Netskope的市场进入策略针对Fortune
        500企业调校，但公司须向500至5,000名员工规模的企业延伸以维持NRR；（2）渠道管理——95.3%的间接收入需主动开展合作伙伴赋能与利润率管理；（3）产品复杂性——从SSE扩展至完整SASE、AI安全再到IoT/OT，要求严格的优先级管理。须监控的核心论点破坏指标包括：NRR连续两个季度低于110%；股价持续低于8美元（触发票据或股权融资的额外稀释压力）；Beri或Narayanaswamy离职；丧失FedRAMP
        High授权；或依据SEC网络安全信息披露规则披露的重大安全漏洞。
