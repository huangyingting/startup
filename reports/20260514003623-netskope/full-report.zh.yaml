      body: >
        独立评测平台持续揭示摩擦痛点。PeerSpot汇总反馈将支持质量不佳列为普遍问题——一位评审者指出在关键升级处理中支持团队表现欠佳。通过中间人代理进行的SSL/TLS检查与高敏感性企业应用存在兼容性问题，需逐案精细调整。TrustRadius与PeerSpot普遍将管理复杂性（部署、迁移及策略管理）列为自主运营的障碍。部分亚太地区评审者反映特定区域存在延迟问题（具体提及菲律宾）。与Zscaler和Microsoft相比，定价被一致描述为"中等偏贵"，可能阻碍中端市场扩张。NRR从118%（FY2026上半年，据S-1）下降至116%（FY2026全年，据10-K），暗示下半年业务略有放缓或流失有所增加。上述不利信号与一家向复杂企业级环境销售的宽平台厂商相符，部署摩擦在116%
