  - number: '4.5'
    title: 财务评估与尽职调查缺口
    blocks:
    - type: paragraph
      body: >-
        Netskope 财务概况以高收入质量（118% NRR、96% GRR、按席位订阅模式）、毛利率向70%+快速扩张及 H1 FY2026实现的结构性 FCF 拐点为特征。IPO
        提供了充裕的资本缓冲。主要财务风险包括：（1）$700M 可转换票据压制因素需仔细审查转换价格与到期条款；（2）S&M 与 R&D 占比虽持续下降，但合计仍超收入的80%，应对意外下行空间有限；（3）$2.1B
        累计亏损在当前消耗速度下并非近期偿债问题，但揭示了建设这一平台所需的总资本投入；（4）FY2026年度收入与利润率展望尚无正式指引，需以 $707M ARR 基础建模。

        关键尽职调查缺口包括：未披露的分渠道 CAC（直销与经销商），无按产品层级或模块划分的毛利率细分，无按行业划分的 ARR 拆分（企业级、联邦及中端市场），以及 NewEdge 多年期 CapEx
        计划未公开披露。Netskope 的任何承销模型必须将这些缺口明确处理为未知量。S-1 提供的财务证据基础对 IPO 前网络安全公司而言异常丰富，运营指标（NRR、GRR、FCF
        轨迹）足以支撑基准投资论点。边缘情境——Palo Alto 与 Zscaler 的定价压力、联邦合同波动性及可转换票据结果——需通过管理层陈述解决。
