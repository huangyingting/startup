- number: 5
  title: 产品与技术
  sections:
  - number: '5.1'
    title: 平台架构与 NewEdge 网络
    blocks:
    - type: paragraph
      body: >-
        Netskope One 是围绕三大架构支柱构建的云原生安全平台：NewEdge 网络、零信任引擎及统一产品套件。NewEdge 是 Netskope 专有的全球云网络，拥有50余个完全由 Netskope
        自建的接入节点（PoP）——而非租用第三方 CDN——并通过私有对等互联连接至主要 SaaS 服务商。这使企业流量从终端到 Microsoft 365、Google
        Workspace、Salesforce、AWS 及 Azure
        的路径全程直连，无需在安全检测点与应用之间穿越公共互联网。零信任引擎在单次内联云代理中执行所有安全检测——CASB、SWG、ZTNA、DLP、威胁防护——跨所有策略决策保留上下文（用户身份、设备态势、云服务、操作类型及数据内容）。架构仅以云服务形式交付，无需购买或销售任何硬件设备。
