  - number: '3.3'
    title: 功能与定价比较
    blocks:
    - type: paragraph
      body: >-
        Netskope 最持久的产品差异化在于 CASB 深度与 DLP 复杂度。其 CASB 引擎覆盖49,000余个云应用——为 SSE 市场最广泛——DLP 引擎含3,000余个数据分类器，可对结构化、非结构化及
        SaaS 数据实施精细策略执行。Netskope 单次内联架构在单次内联过程中完成所有安全检测，相较服务链多供应商堆栈降低延迟。NewEdge 私有网络在全球范围内强制执行50ms TLS 检测
        SLA，是竞争对手公开未能匹配的可验证性能承诺。

        SD-WAN 是显著的能力缺口：Netskope 的 Borderless SD-WAN 是附加产品而非原生集成，使其在需要统一网络与安全的企业中落后于 Cato Networks、Cisco 及 Palo
        Alto。SSE 市场定价主要以每用户年度订阅为主，Netskope 定价高于市场中位数，以 DLP 与 CASB 深度为溢价依据。Zscaler 的模块化方案（ZIA + ZPA 分别定价）意味着同等功能通常比
        Netskope 捆绑方案更昂贵。Palo Alto 转向基于站点的许可旨在简化企业预算编制。Cloudflare 的按量计费模式在市场低端形成定价压力。
