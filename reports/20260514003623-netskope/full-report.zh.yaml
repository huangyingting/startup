    - 未披露；仅有 GAAP 整体毛利率
    - 高级模块（AI 分析、SD-WAN）的毛利率可能不同；混合毛利率掩盖了产品结构变化风险
    - 在尽调数据室中请求按 Netskope One 层级（Core、Advanced、Ultimate）拆分的毛利率
  - - 联邦/政府 ARR 及行业拆分
