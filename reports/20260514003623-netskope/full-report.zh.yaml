  - number: '8.3'
    title: 情景与敏感性分析
    blocks:
    - type: paragraph
      body: >-
        三种情景覆盖Netskope的投资边界。乐观情景（16至20美元/股，7至9倍NTM）：需要SASE平台整合胜利驱动的24%以上持续收入增长、NRR回升至118%以上（印证AgentSkope与ZTNA等新模块成功扩张），以及7.003亿美元可转换票据成功再融资。此情景隐含NTM收入约8.80亿美元，且需要同业维持较高估值倍数。概率信号：25%。基准情景（10至13美元/股，5至6倍NTM）：假设16至20%收入增长（与分析师共识NTM收入约8.20亿美元一致）、NRR稳定于115至116%，以及来自Microsoft和Palo
        Alto的适度竞争压力。公司于FY2027实现正自由现金流（FCF），限制进一步的估值倍数压缩。概率信号：50%。悲观情景（5至8美元/股，3至4倍NTM）：由增长放缓至6至12%同比（可能因Microsoft
        Entra
        SSE胜出取代中端市场Netskope交易）、NRR跌破110%，或可转换票据现金结算引发被迫股权融资所触发。NTM收入假设：约7.50亿美元。概率信号：25%。Netskope接近盈亏平衡的FCF（FY2026上半年为-220万美元）意味着悲观情景不涉及即时破产风险，但可能需要摊薄性股权融资。约96%的GRR为收入损毁情景提供了下限保护。分析师NTM收入共识（约8.35亿美元）隐含市场当前定价于中等基准情景，上行溢价有限。
      claimRefs:
      - CV023
      - CV024
      - CV025
      - CV026
      - CV027
      - CV028
      - CV029
      - CV030
    - type: table
      tableRef: TV003
      claimRefs: []
  - number: '8.4'
    title: 论点破坏与终止条件
    blocks:
    - type: paragraph
      body: >-
        六项论点破坏触发条件将导致即时减仓或投资中止。首要且最重要：NRR连续两个财季低于110%，标志企业客户流失加速或中端市场系统性失守于Microsoft Entra
        SSE。NRR降至110%或以下将彻底剥夺增长溢价，并将Netskope重新定价至3至4倍收入的基础设施即服务估值倍数。第二：全年收入增速连续两个季度低于15%，与中端市场饱和及Fortune
        100扩张失能相符。第三：Microsoft Entra
        SSE导致ARR流失经记录或估算超过安装基础的5%（单年度内），确认结构性威胁成立。第四：7.003亿美元可转换票据到期须以现金结算且未能再融资，此情景可能需要以10至12美元/股进行股权融资，严重稀释现有股东。第五：FedRAMP授权被撤销或通过内联代理的客户数据泄露的重大安全事件，这将对品牌造成根本性损害，极可能引发联邦及受监管行业ARR的快速下降。第六：Palo
        Alto Networks平台化交易导致12个月内ARR客户流失超过5%。月度监控指标包括：NTSK股价相对可转换票据转换价格；季度NRR趋势；渠道合作伙伴的竞争置换消息；以及任何SEC披露的重大不利进展。
      claimRefs:
      - CV031
      - CV032
      - CV033
      - CV034
      - CV035
      - CV036
    - type: table
      tableRef: TV005
      claimRefs: []
  - number: '8.5'
    title: 最终尽调问题与退出准备
    blocks:
    - type: paragraph
      body: >-
        在以高度确信作出投资决策前，仍有六项关键尽调问题有待解答。最重要的是7.003亿美元可转换票据的完整债券契约及条款清单：转换价格、到期日、利率、看跌/看涨条款及控制权变更条款。若转换价格高于当前股价10.56美元，到期现金结算将构成重大未来义务。第二：按客户群与细分市场（中小企业、商业、企业级、联邦政府）逐季拆分的NRR，以识别118%至116%压缩是否集中于特定细分市场（尤其是Microsoft风险最高的中端市场）。第三：前5家和前10家间接合作伙伴的渠道收入占FY2026
        ARR的比例；在95.3%间接收入的背景下，主要合作伙伴的流失将具有重大影响，而当前公开文件中无从辨别。第四：截至FY2027一季度（2026年4月）的AgentSkope商业管道及ARR贡献，因为这是乐观情景的主要增长催化剂，目前尚未量化。第五：过去四个季度对阵Zscaler与Microsoft
        Entra
        SSE的竞争胜负数据，包括交易量、胜率及竞争置换指标。第六：IPO后按职能划分的员工流失数据，考虑到许多员工的股权激励在当前股价下极可能处于价外状态。退出准备：IPO已完成。对新进公开市场投资者而言，可通过正常市场交易实现退出流动性。上行并购情景：Cisco、CrowdStrike或Palo
        Alto
        Networks可能以当前价格溢价20至30%（13至14美元/股）收购Netskope，隐含50至60亿美元交易价值。这并非基准情景，但鉴于Netskope具有吸引力的ARR、NRR及政府认证，代表一个有效的替代退出论点。
