    - Low-Medium
    - 重新评估——竞争护城河弱化；平台整合风险上升
    - 每季度加渠道调研
- id: TV006
  title: 最终尽调问题清单
  notes: 尽调数据可获取性取决于投资方是否拥有数据室访问权限及管理层配合程度；可转换票据条款已在SEC EDGAR契约文件中披露，可能与第三方摘要有所不同。
