    - 按用户年度订阅
    - 按席位/月计（按年计费）
    - Full SSE：SWG、CASB、ZTNA、DLP、RBI（按层级分级）
    - 企业规模下 20–30%
    - 高溢价定价依托 CASB/DLP 深度支撑；成本敏感客户存在被替换风险
  - - Zscaler
    - 模块化按用户订阅（ZIA + ZPA）
    - 按席位/月计（ZIA / ZPA 分别授权）
    - SWG + 高级威胁防护（ZIA）；ZTNA（ZPA）；DLP 作为附加模块
    - 企业规模下 15–25%
    - 模块化模式下全面对标 Netskope 的定价相近；附加模块累加效应明显
  - - Palo Alto Prisma SASE
    - 按站点 + 按用户（过渡中）
    - 按站点/用户/月计
    - Prisma Access + SD-WAN + AI 安全统一平台
    - 激进；按交易定制；ELA 下 25–40%
    - 整合策略；大型 ELA 涵盖 SSE + SD-WAN；站点授权简化分支机构预算
  - - Cato Networks
    - 按站点 + 按用户捆绑
    - Mbps 带宽 + 用户席位/月
    - 完整 SASE 捆绑包：SD-WAN + ZTNA + SWG + FWaaS + DLP
    - 规模化后 10–20%
    - 高度可预测；单一账单；SD-WAN + SSE 组合对比 Netskope 附加模块模式更具吸引力
  - - Cisco SASE (Umbrella)
    - 按席位 + 附加 SKU + HA 许可
    - 按席位/月计 + 带宽分级
    - Umbrella（SWG/CASB/ZTNA）+ Meraki SD-WAN；FW 可选
    - ELA / Cisco 企业协议下 20–35%
    - 覆盖最广；Cisco EA 现有客户享优惠经济条款；SKU 矩阵复杂
  - - Cloudflare One
    - 按用量 + 按席位分级
    - 席位＋带宽（GB 计费）
    - ZTNA、SWG、有限 CASB；含 DDoS 防护
    - 无公开定价；提供初创企业/开发者免费层
    - 定价具颠覆性；对开发者/中小企业友好；DLP 能力有限，难满足企业级需求
  - - Fortinet FortiSASE
    - 买断与订阅混合模式
    - 按设备/用户/月计费，另含 SD-WAN 硬件费
    - FortiSASE（云端）+ FortiGate（本地 SD-WAN）捆绑
    - 既有 Fortinet 客户可享 15–25% 折扣
    - 对现有 FortiGate 用户吸引力强；对全新云优先部署吸引力有限
  notes: 定价数据源自分析师估算、Netify 研究、PeerSpot 讨论及厂商文档。企业合同条款差异显著，公开标价通常无法反映实际谈判价格。所有数据为截至 2026 年的市场定位估算，非经审计的交易数据。
