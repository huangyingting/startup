  title: 公司概览
  sections:
  - number: '1.1'
    title: 公司身份与商业模式
    blocks:
    - type: paragraph
      body: >-
        Netskope, Inc. 是一家网络安全公司，提供统一的云原生安全与网络平台，总部位于加利福尼亚州圣克拉拉市奥古斯丁大道2445号301室。公司于2012年以 Skope, Inc.
        名称注册成立，同年11月更名为 Netskope。2025年9月18日，公司以代码 NTSK 在 Nasdaq 全球精选市场上市，募集总收益约 $908M、净收益约
        $992.2M（含承销商超额配售权全额行使），成为当年规模最大的网络安全 IPO 之一。

        Netskope 的核心业务是通过 Netskope One
        平台——一套将安全与网络融为一体的统一云原生解决方案——交付安全服务边缘（SSE）与安全访问服务边缘（SASE）能力。产品覆盖云访问安全代理（CASB）、下一代安全 Web
        网关（SWG）、零信任网络访问（ZTNA）、数据防泄漏（DLP）、云安全态势管理（CSPM）、防火墙即服务（FWaaS）及软件定义广域网（SD-WAN）。零信任引擎对云、SaaS
        及私有应用环境中的用户、设备与数据实施实时上下文感知策略。平台通过专有 NewEdge 网络交付，该网络于2019年以50个初始接入节点（PoP）启动，后续扩展至全球逾60个数据中心。

        公司运营基于订阅的 SaaS 商业模式，主要通过按用户数、数据量、已部署功能及支持层级计费的多年期企业级合同产生经常性收入。客户通常从 CASB 或 SWG 等核心模块起步，通过交叉销售扩展至
        ZTNA、FWaaS 及高级分析，从而推动高净留存率并持续提升每客户平均收入。截至 IPO 的 S-1 申报文件，Netskope 报告 FY2024 年度收入 $600M，至2025年底 ARR 超过
        $700M，反映出连续30%+的同比增速。
