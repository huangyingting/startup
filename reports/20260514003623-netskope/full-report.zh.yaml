    - 美国联邦市场价值高，但受制于采购延迟与预算周期；无量化数据则无法对 FedRAMP 收入建模
    - 在尽调数据室中请求行业 ARR 拆分（联邦、医疗、金融及其他）
  - - 企业级与中端市场客户拆分
    - 未披露；Netskope 提及 Fortune 100 渗透率（>30%），但无正式细分定义
    - 中端市场客户流失风险更高、ACV 更低；过度集中于企业级客户存在集中度风险
