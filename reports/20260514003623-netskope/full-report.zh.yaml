- number: 8
  title: 估值
  sections:
  - number: '8.1'
    title: 投资逻辑与建议
    blocks:
    - type: paragraph
      body: >-
        Netskope的投资逻辑建立于四大支柱：（1）同类最优的内联代理安全服务边缘（SSE）架构，FedRAMP
        High授权构筑多数竞争对手难以复制的联邦部门护城河；（2）强劲的企业级牵引力，约三分之一的Fortune
        100为客户，ARR超10万美元的客户数量达1,531家，贡献ARR的86%；（3）持久的收入增长——FY2026同比增长32%至7.091亿美元，116%
        NRR印证安装基础内强劲的向上销售与交叉销售；（4）经由AgentSkope向AI安全转型，瞄准快速增长的GenAI治理市场。反向论据同样有力：股价较2025年11月IPO价格19美元/股低44%；7.003亿美元可转换票据形成潜在现金结算压制因素；NRR从118%（FY2026上半年）压缩至116%（FY2026全年），暗示竞争压力上升；Microsoft
        Entra SSE在M365
        E3/E5内的原生扩展威胁Netskope中端市场增长向量。FY2026收入的95.3%经间接合作伙伴流入，渠道集中度增加结构性脆弱性。综合建议：在当前10.56美元价格下谨慎观望/持续跟踪。相较同业的估值折价真实存在，但有条件于维持20%以上增速并稳定NRR。买入标准：NRR连续两个季度稳定于116%以上，且7.003亿美元票据完成再融资或转股，且收入增速持续高于18%。
