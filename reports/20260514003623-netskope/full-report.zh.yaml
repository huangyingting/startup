  - number: '1.5'
    title: 重要里程碑
    blocks:
    - type: paragraph
      body: >-
        Netskope 的发展历史涵盖自2012年创立至今的多项融资、产品及治理里程碑。公司于2013年10月走出隐身模式，推出首款公开的 CASB 产品，Enrique Salem
        亦于同月加入董事会。2017年7月收购 Sift Security，新增 IaaS 云安全能力。NewEdge 网络基础设施于2019年7月上线。2020年2月 G 轮融资与 Private Access
        同步推出，借助疫情驱动的远程办公需求加速业务增长。

        2021年7月 H 轮估值达 $7.5B，创 IPO 前高水位。2023年1月可转换票据轮维持 $7.5B 估值，Goldman Sachs 与 Morgan Stanley
        加入股权结构。至2025年8月，二级市场数据显示隐含估值降至约 $5.1B，随后 S-1 于当月提交。IPO 于2025年9月17日以 $19/股定价，9月18日开始交易，9月22日超额配售权全额行使，净募资
        $992.2M。NTSK 现已作为公众证券在 Nasdaq 交易，季度业绩披露义务及锁定期到期（通常为 IPO 后180天，约2026年3月）形成结构性压制因素。

        值得关注的负面信号包括：联合创始人 Lebin Cheng 于2018年离职、二级市场估值从2021年至2025年中期由 $7.5B 降至约 $5.1B，以及截至2026年5月 NTSK 股价较 IPO
        定价折价约44%。截至运行日期，公开资料中未有针对 Netskope 的大规模裁员记录。
