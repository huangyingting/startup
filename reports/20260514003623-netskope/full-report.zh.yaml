      body: >-
        截至2026年5月13日，Netskope以10.56美元/股的价格交易，对应约5.0倍NTM收入（分析师共识约8.35亿美元）、5.9倍EV/ARR（7.07亿美元）及5.9倍EV/TTM收入（FY2026的7.091亿美元）。IPO当日企业价值隐含约10.5倍EV/ARR（以19美元IPO价格计），与SASE私有市场估值倍数一致：Cato
        Networks于2023至2024年以约32亿美元估值融资2.38亿美元（约11.4倍ARR，估算ARR约2.80亿美元），Axis
        Security于2023年以约4.52亿美元被HPE/Aruba收购（约12至15倍ARR）。当前5.0倍NTM估值倍数相较Zscaler的约10倍和Cloudflare的约13倍存在50至55%的折价。Palo
        Alto Networks以约9倍NTM交易，FCF利润率实质更高（约35%），而CrowdStrike凭借溢价增长预期获得约18倍NTM。估值折价部分具有合理性：Netskope
        FCF接近盈亏平衡，而同业FCF利润率为25至35%，且7.003亿美元可转换票据形成可比公司所不具备的财务杠杆。然而，折价也反映了IPO动量损毁——从首日估值95亿美元在六个月内降至约42亿美元企业价值，而非基本面业务恶化。收入增长预期从IPO时代（原隐含25%以上增速）向当前共识（约18%
        NTM）的放缓，解释了部分重新定价。
