- id: TM004
  title: 增长驱动力与制约因素表
  columns:
  - 驱动力 / 制约因素
  - 方向
  - 时间窗口
  - 对 Netskope 的影响
  - 尽调重点
  rows:
  - - 云迁移与 SaaS 泛滥
    - 增长驱动力
    - 当前，持续至 2030 年
    - CASB 与 SWG 的核心需求引擎；每一次净新增云采用均产生 Netskope 可填补的安全缺口
    - 以企业云支出为领先指标跟踪；监测 AWS/Azure 营收增长与 Netskope ARR 增长的对比
  - - 混合办公与远程工作常态化
    - 增长驱动力
    - 当前，结构性
    - 消除网络边界；ZTNA 需求具结构性与持续性，而非一次性
    - 衡量 ZTNA ARR 占总 ARR 的比重；追踪现有客户扩张
  - - 监管要求（NIS2、DORA、美国零信任行政令、HIPAA/PCI-DSS）
    - 增长驱动力
    - 2024–2026+（NIS2 与 DORA 已生效）
    - 强制性 DLP 与访问日志支出；加速受监管行业商机管道
    - 核实 Netskope NIS2/DORA 合规认证及欧盟政府商机管道
  - - AI 驱动的安全功能
    - 增长驱动力
    - 自 2025 年起加速
    - 在 RFP 中形成 Netskope 平台差异化；提高 AI 训练客户的转换成本
    - 评估 AI 功能深度与 Zscaler/Palo Alto 的差异；验证与 AI 相关的客户留存
  - - 厂商整合压力（25+ 工具蔓延）
    - 增长驱动力
    - 当前，持续多年
    - 具备完整 SASE 广度的平台赢得整合授权；有利于 Netskope 对抗单点厂商
    - 分别追踪平台扩张交易与新签客户贡献的 Netskope ARR
  - - 遗留基础设施迁移复杂性
    - 采用障碍
    - 持续多年
    - 延长销售周期；增加专业服务负担；产生分阶段交易压缩风险
    - 从投资者披露中审查平均销售周期时长及 PS 附加率
  - - 单一厂商 SASE 的供应商锁定顾虑
    - 采用障碍
    - 当前及持续
    - 企业可能倾向多厂商 SSE+SD-WAN；在竞争性 SASE 交易中产生反对意见
    - 监测 Netskope 合作伙伴/生态系统策略；跟踪 OEM 与经销商渠道
  - - SASE 技能短缺与变更管理负担
    - 采用障碍
    - 结构性持续至 2028 年以上
    - 推动 MSSP 交付需求，拉高净成本并压缩直销自助服务收入；因嵌入式装机基础，可能有利于 Cisco/Palo
    - 审查 MSSP 合作伙伴生态系统规模；评估托管 Netskope 产品的可用性
  notes: >-
    驱动力与制约因素源自 Wiz CISO 调研 2026、Dell'Oro Group 2026 年预测、ETR SASE 融合数据、Natilik 与 Jimber SASE 行业分析，以及 Netskope S-1/A
    风险因素。监管时间窗口依据欧盟公开文件确认：NIS2（2024 年 10 月生效）与 DORA（2025 年 1 月生效）。
