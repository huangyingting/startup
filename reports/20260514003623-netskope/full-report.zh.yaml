- number: 4
  title: 财务分析
  sections:
  - number: '4.1'
    title: 收入模式与来源
    blocks:
    - type: paragraph
      body: >-
        Netskope 几乎全部收入来自 Netskope One 云原生安全平台的订阅许可证。模式为按席位、按年计费，客户购买年度或多年期合同，按合同期限分期确认收入。平台层级——Core（SSE
        基础版）、Advanced（新增 SSPM 与 SkopeAI 行为分析）、Ultimate（含 NewEdge SD-WAN 的完整 SASE）——允许通过追加销售驱动现有客户 ARR
        扩张。结果形成持久的扩张引擎：118%的 NRR 意味着现有客户在流失净额之后每年为 Netskope ARR 贡献约18%的有机增长。

        FY2025年度收入为 $538.3M（同比+32%，FY2024为 $406.9M）。H1 FY2026收入 $328.5M（同比+31%），折算全年运行率约为 $657M，与截至2025年7月31日的
        $707M ARR 基础相符。收入结构约57%来自美洲，43%来自国际市场，国际收入占比在 H1 FY2025 与 H1 FY2026
        期间保持稳定，确认国际扩张与国内增长同步放大。专业服务（实施、迁移、托管服务）占比较小，不具重要性且未单独披露。公司财年截止日为1月31日；本章"FY2026"指截至2026年1月31日的财年。
