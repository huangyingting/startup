  - number: '1.4'
    title: 规模、财务指标与市场地位
    blocks:
    - type: paragraph
      body: >-
        截至2025年底，Netskope 服务于逾30个国家的4,000余家企业级客户，其中包括逾30%的 Fortune 100
        企业。公司全球雇员约3,100人，主要集中于北美（约1,600人）、亚洲（约977人）及欧洲（约413人），在圣克拉拉、圣路易斯、悉尼、布鲁塞尔、圣保罗、班加罗尔、东京及新加坡设有办公室。

        FY2024年度收入达 $600M，至2025年11月 ARR 增至约 $707M。2025年上半年收入为 $328M（较 H1 2024 的 $251M
        增长），同比增速约30%。尽管规模可观，公司仍处于净亏损状态：H1 2025 净亏损 $170M，较 H1 2024 的 $207M 有所收窄，公司目标在 FY2025 实现正自由现金流（FCF）。FY2025
        10-K 年报已于2026年3月31日提交 SEC，但含毛利率、NRR 及单位经济在内的详细财务数据在本研究周期内未能获取。

        截至2025年5月，Netskope 已连续四年被列入 Gartner SASE 平台与 SSE 魔力象限领导者，与 Zscaler 及 Palo Alto Networks 并列。公司 NewEdge
        网络自2019年启动后已扩展至全球60余个数据中心，在不降低性能的前提下提供实时安全防护，是企业级市场的关键卖点。截至2026年5月13日收盘，NTSK 股价约为 $10.56，较 $19 的 IPO
        定价折价约44%，折射出上市后的市场行情。

        截至本报告运行日期，尚未获证实的关键指标包括：毛利率百分比、净收入留存率（NRR）及客户获取成本，均为待审查的2026年3月10-K 私有披露内容。
