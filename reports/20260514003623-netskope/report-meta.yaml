companyProfile:
  summary: >-
    Netskope, founded in 2012 in Los Altos, California by Sanjay Beri and Krishna Narayanaswamy,
    is the developer of the Netskope One SASE platform and the NewEdge private cloud network.
    The company delivers inline Security Service Edge (SSE) — cloud access security broker (CASB),
    secure web gateway (SWG), and zero-trust network access (ZTNA) — together with SD-WAN,
    AI-native DLP, and its AgentSkope AI agent security module. Netskope completed its IPO on
    Nasdaq in November 2025 at $19 per share. As of May 2026, the stock trades at $10.56, a
    44% discount to IPO price, implying an enterprise value of approximately $4.2 billion on
    trailing revenue of $709 million.
  foundedDate: "2012-01-01"
  founders:
    - name: Sanjay Beri
      role: CEO and Co-Founder
      background: >-
        Previously VP of Products at Juniper Networks and senior roles at Cisco and Oracle;
        15+ years in networking and security.
    - name: Krishna Narayanaswamy
      role: CTO and Co-Founder
      background: >-
        Former Distinguished Engineer at Juniper Networks; deep expertise in SSL/TLS inspection
        and inline traffic processing architectures.
  foundingLocation: Los Altos, CA, USA
  headquarters: Santa Clara, CA, USA
  productSummary: >-
    Netskope One platform: CASB, SWG, ZTNA (Private Access), AI-native DLP, Cloud Firewall,
    SD-WAN (via Infiot acquisition), and AgentSkope AI agent security. Delivered via 50+
    owned NewEdge PoPs with sub-10 ms latency SLA in major metros. FedRAMP High authorized.
  customerFocus: >-
    Large enterprises and government agencies; ~1/3 of the Fortune 100 are customers;
    strongest in financial services, healthcare, manufacturing, and public sector.
  businessModel: >-
    Subscription SaaS; annual and multi-year contracts; sold primarily through channel partners
    (95.3% of FY2026 revenue through indirect channel — VARs, MSSPs, and system integrators).
  stage: "Public (Nasdaq: NTSK, IPO November 2025)"
  fundingStatus: >-
    Raised approximately $1.73 billion in equity pre-IPO (investors include Accel, Sequoia,
    Lightspeed, Goldman Sachs, Base10 Partners); IPO raised ~$908 million gross proceeds;
    $700.3 million in convertible notes outstanding; accumulated deficit of $2.1 billion.
  disclosureProfile: public

