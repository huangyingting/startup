  evidenceGaps:
    - id: convertible-note-terms-undisclosed
      title: Convertible Note Conversion Price, Maturity Date, and Covenants Not Publicly Summarized
      type: private-evidence-only
      severity: material
      topic: convertible-notes-terms
      missingEvidence: >-
        Conversion price per share, maturity date(s), interest rate, put/call options, change-of-control provisions,
        and dividend anti-dilution protections for the $700.3M convertible notes outstanding as of January 31, 2026.
      whyItMatters: >-
        If the conversion price exceeds the current stock price of $10.56, note holders may elect cash settlement at
        maturity creating a future cash obligation potentially exceeding $700M that could require a dilutive equity raise.
      diligencePath: >-
        Review the full indenture agreement for convertible notes in the SEC EDGAR system; model scenarios at 90%, 80%,
        and 70% of conversion price to assess dilution and cash settlement probability; request CFO briefing on
        refinancing timeline and board-level capital structure strategy.
      relatedQuestionRefs:
        - QV019

    - id: ntsk-sell-side-coverage-gap
      title: Limited Sell-Side Analyst Coverage Reduces Consensus Reliability
      type: missing-source
      severity: minor
      topic: analyst-consensus-coverage-gap
      missingEvidence: >-
        Only 5-8 sell-side analysts cover NTSK versus 20+ covering Zscaler; NTM revenue consensus of approximately
        $835M is based on a limited coverage set that may not fully reflect all growth and competitive scenarios.
      whyItMatters: >-
        Thin analyst coverage means consensus forecasts are less reliable as a valuation anchor; individual analyst
        model assumptions can swing the implied NTM multiple by 1-2 turns.
      diligencePath: >-
        Build proprietary financial model from 10-K, H1 FY2026 results, and management commentary; sensitize to NRR
        scenarios; cross-check with independent sources including StockAnalysis and FinanceCharts consensus.

    - id: comparable-valuation-table-partial-coverage
      title: Comparable Valuation Table Is Partial Private Comparables Not Independently Audited
      type: private-evidence-only
      severity: minor
      topic: comparable-valuation-table
      missingEvidence: >-
        Cato Networks ARR of approximately $280M and valuation of $3.2B are based on third-party database estimates
        and press reports, not audited financials; Axis Security ARR at acquisition is estimated, not confirmed.
      whyItMatters: >-
        Unaudited private-company comparables may overstate or understate true ARR multiples if revenue definitions
        differ; Netskope's GAAP subscription revenue recognition may differ from Cato Networks' ARR reporting.
      diligencePath: >-
        Request Cato Networks ARR confirmation from channel partners or secondary research firms; verify Axis Security
        ARR at acquisition from HPE/Aruba investor disclosures; build sensitivity around private comp multiples.
      relatedTableRefs:
        - TV004

    - id: nrr-cohort-segment-breakdown-missing
      title: NRR by Customer Cohort and Segment Not Disclosed
      type: private-evidence-only
      severity: material
      topic: nrr-cohort-segment-breakdown
      missingEvidence: >-
        Netskope does not publicly disclose NRR broken out by customer segment (SMB, commercial, enterprise, federal),
        customer cohort (vintage year), or geography; the 116% blended NRR may mask material compression in specific
        segments most vulnerable to Microsoft Entra SSE.
      whyItMatters: >-
        If the NRR compression from 118% to 116% is concentrated in the mid-market or SMB segment most exposed to
        Microsoft, it would validate the bear case thesis; if evenly distributed or enterprise-driven, the competitive
        risk is more manageable.
      diligencePath: >-
        Request segment-level NRR data in data room; review management presentation for cohort analysis; conduct
        channel partner interviews on competitive deal dynamics in different customer segments.

    - id: microsoft-competitive-win-rate-data-unavailable
      title: Microsoft Entra SSE vs Netskope Head-to-Head Win Rate Data Not Publicly Available
      type: missing-source
      severity: material
      topic: microsoft-competitive-win-loss-data
      missingEvidence: >-
        No public source discloses Netskope's win rate versus Microsoft Entra SSE in competitive evaluations;
        customer-reported anecdotal evidence from reviews does not constitute statistically valid win/loss data.
      whyItMatters: >-
        Microsoft Entra SSE is the primary bear-case thesis-break trigger; without quantified win/loss data, the
        probability of the bear case of $5-8 per share cannot be precisely calibrated.
      diligencePath: >-
        Request competitive win/loss analysis from Netskope sales operations team; conduct channel partner interviews
        with 3-5 VAR/MSP partners active in Microsoft-heavy accounts; review Gartner Peer Insights for Microsoft
        Entra SSE adoption signals in enterprise accounts.
