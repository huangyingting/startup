  - id: thesis-breaks-and-kill-criteria
    title: Thesis-Break and Kill Criteria
    body: >-
      Six thesis-break triggers would cause immediate divestiture or investment halt. First and most important: NRR declining
      below 110% for two consecutive fiscal quarters, signaling accelerating enterprise churn or systematic mid-market loss
      to Microsoft Entra SSE. NRR at 110% or below would strip the growth premium entirely and re-rate Netskope to
      infrastructure-as-a-service multiples of 3-4x revenue. Second: full-year revenue growth falling below 15% for two
      consecutive quarters, consistent with mid-market saturation and inability to expand in the Fortune 100. Third:
      Microsoft Entra SSE causing documented or estimated ARR churn exceeding 5% of the installed base in a single year,
      confirming the structural threat. Fourth: the $700.3M convertible notes requiring cash settlement at maturity without
      refinancing, a scenario that could require an equity raise at $10-12/share severely diluting existing shareholders.
      Fifth: a material FedRAMP authorization revocation or data breach involving customer data exfiltrated through the
      inline proxy, an existential brand damage that would likely cause rapid ARR decline in the federal and regulated-
      industry segments. Sixth: Palo Alto Networks platformization deals causing more than 5% ARR customer defection in a
      12-month period. Monthly monitoring indicators include: NTSK stock price relative to convertible note conversion
      price; quarterly NRR trend; competitive displacement news from channel partners; and any SEC disclosure of material
      adverse developments.
    tableRefs:
      - TV005
    figureRefs: []
