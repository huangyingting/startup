  - id: final-diligence-asks-and-exit-readiness
    title: Final Diligence Asks and Exit Readiness
    body: >-
      Six critical diligence asks remain before an investment decision can be made with high confidence. Most important is
      the full indenture and term sheet for the $700.3M convertible notes: conversion price, maturity date(s), interest rate,
      put/call provisions, and change-of-control clauses. If the conversion price is above the current stock price of $10.56,
      cash settlement at maturity represents a material future obligation. Second: NRR by customer cohort and segment (SMB,
      commercial, enterprise, federal) broken out quarterly to identify whether the 118%-to-116% compression is concentrated
      in a specific segment, particularly mid-market where Microsoft risk is highest. Third: channel partner revenue
      concentration for the top 5 and top 10 indirect partners as a percentage of FY2026 ARR; at 95.3% indirect revenue, a
      major partner defection would be material and is not currently visible in public filings. Fourth: AgentSkope commercial
      pipeline and ARR contribution as of Q1 FY2027 (April 2026), since this is the primary growth catalyst for the bull
      case and currently unquantified. Fifth: competitive win/loss data versus Zscaler and Microsoft Entra SSE from the last
      four quarters with deal volume, win rates, and competitive displacement metrics. Sixth: employee attrition data
      post-IPO by function, given that equity compensation for many employees is likely underwater at current stock prices.
      Exit readiness: the IPO has already been completed. For new public market investors, exit liquidity is available
      through normal market trading. Upside M&A scenario: Cisco, CrowdStrike, or Palo Alto Networks could acquire Netskope
      at a 20-30% premium to current price ($13-14/share), implying a $5-6B transaction value. This is not the base case
      but represents a valid alternative exit thesis given the attractive ARR, NRR, and government certifications.
    tableRefs:
      - TV006
