  - id: scenarios-and-sensitivity
    title: Scenarios and Sensitivity Analysis
    body: >-
      Three scenarios bracket the Netskope investment. Bull case ($16-20/share, 7-9x NTM): requires sustained 24%+ revenue
      growth driven by SASE platform consolidation wins, NRR recovery to 118%+ indicating successful expansion into new
      modules including AgentSkope and ZTNA, and successful refinancing of the $700.3M convertible notes. This scenario
      implies an NTM revenue of approximately $880M and would require peers to maintain elevated multiples. Probability
      signal: 25%. Base case ($10-13/share, 5-6x NTM): assumes 16-20% revenue growth consistent with analyst consensus
      (~$820M NTM revenue), NRR stable at 115-116%, and moderate competitive pressure from Microsoft and Palo Alto. The
      company reaches positive FCF in FY2027, limiting further multiple compression. Probability signal: 50%. Bear case
      ($5-8/share, 3-4x NTM): triggered by growth deceleration to 6-12% YoY (possibly Microsoft Entra SSE wins displacing
      mid-market Netskope deals), NRR falling below 110%, or a forced equity raise from convertible note cash settlement.
      NTM revenue assumption: ~$750M. Probability signal: 25%. Netskope's near-breakeven FCF ($-2.2M in H1 FY2026) means
      the bear case does not involve immediate insolvency risk, but could require dilutive equity financing. The GRR of ~96%
      provides a floor under revenue destruction scenarios. Analyst consensus for NTM revenue (~$835M) implies the market
      currently prices a mid-base scenario with limited upside premium.
