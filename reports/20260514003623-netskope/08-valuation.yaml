chapter:
  number: 8
  title: Valuation
  summary: >-
    Netskope (Nasdaq: NTSK) completed its IPO in November 2025 at $19/share implying a $7.3B valuation, but the stock has
    declined 44% to $10.56 (May 2026), yielding an enterprise value of approximately $4.2B or roughly 5.0x NTM revenue of
    ~$835M — a 50-55% discount to SSE/SASE peers Zscaler (10x) and Cloudflare (13x). The overall recommendation is CAUTIOUS
    PASS / TRACK: the 116% NRR, 32% revenue growth, FedRAMP High moat, and Fortune 100 penetration support a bull case of
    $16-20/share (7-9x NTM), but $700.3M in convertible notes, NRR compression from 118% to 116%, 95.3% channel
    concentration, and Microsoft Entra SSE competition constrain conviction. Base case is $10-13/share with a buy trigger
    contingent on NRR stabilization and note refinancing clarity.

sections:
  - id: investment-thesis-and-recommendation
    title: Investment Thesis and Recommendation
    body: >-
      Netskope's investment thesis rests on four pillars: (1) best-in-class inline proxy SSE architecture with FedRAMP High
      authorization creating a defensible federal sector moat unavailable to most competitors; (2) strong enterprise traction
      with approximately one-third of the Fortune 100 as customers and ARR >$100K customer count of 1,531 representing 86%
      of ARR; (3) durable revenue growth at 32% YoY to $709.1M in FY2026 with 116% NRR demonstrating strong upsell and
      cross-sell in the installed base; and (4) an AI security pivot via AgentSkope targeting the fast-growing GenAI
      governance market. The anti-thesis is equally substantial: the stock is 44% below its November 2025 IPO price of
      $19/share; $700.3M in convertible notes create potential cash settlement overhang; NRR has compressed from 118% (H1
      FY2026) to 116% (full year FY2026) suggesting competitive pressure; and Microsoft Entra SSE native expansion within
      M365 E3/E5 threatens Netskope's mid-market growth vector. Channel concentration at 95.3% of FY2026 revenue through
      indirect partners adds structural fragility. The overall recommendation is CAUTIOUS PASS / TRACK at the current
      $10.56 price. The valuation discount to peers is real but conditional on sustaining growth above 20% and stabilizing
      NRR. Buy criteria: NRR stabilization at or above 116% for two consecutive quarters AND refinancing or conversion
      of the $700.3M notes AND continued revenue growth above 18%.
