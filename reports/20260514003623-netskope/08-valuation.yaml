  - id: valuation-context-and-comparables
    title: Valuation Context and Comparables
    body: >-
      At $10.56/share as of May 13, 2026, Netskope trades at approximately 5.0x NTM revenue (~$835M analyst consensus),
      5.9x EV/ARR ($707M), and 5.9x EV/TTM revenue ($709.1M FY2026). The IPO-day enterprise value implied ~10.5x EV/ARR at
      the $19 IPO price, consistent with SASE private market multiples: Cato Networks raised $238M at ~$3.2B valuation in
      2023-2024 (~11.4x ARR on ~$280M estimated ARR), and Axis Security was acquired by HPE/Aruba in 2023 for ~$452M
      (~12-15x ARR). The current 5.0x NTM multiple represents a 50-55% discount to Zscaler's ~10x and Cloudflare's ~13x.
      Palo Alto Networks trades at ~9x NTM with substantially higher FCF margins (~35%), while CrowdStrike commands ~18x NTM
      reflecting premium growth expectations. The multiple discount is partially justified: Netskope's FCF is near-breakeven
      versus 25-35% FCF margins for peers, and the $700.3M convertible notes create financial leverage not present in
      comparable companies. However, the discount also reflects IPO momentum destruction from $9.5B first-day valuation to
      ~$4.2B EV in six months rather than fundamental business deterioration. Revenue growth deceleration from IPO-era
      expectations (previously implied 25%+ growth) to the current consensus (~18% NTM) accounts for some of the re-rating.
