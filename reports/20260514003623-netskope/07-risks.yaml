- id: financial-and-model-risks
  title: Financial and Model Risks
  body: >-
    Netskope's financial risk profile is dominated by three vectors: convertible note overhang, IPO stock underperformance,
    and NRR compression. The company has $700.3M in convertible notes outstanding as of January 31, 2026 (10-K). Conversion
    terms and maturity dates are not separately disclosed in public summaries, but if the conversion price exceeds the current
    stock price ($10.56 on May 13, 2026—44% below the $19 IPO price), holders may elect cash settlement at maturity rather
    than conversion, creating a future cash obligation. The stock's 44% decline from IPO price restricts Netskope's ability
    to raise equity capital at non-dilutive prices and creates an 'IPO overhang' where early investors and employees face
    locked-up paper losses that create attrition incentives. NRR compression (118% per S-1 in H1 FY2026 → 116% per 10-K full
    year FY2026) suggests second-half contraction or net expansion deceleration. If NRR continues to compress toward 110%,
    the growth narrative weakens materially and the revenue multiple compression already visible (stock at ~10x FY2026 revenue
    vs. 26x at IPO) would continue. Free cash flow was $(2.2M) in H1 FY2026—near breakeven but sensitive to a revenue deceleration
    or increased CAC. The accumulated deficit of $2.1B, while not an operational constraint, signals the long unprofitable
    history that public market investors must underwrite. Analyst consensus (StockAnalysis.com) shows revenue growth forecast
    decelerating from 32% (FY2026) to ~24% (FY2027), suggesting the market has already partially priced in deceleration risk.
