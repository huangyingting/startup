    - Emerging — customer contracts expanding; local legal reviews ongoing
    - Medium
    - Medium
    - Data localization options via regional PoPs; local legal counsel engagement; contractual DPAs by jurisdiction
    - Regulatory fines in markets without local PoP; legal uncertainty during transition periods; contract renegotiation
