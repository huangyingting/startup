- id: TR002
  title: Operational and Security Risk Register
  columns:
  - Risk
  - Category
  - Likelihood
  - Impact
  - Current Mitigation
  - Residual Exposure
  - Monitoring Indicator
  rows:
  - - Security breach via inline proxy (data exfiltration through NewEdge)
    - Security
    - Low-Medium
    - Critical
    - ISO 27001/27701, SOC 2 Type II, FedRAMP High; owned PoP infrastructure; no third-party CDN in data path; 
      penetration testing; bug bounty program
    - Single breach event could trigger mass customer churn and SEC cybersecurity disclosure; brand damage 
      disproportionate to incident scale due to proxy position
    - Monitor SEC 8-K cybersecurity disclosures; track CVE disclosures for NewEdge components; check status.netskope.com
      for undisclosed events
  - - SSL/TLS inspection breakage — certificate pinning and financial app compatibility
    - Operational
    - Medium
    - Medium
    - Per-app SSL bypass policies; published bypass configuration guides; customer success-led onboarding to tune 
      exclusion lists
    - Persistent customer frustration (confirmed by G2, Capterra, eSecurityPlanet reviews); support escalations; 
      increased churn risk in financial services vertical
    - Track support ticket volume for SSL-related issues; monitor G2/Capterra review themes quarterly; review NRR by 
      vertical
  - - NewEdge PoP outage or regional availability disruption
    - Infrastructure
    - Low
    - High
    - 50+ owned PoPs globally; geographic redundancy; published status page with incident history; SLA commitments in 
      contracts
    - Concentrated PoPs in major metro areas; regional outage affects all customers in geography; contractual SLA breach
      triggers credits
    - Monitor status.netskope.com uptime history; track SLA credit provisions in customer contracts; review PoP density 
      in APJ (18.5% of revenue)
  - - AI-powered DLP false positive/negative rate
    - Product
    - Medium
    - Medium
    - Continuous model retraining; customer-configurable sensitivity thresholds; exception workflows; human review for 
      high-severity alerts
    - False positives block legitimate business workflows and increase admin burden; false negatives allow real data 
      exfiltration; both reduce confidence in the DLP product
    - Track support escalations related to DLP accuracy; monitor adverse review mentions of DLP quality; review accuracy
      benchmarks in product documentation
  - - Support quality — response times and escalation handling
    - Customer Success
    - Medium
    - Medium
    - 24/7 global support tiers; dedicated CSM for enterprise accounts; partner-delivered support for channel accounts
    - Adverse reviews on PeerSpot/G2/Capterra consistently cite slow escalation response; support quality gap could 
      contribute to NRR compression at renewal
    - Track NPS/CSAT scores; monitor G2/Capterra support-related review themes; review churn cohorts where support 
      tickets preceded non-renewal
  - - Product complexity and admin overhead for policy management
    - Usability
    - High
    - Low-Medium
    - Simplified policy templates; Netskope University training; partner-led managed services for complex deployments
    - Complexity slows deployment timelines and increases time-to-value; can deter mid-market adoption where dedicated 
      security teams are thin
    - Track deployment time-to-value metrics in customer success data; monitor review platform themes; assess mid-market
      NRR vs. enterprise NRR
  notes: Likelihood and impact ratings are qualitative, derived from customer review aggregation (G2, Capterra, 
    eSecurityPlanet, Computer Weekly), technical architecture analysis, and FedRAMP/ISO certification status as of May 
    2026. No major multi-day outages appear on the public status page as of the report date. Security breach risk is 
    rated Low-Medium in likelihood but Critical in impact due to the proxy architecture.
