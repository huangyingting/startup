- id: FR003
  title: Risk Transmission Map — Financial and Model Risk Cascade
  type: dag
  layout: wide
  summary: >-
    Risk transmission map showing how macro and competitive triggers cascade into Netskope's financial model. NRR compression
    is the central node: it drives revenue miss, which cascades into stock price decline, convertible note pressure, and talent
    attrition. Competitive displacement by Palo Alto and Microsoft feeds NRR compression upstream. Channel partner loss accelerates
    both competitive displacement and direct revenue miss. The map illustrates that NRR is the single most important leading
    indicator to monitor for the investment thesis.
