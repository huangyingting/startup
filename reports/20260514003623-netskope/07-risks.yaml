  evidenceGaps:
  - id: export-controls-classification-undisclosed
    title: EAR/ITAR Export Classification of TLS Inspection Technology Not Publicly Disclosed
    type: private-evidence-only
    severity: minor
    topic: export-controls-risk
    missingEvidence: ECCN classification of Netskope's SSL/TLS inspection engine under US Export Administration 
      Regulations; no public disclosure of export compliance review findings or classification.
    whyItMatters: If TLS inspection technology is classified as dual-use, exports to certain jurisdictions could be 
      restricted, creating friction for international expansion and potential compliance liability for current 
      deployments in sanctioned or restricted jurisdictions.
    diligencePath: Request export compliance memo from Netskope legal team; verify ECCN classification for the SSL 
      inspection engine and deep-packet analysis components; confirm current jurisdictions of active deployments against
      restricted party lists.
    relatedQuestionRefs:
    - QR006
  - id: apj-latency-pop-density-unquantified
    title: APJ PoP Density and Latency Impact on 18.5% of Revenue Not Quantified
    type: missing-source
    severity: minor
    topic: apj-latency-operational-risk
    missingEvidence: Per-region PoP count and latency benchmarks for APJ vs. Americas; percentage of APJ customers 
      reporting latency as a pain point in formal NPS/CSAT surveys.
    whyItMatters: APJ represents 18.5% of FY2026 revenue and is a stated growth region; if PoP density is materially 
      lower there, latency risk could suppress NRR in the region and limit expansion opportunity.
    diligencePath: Request per-region PoP density map; review APJ NRR separately in data room; obtain customer 
      satisfaction data by region from CSM team.
    relatedQuestionRefs:
    - QR012
  - id: top-channel-partner-concentration-undisclosed
    title: Top 5 and Top 10 Channel Partner Revenue Concentration Not Disclosed
    type: private-evidence-only
    severity: material
    topic: channel-concentration-risk
    missingEvidence: Revenue or ARR attributable to Netskope's top 5 and top 10 channel partners individually and as a 
      percentage of total indirect revenue; partner termination risk scenarios.
    whyItMatters: With 95.3% of revenue through indirect channel, if the top 3 partners represent 30%+ of total revenue,
      a competitive defection by any one would cause a material revenue shortfall that direct sales cannot quickly 
      replace.
    diligencePath: Request partner revenue concentration in management presentation or data room; review channel partner
      agreement terms for termination notice periods and exclusivity clauses; assess top-partner relationship history 
      and tenure.
    relatedQuestionRefs:
    - QR016
    relatedTableRefs:
    - TR001
  - id: convertible-note-terms-not-public
    title: Convertible Note Conversion Price and Maturity Date Not Publicly Summarized
    type: private-evidence-only
    severity: material
    topic: convertible-notes-financial-risk
    missingEvidence: Conversion price per share, maturity date(s), interest rate, put/call options, and 
      change-of-control provisions for the $700.3M convertible notes outstanding.
    whyItMatters: If the conversion price is at or above the current stock price ($10.56), note holders may elect cash 
      settlement at maturity rather than conversion, creating a future $700M+ cash obligation that could require an 
      equity raise at dilutive terms.
    diligencePath: Review the full indenture agreement for convertible notes in the SEC EDGAR filing system; model 
      scenarios at 90%, 80%, and 70% of conversion price to assess dilution and cash settlement probability.
    relatedQuestionRefs:
    - QR019
  - id: layoff-scale-unconfirmed
    title: Confirmed Scale and Scope of Netskope Layoffs Not Publicly Disclosed
    type: missing-source
    severity: minor
    topic: people-risk-layoffs
    missingEvidence: Official headcount reduction announcements, WARN Act filings, or verified reports of the scale and 
      affected departments for the 2024 layoffs referenced in Teamblind posts.
    whyItMatters: If layoffs disproportionately affected engineering or sales, this could signal internal execution 
      challenges or resource constraints that are not visible in aggregate revenue metrics.
    diligencePath: Search WARN Act database for California/other-state filings by Netskope; request headcount data by 
      function and location for FY2024-FY2026 in data room; conduct reference checks with recently departed employees.
    relatedQuestionRefs:
    - QR026
