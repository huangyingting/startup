    - Map customer contract jurisdictions to PoP coverage; confirm PDPL/LGPD compliance gap assessment exists
  - - SSL/TLS MitM inspection — ECPA and employee-monitoring statutes
    - USA (Federal + States), EU, APAC
    - Conditional — consent and notice required; varies by jurisdiction
    - Low-Medium
    - Medium
    - Customer responsible for employee notice and consent; Netskope provides bypass controls for sensitive app 
      categories; product documentation covers compliance guidance
    - Civil liability to enterprise customers if employee monitoring policies inadequate; regulatory scrutiny in EU 
      under Art.88 GDPR (employee data)
    - Review product-level consent/bypass documentation; confirm customer acceptable use policy covers employee 
      monitoring; test bypass policies for regulated app categories
