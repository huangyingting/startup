- id: people-execution-and-mitigation
  title: People, Execution, and Mitigation
  body: >-
    Netskope's people risk is concentrated in its two co-founders. CEO Sanjay Beri has led the company for 15+ years from
    founding; his departure would risk customer relationships, partner trust, and strategic coherence during a critical post-IPO
    scaling phase. CTO Krishna Narayanaswamy co-founded Netskope and owns the AI/ML product architecture, including AgentSkope;
    his departure would threaten the AI Security differentiation thesis. Teamblind posts in 2024 reference Netskope layoffs,
    consistent with a SaaS company optimizing for path to profitability post-IPO, but the scale is not publicly confirmed.
    The engineering organization is split between Bay Area (HQ) and Bangalore R&D; both talent markets are competitive. Execution
    risks center on: (1) mid-market expansion—Netskope's go-to-market is tuned for Fortune 500 enterprises but the company
    must grow into the 500-5,000 employee segment to sustain NRR; (2) channel management—95.3% indirect revenue requires active
    partner enablement and margin management; (3) product complexity—the expansion from SSE to full SASE to AI Security to
    IoT/OT requires disciplined prioritization. Key thesis-break indicators to monitor are: NRR dropping below 110% for two
    consecutive quarters; stock price sustained below $8 (triggering additional dilution pressure from notes or equity raises);
    departure of Beri or Narayanaswamy; loss of FedRAMP High authorization; or a material security breach disclosed per SEC
    cybersecurity disclosure rules.
