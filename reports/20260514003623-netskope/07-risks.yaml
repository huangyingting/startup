- id: TR003
  title: Partner and Dependency Risk Register
  columns:
  - Partner / Dependency
  - Relationship Type
  - Revenue / Operational Concentration
  - Substitute Availability
  - Risk if Disrupted
  - Diligence Path
  rows:
  - - Indirect channel partners (resellers, MSPs, SIs)
    - Revenue delivery — 95.3% of FY2026 revenue ($675.7M)
    - Critical — top partners undisclosed; high aggregate concentration
    - Low — direct sales force is small (4.7% revenue); rebuilding would take 2-3 years
    - Major partner re-prioritization to Palo Alto/Zscaler could cause rapid revenue disruption; loss of field coverage 
      in key geographies
    - Request top 5 partner revenue concentration; review partner agreement terms including exclusivity and termination 
      clauses; assess partner health scores
  - - Microsoft (M365 integration, Entra SSE, Copilot Security)
    - Integration partner + competitive adjacency
    - High — M365 integration critical for CASB/DLP use cases; Entra SSE competes directly
    - Moderate — Zscaler and Palo Alto offer comparable M365 integrations
    - Microsoft Entra SSE bundle in E5 licenses undermines Netskope value proposition for mid-market; loss of API 
      integration access could degrade product capability
    - Monitor Microsoft Entra SSE feature releases quarterly; track E5 bundling terms; assess customer conversations 
      where Microsoft-native SSE was evaluated
  - - Palo Alto Networks (competitive platformization)
    - Competitor offering payment deferrals to consolidate customers
    - High competitive pressure — PANW Prisma Access directly overlaps Netskope One
    - Moderate — Netskope's DLP depth and CASB heritage remain differentiators
    - PANW platformization deals displace Netskope at renewal; margin compression if Netskope discounts to compete; NRR 
      pressure in mixed-vendor accounts
    - Track PANW platformization deal frequency in customer conversations; monitor PANW pricing terms and deferral 
      offers; review Netskope win/loss data vs. PANW
  - - AWS, Azure, GCP (hyperscaler infrastructure for NewEdge PoPs)
    - Infrastructure dependency — NewEdge PoPs colocate near hyperscaler data centers
    - Medium — 50+ PoPs distributed across providers; not single-cloud
    - Moderate — company owns PoP hardware; not purely cloud-hosted; can migrate over time
    - Hyperscaler pricing changes or data egress cost increases could compress gross margins; API integration 
      deprecations could affect product integrations
    - Review PoP colocation contract terms and pricing; assess hyperscaler API dependency depth for product 
      integrations; monitor cloud provider SSE announcements
  - - Identity providers (Okta, Azure AD/Entra ID, SAML-based IdPs)
    - Critical product integration — zero-trust policy enforcement requires IdP binding
    - High operational dependency — ZPA and ZTNA policy enforcement requires live IdP integration
    - Low for switching — customers with Okta/Azure AD are deeply locked in; Netskope must support all major IdPs
    - IdP API changes or deprecations could break policy enforcement; Okta security incidents (2023) exposed dependency 
      on third-party IdP security posture
    - Review IdP integration test coverage and monitoring; assess SLA from IdP providers for enterprise customers; track
      IdP provider security advisories
  - - Broadcom/VMware (removed major integration and potential acquisition partner)
    - Former partner — VMware NSX and SD-WAN competed and integrated with Netskope
    - Low direct revenue; strategic — removed a potential acquirer and integration target
    - Not applicable — relationship already disrupted by Broadcom acquisition
    - Netskope lost a credible acquisition exit path; enterprise customers migrating from VMware SD-WAN may not choose 
      Netskope's SD-WAN (from Infiot); potential integration gaps
    - Assess SD-WAN competitive positioning post-Broadcom/VMware; track VMware customer migration patterns; review 
      Infiot SD-WAN integration depth vs. VMware alternatives
  notes: Revenue concentration for indirect channel is from FY2026 10-K (95.3% indirect). Top partner concentration is 
    not publicly disclosed; assessment is based on industry norms for similar channel-heavy SaaS vendors. Microsoft and 
    Palo Alto risk assessments incorporate SASE.cloud vendor analysis, Forrester ZTNA landscape, and CSHub competitive 
    analysis. All ratings as of May 2026.
