- id: partner-and-dependency-risks
  title: Partner and Dependency Risks
  body: >-
    Channel concentration is Netskope's most structurally significant dependency risk: 95.3% of FY2026 revenue ($675.7M of
    $709M) flowed through indirect channel partners—resellers, MSPs, and SIs—leaving only 4.7% from direct sales. While the
    company does not disclose its top-partner revenue concentration, aggregated indirect revenue at this scale implies that
    the top 5-10 channel partners likely represent a material share of revenue, creating churn or dis-engagement risk if any
    major partner re-prioritizes Palo Alto Networks or Zscaler in a platformization deal. Microsoft is simultaneously Netskope's
    largest integration partner and its most credible competitive threat: Microsoft Entra SSE (launched 2024), Global Secure
    Access, and Defender for Cloud Apps increasingly bundle SSE-adjacent capabilities into Microsoft 365 E3/E5, creating price
    compression risk for mid-market deals. Palo Alto Networks' aggressive 'platformization' strategy offers customers multi-year
    payment deferrals to consolidate onto Prisma Access, directly competitive with Netskope One. Infrastructure dependencies
    on AWS, Azure, and GCP (NewEdge PoPs colocate near or within hyperscaler data centers) create concentration in three cloud
    providers; Broadcom's VMware acquisition removed a major enterprise infrastructure integration partner. The SASE.cloud
    vendor analysis and Forrester ZTNA landscape both confirm Netskope's competitive positioning but flag Microsoft and Palo
    Alto as escalating risks.
