  - id: capital-adequacy-and-financing
    title: Capital Adequacy and Financing
    body: >-
      Netskope's capital position improved substantially in 2025 following its successful IPO. Pre-IPO
      cash, cash equivalents, and marketable securities totaled $261.4 million as of July 31, 2025. The
      IPO, completed on Nasdaq (ticker: NTSK) in 2025, raised approximately $908 million at $19 per share,
      implying a post-IPO market capitalization of approximately $7.3 billion at pricing. Shares surged
      on debut, with Reuters reporting an implied valuation of approximately $9.5 billion at the stock's
      opening trade. Pro-forma post-IPO cash is estimated at approximately $1.1 billion ($261.4M pre-IPO
      plus ~$876M net IPO proceeds after underwriting fees).

      The primary capital risk is $700.3 million in convertible notes outstanding as of July 31, 2025.
      Conversion terms, maturity dates, and interest rates are disclosed in the S-1 but were not fully
      confirmed in public summaries; the notes represent a material contingent dilution or cash obligation.
      The accumulated deficit reached $(2.119B) as of July 31, 2025, and total stockholders' equity was
      negative at $(612.1M) pre-IPO. At IPO, preferred stock ($1,050.6M) converts to common equity,
      partially reversing the stockholders' deficit. Critically, free cash flow has inflected: H1 FY2026
      FCF was $(2.2M)—near breakeven—versus $(126.5M) in H1 FY2025 and $(151.1M) for all of FY2025.
      At near-zero quarterly burn, the ~$1.1B post-IPO cash reserve provides effectively unlimited runway
      at current operational cadence.
