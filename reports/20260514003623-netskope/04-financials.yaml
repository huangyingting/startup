company:
  name: Netskope
chapter:
  number: 4
  title: Financials
  summary: >-
    Netskope's financials reflect a maturing SaaS business in rapid transition toward profitability.
    Revenue reached $538.3 million in fiscal year 2025 (ended January 31, 2025), growing 32% year-over-year,
    and the H1 FY2026 run-rate implies full-year FY2026 revenue of $600–700 million. ARR of $707 million
    as of July 31, 2025 (+33% YoY) provides strong forward visibility, anchored by a 118% NRR and 96% GRR.
    Gross margin improved dramatically from 59.8% in FY2024 to 70.9% in H1 FY2026, driven by NewEdge
    infrastructure leverage. Free cash flow reached near-breakeven at $(2.2M) in H1 FY2026, versus
    $(151.1M) for all of FY2025. The IPO completed in 2025, raising approximately $908 million at a $7.3
    billion valuation on Nasdaq (ticker NTSK), with the stock surging to an implied $9.5 billion+ valuation
    on debut. Pro-forma post-IPO cash is approximately $1.1 billion. Key capital risk is $700.3 million in
    convertible notes; accumulated deficit is $(2.1B). CAC-payback, channel-level gross margin, and federal
    sector revenue remain undisclosed and are the primary diligence gaps.

sections:
  - id: revenue-model-and-streams
    title: Revenue Model and Streams
    body: >-
      Netskope generates substantially all revenue from subscription licenses to its Netskope One
      cloud-native security platform. The model is per-seat, per-year, with customers purchasing
      annual or multi-year contracts that are recognized ratably over the contract term. Platform
      tiers—Core (SSE baseline), Advanced (adds SSPM, SkopeAI behavioral analytics), and Ultimate
      (full SASE with NewEdge SD-WAN)—allow upsell-driven ARR expansion within existing accounts.
      The result is a durable expansion engine: NRR of 118% means existing customers organically
      grow Netskope's ARR by approximately 18% annually, net of churn.

      Fiscal year 2025 revenue was $538.3 million (+32% YoY from $406.9M in FY2024). The H1 FY2026
      result of $328.5 million (+31% YoY) implies a full-year run-rate of approximately $657 million,
      consistent with the $707 million ARR base as of July 31, 2025. Revenue mix is roughly 57%
      Americas and 43% international, with international revenue stable as a percentage across H1
      FY2025 and H1 FY2026, confirming that international expansion is scaling proportionally with
      domestic growth. A small professional-services component (implementation, migration, managed
      services) exists but is immaterial and not separately disclosed. The company operates on a
      January 31 fiscal year-end; "FY2026" in this chapter refers to the year ending January 31, 2026.
