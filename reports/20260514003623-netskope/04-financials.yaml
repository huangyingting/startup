  evidenceGaps:
    - type: private-evidence-only
      severity: material
      topic: CAC-by-channel
      missingEvidence: >-
        Netskope's S-1 does not disclose CAC by acquisition channel (direct enterprise, reseller/VAR,
        MSSP, or self-serve). The only publicly available figures are blended S&M totals, which include
        expansion and retention spend alongside new logo acquisition, making true new-logo CAC
        uncomputable from public data.
      whyItMatters: >-
        CAC payback is a core unit economics metric for SaaS underwriting. Without it, the return on
        S&M investment is opaque, and the impact of any channel shift (e.g., post-IPO direct sales
        motion vs. reseller reliance) cannot be modeled. The proxy estimate of more than 24 months is
        directionally plausible but insufficient for investment underwriting.
      diligencePath: >-
        Request S&M cost breakdown by channel and by purpose (new logo, expansion, retention) in the
        management presentation or virtual data room. Request CAC cohort analysis covering at least
        FY2024 and FY2025. Benchmark against Zscaler's disclosed channel efficiency metrics.
      relatedQuestionRefs: [QI024]

    - type: private-evidence-only
      severity: material
      topic: gross-margin-by-SKU
      missingEvidence: >-
        Netskope does not disclose gross margin disaggregated by product tier (Core, Advanced, Ultimate),
        by geography, or by customer segment (enterprise vs. mid-market). The reported 70.9% blended
        gross margin is the only public data point; the margin contribution of professional services
        (typically negative) versus subscription (typically 70–80%) is not separately disclosed.
      whyItMatters: >-
        If professional services or mid-market segments carry lower gross margins, the blended margin
        may be unsustainable at scale. Conversely, if the AI analytics and Ultimate tier carry premium
        margins, the mix-shift potential is not fully captured by the blended figure.
        Understanding margin by SKU is necessary to project the gross margin ceiling.
      diligencePath: >-
        Request gross margin by product line and customer segment in the virtual data room. Request a
        revenue bridge reconciling ARR-to-revenue for each major SKU. Compare against Zscaler's
        segment-level gross margin disclosures as a benchmark.
      relatedQuestionRefs: [QI025]

    - type: missing-source
      severity: moderate
      topic: competitor-pricing-pressure-impact
      missingEvidence: >-
        No public source directly quantifies the impact of Zscaler's or Palo Alto Networks' pricing
        tactics on Netskope's realized average selling price (ASP) or win/loss rates in 2026. Netskope's
        NRR improvement to 118% and GRR to 96% suggest pricing pressure has not materially impacted
        retention, but competitive discounting at new logo acquisition cannot be ruled out.
      whyItMatters: >-
        If Netskope is sustaining headline ARR by expanding within existing accounts while losing new
        logos to Zscaler or Palo Alto price competition, the NRR metric may mask a structurally
        weakening new-logo pipeline. Realized ASP compression in competitive deals is a key revenue
        quality risk.
      diligencePath: >-
        Request win/loss analysis by primary competitor (Zscaler, Palo Alto, Cato) for the trailing
        four quarters. Request new logo vs. expansion ARR split for FY2025 and H1 FY2026. Review
        Gartner Peer Insights pricing sentiment for Netskope vs. Zscaler in 2026.
      relatedQuestionRefs: [QI027]
