  - id: FI002
    title: Unit economics bridge
    type: flow
    layout: standard
    summary: >-
      Flow from new-logo S&M investment through initial ACV, NRR-driven expansion, and the
      GRR-constrained customer lifetime that defines long-run LTV.
    approximationNotes: >-
      CAC is not directly disclosed in Netskope's S-1. The proxy calculation uses aggregate S&M
      spend divided by net new ARR per period, which overstates true CAC for new logos by including
      expansion and retention spend. LTV is estimated as ACV divided by churn rate using GRR as the
      churn proxy. All estimates are directional and require company-disclosed CAC/payback data to confirm.
