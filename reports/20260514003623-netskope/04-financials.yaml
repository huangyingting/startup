          label: "S&M investment (new logo)"
          detail: "H1 FY2026 S&M: $147.4M total (blended new + expansion); declining as % of revenue (44.9% H1 FY2026 vs. 64.7% FY2024)"
        - id: n2
          label: "Initial contract ACV"
          detail: "Avg ARR per customer: $163.8K (Jul 2025); $148.7K prior year; expanding YoY = upsell at onboarding"
        - id: n3
          label: "NRR-driven expansion"
          detail: "118% NRR: existing base grows 18% net per year; expansion ARR compounds independently of new logos"
