  - id: unit-economics-and-sales-efficiency
    title: Unit Economics and Sales Efficiency
    body: >-
      Netskope's unit economics are strong where disclosed and opaque where not. The 118% NRR (up from
      113% in the prior year) is a defining characteristic—it means Netskope could theoretically grow
      revenue without adding a single new logo. The 96% GRR (up from 95%) implies a blended annual churn
      of approximately 4%, translating to an estimated average customer lifetime exceeding 20 years.
      Average ARR per customer was $163.8K as of July 31, 2025, up from $148.7K in the prior year period,
      confirming that contract values are expanding within the existing base as customers add modules.

      On the acquisition side, S&M spend declined in absolute terms in H1 FY2026 ($147.4M vs. $151.6M in
      H1 FY2025), while revenue grew 31%. S&M as a percentage of revenue fell from 64.7% in FY2024 to
      52.2% in FY2025 to 44.9% in H1 FY2026—a meaningful efficiency inflection driven by post-IPO brand
      awareness and enterprise word-of-mouth. R&D spend as a percentage of revenue similarly declined from
      55.2% to 47.2% to 42.8% over the same periods. The critical unquantified metric is CAC payback by
      channel. Given total S&M spend and net new ARR added per period, the proxy payback period is likely
      greater than 24 months for new logos, which is typical for enterprise security SaaS, but must be
      confirmed by segment in diligence.
