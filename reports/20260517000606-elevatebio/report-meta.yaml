companyProfile:
  summary: "ElevateBio is a technology-driven advanced therapy CDMO powering the creation of life-transforming genetic medicines. The company combines two integrated business units — LifeEdit (proprietary gene editing platform spanning nuclease, base, reverse-transcriptase, epigenetic editing, and targeted gene insertion) and BaseCamp (cGMP manufacturing and process development services) — together with generative AI capabilities to help biopharmaceutical partners advance from early discovery through commercialization. ElevateBio has raised approximately $1.25 billion across four financing rounds, with its most recent $401M Series D (October 2024) including a strategic manufacturing partnership with Novo Nordisk. The company is headquartered in Waltham, Massachusetts, and is the anchor tenant at the University of Pittsburgh's $250M Pitt BioForge advanced therapy manufacturing facility."
