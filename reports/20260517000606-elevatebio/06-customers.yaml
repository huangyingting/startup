  evidenceGaps:
    - type: private-evidence-only
      severity: blocking
      topic: customer-revenue-concentration
      missingEvidence: >-
        ElevateBio has not publicly disclosed a customer list, revenue breakdown by partner, or any
        concentration metric. The three named testimonial partners (Novo Nordisk, Kyverna Therapeutics,
        Beam Therapeutics) plus dissolved AlloVir are the full extent of publicly verifiable customer
        evidence. No backlog figure, renewal rate, or customer-level contract value has been disclosed.
      whyItMatters: >-
        Without revenue concentration data, it is impossible to assess whether Novo Nordisk represents
        a majority of contracted manufacturing revenue or whether the 30+ programs are spread broadly.
        A single large customer's exit (e.g., Novo Nordisk pivoting to Catalent) could be company-altering.
      diligencePath: >-
        Request from ElevateBio management a customer concentration schedule showing top-5 customers by
        revenue, contract value, and committed manufacturing volumes, along with contract term dates and
        renewal provisions.
      relatedQuestionRefs: [QU010, QU018]
      relatedTableRefs: [TU003, TU005]

    - type: private-evidence-only
      severity: material
      topic: customer-churn-and-retention-metrics
      missingEvidence: >-
        ElevateBio has not disclosed customer churn rate, contract renewal rate, net revenue retention, or
        any customer satisfaction or NPS data. The 98% batch success rate is a manufacturing quality metric,
        not a retention metric. No program attrition rate—including how many of the historical partner programs
        have dropped off or been replaced—is publicly available.
      whyItMatters: >-
        Customer retention is a critical financial health indicator for CDMOs with multi-year contract
        economics. High clinical attrition among ElevateBio's early-stage customer base could mean revenue
        compression even if new partner acquisition is strong.
      diligencePath: >-
        Request longitudinal partner data: number of partners by year (2019–2026), number who exited vs.
        renewed, revenue per partner cohort by entry year, and stage-transition rate from clinical to
        commercial manufacturing.
      relatedQuestionRefs: [QU012, QU025]
      relatedTableRefs: [TU002, TU004]

