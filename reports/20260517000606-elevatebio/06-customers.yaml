  - id: expansion-strategic
    title: "Expansion and Strategic Accounts"
    body: >
      ElevateBio's expansion strategy centers on two mechanisms: (1) deepening existing partner relationships
      from discovery or process development through commercial manufacturing, and (2) securing large-pharma
      strategic accounts that anchor manufacturing capacity at the Pitt BioForge facility and provide
      volume-level revenue commitments.

      The Pitt BioForge facility in Pittsburgh, Pennsylvania—built as part of a $250 million University
      of Pittsburgh investment—represents ElevateBio's primary vehicle for large-account expansion. As
      anchor tenant, ElevateBio has committed to the facility's manufacturing operations, and the Novo
      Nordisk partnership is the primary disclosed example of a large-pharma account structured around
      this expanded capacity. Such anchor-tenant arrangements are common in the CGT CDMO sector as a
      mechanism for CDMOs to de-risk capital investment through long-term, committed revenue from a
      strategic partner.

      Beyond Novo Nordisk, ElevateBio's ASGCT 2026 presence—nine presented abstracts spanning LNP-mediated
      in vivo gene editing, AI-designed base editors, and retrotransposon-based gene insertion—is explicitly
      linked to partner outreach. The company's ASGCT 2026 hub states: "The capabilities behind our ASGCT
      presentations are available to partners year-round. Whether you're exploring a proof of concept or
      building a full pipeline collaboration, let's talk about what's possible for your programs." This
      conference-driven business development is a standard expansion tactic in the CDMO sector, targeting
      biotechs at the stage where CDMO selection decisions are made.

      The ClinicalTrials.gov search for ElevateBio as a sponsor or collaborator yields no registered
      trials—confirming that all customer programs are partner-sponsored—but demonstrates that ElevateBio's
      manufacturing and platform capabilities are fully deployed in support of external clinical pipelines.
      Academic medical center spinouts and emerging biotech companies represent an additional growth vector,
      with ElevateBio's discovery services providing an early entry point that can convert to manufacturing
      engagements as programs advance.
    claimRefs:
      - CU022
      - CU023
      - CU024
      - CU025
    tableRefs: []
    figureRefs:
      - FU004

