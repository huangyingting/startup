callouts:
  - type: strength
    title: "Platform breadth as CDMO moat"
    body: "ElevateBio's BaseCamp platform spans AAV, lentiviral vector, gene editing, LNP, and cell therapy processing — a breadth that few CDMOs can match within a single integrated organization. This multi-modality capability is a meaningful competitive moat for customers seeking a single-partner CDMO relationship as programs evolve across modalities."
    claimRefs: [CM001, CM002, CM013]

  - type: risk
    title: "Biotech financing headwind constrains near-term pipeline fill"
    body: "The 2025–2026 biotech financing downturn — the worst for first-time financings since pre-pandemic — directly reduces the pool of new CGT programs advanced to IND-ready stage. ElevateBio's 13% workforce reduction in 2024 indicates that even well-funded CDMOs face near-term revenue pressure from reduced customer pipeline. This is the primary near-term demand risk."
    claimRefs: [CM035, CM036]

  - type: insight
    title: "BIOSECURE Act creates structural demand reallocation"
    body: "Section 851 of the FY2026 NDAA effectively restricts US federal programs from using WuXi Advanced Therapies and affiliates, redirecting a non-trivial share of US government-linked CGT manufacturing demand to US-based CDMOs. ElevateBio is well-positioned to capture this reallocation given its US-based facilities and manufacturing capabilities."
    claimRefs: [CM031, CM039]

  - type: assumption
    title: "Market size estimates are modality-segment directional only"
    body: "No single authoritative public source provides a comprehensive audited figure for the global CGT CDMO market. The lentiviral vector market ($16.48B, Business Research Company) and cell therapy manufacturing market ($7.17B, PRNewswire) are the most specific accessible data points but cover only sub-segments. Aggregate market estimates should be treated as directional indicators, not investable TAM figures."
    claimRefs: [CM014, CM040]

  - type: recommendation
    title: "Prioritize verification of 98% batch success rate metric"
    body: "ElevateBio's claimed 98% batch success rate is central to its differentiation narrative but is self-reported and unaudited. Diligence should request the methodology, denominator definition (batches released vs. batches initiated), time period, and breakdown by modality to assess whether this figure is comparable to the industry benchmark."
    claimRefs: [CM013, CM041]

