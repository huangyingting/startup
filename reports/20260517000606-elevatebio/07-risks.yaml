  - id: regulatory-ip-risks
    title: "Regulatory and IP/Legal Risks"
    body: >
      ElevateBio's regulatory risk profile is shaped by two distinct regimes: FDA current Good Manufacturing Practice
      (cGMP) requirements governing its BaseCamp manufacturing operations, and the rapidly evolving intellectual
      property landscape surrounding the gene editing technologies underpinning LifeEdit's platform. As a cGMP
      contract manufacturer of biological products for clinical and commercial use, ElevateBio must maintain
      continuous compliance with 21 CFR Parts 210/211 and FDA CBER's biologics regulations. Manufacturing deviations
      — which are endemic in complex viral vector and cell therapy production — can trigger FDA Form 483 observations,
      warning letters, import alerts, or production holds. The FDA's March 2026 draft guidance outlining current
      thinking on Form 483 responses signals continued heightened regulatory attention on CDMO quality management
      systems, and FDA CBER's updated 2026 agenda — issued alongside the EMA's equivalent regulatory agenda —
      indicates a sustained focus on novel modality manufacturing standards. ElevateBio has issued no press release
      regarding any current FDA enforcement action, making its compliance posture a diligence-path gap requiring
      direct verification.

      On the IP front, the CRISPR patent landscape underwent a material change on March 26, 2026, when the Patent
      Trial and Appeal Board (PTAB) ruled against the CVC team (UC Berkeley/University of Vienna/Emmanuelle
      Charpentier) for the second consecutive time in its interference proceeding against the Broad Institute/MIT.
      The PTAB concluded that CVC had not met its burden as junior party of showing conception before the Broad
      inventors. This ruling strengthens the Broad Institute's dominant position in eukaryotic CRISPR applications —
      the exact domain in which LifeEdit's CRISPR nuclease editing, base editing, and prime editing tools operate
      commercially. While ElevateBio functions as a service provider rather than a therapeutic developer, its
      freedom-to-operate across the full gene editing IP landscape is material: Beam Therapeutics controls key base
      editing IP, Prime Medicine controls prime editing IP, and the Broad's reinforced CRISPR nuclease position
      creates ongoing licensing cost and FTO risk. Any unanticipated adverse patent event — a new interference
      proceeding, a licensing dispute, or an injunction — could require LifeEdit to modify its commercial offerings
      or incur significant royalty obligations.
