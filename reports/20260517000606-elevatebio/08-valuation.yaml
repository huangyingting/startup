  evidenceGaps:
    - id: series-d-valuation
      description: >-
        The Series D (October 2024, $401M) post-money valuation has not been publicly disclosed by
        ElevateBio or any investor. No third party has published a verified figure. This prevents precise
        peer-multiple analysis and forces reliance on estimated ranges rather than confirmed data.
      impact: critical
      path: >-
        Request formal cap table summary from ElevateBio CFO under NDA; cap table will show Series D
        price-per-unit and implied post-money valuation
      relatedQuestionRefs:
        - QV002

    - id: revenue-disclosure
      description: >-
        ElevateBio has not disclosed revenue, EBITDA, backlog, or named commercial clients across
        7+ years of operation. No revenue proxy (e.g., batch counts, contract counts) has been published.
        Without revenue data, all valuation multiples are estimated against an unknown denominator.
      impact: critical
      path: >-
        Request audited financial statements or data-room revenue summary under NDA from CFO as
        prerequisite to formal engagement
      relatedQuestionRefs:
        - QV022
      relatedTableRefs:
