  - id: recommendation-kill-triggers
    title: Recommendation and Kill Triggers
    body: >-
      The recommended investment verdict is TRACK: maintain active diligence without capital deployment
      pending resolution of key milestone uncertainties. ElevateBio presents a genuinely interesting long-term
      platform—the Novo Nordisk partnership, LifeEdit AI differentiation, and Pittsburgh capacity pipeline
      are real strategic assets—but the execution risk from leadership transition, sequential workforce
      reductions, and persistent revenue opacity makes this an unsuitable deployment opportunity without
      substantially more transparency. A 12–24 month watch period is appropriate, with the expectation that
      several observable milestones will clarify the trajectory.

      The bull case upgrade trigger is a combination of: revenue disclosure (even partial, under NDA) confirming
      commercialization traction; Novo Nordisk partnership milestone announcements indicating active program
      progression; leadership stabilization with Christopher Murphy completing 18+ months as CEO without
      further C-suite turnover; and the Pitt BioForge facility reaching operational readiness. Any two of
      these, together with a stabilizing biotech sector environment, would support an upgrade from TRACK to
      selective BUY at current implied valuation levels.

      Kill triggers that would prompt a recommendation downgrade to PASS include: any further material
      workforce reduction of more than 15% within the next 12 months; public announcement of Novo Nordisk
      partnership dissolution or significantly reduced scope; a new equity raise at a post-money valuation
      below $1.0 billion (confirming a distressed down-round); or multiple additional C-suite departures
      indicating governance instability beyond routine leadership change. These triggers represent inflection
      points at which the platform story becomes subordinated to financial survival risk. A weighted expected
      valuation of approximately $1.75–1.85 billion (25% bull / 50% base / 25% bear) represents a material
      markdown from the 2022 Series C high-water mark and appropriately prices the current execution uncertainty.
    claimRefs:
      - CV029
      - CV030
      - CV031
      - CV032
