      description: >-
        The Novo Nordisk strategic manufacturing partnership terms — committed manufacturing volumes,
        minimum revenue guarantees, exclusivity provisions, and any equity option rights — have not been
        disclosed. These terms are the primary determinant of whether the Novo relationship supports the
        bull or base case.
