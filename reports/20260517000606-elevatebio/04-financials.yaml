chapter:
  number: 4
  title: Financial Profile
  summary: 'ElevateBio has raised approximately $1.25 billion across four equity rounds (Series A–D, 2019–2024), culminating in a $401 million Series D in October 2024 co-anchored by Novo Nordisk. The company is private with no disclosed revenue; all financial metrics must be inferred from industry benchmarks and public fundraising announcements. Three revenue streams define its model: fee-for-service cGMP manufacturing (BaseCamp), technology licensing of LifeEdit gene editing tools, and milestone/royalty payments from program partnerships. Post-Series D, ElevateBio executed two staff reductions (13% then 17%), signaling financial-management pressure despite the large capital raise. Capital intensity is high; the Pitt BioForge anchor-tenant commitment and Waltham manufacturing buildout consume significant deployed capital. The Series D valuation is undisclosed — likely below the $2.25 billion Series C mark given the 2022–2024 biotech downturn.'
sections:
- id: capital-structure
  title: Capital Structure and Funding History
  body: 'ElevateBio has assembled one of the largest private capital pools in the cell and gene therapy CDMO sector, raising approximately $1.25 billion across four equity rounds between 2019 and 2024. The Series A ($150 million, 2019) was led by F-Prime Capital (Fidelity''s life sciences VC arm), with GV (Google Ventures) and Arch Venture Partners as co-investors, establishing a founding coalition that blended financial, strategic technology, and deep-science mandates. The Series B ($170 million, 2020) followed within a year, reflecting investor confidence in the integrated BaseCamp-LifeEdit model during a period of rapid gene therapy pipeline growth.

    The Series C ($525 million, March 2022) was the largest round and the valuation high-water mark, with Bain Capital Life Sciences as lead investor alongside RA Capital Management and Fidelity. The post-money valuation was approximately $2.25 billion — a figure that has not been publicly surpassed and is widely considered to have declined since, given the severe biotech market correction of 2022–2024. The Series D ($401 million, October 2024) was anchored by Novo Nordisk, structuring a strategic manufacturing partnership alongside the financial investment. However, the Series D valuation was not publicly disclosed, a notable opacity contrast to the Series C''s explicit $2.25 billion disclosure, consistent with the pattern of biotech companies avoiding public acknowledgment of down-rounds.

    The total investor base reflects a deliberate composition strategy: deep-science VCs (Arch Venture Partners) for platform credibility, life sciences growth equity (Bain Capital Life Sciences, RA Capital) for scaling capital, institutional crossovers (Fidelity via F-Prime) for balance sheet credibility, and a strategic pharma anchor (Novo Nordisk) for commercial validation. This investor architecture provides both capital and partnership leverage, but also implies significant liquidation preference stacks and potential dilution complexity that are not publicly disclosed. No public audited financial statements, Form D SEC filings, or EDGAR disclosures are available for ElevateBio, consistent with its LLC structure and Regulation D private offering status. Total cumulative capital raised across all rounds is approximately $1.246 billion as of May 2026.'
