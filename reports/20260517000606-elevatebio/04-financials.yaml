- id: KI002
  type: risk
  title: Sequential Layoffs Signal Post-Series D Financial Pressure
  body: Two workforce reductions (13%, then 17%) within approximately 12 months of closing a $401M Series D raise is atypical for a company in genuine growth mode. The pattern suggests the Series D was accompanied by a strategic restructuring — or that commercial revenue has not yet reached the level required to sustain the pre-layoff cost base. This is the most significant adverse financial signal available in public information.
