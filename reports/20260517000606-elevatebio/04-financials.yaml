  title: Novo Nordisk Partnership Is Commercial Validation Without Revenue Confirmation
  body: The Novo Nordisk strategic anchor in the Series D validates ElevateBio as a manufacturing partner for at least one top-10 pharma company's cell and gene therapy programs. However, the financial terms are entirely undisclosed — so while it confirms strategic value, it cannot be used to estimate revenue, contracted backlog, or near-term cash flow contribution.
