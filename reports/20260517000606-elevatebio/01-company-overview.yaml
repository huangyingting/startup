callouts:
  - calloutType: risk
    title: Two post-Series-D layoff rounds signal financial pressure
    body: >-
      ElevateBio has conducted two workforce reductions since its $401M Series D in October 2024: a ~13% cut in
      2024 linked to preclinical program reduction, and a ~17% cut approximately two years post-Series-D in 2026.
      Together these represent a cumulative ~30% reduction in headcount. No revenue or profitability metrics have
      been disclosed, making it difficult to assess whether these cuts reflect a transition to efficiency or deeper
      business model strain.
    claimRefs:
      - CO022
      - CO023
      - CO041
  - calloutType: assumption
    title: Founding date (2017 vs. 2019) remains unverified
    body: >-
      ElevateBio's official website states founding in 2017, while third-party sources consistently cite 2019 as
      the operational debut. This chapter treats both as documented but conflicting claims (CO001, CO002).
      Diligence should obtain the certificate of formation or equivalent corporate document to resolve the
      ambiguity before relying on founding date for competitive age comparisons.
    claimRefs:
      - CO001
      - CO002

