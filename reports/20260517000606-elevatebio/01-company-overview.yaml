  - id: leadership-governance
    title: Leadership and Corporate Governance
    body: >
      ElevateBio was co-founded by five executives: David Hallal (Co-founder, Executive Chairman), Raj Bhargava
      (Co-founder, former CEO), Mitchell Finer, PhD (Co-founder), Vikas Sinha (Co-founder), and Carter Asmann
      (Co-founder). David Hallal and Raj Bhargava were particularly prominent in early company positioning. The CNBC
      Disruptor 50 profile lists "Founders: David Hallal, Vikas Sinha, Mitchell Finer" with 2017 as the launch year,
      while broader sources confirm all five co-founders.

      A significant leadership transition occurred in January 2026: Christopher Murphy was appointed as CEO and added
      to the Board of Directors, succeeding founder Raj Bhargava. The CEO change came roughly 15 months after the
      Series D close and coincided with the company's second layoff round. Murphy's mandate and strategic direction
      have not been disclosed in detail beyond the formal announcement. Full board composition beyond Murphy's
      appointment is not publicly available, representing a material governance gap. Current post-founding roles for
      co-founders Mitchell Finer, Vikas Sinha, and Carter Asmann are not confirmed from available public sources as
      of May 2026.
    claimRefs:
      - CO007
      - CO008
      - CO009
      - CO010
      - CO011
      - CO012
