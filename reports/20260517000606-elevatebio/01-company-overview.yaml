      - TO002

  - id: capitalization-investors
    title: Capitalization and Investor Landscape
    body: >
      ElevateBio has raised approximately $1.25 billion in venture financing since 2019, making it one of the more
      heavily capitalized private CDMOs in the CGT sector. The investor base reflects broad institutional support
      across traditional life sciences venture capital, crossover investors, and strategic pharma partners.

      The Series A ($150M, 2019) launched the company with backing from Bain Capital Life Sciences, RA Capital
      Management, ARCH Venture Partners, F-Prime Capital (Fidelity), and GV (Google Ventures). The Series B ($170M,
      2020) deepened this base. The Series C ($525M, March 2022) at a $2.25 billion valuation introduced Matrix
      Capital Management as lead alongside SoftBank Vision Fund 2. The Series D ($401M, October 2024) brought in a
      new strategic dimension via Novo Nordisk, co-structuring a manufacturing partnership with the equity round.

      Despite significant capitalization, ElevateBio conducted two post-Series-D workforce reductions: a first round
      affecting approximately 13% of staff (2024, associated with preclinical program cuts) and a second round
      affecting approximately 17% (approximately 2 years post-Series D, in 2026). These layoffs raise questions about
      the pace of CDMO revenue ramp-up relative to the capital deployed and ongoing operating costs. No revenue or
      profitability metrics have been publicly disclosed. As of 2026, the post-Series-D valuation has not been
      publicly stated; the last known figure was the $2.25 billion Series C valuation from March 2022.
