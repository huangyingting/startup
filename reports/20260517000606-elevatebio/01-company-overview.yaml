company:
  name: ElevateBio
chapter:
  number: 1
  title: Company Overview
  summary: >-
    ElevateBio LLC is a Waltham, Massachusetts-based, privately-held technology-driven contract development and
    manufacturing organization (CDMO) for cell and gene therapies, operating two integrated units: LifeEdit (gene
    editing R&D) and BaseCamp (cGMP manufacturing). The company has raised approximately $1.25 billion across four
    rounds (Series A–D, 2019–2024), including a $401 million Series D in October 2024 with a Novo Nordisk strategic
    partnership. Christopher Murphy was appointed CEO in January 2026. Two post-Series-D staff reductions (13% then
    17%) signal financial pressure despite heavy capitalization, and the company's founding date (2017 vs. 2019) is
    a documented conflicting claim requiring verification.
sections:
  - id: identity-and-model
    title: Company Identity and Business Model
    body: >
      ElevateBio LLC is a privately-held limited liability company headquartered at 200 Smith Street, Waltham,
      Massachusetts 02451. The company's stated mission is "Powering the creation of cell & gene therapies at a
      speed the world deserves," which reflects a dual mandate of scientific innovation and manufacturing scale in
      the cell and gene therapy (CGT) sector.

      ElevateBio operates through two integrated business units. LifeEdit is the company's internal gene editing
      research and development platform, engineering novel editing tools including CRISPR nuclease editing, base
      editing, prime editing, and retrotransposon-based genome integration, alongside delivery modalities (AAV, LNP,
      mRNA) and generative AI-driven protein and vector discovery. BaseCamp is ElevateBio's cGMP manufacturing CDMO
      arm, providing contract development and manufacturing services for the full CGT modality spectrum: AAV viral
      vectors, lentiviral vectors, lipid nanoparticles, mRNA, and cell therapy products (including iPSC-derived
      therapies). The integration model positions ElevateBio as simultaneously a technology developer and
      manufacturing enabler for pharma and biotech clients.

      As of May 2026, ElevateBio employs approximately 489 people (per LinkedIn) and has a significant industry
      presence with 43,293 LinkedIn followers. Primary operations are centered in Waltham, MA, with a future
      manufacturing footprint as anchor tenant at the University of Pittsburgh's Pitt BioForge facility—a $250
      million CGT manufacturing complex in Pittsburgh's Hazelwood neighborhood.
