  evidenceGaps:
    - type: private-evidence-only
      severity: material
      topic: leadership
      missingEvidence: >-
        Full Board of Directors composition, governance rights, voting structure, and board committees are not
        publicly disclosed. Current roles of three co-founders (Mitchell Finer, Vikas Sinha, Carter Asmann)
        after the 2026 CEO transition are unknown.
      whyItMatters: >-
        Board composition and voting rights are central to governance diligence, key-person risk assessment,
        and understanding investor control mechanics post-Series D.
      diligencePath: >-
        Request board composition and committee charters directly from ElevateBio management. Review any publicly
        filed investor rights agreements or side letters accessible through the lead investor (Matrix Capital,
        Novo Holdings).
      relatedQuestionRefs:
        - QO021
      relatedTableRefs:
        - TO002

    - type: private-evidence-only
      severity: material
      topic: investors
      missingEvidence: >-
        Series B investor composition has not been confirmed from a primary press release. Full cap table,
        ownership percentages, preference stack, pro-rata rights, liquidation preferences, and any secondary
        transfers are not publicly available.
      whyItMatters: >-
        Without the cap table and preference stack, it is impossible to model investor returns, assess dilution
        impact on founders, or evaluate downstream M&A or IPO economics.
      diligencePath: >-
        Obtain a capitalization table and investor rights agreement directly from ElevateBio or its legal
        counsel. Review any leaked or filed investor materials for Series A–D.
      relatedQuestionRefs:
        - QO009
        - QO016
      relatedTableRefs:
        - TO003

    - type: missing-source
      severity: material
      topic: adverse
      missingEvidence: >-
        The root causes, exact timing, and affected departments for both layoff rounds are not confirmed from a
        primary company source. Neither round has been acknowledged in an official ElevateBio press release or
        SEC filing; evidence derives from news aggregation (Bing News snippets) only.
      whyItMatters: >-
        Without confirming whether the layoffs reflect CDMO business model challenges, pipeline reprioritization,
        or cost discipline, it is impossible to assess whether they are a leading indicator of financial distress
        or a planned efficiency move.
      diligencePath: >-
        Locate the original reporting articles underlying the Bing News snippets (e.g., STAT News, Endpoints News,
        or BioPharma Dive). Request management commentary on the workforce reductions directly.
      relatedQuestionRefs:
        - QO006
        - QO007
        - QO023

    - type: enumeration-incomplete
      severity: minor
      topic: milestones
      missingEvidence: >-
        The milestone table captures only publicly announced events. Internal milestones (IND filings, process
        development wins, client departures, failed fundraises), undisclosed CDMO client contracts, and any
        partnership failures are not available from public sources.
      whyItMatters: >-
        A complete milestone picture is needed to assess R&D productivity, client traction, and commercial
        execution against the capital invested.
      diligencePath: >-
        Request a management-prepared business history and client reference list. Review any regulatory databases
        for IND, CTA, or DUNS filings associated with ElevateBio.
      relatedQuestionRefs:
        - QO011
        - QO017
      relatedTableRefs:
        - TO004

    - type: private-evidence-only
      severity: blocking
      topic: financials
      missingEvidence: >-
        Revenue, ARR, gross margin, net burn rate, cash runway, and CDMO contract revenue are entirely
        undisclosed. No financial statements, investor updates, or audited figures are publicly available.
      whyItMatters: >-
        Financial performance is the single most important gap: two layoff rounds and no disclosed revenue make
        it impossible to determine whether ElevateBio is on a sustainable trajectory or approaching a capital
        crisis, and this gap prevents any valuation or runway analysis.
      diligencePath: >-
        Request audited financial statements, management accounts, and CDMO revenue backlog directly from
        ElevateBio. Review any financial information shared with existing investors for Series D due diligence.
