    type: flow
    layout: standard
    summary: 流程图追踪投资决策链条：从 ElevateBio 的公司背景和市场环境出发，经过乐观和悲观驱动因素，落到观察建议，再延伸到可将结论上调为买入或下调为放弃的具体条件。图中刻画了当前观察仓位的不对称可选性。
    data:
      nodes:
        - id: companyContext
          label: ElevateBio 背景
          detail: 已融资 $1.25B；Series C 估值 $2.25B；私营 CGT CDMO；Novo Nordisk 合作伙伴
        - id: bullDrivers
          label: 乐观驱动因素
          detail: Novo Nordisk 锚定；LifeEdit AI 护城河；Pittsburgh BioForge 产能；CGT 市场增长
        - id: bearDrivers
          label: 悲观驱动因素
          detail: 员工数减少 25–30%；2026 年 1 月更换 CEO；收入未披露；估值压缩
        - id: trackVerdict
          label: 观察建议
          detail: 维持主动尽调；等待收入披露、Novo 里程碑、领导层稳定
        - id: upgradeConditions
          label: 上调里程碑
          detail: NDA 下披露收入；Novo 里程碑确认；CEO 稳定 18+ 个月；Pittsburgh 投运
        - id: killTriggers
          label: 否决触发点
          detail: '>15% 进一步裁员；Novo 合作终止；新一轮估值 <$1.0B；24 个月内第二次更换 CEO'
        - id: buyVerdict
          label: → 上调至买入
          detail: 若 2+ 个上调里程碑兑现且 CGT 市场稳定，可按当前隐含估值重新配置资本
        - id: passVerdict
          label: → 下调至放弃
          detail: 若 2+ 个否决触发点被触发，财务生存风险将压过平台可选性
      edges:
        - from: companyContext
          to: trackVerdict
          label: 当前状态评估
        - from: bullDrivers
          to: upgradeConditions
          label: 正向里程碑路径
        - from: bearDrivers
          to: killTriggers
          label: 负向里程碑路径
        - from: trackVerdict
          to: upgradeConditions
          label: 监测上调
        - from: trackVerdict
          to: killTriggers
          label: 监测下调
        - from: upgradeConditions
          to: buyVerdict
          label: ≥2 个里程碑兑现
        - from: killTriggers
          to: passVerdict
          label: ≥2 个触发点启动
    claimRefs:
      - CV029
      - CV030
      - CV031
      - CV044
  - id: FV002
    title: CGT CDMO 可比公司估值 — 参考柱状图
