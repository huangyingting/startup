      - number: '7.4'
        title: 财务与运营风险
        blocks:
          - type: paragraph
            body: >
              ElevateBio 的财务风险由四个相互关联的压力定义：资本密集但不披露收入、Series D 估值未披露、Novo Nordisk 结构性利益冲突，以及 Pitt BioForge 设施执行风险。公司已融资约
              $1.25 billion，但没有披露收入或财报，烧钱速度和现金跑道评估只能依赖行业基准。连续裁员合计约占峰值员工数 30%，说明管理层在资本约束下主动控费，与未产生收入或低收入画像一致。Series D
              估值（$401M 轮，2024 年 10 月，由 Novo Nordisk 锚定）没有公开披露——与 Series C（2022 年 3 月）明确 $2.25 billion 投后估值形成鲜明对比——暗示考虑到
              2022–2024 年生物科技市场严重回调，该轮定价低于此前高点；但这仍是推断，不是已确认事实。

              Novo Nordisk 关系引入结构性利益冲突，值得专项尽调。Novo Holdings 锚定 ElevateBio Series D，并设计了战略生产合作。但 Novo Holdings 也收购了
              ElevateBio 的直接 CDMO 竞争对手 Catalent，使 Novo 成为三重角色的利益相关方：投资人、战略客户和间接竞争对手。这一三重角色带来信息不对称风险、ElevateBio 在向 Novo
              这个客户定价生产服务时的谈判劣势，以及产能分配决策中的潜在冲突。没有公开披露说明董事会层面如何治理这一冲突。

              Pitt BioForge 锚定租户承诺位于 University of Pittsburgh 的 Hazelwood Green campus，代表重大未来资本义务。虽然大学已获得额外资金（确认 $1.5
              million 追加资金用于持续建设），但 $250 million 设施开发是一项多年执行承诺，存在建设时间线、GMP 投运调试和技术转移风险。AAV 生产是 ElevateBio
              各模态中技术要求最高的部分，随着项目迈向商业规模，也面临全行业压力，需要持续工艺优化投入，与 Pitt BioForge 的资本部署需求竞争。复杂生物制造 COGS 高企（EY-Parthenon
              分析称，自体细胞治疗 COGS 可达每剂 $100,000 to $300,000），为按服务收费的 CDMO 运营带来持续利润率压缩风险。
