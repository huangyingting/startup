      - number: '2.5'
        title: 证据与图表
        blocks:
          - type: callout
            title: 平台宽度构成 CDMO 护城河
            body: >-
              ElevateBio 的 BaseCamp 平台覆盖 AAV、慢病毒载体、基因编辑、LNP 和细胞疗法处理——这种宽度很少有 CDMO 能在单一一体化组织内做到。随着项目跨模态演进，想用单一 CDMO
              伙伴的客户会看重这种多模态能力；它构成有意义的竞争护城河。
            calloutType: insight
            claimRefs:
              - CM001
              - CM002
              - CM013
          - type: callout
            title: 生物技术融资逆风限制短期管线填充
            body: >-
              2025–2026 年生物技术融资下行——首次融资环境为疫情前以来最差——直接缩小推进到 IND 就绪阶段的新 CGT 项目池。ElevateBio 2024 年裁员 13%，说明即便资金充足的
              CDMO，也会因客户管线减少而承受短期收入压力。这是最主要的短期需求风险。
            calloutType: insight
            claimRefs:
              - CM035
              - CM036
          - type: callout
            title: BIOSECURE Act 制造结构性需求再分配
            body: >-
              FY2026 NDAA 第 851 条实质上限制美国联邦项目使用 WuXi Advanced Therapies 及其关联方，把不小一部分与美国政府相关的 CGT 生产需求导向美国本土
              CDMO。凭借美国本土设施和生产能力，ElevateBio 有较好位置承接这部分再分配。
            calloutType: insight
            claimRefs:
              - CM031
              - CM039
          - type: callout
            title: 市场规模估算仅是按模态分段的方向性指标
            body: >-
              没有单一权威公共来源给出全球 CGT CDMO 市场的全面、经审计数字。慢病毒载体市场（$16.48B，Business Research
              Company）和细胞疗法生产市场（$7.17B，PRNewswire）是可获得数据中最具体的点，但只覆盖子领域。合计市场估算应视为方向性指标，而不是可直接投资的 TAM 数字。
            calloutType: insight
            claimRefs:
              - CM014
              - CM040
          - type: callout
            title: 优先核实 98% 批次成功率指标
            body: >-
              ElevateBio 声称的 98% 批次成功率是其差异化叙事核心，但该指标为自报且未经审计。尽调应要求公司提供方法、分母定义（放行批次 vs.
              启动批次）、时间区间，以及按模态拆分的结果，以判断该数字是否可与行业基准比较。
            calloutType: insight
            claimRefs:
              - CM013
              - CM041
  - number: 3
    title: 竞争格局
    sections:
      - number: '3.1'
        title: 竞争概览
        blocks:
          - type: paragraph
            body: >
              2026 年，全球细胞与基因疗法（CGT）合同开发与生产组织（CDMO）市场的头部集中在少数大规模、多模态供应商手里；其下方则是由专业型或区域型玩家组成的碎片化中腰部。Lonza
              Group（瑞士）被普遍视为全球最大的

              CGT CDMO，约有 20,000 名员工，业务横跨五大洲。其 Cell & Gene Technologies 板块在 FY2025 的 EBITDA

              增长明显快于收入增长，反映经营杠杆和利润率修复。2026 年 CHI 剥离后，Lonza 对核心制药和 CGT CDMO

              服务的聚焦进一步提高。


              OXB（Oxford Biomedica，LSE: OXB，FTSE250）在 2026 年 3 月纽约 CDMO Leadership

              Awards 上被评为「最具创新 CDMO（细胞与基因疗法）」——这是行业对 OXB 30 年慢病毒和

              AAV 载体积累的验证。2026 年 4 月，OXB 推出一条加速服务线，可将 GMP 生产周期最多压缩 9 个月——直指

              ElevateBio「更快进临床」的价值主张。FUJIFILM Diosynthesis Biotechnologies（FUJIFILM

              Biotechnologies）在 North Carolina 州 Holly Springs 运营一个 $3.2 billion

              生物制药生产设施，并因生物制剂生产卓越表现获得 2026 年 CDMO Leadership Award。


              Andelyn Biosciences（Nationwide Children's Hospital 衍生公司）运营 The Hearth——一个 200,000+ sq. ft.

              的 AAV 专用设施，拥有 20 个 cGMP 套间和 50L 到 5,000L 生物反应器，支持 35+

              个适应症。2026 年，Andelyn 宣布与韩国 ENCell 建立战略制造桥梁合作，形成 US-APAC 制造走廊。Forge

              Biologics（Ajinomoto Bio-Pharma Services group）运营规模相近的 AAV 专用设施，已生产 600+

              批次，并于 2026 年与 Epicrispr Biotechnologies 合作，为 FSHD 基因疗法提供 cGMP 生产。AGC

              Biologics 加入 Orphan Therapeutics Accelerator（OTXL）的 Clinical Development

              Network，成为超罕见病 CGT 项目的优先生产伙伴。


              从结构上看，BIOSECURE Act（FY2026 NDAA 第 851 条）限制美国联邦资助项目使用 WuXi Advanced

              Therapies，为本土 CDMO 创造需求再分配机会。Catalent 于 2024 年 12 月被 Novo Nordisk

              收购，2026 年在 Indiana 州 Bloomington 设施削减约 400 个岗位。Charles River Laboratories 的

              CDMO 部门则在 2026 年被私募股权机构 GI Partners 收购。Samsung Biologics 报告 2026 年 Q1

              收入创纪录，达 KRW 1,257 billion（营业利润 KRW 581 billion），不过 Samsung 主要服务生物制剂，而非

              CGT。
