      - number: '5.4'
        title: AI 与计算发现
        blocks:
          - type: paragraph
            body: >
              ElevateBio 将生成式 AI 和机器学习嵌入发现与优化工作流。2026 年 4 月，在 ASGCT 第 29 届年会上，公司通过题为「借助生成式 AI
              设计用于腺嘌呤碱基编辑的新型功能性脱氨酶」的口头报告展示数据，说明 AI
              生成的酶可以扩展碱基编辑治疗的脱氨酶设计空间。配套报告「主动学习引导优化哺乳动物细胞中的大型基因插入效应器」显示，迭代机器学习循环可以显著提升基于逆转座子的基因插入效率。

              ElevateBio 使用 Amazon AWS 基础设施承载生成式 AI 工作负载，把云规模计算接入蛋白结构预测、引导 RNA 优化和递送载体设计。10 billion+ 蛋白集合是支持 AI
              驱动酶筛选的主要数据资产。公司称生成式 AI 使第五种模态——表观遗传编辑工具——得以由 AI 酶发现支持，截至 2026 年已经落地。LNP 配方化学（可电离脂质结构、RNA
              修饰、引导序列设计）的机器学习优化，在小鼠肝脏中针对与原发性高草酸尿症相关的 Hao1 靶基因，带来约 3-fold 的核酸酶编辑效力提升。下一代测序（NGS）分析也在开发中，用于快速无菌和外源因子检测；2026
              年 ASGCT 海报展示了这一点。
