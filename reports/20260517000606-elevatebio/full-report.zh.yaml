  - number: 4
    title: 财务情况
    sections:
      - number: '4.1'
        title: 资本结构与融资历史
        blocks:
          - type: paragraph
            body: >-
              ElevateBio 在细胞与基因疗法 CDMO 领域搭建了规模最大的私有资本池之一，2019 至 2024 年间通过四轮股权融资筹集约 $1.25 billion。2019 年 $150 million
              Series A 由 F-Prime Capital（Fidelity 的生命科学 VC 部门）领投，GV（Google Ventures）和 Arch Venture Partners
              共同投资；这一创始投资联盟同时覆盖财务、战略技术和深科学诉求。2020 年 $170 million Series B 在一年内跟进，反映投资者在基因疗法管线快速增长阶段对 BaseCamp-LifeEdit
              一体化模式的信心。

              2022 年 3 月 $525 million Series C 是最大一轮，也是估值高点；Bain Capital Life Sciences 领投，RA Capital Management 和
              Fidelity 参投。投后估值约 $2.25 billion——这一数字至今未被公开超越；考虑 2022–2024 年生物技术市场大幅修正，市场普遍认为估值已经回落。2024 年 10 月 $401
              million Series D 由 Novo Nordisk 锚定，财务投资之外还设计了战略制造合作。不过，Series D 估值未公开披露；与 Series C 明确披露 $2.25 billion
              形成鲜明不透明反差，也符合生物技术公司避免公开承认估值下调融资的常见模式。

              整体投资者构成体现了有意设计：深科学 VC（Arch Venture Partners）提供平台可信度，生命科学成长股权（Bain Capital Life Sciences、RA
              Capital）提供扩张资本，机构跨界投资者（Fidelity 通过 F-Prime）提供资产负债表可信度，战略制药锚定方（Novo
              Nordisk）提供商业验证。这种投资者架构同时带来资本和合作杠杆，但也意味着清算优先权堆叠和潜在稀释复杂度可能很高，且未公开披露。ElevateBio 没有公开经审计财务报表、Form D SEC 文件或
              EDGAR 披露；这与其 LLC 结构和 Regulation D 私募发行身份一致。截至 2026 年 5 月，各轮累计融资总额约 $1.246 billion。
