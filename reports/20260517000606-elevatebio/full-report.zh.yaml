      - number: '2.3'
        title: 竞争动态与买方分层
        blocks:
          - type: paragraph
            body: >
              CGT CDMO 市场在大规模、多模态层级呈寡头结构，Lonza 被广泛视为全球产能领导者。OXB（Oxford Biomedica）在 2026 年 3 月 CDMO Leadership Awards
              上被评为「最具创新 CDMO（细胞与基因疗法）」。其他重要竞争者包括 Andelyn Biosciences、National Resilience（Resilience）、Samsung Biologics 和
              WuXi Advanced Therapies。BIOSECURE Act（FY2026 NDAA 第 851 条）生效后，WuXi Advanced Therapies
              服务美国联邦资助项目的能力受到实质削弱，为 ElevateBio 等美国本土 CDMO 创造需求再分配机会。


              Lonza 报告 Q1 2026 表现强劲，FY2025 业绩中 Cell & Gene Technologies 部门 EBITDA
              增长快于收入增长——这确认了成熟玩家仍在增长，尽管整个生物技术融资环境承压。Andelyn Biosciences 2026 年宣布与 ENCell 建立 US-APAC 制造走廊合作，说明 CGT CDMO
              正在扩大其全球地域触达。Dyno Therapeutics 于 2026 年 5 月在 ASGCT 2026 发布两个新 AAV 衣壳和 Psi-Phi AI 驱动衣壳平台，显示 AI 赋能 AAV
              工程竞争加速；这与 ElevateBio 的工艺开发服务板块相关。


              CGT CDMO 买方大致分为三层。Tier 1（主要）：没有内部生产能力的新兴生物技术公司，是 ElevateBio 可触达客户群的主体。这类公司把项目推进到 IND 或 Phase I，并外包全部 CMC
              活动。Tier 2（活跃）：希望外包非核心或产能受限生产的中型制药公司。Tier 3（潜在）：用 CDMO 承接溢出产能或新型模态项目的大型制药公司。ElevateBio 2024 年 9 月与 Novo
              Nordisk 作为战略投资者完成的 $401M Series D，显示 Tier 2 和 Tier 3 客户牵引力的可能性。Beam Therapeutics 的 risto-cel
              项目——一种源自碱基编辑的细胞疗法，处于治疗镰状细胞病的 Phase I/II，并获得 RMAT 认定——就是推动 CDMO 生产需求的高价值临床阶段客户样本。
