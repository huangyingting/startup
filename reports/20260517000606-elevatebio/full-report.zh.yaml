      - number: '4.3'
        title: 单位经济与 CDMO 行业基准
        blocks:
          - type: paragraph
            body: >-
              因为 ElevateBio 不披露财务结果，单位经济只能参照可比上市 CGT CDMO 和行业基准数据评估。最直接可比的上市公司是 Oxford Biomedica（OXB,
              LSE），这是一家英国上市的基因与细胞治疗 CDMO；其 2025 年收入增长约 30%，签约订单储备继续扩大。OXB 的 2026 年上半年指引提到，公司仍在投入，等待下半年收入确认，这与资本密集、合同周期长的
              CDMO 签约模式一致。全球 CDMO 龙头 Lonza 报告 FY2025 收入 CHF 6.5 billion（~USD 8.5 billion），EBITDA
              增速显著快于收入，反映规模化之后的运营杠杆——这种表现 ElevateBio 未来多年都很难现实接近。

              成熟 CGT CDMO 的生产服务毛利率通常为 25–45%；平台授权部分（纯技术、轻资产）毛利率高得多，约 60–80%。以 ElevateBio 当前阶段看——设施仍在建设或爬坡，Waltham
              运营带来大量固定成本，Pitt BioForge 作为 anchor tenant 的承诺又是未来一次大型资本开支——短期毛利率可能低于 20%，设施利用率也可能低于生物反应器产能 70–80%
              的典型盈亏平衡门槛。cGMP 生产基础设施（生物反应器套间、洁净室建设、质量体系）资本开支很重，意味着已融资的 ~$1.25 billion 中，相当一部分已投入基础设施、人员和 R&D
              平台开发，而不是留作财务现金跑道。

              按行业常规粗算盈亏平衡：一家 500 人、具备 AAV 生产能力的 CDMO，每年固定运营成本约 $50–$100 million（不含商品成本），在典型 35% 毛利率下，需要持续年收入 $150–$250
              million 才能覆盖运营费用。ElevateBio 当前规模（LinkedIn 显示约 489 名员工）与接近这一盈亏平衡区间的公司相符；但公司不披露收入，盈利时间表无法独立验证。连续 13% 和 17%
              的裁员说明公司在根据可用资本主动调整成本结构，也强化了一个推断：商业收入尚未完全覆盖成本。
