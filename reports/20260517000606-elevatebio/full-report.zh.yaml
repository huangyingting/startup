      - number: '6.2'
        title: 具名客户证据
        blocks:
          - type: paragraph
            body: >
              考虑到 ElevateBio 的私有公司身份，以及 CDMO 行业合同保密惯例，其披露的客户证据有限但有意义。三家合作伙伴通过公司官网直接证言或新闻稿具名，另有一个战略投资方兼合作伙伴（Novo
              Nordisk）通过 Series D 融资公告披露。

              Beam Therapeutics 在 ElevateBio 的生产与发现服务首页提供证言，称「ElevateBio 不只是生产我们的疗法——他们帮助我们建立了碱基编辑生产的蓝图。」这确认 Beam
              是其碱基编辑治疗项目的活跃生产合作伙伴，但项目身份、合同金额和产量均未披露。

              Kyverna Therapeutics 是一家自体 CAR-T 公司，具名证言确认其合作从启动到建立基准 GMP 生产工艺约十个月，比内部预测约提前一年。Kyverna 的项目截至 2026
              年处于临床开发阶段，使其与 ElevateBio 的生产关系更具战略分量。

              Novo Nordisk 在 2024 年 10 月以战略生产合作关系同时锚定 $401 million Series D 融资。Novo Nordisk 已扩大其 CGT 管线，与 ElevateBio
              的合作体现了一个有意为之的策略：不自建产能，也要获得专业生产能力。包括承诺生产量、财务里程碑和排他条款在内的条件均未公开披露。

              AlloVir 是 ElevateBio 早期被投公司，开发针对病毒感染的现货型异体 T 细胞疗法，也是 ElevateBio BaseCamp 生产平台的客户。AlloVir 随后在多次临床阶段受挫后于
              2024 年解散运营，既是客户流失事件，也为 ElevateBio 临床阶段客户集中风险提供了概念验证层面的反向信号。SEC EDGAR 确认 AlloVir（CIK 0001754068）在 2024 年底至
              2025 年初提交了与注销登记相关的文件，与解散程序一致。
