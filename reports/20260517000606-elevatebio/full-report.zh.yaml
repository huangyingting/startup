      - number: '7.3'
        title: 竞争与市场风险
        blocks:
          - type: paragraph
            body: >
              ElevateBio 所处的 CGT CDMO 市场在 2026 年经历显著结构性扰动。BIOSECURE Act 旨在降低美国对包括 WuXi AppTec
              在内的中国合同研究、开发与生产组织的依赖，正在催化采购迁移，为 ElevateBio 同时带来机会和风险。被迫离开 WuXi 的客户寻找美国替代 CDMO，构成短期收入机会；但定价动态不利：此前与 WuXi
              谈下优惠费率的客户，会向美国替代方索取可比经济条件，从而压缩 ElevateBio 及同业利润率。WuXi AppTec 2026 年仍在运营——4 月 30 日还在 AACR 2026
              展示新的肿瘤药物发现进展——说明生产迁移尚未完成，短期内无法完全兑现。

              基因治疗市场本身存在结构性需求侧风险。Sarepta 的 Duchenne muscular dystrophy 基因疗法 Elevidys 在 2025–2026
              年销售放缓、遭遇投资人质疑，说明已获批基因疗法也可能因支付方阻力、定价准入障碍和真实世界疗效争议而商业化失败。当高知名度获批基因疗法商业表现不佳时，依赖投资人资本为生产项目融资的临床阶段生物科技 CDMO
              客户，可能推迟或取消已签约生产批次。基因治疗市场准入挑战包括单疗法高价带来的系统性支付方障碍，2026 年 Asembia AXS26 Summit 曾讨论这一点。全球 CDMO 龙头 Lonza FY2025
              收入约 CHF 6.5 billion（~USD 8.5 billion），其规模优势 ElevateBio 未来多年都难以现实接近。Lonza 的一体化生物制剂 CDMO
              能力和既有客户关系形成竞争差距，ElevateBio 的技术差异化必须跨过这一差距。更广泛的生物制剂 CDMO 市场按 2026 年 ResearchAndMarkets
              报告正在增长，但增长收益不成比例地流向已具规模的成熟玩家。此外，FiercePharma 2026 年 1 月引用 Pitchbook 分析称，中国在早期 CDMO 服务上的优势「很可能持续」，即便
              BIOSECURE 推动部分项目迁移，持续的竞争定价压力仍存在。
