      - number: '8.4'
        title: 投资建议与放弃触发条件
        blocks:
          - type: paragraph
            body: >-
              建议投资结论是观察（TRACK）：在关键里程碑不确定性消解前，保持积极尽调，但不部署资本。ElevateBio 的长期平台属性确实值得关注——Novo Nordisk 合作、LifeEdit AI 差异化和
              Pittsburgh 产能管线都是真实战略资产——但领导层交接、连续裁员和长期收入不透明带来的执行风险，使它在缺乏显著更多透明度前不适合下注。适合观察 12–24 个月，预期若干可观察里程碑会把轨迹讲清楚。

              上调至乐观情景需要几项条件合并出现：披露收入（即便只是 NDA 下的部分数据）以确认商业化牵引力；Novo Nordisk 合作发布里程碑，显示项目在推进；Christopher Murphy 担任 CEO 超过
              18 个月且 C-suite 不再流失，领导层稳定下来；Pitt BioForge
              设施达到可运营状态。上述任意两项出现，再叠加生物技术行业环境企稳，就足以支持从观察（TRACK）上调为在当前隐含估值水平选择性买入（BUY）。

              会促使建议下调至放弃（PASS）的触发条件包括：未来 12 个月内再出现超过 15% 的实质性裁员；公开宣布 Novo Nordisk 合作终止或范围显著缩小；以低于 $1.0 billion
              的投后估值进行新一轮股权融资（确认困境型降价轮）；或 C-suite 多名成员进一步离职，显示治理不稳已经超出正常领导层更替。这些触发条件意味着平台故事退居其次，财务生存风险成为主线。按 25% 乐观 / 50%
              基准 / 25% 悲观加权，预期估值约 $1.75–1.85 billion；相对 2022 年 Series C 高点已明显折价，也更恰当地计入当前执行不确定性。
            claimRefs:
