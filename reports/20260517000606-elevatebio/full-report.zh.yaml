  - number: 7
    title: 风险
    sections:
      - number: '7.1'
        title: 领导层与人员风险
        blocks:
          - type: paragraph
            body: >
              2026 年 1 月 5 日，ElevateBio 任命 Christopher Murphy 为首席执行官，接替公司创始人兼首任 CEO Raj Bhargava，这是公司历史上最显眼的领导层变动。从创始人
              CEO 转向职业经理人，在任何 CDMO 中都会引入过渡风险：关键客户关系、合作伙伴信任结构和内部文化，往往围绕创始人的个人信誉和领域专长建立。Bhargava 带领 ElevateBio
              从隐身创立走过四轮融资，累计约 $1.25 billion，并建立了 BaseCamp-LifeEdit 一体化 CDMO 模式。Murphy
              的授权范围和他带来的具体战略优先级尚未在公开沟通中充分说明，因此外部无法判断这次更替是规模化阶段的 CEO 升级，还是在资本约束下针对执行速度和投资人担忧的被动治理动作。

              领导层风险还被 Series D 2024 后两次连续裁员放大：先裁 13%，随后第二次约 17%。合计看，这些裁员削减了峰值员工数约 30%，LinkedIn 显示截至 2026 年 5 月剩约 489
              人。如此快速的裁员带来双重运营风险：短期内，BaseCamp GMP 运营损失生产与质量能力；长期看，人才管线受损，因为经验丰富的科学家和工程师——尤其是在逆转座子生物学、碱基编辑、prime editing 和
              AI 融合蛋白发现方面具备专长的人——可能转向资金充足的竞争对手。首席技术官 Mike Paglia 负责 BaseCamp 技术运营，但公司未公开任何继任计划或董事会治理细节。关键人风险在生产领导层和
              LifeEdit 科学平台两个层面结构性集中，且没有关于股权留任结构或管理层连续性承诺的透明度来缓释。
