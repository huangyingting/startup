      - number: '6.5'
        title: 扩张与战略大客户
        blocks:
          - type: paragraph
            body: >
              ElevateBio 的扩张策略围绕两种机制：（1）把现有合作伙伴关系从发现或工艺开发深化到商业化生产；（2）拿下大型药企战略账户，锚定 Pitt BioForge 产能，并提供规模级收入承诺。

              位于 Pennsylvania 州 Pittsburgh 的 Pitt BioForge 设施，是 University of Pittsburgh $250 million 投资的一部分，也是
              ElevateBio 扩张大客户的主要载体。作为锚定租户，ElevateBio 已承诺参与该设施的生产运营；Novo Nordisk 合作是围绕这部分扩张产能披露的主要大型药企账户案例。此类锚定租户安排在 CGT
              CDMO 行业常见，CDMO 借此通过战略合作伙伴的长期承诺收入，降低资本投资风险。

              除 Novo Nordisk 外，ElevateBio 在 ASGCT 2026 的存在感——九篇会议摘要，覆盖 LNP 介导的体内基因编辑、AI
              设计碱基编辑器和基于逆转座子的基因插入——明确与合作伙伴拓展挂钩。公司 ASGCT 2026 专题页写道：「ASGCT
              展示背后的能力全年向合作伙伴开放。无论你是在探索概念验证，还是在构建完整管线合作，我们都可以讨论你的项目能做到什么。」这种会议驱动的业务开发，是 CDMO 行业标准扩张策略，瞄准正处于 CDMO
              选择决策节点的生物科技公司。

              ClinicalTrials.gov 搜索 ElevateBio 作为申办方或合作方没有发现已注册试验，确认所有客户项目均由合作伙伴申办；但这也显示 ElevateBio
              的生产和平台能力完全用于支持外部临床管线。学术医学中心分拆公司和新兴生物科技公司构成另一个增长向量，ElevateBio 的发现服务提供早期入口，随着项目推进可转化为生产合作。
