      - number: '1.4'
        title: 资本结构与投资者版图
        blocks:
          - type: paragraph
            body: >
              自 2019 年以来，ElevateBio 已获得约 $1.25 billion 风险融资，是 CGT 领域资本最充足的私营 CDMO
              之一。投资者基础覆盖传统生命科学风投、跨界投资者和战略制药伙伴，机构支持面很宽。

              2019 年 $150M Series A 帮公司起步，投资方包括 Bain Capital Life Sciences、RA Capital Management、ARCH Venture
              Partners、F-Prime Capital（Fidelity）和 GV（Google Ventures）。2020 年 $170M Series B 进一步加深这一基础。2022 年 3 月 $525M
              Series C 估值 $2.25 billion，由 Matrix Capital Management 领投，SoftBank Vision Fund 2 参与。2024 年 10 月 $401M
              Series D 引入 Novo Nordisk 这一新战略维度；该轮与制造合作共同设计。

              尽管资本充足，ElevateBio 在 Series D 后进行了两轮裁员：第一轮影响约 13% 员工（2024 年，与削减临床前项目有关），第二轮影响约 17%（Series D 后约 2 年，即 2026
              年）。这些裁员让人质疑 CDMO 收入爬坡速度是否跟得上已投入资本和持续运营成本。公司未公开任何收入或盈利指标。截至 2026 年，Series D 后估值未公布；最后已知数字仍是 2022 年 3 月
              Series C 的 $2.25 billion 估值。
