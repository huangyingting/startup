      - number: '3.2'
        title: 直接竞争者画像
        blocks:
          - type: paragraph
            body: >
              **Lonza Group（瑞士，上市公司）：** 全球最早也是最大的 CDMO，1897 年创立于瑞士，约有 20,000

              名员工，业务横跨五大洲。Lonza 的 Cell & Gene Technologies（CGT）板块为临床和商业客户生产慢病毒载体、AAV

              和细胞疗法组件。FY2025，Lonza CGT 部门 EBITDA 增速超过收入增速；CHI

              剥离进一步强化战略聚焦。Lonza 与 Genetix Biotherapeutics 延长 ZYNTEGLO™（FDA

              批准、用于输血依赖型 β 地中海贫血的慢病毒基因疗法）商业化生产协议，展示其商业规模 CGT

              生产能力。相对 ElevateBio，Lonza 的主要战略缺口是没有自研基因编辑研发平台——Lonza 是纯生产型 CDMO。


              **Oxford Biomedica（OXB）（英国，LSE: OXB，FTSE250）：** 一家拥有 30 年病毒载体经验的

              CDMO，设施分布在 Oxford、Lyon、Strasbourg、Bedford MA 和 Durham NC。OXB 专注慢病毒和 AAV

              载体。它在 2026 年 CDMO Leadership Awards（2026 年 3 月）被评为「最具创新 CDMO（细胞与基因疗法）」，这是连续第二年获得重要 CDMO 奖项。OXB 首席商务官
              Sebastien Ribault 称，OXB

              聚焦「更快、更便宜、更可扩展、更高质量的生产」。2026 年 4 月，OXB

              推出加速服务线，可为时间受限的生物技术发起方将 GMP 周期最多压缩 9 个月——这直接挑战 ElevateBio 的

              进临床速度差异化。OXB 的 TetraVecta™ 第四代慢病毒系统和双质粒 AAV 工艺形成自有生产工艺差异化。


              **WuXi AppTec / WuXi Advanced Therapies（中国，上市公司）：** 总部位于上海的大型全球 CRDMO。WuXi

              Advanced Therapies 是其细胞与基因疗法部门。WuXi AppTec 在 2026 年 4 月年会（2026 年 4 月 30

              日）展示 13 张科学海报，显示其全球研发活动仍在持续。不过，BIOSECURE Act 条款（FY2026 NDAA 第 851

              条）限制美国联邦资助项目使用 WuXi，结构性削弱其美国市场地位。WuXi 代表一部分被挤出的美国需求，ElevateBio

              等本土 CDMO 可能承接。


              **Catalent（2024 年 12 月被 Novo Nordisk 收购）：** Catalent 的 CGT

              能力包括慢病毒载体、AAV 和细胞疗法生产。Novo Nordisk 于 2024 年 12 月收购 Catalent，并在 2026

              年削减 Bloomington, Indiana 设施约 400 个岗位，释放出重新聚焦 Novo 自有 GLP-1 项目的信号。Novo

              Nordisk / Catalent / ElevateBio 三方关系——Novo 既是 ElevateBio 的 Series D

              战略投资者，也是 Catalent 的所有者——可能产生利益冲突，值得尽调关注。


              **FUJIFILM Diosynthesis Biotechnologies（FUJIFILM Biotechnologies）：** 全球生物制剂 CDMO 和主要

              AAV 生产商。在 North Carolina 州 Holly Springs 运营 $3.2 billion 园区，并获得 2026 年 CDMO

              Leadership Award。其 HEK293 细胞培养能力（包括灌流和强化工艺）与 ElevateBio 的 AAV

              生产服务直接竞争。FUJIFILM 2026 年推出 ShunzymeX，这是一款工艺工具，用于简化开发并加速复杂生物制剂达到

              GMP 就绪状态。FUJIFILM 的生物制剂生产范围比 ElevateBio 更广，但缺少一体化基因编辑研发平台。


              **Andelyn Biosciences（美国，Nationwide Children's Hospital 衍生公司）：** 通过 The Hearth 专注 AAV

              基因疗法——这是一个 200,000+ sq. ft. 的 AAV 专用设施，拥有 20 个 cGMP 套间和 50L 到

              5,000L 生物反应器。Andelyn 的 AAV Curator® 平台支持 35+ 个适应症。2026 年，Andelyn 与

              ENCell（韩国）签署 US-APAC 制造走廊合作，以加速全球基因疗法生产。它在早中期临床阶段 AAV

              基因疗法生产上与 ElevateBio 直接竞争。


              **AGC Biologics（日资）：** 提供全服务生物制剂和 CGT CDMO 服务，拥有多处全球设施。2026 年，AGC

              Biologics 加入 OTXL 的 Clinical Development Network，成为推进超罕见病 CGT

              项目的优先生产伙伴——这与 ElevateBio 的早期 CGT

              客户群形成竞争重叠；在这一客户群中，孤儿药经济性支撑高端生产费用。一个 GMP 就绪新站点预计将在 2027 年启用。


              **Charles River Laboratories / GI Partners CDMO（美国）：** Charles River

              主要是合同研究组织（CRO），其 CGT CDMO 部门在 2026 年被私募股权机构 GI Partners 收购。母公司 CRL

              在新 CEO Birgit Girshick 的「更新后的战略框架」下，报告 2026 年 Q1 收入

              $995.8M。GI Partners 持有的 CDMO 实体现在是早期临床阶段的独立竞争者，但缺少一体化基因编辑研发平台。Forge

              Biologics（Ajinomoto Bio-Pharma Services group）也以 AAV 生产直接竞争，拥有 200,000+

              sq. ft. 专用产能和 600+ 已生产批次；2026 年，它与 Epicrispr Biotechnologies 合作，为在研

              FSHD 基因疗法（EPI-321）提供 AAV 生产。
