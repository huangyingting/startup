      柱状图对比 ElevateBio 与若干 CGT CDMO 可比公司的最近已知企业价值或市值，展示估值区间从较小规模的 Oxford Biomedica 延伸到最大规模的 Lonza 和 Catalent。图中同时列出
      ElevateBio 的乐观 / 基准 / 悲观区间，并以已确认的 Series C 标记作参照。需要注意，币种差异和规模差距会限制直接可比性。
