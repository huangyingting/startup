      - number: '7.2'
        title: 监管与 IP / 法律风险
        blocks:
          - type: paragraph
            body: >
              ElevateBio 的监管风险由两套不同制度塑造：一是约束 BaseCamp 生产运营的 FDA current Good Manufacturing Practice（cGMP）要求，二是围绕
              LifeEdit 平台底层基因编辑技术、快速演变的知识产权格局。作为为临床和商业用途生物制品服务的 cGMP 合同生产商，ElevateBio 必须持续符合 21 CFR Parts 210/211 和 FDA
              CBER 生物制品法规。复杂病毒载体和细胞治疗生产中常见的生产偏差，可能触发 FDA Form 483 观察项、警告信、进口警示或停产。FDA 2026 年 3 月关于 Form 483
              回复的指南草案说明，监管对 CDMO 质量管理体系仍保持高度关注；FDA CBER 与 EMA 对应监管议程同步发布的 2026 年更新议程，也显示监管将持续聚焦新型模态生产标准。ElevateBio
              没有发布任何关于当前 FDA 执法行动的新闻稿，因此其合规状态是尽调路径上的缺口，需要直接核验。

              IP 方面，2026 年 3 月 26 日，Patent Trial and Appeal Board（PTAB）在 Broad Institute/MIT 与 CVC 团队（UC
              Berkeley/University of Vienna/Emmanuelle Charpentier）的干涉程序中，第二次连续作出不利于 CVC 的裁决，CRISPR 专利格局发生实质变化。PTAB 认定
              CVC 作为后申请方未能履行举证责任，证明其构思早于 Broad 发明人。该裁决强化了 Broad Institute 在真核 CRISPR 应用中的主导地位——而这正是 LifeEdit 的 CRISPR
              核酸酶编辑、碱基编辑和 prime editing 工具商业化运作的领域。虽然 ElevateBio 是服务提供商而非治疗药开发商，但其在完整基因编辑 IP 格局中的 FTO 仍然重要：Beam
              Therapeutics 控制关键碱基编辑 IP，Prime Medicine 控制 prime editing IP，Broad 被强化的 CRISPR 核酸酶地位则带来持续授权成本和 FTO
              风险。任何意外不利专利事件——新的干涉程序、授权争议或禁令——都可能迫使 LifeEdit 修改商业产品，或承担重大版税义务。
