  - number: 5
    title: 产品与技术
    sections:
      - number: '5.1'
        title: 基因编辑平台
        blocks:
          - type: paragraph
            body: >
              ElevateBio 的 LifeEdit 基因编辑平台围绕五种不同编辑模态组织，每一种对应不同治疗需求：核酸酶编辑、碱基编辑、逆转录酶（RT）编辑、表观遗传编辑和靶向基因插入。核酸酶编辑通过切开 DNA
              双链，在切割位点实现 knock-in 或 knock-out。公司的核酸酶库覆盖多样化的原间隔序列邻近基序（PAMs），可触达超过 99% 的基因组位点；公司称这是相较早期单一 PAM CRISPR-Cas9
              系统的关键差异点。所有 RNA 引导的 CRISPR 系统都较紧凑，长度约 800–1,100 个氨基酸，因此可封装进病毒（AAV）和非病毒（LNP）递送系统，这对体内治疗应用很关键。

              碱基编辑不需要双链断裂即可引入单核苷酸变化，降低大规模基因组重排风险。逆转录酶（RT）编辑类似 prime editing，使用逆转录酶结构域在靶定位点写入新的遗传序列。表观遗传编辑不改变 DNA
              序列本身，而是借助 RNA 引导的激活子或抑制子调节基因表达，可逆地沉默或上调靶基因。在 ASGCT 2026，ElevateBio 展示了神经发育单倍剂量不足模型中 2-fold 基因激活，以及 Jurkat
              细胞中转染后至少四周仍然持久的 B2M 抑制。通过逆转座子机制的靶向基因插入允许大载荷递送，并使用机器学习迭代优化效应器。Beam Therapeutics 是使用碱基编辑生产能力的具名合作伙伴。

              ElevateBio 的 10 billion+ 蛋白库可用于 AI 驱动的酶筛选和发现。公司称，截至 2026 年，五种编辑模态均由 AI 酶发现支持。
