            body: >
              ElevateBio 由五位高管联合创立：David Hallal（联合创始人、执行董事长）、Raj Bhargava（联合创始人、前 CEO）、Mitchell Finer, PhD（联合创始人）、Vikas
              Sinha（联合创始人）和 Carter Asmann（联合创始人）。David Hallal 和 Raj Bhargava 在公司早期定位中尤其突出。CNBC Disruptor 50
              档案列出的「Founders」为 David Hallal、Vikas Sinha、Mitchell Finer，并把 2017 年列为启动年份；更广泛的资料则确认五位联合创始人。

              2026 年 1 月出现一次重要领导层更替：Christopher Murphy 被任命为 CEO，并进入董事会，接替创始人 Raj Bhargava。CEO 更替发生在 Series D 交割约 15
              个月后，并与公司第二轮裁员同步。除正式公告外，Murphy 的授权范围和战略方向未作详细披露。Murphy 任命之外的完整董事会构成没有公开资料，这是一个实质性治理缺口。截至 2026 年 5
              月，公开资料也无法确认联合创始人 Mitchell Finer、Vikas Sinha 和 Carter Asmann 当前在创立后的具体职务。
