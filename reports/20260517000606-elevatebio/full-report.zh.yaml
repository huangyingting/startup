      - number: '8.5'
        title: 尽调要求与未解问题
        blocks:
          - type: paragraph
            body: >-
              ElevateBio 的根本尽调难题，是财务和合同披露普遍不透明。任何资本部署前，五项优先尽调要求不可缺。

              最高优先级是 2023–2025 财年经审计收入和 EBITDA。没有真实收入数据，就无法做有意义的估值倍数分析；乐观 / 基准 /
              悲观情景范围也只是缺少实际商业表现锚点的概率加权估计。有谈判筹码的投资人，应把正式财务报表，或至少 NDA 下数据室收入和成本摘要，作为接触前置条件。

              第二项关键要求是 Novo Nordisk 合作的财务条款，尤其是承诺制造量、最低收入保证、排他性条款，以及 Novo Holdings 对 ElevateBio 股权可能拥有的任何选择权。这些条款决定 Novo
              关系是真正的商业锚（支撑乐观情景），还是范围更有限、只能验证基准情景的优先制造安排。

              第三，Series D 投后估值和当前清算优先权堆叠，是评估任何新投资人入场经济账的关键。需要弄清 Series D 投资人持有的是
              全棘轮反稀释、加权平均反稀释，还是其他优先权条款；这决定不同退出情景下普通股等值价值的有效底线。

              第四，Pitt BioForge 租赁条款、装修资本开支承诺和设施投产时间线，同时是产能催化剂，也是或有负债。ElevateBio 未来在 Pitt BioForge
              已承诺支出的规模未知，但可能意味着数千万到数亿美元的增量义务。

              第五，2026 年 Q1 月度现金消耗和估计账上现金。考虑到 $401 million Series D 及随后重组，必须厘清公司在下一轮融资前还剩多少现金跑道，才能评估近期生存风险及任何谈判中的筹码。
