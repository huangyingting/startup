  - number: 2
    title: 市场分析
    sections:
      - number: '2.1'
        title: 市场定义与分层
        blocks:
          - type: paragraph
            body: >
              ElevateBio 所处市场是细胞与基因疗法（CGT）的合同开发与生产组织（CDMO）市场；这一市场在结构上不同于传统小分子 CMO，也不同于常规生物制剂
              CDMO。核心市场边界包含四类主要服务：（1）病毒载体生产（腺相关病毒和慢病毒载体的生产、纯化、制剂灌装，以及面向 IND 到商业规模项目的分析检测）；（2）体外细胞疗法处理（自体和异体
              CAR-T、TCR-T、NK 细胞生产）；（3）基因编辑开发服务（CRISPR、碱基编辑、先导编辑工具开发与递送优化）；（4）非病毒递送生产（用于基因编辑的 LNP 包裹 mRNA 或向导
              RNA、脂质纳米颗粒工艺开发）。


              不纳入这一市场边界的是：常规生物药生产（单克隆抗体、胰岛素）、小分子化学合成、商业药品分销、医疗器械制造和临床试验管理服务。CDMO 外包的主要现状替代方案包括大型制药公司自建生产项目（Novartis 的
              Stein facility 生产 Kymriah；Gilead 的 Kite 设施生产
              Yescarta）、学术医学中心生产套间，以及生物技术公司早期阶段的自有生产。这些替代方案受固定成本投入、监管认证负担和模态覆盖宽度限制；需要多种递送平台的项目更倾向外部 CDMO 合作。


              ElevateBio 通过 BaseCamp 区分市场位置。BaseCamp 把生产、基因编辑工具开发（通过 LifeEdit）和分析服务放在同一组织内。公司披露的生产能力覆盖
              AAV、慢病毒载体、基因编辑工具、LNP 递送、基于逆转座子的系统和细胞疗法处理——覆盖模态多于多数单平台
              CDMO。相邻市场机会包括基因编辑工具授权（版税模式）、作为独立收入流的分析服务，以及面向高校衍生公司的工艺开发咨询。
