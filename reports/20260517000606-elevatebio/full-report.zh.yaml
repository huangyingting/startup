      - number: '2.4'
        title: 增长驱动因素与反向因素
        blocks:
          - type: paragraph
            body: >
              CGT CDMO 市场有几股强结构性顺风，但短期逆风和结构性反向因素会部分抵消。


              **主要增长驱动：** FDA 批准势头形成正循环——每一个新获批 CGT 疗法都会触发放大生产需求、验证模态，并鼓励新的临床投资。BIOSECURE Act 通过实质性把 WuXi Advanced
              Therapies 排除出美国联邦项目供应链，制造结构性需求转移。AI 赋能载体工程（Dyno Therapeutics 的 Psi-Phi 平台是例子）缩短 AAV 优化周期，增加工艺开发 CDMO
              合作的数量和复杂度。mRNA 平台在 COVID 期间完成 LNP 放大，把生产经验迁移到基因编辑递送，打开新的 CDMO 服务线。Casgevy 商业化上市（首个获批用于 SCD 和 TDT 的 CRISPR
              疗法）验证了体内基因编辑工作流，预计将带动慢病毒和 AAV 生产需求上升。CGTXchange 是 ASGCT 与 OTxL 于 2026 年 5 月联合推出的 AI 增强市场；它显示 CGT
              生态正在走向标准化生产采购渠道。


              **主要反向因素：** 2025–2026 年生物技术融资环境急剧恶化；首次生物技术融资降至疫情前以来最低水平，直接限制推进到 IND 和 CDMO 就绪阶段的新 CGT
              项目数量。生产复杂度仍是结构性逆风——行业病毒载体生产批次成功率估计为 50–70%，显著低于 ElevateBio 披露的 98%，但 ElevateBio 指标为自报且未经审计。已获批 CGT
              疗法商业定价很高（CAR-T $400K+、Skysona $3.1M、Hemgenix $3.5M），引发强烈支付方阻力，拖慢商业化生产放大。Bluebird bio 对 Skysona 的 FDA
              标签限制（血液恶性肿瘤风险）和公司退出公开市场，体现管线流失风险。CAR-T 疗法的自体生产模式尚未实现规模经济，单患者生产成本仍然高。ElevateBio 自身在 2024 年裁员 13%，说明即便资本充足的
              CDMO，在困难环境下也面临短期收入压力。
