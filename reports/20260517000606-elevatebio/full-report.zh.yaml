      - number: '1.2'
        title: 创立历史与公司时间线
        blocks:
          - type: paragraph
            body: >
              ElevateBio 的成立日期存在有文档支撑的冲突说法。公司官方「Our Journey」页面称其「2017 年创立，愿景是重塑细胞与基因疗法」，CNBC Disruptor 50
              档案也记录「上线：2017」。但第三方生物技术新闻和分析数据库持续将 2019 年列为公司的公开亮相时间——这一年，ElevateBio 以 $150 million Series A 公开发布，并建立
              BaseCamp 的商业化 CDMO 运营。2017 年很可能对应法律实体设立或隐身阶段研发；2019 年才是运营层面的商业启动。

              从 2019 年公开亮相起，ElevateBio 快速融资：2020 年完成 $170 million Series B；2022 年 3 月由 Matrix Capital Management
              领投、SoftBank Vision Fund 2 和 Fidelity 参与的标志性 $525 million Series C，投后估值 $2.25 billion。2022 年 8 月，ElevateBio
              被宣布为 University of Pittsburgh $250 million Pitt BioForge 生产设施的主力租户。最近一次重大融资是 2024 年 10 月 $401 million
              Series D；该轮与 Novo Nordisk 的战略制造合作共同设计，Novo Holdings 也参与股权投资。

              公司持续获得行业认可：2021、2023、2024、2025 年入选 CNBC Disruptor 50；入选 Fast Company 2024 年 Most Innovative Companies；获
              LexisNexis IP Solutions 2025 年 Most Innovative Biotech Startup；BaseCamp 设施在 2021 年获得 ISPE Facility of the
              Year Award for Operational Excellence。2026 年 4 月 ASGCT 第 29 届年会上，ElevateBio 展示 9 篇摘要（8 张海报 + 2
              场口头报告），集中呈现扩展后的基因编辑平台、AI 驱动发现和 LNP 递送能力。
