      - number: '6.3'
        title: 客户集中风险与反向信号
        blocks:
          - type: paragraph
            body: >
              ElevateBio 的客户基础存在有意义的集中风险，且受有限公开披露和临床阶段生物制药申办方本身脆弱性叠加。截至 2026 年 5 月，公开证据记录或可推断出三项主要反向信号。

              第一，AlloVir 于 2024 年解散说明 ElevateBio 的临床阶段客户可能几乎无预警失败，在项目达到商业规模前就消灭生产收入流。AlloVir（NASDAQ: ALVR）披露的 SEC 文件与其
              2024 年底和 2025 年初运营收尾一致，此前其病毒学 T 细胞疗法项目反复遭遇临床挫折。ElevateBio 与 AlloVir 的合作记录在此前的公开监管文件和新闻材料中，相关材料提到 BaseCamp
              的早期被投公司模式。此客户流失对 ElevateBio 收入影响没有公开量化，但说明一种系统性风险：早期 CDMO 的收入来自可能在商业化生产前失败的项目。

              第二，Novo Nordisk 通过 Series D 的 Novo Holdings 身份成为战略投资方，同时又是公司披露度最高的生产合作伙伴，形成难以评估的单一客户依赖风险，因为外部看不到收入集中度。如果
              Novo Nordisk 关系占 ElevateBio 签约生产管线的比例过高，Novo 的任何战略转向（例如整合 Novo Nordisk 2024 年收购的 Catalent 生产资产）都可能压低对
              ElevateBio 服务的需求。

              第三，Series D 后连续裁员（2024 年约 13%，2025–2026 年约 17%）与客户爬坡未跟上公司成本结构的情况相符。虽然 ElevateBio 将 2024
              年裁员归因于远离临床前项目的战略转向，但两次裁员接连叠加，说明公司仍在承受压力，需要按已实现收入重调运营费用规模。
