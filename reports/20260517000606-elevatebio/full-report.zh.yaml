chapters:
  - number: 1
    title: 公司概况
    sections:
      - number: '1.1'
        title: 公司身份与商业模式
        blocks:
          - type: paragraph
            body: >
              ElevateBio LLC 是一家私人持有的有限责任公司，总部位于 200 Smith Street, Waltham, Massachusetts
              02451。公司对外表述的使命是「以世界应得的速度，推动细胞与基因疗法诞生」；这也说明它在细胞与基因疗法（CGT）领域同时承担两件事：科学创新和规模化生产。

              ElevateBio 通过两个一体化业务单元运转。LifeEdit 是公司内部基因编辑研发平台，开发新型编辑工具，包括 CRISPR
              核酸酶编辑、碱基编辑、先导编辑、基于逆转座子的基因组整合，同时覆盖递送方式（AAV、LNP、mRNA）和由生成式 AI 驱动的蛋白与载体发现。BaseCamp 是 ElevateBio 的 cGMP 生产
              CDMO 部门，为完整 CGT 模态谱系提供合同开发与生产服务：AAV 病毒载体、慢病毒载体、脂质纳米颗粒、mRNA 和细胞疗法产品（包括 iPSC 衍生疗法）。这种一体化模式让 ElevateBio
              同时扮演技术开发者和制药 / 生物技术客户的生产赋能者。

              截至 2026 年 5 月，ElevateBio 约有 489 名员工（LinkedIn 口径），行业可见度也不低，LinkedIn 关注者 43,293 人。主要运营集中在 Massachusetts 州
              Waltham；未来生产版图还将包括 University of Pittsburgh 的 Pitt BioForge 设施，ElevateBio 是该设施的主力租户。Pitt BioForge 位于
              Pittsburgh 的 Hazelwood 社区，是一个投资 $250 million 的 CGT 生产综合体。
