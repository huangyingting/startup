      - number: '5.3'
        title: 生产与 CDMO 服务
        blocks:
          - type: paragraph
            body: >
              ElevateBio 的 BaseCamp CDMO 部门覆盖三大主要模态：细胞疗法（自体和异体）、病毒载体（慢病毒和 AAV），以及 mRNA 原料药和制剂。两座专门建设的 BaseCamp cGMP
              设施已运营或在建：主设施位于 Waltham, MA；另一处是 University of Pittsburgh 位于 Pittsburgh 的 Hazelwood 街区的 Pitt BioForge
              设施，ElevateBio 是这个 $250 million 细胞与基因治疗生产综合体的锚定租户。截至 2025 年，ElevateBio 报告其生产运营批次成功率为 98%，已支持超过 30
              个临床前和临床项目。

              工艺开发服务覆盖细胞治疗和病毒载体项目的优化与放大、工艺表征和工艺验证。基因编辑设计与优化服务包括候选发现、候选工程、特异性评估、概念验证研究和临床候选优化。分析开发服务嵌入生产流程，覆盖用于脱靶评估的下一代测序（NGS）、效价测试、身份与纯度测试，以及监管
              CMC 支持。ElevateBio 还持有 ICMC™（商业化就绪认证），并为 Beam Therapeutics 的碱基编辑项目和 Kyverna Therapeutics
              的细胞治疗项目提供过生产支持。一家细胞治疗合作伙伴称，生产交付周期使其约十个月就建立了基准工艺，比预期进度约提前一年。
