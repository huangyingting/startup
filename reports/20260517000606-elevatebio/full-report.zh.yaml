      - number: '5.2'
        title: 递送系统
        blocks:
          - type: paragraph
            body: >
              ElevateBio
              的递送组合横跨病毒和非病毒路径，使平台能按每个合作项目的具体载荷、靶组织和开发策略匹配。核心非病毒递送平台是一套自研脂质纳米颗粒（LNP）系统，包含可电离脂质库。临床前模型已证明该平台能高精度把基因编辑系统递送至肝脏；在
              ASGCT 2026，公司还显示其通过非人灵长类动物（NHP）中的腺嘌呤碱基编辑（ABE）实现了具有治疗相关性的蛋白降低（低于基线 50%），无需免疫抑制，并在十周后成功重复给药。LNP 递送在大型基因插入原代人
              T 细胞时也优于电穿孔：同一实验中，LNP 最高达到 88% CD19-CAR+ 细胞，而电穿孔低于 20%。

              病毒载体递送方面，ElevateBio 的 AAV 平台支持多种血清型，配套可规模化 GMP 生产和一体化分析表征。LentiPeak™ 平台是在 HEK 293
              悬浮细胞上运行的悬浮培养、第三代慢病毒载体系统，设计用于支持多个生产规模下的 CAR-T 和 TCR 细胞治疗项目。LentiPeak™ 旨在让工艺开发与 GMP 套间之间的技术转移更顺畅。mRNA
              平台提供体外转录（IVT）处理、加帽 / 加尾反应和切向流过滤（TFF），并配套完整的内部分析能力，覆盖生物负载、内毒素、粒径和浓度。iPSC 衍生细胞治疗生产被列为支持模态，但具体分化流程细节尚未公开披露。
