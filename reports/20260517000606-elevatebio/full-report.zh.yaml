  - number: 8
    title: 估值
    sections:
      - number: '8.1'
        title: 估值框架与可比公司
        blocks:
          - type: paragraph
            body: >-
              ElevateBio 是一个困难的估值对象：公司已通过四轮股权融资约 $1.25 billion，却不披露收入、订单储备或客户数据。唯一确认的股权估值，是 2022 年 3 月由 Bain Capital
              Life Sciences 领投、SoftBank Vision Fund 2 和 Fidelity 参与的 Series C，投后估值 $2.25 billion。2024 年 10 月 Series
              D（$401 million，由 Novo Nordisk 锚定）尤其值得注意，因为没有披露任何估值；在 2022–2024 年生物科技修正期，私营部门估值较峰值下跌
              30–60%，避免公开承认降估值融资的公司常呈现这种模式。

              CDMO 板块提供若干参照点。Lonza Group AG（SIX: LONN）是全球最大合同开发与生产组织，报告 FY2025 收入 CHF 6.5 billion（~$8.5 billion
              USD），按恒定汇率销售增长 21.7%，在公开市场以约 5–8x 过去 12 个月收入交易。Oxford Biomedica（OXB, LSE）是最直接可比的专业细胞与基因治疗 CDMO，截至 2026
              年中市值约 £0.5–0.8 billion，2025 年收入位于指引高端，但警告 2026 年上半年将亏损。Novo Nordisk 以约 $16.5 billion 收购 Catalent，验证了药企对
              CDMO 规模的兴趣；不过 Catalent 收入（~$4B+）远高于 ElevateBio 的估计规模。

              收入倍数框架揭示了 ElevateBio Series C 隐含的估值要求：把 5–8x 收入倍数套到 $2.25 billion 估值上，意味着年收入 $280–450 million——没有任何可比私营
              CGT CDMO 公开确认接近这一水平。私营 CGT CDMO 同业（被 Ajinomoto 收购的 Forge Biologics；从 Nationwide Children's Hospital 分拆的
              Andelyn Biosciences；已融资 $825M+ 的 National Resilience）提供了私募市场语境，但没有一家披露的估值足以完全框定 ElevateBio 的 $2.25 billion
              Series C 高点。基准观点是，ElevateBio 当前隐含企业价值位于 $1.5–2.0 billion 区间，较 2022 年峰值有明显折价，符合行业整体修正及 Series D
              未披露估值中嵌入的结构性信号。
