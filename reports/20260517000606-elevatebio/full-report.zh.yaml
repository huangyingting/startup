      - number: '5.5'
        title: 平台差异化与知识产权
        blocks:
          - type: paragraph
            body: >
              ElevateBio 的 LifeEdit 业务于 2024 年 5 月获得四项新的美国专利，覆盖多种基因编辑酶，包括新型紧凑 CRISPR 核酸酶及相关变体。截至 2026 年，CRISPR
              专利格局仍有争议：2026 年 3 月 26 日，美国 Patent Trial and Appeal Board（PTAB）重申此前不利于 CVC（University of California /
              Vienna / Charpentier）的裁定，将真核细胞中 CRISPR-Cas9 的权利授予 Broad Institute 一方作为优先方。ElevateBio 的紧凑 CRISPR 核酸酶和
              LifeEdit 酶组合被定位在核心 Cas9 真核专利争议之外，因为它们覆盖的是 PAM 序列和结构特征不同的酶类。

              相较单模态 CDMO，ElevateBio 的差异点在于，它用单站点的开发到 GMP 转化路径，覆盖五种编辑模态的发现到生产。Lonza、WuXi ATU、Forge Biologics、Oxford
              Biomedica（OXB）等竞争对手主要聚焦生产执行，不拥有自研编辑技术。ElevateBio 的双业务单元模式（LifeEdit R&D + BaseCamp
              生产）让服务范围从候选识别延伸到商业化规模生产，结构上不同于纯 CDMO。不过，ElevateBio 尚未公开披露完整专利组合数量、具体 LNP 可电离脂质结构，或任何 ElevateBio 自源治疗项目的有效
              IND 申请，限制了外部对其 IP 深度和可执行性的独立评估。
