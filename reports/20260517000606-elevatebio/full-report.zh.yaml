      - number: '4.2'
        title: 收入模型与定价
        blocks:
          - type: paragraph
            body: >-
              截至 2026 年 5 月，ElevateBio 的收入模型由三条互锁收入流构成，但没有一条按美元金额公开披露。第一条主线是 BaseCamp 的按项目收费 cGMP 生产；BaseCamp
              为所有主要细胞与基因疗法模态提供合同开发和生产服务：AAV 病毒载体、慢病毒载体（LV）、脂质纳米颗粒（LNP）、mRNA 和 iPSC 衍生细胞疗法。这些服务按行业标准 CDMO 费率定价——AAV
              批次通常每次生产运行 $500,000 到 $3,000,000，取决于规模（200L 到 2,000L 生产生物反应器体积）、工艺复杂度和下游制剂灌装要求。临床规模慢病毒载体批次一般定价在 $300,000 到
              $1,200,000 区间。LNP 和 mRNA 生产运行的单批次价格通常更低，但按克计费可能更高。这些都是行业基准；ElevateBio 未公布其价目表。

              第二条收入流是 LifeEdit 自有基因编辑工具的技术授权，包括基于 CRISPR
              的核酸酶编辑系统、碱基编辑器、先导编辑器，以及基于逆转座子的基因组整合平台。基因编辑领域的这类授权安排通常包含前期准入费、年度维护费和使用领域限制。可比基因编辑授权交易（如 Editas
              Medicine、Beam Therapeutics 平台授权）显示，平台使用的潜在前期费用可能在 $5–$25 million，另有与临床和商业事件挂钩的里程碑付款。

              第三条收入流来自合作项目的里程碑和版税付款。ElevateBio 与 Novo Nordisk 的合作包含战略制造元素：Novo 出资支持开发，ElevateBio 获得生产收入，并可能获得开发里程碑。CDMO
              领域类似安排可在多年项目中产生 $10–$50 million 的承诺开发里程碑。ElevateBio 网站面向合作伙伴的定位强调从发现到商业化的全项目支持，说明它更偏好合作伙伴模式，而非一次性 CDMO
              交易；前者通常能获得收入溢价。公司未公开在手订单、合同金额或按模态拆分的收入数据。
