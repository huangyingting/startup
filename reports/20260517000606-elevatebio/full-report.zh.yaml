  - id: FV004
    title: ElevateBio 关键投资指标仪表盘
    type: kpi
    layout: standard
    summary: KPI 仪表盘呈现截至 2026 年 5 月 ElevateBio 最影响投资决策的八项指标，覆盖资本结构、估值历史、员工数轨迹、运营产能和行业基准对比。设计目标是直接用于投委会的一页摘要。
    data:
      items:
        - label: 累计融资
          value: ~$1.25B
          unit: USD
          detail: 覆盖 4 轮股权融资：从 Series A（$150M，2019）到 Series D（$401M，2024 年 10 月）
          trend: stable
        - label: 最近披露的投后估值
          value: $2.25B
          unit: USD
          detail: Series C，2022 年 3 月；Series D 估值明确未披露——可能低于 $2.25B
          trend: down
        - label: Series D 融资（2024 年 10 月）
          value: $401M
          unit: USD
          detail: Novo Nordisk 锚定；Novo Holdings 参股；战略生产合作
          trend: stable
        - label: 员工数（估计，2026 年 5 月）
          value: ~489
          unit: employees
          detail: 基于 LinkedIn 在裁员后的估计；低于 Series D 后缩编前约 600–650 人
          trend: down
        - label: 员工总缩减（Series D 后）
          value: ~25–30%
          unit: '% cumulative'
          detail: Series D 完成后约 12 个月内先裁 13%，随后又裁约 17%
          trend: down
        - label: Lonza FY2025 收入（基准）
          value: CHF 6.5B
          unit: CHF (~$8.5B USD)
          detail: CER 增长 21.7%；成熟利润率和收入倍数的主要 CDMO 基准
          trend: up
        - label: Pitt BioForge 投资（产能催化剂）
          value: $250M
          unit: USD facility cost
          detail: University of Pittsburgh CGT 综合体；ElevateBio 是锚定租户；投运时间未披露
          trend: stable
        - label: 概率加权预期估值
          value: ~$1.75–1.85B
          unit: USD est.
          detail: 25% 乐观（$3.5B）/ 50% 基准（$1.75B）/ 25% 悲观（$1.0B）的概率权重
          trend: neutral
