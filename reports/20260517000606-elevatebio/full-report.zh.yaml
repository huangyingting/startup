  - id: TV005
    title: ElevateBio 放弃触发条件与投资逻辑失效条件
    columns:
      - 触发条件
      - 阈值
      - 对投资逻辑的传导
      - 行动含义
    rows:
      - - 进一步重大裁员
        - 未来 12 个月员工数再减少 >15%
        - 表明商业收入显著低于成本基础；尽管已融资 $401M，资本危机可能迫近
        - 观察 → 放弃；退出所有敞口
      - - Novo 合作解约或范围大幅缩小
        - 公开宣布合作终止，或产量承诺减少 >50%
        - 失去主要商业验证锚和乐观情景收入底线；差异化叙事被摧毁
        - 观察 → 放弃；没有替代战略锚，难以恢复
      - - 困境降估值股权融资
        - 新轮投后估值 <$1.0B（较 Series C 折价 >55%）
        - 确认价值毁损已超出行业整体压缩；优先股堆叠成为主导因素
        - 观察 → 放弃；现有投资人可能被严重稀释
      - - 高管层治理不稳定
        - 24 个月内第二次更换 CEO，或另有 ≥3 名高管层成员离任
        - 表明问题已超出正常领导层交接，进入战略危机；董事会对平台的信心受损
        - 观察 → 放弃；管理层执行风险上升为投资逻辑级风险
      - - 影响关键模态的 CGT 监管挫折
        - FDA 临床暂停或 EMA 重大异议，影响占 CDMO 收入 >30% 的 AAV 或 LV 项目
        - 主要收入模态出现行业性需求破坏；近期收入管线受冲击
        - 观察 → 有条件持有；监管决定后 60 天内重估
    claimRefs:
      - CV019
      - CV020
      - CV021
      - CV022
      - CV034
    notes: 放弃触发阈值和概率评估是截至 2026 年 5 月、基于公开可观察信号的分析师估计。实际触发条件定义应写入任何投资协议。
  - id: TV006
    title: ElevateBio 最终尽调问题清单
    columns:
      - 优先级
      - 尽调问题
      - 理由
      - 负责人 / 路径
    rows:
      - - 关键
        - FY2023、FY2024、FY2025 经审计收入和 EBITDA
        - 没有收入数据，就无法做基于倍数的估值；所有情景区间都缺少锚点
        - CFO 在 NDA 下披露；正式数据室请求是任何接触的前提
      - - 高
        - Novo Nordisk 合作条款：承诺产量、最低收入、排他条款、期权权利
        - 量化商业锚；判断 Novo 证明的是乐观情景，还是仅证明基准情景
        - 法务团队在 NDA 下披露；可能需要 Novo Holdings 出具安慰函
      - - 高
        - Series D 投后估值和完整清算优先权堆叠
        - 确定现有投资人进入价格；优先权悬置决定退出情景下普通股等价价值的有效底线
        - CFO 提供股权结构表；如 SEC EDGAR 公开可得，则调取 Reg D Form D
      - - 高
        - Pitt BioForge 租约条款、装修资本开支承诺和设施上线时间表
        - 同时量化产能催化剂（乐观情景）和或有负债（悲观情景）
        - CFO 和法务团队；University of Pittsburgh 房地产律师
      - - 中
        - 月度烧钱速度和 2026 Q1 账面现金估计
        - 判断近期财务可行性，以及再融资前的现金跑道；界定紧迫性
        - CFO 在 NDA 下披露；季度管理账或董事会材料
    claimRefs:
