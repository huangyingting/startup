      - number: '6.4'
        title: 采用路径与留存
        blocks:
          - type: paragraph
            body: >
              ElevateBio 的客户采用模式沿药物开发生命周期阶梯推进：发现与可行性、工艺开发、临床 GMP
              生产、商业化生产。公司宣称的策略，是尽可能早地切入合作伙伴，并在完整开发路径中留住客户，避免申办方在临床和商业化阶段之间切换 CDMO 时出现工艺转移扰动。

              截至 2026 年 5 月，ElevateBio 报告已支持 30+ 个临床前和临床项目，该数字同时包含 BaseCamp 生产合作和 LifeEdit 基因编辑工具合作。30+ 这个数字至少自 2024
              年起被持续引用，说明合作伙伴数量中等增长；但具体数量、续约率和项目阶段分布均未公开拆分。

              Kyverna Therapeutics 案例是公开可得最颗粒化的留存数据点：合作从工艺开发开始，在十个月内放大到 cGMP 生产工艺，且项目截至 2026 年仍继续推进临床试验。ElevateBio 2025
              年 98% 的批次成功率，是其作为留存驱动因素引用的主要质量指标，反映临床阶段申办方为维持监管时间表所需要的生产输出一致性。

              客户采用受到 ElevateBio 一体化平台架构支持：一旦合作伙伴把项目工艺转移到 BaseCamp，切换至替代 CDMO 就需要大量监管和工艺再验证工作，自然形成切换成本。ElevateBio 的两座
              cGMP 设施（Waltham, MA 和 Pittsburgh, PA）提供地理冗余模式，ICMC™ 商业化就绪认证则为成熟项目向商业化生产过渡提供额外质量信号。2025 年 3 月宣布的 AWS 合作，将
              AI 驱动的基因编辑发现提前接入药物开发周期，可能在申办方接触任何生产伙伴之前就捕获客户。
