      - - 主要上行驱动
        - Novo Nordisk 商业规模 + LifeEdit AI 差异化
        - 如果商业执行和领导层稳定跑通，两根支柱相互强化，可支撑 $3B+ 乐观情景
    claimRefs:
      - CV001
      - CV002
      - CV029
      - CV030
      - CV031
    notes: 建议结论和概率权重是截至 2026 年 5 月的分析师估计。Series D 投后估值未公开；最后确认估值（2022 年 Series C 的 $2.25B）可能与当前隐含估值存在重大差异。
  - id: TV002
    title: ElevateBio 投资逻辑 vs. 反向逻辑
    columns:
      - 维度
      - 投资逻辑（乐观）
      - 反向逻辑（悲观）
    rows:
      - - 技术平台
        - LifeEdit AI + BaseCamp 制造一体化，相比纯 CDMO 形成独特护城河
        - 尚无获批产品证明商业可行性；AI 差异化还未在商业规模验证
      - - 商业验证
        - Novo Nordisk 合作 = 前 10 大药企锚定客户 + 财务投资人
        - 交易条款未披露；可能只是范围有限或附条件的制造关系
      - - 市场动态
        - CGT 市场增长；CDMO 产能短缺给优质供应商带来定价权
        - 生物科技低迷延续；CGT 管线延迟压低近期制造需求
      - - 资本与执行
        - $401M Series D 提供现金跑道；Pittsburgh BioForge 增加商业规模产能储备
        - 连续裁员 + CEO 更替 = $401M 不足以支撑原计划；显示结构性收入缺口
      - - 竞争位置
        - 自研编辑工具区别于纯 CDMO；多模态平台降低集中风险
        - Lonza 凭更大规模和现有客户基础进入基因治疗；OXB 在慢病毒方向竞争
      - - 退出潜力
        - Novo Nordisk 是合理买家；未来 2–3 年收入爬坡后 IPO 可行
        - 若商业里程碑落空，可能降估值 M&A 或困境出售；当前市场 IPO 窗口关闭
    claimRefs:
      - CV011
      - CV012
      - CV014
      - CV022
      - CV024
      - CV026
    notes: 投资逻辑与反向逻辑基于截至 2026 年 5 月的公开信号综合研究。收入、Series D 估值和 Novo 合作条款均未公开；风险权重仅反映估计概率。
  - id: TV003
    title: ElevateBio 估值情景：乐观 / 基准 / 悲观
    columns:
      - 情景
      - 估计估值
      - 关键假设
      - 概率信号
    rows:
      - - 乐观情景
        - $3.0–4.0B+
        - Novo 合作带来 $150M+ 承诺收入；CGT 市场复苏；LifeEdit 许可产生有意义的里程碑；Pittsburgh 按期增加产能
        - 25% — 取决于 18 个月内商业执行和领导层稳定
      - - 基准情景
        - $1.5–2.0B
        - CDMO 业务稳定但规模低于盈亏平衡；领导层稳定；Series D 较 Series C 小幅降估；无转型事件；CGT 市场逐步复苏
        - 50% — 结合当前信息不对称和行业环境，这是最可能情景
      - - 悲观情景
        - $0.8–1.2B
        - 进一步裁员显示商业收入低于成本基础；Novo 交易量不及预期；领导层不稳；以困境估值再融资，或低溢价被收购
        - 25% — 反向信号使概率偏高，不能当作低概率事件排除
    claimRefs:
