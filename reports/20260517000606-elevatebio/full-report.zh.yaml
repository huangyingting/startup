  - number: 6
    title: 客户情况
    sections:
      - number: '6.1'
        title: 客户细分与定位
        blocks:
          - type: paragraph
            body: >
              ElevateBio 瞄准处在先进治疗模态与生产复杂度交叉点上的生物制药申办方。其核心价值主张是一体化平台，覆盖自研基因编辑、工艺开发和 cGMP
              生产；对缺少内部生产基础设施、或希望压缩开发时间线的机构最有吸引力。从 ElevateBio 已发布的服务内容和合作伙伴证言看，主要出现五类客户。

              第一类，也是最突出的，是罕见病基因治疗公司，推进基于 AAV 或慢病毒载体的项目，面向治疗选择有限的疾病。这些申办方通常尚未商业化、处于临床阶段，并依赖 CDMO 同时完成工艺开发和 GMP
              供给。ElevateBio 位于 Waltham, MA 和 Pittsburgh, PA（Pitt BioForge）的 BaseCamp 设施，被定位为可服务早期和商业化规模项目，无需转交另一家供应商。

              第二类是肿瘤细胞治疗公司，开发自体或异体 CAR-T 或 TCR 项目。Kyverna Therapeutics 是 ElevateBio 的具名客户，在生产服务首页披露过证言，代表这一细分：它委托
              ElevateBio 做自体 CAR-T 疗法的工艺开发和 GMP 生产，并在合作启动约十个月后建立基准生产工艺，据报道比内部估计快约一年。

              第三类是体内基因治疗公司，包括使用 AAV 或 LNP 递送基因编辑构件的项目。ElevateBio 的五种编辑模态和 LNP 递送平台，使其能支持这些项目从发现到 CMC。第四类是寻求 cGMP
              原料药和制剂供应的 mRNA 疫苗与治疗药生产商。第五类且重要性上升的，是希望大规模外包 CGT 产能的大型药企；2024 年 10 月，Novo Nordisk 在 $401 million Series D
              融资同时宣布的战略合作就是例子。各细分在买方画像、合同周期和收入模式上不同，但都受益于 ElevateBio 这种单一供应商、全生命周期的路径。
