      - number: '7.5'
        title: 附录
        blocks:
          - type: callout
            title: CEO 更替叠加风险：创始人退出与裁员处于同一窗口期
            body: >-
              创始人 CEO 退出（2026 年 1 月 5 日）与两次连续裁员合计约削减峰值员工数 30% 同时发生，形成一个此前 ElevateBio 未经历过的叠加风险窗口。在 CDMO
              关系中，信任高度个人化、关系特异性强：客户选择 CDMO，往往基于与高级领导层的直接关系，因为这些人理解项目细节，也能在决策层解决质量问题。Bhargava
              离任，意味着所有现有客户关系同时失去创始人的个人信用背书。Murphy 能否在裁员后稳定内部运营，同时保住并扩大 CDMO 客户基础，将成为近期最重要的绩效指标。监测项：Q2-Q3 2026
              是否有公开宣布的客户流失或项目延期。
            calloutType: insight
