          - type: callout
            title: Novo Nordisk 利益冲突在公开披露中缺乏结构性治理
            body: >-
              Novo Nordisk 和 Novo Holdings 在 ElevateBio 生态中处于独特复杂的位置：作为 Series D 领投方，Novo Holdings
              持有股权并拥有治理影响力；作为战略生产合作伙伴，Novo Nordisk 同时是 ElevateBio 已披露的最大客户；通过 Novo Holdings 收购 Catalent，Novo 又间接拥有
              ElevateBio 的直接 CDMO 竞争对手。没有公开披露说明 ElevateBio 董事会层面如何治理这种三重角色冲突——Novo 董事会代表在涉及 Novo 项目的生产定价、产能分配，或 Catalent
              相关竞争战略决策时是否回避。任何潜在共同投资人都应把这种信息不对称和治理不透明视为重大尽调缺口。尽调要求：向 ElevateBio 管理层索取董事会构成、投资者权利协议条款和利益冲突治理政策。
            calloutType: insight
            claimRefs:
              - CR023
              - CR024
          - type: callout
            title: CRISPR 专利强化让 LifeEdit 商业规模 FTO 存不确定性
            body: >-
              2026 年 3 月 26 日，PTAB 第二次裁定不利于 Doudna/Charpentier CVC 团队，明确强化了 Broad Institute 在可预见未来对真核 CRISPR 应用的 IP 控制。对
              ElevateBio LifeEdit 平台而言——该平台向治疗项目提供 CRISPR 核酸酶编辑、碱基编辑、prime editing 和基于逆转座子的基因插入——这形成结构复杂的 IP 依赖格局。Broad
              CRISPR 核酸酶权利、Beam Therapeutics 碱基编辑专利和 Prime Medicine prime editing 专利叠加，意味着任何触及这些模态的 LifeEdit
              商业项目，都需要从至少三个不同 IP 持有人处验证 FTO。随着 LifeEdit 商业项目放大、授权收入在 ElevateBio 财务模型中变得更重要，FTO
              风险及相关授权成本也会越来越重要。该风险在当前规模下不至于推翻投资逻辑，但需要主动 IP 管理。
            calloutType: insight
