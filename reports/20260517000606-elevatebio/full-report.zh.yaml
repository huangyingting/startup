      - number: '2.2'
        title: 市场规模与增长——多镜头法
        blocks:
          - type: paragraph
            body: >
              没有一份权威市场规模报告把 CGT CDMO 市场作为统一类别做完整覆盖。现有可获得估算多聚焦模态子领域（慢病毒载体、AAV、细胞疗法生产分别估算），而非经审计的总量。本分析用多镜头方法三角测算整体市场机会。


              **慢病毒载体市场（镜头 1）：** The Business Research Company 估计，全球慢病毒载体市场 2025 年为 $16.48B，2026 年增至 $18.95B（年增长 15%），到
              2030 年达 $30.66B，复合年增长率 12.8%。该子领域与 ElevateBio 直接相关，因为 CAR-T 项目的慢病毒载体生产是其主要服务之一。高 CAGR 反映体外细胞疗法管线需求增长。


              **细胞疗法生产市场（镜头 2）：** PRNewswire 市场稿（归因于 Avaí Bio / USANewsGroup）估计，全球细胞疗法生产市场 2026 年为 $7.17B，到 2035
              年接近翻倍、超过 $14B。这个镜头覆盖更广的细胞处理与生产生态，包括自体和异体项目。隐含 CAGR 约 8%，显示增长稳健但不爆发，符合该行业早期商业化阶段。


              **FDA 批准管线（镜头 3）：** 截至 2026 年 5 月，FDA 已批准 30 多个 CGT 产品——包括 CAR-T 疗法、针对罕见病的 AAV 基因疗法，以及首个 CRISPR 疗法
              Casgevy。每一次商业化批准都会触发生产放大需求，并创造新的 CDMO 合同机会。目前每年 3–5 个产品获批，意味着本十年内商业化生产需求会继续增长。


              **临床试验管线（镜头 4）：** ASGCT 报告全球有 3,000 多项活跃基因疗法临床试验。每个 Phase I/II 试验都可能对应工艺开发和支持 IND 的生产 CDMO 合同。Phase III
              和商业阶段试验对应最高价值的生产合同。ElevateBio 的 30+ 活跃项目让它直接暴露于这条管线。


              **ElevateBio 运营足迹（镜头 5）：** ElevateBio 自身披露的生产指标——98% 批次成功率、30+ 项目、10+
              模态——可作为公司在当前组织规模下可获取服务市场的代理变量。具体收入未公开披露。没有单一权威公共来源给出 CGT CDMO 市场的总量数字；所有估算都应视为方向性。
