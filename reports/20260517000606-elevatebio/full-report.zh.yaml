companyProfile:
  summary: >-
    ElevateBio 是一家以技术驱动的先进疗法 CDMO，服务于改变生命轨迹的遗传药物研发。公司把两个业务单元放在同一体系内 — LifeEdit（自研基因编辑平台，覆盖核酸酶、碱基、逆转录酶、表观遗传编辑和靶向基因插入）与
    BaseCamp（cGMP 生产和工艺开发服务）— 并叠加生成式 AI 能力，帮助生物制药伙伴从早期发现一路推进到商业化。ElevateBio 已通过四轮融资筹集约 $1.25 billion，最近一轮是 2024 年 10 月
    $401M Series D，并包含与 Novo Nordisk 的战略制造合作。公司总部位于 Massachusetts 州 Waltham，也是 University of Pittsburgh 斥资 $250M 建设的
    Pitt BioForge 先进疗法生产设施的主力租户。
