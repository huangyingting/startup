        - 活跃 — ASGCT 2026 已展示
        - 高 — 失去 LNP 差异化会失去关键非病毒细分位
      - - GenAI / ML 蛋白工程平台
        - 竞争护城河
        - AI 驱动的蛋白发现和 ML 优化逆转录转座子平台在 CDMO 中少见；ASGCT 2026 已展示
        - 活跃 — ASGCT 2026 摘要确认 ML 优化
        - 中 — AI 能力可用资本投入复制
      - - Novo Nordisk 战略合作
        - 竞争护城河
        - Novo $401M Series D 投资（2024 年 10 月）为平台质量背书；未来可能成为 Novo 项目的优先 CDMO
        - 活跃 — 合作已在 Series D 中披露
        - 中 — 取决于 Novo 持续投入 CGT 的策略
      - - BIOSECURE Act 顺风（WuXi 替代）
        - 监管护城河（暂时）
        - WuXi Advanced Therapies 被排除在美国联邦资助项目之外；需求重新流向美国本土 CDMO
        - 活跃 — BIOSECURE Act 截至 2026 年已生效
        - 若逆转则高 — 立法变化可能让 WuXi 重新参与竞争
      - - OXB 加速 GMP 服务（2026 年 4 月）
        - 竞争风险
        - OXB 9 个月 GMP 加速服务直接冲击 ElevateBio「更快进临床」差异化；2026 年创新奖得主
        - 活跃 — OXB 于 2026 年 4 月推出
        - 中高 — 削弱 ElevateBio 面向早期生物技术公司的速度价值主张
      - - 与 Lonza 的规模差距
        - 竞争风险
        - Lonza 拥有约 20,000 名员工和全球网络，提供 ElevateBio（约 489 名员工）不具备的产能、商业化记录和定价权
        - 持续性结构差距
        - 商业规模合同风险高
      - - 基因编辑 IP 诉讼风险
        - 法律风险
        - CRISPR 和碱基编辑 IP 争议激烈；Broad Institute、UC Berkeley 等机构持有关键专利，可能加重 LifeEdit 工具负担
        - 潜在风险——截至 2026 年 5 月未披露诉讼
        - 高——不利 IP 裁决可能限制 LifeEdit 服务供给
      - - 客户集中度（未披露）
        - 财务风险
        - 私营公司未公开收入；无法核实客户集中度；一个大客户流失就可能产生重大影响
        - 未知——没有财务资料无法核实
        - 若客户集中则风险高
      - - 裁员后人才留存
        - 运营风险
        - 两轮裁员（2024 年 13%；2025 年 17%）将员工数降至约 489 人；专业基因编辑 / 生物工艺科学家稀缺
        - 现实风险——LinkedIn 核实员工数降至约 489 人
        - 高——关键科学家流失可能拖累 LifeEdit 质量
      - - Forge Biologics 专用 AAV 规模化能力
        - 竞争风险
        - Forge 拥有 200,000+ 平方英尺设施、600+ 批次经验，并有 Ajinomoto 集团背书；2026 年 Epicrispr 合作验证其市场地位
        - 现实风险——Forge 2026 年客户阵容在扩张
        - 中——限制 ElevateBio 扩张 AAV 市场份额
