          - type: callout
            title: 尽调要求与放弃条件摘要
            body: >-
              优先尽调要求：（1）索取 ElevateBio 客户名单（按项目层面匿名）及按模态拆分的收入，以评估客户集中度和烧钱收入比；（2）索取董事会构成、投资者权利协议和 Novo Nordisk
              利益冲突治理政策；（3）核验 BaseCamp Waltham 当前 FDA 合规状态：索取最近一次 FDA 检查报告和任何未关闭的 483 观察项；（4）索取 Pitt BioForge 建设时间线和 GMP
              投运调试里程碑计划；（5）评估 LifeEdit 与 Broad Institute、Beam Therapeutics、Prime Medicine 的 IP 授权协议。放弃条件：（a）FDA 对
              BaseCamp Waltham 发出 Warning Letter，且包含系统性 GMP 问题；（b）Novo Nordisk 公开将生产转向 Catalent；（c）CEO Murphy 在任命后 24
              个月内离任；（d）PTAB 或联邦法院发布禁令，限制 LifeEdit 使用基于 CRISPR 的编辑工具；（e）Series E 定价低于 Series D；（f）Pitt BioForge 建设延迟超过原计划
              18 个月。
