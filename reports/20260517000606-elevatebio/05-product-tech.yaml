company:
  name: "ElevateBio"
chapter:
  number: 5
  title: "Product and Technology"
  summary: >-
    ElevateBio operates a dual-platform model comprising LifeEdit (gene editing R&D and services) and BaseCamp
    (cGMP manufacturing CDMO). The LifeEdit platform supports five distinct editing modalities—nuclease editing,
    base editing, reverse transcriptase (RT) editing, epigenetic editing, and targeted gene insertion—each
    underpinned by a library of compact (~800–1,100 amino acid) RNA-guided CRISPR systems with >99% genomic site
    coverage. Delivery modalities include a proprietary ionizable-lipid LNP platform, AAV (multiple serotypes),
    and the LentiPeak™ suspension lentiviral vector platform. Manufacturing services span cell therapies, viral
    vectors, and mRNA across two purpose-built BaseCamp cGMP facilities in Waltham, MA and Pittsburgh, PA (Pitt
    BioForge). At ASGCT 2026, ElevateBio presented nine abstracts demonstrating LNP-mediated base editing in NHP,
    retrotransposon-driven large gene insertion, AI-generated deaminase enzymes, and epigenetic activation in
    disease models. Generative AI tools—including Amazon AWS infrastructure—are integrated for protein and gRNA
    discovery, while machine learning drives iterative optimization across modalities. As of May 2026, ElevateBio
    reports a 98% batch success rate, 30+ programs supported, and ICMC™ commercial readiness certification.
    Key diligence gaps include absence of disclosed patent numbers, undisclosed LNP ionizable-lipid IP scope,
    and no publicly filed IND for an ElevateBio-originated therapeutic program.

sections:
  - id: gene-editing-platform
    title: "Gene Editing Platform"
    body: >
      ElevateBio's LifeEdit gene editing platform is organized around five distinct editing modalities, each
      addressing different therapeutic needs: nuclease editing, base editing, reverse transcriptase (RT) editing,
      epigenetic editing, and targeted gene insertion. Nuclease editing involves cutting both DNA strands to
      enable knock-in or knock-out at the cut site. The company's nuclease library features diverse protospacer
      adjacent motifs (PAMs), enabling access to greater than 99% of genomic sites—a claimed key differentiator
      against earlier single-PAM CRISPR-Cas9 systems. All RNA-guided CRISPR systems are compact, approximately
      800–1,100 amino acids in length, enabling packaging into both viral (AAV) and non-viral (LNP) delivery
      systems, which is critical for in vivo therapeutic applications.

      Base editing introduces single-nucleotide changes without requiring a double-strand break, reducing the
      risk of large genomic rearrangements. Reverse transcriptase (RT) editing—analogous to prime editing—uses
      a reverse transcriptase domain to write new genetic sequences at targeted sites. Epigenetic editing
      modulates gene expression without altering the DNA sequence itself, using RNA-guided activators or
      repressors that reversibly silence or upregulate target genes. At ASGCT 2026, ElevateBio demonstrated
      2-fold gene activation in a neuro-developmental haploinsufficiency model and durable B2M repression in
      Jurkat cells persisting at least four weeks post-transfection. Targeted gene insertion via retrotransposon
      machinery allows large payload delivery, with machine learning used to iteratively optimize the effectors.
      Beam Therapeutics is a named partner using the base editing manufacturing capability.

      ElevateBio's protein library of 10 billion+ proteins is available for AI-driven enzyme screening and
      discovery. The company claims five editing modalities are supported by AI-enzyme discovery as of 2026.
    claimRefs:
