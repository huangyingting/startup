  - id: platform-differentiation-ip
    title: "Platform Differentiation and Intellectual Property"
    body: >
      ElevateBio's LifeEdit business was awarded four new US patents in May 2024 covering multiple gene editing
      enzymes, including novel compact CRISPR nucleases and associated variants. The CRISPR patent landscape as
      of 2026 remains contested: on March 26, 2026, the US Patent Trial and Appeal Board (PTAB) reaffirmed its
      prior determination against CVC (University of California / Vienna / Charpentier), awarding the Broad
      Institute's claim to CRISPR-Cas9 in eukaryotic cells as the senior party. ElevateBio's compact CRISPR
      nucleases and LifeEdit enzyme portfolio are positioned outside the core Cas9 eukaryote patent dispute,
      as they cover distinct enzyme classes with different PAM sequences and structural characteristics.

      Against single-modality CDMOs, ElevateBio differentiates through integrated discovery-to-manufacturing
      coverage across five editing modalities with a single-site development-to-GMP transition pathway.
      Competitors such as Lonza, WuXi ATU, Forge Biologics, and Oxford Biomedica (OXB) focus primarily on
      manufacturing execution without proprietary editing technology. ElevateBio's dual-unit model (LifeEdit
      R&D + BaseCamp manufacturing) creates a service scope that spans from candidate identification through
      commercial-scale production, which is structurally differentiated from pure-play CDMOs. However,
      ElevateBio has not publicly disclosed its full patent portfolio numbers, specific LNP ionizable-lipid
      structures, or any active IND filings for an ElevateBio-originated therapeutic program, limiting
      independent assessment of the depth and enforceability of its IP position.
    claimRefs:
      - CE028
      - CE029
      - CE030
