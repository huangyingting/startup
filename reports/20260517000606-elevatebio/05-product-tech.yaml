    rows:
      - - Nuclease editing
        - Dual-strand DNA cut; knock-in or knock-out
        - Monogenic loss-of-function / gain-of-function
        - AAV, LNP, electroporation
        - Commercial-partner programs active
        - Compact ~800–1,100 aa; >99% genomic access
        - No disclosed IND for ElevateBio-originated program
      - - Base editing
        - Single-nucleotide change; no DSB required
        - Point-mutation correction (e.g., hemoglobinopathies)
        - LNP (in vivo), electroporation (ex vivo)
        - NHP data published (ASGCT 2026); Beam partner
        - Reduced indels vs nuclease; repeat-dose NHP
        - Specific adenine/cytosine base editor enzymes not disclosed
      - - RT / reverse transcriptase editing
        - RT domain writes new sequence at cut site
        - Complex mutations; insertions up to multi-kb
        - LNP (development stage), electroporation
        - Pre-clinical; retrotransposon integration ongoing
        - Machine-learning-optimized effectors
        - Payload size limits and off-target profile not publicly assessed
      - - Epigenetic editing
        - RNA-guided activation/repression; no DNA alteration
        - Haploinsufficiency; dosage-sensitive pathways
        - mRNA transfection (Jurkat model); translating to LNP
        - Pre-clinical; 2-fold activation in disease model (ASGCT 2026)
        - Reversible modulation; no permanent edit risk
        - Durability beyond 4 weeks and in vivo delivery unconfirmed
      - - Targeted gene insertion
        - Retrotransposon-based large payload integration
        - Loss-of-function diseases requiring gene replacement
        - LNP demonstrated for T-cell delivery (88% efficiency)
        - Pre-clinical; ML-guided optimization ongoing
        - Non-viral large gene insertion; outperforms electroporation
        - No in vivo systemic delivery data published as of May 2026

