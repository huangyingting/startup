  evidenceGaps:
    - type: private-evidence-only
      severity: blocking
      topic: intellectual-property
      missingEvidence: >-
        ElevateBio's full patent portfolio—including specific patent numbers, claims coverage, enzyme sequences,
        LNP ionizable-lipid structural scope, and licensing agreements—is not publicly disclosed. Only four
        patent grants from May 2024 have been publicly referenced by name.
      whyItMatters: >-
        Without knowing the breadth, claims, and territorial scope of ElevateBio's enzyme and LNP IP, it is
        impossible to assess whether the platform has defensible competitive moats or is exposed to design-
        around risk from well-capitalized competitors (e.g., Alnylam's LNP portfolio, Beam Therapeutics'
        base editor patents, Broad Institute's nuclease IP).
      diligencePath: >-
        Request a comprehensive IP landscape memo from ElevateBio's legal counsel, covering US and
        international patent families, pending applications, licensed-in technology, and third-party claims
        on any LifeEdit enzyme class or LNP formulation in current use.
      relatedQuestionRefs: [QE014, QE021]
      relatedTableRefs: [TE001]

    - type: private-evidence-only
      severity: material
      topic: manufacturing-quality
      missingEvidence: >-
        The 98% batch success rate disclosed for 2025 lacks a denominator, a definition of what constitutes a
        batch, a definition of "success," and has not been independently audited. No FDA inspection observations
        (Form 483) or warning letter history has been confirmed through public database search.
      whyItMatters: >-
        Batch success rate is the primary quality KPI for CDMO diligence. Without the denominator and definition,
        the statistic cannot be compared to industry benchmarks or used to assess manufacturing risk for a
        specific partner program.
      diligencePath: >-
        Request manufacturing quality data directly from ElevateBio: batch records, right-first-time rates,
        deviation logs, and FDA inspection history (searchable at FDA Inspection Database). Request the ICMC™
        certifying body and audit report.
      relatedQuestionRefs: [QE007, QE009]
      relatedTableRefs: [TE004]

    - type: missing-source
      severity: material
      topic: clinical-status
      missingEvidence: >-
        ElevateBio has not publicly disclosed any sponsored IND filing, clinical trial registration (ClinicalTrials.gov),
        or ElevateBio-originated therapeutic program entering clinical development as of May 2026. No CTA, IND,
        or orphan drug designation under ElevateBio's name has been confirmed from public regulatory databases.
      whyItMatters: >-
        An advanced therapy CDMO with zero disclosed clinical programs under its own sponsorship has not
        demonstrated the ability to execute on its own pipeline—a key indicator of platform depth and a potential
        signal that all clinical validation is dependent on partner programs and their success.
      diligencePath: >-
        Search ClinicalTrials.gov and EudraCT/CTIS under ElevateBio, LifeEdit, and BaseCamp as sponsor or
        collaborator. Request from management any pipeline programs in IND-enabling studies.
      relatedQuestionRefs: [QE020]
      relatedTableRefs: [TE005]

    - type: private-evidence-only
      severity: material
      topic: NGS-sterility-testing
      missingEvidence: >-
        ElevateBio's ASGCT 2026 poster described NGS-based sterility and adventitious agent testing as a
        developmental capability. Regulatory acceptance of NGS for sterility testing is not yet established by
        FDA or EMA as of May 2026, making this a forward-looking R&D investment rather than a validated
        commercial capability.
      whyItMatters: >-
        If ElevateBio's partners rely on this capability for regulatory submissions, the lack of a regulatory
        pathway could create submission delays or require parallel conventional sterility testing.
      diligencePath: >-
        Review FDA draft guidance on NGS-based testing; confirm ElevateBio's current regulatory submissions
        rely on conventional, validated sterility methods.
      relatedQuestionRefs: [QE023, QE025]
      relatedTableRefs: [TE003]

    - type: enumeration-incomplete
      severity: minor
      topic: epigenetic editing and RT editing maturity map
      missingEvidence: >-
        Epigenetic editing and RT editing (reverse transcriptase/prime-style editing) are represented at ASGCT
        2026 only by pre-clinical cell-line and primary-cell data. No in vivo pharmacology, in vivo
        pharmacokinetics, tolerability, or GMP-scale process data has been publicly disclosed for either modality.
      whyItMatters: >-
        Pre-clinical modalities represent an innovation roadmap claim, not a validated commercial offering.
        Partners considering these modalities face significant development-stage and manufacturing-readiness risk.
      diligencePath: >-
        Request management commentary on the development timeline and GMP readiness for epigenetic and RT editing
        modalities; obtain any IND-enabling study plans or CMC development timelines.
      relatedQuestionRefs: [QE022, QE006]
      relatedTableRefs: [TE001, TE005]
