        - id: bullDrivers
          label: Bull Drivers
          detail: Novo Nordisk anchor; LifeEdit AI moat; Pittsburgh BioForge capacity; CGT market growth
        - id: bearDrivers
          label: Bear Drivers
          detail: 25–30% headcount reduction; CEO change Jan 2026; no revenue disclosure; valuation compression
        - id: trackVerdict
          label: TRACK Recommendation
          detail: Maintain active diligence; await revenue disclosure, Novo milestones, leadership stabilization
        - id: upgradeConditions
          label: Upgrade Milestones
          detail: Revenue disclosed under NDA; Novo milestones confirmed; CEO stable 18+ months; Pittsburgh operational
        - id: killTriggers
          label: Kill Triggers
          detail: '>15% further layoffs; Novo dissolution; new round <$1.0B; second CEO change in 24 months'
        - id: buyVerdict
          label: → Upgrade to BUY
          detail: If 2+ upgrade milestones met and CGT market stabilizes; redeploy capital at current implied valuation
        - id: passVerdict
          label: → Downgrade to PASS
          detail: If 2+ kill triggers activated; financial survival risk subordinates platform optionality
