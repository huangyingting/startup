      - number: '5.4'
        title: AI and Computational Discovery
        blocks:
          - type: paragraph
            body: >
              ElevateBio integrates generative AI and machine learning throughout its discovery and optimization
              workflows. At the ASGCT 29th Annual Meeting in April 2026, the company presented data from an oral
              presentation on "Leveraging generative AI to design novel, functional deaminases for adenine base
              editing," demonstrating that AI-generated enzymes can expand the deaminase design space for base editing
              therapeutics. A companion presentation covered "Active learning-guided optimization of large gene
              insertion effectors in mammalian cells," showing that iterative machine learning cycles can substantially
              improve retrotransposon- based gene insertion efficiency.

              ElevateBio uses Amazon AWS infrastructure for its generative AI workloads, integrating cloud-scale compute
              for protein structure prediction, guide RNA optimization, and delivery vector design. The 10 billion-plus
              protein collection is the primary data asset enabling AI-driven enzyme screening. Generative AI is cited
              as enabling the fifth modality—epigenetic editing tools—supported by AI-enzyme discovery as of 2026.
              Machine learning optimization of LNP formulation chemistry (ionizable lipid structures, RNA modifications,
              guide design) was demonstrated to yield approximately a 3-fold increase in nuclease editing potency in
              mouse liver against the Hao1 target gene associated with primary hyperoxaluria. Next-generation sequencing
              (NGS) analytics are also being developed for rapid sterility and adventitious agent testing, as
              demonstrated in a 2026 ASGCT poster presentation.
