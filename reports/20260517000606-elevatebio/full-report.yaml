      - number: '1.2'
        title: Founding History and Corporate Timeline
        blocks:
          - type: paragraph
            body: >
              ElevateBio's founding date is a documented conflicting claim. The company's official "Our Journey" page
              states it was "founded in 2017 with a vision to reshape cell and gene therapy," and the CNBC Disruptor 50
              profile similarly records "Launched: 2017." However, third-party biotech news sources and analyst
              databases consistently report 2019 as the company's public debut—the year it launched publicly with a $150
              million Series A and established BaseCamp's commercial CDMO operations. The 2017 date likely reflects
              legal entity formation or stealth-stage R&D, while 2019 marks the operational commercial launch.

              From the 2019 public debut, ElevateBio raised rapidly: a $170 million Series B in 2020, and a landmark
              $525 million Series C in March 2022 at a $2.25 billion post-money valuation led by Matrix Capital
              Management with SoftBank Vision Fund 2 and Fidelity. In August 2022, ElevateBio was announced as anchor
              tenant for the University of Pittsburgh's $250 million Pitt BioForge manufacturing facility. The most
              recent major financing was a $401 million Series D in October 2024, co-structured with a strategic
              manufacturing partnership with Novo Nordisk and equity participation from Novo Holdings.

              Industry recognition has been consistent: CNBC Disruptor 50 listings in 2021, 2023, 2024, and 2025; Fast
              Company Most Innovative Companies 2024; LexisNexis IP Solutions 2025 Most Innovative Biotech Startup; and
              the ISPE Facility of the Year Award for Operational Excellence in 2021 for the BaseCamp facility. At the
              ASGCT 29th Annual Meeting in April 2026, ElevateBio presented 9 abstracts (8 posters + 2 oral
              presentations) showcasing its expanded gene editing platform, AI-driven discovery, and LNP delivery
              capabilities.
