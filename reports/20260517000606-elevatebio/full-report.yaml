              The 2025–2026 biotech financing downturn — the worst for first-time financings since pre-pandemic —
              directly reduces the pool of new CGT programs advanced to IND-ready stage. ElevateBio's 13% workforce
              reduction in 2024 indicates that even well-funded CDMOs face near-term revenue pressure from reduced
              customer pipeline. This is the primary near-term demand risk.
