  - id: TM004
    title: Growth Drivers and Constraints Table
    columns:
      - Factor
      - Direction
      - Timing
      - Implication for CGT CDMO Market
      - Diligence Ask
    rows:
      - - FDA CGT approval momentum (30+ products, 3–5/yr rate)
        - Tailwind
        - Ongoing / 2024–2028
        - Each commercial approval triggers manufacturing scale-up; validates modality; stimulates clinical investment
        - How many of ElevateBio's 30+ programs are nearing commercial milestone and what is timeline to scale-up?
      - - BIOSECURE Act restricting WuXi Advanced Therapies
        - Tailwind
        - Effective 2026+
        - US federal-funded programs must shift to non-Chinese CDMOs; redirects demand to US and allied companies
        - What fraction of ElevateBio's pipeline competes directly with WuXi AT for US government-linked programs?
      - - Biotech financing downturn (2025–2026 worst since pre-pandemic)
        - Headwind
        - Near-term (1–2 yr)
        - Reduces new CGT program starts; fewer INDs filed; fewer new CDMO contracts initiated from early-stage sponsors
        - >-
          What is ElevateBio's current backlog and pipeline fill rate through 2027? How many customers are at risk of
          program discontinuation?
      - - Manufacturing complexity and batch failure risk
        - Headwind
        - Structural
        - >-
          Industry average batch success ~50–70%; high COGS constrains commercial-scale profitability; quality failures
          are catastrophic
        - Can ElevateBio sustain 98% batch success at scale as program complexity and volume increase?
      - - AI-driven vector engineering (Dyno Psi-Phi, in-house tools)
        - Tailwind
        - Accelerating 2025–2030
        - >-
          Shortens AAV capsid optimization; increases demand for process development CDMO services; more programs reach
          IND faster
        - >-
          What proportion of ElevateBio's revenue is process development vs. GMP manufacturing? How does AI integration
          affect margins?
      - - Commercial CGT pricing and payer reimbursement barriers
        - Headwind
        - Structural / near-term
        - >-
          Therapies priced $400K–$3.5M face payer resistance; slow commercial scale-up limits manufacturing contract
          volumes
        - What is ElevateBio's revenue exposure to commercial manufacturing contracts vs. clinical-stage only?
      - - Casgevy launch and CRISPR therapy pipeline growth
        - Tailwind
        - 2024–2028
        - >-
          First approved CRISPR therapy validating gene editing workflow; boosts demand for lentiviral and editing-tool
          manufacturing
        - Is ElevateBio a manufacturing partner for any clinical-stage CRISPR or base editing programs?
      - - Allogeneic / iPSC platform emergence
        - Tailwind (future)
        - Medium-term (3–7 yr)
        - >-
          Off-the-shelf cell therapies could achieve large-batch scale unavailable in autologous manufacturing; changes
          CDMO economics
        - Does ElevateBio have allogeneic or iPSC manufacturing capabilities? Are any programs in pipeline?
    notes: >-
      Driver and constraint assessment is based on publicly available market intelligence and news sources. Timing
      horizons are estimates. Commercial pricing data for Kymriah ($400K+), Skysona ($3.1M), and Hemgenix ($3.5M) is
