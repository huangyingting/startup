      - number: '5.2'
        title: Delivery Systems
        blocks:
          - type: paragraph
            body: >
              ElevateBio's delivery portfolio spans viral and non-viral approaches, allowing the platform to be matched
              to the specific payload, target tissue, and development strategy of each partner program. The core
              non-viral delivery platform is a proprietary lipid nanoparticle (LNP) system incorporating a library of
              ionizable lipids. This platform has been demonstrated to deliver gene editing systems to the liver with
              high precision in preclinical models, and at ASGCT 2026 was shown to achieve therapeutically relevant
              protein reduction (below 50% of baseline) through adenine base editing (ABE) in non-human primates (NHP),
              without immunosuppression and with successful repeat dosing at ten weeks. LNP delivery also outperformed
              electroporation for large gene insertion into primary human T cells, achieving up to 88% CD19-CAR+ cells
              versus less than 20% via electroporation in the same experiment.

              For viral vector delivery, ElevateBio's AAV platform supports multiple serotypes with scalable GMP
              manufacturing and integrated analytical characterization. The LentiPeak™ platform provides a suspension-
              based, third-generation lentiviral vector system on HEK 293 suspension cells, designed to support CAR-T
              and TCR cell therapy programs at multiple production scales. LentiPeak™ is engineered for seamless tech
              transfer between process development and GMP suites. The mRNA platform provides in vitro transcription
              (IVT) processing, capping/tailing reactions, and tangential flow filtration (TFF), with comprehensive
              in-house analytics for bioburden, endotoxin, particle size, and concentration. iPSC-derived cell therapy
              manufacturing is listed as a supported modality but specific differentiation protocol details have not
              been publicly disclosed.
