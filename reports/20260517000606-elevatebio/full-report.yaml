      - number: '2.2'
        title: Market Size and Growth — Multiple Lens Approach
        blocks:
          - type: paragraph
            body: >
              No single authoritative market sizing report comprehensively covers the CGT CDMO market as a unified
              category. Existing accessible estimates focus on modality sub-segments (lentiviral vector, AAV, cell
              therapy manufacturing separately) rather than an audited aggregate. This analysis uses a multi-lens
              approach to triangulate the overall market opportunity.


              **Lentiviral vector market (Lens 1):** The Business Research Company estimates the global lentiviral
              vector market at $16.48B in 2025, growing to $18.95B in 2026 (15% annual growth) and reaching $30.66B by
              2030 at a 12.8% compound annual growth rate. This sub-segment is directly relevant to ElevateBio, as
              lentiviral vector manufacturing for CAR-T programs is one of its primary service offerings. The high CAGR
              reflects growing ex vivo cell therapy pipeline demand.


              **Cell therapy manufacturing market (Lens 2):** A PRNewswire market release (attributed to Avaí Bio /
              USANewsGroup) estimates the global cell therapy manufacturing market at $7.17B in 2026, nearly doubling to
              over $14B by 2035. This lens captures the broader cell processing and manufacturing ecosystem, including
              both autologous and allogeneic programs. The implied CAGR of approximately 8% reflects steady but not
              explosive growth, consistent with the sector's early commercialization stage.


              **FDA approval pipeline (Lens 3):** FDA had approved over 30 CGT products through May 2026 — including
              CAR-T therapies, AAV-based gene therapies for rare diseases, and the first CRISPR-based therapy (Casgevy).
              Each commercial approval triggers manufacturing scale-up demand and creates a new CDMO contract
              opportunity. The current approval rate of 3–5 products per year suggests continued growth in commercial
              manufacturing demand through the decade.


              **Clinical trial pipeline (Lens 4):** ASGCT reports over 3,000 active gene therapy clinical trials
              globally. Each Phase I/II trial represents a potential CDMO contract for process development and
              IND-enabling manufacturing. Phase III and commercial-stage trials represent the highest-value
              manufacturing contracts. ElevateBio's 30+ active programs give it direct exposure to this pipeline.


              **ElevateBio's operational footprint (Lens 5):** ElevateBio's own manufacturing disclosures — 98% batch
              success rate, 30+ programs, 10+ modalities — provide a proxy for the serviceable obtainable market at
              current organizational scale. The exact revenue is not publicly disclosed. No aggregate CGT CDMO market
              figure is available from a single authoritative public source; all estimates should be treated as
              directional.
