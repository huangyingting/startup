      - number: '5.3'
        title: Manufacturing and CDMO Services
        blocks:
          - type: paragraph
            body: >
              ElevateBio's BaseCamp CDMO division manufactures across three primary modality categories: cell therapies
              (autologous and allogeneic), viral vectors (lentiviral and AAV), and mRNA drug substance and drug product.
              Two purpose-built BaseCamp cGMP facilities are operational or in development: the primary facility in
              Waltham, MA, and the University of Pittsburgh's Pitt BioForge facility in Pittsburgh's Hazelwood
              neighborhood, where ElevateBio is anchor tenant of a $250 million cell and gene therapy manufacturing
              complex. As of 2025, ElevateBio reports a 98% batch success rate across its manufacturing operations and
              has supported more than 30 preclinical and clinical programs.

              Process development services cover optimization and scale-up, process characterization, and process
              validation for both cell therapy and viral vector programs. Gene editing design and optimization services
              include candidate discovery, candidate engineering, specificity assessment, proof-of-concept studies, and
              clinical lead optimization. Analytical development services are integrated within the manufacturing
              workflow, covering next-generation sequencing (NGS) for off-target assessment, potency testing, identity
              and purity testing, and regulatory CMC support. ElevateBio also holds ICMC™ (commercial readiness
              certification) and has provided manufacturing support to Beam Therapeutics for base editing programs and
              Kyverna Therapeutics for cell therapy programs. Manufacturing turnaround was cited by a cell therapy
              partner as enabling a baseline process in approximately ten months, roughly one year ahead of expected
