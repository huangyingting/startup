      - number: '3.2'
        title: Direct Competitor Profiles
        blocks:
          - type: paragraph
            body: |
              **Lonza Group (Switzerland, public):** The world's original and largest CDMO, founded in Switzerland in
              1897, with approximately 20,000 employees across five continents. Lonza's Cell & Gene Technologies (CGT)
              segment manufactures lentiviral vectors, AAV, and cell therapy components for clinical and commercial
              clients. In FY2025, Lonza's EBITDA growth exceeded revenue growth in its CGT division, and its CHI
              divestment further sharpened strategic focus. Lonza and Genetix Biotherapeutics extended a commercial
              manufacturing agreement for ZYNTEGLO™ (FDA-approved lentiviral gene therapy for transfusion-dependent
              beta-thalassemia), demonstrating Lonza's commercial-scale CGT manufacturing capability. Lonza's primary
              strategic gap relative to ElevateBio is the absence of a proprietary gene editing R&D platform — Lonza
              functions as a pure-play manufacturing CDMO.

              **Oxford Biomedica (OXB) (UK, LSE: OXB, FTSE250):** A CDMO with 30 years of viral vector experience,
              facilities across Oxford, Lyon, Strasbourg, Bedford MA, and Durham NC. OXB specializes in lentiviral
              and AAV vectors. Named "Most Innovative CDMO (Cell & Gene Therapy)" at the 2026 CDMO Leadership Awards
              (March 2026), its second consecutive major CDMO award year. OXB's Chief Business Officer Sebastien
              Ribault cited OXB's focus on "faster, cheaper, more scalable and high-quality manufacturing." In April
              2026, OXB launched an expedited service line compressing GMP timelines by up to nine months for
              timeline-constrained biotech sponsors — a direct challenge to ElevateBio's speed-to-clinic
              differentiation. OXB's TetraVecta™ 4th-generation lentiviral system and dual-plasmid AAV process
              provide proprietary manufacturing process differentiation.

              **WuXi AppTec / WuXi Advanced Therapies (China, public):** A large global CRDMO headquartered in
              Shanghai. WuXi Advanced Therapies is its cell and gene therapy division. WuXi AppTec presented 13
              scientific posters at the April 2026 Annual Meeting (April 30, 2026), demonstrating continued global
              R&D activity. However, BIOSECURE Act provisions (Section 851 of the FY2026 NDAA) restrict US
              federal-funded programs from using WuXi, structurally impairing its US market position. WuXi
              represents displaced US demand that domestic CDMOs including ElevateBio can potentially capture.

              **Catalent (acquired by Novo Nordisk, December 2024):** Catalent's CGT capabilities include
              lentiviral vector, AAV, and cell therapy manufacturing. Novo Nordisk acquired Catalent in December
              2024 and in 2026 cut approximately 400 roles at the Bloomington, Indiana facility, signaling a
              refocus toward Novo's proprietary GLP-1 programs. The Novo Nordisk/Catalent/ElevateBio three-way
              relationship — Novo is both a Series D strategic investor in ElevateBio and Catalent's owner — creates
              a potential conflict of interest warranting diligence attention.

              **FUJIFILM Diosynthesis Biotechnologies (FUJIFILM Biotechnologies):** A global biologics CDMO and
              major AAV manufacturer. Operates a $3.2 billion campus in Holly Springs, North Carolina, and was named
              a 2026 CDMO Leadership Award winner. Its HEK293 cell culture capabilities (including perfusion and
              intensified processes) directly compete with ElevateBio's AAV manufacturing services. FUJIFILM
              launched ShunzymeX in 2026, a process tool to streamline development and accelerate GMP readiness for
              complex biologics. FUJIFILM offers a broader biologics manufacturing scope than ElevateBio, but lacks
              an integrated gene editing R&D platform.

              **Andelyn Biosciences (USA, Nationwide Children's Hospital spinout):** Specializes in AAV gene
              therapies through The Hearth — a 200,000+ sq. ft. dedicated AAV facility with 20 cGMP suites and
              bioreactors from 50L to 5,000L. Andelyn's AAV Curator® platform supports 35+ indications. In 2026,
              Andelyn signed a US-APAC manufacturing corridor partnership with ENCell (South Korea) to accelerate
              gene therapy manufacturing globally. A direct competitor to ElevateBio in early-to-mid clinical stage
              AAV gene therapy manufacturing.

              **AGC Biologics (Japan-owned):** Provides full-service biologics and CGT CDMO services with multiple
              global facilities. In 2026, AGC Biologics joined OTXL's Clinical Development Network as a preferred
              manufacturing partner to advance CGT programs for ultra-rare diseases — creating competitive overlap
              with ElevateBio's client base in early-stage CGT programs, where orphan-drug economics support premium
              manufacturing fees. A GMP-ready new site is expected by 2027.

              **Charles River Laboratories / GI Partners CDMO (USA):** Primarily a contract research organization
              (CRO), Charles River had a CGT CDMO unit that was acquired by private equity firm GI Partners in 2026.
              The parent CRL reported Q1 2026 revenue of $995.8M under new CEO Birgit Girshick's "refreshed
              strategic framework." The GI Partners-owned CDMO entity is now an independent competitor at the early
              clinical stage but lacks an integrated gene editing R&D platform. Forge Biologics (Ajinomoto Bio-Pharma
              Services group) additionally competes directly in AAV manufacturing with 200,000+ sq. ft. dedicated
              capacity and 600+ batches manufactured; it partnered with Epicrispr Biotechnologies for AAV
              manufacturing of an investigational FSHD gene therapy (EPI-321) in 2026.
