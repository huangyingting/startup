              ElevateBio's BaseCamp platform spans AAV, lentiviral vector, gene editing, LNP, and cell therapy
              processing — a breadth that few CDMOs can match within a single integrated organization. This
              multi-modality capability is a meaningful competitive moat for customers seeking a single-partner CDMO
              relationship as programs evolve across modalities.
