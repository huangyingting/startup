  - number: 2
    title: Market Analysis
    sections:
      - number: '2.1'
        title: Market Definition and Segmentation
        blocks:
          - type: paragraph
            body: >
              ElevateBio operates in the contract development and manufacturing organization (CDMO) market for cell and
              gene therapies (CGT), a segment structurally distinct from both traditional small-molecule CMOs and
              conventional biologics CDMOs. The core market boundary encompasses four primary service categories: (1)
              viral vector manufacturing (adeno-associated virus and lentiviral vector production, purification,
              fill-finish, and analytical testing for IND through commercial-scale programs); (2) ex vivo cell therapy
              processing (autologous and allogeneic CAR-T, TCR-T, and NK cell manufacturing); (3) gene editing
              development services (CRISPR, base editing, prime editing tool development and delivery optimization); and
              (4) non-viral delivery manufacturing (LNP-encapsulated mRNA or guide RNA for gene editing, lipid
              nanoparticle process development).


              Excluded from this market boundary are: conventional biologic drug manufacturing (monoclonal antibodies,
              insulin), small-molecule chemical synthesis, commercial pharmaceutical distribution, medical device
              fabrication, and clinical trial management services. The key status-quo substitutes for CDMO engagement
              are internal manufacturing programs operated by large pharma companies (Novartis's Stein facility produces
              Kymriah; Gilead's Kite facilities produce Yescarta), academic medical center manufacturing suites, and
              early-phase captive production at biotech companies. These substitutes are constrained by fixed-cost
              investment, regulatory certification burden, and breadth-of-modality limitations that favor external CDMO
              relationships for programs requiring multiple delivery platforms.


              ElevateBio differentiates its market position through BaseCamp, an integrated platform combining
              manufacturing, gene editing tool development (via LifeEdit), and analytical services under one
              organizational umbrella. The company's disclosed manufacturing capabilities span AAV, lentiviral vector,
              gene editing tools, LNP delivery, retrotransposon-based systems, and cell therapy processing — covering
              more modalities than most single-platform CDMOs. Adjacent market opportunities include gene editing tool
              licensing (royalty-based), analytical services as a standalone revenue stream, and process development
              consulting for academic spinouts.
