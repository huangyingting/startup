      - number: '2.4'
        title: Growth Drivers and Adverse Factors
        blocks:
          - type: paragraph
            body: >
              The CGT CDMO market has several powerful structural tailwinds, partially offset by near-term headwinds and
              structural adverse factors.


              **Key Growth Drivers:** FDA approval momentum creates a virtuous cycle — each new approved CGT therapy
              triggers scale-up manufacturing demand, validates the modality, and encourages new clinical investment.
              The BIOSECURE Act creates a structural demand shift by effectively removing WuXi Advanced Therapies from
              US federal program supply chains. AI-enabled vector engineering (illustrated by Dyno Therapeutics' Psi-Phi
              platform) shortens AAV optimization cycles, increasing the volume and complexity of process development
              CDMO engagements. The mRNA platform's COVID-era LNP scale-up transferred manufacturing expertise into gene
              editing delivery, opening new CDMO service lines. Casgevy's commercial launch (first approved CRISPR
              therapy for SCD and TDT) validates in vivo gene editing workflows and is expected to drive increased
              lentiviral and AAV manufacturing demand. CGTXchange, an AI-enhanced marketplace launched jointly by ASGCT
              and OTxL in May 2026, signals that the CGT ecosystem is maturing toward standardized manufacturing
              procurement channels.


              **Key Adverse Factors:** The biotech financing environment deteriorated sharply in 2025–2026; first-time
              biotech financings fell to the weakest level since before the pandemic, directly constraining the number
              of new CGT programs advanced to IND and CDMO-ready stage. Manufacturing complexity remains a structural
              headwind — the industry batch success rate for viral vector manufacturing is estimated at 50–70%, well
              below ElevateBio's disclosed 98%, but ElevateBio's metric is self-reported and unaudited. Commercial
              pricing for approved CGT therapies ($400K+ for CAR-T, $3.1M for Skysona, $3.5M for Hemgenix) creates
              severe payer resistance, slowing commercial manufacturing scale-up. Bluebird bio's FDA label restriction
              on Skysona (hematologic malignancy risk) and the company's retreat from public markets exemplifies
              pipeline attrition risk. The autologous manufacturing model for CAR-T therapies has not achieved economies
              of scale, with per-patient manufacturing costs remaining high. ElevateBio itself laid off 13% of staff in
              2024, signaling that even well-capitalized CDMOs face near-term revenue pressure in the challenging
              environment.
