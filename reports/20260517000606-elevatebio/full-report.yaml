      - number: '7.3'
        title: Competitive and Market Risks
        blocks:
          - type: paragraph
            body: >
              ElevateBio operates in a CGT CDMO market experiencing significant structural disruption in 2026. The
              BIOSECURE Act — designed to reduce US dependence on Chinese contract research, development, and
              manufacturing organizations including WuXi AppTec — is catalyzing a sourcing shift that creates both
              opportunity and risk for ElevateBio. Displaced WuXi clients seeking alternative US CDMOs represent a
              near-term revenue opportunity, but the pricing dynamics are adverse: clients who previously negotiated
              favorable rates with WuXi will seek comparable economics from US alternatives, compressing margins at
              ElevateBio and peers. WuXi AppTec continues to operate in 2026 — it presented new oncology drug discovery
              advances at AACR 2026 on April 30 — indicating the manufacturing transition is incomplete and cannot be
              fully captured in the near term.

              The gene therapy market itself presents structural demand-side risks. Sarepta's Elevidys gene therapy for
              Duchenne muscular dystrophy has faced slowing sales and investor skepticism in 2025-2026, exemplifying
              that approved gene therapies can fail commercially due to payer resistance, pricing access barriers, and
              real-world efficacy debates. When high-profile approved gene therapy products underperform commercially,
              clinical-stage biotech CDMO clients — who depend on investor capital to fund manufacturing programs — may
              delay or cancel contracted production runs. Gene therapy market access challenges include high per-therapy
              price tags that create systemic payer barriers, as discussed at Asembia's AXS26 Summit in 2026. Lonza, the
              global CDMO leader with approximately CHF 6.5 billion (~USD 8.5 billion) in FY2025 revenue, represents a
              scale advantage that ElevateBio cannot realistically approach for years. Lonza's integrated biologics CDMO
              capabilities and established client relationships create a competitive gap that ElevateBio's technology
              differentiation must bridge. The broader biologics CDMO market is growing per a 2026 ResearchAndMarkets
              report, but the growth benefits disproportionately accrue to established scaled players. Additionally,
              China's edge in early-stage CDMO services is "likely to persist" per Pitchbook analysis cited by
              FiercePharma in January 2026, creating ongoing competitive pricing pressure even as BIOSECURE shifts some
              programs.
