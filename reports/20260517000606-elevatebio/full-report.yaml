  - number: 8
    title: Valuation
    sections:
      - number: '8.1'
        title: Valuation Framework and Comparable Companies
        blocks:
          - type: paragraph
            body: >-
              ElevateBio presents a challenging valuation exercise: the company has raised approximately $1.25 billion
              across four equity rounds but discloses no revenue, backlog, or client data. The only confirmed equity
              valuation is the $2.25 billion post-money established in the March 2022 Series C, led by Bain Capital Life
              Sciences with SoftBank Vision Fund 2 and Fidelity. The October 2024 Series D ($401 million, Novo
              Nordisk-anchored) is notable for the absence of any disclosed valuation, a pattern consistently observed
              in companies avoiding public acknowledgment of down-rounds in the 2022–2024 biotech correction period when
              private sector valuations fell 30–60% from peak.

              The CDMO sector provides several reference points. Lonza Group AG (SIX: LONN), the world's largest
              contract development and manufacturing organization, reported FY2025 revenue of CHF 6.5 billion (~$8.5
              billion USD) with 21.7% constant-exchange-rate sales growth and trades at approximately 5–8x trailing
              revenue on public markets. Oxford Biomedica (OXB, LSE), the most directly comparable specialist cell and
              gene therapy CDMO, carries an approximate market capitalization of £0.5–0.8 billion as of mid-2026 with
              2025 revenue at the upper end of guidance but warning of a loss-making first half of 2026. The Catalent
              acquisition by Novo Nordisk for approximately $16.5 billion validates pharma appetite for CDMO scale,
              though Catalent's revenue (~$4B+) far exceeds ElevateBio's estimated scale.

              A revenue-multiple framework reveals the valuation implied by ElevateBio's Series C: applying a 5–8x
              revenue multiple to the $2.25 billion valuation implies annual revenue of $280–450 million—a level no
              comparable private CGT CDMO has publicly confirmed approaching. Private CGT CDMO peers (Forge Biologics,
              acquired by Ajinomoto; Andelyn Biosciences, spun from Nationwide Children's Hospital; National Resilience,
              $825M+ raised) provide private-market context, though none have disclosed valuations that fully bracket
              ElevateBio's $2.25 billion Series C high-water mark. The base case view is that ElevateBio's current
              implied enterprise value sits in the $1.5–2.0 billion range, representing a meaningful markdown from the
              2022 peak consistent with sector-wide corrections and the structural signals embedded in the Series D's
              undisclosed valuation.
