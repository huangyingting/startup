      - number: '6.3'
        title: Customer Concentration Risk and Adverse Signals
        blocks:
          - type: paragraph
            body: >
              ElevateBio's customer base carries meaningful concentration risk, compounded by limited public disclosure
              and the inherent fragility of clinical-stage biopharma sponsors. Three principal adverse signals are
              documented or inferable from public evidence as of May 2026.

              First, the AlloVir dissolution in 2024 demonstrates that ElevateBio's clinical-stage customers can fail
              with little warning, extinguishing manufacturing revenue streams before programs reach commercial scale.
              AlloVir (NASDAQ: ALVR) disclosed SEC filings consistent with operational wind-down in late 2024 and early
              2025 after its virology T-cell therapy programs experienced repeated clinical setbacks. ElevateBio's
              partnership with AlloVir is documented in prior public filings and press materials referencing BaseCamp's
              early portfolio-company model. This customer loss is not publicly quantified in terms of revenue impact to
              ElevateBio, but it illustrates a systemic risk: early-stage CDMOs derive revenue from programs that may
              fail before reaching commercial manufacturing.

              Second, Novo Nordisk's position as both a strategic investor (via Novo Holdings in the Series D) and the
              company's most prominent disclosed manufacturing partner creates a single-customer dependency risk that is
              difficult to assess without knowing the revenue concentration. If the Novo Nordisk relationship represents
              a disproportionate share of ElevateBio's contracted manufacturing pipeline, any strategic shift by Novo
              (e.g., integration of the Catalent manufacturing assets Novo Nordisk acquired in 2024) could reduce demand
              for ElevateBio's services.

              Third, the sequential post-Series-D workforce reductions (approximately 13% in 2024 and approximately 17%
              in 2025–2026) are consistent with a customer ramp that has not kept pace with the company's cost
              structure. While ElevateBio attributed the 2024 reduction to a strategic pivot away from preclinical
              programs, the compounding of two reductions in close succession suggests ongoing pressure to right-size
              operational expenses relative to realized revenue.
