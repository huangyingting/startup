      - number: '2.3'
        title: Competitive Dynamics and Buyer Segmentation
        blocks:
          - type: paragraph
            body: >
              The CGT CDMO market is oligopolistic at the large-scale, multi-modality tier, with Lonza widely regarded
              as the global capacity leader. OXB (Oxford Biomedica) was recognized as "Most Innovative CDMO (Cell & Gene
              Therapy)" at the March 2026 CDMO Leadership Awards. Other significant competitors include Andelyn
              Biosciences, National Resilience (Resilience), Samsung Biologics, and WuXi Advanced Therapies. The
              enactment of the BIOSECURE Act (Section 851 of the FY2026 NDAA) has materially impaired WuXi Advanced
              Therapies' ability to serve US federal-funded programs, creating a demand reallocation opportunity for
              US-based CDMOs including ElevateBio.


              Lonza reported strong Q1 2026 performance and FY2025 results with EBITDA growth ahead of revenue growth in
              its Cell & Gene Technologies division — confirming continuing market growth among established players
              despite the broader biotech financing headwinds. Andelyn Biosciences announced a US-APAC manufacturing
              corridor partnership with ENCell in 2026, illustrating how CGT CDMOs are expanding global geographic
              reach. Dyno Therapeutics launched two new AAV capsids and its Psi-Phi AI-driven capsid platform at ASGCT
              2026 in May, signaling accelerating competition in the AI-enabled AAV engineering space — relevant to
              ElevateBio's process development service segment.


              Buyer segmentation in the CGT CDMO market clusters into three tiers. Tier 1 (primary): emerging biotech
              companies with no internal manufacturing capability, representing the bulk of ElevateBio's addressable
              customer base. These companies are advancing programs to IND or Phase I and outsource all CMC activities.
              Tier 2 (active): mid-size pharma companies seeking to outsource non-core or capacity-constrained
              manufacturing. Tier 3 (potential): large pharma companies using CDMOs for overflow or novel modality
              programs. ElevateBio's $401M Series D (September 2024) with Novo Nordisk as strategic investor signals
              potential for Tier 2 and Tier 3 customer traction. Beam Therapeutics' risto-cel program — a base
              editing–derived cell therapy in Phase I/II for sickle cell disease with RMAT designation — exemplifies the
              high-value clinical-stage customers that drive CDMO manufacturing demand.
