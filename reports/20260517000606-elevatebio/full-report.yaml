      - number: '4.3'
        title: Unit Economics and CDMO Industry Benchmarks
        blocks:
          - type: paragraph
            body: >-
              Because ElevateBio discloses no financial results, unit economics must be assessed by reference to
              comparable public CGT CDMOs and industry benchmark data. The most directly comparable public company is
              Oxford Biomedica (OXB, LSE), a UK-listed gene and cell therapy CDMO that reported revenue growth of
              approximately 30% in 2025 with its contracted backlog continuing to grow. OXB's first-half 2026 guidance
              noted continued investments ahead of second-half revenue recognition, consistent with capital-intensive
              long-cycle CDMO contracting. Lonza, the global CDMO leader, reported FY2025 revenue of CHF 6.5 billion
              (~USD 8.5 billion) with EBITDA growth significantly ahead of revenue growth, reflecting operating leverage
              at scale — a performance profile ElevateBio cannot realistically approach for years.

              Gross margins for established CGT CDMOs typically range from 25–45% for manufacturing services, with
              platform licensing components (technology-only, asset-light) carrying substantially higher margins of
              60–80%. For a company at ElevateBio's stage — with facilities under construction or ramp, significant
              fixed costs from its Waltham operations, and the Pitt BioForge anchor-tenant commitment as a large future
              capex event — gross margins are likely below 20% in the near term, with facility utilization below the
              typical breakeven threshold of 70–80% of bioreactor capacity. The capital intensity of cGMP manufacturing
              infrastructure (bioreactor suites, cleanroom build-out, quality systems) implies that a significant
              portion of the ~$1.25 billion raised has been deployed on infrastructure, headcount, and R&D platform
              development rather than retained as financial runway.

              A rough breakeven analysis based on industry norms: a 500-person CDMO with AAV manufacturing capacity
              costs approximately $50–$100 million per year in fixed operating costs (before cost of goods), requiring
              sustained annual revenue of $150–$250 million at typical 35% gross margins to cover operating expenses.
              ElevateBio's current scale (approximately 489 employees per LinkedIn) is consistent with a company at the
              threshold of this breakeven range — but without revenue disclosure, profitability timeline cannot be
              independently verified. The sequential 13% and 17% headcount reductions suggest the company is actively
              managing its cost structure against available capital, reinforcing the inference that commercial revenue
              has not yet reached full cost coverage.
