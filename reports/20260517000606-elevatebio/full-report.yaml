      - number: '8.5'
        title: Diligence Asks and Open Questions
        blocks:
          - type: paragraph
            body: >-
              ElevateBio's fundamental diligence challenge is a pervasive opacity in financial and contractual
              disclosure. Five priority diligence asks are essential before any capital deployment decision.

              The highest-priority ask is audited revenue and EBITDA for fiscal years 2023 through 2025. Without actual
              revenue data, no meaningful valuation multiple analysis is possible, and the bull/base/bear scenario
              ranges remain probability-weighted estimates without grounding in real commercial performance. Any
              investor with negotiating leverage should require formal financial statements or at minimum a data-room
              revenue and cost summary under NDA as a precondition to engagement.

              The second critical ask is the Novo Nordisk partnership financial terms: specifically, the committed
              manufacturing volumes, minimum revenue guarantees, exclusivity provisions, and any option rights Novo
              Holdings may hold on ElevateBio's equity. These terms determine whether the Novo relationship represents a
              genuine commercial anchor (supporting the bull case) or a more limited preferred manufacturing arrangement
              that validates only the base case.

              Third: the Series D post-money valuation and current liquidation preference stack are essential to assess
              the economics of any new investor's entry. Understanding whether Series D investors hold full ratchets,
              weighted-average anti-dilution, or other preference provisions determines the effective floor for
              common-equivalent value in various exit scenarios.

              Fourth: the Pitt BioForge lease terms, fit-out capital expenditure commitment, and facility operational
              timeline represent a simultaneous capacity catalyst and contingent liability. The magnitude of
              ElevateBio's committed future spending at Pitt BioForge is unknown but could represent tens to hundreds of
              millions in incremental obligation.

              Fifth: monthly cash burn rate and estimated cash-on-hand as of Q1 2026. Given the $401 million Series D
              and the subsequent restructuring, understanding the remaining financial runway before any additional raise
              is essential to assessing near-term survival risk and leverage in any negotiation.
