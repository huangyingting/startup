      - number: '6.4'
        title: Adoption Trajectory and Retention
        blocks:
          - type: paragraph
            body: >
              ElevateBio's customer adoption model follows a step-wise progression aligned with the drug development
              lifecycle: discovery and feasibility, process development, clinical GMP manufacturing, and commercial
              manufacturing. The company's stated strategy is to capture partners at the earliest feasible stage and
              retain them across the full development trajectory, avoiding the process-transfer disruption that occurs
              when sponsors switch CDMOs between clinical and commercial phases.

              As of May 2026, ElevateBio reports supporting 30+ preclinical and clinical programs, a figure that
              encompasses both BaseCamp manufacturing engagements and LifeEdit gene-editing-tool partnership work. This
              30+ figure has been cited consistently since at least 2024 and suggests a moderately growing partner
              count, though the specific number, renewal rate, and program-stage distribution are not publicly itemized.

              The Kyverna Therapeutics case study is the most granular publicly available retention data point:
              engagement began at process development, scaled to a cGMP manufacturing process within ten months, and the
              program has continued into clinical trials as of 2026. ElevateBio's batch success rate of 98% (2025) is
              the primary quality metric cited as a retention driver, reflecting the consistency of manufacturing
              outputs that clinical-stage sponsors require to maintain regulatory schedules.

              Customer adoption is supported by ElevateBio's integrated platform architecture: once a partner transfers
              its program process to BaseCamp, switching to an alternative CDMO requires significant regulatory and
              process re-validation effort, creating natural switching costs. ElevateBio's two cGMP facilities (Waltham,
              MA and Pittsburgh, PA) offer a geographic redundancy model, and the ICMC™ commercial readiness
              certification provides an additional quality signal that mature programs rely on when transitioning to
              commercial manufacturing. The AWS collaboration announced in March 2025 for AI-driven gene-editing
              discovery extends ElevateBio's retention touchpoint earlier in the drug development cycle, potentially
              capturing sponsors before they engage with any manufacturing partner.
