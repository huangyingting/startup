        title: Named Customer Evidence
        blocks:
          - type: paragraph
            body: >
              ElevateBio's disclosed customer evidence is limited but meaningful given the company's private status and
              contractual confidentiality norms in the CDMO sector. Three partners are named via direct testimonials on
              the company's website or press releases, and one additional strategic investor-partner (Novo Nordisk) is
              disclosed via the Series D financing announcement.

              Beam Therapeutics provided a testimonial on ElevateBio's manufacturing-and-discovery-services homepage
              stating that "ElevateBio didn't just manufacture our therapy — they helped us establish a blueprint for
              base editing manufacturing." This confirms Beam as an active manufacturing partner for its base editing
              therapeutic programs, though program identities, contract values, and volumes are not disclosed.

              Kyverna Therapeutics, an autologous CAR-T company, is named with a testimonial confirming an engagement
              that achieved a baseline GMP manufacturing process approximately ten months from the start of the
              collaboration, roughly one year ahead of internal projections. Kyverna's programs are in clinical
              development as of 2026, giving its ElevateBio manufacturing relationship additional strategic weight.

              Novo Nordisk anchored the $401 million Series D financing in October 2024 with a simultaneous strategic
              manufacturing partnership. Novo Nordisk has expanded its CGT pipeline, and the partnership with ElevateBio
              reflects a deliberate strategy to secure access to specialized manufacturing capacity without building it
              internally. The terms, including committed manufacturing volumes, financial milestones, and exclusivity
              provisions, are not publicly disclosed.

              AlloVir, an early ElevateBio portfolio company developing off-the-shelf allogeneic T-cell therapies for
              viral infections, was a customer of ElevateBio's BaseCamp manufacturing platform. AlloVir subsequently
              dissolved its operations in 2024 following multiple clinical-stage setbacks, representing both a
              customer-loss event and a proof-of-concept adverse signal for ElevateBio's clinical-stage customer
              concentration risk. SEC EDGAR confirms AlloVir (CIK 0001754068) filed deregistration-related documents
              through late 2024 and early 2025, consistent with dissolution proceedings.
