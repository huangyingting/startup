      - number: '7.5'
        title: Exhibits
        blocks:
          - type: callout
            title: 'CEO Transition as Compounding Risk: Founder Exit Plus Layoffs in the Same Window'
            body: >-
              The simultaneous occurrence of a founder-CEO exit (January 5, 2026) and two sequential layoffs totaling
              approximately 30% of peak headcount creates a compounding risk window unlike any prior ElevateBio
              challenge. In CDMO relationships, trust is personal and relationship-specific: clients often select CDMOs
              based on direct relationships with senior leadership who understand program nuance and can resolve quality
              issues at the decision-making level. Bhargava's departure removes the founder's personal credibility from
              all existing client relationships simultaneously. Murphy's ability to retain and expand the CDMO client
              base while stabilizing internal operations following headcount reductions will be the primary near-term
              performance indicator. Monitor: any publicly announced client departures or program deferrals in Q2-Q3
              2026.
            calloutType: insight
            claimRefs:
              - CR001
              - CR002
              - CR003
              - CR004
          - type: callout
            title: Novo Nordisk Conflict of Interest Is Structurally Unmanaged in Public Disclosure
            body: >-
              Novo Nordisk and Novo Holdings occupy a uniquely complex position in ElevateBio's ecosystem: as the Series
              D lead investor, Novo Holdings holds equity and governance influence; as a strategic manufacturing
              partner, Novo Nordisk is simultaneously ElevateBio's largest disclosed customer; and through Novo
              Holdings' acquisition of Catalent, Novo is an indirect owner of ElevateBio's direct CDMO competitor. No
              public disclosure describes how this tri-role conflict is governed at the ElevateBio board level — whether
              Novo board representatives recuse from decisions involving manufacturing pricing, capacity allocation to
              Novo programs, or competitive strategy related to Catalent. This information asymmetry and governance
              opacity should be treated as a material diligence gap by any prospective co-investor. Diligence ask:
              request board composition, investor rights agreement terms, and conflict-of-interest governance policies
              from ElevateBio management.
            calloutType: insight
            claimRefs:
              - CR023
              - CR024
          - type: callout
            title: CRISPR Patent Reinforcement Creates LifeEdit FTO Uncertainty at Commercial Scale
            body: >-
              The March 26, 2026 PTAB second ruling against the Doudna/Charpentier CVC team definitively reinforces
              Broad Institute IP control over eukaryotic CRISPR applications for the foreseeable future. For
              ElevateBio's LifeEdit platform — which offers CRISPR nuclease editing, base editing, prime editing, and
              retrotransposon-based gene insertion across therapeutic programs — this creates a structurally complex IP
              dependency landscape. The combination of Broad CRISPR nuclease rights, Beam Therapeutics base editing
              patents, and Prime Medicine prime editing patents means that any LifeEdit commercial program touching
              these modalities requires validated freedom-to-operate from at least three distinct IP holders. As
              LifeEdit's commercial programs scale and licensing revenue becomes more material to ElevateBio's financial
              model, the FTO risk and associated licensing costs become increasingly material. This risk is not
              thesis-breaking at current scale, but requires proactive IP management.
            calloutType: insight
            claimRefs:
              - CR012
              - CR013
              - CR014
              - CR015
          - type: callout
            title: Diligence Asks and Kill Criteria Summary
            body: >-
              Priority diligence asks: (1) Request ElevateBio's client list (anonymized program-level) and revenue by
              modality to assess customer concentration and burn-to-revenue ratio; (2) Request board composition,
              investor rights agreement, and Novo Nordisk conflict-of-interest governance policy; (3) Verify current FDA
              compliance status for BaseCamp Waltham: request most recent FDA inspection report and any outstanding 483
              observations; (4) Request Pitt BioForge construction timeline and GMP commissioning milestone plan; (5)
              Assess LifeEdit IP licensing agreements with Broad Institute, Beam Therapeutics, and Prime Medicine. Kill
              criteria: (a) FDA Warning Letter against BaseCamp Waltham with systemic GMP findings; (b) Novo Nordisk
              publicly pivots manufacturing to Catalent; (c) CEO Murphy departs within 24 months of appointment; (d)
              PTAB or federal court issues injunction restricting LifeEdit's use of CRISPR-based editing tools; (e)
              Series E round priced below Series D; (f) Pitt BioForge construction delay exceeds 18 months from original
              schedule.
            calloutType: insight
