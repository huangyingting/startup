  - number: 3
    title: Competitors
    sections:
      - number: '3.1'
        title: Competitive Overview
        blocks:
          - type: paragraph
            body: |
              The global contract development and manufacturing organization (CDMO) market for cell and gene therapies
              (CGT) in 2026 is concentrated at the top tier around a small number of large-scale, multi-modality
              providers, with a fragmented mid-tier of specialized or regional players below them. Lonza Group
              (Switzerland) is universally regarded as the largest CGT CDMO globally, supported by approximately
              20,000 employees across five continents. Its Cell & Gene Technologies segment in FY2025 delivered EBITDA
              growth significantly ahead of revenue growth, reflecting operating leverage and margin recovery. The CHI
              divestment in 2026 further sharpened Lonza's focus on its core pharmaceutical and CGT CDMO services.

              OXB (Oxford Biomedica, LSE: OXB, FTSE250) was recognized as "Most Innovative CDMO (Cell & Gene Therapy)"
              at the March 2026 CDMO Leadership Awards in New York City — an industry validation of OXB's 30-year
              lentiviral and AAV vector heritage. In April 2026, OXB launched an expedited service line capable of
              accelerating GMP manufacturing timelines by up to nine months — directly targeting ElevateBio's
              time-to-clinic value proposition. FUJIFILM Diosynthesis Biotechnologies (FUJIFILM Biotechnologies)
              operates a $3.2 billion bio-pharmaceutical manufacturing facility in Holly Springs, North Carolina,
              and was named a 2026 CDMO Leadership Award winner for biologics manufacturing excellence.

              Andelyn Biosciences (Nationwide Children's Hospital spinout) operates The Hearth — a 200,000+ sq. ft.
              dedicated AAV facility with 20 cGMP suites and bioreactors ranging from 50L to 5,000L, supporting
              35+ indications. In 2026, Andelyn announced a strategic manufacturing bridge partnership with South
              Korea-based ENCell, creating a US-APAC manufacturing corridor. Forge Biologics (Ajinomoto Bio-Pharma
              Services group) operates a similarly large dedicated AAV facility with 600+ batches manufactured, and
              in 2026 partnered with Epicrispr Biotechnologies for cGMP manufacture of an FSHD gene therapy. AGC
              Biologics joined the Orphan Therapeutics Accelerator's (OTXL) Clinical Development Network as a
              preferred manufacturing partner for ultra-rare disease CGT programs.

              Structurally, the BIOSECURE Act (Section 851 of the FY2026 NDAA) restricts US federal-funded programs
              from using WuXi Advanced Therapies, creating demand reallocation opportunity for domestic CDMOs. Catalent,
              acquired by Novo Nordisk in December 2024, had approximately 400 roles cut at its Bloomington, Indiana
              facility in 2026. Charles River Laboratories' CDMO unit was separately acquired by GI Partners private
              equity in 2026. Samsung Biologics reported record Q1 2026 revenue of KRW 1,257 billion (operating profit
              KRW 581 billion), though Samsung primarily serves biologics rather than CGT.
