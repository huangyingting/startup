    title: ElevateBio Investment Decision Logic — Recommendation Flow
    type: flow
    layout: standard
    summary: >-
      Flow diagram tracing the investment decision chain from ElevateBio's company context and market environment
      through bull and bear drivers to the TRACK recommendation, and then to the specific conditions that would upgrade
      the verdict to BUY or downgrade to PASS. Captures the asymmetric optionality of the current TRACK position.
    data:
