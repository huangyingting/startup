      - number: '4.2'
        title: Revenue Model and Pricing
        blocks:
          - type: paragraph
            body: >-
              ElevateBio's revenue model is built on three interlocking streams, none of which has been publicly
              disclosed in dollar terms as of May 2026. The primary stream is fee-for-service cGMP manufacturing through
              BaseCamp, which provides contract development and manufacturing services across all major cell and gene
              therapy modalities: AAV viral vectors, lentiviral vectors (LV), lipid nanoparticles (LNP), mRNA, and
              iPSC-derived cell therapies. Pricing for these services follows industry-standard CDMO rates — AAV batches
              are typically priced at $500,000 to $3,000,000 per manufacturing run depending on scale (production
              bioreactor volume from 200L to 2,000L), process complexity, and downstream fill-finish requirements.
              Lentiviral vector batches at clinical scale are generally priced in the $300,000 to $1,200,000 range. LNP
              and mRNA manufacturing runs are typically lower per-batch but may carry higher per-gram fees. These are
              industry benchmarks; ElevateBio has not published its fee schedule.

              The second stream is technology licensing of LifeEdit's proprietary gene editing tools, including
              CRISPR-based nuclease editing systems, base editors, prime editors, and retrotransposon-based genome
              integration platforms. Such licensing arrangements in the gene editing sector typically involve upfront
              access fees, annual maintenance payments, and field-of-use restrictions. Comparable licensing deals in
              gene editing (e.g., Editas Medicine, Beam Therapeutics platform licenses) suggest potential upfront fees
              in the range of $5–$25 million for platform access plus milestone payments tied to clinical and commercial
              events.

              The third stream is milestone and royalty payments from collaborative programs. ElevateBio's Novo Nordisk
              partnership includes a strategic manufacturing element where Novo funds development and ElevateBio earns
              manufacturing revenue plus potential development milestones. Similar arrangements in the CDMO sector can
              generate $10–$50 million in committed development milestones over multi-year programs. The partner-facing
              positioning on the ElevateBio website emphasizes full-program support from discovery through
              commercialization, suggesting a preferred partnership model rather than spot-transaction CDMO contracting,
              which typically commands a revenue premium. No backlog, contract value, or revenue-per-modality data is
              publicly available.
