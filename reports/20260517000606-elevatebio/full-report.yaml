  - number: 7
    title: Risks
    sections:
      - number: '7.1'
        title: Leadership and People Risks
        blocks:
          - type: paragraph
            body: >
              ElevateBio executed the most visible leadership change in its history when it appointed Christopher Murphy
              as Chief Executive Officer on January 5, 2026, replacing Raj Bhargava, the company's founder and inaugural
              CEO. The transition from a founder-CEO to a professional executive introduces transition risk in any CDMO:
              key client relationships, partner trust structures, and internal culture are often built around the
              founder's personal credibility and domain expertise. Bhargava led ElevateBio from its stealth founding
              through four funding rounds totaling approximately $1.25 billion and established the BaseCamp-LifeEdit
              integrated CDMO model. Murphy's mandate and the specific strategic priorities he brings have not been
              fully articulated in public communications, creating uncertainty about whether the transition is a
              scaling-stage CEO upgrade or a reactive governance move addressing investor concerns about execution
              velocity under capital constraint.

              Compounding leadership risk, ElevateBio executed two sequential staff reductions post-Series D 2024: a 13%
              layoff followed by a second reduction of approximately 17%. Combined, these reductions eliminated
              approximately 30% of peak headcount, leaving approximately 489 employees as of May 2026 per LinkedIn. Such
              rapid workforce reduction carries dual operational risk: the immediate loss of manufacturing and quality
              capacity in BaseCamp GMP operations, and the longer-term talent pipeline risk as experienced scientists
              and engineers — particularly those with specialized expertise in retrotransposon biology, base editing,
              prime editing, and AI-integrated protein discovery — may seek positions at well-funded competitors. Chief
              Technology Officer Mike Paglia leads BaseCamp's technical operations, but no public succession plan or
              board governance details have been disclosed. Key-person risk is structurally concentrated at both the
              manufacturing leadership and LifeEdit scientific platform levels, with no mitigating transparency about
              equity retention structures or management continuity commitments.
