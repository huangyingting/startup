  - number: 6
    title: Customers
    sections:
      - number: '6.1'
        title: Customer Segments and Targeting
        blocks:
          - type: paragraph
            body: >
              ElevateBio targets biopharmaceutical sponsors at the intersection of advanced therapeutic modality and
              manufacturing complexity. Its core value proposition—an integrated platform spanning proprietary gene
              editing, process development, and cGMP manufacturing—is most compelling to organizations that lack
              internal manufacturing infrastructure or seek to compress their development timelines. Five principal
              customer segments emerge from ElevateBio's published service offering and partner testimonials.

              The first and most prominent segment is rare-disease gene therapy companies pursuing AAV or lentiviral
              vector-based programs for conditions with limited treatment alternatives. These sponsors are typically
              pre-commercial, operating at clinical stage, and reliant on a CDMO for both process development and GMP
              supply. ElevateBio's BaseCamp facilities in Waltham, MA, and Pittsburgh, PA (Pitt BioForge) are positioned
              to serve both early-phase and commercial-scale programs without handoff to a different vendor.

              The second segment is oncology cell therapy companies developing autologous or allogeneic CAR-T or TCR
              programs. Kyverna Therapeutics—a named ElevateBio customer with a disclosed testimonial on the
              manufacturing services homepage—exemplifies this segment, engaging ElevateBio for both process development
              and GMP manufacturing of its autologous CAR-T therapy and reaching a baseline manufacturing process
              approximately ten months from engagement start, reportedly about one year faster than internal estimates.

              The third segment is in vivo gene therapy companies, including programs using AAV or LNP-delivered gene
              editing constructs. ElevateBio's five editing modalities and LNP delivery platform make it capable of
              supporting discovery through CMC for these programs. The fourth segment is mRNA vaccine and therapeutic
              manufacturers seeking cGMP drug substance and drug product supply. The fifth and increasingly important
              segment is large-pharma companies seeking to outsource CGT manufacturing capacity at scale—exemplified by
              the Novo Nordisk strategic partnership announced alongside the $401 million Series D financing in October
              2024. Each segment differs in buyer profile, contract duration, and revenue model, but all benefit from
              ElevateBio's single-vendor, full-lifecycle approach.
