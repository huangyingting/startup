company:
  name: ConcertAI

chapter:
  number: 1
  title: Company Overview
  summary: >-
    ConcertAI (legal name: Concerto Healthcare Inc.) is a private, Cambridge/Boston-based
    healthcare AI company founded in 2017 by Jeff Elton, PhD, and backed by SAI Group
    (SymphonyAI), Sixth Street, Declaration Partners, Maverick Ventures, and AllianceBernstein
    PCI. Operating at the intersection of real-world evidence (RWE), generative AI, and oncology
    data, the company serves a claimed 75% of top life science companies and 50% of the largest
    global healthcare providers through five product divisions. A reported $150M Goldman Sachs
    investment at a $1.9B valuation (June 2024) could not be confirmed from accessible sources;
    all primary announcement URLs are inaccessible. A CEO leadership transition was announced in
    May 2025 but the successor has not been identified from open sources.

sections:
  - id: identity-mission
    title: Company Identity, Mission, and Legal Background
    body: >-
      ConcertAI is a private healthcare technology company operating under the legal name
      Concerto Healthcare Inc. Its stated mission is to be "Leaders in Generative & Agentic AI
      Solutions Tailored for Life Sciences & Healthcare." The company is headquartered in the
      Cambridge/Boston, Massachusetts metropolitan area and is part of the SAI Group
      (formerly SymphonyAI Group) ecosystem, an AI-focused conglomerate led by Dr. Romesh
      Wadhwani. ConcertAI was founded by Jeff Elton, PhD, who served as CEO until a leadership
      transition in May 2025; Elton now holds the title of Vice Chairman. The company was
      historically known as Concerto Health AI, a name reflected in its legacy email domain
      (info@concertohealthai.com), before rebranding to ConcertAI to emphasize its AI-first
      positioning. Crunchbase reports an incorporation date of 2018, while the company's own
      investor page references 2017 as its founding year—an unresolved discrepancy. The company
      is classified as a private, growth-stage entity with its last publicly acknowledged
      funding type being Series C; Crunchbase tags it as a "Unicorn" implying a valuation
      above $1B.
    claimRefs: [CO001, CO002, CO003, CO004, CO005, CO006, CO007, CO031]
    tableRefs: [TO001]

  - id: product-portfolio
    title: Product Portfolio and Technology Platform
    body: >-
      ConcertAI organizes its products into five divisions that collectively span the
      pharmaceutical, biotech, and health system value chains. The Regulatory & Research
      division offers External Control Arms (providing regulatory-grade real-world data
      for clinical trials), Comparative Cohort, Feasibility Assessment, Precision Explorer,
      Patient360, Translational360, and Precision360. The Precision Suite (launched May 2025)
      targets commercial drug developers with PrecisionExplorer (GenAI for RWE insights),
      PrecisionTrials (AI-powered trial design), and PrecisionGTM (oncology commercial
      intelligence). The Clinical Development division, anchored by Accelerated Clinical
      Trials (launched February 2026) and Patient Matching & Automation, provides
      site-workflow solutions. CancerLinQ—acquired from ASCO (American Society of Clinical
      Oncology)—aggregates data from 9+ million patients across participating cancer care
      providers' EHR systems, offering SmartLinQ (quality measures), TriaLinQ (trial
      matching), RxLinQ (therapy selection), and PatientLinQ (care cohort tools).
      TeraRecon (an acquired company now operating under a separate terarecon.com domain)
      provides medical imaging AI including AV (Advanced Visualization), Intuition
      (high-performance visualization), DETECT (AI biomarker detection), and Neuro
      (neurovascular emergency AI), with over 2,000 global customers as of September 2025.
      ConcertAI also operates CARAai, a multi-LLM AI platform. The Cadence Suite for
      commercial oncology patient-support teams launched in April 2026.
    claimRefs: [CO008, CO009, CO010, CO011, CO012, CO013, CO014, CO015, CO053, CO054]
    tableRefs: [TO005]

  - id: funding-investors
    title: Funding, Investors, and Valuation
    body: >-
      ConcertAI's investor roster—as disclosed on its official investors page—includes
      SAI Group (the founding backer and strategic parent), Sixth Street ($60B+ AUM global
      investment firm), Declaration Partners (family office of Carlyle Group co-founder
      David M. Rubenstein), Maverick Ventures (VC arm of Maverick Capital), and
      AllianceBernstein PCI (growth-stage credit via AB's Private Credit & Income platform).
      Multiple press reports published in June 2024 indicated that Goldman Sachs Asset
      Management led a $150M strategic investment at approximately a $1.9B valuation;
      however, every primary source URL found during research (PR Newswire, Reuters, STAT
      News, Axios Pro, Becker's, HealthcareITNews, Fierce Healthcare, and Business Wire)
      was either inaccessible (404 or paywalled) as of the report date. The Goldman Sachs
      Asset Management website shows a paywalled profile page for ConcertAI, and the
      company's investors page (both current and a June 2024 archived snapshot) does not
      list Goldman Sachs—consistent with Goldman Sachs taking a non-board or non-voting
      position. The total capital raised since founding is not publicly disclosed. Crunchbase
      (January 2025) notes five investors and two acquisitions; the Unicorn tag implies a
      valuation above $1B.
    claimRefs: [CO021, CO022, CO023, CO024, CO025, CO026, CO027, CO028, CO029, CO030, CO056]
    tableRefs: [TO003]

  - id: scale-partnerships
    title: Scale, Traction, and Strategic Partnerships
    body: >-
      ConcertAI claims to serve 75% of the top life science companies and 50% of the
      largest global healthcare providers, though these figures are company-asserted and
      not independently verified. TeraRecon has more than 2,000 global customers as of
      September 2025. Crunchbase's January 2025 snapshot estimated revenue of $160M with
      35% year-over-year growth, and headcount in the 1,001–5,000 range. The company has
      executed a series of high-profile strategic agreements: an NVIDIA alliance for
      oncology trial AI agents (March 2025), a strategic clinical development agreement
      with Bayer (April 2025), a Foundation Medicine data integration (January 2026), a
      NeoGenomics AI SaaS partnership for hematology (December 2024), a Guardant Health
      liquid biopsy ctDNA collaboration (January 2025), and a Dewpoint Therapeutics
      translational oncology partnership (December 2024). Earlier industry references also
      cite AbbVie and Caris Life Sciences as collaborators in precision oncology drug
      development. J.P. Morgan Healthcare Conference participation in January 2025 was
      used to report 2024 results and set 2025 priorities.
    claimRefs: [CO016, CO017, CO018, CO019, CO020, CO046, CO047, CO048, CO049, CO050, CO051, CO052, CO057]
    tableRefs: [TO004]

  - id: leadership
    title: Leadership and Organization
    body: >-
      ConcertAI experienced a significant leadership transition in May 2025 when founder
      Jeff Elton moved from the CEO role to Vice Chairman—the incoming CEO's identity
      could not be determined from accessible public sources, representing a material
      evidence gap. Elton, who was named EY Entrepreneur of the Year in April 2025,
      retains a prominent public role for the company. The senior leadership team has
      been substantially built out: Michael Myshrall joined as CFO (August 2025),
      Dr. Shaalan Beg was appointed Chief Medical Officer for Oncology (October 2025),
      Missy Jerome became Chief People Officer (March 2026), James Salitan joined as
      General Counsel (October 2024), and Casey Graves was appointed GM of Clinical
      Solutions (September 2025). The concentration of leadership hires in 2025–2026
      suggests a deliberate professionalization of the C-suite consistent with a
      growth-stage company preparing for a potential exit or expanded commercial push.
    claimRefs: [CO031, CO032, CO033, CO034, CO035, CO036, CO037, CO038, CO039]
    tableRefs: [TO002]
    figureRefs: [FO002]

  - id: regulatory-market
    title: Regulatory Context and Market Dynamics
    body: >-
      ConcertAI's core RWE business operates within a regulatory environment shaped by
      the FDA's 21st Century Cures Act (Section 505F), which established the use of
      real-world data (RWD) and real-world evidence (RWE) in drug evaluation. The FDA
      Real-World Evidence Framework (December 2018) sets "fit for purpose" requirements
      that RWD must meet in quality and relevance before supporting regulatory submissions.
      FDA's January 2021 AI/ML-Based Software as a Medical Device (SaMD) Action Plan
      extends this oversight to AI-driven medical products, requiring premarket review,
      Algorithm Change Protocols, and postmarket performance monitoring—raising the
      compliance bar for TeraRecon's imaging AI tools and any AI products seeking FDA
      clearance. The market is competitive: Flatiron Health (a Roche Group affiliate and
      claimed pioneer in oncology RWE since 2012) and Tempus AI (with 6,500+ oncologists,
      40M+ patient records, and 4,500+ healthcare institutions) represent substantial
      incumbents. These competitive dynamics, combined with FDA's stringent oversight of
      AI/ML medical software, create meaningful market headwinds that ConcertAI must
      navigate to sustain its claimed leadership position.
    claimRefs: [CO040, CO041, CO042, CO043, CO044, CO045, CO058]
    figureRefs: [FO001, FO003]

