  evidenceGaps:
    - type: access-blocked
      severity: blocking
      topic: Goldman-Sachs-funding
      missingEvidence: >-
        Primary press release or official company investor announcement confirming the $150M
        Goldman Sachs Asset Management investment, the $1.9B valuation, and the specific
        terms (equity vs. debt, board seat, pro-rata rights).
      whyItMatters: >-
        Without a confirmed primary source, the investment amount, valuation, and Goldman
        Sachs's precise role (equity investor, credit facility, or strategic partnership)
        remain uncertain. This directly affects any analysis of the company's capital
        structure, dilution, and implied valuation.
      diligencePath: >-
        Request the press release or investor announcement directly from ConcertAI's IR
        contact; check EDGAR for any Form D filings; request the term sheet or cap table
        from management; re-attempt to access news archives once embargo or paywall expires.
      relatedQuestionRefs: [QO009, QO010, QO014]
      relatedTableRefs: [TO003]

    - type: missing-source
      severity: material
      topic: leadership
      missingEvidence: >-
        Identity of the CEO who succeeded Jeff Elton following the May 2025 leadership
        transition, including their background, equity stake, and relevant experience.
      whyItMatters: >-
        ConcertAI is in a critical growth phase. The CEO's identity, vision, and
        investor relationship are central to assessing strategic risk, continuity,
        and the company's ability to execute on its 2025–2026 product roadmap.
      diligencePath: >-
        Search LinkedIn, press release aggregators, and healthcare executive databases;
        contact ConcertAI directly for a management introduction; check for conference
        speaking appearances under a new CEO name post-May 2025.
      relatedQuestionRefs: [QO011, QO016]
      relatedTableRefs: [TO002]

    - type: enumeration-incomplete
      severity: material
      topic: investors
      missingEvidence: >-
        Confirmation of Goldman Sachs Asset Management as a capital provider, including
        the investment vehicle, amount, equity vs. debt structure, and board rights;
        also, any other investors not listed on the public investor page.
      whyItMatters: >-
        The investor map is incomplete if Goldman Sachs's role and stake are unconfirmed.
        An unverified Unicorn-tier investor affects the company's capital structure,
        governance, and potential exit dynamics.
      diligencePath: >-
        Request the capitalization table from management; check SEC Form D filings under
        Concerto Healthcare Inc.; obtain a Goldman Sachs GSAM investor confirmation letter.
      relatedQuestionRefs: [QO002, QO009]
      relatedTableRefs: [TO003]

    - type: private-evidence-only
      severity: minor
      topic: revenue
      missingEvidence: >-
        Audited or company-disclosed revenue, gross margin, and ARR breakdown by product
        division and customer segment.
      whyItMatters: >-
        The $160M / 35% growth Crunchbase estimate is indirect and may blend multiple
        product lines and revenue types. Accurate revenue and margin data are essential
        for valuation and competitive analysis.
      diligencePath: >-
        Request audited financials or management accounts in diligence; ask for ARR
        by division (RWE & Regulatory, CancerLinQ, TeraRecon, Precision Suite, Clinical Dev).
      relatedQuestionRefs: [QO005]

    - type: private-evidence-only
      severity: minor
      topic: headcount
      missingEvidence: >-
        Precise headcount figures broken down by function (R&D, commercial, clinical
        ops, G&A) and geography, as well as headcount trend over the past 12–24 months.
      whyItMatters: >-
        The Crunchbase band of 1,001–5,000 is too wide for meaningful productivity or
        burn-rate analysis. Headcount trend signals growth or contraction pressure.
      diligencePath: >-
        Request headcount data from management; check LinkedIn employee count trends;
        review state payroll filings for Concerto Healthcare Inc.
      relatedQuestionRefs: [QO006, QO018]

    - type: missing-source
      severity: minor
      topic: competitive-comparison
      missingEvidence: >-
        Detailed product-by-product comparison between ConcertAI and Tempus AI's oncology
        data and AI offerings, including customer overlap, pricing models, and technology
        differentiation at the feature level.
      whyItMatters: >-
        Without detailed competitive benchmarking, investors cannot fully assess whether
        ConcertAI's product portfolio is genuinely differentiated from Tempus AI or is
        vulnerable to displacement by a better-capitalized public competitor.
      diligencePath: >-
        Conduct direct customer interviews with oncology practices and pharma research teams;
        review Tempus SEC filings (NYSE: TEM); conduct side-by-side product demos; analyze
        customer case studies published by both companies.
      relatedQuestionRefs: [QO021]

    - type: missing-source
      missingEvidence: >-
        Comparable publicly traded or recently acquired oncology AI and RWE companies'
        valuation multiples for benchmarking ConcertAI's reported $1.9B valuation.
      whyItMatters: >-
        Without comparable multiples, it is not possible to assess whether the reported
        valuation is rich, fair, or discounted relative to market comps.
      diligencePath: >-
        Compile valuation multiples for Tempus AI (NYSE: TEM), Veeva Systems, and
        recent oncology RWE M&A transactions; apply revenue multiples to ConcertAI's
        estimated $160M revenue.
      relatedQuestionRefs: [QO022]

