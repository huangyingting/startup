callouts:
  - calloutType: risk
    title: CEO Identity Is an Open Diligence Question
    body: >-
      ConcertAI announced a CEO leadership transition in May 2025, with Jeff Elton moving
      to Vice Chairman. The incoming CEO's identity could not be determined from any
      accessible public source—including the company website, newsroom, or archived media.
      This is a material governance gap for any investor or partner conducting diligence.
    claimRefs: [CO032]

  - calloutType: risk
    title: Goldman Sachs $150M Round Cannot Be Confirmed
    body: >-
      Every primary source URL for the reported June 2024 Goldman Sachs Asset Management
      investment (PR Newswire, Reuters, Axios, STAT News, Business Wire, and others) is
      currently inaccessible or returns a 404 error. Goldman Sachs does not appear on
      ConcertAI's official investor page. The $1.9B valuation and $150M round size are
      therefore unverified as of the report date.
    claimRefs: [CO027, CO028, CO029]

  - calloutType: strength
    title: Deep Oncology Data Moat Through Strategic Acquisitions
    body: >-
      The acquisitions of TeraRecon (medical imaging AI, 2,000+ customers) and CancerLinQ
      (oncology data network from ASCO, 9M+ patients) give ConcertAI a proprietary data
      infrastructure that is difficult to replicate organically. These assets, combined with
      commercial partnerships with Bayer, NVIDIA, Foundation Medicine, and Guardant Health,
      support a differentiated data flywheel.
    claimRefs: [CO010, CO011, CO018, CO046, CO047, CO048, CO053, CO054]

