  evidenceGaps:
    - id: GI001
      type: private-evidence-only
      severity: blocking
      topic: burn-rate-cash-position
      missingEvidence: >-
        ConcertAI has not publicly disclosed its net income/loss, operating cash flow, burn rate,
        or remaining cash position following the June 2024 Goldman Sachs investment. No audited
        financial statements, partial financial disclosures, or investor guidance are available
        for any period. Without this information, capital adequacy assessment is speculative.
      whyItMatters: >-
        Burn rate and cash position are foundational inputs for any financing dependency
        analysis. Without them, it is impossible to determine how long the Goldman Sachs $150M
        investment extends runway, whether an additional financing round is imminent, or
        whether SAI Group backstop capital is being actively deployed. This gap blocks the
        capital adequacy conclusion in the financial verdict section.
      diligencePath: >-
        Request audited financial statements (P&L, balance sheet, cash flow) for FY2022–FY2024
        as part of data room access; seek management guidance on monthly cash burn and projected
        runway; ask for the use-of-funds breakdown for the Goldman Sachs $150M; review SAI Group
        intercompany loan or support agreement terms.
      relatedQuestionRefs: [QI015]
      relatedTableRefs: [TI004]

    - id: GI002
      type: private-evidence-only
      severity: material
      topic: saas-arr-versus-project-revenue-mix
      missingEvidence: >-
        ConcertAI does not publicly disclose the breakdown between SaaS ARR and project-based
        or one-time revenue. The SaaS/subscription vs. RWE project-based mix is critical to
        assessing revenue quality, net revenue retention, and the sustainability of the
        company's growth rate. SAI Group's relationship with ConcertAI also introduces
        complexity in understanding which revenues are arm's-length third-party vs. affiliated
        entity revenues.
      whyItMatters: >-
        The ARR/project split directly determines whether the ~35% growth rate represents
        durable SaaS expansion or a combination of SaaS growth and project-based episodic
        revenue. A business with 30% SaaS ARR and 70% project-based revenue has materially
        different capital efficiency and valuation implications than one with 60%+ recurring
        revenue. Without this data, the revenue quality assessment and margin expansion
        trajectory remain highly uncertain.
      diligencePath: >-
        Request quarterly revenue breakdown by segment (SaaS/subscription, data analytics,
        professional services, imaging AI); ask for ARR waterfall by product line; request
        Net Revenue Retention (NRR) data for SaaS cohorts; clarify affiliated-entity revenue
        contribution from SAI Group affiliates.
      relatedQuestionRefs: [QI020, QI026]
      relatedTableRefs: [TI001]

    - id: GI003
      type: private-evidence-only
      severity: material
      topic: working-capital-and-cost-structure
      missingEvidence: >-
        The specific cost structure of ConcertAI's data acquisition, NVIDIA compute, and
        EHR integration working capital is not publicly available. The scale of upfront
        investment required to expand the CancerLinQ network, onboard new health system
        contributors, and maintain FHIR-compliant integrations is unknown from public sources.
        This makes gross margin estimates highly uncertain.
      whyItMatters: >-
        Working capital requirements affect both cash burn and the scalability of the business
        model. If data acquisition costs scale proportionally with network size, gross margins
        may not expand as the business grows. Conversely, if data costs are largely fixed,
        margins should improve significantly at scale. This is a critical input for modeling
        profitability timelines.
      diligencePath: >-
        Request detailed COGS breakdown by category (data acquisition, compute/hosting,
        labor, services delivery); ask for unit economics per indication or study type; review
        NVIDIA partnership terms for cost structure; request health system data contribution
        agreement cost terms.
      relatedQuestionRefs: [QI025]
      relatedTableRefs: [TI003]
