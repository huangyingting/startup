summary:
  headline: >-
    ConcertAI is a conditional BUY at the ~$1.9B implied valuation; a differentiated multi-modal oncology AI stack and
    near-monopoly pharma penetration support the thesis, but unresolved CEO vacancy, opaque financials, and inability to
    verify the Goldman Sachs round from primary sources require blocking diligence before conviction.
