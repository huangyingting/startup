  topStrengths:
    - >-
      Differentiated multi-modal stack: regulatory-grade RWE (CancerLinQ, 9M+ patients), FDA-cleared imaging AI
      (TeraRecon), Foundation Medicine genomic integration, and NVIDIA agentic AI — no single competitor matches this
      breadth.
    - >-
      Deep pharma penetration: company-claimed 75% of top life science companies as customers implies high switching
      costs, renewal moat, and incumbency advantage.
    - >-
      Structurally growing market: oncology AI/RWE estimated at 30–45% CAGR to a $20B+ TAM by 2030; FDA RWE Framework
      (2018) and 21st Century Cures Act create regulatory tailwind.
    - >-
      SAI Group parent backstop: strategic parent with deep pockets provides implicit capital safety net and enterprise
      distribution channel access.
    - >-
      Accelerating partnership flywheel (2024–2026): NVIDIA, Bayer, Foundation Medicine, Guardant Health, NeoGenomics,
      Dewpoint Therapeutics partnerships expand data moat and distribution reach.
  topRisks:
    - >-
      CEO vacancy exceeding twelve months with no publicly named successor as of May 2026; extends key-person execution
      risk into a critical growth phase.
    - >-
      Tempus AI (NYSE: TEM) is public, better-resourced, and claims 6.5K+ oncologists and 40M+ records, providing a
      capital-rich competitor with superior transparency.
    - >-
      Goldman Sachs $150M round (and $1.9B valuation) cannot be verified from any accessible primary source — all press
      release URLs return 404 — creating diligence risk if the round terms or valuation differ from reported figures.
    - >-
      HIPAA/privacy and FDA AI/ML SaMD regulatory exposure across the 9M-patient CancerLinQ database and TeraRecon
      cleared devices; a material breach or FDA enforcement action is a thesis-break trigger.
    - >-
      Financial opacity: no audited revenue, NRR/GRR, churn, or gross margin disclosed; the ~$160M revenue and ~35%
      growth are unaudited secondary estimates only.
  unresolvedGaps:
    - >-
      CEO successor identity: Jeff Elton's named replacement has not been publicly announced after twelve months;
      investor diligence should require a management call.
    - >-
      Goldman Sachs round primary documentation: term sheet, closing press release, or SEC filing equivalent needed to
      confirm $150M amount, $1.9B valuation, and dilution stack.
    - >-
      Audited financials with NRR/GRR, churn, and gross margin detail; current ~$160M revenue estimate is
      Crunchbase-sourced and unaudited.
    - >-
      TeraRecon revenue contribution, subsidiary integration status, and FDA 510(k) clearance scope for DETECT and Neuro
      AI modules need primary confirmation.
    - >-
      CancerLinQ data contributor count and data richness post-ASCO acquisition; ASCO partnership terms and exclusivity
      scope not publicly disclosed.
