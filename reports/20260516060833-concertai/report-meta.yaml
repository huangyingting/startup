companyProfile:
  summary: >-
    ConcertAI (legal name: Concerto Healthcare Inc.) is a private, Cambridge/Boston-based
    healthcare AI company specialising in oncology real-world evidence (RWE), generative AI
    analytics, medical imaging AI, and clinical trial acceleration. The company was founded in
    2017 by Jeff Elton, PhD, and operates within the SAI Group (SymphonyAI) ecosystem. Its
    product stack spans five divisions: Regulatory & Research (ECA, RWE tools), Precision Suite
    (GenAI for RWE, trial design, commercial intelligence), Clinical Development (Accelerated
    Clinical Trials), CancerLinQ (9M+ patient oncology EHR network acquired from ASCO), and
    TeraRecon (FDA-cleared medical imaging AI). ConcertAI claims to serve 75% of top life
    science companies and 50% of the largest global healthcare providers. A reported $150M
    Goldman Sachs Asset Management investment at ~$1.9B valuation (June 2024) could not be
    confirmed from accessible primary sources as of May 2026. CEO Jeff Elton transitioned to
    Vice Chairman in May 2025; his named successor had not been publicly identified by the
    report date.
  foundedDate: "2017-01-01"
  founders:
    - name: Jeff Elton, PhD
      role: Founder; Vice Chairman (former CEO through May 2025)
      background: >-
        Formerly at KPMG, Accenture, and Novartis; deep background in pharmaceutical strategy,
        clinical informatics, and healthcare AI.
      claimRefs: [CO004, CO007]
  foundingLocation: Cambridge/Boston, Massachusetts, USA
  headquarters: Cambridge/Boston, Massachusetts, USA
  productSummary: >-
    ConcertAI sells oncology AI and data analytics products across five divisions:
    (1) Regulatory & Research division with External Control Arms, Comparative Cohort,
    Precision Explorer, Patient360, and related RWE tools for pharma regulatory submissions;
    (2) Precision Suite (May 2025) with PrecisionExplorer (GenAI RWE), PrecisionTrials
    (AI trial design), and PrecisionGTM (commercial intelligence); (3) Clinical Development
    with Accelerated Clinical Trials (Feb 2026) and patient matching/automation workflows;
    (4) CancerLinQ—acquired from ASCO—aggregating 9M+ patient records with SmartLinQ,
    TriaLinQ, RxLinQ, and PatientLinQ modules; and (5) TeraRecon medical imaging AI
    (AV, Intuition, DETECT, Neuro) with 2,000+ global customers, plus CARAai multi-LLM
    platform and Cadence Suite (commercial oncology support, Apr 2026).
  customerFocus: >-
    Top-50 biopharmaceutical and life science companies, oncology-focused CROs and CDMOs,
    academic medical centres and NCI-designated cancer centres, community oncology networks,
    and large integrated health systems with oncology programmes.
  businessModel: >-
    Software-as-a-Service (SaaS) and data-subscription model charging annual platform fees
    for access to the RWE data network (CancerLinQ), plus per-project consulting/analytics
    fees for External Control Arms and Precision Suite deliverables. TeraRecon contributes
    recurring enterprise imaging software licenses. No transactional revenue model disclosed.
  stage: Growth (Late Private / Series C+)
  fundingStatus: >-
    Confirmed investors: SAI Group (founder/parent), Sixth Street, Declaration Partners,
    Maverick Ventures, AllianceBernstein PCI. Reported (unconfirmed from primary sources):
    $150M Goldman Sachs Asset Management investment at ~$1.9B valuation, June 2024.
    Crunchbase unicorn tag implies valuation above $1B.
  disclosureProfile: private-undisclosed
  claimRefs: [CO001, CO002, CO003, CO004, CO005, CO006, CO007, CO008, CO009, CO010,
              CO011, CO012, CO017, CO030, CO035, CO039]

summary:
  headline: >-
    ConcertAI is a conditional BUY at the ~$1.9B implied valuation; a differentiated
    multi-modal oncology AI stack and near-monopoly pharma penetration support the thesis,
    but unresolved CEO vacancy, opaque financials, and inability to verify the Goldman Sachs
    round from primary sources require blocking diligence before conviction.
  overallScore: 6.8
  recommendation: buy
  confidence: medium
  riskRating: high
  valuationStance: fair
  keyMetrics:
    valuationUsdM: 1900
    revenueRunRateUsdM: 160
    arrUsdM: null
    revenueGrowthYoYPct: 35
    grossMarginPct: null
    nrrPct: null
    totalRaisedUsdM: 300
    customerCount: null
    headcount: 2500
  topStrengths:
    - >-
      Differentiated multi-modal stack: regulatory-grade RWE (CancerLinQ, 9M+ patients),
      FDA-cleared imaging AI (TeraRecon), Foundation Medicine genomic integration, and
      NVIDIA agentic AI — no single competitor matches this breadth.
    - >-
      Deep pharma penetration: company-claimed 75% of top life science companies as customers
      implies high switching costs, renewal moat, and incumbency advantage.
    - >-
      Structurally growing market: oncology AI/RWE estimated at 30–45% CAGR to a $20B+ TAM
      by 2030; FDA RWE Framework (2018) and 21st Century Cures Act create regulatory tailwind.
    - >-
      SAI Group parent backstop: strategic parent with deep pockets provides implicit capital
      safety net and enterprise distribution channel access.
    - >-
      Accelerating partnership flywheel (2024–2026): NVIDIA, Bayer, Foundation Medicine,
      Guardant Health, NeoGenomics, Dewpoint Therapeutics partnerships expand data moat and
      distribution reach.
  topRisks:
    - >-
      CEO vacancy exceeding twelve months with no publicly named successor as of May 2026;
      extends key-person execution risk into a critical growth phase.
    - >-
      Tempus AI (NYSE: TEM) is public, better-resourced, and claims 6.5K+ oncologists and
      40M+ records, providing a capital-rich competitor with superior transparency.
    - >-
      Goldman Sachs $150M round (and $1.9B valuation) cannot be verified from any accessible
      primary source — all press release URLs return 404 — creating diligence risk if the
      round terms or valuation differ from reported figures.
    - >-
      HIPAA/privacy and FDA AI/ML SaMD regulatory exposure across the 9M-patient CancerLinQ
      database and TeraRecon cleared devices; a material breach or FDA enforcement action is
      a thesis-break trigger.
    - >-
      Financial opacity: no audited revenue, NRR/GRR, churn, or gross margin disclosed;
      the ~$160M revenue and ~35% growth are unaudited secondary estimates only.
  unresolvedGaps:
    - >-
      CEO successor identity: Jeff Elton's named replacement has not been publicly announced
      after twelve months; investor diligence should require a management call.
    - >-
      Goldman Sachs round primary documentation: term sheet, closing press release, or SEC
      filing equivalent needed to confirm $150M amount, $1.9B valuation, and dilution stack.
    - >-
      Audited financials with NRR/GRR, churn, and gross margin detail; current ~$160M
      revenue estimate is Crunchbase-sourced and unaudited.
    - >-
      TeraRecon revenue contribution, subsidiary integration status, and FDA 510(k) clearance
      scope for DETECT and Neuro AI modules need primary confirmation.
    - >-
      CancerLinQ data contributor count and data richness post-ASCO acquisition; ASCO
      partnership terms and exclusivity scope not publicly disclosed.

