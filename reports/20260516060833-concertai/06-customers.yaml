figures:
  - id: FU001
    type: journey-map
    title: "Customer Journey Map"
    description: >-
      End-to-end customer journey for a representative pharmaceutical sponsor engaging
      ConcertAI, from initial awareness through production deployment and expansion across
      additional pipeline programs and product modules.
    claimRefs: [CU001, CU030, CU031]
    data:
      items:
        - label: "Awareness"
          detail: >-
            Pharma clinical ops or medical affairs team becomes aware of ConcertAI through
            ASCO/ESMO/J.P. Morgan conference presence, Goldman Sachs network introduction,
            or peer pharma company reference.
          touchpoints:
            - "ASCO and ESMO conference presence and podium presentations"
            - "J.P. Morgan Healthcare Conference (Jan 2025 presentation confirmed)"
            - "Goldman Sachs Asset Management portfolio network post-2024 investment"
        - label: "Evaluation"
          detail: >-
            Clinical ops and regulatory affairs evaluate ConcertAI for ECA feasibility or
            RWE study design; request platform demo and pilot data scoping. Benchmarked
            against Flatiron Health, IQVIA, and TriNetX alternatives.
          touchpoints:
            - "Feasibility Assessment module demo for trial design viability"
            - "RFP or direct outreach to ConcertAI commercial team"
            - "Comparison against Flatiron / IQVIA / TriNetX platform capabilities"
        - label: "Procurement"
          detail: >-
            Procurement and legal teams negotiate Master Service Agreement, data access
            schedule, and Statement of Work; budget approval from clinical development
            or medical affairs budget holders.
          touchpoints:
            - "MSA/SOW execution with ConcertAI legal and commercial team"
            - "HIPAA BAA and data access agreement review"
            - "Budget approval from VP Clinical Operations or VP Medical Affairs"
        - label: "Onboarding"
          detail: >-
            ConcertAI implementation team provisions data access and configures cohort
            parameters; for SaaS products, API or platform integration established.
            ECA customers receive protocol design support from ConcertAI data scientists.
          touchpoints:
            - "Data cohort specification and IRB protocol alignment"
            - "Platform API access provisioning or EHR integration setup"
            - "ConcertAI data scientist assigned to study design"
        - label: "Active Use"
          detail: >-
            Customer uses ConcertAI platform for ECA study execution, trial feasibility
            analysis, or SaaS analytics workflows. Study results delivered for regulatory
            filing or internal decision-making.
          touchpoints:
            - "ECA study execution and results delivery for FDA submission package"
            - "PrecisionExplorer RWE queries or PrecisionTrials protocol optimization"
            - "CancerLinQ trial matching (TriaLinQ) for site and patient identification"
        - label: "Expansion"
          detail: >-
            Successful ECA study triggers additional pipeline program sponsorship or
            Precision Suite SaaS upsell; health system expands CancerLinQ module usage.
            NVIDIA, Bayer, Foundation Medicine partnerships illustrate multi-product expansion.
          touchpoints:
            - "Additional ECA studies across drug pipeline programs"
            - "Precision Suite SaaS subscription upsell (PrecisionTrials, PrecisionGTM)"
            - "Accelerated Clinical Trials agentic AI for expanded trial operations"

  - id: FU002
    type: funnel
    title: "Adoption and Deployment Funnel"
    description: >-
      Discovery-to-deployment conversion funnel for ConcertAI, from the addressable
      top-life-science company universe through named partnerships to production-deployed
      product installations. Values blend company claims and analyst estimates.
    claimRefs: [CU001, CU003, CU032, CU035]
    data:
      items:
        - label: "Addressable Top Life Science Universe"
          value: 250
          detail: "Global top-tier pharma and biotech companies eligible for ConcertAI RWE, clinical, and commercial AI products"
        - label: "Company-Claimed Active Customers"
          value: 188
          detail: "~75% of top 250 life science companies (company marketing claim; denominator undefined, activity threshold undefined)"
        - label: "Estimated ECA Study Completions (lifetime)"
          value: 50
          detail: "Analyst estimate of cumulative ECA and RWE studies completed across pharma sponsors; exact number not publicly disclosed"
        - label: "Named Press-Release-Confirmed Partners (2024–2026)"
          value: 6
          detail: "NVIDIA, Bayer, Foundation Medicine, NeoGenomics, Guardant Health, Dewpoint Therapeutics — all confirmed via partner announcements"
        - label: "New Production Product Launches (2026 YTD)"
          value: 2
          detail: "Accelerated Clinical Trials (Feb 2026) and Cadence Suite (Apr 2026) represent new production deployments in 2026"
    approximationNotes: >-
      The "75% of top life science companies" figure is a company marketing claim; the denominator
      (definition of "top") and status (contracted vs. ever-engaged) are not publicly defined. Hospital
      customer count (2,000+) and patient network (9M+) are company-disclosed; growth rates and
      active-versus-dormant splits are not confirmed. Named partnership count is based on press
      release enumeration through May 2026.

  - id: FU003
    type: matrix
    title: "Customer Proof Matrix"
    description: >-
      Evidence quality assessment for eight named or historically referenced ConcertAI
      customer/partner relationships across four diligence dimensions: evidence quality
      (corroboration depth), outcome specificity (quantified vs. qualitative outcomes),
      retention visibility (whether ongoing engagement is confirmed), and production
      maturity (deployment status as of May 2026).
    claimRefs: [CU005, CU006, CU007, CU008, CU009, CU010, CU034]
    data:
      columns:
        - "Evidence Quality"
        - "Outcome Specificity"
        - "Retention Visibility"
        - "Production Maturity"
      rows:
        - label: "NVIDIA"
          values: ["High", "Low (strategic only)", "Confirmed active", "Production (alliance)"]
        - label: "Bayer"
          values: ["Medium-High", "Low (strategic only)", "Confirmed active", "Production (clinical dev)"]
        - label: "Foundation Medicine"
          values: ["Medium-High", "Low (integration scope)", "Confirmed active", "Production (data integration)"]
        - label: "NeoGenomics"
          values: ["Medium", "Low (SaaS agreement)", "Confirmed active", "Production (AI SaaS)"]
        - label: "Guardant Health"
          values: ["Medium", "Low (collaboration scope)", "Confirmed active", "Production (RWE collaboration)"]
        - label: "Dewpoint Therapeutics"
          values: ["Medium", "Low (phase 1 only)", "Phase 1 only", "Pilot / Phase 1"]
        - label: "AbbVie (historical)"
          values: ["Low", "Unknown", "Unconfirmed", "Unverified"]
        - label: "Caris Life Sciences (historical)"
          values: ["Low", "Unknown", "Unconfirmed", "Unverified"]

  - id: FU004
    type: cohort
    title: "Estimated Customer Retention Cohort"
    description: >-
      Estimated gross retention percentages for four ConcertAI customer cohorts at Year 1 and
      Year 2. Values are analyst estimates derived from structural switching cost analysis,
      contract type observations, and enterprise healthcare SaaS benchmarks. ConcertAI has not
      publicly disclosed cohort retention data; all values are synthetic estimates and should
      be verified in data room review.
    claimRefs: [CU022, CU036, CU040]
    data:
      columns:
        - "Year 1 Retention (est.)"
        - "Year 2 Retention (est.)"
      rows:
        - label: "TeraRecon Hospital Customers (2022 cohort)"
          values: [91, 85]
        - label: "CancerLinQ Oncology Practices (2023 cohort)"
          values: [87, 80]
        - label: "Pharma ECA Repeat Sponsors (2023 cohort)"
          values: [70, 62]
        - label: "Precision Suite SaaS Subscribers (2025 cohort)"
          values: [83, 76]
    approximationNotes: >-
      TeraRecon retention estimate assumes high structural stickiness from PACS/workstation
      integration; healthcare imaging AI SaaS peers typically report 88–94% gross retention.
      CancerLinQ estimate assumes community practice switching costs from EHR connectivity and
      quality program participation; offset by lower budget priority vs. health system core IT.
      Pharma ECA retention reflects project-based model where "retention" means repeat sponsorship;
      industry analogs suggest 60–75% repeat project rate for RWE platform vendors. Precision Suite
      estimate is Year-1 only; insufficient time elapsed for Year-2 measurement.


