  evidenceGaps:
    - id: GU001
      type: private-evidence-only
      severity: material
      topic: net-revenue-retention-and-churn
      missingEvidence: >-
        ConcertAI has not publicly disclosed net revenue retention (NRR), gross revenue retention
        (GRR), or customer churn rates for any segment — pharma SaaS, health system, or radiology
        AI. No analyst report, investor disclosure, or customer reference publication has provided
        these metrics. For a company at $160 million estimated revenue with 35% growth, the split
        between new logo contribution and expansion revenue is unknown, and whether growth is
        driven by price increases, account expansion, or new customer acquisition cannot be
        determined from public sources. No G2, Capterra, or Gartner Peer Insights reviews at
        meaningful volume have been identified for ConcertAI, CancerLinQ, or TeraRecon, limiting
        independent proxy signals for customer satisfaction and retention.
      whyItMatters: >-
        NRR is a primary quality-of-growth indicator for SaaS and recurring-revenue healthcare
        data businesses. Without NRR, it is impossible to distinguish between a high-quality
        retention business (NRR >120%) driven by expansion and upsell versus a growth story
        dependent on continuous new-logo acquisition to offset churn. Given that ConcertAI's
        pharma segment is partially project-based (ECA studies), understanding what fraction
        of revenue recurs versus must be re-won annually is essential for valuation and risk
        assessment. Low NRR would materially lower the fair value of the SaaS-platform narrative.
      diligencePath: >-
        Request trailing four-quarter NRR and GRR by segment (pharma SaaS, health system, radiology
        AI, project-based ECA) from management; ask for cohort revenue waterfall showing retained,
        expansion, and new-logo revenue contributions; request customer count by ARR band; ask for
        churn and downsell rates; request TeraRecon SaaS migration progress and SaaS vs. perpetual
        revenue split; request CancerLinQ active practice count versus enrolled practice count.
      relatedQuestionRefs: [QU005]
      relatedTableRefs: [TU004]

    - id: GU002
      type: undiscoverable-without-disclosure
      severity: material
      topic: customer-coverage-claim-definition-ambiguity
      missingEvidence: >-
        ConcertAI's claim that it serves "75% of top life science companies" has not been accompanied
        by a clear definition of (a) what denominator defines "top life science companies" — whether
        measured by revenue, R&D spend, oncology pipeline size, or a specific list such as the top 20
        or top 50 global pharma by revenue — or (b) what activity constitutes "serving" a company —
        whether a single ECA study, an active multi-year SaaS contract, a pilot engagement, or merely
        a vendor-approved status. Without these definitions, the claim cannot be independently verified
        or converted into a revenue concentration model. The analogous claim of 50% of "largest global
        healthcare providers" is similarly undefined.
      whyItMatters: >-
        The 75% claim is a foundational customer traction proof point cited in investor materials and
        press coverage. If the denominator is the top 20 pharma companies globally, coverage of 15
        companies represents a very different commercial fact than if the denominator is 250 companies.
        If "serving" includes any historical project engagement regardless of current activity, the
        effective active-customer count could be materially lower than implied. Misinterpretation of
        this claim could lead to overestimation of ConcertAI's recurring-revenue customer base and
        underestimation of concentration or churn risk.
      diligencePath: >-
        Request the explicit methodology behind the 75% and 50% coverage claims — denominator
        definition, list of qualifying companies, and activity threshold for inclusion; request a
        named customer list with status (active contract, pilot, historical) and annual contract value
        ranges; request top-10 customer revenue concentration analysis; clarify whether the claim
        is based on contracted ARR or any-status engagement in the trailing 24 months.
      relatedQuestionRefs: [QU012]
      relatedTableRefs: [TU001, TU002]

    - id: GU003
      type: private-evidence-only
      severity: informational
      topic: named-customer-enumeration-incomplete
      missingEvidence: >-
        The named customer proof table (TU003) is a sample of the publicly announced ConcertAI
        customer and partner relationships and covers only six confirmed partnerships announced via
        press releases between December 2024 and January 2026, plus two historical unconfirmed
        references. The majority of the company's claimed customer base across approximately
        75% of top life science companies and 50% of the largest global healthcare providers
        is not publicly enumerable. No customer list, customer logos page with use-case attribution,
        or independent customer reference database has been identified that would allow exhaustive
        enumeration of ConcertAI's active customer base. This gap is structurally inherent to
        private company diligence without access to a data room.
      whyItMatters: >-
        Named customer evidence is essential for validating the quality and recency of ConcertAI's
        customer relationships, assessing whether pharma adoption spans multiple therapeutic areas
        and pipeline stages, and identifying whether any single customer represents a disproportionate
        revenue concentration. The absence of a verifiable customer list means that the 75% coverage
        claim cannot be stress-tested and that concentration risk cannot be quantified.
      diligencePath: >-
        Request a full customer list with ARR band, product line, start date, and renewal status;
        request at minimum the top-20 customers by revenue with relationship description; ask for
        customer logos with associated use cases from the company's customer success team; request
        three to five customer references willing to speak with diligence interviewers.
      relatedQuestionRefs: [QU001, QU012]
      relatedTableRefs: [TU003]


