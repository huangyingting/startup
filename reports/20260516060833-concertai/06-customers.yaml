company:
  name: ConcertAI

chapter:
  number: 6
  title: Customers and Traction
  summary: >-
    ConcertAI serves a broad customer base across four primary segments: pharmaceutical and
    biotech companies (estimated 60–65% of revenue), health systems and cancer centers
    (estimated 20–25%), diagnostics and genomics companies (estimated 10–15%), and CROs
    and research organizations (estimated 5%). The company claims to serve 75% of top life
    science companies and 50% of the largest global healthcare providers, supported by
    TeraRecon's 2,000-plus global hospital customers and CancerLinQ's 9 million-plus patient
    network from community oncology practices. Six named partnerships confirmed in 2024–2026
    include NVIDIA (oncology AI agents, March 2025), Bayer (clinical development, April 2025),
    Foundation Medicine (genomic integration, January 2026), NeoGenomics (hematology AI SaaS,
    December 2024), Guardant Health (liquid biopsy ctDNA RWE, January 2025), and Dewpoint
    Therapeutics (translational oncology, December 2024). Revenue was estimated at approximately
    $160 million with 35% growth as of early 2025. Net revenue retention and granular customer
    concentration data are not publicly disclosed, representing material diligence gaps. The
    land-and-expand motion progresses pharma buyers from project-based ECA studies to multi-year
    Precision Suite and Accelerated Clinical Trials SaaS subscriptions, while health systems
    expand from single CancerLinQ quality modules to full multi-module deployments.


sections:
  - id: customer-base-segmentation
    title: "Customer Base Segmentation"
    body: >-
      ConcertAI's customer base divides into four structural segments differentiated by
      buyer persona, budget source, and primary use case. Pharmaceutical and biotech companies
      constitute the largest segment, estimated at 60–65% of revenue, engaging ConcertAI
      for regulatory real-world evidence studies, External Control Arm submissions, clinical
      trial AI, and commercial oncology intelligence. Budget owners span clinical operations,
      regulatory affairs, medical affairs, and commercial teams, enabling ConcertAI to
      penetrate multiple departments within a single account. The company's claim that 75%
      of top life science companies are customers positions it across large pharma and
      emerging biotech alike, though the precise definition of "customer" versus "account
      contact" is not publicly disambiguated.
      Health systems and cancer centers represent the second-largest segment, estimated at
      20–25% of revenue, engaging primarily through the CancerLinQ platform for quality
      measure tracking, clinical trial matching, and evidence-based therapy selection. The
      9 million-plus patient network anchors community oncology practice adoption. Diagnostics
      and genomics companies—including NeoGenomics, Foundation Medicine, and Guardant Health—
      form a third segment representing an estimated 10–15% of revenue via AI SaaS agreements
      and data integration partnerships that create bi-directional value: ConcertAI gains
      enriched multi-modal data assets while diagnostic partners gain AI workflow capabilities.
      CROs and academic research organizations represent the residual segment at approximately
      5%, accessing patient cohort data through research agreements. TeraRecon's 2,000-plus
      global hospital customers provide a geographically diversified health system base that
      reduces dependence on US pharmaceutical budgets alone. Customer acquisition is supported
      by the Goldman Sachs network following the 2024 investment and by presence at oncology
      conferences including ASCO, ESMO, and the J.P. Morgan Healthcare Conference.
    claimRefs: [CU001, CU002, CU003, CU004, CU011, CU019, CU037]
    tableRefs: [TU001]
    figureRefs: [FU001]

  - id: adoption-trajectory-and-named-customer-evidence
    title: "Adoption Trajectory and Named Customer Evidence"
    body: >-
      ConcertAI's adoption trajectory accelerated materially from its founding in 2019 through
      the $150 million Goldman Sachs investment in June 2024 at a $1.9 billion valuation. The
      CancerLinQ acquisition from ASCO expanded the health system customer base to a 9 million-plus
      patient network from community oncology practices. TeraRecon's 2,000-plus global hospital
      customers, retained and grown since the acquisition, demonstrate durable health system
      adoption. Revenue was estimated at approximately $160 million as of January 2025 with
      approximately 35% year-over-year growth, reflecting compounding adoption across the pharma
      and health system segments. The Precision Suite launch in May 2025 added GenAI-native
      capabilities to the platform, positioning existing ECA study customers for SaaS upsell.
      Named partnership evidence spans six confirmed relationships across pharma, technology, and
      diagnostics announced between December 2024 and January 2026. NVIDIA's alliance for oncology
      AI agents (March 2025) signals technology-partner validation of the AI platform. Bayer's
      strategic clinical development agreement (April 2025) represents enterprise pharma adoption
      for RWE and trial AI. Foundation Medicine's genomic data integration (January 2026),
      NeoGenomics' hematology/oncology AI SaaS (December 2024), and Guardant Health's liquid
      biopsy ctDNA collaboration (January 2025) demonstrate that diagnostics companies are both
      customers and co-development partners. Dewpoint Therapeutics' translational oncology
      partnership (December 2024) validates early-stage biotech adoption. Historical references
      to AbbVie and Caris Life Sciences as customers suggest a broader undisclosed pharma base.
      The appointment of Shawn W. Bates as General Manager of Commercial Solutions in 2025 signals
      investment in commercial customer expansion and suggests a growing commercial team focused
      on scaling the named customer base. Active clinical trials at ConcertAI-linked sites
      confirmed via ClinicalTrials.gov reflect real-world deployment of trial AI and patient
      matching capabilities.
    claimRefs: [CU005, CU006, CU007, CU008, CU009, CU010, CU012, CU013, CU014, CU015, CU017, CU020, CU025, CU026, CU027, CU033]
    tableRefs: [TU002, TU003]
    figureRefs: [FU002, FU003]

  - id: retention-expansion-and-concentration-risk
    title: "Retention, Expansion, and Concentration Risk"
    body: >-
      ConcertAI's retention and expansion dynamics differ markedly by segment and product type.
      For health systems using CancerLinQ, retention is structurally high: EHR integration and
      ongoing quality program participation create switching costs that disincentivize churn.
      Community oncology practices that have onboarded TriaLinQ for trial matching or SmartLinQ
      for quality benchmarking face meaningful implementation costs to migrate to an alternative
      platform. TeraRecon's 2,000-plus hospital customer base has persisted across the acquisition
      period, suggesting low churn in the radiology AI segment where PACS and workstation
      integrations are deeply embedded. For pharmaceutical customers, the model bifurcates between
      project-based ECA studies—which generate repeat business rather than contractual retention—
      and multi-year SaaS subscriptions for Precision Suite and Accelerated Clinical Trials, which
      carry higher retention visibility. ConcertAI has not publicly disclosed net revenue retention
      (NRR), gross revenue retention (GRR), or churn rates for any segment, preventing direct
      benchmarking against healthcare SaaS peers. The land-and-expand model is evident in the
      progression from single ECA studies to Precision Suite subscriptions and from single
      CancerLinQ modules to full suite deployments. Revenue expansion is further enabled by the
      diagnostics partnership model where NeoGenomics, Foundation Medicine, and Guardant Health
      generate recurring data licensing or SaaS revenue.
      Concentration risk is material but partially mitigated. The claim that 75% of top life
      science companies are customers implies a diversified pharma base, but the actual revenue
      distribution across accounts is not known. If five or fewer large pharma companies represent
      a disproportionate share of pharma revenue, a single program cancellation or strategic shift
      could materially impair revenue. Healthcare data breach incidents across the broader industry
      create operational and reputational risk that could affect customer retention in CancerLinQ's
      patient-data-dependent model. Pharma RWE and clinical development budgets are subject to
      pipeline-driven volatility, creating revenue lumpiness risk from the project-based ECA study
      model. Multi-year SaaS contracts reduce this risk for the subscription portion of the
      portfolio, but the mix between recurring and project revenue is not publicly disclosed.
    claimRefs: [CU016, CU021, CU022, CU023, CU024, CU028, CU029, CU038, CU039]
    tableRefs: [TU004, TU005]
    figureRefs: [FU004]


