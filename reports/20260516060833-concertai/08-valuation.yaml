callouts:
  - calloutType: risk
    title: CEO Vacancy Is the Dominant Blocking Condition
    body: >-
      Jeff Elton's transition to Vice Chairman in May 2025 created a CEO vacancy that remains
      unresolved as of May 2026—more than twelve months later. No named replacement has been
      identified from any accessible public source. For a company at $1.9B implied valuation with
      complex pharma executive relationships and active regulatory compliance obligations, an
      extended CEO vacancy is the single most material open item for any investment decision.
    claimRefs: [CV009]

  - calloutType: risk
    title: Goldman Sachs Valuation Cannot Be Verified from Primary Sources
    body: >-
      Every primary source URL for the reported June 2024 Goldman Sachs $150M investment—including
      the Goldman Sachs Asset Management page, PR Newswire releases, and ConcertAI newsroom—returns
      a 404 error as of May 2026. The $1.9B valuation is corroborated by Reuters, STAT News,
      BusinessWire, and multiple other secondary outlets, but the cap table, preference stack,
      and liquidation waterfall remain undisclosed and unverifiable from public sources.
    claimRefs: [CV010, CV018]

  - calloutType: recommendation
    title: Conditional BUY Pending Three Blocking Diligence Items
    body: >-
      The investment verdict is a conditional BUY at the current implied ~$1.9B entry, contingent
      on resolving three blocking conditions: (1) CEO identity confirmed, (2) audited financials
      with NRR/GRR disclosed, and (3) Goldman Sachs round documentation and preference stack
      obtained. Base case returns of ~2.1× on entry satisfy minimum return thresholds, and the
      oncology AI growth market provides a compelling upside trajectory if the bull case
      conditions are met.
    claimRefs: [CV001, CV019]

