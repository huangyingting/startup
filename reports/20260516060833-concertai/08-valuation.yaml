  evidenceGaps:
    - id: GV001
      type: enumeration-incomplete
      severity: minor
      topic: comparable-valuation-set-sample-coverage
      missingEvidence: >-
        The comparable valuation table (TV004) is a sample, not an exhaustive enumeration of all
        relevant oncology AI, healthcare data, and life sciences technology comparables and
        transactions. Additional private funding rounds (including Syapse, TriNetX, Komodo Health,
        and Dewpoint Therapeutics), international oncology AI transactions, and 2025–2026 M&A
        activity not captured in public secondary sources may be relevant. The comparable set
        focuses on the four most material public and M&A reference points; niche or private comps
        with no public valuation anchor are excluded.
      whyItMatters: >-
        A broader comparable set could reveal a wider distribution of revenue multiples—particularly
        if recent 2025–2026 transactions in oncology AI occurred at compressed multiples due to
        interest rate normalization or public market multiple reset—that would materially affect
        ConcertAI's entry valuation defensibility assessment.
      diligencePath: >-
        Review PitchBook and CB Insights 2025–2026 healthcare AI transaction database for all
        oncology data platform deals above $100M. Cross-reference with Fierce Healthcare and
        BioPharma Dive M&A tracker for any announced transactions involving Komodo Health,
        TriNetX, Syapse, or comparable assets.
      relatedTableRefs: [TV004]

    - id: GV002
      type: missing-source
      severity: blocking
      topic: ceo-identity-unresolved-leadership-vacancy
      missingEvidence: >-
        No publicly accessible source has identified ConcertAI's named CEO as of May 2026, more
        than twelve months after Jeff Elton's transition to Vice Chairman in May 2025. The
        ConcertAI leadership page, newsroom, and all accessible press outlets do not name a
        replacement CEO. The vacancy is confirmed as current but the identity of the incoming
        CEO—if one has been hired—is not publicly available.
      whyItMatters: >-
        The CEO vacancy is the single highest-probability thesis-break risk and the primary
        blocking condition for investment commitment. An extended vacancy (>18 months) would
        signal organizational instability, elevate customer attrition probability, and impair
        the company's ability to manage the complex pharma executive relationships that underpin
        ConcertAI's commercial model.
      diligencePath: >-
        Request direct confirmation from ConcertAI board or investor relations; review all
        ConcertAI newsroom releases dated after May 2025; conduct targeted LinkedIn and press
        searches for ConcertAI CEO appointment announcements through June 2026.
      relatedQuestionRefs: [QV001]

    - id: GV003
      type: private-evidence-only
      severity: material
      topic: concertai-nrr-grr-revenue-quality-undisclosed
      missingEvidence: >-
        ConcertAI has not publicly disclosed net revenue retention (NRR) or gross revenue
        retention (GRR) from its pharmaceutical sponsor customer base. The revenue estimate
        of ~$160M is a Crunchbase secondary source; the split between recurring SaaS ARR and
        project-based ECA revenue is not determinable from public sources. Without NRR and
        ARR quality data, the 12× revenue multiple cannot be independently justified against
        the high-quality SaaS benchmark required for premium multiple defensibility.
      whyItMatters: >-
        If project-based ECA study revenue constitutes 40–50% of ConcertAI total revenue,
        a blended NRR could be well below the 110%+ benchmark for premium SaaS, potentially
        compressing the justified multiple toward 8–10× and implying a fair value near or below
        the current $1.9B implied entry.
      diligencePath: >-
        Request trailing four-quarter P&L by product line (SaaS/data subscription vs. project-
        based ECA vs. professional services vs. TeraRecon); NRR and GRR by segment; top-10
        customer revenue concentration; contract length distribution and renewal rate by segment.
      relatedQuestionRefs: [QV003]

    - id: GV004
      type: access-blocked
      severity: material
      topic: goldman-sachs-round-primary-documentation-inaccessible
      missingEvidence: >-
        All primary source URLs for the June 2024 Goldman Sachs $150M investment in ConcertAI
        return 404 errors as of May 2026. The Goldman Sachs Asset Management deal page
        (gsam.com), PR Newswire release, and ConcertAI newsroom entry for this round are all
        inaccessible. As a result, the investment amount, exact valuation, preference stack,
        liquidation waterfall, board representation rights, and equity structure are not
        verifiable from public sources. The liquidation preference mechanism (QV014) for the
        Goldman Sachs round is therefore only partially understood through inferred precedent
        from comparable late-stage healthcare AI investments.
      whyItMatters: >-
        Without understanding the Goldman Sachs preference stack and liquidation waterfall,
        any investor entering below the preference level cannot determine the effective equity
        value available to them in a sale at or near $1.9B. A senior preferred tranche with
        participating features could substantially reduce common equity returns at the current
        implied entry price.
      diligencePath: >-
        Request from ConcertAI: (1) Goldman Sachs Series investment documentation; (2) current
        cap table with all outstanding shares and option pool; (3) liquidation preference
        summary; (4) board composition and investor consent rights; (5) any existing drag-along
        or co-sale provisions.
      relatedQuestionRefs: [QV014, QV018]

