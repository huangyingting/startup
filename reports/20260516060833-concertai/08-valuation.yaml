  - id: TV004
    title: Comparable valuation table
    enumerationScope:
      coverage: sample
      basis: >-
        Comparable companies and transactions selected from public market data, SEC filings, and
        press-reported M&A and IPO events through May 2026. Set represents the most relevant
        public and acquired peers in oncology AI, life sciences SaaS, and healthcare data
        platforms. Excludes private companies with no public valuation anchor, and excludes
        general-purpose AI or EHR vendors without oncology focus. Revenue and market cap figures
        are trailing or last-reported; all data is best-estimate from public secondary sources.
    columns: ["Company", "Type", "Revenue", "Valuation / Market Cap", "Revenue Multiple", "Date", "Notes"]
    rows:
      - ["Tempus AI (TEM)", "Public comp", "$531M", "~$6B", "~11×", "2024", "IPO Jun 2024; oncology AI + genomics; net loss ~$214M; closest public peer"]
      - ["Flatiron Health (Roche)", "M&A comp", "~$175M", "$1.9B", "~11×", "2018", "Acquired by Roche; oncology RWE platform; most precise M&A analog for ConcertAI"]
      - ["Veeva Systems (VEEV)", "Public comp", "~$2.4B", "~$40B", "~17×", "2024", "Life sciences SaaS; ~80% gross margin; profitable; premium multiple for quality"]
      - ["IQVIA (IQV)", "Public comp", "~$15B", "~$45B", "~3×", "2024", "CRO / data; mature; low-growth; multiple compression at scale with services mix"]
      - ["ConcertAI (implied)", "Subject", "~$160M", "~$1.9B", "~12×", "2024", "Goldman Sachs round; corroborated by multiple secondary sources; primary URL 404"]
    notes: >-
      ConcertAI multiple sits at parity with Tempus AI and Flatiron M&A precedent. Premium to IQVIA
      (high-growth vs. mature services) is justified. Discount to Veeva reflects pre-profitability
      status and lower revenue quality (services mix vs. pure SaaS). Revenue estimates are from
      SEC filings for public companies and Crunchbase/news for ConcertAI. All multiples are
      trailing revenue multiples unless otherwise noted.
    claimRefs: [CV011, CV012, CV013, CV014, CV015, CV016, CV017]

  - id: TV005
    title: Thesis-break and kill triggers table
    columns: ["Trigger Event", "Threshold", "Probable Impact on Thesis", "Estimated Probability"]
    rows:
      - ["FDA enforcement on ECA / RWE product", "Warning letter or consent decree against ConcertAI or TeraRecon AI product", "Revenue impairment 30–50%; pharma customer attrition; valuation compression to bear case or below; thesis break", "5–10%"]
      - ["HIPAA breach involving CancerLinQ patient data", "Material breach (>500 patient records) with OCR notification", "Regulatory penalties up to $1.9M/category/year; class action; pharma sponsor attrition; potential thesis-break if >100K records", "5–10%"]
      - ["CEO vacancy extended beyond 18 months", "No named CEO by November 2026", "Sustained pharma customer relationship uncertainty; execution stall on platform roadmap; elevated down-round risk", "15–25%"]
      - ["SAI Group divestiture or strategic pivot away from ConcertAI", "Formal announcement of sale, spin-off, or wind-down of ConcertAI under SAI Group", "Governance disruption; capital access restriction; potential distressed exit or fire-sale scenario", "10–15%"]
    notes: >-
      Thesis-break triggers are ordered by near-term probability. CEO vacancy is the highest-probability
      current trigger given the confirmed >12-month vacancy as of May 2026. FDA and HIPAA triggers
      have lower probability but highest severity. SAI Group trigger is material but less immediate
      given the ongoing Goldman Sachs-backed capital position.
    claimRefs: [CV027, CV028, CV029, CV030]

  - id: TV006
    title: Final diligence asks table
    columns: ["Diligence Ask", "Priority", "Rationale"]
    rows:
      - ["CEO identity confirmation and hire announcement", "Blocking", "CEO vacancy is the single most material open item; any investment commitment should be gated on this; relationship continuity with top pharma accounts depends on resolution"]
      - ["Audited trailing financials with NRR/GRR and ARR breakdown", "Blocking", "Revenue estimate is Crunchbase secondary; need trailing four-quarter P&L by product line (SaaS vs. project), net revenue retention, and gross revenue retention to validate multiple"]
      - ["Goldman Sachs round primary documentation: cap table, term sheet, preference stack", "Material", "All press URLs return 404; preference stack and liquidation waterfall determine effective equity value to common holders and to new entry investors"]
      - ["TeraRecon FDA clearance continuity status and ConcertAI HIPAA SOC 2 Type II certificate", "Material", "FDA-cleared imaging AI is a core product value driver; clearance continuity and active SOC 2 attestation are prerequisite for regulatory-grade customer contracts"]
      - ["SAI Group intercompany agreement terms: ownership, exit provisions, capital commitment", "Important", "Parent relationship determines capital backstop quality; must understand SAI Group exit rights, board control, and any change-of-control provisions affecting ConcertAI standalone path"]
    notes: >-
      Blocking items must be resolved before any investment commitment. Material items must be
      resolved before closing. Important items inform final pricing and structure. The five asks
      together would substantially reduce the medium-confidence rating to high-confidence if
      outcomes are satisfactory.
    claimRefs: [CV031, CV032, CV033, CV034, CV035]

