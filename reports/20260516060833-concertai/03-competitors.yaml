  evidenceGaps:
    - id: GP001
      topic: "flatiron-private-revenue"
      relatedQuestionRefs: [QP007]
      relatedTableRefs: [TP001]
      missingEvidence: >-
        Flatiron Health does not publicly disclose revenue or financial performance data as a
        Roche subsidiary. The $300M+ revenue estimate is based on analyst inference from the
        $1.9B acquisition price and typical SaaS multiples; no audited figure is available.
      whyItMatters: >-
        Flatiron is the most direct competitive benchmark for ConcertAI's regulatory RWE
        products. Without revenue data, it is impossible to assess relative market penetration,
        pricing power, or the competitive magnitude of Roche's backing.
      diligencePath: >-
        Request Roche annual report segment disclosures for Diagnostics / Healthcare IT division
        where Flatiron is reported; seek independent analyst estimates from healthcare IT
        research firms; ask ConcertAI management for competitive win/loss data against Flatiron.

    - id: GP002
      topic: "competitive-attrition-pricing"
      relatedQuestionRefs: [QP015, QP016]
      relatedTableRefs: []
      missingEvidence: >-
        No public evidence of specific ConcertAI customer defections to competitors or documented
        instances of competitive price undercutting in RFP outcomes. Win/loss data and competitive
        pricing dynamics in enterprise oncology analytics contracts are not publicly disclosed.
      whyItMatters: >-
        Customer retention rate and competitive win rate are key indicators of ConcertAI's moat
        strength. The absence of this data means key competitive risk assessments rely on
        structural inference rather than observable market outcomes.
      diligencePath: >-
        Request ConcertAI management's win/loss analysis and net revenue retention (NRR) data;
        conduct reference calls with 3–5 current pharma customers; seek former employee interviews
        on competitive dynamics; review any industry analyst reports on RWE vendor selection.

    - id: GP003
      topic: "oncology-rwe-data-quality-adverse"
      relatedQuestionRefs: [QP017]
      relatedTableRefs: []
      missingEvidence: >-
        No publicly available evidence of FDA adverse actions, data quality investigations, or
        published retractions citing any of the primary oncology RWE vendors (ConcertAI,
        Flatiron, Tempus, IQVIA) in the 2024–2026 period.
      whyItMatters: >-
        Data quality failures or regulatory adverse actions in the oncology RWE market could
        damage the entire vendor category's credibility, or concentrate regulatory trust in
        the vendor that has not faced such issues. The absence of known incidents does not
        eliminate the risk.
      diligencePath: >-
        Search FDA enforcement database, MedWatch, and Adverse Event Reporting System for any
        AI or RWE product-related actions; monitor FDA 510(k) database for TeraRecon product
        clearances and conditions; review academic literature for oncology AI performance
        replication studies.
