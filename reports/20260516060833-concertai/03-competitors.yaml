  - id: moat-durability-risk
    title: Moat Durability and Displacement Risk
    body: >-
      ConcertAI's competitive moats cluster into four durable and three at-risk categories.
      The durable moats are: (1) oncology data network depth—CancerLinQ's 9M+ patient
      records with deep clinical structure represent a years-long accumulation of EHR data
      from community oncology practices that cannot be replicated quickly; (2) integrated
      platform breadth—no direct competitor simultaneously covers imaging AI, EHR-derived
      RWE, genomic data integration, and AI-agent orchestration; (3) the ASCO/NCCN
      ecosystem connection, which provides reputational positioning in the oncology
      community; and (4) the NVIDIA alliance, which creates a near-term generative AI
      infrastructure advantage before the capability becomes commoditized. The at-risk
      moats are: (1) regulatory track record—Flatiron's longer FDA submission history
      constitutes a moat that ConcertAI is still building; (2) AI commoditization—as
      foundation models improve, the AI differentiation layer above proprietary data
      will compress in value, leaving data quality and network reach as the durable
      differentiators; and (3) Tempus's post-IPO growth trajectory—with public-market
      capital and accelerating data accumulation, Tempus could close the clinical data
      depth gap. The most acute displacement risk is IQVIA's potential to invest more
      aggressively in AI-native oncology analytics, leveraging its pharma incumbent
      position and global data scale to crowd out specialized vendors. A secondary risk
      is commoditization from general-purpose healthcare AI platforms (Palantir, IBM
      Merative successors) making oncology-specific analytics capabilities available at
      lower price points. ConcertAI's response—the Goldman Sachs $150M raise at $1.9B
      valuation in 2024, the Dewpoint Therapeutics partnership, and the NVIDIA alliance—
      suggests active moat reinforcement, but the durability window for AI differentiation
      is 18–36 months before broader commoditization.
