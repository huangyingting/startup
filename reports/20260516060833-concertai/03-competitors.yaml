  - id: switching-costs-lockin
    title: Switching Costs, Lock-in, and Multi-homing Dynamics
    body: >-
      Switching cost analysis across the oncology RWE ecosystem reveals a landscape where
      lock-in is real but partial, and multi-homing is common among the largest
      pharmaceutical customers. On the supply side, CancerLinQ's institutional integration
      creates data-contribution inertia: health systems that have contributed years of
      patient data to the network and adopted CancerLinQ's quality reporting tools (SmartLinQ)
      face a meaningful workflow disruption cost to switch to an alternative network. This is
      reinforced by CancerLinQ's ASCO provenance—its origin as a quality improvement program
      created by the preeminent oncology professional society gives it institutional legitimacy
      that competitors lack. Flatiron's lock-in mechanism is the deepest: OncoEMR's deployment
      as the primary EHR at oncology practices creates a switching cost that requires retraining
      clinical staff, migrating structured treatment data, and replacing billing and prior
      authorization workflows. This EHR-level lock-in translates into data exclusivity for
      Flatiron's RWE platform, as EHR data generated by OncoEMR practices flows naturally
      into Flatiron's research network. For pharma buyers, the switching cost is lower.
      Multi-homing—purchasing oncology data and analytics from multiple vendors—is standard
      practice at large pharmaceutical companies. A top-ten pharma may simultaneously use
      IQVIA for global market data, Flatiron or ConcertAI for regulatory RWE, Tempus for
      genomic data, and Komodo Health for commercial analytics. This multi-vendor approach
      reduces any single vendor's lock-in leverage but also reduces ConcertAI's ability to
      charge exclusivity premiums. IQVIA's distribution advantage derives not from switching
      costs per se but from its incumbent position in clinical operations budgets: its CRO
      and data-licensing relationships provide bundling opportunities that newer entrants
      cannot match. ConcertAI's SAI Group affiliation and Cognizant partnership provides
      enterprise IT implementation channels that support retention but do not constitute
      strong lock-in at the product level.
