  - number: 7
    title: Risks
    sections:
      - number: '7.1'
        title: Regulatory and Legal Risk Landscape
        blocks:
          - type: paragraph
            body: >-
              ConcertAI operates at the intersection of healthcare AI, large-scale patient data handling, and
              pharmaceutical regulatory submissions—three domains with intense and evolving compliance requirements. The
              FDA AI/ML-Based Software as a Medical Device Action Plan (January 2021) establishes a pre-determined
              change control plan (PCCP) framework for AI tools that update post-market. ConcertAI TeraRecon subsidiary
              operates FDA-cleared AI tools—DETECT for lung and liver nodule detection and Neuro for radiology—that must
              comply with this framework, including any modifications that require a new 510(k) or De Novo submission.
              Failure to file for material algorithm updates constitutes an unapproved device modification under 21 CFR
              Part 880 and would expose TeraRecon to FDA Warning Letter or consent decree risk. The FDA Real-World
              Evidence Framework and 21st Century Cures Act require that RWE used in regulatory submissions be fit for
              purpose: the data collection process must be reliable and appropriate for the specific regulatory context.
              ConcertAI ECA studies for pharma sponsors could face FDA challenge if CancerLinQ or TeraRecon data is
              found insufficiently complete, representative, or validated for the specific indication. Any FDA rejection
              of an ECA study relying on ConcertAI data would materially damage commercial reputation and trigger
              customer attrition in the pharma segment. HIPAA/HITECH exposure is heightened by CancerLinQ 9 million
              patient record database. A breach would trigger OCR investigation, potential civil monetary penalties of
              up to $1.9 million per violation category per year under the 2024 penalty structure, state AG enforcement,
              and class action litigation. HIPAA Journal breach statistics show healthcare organizations of comparable
              scale facing multi-million-dollar settlement obligations. FTC oversight of AI competition in healthcare is
              escalating: the FTC published guidance in June 2023 explicitly citing generative AI as raising competition
              concerns, and any acquisition of a competitor or exclusive data arrangement by ConcertAI could attract FTC
              scrutiny. OIG healthcare fraud enforcement applies broadly to data arrangements with pharmaceutical
              companies that could be characterized as improper financial relationships. IP infringement risk from
              competing AI systems—Tempus AI, Flatiron (Roche), and IQVIA—could result in patent disputes as each has
              deployed overlapping AI analytics capabilities. EU AI Act high-risk classification would apply to any
              ConcertAI AI tools used for oncology diagnosis or treatment decision support in European markets,
              triggering conformity assessment obligations before market entry.
