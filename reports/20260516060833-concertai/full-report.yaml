  - number: 6
    title: Customers
    sections:
      - number: '6.1'
        title: Customer Base Segmentation
        blocks:
          - type: paragraph
            body: >-
              ConcertAI's customer base divides into four structural segments differentiated by buyer persona, budget
              source, and primary use case. Pharmaceutical and biotech companies constitute the largest segment,
              estimated at 60–65% of revenue, engaging ConcertAI for regulatory real-world evidence studies, External
              Control Arm submissions, clinical trial AI, and commercial oncology intelligence. Budget owners span
              clinical operations, regulatory affairs, medical affairs, and commercial teams, enabling ConcertAI to
              penetrate multiple departments within a single account. The company's claim that 75% of top life science
              companies are customers positions it across large pharma and emerging biotech alike, though the precise
              definition of "customer" versus "account contact" is not publicly disambiguated. Health systems and cancer
              centers represent the second-largest segment, estimated at 20–25% of revenue, engaging primarily through
              the CancerLinQ platform for quality measure tracking, clinical trial matching, and evidence-based therapy
              selection. The 9 million-plus patient network anchors community oncology practice adoption. Diagnostics
              and genomics companies—including NeoGenomics, Foundation Medicine, and Guardant Health— form a third
              segment representing an estimated 10–15% of revenue via AI SaaS agreements and data integration
              partnerships that create bi-directional value: ConcertAI gains enriched multi-modal data assets while
              diagnostic partners gain AI workflow capabilities. CROs and academic research organizations represent the
              residual segment at approximately 5%, accessing patient cohort data through research agreements.
              TeraRecon's 2,000-plus global hospital customers provide a geographically diversified health system base
              that reduces dependence on US pharmaceutical budgets alone. Customer acquisition is supported by the
              Goldman Sachs network following the 2024 investment and by presence at oncology conferences including
              ASCO, ESMO, and the J.P. Morgan Healthcare Conference.
