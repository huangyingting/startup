      - number: '6.3'
        title: Retention, Expansion, and Concentration Risk
        blocks:
          - type: paragraph
            body: >-
              ConcertAI's retention and expansion dynamics differ markedly by segment and product type. For health
              systems using CancerLinQ, retention is structurally high: EHR integration and ongoing quality program
              participation create switching costs that disincentivize churn. Community oncology practices that have
              onboarded TriaLinQ for trial matching or SmartLinQ for quality benchmarking face meaningful implementation
              costs to migrate to an alternative platform. TeraRecon's 2,000-plus hospital customer base has persisted
              across the acquisition period, suggesting low churn in the radiology AI segment where PACS and workstation
              integrations are deeply embedded. For pharmaceutical customers, the model bifurcates between project-based
              ECA studies—which generate repeat business rather than contractual retention— and multi-year SaaS
              subscriptions for Precision Suite and Accelerated Clinical Trials, which carry higher retention
              visibility. ConcertAI has not publicly disclosed net revenue retention (NRR), gross revenue retention
              (GRR), or churn rates for any segment, preventing direct benchmarking against healthcare SaaS peers. The
              land-and-expand model is evident in the progression from single ECA studies to Precision Suite
              subscriptions and from single CancerLinQ modules to full suite deployments. Revenue expansion is further
              enabled by the diagnostics partnership model where NeoGenomics, Foundation Medicine, and Guardant Health
              generate recurring data licensing or SaaS revenue. Concentration risk is material but partially mitigated.
              The claim that 75% of top life science companies are customers implies a diversified pharma base, but the
              actual revenue distribution across accounts is not known. If five or fewer large pharma companies
              represent a disproportionate share of pharma revenue, a single program cancellation or strategic shift
              could materially impair revenue. Healthcare data breach incidents across the broader industry create
              operational and reputational risk that could affect customer retention in CancerLinQ's
              patient-data-dependent model. Pharma RWE and clinical development budgets are subject to pipeline-driven
              volatility, creating revenue lumpiness risk from the project-based ECA study model. Multi-year SaaS
              contracts reduce this risk for the subscription portion of the portfolio, but the mix between recurring
              and project revenue is not publicly disclosed.
