companyProfile:
  summary: >-
    ConcertAI (legal name: Concerto Healthcare Inc.) is a private, Cambridge/Boston-based healthcare AI company
    specialising in oncology real-world evidence (RWE), generative AI analytics, medical imaging AI, and clinical trial
    acceleration. The company was founded in 2017 by Jeff Elton, PhD, and operates within the SAI Group (SymphonyAI)
    ecosystem. Its product stack spans five divisions: Regulatory & Research (ECA, RWE tools), Precision Suite (GenAI
    for RWE, trial design, commercial intelligence), Clinical Development (Accelerated Clinical Trials), CancerLinQ (9M+
    patient oncology EHR network acquired from ASCO), and TeraRecon (FDA-cleared medical imaging AI). ConcertAI claims
    to serve 75% of top life science companies and 50% of the largest global healthcare providers. A reported $150M
    Goldman Sachs Asset Management investment at ~$1.9B valuation (June 2024) could not be confirmed from accessible
    primary sources as of May 2026. CEO Jeff Elton transitioned to Vice Chairman in May 2025; his named successor had
    not been publicly identified by the report date.
