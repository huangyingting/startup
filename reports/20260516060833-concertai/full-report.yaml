  - number: 4
    title: Financials
    sections:
      - number: '4.1'
        title: Revenue Streams and Business Model
        blocks:
          - type: paragraph
            body: >-
              ConcertAI's revenue model is structured across four primary streams, each operating under a distinct
              commercial mechanism. SaaS and subscription revenues—the highest-quality component—derive from annual or
              multi-year platform contracts for clinical trial software, CancerLinQ data access, the Precision Suite
              analytics platform, and the CARAai and Cadence Suite commercial tools. These contracts are typically
              enterprise-scale, multi-year agreements with pharmaceutical and biotechnology sponsors. The data analytics
              and RWE stream generates project-based fees for External Control Arm (ECA) studies, retrospective cohort
              analyses, and real-world evidence packages designed for FDA regulatory submissions; this segment is
              directly tied to biopharma R&D and clinical trial budgets, which are cyclical. Professional services
              revenues cover study design consulting, biostatistical support, regulatory dossier preparation, and EHR
              integration services—a labor-intensive segment with lower gross margins. The fourth stream, imaging AI via
              TeraRecon, combines perpetual software license revenue, annual maintenance contracts, and a growing SaaS
              migration component across its 2,000+ hospital and health system customer base. This hybrid model creates
              a layered annuity structure. Revenue quality is mixed: SaaS and perpetual maintenance fees are recurring
              and higher margin, while RWE/ECA project work is episodic and tied to biopharma spending cycles, creating
              concentration risk. ConcertAI's participation in active cancer clinical trials on ClinicalTrials.gov
              confirms ongoing pharma-sponsored engagement, a leading indicator for RWE revenue pipeline. The FDA's
              endorsement of real-world evidence in regulatory decision-making creates structural demand for ConcertAI's
              data analytics services, though HIPAA compliance obligations and FHIR interoperability standards impose
              ongoing technology and legal costs that affect the effective margin on this segment.
