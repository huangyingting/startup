      - number: '7.2'
        title: Operational, Technical, and Security Risk Landscape
        blocks:
          - type: paragraph
            body: >-
              The most immediate operational risk as of May 2026 is the leadership transition announced in May 2025:
              founder and CEO Jeff Elton moved to Vice Chairman while the company conducts a CEO search. No public
              announcement of a named replacement CEO has been identified, representing a sustained leadership gap of
              over twelve months. For a company at ConcertAI stage—$1.9 billion valuation, complex enterprise pharma
              relationships, active regulatory compliance programs—an extended CEO vacancy creates execution risk,
              customer relationship uncertainty, and strategic drift. Jeff Elton prominence as the ConcertAI brand in
              pharma executive and oncology research communities means his step-back creates key-person dependency risk
              that the Vice Chairman role only partially mitigates. The appointment of Michael Myshrall as CFO in August
              2024 suggests intentional C-suite professionalization ahead of a potential IPO or exit, but the CEO gap
              remains the dominant people risk. EHR integration fragility is a structural operational risk. CancerLinQ
              data extraction depends on ongoing connectivity to hundreds of community oncology practice EHR systems
              across Epic and Cerner platforms. EHR vendor policy changes, API version upgrades, practice consolidation,
              or system migrations can disrupt data flows and compromise data completeness. Any degradation in data
              completeness affects downstream RWE study quality and could impair FDA fit-for-purpose determinations. AI
              model drift is documented in clinical oncology AI: as treatment protocols evolve, patient populations
              shift, and real-world coding practices change, AI models trained on historical data can produce degraded
              or biased outputs without triggering obvious clinical alerts. ConcertAI AI models—including TeraRecon
              radiology AI and PrecisionExplorer cohort analytics—require ongoing monitoring and revalidation to
              maintain accuracy and clinical reliability. AWS cloud concentration creates operational dependency: a
              significant AWS regional outage could disrupt ECA study delivery timelines, clinical trial matching
              operations, and real-time radiology AI workloads simultaneously, with no evidence of multi-cloud
              redundancy from public disclosures. The oncology competitive landscape intensified significantly in
              2024-2025 with Tempus AI completing a public IPO, Flatiron Health (Roche) launching expanded RWE products,
              and IQVIA deploying its Deciphex and RWE capabilities—each competitor with resources to offer comparable
              or superior platforms at competitive pricing to ConcertAI pharmaceutical customer base.
