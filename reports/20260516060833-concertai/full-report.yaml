chapters:
  - number: 1
    title: Company Overview
    sections:
      - number: '1.1'
        title: Company Identity, Mission, and Legal Background
        blocks:
          - type: paragraph
            body: >-
              ConcertAI is a private healthcare technology company operating under the legal name Concerto Healthcare
              Inc. Its stated mission is to be "Leaders in Generative & Agentic AI Solutions Tailored for Life Sciences
              & Healthcare." The company is headquartered in the Cambridge/Boston, Massachusetts metropolitan area and
              is part of the SAI Group (formerly SymphonyAI Group) ecosystem, an AI-focused conglomerate led by Dr.
              Romesh Wadhwani. ConcertAI was founded by Jeff Elton, PhD, who served as CEO until a leadership transition
              in May 2025; Elton now holds the title of Vice Chairman. The company was historically known as Concerto
              Health AI, a name reflected in its legacy email domain (info@concertohealthai.com), before rebranding to
              ConcertAI to emphasize its AI-first positioning. Crunchbase reports an incorporation date of 2018, while
              the company's own investor page references 2017 as its founding year—an unresolved discrepancy. The
              company is classified as a private, growth-stage entity with its last publicly acknowledged funding type
              being Series C; Crunchbase tags it as a "Unicorn" implying a valuation above $1B.
