      - number: '2.3'
        title: Buyer, User, and Payer Segmentation
        blocks:
          - type: paragraph
            body: >-
              ConcertAI's customer base spans three primary buyer tiers, each with distinct budget ownership, decision
              timeline, and product-fit requirements. The largest tier— pharmaceutical and biotech companies—comprises
              three functional sub-segments: clinical development teams (buying regulatory-grade RWD and trial design
              AI), medical affairs functions (buying RWE generation and MSL intelligence tools), and commercial launch
              teams (buying GTM analytics and patient adherence products). Budget ownership within pharma ranges from VP
              Clinical Operations to Chief Commercial Officer, and contract values typically range from $500K to $10M
              per program or annual engagement. The second tier—health systems and academic cancer centers—purchases
              CancerLinQ products for quality measure reporting (SmartLinQ), clinical trial matching (TriaLinQ), and
              therapy selection support, and TeraRecon products for AI-powered imaging and biomarker detection. Budget
              ownership here falls to CMOs, CMIOs, and Radiology Medical Directors, with decision timelines typically
              extending 12–24 months due to institutional procurement complexity. ConcertAI claims 50% of the largest
              global healthcare providers as customers, though this figure is not independently verified. The third and
              emerging tier—health plan payers—acquires oncology outcomes tracking and cost management capabilities
              through CancerLinQ's PatientLinQ module. Payer interest is driven by the shift toward value-based oncology
              care arrangements and rising oncology benefit costs. The payer segment is currently the smallest revenue
              contributor but may represent the most durable long-run growth lever as payer reimbursement structures for
              oncology care continue to evolve. A critical observation is that the same underlying CancerLinQ patient
              data network simultaneously serves health systems (quality and trials), pharma (RWE and evidence
              generation), and payers (outcomes analytics), creating multi-sided value that reinforces the data
              network's strategic moat. ConcertAI's data network of 9M+ oncology patients through CancerLinQ is a key
              differentiating asset across all three buyer tiers.
