  - number: 5
    title: Product & Technology
    sections:
      - number: '5.1'
        title: Product Portfolio and Module Map
        blocks:
          - type: paragraph
            body: >-
              ConcertAI organizes its product portfolio into seven divisions unified by a common AI backbone (CARAai)
              and a shared multi-modal oncology data foundation. The Regulatory and Research division anchors the
              company's original value proposition: External Control Arms (ECA) for FDA-submission-grade RWE comparator
              studies, Comparative Cohort Analysis for retrospective observational studies, and Feasibility Assessment
              for trial design planning. The Precision Suite, launched in May 2025, elevated this capability to a
              GenAI-powered platform with three modules—PrecisionExplorer (natural language RWE queries),
              PrecisionTrials (AI protocol optimization), and PrecisionGTM (commercial oncology intelligence)—targeting
              both research and commercial pharma workflows. The CancerLinQ division, acquired from ASCO, operates the
              largest community oncology patient network in the United States at 9 million or more patient records,
              supported by four sub-modules: SmartLinQ (quality tracking), TriaLinQ (trial matching), RxLinQ (therapy
              selection), and PatientLinQ (cohort management). TeraRecon provides radiology AI serving 2,000 or more
              global hospital customers through AV/Intuition 3D visualization, DETECT AI biomarker detection, and Neuro
              for neurovascular emergency imaging. Accelerated Clinical Trials (February 2026) and Cadence Suite (April
              2026) represent the newest additions, extending ConcertAI into agentic clinical trial management and
              commercial oncology field intelligence respectively. Patient360, Translational360, and Precision360 round
              out the research analytics portfolio. CARAai serves as an internal AI platform orchestrating large
              language models from multiple vendors across all product lines.
