      - number: '7.4'
        title: Mitigations, Kill Criteria, and Monitoring Indicators
        blocks:
          - type: paragraph
            body: >-
              For each material risk identified in this chapter, a mitigation posture can be partially assessed from
              public evidence, and investment thesis-break triggers can be defined as monitorable events. On regulatory
              risk, ConcertAI engagement with FDA guidance processes and formal FDA clearances for TeraRecon tools
              indicate active compliance investment; however, the adequacy of pre-determined change control plans for
              post-market AI updates cannot be verified without data room access to QMS documentation. HIPAA risk
              mitigation includes HIPAA Business Associate Agreement structures with data-providing healthcare
              organizations, but the depth of data encryption, access controls, and breach response planning is not
              publicly disclosed. The thesis-break trigger for regulatory risk is an FDA warning letter, consent decree,
              or market withdrawal affecting a TeraRecon or CancerLinQ product; any OCR breach enforcement action
              involving CancerLinQ patient data; or an FTC challenge to a ConcertAI acquisition or exclusive data
              arrangement. For the CEO gap risk, the thesis-break trigger is an extended search beyond Q4 2026 with
              concurrent departure of more than two key executives, or loss of a major pharma customer citing leadership
              uncertainty. For financial risks, the thesis-break trigger is failure to raise a follow-on round within 24
              months of the June 2024 Goldman investment at a flat or down valuation, or public disclosure that SAI
              Group has reduced its financial support. For partner dependency risks, thesis-break events include public
              dissolution of the NVIDIA alliance, loss of the Foundation Medicine data supply arrangement, or a SAI
              Group restructuring that removes ConcertAI parent support. Monitoring indicators include: FDA docket
              updates for TeraRecon-related 510(k) filings; HHS OCR breach report database for any ConcertAI or
              CancerLinQ-related incident; FTC AI competition enforcement press releases; SEC filings of public pharma
              customers for budget discussions mentioning ConcertAI; and ConcertAI newsroom and LinkedIn for leadership
              appointment announcements. The most critical data-room requests are QMS and pre-determined change control
              plan for TeraRecon AI tools; HIPAA breach risk assessment and penetration testing results; trailing
              four-quarter revenue by customer and product line; CEO search status and succession plan documentation;
