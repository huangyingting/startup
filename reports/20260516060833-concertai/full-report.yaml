      - number: '5.2'
        title: Technology Architecture and AI Platform
        blocks:
          - type: paragraph
            body: >-
              ConcertAI's technology stack is built on three foundational infrastructure pillars: Amazon Web Services
              for HIPAA-compliant cloud compute and storage, NVIDIA NeMo and BioNeMo frameworks for GPU-accelerated AI
              model training and inference, and HL7 FHIR R4 as the primary interoperability standard for clinical data
              exchange. AWS provides the cloud backbone for CancerLinQ's data ingestion and storage, PrecisionExplorer's
              GenAI query engines, and ConcertAI's MLOps pipelines; HIPAA Business Associate Agreements with AWS govern
              patient data security requirements. The NVIDIA collaboration—deepened to include AI agent development for
              oncology trials in 2026—enables ConcertAI to train oncology-specific foundation models using BioNeMo and
              to deploy high-performance inference for real-time ECA and RWE workloads via NeMo. CARAai, ConcertAI's
              proprietary multi-LLM orchestration layer, routes analytical queries to the optimal AI model from among
              GPT, Claude, and proprietary oncology models based on task type and domain specificity, providing a
              unified AI interface across all product divisions. This architecture allows new AI model versions to be
              integrated without re-engineering individual product modules. EHR connectors for Epic, Cerner, and
              Meditech automate structured data ingestion for the CancerLinQ network, using FHIR R4 APIs and C-CDA
              document exchange for both real-time and batch transfers. Partner data integrations add multi-modal depth:
              Foundation Medicine genomic sequencing data and Guardant Health liquid biopsy ctDNA are linked at the
              patient level with CancerLinQ clinical data. TeraRecon's imaging platform operates in a hybrid model with
              on-premise radiology workstations alongside cloud connectivity, processing DICOM images via PACS/RIS
              integration for AI biomarker detection workflows.
