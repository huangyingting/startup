      - number: '4.2'
        title: Unit Economics and Cost Structure
        blocks:
          - type: paragraph
            body: >-
              ConcertAI's unit economics reflect a business that spans high-margin SaaS and data analytics on one side
              and lower-margin professional services and imaging maintenance on the other. The SaaS and data analytics
              segment is estimated to carry gross margins of 60–75%, consistent with comparable oncology data platform
              companies. Professional services gross margins are estimated in the 30–40% range due to labor intensity in
              study design, biostatistics, and regulatory submission support. The imaging AI segment (TeraRecon) is
              estimated at 45–60% gross margin blended, reflecting the legacy perpetual-license installed base being
              migrated to SaaS, where maintenance contracts carry higher margins than new implementation services.
              Blended company gross margins are estimated at 55–65%, depending on revenue mix. The primary cost of goods
              sold drivers are data acquisition and network maintenance costs for the CancerLinQ 9M+ patient record set,
              cloud and GPU compute infrastructure (including NVIDIA partnership costs), and labor for professional
              services delivery. Research and development spending is substantial, covering AI model training for
              CancerLinQ analytics, TeraRecon imaging AI, and agentic AI capabilities deployed in the Accelerated
              Clinical Trials product. Working capital is elevated by EHR integration costs for health system data
              partnerships and the upfront investment required to onboard new CancerLinQ network contributors. Sales
              cycles are long (9–18 months for enterprise pharma contracts) and customer acquisition costs are high,
              reflecting the need for clinical, regulatory, and IT stakeholder alignment. HIPAA compliance and FHIR
              interoperability requirements impose ongoing technology and legal overhead that compress net margins
              relative to pure-software peers. The NVIDIA alliance, while providing differentiated AI compute
              capability, also creates a cost dependency on GPU infrastructure that may not fully recede as AI
              capabilities commoditize. Based on sector benchmarks, ConcertAI's operating loss position is likely
              significant given these structural cost drivers and the level of investment required to maintain a
              competitive data network at scale.
