      - number: '8.3'
        title: Scenario Analysis, Exit Readiness, and Final Verdict
        blocks:
          - type: paragraph
            body: >-
              Three scenarios frame the probability-weighted investment return. In the bull case (20% probability),
              ConcertAI sustains 30%+ revenue growth to reach $500M+ by 2028, leverages the NVIDIA partnership and FDA
              regulatory track record to command a 12–20× strategic or IPO premium multiple, and achieves a $6–10B exit
              valuation. Key bull assumptions are that the new CEO maintains pharma customer relationships and
              accelerates product expansion, that ConcertAI's FDA ECA track record is validated by at least two
              successful regulatory submissions, and that IPO market conditions improve sufficiently to support an
              oncology AI float at scale. In the base case (55% probability), revenue grows to $300–400M by 2028 at a
              decelerating ~22% CAGR, the company is acquired by a strategic buyer—most likely a large pharma data
              company (Roche/Flatiron expansion, J&J data strategy), an EHR vendor seeking oncology analytics depth, or
              a CRO with regulatory ambitions—at 10–14× revenue, implying a $3–5B exit. In the bear case (25%
              probability), growth disappoints due to Tempus AI competitive pressure, CEO vacancy-related customer
              attrition, or a regulatory enforcement action; revenue stalls at $200–250M by 2028 at a ~13% CAGR; and the
              company faces a down-round or distressed strategic sale at 6–9× revenue, implying $1.2–2.3B—representing a
              near or below current valuation outcome. The probability-weighted enterprise value is approximately
              0.20×$8B + 0.55×$4B + 0.25×$1.7B ≈ $4.0B, a 2.1× multiple on current implied entry at $1.9B—meeting but
              not exceeding the 2× return floor for the risk profile. Exit readiness is moderate. ConcertAI shows
              institutional-grade characteristics: Goldman Sachs investor relationship, NVIDIA partnership, CFO (Michael
              Myshrall) hired August 2024, active cancer trial registry presence, and a multi-product platform
              addressing validated pharma workflow pain points. However, the CEO vacancy, opaque financials, absence of
              SOC 2 Type II public certification, and unverifiable cap table create an exit preparation gap that would
              need to be addressed before any IPO roadshow or structured M&A process. The Cadence Suite commercial
              analytics product launch and the JP Morgan Healthcare Conference 2024 presentation signal commercial
              maturity but do not substitute for the missing governance artifacts. The final diligence asks are: CEO
              identity confirmation (blocking gate), audited financials with NRR/GRR disclosure (blocking gate), Goldman
              Sachs round documentation including cap table and preference stack (material), TeraRecon FDA clearance
              continuity confirmation and SOC 2 Type II status (material), and SAI Group intercompany agreement terms
              (important). Thesis-break triggers are FDA enforcement on any ECA or RWE product, a HIPAA breach in
              CancerLinQ involving material patient records, CEO vacancy extension beyond November 2026, or SAI Group
              formal divestiture announcement.
