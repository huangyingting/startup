              spans six confirmed relationships across pharma, technology, and diagnostics announced between December
              2024 and January 2026. NVIDIA's alliance for oncology AI agents (March 2025) signals technology-partner
              validation of the AI platform. Bayer's strategic clinical development agreement (April 2025) represents
              enterprise pharma adoption for RWE and trial AI. Foundation Medicine's genomic data integration (January
              2026), NeoGenomics' hematology/oncology AI SaaS (December 2024), and Guardant Health's liquid biopsy ctDNA
              collaboration (January 2025) demonstrate that diagnostics companies are both customers and co-development
              partners. Dewpoint Therapeutics' translational oncology partnership (December 2024) validates early-stage
              biotech adoption. Historical references to AbbVie and Caris Life Sciences as customers suggest a broader
              undisclosed pharma base. The appointment of Shawn W. Bates as General Manager of Commercial Solutions in
