      - number: '3.2'
        title: Capability, Pricing, and GTM Comparison
        blocks:
          - type: paragraph
            body: >-
              Capability comparison across the competitive set reveals distinct differentiation axes. In oncology RWE
              analytics, ConcertAI, Flatiron, and Tempus AI are the only vendors with oncology-specific EHR-derived
              patient cohort capabilities at scale. ConcertAI's External Control Arms competes directly with Flatiron's
              FDA-accepted RWE products, but Flatiron's longer track record of accepted submissions gives it a
              regulatory trust advantage. In clinical trial AI, ConcertAI's Accelerated Clinical Trials (launched
              February 2026), Tempus AI's TIME Trial, and IQVIA's trial optimization services represent the three main
              competing offerings in AI-assisted trial design and patient matching for oncology. Imaging AI is a unique
              ConcertAI strength through TeraRecon's 2,000+ customer base—neither Tempus nor Flatiron directly compete
              in AI-powered radiology and imaging analytics. In genomics and multi-omics, Tempus has a clear advantage
              from its core genomic sequencing business, while ConcertAI addresses this gap through its Foundation
              Medicine and NeoGenomics integrations rather than native sequencing capability. Commercial analytics is a
              shared battleground between ConcertAI (PrecisionGTM, Cadence Suite), Komodo Health, and IQVIA's commercial
              intelligence division. On pricing, none of the primary competitors publish list pricing; enterprise
              contract values are negotiated and range from six figures for project-based engagements to multi-year
              platform deals in the $1M–$10M range. GTM posture differs markedly: Flatiron and IQVIA benefit from deep
              incumbent pharma relationships established over 10+ years, while Tempus leverages its genomic testing
              installed base as a land-and-expand wedge. ConcertAI's NVIDIA alliance provides a generative AI
              differentiation vector that no direct competitor has matched with a comparable publicly announced
              partnership. Veeva Systems' Vault CDMS occupies a complementary but distinct niche in clinical data
              management rather than RWE analytics.
