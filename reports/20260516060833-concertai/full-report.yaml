      - number: '7.3'
        title: Partner, Dependency, and Financial Risk Landscape
        blocks:
          - type: paragraph
            body: >-
              ConcertAI strategic position depends heavily on critical partnerships and parent relationships whose
              stability cannot be fully assessed from public disclosures. The most significant structural dependency is
              on SAI Group as the parent or controlling entity. Any change in SAI Group strategic priorities, financial
              position, or management could disrupt capital access, strategic direction, and organizational stability
              underlying ConcertAI platform investments. The Goldman Sachs Asset Management $150 million strategic
              investment in June 2024 provides an estimated 18-24 months of operating runway at typical enterprise AI
              burn rates, but without public disclosure of burn rate or remaining cash position, the capital adequacy
              cannot be independently verified. If ConcertAI requires additional capital before a liquidity event,
              Goldman Sachs or SAI Group support is presumed but not contractually guaranteed from public evidence. The
              NVIDIA partnership for oncology AI agents is operationally important: access to NVIDIA GPU infrastructure,
              BioNeMo large language model training resources, and NeMo framework tooling underpins Accelerated Clinical
              Trials and Precision Suite AI capabilities. Any NVIDIA pricing change, access restriction, or competing
              oncology AI investment by NVIDIA would affect ConcertAI AI infrastructure cost structure and competitive
              differentiation. Foundation Medicine (Roche) supplies genomic data for multi-modal RWE studies;
              exclusivity terms are not publicly disclosed, and Foundation Medicine is also a competitor in the
              precision oncology analytics market. Revenue concentration risk is material: ConcertAI claim of 75%
              top-life-science-company coverage does not disclose individual account revenue, and if five or fewer large
              pharma accounts represent more than 40% of revenue, a single program cancellation or budget reallocation
              could create material revenue impairment. Pharma RWE and clinical development budgets are subject to
              pipeline-driven volatility: industry-wide patent cliff dynamics in 2025-2028 could reduce ECA study
              budgets. Financial model risk includes uncertainty about the mix between recurring SaaS revenue and
              project-based ECA study revenue—a mix with materially different valuation implications at the reported
              $1.9 billion enterprise value and implied approximately 12x revenue multiple on estimated $160 million
