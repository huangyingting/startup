      - number: '5.5'
        title: Trust, Safety, Compliance, and Quality Controls
        blocks:
          - type: paragraph
            body: >-
              ConcertAI operates within a complex multi-layered compliance environment that spans patient privacy law,
              FDA regulatory frameworks for both real-world evidence and AI medical devices, and emerging AI governance
              requirements. All products processing protected health information are governed by HIPAA and HITECH,
              requiring Business Associate Agreements with every health system partner and cloud provider. The 21st
              Century Cures Act mandates that ConcertAI's CancerLinQ platform implement FHIR R4 APIs for patient data
              portability and prohibits information blocking practices that would restrict interoperability with
              patient-authorized third parties. For its RWE products, ConcertAI aligns with the FDA Real-World Evidence
              Framework published in December 2018, which establishes study design, data quality, and analysis standards
              for RWD to support regulatory submissions. This framework governs how ECA studies are designed and
              documented for FDA review. TeraRecon's AI radiology products— DETECT and Neuro—fall under FDA AI/ML
              Software as a Medical Device guidance, requiring transparency about AI performance, bias evaluation, and
              post-market monitoring for clinical decision support software. Data governance within the CancerLinQ
              research network operates under IRB oversight protocols, and patient data de-identification follows HIPAA
              Safe Harbor and Expert Determination methods. ConcertAI's SOC 2 Type II status has not been publicly
              confirmed, representing a gap that should be verified during due diligence; this standard is expected for
              any enterprise healthcare SaaS provider. AI safety controls for GenAI features (PrecisionExplorer, CARAai)
              must address hallucination risk and output validation given the regulatory-grade use case of RWE
              generation. The risk that AI-generated evidence is used incorrectly in regulatory submissions is a
              material compliance and liability concern.
