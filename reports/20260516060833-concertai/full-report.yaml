  - id: FU001
    type: journey-map
    title: Customer Journey Map
    description: >-
      End-to-end customer journey for a representative pharmaceutical sponsor engaging ConcertAI, from initial awareness
      through production deployment and expansion across additional pipeline programs and product modules.
    claimRefs:
      - CU001
      - CU030
      - CU031
    data:
      items:
        - label: Awareness
          detail: >-
            Pharma clinical ops or medical affairs team becomes aware of ConcertAI through ASCO/ESMO/J.P. Morgan
            conference presence, Goldman Sachs network introduction, or peer pharma company reference.
          touchpoints:
            - ASCO and ESMO conference presence and podium presentations
            - J.P. Morgan Healthcare Conference (Jan 2025 presentation confirmed)
            - Goldman Sachs Asset Management portfolio network post-2024 investment
        - label: Evaluation
          detail: >-
            Clinical ops and regulatory affairs evaluate ConcertAI for ECA feasibility or RWE study design; request
            platform demo and pilot data scoping. Benchmarked against Flatiron Health, IQVIA, and TriNetX alternatives.
          touchpoints:
            - Feasibility Assessment module demo for trial design viability
            - RFP or direct outreach to ConcertAI commercial team
            - Comparison against Flatiron / IQVIA / TriNetX platform capabilities
        - label: Procurement
          detail: >-
            Procurement and legal teams negotiate Master Service Agreement, data access schedule, and Statement of Work;
            budget approval from clinical development or medical affairs budget holders.
          touchpoints:
            - MSA/SOW execution with ConcertAI legal and commercial team
            - HIPAA BAA and data access agreement review
            - Budget approval from VP Clinical Operations or VP Medical Affairs
        - label: Onboarding
          detail: >-
            ConcertAI implementation team provisions data access and configures cohort parameters; for SaaS products,
            API or platform integration established. ECA customers receive protocol design support from ConcertAI data
            scientists.
          touchpoints:
            - Data cohort specification and IRB protocol alignment
            - Platform API access provisioning or EHR integration setup
            - ConcertAI data scientist assigned to study design
        - label: Active Use
          detail: >-
            Customer uses ConcertAI platform for ECA study execution, trial feasibility analysis, or SaaS analytics
            workflows. Study results delivered for regulatory filing or internal decision-making.
          touchpoints:
            - ECA study execution and results delivery for FDA submission package
            - PrecisionExplorer RWE queries or PrecisionTrials protocol optimization
            - CancerLinQ trial matching (TriaLinQ) for site and patient identification
        - label: Expansion
          detail: >-
            Successful ECA study triggers additional pipeline program sponsorship or Precision Suite SaaS upsell; health
            system expands CancerLinQ module usage. NVIDIA, Bayer, Foundation Medicine partnerships illustrate
            multi-product expansion.
          touchpoints:
            - Additional ECA studies across drug pipeline programs
            - Precision Suite SaaS subscription upsell (PrecisionTrials, PrecisionGTM)
            - Accelerated Clinical Trials agentic AI for expanded trial operations
