      - number: '3.1'
        title: Competitive Landscape Overview
        blocks:
          - type: paragraph
            body: >-
              ConcertAI operates in a competitive environment defined by five archetypes. First, direct oncology RWE
              peers: Tempus AI (Nasdaq: TEM) and Flatiron Health (a Roche subsidiary since 2018) are the most proximate
              competitors, each offering oncology data platforms with clinical trial matching and real-world evidence
              generation. Tempus went public in June 2024 and reports partnerships with 6,500+ oncologists and access to
              40M+ patient records, making it both the best-funded and fastest-growing direct peer. Flatiron's
              competitive advantage rests on its OncoEMR EHR system deployed across oncology practices and its long
              regulatory track record with FDA submissions, anchored by Roche's ~$1.9B acquisition in 2018. Second,
              large incumbent data and CRO companies: IQVIA (NYSE: IQV, $14B+ annual revenue) is the dominant incumbent
              in pharma data and CRO services, with its Real World Solutions division and Oncology Analytics products
              creating a coverage overlap with ConcertAI's biopharma customer segment. Veeva Systems (NYSE: VEEV)
              dominates clinical trial data management through Vault CDMS and is complementary rather than substitutable
              for most ConcertAI use cases. Third, clinical trial network vendors: TriNetX provides a trial feasibility
              and protocol-design network with 40M+ patient records, primarily targeting academic medical centers.
              Fourth, adjacent precision oncology platforms: Syapse focuses on health-system-facing clinical decision
              support and real-world registry management. Komodo Health claims the largest US longitudinal patient
              dataset (325M+ patients) but with less oncology clinical granularity. Fifth, enterprise AI platforms:
              Palantir's AIP product competes at the data integration and AI orchestration layer in pharma, serving as a
              potential substitute for internal analytics infrastructure at large biopharmaceutical companies. IBM's
              former Watson Health division, divested in 2022 and now operating as Merative, represents a reduced but
              still-active legacy participant in healthcare analytics. The status-quo alternative for pharma buyers
              remains internal biostatistics teams combined with point-solution vendors for specific analytics tasks,
              which ConcertAI displaces by offering an integrated end-to-end oncology RWE and trial platform.
