      - number: '1.2'
        title: Product Portfolio and Technology Platform
        blocks:
          - type: paragraph
            body: >-
              ConcertAI organizes its products into five divisions that collectively span the pharmaceutical, biotech,
              and health system value chains. The Regulatory & Research division offers External Control Arms (providing
              regulatory-grade real-world data for clinical trials), Comparative Cohort, Feasibility Assessment,
              Precision Explorer, Patient360, Translational360, and Precision360. The Precision Suite (launched May
              2025) targets commercial drug developers with PrecisionExplorer (GenAI for RWE insights), PrecisionTrials
              (AI-powered trial design), and PrecisionGTM (oncology commercial intelligence). The Clinical Development
              division, anchored by Accelerated Clinical Trials (launched February 2026) and Patient Matching &
              Automation, provides site-workflow solutions. CancerLinQ—acquired from ASCO (American Society of Clinical
              Oncology)—aggregates data from 9+ million patients across participating cancer care providers' EHR
              systems, offering SmartLinQ (quality measures), TriaLinQ (trial matching), RxLinQ (therapy selection), and
              PatientLinQ (care cohort tools). TeraRecon (an acquired company now operating under a separate
              terarecon.com domain) provides medical imaging AI including AV (Advanced Visualization), Intuition
              (high-performance visualization), DETECT (AI biomarker detection), and Neuro (neurovascular emergency AI),
              with over 2,000 global customers as of September 2025. ConcertAI also operates CARAai, a multi-LLM AI
              platform. The Cadence Suite for commercial oncology patient-support teams launched in April 2026.
