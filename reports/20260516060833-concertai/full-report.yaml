      - number: '1.6'
        title: Regulatory Context and Market Dynamics
        blocks:
          - type: paragraph
            body: >-
              ConcertAI's core RWE business operates within a regulatory environment shaped by the FDA's 21st Century
              Cures Act (Section 505F), which established the use of real-world data (RWD) and real-world evidence (RWE)
              in drug evaluation. The FDA Real-World Evidence Framework (December 2018) sets "fit for purpose"
              requirements that RWD must meet in quality and relevance before supporting regulatory submissions. FDA's
              January 2021 AI/ML-Based Software as a Medical Device (SaMD) Action Plan extends this oversight to
              AI-driven medical products, requiring premarket review, Algorithm Change Protocols, and postmarket
              performance monitoring—raising the compliance bar for TeraRecon's imaging AI tools and any AI products
              seeking FDA clearance. The market is competitive: Flatiron Health (a Roche Group affiliate and claimed
              pioneer in oncology RWE since 2012) and Tempus AI (with 6,500+ oncologists, 40M+ patient records, and
              4,500+ healthcare institutions) represent substantial incumbents. These competitive dynamics, combined
              with FDA's stringent oversight of AI/ML medical software, create meaningful market headwinds that
              ConcertAI must navigate to sustain its claimed leadership position.
