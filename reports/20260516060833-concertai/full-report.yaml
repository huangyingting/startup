  - number: 2
    title: Market Analysis
    sections:
      - number: '2.1'
        title: Market Boundary, Scope, and Substitutes
        blocks:
          - type: paragraph
            body: >-
              ConcertAI's addressable market is defined by the intersection of oncology-specialized real-world data
              (RWD) analytics, artificial-intelligence-enabled clinical trial technology, oncology imaging AI, and
              commercial oncology intelligence. The market boundary excludes general-purpose electronic medical record
              (EMR) vendors, primary diagnostics hardware, and non-oncology-specific population health platforms. Within
              the included perimeter, five distinct segment-categories capture ConcertAI's product footprint: (1)
              oncology RWE analytics serving pharmaceutical and biotech regulatory and medical affairs functions; (2)
              clinical trial technology for oncology-focused AI-assisted trial design and patient matching; (3) oncology
              imaging AI serving radiology departments through the TeraRecon acquisition; (4) large-scale oncology EHR
              data networks via CancerLinQ's 9M+ patient footprint; and (5) commercial oncology intelligence products
              launched in 2025–2026. Primary status-quo substitutes are IQVIA (dominant incumbent with >$14B in
              revenue), Tempus AI (publicly traded, NYSE: TEM), Flatiron Health (a Roche affiliate), and TriNetX.
              Adjacent market opportunities include payer analytics and population health management. The global cancer
              burden—approximately 10 million deaths and 20 million new cases annually per WHO—establishes the
              structural demand signal underpinning all five market segments. ConcertAI's market is distinctly B2B:
              pharmaceutical companies, health systems, and health plan payers are the primary customers, not individual
              patients or physicians directly. The convergence of rising cancer incidence, FDA regulatory emphasis on
              real-world evidence, and broad enterprise AI adoption creates a durable structural tailwind that defines
              the market's long-run expansion trajectory.
