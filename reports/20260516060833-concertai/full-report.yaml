      - number: '2.2'
        title: TAM, SAM, and SOM Sizing
        blocks:
          - type: paragraph
            body: >-
              Multiple sizing lenses—each with different scope, methodology, and confidence—are required to bound
              ConcertAI's total addressable, serviceable addressable, and serviceable obtainable markets. The global
              oncology AI market is estimated at $1.5B–$3B currently and projected to reach $15B–$25B by 2030 at a
              35–45% CAGR, according to third-party analyst synthesis from MarketsandMarkets and Mordor Intelligence.
              The broader RWE solutions market—which includes oncology as well as other therapeutic areas—is estimated
              at $2.5B–$5B and growing at 12–20% CAGR. The clinical trial technology market adds an estimated $5B–$10B
              in scope, though definitional overlap with contract research organization (CRO) services and site
              management organizations complicates clean estimation. Taken together, the three verticals imply a
              combined TAM of $20B–$30B by 2030, though this reflects a ceiling for an integrated platform capturing all
              segments rather than any single-vendor realistic capture. The SAM for biopharma-facing oncology RWE and AI
              is estimated at $3B–$5B, derived through a bottom-up lens anchored in PhRMA's reported $100B+ in annual
              global R&D spend: the oncology share of that spend, the fraction allocated to RWE and data analytics, and
              ConcertAI's product footprint collectively bound the SAM. ConcertAI's SOM is proxied by its estimated
              ~$160M in annual revenue, growing at a reported 35% rate. Projected toward a $500M+ revenue target over
              3–5 years, the SOM implies a 10–17% penetration of the SAM by 2030—an aggressive but not implausible
              outcome given the company's established data assets and customer relationships with 75% of top life
              science companies per its own claims. All market estimates carry medium-to-low confidence and should be
              stress-tested against independently auditable data points.
