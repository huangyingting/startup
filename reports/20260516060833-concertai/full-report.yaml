    approximationNotes: >-
      TeraRecon retention estimate assumes high structural stickiness from PACS/workstation integration; healthcare
      imaging AI SaaS peers typically report 88–94% gross retention. CancerLinQ estimate assumes community practice
      switching costs from EHR connectivity and quality program participation; offset by lower budget priority vs.
      health system core IT. Pharma ECA retention reflects project-based model where "retention" means repeat
      sponsorship; industry analogs suggest 60–75% repeat project rate for RWE platform vendors. Precision Suite
      estimate is Year-1 only; insufficient time elapsed for Year-2 measurement.
