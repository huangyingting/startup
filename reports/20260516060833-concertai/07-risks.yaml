        Regulatory and legal risks enumerated from FDA guidance documents (AI/ML SaMD Action Plan,
        RWE Framework), HHS OCR enforcement records, FTC AI competition guidance, OIG fraud
        enforcement materials, and ConcertAI public disclosures through May 2026. Covers only
        publicly observable regulatory and legal risks; private litigation, undisclosed regulatory
        correspondence, and confidential enforcement inquiries are excluded. EU AI Act applicability
        is inferred from product description and has not been confirmed by ConcertAI public
        disclosure.
