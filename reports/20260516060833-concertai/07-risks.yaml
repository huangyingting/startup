  evidenceGaps:
    - id: GR001
      type: private-evidence-only
      severity: material
      topic: regulatory-legal-risk-register-incompleteness
      missingEvidence: >-
        The regulatory/legal risk register (TR001) is a partial enumeration of observable risks
        derived from public regulatory guidance, HHS enforcement databases, FTC publications, and
        ConcertAI newsroom disclosures through May 2026. Private litigation, undisclosed regulatory
        correspondence, pending enforcement inquiries, and confidential FDA feedback letters are
        not observable from public sources. ConcertAI has not published a risk factors section
        as would appear in an S-1 or 10-K, and no independent risk assessment of the company
        compliance programs has been publicly disclosed. EU AI Act applicability is assessed on
        inference from product descriptions; ConcertAI has not publicly confirmed EU revenue or
        product deployments. HIPAA BAA scope, terms, and compliance history are not publicly
        available.
      whyItMatters: >-
        Undisclosed regulatory inquiries, private litigation, or FDA informal feedback adversely
        characterizing CancerLinQ or TeraRecon data quality could be material to the investment
        thesis. A company at $1.9 billion valuation with 9 million patient records and FDA-cleared
        AI tools is a natural target for regulatory attention. A single significant enforcement
        action in any identified risk category could trigger valuation impairment of 20-40% based
        on comparable healthcare AI enforcement case outcomes.
      diligencePath: >-
        Request: (1) complete FDA submission history for all TeraRecon AI tools including 510(k)
        numbers, clearance dates, and post-market surveillance reports; (2) QMS documentation and
        PCCP for all AI tool versions; (3) HIPAA risk analysis, penetration test reports, and BAA
        registry; (4) legal representations on pending or threatened litigation; (5) EU AI Act
        applicability assessment from legal counsel; (6) OIG compliance program documentation.
      relatedQuestionRefs: [QR001, QR002, QR003, QR005, QR009]
      relatedTableRefs: [TR001]

    - id: GR002
      type: undiscoverable-without-disclosure
      severity: material
      topic: CEO-search-status-and-succession-plan
      missingEvidence: >-
        The identity of ConcertAI new CEO (or any named interim CEO) has not been publicly
        announced as of May 2026. CEO search timeline, candidate shortlist, and board succession
        governance are not publicly disclosed. Jeff Elton role as Vice Chairman provides partial
        leadership continuity but does not resolve the strategic leadership gap. No ConcertAI
        press release, LinkedIn announcement, or news article confirming a new CEO appointment
        has been identified through the research period.
      whyItMatters: >-
        CEO vacancy for over 12 months at a company executing two major product launches
        (Accelerated Clinical Trials February 2026, Cadence Suite April 2026) and managing
        multiple named enterprise partner relationships creates a material execution risk.
        Enterprise pharma procurement decisions for multi-year SaaS contracts typically require
        CEO-level engagement, and extended vacancy signals strategic uncertainty that procurement
        risk committees will flag during vendor qualification reviews.
      diligencePath: >-
        Request: (1) CEO search status: timeline, search firm engaged, target hire date; (2) board
        succession plan and governance protocol during vacancy; (3) interim operating authority
        structure; (4) customer relationship ownership mapping by named account; (5) confirmation
        of whether any customer has cited leadership uncertainty in a renewal conversation.
      relatedQuestionRefs: [QR013]
      relatedTableRefs: [TR004]

    - id: GR003
      type: private-evidence-only
      severity: material
      topic: financial-risk-opacity-burn-rate-revenue-concentration
      missingEvidence: >-
        ConcertAI has not publicly disclosed burn rate, monthly cash consumption, remaining cash
        balance post-June 2024 investment, or revenue concentration by customer or product line.
        The split between recurring SaaS revenue and project-based ECA study revenue is not
        determinable from public sources, preventing accurate valuation modeling. No audited
        financial statements, investor deck, or S-1 equivalent has been made public. SAI Group
        financial relationship—including intercompany loans, guarantee structures, or equity
        transfer rights—is not publicly documented.
      whyItMatters: >-
        At $1.9 billion valuation and approximately $160 million estimated revenue (Crunchbase
        secondary), the implied 12x revenue multiple is justified only if the majority of revenue
        is recurring SaaS with high NRR. If project-based ECA study revenue constitutes 40-50%
        of total revenue, the justified multiple would be materially lower (6-8x), implying a
        fair value of $960M-$1.28B under conservative assumptions. Burn rate and runway visibility
        are critical for assessing whether ConcertAI can execute its roadmap without a bridge
        financing.
      diligencePath: >-
        Request: (1) trailing four-quarter P&L by product line (SaaS vs. project); (2) current
        cash position and monthly burn rate; (3) 24-month financial forecast with assumptions;
        (4) SAI Group intercompany financial terms; (5) top-10 customer revenue concentration;
        (6) NRR by segment; (7) any outstanding debt, credit facility, or structured capital.
      relatedQuestionRefs: [QR024, QR026, QR027, QR031]
      relatedTableRefs: [TR003]

    - id: GR004
      type: undiscoverable-without-disclosure
      severity: informational
      topic: partner-exclusivity-and-competitive-terms
      missingEvidence: >-
        Exclusivity terms of the Foundation Medicine data integration, NVIDIA alliance, and
        Goldman Sachs investment are not publicly disclosed. Whether Foundation Medicine can
        simultaneously provide equivalent multi-modal genomic RWE data integration to Tempus AI,
        Flatiron, or IQVIA is unknown. Whether NVIDIA alliance restricts ConcertAI from using
        competing AI infrastructure or restricts NVIDIA from forming comparable alliances with
        competitors is not disclosed.
      whyItMatters: >-
        Non-exclusive partnership terms would mean that Foundation Medicine genomic data
        enrichment and NVIDIA AI infrastructure advantage are replicable by well-resourced
        competitors on similar timelines. If key partnerships are non-exclusive, the moat
        assessment from Chapter 5 would need revision, and competitive displacement risk would
        be elevated from Medium to Medium-High.
      diligencePath: >-
        Request: (1) Foundation Medicine integration agreement: data access terms, exclusivity,
        price, renewal date; (2) NVIDIA alliance agreement: scope, exclusivity, minimum
        commitments, exit provisions; (3) Goldman Sachs investment terms: equity, consent rights,
        board representation, exit restrictions; (4) any customer agreement MFN or exclusivity
        clauses.
      relatedQuestionRefs: [QR029, QR030]
      relatedTableRefs: [TR003]


