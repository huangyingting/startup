      statement: >-
        The FDA AI/ML-Based Software as a Medical Device Action Plan (January 2021) establishes
        a pre-determined change control plan (PCCP) framework that ConcertAI TeraRecon AI tools
        (DETECT and Neuro) must comply with for post-market algorithm modifications to avoid
        triggering unapproved device modification enforcement under 21 CFR Part 880.
      type: observed
      topic: FDA-SaMD-compliance-TeraRecon
      sourceRefs: [SR022, SR011]
      confidence: high
