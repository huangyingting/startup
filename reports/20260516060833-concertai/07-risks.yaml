      SAI Group dependency is rated Critical concentration because the parent-subsidiary relationship
      implies capital, governance, and operational interdependence that cannot be assessed from public
      sources alone. NVIDIA dependency is inherent to the Accelerated Clinical Trials agentic AI
      architecture; substitution would require significant re-engineering.
    claimRefs: [CR024, CR025, CR026, CR027, CR028, CR029]

  - id: TR004
    title: "People / execution risk register"
    columns: ["Role / Function", "Dependency or Gap", "Likelihood", "Severity", "Mitigation", "Diligence Path"]
    rows:
      - ["CEO (vacant)", "Founder Jeff Elton moved to Vice Chairman May 2025; no named successor confirmed as of May 2026", "Current (confirmed)", "High", "Jeff Elton continuing as Vice Chairman provides strategic continuity; CFO Myshrall operationally stabilizing", "Request CEO search status, finalist identification, target hire date, and board succession plan"]
      - ["Founder brand / key-person (Jeff Elton)", "ConcertAI pharma and regulatory relationships built on Jeff Elton personal credibility and visibility", "Medium (ongoing)", "High", "Vice Chairman role keeps Elton externally visible; risk mitigated but not eliminated", "Assess how many customer and partner relationships are named to Elton personally"]
      - ["Chief Medical Officer (Oncology)", "Dr. Shaalan Beg appointed 2025; short tenure; attrition risk if CEO search unsettles team", "Low-Medium", "Medium-High", "New appointment stabilizes clinical credibility; early tenure increases attrition vulnerability", "Request CMO tenure, performance expectations, and equity vest schedule"]
      - ["AI/ML engineering talent", "High competition for oncology AI engineers from Tempus, Flatiron, NVIDIA, and Big Tech", "Medium", "Medium", "NVIDIA partnership may create technical talent signaling effect; competitive compensation assumed", "Request current AI/ML headcount, open headcount, and attrition rate for technical staff"]
      - ["Commercial leadership", "Shawn W. Bates appointed GM Commercial Solutions 2025; prior commercial organization strength unclear", "Low-Medium", "Medium", "New appointment signals prior commercial gap was recognized; execution risk in scaling pharma sales", "Request commercial team headcount, quota achievement rate, and pipeline coverage for FY2026"]
    notes: >-
      CEO vacancy is categorized as Current Confirmed because the transition was announced publicly
      via PR Newswire and ConcertAI newsroom in May 2025 and no successor announcement has been
      identified. All four C-suite hiring actions in a 12-month period suggest a management upgrade
      program; this increases short-term execution risk while strengthening long-term institutional
      capacity.
    claimRefs: [CR030, CR031, CR032, CR033, CR034]

  - id: TR005
    title: "Mitigation and kill criteria table"
    columns: ["Risk", "Monitorable Trigger", "Threshold / Event", "Action Implication"]
    rows:
      - ["FDA SaMD compliance failure", "FDA docket: 510(k) refusal-to-accept or warning letter for TeraRecon AI tools", "Any FDA Warning Letter, Consent Decree, or market withdrawal for DETECT, Neuro, or CancerLinQ tools", "Halt AI tool commercial expansion; immediate diligence review of QMS and pre-determined change control plan"]
      - ["HIPAA breach — CancerLinQ patient data", "HHS OCR Breach Report portal: ConcertAI or CancerLinQ entry with more than 500 patient records", "OCR notification of breach affecting more than 500 records; any class action litigation filing naming ConcertAI", "Material valuation impairment; diligence review of breach scope, litigation exposure, and remediation plan"]
      - ["CEO search failure / leadership deterioration", "No CEO announcement by Q4 2026; LinkedIn departures of 2+ named C-suite within 6 months", "Continued vacancy beyond Q4 2026 with concurrent departure of CMO, CFO, or GM Commercial", "Engage board for succession status; assess whether pharma relationships are managed at VP level only"]
      - ["Capital gap / down-round", "No new funding within 24 months of June 2024 close; SAI Group public disclosure of reduced investment", "Down-round at less than $1.9B valuation; debt covenant breach; SAI Group restructuring announcement", "Material thesis impairment; request management 24-month cash runway forecast and SAI Group support terms"]
      - ["Partner defection — Foundation Medicine or NVIDIA", "Foundation Medicine or NVIDIA press release announcing competing oncology AI platform or partnership ending", "Public dissolution or non-renewal announcement for NVIDIA alliance or Foundation Medicine integration", "Assess data/AI substitutability; request partnership contract term and renewal timeline"]
      - ["Revenue concentration shock", "Loss of any single pharma account exceeding estimated 10-15% of revenue", "Public pharma sponsor announcement of budget cut or vendor consolidation away from ConcertAI", "Request top-10 customer revenue concentration analysis; stress-test single-account loss scenarios"]
    notes: >-
      Kill criteria are events that would require fundamental reassessment of the investment thesis
      rather than merely a valuation adjustment. All kill criteria are structured to be monitorable
      via public sources without requiring data room access. A well-managed risk event with rapid
      credible remediation would be downgraded from thesis-break to material-but-manageable.
    claimRefs: [CR035, CR036, CR037, CR038, CR039, CR040]


