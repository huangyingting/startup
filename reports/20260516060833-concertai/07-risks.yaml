  - id: TR003
    title: "Partner / dependency risk register"
    columns: ["Dependency", "Counterparty", "Role", "Concentration", "Failure Scenario", "Severity", "Mitigation", "Residual Exposure"]
    rows:
      - ["Parent company support", "SAI Group", "Strategic direction, capital backstop, governance", "Critical", "SAI Group strategic pivot, divestiture, or financial distress reduces support", "High", "Goldman Sachs investment provides partial independence", "High — no public financial independence disclosure"]
      - ["GPU and AI infrastructure", "NVIDIA", "AI model training, BioNeMo LLM tooling, NeMo framework", "High", "NVIDIA pricing increase, access restriction, or competing oncology AI investment reduces ConcertAI advantage", "Medium-High", "Alliance announced March 2025; strategic alignment currently high", "Medium — dependency not fully substitutable short-term"]
