    rows:
      - ["FDA AI/ML SaMD — TeraRecon DETECT/Neuro post-market change compliance", "Regulatory", "US FDA", "Medium", "High", "Medium", "Medium-High", "Request pre-determined change control plan and 510(k)/De Novo history for all AI tool versions"]
      - ["HIPAA/HITECH data breach — CancerLinQ 9M patient records", "Privacy/Legal", "US HHS OCR", "Medium", "High", "Medium", "High", "Request breach risk assessment, penetration test results, encryption architecture, and BAA registry"]
      - ["FDA RWE fit-for-purpose challenge to ECA study data", "Regulatory", "US FDA", "Low-Medium", "High", "Medium-High", "Medium", "Request FDA feedback letters or pre-submission meeting notes on CancerLinQ data quality"]
      - ["FTC antitrust scrutiny of AI data concentration", "Antitrust/Legal", "US FTC", "Low", "Medium-High", "Low", "Medium", "Monitor FTC AI enforcement docket; confirm no improper exclusivity in data partnerships"]
      - ["OIG healthcare fraud enforcement on pharma data arrangements", "Legal/Compliance", "US OIG/DOJ", "Low", "High", "Low-Medium", "Medium", "Request legal opinion on pharma data arrangement compliance with Anti-Kickback Statute"]
      - ["EU AI Act high-risk classification for oncology AI", "Regulatory", "EU", "Medium if EU ops", "High", "Low", "Medium-High", "Confirm EU revenue and product scope; assess conformity assessment readiness"]
      - ["HIPAA BAA compliance with data-providing healthcare organizations", "Compliance", "US HHS OCR", "Low-Medium", "Medium", "Medium-High", "Low-Medium", "Request BAA registry and confirm all data partners have current signed BAAs"]
      - ["IP/patent infringement risk from competing AI systems", "Legal/IP", "US USPTO/Federal Courts", "Low", "Medium", "Low-Medium", "Medium", "Request FTO analysis for core AI analytics methods against Tempus AI and IQVIA portfolios"]
    notes: >-
      Rows ordered by combined severity. Private litigation and undisclosed enforcement inquiries
      are not reflected. HIPAA and FDA risks are ranked highest due to combination of high
      likelihood of regulatory focus and high severity of potential enforcement actions against a
      company managing 9M+ oncology patient records. EU AI Act applicability is conditional on
      ConcertAI having European market operations; this has not been publicly confirmed.
    claimRefs: [CR001, CR002, CR003, CR004, CR005, CR006, CR007, CR008]

  - id: TR002
    title: "Operational / quality / security risk register"
    columns: ["Failure Mode", "Likelihood", "Severity", "Mitigation Maturity", "Residual Exposure", "Unresolved Gap"]
    rows:
      - ["CEO vacancy — extended search beyond Q4 2026 with executive attrition", "High (ongoing)", "High", "Low-Medium", "High", "No public CEO appointment confirmed as of May 2026; search timeline unknown"]
      - ["AI model drift — degraded oncology AI accuracy (TeraRecon, PrecisionExplorer)", "Medium", "High", "Medium", "Medium-High", "No public disclosure of model revalidation cadence or post-market surveillance results"]
