      - ["Capital provider", "Goldman Sachs Asset Management", "Strategic investor, $150M June 2024, potential future round lead", "Medium-High", "Goldman Sachs declines to lead follow-on round; down-round or capital gap emerges", "High", "SAI Group backstop assumed; not contractually guaranteed", "Medium-High — burn rate and runway not disclosed"]
