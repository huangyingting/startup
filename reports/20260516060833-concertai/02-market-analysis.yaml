  evidenceGaps:
    - type: missing-source
      severity: material
      topic: data-privacy-compliance
      missingEvidence: >-
        Any documented HIPAA violations, data breach notifications, state attorney general actions,
        or OCR enforcement proceedings involving ConcertAI's patient data handling under HIPAA
        or related state privacy statutes.
      whyItMatters: >-
        Healthcare data privacy compliance is a structural constraint on the oncology data network
        market. An undisclosed breach or regulatory action would materially affect ConcertAI's
        health system customer trust, CancerLinQ expansion, and partner data-sharing agreements.
      diligencePath: >-
        Search HHS OCR breach portal and enforcement database; review any disclosed data incidents
        in financial disclosures or investor communications; request compliance certifications and
        audit history from ConcertAI management.
      relatedQuestionRefs: [QM014]
      relatedTableRefs: []

    - type: private-evidence-only
      severity: material
      topic: data-quality-methodology
      missingEvidence: >-
        Specific methodology, technical documentation, or independent audit for how ConcertAI
        deduplicates, structures, and validates the 9M+ patient records within the CancerLinQ network,
        including data completeness rates by EHR vendor and geographic coverage gaps.
      whyItMatters: >-
        Without validated data quality methodology, the 9M+ patient claim is difficult to evaluate
        as a competitive differentiator. Completeness and representativeness gaps could limit the
        network's utility for regulatory-grade ECA submissions and RWE generation.
      diligencePath: >-
        Request data quality white papers, independent validation studies, or regulatory acceptance
        letters; review ASCO historical documentation on CancerLinQ data governance; ask for
        structured vs. unstructured data completeness breakdown by EHR source.
      relatedQuestionRefs: [QM018]
      relatedTableRefs: []

    - type: private-evidence-only
      severity: material
      topic: revenue-breakdown
      missingEvidence: >-
        Precise breakdown of ConcertAI's estimated ~$160M annual revenue by product division
        (RWE/regulatory, CancerLinQ, TeraRecon/imaging AI, Precision Suite, Cadence), by customer
        type (pharma vs. health system vs. payer), and by contract structure (recurring vs.
        project-based).
      whyItMatters: >-
        Without division-level revenue visibility, market sizing penetration estimates and SAM/SOM
        analysis remain speculative. The revenue mix materially affects gross margin assumptions,
        competitive moat assessment, and growth trajectory credibility.
      diligencePath: >-
        Request audited financial statements or management revenue bridge from ConcertAI; model
        approximate split from known product launches, headcount allocation, and partner disclosures;
        cross-check with Crunchbase estimates when accessible.
      relatedQuestionRefs: [QM025]
      relatedTableRefs: []

    - type: stale
      severity: minor
      topic: rwe-market-2026
      missingEvidence: >-
        A current (2025–2026) independent analyst estimate of the global RWE solutions market
        with oncology-specific segmentation, sourced from a non-paywalled or independently
        accessible publication. The accessible Mordor Intelligence estimate is behind a paywall
        and the MarketsandMarkets page is JS-only.
      whyItMatters: >-
        The paywalled and JS-blocked nature of the primary market sizing sources means that
        the TAM/SAM estimates rely on unavailable analyst reports. A fresh, accessible market
        estimate would reduce the sizing confidence gap.
      diligencePath: >-
        Search for free-access analyst summaries, trade association market reports (ISPOR, ISPE),
        government health technology assessment publications, or public-company investor day materials
        from IQVIA or Veeva that include market size commentary.
