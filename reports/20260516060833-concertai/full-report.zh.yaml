        - 中
        - 要求 ConcertAI 提供由其数据和结果支持的 FDA 递交清单；与 Flatiron 比较递交接受率；确认监管质量认证流程
      - - NVIDIA 肿瘤 AI 智能体联盟（生成式 AI 与智能体化试验自动化）
        - 技术合作 / AI 基础设施
        - 基础模型商品化；Tempus 或 Flatiron 在 2026 年后宣布可比 AI 合作；市场更广泛获得 NVIDIA DGX/NIM，削弱排他性
        - 中
