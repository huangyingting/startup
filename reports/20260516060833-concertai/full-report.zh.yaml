  - number: 6
    title: 客户
    sections:
      - number: '6.1'
        title: 客户基础分层
        blocks:
          - type: paragraph
            body: >-
              ConcertAI 的客户基础可拆成四个结构性细分，差异来自买方角色、预算来源和主要使用场景。制药和生物技术公司是最大细分，估计贡献 60–65% 收入，使用 ConcertAI
              做监管真实世界证据研究、External Control Arm 提交、临床试验 AI 和肿瘤商业情报。预算负责人覆盖临床运营、监管事务、医学事务和商业团队，使 ConcertAI
              能打入同一账户的多个部门。公司称其客户覆盖顶级生命科学公司的 75%，意味着它同时触达大型药企和新兴生物技术公司，但公开资料并未清楚区分「客户」与「账户联系人」的定义。医疗系统和癌症中心是第二大细分，估计贡献
              20–25% 收入，主要通过 CancerLinQ 平台进行质量指标跟踪、临床试验匹配和循证治疗选择。900 多万患者网络支撑了社区肿瘤诊所采用。诊断和基因组公司——包括
              NeoGenomics、Foundation Medicine 和 Guardant Health——构成第三个细分，估计贡献 10–15% 收入，来自 AI SaaS
              协议和数据集成合作；这类合作创造双向价值：ConcertAI 获得更丰富的多模态数据资产，诊断伙伴获得 AI 工作流能力。CRO 和学术研究组织是剩余细分，约占
              5%，通过研究协议访问患者队列数据。TeraRecon 的 2,000 多家全球医院客户提供了地域分散的医疗系统基础，降低了对美国制药预算的单一依赖。2024 年投资之后，Goldman Sachs 网络以及
              ASCO、ESMO、J.P. Morgan Healthcare Conference 等肿瘤会议露出，共同支持获客。
