chapters:
  - number: 1
    title: 公司概况
    sections:
      - number: '1.1'
        title: 公司身份、使命与法律背景
        blocks:
          - type: paragraph
            body: >-
              ConcertAI 是一家私营医疗健康技术公司，法定名称为 Concerto Healthcare Inc.。公司宣称的使命是成为 “Leaders in Generative & Agentic AI
              Solutions Tailored for Life Sciences & Healthcare.” 公司总部位于 Massachusetts 的 Cambridge/Boston 都市区，是 SAI
              Group（原 SymphonyAI Group）生态的一部分；该 AI 集团由 Romesh Wadhwani 博士领导。ConcertAI 由 Jeff Elton, PhD 创立；他在 2025 年 5
              月领导层交接前一直担任 CEO，目前头衔为副董事长。公司曾名为 Concerto Health AI，旧邮件域名（info@concertohealthai.com）仍留下这一痕迹； 后来更名为
              ConcertAI，以突出 AI-first 定位。Crunchbase 记录的注册日期为 2018 年，而公司投资者页面称创立年份为 2017
              年——这一差异仍未解决。公司属于私营成长阶段企业，最近公开承认的融资类型为 Series C；Crunchbase 将其标为 “Unicorn”，意味着估值超过 $1B。
