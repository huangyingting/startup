  - number: 7
    title: 风险
    sections:
      - number: '7.1'
        title: 监管与法律风险图谱
        blocks:
          - type: paragraph
            body: >-
              ConcertAI 位于医疗 AI、大规模患者数据处理和制药监管提交的交叉点，这三块领域合规要求都很强，且仍在演变。FDA AI/ML-Based Software as a Medical Device
              Action Plan（2021 年 1 月）为上市后会更新的 AI 工具建立了预先确定变更控制计划（PCCP）框架。ConcertAI 子公司 TeraRecon 运营已获 FDA 放行的 AI
              工具——用于肺和肝结节检测的 DETECT、用于放射科的 Neuro——必须遵守该框架，包括任何需要新 510(k) 或 De Novo 提交的修改。重大算法更新若未申报，根据 21 CFR Part 880
              会构成未经批准的器械修改，并让 TeraRecon 暴露于 FDA Warning Letter 或 consent decree 风险。FDA Real-World Evidence Framework 和
              21st Century Cures Act 要求用于监管提交的 RWE 适合其目的：数据收集流程必须可靠，并适用于具体监管场景。如果发现 CancerLinQ 或 TeraRecon
              数据对特定适应症不够完整、不够代表性或验证不足，ConcertAI 为制药赞助方做的 ECA 研究可能遭到 FDA 质疑。任何依赖 ConcertAI 数据的 ECA 研究若被 FDA
              驳回，都会实质损害商业声誉，并触发制药细分客户流失。CancerLinQ 拥有 900 万份患者记录数据库，放大了 HIPAA/HITECH 暴露。一旦泄露，将触发 OCR 调查、按 2024
              年处罚结构每个违规类别每年最高 $1.9M 的潜在民事罚款、州检察长执法和集体诉讼。HIPAA Journal 泄露统计显示，同等规模医疗组织可能面临数百万美元和解义务。FTC 对医疗 AI
              竞争的监督正在升级：FTC 2023 年 6 月发布指引，明确指出生成式 AI 会引发竞争担忧；ConcertAI 收购竞争对手或签署排他性数据安排，都可能招致 FTC 审查。OIG
              医疗欺诈执法广泛适用于与制药公司的数据安排，只要这类安排可能被界定为不当财务关系。来自竞品 AI 系统的 IP 侵权风险——Tempus AI、Flatiron（Roche）和
              IQVIA——可能引发专利纠纷，因为各方都已部署重叠的 AI 分析能力。EU AI Act 的高风险分类会适用于任何在欧洲市场用于肿瘤诊断或治疗决策支持的 ConcertAI AI
              工具，上市前需要承担合格评定义务。
