        - 客户渗透由公司自述且未经审计；多平台并用是行业常态；药企赞助方通常同时从 Tempus、Flatiron 和 ConcertAI 双源采购 RWE
      - - 财务
        - $160M 收入同比增长 35%；Goldman Sachs 投资 $150M，提供现金跑道；2024 年 8 月聘任 CFO，释放 IPO/退出准备信号
        - 收入估计来自 Crunchbase 二级来源且未经审计；烧钱速度和 NRR 不透明；Goldman Sachs 优先股堆叠和清算瀑布未知
      - - 风险
        - FDA 认可的 RWE 框架带来结构性需求；SAI Group 支持降低独立资本风险；NVIDIA 联盟提升 AI 基础设施可信度
        - CEO 空缺超过 12 个月且无具名继任者；ECA 产品存在 FDA 执法风险；CancerLinQ 数据库覆盖 900 万以上患者，存在 HIPAA 泄露敞口；SAI Group 存在剥离风险
    notes: 每个投资逻辑维度均独立评估。没有任何单一维度能单独决定结论。客户和财务维度对近期价值判断权重最高；风险维度下的 CEO 空缺，是最紧迫的单一可处理事项。
