  - id: TV006
    title: 最终尽调问题表
    columns:
      - 尽调问题
      - 优先级
      - 理由
    rows:
      - - 确认 CEO 身份并公布任命
        - 阻断项
        - CEO 空缺是最重大的未决事项；任何投资承诺都应以此为前置条件；与头部药企客户的关系连续性取决于该问题能否解决
      - - 经审计的 trailing financials，含 NRR/GRR 和 ARR 拆分
        - 阻断项
        - 收入估计来自 Crunchbase 二级来源；需按产品线（SaaS vs. 项目）提供过去四个季度 P&L、净收入留存和毛收入留存，用以验证倍数
      - - Goldman Sachs 轮原始文件：cap table、term sheet、preference stack
        - 重要材料项
        - 所有新闻 URL 均返回 404；preference stack 和清算瀑布决定普通股持有人及新进入投资者可获得的有效股权价值
      - - TeraRecon FDA clearance 延续状态，以及 ConcertAI HIPAA SOC 2 Type II 证书
        - 重要材料项
        - FDA-cleared 影像 AI 是核心产品价值驱动；clearance 延续性和有效 SOC 2 认证，是监管级客户合同的前提
      - - SAI Group 关联方协议条款：所有权、退出条款、资本承诺
        - 重要项
        - 母公司关系决定资本兜底质量；必须厘清 SAI Group 退出权、董事会控制权，以及影响 ConcertAI 独立路径的任何控制权变更条款
    notes: 阻断项必须在任何投资承诺前解决。重要材料项必须在交割前解决。重要项影响最终定价和交易结构。若五项问题结果令人满意，中等置信度评级可大幅提升至高置信度。
    claimRefs:
      - CV031
