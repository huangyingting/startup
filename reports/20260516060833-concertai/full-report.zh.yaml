    title: 估值敏感性
    description: >-
      ConcertAI 与四家可比公司或交易的收入倍数对比。每根柱代表最近公开估值锚点下的过去 EV/Revenue 倍数。该区间勾勒 ConcertAI 可落入的合理倍数走廊，也显示其相对各可比对象隐含的折价或溢价。IQVIA
      代表成熟服务业务的下沿；Veeva 代表盈利型 SaaS 的上沿；Tempus AI 和 Flatiron 则框定肿瘤 AI 同业区间，ConcertAI 当前就在这个区间内交易。
    claimRefs:
      - CV014
      - CV039
    data:
      items:
        - label: IQVIA (IQV)
          value: 3
          detail: 成熟 CRO / 数据业务，规模化运营；收入 $15B
        - label: Flatiron Health（Roche 并购）
          value: 11
          detail: 肿瘤真实世界证据（RWE）收购；2018；最接近的可比案例
        - label: Tempus AI (TEM)
          value: 11.2
          detail: 肿瘤 AI + 基因组学；2024 年 6 月公开 IPO
        - label: ConcertAI（隐含）
          value: 11.9
          detail: Goldman Sachs 轮次；收入估计约 $160M
        - label: Veeva Systems (VEEV)
          value: 16.7
          detail: 生命科学 SaaS；已盈利；质量溢价
  - id: FV003
    type: range
    title: 估值 / 回报区间
    description: >-
      这张图给出 ConcertAI 在悲观、基准、乐观情景下，若 2028–2030 年退出，企业估值可能落入的低 / 中 /
      高区间。中值代表各情景的中心估计；低值和高值则是在收入与倍数仍不确定时，可能出现的退出估值边界。当前入场价约 $1.9B，是参照点；基准中值意味着入场后回报约 2.1×，悲观中值则接近持平或亏损。
    claimRefs:
      - CV022
      - CV040
    data:
      items:
        - label: 悲观
          low: 1.2
          mid: 1.7
          high: 2.3
          unit: USD billion
        - label: 基准
          low: 3
          mid: 4
          high: 5
          unit: USD billion
        - label: 乐观
          low: 6
          mid: 8
          high: 10
          unit: USD billion
  - id: FV004
    type: kpi
    title: 投资 KPI
    description: 截至 2026 年 5 月报告日，ConcertAI 的关键投资指标和分析判断如下。每一项都是本章证据支持下的定量或定性综合评估。标为估计或未验证的数值，意味着缺少经审计的一手披露。
    claimRefs:
      - CV007
      - CV041
    data:
      items:
        - label: 收入（2025E）
          value: ~$160M
          detail: Crunchbase 二手估计；未经审计；同比增长 35%
        - label: 收入增速
          value: ~35%
          detail: 同比估计值，与肿瘤 AI 市场 CAGR 匹配；未经审计
        - label: 隐含倍数（当前）
          value: ~12×
          detail: Goldman Sachs $1.9B 轮次 / 收入约 $160M；二手来源确认
        - label: 肿瘤 AI 市场（2030E）
          value: $20B+
          detail: 分析师估计 CAGR 为 30–45%；ConcertAI 可触达市场
        - label: 目标持有期
          value: 4–5 years
          detail: 基准情景为 2028–2030 年被战略收购
        - label: 目标回报（基准）
          value: 2–3×
          detail: 基准情景约 $4B 退出、约 $1.9B 入场；概率加权约 2.1×
        - label: 建议退出载体
          value: Strategic M&A
          detail: 最可能：药企数据公司、CRO 或 EHR 厂商收购
