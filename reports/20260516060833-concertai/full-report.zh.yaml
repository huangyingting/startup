      - number: '4.4'
        title: 公开牵引指标与竞争基准
        blocks:
          - type: paragraph
            body: >-
              ConcertAI 最具体的公开财务信号，是 Crunchbase 2025 年 1 月估计其年收入约 $160M、同比增长约 35%。该估计基于第三方数据聚合，应视为方向性而非审计数字。截至 2026
              年，ConcertAI 在 ClinicalTrials.gov 癌症临床试验注册中保持活跃，确认其试验平台产品持续获得药企赞助项目参与，提供了定性管线信号。ConcertAI 自身未公开披露
              ARR、GMV、活跃客户数或流失率。与上市可比公司对标，可以照出其可能的财务轨迹。 最接近的纯粹同行 Tempus AI 在 2023 财年报告收入约 $531M、净亏损约 $214M、毛利率约
              50%——说明即使达到 ConcertAI 估计规模三倍，肿瘤 AI 模式仍显著烧钱。Flatiron Health 于 2018 年被 Roche 以隐含约 $1.9B 估值收购，当时估计收入约
              $175M、接近盈亏平衡，呈现出与 ConcertAI 类似的财务轮廓，但在这一规模上亏损容忍度更低。Veeva Systems（收入约 $2.4B、毛利率约 80%、盈利）代表医疗健康 SaaS
              规模化后可达到的上限毛利，凸显 ConcertAI 估计综合毛利率与理想天花板之间的差距。IQVIA（收入约 $15B、EBITDA 利润率约
              20%）说明数据密集型医疗健康平台可通过服务捆绑在规模化后实现盈利；但 IQVIA 的利润率受益于数十年运营效率，ConcertAI 还不具备。Goldman Sachs $1.9B 估值下约 12x
              的隐含收入倍数，与高增长、盈利前医疗健康 AI 平台相符，但若要在价值实现路径上成立，需要持续 30%+ 增长。
