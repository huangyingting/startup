  - number: 5
    title: 产品与技术
    sections:
      - number: '5.1'
        title: 产品组合与模块地图
        blocks:
          - type: paragraph
            body: >-
              ConcertAI 将产品组合划分为七个部门，由共同 AI 底座（CARAai）和共享多模态肿瘤数据基础连接起来。Regulatory and Research 部门锚定公司最初的价值主张：用于 FDA 申报级
              RWE 对照研究的 External Control Arms（ECA）、用于回顾性观察研究的 Comparative Cohort Analysis，以及用于试验设计规划的 Feasibility
              Assessment。Precision Suite 于 2025 年 5 月推出，把这一能力升级为 GenAI 驱动平台，包含三个模块—— PrecisionExplorer（自然语言 RWE
              查询）、PrecisionTrials（AI 方案优化）和 PrecisionGTM（商业肿瘤情报）——同时面向研究和商业药企工作流。从 ASCO 收购的 CancerLinQ
              部门运营美国最大的社区肿瘤患者网络，覆盖 9 million 或更多患者记录，由四个子模块支撑：SmartLinQ（质量追踪）、TriaLinQ（试验匹配）、RxLinQ（疗法选择）和
              PatientLinQ（队列管理）。TeraRecon 通过 AV/Intuition 3D 可视化、DETECT AI 生物标志物检测和面向神经血管急诊影像的 Neuro， 服务 2,000
              或更多全球医院客户。Accelerated Clinical Trials（2026 年 2 月）和 Cadence Suite（2026 年 4 月）是最新增量，分别把 ConcertAI
              延伸到智能体临床试验管理和商业肿瘤现场情报。Patient360、Translational360 和 Precision360 则补足研究分析组合。CARAai 作为内部 AI
              平台，在所有产品线中编排来自多个供应商的大语言模型。
