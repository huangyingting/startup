  - number: 4
    title: 财务情况
    sections:
      - number: '4.1'
        title: 收入来源与商业模式
        blocks:
          - type: paragraph
            body: >-
              ConcertAI 的收入模式由四条主流构成，每条都有不同商业机制。SaaS 和订阅收入是质量最高的部分，来自临床试验软件、CancerLinQ 数据访问、Precision Suite 分析平台，以及
              CARAai 和 Cadence Suite 商业工具的年度或多年平台合同。这些合同通常是企业级、多年期协议，客户为制药和生物技术赞助方。数据分析和 RWE 业务按项目收取费用，覆盖 External
              Control Arm（ECA）研究、回顾性队列分析，以及为 FDA 监管申报设计的真实世界证据包； 该细分直接绑定生物制药 R&D
              和临床试验预算，因此具有周期性。专业服务收入覆盖研究设计咨询、生物统计支持、监管档案准备和 EHR 集成服务——这是劳动密集型细分，毛利率较低。第四条收入来自 TeraRecon 影像
              AI，组合了永久软件许可收入、 年度维护合同，以及在 2,000+ 医院和医疗系统客户基础上的 SaaS 迁移增量。这一混合模式形成分层年金结构。收入质量喜忧参半：SaaS 和永久维护费经常性强、毛利率更高，而
              RWE/ECA 项目工作是事件型收入，受生物制药支出周期牵引， 带来集中风险。ConcertAI 出现在 ClinicalTrials.gov 的活跃癌症临床试验中，确认其持续参与药企赞助项目，这是 RWE
              收入管线的领先信号。FDA 在监管决策中认可真实世界证据，为 ConcertAI 数据分析服务创造结构性需求；但 HIPAA 合规义务和 FHIR 互操作标准带来持续技术和法律成本，影响该细分的有效利润率。
