      - number: '8.4'
        title: 图表
        blocks:
          - type: callout
            title: CEO 空缺是最主要的阻断条件
            body: >-
              Jeff Elton 2025 年 5 月转任 Vice Chairman，造成 CEO 空缺；截至 2026 年 5 月，这一空缺仍未解决，已超过十二个月。任何可访问公开来源都没有确认继任者姓名。对一家隐含估值
              $1.9B、拥有复杂制药高管关系和活跃监管合规义务的公司而言，长期 CEO 空缺是任何投资决策中最重大的未决事项。
            calloutType: risk
            claimRefs:
              - CV009
          - type: callout
            title: Goldman Sachs 估值无法从一手来源核验
            body: >-
              报告所称 2024 年 6 月 Goldman Sachs $150M 投资的每个一手来源 URL——包括 Goldman Sachs Asset Management 页面、PR Newswire 新闻稿和
              ConcertAI newsroom——截至 2026 年 5 月均返回 404 错误。Reuters、STAT News、BusinessWire 及多家其他二手媒体佐证了 $1.9B 估值，但 cap
              table、优先权结构和清算瀑布仍未披露，也无法从公开来源核验。
            calloutType: risk
            claimRefs:
              - CV010
              - CV018
          - type: callout
            title: 有条件买入，取决于三项阻断性尽调事项
            body: >-
              投资结论是在当前隐含约 ~$1.9B 入场价下有条件买入，前提是解决三项阻断条件：（1）确认 CEO 身份，（2）披露含 NRR/GRR 的审计财务，（3）取得 Goldman Sachs
              轮融资文件和优先权结构。基准情景约 ~2.1× 的入场回报满足最低回报门槛；如果牛市情景条件成立，肿瘤 AI 增长市场还提供有吸引力的上行轨迹。
            calloutType: recommendation
            claimRefs:
