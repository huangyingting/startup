      - number: '3.2'
        title: 能力、定价与 GTM 对比
        blocks:
          - type: paragraph
            body: >-
              横向比较竞争集合，可以看到清晰的差异化轴线。在肿瘤 RWE 分析上，ConcertAI、Flatiron 和 Tempus AI 是仅有的几家拥有大规模、肿瘤专用、源自 EHR 的患者队列能力的厂商。
              ConcertAI 的 External Control Arms 与 Flatiron 已获 FDA 接受的 RWE 产品直接竞争，但 Flatiron 更长的获接受申报记录给了它监管信任优势。在临床试验 AI
              上，ConcertAI 的 Accelerated Clinical Trials（2026 年 2 月推出）、Tempus AI 的 TIME Trial 和 IQVIA 的试验优化服务，是肿瘤 AI
              辅助试验设计和患者匹配中的三项主要竞品。影像 AI 是 ConcertAI 通过 TeraRecon 2,000+ 客户基础获得的独特强项——Tempus 和 Flatiron 都不直接竞争 AI
              放射科和影像分析。基因组学和多组学上，Tempus 依靠核心基因测序业务具备明显优势；ConcertAI 则通过 Foundation Medicine 和 NeoGenomics
              集成弥补，而不是拥有原生测序能力。商业分析是 ConcertAI（PrecisionGTM、Cadence Suite）、Komodo Health 和 IQVIA 商业情报部门共同争夺的战场。定价方面，
              主要竞争对手均未公开标价；企业合同按谈判确定，金额从项目型合作的六位数，到 $1M–$10M 区间的多年平台交易不等。GTM 姿态差异明显：Flatiron 和 IQVIA 受益于 10+
              年沉淀的深层药企既有关系； Tempus 则把基因检测装机基础用作 land-and-expand 切入口。ConcertAI 的 NVIDIA 联盟提供了生成式 AI
              差异化向量，直接竞争对手尚无可比公开合作。Veeva Systems 的 Vault CDMS 占据临床数据管理中互补但不同的细分， 而不是 RWE 分析。
