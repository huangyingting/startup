  - number: 2
    title: 市场分析
    sections:
      - number: '2.1'
        title: 市场边界、范围与替代方案
        blocks:
          - type: paragraph
            body: >-
              ConcertAI 的可服务市场位于四个领域的交叉处：肿瘤专用真实世界数据（RWD）分析、AI 赋能的临床试验技术、肿瘤影像 AI 和商业肿瘤情报。市场边界排除通用电子病历（EMR）厂商、
              主要诊断硬件以及非肿瘤专用的人群健康平台。在纳入范围内，五类细分市场覆盖 ConcertAI 的产品足迹：（1）服务制药和生物技术监管及医学事务职能的肿瘤 RWE 分析； （2）面向肿瘤 AI
              辅助试验设计和患者匹配的临床试验技术；（3）通过 TeraRecon 收购服务放射科的肿瘤影像 AI；（4）通过 CancerLinQ 的 9M+ 患者覆盖建立的大规模肿瘤 EHR
              数据网络；（5）2025–2026 年推出的商业肿瘤情报产品。主要存量替代方案包括 IQVIA（收入 >$14B 的主导既有玩家）、Tempus AI（上市公司，NYSE: TEM）、Flatiron
              Health （Roche 关联公司）和 TriNetX。相邻市场机会包括支付方分析和人群健康管理。WHO 数据显示，全球癌症负担约为每年 10 million 例死亡和 20 million
              例新发病例，这构成支撑五个市场细分的结构性需求信号。 ConcertAI 的市场明显是 B2B：药企、医疗系统和健康计划支付方是主要客户，而非个体患者或医生。癌症发病率上升、FDA 对真实世界证据的监管重视、企业
              AI 广泛采用三者汇合， 形成耐久的结构性顺风，也定义了市场长期扩张轨迹。
