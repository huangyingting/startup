companyProfile:
  summary: >-
    ConcertAI（法定名称：Concerto Healthcare Inc.）是一家位于 Cambridge/Boston 的私营医疗健康 AI 公司，专注肿瘤真实世界证据（RWE）、生成式 AI 分析、医学影像 AI
    和临床试验提速。公司由 Jeff Elton, PhD 于 2017 年创立，隶属于 SAI Group（SymphonyAI）生态。产品栈横跨五个部门：Regulatory & Research（ECA、RWE
    工具）、Precision Suite（面向 RWE、试验设计和商业情报的 GenAI）、Clinical Development（Accelerated Clinical Trials）、CancerLinQ（从 ASCO
    收购、覆盖 9M+ 患者的肿瘤 EHR 网络）以及 TeraRecon（获 FDA 批准的医学影像 AI）。ConcertAI 称，其服务 75% 的头部生命科学公司和 50% 的全球最大医疗服务提供商。据报道，Goldman
    Sachs Asset Management 于 2024 年 6 月按约 $1.9B 估值投资 $150M；截至 2026 年 5 月，该事项无法从可访问的一手来源确认。CEO Jeff Elton 于 2025 年 5
    月转任副董事长；截至报告日期，公司尚未公开披露继任者姓名。
  foundedDate: '2017-01-01'
