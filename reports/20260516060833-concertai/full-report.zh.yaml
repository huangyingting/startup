      - number: '5.4'
        title: 差异化、知识产权与数据资产
        blocks:
          - type: paragraph
            body: >-
              ConcertAI 最耐久的竞争优势来自三项相互咬合的资产：经过整理的肿瘤专用数据集、基于这些数据训练的自有 AI 模型，以及向 FDA 提交监管级 ECA 的记录。CancerLinQ 网络拥有 900
              多万份患者记录，是一套多年积累的纵向肿瘤数据集，短期内难以复制；随着新诊所加入、纵向随访拉长，数据价值会继续复利。平台的独特性来自患者个体层面的多模态数据整合，覆盖临床 EHR 记录（通过
              CancerLinQ）、基因组测序（Foundation Medicine）、放射影像（TeraRecon）和液体活检 ctDNA（Guardant
              Health）——目前没有通用医疗数据厂商能在肿瘤领域提供同等深度的组合。ConcertAI 与 IQVIA、Veeva、Komodo Health
              等厂商的差异，在于它只聚焦肿瘤专用数据模型、疾病本体和癌症分期模式。ECA 方法已经用于 FDA 提交，形成流程 know-how，并让方法事实上获得验证；对已投入 ECA
              监管策略的制药客户而言，这是显著转换成本。NVIDIA 联盟提供了一层技术差异化：ConcertAI 可使用 BioNeMo 训练肿瘤基础模型，并共同开发 AI agent，这让它领先于缺少同类 GPU
              合作的竞争对手。嵌入 PrecisionExplorer、PrecisionTrials 和 CARAai 的自有模型，则是另一类 IP：为肿瘤证据生成任务微调的语言模型。虽然公开资料没有逐项列出正式专利，AI
              模型资产、整理后的数据集和集成工作流 know-how 构成了主要知识产权组件。
