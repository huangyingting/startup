      - number: '6.3'
        title: 留存、扩张与集中度风险
        blocks:
          - type: paragraph
            body: >-
              ConcertAI 的留存和扩张动力因细分与产品类型而明显不同。使用 CancerLinQ 的医疗系统留存结构性较高：EHR 集成和持续参与质量项目形成转换成本，抑制流失。已经上线 TriaLinQ
              做试验匹配，或上线 SmartLinQ 做质量基准的社区肿瘤诊所，迁移到替代平台会承担不小实施成本。TeraRecon 的 2,000 多家医院客户基础在收购期内延续，说明放射科 AI 细分流失率较低，因为
              PACS 与工作站集成嵌入很深。制药客户模型则分成两类：项目制 ECA 研究带来重复业务，而不是合同留存；Precision Suite 和 Accelerated Clinical Trials 的多年期
              SaaS 订阅，则具备更高的留存可见度。ConcertAI 未公开披露任何细分的净收入留存（NRR）、总收入留存（GRR）或流失率，无法直接与医疗 SaaS 同业做基准比较。从单个 ECA 研究推进到
              Precision Suite 订阅、从单个 CancerLinQ 模块推进到全套部署，已能看出 land-and-expand
              模型。诊断合作模式也进一步带动收入扩张，NeoGenomics、Foundation Medicine 和 Guardant Health 可产生经常性数据授权或 SaaS
              收入。集中度风险实质存在，但已有部分缓释。公司称客户覆盖顶级生命科学公司的
              75%，暗示制药客户基础分散，但实际账户收入分布未知。如果五家或更少大型药企贡献了制药收入的过高比例，单个项目取消或战略转向就可能实质损害收入。整个医疗行业的数据泄露事件会带来运营和声誉风险，可能影响
              CancerLinQ 这种依赖患者数据的模型的客户留存。制药 RWE 和临床开发预算受管线驱动而波动，项目制 ECA 研究模型因此有收入不平滑风险。多年期 SaaS
              合同能降低订阅组合部分的风险，但经常性收入与项目收入的占比尚未公开披露。
