      - number: '2.3'
        title: 买方、用户与支付方分层
        blocks:
          - type: paragraph
            body: >-
              ConcertAI 客户群横跨三类主要买方，每类的预算归属、决策周期和产品匹配要求不同。最大一类是制药和生物技术公司，又可拆成三个功能子分段：临床开发团队（购买监管级 RWD 和试验设计 AI）、
              医学事务职能（购买 RWE 生成和 MSL 情报工具）以及商业上市团队（购买 GTM 分析和患者依从性产品）。药企内部预算归属从 VP Clinical Operations 到 Chief Commercial
              Officer 不等， 合同金额通常为每个项目或年度合作 $500K 至 $10M。第二类是医疗系统和学术癌症中心，购买 CancerLinQ
              产品用于质量指标报告（SmartLinQ）、临床试验匹配（TriaLinQ）和疗法选择支持， 同时购买 TeraRecon 产品用于 AI 影像和生物标志物检测。这里的预算归属通常在 CMO、CMIO 和
              Radiology Medical Director，决策周期因机构采购复杂度往往延长至 12–24 个月。 ConcertAI 称 50%
              的全球最大医疗服务提供商是其客户，但该数字未获独立验证。第三类且仍在兴起的是健康计划支付方，通过 CancerLinQ 的 PatientLinQ 模块购买肿瘤结局追踪和成本管理能力。
              支付方兴趣来自肿瘤护理向价值医疗安排转移，以及肿瘤福利成本上升。支付方细分目前贡献收入最小，但随着肿瘤护理支付方报销结构继续演变，可能成为最耐久的长期增长杠杆。关键观察是，同一套底层 CancerLinQ
              患者数据网络同时服务医疗系统（质量和试验）、药企（RWE 和证据生成）与支付方（结局分析），形成多边价值并强化数据网络的战略护城河。ConcertAI 通过 CancerLinQ 掌握的 9M+
              肿瘤患者数据网络，是其横跨三类买方的关键差异化资产。
