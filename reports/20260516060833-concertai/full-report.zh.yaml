      - number: '2.2'
        title: TAM、SAM 与 SOM 测算
        blocks:
          - type: paragraph
            body: >-
              要框定 ConcertAI 的总可用市场、可服务市场和可获取市场，需要多个测算视角；每个视角的范围、方法和置信度都不同。根据 MarketsandMarkets 和 Mordor Intelligence
              的第三方分析师综合，全球肿瘤 AI 市场当前估计为 $1.5B–$3B，并预计到 2030 年以 35–45% CAGR 增至 $15B–$25B。更广义的 RWE
              解决方案市场——既包括肿瘤，也包括其他治疗领域——估计为 $2.5B–$5B，CAGR 为 12–20%。临床试验技术市场再增加约 $5B–$10B
              的范围，但其定义与合同研究组织（CRO）服务和站点管理组织重叠，干净估算并不容易。三条垂直线合计意味着到 2030 年综合 TAM 可达
              $20B–$30B；不过，这更像是一个覆盖所有细分市场的一体化平台天花板，而不是任何单一厂商现实可获取的规模。面向生物制药的肿瘤 RWE 和 AI 的 SAM 估计为 $3B–$5B；
              这一估计采用自下而上视角，以 PhRMA 披露的每年全球 R&D 支出 $100B+ 为锚，结合其中肿瘤占比、分配给 RWE 与数据分析的比例，以及 ConcertAI 产品足迹共同框定。 ConcertAI 的
              SOM 以其估计年收入约 $160M 代理，且据称增长率为 35%。若 3–5 年后指向 $500M+ 收入目标，SOM 意味着到 2030 年可渗透 SAM 的
              10–17%——考虑到公司已有数据资产和其自称覆盖 75% 头部生命科学公司的客户关系，这一结果激进但并非不可想象。所有市场估计均为中到低置信度，应以可独立审计的数据点进行压力测试。
