      - number: '1.2'
        title: 产品组合与技术平台
        blocks:
          - type: paragraph
            body: >-
              ConcertAI 将产品拆成五个部门，合起来覆盖制药、生物技术和医疗系统价值链。Regulatory & Research 部门提供 External Control
              Arms（为临床试验提供监管级真实世界数据）、Comparative Cohort、Feasibility Assessment、 Precision
              Explorer、Patient360、Translational360 和 Precision360。Precision Suite（2025 年 5 月推出）面向商业药物开发者， 包含
              PrecisionExplorer（用于 RWE 洞察的 GenAI）、PrecisionTrials（AI 驱动的试验设计）和 PrecisionGTM（肿瘤商业情报）。 Clinical
              Development 部门以 Accelerated Clinical Trials（2026 年 2 月推出）和 Patient Matching & Automation 为核心，
              提供站点工作流方案。CancerLinQ——从 ASCO（American Society of Clinical Oncology）收购——聚合参与癌症护理机构 EHR 系统中的 9+ million
              患者数据，提供 SmartLinQ（质量指标）、TriaLinQ（试验匹配）、RxLinQ（疗法选择）和 PatientLinQ （护理队列工具）。TeraRecon（被收购后以独立 terarecon.com
              域名运营）提供医学影像 AI，包括 AV（Advanced Visualization）、 Intuition（高性能可视化）、DETECT（AI 生物标志物检测）和 Neuro（神经血管急诊 AI）；截至
              2025 年 9 月拥有超过 2,000 名全球客户。ConcertAI 还运营 CARAai 这一多 LLM AI 平台。面向商业肿瘤患者支持团队的 Cadence Suite 于 2026 年 4 月推出。
