      - number: '5.3'
        title: 部署、集成与开发路线图
        blocks:
          - type: paragraph
            body: >-
              ConcertAI 的产品部署模式随部门和客户细分而变。CancerLinQ 以云托管 SaaS 平台交付，并为社区肿瘤诊所提供 EHR 集成服务；上线时需要与各诊所的 EHR 厂商配置 FHIR API 或
              C-CDA 连接器。TeraRecon 产品覆盖三种部署模式：医院放射科传统本地永久授权安装、本地可视化工作站连接云端 AI 服务的混合配置，以及面向其 2,000 多家已安装客户群、正在推进订阅 ARR 转化的
              SaaS 迁移。Precision Suite 产品通过云 SaaS 交付给制药和生物技术企业客户，合同通常为多年期。2026 年路线图反映两项战略重点：面向临床运营的 agentic
              AI，以及更深的多模态数据集成。Accelerated Clinical Trials 嵌入由 CARAai 驱动的 agent，可自主执行多步骤流程，包括站点可行性评分、伦理提交准备和患者筛查自动化。2026
              年宣布的 NVIDIA AI Agents 联盟加深了面向下一代肿瘤 AI agent 的 GPU 基础设施投入。Foundation Medicine 2026
              年基因组集成强化了用于生物标志物发现研究的多模态数据资产。合作扩张——Bayer 临床开发（2025）、Guardant Health ctDNA（2025）和 NeoGenomics 血液学
              AI（进行中）——显示 ConcertAI 正在聚合一流数据伙伴集成，扩大 CancerLinQ 数据护城河。Veeva Systems 是临床试验软件的主要工作流竞争对手；ConcertAI
              的差异化在于数据深度，而不是工作流广度。ClinicalTrials.gov 上登记的活跃临床试验证实，ConcertAI 的患者匹配和 RWE 能力已经在真实世界部署。
