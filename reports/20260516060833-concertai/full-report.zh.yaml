        - 收入受损 30–50%；药企客户流失；估值压缩至熊市情景或更低；投资论点失效
        - 5–10%
      - - 涉及 CancerLinQ 患者数据的 HIPAA 泄露
        - 出现重大泄露（>500 份患者记录）并触发 OCR 通知
