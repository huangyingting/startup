      - number: '8.3'
        title: 情景分析、退出准备度与最终判断
        blocks:
          - type: paragraph
            body: >-
              三种情景界定概率加权投资回报。牛市情景（20% 概率）下，ConcertAI 维持 30%+ 收入增长，到 2028 年达到 $500M+；借助 NVIDIA 合作和 FDA 监管记录，获得 12–20× 战略或
              IPO 溢价倍数，并实现 $6–10B 退出估值。关键牛市假设包括：新 CEO 维持制药客户关系并加速产品扩张；ConcertAI 的 FDA ECA 记录至少被两项成功监管提交验证；IPO
              市场条件足以支持一家规模化肿瘤 AI 公司上市。基准情景（55% 概率）下，收入到 2028 年增长至 $300–400M，CAGR 放缓至约
              ~22%；公司由战略买方收购，最可能是大型制药数据公司（Roche/Flatiron 扩张、J&J 数据战略）、寻求肿瘤分析深度的 EHR 厂商，或有监管野心的 CRO；交易倍数为 10–14× 收入，对应
              $3–5B 退出。熊市情景（25% 概率）下，Tempus AI 竞争压力、CEO 空缺导致客户流失，或监管执法行动使增长不及预期；到 2028 年收入停在 $200–250M，CAGR 约 ~13%；公司面临
              down-round 或困境战略出售，按 6–9× 收入计，对应 $1.2–2.3B，接近或低于当前估值结果。概率加权企业价值约为 0.20×$8B + 0.55×$4B + 0.25×$1.7B ≈
              $4.0B，相当于当前隐含 $1.9B 入场的 2.1×——达到但未超过该风险画像所需的 2× 回报底线。退出准备度中等。ConcertAI 具备机构级特征：Goldman Sachs 投资者关系、NVIDIA
              合作、2024 年 8 月聘任 CFO（Michael Myshrall）、活跃癌症试验登记存在，以及服务已验证制药工作流痛点的多产品平台。不过，CEO 空缺、财务不透明、缺少 SOC 2 Type II
              公开认证，以及 cap table 无法核验，形成退出准备缺口；任何 IPO roadshow 或结构化 M&A 流程前都必须补齐。Cadence Suite 商业分析产品发布和 JP Morgan
              Healthcare Conference 2024 演示，显示商业成熟度，但不能替代缺失的治理材料。最终尽调问题包括：CEO 身份确认（阻断门槛）、含 NRR/GRR 披露的审计财务（阻断门槛）、Goldman
              Sachs 轮融资文件及 cap table 和优先权结构（重大）、TeraRecon FDA 放行连续性确认与 SOC 2 Type II 状态（重大），以及 SAI Group
              公司间协议条款（重要）。论点破裂触发器包括：任何 ECA 或 RWE 产品遭 FDA 执法、CancerLinQ 发生涉及重大患者记录的 HIPAA 泄露、CEO 空缺延续到 2026 年 11 月以后，或
              SAI Group 正式宣布剥离。
