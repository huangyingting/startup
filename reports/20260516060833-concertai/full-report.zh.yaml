      - number: '4.3'
        title: 资本结构与融资历史
        blocks:
          - type: paragraph
            body: >-
              ConcertAI 的资本结构以 SAI Group（SymphonyAI）为锚；SAI Group 是公司的创始支持方，并保留重要所有权。SAI Group 背书提供隐性资本缓冲，也带来共享 AI
              基础设施和企业客户关系，降低 ConcertAI 相比完全独立同行的单体现金消耗。 在 Goldman Sachs 轮次之前，ConcertAI 获得 Sixth Street Partners
              的成长股权投资，也有 Declaration Partners、Maverick Ventures 和 AllianceBernstein PCI 参与——这组投资方覆盖机构成长股权、家族办公室和信贷导向资本。
              最近且规模最大的已披露融资，是 Goldman Sachs Asset Management 于 2024 年 6 月进行的 $150M 战略投资；该交易按约 $1.9B 估值，对应约 12x
              的隐含远期收入倍数（基于约 $160M 估计收入）。Goldman Sachs 将其描述为 “strategic investment” 而不是传统风险轮，暗示其可能带有优先股、结构化融资或与 Goldman's
              资产管理授权相匹配的共同投资权特征。Goldman 轮次之前或同期的累计融资总额未公开披露，也没有审计级财务报表可用。截至 2026 年 5 月，公司没有 IPO 文件、S-1 注册或 SPAC 公告，说明
              ConcertAI 仍走私有路径；Goldman Sachs 投资很可能用于商业扩张、AI 产品投入和潜在补充收购。现金跑道和烧钱速度未公开，因此资本充足性评估受到有限公开信息约束。
