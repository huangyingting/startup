      - number: '1.6'
        title: 监管背景与市场动态
        blocks:
          - type: paragraph
            body: >-
              ConcertAI 的核心 RWE 业务处在 FDA 21st Century Cures Act（Section 505F）塑造的监管环境中；该法确立了真实世界数据（RWD）和真实世界证据（RWE）
              在药物评估中的使用。FDA Real-World Evidence Framework（2018 年 12 月）提出 “fit for purpose” 要求：RWD 在支持监管申报前必须满足质量和相关性标准。
              FDA 2021 年 1 月发布的 AI/ML-Based Software as a Medical Device（SaMD）Action Plan 将监管延伸到 AI
              驱动医疗产品，要求上市前审查、Algorithm Change Protocols 和上市后性能监测——这抬高了 TeraRecon 影像 AI 工具以及任何寻求 FDA 批准的 AI
              产品的合规门槛。市场竞争激烈：Flatiron Health （Roche Group 关联公司，自称 2012 年起为肿瘤 RWE 先行者）和 Tempus AI（拥有 6,500+ 肿瘤医生、40M+
              患者记录和 4,500+ 医疗机构）都是强大的既有玩家。 这些竞争动态叠加 FDA 对 AI/ML 医疗软件的严格监管，形成实质市场逆风；ConcertAI 若要维持自称的领先地位，必须穿过这道关。
