      - number: '7.2'
        title: 运营、技术与安全风险图谱
        blocks:
          - type: paragraph
            body: >-
              截至 2026 年 5 月，最直接的运营风险是 2025 年 5 月宣布的领导层过渡：创始人兼 CEO Jeff Elton 转任 Vice Chairman，公司同时开展 CEO 搜寻。公开资料尚未发现新
              CEO 任命公告，意味着领导层缺口已持续超过十二个月。ConcertAI 处在 $1.9B 估值阶段，拥有复杂的企业制药关系和活跃监管合规项目，长期 CEO
              空缺会带来执行风险、客户关系不确定性和战略漂移。Jeff Elton 在制药高管和肿瘤研究圈中是 ConcertAI 品牌的突出代表，他退后一步带来关键人物依赖风险，Vice Chairman
              职位只能部分缓解。2024 年 8 月任命 Michael Myshrall 为 CFO，显示公司可能在 IPO 或退出前有意推进 C-suite 专业化，但 CEO 缺口仍是最主要的人事风险。EHR
              集成脆弱性是结构性运营风险。CancerLinQ 数据抽取依赖与数百家社区肿瘤诊所 EHR 系统的持续连接，跨越 Epic 和 Cerner 平台。EHR 厂商政策变化、API
              版本升级、诊所整合或系统迁移，都可能打断数据流并损害数据完整性。数据完整性下降会影响下游 RWE 研究质量，并可能削弱 FDA 适用目的判断。临床肿瘤 AI 中已记录 AI
              模型漂移：治疗方案演进、患者人群变化、真实世界编码实践改变之后，基于历史数据训练的 AI 模型可能输出质量下降或带有偏差，却不触发明显临床警报。ConcertAI AI 模型——包括 TeraRecon 放射科
              AI 和 PrecisionExplorer 队列分析——需要持续监测和再验证，才能维持准确性与临床可靠性。AWS 云集中度造成运营依赖：重大 AWS 区域故障可能同时扰乱 ECA
              研究交付时间表、临床试验匹配运营和实时放射科 AI 工作负载；公开披露中看不到多云冗余证据。2024–2025 年，肿瘤竞争格局明显升温：Tempus AI 完成公开 IPO，Flatiron
              Health（Roche）推出扩展 RWE 产品，IQVIA 部署 Deciphex 和 RWE 能力——每个竞争对手都有资源，能够以有竞争力的价格向 ConcertAI 的制药客户提供相当或更强的平台。
