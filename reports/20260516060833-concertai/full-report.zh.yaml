      - number: '6.2'
        title: 采用轨迹与具名客户证据
        blocks:
          - type: paragraph
            body: >-
              从 2019 年成立到 2024 年 6 月 Goldman Sachs 以 $1.9B 估值投资 $150M，ConcertAI 的采用轨迹明显加速。从 ASCO 收购 CancerLinQ
              后，医疗系统客户基础扩展为来自社区肿瘤诊所的 900 多万患者网络。TeraRecon 自收购以来保留并扩大了 2,000 多家全球医院客户，显示医疗系统采用具有韧性。截至 2025 年 1 月，公司收入估计约
              $160M，同比增速约 35%，反映制药和医疗系统两个细分的采用持续复合。2025 年 5 月 Precision Suite 发布，为平台增加 GenAI 原生能力，也为既有 ECA 研究客户创造 SaaS
              加购位置。具名合作证据覆盖 2024 年 12 月至 2026 年 1 月宣布的六项已确认关系，横跨制药、技术和诊断。NVIDIA 面向肿瘤 AI agent 的联盟（2025 年 3 月）显示技术伙伴对 AI
              平台的验证。Bayer 战略临床开发协议（2025 年 4 月）代表企业制药客户采用 RWE 和试验 AI。Foundation Medicine 基因组数据集成（2026 年 1 月）、NeoGenomics
              血液学 / 肿瘤学 AI SaaS（2024 年 12 月）以及 Guardant Health 液体活检 ctDNA 合作（2025 年 1 月）说明，诊断公司既是客户，也是共同开发伙伴。Dewpoint
              Therapeutics 转化肿瘤学合作（2024 年 12 月）验证了早期生物技术公司采用。历史资料提到 AbbVie 和 Caris Life Sciences 为客户，暗示未披露的制药客户基础更广。2025
              年任命 Shawn W. Bates 为 Commercial Solutions 总经理，显示公司投入商业客户扩张，也说明商业团队正围绕扩大具名客户基础而成长。ClinicalTrials.gov 确认的
              ConcertAI 相关站点活跃临床试验，反映试验 AI 和患者匹配能力已在真实世界部署。
