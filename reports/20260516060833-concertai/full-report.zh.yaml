        - 私有公司；累计融资 $50M+；40M+ 患者记录；180+ 网络成员
        - 药企临床开发团队、学术医学中心、CRO
        - 试验可行性平台、方案设计、站点选择、患者队列分析
        - 预竞争试验设计能力强；大型学术医学中心网络；价值主张以试验为中心
        - 上市后 RWE 能力有限；用例范围更窄；不在影像或基因组上竞争
      - - Syapse
        - 相邻玩家 — 精准肿瘤（医疗系统）
        - 私有公司；累计融资约 $100M（估计）；规模较小；客户包括 NCI 指定癌症中心
        - 大型医疗系统、学术癌症中心、支付方
        - 精准肿瘤平台、临床决策支持、真实世界数据登记库、支付方分析
        - 深度嵌入医疗系统工作流；集中于 NCI 癌症中心；支持分子肿瘤委员会
        - 面向药企的产品套件有限；数据集小于 ConcertAI 或 Tempus；无影像 AI；生物制药收入有限
      - - Palantir（生命科学 AIP）
        - 企业 AI 平台 — 间接竞争者
        - '上市公司（NYSE: PLTR）；年收入 $2B+；客户覆盖全球政府和企业'
        - 大型药企、政府卫生机构、医院系统
        - Palantir Foundry、AIP（AI 编排）、本体驱动的数据整合、临床运营 AI
        - 最灵活的企业 AI 平台；政府 / 监管行业信誉强；AIP 生成式 AI 智能体
        - 不专注肿瘤；需要重度集成和定制；竞争发生在平台层，而不是分析层
      - - Komodo Health
        - 相邻玩家 — 患者数据分析
        - 私有公司；累计融资约 $220M；声称拥有 325M+ 患者数据集；客户为药企商业团队
        - 药企商业和医学事务团队、支付方
        - MapEnhance 纵向患者数据集、HCP 定向、治疗路径分析、市场准入情报
        - 声称拥有美国最大的纵向患者数据集；覆盖多类支付方；商业分析能力强
        - 肿瘤临床颗粒度不如 CancerLinQ；无影像 AI；无临床试验匹配；公开 About 页面返回 404
      - - 'Veeva Systems (NYSE: VEEV)'
        - 相邻玩家 — 临床数据管理
        - 上市公司；年收入 $2B+；主导药企 CRM 和临床应用
        - 药企和生物技术公司、CRO
        - Vault CDMS（临床数据管理）、Vault EDC、Vault eTMF、CRM（Salesforce 替代）
        - 临床试验数据管理占主导；药企 CRM 装机基础深；合规基础设施强
        - 不是 RWE 或肿瘤分析厂商；临床数据管理与 ConcertAI 核心产品互补，不能替代
