      - number: '7.3'
        title: 合作伙伴、依赖与财务风险图谱
        blocks:
          - type: paragraph
            body: >-
              ConcertAI 的战略位置高度依赖关键合作伙伴和母公司关系，而这些关系的稳定性无法仅凭公开披露充分评估。最重要的结构性依赖是 SAI Group 作为母公司或控制实体。SAI Group
              战略优先级、财务状况或管理层发生任何变化，都可能扰乱 ConcertAI 平台投资所需的资本获取、战略方向和组织稳定性。Goldman Sachs Asset Management 2024 年 6 月
              $150M 战略投资，按典型企业 AI 烧钱速度估算可提供 18–24 个月运营 runway；但公司未公开披露烧钱率或剩余现金，资本充足性无法独立核验。如果 ConcertAI
              在流动性事件前还需要追加资本，Goldman Sachs 或 SAI Group 支持可以被假定，但公开证据中没有合同保证。NVIDIA 面向肿瘤 AI agent 的合作在运营上很重要：NVIDIA GPU
              基础设施、BioNeMo 大语言模型训练资源和 NeMo 框架工具，支撑 Accelerated Clinical Trials 和 Precision Suite 的 AI 能力。NVIDIA
              任何定价变化、访问限制，或自己投资竞争性肿瘤 AI，都会影响 ConcertAI AI 基础设施成本结构和竞争差异化。Foundation Medicine（Roche）为多模态 RWE
              研究提供基因组数据；排他性条款未公开披露，而 Foundation Medicine 同时也是精准肿瘤分析市场的竞争者。收入集中度风险很实质：ConcertAI 声称覆盖顶级生命科学公司的
              75%，但没有披露单个账户收入；如果五家或更少大型药企账户贡献超过 40% 收入，单个项目取消或预算重新分配就可能造成重大收入损害。制药 RWE 和临床开发预算受管线波动影响：2025–2028
              年全行业专利悬崖动态可能压缩 ECA 研究预算。财务模型风险还包括经常性 SaaS 收入与项目制 ECA 研究收入占比不明——这两类收入在估值含义上差异很大，尤其是在已披露 $1.9B 企业价值、按估计
              $160M 收入约 12x 收入倍数的背景下。
