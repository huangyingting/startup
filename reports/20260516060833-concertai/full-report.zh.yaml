      - - 一体化多产品平台广度（影像 + RWE + 基因组 + 商业 + 试验 AI）
        - 平台整合
        - 若药企买家转向每项能力的最佳单点厂商，客户整合会形成风险；IQVIA 打包能以更大规模给出替代一体化方案
        - 高
