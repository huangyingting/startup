      - number: '3.4'
        title: 护城河耐久性与被替代风险
        blocks:
          - type: paragraph
            body: >-
              ConcertAI 的竞争护城河可分为四类耐久项和三类风险项。耐久护城河包括：（1）肿瘤数据网络深度——CancerLinQ 的 9M+ 患者记录具备深层临床结构，是社区肿瘤诊所多年 EHR
              数据积累，无法快速复制； （2）一体化平台广度——没有直接竞争对手同时覆盖影像 AI、源自 EHR 的 RWE、基因组数据集成和 AI 智能体编排；（3）ASCO/NCCN
              生态连接，在肿瘤社区提供声誉定位；（4）NVIDIA 联盟，在能力商品化前创造近端生成式 AI 基础设施优势。风险项包括：（1）监管记录——Flatiron 更长的 FDA 申报历史构成护城河，而
              ConcertAI 仍在搭建；（2）AI 商品化——随着基础模型改进，自有数据之上的 AI 差异化层价值会被压缩，数据质量和网络触达才会成为耐久差异化； （3）Tempus
              上市后增长轨迹——凭借公开市场资本和加速数据积累，Tempus 可能缩小临床数据深度差距。最急迫的替代风险来自 IQVIA：它可能更激进地投资 AI-native
              肿瘤分析，借助药企既有位置和全球数据规模挤出专业厂商。 次级风险是通用医疗健康 AI 平台（Palantir、IBM Merative 后继者）推动肿瘤专用分析能力以更低价格可得。ConcertAI
              的回应——2024 年以 $1.9B 估值完成 Goldman Sachs $150M 融资、与 Dewpoint Therapeutics 合作、 以及 NVIDIA 联盟——显示其在主动加固护城河，但 AI
              差异化的耐久窗口只有 18–36 个月，之后更广泛的商品化会到来。
