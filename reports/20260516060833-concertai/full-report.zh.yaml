      - number: '4.2'
        title: 单位经济与成本结构
        blocks:
          - type: paragraph
            body: >-
              ConcertAI 的单位经济横跨两端：一端是高毛利 SaaS 和数据分析，另一端是低毛利专业服务和影像维护。SaaS 和数据分析细分估计毛利率为 60–75%，与可比肿瘤数据平台公司一致。专业服务毛利率估计在
              30–40% 区间，原因是研究设计、生物统计和监管申报支持劳动密集。影像 AI 细分（TeraRecon）综合毛利率估计为 45–60%，反映传统永久许可装机基础正向 SaaS
              迁移，而维护合同毛利高于新实施服务。公司综合毛利率估计为 55–65%，取决于收入结构。 主要收入成本驱动项包括 CancerLinQ 9M+ 患者记录集的数据获取和网络维护成本、云和 GPU 计算基础设施（包括
              NVIDIA 合作成本），以及专业服务交付人力。研发支出很大，覆盖 CancerLinQ 分析、TeraRecon 影像 AI 和 Accelerated Clinical Trials 产品中智能体 AI
              能力的模型训练。营运资本被医疗系统数据合作的 EHR 集成成本、以及导入新 CancerLinQ 网络贡献方所需前置投入推高。销售周期很长（企业药企合同 9–18 个月），获客成本高，因为必须协调临床、监管和
              IT 利益相关方。HIPAA 合规和 FHIR 互操作要求带来持续技术与法律开销，相比纯软件同行压缩净利润率。NVIDIA 联盟虽提供差异化 AI 计算能力，也让公司对 GPU 基础设施形成成本依赖；即使 AI
              能力商品化，这种依赖也未必完全消退。 参照行业基准，鉴于这些结构性成本驱动和维护规模化竞争数据网络所需投资，ConcertAI 的经营亏损很可能显著。
