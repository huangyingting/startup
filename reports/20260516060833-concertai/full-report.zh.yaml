      - number: '3.3'
        title: 切换成本、锁定效应与多供应商并用
        blocks:
          - type: paragraph
            body: >-
              肿瘤 RWE 生态的切换成本分析显示：锁定效应真实存在但不完整，最大药企客户普遍多供应商并用。供给侧，CancerLinQ 的机构集成带来数据贡献惯性：已向网络贡献多年患者数据、并采用 CancerLinQ
              质量报告工具 （SmartLinQ）的医疗系统，若切换到替代网络，会承受有意义的工作流中断成本。CancerLinQ 的 ASCO
              渊源进一步强化这一点——它起源于权威肿瘤专业学会创建的质量改进项目，带来竞争对手缺乏的机构合法性。 Flatiron 的锁定机制最深：OncoEMR 作为肿瘤诊所主要 EHR
              部署，切换成本涉及重新培训临床人员、迁移结构化治疗数据，以及替换计费和事先授权工作流。这种 EHR 级锁定转化为 Flatiron RWE 平台的数据独占性， 因为 OncoEMR 诊所生成的 EHR
              数据会自然流入 Flatiron 研究网络。对药企买方而言，切换成本更低。大型药企通常会多供应商并用，即同时从多个厂商购买肿瘤数据和分析。Top-ten 药企可能同时使用 IQVIA 获取全球市场数据、 用
              Flatiron 或 ConcertAI 做监管 RWE、用 Tempus 做基因组数据、用 Komodo Health 做商业分析。这种多厂商方式降低任何单一供应商的锁定杠杆，也削弱 ConcertAI
              收取独占溢价的能力。IQVIA 的分销优势并不来自切换成本本身， 而来自其在临床运营预算中的既有位置：CRO 和数据许可关系创造了新进入者无法匹敌的捆绑机会。ConcertAI 与 SAI Group 的关联以及
              Cognizant 合作提供企业 IT 实施渠道，有助于留存，但并不构成产品层面的强锁定。
