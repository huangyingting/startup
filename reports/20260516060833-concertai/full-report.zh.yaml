    approximationNotes: >-
      TeraRecon 留存估算假设 PACS / 工作站集成带来高结构性粘性；医疗影像 AI SaaS 同行通常报告 88–94% 的毛留存。CancerLinQ 估算假设 EHR
      连接和质量项目参与带来社区诊所切换成本；但相较医疗系统核心 IT，其预算优先级较低，形成抵消。药企 ECA 留存反映项目制模式，这里的“留存”指重复赞助；行业可比对象显示 RWE 平台供应商的重复项目率为
      60–75%。Precision Suite 估算仅覆盖第 1 年；第 2 年尚无足够时间沉淀数据。
