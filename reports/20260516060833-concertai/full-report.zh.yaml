  - number: 3
    title: 竞争格局
    sections:
      - number: '3.1'
        title: 竞争格局概览
        blocks:
          - type: paragraph
            body: >-
              ConcertAI 的竞争环境可归纳为五类玩家。第一类是直接的肿瘤 RWE 同行：Tempus AI（Nasdaq: TEM）和 Flatiron Health（2018 年以来为 Roche
              子公司）是最接近的竞争对手， 两者都提供带临床试验匹配和真实世界证据生成的肿瘤数据平台。Tempus 于 2024 年 6 月上市，报告与 6,500+ 肿瘤医生合作并可访问 40M+
              患者记录，因此既是资金最充足、也是增长最快的直接同行。 Flatiron 的竞争优势来自部署在肿瘤诊所的 OncoEMR EHR 系统，以及更长的 FDA 申报监管记录；2018 年 Roche 以约 $1.9B
              收购 Flatiron，为这一记录提供支撑。第二类是大型既有数据和 CRO 公司：IQVIA（NYSE: IQV，年收入 $14B+）是药企数据和 CRO 服务中的主导既有玩家，其 Real World
              Solutions 部门和 Oncology Analytics 产品与 ConcertAI 的生物制药客户细分形成覆盖重叠。 Veeva Systems（NYSE: VEEV）通过 Vault CDMS
              主导临床试验数据管理，但对多数 ConcertAI 用例而言更像互补而非替代。第三类是临床试验网络厂商：TriNetX 提供试验可行性和方案设计网络， 拥有 40M+
              患者记录，主要瞄准学术医疗中心。第四类是相邻精准肿瘤平台：Syapse 聚焦面向医疗系统的临床决策支持和真实世界登记管理。Komodo Health 称拥有美国最大的纵向患者数据集（325M+
              患者），但肿瘤临床颗粒度较弱。第五类是企业 AI 平台：Palantir 的 AIP 产品在药企数据整合和 AI 编排层竞争，可成为大型生物制药公司内部分析基础设施的潜在替代。IBM 旧 Watson
              Health 部门已于 2022 年剥离并以 Merative
              运营，代表一个弱化但仍活跃的医疗健康分析传统参与者。药企买方的存量替代方案仍是内部生物统计团队叠加用于特定分析任务的点状解决方案厂商；ConcertAI 通过一体化端到端肿瘤 RWE 和试验平台替代这一组合。
