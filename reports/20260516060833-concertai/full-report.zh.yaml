        - Tempus AI 在 IPO 后用资本加速数据合作，积累多模态记录；Komodo Health 声称患者覆盖更广
        - 高
        - 核实年化数据新增速度；审计 CancerLinQ 患者记录的完整性和新鲜度；评估 ASCO 数据排他性的锁定期
      - - TeraRecon 影像 AI 平台（全球临床客户 2,000+）
        - 产品广度 / 装机基础
