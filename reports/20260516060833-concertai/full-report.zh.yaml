      - number: '5.2'
        title: 技术架构与 AI 平台
        blocks:
          - type: paragraph
            body: >-
              ConcertAI 的技术栈由三根基础设施支柱撑起：Amazon Web Services 负责符合 HIPAA 的云计算与存储，NVIDIA NeMo 和 BioNeMo 框架负责 GPU 加速的 AI
              模型训练与推理，HL7 FHIR R4 则是临床数据交换的核心互操作标准。AWS 是 CancerLinQ 数据摄取与存储、PrecisionExplorer GenAI 查询引擎以及 ConcertAI
              MLOps 流水线的云底座；与 AWS 签署的 HIPAA Business Associate Agreements 约束患者数据安全要求。NVIDIA 合作在 2026 年进一步扩展到肿瘤试验 AI
              agent 开发，使 ConcertAI 能用 BioNeMo 训练肿瘤专用基础模型，并借助 NeMo 为实时 ECA 和 RWE 工作负载部署高性能推理。CARAai 是 ConcertAI 自有的多 LLM
              编排层，会根据任务类型和领域专属性，在 GPT、Claude 和自有肿瘤模型之间把分析查询路由给最合适的 AI 模型，为所有产品部门提供统一 AI 界面。这套架构让新 AI
              模型版本接入时，不必重构单个产品模块。面向 Epic、Cerner 和 Meditech 的 EHR 连接器为 CancerLinQ 网络自动摄取结构化数据，同时用 FHIR R4 API 和 C-CDA
              文档交换支持实时与批量传输。合作伙伴数据集成增加了多模态深度：Foundation Medicine 基因组测序数据、Guardant Health 液体活检 ctDNA，都在患者层面与 CancerLinQ
              临床数据打通。TeraRecon 影像平台采用混合模式，本地放射科工作站与云连接并行，通过 PACS/RIS 集成处理 DICOM 图像，服务 AI 生物标志物检测流程。
