      - number: '5.5'
        title: 信任、安全、合规与质量控制
        blocks:
          - type: paragraph
            body: >-
              ConcertAI 处在复杂的多层合规环境中，既受患者隐私法约束，也要遵守真实世界证据和 AI 医疗器械相关的 FDA 监管框架，还面对新兴 AI 治理要求。所有处理受保护健康信息的产品均受 HIPAA 和
              HITECH 约束，需要与每个医疗系统合作伙伴和云服务商签署 Business Associate Agreements。21st Century Cures Act 要求 ConcertAI 的
              CancerLinQ 平台实施 FHIR R4 API，支持患者数据可携带性，并禁止限制患者授权第三方互操作的信息阻断做法。RWE 产品方面，ConcertAI 对齐 FDA 2018 年 12 月发布的
              Real-World Evidence Framework；该框架为用于支持监管提交的 RWD 设定研究设计、数据质量和分析标准，也约束 ECA 研究如何设计并记录以供 FDA 审查。TeraRecon 的 AI
              放射科产品 DETECT 和 Neuro 属于 FDA AI/ML Software as a Medical Device 指引范围，临床决策支持软件需要披露 AI
              性能、评估偏差，并进行上市后监测。CancerLinQ 研究网络的数据治理运行在 IRB 监督协议之下，患者数据去标识化遵循 HIPAA Safe Harbor 和 Expert Determination
              方法。ConcertAI 的 SOC 2 Type II 状态尚未公开确认，这是尽调中应核验的缺口；任何企业级医疗 SaaS 提供商都应具备这项标准。GenAI
              功能（PrecisionExplorer、CARAai）的 AI 安全控制必须处理幻觉风险和输出验证，因为其使用场景是监管级 RWE 生成。AI 生成证据若在监管提交中被错误使用，会构成实质合规和责任风险。
