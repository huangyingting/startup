  - id: FU001
    type: journey-map
    title: 客户旅程图
    description: 该端到端客户旅程以一个代表性药企赞助方为例，展示其接触 ConcertAI 的全过程：从最初认知，到生产部署，再到扩展至更多管线项目和产品模块。
    claimRefs:
      - CU001
      - CU030
      - CU031
    data:
      items:
        - label: 认知
          detail: 药企临床运营或医学事务团队通过 ASCO / ESMO / J.P. Morgan 会议露出、Goldman Sachs 网络引荐，或同业药企推荐认识 ConcertAI。
          touchpoints:
            - ASCO 和 ESMO 会议露出及大会发言
            - J.P. Morgan Healthcare Conference（2025 年 1 月演示已确认）
            - 2024 年投资后，Goldman Sachs Asset Management 投资组合网络
        - label: 评估
          detail: >-
            临床运营和监管事务团队评估 ConcertAI 是否适用于 ECA 可行性或 RWE 研究设计；请求平台演示和试点数据范围界定。评估时会对标 Flatiron Health、IQVIA 和 TriNetX
            等替代方案。
          touchpoints:
            - 面向试验设计可行性的可行性评估模块演示
            - 向 ConcertAI 商业团队发起 RFP 或直接沟通
            - 与 Flatiron / IQVIA / TriNetX 平台能力对比
        - label: 采购
          detail: 采购和法务团队谈判主服务协议、数据访问时间表和工作说明书；临床开发或医学事务预算负责人批准预算。
          touchpoints:
            - 与 ConcertAI 法务和商业团队签署 MSA / SOW
            - 审查 HIPAA BAA 和数据访问协议
            - VP Clinical Operations 或 VP Medical Affairs 批准预算
        - label: 上线
          detail: ConcertAI 实施团队开通数据访问并配置队列参数；SaaS 产品则建立 API 或平台集成。ECA 客户会获得 ConcertAI 数据科学家的方案设计支持。
          touchpoints:
            - 数据队列规格定义与 IRB 方案对齐
            - 开通平台 API 访问或搭建 EHR 集成
            - 为研究设计分配 ConcertAI 数据科学家
        - label: 活跃使用
          detail: 客户用 ConcertAI 平台执行 ECA 研究、开展试验可行性分析，或运行 SaaS 分析工作流。研究结果交付给监管申报或内部决策使用。
          touchpoints:
            - 执行 ECA 研究并交付 FDA 申报包结果
            - PrecisionExplorer RWE 查询或 PrecisionTrials 方案优化
            - CancerLinQ 试验匹配（TriaLinQ），用于研究中心和患者识别
        - label: 扩展
          detail: >-
            ECA 研究成功后，客户追加赞助更多管线项目，或升级购买 Precision Suite SaaS；医疗系统扩大 CancerLinQ 模块使用。NVIDIA、Bayer、Foundation Medicine
            合作展示了多产品扩张路径。
          touchpoints:
            - 跨药物管线项目追加 ECA 研究
            - Precision Suite SaaS 订阅升级销售（PrecisionTrials、PrecisionGTM）
            - 将 Accelerated Clinical Trials 智能体式 AI 扩展到更多试验运营场景
