  evidenceGaps:
    - id: GE001
      type: private-evidence-only
      severity: material
      topic: security-certifications-and-audit-status
      missingEvidence: >-
        ConcertAI has not publicly disclosed whether it holds SOC 2 Type II certification,
        ISO 27001 certification, or any other independently audited information security
        standard for its cloud infrastructure and data handling operations. Given that
        CancerLinQ stores 9 million or more patient records in cloud infrastructure, the
        absence of publicly available audit attestations creates an unverified compliance
        assumption. HIPAA compliance is mandatory and self-reported, but independent
        third-party security audits provide stronger assurance for enterprise customers
        evaluating ConcertAI's data stewardship practices.
      whyItMatters: >-
        Enterprise pharmaceutical customers and health system partners increasingly require
        SOC 2 Type II or equivalent attestations as contractual prerequisites for data-sharing
        agreements. Without confirmed audit status, due diligence must assume compliance based
        on customer references rather than independent validation. Any undisclosed security
        incident in the CancerLinQ network would materially damage ConcertAI's regulatory
        credibility and customer relationships.
      diligencePath: >-
        Request SOC 2 Type II audit report and any ISO 27001 certificates directly from
        ConcertAI during data room review; ask for AWS BAA documentation and cloud security
        architecture diagram; request the most recent penetration testing summary and
        any incident response records for the CancerLinQ network.
      relatedQuestionRefs: [QE022]
      relatedTableRefs: [TE004]
  
    - id: GE002
      type: undiscoverable-without-disclosure
      severity: material
      topic: adverse-regulatory-history-and-ECA-rejection-risk
      missingEvidence: >-
        No public records are available indicating whether ConcertAI's External Control Arm
        methodology has been challenged, rejected, or restricted by the FDA in any specific
        regulatory submission. Similarly, no public information is available about data breaches,
        security incidents, or HIPAA enforcement actions involving ConcertAI or the CancerLinQ
        patient network. These are inherently non-public facts prior to formal regulatory action
        or litigation, making them undiscoverable from open sources.
      whyItMatters: >-
        FDA rejection of an ECA submission or increased FDA skepticism about RWE methodology
        would directly impair ConcertAI's core value proposition for pharmaceutical customers.
        Similarly, a data breach affecting the CancerLinQ network would trigger HIPAA breach
        notification requirements, regulatory investigation, and likely customer attrition.
        Both scenarios represent tail-risk events that should be assessed via direct management
        inquiry and data room review of regulatory correspondence.
      diligencePath: >-
        Request copies of all FDA regulatory correspondence involving ECA studies in which
        ConcertAI data was used; ask management directly about any HIPAA breach notifications
        filed under 45 CFR 164.400 et seq.; review customer contracts for limitation-of-liability
        provisions related to data integrity; check FDA warning letter database for any
        correspondence related to ConcertAI or TeraRecon products.
      relatedQuestionRefs: [QE016, QE018]
      relatedTableRefs: [TE004]
  
    - id: GE003
      type: private-evidence-only
      severity: informational
      topic: AI-algorithm-clinical-validation-evidence
      missingEvidence: >-
        No peer-reviewed publications or FDA-registered studies have been identified that
        independently validate the accuracy and safety of ConcertAI's patient matching
        algorithm in Accelerated Clinical Trials, the hallucination rate and output accuracy
        of PrecisionExplorer's GenAI RWE queries, or the sensitivity and specificity of
        TeraRecon DETECT for specific cancer biomarkers in diverse patient populations.
        Validation data may exist in internal studies or customer-sponsored research not
        publicly available.
      whyItMatters: >-
        As ConcertAI products are used in FDA regulatory submissions (ECA) and clinical
        trial operations (Accelerated Clinical Trials), undetected errors in AI output could
        propagate into regulatory decisions or patient screening results. The absence of
        published validation creates uncertainty about the clinical reliability of AI-assisted
        workflows and limits the ability of external evaluators to assess product safety.
      diligencePath: >-
        Request internal validation studies and performance benchmarking reports for
        PrecisionExplorer's RWE generation accuracy; ask for DETECT sensitivity/specificity
        data by indication and imaging modality; request post-market performance monitoring
        reports for TeraRecon Neuro in stroke detection; review any clinical study agreements
        that have evaluated Accelerated Clinical Trials patient matching accuracy.
      relatedQuestionRefs: [QE025]
      relatedTableRefs: []
  
    - id: GE004
      type: private-evidence-only
      severity: informational
      topic: SaaS-transition-progress-and-roadmap-commitments
      missingEvidence: >-
        The pace and financial impact of TeraRecon's SaaS migration from on-premise perpetual
        licenses to subscription ARR has not been publicly quantified. It is unknown what
        percentage of TeraRecon's 2,000-plus customers have migrated to SaaS, what churn rate
        is occurring in the legacy license base during migration, and whether the SaaS pricing
        generates equivalent or higher revenue per customer compared to perpetual licenses.
        Similarly, specific roadmap commitments and delivery timelines for the NVIDIA AI
        Agents alliance and Foundation Medicine genomic integration are not publicly available.
      whyItMatters: >-
        SaaS migration execution is a critical determinant of whether TeraRecon's contribution
        to ConcertAI's overall revenue profile improves or deteriorates. If legacy customers
        resist migration or churn during the transition, the hoped-for ARR uplift will not
        materialize and the mixed license/SaaS revenue base will persist. Understanding
        migration progress is essential for projecting ConcertAI's future recurring revenue
        and gross margin trajectory.
      diligencePath: >-
        Request TeraRecon segment revenue breakdown by license type (perpetual vs. SaaS
        subscription vs. maintenance) for FY2023–FY2025; ask for migration status by customer
        cohort; request NVIDIA AI Agents alliance product roadmap and milestone schedule;
        ask for Foundation Medicine integration go-live date and customer access timeline.
      relatedQuestionRefs: []
      relatedTableRefs: [TE005]
  

