company:
  name: ConcertAI

chapter:
  number: 5
  title: Product and Technology
  summary: >-
    ConcertAI operates a portfolio of seven AI-driven oncology product divisions spanning
    regulatory real-world evidence, clinical trial AI, radiology imaging AI, and commercial
    oncology intelligence. The Precision Suite—launched May 2025—offers GenAI-powered RWE
    queries (PrecisionExplorer), AI trial design (PrecisionTrials), and commercial intelligence
    (PrecisionGTM). CancerLinQ, acquired from ASCO, aggregates 9 million or more patient
    records from community oncology practices using HL7 FHIR R4. TeraRecon provides AI
    biomarker detection and 3D visualization to 2,000 or more global hospital customers.
    The AI backbone, CARAai, orchestrates multiple large language models including GPT,
    Claude, and proprietary oncology models on AWS cloud with NVIDIA NeMo and BioNeMo GPU
    acceleration. Key 2026 launches include Accelerated Clinical Trials (agentic AI for
    site activation and patient matching) and Cadence Suite (commercial oncology field tools).
    Differentiation rests on curated multi-modal oncology data integrating clinical EHR,
    genomics via Foundation Medicine, and liquid biopsy via Guardant Health, alongside a
    regulatory-grade ECA methodology with FDA submission track record. Compliance obligations
    span HIPAA, FDA RWE Framework, FDA AI/ML SaMD guidance for radiology AI, and 21st
    Century Cures Act FHIR mandates.


sections:
  - id: product-portfolio-and-module-map
    title: "Product Portfolio and Module Map"
    body: >-
      ConcertAI organizes its product portfolio into seven divisions unified by a common AI
      backbone (CARAai) and a shared multi-modal oncology data foundation. The Regulatory and
      Research division anchors the company's original value proposition: External Control
      Arms (ECA) for FDA-submission-grade RWE comparator studies, Comparative Cohort Analysis
      for retrospective observational studies, and Feasibility Assessment for trial design
      planning. The Precision Suite, launched in May 2025, elevated this capability to a
      GenAI-powered platform with three modules—PrecisionExplorer (natural language RWE
      queries), PrecisionTrials (AI protocol optimization), and PrecisionGTM (commercial
      oncology intelligence)—targeting both research and commercial pharma workflows.
      The CancerLinQ division, acquired from ASCO, operates the largest community oncology
      patient network in the United States at 9 million or more patient records, supported
      by four sub-modules: SmartLinQ (quality tracking), TriaLinQ (trial matching), RxLinQ
      (therapy selection), and PatientLinQ (cohort management). TeraRecon provides radiology
      AI serving 2,000 or more global hospital customers through AV/Intuition 3D visualization,
      DETECT AI biomarker detection, and Neuro for neurovascular emergency imaging. Accelerated
      Clinical Trials (February 2026) and Cadence Suite (April 2026) represent the newest
      additions, extending ConcertAI into agentic clinical trial management and commercial
      oncology field intelligence respectively. Patient360, Translational360, and Precision360
      round out the research analytics portfolio. CARAai serves as an internal AI platform
      orchestrating large language models from multiple vendors across all product lines.
    claimRefs: [CE001, CE002, CE003, CE004, CE005, CE006, CE007, CE008, CE018, CE032, CE035, CE037, CE038, CE040]
    tableRefs: [TE001, TE002]
    figureRefs: [FE001]

  - id: technology-architecture-and-ai-platform
    title: "Technology Architecture and AI Platform"
    body: >-
      ConcertAI's technology stack is built on three foundational infrastructure pillars:
      Amazon Web Services for HIPAA-compliant cloud compute and storage, NVIDIA NeMo and
      BioNeMo frameworks for GPU-accelerated AI model training and inference, and HL7
      FHIR R4 as the primary interoperability standard for clinical data exchange.
      AWS provides the cloud backbone for CancerLinQ's data ingestion and storage,
      PrecisionExplorer's GenAI query engines, and ConcertAI's MLOps pipelines; HIPAA
      Business Associate Agreements with AWS govern patient data security requirements.
      The NVIDIA collaboration—deepened to include AI agent development for oncology
      trials in 2026—enables ConcertAI to train oncology-specific foundation models
      using BioNeMo and to deploy high-performance inference for real-time ECA and RWE
      workloads via NeMo.
      CARAai, ConcertAI's proprietary multi-LLM orchestration layer, routes analytical
      queries to the optimal AI model from among GPT, Claude, and proprietary oncology
      models based on task type and domain specificity, providing a unified AI interface
      across all product divisions. This architecture allows new AI model versions to be
      integrated without re-engineering individual product modules. EHR connectors for
      Epic, Cerner, and Meditech automate structured data ingestion for the CancerLinQ
      network, using FHIR R4 APIs and C-CDA document exchange for both real-time and
      batch transfers. Partner data integrations add multi-modal depth: Foundation Medicine
      genomic sequencing data and Guardant Health liquid biopsy ctDNA are linked at the
      patient level with CancerLinQ clinical data. TeraRecon's imaging platform operates
      in a hybrid model with on-premise radiology workstations alongside cloud connectivity,
      processing DICOM images via PACS/RIS integration for AI biomarker detection workflows.
    claimRefs: [CE009, CE010, CE011, CE012, CE013, CE014, CE015, CE016, CE026]
    tableRefs: [TE003]
    figureRefs: [FE002]

  - id: deployment-integration-and-roadmap
    title: "Deployment, Integration, and Development Roadmap"
    body: >-
      ConcertAI's product deployment model varies by division and customer segment. CancerLinQ
      is delivered as a cloud-hosted SaaS platform with EHR integration services for community
      oncology practices; onboarding requires FHIR API or C-CDA connector setup with each
      practice's EHR vendor. TeraRecon products span three deployment modes: traditional
      on-premise perpetual license installations at hospital radiology departments, hybrid
      configurations connecting on-site visualization workstations to cloud AI services, and
      a growing SaaS migration targeting subscription ARR conversion of its 2,000-plus
      installed customer base. Precision Suite products are delivered via cloud SaaS to
      pharmaceutical and biotech enterprise customers under multi-year contracts.
      The 2026 roadmap reflects two strategic priorities: agentic AI for clinical operations
      and deeper multi-modal data integration. Accelerated Clinical Trials embeds CARAai-powered
      agents that autonomously execute multi-step workflows including site feasibility scoring,
      ethics submission preparation, and patient screening automation. The NVIDIA AI Agents
      alliance, announced in 2026, deepens GPU infrastructure investment for next-generation
      oncology AI agents. Foundation Medicine's 2026 genomic integration enhances the
      multi-modal data asset for biomarker discovery studies. Partnership expansions—Bayer
      clinical development (2025), Guardant Health ctDNA (2025), and NeoGenomics hematology
      AI (active)—demonstrate a strategy of aggregating best-in-class data partner integrations
      to widen the CancerLinQ data moat. Veeva Systems represents the primary workflow
      competitor for clinical trial software; ConcertAI's differentiation lies in data
      depth rather than workflow breadth. Registered active clinical trials at ClinicalTrials.gov
      confirm real-world deployment of ConcertAI's patient matching and RWE capabilities.
    claimRefs: [CE004, CE007, CE008, CE009, CE011, CE013, CE017, CE019, CE020, CE021, CE027, CE034]
    tableRefs: [TE005]
    figureRefs: [FE003]

  - id: differentiation-ip-and-data-assets
    title: "Differentiation, Intellectual Property, and Data Assets"
    body: >-
      ConcertAI's most durable competitive advantages lie in three interconnected assets:
      curated oncology-specific datasets, proprietary AI models trained on those datasets,
      and a track record of FDA regulatory-grade ECA submissions. The CancerLinQ network's
      9 million-plus patient records represent a longitudinal oncology dataset that took
      years to accumulate and cannot be replicated quickly; its value compounds as new
      practices join and longitudinal follow-up extends. The platform's uniqueness stems
      from multi-modal data integration that spans clinical EHR records (via CancerLinQ),
      genomic sequencing (Foundation Medicine), radiology imaging (TeraRecon), and liquid
      biopsy ctDNA (Guardant Health) at the individual patient level—a combination no
      general-purpose healthcare data vendor currently offers in oncology at equivalent depth.
      ConcertAI differentiates from vendors such as IQVIA, Veeva, and Komodo Health through
      its exclusive focus on oncology-specific data models, disease ontologies, and cancer
      staging schemas. The ECA methodology has been deployed in FDA submissions, creating
      procedural know-how and de facto validation of the approach—a significant switching
      cost for pharmaceutical customers who have invested in ECA-based regulatory strategies.
      The NVIDIA alliance provides a technology differentiation layer: access to BioNeMo
      for oncology foundation model training and co-development of AI agents positions
      ConcertAI ahead of competitors without comparable GPU partnerships. Proprietary
      models embedded in PrecisionExplorer, PrecisionTrials, and CARAai represent
      additional IP in the form of fine-tuned language models adapted for oncology
      evidence generation tasks. While formal patents are not publicly enumerated, the
      AI model assets, curated dataset, and integrated workflow know-how constitute the
      primary intellectual property components.
    claimRefs: [CE027, CE028, CE029, CE030, CE031, CE033, CE037, CE039]
    tableRefs: []
    figureRefs: [FE004]

  - id: trust-safety-compliance-and-quality
    title: "Trust, Safety, Compliance, and Quality Controls"
    body: >-
      ConcertAI operates within a complex multi-layered compliance environment that spans
      patient privacy law, FDA regulatory frameworks for both real-world evidence and AI
      medical devices, and emerging AI governance requirements. All products processing
      protected health information are governed by HIPAA and HITECH, requiring Business
      Associate Agreements with every health system partner and cloud provider. The 21st
      Century Cures Act mandates that ConcertAI's CancerLinQ platform implement FHIR R4
      APIs for patient data portability and prohibits information blocking practices that
      would restrict interoperability with patient-authorized third parties.
      For its RWE products, ConcertAI aligns with the FDA Real-World Evidence Framework
      published in December 2018, which establishes study design, data quality, and analysis
      standards for RWD to support regulatory submissions. This framework governs how ECA
      studies are designed and documented for FDA review. TeraRecon's AI radiology products—
      DETECT and Neuro—fall under FDA AI/ML Software as a Medical Device guidance, requiring
      transparency about AI performance, bias evaluation, and post-market monitoring for
      clinical decision support software. Data governance within the CancerLinQ research
      network operates under IRB oversight protocols, and patient data de-identification
      follows HIPAA Safe Harbor and Expert Determination methods. ConcertAI's SOC 2 Type II
      status has not been publicly confirmed, representing a gap that should be verified
      during due diligence; this standard is expected for any enterprise healthcare SaaS
      provider. AI safety controls for GenAI features (PrecisionExplorer, CARAai) must
      address hallucination risk and output validation given the regulatory-grade use case
      of RWE generation. The risk that AI-generated evidence is used incorrectly in
      regulatory submissions is a material compliance and liability concern.
    claimRefs: [CE022, CE023, CE024, CE025, CE036, CE039]
    tableRefs: [TE004]
    figureRefs: []


