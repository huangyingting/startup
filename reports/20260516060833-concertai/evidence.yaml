  - id: GU001
    type: private-evidence-only
    severity: material
    topic: net-revenue-retention-and-churn
    missingEvidence: >-
      ConcertAI has not publicly disclosed net revenue retention (NRR), gross revenue retention (GRR), or customer churn
      rates for any segment — pharma SaaS, health system, or radiology AI. No analyst report, investor disclosure, or
      customer reference publication has provided these metrics. For a company at $160 million estimated revenue with
      35% growth, the split between new logo contribution and expansion revenue is unknown, and whether growth is driven
      by price increases, account expansion, or new customer acquisition cannot be determined from public sources. No
      G2, Capterra, or Gartner Peer Insights reviews at meaningful volume have been identified for ConcertAI,
      CancerLinQ, or TeraRecon, limiting independent proxy signals for customer satisfaction and retention.
    whyItMatters: >-
      NRR is a primary quality-of-growth indicator for SaaS and recurring-revenue healthcare data businesses. Without
      NRR, it is impossible to distinguish between a high-quality retention business (NRR >120%) driven by expansion and
      upsell versus a growth story dependent on continuous new-logo acquisition to offset churn. Given that ConcertAI's
      pharma segment is partially project-based (ECA studies), understanding what fraction of revenue recurs versus must
      be re-won annually is essential for valuation and risk assessment. Low NRR would materially lower the fair value
      of the SaaS-platform narrative.
    diligencePath: >-
      Request trailing four-quarter NRR and GRR by segment (pharma SaaS, health system, radiology AI, project-based ECA)
      from management; ask for cohort revenue waterfall showing retained, expansion, and new-logo revenue contributions;
      request customer count by ARR band; ask for churn and downsell rates; request TeraRecon SaaS migration progress
      and SaaS vs. perpetual revenue split; request CancerLinQ active practice count versus enrolled practice count.
    relatedQuestionRefs:
      - QU005
    relatedTableRefs:
      - TU004
  - id: GU002
    type: undiscoverable-without-disclosure
    severity: material
    topic: customer-coverage-claim-definition-ambiguity
    missingEvidence: >-
      ConcertAI's claim that it serves "75% of top life science companies" has not been accompanied by a clear
      definition of (a) what denominator defines "top life science companies" — whether measured by revenue, R&D spend,
      oncology pipeline size, or a specific list such as the top 20 or top 50 global pharma by revenue — or (b) what
      activity constitutes "serving" a company — whether a single ECA study, an active multi-year SaaS contract, a pilot
      engagement, or merely a vendor-approved status. Without these definitions, the claim cannot be independently
      verified or converted into a revenue concentration model. The analogous claim of 50% of "largest global healthcare
      providers" is similarly undefined.
    whyItMatters: >-
      The 75% claim is a foundational customer traction proof point cited in investor materials and press coverage. If
      the denominator is the top 20 pharma companies globally, coverage of 15 companies represents a very different
      commercial fact than if the denominator is 250 companies. If "serving" includes any historical project engagement
      regardless of current activity, the effective active-customer count could be materially lower than implied.
      Misinterpretation of this claim could lead to overestimation of ConcertAI's recurring-revenue customer base and
      underestimation of concentration or churn risk.
    diligencePath: >-
      Request the explicit methodology behind the 75% and 50% coverage claims — denominator definition, list of
      qualifying companies, and activity threshold for inclusion; request a named customer list with status (active
      contract, pilot, historical) and annual contract value ranges; request top-10 customer revenue concentration
      analysis; clarify whether the claim is based on contracted ARR or any-status engagement in the trailing 24 months.
