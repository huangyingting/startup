  - id: GR003
    type: private-evidence-only
    severity: material
    topic: financial-risk-opacity-burn-rate-revenue-concentration
    missingEvidence: >-
      ConcertAI has not publicly disclosed burn rate, monthly cash consumption, remaining cash balance post-June 2024
      investment, or revenue concentration by customer or product line. The split between recurring SaaS revenue and
      project-based ECA study revenue is not determinable from public sources, preventing accurate valuation modeling.
      No audited financial statements, investor deck, or S-1 equivalent has been made public. SAI Group financial
      relationship—including intercompany loans, guarantee structures, or equity transfer rights—is not publicly
      documented.
    whyItMatters: >-
      At $1.9 billion valuation and approximately $160 million estimated revenue (Crunchbase secondary), the implied 12x
      revenue multiple is justified only if the majority of revenue is recurring SaaS with high NRR. If project-based
      ECA study revenue constitutes 40-50% of total revenue, the justified multiple would be materially lower (6-8x),
      implying a fair value of $960M-$1.28B under conservative assumptions. Burn rate and runway visibility are critical
      for assessing whether ConcertAI can execute its roadmap without a bridge financing.
    diligencePath: >-
      Request: (1) trailing four-quarter P&L by product line (SaaS vs. project); (2) current cash position and monthly
      burn rate; (3) 24-month financial forecast with assumptions; (4) SAI Group intercompany financial terms; (5)
      top-10 customer revenue concentration; (6) NRR by segment; (7) any outstanding debt, credit facility, or
      structured capital.
