summary:
  headline: >-
    按约 $1.9B 隐含估值看，ConcertAI 属于有条件买入；差异化多模态肿瘤 AI 栈和近乎垄断的药企渗透率支撑投资逻辑，但 CEO 空缺未解、财务不透明，且 Goldman Sachs
    轮次无法用一手来源验证，形成下结论前必须打穿的尽调卡点。
