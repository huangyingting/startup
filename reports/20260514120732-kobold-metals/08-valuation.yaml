  claims:
    - id: CV001
      statement: "KoBold Metals' investment thesis rests on three pillars: (1) AI-driven exploration delivering superior capital efficiency vs traditional mining; (2) Mingomba as a future world-class copper mine in a structural supply-deficit market; and (3) a growing portfolio of optionality positions across Zambia, DRC, Quebec, Finland, Australia, and Burundi."
