  - id: KV001
    type: insight
    title: "KoBold Is a Mining Company in a Technology Wrapper"
    body: "The dominant risk framing from KoBold investor materials emphasizes the AI and data science innovation — and that narrative is justified. But the underlying investment is a bet on Zambian copper mining economics, Congolese and Burundian political stability, and the global copper price over a 10-15 year horizon. Technology companies of equivalent valuation ($2.1B) generate revenue within 1-3 years; KoBold's first revenue is likely 8-12 years away. Investors should apply a mining sector risk framework alongside the technology valuation approach. The AI narrative creates a technology sector multiple premium over pure-play mine developers; investors should quantify whether this premium is justified by the platform's verifiable performance."
    claimRefs: [CV001, CV009, CV033]

  - id: KV002
    type: strength
    title: "Mingomba Is the Thesis Floor — Even Without the AI Premium"
    body: "If KoBold's AI narrative were to deflate entirely, the Mingomba copper deposit would still represent substantial intrinsic value. A 247 Mt deposit at 2.79% Cu in the Zambian Copperbelt — historically one of the world's most productive copper regions — is a world-class asset independent of discovery methodology. At a base copper price of $9,000/tonne and reasonable mine development assumptions, Mingomba's NAV is estimated at $1-3B (KoBold's attributable share). This provides a partial floor to the $2.1B valuation even in the bear case, distinguishing KoBold from purely speculative technology pre-revenue bets."
    claimRefs: [CV003, CV004, CV019, CV021]

  - id: KV003
    type: recommendation
    title: "Primary Catalyst: Publish the Bankable Feasibility Study"
    body: "The single most important value-creation action KoBold can take over the next 24-36 months is to publish (or share under NDA) the Mingomba Bankable Feasibility Study. This document will provide: independently audited resource estimates; mining method selection; infrastructure requirements; construction capital cost estimate; and preliminary NPV/IRR. The BFS will allow investors to replace wide-range desk estimates ($0.8-10B NAV) with a quantitative framework — dramatically reducing valuation uncertainty and enabling construction financing conversations. Until the BFS is available, all valuation analysis is speculative. The BFS is therefore the first milestone that should trigger re-evaluation of the investment recommendation."
    claimRefs: [CV030, CV031]

  - id: KV004
    type: risk
    title: "The Long Monetization Horizon Is the Fundamental Constraint"
    body: "KoBold's most difficult challenge is not the technology, the geology, or even the geopolitics — it is the timeline. A 10-15 year horizon to first revenue from Mingomba falls entirely outside the 7-10 year fund cycle of most VC investors. This creates structural tension between KoBold's investor base (which includes traditional VC firms alongside patient institutional capital) and the actual monetization timeline. This tension will be felt at the Series D stage, when some early investors may seek liquidity. The investors who will generate the highest returns from KoBold are those who can hold for 12-18 years; traditional growth equity and VC investors should be explicit about whether they have this mandate before increasing allocation at the Series C valuation."
    claimRefs: [CV009, CV011, CV012, CV025]

