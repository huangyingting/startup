  topStrengths:
    - >-
      BHP and Rio Tinto JV partnerships provide the most credible independent validation of KoBold's AI platform quality
      — the world's two largest mining companies have committed exploration capital to KoBold-led programs
    - >-
      Mingomba (247 Mt @ 2.79% Cu Indicated Resource) is a genuinely world-class copper deposit providing NAV floor of
      $1-3B even without the AI technology premium
    - >-
      AI platform architecture (Bayesian inference + proprietary EM/gravity sensors + compounding data advantage)
      creates a defensible dual hardware-software moat with an estimated 2-5 year lead over replication attempts
    - >-
      Long-term copper demand is structurally supported: IEA, CRU, and Wood Mackenzie all project a multi-million tonne
      supply deficit by 2030-2035 from electrification, aligning with Mingomba's production timeline
    - >-
      Institutional investor quality (T. Rowe Price, Fidelity, Equinor, BEV, a16z) implies rigorous pre-Series C
      diligence — reducing catastrophic analytical failure risk
  topRisks:
    - >-
      Mine construction capital gap: Mingomba requires $1-5B+ in construction capital not yet secured; this is the
      single largest financial risk and creates a structural dependency on JV partner capital or project financing
    - >-
      Geopolitical concentration in Zambia and DRC — both jurisdictions have documented histories of mining code
      changes, royalty increases, and political risk that cannot be fully hedged
    - >-
      AI performance unverified: no independent benchmark compares KoBold's discovery hit rate to traditional
      geophysics; the AI premium in the $2.1B valuation ($300-800M estimated) rests on narrative rather than data
    - >-
      Pre-production, pre-revenue with 8-12 year timeline to first cash from Mingomba — structurally incompatible with
      standard VC fund cycles; only suitable for patient institutional capital
    - >-
      Cobalt price structurally impaired (down 70% from 2022 highs) by LFP battery chemistry shift — early Mingomba
      economic projections that relied on cobalt by-product credits need to be re-baselined
  unresolvedGaps:
    - >-
      Mingomba Bankable Feasibility Study or Preliminary Economic Assessment not published — without this, all NPV/IRR
      estimates have a ±5x uncertainty range
    - >-
      AI platform discovery hit rate has never been independently benchmarked — the technology premium in the valuation
      is unverifiable from public data
    - >-
      Mine construction financing structure not announced — $1-5B+ capex requirement is the most material unresolved
      financial risk
    - >-
      KoBold captable, liquidation preferences, and ZCCM-IH governance terms not publicly available — common equity
      return modeling incomplete
    - >-
      DRC Manono lithium deposit (AVZ Minerals framework agreement) subject to ongoing legal dispute — KoBold's DRC
      optionality is entirely contingent on third-party litigation outcomes
