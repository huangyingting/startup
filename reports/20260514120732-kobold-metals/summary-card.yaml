summary:
  headline: >-
    KoBold Metals has built the most commercially validated AI mineral exploration platform in the world — as evidenced
    by BHP and Rio Tinto JV partnerships — and holds the Mingomba copper-cobalt deposit, one of the world's
    highest-grade undeveloped copper projects. The $2.1B Series C valuation is broadly defensible at base copper prices,
    but the investment requires patient capital (10-15 year horizon), carries above-average geopolitical risk
    (Zambia/DRC), and depends on an unverified AI performance premium. Recommendation: Conditional Hold — await the
    Mingomba Bankable Feasibility Study as the first major de-risking catalyst.
