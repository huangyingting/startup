  productSummary: >-
    KoBold's proprietary platform combines: (1) Bayesian ML inference engine for probabilistic
    mineral deposit mapping; (2) novel airborne and ground-based EM and gravity sensors;
    (3) a compounding global geophysical dataset built from JV and proprietary programs;
    (4) in-house quantitative geoscience team. The platform generates drill targets for copper,
    cobalt, nickel, and lithium deposits. Commercial deployment is via JV exploration programs
    (BHP, Rio Tinto) and wholly-owned programs (Zambia, Burundi, Quebec, Finland).
    Flagship asset: Mingomba copper-cobalt deposit, Zambia — 247 Mt Indicated Resource
    at 2.79% Cu, developed with JV partner ZCCM-IH (Zambia state mining entity).
  customerFocus: >-
    KoBold's commercial model is equity-based (mine ownership, not licensing): the company
    creates value through discovery and development of mineral deposits, not through technology
    service fees. JV partners (BHP, Rio Tinto) fund exploration programs and validate the AI
    platform commercially. Future revenue will come from copper and cobalt sales once Mingomba
    reaches production. The AI platform has not been licensed to third parties as of May 2026.
  businessModel: >-
    Equity-based mineral development: KoBold owns stakes in mineral deposits (Mingomba via
    ZCCM-IH JV; BHP/Rio Tinto JVs). The company is pre-revenue, funding operations via equity
