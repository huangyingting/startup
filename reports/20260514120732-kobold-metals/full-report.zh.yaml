  shortDescription: >-
    KoBold Metals is an AI-powered mineral exploration company that uses Bayesian machine learning, proprietary
    electromagnetic and gravity sensors, and a compounding global geophysical dataset to identify copper, cobalt,
    nickel, and lithium deposits. The company's flagship asset is the Mingomba copper-cobalt deposit in Zambia (247 Mt
    Indicated Resource at 2.79% Cu) — one of the world's highest-grade undeveloped copper deposits. KoBold operates JV
    exploration programs with BHP (Australia nickel/copper) and Rio Tinto (Western Australia lithium), and holds
    optionality positions in DRC, Burundi, Quebec, and Finland.
