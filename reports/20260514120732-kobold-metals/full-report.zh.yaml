      - number: '3.4'
        title: 邻近替代品与传统勘探服务
        blocks:
          - type: paragraph
            body: >-
              传统勘探服务商提供了 KoBold 一体化打法之外的选择。SRK Consulting 和 WSP Global（收购 Golder
              Associates）是全球领先独立矿业与地球科学咨询公司，提供地质制图、资源量估算和可行性研究，但没有 AI-first 差异化。航空地球物理承包商——CGG、Fugro 和 Xcalibur
              Multiphysics——提供数据采集服务，再进入解释工作流。这些公司缺少自研 AI 综合能力，但有丰富现场运营经验。政府地质调查机构（美国 USGS、英国 BGS、加拿大 NRCan
              及多家非洲地质调查机构）免费提供大量公共地球科学数据，既赋能 KoBold 的数据聚合功能，也构成部分替代。Satellogic 和 Planet Labs 等卫星遥感公司提供多光谱和 SAR
              影像，可支持岩性制图和构造地质解释——这是对地面传感的部分替代。KoBold 相比这些替代品保持的核心差异化，是能够通过自研 ML 模型综合多源数据（历史数据、新型传感器、卫星），并部署能快速响应 AI
              生成靶区的现场团队。现状勘探——不借助 AI 增强，而靠地质直觉和历史数据钻探——仍是行业主流做法，因此也是 KoBold 最广泛的隐性竞争对手。
