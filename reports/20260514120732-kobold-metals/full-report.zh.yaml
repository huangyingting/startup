      - number: '8.3'
        title: 当前融资与估值背景
        blocks:
          - type: paragraph
            body: >-
              根据公开来源，KoBold 2024 年 7 月 Series C 轮融资 $537M，隐含估值约 $2.1B。领投方为 T. Rowe Price 和
              Fidelity，两者都是具备大盘上市公司股权定价经验的大型机构资产管理人；它们参与意味着 KoBold 通过了接近上市公司标准的尽调流程。$2.1B 估值约为 Mingomba 当前阶段估计地下铜价值的 4
              倍（247 Mt 资源量、铜价 $7,000-8,500/tonne、扣除 ZCCM-IH 后 KoBold 可归属 60-80%，开发折价 0.5-0.7x，对应约 $450-600M），意味着市场正在为 AI
              平台、项目组合可选性和未来资源增长付费。迄今累计融资约 $692M+，包括早期轮次，投资者包括 Andreessen Horowitz、Breakthrough Energy
              Ventures、BOND、Equinor 等。按 Series C 价格，KoBold 按地下铜当量吨计的企业价值约为 $3-5/tonne
              Cu-eq（取决于总可归属资源规模）——整体与全球可比开发阶段铜项目相符，但考虑到勘探阶段风险溢价，处于区间高端。KoBold
              股份没有可用的二级市场信号（未确认存在活跃老股交易），但机构投资者构成意味着近期赎回压力有限。当前宏观环境（截至 2026 年 5 月铜价 $8,800-$9,500/tonne，AI 投资情绪高位）总体支持
              $2.1B 估值维持到下一个关键里程碑（Mingomba BFS 公告）。
