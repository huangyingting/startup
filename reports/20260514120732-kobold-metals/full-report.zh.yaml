  - number: 4
    title: 财务情况
    sections:
      - number: '4.1'
        title: 当前财务状况与资本概览
        blocks:
          - type: paragraph
            body: >-
              KoBold Metals 仍是一家私营、收入前公司，没有义务发布经审计财务报表。截至 2026 年 5 月，最近一次披露的重大财务事件是 2024 年 7 月完成的 $537M Series C，由 BHP
              Ventures、T. Rowe Price、Andreessen Horowitz、Fidelity、Equinor Ventures、XN、B Capital 和 Standard Investments
              共同领投。多家可信媒体报道显示，该轮隐含估值约 $2.1B。所有轮次累计融资估计约 $692M+，包括种子轮（约 ~$1.1M，2019 年）、Series A（约 ~$21M，2021 年）、Series
              B（约 ~$192M，2022 年 1 月）和 Series C（$537M，2024 年 7 月）。KoBold 没有披露收入、EBITDA、经营亏损或现金余额。KoBold Metals 向 SEC 提交的
              Form D 文件（约 2024 年 8 月提交）确认了 Series C 所属的 Regulation D 证券发行，符合私募规则。Form D 是公共数据库中 KoBold 目前主要可用的监管财务记录。公司
              SEC CIK 已在 EDGAR 搜索中识别。公开领域没有经审计合并财务报表。烧钱速度只能基于运营背景估计：仅赞比亚一地，KoBold 就雇用 200+ 人；公司在 5+
              个国家维护勘探项目，运营现场硬件项目，并为 Mingomba 制定矿山开发计划。保守估计年运营开支为 $75-150M/year，意味着在没有收入的情况下，$537M Series C 可提供约 3.5-7
              年现金跑道。根据新闻稿推断，资本配置优先级为：（1）Mingomba 矿山开发可行性和建设 capex，（2）AI 平台 R&D，（3）全球勘探扩张。2022 年为 Mingomba 收购承诺的 $150M（向
              EMR Capital 支付 $115M + $35M 勘探承诺）是一笔重要的前期资本部署，说明截至 2024 年中，已部署资本总额至少为 $200-300M。
