            body: >-
              全球最大矿业公司——BHP、Rio Tinto、Glencore、Barrick Gold、Newmont、Freeport-McMoRan 和 Ivanhoe Mines——既是 KoBold
              的主要竞争威胁，也可能成为合作伙伴。这些在位者的勘探预算远超 KoBold；仅 BHP 在 FY2023 的勘探支出就约
              $900M。它们拥有数十年的自有地质数据、全球土地位置，以及与政府和社区的既有关系。不过，在位者在勘探技术创新上也存在系统性短板：大型公司勘探生产率（每美元带来的发现）自 1990s 以来持续下降，KoBold
              的逻辑正是建立在利用这一趋势之上。在位者越来越多投资内部数据科学和 AI 团队，但文化和组织壁垒限制了它们复制 KoBold 全栈打法的能力。BHP Ventures 和 Equinor Ventures 投资
              KoBold，同时又在勘探中与其竞争，这形成了复杂的双重动态：在位者验证 KoBold 逻辑，同时也从其发现项目中受益。Ivanhoe Mines 在 DRC 拥有庞大的 Kamoa-Kakula 铜矿综合体，在
              South Africa 拥有 Platreef 项目，它提供了一个参照：AI 时代成功铜矿开发商可能长什么样，也为 KoBold Mingomba 项目轨迹提供有用战略对比。
