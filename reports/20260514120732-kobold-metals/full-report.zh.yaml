      - number: '1.4'
        title: 项目、运营与关键里程碑
        blocks:
          - type: paragraph
            body: >-
              KoBold 最重要的里程碑，是发现并开发赞比亚 Mingomba 铜钴矿床；公司称其为“有史以来发现的最佳铜矿床之一”。Mingomba 位于 Copperbelt，曾名为 Lubambe Extension
              Project。KoBold 通过 2022 年 12 月一笔 $150M 交易取得多数股权——向 EMR Capital（当时为 Lubambe Copper Mine 的多数股东）支付
              $115M，并承诺额外投入 $35M 勘探工作。公司称该矿床是全球最高品位、未开发的大型铜矿床。KoBold 通过子公司 Mingomba Mining Ltd（赞比亚国有铜矿商 ZCCM-IH 也持股）组建了
              200+ 名赞比亚员工团队，并为赞比亚经济贡献超过 $200M。赞比亚之外，KoBold 在加拿大 Quebec 运营勘探项目（覆盖三个许可区：Baie
              James、Côte-Nord、Nunavik，目标为锂、镍、钴和铜），并在 Finland（勘探许可区）和 DRC 开展项目。2025 年 5 月，KoBold 与 AVZ Minerals
              签署框架协议，可能收购 AVZ 在 DRC Manono 锂矿的权益；Manono 是全球已知最大硬岩锂矿床之一。2026 年 3 月，KoBold 与 Burundi
              签署协议，数字化地质数据，显示其在非洲地理范围继续扩张。截至新闻页（2026 年 5 月），Bloomberg 还报道称 KoBold 正在开展其所谓全球最大 Congo 锂勘探活动。与 BHP（澳大利亚，镍 /
              铜）和 Rio Tinto（锂，西澳）的合作进一步通过合资项目扩大了 KoBold 的项目版图。
