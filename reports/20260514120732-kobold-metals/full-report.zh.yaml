              T. Rowe Price 和 Fidelity 出现在 Series C 中，是一个重要信号。这类机构基金管理人 通常投资那些有清晰路径在 3-5 年内进入公开市场的后期私营公司。它们参与本轮融资， 说明
              KoBold 的投资人群体正在为 IPO 或重大流动性事件做准备，而这大概率取决于 Mingomba 矿山开发进展。
