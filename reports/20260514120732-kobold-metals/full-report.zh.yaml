      - number: '4.2'
        title: 融资历史、投资者结构与轮次经济性
        blocks:
          - type: paragraph
            body: >-
              KoBold Metals 的融资轨迹体现出财务投资人与战略投资人的信心同步上升。公司种子轮 （~$1.1M，2019）由 Breakthrough Energy Ventures
              领投，后者在后续轮次中一直持仓。 Series A（~$21M）引入了更多聚焦气候科技的投资人。关键节点是 Series B（$192M， 2022 年 1 月），Andreessen Horowitz
              领投，等于硅谷为 AI 勘探逻辑背书；BHP Ventures 和 Equinor Ventures 也以战略共同投资人身份加入，提供了关键行业验证。 Series C（$537M，2024 年 7
              月）把融资规模推上一个台阶，并引入 T. Rowe Price、 Fidelity、XN、B Capital、Standard Investments 等跨市场机构投资人——信号是 传统资管开始把 KoBold
              评估为 IPO 前 / 流动性事件候选公司。Series C 隐含估值约 $2.1B，较 Series B 明显溢价，但 Series B 的准确估值未公开披露。投资人结构具有 战略意义：BHP 和
              Equinor 不只是财务投资人，也是把 KoBold 平台部署到自身勘探资产 上的 JV 伙伴，形成一种商业验证。T. Rowe Price 和 Fidelity 通常投资接近 IPO 或重大
              流动性事件的公司，说明投资人群体认为 KoBold 在 5-7 年内公开上市或发生战略交易 是可行退出。清算优先权堆叠、反稀释条款、参与型优先股权利对 Series C 阶段私营
              公司很常见，但均未公开披露，给任何老股交易投资人留下尽调缺口。SEC Form D 文件 确认本轮证券以股权形式出售（可能为优先股），并依据 Regulation D 豁免 SEC 注册 要求。
