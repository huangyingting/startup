  - number: 8
    title: 估值
    sections:
      - number: '8.1'
        title: 投资逻辑与反向逻辑
        blocks:
          - type: paragraph
            body: >-
              乐观逻辑：KoBold 搭建了一套自研 AI 驱动矿产勘探平台，靠贝叶斯推断、新型 EM / 重力传感器，以及持续扩大的全球地球物理数据集来识别铜和关键矿产矿床，成本和时间都显著低于传统勘探。赞比亚
              Mingomba 铜钴矿床的发现——已被确认是全球品位最高的未开发铜矿床之一——直接证明技术有效。Mingomba 的控制资源量为 247 Mt、Cu 品位 2.79%，同时验证了地质重要性和技术团队能力。BHP
              与 Rio Tinto 已以合资伙伴身份商业采用该平台，给出来自全球两大矿业公司的商业验证信号。基本需求逻辑仍然成立：CRU Group、Wood Mackenzie 和 IEA 均预计，受 EV
              和电网电气化需求拉动，2030-2035 年铜供应将出现数百万吨缺口，而这些场景里没有容易替代铜的材料。支持 KoBold 的投资者支付的是勘探阶段溢价，但拿到的是一个首次投产时可能成长为 $5-15B
              公司的期权。悲观逻辑 / 反向逻辑：公司尚未产生收入、尚未投产，Mingomba 距离首次现金流还有 8-12 年，长于多数 VC 基金周期。$2.1B 估值需要对 Mingomba 最终 NPV、AI
              平台终值和项目组合扩张作出非常激进的一组假设。AI 表现从未独立基准验证；Mingomba 发现发生在历史上已知的成矿带。矿山建设资本需求（$1-5B+）远超 KoBold
              当前资产负债表，形成结构性执行风险。赞比亚、刚果（金）和布隆迪的地缘集中度又增加了难以对冲的风险溢价。早期 Mingomba 经济性之所以有吸引力，部分来自钴副产品抵扣价值；但 LFP
              电池化学体系迁移已结构性削弱这一点。合理悲观情景下，若不计 AI 溢价，KoBold 作为一家纯勘探阶段公司价值约为 $0.8-1.2B。
