      - number: '1.2'
        title: 创始人、领导团队与治理
        blocks:
          - type: paragraph
            body: >-
              KoBold Metals 由 Kurt House（CEO）、Josh Goldman（现任总裁）和 Jeff Jurinak 于 2018 年共同创立。Kurt House
              拥有博士学位，并曾在碳捕集等能源领域工作；他的科学背景是公司赢得矿业合作伙伴信任的核心。Josh Goldman（博士）担任总裁，负责勘探战略；Jeff Jurinak
              是联合创始人，但当前公开角色不突出。第四位联合创始人 Jared Lacob 也在创始团队名单中。管理团队已从最初三人显著扩张。关键全球负责人包括 Daniel Enderton（博士，COO）、Sandy
              Alexander（JD/MPP，首席法务与外部事务官）、Tom Hunt（博士，CTO）、Clara Kridler（首席人事官）、Heather Friesen（现场运营 VP）、Lucas
              Hughes（财务 VP）和 Traci Paramore（财务）。赞比亚业务由 Mfikeyi Makayi 领导，她担任 KoBold Metals Africa 的 CEO，并带领一支 >90%
              为赞比亚本国人的团队。领导团队混合了地球科学家（具备现场经验的博士）、数据科学家和工程师，呼应公司“全栈”的跨学科身份。关键人风险集中在 Kurt House：他是公司的公众面孔、科学发言人和
              CEO。公司文化强调贝叶斯决策、跨学科协作团队和科学诚信。董事会构成没有公开披露，不过战略投资者名单（BHP、Equinor、Breakthrough Energy
              Ventures）很可能给予这些机构董事会观察权或席位。
