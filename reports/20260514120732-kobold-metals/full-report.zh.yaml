      - number: '6.5'
        title: 反向伙伴信号与 ESG 相关客户风险
        blocks:
          - type: paragraph
            body: >-
              KoBold 的伙伴和客户语境中的反向信号，主要集中在 ESG 与地缘政治风险，而不是直接 的伙伴不满或流失。Global Witness 曾报道西方技术公司进入 DRC 矿产勘探时，如果缺少
              强健的冲突矿产尽调，会面临风险；这一点直接适用于 KoBold 的 DRC 扩张。Amnesty International 也记录过 DRC 钴供应链中涉及手工采矿和工业采矿作业的劳工权利问题。 KoBold
              在赞比亚铜带（Mingomba）的运营已经展现出强社区参与（>90% 赞比亚员工、向赞比亚 经济贡献 $200M），但进入 DRC 带来的 ESG 风险更高。Manono 锂矿床的 AVZ Minerals
              DRC 框架协议，仍待 AVZ 自身在 DRC 的法律争议解决；如果 AVZ 无法为 资产交付清晰产权，KoBold 的 DRC 锂机会可能坍塌。这是 KoBold 一个关键未来伙伴 /
              项目机会的反向情景。没有伙伴公开批评 KoBold 的技术主张、表现或伦理。Standard Investments（Series C 投资人）和 Equinor 也未公开披露任何伙伴绩效担忧。African
              Development Bank 和 World Bank 对赞比亚关键矿产的参与，为 Mingomba 项目在赞比亚 矿业语境中的更广泛价值提供了开发金融验证，也间接背书了 KoBold 旗舰伙伴关系的质量。
