      - number: '4.3'
        title: 收入模式、单位经济与盈利路径
        blocks:
          - type: paragraph
            body: >-
              KoBold 的收入模式与软件或服务公司根本不同。公司不收取许可费或咨询费，而是通常 通过合资安排保留矿产发现的股权。收入若能兑现，将来自三类来源：（1） KoBold
              持股的在产矿山带来的权利金、股息或分配；（2）向矿业巨头或资本市场出售 或部分剥离 KoBold 在项目中的股权；（3）JV 垫资安排，即矿业巨头为 KoBold 的
              勘探成本出资，以换取逐步取得的股权。目前按传统会计口径，KoBold 仍处于收入前阶段： 其组合中没有任何矿山投产。Mingomba 铜矿床处在可行性研究与开发规划阶段；可融资
              可行性研究和建设决策大概率还要数年，行业观察者估计最早也要到 2030-2035 年才 可能投产。这种漫长变现周期对勘探阶段矿业公司很典型，但对 VC 支持的 AI 技术公司
              并不常见，可能让投资人流动性预期与矿山开发现实发生张力。没有内部数据，单位经济 同样难以评估：AI 生成一个勘探靶区的成本、AI 靶区相对传统靶区的钻探成功率，以及 Mingomba 价值中究竟有多少应归因于
              KoBold 的 AI 平台、多少来自既有地质认知，均未 披露。从可比公司视角看，KoBold 的模式在结构上最接近权利金 / 金属流公司（保留
              经济权益但不运营矿山），但阶段更早，且有一个主动创造发现的技术平台，而不是购买 既有矿权的权利金。这个混合模型没有直接的公开市场可比对象，估值与单位经济评估 因而更难。
