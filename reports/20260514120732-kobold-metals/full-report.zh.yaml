      - number: '2.5'
        title: 规模测算缺口与尽调风险
        blocks:
          - type: paragraph
            body: >
              市场分析存在几个结构性数据缺口，需要尽调进一步补上。


              没有独立市场规模报告把“AI 驱动的关键矿产勘探”定义为独立类别。一般市场研究聚合机构（引用 Mordor Intelligence、Allied Market Research）对“矿业
              AI”的估计差异很大（到 2030 年 $1-5B），而且把完全不同的用例混在一起：自动运输、预测性维护、矿石分选和勘探建模都被纳入。这让 KoBold 具体模式的 TAM 对标并不可靠。


              近端价格信号互相矛盾，使 SAM 评估更复杂。2023 年，中国 EV 补贴到期、短期过剩出现后，锂价暴跌约
              ~70%。印尼供应增长也使镍价显著下跌。这些价格变化可能在近端压低锂、镍等商品的勘探支出，即便长期需求预测仍然强劲。尽调团队应按商品压力测试 KoBold 管线，并评估其对大宗商品价格持续疲弱的敏感性。


              权威的年度全球矿业勘探预算数据由 S&P Global Market Intelligence（前 SNL Mining）发布，但完全置于付费墙之后。本轮研究无法访问 S&P Global
              数据。这是一个数据缺口，拥有机构级数据访问权限的尽调团队应直接补足。


              KoBold 的权益模式没有成熟公开可比公司。传统矿业技术公司（Hexagon、Trimble、3D-P）按费用销售软件或硬件。KoBold 的合资权益模式类似 royalty
              公司（Franco-Nevada、Wheaton Precious Metals）：它赚取发现项目上行权益，而不是服务费——但这些可比对象没有一个能干净映射 KoBold 这种投产前勘探权益模式。
            claimRefs:
              - CM037
              - CM038
              - CM039
              - CM040
              - CM041
