      - number: '7.2'
        title: 市场与大宗商品价格风险
        blocks:
          - type: paragraph
            body: >-
              KoBold 未来财务回报主要取决于 Mingomba 投产时的铜价和钴价；最早投产时间估计为 2033-2037 年。铜价风险真实存在但相对温和，因为电气化（EV、电网基础设施、数据中心）
              带来长期结构性需求：CRU Group 和 Wood Mackenzie 都预测，2020 年代后期起铜供应会 出现结构性缺口，支撑长期投资逻辑。不过，近期铜价在 $7,000-$10,000/tonne
              区间波动， 会直接影响用来证明矿山建设融资决策的 NPV 计算。如果铜价长期跌破 约 $7,000/tonne，Mingomba 这类资本密集型绿地矿山的经济性可能恶化。钴价风险不对称 且偏负面：钴价从 2022
              年高点到 2024 年水平约下跌 70%，大幅削弱了早期 Mingomba 经济 预测中嵌入的钴副产品收益贡献。如果钴价持续低迷（受 NMC 电池转向 LFP 电池推动）， Mingomba
              的经济性会显著弱于早期预测。2025-2026 年 London Metal Exchange（LME）铜价 大约为 $8,800-$9,500/tonne——按当前水平支撑 Mingomba
              经济性，但仍受宏观经济和中国 需求周期影响。中国放缓，或 EV 电池化学路线转向铜密集度更低的设计，都会构成不利 价格情景。锂价波动同样剧烈（从 2022 年高点到 2024 年初下跌 85%），影响 Rio
              Tinto 西澳大利亚锂 JV 的未来价值，不过铜仍是 KoBold 最主要的大宗商品敞口。
