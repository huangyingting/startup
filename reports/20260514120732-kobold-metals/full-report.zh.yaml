chapters:
  - number: 1
    title: 公司概况
    sections:
      - number: '1.1'
        title: 身份、使命与商业模式
        blocks:
          - type: paragraph
            body: >-
              KoBold Metals 将自己描述为一家“专注关键矿产的科学矿产勘探和开发公司”。公司 2018 年成立，总部位于 CA San
              Francisco，目标是应对铜、钴、锂、镍等关键矿产不断扩大的供给缺口；这些商品是 EV
              电池、可再生能源基础设施和更广义能源转型的基础。公司的核心投资逻辑是：矿业沿用了数十年的勘探方式，单位投入带来的新发现系统性下降；把
              AI、新型硬件传感器和世界级地球科学家打成一套全栈技术方案，有机会扭转这一趋势。KoBold
              的商业模式不是软件即服务，也不是咨询。公司扮演全栈勘探者和开发商，保留所发现矿产资源的权益，既可以全资持有，也可以通过与成熟大型矿业公司的合资公司持有。也就是说，KoBold
              承担勘探风险，换取所发现矿床的所有权。Zambia Mingomba 铜矿发现后，公司也向矿山开发延伸，把自身位置从勘探推进到生产，覆盖更长一段矿业价值链。KoBold
              从不把技术作为独立产品出售；技术属于自研资产，只部署在 KoBold 自有项目和合资项目中，由此围绕能力形成深护城河。这种全栈打法让 KoBold 同纯技术供应商和传统勘探公司区分开来。
