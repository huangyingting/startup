      - number: '8.4'
        title: 乐观、基准与悲观情景
        blocks:
          - type: paragraph
            body: >-
              KoBold 的估值区间异常宽，因为它横跨两端：一端是勘探阶段技术公司（悲观情景），另一端是拥有 AI 平台终值的世界级矿山开发商（乐观情景）。乐观情景（2028-2030 年 $4-8B）：Mingomba
              BFS 发布，NPV 达 $5-10B；建设融资宣布（BHP 提供 $2-3B 股权，加上项目债）；铜价维持在 $10,000/tonne 以上；AI 平台授权给第三家矿业巨头，或拿到独立性能验证；项目组合再产生
              1-2 个世界级发现。这将支撑 Series C 价格的 2-4x 回报。基准情景（2028-2030 年 $2-4B）：Mingomba BFS 发布并给出基准情景 NPV；建设融资宣布，但 KoBold
              发生显著股权稀释；铜价在 $8,500-$10,000/tonne；没有新增平台授权。对应 Series C 大致持平到小幅正收益。悲观情景（2028-2030 年 $0.8-1.5B）：Mingomba BFS
              延迟到 2029 年之后；铜价连续 12+ 个月低于 $8,000/tonne；BHP 或 Rio Tinto 缩减合资项目；没有平台授权；赞比亚上调权利金。对应 Series C 本金损失
              25-60%。深度悲观情景（$0.3-0.6B）：刚果（金） / 赞比亚出现重大政治扰动；铜价持续低于 $7,000/tonne；Series D 融资失败；AI
              平台没有差异化。该情景概率低（5-10%），但在地缘集中背景下不能忽视。
