      - number: '8.2'
        title: 建议、置信度与风险评级
        blocks:
          - type: paragraph
            body: >-
              建议：有条件持有——保留现有仓位，在 Mingomba 银行级可行性研究（BFS）发布前（预计 2026-2029）不要加仓。BFS
              是第一个重大降风险节点，将披露经独立审计的资源量估算、采矿方法、基础设施需求和初步经济性。按 Series C 轮价格（$2.1B）进入的新投资者承担完整执行风险溢价；Series A/B 投资者（隐含估值
              $100-600M）已有账面收益，应在 BFS 前继续持有。置信度：中。乐观情景依赖一组尚未验证的假设（AI 表现、Mingomba
              经济性、建设融资可得性），这些假设合理但证据不足。悲观情景证据充分，但尚未触发。综合风险评级：高。尚未投产、地缘集中（赞比亚 /
              刚果（金））、关键人依赖、技术表现不确定、变现周期极长，这几项叠加，使其风险画像高于估值相近的软件或生物科技 Series C 公司。适合具备 10-15 年耐心资本周期、矿业 /
              资源板块组合分散，并明确配置关键矿产供应链的机构投资者。不适合寻求 5 年流动性的成长阶段投资者。T. Rowe Price、Fidelity、Equinor、Breakthrough Energy
              Ventures 等投资者质量提供了一定安慰：KoBold 已接受严肃机构尽调，灾难性分析失误的风险有所降低。
