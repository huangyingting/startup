      - number: '6.4'
        title: 集中度风险、合同结构与扩张潜力
        blocks:
          - type: paragraph
            body: >-
              KoBold 面临显著伙伴集中风险：其商业技术验证几乎全部依赖两家矿业巨头（BHP、Rio Tinto），且两者也都是股权投资人——意味着任何一方退出伙伴关系，都会同时影响商业
              验证和公司价值信号。双重“投资人-伙伴”结构带来协同，也带来集中度：如果 BHP 或 Rio Tinto 自主开发出可比 AI 勘探能力，它们可以退出 KoBold JV，同时保留投资人头寸。 KoBold
              可扩张的伙伴宇宙很大：按市值计的五大矿业公司（BHP、Rio Tinto、Glencore、 Anglo American、Freeport-McMoRan）以及中型铜和锂开发商（Ivanhoe
              Mines、Barrick） 都是合乎逻辑的 JV 候选方。KoBold 把这一宇宙中的潜在伙伴转化为实际伙伴，是主要 商业增长杠杆；但自 2022 年前后的 BHP/Rio Tinto
              合作以来，公司尚未宣布新的大型 JV。 股权模型意味着 KoBold 没有传统切换成本或续约合同；如果勘探结果令人失望，伙伴理论 上可以退出 JV。赞比亚和 DRC
              运营在非洲关键矿产司法辖区创造扩张潜力，ZCCM-IH 的 参与也为政府支持型合作结构提供了模板。Equinor 对能源转型关键矿产供应链的兴趣， 如果转化为通过 KoBold
              投入新的勘探支出，也可能形成额外项目管线。
