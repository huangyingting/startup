          - type: callout
            title: 全栈模式同时集中风险与价值
            body: >-
              KoBold
              选择做全栈勘探者，拥有技术、数据、传感器硬件、现场团队以及矿产资产权益，而不是单纯技术授权方。这创造了深护城河，也集中风险。公司同时是技术公司、勘探公司和矿山开发商——每条业务线本身都很复杂，合在一起要求跨多个资本池和运营能力。
            calloutType: insight
            claimRefs:
