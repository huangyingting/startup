      - number: '7.6'
        title: 附录
        blocks:
          - type: callout
            title: 矿山建设资金缺口是最大单项财务风险
            body: >-
              Mingomba 从当前勘探 / 可行性阶段推进到矿山投产，估计需要 $1-5B+ 矿山建设资本——远超 KoBold 当前资产负债表。只要清晰的建设融资结构（BHP JV 扩张、项目债务、金属流交易
              或股权融资）尚未宣布，这一风险就仍未解决。资本缺口在当前阶段已知且可预期，但解决 时间和对现有股东的稀释影响仍未知。行业经验（Ivanhoe Mines 在 Kamoa-Kakula）表明，
              这类融资需要主要资本提供方投入 5-8 年投产前资金。
            calloutType: insight
            claimRefs:
              - CR003
              - CR006
              - CR030
          - type: callout
            title: 赞比亚与 DRC 地缘政治风险，是 AI 叙事里定价最不足的风险
            body: >-
              KoBold 的 AI 技术叙事常常主导投资者报道，但公司的根本风险画像更像一家在政治复杂的非洲司法辖区运营的矿业公司。赞比亚 10 年内多次调整矿业权利金框架；刚果（金）被评为全球治理挑战最突出的国家之一。AI
              再先进，也对冲不了赞比亚政府上调矿业权利金，或刚果（金）政府撤销 Manono 采矿权的决定。以 $2.1B 估值承销的投资者，应把地缘政治风险明确计入价格，而不是因为科技叙事而打折。
            calloutType: insight
            claimRefs:
              - CR015
              - CR016
              - CR017
              - CR019
          - type: callout
            title: 缺乏公开性能基准本身就是风险
            body: >-
              KoBold 的 AI 勘探表现从未接受独立基准测试。没有同行评审研究把 KoBold 的矿产发现成功率与传统地球物理基线对比；没有监管文件披露钻探成功率；BHP、Rio Tinto
              等合作方也没有公布合资项目的发现结果。缺少这些证据时，投资者是在按叙事而非数据支付 AI 技术溢价，结构性风险偏高。Mingomba 发现是真实的，但它位于已知成矿带，不能构成完全盲勘、AI 优先发现的证明。
            calloutType: insight
            claimRefs:
              - CR007
              - CR008
              - CR033
          - type: callout
            title: 终止条件和监测指标
            body: >-
              需要立即重新尽调的投资逻辑击穿触发项：（1）BHP 或 Rio Tinto 公开退出某个合资项目且没有替代伙伴——商业验证流失；（2）赞比亚对 Mingomba 征收 >15%
              的矿业权利金——矿山经济性实质改变；（3）铜价连续 12+ 个月低于 $7,000/tonne——建设融资逻辑被击穿；（4）CTO Tom Hunt 确认离职——AI 平台连续性风险；（5）Global
              Witness 或 Amnesty International 的负面报告点名 KoBold 涉及冲突矿产违规——ESG 叙事坍塌。监测：每月 LME 铜价；赞比亚政府矿业政策表态；KoBold 关于
              Mingomba BFS 的公告；AVZ Minerals ASX 文件中 Manono 法律纠纷进展。
            calloutType: insight
            claimRefs:
              - CR030
              - CR031
              - CR032
              - CR033
