      - number: '5.4'
        title: 技术风险：复制、商品化与开源威胁
        blocks:
          - type: paragraph
            body: >-
              未来 5-10 年，KoBold 的技术护城河面临几类风险。复制风险：平台算法基础建立在公开 可得的 ML 技术上；只要拥有足够地学数据和数据科学人才，资金充足的竞争者（大型矿业
              公司、国家地质调查机构或资本充足的 AI 初创公司）理论上可以复制这一路径。BHP、 Rio Tinto、Anglo American 等大型矿业公司都有活跃的内部数据科学勘探团队和大量历史
              地学数据，构成长期的自建 vs 购买风险。开源与政府研究：SEG、USGS、NRCAN 等项目正在 产出开源工具和训练数据集，可能降低竞争者进入的技术门槛。传感器商品化：商业无人机 勘测平台、LIDAR
              以及第三方硬件供应商的新一代 EM 传感器越来越容易获得；如果 KoBold 的特定传感器创新被复制，硬件护城河会受威胁。KoBold 的 EM 传感器工程优势大概率在 商业供应商追平前提供 2-5
              年领先期。人才流失：KoBold 平台特征工程和模型架构中的 隐性知识集中在小团队；关键科学家离职（尤其是 CTO Tom Hunt）可能把与 IP 相邻的
              知识带给竞争者。信任与质量风险：作为投产前公司，KoBold 尚未通过从发现到矿山投产 的完整周期证明其 AI 平台价值；如果早期 AI 主导发现低于预期，公司面临声誉风险。 Global Witness
              等透明度组织曾记录，矿业领域的技术叙事主张常常跑在可验证业绩证据 前面，这一风险与 KoBold 的 AI 优先定位直接相关。
