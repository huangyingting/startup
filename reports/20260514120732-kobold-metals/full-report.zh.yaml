  - number: 2
    title: 市场分析
    sections:
      - number: '2.1'
        title: 市场定义与范围
        blocks:
          - type: paragraph
            body: >
              KoBold Metals 站在两个市场的交叉点：全球关键矿产勘探服务市场，以及新兴的 AI 赋能矿业地球科学技术市场。它的主要收入模式不是技术授权，而是通过自研 AI 平台发现矿床后积累权益。这让 KoBold
              在结构上不同于传统矿业技术供应商。


              市场边界由全球寻找并开发新铜、钴、镍、锂矿床的努力来定义；这四类主要电池金属是能源转型必需品。这些金属构成 KoBold Machine Prospector
              平台的目标全集，也决定公司在哪里、如何部署资本和技术。KoBold 的可服务市场不包括下游活动：矿物加工、精炼、电池制造和电动汽车组装。


              现状替代品包括传统勘探公司（Strathmore Resources、SRK Consulting）、大型矿业公司内部勘探项目，以及政府出资的地质调查。KoBold 的差异化来自 AI
              综合地球科学数据、自研传感器（Hyperpod），以及更快的假设驱动钻探项目；公司称这些能力能缩短发现时间。KoBold 可能打开可选性的邻近市场包括矿业服务、地球科学数据授权和卫星矿物制图。


              鉴于 Mingomba 旗舰资产，铜是 KoBold 最高优先级的目标金属，不过公司平台并不绑定某一种金属。Mingomba 中钴与铜共生。锂是 DRC Congo 活动和 Quebec 勘探的重点。镍是澳大利亚
              BHP 合资项目的主要重点。
