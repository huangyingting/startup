        - IRMA、World Bank 气候框架
        - 尚未发布排放估计；预可行性阶段讨论还早，但之后会变得重要
      - - 社区社会许可（Zambia）
        - Mingomba 矿山开发可能在铜带地区引发社区反对或搬迁担忧
        - 低
