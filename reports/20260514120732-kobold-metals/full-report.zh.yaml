      - number: '1.3'
        title: 融资历史、估值与投资者基础
        blocks:
          - type: paragraph
            body: >-
              截至 2024 年中，KoBold Metals 累计股权融资约 $692M+。公司 2024 年 7 月完成 $537M Series C；多家可信媒体报道显示，这一轮隐含估值约
              $2.1B。以一家尚未有收入的矿产勘探公司来看，投资者基础异常强。Bill Gates 共同创办的气候基金 Breakthrough Energy Ventures 是重要早期投资者。Andreessen
              Horowitz 领投 Series B（2022 年 1 月约 ~$192M）。T. Rowe Price、Fidelity 和 Standard Investments
              是值得注意的机构投资者，说明公司对传统资产管理机构的 crossover 吸引力正在增强。BHP Ventures（全球最大矿业公司之一 BHP 的风险投资部门）和 Equinor
              Ventures（挪威国有石油公司的风险投资部门）是战略投资者，既带来资本，也带来运营可信度。XN 和 B Capital 也参与投资。战略投资者构成尤其重要：BHP 和 Equinor
              不只是财务支持者——它们是行业在位者，已经把 KoBold 技术部署到自身勘探资产上，从而验证了这套技术。Series C 标志着规模跃迁，$537M 远超此前所有轮次总和。资金预计将用于开发赞比亚
              Mingomba 铜矿，并加速全球勘探。KoBold 尚未公开披露收入数字，说明公司仍处于收入前或早期收入阶段。公司仍是 Delaware 私营公司，没有公开申报义务。
