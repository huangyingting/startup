        title: 可比分析、退出准备度与最终尽调问题
        blocks:
          - type: paragraph
            body: >-
              可比上市矿业权利金 / 金属流公司：Franco-Nevada (FNV)、Wheaton Precious Metals (WPM) 和 Royal Gold (RGLD)
              基于已产生现金流的权利金组合，EV/EBITDA 交易倍数为 30-50x，与 KoBold 尚未投产的阶段并不直接可比。可比开发阶段铜公司：Ivanhoe Mines
              在类似投产前阶段（Kamoa-Kakula，刚果（金），2016-2018）于首次投产融资前，股权市值为 CAD $2-3B，与 KoBold $2.1B Series C
              估值方向上可比。开发阶段铜项目按地下铜当量交易价格为 $3-8/tonne（Wood Mackenzie、CRU Group 行业基准）；KoBold 的 $3-5/tonne
              落在该区间内。私募轮次先例：重要先例包括 Rio Tinto 以 $825M 收购开发阶段的 Turquoise Hill Resources，以及多笔 $1-3B 区间的投产前铜开发项目融资。AI /
              数据平台溢价：KoBold 的技术叙事相对纯矿山开发商拿到溢价；可比 AI 驱动勘探公司没有上市样本，但 BHP / Rio Tinto 合资项目的商业验证支持其相对纯 NAV 至少有 1.5-2x
              技术溢价。退出准备度：KoBold 当前阶段尚不具备 IPO 条件——未产生收入、未投产的公司，在没有收入或投产决策前，很难在公开市场实现定价发现。最可能的流动性事件包括：（a）寻求同时获得 Mingomba
              资产和 AI 平台的矿业巨头进行战略收购（时间线：3-8 年）；（b）Mingomba 作出投产决策后 IPO（时间线：7-12 年）；（c）AI 平台拆分为独立实体（BFS
              前可能性低）。最终尽调问题：（1）Mingomba 初步经济评估或 BFS（或时间线承诺）；（2）KoBold 独立资源量估算审计；（3）与 BHP 的建设融资条款清单；（4）AI
              平台性能数据（发现命中率相对对照组）；（5）ESG 认证路径；（6）$2.1B 和 $5B 估值下的股权结构表与清算分配瀑布分析；（7）ZCCM-IH 治理协议条款。
