  productSummary: >-
    KoBold 的自研平台由几部分拼成：（1）用于概率矿床制图的贝叶斯 ML 推断引擎；（2）新型航空和地面 EM、重力传感器；（3）由 JV
    和自有项目积累出来的全球地球物理数据集；（4）内部量化地球科学团队。平台为铜、钴、镍和锂矿床生成钻探靶区。商业落地靠 JV 勘探项目（BHP、Rio
    Tinto）和全资项目（Zambia、Burundi、Quebec、Finland）。旗舰资产：赞比亚 Mingomba 铜钴矿床——247 Mt 指示资源量，Cu 品位 2.79%，由 JV 合作伙伴
    ZCCM-IH（赞比亚国有矿业实体）共同开发。
  customerFocus: >-
    KoBold 的商业模式以权益为核心（持有矿山权益，而不是授权软件）：公司靠发现和开发矿床创造价值，而不是收取技术服务费。JV 合作伙伴（BHP、Rio Tinto）出资支持勘探项目，并从商业上验证 AI 平台。Mingomba
    投产后，未来收入将来自铜和钴销售。截至 2026 年 5 月，AI 平台尚未授权给第三方。
  businessModel: >-
    以权益为核心的矿产开发：KoBold 持有矿床权益（Mingomba 通过 ZCCM-IH JV；BHP/Rio Tinto JVs）。公司仍处于收入前阶段，运营资金来自机构投资者的股权融资。未来变现路径包括：（1）Mingomba
    铜和钴销售（最早 2033-2037 年）；（2）被大型矿业公司战略收购的可能性；（3）AI 平台潜在授权（尚未建立）。截至 2026 年 5 月，公司没有技术授权或 SaaS 收入流。
