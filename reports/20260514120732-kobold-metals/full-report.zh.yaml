      - number: '7.5'
        title: 风险缓释、监测指标与总体判断
        blocks:
          - type: paragraph
            body: >-
              KoBold 的风险缓释措施有意义，但无法完全抵消一家收入前、投产前矿产勘探公司在 16-20 年变现周期下的结构性风险。最强缓释因素包括：（1）BHP 和 Rio Tinto JV 合作
              把大量勘探资本风险转移给全球最大矿业公司；它们也隐含验证 KoBold 的技术和项目管线 达到机构级质量标准；（2）来自 T. Rowe Price、Fidelity 等高质量投资人的 $537M Series
              C，按当前烧钱速度估计提供 3-7 年现金跑道；（3）Mingomba 矿床本身提供资产 底价，即便 AI 平台表现不佳，一个位于赞比亚铜带的世界级铜矿床仍有重大经济
              价值，且不取决于其发现方式；（4）KoBold 的赞比亚本地领导团队和 ZCCM-IH 合作为旗舰 资产提供政治和社区保护。会提示投资逻辑恶化的监测指标包括：（a）BHP 或 Rio Tinto 退出 JV
              且没有替代方；（b）赞比亚或 DRC 修订矿业法，大幅提高权利金率；（c）铜价 连续 12+ 个月低于 $7,000/tonne；（d）CTO Tom Hunt 离职；（e）未能在 2028-2029 年前 发布
              Mingomba 可融资可行性研究；（f）Global Witness 或 Amnesty International 发布 专门针对 KoBold 的不利报告。风险判断：考虑到收入前、投产前状态、地缘政治集中和
              漫长变现周期，KoBold 作为 Series C 投资标的风险高于平均水平。高质量投资人和伙伴 基础部分抵消了这些风险。适合 10-15 年回报周期的耐心资本；不适合需要 5 年内流动性的 投资人。
