      - number: '2.2'
        title: 市场规模测算——多视角方法
        blocks:
          - type: paragraph
            body: >
              没有单一权威市场规模估计把“AI 驱动的关键矿产勘探”定义为独立类别。本章采用多视角方法，结合：（1）底层大宗商品市场规模，（2）新增矿山供给所需资本投资，（3）估计勘探支出，（4）长期需求增长轨迹。


              **铜商品市场（视角 1）：** 2023 年全球铜矿产量约 22 million tonnes，COMEX 平均价格约 $3.90/pound（$8,600/tonne）。这意味着全球铜矿年收入约 ~$190
              billion。KoBold 的权益模式瞄准的是已发现矿床价值的一部分，而不是年收入的一部分。USGS 2015 年评估估计，全球已识别铜资源量为 2.1 billion tonnes，未发现铜资源量为 3.5
              billion tonnes——未发现部分才是 KoBold 这类勘探者的主要猎场。


              **能源转型投资缺口（视角 2）：** World Bank 的 Climate-Smart Mining 倡议估计，为满足 Paris Agreement 路径，清洁能源技术所需矿产产量到 2050
              年可能需要增长近 500%，总量达到 3 billion tonnes。UN Trade and Development 机构在 2025 年 5 月估计，仅解决铜供给缺口就需要 $250 billion
              投资和至少 80 个新矿业项目。这一资本缺口就是 KoBold 模式试图降低风险的投资机会规模。


              **电池金属需求增长（视角 3）：** 全球铜需求从 2004 年的 16.7 million tonnes 增至 2024 年的 28.5 million tonnes（CAGR 2.7%）。预测显示，到
              2030 年将以 3.8% CAGR 增至 35.1 million tonnes。锂产量仅 2023 年就增长 23%，达到约 180,000 tonnes；电池用途占全球锂消费的
              87%，且仍在快速增长。BloombergNEF 预计，受 EV 电池、航空航天和消费电子推动，钴需求到 2050 年将增长至三倍。IEA 警告，现有供应链高度集中，可能不足以满足未来清洁能源需求。


              **EV 普及作为需求信号（视角 4）：** BloombergNEF 的 Electric Vehicle Outlook 2025
              报告称，全球每四辆新售汽车中已有一辆是电动车，中国过半车辆为电动车。这条需求轨迹为电池金属需求形成结构性底部，尤其是铜、钴、镍和锂，不受近端价格周期左右。


              KoBold 的总可用市场最好不要用年收入来框定，而应看全球未发现关键矿产矿床价值——这是一个以万亿美元计的存量指标。可服务市场则受 KoBold 技术的地理和矿种重点、现有合作伙伴以及运营版图约束。
