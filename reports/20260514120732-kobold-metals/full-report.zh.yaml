      - number: '4.4'
        title: 财务风险、资本效率与可比结构
        blocks:
          - type: paragraph
            body: >-
              KoBold 面临一组结构性财务风险，根源在于其收入前、勘探阶段的位置。第一，烧钱速度 风险：公司运营版图（赞比亚矿山开发、全球勘探项目、AI 研发）意味着固定成本很高； 如果 Series C
              资金消耗快于预算，或大宗商品市场恶化，公司可能在收入兑现前需要 再融资。第二，资本集中风险：为收购 Mingomba 投入的 $150M 是一笔大型单一资产押注； Mingomba 的矿山开发资本（按其规模估计需
              $1-5B+）需要大型矿业伙伴或项目融资提供 外部资金，KoBold 无法靠自身资产负债表出资建矿。第三，股权稀释风险：每轮融资都 稀释了早期投资人与创始人；未来 Series D
              或项目融资可能继续稀释现有股东，尤其是 KoBold 被迫以低于 Series C 的估值融资时。第四，汇率风险：KoBold 在赞比亚运营中 对 ZMW（赞比亚克瓦查）有大量敞口，同时又有 USD
              计价负债，形成折算敞口。第五， 缺少经审计财务报表意味着老股交易投资人、未来领投方或战略收购方尽调时，都需要 完整审阅财务数据室——没有公开财务数据对私营公司正常，但也是实质性尽调限制。矿业
              领域的可比资本结构包括权利金 / 金属流公司（Franco-Nevada、Wheaton Precious Metals）和投产前铜矿开发商（2014 年前的 Ivanhoe Mines、Oyu Tolgoi
              爬坡前的 Turquoise Hill）。这些可比对象在达到生产现金流前都需要追加融资，从重大勘探发现 到首次投产通常耗时 10-15 年。
