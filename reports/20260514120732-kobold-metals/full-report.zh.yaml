            body: >-
              KoBold 具名伙伴关系的证据质量因对手方而异。BHP 的证据质量最高：BHP Annual Report 2024 提及其对 KoBold 的投资与合作，提供了来自伙伴自身披露财务文件的一手级来源，
              独立确认了关系。BHP Ventures 投资组合页面列出 KoBold，也进一步佐证。Rio Tinto 的 年报和新闻稿提到合作，但具体程度略低于 BHP 披露。ZCCM-IH 的新闻稿和网站确认
              Mingomba Mining Ltd 架构中 KoBold 为多数股东、ZCCM-IH 为共同持有人，提供了政府 伙伴的一手级确认。Equinor 方面，Equinor Ventures
              网站的投资组合列表确认了投资关系。 除 Mingomba（其早于 JV 架构）之外，目前没有任何 JV 勘探项目产生公开确认的矿产发现。
              所有部署都处在活跃勘探或早期开发阶段，而非矿山生产；也就是说，伙伴正在出资勘探， 但尚未从 BHP/Rio Tinto JV 获得任何运营回报或确认的经济性发现。这与发现达到钻探 阶段前通常 3-10
              年的勘探周期相一致。公开信息中未见不利伙伴离开、JV 终止或伙伴争议。
