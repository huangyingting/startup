            title: KoBold 规模上没有纯 AI 勘探可比公司
            body: >-
              没有直接可比公司同时具备 AI-first 勘探和世界级开发资产权益，这意味着 KoBold 的组合模式缺少同行验证。Goldspot Discoveries（TSX-V，约 ~$50-100M 市值）是唯一上市
              AI 勘探同行，但其隐含规模只有 KoBold 的 1/20。这种缺少可比公司的情况，让竞争对标更难，也让传统矿业投资者更难接受估值溢价。
