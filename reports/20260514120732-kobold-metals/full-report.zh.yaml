  - number: 5
    title: 产品与技术
    sections:
      - number: '5.1'
        title: 核心技术平台与架构
        blocks:
          - type: paragraph
            body: >-
              KoBold 的核心平台是一套自研 AI/ML 系统，接入多路地学数据——历史地质图、地球化学 调查、卫星影像、航空地球物理，以及公司自有新型传感器输出——再通过贝叶斯推断综合，
              生成概率型矿床地图。贝叶斯框架是架构核心：系统不是输出单一预测靶区，而是量化 地下矿体预测的不确定性，为矿床出现生成概率分布，让勘探团队优先钻探概率最高的 靶区。CTO Tom
              Hunt（PhD）带领技术团队，成员包括数据科学家、地学专家和硬件工程师， 以一体化的全栈模式协作。平台接入来自国家地质调查机构（USGS、Geological Survey of Canada、Zambia
              Geological Survey）、学术库和历史勘探数据库的旧地学数据；这些 数据过去往往只存在于纸质或彼此割裂的数字形态中。自研电磁（EM）传感器和重力传感器
              提供不同于商用勘测设备的新数据输入，能够在标准工具达不到的深度和分辨率下测量 地下电导率与密度异常。AI 架构借鉴贝叶斯深度学习、高斯过程回归和地理空间机器学习
              等已发表技术，搭建多模态地学智能系统。平台不作为产品出售，也不授权给第三方；所有 输出只用于识别并排序 KoBold 自有矿产靶区。
