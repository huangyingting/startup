  - id: TE003
    title: AI/ML 方法与数据管线
    columns:
      - 方法
      - 应用
      - 输入数据
      - 输出
      - 相比传统方法的优势
    rows:
      - - 贝叶斯推断（概率图模型）
        - 核心矿床概率估计；不确定性量化
        - 多模态地球科学数据流
        - 每个位置矿床出现概率的分布
        - 量化不确定性；相比专家驱动的二元决策，可按原则排序
      - - 高斯过程回归
        - 在采样点之间插补地球化学和地球物理测量值
        - 稀疏地球化学和地球物理点样本
        - 带不确定性边界的连续空间场
        - 相比确定性克里金法，插值纳入不确定性；同时遵守地球科学约束
      - - 卷积神经网络（CNN）/ 地理空间深度学习
        - 识别 2D/3D 地球物理网格和遥感影像中的模式
        - 网格化 EM、重力、磁法和卫星栅格数据
        - 异常检测、特征分类、成矿远景图
        - 相比人工解译，可规模化自动检测特征；可复现
      - - 集成方法 / 梯度提升
        - 整合多个子模型的预测；评估特征重要性
        - 全部处理后的地球科学特征
        - 集成概率分数；供地球科学家复核的特征归因
        - 相比单一模型，降低过拟合；识别信息量最高的数据流
      - - 迁移学习
        - 把在数据丰富地体（赞比亚 Copperbelt）上训练的模型迁移到新地质环境
        - 预训练模型权重；新项目数据
        - 适配后的模型在新区域所需训练数据更少
        - 降低新区绿地勘查的冷启动数据需求
      - - 数据标准化与协调管线
        - 统一不同年代、地图投影和测量口径下的历史地质数据
        - 原始历史数字记录和扫描纸质地球科学记录
        - 已协调并标准化、可供 ML 摄取的数据
        - 激活过去无法机器读取的数十年历史数据；形成数据护城河
    notes: 方法根据公开表态、专利申请，以及关于 ML 用于矿产勘查的公开学术文献推断。KoBold 未发布描述其具体实现的技术论文。方法标签反映可能使用的技术类别，不代表已确认的内部架构。
