      - number: '3.5'
        title: 护城河耐久度、锁定效应与被替代风险
        blocks:
          - type: paragraph
            body: >-
              KoBold 的竞争护城河由四个互相强化的元素构成：（1）自有数据和模型护城河——KoBold 的 AI
              模型以多年积累的地球科学数据、自有现场项目的自研传感器读数，以及新进入者难以获取的历史数据训练；（2）硬件差异化——KoBold
              的新型电磁和重力传感器生成的数据输入，无法被使用现成勘测设备的竞争对手完全复制；（3）人才护城河——横跨地球物理、ML 和现场地质的博士团队很难快速组建，也代表难以转移的组织知识；（4）合作伙伴锁定——与 BHP
              和 Rio Tinto 的 JV 协议形成战略绑定，使这些合作伙伴很难在不打乱仍在推进的项目时切换到其他 AI 勘探供应商。主要护城河风险包括：在位者在内部成功搭建或收购可比 AI 能力（BHP
              有自己的数据科学团队，并通过 JV 接触 KoBold 发现项目）、基础模型和地理空间 AI 工具改进带来的 AI/ML 能力商品化，以及 KoBold 专业团队人才流失。JV
              合作伙伴当前切换成本高（KoBold 拥有共同项目的自有靶区数据），但如果合作伙伴数据权利设计不够谨慎，这条护城河会被侵蚀。JV 合作伙伴的多归属风险低（它们已承诺具体项目），但初级矿商改用 Goldspot 或
              Earth AI 做低成本靶区选择的风险更高。
