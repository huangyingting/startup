      - number: '8.6'
        title: 图表资料
        blocks:
          - type: callout
            title: KoBold 是一家披着科技外衣的矿业公司
            body: >-
              KoBold 投资者材料里的主导风险框架强调 AI 和数据科学创新——这个叙事有其合理性。但底层投资押注的是赞比亚铜矿经济性、刚果（金）和布隆迪政治稳定，以及 10-15 年周期里的全球铜价。估值同为 $2.1B
              的科技公司通常会在 1-3 年内产生收入；KoBold 的第一笔收入可能还要等 8-12 年。投资者应在技术估值方法之外，同步套用矿业部门风险框架。AI 叙事让 KoBold
              相对纯矿山开发商拿到科技板块倍数溢价；投资者需要量化，平台可验证表现是否足以支撑这部分溢价。
            calloutType: insight
            claimRefs:
              - CV001
              - CV009
              - CV033
          - type: callout
            title: Mingomba 是投资逻辑的底部支撑——即便没有 AI 溢价
            body: >-
              即便 KoBold 的 AI 叙事完全降温，Mingomba 铜矿床仍有可观内在价值。247 Mt、Cu 品位 2.79%，位于历史上全球最高产铜区之一的赞比亚铜带——无论发现方法如何，这都是世界级资产。在
              $9,000/tonne 基准铜价和合理矿山开发假设下，Mingomba 的 NAV 估计为 $1-3B（KoBold 可归属份额）。即使在悲观情景下，这也给 $2.1B 估值提供了部分底部支撑，使 KoBold
              区别于纯投机、尚未产生收入的科技押注。
            calloutType: insight
            claimRefs:
              - CV003
              - CV004
              - CV019
              - CV021
          - type: callout
            title: 核心催化剂：发布银行级可行性研究
            body: >-
              未来 24-36 个月，KoBold 能做的最重要价值创造动作，是发布（或以 NDA 方式共享）Mingomba
              银行级可行性研究。该文件将给出：经独立审计的资源量估算、采矿方法选择、基础设施需求、建设资本成本估算，以及初步 NPV / IRR。BFS 将让投资者用量化框架替代宽区间桌面估算（$0.8-10B
              NAV），大幅降低估值不确定性，并打开建设融资对话。在 BFS 出炉前，所有估值分析都带有推测性。因此，BFS 是第一个应触发投资建议重估的里程碑。
            calloutType: insight
            claimRefs:
              - CV030
              - CV031
          - type: callout
            title: 漫长变现周期是根本约束
            body: >-
              KoBold 最棘手的挑战不是技术、地质，甚至不是地缘政治——而是时间线。Mingomba 从现在到首次收入需要 10-15 年，完全落在多数 VC 投资者 7-10 年基金周期之外。这在 KoBold
              投资者基础（既有传统 VC，也有耐心机构资本）和实际变现时间线之间制造了结构性张力。到 Series D 阶段，一些早期投资者可能寻求流动性，张力会显现。能从 KoBold 获得最高回报的，是可以持有 12-18
              年的投资者；传统成长股权和 VC 投资者若要按 Series C 估值加仓，应先明确自己是否具备这一投资授权。
            calloutType: insight
            claimRefs:
              - CV009
              - CV011
              - CV012
              - CV025
