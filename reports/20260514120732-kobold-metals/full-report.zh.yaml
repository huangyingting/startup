      - number: '2.3'
        title: 买方与细分市场分析
        blocks:
          - type: paragraph
            body: >
              KoBold Metals 服务三类主要买方 / 合作伙伴。评估 KoBold 商业动能，必须理解每个细分市场的经济性、决策权和采用触发因素。


              **细分 1——大型矿业公司：** 全球矿业公司（BHP、Rio Tinto、Glencore、Anglo
              American、Freeport-McMoRan）控制全球大部分勘探支出。它们每年勘探预算从数亿美元到数十亿美元不等。它们选择与 KoBold
              合作，受几类因素推动：（a）补充枯竭储量的压力，（b）平均矿石品位下降导致传统勘探效率变低，（c）投资者要求证明资本纪律和 ESG 合规。KoBold 已拿下 BHP 和 Rio Tinto
              两个合作伙伴，二者按市值计均为全球前五大矿业公司。典型价值交换是联合勘探权，KoBold 在发现项目中赚取权益。


              **细分 2——初级矿业公司：** 初级矿商预算有限，依赖勘探成功打开资本市场融资。它们可能成为 KoBold 技术未来客户，形式可以是共同勘探伙伴，也可以是数据授权。不过，KoBold
              当前模式聚焦与大型矿业公司的权益合作，而不是服务初级矿商。


              **细分 3——政府和国家资源公司：** 赞比亚 ZCCM-IH、Burundi 地质主管部门，以及 Quebec 政府背景矿业实体代表国家伙伴。它们给 KoBold
              的价值在于地质数据访问、许可推进和本地合作伙伴合法性。加拿大关键矿产计划（由 Natural Resources Canada 管理）为 KoBold 的 Quebec 运营创造了有利监管环境。


              KoBold
              模式下，买方—用户—付款方结构很直接：大型矿业公司既付钱（通过合资项目中的勘探资本），也直接受益（来自发现项目权益）。政府多数情况下是赋能方，而非付款方。所有细分市场共同的采用触发因素，是有望以更低的每盎司或每吨矿产发现资本成本，更快、更高成功率地发现矿床。
