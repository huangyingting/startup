      - number: '5.6'
        title: 附录
        blocks:
          - type: callout
            title: 没有独立基准验证 AI 平台表现
            body: >-
              KoBold 最大的技术尽调缺口，是没有任何独立同行评审或第三方基准，把 AI 平台的矿产 发现成功率与传统勘探方法进行比较。KoBold 的 JV 伙伴（BHP、Rio Tinto）没有发布 对比性能数据，而
              Mingomba 矿床位于历史上已知的成矿带。在独立基准发布，或多个 AI 主导的绿地发现得到确认之前，平台相对传统地球物理方法的增量性能优势仍未得到 验证。
            calloutType: insight
            claimRefs:
              - CE009
              - CE024
              - CE030
          - type: callout
            title: 软硬件双重护城河在结构上难以复制
            body: >-
              不同于纯软件 AI 勘探供应商，KoBold 把自研传感器硬件与自研 ML 平台结合起来，形成 双重护城河。只复制算法路径却没有传感器数据，会得到较差的训练数据；只复制传感器 却没有 AI
              综合能力，只会得到原始地球物理数据，无法智能生成靶区。这个一体化系统 比任一单独组件更有防御性，尤其是在跨多个项目和地质环境部署后，数据优势会持续 复利。
            calloutType: insight
            claimRefs:
              - CE005
              - CE017
              - CE021
              - CE027
          - type: callout
            title: 平台部署在 BHP 和 Rio Tinto 资产上，提供商业验证
            body: >-
              BHP 和 Rio Tinto 是全球前五大矿业公司中的两家，内部勘探能力深厚；它们选择与 KoBold 合作并共同投资，而不是在内部开发等效技术，是强市场信号。矿业巨头有财务 资源自建 AI
              勘探团队；它们选择与 KoBold 合作，意味着它们相信 KoBold 的一体化平台 在可比时间内超过其自建能力。对一家实用技术企业而言，这种商业验证可以说比同行评审 学术基准更有意义。
