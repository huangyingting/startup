  - number: 3
    title: 竞争格局
    sections:
      - number: '3.1'
        title: 竞争格局概览
        blocks:
          - type: paragraph
            body: >-
              KoBold Metals 在四条不同竞争向量上竞争：（1）直接的 AI / 技术优先勘探同行——一小批资金充足、把 ML 和新型传感器用于矿产发现的初创公司；（2）在位大型矿业公司——BHP、Rio
              Tinto、Glencore、Barrick、Newmont 和 Freeport-McMoRan，它们拥有自己的勘探 R&D 项目和内部数据科学团队；（3）传统勘探服务商——SRK
              Consulting、Golder Associates（WSP）等地质咨询公司，以及 CGG、Fugro 等地球物理承包商；（4）邻近替代品——卫星遥感公司（Satellogic、Planet
              Labs）和政府地质调查机构（USGS、BGS、NRCan），它们以低成本或零成本提供公共地球科学数据。KoBold 的竞争优势落在几件事的组合上：自研 AI
              平台（综合历史数据和新型传感器数据）、内部硬件传感器能力、世界级地球科学团队，以及把技术开发和矿产发现结果高强度绑定在一起的全栈权益模式。关键是，KoBold
              不授权技术；这意味着它不按收费服务模式与勘探服务商竞争，而是争夺矿权访问、优秀地球科学人才，以及与大型矿业公司的合作交易。
            claimRefs:
              - CP001
              - CP002
              - CP003
              - CP004
              - CP005
      - number: '3.2'
        title: 直接 AI 与技术优先勘探同行
        blocks:
          - type: paragraph
            body: >-
              KoBold 最直接的竞争威胁来自其他 AI-first 矿产勘探公司，尽管没有一家达到 KoBold 的规模或融资水平。Earth AI（前称 Unearthed Solutions）是一家澳美公司，把 ML
              驱动靶区选择用于初级矿商和大型矿业公司的矿产勘探；它完成了约 $15M Series B，聚焦技术授权模式，而非 KoBold 的权益留存打法。Goldspot Discoveries（TSX-V:
              SPOT）是一家总部位于 Montreal 的上市 AI 勘探公司，向初级矿商提供矿产靶区选择软件平台；其市值约 $50-100M，远小于 KoBold 约 ~$2.1B 的隐含估值。Getech
              Group（AIM: GTC）是一家英国上市地球科学数据和 AI 公司，历史上聚焦油气勘探，市值约 £20M；其近期转向矿业和能源转型矿产，构成潜在威胁，但规模非常有限。Xcalibur Multiphysics
              提供带 AI 增强解释的航空地球物理勘测；它是服务型业务，不保留矿产权益，模式上与 KoBold 区分开来。这些直接同行没有一个发现并正在积极开发可与 Mingomba 相比的资源。KoBold
              在技术成熟度和资产质量上的组合缺少清晰 AI-first 同行，这是一项重要差异化因素；但也带来验证挑战，因为还没有可比公司跑通生产阶段概念验证。
