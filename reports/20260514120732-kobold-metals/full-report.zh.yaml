      - number: '7.4'
        title: ESG、环境与声誉风险
        blocks:
          - type: paragraph
            body: >-
              KoBold 的 ESG 风险画像由两层因素塑造：一层是积极的非洲发展叙事（>90% 赞比亚员工、 $200M 经济贡献、政府伙伴模式），另一层是 DRC 运营以及技术公司进入冲突矿产相邻区域
              引发的全球审视。Global Witness、Human Rights Watch 和 Amnesty International 都广泛 报道过 DRC 和赞比亚矿业中的 ESG 失败；截至 2026 年 5
              月，虽无报告专门针对 KoBold， 但公司若扩张到手工采矿区或冲突矿产相邻供应链，会立即受到审视。Mingomba 的环境风险 包括酸性矿山排水、地下水位污染和废弃物管理——这些都是铜硫化物露天或地下开采的标准
              风险，需要强健的环境管理计划和影响评估。KoBold 的机构投资人（尤其是带 ESG 授权的 Breakthrough Energy Ventures）在任何矿山开发融资前，可能都会要求采用
              IRMA（Initiative for Responsible Mining Assurance）标准和其他自愿 ESG 框架。KoBold 的 AI 驱动勘探 叙事还带来特定声誉风险：如果 AI
              系统被用于在保护区、原住民领地或环境敏感区识别矿床， 公司可能面临来自环保和原住民权利组织的法律与声誉挑战。BHP 和 Rio Tinto 两个 JV 伙伴 对 KoBold 施加自身 ESG
              标准——两家矿业巨头都公开承诺负责任采矿——这对 KoBold 行为 形成保护性约束。Equinor 的投资人 ESG 授权也创造协同激励。更广泛的关键矿产供应链 正受到越来越多立法审视（EU Battery
              Regulation、US Inflation Reduction Act 关键矿产 条款、CFIUS 国家安全审查），既创造机会（关键矿产供应链投资获得政治支持），也带来 风险（供应链尽调要求越来越严格）。
