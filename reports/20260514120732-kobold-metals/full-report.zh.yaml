      - number: '7.3'
        title: 监管、法律与地缘政治风险
        blocks:
          - type: paragraph
            body: >-
              KoBold 的主要监管与地缘政治风险集中在赞比亚和 DRC——两个司法辖区都有矿业法不稳定、 税制变化和政治风险的记录。赞比亚：2022-2024 年间，赞比亚政府引入 10% 权利金率，
              并推出超额利润税，试图在大宗商品上行周期获取更多矿业收入；如果这些税项在投产阶段 沿用，可能显著削弱 Mingomba 经济性。2021 年赞比亚政府更替（Hichilema
              总统当选）带来了更友好的矿业投资行政环境，但政策风险仍在：未来任何政府都 可能逆转这一立场。ZCCM-IH 持有 Mingomba 股权，带来结构性保护（国家与矿山成功有股权
              协同），也带来治理风险（国有实体可能优先考虑本地就业或权利金收入，而不是股东价值 最大化）。DRC：KoBold 在 DRC 的活动（AVZ Minerals Manono 框架协议、Bloomberg 报道的
              锂勘探）位于 Transparency International 评定的全球最易腐败司法辖区之一。DRC 矿业法已多次修订， 以提高国家权利金和政府股权。KoBold 的战略投资人包括
              Equinor（挪威国有）；若公司 追求与美国政府相关的关键矿产资产，CFIUS 审查可能成为风险——尽管目前仍是假设性风险。 OECD Conflict Minerals Due Diligence
              Guidelines 和 SEC Dodd-Frank Section 1502 冲突矿产报告规则，为来自赞比亚、DRC 和布隆迪的矿产下游 供应链设定合规义务。公开信息中未识别出针对 KoBold
              的当前诉讼，但 AVZ Minerals 争议 （AVZ 自身围绕 Manono 矿床陷入诉讼）让 KoBold 的 DRC 计划承受间接法律敞口。
