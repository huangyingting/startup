            title: 矿石品位下降验证 AI 勘探逻辑
            body: 最容易接近的矿床耗尽后，过去一个世纪平均铜矿石品位显著下降。越是容易发现的地表矿床变少，能识别埋藏高品位矿床的 AI 驱动勘探就越有结构性价值。
            calloutType: insight
            claimRefs:
              - CM029
          - type: callout
            title: DRC ESG 风险是行业性问题，不只针对 KoBold
            body: >-
              Amnesty International 2016 年记录了 DRC 手工钴矿中的童工和人权侵害。KoBold 从事工业化勘探，不是手工采矿，但在 DRC 运营会因地理接近而带来声誉敞口。KoBold 的
              Ethics 页面和负责任采购承诺应接受压力测试。
            calloutType: risk
            claimRefs:
              - CM034
          - type: callout
            title: 需要耐心资本
            body: 从发现到投产的矿山开发周期为 16-20 年，这意味着即便是 KoBold 当前最先进的资产（Mingomba，2022 年收购），也可能要到 2030 年代中后期才投产。投资者资本需要有 15-25 年视野。
