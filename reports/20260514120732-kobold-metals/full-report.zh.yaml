      - number: '2.4'
        title: 增长驱动因素与采用约束
        blocks:
          - type: paragraph
            body: >
              关键矿产勘探市场有几股强劲结构性顺风，但也受到实质性运营和市场约束的部分抵消。


              **关键增长驱动因素：**

              能源转型是主要宏观需求驱动。BloombergNEF 的 2025 EV Outlook 确认，全球每四辆新车已有一辆是电动车；这种快速普及率给电池金属需求发出不可逆的信号。AI
              和机器学习进步，让过去需要多年顺序人工分析的地球科学数据集可以被综合起来。卫星遥感、LiDAR 小型化和云计算能力同时降低了航空与地面勘探测量成本，并提高了精度。


              矿石品位下降是有利于 KoBold 的结构性驱动。数十年来，最高品位、最容易接近的矿床被消耗殆尽，平均铜矿石品位一路下降。这让 AI 驱动识别埋藏较深的高品位矿床越来越有价值。IEA 的 Critical
              Minerals programme 强调关键矿产供应链“前所未有”的集中——全球超过 70% 钴来自 DRC，中国主导加工——从而给政府和行业创造强烈的供应多元化投资动机。


              **关键采用约束：**

              许可和监管时间线是最重要的约束：很多司法辖区从发现到首次投产，平均矿山开发周期超过 16-20 年。再多 AI 加速，也无法实质压缩发现之后的许可管线。KoBold 运营区域（DRC、Zambia）的 ESG
              和社区风险不轻；Amnesty International 2016 年记录了 DRC 手工钴矿童工问题，矿区社区冲突仍然普遍。近端大宗商品价格波动——2023 年锂价下跌约
              ~70%，镍价也下跌——会暂时压低矿业公司勘探预算。最后，KoBold 的权益模式需要大额资本承诺，也需要等 16+ 年才看到回报的耐心，这限制了有财力参与的合作伙伴池。
