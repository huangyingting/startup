        - 若没有明确冲突矿产尽调计划就扩张 DRC，将留下缺口
      - - 环境（Mingomba）
        - 露天或地下铜矿需要酸性矿山排水控制、水管理和尾矿库设计
        - 中
        - Zambia 要求矿山开发进行环境影响评价（EIA）；BHP 伙伴标准适用
        - IRMA 框架；Zambia Environment Management Agency（ZEMA）要求
        - 预可行性阶段 EIA 尚未公开；未确认有独立环境审查
      - - 劳工权利（Zambia）
        - 采矿劳工权利——工资水平、安全、ZCCM-IH 雇佣条款；Zambia 铜带地区历史上存在劳资紧张
        - 中
        - '>90% Zambia 本地员工；Mfikeyi Makayi（Zambia 人）负责非洲业务；社区投资项目'
        - KoBold 新闻稿；Zambia Ministry of Mines 记录
        - 未见 KoBold Zambia 业务的第三方劳工审计公开
      - - 原住民权利（Canada/Burundi）
        - Quebec 勘探区域（Baie James、Nunavik）需要与 First Nations 开展自由、事先和知情同意（FPIC）咨询
        - 中（Canada）
        - NRCAN 勘探许可流程要求咨询；这是 Canada 采矿监管的标准做法
        - NRCAN 许可记录；Canadian Impact Assessment Act
        - 没有公开证据显示 Quebec 区域已完成 FPIC 咨询
      - - 气候与 Scope 3 排放
        - 铜矿开采耗能高；Mingomba 投产后达到规模时，Scope 3 排放会很可观
