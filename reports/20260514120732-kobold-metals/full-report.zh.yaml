      - number: '1.5'
        title: 反向因素、证据缺口与尽调风险
        blocks:
          - type: paragraph
            body: >-
              从公司概况角度看，KoBold 的反向风险集中在私营公司常见的结构性尽调限制，以及若干实质性问题。第一，作为私营公司，KoBold
              不发布经审计财务报表，因此无法核验烧钱速度、收入状态、经营亏损或现金头寸。$537M Series C 暗示运营开支不小，但没有公开数据确认其中多少用于矿山开发、多少用于 AI R&D。第二，KoBold 以
              AI 主导的勘探方法，按风险调整后到底是否优于传统地球物理，仍未解决；没有发表过经同行评议的第三方基准，比较 KoBold 命中率与行业常态。第三，Mingomba 的收购结构（KoBold
              买入一个已知既有项目，而不是在空白区域做出 greenfield AI 主导发现）意味着旗舰概念验证可能没有叙事中那么“AI-first”。第四，考虑到 Zambia、DRC 和 Burundi
              矿业波动，地缘政治和运营风险不轻。第五，早期投资者激励（BHP 等战略投资者对发现项目拥有优先查看权）可能与 KoBold 股权持有人产生利益冲突。第六，创始人依赖明显：Kurt House 是主要科学发言人和
              CEO；若他离职，很可能引发投资者担忧。董事会构成、股权结构、投票权和二级市场活动均未披露；这对 Series C 阶段私营公司很正常，但限制了尽调深度。
