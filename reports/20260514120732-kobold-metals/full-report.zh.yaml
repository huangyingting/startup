  - number: 7
    title: 风险
    sections:
      - number: '7.1'
        title: 运营与执行风险
        blocks:
          - type: paragraph
            body: >-
              KoBold 最主要的运营风险，是其端到端执行模型尚未被验证：公司已在勘探和发现阶段 （Mingomba）证明成功，但还没有开发或运营过矿山。Mingomba 铜矿床开发需要可融资
              可行性研究（BFS）、环境与社会影响评估、建设融资、矿山建设（这种规模的矿床通常 需要 4-7 年）和运营爬坡；从当前阶段到首次投产合计约需 8-12 年，意味着最早投产 大约在 2033-2037
              年。矿山开发有具体执行风险：成本超支在行业中普遍存在（Glencore 的 Katanga 矿山翻新比初始估算高出超过 $800M；First Quantum 的 Cobre Panama 项目
              在政治性停摆前经历多年成本和时间滑坡）；即使本地员工占比 >90%，矿业劳动关系仍有 挑战；赞比亚的基础设施开发（电力、道路、港口物流）增加复杂度。第二项运营风险是
              公司地理分布横跨赞比亚、DRC、布隆迪、魁北克、芬兰和澳大利亚——同时管理 6 个国家、多个大陆的勘探项目，会拉伸管理带宽并引入运营复杂性。关键人风险高度集中： CEO Kurt House
              是公开科学发言人；CTO Tom Hunt 掌握技术平台；Africa CEO Mfikeyi Makayi 对赞比亚政府和社区关系至关重要。第三项运营风险是 AI 平台表现未被验证： 如果 AI
              靶区的发现命中率并不优于传统勘探，支撑 $2.1B 估值的资本效率论点就会坍塌。 这一点尚未被独立衡量。
