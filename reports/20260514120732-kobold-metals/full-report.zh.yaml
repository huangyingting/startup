          - type: callout
            title: 尽调优先项：要求平台架构审查与传感器基准
            body: >-
              任何尽调投资人都应要求：（1）架构简报，覆盖 AI 平台训练数据来源、模型更新频率和 验证方法；（2）传感器性能规格，以及与商业替代方案的对比；（3）所有 JV 项目中 AI
              生成靶区的钻探记录与实际矿化结果；（4）专利组合相对于地球物理传感和 ML 既有 技术的自由实施分析。只有这些数据点到位，才能独立评估技术护城河的深度和持久性。
