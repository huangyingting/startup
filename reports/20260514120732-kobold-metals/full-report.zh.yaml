      - number: '3.6'
        title: 证据展板
        blocks:
          - type: callout
            title: BHP：既是投资者，也是竞争对手
            body: >-
              BHP Ventures 既是 KoBold 的财务投资者，也是澳大利亚 JV 勘探合作伙伴。这种双重角色制造结构性冲突：BHP 对双方 JV 项目中的 KoBold AI 靶区输出拥有特权访问权，可能反过来为
              BHP 自己的内部勘探项目提供线索。如果 BHP 通过 JV 数据接触把 KoBold 方法内化，就会削弱 KoBold 的关键竞争优势之一。
