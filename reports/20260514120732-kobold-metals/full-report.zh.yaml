companyProfile:
  summary: >-
    KoBold Metals 2018 年在 San Francisco 成立，创始团队包括 CEO Kurt House（Harvard/MIT 地球化学博士）、CTO Tom Hunt（MIT 地球物理博士）和总裁 Josh
    Goldman（Harvard 地球物理博士）。公司开发了一套自研 AI 勘探平台，用贝叶斯推断从地球物理数据中生成矿床位置的概率模型。平台训练数据来自不断扩大的自有数据集，包括六大洲项目采集的航空 EM
    勘测、重力测量和地球化学化验。KoBold 的旗舰资产是赞比亚 Copperbelt 的 Mingomba 铜钴矿床，由其与 ZCCM-IH（赞比亚国有矿业实体）合作发现。Mingomba 拥有 247 Mt 指示资源量，Cu 品位
    2.79%——按品位和规模计，是全球最高品位的未开发铜矿床之一。截至 2024 年 7 月，KoBold 累计融资约 $692M+，其中包括 T. Rowe Price 和 Fidelity 领投的 $537M Series
    C，隐含估值约 ~$2.1B。其他投资者包括 Andreessen Horowitz、Breakthrough Energy Ventures、BOND 和 Equinor（挪威国有能源公司）。公司运营两个活跃的大型矿业公司 JV
    项目（BHP 的澳大利亚镍 / 铜项目；Rio Tinto 的西澳锂项目），并在 DRC（AVZ Minerals Manono 锂矿）、Burundi（政府数据数字化）持有框架协议，在 Quebec 和 Finland
    持有勘探许可。
