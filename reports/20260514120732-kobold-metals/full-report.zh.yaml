            title: 勘探生产率下滑：行业背景
            body: >-
              自 1990s 以来，全球矿业的勘探到发现生产率约下降 80%——每美元勘探支出找到的大型矿床大幅减少。这一结构性趋势正是 KoBold 声称要用 AI 增强靶区选择解决的核心市场问题，也是推动大型矿业公司关注
