    title: KoBold Metals 价值创造时间线
    type: timeline
    layout: standard
    summary: 时间线展示 KoBold Metals 从创立到预期 Mingomba 首次投产的关键价值创造里程碑，说明预期去风险事件顺序，以及实现价值所需投资周期。
    data:
      items:
        - label: KoBold Metals 成立；Bayesian ML 平台启动
          date: '2018'
          note: Kurt House（CEO）、Tom Hunt（CTO）、Josh Goldman（President）联合创立公司；早期 AI 勘探框架搭建完成
        - label: BHP JV 签署 — AI 平台商业验证
          date: '2021'
          note: BHP 就澳大利亚镍 / 铜资产签署勘探 JV，世界最大矿商成为首个商业合作伙伴，验证了 AI 平台
        - label: Mingomba 发现公布 — 旗舰矿床确认
          date: '2022'
          note: 赞比亚铜带确认世界级铜钴矿床；指示资源量 247 Mt、Cu 品位 2.79%；迄今最重要的去风险事件
        - label: Series C 轮完成 — $537M，隐含估值 $2.1B
          date: 2024-07
          note: T. Rowe Price 和 Fidelity 领投；验证 KoBold 尽调材料具备机构质量；资金覆盖 3-7 年运营
        - label: Rio Tinto 西澳锂 JV 签署；AVZ Manono 框架协议
          date: 2024-2025
          note: 组合扩张：第二个矿业巨头 JV（Rio Tinto）+ DRC 期权式布局；投资逻辑从 Mingomba 向外扩展
        - label: 布隆迪数据框架签署；目标纳入 2026 年勘探项目
          date: 2026-03
          note: 非洲扩张继续；布隆迪为组合增加新的前沿司法辖区
        - label: Mingomba BFS 预计完成 — 重大去风险事件
          date: 2026-2029
          note: 银行可融资可行性研究是首份经过完整审计的经济评估；将确定建设融资条款，并产出可公开引用的 NPV / IRR
        - label: 建设融资决策 — 矿山开发承诺落地
          date: 2028-2032
          note: 最早可承诺建设资本的时间点（JV 扩张、项目债务、金属流协议）；公司从勘探方转向矿山开发商
        - label: 首次投产 — Mingomba 铜开始发运
