      - number: '5.2'
        title: 产品供给、传感器硬件与向伙伴交付价值
        blocks:
          - type: paragraph
            body: >-
              KoBold 向 JV 伙伴（BHP、Rio Tinto）交付价值的方式，是生成高概率钻探靶区并管理 全套数据综合流程——用技术驱动的靶区筛选过程替代或增强内部勘探团队，承诺更快、
              更低成本地识别可行矿化带。公司的传感器平台包括新型航空和地面电磁传感器，能够 在深部探测导电矿体；公司称其分辨率超过行业标准工具。互补的重力传感器用于探测 与硫化物和氧化物矿化相关的密度异常。BHP
              在西澳大利亚的镍和铜勘探合作，是整套 平台在一个活跃且已有资金支持的勘探项目中的商业部署；BHP 同时提供财务共同 投资，并开放其勘探数据库中的历史数据。Rio Tinto 在西澳大利亚（靠近 Winu
              项目区域）的锂勘探合作，则把平台部署扩展到另一种大宗商品和地质环境，验证了平台 跨矿种适用性。KoBold 的技术价值链包括四个相互衔接的阶段：（1）汇聚并数字化历史 地学记录；（2）用综合数据流训练 AI
              模型并做概率推断；（3）用自研传感器执行地球物理调查 以补齐数据缺口；（4）生成靶区、建议钻孔位置，并把钻后结果吸收到更新后的模型中。 公司称，赞比亚的 Mingomba 铜矿床发现来自其 AI
              平台对铜带地区历史地学数据的重新分析， 不过该区域本已是已知地质成矿省——这意味着技术作用更多在于排序和增强置信度，而不是在 空白区域发现新矿。全栈股权模型意味着 KoBold
              的技术投资回报以矿产发现中的股权所有权 兑现，而不是许可费，本质上让产品变成“向自身提供的矿产发现服务”。
