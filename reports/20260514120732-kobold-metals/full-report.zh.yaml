        title: 合作伙伴与客户基础：分层与画像
        blocks:
          - type: paragraph
            body: >-
              KoBold Metals 采用全栈股权勘探模型，不产生传统客户关系。其商业伙伴分为三类：（1） 合资勘探伙伴——矿业巨头 BHP（澳大利亚，镍 / 铜）和 Rio Tinto（西澳大利亚，锂），
              它们共同出资勘探项目，并开放项目地块包，以换取 KoBold 的技术和勘探专长。 这些伙伴同时也是 KoBold 的股权投资人，形成战略协同和“投资人-伙伴”双重关系。（2）
              项目股权共同持有人——ZCCM-IH（Zambia Consolidated Copper Mines Investment Holdings） 是赞比亚国有铜业实体，与 KoBold 一起持有 Mingomba
              Mining Ltd 股权，代表一种带有 政治和社会许可维度的政府伙伴关系。Equinor（挪威国有能源公司）也同时持有 KoBold 股权投资和勘探合作权益。（3）政府框架伙伴——布隆迪政府在 2026 年 3
              月与 KoBold 签署地质数据数字化框架协议，显示 KoBold 正把数据获取模型扩展到新的非洲司法辖区。 潜在第四类是 DRC 机会：KoBold 通过 2025 年 5 月与 AVZ Minerals
              的框架协议，正在 追求 DRC 的 Manono 锂矿床。因此，“客户”画像由两家大型矿业公司主导；它们同时是 财务投资人、运营伙伴，也可能成为 KoBold 矿产发现的未来收购方。公开信息中未识别出
