company:
  name: KoBold Metals

chapter:
  number: 6
  title: "Customer and Partner Relationships"
  summary: "KoBold Metals does not have 'customers' in the conventional SaaS or services sense; instead, it has joint-venture exploration partners (BHP, Rio Tinto) and a project co-owner (ZCCM-IH), plus government framework agreements with Burundi. BHP and Rio Tinto are both investors and JV partners, creating strategic alignment but also potential conflicts of interest. Evidence quality for the BHP and Rio Tinto partnerships is high (confirmed by both parties' annual reports and press releases). Customer/partner concentration risk is material: nearly all of KoBold's commercial validation depends on two mining majors. Retention and expansion signals are positive—both BHP and Rio Tinto have continued their partnerships through the 2022-2026 period—but no financial terms, discovery outcomes, or expansion milestones are publicly disclosed. There are no conventional customer revenue metrics (NRR, GRR, churn) because KoBold is pre-revenue. Adverse signals relate to ESG concerns around operations in Zambia, DRC, and Burundi."

sections:
  - id: customer-segmentation
    title: "Partner and Customer Base: Segmentation and Profile"
    body: "KoBold Metals operates a full-stack equity exploration model that does not generate conventional customer relationships. Its commercial partners fall into three distinct categories: (1) Joint venture exploration partners — mining majors BHP (Australia, nickel/copper) and Rio Tinto (Western Australia, lithium) who co-fund exploration programs and provide access to their project land packages in exchange for KoBold's technology and exploration expertise. These partners are also equity investors in KoBold, creating strategic alignment and a dual investor-partner relationship. (2) Project equity co-owners — ZCCM-IH (Zambia Consolidated Copper Mines Investment Holdings), the Zambian state copper entity, holds a stake in Mingomba Mining Ltd alongside KoBold, representing a government partner relationship with political and social license dimensions. Equinor (Norwegian state energy company) also holds both an equity investment in KoBold and an interest in the exploration partnership. (3) Government framework partners — the Government of Burundi signed a geological data digitization framework agreement with KoBold in March 2026, indicating KoBold's expansion of its data acquisition model into new African jurisdictions. A potential fourth category is the DRC opportunity: KoBold is pursuing the Manono lithium deposit in the DRC through a framework agreement with AVZ Minerals (May 2025). The 'customer' profile is therefore dominated by two major mining companies who are simultaneously financial investors, operational partners, and potential future acquirers of KoBold's mineral discoveries. No third-party, arms-length, fee-for-service customers have been publicly identified—reinforcing that KoBold's equity model creates partner relationships rather than customer relationships."
    claimRefs: [CU001, CU002, CU003, CU004, CU005, CU006, CU007]
    tableRefs: [TU001]
    figureRefs: [FU001]

  - id: adoption-trajectory
    title: "Adoption Trajectory and Partnership Deployment"
    body: "KoBold's partner adoption trajectory follows the progression of its JV deployments and the scale of partner engagement over the 2022-2026 period. The BHP partnership began in January 2022 as part of the Series B investment, making it the first major-company validation of the platform in an active exploration environment. The Rio Tinto partnership followed in 2021-2023, with less publicly disclosed activity timelines. The quality of partnership engagement has deepened over time: BHP's participation in both the Series B and Series C (July 2024) reflects continued confidence in the technology after 2+ years of JV deployment. Similarly, Equinor's participation in multiple rounds indicates repeat validation from an energy sector strategic investor deploying the platform. The Burundi government data digitization agreement (March 2026) represents a new partner type—a national government—using KoBold's data acquisition capability for public geological survey modernization. No partner attrition or partnership termination has been publicly reported for any of KoBold's active JV relationships. The Mingomba copper deposit, which is the most significant outcome of KoBold's exploration programs, was operated as a wholly-owned (with ZCCM-IH as co-owner) project rather than a JV with a mining major, demonstrating that KoBold can also operate as a standalone explorer without requiring a mining major as a discovery-stage partner. All partnership deployments are active through the most recently available evidence dates (2025-2026), consistent with an expanding rather than contracting partner base."
    claimRefs: [CU008, CU009, CU010, CU011, CU012, CU013]
    tableRefs: [TU002]
    figureRefs: [FU004]

  - id: named-customer-proof
    title: "Named Partner Proof: Evidence Quality and Production Deployment"
    body: "The quality of evidence for KoBold's named partner relationships varies by counterparty. BHP evidence quality is highest: BHP Annual Report 2024 references its investment in and partnership with KoBold, providing a primary-tier filing source that independently confirms the relationship from the partner's own disclosed financials. BHP Ventures' listing of KoBold on its portfolio page further corroborates. Rio Tinto's annual report and press releases mention the partnership, though with somewhat less specificity than BHP's disclosures. ZCCM-IH's press releases and website confirm the Mingomba Mining Ltd structure with KoBold as majority owner and ZCCM-IH as a co-holder, providing a primary-tier government partner confirmation. For Equinor, the portfolio listing on the Equinor Ventures website confirms the investment relationship. No current JV exploration program has resulted in a publicly confirmed mineral discovery other than Mingomba (which predates the JV structure). All deployments are in active exploration or early development stages, not mine production—meaning partners are funding exploration costs but have not yet received any operational returns or confirmed economic discoveries from the BHP/Rio Tinto JVs. This is consistent with the typical 3-10 year exploration timeline before a discovery is confirmed at drill stage. No adverse partner departure, JV termination, or partner dispute has been publicly reported."
    claimRefs: [CU014, CU015, CU016, CU017, CU018, CU019, CU020]
    tableRefs: [TU003, TU005]
    figureRefs: [FU002]

  - id: concentration-expansion
    title: "Concentration Risk, Contract Structure, and Expansion Potential"
    body: "KoBold faces significant partner concentration risk: substantially all of its commercial technology validation depends on two mining majors (BHP, Rio Tinto), and both are also equity investors—meaning their departure as partners would have both commercial and signaling impacts on the company's value. The dual investor-partner structure creates alignment but also concentration: if BHP or Rio Tinto independently developed comparable AI exploration capabilities, they could exit their KoBold JVs while retaining their investor positions. KoBold's addressable partner expansion universe is very large: the five largest mining companies by market cap (BHP, Rio Tinto, Glencore, Anglo American, Freeport-McMoRan) and mid-tier copper and lithium developers (Ivanhoe Mines, Barrick) would all be logical JV candidates. KoBold's ability to convert potential partners from this universe is the primary commercial growth lever, but no new major JV since the 2022-era BHP/Rio Tinto partnerships has been announced. The equity model means KoBold does not have conventional switching costs or renewal contracts; partners could theoretically exit JVs if the exploration results are disappointing. The Zambia and DRC operations create expansion potential in African critical mineral jurisdictions, with ZCCM-IH's involvement providing a template for government-sponsored partnership structures. Equinor's interest in critical mineral supply chains for the energy transition could also create additional project pipeline if Equinor directs new exploration spending through KoBold."
    claimRefs: [CU021, CU022, CU023, CU024, CU025, CU026]
    tableRefs: [TU004]
    figureRefs: [FU003]

  - id: adverse-signals
    title: "Adverse Partner Signals and ESG-Related Customer Risk"
    body: "Adverse signals in KoBold's partner and customer context center primarily on ESG and geopolitical risks rather than direct partner dissatisfaction or attrition. Global Witness has published reporting on the risks of Western technology companies entering DRC mineral exploration without robust conflict-mineral due diligence, which is directly applicable to KoBold's DRC expansion. Amnesty International has documented labor rights concerns in DRC cobalt supply chains involving artisanal and industrial mining operations. While KoBold's operations in the Zambian Copperbelt (Mingomba) have demonstrated strong community engagement (>90% Zambian workforce, $200M contributed to Zambian economy), the DRC entry carries higher ESG risk. The AVZ Minerals framework agreement for the Manono lithium deposit in DRC is pending resolution of AVZ's own legal disputes in the DRC—if AVZ cannot deliver a clear title to the asset, KoBold's DRC lithium opportunity could collapse. This represents an adverse scenario for one of KoBold's key future partner/project opportunities. No partner has publicly criticized KoBold's technology claims, performance, or ethics. Standard Investments (Series C investor) and Equinor have not publicly disclosed any partner performance concerns. African Development Bank and World Bank engagement in Zambia critical minerals provides development-finance validation of the Mingomba project's broader value in the context of the Zambia mining sector, serving as an indirect quality endorsement of KoBold's flagship partner relationship."
    claimRefs: [CU027, CU028, CU029, CU030, CU031, CU032]

