callouts:
  - id: KU001
    type: risk
    title: "Partner Concentration in Two Mining Majors Is the Primary Customer-Side Risk"
    body: "KoBold's entire commercial technology validation rests on two mining companies (BHP and Rio Tinto) who are simultaneously equity investors and JV partners. This dual role creates alignment but also concentration: if either partner exits their JV or reduces engagement, both commercial validation and investor confidence would be damaged simultaneously. No new major mining JV has been announced since 2022-2023, which—after two years of platform deployment—could indicate limited expansion of the partner base or simply reflects normal long-cycle partnership development times."
    claimRefs: [CU021, CU022, CU023]

  - id: KU002
    type: strength
    title: "BHP Annual Report Confirmation Is Primary-Tier Evidence"
    body: "The BHP Annual Report 2024's explicit reference to its investment in and partnership with KoBold provides the highest-quality available evidence of the commercial relationship. Filing-level confirmation from a $160B mining company is qualitatively different from press releases or media reports, as it reflects a financial disclosure obligation that requires accuracy. Similarly, ZCCM-IH's public confirmation of the Mingomba Mining Ltd structure provides government-entity corroboration of KoBold's flagship project."
    claimRefs: [CU014, CU015, CU016]

  - id: KU003
    type: insight
    title: "No Conventional Customer Metrics Are Applicable — Alternative KPIs Required"
    body: "Because KoBold is pre-revenue and uses a JV equity model rather than selling products or services, conventional customer metrics (NRR, GRR, churn, CAC, CLV) do not apply. Alternative KPIs for KoBold's 'customer quality' include: (1) active JV partner count and mining major tier; (2) exploration program size and capital co-committed by partners; (3) geographic and commodity diversification of the JV portfolio; (4) post-discovery partner behavior (did BHP/Rio Tinto increase their engagement after early platform results?); (5) partner re-investment at Series C as the strongest retention signal."
    claimRefs: [CU001, CU008, CU022, CU026]

  - id: KU004
    type: recommendation
    title: "Diligence Priority: Request JV Financial Terms and Partner Performance Reviews"
    body: "Key diligence asks for the customer chapter: (1) JV agreement terms including earn-in economics, data rights, and termination provisions for both BHP and Rio Tinto JVs; (2) whether BHP or Rio Tinto have conducted internal performance reviews of KoBold's platform and are prepared to share results; (3) ZCCM-IH's equity percentage in Mingomba Mining Ltd and any shareholder agreement terms; (4) the pipeline of potential new JV partners and KoBold's partner outreach timeline; (5) the status of the AVZ Minerals DRC Manono framework agreement and its legal pathway."
    claimRefs: [CU018, CU019, CU020, CU029]

