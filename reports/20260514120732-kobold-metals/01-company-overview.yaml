  name: KoBold Metals

chapter:
  number: 1
  title: "Company Overview"
  summary: "KoBold Metals is an AI-powered mineral exploration and development company founded in 2018 in San Francisco, CA, that combines proprietary sensors, machine learning, and geoscience expertise to discover critical mineral deposits globally. The company has raised approximately $692M+ including a $537M Series C (July 2024) at an implied ~$2.1B valuation, and counts Breakthrough Energy Ventures, Andreessen Horowitz, T. Rowe Price, BHP Ventures, and Equinor among its backers. Its flagship Mingomba copper deposit in Zambia is one of the largest undeveloped copper discoveries in the world."

sections:
  - id: identity-and-mission
    title: "Identity, Mission, and Business Model"
    body: "KoBold Metals describes itself as a 'scientific mineral exploration and development company focused on critical minerals.' Founded in 2018 and headquartered in San Francisco, CA, the company was established to address a widening supply gap for critical minerals including copper, cobalt, lithium, and nickel—the commodities essential for EV batteries, renewable energy infrastructure, and the broader energy transition. The company's core thesis is that the mining industry's decades-old approach to exploration is systematically producing fewer discoveries per dollar invested, and that a full-stack technological approach combining AI, novel hardware sensors, and world-class geoscientists can reverse this trend. KoBold's business model is not a software-as-a-service or consulting model. Instead, it acts as a full-stack explorer and developer that retains equity stakes in the mineral resources it discovers, either wholly owned or through joint ventures with established mining majors. This means KoBold assumes exploration risk in exchange for ownership in the discovered deposits. The company is also expanding into mine development following its Mingomba copper discovery in Zambia, positioning itself along a broader slice of the mining value chain from exploration through production. KoBold never sells its technology as a standalone product; the technology is proprietary and deployed exclusively on KoBold's own projects and joint ventures, creating a deep moat around its capabilities. This full-stack approach differentiates KoBold from pure technology vendors and from traditional exploration companies."
    claimRefs: [CO001, CO002, CO003, CO004, CO005, CO006]
    tableRefs: [TO001]

  - id: leadership-and-governance
    title: "Founders, Leadership Team, and Governance"
    body: "KoBold Metals was co-founded in 2018 by Kurt House (CEO), Josh Goldman (now President), and Jeff Jurinak. Kurt House holds a PhD and prior experience in energy sectors including carbon capture; his scientific background is central to the company's credibility with mining partners. Josh Goldman (PhD) serves as President and oversees exploration strategy, while Jeff Jurinak co-founded but has a less prominent current public role. A fourth co-founder, Jared Lacob, is also associated with the founding team. The executive team has expanded significantly from the founding trio. Key global leaders include Daniel Enderton (PhD, COO), Sandy Alexander (JD/MPP, Chief Legal and External Affairs Officer), Tom Hunt (PhD, CTO), Clara Kridler (Chief People Officer), Heather Friesen (VP Field Operations), Lucas Hughes (VP Finance), and Traci Paramore (Finance). The Zambia operations are led by Mfikeyi Makayi, who serves as CEO of KoBold Metals Africa and leads a team that is >90% Zambian national. The leadership team's blend of geoscientists (PhDs with field expertise), data scientists, and engineers reflects the company's 'full-stack' multidisciplinary identity. Key-person risk is concentrated in Kurt House as the public face, scientific spokesperson, and CEO. The company culture emphasizes Bayesian decision-making, collaborative multidisciplinary teams, and scientific integrity. Board composition is not publicly disclosed, though the strategic investor roster (BHP, Equinor, Breakthrough Energy Ventures) likely gives those parties board observation or representation rights."
    claimRefs: [CO007, CO008, CO009, CO010, CO011, CO012, CO013]
    tableRefs: [TO002]
    figureRefs: [FO001]

  - id: funding-and-investors
    title: "Funding History, Valuation, and Investor Base"
    body: "KoBold Metals has raised approximately $692M+ in total equity financing as of mid-2024. The company completed a $537M Series C round in July 2024, which implies a valuation of approximately $2.1B based on multiple credible media reports. The investor base is unusually strong for a pre-revenue mineral exploration company. Breakthrough Energy Ventures, the climate fund co-founded by Bill Gates, is a prominent early investor. Andreessen Horowitz led the Series B round (~$192M in January 2022). T. Rowe Price, Fidelity, and Standard Investments are notable institutional investors suggesting growing crossover appeal to traditional asset managers. BHP Ventures (the venture arm of BHP, one of the world's largest mining companies) and Equinor Ventures (Norway's state oil company's venture arm) are strategic investors that provide both capital and operational credibility. XN and B Capital have also participated. The strategic investor composition is particularly significant: BHP and Equinor are not just financial backers—they are industry incumbents that have validated KoBold's technology by deploying it on their own exploration assets. The Series C marked a step-change in scale, with the $537M dwarfing all prior rounds combined. The capital is expected to fund development of the Mingomba copper mine in Zambia and accelerate exploration globally. KoBold has not publicly disclosed revenue figures, suggesting it remains pre-revenue or in early revenue stages. The company has no public filing obligation as it remains a private Delaware corporation."
    claimRefs: [CO014, CO015, CO016, CO017, CO018, CO019, CO020]
    tableRefs: [TO003]
    figureRefs: [FO002]

  - id: operations-and-milestones
    title: "Projects, Operations, and Key Milestones"
    body: "KoBold's most significant milestone is the discovery and development of the Mingomba copper-cobalt deposit in Zambia, which the company describes as 'one of the best copper deposits ever found.' Mingomba is located on the Copperbelt and was formerly known as the Lubambe Extension Project. KoBold acquired a majority stake through a $150M deal in December 2022—paying $115M to EMR Capital (then the majority owner of Lubambe Copper Mine) and committing an additional $35M in exploration work. The deposit is claimed to be the world's highest-grade undeveloped large copper deposit. Through subsidiary Mingomba Mining Ltd (in which ZCCM-IH, the Zambian state copper miner, also holds a stake), KoBold has built a team of 200+ Zambian employees and contributed over $200M to the Zambian economy. Beyond Zambia, KoBold operates exploration projects in Quebec, Canada (targeting lithium, nickel, cobalt, and copper across three permit areas: Baie James, Côte-Nord, Nunavik), Finland (exploration license area), and the DRC. In May 2025, KoBold signed a framework agreement with AVZ Minerals to potentially acquire AVZ's interests in the Manono lithium deposit in the DRC—one of the world's largest known hard-rock lithium deposits. In March 2026, KoBold signed an agreement with Burundi to digitize geological data, signaling African geographic expansion. As of the news page (May 2026), Bloomberg also reported that KoBold is conducting what it calls the world's largest Congo lithium exploration campaign. Partnerships with BHP (Australia, nickel/copper) and Rio Tinto (lithium, Western Australia) further extend KoBold's project footprint through joint ventures."
    claimRefs: [CO021, CO022, CO023, CO024, CO025, CO026, CO027, CO028]
    tableRefs: [TO004]
    figureRefs: [FO003]

  - id: adverse-and-gaps
    title: "Adverse Factors, Evidence Gaps, and Diligence Risks"
    body: "KoBold's adverse risk profile for a company overview chapter centers on structural diligence limitations common to private companies, plus a number of substantive concerns. First, as a private company, KoBold does not publish audited financials, making it impossible to verify burn rate, revenue status, operating losses, or cash position. The $537M Series C suggests substantial operating expenses, but no public data confirms what fraction is earmarked for mine development versus AI R&D. Second, there is an unresolved question about whether KoBold's AI-led exploration approach actually outperforms traditional geophysics on a risk-adjusted basis; no peer-reviewed third-party benchmarks have been published comparing KoBold's hit rate to industry norms. Third, the Mingomba acquisition structure (KoBold bought into an existing known project, not a greenfield AI-led discovery in a blind area) means the flagship proof-of-concept may be less 'AI-first' than the narrative implies. Fourth, geopolitical and operational risks in Zambia, DRC, and Burundi are material given mining sector volatility in these jurisdictions. Fifth, early investor incentives (strategic investors like BHP getting first look at discoveries) could create conflicts of interest with KoBold equity holders. Sixth, critical founder dependency: Kurt House is the primary scientific spokesperson and CEO; his departure would likely trigger investor concern. The board composition, equity structure, voting rights, and secondary market activity are all undisclosed, which is normal for a Series C-stage private company but limits diligence depth."
    claimRefs: [CO029, CO030, CO031, CO032, CO033]

