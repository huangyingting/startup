summary:
  headline: >-
    KoBold Metals 已搭起全球商业验证最充分的 AI 矿产勘探平台，BHP 和 Rio Tinto 的合资伙伴关系给了最强外部背书；公司还握有 Mingomba
    铜钴矿床，这是全球品位最高的未开发铜项目之一。按基准铜价看，$2.1B Series C 估值大体站得住，但这笔投资需要耐心资本（10-15 年周期），要承受高于平均的地缘政治风险（Zambia/DRC），也依赖尚未验证的 AI
    表现溢价。建议：有条件持有——等待 Mingomba 可融资可行性研究，把它作为第一个重大去风险催化剂。
