callouts:
  - id: KE001
    type: risk
    title: "No Independent Benchmark Validates AI Platform Performance"
    body: "The most significant technology diligence gap for KoBold is the absence of any independent peer-reviewed or third-party benchmark comparing the AI platform's mineral discovery success rate against traditional exploration methods. KoBold's JV partners (BHP, Rio Tinto) have not published comparative performance data, and the Mingomba deposit was in a historically known mineralized belt. Until independent benchmarks are published or multiple AI-led discoveries in greenfield areas are confirmed, the platform's incremental performance advantage over traditional geophysics remains unverified."
    claimRefs: [CE009, CE024, CE030]

  - id: KE002
    type: strength
    title: "Dual Hardware-Software Moat Is Structurally Hard to Replicate"
    body: "Unlike pure-software AI exploration vendors, KoBold's combination of proprietary sensor hardware and a proprietary ML platform creates a dual moat. Replicating only the algorithmic approach without the sensor data would produce inferior training data; replicating only the sensors without the AI synthesis capability would yield raw geophysics without intelligent target generation. The integrated system is substantially more defensible than either component alone, particularly given the compounding data advantage from deploying across multiple projects and geologies."
    claimRefs: [CE005, CE017, CE021, CE027]

  - id: KE003
    type: insight
    title: "Platform Deployment on BHP and Rio Tinto Assets Provides Commercial Validation"
    body: "The fact that BHP and Rio Tinto—two of the world's top five mining companies with extensive internal exploration capabilities—have chosen to partner with and co-invest in KoBold rather than developing equivalent technology internally is a strong market signal. Mining majors have the financial resources to build internal AI exploration teams; their choice to partner with KoBold implies they believe KoBold's integrated platform exceeds what they could build in a comparable timeframe. This commercial validation is arguably more meaningful than peer-reviewed academic benchmarks for a practical technology business."
    claimRefs: [CE013, CE014, CE022, CE011]

  - id: KE004
    type: recommendation
    title: "Diligence Priority: Request Platform Architecture Review and Sensor Benchmarks"
    body: "Any diligence investor should request: (1) an architecture briefing covering the AI platform's training data sources, model update frequency, and validation methodology; (2) sensor performance specifications and comparison against commercial alternatives; (3) a track record of AI-generated targets drilled vs actual mineralization results across all JV projects; (4) a freedom-to-operate analysis of the patent portfolio relative to prior art in geophysical sensing and ML. These data points are necessary to independently assess the depth and durability of the technology moat."
    claimRefs: [CE009, CE019, CE029, CE030]

