callouts:
  - id: KI001
    type: risk
    title: "No Audited Financial Statements Available"
    body: "As a private company, KoBold Metals has no obligation to publish audited financials. All financial analysis in this chapter is based on media reports, SEC Form D filings, press releases, and industry inference. Burn rate, operating margins, cash position, and detailed capital allocation are unknown. Any secondary investment decision requires a data room with audited accounts."
    claimRefs: [CI001, CI021, CI026]

  - id: KI002
    type: insight
    title: "T. Rowe Price + Fidelity Crossover Suggests IPO Path"
    body: "The presence of T. Rowe Price and Fidelity in the Series C is an important signal. These institutional fund managers typically invest in late-stage private companies that are on a clear path to public markets within 3-5 years. Their participation suggests KoBold's investor base is positioning for an IPO or major liquidity event, likely contingent on Mingomba mine development progress."
    claimRefs: [CI012, CI013, CI014]

  - id: KI003
    type: risk
    title: "Mine Development Capital Gap: $1-5B Beyond KoBold's Balance Sheet"
    body: "KoBold cannot self-fund the construction of Mingomba. Industry estimates for developing a copper deposit of Mingomba's described scale typically require $1-5 billion in mine construction capital. This creates a structural dependency on either a major mining company taking on the construction capex through a JV expansion, project debt finance, or a royalty/streaming deal. Until this capital structure is resolved, Mingomba's development timeline and KoBold's equity dilution risk remain open questions."
    claimRefs: [CI022, CI025, CI026]

