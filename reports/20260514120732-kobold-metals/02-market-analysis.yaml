callouts:
  - title: "Structural Copper Deficit Approaching"
    body: "The UN Trade and Development body warned in May 2025 that copper shortages could slow the energy transition, estimating $250B in investment and 80+ new mines are needed. KoBold's Mingomba deposit — described as one of the world's highest-grade undeveloped copper deposits — sits precisely in this gap."
    calloutType: strength
    claimRefs: [CM011, CM009]

  - title: "TAM Unprovable Without Proprietary Data"
    body: "No publicly accessible source provides an authoritative market size for AI-powered mineral exploration as a standalone category. S&P Global exploration budget data is paywalled. Diligence should not rely on AI-in-mining market research reports that conflate exploration, operations, and logistics."
    calloutType: risk
    claimRefs: [CM037, CM039]

  - title: "Declining Ore Grade Validates AI Exploration Thesis"
    body: "Average copper ore grades have declined significantly over the past century as the most accessible deposits were depleted. AI-powered exploration that can identify buried higher-grade deposits is structurally more valuable as easily-found surface deposits become scarcer."
    calloutType: insight
    claimRefs: [CM029]

  - title: "DRC ESG Risk Is Industry-Wide, Not KoBold-Specific"
    body: "Amnesty International documented child labor and human rights abuses in DRC artisanal cobalt mining in 2016. While KoBold operates industrial exploration, not artisanal mining, operating in the DRC creates reputational exposure by proximity. KoBold's Ethics page and responsible sourcing commitments should be stress-tested."
    calloutType: risk
    claimRefs: [CM034]

  - title: "Patient Capital Required"
    body: "Mine development timelines of 16-20 years from discovery to production mean that even KoBold's most advanced current asset (Mingomba, acquired 2022) may not reach production until the mid-to-late 2030s. This requires investor capital with a 15-25 year horizon."
    calloutType: risk
    claimRefs: [CM030, CM036]


