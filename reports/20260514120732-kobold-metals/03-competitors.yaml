callouts:
  - id: KP001
    type: risk
    title: "BHP: Investor AND Competitor"
    body: "BHP Ventures is both a financial investor in KoBold and a JV exploration partner in Australia. This dual role creates a structural conflict: BHP has privileged access to KoBold's AI-targeting outputs on their shared JV projects, which could inform BHP's own internal exploration programs. If BHP internalizes KoBold's methods through JV data exposure, it weakens one of KoBold's key competitive advantages."
    claimRefs: [CP013, CP016, CP027]

  - id: KP002
    type: insight
    title: "No Pure-Play AI Exploration Comp at KoBold's Scale"
    body: "The absence of a direct comparable company that combines AI-first exploration with equity ownership of a world-class development asset means KoBold lacks peer validation for its combined model. Goldspot Discoveries (TSX-V, ~$50-100M market cap) is the only listed AI exploration peer, but operates at 1/20th the implied scale. This lack of comparables makes competitive benchmarking challenging and valuation premiums harder to justify to traditional mining investors."
    claimRefs: [CP001, CP007, CP008, CP009]

  - id: KP003
    type: insight
    title: "Exploration Productivity Decline: Industry Context"
    body: "The global mining industry's exploration-to-discovery productivity has declined by approximately 80% since the 1990s — major deposits found per dollar of exploration spend have fallen dramatically. This structural trend is the core market problem KoBold claims to solve with AI-augmented targeting, and is the fundamental competitive tailwind driving interest from mining majors in AI exploration partnerships."
    claimRefs: [CP003, CP004, CP015]

