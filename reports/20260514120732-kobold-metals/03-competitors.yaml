  claims:
    - id: CP001
      statement: "KoBold Metals operates in a nascent AI-driven mineral exploration market with no exact peers at its combined scale of technology maturity and asset development; the company's full-stack equity model and exclusive technology deployment are primary competitive differentiators."
      type: third-party-reported
      topic: "competitive-landscape"
      sourceRefs: [SP001, SP005, SP010]
      confidence: high
      freshness: current
      answersQuestionRefs: [QP001]

    - id: CP002
      statement: "KoBold competes across four competitive vectors: direct AI/tech exploration peers, incumbent mining majors, traditional exploration service providers, and adjacent substitutes including satellite remote sensing and government geological surveys."
      type: inferred
      topic: "competitive-landscape"
      sourceRefs: [SP005, SP018]
      confidence: medium
      freshness: current
      answersQuestionRefs: [QP001]

    - id: CP003
      statement: "Global mining industry exploration productivity — discoveries per dollar of exploration spend — has declined significantly since the 1990s, creating the market opportunity KoBold's AI approach targets."
      type: third-party-reported
      topic: "competitive-landscape"
      sourceRefs: [SP027, SP028, SP029]
      confidence: high
      freshness: current
      answersQuestionRefs: [QP008]

    - id: CP004
      statement: "Major mining companies spent collectively over $10 billion per year on mineral exploration in recent years yet the rate of world-class deposit discoveries has not kept pace, supporting KoBold's thesis of diminishing returns from traditional exploration methods."
      type: third-party-reported
      topic: "competitive-landscape"
      sourceRefs: [SP028, SP030]
      confidence: medium
      freshness: current
      answersQuestionRefs: [QP008]

    - id: CP005
      statement: "KoBold does not license its AI technology to third parties; instead, it deploys its platform exclusively on its own and JV exploration programs, retaining equity stakes in mineral discoveries."
      type: third-party-reported
      topic: "competitive-landscape"
      sourceRefs: [SP001, SP005]
      confidence: high
      freshness: current
      answersQuestionRefs: [QP001, QP013]

    - id: CP006
      statement: "Earth AI (formerly known as Unearthed Solutions) is a direct AI exploration peer that applies machine learning to mineral targeting but operates on a technology licensing/advisory model rather than KoBold's equity-retention approach, and has raised approximately $15M in its Series B."
      type: third-party-reported
      topic: "direct-peers"
      sourceRefs: [SP002, SP010]
      confidence: medium
      freshness: current
      answersQuestionRefs: [QP002]

    - id: CP007
      statement: "Goldspot Discoveries (TSX-V: SPOT), a Montreal-based AI exploration company, offers a software platform for mineral targeting to junior miners and is publicly listed with a market capitalization of approximately $50-100M, far smaller than KoBold's implied ~$2.1B valuation."
      type: third-party-reported
      topic: "direct-peers"
      sourceRefs: [SP003, SP025]
      confidence: medium
      freshness: current
      answersQuestionRefs: [QP003]

    - id: CP008
      statement: "Getech Group (AIM: GTC) is a UK-listed geoscience data and AI company with a market cap of approximately £20M; its historical focus on oil and gas exploration limits its immediate competitive threat in critical minerals, though the company is pivoting toward mining applications."
      type: third-party-reported
      topic: "direct-peers"
      sourceRefs: [SP004, SP010]
      confidence: medium
      freshness: current
      answersQuestionRefs: [QP004]

    - id: CP009
      statement: "Xcalibur Multiphysics provides airborne geophysical survey services with AI-augmented interpretation but does not retain mineral equity, making its business model fundamentally different from KoBold's and thus a limited direct competitor."
      type: third-party-reported
      topic: "direct-peers"
      sourceRefs: [SP012, SP005]
      confidence: medium
      freshness: current
      answersQuestionRefs: [QP005]

    - id: CP010
      statement: "No direct AI exploration peer to KoBold has publicly announced a world-class mineral discovery comparable to the Mingomba copper-cobalt deposit in Zambia, leaving KoBold as the only AI-first exploration company with a major development-stage asset."
      type: inferred
      topic: "direct-peers"
      sourceRefs: [SP001, SP010, SP018]
      confidence: medium
      freshness: current
      answersQuestionRefs: [QP018]

    - id: CP011
      statement: "The aggregate funding raised by all direct AI exploration peers (Earth AI ~$15M, Goldspot market cap ~$50-100M, Getech market cap ~£20M) is less than 5% of KoBold's total raised capital of approximately $692M, highlighting KoBold's substantial financial advantage in this segment."
