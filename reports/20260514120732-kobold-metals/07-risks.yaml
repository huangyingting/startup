callouts:
  - id: KR001
    type: risk
    title: "Mine Construction Capital Gap Is the Single Largest Financial Risk"
    body: "Developing Mingomba from current exploration/feasibility stage to mine production requires an estimated $1-5B+ in mine construction capital — far beyond KoBold's current balance sheet. Until a clear construction financing structure (JV expansion with BHP, project debt, streaming deal, or equity raise) is announced, this risk remains unresolved. The capital gap is known and expected at this stage, but its resolution timeline and dilution implications for existing equity holders are unknown. Industry experience (Ivanhoe Mines at Kamoa-Kakula) suggests this financing will require 5-8 years of pre-production investment from a major capital provider."
    claimRefs: [CR003, CR006, CR030]

  - id: KR002
    type: risk
    title: "Zambia and DRC Geopolitical Risk Is the Most Poorly Priced Risk in the AI Narrative"
    body: "KoBold's AI technology narrative tends to dominate investor coverage, but the company's fundamental risk profile is that of a mining company in politically complex African jurisdictions. Zambia has changed its royalty framework multiple times in 10 years; the DRC is rated one of the world's most governance-challenged countries. No amount of AI sophistication can hedge against a Zambian government decision to revise mining royalties or a DRC government decision to revoke Manono mine rights. Investors underwriting the $2.1B valuation should ensure this geopolitical risk is explicitly priced — not discounted because of the technology narrative."
    claimRefs: [CR015, CR016, CR017, CR019]

  - id: KR003
    type: insight
    title: "The Absence of Published Performance Benchmarks Is a Risk in Itself"
    body: "KoBold's AI exploration performance has never been independently benchmarked. No peer-reviewed study compares KoBold's mineral discovery success rate against a traditional-geophysics baseline. No regulatory filing describes drill success percentages. No partner (BHP, Rio Tinto) has published discovery outcomes from the JV programs. In the absence of this evidence, investors are pricing an AI technology premium based on the narrative rather than the data — a structurally elevated risk. The Mingomba discovery, while real, was in a known mineralized belt and does not constitute a fully blind AI-first discovery proof."
    claimRefs: [CR007, CR008, CR033]

  - id: KR004
    type: recommendation
    title: "Kill Criteria and Monitoring Indicators"
    body: "Thesis-break triggers requiring immediate diligence reassessment: (1) BHP or Rio Tinto publicly exits a JV without a replacement partner — loss of commercial validation; (2) Zambia imposes royalty rates >15% on Mingomba — changes mine economics materially; (3) Copper price below $7,000/tonne for 12+ consecutive months — destroys construction financing case; (4) CTO Tom Hunt confirmed departure — AI platform continuity risk; (5) Adverse Global Witness or Amnesty International report specifically naming KoBold in conflict mineral violations — ESG narrative collapse. Monitor: LME copper price monthly; Zambia government mining policy statements; KoBold press releases for Mingomba BFS announcement; AVZ Minerals ASX filings for Manono legal resolution."
    claimRefs: [CR030, CR031, CR032, CR033, CR034]

