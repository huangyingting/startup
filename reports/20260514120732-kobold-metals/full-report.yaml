  - number: 8
    title: Valuation
    sections:
      - number: '8.1'
        title: Investment Thesis and Anti-Thesis
        blocks:
          - type: paragraph
            body: >-
              Bull thesis: KoBold has built a proprietary AI-driven mineral exploration platform that uses Bayesian
              inference, novel EM/gravity sensors, and a continuously growing global geophysical dataset to identify
              copper and critical mineral deposits at dramatically lower cost and time than traditional exploration. The
              discovery of the Mingomba copper-cobalt deposit in Zambia — confirmed as one of the world's highest-grade
              undeveloped copper deposits — provides direct evidence that the technology works. Mingomba's Indicated
              Resource of 247 Mt at 2.79% Cu validates both the geological significance and the technical team's
              capability. The platform has been commercially adopted by BHP and Rio Tinto as JV partners, providing a
              commercial validation signal from the world's two largest mining companies. The fundamental demand case is
              intact: CRU Group, Wood Mackenzie, and the IEA all project a multi-million tonne copper supply deficit by
              2030-2035 driven by EV and grid electrification demand, with no easy substitutes for copper in these
              applications. Investors backing KoBold are paying an exploration-stage premium but receiving an option on
              what could become a $5-15B company at first production. Bear thesis / anti-thesis: The company is
              pre-revenue and pre-production, with an 8-12 year timeline to first cash from Mingomba — longer than most
              VC fund cycles. The $2.1B valuation requires a very aggressive set of assumptions about Mingomba's
              eventual NPV, AI platform terminal value, and portfolio build-out. The AI performance has never been
              independently benchmarked; the Mingomba discovery occurred in a historically known mineralized belt. Mine
              construction capital requirements ($1-5B+) far exceed KoBold's current balance sheet, creating structural
              execution risk. Geopolitical concentration in Zambia, DRC, and Burundi adds a risk premium that is
              difficult to hedge. The cobalt by-product credit that made early Mingomba economics attractive has been
              structurally impaired by the LFP battery chemistry shift. A fair bear-case scenario implies KoBold is
              worth $0.8-1.2B as a pure exploration-stage company without the AI premium.
