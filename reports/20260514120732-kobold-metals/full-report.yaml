              traded, but the BHP/Rio Tinto JV commercial validation argues for at least a 1.5-2x technology premium
              over pure NAV. Exit readiness: KoBold is not IPO-ready at current stage — pre-revenue, pre-production
              companies cannot achieve price discovery in public markets without revenue or a production decision. The
              most likely liquidity events are: (a) Strategic acquisition by a mining major seeking both the Mingomba
