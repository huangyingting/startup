  - number: 3
    title: Competitors
    sections:
      - number: '3.1'
        title: Competitive Landscape Overview
        blocks:
          - type: paragraph
            body: >-
              KoBold Metals competes across four distinct competitive vectors: (1) Direct AI/technology-first
              exploration peers — a small set of well-funded startups applying ML and novel sensors to mineral
              discovery; (2) Incumbent mining majors — BHP, Rio Tinto, Glencore, Barrick, Newmont, and Freeport-McMoRan,
              which have their own exploration R&D programs and internal data science teams; (3) Traditional exploration
              service providers — geological consultancies such as SRK Consulting, Golder Associates (WSP), and
              geophysical contractors such as CGG and Fugro; (4) Adjacent substitutes — satellite remote-sensing
              companies (Satellogic, Planet Labs) and government geological surveys (USGS, BGS, NRCan) that provide
              public geoscience data at low or no cost. KoBold's competitive advantage rests on the combination of its
              proprietary AI platform (which synthesizes legacy and novel sensor data), its in-house hardware sensor
              capability, its world-class geoscience team, and its full-stack equity model that creates high-stakes
              alignment between technology development and mineral discovery outcomes. Critically, KoBold does not
              license its technology, which means it does not compete with exploration service providers on a
              fee-for-service basis — rather, it competes for access to mineral rights, talented geoscientists, and
              partnership deals with mining majors.
