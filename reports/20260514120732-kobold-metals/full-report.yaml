      - number: '5.2'
        title: Product Offering, Sensor Hardware, and Value Delivery to Partners
        blocks:
          - type: paragraph
            body: >-
              KoBold delivers value to JV partners (BHP, Rio Tinto) by generating high-probability drill targets and
              managing the entire data synthesis workflow—replacing or augmenting internal exploration teams with a
              technology-driven targeting process that promises faster and cheaper identification of viable mineralized
              zones. The company's sensor platform includes novel airborne and ground-based electromagnetic sensors
              capable of detecting conductive ore bodies at depth with resolution that the company claims surpasses
              standard industry tools; complementary gravity sensors detect density anomalies associated with sulfide
              and oxide mineralization. BHP's partnership for nickel and copper exploration in Western Australia
              represents a commercial deployment of the full platform stack in an active, funded exploration program,
              with BHP providing both financial co-investment and access to legacy data from BHP's exploration
              databases. Rio Tinto's partnership for lithium exploration in Western Australia (near the Winu project
              area) extends the platform deployment to a different commodity and geological environment, validating the
              platform's cross-commodity applicability. KoBold's technology value chain encompasses four integrated
              stages: (1) data aggregation and digitization of legacy geoscience records; (2) AI model training and
              probabilistic inference using integrated data streams; (3) geophysical survey execution with proprietary
              sensors to fill data gaps; (4) target generation, drill-hole location recommendation, and post-drill
              result assimilation into updated models. The Mingomba copper deposit discovery in Zambia is attributed by
              the company to its AI platform reanalyzing legacy Copperbelt geoscience data, though the area was already
              a known geological province—suggesting the technology's role was in prioritization and confidence-building
              rather than discovery in a blank area. The full-stack equity model means KoBold's return on technology
              investment is realized as equity ownership in mineral discoveries rather than licensing fees, making its
              product essentially 'mineral discovery as a service to itself.'
