  - number: 5
    title: Product & Technology
    sections:
      - number: '5.1'
        title: Core Technology Platform and Architecture
        blocks:
          - type: paragraph
            body: >-
              KoBold's core platform is a proprietary AI/ML system that ingests multiple streams of geoscience
              data—including historical geological maps, geochemical surveys, satellite imagery, airborne geophysics,
              and the company's own novel sensor outputs—and synthesizes them through Bayesian inference to generate
              probabilistic mineral deposit maps. The Bayesian framework is central to the architecture: rather than
              producing a single predicted target, the system quantifies uncertainty in subsurface mineral predictions,
              generating probability distributions for deposit occurrence that allow exploration teams to prioritize
              drilling on the highest-probability targets. CTO Tom Hunt (PhD) leads the technical team, which comprises
              data scientists, geoscientists, and hardware engineers working in an integrated 'full-stack' model. The
              platform ingests legacy geoscience data from national geological surveys (USGS, Geological Survey of
              Canada, Zambia Geological Survey), academic repositories, and historical exploration databases that
              previously existed only in analog or disconnected digital form. Proprietary electromagnetic (EM) sensors
              and gravity sensors provide novel data inputs that are distinct from commercially available survey
              equipment, enabling measurement of subsurface electrical conductivity and density anomalies at depths and
              resolutions not achievable with standard tools. The AI architecture draws on published techniques in
              Bayesian deep learning, Gaussian process regression, and geospatial machine learning to build a
              multi-modal geoscience intelligence system. The platform is not offered as a product or licensed to third
              parties; all outputs are used exclusively to identify and prioritize KoBold's own mineral targets.
            claimRefs:
