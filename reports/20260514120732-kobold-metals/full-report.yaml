  - id: TE003
    title: AI/ML Methods and Data Pipeline
    columns:
      - Method
      - Application
      - Input Data
      - Output
      - Advantage over Traditional
    rows:
      - - Bayesian Inference (probabilistic graphical models)
        - Core deposit probability estimation; uncertainty quantification
        - Multi-modal geoscience data streams
        - Probability distribution over mineral deposit occurrence at each location
        - Quantifies uncertainty; enables principled prioritization vs binary expert-driven decision
      - - Gaussian Process Regression
        - Spatial interpolation of geochemical and geophysical measurements between sample points
        - Sparse geochemical and geophysical point samples
        - Continuous spatial fields with uncertainty bounds
        - Uncertainty-aware interpolation vs deterministic kriging; honors geoscience constraints
      - - Convolutional Neural Networks (CNN) / Geospatial Deep Learning
        - Pattern recognition in 2D/3D geophysical grids and remote sensing imagery
        - Gridded EM, gravity, magnetic, and satellite raster data
        - Anomaly detection, feature classification, prospectivity maps
        - Automated feature detection at scale vs manual interpretation; reproducible
      - - Ensemble Methods / Gradient Boosting
        - Integrating predictions from multiple sub-models; feature importance scoring
        - All processed geoscience features
        - Ensemble probabilistic score; feature attribution for geoscientist review
        - Reduces overfitting vs single model; identifies most informative data streams
      - - Transfer Learning
        - Adapting models trained on data-rich terranes (Zambia Copperbelt) to new geological environments
        - Pre-trained model weights; new project data
        - Adapted models requiring less training data for new areas
        - Reduces cold-start data requirement for greenfield exploration in new regions
      - - Data Normalization and Harmonization Pipeline
        - Standardizing legacy geological data across different vintages, map projections, and measurement conventions
        - Raw legacy digital and scanned analog geoscience records
        - Harmonized normalized data ready for ML ingestion
        - Unlocks decades of legacy data that was previously non-machine-readable; creates data moat
