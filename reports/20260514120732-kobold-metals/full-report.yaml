              proprietary ML platform creates a dual moat. Replicating only the algorithmic approach without the sensor
              data would produce inferior training data; replicating only the sensors without the AI synthesis
              capability would yield raw geophysics without intelligent target generation. The integrated system is
              substantially more defensible than either component alone, particularly given the compounding data
              advantage from deploying across multiple projects and geologies.
