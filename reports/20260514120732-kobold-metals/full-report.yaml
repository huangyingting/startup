            body: >-
              The valuation range for KoBold is unusually wide because it spans from an exploration-stage technology
              company (bear case) to a world-class mine developer with an AI platform terminal value (bull case). Bull
              case ($4-8B by 2028-2030): Mingomba BFS is published with NPV of $5-10B; construction financing is
              announced (BHP providing $2-3B equity, plus project debt); copper price sustains above $10,000/tonne; AI
              platform licenses to a third mining major or achieves independent performance validation; portfolio
              generates 1-2 additional world-class discoveries. This would justify a 2-4x return on Series C price. Base
              case ($2-4B by 2028-2030): Mingomba BFS published with base-case NPV; construction financing announced but
              with meaningful equity dilution for KoBold; copper at $8,500-$10,000/tonne; no additional platform
              licensing. This represents roughly flat-to-modest-positive returns on Series C. Bear case ($0.8-1.5B by
