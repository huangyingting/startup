      - number: '2.5'
        title: Sizing Gaps and Diligence Risks
        blocks:
          - type: paragraph
            body: >
              The market analysis has several structural data gaps that diligence should address.


              No independent market sizing report defines "AI-powered critical mineral exploration" as a standalone
              category. Estimates from general market research aggregators (citing Mordor Intelligence, Allied Market
              Research) for "AI in mining" vary widely ($1-5B by 2030) and conflate vastly different use cases:
              autonomous haulage, predictive maintenance, ore sorting, and exploration modeling are all included in such
              estimates. This makes TAM benchmarking for KoBold's specific model unreliable.


              Contradictory near-term price signals complicate the SAM assessment. Lithium prices crashed ~70% in 2023
              as Chinese EV subsidies expired and short-term oversupply materialized. Nickel prices fell significantly
              due to Indonesian supply growth. These price movements could reduce exploration spending in those
              commodities near-term even as long-term demand projections remain strong. A diligence team should
              stress-test KoBold's pipeline by commodity and assess sensitivity to continued commodity price weakness.


              The authoritative annual global mining exploration budget data is published by S&P Global Market
              Intelligence (formerly SNL Mining) but is behind a full paywall. S&P Global data was not accessible during
              this research cycle. This represents a data gap that a diligence team with institutional data access
              should address directly.


              KoBold's equity-stake model has no established public comparable. Conventional mining technology companies
              (Hexagon, Trimble, 3D-P) sell software or hardware for fees. KoBold's joint venture equity model is
              analogous to a royalty company (Franco-Nevada, Wheaton Precious Metals) in that it earns a stake in the
              upside of discoveries rather than a fee for services — but none of these comps maps cleanly to KoBold's
              pre-production exploration equity model.
