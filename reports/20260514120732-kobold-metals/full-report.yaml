              CTO), Clara Kridler (Chief People Officer), Heather Friesen (VP Field Operations), Lucas Hughes (VP
              Finance), and Traci Paramore (Finance). The Zambia operations are led by Mfikeyi Makayi, who serves as CEO
              of KoBold Metals Africa and leads a team that is >90% Zambian national. The leadership team's blend of
              geoscientists (PhDs with field expertise), data scientists, and engineers reflects the company's
              'full-stack' multidisciplinary identity. Key-person risk is concentrated in Kurt House as the public face,
              scientific spokesperson, and CEO. The company culture emphasizes Bayesian decision-making, collaborative
              multidisciplinary teams, and scientific integrity. Board composition is not publicly disclosed, though the
              strategic investor roster (BHP, Equinor, Breakthrough Energy Ventures) likely gives those parties board
              observation or representation rights.
