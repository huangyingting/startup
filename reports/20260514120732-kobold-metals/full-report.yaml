              Tinto reduces JV program; no platform licensing; Zambia royalty increase. This represents a 25-60% loss on
              Series C principal. Deep-bear case ($0.3-0.6B): DRC/Zambia major political disruption; copper below
              $7,000/tonne sustained; Series D financing fails; AI platform not differentiated. This is a
