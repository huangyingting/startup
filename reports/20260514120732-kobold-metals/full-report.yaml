      - number: '1.4'
        title: Projects, Operations, and Key Milestones
        blocks:
          - type: paragraph
            body: >-
              KoBold's most significant milestone is the discovery and development of the Mingomba copper-cobalt deposit
              in Zambia, which the company describes as 'one of the best copper deposits ever found.' Mingomba is
              located on the Copperbelt and was formerly known as the Lubambe Extension Project. KoBold acquired a
              majority stake through a $150M deal in December 2022—paying $115M to EMR Capital (then the majority owner
              of Lubambe Copper Mine) and committing an additional $35M in exploration work. The deposit is claimed to
              be the world's highest-grade undeveloped large copper deposit. Through subsidiary Mingomba Mining Ltd (in
              which ZCCM-IH, the Zambian state copper miner, also holds a stake), KoBold has built a team of 200+
              Zambian employees and contributed over $200M to the Zambian economy. Beyond Zambia, KoBold operates
              exploration projects in Quebec, Canada (targeting lithium, nickel, cobalt, and copper across three permit
              areas: Baie James, Côte-Nord, Nunavik), Finland (exploration license area), and the DRC. In May 2025,
              KoBold signed a framework agreement with AVZ Minerals to potentially acquire AVZ's interests in the Manono
              lithium deposit in the DRC—one of the world's largest known hard-rock lithium deposits. In March 2026,
              KoBold signed an agreement with Burundi to digitize geological data, signaling African geographic
              expansion. As of the news page (May 2026), Bloomberg also reported that KoBold is conducting what it calls
              the world's largest Congo lithium exploration campaign. Partnerships with BHP (Australia, nickel/copper)
              and Rio Tinto (lithium, Western Australia) further extend KoBold's project footprint through joint
              ventures.
