      - number: '7.2'
        title: Market and Commodity Price Risks
        blocks:
          - type: paragraph
            body: >-
              KoBold's future financial returns depend primarily on copper and cobalt prices at the time Mingomba
              reaches production, which is estimated to be at earliest 2033-2037. Copper price risk is real but moderate
              given long-term structural demand from electrification (EVs, grid infrastructure, data centers): CRU Group
              and Wood Mackenzie both project a structural copper supply deficit from the late 2020s onward, supporting
              the long-term investment thesis. However, near-term copper price volatility in the $7,000-$10,000/tonne
              range directly affects the NPV calculations used to justify mine construction financing decisions. If
              copper prices fall below approximately $7,000/tonne for an extended period, the economics of a
              capital-intensive greenfield mine like Mingomba could deteriorate. Cobalt price risk is asymmetric and
              negative: cobalt prices fell approximately 70% from their 2022 highs to 2024 levels, significantly
              reducing the cobalt by-product credit that was embedded in early Mingomba economic projections. If cobalt
              prices remain suppressed (driven by the shift from NMC to LFP batteries), Mingomba's economics are
              materially worse than early projections. The London Metal Exchange (LME) copper price in 2025-2026 has
              been approximately $8,800-$9,500/tonne — supportive of Mingomba economics at current levels but subject to
              macroeconomic and China demand cycles. A China slowdown or a shift in EV battery chemistry away from
              copper-intensive designs would be an adverse price scenario. Lithium price volatility has also been severe
              (down 85% from 2022 highs to early 2024), affecting the Rio Tinto Western Australia lithium JV's future
              value, though copper remains KoBold's primary commodity exposure.
