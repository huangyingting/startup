              relationships. Its commercial partners fall into three distinct categories: (1) Joint venture exploration
              partners — mining majors BHP (Australia, nickel/copper) and Rio Tinto (Western Australia, lithium) who
              co-fund exploration programs and provide access to their project land packages in exchange for KoBold's
              technology and exploration expertise. These partners are also equity investors in KoBold, creating
              strategic alignment and a dual investor-partner relationship. (2) Project equity co-owners — ZCCM-IH
              (Zambia Consolidated Copper Mines Investment Holdings), the Zambian state copper entity, holds a stake in
              Mingomba Mining Ltd alongside KoBold, representing a government partner relationship with political and
              social license dimensions. Equinor (Norwegian state energy company) also holds both an equity investment
              in KoBold and an interest in the exploration partnership. (3) Government framework partners — the
              Government of Burundi signed a geological data digitization framework agreement with KoBold in March 2026,
              indicating KoBold's expansion of its data acquisition model into new African jurisdictions. A potential
              fourth category is the DRC opportunity: KoBold is pursuing the Manono lithium deposit in the DRC through a
              framework agreement with AVZ Minerals (May 2025). The 'customer' profile is therefore dominated by two
              major mining companies who are simultaneously financial investors, operational partners, and potential
              future acquirers of KoBold's mineral discoveries. No third-party, arms-length, fee-for-service customers
              have been publicly identified—reinforcing that KoBold's equity model creates partner relationships rather
