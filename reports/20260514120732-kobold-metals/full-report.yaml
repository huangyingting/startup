              KoBold's July 2024 Series C raised $537M at an implied valuation of approximately $2.1B based on published
              sources. Lead investors were T. Rowe Price and Fidelity — both major institutional asset managers with
              large-cap public equity context; their participation implies KoBold passed a public company-caliber due
              diligence process. The $2.1B valuation represents approximately 4x Mingomba's estimated current-stage
              in-ground copper value (~$450-600M for a 247 Mt resource at $7,000-8,500/tonne copper price, 60-80%
