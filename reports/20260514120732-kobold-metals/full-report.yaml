      - number: '7.3'
        title: Regulatory, Legal, and Geopolitical Risks
        blocks:
          - type: paragraph
            body: >-
              KoBold's primary regulatory and geopolitical risks are concentrated in Zambia and the DRC — two
              jurisdictions with documented histories of mining code instability, taxation changes, and political risk.
              Zambia: The Zambian government introduced a 10% royalty rate and introduced a windfall profits tax in the
              2022-2024 period as part of efforts to capture more mining revenue during commodity upswings; these tax
              provisions could significantly reduce Mingomba's economics if replicated at production stage. The 2021
              change in Zambian government (election of President Hichilema) brought a more mining-investment-friendly
              administration, but policy risk remains: any future government could reverse this stance. ZCCM-IH's stake
              in Mingomba creates a structural protection (the state has equity alignment with mine success) but also a
              governance risk (state entity may prioritize local employment or royalty revenue over shareholder value
              maximization). DRC: KoBold's DRC activities (AVZ Minerals Manono framework agreement, Bloomberg-reported
              lithium exploration) are in a jurisdiction rated by Transparency International as one of the world's most
              corruption-prone. The DRC Mining Code has been amended multiple times to increase state royalties and
              government equity stakes. CFIUS review is a potential risk if KoBold pursues US government-relevant
              critical mineral assets with its strategic investor base including Equinor (Norwegian state-owned) —
              though this risk is currently hypothetical. The OECD Conflict Minerals Due Diligence Guidelines and SEC
              Dodd-Frank Section 1502 conflict mineral reporting rules create compliance obligations for the downstream
              supply chains of minerals from Zambia, DRC, and Burundi. No current litigation against KoBold has been
              publicly identified, but the AVZ Minerals dispute (AVZ itself is in litigation over the Manono deposit)
              creates indirect legal exposure for KoBold's DRC ambitions.
