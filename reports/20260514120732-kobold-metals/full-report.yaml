      - number: '8.2'
        title: Recommendation, Confidence, and Risk Rating
        blocks:
          - type: paragraph
            body: >-
              Recommendation: Conditional Hold — maintain existing position, do not increase allocation until Mingomba
              Bankable Feasibility Study is published (expected 2026-2029). The BFS is the first major de-risking event
              that will reveal independently audited resource estimates, mining method, infrastructure requirements, and
              preliminary economics. New entrants at Series C pricing ($2.1B) face the full execution risk premium;
              existing investors from Series A/B ($100-600M implied valuations) carry embedded gains and should hold
              pending BFS. Confidence: Medium. The bull case relies on a set of unvalidated assumptions (AI performance,
              Mingomba economics, construction financing availability) that are plausible but not yet evidenced. The
              bear case is well-documented but not yet triggered. Overall risk rating: High. The combination of
              pre-production status, geopolitical concentration (Zambia/DRC), key-person dependency, technology
              performance uncertainty, and very long monetization timeline creates an above-average risk profile
              relative to comparably valued Series C companies in software or biotech. Appropriate for institutional
              investors with a 10-15 year patient capital horizon, portfolio diversification across mining/resources,
              and a specific mandate for critical mineral supply chain exposure. Not suitable for growth-stage investors
              seeking 5-year liquidity horizons. The quality of the investor base (T. Rowe Price, Fidelity, Equinor,
              Breakthrough Energy Ventures) provides comfort that KoBold has been subjected to serious institutional
              diligence, reducing the risk of catastrophic analytical failures.
