      - number: '2.3'
        title: Buyer and Segment Analysis
        blocks:
          - type: paragraph
            body: >
              KoBold Metals serves three primary buyer/partner segment types. Understanding each segment's economics,
              decision rights, and adoption triggers is essential to assessing KoBold's commercial momentum.


              **Segment 1 — Mining Majors:** Global mining companies (BHP, Rio Tinto, Glencore, Anglo American,
              Freeport-McMoRan) control the majority of global exploration spending. They have exploration budgets
              ranging from hundreds of millions to several billion dollars annually. Their decision to partner with
              KoBold is driven by: (a) pressure to replace depleting reserves, (b) declining average ore grades making
              traditional exploration less efficient, and (c) investor pressure to demonstrate capital discipline and
              ESG compliance. KoBold has secured partnerships with BHP and Rio Tinto, representing two of the world's
              top five mining companies by market capitalization. The typical value exchange is joint exploration rights
              with KoBold earning an equity stake in discoveries.


              **Segment 2 — Junior Mining Companies:** Junior miners operate on limited budgets and rely on exploration
              success to unlock capital market financing. They are a potential future customer segment for KoBold's
              technology, either as co-exploration partners or through data licensing. However, KoBold's current model
              focuses on equity partnerships with majors, not on serving juniors.


              **Segment 3 — Governments and National Resource Companies:** Zambia's ZCCM-IH, Burundi's geological
              authority, and Quebec government-linked mining entities represent state partners whose value to KoBold is
              geological data access, permit facilitation, and local partner legitimacy. Canada's critical minerals
              program (managed through Natural Resources Canada) creates a favorable regulatory environment for KoBold's
              Quebec operations.


              The buyer-to-user-to-payer structure is straightforward in KoBold's model: mining majors both pay (via
              exploration capital in joint ventures) and benefit directly (from equity in discoveries). Governments are
              enablers rather than payers in most cases. The key adoption trigger across all segments is the prospect of
              faster, higher-success-rate deposit discovery at lower capital cost per ounce or tonne of mineral found.
