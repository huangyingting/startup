      - number: '1.3'
        title: Funding History, Valuation, and Investor Base
        blocks:
          - type: paragraph
            body: >-
              KoBold Metals has raised approximately $692M+ in total equity financing as of mid-2024. The company
              completed a $537M Series C round in July 2024, which implies a valuation of approximately $2.1B based on
              multiple credible media reports. The investor base is unusually strong for a pre-revenue mineral
              exploration company. Breakthrough Energy Ventures, the climate fund co-founded by Bill Gates, is a
              prominent early investor. Andreessen Horowitz led the Series B round (~$192M in January 2022). T. Rowe
              Price, Fidelity, and Standard Investments are notable institutional investors suggesting growing crossover
              appeal to traditional asset managers. BHP Ventures (the venture arm of BHP, one of the world's largest
              mining companies) and Equinor Ventures (Norway's state oil company's venture arm) are strategic investors
              that provide both capital and operational credibility. XN and B Capital have also participated. The
              strategic investor composition is particularly significant: BHP and Equinor are not just financial
              backers—they are industry incumbents that have validated KoBold's technology by deploying it on their own
              exploration assets. The Series C marked a step-change in scale, with the $537M dwarfing all prior rounds
              combined. The capital is expected to fund development of the Mingomba copper mine in Zambia and accelerate
              exploration globally. KoBold has not publicly disclosed revenue figures, suggesting it remains pre-revenue
              or in early revenue stages. The company has no public filing obligation as it remains a private Delaware
              corporation.
