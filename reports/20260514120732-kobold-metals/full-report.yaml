      - number: '1.5'
        title: Adverse Factors, Evidence Gaps, and Diligence Risks
        blocks:
          - type: paragraph
            body: >-
              KoBold's adverse risk profile for a company overview chapter centers on structural diligence limitations
              common to private companies, plus a number of substantive concerns. First, as a private company, KoBold
              does not publish audited financials, making it impossible to verify burn rate, revenue status, operating
              losses, or cash position. The $537M Series C suggests substantial operating expenses, but no public data
              confirms what fraction is earmarked for mine development versus AI R&D. Second, there is an unresolved
              question about whether KoBold's AI-led exploration approach actually outperforms traditional geophysics on
              a risk-adjusted basis; no peer-reviewed third-party benchmarks have been published comparing KoBold's hit
              rate to industry norms. Third, the Mingomba acquisition structure (KoBold bought into an existing known
              project, not a greenfield AI-led discovery in a blind area) means the flagship proof-of-concept may be
              less 'AI-first' than the narrative implies. Fourth, geopolitical and operational risks in Zambia, DRC, and
              Burundi are material given mining sector volatility in these jurisdictions. Fifth, early investor
              incentives (strategic investors like BHP getting first look at discoveries) could create conflicts of
              interest with KoBold equity holders. Sixth, critical founder dependency: Kurt House is the primary
              scientific spokesperson and CEO; his departure would likely trigger investor concern. The board
              composition, equity structure, voting rights, and secondary market activity are all undisclosed, which is
              normal for a Series C-stage private company but limits diligence depth.
            claimRefs:
              - CO029
              - CO030
              - CO031
              - CO032
              - CO033
