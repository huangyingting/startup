    title: Company Overview
    sections:
      - number: '1.1'
        title: Identity, Mission, and Business Model
        blocks:
          - type: paragraph
            body: >-
              KoBold Metals describes itself as a 'scientific mineral exploration and development company focused on
              critical minerals.' Founded in 2018 and headquartered in San Francisco, CA, the company was established to
              address a widening supply gap for critical minerals including copper, cobalt, lithium, and nickel—the
              commodities essential for EV batteries, renewable energy infrastructure, and the broader energy
              transition. The company's core thesis is that the mining industry's decades-old approach to exploration is
              systematically producing fewer discoveries per dollar invested, and that a full-stack technological
              approach combining AI, novel hardware sensors, and world-class geoscientists can reverse this trend.
              KoBold's business model is not a software-as-a-service or consulting model. Instead, it acts as a
              full-stack explorer and developer that retains equity stakes in the mineral resources it discovers, either
              wholly owned or through joint ventures with established mining majors. This means KoBold assumes
              exploration risk in exchange for ownership in the discovered deposits. The company is also expanding into
              mine development following its Mingomba copper discovery in Zambia, positioning itself along a broader
              slice of the mining value chain from exploration through production. KoBold never sells its technology as
              a standalone product; the technology is proprietary and deployed exclusively on KoBold's own projects and
              joint ventures, creating a deep moat around its capabilities. This full-stack approach differentiates
              KoBold from pure technology vendors and from traditional exploration companies.
