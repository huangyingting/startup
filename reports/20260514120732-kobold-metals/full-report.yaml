              the AI platform, portfolio optionality, and future resource growth. Total capital raised to date is
              approximately $692M+ including earlier rounds, supported by investors including Andreessen Horowitz,
              Breakthrough Energy Ventures, BOND, Equinor, and others. At the Series C price, KoBold's enterprise value
              on a per-copper-equivalent-tonne basis in the ground is approximately $3-5/tonne Cu-eq (depending on total
              attributable resource size) — broadly in line with comparable development-stage copper projects globally
              but at the high end given the exploration-stage risk premium. Secondary market signals for KoBold shares
              are not available (no active secondary trading confirmed), but the institutional investor composition
              implies limited near-term redemption pressure. The current macroeconomic environment (copper at
              $8,800-$9,500/tonne as of May 2026, AI investment sentiment elevated) is broadly supportive of the $2.1B
