            title: T. Rowe Price + Fidelity Crossover Suggests IPO Path
            body: >-
              The presence of T. Rowe Price and Fidelity in the Series C is an important signal. These institutional
              fund managers typically invest in late-stage private companies that are on a clear path to public markets
              within 3-5 years. Their participation suggests KoBold's investor base is positioning for an IPO or major
              liquidity event, likely contingent on Mingomba mine development progress.
            calloutType: insight
            claimRefs:
