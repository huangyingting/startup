  - number: 2
    title: Market Analysis
    sections:
      - number: '2.1'
        title: Market Definition and Scope
        blocks:
          - type: paragraph
            body: >
              KoBold Metals operates at the intersection of two markets: the global critical mineral exploration
              services market and the emerging market for AI-enabled geoscience technology applied to mining. Its
              primary revenue model is not technology licensing but equity-stake accumulation in mineral deposits
              discovered through its proprietary AI platform. This makes KoBold structurally different from conventional
              mining technology vendors.


              The relevant market boundary is defined by the global effort to discover and develop new copper, cobalt,
              nickel, and lithium deposits — the four principal battery metals required for the energy transition. These
              metals form the target universe for KoBold's Machine Prospector platform and govern where and how the
              company deploys capital and technology. Excluded from KoBold's addressable market are downstream
              activities: mineral processing, refining, battery manufacturing, and electric vehicle assembly.


              Status-quo substitutes include traditional exploration firms (Strathmore Resources, SRK Consulting),
              internal exploration programs run by mining majors, and government-funded geological surveys. KoBold
              differentiates through AI-synthesized geoscience data, proprietary sensors (Hyperpod), and faster
              hypothesis-driven drilling programs that it claims reduce time-to-discovery. Adjacent markets where KoBold
              may create optionality include mining services, geoscience data licensing, and satellite-derived mineral
              mapping.


              Copper is the highest-priority target metal for KoBold given the Mingomba flagship asset, though the
              company's platform is metal-agnostic. Cobalt co-occurs with copper at Mingomba. Lithium is the focus of
              the DRC Congo campaign and Quebec explorations. Nickel is the primary focus of the BHP joint venture in
              Australia.
