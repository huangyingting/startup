companyProfile:
  summary: >-
    KoBold Metals was founded in 2018 in San Francisco by CEO Kurt House (PhD geochemistry, Harvard/MIT), CTO Tom Hunt
    (PhD geophysics, MIT), and President Josh Goldman (PhD geophysics, Harvard). The company has developed a proprietary
    AI exploration platform that uses Bayesian inference to generate probabilistic models of mineral deposit locations
    from geophysical data. The platform is trained on a growing proprietary dataset of airborne EM surveys, gravity
    measurements, and geochemical assays collected from programs across six continents. KoBold's flagship asset is the
    Mingomba copper-cobalt deposit in Zambia's Copperbelt, discovered in partnership with ZCCM-IH (Zambia state mining
    entity). Mingomba carries a 247 Mt Indicated Resource at 2.79% Cu — making it one of the world's highest-grade
    undeveloped copper deposits by grade and scale. As of July 2024, KoBold has raised approximately $692M+ total,
    including a $537M Series C led by T. Rowe Price and Fidelity at an implied valuation of ~$2.1B. Additional investors
    include Andreessen Horowitz, Breakthrough Energy Ventures, BOND, and Equinor (Norwegian state energy). The company
    operates two active mining major JV programs (BHP for Australian nickel/copper; Rio Tinto for Western Australia
    lithium) and holds framework agreements in DRC (AVZ Minerals Manono lithium), Burundi (government data
    digitization), and exploration permits in Quebec and Finland.
