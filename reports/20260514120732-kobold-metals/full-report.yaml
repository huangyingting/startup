          - type: callout
            title: 'Mine Development Capital Gap: $1-5B Beyond KoBold''s Balance Sheet'
            body: >-
              KoBold cannot self-fund the construction of Mingomba. Industry estimates for developing a copper deposit
              of Mingomba's described scale typically require $1-5 billion in mine construction capital. This creates a
              structural dependency on either a major mining company taking on the construction capex through a JV
