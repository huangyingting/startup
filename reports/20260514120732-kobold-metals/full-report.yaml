      - number: '4.3'
        title: Revenue Model, Unit Economics, and Path to Profitability
        blocks:
          - type: paragraph
            body: >-
              KoBold's revenue model is fundamentally different from software or service companies. The company does not
              charge licensing fees or advisory fees. Instead, KoBold retains equity stakes in mineral discoveries,
              typically through joint ventures. Revenue — if and when it materializes — will come from three potential
              sources: (1) Royalties, dividends, or distributions from producing mines in which KoBold holds equity; (2)
              Sale or partial divestment of KoBold's equity stakes in projects to mining majors or capital markets; (3)
              JV carry arrangements where a mining major funds KoBold's exploration costs in exchange for earned equity.
              Currently, KoBold is pre-revenue by conventional accounting standards: no mine in its portfolio is in
              production. The Mingomba copper deposit is in the feasibility and development planning phase; a bankable
              feasibility study and construction decision are likely years away, with production estimated by industry
              observers as early as 2030-2035 at best. This long monetization timeline is typical for exploration-stage
              mining companies but unusual for a VC-backed AI technology company, creating a potential tension between
              investor liquidity expectations and mine development realities. Unit economics are similarly difficult to
              assess without internal data: the cost of an AI-generated exploration target, the success rate of drilling
              on AI targets versus traditional targets, and the share of Mingomba's value attributable to KoBold's AI
              platform versus the pre-existing geological knowledge are all undisclosed. From a comparable universe
              perspective, KoBold's model most closely resembles a royalty/streaming company in structure (retaining
              economic interest without operating the mine) but at a much earlier stage and with an active technology
              platform that creates the discoveries rather than purchasing royalties on existing ones. This hybrid model
              has no direct public-market analog, making valuation and unit economics assessment challenging.
