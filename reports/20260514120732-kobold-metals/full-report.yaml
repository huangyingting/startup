      - number: '7.4'
        title: ESG, Environmental, and Reputational Risks
        blocks:
          - type: paragraph
            body: >-
              KoBold's ESG risk profile is shaped by two distinct dimensions: its positive Africa development narrative
              (>90% Zambian workforce, $200M economic contribution, government partnership model) and the adverse ESG
              exposure from DRC operations and the global scrutiny of technology companies entering
              conflict-mineral-adjacent territories. Global Witness, Human Rights Watch, and Amnesty International have
              all published extensively on ESG failures in DRC and Zambia mining; while no report specifically targets
              KoBold as of May 2026, any expansion into artisanal mining areas or conflict-mineral-adjacent supply
              chains would generate immediate scrutiny. Environmental risk at Mingomba includes acid mine drainage,
              water table contamination, and waste management — standard risks for copper sulfide open-pit or
              underground mining that require robust environmental management plans and impact assessments. The IRMA
              (Initiative for Responsible Mining Assurance) standard and other voluntary ESG frameworks would likely be
              required by KoBold's institutional investors (particularly Breakthrough Energy Ventures, with its ESG
              mandate) before any mine development financing. KoBold's AI-driven exploration narrative carries a
              specific reputational risk: if the AI system is used to identify deposits in protected areas, indigenous
              territories, or environmentally sensitive zones, the company could face legal and reputational challenges
              from conservation and indigenous rights organizations. The BHP and Rio Tinto JVs impose their own ESG
              standards on KoBold as JV partners — both mining majors have public commitments to responsible mining —
              which acts as a protective discipline on KoBold's conduct. Equinor's investor ESG mandate also creates
              alignment incentives. The broader critical mineral supply chain is under increasing legislative scrutiny
              (EU Battery Regulation, US Inflation Reduction Act critical mineral provisions, CFIUS national security
              reviews), creating both an opportunity (critical mineral supply chain investment is politically supported)
              and a risk (supply chain due diligence requirements are increasingly stringent).
