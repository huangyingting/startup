  - number: 7
    title: Risks
    sections:
      - number: '7.1'
        title: Operational and Execution Risks
        blocks:
          - type: paragraph
            body: >-
              KoBold's primary operational risk is the unproven nature of its end-to-end execution model: the company
              has demonstrated success at the exploration and discovery stage (Mingomba) but has not yet developed or
              operated a mine. The Mingomba copper deposit development requires a Bankable Feasibility Study (BFS),
              environmental and social impact assessment, construction financing, mine construction (typically 4-7 years
              for a deposit of this scale), and operational ramp-up — a total timeline from current stage to first
              production of approximately 8-12 years, implying earliest production around 2033-2037. Mine development
              has specific execution risks: cost overruns are endemic in the industry (Glencore's Katanga mine
              refurbishment exceeded initial estimates by over $800M; First Quantum's Cobre Panama project experienced
              years of cost and timeline slippage before political shutdown); labor relations in mining remain
              challenging even with >90% local workforce; infrastructure development in Zambia (power, roads, port
              logistics) adds complexity. A second operational risk is the company's geographic distribution across
              Zambia, DRC, Burundi, Quebec, Finland, and Australia — managing multi-continent exploration programs
              across 6 countries simultaneously stretches management bandwidth and introduces operational complexity.
              Key-person risk is concentrated: CEO Kurt House is the public scientific spokesperson; CTO Tom Hunt owns
              the technology platform; Africa CEO Mfikeyi Makayi is critical to Zambia government and community
              relations. A third operational risk is the AI platform's unvalidated performance: if the discovery hit
              rate from AI targets is no better than traditional exploration, the capital efficiency argument for the
