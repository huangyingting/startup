      - number: '2.2'
        title: Market Sizing — Multiple Lens Approach
        blocks:
          - type: paragraph
            body: >
              No single authoritative market size estimate covers "AI-powered critical mineral exploration" as a
              discrete category. This chapter uses a multi-lens approach combining: (1) underlying commodity market
              size, (2) capital investment requirements for new mine supply, (3) estimated exploration spending, and (4)
              long-term demand growth trajectories.


              **Copper commodity market (Lens 1):** World copper mine production was approximately 22 million tonnes in
              2023, with an average COMEX price of approximately $3.90/pound ($8,600/tonne). This implies an annual
              copper mining revenue of ~$190 billion globally. KoBold's equity model targets a share of discovered
              deposit value rather than a share of annual revenues. USGS's 2015 assessment estimated 2.1 billion tonnes
              of identified copper resources and 3.5 billion tonnes of undiscovered copper resources globally — the
              undiscovered component represents the primary hunting ground for explorers like KoBold.


              **Energy transition investment gap (Lens 2):** The World Bank's Climate-Smart Mining initiative estimates
              that mineral production for clean energy technologies may need to grow nearly 500% by 2050 to meet the
              Paris Agreement trajectory, requiring 3 billion tonnes of minerals in total. The UN Trade and Development
              body estimated in May 2025 that $250 billion in investment and at least 80 new mining projects would be
              needed to address the copper supply gap alone. This capital gap represents the size of the investment
              opportunity that KoBold's model aims to de-risk.


              **Battery metals demand growth (Lens 3):** Global copper demand grew from 16.7 million tonnes in 2004 to
              28.5 million tonnes in 2024 (CAGR 2.7%). It is forecast to grow at 3.8% CAGR to reach 35.1 million tonnes
              by 2030. Lithium production grew 23% in 2023 alone to approximately 180,000 tonnes; battery use accounts
              for 87% of global lithium consumption and is growing rapidly. BloombergNEF projects cobalt demand to
              triple by 2050 driven by EV batteries, aerospace, and consumer electronics. The IEA warns that existing
              supply chains are highly concentrated and may not be adequate to meet future clean energy demand.


              **EV adoption as demand signal (Lens 4):** BloombergNEF's Electric Vehicle Outlook 2025 reports that one
              in four new cars sold globally is now electric, with over half of vehicles in China being electric. This
              demand trajectory creates a structural floor for battery metal demand, particularly copper, cobalt,
              nickel, and lithium, regardless of near-term price cycles.


              The total addressable market for KoBold is best framed not by annual revenue but by the value of
              undiscovered critical mineral deposits globally — a stock metric measured in trillions of dollars. The
              serviceable addressable market is constrained by the geographic and mineral focus of KoBold's technology,
              current partnerships, and operational footprint.
