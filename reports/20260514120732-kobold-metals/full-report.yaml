      - number: '3.5'
        title: Moat Durability, Lock-In, and Displacement Risk
        blocks:
          - type: paragraph
            body: >-
              KoBold's competitive moat rests on four reinforcing elements: (1) Proprietary data and model moat —
              KoBold's AI models are trained on years of accumulated geoscience data, proprietary sensor readings from
              its own field programs, and legacy data not easily accessible to newcomers; (2) Hardware differentiation —
              KoBold's novel electromagnetic and gravity sensors create data inputs that cannot be fully replicated by
              competitors using off-the-shelf survey equipment; (3) Human capital moat — the team of PhDs spanning
              geophysics, ML, and field geology is difficult to assemble quickly and represents institutional knowledge
              that is hard to transfer; (4) Partner lock-in — JV agreements with BHP and Rio Tinto create strategic
              alignment that makes it difficult for those partners to switch to alternative AI exploration providers
              without disrupting ongoing programs. The primary moat risks are: incumbents successfully building or
              acquiring comparable AI capabilities in-house (BHP has its own data science teams and has access to
              KoBold's discoveries through the JV), commoditization of AI/ML capabilities as foundation models and
              geospatial AI tools improve, and talent flight from KoBold's specialized team. The switching cost for JV
              partners is currently high (KoBold owns the proprietary targeting data for shared projects), but this moat
              will erode if partner data rights are not carefully structured. Multi-homing risk is low for JV partners
              (they are committed to specific programs) but higher for juniors that might choose Goldspot or Earth AI
              for lower-cost targeting.
