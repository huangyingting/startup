      - number: '2.4'
        title: Growth Drivers and Adoption Constraints
        blocks:
          - type: paragraph
            body: >
              The critical minerals exploration market has several powerful structural tailwinds, partially offset by
              material operational and market constraints.


              **Key Growth Drivers:**

              The energy transition is the primary macro demand driver. BloombergNEF's 2025 EV Outlook confirms that one
              in four new cars globally is already electric; this rapid adoption rate creates an irreversible demand
              signal for battery metals. AI and machine learning advancement enables the synthesis of geoscience
              datasets that previously required years of sequential manual analysis. Satellite remote sensing, LiDAR
              miniaturization, and cloud computing power have simultaneously reduced the cost and increased the
              precision of airborne and ground exploration surveys.


              Declining ore grades are a structural driver that works in KoBold's favor. Average copper ore grades have
              declined over decades as the highest-grade and most easily accessible deposits have been exhausted. This
              makes AI-driven identification of higher-grade buried deposits increasingly valuable. The IEA's Critical
              Minerals programme underscores the "unprecedented" concentration of critical mineral supply chains — over
              70% of global cobalt comes from the DRC, and China dominates processing — creating strong government and
              industry incentives for supply diversification investment.


              **Key Adoption Constraints:**

              Permitting and regulatory timelines are the most significant constraint: average mine development
              timelines exceed 16-20 years from discovery to first production in many jurisdictions. No amount of AI
              acceleration of the discovery phase materially compresses this permitting pipeline. ESG and community risk
              in KoBold's operating regions (DRC, Zambia) is material; Amnesty International documented child labor in
              DRC artisanal cobalt mining in 2016, and community conflicts in mining regions remain endemic. Near-term
              commodity price volatility — lithium prices declined ~70% in 2023, nickel prices also fell — can
              temporarily reduce exploration budgets among mining companies. Finally, KoBold's equity-stake model
              requires large capital commitments and the patience to wait 16+ years for returns, limiting the pool of
              financially able partners.
