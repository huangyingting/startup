    severity: minor
    topic: competitor comparison
    missingEvidence: >-
      Comparable revenue and membership data from Alignment Healthcare (ALHC) and Clover Health (CLOV) for the same 2024
      period, normalized to the same reporting basis as Devoted Health's state plan filings.
    whyItMatters: >-
      A side-by-side comparison would contextualize Devoted Health's 69% revenue growth and $3.3B scale versus publicly
      disclosed MA startup peers.
    diligencePath: >-
      Pull ALHC and CLOV 10-K filings and quarterly earnings reports for FY2024 figures; confirm comparability with
      Devoted plan-subsidiary reporting basis.
    relatedQuestionRefs:
      - QO019
  - type: private-evidence-only
    severity: material
    topic: adverse regulatory
    missingEvidence: >-
      Direct regulatory correspondence, CMS audit results, or enforcement actions against Devoted Health; no such
      filings were found in EDGAR or public dockets reviewed.
    whyItMatters: >-
      Medicare Advantage plans are subject to ongoing CMS oversight; undetected compliance issues could materially
      affect star ratings, contract renewal, or benefit design in future plan years.
