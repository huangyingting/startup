  - type: private-evidence-only
    severity: material
    topic: leadership and governance (TO002) — post-2018 board additions
    missingEvidence: >-
      Names and institutional affiliations of board members added after the Series B financing in 2018; no primary
      source publicly discloses post-founding board appointments.
    whyItMatters: >-
      The TO002 leadership table captures only the founding board per the 2017 Form D; any later board changes (e.g.,
      Series D or Series E investor director appointments) are unverified and not reflected.
    diligencePath: >-
      Request current board composition directly from Devoted Health; cross-check any D&O insurance filings or press
      releases at subsequent financing rounds.
    relatedTableRefs:
      - TO002
    relatedQuestionRefs:
      - QO022
  - type: private-evidence-only
    severity: material
    topic: investor ownership stakes (TO003) — equity percentages and secondary sales
    missingEvidence: >-
      Current ownership percentages for all named investors (a16z, Premji Invest, SoftBank, TSB, GIC, General Catalyst,
      Frist Cressey, others); any secondary sales by major holders post-Series-D; liquidation preference stack and
      control rights.
    whyItMatters: >-
      TO003 captures investor identity and round participation but cannot confirm current economic positions; SoftBank
      in particular has a history of selling positions in portfolio companies after large rounds, and any concentration
      risk cannot be assessed without ownership percentages.
    diligencePath: >-
      Request capitalization table from Devoted Health management; review any secondary market transaction disclosures;
      confirm whether Devoted Health SPV II LLC (CIK 0002078127) is for secondary liquidity or co-investment.
    relatedTableRefs:
      - TO003
    relatedQuestionRefs:
      - QO014
  - type: private-evidence-only
    severity: material
    topic: headcount
    missingEvidence: >-
      Precise employee count verified from Devoted Health or a WARN Act filing; Zippia and similar estimates are
      unverified.
    whyItMatters: >-
      Headcount is necessary to assess capital efficiency per employee, the scale of the May 2025 layoffs in absolute
      terms, and ongoing run-rate costs.
    diligencePath: >-
      Request headcount disclosure directly from Devoted Health investor relations; cross-check Massachusetts WARN Act
      notices for any layoff filings around May 2025.
    relatedQuestionRefs:
      - QO024
