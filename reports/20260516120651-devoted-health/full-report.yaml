  - number: 4
    title: Financials
    sections:
      - number: '4.1'
        title: Revenue Model and Pricing
        blocks:
          - type: paragraph
            body: >-
              Devoted Health operates as a Medicare Advantage (MA) insurer; its primary revenue source is monthly
              capitation payments from the Centers for Medicare & Medicaid Services (CMS). CMS pays MA plans based on
              risk-adjusted county benchmark rates, with per-member-per-month (PMPM) amounts calibrated to each member's
              expected health costs using the Hierarchical Condition Category (HCC) risk-adjustment model. Devoted bids
              below the county benchmark to qualify for CMS rebates, which it uses to fund $0-premium plans with
              supplemental benefits—eliminating member premiums as a significant revenue source while building
              enrollment scale. The company also earns quality bonus payments from CMS for plans rated 4 stars or
              higher; Devoted's average Star Rating reached 4.6, with 95% of 2026 members in 4-star-or-better contracts,
              qualifying for the 5% quality bonus on capitation payments. Revenue grew from approximately $1.93 billion
              in 2023 to $3.27 billion in 2024, a 69% increase, reflecting a 71% membership increase to 244,763 members
              at year-end. Average annual revenue per member in 2024 was approximately $13,400 (~$1,117 per member per
              month), derived from CMS capitation. Revenue recognition follows standard insurance premium-earned
              accounting. Consolidated revenue and the full P&L including corporate parent and Devoted Medical costs are
              not publicly disclosed; the $3.27 billion figure represents regulated health plan entities only as
              disclosed in state insurance regulatory filings. Membership reached approximately 466,000 as of January
              2026 as Devoted expanded to 29 states, implying annualized 2026 revenue in the range of $5–6.5 billion if
              ARPM is maintained.
