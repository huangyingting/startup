      - number: '4.3'
        title: Capital Stack and Financing History
        blocks:
          - type: paragraph
            body: >-
              Devoted Health has raised approximately $2.64–2.7 billion in equity capital across nine disclosed rounds
              since its 2017 founding. The Series B ($300M, 2018) and Series C ($450M, 2020) provided early operating
              capital. The defining round was the Series D ($1.15 billion, October 2021), co-led by Uprising and
              SoftBank Vision Fund 2, with participation from GIC, Andreessen Horowitz, ICONIQ Growth, General Catalyst,
              and Emerson Collective, at a post-money valuation of $12.6–12.7 billion. Latham & Watkins LLP's
              announcement confirms SoftBank Vision Fund 2 as the largest single Series D investor. A Series E of $175
              million closed December 29, 2023, led by a syndicate including The Space Between, Highbury Holdings, GIC,
              Stardust Equity, Maverick Ventures, and Fearless Ventures, with participation from Andreessen Horowitz and
              General Catalyst. Prime Unicorn Index analysis of SEC filings shows the Series E was priced at $56.25 per
              share—the same price as the Series D—indicating essentially flat per-share valuation rather than a
              markdown. A $112 million Series E extension closed in August 2024 at a reported $13 billion post-money
              valuation. Most recently, Devoted raised $48 million in a Series F (November 2025) and $317 million in a
