            title: Durable Demographic Engine Supports Structural Demand
            body: >
              Approximately 10,000 Americans turn 65 each day, adding ~1.5 million new Medicare-eligible beneficiaries
              annually. The CBO projects MA penetration will reach 64% of all Medicare beneficiaries by 2034, providing
              a structural demand floor that no near-term regulatory change is likely to fully offset. Devoted Health's
              focus on C-SNPs—the fastest-growing segment—further amplifies exposure to the highest-growth cohort within
              an already-growing market.
