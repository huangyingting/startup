      - number: '8.2'
        title: Financing History and N-PORT Fair Value Evidence
        blocks:
          - type: paragraph
            body: >
              Devoted Health's funding history spans nine rounds from 2017 through January 2026, with the capital
              structure defined by five key data points. The Series B (Oct 2018, $300M) was priced at a ~$1.8 billion
              post-money valuation. The Series C (Apr 2020, $450M) valued the company at $3.78 billion. The Series D
              (Oct 2021, $1.15B) marked the valuation peak at $12.6 billion, with a further $80M add-on bringing the
              total to $1.23B Series D proceeds and a $12.7 billion final post-money. The Series E (Dec 2023, $175M) was
              confirmed at $12.87–13.1 billion by multiple sources close to the deal — effectively flat on a per-share
              basis ($56.25/share, same as Series D), confirmed by a Prime Unicorn Index analysis of the underlying Form
              D authorization. An August 2024 Series E extension of $112M was separately confirmed at approximately $13
              billion by Sacra. Total raised stands at approximately $2.64 billion as of January 2026.

              The most granular mark-to-market evidence comes from SEC N-PORT filings by Private Shares Fund (CIK
              0001557265, PIIVX), a named investor in the Series E and subsequent rounds. The fund discloses Devoted
              Health common share fair value quarterly. The series shows: $55.08/share (Sep 30, 2023), $56.25/share (Mar
              31 and Sep 30, 2024), $64.64/share (Dec 31, 2024 — a 15% step-up from the Sep 2024 mark, consistent with
              the Aug 2024 Series E extension), $57.50/share (Sep 30, 2025 — a slight retreat ahead of the Series F),
              and $67.50/share (Dec 31, 2025 — a 17% step-up after the Series F closed in November 2025). The Dec 2025
              mark of $67.50/share represents a 20% premium over the Series D/E issuance price of $56.25/share. Applying
              the same ratio to the confirmed Series E valuation ($12.87B) yields an implied enterprise value of
              approximately $15.4 billion as of December 2025, consistent with independent estimates (~$15B, Eboona, Feb
              2026). No formal per-share price or enterprise valuation was disclosed for the Series F (~$366M total).

              Secondary market signals from Forge Global show the Devoted Health stock profile is active but all bid/ask
              data is obscured, providing no public secondary market price signal as of May 2026.
            claimRefs:
