      - number: '8.5'
        title: Exhibits
        blocks:
          - type: callout
            title: 'Recommendation: Track'
            body: >
              Devoted Health earns a "track" recommendation at current implied valuations (~$13–15 billion). The growth
              story is genuine — 466,000 members, $3.3B+ estimated revenue, and improving unit economics. But the
              private-market premium over public comps (3–4x EV/Revenue vs 1.1–1.2x for ALHC/CLOV) requires a path to
              consolidated profitability and/or a liquidity event that has not yet materialized. Investors should
              revisit after full-year 2025 regulatory filings are available (typically Q2 2026) and after the CMS 2027
              rate announcement clarifies sector economics.
            calloutType: recommendation
            claimRefs:
              - CV001
              - CV006
              - CV030
          - type: callout
            title: Valuation Premium Is the Primary Risk
            body: >
              At $13–15 billion, Devoted trades at 3–4x the EV/Revenue multiple of public MA comparables. The Series E
              flat round (same $56.25/share as Series D), persistent consolidated losses (confirmed through 2023 by STAT
              analysis), and no disclosed consolidated P&L represent key risks. A mean-reversion to ALHC/CLOV multiples
              implies a $4–5 billion fair value — an approximate 65% discount to the private mark.
            calloutType: risk
            claimRefs:
              - CV007
              - CV008
              - CV029
              - CV030
