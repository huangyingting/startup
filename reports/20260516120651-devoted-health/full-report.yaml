      - number: '3.4'
        title: Regional and Value-Based Care Peers
        blocks:
          - type: paragraph
            body: >
              SCAN Health Plan is one of the nation's largest nonprofit MA plans, serving seniors across 33 California
              counties as well as markets in Arizona, Nevada, Texas, New Mexico, and Washington. Founded nearly five
              decades ago, SCAN emphasizes nonprofit mission and benefit stability. For 2026, SCAN announced expanded
              benefits including $0 copay for primary care and Tier 1/2 drugs, significant dental allowances
              ($800–$4,000), and enhanced vision coverage. In a contracting market, SCAN's CEO Dr. Sachin Jain
              positioned SCAN as "a stable and consistent partner for older adults" as for-profit plans retreated.
              SCAN's nonprofit status, deep California roots, and mission alignment with senior care differentiate it
              from for-profit peers, though its geographic reach remains concentrated in California relative to national
              incumbents.


              ChenMed is a privately held capitated primary care company operating 120+ senior medical centers in 15
              states under the Chen Senior Medical Center, Dedicated Senior Medical Center, and JenCare brands. ChenMed
              is not an MA insurer but operates as a downstream VBC partner: it accepts full-risk capitation from MA
              payers, bears medical cost risk, and shares savings from better outcomes. ChenMed has a long-standing
              partnership with Humana, formalized through a new five-year network agreement in February 2023, ensuring
              in-network access for Humana MA members at all ChenMed locations. ChenMed's concierge-style, physician-led
              model for complex low-income Medicare seniors is viewed as one of the highest-performing primary care
              platforms in the country. As a provider/capitation partner rather than a competing payer, ChenMed is both
              a potential partner and a model benchmark for Devoted Medical.


              Zing Health, founded in 2019 out of the American Medical Association's Health 2047 innovation lab by Dr.
              Eric Whitaker and Garfield Collins, focuses on Chronic Special Needs Plans (CSNPs) for underserved seniors
              with chronic conditions. Zing raised $140 million in September 2024, with participation from Health 2047
              Capital Partners, CRG, and First Trust Capital Partners. Zing has been one of the fastest growing MA plans
              since 2023, with most members selecting CSNPs. It competes primarily in markets where traditional MA plans
              are not designed to handle chronic, complex populations. Zing's CSNP focus and community-based model
              represent a growing segment of the MA market, as CMS data shows CSNP enrollment grew 49% for 2026
              according to Healthscape's analysis.


              Kaiser Permanente's integrated model—owned hospitals, employed physicians, and its own MA plans—covers
              approximately 2 million MA members for 2026. Virtually all Kaiser MA members remain in plans with 4-star+
              ratings. Kaiser's geographic concentration in California, Pacific Northwest, Colorado, and Mid-Atlantic
              regions limits direct overlap with Devoted Health's footprint but demonstrates the viable ceiling of
              integrated care models at scale.
