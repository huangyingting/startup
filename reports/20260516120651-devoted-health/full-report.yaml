      - number: '3.3'
        title: 'Incumbent Players: Scale Payers'
        blocks:
          - type: paragraph
            body: >
              UnitedHealthcare (UHC), the MA market's largest insurer, enrolled approximately 9.4 million MA members as
              of February 2026—down 9% from 10.3 million before the AEP as the company aggressively exited plans serving
              over 600,000 members to recover margins. Despite the pullback, UHC retains commanding market position: it
              is the largest insurer in 41% of all US counties. UHC's 78% of members in 4-star+ plans for 2026 is strong
              and improved from 75% in 2025. Its parent UnitedHealth Group operates Optum, one of the largest health
              services and analytics platforms in the US, giving it unmatched data assets, care delivery integration via
              OptumCare, and pharmacy benefit management via OptumRx. However, UHC significantly underestimated
              accelerating medical cost trends for 2025, with executives citing "intensifying services costing more"
              across most encounters.


              Humana, the second-largest MA insurer, made an unusual contrarian bet for 2026, growing to over 7 million
              MA members from 5.8 million before AEP—adding roughly 1.2 million members while peers contracted. This
              growth gamble follows Humana's aggressive benefit reduction strategy in 2024–2025 that contracted its book
              to improve margins. Humana's 2026 star rating deteriorated, however: only 20% of members are in plans with
              4-star+ ratings for 2026 (down from 25% in 2025), and average star rating for 2026 is 3.61. Humana has
              deep CenterWell senior-focused primary care infrastructure and a long VBC partnership with ChenMed, making
              it the most clinically integrated of the national incumbents.


              CVS Health / Aetna, the third-largest MA insurer with ~4 million members, integrated Oak Street Health
              (acquired for $10.6 billion in 2023) to build a differentiated primary care delivery asset. Oak Street
              operates roughly 200 primary care clinics across 25+ states focused on complex MA populations. Aetna led
              peers in the share of members in 4-star+ plans (81% for 2026, though down from 89% in 2025). CVS has been
              retrenching MA to optimize margins after heavy losses in 2024.


              Elevance Health (formerly Anthem) serves ~1.9 million MA members for 2026, down from 2.2 million, with 53%
              in 4-star+ plans—an improvement from 40% in 2025. Centene, the sixth-largest MA insurer, covers under 1
              million members for 2026 after a 4% decline; its 4-star+ share improved dramatically from 1% to 18% for
              2026. Both Elevance and Centene have Medicaid-heavy histories and are building MA presence through
              DSNP/CSNP expansion.
