      - number: '3.2'
        title: 'Direct Competitors: Tech-Enabled MA Peers'
        blocks:
          - type: paragraph
            body: >
              Clover Health (Nasdaq: CLOV) is the most technically comparable public peer. Operating in NJ, PA, TN, TX,
              GA, and AZ, Clover offers primarily wide-network PPO plans powered by its proprietary Clover Assistant AI
              platform, which aggregates patient data to guide primary care physicians toward preventive interventions.
              Full-year 2024 insurance revenue was $1.34 billion with adjusted EBITDA of $70 million—its first year of
              positive EBITDA, reflecting an improvement of $112 million year-over-year. Net GAAP loss from continuing
              operations improved to $46 million in 2024 from $210 million in 2023. Clover grew 53% during the 2025–26
              AEP to approximately 153,000 members and expects first-ever full-year GAAP net income profitability in
              2026. A significant risk: Clover's largest contract, covering 97% of its members, dropped below the 4-star
              threshold for 2026, potentially eliminating quality bonus payments and costing tens of millions in EBITDA
              according to Leerink Partners analysts.


              Alignment Healthcare (Nasdaq: ALHC) is a California-headquartered tech-enabled MA plan with the AVA
              (Advanced Value-based Architecture) platform that integrates claims, clinical, and operational data.
              Full-year 2024 revenue was $2.70 billion (+48.3% YoY) with 189,100 members at year-end 2024, growing 58.6%
              YoY. The company achieved its first full year of positive adjusted EBITDA as a public company in 2024
              ($1.3 million) and reported a net loss of $128.1 million. Alignment's 2026 AEP performance added members
              to reach ~280,000. Critically, Alignment achieved 100% of its members in plans with 4-star or higher
              ratings for 2026—a meaningful quality signal. For 2025 revenue guidance was $3.72–3.78 billion,
              representing 37–40% growth.


              Oscar Health fully exited Medicare Advantage by 2023, shifting focus to ACA individual and small-group
              markets where it had ~1 million members. CEO Mario Schlosser cited structural challenges executing MA in a
              scalable way without deep provider partnerships. Oscar's MA membership never exceeded several thousand
              members at peak, making it a minor competitive overlap.


              Bright Health exited its insurance business entirely in 2023 amid near-bankruptcy conditions, having
              overextended geographically across ACA and MA markets. The company sold its California MA assets (Brand
              New Day, Central Health Plan, ~125,000 members) and pivoted to its NeueHealth care delivery subsidiary.
              Bright Health's collapse demonstrated the catastrophic risk of rapid MA expansion without sufficient
              capital and risk management discipline.


              Cano Health, a value-based primary care provider to MA members, filed for Chapter 11 bankruptcy in
              February 2024 with over $1 billion in funded debt. It had been valued at $4.4 billion post-IPO in 2021.
              Cano emerged from bankruptcy in July 2024 as a private company, converting $1 billion of debt to equity
              and securing $200 million in fresh capital. The company is now focused on 80 Florida clinics. Cano's
              collapse underscores the sensitivity of capitated care models to risk adjustment changes and MA rate
              compression.
