        title: Compliance, Security & Product Risks
        blocks:
          - type: paragraph
            body: >-
              Devoted Health operates under CMS Medicare Advantage contracts and maintains a Medicare Compliance Program
              covering fraud, waste, and abuse (FWA) prevention, HIPAA, OIG/GSA exclusion screening,
              Anti-Bribery/Anti-Corruption, and Conflict of Interest policies. An anonymous FWA hotline (855-292-7485)
