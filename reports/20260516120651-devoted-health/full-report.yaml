chapters:
  - number: 1
    title: Company Overview
    sections:
      - number: '1.1'
        title: Company Identity, Product, and Headquarters
        blocks:
          - type: paragraph
            body: >-
              Devoted Health, Inc. is a Delaware-incorporated, Waltham, Massachusetts–based healthcare company that
              designs and operates an integrated all-in-one Medicare Advantage solution for Americans aged 65 and older.
              The company was incorporated under the name Orinoco Health, Inc. and filed its first SEC Form D on October
              20, 2017, with its registered principal office listed at 15 Temple Street, Newton, MA. The operational
              headquarters has since moved to the historic Waltham Watch Company building in Waltham, MA—a location the
              co-founders have cited as symbolic of their mission to carry on a legacy of American innovation. The legal
              entity remains Devoted Health, Inc. (CIK 0001719459).


              The company's product model is built on four integrated layers: (1) Devoted Health Medicare Advantage
              insurance plans (HMO and PPO) offered to Medicare-eligible beneficiaries in select counties, (2) Devoted
              Medical—a virtual-first and in-home medical group composed of hundreds of clinical staff (doctors, nurses,
              and other clinicians) who serve exclusively Devoted Health members at no additional cost, (3) dedicated
              "Guide" concierges who answer calls within 30 seconds and resolve 90 percent of health questions within a
              day, and (4) the Orinoco platform—a proprietary software system described by the company as the first
              modern platform capable of supporting the entirety of payor and healthcare provider operations end-to-end
              in a highly integrated way. Devoted's value proposition centers on preventing costly acute episodes
              through intensive preventive and chronic disease management, enabled by the Orinoco platform's real-time
              care choreography.


              As of January 30, 2026, Devoted Health serves over 466,000 members across 29 states, representing a 121
              percent year-over-year increase. CMS-published star ratings (2026 cycle) show 100 percent of Devoted
              members in Star-eligible plans enrolled in plans rated 4 Stars or higher on key measures including statin
              therapy adherence, medication reconciliation, and blood pressure control, with six contracts receiving the
              top 5-star rating. The company has been recognized on Fast Company's Most Innovative Companies 2024 list
              and Forbes' America's Best Startup Employers 2024 list. U.S. News & World Report independently rated
              Devoted Health Medicare Advantage a 4 out of 5 for 2026, noting that roughly 92 percent of plans carry a
              $0 monthly consolidated premium.
