    sections:
      - number: '6.1'
        title: Member Demographics and Customer Segments
        blocks:
          - type: paragraph
            body: >-
              Devoted Health's customers are Medicare-eligible seniors aged 65 and older enrolled in its Medicare
              Advantage (MA) HMO and PPO plans. Unlike enterprise SaaS companies, Devoted operates as a B2C insurer: the
              buyer, user, and payer are the same individual — a senior beneficiary who selects Devoted through the CMS
              annual enrollment period (AEP), a Medicare broker, or directly via devoted.com. As of January 2026,
              Devoted serves over 466,000 members across 29 states, with the largest member concentrations historically
              in Florida, Texas, and Ohio. The company offers both standard Medicare Advantage HMO and PPO products and
              Dual-Eligible Special Needs Plans (D-SNPs) for beneficiaries who qualify for both Medicare and Medicaid.
              For 2026, D-SNP plans are available in 14 states including Florida, Texas, Ohio, North Carolina, Colorado,
              and Alabama. Chronic Condition SNPs (C-SNPs) are offered in select markets. Approximately 92% of Devoted's
              plans carry a $0 monthly premium, positioning the company in the affordability segment of the MA market.
              The population skews toward seniors with multiple chronic conditions — hypertension, diabetes, and
              cardiovascular disease — consistent with the MA market broadly. Devoted Medical, the integrated
              virtual-first and in-home clinical group, provides care to the member base and is central to Devoted's
              differentiated retention model.
