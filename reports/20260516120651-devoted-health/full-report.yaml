      - number: '1.4'
        title: Milestones, Scale, and Adverse Events
        blocks:
          - type: paragraph
            body: >-
              Devoted Health's growth trajectory from formation to January 2026 follows a steep S-curve characteristic
              of capital-intensive MA startups: roughly five years of platform and footprint construction (2017–2022),
              followed by rapid member acquisition (2023 to date) enabled by the Orinoco platform's scalability. Key
              inflection points include the October 2022 expansion to 13 states (from an initial Florida-only launch),
              the December 2023 CMS recognition of 5-star plans in Florida and Ohio, and the January 2026 announcement
              of 466,000 members in 29 states—a 121 percent annual growth rate that outpaced most public MA peers.


              Revenue from regulated health plan subsidiaries grew from approximately $1.9 billion in 2023 to
              approximately $3.3 billion in 2024, a 69 percent year-over-year increase, based on an Endpoints News
              analysis of 33 individual state insurance filings. These state filings capture only the regulated plan
              entities and exclude the Orinoco technology platform costs and Devoted Medical expenses booked at the
              parent or medical group level—meaning disclosed financials understate the company's full cost base.
              Operating losses at the plan-subsidiary level were $55.4 million in 2023, though they shrank in 2024. Net
              income at the plan-subsidiary level turned positive in Q1 2024 ($11 million vs. a $8.9 million loss in Q1
              2023), driven partly by investment income. The company has never disclosed consolidated profitability, and
              its spokesperson confirmed in mid-2024 that it is "building toward profitability."


              Adverse events include: the May 2025 workforce reduction of approximately 5 percent, coinciding with
              broader Medicare Advantage sector headwinds from CMS V28 risk-model cuts and continued benefit
              compression; persistent losses since founding; the flat Series E valuation; and member service concerns
              discussed in insurance broker community forums. The company's financials as disclosed through state
              filings are partial and cannot be taken as a complete picture of consolidated performance, a limitation
              acknowledged by the Endpoints News analysis methodology.
