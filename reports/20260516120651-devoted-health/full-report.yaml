            body: >-
              Devoted distributes almost entirely through the independent broker/agent channel. Brokers use a dedicated
              Agent Portal to submit enrollments, run Medicare/Medicaid eligibility checks, access plan documents, and
              manage commission statements. For 2026 AEP marketing, Devoted provided a comprehensive storefront with
              plan-at-a-glance guides and enrollment materials across all states. In Devoted's own broker surveys
