  - id: TV005
    title: Thesis-Break and Kill Triggers
    columns:
      - Trigger
      - Threshold / Event
      - Transmission to Thesis
      - Action Implication
    rows:
      - - MLR deterioration
        - MLR exceeds 89% for two consecutive quarters
        - Unit economics thesis broken; medical cost management advantage eliminated
        - Downgrade to avoid; revisit only after two-quarter stabilization
      - - CMS rate cuts
        - CMS 2027 rate announcement implies >3% effective revenue cut for Devoted plan types
        - Reduces capitation per member; compresses revenue growth and pushes back profitability
        - Re-model bear case; assess impact on growth guidance and fundraising terms
      - - Star-rating decline
        - Loss of 4-star+ contracts covering >20% of current membership
        - Quality bonus income reduced; member trust damaged; competitive disadvantage in AEP
        - Reduce position; monitor Q4 2026 star ratings release
      - - Down round
        - Any financing at price per share below $67.50 (Dec 2025 N-PORT mark)
        - Signals investor markdown; preference overhang worsens; IPO path further delayed
        - Immediate reassessment; quantify liquidation preference impact on common equity
      - - Membership growth deceleration
        - Net new members in 2026 enrollment period below 100,000
        - Growth premium evaporates; valuation must compress toward public comp multiples
        - Exit or reduce; re-enter only if valuation adjusted to <2x forward revenue
      - - Key person departure
        - Ed Park (CEO) or Todd Park (Executive Chairman) departs or becomes inactive
        - Founder-led identity, vision, and investor relationships disrupted
        - Material risk; board continuity and succession plan diligence required immediately
    notes: >-
      Triggers are based on evidence gathered from public filings, sector news, and N-PORT marks. Thresholds are
      quantitative where evidence supports; others are event-based.
    claimRefs:
      - CV037
      - CV038
      - CV039
      - CV040
      - CV041
  - id: TV006
    title: Final Diligence Asks
    columns:
      - Topic
      - Missing Evidence
      - Why It Matters
      - Owner / Diligence Path
    rows:
      - - Consolidated P&L
        - Full consolidated income statement (not just regulated health plan entities)
        - >-
          State filings exclude Devoted Medical, tech/Orinoco costs, and holding-company expenses; true consolidated
          loss may exceed plan-level figures significantly
        - Request audited financials directly from company; alternatively wait for pre-IPO S-1 filing
      - - Preference stack
        - Cap table showing liquidation preference overhang from $2.64B raised
        - At bear-case valuations ($4-6B), common equity may be worth near zero after preferences
        - Request cap table summary from company counsel or data room; review Series E/F term sheets
      - - Series F / F-Prime valuation
        - Actual per-share price and post-money valuation for Nov 2025 and Jan 2026 rounds
        - N-PORT implied ~$15B is an estimate; actual terms could be materially different
        - Request term sheet; check SEC Form D amends for Devoted Health Inc. (CIK 0001719459)
      - - MLR trend (2024)
        - Full-year 2024 state regulatory filings (expected available Q2 2026)
        - Sacra 86% estimate is unverified; Q1 2024 was positive but full year trends are unknown
        - NAIC Health Annual Statement filings for each state; expect availability by June 2026
      - - Path to profitability
        - Management guidance on consolidated breakeven timeline and capital required
        - Without a credible 2026–2027 breakeven path, the Series F investors face further dilution
        - Request investor deck; alternatively review Series F investor presentations
      - - CMS 2027 rates impact
        - Quantification of Devoted-specific revenue impact from 2027 MA rate announcement
        - Sector-wide impacts can vary significantly by plan type, geography, and acuity mix
        - Directly modelable from CMS announcement; request Devoted guidance on risk score migration
    notes: >-
      Diligence asks are prioritized in order of investment-decision materiality. Items 1-3 are blocking diligence
      items; items 4-6 are material but can be partially addressed with public data.
    claimRefs:
      - CV042
      - CV043
      - CV044
