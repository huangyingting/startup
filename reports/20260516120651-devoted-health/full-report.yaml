              enrollees are in 4+ star plans—down from ~80% historically—compressing quality bonus payments. The OIG has
              an active audit of coding intensity, with CMS anticipating >$7.6 billion in annual savings. These three
              headwinds compound across the same fiscal year, creating the most challenging regulatory environment for
              MA economics since the program's expansion began.
