      - number: '4.4'
        title: Financial Gaps and Diligence Blockers
        blocks:
          - type: paragraph
            body: >-
              Devoted Health is a private company with no obligation to publish consolidated financial statements. All
              publicly available financial data derive from state insurance regulatory filings, which cover only the
              regulated health plan subsidiaries—not the corporate parent, the Devoted Medical medical group, or the
              Orinoco technology platform entity. This creates a systematic gap: state filings exclude corporate
              overhead, technology capitalization or expense, broker and marketing costs, and the intercompany economics
              between the insurance plans and Devoted Medical. The Orinoco platform is described as a full-stack payer
              and provider operations platform, suggesting significant ongoing technology investment that is excluded
              from plan-level filings. CMS requires MA plans to maintain at least an 85% MLR, with member rebates owed
              if exceeded; this creates a structural ceiling on plan-level margin, making cost discipline and volume
              scale the primary levers to profitability. The biggest diligence blockers for a financial assessment are:
              (1) consolidated cash and burn rate unknown; (2) CAC and marketing spend unknown; (3) gross margin by
              geography and product line unknown; (4) whether Devoted Medical is profitable or subsidized by the
              insurance plans is unknown; and (5) the treatment of Orinoco capitalization versus expensing is unknown.
              Secondary risks include CMS's 2026 payment rate environment and ongoing V28 risk model headwinds. The
              company's most recent 2026 funding tranches suggest capital access remains viable, but the absence of a
              profitability timeline disclosure is a persistent concern for return of capital analysis.
            claimRefs:
              - CI034
              - CI035
              - CI036
