      - number: '7.5'
        title: Exhibits
        blocks:
          - type: callout
            title: V28 Full Phase-in is the Single Largest Structural Risk in 2026
            body: >-
              The complete transition to V28 in 2026—removing qualifying codes for thousands of chronic-condition
              diagnoses—permanently compresses MA risk scores by an estimated 5–8%. For a growth-stage insurer with a
              still-negative operating margin, this is not a one-time headwind but a permanent recalibration of the
              revenue baseline. CMS's OIG has simultaneously launched a formal audit of MA organizations' 2024 V28
              submissions to verify $7.6B in projected savings, adding retroactive compliance risk.
            calloutType: risk
            claimRefs:
              - CR001
              - CR003
              - CR004
              - CR006
          - type: callout
            title: Devoted's Series F Validates Model but Does Not Remove Capital Risk
            body: >-
              The $366M Series F (January 2026) from strategic investors—including Morgan Health (JPMorganChase), GV
              (Google Ventures), and Franklin Templeton—signals institutional conviction in Devoted's model. However, at
              466,000 members and no disclosed profitability timeline, Devoted will almost certainly need additional
              capital before break-even. The dependency on private growth equity in a tightening MA sector remains a
              material risk if the next round is needed in a down market.
            calloutType: insight
            claimRefs:
              - CR017
              - CR034
              - CR035
              - CR036
              - CR043
          - type: callout
            title: Diligence Priority — Consolidated Financials, RADV Exposure, and Leadership Succession
            body: >-
              Three diligence asks are thesis-determinative: (1) consolidated operating loss and break-even scenario for
              2025–2027; (2) any CMS RADV audit notices and legal reserve for V28 clawback exposure; and (3) leadership
              succession plan for Ed and Todd Park, including identified succession candidates.
            calloutType: recommendation
            claimRefs:
