      - number: '7.4'
        title: People, Execution and Mitigation Framework
        blocks:
          - type: paragraph
            body: >-
              Devoted Health's founders, Ed Park (CEO and Co-Founder) and Todd Park (Co-Founder and Executive Chairman),
              are the company's most visible risk and most important asset simultaneously. Ed Park was COO/CTO of
              Athenahealth; Todd Park was the first US Chief Technology Officer under President Obama and co-founded
              Castlight Health and Athenahealth. Their reputations and networks underpin investor confidence, provider
              relationships, and regulatory credibility. The departure of either—due to health, lifestyle change,
              regulatory friction, or competitive opportunity—could materially impair the company's ability to raise
              capital, attract talent, or maintain strategic direction. In May 2025, Devoted cut approximately 5% of its
              workforce, a small but notable signal of financial discipline in a period of persistent losses. The
              company has never disclosed a consolidated profitability timeline. Mitigating factors include Devoted's
              strong clinical performance: 100% of its members in star-eligible plans are in 4+ star plans on key
              clinical measures, three contracts earned CMS 5-Stars for 2026 (H1290, H5299, H7993), and the Series F
              investor syndicate includes strategic backers such as Morgan Health (JPMorganChase), GV (Google Ventures),
              and Franklin Templeton. Thesis-break triggers include: any CMS audit finding resulting in payment
              clawbacks exceeding $50M; star rating decline to below 3.5 stars on more than 20% of membership-weighted
              contracts; MLR deteriorating above 92% for two consecutive quarters; or a leadership departure (Ed or Todd
              Park) without a named successor.
            claimRefs:
