      - number: '5.2'
        title: Orinoco Platform & Technical Architecture
        blocks:
          - type: paragraph
            body: >-
              Orinoco is Devoted Health's proprietary platform-as-a-service (PaaS), publicly described as "the first
              modern software platform that can support the entirety of payor and healthcare provider operations, end to
              end, in a highly integrated way." Its capabilities span healthcare operations data management, CRM,
              task-based care management, and healthcare service coordination — all delivered through a secure,
              web-based interface with no client-side installations required. The platform ingests claims data and
              electronic health records, runs care-gap identification, assigns tasks to Guides and clinicians in real
              time, and generates quality-measure reporting for CMS Star Ratings compliance. Confirmed by public job
              postings on Venrock, Devoted's engineering stack comprises Go (primary backend language), PostgreSQL
              (relational database), gRPC and GraphQL (API layers), React and TypeScript (frontend), Terraform
              (infrastructure as code), and AWS (cloud hosting). The DevotedHealth GitHub organization (26 public
              repositories) demonstrates this stack: the most popular repo is terraform-provider-looker (Go, 3 stars, 24
              forks), confirming Looker use for BI; in-memory-db-starter (TypeScript) is the engineering hiring
              assessment template; Pyrseas (Python) is a PostgreSQL schema migration fork. Co-founder Ed Park credited
              Devoted's build-everything-simultaneously approach — not a sequential layer build — for enabling rapid
              Star Rating achievement by ensuring insurance, clinical, service, and data functions share a single source
              of truth.
