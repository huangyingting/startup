              retaliation policy. For HIPAA, Devoted publishes a dedicated policy; HIPAA compliance is a legal
              prerequisite for CMS contracting. However, no public HITRUST or SOC2 certification has been announced — a
              material gap for a platform processing protected health information for 466,000+ members on shared AWS
              cloud infrastructure. No public uptime SLA, disaster recovery documentation, or API security specification
              has been disclosed. The May 2025 layoff of approximately 120 employees (~5% of 2,460 staff) affected all
              departments and could slow Orinoco feature velocity. CMS V28 risk-model implementation and 2026 rate
              structure changes create ongoing financial pressure that could constrain the technology investment budget.
