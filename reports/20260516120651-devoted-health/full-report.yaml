      - number: '3.5'
        title: Switching Costs, Moats, and Competitive Dynamics
        blocks:
          - type: paragraph
            body: >
              Medicare Advantage beneficiaries face moderate structural switching costs. Annual enrollment periods (Oct
              15–Dec 7) create natural friction: members must actively re-enroll to switch plans, and changing plans may
              disrupt provider relationships if networks differ. Studies show high MA member retention rates
              industry-wide, with Clover reporting over 95% AEP member retention for 2026, suggesting that once
              enrolled, members rarely switch without a compelling reason (benefit cuts, plan exit, physician changes).
              However, the 2025–26 AEP saw atypical turbulence as millions of seniors were displaced by UHC, Aetna, and
              other insurer plan exits—creating an unusual window for growth for plans like Devoted Health and
              Alignment.


              Star ratings function as a self-reinforcing moat for high-performing plans. Plans with 4-star+ ratings
              receive quality bonus payments from CMS and can submit lower bids (since they receive higher rebates),
              enabling richer supplemental benefits that attract and retain members. Devoted Health's 95% of members in
              4-star+ contracts for 2026 gives it a compounding revenue advantage over lower-rated competitors. Clover's
              drop below 4-stars for its largest contract in 2026 illustrates the asymmetric downside of star rating
              declines—analysts estimated it could wipe out Clover's entire EBITDA.


              Distribution power is a significant incumbent moat. UHC, Humana, and Aetna maintain extensive broker
              networks, brand recognition, and marketing budgets that far exceed smaller plans. Independent agents and
              brokers drive a significant share of MA enrollment decisions, and incumbents' established relationships
              limit smaller plans' cost-efficient access to new members. Devoted Health's use of direct-to-consumer
              marketing, member guides, and word-of-mouth through its care model is differentiated but faces scaling
              challenges against incumbents' broker infrastructure.


              Provider access and network adequacy present both moats and challenges. Incumbents' scale enables
              favorable contracting with hospitals and specialist groups. Devoted's Devoted Medical model—integrated
              in-house virtual and in-home primary care—partially sidesteps this by owning clinical relationships, but
              also requires ongoing investment in clinical staff and technology. ChenMed's capitation model shows that
              deep physician alignment can produce superior outcomes for complex populations, and Devoted's model echoes
              this philosophy but within a payer-controlled structure rather than a standalone medical group. The risk
              of commoditization is real: as technology becomes more accessible, differentiated clinical capabilities
              that today require proprietary platforms may become table stakes, potentially compressing margins across
              the sector.
            claimRefs:
              - CP014
              - CP025
              - CP033
              - CP034
              - CP040
