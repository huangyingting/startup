  - number: 3
    title: Competitors
    sections:
      - number: '3.1'
        title: Competitive Landscape
        blocks:
          - type: paragraph
            body: >
              The Medicare Advantage market serves approximately 35.4 million beneficiaries as of early 2026,
              representing 51% of all Medicare-eligible adults. The competitive structure is highly tiered: three
              national incumbents (UnitedHealthcare, Humana, CVS/Aetna) collectively serve roughly 20 million members
              and control a disproportionate share of local markets. KFF analysis of 2024 CMS enrollment data found that
              97% of counties qualify as highly or very highly concentrated MA markets under Herfindahl-Hirschman Index
              criteria, and 90% of beneficiaries live in a county where one or two insurers enroll at least half of all
              MA enrollees. UnitedHealthcare dominates as the largest insurer in 41% of all counties, Humana in 25%.


              Enrollment growth has decelerated markedly. Annual MA enrollment growth was historically 7–10%, but fell
              to approximately 3% in 2026 as insurers retrenched in response to two consecutive years of reimbursement
              rate headwinds, rising medical utilization, and star-rating pressures. Several insurers—UHC, CVS/Aetna,
              Elevance, and Centene—shed tens to hundreds of thousands of MA members for the 2026 plan year, while
              Humana and Devoted Health grew. Milliman's analysis of 2024 financial filings reported the composite MA
              underwriting margin turned negative at -0.7%, down from +1.1% in 2023, affecting the full industry.


              The tech-enabled MA peer cohort—once including Oscar, Bright Health, Cano Health, Clover, and
              Alignment—has consolidated substantially. Oscar exited MA entirely in 2022–2023. Bright Health collapsed
              and exited its insurance business. Cano Health filed for Chapter 11 bankruptcy in February 2024. Clover
              and Alignment survived but experienced persistent net losses before turning to narrow profitability in
              2024. Devoted Health, remaining private and VC-backed, more than doubled its membership during the 2025–26
              AEP to approximately 470,000 members, positioning it as a survivor and a scale player among the
              tech-enabled cohort. The exits of failed peers created member displacement opportunities that benefited
              Devoted, Alignment, and Clover.


              Regional and nonprofit players—SCAN Health Plan, Kaiser Permanente, and VBC-specialist ChenMed—occupy
              differentiated niches less directly threatened by incumbent consolidation. Emerging CSNP-focused startups
              like Zing Health represent a growing adjacency in chronic-condition-focused special needs plans.
