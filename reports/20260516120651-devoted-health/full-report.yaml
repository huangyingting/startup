              three carriers alongside Humana and UnitedHealthcare on the Spark Advisors platform. Geographic expansion
              risk is material: nine states were added in a single AEP cycle for plan year 2026, and operational quality
              must scale simultaneously. Member concentration is inherently diversified by the nature of an individual-
              beneficiary insurance model — no single member represents a meaningful revenue share. Provider partnership
              risk exists, however: Devoted's HMO plans depend on network adequacy in each county, and if key
              health-system partners reduce MA contracting (as has occurred with Humana and Kettering Health), access
              disruption can trigger disenrollments. B2C concentration by geography is notable: Florida and Texas remain
              the largest states by member volume, and any deterioration in star ratings or network adequacy in those
              states would disproportionately affect Devoted's overall performance.
