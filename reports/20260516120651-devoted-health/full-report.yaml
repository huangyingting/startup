      - number: '4.2'
        title: Unit Economics and MLR Benchmarks
        blocks:
          - type: paragraph
            body: >-
              The Medical Loss Ratio (MLR)—medical claims paid divided by premium revenue—is the primary unit economics
              indicator for MA insurers, and the CMS minimum is 85%. Devoted's MLR has improved materially: 94% in 2022,
              89% in 2023, and approximately 86% in 2024, converging toward the sustainable zone for MA plans. For
              comparison, Alignment Healthcare reported an 88.8% medical benefits ratio for full-year 2024. Devoted's
              2023 regulated-plan operating loss widened to $55.4 million (from $35.3 million in 2022), but by Q1 2024
              the health plan entities reported positive net income of $11 million versus a $8.9 million loss in Q1
              2023, reflecting the MLR improvement and operating leverage from scale. Shelby Livingston's April 2025
              analysis of 33 state insurance filings for 2024 reported total revenue of approximately $3.3 billion and
              shrinking operating losses, with health plans net-positive on a combined basis when investment income is
              included. The V28 CMS-HCC risk model transition (phased 2024–2026) reduced the number of eligible ICD-10
              diagnosis codes from approximately 9,800 to 7,700, cutting risk-score RAF values and reducing MA revenues
              by approximately 3.12% per year. This headwind is likely embedded in the 2024 results; the V28 impact is
              expected to be fully absorbed by 2026. Devoted responded to cost pressures by cutting approximately 5% of
              its workforce in May 2025. Key unit economics including CAC, contribution margin by market, and the
              Devoted Medical operating subsidy remain private and unquantifiable from public data.
