      - number: '2.4'
        title: Growth Drivers and Adoption Constraints
        blocks:
          - type: paragraph
            body: >
              Medicare Advantage growth is underpinned by the most durable demand driver in US healthcare: approximately
              10,000 Americans turn 65 each day, adding roughly 1.5 million new Medicare-eligible beneficiaries
              annually. This demographic wave will continue for more than a decade. The program's bipartisan political
              durability—embedded in Medicare's infrastructure since the Medicare Modernization Act of 2003—and the CBO
              projection of 64% penetration by 2034 reinforce the structural demand thesis. Supplemental benefits are a
              powerful pull factor: average supplemental benefit value reached approximately $211 per member per month
              in 2025, up 76% from approximately $120 PMPM in 2021, as plans competed aggressively on benefit richness.
              Traditional FFS Medicare offers no equivalent coverage for dental, vision, hearing, or OTC needs.

              The C-SNP segment in particular combines demographic tailwinds (chronically ill seniors as the
              fastest-growing MA sub-population) with higher risk-adjusted revenue (complex chronic conditions generate
              higher HCC risk scores) and lower competitive intensity (D-SNPs require state contracting, I-SNPs require
              facility alignment, and C-SNPs require clinical infrastructure most incumbents lack). C-SNP enrollment
              grew approximately 49% in 2026; Devoted Health alone expanded its C-SNP footprint from 4 to 122
              county-level plans in a single year.

              Constraints are material and near-term. The V28 risk model was fully phased in at 100% in CY2026, reducing
              countable ICD-10 codes from ~9,800 to ~7,700 and cutting plan revenue by approximately 3.01% directly. The
              OIG is running an active audit of coding intensity patterns; CMS anticipated more than $7.6 billion in
              annual savings from V28 in 2024 alone. Star ratings present a compounding headwind: only 64–67% of MA
              enrollees are in 4+ star plans in 2026 (versus ~80% historically), compressing quality bonus payments
              industry-wide—Humana saw only 20% of its members in qualifying plans. Six MAOs fully exited the market in
              2026, forcing ~2.7 million non-SNP enrollees to re-shop. UnitedHealthcare shed plans covering 600,000+
              members for 2026 on top of 900,000+ exits in 2025. Milliman estimated 2026 total value added declined more
              than 7% across the industry; Part D deductibles rose from ~$230 to ~$375. MedPAC's March 2026 analysis
              estimates MA costs CMS approximately $76 billion more per year than equivalent FFS care, sustaining
              regulatory pressure for payment reform throughout the forecast horizon. Broker compensation rule changes
              and pending TPMO litigation add channel distribution uncertainty.
