  foundingLocation: Waltham, Massachusetts, United States
  headquarters: Waltham, Massachusetts, United States (Historic Waltham Watch Company building)
  productSummary: >-
    Medicare Advantage HMO and PPO plans for Medicare-eligible Americans 65+,
    integrated with the Devoted Medical in-house clinical group (virtual and
    in-home care), dedicated member Guides for navigation and benefits support,
    and the Orinoco data/AI platform that unifies claims, EHR, social-needs and
    member-interaction signals to drive risk stratification, care coordination,
    and personalized outreach.
  customerFocus: >-
    Medicare-eligible Americans aged 65+, with a particular concentration in
    Texas, Florida, and Ohio; sold through brokers/agents and direct channels
    during the Medicare Annual Election Period (AEP) and Open Enrollment Period
    (OEP).
  businessModel: >-
    Capitated premium revenue from CMS for each Medicare Advantage member, plus
    member premiums where applicable; revenue scales with member count x
    risk-adjusted per-member-per-month payment. Profitability is governed by
    medical loss ratio (MLR), CMS Star Ratings bonus payments, and the V28 risk-
    adjustment model phase-in. The "payvidor" structure internalizes a portion
    of medical spend through Devoted Medical, capturing margin and clinical
    quality otherwise paid to third-party providers.
  stage: Late-stage private (Series F-Prime closed January 2026)
  fundingStatus: >-
    Approximately $2.27 billion raised across Series B (Oct 2018, $300M, a16z),
    Series C (April 2020, $450M), Series D (Oct 2021, $1.15B at ~$12.6B post,
    Uprising / SoftBank), Series E (Dec 2023 $175M first tranche + Aug 2024
    $112M extension to $287M total, flat at $56.25/share), Series F (Nov 2025,
    $48M) and Series F-Prime (Jan 2026, $317M led by TSB with new investors GV,
    Morgan Health, Franklin Venture Partners).
