companyProfile:
  summary: >-
    Devoted Health, Inc. is a Delaware-incorporated, Waltham, Massachusetts-
    based Medicare Advantage insurer founded in 2017 by brothers Todd Park
    (Executive Chairman; second U.S. Chief Technology Officer under President
    Obama; co-founder of athenahealth and Castlight Health) and Ed Park (CEO;
    long-tenured COO and technical executive at athenahealth). The company
    operates an integrated "payvidor" model that combines HMO and PPO Medicare
    Advantage plans, the in-house Devoted Medical clinical group, dedicated
    member Guides, and the proprietary Orinoco operating platform. As of January
    2026, Devoted serves over 466,000 members across 29 states (up 121% YoY),
    earned a weighted-average CMS Star Rating of 4.6 for the 2025 cycle, and has
    raised approximately $2.27 billion across Series B through F-Prime rounds
    from Andreessen Horowitz, Premji Invest, Uprising, SoftBank Vision Fund 2,
    GIC, GV, Morgan Health, F-Prime Capital, and others.
  foundedDate: '2017-08-01'
  founders:
