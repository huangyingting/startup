summary:
  headline: >-
    Devoted Health is a credibly executing, founder-led Medicare Advantage
    payvidor with category-leading Star Ratings and a 121% YoY member-growth
    print, but its ~$13B private mark trades at a 3-4x EV/Revenue premium to
    distressed public MA comps and depends on continued capital, V28 risk-model
    absorption, and a turn to consolidated profitability that state filings
    have not yet shown.
