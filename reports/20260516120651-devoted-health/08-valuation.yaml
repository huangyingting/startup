  - id: scenarios-exit
    title: Scenario Analysis and Exit Readiness
    body: >
      Three scenarios bound the investment decision. In the bear case, Medicare Advantage sector headwinds
      accelerate — CMS implements further rate cuts for 2027, the V28 risk model erodes Devoted's risk-adjusted
      revenue, consolidated losses widen, and growth slows below 20% as competitor exit creates enrollment
      disruption. A valuation of $4–6 billion is plausible at 1.2–1.8x 2024E revenue, representing a 55–69%
      decline from the ~$13 billion private round. In the base case, Devoted sustains 30–40% membership growth
      through 2026–2027, MLR stabilizes at 85–87%, and the company approaches consolidated breakeven.
      A Series G or strategic transaction at $12–16 billion (3.5–5x forward 2025E revenue of ~$4B) represents a
      plausible outcome consistent with the Series F implied mark. In the bull case, Devoted achieves 50%+
      membership growth, launches profitable adjacencies (CenterWell-equivalent), and accesses the public markets
      via IPO at 4–6x forward revenue on ~$5B 2026E revenue, implying a $20–30 billion range.

      Exit pathways include: (1) IPO — market conditions for MA insurtech IPOs are challenging given sector
      multiple compression (ALHC at 0.8x forward PS, CLOV at 0.6x forward PS); (2) strategic acquisition by a
      major insurer (UnitedHealth, CVS/Aetna, Humana) or tech-enabled care company — the $2.64B raised creates
      preference overhang that would need to absorb; (3) continued private growth with further late-stage rounds.
      The Series F-Prime ($317M led by Centricus/The Space Between, with new strategic investors including
      Morgan Health/JPMorganChase, GV, Franklin Templeton, and VanEck) suggests the company is actively
      broadening its institutional investor base, possibly in preparation for a future liquidity event.

      Key diligence gaps include the absence of consolidated financial statements, unknown preference overhang
      from $2.64B raised, and no publicly disclosed Series F valuation. Thesis-break triggers include: (1)
      MLR returning above 89% for two consecutive quarters, (2) CMS announcing >3% revenue cuts for the 2027
      plan year, (3) loss of 4-star contracts covering more than 20% of membership, or (4) a down-round
      financing.
