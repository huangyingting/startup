chapter:
  number: 8
  title: Valuation
  summary: >
    Devoted Health's last confirmed private valuation of ~$12.9–13.1 billion (Series E, Dec 2023 and Aug 2024
    extension) implies an EV/Revenue multiple of ~4x on estimated 2024 revenue of $3.3 billion — a substantial
    premium to Medicare Advantage public comparables (ALHC 1.1x, CLOV 1.2x). The Dec 2025 N-PORT fair-value
    mark of $67.50/share (vs $56.25 at Series D/E) implies an enterprise value of ~$15 billion post-Series F.
    Strong membership growth (466k members Jan 2026, +121% YoY) and narrowing losses provide a credible bull
    case, but the 3–4x private premium to public comps, persistent unprofitability at the consolidated level,
    and regulatory headwinds justify a "track" recommendation with a stretched valuation stance.

sections:
  - id: thesis-recommendation
    title: Investment Thesis and Recommendation
    body: >
      Devoted Health occupies a structurally attractive niche — vertically integrated Medicare Advantage with
      owned clinical services, a proprietary technology stack (Orinoco), and a genuinely differentiated member
      experience. Revenue has grown from ~$1.1 billion in 2022 to an estimated $3.3 billion in 2024,
      membership has expanded from ~140,000 in Dec 2023 to 466,000 by January 2026, and regulated health plan
      entities briefly achieved a small net income of $11 million in Q1 2024. The company has raised
      ~$2.64 billion total since founding, backed by SoftBank Vision Fund 2, Andreessen Horowitz, General
      Catalyst, GIC, and others. These facts support a genuine growth thesis.

      The anti-thesis is anchored in valuation discipline. At the last confirmed private valuation of ~$12.9–13.1
      billion, Devoted trades at approximately 4x EV/Revenue on 2024 estimated revenues — versus 1.1–1.2x for
      comparable public Medicare Advantage insurers (ALHC, CLOV). The Series E round (Dec 2023) was priced at
      $56.25/share, the same per-share price as the Series D (Oct 2021), effectively a flat round that reflects
      investor caution even as revenue more than doubled. The company has not disclosed profitability at the
      consolidated level, and STAT News analysis of state regulatory filings confirms Devoted had not turned a
      profit through 2023. The Medicare Advantage sector faces structural headwinds — V28 risk model transition,
      CMS rate cuts, star-rating clawbacks — that compress sector multiples industry-wide.

      On balance, the recommendation is "track": the growth trajectory and clinical model are compelling, but
      entry at the current implied valuation (~$15 billion) requires a premium that is difficult to justify with
      publicly available evidence. Investors should monitor Q2 2026 state regulatory filings, the CMS 2027 rate
      announcement impact, and the company's path to consolidated profitability before committing capital.
