  - id: comp-analysis
    title: Comparable Company Analysis
    body: >
      The most directly comparable public companies are Medicare Advantage insurtech peers: Alignment Healthcare
      (ALHC) and Clover Health (CLOV). Larger pure-play MA insurers such as Humana (HUM) provide a sector floor,
      though their scale and diversification make direct comparison imprecise. Oscar Health (OSCR) is included as
      a former MA insurer that has since exited the segment; its current ACA-focused multiple is directionally
      informative about the broader managed-care valuation environment.

      As of May 15–16, 2026: ALHC has an enterprise value of $3.05 billion on 2024 revenues of $2.70 billion
      (EV/Revenue: 1.13x), 189,100 Medicare Advantage members at Dec 31, 2024, and an EV/member of approximately
      $16,130. CLOV has an enterprise value of $1.66 billion on 2024 insurance revenues of $1.34 billion
      (EV/Revenue: 1.24x), approximately 80,000 average MA members in 2024, and an EV/member of approximately
      $20,750. Humana has an enterprise value of $45.60 billion at an EV/Revenue of 0.33x (full company,
      including CenterWell segment; MA-specific metrics are not isolated in this analysis). Oscar has an EV of
      $2.65 billion on 2024 revenues of $9.18 billion (EV/Revenue: 0.29x), though Oscar exited Medicare
      Advantage in 2023 and its current multiple reflects an ACA-focused business.

      Applying public comp EV/Revenue multiples to Devoted Health's estimated 2024 revenue of $3.27 billion
      yields an implied enterprise value of $3.7–4.1 billion (at ALHC/CLOV multiples). This is 3–3.5x below the
      last confirmed private round valuation of ~$13 billion. The premium is partially explained by Devoted's
      higher growth rate (69% YoY revenue growth in 2024 vs 48–59% for ALHC/CLOV), integrated clinical model,
      and proprietary technology platform. However, private-to-public comp discounts of this magnitude are
      historically difficult to justify without a near-term liquidity event or clear profitability trajectory.

      Per-member EV for Devoted at the last private round ($13B / 244,763 Dec 2024 members) is approximately
      $53,100 — roughly 2.6–3.3x the ALHC/CLOV per-member range of $16,000–$21,000. If valued at ALHC
      per-member multiples on 466,000 Jan 2026 members: 466,000 × $16,130 = ~$7.5 billion implied — still well
      below the private round level.
