  - id: competitive-operational-cyber-risks
    title: Competitive, Operational and Cyber Risks
    body: >-
      Devoted Health competes in a structurally oligopolistic market. KFF's July 2025 analysis found that 79%
      of US counties were highly concentrated MA markets and 18% were very highly concentrated in 2024; United
      Healthcare held the top MA enrollment share in 41% of counties and Humana in 25%. UnitedHealthcare and
      Humana together comprised nearly 47% of national MA enrollment. Devoted, with roughly 466,000 members as
      of January 2026, remains a fraction of the scale of either incumbent, limiting its ability to negotiate
      provider contracts, absorb cost shocks, or invest in network density at equivalent unit economics. Sector
      failures—Bright Health's full exit, Cano Health's bankruptcy in February 2024, and Oscar Health's MA
      exit—demonstrate the lethal consequences of miscalibrated growth and market selection. Devoted's
      combination of rapid expansion into 29 states and a premium-positioned integrated care model is a
      differentiated strategy but amplifies execution risk if MLR targets slip.
      The Change Healthcare cyberattack in late February 2024 (a UnitedHealth subsidiary)
      disrupted claims processing, pharmacy operations, and prior authorization across the entire MA sector.
      CMS issued a directive on March 6, 2024 instructing all MA organizations to relax prior authorization
      requirements and offer provider advance funding. Devoted's dependency on third-party claims clearinghouses
      and vendor infrastructure—similar to every MA plan—means a comparable cyber incident could disrupt care
      delivery, trigger regulatory scrutiny, and create member experience damage. CMS's expanded audit
      program (2025) adds compliance-ops burden: MA organizations must demonstrate accurate diagnosis-code
      submission across multiple payment years, requiring ongoing investment in documentation, coding, and
      audit-response infrastructure.
    claimRefs:
