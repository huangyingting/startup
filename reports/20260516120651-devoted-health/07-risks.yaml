  evidenceGaps:
    - type: private-evidence-only
      severity: material
      topic: devoted-profitability
      missingEvidence: >-
        Devoted Health's consolidated operating loss for full year 2024 and 2025 on a GAAP basis, including
        non-health-plan subsidiaries such as Devoted Medical.
      whyItMatters: >-
        State-filed health plan data excludes corporate overhead, technology investment, and clinical group
        P&L; the true consolidated loss could be materially larger, affecting the capital runway assessment.
      diligencePath: >-
        Request audited consolidated financial statements or management accounts for FY2024; model break-even
        sensitivity to V28 and MLR trends.
      relatedQuestionRefs:
        - QR012
        - QR025

    - type: missing-source
      severity: material
      topic: cyber-security-certifications
      missingEvidence: >-
        Specific cybersecurity certifications or third-party audit records for Devoted Health's Orinoco platform
        and data infrastructure (e.g., SOC 2 Type II, HITRUST, HIPAA attestation).
      whyItMatters: >-
        Devoted handles sensitive member PHI at scale across 29 states; absence of publicly verifiable
        certification is a risk gap in an era of heightened MA cyber scrutiny.
      diligencePath: >-
        Request SOC 2 and HITRUST audit reports; verify incident response plan documentation; confirm vendor
        security posture for claims clearinghouse dependencies.
      relatedQuestionRefs:
        - QR026

    - type: private-evidence-only
      severity: material
      topic: RADV-CMS-audit-exposure
      missingEvidence: >-
        Whether Devoted Health has received any CMS RADV audit notice, demand letter, or advance overpayment
        assessment for payment years 2018–2024.
      whyItMatters: >-
        With OIG auditing all eligible MA contracts for 2024 V28 compliance and CMS auditing payment years
        2018–2024, Devoted's retroactive exposure is unknown; any clawback demand above $50M would be
        thesis-determinative.
      diligencePath: >-
        Request any CMS audit correspondence; obtain legal counsel representation letter; review regulatory
        reserve levels in state filings.
      relatedQuestionRefs:
        - QR028
      relatedTableRefs:
        - TR001

    - type: private-evidence-only
      severity: material
      topic: member-retention
      missingEvidence: >-
        Devoted Health's member churn rate, voluntary disenrollment rate, or net year-over-year retention
        metric for the 2024 and 2025 plan years.
      whyItMatters: >-
        High growth in gross enrollment could mask significant churn; net retention drives per-member
        economics and signals whether the care model is delivering durable value.
      diligencePath: >-
        Request enrollment flow data from company; cross-reference CMS monthly enrollment files for
        contract-level disenrollment trends in key states.
      relatedQuestionRefs:
        - QR029

    - type: missing-source
      severity: minor
      topic: devoted-litigation
      missingEvidence: >-
        Any pending material litigation, regulatory enforcement actions, or consent decrees specifically against
        Devoted Health (versus sector-wide actions that affect all MA plans).
      whyItMatters: >-
        No Devoted-specific litigation was identified in public court databases, but the absence of evidence
        is not the same as evidence of absence for a private company with 466,000 members.
      diligencePath: >-
        Search PACER and state court databases for Devoted Health Inc. and related entities; request legal
        counsel representation letter from company.
      relatedQuestionRefs:
        - QR030

    - type: missing-source
      severity: minor
      topic: broker-member-reputational-data
      missingEvidence: >-
        Systematic data on Devoted Health member complaints filed with state insurance departments, CMS star
        survey results broken out by plan, and broker sentiment surveys regarding Devoted's compensation and
        support practices versus competitors.
      whyItMatters: >-
        Reputational risk from adverse broker or member experience can accelerate disenrollment and damage
        the brand in new markets; the absence of granular complaint data limits the ability to assess this
        risk dimension quantitatively.
      diligencePath: >-
        Request state insurance department complaint ratios for Devoted's plan contracts; review CMS CAHPS
        survey filings; obtain broker NPS or satisfaction surveys from company.
      relatedQuestionRefs:
        - QR017

    - type: private-evidence-only
      severity: material
      topic: V28-plan-level-impact
      missingEvidence: >-
        Devoted Health's actual plan-level HCC coding intensity score and the precise basis-point revenue
        impact of V28 full phase-in specific to its membership mix, relative to the industry-wide average
        reported by CMS and MedPAC.
      whyItMatters: >-
        Plan-level coding intensity varies significantly; Devoted's integrated care model (Devoted Medical
        physicians) may have higher or lower baseline intensity than average, making the sector-wide V28
        impact range of 3-8% an imprecise proxy for Devoted's actual exposure.
      diligencePath: >-
        Request plan-level risk score data from company; model V28 sensitivity on Devoted's specific HCC
        distribution; compare to CMS Advance Notice technical rates for the plan's contract IDs.
      relatedQuestionRefs:
        - QR027
