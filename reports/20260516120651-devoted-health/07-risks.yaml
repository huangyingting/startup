company:
  name: Devoted Health

chapter:
  number: 7
  title: Risks
  summary: >-
    Devoted Health faces a convergence of regulatory, financial, and competitive risks that together constitute a
    high-residual-exposure profile for a still-unprofitable private Medicare Advantage insurer. The V28 CMS risk-model
    full phase-in in 2026 directly compresses revenue by reducing qualifying diagnosis codes; CMS's 2025 audit
    expansion to cover payment years 2018–2024 creates retroactive clawback exposure across the sector; and MLR
    deterioration across all major MA payers signals structural margin headwinds. Devoted's recent $366M Series F
    (January 2026) and strong 466,000-member base partially offset capital-concentration risk, but the company
    remains dependent on a small co-founder leadership team, private capital markets, and CMS goodwill.

sections:
  - id: regulatory-reimbursement-risks
    title: Regulatory and Reimbursement Risks
    body: >-
      Devoted Health's economics are entirely governed by CMS rate-setting and regulatory compliance. The most
      immediate structural threat is the full phase-in of the CMS-HCC Version 28 (V28) risk-adjustment model in
      2026, which now computes 100% of MA risk scores under the new framework. V28 removed or merged approximately
      2,000 ICD-10 codes, reclassified chronic conditions, and recalibrated demographic coefficients; industry
      analyses estimate this reduces average RAF scores by 5–8%, with CMS itself projecting a 3.12% average
      decline during the initial 2024 rollout. The OIG has announced a formal audit (announced January 2026,
      estimated completion FY2028) to verify whether CMS achieved its projected $7.6B savings target from V28 for
      payment year 2024—creating additional retroactive compliance scrutiny for all MA plans.
      On the rate side, CMS finalized a 5.06% average increase in 2026 MA payments—a positive development after
      2025 cuts—but the increase is unevenly distributed and does not fully compensate for V28-driven RAF compression
      or rising utilization. The 2025 CMS Final Rule's broker compensation provisions were vacated by a Texas federal
      court in August 2025 (ruling CMS lacked statutory authority for rate-making), while the MA audit program
      expanded in May 2025 to cover all eligible contracts for payment years 2018–2024, introducing retroactive
      payment-accuracy risk. MA star-rating litigation—Elevance lost its challenge to CMS's 2024 star-rating
      methodology (forfeiting an estimated $375M in bonus payments) and Humana's parallel suit was dismissed—
      signals that MA plans face both financial exposure from lower star ratings and limited legal recourse.
      Devoted's competitive advantage is partly anchored to its star ratings; losing 4+ star status on any
      significant contracts would reduce bonus payments and potentially trigger benefit cuts affecting retention.
    claimRefs:
      - CR001
      - CR002
      - CR003
      - CR004
      - CR005
      - CR006
