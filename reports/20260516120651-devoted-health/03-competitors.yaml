company:
  name: Devoted Health
chapter:
  number: 3
  title: Competitors
  summary: "Devoted Health competes in the Medicare Advantage market against a tiered landscape: national incumbent payers (UnitedHealthcare ~9.4M members, Humana ~7M, CVS/Aetna ~4M), technology-enabled upstarts (Alignment Healthcare ~280K, Clover Health ~153K), and regional nonprofit and VBC-focused players (SCAN, ChenMed, Zing Health). The MA market is highly concentrated—97% of counties were highly or very highly concentrated in 2024—with UHC and Humana dominating by county share. Several tech-enabled MA peers (Oscar, Bright Health, Cano Health) have exited or restructured under financial strain, validating the difficulty of the model. Devoted Health's differentiation rests on its integrated Devoted Medical care delivery arm, proprietary Orinoco technology platform, and high star rating performance (95% of members in 4-star+ contracts for 2026). However, incumbents have superior scale, distribution networks, and capital access, while the 2024–2026 rate environment and elevated medical utilization compressed margins industry-wide."

sections:
  - id: competitive-landscape
    title: "Competitive Landscape"
    body: |
      The Medicare Advantage market serves approximately 35.4 million beneficiaries as of early 2026, representing 51% of all Medicare-eligible adults. The competitive structure is highly tiered: three national incumbents (UnitedHealthcare, Humana, CVS/Aetna) collectively serve roughly 20 million members and control a disproportionate share of local markets. KFF analysis of 2024 CMS enrollment data found that 97% of counties qualify as highly or very highly concentrated MA markets under Herfindahl-Hirschman Index criteria, and 90% of beneficiaries live in a county where one or two insurers enroll at least half of all MA enrollees. UnitedHealthcare dominates as the largest insurer in 41% of all counties, Humana in 25%.

      Enrollment growth has decelerated markedly. Annual MA enrollment growth was historically 7–10%, but fell to approximately 3% in 2026 as insurers retrenched in response to two consecutive years of reimbursement rate headwinds, rising medical utilization, and star-rating pressures. Several insurers—UHC, CVS/Aetna, Elevance, and Centene—shed tens to hundreds of thousands of MA members for the 2026 plan year, while Humana and Devoted Health grew. Milliman's analysis of 2024 financial filings reported the composite MA underwriting margin turned negative at -0.7%, down from +1.1% in 2023, affecting the full industry.

      The tech-enabled MA peer cohort—once including Oscar, Bright Health, Cano Health, Clover, and Alignment—has consolidated substantially. Oscar exited MA entirely in 2022–2023. Bright Health collapsed and exited its insurance business. Cano Health filed for Chapter 11 bankruptcy in February 2024. Clover and Alignment survived but experienced persistent net losses before turning to narrow profitability in 2024. Devoted Health, remaining private and VC-backed, more than doubled its membership during the 2025–26 AEP to approximately 470,000 members, positioning it as a survivor and a scale player among the tech-enabled cohort. The exits of failed peers created member displacement opportunities that benefited Devoted, Alignment, and Clover.

      Regional and nonprofit players—SCAN Health Plan, Kaiser Permanente, and VBC-specialist ChenMed—occupy differentiated niches less directly threatened by incumbent consolidation. Emerging CSNP-focused startups like Zing Health represent a growing adjacency in chronic-condition-focused special needs plans.
    claimRefs: [CP001, CP003, CP004, CP005, CP006, CP007, CP008, CP009, CP010, CP011, CP012, CP019, CP020, CP021, CP023, CP035, CP036, CP037]

  - id: direct-competitors
    title: "Direct Competitors: Tech-Enabled MA Peers"
    body: |
      Clover Health (Nasdaq: CLOV) is the most technically comparable public peer. Operating in NJ, PA, TN, TX, GA, and AZ, Clover offers primarily wide-network PPO plans powered by its proprietary Clover Assistant AI platform, which aggregates patient data to guide primary care physicians toward preventive interventions. Full-year 2024 insurance revenue was $1.34 billion with adjusted EBITDA of $70 million—its first year of positive EBITDA, reflecting an improvement of $112 million year-over-year. Net GAAP loss from continuing operations improved to $46 million in 2024 from $210 million in 2023. Clover grew 53% during the 2025–26 AEP to approximately 153,000 members and expects first-ever full-year GAAP net income profitability in 2026. A significant risk: Clover's largest contract, covering 97% of its members, dropped below the 4-star threshold for 2026, potentially eliminating quality bonus payments and costing tens of millions in EBITDA according to Leerink Partners analysts.

      Alignment Healthcare (Nasdaq: ALHC) is a California-headquartered tech-enabled MA plan with the AVA (Advanced Value-based Architecture) platform that integrates claims, clinical, and operational data. Full-year 2024 revenue was $2.70 billion (+48.3% YoY) with 189,100 members at year-end 2024, growing 58.6% YoY. The company achieved its first full year of positive adjusted EBITDA as a public company in 2024 ($1.3 million) and reported a net loss of $128.1 million. Alignment's 2026 AEP performance added members to reach ~280,000. Critically, Alignment achieved 100% of its members in plans with 4-star or higher ratings for 2026—a meaningful quality signal. For 2025 revenue guidance was $3.72–3.78 billion, representing 37–40% growth.

      Oscar Health fully exited Medicare Advantage by 2023, shifting focus to ACA individual and small-group markets where it had ~1 million members. CEO Mario Schlosser cited structural challenges executing MA in a scalable way without deep provider partnerships. Oscar's MA membership never exceeded several thousand members at peak, making it a minor competitive overlap.

      Bright Health exited its insurance business entirely in 2023 amid near-bankruptcy conditions, having overextended geographically across ACA and MA markets. The company sold its California MA assets (Brand New Day, Central Health Plan, ~125,000 members) and pivoted to its NeueHealth care delivery subsidiary. Bright Health's collapse demonstrated the catastrophic risk of rapid MA expansion without sufficient capital and risk management discipline.

      Cano Health, a value-based primary care provider to MA members, filed for Chapter 11 bankruptcy in February 2024 with over $1 billion in funded debt. It had been valued at $4.4 billion post-IPO in 2021. Cano emerged from bankruptcy in July 2024 as a private company, converting $1 billion of debt to equity and securing $200 million in fresh capital. The company is now focused on 80 Florida clinics. Cano's collapse underscores the sensitivity of capitated care models to risk adjustment changes and MA rate compression.
    claimRefs: [CP013, CP014, CP015, CP016, CP017, CP018, CP019, CP020, CP021, CP022, CP038, CP039]
    tableRefs: [TP001]

  - id: incumbent-players
    title: "Incumbent Players: Scale Payers"
    body: |
      UnitedHealthcare (UHC), the MA market's largest insurer, enrolled approximately 9.4 million MA members as of February 2026—down 9% from 10.3 million before the AEP as the company aggressively exited plans serving over 600,000 members to recover margins. Despite the pullback, UHC retains commanding market position: it is the largest insurer in 41% of all US counties. UHC's 78% of members in 4-star+ plans for 2026 is strong and improved from 75% in 2025. Its parent UnitedHealth Group operates Optum, one of the largest health services and analytics platforms in the US, giving it unmatched data assets, care delivery integration via OptumCare, and pharmacy benefit management via OptumRx. However, UHC significantly underestimated accelerating medical cost trends for 2025, with executives citing "intensifying services costing more" across most encounters.

      Humana, the second-largest MA insurer, made an unusual contrarian bet for 2026, growing to over 7 million MA members from 5.8 million before AEP—adding roughly 1.2 million members while peers contracted. This growth gamble follows Humana's aggressive benefit reduction strategy in 2024–2025 that contracted its book to improve margins. Humana's 2026 star rating deteriorated, however: only 20% of members are in plans with 4-star+ ratings for 2026 (down from 25% in 2025), and average star rating for 2026 is 3.61. Humana has deep CenterWell senior-focused primary care infrastructure and a long VBC partnership with ChenMed, making it the most clinically integrated of the national incumbents.

      CVS Health / Aetna, the third-largest MA insurer with ~4 million members, integrated Oak Street Health (acquired for $10.6 billion in 2023) to build a differentiated primary care delivery asset. Oak Street operates roughly 200 primary care clinics across 25+ states focused on complex MA populations. Aetna led peers in the share of members in 4-star+ plans (81% for 2026, though down from 89% in 2025). CVS has been retrenching MA to optimize margins after heavy losses in 2024.

      Elevance Health (formerly Anthem) serves ~1.9 million MA members for 2026, down from 2.2 million, with 53% in 4-star+ plans—an improvement from 40% in 2025. Centene, the sixth-largest MA insurer, covers under 1 million members for 2026 after a 4% decline; its 4-star+ share improved dramatically from 1% to 18% for 2026. Both Elevance and Centene have Medicaid-heavy histories and are building MA presence through DSNP/CSNP expansion.
    claimRefs: [CP001, CP002, CP003, CP004, CP005, CP006, CP024, CP025, CP026]
    tableRefs: [TP002, TP003]
    figureRefs: [FP001]

  - id: regional-vbc-peers
    title: "Regional and Value-Based Care Peers"
    body: |
      SCAN Health Plan is one of the nation's largest nonprofit MA plans, serving seniors across 33 California counties as well as markets in Arizona, Nevada, Texas, New Mexico, and Washington. Founded nearly five decades ago, SCAN emphasizes nonprofit mission and benefit stability. For 2026, SCAN announced expanded benefits including $0 copay for primary care and Tier 1/2 drugs, significant dental allowances ($800–$4,000), and enhanced vision coverage. In a contracting market, SCAN's CEO Dr. Sachin Jain positioned SCAN as "a stable and consistent partner for older adults" as for-profit plans retreated. SCAN's nonprofit status, deep California roots, and mission alignment with senior care differentiate it from for-profit peers, though its geographic reach remains concentrated in California relative to national incumbents.

      ChenMed is a privately held capitated primary care company operating 120+ senior medical centers in 15 states under the Chen Senior Medical Center, Dedicated Senior Medical Center, and JenCare brands. ChenMed is not an MA insurer but operates as a downstream VBC partner: it accepts full-risk capitation from MA payers, bears medical cost risk, and shares savings from better outcomes. ChenMed has a long-standing partnership with Humana, formalized through a new five-year network agreement in February 2023, ensuring in-network access for Humana MA members at all ChenMed locations. ChenMed's concierge-style, physician-led model for complex low-income Medicare seniors is viewed as one of the highest-performing primary care platforms in the country. As a provider/capitation partner rather than a competing payer, ChenMed is both a potential partner and a model benchmark for Devoted Medical.

      Zing Health, founded in 2019 out of the American Medical Association's Health 2047 innovation lab by Dr. Eric Whitaker and Garfield Collins, focuses on Chronic Special Needs Plans (CSNPs) for underserved seniors with chronic conditions. Zing raised $140 million in September 2024, with participation from Health 2047 Capital Partners, CRG, and First Trust Capital Partners. Zing has been one of the fastest growing MA plans since 2023, with most members selecting CSNPs. It competes primarily in markets where traditional MA plans are not designed to handle chronic, complex populations. Zing's CSNP focus and community-based model represent a growing segment of the MA market, as CMS data shows CSNP enrollment grew 49% for 2026 according to Healthscape's analysis.

      Kaiser Permanente's integrated model—owned hospitals, employed physicians, and its own MA plans—covers approximately 2 million MA members for 2026. Virtually all Kaiser MA members remain in plans with 4-star+ ratings. Kaiser's geographic concentration in California, Pacific Northwest, Colorado, and Mid-Atlantic regions limits direct overlap with Devoted Health's footprint but demonstrates the viable ceiling of integrated care models at scale.
    claimRefs: [CP027, CP028, CP029, CP030, CP031, CP032]
    tableRefs: [TP004]
    figureRefs: [FP002, FP003]

  - id: switching-costs-moats
    title: "Switching Costs, Moats, and Competitive Dynamics"
    body: |
      Medicare Advantage beneficiaries face moderate structural switching costs. Annual enrollment periods (Oct 15–Dec 7) create natural friction: members must actively re-enroll to switch plans, and changing plans may disrupt provider relationships if networks differ. Studies show high MA member retention rates industry-wide, with Clover reporting over 95% AEP member retention for 2026, suggesting that once enrolled, members rarely switch without a compelling reason (benefit cuts, plan exit, physician changes). However, the 2025–26 AEP saw atypical turbulence as millions of seniors were displaced by UHC, Aetna, and other insurer plan exits—creating an unusual window for growth for plans like Devoted Health and Alignment.

      Star ratings function as a self-reinforcing moat for high-performing plans. Plans with 4-star+ ratings receive quality bonus payments from CMS and can submit lower bids (since they receive higher rebates), enabling richer supplemental benefits that attract and retain members. Devoted Health's 95% of members in 4-star+ contracts for 2026 gives it a compounding revenue advantage over lower-rated competitors. Clover's drop below 4-stars for its largest contract in 2026 illustrates the asymmetric downside of star rating declines—analysts estimated it could wipe out Clover's entire EBITDA.

      Distribution power is a significant incumbent moat. UHC, Humana, and Aetna maintain extensive broker networks, brand recognition, and marketing budgets that far exceed smaller plans. Independent agents and brokers drive a significant share of MA enrollment decisions, and incumbents' established relationships limit smaller plans' cost-efficient access to new members. Devoted Health's use of direct-to-consumer marketing, member guides, and word-of-mouth through its care model is differentiated but faces scaling challenges against incumbents' broker infrastructure.

      Provider access and network adequacy present both moats and challenges. Incumbents' scale enables favorable contracting with hospitals and specialist groups. Devoted's Devoted Medical model—integrated in-house virtual and in-home primary care—partially sidesteps this by owning clinical relationships, but also requires ongoing investment in clinical staff and technology. ChenMed's capitation model shows that deep physician alignment can produce superior outcomes for complex populations, and Devoted's model echoes this philosophy but within a payer-controlled structure rather than a standalone medical group. The risk of commoditization is real: as technology becomes more accessible, differentiated clinical capabilities that today require proprietary platforms may become table stakes, potentially compressing margins across the sector.
    claimRefs: [CP014, CP025, CP033, CP034, CP040]

