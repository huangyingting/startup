callouts:
  - calloutType: risk
    title: "Tech-Enabled MA Peer Group Has Suffered Catastrophic Failures"
    body: "Oscar Health exited MA, Bright Health collapsed under near-bankruptcy conditions, and Cano Health filed for Chapter 11 in February 2024. These failures demonstrate that technology and VBC differentiation alone do not protect against MA rate compression, coding-intensity scrutiny, and capital requirements. Devoted Health has navigated this period better than peers but its path to GAAP profitability remains unconfirmed in public disclosures."
    claimRefs: [CP019, CP020, CP021, CP022, CP023]

  - calloutType: risk
    title: "Star Rating Volatility Is an Existential Business Risk"
    body: "Clover Health's largest contract dropped below the 4-star threshold for 2026, with Leerink Partners estimating this could wipe out all of Clover's current pre-tax earnings. Devoted Health's 95% of members in 4-star+ contracts is a key advantage but requires sustained operational discipline across member engagement, clinical quality measures, and CMS administrative compliance. Any deterioration in star performance would directly impair bonus payments and rebate capacity."
    claimRefs: [CP015, CP034]

