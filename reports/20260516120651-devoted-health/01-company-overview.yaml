  - id: funding-history
    title: Funding History, Valuation, and Investor Base
    body: >-
      Devoted Health has raised capital across six named rounds since its 2017 founding, accumulating
      approximately $2.27 billion in total equity through January 2026 (Sacra estimate; individual round
      amounts confirmed via primary legal and official sources). The company's funding trajectory reflects
      initial rapid confidence from top-tier venture investors, a peak valuation of over $12.6 billion at
      the Series D (2021), and a subsequent valuation plateau—the December 2023 Series E was issued at
      the same $56.25 per-share price as the Series D, constituting a "flat round" that observers
      interpreted as reflecting MA sector headwinds rather than enterprise appreciation. The aggregate
      Series E, ultimately closed at $287 million in two tranches (December 2023 and August 2024), and
      the 2025–2026 Series F and Series F-Prime ($366 million) together sustained growth capital despite
      this valuation context.


      The Series B ($300 million, October 2018) was led by Andreessen Horowitz, with Premji Invest,
      Uprising, Venrock, and F-Prime Capital participating—the same VC syndicate that would anchor later
      rounds. The Series D ($1.15 billion, October 2021) was the largest round; Uprising led, SoftBank
      Vision Fund 2 co-led with its largest single investment, and returning investors (GIC, a16z,
      Premji, Maverick, Frist Cressey, NextView) were joined by new entrants ICONIQ Growth, General
      Catalyst, the Base10 Advancement Initiative, and Emerson Collective. Latham & Watkins advised
      SoftBank Vision Fund 2 and Fenwick & West advised Devoted Health in that transaction. The Series F
      and Series F-Prime (completed November 2025 and January 2026, respectively) brought in new
      institutional investors including GV (Google Ventures), Morgan Health (a division of
      JPMorganChase), Franklin Venture Partners (Franklin Templeton), VanEck, and MIG Private Equity,
      alongside significant participation from existing investors including Cox Enterprises, Premji
      Invest, a16z, and General Catalyst.


      No secondary sales, debt financing, or credit facility disclosures have been confirmed in primary
      sources reviewed for this chapter. The Devoted Health SPV II LLC (CIK 0002078127) filed a Form D
      in July 2025 for a $33 million private equity fund offering, indicating secondary or co-investment
      vehicle activity around Devoted Health equity.
