  - id: leadership-and-governance
    title: Founders, Leadership, and Board Governance
    body: >-
      Devoted Health was founded in 2017 by brothers Todd Park and Ed Park, both of whom built their
      careers at athenahealth, the health-technology company they co-founded (along with Jonathan S.
      Bush) in 1997. Ed Park served as a long-tenured COO and technical executive at athenahealth before
      co-founding Devoted, where he serves as CEO and drives day-to-day strategy, product, and
      operations. Todd Park serves as Executive Chairman; prior to Devoted, he co-founded Castlight
      Health in 2008, served as Chief Technology Officer of the U.S. Department of Health and Human
      Services (2009–2012), and then as the second US Chief Technology Officer under President Barack
      Obama (March 2012 – August 2014). Todd Park was also a key figure in the emergency repair of
      HealthCare.gov in 2013. Their combined background in healthcare technology, government policy, and
      managed care start-up execution represents an unusually strong founder-market fit for a Medicare
      Advantage business that relies on data infrastructure and regulatory navigation.


      The 2017 SEC Form D filing names Ed Park (CEO), Todd Park, Bryan Roberts, Robert Kocher, Kathleen
      Sebelius, and William Frist as the principal officers and directors at formation. Kathleen Sebelius
      served as U.S. Secretary of Health and Human Services from 2009 to 2014, providing regulatory
      insight and HHS network value. William Frist is a practicing physician, former U.S. Senate Majority
      Leader (2003–2007), and co-founder of Frist Cressey Ventures—Devoted's Series D and subsequent
      investor—making him both a board member and an aligned capital partner. Bryan Roberts and Robert
      Kocher are partners at Venrock, the venture firm that led or participated in early financing rounds.


      Key-person risk is concentrated in Ed Park as the operational CEO and public face of the company
      and in Todd Park as its technology visionary and government-network anchor. No material leadership
      changes have been disclosed through the report date; no CFO, COO, or other C-suite additions have
      been announced in public sources reviewed.
