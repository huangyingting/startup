  evidenceGaps:
    - type: private-evidence-only
      severity: blocking
      topic: cash-burn-runway
      missingEvidence: "Consolidated cash on hand, monthly operating burn rate, and estimated runway as of 2026"
      whyItMatters: "Without cash and burn data, investors cannot assess solvency risk or whether recent Series F funding provides sufficient runway to profitability or IPO"
      diligencePath: "Request audited consolidated balance sheet and cash flow statement; obtain CFO briefing with Q1 2026 cash position and 12-month burn forecast"
      relatedQuestionRefs: [QI015]

    - type: private-evidence-only
      severity: blocking
      topic: consolidated-operating-expenses
      missingEvidence: "Consolidated operating expenses including corporate parent overhead, Devoted Medical operating costs, and Orinoco capitalization or expense treatment"
      whyItMatters: "State filings cover only regulated health plan entities; the true operating loss including all entities could be materially larger than the health-plan-only figures suggest"
      diligencePath: "Request consolidated management accounts, audited GAAP financials, and intercompany transfer pricing policy between insurance plans and Devoted Medical"
      relatedQuestionRefs: [QI017, QI024]

    - type: missing-source
      severity: material
      topic: CAC-marketing-spend
      missingEvidence: "Customer acquisition cost, broker commission expense, and marketing spend for new member enrollment"
      whyItMatters: "Medicare Advantage enrollment is heavily broker-driven; high CAC would undermine per-member unit economics at scale and call into question capital efficiency"
      diligencePath: "Request sales and marketing line item from consolidated P&L; compare to industry-standard MA broker commission rates (~$750–1,200/new member)"
      relatedQuestionRefs: [QI011]

    - type: private-evidence-only
      severity: material
      topic: gross-margin-by-market
      missingEvidence: "Contribution margin and MLR by state entity and product line"
      whyItMatters: "Profitability varies dramatically by county benchmark; some markets may be structurally loss-making even at scale"
      diligencePath: "Obtain state-level entity financials from all 29-state insurance regulatory filings; request internal market-level P&L from management"
      relatedQuestionRefs: [QI012]

    - type: private-evidence-only
      severity: material
      topic: debt-obligations
      missingEvidence: "Existence and terms of any credit facility, revolving line of credit, or debt instruments"
      whyItMatters: "Undisclosed debt obligations would affect solvency analysis, covenants restricting operational flexibility, and return waterfall in a liquidation or acquisition scenario"
      diligencePath: "Review corporate parent balance sheet; request debt schedule from CFO; search UCC filings for security interests"
      relatedQuestionRefs: [QI016]

    - type: private-evidence-only
      severity: minor
      topic: Orinoco-capitalization
      missingEvidence: "Accounting treatment of Orinoco platform development costs — whether capitalized as intangible asset or expensed as R&D"
      whyItMatters: "Capitalized development costs create an intangible asset on the balance sheet; expensed costs depress operating income; treatment affects comparability with public peers"
      diligencePath: "Request notes to consolidated financial statements; ask auditor for capitalization policy under ASC 350-40"
      relatedQuestionRefs: [QI024]
