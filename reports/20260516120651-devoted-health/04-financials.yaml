company:
  name: Devoted Health

chapter:
  number: 4
  title: Financials
  summary: >-
    Devoted Health generated approximately $3.27 billion in health-plan revenue in 2024 (69% YoY growth), driven by 71% membership expansion to 244,763 members, with the medical loss ratio improving to ~86%—near the industry floor—and regulated-plan net income turning positive for the first time. The company has raised approximately $2.64–2.7 billion across all rounds through early 2026 (including a $365M Series F / F-Prime in late 2025–early 2026), but consolidated cash, burn rate, and consolidated operating costs remain undisclosed private metrics, representing the primary diligence blockers.

sections:
  - id: revenue-model-and-pricing
    title: Revenue Model and Pricing
    body: >-
      Devoted Health operates as a Medicare Advantage (MA) insurer; its primary revenue source is monthly capitation payments from the Centers for Medicare & Medicaid Services (CMS). CMS pays MA plans based on risk-adjusted county benchmark rates, with per-member-per-month (PMPM) amounts calibrated to each member's expected health costs using the Hierarchical Condition Category (HCC) risk-adjustment model. Devoted bids below the county benchmark to qualify for CMS rebates, which it uses to fund $0-premium plans with supplemental benefits—eliminating member premiums as a significant revenue source while building enrollment scale. The company also earns quality bonus payments from CMS for plans rated 4 stars or higher; Devoted's average Star Rating reached 4.6, with 95% of 2026 members in 4-star-or-better contracts, qualifying for the 5% quality bonus on capitation payments. Revenue grew from approximately $1.93 billion in 2023 to $3.27 billion in 2024, a 69% increase, reflecting a 71% membership increase to 244,763 members at year-end. Average annual revenue per member in 2024 was approximately $13,400 (~$1,117 per member per month), derived from CMS capitation. Revenue recognition follows standard insurance premium-earned accounting. Consolidated revenue and the full P&L including corporate parent and Devoted Medical costs are not publicly disclosed; the $3.27 billion figure represents regulated health plan entities only as disclosed in state insurance regulatory filings. Membership reached approximately 466,000 as of January 2026 as Devoted expanded to 29 states, implying annualized 2026 revenue in the range of $5–6.5 billion if ARPM is maintained.
    claimRefs: [CI001, CI002, CI003, CI004, CI005, CI024, CI026, CI027]
    tableRefs: [TI001, TI002]
    figureRefs: [FI001]

  - id: unit-economics-and-mlr
    title: Unit Economics and MLR Benchmarks
    body: >-
      The Medical Loss Ratio (MLR)—medical claims paid divided by premium revenue—is the primary unit economics indicator for MA insurers, and the CMS minimum is 85%. Devoted's MLR has improved materially: 94% in 2022, 89% in 2023, and approximately 86% in 2024, converging toward the sustainable zone for MA plans. For comparison, Alignment Healthcare reported an 88.8% medical benefits ratio for full-year 2024. Devoted's 2023 regulated-plan operating loss widened to $55.4 million (from $35.3 million in 2022), but by Q1 2024 the health plan entities reported positive net income of $11 million versus a $8.9 million loss in Q1 2023, reflecting the MLR improvement and operating leverage from scale. Shelby Livingston's April 2025 analysis of 33 state insurance filings for 2024 reported total revenue of approximately $3.3 billion and shrinking operating losses, with health plans net-positive on a combined basis when investment income is included. The V28 CMS-HCC risk model transition (phased 2024–2026) reduced the number of eligible ICD-10 diagnosis codes from approximately 9,800 to 7,700, cutting risk-score RAF values and reducing MA revenues by approximately 3.12% per year. This headwind is likely embedded in the 2024 results; the V28 impact is expected to be fully absorbed by 2026. Devoted responded to cost pressures by cutting approximately 5% of its workforce in May 2025. Key unit economics including CAC, contribution margin by market, and the Devoted Medical operating subsidy remain private and unquantifiable from public data.
    claimRefs: [CI005, CI006, CI007, CI008, CI009, CI010, CI011, CI014, CI022, CI023, CI028, CI029, CI030, CI038]
    tableRefs: [TI003]
    figureRefs: [FI002, FI003]

  - id: capital-stack-and-financing-history
    title: Capital Stack and Financing History
    body: >-
      Devoted Health has raised approximately $2.64–2.7 billion in equity capital across nine disclosed rounds since its 2017 founding. The Series B ($300M, 2018) and Series C ($450M, 2020) provided early operating capital. The defining round was the Series D ($1.15 billion, October 2021), co-led by Uprising and SoftBank Vision Fund 2, with participation from GIC, Andreessen Horowitz, ICONIQ Growth, General Catalyst, and Emerson Collective, at a post-money valuation of $12.6–12.7 billion. Latham & Watkins LLP's announcement confirms SoftBank Vision Fund 2 as the largest single Series D investor. A Series E of $175 million closed December 29, 2023, led by a syndicate including The Space Between, Highbury Holdings, GIC, Stardust Equity, Maverick Ventures, and Fearless Ventures, with participation from Andreessen Horowitz and General Catalyst. Prime Unicorn Index analysis of SEC filings shows the Series E was priced at $56.25 per share—the same price as the Series D—indicating essentially flat per-share valuation rather than a markdown. A $112 million Series E extension closed in August 2024 at a reported $13 billion post-money valuation. Most recently, Devoted raised $48 million in a Series F (November 2025) and $317 million in a Series F-Prime (January 2026) led by The Space Between and Centricus, with new investors GV, VZ Ventures, and Morgan Health. Total cumulative capital raised is approximately $2.64 billion per Sacra's analysis. Cash on hand, monthly burn rate, and runway are not publicly disclosed and represent a material diligence gap; the May 2025 workforce reduction of 5% suggests active cost management potentially driven by burn rate discipline.
    claimRefs: [CI016, CI017, CI018, CI019, CI020, CI021, CI028, CI033, CI039]
    tableRefs: [TI004]
    figureRefs: [FI004]

  - id: financial-gaps-and-diligence-blockers
    title: Financial Gaps and Diligence Blockers
    body: >-
      Devoted Health is a private company with no obligation to publish consolidated financial statements. All publicly available financial data derive from state insurance regulatory filings, which cover only the regulated health plan subsidiaries—not the corporate parent, the Devoted Medical medical group, or the Orinoco technology platform entity. This creates a systematic gap: state filings exclude corporate overhead, technology capitalization or expense, broker and marketing costs, and the intercompany economics between the insurance plans and Devoted Medical. The Orinoco platform is described as a full-stack payer and provider operations platform, suggesting significant ongoing technology investment that is excluded from plan-level filings. CMS requires MA plans to maintain at least an 85% MLR, with member rebates owed if exceeded; this creates a structural ceiling on plan-level margin, making cost discipline and volume scale the primary levers to profitability. The biggest diligence blockers for a financial assessment are: (1) consolidated cash and burn rate unknown; (2) CAC and marketing spend unknown; (3) gross margin by geography and product line unknown; (4) whether Devoted Medical is profitable or subsidized by the insurance plans is unknown; and (5) the treatment of Orinoco capitalization versus expensing is unknown. Secondary risks include CMS's 2026 payment rate environment and ongoing V28 risk model headwinds. The company's most recent 2026 funding tranches suggest capital access remains viable, but the absence of a profitability timeline disclosure is a persistent concern for return of capital analysis.
    claimRefs: [CI034, CI035, CI036, CI037, CI038, CI040]
    tableRefs: [TI005]

