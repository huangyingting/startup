          label: "4+ Star Quality Bonus (~+5%)"
        - id: gross-pmpm
          label: "Gross Revenue PMPM (~$1,117)"
        - id: medical-pmpm
          label: "Medical Claims PMPM (~$961, MLR 86%)"
        - id: net-pmpm
