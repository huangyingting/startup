    - id: CM011
      statement: Chartis data indicate the MA segment for insurtechs and challenger carriers is approximately 1.9% of total enrollment (roughly 650–700K enrollees in 2025), concentrated in HMO and C-SNP plan designs that favor clinical integration.
      type: estimated
      topic: ma-segments
      sourceRefs:
        - SM004
        - SM018
      confidence: medium
      freshness: recent

    - id: CM012
      statement: Devoted Health grew from approximately 210,000 to approximately 470,000 MA members during the 2026 open enrollment period, more than doubling its enrollment, with CEO Ed Park confirming approximately 500,000 members across 29 states as of early 2026.
      type: third-party-reported
      topic: ma-devoted
      sourceRefs:
        - SM009
        - SM025
      confidence: high
      freshness: current
      answersQuestionRefs:
        - QM019

    - id: CM013
      statement: The Medicare Advantage market has a tripartite commercial structure—beneficiary (user), CMS (payer), MAO (plan)—where CMS pays risk-adjusted capitation to MAOs that bear full actuarial risk; distribution occurs primarily through independent brokers, agents, and TPMOs.
      type: observed
      topic: ma-buyer
      sourceRefs:
        - SM001
        - SM029
      confidence: high
      freshness: historical
      answersQuestionRefs:
        - QM015

    - id: CM014
      statement: The Annual Enrollment Period (AEP) for Medicare Advantage runs from October 15 through December 7 each year; a separate Open Enrollment Period (OEP) runs from January 1 through March 31 allowing enrolled MA members to switch plans once.
      type: observed
      topic: ma-buyer
      sourceRefs:
        - SM001
        - SM027
      confidence: high
      freshness: historical
      answersQuestionRefs:
        - QM015

    - id: CM015
      statement: HMO plans represent approximately 56% of non-SNP MA plan offerings, while PPOs represent approximately 44% of all MA plans; HMOs limit enrollees to in-network providers but typically offer richer supplemental benefits and lower premiums.
