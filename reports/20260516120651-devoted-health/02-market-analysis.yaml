      statement: MA supplemental benefits—dental, vision, hearing, OTC allowances, and transportation—are the primary value proposition over FFS Medicare; these benefits do not exist in traditional Medicare, and their average value reached approximately $211 per member per month in 2025, up from ~$120 PMPM in 2021.
