    - id: CM016
      statement: Special Needs Plans (SNPs) represent approximately 21% of total MA enrollment; D-SNPs (dual-eligible) comprise approximately 83% of SNP enrollment, while C-SNPs (chronic condition) are the fastest-growing SNP type with approximately 49% enrollment growth in 2026.
      type: third-party-reported
      topic: ma-segments
      sourceRefs:
        - SM014
        - SM019
      confidence: high
      freshness: current
      answersQuestionRefs:
        - QM006
