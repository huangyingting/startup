callouts:
  - calloutType: strength
    title: Durable Demographic Engine Supports Structural Demand
    body: >
      Approximately 10,000 Americans turn 65 each day, adding ~1.5 million new Medicare-eligible
      beneficiaries annually. The CBO projects MA penetration will reach 64% of all Medicare
      beneficiaries by 2034, providing a structural demand floor that no near-term regulatory change
      is likely to fully offset. Devoted Health's focus on C-SNPs—the fastest-growing segment—further
      amplifies exposure to the highest-growth cohort within an already-growing market.
    claimRefs:
      - CM020
      - CM031
      - CM042

  - calloutType: risk
    title: V28, Star Ratings, and OIG Audit Create Simultaneous Revenue Headwinds
    body: >
      CY2026 marks the 100% phase-in of V28, cutting plan revenue by ~3.01%. Simultaneously, only
      64–67% of enrollees are in 4+ star plans—down from ~80% historically—compressing quality bonus
      payments. The OIG has an active audit of coding intensity, with CMS anticipating >$7.6 billion
      in annual savings. These three headwinds compound across the same fiscal year, creating the most
      challenging regulatory environment for MA economics since the program's expansion began.
    claimRefs:
      - CM023
      - CM024
      - CM025
      - CM029

  - calloutType: insight
    title: C-SNP Acceleration Represents the Market's Fastest Expanding Niche
    body: >
      Chronic Condition SNP enrollment grew approximately 49% in 2026—the fastest of any MA subsegment.
      Devoted Health expanded its C-SNP county footprint from 4 to 122 plans in a single year,
      positioning the company as one of the largest C-SNP operators nationally. Milliman classifies
      Devoted as a national carrier, reflecting the scale and speed of its C-SNP geographic expansion
      into a high-acuity segment that rewards clinical infrastructure over premium pricing.
    claimRefs:
      - CM030
      - CM045
      - CM047

  - calloutType: assumption
    title: Key Sizing Assumptions and Data Limitations
    body: >
      The 2026 TAM spend figure (~$507B) is a CMS rate-announcement projection plus USHealthInsights
      analysis, not final CMS accounting. SAM estimates for the HMO+SNP segment are constructed from
      Chartis plan-type mix percentages applied to total enrollment with an estimated overlap
      adjustment—no public source directly sizes the HMO+SNP addressable segment. Devoted Health's
      revenue, MLR, and C-SNP-specific enrollment are not publicly disclosed; all SOM figures compile
      third-party media reports and CEO statements. The 29-state addressable population estimate
      (~12M) is a rough approximation and carries low confidence.
    claimRefs:
      - CM009
      - CM011
      - CM044

