    - id: CM010
      statement: MA enrollment grew at 7–10% annually from 2017 to 2024, decelerated to 3.9% in calendar 2025, and further slowed to approximately 2.5% for 2026 as major insurers retrenched from unprofitable markets.
      type: third-party-reported
      topic: ma-growth
      sourceRefs:
        - SM004
        - SM005
        - SM009
      confidence: high
      freshness: current
      answersQuestionRefs:
