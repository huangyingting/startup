  claims:
    - id: CM001
      statement: Medicare Advantage (Part C) is the privately administered alternative to fee-for-service Medicare, covering inpatient (Part A), outpatient and physician (Part B), and usually drug benefits (Part D) through private health plans paid risk-adjusted capitation by CMS.
      type: observed
      topic: ma-definition
      sourceRefs:
        - SM029
        - SM027
      confidence: high
      freshness: historical

    - id: CM002
      statement: The MA market boundary excludes traditional fee-for-service Medicare, standalone prescription drug plans (PDPs), Medicare supplement (Medigap) plans, and employer-sponsored retiree coverage; beneficiaries cannot hold both Medigap and MA enrollment simultaneously.
      type: observed
      topic: ma-definition
      sourceRefs:
        - SM001
        - SM030
      confidence: high
      freshness: historical
      answersQuestionRefs:
        - QM006

    - id: CM003
      statement: MA serves as the primary substitute for traditional fee-for-service Medicare for beneficiaries age 65+ or qualifying disabled individuals; Medigap, employer retiree plans, and standalone PDPs are the other main status-quo alternatives.
      type: observed
      topic: ma-definition
      sourceRefs:
        - SM001
        - SM030
      confidence: high
      freshness: historical

    - id: CM004
      statement: MA plans must maintain an 85% medical loss ratio (MLR); failure to meet this threshold triggers rebate obligations to CMS, which must be returned to enrollees as supplemental benefits or premium reductions.
      type: observed
      topic: ma-mlr
      sourceRefs:
        - SM029
        - SM023
      confidence: high
      freshness: historical
      answersQuestionRefs:
        - QM012

    - id: CM005
      statement: CMS pays MA organizations a risk-adjusted monthly capitation per member, derived from per-capita FFS benchmarks set per county and adjusted by enrollee health status using HCC codes under the current V28 risk model.
      type: observed
      topic: ma-definition
      sourceRefs:
        - SM027
        - SM002
      confidence: high
      freshness: current
      answersQuestionRefs:
        - QM010

    - id: CM006
      statement: As of February 1, 2026, Medicare Advantage enrollment reached approximately 35.5 million beneficiaries, representing approximately 3% year-over-year growth from ~34.4 million in February 2025.
      type: third-party-reported
      topic: ma-enrollment
      sourceRefs:
        - SM017
        - SM009
      confidence: high
      freshness: current
      answersQuestionRefs:
        - QM002

    - id: CM007
      statement: MedPAC reported 2024 MA enrollment of 33.6 million beneficiaries (54% of all Medicare beneficiaries), with CMS paying approximately $494 billion to MA plans in 2024.
      type: third-party-reported
      topic: ma-enrollment
      sourceRefs:
        - SM001
        - SM020
      confidence: high
      freshness: recent
      answersQuestionRefs:
        - QM004

    - id: CM008
      statement: MedPAC's January 2026 enrollment update shows 2025 MA enrollment reached 34.9 million beneficiaries, representing 55% of all Medicare beneficiaries.
      type: third-party-reported
      topic: ma-enrollment
      sourceRefs:
        - SM020
        - SM008
      confidence: high
      freshness: recent
      answersQuestionRefs:
