tables:
  - id: TM001
    title: Market definition table
    columns:
      - Market Layer
      - Included Scope
      - Excluded / Adjacent
      - Primary Channel / Substitute
      - Strategic Note
    rows:
      - - Medicare Advantage (Part C) — core MA-PD
        - Inpatient (A), Outpatient/Physician (B), Drugs (D) via private plans; CMS risk-adjusted capitation
        - FFS Medicare (not included in capitation model)
        - CMS → MAO → Broker/Agent → Senior beneficiary
        - Core market; 35.5M enrollees, 55% Medicare penetration (2026)
      - - SNP Subsegment (D-SNP, C-SNP, I-SNP)
        - Dual-eligible (D-SNP), chronic condition (C-SNP), institutional (I-SNP)
        - General enrollment HMO/PPO (separate plan type)
        - State Medicaid agencies (D-SNP); Physician referral / Broker (C-SNP)
        - 21% of MA enrollment; fastest-growing segment in 2026
      - - Adjacent — FFS Traditional Medicare
        - Parts A + B reimbursed fee-per-service by CMS; Part D via standalone PDP
        - MA capitation model entirely
        - CMS directly reimburses providers
        - Status-quo substitute; ~45% of Medicare beneficiaries remain in FFS
      - - Adjacent — Medicare Supplement (Medigap)
        - Supplemental cost-sharing wrap on FFS Medicare
        - MA capitation; mutually exclusive with MA enrollment
        - Private insurers via brokers; cannot be combined with MA
        - Shrinking share as MA grows; direct competitor for age-in beneficiaries
      - - Adjacent — Employer Retiree Coverage (EGHP)
        - Employer-sponsored health coverage for Medicare-eligible retirees
        - MA capitation; employer budget funds rather than CMS
        - Employer HR/benefits departments → retirees
        - Declining; transitioning into MA/EGWP at retirement
      - - Adjacent — Standalone Part D PDP
        - Drug-only coverage for FFS Medicare enrollees
        - MA-PD integrated benefit (Part D is folded into MA-PD plans)
        - PDP insurers via broker/direct enrollment
        - Relevant only for FFS population; replaced by MA-PD for MA enrollees
    notes: >
      Market scope and substitutes derived from MedPAC (SM001), CMS regulatory guidance (SM027, SM029),
      and USHealthInsights (SM030). Enrollment share estimates are 2026 approximations.
    claimRefs:
      - CM001
      - CM002
