  - id: market-sizing
    title: Market Sizing — TAM, SAM, and SOM
    body: >
      Multiple independent data lenses converge on a 2026 total addressable market (TAM) of
      approximately $490–$530 billion in federal MA expenditures and 34.9–35.5 million enrollees.
      MedPAC's March 2025 report documents $494 billion in CMS payments to MA plans in 2024, with
      33.6 million enrollees representing 54% of Medicare. MedPAC's January 2026 update shows 2025
      enrollment reaching 34.9 million (55% penetration), while STAT News reported 35.5 million as
      of February 1, 2026—a 3% year-over-year gain from 34.4 million in February 2025. USHealthInsights
      projects CMS MA program spend at approximately $507 billion in 2026. The CMS 2026 Rate
      Announcement finalized a +5.06% net increase in average payments, totaling approximately
      $25 billion in additional federal spend with a 9.04% effective growth rate.

      Enrollment growth has decelerated sharply: from 7–10% annually during 2017–2024, to 3.9% in
      calendar 2025 (Chartis), to approximately 2.5% for 2026 and just ~1% during the 2025–26
      Annual Enrollment Period (Chartis, STAT News). The Congressional Budget Office projects MA
      penetration will reach 64% of all Medicare beneficiaries by 2034, anchoring a durable long-run
      growth case.

      The serviceable addressable market (SAM) for challenger MA carriers such as Devoted Health is
      the HMO-based and SNP-focused segment: approximately 20–22 million enrollees in managed-care
      plan designs that favor clinical integration, value-based primary care, and condition-specific
      care management over broad PPO networks. Within this SAM, the C-SNP and D-SNP subsegments are
      the highest-growth components, expanding approximately 49% and 10–15% in 2026, respectively.

      Devoted Health's current serviceable obtainable market (SOM) spans 29 operating states. Devoted
      more than doubled its enrollment during the 2026 AEP—from approximately 210,000 to roughly
      470,000 members—and CEO Ed Park confirmed approximately 500,000 members served as of early
      2026, making Devoted one of a handful of national challenger carriers by Milliman's classification.
    claimRefs:
