acknowledgedWarnings:
  - dimension: paywallRisk
    reason: >
      SM017 (STAT News, statnews.com) has accessStatus:paywall; only the introductory paragraphs
      were publicly visible during fetching, revealing the 35.5M enrollment figure as of February 1,
      2026. The same enrollment count is independently corroborated by HealthcareDive (SM009) citing
      the same CMS data release, and by MedPAC's January 2026 update (SM020) for the prior
      year-end figure. No claim rests solely on SM017; it functions as a secondary corroboration
      source for CM006 and CM036. Swapping for a fully open source would remove a high-reputation
      independent corroborating signal without improving analytical coverage.
