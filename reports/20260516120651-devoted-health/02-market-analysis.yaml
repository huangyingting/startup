  - id: TM003
    title: Segment / buyer map
    columns:
      - Segment
      - Beneficiary Profile
      - Plan Preference
      - Enrollment Channel
      - CMS Revenue Model
      - Size / Trend (2026)
    rows:
      - - Standard HMO — Cost-Sensitive
        - Age 65+ primary-care-focused; cost-sensitive; prefers $0-premium
        - HMO with $0 premium, dental/vision/hearing supplementals
        - AEP (Oct 15–Dec 7); independent broker/agent; Medicare.gov
        - County benchmark × risk score; rebate funds supplementals
        - Largest segment; declining as non-SNP HMOs shed members
      - - PPO — Mobility/Flexibility
        - Age 65+ specialist-dependent or travel-frequent; willing to pay premium
        - PPO with wide/national in-network and out-of-network access
        - AEP; broker; Medicare.gov comparison tools
        - Higher plan premium; benchmark × risk score with PPO flexibility cost
        - Declining; PPO plans reduced in 2026; large carriers retrenching
      - - D-SNP — Dual-Eligible
        - Low-income senior enrolled in both Medicare and Medicaid
        - D-SNP coordinating Medicare + Medicaid benefits under state alignment
        - Medicaid referral; MIPPA alignment; broker; community health workers
        - Medicare capitation + Medicaid per-member-per-month from state
        - 83% of SNP enrollment; D-SNP +10–15% in 2026
      - - C-SNP — Chronic Condition
        - Senior with qualifying chronic condition (diabetes, CHF, COPD, cancer)
        - C-SNP with care management programs, condition-specific benefits, coordinators
        - Physician referral; AEP; broker; community health outreach
        - Benchmark capitation + condition-specific HCC risk score uplift
        - Fastest-growing MA subsegment; +49% in 2026; Devoted primary focus
      - - EGWP — Employer Retiree Group
        - Medicare-eligible retiree through employer/union group benefits program
        - Employer Group Waiver Plan (EGWP) or direct Group MA contract
        - HR/benefits administration; employer enrollment systems
        - Negotiated group capitation + employer subsidy to CMS
        - Separate bidding process; not Devoted's current focus
      - - Under-65 Disability / ESRD
        - Disabled or end-stage renal disease Medicare beneficiary under 65
        - MA HMO or I-SNP with disability/ESRD-specific networks and benefits
        - CMS disability/ESRD Medicare trigger; AEP/OEP
        - Capitation with disability adjustment; often eligible for C-SNP
        - Smaller but high-acuity; often overlaps with C-SNP clinical needs
    notes: >
      Segment profiles synthesized from MedPAC (SM001), Chartis (SM004, SM005), ATI Advisory (SM014),
      and AHIP (SM015). Enrollment percentages are 2026 estimates; EGWP data not separately disclosed.
    claimRefs:
      - CM013
      - CM014
      - CM015
      - CM016
      - CM019

