chapter:
  number: 2
  title: Market Analysis
  summary: >
    Medicare Advantage (MA) is a $507 billion federal health insurance market in 2026, enrolling
    approximately 35.5 million beneficiaries (55% of Medicare), yet annual growth has decelerated
    sharply from 7–10% historically to ~3% as major insurers retreat under margin pressure, V28
    risk model impacts, and star-rating volatility. Devoted Health doubled its enrollment to
    ~470,000 during the 2026 AEP by concentrating in the Chronic Condition SNP segment—the
    fastest-growing MA subsegment at +49% in 2026—a niche that rewards clinical intensity over
    pure scale and insulates against the headwinds weighing on general-enrollment plans.

sections:
  - id: market-boundary
    title: Market Boundary, Inclusions, and Substitutes
    body: >
      Medicare Advantage (Part C) is the private-insurance alternative to traditional fee-for-service
      (FFS) Medicare. Under the program, CMS pays risk-adjusted monthly capitation to Medicare
      Advantage Organizations (MAOs) in exchange for covering all Medicare Part A (hospital inpatient),
      Part B (outpatient and physician), and in most cases Part D (prescription drugs) benefits within
      a single plan. Enrollees typically pay a plan premium in addition to the standard Part B premium,
      though many MA plans charge $0 additional premium and return surplus capitation as supplemental
      benefits—dental, vision, hearing, over-the-counter allowances, and transportation. Plans must
      maintain an 85% medical loss ratio (MLR) with any excess rebated to CMS to fund these
      additional benefits.

      The market boundary excludes three primary alternatives. First, traditional fee-for-service
      Medicare accounts for the remaining ~45% of Medicare beneficiaries; it is administered directly
      by CMS without capitation and offers no supplemental benefits. Second, Medicare Supplement
      (Medigap) plans layer cost-sharing coverage on top of FFS Medicare but do not replace the
      FFS relationship with CMS; beneficiaries cannot hold both Medigap and MA simultaneously.
      Third, employer-sponsored retiree coverage—though declining as companies shed retiree health
      liabilities—remains an alternative for beneficiaries whose former employer still offers
      subsidized group coverage. Standalone Part D Prescription Drug Plans (PDPs) serve FFS enrollees
      for drug coverage only and operate outside the MA capitation model entirely.

      Adjacent markets include Medicaid managed care (D-SNP plans operate at the Medicare-Medicaid
      intersection), ACA exchange and group commercial health plans (the pipeline from which 65+
      age-in to Medicare), and long-term care insurance for the highest-acuity senior population.
      CMS's risk-adjusted benchmark methodology—which sets per-county capitation rates by multiplying
      FFS per-capita spending by a quality-adjusted factor—directly couples the MA market boundary
      to the FFS Medicare program and makes the relative MA-versus-FFS cost ratio a persistent
      regulatory flashpoint.
