  - id: buyer-segment-map
    title: Buyer, User, and Payer Segmentation
    body: >
      The Medicare Advantage market has a tripartite commercial structure: the beneficiary (user)
      selects the plan, CMS (payer) funds the capitation revenue, and the MAO (plan) bears the
      full actuarial risk. This structure creates a government-funded consumer market where
      beneficiary satisfaction and benefit design drive enrollment, but regulatory compliance and
      risk coding determine revenue adequacy.

      The primary buyer is a Medicare-eligible senior (age 65+) or disabled/ESRD beneficiary. The
      Annual Enrollment Period (AEP) runs October 15 through December 7 each year; a secondary Open
      Enrollment Period (OEP) from January 1 through March 31 allows enrolled MA members to switch
      once. Independent brokers, agents, and third-party marketing organizations (TPMOs) intermediated
      an estimated 60–70% of new MA sales before CMS introduced new TPMO compensation restrictions.
      HMO plans represent approximately 56% of non-SNP plan offerings, while PPOs represent roughly
      44% of all MA plans. SNPs account for approximately 21% of total MA enrollment, with D-SNPs
      (dual-eligible) comprising 83% of SNP enrollment and C-SNPs the fastest-growing type.

      Four principal buyer archetypes dominate the segment map: (1) cost-sensitive 65+ seniors seeking
      $0-premium HMO plans with supplemental benefits; (2) geographically mobile seniors preferring
      PPO out-of-network flexibility; (3) dual-eligible low-income seniors served by D-SNPs, which
      coordinate Medicare and Medicaid benefits under state alignment contracts; and (4) seniors with
      qualifying chronic conditions—diabetes, CHF, COPD, cancer—served by C-SNPs that deliver
      condition-specific care management, clinical coordinators, and tailored supplemental benefit
      packages. The market is highly concentrated: UnitedHealthcare and Humana together control
      approximately 46–47% of national MA enrollment, and 97% of US counties are highly or very highly
      concentrated by HHI, leaving limited room for new entrants in most geographies outside of
      targeted expansion into underserved SNP populations.
    claimRefs:
