company:
  name: Devoted Health
chapter:
  number: 5
  title: Product & Technology
  summary: >-
    Devoted Health's product stack integrates Medicare Advantage plans (HMO, PPO, D-SNP, C-SNP)
    across 29 states with Devoted Medical's virtual-first and in-home clinical care, all powered
    by Orinoco — a proprietary PaaS for healthcare operations, CRM, and care coordination. Built on
    a Go/PostgreSQL/AWS stack with gRPC, GraphQL, React, and Terraform, Orinoco ingests claims and
    EHR data, identifies care gaps, and assigns tasks to care navigators (Guides) and clinicians
    in real time. The MyDevoted member app surfaces plan management and scheduling; over 90% of
    Devoted Medical encounters are telemedical. Key diligence gaps include absence of public HITRUST
    or SOC2 certifications, no disclosed API/reliability SLAs, and limited public detail on the
    AI risk-stratification model within Orinoco.

sections:
  - id: ma-plans-and-member-workflow
    title: "MA Plans, Plan Types & Member Workflow"
    body: >-
      Devoted Health offers Medicare Advantage plans in four structures: HMO, PPO, Dual Eligible
      Special Needs Plan (D-SNP), and Chronic Condition Special Needs Plan (C-SNP). Plans are
      available across 29 states as of 2026, expanded from 20 states in 2024. All plans replace
      traditional Medicare Parts A, B, and D with an integrated card; supplemental benefits on
      select plans include dental, vision, hearing, a Food and Home Card (managed by Optum
      Financial's Healthy Benefits+ platform), SilverSneakers fitness access, transportation, and
      meal delivery. Each enrolled member is assigned a Devoted Guide — a care navigator reachable
      by phone or text from 8 am to 8 pm weekdays — who coordinates benefits, schedules appointments,
      resolves billing issues, and connects members with community resources. Devoted Medical
      augments the plan with 24/7 virtual Care On Demand and in-home primary care at no copay.
      CMS awarded Devoted a 2025 weighted average of 4.3 Stars across 15 rated contracts, with
      88% of rated-plan members in 4-star-or-higher plans. For 2026, 95% of all members are
      enrolled in 4-Star-or-better contracts, reflecting the platform's care quality delivery.
