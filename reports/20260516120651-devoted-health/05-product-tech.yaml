  - id: compliance-security-and-product-risks
    title: Compliance, Security & Product Risks
    body: >-
      Devoted Health operates under CMS Medicare Advantage contracts and maintains a Medicare
      Compliance Program covering fraud, waste, and abuse (FWA) prevention, HIPAA, OIG/GSA
      exclusion screening, Anti-Bribery/Anti-Corruption, and Conflict of Interest policies.
      An anonymous FWA hotline (855-292-7485) and compliance@devoted.com are active reporting
      channels, and Devoted enforces a zero-tolerance retaliation policy. For HIPAA, Devoted
      publishes a dedicated policy; HIPAA compliance is a legal prerequisite for CMS contracting.
      However, no public HITRUST or SOC2 certification has been announced — a material gap for
      a platform processing protected health information for 466,000+ members on shared AWS
      cloud infrastructure. No public uptime SLA, disaster recovery documentation, or API
      security specification has been disclosed. The May 2025 layoff of approximately 120
      employees (~5% of 2,460 staff) affected all departments and could slow Orinoco feature
      velocity. CMS V28 risk-model implementation and 2026 rate structure changes create ongoing
      financial pressure that could constrain the technology investment budget. Devoted Medical's
      telehealth-first care model introduces clinical risk for members in acute distress if
      connectivity is interrupted or response time is delayed before emergency escalation.
