  - id: member-tools-and-integration-partners
    title: Digital Member Tools & Integration Partners
    body: >-
      The MyDevoted app (iOS: App Store ID 6748701214; Android: com.devotedhealth.memberportal)
      provides enrolled members with mobile access to their member ID card, referral and
      authorization tracking, Devoted Medical visit scheduling, drug formulary lookup, premium
      and claim reimbursement payments, Health Risk Assessment completion, plan document access,
      and Food and Home Card management. The my.devoted.com web portal offers equivalent
      functionality for members who prefer a browser-based experience. Integration partners
      include Optum Financial (Healthy Benefits+ card for OTC/food eligible members with chronic
      conditions), SilverSneakers by Tivity Health (fitness), and the Devoted agent portal
      (broker certification and enrollment). As of January 1, 2026, Magellan Healthcare no
      longer manages behavioral health services for Devoted members; Devoted now processes
      behavioral health authorizations and claims in-house, which will require corresponding
      Orinoco workflow capability. Provider network tooling, quick reference guides, and
      prior-authorization resources are hosted at devoted.com/providers/ for in-network physicians.
