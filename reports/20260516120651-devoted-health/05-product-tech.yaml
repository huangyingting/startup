callouts:
  - calloutType: strength
    title: Orinoco as Integrated Operating System
    body: >-
      Devoted Health's Orinoco platform unifies insurance operations, CRM, EHR, care-gap
      management, and quality reporting in a single PaaS — a structural advantage over incumbent
      MA plans that cobble together multiple vendor systems. This integration is demonstrably
      producing high Star Ratings (4.3 Stars weighted avg for 2025) at a speed that exceeds
      CMS industry benchmarks for new entrant plans (fewer than 10% receive 4+ stars in first year).
    claimRefs:
      - CE006
      - CE007
      - CE009
      - CE014

  - calloutType: risk
    title: Absent Security Certifications on PHI-Bearing Cloud Platform
    body: >-
      Devoted Health processes protected health information for 466,000+ members on an AWS-hosted
      platform with no publicly disclosed HITRUST or SOC2 certification as of May 2026. This is
      a material diligence gap for any investor, acquirer, or enterprise partner evaluating
      data-security posture. HIPAA compliance is a legal floor, not a security assurance standard.
    claimRefs:
      - CE034
      - CE035
      - CE036

  - calloutType: risk
    title: Behavioral Health In-Sourcing Adds Orinoco Build Risk
    body: >-
      As of January 2026, Devoted brought behavioral health authorization, claims, and clinical
      coordination in-house after the Magellan contract ended. This requires new Orinoco workflow
      modules covering behavioral health prior authorization, claims adjudication, and provider
      coordination — adding to technology build complexity during a period when the company also
      laid off ~5% of staff in May 2025.
    claimRefs:
      - CE032
      - CE037
      - CE041

