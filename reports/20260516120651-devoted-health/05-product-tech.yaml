  - id: devoted-medical-clinical-technology
    title: Devoted Medical & Clinical Technology
    body: >-
      Devoted Medical is the in-house virtual-first and in-home medical group built specifically
      for the Medicare population. It delivers 24/7 Care On Demand (telehealth), annual
      comprehensive health assessments, medication delivery, and in-home follow-up visits where
      available — all at no copay to members. Over 90% of Devoted Medical's encounters are
      delivered telemedically, a shift accelerated during COVID-19 when Devoted built a custom
      video conferencing module optimized for seniors. For members lacking their own devices,
      Devoted shipped cellular-equipped iPads; the company also provided pulse oximeters,
      wireless scales, and wireless blood pressure cuffs whose readings integrate into the
      Orinoco clinical workflow for continuous monitoring and proactive outreach. Devoted Medical's
      EHR was built from scratch. Clinicians are instructed to "not remember anything — emote,
      connect, feel, and software will remember everything for you," with Orinoco surfacing all
      relevant prompts and care-gap tasks autonomously. The average Devoted Medical clinician has
      eight years of experience. DevotedDoc, a spin-out, extends this telehealth infrastructure
      to correctional systems and safety-net providers, offering virtual addiction-specialty care
      and other services as a B2B product, representing early monetization of the clinical platform
      beyond the core Medicare Advantage membership.
