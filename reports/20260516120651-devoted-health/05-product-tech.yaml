  evidenceGaps:
    - type: private-evidence-only
      severity: material
      topic: app-engagement
      missingEvidence: >-
        MyDevoted app daily active users, monthly active users, app store ratings breakdown,
        and senior member adoption rate vs. total enrolled members.
      whyItMatters: >-
        App engagement is a key indicator of member self-service capability and Guide load;
        low adoption increases cost per interaction and limits data capture for Orinoco.
      diligencePath: >-
        Request app store analytics report from Devoted Health; check public App Store/Play Store
        ratings when sufficient reviews are available.
      relatedQuestionRefs:
        - QE007
        - QE016

    - type: missing-source
      severity: material
      topic: security-certifications
      missingEvidence: >-
        Independent HITRUST CSF assessment or SOC 2 Type II audit report covering the Orinoco
        platform and AWS infrastructure that hosts PHI for 466,000+ members.
      whyItMatters: >-
        Absence of HITRUST or SOC 2 attestation is a significant security diligence gap;
        federal healthcare contractors and many enterprise partners require such certifications.
      diligencePath: >-
        Request current HITRUST r2 certification certificate or SOC 2 Type II report from
        Devoted Health during due diligence; verify scope (IaaS, PaaS, PHI at rest/in transit).
      relatedQuestionRefs:
        - QE005
        - QE012
        - QE018

    - type: missing-source
      severity: material
      topic: prior-auth-workflow
      missingEvidence: >-
        Technical description of how Orinoco handles prior authorization, claims adjudication,
        and behavioral health management workflows following the January 2026 Magellan transition.
      whyItMatters: >-
        Behavioral health in-sourcing adds workflow complexity to Orinoco; prior-auth automation
        affects provider satisfaction and Star Ratings; any gaps in the transition could cause
        authorization delays for members.
      diligencePath: >-
        Request Orinoco product documentation for prior authorization and behavioral health
        workflows; interview Devoted provider relations team.
      relatedQuestionRefs:
        - QE022

    - type: private-evidence-only
      severity: material
      topic: platform-reliability
      missingEvidence: >-
        Orinoco platform uptime metrics, disaster recovery documentation, incident response
        plan, and business continuity plan for the AWS-hosted platform handling member PHI.
      whyItMatters: >-
        A platform outage would simultaneously disrupt Guide workflows, clinical documentation,
        claims adjudication, and member portal access — high blast radius for a single-platform
        architecture.
      diligencePath: >-
        Request SLA documentation, AWS architecture diagram, DR runbook, and historical uptime
        data from Devoted Health engineering leadership.
      relatedQuestionRefs:
        - QE024
        - QE019
        - QE027

    - type: missing-source
      severity: minor
      topic: ip-patents
      missingEvidence: >-
        Patent filings by Devoted Health or its subsidiaries related to risk stratification
        algorithms, care coordination software, or telehealth platform design.
      whyItMatters: >-
        Lack of patent protection for Orinoco's core algorithms means competitors could
        replicate the approach; trade-secret protection would need to be evaluated.
      diligencePath: >-
        Search USPTO full-text patent database for Devoted Health Inc. and related entities;
        review IP assignment provisions in founder employment agreements during diligence.
      relatedQuestionRefs:
        - QE025

    - type: missing-source
      severity: material
      topic: ai-competitive-comparison
      missingEvidence: >-
        Detailed independent comparison of Orinoco's AI and risk stratification capabilities
        versus competing platforms such as Clover Health GLIDE, Alignment HAVEN, Oak Street's
        EHR, and primary care-focused data platforms. Clover, Alignment, and Oak Street do not
        publish model architecture; no third-party benchmarks exist.
      whyItMatters: >-
        Investors evaluating Devoted's competitive differentiation need to understand whether
        Orinoco's care-gap identification and risk stratification are genuinely superior to
        competitor platforms or merely functionally comparable.
      diligencePath: >-
        Request model performance metrics (lift curves, care-gap closure rates per 1000 members)
        from Devoted; request expert AI/ML healthcare independent review during diligence.
      relatedQuestionRefs:
        - QE004

    - type: missing-source
      severity: material
      topic: devoted-medical-clinical-outcomes
      missingEvidence: >-
        Independent clinical outcomes benchmarking for Devoted Medical's telehealth and in-home
        model versus Oak Street Health (physician-employed PCPs), Alignment Healthcare, and
        traditional PCP-based primary care. Specifically: hospitalization rates, ER utilization,
        medication adherence, and HbA1c / blood pressure control for Devoted Medical vs. comparators.
      whyItMatters: >-
        Devoted Medical's clinical model is central to the Star Rating and capitation value
        proposition; its performance relative to competing care models determines whether the
        integration thesis is validated or replicable by competitors with external clinical groups.
      diligencePath: >-
        Request Devoted Medical clinical quality data (HEDIS measures, ER avoidance rates);
        review independent third-party assessments from CMS VBID pilot data if available.
      relatedQuestionRefs:
        - QE009

