      - number: '5.5'
        title: 合规、安全与产品风险
        blocks:
          - type: paragraph
            body: >-
              Devoted Health 依托 CMS Medicare Advantage 合同运营，并维护一套 Medicare Compliance Program，覆盖欺诈、
              浪费和滥用（FWA）防控、HIPAA、OIG/GSA 排除名单筛查、反贿赂 / 反腐败和利益冲突政策。匿名 FWA 热线 （855-292-7485）和 compliance@devoted.com
              是有效举报渠道，Devoted 对报复行为执行零容忍。HIPAA 方面， Devoted 发布了专门政策；HIPAA 合规是签署 CMS 合同的法律前提。但截至目前，公司未公开宣布 HITRUST 或 SOC2
              认证——对于一个在 AWS 共享云基础设施上处理 466,000+ 会员 protected health information 的平台，这是重大尽调缺口。 公开材料也没有披露 uptime
              SLA、灾难恢复文档或 API 安全规范。2025 年 5 月约 120 人裁员（约占 2,460 名员工的 5%）波及所有部门，可能拖慢 Orinoco 功能迭代。CMS V28 风险模型落地和 2026
              年费率结构变化带来持续财务压力， 可能挤压技术投入预算。Devoted Medical 以远程医疗优先的照护模式，若连接中断或急诊升级前响应延迟，会给急性困境中的 会员带来临床风险。
            claimRefs:
              - CE037
              - CE038
              - CE039
              - CE041
              - CE042
