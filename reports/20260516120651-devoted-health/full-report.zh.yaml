              Devoted 从 2022 年底约 82,000 名会员增长到 2026 年 1 月的 466,000 名，复合年增长率远高于市场。2026 计划年度， Devoted 报告会员数同比增长
              121%，在会员数超过 100,000 的 MA 母公司中增速最高。增长主要来自 2025 年 AEP （2025 年 10–12 月），Devoted 在这一轮进入 9 个新州，总覆盖达到 29 个州。2024
              年，公司服务 244,763 名会员， health-plan 收入 $3.3B（同比 +69%）。2023 年，会员数约 143,000，收入 $1.9B（同比 +76%）。2024 年 Q1 州文件显示，截至
              3 月 31 日，参保数约 212,000。Devoted 称截至 2026 年初，公司是增长最快、规模第八大的 MA 承保方。全国 MA 市场在 2026 AEP 期间参保仅增长 0.3%，远低于
              Devoted 的跃升，说明公司拿到的是份额，而非整体市场 扩张。2026 AEP 整体 MA 增长最高的州是德克萨斯（+35k）、佛罗里达（+27k）和北卡罗来纳（+23k），均为 Devoted
              核心地域。Devoted 的 C-SNP 申请量在 2026 AEP 期间位列前三。公司还在 2025 年 11 月和 2026 年 1 月完成 $366M Series F 与 F-Prime
