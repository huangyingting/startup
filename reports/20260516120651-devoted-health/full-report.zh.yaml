      - number: '2.3'
        title: 买方、用户与支付方分层
        blocks:
          - type: paragraph
            body: >
              Medicare Advantage
              市场有三方商业结构：受益人（用户）选择计划，CMS（支付方）提供按人头收入，MAO（计划）承担完整精算风险。由此形成一个政府资助的消费者市场：受益人满意度和福利设计拉动参保，但监管合规和风险编码决定收入是否充足。

              主要买方是符合 Medicare 资格的老年人（age 65+）或残障 / ESRD 受益人。Annual Enrollment Period（AEP）每年 October 15 至 December 7；次级
              Open Enrollment Period（OEP）从 January 1 至 March 31，允许已参保 MA 会员切换一次计划。在 CMS 引入新的 TPMO
              佣金限制之前，独立经纪人、代理和第三方营销组织（TPMOs）估计中介了 60–70% 的新增 MA 销售。HMO 计划约占非 SNP 计划供给的 56%，PPO 约占全部 MA 计划的 44%。SNP 约占 MA
              总参保的 21%；其中 D-SNPs（双重资格）占 SNP 参保的 83%，C-SNPs 是增长最快的类型。

              细分地图由四类主要买方画像主导：（1）对价格敏感、寻求 $0 保费 HMO 计划和补充福利的 65+ 老年人；（2）地理流动性较高、偏好 PPO 网络外灵活性的老年人；（3）由 D-SNP
              服务的双重资格低收入老年人，D-SNP 根据州对齐合同协调 Medicare 和 Medicaid 福利；（4）患有符合条件慢性病的老年人——糖尿病、CHF、COPD、癌症——由 C-SNP
              提供特定疾病照护管理、临床协调员和定制补充福利包。市场高度集中：UnitedHealthcare 和 Humana 合计控制全国 MA 参保约 46–47%；按 HHI 计算，97%
              的美国县属于高度或极高度集中，除非瞄准服务不足的 SNP 人群扩张，多数地区留给新进入者的空间有限。
