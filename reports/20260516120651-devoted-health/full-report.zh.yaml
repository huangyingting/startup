  - number: 2
    title: 市场分析
    sections:
      - number: '2.1'
        title: 市场边界、纳入范围与替代品
        blocks:
          - type: paragraph
            body: >
              Medicare Advantage（Part C）是传统按服务付费（FFS）Medicare 的私营保险替代方案。在这一项目下，CMS 向 Medicare Advantage
              Organizations（MAOs）支付风险调整后的月度按人头费用，换取单一计划覆盖全部 Medicare Part A（住院）、Part B（门诊和医生）以及多数情况下 Part
              D（处方药）福利。参保人通常除标准 Part B 保费外还需支付计划保费，不过许多 MA 计划收取 $0 额外保费，并把盈余按人头收入以补充福利形式返还——牙科、视力、听力、非处方补贴和交通。计划必须维持 85%
              医疗损失率（MLR）；超出部分需返还 CMS，用于资助这些额外福利。

              市场边界排除三类主要替代方案。第一，传统 FFS Medicare 覆盖剩余约 ~45% Medicare 受益人；它由 CMS 直接管理，没有按人头支付，也不提供补充福利。第二，Medicare
              Supplement（Medigap）计划是在 FFS Medicare 之上叠加费用分担保障，但不替代受益人与 CMS 之间的 FFS 关系；受益人不能同时持有 Medigap 和
              MA。第三，雇主赞助退休人员保障虽然随着企业削减退休医疗负债而下滑，但对仍有前雇主提供补贴团体保障的受益人来说，仍是替代方案。独立 Part D Prescription Drug Plans（PDPs）只为
              FFS 参保人提供药品保障，完全在 MA 按人头模型之外运行。

              相邻市场包括 Medicaid managed care（D-SNP 计划位于 Medicare-Medicaid 交叉点）、ACA 交易所和团体商业健康计划（65+ 人群进入 Medicare
              前的来源管道），以及面向最高急性程度老年人群的长期护理保险。CMS 的风险调整基准方法——用 FFS 人均支出乘以质量调整系数，设定每县按人头费率——把 MA 市场边界直接绑定到 FFS Medicare
              项目，也让 MA 相对 FFS 的成本比长期成为监管争议焦点。
