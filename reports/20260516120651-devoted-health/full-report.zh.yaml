chapters:
  - number: 1
    title: 公司概况
    sections:
      - number: '1.1'
        title: 公司身份、产品与总部
        blocks:
          - type: paragraph
            body: >-
              Devoted Health, Inc. 是一家在 Delaware 注册、总部位于 Massachusetts Waltham 的医疗健康公司，为 65 岁及以上美国人设计并运营一体化 Medicare
              Advantage 方案。公司最初以 Orinoco Health, Inc. 名义注册，并在 October 20, 2017 首次提交 SEC Form D，注册主要办公地址列为 15 Temple
              Street, Newton, MA。运营总部后来迁至 Waltham, MA 历史悠久的 Waltham Watch Company 大楼；联合创始人称，这一地点象征着延续美国创新传统的使命。法律主体仍为
              Devoted Health, Inc.（CIK 0001719459）。


              公司的产品模型由四层整合而成：（1）在部分县向符合 Medicare 资格的受益人提供 Devoted Health Medicare Advantage 保险计划（HMO 和 PPO），（2）Devoted
              Medical——一个虚拟优先、可上门的医疗团队，由数百名临床人员（医生、护士和其他临床人员）组成，只服务 Devoted Health 会员且不额外收费，（3）专属「Guide」礼宾专员，30
              秒内接听来电，并在一天内解决 90% 的健康问题，（4）Orinoco 平台——公司自研软件系统；公司称，它是首个能以高度一体化方式端到端支撑支付方和医疗服务方全部运营的现代平台。Devoted 的价值主张押在
              Orinoco 平台的实时照护编排上：用高强度预防和慢病管理，提前拦截成本高昂的急性事件。


              截至 January 30, 2026，Devoted Health 在 29 个州服务超过 466,000 名会员，同比增长 121%。CMS 发布的星级评级（2026 cycle）显示，Devoted
              所有纳入 Star 资格计划的会员都在关键指标达到 4 Stars 或以上的计划中，这些指标包括他汀治疗依从性、用药核对和血压控制，其中六份合同拿到最高 5-star 评级。公司入选 Fast Company 的
              Most Innovative Companies 2024 榜单和 Forbes 的 America's Best Startup Employers 2024 榜单。U.S. News & World
              Report 独立将 Devoted Health Medicare Advantage 的 2026 评级评为 4 out of 5，并指出约 92% 的计划月度综合保费为 $0。
