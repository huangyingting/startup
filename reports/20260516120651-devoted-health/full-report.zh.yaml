      - number: '6.5'
        title: 经纪人渠道、扩张与集中风险
        blocks:
          - type: paragraph
            body: >-
              Devoted 几乎完全依靠独立 broker / agent 渠道分销。经纪人使用专门的 Agent Portal 提交参保、核验 Medicare / Medicaid 资格、访问计划文件并管理佣金报表。面向
              2026 AEP 营销，Devoted 提供了覆盖所有州的完整 storefront， 包含 plan-at-a-glance 指南和参保材料。Devoted 2025 年自有经纪人调查显示，96%
              的经纪人认为其 agent support 优于其他 MA 承保方，95% 表示 Devoted 会倾听并落实经纪人反馈。2026 AEP 期间，Devoted 的 C-SNP 申请量在 Spark
              Advisors 平台上与 Humana、UnitedHealthcare 并列前三。地域扩张风险很高：2026 计划年度，公司在单一 AEP 周期内 新增 9
              个州，运营质量必须同步扩容。会员集中度则因个人受益人保险模型而天然分散——单一会员不会贡献有意义的收入占比。 但 provider partnership 风险存在：Devoted 的 HMO
              计划依赖各县网络充足度；若关键 health-system 伙伴减少 MA 合同（Humana 与 Kettering Health 已出现类似情况），服务可及性中断会触发退保。B2C
              地域集中也值得关注：佛罗里达和 德克萨斯仍是会员量最大的州，若两州 star ratings 或网络充足度恶化，将不成比例地影响 Devoted 整体表现。
