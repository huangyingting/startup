      - number: '4.2'
        title: 单位经济性与 MLR 基准
        blocks:
          - type: paragraph
            body: >-
              Medical Loss Ratio（MLR，即医疗赔付 / 保费收入）是 MA 保险公司最关键的单位经济性指标，CMS 下限为 85%。Devoted 的 MLR 已明显改善：2022 年 94%，2023 年
              89%，2024 年约 86%，正向 MA 计划可持续区间 收敛。对比来看，Alignment Healthcare 2024 全年 medical benefits ratio 为 88.8%。Devoted
              受监管计划 2023 年经营亏损扩大到 $55.4M（2022 年为 $35.3M），但到 2024 年 Q1，health plan 实体录得 $11M 净利润，2023 年 Q1 则亏损 $8.9M，说明
              MLR 改善和规模经营杠杆开始显效。Shelby Livingston 2025 年 4 月对 33 份州保险文件的分析显示，2024 年总收入约 $3.3B，经营亏损收窄；若计入投资收益，health
              plans 合计已转正。CMS-HCC V28 风险模型在 2024–2026 年分阶段切换，符合条件的 ICD-10 诊断代码从约 9,800 个降至 7,700 个，压低 RAF 风险评分值，MA
              收入每年约减少 3.12%。这一逆风很可能已体现在 2024 年结果中；到 2026 年，V28 冲击预计会被完全吸收。成本压力下，Devoted 2025 年 5 月裁员约
              5%。CAC、按市场拆分的贡献利润、Devoted Medical 运营补贴等关键单位经济性仍属非公开，公共资料无法量化。
