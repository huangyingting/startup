      - number: '2.4'
        title: 增长驱动因素与采用约束
        blocks:
          - type: paragraph
            body: >
              Medicare Advantage 增长背后，是美国医疗体系里最耐久的需求驱动：每天约 10,000 名美国人年满 65 岁，每年新增约 1.5 million 名符合 Medicare
              资格的受益人。人口浪潮还会延续十多年。项目的两党政治韧性——自 Medicare Modernization Act of 2003 起嵌入 Medicare 基础设施——以及 CBO 对 2034 年 64%
              渗透率的预测，强化了结构性需求逻辑。补充福利是强拉力：2025 年平均补充福利价值达到每会员每月约 $211，较 2021 年约 $120 PMPM 增长 76%，因为计划在福利丰富度上激烈竞争。传统 FFS
              Medicare 不为牙科、视力、听力或 OTC 需求提供等价保障。

              C-SNP 细分尤其同时具备人口顺风（慢病老年人是增长最快的 MA 子人群）、更高风险调整收入（复杂慢病推高 HCC 风险评分）和较低竞争强度（D-SNP 需要州合同，I-SNP 需要设施对齐，C-SNP
              需要多数既有巨头缺乏的临床基础设施）。C-SNP 参保在 2026 年增长约 49%；Devoted Health 一家公司就在一年内把 C-SNP 县级计划足迹从 4 个扩至 122 个。

              约束同样实质且近在眼前。V28 风险模型在 CY2026 完成 100% 分阶段落地，把可计入 ICD-10 代码从约 ~9,800 减至 ~7,700，并直接削减计划收入约 3.01%。OIG
              正在主动审计编码强度模式；CMS 预计仅 2024 年 V28 就可带来超过 $7.6 billion 年度节省。星级评级形成叠加逆风：2026 年只有 64–67% 的 MA 参保人在 4+ star
              计划中（历史上约 ~80%），全行业质量奖金支付被压缩——Humana 只有 20% 会员在符合资格计划中。2026 年有六家 MAO 完全退出市场，迫使约 ~2.7 million 名非 SNP
              参保人重新购物。UnitedHealthcare 为 2026 年剥离覆盖 600,000+ 名会员的计划，叠加 2025 年 900,000+ 人退出。Milliman 估计，2026 年全行业总增值下降超过
              7%；Part D 免赔额从约 ~$230 升至约 ~$375。MedPAC March 2026 分析估计，相比等价 FFS 照护，MA 每年让 CMS 多花约 $76
              billion，使支付改革压力贯穿整个预测期。经纪人佣金规则变化和待决 TPMO 诉讼又增加了渠道分发不确定性。
