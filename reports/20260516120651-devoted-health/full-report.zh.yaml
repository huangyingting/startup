      - number: '8.4'
        title: 情景分析与退出准备度
        blocks:
          - type: paragraph
            body: >
              三个情景界定投资决策。熊市情景下，Medicare Advantage 行业逆风加速——CMS 对 2027 年进一步降费，V28 风险模型侵蚀 Devoted
              风险调整收入，合并亏损扩大，竞争对手退出带来参保扰动，增长放缓至 20% 以下。按 2024E 收入 1.2–1.8x 估值， $4–6B 估值是合理区间，较约 $13B 私募轮下跌
              55–69%。基准情景下，Devoted 在 2026–2027 年维持 30–40% 会员增长， MLR 稳在 85–87%，并接近合并 breakeven。Series G 或战略交易估值 $12–16B（约
              $4B 2025E forward revenue 的 3.5–5x）是与 Series F 隐含标记一致的可行结果。牛市情景下，Devoted 达到 50%+ 会员增长，推出盈利性相邻业务
              （CenterWell-equivalent），并通过 IPO 进入公开市场；若以约 $5B 2026E revenue 的 4–6x forward revenue 定价， 隐含 $20–30B 区间。

              退出路径包括：（1）IPO——考虑到行业倍数压缩（ALHC forward PS 0.8x，CLOV forward PS 0.6x），MA insurtech IPO
              市场环境具有挑战；（2）被大型保险公司（UnitedHealth、CVS/Aetna、Humana）或 tech-enabled care 公司战略收购——已募 $2.64B 形成 preference
              overhang，需要被吸收；（3）继续私募成长，并进行更多 late-stage 轮次。Series F-Prime （$317M，由 Centricus / The Space Between
              领投，新战略投资者包括 Morgan Health / JPMorganChase、GV、Franklin Templeton 和 VanEck）说明公司正在拓宽机构投资者基础，可能在为未来流动性事件做准备。

              关键尽调缺口包括：没有合并财务报表、$2.64B 已募资本带来的 preference overhang 未知、Series F 估值未公开。打破投资论点的触发点包括： （1）MLR 连续两个季度回到 89%
              以上；（2）CMS 宣布 2027 计划年度收入削减超过 3%；（3）覆盖超过 20% 会员的 4 星合同流失； （4）出现 down-round financing。
