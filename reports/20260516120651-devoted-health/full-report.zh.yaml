      - number: '4.4'
        title: 财务空白与尽调阻断点
        blocks:
          - type: paragraph
            body: >-
              Devoted Health 是私营公司，没有义务发布合并财务报表。所有公开财务数据都来自州保险监管文件，覆盖范围只到 受监管 health plan 子公司，不包括公司母体、Devoted Medical
              医疗集团，也不包括 Orinoco 技术平台实体。 缺口因此是系统性的：州文件排除了公司管理费用、技术资本化或费用化、经纪人与营销成本，以及保险计划与 Devoted Medical
              之间的内部交易经济性。Orinoco 被描述为全栈付款方与医疗服务运营平台，意味着持续技术投入 不小，但 plan-level 文件看不到。CMS 要求 MA 计划 MLR 至少达到
              85%，若超出需向会员返还；这为 plan-level 利润率设置了结构性上限，成本纪律和会员规模才是通往盈利的主要杠杆。财务评估最大的尽调阻断点包括：（1）合并现金与 烧钱速度未知；（2）CAC
              与营销支出未知；（3）按地域和产品线拆分的毛利未知；（4）Devoted Medical 是否盈利， 还是由保险计划补贴，仍未知；（5）Orinoco 究竟资本化还是费用化，处理方式未知。次要风险包括 CMS
              2026 年支付费率 环境，以及 V28 风险模型持续逆风。公司最近的 2026 年融资批次说明资本通道仍可用，但没有披露盈利时间表，仍是回本 分析中的持续隐忧。
