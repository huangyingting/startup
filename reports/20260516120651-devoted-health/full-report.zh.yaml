      - number: '1.4'
        title: 里程碑、规模与负面事件
        blocks:
          - type: paragraph
            body: >-
              Devoted Health 从成立到 January 2026 的增长轨迹，呈现资本密集型 MA 创业公司典型的陡峭 S 曲线：约五年时间搭平台、铺足迹（2017–2022），随后借 Orinoco
              平台的可扩展性快速获取会员（2023 至今）。关键拐点包括 October 2022 从最初只在 Florida 上线扩展到 13 个州，December 2023 在 Florida 和 Ohio 的
              5-star 计划获得 CMS 认可，以及 January 2026 宣布在 29 个州拥有 466,000 名会员——121% 年增长率超过多数上市 MA 同行。


              根据 Endpoints News 对 33 份州保险文件的分析，受监管健康计划子公司的收入从 2023 约 $1.9 billion 增至 2024 约 $3.3 billion，同比增长
              69%。这些州文件只覆盖受监管计划实体，不包括母公司或医疗团队层面入账的 Orinoco 技术平台成本和 Devoted Medical
              支出——也就是说，披露财务低估了公司的完整成本基础。计划子公司层面的经营亏损在 2023 为 $55.4 million，但 2024 已收窄。计划子公司层面的净利润在 Q1 2024 转正（$11
              million，对比 Q1 2023 亏损 $8.9 million），部分由投资收益推动。公司从未披露合并盈利情况；其发言人在 mid-2024 确认，公司正在「向盈利能力建设迈进」。


              负面事件包括：May 2025 裁员约 5%，且与 CMS V28 风险模型削减和持续福利压缩带来的更广泛 Medicare Advantage 行业逆风同步发生；成立以来持续亏损；Series E
              平轮估值；以及保险经纪人社区论坛中讨论的会员服务担忧。公司通过州文件披露的财务是局部图景，不能视为合并表现全貌；Endpoints News 的分析方法也承认这一限制。
