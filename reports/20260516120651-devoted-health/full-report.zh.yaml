              Devoted Health 的创始人 Ed Park（CEO 兼 Co-Founder）和 Todd Park（Co-Founder 兼 Executive Chairman）同时是
              公司最可见的风险和最重要资产。Ed Park 曾任 Athenahealth COO/CTO；Todd Park 是 Obama 总统任内首任 US Chief Technology Officer，并联合创立
