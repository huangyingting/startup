      - number: '3.4'
        title: 区域性与价值型护理同行
        blocks:
          - type: paragraph
            body: >
              SCAN Health Plan 是美国最大的非营利 MA 计划之一，服务 California 33 个县以及 Arizona、Nevada、Texas、New Mexico 和 Washington
              市场的老年人。SCAN 成立近五十年，强调非营利使命和福利稳定性。2026 年，SCAN 宣布扩大福利，包括初级护理和 Tier 1/2 药品 $0
              copay、大额牙科额度（$800–$4,000）以及增强视力保障。在市场收缩时，SCAN CEO Dr. Sachin Jain 将 SCAN
              定位为老年人的「稳定且持续的伙伴」，因为营利性计划正在撤退。SCAN 的非营利身份、深厚 California 根基和与老年照护一致的使命，使其区别于营利性同行；不过相较全国性既有巨头，其地域覆盖仍集中在
              California。


              ChenMed 是一家私营按人头初级护理公司，以 Chen Senior Medical Center、Dedicated Senior Medical Center 和 JenCare 品牌在 15 个州运营
              120+ 家老年人医疗中心。ChenMed 不是 MA 保险商，而是下游 VBC 伙伴：它从 MA 支付方接受全风险按人头付款，承担医疗成本风险，并分享更好结果带来的节省。ChenMed 与 Humana
              长期合作，并在 February 2023 通过新的五年网络协议正式化，确保 Humana MA 会员可在所有 ChenMed 地点获得网内服务。ChenMed 面向复杂低收入 Medicare
              老年人的礼宾式、医生主导模型，被视为美国表现最好的初级护理平台之一。作为服务方 / 按人头伙伴，而非竞争支付方，ChenMed 既可能成为 Devoted Medical 的潜在伙伴，也是模型基准。


              Zing Health 于 2019 从 American Medical Association 的 Health 2047 创新实验室孵化，由 Dr. Eric Whitaker 和 Garfield
              Collins 创立，聚焦为患慢病的服务不足老年人提供 Chronic Special Needs Plans（CSNPs）。Zing 于 September 2024 融资 $140 million，参与方包括
              Health 2047 Capital Partners、CRG 和 First Trust Capital Partners。自 2023 年以来，Zing 是增长最快的 MA 计划之一，多数会员选择
              CSNPs。它主要在传统 MA 计划无法处理慢性、复杂人群的市场竞争。Zing 的 CSNP 聚焦和社区化模型代表 MA 市场中增长中的一段；Healthscape 分析的 CMS 数据显示，2026 年
              CSNP 参保增长 49%。


              Kaiser Permanente 的一体化模型——自有医院、雇佣医生和自有 MA 计划——2026 年覆盖约 2 million 名 MA 会员。几乎所有 Kaiser MA 会员仍处于 4-star+
              计划中。Kaiser 的地域集中在 California、Pacific Northwest、Colorado 和 Mid-Atlantic 地区，限制了与 Devoted Health
              足迹的直接重叠，但也展示了一体化照护模型在规模化时的可行上限。
