        - 索取逐州贡献分析；与各子公司的州保险文件交叉核对
      - - 下一轮触发条件和现有投资人权利
        - 重大 — 若不了解清算优先权堆叠、参与型优先股和反稀释条款，老股投资者经济账不清楚
