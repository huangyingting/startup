  - number: 3
    title: 竞争格局
    sections:
      - number: '3.1'
        title: 竞争格局
        blocks:
          - type: paragraph
            body: >
              截至 early 2026，Medicare Advantage 市场服务约 35.4 million 名受益人，占所有符合 Medicare 资格成年人的
              51%。竞争结构层次分明：三家全国性既有巨头（UnitedHealthcare、Humana、CVS/Aetna）合计服务约 20 million 名会员，并控制了不成比例的本地市场份额。KFF 对 2024
              CMS 参保数据的分析发现，按 Herfindahl-Hirschman Index 标准，97% 的县属于高度或极高度集中 MA 市场；90% 的受益人居住在一个县，其中一到两家保险公司至少吸纳一半 MA
              参保人。UnitedHealthcare 在全部县的 41% 中是最大保险商，Humana 在 25% 中最大。


              参保增长明显放缓。MA 年参保增长历史上为 7–10%，但 2026 年降至约
              3%；保险公司面对连续两年的报销费率逆风、医疗利用上升和星级评级压力而收缩。UHC、CVS/Aetna、Elevance、Centene 等多家保险公司在 2026 计划年削减数万到数十万 MA 会员，而
              Humana 和 Devoted Health 继续增长。Milliman 对 2024 财务文件的分析显示，综合 MA 承保利润率转负至 -0.7%，低于 2023 的 +1.1%，影响覆盖全行业。


              技术赋能 MA 同行队列曾包括 Oscar、Bright Health、Cano Health、Clover 和 Alignment，如今已大幅出清。Oscar 在 2022–2023 完全退出
              MA。Bright Health 崩塌并退出保险业务。Cano Health 于 February 2024 申请 Chapter 11 破产。Clover 和 Alignment 存活下来，但在 2024
              转向窄幅盈利前长期净亏损。Devoted Health 仍为私营且有 VC 支持，在 2025–26 AEP 期间会员数翻倍以上，达到约 470,000
              名，使其成为技术赋能队列中的幸存者和规模玩家。失败同行退出制造了会员迁移机会，利好 Devoted、Alignment 和 Clover。


              区域性和非营利玩家——SCAN Health Plan、Kaiser Permanente 以及 VBC 专家 ChenMed——占据差异化利基，受到既有巨头整合的直接威胁较小。Zing Health 等新兴聚焦
              CSNP 的创业公司，代表慢病特殊需求计划中一个增长中的相邻方向。
