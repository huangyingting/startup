      - number: '8.5'
        title: 图表
        blocks:
          - type: callout
            title: 建议：跟踪
            body: >
              Devoted Health 在当前隐含估值（约 $13–15B）下获得「跟踪」建议。成长故事真实：466,000 名会员、$3.3B+ 估计收入， 单位经济性改善。但相对上市可比公司的私募市场溢价（3–4x
              EV/Revenue vs ALHC / CLOV 的 1.1–1.2x）要求公司拿出合并盈利路径 和 / 或尚未落地的流动性事件。投资者应在全年 2025 年监管文件可得后（通常为 2026 年 Q2），并在
              CMS 2027 年费率公告厘清行业 经济性后重新评估。
            calloutType: recommendation
            claimRefs:
              - CV001
              - CV006
              - CV030
          - type: callout
            title: 估值溢价是首要风险
            body: >
              按 $13–15 billion 估值，Devoted 的 EV/Revenue 倍数是上市 MA 可比公司的 3–4 倍。Series E 是平轮（与 Series D 同为
              $56.25/股）、合并口径持续亏损（STAT 分析已确认至 2023 年），且公司未披露合并 P&L，这些都是关键风险。若估值倍数回归 ALHC/CLOV 水平，公允价值约为 $4–5
              billion——较私募标记价约折价 65%。
            calloutType: risk
