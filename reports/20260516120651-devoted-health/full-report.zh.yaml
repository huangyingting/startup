      - 限制
    rows:
      - - 患有 3 种慢性病的老年人，需要在 4 名专科医生和一名 PCP 之间协调护理
        - 排期分散在互不连接的系统里；会员手工协调
        - Devoted Guide 通过 Orinoco 协调所有预约和护理计划；Devoted Medical 补上缺口
        - 减少护理碎片化；公司称 NPS 行业领先，可比 Apple/Amazon
        - Guide 容量受限，Guide 与会员比例未披露；并非所有县都提供上门服务
      - - 农村地区会员下班后需要急症护理（附近没有 ER）
        - 去急诊室或等到下一个工作日；远程医疗接入临时拼凑
        - Devoted Medical 通过视频或电话提供 24/7 Care On Demand；脉搏血氧和血压数据已在病历中
        - 当天可接入；分诊参考设备数据；可能配送药物
        - 依赖远程医疗的模式在连接失败时带来临床风险；未披露升级 SLA
      - - 会员参保时需要理解福利、找医生并设置药房
        - 呼叫中心等待时间长；纸质计划文件；药房注册分离
        - MyDevoted App + Devoted Guide：药品查询、提供方搜索、即时参保支持
        - 95% 会员表示愿意向家人推荐 Devoted Health（公司调查）
        - 应用参与率和首次联系解决率指标未公开
      - - CMS 质量指标报告（HEDIS/Stars）需要理赔 + 临床文档
        - 人工病历审查和补充数据提交；成本高且易出错
        - Orinoco 从整合理赔 + EHR 自动生成质量报告；护理缺口提醒主动闭环指标
        - 2025 年加权平均 4.3 星；符合星级资格计划中，100% 会员所在计划血压控制达 4 星及以上
        - 未披露从理赔到星级评分的精确归因模型及 AI 提升幅度；V28 模型对风险编码的影响不明
      - - 经纪人需要完成认证、访问计划材料，并提交参保申请
        - 认证要跨多个系统，申请仍走纸质流程；支持响应慢
        - Devoted Agent Portal、经纪人指南和专属区域销售支持团队
        - 96% 的经纪人认为 Devoted 的经纪人支持优于其他保险公司
        - 经纪人门户是独立于 Orinoco 的数字工具；整合深度未披露
