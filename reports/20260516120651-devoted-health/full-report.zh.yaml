        - 会员记录超过 466k，横跨 29 个州，schema 迁移复杂度随之上升；未披露分片或多区域复制策略
      - - React / TypeScript 前端
        - 面向 Guides、临床人员、计划运营员工和会员门户（my.devoted.com）的 Web UI
        - GraphQL API；Terraform 配置的 AWS 基础设施
        - Guide 和临床工作流依赖浏览器界面，必须有稳定网络；会员端门户的无障碍合规仍需核验
      - - AWS 云基础设施
        - 托管全部 Orinoco 服务、存储受保护健康信息（PHI），并交付基于 Web 的会员门户
        - Terraform 管理基础设施即代码；AWS 可用区
        - PHI 放在多租户公有云上，未公开 HITRUST 或 SOC2 认证；AWS 单一区域宕机会中断运营；未披露 BCP/DR 计划
      - - Looker BI 平台
        - 商业智能、质量指标仪表盘、运营报告和星级追踪
        - Looker API；DevotedHealth GitHub 组织维护的 terraform-provider-looker
        - 依赖 Looker 云服务；Looker 一旦宕机，CMS 质量报告准备会受影响
      - - 自研 EHR + 视频会议模块
        - 为 Devoted Medical 做临床文档记录；远程医疗界面针对老年人优化
        - AWS 视频服务或自研 WebRTC；会员设备接入（iPad 项目）
        - 自研 EHR 若不做定制集成，无法与外部 EHR 系统互操作；远程医疗连通性取决于会员宽带 / 蜂窝网络
