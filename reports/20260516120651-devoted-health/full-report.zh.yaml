      - number: '4.3'
        title: 资本结构与融资历史
        blocks:
          - type: paragraph
            body: >-
              Devoted Health 自 2017 年创立以来，已通过九轮披露融资累计募资约 $2.64–2.7B。Series B（2018 年， $300M）和 Series C（2020
              年，$450M）提供了早期运营资金。决定性一轮是 2021 年 10 月的 Series D： 规模 $1.15B，由 Uprising 和 SoftBank Vision Fund 2
              共同领投，GIC、Andreessen Horowitz、 ICONIQ Growth、General Catalyst、Emerson Collective 参投，投后估值 $12.6–12.7B。Latham
              & Watkins LLP 的公告确认 SoftBank Vision Fund 2 是 Series D 最大单一投资方。2023 年 12 月 29 日， Devoted 完成 $175M Series
              E，领投财团包括 The Space Between、Highbury Holdings、GIC、 Stardust Equity、Maverick Ventures、Fearless
              Ventures，Andreessen Horowitz 和 General Catalyst 继续参投。Prime Unicorn Index 对 SEC 文件的分析显示，Series E 定价为每股
              $56.25，与 Series D 相同，说明每股估值基本持平，而非下调。2024 年 8 月，公司又完成 $112M Series E 延伸轮，披露投后估值 约 $13B。最近，Devoted 在 2025 年
              11 月完成 $48M Series F，并在 2026 年 1 月完成 $317M Series F-Prime，由 The Space Between 和 Centricus 领投，新投资者包括 GV、VZ
              Ventures 和 Morgan Health。按 Sacra 分析，累计融资约 $2.64B。现金余额、月度烧钱速度和 runway 均未公开，构成重大尽调缺口； 2025 年 5 月裁员
              5%，说明公司在主动控费，可能受烧钱纪律驱动。
