  - number: 4
    title: 财务情况
    sections:
      - number: '4.1'
        title: 收入模型与定价
        blocks:
          - type: paragraph
            body: >-
              Devoted Health 本质上是 Medicare Advantage（MA）保险公司，收入主轴是 CMS 每月按人头支付的 capitation。CMS 按各县风险调整后的基准费率向 MA
              计划付款，PMPM 金额用 HCC 风险调整模型校准到 每名会员的预期医疗成本。Devoted 以低于县基准的报价拿到 CMS 返利，再用返利补贴 $0 保费计划和
              补充福利；会员保费因此不是重要收入来源，规模靠参保量拉动。CMS 还向 4 星及以上计划发放质量奖金； Devoted 平均 Star Rating 达到 4.6，2026 年 95% 的会员落在 4
              星及以上合同内，可拿到 capitation 5% 的质量奖金。收入从 2023 年约 $1.93B 增至 2024 年 $3.27B，增长 69%；年末会员数增至 244,763，增长 71%。2024
              年每名会员年收入约 $13,400（PMPM 约 $1,117），主要来自 CMS capitation。收入确认沿用保险保费赚取会计。合并收入以及包含母公司和 Devoted Medical 成本的完整 P&L
              未公开；$3.27B 只代表州保险监管文件披露的受监管 health plan 实体。到 2026 年 1 月，会员数约 466,000，覆盖 29 个州；若 ARPM 维持不变，2026 年年化收入隐含约
              $5–6.5B。
