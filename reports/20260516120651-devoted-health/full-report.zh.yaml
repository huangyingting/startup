  - id: TV005
    title: 投资逻辑失效与止损触发器
    columns:
      - 触发项
      - 阈值 / 事件
      - 投资逻辑影响
      - 操作含义
    rows:
      - - MLR 恶化
        - MLR 连续两个季度超过 89%
        - 单元经济投资逻辑失效；医疗成本管理优势消失
        - 下调至回避；只有连续两个季度稳定后再重看
      - - CMS 降费
        - CMS 2027 费率公告意味着 Devoted 计划类型有效收入削减 >3%
        - 单会员人头收入下降；收入增长被压缩，盈利时间点后延
        - 重建悲观情景；评估对增长指引和融资条款的影响
      - - 星级评级下降
        - 覆盖当前会员 >20% 的 4 星及以上合同流失
        - 质量奖金收入下降；会员信任受损；AEP 中竞争劣势扩大
        - 减仓；跟踪 Q4 2026 星级评级发布
      - - 降价轮融资
        - 任何融资的每股价格低于 $67.50（Dec 2025 N-PORT 标记）
        - 意味着投资人下调估值；优先股负担加重；IPO 路径进一步后延
        - 立即重估；量化清算优先权对普通股权益的影响
      - - 会员增长放缓
        - 2026 投保期净新增会员低于 100,000
        - 增长溢价消失；估值必须向上市可比公司倍数压缩
        - 退出或减仓；只有估值调至 <2x 远期收入后再进入
      - - 关键人物离任
        - Ed Park（CEO）或 Todd Park（执行董事长）离任或不再活跃
        - 创始人主导的身份、愿景和投资人关系受扰
        - 重大风险；需立即尽调董事会连续性与接班计划
    notes: 触发器基于公开申报、行业新闻和 N-PORT 标记汇总的证据。证据支持时采用量化阈值； 其余按事件触发。
    claimRefs:
      - CV037
      - CV038
      - CV039
      - CV040
      - CV041
  - id: TV006
    title: 最终尽调问题清单
    columns:
      - 议题
      - 缺失证据
      - 为什么重要
      - 负责人 / 尽调路径
    rows:
      - - 合并 P&L
        - 完整合并利润表（不只是受监管健康计划实体）
        - 州监管申报不包含 Devoted Medical、技术 / Orinoco 成本和控股公司费用；真实合并 亏损可能显著高于计划层面数字
        - 直接向公司索取经审计财务；也可等待 IPO 前 S-1 申报
      - - 优先股堆叠
        - 股权结构表，显示 $2.64B 融资形成的清算优先权负担
        - 在悲观情景估值（$4-6B）下，扣除优先权后，普通股权益可能接近零
        - 向公司法律顾问或数据室索取股权结构摘要；审阅 Series E / F 条款清单
      - - Series F / F-Prime 估值
        - Nov 2025 和 Jan 2026 轮次的实际每股价格与投后估值
        - N-PORT 隐含 ~$15B 只是估计；实际条款可能有实质差异
        - 索取条款清单；核查 Devoted Health Inc.（CIK 0001719459）的 SEC Form D 修订
      - - MLR 趋势 (2024)
        - 2024 全年州监管申报（预计 Q2 2026 可取得）
        - Sacra 86% 估计未经验证；Q1 2024 为正向，但全年趋势未知
        - NAIC Health Annual Statement 各州申报；预计 June 2026 前可取得
      - - 盈利路径
        - 管理层关于合并口径盈亏平衡时间表和所需资本的指引
        - 若没有可信的 2026–2027 盈亏平衡路径，Series F 投资人将面临进一步稀释
        - 索取投资人材料；也可审阅 Series F 投资人演示
      - - CMS 2027 费率影响
        - 量化 2027 MA 费率公告对 Devoted 的具体收入影响
        - 全行业影响会因计划类型、地域和疾病严重度组合而大幅不同
        - 可直接根据 CMS 公告建模；索取 Devoted 对风险分迁移的指引
    notes: 尽调问题按对投资决策的重要性排序。第 1-3 项是阻断性尽调事项；第 4-6 项重要， 但可用公开数据部分回答。
    claimRefs:
      - CV042
      - CV043
      - CV044
