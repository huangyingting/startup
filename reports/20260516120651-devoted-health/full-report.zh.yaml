      - - 临床模式
        - 自有 Devoted Medical + Orinoco 技术推动 MLR 从 94%（2022）改善至 86%（2024）
        - V28 风险模型削减风险调整收入、医疗趋势加速后，MLR 重新扩大至 89% 以上
      - - 估值
        - $13-15B 私募标记反映投资者信心；新投资者包括 JPMorganChase、GV
