      - number: '6.4'
        title: 留存、韧性与反向证据
        blocks:
          - type: paragraph
            body: >-
              Devoted 没有公开披露 cohort-level 退保数据；但代理信号显示其留存高于平均水平。会员自愿退保是 CMS Star Ratings 内嵌的评分指标之一；Devoted 2025 年多计划 4.5
              星表现，意味着退保率处于行业前四分之一。更广泛的 MA 市场年自愿退保率 约为 8–15%；高表现计划通常每年留住 88–92% 会员。BBB 记录显示，截至 2026 年中前的三年里，Devoted
              Health 共有 47 起投诉，过去 12 个月结案 20 起。Devoted 未获 BBB Accredited。投诉类别包括服务或维修问题（30 起）、产品问题 （5 起）、订单问题（4 起）和账单问题（3
              起）。BBB 平台上的会员评价记录了具体失效模式：OTC 福利物品长期缺货或订单缺件； 医疗交通延误；provider directory 不准确，把网外医生列为网内；专科转诊等待时间长。这些问题符合
              vertically integrated MA 计划向新地域扩张时的运营复杂度。US News 给 Devoted 客户满意度 2.8/5，低于筛查与预防的 4.2，说明公司扩张时，
              临床表现跑在服务执行前面。Devoted 2025 年 5 月裁员 120 人（2,460 人的 5%），可能反映公司在盈利前管理利润率， 但尚未与服务恶化挂钩。
