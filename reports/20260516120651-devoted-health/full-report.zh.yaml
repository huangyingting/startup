        - 未披露合并 P&L；控股 / 技术实体此前亏损可能超过计划利润
      - - 退出 / 流动性
        - Series F-Prime 投资者包括 Franklin Templeton、VanEck 等公开市场机构，暗示 IPO 路径
        - MA 保险科技 IPO 窗口已关闭（CLOV、ALHC 跌破 IPO 价）；累计融资 $2.64B 带来优先权悬顶
      - - 监管
        - 2026 年 95% 会员处于 4 星及以上合同；星级评分稳定或改善
        - CMS 在 2027 年进一步降费；星级评分追缴压低质量奖金收入
    notes: 每个支柱都对应来自州级监管文件、SEC N-PORT 标记和上市公司可比样本的证据。
