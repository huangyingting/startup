      - - Go 微服务后端
        - 承载计划运营、护理缺口识别、任务路由和理赔集成的核心业务逻辑
        - gRPC 负责服务间通信；GraphQL 向前端暴露 API
        - 后端单一押注 Go；一旦专业人才紧缺，集中风险会放大；未公开架构文档
