      - number: '8.3'
        title: 可比公司分析
        blocks:
          - type: paragraph
            body: >
              最直接可比的上市公司是 Medicare Advantage insurtech peers：Alignment Healthcare（ALHC）和 Clover Health（CLOV）。
              Humana（HUM）等大型纯 MA 保险公司提供行业底部参照，但规模和多元化使直接比较不够精确。Oscar Health（OSCR）作为已退出 MA 的前 MA 保险公司纳入比较；其当前 ACA-focused
              倍数能方向性反映更广泛 managed-care 估值环境。

              截至 2026 年 5 月 15–16 日：ALHC enterprise value 为 $3.05B，2024 年收入 $2.70B，EV/Revenue 为 1.13x；2024 年 12 月 31 日
              Medicare Advantage 会员 189,100，EV/member 约 $16,130。CLOV enterprise value 为 $1.66B，2024 年保险 收入
              $1.34B，EV/Revenue 为 1.24x；2024 年平均 MA 会员约 80,000，EV/member 约 $20,750。Humana enterprise value 为
              $45.60B，EV/Revenue 为 0.33x（全公司口径，包含 CenterWell segment；本分析未拆出 MA-specific 指标）。Oscar EV 为 $2.65B，2024 年收入
              $9.18B，EV/Revenue 为 0.29x；不过 Oscar 2023 年已退出 Medicare Advantage，当前倍数反映 ACA-focused 业务。

              将上市可比公司的 EV/Revenue 倍数套用到 Devoted Health 2024 年估计收入 $3.27B，隐含 enterprise value 为 $3.7–4.1B （按 ALHC / CLOV
              倍数）。这比最近确认的私募轮估值约 $13B 低 3–3.5x。溢价部分可由 Devoted 更高增速解释（2024 年收入同比 +69%，ALHC / CLOV 为
              48–59%）、整合临床模型和自研技术平台。但若没有近期流动性事件或清晰盈利路径，如此幅度的 private-to-public comp discount 历史上很难自洽。

              按最近私募轮估值计算，Devoted 每会员 EV 约为 $53,100（$13B / 2024 年 12 月 244,763 名会员），约为 ALHC / CLOV 每会员 $16,000–$21,000
              区间的 2.6–3.3x。若按 ALHC 每会员倍数套用到 2026 年 1 月 466,000 名会员： 466,000 × $16,130 = 隐含约 $7.5B，仍明显低于私募轮水平。
