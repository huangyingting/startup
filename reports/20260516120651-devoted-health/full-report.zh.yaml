      - number: '3.3'
        title: 既有玩家：规模支付方
        blocks:
          - type: paragraph
            body: >
              UnitedHealthcare（UHC）是 MA 市场最大保险商，截至 February 2026 约有 9.4 million 名 MA 会员——低于 AEP 前的 10.3
              million，原因是公司为恢复利润率，主动退出覆盖超过 600,000 名会员的计划。尽管收缩，UHC 仍保有强势市场位置：它在所有美国县的 41% 中是最大保险商。UHC 2026 年有 78% 会员处于
              4-star+ 计划中，表现强劲且高于 2025 年的 75%。母公司 UnitedHealth Group 运营 Optum，这是美国最大的健康服务和分析平台之一，为 UHC 带来无可比拟的数据资产、借
              OptumCare 完成的照护交付整合，以及借 OptumRx 完成的药房福利管理。不过，UHC 明显低估了 2025 年加速上行的医疗成本趋势；高管称，大多数就诊场景中「服务强度在上升，成本也更高」。


              Humana 是第二大 MA 保险商，2026 年下注罕见的逆向扩张：从 AEP 前的 5.8 million 增至超过 7 million MA 会员，在同行收缩时新增约 1.2 million
              名会员。这一增长押注承接了 Humana 2024–2025 年为改善利润率而激进削减福利、收缩保单组合的策略。不过，Humana 2026 星级评级恶化：2026 年只有 20% 会员处于 4-star+
              计划中（低于 2025 年的 25%），2026 平均星级为 3.61。Humana 拥有深厚的 CenterWell 老年人初级护理基础设施，并与 ChenMed 建有长期 VBC
              合作，是全国性既有巨头中临床整合度最高的一家。


              CVS Health / Aetna 是第三大 MA 保险商，会员约 ~4 million。公司整合 Oak Street Health（2023 年以 $10.6 billion
              收购），打造差异化初级护理交付资产。Oak Street 在 25+ 个州运营约 200 家初级护理诊所，聚焦复杂 MA 人群。Aetna 在 4-star+ 计划会员占比上领先同行（2026 年 81%，虽低于
              2025 年 89%）。CVS 在 2024 年重亏后一直收缩 MA，以优化利润率。


              Elevance Health（前身 Anthem）2026 年服务约 ~1.9 million 名 MA 会员，低于 2.2 million，其中 53% 处于 4-star+ 计划中，高于 2025 年
              40%。Centene 是第六大 MA 保险商，2026 年覆盖不到 1 million 名会员，下降 4%；其 4-star+ 占比从 1% 大幅提升至 2026 年 18%。Elevance 和
              Centene 都有 Medicaid 业务深厚的历史，并正通过 DSNP/CSNP 扩张建设 MA 存在感。
