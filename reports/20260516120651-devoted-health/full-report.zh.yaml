      - number: '3.5'
        title: 切换成本、护城河与竞争动态
        blocks:
          - type: paragraph
            body: >
              Medicare Advantage 受益人面临中等结构性切换成本。年度参保期（Oct 15–Dec
              7）制造天然摩擦：会员必须主动重新参保才能换计划；如果网络不同，换计划还可能打断与服务方的关系。研究显示，全行业 MA 会员留存率较高，Clover 报告 2026 AEP 会员留存率超过
              95%，说明会员一旦参保，若没有强理由（福利削减、计划退出、医生变化）很少切换。不过，2025–26 AEP 出现了异常震荡，数百万老年人因 UHC、Aetna 和其他保险商退出计划而被动迁移——这为
              Devoted Health 和 Alignment 等计划打开了不寻常的增长窗口。


              星级评级是高表现计划的自强化护城河。4-star+ 计划从 CMS 获得质量奖金支付，并能提交更低出价（因为收到更高返利），从而提供更丰富的补充福利来吸引和留住会员。Devoted Health 2026 年有
              95% 会员处于 4-star+ 合同中，相比低评级竞争对手获得复利式收入优势。Clover 最大合同在 2026 年跌破 4-star，说明星级下滑的下行不对称性——分析师估计，这可能抹掉 Clover 全部
              EBITDA。


              分发能力是重要的既有巨头护城河。UHC、Humana 和 Aetna 拥有广泛经纪人网络、品牌认知和营销预算，远超小型计划。独立代理和经纪人驱动 MA
              参保决策中的相当大比例；既有巨头已建立的关系限制了小型计划以高成本效率触达新会员。Devoted Health 使用面向消费者的直销、会员 Guide
              和由照护模型带来的口碑，具备差异化，但要对抗既有巨头经纪人基础设施，扩张仍有挑战。


              服务方可及性和网络充分性既是护城河，也是挑战。既有巨头凭规模与医院和专科医生群体签下有利合同。Devoted 的 Devoted Medical
              模型——整合内部虚拟和上门初级护理——通过拥有临床关系部分绕开这一问题，但也需要持续投入临床人员和技术。ChenMed 的按人头模型显示，深度医生对齐可以为复杂人群带来更优结果；Devoted
              的模型呼应这一理念，只是放在支付方控制的结构内，而不是独立医疗团队。商品化风险真实存在：随着技术更容易获得，今天需要自研平台才能形成差异化的临床能力，未来可能成为行业标配，进而压缩整个行业利润率。
            claimRefs:
              - CP014
              - CP025
              - CP033
              - CP034
              - CP040
