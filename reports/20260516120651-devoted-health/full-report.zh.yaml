  - id: FR002
    title: 风险传导图
    type: dag
    layout: wide
    summary: V28 下调、MLR 压力和 CMS 审计共同指向收入缺口，随后压迫资本，并可能迫使福利削减，带来会员流失和竞争劣势。
    data:
      nodes:
        - id: v28_cuts
          label: V28 风险分数削减
        - id: cms_audit
          label: CMS 审计扩围
        - id: mlr_pressure
          label: 医疗成本 / MLR 压力
        - id: star_risk
          label: 星级评级下调
        - id: revenue_impact
          label: 收入 / 保费缺口
        - id: capital_pressure
          label: 资本 / 融资压力
        - id: member_churn
          label: 会员流失 / 退出
        - id: competitive_gap
          label: 竞争规模劣势
      edges:
        - from: v28_cuts
          to: revenue_impact
          label: 降低风险调整后支付
        - from: cms_audit
          to: revenue_impact
          label: 追溯性付款追回
        - from: mlr_pressure
          to: revenue_impact
          label: 理赔超过保费收入
        - from: mlr_pressure
          to: capital_pressure
          label: 运营亏损消耗准备金
        - from: star_risk
          to: revenue_impact
          label: 失去质量奖金支付
        - from: revenue_impact
          to: capital_pressure
          label: 扩大运营亏损
        - from: capital_pressure
          to: member_churn
          label: 迫使福利削减
        - from: competitive_gap
          to: member_churn
          label: 更大同业凭更丰厚福利留住老年人
