      - number: '5.2'
        title: Orinoco 平台与技术架构
        blocks:
          - type: paragraph
            body: >-
              Orinoco 是 Devoted Health 自研的 platform-as-a-service（PaaS），公开表述为「第一个能以高度整合方式
              端到端支撑付款方和医疗服务提供方全部运营的现代软件平台」。能力覆盖医疗运营数据管理、CRM、任务式照护管理和医疗服务协调，
              均通过安全的网页界面交付，不需要客户端安装。平台摄取理赔数据和电子健康记录，识别照护缺口，实时向 Guides 和临床人员 分派任务，并生成满足 CMS Star Ratings
              合规要求的质量指标报告。Venrock 上的公开招聘确认，Devoted 工程栈包括 Go （主要后端语言）、PostgreSQL（关系型数据库）、gRPC 和 GraphQL（API 层）、React 和
              TypeScript（前端）、 Terraform（基础设施即代码）以及 AWS（云托管）。DevotedHealth GitHub 组织有 26 个公开仓库，也印证了这套栈： 最热门仓库是
              terraform-provider-looker（Go，3 stars，24 forks），确认 Looker 用于 BI；in-memory-db-starter
              （TypeScript）是工程招聘评估模板；Pyrseas（Python）是 PostgreSQL schema migration fork。联合创始人 Ed Park 将 Devoted 快速拿到 Star
              Rating 归因于「一切同时构建」的路径，而不是按层顺序搭建；保险、临床、服务和数据 功能因此共享单一事实源。
