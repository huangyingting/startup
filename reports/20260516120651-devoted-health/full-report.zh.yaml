              CY2026 是 V28 100% 分阶段落地的年份，计划收入被削减约 ~3.01%。与此同时，只有 64–67% 参保人在 4+ star 计划中，低于历史约 ~80%，质量奖金支付受到压缩。OIG
              正在主动审计编码强度，CMS 预计年度节省 >$7.6 billion。这三重逆风在同一财年叠加，构成 MA 经济性自项目扩张以来最艰难的监管环境。
