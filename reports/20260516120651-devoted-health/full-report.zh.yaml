  - number: 5
    title: 产品与技术
    sections:
      - number: '5.1'
        title: MA 计划、产品类型与会员流程
        blocks:
          - type: paragraph
            body: >-
              Devoted Health 提供四类 Medicare Advantage 计划：HMO、PPO、Dual Eligible Special Needs Plan （D-SNP）和 Chronic
              Condition Special Needs Plan（C-SNP）。截至 2026 年，计划覆盖 29 个州，高于 2024 年的 20 个州。所有计划都用一张整合卡替代传统 Medicare A、B、D
              部分；部分计划的补充福利包括牙科、 视力、听力、Food and Home Card（由 Optum Financial 的 Healthy Benefits+ 平台管理）、 SilverSneakers
              健身权益、交通和送餐。每名参保会员都会配一名 Devoted Guide——工作日早 8 点到晚 8
              点可通过电话或短信联系的照护导航员——负责协调福利、安排预约、处理账单问题，并把会员接入社区资源。Devoted Medical 用 24/7 虚拟 Care On Demand
              和无共付的上门初级护理增强计划。CMS 给 Devoted 2025 年 15 份 已评级合同加权平均 4.3 星，88% 的已评级计划会员在 4 星及以上计划内。2026 年，95% 的全体会员都加入 4
