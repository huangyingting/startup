  - id: TM001
    title: 市场定义表
    columns:
      - 市场层级
      - 纳入范围
      - 排除 / 相邻
      - 主要渠道 / 替代品
      - 战略备注
    rows:
      - - Medicare Advantage（Part C）——核心 MA-PD
        - 通过私营计划承保住院（A）、门诊 / 医生（B）、药品（D）；CMS 风险调整按人头付费
        - FFS Medicare（不纳入按人头付费模型）
        - CMS → MAO → 经纪人 / 代理 → 老年受益人
        - 核心市场；35.5M 参保人，Medicare 渗透率 55%（2026）
      - - SNP 子细分（D-SNP、C-SNP、I-SNP）
        - 双重资格（D-SNP）、慢病（C-SNP）、机构（I-SNP）
        - 普通 HMO/PPO 入保（单独计划类型）
        - 州 Medicaid 机构（D-SNP）；医生转诊 / 经纪人（C-SNP）
        - 占 MA 入保 21%；2026 年增长最快细分
      - - 相邻——FFS 传统 Medicare
        - Parts A + B 由 CMS 按服务付费报销；Part D 通过独立 PDP
        - 不含任何 MA 按人头付费模型
        - CMS 直接报销服务提供方
        - 现状替代方案；约 45% Medicare 受益人仍在 FFS
      - - 相邻——Medicare Supplement（Medigap）
        - 在 FFS Medicare 上叠加自付分担补充保障
        - MA 按人头付费；与 MA 入保互斥
        - 私营保险公司通过经纪人销售；不能与 MA 合并
        - MA 增长下份额收缩；争夺新满龄受益人的直接竞争者
      - - 相邻——雇主退休人员保障（EGHP）
        - 面向符合 Medicare 资格退休人员的雇主赞助健康保障
        - MA 按人头付费；雇主预算而非 CMS 供资
        - 雇主 HR / 福利部门 → 退休人员
        - 在萎缩；退休后转入 MA/EGWP
      - - 相邻——独立 Part D PDP
        - 面向 FFS Medicare 参保人的纯药品保障
        - MA-PD 一体化福利（Part D 并入 MA-PD 计划）
        - PDP 保险公司通过经纪人 / 直接入保
        - 仅与 FFS 人群相关；MA 参保人由 MA-PD 替代
    notes: |
      市场范围和替代品来自 MedPAC（SM001）、CMS 监管指引（SM027、SM029）和 USHealthInsights（SM030）。入保份额为 2026 年近似估计。
    claimRefs:
      - CM001
      - CM002
      - CM003
      - CM004
      - CM005
