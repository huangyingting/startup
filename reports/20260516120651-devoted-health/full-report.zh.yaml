      - number: '1.3'
        title: 融资历史、估值与投资者基础
        blocks:
          - type: paragraph
            body: >-
              Devoted Health 自 2017 创立以来完成六轮有名称融资，截至 January 2026 累计股权融资约 $2.27 billion（Sacra
              估计；单轮金额由一手法律和官方来源确认）。融资轨迹显示，顶级风险投资人早期快速下注，Series D（2021）估值峰值超过 $12.6 billion，随后估值进入平台期——December 2023
              Series E 与 Series D 采用相同的 $56.25 每股价格，构成「平轮」；观察者将其解读为 MA 行业逆风，而非企业升值。Series E 最终分两批（December 2023 和 August
              2024）完成 $287 million；2025–2026 Series F 和 Series F-Prime（$366 million）又在这一估值背景下继续支撑增长资本。


              Series B（$300 million，October 2018）由 Andreessen Horowitz 领投，Premji Invest、Uprising、Venrock 和 F-Prime
              Capital 参投——同一批 VC 财团随后继续锚定后续轮次。Series D（$1.15 billion，October 2021）规模最大；Uprising 领投，SoftBank Vision Fund
              2 以其最大单笔投资共同领投，老股东（GIC、a16z、Premji、Maverick、Frist Cressey、NextView）之外，又加入 ICONIQ Growth、General
              Catalyst、Base10 Advancement Initiative 和 Emerson Collective 等新投资者。Latham & Watkins 为 SoftBank Vision Fund
              2 提供交易顾问，Fenwick & West 为 Devoted Health 提供顾问。Series F 和 Series F-Prime（分别于 November 2025 和 January 2026
              完成）引入新机构投资者，包括 GV（Google Ventures）、Morgan Health（JPMorganChase 旗下部门）、Franklin Venture Partners（Franklin
              Templeton）、VanEck 和 MIG Private Equity；Cox Enterprises、Premji Invest、a16z、General Catalyst 等既有投资者也大额参与。


              本章审阅的一手来源中，未确认任何老股出售、债务融资或信贷额度披露。Devoted Health SPV II LLC（CIK 0002078127）于 July 2025 提交 Form D，拟发行 $33
              million 私募股权基金，显示围绕 Devoted Health 股权存在老股或共同投资载体活动。
