  - id: FV001
    title: 推荐逻辑流程
    type: flow
    layout: standard
    summary: |
      从 Devoted Health 的核心证据（规模、验证、估值、风险）到最终“观察”建议的链条，展示各维度如何影响判断。
    data:
      nodes:
        - id: scale
          label: 规模：2026 年 1 月 466k 会员，2024 年估计收入 $3.3B
          type: input
        - id: proof
          label: 证据：MLR 89%→86%，2024 年 Q1 计划层面净利润 $11M
          type: input
        - id: risks
          label: 风险：无合并 P&L；V28/CMS 逆风；Series E 平轮
          type: input
        - id: valuation
          label: 估值：私人估值 ~$13–15B，按上市可比倍数约 $4B
          type: input
        - id: synthesis
          label: 综合：增长故事有吸引力；较上市可比公司溢价 3–4x
          type: process
        - id: recommendation
          label: 观察：入场前跟踪 2025 年备案和 2027 年 CMS 费率
          type: output
      edges:
        - from: scale
          to: synthesis
        - from: proof
          to: synthesis
        - from: risks
          to: synthesis
        - from: valuation
          to: synthesis
        - from: synthesis
          to: recommendation
    approximationNotes: null
    claimRefs:
      - CV001
      - CV005
      - CV006
      - CV007
  - id: FV002
    title: EV/收入倍数敏感性 — 上市可比公司倍数应用于 Devoted Health
    type: bar
    layout: standard
    summary: |
      该柱状图展示：把上市可比公司的 EV/Revenue 倍数套用于 Devoted Health 2024 年估计收入 $3.27B 后，隐含企业价值落在何种区间，并与上一轮已知私人估值（约 $13B）比较。
    data:
      items:
        - label: ALHC 倍数（1.13x × $3.27B）
          value: 3.7
          unit: USD B
        - label: CLOV 倍数（1.24x × $3.27B）
          value: 4.1
          unit: USD B
        - label: OSCR 倍数（0.29x × $3.27B）
          value: 0.9
          unit: USD B
        - label: HUM 倍数（0.33x × $3.27B）
          value: 1.1
          unit: USD B
        - label: Series E 私募轮（Dec 2023）
          value: 12.9
          unit: USD B
        - label: N-PORT 隐含值（Dec 2025）
          value: 15.1
          unit: USD B
    approximationNotes: |
      收入估计（$3.27B）来自 Sacra 研究（未经审计），按 2024 年滚动收入口径计算。HUM 和 OSCR 仅作参照；两者的业务组合 与 Devoted Health 不直接可比。
    claimRefs:
      - CV024
      - CV025
      - CV026
      - CV027
      - CV028
      - CV029
  - id: FV003
    title: 估值区间——悲观 / 基准 / 乐观情景
    type: range
    layout: wide
    summary: |
      三种情景下 Devoted Health 的低 / 基准 / 高估值区间，以 EV/Revenue 倍数和增长假设为锚，并列出关键概率信号。
    data:
      items:
        - label: 悲观：MLR 回升，增长 <20%，采用上市可比公司倍数
          low: 4
          mid: 5
          high: 6
          unit: USD B
        - label: 基准：增长 30-40%，MLR 85-87%，Series G 约为 4x 前瞻收入
          low: 12
          mid: 14
          high: 16
          unit: USD B
        - label: 乐观：增长 50%+，2027 年盈利，IPO 按 5x 前瞻收入
          low: 20
          mid: 25
          high: 30
          unit: USD B
        - label: 当前 N-PORT 隐含值（Dec 2025）
          low: 14
          mid: 15.1
          high: 15.5
          unit: USD B
    approximationNotes: >
      区间基于 EV/Revenue 倍数；这些倍数套用在前瞻收入估计上，前瞻收入来自 2024 年实际值（Sacra 估计约 $3.27B）和增长率假设。 由于缺少合并 P&L 数据，无法做正式 DCF。概率信号：悲观 30%，基准
      50%，乐观 20%。
    claimRefs:
      - CV033
      - CV034
      - CV035
      - CV036
  - id: FV004
    title: 投资 KPI 评分卡
    type: kpi
    layout: wide
    summary: |
      截至 May 2026 收集到的证据，对七个投资维度按 1–5 分评分（5 = 强正面），可直接供 IC 使用。
    data:
      items:
        - label: 市场规模与顺风
          value: 4
          note: MA 市场在增长；53% Medicare 受益人已参保；但 CMS 降费给行业带来逆风
        - label: 规模验证
          value: 4
          note: Jan 2026 会员数 466k；2024 年收入估计 $3.3B；快速增长轨迹已证实
        - label: 临床 / 技术护城河
          value: 4
          note: Orinoco 平台；Devoted Medical 整合；MLR 两年内从 94% 改善至 86%
        - label: 财务健康度
          value: 2
          note: 缺少合并盈利能力数据；2023 年经营亏损 $55M；累计融资 $2.64B，优先股堆叠不明
        - label: 估值纪律
          value: 2
          note: 按 3-4x EV/Rev 估值，较上市可比公司有溢价；Series E 平轮；Series F 估值未披露
        - label: 监管与风险
          value: 2
          note: V28 风险模型带来逆风；2027 年 CMS 费率不确定；MA 行业利润率在重置
        - label: 证据质量
          value: 3
          note: N-PORT 估值标记提供客观第三方数据；SEC 文件确认轮次条款；缺少合并 P&L
    approximationNotes: 评分是基于本次尽调收集证据的 1-5 分定性评估，不是财务模型输出。
    claimRefs:
      - CV001
      - CV003
      - CV007
      - CV009
      - CV040
