            body: >-
              Devoted 的会员质量由 CMS Medicare Advantage Star Ratings 外部验证；该评级衡量临床结果、会员体验和客户服务。 2026 年，三份 Devoted 合同拿到 5
              星满分：Devoted Health Plan of Florida（H1290）、Devoted Health Plan of North Carolina（H5299）和 Devoted Health
              Plan of Texas（H7993）。全行业 18 份五星合同中，Devoted 占 3 份。 2025 年，Devoted 在 15 份已评级合同上的加权平均为 4.3 星，高于全国平均 3.9
              星。2024 年已评级合同 100% 在 2025 年保住 4 星及以上，50% 新评级的首年合同拿到 4 星及以上（历史水平为 12%）。2026 年，Star-eligible 计划中 100% 的
              Devoted 会员加入了 Statin Therapy 和 Medication Reconciliation 两项 4 星及以上计划。96% 的会员处于 Controlling Blood Pressure
              4 星及以上计划，98% 处于 Health Plan Rating 4 星及以上计划，95% 处于 Customer Service 4 星及以上计划。US News 给 Devoted Health 整体
              4/5 分，筛查与预防 4.2 分；UnitedHealthcare 同一维度为 3.7 分。会员满意度调查显示，95% 的会员已经向家人朋友推荐或愿意推荐 Devoted，93% 相信 Devoted
              会履行承诺，帮他们拿到 所需照护。截至 2021 年，Devoted 报告 NPS 为 79，公司称当时高于 Apple、Netflix 和 Amazon。
