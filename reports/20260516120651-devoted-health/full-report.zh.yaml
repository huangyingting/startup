  - number: 6
    title: 客户
    sections:
      - number: '6.1'
        title: 会员画像与客户分层
        blocks:
          - type: paragraph
            body: >-
              Devoted Health 的客户是 65 岁及以上、符合 Medicare 资格并加入其 Medicare Advantage（MA）HMO 和 PPO 计划的 老年人。不同于企业 SaaS
              公司，Devoted 作为 B2C 保险公司运营：购买者、使用者和付款方都是同一个人——通过 CMS 年度 参保期（AEP）、Medicare 经纪人或 devoted.com 直接选择 Devoted
              的老年受益人。截至 2026 年 1 月，Devoted 在 29 个州服务超过 466,000 名会员，历史上会员最集中在佛罗里达、德克萨斯和俄亥俄。公司既提供标准 Medicare Advantage HMO
              和 PPO 产品，也提供面向同时符合 Medicare 与 Medicaid 资格人群的 Dual-Eligible Special Needs Plans（D-SNPs）。 2026 年，D-SNP 计划覆盖
              14 个州，包括佛罗里达、德克萨斯、俄亥俄、北卡罗来纳、科罗拉多和阿拉巴马。Chronic Condition SNPs（C-SNPs）则在部分市场提供。Devoted 约 92% 的计划月保费为
              $0，使公司落在 MA 市场的可负担价格带。会员群体偏向 带有多种慢病的老年人——高血压、糖尿病和心血管疾病——与整体 MA 市场一致。整合式、虚拟优先加上上门服务的临床集团 Devoted Medical
              为会员群体提供照护，也是 Devoted 差异化留存模型的核心。
