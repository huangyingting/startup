              Clover Health 最大合同在 2026 年跌破 4-star 门槛，Leerink Partners 估计这可能抹掉 Clover 当前全部税前利润。Devoted Health 95% 会员处于
              4-star+ 合同中，是关键优势，但需要在会员参与、临床质量指标和 CMS 行政合规上持续保持运营纪律。任何星级表现恶化都会直接损害奖金支付和返利能力。
