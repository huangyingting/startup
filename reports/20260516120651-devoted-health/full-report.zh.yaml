      - number: '2.2'
        title: 市场规模——TAM、SAM 与 SOM
        blocks:
          - type: paragraph
            body: >
              多个独立数据视角都指向同一个结论：2026 总可用市场（TAM）约为 $490–$530 billion 的联邦 MA 支出，以及 34.9–35.5 million 名参保人。MedPAC March 2025
              报告记录，2024 年 CMS 向 MA 计划支付 $494 billion，33.6 million 名参保人占 Medicare 的 54%。MedPAC January 2026 更新显示，2025
              参保达到 34.9 million（55% 渗透率）；STAT News 则报道，截至 February 1, 2026 为 35.5 million，较 February 2025 的 34.4 million
              同比增长 3%。USHealthInsights 预计 2026 年 CMS MA 项目支出约为 $507 billion。CMS 2026 Rate Announcement 最终确定平均支付净增
              +5.06%，新增联邦支出约 $25 billion，有效增长率 9.04%。

              参保增长显著放缓：从 2017–2024 年每年 7–10%，降至 calendar 2025 的 3.9%（Chartis），再到 2026 年约 2.5%，且 2025–26 Annual
              Enrollment Period 期间仅约 ~1%（Chartis、STAT News）。Congressional Budget Office 预计，到 2034，MA 渗透率将达到所有 Medicare
              受益人的 64%，为长期增长情景提供锚点。

              对 Devoted Health 这类挑战者 MA 承保商而言，可服务市场（SAM）是以 HMO 为基础、聚焦 SNP 的细分：约 20–22 million 名参保人处于管理式护理计划设计中，这类设计相比广泛
              PPO 网络，更偏向临床整合、价值型初级护理和特定疾病照护管理。在这个 SAM 内，C-SNP 和 D-SNP 是增长最快的子细分，2026 年分别扩张约 49% 和 10–15%。

              Devoted Health 当前可获取市场（SOM）覆盖 29 个运营州。2026 AEP 期间，Devoted 参保人数从约 210,000 增至约 470,000，翻了一倍以上；CEO Ed Park
              确认，截至 early 2026，公司服务约 500,000 名会员，使 Devoted 按 Milliman 分类成为少数全国性挑战者承保商之一。
