      - number: '7.2'
        title: 财务与资本风险
        blocks:
          - type: paragraph
            body: >-
              Devoted Health 从未报告合并盈利。2023 年州文件中的 health plan 数据显示，在 $1.9B plan 收入上，公司经营亏损 $55.4M（高于 2022 年的 $35.3M），净亏损
              $33.7M（约 -1.75% margin）。2023 年 MLR 约 89%，高于 85% 的行业目标。 虽然 2024 年 Q1 plan-level 净利润为 $11M，是首次季度转正，但结构性
              break-even 路径仍不清晰；Sacra 估算 2024 年收入为 $3.27B，说明公司正随着参保增长迅速扩大亏损基数。行业层面，医疗损失率到 2025 年 Q3 仍在恶化，保险公司未能
              预判利用率上升的规模和速度，MA 尤其明显。UnitedHealth、Humana、CVS 和 Elevance 均宣布 2026 年进一步收缩 MA 市场， 证明即便是大型 incumbents，也难以驾驭
              MA 经济性。Devoted 作为成长阶段保险公司，风险在于医疗成本趋势跑过保费增长， 公司在达到盈利前耗尽最近募集的资本。Devoted 的 $366M Series F（2026 年 1
              月宣布，分两批：2025 年 11 月 $48M， 2026 年 1 月 $317M）延长了 runway，也释放出投资者信心；但 14+ 投资方参投也暴露出集中风险——若其中一部分在未来
              融资中撤回支持，压力会放大。医疗成长股权资本市场波动较大，MA 同业的 premium-to-book 估值承压，Devoted 的退出路径 （IPO 或 M&A）仍不确定。
