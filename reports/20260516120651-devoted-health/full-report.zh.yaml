            title: 关键规模假设与数据限制
            body: >
              2026 TAM 支出数字（~$507B）来自 CMS 费率公告预测叠加 USHealthInsights 分析，并非 CMS 最终核算。HMO+SNP 细分的 SAM 估计，是把 Chartis
              计划类型组合比例应用到总参保人数，并加入估计的重叠调整；没有公开来源直接测算 HMO+SNP 可服务细分。Devoted Health 的收入、MLR 和 C-SNP 特定参保均未公开披露；所有 SOM
              数字都汇编自第三方媒体报道和 CEO 表态。29 州可服务人口估计（~12M）是粗略近似，置信度低。
