      - - 星级评分下滑
        - CMS 每年 10 月发布星级评分；合同层面评分趋势
        - 覆盖 >20% 会员的合同加权平均星级低于 3.5
        - 投资逻辑破裂触发点；奖金支付损失威胁盈亏平衡时间表
      - - 现金跑道耗尽
        - 董事会报告；下一轮融资时间表与烧钱速度对比
        - 未确认下一轮融资且现金跑道低于 9 个月
        - 关键 — 接触现有投资者；建模降价轮或战略选项
      - - 领导层离职
        - 董事会公告；LinkedIn / 媒体信号
        - Ed Park 或 Todd Park 非计划离职且无继任安排
        - 投资逻辑破裂事件；在领导层清晰前暂停或退出持仓
      - - MLR 恶化与行业退出传导
        - 按季度州级文件 MLR；同业 MA 计划退出 Devoted 所在州
        - 多家同业退出 Devoted 服务市场；Devoted 特定 MLR 高于 92%
        - 风险抬升；提高尽调频率；审查退出可选性
    notes: 阈值是供投资者监测的分析性设定，并非 Devoted 披露。触发指标可从 CMS 年度星级评分发布、州保险监管文件和新闻公告中观察。
