              Devoted Health 的融资历史横跨 2017 年至 2026 年 1 月的九轮，资本结构由五个关键数据点定义。Series B（2018 年 10 月， $300M）投后估值约 $1.8B。Series
              C（2020 年 4 月，$450M）估值 $3.78B。Series D（2021 年 10 月，$1.15B）把估值 推至峰值 $12.6B；后续 $80M 追加使 Series D 总融资达到
              $1.23B，最终投后估值 $12.7B。Series E（2023 年 12 月， $175M）由多位接近交易的信源确认在 $12.87–13.1B，按每股口径基本持平（每股 $56.25，与 Series D
              相同），Prime Unicorn Index 对底层 Form D 授权的分析也确认这一点。Sacra 另行确认 2024 年 8 月 $112M Series E 延伸轮估值约 $13B。截至 2026 年
              1 月，累计融资约 $2.64B。

              最细颗粒度的 mark-to-market 证据来自 Private Shares Fund（CIK 0001557265，PIIVX）的 SEC N-PORT 文件；该基金是 Series E
              及后续轮次的具名投资者。基金按季度披露 Devoted Health 普通股公允价值。序列如下：2023 年 9 月 30 日每股 $55.08；2024 年 3 月 31 日和 9 月 30 日每股
              $56.25；2024 年 12 月 31 日每股 $64.64，较 2024 年 9 月标记上调 15%，与 2024 年 8 月 Series E 延伸轮一致；2025 年 9 月 30 日每股
              $57.50，在 Series F 前小幅回落；2025 年 12 月 31 日每股 $67.50，在 2025 年 11 月 Series F 完成后上调 17%。2025 年 12 月的
              $67.50/share 较 Series D/E 发行价 $56.25/share 溢价 20%。将同一比例套用到已确认的 Series E 估值（$12.87B），得到截至 2025 年 12 月约
              $15.4B 的隐含 enterprise value，与独立估计（约 $15B，Eboona，2026 年 2 月）一致。Series F（合计约 $366M）未披露正式每股价格或企业估值。

