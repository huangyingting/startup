companyProfile:
  summary: >-
    Devoted Health, Inc. 是一家在 Delaware 注册、总部位于 Massachusetts Waltham 的 Medicare Advantage 保险公司，由 Todd Park（执行董事长；Obama
    总统任内第二任 U.S. Chief Technology Officer；athenahealth 和 Castlight Health 联合创始人）与 Ed Park（CEO；athenahealth 长期 COO
    和技术高管）兄弟于 2017 创立。公司采用一体化「payvidor」模式，把 HMO 和 PPO Medicare Advantage 计划、内部 Devoted Medical 临床团队、专属会员 Guide，以及自研
    Orinoco 运营平台组合在一起。截至 January 2026，Devoted 服务超过 466,000 名会员，覆盖 29 个州（同比增长 121%），2025 cycle 加权平均 CMS 星级评级为 4.6，并通过
    Series B 至 F-Prime 从 Andreessen Horowitz、Premji Invest、Uprising、SoftBank Vision Fund 2、GIC、GV、Morgan Health、F-Prime
    Capital 等投资者累计融资约 $2.27 billion。
