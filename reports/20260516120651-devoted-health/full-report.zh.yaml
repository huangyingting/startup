  - number: 7
    title: 风险
    sections:
      - number: '7.1'
        title: 监管与报销风险
        blocks:
          - type: paragraph
            body: >-
              Devoted Health 的经济性完全受 CMS 费率制定和监管合规支配。最直接的结构性威胁，是 CMS-HCC Version 28（V28） 风险调整模型在 2026 年全面 phase-in，MA
              风险评分现在 100% 按新框架计算。V28 删除或合并约 2,000 个 ICD-10 代码，重分类慢病，并重新校准人口统计系数；行业分析估计平均 RAF 分数会下降 5–8%，CMS 自身预计 2024
              年初始 rollout 平均下降 3.12%。OIG 已宣布正式审计（2026 年 1 月宣布，预计 FY2028 完成），核验 CMS 是否达到 2024 支付年度 V28 预计 $7.6B
              节省目标——这给所有 MA 计划增加了追溯合规审查。费率端，CMS 确定 2026 年 MA 支付平均增加 5.06%，在 2025 年削减之后属于正面进展；但增幅分布不均，无法完全抵消 V28 带来的 RAF
              压缩或利用率上升。2025 CMS Final Rule 的 broker compensation 条款在 2025 年 8 月被得州联邦法院撤销（法院裁定 CMS 缺乏制定费率的法定权限），同时 MA
              审计项目在 2025 年 5 月扩展到覆盖 2018–2024 支付年度所有符合条件合同，引入追溯支付准确性风险。MA star-rating 诉讼显示法律救济有限：Elevance 挑战 CMS 2024 年
              star-rating 方法失败，损失估计 $375M 奖金；Humana 的平行诉讼 也被驳回。Devoted 的竞争优势部分建立在 star ratings 上；任何重要合同失去 4
              星及以上状态，都会削减奖金，并可能迫使 公司削减福利，影响留存。
