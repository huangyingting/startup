  - id: FP001
    title: 竞争定位图：技术整合 vs. 临床整合
    type: quadrant
    layout: standard
    summary: >-
      Devoted Health 位于技术整合高、临床整合高象限，与 Kaiser Permanente 和 ChenMed 同列。 Alignment Healthcare 和 Clover Health
      技术水平也高，但自有临床整合较低。大型既有巨头 （UHC、Humana、CVS/Aetna）通过子公司拥有中高水平技术，但临床整合居中。传统非营利 SCAN
      技术水平低，但通过网络管理拥有中等临床能力。评分是有证据支撑的序数判断； 不声称能精确量化。
