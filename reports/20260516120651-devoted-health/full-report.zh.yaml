      - number: '5.3'
        title: Devoted Medical 与临床技术
        blocks:
          - type: paragraph
            body: >-
              Devoted Medical 是面向 Medicare 人群自建的虚拟优先、上门补充医疗集团。它向会员提供 24/7 Care On Demand
              （远程医疗）、年度综合健康评估、药品配送，以及在可覆盖地区的上门随访，会员均无需共付。Devoted Medical 超过 90% 的就诊通过远程方式交付；COVID-19 期间，Devoted
              为老年人优化了定制视频会议模块，推动这一转向。会员若没有自有设备， Devoted 会寄送带蜂窝网络的 iPad；公司还提供脉搏血氧仪、无线体重秤和无线血压袖带，读数接入 Orinoco 临床工作流，
              用于连续监测和主动触达。Devoted Medical 的 EHR 从零搭建。公司要求临床人员「不要记住任何事——表达情绪、建立连接、 感受就好，软件会替你记住一切」，由 Orinoco
              自主浮现所有相关提示和照护缺口任务。Devoted Medical 临床人员平均有 8 年经验。分拆公司 DevotedDoc 将这套远程医疗基础设施延伸到惩教系统和 safety-net
              provider，提供虚拟成瘾专科照护 等 B2B 服务，代表临床平台在核心 Medicare Advantage 会员之外的早期商业化。
