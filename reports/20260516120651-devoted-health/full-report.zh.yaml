      - number: '1.2'
        title: 创始人、领导层与董事会治理
        blocks:
          - type: paragraph
            body: >-
              Devoted Health 由 Todd Park 和 Ed Park 兄弟于 2017 创立。两人的职业生涯都扎根于 athenahealth；这家健康技术公司由他们与 Jonathan S. Bush 于
              1997 共同创立。Ed Park 在 athenahealth 长期担任 COO 和技术高管，之后参与创立 Devoted；他现任 CEO，负责日常战略、产品和运营。Todd Park 任执行董事长；在
              Devoted 之前，他于 2008 联合创立 Castlight Health，曾任 U.S. Department of Health and Human Services Chief Technology
              Officer（2009–2012），之后在 President Barack Obama 任内担任第二任 US Chief Technology Officer（March 2012 – August
              2014）。Todd Park 也是 2013 年 HealthCare.gov 紧急修复的关键人物。两人叠加医疗技术、政府政策和管理式医疗创业执行经验，为一家依赖数据基础设施和监管导航的 Medicare
              Advantage 公司带来罕见的强创始人-市场匹配。


              2017 SEC Form D 文件列名的成立时主要高管和董事包括 Ed Park（CEO）、Todd Park、Bryan Roberts、Robert Kocher、Kathleen Sebelius 和
              William Frist。Kathleen Sebelius 于 2009 至 2014 担任 U.S. Secretary of Health and Human Services，带来监管洞察和 HHS
              网络价值。William Frist 是执业医生、前 U.S. Senate Majority Leader（2003–2007），也是 Frist Cressey Ventures 联合创始人；Frist
              Cressey Ventures 是 Devoted Series D 及后续投资者，因此他既是董事会成员，也是利益一致的资本伙伴。Bryan Roberts 和 Robert Kocher 是 Venrock
              合伙人，Venrock 曾领投或参与早期融资轮。


              关键人风险集中在两处：Ed Park 是运营型 CEO 和公司公共门面；Todd Park 则是技术愿景、政府网络和投资者网络的锚点。截至报告日期，公开信息未披露重大领导层变动；经审阅公开来源中也没有
              CFO、COO 或其他 C-suite 新增任命。
