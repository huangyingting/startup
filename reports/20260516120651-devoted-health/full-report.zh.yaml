  - id: TM003
    title: 细分 / 买方图谱
    columns:
      - 细分
      - 受益人画像
      - 计划偏好
      - 入保渠道
      - CMS 收入模型
      - 规模 / 趋势（2026）
    rows:
      - - 标准 HMO——价格敏感
        - 65 岁以上、重视初级保健；价格敏感；偏好 $0 保费
        - HMO，$0 保费，附带牙科 / 视力 / 听力补充福利
        - AEP（10 月 15 日–12 月 7 日）；独立经纪人 / 代理；Medicare.gov
        - 县基准 × 风险分数；返利用于补充福利
        - 最大细分；随着非 SNP HMO 流失会员而下降
      - - PPO——流动性 / 灵活性
        - 65 岁以上，依赖专科或经常旅行；愿意支付保费
        - PPO，提供广泛 / 全国网内和网外访问
        - AEP；经纪人；Medicare.gov 比较工具
        - 更高计划保费；基准 × 风险分数，并承担 PPO 灵活性成本
        - 下降；2026 年 PPO 计划减少；大型险企收缩
      - - D-SNP——双重资格
        - 同时加入 Medicare 和 Medicaid 的低收入老人
        - D-SNP，在州级协同下统筹 Medicare + Medicaid 福利
        - Medicaid 转介；MIPPA 协同；经纪人；社区健康工作者
        - Medicare 按人头付费 + 州按会员每月支付的 Medicaid 款
        - 占 SNP 入保 83%；D-SNP 2026 年增长 +10–15%
      - - C-SNP——慢病
        - 具备合格慢性病（糖尿病、CHF、COPD、癌症）的老人
        - C-SNP，配套照护管理项目、病种福利和协调员
        - 医生转诊；AEP；经纪人；社区健康触达
        - 基准按人头付费 + 按病种 HCC 风险分数上调
        - 增长最快的 MA 子细分；2026 年 +49%；Devoted 主要聚焦
      - - EGWP——雇主退休人员团体
        - 通过雇主 / 工会团体福利项目获得保障的 Medicare 资格退休人员
        - Employer Group Waiver Plan（EGWP）或直接 Group MA 合同
        - HR / 福利管理；雇主入保系统
        - 协商团体按人头付费 + 雇主向 CMS 的补贴
        - 单独竞价流程；并非 Devoted 当前重点
      - - 65 岁以下残障 / ESRD
        - 65 岁以下残障或终末期肾病 Medicare 受益人
        - MA HMO 或 I-SNP，配套残障 / ESRD 特定网络和福利
        - CMS 残障 / ESRD Medicare 触发；AEP/OEP
        - 按人头付费并进行残障调整；通常符合 C-SNP 资格
        - 规模较小但病情复杂；常与 C-SNP 临床需求重叠
    notes: |
      细分市场画像综合自 MedPAC (SM001)、Chartis (SM004, SM005)、ATI Advisory (SM014) 和 AHIP (SM015)。 参保比例为 2026 年估计值；EGWP 数据未单独披露。
