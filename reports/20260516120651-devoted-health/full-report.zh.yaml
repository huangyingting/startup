            title: 耐久人口引擎支撑结构性需求
            body: >
              每天约 10,000 名美国人年满 65 岁，每年新增约 ~1.5 million 名符合 Medicare 资格的受益人。CBO 预计 MA 渗透率到 2034 年将达到所有 Medicare 受益人的
              64%，形成一个短期监管变化不太可能完全抵消的结构性需求底部。Devoted Health 聚焦 C-SNPs——增长最快的细分——进一步放大了对已在增长市场内最高增长队列的暴露。
