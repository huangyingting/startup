        title: 竞争、运营与网络风险
        blocks:
          - type: paragraph
            body: >-
              Devoted Health 所处市场结构上呈寡头格局。KFF 2025 年 7 月分析显示，2024 年美国 79% 的县属于高度集中的 MA 市场，18% 属于极高度集中；United Healthcare
              在 41% 的县拿到 MA 参保第一份额，Humana 在 25% 的县第一。 UnitedHealthcare 与 Humana 合计占全国 MA 参保近 47%。Devoted 截至 2026 年 1 月约
              466,000 名会员，规模仍只是任一 incumbent 的零头，限制了其在 provider 合同谈判、成本冲击吸收、以及以同等单位经济性投资网络密度上的能力。Bright Health 全面退出、Cano
              Health 2024 年 2 月破产、Oscar Health 退出 MA，都说明增长节奏和市场选择一旦失准，后果可能 致命。Devoted 快速扩张至 29
              个州，并采用高投入的整合照护模型，策略有差异化，但若 MLR 目标滑落，执行风险也会放大。 2024 年 2 月底 Change Healthcare 网络攻击（UnitedHealth 子公司）扰乱了整个 MA
              行业的理赔处理、药房运营和 prior authorization。CMS 2024 年 3 月 6 日发布指令，要求所有 MA organizations 放宽 prior authorization
              要求，并向 provider 提供预付款。Devoted 与每个 MA 计划一样依赖第三方理赔 clearinghouse 和供应商基础设施；类似网络事件可能中断 照护交付、触发监管审查，并损害会员体验。CMS
              2025 年扩展审计项目也增加了合规运营负担：MA organizations 必须证明多个 支付年度的诊断代码提交准确，需要持续投资文档、编码和审计响应基础设施。
