      - number: '3.2'
        title: 直接竞争者：技术赋能 MA 同行
        blocks:
          - type: paragraph
            body: >
              Clover Health（Nasdaq: CLOV）是技术上最可比的上市同行。Clover 在 NJ、PA、TN、TX、GA 和 AZ 运营，主要提供宽网络 PPO 计划，并由其自研 Clover
              Assistant AI 平台驱动；该平台汇聚患者数据，引导初级护理医生采取预防性干预。2024 全年保险收入为 $1.34 billion，调整后 EBITDA 为 $70 million——首次实现全年正
              EBITDA，同比改善 $112 million。持续经营业务的净 GAAP 亏损从 2023 年 $210 million 改善至 2024 年 $46 million。Clover 在 2025–26 AEP
              期间增长 53%，达到约 153,000 名会员，并预计 2026 年首次实现全年 GAAP 净利润盈利。一个重大风险是：Clover 覆盖 97% 会员的最大合同在 2026 年跌破 4-star
              门槛，可能取消质量奖金支付，并按 Leerink Partners 分析师估计导致数千万 EBITDA 损失。


              Alignment Healthcare（Nasdaq: ALHC）是一家总部位于 California、技术赋能的 MA 计划，拥有整合理赔、临床和运营数据的 AVA（Advanced Value-based
              Architecture）平台。2024 全年收入 $2.70 billion（同比 +48.3%），截至 2024 年末会员数 189,100，同比增长 58.6%。公司在 2024
              年作为上市公司首次实现全年正调整后 EBITDA（$1.3 million），并报告净亏损 $128.1 million。Alignment 的 2026 AEP 表现使会员数增至约
              ~280,000。关键在于，Alignment 在 2026 年实现 100% 会员处于 4-star 或更高评级计划中——这是有意义的质量信号。2025 收入指引为 $3.72–3.78 billion，代表
              37–40% 增长。


              Oscar Health 到 2023 年已完全退出 Medicare Advantage，转向 ACA 个人和小团体市场，那里有约 ~1 million 名会员。CEO Mario Schlosser
              称，若没有深度服务方伙伴关系，规模化执行 MA 存在结构性挑战。Oscar 的 MA 会员数在峰值也从未超过数千人，与 Devoted 的竞争重叠很小。


              Bright Health 在 2023 年接近破产之际完全退出保险业务，此前在 ACA 和 MA 市场过度地域扩张。公司出售 California MA 资产（Brand New Day、Central
              Health Plan，约 ~125,000 名会员），并转向 NeueHealth 照护交付子公司。Bright Health 的崩塌说明，若资本和风险管理纪律不足，快速 MA 扩张会带来灾难性风险。


              Cano Health 是一家服务 MA 会员的价值型初级护理服务方，于 February 2024 申请 Chapter 11 破产，带着超过 $1 billion 有息债务。公司在 2021 IPO
              后估值曾达 $4.4 billion。Cano 于 July 2024 走出破产，$1 billion 债务转为股权，并获得 $200 million 新资本。公司如今聚焦 Florida 的 80
              家诊所。Cano 的崩塌凸显按人头护理模型对风险调整变化和 MA 费率压缩的敏感性。
