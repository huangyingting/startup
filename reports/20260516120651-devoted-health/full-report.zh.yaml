        - label: Humana
          x: 6.5
          'y': 7.5
          description: CenterWell 初级护理 + ChenMed 合作；VBC 历史扎实
        - label: CVS / Aetna
          x: 6
          'y': 7
          description: Oak Street Health 初级护理整合（$10.6B 收购）
