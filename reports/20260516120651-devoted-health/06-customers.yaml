callouts:
- calloutType: strength
  title: "Industry-Leading Enrollment Growth with Clinical Quality"
  body: >-
    Devoted's 121% year-over-year membership growth — from ~211k to 466k — combined with three
    CMS 5-star contracts and a 4.3 weighted average star rating for 2025 (vs. 3.9 national average)
    is a materially differentiated outcome. Reaching 466k members in eight years from zero, while
    maintaining star ratings in the top quartile of the MA industry, suggests the vertically integrated
    care model creates durable member trust, not just low-premium enrollment.
  claimRefs: [CU001, CU002, CU004, CU013, CU024, CU038]

- calloutType: risk
  title: "Customer Satisfaction Gap: Clinical vs. Service Execution"
  body: >-
    US News scores Devoted 4.2 on screening/prevention but only 2.8 on customer satisfaction —
    a significant gap. BBB documents 47 complaints in three years including OTC benefit failures,
    provider directory errors, and transportation delays. As Devoted entered nine new states in a
    single AEP cycle, operational quality at scale represents the key retention risk. The
    discrepancy between high star ratings (clinical measures) and lower member-satisfaction
    sub-scores suggests service infrastructure has not kept pace with enrollment growth.
  claimRefs: [CU016, CU017, CU032, CU033]

- calloutType: risk
  title: "Single-Payer Revenue Concentration"
  body: >-
    One hundred percent of Devoted's revenue is CMS capitation. The V28 risk model transition
    (phased through 2024–2026) reduces per-member payments, and CMS's 2026 rate announcement
    signals continued pressure on MA economics. Any adverse CMS rate action, star rating
    downgrade triggering bonus payment loss, or contract non-renewal would directly and
    immediately impair Devoted's revenue base.
  claimRefs: [CU037]

