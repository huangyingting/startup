- id: TU005
  title: Expansion and Concentration Risk Table
  columns:
  - Expansion Driver / Risk Factor
  - Concentration Type
  - Impact
  - Evidence
  - Diligence Path
  notes: "Concentration metrics inferred from available state filing data, press releases, and market share data. Devoted does not publish
    state-level member counts or single-carrier revenue concentration."
  rows:
  - - Geographic concentration in FL and TX
    - Revenue / membership
    - High — star rating or network disruption in these states would disproportionately affect total performance
    - Biotechnetworks state filing analysis; Devoted self-described as FL+TX+OH core
    - Request state-level revenue and membership split; assess FL/TX as % of total
  - - Rapid new-state entries (9 states in one AEP cycle)
    - Operational / service quality
    - Medium — new-state network adequacy and guide staffing lag behind enrollment growth
    - Devoted 2026 growth press release; BBB complaint pattern of network/access issues
    - Review CMS appeal/grievance data for 2026 new-state markets
  - - Broker/agent channel dependence
    - Distribution
    - Medium — brokers can switch plans if compensation changes or plan quality declines
    - Devoted brokers page (96% satisfaction); Spark Advisors AEP data
    - Assess broker contract terms and switching trends in Devoted's markets
  - - D-SNP member regulatory exposure
    - Regulatory / retention
    - Medium — D-SNP eligibility depends on Medicaid enrollment; Medicaid redetermination can cause involuntary disenrollments
    - Devoted dual-eligibility page lists 14 states; Medicaid renewal reminders issued to members
    - Track Medicaid redetermination cycles and D-SNP disenrollment rates in 2025–2026
  - - CMS rate and risk-model changes (V28)
    - Financial / benefit adequacy
    - High — V28 risk model cuts and 2025/2026 rate announcements reduce revenue per member; may force benefit reductions
    - ATI Advisory / OIG V28 analysis; CMS 2026 rate announcement
    - Review Devoted's filed bids and benefit adequacy across markets as V28 phases in through 2026
  - - Single-payer dependence (CMS)
    - Revenue
    - Critical — 100% of Devoted's revenue comes from CMS capitation; any rate cut or contract non-renewal is existential
    - Devoted regulated health plan filings; MA market structure
    - Monitor CMS annual rate announcements; review MA contract renewal status
  claimRefs: [CU001, CU003, CU008, CU018, CU034, CU035]

