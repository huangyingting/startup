runDate: "2026-05-16"
company:
  name: Devoted Health

chapter:
  number: 6
  title: Customers
  summary: |-
    Devoted Health serves 466,000 Medicare Advantage members across 29 states as of January 2026,
    having grown 121% year-over-year — the highest growth rate among large MA carriers. Its customer
    base is Medicare-eligible seniors 65+, with concentration in Florida, Texas, and Ohio. Three
    contracts earned CMS 5-star status for 2026 (FL H1290, NC H5299, TX H7993), 95% of surveyed
    members say they would recommend Devoted, and broker satisfaction is industry-leading. The BBB
    records 47 complaints over three years (not accredited), and member reviews surface OTC benefit
    fulfillment and network-access friction as recurring pain points.

sections:
- id: member-demographics-and-segments
  title: "Member Demographics and Customer Segments"
  body: >-
    Devoted Health's customers are Medicare-eligible seniors aged 65 and older enrolled in its
    Medicare Advantage (MA) HMO and PPO plans. Unlike enterprise SaaS companies, Devoted operates
    as a B2C insurer: the buyer, user, and payer are the same individual — a senior beneficiary who
    selects Devoted through the CMS annual enrollment period (AEP), a Medicare broker, or directly
    via devoted.com. As of January 2026, Devoted serves over 466,000 members across 29 states, with
    the largest member concentrations historically in Florida, Texas, and Ohio. The company offers
    both standard Medicare Advantage HMO and PPO products and Dual-Eligible Special Needs Plans
    (D-SNPs) for beneficiaries who qualify for both Medicare and Medicaid. For 2026, D-SNP plans
    are available in 14 states including Florida, Texas, Ohio, North Carolina, Colorado, and Alabama.
    Chronic Condition SNPs (C-SNPs) are offered in select markets. Approximately 92% of Devoted's
    plans carry a $0 monthly premium, positioning the company in the affordability segment of the
    MA market. The population skews toward seniors with multiple chronic conditions — hypertension,
    diabetes, and cardiovascular disease — consistent with the MA market broadly. Devoted Medical,
    the integrated virtual-first and in-home clinical group, provides care to the member base and
    is central to Devoted's differentiated retention model.
  claimRefs: [CU001, CU003, CU008, CU018, CU031, CU034, CU035]
  tableRefs: [TU001]
  figureRefs: [FU001]

- id: enrollment-scale-and-adoption
  title: "Enrollment Scale and Adoption Trajectory"
  body: >-
    Devoted grew from roughly 82,000 members at end-2022 to 466,000 as of January 2026, a
    compound annual growth rate far outpacing the market. For plan year 2026, Devoted reported
    a 121% year-over-year membership increase — the highest percentage growth rate among MA
    parent organizations with over 100,000 members. This expansion was driven by the 2025 AEP
    (October–December 2025), during which Devoted entered nine additional states to reach 29
    total. In 2024, the company served 244,763 members and recorded health-plan revenue of
    $3.3 billion (+69% YoY). In 2023, membership stood at approximately 143,000 and revenue
    was $1.9 billion (+76% YoY). State filings for Q1 2024 showed enrollment reaching
    approximately 212,000 by March 31. Devoted describes itself as the fastest-growing and
    eighth-largest MA carrier as of early 2026. Nationally, MA market enrollment grew only
    0.3% during AEP 2026 — well below Devoted's surge — indicating market share capture rather
    than market-wide expansion. The top states for AEP 2026 overall MA growth were Texas (+35k),
    Florida (+27k), and North Carolina (+23k), all core Devoted geographies. Devoted's C-SNP
    applications ranked among the top three carriers during AEP 2026. The company also closed
    $366 million in Series F and F-Prime equity funding in November 2025 and January 2026 to
    fuel continued expansion.
  claimRefs: [CU001, CU002, CU003, CU005, CU006, CU007, CU009, CU019, CU021, CU034, CU039]
  tableRefs: [TU002]
  figureRefs: [FU002]

- id: star-ratings-satisfaction-proof
  title: "CMS Star Ratings, Member Satisfaction, and Named Proof"
  body: >-
    Devoted's member quality is validated externally through CMS Medicare Advantage Star Ratings,
    which measure clinical outcomes, member experience, and customer service. For 2026, three Devoted
    contracts earned 5 out of 5 stars: Devoted Health Plan of Florida (H1290), Devoted Health Plan of
    North Carolina (H5299), and Devoted Health Plan of Texas (H7993). Of 18 total five-star contracts
    industry-wide, Devoted holds three. For 2025, Devoted achieved a weighted average of 4.3 stars
    across 15 rated contracts versus the national average of 3.9. One hundred percent of 2024-rated
    contracts retained 4+ stars for 2025, and 50% of newly rated first-year contracts earned 4+ stars
    (vs. a historical 12% rate). For 2026, 100% of Devoted members in Star-eligible plans are enrolled
    in plans rated 4+ stars on Statin Therapy and Medication Reconciliation. Ninety-six percent of
    members are in 4+ star plans for Controlling Blood Pressure, 98% for the Health Plan Rating, and
    95% for Customer Service. US News rated Devoted Health 4 out of 5 overall and 4.2 on screening
    and prevention, versus 3.7 for UnitedHealthcare on the same dimension. Member satisfaction surveys
    show 95% of members have recommended or would recommend Devoted to family or friends, and 93% trust
    that Devoted keeps its promise to get them needed care. As of 2021, Devoted reported an NPS of 79,
    which it described as higher than Apple, Netflix, and Amazon at that time.
  claimRefs: [CU004, CU013, CU014, CU015, CU024, CU025, CU026, CU027, CU028, CU032, CU033, CU022, CU037, CU038]
  tableRefs: [TU003]
  figureRefs: [FU003]

- id: retention-durability-complaints
  title: "Retention, Durability, and Adverse Evidence"
  body: >-
    Devoted lacks publicly disclosed cohort-level disenrollment data; however, proxy signals indicate
    above-average retention. Member voluntary disenrollment is one of CMS's graded metrics embedded in
    Star Ratings; Devoted's multi-plan 4.5-star performance for 2025 implies disenrollment rates in the
    top quartile of the industry. The broader MA market experiences annual voluntary disenrollment of
    roughly 8–15%; high-performing plans typically retain 88–92% of members annually.
    BBB records 47 total complaints against Devoted Health over the three years ending mid-2026,
    with 20 closed in the last 12 months. Devoted is not BBB Accredited. Complaint categories include
    service-or-repair issues (30), product issues (5), order issues (4), and billing issues (3).
    Member reviews on the BBB platform document specific failure modes: OTC benefit items consistently
    out of stock or missing from orders; medical transportation delays; provider directory inaccuracies
    listing out-of-network physicians as in-network; and lengthy wait times for specialty referrals.
    These are consistent with the operational complexity of scaling a vertically integrated MA plan
    into new geographies. US News scores Devoted 2.8 out of 5 on customer satisfaction, below its 4.2
    on screening and prevention, suggesting that clinical performance outpaces service execution as the
    company scales. Devoted laid off 120 employees (5% of 2,460) in May 2025, which may reflect
    margin management ahead of profitability but has not been linked to service deterioration.
  claimRefs: [CU016, CU017, CU022, CU029, CU032, CU033, CU040]
  tableRefs: [TU004]
  figureRefs: [FU004]

- id: broker-channel-expansion-concentration
  title: "Broker Channel, Expansion, and Concentration Risk"
  body: >-
    Devoted distributes almost entirely through the independent broker/agent channel. Brokers use a
    dedicated Agent Portal to submit enrollments, run Medicare/Medicaid eligibility checks, access
    plan documents, and manage commission statements. For 2026 AEP marketing, Devoted provided a
    comprehensive storefront with plan-at-a-glance guides and enrollment materials across all states.
    In Devoted's own broker surveys (2025), 96% of brokers rated its agent support better than that
    of other MA carriers, and 95% said Devoted listens to and acts on broker feedback. During
    AEP 2026, Devoted's C-SNP applications ranked among the top three carriers alongside Humana and
    UnitedHealthcare on the Spark Advisors platform. Geographic expansion risk is material: nine states
    were added in a single AEP cycle for plan year 2026, and operational quality must scale
    simultaneously. Member concentration is inherently diversified by the nature of an individual-
    beneficiary insurance model — no single member represents a meaningful revenue share. Provider
    partnership risk exists, however: Devoted's HMO plans depend on network adequacy in each county,
    and if key health-system partners reduce MA contracting (as has occurred with Humana and Kettering
    Health), access disruption can trigger disenrollments. B2C concentration by geography is notable:
    Florida and Texas remain the largest states by member volume, and any deterioration in star ratings
    or network adequacy in those states would disproportionately affect Devoted's overall performance.
  claimRefs: [CU001, CU009, CU010, CU011, CU034, CU039]
  tableRefs: [TU005]
  figureRefs: []

