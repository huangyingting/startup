summary:
  headline: >-
    Devoted Health 是创始人主导、执行力可信的 Medicare Advantage payvidor，Star Ratings 处于品类领先，会员同比增长 121%； 但 ~$13B 私募估值相对承压的上市 MA
    可比公司有 3-4x EV/Revenue 溢价，投资成立还取决于持续融资、消化 V28 风险模型， 以及州级文件尚未证明的合并盈利拐点。
