callouts:
  - calloutType: strength
    title: "Structural Revenue Shift: Mining to AI Cloud"
    body: >
      Crusoe's 2024-2025 transition from Bitcoin/DFM mining revenue ($152M in 2024, then zero) to pure AI cloud and
      hyperscaler infrastructure revenue dramatically improves revenue quality. AI cloud is recurring and expanding
      at 150% YoY ARR growth; long-term hyperscaler contracts (Microsoft 900 MW) provide multi-year revenue visibility.
      This is a fundamentally better business model than commodity mining.
    claimRefs: [CI002, CI004, CI011, CI012, CI030]

  - calloutType: risk
    title: "GPU Spot Pricing Compression — Adverse Signal"
    body: >
      H100 GPU spot prices declined from approximately $8/hour to $2–3/hour between 2023 and late 2024, driven by
      neocloud supply expansion. Crusoe's list H100 price of $4.29/hr sits above the spot floor, but reserved-capacity
      discounts and continued competition may compress realized pricing. If on-demand GPU revenue is more than 40% of
      cloud revenue, sustained spot pricing below $3/hr could materially pressure cloud gross margins.
    claimRefs: [CI009, CI024, CI044]

  - calloutType: risk
    title: "ESG Brand Financial Risk: Natural Gas Use vs. Clean-Energy Claims"
    body: >
      Crusoe's clean-energy brand — central to its premium pricing story with ESG-sensitive enterprise customers —
      is materially challenged by Heatmap News reporting (March 2025) of natural gas use and an Engine No. 1 JV for
      4.5 GW of new gas capacity. TCEQ permits confirm 360 MW of on-site gas turbines at Abilene. If enterprise
      customers perform ESG due diligence on actual energy mix, Crusoe risks both customer attrition and premium
      pricing erosion.
    claimRefs: [CI034, CI043]

  - calloutType: insight
    title: "Series E + Project Finance: Runway for Abilene at Scale"
    body: >
      The combination of $1.375B Series E equity, $3.4B Blue Owl JV, and $9.6B JPMorgan project financing creates
      a capital stack large enough to build the full 2.1 GW Abilene campus. Crusoe is not financially constrained
      by equity alone; the project-finance model mirrors REIT/infrastructure capital structures and de-risks equity
      dilution. The key execution risk is draw schedule and covenant compliance, not equity availability.
    claimRefs: [CI013, CI017, CI018, CI019]

  - calloutType: recommendation
    title: "Diligence Must-Haves Before Underwriting"
    body: >
      Any financial underwriting of Crusoe requires at minimum: (1) audited 2023 and 2024 financial statements;
      (2) Q1 2025 management accounts showing post-NYDIG revenue transition; (3) gross margin disclosure by segment;
      (4) cash on hand and monthly burn; (5) contract backlog by customer and term; (6) NYDIG transaction consideration.
      Without these six items, the public financial picture supports the growth narrative but cannot support valuation.
    claimRefs: [CI021, CI022, CI032, CI033, CI040, CI045]

