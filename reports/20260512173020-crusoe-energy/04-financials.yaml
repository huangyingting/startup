  evidenceGaps:
    - type: private-evidence-only
      severity: blocking
      topic: Gross margin — GPU cloud and Spark manufacturing segments
      missingEvidence: "No gross margin, segment-level COGS, or unit-level profitability data is publicly available for either the GPU cloud or Spark manufacturing segments."
      whyItMatters: "Gross margin is the primary driver of valuation multiple in cloud/infrastructure businesses; without it, revenue growth cannot be converted into enterprise value."
      diligencePath: "Request audited P&L or data-room management accounts segmented by GPU cloud, hyperscaler capacity agreements, and Spark manufacturing."
      relatedQuestionRefs: [QI004]

    - type: private-evidence-only
      severity: blocking
      topic: Cash position and monthly burn rate
      missingEvidence: "Cash on hand, balance sheet, and monthly operating burn are not publicly available for any period."
      whyItMatters: "Without cash position and burn, runway cannot be calculated and liquidity risk cannot be assessed even with $1.375B in Series E capital."
      diligencePath: "Request last 12 months of bank statements, CFO bridge model, and most recent audited balance sheet from Michael Gordon (COO/CFO)."
      relatedQuestionRefs: [QI009]

    - type: private-evidence-only
      severity: material
      topic: Audited financial statements
      missingEvidence: "Crusoe has no SEC reporting obligation as a private company; no audited financials are publicly filed or accessible."
      whyItMatters: "All self-reported financial metrics (revenue, TCV, ARR growth) are unaudited; material misstatement risk cannot be assessed without Big-4 audit opinion."
      diligencePath: "Require CPA-audited FY2023 and FY2024 financial statements in data room; if absent, require a quality-of-earnings (QoE) study from a Big-4 firm."
      relatedQuestionRefs: [QI022]

    - type: missing-source
      severity: material
      topic: Net revenue retention and gross revenue retention
      missingEvidence: "Crusoe has not disclosed NRR or GRR for Crusoe Cloud as of any reporting period."
      whyItMatters: "NRR below 100% signals churn risk; NRR above 120% would signal strong expansion, both critical for cloud valuation multiple."
      diligencePath: "Request NRR/GRR by customer cohort, cloud segment, and quarter from SVP Product Erwan Menard or CFO Michael Gordon."
      relatedQuestionRefs: [QI023]

    - type: missing-source
      severity: material
      topic: Reserved capacity discount structure
      missingEvidence: "List pricing is published but enterprise and hyperscaler discount structures, committed capacity tiers, and realized ASP are not disclosed."
      whyItMatters: "Realized ASP vs. list pricing determines actual GPU cloud revenue quality and margin; heavy discounting could compress cloud economics significantly."
      diligencePath: "Request anonymized customer contract pricing schedules and average realized GPU-hr ASP split by on-demand vs. reserved from CFO."
      relatedQuestionRefs: [QI024]

    - type: private-evidence-only
      severity: material
      topic: TCV backlog absolute dollar amount and 2025 full-year revenue
      missingEvidence: "Crusoe disclosed 17x TCV growth and 150% cloud ARR growth in 2025 but did not disclose the absolute TCV dollar base or full-year 2025 revenue."
      whyItMatters: "TCV growth rate without denominator is unverifiable; analyst estimates ($500M–$1B) for 2025 revenue vary 2x, making financial underwriting speculative."
      diligencePath: "Request signed contract schedule with TCV by customer and term; request full-year 2025 revenue and absolute cloud ARR from CFO."
      relatedQuestionRefs: [QI004]

    - type: missing-source
      severity: minor
      topic: GTM motion — CAC, sales cycle, and channel economics
      missingEvidence: "No data on Crusoe's customer acquisition cost, sales cycle length, or channel economics has been publicly disclosed."
      whyItMatters: "CAC/payback is the key sales efficiency metric for a cloud business; without it, LTV/CAC ratio and S&M leverage cannot be assessed."
      diligencePath: "Request cohort-level CAC, payback period, and deal-size distribution from SVP Product or CRO-equivalent in data room."
      relatedQuestionRefs: [QI004]

    - type: missing-source
      severity: material
      topic: Spark manufacturing unit economics, ASP, and signed backlog
      missingEvidence: "No ASP, cost of goods, backlog, or signed contract data for Crusoe Spark units has been publicly disclosed at scale."
      whyItMatters: "Spark is a new, potentially large revenue stream; without unit economics it cannot be modeled or valued separately."
      diligencePath: "Request Spark unit ASP, COGS, gross margin, and signed/LOI contract pipeline from COO or VP Manufacturing."
      relatedQuestionRefs: [QI004]

    - type: missing-source
      severity: material
      topic: Project finance covenant terms, draw conditions, and LTV
      missingEvidence: "JPMorgan's $9.6B project financing terms, covenants, LTV requirements, and drawdown conditions are not publicly disclosed."
      whyItMatters: "Covenant breaches or draw-down delays could halt Abilene construction; at $9.6B scale this is a binary risk for the campus."
      diligencePath: "Request full credit agreement including covenants, LTV thresholds, revenue coverage requirements, and draw schedule in data room."
      relatedQuestionRefs: [QI009]

    - type: missing-source
      severity: minor
      topic: GPU utilization rate and fleet-level capacity factor
      missingEvidence: "Crusoe has not disclosed actual GPU utilization rates across its installed fleet or reserved vs. on-demand mix."
      whyItMatters: "Utilization is the key revenue multiplier on installed capacity; below 70% would compress GPU cloud revenue relative to installed base."
      diligencePath: "Request fleet-level utilization by GPU type (H100/A100/GB200) and by reserved vs. on-demand segment from SVP Engineering Nadav Eiron."
      relatedQuestionRefs: [QI004]

    - type: missing-source
      severity: minor
      topic: Blue Owl Capital JV internal structure and equity/debt split
      missingEvidence: "The internal capital structure of the Blue Owl JV (equity vs. debt, draw schedule, equity-return waterfall) is not publicly disclosed."
      whyItMatters: "JV structure determines Crusoe's effective equity dilution and return share on the $3.4B commitment."
      diligencePath: "Request JV operating agreement including equity/debt split, draw schedule, and Crusoe's economic interest from CFO or General Counsel."
      relatedQuestionRefs: [QI009]

