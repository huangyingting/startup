company:
  name: "Crusoe"
chapter:
  number: 4
  title: "Financials"
  summary: >
    Crusoe reported $276M total revenue in 2024 with AI cloud growing 460% YoY to $124M, then sold its Bitcoin/DFM mining
    segment to NYDIG in March 2025 to pivot to pure AI infrastructure. Backed by $1.375B Series E (Oct 2025, $10B+ valuation)
    and over $15B in committed project financing and JV capital, Crusoe is executing a capital-intensive Abilene campus buildout
    while gross margin, cash position, NRR, and unit economics remain undisclosed as a private company.

sections:
  - id: revenue-model
    title: Revenue Model and Streams
    body: >
      Crusoe's revenue model has undergone a deliberate structural transformation since 2023. In 2024, the company generated
      $276M in total revenue, split roughly 45% AI cloud ($124M, 460% YoY growth) and 55% Bitcoin and digital flare mining
      ($152M). Following the March 2025 sale of its mining assets to NYDIG — 425+ modular data centers, 250+ MW, and
      approximately 135 employees — Crusoe pivoted to a pure AI cloud and data center infrastructure revenue model. The
      company disclosed 150% cloud ARR growth and 17x total contract value (TCV) growth in 2025, though it has not published
      the absolute denominator or base ARR figure. Analyst estimates for full-year 2025 revenue range between $500M and $1B,
      but these are unconfirmed.

      Today, Crusoe's revenue streams operate on three distinct mechanisms. First, Crusoe Cloud delivers GPU and CPU compute
      via on-demand hourly billing and reserved capacity subscriptions; H100 SXM is listed at $4.29/GPU-hour and A100 SXM
      at $1.95/GPU-hour. Second, long-term hyperscaler capacity agreements — most notably the 900 MW Microsoft Abilene
      commitment (March 2026) and Oracle/Stargate anchor relationships — provide large, contracted revenue tranches with
      multi-year visibility. Third, the Crusoe Spark modular AI factory product (each unit ~1 MW prefab capacity, manufactured
      at the 350,000 sq ft Brighton CO Spark Factory) creates a potential product-sale and managed-service revenue line;
      the Redwood Materials partnership expanding from 4 to 24 Spark units demonstrates initial commercial traction.

      Revenue quality has materially improved post-NYDIG: AI cloud revenue is recurring and subscription-based, while the
      old BTC mining revenue was effectively commodity mining subject to halving cycles and hash-rate competition. However,
      heavy hyperscaler concentration (Microsoft, Oracle) introduces customer dependency risk that limits pricing power.
    claimRefs: [CI001, CI002, CI003, CI004, CI005, CI010, CI011, CI012, CI030, CI031]
    tableRefs: [TI001]
    figureRefs: [FI001]

  - id: unit-economics-and-pricing
    title: Unit Economics and Pricing
    body: >
      Crusoe's publicly disclosed pricing is list pricing only; realized revenue per GPU-hour, discount structures for
      reserved capacity, and GPU utilization rates are not disclosed. The H100 SXM is listed at $4.29/GPU-hour and the
      A100 SXM at $1.95/GPU-hour, which position Crusoe at the premium end of neocloud spot offerings but below major
      hyperscaler on-demand rates. The GB200 NVL72 price is undisclosed. CPU compute is listed at $0.04/vCPU-hour.

      The market context for unit economics is adversarial: H100 spot market prices collapsed from approximately $8/hour
      in 2023 to $2–3/hour by late 2024, driven by supply normalization and cluster competition among CoreWeave, Lambda
      Labs, Nebius, and other neoclouds. This compression forces Crusoe — and all GPU cloud operators — to compete on
      infrastructure efficiency, product differentiation (MemoryAlloy inference, Command Center, Edge Zones), and
      enterprise sticky contracts rather than on spot pricing alone.

      On the cost side, key unit economics inputs are publicly available only in aggregate proxy form. Power usage
      effectiveness (PUE) of 1.2–1.3 versus the industry average of 1.8 implies a meaningful energy cost advantage,
      approximately 30–40% lower power overhead than typical hyperscale data centers. At an estimated blended energy cost
      of $0.03–0.06/kWh and H100 TDP of approximately 700W, power cost per H100 per hour is roughly $0.02–0.04 —
      a small fraction of the $4.29 list price. GPU capital depreciation is the dominant cost driver: H100 units cost
      approximately $25,000–30,000 each; depreciated over 3–5 years at 80% utilization, the capital charge per GPU-hour
      is approximately $0.60–1.20, leaving meaningful headroom for gross margin. For the GPU cloud infrastructure
      segment, peer neocloud companies have disclosed gross margins in the 20–40% range, and Crusoe's efficiency
      advantages suggest it could be at the high end, but no gross margin data has been disclosed.
    claimRefs: [CI006, CI007, CI008, CI009, CI021, CI022, CI024, CI025, CI026, CI027, CI038, CI039, CI042, CI044]
    tableRefs: [TI002, TI003]
    figureRefs: [FI002]

  - id: capital-structure
    title: Capital Structure and Adequacy
    body: >
      Crusoe has assembled an unusually large and layered capital structure for a private company in the AI infrastructure
      sector. The equity financing history spans six rounds totaling approximately $3.4B; the two most recent — Series D
      ($600M at $2.8B valuation, SEC Form D filed November 21, 2024) and Series E ($1.375B at $10B+ valuation, SEC Form D
      filed October 23, 2025, exact amount $1,374,999,988 with 71 investors) — were led by Founders Fund and
      Valor/Mubadala respectively. Beyond equity, the company secured a $3.4B Blue Owl Capital joint venture for the
      Abilene data center buildout and JPMorgan is arranging approximately $9.6B in project financing for the same
      campus, bringing total committed capital above $15B.

      This capital structure reflects the fundamental economics of AI hyperscale data center development: each gigawatt
      of AI-optimized capacity requires approximately $10–15M/MW in civil engineering, power infrastructure, and cooling
      infrastructure before a single GPU rack is installed. The 2.1 GW Abilene campus alone represents an estimated
      $12B–20B in total buildout cost over multiple years. Project financing at this scale requires institutional
      counterparties, long-term contracted revenue from investment-grade customers (Microsoft, Oracle), and predictable
      power contracts — all of which Crusoe has secured or is actively pursuing.

      Capital adequacy for near-term operations appears robust: $1.375B equity + project finance runway should cover
      operations and Abilene Phase 1 buildout. Michael Gordon's appointment as COO/CFO in December 2025 (former MongoDB
      CFO who led the 2017 IPO) signals active preparation for potential capital markets activity. Key risks include
      project finance covenant exposure, concentration of capex in a single campus, and the execution dependency on
      JPMorgan credit facility drawdown timing. No cash position or monthly burn rate has been publicly disclosed.
    claimRefs: [CI013, CI014, CI015, CI016, CI017, CI018, CI019, CI020, CI028, CI040, CI041, CI046]
    tableRefs: [TI004]
    figureRefs: [FI004]

  - id: financial-gaps-and-risks
    title: Financial Gaps and Risk Assessment
    body: >
      The most significant financial underwriting gaps for Crusoe are the absence of gross margin, EBITDA, cash position,
      burn rate, net revenue retention, and audited financials. As a private company not subject to SEC reporting
      obligations, Crusoe has no obligation to disclose these metrics. The appointment of MongoDB veteran Michael Gordon
      as CFO signals improving financial governance, but independent verification remains unavailable.

      On the risk side, four material adverse factors bear close scrutiny. First, GPU spot pricing compression — from
      approximately $8/hour to $2–3/hour for H100s — represents a structural pricing ceiling that constrains upside on
      on-demand cloud revenue. Crusoe's ability to lock customers into reserved capacity agreements at list pricing
      above spot is a critical value driver that is unverified. Second, the clean-energy financial risk: Crusoe's ESG
      brand commands potential premium pricing from sustainability-focused enterprises, but Heatmap News (March 2025)
      reported continued natural gas use including an Engine No. 1 JV for 4.5 GW of new gas capacity; TCEQ permits
      confirm 360 MW of gas turbines at Abilene. If ESG-sensitive customers investigate the actual energy stack,
      attrition risk and reputational damage could compress realized pricing below list. Third, customer concentration
      in Microsoft and Oracle creates revenue dependency risk: a contract change or hyperscaler infrastructure
      insourcing decision could materially impact revenue. Fourth, the high-capex model with $9.6B project finance
      creates covenant and refinancing risk at JPMorgan's scale. No public covenant terms, LTV ratios, or debt service
      coverage requirements are available for diligence review.

      The company's 17x TCV growth in 2025 and 150% cloud ARR growth are encouraging signals, but the opacity of
      private financials — particularly gross margin trajectory as the company transitions from mining to cloud — means
      that revenue growth without margin visibility is difficult to underwrite. The Spark manufacturing revenue stream
      is pre-revenue at scale (first units Q3 2026) and has not been modeled publicly.
    claimRefs: [CI021, CI024, CI032, CI033, CI034, CI035, CI043, CI044, CI045]
    tableRefs: [TI005]
    figureRefs: [FI003]

