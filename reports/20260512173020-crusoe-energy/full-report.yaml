      - number: '6.2'
        title: Named Customer Deployments and Outcomes
        blocks:
          - type: paragraph
            body: >
              Crusoe has disclosed a meaningful roster of named production customers, though the depth of public
              evidence varies significantly across accounts. The strongest proof point is Redwood Materials, where
              Crusoe published specific uptime data (99.2% over seven months) and the expansion trajectory (4 to 24
              Spark units) in its 2024 Impact Report and a dedicated newsroom announcement. This represents production
              deployment with quantified outcomes and verified expansion—the gold standard of customer proof for a
              capital-intensive infrastructure provider.

              Microsoft's 900 MW commitment at Abilene, Texas (announced March 2026) is the single largest disclosed
              customer commitment and represents a multi-year, anchor-tenant relationship that validates Crusoe's
              ability to serve hyperscaler-grade workloads. The Forbes investigation (April 2025) identified Crusoe as a
              key Stargate infrastructure partner, with Oracle as the first-building anchor tenant. These hyperscaler
              relationships involve long-term capacity agreements distinct from the on-demand and subscription access
              used by AI product companies.

              NVIDIA's strategic collaboration, announced in a dedicated press release, confirms a preferred-access
              arrangement for GB200/B200/H200 GPUs that benefits Crusoe's customers by providing supply certainty during
              periods of GPU scarcity. This partner-level evidence supplements the customer-level proof.

              The AI product company customers (Cursor, Together AI, Fireworks, Luma AI, Windsurf/Codeium, Decart,
              Playground AI, Databricks) are publicly named as customers in Crusoe newsroom materials and third-party
              reporting, but specific deployment metrics, outcome data, and contract values remain undisclosed. GitHub
              activity (crusoecloud organization with open-source tooling) and HuggingFace presence (crusoeai models
              page) provide developer-community signals of active adoption but not production proof.

              A significant adverse data point is the 45-hour outage in early March 2025, reported by Forbes. This
              outage is the only publicly documented major reliability incident and raises questions about SLA
              performance and the maturity of Crusoe's incident response processes. No follow-up customer complaints
              were found in public channels, but the absence of public NRR data means the impact on customer retention
              cannot be quantified.
