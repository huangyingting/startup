      - number: '3.4'
        title: Competitive Risks and Displacement Scenarios
        blocks:
          - type: paragraph
            body: >-
              The highest-severity competitive risk is hyperscaler GPU capacity acceleration. Microsoft's $80B+ AI
              infrastructure capex commitment for 2025 and corresponding buildouts by AWS and GCP directly increase GPU
              availability on the dominant cloud platforms, reducing the availability arbitrage that currently drives
              enterprise customers toward neoclouds. As hyperscaler GPU reservation pricing falls and lead times
              shorten, the switching cost for enterprises on Crusoe Cloud increases materially.

              The second risk is CoreWeave's IPO-driven capital access and NVIDIA preferred status. As a public company,
              CoreWeave can raise capital more cheaply than private Crusoe, accelerate data center buildouts, and
              attract talent with liquid equity compensation. CoreWeave's estimated $5B ARR at IPO versus Crusoe's $124M
              AI cloud revenue in 2024 represents a significant scale gap that could widen if CoreWeave executes
              aggressively.

              A third risk is GPU spot price compression creating a commoditization race. If H100 spot prices continue
              to fall and reservation prices converge, the structural price arbitrage that justifies neocloud premium
              pricing erodes. Crusoe's energy cost advantage (PUE 1.2–1.3 vs 1.8 industry average) provides a structural
              cost floor, but the magnitude of the advantage—approximately 30–40% lower energy cost per GPU-hr—may not
              be sufficient to offset broad reservation price convergence.

              The Forbes (March 2025) adverse finding on customer reliability is material: a 45-hour outage in early
              March 2025 affected enterprise customers and led to reliability concerns that prompted customer inquiries.
              This is consistent with the operational risk of a fast-scaling infrastructure company. Crusoe's
              achievement of ISO 27001 and SOC2 Type I+II certifications indicates governance investment, but
              operational reliability at GW-scale campus deployments has not yet been proven over a multi-year
              production window.
