      - number: '4.2'
        title: Unit Economics and Pricing
        blocks:
          - type: paragraph
            body: >
              Crusoe's publicly disclosed pricing is list pricing only; realized revenue per GPU-hour, discount
              structures for reserved capacity, and GPU utilization rates are not disclosed. The H100 SXM is listed at
              $4.29/GPU-hour and the A100 SXM at $1.95/GPU-hour, which position Crusoe at the premium end of neocloud
              spot offerings but below major hyperscaler on-demand rates. The GB200 NVL72 price is undisclosed. CPU
              compute is listed at $0.04/vCPU-hour.

              The market context for unit economics is adversarial: H100 spot market prices collapsed from approximately
              $8/hour in 2023 to $2–3/hour by late 2024, driven by supply normalization and cluster competition among
              CoreWeave, Lambda Labs, Nebius, and other neoclouds. This compression forces Crusoe — and all GPU cloud
              operators — to compete on infrastructure efficiency, product differentiation (MemoryAlloy inference,
              Command Center, Edge Zones), and enterprise sticky contracts rather than on spot pricing alone.

              On the cost side, key unit economics inputs are publicly available only in aggregate proxy form. Power
              usage effectiveness (PUE) of 1.2–1.3 versus the industry average of 1.8 implies a meaningful energy cost
              advantage, approximately 30–40% lower power overhead than typical hyperscale data centers. At an estimated
              blended energy cost of $0.03–0.06/kWh and H100 TDP of approximately 700W, power cost per H100 per hour is
              roughly $0.02–0.04 — a small fraction of the $4.29 list price. GPU capital depreciation is the dominant
              cost driver: H100 units cost approximately $25,000–30,000 each; depreciated over 3–5 years at 80%
              utilization, the capital charge per GPU-hour is approximately $0.60–1.20, leaving meaningful headroom for
              gross margin. For the GPU cloud infrastructure segment, peer neocloud companies have disclosed gross
              margins in the 20–40% range, and Crusoe's efficiency advantages suggest it could be at the high end, but
              no gross margin data has been disclosed.
