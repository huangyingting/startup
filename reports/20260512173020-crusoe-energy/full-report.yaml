          - type: callout
            title: Inference scaling creates sustained GPU demand beyond episodic training runs
            body: >-
              Test-time compute and chain-of-thought inference architectures drive continuous GPU utilization rather
              than episodic training spikes. This directly benefits Crusoe's reserved-capacity model by improving
              utilization economics and reducing idle capacity between training runs—a structural tailwind for the
              neocloud segment.
            calloutType: insight
            claimRefs:
