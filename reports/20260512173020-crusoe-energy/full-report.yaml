  - id: FU001
    title: Customer Journey Map
    type: journey-map
    layout: wide
    summary: >-
      Steps from initial awareness to expanded deployment for Crusoe AI cloud customers, including key adverse risk at
      the reliability stage.
    data:
      items:
        - label: Stage 1 – Awareness (AI Lab / Startup discovers Crusoe)
          detail: >-
            Customer learns about Crusoe via NVIDIA partnership announcement, industry press (Forbes, Axios), or
            developer community; GitHub and HuggingFace presence drives organic discovery
        - label: Stage 2 – Qualification (Crusoe Sales qualifies opportunity)
          detail: >-
            Sales team assesses GPU requirements (cluster size, workload type, duration); hyperscalers enter via direct
            capacity negotiation; startups enter via cloud.crusoe.ai self-serve
        - label: Stage 3 – POC / Trial (Customer tests workload)
          detail: >-
            Customer runs proof-of-concept GPU workload; evaluates latency, throughput, pricing vs. CoreWeave / Lambda
            Labs / AWS; ISO certifications reduce enterprise security review cycle
        - label: Stage 4 – Contract (Finance / Procurement approves)
          detail: >-
            Hyperscalers sign long-term capacity agreements (months–years); AI startups use on-demand or monthly
            subscriptions; industrial customers (Redwood Materials) sign Spark deployment contracts
        - label: Stage 5 – Deployment (Crusoe Operations provisions)
          detail: >-
            Crusoe provisions GPU cluster; customer deploys training, fine-tuning, or inference workloads; Command
            Center provides unified observability and job management
        - label: Stage 6 – Value Delivery (Measured uptime and performance)
          detail: >-
            99.2% uptime demonstrated to Redwood Materials; GT Sophy model trained for Sony Research; Cursor and
            Together AI run production inference; adverse: 45-hr outage March 2025 disrupted some customers
        - label: Stage 7 – Expansion (Account growth and upsell)
          detail: >-
            Redwood Materials expanded from 4 to 24 Spark units (7x); Microsoft escalated from initial campus to 900 MW
            anchor; expansion driven by demonstrated reliability and operational value
        - label: Stage 8 – Renewal / Anchor Commitment (Multi-year lock-in)
          detail: >-
            Microsoft 900 MW represents long-term anchor tenant commitment; hyperscaler renewals de-risk Abilene
            financing; on-demand startup renewal driven by price-performance and switching costs
    approximationNotes: >-
      Journey stages are synthesized from public customer announcements, Crusoe newsroom, and the Redwood Materials case
      study. Conversion rates between stages are not available publicly.
    claimRefs:
      - CU001
      - CU002
      - CU004
      - CU006
      - CU010
      - CU015
      - CU021
      - CU022
