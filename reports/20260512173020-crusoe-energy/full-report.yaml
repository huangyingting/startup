  - number: 6
    title: Customers
    sections:
      - number: '6.1'
        title: Customer Base Overview and Segmentation
        blocks:
          - type: paragraph
            body: >
              Crusoe's customer base divides into three distinct segments: (1) hyperscaler anchor tenants who commit
              multi-hundred-megawatt capacity agreements, (2) AI product companies and startups that purchase GPU
              compute on-demand or through short-term subscriptions for training, fine-tuning, and inference workloads,
              and (3) industrial enterprise and research customers deploying Crusoe Spark modular AI factory units for
              specific high-compute applications.

              The hyperscaler segment, led by Microsoft's 900 MW commitment at Abilene (announced March 2026) and
              Oracle/Stargate as the first-building anchor tenant, likely represents the majority of Crusoe's contracted
              capacity but is not separately broken out in public revenue disclosures. These customers value Crusoe's
              ability to compress power-to-GPU timelines to under 12 months and to operate at scale with favorable power
              purchase agreements. Crusoe's 2024 AI cloud revenue of $124M (460% YoY growth) and 2025 ARR growth of 150%
              signal strong demand, though the denominator, customer count, and per-segment breakdown remain
              undisclosed.

              The AI product company segment—including Cursor, Together AI, Fireworks, Luma AI, Windsurf (Codeium),
              Databricks, Playground AI, and Decart—accesses Crusoe Cloud through its standard compute APIs. Crusoe's
              H100/H200/B200 on-demand pricing ($2.99/hr for H100 as of May 2026) is competitive with hyperscaler rates,
              and the platform's ISO 27001 and ISO 42001 certifications reduce enterprise security review friction. The
              GPU-as-a-service market is projected to grow at significant CAGR through 2028 (IDC, MarketsAndMarkets),
              and Crusoe is positioned as one of the leading neocloud providers in this expanding market.

              Industrial and research customers represent a differentiated and high-retention segment. Redwood Materials
              is the best-documented case: the battery recycling company deployed Crusoe Spark units for AI-driven
              quality control and materials science workloads, achieving 99.2% uptime over seven months and subsequently
              expanding from 4 to 24 Spark units—a 7x density increase that is the strongest public proof of Crusoe's
              land-and-expand motion. Sony Research used Crusoe Cloud GPU infrastructure to train the Gran Turismo Sophy
              (GT Sophy) reinforcement learning racing agent, representing a high-profile research use case.
