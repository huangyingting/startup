  - id: FV001
    title: Recommendation logic
    type: flow
    layout: wide
    summary: >-
      The track recommendation flows from strong infrastructure proof and ARR momentum meeting a stretched $10B+ entry
      mark and insufficient financial disclosure, with the IPO filing as the primary upgrade trigger.
    data:
      nodes:
        - id: arr-growth
          label: 150% cloud ARR growth and 17x TCV
          detail: Company-claimed 2025 cloud ARR growth of 150% and 17x total contract value growth confirm demand traction.
          tone: positive
        - id: committed-capital
          label: $15B+ committed capital stack
          detail: Blue Owl $3.4B JV and JPMorgan $9.6B project financing anchor the Abilene 2.1 GW buildout.
          tone: positive
        - id: power-moat
          label: 45+ GW power pipeline
          detail: >-
            Early grid rights and vertical integration from site to cloud represent structural AI infrastructure
            advantage.
          tone: positive
        - id: gpu-pricing
          label: GPU spot price commoditization
          detail: H100 spot prices fell from approximately $8/hr to $2 to $3/hr, compressing neocloud per-GPU economics.
          tone: warning
        - id: concentration
          label: Customer concentration risk
          detail: Microsoft and OpenAI likely anchor revenue; concentration undisclosed but structurally elevated above 50%.
          tone: warning
        - id: no-disclosure
          label: Zero public financial disclosure
          detail: No audited gross margin, EBITDA, or cash-burn data; 2025 ARR estimate of $500M to $1B is unconfirmed.
          tone: warning
        - id: entry-mark
          label: $10B+ entry mark
          detail: Implies 10 to 36x revenue depending on which ARR estimate is used; stretched versus public comp set.
          tone: warning
        - id: recommendation
          label: Track — monitor for IPO signal and ARR confirmation
          detail: >-
            Extraordinary traction warrants close monitoring but $10B+ requires $1B+ ARR confirmation and financial
            disclosure before upgrading to buy.
          tone: neutral
