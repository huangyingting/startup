      - number: '8.4'
        title: Investment Recommendation and Diligence Asks
        blocks:
          - type: paragraph
            body: >-
              The current recommendation is track — not buy. Crusoe demonstrates extraordinary infrastructure traction:
              $15B+ in committed capital, 150% cloud ARR growth in 2025, 17x TCV growth, the Microsoft Abilene anchor, a
              power pipeline exceeding 45 GW, and the October 2025 Series E at $10B+ co-led by institutional-quality
              capital (Valor, Mubadala, Founders Fund, NVIDIA). The appointment of Michael Gordon — who led MongoDB's
              IPO and approximately 50x revenue growth as CFO/COO — signals a deliberate path toward public-market
              readiness. Crusoe was named to Fast Company's 100 Most Innovative Companies of 2026, and NVIDIA expanded
              its strategic collaboration, providing technical validation from the world's dominant AI chip supplier.
              ISO 27001 and ISO 42001 certifications obtained in 2025 support enterprise customer acquisition. These are
              elite demand and execution signals for a private infrastructure company.

              Against this, the $10B+ mark outruns confirmed public financials. The 2024 full-year revenue of $276M
              included $152M from Bitcoin mining divested to NYDIG, leaving pure AI cloud revenue at $124M for 2024. The
              2025 revenue estimate of $500M to $1B is unconfirmed by audited data. There are no public gross margin,
              EBITDA, or cash-burn disclosures. Customer revenue concentration in Microsoft and OpenAI is undisclosed
              but likely above 50% based on the Abilene anchor and Stargate reporting. The cap-table preference
              structure from six rounds is opaque. Contracted ARR (17x TCV growth) may overstate near-term recognized
              revenue if contracts carry ramp provisions or cancellation options. Until management provides audited 2025
              financials or a public financial disclosure package, the $10B mark cannot be underwritten with high
              conviction.

              The diligence path to upgrading from track to buy: (1) obtain audited or confirmed 2025 ARR above $1B
              disaggregated by customer and contract type; (2) verify gross margin and contribution margin on AI cloud
              segment; (3) receive cap-table transparency including liquidation preferences and anti-dilution
              provisions; (4) confirm contracted ARR versus recognized revenue to assess backlog quality; (5) review
              power sourcing actuals versus marketing claims to quantify ESG risk; (6) assess the Spark factory
              inventory and delivery risk as a new business line. An IPO S-1 filing will be the most efficient delivery
              mechanism for most of this information and will serve as the primary monitoring trigger for upgrading the
              recommendation.
