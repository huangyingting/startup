      - number: '7.3'
        title: Financial, Partner, and Dependency Risks
        blocks:
          - type: paragraph
            body: >
              Crusoe's financial risk profile is dominated by capital intensity. The Abilene campus build-out requires
              more than $15B in total committed capital ($3.4B Blue Owl JV equity, $9.6B JPMorgan project financing,
              plus Crusoe's own equity). At this scale, Crusoe is no longer a technology startup—it is a capital markets
              operation that depends on sustained investor confidence, covenant compliance, and anchor tenant retention
              to service its debt obligations. A JPMorgan credit covenant breach—triggered by missed milestones, anchor
              tenant contract termination, or a credit rating downgrade—could force asset sales or equity dilution at
              unfavorable terms.

              GPU pricing pressure is an active financial risk. H100 spot prices collapsed from approximately $8/hr in
              2023 to $2-3/hr in 2025, driven by NVIDIA supply increases and neocloud capacity expansion. If H200/B200
              prices follow a similar trajectory, Crusoe's per-unit compute revenue will compress, reducing the
              contribution from on-demand and short-term subscription customers. The impact is mitigated by the
              hyperscaler anchor agreements (which likely use capacity-based pricing rather than spot GPU rates), but
              the on-demand AI startup segment faces material churn risk if Crusoe cannot match competitor pricing.

              NVIDIA is both Crusoe's strategic partner and its primary GPU supplier dependency. Preferred allocation
              from NVIDIA is not guaranteed if NVIDIA shifts priorities to larger hyperscalers (AWS, Google, Microsoft
              Azure) or decides to develop its own cloud product. Any deterioration in the NVIDIA relationship—whether
              due to supply allocation disputes, roadmap changes, or NVIDIA's DGX Cloud strategy—would directly impair
              Crusoe's ability to fulfill customer commitments.

              Microsoft represents approximately 900 MW of the 2.1 GW Abilene Phase commitment. If Microsoft were to
              reduce, delay, or cancel this commitment—whether due to AI demand contraction, competitive pressures, or
              internal strategy shifts—the JPMorgan project financing covenants would likely be triggered. The Blue Owl
              JV structure and any take-or-pay provisions in the Microsoft contract are the key unknowns in assessing
              this concentration risk.

              JPMorgan is arranging $9.6B in project financing, creating a single capital-markets counterparty
              concentration. If JPMorgan's credit appetite for data center project finance changes (due to market
              conditions, capital requirements, or risk limits), refinancing this facility would be challenging in the
              short term. The terms, covenants, and refinancing provisions of this facility represent a critical
              diligence item.
