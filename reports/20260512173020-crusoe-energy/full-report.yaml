      - number: '4.4'
        title: Financial Gaps and Risk Assessment
        blocks:
          - type: paragraph
            body: >
              The most significant financial underwriting gaps for Crusoe are the absence of gross margin, EBITDA, cash
              position, burn rate, net revenue retention, and audited financials. As a private company not subject to
              SEC reporting obligations, Crusoe has no obligation to disclose these metrics. The appointment of MongoDB
              veteran Michael Gordon as CFO signals improving financial governance, but independent verification remains
              unavailable.

              On the risk side, four material adverse factors bear close scrutiny. First, GPU spot pricing compression —
              from approximately $8/hour to $2–3/hour for H100s — represents a structural pricing ceiling that
              constrains upside on on-demand cloud revenue. Crusoe's ability to lock customers into reserved capacity
              agreements at list pricing above spot is a critical value driver that is unverified. Second, the
              clean-energy financial risk: Crusoe's ESG brand commands potential premium pricing from
              sustainability-focused enterprises, but Heatmap News (March 2025) reported continued natural gas use
              including an Engine No. 1 JV for 4.5 GW of new gas capacity; TCEQ permits confirm 360 MW of gas turbines
              at Abilene. If ESG-sensitive customers investigate the actual energy stack, attrition risk and
              reputational damage could compress realized pricing below list. Third, customer concentration in Microsoft
              and Oracle creates revenue dependency risk: a contract change or hyperscaler infrastructure insourcing
              decision could materially impact revenue. Fourth, the high-capex model with $9.6B project finance creates
              covenant and refinancing risk at JPMorgan's scale. No public covenant terms, LTV ratios, or debt service
              coverage requirements are available for diligence review.

              The company's 17x TCV growth in 2025 and 150% cloud ARR growth are encouraging signals, but the opacity of
              private financials — particularly gross margin trajectory as the company transitions from mining to cloud
              — means that revenue growth without margin visibility is difficult to underwrite. The Spark manufacturing
              revenue stream is pre-revenue at scale (first units Q3 2026) and has not been modeled publicly.
