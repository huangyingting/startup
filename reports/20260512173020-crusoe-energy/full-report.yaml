      - number: '6.3'
        title: Retention Dynamics and Expansion Patterns
        blocks:
          - type: paragraph
            body: >
              Crusoe has not disclosed any standard SaaS retention metrics—NRR, GRR, cohort retention, contract renewal
              rates, or customer count. This is a material evidence gap for a capital-intensive infrastructure provider
              where retention quality drives the economics of the 15B+ Abilene build-out and the viability of future
              campuses.

              Despite the lack of formal retention data, available evidence suggests a bifurcated retention profile.
              Hyperscaler anchor tenants (Microsoft, Oracle) are effectively locked in by long-term capacity agreements
              and significant switching costs—once infrastructure is built to serve a hyperscaler's specific
              requirements, contract termination would be economically destructive for both parties. The 900 MW
              Microsoft commitment represents multi-year contracted revenue with negligible near-term churn risk.

              For AI product companies, retention signals are less clear. The cluster of active customers (Cursor,
              Together AI, Fireworks, Luma AI) has not reported churning, but the lack of formal cohort data makes it
              impossible to distinguish retained subscribers from one-time training jobs. Crusoe's ISO 27001 and ISO
              42001 certifications, Command Center unified operations platform, and NVIDIA GPU supply priority create
              switching costs that should support retention, but these advantages are not quantified.

              The Redwood Materials case demonstrates the land-and-expand motion at its best: a pilot at 4 Spark units
              scaled 7x to 24 units over approximately one year, driven by demonstrated uptime (99.2% over seven months)
              and operational value. This expansion rate, if representative of industrial customers more broadly,
              implies strong net revenue retention for the Spark product line. However, a single data point is
              insufficient to extrapolate a retention rate or NRR figure.

              Crusoe's pricing page lists on-demand GPU compute pricing, enabling smaller customers to access
              infrastructure without long-term contracts and reducing friction at the bottom of the funnel—but also
              implying lower switching costs for price-sensitive customers who can shift to Lambda Labs, CoreWeave, or
              other neoclouds if GPU spot pricing drops further.
