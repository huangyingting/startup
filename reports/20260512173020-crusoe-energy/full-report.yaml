      - number: '6.4'
        title: Customer Concentration and Adverse Findings
        blocks:
          - type: paragraph
            body: >
              Crusoe's customer base carries significant concentration risk. Microsoft (900 MW) and Oracle/Stargate are
              likely the two dominant revenue contributors by capacity, and together they may represent more than 50% of
              contracted capacity at Abilene. This level of hyperscaler concentration is common in early-stage
              infrastructure builders (CoreWeave similarly concentrated in Microsoft/Azure), but it means that a single
              contract renegotiation, cancellation, or technology shift by either anchor could materially impair
              Crusoe's revenue and its ability to service the $9.6B JPMorgan project financing.

              Two adverse findings merit diligence attention. First, the 45-hour outage in March 2025 (reported by
              Forbes) represents a documented reliability failure during a period of commercial ramp. The outage
              duration—nearly two full days—is significantly beyond typical cloud SLA thresholds (99.9% monthly uptime
              allows only ~43 minutes of downtime). If Crusoe's enterprise SLAs commit to hyperscaler-grade
              availability, this event likely triggered remediation obligations. No public statement from Crusoe or
              affected customers addressing the outage was found in the research period.

              Second, Heatmap News (March 2025) documented that Crusoe's clean-energy positioning is in tension with its
              actual energy mix: TCEQ permit data confirms 360 MW of on-site gas turbines at Abilene, and Crusoe is
              developing 4.5 GW of new gas generation capacity. ESG-sensitive enterprise customers (particularly those
              with net-zero commitments) may face procurement friction or reputational risk from a Crusoe partnership.
              While no customer defections attributed to this factor were found, it remains a latent risk that could
              affect enterprise sales cycles, particularly with European customers or US companies with aggressive Scope
              2/3 emissions commitments.

              The neocloud sector is becoming increasingly competitive, with CoreWeave, Lambda Labs, Nebius, and others
              expanding GPU cloud capacity and compressing H100 spot prices from ~$8/hr in 2023 to $2-3/hr in 2025. This
              pricing pressure disproportionately affects shorter-term, on-demand AI product company customers who
              represent Crusoe's land-and-expand funnel. Without NRR data, it is not possible to determine whether
              Crusoe is retaining these customers through the price compression cycle.
