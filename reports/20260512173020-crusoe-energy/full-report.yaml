  - id: FM001
    title: AI Compute Market Sizing Pyramid (TAM → SAM → SOM)
    type: pyramid
    layout: standard
    summary: >-
      The GPU cloud TAM ($26.6B by 2030) is a fraction of the broader AI infrastructure spend ($394B), and Crusoe's
      addressable neocloud SAM narrows further to $3–7B based on its US-centric, large-cluster-focused positioning.
    data:
      nodes:
        - label: 'AI Infrastructure TAM: $394B by 2030'
          detail: >-
            MarketsandMarkets broad market including hardware, networking, cooling, power; 19.4% CAGR from $135.81B in
            2024
          tone: neutral
        - label: 'GPU-as-a-Service TAM: $26.6B by 2030'
          detail: >-
            MarketsandMarkets GPU rental/cloud market; 26.5% CAGR from $8.21B in 2025. Crusoe Cloud addresses this layer
            directly.
          tone: positive
        - label: 'Neocloud SAM (Crusoe-relevant): ~$3–7B by 2030'
          detail: >-
            US-focused, large-cluster reserved GPU cloud; estimated 10–26% of GPU-as-a-Service market based on Crusoe
            footprint and buyer segment
          tone: positive
        - label: 'Crusoe SOM: ~$1.0–1.7B ARR by 2028'
          detail: >-
            Based on 3.4 GW commissioned capacity at $0.3–0.5/W annualized revenue; consistent with 150% ARR growth
            trajectory
          tone: positive
    approximationNotes: >-
      SAM and SOM are analyst estimates derived from Crusoe capacity disclosures and GPU cloud pricing benchmarks, not
      from published reports. TAM layers draw on MarketsandMarkets and IDC. Layers are not additive; each is a
      progressively narrower lens on the same underlying market.
