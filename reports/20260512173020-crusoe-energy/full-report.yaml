  - number: 4
    title: Financials
    sections:
      - number: '4.1'
        title: Revenue Model and Streams
        blocks:
          - type: paragraph
            body: >
              Crusoe's revenue model has undergone a deliberate structural transformation since 2023. In 2024, the
              company generated $276M in total revenue, split roughly 45% AI cloud ($124M, 460% YoY growth) and 55%
              Bitcoin and digital flare mining ($152M). Following the March 2025 sale of its mining assets to NYDIG —
              425+ modular data centers, 250+ MW, and approximately 135 employees — Crusoe pivoted to a pure AI cloud
              and data center infrastructure revenue model. The company disclosed 150% cloud ARR growth and 17x total
              contract value (TCV) growth in 2025, though it has not published the absolute denominator or base ARR
              figure. Analyst estimates for full-year 2025 revenue range between $500M and $1B, but these are
              unconfirmed.

              Today, Crusoe's revenue streams operate on three distinct mechanisms. First, Crusoe Cloud delivers GPU and
              CPU compute via on-demand hourly billing and reserved capacity subscriptions; H100 SXM is listed at
              $4.29/GPU-hour and A100 SXM at $1.95/GPU-hour. Second, long-term hyperscaler capacity agreements — most
              notably the 900 MW Microsoft Abilene commitment (March 2026) and Oracle/Stargate anchor relationships —
              provide large, contracted revenue tranches with multi-year visibility. Third, the Crusoe Spark modular AI
              factory product (each unit ~1 MW prefab capacity, manufactured at the 350,000 sq ft Brighton CO Spark
              Factory) creates a potential product-sale and managed-service revenue line; the Redwood Materials
              partnership expanding from 4 to 24 Spark units demonstrates initial commercial traction.

              Revenue quality has materially improved post-NYDIG: AI cloud revenue is recurring and subscription-based,
              while the old BTC mining revenue was effectively commodity mining subject to halving cycles and hash-rate
              competition. However, heavy hyperscaler concentration (Microsoft, Oracle) introduces customer dependency
              risk that limits pricing power.
