      - number: '2.4'
        title: Growth Drivers and Market Constraints
        blocks:
          - type: paragraph
            body: >-
              The primary growth driver is sustained exponential increase in AI compute demand. Foundation model
              training scales with compute at a superlinear rate while inference demand grows with model adoption—the
              combined effect drives multi-year compounding of GPU cluster requirements. IDC's 46.8% YoY growth in cloud
              GPU infrastructure spending in 2025 is consistent with this thesis.

              Power availability is the second-order structural driver specifically advantaging Crusoe. The US electric
              grid is constrained: new data center power interconnects in Northern Virginia face multi-year queues and
              hyperscalers have publicly acknowledged 3–5 year lead times for new campus power in traditional markets.
              Crusoe's strategy of securing power-first in less contested markets (Abilene TX, Wyoming) converts this
              constraint into a competitive moat. With a 45+ GW power pipeline and 3.4 GW already commissioned, Crusoe
              has secured the binding resource well ahead of market normalization.

              The NVIDIA strategic collaboration (announced January 2025) provides preferred access to GB200 NVL72 and
              next- generation GPU allocations, a critical differentiator in a GPU-supply-constrained environment.
              Crusoe's PUE of 1.2–1.3 versus an industry average of 1.8 (enabled by direct-to-chip liquid cooling)
              translates to lower energy cost per GPU-hr, supporting competitive pricing even as spot prices fall.

              The principal constraint is GPU spot price compression. H100 spot falling from $8/hr to $2–3/hr represents
              a 60–75% revenue-per-unit decline in the spot market. A second constraint is hyperscaler competitive
              response: AWS, Azure, and GCP are all accelerating GPU capacity deployment. An adverse but material
              finding: Crusoe's Abilene campus has TCEQ-permitted 360 MW of natural gas turbines and the company has
              engaged Engine No. 1 to develop 4.5 GW of new gas generation, contradicting its clean-energy branding and
              creating ESG risk with sustainability-focused customers.
