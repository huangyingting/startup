      - number: '4.3'
        title: Capital Structure and Adequacy
        blocks:
          - type: paragraph
            body: >
              Crusoe has assembled an unusually large and layered capital structure for a private company in the AI
              infrastructure sector. The equity financing history spans six rounds totaling approximately $3.4B; the two
              most recent — Series D ($600M at $2.8B valuation, SEC Form D filed November 21, 2024) and Series E
              ($1.375B at $10B+ valuation, SEC Form D filed October 23, 2025, exact amount $1,374,999,988 with 71
              investors) — were led by Founders Fund and Valor/Mubadala respectively. Beyond equity, the company secured
              a $3.4B Blue Owl Capital joint venture for the Abilene data center buildout and JPMorgan is arranging
              approximately $9.6B in project financing for the same campus, bringing total committed capital above $15B.

              This capital structure reflects the fundamental economics of AI hyperscale data center development: each
              gigawatt of AI-optimized capacity requires approximately $10–15M/MW in civil engineering, power
              infrastructure, and cooling infrastructure before a single GPU rack is installed. The 2.1 GW Abilene
              campus alone represents an estimated $12B–20B in total buildout cost over multiple years. Project
              financing at this scale requires institutional counterparties, long-term contracted revenue from
              investment-grade customers (Microsoft, Oracle), and predictable power contracts — all of which Crusoe has
              secured or is actively pursuing.

              Capital adequacy for near-term operations appears robust: $1.375B equity + project finance runway should
              cover operations and Abilene Phase 1 buildout. Michael Gordon's appointment as COO/CFO in December 2025
              (former MongoDB CFO who led the 2017 IPO) signals active preparation for potential capital markets
              activity. Key risks include project finance covenant exposure, concentration of capex in a single campus,
              and the execution dependency on JPMorgan credit facility drawdown timing. No cash position or monthly burn
              rate has been publicly disclosed.
