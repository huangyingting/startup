  - number: 7
    title: Risks
    sections:
      - number: '7.1'
        title: Regulatory and Legal Risk Assessment
        blocks:
          - type: paragraph
            body: >
              Crusoe operates at the intersection of energy infrastructure, AI computing, and environmental compliance,
              creating a complex regulatory footprint. The most material near-term regulatory risk is the Texas
              Commission on Environmental Quality (TCEQ) permitting process for Crusoe's on-site gas turbines at the
              Abilene campus. TCEQ permit filings confirmed 360 MW of gas turbine capacity for the Phase 1 Abilene
              build-out. These air permits require TCEQ review and approval before the turbines can operate, and any
              permitting delay could push back the commissioning schedule for capacity that underpins the JPMorgan
              project financing and the Microsoft anchor tenant agreement.

              EPA Greenhouse Gas Reporting Program obligations apply to large stationary sources (generally 25,000
              metric tons CO2e/year threshold), and Crusoe's Abilene turbines at 360 MW would likely exceed this
              threshold, requiring annual emissions disclosure under 40 CFR Part 98. Crusoe has not confirmed its EPA
              GHG reporting status publicly, but the scale of the turbines implies mandatory participation. This data
              becomes public and can be used by ESG critics and short-sellers to document actual carbon output versus
              clean-energy claims.

              The Texas ERCOT grid dependency is another regulatory risk: Crusoe's AI campus will draw significant power
              from ERCOT, which experienced a catastrophic failure in February 2021 during Winter Storm Uri. While
              Crusoe's behind-the-meter and on-site generation strategy partially mitigates grid exposure, large data
              center customers are subject to ERCOT demand response programs and may face curtailment during grid
              emergencies. Any curtailment event that disrupts hyperscaler SLAs could trigger contract disputes.

              On the legal front, the Upstream Data patent lawsuit (filed: alleging Crusoe infringed patents related to
              flare gas mitigation technology) was resolved on November 24, 2025 via mutual dismissal and a license
              agreement. This outcome is favorable for Crusoe: the litigation overhang is removed, and the license
              agreement implies Crusoe secured ongoing rights to the disputed technology. However, the existence of a
              patent dispute in Crusoe's core historical technology (DFM/flare gas) and the terms of the license
              (including any royalties or field-of-use restrictions) are not publicly disclosed and represent a residual
              diligence item.

              No additional active litigation, regulatory enforcement actions, sanctions exposure, or OFAC flags were
              identified in the research period. Crusoe's Delaware incorporation and Colorado headquarters create no
              unusual jurisdictional complexity, though the Mubadala Capital (Abu Dhabi sovereign wealth) investment may
              require review under CFIUS if Crusoe pursues a US government compute contract or IPO registration.
            claimRefs:
