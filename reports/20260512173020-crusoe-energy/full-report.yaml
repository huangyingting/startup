  - number: 8
    title: Valuation
    sections:
      - number: '8.1'
        title: Valuation Context and Round History
        blocks:
          - type: paragraph
            body: >-
              Crusoe's private market mark has risen through six equity rounds since its 2019 seed, reaching $10B+ with
              the October 2025 Series E — a 3.6x step-up from the $2.8B Series D closed less than twelve months earlier.
              The SEC Form D for the Series E (filed October 23, 2025) confirms total proceeds of $1,374,999,988 with 71
              investors, co-led by Valor Equity Partners and Mubadala Capital. The Series D (Form D filed November 21,
              2024) confirms $600M led by Founders Fund with NVIDIA, Fidelity, Mubadala, Ribbit Capital, and Valor
              participating. Total equity raised across all rounds reaches approximately $3.4B. Beyond equity, Crusoe
              has assembled a $15B+ committed-capital stack: Blue Owl Capital committed $3.4B in a joint venture for
              Abilene data center construction, and JPMorgan is arranging approximately $9.6B in project financing for
              the same campus. This structure reflects a real-asset financing model more reminiscent of infrastructure
              REITs or power utilities than software startups — a deliberate choice that expands the comparable set and
              compresses the conventional revenue-multiple framework.

              The step-up from $2.8B to $10B+ in under twelve months was driven by three catalysts: (1) the March 2025
              sale of Bitcoin mining operations to NYDIG, clarifying Crusoe as a pure AI cloud and data-center company;
              (2) reported 150% cloud ARR growth in 2025 with 17x total contract value (TCV) growth; and (3) the
              announcement of the 900 MW Microsoft Abilene anchor commitment, which de-risks the company's largest
              capital project. Adjusting for these catalysts, the step-up is analytically defensible, but the current
              mark still requires confirmation of revenue scale above $1B before it can be called obviously cheap rather
              than momentum-driven. At 2024 full-year revenue of $276M, the $10B valuation implies roughly 36x trailing
              revenue. If the unverified analyst estimate of $500M to $1B 2025 revenue proves correct, the implied
              multiple falls to 10 to 20x. At $1B ARR and a 10x multiple the valuation is in-line; at $500M and a 20x
              multiple it remains aggressive. The primary diligence imperative is to confirm 2025 ARR with audited or
              management-confirmed data before upgrading the call from track to buy.
            claimRefs:
              - CV001
              - CV002
              - CV003
              - CV004
              - CV005
              - CV006
              - CV007
              - CV008
              - CV009
              - CV010
              - CV011
