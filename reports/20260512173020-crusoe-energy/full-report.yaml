      - number: '1.2'
        title: Leadership and Governance
        blocks:
          - type: paragraph
            body: >
              Crusoe was co-founded by Chase Lochmiller (CEO) and Cully Cavness (President and CSO). Lochmiller studied
              physics and computer science at MIT before completing a master's in computer science with AI
              specialization at Stanford; he also spent several years as a quantitative trader at Jane Street Capital
              before pivoting to energy-tech entrepreneurship. Cavness holds an undergraduate geology degree from
              Middlebury College and an MBA from Oxford University's Saïd Business School, and brings oilfield
              operations experience to Crusoe's energy sourcing and site acquisition work.

              In December 2025, Michael Gordon joined as COO and CFO. Gordon previously served as CFO and COO at
              MongoDB, where he led the company's 2017 IPO and helped grow annual revenue approximately 50x over his
              tenure. His appointment brings public-company financial discipline and investor-relations experience to
              Crusoe's capital-intensive build-out. The former CFO, Matthew DeNezza, transitioned to an advisory role
              through 2026.

              Additional key leaders include Jamey Seely (Chief Legal Officer and Secretary), Nader Pakfar (General
              Counsel Real Estate, appointed January 21, 2026), Erwan Menard (SVP Product, Crusoe Cloud), Nadav Eiron
              (SVP Cloud Engineering), Matt Field (Chief Real Estate Officer), and Chris Dolan (Chief Data Center
              Officer). The board features strategic advisors Bill Stein (former CEO of Digital Realty Trust) and Peter
              Gross. Key-person risk is meaningful: Lochmiller is the public technical visionary and Cavness the energy
              strategist. Governance documentation beyond SEC Form D officer listings is not publicly available—board
              composition, independent director count, and preference structures remain undisclosed.
