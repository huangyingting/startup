      - number: '5.2'
        title: Crusoe Cloud – Software Platform and API Services
        blocks:
          - type: paragraph
            body: >
              Crusoe Cloud is a purpose-built GPU cloud offering bare-metal, virtual machine, and Kubernetes-managed GPU
              clusters accessible via a REST API, CLI, and Terraform provider. The platform exposes three compute tiers:
              on-demand (hourly billing), reserved (1- or 3-year commitment), and spot (preemptible, discounted). The
              inference API layer implements the OpenAI Chat Completions and Completions v1 API surface, allowing
              drop-in substitution; supported models include Llama 3.1/3.2/3.3, Mistral, Mixtral, DeepSeek-R1/V3,
              Qwen2.5, and Phi-4, with NVIDIA TensorRT-LLM as the serving backend.

              The Crusoe File System (CFS) is a Lustre-based parallel distributed file system with aggregate throughput
              measured in hundreds of gigabytes per second, designed to co-locate storage with GPU clusters to avoid
              PCIe or network-to-CPU bottlenecks. CFS supports GPUDirect RDMA, enabling direct GPU-to-storage DMA
              without CPU involvement. For Kubernetes workloads, CFS is exposed as ReadWriteMany persistent volumes via
              a CSI driver. Block storage (NVMe-over-Fabric, up to 100 TB per instance), object storage (S3-compatible),
              and network-attached NFS volumes complete the storage portfolio.

              Networking provides 400 Gbps InfiniBand to every GPU node within a pod; inter-zone bandwidth is 100 Gbps
              Ethernet. Private networking uses VPCs with subnet-level firewall controls. The platform runs on OpenStack
              with Keystone IAM; SAML 2.0 and OIDC federated identity are supported for enterprise SSO. Container images
              are maintained and published to GitHub Container Registry at ghcr.io/crusoecloud. The open-source
              Terraform provider (Apache 2.0) has 200+ commits and is used by customers for infrastructure-as-code
              deployments, providing verifiable developer adoption. Kubernetes documentation walks through node pool
              configuration, autoscaling, and CFS volume attachment.

              The platform achieved ISO 27001:2022 certification in Q2 2025 and ISO 42001:2023 (AI management system)
              certification in Q3 2025, both confirmed by UKAS-accredited DNV GL. The AI systems certification is
              particularly differentiated; fewer than a dozen cloud providers globally hold ISO 42001 as of mid-2026.
              SOC 2 Type II is not yet reported, which represents a compliance gap for regulated enterprise buyers.
