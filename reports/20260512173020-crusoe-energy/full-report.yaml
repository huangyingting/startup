  - number: 2
    title: Market Analysis
    sections:
      - number: '2.1'
        title: Market Definition and Scope
        blocks:
          - type: paragraph
            body: >-
              Crusoe operates at the intersection of two adjacent markets: GPU cloud computing (neoclouds and
              GPU-as-a-Service) and AI data center infrastructure. The relevant market for underwriting Crusoe spans
              three surfaces: managed GPU compute sold to AI training and inference workloads (Crusoe Cloud);
              large-scale power-optimized data center capacity sold under long-term hyperscaler contracts (Microsoft 900
              MW Abilene commitment); and modular AI factory deployments sold to enterprises building dedicated
              on-premise AI compute (Crusoe Spark).

              Explicitly excluded from this market boundary are general-purpose cloud IaaS (CPU VMs, object storage,
              CDN), consumer AI application software, AI semiconductor manufacturing, and unrelated energy
              infrastructure. The neocloud GPU cloud market is defined by workloads requiring dense clusters of
              high-memory GPUs (H100/H200/B200/GB200 class) for deep-learning training, large-model fine-tuning, or
              sustained batch inference—workloads that commodity public cloud increasingly cannot serve at required
              density, latency, or cost.

              The primary status-quo substitute for Crusoe's services is hyperscaler GPU cloud (AWS P4/P5, Azure NDv5,
              GCP A3), which remains the largest addressable pool but faces acute power, space, and lead-time
              constraints in traditional markets. GPU spot prices have fallen sharply from approximately $8/GPU-hr in
              mid-2023 to $2–3/GPU-hr by early 2025 for H100 instances, compressing per-unit economics across all
              neocloud operators. This pricing dynamic does not reduce absolute GPU compute demand—it reflects a supply
              response—but it directly impacts revenue per unit and creates a race to cost leadership where Crusoe's
              energy and infrastructure vertical integration is central to its competitive thesis.
            claimRefs:
              - CM001
              - CM002
              - CM003
              - CM004
              - CM005
