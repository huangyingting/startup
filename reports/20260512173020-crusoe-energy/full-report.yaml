            title: GPU spot price compression materially impairs neocloud unit economics
            body: >-
              H100 spot prices fell from ~$8/GPU-hr to ~$2–3/GPU-hr—a 60–75% decline. Any component of Crusoe's cloud
              revenue exposed to spot pricing faces sustained margin pressure. Crusoe's posted H100 SXM rate of
              $4.29/GPU-hr is a premium to current spot, making reserved-contract fill critical to maintain
              revenue-per-unit targets.
            calloutType: risk
            claimRefs:
              - CM028
