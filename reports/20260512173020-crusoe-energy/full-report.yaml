      - number: '2.3'
        title: Buyer and Segment Analysis
        blocks:
          - type: paragraph
            body: >-
              GPU compute buyers segment into three primary groups: (1) frontier AI labs and hyperscalers requiring
              large GPU clusters for foundation model training—highest ACV, longest contracts, price-insensitive at
              scale; (2) enterprise AI platform teams running inference, fine-tuning, and research workloads—mid-market
              ACV, mix of reserved and spot; and (3) developer and research organizations requiring flexible
              smaller-scale access—lower ACV, spot-market-dominated.

              Crusoe's customer base demonstrates clear bias toward the first two tiers. Microsoft's 900 MW Abilene
              commitment represents a hyperscaler contracting for long-duration large-scale capacity. Oracle/Stargate
              and Together AI represent frontier lab and platform customers. Cursor (AI coding assistant) and Redwood
              Materials (advanced manufacturing AI with a 7x partnership expansion) represent enterprise inference
              customers. Crusoe's $124M AI cloud revenue in 2024 (up 460% YoY) and 150% YoY ARR growth in 2025 confirms
              that enterprise account acquisition has broadened beyond a single hyperscaler.

              Budget ownership for GPU cloud decisions typically resides in VP/C-level engineering or infrastructure at
              technology companies, with procurement involvement for contracts above $1M/year. Adoption triggers are:
              (a) inadequate GPU availability on hyperscalers, (b) cost arbitrage against AWS/Azure on-demand pricing,
              and (c) compliance or data residency requirements driving preference for dedicated infrastructure.

              An adverse dynamic: H100 spot prices at $2–3/hr match or undercut Crusoe's posted H100 SXM price of
              $4.29/GPU-hr, making the spot-market developer/research segment increasingly served by discounted
              hyperscaler capacity. Crusoe's best-defended segment is the top tier where power availability, cluster
              density, and long-term reservation—not hourly spot price—are primary buying criteria.
            claimRefs:
