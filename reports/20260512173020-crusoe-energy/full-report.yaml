      - number: '1.4'
        title: Operating Scale and Key Milestones
        blocks:
          - type: paragraph
            body: >
              As of March 31, 2026, Crusoe employed 1,235 people, up from approximately 600 at end-2024. The company
              operates in nine U.S. states and internationally in Iceland, Norway, Ireland, and Israel. The flagship
              campus in Abilene, Texas spans 2.1 GW of committed capacity (following the March 2026 Microsoft 900 MW
              announcement). A Wyoming campus of 1.8 GW has been announced. Total power pipeline exceeds 45 GW.

              Infrastructure metrics as of early 2026: 9.8M sq ft of facilities, 3.4 GW commissioned electricity,
              approximately 946,000 GPU-equivalent capacity. Crusoe's Spark Factory in Brighton, Colorado (350,000 sq
              ft, $200M investment, 200+ jobs) is manufacturing modular prefabricated AI factory units with first
              deliveries expected Q3 2026. Power usage effectiveness (PUE) is reported at 1.2–1.3, enabled by
              direct-to-chip liquid cooling.

              Adverse context: Heatmap News (March 2025) reported that despite Crusoe's clean-energy messaging, the
              company uses natural gas generation and has engaged Engine No. 1 to develop 4.5 GW of new gas capacity for
              AI data center demand. Texas Commission on Environmental Quality (TCEQ) permit filings confirmed 360 MW of
              on-site gas turbines at the Abilene campus, representing approximately 30% of the 1.2 GW Phase 1 capacity.
              This creates tension between Crusoe's environmental branding and actual energy sourcing practice, a risk
              that could affect ESG-sensitive customers and investors.
