      - number: '8.2'
        title: Comparable Company and Transaction Analysis
        blocks:
          - type: paragraph
            body: >-
              The most relevant public comparable for Crusoe is CoreWeave, which completed its IPO in March 2025 at an
              implied valuation of approximately $23B. CoreWeave was generating approximately $5B in annualized revenue
              at IPO time, implying a revenue multiple of roughly 4.6x ARR at the IPO price — materially lower than
              Crusoe's current implied 10 to 20x depending on which 2025 revenue estimate is used. CoreWeave's
              subsequent trading reflects multiple compression, with shares declining from the IPO mark, suggesting the
              public market applies a more disciplined lens than the private market afforded the same sector. For Crusoe
              to justify its $10B mark against the CoreWeave IPO benchmark, it would need ARR approaching $2B at a 5x
              multiple — a target that remains unverified and likely several years away.

              Nebius AI (NASDAQ-listed, approximately $6B market cap as of 2025 to 2026) provides a second data point: a
              European GPU cloud with significant NVIDIA backing trading at a fraction of Crusoe's implied entry price
              despite similar positioning. Lambda Labs, privately valued at an estimated $1.5B, illustrates that
              developer-focused neoclouds without proprietary power infrastructure command substantially lower
              multiples. Lancium, a private Texas-based neocloud with a similar power-first thesis, has no public
              valuation anchor for direct comparison but represents the closest strategic analog. The Bain Capital
              Ventures essay frames the investment thesis explicitly around power scarcity as a durable moat: AI
              infrastructure demand is constrained by permitting and grid access, making early power rights defensible.
              However, hyperscalers are actively acquiring grid rights, and ComputeForecast neocloud analysis notes GPU
              spot pricing declined from approximately $8/hr to $2 to $3/hr for H100s — a structural headwind
              compressing per-GPU economics. The enumeration of public and private comparables remains incomplete
              because most direct peers are either private or recently public without sufficient operating history to
              anchor a multiple cleanly, warranting the partial enumeration scope designation for TV004.
            claimRefs:
