  - number: 5
    title: Product & Technology
    sections:
      - number: '5.1'
        title: Hardware Platform and Modular AI Infrastructure
        blocks:
          - type: paragraph
            body: >
              Crusoe's foundational hardware unit is the Modular AI Factory (MAF), a self-contained, prefabricated
              container integrating GPU compute nodes, primary power distribution, liquid cooling manifolds, and UPS
              backup within a single factory-built module. Each MAF unit operates at 1-2 MW of IT load; at campus scale,
              dozens of MAF units combine with shared power infrastructure, networking, and fiber ingress to form
              campuses from 30 MW to over 1 GW. The modular design delivers 6-8 month campus stand-up versus the 24-36
              months required for traditional design-and-build data centers, a direct consequence of
              factory-prefabricated modules arriving pre-wired and pre-commissioned, ready for generator or grid
              connection.

              Crusoe's primary deployed GPU is the NVIDIA H100 SXM5 (80 GB HBM3), with H200 SXM5 (141 GB HBM3e) in
              active deployment and B200 SXM5 (192 GB HBM3e) targeted for GA in Q3 2026. A multi-year NVIDIA strategic
              collaboration expanded in Q4 2025 provides allocation priority and early access to B200 and GB200 NVL72
              systems. Intra-cluster networking uses NVIDIA Quantum-2 InfiniBand at 400 Gbps per link, providing
              GPU-to-GPU bisection bandwidth for 512+ GPU distributed training. Node-level NVLink and NVSwitch support
              intra-server all-reduce operations.

              Crusoe's BYO-Power program lets hyperscale customers co-locate GPU compute at customer-owned substation
              sites with behind-the-meter generation. At least one hyperscale partner at Abilene provides ~300 MW of
              dedicated behind-the-meter power under this arrangement. Abilene Phase 1 (200 MW IT load) became
              operational in Q1 2026, using 765 kV high-voltage transmission interconnection to minimize step-down
              losses. Edge Zones, launched March 2026, extend the compute footprint with 1-5 MW distributed inference
              nodes at third-party colocation sites, targeting sub-10 ms latency for real-time inference, video
              analytics, and sovereign-AI workloads.

              Crusoe's manufacturing facility in Brighton, Colorado (350,000 sq ft, ~$200M investment) produces MAF
              units at scale, with first commercial deliveries targeted for Q3 2026. At peak production the facility is
              expected to output 50-100 MAF units per quarter, equipping a new 200 MW campus roughly every 90 days. The
              GB200 NVL72 rack (72 Blackwell GPUs per rack, ~5 PFLOPS peak FP8 per rack) is planned for Abilene Phase 2
              deployment.
