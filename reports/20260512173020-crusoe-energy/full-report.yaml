companyProfile:
  summary: >-
    Crusoe is a Denver-based AI infrastructure company that has pivoted from Bitcoin mining to become a full-stack "AI
    factory" provider — combining on-site power generation (360 MW natural gas turbines, renewable PPAs), proprietary
    direct-to-chip liquid cooling (PUE 1.2-1.3), modular AI factory infrastructure (Spark Factory), and a GPU cloud
    platform (Crusoe Cloud). The company holds a 2.1 GW committed campus at Abilene, Texas anchored by Microsoft (900
    MW), Oracle/Stargate, and OpenAI, plus a 1.8 GW Wyoming campus in planning. Crusoe's Series E ($1.375B, October
    2025) at a $10B+ valuation confirmed unicorn status and established it as the leading vertically integrated neocloud
    operator. 2024 revenue was $276M; the BTC mining segment was divested to NYDIG in March 2025, making Crusoe a
    pure-play AI infrastructure company. NVIDIA is both a preferred GPU supply partner and an equity investor.
