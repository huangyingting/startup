      - number: '7.2'
        title: Operational and Technical Risks
        blocks:
          - type: paragraph
            body: >
              Crusoe's operational risk profile is dominated by the reliability requirements of serving hyperscaler and
              enterprise customers with SLA commitments, while simultaneously scaling from a startup to a multi-gigawatt
              AI factory operator in under two years. The most documented operational failure to date is the 45-hour
              outage in March 2025, reported by Forbes. This incident lasted nearly two full days—significantly
              exceeding the downtime allowed under a 99.9% monthly uptime SLA (~43 minutes per month). No post-mortem
              was published, and no customer remediation was publicly acknowledged.

              Cooling failure is the second critical operational risk. Crusoe uses direct-to-chip liquid cooling to
              achieve its 1.2–1.3 PUE efficiency, which requires specialized cooling infrastructure distinct from
              traditional air-cooled systems. A cooling loop failure in a GPU cluster can trigger thermal throttling or
              hardware damage within minutes. The risk is amplified at Abilene (Abilene TX average summer high ~98°F),
              where ambient temperatures create sustained cooling load demands.

              Power grid dependency is a systemic risk for the Abilene campus. Although Crusoe has on-site gas turbines
              (360 MW) providing backup and supplemental generation, the 2.1 GW committed campus will rely predominantly
              on ERCOT grid power. ERCOT capacity constraints, transmission congestion, and demand response obligations
              could interrupt power delivery. Natural disaster events (tornadoes, heat domes, ice storms) present force
              majeure scenarios that could trigger SLA breaches even where Crusoe is not contractually liable.

              Supply chain risk for NVIDIA GPUs is significant during the current H200/B200/GB200 transition. Crusoe's
              strategic collaboration with NVIDIA provides preferred GPU allocation, but GPU allocations globally remain
              tight through 2026. A delay in GB200 NVL72 deliveries would push back the commissioning schedule for
              portions of the Abilene Phase 2, affecting revenue ramp for the Microsoft anchor tenant agreement. Crusoe
              has invested in NVIDIA's Vera CPU roadmap, which is a multi-year execution bet on unproven silicon.

              Cybersecurity and data breach risk apply to any multi-tenant GPU cloud operator. Crusoe achieved ISO 27001
              certification, which demonstrates a mature ISMS framework, but cloud infrastructure providers face
              persistent threats from nation-state actors and opportunistic attackers targeting LLM training data, model
              weights, and customer workloads. A material security incident could trigger enterprise customer churn,
              regulatory investigations, and reputational damage that would be difficult to recover from at the current
              growth stage.
            claimRefs:
