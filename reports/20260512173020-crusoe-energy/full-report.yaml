      - number: '7.4'
        title: Execution, ESG, and Reputational Risks
        blocks:
          - type: paragraph
            body: >
              Crusoe's headcount nearly doubled from approximately 600 at end-2024 to 1,235 on March 31, 2026. This rate
              of organizational scaling carries execution risks: cultural dilution, process gaps, management bandwidth
              constraints, and increased coordination costs. The company hired a new COO/CFO (Michael Gordon, former
              MongoDB executive) in December 2025 and a new General Counsel for Real Estate (Nader Pakfar) in January
              2026, signaling the transition to a more mature operating model. However, key-person dependency on
              co-founders Chase Lochmiller (CEO) and Cully Cavness (President) remains elevated—they are the primary
              technical and energy visionaries, and their departure or reduced involvement would represent a material
              adverse change for investors.

              The Spark Factory in Brighton, Colorado (350,000 sq ft, $200M investment) is scheduled to deliver first
              units in Q3 2026. Any delay in this timeline—due to construction overruns, equipment procurement,
              permitting, or quality issues—would constrain Crusoe's ability to fulfill modular AI factory customer
              commitments beyond the Abilene campus. The Spark product line is an important revenue diversification
              pathway, and delays would lengthen the company's dependence on the single Abilene campus.

              The Wyoming campus (1.8 GW announced) has not broken ground as of the research period (May 2026). The gap
              between announcement and groundbreaking introduces execution risk on the company's stated pipeline beyond
              Abilene. Power access agreements, permitting timelines, and financing for Wyoming are not yet confirmed
              publicly.

              The most prominent ESG and reputational risk is the tension between Crusoe's clean-energy positioning and
              its actual energy mix. TCEQ permit data confirms 360 MW of on-site gas turbines at Abilene, and Heatmap
              News reported that Crusoe is working with Engine No. 1 to develop 4.5 GW of new gas generation capacity
              for AI demand. This creates a material greenwashing risk: if ESG journalists, short-sellers, or activist
              investors amplify the Heatmap reporting, Crusoe could face reputational pressure that affects enterprise
              sales cycles (particularly with European customers with mandatory Scope 2/3 disclosures), future financing
              (ESG-linked debt), and IPO positioning. The 2024 Impact Report and ISO 42001 AI management certification
              are positive steps, but they do not address the fundamental tension between gas-powered compute and
              clean-AI marketing.
