      - number: '2.2'
        title: Market Sizing Analysis
        blocks:
          - type: paragraph
            body: >-
              Multiple analyst sources triangulate a large and fast-growing total addressable market. MarketsandMarkets
              estimates the GPU-as-a-Service market at $8.21B in 2025 growing to $26.62B by 2030 at a 26.5% CAGR. The
              broader AI infrastructure market is sized at $135.81B in 2024 projected to reach $394.46B by 2030 at a
              19.4% CAGR. IDC reported cloud infrastructure GPU spending grew 46.8% in 2025 reaching $157.8B. The
              neocloud sub-segment generated over $5B in quarterly revenue in Q2 2025, a 205% year-over-year increase,
              per ComputeForecast.

              These estimates are directionally consistent but methodologically diverse. MarketsandMarkets focuses on
              rentable GPU compute revenue; IDC includes capital spend on AI server hardware; broader AI infrastructure
              estimates include networking, storage, cooling, and power infrastructure. Crusoe competes most directly in
              the neocloud GPU cloud segment ($8–27B range by 2030) but captures additional value through infrastructure
              construction and long-term capacity agreements.

              The serviceable addressable market (SAM) for Crusoe is constrained by its US-centric footprint and
              large-cluster focus. A conservative SAM estimate is $3–7B by 2030, or roughly 10–26% of the
              GPU-as-a-Service TAM. SOM is estimated at $1.0–1.7B in annualized GPU cloud revenue by 2028, based on 3.4
              GW commissioned capacity at $0.3–0.5/W annualized compute revenue, aligned with the 150% ARR growth
              trajectory reported for 2025. No formal SAM/SOM framework has been publicly disclosed by Crusoe; these are
              analyst constructs requiring diligence validation.
            claimRefs:
