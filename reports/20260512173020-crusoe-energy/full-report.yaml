  - number: 1
    title: Company Overview
    sections:
      - number: '1.1'
        title: Identity and Business Model
        blocks:
          - type: paragraph
            body: >
              Crusoe—rebranded from "Crusoe Energy Systems" and operating at crusoe.ai—describes itself as "the AI
              factory company," on a mission to accelerate the abundance of energy and intelligence. The company is
              headquartered at 255 Fillmore Street, Suite 400, Denver, Colorado 80206, incorporated in Delaware as
              Crusoe Inc. (formerly Crusoe Energy Holdings Inc., CIK 0001924674).

              Crusoe's core claim is vertical integration spanning three layers: (1) large-scale energy sourcing and
              site development, (2) AI-optimized data center design, construction, and manufacturing, and (3) a
              proprietary GPU cloud platform (Crusoe Cloud) with managed inference, observability, and edge-zone
              services. This vertical model is designed to compress timelines from land acquisition to GPU-online from
              the industry norm of 3–5 years to under 12 months for greenfield campuses.

              The company monetizes through cloud compute subscriptions and on-demand GPU rental (Crusoe Cloud),
              long-term capacity agreements with hyperscalers (e.g., Microsoft's 900 MW Abilene commitment), and modular
              AI factory deployments (Crusoe Spark units). Revenue was $276M in 2024, of which AI cloud contributed
              $124M (460% YoY growth) and Bitcoin/DFM mining contributed $152M. Following the March 2025 NYDIG
              acquisition of Crusoe's Bitcoin and DFM operations, the company is pivoting toward pure AI cloud
              infrastructure revenue.
