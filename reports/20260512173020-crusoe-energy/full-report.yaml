  - id: TV006
    title: Final diligence asks table
    columns:
      - Topic
      - Missing evidence
      - Why it matters
      - Diligence path
    rows:
      - - 2025 revenue and ARR confirmation
        - Audited or management-confirmed 2025 full-year ARR disaggregated by business line and contract type
        - Core valuation input; $10B mark implies 10 to 20x on unverified $500M to $1B; must confirm before underwriting
        - Private data room; S-1 or prospectus when filed; management confirmation letter from lead investor
      - - Gross margin and EBITDA visibility
        - No public margin, contribution margin, or EBITDA data exists for any Crusoe business unit or period
        - Capital-intensive model with JV and project-finance structures; margin determines whether scale creates value
        - Private financial disclosure request; IPO S-1 filing; peer benchmarking against CoreWeave segment margins
      - - Customer revenue concentration
        - No public disclosure of revenue percentage by customer; Microsoft and OpenAI concentration unverified
        - Concentration above 50% creates binary revenue risk and potential renegotiation or cancellation leverage
        - Private data room; contract review; customer reference calls; S-1 risk factor disclosure when filed
      - - Cap-table preference structure
        - Six rounds of equity from multiple lead investors; liquidation preferences and anti-dilution undisclosed
        - Preference overhang can materially impair common equity returns at exit valuations below highest round price
        - Private data room; legal counsel review of shareholder agreement and charter; 409A valuation report
      - - Power sourcing actuals versus marketing claims
        - TCEQ permits confirm 360 MW gas turbines at Abilene; total renewable percentage by campus not disclosed
        - ESG risk affects sovereign wealth fund and EU-linked capital; greenwashing exposure increases regulatory risk
        - TCEQ permit review; EPA GHG reporting data; independent energy audit request; on-site facility inspection
      - - Contracted ARR versus recognized revenue
        - TCV growth of 17x reported but revenue recognition timing and contract structure are fully undisclosed
        - TCV overstates near-term ARR if contracts have ramp provisions or termination-for-convenience clauses
        - Contract sampling in data room; revenue recognition policy review; deferred revenue schedule in financials
    notes: >-
      Diligence paths assume access to private data room; most items will also be disclosed in an S-1 filing when Crusoe
      proceeds toward an IPO. Priorities are listed in descending order of urgency.
    claimRefs:
      - CV013
      - CV040
      - CV041
      - CV050
      - CV051
