      - number: '1.3'
        title: Funding History and Capital Structure
        blocks:
          - type: paragraph
            body: >
              Crusoe has raised approximately $3.4B in equity financing across six rounds since 2018, and has secured an
              additional ~$13B in project financing and JV commitments for its Abilene, Texas campus build-out. The
              funding trajectory is one of the fastest scale-up curves in the neocloud sector.

              The company's venture funding began with a $4.5M seed round in May 2019, co-led by Bain Capital Ventures
              and Founders Fund. A $30M Series A followed in December 2019. The Series B ($128M, April 2021) was led by
              Valor Equity Partners. The Series C ($350M at $1.75B valuation, April 2022) was led by G2 Venture
              Partners, with an additional $155M tranche.

              The Series D ($600M at $2.8B, announced December 12, 2024) was led by Founders Fund, with NVIDIA,
              Fidelity, Mubadala, Ribbit Capital, and Valor participating. The SEC Form D (filed November 21, 2024)
              confirms the offering. The Series E ($1.375B at $10B+, announced October 24, 2025) was co-led by Valor
              Equity Partners and Mubadala Capital with 71 investors per the SEC Form D (filed October 23, 2025). The
              total equity raised is approximately $3.4B. Blue Owl Capital committed $3.4B in a joint venture for
              Abilene data center construction, and JPMorgan is arranging approximately $9.6B in project financing,
              bringing total committed capital for Abilene above $15B.
