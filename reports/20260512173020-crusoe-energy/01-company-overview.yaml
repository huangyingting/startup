company:
  name: Crusoe
chapter:
  number: 1
  title: Company Overview
  summary: >
    Crusoe (formerly Crusoe Energy Systems) is a Denver-based vertically integrated AI infrastructure company that builds
    energy-optimized AI factories, a high-performance GPU cloud, and modular prefabricated data centers. Founded in 2018 by
    Chase Lochmiller and Cully Cavness, Crusoe raised $1.375B in a Series E at a $10B+ valuation in October 2025, bringing
    total equity raised to approximately $3.4B and cementing its position as one of the largest private neocloud operators.
    By March 2026, Crusoe operated 1,235 employees, 9.8M sq ft of facilities, and 3.4 GW of commissioned electricity
    across the United States, Iceland, Norway, Ireland, and Israel.

sections:
  - id: identity-and-overview
    title: Identity and Business Model
    body: >
      Crusoe—rebranded from "Crusoe Energy Systems" and operating at crusoe.ai—describes itself as "the AI factory company,"
      on a mission to accelerate the abundance of energy and intelligence. The company is headquartered at 255 Fillmore Street,
      Suite 400, Denver, Colorado 80206, incorporated in Delaware as Crusoe Inc. (formerly Crusoe Energy Holdings Inc., CIK 0001924674).

      Crusoe's core claim is vertical integration spanning three layers: (1) large-scale energy sourcing and site development,
      (2) AI-optimized data center design, construction, and manufacturing, and (3) a proprietary GPU cloud platform (Crusoe Cloud)
      with managed inference, observability, and edge-zone services. This vertical model is designed to compress timelines from
      land acquisition to GPU-online from the industry norm of 3–5 years to under 12 months for greenfield campuses.

      The company monetizes through cloud compute subscriptions and on-demand GPU rental (Crusoe Cloud), long-term capacity
      agreements with hyperscalers (e.g., Microsoft's 900 MW Abilene commitment), and modular AI factory deployments (Crusoe
      Spark units). Revenue was $276M in 2024, of which AI cloud contributed $124M (460% YoY growth) and Bitcoin/DFM mining
      contributed $152M. Following the March 2025 NYDIG acquisition of Crusoe's Bitcoin and DFM operations, the company is
      pivoting toward pure AI cloud infrastructure revenue.
    claimRefs: [CO001, CO002, CO003, CO004, CO005, CO006]
    tableRefs: [TO001]
    figureRefs: [FO003]

  - id: leadership-and-governance
    title: Leadership and Governance
    body: >
      Crusoe was co-founded by Chase Lochmiller (CEO) and Cully Cavness (President and CSO). Lochmiller studied physics and
      computer science at MIT before completing a master's in computer science with AI specialization at Stanford; he also
      spent several years as a quantitative trader at Jane Street Capital before pivoting to energy-tech entrepreneurship.
      Cavness holds an undergraduate geology degree from Middlebury College and an MBA from Oxford University's Saïd Business
      School, and brings oilfield operations experience to Crusoe's energy sourcing and site acquisition work.

      In December 2025, Michael Gordon joined as COO and CFO. Gordon previously served as CFO and COO at MongoDB, where he led
      the company's 2017 IPO and helped grow annual revenue approximately 50x over his tenure. His appointment brings public-company
      financial discipline and investor-relations experience to Crusoe's capital-intensive build-out. The former CFO, Matthew
      DeNezza, transitioned to an advisory role through 2026.

      Additional key leaders include Jamey Seely (Chief Legal Officer and Secretary), Nader Pakfar (General Counsel Real Estate,
      appointed January 21, 2026), Erwan Menard (SVP Product, Crusoe Cloud), Nadav Eiron (SVP Cloud Engineering), Matt Field
      (Chief Real Estate Officer), and Chris Dolan (Chief Data Center Officer). The board features strategic advisors Bill Stein
      (former CEO of Digital Realty Trust) and Peter Gross. Key-person risk is meaningful: Lochmiller is the public technical
      visionary and Cavness the energy strategist. Governance documentation beyond SEC Form D officer listings is not publicly
      available—board composition, independent director count, and preference structures remain undisclosed.
    claimRefs: [CO007, CO008, CO009, CO010, CO011, CO012]
    tableRefs: [TO002]

  - id: funding-and-capital
    title: Funding History and Capital Structure
    body: >
      Crusoe has raised approximately $3.4B in equity financing across six rounds since 2018, and has secured an additional
      ~$13B in project financing and JV commitments for its Abilene, Texas campus build-out. The funding trajectory is one of
      the fastest scale-up curves in the neocloud sector.

      The company's venture funding began with a $4.5M seed round in May 2019, co-led by Bain Capital Ventures and Founders Fund.
      A $30M Series A followed in December 2019. The Series B ($128M, April 2021) was led by Valor Equity Partners. The Series C
      ($350M at $1.75B valuation, April 2022) was led by G2 Venture Partners, with an additional $155M tranche.

      The Series D ($600M at $2.8B, announced December 12, 2024) was led by Founders Fund, with NVIDIA, Fidelity, Mubadala,
      Ribbit Capital, and Valor participating. The SEC Form D (filed November 21, 2024) confirms the offering. The Series E
      ($1.375B at $10B+, announced October 24, 2025) was co-led by Valor Equity Partners and Mubadala Capital with 71 investors
      per the SEC Form D (filed October 23, 2025). The total equity raised is approximately $3.4B. Blue Owl Capital committed
      $3.4B in a joint venture for Abilene data center construction, and JPMorgan is arranging approximately $9.6B in project
      financing, bringing total committed capital for Abilene above $15B.
    claimRefs: [CO013, CO014, CO015, CO016, CO017, CO018]
    tableRefs: [TO003]

  - id: scale-and-milestones
    title: Operating Scale and Key Milestones
    body: >
      As of March 31, 2026, Crusoe employed 1,235 people, up from approximately 600 at end-2024. The company operates in nine
      U.S. states and internationally in Iceland, Norway, Ireland, and Israel. The flagship campus in Abilene, Texas spans 2.1 GW
      of committed capacity (following the March 2026 Microsoft 900 MW announcement). A Wyoming campus of 1.8 GW has been
      announced. Total power pipeline exceeds 45 GW.

      Infrastructure metrics as of early 2026: 9.8M sq ft of facilities, 3.4 GW commissioned electricity, approximately 946,000
      GPU-equivalent capacity. Crusoe's Spark Factory in Brighton, Colorado (350,000 sq ft, $200M investment, 200+ jobs) is
      manufacturing modular prefabricated AI factory units with first deliveries expected Q3 2026. Power usage effectiveness (PUE)
      is reported at 1.2–1.3, enabled by direct-to-chip liquid cooling.

      Adverse context: Heatmap News (March 2025) reported that despite Crusoe's clean-energy messaging, the company uses
      natural gas generation and has engaged Engine No. 1 to develop 4.5 GW of new gas capacity for AI data center demand.
      Texas Commission on Environmental Quality (TCEQ) permit filings confirmed 360 MW of on-site gas turbines at the Abilene
      campus, representing approximately 30% of the 1.2 GW Phase 1 capacity. This creates tension between Crusoe's environmental
      branding and actual energy sourcing practice, a risk that could affect ESG-sensitive customers and investors.
    claimRefs: [CO019, CO020, CO021, CO022, CO023, CO024]
    tableRefs: [TO004]
    figureRefs: [FO001, FO002]

