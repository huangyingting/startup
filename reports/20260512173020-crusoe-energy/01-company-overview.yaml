callouts:
  - calloutType: strength
    title: Decacorn with Exceptional Capital Efficiency and Vertical Integration
    body: >
      Crusoe reached a $10B+ valuation in just seven years from founding, backed by sovereign wealth (Mubadala), strategic
      GPU suppliers (NVIDIA), and leading institutional crossovers (T. Rowe Price, Fidelity, Tiger Global). The vertically
      integrated model—energy sourcing → factory construction → GPU cloud—enables faster time-to-market and better margins
      than pure IaaS neoclouds, while the Microsoft 900 MW anchor tenant de-risks the massive Abilene capital commitment.
    claimRefs: [CO001, CO013, CO017, CO018]

  - calloutType: risk
    title: Greenwashing Tension and Gas Dependency
    body: >
      Despite clean-energy messaging, TCEQ permit data confirms 360 MW of on-site natural gas turbines at Abilene, and
      Crusoe is actively developing 4.5 GW of new gas infrastructure. This creates regulatory, ESG, and reputational risk
      as enterprise customers increasingly require credible carbon accounting. The Heatmap News investigation (March 2025)
      is the only substantial adverse media piece on this topic; further ESG scrutiny is likely as Abilene scales.
    claimRefs: [CO022, CO023, CO024]

  - calloutType: insight
    title: NYDIG Divestiture Signals Strategic Pivot Quality
    body: >
      The March 2025 divestiture of Bitcoin mining and Digital Flare Mitigation operations to NYDIG—which included 425+
      modular data centers, 250+ MW, and ~135 employees—demonstrates capital discipline and a clean strategic pivot to
      pure AI infrastructure. This eliminates the reputational overhang of Bitcoin mining and simplifies Crusoe's story
      for enterprise customers and ESG-focused investors, even though it removes a $152M 2024 revenue stream.
    claimRefs: [CO020, CO021]

