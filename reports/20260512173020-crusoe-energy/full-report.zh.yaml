              Crusoe 的核心商业叙事依赖清洁能源定位，但 TCEQ 数据确认其拥有 360 MW 现场燃气轮机，Heatmap News 也记录了 4.5 GW 新增燃气发电计划。这一 ESG 矛盾不只是声誉问题：如果
              TCEQ 许可延迟，Abilene 投运会滑期；如果 EPA GHG 报告显示每 GPU 碳强度较高，ESG 投资者和企业客户可能要求价格让步或退出合同。这是 Crusoe 最高调的反向发现。
