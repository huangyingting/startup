  - id: TV005
    title: 投资逻辑破裂与否决触发因素表
    columns:
      - 触发因素
      - 阈值或信号
      - 对投资逻辑的传导
      - 行动含义
    rows:
      - - ARR 确认未达目标
        - 2025 年审计或管理层确认 ARR 低于 $400M
        - 核心估值支柱塌陷；悲观情景变成基准情景；按任何合理倍数都无法支撑 $10B 估值
        - 立即下调信心；启动降价轮风险评估；暂停新增资金部署
      - - GPU 现货价格地板持续跌破
        - H100 或 H200 现货均价连续两个季度低于 $1.50/hr
        - 单 GPU 经济性被压到必须具备超大规模云厂商效率，才能让新型云模式打平
        - 重新评估每 GPU 收入和远期利润率路径；审查长期合同价格保护
      - - Microsoft 或主要锚定租户削减承诺
        - Microsoft 正式削减或取消 Abilene 容量承诺 25% 或以上
        - 直接损害 2.1 GW 建设逻辑；可能触发 Blue Owl JV 或 JPMorgan 融资条件
        - 立即复核信心；评估项目融资结构中的融资契约违约风险
      - - 监管或客户正式施加漂绿制裁
        - TCEQ、EPA 正式执法，或采用 ESG 筛选的主要机构客户正式处罚 Crusoe
        - ESG 资本重新定价；可能流失欧洲主权 AI 和 ESG 筛选基金投资人
        - 跟踪 TCEQ 空气质量许可和 EPA GHG 报告；评估客户 ESG 合规要求
      - - 超大规模云厂商大规模推出竞争性电力优先 AI 园区
        - AWS、Azure 或 GCP 宣布专用表后 AI 园区，规模 1 GW+，部署周期少于 12 个月
        - 电力护城河叙事削弱；稀缺性溢价被侵蚀；私营和公开市场可能出现倍数压缩
        - 重新评估电力管线优势的防御性；审查客户锁定机制和合同条款
    notes: 触发因素是基于公开证据推导的示例阈值；实际投委会流程可能会根据组合背景和授权设置不同数值阈值。
