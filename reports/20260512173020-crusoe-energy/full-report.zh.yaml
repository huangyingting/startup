      - number: '2.2'
        title: 市场规模分析
        blocks:
          - type: paragraph
            body: >-
              多个分析师来源共同指向一个大且高速增长的总可用市场。MarketsandMarkets 估计，GPU-as-a-Service 市场 2025 年为 $8.21B，到 2030 年将以 26.5% CAGR 增至
              $26.62B。更广义的 AI 基础设施市场 2024 年规模为 $135.81B，预计到 2030 年达到 $394.46B，CAGR 为 19.4%。IDC 报告称，2025 年云基础设施 GPU 支出增长
              46.8%，达到 $157.8B。ComputeForecast 称，neocloud 子赛道 2025 年 Q2 季度收入超过 $5B，同比增加 205%。

              这些估计方向一致，但方法差异很大。MarketsandMarkets 聚焦可租赁 GPU 算力收入；IDC 纳入 AI 服务器硬件资本开支；更广义的 AI
              基础设施估计还包括网络、存储、冷却和电力基础设施。Crusoe 最直接竞争的是 neocloud GPU 云细分市场（到 2030 年约 $8–27B 区间），但还通过基础设施建设和长期容量协议捕获额外价值。

              Crusoe 的可服务市场（SAM）受美国为中心的布局和大集群定位约束。保守估计，到 2030 年 SAM 为 $3–7B，约为 GPU-as-a-Service TAM 的 10–26%。按 3.4 GW
              已投运容量和 $0.3–0.5/W 年化算力收入测算，2028 年可获取市场（SOM）估计为 $1.0–1.7B 年化 GPU 云收入，与 2025 年报告的 150% ARR 增长轨迹一致。Crusoe
              未公开正式 SAM/SOM 框架；这些都是分析师构建，需要在尽调中验证。
