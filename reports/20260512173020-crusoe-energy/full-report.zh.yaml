      - number: '3.4'
        title: 竞争风险与替代场景
        blocks:
          - type: paragraph
            body: >-
              最高强度的竞争风险，是超大规模云厂商加速 GPU 容量。Microsoft 2025 年承诺 $80B+ AI 基础设施 capex，AWS 和 GCP 也同步建设，都会直接增加主导云平台上的 GPU
              可用性，削弱当前推动企业客户转向 neocloud 的可用性套利。随着超大规模云厂商 GPU 预留价格下降、交付期缩短，企业使用 Crusoe Cloud 的切换成本会显著上升。

              第二个风险是 CoreWeave 受 IPO 推动的资本获取能力和 NVIDIA 优先身份。作为上市公司，CoreWeave 能以低于私营 Crusoe
              的成本融资，加快数据中心建设，并用可流通股权薪酬吸引人才。CoreWeave IPO 时估计 $5B ARR，而 Crusoe 2024 年 AI 云收入为 $124M，规模差距很大；如果 CoreWeave
              执行激进，差距可能继续扩大。

              第三个风险是 GPU 现货价格压缩引发商品化竞赛。如果 H100 现货价格继续下跌，预留价格也趋同，支撑 neocloud 溢价定价的结构性价格套利就会被侵蚀。Crusoe 的能源成本优势（PUE 1.2–1.3
              vs 行业平均 1.8）提供了结构性成本底，但优势幅度——每 GPU-hr 能源成本约低 30–40%——可能不足以抵消广泛的预留价格趋同。

              Forbes（2025 年 3 月）关于客户可靠性的负面发现很重要：2025 年 3 月初一次 45 小时故障影响企业客户，并引发客户询问可靠性问题。这符合快速扩张基础设施公司的运营风险。Crusoe 获得
              ISO 27001 和 SOC2 Type I+II 认证，说明其投入治理；但 GW 级园区部署的运营可靠性，尚未在多年生产窗口中被证明。
