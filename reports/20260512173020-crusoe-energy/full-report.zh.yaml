  - number: 5
    title: 产品与技术
    sections:
      - number: '5.1'
        title: 硬件平台与模块化 AI 基础设施
        blocks:
          - type: paragraph
            body: >
              Crusoe 的底层硬件单元是 Modular AI Factory（MAF）：一个自成体系的工厂预制容器，在单个工厂制造模块内集成 GPU 计算节点、主配电、液冷歧管和 UPS 备份。每个 MAF 单元承载
              1-2 MW IT 负载；做到园区规模时，数十个 MAF 单元再接入共享电力基础设施、网络和光纤入口，拼出 30 MW 到 1 GW 以上的园区。模块化设计把园区上线周期压到 6-8
              个月，而传统设计建造型数据中心需要 24-36 个月；原因很直接：工厂预制模块到场时已完成布线和预调试，可以直接接入发电机或电网。

              Crusoe 当前主力部署的 GPU 是 NVIDIA H100 SXM5（80 GB HBM3），H200 SXM5（141 GB HBM3e）正在部署，B200 SXM5（192 GB HBM3e）目标在
              2026 年 Q3 GA。2025 年 Q4 扩大的多年期 NVIDIA 战略合作，让 Crusoe 在 B200 和 GB200 NVL72 系统上获得配额优先级和早期访问权。集群内网络使用 NVIDIA
              Quantum-2 InfiniBand，每条链路 400 Gbps，为 512+ GPU 分布式训练提供 GPU-to-GPU 对分带宽。节点级 NVLink 和 NVSwitch 支持服务器内
              all-reduce 操作。

              Crusoe 的 BYO-Power 计划允许超大规模客户把 GPU 计算部署在客户自有变电站场址，并配套表后发电。Abilene 至少有一家超大规模合作伙伴按该安排提供约 300 MW
              专用表后电力。Abilene Phase 1（200 MW IT 负载）已于 2026 年 Q1 投运，使用 765 kV 高压输电互联来降低降压损耗。Edge Zones 于 2026 年 3
              月推出，借助第三方托管机房中的 1-5 MW 分布式推理节点扩展计算覆盖，瞄准实时推理、视频分析和主权 AI 工作负载的低于 10 ms 延迟。

              Crusoe 位于 Colorado 州 Brighton 的制造工厂（350,000 sq ft，约 $200M 投资）规模化生产 MAF 单元，首批商业交付目标为 2026 年
              Q3。产能高峰时，工厂预计每季度产出 50-100 个 MAF 单元，大约每 90 天可装备一个新的 200 MW 园区。GB200 NVL72 机架（每架 72 块 Blackwell GPU，每架约 5
              PFLOPS 峰值 FP8）计划部署到 Abilene Phase 2。
