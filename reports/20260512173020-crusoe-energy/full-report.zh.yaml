      - number: '8.2'
        title: 可比公司与交易分析
        blocks:
          - type: paragraph
            body: >-
              Crusoe 最相关的公开可比公司是 CoreWeave，后者于 2025 年 3 月完成 IPO，隐含估值约 $23B。CoreWeave IPO 时年化收入约 $5B，按 IPO 价格计算收入倍数约为
              4.6x ARR——显著低于 Crusoe 当前隐含的 10 至 20x，具体取决于采用哪一个 2025 年收入估计。CoreWeave 上市后的交易表现体现了倍数压缩，股价较 IPO
              标记下跌，说明公开市场对该赛道的审视比私募市场更克制。若 Crusoe 要相对 CoreWeave IPO 基准证明其 $10B 估值合理，就需要 ARR 接近 $2B、并按 5x
              倍数定价；这一目标尚未验证，且很可能还要数年。

              Nebius AI（NASDAQ 上市，截至 2025 至 2026 年市值约 $6B）提供第二个数据点：一家获得 NVIDIA 强力支持的欧洲 GPU 云公司，尽管定位相似，交易价格只是 Crusoe
              隐含入场价的一小部分。Lambda Labs 私募估值估计约 $1.5B，说明没有自有电力基础设施、面向开发者的新云服务商获得的倍数明显更低。Lancium 是 Texas
              私营新云服务商，具备相似的电力优先逻辑，但没有公开估值锚可直接比较，是最接近的战略类比对象。Bain Capital Ventures 文章明确把投资逻辑放在电力稀缺这一持久护城河上：AI
              基础设施需求受制于许可和电网接入，早期电力权利因此具备防御性。不过，超大规模云厂商也在主动获取电网权利，ComputeForecast 新云分析指出，H100 的 GPU 现货价格已从约 $8/hr 降至 $2
              至 $3/hr——这是压缩单 GPU 经济性的结构性逆风。公开和私有可比公司的枚举仍不完整，因为多数直接同行要么仍为私有，要么刚上市且运营历史不足，无法干净锚定倍数，因此 TV004 仍应标记为部分枚举范围。
