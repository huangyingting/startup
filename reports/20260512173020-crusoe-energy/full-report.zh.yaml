      - number: '6.2'
        title: 已披露客户部署与结果
        blocks:
          - type: paragraph
            body: >
              Crusoe 已披露一批有分量的具名生产客户，但各账户的公开证据深度差异很大。最强证明点是 Redwood Materials：Crusoe 在 2024 Impact Report
              和专门新闻稿中披露了具体正常运行率数据（七个月 99.2%）以及扩张路径（4 个到 24 个 Spark 单元）。这代表了有量化结果和已验证扩张的生产部署，是资本密集型基础设施供应商客户证明的黄金标准。

              Microsoft 在 Texas 州 Abilene 的 900 MW 承诺（2026 年 3 月宣布）是披露的单一最大客户承诺，代表一段多年期锚定客户关系，验证 Crusoe
              服务超大规模云级工作负载的能力。Forbes 调查（2025 年 4 月）将 Crusoe 识别为关键 Stargate 基础设施合作伙伴，Oracle 则是首栋楼锚定租户。这些超大规模云关系采用长期容量协议，与
              AI 产品公司使用的按需和订阅访问不同。

              NVIDIA 在专门新闻稿中宣布的战略合作，确认了 GB200/B200/H200 GPU 的优先访问安排，在 GPU 短缺期为 Crusoe 客户提供供应确定性。这类合作伙伴层面的证据补强了客户层面的证明。

              AI 产品公司客户（Cursor、Together AI、Fireworks、Luma AI、Windsurf/Codeium、Decart、Playground AI、Databricks）在 Crusoe
              新闻资料和第三方报道中被公开列为客户，但具体部署指标、结果数据和合同金额仍未披露。GitHub 活动（crusoecloud 组织及开源工具）和 HuggingFace 存在（crusoeai
              模型页面）提供了开发者社区活跃采用的信号，但不是生产证明。

              一个重要反向数据点是 Forbes 报道的 2025 年 3 月初 45 小时宕机。这是唯一公开记录的重大可靠性事件，提出了 SLA 表现和 Crusoe
              事件响应流程成熟度问题。公开渠道未发现后续客户投诉，但没有公开 NRR 数据，意味着无法量化该事件对客户留存的影响。
