      - number: '4.4'
        title: 财务缺口与风险评估
        blocks:
          - type: paragraph
            body: >
              Crusoe 最重要的财务承保缺口，是缺少毛利率、EBITDA、现金头寸、烧钱速度、净收入留存和审计财务报表。作为不受 SEC 报告义务约束的私营公司，Crusoe 没有义务披露这些指标。MongoDB 老将
              Michael Gordon 出任 CFO，释放出财务治理改善信号，但独立验证仍不可得。

              风险侧有四个重大负面因素需要重点审查。第一，GPU 现货定价压缩——H100 约从 $8/hour 跌至 $2–3/hour——形成结构性价格上限，限制按需云收入上行。Crusoe
              能否把客户锁进高于现货的标价预留容量协议，是尚未验证的关键价值驱动因素。第二，清洁能源财务风险：Crusoe 的 ESG 品牌可能从重视可持续性的企业获得溢价定价，但 Heatmap News（2025 年 3
              月）报道公司继续使用天然气，包括与 Engine No. 1 成立 JV 开发 4.5 GW 新天然气容量；TCEQ 许可确认 Abilene 有 360 MW 燃气涡轮。如果重视 ESG
              的客户调查实际能源栈，流失风险和声誉损害可能把实际定价压到标价以下。第三，Microsoft 和 Oracle 客户集中造成收入依赖风险：合同变更或超大规模云厂商决定将基础设施内包，都可能显著影响收入。第四，高
              capex 模式叠加 $9.6B 项目融资，在 JPMorgan 规模上带来契约和再融资风险。没有公开契约条款、LTV 比率或债务服务覆盖要求可供尽调审阅。

              公司 2025 年 TCV 增长 17 倍、云 ARR 增长 150%，是积极信号；但私营财务透明度不足——尤其是公司从挖矿转向云时的毛利率轨迹——意味着没有利润率可见度的收入增长很难承保。Spark
              制造收入流尚未实现规模化收入（首批单元 2026 年 Q3），公开模型也尚未纳入。
