      - number: '1.3'
        title: 融资历史与资本结构
        blocks:
          - type: paragraph
            body: >
              自 2018 年以来，Crusoe 已在六轮股权融资中募集约 $3.4B，并为 Texas Abilene 园区建设额外锁定约 $13B 项目融资和合资承诺。这条融资曲线是 neocloud
              赛道中最快的规模化曲线之一。

              公司风险融资始于 2019 年 5 月的 $4.5M 种子轮，由 Bain Capital Ventures 和 Founders Fund 共同领投。2019 年 12 月，公司完成 $30M Series
              A。Series B（$128M，2021 年 4 月）由 Valor Equity Partners 领投。Series C（$350M，估值 $1.75B，2022 年 4 月）由 G2 Venture
              Partners 领投，另有一笔 $155M 分期融资。

              Series D（$600M，估值 $2.8B，2024 年 12 月 12 日宣布）由 Founders Fund 领投，NVIDIA、Fidelity、Mubadala、Ribbit Capital 和
              Valor 参投。SEC Form D（2024 年 11 月 21 日提交）确认了该次发行。Series E（$1.375B，估值 $10B+，2025 年 10 月 24 日宣布）由 Valor Equity
              Partners 和 Mubadala Capital 共同领投；按 SEC Form D（2025 年 10 月 23 日提交），共有 71 名投资者参与。累计股权融资约 $3.4B。Blue Owl
              Capital 为 Abilene 数据中心建设承诺 $3.4B 合资资金，JPMorgan 正安排约 $9.6B 项目融资，使 Abilene 已承诺总资本超过 $15B。
