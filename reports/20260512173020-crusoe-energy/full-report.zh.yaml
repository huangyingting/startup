      - number: '7.2'
        title: 运营与技术风险
        blocks:
          - type: paragraph
            body: >
              Crusoe 的运营风险画像主要由两件事决定：一边要用 SLA 承诺服务超大规模云和企业客户，一边要在不到两年内从初创公司扩张为多 GW AI 工厂运营商。迄今记录最充分的运营失败，是 Forbes 报道的
              2025 年 3 月 45 小时宕机。该事件持续接近整整两天，显著超过 99.9% 月度可用性 SLA 允许的停机时间（每月约 43 分钟）。公司未发布事后复盘，也未公开承认客户补救。

              冷却故障是第二个关键运营风险。Crusoe 使用 direct-to-chip liquid cooling 来实现 1.2–1.3 PUE 效率，这需要区别于传统风冷系统的专用冷却基础设施。GPU
              集群中的冷却回路故障，可能在数分钟内触发热降频或硬件损坏。Abilene 放大了这一风险（Texas 州 Abilene 夏季平均最高温约 98°F），环境温度会持续拉高冷却负载需求。

              电网依赖是 Abilene 园区的系统性风险。虽然 Crusoe 拥有现场燃气轮机（360 MW）提供备用和补充发电，但承诺容量为 2.1 GW 的园区仍将主要依赖 ERCOT 电网供电。ERCOT
              容量约束、输电拥堵和需求响应义务都可能中断电力交付。自然灾害事件（龙卷风、热穹、冰暴）构成不可抗力场景，即便 Crusoe 在合同上无责，也可能触发 SLA 违约。

              当前 H200/B200/GB200 过渡期，NVIDIA GPU 供应链风险显著。Crusoe 与 NVIDIA 的战略合作提供优先 GPU 配额，但全球 GPU 配额到 2026 年仍然紧张。GB200
              NVL72 交付延迟会推迟 Abilene Phase 2 部分容量的投运时间，影响 Microsoft 锚定租户协议的收入爬坡。Crusoe 已投资 NVIDIA 的 Vera CPU
              路线图，这是一项押注未验证芯片的多年执行赌注。

              任何多租户 GPU 云运营商都面临网络安全和数据泄露风险。Crusoe 已获得 ISO 27001
              认证，证明其信息安全管理体系（ISMS）框架成熟，但云基础设施供应商持续面对国家级攻击者和机会主义攻击者的威胁，目标包括 LLM
              训练数据、模型权重和客户工作负载。重大安全事件可能引发企业客户流失、监管调查和声誉损害；以当前增长阶段看，恢复难度会很高。
