  - number: 6
    title: 客户情况
    sections:
      - number: '6.1'
        title: 客户基础概览与分层
        blocks:
          - type: paragraph
            body: >
              Crusoe 的客户基础分成三类：（1）承诺数百 MW 容量协议的超大规模锚定客户；（2）按需或通过短期订阅购买 GPU 计算、用于训练、微调和推理工作负载的 AI 产品公司和初创公司；（3）为特定高算力应用部署
              Crusoe Spark 模块化 AI 工厂单元的工业企业和研究客户。

              超大规模云厂商分层由 Microsoft 在 Abilene 的 900 MW 承诺（2026 年 3 月宣布）以及作为首栋楼锚定租户的 Oracle/Stargate 领衔，很可能贡献 Crusoe
              签约容量的大部分，但公开收入披露未单独拆分。此类客户看重 Crusoe 将电力到 GPU 的上线周期压到 12 个月以内的能力，以及以有利购电协议大规模运营的能力。Crusoe 2024 年 AI 云收入为
              $124M（同比增长 460%），2025 年 ARR 增长 150%，显示需求强劲；但收入分母、客户数和分层拆分仍未披露。

              AI 产品公司分层包括 Cursor、Together AI、Fireworks、Luma AI、Windsurf（Codeium）、Databricks、Playground AI 和
              Decart，它们通过标准计算 API 使用 Crusoe Cloud。Crusoe 的 H100/H200/B200 按需价格（截至 2026 年 5 月，H100 为
              $2.99/hr）相对超大规模云价格有竞争力，平台的 ISO 27001 和 ISO 42001 认证也降低了企业安全审查摩擦。GPU-as-a-service 市场预计到 2028 年将以显著 CAGR
              增长（IDC、MarketsAndMarkets），Crusoe 被定位为这一扩张市场中领先的新云服务商之一。

              工业和研究客户构成差异化且高留存的分层。Redwood Materials 是证据最充分的案例：这家电池回收公司部署 Crusoe Spark 单元，用于 AI 驱动的质量控制和材料科学工作负载，七个月内实现
              99.2% 正常运行率，随后从 4 个扩展到 24 个 Spark 单元——7x 密度提升，是 Crusoe 先落地再扩张模式最强的公开证明。Sony Research 使用 Crusoe Cloud GPU
              基础设施训练 Gran Turismo Sophy（GT Sophy）强化学习赛车智能体，代表了高知名度研究用例。
