  - number: 7
    title: 风险
    sections:
      - number: '7.1'
        title: 监管与法律风险评估
        blocks:
          - type: paragraph
            body: >
              Crusoe 处在能源基础设施、AI 计算和环境合规交叉点，监管足迹复杂。近期最重要的监管风险，是 Texas Commission on Environmental Quality（TCEQ）对 Crusoe
              Abilene 园区现场燃气轮机的许可流程。TCEQ 许可文件确认，Abilene Phase 1 建设有 360 MW 燃气轮机容量。这些大气排放许可证要求 TCEQ
              审查批准后，轮机才能运行；任何许可延迟都可能推迟容量投运，而该容量支撑 JPMorgan 项目融资和 Microsoft 锚定租户协议。

              EPA Greenhouse Gas Reporting Program 义务适用于大型固定排放源（通常门槛为 25,000 metric tons CO2e/year），Crusoe 在 Abilene 的
              360 MW 轮机很可能超过该门槛，因此需要根据 40 CFR Part 98 每年披露排放。Crusoe 尚未公开确认其 EPA GHG 报告状态，但轮机规模意味着强制参与。该数据会公开，ESG
              批评者和做空者可以用它记录实际碳排放与清洁能源叙事之间的差距。

              Texas ERCOT 电网依赖是另一项监管风险：Crusoe 的 AI 园区将从 ERCOT 获取大量电力，而 ERCOT 在 2021 年 2 月 Winter Storm Uri 期间发生过灾难性故障。虽然
              Crusoe 的表后和现场发电策略部分缓解了电网暴露，大型数据中心客户仍受 ERCOT 需求响应计划约束，并可能在电网紧急状态下面临限电。任何扰乱超大规模云 SLA 的限电事件，都可能触发合同纠纷。

              法律层面，Upstream Data 专利诉讼（起诉内容：指称 Crusoe 侵犯与火炬气减排技术相关的专利）已于 2025 年 11 月 24 日通过双方撤诉和许可协议解决。该结果对 Crusoe
              有利：诉讼阴影移除，许可协议也意味着 Crusoe 获得了争议技术的持续使用权。不过，Crusoe 核心历史技术（DFM/flare
              gas）曾发生专利争议，且许可条款（包括任何版税或使用领域限制）未公开，仍是残留尽调项。

              研究期内未发现其他活跃诉讼、监管执法行动、制裁暴露或 OFAC 标记。Crusoe 注册于 Delaware、总部位于 Colorado，不构成异常司法辖区复杂性；但 Mubadala Capital（Abu
              Dhabi 主权财富基金）的投资，可能在 Crusoe 争取美国政府计算合同或 IPO 注册时触发 CFIUS 审查。
