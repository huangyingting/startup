      nodes:
        - id: arr-growth
          label: 云 ARR 增长 150%，TCV 增长 17x
          detail: 公司声称 2025 年云 ARR 增长 150%、总合同价值（TCV）增长 17x，验证需求牵引。
          tone: positive
        - id: committed-capital
          label: $15B+ 已承诺资本结构
          detail: Blue Owl $3.4B JV 和 JPMorgan $9.6B 项目融资，锚定 Abilene 2.1 GW 建设。
          tone: positive
        - id: power-moat
          label: 45+ GW 电力储备项目
          detail: 早期电网权益，加上从场址到云的垂直整合，构成 AI 基础设施的结构性优势。
          tone: positive
        - id: gpu-pricing
          label: GPU 现货价格商品化
          detail: H100 现货价格从约 $8/hr 跌到 $2–$3/hr，压缩 neocloud 单 GPU 经济性。
          tone: warning
        - id: concentration
          label: 客户集中风险
          detail: Microsoft 和 OpenAI 可能锚定收入；集中度未披露，但结构上很可能高于 50%。
          tone: warning
        - id: no-disclosure
          label: 公开财务披露为零
          detail: 没有经审计的毛利率、EBITDA 或现金消耗数据；2025 年 ARR 估计为 $500M 到 $1B，尚未确认。
          tone: warning
        - id: entry-mark
          label: $10B+ 入场估值
          detail: 按采用的 ARR 估计不同，对应 10 到 36x 收入倍数；相对公开可比公司偏高。
          tone: warning
        - id: recommendation
          label: 观察 —— 跟踪 IPO 信号与 ARR 确认
          detail: 增长势能足够强，值得密切跟踪；但 $10B+ 估值要升级为买入，先要确认 $1B+ ARR，并看到财务披露。
