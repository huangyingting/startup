      - number: '1.4'
        title: 运营规模与关键里程碑
        blocks:
          - type: paragraph
            body: >
              截至 2026 年 3 月 31 日，Crusoe 有 1,235 名员工，高于 2024 年底约 600 人。公司业务覆盖美国九个州，并在 Iceland、Norway、Ireland 和 Israel
              有国际布局。Texas Abilene 旗舰园区已承诺容量达 2.1 GW（计入 2026 年 3 月 Microsoft 宣布的 900 MW）。公司已宣布一个 1.8 GW Wyoming
              园区。总电力管线超过 45 GW。

              截至 2026 年初，基础设施指标包括：9.8M sq ft 设施、3.4 GW 已投运电力、约 946,000 GPU 等效容量。Crusoe 位于 Colorado Brighton 的 Spark
              Factory（350,000 sq ft，$200M 投资，200+ 个岗位）正在制造模块化预制 AI 工厂单元，首批交付预计在 2026 年 Q3。直接到芯片液冷把电力使用效率（PUE）压到据称
              1.2–1.3。

              反向背景：Heatmap News（2025 年 3 月）报道称，尽管 Crusoe 主打清洁能源叙事，公司仍使用天然气发电，并已聘请 Engine No. 1 开发 4.5 GW 新天然气容量，以满足 AI
              数据中心需求。Texas Commission on Environmental Quality（TCEQ）许可文件确认，Abilene 园区有 360 MW 现场燃气涡轮，约占 1.2 GW 一期容量的
              30%。Crusoe 的环保品牌与实际能源采购之间由此产生张力，可能影响重视 ESG 的客户和投资者。
