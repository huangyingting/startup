            title: CoreWeave IPO 建立公开估值基准，约束 Crusoe 云业务倍数
            body: >-
              CoreWeave 2025 年 3 月 IPO 约按 5x 收入定价，为纯 GPU 云运营商建立了公开市场参照。Crusoe 以 $124M AI 云收入支撑 $10B
              估值，意味着高得多的云收入倍数——超出部分归因于基础设施和土地价值层。因此，Crusoe 估值对基础设施层是否能比纯云可比公司获得溢价格外敏感。
