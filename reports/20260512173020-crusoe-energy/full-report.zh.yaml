companyProfile:
  summary: >-
    Crusoe 是一家总部位于 Denver 的 AI 基础设施公司，已从 Bitcoin 挖矿转型为全栈「AI 工厂」提供商，组合了现场发电（360 MW 天然气涡轮、可再生能源 PPA）、自研直达芯片液冷（PUE
    1.2-1.3）、模块化 AI 工厂基础设施（Spark Factory）和 GPU 云平台（Crusoe Cloud）。公司在 Texas Abilene 拥有已承诺 2.1 GW 容量的园区，由 Microsoft（900
    MW）、Oracle/Stargate 和 OpenAI 锚定，另有一个 1.8 GW Wyoming 园区处于规划中。Crusoe 的 Series E（$1.375B，2025 年 10 月）以 $10B+
    估值确认其独角兽地位，也把公司推到垂直整合 neocloud 运营商的领先位置。2024 年收入为 $276M；BTC 挖矿业务已于 2025 年 3 月出售给 NYDIG，使 Crusoe 成为纯 AI 基础设施公司。NVIDIA
    既是优先 GPU 供应伙伴，也是股权投资方。
