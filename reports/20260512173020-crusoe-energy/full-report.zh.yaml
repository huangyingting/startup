      - number: '6.3'
        title: 留存动态与扩张模式
        blocks:
          - type: paragraph
            body: >
              Crusoe 尚未披露任何标准 SaaS 留存指标——NRR、GRR、队列留存、合同续约率或客户数。对于资本密集型基础设施供应商，这是重大证据缺口；留存质量决定 $15B+ Abilene
              建设的经济性，也决定未来园区的可行性。

              尽管缺少正式留存数据，现有证据指向两极化留存画像。超大规模锚定客户（Microsoft、Oracle）基本被长期容量协议和高切换成本锁定——一旦基础设施按某个超大规模云厂商的具体要求建成，终止合同会同时伤害双方经济性。Microsoft
              的 900 MW 承诺代表多年期签约收入，短期流失风险几乎可以忽略。

              AI 产品公司的留存信号不那么清晰。Cursor、Together AI、Fireworks、Luma AI 等活跃客户群尚未报告流失，但缺少正式队列数据，无法区分留存订阅客户和一次性训练任务。Crusoe 的
              ISO 27001 与 ISO 42001 认证、Command Center 统一运营平台，以及 NVIDIA GPU 供给优先级形成切换成本，应当支撑留存，但这些优势没有被量化。

              Redwood Materials 案例展示了先落地再扩张模式的最佳状态：4 个 Spark 单元的试点在约一年内放大 7x 至 24 个单元，驱动因素是已验证的正常运行率（七个月
              99.2%）和运营价值。如果这一扩张率能代表更广泛的工业客户，则意味着 Spark 产品线拥有强劲净留存率（NRR）。但单个数据点不足以外推留存率或 NRR 数字。

              Crusoe 的定价页列出按需 GPU 计算价格，让小客户无需长期合同即可使用基础设施，降低漏斗底部摩擦；但这也意味着对价格敏感的客户切换成本更低，一旦 GPU 现货价格进一步下探，他们可以转向 Lambda
              Labs、CoreWeave 或其他新云服务商。
