      - number: '3.2'
        title: 主要竞争对手画像
        blocks:
          - type: paragraph
            body: >-
              CoreWeave 是最大的 neocloud GPU 云运营商，截至 2025 年初 ARR 估计约 $5B。CoreWeave 创立于 2017 年，总部位于 New Jersey Roseland，是
              NVIDIA 最偏好的大规模 GPU 云伙伴，优先获得 H100、H200 和 Blackwell（B200/GB200）GPU 配额。CoreWeave 于 2023 年中完成 $1.1B Series
              C，并于 2025 年 3 月在 NASDAQ 上市。其客户群偏向前沿 AI 实验室和需要大规模 GPU 集群的企业 AI 平台公司，直接重叠 Crusoe 最高层买家。相对 Crusoe，CoreWeave
              的弱点在于不自有发电，也不在园区层面自建数据中心；它依赖第三方托管和电力合同，市场收紧时更容易暴露在电力可用性约束下。

              Lambda Labs（2012 年创立，San Francisco, CA）面向开发者和研究 GPU 云细分市场，提供丰富的 NVIDIA GPU
              SKU（H100、A100、A6000）和有竞争力的按需定价。Lambda 的差异化在于简单：开通快、无最低用量、工具对开发者友好。Lambda 没有 Crusoe 或 CoreWeave
              那样的基础设施垂直整合，且聚焦较小规模工作负载。在 Crusoe 正在建设的超大规模云厂商承诺或专用园区层面，Lambda 不是实质性竞争者。

              Nebius AI（Amsterdam；NYSE: NBIS）于 2024 年 6 月从 Yandex 分拆，运营 EU 和美国 GPU 云基础设施，面向需要数据主权和云灵活性的 AI 公司。Nebius 于
              2024 年 9 月从 NVIDIA 及 NVIDIA 生态伙伴等投资者处融资 $700M。Nebius 的 GPU 云主要在 EU 市场竞争，数据驻留是该市场的监管驱动因素，因此与 Crusoe
              以美国为中心的园区建设策略直接重叠有限。

              Lancium（Houston TX）在 Texas 运营可再生能源驱动的 HPC 数据中心，使用风能和太阳能，并具备需求响应能力，可在电网压力事件期间削减算力负载。Lancium 的能源优先定位和 Texas
              地理位置与 Crusoe 最初论点直接重合，但 Lancium 不提供通用 GPU 云，而是聚焦 HPC 批处理算力。Lancium 已于 2024 年申请 IPO，但截至报告日期尚未完成。
