      - number: '1.5'
        title: 展示材料
        blocks:
          - type: callout
            title: 十角兽、资本效率突出，并具备垂直整合
            body: >
              Crusoe 创立仅七年就达到 $10B+ 估值，背后有主权财富资金（Mubadala）、战略 GPU 供应商（NVIDIA）和头部跨界机构投资者（T. Rowe Price、Fidelity、Tiger
              Global）。能源采购 → 工厂建设 → GPU 云的垂直整合模式，比纯 IaaS neocloud 更快推向市场，也能带来更好利润率；Microsoft 900 MW 锚定租户则降低了 Abilene
              巨额资本承诺的风险。
