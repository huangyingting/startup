      - number: '1.2'
        title: 领导层与治理
        blocks:
          - type: paragraph
            body: >
              Crusoe 由 Chase Lochmiller（CEO）和 Cully Cavness（总裁兼 CSO）共同创立。Lochmiller 在 MIT 学习物理与计算机科学，随后在 Stanford 完成 AI
              方向计算机科学硕士；他还曾在 Jane Street Capital 做过数年量化交易员，之后转向能源科技创业。Cavness 拥有 Middlebury College 地质学本科学位和 Oxford
              University Saïd Business School MBA，并把油田运营经验带入 Crusoe 的能源采购和场址获取工作。

              2025 年 12 月，Michael Gordon 加入并担任 COO 和 CFO。Gordon 此前在 MongoDB 担任 CFO 和 COO，主导公司 2017 年 IPO，并在任期内帮助年收入增长约
              50 倍。他的加入为 Crusoe 资本密集型扩建带来上市公司级财务纪律和投资者关系经验。前 CFO Matthew DeNezza 转为顾问角色，任期延续至 2026 年。

              其他关键高管包括 Jamey Seely（首席法务官兼秘书）、Nader Pakfar（房地产总法律顾问，2026 年 1 月 21 日任命）、Erwan Menard（Crusoe Cloud 产品
              SVP）、Nadav Eiron（云工程 SVP）、Matt Field（首席房地产官）和 Chris Dolan（首席数据中心官）。董事会有战略顾问 Bill Stein（Digital Realty
              Trust 前 CEO）和 Peter Gross。关键人物风险不低：Lochmiller 是对外的技术愿景人物，Cavness 是能源战略负责人。除 SEC Form D
              的高管名单外，治理文件未公开——董事会构成、独立董事人数和优先权结构仍未披露。
