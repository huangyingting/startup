      - number: '8.4'
        title: 投资建议与尽调要求
        blocks:
          - type: paragraph
            body: >-
              当前建议是观察——不是买入。Crusoe 展现出非同寻常的基础设施牵引力：$15B+ 承诺资本、2025 年云 ARR 增长 150%、TCV 增长 17x、Microsoft Abilene 锚定客户、超过
              45 GW 的电力储备，以及 2025 年 10 月由机构级资本（Valor、Mubadala、Founders Fund、NVIDIA）共同领投、估值 $10B+ 的 Series E。Michael
              Gordon 的加入也释放出明确的公开市场准备信号——他曾作为 CFO/COO 领导 MongoDB IPO，并推动收入约 50x 增长。Crusoe 入选 Fast Company 2026 年 100
              Most Innovative Companies，NVIDIA 扩大战略合作，提供了来自全球主导 AI 芯片供应商的技术背书。2025 年取得的 ISO 27001 和 ISO 42001
              认证支持企业客户获取。对一家私有基础设施公司而言，这些都是顶级需求和执行信号。

              反过来，$10B+ 标记跑在已确认公开财务数据之前。2024 年全年收入 $276M 中，$152M 来自已出售给 NYDIG 的 Bitcoin 挖矿业务，剩余纯 AI 云收入为 $124M。2025 年收入
              $500M 至 $1B 的估计未经审计数据确认。公开材料没有披露毛利率、EBITDA 或现金消耗。Microsoft 和 OpenAI 的客户收入集中度未披露，但基于 Abilene 锚定和 Stargate
              报道，很可能超过 50%。六轮融资后的股权结构优先权不透明。如果合同包含爬坡条款或取消选项，签约 ARR（TCV 增长 17x）可能高估近期确认收入。除非管理层提供经审计的 2025
              年财务数据，或公开财务披露包，否则无法以高置信度承销 $10B 标记。

              从观察上调到买入的尽调路径是：（1）取得经审计或确认的 2025 年 ARR，且高于 $1B，并按客户和合同类型拆分；（2）核实 AI
              云分部毛利率和贡献利润率；（3）获得股权结构表透明度，包括清算优先权和反稀释条款；（4）确认签约 ARR 与确认收入的差异，以评估积压订单质量；（5）审查实际电力来源与营销主张之间的差距，量化 ESG
              风险；（6）评估 Spark 工厂库存和交付风险，因为它是一条新业务线。IPO S-1 文件将是交付大部分信息最高效的机制，也将成为上调建议的主要监测触发器。
