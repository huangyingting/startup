chapters:
  - number: 1
    title: 公司概况
    sections:
      - number: '1.1'
        title: 身份与商业模式
        blocks:
          - type: paragraph
            body: >
              Crusoe 从「Crusoe Energy Systems」更名而来，在 crusoe.ai 运营；公司称自己是「AI 工厂公司」，使命是加速能源与智能的丰裕。公司总部位于 255 Fillmore
              Street, Suite 400, Denver, Colorado 80206，在 Delaware 注册为 Crusoe Inc.（曾用名 Crusoe Energy Holdings Inc.，CIK
              0001924674）。

              Crusoe 的核心主张是三层垂直整合：（1）大规模能源采购和场址开发；（2）面向 AI 优化的数据中心设计、建设与制造；（3）自研 GPU 云平台（Crusoe
              Cloud），提供托管推理、可观测性和边缘区域服务。这套垂直模式旨在把从拿地到 GPU 上线的周期，从行业常见的 3–5 年压到绿地园区少于 12 个月。

              公司靠三类方式变现：云算力订阅和按需 GPU 租赁（Crusoe Cloud）、与超大规模云厂商签订长期容量协议（如 Microsoft 在 Abilene 承诺 900 MW）、以及模块化 AI
              工厂部署（Crusoe Spark 单元）。2024 年收入为 $276M，其中 AI 云贡献 $124M（同比增长 460%），Bitcoin/DFM 挖矿贡献 $152M。NYDIG 于 2025 年 3
              月收购 Crusoe 的 Bitcoin 和 DFM 业务后，公司正在转向纯 AI 云基础设施收入。
