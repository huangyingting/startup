  - id: TV002
    title: 投资逻辑 / 反向逻辑表
    columns:
      - 方向
      - 论点
      - 证据
      - 何种情况会改变判断
    rows:
      - - 投资逻辑
        - 电力优先的垂直整合在 AI 基础设施中形成可防守护城河
        - 45+ GW 管线、2.1 GW Abilene 已承诺、3.4 GW 已投运；Bain 投资逻辑验证电力稀缺优势
        - 超大规模云厂商系统性获取竞争性电网权利，抹平 Crusoe 的相对电力优势
      - - 投资逻辑
        - 云 ARR 增长 150%、2025 年 TCV 增长 17x，证明需求捕获能力一流
        - 公司声称 ARR 增长 150%、TCV 增长 17x；Sacra 和 ComputeForecast 证实新型云厂商 ARR 快速扩张
        - 收入确认显示 2025 年实际 ARR 低于 $500M，或增速急剧降至 50% 以下
      - - 投资逻辑
        - $15B+ 已承诺资本栈降低基础设施建设执行风险，并验证投资逻辑
        - Blue Owl $3.4B JV 和 JPMorgan $9.6B 项目融资；Microsoft 900 MW Abilene 锚定承诺
        - Blue Owl 或 JPMorgan 融资条件被触发，或 Microsoft 承诺正式下调或取消
      - - 投资逻辑
        - NVIDIA 合作和 Michael Gordon 任命释放可信 IPO 路径执行信号
        - NVIDIA 合作在 2025 年扩大；Gordon 带来 MongoDB IPO 方法论；获得 Fast Company 2026 认可
        - Gordon 离职，或 NVIDIA 转而支持其他新型云运营商并减少给 Crusoe 的 GPU 配额
      - - 反向逻辑
        - H100 GPU 现货价下跌 60% 到 75%；单位经济性面临结构性商品化压力
        - ComputeForecast 和 Signisys 记录 H100 GPU 价格从 $8/hr 压缩到 $2-3/hr
        - GPU 价格持续稳定在 $4/hr 以上，或 Crusoe 证明长期合同价格与现货隔离
      - - 反向逻辑
        - Microsoft 和 OpenAI 客户集中，带来单点故障式收入风险
        - Microsoft 是 Abilene 主要锚定方；OpenAI 是 Stargate 合作伙伴；具体集中度未披露
        - 经审计数据确认客户基础多元化，且没有单一客户超过 ARR 的 25%
      - - 反向逻辑
        - 没有公开毛利率或 EBITDA 数据；按 $10B+ 估值建立信心所需的财务透明度不足
        - 截至 2026 年 5 月，没有任何公开文件披露 Crusoe Inc. 的分部收入、利润率或现金消耗数据
        - 经审计财务数据或 S-1 文件确认 $1B+ ARR，且 AI 云业务贡献利润率为正
      - - 反向逻辑
        - 清洁能源品牌叙事不一致，漂绿敞口带来 ESG 重新定价风险
        - Heatmap News 记录了 360 MW 现场燃气涡轮机，以及 4.5 GW 新增燃气容量参与
        - 完整能源采购透明度确认所有园区可再生能源比例高于 80%
    notes: 论点和证据综合自公开来源；反向逻辑项反映分析师、新闻和反向来源识别出的结构性风险，并不穷尽所有悲观情景。
