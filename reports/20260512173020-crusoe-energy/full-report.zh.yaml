  - id: FV001
    title: 推荐逻辑
    type: flow
    layout: wide
    summary: 观察建议来自两股力量的对冲：基础设施验证和 ARR 动能很强，但 $10B+ 入场估值偏高、财务披露不足；IPO 申报是主要上调触发点。
