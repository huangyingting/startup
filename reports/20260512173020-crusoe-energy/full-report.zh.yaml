  - number: 4
    title: 财务情况
    sections:
      - number: '4.1'
        title: 收入模式与收入流
        blocks:
          - type: paragraph
            body: >
              2023 年以来，Crusoe 的收入模式经历了有意的结构性转型。2024 年，公司总收入 $276M，大致分为 45% AI 云（$124M，同比增长 460%）和 55% Bitcoin
              及数字火炬挖矿（$152M）。2025 年 3 月，公司将挖矿资产出售给 NYDIG——425+ 个模块化数据中心、250+ MW 和约 135 名员工——之后，Crusoe 转向纯 AI
              云和数据中心基础设施收入模式。公司披露 2025 年云 ARR 增长 150%、合同总价值（TCV）增长 17 倍，但未公布绝对分母或基础 ARR 数字。分析师估计 2025 全年收入介于 $500M 和 $1B
              之间，但尚未确认。

              今天，Crusoe 的收入流由三套不同机制驱动。第一，Crusoe Cloud 通过按需小时计费和预留容量订阅提供 GPU 与 CPU 算力；H100 SXM 标价 $4.29/GPU-hour，A100 SXM
              标价 $1.95/GPU-hour。第二，长期超大规模云厂商容量协议——尤其是 900 MW Microsoft Abilene 承诺（2026 年 3 月）和 Oracle/Stargate
              锚定关系——提供大额合同收入块，并带来多年可见度。第三，Crusoe Spark 模块化 AI 工厂产品（每个单元约 1 MW 预制容量，在 350,000 sq ft Colorado Brighton
              Spark Factory 制造）可能形成产品销售和托管服务收入线；Redwood Materials 合作从 4 个 Spark 单元扩大到 24 个，显示早期商业牵引。

              NYDIG 交易后，收入质量明显改善：AI 云收入具备经常性和订阅属性，而旧 BTC 挖矿收入本质上是商品挖矿，受减半周期和算力竞争影响。不过，Microsoft、Oracle
              等超大规模云厂商集中度高，引入客户依赖风险，也限制定价权。
