  - id: FR002
    title: 风险传导图
    type: dag
    layout: wide
    summary: Crusoe 的关键风险如何传导到收入、客户、利润率、融资、运营和估值。
    data:
      nodes:
        - id: tceq_permit
          label: TCEQ 许可延迟
          detail: Abilene 的 360 MW 燃气轮机需要 TCEQ 空气排放许可；延迟会卡住一期投运
        - id: nvidia_supply
          label: NVIDIA GPU 供应中断
          detail: 优先配额没有保证；GB200 NVL72 良率到 2026 年仍受约束
        - id: ms_anchor
          label: Microsoft 锚定合同风险
          detail: 900 MW 承诺；修改或退出会触发 JPMorgan 契约条款
        - id: outage
          label: 运营中断（>45 小时）
          detail: 2025 年 3 月已有先例；冷却、供电或软件故障都可能复发
        - id: gpu_price
          label: GPU 定价崩塌
          detail: H100 从 $8/hr 跌到 $2-3/hr；H200/B200 价格路径仍不确定
        - id: esg_risk
          label: ESG / 漂绿风险暴露
          detail: 360 MW 燃气轮机 + 4.5 GW 新建燃气开发，与清洁能源品牌叙事相冲突
        - id: commissioning_delay
          label: Abilene 一 / 二期投运延迟
          detail: TCEQ、NVIDIA 供应或建设延误会推迟 GPU 上线日期
        - id: customer_sla
          label: 客户 SLA 违约
          detail: 超大规模云厂商和企业 SLA 要求 99.9%+ 可用性；宕机会触发补救
        - id: revenue_risk
          label: 收入缺口
          detail: 锚定租户延迟、按需客户流失或定价压缩会拉低 AI 云 ARR
        - id: jpmorgan_covenant
          label: JPMorgan 契约违约
          detail: $9.6B 项目融资契约与里程碑、锚定租户和收入挂钩
        - id: valuation_impact
          label: 估值压缩
          detail: 契约违约、收入不及预期或声誉事件会打击投资人信心
