      - number: '2.3'
        title: 买方与细分市场分析
        blocks:
          - type: paragraph
            body: >-
              GPU 算力买家分为三大类：（1）需要大型 GPU 集群训练基础模型的前沿 AI 实验室和超大规模云厂商——ACV 最高、合同最长，规模化后对价格不敏感；（2）运行推理、微调和研究工作负载的企业 AI
              平台团队——中等 ACV，预留和现货混合；（3）需要灵活小规模访问的开发者和研究机构——ACV 较低，以现货市场为主。

              Crusoe 客群明显偏向前两层。Microsoft 900 MW Abilene 承诺代表超大规模云厂商为长期大规模容量签约。Oracle/Stargate 和 Together AI
              代表前沿实验室及平台客户。Cursor（AI coding assistant）和 Redwood Materials（先进制造 AI，合作规模扩大 7 倍）代表企业推理客户。Crusoe 2024 年
              $124M AI 云收入（同比增长 460%）和 2025 年 ARR 同比增长 150%，确认企业账户获取已从单一超大规模云厂商扩展出去。

              GPU 云决策的预算通常归技术公司 VP/C-level 工程或基础设施负责人所有，年合同超过 $1M 时采购会参与。采用触发点包括：（a）超大规模云厂商 GPU 可用性不足；（b）相对 AWS/Azure
              按需定价存在成本套利；（c）合规或数据驻留要求让客户偏好专用基础设施。

              一个负面动态是：H100 现货价格 $2–3/hr 已匹配甚至低于 Crusoe 公布的 H100 SXM 价格 $4.29/GPU-hr，导致现货型开发者 /
              研究细分市场越来越多由打折的超大规模云厂商容量服务。Crusoe 防守最稳的是最高层客户；在该层，电力可用性、集群密度和长期预留，而不是小时现货价格，才是主要采购标准。
