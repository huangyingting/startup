              尽管公司强调清洁能源，TCEQ 许可数据确认 Abilene 有 360 MW 现场天然气涡轮，Crusoe 还在积极开发 4.5 GW 新天然气基础设施。随着企业客户越来越要求可信的碳核算，监管、ESG
