      - number: '5.2'
        title: Crusoe Cloud – 软件平台与 API 服务
        blocks:
          - type: paragraph
            body: >
              Crusoe Cloud 是为 GPU 场景打造的云平台，提供裸金属、虚拟机和 Kubernetes 托管 GPU 集群，可通过 REST API、CLI 和 Terraform provider
              访问。平台开放三档计算：按需（按小时计费）、预留（1 年或 3 年承诺）和现货（可抢占、折扣价）。推理 API 层兼容 OpenAI Chat Completions 和 Completions v1 API
              接口，可直接替换；支持模型包括 Llama 3.1/3.2/3.3、Mistral、Mixtral、DeepSeek-R1/V3、Qwen2.5 和 Phi-4，并以 NVIDIA TensorRT-LLM
              作为服务后端。

              Crusoe File System（CFS）基于 Lustre，是并行分布式文件系统，聚合吞吐以每秒数百 GB 计；设计目标是让存储与 GPU 集群共址，避开 PCIe 或网络到 CPU 的瓶颈。CFS 支持
              GPUDirect RDMA，让 GPU 无需 CPU 参与即可直接对存储执行 DMA。对于 Kubernetes 工作负载，CFS 通过 CSI driver 暴露为 ReadWriteMany
              持久卷。块存储（NVMe-over-Fabric，单实例最高 100 TB）、对象存储（S3 兼容）和网络挂载 NFS 卷补齐了存储组合。

              网络层为一个 pod 内的每个 GPU 节点提供 400 Gbps InfiniBand；跨 zone 带宽为 100 Gbps Ethernet。私有网络使用 VPC，并配置子网级防火墙控制。平台运行在
              OpenStack 上，并使用 Keystone IAM；企业 SSO 支持 SAML 2.0 和 OIDC 联邦身份。容器镜像维护并发布到 GitHub Container Registry 的
              ghcr.io/crusoecloud。开源 Terraform provider（Apache 2.0）已有 200+
              commits，客户用它做基础设施即代码部署，提供了可验证的开发者采用信号。Kubernetes 文档覆盖节点池配置、自动伸缩和 CFS 卷挂载。

              平台于 2025 年 Q2 取得 ISO 27001:2022 认证，并于 2025 年 Q3 取得 ISO 42001:2023（AI 管理体系）认证，二者均由 UKAS 认可的 DNV GL 确认。AI
