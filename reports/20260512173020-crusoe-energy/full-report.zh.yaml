  - id: FU001
    title: 客户旅程地图
    type: journey-map
    layout: wide
    summary: Crusoe AI 云客户从初始认知到扩展部署的步骤，包括可靠性阶段的关键反向风险。
    data:
      items:
        - label: 阶段 1 – 认知（AI 实验室 / 初创公司发现 Crusoe）
          detail: 客户通过 NVIDIA 合作公告、行业媒体（Forbes、Axios）或开发者社区了解 Crusoe；GitHub 和 HuggingFace 露出带来自然发现
        - label: 阶段 2 – 资格确认（Crusoe 销售评估机会）
          detail: 销售团队评估 GPU 需求（集群规模、工作负载类型、时长）；超大规模云厂商通过直接容量谈判进入；初创公司通过 cloud.crusoe.ai 自助进入
        - label: 阶段 3 – POC / 试用（客户测试工作负载）
          detail: 客户运行概念验证 GPU 工作负载；评估延迟、吞吐、定价相对 CoreWeave / Lambda Labs / AWS 的表现；ISO 认证缩短企业安全审查周期
        - label: 阶段 4 – 合同（财务 / 采购批准）
          detail: 超大规模云厂商签署长期容量协议（月到年）；AI 初创公司使用按需或月度订阅；工业客户（Redwood Materials）签署 Spark 部署合同
        - label: 阶段 5 – 部署（Crusoe 运营开通资源）
          detail: Crusoe 开通 GPU 集群；客户部署训练、微调或推理工作负载；Command Center 提供统一可观测性和作业管理
        - label: 阶段 6 – 价值交付（衡量正常运行时间和性能）
          detail: >-
            Redwood Materials 验证 99.2% 正常运行时间；Sony Research 训练 GT Sophy 模型；Cursor 和 Together AI 运行生产推理；反向证据：2025 年 3 月
            45 小时故障影响部分客户
        - label: 阶段 7 – 扩张（客户增长和增购）
          detail: Redwood Materials 从 4 个扩至 24 个 Spark 单元（7x）；Microsoft 从初始园区升级到 900 MW 锚定客户；扩张由已验证可靠性和运营价值驱动
        - label: 阶段 8 – 续约 / 锚定承诺（多年锁定）
          detail: Microsoft 900 MW 代表长期锚定租户承诺；超大规模云厂商续约降低 Abilene 融资风险；按需初创公司续约由性价比和切换成本驱动
    approximationNotes: 旅程阶段由公开客户公告、Crusoe 新闻室和 Redwood Materials 案例研究综合得出。阶段间转化率未公开。
