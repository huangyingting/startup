      - number: '4.2'
        title: 单位经济与定价
        blocks:
          - type: paragraph
            body: >
              Crusoe 公开披露的定价只是标价；每 GPU-hour 实际收入、预留容量折扣结构和 GPU 利用率均未披露。H100 SXM 标价 $4.29/GPU-hour，A100 SXM 标价
              $1.95/GPU-hour，使 Crusoe 位于 neocloud 现货报价的高端，但低于主要超大规模云厂商的按需费率。GB200 NVL72 价格未披露。CPU 算力标价为 $0.04/vCPU-hour。

              单位经济所处市场环境偏不利：H100 现货市场价格从 2023 年约 $8/hour 跌至 2024 年末 $2–3/hour，背后是供给正常化，以及 CoreWeave、Lambda Labs、Nebius 等
              neocloud 之间的集群竞争。价格压缩迫使 Crusoe——也包括所有 GPU 云运营商——不能只靠现货定价竞争，而要靠基础设施效率、产品差异化（MemoryAlloy 推理、Command
              Center、Edge Zones）和企业粘性合同。

              成本侧的关键单位经济输入，公开信息只提供汇总代理指标。PUE 为 1.2–1.3，而行业平均为 1.8，意味着明显能源成本优势，电力开销比典型超大规模数据中心低约 30–40%。若估计混合电价为
              $0.03–0.06/kWh，H100 TDP 约 700W，则每 H100 每小时电力成本约 $0.02–0.04——只是 $4.29 标价的一小部分。GPU 资本折旧才是主导成本：H100 单价约
              $25,000–30,000；按 3–5 年折旧、80% 利用率测算，每 GPU-hour 资本成本约 $0.60–1.20，仍留下有意义的毛利空间。GPU 云基础设施细分市场中，同行 neocloud
              公司披露毛利率在 20–40% 区间，Crusoe 的效率优势意味着它可能位于高端，但公司未披露毛利率数据。
