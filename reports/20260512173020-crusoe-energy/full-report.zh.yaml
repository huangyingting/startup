  - number: 8
    title: 估值
    sections:
      - number: '8.1'
        title: 估值背景与融资轮历史
        blocks:
          - type: paragraph
            body: >-
              Crusoe 的私募市场估值自 2019 年种子轮以来，经过六轮股权融资一路抬升，2025 年 10 月 Series E 达到 $10B+，较不到 12 个月前完成的 $2.8B Series D 跃升
              3.6x。Series E 的 SEC Form D（2025 年 10 月 23 日提交）确认总募资 $1,374,999,988、71 名投资者，由 Valor Equity Partners 和
              Mubadala Capital 共同领投。Series D（Form D 于 2024 年 11 月 21 日提交）确认募资 $600M，由 Founders Fund
              领投，NVIDIA、Fidelity、Mubadala、Ribbit Capital 和 Valor 参投。所有轮次累计股权融资约 $3.4B。除股权外，Crusoe 还搭出 $15B+ 承诺资本栈：Blue
              Owl Capital 为 Abilene 数据中心建设在合资企业中承诺 $3.4B，JPMorgan 正为同一园区安排约 $9.6B 项目融资。这个结构更像基础设施 REIT
              或电力公用事业的真实资产融资模型，而不是软件初创公司的融资模型——这是有意选择，扩大了可比公司集合，也压缩了传统收入倍数框架的适用性。

              不到 12 个月内从 $2.8B 跳到 $10B+，由三个催化剂驱动：（1）2025 年 3 月将 Bitcoin 挖矿业务出售给 NYDIG，明确 Crusoe 转为纯 AI 云和数据中心公司；（2）据报道
              2025 年云 ARR 增长 150%，总合同价值（TCV）增长 17x；（3）宣布 Microsoft 在 Abilene 的 900 MW
              锚定承诺，降低公司最大资本项目风险。考虑这些催化剂后，这轮估值跳升在分析上可以辩护，但当前估值仍需要确认收入规模超过 $1B，才能称为明显便宜，而不是动量驱动。按 2024 年全年收入 $276M 计算，$10B
              估值意味着约 36x 往绩收入。如果未经验证的分析师估计——2025 年收入 $500M 至 $1B——被证实，隐含倍数会降至 10 至 20x。若 ARR 为 $1B、倍数为 10x，估值基本合理；若 ARR
              为 $500M、倍数为 20x，估值仍偏激进。主要尽调任务是用经审计或管理层确认的数据核实 2025 年 ARR，再决定是否将判断从观察上调为买入。
