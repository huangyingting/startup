  - id: TV006
    title: 最终尽调问题表
    columns:
      - 主题
      - 缺失证据
      - 重要性
      - 尽调路径
    rows:
      - - 2025 年收入和 ARR 确认
        - 经审计或管理层确认的 2025 全年 ARR，并按业务线和合同类型拆分
        - 核心估值输入；$10B 估值意味着在未经验证的 $500M 到 $1B 上打 10 到 20x，投资判断前必须确认
        - 私有数据室；提交后的 S-1 招股说明书或招股书；来自领投方的管理层确认函
      - - 毛利率和 EBITDA 可见度
        - Crusoe 任何业务单元、任何时期都没有公开毛利率、贡献利润率或 EBITDA 数据
        - 资本密集模式叠加 JV 和项目融资结构；利润率决定规模能否创造价值
        - 非公开财务披露请求；IPO S-1 备案；对标 CoreWeave 分部利润率
      - - 客户收入集中度
        - 未公开按客户划分的收入占比；Microsoft 和 OpenAI 集中度未经验证
        - 集中度超过 50% 会带来二元收入风险，并给客户重新谈判或取消合约的筹码
        - 私有数据室；合同审查；客户访谈；提交 S-1 时的风险因素披露
      - - 股权结构表优先权结构
        - 多家领投方参与六轮股权融资；清算优先权和反稀释条款未披露
        - 若退出估值低于最高轮价格，优先权悬挂会实质压低普通股回报
        - 私有数据室；法律顾问审查股东协议和章程；409A 估值报告
      - - 实际电力来源与营销表述
        - TCEQ 许可确认 Abilene 有 360 MW 燃气轮机；各园区总可再生能源占比未披露
        - ESG 风险影响主权财富基金和欧盟关联资本；漂绿暴露提高监管风险
        - TCEQ 许可审查；EPA GHG 报告数据；要求独立能源审计；现场设施检查
      - - 签约 ARR 与确认收入
        - 已披露 TCV 增长 17x，但收入确认时间和合同结构完全未披露
        - 如果合同含爬坡条款或任意终止条款，TCV 会高估近期 ARR
        - 数据室合同抽样；收入确认政策审查；财务报表中的递延收入明细
    notes: 尽调路径假定能访问私有数据室；Crusoe 推进 IPO 时，多数事项也会在 S-1 招股说明书披露。优先级按紧迫性降序排列。
