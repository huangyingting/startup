      - number: '5.3'
        title: 战略合作与供应链
        blocks:
          - type: paragraph
            body: >
              Crusoe 已建立多年期 NVIDIA 战略合作，覆盖 GPU 配额、围绕 B200/GB200 部署的电力与冷却优化共研，以及联合营销。这层关系让 Crusoe 提前看见 NVIDIA
              路线图节点，并在供给紧张期获得配额优先级。2026 年 Q1，Crusoe 宣布与 Form Energy 达成多年协议，在未来园区部署长时铁空气电池储能，回应表后可再生能源发电固有的电网间歇性风险。

              HuggingFace Inference Partner 认证意味着 Crusoe 会出现在 HuggingFace Hub 用户的 HuggingFace Inference Endpoints
              部署菜单中，直接解决微调模型服务的开发者获客问题。Together.ai 和其他推理 API 聚合商已发布引用 Crusoe 硬件的性能基准。

              signisys.com 合作提供电网接入工程和高压变电站设计，服务 Crusoe 园区建设，尤其适用于 765 kV Abilene 互联。Upstream
              Data（upstreamdata.ca）被列为油田火炬气发电单元供应商，用于 North Dakota 的搁浅天然气计算部署；它代表 Crusoe
