      - number: '7.3'
        title: 财务、合作伙伴与依赖风险
        blocks:
          - type: paragraph
            body: >
              Crusoe 的财务风险画像由资本密集度主导。Abilene 园区建设需要超过 $15B 的总承诺资本（$3.4B Blue Owl JV 股权、$9.6B JPMorgan 项目融资，再加上 Crusoe
              自有股权）。到了这个规模，Crusoe 已不再只是技术初创公司，而是一个资本市场运营体，依靠持续的投资者信心、契约条款合规和锚定租户留存来偿付债务。若里程碑错失、锚定租户合同终止或信用评级下调触发
              JPMorgan 信贷契约违约，公司可能被迫以不利条件出售资产或稀释股权。

              GPU 价格压力是现实财务风险。受 NVIDIA 供给增加和新云容量扩张推动，H100 现货价格从 2023 年约 $8/hr 跌至 2025 年 $2-3/hr。如果 H200/B200
              价格沿类似轨迹下行，Crusoe 单位计算收入将被压缩，按需和短期订阅客户的贡献会下降。超大规模云锚定协议缓解了部分冲击（这些协议很可能采用基于容量而非现货 GPU 价格的定价），但如果 Crusoe
              无法匹配竞争对手价格，按需 AI 初创分层面临实质流失风险。

              NVIDIA 既是 Crusoe 的战略伙伴，也是其主要 GPU 供应商依赖。如果 NVIDIA 将优先级转向更大的超大规模云厂商（AWS、Google、Microsoft
              Azure），或决定发展自有云产品，来自 NVIDIA 的优先配额并无保证。NVIDIA 关系任何恶化——无论来自供给配额争议、路线图变化，还是 NVIDIA 的 DGX Cloud 战略——都会直接损害
              Crusoe 履行客户承诺的能力。

              Microsoft 约占 Abilene 阶段承诺总量 2.1 GW 中的 900 MW。如果 Microsoft 因 AI 需求收缩、竞争压力或内部战略调整而减少、推迟或取消该承诺，JPMorgan
              项目融资契约条款很可能被触发。评估这一集中度风险时，Blue Owl JV 结构和 Microsoft 合同中的任何 take-or-pay 条款，是关键未知项。

              JPMorgan 正在安排 $9.6B 项目融资，形成单一资本市场交易对手集中度。如果 JPMorgan
              对数据中心项目融资的信贷偏好改变（原因可能是市场环境、资本要求或风险限额），短期内为该工具再融资会很困难。该融资工具的条款、契约条款和再融资安排，是关键尽调项。
