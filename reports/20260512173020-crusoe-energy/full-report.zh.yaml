  - number: 3
    title: 竞争格局
    sections:
      - number: '3.1'
        title: 竞争格局概览
        blocks:
          - type: paragraph
            body: >-
              AI 算力基础设施竞争格局最适合分三层理解：（1）纯 neocloud GPU 云运营商，是 Crusoe 最直接的收入竞争者；（2）与 Crusoe
              电力优先定位相近、同样押注能源论点的运营商；（3）超大规模云厂商（AWS、Azure、GCP），代表 Crusoe 所有服务的主导性现状替代方案。

              CoreWeave 以估计 $5B ARR、NVIDIA 优先伙伴身份，以及 2025 年 3 月 IPO 建立的 neocloud 公开可比公司地位，领跑 neocloud 细分市场。Lambda Labs
              面向开发者和研究市场，GPU SKU 目录深、按需定价有竞争力。Nebius AI（Yandex 分拆，2024 年 6 月起运营）以隐私和数据主权为核心定位，面向 EU 和美国市场提供 GPU
              云。Lancium 在 Texas HPC 市场运营，由风能和太阳能供电，与 Crusoe 最初的能源论点和相近地理位置重合度最高。

              超大规模云厂商层——AWS P4/P5、Azure NDv5 和 GCP A3 实例——代表全球最大的 GPU 算力池，也是企业买家推迟切换到 neocloud 运营商的主要原因。超大规模云厂商正在加速自建 AI
              基础设施：Microsoft 承诺 2025 年 AI 基础设施 capex 超过 $80B，AWS 和 GCP 也在类似增加数据中心部署。这些投资直接挑战了当前吸引企业买家转向 neocloud
              运营商的套利机会。

              一个关键信号偏负面：CoreWeave 2025 年 3 月 IPO 虽然验证了 neocloud 类别，也引入了公开市场纪律和直接估值基准。CoreWeave IPO 首日约以 5x 收入交易——若套用到
              Crusoe 的 $124M AI 云收入基数，意味着 Crusoe 云业务单独估值低于当前 $10B 总企业估值，说明 Crusoe 的估值部分依赖基础设施（土地、电力、工厂）层，而非纯云收入倍数。
