      - number: '2.4'
        title: 增长驱动因素与市场约束
        blocks:
          - type: paragraph
            body: >-
              首要增长驱动因素是 AI 算力需求持续指数级增长。基础模型训练对算力呈超线性扩张，推理需求又随模型采用率上升而增长；两者叠加，推动 GPU 集群需求多年复合增长。IDC 报告的 2025 年云 GPU
              基础设施支出同比增长 46.8%，与这一论点一致。

              电力可用性是第二层结构性驱动，尤其利好 Crusoe。美国电网受限：北弗吉尼亚新数据中心电力互联排队要多年，超大规模云厂商也公开承认，在传统市场建设新园区电力需要 3–5 年交付期。Crusoe
              先在竞争较弱的市场（Texas Abilene、Wyoming）锁电，把这一约束转成竞争护城河。Crusoe 已有 45+ GW 电力管线和 3.4 GW 已投运容量，在市场恢复正常前很早就锁定了绑定性资源。

              NVIDIA 战略合作（2025 年 1 月宣布）带来 GB200 NVL72 和下一代 GPU 配额的优先获取权，在 GPU 供给受限环境中，这是关键差异化。Crusoe 的 PUE 为
              1.2–1.3，低于行业平均 1.8（由直达芯片液冷实现），转化为更低的每 GPU-hr 能耗成本，即使现货价格下跌也能支撑有竞争力的定价。

              主要约束是 GPU 现货价格压缩。H100 现货从 $8/hr 跌至 $2–3/hr，意味着现货市场单位收入下降 60–75%。第二个约束是超大规模云厂商的竞争反应：AWS、Azure 和 GCP 都在加速部署
              GPU 容量。一个负面但重要的发现是：Crusoe 的 Abilene 园区获得 TCEQ 许可，可部署 360 MW 天然气涡轮；公司还聘请 Engine No. 1 开发 4.5 GW
              新天然气发电。这与其清洁能源品牌相冲突，并给重视可持续性的客户带来 ESG 风险。
