  - id: TV001
    title: 建议摘要表
    columns:
      - 决策字段
      - 当前判断
      - 决策含义
    rows:
      - - 建议
        - 观察
        - 密切跟踪 IPO 信号和 ARR 确认；在没有经审计的 2025 年财务数据前，不要按 $10B+ 估值承销新资金。
      - - 信心
        - 中
        - 公开证据能强力支持基础设施牵引，但对已验证经济性和利润率披露支持较弱。
      - - 风险评级
        - 高
        - 估值倍数压缩可能经由 GPU 定价、超大规模云厂商入场、客户集中或 ESG 声誉损害传导。
      - - 估值立场
        - 偏高
        - $10B+ 标记需要确认 $1B+ ARR；当前隐含 10 到 36x 倍数高于可比组。
      - - 持有 / 退出姿态
        - 持有 3 到 5 年，等待 IPO
        - 预计 2026 到 2027 年 IPO 申报将带来首次公开市场价格发现；跟踪降估值融资风险。
      - - 价格纪律
        - 当前估值下不做价格不敏感买入
        - 需要经审计的 $1B+ ARR 确认，或显著更好的入场价格，才把观察转为买入。
    notes: 该判断反映 2025 年 10 月 $10B+ 入场估值，并非对 Crusoe 战略质量的泛泛看法。
