  - id: TV003
    title: 乐观 / 基准 / 悲观情景表
    columns:
      - 情景
      - 关键假设
      - 估值逻辑
      - 概率信号
    rows:
      - - 乐观
        - 2025 年 ARR 确认 $1B+；2026 年 ARR 以 100%+ 增长达到 $2B；按 10 到 12x 远期 ARR IPO；Microsoft 和两个或更多超大规模云厂商租户；GPU 价格底线未被击穿
        - $1B ARR × 12x = $12B；2026 年 $2B ARR × 10x = $20B；以 $10B 入场并持有 3 到 5 年，回报 1.2 到 2.0x
        - 低到中；需要 ARR 确认、Abilene 全面投产，并新增超大规模云厂商承诺
      - - 基准
        - 2025 年 ARR 确认在 $750M 到 $1B；2026 年增速放缓至 50% 到 80%；2027 到 2028 年按 8 到 10x ARR IPO；Microsoft 锚定仍在，但未签下新的超大规模云厂商
        - $750M ARR × 8x = $6B；$1B ARR × 8x = $8B；较当前 $10B 略有折价；入场价回本到小幅亏损
        - 中；若 2024 年退出时基数为 $400M 到 $450M，最符合已确认的 150% ARR 增长说法
      - - 悲观
        - 2025 年 ARR 确认在 $500M 或以下；GPU 现货价维持 $2/hr；超大规模云厂商自供加速；客户集中风险兑现；ESG 声誉受损
        - $500M ARR × 5x = $2.5B；$500M ARR × 6x = $3B；较 $10B 入场标记折价 70% 到 75%
        - 低到中；GPU 商品化和超大规模云厂商入场是真实风险，但完整悲观情景需要多个失败同时发生
    notes: 估值倍数是供投资委员会讨论的 EV/ARR 情景示例，不是 DCF 输出。所有 ARR 数据均为未经审计估计，因 Crusoe 没有公开财务披露。
