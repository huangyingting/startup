      - number: '8.3'
        title: 乐观、基准与悲观情景
        blocks:
          - type: paragraph
            body: >-
              乐观情景从一个前提出发：Crusoe 以电力优先的垂直整合，能产生结构上优于现货 GPU 新云服务商的收入质量。如果 Crusoe 确认 2025 年 ARR 超过 $1B，并在 2026 年维持 100%+
              同比增长，公司到 2026 年底可能接近 $2B ARR。按 8 至 12x ARR 倍数——与高增长基础设施软件上沿一致——公司价值可达 $16B 至 $24B，较当前 $10B 估值有 1.6 至 2.4x
              上行。催化剂包括 Abilene Phase 1 完整投运、新增超大规模锚定租户，以及 2026 年末或 2027 年提交 IPO 文件，提供公开市场价格发现。

              基准情景认为，如果 2025 年收入落在 $750M 至 $1B 之间，Series E 可视为合理的私募市场估值标记。按已确认 $750M ARR 的 8 至 10x 前瞻倍数计算，公允价值为 $6B 至
              $7.5B——低于当前 $10B 标记，但处在一个强劲 2026 年执行和 IPO 溢价可以弥合差距的区间。基准情景不要求当前轨迹继续加速，只要求管理层通过 150% ARR
              增长表述所暗示的事实得到确认。主要下行风险是客户集中度：Microsoft 和 OpenAI 被认为是锚定收入贡献方，任何承诺缩减都会实质损害投资逻辑。

              悲观情景假设 GPU 现货价格继续商品化，超大规模云厂商自行吸收新云需求，且 Crusoe 2025 年收入确认在 $500M 低端。按 $500M ARR 的 5 至 6x 计算，隐含估值降至 $2.5B 至
              $3B——较 2025 年 10 月标记折价 70% 至 75%。悲观情景不是归零情景，但代表显著降估值融资风险。漂绿暴露增加尾部风险：Heatmap News 记录 Crusoe 的 Abilene 园区使用
              360 MW 现场天然气轮机，公司还聘请 Engine No. 1 开发 4.5 GW 新增燃气容量，与清洁能源品牌形成重大张力，可能重定价 ESG 敏感资本。MarketsAndMarkets 和 IDC 关于
              GPU-as-a-service 市场增长的数据支撑乐观情景的需求环境，但没有给出 Crusoe 特定的远期 ARR 指引，因此情景选择仍依赖判断。
