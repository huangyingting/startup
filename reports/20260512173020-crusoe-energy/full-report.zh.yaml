      - number: '6.4'
        title: 客户集中度与反向发现
        blocks:
          - type: paragraph
            body: >
              Crusoe 的客户基础存在显著集中度风险。按容量看，Microsoft（900 MW）和 Oracle/Stargate 很可能是两大主要收入贡献方，两者合计可能占 Abilene 签约容量的 50%
              以上。这样的超大规模云集中度在早期基础设施建设商中并不罕见（CoreWeave 也同样集中于 Microsoft/Azure），但意味着任一锚定客户重新谈判、取消合同或技术路线改变，都可能实质损害 Crusoe
              收入及其偿付 $9.6B JPMorgan 项目融资的能力。

              两项反向发现值得尽调关注。第一，Forbes 报道的 2025 年 3 月 45 小时宕机，是商业爬坡期一次有记录的可靠性失败。宕机时长接近整整两天，显著超出典型云 SLA 阈值（99.9% 月度可用性仅允许约
              43 分钟停机）。如果 Crusoe 的企业 SLA 承诺超大规模云级可用性，该事件很可能触发补救义务。研究期内未发现 Crusoe 或受影响客户就宕机发布公开声明。

              第二，Heatmap News（2025 年 3 月）记录了 Crusoe 清洁能源定位与实际能源组合之间的张力：TCEQ 许可数据确认 Abilene 有 360 MW 现场燃气轮机，Crusoe 还在开发
              4.5 GW 新增燃气发电能力。对 ESG 敏感的企业客户，尤其是有净零承诺的客户，可能因与 Crusoe
              合作面临采购摩擦或声誉风险。虽然未发现客户因此流失，但它仍是潜在风险，可能影响企业销售周期，尤其是欧洲客户或 Scope 2/3 减排承诺激进的美国公司。

              新云服务商赛道竞争日益激烈，CoreWeave、Lambda Labs、Nebius 等公司都在扩张 GPU 云容量，并把 H100 现货价格从 2023 年的约 $8/hr 压到 2025 年的
              $2-3/hr。这种价格压力对短期、按需的 AI 产品公司客户影响更大，而这些客户代表 Crusoe 的先落地再扩张漏斗。没有 NRR 数据，无法判断 Crusoe 是否能在价格压缩周期中留住这些客户。
