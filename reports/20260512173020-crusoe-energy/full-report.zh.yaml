        - 规模、多元化和资产负债表根本不同；不能直接套用倍数
    notes: 可比公司集并不完整；最直接的类比对象（Lancium、Applied Digital、Vast Data）多为私营或早期上市公司，经营历史不足。CoreWeave 提供了最可用的公开倍数基准。
