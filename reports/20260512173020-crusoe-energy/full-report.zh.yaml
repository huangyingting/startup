        - ARR 未披露；面向开发者的 GPU 云
        - 分析师来源估计估值约 $1.5B
        - 开发者 GPU 云可比；同属新型云类别，但没有基础设施差异化
        - 没有自有电力基础设施；没有超大规模云厂商锚定租户；规模小得多
      - - Lancium
        - 私营公司
        - ARR 未披露；位于 Texas 的电力优先数据中心运营商
        - 截至 2026 年 5 月没有公开估值锚点
        - Texas 市场里最接近的电力优先 AI 基础设施战略类比
        - 私营且估值不透明；没有可比收入或 ARR 数据
      - - 超大规模云厂商（AWS、Azure、GCP）
        - 上市公司；万亿美元级市值
        - 云收入达数千亿美元
        - 收入倍数 5 到 10x；万亿美元级估值
