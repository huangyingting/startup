      - number: '7.4'
        title: 执行、ESG 与声誉风险
        blocks:
          - type: paragraph
            body: >
              Crusoe 员工数从 2024 年底约 600 人，几乎翻倍至 2026 年 3 月 31 日的 1,235 人。这种组织扩张速度带来执行风险：文化稀释、流程缺口、管理带宽约束和协同成本上升。公司在 2025
              年 12 月聘请新 COO/CFO Michael Gordon（前 MongoDB 高管），并在 2026 年 1 月聘请新任房地产总法律顾问 Nader
              Pakfar，显示其正转向更成熟的运营模型。不过，对联合创始人 Chase Lochmiller（CEO）和 Cully
              Cavness（President）的关键人依赖仍然偏高——二人是主要技术和能源愿景塑造者，若离职或减少参与，对投资者将构成重大不利变化。

              位于 Colorado 州 Brighton 的 Spark Factory（350,000 sq ft，$200M 投资）计划在 2026 年 Q3
              交付首批单元。若该时间线因建设超支、设备采购、许可或质量问题延迟，Crusoe 履行 Abilene 园区之外的模块化 AI 工厂客户承诺的能力将受限。Spark
              产品线是重要的收入多元化路径，延迟会拉长公司对单一 Abilene 园区的依赖。

              Wyoming 园区（已宣布 1.8 GW）截至研究期（2026 年 5 月）尚未破土动工。公告与开工之间的空档，引入了 Abilene 以外既定项目管线的执行风险。Wyoming
              的电力接入协议、许可时间线和融资尚未公开确认。

              最突出的 ESG 和声誉风险，是 Crusoe 清洁能源定位与实际能源组合之间的张力。TCEQ 许可数据确认 Abilene 有 360 MW 现场燃气轮机，Heatmap News 还报道称 Crusoe 正与
              Engine No. 1 合作，为 AI 需求开发 4.5 GW 新增燃气发电能力。这构成重大漂绿风险：如果 ESG 记者、做空者或激进投资者放大 Heatmap 报道，Crusoe
              可能承受声誉压力，并影响企业销售周期（尤其是有强制 Scope 2/3 披露的欧洲客户）、未来融资（ESG 挂钩债务）和 IPO 定位。2024 Impact Report 和 ISO 42001 AI
              管理认证是正面动作，但没有回应燃气供电计算与清洁 AI 营销之间的根本张力。
