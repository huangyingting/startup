      - number: '8.5'
        title: 图表与证据
        blocks:
          - type: callout
            title: 当前判断：观察 — 不是买入
            body: >-
              Crusoe 是一家扎实的 AI 基础设施公司，有真实资本、真实客户，也有真正的电力护城河差异化。公开证据还撑不起以 $10B+ 估值买入：该估值标记高于已确认 ARR，财务披露也不足。只有 $1B+ ARR
              经过审计、客户集中度量化、优先股堆叠透明之后，才可上调至买入。
            calloutType: recommendation
            claimRefs:
              - CV001
              - CV014
              - CV015
              - CV040
              - CV041
          - type: callout
            title: 电力管线和垂直整合是真正的结构性优势
            body: >-
              45+ GW 电力管线、3.4 GW 已投运容量，以及从选址到云服务的端到端垂直模式，构成纯 GPU 租赁竞争对手难以快速复制的结构性优势。Bain Capital 早在 AI 热潮前就押注电力的判断，已被
              Microsoft Abilene 锚定订单和 NVIDIA 战略合作验证。
            calloutType: strength
            claimRefs:
              - CV028
              - CV029
              - CV036
              - CV045
          - type: callout
            title: GPU 价格商品化和超大规模云厂商入场，是实质性下行情景
            body: >-
              H100 现货价格已从约 $8/hr 跌至 $2 到 $3/hr，并仍在下行。超大规模云厂商正重金布局表后电力策略。如果单 GPU 经济性进一步压缩、超大规模云厂商自供加速，$10B 估值标记相对悲观情景隐含
              70 到 75% 下行空间；这不需要需求崩塌，只需要经济性恶化。
            calloutType: risk
            claimRefs:
              - CV021
              - CV022
              - CV035
              - CV040
          - type: callout
            title: 基准情景假设可确认 2025 年 ARR 达 $750M 至 $1B
            body: >-
              整个估值框架取决于 Crusoe 能否以 $750M 至 $1B 云 ARR 退出 2025 年。如果实际 ARR 只有 $500M 或更低，基准情景会滑入悲观情景，当前 $10B
              估值标记就明显高估。在从观察上调至买入前，确认收入规模是最重要的尽调动作。
