        - 最接近的上市可比公司；NVIDIA 偏好的新型云厂商，GPU 云模式相近、扩张很快
        - 缺少自有电力基础设施；IPO 后倍数压缩；客户组合不同
      - - Nebius AI
        - 上市公司（NASDAQ 上市）
        - ARR 未披露；欧洲 GPU 云运营商
        - 2025 至 2026 年市值约 $6B
        - GPU 云，获 NVIDIA 支持；商业模式与 Crusoe Cloud 部分重叠
        - 美国布局小得多；聚焦欧洲市场；没有美国电力护城河逻辑或超大规模云厂商锚定客户
      - - Lambda Labs
