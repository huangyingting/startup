  - number: 2
    title: 市场分析
    sections:
      - number: '2.1'
        title: 市场定义与范围
        blocks:
          - type: paragraph
            body: >-
              Crusoe 位于两个相邻市场的交叉点：GPU 云计算（neocloud 和 GPU-as-a-Service）与 AI 数据中心基础设施。承保 Crusoe 时，相关市场横跨三层：向 AI
              训练和推理工作负载出售的托管 GPU 算力（Crusoe Cloud）；通过长期超大规模云厂商合同出售的大规模、电力优化数据中心容量（Microsoft 900 MW Abilene 承诺）；以及卖给自建专用本地
              AI 算力企业的模块化 AI 工厂部署（Crusoe Spark）。

              明确排除在市场边界之外的，是通用云 IaaS（CPU VM、对象存储、CDN）、消费级 AI 应用软件、AI 半导体制造，以及无关能源基础设施。neocloud GPU 云市场由需要高密度大显存 GPU
              集群（H100/H200/B200/GB200 级别）的工作负载定义，用于深度学习训练、大模型微调或持续批量推理——这些工作负载越来越难被通用公有云以所需密度、延迟或成本服务。

              Crusoe 服务的主要现状替代方案是超大规模云厂商 GPU 云（AWS P4/P5、Azure NDv5、GCP A3）。这仍是最大可触达池，但传统市场里的电力、空间和交付周期约束很紧。H100 实例的 GPU
              现货价格已从 2023 年中约 $8/GPU-hr 大幅降至 2025 年初 $2–3/GPU-hr，压缩了所有 neocloud 运营商的单位经济。这一价格动态并不降低绝对 GPU
              算力需求——它反映供给响应——但会直接影响单位收入，并把行业推入成本领先竞赛；Crusoe 的能源和基础设施垂直整合正是其竞争论点的核心。
            claimRefs:
