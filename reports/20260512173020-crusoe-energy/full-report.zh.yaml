        - 标记声誉风险；评估对 ESG 敏感型企业销售管线和 IPO 时间表的影响
      - - NVIDIA 供应中断
        - NVIDIA 季度财报、供应链报告和 GPU 现货市场数据
        - NVIDIA 宣布 GB200 交付延迟 >6 个月，或下调 Crusoe 配额等级
        - 评估对 Abilene 二期时间表的影响；评估 GPU 替代品（AMD MI300X）的可得性和成本差异
      - - JPMorgan 契约违约
        - Crusoe 契约合规报告（如可取得）；信用评级机构观察名单更新
        - JPMorgan 宣布违约，或发起项目融资契约豁免谈判
        - 最高严重性触发项；升级给董事会；评估流动性跑道和替代融资选项
      - - Spark Factory 投产延至 2026 年 Q4 之后
        - Crusoe 新闻稿、Forbes/Forbes 关于 Spark Factory 进展的报道
        - 截至 2026 年 12 月 31 日仍未宣布 Spark Factory 单元交付
        - 重估模块化产品线时间表；评估对非 Abilene 客户管线的影响
    notes: 这些触发项服务于主动尽调监控计划。阈值仅作示例；需根据投资逻辑和风险偏好调整。标记为“最高严重性”的终止标准意味着需要立即重新评估投资逻辑。
