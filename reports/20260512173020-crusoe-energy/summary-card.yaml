summary:
  headline: >-
    Crusoe is the most credibly positioned vertically integrated AI factory company with a proven energy-first thesis,
    2.1 GW committed campus, $10B+ valuation, and NVIDIA preferred-partner status — but faces GPU pricing
    commoditization, acute customer concentration, an unexplained March 2025 outage, and an ESG contradiction from the
    Engine No. 1 natural gas JV that could impair enterprise sales.
