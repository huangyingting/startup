  topStrengths:
    - >-
      Vertically integrated energy + compute model creates durable cost advantage: PUE 1.2-1.3 vs. industry 1.8; Abilene
      on-site gas turbines eliminate grid dependency and unlock 24/7 AI workloads.
    - >-
      NVIDIA preferred-partner status with equity alignment provides frontier GPU access (H100, B200, GB200) ahead of
      non-preferred neoclouds, supporting premium pricing and customer stickiness.
    - >-
      2.1 GW committed Abilene campus (Phase 1 online, Phase 2 Microsoft 900 MW signed March 2026) establishes physical
      infrastructure moat; 1.8 GW Wyoming campus pipeline extends geographic optionality.
    - >-
      Series E at $10B+ with 71 investors including Abu Dhabi SWF (Mubadala) and Valor validates international
      institutional demand and provides 18-24 months of capital runway.
    - >-
      Crusoe Spark modular AI factory, Brighton CO (Q3 2026), is a product-line expansion that could reduce deployment
      cost and enable geographic diversification beyond large campus builds.
  topRisks:
    - >-
      GPU pricing commoditization: H100 spot fell from $8 to $2-3/hr in 2025; contract renewals at lower rates will
      compress AI cloud margins unless Crusoe migrates customers to premium B200/GB200 SKUs.
    - >-
      Customer concentration: Microsoft (900 MW), Oracle/Stargate, and OpenAI likely represent >60% of Abilene committed
      capacity; hyperscaler internalization over 3-5 years is a structural existential risk.
    - >-
      Unexplained operational incident: March 2025 45-hour outage disrupted AI training workloads; no public root-cause
      analysis released; no financially-penalized SLA disclosed.
    - >-
      ESG/greenwashing risk: Engine No. 1 JV for 4.5 GW of new natural gas generation contradicts clean-AI positioning;
      Fortune 500 ESG procurement gates could exclude Crusoe as Scope 3 emissions data becomes required.
    - >-
      Execution concentration: Five simultaneous major capital programs (Abilene Phase 2, Wyoming campus, Spark Factory,
      Series E deployment, GPU cloud expansion) with 1,235 employees including a 635+ headcount added in 15 months.
  unresolvedGaps:
    - >-
      Anchor tenant contract terms (duration, early termination, renewal conditions) for Microsoft, Oracle/Stargate, and
      OpenAI are private; customer concentration risk cannot be precisely sized without this data.
    - >-
      Blue Owl JV and JPMorgan project finance covenant packages (DSCR thresholds, cure periods) are not publicly
      disclosed; capital adequacy under revenue-stress scenarios cannot be assessed.
    - >-
      March 2025 outage root cause and remediation plan have not been publicly disclosed; repeat-incident probability
      cannot be assessed.
    - >-
      GHG Protocol Scope 1/2/3 emissions data for 2024 operations not published in auditable format; ESG procurement
      exclusion risk cannot be quantified.
    - >-
      MemoryAlloy KV-cache and Spark modular factory designs have no confirmed USPTO patent protection;
      freedom-to-operate risk is unquantified.
