callouts:
  - calloutType: strength
    title: "Modular AI Factory Enables 6-8 Month Campus Stand-Up"
    body: >
      Factory-prefabricated MAF units arriving pre-commissioned reduce campus construction to 6-8 months versus
      24-36 months for traditional builds—a durable execution advantage at the scale Crusoe is targeting.
    claimRefs: [CE001, CE002, CE046]

  - calloutType: strength
    title: "Dual ISO Certification Including ISO 42001 AI Governance"
    body: >
      ISO 27001:2022 and ISO 42001:2023 dual certification, validated by DNV GL, is held by fewer than a dozen
      cloud providers globally as of mid-2026, providing a compliance differentiator especially for regulated AI buyers.
    claimRefs: [CE017, CE018]

  - calloutType: strength
    title: "NVIDIA Multi-Year Strategic Collaboration Secures GPU Allocation Priority"
    body: >
      A multi-year NVIDIA collaboration covering H100, H200, B200, and GB200 provides allocation priority during
      supply-constrained periods and early access to roadmap hardware—critical for a rapidly scaling GPU cloud.
    claimRefs: [CE024, CE034, CE045]

  - calloutType: risk
    title: "SOC 2 Type II Gap Limits Enterprise Regulated Buyer Addressability"
    body: >
      The absence of a SOC 2 Type II report is a meaningful compliance gap. Financial services, healthcare, and
      government buyers typically require SOC 2 Type II before committing to a cloud provider.
    claimRefs: [CE019]

  - calloutType: risk
    title: "Single-Vendor NVIDIA Dependency Across Entire Compute Stack"
    body: >
      Crusoe's entire GPU fleet is NVIDIA-based with no disclosed AMD or Intel GPU roadmap. A sustained NVIDIA
      supply disruption, pricing change, or competing GPU-cloud preferred-supplier arrangement could materially
      impact Crusoe's supply chain and growth trajectory.
    claimRefs: [CE047]


