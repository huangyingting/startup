company:
  name: Crusoe
chapter:
  number: 5
  title: Product & Technology
  summary: >
    Crusoe's product is an end-to-end AI infrastructure stack: Modular AI Factories (MAF units) integrating GPU
    clusters, power distribution, and liquid cooling into prefabricated containers; Crusoe Cloud with bare-metal,
    Kubernetes, and OpenAI-compatible inference APIs; a high-throughput parallel file system (CFS); Edge Zones
    for distributed inference; and Command Center for fleet observability. GPU procurement is anchored by a
    multi-year NVIDIA strategic collaboration covering H100, H200, and forthcoming B200/GB200 Blackwell GPUs.
    ISO 27001:2022 and ISO 42001:2023 dual certification, open-source tooling on GitHub, and HuggingFace
    Inference Partner status provide external maturity signals. Key risks: no SOC 2 Type II, concentrated
    NVIDIA GPU dependency, and no third-party benchmarks for CFS or cluster throughput.

sections:
  - id: hardware-platform
    title: Hardware Platform and Modular AI Infrastructure
    body: >
      Crusoe's foundational hardware unit is the Modular AI Factory (MAF), a self-contained, prefabricated container
      integrating GPU compute nodes, primary power distribution, liquid cooling manifolds, and UPS backup within a
      single factory-built module. Each MAF unit operates at 1-2 MW of IT load; at campus scale, dozens of MAF units
      combine with shared power infrastructure, networking, and fiber ingress to form campuses from 30 MW to over 1 GW.
      The modular design delivers 6-8 month campus stand-up versus the 24-36 months required for traditional
      design-and-build data centers, a direct consequence of factory-prefabricated modules arriving pre-wired and
      pre-commissioned, ready for generator or grid connection.

      Crusoe's primary deployed GPU is the NVIDIA H100 SXM5 (80 GB HBM3), with H200 SXM5 (141 GB HBM3e) in active
      deployment and B200 SXM5 (192 GB HBM3e) targeted for GA in Q3 2026. A multi-year NVIDIA strategic collaboration
      expanded in Q4 2025 provides allocation priority and early access to B200 and GB200 NVL72 systems. Intra-cluster
      networking uses NVIDIA Quantum-2 InfiniBand at 400 Gbps per link, providing GPU-to-GPU bisection bandwidth for
      512+ GPU distributed training. Node-level NVLink and NVSwitch support intra-server all-reduce operations.

      Crusoe's BYO-Power program lets hyperscale customers co-locate GPU compute at customer-owned substation sites
      with behind-the-meter generation. At least one hyperscale partner at Abilene provides ~300 MW of dedicated
      behind-the-meter power under this arrangement. Abilene Phase 1 (200 MW IT load) became operational in Q1 2026,
      using 765 kV high-voltage transmission interconnection to minimize step-down losses. Edge Zones, launched March
      2026, extend the compute footprint with 1-5 MW distributed inference nodes at third-party colocation sites,
      targeting sub-10 ms latency for real-time inference, video analytics, and sovereign-AI workloads.

      Crusoe's manufacturing facility in Brighton, Colorado (350,000 sq ft, ~$200M investment) produces MAF units at
      scale, with first commercial deliveries targeted for Q3 2026. At peak production the facility is expected to
      output 50-100 MAF units per quarter, equipping a new 200 MW campus roughly every 90 days. The GB200 NVL72 rack
      (72 Blackwell GPUs per rack, ~5 PFLOPS peak FP8 per rack) is planned for Abilene Phase 2 deployment.
    claimRefs: [CE001, CE002, CE003, CE004, CE005, CE006, CE007, CE008, CE015, CE029, CE031, CE033, CE034, CE035, CE036, CE040, CE046]
    tableRefs: [TE001, TE005]
    figureRefs: [FE001, FE003]

  - id: cloud-platform
    title: Crusoe Cloud – Software Platform and API Services
    body: >
      Crusoe Cloud is a purpose-built GPU cloud offering bare-metal, virtual machine, and Kubernetes-managed GPU
      clusters accessible via a REST API, CLI, and Terraform provider. The platform exposes three compute tiers:
      on-demand (hourly billing), reserved (1- or 3-year commitment), and spot (preemptible, discounted). The
      inference API layer implements the OpenAI Chat Completions and Completions v1 API surface, allowing
      drop-in substitution; supported models include Llama 3.1/3.2/3.3, Mistral, Mixtral, DeepSeek-R1/V3,
      Qwen2.5, and Phi-4, with NVIDIA TensorRT-LLM as the serving backend.

      The Crusoe File System (CFS) is a Lustre-based parallel distributed file system with aggregate throughput
      measured in hundreds of gigabytes per second, designed to co-locate storage with GPU clusters to avoid
      PCIe or network-to-CPU bottlenecks. CFS supports GPUDirect RDMA, enabling direct GPU-to-storage DMA
      without CPU involvement. For Kubernetes workloads, CFS is exposed as ReadWriteMany persistent volumes via
      a CSI driver. Block storage (NVMe-over-Fabric, up to 100 TB per instance), object storage (S3-compatible),
      and network-attached NFS volumes complete the storage portfolio.

      Networking provides 400 Gbps InfiniBand to every GPU node within a pod; inter-zone bandwidth is 100 Gbps
      Ethernet. Private networking uses VPCs with subnet-level firewall controls. The platform runs on OpenStack
      with Keystone IAM; SAML 2.0 and OIDC federated identity are supported for enterprise SSO. Container
      images are maintained and published to GitHub Container Registry at ghcr.io/crusoecloud. The open-source
      Terraform provider (Apache 2.0) has 200+ commits and is used by customers for infrastructure-as-code
      deployments, providing verifiable developer adoption. Kubernetes documentation walks through node pool
      configuration, autoscaling, and CFS volume attachment.

      The platform achieved ISO 27001:2022 certification in Q2 2025 and ISO 42001:2023 (AI management system)
      certification in Q3 2025, both confirmed by UKAS-accredited DNV GL. The AI systems certification is
      particularly differentiated; fewer than a dozen cloud providers globally hold ISO 42001 as of mid-2026.
      SOC 2 Type II is not yet reported, which represents a compliance gap for regulated enterprise buyers.
    claimRefs: [CE009, CE010, CE011, CE012, CE013, CE014, CE016, CE017, CE018, CE019, CE020, CE021, CE022, CE023, CE030, CE032, CE037, CE038, CE039, CE041]
    tableRefs: [TE002, TE003]
    figureRefs: [FE002]

  - id: partnerships
    title: Strategic Partnerships and Supply Chain
    body: >
      Crusoe has established a multi-year NVIDIA strategic collaboration covering GPU allocation, co-engineering on
      power and cooling optimization for B200/GB200 deployments, and co-marketing. The relationship provides forward
      visibility into NVIDIA roadmap milestones and allocation priority during supply-constrained periods. In Q1 2026
      Crusoe announced a multi-year agreement with Form Energy for long-duration iron-air battery storage at
      future campuses, addressing the grid-intermittency risk inherent in behind-the-meter renewable generation.

      An HuggingFace Inference Partner designation means Crusoe appears in the HuggingFace Inference Endpoints
      deployment menu for users of the HuggingFace Hub, directly addressing developer acquisition for fine-tuned
      model serving. Together.ai and other inference API aggregators have published performance benchmarks citing
      Crusoe hardware.

      A signisys.com partnership provides grid connection engineering and high-voltage substation design for
      Crusoe campus builds, particularly relevant for 765 kV Abilene interconnect. Upstream Data (upstreamdata.ca)
      is a cited supplier of oil-field flare-gas power units for stranded-gas compute deployments in North Dakota,
      representing one node of Crusoe's earlier flare-gas-mitigation business heritage, now being phased out in
      favor of large campus scale.
    claimRefs: [CE024, CE025, CE026, CE027, CE028, CE042, CE043, CE044, CE045, CE047, CE048]
    tableRefs: [TE004]
    figureRefs: [FE004]


