          values:
            - {label: "CFIUS / JPMorgan default", tone: negative}
            - {label: "NVIDIA supply disruption; Cooling failure; Physical disaster", tone: negative}
            - {label: "Microsoft anchor contract loss; TCEQ permit block", tone: negative}
        - label: "High Impact"
          values:
            - {label: "Upstream Data recurrence; Cybersecurity breach; Wyoming delay", tone: negative}
            - {label: "ERCOT grid outage; Outage recurrence; GPU supply delay", tone: negative}
