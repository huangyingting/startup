callouts:
  - calloutType: risk
    title: "TCEQ Permit and Gas Turbine Greenwashing: The Foundational ESG Contradiction"
    body: >
      Crusoe's core commercial narrative depends on clean-energy positioning, but TCEQ data confirms
      360 MW of on-site gas turbines and Heatmap News documented plans for 4.5 GW of new gas generation.
      This ESG contradiction is not merely reputational: if TCEQ permits are delayed, Abilene
      commissioning slips; if EPA GHG reporting reveals high per-GPU carbon intensity, ESG investors and
      enterprise customers may demand pricing concessions or exit contracts. This is Crusoe's highest
      profile adverse finding.
    claimRefs: [CR001, CR002, CR006, CR007, CR035]

  - calloutType: risk
    title: Microsoft Anchor Concentration Is the Highest Single-Counterparty Risk
    body: >
      Microsoft's 900 MW commitment represents the largest single counterparty exposure in Crusoe's
      portfolio. If Microsoft reduces or delays this commitment—for any reason—the JPMorgan project
      financing covenants are at risk, the Blue Owl JV cash flows are impaired, and Crusoe's revenue
      guidance is undermined. This is the single most important contract in the Crusoe investment thesis,
      and its terms are not publicly available.
    claimRefs: [CR020, CR022, CR024]

  - calloutType: insight
    title: Upstream Data Lawsuit Resolution Removes a Key Overhang
    body: >
      The November 2025 mutual dismissal and license agreement with Upstream Data represents a clean
      resolution of the only publicly disclosed litigation risk. For investors concerned about IP
      exposure in Crusoe's legacy DFM/flare gas technology, this resolution removes a blocking issue.
      However, the license terms (royalties, field-of-use restrictions) remain undisclosed and should
      be reviewed in formal diligence.
    claimRefs: [CR005, CR006]

  - calloutType: risk
    title: The 45-Hour Outage Is an Unresolved Reliability Red Flag
    body: >
      The March 2025 outage was reported by Forbes but has not been publicly addressed by Crusoe. With
      no post-mortem, no SLA disclosure, and no remediation acknowledgment, investors cannot assess
      whether the root cause has been fixed, whether enterprise SLA thresholds were breached, and
      whether the event triggered customer remediation payments. This operational transparency gap is
      material for a company serving hyperscaler-grade workloads.
    claimRefs: [CR009, CR010]

  - calloutType: recommendation
    title: Prioritize These Five Diligence Paths Before Committing Capital
    body: >
      (1) Request TCEQ permit status and timeline for 360 MW turbines. (2) Obtain Microsoft anchor
      contract terms, duration, and take-or-pay provisions. (3) Get JPMorgan covenant terms and
      milestone trigger definitions. (4) Review Upstream Data license agreement for royalty and
      field-of-use terms. (5) Request the March 2025 outage post-mortem and current SLA contractual
      thresholds for enterprise customers.
    claimRefs: [CR001, CR005, CR006, CR009, CR018, CR020, CR022]

