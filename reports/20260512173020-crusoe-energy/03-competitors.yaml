  evidenceGaps:
    - type: private-evidence-only
      severity: blocking
      topic: CoreWeave's actual ARR, gross margin, and pricing terms
      missingEvidence: >-
        CoreWeave is now a public company (CRWV) but as of report date has limited public quarterly disclosures.
        Its actual ARR, gross margin, and GPU pricing to large enterprise customers are not publicly disclosed
        in sufficient detail to benchmark against Crusoe's economics.
      whyItMatters: >-
        Without CoreWeave's margin profile, it is impossible to determine whether Crusoe's vertical integration
        actually translates to a cost and margin advantage, or whether CoreWeave's scale economy creates an
        offsetting benefit that eliminates the integration premium.
      diligencePath: >-
        Pull CoreWeave's public S-1 and most recent 10-Q/10-K filings post-IPO. Request Crusoe management's
        own competitive benchmarking analysis of CoreWeave economics.
      relatedQuestionRefs: [QP001, QP018]

    - type: private-evidence-only
      severity: material
      topic: Customer NRR and retention comparison across neocloud operators
      missingEvidence: >-
        No public NRR, dollar churn, or customer cohort retention data exists for Crusoe, CoreWeave, or Lambda Labs.
        Without this data, the land-and-expand thesis cannot be validated for any neocloud operator.
      whyItMatters: >-
        NRR is the primary indicator of product-market fit and moat durability in a GPU cloud business.
        High NRR (>120%) would confirm Crusoe's competitive positioning; low NRR would indicate substitution risk.
      diligencePath: >-
        Request customer cohort data and NRR by segment from Crusoe management. Request third-party references
        from top 5 Crusoe enterprise customers (excluding hyperscaler) on renewal and expansion dynamics.
      relatedQuestionRefs: [QP019, QP023]

    - type: enumeration-incomplete
      severity: material
      topic: Full enumeration of large-cluster GPU reservation competitors
      missingEvidence: >-
        The neocloud segment includes additional operators beyond CoreWeave, Lambda, Nebius, and Lancium
        that may compete in Crusoe's specific 1,000+ GPU reservation segment—particularly as new operators
        funded by 2024–2025 venture rounds enter the market.
      whyItMatters: >-
        An incomplete competitor set could understate the commoditization risk in the neocloud market,
        particularly if new well-funded operators enter with aggressive pricing in Crusoe's core segments.
      diligencePath: >-
        Commission or request a current neocloud market map from ComputeForecast or IDC.
        Review Crusoe's internal competitive intelligence on new entrants in the large-cluster segment.
      relatedQuestionRefs: [QP022]

    - type: private-evidence-only
      severity: material
      topic: Lancium GPU product specifications and competitive positioning
      missingEvidence: >-
        Lancium does not publicly disclose its GPU catalog, pricing, or large-cluster reservation capabilities,
        making it impossible to compare its AI compute product with Crusoe Cloud directly.
      whyItMatters: >-
        If Lancium has moved beyond HPC batch compute into GPU reservation products, it would be a direct
        competitor to Crusoe in both the Texas geography and the renewable-energy AI compute segment.
      diligencePath: >-
        Request Lancium product and pricing documentation. Review Lancium's S-1 filing (filed 2024)
        for GPU cloud product disclosures. Contact Lancium directly in diligence.
      relatedQuestionRefs: [QP024]

    - type: private-evidence-only
      severity: minor
      topic: Nebius AI US pricing and customer base
      missingEvidence: >-
        Nebius AI does not publicly disclose its US market GPU pricing or US customer references, limiting
        the ability to assess whether it represents a pricing threat to Crusoe's US enterprise customers.
      whyItMatters: >-
        If Nebius AI prices H100 GPU compute aggressively in the US market at levels comparable to its
        EU pricing (~$2.50/hr), it could undercut Crusoe's enterprise reserved pricing in the US.
      diligencePath: Request Nebius AI US pricing sheet. Review Nebius NBIS SEC filings for US revenue split.
      relatedQuestionRefs: [QP020]

