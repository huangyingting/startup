      CoreWeave ARR and IPO multiple are analyst estimates based on public reporting. Crusoe revenue and growth
      are company-disclosed unaudited metrics. Vertical integration score is an evidence-backed ordinal judgment.
    claimRefs: [CP001, CP002, CP008, CP019, CP020, CP025, CP027, CP028, CP033, CP034]

callouts:
  - calloutType: risk
    title: CoreWeave's 40x revenue scale advantage is the primary displacement risk
    body: >-
      CoreWeave's estimated $5B ARR versus Crusoe's $124M AI cloud revenue (2024) represents a roughly 40x scale
      gap in pure GPU cloud revenue. As a public company with liquid equity, CoreWeave can price aggressively,
      accelerate buildouts, and attract talent with stock compensation—advantages that compound at scale.
    claimRefs: [CP001, CP027, CP028]

  - calloutType: strength
    title: Full vertical integration from power to GPU cloud has no direct neocloud comparable
    body: >-
      No other neocloud operator replicates Crusoe's full stack: power sourcing, campus construction,
      modular factory manufacturing, and GPU cloud from a single operator. This integration enables
      compressed timelines and cost advantages that pure GPU cloud operators cannot match structurally.
    claimRefs: [CP019, CP020, CP021, CP022]

  - calloutType: risk
    title: Hyperscaler GPU capacity acceleration reduces the availability arbitrage moat
    body: >-
      Microsoft's $80B+ AI infrastructure capex in 2025, and similar commitments from AWS and Google, are
      systematically closing the GPU availability gap that drives enterprise customers to neocloud operators.
      As hyperscaler GPU availability improves and pricing comes down, the primary switching trigger for
      enterprise customers erodes.
    claimRefs: [CP029, CP030, CP031]

  - calloutType: insight
    title: CoreWeave IPO creates a public valuation benchmark that constrains Crusoe's cloud-segment multiple
    body: >-
      CoreWeave's March 2025 IPO at approximately 5x revenue establishes a public market reference for pure
      GPU cloud operators. Crusoe's $10B valuation at $124M AI cloud revenue implies a much higher cloud-revenue
      multiple—the excess is attributable to the infrastructure and land-value layers. This makes Crusoe's
      valuation particularly sensitive to whether the infrastructure layer commands a premium over cloud-only comps.
    claimRefs: [CP033, CP034, CP035]

