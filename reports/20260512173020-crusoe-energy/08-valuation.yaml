  - id: TV003
    title: Bull / base / bear scenario table
    columns:
      - Scenario
      - Key assumptions
      - Valuation logic
      - Probability signal
    rows:
      - - Bull
        - 2025 ARR confirms $1B+; 2026 ARR reaches $2B at 100%+ growth; IPO at 10 to 12x forward ARR; Microsoft and two or more hyperscaler tenants; no GPU price floor breach
        - $1B ARR times 12x equals $12B; $2B 2026 ARR times 10x equals $20B; 1.2 to 2.0x return from $10B entry over 3 to 5 year hold
        - Low to medium; requires ARR confirmation and full Abilene commissioning with additional hyperscaler commitments
      - - Base
        - 2025 ARR confirms $750M to $1B; growth decelerates to 50 to 80 percent in 2026; IPO at 8 to 10x ARR in 2027 to 2028; Microsoft anchor intact but no new hyperscaler signed
        - $750M ARR times 8x equals $6B; $1B ARR times 8x equals $8B; modest discount to current $10B; breakeven to modest loss on entry price
        - Medium; most consistent with confirmed 150% ARR growth commentary if 2025 base is $400M to $450M exiting 2024
      - - Bear
        - 2025 ARR confirms at $500M or below; GPU spot prices stay at $2/hr; hyperscaler self-supply accelerates; customer concentration crystallizes; ESG reputational damage
        - $500M ARR times 5x equals $2.5B; $500M ARR times 6x equals $3B; 70 to 75 percent discount from $10B entry mark
        - Low to medium; GPU commoditization and hyperscaler entry are real risks but full bear requires multiple concurrent failures
    notes: >-
      Valuation multiples are EV/ARR scenario illustrations for investment committee discussion; not DCF outputs.
      All ARR figures are unaudited estimates absent public financial disclosure from Crusoe.
