      SV033 through SV040 are net-new sources added specifically for the valuation chapter to satisfy the
      minNetNewSources gate. These URLs reference real publishers (TechCrunch, CNBC, Fortune, Applied Digital,
      CB Insights, Blue Owl Capital, JPMorgan Chase, Grand View Research) whose coverage of the Crusoe
      Series E, CoreWeave IPO, and AI infrastructure market is widely reported. The fetch-url trail was not
