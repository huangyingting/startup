  - id: bull-base-bear
    title: Bull, Base, and Bear Case Scenarios
    body: >-
      The bull case begins with the premise that Crusoe's power-first vertical integration produces a
      structurally higher-quality revenue stream than spot-GPU neoclouds. If Crusoe confirms $1B+ ARR in
      2025 and sustains 100%+ YoY growth into 2026, the company could approach $2B ARR by end of 2026. At
      an 8 to 12x ARR multiple — consistent with high-growth infrastructure software at the upper end — the
      company would be worth $16B to $24B, representing 1.6 to 2.4x upside from the current $10B mark.
      Catalysts include full commissioning of Abilene Phase 1, additional hyperscaler anchor tenants, and
      an IPO filing by late 2026 or 2027 providing public market price discovery.

      The base case accepts the Series E as a reasonable private market mark if 2025 revenue lands between
      $750M and $1B. At a 8 to 10x forward multiple on confirmed $750M ARR, fair value is $6B to $7.5B —
      below the current $10B mark but within a range where strong 2026 execution and an IPO premium could
      close the gap. The base case requires no acceleration from current trajectories, simply confirmation
      of what management has implied through 150% ARR growth commentary. The primary downside risk is
      customer concentration: Microsoft and OpenAI are believed to be the anchor revenue contributors, and
      any reduction in their commitments would materially impair the thesis.

      The bear case assumes GPU spot price commoditization continues, hyperscalers absorb neocloud demand
      organically, and Crusoe's 2025 revenue confirms at the low end of $500M. At 5 to 6x on $500M ARR,
      the implied valuation falls to $2.5B to $3B — a 70 to 75% discount to the October 2025 mark. The
      bear case is not a zero scenario but represents substantial down-round risk. Greenwashing exposure
      adds a tail risk: Heatmap News documented that Crusoe's Abilene campus uses 360 MW of on-site natural
      gas turbines and the company engaged Engine No. 1 to develop 4.5 GW of new gas capacity, creating
      material tension with the clean-energy branding that could reprice ESG-sensitive capital. MarketsAndMarkets
      and IDC data on GPU-as-a-service market growth underpin the bull case demand environment but provide
      no Crusoe-specific forward ARR guidance, so scenario selection remains judgment-dependent.
