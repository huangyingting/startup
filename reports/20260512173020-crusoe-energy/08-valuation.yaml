callouts:
  - calloutType: recommendation
    title: "Current call: track — not buy"
    body: >-
      Crusoe is a serious AI infrastructure company with real capital, real customers, and genuine power-moat
      differentiation. The public evidence does not support buying at $10B+ because the mark outruns confirmed
      ARR and lacks financial disclosure. Upgrade to buy when $1B+ ARR is audited, customer concentration is
      quantified, and the preference stack is transparent.
    claimRefs:
      - CV001
      - CV014
      - CV015
      - CV040
      - CV041
  - calloutType: strength
    title: Power pipeline and vertical integration are genuine structural advantages
    body: >-
      The 45+ GW power pipeline, 3.4 GW commissioned, and end-to-end vertical model from site to cloud
      represent a structural advantage that pure GPU-rental competitors cannot replicate quickly. The Bain
      Capital power-before-AI-was-cool thesis is validated by the Microsoft Abilene anchor and the NVIDIA
      strategic collaboration.
    claimRefs:
      - CV028
      - CV029
      - CV036
      - CV045
  - calloutType: risk
    title: GPU price commoditization and hyperscaler entry are material downside paths
    body: >-
      H100 spot prices fell from approximately $8/hr to $2 to $3/hr and continue declining. Hyperscalers
      are investing heavily in behind-the-meter power strategies. If per-GPU economics compress further and
      hyperscaler self-supply accelerates, the $10B mark embeds 70 to 75% downside to the bear case without
      requiring a demand collapse — only economics deterioration.
    claimRefs:
      - CV021
      - CV022
      - CV035
      - CV040
  - calloutType: assumption
    title: Base case assumes 2025 ARR of $750M to $1B can be confirmed
    body: >-
      The entire valuation framework pivots on whether Crusoe exits 2025 with $750M to $1B of cloud ARR.
      If actual ARR is $500M or below, the base case collapses into the bear scenario and the current $10B
      mark represents a significant overshoot. Confirming revenue scale is the single most important
      diligence action before any upgrade from track to buy.
    claimRefs:
      - CV013
      - CV014
      - CV015
      - CV034
      - CV040

