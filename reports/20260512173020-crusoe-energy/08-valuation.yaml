  evidenceGaps:
    - type: private-evidence-only
      severity: blocking
      topic: 2025 annual revenue and ARR confirmation
      missingEvidence: >-
        Audited or management-confirmed 2025 full-year ARR and revenue disaggregated by business line;
        the current $500M to $1B analyst estimate is unverified by any filed or certified data source.
      whyItMatters: >-
        The entire $10B valuation framework pivots on 2025 ARR; at $500M the implied multiple is
        aggressive at 20x, at $1B it is defensible at 10x. Confirmation is the highest-priority diligence action.
      diligencePath: >-
        Private data room request; audited financial statements; management confirmation letter; S-1 or
        Form 10-K when filed; investor update letter from lead investor.
      relatedQuestionRefs:
        - QV003
      relatedTableRefs: []
    - type: private-evidence-only
      severity: material
      topic: gross margin and EBITDA financial visibility
      missingEvidence: >-
        No public source discloses Crusoe's gross margin, contribution margin, or EBITDA for any period.
        Capital-intensive model with JV and project-finance structures makes underlying profitability opaque.
      whyItMatters: >-
        Infrastructure businesses can generate high revenue with negative or near-zero gross margins;
        without margin data the $10B mark cannot be grounded in earnings-based valuation frameworks.
      diligencePath: >-
        Private financial disclosure request; IPO S-1 filing when submitted; CoreWeave segment-margin
        benchmarking as a framework proxy.
      relatedQuestionRefs:
        - QV022
      relatedTableRefs: []
    - type: missing-source
      severity: minor
      topic: sovereign AI demand and international expansion revenue
      missingEvidence: >-
        No public source quantifies Crusoe's revenue or pipeline from sovereign AI customers in Europe,
        the Middle East, or Asia that might justify premium multiples above private-sector benchmarks.
      whyItMatters: >-
        Sovereign AI demand is cited as a premium-multiple driver for US AI infrastructure operators;
        Crusoe's international sites could support this thesis but evidence is absent from public sources.
      diligencePath: >-
        Customer pipeline review; government tender records; partner announcements; international site
        utilization data from operational reports.
      relatedQuestionRefs:
        - QV032
      relatedTableRefs: []
    - type: missing-source
      severity: minor
      topic: IPO timeline and exit window specifics
      missingEvidence: >-
        No public source specifies an IPO date, S-1 filing timeline, or formal exchange selection; Michael
        Gordon's appointment suggests preparation but no formal filing has been disclosed as of May 2026.
      whyItMatters: >-
        IPO timing determines the exit window and hold period for private investors; a 2027+ listing
        extends exposure to macro, interest rate, and competitive risk for long-duration infrastructure capital.
      diligencePath: >-
        Management guidance session; banker selection announcements; SEC S-1 or F-1 filing when submitted;
        public roadshow registration.
      relatedQuestionRefs:
        - QV033
      relatedTableRefs: []
    - type: enumeration-incomplete
      severity: minor
      topic: Comparable valuation table coverage completeness
      missingEvidence: >-
        The comparable valuation table covers five comparables; direct private analogs such as Lancium,
        Applied Digital, and early-stage power-focused data center operators are excluded because public
        valuation anchors do not exist for these companies.
      whyItMatters: >-
        A more complete comparable set including private transaction multiples for power-integrated data
        center operators would narrow the multiple uncertainty band and support more precise valuation anchoring.
      diligencePath: >-
        PitchBook private transaction data; M&A precedents in the data center sector; Signisys and
        ComputeForecast neocloud survey data; banker-prepared comparable transaction analysis.
      relatedQuestionRefs: []
      relatedTableRefs:
        - TV004
