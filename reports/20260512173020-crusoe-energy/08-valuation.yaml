  - id: TV005
    title: Thesis-break and kill triggers table
    columns:
      - Trigger
      - Threshold or signal
      - Transmission to thesis
      - Action implication
    rows:
      - - ARR confirmation fails to reach target
        - 2025 audited or management-confirmed ARR comes in below $400M
        - Core valuation pillar collapses; bear case becomes base case; $10B mark is unjustifiable at any reasonable multiple
        - Reduce conviction immediately; initiate down-round risk assessment; pause new money deployment
      - - GPU spot price floor sustained breach
        - H100 or H200 spot prices average below $1.50/hr for two consecutive quarters
        - Per-GPU economics compress to point requiring hyperscaler-scale efficiency to break even on neocloud model
        - Reassess revenue per GPU and forward margin trajectory; review long-term contract price protection
      - - Microsoft or primary anchor tenant reduces commitment
        - Microsoft formally reduces or cancels Abilene capacity commitment by 25% or more
        - Directly impairs 2.1 GW buildout rationale; Blue Owl JV or JPMorgan financing conditions may be triggered
        - Immediate conviction review; assess covenant breach risk in project financing structures
      - - Greenwashing formal regulatory or customer sanction imposed
        - TCEQ, EPA formal enforcement, or major ESG-screening institutional customer formally penalizes Crusoe
        - ESG capital repricing; potential loss of European sovereign AI and ESG-screened fund investors
        - Monitor TCEQ air quality permits and EPA GHG reporting; assess customer ESG compliance requirements
      - - Hyperscaler launches competing power-first AI campus at scale
        - AWS, Azure, or GCP announces dedicated behind-the-meter AI campus with 1 GW+ and sub-12-month deployment
        - Power-moat narrative weakens; scarcity premium erodes; multiple compression likely in private and public markets
        - Reassess defensibility of power-pipeline advantage; review customer lock-in mechanisms and contract terms
    notes: >-
      Triggers are illustrative thresholds derived from public evidence; actual investment committee
      protocols may set different numeric thresholds based on portfolio context and mandate.
