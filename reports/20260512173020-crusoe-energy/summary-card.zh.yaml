summary:
  headline: >-
    Crusoe 是目前最有可信度的垂直一体化 AI 工厂公司：能源优先逻辑已经跑通，2.1 GW 园区已锁定，估值超过 $10B，并拿到 NVIDIA 首选伙伴身份；但 GPU 定价商品化、客户高度集中、2025 年 3
    月宕机原因不明，以及 Engine No. 1 天然气 JV 带来的 ESG 矛盾，都可能拖累企业销售。
