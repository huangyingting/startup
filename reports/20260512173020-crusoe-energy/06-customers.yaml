company:
  name: Crusoe
chapter:
  number: 6
  title: Customers
  summary: >
    Crusoe's GPU cloud customer base spans hyperscaler anchor tenants (Microsoft 900 MW, Oracle/Stargate),
    AI product companies (Cursor, Together AI, Fireworks, Luma AI), industrial enterprises (Redwood Materials),
    and research organizations (Sony Research). The strongest customer proof is Redwood Materials' documented
    99.2% uptime over seven months and 7x density expansion from 4 to 24 Spark units. Key gaps remain: no
    public NRR, GRR, customer count, or revenue-per-customer data; a 45-hour outage in March 2025 raised
    reliability concerns; and customer concentration in Microsoft and Oracle represents a material risk.

sections:
  - id: customer-base-overview
    title: Customer Base Overview and Segmentation
    body: >
      Crusoe's customer base divides into three distinct segments: (1) hyperscaler anchor tenants who
      commit multi-hundred-megawatt capacity agreements, (2) AI product companies and startups that
      purchase GPU compute on-demand or through short-term subscriptions for training, fine-tuning, and
      inference workloads, and (3) industrial enterprise and research customers deploying Crusoe Spark
      modular AI factory units for specific high-compute applications.

      The hyperscaler segment, led by Microsoft's 900 MW commitment at Abilene (announced March 2026) and
      Oracle/Stargate as the first-building anchor tenant, likely represents the majority of Crusoe's
      contracted capacity but is not separately broken out in public revenue disclosures. These customers
      value Crusoe's ability to compress power-to-GPU timelines to under 12 months and to operate at
      scale with favorable power purchase agreements. Crusoe's 2024 AI cloud revenue of $124M (460% YoY
      growth) and 2025 ARR growth of 150% signal strong demand, though the denominator, customer count,
      and per-segment breakdown remain undisclosed.

      The AI product company segment—including Cursor, Together AI, Fireworks, Luma AI, Windsurf
      (Codeium), Databricks, Playground AI, and Decart—accesses Crusoe Cloud through its standard compute
      APIs. Crusoe's H100/H200/B200 on-demand pricing ($2.99/hr for H100 as of May 2026) is competitive
      with hyperscaler rates, and the platform's ISO 27001 and ISO 42001 certifications reduce enterprise
      security review friction. The GPU-as-a-service market is projected to grow at significant CAGR
      through 2028 (IDC, MarketsAndMarkets), and Crusoe is positioned as one of the leading neocloud
      providers in this expanding market.

      Industrial and research customers represent a differentiated and high-retention segment. Redwood
      Materials is the best-documented case: the battery recycling company deployed Crusoe Spark units for
      AI-driven quality control and materials science workloads, achieving 99.2% uptime over seven months
      and subsequently expanding from 4 to 24 Spark units—a 7x density increase that is the strongest
      public proof of Crusoe's land-and-expand motion. Sony Research used Crusoe Cloud GPU infrastructure
      to train the Gran Turismo Sophy (GT Sophy) reinforcement learning racing agent, representing a
      high-profile research use case.
    claimRefs: [CU001, CU002, CU003, CU006, CU007, CU009, CU012, CU013, CU014, CU020, CU022, CU024]
    tableRefs: [TU001, TU002]
    figureRefs: [FU002]

  - id: named-customer-proof
    title: Named Customer Deployments and Outcomes
    body: >
      Crusoe has disclosed a meaningful roster of named production customers, though the depth of public
      evidence varies significantly across accounts. The strongest proof point is Redwood Materials, where
      Crusoe published specific uptime data (99.2% over seven months) and the expansion trajectory (4 to
      24 Spark units) in its 2024 Impact Report and a dedicated newsroom announcement. This represents
      production deployment with quantified outcomes and verified expansion—the gold standard of customer
      proof for a capital-intensive infrastructure provider.

      Microsoft's 900 MW commitment at Abilene, Texas (announced March 2026) is the single largest
      disclosed customer commitment and represents a multi-year, anchor-tenant relationship that validates
      Crusoe's ability to serve hyperscaler-grade workloads. The Forbes investigation (April 2025)
      identified Crusoe as a key Stargate infrastructure partner, with Oracle as the first-building anchor
      tenant. These hyperscaler relationships involve long-term capacity agreements distinct from the
      on-demand and subscription access used by AI product companies.

      NVIDIA's strategic collaboration, announced in a dedicated press release, confirms a preferred-access
      arrangement for GB200/B200/H200 GPUs that benefits Crusoe's customers by providing supply certainty
      during periods of GPU scarcity. This partner-level evidence supplements the customer-level proof.

      The AI product company customers (Cursor, Together AI, Fireworks, Luma AI, Windsurf/Codeium, Decart,
      Playground AI, Databricks) are publicly named as customers in Crusoe newsroom materials and third-party
      reporting, but specific deployment metrics, outcome data, and contract values remain undisclosed.
      GitHub activity (crusoecloud organization with open-source tooling) and HuggingFace presence
      (crusoeai models page) provide developer-community signals of active adoption but not production
      proof.

      A significant adverse data point is the 45-hour outage in early March 2025, reported by Forbes. This
      outage is the only publicly documented major reliability incident and raises questions about SLA
      performance and the maturity of Crusoe's incident response processes. No follow-up customer
      complaints were found in public channels, but the absence of public NRR data means the impact on
      customer retention cannot be quantified.
    claimRefs: [CU003, CU004, CU005, CU006, CU007, CU008, CU010, CU016, CU017, CU018, CU025, CU026, CU031]
    tableRefs: [TU003]
    figureRefs: [FU001, FU003]

  - id: retention-and-expansion
    title: Retention Dynamics and Expansion Patterns
    body: >
      Crusoe has not disclosed any standard SaaS retention metrics—NRR, GRR, cohort retention, contract
      renewal rates, or customer count. This is a material evidence gap for a capital-intensive
      infrastructure provider where retention quality drives the economics of the 15B+ Abilene build-out
      and the viability of future campuses.

      Despite the lack of formal retention data, available evidence suggests a bifurcated retention
      profile. Hyperscaler anchor tenants (Microsoft, Oracle) are effectively locked in by long-term
      capacity agreements and significant switching costs—once infrastructure is built to serve a
      hyperscaler's specific requirements, contract termination would be economically destructive for both
      parties. The 900 MW Microsoft commitment represents multi-year contracted revenue with negligible
      near-term churn risk.

      For AI product companies, retention signals are less clear. The cluster of active customers
      (Cursor, Together AI, Fireworks, Luma AI) has not reported churning, but the lack of formal cohort
      data makes it impossible to distinguish retained subscribers from one-time training jobs. Crusoe's
      ISO 27001 and ISO 42001 certifications, Command Center unified operations platform, and NVIDIA GPU
      supply priority create switching costs that should support retention, but these advantages are not
      quantified.

      The Redwood Materials case demonstrates the land-and-expand motion at its best: a pilot at 4 Spark
      units scaled 7x to 24 units over approximately one year, driven by demonstrated uptime (99.2% over
      seven months) and operational value. This expansion rate, if representative of industrial customers
      more broadly, implies strong net revenue retention for the Spark product line. However, a single
      data point is insufficient to extrapolate a retention rate or NRR figure.

      Crusoe's pricing page lists on-demand GPU compute pricing, enabling smaller customers to access
      infrastructure without long-term contracts and reducing friction at the bottom of the funnel—but
      also implying lower switching costs for price-sensitive customers who can shift to Lambda Labs,
      CoreWeave, or other neoclouds if GPU spot pricing drops further.
    claimRefs: [CU004, CU005, CU011, CU015, CU016, CU020, CU021, CU027, CU032]
    tableRefs: [TU004]
    figureRefs: [FU004]

  - id: concentration-and-risks
    title: Customer Concentration and Adverse Findings
    body: >
      Crusoe's customer base carries significant concentration risk. Microsoft (900 MW) and Oracle/Stargate
      are likely the two dominant revenue contributors by capacity, and together they may represent more
      than 50% of contracted capacity at Abilene. This level of hyperscaler concentration is common in
      early-stage infrastructure builders (CoreWeave similarly concentrated in Microsoft/Azure), but it
      means that a single contract renegotiation, cancellation, or technology shift by either anchor could
      materially impair Crusoe's revenue and its ability to service the $9.6B JPMorgan project financing.

      Two adverse findings merit diligence attention. First, the 45-hour outage in March 2025 (reported
      by Forbes) represents a documented reliability failure during a period of commercial ramp. The
      outage duration—nearly two full days—is significantly beyond typical cloud SLA thresholds (99.9%
      monthly uptime allows only ~43 minutes of downtime). If Crusoe's enterprise SLAs commit to
      hyperscaler-grade availability, this event likely triggered remediation obligations. No public
      statement from Crusoe or affected customers addressing the outage was found in the research period.

      Second, Heatmap News (March 2025) documented that Crusoe's clean-energy positioning is in tension
      with its actual energy mix: TCEQ permit data confirms 360 MW of on-site gas turbines at Abilene,
      and Crusoe is developing 4.5 GW of new gas generation capacity. ESG-sensitive enterprise customers
      (particularly those with net-zero commitments) may face procurement friction or reputational risk
      from a Crusoe partnership. While no customer defections attributed to this factor were found, it
      remains a latent risk that could affect enterprise sales cycles, particularly with European
      customers or US companies with aggressive Scope 2/3 emissions commitments.

      The neocloud sector is becoming increasingly competitive, with CoreWeave, Lambda Labs, Nebius, and
      others expanding GPU cloud capacity and compressing H100 spot prices from ~$8/hr in 2023 to
      $2-3/hr in 2025. This pricing pressure disproportionately affects shorter-term, on-demand AI
      product company customers who represent Crusoe's land-and-expand funnel. Without NRR data, it is
      not possible to determine whether Crusoe is retaining these customers through the price compression
      cycle.
    claimRefs: [CU010, CU016, CU019, CU028, CU029, CU030, CU033, CU036]
    tableRefs: [TU005]

