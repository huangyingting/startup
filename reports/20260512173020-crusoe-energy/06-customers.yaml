callouts:
  - calloutType: strength
    title: Redwood Materials Proves Industrial Land-and-Expand at 7x
    body: >
      The Redwood Materials deployment is Crusoe's highest-quality public customer proof: 99.2% uptime over
      seven months and a 4 to 24 Spark unit expansion represent a quantified, independent outcome from a
      Fortune-500-adjacent industrial customer. This level of evidence—specific uptime data, expansion
      trajectory, and a named enterprise reference—is unusually strong for a pre-IPO infrastructure
      company and validates the Spark product line's value proposition for industrial AI deployments.
    claimRefs: [CU004, CU005, CU031]

  - calloutType: strength
    title: Microsoft and Oracle Anchor Tenants De-Risk $15B+ Abilene Build-Out
    body: >
      Microsoft's 900 MW commitment and Oracle/Stargate anchor tenancy provide contracted long-term revenue
      that backstops the $9.6B JPMorgan project financing and $3.4B Blue Owl JV. Hyperscaler anchor
      agreements are structurally sticky (high switching costs, co-designed infrastructure) and dramatically
      reduce the demand risk for Phase 1 of the Abilene campus. This is a qualitatively different risk
      profile than neoclouds relying purely on on-demand spot revenue.
    claimRefs: [CU002, CU003, CU019]

  - calloutType: risk
    title: 45-Hour Outage and No Public NRR Create Material Retention Uncertainty
    body: >
      The March 2025 45-hour outage is the only documented major reliability incident and represents a
      threshold breach for enterprise SLAs. Combined with the total absence of publicly disclosed NRR,
      GRR, or cohort data, Crusoe's retention profile is opaque. For a company building a $15B+
      infrastructure platform, the inability to demonstrate customer retention through the standard
      cloud-native metric framework is a significant due-diligence gap.
    claimRefs: [CU010, CU011, CU015, CU016]

  - calloutType: risk
    title: Hyperscaler Concentration Exceeds 50% of Contracted Capacity
    body: >
      Microsoft and Oracle likely represent more than 50% of Crusoe's contracted Abilene capacity. A
      contract renegotiation, delay, or cancellation by either anchor could trigger covenant defaults in
      the JPMorgan project financing. This level of concentration is not unusual for an infrastructure
      builder in ramp mode, but it is a key diligence watchpoint for investors evaluating the $10B+
      valuation.
    claimRefs: [CU002, CU003, CU019, CU026]

  - calloutType: insight
    title: GPU Price Compression Tests On-Demand Customer Retention
    body: >
      H100 spot prices fell from ~$8/hr in 2023 to $2-3/hr in 2025, compressing margins for neocloud
      providers and reducing customer switching costs for price-sensitive AI startup buyers. Crusoe's
      NVIDIA preferred-access arrangement and ISO certifications create differentiation, but the on-demand
      segment is the most vulnerable to churn if Crusoe does not maintain competitive pricing or
      demonstrate unique performance advantages.
    claimRefs: [CU012, CU020, CU025, CU036]

