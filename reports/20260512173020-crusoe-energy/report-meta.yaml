companyProfile:
  summary: >-
    Crusoe is a Denver-based AI infrastructure company that has pivoted from Bitcoin mining to become
    a full-stack "AI factory" provider — combining on-site power generation (360 MW natural gas turbines,
    renewable PPAs), proprietary direct-to-chip liquid cooling (PUE 1.2-1.3), modular AI factory
    infrastructure (Spark Factory), and a GPU cloud platform (Crusoe Cloud). The company holds a
    2.1 GW committed campus at Abilene, Texas anchored by Microsoft (900 MW), Oracle/Stargate, and
    OpenAI, plus a 1.8 GW Wyoming campus in planning. Crusoe's Series E ($1.375B, October 2025) at a
    $10B+ valuation confirmed unicorn status and established it as the leading vertically integrated
    neocloud operator. 2024 revenue was $276M; the BTC mining segment was divested to NYDIG in March
    2025, making Crusoe a pure-play AI infrastructure company. NVIDIA is both a preferred GPU supply
    partner and an equity investor.
  foundedDate: "2018-01-01"
  founders:
    - name: Chase Lochmiller
      role: CEO and Co-Founder
      background: >-
        Former quantitative trader and Bitcoin miner; coined the energy-first AI factory thesis;
        primary investor and government relationship holder.
      claimRefs: [CO001]
    - name: Cully Cavness
      role: President, CSO, and Co-Founder
      background: >-
        Oilfield operations and land acquisition expertise; responsible for energy sourcing,
        site selection, and Crusoe's power-procurement competitive advantage.
      claimRefs: [CO001]
  foundingLocation: "Denver, CO"
  headquarters: "Denver, CO"
  productSummary: >-
    Crusoe offers three integrated product lines: (1) Crusoe Cloud — GPU-as-a-service with NVIDIA
    H100, A100, and upcoming B200/GB200 instances at $4.29/hr H100 SXM; (2) AI Factory Campus —
    purpose-built large-scale data centers with on-site power generation and liquid cooling, currently
    anchored by a 2.1 GW Abilene TX campus; (3) Crusoe Spark — modular AI factory units manufactured
    at the Brighton CO Spark Factory (350K sq ft, targeting Q3 2026 production), enabling rapid
    deployment at distributed sites. Edge Zones and Command Center SaaS extend the platform.
  customerFocus: >-
    Enterprise AI labs and hyperscalers requiring large-scale reserved GPU capacity; frontier model
    training and inference workloads; corporations with ESG-compatible AI infrastructure requirements.
  businessModel: >-
    GPU cloud revenue from reserved and on-demand compute contracts; long-term campus lease agreements
    with anchor tenants (Microsoft, Oracle/Stargate, OpenAI); modular AI factory product sales
    (Spark units); and formerly BTC mining revenue (divested to NYDIG, March 2025).
  stage: "Series E"
  fundingStatus: >-
    Series E ($1.375B, October 24, 2025, $10B+ post-money valuation) co-led by Valor Equity Partners
    and Mubadala Capital; 71 investors total (SEC Form D). Series D ($600M, December 2024, $2.8B
    valuation) led by Founders Fund with NVIDIA, Fidelity, Mubadala, Ribbit Capital, and Valor.
    Total disclosed capital raised: approximately $2.2B+. Additional project financing: $3.4B Blue
    Owl Capital JV (campus construction) and $9.6B JPMorgan project finance facility.
  disclosureProfile: private-undisclosed
  claimRefs: [CO001, CO007, CI001, CI002, CI010, CE001, CO008]

summary:
  headline: >-
    Crusoe is the most credibly positioned vertically integrated AI factory company with a proven
    energy-first thesis, 2.1 GW committed campus, $10B+ valuation, and NVIDIA preferred-partner
    status — but faces GPU pricing commoditization, acute customer concentration, an unexplained
    March 2025 outage, and an ESG contradiction from the Engine No. 1 natural gas JV that could
    impair enterprise sales.
  overallScore: 7.1
  recommendation: track
