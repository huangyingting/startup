  - id: FM004
    title: Enterprise AI Compute Adoption Journey
    type: flow
    layout: wide
    summary: >-
      Enterprise GPU compute adoption follows a consistent path from exploration to committed infrastructure;
      Crusoe's current customer base is concentrated at the reservation and hyperscaler-commitment stages.
    data:
      nodes:
        - id: n1
          label: Capability exploration
          detail: Teams run small-scale experiments on hyperscaler spot or trial accounts; no long-term commitment
          tone: neutral
        - id: n2
          label: First GPU reservation
          detail: Reserved 100–500 GPU cluster for 3–12 months; SLA and uptime start mattering
          tone: positive
        - id: n3
          label: Production inference deployment
          detail: Sustained workload requiring dedicated cluster; latency SLAs and reliability become buying criteria
          tone: positive
        - id: n4
          label: Training / fine-tuning scale-up
          detail: Multi-thousand GPU reservations for foundation model training or large fine-tuning; power-density requirements emerge
          tone: positive
        - id: n5
          label: Hyperscaler capacity commitment
          detail: GW-scale power commitment; multi-year contract; Crusoe's current top revenue tier (Microsoft 900 MW)
          tone: positive
        - id: n6
          label: Dedicated AI factory ownership
          detail: Enterprise purchases Crusoe Spark units or enters BOT arrangement; capex ownership; Q3 2026 first deliveries
          tone: positive
      edges:
        - from: n1
          to: n2
          label: GPU availability scarcity or cost trigger vs hyperscaler
        - from: n2
          to: n3
          label: Workload moves to production; SLA requirements emerge
        - from: n3
          to: n4
          label: Model improvement requires training at scale
        - from: n4
          to: n5
          label: Scale exceeds hyperscaler economics; power constraint drives vertically integrated partner
        - from: n5
          to: n6
          label: Ownership preference; cost amortization over 10+ year horizon
    approximationNotes: null
    claimRefs: [CM020, CM021, CM022, CM023, CM024]

callouts:
  - calloutType: strength
    title: Power-first strategy converts grid scarcity into a multi-year structural moat
    body: >-
      With 45+ GW in its power pipeline and 3.4 GW already commissioned, Crusoe has secured the single most
      constrained resource in AI infrastructure well ahead of market normalization. New entrants face 3–5 year
      grid interconnect queues in traditional US markets—a barrier that takes years and significant capital to replicate.
    claimRefs: [CM025, CM026, CM027]

  - calloutType: risk
    title: GPU spot price compression materially impairs neocloud unit economics
    body: >-
      H100 spot prices fell from ~$8/GPU-hr to ~$2–3/GPU-hr—a 60–75% decline. Any component of Crusoe's cloud
      revenue exposed to spot pricing faces sustained margin pressure. Crusoe's posted H100 SXM rate of $4.29/GPU-hr
      is a premium to current spot, making reserved-contract fill critical to maintain revenue-per-unit targets.
    claimRefs: [CM028, CM029, CM030]

  - calloutType: insight
    title: Inference scaling creates sustained GPU demand beyond episodic training runs
    body: >-
      Test-time compute and chain-of-thought inference architectures drive continuous GPU utilization rather than
      episodic training spikes. This directly benefits Crusoe's reserved-capacity model by improving utilization
      economics and reducing idle capacity between training runs—a structural tailwind for the neocloud segment.
    claimRefs: [CM031, CM032, CM033]

  - calloutType: assumption
    title: SAM and SOM estimates are analyst constructs requiring diligence validation
    body: >-
      Crusoe has not disclosed a formal SAM/SOM framework. The $3–7B SAM and $1.0–1.7B SOM estimates are derived
      from Crusoe's capacity disclosures and GPU pricing benchmarks. These must be validated against Crusoe's
      internal revenue models and customer backlog during diligence.
    claimRefs: [CM012, CM013, CM014, CM015]

