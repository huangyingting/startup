  evidenceGaps:
    - type: private-evidence-only
      severity: blocking
      topic: Gross margin and unit economics on GPU cloud revenue
      missingEvidence: >-
        Crusoe has not publicly disclosed gross margin, contribution margin, or cost-per-GPU-hr for Crusoe Cloud.
        Without margin data, the SOM revenue trajectory cannot be converted to EBITDA or free cash flow for underwriting.
      whyItMatters: >-
        GPU cloud economics are sensitive to energy cost, GPU depreciation, and utilization rates.
        Gross margin structure determines whether the 150% ARR growth translates to improving or deteriorating profitability.
      diligencePath: >-
        Request audited or management-prepared financial statements including segment gross margin breakdown.
        Compare energy cost/GPU-hr to PUE-adjusted benchmark and depreciation schedule for GB200 refresh cycles.
      relatedQuestionRefs: [QM015]

    - type: private-evidence-only
      severity: material
      topic: Revenue mix between spot and reserved contracts
      missingEvidence: >-
        No public disclosure of what percentage of Crusoe's AI cloud revenue comes from spot vs reserved vs committed
        contracts. This determines actual exposure to H100 spot price compression from $8 → $2–3/hr.
      whyItMatters: >-
        If a material portion of revenue is spot-market dependent, the 60–75% H100 spot price decline
        represents permanent revenue per unit impairment that volume growth must continuously offset.
      diligencePath: >-
        Request contract-by-contract revenue breakdown by type; review top-10 customer MSAs for pricing floors,
        guaranteed minimum revenue, and escalation clauses.
      relatedQuestionRefs: [QM016]

    - type: private-evidence-only
      severity: material
      topic: Net revenue retention and customer cohort churn
      missingEvidence: >-
        Crusoe has not disclosed NRR, dollar-based gross/net churn, or customer cohort retention data.
        The 17x TCV growth implies expansion but does not confirm retention of existing revenue run-rate.
      whyItMatters: >-
        In a capital-intensive GPU cloud business with high reservation contract ACV, high NRR (>120%) validates
        the land-and-expand thesis; low NRR would undermine the SOM revenue trajectory assumptions.
      diligencePath: >-
        Request customer cohort retention data and NRR by segment (hyperscaler vs enterprise vs SMB);
        verify average contract duration and renewal rate.
      relatedQuestionRefs: [QM013, QM014]

    - type: private-evidence-only
      severity: material
      topic: Crusoe Spark modular factory revenue model and pipeline
      missingEvidence: >-
        No public disclosure of the Crusoe Spark pricing model (capex sale, BOT, lease), contract pipeline,
        or revenue contribution from the modular factory product for 2026 and beyond.
      whyItMatters: >-
        If Spark achieves meaningful revenue contribution, it represents a new market segment (enterprise capex)
        that meaningfully expands Crusoe's SAM beyond neocloud rental. Without visibility, this cannot be underwritten.
      diligencePath: >-
        Request Spark product pipeline, pricing model, signed LOIs or contracts, and manufacturing capacity ramp plan
        for the Brighton CO Spark Factory.
      relatedQuestionRefs: [QM021]

    - type: stale
      severity: minor
      topic: Independent validation of Crusoe's 45 GW power pipeline
      missingEvidence: >-
        The 45+ GW power pipeline is company-claimed and has not been independently verified through utility
        interconnection filings or third-party due diligence as of the report date.
      whyItMatters: >-
        Power pipeline is the primary competitive moat claim; if pipeline is speculative or non-binding,
        the structural supply advantage thesis weakens materially and affects valuation.
      diligencePath: >-
        Request copies of signed interconnection agreements, LOIs with utilities, and staged timeline for power
        delivery at Abilene, Wyoming, and pipeline sites.
      relatedQuestionRefs: [QM007, QM011]

