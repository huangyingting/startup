companyProfile:
  summary: >-
    Preply is a Ukrainian-founded, US-headquartered language-learning marketplace that connects learners with live
    tutors and increasingly layers AI workflow tools around lesson delivery, tutor matching, homework, and progress
    tracking. The company appears to have reached meaningful scale in both consumer and enterprise language training,
    and its January 2026 Series D plus EBITDA-positive claim separate it from much of the struggling edtech cohort. The
    main underwriting problem is not whether the business is real; it is that public evidence still leaves too much
    uncertainty around revenue base, mix, margins, retention, and financing terms to make the unicorn valuation look
    comfortably supported.
  foundedDate: '2012-01-01'
  founders:
    - name: Kirill Bigai
      role: Co-founder, CEO
      background: >-
        Public-facing co-founder and chief executive who led the marketplace's shift from local tutoring discovery
        toward global online language learning.
      claimRefs: []
    - name: Dmytro Voloshyn
      role: Co-founder, CTO
      background: Technology co-founder associated with the platform, classroom, and AI product stack.
      claimRefs: []
    - name: Serge Lukianov
      role: Co-founder
      background: >-
        Founding team member still cited in company and third-party history, though current operating scope is less
        publicly disclosed.
      claimRefs: []
  foundingLocation: Kyiv, Ukraine
  headquarters: Brookline, Massachusetts, USA
  productSummary: >-
    Preply delivers live one-on-one language tutoring, enterprise language training, tutor discovery, scheduling,
    payments, messaging, and AI-supported lesson workflow tools in a single marketplace platform.
  customerFocus: Consumers learning languages plus enterprise L&D buyers that need workforce language training and reporting.
  businessModel: Tutor marketplace commissions, recurring prepaid lesson packages, and enterprise language-training contracts.
  stage: Series D private / late-stage edtech unicorn
  fundingStatus: >-
    January 2026 Series D of $150M at a $1.2B valuation, with roughly $299M disclosed cumulative funding including a
    2023 debt facility.
  disclosureProfile: private-undisclosed
  claimRefs: []
chapters:
  - number: 1
    title: Company Overview
    sections:
      - number: '1.1'
        title: Identity and Business Model
        blocks:
          - type: paragraph
            body: |
              Preply is a global online marketplace for live language learning, positioned as the world's
              largest platform for one-on-one tutor-led instruction. The company's platform connects
              learners with independent tutors for scheduled video lessons, supported by an AI-powered
              co-pilot suite that generates lesson summaries, creates personalized homework, and matches
              learners to optimal tutors via machine-learning algorithms. Preply defines its strategic
              positioning as "human-led, AI-enhanced"—a deliberate counterpoint to gamified or fully
              automated competitors such as Duolingo. The 2025 Efficiency Study, conducted with the
              nonprofit research organization LeanLab Education, reported that 96% of learners consider
              real human tutors essential to their progress and 97% stated real conversations were key to
              building confidence. The business model is commission-based: Preply retains 33% of tutor
              earnings for early sessions, declining to 18% once a tutor has accumulated 400 hours on
              the platform; the first trial lesson fee with each new student is retained in full by Preply.
              Preply's B2B segment, Preply Business, serves 2,000+ companies globally including Unilever
              and Datadog, offering managed language-training programs with progress dashboards. The
              company is incorporated in the United States (Massachusetts), though its operational origins
              and a significant R&D presence remain in Kyiv, Ukraine. Press materials describe the company
              as "founded in the United States in 2012," while independent sources including Wikipedia and
              The Recursive describe it as originally founded in Kyiv. The discrepancy likely reflects US
              incorporation timing rather than operational origin.
            claimRefs:
              - C001
              - C003
              - C004
