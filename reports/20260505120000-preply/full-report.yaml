  - id: F702
    title: Risk Transmission Map — How Risks Flow to Revenue, Margin, and Valuation
    type: dag
    layout: wide
    summary: |
      Directed acyclic graph tracing how primary risk events propagate through Preply's
      operating model into revenue, margin, and valuation. OpenAI API disruption and EU AI
      Act enforcement are the highest-impact source nodes. Tutor misclassification is the
      highest-velocity transmission pathway due to retroactive liability and model redesign
      requirements.
    data:
      nodes:
        - id: openai-disruption
          label: OpenAI API Disruption
        - id: euaiact-enforcement
          label: EU AI Act Enforcement Action
        - id: tutor-misclassify
          label: Tutor Misclassification Ruling
        - id: kyiv-disruption
          label: Kyiv Engineering Disruption
        - id: ai-product-degraded
          label: AI Product Suite Degraded
        - id: eu-market-loss
          label: EU Market Access Loss
        - id: opex-surge
          label: Operating Cost Surge
        - id: product-delay
          label: Product Roadmap Slippage
        - id: revenue-loss
          label: B2C / B2B Revenue Loss
        - id: margin-compression
          label: Margin Compression
        - id: valuation-compression
          label: Valuation Compression
      edges:
        - from: openai-disruption
          to: ai-product-degraded
        - from: euaiact-enforcement
          to: eu-market-loss
        - from: tutor-misclassify
          to: opex-surge
        - from: kyiv-disruption
          to: product-delay
        - from: ai-product-degraded
          to: revenue-loss
        - from: eu-market-loss
          to: revenue-loss
        - from: opex-surge
          to: margin-compression
        - from: product-delay
          to: revenue-loss
        - from: revenue-loss
          to: valuation-compression
        - from: margin-compression
          to: valuation-compression
    approximationNotes: |
      Transmission paths are directional inferences based on business model analysis. Feedback
      loops (e.g., valuation compression → capital constraint → further disruption) are not shown
      to maintain DAG topology.
