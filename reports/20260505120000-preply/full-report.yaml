            title: Key-Person Dependency — Kirill Bigai
            body: >
              Bigai is the sole public spokesperson, primary board representative, and strategic decision-maker. His
              departure would carry significant reputational and strategic risk. Dmytro Voloshyn represents a secondary
              dependency in the engineering and AI domain. Board composition beyond these two founders and one VC
              representative is undisclosed.
            calloutType: risk
