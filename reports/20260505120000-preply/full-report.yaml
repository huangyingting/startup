      - C279
  - id: F801
    title: Valuation Methodology Selection DAG
    type: dag
    layout: standard
    summary: |
      Directed acyclic graph showing how Preply's business model characteristics (marketplace
      vs SaaS, disclosed vs undisclosed revenue, EBITDA-positive status, stage) drive the
      selection of appropriate valuation frameworks and the implied supportable valuation range
      under each method. The DAG illustrates why a simple revenue multiple cannot be applied
      without private revenue data and why the EBITDA method is also blocked by non-disclosure.
    data:
      nodes:
        - id: biz_model
          label: 'Business model: two-sided marketplace with 18–33% commission'
        - id: revenue_opacity
          label: 'Revenue opacity: no post-2021 ARR disclosed'
        - id: ebitda_positive
          label: EBITDA positive (company-stated, unaudited)
        - id: stage
          label: 'Stage: Series D, pre-IPO, $1.2B'
        - id: ev_rev_method
          label: 'EV/Revenue method: implied 8–15x (unverifiable)'
        - id: ev_ebitda_method
          label: 'EV/EBITDA method: blocked — no EBITDA margin disclosed'
        - id: gmv_method
          label: 'GMV multiple method: 50% GMV growth known; absolute GMV undisclosed'
        - id: vc_growth_method
          label: 'VC growth multiple: 8–15x ARR — matches only if ARR >= $80M'
        - id: valuation_conclusion
          label: 'Conclusion: no single method is verifiable; range 8–15x is the best-effort bound'
      edges:
        - from: biz_model
          to: ev_rev_method
        - from: biz_model
          to: gmv_method
        - from: revenue_opacity
          to: ev_rev_method
        - from: revenue_opacity
          to: ev_ebitda_method
        - from: revenue_opacity
          to: gmv_method
        - from: ebitda_positive
          to: ev_ebitda_method
        - from: stage
          to: vc_growth_method
        - from: ev_rev_method
          to: valuation_conclusion
        - from: ev_ebitda_method
          to: valuation_conclusion
        - from: gmv_method
          to: valuation_conclusion
        - from: vc_growth_method
          to: valuation_conclusion
    approximationNotes: >-
      Method applicability is based on publicly available data only. Any of these methods could be applied definitively
      with private data room access.
    claimRefs:
      - C299
      - C300
      - C301
      - C302
      - C314
  - id: F802
    title: Valuation Sensitivity to Revenue Estimate
    type: bar
    layout: standard
    summary: |
      Illustrates how Preply's implied EV/Revenue multiple varies across five revenue
      estimate scenarios, all at the fixed $1.2B Series D post-money valuation. The range
      from 8x (optimistic $150M) to 20x (pessimistic $60M) shows the high sensitivity
      to the unverified revenue figure and illustrates why the valuation is structurally
      stretched relative to public comp benchmarks.
    data:
      items:
        - label: Rev $60M (low-low est.)
          value: 20
          note: Well above any comparable
        - label: Rev $80M (low analyst est.)
          value: 15
          note: Sacra analyst lower bound
        - label: Rev $100M (mid analyst est.)
          value: 12
          note: Mid-range extrapolation
        - label: Rev $120M (mid-high est.)
          value: 10
          note: Implied by 2.5x from $50M 2021 base × 2 years
        - label: Rev $150M (high analyst est.)
          value: 8
          note: Sacra analyst upper bound
        - label: Duolingo public multiple (benchmark)
          value: 3.7
          note: Multiples.vc May 2026
        - label: EdTech sector median EV/Rev (benchmark)
          value: 1.6
          note: Finerva Q4 2024
    approximationNotes: |
      Revenue estimates are analyst extrapolations based on 2021 Sacra base ($50M) with
      compound growth rates of 20–40%. No official Preply post-2021 revenue figure has been
      disclosed. All multiples shown at $1.2B fixed valuation denominator.
    claimRefs:
      - C299
      - C307
      - C311
      - C312
      - C318
  - id: F803
    title: Exit Multiple Sensitivity — Range at Fixed Revenue Estimate
    type: range
    layout: wide
    summary: |
      Illustrates how exit enterprise value varies at a fixed mid-case revenue estimate of $120M
      when different EV/Revenue multiples are applied at exit. The range shows the sensitivity
      of returns to the choice of exit multiple, independent of growth scenario assumptions.
      At the current entry of $1.2B, only multiples above 10x produce a positive return —
      well above all current public edtech comp medians.
    data:
      items:
        - label: Exit at 2x revenue ($120M base)
          low: 180
          mid: 240
          high: 300
          unit: USD M
        - label: Exit at 4x revenue ($120M base)
          low: 360
          mid: 480
          high: 600
          unit: USD M
        - label: Exit at 6x revenue ($120M base)
          low: 540
          mid: 720
          high: 900
          unit: USD M
        - label: Exit at 8x revenue ($120M base)
          low: 720
          mid: 960
          high: 1200
          unit: USD M
        - label: Exit at 10x revenue ($120M base)
          low: 900
          mid: 1200
          high: 1500
          unit: USD M
        - label: Exit at 12x revenue ($120M base)
          low: 1080
          mid: 1440
          high: 1800
          unit: USD M
    approximationNotes: |
      Revenue base of $120M is a mid-range analyst extrapolation; no official figure confirmed.
      Low/mid/high values reflect ±25% uncertainty around the revenue estimate at each multiple.
      Entry price $1.2B shown as implicit reference: only multiples >= 10x produce EV >= entry at $120M revenue.
      These are pure multiple sensitivity values, not probabilistic scenario forecasts.
    claimRefs:
      - C300
      - C301
      - C317
      - C318
  - id: F804
    title: Investment Committee KPI Scorecard
    type: kpi
    layout: standard
    summary: |
      IC-ready ordinal scoring (0–10) across eight investment dimensions. Market and product
      scores are high; financial transparency and valuation scores are low, pulling the
      composite toward track rather than buy. Scoring reflects publicly available evidence
      only; private data room access could raise financial transparency, NRR, and exit
      clarity scores materially.
    data:
      items:
        - label: Market opportunity
          score: 8
          note: 1.8B learners, $2.8–12B live tutoring SAM, 18%+ CAGR tailwinds
        - label: Product and competitive moat
          score: 7
          note: >-
            Human-led AI model, 100K+ tutors, proprietary classroom, 90+ languages; AI disruption risk holds back
            perfect score
        - label: Team and execution
          score: 7
          note: Experienced founders, strong C-suite (ex-Airbnb, Delivery Hero, Flowspace); Kyiv concentration risk
        - label: Growth proof
          score: 6
          note: 50% GMV growth, 10x 5-yr revenue claimed; EBITDA positive — all unaudited/company-stated
        - label: Unit economics and margins
          score: 4
          note: EBITDA positive is confirmed by multiple independent sources; gross margin and NRR not disclosed
        - label: Financial transparency
          score: 2
          note: No post-2021 ARR or revenue disclosed; no gross margin, NRR, or CAC data
        - label: Valuation attractiveness
          score: 2
          note: 8–15x implied revenue multiple on unverified base; stretched vs all public comps
        - label: Exit clarity
          score: 3
          note: No IPO filing, no M&A signal; Goldman Sachs relationship is positive but non-binding
    approximationNotes: >-
      Scores use 0–10 ordinal scale. No source-backed numeric inputs exist for unit economics or financial transparency
      dimensions; scores reflect evidence gap rather than negative evidence.
    claimRefs:
      - C293
      - C294
      - C299
      - C302
      - C305
      - C323
      - C325
      - C331
