  - number: 4
    title: Financials
    sections:
      - number: '4.1'
        title: Revenue Model and Pricing
        blocks:
          - type: paragraph
            body: |
              Preply generates revenue by retaining a commission on every lesson booked through its marketplace.
              The commission on the first (trial) lesson with each new student is 100%—the tutor receives nothing
              from this session. For all subsequent lessons, a sliding-scale commission applies based on the tutor's
              cumulative hours taught on the platform: 33% for new tutors (0–199 hours), declining to 27% at
              200–399 hours, 22% at 400–799 hours, and 18% beyond 800 hours. Sacra estimates that approximately
              95% of Preply's revenue derives from language course commissions, with the remaining ~5% from
              non-language tutoring and nascent product lines such as premium tutor visibility placements and
              enterprise seat fees.

              On the student side, Preply shifted to a subscription-billing model billed in 28-day cycles. Students
              choose between one and five lessons per week with a specific tutor, and the total cost depends on that
              tutor's self-set hourly rate. The average B2C session price for major languages (English, Spanish,
              French) is approximately $15–$25 per hour, with a broader platform range of $3–$90 depending on tutor
              experience, language scarcity, and subject specialization. For B2B corporate clients, Preply Business
              offers custom per-seat subscriptions priced to contract scope; no public rack rate exists. The
              subscription model gives Preply visibility into forward lessons and stabilizes tutor income relative
              to the older pay-per-lesson pack structure, reducing the risk of students purchasing bundles and then
              disappearing without taking sessions.

              The 100% trial commission functions as a funded customer-acquisition mechanism: Preply absorbs the
              tutor's opportunity cost in exchange for reducing student purchase friction. A student who has a
              positive trial experience is incentivized to commit to a subscription, at which point Preply begins
              earning its ongoing commission spread.
            claimRefs:
              - C131
              - C132
              - C133
              - C134
              - C135
              - C136
              - C137
              - C138
              - C158
      - number: '4.2'
        title: GTM Motion and Sales Economics
        blocks:
          - type: paragraph
            body: |
              Preply's go-to-market operates across two distinct channels with materially different economics.
              The direct-to-consumer (D2C) channel relies on digital performance marketing, SEO, and viral
              word-of-mouth, using the trial-lesson model as a conversion lever. Because Preply absorbs 100% of
              the trial lesson cost on the supplier side, the platform's effective student-acquisition subsidy is
              bounded by the trial lesson value—typically $15–$25 per session—while subsequent lessons generate
              a commission stream as long as the student remains active.

              The B2B enterprise channel operates via an outbound enterprise sales motion. By July 2023, Preply
              had signed approximately 200 new corporate contracts in the prior 12-month period, with clients
              including Datadog, GroupM, and Bain. The enterprise segment grew at 230% in 2021–2022, materially
              outpacing D2C consumer growth. B2B deals are structured as custom per-seat lesson subscriptions
              with volume discounts; the enterprise model yields more predictable and recurring revenue than
              consumer purchases, with lower churn risk because corporate commitments are multi-seat and often
              renewed by HR or L&D budget owners rather than individual consumer discretion.

              Specific CAC or LTV figures are not publicly disclosed for either segment. However, the
              subscription-based billing model and EBITDA-positive status by late 2025 imply improving sales
              efficiency. Preply hired a Chief Revenue Officer (Jerry Kingkade, former CRO at Flowspace) in
              October 2023, signaling investment in the enterprise sales motion. Sacra notes that enterprise
              revenue typically carries higher margins and stronger retention than consumer marketplace revenue,
              suggesting that B2B expansion is the primary margin-improvement lever.
            claimRefs:
              - C139
              - C140
              - C141
              - C142
              - C153
              - C158
              - C167
      - number: '4.3'
        title: Cost Structure and Margin Dynamics
        blocks:
          - type: paragraph
            body: |
              Preply's cost structure is characteristic of a high-touch gig marketplace: the largest variable
              costs—tutor payouts, payment processing, and customer support—scale directly with gross merchandise
              value. On a net revenue basis (after tutor payouts), Preply's take rate ranges from 18–33% of the
              gross transaction value, with the effective blended rate for established tutors closer to 15.5–22%
              based on real tutor earnings data. After deducting payment-processing fees (typically 3–5% of
              transaction value for international card transactions via providers such as Stripe), the effective
              net revenue margin narrows further before fixed costs.

              Fixed cost categories include: (1) engineering and product (R&D centered in Kyiv, Ukraine,
              providing geographic labor-cost arbitrage but also war-related concentration risk); (2) sales and
              marketing, which is likely the largest operating expense given the marketplace's need for continuous
              student and tutor acquisition; (3) cloud/infrastructure; and (4) customer success for both learner
              and tutor segments. As of December 2023, the IFC press release noted that Preply had grown to 600+
              employees across 62 nationalities, with offices in Barcelona, New York, and Kyiv.

              The structural challenge for a marketplace at Preply's commission rates is that the supplier (tutor)
              community bears the highest cost at the lowest tenure, meaning new tutors—who are also highest risk
              for quality variance—cross-subsidize platform marketing. Experienced tutors paying only 18% are the
              platform's best supply-side assets, but they also generate the lowest per-lesson revenue contribution.
              The EBITDA-positive milestone announced ahead of the January 2026 Series D confirms that revenue
              growth outpaced fixed and variable cost growth, though the precise gross-margin profile remains
              private. Analyst benchmarks for comparable two-sided edtech marketplaces suggest gross margins in
              the 65–80% range (net of payment processing but before personnel costs), with EBITDA margins
              turning positive typically at revenue scale of $50M+.
            claimRefs:
              - C149
              - C150
              - C151
              - C152
              - C156
              - C157
              - C163
      - number: '4.4'
        title: Public Traction and Metric Gaps
        blocks:
          - type: paragraph
            body: |
              The most recent publicly verified revenue figure for Preply is $50M in 2021, representing 39%
              year-over-year growth (Sacra estimate). Sacra also reported approximately 51% revenue growth in
              2022, implying approximately $75M in FY2022. In the context of its July 2023 Series C extension,
              CEO Kirill Bigai disclosed that "sales grew tenfold in the last three years," a company-claimed
              figure that, if taken from a 2020 baseline, would suggest aggregate growth to an estimated
              $80–130M range by 2022–2023 (depending on the baseline year chosen). Analysts, including Sacra,
              estimate 2023–2025 revenue in the $80–150M range based on sustained double-digit CAGR extrapolation,
              though no official figures have been published.

              On platform scale: Preply had 800,000 learners as of 2022, and the tutor supply had grown to 100,000+
              active tutors by January 2026 per the Series D press release—more than triple the count at the
              Series C. Preply has not publicly disclosed net revenue retention (NRR), monthly GMV, gross margin,
              monthly active users, or churn rates. Based on published revenue estimates and an estimated blended
              take rate of 18–33%, the implied GMV range is approximately $250–450M for 2022–2024. This is a
              significant transparency gap for a company reaching unicorn status, and any underwriting model
              requires private access to management accounts.

              Preply's 2025 Efficiency Study (conducted with LeanLab Education) showed learners progressing up
              to 3x faster than benchmarks, with one in three advancing a full CEFR level in 12 weeks—a
              qualitative proxy for engagement depth but not a substitute for cohort retention data.
            claimRefs:
              - C154
              - C155
              - C159
              - C160
              - C163
              - C166
              - C168
      - number: '4.5'
        title: Capital Adequacy and Financing
        blocks:
          - type: paragraph
            body: |
              Preply's funding history is consolidated in the company-overview chapter; this section addresses
              the financial structure and runway implications relevant to underwriting. The July 2023 Series C
              extension totalled $70M, comprising $42M in equity led by Horizon Capital and $28M in debt. At
              the time of the raise, CEO Kirill Bigai stated the company had "plenty of runway and the majority
              of the previous raise in the bank," signalling that the extension was opportunistic rather than
              necessity-driven. The interest rate and maturity of the $28M debt facility have not been publicly
              disclosed, representing a gap in the capital-structure picture.

              The European Bank for Reconstruction and Development (EBRD) invested $4.6M in equity via the
              HCGF IV Co-Investment I SPV (project EBRD-54896, approved October 2023), channelled through
              Horizon Capital's fund specifically to support Preply's Ukrainian R&D operations. IFC participated
              co-investing $10M alongside EBRD in that same July 2023 round. In January 2026, EBRD announced
              a further $20M equity co-investment alongside the $150M Series D.

              The Series D (January 2026) at $1.2B is Preply's largest raise. Goldman Sachs International
              acted as sole placement agent. Use of proceeds is explicitly allocated to: (1) AI and data
              infrastructure scaling; (2) product and engineering team expansion, including 100+ new hires
              across New York, London, Barcelona, and Kyiv; and (3) global market growth to reach new learner
              and tutor cohorts. EBITDA-positive status by late 2025 implies materially reduced cash burn,
              suggesting the $150M Series D will extend the runway by multiple years without requiring near-term
              refinancing. Preply UK Services Ltd was incorporated in England & Wales (company number 15717575)
              in May 2024; first accounts are due by September 2026, providing a future data point for UK
              entity financials.
            claimRefs:
              - C143
              - C144
              - C145
              - C146
              - C147
              - C148
              - C161
              - C162
              - C163
              - C170
      - number: '4.6'
        title: Financial Verdict
        blocks:
          - type: paragraph
            body: |
              Preply presents a financially credible growth story with meaningful structural positives: a
              subscription-based billing model that enhances revenue predictability, a B2B enterprise segment
              growing at 230%+ that should improve blended margins, EBITDA-positive milestone validating
              capital efficiency, and $299M in total funding from institutional investors (WestCap, EBRD,
              IFC, Horizon Capital). The marketplace model carries inherently high gross margins compared to
              content-driven EdTech, as Preply does not create proprietary curriculum but instead monetises
              the discovery and booking layer.

              Diligence blockers are material. Preply has disclosed no ARR, NRR, gross margin, cohort retention
              curve, or CAC/LTV since the 2021 Sacra estimate—the equivalent of a Series D unicorn operating
              with pre-Series A disclosure norms. The $28M 2023 debt facility has undisclosed terms. The
              concentration of R&D operations in war-affected Kyiv creates operational continuity risk that
              is under-quantified in public materials. Student-side churn evidence from tutor forums suggests
              many learners are episodic rather than subscription-committed, which would pressure NRR.

              At $1.2B valuation and an estimated 8–12x revenue multiple, Preply is priced in line with
              high-growth edtech comps such as Duolingo (12x public market multiple) but depends heavily on
              continued EBITDA improvement and B2B contract growth to justify the premium. The financial
              verdict is cautiously constructive: the business model is sound and the trajectory compelling,
              but the evidence gaps preclude high-confidence underwriting without access to private management
              accounts and the full capital-structure detail.
            claimRefs:
              - C153
              - C163
              - C164
              - C165
              - C168
              - C169
      - number: '4.7'
        title: Exhibits
        blocks:
          - type: callout
            title: EBITDA-Positive Before the Raise
            body: |
              Achieving EBITDA positivity in the twelve months preceding a $150M Series D—rather than burning
              cash to justify the raise—signals disciplined capital allocation and a unit-economics inflection
              that validates the marketplace model at scale. This milestone also substantially reduces the
              risk of a forced bridge-raise if growth decelerates.
            calloutType: strength
            claimRefs:
              - C163
              - C147
          - type: callout
            title: Revenue Transparency Gap at Unicorn Scale
            body: |
              Preply has published no official revenue, ARR, gross margin, NRR, or CAC/LTV figures since
              Sacra's 2021 estimate of $50M. At $1.2B valuation, this opacity is unusual and limits
              third-party underwriting confidence. Any credible financial model depends on private
              management accounts; the public record supports only a wide scenario range.
            calloutType: risk
            claimRefs:
              - C159
              - C160
              - C166
              - C168
          - type: callout
            title: B2B Enterprise as the Margin-Expansion Flywheel
            body: |
              Enterprise contracts—which grew 230% in 2021–2022 and added ~200 new corporate clients in
              a single 12-month period—carry higher average contract values, multi-seat economics, and
              institutional renewal dynamics that should outperform D2C consumer churn. If B2B grows
              from a minority to a majority of revenue, Preply's blended margin profile could approach
              SaaS-like levels over the next three to five years.
            calloutType: insight
