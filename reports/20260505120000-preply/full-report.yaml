  - number: 6
    title: Customers
    sections:
      - number: '6.1'
        title: Customer Segments — Buyers, Users, and Payers
        blocks:
          - type: paragraph
            body: |
              Preply's customer base operates across two market tiers with distinct buyer/user/payer
              structures. In the B2C tier, the payer and learner are the same individual: adults
              — predominantly aged 25–34, with an approximate 60/40 female-to-male split per Similarweb
              audience data — who subscribe through weekly lesson bundles or single-lesson purchases.
              The core B2C use cases cluster around professional advancement (career communication,
              interview preparation), relocation or immigration needs, academic requirements, and
              personal enrichment. English is the most-studied language in Europe (49% of Preply
              learners on the platform), while Spanish leads in North America (25%), reflecting regional
              professional and cultural demand patterns.

              In the B2B tier, the buyer (L&D or HR manager), user (employee learner), and payer
              (corporate budget holder) are structurally separate. Preply Business requires enterprise
              contracting with dedicated onboarding, SSO/SCIM provisioning, and Corporate Dashboard
              analytics. The platform positions B2B engagement as a recurring, high-retention channel:
              corporate learners are locked into programs with defined objectives, progress tracking,
              and measurable outcomes — structurally more durable than individual subscription churn.
              As of 2025, Preply Business claims 2,000+ corporate clients, with the U.S. market adding
              more than 200 new organizational partners in the 12 months to August 2025 alone.

              Tutors represent a third party that is simultaneously supply-side marketplace participants
              and product co-creators: Preply's AI tools (Lesson Insights, Daily Exercises) are designed
              to reduce tutor administrative burden, improving tutor retention and, by extension, the
              quality of the learner product. The commission structure starts at 33% for new tutors
              declining to 18% after 400+ accumulated platform hours, with average hourly rates of
              $18–$35 for English lessons.
            claimRefs:
              - C208
              - C211
              - C226
              - C227
              - C234
              - C242
              - C247
      - number: '6.2'
        title: Adoption Trajectory and Market Reach
        blocks:
          - type: paragraph
            body: |
              Preply's aggregate platform reach is anchored by official company disclosures and
              third-party traffic analytics. The platform reports 100,000+ tutors, 300,000+ 5-star
              tutor reviews, and learners across 180 countries. Monthly web visits reached
              approximately 25 million as of March 2026 (Semrush), placing Preply in the top tier of
              global language learning platforms. The United States accounts for 17–19% of total
              traffic (~4.7–4.8 million visits/month), making it the largest single-country market.
              Other material markets include the United Kingdom (5–6%), Spain (5.9–7.2%), Poland
              (3.8–5.2%), and Italy (~4.5%), underscoring a predominantly English-speaking and
              Western European learner base.

              Mobile adoption is strong: the Preply Android app has 5M+ installs with a 4.7/5
              rating from 56,300+ reviews on Google Play; the iOS app carries a 4.8/5 rating with
              40,000+ App Store ratings. Direct traffic constitutes approximately 66% of all web
              visits, signaling a highly brand-aware and returning user base rather than one that
              relies purely on paid acquisition. A 2023 shift to value-based Google Ads bidding
              targeting high-lifetime-value learners yielded a 25% increase in global conversion
              value year-on-year and a 10% reduction in cost per acquisition — an explicit strategic
              pivot from learner volume to learner quality.

              Programmatic SEO is a material organic acquisition engine: Preply maintains over 1,000
              search-optimized pages across 50+ languages, generating millions of organic monthly
              visits. A 2024 Animalz case study documented the challenges of sustaining growth from
              this baseline and Preply's response — a persona-focused SEO expansion targeting
              adjacent audiences (expats, business professionals) beyond bottom-of-funnel learners
              seeking explicit lesson pages. The Axios-published CEO interview (September 2025)
              confirmed the platform serves 100,000+ tutors and learners in 180 countries, with
              students progressing 3x faster than industry norms.
            claimRefs:
              - C208
              - C223
              - C224
              - C228
              - C229
              - C230
              - C231
              - C241
              - C243
      - number: '6.3'
        title: Named Customer Proof — B2B Deployments and B2C Outcomes
        blocks:
          - type: paragraph
            body: |
              Preply's named customer evidence base spans documented enterprise deployments and a
              third-party efficacy study for B2C outcomes.

              On the B2B side, Delivery Hero (global food delivery platform, Berlin) is the
              best-documented case: an active partnership of 2+ years with 631 employees enrolled in
              Preply Business as of 2024. Philip Schiele, Learning & Development Specialist at
              Delivery Hero, confirmed exponentially growing participation and "very positive"
              employee feedback on cross-cultural integration. The partnership was structured around
              the employee L&D budget, offering English and German training as a flexible benefit.
              Genesys Informatica reported 72% of employees experienced a positive impact on their
              professional work. Music AI documented that more than 90% of employees improved their
              language skills. Toyota Material Handling Polska used Preply Business to address
              employee speaking barriers. Miro's People Programs Specialist Yulia cited Preply's
              multi-timezone flexibility and industry-specialized tutors as "essential for our global
              business." Unilever and Datadog are cited in multiple press sources as enterprise
              customers, reflecting Preply's shift toward high-retention recurring corporate
              contracts. All listed accounts are described as production deployments, not pilots.

              On the B2C side, the 2025 LeanLab Education study — an independent nonprofit research
              organization — enrolled 67 Spanish-speaking adult learners in a 12-week English
              program on Preply. Results: 1 in 3 learners improved their CEFR level; learners
              progressed at 3x the standard rate (24–48 tutor hours vs. the typical 160–240 hours
              per CEFR level). After 24+ lessons: 97% felt confident speaking English; 94% felt
              more fluent; 96% attributed success to the human tutor. These results were published
              by Preply via PR Newswire in September 2025 and independently covered by EdTech
              Innovation Hub. Note: the study was conducted in partnership with Preply; independent
              replication has not been publicly documented.
            claimRefs:
              - C212
              - C215
              - C216
              - C218
              - C219
              - C220
              - C221
              - C222
              - C231
              - C232
              - C233
              - C234
      - number: '6.4'
        title: Retention, Satisfaction, and Durability
        blocks:
          - type: paragraph
            body: |
              Preply does not publicly disclose Net Revenue Retention (NRR), Gross Revenue Retention
              (GRR), B2C subscriber cohort data, or B2B contract renewal rates. The absence of these
              metrics is a material diligence gap for any retention-quality assessment.

              Proxies for satisfaction and durability paint a mixed picture. On the positive side,
              Trustpilot records a 4.3/5 score from 21,500+ reviews (April 2026), and Preply's own
              platform aggregates 300,000+ 5-star tutor reviews. Preply Business reports a 4.9/5
              average tutor rating among corporate learners, 92% say the platform improved work
              performance, and 99% find the experience highly personalized. A 2024 internal
              policy change requiring 12-hour advance cancellation was explicitly linked by Preply
              to data showing fewer cancellations reduce student churn, suggesting the company is
              actively managing early-stage retention levers.

              On the adverse side, PissedConsumer aggregates 42 rated reviews at 1.5/5 (April 2026),
              with recurring complaints about auto-renewal billing surprises, difficulty canceling
              subscriptions, and slow or AI-automated customer service responses. The Better Business
              Bureau (Brookline, MA) has logged complaints against Preply, Inc. that similarly
              center on subscription cancellation difficulty and refund delays. Brighterly (April 2026)
              notes AI-based chatbot support as the most common Trustpilot complaint. G2 Preply
              Business carries only 3.3/5 from 12 reviews — a small sample but consistent with
              mixed sentiment. Tutors from high-wage countries (US, UK) publicly report that Preply's
              commission structure does not support economically viable full-time engagement, which
              creates a structural risk for supply quality at the top of the tutor earnings
              distribution.

              The strategic shift to high-value learners (documented in the Google Think case, 2023)
              produced 25% higher conversion value with lower acquisition cost, which implies
              improving per-learner economics without direct evidence on retention rates.
            claimRefs:
              - C213
              - C217
              - C235
              - C236
              - C237
              - C238
              - C239
              - C240
              - C241
              - C244
              - C245
              - C246
      - number: '6.5'
        title: Expansion Dynamics and Concentration Risk
        blocks:
          - type: paragraph
            body: |
              Preply's expansion dynamics operate through two mechanisms: B2C learner upgrade
              (trial lesson to subscription, single-language to multi-language, consumer to Preply
              Business via employer-sponsored enrollment) and B2B land-and-expand (initial cohort
              enrollment at one team/department, growing to broader organizational uptake). The
              Delivery Hero case is the best evidence of B2B expansion: starting with early
              enrollment and reaching 631 active employees over 2+ years with "exponentially
              growing" participation — a textbook land-and-expand pattern.

              Concentration risk in the B2B segment appears low given 2,000+ corporate clients
              and no single account publicly described as outsized. The U.S. market adds 200+
              new organizational partners per year. Named accounts (Delivery Hero, Unilever,
              Datadog, Miro) are large enterprises but are cited as representative examples, not
              as the majority of revenue. The B2C segment is inherently diversified across
              hundreds of thousands of individual learners in 180 countries; no learner-level
              concentration risk is disclosed or apparent.

              Procurement friction remains a potential B2B expansion blocker: Preply Business
              requires dedicated onboarding, SSO/SCIM integration, and L&D budget allocation,
              which can extend sales cycles versus self-serve. The absence of LMS connector depth
              (beyond SSO/SCIM) may limit integration into enterprise learning stacks. On the
              B2C side, tutor supply quality at the high end is at risk if commission economics
              do not support retention of native-speaking tutors from high-wage countries, which
              could degrade the premium learner experience and increase voluntary churn.

              The B2B revenue share relative to total revenue is not publicly disclosed, making
              it impossible to assess the durability benefit quantitatively. This is a material
              diligence ask for investors evaluating the recurring-revenue thesis from Preply's
              Series D.
            claimRefs:
              - C208
              - C231
              - C232
              - C234
              - C242
              - C246
              - C247
      - number: '6.6'
        title: Exhibits
        blocks:
          - type: callout
            title: High Trustpilot Score with Broad Coverage
            body: |
              4.3/5 across 21,500+ Trustpilot reviews (April 2026) reflects broad, sustained
              learner satisfaction at scale. Combined with 300,000+ 5-star tutor reviews on-platform
              and strong App Store ratings (iOS 4.8/5; Android 4.7/5), the consumer satisfaction
              signal is positive and hard to fabricate at this volume.
            calloutType: strength
            claimRefs:
              - C224
              - C236
          - type: callout
            title: B2B Land-and-Expand Evidence Is Tangible
            body: |
              Delivery Hero's 2+ year partnership with exponential employee enrollment growth is
              the strongest external validation of Preply Business's land-and-expand capability.
              Combined with 200+ new U.S. enterprise partners in 12 months, B2B expansion
              momentum is well-evidenced relative to typical pre-IPO edtech disclosures.
            calloutType: strength
            claimRefs:
              - C231
              - C242
          - type: callout
            title: Third-Party Efficacy Study Supports Outcomes Claims
            body: |
              The 2025 LeanLab Education study provides independently designed (nonprofit evaluator)
              evidence of learner outcomes at 3x the standard CEFR progression rate. While
              conducted in partnership with Preply, the LeanLab nonprofit credential and EdTech
              Innovation Hub coverage add credibility beyond pure marketing.
            calloutType: strength
            claimRefs:
              - C218
              - C222
          - type: callout
            title: NRR and Cohort Retention Are Entirely Private
            body: |
              Neither Net Revenue Retention, Gross Revenue Retention, B2C churn rates, nor B2B
              contract renewal rates are publicly disclosed. Without cohort data, it is impossible
              to distinguish durable learning adoption from short-term trial usage. This is a
              blocking diligence gap for any valuation model dependent on the recurring-revenue
              thesis.
            calloutType: risk
            claimRefs:
              - C214
              - C217
          - type: callout
            title: Billing and Customer Service Adverse Signals Are Persistent
            body: |
              PissedConsumer's 1.5/5 average and BBB complaint filing patterns consistently cite
              auto-renewal surprises, refund delays, and AI-automated customer service as primary
              pain points. These complaints represent a churn-acceleration risk, especially for
              B2C learners who are not on employer-sponsored plans and lack the contractual
              commitment of B2B accounts.
            calloutType: risk
            claimRefs:
              - C237
              - C238
          - type: callout
            title: B2B Revenue Share Assumed Growing but Unverified
            body: |
              Multiple sources describe Preply's B2B pivot as strategically important for
              recurring revenue durability, and The Recursive notes investor preference for
              recurring B2B contracts. However, the exact share of total revenue attributable
              to Preply Business is not disclosed. If B2B remains below 30% of total revenue,
              the recurring-revenue narrative is materially overstated.
            calloutType: assumption
