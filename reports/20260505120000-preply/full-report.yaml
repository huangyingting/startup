  - number: 7
    title: Risks
    sections:
      - number: '7.1'
        title: Regulatory and Legal Risk
        blocks:
          - type: paragraph
            body: |
              Preply operates a cross-border data platform serving learners in 180 countries and is
              therefore subject to the General Data Protection Regulation (GDPR), the UK Data
              Protection Act 2018, the California Consumer Privacy Act (CCPA), and the Children's
              Online Privacy Protection Act (COPPA) in the United States, among other national privacy
              regimes. The company has appointed a Data Protection Officer (dpo@preply.com), maintains
              an EU representative through Preply Europe Services SL (Barcelona), and updated its
              Privacy Policy on March 3, 2026, signalling active compliance maintenance. However,
              the Terms of Service were last publicly updated on February 1, 2021 — before the EU AI
              Act, COPPA 2025 rule amendments, and the 2022-2024 GDPR enforcement wave. This
              creates a material freshness risk: consumer protections, arbitration clauses, and data
              subject rights language may not reflect current regulatory requirements.

              The EU AI Act presents the most time-critical regulatory exposure. AI systems used in
              educational settings for admissions decisions, automated grading, learner placement, or
              exam proctoring are classified as high-risk under Annex III; the compliance window closes
              August 2, 2026. Violations carry penalties up to €35M or 7% of global annual turnover.
              Preply's tutor-matching algorithm and AI-driven learning-outcome assessments may fall
              within this high-risk perimeter; no public EU AI Act gap analysis or conformity assessment
              has been disclosed. Prohibited uses — emotion recognition in educational contexts — became
              enforceable in February 2025.

              COPPA exposure is meaningful even though Preply formally targets learners 18+. The
              updated FTC COPPA Rule (effective April 2026) expands coverage to biometric data,
              mandates separate parental consent for data sharing with third parties, and applies to
              platforms with "actual knowledge" of serving under-13 learners. Preply allows "Parents"
              as a distinct user category in its Terms of Service, suggesting minors are within scope.
              Civil penalties reach $51,744 per violation per day under the revised rule.

              The mandatory individual arbitration clause and class action waiver in the February 2021
              Terms of Service have not been publicly updated or replaced. EU and UK consumer
              protection law may render these clauses unenforceable for European users, creating a
              bifurcated litigation risk: US users are channelled to private arbitration; European users
              may bring court actions or access EU out-of-court redress mechanisms. This asymmetry
              heightens exposure in Preply's largest commercial geography (EU).

              Cross-border data transfers from EU and UK users to Preply, Inc. (Delaware/Massachusetts)
              must be governed by Standard Contractual Clauses or another approved mechanism under
              GDPR Article 46. Preply's Privacy Policy acknowledges international transfers but does
              not identify the specific transfer mechanism or the sub-processors receiving EU data.
              Given that Preply relies on OpenAI (a US-based AI provider) for core product features,
              the adequacy and transparency of AI sub-processor disclosures is a latent GDPR risk.
