              - C140
              - C141
              - C153
          - type: callout
            title: Ukraine R&D Concentration Risk
            body: |
              A significant portion of Preply's engineering and R&D workforce is based in Kyiv, Ukraine,
              during an active armed conflict. While Preply has demonstrated operational resilience since
              2022 and the IFC/EBRD specifically invested to support this activity, the risk of engineering
              team displacement, talent attrition, or infrastructure disruption has not been publicly
              quantified. The Company has not disclosed a formal business-continuity or disaster-recovery
              plan for its Ukraine operations in public materials.
