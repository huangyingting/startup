  - number: 3
    title: Competitors
    sections:
      - number: '3.1'
        title: Competitive Landscape Overview
        blocks:
          - type: paragraph
            body: |
              Preply competes across two structurally distinct competitive arenas that require separate assessment.
              The first is the B2C consumer live tutoring marketplace, where learners compare platforms on tutor
              quality, language availability, pricing transparency, and scheduling convenience. The second is the
              B2B corporate language training market, where enterprise procurement criteria—HRIS and LMS integration,
              analytics reporting, compliance certifications, and account management support—drive buying decisions.
              Few competitors operate meaningfully in both segments simultaneously, giving Preply a dual-segment
              positioning advantage but also creating exposure on two competitive fronts.

              Within B2C, the principal direct competitors are iTalki (founded 2007, Hong Kong, 150+ languages,
              10M+ users) and Cambly (English-focused, approximately $250M in 2024 revenue). Lingoda occupies a
              structured group-class niche, while Verbling—once an independent marketplace peer—was acquired by
              Busuu in January 2020. In B2B, the competitive set is dominated by legacy incumbents (Berlitz,
              British Council, Inlingua) and digital-native enterprise platforms (goFLUENT, Speexx, Busuu for
              Business, Rosetta Stone Enterprise). Duolingo, Babbel, and consumer self-paced apps represent
              substitute threats at the low-price B2C value end, not direct competitors in the live-tutoring or
              enterprise segments.
            claimRefs:
              - C089
              - C090
              - C095
              - C114
      - number: '3.2'
        title: Direct Marketplace Peers (B2C)
        blocks:
          - type: paragraph
            body: |
              iTalki is Preply's closest B2C structural equivalent: both operate two-sided marketplaces connecting
              language learners with freelance tutors globally. iTalki's 15% flat commission is materially lower
              than Preply's tiered 18–33% structure, which is a persistent source of tutor attrition risk for
              Preply. iTalki allows pay-per-lesson billing with no mandatory package commitment, making it more
              accessible for casual learners. However, iTalki offers no enterprise product, and its revenue
              estimates carry wide uncertainty ($25M–$341M in 2024–2025), reflecting limited public disclosure.
              Both platforms contend with significant tutor multi-homing: tutors routinely maintain active profiles
              on two or more marketplaces simultaneously, limiting supply-side exclusivity for any single platform.

              Cambly reported approximately $250M in 2024 revenue and focuses exclusively on English conversation
              practice, primarily serving learners in Latin America and the Middle East. Cambly's platform-set pay
              model (approximately $10–12 per hour to tutors) removes pricing complexity but compresses tutor
              earnings relative to Preply and iTalki. Lingoda competes in the structured-course niche with group
              classes in six core languages (English, German, French, Spanish, Portuguese, Italian) and a
              subscription pricing model; it raised approximately $83M through a 2021 Series C and serves 100,000+
              students globally. Cambly's English-only focus and Lingoda's narrow language range limit their direct
              competitive overlap with Preply's broader marketplace and enterprise ambitions. Verbling, once a
              standalone peer, has operated under the Busuu brand since January 2020 and is no longer an
              independent competitive force.
            claimRefs:
              - C091
              - C092
              - C093
              - C094
              - C095
              - C108
              - C109
              - C114
              - C119
              - C120
      - number: '3.3'
        title: Enterprise and Corporate Language Training Competitors
        blocks:
          - type: paragraph
            body: |
              Berlitz Corporation is the dominant incumbent in enterprise language training with approximately
              $1.1B in estimated annual revenue and 4,533 employees. With over 145 years of operation, Berlitz
              has established government and large-enterprise procurement relationships that provide structural
              distribution advantages Preply cannot replicate in the near term. Berlitz's service portfolio spans
              language instruction, cultural training, language testing, and translation services for corporate
              and government clients globally. Its primary weakness is slower digital product innovation relative
              to venture-backed platforms and the absence of a consumer marketplace model.

              goFLUENT serves 2,000+ enterprise organizations in 100+ countries and is estimated at approximately
              $169M in annual revenue as of 2025. Its January 2026 acquisition of Learnship's operations
              consolidated the competitive field in Europe and expanded its certified-trainer network. goFLUENT
              leads Preply Business on compliance certifications and HRIS/LMS depth. Speexx reported $79.7M in
              2024 revenue (up from $54.8M in 2023) despite only approximately $10.9M in disclosed venture
              funding, indicating strong organic growth; it positions as a people development platform for
              1,800+ organizations and 8M+ users. Busuu for Business (owned by Macmillan Publishers) and Rosetta
              Stone Enterprise (an IXL Learning division) compete on self-paced content and app-based delivery
              with 12 and 24 languages respectively, but neither offers genuine 1-on-1 live tutoring at scale—
              a structural differentiator that Preply Business exploits in enterprise sales motions.
            claimRefs:
              - C096
              - C097
              - C098
              - C099
              - C100
              - C101
              - C102
              - C118
              - C122
              - C125
              - C126
      - number: '3.4'
        title: Substitutes and Status-Quo Alternatives
        blocks:
          - type: paragraph
            body: |
              The most significant non-platform substitute is the corporate status quo: in-house language programs,
              local language schools, textbook-based learning, and blended LMS courses delivered through Coursera,
              LinkedIn Learning, or internal HR systems. These represent the incumbent position for corporate buyers,
              particularly large organizations with established L&D infrastructure and existing vendor relationships.
              The instructor-led enterprise language training market is projected to exceed $45B by 2026, with
              corporate clients accounting for over 47% of revenue—underscoring that Preply's growth thesis depends
              on displacing entrenched spending patterns with measurable ROI and workflow integration.

              In the B2C consumer segment, Duolingo represents the most material indirect threat. With 500M+
              registered users and the 2024 launch of Duolingo Max (GPT-4-powered conversation practice),
              Duolingo has closed part of the quality gap between gamified self-study and conversational practice
              for beginner-to-intermediate learners. Babbel, Rosetta Stone consumer, and Pimsleur offer self-paced
              alternatives that suffice for casual vocabulary acquisition. These substitutes do not displace
              Preply's premium position—advanced, business-focused, and high-stakes learners retain a strong
              preference for live human tutoring—but they pressure Preply's B2C addressable market at the entry
              level and may slow the funnel of learners graduating from free or low-cost tools to paid tutoring.
            claimRefs:
              - C103
              - C115
              - C116
              - C117
              - C124
              - C129
      - number: '3.5'
        title: Switching Costs, Lock-In, and Competitive Moat
        blocks:
          - type: paragraph
            body: |
              Preply's competitive moat is best characterized as moderate and partially structural. The 140,000+
              tutor network is a meaningful supply-side asset: depth and breadth of tutor availability in long-tail
              languages reduces learner churn relative to smaller platforms. However, this barrier is not
              prohibitive. Tutors and learners both face low switching costs: there is no hardware dependency,
              no proprietary data format, and lesson history does not transfer between platforms. Tutor
              multi-homing is prevalent and well-documented, with many tutors simultaneously maintaining active
              profiles on Preply, iTalki, Cambly, and Verbling to diversify income streams. Independent reviewer
              evidence confirms that iTalki's 15% flat commission model makes it the more tutor-favorable
              platform for established instructors once they build a student base.

              On the B2B side, switching costs are materially higher. Preply Business creates enterprise stickiness
              through HRIS and LMS integration (SSO, API connections to major HR systems), manager dashboards
              embedded in existing HR workflows, dedicated onboarding teams, and structured progress baselines
              tied to employee performance cycles. Once deployed across a global workforce and integrated into
              review processes, the cost of migrating to a competitor—retraining HR administrators, reconfiguring
              integrations, rebuilding progress baselines—is meaningful. This is comparable to goFLUENT and
              Speexx, though Berlitz's multi-decade procurement relationships in regulated verticals remain
              harder to unseat. The most structurally exposed dimension of Preply's moat is AI substitution:
              if free AI conversation tools continue to improve, Preply's per-lesson pricing model faces
              compression at the low-ASP B2C end.
            claimRefs:
              - C107
              - C108
              - C110
              - C111
              - C112
              - C130
      - number: '3.6'
        title: Exhibits
        blocks:
          - type: callout
            title: Tutor Multi-Homing Limits Supply-Side Lock-In
            body: |
              Documented tutor multi-homing across Preply, iTalki, Cambly, and Verbling is a structural
              vulnerability. Tutors face rational economic incentives to maintain profiles on lower-commission
              competitors. Preply's 18–33% tiered commission structure is the highest among its direct
              marketplace peers (iTalki charges 15% flat). If a top-volume tutor cohort migrates to iTalki
              or moves to independent arrangements, Preply's supply-side quality and availability will erode.
              This risk is amplified by the absence of tutor exclusivity agreements and by the ease of
              simultaneous multi-platform operation.
            calloutType: risk
            claimRefs:
              - C108
              - C109
              - C130
          - type: callout
            title: Dual-Segment Positioning Limits Replication Risk
            body: |
              Preply's ability to serve both B2C individual learners and B2B enterprise clients through a
              shared tutor pool is a structural advantage that dedicated enterprise competitors (goFLUENT,
              Speexx, Berlitz) cannot easily replicate without building a consumer acquisition channel. Similarly,
              consumer-only competitors (iTalki, Cambly) would require significant enterprise product investment
              to challenge Preply Business. This dual-segment moat is currently the most defensible structural
              feature of Preply's competitive position, as it enables cross-subsidization of tutor supply across
              consumer and enterprise demand.
