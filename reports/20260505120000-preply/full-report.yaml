      - number: '7.7'
        title: Exhibits
        blocks:
          - type: callout
            title: 'EU AI Act August 2026 Deadline: No Gap Analysis Disclosed'
            body: |
              Preply's tutor-matching algorithm and AI-driven learning assessments likely fall within
              EU AI Act Annex III high-risk categories. The compliance deadline is August 2, 2026 —
              three months from this report date. No conformity assessment, gap analysis, or EU AI Act
              readiness disclosure has been made public. Failure to comply carries penalties up to
              €35M or 7% of global annual turnover. This is the single most time-critical risk in this
              chapter.
            calloutType: risk
            claimRefs:
              - C253
              - C252
              - C284
          - type: callout
            title: 'Tutor Misclassification: No Prop 22 Shield, $500M+ Sector Precedent'
            body: |
              California's AB5 "ABC test" applies in full to online tutoring platforms — there is no
              Proposition 22 exemption equivalent for non-transportation gig workers. Uber and Lyft
              paid $500M+ in settlements in New York, Massachusetts, and New Jersey. Preply's
              tutors are classified as independent contractors but may fail the ABC test if the
              "business integration" prong (Part B) is assessed: language tutoring is core to Preply's
              business. Retroactive reclassification would impose benefit liabilities and could force a
              fundamental pricing model redesign.
            calloutType: risk
            claimRefs:
              - C272
              - C273
              - C274
          - type: callout
            title: 'Valuation Integrity Risk: No Post-2021 ARR Disclosed'
            body: |
              The $1.2B valuation is unverifiable against public revenue data. The last confirmed ARR
              was ~$50M in 2021. Even if 2024 ARR reaches $125-200M (2.5x growth compounding),
              the implied 6-10x revenue multiple assumes sustained growth at a time when edtech
              comps trade at materially compressed multiples. A down-round at the next liquidity event
              is a non-trivial scenario if public market conditions remain compressed.
            calloutType: risk
            claimRefs:
              - C271
              - C281
              - C281
          - type: callout
            title: 'Positive Signal: No Public Breach or Regulatory Enforcement Found'
            body: |
              Despite searching for GDPR enforcement actions, data breaches, and active litigation
              involving Preply across 2024-2025, no confirmed incidents were found. The Privacy
              Policy was updated March 2026, and the DPO appointment and EU representative
              designation are in place. This reduces — but does not eliminate — the residual severity
              of regulatory and data-breach risks.
            calloutType: insight
            claimRefs:
              - C248
