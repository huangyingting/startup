      Seven primary risk categories plotted across four dimensions: inherent likelihood, inherent
      impact, mitigation maturity, and residual severity. EU AI Act compliance and tutor
      misclassification carry critical residual severity. OpenAI concentration and geopolitical
      risk carry high residual severity with low mitigation maturity. No critical risk is fully
      mitigated as of the report date.
