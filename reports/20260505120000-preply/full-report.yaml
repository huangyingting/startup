  - number: 8
    title: Valuation
    sections:
      - number: '8.1'
        title: Investment Thesis and Valuation Context
        blocks:
          - type: paragraph
            body: |
              Preply's Series D closed in January 2026 at $1.2 billion post-money valuation, led by
              WestCap with participation from Indico Capital Partners, Horizon Capital, and the
              European Bank for Reconstruction and Development (EBRD), with Goldman Sachs
              International as sole placement agent. Total disclosed funding reached approximately
              $299 million. The valuation represents a near-tripling from the estimated $500–600
              million post-money at the Series C extension in July 2023, making it one of the largest
              step-ups in European edtech since 2022.

              The investment thesis rests on five pillars. First, Preply is one of only 14 remaining
              HolonIQ-certified EdTech unicorns globally as of February 2026, a list that contracted
              with GoStudent's removal at below $1B and Byju's' collapse; Preply's addition signals
              validated category leadership in online language learning. Second, the company became
              EBITDA-positive in the 12 months preceding the Series D close — an operational maturity
              milestone that differentiates it from the majority of private edtech platforms. Third,
              platform growth signals are strong: more than 100,000 bookable tutors at Series D close
              (vs roughly 30,000 at Series C), 50% gross merchandise value growth from October 2024 to
              October 2025 per CEO Kirill Bigai in a November 2025 Inc. interview, and 10x revenue
              over five years (2020–2025, unaudited company statement). Fourth, the "human-led,
              AI-enhanced" positioning directly counters the gamification-only cohort (Duolingo,
              Babbel) in an era where enterprise L&D buyers increasingly require live human instruction
              with compliance-grade progress tracking. Fifth, B2B / Preply Business (2,000+ enterprise
              clients) is a recurring, higher-margin revenue layer that introduces subscription
              characteristics into an otherwise transaction-heavy marketplace.

              The anti-thesis centers on a single structural fact: no post-2021 absolute revenue figure
              has been publicly disclosed. This forces all multiple calculations onto analyst
              extrapolations with a 2–3x range of uncertainty ($80–150M for 2024–2025). At $1.2B
              entry, the implied EV/Revenue multiple ranges from 8x (on $150M estimate) to 15x (on
              $80M estimate). The public edtech sector median EV/Revenue is 1.6x as of Q4 2024
              (Finerva), and even the premium outlier Duolingo trades at approximately 3.7x
              EV/LTM Revenue (Multiples.vc, May 2026). A private premium is warranted, but a 5–10x
              premium over the market-traded multiple of the closest public comp requires
              extraordinary evidence of NRR, gross margin, and cohort retention that does not exist in
              public domain. The EBITDA-positive claim is unaudited and based on company statements
              cited in press releases; neither the EBITDA margin nor the absolute EBITDA figure has
              been disclosed.
            claimRefs:
              - C293
              - C294
              - C295
              - C296
              - C297
              - C298
              - C299
              - C300
              - C301
              - C302
              - C303
              - C304
      - number: '8.2'
        title: Financing Structure and Comparable Set
        blocks:
          - type: paragraph
            body: |
              The Series D structure has several features worth unpacking for valuation diligence.
              Goldman Sachs International serving as sole placement agent for a private growth round
              implies institutional investor marketing processes typical of pre-IPO or structured
              liquidity rounds, suggesting WestCap and co-investors may have run a competitive process
              and received financial disclosure unavailable in the public domain. The presence of EBRD —
              a development finance institution — alongside commercial VC suggests the round may have
              included development-bank pricing parameters (e.g., anti-dilution, redemption rights, or
              social-return covenants) that affect effective per-share economics for common holders.
              The July 2023 Series C extension included $28M in debt; whether any debt component exists
              in the Series D has not been disclosed. If the $1.2B valuation is post-money on pure
              equity terms with no participating preference, common-share coverage is cleaner; if
              structured with participating preferences or liquidation multiples, the effective
              per-common-share value is lower. None of these terms are publicly available.

              The comparable set for Preply sits across two axis: (1) direct language-learning peers —
              both public and private — and (2) the broader edtech marketplace cohort. Among direct
              peers, Duolingo (NASDAQ: DUOL) is the only large public language-learning company; its
              $5B market cap and ~3.7x EV/LTM Revenue multiple set the ceiling for the sector in the
              public market. Coursera (NYSE: COUR) trades at approximately 0.3x EV/Revenue — but is
              not a direct comp given its content-licensing rather than live-tutor model and its
              structural decline. Chegg (NYSE: CHGG), whose Busuu segment is a language-learning SaaS
              business (projected ~$48M revenue for 2025), has seen its market cap compress to ~$123M
              amid legacy business disruption from AI search; it trades below 0.3x revenue, making it
              a cautionary case for the consumer-edtech segment. GoStudent, the closest private comp
              to Preply in the tutoring-marketplace model (one-to-one sessions, marketplace commission),
              was removed from HolonIQ's unicorn list in November 2025 after major investors revalued
              it below $1B from a $3.2B peak — a direct and contemporaneous comparable cautionary
              signal. Speak ($1B, December 2024) is the only other confirmed language-learning unicorn
              in the current HolonIQ list but is an app-first voice-practice product with a materially
              different model and no live tutors. iTutorGroup held a $1B valuation from a 2015 funding
              round — stale and not reflective of current conditions.

              The most defensible valuation framework for Preply at this stage is a forward ARR multiple
              anchored on management-verified 2025 revenue, discounted for: (1) private-market illiquidity
              (typical 30–40% discount to public comps), (2) war-related operational risk premium on Kyiv
              R&D hub, (3) concentration in consumer GMV without disclosed NRR or gross margin. At
              Duolingo's 3.7x public multiple, applying a 40% private-market discount implies a 2.2x
              ARR multiple, which would only support $1.2B on revenue of approximately $545M — well
              above any credible estimate. Even applying a 15x growth premium (a VC-style growth multiple
              justifiable only if revenue is compounding at 40%+), $1.2B implies $80M ARR, which sits at
              the lower end of the analyst estimate range. The math is structurally dependent on private
              data.
            claimRefs:
              - C305
              - C306
              - C307
              - C308
              - C309
              - C310
              - C311
              - C312
              - C313
              - C314
              - C315
      - number: '8.3'
        title: 'Scenario Analysis: Bull, Base, and Bear'
        blocks:
          - type: paragraph
            body: |
              Three scenarios structure the range of outcomes for a Series D investor entering at $1.2B.
              Each scenario uses the same unverifiable revenue base ($80–150M estimated for 2024) and
              applies different assumptions about growth rate, margin expansion, and exit pathway.

              Bull scenario: Revenue is at the top of the analyst range (~$150M for 2024/25) and
              continues growing at 40%+ CAGR on the back of the B2B segment reaching 30%+ of total
              revenue, AI productivity gains compressing tutor acquisition cost, and an IPO or strategic
              acquisition in 2027–2028. At $300M revenue and a 5–7x forward multiple (in line with
              AI-premium edtech SaaS private comps), enterprise value reaches $1.5–2.1B, generating a
              1.25–1.75x multiple of invested capital (MOIC) for Series D investors. The IPO window
              must reopen for technology edtech platforms, which has been materially closed since 2022.

              Base scenario: Revenue is at the midpoint of estimates (~$100–120M for 2024/25) and grows
              at 25–30% CAGR. The B2B segment scales modestly, EBITDA margin reaches 10–15% by 2028,
              and the company achieves a strategic acquisition or SPAC exit by 2028–2029 at 5–6x
              forward revenue. Exit value $400–600M. At $1.2B entry, this would represent a loss of
              capital in the absence of preference mechanics protecting investors.

              Bear scenario: Revenue growth decelerates to 15–20% CAGR due to macro headwinds in
              consumer discretionary spending, B2B market saturation, or tutor platform disintermediation.
              A competitor (Duolingo AI, an enterprise Microsoft Teams integration, or a major Coursera
              enterprise product) captures enterprise budget share. EBITDA turns negative again in 2026–27
              due to AI investment requirements (OpenAI API cost scaling). A down-round or structured recap
              occurs before exit, similar to GoStudent's trajectory from $3.2B to sub-$1B.

              The base scenario is the most likely at current evidence, and it implies that Series D
              investors face potential paper losses unless Preply achieves $300M+ in revenue before exit.
              The critical question is whether the $150M raised in the Series D (with $299M total raised)
              creates sufficient runway to reach a profitability-verified, IPO-ready state before the
              exit window tightens further.
            claimRefs:
              - C316
              - C317
              - C318
              - C319
              - C320
              - C321
              - C322
      - number: '8.4'
        title: Exit Readiness and Recommendation
        blocks:
          - type: paragraph
            body: |
              Preply's exit pathway is the most underdisclosed dimension of the investment case. The
              company has not issued any public IPO signal, filed an S-1 or F-1, or engaged publicly
              with SPAC structures. Goldman Sachs' involvement as placement agent in the Series D
              maintains a pre-IPO bank relationship that is a precondition for a future public offering.
              WestCap's portfolio includes companies that have pursued IPO paths (Airbnb, where board
              member Allen Mask served as a senior executive); this investor alignment is a weak positive
              signal for eventual public-market orientation. For strategic M&A, the most credible
              acquirers would be: (1) enterprise learning platforms (Cornerstone, SAP SuccessFactors,
              Workday) looking to add live language as a module, (2) consumer tech platforms (Apple
              Education, Google Workspace), or (3) large online education aggregators (Chegg, which is
              reinventing around skilling and language per its 2025 Q4 letter — though its market cap is
              currently too small to fund an acquisition at this scale). None of these M&A paths have
              been signaled publicly.

              Recommendation: TRACK with medium confidence. The investment case for Preply is
              compelling from a platform quality, market positioning, and growth narrative standpoint.
              The EBITDA-positive status and the Series D structure (institutional syndicate, investment
              bank placement) are credibility signals that differentiate it from the majority of the
              lapsed EdTech unicorn cohort. However, the valuation is stretched against disclosed
              evidence: the $1.2B price implies an 8–15x revenue multiple on unverifiable revenue
              estimates, and the public comp universe (median 1.6x EV/Revenue for edtech) provides no
              support for the entry price without private access. A buy recommendation would require:
              (1) management accounts showing $120M+ ARR with 30%+ YoY growth, (2) NRR above 110%
              indicating strong expansion revenue, (3) gross margin above 60% confirming take-rate
              sustainability, and (4) a defined exit pathway with a credible timeline. Without those
              inputs, a responsible diligence outcome is to track progress and seek data room access
              before committing capital.
            claimRefs:
              - C323
              - C324
              - C325
              - C326
              - C327
              - C328
              - C329
              - C330
      - number: '8.5'
        title: Diligence Framework and Governance
        blocks:
          - type: paragraph
            body: |
              Several structural diligence blockers prevent a definitive recommendation at the current
              evidence level. First, the revenue gap: no audited or management-verified ARR or net
              revenue figure exists in the public domain for any period after 2021. This is exceptional
              for a company at $1.2B valuation entering institutional-grade diligence processes; even
              private companies at this stage typically provide trailing revenue ranges in fundraising
              materials or secondary transactions. Second, the preference stack is undisclosed: Preply's
              cap table structure, liquidation preferences for Series A through D, anti-dilution
              provisions, and total preference overhang are unknown. If the $299M raised over the full
              history carries 1x liquidation preferences, common stockholders (including employees)
              require an exit above $299M to receive any proceeds; if preferences are participating,
              the bar is higher. Third, debt: the Series C extension included $28M in debt at undisclosed
              terms; any outstanding debt reduces equity value at exit. Fourth, board governance:
              confirmed board members are only Kirill Bigai and Allen Mask (WestCap); prior-round board
              seats for Horizon Capital, Hoxton Ventures, Reach Capital, and Owl Ventures are unconfirmed
              in public sources. Full board composition is material for assessing alignment and veto rights.

              The kill triggers that would break the investment thesis are: (1) revenue growth decelerating
              below 20% CAGR for two consecutive years post-Series D, (2) EBITDA turning negative again
              due to AI infrastructure cost scaling, (3) a significant tutoring platform disintermediation
              event (e.g., a major AI provider releasing a live-conversation tutor model that commoditizes
              the marketplace), (4) a geopolitical escalation affecting the Kyiv R&D hub resulting in
              >30% technical headcount loss, or (5) a regulatory ruling misclassifying tutors as employees
              in a major jurisdiction, materially altering the commission economics.
            claimRefs:
              - C331
              - C332
              - C333
              - C334
              - C335
      - number: '8.6'
        title: Exhibits
        blocks:
          - type: callout
            title: EBITDA Positive Is Rare and Real
            body: |
              Preply's EBITDA-positive status — confirmed by multiple independent news outlets citing
              company statements and confirmed by Indico Capital's managing partner in the Series D
              announcement — is genuinely unusual in the global private edtech cohort. Of the 14
              current HolonIQ EdTech unicorns, most are still growth-at-all-costs platforms. This
              milestone meaningfully reduces GoStudent-style distress risk in the near term.
            calloutType: insight
            claimRefs:
              - C294
              - C295
              - C298
          - type: callout
            title: GoStudent Precedent Is a Direct Warning
            body: |
              GoStudent, a 1-on-1 tutoring marketplace with near-identical commission mechanics to
              Preply, was valued at $3.2B at its 2021 peak and revalued by major investors to below
              $1B by November 2025 — removed from HolonIQ's list in the same update that added Preply.
              The revenue and retention dynamics that drove that re-rating are not publicly confirmed,
              but the pattern — high GMV, unclear unit economics, aggressive expansion, then
              compression — closely mirrors the opacity risks in Preply's current disclosure posture.
            calloutType: risk
            claimRefs:
              - C308
              - C309
              - C310
          - type: callout
            title: 'TRACK: Seek Data Room Before Committing Capital'
            body: |
              Recommendation is TRACK with medium confidence. The platform quality, market tailwinds,
              and EBITDA-positive status justify ongoing monitoring and a willingness to engage with
              management. However, the $1.2B entry price is stretched relative to all public edtech
              comparables, and a responsible buy call cannot be issued without audited or
              management-verified revenue, NRR, gross margin, and cap table documentation. Investors
              should request private data room access and anchor diligence on the revenue verification
              items in T806 before committing capital.
            calloutType: recommendation
            claimRefs:
              - C293
              - C294
              - C299
              - C321
              - C325
          - type: callout
            title: Revenue Estimate Range Is Wide and Unverifiable from Public Sources
            body: |
              All revenue multiple calculations in this chapter use analyst extrapolations in the
              $80–150M range for 2024–2025. This is derived from Sacra's $50M 2021 base and
              compound growth scenarios consistent with the company's stated "51% growth in 2022"
              and "10x over five years" claims. The range is approximately 2x wide, meaning the
              implied multiple range (8x–15x) is also 2x wide. No reconciliation is possible
              without private data. Any diligence model treating a single point in this range
              as certain would be unsound.
            calloutType: assumption
            claimRefs:
              - C299
              - C300
              - C301
              - C317
