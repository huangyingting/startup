      - number: '1.2'
        title: Founders and Leadership
        blocks:
          - type: paragraph
            body: |
              Preply was co-founded in 2012 by Kirill Bigai (CEO), Dmytro Voloshyn (CTO), and Serge
              Lukianov. Bigai remains the public face of the company and primary spokesperson; his
              extensive media engagement makes him a key-person dependency risk. Voloshyn leads
              engineering and technology strategy, overseeing the proprietary Preply Classroom and
              AI infrastructure. Lukianov's current operating role is not publicly confirmed beyond
              his co-founder title. The senior leadership team expanded significantly in 2023 when
              Preply established its New York office: Sofia Tavares joined as Chief Brand Officer
              (previously SVP of Brand at Delivery Hero; fluent in eight languages) and Jerry Kingkade
              joined as Chief Revenue Officer (formerly CRO at Flowspace and VP Sales at Houzz).
              Aurélien Pallain serves as Chief Operating Officer. Josh Crossick is Chief Product
              Officer. Keiran Dodd leads People & Talent. Toni Sfeir is VP of B2B. The board
              composition is partially undisclosed; confirmed members are Kirill Bigai and Allen Mask
              (Partner at WestCap, former Airbnb executive), who joined in January 2026 as part of
              the Series D. Other board representatives from earlier investor rounds have not been
              confirmed publicly, which is typical for late-stage private companies. The company
              reports 84% of employees would recommend Preply as a great place to work (2025
              internal engagement survey). Leadership changes have been incremental, with no
              material departures since 2023 found in public records. Preply's Ukrainian founding
              team maintained operations in Kyiv throughout Russia's full-scale invasion from
              February 2022 onward, a decision the CEO characterizes as reinforcing organizational
              resilience and creativity.
            claimRefs:
              - C018
              - C019
              - C020
              - C033
              - C034
              - C035
              - C016
              - C042
      - number: '1.3'
        title: Funding History and Capital Structure
        blocks:
          - type: paragraph
            body: |
              Preply has raised approximately $299 million across multiple funding rounds spanning
              2012 to January 2026. The company's funding trajectory reflects consistent institutional
              confidence and an accelerating valuation multiple. Early seed capital (2012–2016) came
              from Techstars, Eastlabs, and individual angels including Semyon Dukach. A Series A of
              approximately $10 million closed in March 2020 (Diligent Capital, EduCapital, Hoxton
              Ventures, Point Nine Capital). The Series B ($35 million, March 2021) was led by Owl
              Ventures and Full In Partners. The Series C ($50 million, July 2022) followed, with
              Hoxton Ventures, Owl Ventures, Diligent Capital, EduCapital, and Evli Growth Partners
              participating; Sacra places the pre-Series-C valuation at approximately $395 million.
              In July 2023, Preply raised a $70 million extension comprising $42 million in equity
              (Series C-II) and a $28 million debt facility, led by Horizon Capital (the first
              investment from its Ukraine-focused HCGF IV fund), with co-investment from the
              International Finance Corporation (IFC), the European Bank for Reconstruction and
              Development (EBRD), Reach Capital, and Hoxton Ventures. The January 2026 Series D
              ($150 million, led by WestCap) brought total capital raised to approximately $299
              million at a $1.2 billion post-money valuation. Goldman Sachs International served as
              sole placement agent. The debt facility terms from July 2023 have not been publicly
              disclosed. No secondary transactions or liquidation preference details have been
              confirmed in public sources. The EBRD and IFC participation signals strong DFI
              endorsement of Preply's Ukrainian-founded, impact-aligned business.
            claimRefs:
              - C007
              - C008
              - C009
              - C015
              - C024
              - C025
              - C026
              - C027
              - C028
      - number: '1.4'
        title: Operational Scale and Milestone Trajectory
        blocks:
          - type: paragraph
            body: |
              Preply's operational metrics as of January 2026 are: 100,000+ tutors, 180 countries
              served, 90+ languages offered, approximately 750 employees. The company reports having
              more than tripled the number of bookable tutors since its Series C in 2022 (from
              approximately 35,000 tutors at the time of the 2023 Horizon Capital announcement to
              100,000+ by January 2026) and expanded its language catalog by over 40 new languages
              in the same period. Revenue was estimated at $50 million in 2021 by Sacra, with an
              estimated 51% YoY growth rate in 2022; no official post-2021 figure is publicly
              available. The company achieved EBITDA positivity in the twelve months preceding the
              January 2026 Series D announcement, a milestone the CEO characterized as enabling the
              raise from a position of strength rather than necessity. Preply's B2B segment
              (Preply Business) has grown significantly: as of early 2026, over 2,000 companies use
              the platform, with 92% of learners reporting improved work performance. Milestone
              highlights include: the 2019 migration of all lessons from Skype onto the proprietary
              Preply Classroom; the 2020 pandemic-driven 4x revenue surge with US market entry;
              the October 2023 New York headquarters opening and company rebrand; and the January
              2026 unicorn milestone. Preply maintained its Kyiv office and approximately 150 staff
              throughout Russia's ongoing war, operating 24/7 with generators and satellite internet.
