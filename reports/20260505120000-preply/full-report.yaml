      This matrix illustrates the absence of publicly available retention time-series data.
      'N/A — private' cells represent data that Preply does not publicly disclose.
      The 95% figure (B2B aggregated language improvement) is placed at month 3 because
      it is typically measured at program completion (~12 weeks). The 631 Delivery Hero
      figure is placed at Year 1+ as cumulative enrollment after 2+ years. Investors should
      request formal NRR/GRR cohort data from Preply management as a critical diligence ask.
    claimRefs:
      - C218
      - C231
      - C236
  - id: F701
