      - C271
  - id: F703
    title: External Platform Architecture — Upstream Node and Regulatory Channel Map
    type: dag
    layout: standard
    summary: |
      Structural directed acyclic graph of Preply's external architecture, tracing how upstream
      technology providers, capital sources, supply-side participants, and regulatory bodies
      connect to the core platform. This figure maps the wiring of dependencies — which nodes
      are most upstream, which channels are single-path versus multi-path — rather than scoring
      risk severity. Regulatory bodies (EU DPA network, FTC) impose compliance constraints
      through separate channels from commercial/technology dependencies.
    data:
