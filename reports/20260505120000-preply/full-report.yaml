        - id: tutors
          label: 100K+ Independent Tutors
        - id: eu-dpa
          label: EU DPA Network / AI Act Authority
        - id: ftc
          label: FTC (COPPA / Consumer Protection)
        - id: payment-rails
          label: Payment Rails (Stripe/Payoneer)
        - id: preply-platform
          label: Preply Core Platform
      edges:
        - from: openai
          to: preply-platform
        - from: cloud
          to: preply-platform
        - from: westcap
          to: preply-platform
        - from: tutors
          to: preply-platform
        - from: eu-dpa
          to: preply-platform
        - from: ftc
          to: preply-platform
        - from: payment-rails
          to: preply-platform
    approximationNotes: |
      Cloud provider identity is inferred from industry norms; Preply has not publicly disclosed
      its cloud hosting vendor. Payment rail identity is inferred and not confirmed by Preply.
    claimRefs:
