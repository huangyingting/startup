  - id: T806
    title: Final Diligence Asks
    columns:
      - Topic
      - Missing Evidence
      - Why It Matters
      - Owner or Diligence Path
    rows:
      - - Revenue verification
        - Post-2021 audited or management-verified ARR / net revenue with segment breakdown (B2C vs B2B)
        - Necessary to underwrite the 8–15x implied multiple; all scenario modeling is assumption-dependent without it
        - Management data room; audited P&L request
      - - Gross margin disclosure
        - Net revenue margin after tutor payout and payment processing, before fixed costs; blended take rate by segment
        - >-
          Determines whether the marketplace economics are comparable to SaaS (60–80% gross margin) or traditional
          marketplace (20–35%)
        - Management data room; comparable Sacra analysis (paywall)
      - - Net Revenue Retention (NRR)
        - Cohort-level NRR by learner vintage and B2B cohort; churn rate by segment
        - >-
          NRR > 110% would significantly strengthen the case for premium multiple; low NRR would confirm transactional
          not recurring revenue character
        - Management data room; investor-level reporting request
      - - Preference stack and cap table
        - >-
          Full cap table with preference terms, participation rights, anti-dilution provisions, and total liquidation
          overhang
        - >-
          Determines effective per-common-share economics at various exit prices; critical for understanding employee
          option value
        - Legal data room; cap table document request from company
      - - Debt facility terms
        - 'Series C $28M debt: maturity, interest rate, covenant package; any debt in Series D structure'
        - Outstanding debt reduces equity value at exit and introduces covenant risk if EBITDA reverts
        - Legal data room; credit agreement review
      - - Board composition
        - >-
          Full board composition including Series A–C investor board representatives, independent directors, and
          observer rights
        - Governance determines alignment, veto rights, and drag-along / tag-along mechanics
        - Company governance documents; board consent resolutions from Series D
      - - Kyiv operational resilience
        - >-
          Business continuity plan for Kyiv hub; % of functions with geographic redundancy; insurance coverage for
          war-related events
        - 150 Kyiv staff = ~20% of global headcount; disruption risk is ongoing and material
        - Management interview; insurance policy review; BCP documentation
      - - OpenAI dependency and cost structure
        - Current spend on OpenAI API; contractual terms, pricing, and fallback providers for AI features
        - >-
          Single AI provider dependency creates both cost and strategic continuity risk; AI cost as % of revenue affects
          EBITDA trajectory
        - Management interview; technology vendor due diligence
      - - Exit pathway and timeline
        - Investor agreement on IPO vs M&A preference; any existing drag-along or registration rights timeline
        - Determines expected hold period and liquidity pathway for co-investors
        - Investor agreement review; informal investor alignment check
      - - B2B revenue share and growth
        - Absolute B2B revenue for 2023 and 2024; B2B NRR; number of enterprise clients with ACV > $50K
        - >-
          B2B is the margin-expansion engine; current Sacra estimate (~5% of revenue) is too small to support SaaS
          premium; need verification
        - Management data room; CRM data; renewal rate documentation
    notes: >-
      Diligence asks are prioritized in order of valuation impact. Items 1–3 are pre-condition for any upgrade from
      TRACK to BUY. Items 4–10 are necessary for full underwriting but do not individually block a recommendation.
    claimRefs:
