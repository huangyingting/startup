      - number: '7.2'
        title: Operational, Security, and Trust-and-Safety Risk
        blocks:
          - type: paragraph
            body: |
              Preply's platform experienced at least six complete or partial outages between April 2025
              and February 2026, including a 1-hour-31-minute partial outage in June 2025 and complete
              outages in April, August, October, and December 2025. Each outage directly prevents
              scheduled lessons from occurring, creating learner-facing service failures and potential
              refund obligations. No public SLA is disclosed; enterprise B2B clients therefore have no
              independently enforceable uptime guarantee, and contract terms are unknown.

              Preply's tutor-vetting framework is materially weaker than what many institutional
              customers (school systems, corporations with minor employees) would require. ID
              verification — introduced October 2020 — consists of a live government-issued document
              photo with no criminal background check, no credential verification, and no reference
              checking. The platform's community guidelines explicitly prohibit misrepresentation and
              exploitation but rely on user-reporting and reactive moderation rather than preventive
              screening. Complaints on PissedConsumer (111 reviews) and BBB consistently cite fake
              student accounts, fraudulent reviews, and platform-sided dispute resolutions that
              disadvantage tutors. Persistent adverse reviews covering auto-renewal billing, frozen
              earnings, and unresponsive support create regulatory dark-pattern scrutiny risk, particularly
              under EU DSA (Digital Services Act) obligations for online marketplace operators.

              No publicly disclosed major data breach involving Preply has been identified in 2024-2025,
              which is a positive data point. However, the ITRC 2024 Annual Data Breach Report recorded
              near-record compromise numbers sector-wide in technology/SaaS, validating that the absence
              of a breach is not a structural immunity. Preply has not publicly disclosed SOC 2 Type II
              certification, cyber insurance coverage, or an independent penetration-testing program.
              In addition, reliance on OpenAI's API means Preply inherits any upstream data-exposure
              risk from OpenAI's sub-processor chain — as illustrated by the 2025 OpenAI/Mixpanel
              incident in which a third-party analytics provider suffered a breach affecting AI platform
              customers.
            claimRefs:
              - C260
              - C257
              - C288
              - C262
              - C262
              - C277
              - C288
              - C289
              - C285
      - number: '7.3'
        title: Technology and AI Concentration Risk
        blocks:
          - type: paragraph
            body: |
              Preply's entire AI product suite — Lesson Insights (automated post-lesson summaries),
              Daily Exercises (personalised homework), Scenario Practice (AI conversational partner),
              and the AI Teaching Assistant — is built on OpenAI's GPT API infrastructure. No
              alternative AI provider or fallback inference layer has been publicly disclosed. This
              creates a single-point-of-failure dependency: an OpenAI API price change, service
              disruption, policy update, or contractual renegotiation could degrade or disable the
              AI-enhanced differentiation that Preply used to justify its $1.2B valuation.

              AI safety controls for Scenario Practice rely on prompt-level guardrails and a supervisor
              agent, with no independent third-party audit reported. This is particularly significant given
              the EU AI Act high-risk classification pathway: prompt-only guardrails are unlikely to
              satisfy the technical robustness and transparency requirements demanded under Article 9
              (risk management) and Article 13 (transparency for high-risk AI users).

              OpenAI's published API terms reserve the right to modify pricing, restrict use cases, or
              terminate access for policy violations. Given that Preply uses GPT for content moderation
              and student-facing interactions, any policy-level dispute (e.g., AI-generated inappropriate
              content triggering OpenAI review) could result in emergency API access suspension. Unlike
              infrastructure providers (AWS, GCP) where SLA obligations create contractual protection,
              OpenAI's API access is governed by its usage policies, which are asymmetric in favour of
              OpenAI.

              Platform reliability risk is compounded by Preply's video-lesson delivery model: unlike
              asynchronous content platforms, a technical outage immediately cancels real-time lessons.
              The infrastructure supporting video delivery (Preply Space) has its own reliability
              dependencies that are not publicly documented.
            claimRefs:
              - C262
              - C263
              - C262
              - C262
              - C284
      - number: '7.4'
        title: Geopolitical and Operational Continuity Risk
        blocks:
          - type: paragraph
            body: |
              Preply maintains approximately 150 employees in its Kyiv, Ukraine office — roughly 20%
              of its global workforce of ~750. The ongoing Russia-Ukraine war creates elevated
              operational risk for this cohort: periodic missile and drone strikes on Kyiv cause power
              outages, disruptions to internet and telecom infrastructure, and safety emergencies that
              directly impair engineering, product, and support functions. Multiple documented
              infrastructure attacks occurred in 2024-2025, targeting Ukraine's energy grid and civilian
              telecommunications.

              The Kyiv office houses a disproportionate share of Preply's engineering talent, as the
              company explicitly committed to maintaining Ukrainian operations as a statement of
              resilience. This is strategically compelling but creates an unhedged geopolitical
              concentration that Western-European-headquartered or North-American-headquartered
              peers do not face. Competitor iTalki (US-based) and Cambly (US-based) lack this
              exposure.

              Preply has not publicly disclosed a formal business continuity or disaster recovery plan
              for the Kyiv office. No information is available on engineering workload coverage splits,
              cloud-based code and data offloading procedures, or rapid-relocation protocols. This gap
              is a material diligence ask: investors should require evidence that a 30-60 day Kyiv
              disruption could be absorbed by other engineering hubs (Barcelona, New York, London)
              without product roadmap slippage.

              Ukraine's mobilisation laws create an additional talent risk: male engineers in Ukraine
              are subject to military conscription, creating involuntary attrition that Preply cannot
              fully mitigate through compensation or retention programmes. The company has reportedly
              implemented psychological support, flexible remote-work options, and relocation assistance,
              but no quantified retention impact data is public.
            claimRefs:
              - C264
              - C265
              - C292
              - C291
      - number: '7.5'
        title: People and Execution Risk
        blocks:
          - type: paragraph
            body: |
              CEO Kirill Bigai is the primary public spokesperson, primary fundraising face, and
              strategic architect of the "human-led, AI-enhanced" positioning that defines Preply's
              investor thesis. His departure — through resignation, health, or external acquisition —
              would create strategic ambiguity at precisely the moment the company must execute on a
              $150M deployment plan targeting AI infrastructure and international expansion. No formal
              public succession plan exists; the distributed leadership team (Pallain/COO, Crossick/CPO,
              Kingkade/CRO, Tavares/CBO) provides operational continuity but not equivalent strategic
              vision-holder capability. Board-level oversight now includes WestCap's Allen Mask, who
              brings marketplace-scaling experience from Airbnb, which partially dilutes the key-person
              risk in governance — but CEO succession at a $1.2B company requires a named pathway.

              Employee Glassdoor/Indeed data (3.9/5 culture, but 2.7/5 pay and 2.7/5 job
              security/advancement) reveals meaningful workforce satisfaction risk — particularly for
              tutors and mid-level employees. Tutor attrition is structurally likely as experienced
              tutors reach lower commission tiers (18% at 800+ hours) and may migrate to competing
              platforms or self-source students using off-platform channels. The absence of exclusive
              tutor supply agreements means that improvements to competitor platforms (iTalki, Preply
              competitors with lower commission structures) can trigger immediate supply-side erosion
              without warning.

              Execution risk on the AI roadmap is elevated: Preply committed at its Series D to
              expanding AI and data capabilities, growing product/engineering headcount, and
              accelerating international expansion simultaneously. This is a three-vector expansion
              under a unified leadership team with limited public history of executing at unicorn scale.
              The shift from marketplace operator to AI-infrastructure-dependent platform requires
              capabilities (ML platform engineering, AI safety compliance, regulatory affairs) that are
              not clearly evidenced in the public team composition.
            claimRefs:
              - C278
              - C278
              - C287
              - C287
              - C279
      - number: '7.6'
        title: Financial, Competitive, and Partner Risk
        blocks:
          - type: paragraph
            body: |
              Preply's $1.2B valuation is unverifiable against current revenue metrics because post-2021
              ARR is entirely private. The most recent public data point — ~$50M ARR in 2021 (Sacra)
              with 51% YoY growth through 2022 — and the Series D announcement that revenue grew
              2.5x in 2024 allows only rough estimation. At $1.2B valuation and even generous 2.5x
              growth compounding from $50M, implied 2024 ARR could approach $125-200M; this would
              imply a 6-10x revenue multiple — reasonable for EBITDA-positive SaaS/marketplace but
              not margin-of-safety cheap for a newly minted unicorn in a compressed edtech multiple
              environment. If the valuation was set primarily by investor enthusiasm for the Ukraine-
              resilience narrative and AI positioning rather than by fundamental multiples, a down-round
              risk at the next liquidity event (M&A, IPO) is non-trivial.

              Preply's B2C commission model (~95% of revenue) concentrates financial exposure in
              consumer willingness-to-pay for live tutoring at $15-$25/hour average prices. The primary
              competitive threat is not direct price competition (Duolingo is free) but value-proposition
              substitution: if AI conversation tools become "good enough" for casual learners, demand
              for live human tutors shifts toward high-stakes professionals, compressing the addressable
              market at the margin Preply serves most efficiently.

              On the partner side, three structural dependencies require attention: (1) WestCap as single
              lead Series D investor creates governance concentration and potential misaligned-incentive
              risk at exit; (2) OpenAI as sole AI infrastructure provider (addressed in Section S703);
              (3) the payment rail stack (Stripe/Payoneer for tutor payouts) introduces payment network
              risk if a payout processor flags high tutor-count foreign wire volumes for compliance review.
              Tutor misclassification exposure — structurally analogous to Uber/Lyft precedents — remains
              the most underappreciated financial risk: reclassification of even 10% of active tutors in
              key jurisdictions could impose retroactive employment-benefit liabilities and force a
              fundamental business model redesign.
