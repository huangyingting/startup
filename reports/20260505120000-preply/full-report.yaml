              - C250
          - type: callout
            title: Top Diligence Asks Before Investment Commitment
            body: |
              1. EU AI Act gap analysis and August 2026 compliance roadmap.
              2. Independent employment counsel assessment of tutor classification under CA AB5 and
                 EU Platform Work Directive.
              3. Post-2021 revenue, ARR, and gross margin disclosure with audit trail.
              4. Kyiv office business continuity plan with scenario analysis.
              5. CEO succession framework approved by the board.
              6. SOC 2 Type II certification or equivalent cybersecurity audit.
              7. Full sub-processor list and SCC schedule covering OpenAI.
