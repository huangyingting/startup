  - id: diligence-framework
    title: Diligence Framework and Governance
    body: |
      Several structural diligence blockers prevent a definitive recommendation at the current
      evidence level. First, the revenue gap: no audited or management-verified ARR or net
      revenue figure exists in the public domain for any period after 2021. This is exceptional
      for a company at $1.2B valuation entering institutional-grade diligence processes; even
      private companies at this stage typically provide trailing revenue ranges in fundraising
      materials or secondary transactions. Second, the preference stack is undisclosed: Preply's
      cap table structure, liquidation preferences for Series A through D, anti-dilution
      provisions, and total preference overhang are unknown. If the $299M raised over the full
      history carries 1x liquidation preferences, common stockholders (including employees)
      require an exit above $299M to receive any proceeds; if preferences are participating,
      the bar is higher. Third, debt: the Series C extension included $28M in debt at undisclosed
      terms; any outstanding debt reduces equity value at exit. Fourth, board governance:
      confirmed board members are only Kirill Bigai and Allen Mask (WestCap); prior-round board
      seats for Horizon Capital, Hoxton Ventures, Reach Capital, and Owl Ventures are unconfirmed
      in public sources. Full board composition is material for assessing alignment and veto rights.

      The kill triggers that would break the investment thesis are: (1) revenue growth decelerating
      below 20% CAGR for two consecutive years post-Series D, (2) EBITDA turning negative again
      due to AI infrastructure cost scaling, (3) a significant tutoring platform disintermediation
      event (e.g., a major AI provider releasing a live-conversation tutor model that commoditizes
      the marketplace), (4) a geopolitical escalation affecting the Kyiv R&D hub resulting in
      >30% technical headcount loss, or (5) a regulatory ruling misclassifying tutors as employees
      in a major jurisdiction, materially altering the commission economics.
