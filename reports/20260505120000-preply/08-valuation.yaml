  - id: exit-readiness-recommendation
    title: Exit Readiness and Recommendation
    body: |
      Preply's exit pathway is the most underdisclosed dimension of the investment case. The
      company has not issued any public IPO signal, filed an S-1 or F-1, or engaged publicly
      with SPAC structures. Goldman Sachs' involvement as placement agent in the Series D
      maintains a pre-IPO bank relationship that is a precondition for a future public offering.
      WestCap's portfolio includes companies that have pursued IPO paths (Airbnb, where board
      member Allen Mask served as a senior executive); this investor alignment is a weak positive
      signal for eventual public-market orientation. For strategic M&A, the most credible
      acquirers would be: (1) enterprise learning platforms (Cornerstone, SAP SuccessFactors,
      Workday) looking to add live language as a module, (2) consumer tech platforms (Apple
      Education, Google Workspace), or (3) large online education aggregators (Chegg, which is
      reinventing around skilling and language per its 2025 Q4 letter — though its market cap is
      currently too small to fund an acquisition at this scale). None of these M&A paths have
      been signaled publicly.

      Recommendation: TRACK with medium confidence. The investment case for Preply is
      compelling from a platform quality, market positioning, and growth narrative standpoint.
      The EBITDA-positive status and the Series D structure (institutional syndicate, investment
      bank placement) are credibility signals that differentiate it from the majority of the
      lapsed EdTech unicorn cohort. However, the valuation is stretched against disclosed
      evidence: the $1.2B price implies an 8–15x revenue multiple on unverifiable revenue
      estimates, and the public comp universe (median 1.6x EV/Revenue for edtech) provides no
      support for the entry price without private access. A buy recommendation would require:
      (1) management accounts showing $120M+ ARR with 30%+ YoY growth, (2) NRR above 110%
      indicating strong expansion revenue, (3) gross margin above 60% confirming take-rate
      sustainability, and (4) a defined exit pathway with a credible timeline. Without those
      inputs, a responsible diligence outcome is to track progress and seek data room access
      before committing capital.
