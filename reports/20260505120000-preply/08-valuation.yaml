callouts:
  - calloutType: insight
    title: EBITDA Positive Is Rare and Real
    body: |
      Preply's EBITDA-positive status — confirmed by multiple independent news outlets citing
      company statements and confirmed by Indico Capital's managing partner in the Series D
      announcement — is genuinely unusual in the global private edtech cohort. Of the 14
      current HolonIQ EdTech unicorns, most are still growth-at-all-costs platforms. This
      milestone meaningfully reduces GoStudent-style distress risk in the near term.
    claimRefs:
      - C294
      - C295
      - C298
  - calloutType: risk
    title: GoStudent Precedent Is a Direct Warning
    body: |
      GoStudent, a 1-on-1 tutoring marketplace with near-identical commission mechanics to
      Preply, was valued at $3.2B at its 2021 peak and revalued by major investors to below
      $1B by November 2025 — removed from HolonIQ's list in the same update that added Preply.
      The revenue and retention dynamics that drove that re-rating are not publicly confirmed,
      but the pattern — high GMV, unclear unit economics, aggressive expansion, then
      compression — closely mirrors the opacity risks in Preply's current disclosure posture.
    claimRefs:
      - C308
      - C309
      - C310
  - calloutType: recommendation
    title: 'TRACK: Seek Data Room Before Committing Capital'
    body: |
      Recommendation is TRACK with medium confidence. The platform quality, market tailwinds,
      and EBITDA-positive status justify ongoing monitoring and a willingness to engage with
      management. However, the $1.2B entry price is stretched relative to all public edtech
      comparables, and a responsible buy call cannot be issued without audited or
      management-verified revenue, NRR, gross margin, and cap table documentation. Investors
      should request private data room access and anchor diligence on the revenue verification
      items in T806 before committing capital.
    claimRefs:
      - C293
      - C294
      - C299
      - C321
      - C325
  - calloutType: assumption
    title: Revenue Estimate Range Is Wide and Unverifiable from Public Sources
    body: |
      All revenue multiple calculations in this chapter use analyst extrapolations in the
      $80–150M range for 2024–2025. This is derived from Sacra's $50M 2021 base and
      compound growth scenarios consistent with the company's stated "51% growth in 2022"
      and "10x over five years" claims. The range is approximately 2x wide, meaning the
      implied multiple range (8x–15x) is also 2x wide. No reconciliation is possible
      without private data. Any diligence model treating a single point in this range
      as certain would be unsound.
    claimRefs:
      - C299
      - C300
      - C301
      - C317
