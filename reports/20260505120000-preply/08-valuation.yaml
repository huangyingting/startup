  - id: T805
    title: Thesis-Break and Kill Triggers
    columns:
      - Trigger
      - Threshold
      - Transmission to Thesis
      - Action Implication
    rows:
      - - Revenue growth deceleration
        - 2 consecutive years of < 20% YoY growth post-Series D
        - Undermines 8–15x implied multiple; makes even base scenario exit negative for common holders
        - Initiate structured exit or secondary sale; reassess hold position
      - - EBITDA reversal
        - Company reports EBITDA-negative in FY2026 or FY2027 due to AI infrastructure spending
        - Breaks the key differentiator from lapsed edtech peers; repeats GoStudent / Byju's pattern
        - Require management remediation plan with timeline; evaluate down-round risk
      - - AI tutoring commoditization
        - >-
          Major platform (Microsoft, Google, OpenAI, Duolingo) launches live AI tutor with comparable outcomes at
          <$10/month
        - Destroys the 18–33% commission take rate; tutors shift platforms or leave; learner CAC spikes
        - Immediately material; reassess moat and defensibility; exit within 12 months if confirmed
      - - Kyiv R&D disruption
        - >-
          Loss of > 30% of Kyiv technical headcount in a single event (direct strike, prolonged power failure,
          evacuation order)
        - Disrupts AI product roadmap and platform reliability; 150 Kyiv staff = ~20% global workforce
        - Monitor monthly; require evidence of geographic redundancy of Kyiv team roles
      - - Worker misclassification ruling
        - Adverse court or regulatory ruling in US, EU, or UK requiring tutors to be classified as employees
        - Fundamentally alters commission economics; gross margin compression of 15–25 percentage points
        - Immediate legal and commercial impact; would likely trigger a valuation impairment event
      - - Preference overhang activation
        - Exit value below $299M total raised, triggering liquidation preference cliff for common holders
        - Common holders (employees, seed) receive zero; option pool underwater; retention risk
        - Requires structural solution (recap, ratchet trigger, or negotiated common allocation)
    notes: >-
      Kill trigger thresholds are illustrative diligence thresholds, not contractual covenants. Worker misclassification
      risk has sector precedent: Uber/Lyft paid $500M+ in misclassification settlements in recent US and UK cases.
