  evidenceGaps:
    - type: private-evidence-only
      severity: blocking
      topic: Revenue and ARR disclosure
      missingEvidence: >-
        Audited or management-verified ARR / net revenue for any fiscal year after 2021; gross margin; NRR; segment
        revenue breakdown.
      whyItMatters: >-
        Without post-2021 revenue, the implied EV/Revenue multiple is a 2x-wide range (8–15x), making the valuation call
        highly uncertain. All scenario models are assumption-dependent.
      diligencePath: >-
        Request private data room with management accounts; seek secondary transaction confirmations; review any
        investor-level reporting package.
      relatedQuestionRefs:
        - RQ002
        - RQ003
        - RQ016
        - RQ017
      relatedTableRefs:
        - T803
        - T804
    - type: private-evidence-only
      severity: blocking
      topic: Cap table and preference stack
      missingEvidence: >-
        Full cap table with liquidation preferences, participation rights, anti-dilution, and EBRD covenant terms for
        all rounds including Series D.
      whyItMatters: >-
        Determines effective per-common-share economics at any given exit price; critical for assessing employee option
        value and downside scenario impact.
      diligencePath: Legal data room; board consent resolutions from Series D; cap table document request.
      relatedQuestionRefs:
        - RQ013
        - RQ025
      relatedTableRefs:
        - T806
    - type: missing-source
      severity: material
      topic: Debt facility terms (Series C $28M)
      missingEvidence: >-
        Interest rate, maturity, covenant package, and current outstanding balance of the $28M debt component in the
        July 2023 Series C extension; confirmation of whether Series D includes any debt.
      whyItMatters: >-
        Outstanding debt reduces equity value at exit and introduces covenant risk if EBITDA reverts; could trigger
        acceleration clauses if KPIs deteriorate.
      diligencePath: Credit agreement review; legal data room; direct management inquiry.
      relatedQuestionRefs:
        - RQ014
      relatedTableRefs:
        - T806
    - type: missing-source
