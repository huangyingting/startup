  - id: sec-5-4
    title: B2B Product and Enterprise Integration
    body: |
      Preply Business adds a dedicated enterprise product layer on top of the core marketplace.
      The B2B product targets L&D managers at companies deploying language training programs
      at scale (2,000+ companies as of 2025, including Unilever, Datadog, Miro, Delivery Hero,
      and CloudPay). Enterprise features include: SSO with Azure AD, Google, Okta, and SAML
      1.0/2.0 identity providers; SCIM-based automatic learner provisioning and deprovisioning;
      a Corporate Dashboard with real-time analytics covering learner activity, onboarding
      progress, lesson attendance, balance management, and skill development; company-level
      Goals & Skills Targets aligned to business objectives; bulk learner upload; and dedicated
      onboarding expertise with account management.

      The Corporate Dashboard design is notable for an L&D use case: admins can identify
      disengaged learners without learner-side burden, transfer unused lesson credits, and
      export data for compliance and HR reporting. The dashboard addresses the "prove ROI"
      problem for L&D buyers — it imports data into employer systems and supports upper-
      management conversations with engagement and outcome metrics. AI features (Lesson
      Insights, Daily Exercises, Scenario Practice) are available to B2B learners, with
      outcome tracking surfaced in the dashboard.

      Preply Business reports 3.5× engagement uplift vs group language classes, 92% of HR
      leaders would recommend, 97% of B2B learners feel more confident speaking English,
      and a 4.9/5 average tutor rating for corporate learners. Integration depth beyond
      SSO/SCIM (LMS connectors, HR system APIs beyond provisioning) is not publicly documented
      and represents a diligence gap for enterprise evaluations.
    claimRefs:
      - C181
      - C182
      - C183
      - C205
  - id: sec-5-5
    title: Trust, Privacy, Compliance, and Security
    body: |
      Preply's privacy and security posture is structured around GDPR compliance as the
      primary framework, with CCPA applicability for California users. The Privacy Policy
      (updated January 27, 2026, effective March 3, 2026) designates Preply, Inc. as
      data controller with a publicly listed DPO email (dpo@preply.com). EU Representative
      is Preply Europe Services SL in Barcelona; UK Representative is Preply UK Services Ltd
      in London. Preply engaged Legal Nodes as virtual DPO in a 5-year collaboration;
      the arrangement reflects a lean internal legal team supplemented by GDPR specialist
      expertise. Privacy by design and by default are articulated as goals.

      On authentication and access: Preply supports Google OAuth, Microsoft SSO, and
      Okta-based login. Two-factor authentication is offered via email and TOTP (software).
      The Nudge Security profile confirms Stripe and Braintree as payment processors and
      AWS as primary cloud host — reducing PCI scope concerns with tokenized payments. No
      public SOC 2 certification or ISO 27001 certification has been confirmed via the
      NudgeSecurity profile (listed as uncertified in those specific categories). No public
      bug bounty program is listed on HackerOne or Bugcrowd. No confirmed data breach or
      security incident at Preply in 2024–2025 was identified in authoritative breach
      catalogs or privacy news.

      Student data protection is an ongoing concern for an edtech platform processing
      lesson audio, transcripts, and learning-behavior data at scale. The AI feature suite
      (Lesson Insights, Scenario Practice) generates detailed transcripts and error-pattern
      data linked to learner identity. Preply's blog confirms iterative evaluation of AI
      output quality and safety guardrails — the Scenario Practice supervisor includes a
      safety banner mechanism for scenarios touching medical, legal, financial, or
      psychological domains. These controls are product-design-level rather than
      independently audited.
