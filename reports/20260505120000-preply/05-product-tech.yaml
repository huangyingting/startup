    summary: |
      Four-layer product architecture from infrastructure base to user-facing AI features.
      Layers illustrate the dependency chain from cloud and video infrastructure through
      the platform services to the AI product suite delivered to learners and tutors.
    data:
      layers:
        - label: Infrastructure Layer
          modules:
            - name: AWS Cloud (compute, storage, networking)
              detail: Primary cloud provider; global regions
            - name: Agora SDK (video/audio RTC)
              detail: 1:1 lesson real-time video and audio transport
            - name: LiveKit (Scenario Practice RTC)
              detail: Media transport for AI conversation coach sessions
        - label: Platform Services Layer
          modules:
            - name: Tutor Marketplace (discovery, matching, booking)
              detail: ML-assisted tutor matching and recommendation
            - name: Session Management (scheduling, payments)
              detail: Stripe + Braintree payments; lesson credit system
            - name: SCIM / SSO Identity (enterprise)
              detail: Azure AD, Okta, Google, SAML 2.0 provisioning
        - label: Classroom and Collaboration Layer
