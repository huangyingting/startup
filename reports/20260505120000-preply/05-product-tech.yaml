chapter:
  number: 5
  title: Product & Technology
  summary: |
    Preply operates a two-sided marketplace platform built around a browser-native and
    mobile virtual classroom (Preply Classroom) connecting learners with 100,000+ human
    tutors across 90+ languages. The platform's "human-led, AI-enabled" positioning
    distinguishes it from fully automated competitors: real-time video is powered by Agora
    and LiveKit SDKs; AI features launched in 2024–2025 include Lesson Insights (LLM-driven
    post-lesson summaries), Daily Exercises (personalized between-lesson activities), and
    Scenario Practice (a dual-agent avatar conversation coach using OpenAI Realtime). The
    engineering organization has achieved 90%+ AI coding tool adoption across 35 teams as
    of Q1 2026. Preply Business adds enterprise-grade SSO, SCIM provisioning, and a
    Corporate Dashboard for L&D managers. Privacy is managed under a 5-year virtual DPO
    arrangement with Legal Nodes; GDPR compliance is in place. Key unresolved gaps include
    published infrastructure reliability/uptime SLAs, detailed ML recommendation-engine
    documentation, AI feature engagement metrics, and cloud-spend ratios.
sections:
  - id: sec-5-1
    title: Product Suite and Customer Value Proposition
    body: |
      Preply's core product is a live, one-on-one language learning experience delivered
      through the Preply Classroom — a fully browser-based and mobile virtual classroom
      that eliminates the need for third-party video conferencing tools. The Classroom bundles
      video (multi-layout: spotlight and grid), real-time chat with file sharing, an interactive
      Whiteboard, a Canvas collaborative note-taking space, a structured Notes/lesson-summary
      panel, a vocabulary flashcard system (English, French, Spanish), and screen sharing into
      a single integrated session surface.

      The product suite is organized into four tiers: (1) Core Marketplace — tutor discovery,
      filtering, profile browsing with intro videos, trial-lesson booking, and schedule
      management; (2) Preply Classroom — the in-session experience; (3) AI Learning Tools —
      Lesson Insights, Daily Exercises, Scenario Practice, and the Teaching Assistant embedded
      in Canvas; (4) Preply Business — a B2B-only layer with SSO, SCIM provisioning, a
      Corporate Dashboard, company-level goals and skill-target setting, and bulk learner
      management.

      Learner-facing outcomes are measured against CEFR (A1–C2), subdivided into Preply
      sub-levels, with placement tests and level advancement tracking. The platform reports
      learners progress 3× faster than typical language-learning timelines, based on an
      Efficiency Study of learners completing 24+ lessons over 12 weeks. The Preply app
      (iOS + Android) had 5M+ downloads and a 4.7 rating with 56,000+ reviews on Google
      Play as of early 2026, confirming meaningful mobile distribution. The product
      deliberately avoids gamification mechanics (streaks, leaderboards, points), contrasting
      with Duolingo's engagement-first model.
    claimRefs:
