callouts:
  - calloutType: strength
    title: Technically Differentiated AI Product Suite
    body: |
      Preply's dual-agent Scenario Practice architecture (Conversational Agent + Supervisor
      at temperature 0.0 on gpt-4.1-mini) is a technically sophisticated implementation
      that goes significantly beyond wrapper-level LLM integration. The engineering blog
      disclosure of LiveKit + OpenAI Realtime coordination, CEFR-calibrated prompt payload,
      and deterministic supervisor design demonstrates genuine ML engineering depth uncommon
      in EdTech at this scale.
    claimRefs:
      - C176
      - C177
      - C178
      - C203
      - C204
  - calloutType: strength
    title: 90%+ AI Coding Adoption Compounds Internal Velocity
    body: |
      With 90%+ weekly AI coding tool adoption across all 35 engineering teams, 500,000+
      accepted AI code lines/month, and 4.88 hrs/week average engineer savings, Preply
      has an internal velocity advantage that compounds product iteration speed —
      delivering future product improvements with an increasingly productive engineering org.
    claimRefs:
      - C186
      - C187
      - C188
  - calloutType: risk
    title: OpenAI Concentration Risk in AI Product Spine
    body: |
      Lesson Insights, Daily Exercises, Scenario Practice, and the Teaching Assistant all
      rely on OpenAI's API (GPT models and OpenAI Realtime). API pricing changes, rate
      limits, model deprecations, or OpenAI service disruptions would directly impact
      Preply's core AI product differentiation. No multi-provider fallback is documented
      in public sources.
    claimRefs:
      - C177
      - C178
      - C199
  - calloutType: risk
    title: AI Safety Controls Are Prompt-Level, Not Independently Audited
    body: |
      Preply's AI safety in Scenario Practice relies on prompt-level guardrails and a
      supervisor agent with a safety banner mechanism. The engineering blog explicitly
      distinguishes "prompt-level contracts" from "runtime-enforced guarantees." No
      third-party AI safety audit, red-team disclosure, or bias testing report is publicly
      available — a material gap given that Preply processes minor learners' language
      sessions.
    claimRefs:
      - C176
      - C177
      - C193
      - C206
  - calloutType: insight
    title: Human-Led Positioning Is a Technology Strategy, Not Just Marketing
    body: |
      The "human-led, AI-enabled" model is operationalized in the product architecture:
      AI tools reduce tutor admin burden while routing all instructional authority through
      the human tutor. This creates a defensible moat against fully automated alternatives
      and aligns the AI product roadmap with, rather than against, the tutor supply side.
    claimRefs:
      - C174
      - C175
      - C180
      - C195
      - C196
  - calloutType: assumption
    title: Microservices Architecture Inferred; Full Stack Not Confirmed
    body: |
      The microservices claim is derived from engineering blog architecture patterns and
      the diversity of distinct services visible in the NudgeSecurity supply-chain profile.
      Preply has not published a formal architecture whitepaper. Direct diligence should
      confirm infrastructure topology, redundancy design, and SLA commitments.
    claimRefs:
      - C185
