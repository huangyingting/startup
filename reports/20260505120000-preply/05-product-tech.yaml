  evidenceGaps:
    - type: private-evidence-only
      severity: material
      topic: AI feature engagement and adoption metrics
      missingEvidence: >-
        DAU/MAU and adoption rates for Lesson Insights, Daily Exercises, and Scenario Practice among active learners and
        tutors; completion and retention impact data.
      whyItMatters: >-
        Without engagement metrics, it is impossible to assess whether the AI suite is driving incremental retention and
        outcome improvement or is a low-adoption feature overlay.
      diligencePath: >-
        Request cohort engagement data from Preply investor/management team. Ask for percentage of completed lessons
        that generate a Lesson Insights view, and daily exercise completion rates.
      relatedQuestionRefs:
        - RQ517
    - type: missing-source
      severity: material
      topic: ML recommendation algorithm design
      missingEvidence: >-
        No published technical description of Preply's tutor recommendation/matching ML model architecture, training
        data, accuracy metrics, or update cadence.
      whyItMatters: >-
        Matching quality is a core product differentiator on a two-sided marketplace; a poor or opaque algorithm is a
        moat risk.
      diligencePath: >-
        Request ML system documentation or a technical briefing from Preply's ML/data team. Check engineering blog for
        any future publications.
      relatedQuestionRefs:
        - RQ509
    - type: missing-source
      severity: material
      topic: Infrastructure reliability and uptime SLAs
      missingEvidence: No publicly published uptime history, SLA commitments, or status page with historical incident data.
      whyItMatters: >-
        Real-time video tutoring is highly availability-sensitive; platform outages directly impact lesson completion
        and tutor earnings.
      diligencePath: >-
        Request infrastructure reliability metrics (uptime %, mean time to recover) from engineering leadership.
        Identify whether a status page exists at status.preply.com.
      relatedQuestionRefs:
        - RQ511
    - type: private-evidence-only
      severity: material
      topic: SOC 2 and ISO 27001 certification status
      missingEvidence: >-
        SOC 2 Type II and ISO 27001 certification status for Preply could not be confirmed via NudgeSecurity profile or
        public sources.
      whyItMatters: >-
        Enterprise B2B customers increasingly require SOC 2 or ISO 27001 for vendor approval. Absence of confirmed
        certification is a material B2B sales-cycle risk.
      diligencePath: >-
        Request SOC 2 Type II report or ISO 27001 certificate directly from Preply security/legal team. Check Preply's
        security page if published.
      relatedQuestionRefs:
        - RQ513
    - type: enumeration-incomplete
      severity: minor
      topic: Tech Radar full technology list
      missingEvidence: >-
        The Preply Tech Radar page is JavaScript-rendered; specific technology names in Adopt/Trial rings could not be
        fully enumerated from plain-text fetch.
      whyItMatters: >-
        Tech Radar content signals precise technology choices (frameworks, databases, observability tools) relevant to
        assessing platform scalability and migration risk.
      diligencePath: >-
        Access the interactive Tech Radar at tech-radar.preply.com with a JavaScript-enabled browser, or request a
        technology inventory from the engineering team.
      relatedTableRefs:
        - T503
      relatedQuestionRefs:
        - RQ518
    - type: missing-source
      severity: minor
      topic: LMS connector depth and HR integration APIs
      missingEvidence: >-
        Documentation for LMS integrations beyond SSO/SCIM (e.g., Workday, SAP SuccessFactors, Cornerstone) is not
        publicly available.
      whyItMatters: >-
        Enterprise B2B deals often require LMS or HRIS integration; limited connector depth could constrain addressable
        enterprise market.
      diligencePath: Request integration roadmap and list of certified LMS/HRIS connectors from Preply Business product team.
      relatedQuestionRefs:
        - RQ508
    - type: missing-source
      severity: minor
      topic: Backend microservices architecture confirmation
      missingEvidence: >-
        Preply's use of cloud-native microservices has not been confirmed in any public engineering documentation. Only
        NudgeSecurity SaaS profile lists AWS as the cloud provider without architectural detail.
      whyItMatters: >-
        Confirmed microservices architecture supports scalability, modular AI integration, and platform reliability
        assessments relevant to product-tech diligence.
      diligencePath: >-
        Review Preply engineering blog for architecture posts; request a technical briefing on the platform's backend
        design from engineering leadership.
      relatedQuestionRefs:
        - RQ519
