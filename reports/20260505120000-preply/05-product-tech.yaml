  - id: sec-5-2
    title: Platform Architecture and Technology Stack
    body: |
      Preply operates a cloud-native microservices architecture on AWS, as evidenced by the
      NudgeSecurity supply-chain profile which shows AWS as the primary hosting provider
      alongside Google Workspace for internal tooling. The real-time video and audio layer
      uses Agora's SDK for 1-on-1 lessons and LiveKit for the newer Scenario Practice
      conversational AI feature — the Preply Engineering Blog confirmed a LiveKit-backed
      worker for Scenario Practice in April 2026. Agora is documented in a partner case
      study as providing low-latency global video infrastructure for Preply's lesson sessions.

      The technology supply chain includes: Stripe and Braintree for payments, HubSpot for
      CRM, Intercom for in-app support chat, Mailchimp and SendGrid for email, Greenhouse
      for recruiting, and Branch for mobile attribution. Frontend development uses
      React-family tooling (inferred from engineering blog patterns); DevOps leverages
      Docker/Kubernetes-style containerization (inferred from microservices architecture and
      Tech Radar references). Preply maintains a public Tech Radar (built on the Zalando
      Tech Radar framework) that signals technology decisions across four rings: Adopt, Trial,
      Assess, and Hold — used both for internal alignment and candidate communication.

      The AI layer uses OpenAI models (GPT family, OpenAI Realtime) for LLM tasks including
      Lesson Insights generation, Teaching Assistant prompts, and the Scenario Practice
      Conversational Agent. The Supervisor Agent within Scenario Practice runs on
      gpt-4.1-mini at temperature 0.0 for deterministic session-state management. STT
      (Speech-to-Text) and TTS (Text-to-Speech) services flank the OpenAI Realtime worker,
      with LiveKit coordinating media transport and event signaling to mobile clients.
    claimRefs:
