  - id: sec-5-3
    title: AI Engine, Differentiation, and Data Flywheel
    body: |
      Preply's core technological differentiation is its "human-led, AI-enabled" model: AI
      automates administrative and content-generation tasks for tutors while keeping human
      instruction at the center. This contrasts sharply with Duolingo's April 2025 "AI-first"
      pivot. Three AI products launched in 2024–2025 constitute the current AI product suite.
      Lesson Insights uses LLMs (from OpenAI) to analyze lesson transcripts and generate
      personalized post-session summaries covering three pillars: Vocabulary (new words,
      synonyms), Grammar (corrections, error patterns), and Speaking (pace, pronunciation).
      Tutors receive administrative time savings; learners receive actionable CEFR-aligned
      feedback. Daily Exercises auto-generate between-lesson practice activities aligned to
      lesson content and learner focus areas. Scenario Practice immerses learners in real-world
      scenarios (café, job interview, hotel complaint) via an avatar persona powered by a
      Conversational Agent (in-character dialogue, CEFR-calibrated) and a silent Supervisor
      Agent (task state, hint overlays, safety banner) running in parallel.

      The dual-agent architecture for Scenario Practice is technically notable: the persona
      prompt payload includes CEFR level with can-do statements, ambient context, learner
      tasks in XML tags, topic text, and complexity guidelines — enabling B1 and A2
      conversations to differ structurally, not just superficially. Temperature 0.0 on the
      supervisor is a hard engineering decision justified by the need for deterministic
      binary session-state choices. The Teaching Assistant inside Preply Canvas generates
      exercises and speaking prompts directly within the lesson workspace.

      The data flywheel: lesson transcripts, vocabulary tracking, error patterns, and
      progression data feed back into AI model refinement and tutor matching signals.
      Preply's engineering organization itself is an AI-native operation as of Q1 2026,
      with 90%+ weekly AI coding tool adoption across all 35 development teams, accepting
      over 500,000 AI-generated code lines in the preceding 30 days at 4.88 hrs/week
      average time savings per engineer — indicating internal productivity compounding
      alongside product AI deployment.
