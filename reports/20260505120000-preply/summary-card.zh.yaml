  topStrengths:
    - 在真人语言辅导品类里位置清晰，导师供给和语种覆盖都有规模。
    - 企业层带来更高黏性的收入，不再只是纯消费者 marketplace。
    - EBITDA 转正说法和 2026 年 1 月 Series D 显示经营确有进展，也说明投资人仍有信心。
    - 真人主导、AI 增强的定位，与只靠 app 的语言学习竞争者拉开差异。
    - 乌克兰运营韧性和持续留在 Kyiv，增强了管理层可信度。
  topRisks:
    - 2021 年之后没有公开收入数据能干净支撑当前估值倍数。
    - 毛利率、净留存率（NRR）、队列留存和 B2B 收入结构披露不足。
    - marketplace 质量控制、导师绕平台交易和订阅摩擦都可能压低留存。
    - 监管暴露横跨消费者订阅、导师用工分类、儿童安全、隐私和 AI 治理。
    - 2023 年债务额度和任何 Series D 优先权条款都不透明。
  unresolvedGaps:
    - 经审计的 2024-2025 年收入、ARR，以及消费者、B2B 和非语言产品之间的拆分。
    - 毛利率、获客成本（CAC）、回本周期、留存，以及导师 / 学员队列经济性。
    - 完整董事会构成、股权结构表条款，以及任何结构化投资人保护。
    - 企业客户集中度和流失动态的精确数据。
    - IPO 与战略出售之间，哪条退出路径更成熟的信号。
