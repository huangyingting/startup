companyProfile:
  summary: Preply is a Ukrainian-founded, US-headquartered language-learning marketplace that connects learners with live tutors and increasingly layers AI workflow tools around lesson delivery, tutor matching, homework, and progress tracking. The company appears to have reached meaningful scale in both consumer and enterprise language training, and its January 2026 Series D plus EBITDA-positive claim separate it from much of the struggling edtech cohort. The main underwriting problem is not whether the business is real; it is that public evidence still leaves too much uncertainty around revenue base, mix, margins, retention, and financing terms to make the unicorn valuation look comfortably supported.
  foundedDate: '2012-01-01'
  founders:
    - name: Kirill Bigai
      role: Co-founder, CEO
      background: Public-facing co-founder and chief executive who led the marketplace's shift from local tutoring discovery toward global online language learning.
      claimRefs: []
    - name: Dmytro Voloshyn
      role: Co-founder, CTO
      background: Technology co-founder associated with the platform, classroom, and AI product stack.
      claimRefs: []
    - name: Serge Lukianov
      role: Co-founder
      background: Founding team member still cited in company and third-party history, though current operating scope is less publicly disclosed.
      claimRefs: []
  foundingLocation: Kyiv, Ukraine
  headquarters: Brookline, Massachusetts, USA
  productSummary: Preply delivers live one-on-one language tutoring, enterprise language training, tutor discovery, scheduling, payments, messaging, and AI-supported lesson workflow tools in a single marketplace platform.
  customerFocus: Consumers learning languages plus enterprise L&D buyers that need workforce language training and reporting.
  businessModel: Tutor marketplace commissions, recurring prepaid lesson packages, and enterprise language-training contracts.
  stage: Series D private / late-stage edtech unicorn
  fundingStatus: January 2026 Series D of $150M at a $1.2B valuation, with roughly $299M disclosed cumulative funding including a 2023 debt facility.
  disclosureProfile: private-undisclosed
  claimRefs: []
