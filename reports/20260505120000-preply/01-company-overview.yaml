  - id: S5
    title: Adverse Signals and Risk Factors
    body: |
      Preply's tutor-side commercial policies have attracted documented criticism. Third-party
      review site Actual Fluency suspended its Preply recommendation in May 2023, citing forced
      free trial lessons (Preply retains 100% of the first lesson fee with each new student),
      a high tiered commission structure (33% initially, declining to 18%), and non-flexible
      subscription billing practices that cause credits to expire. Tutor community forums and
      review platforms (including Indeed and PissedConsumer) report patterns of unexplained
      account suspensions and frozen earnings, as well as disputes resolved in favor of students
      without perceived adequate investigation. The BBB and Trustpilot pages for Preply were
      access-blocked during this research and could not be directly reviewed. No major
      class-action lawsuits or government regulatory investigations were identified in public
      sources as of May 2026, and no significant company-wide layoffs were recorded. The
      company's continued operations in an active warzone (Kyiv) present geopolitical and
      business-continuity risk, though Preply has invested in infrastructure mitigation.
      The primary structural risk is concentrated key-person dependency on CEO Kirill Bigai,
      whose departure would likely reduce investor confidence in the platform's strategic
      direction. Preply's current revenue and ARR post-2021 remain undisclosed, limiting
      independent assessment of growth trajectory and valuation multiples.
