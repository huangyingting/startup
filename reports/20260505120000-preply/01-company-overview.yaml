  - id: S2
    title: Founders and Leadership
    body: |
      Preply was co-founded in 2012 by Kirill Bigai (CEO), Dmytro Voloshyn (CTO), and Serge
      Lukianov. Bigai remains the public face of the company and primary spokesperson; his
      extensive media engagement makes him a key-person dependency risk. Voloshyn leads
      engineering and technology strategy, overseeing the proprietary Preply Classroom and
      AI infrastructure. Lukianov's current operating role is not publicly confirmed beyond
      his co-founder title. The senior leadership team expanded significantly in 2023 when
      Preply established its New York office: Sofia Tavares joined as Chief Brand Officer
      (previously SVP of Brand at Delivery Hero; fluent in eight languages) and Jerry Kingkade
      joined as Chief Revenue Officer (formerly CRO at Flowspace and VP Sales at Houzz).
      Aurélien Pallain serves as Chief Operating Officer. Josh Crossick is Chief Product
      Officer. Keiran Dodd leads People & Talent. Toni Sfeir is VP of B2B. The board
      composition is partially undisclosed; confirmed members are Kirill Bigai and Allen Mask
      (Partner at WestCap, former Airbnb executive), who joined in January 2026 as part of
      the Series D. Other board representatives from earlier investor rounds have not been
      confirmed publicly, which is typical for late-stage private companies. The company
      reports 84% of employees would recommend Preply as a great place to work (2025
      internal engagement survey). Leadership changes have been incremental, with no
      material departures since 2023 found in public records. Preply's Ukrainian founding
      team maintained operations in Kyiv throughout Russia's full-scale invasion from
      February 2022 onward, a decision the CEO characterizes as reinforcing organizational
      resilience and creativity.
