company:
  name: Preply
chapter:
  number: 1
  title: Company Overview
  summary: |
    Preply is a two-sided online marketplace for live, one-on-one language learning, connecting
    100,000+ tutors with learners in 180 countries across 90+ languages. Founded in 2012 by
    Ukrainian entrepreneurs Kirill Bigai (CEO), Dmytro Voloshyn (CTO), and Serge Lukianov in
    Kyiv, the company pivoted from a local in-person tutoring directory (originally called
    FindGuru) to a global online platform in 2013. Preply is headquartered at 1309 Beacon
    Street, Suite 300, Brookline, Massachusetts, with primary operating hubs in Barcelona,
    New York, Kyiv, and London. In January 2026, Preply raised a $150 million Series D led
    by WestCap at a $1.2 billion valuation, achieving unicorn status and joining HolonIQ's
    Global EdTech Unicorn list. Total funding is approximately $299 million. The company
    became EBITDA-positive in the 12 months preceding the Series D. Goldman Sachs
    International served as sole placement agent. WestCap partner Allen Mask joined the
    board. Preply employs approximately 750 people of 62+ nationalities, with ~150 based in
    Kyiv despite Russia's ongoing war in Ukraine. Revenue was estimated at $50M in 2021 (Sacra)
    with 51% YoY growth in 2022; no post-2021 figure is publicly disclosed. Key unresolved
    gaps include: current ARR, full board composition, debt-facility terms, and B2B revenue
    share.
sections:
  - id: S1
    title: Identity and Business Model
    body: |
      Preply is a global online marketplace for live language learning, positioned as the world's
      largest platform for one-on-one tutor-led instruction. The company's platform connects
      learners with independent tutors for scheduled video lessons, supported by an AI-powered
      co-pilot suite that generates lesson summaries, creates personalized homework, and matches
      learners to optimal tutors via machine-learning algorithms. Preply defines its strategic
      positioning as "human-led, AI-enhanced"—a deliberate counterpoint to gamified or fully
      automated competitors such as Duolingo. The 2025 Efficiency Study, conducted with the
      nonprofit research organization LeanLab Education, reported that 96% of learners consider
      real human tutors essential to their progress and 97% stated real conversations were key to
      building confidence. The business model is commission-based: Preply retains 33% of tutor
      earnings for early sessions, declining to 18% once a tutor has accumulated 400 hours on
      the platform; the first trial lesson fee with each new student is retained in full by Preply.
      Preply's B2B segment, Preply Business, serves 2,000+ companies globally including Unilever
      and Datadog, offering managed language-training programs with progress dashboards. The
      company is incorporated in the United States (Massachusetts), though its operational origins
      and a significant R&D presence remain in Kyiv, Ukraine. Press materials describe the company
      as "founded in the United States in 2012," while independent sources including Wikipedia and
      The Recursive describe it as originally founded in Kyiv. The discrepancy likely reflects US
      incorporation timing rather than operational origin.
