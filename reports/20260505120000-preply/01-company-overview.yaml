  - id: S4
    title: Operational Scale and Milestone Trajectory
    body: |
      Preply's operational metrics as of January 2026 are: 100,000+ tutors, 180 countries
      served, 90+ languages offered, approximately 750 employees. The company reports having
      more than tripled the number of bookable tutors since its Series C in 2022 (from
      approximately 35,000 tutors at the time of the 2023 Horizon Capital announcement to
      100,000+ by January 2026) and expanded its language catalog by over 40 new languages
      in the same period. Revenue was estimated at $50 million in 2021 by Sacra, with an
      estimated 51% YoY growth rate in 2022; no official post-2021 figure is publicly
      available. The company achieved EBITDA positivity in the twelve months preceding the
      January 2026 Series D announcement, a milestone the CEO characterized as enabling the
      raise from a position of strength rather than necessity. Preply's B2B segment
      (Preply Business) has grown significantly: as of early 2026, over 2,000 companies use
      the platform, with 92% of learners reporting improved work performance. Milestone
      highlights include: the 2019 migration of all lessons from Skype onto the proprietary
      Preply Classroom; the 2020 pandemic-driven 4x revenue surge with US market entry;
      the October 2023 New York headquarters opening and company rebrand; and the January
      2026 unicorn milestone. Preply maintained its Kyiv office and approximately 150 staff
      throughout Russia's ongoing war, operating 24/7 with generators and satellite internet.
