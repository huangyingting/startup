  - calloutType: strength
    title: Human-Led, AI-Enhanced Differentiation
    body: >
      Preply's deliberate "human-first, AI-enabled" positioning is backed by its 2025 Efficiency Study showing 96–97% of
      learners value real human instruction. This stands in contrast to fully automated competitors and creates a
      defensible premium segment. Since Series C, tutor count has more than tripled while 40+ new languages were added,
      demonstrating supply-side scalability alongside quality positioning.
    claimRefs:
      - C036
      - C038
  - calloutType: strength
    title: EBITDA Profitability at Unicorn Scale
    body: >
      Preply achieved EBITDA positivity in the twelve months before raising at a $1.2B valuation, a rare combination for
      edtech. This signals sustainable unit economics and reduced dependency on external capital to fund operations. It
      substantially strengthened the company's negotiating position in the Series D, as evidenced by the premium
      valuation.
    claimRefs:
      - C017
  - calloutType: risk
    title: Revenue and ARR Not Publicly Disclosed
    body: >
      No official revenue or ARR figure has been published for years beyond the Sacra 2021 estimate of $50M. Without a
      current run-rate, valuation multiples cannot be independently assessed. This is a key diligence gap for any
      investor evaluating the $1.2B valuation.
    claimRefs:
      - C043
  - calloutType: risk
    title: Key-Person Dependency — Kirill Bigai
    body: >
      Bigai is the sole public spokesperson, primary board representative, and strategic decision-maker. His departure
      would carry significant reputational and strategic risk. Dmytro Voloshyn represents a secondary dependency in the
      engineering and AI domain. Board composition beyond these two founders and one VC representative is undisclosed.
    claimRefs:
      - C018
      - C044
  - calloutType: insight
    title: Ukrainian Wartime Resilience as Investor Signal
    body: >
      Preply's maintenance of a 150-person Kyiv office through Russia's ongoing invasion has become a differentiating
      narrative for investors — signaling crisis management capability, cost structure discipline (Eastern European
      engineering talent), and mission authenticity. WestCap and HolonIQ have both highlighted this as a positive
      signal.
    claimRefs:
      - C042
  - calloutType: assumption
    title: 'Total Funding: $299M vs. $321M Discrepancy'
    body: >
      Official Preply and reporting sources cite $299M as total funding after the Series D. Tracxn lists $321M for the
      same period. The discrepancy likely reflects whether debt instruments and smaller tranches are included. This
      report uses $299M per the company's own press release and TechCrunch/Tech.eu coverage. Diligence should confirm
      the capitalization table directly.
    claimRefs:
      - C009
