  - id: FU001
    title: Preply 客户旅程图
    type: journey-map
    layout: wide
    summary: |
      呈现 B2C 个人学员和 B2B 企业买家从发现到扩张的完整旅程，标出每个阶段的 AI 触点与留存抓手。
    data:
      items:
        - label: B2C — 发现
          description: 自然搜索（逾 1,000 个 SEO 页面、50+ 语言）、App Store、品牌直接召回
          note: 约 66% 的访问为直接流量，说明品牌认知度高
        - label: B2C — 引导入门
          description: 语言水平测评、教师主页浏览、试课（100% 满意保障）
          note: 试课是 B2C 主要转化入口
        - label: B2C — 激活
          description: 首次付费订阅（28 天计划，每周 1–8 节课）；制定个性化课程方案
          note: 教师与学员的匹配是核心产品差异点
        - label: B2C — 留存与 AI 互动
          description: Lesson Insights（AI 总结）、Daily Exercises（AI 练习）、Scenario Practice（AI 教练）
          note: 课间 AI 工具通过维持活跃度降低流失率
        - label: B2C — 扩张
          description: 加购语言课程、升级套餐、雇主资助加入 Preply Business
          note: 通过雇主资助实现 B2C 转 B2B 交叉销售，属于已记录的扩张路径
        - label: B2B — 评估与签约
          description: SDR / CRO 主动外拓或入站演示；与 L&D / HR 完成企业合同签署
          note: 专属入职专家；SSO/SCIM 配置；目标对齐
        - label: B2B — 部署与激活
          description: 按岗位 / 级别分批注册；L&D 管理员激活企业仪表板
          note: 进度追踪持续呈现技能提升情况
        - label: B2B — 扩张
          description: 从部门层面扩展至全企业；增加语言或地理覆盖
          note: Delivery Hero：2 年以上合作期内员工数指数级增长
    approximationNotes: 旅程阶段依据 Preply 官方产品页面、案例研究及新闻来源推断。各阶段间的转化率未公开披露。
    claimRefs:
      - CU004
      - CU014
      - CU023
