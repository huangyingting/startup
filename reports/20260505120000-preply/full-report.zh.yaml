      - number: '5.5'
        title: 信任、隐私、合规与安全
        blocks:
          - type: paragraph
            body: >
              Preply 的隐私和安全姿态以 GDPR 合规为主要框架，并适用面向 California 用户的 CCPA。隐私政策（更新于 January 27, 2026，生效于 March 3, 2026）指定
              Preply, Inc. 为数据控制者，并公开列出 DPO 邮箱（dpo@preply.com）。EU 代表是 Barcelona 的 Preply Europe Services SL；UK 代表是
              London 的 Preply UK Services Ltd。Preply 与 Legal Nodes 建立为期 5 年的合作，由其担任虚拟 DPO；这种安排反映出精简的内部法务团队由 GDPR
              专家能力补强。设计即隐私和默认隐私被明确为目标。


              在认证和访问上，Preply 支持 Google OAuth、Microsoft SSO 和基于 Okta 的登录。双因素认证通过邮箱和 TOTP（软件令牌）提供。Nudge Security 画像确认
              Stripe 和 Braintree 是支付处理方，AWS 是主要云主机；支付 token 化降低了 PCI 范围顾虑。NudgeSecurity 画像未确认公开 SOC 2 认证或 ISO 27001
              认证（这些具体类别列为未认证）。HackerOne 或 Bugcrowd 上没有列出公开漏洞赏金计划。权威泄露目录或隐私新闻中未识别出 Preply 在 2024–2025 年发生已确认数据泄露或安全事件。


              对一个大规模处理课程音频、转录和学习行为数据的教育科技平台而言，学生数据保护是持续关注点。AI 功能套件（Lesson Insights、Scenario
              Practice）会生成与学习者身份绑定的详细转录和错误模式数据。Preply 博客确认，其会迭代评估 AI 输出质量和安全护栏——Scenario Practice Supervisor
              包含面向医疗、法律、金融或心理场景的安全横幅机制。这些控制停留在产品设计层面，而非独立审计层面。
