      - number: '7.5'
        title: 人员与执行风险
        blocks:
          - type: paragraph
            body: >
              CEO Kirill Bigai 是主要公开发言人、主要融资面孔，也是定义 Preply 投资论点的“人类主导、AI 增强”定位的战略架构师。他若因辞职、健康或外部收购离任，会在公司必须执行 $150M
              部署计划、同时押注 AI
              基础设施和国际扩张的关键时点制造战略模糊性。公司没有正式公开继任计划；分布式领导团队（Pallain/COO、Crossick/CPO、Kingkade/CRO、Tavares/CBO）提供运营连续性，但不具备等同的战略愿景承载能力。董事会层面的监督现在包括
              WestCap 的 Allen Mask，他拥有来自 Airbnb 的市场平台规模化经验，部分稀释了治理中的关键人物风险；但一家 $1.2B 公司处理 CEO 继任，需要有具名路径。


              Glassdoor/Indeed 员工数据（文化 3.9/5，但薪酬 2.7/5、工作安全 / 晋升
              2.7/5）暴露出有意义的员工满意度风险，尤其是导师和中层员工。导师流失在结构上很可能发生：有经验导师到达较低佣金档位（800+ 小时后
              18%）后，可能转向竞争平台，或利用平台外渠道自行获客。没有独家导师供给协议，意味着竞争对手平台（iTalki，以及佣金结构更低的 Preply 竞争对手）一旦改善，就可能在没有预警的情况下触发供给侧快速侵蚀。


              AI 路线图执行风险较高：Preply 在 Series D 时承诺同时扩展 AI 和数据能力、扩大产品 /
              工程人员，并加速国际扩张。这是一个统一领导团队同时推进的三向量扩张，而其公开历史中缺乏在独角兽规模执行的证据。从市场平台运营商转向依赖 AI 基础设施的平台，需要 ML 平台工程、AI
              安全合规、监管事务等能力，但公开团队构成并未清楚证明这些能力。
            claimRefs:
              - CR031
              - CR031
              - CR040
              - CR040
              - CR032
      - number: '7.6'
        title: 财务、竞争与合作伙伴风险
        blocks:
          - type: paragraph
            body: >
              Preply 的 $1.2B 估值无法用当前收入指标验证，因为 2021 年后的年经常性收入（ARR）完全未公开。最新公开数据点只有 2021 年约 $50M ARR（Sacra）以及 2022 年同比增长
              51%；Series D 公告又称 2024 年收入增长 2.5x，这些信息只能支持粗略估算。按 $1.2B 估值，即便从 $50M 起算并慷慨采用 2.5x 复合增长，隐含 2024 年 ARR 可能接近
              $125-200M；对应收入倍数为 6-10x——对 EBITDA 为正的 SaaS /
              市场平台算合理，但在教育科技估值倍数被压缩的环境里，对一家刚晋级独角兽的公司并不算有安全边际。如果估值主要由投资人对乌克兰韧性叙事和 AI
              定位的热情推高，而不是由基本面倍数支撑，下一次流动性事件（M&A、IPO）中的估值下修风险不可忽视。


              Preply 的 B2C 佣金模式（约 95% 收入）把财务暴露集中在消费者是否愿意为真人辅导支付平均 $15-$25/小时。主要竞争威胁不是直接价格战（Duolingo 免费），而是价值主张被替代：如果 AI
              对话工具对休闲学习者已经「够用」，真人导师需求会转向高利害专业人群，压缩 Preply 最擅长服务的边际可触达市场。


              合作伙伴侧有三项结构性依赖需要关注：（1）WestCap 是 Series D 唯一领投方，带来治理集中和退出时潜在激励错位风险；（2）OpenAI 是唯一 AI 基础设施提供方（见
              S703）；（3）支付轨道栈（Stripe/Payoneer 用于导师打款）带来支付网络风险——如果打款处理方因大量导师跨境汇款触发合规审查。导师错误分类风险在结构上类似 Uber/Lyft
              先例，仍是最被低估的财务风险：哪怕关键司法辖区只有 10% 活跃导师被重新分类，也可能带来追溯性雇佣福利负债，并迫使商业模式从根上重做。
