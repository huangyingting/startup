      - number: '7.5'
        title: 人员与执行风险
        blocks:
          - type: paragraph
            body: >
              CEO Kirill Bigai 是公司首要公众发言人、主要融资面孔，也是定义 Preply 投资逻辑的"以人为主、AI 赋能"定位的战略设计者。其离任——无论是辞职、健康原因还是被外部收购——将在公司必须执行
              $150M 部署计划（含 AI
              基础设施建设与国际扩张）的关键时刻引发战略不确定性。目前无正式公开的继任计划；分布式领导团队（Pallain/COO、Crossick/CPO、Kingkade/CRO、Tavares/CBO）能保障运营连续性，但无法提供等效的战略愿景承载能力。董事会层面，WestCap
              的 Allen Mask 带入了来自 Airbnb 的市场平台扩张经验，在治理层面部分稀释了关键人风险——但 $1.2B 公司的 CEO 继任需要明确的接班路径。


              Glassdoor/Indeed 员工数据（文化评分 3.9/5，但薪酬 2.7/5、工作安全感/晋升 2.7/5）揭示了不可忽视的员工满意度风险，尤其对教师和中层员工而言。随着有经验的教师达到较低佣金档位（超
              800 小时后降至
              18%），教师流失在结构上不可避免，部分人可能迁移至竞争平台或通过平台外渠道自行招揽学生。缺乏独家教师供给协议意味着竞争平台（iTalki、佣金结构更低的竞争对手）的改进可即时触发供给侧流失，且毫无预警。


              AI 路线图上的执行风险偏高：Preply 在 D 轮融资时承诺同步扩展 AI
              与数据能力、扩充产品/工程团队并加速国际扩张，这是在一套统一领导班子下同时推进三个方向，而该团队在独角兽规模执行方面的公开记录有限。从市场平台运营商向依赖 AI 基础设施的平台转型，需要机器学习平台工程、AI
              安全合规和监管事务等能力，而这些在公开的团队构成中尚无清晰体现。
