      - number: '4.4'
        title: 公开牵引力与指标缺口
        blocks:
          - type: paragraph
            body: |
              Preply 最新经第三方验证的收入数字为 2021 年的 5,000 万美元，同比增长 39%（Sacra 估算）。Sacra
              还报告 2022 年收入增速约 51%，意味着 2022 财年约为 7,500 万美元。在 2023 年 7 月 C-II 轮融资
              背景下，CEO Kirill Bigai 披露"过去三年销售额增长了十倍"——若以 2020 年为基准，该数字意味着
              2022—2023 年累计增长至估计的 8,000 万至 1.3 亿美元区间（取决于基准年份的选择）。包括 Sacra 在
              内的分析师基于持续两位数复合年均增速的外推，将 2023—2025 年收入估算在 8,000 万至 1.5 亿美元
              区间，但无官方数据公开。

              平台规模方面：截至 2022 年，Preply 拥有 80 万学习者；据 D 轮新闻稿，至 2026 年 1 月活跃导师数
              已超 10 万——是 C 轮时的三倍以上。Preply 未公开披露净留存率（NRR）、月度商品交易总额（GMV）、
              毛利率、月活用户数或流失率。基于已发布的收入估算和约 18—33% 的混合抽成率，隐含 GMV 区间约为
              2022—2024 年的 2.5 亿至 4.5 亿美元。对于一家达到独角兽估值的公司而言，这是重大的透明度缺口，
              任何承销模型都需要获取管理层账目。

              Preply 2025 年效能研究（与 LeanLab Education 联合开展）显示，学习者进步速度比基准快三倍，三
              分之一的学员在 12 周内提升了完整的 CEFR 等级——这是衡量学习深度的定性指标，但不能替代队列留存
              数据。
            claimRefs:
