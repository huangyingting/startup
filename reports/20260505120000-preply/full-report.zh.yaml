      - number: '4.3'
        title: 成本结构与利润动态
        blocks:
          - type: paragraph
            body: |
              Preply 的成本结构具有高接触度零工市场的典型特征：最大的可变成本——导师结算、支付处理和客户支持
              ——与商品交易总额（GMV）直接挂钩。按净收入（扣除导师结算后）计算，Preply 的抽成比例为总交易价值
              的 18—33%，基于实际导师收入数据，成熟导师的有效混合抽成率约为 15.5—22%。扣除支付处理费（通过
              Stripe 等服务商处理国际信用卡交易通常为交易额的 3—5%）后，固定成本前的有效净收入利润率进一步
              收窄。

              固定成本类别包括：（1）工程与产品（研发集中在乌克兰基辅，提供地域人力成本套利优势，但也带来
              战争相关的集中风险）；（2）销售与营销，考虑到市场持续需要学员和导师获取，这很可能是最大的运营
              开支；（3）云基础设施；（4）学习者和导师细分的客户成功支持。IFC 于 2023 年 12 月发布的新闻稿
              指出，Preply 已增长至 600 余名员工，来自 62 个国籍，在巴塞罗那、纽约和基辅设有办公室。

              Preply 佣金率水平下市场的结构性挑战在于：导师群体在资历最浅时承担最高成本，即新导师——也是
              质量波动风险最高的群体——实际上在补贴平台营销。仅付 18% 的成熟导师是平台供给侧的最优质资产，
              但单课时收入贡献也最低。D 轮前公告的 EBITDA 转正里程碑证实收入增速超越固定和可变成本增速，但
              具体毛利率数据仍属私密。同类双边教育科技市场的分析师基准显示，毛利率区间约为 65—80%（扣除支付
              处理费但含人员成本之前），EBITDA 利润率通常在收入规模达 5,000 万美元以上时转正。
            claimRefs:
              - CI019
              - CI020
              - CI021
              - CI022
              - CI026
