      - number: '3.3'
        title: 企业及职场语言培训竞品
        blocks:
          - type: paragraph
            body: |
              Berlitz Corporation 是企业语言培训市场的主导老牌机构，年收入估计约 11 亿美元，员工 4,533 人。
              凭借 145 年以上的运营历史，Berlitz 已建立起与政府及大型企业的采购关系，形成 Preply 短期内难以
              复制的渠道优势。Berlitz 的服务组合涵盖语言教学、文化培训、语言测评及翻译服务，服务全球企业和
              政府客户。其主要弱点是相对风险投资支持平台的数字产品创新较慢，以及缺乏消费端市场模式。

              goFLUENT 服务全球 100 余个国家的逾 2,000 家企业客户，2025 年年收入估算约 1.69 亿美元。其 2026
              年 1 月对 Learnship 业务的收购整合了欧洲竞争格局，并扩大了认证培训师网络。在合规认证及 HRIS/LMS
              集成深度上，goFLUENT 领先于 Preply Business。Speexx 2024 年营收 7,970 万美元（较 2023 年的
              5,480 万美元增长），而已披露风险投资融资仅约 1,090 万美元，显示出强劲的有机增长；其定位为面向
              1,800 余家机构、逾 800 万用户的人才发展平台。Busuu for Business（Macmillan Publishers 旗下）
              和 Rosetta Stone Enterprise（IXL Learning 旗下部门）分别以 12 门和 24 门语言在自学内容与应用
              交付上竞争，但均无法在规模上提供真正的一对一真人辅导——这正是 Preply Business 在企业销售中
              发挥的结构性差异化优势。
