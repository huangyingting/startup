      - number: '6.2'
        title: 用户增长轨迹与市场触达
        blocks:
          - type: paragraph
            body: >
              Preply 的整体平台触达以公司官方披露和第三方流量分析为依托。平台宣称拥有 100,000 余名教师、300,000 余条五星教师评价，学员遍布 180 个国家。截至 2026 年 3 月，月度网站访问量约
              2,500 万次（Semrush 数据），跻身全球语言学习平台第一梯队。美国占总流量 17–19%（约 470–480
              万次/月），是单一最大市场；其他主要市场包括英国（5–6%）、西班牙（5.9–7.2%）、波兰（3.8–5.2%）和意大利（约 4.5%），突显以英语国家和西欧为主的学员结构。


              移动端势头强劲：Preply Android 应用在 Google Play 已有 500 万 + 安装量，56,300 余条评价评分 4.7/5；iOS 应用有 40,000 余条 App Store
              评价，评分 4.8/5。直接访问约占全部网站访问量的 66%，表明用户品牌意识强、回访率高，而非单纯依赖付费获客。2023 年转向以高终身价值学员为目标的价值导向 Google Ads
              竞价策略，带来全球转化价值同比增长 25%、获客成本下降 10%——从追求学员数量到追求学员质量的明确战略转变。


              程序化 SEO 是重要的自然流量获客引擎：Preply 在 50 余种语言中维护超过 1,000 个搜索优化页面，每月产生数百万次自然访问。2024 年 Animalz
              案例研究记录了在此基础上维持增长的挑战，以及 Preply 的应对——以人物画像为导向的 SEO 拓展，目标受众从漏斗底部明确搜索课程页面的学员延伸至外籍人士、职场专业人士等相邻群体。2025 年 9 月在
              Axios 刊发的 CEO 专访确认，平台服务 100,000 余名教师，学员遍布 180 个国家，学员进步速度是行业标准的 3 倍。
