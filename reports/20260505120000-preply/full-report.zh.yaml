      - number: '1.4'
        title: 运营规模和里程碑轨迹
        blocks:
          - type: paragraph
            body: >
              截至 2026 年 1 月，Preply 的运营指标为：100,000+ 名导师、覆盖 180 个国家、提供 90+ 种语言、约 750 名员工。公司称，自 2022 年 Series C
              以来，可预约导师数量增加到三倍以上（从 2023 年 Horizon Capital 公告时约 35,000 名导师增至 2026 年 1 月的 100,000+），同期语言目录新增 40 多种语言。Sacra
              估计 2021 年收入为 $50M，2022 年同比增长约 51%；官方尚未公开 2021 年后的数据。公司在 2026 年 1 月 Series D 公告前 12 个月实现 EBITDA 转正，CEO
              称这一里程碑让公司是从实力位置融资，而非出于资金需求。Preply 的 B2B 分部（Preply Business）增长显著：截至 2026 年初，超过 2,000 家公司使用该平台，92%
              的学习者报告工作表现提升。关键里程碑包括：2019 年将所有课程从 Skype 迁移到自有 Preply Classroom；2020 年疫情驱动收入增长 4 倍并进入美国市场；2023 年 10 月 New
              York 总部开设和公司品牌重塑；以及 2026 年 1 月成为独角兽。俄罗斯战争仍在持续期间，Preply 保留 Kyiv 办公室和约 150 名员工，依靠发电机和卫星互联网 24/7 运转。
