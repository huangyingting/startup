      - 触发项
      - 阈值
      - 对投资论点的传导
      - 行动含义
    rows:
      - - 收入增长减速
        - Series D 轮后连续 2 年同比增长 < 20%
        - 削弱 8–15x 隐含倍数；即便基础情景退出也会让普通股持有人收益为负
        - 启动结构化退出或二级出售；重新评估持有仓位
      - - EBITDA 反转
        - 公司因 AI 基础设施支出在 FY2026 或 FY2027 披露 EBITDA 为负
        - 失去相对失速教育科技同行的关键差异点；重演 GoStudent / Byju's 路径
        - 要求管理层提交带时间表的修复计划；评估降估值融资风险
      - - AI 辅导商品化
        - 大型平台（Microsoft、Google、OpenAI、Duolingo）推出成效相当、价格 <$10/month 的实时 AI 导师
        - 摧毁 18–33% 抽佣率；导师迁移平台或离场；学习者 CAC 飙升
        - 一经确认即构成重大影响；重新评估护城河与可防御性；若确认，12 个月内退出
      - - Kyiv 研发中断
        - 单一事件导致 Kyiv 技术人员流失 > 30%（直接袭击、长期断电、疏散令）
        - 扰乱 AI 产品路线图和平台可靠性；150 名 Kyiv 员工 = 全球员工 ~20%
        - 按月监测；要求证明 Kyiv 团队岗位具备地域冗余
      - - 劳动者误分类裁决
        - 美国、欧盟或英国法院 / 监管作出不利裁决，要求将导师归类为雇员
        - 从根本上改变抽佣经济性；毛利率压缩 15–25 个百分点
        - 立即产生法律和商业影响；很可能触发估值减值事件
      - - 优先权悬垂触发
        - 退出价值低于累计融资 $299M，触发普通股持有人的清算优先权悬崖
        - 普通股持有人（员工、种子轮）归零；期权池水下；留存风险上升
        - 需要结构性方案（资本重组、棘轮触发，或协商普通股分配）
    notes: 终止触发项阈值是示意性尽调阈值，不是合同约束。劳动者误分类风险有行业先例：Uber/Lyft 在近期美国和英国误分类案件中支付了 $500M+ 和解金。
    claimRefs:
      - CV026
      - CV028
      - CV030
      - CV037
      - CV039
      - CV040
      - CV041
      - CV042
  - id: TV006
    title: 最终尽调问题清单
    columns:
      - 主题
      - 缺失证据
      - 重要性
      - 负责人或尽调路径
    rows:
      - - 收入验证
        - 2021 后经审计或管理层验证的年经常性收入（ARR）/ 净收入，并按板块拆分（B2C vs B2B）
        - 这是承销 8–15x 隐含倍数的必要条件；没有它，所有情景建模都依赖假设
        - 管理层数据室；请求经审计的 P&L
      - - 毛利率披露
        - 扣除导师付款和支付处理后、固定成本前的净收入率；按板块披露综合抽佣率
        - 决定市场平台经济性更接近 SaaS（60–80% 毛利率），还是传统市场平台（20–35%）
        - 管理层数据室；可比 Sacra 分析（付费墙）
      - - 净收入留存率（NRR）
        - 按学习者入组年份和 B2B 队列拆分的队列级 NRR；按板块拆分的流失率
        - NRR > 110% 会显著增强高溢价倍数的论证；低 NRR 则会确认收入更偏交易型，而不是经常性
        - 管理层数据室；请求投资人级别报告
      - - 优先权堆栈与股权结构表
        - 完整股权结构表，包含优先权条款、参与权、反稀释条款和总清算悬垂
        - 决定不同退出价格下普通股每股实际经济性；理解员工期权价值的关键
        - 法律数据室；向公司索取股权结构表文件
      - - 债务额度条款
        - Series C 轮 $28M 债务：到期日、利率、契约条款组合；Series D 轮结构中的任何债务
        - 存量债务会在退出时降低股权价值；若 EBITDA 反转，还会引入契约条款风险
        - 法律数据室；审阅信贷协议
      - - 董事会构成
        - 完整董事会构成，包括 Series A–C 轮投资人董事代表、独立董事和观察员权利
        - 治理结构决定一致性、否决权，以及强售 / 跟售机制
        - 公司治理文件；Series D 轮董事会同意决议
      - - Kyiv 运营韧性
        - Kyiv 枢纽的业务连续性计划；具备地域冗余的职能占比；战争相关事件保险覆盖
        - Kyiv 员工 150 人 = 全球员工 ~20%；中断风险持续且重大
        - 管理层访谈；保险保单审阅；BCP 文件
      - - OpenAI 依赖与成本结构
        - 当前 OpenAI API 支出；AI 功能的合同条款、定价和备用供应商
        - 单一 AI 供应商依赖同时带来成本风险和战略连续性风险；AI 成本占收入百分比会影响 EBITDA 轨迹
        - 管理层访谈；技术供应商尽调
      - - 退出路径与时间表
        - 投资人对 IPO vs M&A 偏好的约定；任何既有强售权或注册权时间表
        - 决定共同投资人的预期持有期和流动性路径
        - 审阅投资人协议；非正式核对投资人共识
      - - B2B 收入占比与增长
        - 2023 和 2024 绝对 B2B 收入；B2B NRR；ACV > $50K 的企业客户数
        - B2B 是利润率扩张引擎；Sacra 当前估算（约占收入 ~5%）太小，支撑不起 SaaS 溢价；需要验证
        - 管理层数据室；CRM 数据；续约率文件
    notes: 尽调问题按估值影响排序。第 1–3 项是从 TRACK 升级到 BUY 的前置条件。第 4–10 项是完整承销所必需，但单项不会阻断建议。
    claimRefs:
      - CV007
      - CV016
      - CV039
      - CV040
      - CV041
      - CV042
