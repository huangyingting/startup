      - number: '3.3'
        title: 企业和公司语言培训竞争对手
        blocks:
          - type: paragraph
            body: >
              Berlitz Corporation 是企业语言培训中的主导在位者，估计年收入约 $1.1B，员工 4,533 人。Berlitz 运营超过 145 年，已建立政府和大型企业采购关系，这种结构性分销优势是
              Preply 短期内无法复制的。Berlitz 的服务组合覆盖语言教学、文化培训、语言测试，以及面向全球企业和政府客户的翻译服务。其主要弱点是相较风险资本支持的平台，数字产品创新较慢，而且缺少消费者市场平台模式。


              goFLUENT 服务 100+ 个国家的 2,000+ 家企业组织，2025 年年收入估计约 $169M。其 2026 年 1 月收购 Learnship
              业务，整合了欧洲竞争版图，并扩大了认证培训师网络。goFLUENT 在合规认证和 HRIS/LMS 深度上领先 Preply Business。Speexx 报告 2024 年收入 $79.7M（高于 2023
              年的 $54.8M），尽管披露的风险融资只有约 $10.9M，显示有强劲内生增长；它定位为面向 1,800+ 家组织和 8M+ 用户的人才发展平台。Busuu for Business（Macmillan
              Publishers 旗下）和 Rosetta Stone Enterprise（IXL Learning 旗下部门）以自定进度内容和应用交付竞争，分别覆盖 12 种和 24 种语言，但两者都没有规模化的真正 1
              对 1 真人辅导——这是 Preply Business 在企业销售动作中利用的结构性差异化。
