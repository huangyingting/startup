      - number: '5.2'
        title: 平台架构与技术栈
        blocks:
          - type: paragraph
            body: >
              Preply 在 AWS 上运行云原生微服务架构，NudgeSecurity 供应链画像显示 AWS 为主要托管商、Google Workspace 用于内部协作。实时音视频层采用 Agora SDK
              处理一对一课程，较新的 Scenario Practice 对话 AI 功能则使用 LiveKit——Preply 工程博客于 2026 年 4 月确认了 Scenario Practice 使用 LiveKit
              支撑的 Worker。Agora 在合作伙伴案例研究中被记录为为 Preply 课程提供低延迟全球视频基础设施。


              技术供应链包括：Stripe 和 Braintree 负责支付，HubSpot 负责 CRM，Intercom 负责应用内支持聊天，Mailchimp 和 SendGrid 负责电子邮件，Greenhouse
              负责招聘，Branch 负责移动端归因。前端开发使用 React 系工具（依据工程博客推断）；DevOps 采用 Docker/Kubernetes 式容器化（依据微服务架构及 Tech Radar
              引用推断）。Preply 维护一个公开的 Tech Radar（基于 Zalando Tech Radar 框架），按四个圈层——采用、试验、评估、搁置——传达技术决策，兼供内部对齐与候选人沟通。


              AI 层使用 OpenAI 模型（GPT 系列、OpenAI Realtime）处理大语言模型任务，包括生成 Lesson Insights、Teaching Assistant 提示及 Scenario
              Practice 对话代理。Scenario Practice 中的 Supervisor Agent 以 temperature 0.0 运行在 gpt-4.1-mini
              上，实现确定性会话状态管理。语音转文字（STT）和文字转语音（TTS）服务夹持 OpenAI Realtime Worker 两端，LiveKit 统一协调媒体传输与向移动客户端的事件推送。
