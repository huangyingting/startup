      - CV042
  - id: TV006
    title: 最终尽调清单
    columns:
      - 事项
      - 缺失证据
      - 重要性
      - 负责方或尽调路径
    rows:
      - - 营收核实
        - 2021 年后经审计或管理层确认的 ARR / 净营收，含 B2C 与 B2B 分项
        - 支撑 8–15x 隐含倍数所必需；缺失则所有情景模型均依赖假设
        - 管理层数据室；申请经审计损益表
      - - 毛利率披露
        - 扣除导师报酬与支付处理费后、固定成本前的净营收利润率；按细分市场列示混合分成率
        - 决定平台经济属性是否可比 SaaS（毛利率 60–80%），抑或接近传统市场平台（20–35%）
        - 管理层数据室；Sacra 同类分析（付费墙）
      - - 净收入留存率（NRR）
        - 按学员批次及 B2B 队列的队列级 NRR；各细分市场流失率
        - NRR > 110% 将大幅强化高溢价倍数的依据；低 NRR 则证实营收属于交易性而非经常性
        - 管理层数据室；申请投资方级别报告
      - - 优先股堆叠与股权结构表
        - 完整股权结构表，含优先权条款、参与权、反稀释条款及清算优先权总额
        - 决定各退出价格下每股普通股的实际经济权益；对判断员工期权价值至关重要
        - 法律数据室；向公司申请股权结构表文件
      - - 债务融资条款
        - C 轮 2,800 万美元债务：到期日、利率及条款包；D 轮结构中的任何债务安排
        - 未偿债务将压低退出时的股权价值；若 EBITDA 逆转，将引入条款违约风险
        - 法律数据室；审查信贷协议
      - - 董事会构成
        - 完整董事会构成，含 A–C 轮投资方代表董事、独立董事及观察员权利
        - 治理结构决定各方利益一致性、否决权及跟随 / 强制出售机制
        - 公司治理文件；D 轮董事会同意决议
      - - 基辅运营韧性
        - 基辅中心的业务连续性计划；具备地理冗余的职能占比；战争相关事件的保险覆盖
        - 基辅 150 名员工约占全球员工总数的 20%；中断风险持续且重大
        - 管理层访谈；保险条款审查；BCP 文档
      - - OpenAI 依赖性与成本结构
        - 当前 OpenAI API 支出；AI 功能的合同条款、定价及备用供应商
        - 单一 AI 供应商依赖同时带来成本风险与战略连续性风险；AI 成本占营收比例影响 EBITDA 走势
        - 管理层访谈；技术供应商尽调
      - - 退出路径与时间表
        - 投资方关于 IPO 与并购偏好的一致意见；现有强制出售权或注册权时间表
        - 决定联合投资方的预期持有期与流动性路径
        - 投资方协议审查；非正式投资方意向核查
      - - B2B 营收占比与增速
        - 2023 年和 2024 年 B2B 绝对营收；B2B NRR；ACV 超过 5 万美元的企业客户数
        - B2B 是利润率扩张的核心引擎；当前 Sacra 估算（约占营收 5%）体量过小，不足以支撑 SaaS 溢价；需核实
        - 管理层数据室；CRM 数据；续约率文档
    notes: 尽调清单按估值影响程度排序。第 1–3 项是将评级从 TRACK 升至 BUY 的前提条件。第 4–10 项为完整承销所必需，但单项不足以阻断推荐结论。
    claimRefs:
      - CV007
      - CV016
      - CV039
      - CV040
      - CV041
      - CV042
      - CV043
figures:
  - id: FO001
    title: 公司里程碑时间轴
    type: timeline
    layout: wide
    summary: |
      涵盖 Preply 14 年历史中的关键创立、融资、产品、治理及负面事件，展示公司从乌克兰本地辅导平台一路成长为全球教育科技独角兽的轨迹。
    approximationNotes: 2016 年前种子轮金额源自 Tracxn / Wikipedia 估算；2022 年 C 轮估值来自 Sacra 估算。
    data:
      items:
        - label: 以 FindGuru 名称成立（2012 年）
          detail: Kirill Bigai、Dmytro Voloshyn、Serge Lukianov 在乌克兰基辅创立本地线下辅导撮合平台。
          tone: positive
        - label: 转型为 Preply——纯线上模式（2013 年）
          detail: 创始团队放弃本地目录模式，将公司更名为 Preply，打开全球导师供给端。
          tone: positive
        - label: Techstars 种子轮（2016 年）
          detail: 由 Techstars Berlin 及天使投资人注资约 130 万美元；首次获得机构背书。
          tone: positive
        - label: 自研 Preply Classroom 正式上线（2019 年）
          detail: 所有课程从 Skype 迁移至 Preply 自有平台；为 AI 功能积累行为数据。
          tone: positive
        - label: A 轮融资 + 疫情红利（2020 年）
          detail: 完成 1,000 万美元 A 轮融资；远程学习浪潮推动营收增长 4 倍；进入美国市场。
          tone: positive
        - label: B 轮融资——Owl Ventures 领投（2021 年 3 月）
          detail: 融资 3,500 万美元；Owl Ventures 和 Full In Partners 联合领投；加速 B2B 业务投入。
          tone: positive
        - label: 俄罗斯入侵乌克兰（2022 年 2 月）
          detail: 全面入侵爆发；Preply 承诺以发电机和卫星网络维持基辅办公室运营。
          tone: warning
        - label: C 轮融资（2022 年 7 月）
          detail: 融资 5,000 万美元；估值约 3.95 亿至 4 亿美元；投资方包括 Owl Ventures、Hoxton、Diligent、EduCapital、Evli Growth Partners。
          tone: positive
        - label: C-II 轮融资 + 债务融资（2023 年 7 月）
          detail: 合计融资 7,000 万美元（4,200 万美元股权 + 2,800 万美元债务）；Horizon Capital 领投；IFC 与 EBRD 跟投。
          tone: positive
        - label: 纽约总部 + 品牌焕新 + 高管招募（2023 年 10 月）
          detail: 首个美国办公室（纽约 The Malin）；Koto 主导品牌重塑；Sofia Tavares（CBO）与 Jerry Kingkade（CRO）加入。
          tone: positive
        - label: 实现 EBITDA 转正（2024 年第四季度）
          detail: Preply 过去 12 个月实现运营盈利；在该规模的教育科技公司中属罕见里程碑。
          tone: positive
        - label: D 轮融资 + 独角兽身份（2026 年 1 月）
          detail: WestCap 领投 1.5 亿美元，估值达 12 亿美元；Allen Mask 加入董事会；跻身 HolonIQ 全球教育科技独角兽名单。
          tone: positive
    claimRefs:
