companyProfile:
  summary: >-
    Preply 是一家乌克兰创立、美国总部的语言学习市场，将学习者与真人导师连接，并围绕课程交付、导师匹配、作业布置和 进度追踪持续叠加 AI 工具。公司在消费端和企业语言培训市场均已实现可观规模；2026 年 1 月的 D 轮融资与
    EBITDA 转正的宣称，使其有别于大多数陷入困境的教育科技公司。主要承销难题不在于业务真实性，而在于公开证据对收入基础、 业务构成、利润率、留存率及融资条款仍留有过多不确定性，难以为独角兽估值提供充分支撑。
