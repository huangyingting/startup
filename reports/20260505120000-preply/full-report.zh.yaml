      - number: '5.4'
        title: B2B 产品与企业集成
        blocks:
          - type: paragraph
            body: >
              Preply Business 在核心市场平台之上增加专门的企业产品层。B2B 产品面向大规模部署语言培训项目的企业 L&D 负责人（截至 2025 年有 2,000+ 家公司，包括
              Unilever、Datadog、Miro、Delivery Hero 和 CloudPay）。企业功能包括：通过 Azure AD、Google、Okta 和 SAML 1.0/2.0 身份提供商实现
              SSO；基于 SCIM 的自动学习者开通与取消开通；Corporate Dashboard
              提供覆盖学习者活动、入职进度、上课出勤、余额管理和技能发展的实时分析；对齐业务目标的公司级目标与技能指标；批量学习者上传；以及配套账户管理的专门上线支持。


              Corporate Dashboard 的设计对 L&D 使用场景尤其重要：管理员可以在不增加学习者负担的情况下识别低参与学习者、转移未使用课时额度，并导出数据用于合规和 HR 报告。该仪表盘解决 L&D
              买方面临的“证明 ROI”问题——它把数据导入雇主系统，并用参与度和结果指标支持与高层管理者的沟通。AI 功能（Lesson Insights、Daily Exercises、Scenario
              Practice）面向 B2B 学习者开放，结果追踪也会呈现在仪表盘中。


              Preply Business 报告称，相比团体语言课，参与度提升 3.5×；92% 的 HR 负责人愿意推荐；97% 的 B2B 学习者对说英语更有信心；企业学习者的平均导师评分为 4.9/5。除
              SSO/SCIM 之外的集成深度（LMS 连接器、开通之外的 HR 系统 API）没有公开记录，是企业评估中的尽调缺口。
