      - number: '7.7'
        title: 展示材料
        blocks:
          - type: callout
            title: EU AI Act 2026 年 8 月期限：未披露差距分析
            body: >
              Preply 的导师匹配算法和 AI 驱动学习评估，很可能落入 EU AI Act Annex III 的高风险类别。合规截止日是 August 2,
              2026——距本报告日期只有三个月。目前没有任何符合性评估、差距分析或 EU AI Act 准备情况披露。未合规的罚款最高可达 €35M 或全球年营业额的 7%。这是本章时间最紧迫的单一风险。
            calloutType: risk
            claimRefs:
              - CR006
              - CR005
              - CR037
          - type: callout
            title: 导师错误分类：无 Prop 22 保护，$500M+ 行业先例
            body: >
              California 的 AB5「ABC test」完整适用于在线辅导平台——非交通类零工没有等同 Proposition 22 的豁免。Uber 和 Lyft 已在 New
              York、Massachusetts、New Jersey 支付 $500M+ 和解金。Preply 将导师归类为独立承包商，但如果评估「业务整合」分支（Part B），可能无法通过 ABC
              test：语言辅导正是 Preply 的核心业务。追溯性重新分类会带来福利负债，并可能迫使定价模型从根上重做。
