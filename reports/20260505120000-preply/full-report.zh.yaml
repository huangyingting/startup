      - number: '1.3'
        title: 融资历程与资本结构
        blocks:
          - type: paragraph
            body: |
              从 2012 年至 2026 年 1 月，Preply 累计融资约 2.99 亿美元，历经多轮融资。融资轨迹体现了持续的机构
              信心与加速提升的估值倍数。2012—2016 年的早期种子资金来自 Techstars、Eastlabs 及 Semyon Dukach
              等个人天使投资人。2020 年 3 月完成约 1,000 万美元 A 轮融资（投资方：Diligent Capital、EduCapital、
              Hoxton Ventures、Point Nine Capital）。2021 年 3 月，B 轮融资 3,500 万美元，由 Owl Ventures 和
              Full In Partners 领投。2022 年 7 月完成 C 轮（5,000 万美元），Hoxton Ventures、Owl Ventures、
              Diligent Capital、EduCapital、Evli Growth Partners 参投；Sacra 估算 C 轮前估值约为 3.95 亿美元。
              2023 年 7 月，Preply 完成 7,000 万美元 C-II 轮扩展融资，由 Horizon Capital（其乌克兰定向基金
              HCGF IV 的首笔投资）领投，含 4,200 万美元股权和 2,800 万美元债务工具，国际金融公司（IFC）、欧洲
              复兴开发银行（EBRD）、Reach Capital 和 Hoxton Ventures 跟投。2026 年 1 月，D 轮融资 1.5 亿美元
              由 WestCap 领投，交易后估值 12 亿美元，累计融资达约 2.99 亿美元，高盛国际担任独家配售代理。2023
              年 7 月的债务设施条款至今未公开披露，二级交易及清算优先权细节亦未见公开确认。EBRD 和 IFC 的参与
              表明国际开发金融机构对 Preply 这一乌克兰起源、影响力导向企业的高度认可。
