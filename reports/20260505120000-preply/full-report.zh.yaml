      - number: '8.6'
        title: 展示项
        blocks:
          - type: callout
            title: EBITDA 转正：罕见且真实
            body: >
              Preply 的 EBITDA 转正状态——经多家独立媒体援引公司声明确认，并经 Indico Capital 管理合伙人在 D 轮公告中证实——在全球私有教育科技队列中确属罕见。当前14家 HolonIQ
              教育科技独角兽中，大多数仍处于不惜代价追求增长的模式。这一里程碑在短期内有效降低了 GoStudent 式财务困境风险。
            calloutType: insight
            claimRefs:
              - CV002
              - CV003
              - CV006
          - type: callout
            title: GoStudent 先例：直接警示
            body: >
              GoStudent 是一家一对一辅导市场平台，佣金机制与 Preply 几乎相同，2021年峰值估值达32亿美元，至2025年11月主要投资人已将其重估至10亿美元以下——在同一次 HolonIQ
              名单更新中被移除，而 Preply 恰在同次更新中加入。驱动这次重估的营收和留存动态尚未获公开证实，但高 GMV、单位经济不清、激进扩张后遭遇压缩的模式，与 Preply 当前信息披露姿态下的不透明风险高度吻合。
            calloutType: risk
            claimRefs:
              - CV016
              - CV017
              - CV018
          - type: callout
            title: TRACK：承诺资本前须获得数据室访问权限
            body: >
              以中等置信度建议观察（TRACK）。平台质量、市场顺风和 EBITDA
              转正状态支持持续跟踪并有意愿与管理层接触。然而，12亿美元入场价相对于所有公开教育科技可比标的均偏高，在缺乏经审计或管理层核实的营收、NRR、毛利率及股权结构表文件的情况下，无法给出负责任的买入建议。投资人应申请私有数据室访问权限，并在承诺资本前以
              T806 中的营收核实项目作为尽调锚点。
            calloutType: recommendation
            claimRefs:
              - CV001
              - CV002
              - CV007
              - CV029
              - CV033
          - type: callout
            title: 营收估算区间宽泛，公开来源无法核实
            body: >
              本章所有收入倍数计算均使用2024至2025年分析师外推区间，范围为8,000万至1.5亿美元。该区间以 Sacra
              的2021年5,000万美元基数为起点，结合公司自述"2022年增长51%"和"五年增长10倍"的复合增长情景推算得出。区间约为2倍宽，意味着隐含的倍数区间（8至15倍）同样具有2倍宽度。在没有私有数据的情况下，无法进行任何调和。任何以此区间内单一点位为确定值建立的尽调模型，均属不稳健。
            calloutType: assumption
            claimRefs:
              - CV007
              - CV008
              - CV009
              - CV025
