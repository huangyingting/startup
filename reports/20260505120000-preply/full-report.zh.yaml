figures:
  - id: FO001
    title: 公司里程碑时间线
    type: timeline
    layout: wide
    summary: |
      梳理 Preply 14 年历史中的关键创立、融资、产品、治理和不利事件，展示公司如何从乌克兰本地辅导目录演进为全球教育科技独角兽。
    approximationNotes: 2016 前种子轮金额据 Tracxn/Wikipedia 估算；2022 Series C 轮估值来自 Sacra 估算。
    data:
      items:
        - label: 以 FindGuru 创立（2012）
          detail: Kirill Bigai、Dmytro Voloshyn 和 Serge Lukianov 在乌克兰 Kyiv 推出本地线下辅导市场平台。
          tone: positive
        - label: 转向 Preply — 仅线上（2013）
          detail: 创始人放弃本地目录模式；公司更名为 Preply；打开全球导师供给侧。
          tone: positive
        - label: Techstars 种子轮（2016）
          detail: ~$1.3M 来自 Techstars Berlin 和天使投资人；首次获得机构验证。
          tone: positive
        - label: 自有 Preply Classroom 上线（2019）
          detail: 所有课程从 Skype 迁移到 Preply 自有平台；为 AI 行为数据采集奠定基础。
          tone: positive
        - label: Series A 轮 + COVID 顺风（2020）
          detail: $10M Series A 轮；远程学习转向推动收入增长 4x；进入美国市场。
          tone: positive
        - label: Series B 轮 — Owl Ventures 领投（Mar 2021）
          detail: $35M 融资；Owl Ventures 和 Full In Partners 领投；加速 B2B 投资。
          tone: positive
        - label: 俄罗斯入侵乌克兰（Feb 2022）
          detail: 全面入侵开始；Preply 承诺保留 Kyiv 办公室，并配备发电机和卫星互联网。
          tone: warning
        - label: Series C 轮（Jul 2022）
          detail: $50M；估值 ~$395–400M。Owl Ventures、Hoxton、Diligent、EduCapital、Evli Growth Partners。
          tone: positive
        - label: Series C-II 轮 + 债务额度（Jul 2023）
          detail: $70M 合计（$42M 股权 + $28M 债务）；Horizon Capital 领投；IFC 和 EBRD 共同投资。
          tone: positive
        - label: 纽约总部 + 品牌重塑 + 高管招聘（Oct 2023）
          detail: 首个美国办公室（The Malin, NYC）；Koto 负责公司品牌重塑；Sofia Tavares（CBO）和 Jerry Kingkade（CRO）加入。
          tone: positive
        - label: 实现 EBITDA 为正（2024-Q4）
          detail: Preply 过去 12 个月达到运营盈利；在这一规模的教育科技公司中是罕见里程碑。
          tone: positive
        - label: Series D 轮 + 独角兽身份（Jan 2026）
          detail: $150M 由 WestCap 领投，估值 $1.2B；Allen Mask 加入董事会；进入 HolonIQ Global EdTech Unicorn 榜单。
          tone: positive
