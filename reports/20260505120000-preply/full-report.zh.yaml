      - number: '7.3'
        title: 技术与 AI 集中依赖风险
        blocks:
          - type: paragraph
            body: >
              Preply 的全套 AI 产品——Lesson Insights（自动课后总结）、Daily Exercises（个性化作业）、Scenario Practice（AI 对话伙伴）及 AI Teaching
              Assistant——均构建在 OpenAI GPT API 基础设施之上。公开资料中未见任何替代 AI 供应商或备用推理层。这造成单点故障依赖：OpenAI API
              定价调整、服务中断、政策更新或合同重谈，都可能削弱乃至瓦解 Preply 用以支撑 $1.2B 估值的 AI 差异化优势。


              Scenario Practice 的 AI 安全控制依赖提示层防护和 Supervisor Agent，无独立第三方审计记录。鉴于《欧盟 AI 法案》的高风险分类路径，这一点尤为关键：仅靠提示层防护，难以满足第
              9 条（风险管理）和第 13 条（高风险 AI 用户透明度）对技术稳健性和透明度的要求。


              OpenAI 已发布的 API 条款保留了修改定价、限制使用场景或因政策违规终止访问的权利。鉴于 Preply 将 GPT 用于内容审核和面向学员的交互，任何政策层面的争议（例如 AI 生成不当内容触发
              OpenAI 审查）都可能导致 API 访问被紧急暂停。不同于 AWS、GCP 等基础设施供应商凭借 SLA 义务提供合同保护，OpenAI 的 API 访问受其使用政策约束，该政策对 OpenAI
              一方明显不对称。


              平台可靠性风险因 Preply 的视频课程交付模式而加剧：不同于异步内容平台，技术中断会立即取消实时课程。支撑视频交付的基础设施（Preply Space）自身的可靠性依赖关系未见公开记录。
            claimRefs:
              - CR015
              - CR016
              - CR015
              - CR015
              - CR037
      - number: '7.4'
        title: 地缘政治与运营连续性风险
        blocks:
          - type: paragraph
            body: >
              Preply 在乌克兰基辅办公室维持约 150 名员工，占全球约 750 人员工总数的 20%
              左右。持续的俄乌战争令这一群体的运营风险居高不下：定期的导弹和无人机袭击造成停电、互联网与电信基础设施中断及安全紧急情况，直接影响工程、产品和支持职能。2024–2025
              年间，乌克兰电力网络和民用电信基础设施遭受了多起有记录的攻击。


              基辅办公室集中了 Preply 不成比例的工程人才，公司明确表态维护乌克兰业务是一种韧性宣言。这在战略上颇具说服力，但形成了西欧或北美总部竞争对手所不面临的无对冲地缘政治集中风险。竞争对手 iTalki（美国）和
              Cambly（美国）均无此敞口。


              Preply 未公开披露针对基辅办公室的正式业务连续性或灾难恢复计划，亦无工程工作量覆盖分工、基于云端的代码与数据卸载流程或快速迁移协议方面的信息。这一缺口是重要的尽调问题：投资者应要求提供证据，证明 30–60
              天的基辅中断可被其他工程中心（巴塞罗那、纽约、伦敦）吸收，而不影响产品路线图。


              乌克兰的动员法律带来额外的人才风险：乌克兰男性工程师面临军事征召，形成 Preply
              无法完全通过薪酬或留人计划化解的非自愿人员流失。据报道，公司已实施心理健康支持、弹性远程办公及搬迁援助，但未见任何量化的留存影响数据公开。
