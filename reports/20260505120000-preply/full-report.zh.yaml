      - number: '3.6'
        title: 展示材料
        blocks:
          - type: callout
            title: 导师多平台经营限制供给侧锁定
            body: >
              Preply、iTalki、Cambly 和 Verbling 之间有记录的导师多平台经营，是结构性脆弱点。导师有理性经济动机在佣金更低的竞争对手上保留资料。Preply 18–33%
              的阶梯佣金结构，是直接市场平台同业中最高的（iTalki 收取 15% 固定佣金）。如果高课时导师群体迁移到 iTalki，或转向独立安排，Preply
              的供给侧质量和可得性会被侵蚀。缺少导师排他协议、同时多平台运营又很容易，会放大这一风险。
            calloutType: risk
            claimRefs:
              - CP020
              - CP021
              - CP042
          - type: callout
            title: 双细分定位限制复制风险
            body: >
              Preply 能通过共享导师池同时服务 B2C 个人学习者和 B2B
              企业客户，这是结构性优势；专注企业的竞争者（goFLUENT、Speexx、Berlitz）若不搭建消费者获客渠道，就难以复制。同样，只做消费者的竞争者（iTalki、Cambly）要挑战 Preply
              Business，需要显著投入企业产品。该双细分护城河目前是 Preply 竞争位置中最可防守的结构性特征，因为它让公司能在消费者和企业需求之间交叉补贴导师供给。
            calloutType: strength
            claimRefs:
              - CP001
              - CP030
              - CP034
  - number: 4
    title: 财务
    sections:
      - number: '4.1'
        title: 收入模式和定价
        blocks:
          - type: paragraph
            body: >
              Preply 通过保留其市场平台上每节已预订课程的佣金来产生收入。每位新学生的第一节（试课）佣金为 100%——导师从该课中没有收入。后续所有课程按导师在平台累计授课小时数采用滑动佣金：新导师（0–199
              小时）为 33%，200–399 小时降至 27%，400–799 小时为 22%，800 小时以上为 18%。Sacra 估计 Preply 约 95% 收入来自语言课程佣金，剩余约 5%
              来自非语言辅导和早期产品线，例如高级导师曝光位和企业席位费。


              学生侧，Preply 转向以 28 天周期计费的订阅模式。学生选择与特定导师每周上一到五节课，总成本取决于该导师自定的小时费率。主要语言（英语、西班牙语、法语）的 B2C 平均课时价格约为每小时
              $15–$25，平台更宽范围为 $3–$90，取决于导师经验、语言稀缺性和学科专业化。对 B2B 企业客户，Preply Business 提供按合同范围定价的定制每席位订阅；没有公开标价。订阅模式让
              Preply 能看到未来课程安排，并相较旧的按课时包付费结构稳定导师收入，降低学生购买套餐后不再上课的风险。


              100% 试课佣金相当于一种由供给侧出资的获客机制：Preply 吸收导师机会成本，换取降低学生购买摩擦。学生一旦试课体验正面，就有动力承诺订阅；从这时起，Preply 开始赚取持续佣金差。
