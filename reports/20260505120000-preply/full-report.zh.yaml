      - number: '8.2'
        title: 融资结构与可比公司集合
        blocks:
          - type: paragraph
            body: >
              Series D 结构有几项特征值得在估值尽调中拆开看。Goldman Sachs International 作为私有成长轮唯一配售代理，暗示该轮采用了 pre-IPO
              或结构化流动性轮次常见的机构投资人营销流程，说明 WestCap 和共同投资人可能跑过竞争性流程，并拿到了公开信息之外的财务披露。EBRD 作为开发性金融机构，与商业 VC
              同轮出现，说明该轮可能包含开发银行式定价参数（例如反稀释、赎回权或社会回报契约），从而影响普通股持有人的有效每股经济性。July 2023 的 Series C 延展轮包含 $28M 债务；Series D
              是否包含任何债务成分并未披露。如果 $1.2B 估值是在纯股权、无参与分配优先权条款下的投后估值，普通股覆盖会更干净；如果包含参与分配优先权或清算倍数，普通股每股有效价值会更低。这些条款均未公开。


              Preply 的可比集合落在两条轴上：（1）直接语言学习同行——包括公开和私有公司；（2）更广义的教育科技市场平台群体。直接同行中，Duolingo（NASDAQ: DUOL）是唯一大型公开语言学习公司；其
              $5B 市值和约 3.7x EV/LTM Revenue 倍数，为公开市场的行业天花板定价。Coursera（NYSE: COUR）约按 0.3x EV/Revenue
              交易，但它以内容授权而不是真人导师为模型，且处于结构性下行，因此不是直接可比。Chegg（NYSE: CHGG）的 Busuu 分部是语言学习 SaaS 业务（2025 年预计收入约 $48M）；受 AI
              搜索冲击传统业务影响，Chegg 市值已压缩至约 $123M，交易倍数低于 0.3x 收入，是消费者教育科技板块的警示案例。GoStudent 在辅导市场平台模型上最接近 Preply（1 对 1
              课程、市场平台佣金），其 2021 年峰值估值 $3.2B，到 November 2025 已被主要投资人重估至低于 $1B，并在同一次更新中被 HolonIQ 独角兽名单移除，而 Preply
              则被加入——这是直接且同期的可比警示信号。Speak（$1B，December 2024）是当前 HolonIQ 名单中另一家已确认的语言学习独角兽，但它是 App
              优先的语音练习产品，模型差异很大，也没有真人导师。iTutorGroup 曾在 2015 年融资轮中获得 $1B 估值——信息陈旧，不能反映当前环境。


              现阶段 Preply 最可辩护的估值框架，是以管理层验证的 2025 年收入为锚的前瞻 ARR 倍数，并对以下因素折价：（1）私有市场流动性不足（相对公开可比公司通常折价 30–40%），（2）Kyiv R&D
              中心的战争相关运营风险溢价，（3）消费者 GMV 集中，且未披露净留存率（NRR）或毛利率。按 Duolingo 的 3.7x 公开倍数，再套用 40% 私有市场折价，隐含 ARR 倍数为 2.2x；要支撑
              $1.2B，收入需约 $545M——远高于任何可信估算。即便套用 15x 成长溢价（只有收入以 40%+ 复合增长时才站得住的 VC 式成长倍数），$1.2B 也意味着 $80M
              ARR，位于分析师估算区间的低端。这个数学结构性依赖私有数据。
