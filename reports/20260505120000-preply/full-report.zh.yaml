      - number: '8.4'
        title: 退出准备度与建议
        blocks:
          - type: paragraph
            body: >
              Preply 退出路径是投资案例中披露最少的维度。公司没有发出任何公开 IPO 信号，没有提交 S-1 或 F-1，也没有公开接触 SPAC 结构。Goldman Sachs 在 Series D
              中担任配售代理，维持了 pre-IPO 银行关系，这是未来公开发行的前置条件。WestCap 组合中包括曾走 IPO 路径的公司（Airbnb，董事 Allen Mask
              曾任其高管）；这种投资人一致性是未来面向公开市场的弱正向信号。若走战略 M&A，最可信的收购方包括：（1）希望加入真人语言模块的企业学习平台（Cornerstone、SAP
              SuccessFactors、Workday），（2）消费者科技平台（Apple Education、Google Workspace），或（3）大型在线教育聚合方（Chegg，根据其 2025 Q4
              letter，正围绕技能提升和语言重塑业务——但其当前市值太小，难以支撑这一规模的收购）。这些 M&A 路径均未被公开释放信号。


              建议：跟踪，置信度中等。从平台质量、市场定位和增长叙事看，Preply 的投资案例有吸引力。EBITDA 为正状态和 Series D 结构（机构化财团、投行配售）都是可信度信号，使其区别于大多数已失效的
              EdTech 独角兽群体。但披露证据无法支撑当前拉长的估值：$1.2B 价格意味着在无法验证收入估算上支付 8–15x 收入倍数，而公开可比公司集合（教育科技 EV/Revenue 中位数
              1.6x）在没有私有访问权的情况下不支持该入场价。给出买入建议需要：（1）管理账目显示 $120M+ ARR 且同比增长 30%+，（2）净留存率（NRR）高于 110%，表明扩张收入强劲，（3）毛利率高于
              60%，确认抽成率可持续，（4）退出路径明确且时间表可信。没有这些输入，负责任的尽调结论是跟踪进展，并在承诺资本前争取数据室访问。
            claimRefs:
              - CV031
              - CV032
              - CV033
              - CV034
              - CV035
              - CV036
              - CV037
              - CV038
      - number: '8.5'
        title: 尽调框架与治理
        blocks:
          - type: paragraph
            body: >
              当前证据水平下，有几项结构性尽调阻碍使我们无法给出确定建议。第一，收入缺口：公开信息中没有任何 2021 年后经审计或管理层验证的 ARR 或净收入数字。对一家以 $1.2B
              估值进入机构级尽调流程的公司来说，这很异常；即便是这一阶段的私有公司，通常也会在融资材料或二级交易中提供过去收入区间。第二，优先权堆栈未披露：Preply 的股权结构、Series A 至 D
              的清算优先权、反稀释条款和总优先权悬垂均未知。如果历次融资合计 $299M 都带有 1x 清算优先权，普通股东（包括员工）需要退出价值高于 $299M
              才能获得任何收益；如果优先权参与分配，门槛更高。第三，债务：Series C 延展轮包含 $28M 债务，条款未披露；任何未偿债务都会在退出时降低股权价值。第四，董事会治理：已确认董事只有 Kirill
              Bigai 和 Allen Mask（WestCap）；Horizon Capital、Hoxton Ventures、Reach Capital 和 Owl Ventures
              等前轮投资人的董事席位未在公开来源中确认。完整董事会构成对评估一致性和否决权很重要。


              会击穿投资论点的终止触发器包括：（1）Series D 后连续两年收入增长放缓至低于 20% CAGR，（2）由于 AI 基础设施成本扩张，EBITDA 再次转负，（3）发生重大辅导平台去中介化事件（例如大型
              AI 提供商发布真人对话导师模型，使市场平台商品化），（4）地缘政治升级影响 Kyiv R&D 中心，导致技术人员流失 >30%，或（5）主要司法辖区作出监管裁定，将导师错误分类为雇员，实质性改变佣金经济性。
            claimRefs:
