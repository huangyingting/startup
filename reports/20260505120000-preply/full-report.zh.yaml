      - number: '6.5'
        title: 扩张动态与集中度风险
        blocks:
          - type: paragraph
            body: >
              Preply 的扩张动态通过两套机制运转：B2C 学习者升级（试听课到订阅、单语种到多语种、消费者通过雇主赞助注册进入 Preply Business）和 B2B 落地后扩张（先让一个团队 /
              部门的初始队列注册，再扩大到更广组织采用）。Delivery Hero 案例是 B2B 扩张的最佳证据：从早期注册开始，2+ 年内达到 631
              名活跃员工，并且参与人数“指数级增长”——这是教科书式落地后扩张模式。


              鉴于拥有 2,000+ 家企业客户，且没有公开描述任何单一账户过大，B2B 板块集中度风险看起来较低。美国市场每年新增 200+ 个组织伙伴。具名账户（Delivery
              Hero、Unilever、Datadog、Miro）都是大型企业，但被引用为代表性案例，而不是收入的大部分。B2C 板块天然分散，覆盖 180 个国家的数十万个人学习者；未披露也未显现学习者层面的集中风险。


              采购摩擦仍可能阻碍 B2B 扩张：Preply Business 需要专门上线支持、SSO/SCIM 集成和 L&D 预算分配，相比自助式购买会拉长销售周期。LMS 连接器深度不足（SSO/SCIM
              之外）可能限制其进入企业学习技术栈。B2C 侧，如果佣金经济无法支撑来自高工资国家的母语导师留存，高端导师供给质量就有风险，可能削弱高端学习者体验并提高自愿流失。


              B2B 收入占总收入的比例未公开，因此无法定量评估其带来的耐久性收益。这是投资者评估 Preply Series D 经常性收入论点时的实质尽调要求。
