      - number: '7.2'
        title: 运营、安全与信任及安全风险
        blocks:
          - type: paragraph
            body: >
              Preply 平台在 2025 年 4 月至 2026 年 2 月间经历了至少六次完全或局部服务中断，包括 2025 年 6 月长达 1 小时 31 分钟的局部中断，以及 2025 年 4 月、8 月、10 月和
              12 月的完全中断。每次中断都直接导致预定课程无法进行，引发学员端服务故障及潜在退款义务。公司未披露公开 SLA；企业 B2B 客户因此缺乏可独立执行的正常运行时间保障，合同条款亦属未知。


              Preply 的教师审核框架明显弱于许多机构客户（学校系统、拥有未成年员工的企业）的要求。2020 年 10
              月引入的身份验证仅包括实时拍摄政府颁发的证件照片，不含犯罪背景调查、资质核实或推荐人核查。平台社区准则明确禁止误导和剥削行为，但依赖用户举报和被动审核而非主动筛查。PissedConsumer（111
              条评价）和商业改善局的投诉持续指向假学员账户、刷单评价及平台偏袒的争议处理。自动续费计费、收益冻结和客服失联的负面评价持续存在，在《欧盟数字服务法》（DSA）对在线市场运营商的义务框架下，构成监管"暗模式"审查风险。


              2024–2025 年未发现涉及 Preply 的重大数据泄露公开记录，这是一个正面数据点。但 ITRC 2024 年度数据泄露报告显示，技术/SaaS
              行业整体泄露数量接近历史记录，表明未发生泄露并非结构性免疫。Preply 未公开 SOC 2 Type II 认证、网络保险覆盖或独立渗透测试计划。此外，依赖 OpenAI API 意味着 Preply 继承了
              OpenAI 次级处理商链上的上游数据敞口风险——2025 年 OpenAI/Mixpanel 事件即是例证：一家第三方分析供应商遭遇泄露，波及 AI 平台客户。
