      $120M 收入基数是分析师中位区间外推；没有官方数字确认。
      低 / 中 / 高值反映各倍数下收入估计周围 ±25% 的不确定性。
      进入价格 $1.2B 作为隐含参照：在 $120M 收入下，只有倍数 >= 10x 才会产生 EV >= 进入价格。
      这些是纯倍数敏感性数值，不是概率化情景预测。
