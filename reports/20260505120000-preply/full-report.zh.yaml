      - number: '5.3'
        title: AI 引擎、差异化与数据飞轮
        blocks:
          - type: paragraph
            body: >
              Preply 的核心技术差异化来自“人类主导、AI 赋能”模型：AI 为导师自动化行政和内容生成任务，但教学中心仍由真人掌握。这与 Duolingo 在 April 2025 的 “AI-first”
              转向形成鲜明对比。2024–2025 年推出的三款 AI 产品构成当前 AI 产品套件。Lesson Insights 使用来自 OpenAI
              的大语言模型（LLM）分析课程转录，并生成个性化课后总结，覆盖三大支柱：词汇（新词、同义词）、语法（纠错、错误模式）和口语（语速、发音）。导师获得行政时间节省；学习者获得对齐 CEFR 的可执行反馈。Daily
              Exercises 会按课程内容和学习者重点自动生成课间练习。Scenario Practice 通过由 Conversational Agent（角色内对话、按 CEFR 校准）和静默并行运行的
              Supervisor Agent（任务状态、提示覆盖层、安全横幅）驱动的虚拟人物，让学习者沉浸到现实场景（咖啡馆、求职面试、酒店投诉）中。


              Scenario Practice 的双代理架构在技术上值得注意：persona prompt 载荷包含带能力描述的 CEFR 等级、环境语境、XML 标签中的学习者任务、主题文本和复杂度指南——这让 B1 和
              A2 对话在结构上不同，而不只是表面上不同。Supervisor 的 temperature 0.0 是一项硬性工程决策，理由是二元会话状态选择必须确定。Preply Canvas 内的 Teaching
              Assistant 直接在课程工作区生成练习和口语提示词。


              数据飞轮是：课程转录、词汇追踪、错误模式和进度数据回流，用于优化 AI 模型并强化导师匹配信号。到 Q1 2026，Preply 的工程组织本身也已成为 AI 原生运营：所有 35 个开发团队每周 AI
              编码工具采用率超过 90%，过去 30 天接受了超过 500,000 行 AI 生成代码，工程师平均每周节省 4.88 hrs——说明内部生产率复利与产品 AI 部署同步发生。
