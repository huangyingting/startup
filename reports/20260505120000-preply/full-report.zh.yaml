      - number: '1.2'
        title: 创始人与管理团队
        blocks:
          - type: paragraph
            body: |
              Preply 由 Kirill Bigai（CEO）、Dmytro Voloshyn（CTO）和 Serge Lukianov 于 2012 年联合创立。
              Bigai 是公司的公众形象与首席发言人，其高频媒体曝光使他成为典型的关键人物依赖风险。Voloshyn 主导
              工程与技术战略，统管自研 Preply Classroom 及 AI 基础设施。Lukianov 目前的运营职责未见公开披露，
              仅有联合创始人头衔。2023 年 Preply 在纽约开设办公室后，管理团队显著扩充：Sofia Tavares 出任首席
              品牌官（此前为 Delivery Hero 品牌高级副总裁，精通八门语言），Jerry Kingkade 出任首席营收官（此前
              任 Flowspace CRO 和 Houzz 销售副总裁）。Aurélien Pallain 担任首席运营官，Josh Crossick 担任首席
              产品官，Keiran Dodd 领导人才与组织团队，Toni Sfeir 担任 B2B 业务副总裁。董事会组成仅部分披露；
              已确认席位为 Kirill Bigai 和 Allen Mask（WestCap 合伙人、前 Airbnb 高管，2026 年 1 月随 D 轮
              融资加入董事会）。早期投资方的董事会代表尚未公开确认，对于晚期私营公司而言属常见情况。公司内部数据
              显示，84% 的员工愿意向他人推荐 Preply 为优质工作场所（2025 年度员工敬业度调查）。自 2023 年以来，
              公开记录中未见重大管理层变动。Preply 的乌克兰创始团队自 2022 年 2 月俄罗斯全面入侵以来始终坚守
              基辅运营，CEO 将这一决定定性为强化组织韧性与创造力的体现。
