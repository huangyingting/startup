      - number: '4.2'
        title: 市场进入动作与销售经济效益
        blocks:
          - type: paragraph
            body: |
              Preply 的市场进入通过两条截然不同的渠道运作，经济效益差异显著。直接面向消费者（D2C）渠道依托
              数字效果营销、SEO 和口碑传播，以体验课模式作为转化杠杆。由于 Preply 在供给侧承担 100% 的体验课
              成本，平台的实际获客补贴以体验课价值为上限（通常每课时 15—25 美元），而后续课程只要学员保持
              活跃便持续产生佣金流。

              B2B 企业渠道采用外向型企业销售动作。截至 2023 年 7 月，Preply 在前 12 个月内签约约 200 份新
              企业合同，客户包括 Datadog、GroupM 和 Bain。企业细分在 2021—2022 年增长达 230%，大幅领先 D2C
              消费端增速。B2B 合同结构为带量折扣的定制每席位课程订阅；企业模式收入比消费端购买更具可预测性
              和可重复性，流失风险更低——企业承诺为多席位，且通常由人力资源或 L&D 预算负责人而非个人决策续签。

              两个细分均无公开披露的获客成本（CAC）或客户终身价值（LTV）数据。但订阅计费模式与 2025 年底实现
              EBITDA 转正意味着销售效率在持续改善。Preply 于 2023 年 10 月任命 Jerry Kingkade（前 Flowspace
              CRO）为首席营收官，标志着对企业销售能力的持续投入。Sacra 指出，企业收入通常较消费端市场收入
              具有更高毛利率和更强留存，B2B 扩张是最主要的利润提升杠杆。
            claimRefs:
              - CI009
              - CI010
              - CI011
              - CI012
