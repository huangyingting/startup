      - number: '1.4'
        title: 运营规模与里程碑路径
        blocks:
          - type: paragraph
            body: |
              截至 2026 年 1 月，Preply 的运营数据如下：导师逾 10 万人，覆盖 180 个国家，提供 90 余种语言课程，
              员工约 750 人。公司称自 2022 年 C 轮以来，可预约导师数增至三倍以上（从 2023 年 Horizon Capital
              公告时的约 3.5 万人增至 2026 年 1 月的逾 10 万人），同期语言目录新增 40 余门语言。Sacra 估算 2021
              年收入为 5,000 万美元，2022 年同比增速约 51%；此后无官方数据公开。公司在 2026 年 1 月 D 轮公告前
              的 12 个月内实现 EBITDA 转正，CEO 将其定性为"从实力而非需求出发"推进融资的里程碑。Preply
              Business 同期快速增长：2026 年初已有逾 2,000 家企业客户，92% 的学员报告工作表现有所改善。主要
              里程碑包括：2019 年将全部课程从 Skype 迁移至自研 Preply Classroom；2020 年疫情推动收入四倍增长
              并进入美国市场；2023 年 10 月在纽约设立总部并品牌焕新；2026 年 1 月晋升独角兽。Preply 在俄乌战争
              持续期间保持基辅办公室运营，约 150 名员工通过备用发电机和卫星网络 7×24 小时坚守。
