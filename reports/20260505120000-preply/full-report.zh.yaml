      - number: '2.3'
        title: 买方分层和采用路径
        blocks:
          - type: paragraph
            body: >
              Preply 服务两类主要买方：B2C 个人学习者和 B2B 企业客户。B2C
              细分中，买方和付款方是同一人——个人学习者直接为辅导课程付费，通常通过订阅或按课时额度包支付。该细分包括寻求职业晋升的职场人士、补充学校语言学习的学生、获得实用熟练度的旅行者和移民，以及兴趣型语言学习者。英语约占
              Preply 学习者课时需求的 43%，体现全球对英语熟练度在职业和教育准入上的溢价。按 Sacra 分析，截至 2022 年，B2C 学习者基数约为 800,000 名活跃学生，覆盖 180+ 个国家。


              B2B 细分中，买方是雇主的 HR 或 L&D 团队，终端用户是员工学习者。Preply Business 服务 2,000+ 家企业客户，包括
              TikTok、Zendesk、Eventbrite、Mondelēz、Bain、Prudential 和 Bayer。企业采用通常由国际扩张、团队沟通失灵或人才发展要求触发。B2B
              采购路径包括初始范围沟通和项目设计，随后由专属上线专家完成设置，进入学习者-导师匹配的启动阶段，并通过持续的管理者仪表盘提供进度可视性。企业细分的切换成本有意义：与 HRIS
              系统集成、历史进度数据和制度化导师关系都会形成锁定。地理劳动力套利使 Preply 能以有竞争力的价格定价——低成本地区的导师收入高于当地水平，而高成本市场的学习者能以低于本土导师的价格获得优质教学。
