        - label: 数据隐私 / GDPR 违规
          values:
            - label: 低
              tone: positive
            - label: 高
              tone: warning
            - label: 部分
              tone: neutral
            - label: 中
              tone: neutral
    approximationNotes: |
      发生可能性和缓解成熟度为基于已审查公开证据的定性判断。
      Preply 未披露内部风险登记册。
    claimRefs:
      - CR006
      - CR005
      - CR015
      - CR017
      - CR025
      - CR030
      - CR036
  - id: FR002
    title: 风险传导图——风险如何流向营收、利润率和估值
    type: dag
    layout: wide
    summary: |
      有向无环图，追踪主要风险事件如何通过 Preply 运营模型传导至营收、利润率和估值。OpenAI API 中断和
      EU AI Act 执法是影响最大的源节点。由于追溯责任和模式重设要求，教师劳动力错误分类是传导速度最快的路径。
    data:
      nodes:
        - id: openai-disruption
          label: OpenAI API 中断
        - id: euaiact-enforcement
          label: EU AI Act 执法行动
        - id: tutor-misclassify
          label: 家教人员误分类裁决
        - id: kyiv-disruption
          label: 基辅工程中断
        - id: ai-product-degraded
          label: AI 产品套件降级
        - id: eu-market-loss
          label: 欧盟市场准入丧失
        - id: opex-surge
          label: 运营成本激增
        - id: product-delay
          label: 产品路线图延期
        - id: revenue-loss
          label: B2C/B2B 营收损失
        - id: margin-compression
          label: 利润率压缩
        - id: valuation-compression
          label: 估值压缩
      edges:
        - from: openai-disruption
          to: ai-product-degraded
        - from: euaiact-enforcement
          to: eu-market-loss
        - from: tutor-misclassify
          to: opex-surge
        - from: kyiv-disruption
          to: product-delay
        - from: ai-product-degraded
          to: revenue-loss
        - from: eu-market-loss
          to: revenue-loss
        - from: opex-surge
          to: margin-compression
        - from: product-delay
          to: revenue-loss
        - from: revenue-loss
          to: valuation-compression
        - from: margin-compression
          to: valuation-compression
    approximationNotes: |
      传导路径基于商业模式分析的方向性推断。反馈回路（如估值压缩→资本约束→进一步中断）未展示，以维持 DAG 拓扑结构。
    claimRefs:
      - CR015
      - CR006
      - CR025
      - CR017
      - CR024
  - id: FR003
    title: 外部平台架构——上游节点与监管渠道图
    type: dag
    layout: standard
    summary: >
      Preply 外部架构的结构性有向无环图，梳理上游技术提供商、资本来源、供给侧参与者与监管机构如何连接至核心平台。此图展示依赖关系的连接方式——哪些节点最上游、哪些渠道为单路径或多路径——而非对风险严重性评分。监管机构（欧盟
      DPA 网络、FTC）通过独立于商业/技术依赖的渠道施加合规约束。
    data:
      nodes:
        - id: openai
          label: OpenAI（AI API）
        - id: cloud
          label: 云基础设施（AWS/GCP）
        - id: westcap
          label: WestCap（资本/董事会）
        - id: tutors
          label: 10 万 + 独立教师
        - id: eu-dpa
          label: 欧盟 DPA 网络 / AI 法案监管机构
        - id: ftc
          label: FTC（COPPA / 消费者保护）
        - id: payment-rails
          label: 支付通道（Stripe/Payoneer）
        - id: preply-platform
          label: Preply 核心平台
      edges:
        - from: openai
          to: preply-platform
        - from: cloud
          to: preply-platform
        - from: westcap
          to: preply-platform
        - from: tutors
          to: preply-platform
        - from: eu-dpa
          to: preply-platform
        - from: ftc
          to: preply-platform
        - from: payment-rails
          to: preply-platform
    approximationNotes: |
      云服务商身份依据行业惯例推断；Preply 未公开披露云托管供应商。支付通道身份为推断，未经 Preply 确认。
    claimRefs:
      - CR015
      - CR015
      - CR032
  - id: FV001
    title: 估值方法选择有向无环图
    type: dag
    layout: standard
    summary: >
      有向无环图，展示 Preply 的商业模式特征（市场平台 vs SaaS、已披露 vs 未披露营收、EBITDA
      转正状态、所处阶段）如何驱动合适估值框架的选择，以及各方法下可支撑的隐含估值区间。该图说明为何缺乏私有营收数据就无法应用简单收入倍数，以及为何 EBITDA 法同样因信息未披露而受阻。
    data:
      nodes:
        - id: biz_model
          label: 商业模式：双边市场，佣金率 18–33%
        - id: revenue_opacity
          label: 营收不透明：2021 年后未披露 ARR
        - id: ebitda_positive
          label: EBITDA 转正（公司自述，未经审计）
        - id: stage
          label: 阶段：D 轮，IPO 前，估值 12 亿美元
        - id: ev_rev_method
          label: EV/营收法：隐含 8–15 倍（不可验证）
        - id: ev_ebitda_method
          label: EV/EBITDA 法：受阻——未披露 EBITDA 利润率
        - id: gmv_method
          label: GMV 倍数法：GMV 增速 50% 已知；绝对 GMV 未披露
        - id: vc_growth_method
          label: VC 成长倍数：ARR 8–15 倍——仅当 ARR ≥ 8000 万美元时成立
        - id: valuation_conclusion
          label: 结论：无单一方法可验证；8–15 倍区间为最佳估算边界
      edges:
        - from: biz_model
          to: ev_rev_method
        - from: biz_model
          to: gmv_method
        - from: revenue_opacity
          to: ev_rev_method
        - from: revenue_opacity
          to: ev_ebitda_method
        - from: revenue_opacity
          to: gmv_method
        - from: ebitda_positive
          to: ev_ebitda_method
        - from: stage
          to: vc_growth_method
        - from: ev_rev_method
          to: valuation_conclusion
        - from: ev_ebitda_method
          to: valuation_conclusion
        - from: gmv_method
          to: valuation_conclusion
        - from: vc_growth_method
          to: valuation_conclusion
    approximationNotes: 方法适用性仅基于公开数据。上述任一方法若能访问私有数据室，均可得出明确结论。
    claimRefs:
      - CV007
      - CV008
      - CV009
      - CV010
      - CV022
  - id: FV002
    title: 估值对营收估算的敏感性
    type: bar
    layout: standard
    summary: >
      展示在 D 轮 12 亿美元固定投后估值下，Preply 隐含 EV/营收倍数在五种营收估算情景中的变化。从 8 倍（乐观情景 1.5 亿美元）到 20 倍（悲观情景 6000
      万美元）的区间，揭示了对未经核实营收数字的高度敏感性，并说明为何相对于公开可比公司基准，当前估值存在结构性拉伸。
    data:
      items:
        - label: 营收 6000 万美元（极低估算）
          value: 20
          note: 远超任何可比公司
        - label: 营收 8000 万美元（分析师低估）
          value: 15
          note: Sacra 分析师下限
        - label: 营收 1 亿美元（分析师中估）
          value: 12
          note: 中值外推
        - label: 营收 1.2 亿美元（中高估算）
          value: 10
          note: 由 2021 年基数 5000 万美元年增 2.5 倍连续两年推算
        - label: 营收 1.5 亿美元（分析师高估）
          value: 8
          note: Sacra 分析师上限
        - label: Duolingo 公开倍数（基准）
          value: 3.7
          note: Multiples.vc 2026 年 5 月
        - label: 教育科技行业 EV/营收中位数（基准）
          value: 1.6
          note: Finerva 2024 年第四季度
    approximationNotes: |
      营收估算为基于 Sacra 2021 年基数（5000 万美元）以 20–40% 复合增速外推的分析师预测。Preply 未披露 2021 年后的官方营收数据。所有倍数均以 12 亿美元固定估值为分母计算。
    claimRefs:
      - CV007
      - CV015
      - CV019
      - CV020
      - CV026
  - id: FV003
    title: 退出倍数敏感性——固定营收估算下的区间
    type: range
    layout: wide
    summary: >
      展示在固定中性情景营收 1.2 亿美元的前提下，不同 EV/营收退出倍数对应的退出企业价值变化。该区间反映回报对退出倍数选择的敏感性，独立于成长情景假设。以当前入场价 12 亿美元为基准，仅 10
      倍以上倍数可产生正回报——远高于所有当前公开教育科技可比公司中位数。
    data:
      items:
        - label: 退出倍数 2 倍营收（1.2 亿美元基数）
          low: 180
          mid: 240
          high: 300
          unit: USD M
        - label: 退出倍数 4 倍营收（1.2 亿美元基数）
          low: 360
          mid: 480
          high: 600
          unit: USD M
        - label: 退出倍数 6 倍营收（1.2 亿美元基数）
          low: 540
          mid: 720
          high: 900
          unit: USD M
        - label: 退出倍数 8 倍营收（1.2 亿美元基数）
          low: 720
          mid: 960
          high: 1200
          unit: USD M
        - label: 退出倍数 10 倍营收（1.2 亿美元基数）
          low: 900
          mid: 1200
          high: 1500
          unit: USD M
        - label: 退出倍数 12 倍营收（1.2 亿美元基数）
          low: 1080
          mid: 1440
          high: 1800
          unit: USD M
    approximationNotes: >
      1.2 亿美元营收基数为分析师中值外推，无官方数据支撑。各倍数下的低/中/高值反映营收估算 ±25% 的不确定性。入场价 12 亿美元作为隐性参考：在营收 1.2 亿美元时，仅 10 倍及以上倍数可使退出 EV ≥
      入场价。这些为纯倍数敏感性测算，非概率情景预测。
    claimRefs:
      - CV008
      - CV009
      - CV025
      - CV026
  - id: FV004
    title: 投资委员会 KPI 评分卡
    type: kpi
    layout: standard
    summary: >
      投委会参考用序数评分（0–10），覆盖八大投资维度。市场与产品得分较高；财务透明度与估值得分偏低，拖低综合评级，由"买入"转向"持续观察"。评分仅反映公开证据；若获私有数据室访问权限，财务透明度、NRR
      及退出清晰度得分可大幅提升。
    data:
      items:
        - label: 市场机会
          score: 8
          note: 18 亿学习者，实时辅导 SAM 28–120 亿美元，CAGR 超 18%
        - label: 产品与竞争壁垒
          score: 7
          note: 人类主导的 AI 模型、逾 10 万名教师、专有课堂、90 + 语种；AI 颠覆风险限制满分
        - label: 团队与执行力
          score: 7
          note: 创始人经验丰富，高管团队强劲（前 Airbnb、Delivery Hero、Flowspace）；基辅集中风险
        - label: 增长验证
          score: 6
          note: GMV 增速 50%，声称五年营收增长 10 倍；EBITDA 转正——均未经审计/为公司自述
        - label: 单位经济与利润率
          score: 4
          note: EBITDA 转正经多方独立来源确认；毛利率与 NRR 未披露
        - label: 财务透明度
          score: 2
          note: 2021 年后无 ARR 或营收披露；无毛利率、NRR 或 CAC 数据
        - label: 估值吸引力
          score: 2
          note: 未经核实基数对应隐含收入倍数 8–15 倍；相对所有公开可比公司均偏高
        - label: 退出清晰度
          score: 3
          note: 无 IPO 申报、无并购信号；高盛合作关系积极但无约束力
    approximationNotes: 评分采用 0–10 序数量表。单位经济与财务透明度维度缺乏有数据支撑的量化输入；得分反映证据缺口而非负面证据。
    claimRefs:
      - CV001
      - CV002
      - CV007
      - CV010
      - CV013
      - CV031
      - CV033
      - CV039
