      - number: '7.2'
        title: 运营、安全与信任安全风险
        blocks:
          - type: paragraph
            body: >
              Preply 平台在 April 2025 至 February 2026 之间发生至少 6 次完全或部分中断，包括 June 2025 一次 1-hour-31-minute 局部中断，以及
              April、August、October、December 2025 的完全中断。每次中断都会直接阻止已排定课程发生，造成面向学习者的服务失败和潜在退款义务。没有公开 SLA；因此企业 B2B
              客户没有可独立执行的正常运行时间保证，合同条款也未知。


              Preply 的导师审核框架明显弱于许多机构客户（学校系统、雇有未成年员工的企业）会要求的标准。身份验证于 October 2020
              推出，仅包括实时政府签发证件照片，没有犯罪背景调查、资质核验或推荐人核查。平台社区指南明确禁止虚假陈述和剥削，但依赖用户举报和事后审核，而不是预防性筛查。PissedConsumer（111 条评价）和 BBB
              上的投诉持续提到假学生账户、虚假评价，以及偏向平台、让导师吃亏的争议处理。围绕自动续费计费、冻结收入和客服无响应的持续负面评价，带来监管部门对暗黑模式的审查风险，尤其是在面向在线市场运营者的 EU DSA
              (Digital Services Act) 义务之下。


              2024-2025 年未识别出涉及 Preply 的公开重大数据泄露，这是一个正面数据点。但 ITRC 2024 Annual Data Breach Report 记录了 technology/SaaS
              全行业接近纪录高位的受侵害数量，说明没有泄露并不等于结构性免疫。Preply 未公开披露 SOC 2 Type II 认证、网络保险覆盖或独立渗透测试项目。此外，依赖 OpenAI 的 API 意味着
              Preply 继承 OpenAI 次级处理方链条的任何上游数据暴露风险——2025 年 OpenAI/Mixpanel 事件就是例子，当时第三方分析提供商遭遇泄露，影响 AI 平台客户。
