      - number: '5.3'
        title: AI 引擎、差异化优势与数据飞轮
        blocks:
          - type: paragraph
            body: >
              Preply 核心的技术差异化在于"以人为主、AI 赋能"模式：AI 自动化处理教师的行政与内容生成任务，同时保持人工教学居于核心。这与 Duolingo 2025 年 4 月宣布的"AI
              优先"转型形成鲜明对比。2024–2025 年推出的三款 AI 产品构成当前的 AI 产品矩阵。Lesson Insights 调用 OpenAI
              大语言模型分析课程记录，生成涵盖词汇（新词、近义词）、语法（纠错、错误模式）、口语（语速、发音）三大维度的个性化课后总结，教师节省行政时间，学员获得可落地的 CEFR 对齐反馈。Daily Exercises
              自动生成与课程内容及学员重点领域匹配的课间练习。Scenario Practice 借助由对话代理（角色内对话，CEFR 校准）驱动的虚拟人物及后台静默运行的 Supervisor
              Agent（任务状态、提示叠加层、安全横幅），将学员带入真实场景（咖啡馆、工作面试、酒店投诉）。


              Scenario Practice 的双代理架构颇具技术含量：角色提示负载包含 CEFR 等级及"能做事项"、环境背景、XML 标签封装的学员任务、话题文本和复杂度指引，令 B1 与 A2
              对话在结构层面而非表面层面有所不同。Supervisor 的 temperature 0.0 是一个硬性工程决策，依据是确定性二元会话状态选择的需要。Preply Canvas 内的 Teaching
              Assistant 则直接在课程工作区生成练习与口语提示。


              数据飞轮：课程记录、词汇追踪、错误模式和学习进展数据持续反哺 AI 模型优化与教师匹配信号。截至 2026 年第一季度，Preply 工程组织本身已原生 AI 化——全部 35 个开发团队中，AI
              编程工具每周使用率超过 90%，前 30 天内接受了超过 50 万行 AI 生成代码，每位工程师平均每周节省 4.88 小时，内部生产力与产品 AI 部署形成双向复利。
