  - number: 7
    title: 风险
    sections:
      - number: '7.1'
        title: 监管与法律风险
        blocks:
          - type: paragraph
            body: >
              Preply 运营一个服务 180 个国家学习者的跨境数据平台，因此受 General Data Protection Regulation (GDPR)、UK Data Protection Act
              2018、California Consumer Privacy Act (CCPA)、美国 Children's Online Privacy Protection Act (COPPA)
              以及其他国家隐私制度约束。公司已任命数据保护官（dpo@preply.com），通过 Preply Europe Services SL（Barcelona）维持 EU 代表，并在 March 3, 2026
              更新隐私政策，显示其在主动维护合规。不过，服务条款上一次公开更新仍是 February 1, 2021——早于 EU AI Act、COPPA 2025 规则修订和 2022-2024 GDPR
              执法浪潮。这带来实质文本新鲜度风险：消费者保护、仲裁条款和数据主体权利措辞可能已不能反映当前监管要求。


              EU AI Act 是最具时间压力的监管暴露。教育场景中用于录取决策、自动评分、学习者分级或考试监考的 AI 系统，在 Annex III 下被列为高风险；合规窗口将于 August 2, 2026
              关闭。违规罚款最高可达 €35M 或全球年营业额 7%。Preply 的导师匹配算法和 AI 驱动学习结果评估可能落入这一高风险边界；公司未披露公开 EU AI Act
              缺口分析或合格评定。被禁止用途——教育场景中的情绪识别——已于 February 2025 开始执行。


              即使 Preply 形式上面向 18+ 学习者，COPPA 暴露仍然重要。更新后的 FTC COPPA Rule（生效于 April
              2026）把覆盖范围扩展至生物识别数据，要求与第三方共享数据时取得单独家长同意，并适用于对服务 13 岁以下学习者具有“实际知情”的平台。Preply 在服务条款中允许 “Parents”
              作为独立用户类别，说明未成年人在范围内。修订规则下，民事罚款达到每项违规每天 $51,744。


              February 2021 服务条款中的强制个人仲裁条款和集体诉讼豁免没有公开更新或替换。EU 和 UK 消费者保护法可能使这些条款对欧洲用户不可执行，形成双轨诉讼风险：US
              用户被导向私人仲裁；欧洲用户可能提起法院诉讼或使用 EU 庭外救济机制。这种不对称增加了 Preply 最大商业地理区域（EU）的暴露。


              从 EU 和 UK 用户向 Preply, Inc.（Delaware/Massachusetts）进行的跨境数据传输，必须由 Standard Contractual Clauses 或 GDPR
              Article 46 下的其他获批机制约束。Preply 的隐私政策承认国际传输，但没有说明具体传输机制，也没有说明接收 EU 数据的次级处理方。鉴于 Preply 依赖 OpenAI（美国 AI
              提供商）提供核心产品功能，AI 次级处理方披露的充分性和透明度构成潜在 GDPR 风险。
