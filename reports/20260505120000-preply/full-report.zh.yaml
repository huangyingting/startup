      - number: '8.3'
        title: 情景分析：乐观、基准与悲观
        blocks:
          - type: paragraph
            body: >
              三种情景构建了以12亿美元入场的 D 轮投资人面临的结果区间。每种情景均采用相同的不可核实营收基础（2024年估算8,000万至1.5亿美元），并对增长率、利润率扩张和退出路径施加不同假设。


              乐观情景：营收处于分析师估算区间上限（2024/25年约1.5亿美元），在 B2B 业务占比达到总营收30%以上、AI 效率收益压缩教师获取成本、2027至2028年 IPO
              或战略收购的推动下，持续以40%以上的复合年化增速增长。以3亿美元营收和5至7倍前瞻倍数（与 AI 溢价教育科技 SaaS 私有可比标的一致），企业价值达15亿至21亿美元，为 D
              轮投资人带来1.25至1.75倍投资回报（MOIC）。IPO 窗口须为科技教育科技平台重新开启——该窗口自2022年起实质上已关闭。


              基准情景：营收处于估算中间值（2024/25年约1亿至1.2亿美元），以25至30%的复合年化增速增长。B2B 业务温和扩张，EBITDA
              利润率至2028年达到10至15%，公司于2028至2029年通过战略收购或 SPAC
              退出，前瞻收入倍数为5至6倍。退出价值4亿至6亿美元。以12亿美元入场，在优先权机制未能对投资人形成保护的情况下，将造成资本损失。


              悲观情景：受消费者可选支出宏观逆风、B2B 市场饱和或教师平台去中介化影响，营收增速降至15至20%。竞争对手（Duolingo AI、Microsoft Teams 企业集成或 Coursera
              重量级企业产品）抢占企业预算份额。受 AI 基础设施成本扩张（OpenAI API 费用攀升）影响，EBITDA 在2026至2027年再度转负。退出前发生下行轮次或结构性重组，路径类似 GoStudent
              从32亿美元高点跌至10亿美元以下的轨迹。


              在现有证据下，基准情景最为可能，这意味着 D 轮投资人在 Preply 退出前营收未达3亿美元以上的情况下，面临账面亏损风险。关键问题在于：D
              轮融资的1.5亿美元（加上累计融资2.99亿美元）能否提供足够的现金跑道，在退出窗口进一步收窄之前实现盈利验证并达到 IPO 就绪状态。
            claimRefs:
