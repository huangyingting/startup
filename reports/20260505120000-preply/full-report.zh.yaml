  - number: 8
    title: 估值
    sections:
      - number: '8.1'
        title: 投资论点与估值背景
        blocks:
          - type: paragraph
            body: >
              Preply 的 Series D 于 January 2026 完成，投后估值 $1.2 billion，由 WestCap 领投，Indico Capital Partners、Horizon Capital
              和 European Bank for Reconstruction and Development（EBRD）参投，Goldman Sachs International 担任唯一配售代理。披露融资总额约
              $299 million。该估值较 July 2023 Series C 延展轮估算的 $500–600 million 投后估值接近 3x，是 2022 年以来欧洲教育科技最大估值跃升之一。


              投资论点建立在五根支柱上。第一，截至 February 2026，Preply 是全球仅存 14 家 HolonIQ 认证 EdTech 独角兽之一；随着 GoStudent 因低于 $1B 被移出、Byju's
              崩塌，这份名单已收缩，Preply 入榜说明在线语言学习品类领导地位获得验证。第二，公司在 Series D 交割前 12 个月实现 EBITDA
              为正——这是运营成熟度里程碑，使其区别于大多数私有教育科技平台。第三，平台增长信号强：Series D 交割时可预约导师超过 100,000（Series C 时约 30,000）；CEO Kirill
              Bigai 在 November 2025 的 Inc. 访谈中称，October 2024 至 October 2025 的 GMV 增长 50%；公司声明 2020–2025 年收入增长
              10x（未审计）。第四，「真人主导、AI 增强」定位直接对抗只靠游戏化的同类（Duolingo、Babbel）；当企业 L&D 买家越来越需要真人教学和合规级进度追踪时，这一定位更有力。第五，B2B /
              Preply Business（2,000+ 企业客户）是经常性、更高毛利的收入层，给原本交易密集的市场平台引入订阅特征。


              反论点集中在一个结构性事实：2021 年后没有任何绝对收入数字公开披露。所有估值倍数计算都只能依赖分析师外推，不确定区间达 2–3x（2024–2025 年 $80–150M）。按 $1.2B 入场价，隐含
              EV/Revenue 倍数从 8x（基于 $150M 估算）到 15x（基于 $80M 估算）不等。Q4 2024 公开教育科技板块 EV/Revenue 中位数为 1.6x（Finerva），即便是高溢价异常值
              Duolingo，EV/LTM Revenue 也约为 3.7x（Multiples.vc，May 2026）。私有公司溢价可以成立，但相对最接近公开可比公司的市场交易倍数高出
              5–10x，需要净留存率（NRR）、毛利率和队列留存的非凡证据，而公开信息里没有这些证据。EBITDA 为正的说法未经审计，来自新闻稿引用的公司声明；公司既未披露 EBITDA 利润率，也未披露绝对 EBITDA
              数字。
