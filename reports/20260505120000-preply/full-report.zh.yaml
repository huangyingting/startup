      - number: '6.3'
        title: 具名客户证据——B2B 部署与 B2C 成效
        blocks:
          - type: paragraph
            body: >
              Preply 的具名客户证据涵盖有据可查的企业部署案例及一项 B2C 成效第三方研究。


              B2B 方面，Delivery Hero（全球食品外卖平台，柏林）是记录最完整的案例：截至 2024 年，双方合作已超过两年，631 名员工注册使用 Preply Business。Delivery Hero
              学习与发展专员 Philip Schiele 确认参与人数呈指数级增长，员工对跨文化融合培训反馈"非常积极"。合作围绕员工 L&D 预算展开，以英语和德语培训作为弹性福利。Genesys Informatica
              报告 72% 的员工认为工作表现获得积极影响；Music AI 记录超过 90% 的员工提升了语言技能；Toyota Material Handling Polska 借助 Preply Business
              攻克员工口语障碍；Miro 人才项目专员 Yulia 将 Preply 的多时区灵活性和行业专业教师称为"我们全球业务不可或缺的存在"。Unilever 和 Datadog 在多家媒体中被援引为企业客户，折射出
              Preply 向高留存经常性企业合同的转型。以上账户均被描述为生产部署，而非试点。


              B2C 方面，2025 年 LeanLab Education 研究——该机构为独立非营利研究机构——在 Preply 上招募 67 名以西班牙语为母语的成年学员，开展为期 12 周的英语项目。结果：每 3
              名学员中有 1 人提升了 CEFR 等级；学员进步速度是标准速率的 3 倍（每 CEFR 等级 24–48 学时，而行业典型为 160–240 学时）。完成 24 节课以上后：97% 对英语口语感到自信，94%
              感到更为流利，96% 将成功归因于人工教师。上述结果由 Preply 于 2025 年 9 月通过 PR Newswire 发布，并获 EdTech Innovation Hub 独立报道。注：该研究系与
              Preply 合作开展，目前尚无公开记录的独立重复验证。
