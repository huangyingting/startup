      - number: '4.5'
        title: 资本充足性与融资结构
        blocks:
          - type: paragraph
            body: >
              Preply 的融资历史已在公司概况章节汇总，本节聚焦财务结构与承销相关的资金跑道问题。2023 年 7 月 C 轮延伸融资共计 $70M，其中 Horizon Capital 领投 $42M 股权，另有
              $28M 债务。融资时，CEO Kirill Bigai 表示公司拥有"充裕的跑道，且上一轮绝大部分资金仍在账上"，表明此次扩展属于机会型融资，而非迫于资金压力。$28M
              债务设施的利率与到期日至今未公开披露，是资本结构信息的一个缺口。


              欧洲复兴开发银行（EBRD）通过 HCGF IV Co-Investment I SPV（项目编号 EBRD-54896，2023 年 10 月批准）以股权形式投入 $4.6M，资金经由 Horizon
              Capital 基金专项支持 Preply 的乌克兰研发业务。国际金融公司（IFC）在同一轮（2023 年 7 月）与 EBRD 并肩跟投 $10M。2026 年 1 月，EBRD 宣布在 $150M D
              轮的同时再度以股权形式跟投 $20M。


              D 轮融资（2026 年 1 月）以 $1.2B 估值完成，是 Preply 迄今最大一笔融资，Goldman Sachs International 担任唯一配售代理。募资用途明确分配为：（1）AI
              及数据基础设施扩容；（2）产品与工程团队扩张，含纽约、伦敦、巴塞罗那、基辅四地 100 余名新员工；（3）全球市场扩张，触达新学员与教师群体。2025 年底实现 EBITDA
              正值意味着烧钱率已大幅收窄，$150M D 轮资金预计可将跑道延伸数年，短期内无需再融资。Preply UK Services Ltd 已于 2024 年 5 月在英格兰及威尔士注册成立（公司编号
              15717575），首次财务报告将于 2026 年 9 月前提交，届时可提供英国实体的财务数据支撑。
