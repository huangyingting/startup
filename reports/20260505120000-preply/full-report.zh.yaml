      - number: '3.6'
        title: 附录
        blocks:
          - type: callout
            title: 导师多平台运营削弱供给侧锁定效应
            body: |
              已记录的导师在 Preply、iTalki、Cambly、Verbling 等平台间的多平台运营是一项结构性弱点。导师面临
              维持低佣金竞品档案的合理经济激励。Preply 18—33% 的梯级抽成是直接市场竞品中最高的（iTalki 固定
              15%）。若核心高产导师群迁移至 iTalki 或转向独立经营，Preply 的供给侧质量与可用性将随之下滑。
              缺乏导师独家协议以及多平台同时运营的便捷性进一步放大了这一风险。
            calloutType: risk
            claimRefs:
              - CP020
              - CP021
              - CP042
          - type: callout
            title: 双细分市场定位降低被复制风险
            body: |
              Preply 通过共享导师池同时服务 B2C 个人学习者和 B2B 企业客户的能力，是 goFLUENT、Speexx、Berlitz
              等纯企业竞品在不建立消费端获客渠道的情况下难以复制的结构性优势。同样，iTalki、Cambly 等纯消费端
              竞品若要挑战 Preply Business，也需要大量企业产品投入。这一双细分护城河目前是 Preply 竞争地位中
              防御性最强的结构特征，因为它实现了导师供给在消费端和企业端需求之间的交叉补贴。
            calloutType: strength
            claimRefs:
              - CP001
              - CP030
              - CP034
  - number: 4
    title: 财务情况
    sections:
      - number: '4.1'
        title: 收入模式与定价
        blocks:
          - type: paragraph
            body: |
              Preply 通过在市场上每笔课程预约中抽取佣金来实现收入。每位新学员的首节体验课佣金为 100%——导师
              本课时颗粒无收。此后所有课程按导师在平台累计授课时长实行梯级抽成：新导师（0—199 小时）33%，
              200—399 小时降至 27%，400—799 小时降至 22%，超过 800 小时后降至 18%。Sacra 估算 Preply 约
              95% 的收入来自语言课佣金，剩余约 5% 来自非语言辅导及尚处早期的产品线，如导师曝光增值位和企业
              席位费。

              学生端，Preply 已切换至 28 天周期计费的订阅模式。学员选择每周与特定导师上一至五节课，总费用取决
              于该导师自行设定的时薪。主要语言（英语、西班牙语、法语）的 B2C 课时均价约为每小时 15—25 美元，
              全平台范围为 3—90 美元，视导师经验、语言稀缺性和专业方向而定。企业客户方面，Preply Business
              提供按合同范围定制的每席位订阅方案，无公开定价表。订阅模式使 Preply 能够对未来课程形成可见性，
              并相较旧有的按课时包付费模式稳定了导师收入，降低了学员购包后无故消失不上课的风险。

              100% 体验课佣金充当有资金支持的获客机制：Preply 承担导师的机会成本以换取降低学员购买摩擦。
              体验课满意的学员被激励转入订阅，Preply 随即开始赚取持续的佣金收益。
            claimRefs:
