      - number: '2.3'
        title: 买家细分与采购路径
        blocks:
          - type: paragraph
            body: |
              Preply 服务两类主要买家：B2C 个人学习者和 B2B 企业客户。B2C 细分中，买家与付费方为同一人——即
              直接为辅导课付费的个人学习者，通常通过订阅或按课时购买额度。该细分涵盖寻求职业发展的职场人士、
              补充学业语言学习的在校学生、出行及移民群体，以及兴趣爱好类学习者。英语占据平台需求的主导地位，
              约占学习者课时数的 43%，反映了英语能力在职业与教育层面的全球溢价。据 Sacra 分析，截至 2022 年，
              B2C 活跃学习者约为 80 万人，覆盖 180 余个国家。

              B2B 细分中，买家是雇主的人力资源或 L&D 团队，终端用户则是员工学习者。Preply Business 服务于逾
              2,000 家企业客户，包括 TikTok、Zendesk、Eventbrite、Mondelēz、Bain、Prudential 和 Bayer。企业
              采购通常由国际化扩张、跨团队沟通障碍或人才发展授权推动。B2B 采购流程包括：初始需求沟通与方案
              设计、专属入职专家配置、学习者与导师匹配启动阶段，以及持续的管理层进度看板。企业细分的切换成本
              较高：与 HRIS 的集成、历史进度数据以及已建立的导师关系均形成锁定效应。地域人力成本套利使 Preply
              能够维持有竞争力的定价——低成本地区的导师获得高于本地的收入，而高成本市场的学习者则以低于本地
              导师的价格获得优质教学。
