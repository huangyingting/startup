      - number: '4.4'
        title: 公开牵引力和指标缺口
        blocks:
          - type: paragraph
            body: >
              Preply 最近一个公开验证收入数据为 2021 年 $50M，对应 39% 同比增长（Sacra 估计）。Sacra 还报告 2022 年收入增长约 51%，意味着 FY2022 约 $75M。2023 年
              7 月 Series C 延伸融资期间，CEO Kirill Bigai 披露「过去三年销售额增长十倍」；如果从 2020 年基准计算，这一公司口径数字可能意味着到 2022–2023 年总增长达到估计
              $80–130M 区间（取决于选择哪一年作为基准）。包括 Sacra 在内的分析师，基于持续双位数 CAGR 外推，估计 2023–2025 年收入在 $80–150M 区间，但公司未发布官方数据。


              平台规模方面：截至 2022 年，Preply 有 800,000 名学习者；按 Series D 新闻稿，导师供给到 2026 年 1 月已增至 100,000+ 名活跃导师——超过 Series C
              时的三倍。Preply 未公开披露净留存率（NRR）、月 GMV、毛利率、月活跃用户或流失率。基于已发布收入估计和 18–33% 的估计混合抽佣率，2022–2024 年隐含 GMV 区间约为
              $250–450M。对一家达到独角兽状态的公司来说，这是显著透明度缺口；任何承销模型都需要私下访问管理层账目。


              Preply 2025 年 Efficiency Study（与 LeanLab Education 合作开展）显示，学习者进步速度最高可达基准的 3 倍，三分之一学习者在 12 周内提升一个完整 CEFR
              等级——这是参与深度的定性代理指标，但不能替代队列留存数据。
