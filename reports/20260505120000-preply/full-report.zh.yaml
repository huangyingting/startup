      - number: '5.5'
        title: 信任、隐私、合规与安全
        blocks:
          - type: paragraph
            body: >
              Preply 的隐私与安全体系以 GDPR 合规为核心框架，加利福尼亚用户亦适用 CCPA。《隐私政策》（2026 年 1 月 27 日更新，3 月 3 日生效）将 Preply, Inc.
              指定为数据控制者，并公开列出 DPO 邮箱（dpo@preply.com）。欧盟代表为巴塞罗那的 Preply Europe Services SL，英国代表为伦敦的 Preply UK Services
              Ltd。Preply 以为期五年的合作聘请 Legal Nodes 担任虚拟 DPO，折射出内部法务团队精简、靠外部 GDPR 专业力量补位的模式。隐私设计原则与默认隐私保护被列为明确目标。


              认证与访问层面：Preply 支持 Google OAuth、Microsoft SSO 及 Okta 登录，提供邮箱和 TOTP（软件）双重验证。Nudge Security 画像确认 Stripe 和
              Braintree 为支付处理商、AWS 为主要云主机——代币化支付降低了 PCI 合规范围。NudgeSecurity 画像未能确认 SOC 2 或 ISO 27001
              认证（相关类别标记为未认证）。HackerOne 和 Bugcrowd 均未见公开漏洞赏金计划。2024–2025 年间，权威泄露目录及隐私媒体未发现 Preply 的确认数据泄露或安全事件。


              学生数据保护是规模化处理课程音频、记录及学习行为数据的 EdTech 平台的持续关注点。AI 功能套件（Lesson Insights、Scenario
              Practice）会生成与学员身份关联的详细记录和错误模式数据。Preply 博客证实对 AI 输出质量和安全防护进行迭代评估——Scenario Practice 的 Supervisor
              针对涉及医疗、法律、财务或心理领域的场景设有安全横幅机制，但上述控制措施属于产品设计层面，尚未经过独立审计。
