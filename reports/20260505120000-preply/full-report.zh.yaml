      - number: '8.2'
        title: 融资结构与可比标的
        blocks:
          - type: paragraph
            body: >
              D 轮结构有几项值得在估值尽调中深入拆解的特征。Goldman Sachs International 担任私募成长轮的独家配售代理，意味着采用了典型的 pre-IPO
              或结构性流动性轮次的机构投资者营销流程，表明 WestCap 及联合投资人可能经历了竞争性流程，并获得了公开领域所没有的财务披露。EBRD——一家开发性金融机构——与商业 VC
              同台参投，暗示本轮可能纳入了开发银行定价参数（如反稀释、赎回权或社会回报契约），对普通股持有人的实际每股经济回报产生影响。2023年7月 C 轮延长轮包含2,800万美元债务；D
              轮中是否存在债务成分至今未披露。若12亿美元估值是纯股权条款下的投后估值且不含参与分配优先权，则普通股覆盖较为清晰；若带有参与分配优先权或清算倍数，则实际每普通股价值将偏低。上述条款均无公开可查数据。


              Preply
              的可比标的横跨两个维度：（1）直接语言学习同类——含上市和非上市；（2）更广泛的教育科技市场类别。直接同类中，Duolingo（纳斯达克：DUOL）是唯一大型上市语言学习公司，其50亿美元市值和约3.7倍
              EV/LTM 收入设定了该板块的公开市场上限。Coursera（纽交所：COUR）交易在约0.3倍 EV/收入——但因其内容授权而非真人教师模式及结构性下滑，不构成直接可比。Chegg（纽交所：CHGG）旗下
              Busuu 为语言学习 SaaS 业务（预计2025年营收约4,800万美元），受 AI
              搜索冲击遗留业务，市值已压缩至约1.23亿美元，交易在不足0.3倍收入水平，为消费者教育科技板块提供了警示案例。GoStudent 是与 Preply
              在辅导市场模式上（一对一课程、市场佣金）最接近的私有可比标的，于2025年11月在 HolonIQ 名单中被移除——主要投资人将其从32亿美元峰值重估至10亿美元以下，与 Preply
              入选名单同步发生，是一个直接且当代的警示信号。Speak（10亿美元，2024年12月）是当前 HolonIQ
              名单中唯一另一家确认的语言学习独角兽，但属于应用优先的语音练习产品，模式差异显著且无真人教师。iTutorGroup 持有2015年融资轮给出的10亿美元估值——数据陈旧，无法反映当前市场状况。


              当前阶段最具防御性的 Preply 估值框架，是以管理层核实的2025年营收为锚点的前瞻 ARR
              倍数，并对以下因素进行折扣：（1）私募市场流动性折扣（通常为公开可比标的的30至40%）；（2）基辅研发中心的战争相关运营风险溢价；（3）消费端 GMV 集中、NRR 及毛利率均未披露。以 Duolingo
              3.7倍公开倍数为基础，施加40%私募折扣，隐含2.2倍 ARR 倍数，若要支撑12亿美元估值，则营收须约达5.45亿美元——远超任何可信估算。即便施加15倍增长溢价（仅在营收复合增长40%以上时方可适用 VC
              式成长倍数），12亿美元也隐含8,000万美元 ARR，处于分析师估算区间下限。这一数学框架在结构上依赖于私有数据。
