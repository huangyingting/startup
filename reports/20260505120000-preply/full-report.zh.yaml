      - number: '2.2'
        title: 市场规模：TAM、SAM 与 SOM
        blocks:
          - type: paragraph
            body: |
              在线语言学习的市场规模因各研究机构对范围定义、地理覆盖及研究方法的差异而存在显著分歧。就最宽口径
              而言，Meticulous Research 估算 2024 年全球语言学习市场（涵盖所有模式与地区）规模为 643 亿美元，
              预计以 12.5% 的复合年均增长率增至 2035 年的 2,270 亿美元；GM Insights 则将同一市场 2025 年规模
              定为 851 亿美元，复合增速 22.9%。HolonIQ 2021 年对 D2C 细分的预测目标为 2025 年达 1,150 亿
              美元；该预测的实际兑现情况暂无公开数据可供验证。

              聚焦纯数字交付，Grand View Research 估算 2024 年在线语言学习市场规模为 221 亿美元，以 16.6% 复合
              年均增长率增至 2030 年的 548 亿美元。其中，在线直播辅导子细分边界更为清晰：Research and Markets
              报告 2024 年一对一及小组直播辅导市场规模为 28 亿美元（18.6% 复合增速，至 2030 年达 79 亿美元）；
              DataIntelo 则以更宽泛的定义（含线上线下混合渠道）将同类别估算为 2024 年 78 亿美元；Market.us
              专门估算语言学习教育科技市场为 2024 年 117 亿美元。可服务市场估算值的 4 倍落差（28 亿至 120 亿
              美元）使得在缺乏专有数据的情况下无法进行精准的市场渗透分析。

              企业在线语言学习子市场（Preply B2B 切入点）方面，Verified Market Reports 估算 2024 年规模为
              105 亿美元，增速 8.2%；Growth Market Reports 将企业语言培训整体市场估算为 2024 年 78 亿美元，
              增速 9.1%。Preply 自身收入未公开；Sacra 最新估算为 2021 年 5,000 万美元。2024—2025 年无第三方
              验证数据，缺乏内部财务数据时，可获取市场（SOM）的计算只能依赖推测。
