      - number: '4.6'
        title: 财务判断
        blocks:
          - type: paragraph
            body: >
              Preply 的增长故事在财务上具备可信度，结构性亮点也清楚：订阅式计费提升收入可预测性；B2B 企业业务增长 230%+，应能改善综合利润率；EBITDA-positive 里程碑验证资本效率；来自
              WestCap、EBRD、IFC、Horizon Capital 等机构投资者的总融资达到 $299M。与内容驱动型教育科技相比，市场平台模式天然拥有更高毛利率，因为 Preply
              不自建专有课程，而是变现发现与预订这一层。


              尽调阻断项同样实质。自 Sacra 2021 年估算以来，Preply 未披露任何年经常性收入（ARR）、净留存率（NRR）、毛利率、队列留存曲线或 CAC/LTV——这相当于一个 Series D 独角兽仍按
              pre-Series A 披露标准运作。2023 年 $28M 债务额度条款未公开。R&D 运营集中在受战争影响的
              Kyiv，带来运营连续性风险，而公开材料没有充分量化。导师论坛中的学生端流失证据显示，许多学习者是阶段性消费，而非真正绑定订阅，这会压制净留存率（NRR）。


              在 $1.2B 估值和估计 8–12x 收入倍数下，Preply 的定价与 Duolingo 等高增长教育科技可比公司接近（公开市场倍数 12x），但要支撑这份溢价，高度依赖 EBITDA 持续改善和 B2B
              合同增长。财务结论偏谨慎建设性：商业模式成立，轨迹有吸引力；但如果拿不到管理层私有财务报表和完整资本结构细节，证据缺口仍不足以支持高置信度投资判断。
            claimRefs:
              - CI023
              - CI033
              - CI034
              - CI035
              - CI038
              - CI039
