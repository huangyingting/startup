            title: 投资承诺前的核心尽调要求
            body: |
              1. EU AI 法案差距分析及2026年8月合规路线图。
              2. 就加州 AB5 和 EU 平台工作指令，委托独立劳动法律顾问评估教师定性问题。
              3. 2021年后营收、ARR 及毛利率披露，附审计追踪记录。
              4. 基辅办公室业务连续性计划及情景分析。
              5. 经董事会批准的 CEO 继任框架。
              6. SOC 2 Type II 认证或等效网络安全审计。
              7. 覆盖 OpenAI 的完整子处理方名单及标准合同条款（SCC）附表。
