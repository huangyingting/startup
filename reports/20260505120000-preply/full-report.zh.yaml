      - number: '2.4'
        title: 增长驱动因素
        blocks:
          - type: paragraph
            body: |
              核心结构性驱动力是全球化。跨国企业持续扩张，对多语言团队的需求——涵盖客户沟通、跨职能协作与市场
              进入——同步增长。2024 年北美以 36% 的份额领跑在线语言学习市场，但亚太是增速最快的地区：仅中国
              在线语言辅导市场便预计以 24.2% 的复合增速增至 2030 年的 17 亿美元。英语预计在 2025 年前继续保持
              逾 67% 的语言学习市场份额，折射出其在商业与教育领域的全球默认地位。

              AI 既是驱动力，也是一把双刃剑。从积极面看，AI 帮助 Preply 减轻导师行政负担（备课、作业生成、
              进度追踪），提升导师与学习者的匹配精准度，并实现学习路径个性化。这些能力通过降低备课开销、改善
              匹配质量提升留存，从而优化单位经济效益。Preply 委托 LeanLab Education 于 2025 年完成的研究显示，
              96% 的学习者认为在线真人辅导对进步至关重要，97% 认为其有助于建立口语信心，支持了"AI 辅助真人
              导师是增值而非替代"的判断。企业 L&D 对语言培训的投入持续上升：92% 的 Preply Business 学员报告
              工作表现改善；移动端数字交付预计到 2025 年将占语言学习收入的 40% 以上。据 Preply 引用的 HolonIQ
              数据，2026 年前五年全球 D2C 语言学习市场规模据报增至三倍。
