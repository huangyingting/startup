      - number: '5.4'
        title: B2B 产品与企业集成
        blocks:
          - type: paragraph
            body: >
              Preply Business 在核心市场平台之上叠加了一层专属企业产品。B2B 产品面向大规模部署语言培训项目的公司中的 L&D 管理者（截至 2025 年已有 2,000 余家企业客户，包括
              Unilever、Datadog、Miro、Delivery Hero 和 CloudPay）。企业功能包括：与 Azure AD、Google、Okta 及 SAML 1.0/2.0 身份提供商的 SSO
              集成；基于 SCIM 的学员自动注册与注销；覆盖学员活跃度、入职进度、课程出勤率、余额管理及技能发展的实时分析企业仪表盘；对齐业务目标的公司级目标与技能指标设定；批量学员上传；以及专属入职辅导与客户成功支持。


              企业仪表盘的设计颇具 L&D 应用价值：管理员可识别低参与度学员而无需打扰学员本人，转让未用课时额度，并为合规与 HR 报告导出数据。该仪表盘直击 L&D
              采购方的"证明投资回报率"痛点——数据可导入企业系统，并以参与度和成效指标支撑高管层对话。AI 功能（Lesson Insights、Daily Exercises、Scenario Practice）对 B2B
              学员同样可用，成效追踪在仪表盘中呈现。


              Preply Business 披露的数据显示：与小组语言课相比，参与度提升 3.5 倍；92% 的 HR 领导者会推荐该平台；97% 的 B2B 学员在英语口语方面更有信心；企业学员平均教师评分为
              4.9/5。SSO/SCIM 之外的集成深度（LMS 连接器、超出配置范围的 HR 系统 API）未见公开记录，是企业评估中的尽调缺口。
