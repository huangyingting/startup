      - number: '3.4'
        title: 替代品和现状方案
        blocks:
          - type: paragraph
            body: >
              最重要的非平台替代品是企业现状：内部语言项目、本地语言学校、基于教材的学习，以及通过 Coursera、LinkedIn Learning 或内部 HR 系统交付的混合 LMS 课程。对企业买方而言，尤其是已有
              L&D 基础设施和既有供应商关系的大型组织，这些就是在位方案。讲师主导的企业语言培训市场预计到 2026 年超过 $45B，企业客户贡献超过 47% 收入——这凸显 Preply 的增长论点取决于用可衡量 ROI
              和工作流集成，替代根深蒂固的支出模式。


              在 B2C 消费者细分中，Duolingo 是最重要的间接威胁。凭借 500M+ 注册用户以及 2024 年推出的 Duolingo Max（GPT-4 驱动的会话练习），Duolingo
              已部分缩小游戏化自学与会话练习之间的质量差距，尤其面向初级到中级学习者。Babbel、Rosetta Stone 消费者版和 Pimsleur 提供自定进度替代品，足以满足休闲词汇习得。这些替代品不会取代
              Preply 的高端定位——高级、商务导向和高风险场景学习者仍强烈偏好真人辅导——但它们会压制 Preply 在入门层级的 B2C 可服务市场，并可能放慢学习者从免费或低价工具升级到付费辅导的漏斗。
            claimRefs:
              - CP015
              - CP027
              - CP028
              - CP029
              - CP036
              - CP041
      - number: '3.5'
        title: 切换成本、锁定和竞争护城河
        blocks:
          - type: paragraph
            body: >
              Preply 的竞争护城河最适合定义为中等、且部分具备结构性。140,000+
              导师网络是有意义的供给侧资产：长尾语言的导师可得性深度和广度，能相对小平台降低学习者流失。不过，这道壁垒并非不可逾越。导师和学习者的切换成本都低：没有硬件依赖，没有专有数据格式，课程历史也不能在平台间迁移。导师多平台经营普遍且有充分记录，许多导师同时在
              Preply、iTalki、Cambly 和 Verbling 保持活跃资料，以分散收入来源。独立评测证据确认，一旦导师建立学生基础，iTalki 15% 固定佣金模式让它成为对成熟教师更友好的平台。


              B2B 侧，切换成本显著更高。Preply Business 通过 HRIS 和 LMS 集成（SSO、连接主要 HR 系统的 API）、嵌入既有 HR
              工作流的管理者仪表盘、专属上线团队，以及与员工绩效周期绑定的结构化进度基线，创造企业粘性。一旦部署到全球员工队伍并嵌入评审流程，迁移到竞争对手的成本——重新培训 HR
              管理员、重新配置集成、重建进度基线——就有意义。这一点可与 goFLUENT 和 Speexx 相比，尽管 Berlitz 在受监管垂直中的数十年采购关系仍更难撬动。Preply 护城河中结构性暴露最高的维度是
              AI 替代：如果免费 AI 对话工具继续进步，Preply 按课定价模式会在低 ASP 的 B2C 端面临挤压。
