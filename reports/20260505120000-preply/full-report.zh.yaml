      - number: '4.6'
        title: 财务评级
        blocks:
          - type: paragraph
            body: >
              Preply 的增长故事在财务层面有足够说服力，结构性亮点包括：基于订阅的计费模式增强了收入可预测性；B2B 企业业务增速超过 230%，应能拉高混合毛利率；EBITDA 转正里程碑验证了资本效率；累计获得
              WestCap、EBRD、IFC、Horizon Capital 等机构投资者共 $299M 融资。与内容驱动的 EdTech 公司相比，Preply
              的市场平台模式天然具有更高的毛利率——公司不自制课程，而是从发现与预约层面变现。


              尽调障碍实质性存在。自 2021 年 Sacra 估算以来，Preply 未披露任何 ARR、净留存率（NRR）、毛利率、队列留存曲线或 CAC/LTV 数据，相当于一家 D 轮独角兽仍沿用 A
              轮前的披露标准。$28M 的 2023 年债务设施条款至今未公开。研发业务集中在战火中的基辅，形成运营连续性风险，但公开材料对此量化不足。教师论坛上的学员流失迹象表明，许多学员属于短期使用而非持续订阅，这将向下压
              NRR。


              以 $1.2B 估值及估算的 8–12 倍收入倍数计，Preply 的定价与 Duolingo（12 倍公开市场倍数）等高增长 EdTech 可比公司持平，但溢价成立需依赖 EBITDA 的持续改善和 B2B
              合同的持续增长。财务综合评级谨慎看多：商业模式稳健、发展轨迹有说服力，但证据缺口使高置信度承销难以实现，需获取内部管理账目及完整资本结构信息方可。
            claimRefs:
              - CI023
              - CI033
              - CI034
              - CI035
              - CI038
              - CI039
      - number: '4.7'
        title: 证据摘要
        blocks:
          - type: callout
            title: 融资前已实现 EBITDA 正值
            body: >
              在 $150M D 轮融资前的十二个月内实现 EBITDA
              正值，而非靠烧钱为融资背书，彰显了严格的资本配置纪律及单位经济学的拐点，验证了市场平台模式在规模化后的有效性。该里程碑也大幅降低了增速放缓时被迫进行过桥融资的风险。
            calloutType: strength
            claimRefs:
              - CI033
              - CI017
          - type: callout
            title: 独角兽规模下的营收透明度缺口
            body: >
              自 Sacra 2021 年估算 $50M 以来，Preply 未公布任何官方收入、ARR、毛利率、NRR 或 CAC/LTV 数据。以 $1.2B
              的估值而言，这种不透明度相当罕见，限制了第三方承销信心。任何可信的财务模型都须依赖内部管理账目；公开信息只能支撑一个宽泛的情景区间。
            calloutType: risk
            claimRefs:
              - CI029
              - CI030
              - CI036
              - CI038
          - type: callout
            title: B2B 企业业务：利润率扩张的飞轮
            body: >
              企业合同——2021–2022 年间增长 230%，单一 12 个月内新增约 200 家企业客户——合同单价更高、多席位经济效益更佳、机构续约动力更强，留存表现应优于 D2C 消费者流失。若 B2B
              占比从少数跃升至多数，Preply 的混合利润率有望在未来三到五年内接近 SaaS 水平。
            calloutType: insight
            claimRefs:
              - CI010
              - CI011
              - CI023
          - type: callout
            title: 乌克兰研发集中风险
            body: >
              Preply 相当大比例的工程与研发团队驻扎在战火仍在持续的乌克兰基辅。尽管 Preply 自 2022 年以来展现出运营韧性，IFC/EBRD
              也专项投资支持当地业务，工程团队的位移风险、人才流失风险以及基础设施中断风险至今未在公开材料中量化。公司亦未披露任何针对乌克兰运营的正式业务连续性或灾难恢复计划。
            calloutType: risk
            claimRefs:
              - CI021
              - CI022
  - number: 5
    title: 产品与技术
    sections:
      - number: '5.1'
        title: 产品体系与客户价值主张
        blocks:
          - type: paragraph
            body: >
              Preply 的核心产品是通过 Preply Classroom 提供的实时一对一语言学习体验——Preply Classroom
              是一款完全基于浏览器和移动端的虚拟教室，无需借助第三方视频会议工具。教室内集成视频（多种布局：聚焦与九宫格）、实时聊天含文件共享、交互式白板、Canvas
              协作笔记空间、结构化笔记/课程总结面板、词汇闪卡系统（英语、法语、西班牙语）及屏幕共享，构成单一集成的上课界面。


              产品体系按四层架构组织：（1）核心市场平台——教师发现、筛选、带介绍视频的主页浏览、试听课预订及日程管理；（2）Preply Classroom——课中体验；（3）AI 学习工具——Lesson
              Insights、Daily Exercises、Scenario Practice，以及嵌入 Canvas 的 Teaching Assistant；（4）Preply Business——纯 B2B 层，含
              SSO、SCIM 配置、企业仪表盘、公司级目标与技能目标设定以及批量学员管理。


              学员端成效以 CEFR（A1–C2）为基准，细分为 Preply 子等级，并配有水平测试与等级晋升追踪。平台公布的数据显示，学员的进步速度是典型语言学习周期的 3 倍，该结论来自对完成 12 周 24
              节以上课程的学员开展的效率研究。截至 2026 年初，Preply 应用（iOS + Android）在 Google Play 的下载量超过 500 万次，获得 56,000 余条评价，评分
              4.7，移动端渗透颇具规模。产品刻意回避游戏化机制（连击、排行榜、积分），与 Duolingo 以参与度优先的策略形成对比。
