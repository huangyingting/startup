companyProfile:
  summary: >-
    Preply 是一家创立于乌克兰、总部位于美国的语言学习市场平台，把学习者与真人导师连接起来，并围绕课程交付、导师匹配、作业和进度追踪逐步叠加 AI 工作流工具。公司似乎已在消费者和企业语言培训两端达到有意义的规模；2026 年 1
    月的 Series D 加上 EBITDA 转正表述，也让它区别于多数承压的教育科技同业。承销上的主要问题不是业务是否真实，而是公开证据仍让收入基数、结构、利润率、留存和融资条款留下太多不确定性，难以让独角兽估值显得稳妥。
