  - number: 7
    title: 风险
    sections:
      - number: '7.1'
        title: 监管与法律风险
        blocks:
          - type: paragraph
            body: >
              Preply 运营一个服务 180 个国家学员的跨境数据平台，因此须遵守《通用数据保护条例》（GDPR）、英国《2018
              年数据保护法》、《加利福尼亚消费者隐私法》（CCPA）及美国《儿童在线隐私保护法》（COPPA）等多套国家隐私法律框架。公司已任命数据保护官（dpo@preply.com），通过巴塞罗那的 Preply
              Europe Services SL 设立欧盟代表，并于 2026 年 3 月 3 日更新了《隐私政策》，显示出主动合规维护。但《服务条款》最近一次公开更新停留在 2021 年 2 月 1 日——早于《欧盟 AI
              法案》、COPPA 2025 年规则修订及 2022–2024 年 GDPR 执法浪潮。这造成实质性的时效风险：消费者保护、仲裁条款及数据主体权利措辞可能不符合当前监管要求。


              《欧盟 AI 法案》是最紧迫的监管敞口。用于招生决策、自动评分、学员分级或考试监督等教育场景的 AI 系统在附件 III 下被列为高风险，合规窗口于 2026 年 8 月 2 日关闭。违规最高处以 €35M
              或全球年营业额 7% 的罚款。Preply 的教师匹配算法和 AI 学习成效评估或落入高风险范畴，但未见任何公开的欧盟 AI 法案缺口分析或合规评估披露。禁止使用场景——教育情境中的情绪识别——已于 2025 年
              2 月起强制执行。


              尽管 Preply 正式定位服务 18 岁以上学员，COPPA 敞口仍不可忽视。更新后的 FTC COPPA 规则（2026 年 4
              月生效）将覆盖范围扩展至生物特征数据，要求就与第三方共享数据单独征得家长同意，并适用于具有"实际知情"向 13
              岁以下用户提供服务的平台。Preply《服务条款》将"家长"列为独立用户类别，暗示未成年人在服务范围之内。修订规则下，每次违规每日民事罚款最高达 $51,744。


              2021 年 2
              月《服务条款》中的强制个人仲裁条款和集体诉讼放弃条款至今未被公开更新或替换。欧盟和英国消费者保护法可能使上述条款对欧洲用户不具约束力，形成分岔诉讼风险：美国用户被引导至私人仲裁，欧洲用户则可提起法院诉讼或援引欧盟庭外救济机制。这种不对称性加剧了
              Preply 最大商业地理市场（欧盟）的风险敞口。


              来自欧盟和英国用户的跨境数据向 Preply, Inc.（特拉华州/马萨诸塞州）的传输须依据 GDPR 第 46
              条由标准合同条款或其他批准机制管辖。Preply《隐私政策》承认存在国际数据传输，但未说明具体传输机制或接收欧盟数据的次级处理商。鉴于 Preply 依赖 OpenAI（美国 AI 供应商）提供核心产品功能，AI
              次级处理商披露的充分性与透明度是潜在的 GDPR 风险。
