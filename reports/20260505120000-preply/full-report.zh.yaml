      - number: '1.2'
        title: 创始人和领导层
        blocks:
          - type: paragraph
            body: >
              Preply 由 Kirill Bigai（CEO）、Dmytro Voloshyn（CTO）和 Serge Lukianov 于 2012 年联合创立。Bigai
              仍是公司的公众面孔和主要发言人；他频繁出现在媒体中，也让公司存在关键人物依赖风险。Voloshyn 负责工程和技术战略，监督自有的 Preply Classroom 和 AI
              基础设施。除联合创始人头衔外，Lukianov 当前运营角色没有公开确认。2023 年 Preply 设立 New York 办公室后，高管团队明显扩充：Sofia Tavares 加入担任首席品牌官（此前为
              Delivery Hero 品牌 SVP；会八种语言），Jerry Kingkade 加入担任首席营收官（曾任 Flowspace CRO 和 Houzz 销售 VP）。Aurélien Pallain
              担任首席运营官。Josh Crossick 是首席产品官。Keiran Dodd 负责人力与人才。Toni Sfeir 是 B2B VP。董事会构成披露不完整；已确认成员为 Kirill Bigai 和
              Allen Mask（WestCap 合伙人、前 Airbnb 高管），后者在 2026 年 1 月 Series D
              中加入。此前融资轮投资方的其他董事代表尚未公开确认，这对后期私营公司并不罕见。公司报告称，84% 员工愿意推荐 Preply 为理想工作场所（2025 年内部敬业度调查）。领导层变动是渐进式的，公开记录中未发现
              2023 年以来的重大离任。自 2022 年 2 月俄罗斯全面入侵以来，Preply 的乌克兰创始团队一直维持 Kyiv 运营；CEO 称这一决定强化了组织韧性和创造力。
