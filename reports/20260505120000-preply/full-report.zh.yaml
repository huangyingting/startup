  - id: TV005
    title: 投资逻辑颠覆与终止触发条件
    columns:
      - 触发因素
      - 触发阈值
      - 对投资逻辑的冲击路径
      - 建议应对措施
    rows:
      - - 营收增速放缓
        - D 轮后连续两年 YoY 增速低于 20%
        - 侵蚀 8–15x 隐含倍数；即便基准情景下，普通股持有人退出也将亏损
        - 启动结构化退出或老股出售；重新评估持仓
      - - EBITDA 逆转
        - 公司因 AI 基础设施投入，于 2026 或 2027 财年重新出现 EBITDA 亏损
        - 打破与衰退教育科技同行的关键差异化优势；重蹈 GoStudent / Byju's 覆辙
        - 要求管理层提交含时间表的改善方案；评估下行融资风险
      - - AI 辅导商品化
        - Microsoft、Google、OpenAI、Duolingo 等主要平台推出效果相当的 AI 实时辅导产品，月费低于 10 美元
        - 摧毁 18–33% 佣金分成模式；导师转平台或离场；学员获客成本（CAC）急升
        - 影响立竿见影；重新评估护城河与防御性；一旦确认，12 个月内择机退出
      - - 基辅研发中断
        - 单一事件（直接打击、长时间断电、疏散令）导致基辅技术人员流失超 30%
        - 冲击 AI 产品路线图与平台稳定性；基辅 150 名员工约占全球员工总数的 20%
        - 每月跟踪；要求管理层提供基辅团队职能地理冗余的证明
      - - 劳工身份误分类裁定
        - 美国、欧盟或英国法院 / 监管机构作出不利裁决，要求将导师认定为雇员
        - 根本性改变佣金经济模型；毛利率压缩 15–25 个百分点
        - 法律与商业冲击立即显现；极可能触发估值减损事件
      - - 优先股压制激活
        - 退出价值低于累计融资额 2.99 亿美元，触发普通股持有人清算优先权悬崖
        - 普通股持有人（员工、种子轮）零回报；期权池深度溺水；人才留存风险上升
        - 需要结构性解决方案（资本重组、棘轮触发或协商普通股分配）
    notes: 触发阈值为尽调参考标准，并非合同条款。劳工误分类风险有行业先例：Uber / Lyft 近年在美英两国的相关案件中支付了逾 5 亿美元和解金。
    claimRefs:
