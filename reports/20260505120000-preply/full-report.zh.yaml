chapters:
  - number: 1
    title: 公司概况
    sections:
      - number: '1.1'
        title: 公司定位与商业模式
        blocks:
          - type: paragraph
            body: |
              Preply 是全球在线一对一语言辅导市场，定位为全球最大的真人导师教学平台。平台将学习者与独立导师连接，
              支持预约视频课，并配备 AI 副驾套件，可生成课堂总结、制定个性化作业，并通过机器学习算法为学习者匹配
              最优导师。Preply 的战略定位是"真人主导、AI 赋能"——刻意与 Duolingo 等游戏化或全自动竞品形成反差。
              2025 年由非营利研究机构 LeanLab Education 联合开展的效能研究显示，96% 的学习者认为真人导师对进步
              至关重要，97% 表示真实对话是建立口语信心的关键。商业模式以佣金为核心：导师前期抽成 33%，累计授课
              满 400 小时后降至 18%；每位新学员的首节体验课费用由 Preply 全额留存。企业端产品 Preply Business
              覆盖全球逾 2,000 家企业客户，包括 Unilever 和 Datadog，提供带进度看板的托管语言培训项目。公司注册
              地在美国马萨诸塞州，但运营起源及大部分研发团队仍在乌克兰基辅。官方宣传将其描述为"2012 年在美国
              创立"，而 Wikipedia、The Recursive 等独立来源则记录其最初创立于基辅；这一出入很可能反映的是美国
              注册时间，而非实际运营起源。
