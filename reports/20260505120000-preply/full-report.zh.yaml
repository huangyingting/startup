  - number: 5
    title: 产品与技术
    sections:
      - number: '5.1'
        title: 产品套件与客户价值主张
        blocks:
          - type: paragraph
            body: >
              Preply 的核心产品是通过 Preply Classroom 交付的一对一真人语言学习体验。Preply Classroom 是完全基于浏览器和移动端的虚拟课堂，免去第三方视频会议工具。Classroom
              把视频（多布局：聚焦和宫格）、带文件共享的实时聊天、交互式 Whiteboard、Canvas 协作笔记空间、结构化 Notes/lesson-summary
              面板、词汇闪卡系统（英语、法语、西班牙语）和屏幕共享整合到同一个课堂界面。


              产品套件分为四层：（1）核心市场平台——导师发现、筛选、带介绍视频的个人资料浏览、试听课预订和日程管理；（2）Preply Classroom——课中体验；（3）AI 学习工具——Lesson
              Insights、Daily Exercises、Scenario Practice，以及嵌入 Canvas 的 Teaching Assistant；（4）Preply Business——仅面向 B2B
              的层，包含 SSO、SCIM 开通、Corporate Dashboard、公司级目标与技能指标设置，以及批量学习者管理。


              面向学习者的结果按 CEFR（A1–C2）衡量，并细分为 Preply 子等级，配有分级测试和升级追踪。平台报告称，基于一项覆盖 12 周内完成 24+ 节课学习者的 Efficiency
              Study，学习者进步速度比典型语言学习时间线快 3×。截至 early 2026，Preply app（iOS + Android）在 Google Play 拥有 5M+ 下载量、4.7 评分和
              56,000+ 条评价，确认了有意义的移动端分发。产品刻意避开游戏化机制（连续打卡、排行榜、积分），与 Duolingo 以参与度优先的模型形成对比。
