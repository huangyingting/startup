      - number: '3.4'
        title: 替代品与现状替代选项
        blocks:
          - type: paragraph
            body: |
              最重要的非平台替代选项是企业现状方案：内部语言项目、本地语言学校、教材学习，以及通过 Coursera、
              LinkedIn Learning 或内部人力资源系统提供的混合 LMS 课程。这代表企业买家——尤其是已建立 L&D
              基础设施和现有供应商关系的大型机构——的基准选择。导师主导的企业语言培训市场预计 2026 年将超过
              450 亿美元，企业客户贡献逾 47% 的收入——这意味着 Preply 的增长逻辑依赖于以可量化 ROI 和工作流
              集成取代根深蒂固的现有消费模式。

              B2C 消费端，Duolingo 是最实质性的间接威胁。其注册用户逾 5 亿，并于 2024 年推出 Duolingo Max
              （基于 GPT-4 的对话练习），部分缩窄了游戏化自学与对话练习之间的质量差距，尤其针对初中级学习者。
              Babbel、Rosetta Stone 消费版和 Pimsleur 提供适合休闲词汇学习的自学替代品。这些替代品不会撼动
              Preply 的高端定位——高级、商务导向及高要求学习者对真人在线辅导的偏好依然强烈——但会在入门端
              压缩 Preply 的 B2C 可寻址市场，并可能减缓学习者从免费或低价工具向付费辅导转化的漏斗效率。
            claimRefs:
              - CP015
              - CP027
              - CP028
              - CP029
              - CP036
              - CP041
      - number: '3.5'
        title: 切换成本、锁定效应与竞争护城河
        blocks:
          - type: paragraph
            body: |
              Preply 的竞争护城河总体较为适中、部分具有结构性。逾 14 万人的导师网络是有意义的供给侧资产：
              长尾语言的导师覆盖深度和广度相比小型平台降低了学习者流失。但这一壁垒并非不可逾越。导师和学习者
              的切换成本均较低：无硬件依赖、无专有数据格式，课程历史记录也无法跨平台迁移。导师多平台运营十分
              普遍且有充分记录，许多导师同时在 Preply、iTalki、Cambly 和 Verbling 上保持活跃档案以分散收入
              来源。独立评测证据显示，一旦成熟导师建立起学生基础，iTalki 的 15% 固定抽成使其成为对导师更友好
              的平台。

              B2B 端的切换成本明显更高。Preply Business 通过 HRIS 和 LMS 集成（SSO、与主流 HR 系统的 API
              连接）、嵌入现有人力资源工作流的管理者看板、专属入职团队，以及与员工绩效周期挂钩的结构化进度
              基准，形成企业端粘性。一旦在全球员工体系中部署并融入绩效评估流程，迁移至竞品——包括重新培训 HR
              管理员、重新配置集成、重建进度基线——的成本相当可观。这与 goFLUENT 和 Speexx 相当，但 Berlitz
              在受监管行业中数十年的采购关系仍更难撼动。Preply 护城河中结构性暴露最突出的维度是 AI 替代：若
              免费 AI 对话工具持续改进，Preply 的按课时定价模式在低单价 B2C 端将面临压缩。
