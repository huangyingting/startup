              - CO038
          - type: callout
            title: 独角兽规模下的 EBITDA 盈利
            body: >
              在按 $1.2B 估值融资前 12 个月，Preply 实现 EBITDA 转正；这在教育科技中是少见组合。该信号指向可持续的单位经济，以及对外部资本资助运营的依赖下降。Series D
              的高估值也证明，这大幅增强了公司谈判地位。
