      - number: '1.3'
        title: 融资历史和资本结构
        blocks:
          - type: paragraph
            body: >
              2012 年至 2026 年 1 月，Preply 多轮融资合计约 $299M。公司的融资轨迹体现了机构投资人的持续信心，以及估值倍数的加速上行。早期种子资本（2012–2016）来自
              Techstars、Eastlabs，以及包括 Semyon Dukach 在内的个人天使。2020 年 3 月，公司完成约 $10M Series A（Diligent
              Capital、EduCapital、Hoxton Ventures、Point Nine Capital）。Series B（$35M，2021 年 3 月）由 Owl Ventures 和 Full In
              Partners 领投。随后是 Series C（$50M，2022 年 7 月），Hoxton Ventures、Owl Ventures、Diligent Capital、EduCapital 和 Evli
              Growth Partners 参投；Sacra 将 Series C 前估值置于约 $395M。2023 年 7 月，Preply 完成 $70M 延伸融资，由 $42M 股权（Series C-II）和
              $28M 债务融资工具构成，Horizon Capital 领投（其专注乌克兰的 HCGF IV 基金首笔投资），International Finance Corporation（IFC）、European
              Bank for Reconstruction and Development（EBRD）、Reach Capital 和 Hoxton Ventures 共同投资。2026 年 1 月 Series
              D（$150M，WestCap 领投）使总融资约达 $299M，投后估值 $1.2B。Goldman Sachs International 担任唯一配售代理。2023 年 7
              月债务融资工具条款尚未公开披露。公开来源未确认二级交易或清算优先权细节。EBRD 和 IFC 的参与显示，DFI 对 Preply 这家源自乌克兰、与影响力目标相契合的公司背书强劲。
