  - number: 6
    title: 客户
    sections:
      - number: '6.1'
        title: 客户分层——买方、用户与付款方
        blocks:
          - type: paragraph
            body: >
              Preply 的客户基础跨越两个市场层级，买方 / 用户 / 付款方结构不同。B2C 层级中，付款方和学习者是同一个个人：成年人——主要年龄为 25–34 岁，根据 Similarweb 受众数据，女性 /
              男性比例约 60/40——通过每周课包或单节课购买订阅。核心 B2C 使用场景集中在职业发展（职场沟通、面试准备）、搬迁或移民需求、学业要求和个人兴趣提升。英语是欧洲最常学习的语言（Preply 平台上 49%
              的学习者），西班牙语在北美领先（25%），反映出区域性的职业和文化需求模式。


              B2B 层级中，买方（L&D 或 HR 负责人）、用户（员工学习者）和付款方（企业预算持有人）在结构上分离。Preply Business 要求企业签约，并配套专门上线支持、SSO/SCIM 开通和
              Corporate Dashboard 分析。平台把 B2B 参与定位为经常性、高留存渠道：企业学习者进入有明确目标、进度追踪和可衡量结果的项目，结构上比个人订阅流失更耐久。截至 2025 年，Preply
              Business 声称拥有 2,000+ 家企业客户；仅美国市场在截至 August 2025 的 12 个月内就新增了 200+ 个组织伙伴。


              导师是第三方，既是供给侧市场参与者，也是产品共创者：Preply 的 AI 工具（Lesson Insights、Daily
              Exercises）旨在降低导师行政负担，提升导师留存，并由此改善学习者产品质量。佣金结构从新导师 33% 起，累计平台时长超过 400+ 小时后降至 18%，英语课程平均时薪为 $18–$35。
