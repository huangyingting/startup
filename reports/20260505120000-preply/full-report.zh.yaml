  - number: 2
    title: 市场分析
    sections:
      - number: '2.1'
        title: 市场边界与范围
        blocks:
          - type: paragraph
            body: |
              全球语言学习行业横跨多种交付模式与消费类别。从最宽泛的口径看，市场涵盖语言学校与高校的线下课堂、
              教材与闪卡应用自学、自定节奏数字应用（Duolingo、Babbel、Rosetta Stone）、在线直播小班课以及
              在线一对一真人辅导。Preply 的核心产品专注于在线一对一真人辅导细分——由真人导师与单个学习者实时
              开展视频课。该细分不包含异步自学内容、纯 AI 聊天机器人练习及线下课堂。

              相邻领域包括覆盖所有学科的综合在线辅导平台、企业电子学习套件、语言评估与认证服务（TOEFL、IELTS
              备考）及职场沟通培训。Preply 价值主张的现有替代选项包括：线下语言学校、高校语言系、教材自学，以及
              免费或低价的自学应用。纳入统计的相关支出为学习者或雇主为在线真人导师课所支付的费用；不纳入的支出
              是所有不涉及实时真人互动的项目，包括应用订阅、异步视频课和传统课堂学费。
