      - number: '6.5'
        title: 扩张动态与集中风险
        blocks:
          - type: paragraph
            body: >
              Preply 的扩张动态通过两条路径运作：B2C 学员升级（试听课转订阅、单语种转多语种、消费者转由雇主赞助加入 Preply Business）以及 B2B
              渐进式扩张（从一个团队/部门的初始队列出发，扩展至更广泛的组织层面）。Delivery Hero 案例是 B2B 扩张的最佳佐证：从早期注册起步，两年多后达到 631
              名活跃员工，参与人数"呈指数级增长"——堪称渐进式扩张的教科书案例。


              B2B 段集中风险看似较低：2,000 余家企业客户分布均匀，无单一账户被公开描述为异常集中。美国市场每年新增 200 余家组织合作伙伴。具名账户（Delivery
              Hero、Unilever、Datadog、Miro）均为大型企业，但被引用为代表性案例，而非收入主体。B2C 段本身天然分散于 180 个国家的数十万名个人学员，无可见的学员层面集中风险。


              采购摩擦仍是潜在的 B2B 扩张障碍：Preply Business 需要专属入职服务、SSO/SCIM 集成和 L&D 预算审批，与自助模式相比可能拉长销售周期。缺乏 SSO/SCIM 之外的 LMS
              连接器深度，可能限制与企业学习技术栈的集成。B2C 方面，若佣金经济学不能支持高薪国家母语教师的留存，高端教师供给质量将面临风险，进而削弱优质学员体验并推高主动流失。


              B2B 收入占总收入的比重未见公开披露，使耐久性价值难以量化评估，是评估 Preply D 轮经常性收入逻辑的投资者的重大尽调问题。
