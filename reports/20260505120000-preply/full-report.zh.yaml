        - 2,000+ 企业客户；Preply Business 带来经常性订阅收入；ACV 和留存高于 B2C
        - 披露 B2B 收入占比（当前估计为 5%）；企业净留存率（NRR）数据
        - B2B 约占收入 ~5%（Sacra）；规模太小，撑不起溢价 SaaS 倍数；企业增长说法只有方向，未量化
        - B2B 收入占比达到 25%+，且 NRR > 115%
      - - 盈利路径
        - EBITDA 为正这一里程碑在私营教育科技中少见，显示运营效率
        - 披露 EBITDA 利润率；确认 Series D 后现金跑道
        - EBITDA 为正未经审计；利润率和现金转化未知；AI 投入可能扭转盈利
        - 公布 EBITDA 利润率 >= 10%，且自由现金流为正
