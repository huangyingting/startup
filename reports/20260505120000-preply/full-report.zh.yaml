        - 完成 S-1 或 IPO 路演；二级市场交易估值达到或高于 $1.2B
        - GoStudent 在 $3.2B 估值时也有一线投资人支持，后来重估至低于 $1B；投资人质量是必要条件，但不充分
        - 独立二级市场交易价格达到或高于 Series D 价格
    notes: B2B 收入占比（~5%）是 Sacra 估计；公司未披露分部收入。LeanLab 2025 Efficiency Study 与 Preply 合作开展，并非完全独立。
