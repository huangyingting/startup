      - number: '4.2'
        title: GTM 动作和销售经济
        blocks:
          - type: paragraph
            body: >
              Preply 的 GTM 横跨两条经济性明显不同的渠道。直接面向消费者（D2C）渠道依赖数字效果营销、SEO 和病毒式口碑，用试课模式撬动转化。由于 Preply 在供给侧吸收 100%
              试课成本，平台实际学生获客补贴被试课价值封顶——通常为每节 $15–$25——而只要学生保持活跃，后续课程就会产生佣金流。


              B2B 企业渠道通过主动式企业销售动作运转。截至 2023 年 7 月，Preply 在过去 12 个月签下约 200 个新企业合同，客户包括 Datadog、GroupM 和 Bain。企业细分在
              2021–2022 年增长 230%，显著快于 D2C 消费者增长。B2B 交易以定制化每席位课程订阅和量折扣构成；企业模式的收入比消费者购买更可预测、更具经常性，流失风险更低，因为企业承诺是多席位，并且常由
              HR 或 L&D 预算负责人续约，而非取决于单个消费者自由裁量。


              两个细分均未公开具体 CAC 或 LTV 数据。不过，基于订阅的计费模式，以及截至 2025 年末的 EBITDA 转正状态，意味着销售效率正在改善。Preply 于 2023 年 10
              月聘任首席营收官（Jerry Kingkade，前 Flowspace CRO），显示公司在投资企业销售动作。Sacra 指出，企业收入通常比消费者市场平台收入具备更高利润率和更强留存，这意味着 B2B
              扩张是首要利润率改善杠杆。
