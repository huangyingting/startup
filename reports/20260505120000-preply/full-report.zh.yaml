    title: 公司概览
    sections:
      - number: '1.1'
        title: 身份和商业模式
        blocks:
          - type: paragraph
            body: >
              Preply 是一个全球在线真人语言学习市场平台，定位为全球最大的一对一导师授课平台。公司平台把学习者与独立导师连接起来，安排视频课程；背后有 AI
              驱动的副驾驶套件，能生成课程总结、创建个性化作业，并用机器学习算法为学习者匹配最合适的导师。Preply 把自身战略定位定义为「真人主导、AI 增强」——这是对 Duolingo
              等游戏化或全自动竞品的刻意区隔。2025 年 Efficiency Study 由非营利研究机构 LeanLab Education 执行，报告称 96% 的学习者认为真人导师对进步必不可少，97%
              表示真实对话是建立信心的关键。商业模式以佣金为主：早期课程 Preply 留存导师收入的 33%，当导师在平台累计授课 400 小时后降至 18%；每位新学生的第一节试课费用由 Preply
              全额留存。Preply 的 B2B 分部 Preply Business 服务全球 2,000+ 家公司，包括 Unilever 和
              Datadog，提供带进度仪表盘的托管语言培训项目。公司在美国（Massachusetts）注册，但运营起点和重要 R&D 团队仍在乌克兰 Kyiv。新闻材料称公司「2012 年成立于美国」，而
              Wikipedia 和 The Recursive 等独立来源称其最初成立于 Kyiv。差异可能反映的是美国注册时间，而非运营起源。
