      - number: '6.4'
        title: 留存、满意度与耐久性
        blocks:
          - type: paragraph
            body: >
              Preply 未公开披露净留存率（NRR）、总留存率（GRR）、B2C 订阅者队列数据或 B2B 合同续约率，上述指标的缺失是留存质量评估的重大尽调缺口。


              替代指标对满意度和耐久性的描绘喜忧参半。积极方面：Trustpilot 汇总 21,500 余条评价，评分 4.3/5（2026 年 4 月）；Preply 平台自身汇集超 300,000
              条五星教师评价；Preply Business 报告企业学员平均教师评分 4.9/5，92% 表示平台改善了工作表现，99% 认为体验高度个性化。2024 年一项要求提前 12 小时取消课程的内部政策调整被
              Preply 明确与"减少取消可降低学员流失"的数据关联，表明公司正积极管理早期留存杠杆。


              不利方面：PissedConsumer 汇总 42 条评价，评分仅 1.5/5（2026 年 4 月），投诉持续集中在自动续费意外、难以取消订阅及客服响应迟缓或 AI
              化。美国商业改善局（Brookline，MA）也记录了针对 Preply, Inc. 的类似投诉，焦点同样在订阅取消困难和退款延迟。Brighterly（2026 年 4 月）指出 AI 聊天机器人客服是
              Trustpilot 最普遍的投诉点。G2 上的 Preply Business 评分仅 3.3/5，来自 12 条评价——样本虽小，但与混合情绪相符。来自高薪国家（美国、英国）的教师公开反映，Preply
              的佣金结构不支撑全职从教的经济可行性，这对教师收入分布顶端的供给质量构成结构性风险。


              转向高价值学员的战略调整（2023 年 Google Think 案例记录）以更低获客成本实现了 25% 的转化价值提升，暗示单学员经济学在改善，但无直接的留存率证据支撑。
