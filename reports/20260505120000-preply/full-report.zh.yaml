  - number: 6
    title: 客户情况
    sections:
      - number: '6.1'
        title: 客户细分——买家、用户与付款方
        blocks:
          - type: paragraph
            body: >
              Preply 的客户群横跨两个市场层级，各自拥有不同的买家/用户/付款方结构。B2C 层中，付款方与学员为同一人：成年人——Similarweb 受众数据显示以 25–34 岁为主，女男比例约为
              60/40——通过周课时包或单节购买订阅。B2C 核心使用场景集中在职业发展（职场沟通、面试备考）、搬迁或移民需求、学业要求及个人兴趣。英语是欧洲学习量最高的语言（平台 49%
              的学员），北美则以西班牙语领先（25%），折射出区域职业与文化需求差异。


              B2B 层中，买家（L&D 或 HR 经理）、用户（员工学员）与付款方（企业预算持有人）在结构上相互独立。Preply Business 需要签订企业合同，配套专属入职服务、SSO/SCIM
              配置及企业仪表盘分析。平台将 B2B 参与定位为高留存的经常性渠道：企业学员被锁定在有明确目标、进度追踪和可量化成效的项目中，结构上比个人订阅流失更具韧性。截至 2025 年，Preply Business
              宣称拥有 2,000 余家企业客户，仅 2025 年 8 月前的 12 个月内，美国市场就新增超过 200 家组织合作伙伴。


              教师是第三方，既是供给侧市场参与者，也是产品共创者：Preply 的 AI 工具（Lesson Insights、Daily
              Exercises）旨在减轻教师行政负担，提升教师留存率，进而提高学员产品质量。佣金结构从新教师的 33% 起步，累计超过 400 小时后降至 18%，英语课程平均时薪为 $18–$35。
