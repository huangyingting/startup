      - number: '8.4'
        title: 退出准备度与投资结论
        blocks:
          - type: paragraph
            body: >
              退出路径是 Preply 投资案例中信息披露最为不足的维度。公司既未发出任何公开 IPO 信号，也未提交 S-1 或 F-1 文件，亦未公开接触 SPAC 结构。Goldman Sachs 作为 D
              轮配售代理的参与，维系了 pre-IPO 银行合作关系，这是未来公开上市的前提条件。WestCap 的投资组合中包含走过 IPO 路径的公司（Airbnb，其中董事会成员 Allen Mask
              曾任高级管理层）；这一投资人背景是最终走向公开市场的弱正向信号。战略并购方面，最具可信度的潜在收购方包括：（1）企业学习平台（Cornerstone、SAP
              SuccessFactors、Workday），寻求将真人语言课程作为模块整合；（2）消费者科技平台（Apple Education、Google
              Workspace）；（3）大型在线教育聚合商（Chegg，正依据其2025年第四季度信函围绕技能培训和语言学习重构——尽管其当前市值不足以支撑此规模的收购）。上述并购路径均未有公开信号。


              结论：以中等置信度建议观察（TRACK）。从平台质量、市场定位和增长叙事来看，Preply 的投资案例颇具吸引力。EBITDA 转正状态和 D
              轮结构（机构联合投资、投资银行配售）是区别于大多数失效教育科技独角兽的公信力信号。然而，以披露证据衡量，12亿美元估值偏高：入场价格在不可核实营收估算下隐含8至15倍收入乘数，而公开可比标的宇宙（教育科技
              EV/收入中位数1.6倍）无法为此入场价格提供支撑，除非获得私有数据。给出买入建议需要具备：（1）管理层账目显示 ARR
              超过1.2亿美元且同比增速超过30%；（2）净留存率（NRR）超过110%，表明扩张营收强劲；（3）毛利率超过60%，确认佣金率的可持续性；（4）明确的退出路径及可信时间表。缺乏上述信息，负责任的尽调结论是持续跟踪进展，并在承诺资本前争取获得数据室访问权限。
            claimRefs:
              - CV031
              - CV032
              - CV033
              - CV034
              - CV035
              - CV036
              - CV037
              - CV038
      - number: '8.5'
        title: 尽调框架与公司治理
        blocks:
          - type: paragraph
            body: >
              多个结构性尽调障碍阻止了在当前证据水平下作出明确投资建议。第一，营收缺口：2021年后，公开领域不存在任何经审计或管理层核实的 ARR
              或净营收数字，这对于一家估值12亿美元、已进入机构级尽调流程的公司而言极不寻常——即便是处于该阶段的私有公司，通常也会在融资材料或老股交易中提供历史营收区间。第二，优先股堆叠未披露：Preply 的股权结构表、A
              轮至 D
              轮的清算优先权、反稀释条款及优先权合计敞口均属未知。若累计融资2.99亿美元全部附带1倍清算优先权，普通股持有人（含员工）须在退出价值超过2.99亿美元时方可获得任何收益；若为参与分配优先权，门槛将更高。第三，债务：C
              轮延长轮包含2,800万美元债务，条款未披露；任何未偿债务将在退出时减少股权价值。第四，董事会治理：已确认的董事会成员仅有 Kirill Bigai 和 Allen Mask（WestCap）；Horizon
              Capital、Hoxton Ventures、Reach Capital 和 Owl Ventures 的历史轮次董事席位在公开资料中均未获确认。完整董事会构成对于评估利益一致性和否决权至关重要。


              触发投资逻辑失效的因素包括：（1）D 轮后连续两年营收复合增速降至20%以下；（2）AI 基础设施成本扩张导致 EBITDA 再度转负；（3）重大教师平台去中介化事件（如某主要 AI
              供应商推出真人对话教师模型，使市场商品化）；（4）基辅研发中心因地缘政治升级导致技术团队流失超过30%；（5）主要司法管辖区监管裁定将教师认定为雇员，从根本上改变佣金经济模型。
            claimRefs:
              - CV039
              - CV040
              - CV041
              - CV042
              - CV043
