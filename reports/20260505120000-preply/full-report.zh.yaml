      - number: '2.6'
        title: 附录
        blocks:
          - type: callout
            title: 18 亿语言学习者——结构性需求上限
            body: |
              据 Preply D 轮新闻稿引用的 HolonIQ 数据，全球约 18 亿人正积极追求第二语言能力——约占全球人口的
              四分之一。即便其中只有极小比例达到付费意愿门槛，也将形成数十年的需求顺风，技术单独很难将其逆转。
            calloutType: strength
            claimRefs:
              - CM005
          - type: callout
            title: AI 替代风险：Duolingo 的 AI 优先转型
            body: |
              Duolingo 于 2025 年宣布的"AI 优先"战略，对真人辅导语言平台构成直接竞争压力。若 AI 对话练习对
              初中级学习者达到接近真人的体验，将侵蚀 Preply 最大的 B2C 获客漏斗。应对之策需持续投入，以证明
              真人在线互动相较 AI 的边际价值。
            calloutType: risk
            claimRefs:
              - CM035
          - type: callout
            title: B2B 企业端：更优的单位经济效益
            body: |
              相比消费端 B2C，企业语言培训（Preply Business）具备结构性更低的流失率、更高的年合同价值（ACV）
              和更可预测的收入。2,000 余家企业客户、92% 报告工作表现改善，使 B2B 业务在 Preply 扩大企业销售
              的同时，有望支撑更优的获客成本（CAC）回收和利润扩张。规模 78 亿至 105 亿美元的企业在线语言学习
              市场以 8—9% 的复合年均增速增长——虽低于大盘，但收入防御性更强。
