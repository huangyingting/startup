      - number: '2.5'
        title: 采用约束和尽调缺口
        blocks:
          - type: paragraph
            body: >
              最急迫的结构性约束是 AI 替代风险。Duolingo 2025 年公开宣布「AI-first company」战略，并因暗示 AI 将取代人类内容贡献者而遭到学习者和公众反弹。这一动态为 Preply
              的真人优先定位创造了声誉差异化机会，但也说明资金充足的竞品正在大举投入纯 AI 的真人辅导替代品。随着 AI 对话模型在发音辅导、语境化纠错和文化细微差异上提升，纯 AI
              学习和真人导师学习之间的价值差距可能收窄，尤其对初级到中级学习者而言——这部分人群构成最大体量的获客漏斗。


              消费者语言平台面对结构性高流失，因为学习者动机本身波动很大：一旦达到会话够用水平，学习者往往停止上课。多条消费者评论和 BBB 投诉文件指出，不清晰的计费、自动续费扣款和退款困难是造成不满的驱动因素。Indeed
              上的导师记录了对高佣金率（新导师 33%，随授课量降至 18%）以及试课损失 100% 收入的挫败。


              B2B 侧，企业采购需要 HR、L&D、IT（负责 SSO 和 HRIS 集成）以及采购多方对齐，拉长典型销售周期。预算归属复杂和年度 L&D 预算周期，会给转化时点带来约束。不同信誉来源对 SAM
              的分析师市场规模范围为 $2.8B 到 $12B，这凸显出若无法访问 Preply 内部分部收入拆分，就无法精确设定渗透目标。
            claimRefs:
              - CM035
              - CM036
              - CM037
              - CM038
              - CM039
              - CM040
              - CM041
              - CM042
      - number: '2.6'
        title: 展示材料
        blocks:
          - type: callout
            title: 18 亿语言学习者——结构性需求天花板
            body: >
              Preply 在 Series D 新闻稿中引用的 HolonIQ 数据估计，全球有 18 亿人正在努力达到第二语言熟练度——约等于全球每 4 人中 1
              人。即便其中只有一小部分达到付费意愿门槛，也代表持续数十年的需求顺风，单靠技术不太可能逆转。
            calloutType: strength
            claimRefs:
              - CM005
          - type: callout
            title: AI 替代风险：Duolingo 的 AI-first 转向
            body: >
              Duolingo 在 2025 年宣布「AI-first company」战略，向真人导师语言平台释放直接竞争压力。如果 AI 对话练习在初级到中级学习者场景中接近真人保真度，可能侵蚀 Preply 最大的
              B2C 获客漏斗。应对之道是持续投入，证明真人实时互动在 AI 可复制能力之外仍有边际价值。
            calloutType: risk
            claimRefs:
              - CM035
          - type: callout
            title: B2B 企业细分：更好的单位经济
            body: >
              企业语言培训（Preply Business）相较消费者 B2C，结构性流失更低、ACV 更高、收入更可预测。2,000+ 家企业客户和 92% 报告工作表现提升，使 B2B 细分有望在 Preply 扩大企业
              go-to-market 时支撑更好的 CAC 回收和利润率扩张。企业在线语言学习市场规模为 $7.8–10.5B，CAGR 为 8–9%——慢于大盘，但收入更可防守。
