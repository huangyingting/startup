      - number: '1.5'
        title: 负面信号和风险因素
        blocks:
          - type: paragraph
            body: >
              Preply 面向导师侧的商业政策已引发有记录的批评。第三方评测网站 Actual Fluency 于 2023 年 5 月暂停推荐 Preply，原因包括强制免费试课（Preply 留存每位新学生第一节课费用的
              100%）、较高的阶梯佣金结构（初始 33%，降至 18%），以及不灵活的订阅计费做法导致课时额度过期。导师社区论坛和评测平台（包括 Indeed 和
              PissedConsumer）报告了无解释账户暂停和收入冻结的模式，也有争议在导师认为缺少充分调查的情况下按学生有利方向解决。本次研究期间，Preply 的 BBB 和 Trustpilot
              页面被访问拦截，无法直接审阅。截至 2026 年 5 月，公开来源未发现重大集体诉讼或政府监管调查，也未记录显著的全公司裁员。公司继续在活跃战区（Kyiv）运营，带来地缘政治和业务连续性风险，尽管 Preply
              已投资基础设施缓释。首要结构性风险是 CEO Kirill Bigai 的关键人物依赖集中；若其离任，可能削弱投资人对平台战略方向的信心。Preply 2021
              年后的当前收入和年经常性收入（ARR）仍未披露，限制了对增长轨迹和估值倍数的独立评估。
