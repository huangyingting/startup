      - number: '6.4'
        title: 留存、满意度与耐久性
        blocks:
          - type: paragraph
            body: >
              Preply 不公开披露净收入留存（NRR）、总收入留存（GRR）、B2C 订阅者队列数据或 B2B 合同续约率。这些指标缺失，是任何留存质量评估中的实质尽调缺口。


              满意度和耐久性的代理指标呈现好坏参半。正面来看，Trustpilot 基于 21,500+ 条评价记录 4.3/5 分（April 2026），Preply 自有平台汇总了 300,000+ 条 5
              星导师评价。Preply Business 报告企业学习者平均导师评分为 4.9/5，92% 称平台改善了工作表现，99% 认为体验高度个性化。2024 年一项要求提前 12 小时取消的内部政策调整，被
              Preply 明确关联到“取消减少会降低学生流失”的数据，说明公司正在主动管理早期留存杠杆。


              反面来看，PissedConsumer 汇总 42 条带评分评价，平均仅 1.5/5（April 2026），反复投诉自动续费意外扣款、取消订阅困难，以及客服响应慢或由 AI 自动化处理。Better
              Business Bureau（Brookline, MA）记录了针对 Preply, Inc. 的投诉，同样集中在取消订阅困难和退款延迟。Brighterly（April 2026）指出，基于 AI
              的聊天机器人支持是 Trustpilot 上最常见的投诉。G2 上的 Preply Business 仅有 12 条评价、评分
              3.3/5——样本小，但与混合情绪一致。来自高工资国家（US、UK）的导师公开表示，Preply 的佣金结构不足以支持经济上可行的全职投入，这给导师收入分布顶端的供给质量带来结构性风险。


              Google Think 案例（2023）记录的高价值学习者战略转向，在降低获客成本的同时带来 25% 更高转化价值；这暗示单个学习者经济性改善，但没有提供留存率的直接证据。
