      - number: '7.6'
        title: 财务、竞争与合作伙伴风险
        blocks:
          - type: paragraph
            body: >
              Preply 12亿美元的估值缺乏当前营收数据的支撑，原因在于2021年后的 ARR 均属内部信息，无从核实。现有最新公开数据点——Sacra 估算2021年 ARR
              约5,000万美元，2022年同比增长51%——加之 D 轮公告称2024年营收增长2.5倍，仅能支撑粗略推算。以12亿美元估值为基础，若自5,000万美元以2.5倍复合增长，隐含的2024年 ARR
              约为1.25亿至2亿美元，对应6至10倍收入乘数——对于 EBITDA 已实现正值的
              SaaS/市场模式尚属合理，但在教育科技估值倍数持续压缩的环境中，新晋独角兽所能提供的安全边际并不充裕。若本轮估值主要由投资人对乌克兰韧性叙事及 AI
              布局的热情驱动，而非基于基本面倍数，则在下次流动性事件（并购或 IPO）中面临下行风险的概率不可忽视。


              Preply 的 B2C 佣金模式（约占营收95%）使财务敞口高度集中于消费者对均价15至25美元在线直播课的付费意愿。主要竞争威胁并非直接价格竞争（Duolingo 免费），而是价值主张替代：一旦 AI
              对话工具对普通学习者"足够好用"，真人教师需求将向高风险专业场景集中，压缩 Preply 最高效服务的市场边际。


              供给侧存在三项结构性依赖值得关注：（1）WestCap 作为 D 轮唯一领投方，造成治理集中，退出时存在潜在利益错位风险；（2）OpenAI 是唯一的 AI 基础设施供应商（详见 S703
              节）；（3）支付链路（Stripe/Payoneer 负责教师付款）若高数量教师的跨境汇款引发合规审查，将带来支付网络风险。教师劳工定性风险——在结构上类似 Uber/Lyft
              先例——仍是最被低估的财务隐患：仅在主要司法管辖区将10%活跃教师重新认定为雇员，即可引发追溯性雇佣福利负债，并迫使对核心商业模式进行根本性重构。
