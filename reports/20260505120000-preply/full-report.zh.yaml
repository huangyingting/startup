  - number: 3
    title: 竞争格局
    sections:
      - number: '3.1'
        title: 竞争格局概览
        blocks:
          - type: paragraph
            body: |
              Preply 在两个结构截然不同的竞争赛道上展开角逐，需分开评估。其一是 B2C 消费端在线真人辅导市场，
              学习者在导师质量、语言覆盖、定价透明度和排课便捷性上比较各平台。其二是 B2B 企业语言培训市场，采购
              决策由 HRIS 和 LMS 集成、分析报告、合规认证及账户管理支持等企业标准主导。能在两个细分市场同时取得
              实质性地位的竞争对手寥寥，使 Preply 获得双细分定位优势，但也意味着同时面临两条战线的竞争压力。

              B2C 端的主要直接竞品是 iTalki（2007 年创立，香港，150 余种语言，用户逾 1,000 万）和 Cambly
              （专注英语，2024 年收入约 2.5 亿美元）。Lingoda 占据结构化小班课细分，而 Verbling 这一曾经的
              独立市场同类竞品已于 2020 年 1 月被 Busuu 收购。B2B 端竞争格局由传统老牌机构（Berlitz、British
              Council、Inlingua）和数字原生企业平台（goFLUENT、Speexx、Busuu for Business、Rosetta Stone
              Enterprise）主导。Duolingo、Babbel 等消费端自学应用属于低价 B2C 端的替代性威胁，并非在线真人
              辅导或企业细分的直接竞品。
