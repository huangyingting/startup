        title: 附录要点
        blocks:
          - type: callout
            title: 融资前已实现 EBITDA 转正
            body: >
              在 $150M Series D 前 12 个月实现 EBITDA
              转正，而不是靠烧钱来支撑融资，说明资本配置克制，单位经济进入拐点，也验证了市场平台模式的规模化可行性。这个里程碑还显著降低了增长放缓时被迫进行过桥融资的风险。
            calloutType: strength
            claimRefs:
              - CI033
              - CI017
          - type: callout
            title: 独角兽规模下的收入透明度缺口
            body: >
              自 Sacra 2021 年 $50M 估算后，Preply 没有发布官方收入、年经常性收入（ARR）、毛利率、净留存率（NRR）或 CAC/LTV 数据。在 $1.2B
              估值下，这种不透明并不常见，也限制第三方投资判断的置信度。任何可信财务模型都依赖管理层私有财务报表；公开记录只能支持很宽的情景区间。
            calloutType: risk
            claimRefs:
              - CI029
              - CI030
              - CI036
              - CI038
          - type: callout
            title: B2B 企业业务是利润率扩张飞轮
            body: >
              企业合同在 2021–2022 年增长 230%，并在单个 12 个月期间新增约 200 家企业客户；这类合同具备更高平均合同价值、多席位经济和机构续约机制，表现应优于 D2C 消费者流失。如果 B2B
              从少数收入来源成长为多数收入来源，Preply 的综合利润率结构未来三到五年可能接近 SaaS 水平。
            calloutType: insight
            claimRefs:
              - CI010
              - CI011
              - CI023
          - type: callout
            title: Ukraine R&D 集中风险
            body: >
              Preply 相当一部分工程和 R&D 员工位于 Ukraine 的 Kyiv，而当地仍处于活跃武装冲突中。Preply 自 2022 年以来已证明运营韧性，IFC/EBRD
              也专门投资支持这项活动；但工程团队迁移、人才流失或基础设施中断的风险尚未在公开材料中量化。公司没有在公开材料中披露针对 Ukraine 运营的正式业务连续性或灾难恢复计划。
            calloutType: risk
            claimRefs:
