      - number: '1.5'
        title: 负面信号与风险因素
        blocks:
          - type: paragraph
            body: |
              Preply 的导师端商业政策已引发有据可查的批评。第三方评测网站 Actual Fluency 于 2023 年 5 月暂停对
              Preply 的推荐，理由包括：强制免费体验课（每位新学员的首课费用全额留存于 Preply）、梯级抽成比例偏高
              （初始 33%，逐步降至 18%），以及不灵活的订阅计费规则导致课时额度过期。导师社区论坛及 Indeed、
              PissedConsumer 等平台反映，存在账号无故封禁、收入冻结，以及在未充分调查的情况下倾向学员裁决纠纷
              的规律性问题。本次研究期间，Preply 的 BBB 和 Trustpilot 页面均被访问屏蔽，无法直接查阅。截至
              2026 年 5 月，公开来源中未发现重大集体诉讼或政府监管调查，亦未见全公司性裁员记录。公司持续在战区
              （基辅）运营带来地缘政治与业务连续性风险，但 Preply 已对基础设施做出相应投入。最主要的结构性风险
              是高度集中于 CEO Kirill Bigai 的关键人物依赖——其离职可能显著削弱投资者对平台战略方向的信心。
              Preply 2021 年后的收入与 ARR 至今未披露，制约了对增长轨迹和估值倍数的独立评估。
