      - number: '7.3'
        title: 技术与 AI 集中风险
        blocks:
          - type: paragraph
            body: >
              Preply 的整个 AI 产品套件——Lesson Insights（自动课后总结）、Daily Exercises（个性化作业）、Scenario Practice（AI 会话伙伴）和 AI Teaching
              Assistant——都建立在 OpenAI 的 GPT API 基础设施之上。没有公开披露替代 AI 提供商或备援推理层。这构成单点故障依赖：OpenAI API
              价格调整、服务中断、政策更新或合同重新谈判，都可能削弱或关闭 Preply 用来支撑 $1.2B 估值的 AI 增强差异化。


              Scenario Practice 的 AI 安全控制依赖提示词级护栏和 Supervisor Agent，未报告独立第三方审计。考虑到 EU AI Act
              的高风险分类路径，这一点尤其重要：仅靠提示词护栏，不太可能满足 Article 9（风险管理）和 Article 13（面向高风险 AI 用户的透明度）要求的技术稳健性和透明度。


              OpenAI 发布的 API 条款保留修改定价、限制使用场景或因政策违规终止访问的权利。鉴于 Preply 使用 GPT 进行内容审核和面向学生的交互，任何政策层面的争议（例如 AI 生成不当内容触发
              OpenAI 审核）都可能导致 API 访问被紧急暂停。与 AWS、GCP 等基础设施提供商不同，后者通过 SLA 义务形成合同保护；OpenAI 的 API 访问由其使用政策约束，且不对称地偏向 OpenAI。


              Preply 的视频课程交付模型进一步放大平台可靠性风险：不同于异步内容平台，技术中断会立即取消实时课程。支撑视频交付的基础设施（Preply Space）还有自身的可靠性依赖，但公开材料未记录。
            claimRefs:
              - CR015
              - CR016
              - CR015
              - CR015
              - CR037
      - number: '7.4'
        title: 地缘政治与运营连续性风险
        blocks:
          - type: paragraph
            body: >
              Preply 在 Ukraine 的 Kyiv 办公室约有 150 名员工，约占其全球 ~750 名员工的 20%。持续的 Russia-Ukraine 战争给这一群体带来更高运营风险：Kyiv
              周期性遭遇导弹和无人机袭击，引发停电、互联网和电信基础设施中断，以及直接影响工程、产品和支持职能的安全突发事件。2024-2025 年发生了多起有记录的基础设施攻击，目标包括 Ukraine 能源网和民用电信。


              Kyiv 办公室承载了 Preply 工程人才中不成比例的一部分，公司也明确承诺维持 Ukraine
              运营，以此表达韧性。这在战略叙事上有吸引力，但造成了未对冲的地缘政治集中度，而总部位于西欧或北美的同行不面临这一暴露。竞争对手 iTalki（美国总部）和 Cambly（美国总部）没有这项风险。


              Preply 没有公开披露针对 Kyiv 办公室的正式业务连续性或灾难恢复计划。工程工作负载覆盖拆分、基于云的代码和数据转移程序、快速迁移协议都没有可得信息。这个缺口是实质尽调要求：投资者应要求证据，证明
              Kyiv 持续 30-60 天的中断可由其他工程中心（Barcelona、New York、London）吸收，且不造成产品路线图延误。


              Ukraine 的动员法带来额外人才风险：Ukraine 男性工程师可能被征召入伍，形成 Preply
              无法完全通过薪酬或留存计划缓解的非自愿流失。据报道，公司已实施心理支持、灵活远程办公选项和搬迁援助，但没有公开的量化留存影响数据。
            claimRefs:
              - CR017
              - CR018
              - CR045
              - CR044
