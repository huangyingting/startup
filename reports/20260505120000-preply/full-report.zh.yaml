  - number: 3
    title: 竞争对手
    sections:
      - number: '3.1'
        title: 竞争格局概览
        blocks:
          - type: paragraph
            body: >
              Preply 在两个结构上不同的竞争场域作战，需要分开评估。第一是 B2C 消费者真人辅导市场平台，学习者比较的是导师质量、语言覆盖、价格透明度和排课便利。第二是 B2B
              企业语言培训市场，企业采购标准——HRIS 和 LMS 集成、分析报告、合规认证和客户管理支持——驱动购买决策。很少有竞争对手能同时在两个细分中有意义地运营，这让 Preply
              拥有双细分定位优势，也让公司暴露在两条竞争前线。


              B2C 中，主要直接竞争对手是 iTalki（2007 年成立，Hong Kong，150+ 种语言，10M+ 用户）和 Cambly（专注英语，2024 年收入约 $250M）。Lingoda
              占据结构化小班课细分，而 Verbling——曾是独立市场平台同业——已于 2020 年 1 月被 Busuu 收购。B2B 中，竞争集合由传统在位者（Berlitz、British
              Council、Inlingua）和数字原生企业平台（goFLUENT、Speexx、Busuu for Business、Rosetta Stone Enterprise）主导。Duolingo、Babbel
              和消费者自定进度应用在低价 B2C 价值端构成替代威胁，而不是在线真人辅导或企业细分中的直接竞争者。
