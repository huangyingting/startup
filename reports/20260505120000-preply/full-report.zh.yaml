      - number: '8.6'
        title: 展示材料
        blocks:
          - type: callout
            title: EBITDA 为正罕见且真实
            body: >
              Preply 的 EBITDA 为正状态——由多家独立新闻机构引用公司声明确认，并由 Indico Capital 管理合伙人在 Series D 公告中确认——在全球私有教育科技群体中确实少见。在当前 14 家
              HolonIQ EdTech 独角兽中，大多数仍是增长优先、不计成本的平台。这个里程碑显著降低了近期出现 GoStudent 式困境的风险。
            calloutType: insight
            claimRefs:
              - CV002
              - CV003
              - CV006
          - type: callout
            title: GoStudent 先例是直接警示
            body: >
              GoStudent 是 1-on-1 辅导市场平台，佣金机制与 Preply 几乎相同；其 2021 年峰值估值为 $3.2B，到 November 2025 已被主要投资人重估至低于 $1B，并在
              HolonIQ 将 Preply 加入名单的同一次更新中被移出。触发重估的收入和留存动态未获公开确认，但这一模式——高 GMV、单位经济性不清、激进扩张，然后估值压缩——非常贴近 Preply
              当前披露姿态中的不透明风险。
            calloutType: risk
            claimRefs:
              - CV016
              - CV017
              - CV018
          - type: callout
            title: 跟踪：承诺出资前先争取数据室访问
            body: >
              建议为跟踪，置信度中等。平台质量、市场顺风和 EBITDA 为正状态，足以支持持续监测，并保持与管理层接触的意愿。但 $1.2B
              入场价相对所有公开教育科技可比公司都偏高；没有经审计或管理层验证的收入、净留存率（NRR）、毛利率和股权结构表文档，无法负责任地给出买入判断。投资人应要求访问私有数据室，并在承诺资本前围绕 T806
              中的收入验证事项锚定尽调。
            calloutType: recommendation
            claimRefs:
              - CV001
              - CV002
              - CV007
              - CV029
              - CV033
          - type: callout
            title: 公开来源无法验证，收入估算区间很宽
            body: >
              本章所有收入倍数计算都使用分析师外推的 2024–2025 年 $80–150M 区间。该区间来自 Sacra 的 2021 年 $50M 基数，以及与公司所称「2022 年增长 51%」和「五年增长
              10x」一致的复合增长情景。区间宽度约为 2x，意味着隐含倍数区间（8x–15x）也约为 2x。没有私有数据就无法调和。任何把该区间中的单一点当作确定值的尽调模型都站不住。
            calloutType: assumption
            claimRefs:
              - CV007
              - CV008
              - CV009
              - CV025
