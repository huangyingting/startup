      - number: '2.2'
        title: 市场规模：TAM、SAM 和 SOM
        blocks:
          - type: paragraph
            body: >
              由于范围定义、地理覆盖和方法论不同，各分析报告对在线语言学习的市场规模估计差异很大。最宽口径下，Meticulous Research 将全球语言学习市场（所有模式、所有地区）在 2024 年估为
              $64.3B，并以 12.5% CAGR 增长至 2035 年的 $227B。GM Insights 将同一市场在 2025 年估为 $85.1B，CAGR 为 22.9%。HolonIQ 2021 年预测
              D2C 细分在 2025 年达到 $115B；公开数据尚未给出 2025 年实际值来验证该预测。


              若收窄到纯数字交付，Grand View Research 估计在线语言学习市场 2024 年为 $22.1B，并以 16.6% CAGR 增至 2030 年的
              $54.8B。其中在线真人辅导子细分边界更紧：Research and Markets 报告 2024 年 1 对 1 和小组真人辅导市场为 $2.8B（18.6% CAGR 至 2030 年
              $7.9B），DataIntelo 则用更宽定义估计同一真人辅导类别为 2024 年 $7.8B，该定义包括混合线下渠道。Market.us 将面向语言学习的 EdTech 估为 2024 年
              $11.7B。SAM 估计从 $2.8B 到 $12B，相差 4 倍；没有专有数据，就无法做精确渗透率分析。


              企业在线语言学习子细分（Preply 的 B2B 角度）由 Verified Market Reports 单独估为 2024 年 $10.5B、CAGR 8.2%；Growth Market Reports
              则将企业语言培训整体估为 2024 年 $7.8B、CAGR 9.1%。Preply 自身收入未公开披露；最近的 Sacra 估计把 2021 年收入置于 $50M。没有第三方验证的 2024–2025
              年收入数据，缺少私有财务信息时，SOM 计算只能是推测。
