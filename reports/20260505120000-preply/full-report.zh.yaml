      - number: '6.3'
        title: 具名客户证据——B2B 部署与 B2C 成效
        blocks:
          - type: paragraph
            body: >
              Preply 的具名客户证据覆盖有记录的企业部署，以及一项针对 B2C 结果的第三方效果研究。


              B2B 侧，Delivery Hero（全球食品配送平台，Berlin）是记录最充分的案例：截至 2024 年，双方合作已持续 2+ 年，631 名员工加入 Preply Business。Delivery
              Hero 的 Learning & Development Specialist Philip Schiele 确认，参与人数呈指数级增长，员工对跨文化融合的反馈“非常正面”。合作围绕员工 L&D
              预算设计，把英语和德语培训作为灵活福利提供。Genesys Informatica 报告称，72% 的员工感受到对专业工作的正向影响。Music AI 记录超过 90% 的员工提升了语言技能。Toyota
              Material Handling Polska 使用 Preply Business 解决员工口语障碍。Miro 的 People Programs Specialist Yulia 提到，Preply
              的多时区灵活性和行业专精导师“对我们的全球业务必不可少”。Unilever 和 Datadog 在多家新闻来源中被列为企业客户，反映 Preply
              正转向高留存的经常性企业合同。所有列名账户都被描述为生产部署，不是试点。


              B2C 侧，2025 年 LeanLab Education 研究——由独立非营利研究机构执行——招募了 67 名西班牙语成人学习者，在 Preply 上参加 12 周英语项目。结果：每 3 名中有 1
              名学习者提升了 CEFR 等级；学习者进步速度为标准速度的 3x（24–48 个导师小时，相比每个 CEFR 级别通常 160–240 小时）。完成 24+ 节课后：97% 对说英语有信心；94%
              感到更流利；96% 将成功归因于真人导师。这些结果由 Preply 在 September 2025 通过 PR Newswire 发布，并由 EdTech Innovation Hub 独立报道。注意：该研究与
              Preply 合作开展；公开材料中没有记录独立复现。
