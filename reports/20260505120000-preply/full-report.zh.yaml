      - number: '8.3'
        title: 情景分析：牛市、基准与熊市
        blocks:
          - type: paragraph
            body: >
              三种情景勾勒 Series D 投资人以 $1.2B 入场后的结果区间。每个情景都使用同一个无法验证的收入基数（2024 年估算 $80–150M），并对增长率、利润率扩张和退出路径采用不同假设。


              牛市情景：收入位于分析师区间顶部（2024/25 年约 $150M），并继续以 40%+ CAGR 增长，驱动力来自 B2B 分部达到总收入的 30%+、AI 生产率提升压低导师获客成本，以及 2027–2028
              年 IPO 或战略收购。若收入达到 $300M、前瞻倍数为 5–7x（符合带 AI 溢价的教育科技 SaaS 私有可比公司），企业价值可达 $1.5–2.1B，为 Series D 投资人带来
              1.25–1.75x 的投入资本倍数（MOIC）。但科技教育平台的 IPO 窗口必须重新打开；该窗口自 2022 年以来已实质性关闭。


              基准情景：收入处于估算中点（2024/25 年约 $100–120M），CAGR 为 25–30%。B2B 分部温和扩张，EBITDA 利润率到 2028 年达到 10–15%，公司在 2028–2029 年以
              5–6x 前瞻收入倍数完成战略收购或 SPAC 退出。退出价值 $400–600M。以 $1.2B 入场，如果没有保护投资人的优先权机制，这将意味着资本亏损。


              熊市情景：受消费者可选支出宏观逆风、B2B 市场饱和或导师平台去中介化影响，收入增长放缓至 15–20% CAGR。竞争对手（Duolingo AI、企业 Microsoft Teams 集成，或
              Coursera 的大型企业产品）抢走企业预算份额。由于 AI 投入要求（OpenAI API 成本扩张），EBITDA 在 2026–27 年再次转负。退出前发生降估值轮或结构化资本重组，路径类似
              GoStudent 从 $3.2B 跌至低于 $1B。


              在当前证据下，基准情景最可能发生；它意味着，除非 Preply 在退出前做到 $300M+ 收入，否则 Series D 投资人可能面临账面亏损。关键问题是，Series D 融到的 $150M（累计融资
              $299M）是否足以提供资金跑道，使公司在退出窗口进一步收紧前达到经盈利验证、可 IPO 的状态。
