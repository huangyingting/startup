  - id: FE001
    title: Preply 产品架构栈
    type: stack
    layout: wide
    summary: |
      产品架构分为四层，从基础设施底座延伸到面向用户的 AI 功能。各层展示依赖链条如何从云和视频基础设施，经平台服务，延伸到交付给学习者和导师的 AI 产品套件。
    data:
      layers:
        - label: 基础设施层
          modules:
            - name: AWS Cloud（计算、存储、网络）
              detail: 主要云服务商；全球区域
            - name: Agora SDK（视频 / 音频 RTC）
              detail: 1:1 课程实时视频和音频传输
            - name: LiveKit（Scenario Practice RTC）
              detail: AI 对话教练会话的媒体传输
        - label: 平台服务层
          modules:
            - name: 导师市场平台（发现、匹配、预订）
              detail: ML 辅助导师匹配和推荐
            - name: 课时管理（排课、支付）
              detail: Stripe + Braintree 支付；课时积分系统
            - name: SCIM / SSO 身份管理（企业）
              detail: Azure AD、Okta、Google、SAML 2.0 账号预配
        - label: 课堂与协作层
          modules:
            - name: Preply Classroom（视频布局、屏幕共享、聊天）
              detail: 统一的浏览器内和移动端上课界面
            - name: Whiteboard（绘图、形状、激光笔）
              detail: 多白板互动画布；每节课自动保存
            - name: Canvas（协作笔记、结构化内容）
              detail: 实时笔记和备课工作区
            - name: Flashcards（词汇）
              detail: 面向英语、法语、西班牙语的间隔重复词汇练习
        - label: AI 功能层
          modules:
            - name: Lesson Insights（OpenAI 大语言模型）
              detail: 课后总结：词汇、语法、口语三大支柱
            - name: Daily Exercises（生成式 AI）
              detail: 课间个性化练习活动
            - name: Scenario Practice（双 Agent：对话 + 监督）
              detail: 虚拟形象对话教练；OpenAI Realtime + gpt-4.1-mini；LiveKit
            - name: Canvas 中的教学助手（OpenAI）
              detail: 在课程工作区内生成练习和口语提示
    approximationNotes: 栈层分组基于公开工程博客、帮助中心文档和合作伙伴案例研究推断。内部服务边界可能不同。
