      - number: '4.3'
        title: 成本结构和利润率动态
        blocks:
          - type: paragraph
            body: >
              Preply 的成本结构符合高触达零工市场平台特征：最大可变成本——导师分成、支付处理和客户支持——会随总交易额直接扩张。按净收入口径（扣除导师分成后），Preply 的抽佣率为总交易价值的
              18–33%；基于真实导师收入数据，成熟导师的有效混合费率更接近 15.5–22%。再扣除支付处理费（通过 Stripe 等提供商处理国际卡交易通常为交易价值的
              3–5%）后，固定成本前的有效净收入利润率会进一步收窄。


              固定成本类别包括：（1）工程和产品（R&D 集中在乌克兰 Kyiv，提供地理劳动力成本套利，但也有战争相关集中风险）；（2）销售和营销，考虑到市场平台需要持续获取学生和导师，这可能是最大运营开支；（3）云 /
              基础设施；（4）面向学习者和导师两端的客户成功。截至 2023 年 12 月，IFC 新闻稿指出，Preply 已增长至 600+ 名员工，覆盖 62 个国籍，并在 Barcelona、New York 和
              Kyiv 设有办公室。


              对按 Preply 佣金率运营的市场平台来说，结构性挑战在于供给方（导师）在任期最低时承担最高成本，也就是说，新导师——同时也是质量波动风险最高的一群——在交叉补贴平台营销。只支付 18%
              的资深导师是平台最佳供给侧资产，但他们也贡献最低的每课收入。2026 年 1 月 Series D 前宣布 EBITDA
              转正，确认收入增长快于固定和可变成本增长，不过精确毛利率结构仍属私有。可比双边教育科技市场平台的分析师基准显示，毛利率通常在 65–80% 区间（扣除支付处理但未扣人员成本），EBITDA 利润率通常在
              $50M+ 收入规模时转正。
            claimRefs:
              - CI019
              - CI020
              - CI021
              - CI022
              - CI026
              - CI027
              - CI033
