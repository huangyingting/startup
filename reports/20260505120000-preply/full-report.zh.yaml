      - number: '3.2'
        title: 直接市场同类竞品（B2C）
        blocks:
          - type: paragraph
            body: |
              iTalki 是 Preply 在 B2C 端结构最相似的竞品：两者均运营双边市场，连接全球语言学习者与自由职业
              导师。iTalki 的 15% 固定抽成远低于 Preply 的 18—33% 梯级结构，是 Preply 面临导师流失风险的持续
              来源。iTalki 允许按课时付费、无需强制套餐承诺，对休闲学习者更友好。但 iTalki 没有企业产品，其收入
              估算区间宽泛（2024—2025 年为 2,500 万至 3.41 亿美元），反映出公开披露有限。两个平台均面临显著的
              导师多平台运营问题：导师惯常同时在两个或多个市场上维持活跃档案，使任何单一平台都难以形成供给侧
              排他性。

              Cambly 2024 年收入约 2.5 亿美元，专注英语对话练习，主要服务拉丁美洲和中东的学习者。Cambly 的
              平台定价模式（导师时薪约 10—12 美元）消除了定价复杂性，但导师收入也相应低于 Preply 和 iTalki。
              Lingoda 在结构化课程细分竞争，提供六门核心语言（英语、德语、法语、西班牙语、葡萄牙语、意大利语）
              的小班订阅课；其于 2021 年 C 轮融资约 8,300 万美元，服务全球逾 10 万学员。Cambly 的纯英语专注
              和 Lingoda 的语言覆盖局限，使两者与 Preply 更宽泛的市场及企业扩张目标的直接竞争重叠有限。
              Verbling 曾是独立同类竞品，自 2020 年 1 月起在 Busuu 品牌下运营，已不再构成独立竞争力量。
