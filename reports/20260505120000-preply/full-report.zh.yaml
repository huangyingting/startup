  - number: 2
    title: 市场分析
    sections:
      - number: '2.1'
        title: 市场边界和范围
        blocks:
          - type: paragraph
            body: >
              全球语言学习行业横跨多种交付模式和支出类别。最宽口径下，市场包括语言学校和大学的线下课堂教学、借助教材和抽认卡应用的自学、自定进度数字应用（Duolingo、Babbel、Rosetta
              Stone）、在线真人小班课，以及在线真人一对一辅导。Preply 核心产品明确位于在线真人一对一辅导细分：真人导师与单个学习者进行实时视频课程。该细分不包括异步自定进度内容、纯 AI
              聊天机器人练习和线下课堂教学。


              相邻领域包括覆盖所有学科的一般在线辅导平台、企业线上学习套件、语言测评和认证服务（TOEFL、IELTS 备考），以及职业沟通辅导。Preply
              价值主张的现状替代品包括线下语言学校、大学语言院系、教材自学，以及免费或低价的自定进度应用。相关纳入支出，是学习者或雇主为真人教师主导的实时语言课程支付的费用。排除支出则是不涉及真人导师实时互动的一切：应用订阅、异步视频课程和传统课堂学费。
