      items:
        - label: B2C — 发现
          description: 自然搜索（1,000+ 个 SEO 页面、50+ 种语言）、App Store、品牌直接访问
          note: 约 66% 访问为直接流量，显示品牌认知度高
        - label: B2C — 入门
          description: 语言水平测评、浏览导师资料、试听课（100% 满意保证）
          note: 试听课是 B2C 转化的主要入口
        - label: B2C — 激活
          description: 首次付费订阅（28 天计划，每周 1–8 节课）；生成个性化课程计划
          note: 导师—学习者匹配是核心产品差异化
        - label: B2C — 留存与 AI 互动
          description: Lesson Insights（AI 总结）、Daily Exercises（AI 练习）、Scenario Practice（AI 教练）
          note: 课间 AI 工具设计目标是维持参与度、降低流失
        - label: B2C — 扩张
          description: 增加新语言、升级计划、通过雇主赞助加入 Preply Business
          note: 经雇主赞助从 B2C 交叉销售至 B2B，是已记录的扩张路径
        - label: B2B — 评估与签约
          description: 出站 SDR / CRO 触达或入站演示；与 L&D / HR 完成企业签约
          note: 专属入门专家；SSO/SCIM 账号预配；目标对齐
        - label: B2B — 部署与激活
          description: 按角色 / 等级导入学员群组；为 L&D 经理启用 Corporate Dashboard
          note: 进度跟踪持续呈现技能提升
        - label: B2B — 扩张
          description: 部门级采用扩展到全企业；增加语言或地域
          note: Delivery Hero：2+ 年合作中员工数指数级增长
    approximationNotes: 旅程阶段基于 Preply 官方产品页、案例研究和新闻来源推断。阶段之间的转化率未公开披露。
