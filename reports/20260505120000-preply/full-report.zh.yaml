      - number: '1.6'
        title: 展示材料
        blocks:
          - type: callout
            title: 真人主导、AI 增强的差异化
            body: >
              Preply 刻意选择「真人优先、AI 赋能」定位，并由 2025 年 Efficiency Study 支撑：96–97% 的学习者重视真人教学。这与全自动竞品形成对比，也创造了可防守的高端细分。自
              Series C 以来，导师数量增至三倍以上，同时新增 40+ 种语言，显示供给侧可扩展性与质量定位同步成立。
            calloutType: strength
            claimRefs:
