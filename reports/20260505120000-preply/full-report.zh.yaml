  - id: FV004
    title: 投资委员会 KPI 评分卡
    type: kpi
    layout: standard
    summary: |
      面向 IC 的序数评分（0–10），覆盖八个投资维度。市场和产品得分高；财务透明度和估值得分低，
      把综合结论拉向跟踪而不是买入。评分仅反映公开可得证据；若能进入私有数据室，
      财务透明度、净留存率（NRR）和退出清晰度得分可能大幅上调。
    data:
      items:
        - label: 市场机会
          score: 8
          note: 1.8B 学习者，$2.8–12B 真人辅导 SAM，18%+ CAGR 顺风
        - label: 产品与竞争护城河
          score: 7
          note: 人主导的 AI 模式、100K+ 导师、自有课堂、90+ 种语言；AI 颠覆风险压住满分
        - label: 团队与执行
          score: 7
          note: 创始人经验丰富，C-suite 强（前 Airbnb、Delivery Hero、Flowspace）；Kyiv 集中风险
        - label: 增长证据
          score: 6
          note: GMV 增长 50%，公司称 5 年收入 10x；EBITDA 为正——均未经审计 / 来自公司口径
        - label: 单位经济与利润率
          score: 4
          note: 多个独立来源确认 EBITDA 为正；毛利率和净留存率（NRR）未披露
        - label: 财务透明度
          score: 2
          note: 未披露 2021 年后年经常性收入（ARR）或收入；没有毛利率、净留存率（NRR）或 CAC 数据
        - label: 估值吸引力
          score: 2
          note: 未经验证基数上的隐含收入倍数为 8–15x；相对所有上市可比公司偏高
        - label: 退出清晰度
          score: 3
          note: 没有 IPO 申报，没有 M&A 信号；Goldman Sachs 关系是利好，但不具约束力
    approximationNotes: 评分采用 0–10 序数尺度。单位经济和财务透明度维度没有来源支撑的数字输入；得分反映证据缺口， 而非负面证据。
