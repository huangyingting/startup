      - number: '7.7'
        title: 展示项
        blocks:
          - type: callout
            title: EU AI 法案2026年8月截止期：未披露合规差距分析
            body: >
              Preply 的教师匹配算法及 AI 驱动的学习评估，大概率属于 EU AI 法案附件三高风险类别。合规截止日期为2026年8月2日——距本报告发布日期仅剩三个月。目前既无合规性评估，亦无差距分析，更未有任何
              EU AI 法案合规准备的公开披露。违规将面临最高3,500万欧元或全球年营业额7%的罚款。这是本章中时效最为紧迫的单一风险。
            calloutType: risk
            claimRefs:
              - CR006
              - CR005
              - CR037
          - type: callout
            title: 教师劳工定性风险：无 Prop 22 豁免保护，行业先例和解金超5亿美元
            body: >
              加州 AB5 的"ABC 测试"完整适用于在线辅导平台——非交通类零工并无等效的 Prop 22 豁免。Uber 和 Lyft 在纽约州、马萨诸塞州和新泽西州的和解金合计超过5亿美元。Preply
              将教师划分为独立承包商，但若依据 ABC 测试评估"业务整合"条款（B 项），语言辅导正是 Preply
              的核心业务，教师或无法通过该测试。一旦被追溯重新认定，将引发雇佣福利负债，并可能迫使对定价模式进行根本性重构。
            calloutType: risk
            claimRefs:
              - CR025
              - CR026
              - CR027
          - type: callout
            title: 估值可信度风险：2021年后 ARR 未披露
            body: >
              12亿美元估值无法通过公开营收数据加以核实。最后一次有据可查的 ARR 约为2021年的5,000万美元。即便2024年 ARR
              达到1.25亿至2亿美元（按2.5倍复合增长），隐含的6至10倍收入乘数仍预设了在教育科技可比公司估值倍数大幅压缩背景下的持续增长。若公开市场条件维持低迷，则下次流动性事件出现下行轮次的概率不可忽视。
            calloutType: risk
            claimRefs:
              - CR024
              - CR034
              - CR034
          - type: callout
            title: 积极信号：未发现公开数据泄露或监管执法记录
            body: >
              就2024至2025年间涉及 Preply 的 GDPR 执法行动、数据泄露及现行诉讼进行检索，均未发现经证实的事件。隐私政策已于2026年3月更新，数据保护官（DPO）已完成任命，EU
              代表资格亦已到位。这降低了——但并未消除——监管与数据泄露风险的剩余严重性。
            calloutType: insight
