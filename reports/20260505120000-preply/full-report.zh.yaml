      - number: '2.4'
        title: 增长驱动因素
        blocks:
          - type: paragraph
            body: >
              首要结构性驱动因素是全球化。跨国公司跨境扩张时，能进行客户沟通、跨职能协作和市场进入的多语言团队需求同步上升。北美在 2024 年以 36%
              份额领先在线语言学习市场，但亚太是增长最快的地区：中国在线语言辅导市场预计到 2030 年达到 $1.7B，CAGR 为 24.2%。预计到 2025 年，英语将在语言学习中保持超过 67%
              的市场份额，反映其作为商业和教育全球默认语言的地位。


              AI 既是驱动因素，也是双刃催化剂。正面看，AI
              能降低导师行政负担（备课、作业生成、进度追踪）、提高导师-学习者匹配准确性，并个性化学习路径。通过减少课前准备开销、改善导师-学习者匹配来提高留存，这些能力能改善单位经济。Preply 委托 LeanLab
              Education 开展的 2025 年研究发现，96% 的学习者认为真人辅导对进步必不可少，97% 认为真人辅导提升了信心，支持 AI 增强真人导师而非替代真人导师会增加价值的论点。企业 L&D
              对语言培训的投入正在上升：92% 的 Preply Business 学习者报告工作表现提升；移动优先的数字交付预计到 2025 年将拿下超过 40% 的语言学习收入。Preply 引用的 HolonIQ
              数据称，2026 年前五年，全球 D2C 语言学习市场规模已增长到约三倍。
            claimRefs:
              - CM027
              - CM028
              - CM029
