      - number: '4.5'
        title: 资本充足性和融资
        blocks:
          - type: paragraph
            body: >
              Preply 的融资历史已在公司概览章节集中说明；本节聚焦与投资判断相关的财务结构和资金续航。July 2023 的 Series C 追加融资总额为 $70M，其中 $42M 为 Horizon Capital
              领投的股权融资，$28M 为债务。融资当时，CEO Kirill Bigai 表示公司有“充足的资金续航，上一轮融资的大部分仍在账上”，说明这次追加融资更偏机会型，而非被迫融资。$28M
              债务额度的利率和到期日尚未公开，构成资本结构图景中的证据缺口。


              European Bank for Reconstruction and Development (EBRD) 通过 HCGF IV Co-Investment I SPV（项目
              EBRD-54896，October 2023 批准）投资 $4.6M 股权，资金经 Horizon Capital 的基金投向 Preply，专门支持其 Ukraine R&D 运营。IFC 在同一轮 July
              2023 融资中与 EBRD 共同投资 $10M。January 2026，EBRD 宣布在 $150M Series D 中再追加 $20M 股权共同投资。


              January 2026 完成、估值 $1.2B 的 Series D 是 Preply 规模最大的一轮融资。Goldman Sachs International
              担任唯一配售代理。资金用途明确划向三项：（1）AI 和数据基础设施扩展；（2）产品与工程团队扩张，包括在 New York、London、Barcelona、Kyiv 新增 100+
              岗位；（3）全球市场增长，触达新的学习者和导师群体。到 late 2025 已实现 EBITDA-positive，意味着现金消耗大幅下降，说明 $150M Series D
              可把资金续航拉长数年，近期不需要再融资。Preply UK Services Ltd 于 May 2024 在 England & Wales 注册成立（公司编号 15717575）；首份财务报表应在
              September 2026 前提交，届时将为 UK 实体财务提供新的数据点。
