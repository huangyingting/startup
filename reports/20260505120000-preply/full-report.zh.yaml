            - name: AWS 云（计算、存储、网络）
              detail: 主要云服务商；覆盖全球多地区
            - name: Agora SDK（视频 / 音频 RTC）
              detail: 1:1 课程实时视频与音频传输
            - name: LiveKit（情景练习 RTC）
              detail: AI 对话教练课程的媒体传输
        - label: 平台服务层
          modules:
            - name: 教师市场（搜索、匹配、预约）
              detail: ML 辅助的教师匹配与推荐
            - name: 课程管理（排期、支付）
              detail: Stripe + Braintree 支付；课程积分系统
            - name: SCIM / SSO 身份认证（企业）
              detail: Azure AD、Okta、Google、SAML 2.0 配置
        - label: 课堂与协作层
          modules:
            - name: Preply 课堂（视频布局、屏幕共享、聊天）
              detail: 统一的浏览器与移动端课程界面
            - name: 白板（绘图、图形、激光笔）
              detail: 多白板互动画布；每节课自动保存
            - name: Canvas（协作笔记、结构化内容）
              detail: 实时记录与备课工作区
            - name: 闪卡（词汇）
              detail: 面向英语、法语、西班牙语的间隔重复词汇练习
        - label: AI 功能层
          modules:
            - name: Lesson Insights（OpenAI 大语言模型）
              detail: 课后总结：词汇、语法、口语三大维度
            - name: Daily Exercises（生成式 AI）
              detail: 课间个性化练习活动
            - name: Scenario Practice（双智能体：对话 + 监督）
              detail: 虚拟形象对话教练；OpenAI Realtime + gpt-4.1-mini；LiveKit
            - name: Canvas 内教学助手（OpenAI）
              detail: 在课程工作区内生成练习与口语提示
