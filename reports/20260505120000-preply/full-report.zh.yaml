      - number: '2.5'
        title: 采购障碍与尽调缺口
        blocks:
          - type: paragraph
            body: |
              最紧迫的结构性制约是 AI 替代风险。Duolingo 于 2025 年公开宣布"AI 优先"战略，随即因隐含"AI 将
              取代人类内容贡献者"而遭到用户和公众的强烈反弹。这一动态为 Preply 的真人优先定位提供了声誉差异化
              机会，但也表明资金雄厚的竞品正在大力押注纯 AI 在线辅导替代品。随着 AI 对话模型在发音指导、语境
              纠错和文化细节方面持续提升，纯 AI 与真人辅导之间的价值差距可能逐步收窄——尤其对于构成最大流量
              获客漏斗的初中级学习者而言。

              消费者语言平台面临结构性高流失：学习者动机本质上是波动的，一旦达到日常对话水平便倾向停课。大量
              消费者评价和 BBB 投诉记录将计费不透明、自动续费及退款困难列为不满的主要原因。Indeed 上的导师投诉
              则记录了对高抽成比例（新导师 33%，随课时量降至 18%）和体验课收入全额归平台的不满。

              B2B 端的企业采购需要人力资源、L&D、IT（SSO 和 HRIS 集成）及采购部门多方对齐，拉长了典型销售周期。
              预算归属复杂性与年度 L&D 预算周期对成单时效构成约束。可服务市场（SAM）估算值从不同权威来源的
              28 亿到 120 亿美元不等，进一步表明在缺乏 Preply 内部业务线收入拆分的情况下，无法进行精准的市场
              渗透测算。
            claimRefs:
