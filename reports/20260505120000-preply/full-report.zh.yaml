  - number: 8
    title: 估值
    sections:
      - number: '8.1'
        title: 投资逻辑与估值背景
        blocks:
          - type: paragraph
            body: >
              Preply D 轮于2026年1月完成，投后估值12亿美元，由 WestCap 领投，Indico Capital Partners、Horizon Capital
              和欧洲复兴开发银行（EBRD）参投，Goldman Sachs International 担任独家配售代理。已披露的累计融资额约为2.99亿美元。本轮估值较2023年7月 C
              轮延长轮估算的5亿至6亿美元（投后）接近翻三倍，是2022年以来欧洲教育科技领域最大幅度的估值跃升之一。


              投资逻辑建立在五大支柱之上。第一，截至2026年2月，Preply 是全球仅存的14家 HolonIQ 认证教育科技独角兽之一——GoStudent 估值跌破10亿美元被移除、Byju's
              崩塌后，这一名单持续收缩；Preply 的入选标志着其在在线语言学习领域的类别领导地位得到认可。第二，公司在 D 轮完成前的12个月内实现 EBITDA
              转正，这一运营成熟度里程碑使其区别于大多数私人教育科技平台。第三，平台增长信号强劲：D 轮完成时可预约教师超过10万名（对比 C 轮时约3万名）；据 CEO Kirill Bigai 在2025年11月接受
              Inc. 杂志采访时披露，2024年10月至2025年10月商品交易总额（GMV）增长50%；五年（2020至2025年）营收增长10倍（未经审计的公司声明）。第四，"人类主导、AI
              赋能"的定位，在企业学习与发展（L&D）采购方日益要求真人授课加合规级别进度追踪的时代，直接对抗纯游戏化阵营（Duolingo、Babbel）。第五，Preply
              Business（企业客户超过2,000家）是经常性、利润率更高的营收层，为原本以交易为主的市场模式引入了订阅属性。


              反向逻辑集中在一个结构性事实上：2021年后，公司从未公开披露过任何绝对营收数字，所有倍数计算只能依赖分析师外推，不确定范围达2至3倍（2024至2025年估算区间为8,000万至1.5亿美元）。以12亿美元入场价，隐含的
              EV/收入倍数在8倍（基于1.5亿美元估算）至15倍（基于8,000万美元估算）之间。公开教育科技板块 EV/收入中位数截至2024年第四季度为1.6倍（Finerva），即便估值溢价最高的 Duolingo
              也仅交易在约3.7倍 EV/LTM 收入水平（Multiples.vc，2026年5月）。私募溢价自有依据，但相对最接近的公开可比标的5至10倍溢价，需要公开领域目前根本不存在的
              NRR、毛利率和队列留存率的特殊证据支撑。EBITDA 转正的声明未经审计，依据的是新闻稿援引的公司声明；EBITDA 利润率及绝对金额均未披露。
