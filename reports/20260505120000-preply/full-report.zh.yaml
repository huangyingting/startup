      - number: '3.2'
        title: 直接市场平台同业（B2C）
        blocks:
          - type: paragraph
            body: >
              iTalki 是 Preply 最接近的 B2C 结构性对标：两者都是连接全球语言学习者和自由导师的双边市场。iTalki 15% 的固定佣金显著低于 Preply 18–33% 的阶梯结构，这一直是
              Preply 导师流失风险的来源。iTalki 允许按课付费，且没有强制套餐承诺，对休闲型学习者更易进入。不过，iTalki 没有企业产品，其收入估计区间很宽（2024–2025 年
              $25M–$341M），反映公开披露有限。两个平台都要面对显著的导师多平台经营：导师通常会同时在两个或更多市场平台保持活跃资料，限制任何单个平台的供给侧独占性。


              Cambly 报告 2024 年收入约 $250M，专注英语会话练习，主要服务拉丁美洲和中东学习者。Cambly 的平台定价薪酬模式（导师时薪约 $10–12）消除了定价复杂度，但相比 Preply 和
              iTalki 压缩了导师收入。Lingoda 在结构化课程细分中竞争，提供六门核心语言（英语、德语、法语、西班牙语、葡萄牙语、意大利语）的小班课和订阅定价模式；其通过 2021 年 Series C 累计融资约
              $83M，服务全球 100,000+ 名学生。Cambly 只做英语、Lingoda 语言范围较窄，限制了它们与 Preply 更广泛市场平台和企业野心的直接竞争重叠。Verbling 曾是独立同业，自 2020
              年 1 月起在 Busuu 品牌下运营，不再是独立竞争力量。
