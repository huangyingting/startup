      - number: '6.2'
        title: 采用轨迹与市场触达
        blocks:
          - type: paragraph
            body: >
              Preply 的整体平台触达由公司官方披露和第三方流量分析共同支撑。平台报告称拥有 100,000+ 名导师、300,000+ 条 5 星导师评价，学习者覆盖 180 个国家。到 March
              2026，月度网页访问约为 25 million（Semrush），使 Preply 进入全球语言学习平台第一梯队。美国贡献总流量的 17–19%（约 4.7–4.8 million 次访问 /
              月），是最大单一国家市场。其他重要市场包括英国（5–6%）、西班牙（5.9–7.2%）、波兰（3.8–5.2%）和意大利（约 4.5%），显示学习者基础主要集中在英语国家和西欧。


              移动端采用强劲：Preply Android 应用在 Google Play 有 5M+ 次安装，基于 56,300+ 条评价获得 4.7/5；iOS 应用在 App Store 有 40,000+ 条评分，得分
              4.8/5。直接流量约占全部网页访问的 66%，说明用户高度认知品牌并会回访，而不是纯靠付费获客。2023 年，公司转向基于价值的 Google Ads 出价，瞄准高生命周期价值学习者，带来全球转化价值同比提升
              25%，获客成本下降 10%——这是从学习者数量转向学习者质量的明确战略转向。


              程序化 SEO 是实质性的自然获客引擎：Preply 维护 50+ 种语言、超过 1,000 个搜索优化页面，每月带来数百万自然访问。2024 年 Animalz 案例研究记录了在这一基线之上持续增长的挑战，以及
              Preply 的应对——以人群画像为中心扩展 SEO，面向外派 / 移民人士、商务专业人士等相邻人群，而不只触达寻找明确课程页面的漏斗底部学习者。Axios 发布的 CEO 访谈（September
              2025）确认，平台服务 100,000+ 名导师和 180 个国家的学习者，学生进步速度为行业标准的 3x。
