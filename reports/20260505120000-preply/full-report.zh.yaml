      - number: '5.2'
        title: 平台架构与技术栈
        blocks:
          - type: paragraph
            body: >
              Preply 在 AWS 上运行云原生微服务架构；NudgeSecurity 供应链画像显示，AWS 是主要托管提供商，Google Workspace 则用于内部工具。实时视频和音频层在一对一课程中使用
              Agora 的 SDK，在较新的 Scenario Practice 会话式 AI 功能中使用 LiveKit——Preply Engineering Blog 在 April 2026 确认了一个由
              LiveKit 支撑的 Scenario Practice 工作进程。Agora 的合作伙伴案例研究也记录了其为 Preply 课程会话提供低延迟全球视频基础设施。


              技术供应链包括：Stripe 和 Braintree 用于支付，HubSpot 用于 CRM，Intercom 用于应用内支持聊天，Mailchimp 和 SendGrid 用于邮件，Greenhouse
              用于招聘，Branch 用于移动归因。前端开发使用 React 系工具（根据工程博客模式推断）；DevOps 借助 Docker/Kubernetes 式容器化（根据微服务架构和 Tech Radar
              引用推断）。Preply 维护公开 Tech Radar（基于 Zalando Tech Radar
              framework），通过四个环传递技术决策：Adopt、Trial、Assess、Hold；它既用于内部对齐，也用于候选人沟通。


              AI 层使用 OpenAI 模型（GPT family、OpenAI Realtime）处理大语言模型（LLM）任务，包括生成 Lesson Insights、Teaching Assistant 提示词，以及
              Scenario Practice Conversational Agent。Scenario Practice 内的 Supervisor Agent 使用 gpt-4.1-mini，temperature
              0.0，用于确定性的会话状态管理。STT（Speech-to-Text）和 TTS（Text-to-Speech）服务位于 OpenAI Realtime 工作进程两侧，LiveKit
              负责媒体传输和面向移动客户端的事件信令。
