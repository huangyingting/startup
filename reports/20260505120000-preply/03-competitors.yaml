  evidenceGaps:
    - type: private-evidence-only
      severity: material
      topic: Preply learner stickiness mechanisms (lesson history portability, tutor-student relationship depth)
      missingEvidence: >-
        No public data on user-level retention rates, lesson history export capabilities, or tutor-student longitudinal
        relationship depth on Preply vs. competitors.
      whyItMatters: >-
        Stickiness depth determines whether Preply's consumer moat strengthens over time or remains purely network-scale
        dependent.
      diligencePath: >-
        Request Preply's cohort retention data by lesson count; compare 3-month, 6-month, and 12-month retention vs.
        iTalki benchmarks.
      relatedQuestionRefs:
        - RQ015
    - type: private-evidence-only
      severity: material
      topic: Berlitz specific government and regulated-industry procurement contract scope vs. Preply Business
      missingEvidence: >-
        No public data on Berlitz's specific government contract value, agency names, or share of revenue from regulated
        verticals; Preply's pipeline exposure to government accounts is also undisclosed.
      whyItMatters: >-
        Determines the addressable enterprise market segment where Preply competes with Berlitz versus where it operates
        in an uncontested field.
      diligencePath: >-
        Request Preply pipeline segmentation by buyer type (government, regulated, commercial); assess Berlitz contract
        renewal rates via industry contacts.
      relatedQuestionRefs:
        - RQ018
    - type: missing-source
      severity: minor
      topic: Busuu for Business self-serve vs. demo-gated sales motion detail
      missingEvidence: >-
        No independent source was found confirming whether Busuu for Business deploys a fully self-serve enterprise
        signup flow or requires a demo before activation.
      whyItMatters: >-
        GTM motion difference affects Preply's relative CAC burden and sales cycle length in competitive enterprise
        deals.
      diligencePath: Test Busuu for Business signup flow directly; check for self-serve trial availability without sales engagement.
      relatedQuestionRefs:
        - RQ020
    - type: missing-source
      severity: minor
      topic: Independent verification of Preply Business vs. Rosetta Stone Enterprise ROI reporting capability
      missingEvidence: >-
        Comparison of ROI reporting depth between Preply Business and Rosetta Stone Enterprise is based solely on
        vendor-authored marketing materials; no independent third-party assessment was identified.
      whyItMatters: >-
        Enterprise buyers weigh analytics depth heavily in procurement decisions; independent validation would
        strengthen positioning evidence.
      diligencePath: Identify enterprise buyer reviews on G2 or Capterra comparing reporting capabilities across both platforms.
      relatedQuestionRefs:
        - RQ022
    - type: missing-source
      severity: material
      topic: Documented enterprise client switching events from Preply Business to competitor platforms
      missingEvidence: >-
        No publicly documented cases of enterprise clients publicly disclosing a switch from Preply Business to a named
        competitor were identified. Switch motivations are inferred from general reviewer patterns.
      whyItMatters: >-
        Enterprise churn evidence is the most direct test of competitive moat durability; absence of evidence is not
        evidence of absence.
      diligencePath: >-
        Review G2, Capterra, and TrustRadius enterprise reviews of Preply Business; conduct reference calls with
        prospects that evaluated Preply against goFLUENT or Berlitz.
      relatedQuestionRefs:
        - RQ024
