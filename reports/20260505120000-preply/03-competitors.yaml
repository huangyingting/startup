callouts:
  - calloutType: risk
    title: Tutor Multi-Homing Limits Supply-Side Lock-In
    body: |
      Documented tutor multi-homing across Preply, iTalki, Cambly, and Verbling is a structural
      vulnerability. Tutors face rational economic incentives to maintain profiles on lower-commission
      competitors. Preply's 18–33% tiered commission structure is the highest among its direct
      marketplace peers (iTalki charges 15% flat). If a top-volume tutor cohort migrates to iTalki
      or moves to independent arrangements, Preply's supply-side quality and availability will erode.
      This risk is amplified by the absence of tutor exclusivity agreements and by the ease of
      simultaneous multi-platform operation.
    claimRefs:
      - C108
      - C109
      - C130
  - calloutType: strength
    title: Dual-Segment Positioning Limits Replication Risk
    body: |
      Preply's ability to serve both B2C individual learners and B2B enterprise clients through a
      shared tutor pool is a structural advantage that dedicated enterprise competitors (goFLUENT,
      Speexx, Berlitz) cannot easily replicate without building a consumer acquisition channel. Similarly,
      consumer-only competitors (iTalki, Cambly) would require significant enterprise product investment
      to challenge Preply Business. This dual-segment moat is currently the most defensible structural
      feature of Preply's competitive position, as it enables cross-subsidization of tutor supply across
      consumer and enterprise demand.
    claimRefs:
      - C089
      - C118
      - C122
