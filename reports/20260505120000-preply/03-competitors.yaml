  - id: s-substitutes
    title: Substitutes and Status-Quo Alternatives
    body: |
      The most significant non-platform substitute is the corporate status quo: in-house language programs,
      local language schools, textbook-based learning, and blended LMS courses delivered through Coursera,
      LinkedIn Learning, or internal HR systems. These represent the incumbent position for corporate buyers,
      particularly large organizations with established L&D infrastructure and existing vendor relationships.
      The instructor-led enterprise language training market is projected to exceed $45B by 2026, with
      corporate clients accounting for over 47% of revenue—underscoring that Preply's growth thesis depends
      on displacing entrenched spending patterns with measurable ROI and workflow integration.

      In the B2C consumer segment, Duolingo represents the most material indirect threat. With 500M+
      registered users and the 2024 launch of Duolingo Max (GPT-4-powered conversation practice),
      Duolingo has closed part of the quality gap between gamified self-study and conversational practice
      for beginner-to-intermediate learners. Babbel, Rosetta Stone consumer, and Pimsleur offer self-paced
      alternatives that suffice for casual vocabulary acquisition. These substitutes do not displace
      Preply's premium position—advanced, business-focused, and high-stakes learners retain a strong
      preference for live human tutoring—but they pressure Preply's B2C addressable market at the entry
      level and may slow the funnel of learners graduating from free or low-cost tools to paid tutoring.
    claimRefs:
      - C103
      - C115
      - C116
      - C117
      - C124
      - C129
  - id: s-moat-analysis
    title: Switching Costs, Lock-In, and Competitive Moat
    body: |
      Preply's competitive moat is best characterized as moderate and partially structural. The 140,000+
      tutor network is a meaningful supply-side asset: depth and breadth of tutor availability in long-tail
      languages reduces learner churn relative to smaller platforms. However, this barrier is not
      prohibitive. Tutors and learners both face low switching costs: there is no hardware dependency,
      no proprietary data format, and lesson history does not transfer between platforms. Tutor
      multi-homing is prevalent and well-documented, with many tutors simultaneously maintaining active
      profiles on Preply, iTalki, Cambly, and Verbling to diversify income streams. Independent reviewer
      evidence confirms that iTalki's 15% flat commission model makes it the more tutor-favorable
      platform for established instructors once they build a student base.

      On the B2B side, switching costs are materially higher. Preply Business creates enterprise stickiness
      through HRIS and LMS integration (SSO, API connections to major HR systems), manager dashboards
      embedded in existing HR workflows, dedicated onboarding teams, and structured progress baselines
      tied to employee performance cycles. Once deployed across a global workforce and integrated into
      review processes, the cost of migrating to a competitor—retraining HR administrators, reconfiguring
      integrations, rebuilding progress baselines—is meaningful. This is comparable to goFLUENT and
      Speexx, though Berlitz's multi-decade procurement relationships in regulated verticals remain
      harder to unseat. The most structurally exposed dimension of Preply's moat is AI substitution:
      if free AI conversation tools continue to improve, Preply's per-lesson pricing model faces
      compression at the low-ASP B2C end.
    claimRefs:
      - C107
      - C108
      - C110
      - C111
