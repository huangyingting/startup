  - id: s-enterprise-competitors
    title: Enterprise and Corporate Language Training Competitors
    body: |
      Berlitz Corporation is the dominant incumbent in enterprise language training with approximately
      $1.1B in estimated annual revenue and 4,533 employees. With over 145 years of operation, Berlitz
      has established government and large-enterprise procurement relationships that provide structural
      distribution advantages Preply cannot replicate in the near term. Berlitz's service portfolio spans
      language instruction, cultural training, language testing, and translation services for corporate
      and government clients globally. Its primary weakness is slower digital product innovation relative
      to venture-backed platforms and the absence of a consumer marketplace model.

      goFLUENT serves 2,000+ enterprise organizations in 100+ countries and is estimated at approximately
      $169M in annual revenue as of 2025. Its January 2026 acquisition of Learnship's operations
      consolidated the competitive field in Europe and expanded its certified-trainer network. goFLUENT
      leads Preply Business on compliance certifications and HRIS/LMS depth. Speexx reported $79.7M in
      2024 revenue (up from $54.8M in 2023) despite only approximately $10.9M in disclosed venture
      funding, indicating strong organic growth; it positions as a people development platform for
      1,800+ organizations and 8M+ users. Busuu for Business (owned by Macmillan Publishers) and Rosetta
      Stone Enterprise (an IXL Learning division) compete on self-paced content and app-based delivery
      with 12 and 24 languages respectively, but neither offers genuine 1-on-1 live tutoring at scale—
      a structural differentiator that Preply Business exploits in enterprise sales motions.
    claimRefs:
      - C096
