chapter:
  number: 3
  title: Competitors
  summary: |
    Preply faces competition in two structurally distinct segments: the B2C consumer live tutoring marketplace
    and the B2B corporate language training market. Direct marketplace peers include iTalki (150+ languages,
    15% flat commission, 10M+ users) and Cambly (~$250M revenue, English-focused). In B2B, the competitive
    set is anchored by Berlitz (~$1.1B estimated revenue), goFLUENT (~$169M, acquired Learnship 2026), and
    Speexx ($79.7M, 2024). Preply's dual-segment positioning—serving both individual learners and 2,000+
    enterprise clients through a shared 140,000+ tutor network in 90+ languages—is a structural differentiator
    no single-segment competitor replicates today. Competitive moat is moderate: strong on tutor supply depth
    and language breadth, but limited by low learner switching costs, active tutor multi-homing, and growing
    AI substitution risk from Duolingo Max and GPT-4-driven conversation tools at the B2C entry level.
sections:
  - id: s-landscape-overview
    title: Competitive Landscape Overview
    body: |
      Preply competes across two structurally distinct competitive arenas that require separate assessment.
      The first is the B2C consumer live tutoring marketplace, where learners compare platforms on tutor
      quality, language availability, pricing transparency, and scheduling convenience. The second is the
      B2B corporate language training market, where enterprise procurement criteria—HRIS and LMS integration,
      analytics reporting, compliance certifications, and account management support—drive buying decisions.
      Few competitors operate meaningfully in both segments simultaneously, giving Preply a dual-segment
      positioning advantage but also creating exposure on two competitive fronts.

      Within B2C, the principal direct competitors are iTalki (founded 2007, Hong Kong, 150+ languages,
      10M+ users) and Cambly (English-focused, approximately $250M in 2024 revenue). Lingoda occupies a
      structured group-class niche, while Verbling—once an independent marketplace peer—was acquired by
      Busuu in January 2020. In B2B, the competitive set is dominated by legacy incumbents (Berlitz,
      British Council, Inlingua) and digital-native enterprise platforms (goFLUENT, Speexx, Busuu for
      Business, Rosetta Stone Enterprise). Duolingo, Babbel, and consumer self-paced apps represent
      substitute threats at the low-price B2C value end, not direct competitors in the live-tutoring or
      enterprise segments.
    claimRefs:
      - C089
      - C090
      - C095
      - C114
  - id: s-direct-b2c-peers
    title: Direct Marketplace Peers (B2C)
    body: |
      iTalki is Preply's closest B2C structural equivalent: both operate two-sided marketplaces connecting
      language learners with freelance tutors globally. iTalki's 15% flat commission is materially lower
      than Preply's tiered 18–33% structure, which is a persistent source of tutor attrition risk for
      Preply. iTalki allows pay-per-lesson billing with no mandatory package commitment, making it more
      accessible for casual learners. However, iTalki offers no enterprise product, and its revenue
      estimates carry wide uncertainty ($25M–$341M in 2024–2025), reflecting limited public disclosure.
      Both platforms contend with significant tutor multi-homing: tutors routinely maintain active profiles
      on two or more marketplaces simultaneously, limiting supply-side exclusivity for any single platform.

      Cambly reported approximately $250M in 2024 revenue and focuses exclusively on English conversation
      practice, primarily serving learners in Latin America and the Middle East. Cambly's platform-set pay
      model (approximately $10–12 per hour to tutors) removes pricing complexity but compresses tutor
      earnings relative to Preply and iTalki. Lingoda competes in the structured-course niche with group
      classes in six core languages (English, German, French, Spanish, Portuguese, Italian) and a
      subscription pricing model; it raised approximately $83M through a 2021 Series C and serves 100,000+
      students globally. Cambly's English-only focus and Lingoda's narrow language range limit their direct
      competitive overlap with Preply's broader marketplace and enterprise ambitions. Verbling, once a
      standalone peer, has operated under the Busuu brand since January 2020 and is no longer an
      independent competitive force.
    claimRefs:
      - C091
