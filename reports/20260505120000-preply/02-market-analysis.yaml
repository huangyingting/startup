    title: Market Sizing Lens (Population Demand Funnel)
    type: funnel
    layout: standard
    summary: |
      Five-stage population demand funnel showing how the estimated 1.8 billion active global
      language learners narrow to Preply's current estimated B2C active learner base. Each stage
      reflects estimated willingness and ability to engage with premium live one-on-one online
      tutoring. This figure answers the distinct question of market penetration potential relative
      to the learner population ceiling, not absolute market dollar value (covered by T202).
    data:
      items:
        - label: Active language learners globally
          value: 1800
          unit: millions (HolonIQ estimate)
        - label: Online / digital channel preference
          value: 450
          unit: millions (est. ~25% of global learners)
        - label: Willing to pay for digital language learning
          value: 80
          unit: millions (est. ~18% of online learners)
        - label: Seeking live 1-on-1 premium tutoring
          value: 12
          unit: millions (est. ~15% of paying segment)
        - label: Preply estimated B2C active learners
          value: 0.8
          unit: millions (Sacra, 2022)
    approximationNotes: >-
      Intermediate stages (450M, 80M, 12M) are informed bottom-up estimates without primary source validation. Only the
      1.8B learner top-of-funnel (HolonIQ) and Preply's ~0.8M current B2C reach (Sacra 2022) have cited sources.
      Conversion ratios between stages are speculative; primary research is needed to anchor them.
