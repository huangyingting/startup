callouts:
  - calloutType: strength
    title: 1.8 Billion Language Learners — Structural Demand Ceiling
    body: |
      HolonIQ data cited in Preply's Series D press release estimates 1.8 billion people worldwide
      are actively striving to achieve second-language proficiency — roughly 1 in 4 people globally.
      Even a fraction of this population reaching a willingness-to-pay threshold represents a
      multi-decade demand tailwind that is unlikely to be reversed by technology alone.
    claimRefs:
      - C051
  - calloutType: risk
    title: 'AI Substitution Risk: Duolingo''s AI-First Pivot'
    body: |
      Duolingo's declared "AI-first company" strategy in 2025 signals direct competitive pressure
      on human-tutored language platforms. If AI conversational practice reaches near-human fidelity
      for beginner-to-intermediate learners, it could erode Preply's largest B2C acquisition funnel.
      The response requires continuous investment in demonstrating the marginal value of live human
      interaction beyond what AI can replicate.
    claimRefs:
      - C081
  - calloutType: insight
    title: 'B2B Enterprise Segment: Better Unit Economics'
    body: |
      Corporate language training (Preply Business) carries structurally lower churn, higher ACV,
      and more predictable revenue than consumer B2C. With 2,000+ enterprise clients and 92%
      reporting improved work performance, the B2B segment is positioned to support better CAC
      payback and margin expansion as Preply scales its enterprise go-to-market. The $7.8–10.5B
      corporate online language learning market is growing at 8–9% CAGR — slower than the broader
      market, but with more defensible revenue.
    claimRefs:
      - C066
      - C062
      - C063
      - C077
