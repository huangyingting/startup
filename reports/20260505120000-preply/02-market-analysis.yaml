  - id: s-buyer-segmentation
    title: Buyer Segmentation and Adoption Path
    body: |
      Preply serves two primary buyer categories: B2C individual learners and B2B enterprise clients.
      In the B2C segment, the buyer and payer are the same person — the individual learner who pays
      directly for tutoring sessions, typically via a subscription or per-lesson credit pack. This
      segment includes working professionals seeking career advancement, students supplementing
      academic language study, travelers and migrants acquiring practical proficiency, and hobbyist
      language learners. English dominates platform demand at approximately 43% of Preply learner
      sessions, reflecting the global premium attached to English proficiency for career and
      educational access. The B2C learner base was approximately 800,000 active students as of 2022
      per Sacra's analysis, covering 180+ countries.

      In the B2B segment, the buyer is the employer's HR or L&D team while the end user is the
      employee learner. Preply Business serves 2,000+ enterprise clients including TikTok, Zendesk,
      Eventbrite, Mondelēz, Bain, Prudential, and Bayer. Enterprise adoption is triggered by
      international expansion, team communication failures, or talent development mandates. The
      B2B procurement path involves an initial scoping call and program design, followed by setup
      by a dedicated onboarding expert, a launch phase with learner-tutor matching, and ongoing
      manager dashboards for progress visibility. Switching costs in the enterprise segment are
      meaningful: integrations with HRIS systems, historical progress data, and institutionalized
      tutor relationships all create lock-in. Geographic labor arbitrage enables Preply to price
      competitively — tutors in lower-cost regions earn above local rates while learners in
      higher-cost markets access quality instruction at below-domestic-tutor prices.
    claimRefs:
      - C065
      - C066
      - C067
      - C068
      - C069
      - C070
      - C071
      - C072
  - id: s-growth-drivers
    title: Growth Drivers
    body: |
      The primary structural driver is globalization. As multinational companies expand across
      borders, the need for multilingual teams capable of client communication, cross-functional
      collaboration, and market entry grows in proportion. North America leads online language
      learning market share at 36% in 2024, but Asia-Pacific is the fastest-growing region:
      China's online language tutoring market alone is projected to reach $1.7B by 2030 at a
      24.2% CAGR. English is expected to maintain over 67% market share in language learning
      through 2025, reflecting its status as the global default for business and education.

      AI is both a driver and a double-edged catalyst. On the positive side, AI enables Preply to
      reduce tutor administrative burden (lesson planning, homework generation, progress tracking),
      improves tutor-learner matching accuracy, and personalizes learning pathways. These
      capabilities improve unit economics by reducing session preparation overhead and improving
      retention through better tutor-learner fit. A 2025 Preply-commissioned LeanLab Education
      study found that 96% of learners consider live human tutoring essential to progress and 97%
      credit it with boosting confidence, supporting the case that AI augmentation of human tutors
      is value-additive rather than substitutive. Corporate L&D investment in language training is
      rising: 92% of Preply Business learners report improved work performance, and mobile-first
      digital delivery is projected to capture over 40% of language learning revenue by 2025.
      The global D2C language learning market reportedly tripled in size over the five years
      preceding 2026 per HolonIQ data cited by Preply.
    claimRefs:
      - C073
      - C074
      - C075
      - C076
      - C077
      - C078
      - C079
      - C080
  - id: s-adoption-constraints
    title: Adoption Constraints and Diligence Gaps
    body: |
      The most acute structural constraint is AI substitution risk. Duolingo publicly declared an
      "AI-first company" strategy in 2025 and faced learner and public backlash for implying that
      AI would replace human content contributors. This dynamic creates a reputational differentiation
      opportunity for Preply's human-first positioning, but it also signals that well-funded
      competitors are aggressively investing in AI-only substitutes for live tutoring. As AI
      conversational models improve in pronunciation coaching, contextual error correction, and
      cultural nuance, the value gap between AI-only and human-tutored learning may narrow,
      particularly for beginner-to-intermediate learners who represent the highest-volume
      acquisition funnel.

      Consumer language platforms face structurally high churn because learner motivation is
      intrinsically variable: once a learner reaches conversational sufficiency, they often
      discontinue sessions. Multiple consumer reviews and BBB complaint filings cite unclear
      billing, automatic renewal charges, and refund difficulty as drivers of dissatisfaction.
      Tutors on Indeed have documented frustration with high commission rates (33% for new
      tutors, declining to 18% with volume) and loss of 100% earnings on trial lessons.

      On the B2B side, enterprise procurement requires multi-stakeholder alignment across HR,
      L&D, IT (for SSO and HRIS integration), and procurement — extending typical sales cycles.
      Budget ownership complexity and annual L&D budget cycles create timing constraints on
      conversion. The analyst market size range for the SAM ($2.8B to $12B from different
      reputable sources) underscores that precise penetration targeting is not possible without
      access to Preply's internal segment revenue split.
    claimRefs:
      - C081
      - C082
      - C083
      - C084
      - C085
      - C086
      - C087
      - C088
