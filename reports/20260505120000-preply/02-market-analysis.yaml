  evidenceGaps:
    - type: private-evidence-only
      severity: material
      topic: Preply B2B vs B2C revenue split and SOM within live tutoring SAM
      missingEvidence: >-
        Segment-level revenue breakdown (B2B vs B2C), precise gross margin by segment, and market share within the
        $2.8–7.8B live tutoring SAM are not publicly disclosed by Preply.
      whyItMatters: >-
        Without segment revenue data, it is not possible to verify whether B2B growth is outpacing B2C as management
        implies, calculate a credible SOM, or assess unit economics by segment.
      diligencePath: >-
        Request B2B and B2C gross revenue split, number of active learners per segment, and average contract value from
        management in due diligence.
      relatedQuestionRefs:
        - RQ208
        - RQ224
    - type: stale
      severity: minor
      topic: HolonIQ 2021 D2C language learning market projection vs 2025 realized data
      missingEvidence: >-
        HolonIQ's 2021 projection of a $115B D2C language learning market by 2025 has not been validated against
        independently audited 2025 actuals. The projection may have been influenced by COVID-19 digital adoption peak
        expectations.
      whyItMatters: >-
        If realized 2025 D2C market size is substantially below $115B, the TAM assumptions embedded in Preply's $1.2B
        valuation may require revision.
      diligencePath: >-
        Source HolonIQ's most recent (2024–2025) market update or compare against Meticulous Research's independently
        arrived-at $69.9B estimate for 2025.
      relatedQuestionRefs:
        - RQ220
    - type: conflicting-data
      severity: material
      topic: Online language tutoring SAM — conflicting analyst estimates ($2.8B to $12B)
      missingEvidence: >-
        Research and Markets ($2.8B), DataIntelo ($7.8B), and FutureDataStats ($12B) present incompatible estimates for
        the online live language tutoring market in 2024. Detailed methodology breakdowns for all three are paywalled.
      whyItMatters: >-
        The 4× spread makes penetration rate analysis and investment case sizing unreliable. Without resolved scope
        boundaries, Preply's stated TAM and SAM claims cannot be independently anchored.
      diligencePath: >-
        Commission or access a primary-source analyst report with explicit scope definitions covering 1-on-1 online
        language tutoring. Alternatively, construct a bottom-up SAM from tutor-session economics.
      relatedTableRefs:
        - T202
    - type: missing-source
      severity: minor
      topic: Conversion rate from 1.8 billion language learners to addressable paying customers
      missingEvidence: >-
        No independent source quantifies the share of the 1.8 billion language learner population that is willing and
        able to pay for live 1-on-1 online tutoring. The gap between total learners and paying addressable market is
        unquantified.
      whyItMatters: >-
        The 1.8 billion learner figure is cited as a market opportunity signal, but the true addressable paying market
        may be 1–5% of that, substantially narrowing the TAM narrative.
      diligencePath: >-
        Request from Preply management their internal estimate of total addressable paid learners and the conversion
        funnel from free to paid. Cross-check against consumer willingness-to-pay studies for online education.
      relatedQuestionRefs:
        - RQ228
    - type: enumeration-incomplete
      severity: minor
      topic: Segment / Buyer Map — geographic and language-specific sub-segment omissions
      missingEvidence: >-
        The segment/buyer map covers only four primary segments. Geographic sub-segments (e.g., APAC corporate, LATAM
        consumer) and language-specific segments (e.g., Mandarin learners in North America, Spanish learners in Europe)
        are omitted due to insufficient public data.
      whyItMatters: >-
        Geographic and language-pair segmentation matters for TAM attribution and product-market fit in specific
        expansion markets.
      diligencePath: Request geographic revenue breakdown by region and top language pairs from management.
      relatedTableRefs:
        - T203
