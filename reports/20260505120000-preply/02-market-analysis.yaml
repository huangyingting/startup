company:
  name: Preply
chapter:
  number: 2
  title: Market Analysis
  summary: |
    Preply operates in the online live language tutoring segment, a $2.8–7.8B SAM within the broader
    $22–64B online language learning market. An estimated 1.8 billion people worldwide are actively
    learning a second language, providing a structural demand tailwind. The B2B corporate language
    training market ($7.8B in 2024 at 9.1% CAGR) is particularly attractive given its higher ACV
    and lower churn relative to the B2C consumer segment. Key growth drivers are globalization,
    AI-augmented learning, and corporate L&D investment. Key constraints are AI substitution risk
    from app-first rivals (Duolingo), structural learner churn in B2C, and enterprise procurement
    complexity. Analyst estimates for the online tutoring SAM range 4× across reports, reflecting
    genuine uncertainty about scope boundaries.
sections:
  - id: s-market-boundary
    title: Market Boundary and Scope
    body: |
      The global language learning industry spans a wide spectrum of delivery modes and spend
      categories. At the broadest level, the market includes offline classroom instruction at
      language schools and universities, self-study via textbooks and flashcard apps, self-paced
      digital apps (Duolingo, Babbel, Rosetta Stone), live online group classes, and live
      one-on-one online tutoring. Preply's core product sits firmly in the live one-on-one online
      tutoring segment, where a human tutor conducts real-time video sessions with an individual
      learner. This segment excludes asynchronous self-paced content, AI-only chatbot practice, and
      offline classroom instruction.

      Adjacencies include general online tutoring platforms covering all academic subjects, corporate
      e-learning suites, language assessment and certification services (TOEFL, IELTS prep), and
      professional communication coaching. Status-quo substitutes for Preply's value proposition
      include offline language schools, university language departments, self-directed study with
      textbooks, and free or low-cost self-paced apps. The relevant included spend is learner-paid
      or employer-paid fees for live, instructor-led language sessions. Excluded spend is everything
      that does not involve real-time human tutor interaction: app subscriptions, asynchronous video
      lessons, and traditional classroom tuition.
    claimRefs:
      - C047
      - C048
      - C049
      - C050
  - id: s-market-sizing
    title: 'Market Sizing: TAM, SAM, and SOM'
    body: |
      Market sizing for online language learning varies substantially across analyst reports due
      to differences in scope definitions, geographic coverage, and methodology. At the broadest
      level, Meticulous Research values the global language learning market (all modes, all
      geographies) at $64.3B in 2024, growing at a 12.5% CAGR to $227B by 2035. GM Insights
      places the same market at $85.1B in 2025 at a 22.9% CAGR. HolonIQ's 2021 projection
      targeted $115B by 2025 for the D2C segment; realized 2025 actuals are not publicly available
      to validate this forecast.

      Narrowed to digital-only delivery, Grand View Research estimates the online language learning
      market at $22.1B in 2024, growing at 16.6% CAGR to $54.8B by 2030. Within this, the live
      online tutoring sub-segment is more tightly bounded: Research and Markets reports $2.8B in
      2024 (18.6% CAGR to $7.9B by 2030) for 1-on-1 and group live tutoring, while DataIntelo
      estimates the same live-tutoring category at $7.8B in 2024 using a broader definition that
      includes hybrid offline channels. Market.us estimates EdTech for language learning specifically
      at $11.7B in 2024. The 4× spread between $2.8B and $12B in SAM estimates makes precise
      penetration analysis impossible without access to proprietary data.

      The corporate online language learning sub-segment (Preply's B2B angle) is separately
      estimated by Verified Market Reports at $10.5B in 2024 with 8.2% CAGR, and by Growth Market
      Reports at $7.8B in 2024 for corporate language training overall at 9.1% CAGR. Preply's
      own revenue is not publicly disclosed; the most recent Sacra estimate put 2021 revenue at
      $50M. No third-party verified figure for 2024–2025 revenue is available, making SOM
      calculation speculative without access to private financials.
    claimRefs:
      - C051
      - C052
      - C053
      - C054
