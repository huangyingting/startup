  - id: sec-6-2
    title: Adoption Trajectory and Market Reach
    body: |
      Preply's aggregate platform reach is anchored by official company disclosures and
      third-party traffic analytics. The platform reports 100,000+ tutors, 300,000+ 5-star
      tutor reviews, and learners across 180 countries. Monthly web visits reached
      approximately 25 million as of March 2026 (Semrush), placing Preply in the top tier of
      global language learning platforms. The United States accounts for 17–19% of total
      traffic (~4.7–4.8 million visits/month), making it the largest single-country market.
      Other material markets include the United Kingdom (5–6%), Spain (5.9–7.2%), Poland
      (3.8–5.2%), and Italy (~4.5%), underscoring a predominantly English-speaking and
      Western European learner base.

      Mobile adoption is strong: the Preply Android app has 5M+ installs with a 4.7/5
      rating from 56,300+ reviews on Google Play; the iOS app carries a 4.8/5 rating with
      40,000+ App Store ratings. Direct traffic constitutes approximately 66% of all web
      visits, signaling a highly brand-aware and returning user base rather than one that
      relies purely on paid acquisition. A 2023 shift to value-based Google Ads bidding
      targeting high-lifetime-value learners yielded a 25% increase in global conversion
      value year-on-year and a 10% reduction in cost per acquisition — an explicit strategic
      pivot from learner volume to learner quality.

      Programmatic SEO is a material organic acquisition engine: Preply maintains over 1,000
      search-optimized pages across 50+ languages, generating millions of organic monthly
      visits. A 2024 Animalz case study documented the challenges of sustaining growth from
      this baseline and Preply's response — a persona-focused SEO expansion targeting
      adjacent audiences (expats, business professionals) beyond bottom-of-funnel learners
      seeking explicit lesson pages. The Axios-published CEO interview (September 2025)
      confirmed the platform serves 100,000+ tutors and learners in 180 countries, with
      students progressing 3x faster than industry norms.
