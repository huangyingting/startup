  - id: sec-6-3
    title: Named Customer Proof — B2B Deployments and B2C Outcomes
    body: |
      Preply's named customer evidence base spans documented enterprise deployments and a
      third-party efficacy study for B2C outcomes.

      On the B2B side, Delivery Hero (global food delivery platform, Berlin) is the
      best-documented case: an active partnership of 2+ years with 631 employees enrolled in
      Preply Business as of 2024. Philip Schiele, Learning & Development Specialist at
      Delivery Hero, confirmed exponentially growing participation and "very positive"
      employee feedback on cross-cultural integration. The partnership was structured around
      the employee L&D budget, offering English and German training as a flexible benefit.
      Genesys Informatica reported 72% of employees experienced a positive impact on their
      professional work. Music AI documented that more than 90% of employees improved their
      language skills. Toyota Material Handling Polska used Preply Business to address
      employee speaking barriers. Miro's People Programs Specialist Yulia cited Preply's
      multi-timezone flexibility and industry-specialized tutors as "essential for our global
      business." Unilever and Datadog are cited in multiple press sources as enterprise
      customers, reflecting Preply's shift toward high-retention recurring corporate
      contracts. All listed accounts are described as production deployments, not pilots.

      On the B2C side, the 2025 LeanLab Education study — an independent nonprofit research
      organization — enrolled 67 Spanish-speaking adult learners in a 12-week English
      program on Preply. Results: 1 in 3 learners improved their CEFR level; learners
      progressed at 3x the standard rate (24–48 tutor hours vs. the typical 160–240 hours
      per CEFR level). After 24+ lessons: 97% felt confident speaking English; 94% felt
      more fluent; 96% attributed success to the human tutor. These results were published
      by Preply via PR Newswire in September 2025 and independently covered by EdTech
      Innovation Hub. Note: the study was conducted in partnership with Preply; independent
      replication has not been publicly documented.
