  - id: T605
    title: Expansion Drivers and Concentration Risk Assessment
    columns:
      - Expansion Driver / Concentration Risk
      - Type
      - Impact
      - Diligence Path
    rows:
      - - B2B land-and-expand (department to enterprise)
        - Expansion driver
        - High — Delivery Hero case shows 2+ year exponential growth; 200+ new U.S. enterprise orgs/year
        - Request average account expansion multiple year-1 to year-2 and year-3
      - - B2C trial-to-subscription conversion
        - Expansion driver
        - Medium — 100% satisfaction guarantee on trial lesson reduces first-purchase friction
        - Request trial conversion rate and payback period by geography
      - - AI tools increasing learner-tutor session frequency
        - Expansion driver
        - Medium — Daily Exercises and Lesson Insights designed to maintain between-lesson engagement
        - Request change in avg lessons/month per active learner since AI tool launch (2024–2025)
      - - High-value learner strategy (Google Ads value-based bidding)
        - Expansion driver
        - High — 25% YoY conversion value growth, 10% CPA reduction (2023 data)
        - Request 2024–2025 update to Google Ads value metrics; confirm LTV growth trend
      - - B2C individual learner concentration
        - Concentration risk
        - Low — hundreds of thousands of individual learners globally; no single user > material share
        - Confirm no affiliate or influencer channel drives disproportionate single-source acquisition
      - - B2B customer concentration
        - Concentration risk
        - Low to unknown — 2,000+ diverse clients; no single account publicly described as dominant
        - Request top-10 customer revenue concentration; confirm no single account > 5% of B2B ARR
      - - Tutor supply quality risk (high-wage markets)
        - Concentration risk (supply-side)
        - >-
          Medium — tutors from US/UK report commission economics unsustainable; risk of native-speaker tutor attrition
          at premium end
        - Request tutor retention cohort data by hourly rate band; review attrition for tutors earning >$30/hr
      - - B2B procurement friction and LMS integration gap
        - Expansion blocker
        - Medium — SSO/SCIM provided but deeper LMS connector ecosystem not documented
        - Confirm LMS integrations (Workday Learning, SAP SuccessFactors, Cornerstone) and CRM/HRIS hooks
    notes: >-
      Revenue concentration at top B2B accounts is not publicly disclosed. Tutor-side supply risk represents an indirect
      customer-experience risk rather than a direct revenue-concentration risk.
