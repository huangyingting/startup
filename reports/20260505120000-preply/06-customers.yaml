callouts:
  - calloutType: strength
    title: High Trustpilot Score with Broad Coverage
    body: |
      4.3/5 across 21,500+ Trustpilot reviews (April 2026) reflects broad, sustained
      learner satisfaction at scale. Combined with 300,000+ 5-star tutor reviews on-platform
      and strong App Store ratings (iOS 4.8/5; Android 4.7/5), the consumer satisfaction
      signal is positive and hard to fabricate at this volume.
    claimRefs:
      - C224
      - C236
  - calloutType: strength
    title: B2B Land-and-Expand Evidence Is Tangible
    body: |
      Delivery Hero's 2+ year partnership with exponential employee enrollment growth is
      the strongest external validation of Preply Business's land-and-expand capability.
      Combined with 200+ new U.S. enterprise partners in 12 months, B2B expansion
      momentum is well-evidenced relative to typical pre-IPO edtech disclosures.
    claimRefs:
      - C231
      - C242
  - calloutType: strength
    title: Third-Party Efficacy Study Supports Outcomes Claims
    body: |
      The 2025 LeanLab Education study provides independently designed (nonprofit evaluator)
      evidence of learner outcomes at 3x the standard CEFR progression rate. While
      conducted in partnership with Preply, the LeanLab nonprofit credential and EdTech
      Innovation Hub coverage add credibility beyond pure marketing.
    claimRefs:
      - C218
      - C222
  - calloutType: risk
    title: NRR and Cohort Retention Are Entirely Private
    body: |
      Neither Net Revenue Retention, Gross Revenue Retention, B2C churn rates, nor B2B
      contract renewal rates are publicly disclosed. Without cohort data, it is impossible
      to distinguish durable learning adoption from short-term trial usage. This is a
      blocking diligence gap for any valuation model dependent on the recurring-revenue
      thesis.
    claimRefs:
      - C214
      - C217
  - calloutType: risk
    title: Billing and Customer Service Adverse Signals Are Persistent
    body: |
      PissedConsumer's 1.5/5 average and BBB complaint filing patterns consistently cite
      auto-renewal surprises, refund delays, and AI-automated customer service as primary
      pain points. These complaints represent a churn-acceleration risk, especially for
      B2C learners who are not on employer-sponsored plans and lack the contractual
      commitment of B2B accounts.
    claimRefs:
      - C237
      - C238
  - calloutType: assumption
    title: B2B Revenue Share Assumed Growing but Unverified
    body: |
      Multiple sources describe Preply's B2B pivot as strategically important for
      recurring revenue durability, and The Recursive notes investor preference for
      recurring B2B contracts. However, the exact share of total revenue attributable
      to Preply Business is not disclosed. If B2B remains below 30% of total revenue,
      the recurring-revenue narrative is materially overstated.
    claimRefs:
      - C234
