  evidenceGaps:
    - type: private-evidence-only
      severity: blocking
      topic: Net Revenue Retention (NRR) and cohort churn data
      missingEvidence: >-
        Preply does not publicly disclose NRR, GRR, B2C subscriber churn rate, or B2B contract renewal rate. No proxy in
        public sources allows reliable estimation.
      whyItMatters: >-
        Without retention cohort data, the recurring-revenue thesis underpinning Preply's $1.2B Series D valuation
        cannot be independently verified. This is the single most material evidence gap in the customers chapter.
      diligencePath: >-
        Request from Preply management: (a) B2B NRR by annual cohort, (b) B2C 28-day plan auto-renewal rate, (c)
        voluntary B2C cancellation rate by learner vintage, (d) B2B contract renewal rate by account size.
      relatedQuestionRefs:
        - RQ611
        - RQ619
    - type: private-evidence-only
      severity: material
      topic: Active learner count not publicly disclosed
      missingEvidence: >-
        Preply does not disclose the count of active learners (defined as those who completed at least one lesson in the
        past 30 or 90 days). The 25M monthly web visits and 5M+ Android installs are traffic/install proxies, not active
        learner counts.
      whyItMatters: >-
        Active learner count is the key denominator for retention rate, ARPU, and LTV calculations. Without it,
        per-learner economics cannot be estimated from public sources.
      diligencePath: >-
        Request active learner MAU/WAU by segment (B2C vs B2B employee); request average sessions per active learner per
        month.
      relatedQuestionRefs:
        - RQ602
    - type: private-evidence-only
      severity: material
      topic: B2B revenue share as percentage of total revenue
      missingEvidence: >-
        The share of Preply's total revenue attributable to Preply Business is not publicly disclosed. Press sources
        describe B2B as strategically important but no financial split is available.
      whyItMatters: >-
        If B2B accounts for less than 20–25% of total revenue, the high-retention recurring-revenue narrative is
        partially undermined and the B2C churn risk dominates the valuation picture.
      diligencePath: >-
        Request B2B ARR as a share of total ARR; confirm revenue classification methodology (subscription vs
        transactional per segment).
      relatedQuestionRefs:
        - RQ615
    - type: missing-source
      severity: material
      topic: B2B customer concentration (top account revenue share)
      missingEvidence: >-
        No public source discloses whether any single B2B enterprise account represents a disproportionate share of
        Preply Business ARR. 2,000+ clients suggests diversification, but specific concentration data is unavailable.
      whyItMatters: >-
        Concentration in 2–3 large accounts (e.g., Unilever, Datadog) would introduce churn risk for B2B ARR if any
        single contract is not renewed.
      diligencePath: Request top-10 B2B customer revenue share; confirm no single account exceeds 5–10% of B2B ARR.
      relatedQuestionRefs:
        - RQ615
    - type: missing-source
      severity: material
      topic: Independent replication of LeanLab efficacy study
      missingEvidence: >-
        The 2025 LeanLab study was conducted in partnership with Preply. No independent (non-partner) academic or
        institutional replication of the 3x CEFR progress claim has been identified in public sources.
