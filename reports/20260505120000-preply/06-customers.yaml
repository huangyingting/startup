figures:
  - id: F601
    title: Preply Customer Journey Map
    type: journey-map
    layout: wide
    summary: |
      Illustrates the end-to-end journey for both B2C individual learners and B2B enterprise
      buyers, from discovery through to expansion, highlighting AI touchpoints and retention
      levers at each stage.
    data:
      items:
        - label: B2C — Discovery
          description: Organic search (1,000+ SEO pages, 50+ languages), App Store, direct brand recall
          note: ~66% of visits are direct, signaling high brand awareness
        - label: B2C — Onboarding
          description: Language level assessment, tutor profile browse, trial lesson (100% satisfaction guarantee)
          note: Trial lesson is the primary B2C conversion gateway
        - label: B2C — Activation
          description: First paid subscription (1–8 lessons/week on 28-day plan); personalized lesson plan created
          note: Tutor-learner match is the core product differentiator
        - label: B2C — Retention & AI engagement
          description: Lesson Insights (AI summaries), Daily Exercises (AI practice), Scenario Practice (AI coach)
          note: Between-lesson AI tools designed to reduce churn by maintaining engagement
        - label: B2C — Expansion
          description: Additional language add-on, plan upgrade, employer-sponsored enrollment into Preply Business
          note: B2C-to-B2B cross-sell via employer sponsorship is a documented expansion path
        - label: B2B — Evaluate & Contract
          description: Outbound SDR / CRO outreach or inbound demo; enterprise contracting with L&D / HR
          note: Dedicated onboarding expert; SSO/SCIM provisioning; goals alignment
        - label: B2B — Deploy & Activate
          description: Cohort enrollment by role/level; Corporate Dashboard activated for L&D managers
          note: Progress tracking provides ongoing visibility into skill gains
        - label: B2B — Expand
          description: Department-level adoption expands to enterprise-wide; additional languages or geographies
          note: 'Delivery Hero: exponential employee growth over 2+ year partnership'
    approximationNotes: >-
      Journey stages are inferred from Preply official product pages, case studies, and press sources. Conversion rates
      between stages are not publicly disclosed.
    claimRefs:
