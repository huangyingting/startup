  - id: sec-6-5
    title: Expansion Dynamics and Concentration Risk
    body: |
      Preply's expansion dynamics operate through two mechanisms: B2C learner upgrade
      (trial lesson to subscription, single-language to multi-language, consumer to Preply
      Business via employer-sponsored enrollment) and B2B land-and-expand (initial cohort
      enrollment at one team/department, growing to broader organizational uptake). The
      Delivery Hero case is the best evidence of B2B expansion: starting with early
      enrollment and reaching 631 active employees over 2+ years with "exponentially
      growing" participation — a textbook land-and-expand pattern.

      Concentration risk in the B2B segment appears low given 2,000+ corporate clients
      and no single account publicly described as outsized. The U.S. market adds 200+
      new organizational partners per year. Named accounts (Delivery Hero, Unilever,
      Datadog, Miro) are large enterprises but are cited as representative examples, not
      as the majority of revenue. The B2C segment is inherently diversified across
      hundreds of thousands of individual learners in 180 countries; no learner-level
      concentration risk is disclosed or apparent.

      Procurement friction remains a potential B2B expansion blocker: Preply Business
      requires dedicated onboarding, SSO/SCIM integration, and L&D budget allocation,
      which can extend sales cycles versus self-serve. The absence of LMS connector depth
      (beyond SSO/SCIM) may limit integration into enterprise learning stacks. On the
      B2C side, tutor supply quality at the high end is at risk if commission economics
      do not support retention of native-speaking tutors from high-wage countries, which
      could degrade the premium learner experience and increase voluntary churn.

      The B2B revenue share relative to total revenue is not publicly disclosed, making
      it impossible to assess the durability benefit quantitatively. This is a material
      diligence ask for investors evaluating the recurring-revenue thesis from Preply's
      Series D.
