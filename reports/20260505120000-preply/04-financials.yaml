  evidenceGaps:
    - type: private-evidence-only
      severity: material
      topic: Preply ARR, NRR, gross margin, and revenue for 2023-2025
      missingEvidence: >-
        No official ARR, net revenue retention, gross margin, or revenue figures have been published by Preply for any
        year after 2021.
      whyItMatters: >-
        These are the core underwriting metrics for a unicorn-stage investment. Without them, any financial model relies
        on analyst extrapolations with wide uncertainty bands and cannot confirm whether growth has sustained or whether
        margins have improved as expected.
      diligencePath: >-
        Request management accounts, board decks, and audited financials under NDA through the formal due-diligence
        process with WestCap and Preply CFO.
      relatedQuestionRefs:
        - RQ005
    - type: private-evidence-only
      severity: minor
      topic: Debt facility terms — interest rate and maturity for $28M July 2023 facility
      missingEvidence: >-
        The interest rate, maturity, covenants, and lender identity of the $28M debt component from the July 2023 Series
        C extension are not publicly disclosed.
      whyItMatters: >-
        Undisclosed debt terms limit the ability to model the company's true cost of capital, identify whether covenants
        restrict dividend or M&A activity, and understand refinancing risk at maturity.
      diligencePath: >-
        Review debt facility term sheet and loan agreement as part of legal due diligence; confirm with CFO whether EBRD
        or Horizon Capital provided the debt tranche.
      relatedQuestionRefs:
        - RQ016
    - type: private-evidence-only
      severity: minor
      topic: Revenue recognition policy for trial lesson commissions
      missingEvidence: >-
        No public accounting policy disclosure exists for how Preply recognises the 100% trial lesson commission —
        whether as deferred revenue upon lesson completion or as immediate recognition.
      whyItMatters: >-
        Recognition timing affects reported revenue and ARR calculations; deferred recognition would align with
        subscription accounting norms but is unconfirmed.
      diligencePath: >-
        Review audited financial statements or GAAP/IFRS accounting policy notes; request confirmation from finance team
        on revenue recognition methodology.
      relatedQuestionRefs:
        - RQ018
    - type: private-evidence-only
      severity: material
      topic: CAC, LTV, and payback period for B2C and B2B channels
      missingEvidence: >-
        Preply has not disclosed customer acquisition cost, lifetime value, or payback period for either its D2C or B2B
        segments.
      whyItMatters: >-
        CAC/LTV metrics are foundational to assessing capital efficiency and growth sustainability; their absence makes
        it impossible to independently verify the EBITDA-positive milestone's durability.
      diligencePath: >-
        Request channel-level marketing attribution data and cohort analysis showing CAC and LTV by acquisition year and
        segment from the Preply growth team.
    - type: private-evidence-only
      severity: material
      topic: Student cohort retention and churn rate curves
      missingEvidence: No cohort retention or NRR data has been publicly published by Preply for its consumer or enterprise segments.
      whyItMatters: >-
        In a subscription marketplace, churn curves directly determine LTV and steady-state revenue. Adverse community
        signals from tutors suggest episodic usage by many students, which would suppress NRR and limit scalable
        recurring revenue.
      diligencePath: >-
        Request monthly cohort retention curves (months 1–24) and NRR by segment; validate against tutor-side booking
        frequency data from the platform.
    - type: enumeration-incomplete
      severity: minor
      topic: Full Series D investor roster and respective equity stakes
      missingEvidence: >-
        The complete list of all LP participants in the January 2026 Series D is not publicly disclosed beyond WestCap
        (lead), EBRD ($20M equity tranche), and Horizon Capital (existing).
      whyItMatters: >-
        Understanding the full cap table and ownership concentration affects governance analysis and future liquidity
        options.
      diligencePath: >-
        Review Series D term sheet, cap table, and shareholders' agreement to identify all participating investors and
        their post-money ownership percentages.
      relatedTableRefs:
        - T403
