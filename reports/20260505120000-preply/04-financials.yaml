  - id: financial-verdict
    title: Financial Verdict
    body: |
      Preply presents a financially credible growth story with meaningful structural positives: a
      subscription-based billing model that enhances revenue predictability, a B2B enterprise segment
      growing at 230%+ that should improve blended margins, EBITDA-positive milestone validating
      capital efficiency, and $299M in total funding from institutional investors (WestCap, EBRD,
      IFC, Horizon Capital). The marketplace model carries inherently high gross margins compared to
      content-driven EdTech, as Preply does not create proprietary curriculum but instead monetises
      the discovery and booking layer.

      Diligence blockers are material. Preply has disclosed no ARR, NRR, gross margin, cohort retention
      curve, or CAC/LTV since the 2021 Sacra estimate—the equivalent of a Series D unicorn operating
      with pre-Series A disclosure norms. The $28M 2023 debt facility has undisclosed terms. The
      concentration of R&D operations in war-affected Kyiv creates operational continuity risk that
      is under-quantified in public materials. Student-side churn evidence from tutor forums suggests
      many learners are episodic rather than subscription-committed, which would pressure NRR.

      At $1.2B valuation and an estimated 8–12x revenue multiple, Preply is priced in line with
      high-growth edtech comps such as Duolingo (12x public market multiple) but depends heavily on
      continued EBITDA improvement and B2B contract growth to justify the premium. The financial
      verdict is cautiously constructive: the business model is sound and the trajectory compelling,
      but the evidence gaps preclude high-confidence underwriting without access to private management
      accounts and the full capital-structure detail.
    claimRefs:
      - C023
      - C033
      - C034
      - C035
      - C038
