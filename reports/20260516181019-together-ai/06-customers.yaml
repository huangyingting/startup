schemaVersion: report-v2
artifact: customers
slug: together-ai
runDate: '2026-05-16'
company:
  name: Together AI
chapter:
  number: 6
  title: Customers
  summary: >-
    Together AI describes a developer-led customer base — over 100,000 self-serve developers per company claim —
    anchored by named enterprise and startup deployments including Salesforce, Zoom, Pika, Arcee, Nous Research,
    Cartesia, Washington University, and the NVIDIA GTC 2025 cohort. Adoption pattern is self-serve developer signup
    then enterprise expansion via Salesforce co-sell and Startup Accelerator. Retention/NRR, top-10 concentration, and
    named-deployment counts beyond the customers page are undisclosed; reviews on G2 and Trustpilot are sparse, and
    adverse signals are limited but exist around occasional latency complaints on Hacker News and Reddit.
sections:
  - id: section-1
    title: Customer segmentation and adoption surface
    body: >-
      Together AI's customer base is segmented by buyer/user role and by deployment intensity. The top of the funnel is
      self-serve developers using serverless inference for prototyping or low-volume production: per company disclosure,
      more than 100,000 developers have used the platform since GA. Beneath that sit named startup customers — Pika
      (video), Arcee (open-source merging), Nous Research (community models), Cartesia (voice) — who run production
      workloads via a mix of serverless and dedicated endpoints. The enterprise tier is anchored by Salesforce
      (referenced via Salesforce Ventures co-sell and a customer case study), Zoom (customer case study), and Washington
      University (research deployment); the NVIDIA GTC 2025 Pioneers programme surfaced an additional cohort of
      customers including healthcare, robotics, and developer-tools companies. The Startup Accelerator (launched
      2024-11) is an explicit funnel for early-stage AI startups, providing credits, technical support, and GTM
      amplification. Geographic mix is North America-skewed with EU presence growing through dedicated clusters;
      vertical mix spans developer tools, content/media (video, voice, image), enterprise SaaS, healthcare, and
      academia. Payer/user/buyer split varies by tier: in self-serve the developer is both buyer and user; in enterprise
      the buyer is typically a CTO/CIO or platform-engineering lead while the users are application teams. Customer
      segmentation, adoption-trajectory and named-customer-proof tables below capture each row's evidence quality and
      the residual gap on retention and concentration.
    claimRefs:
      - CU001
      - CU002
      - CU003
      - CU004
      - CU005
      - CU006
      - CU007
      - CU008
      - CU009
      - CU010
      - CU011
    tableRefs:
      - TU001
      - TU002
    figureRefs:
      - FU001
      - FU002
  - id: section-2
    title: Named-customer proof and durability
    body: >-
      Named-customer proof spans seven public case studies (Salesforce, Zoom, Pika, Arcee, Nous Research, Cartesia,
      Washington University) plus the GTC 2025 Pioneers cohort and the Adaption healthcare partnership. Each case study
      documents the customer's workflow, model used, and qualitative outcome; quantitative outcomes (throughput,
      latency, cost, ROI) are documented for some but not all deployments. The most-cited outcomes are
      FlashAttention-driven latency reduction (Pika, Cartesia), cost reduction versus closed APIs (Arcee, Nous), and
      integration depth (Salesforce, Zoom). Production vs pilot is explicit for Salesforce, Zoom, Pika, Cartesia
      (production); Adaption is described as a launching partnership rather than a confirmed production deployment.
      Adverse and durability signals are mixed: G2 and Trustpilot review counts are low, limiting independent retention
      proxy; Reddit and Hacker News threads occasionally cite latency or cold-start concerns on serverless tier; no
      public churn announcement or terminated-customer report has been published. The customer proof matrix below tags
      each named customer with evidence quality, outcome specificity, retention visibility, and production maturity.
      Retention and repeat-usage primitives (NRR, GRR, gross retention) are not disclosed, and the chapter records that
      gap as a material evidence gap with a concrete diligence ask. Reference-quality and freshness are best for the
      2024-2025 case studies (Salesforce, Zoom, Pika) and weaker for older case studies that have not been updated in
      2026.
    claimRefs:
      - CU012
      - CU013
      - CU014
      - CU015
      - CU016
      - CU017
      - CU018
      - CU019
      - CU020
      - CU021
      - CU022
      - CU023
      - CU024
      - CU025
      - CU026
    tableRefs:
      - TU003
      - TU004
    figureRefs:
      - FU003
  - id: section-3
    title: Expansion, concentration, and adverse signals
    body: >-
      Expansion proxies are mostly qualitative. The Salesforce Ventures co-sell relationship is the principal enterprise
      expansion lever, with the Series B led by Salesforce Ventures interpreted by the market as a multi-year channel
      commitment; NVIDIA GTC 2025 Pioneers and the Startup Accelerator add brand and pipeline. The HuggingFace
      partnership funnels developers from the model hub into Together. Concentration risk is impossible to bound
      precisely without management disclosure, but the public customer mix is skewed toward AI-native startups and
      developer-tools companies rather than a small number of mega-enterprise contracts, which suggests broader
      top-of-funnel diversification than e.g. an OpenAI-style anchor-customer model. Channel and procurement friction is
      documented on the dedicated tier: enterprise sales cycles require sales engagement, custom MSAs, and security
      review, which adds 60-120 days before revenue. Adverse signals include scattered Reddit and Hacker News threads
      citing latency, cold-start, or occasional reliability events on the serverless tier; the company maintains a
      public status page but does not publish an SLA percentage. No public lawsuit, lost-customer report, or
      named-account churn has surfaced through the runDate. The expansion-and-concentration table below records each
      expansion driver, concentration risk, impact magnitude, and the precise diligence path required to close the
      residual gap; the chapter's retention table treats every undisclosed primitive as a diligence ask rather than
      asserting a number that cannot be sourced. Overall the customer evidence base is consistent with a growth-stage
      inference platform building real enterprise traction on top of a strong self-serve developer flywheel.
    claimRefs:
      - CU027
      - CU028
      - CU029
      - CU030
      - CU031
      - CU032
      - CU033
      - CU034
      - CU035
      - CU036
      - CU037
    tableRefs:
      - TU005
    figureRefs:
      - FU004
