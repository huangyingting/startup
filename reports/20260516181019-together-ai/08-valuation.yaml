schemaVersion: report-v2
artifact: valuation
slug: together-ai
runDate: '2026-05-16'
company:
  name: Together AI
chapter:
  number: 8
  title: Valuation
  summary: >-
    Investment recommendation is Hold/Monitor with medium confidence — Together AI shows credible product-technology
    depth (FlashAttention, ThunderKittens, MoA), enterprise traction (Salesforce, Zoom, NVIDIA GTC 2025), and capital
    backing (>$500M cumulative across seed/A/B), but its Series B valuation (~$3.3B-$3.5B per public reporting) requires
    multi-year revenue scale-up against intensifying competition from Fireworks, Replicate, Modal, hyperscaler
    inference, and from Cerebras/Groq on the speed axis. Bull case (>$8B-$10B exit) requires multi-billion ARR +
    sustained moat from Together Inference Engine; base case ($4B-$6B) requires Hopper→Blackwell capacity build-out and
    Salesforce co-sell pull; bear case ($1B-$2B) materialises if hyperscaler price competition, NVIDIA allocation cuts,
    or copyright precedent fire. Final diligence asks centre on revenue, retention, top-10 concentration, GPU
    committed-spend, and CFO/CRO recruiting.
sections:
  - id: section-1
    title: Recommendation, thesis, and anti-thesis
    body: >-
      The recommendation is Hold/Monitor with medium confidence and a medium-high risk rating. Investment thesis:
      Together AI sits at a structurally attractive intersection of (a) the GenAI inference market expanding 40-60% CAGR
      per analyst-market-data sources (Gartner, Forrester, IDC, a16z, Bessemer, Menlo), (b) a credible technical moat
      through FlashAttention authorship (Tri Dao), ThunderKittens kernels (Stanford HazyResearch), Together Inference
      Engine v2, and Mixture-of-Agents productisation, and (c) an enterprise distribution channel anchored by Salesforce
      Ventures co-sell, NVIDIA GTC 2025 Pioneers, and the Startup Accelerator funnel. Anti-thesis: the inference layer
      is contested by Fireworks, Replicate, Modal, Anyscale, Cerebras, Groq, and hyperscalers (AWS Bedrock, GCP Vertex,
      Azure OpenAI Service) who bundle inference into existing enterprise contracts; revenue (reported $130M-$200M+ ARR
      per The Information) and retention primitives remain undisclosed; valuation at the Series B mark (~$3.3B-$3.5B)
      requires multi-year revenue scale to underwrite a 3-5x exit; and the regulatory perimeter (EU AI Act, BIS,
      copyright litigation precedent) is tightening through 2027. The valuation chapter records each of these as an
      explicit thesis-break trigger and pairs it with a monitorable threshold and an action implication. The
      recommendation summary table below pairs recommendation, confidence, risk rating, valuation stance, and decision
      implication; the thesis / anti-thesis table records the underlying arguments and what would change the view.
    claimRefs:
      - CV001
      - CV002
      - CV003
      - CV004
      - CV005
      - CV006
      - CV007
      - CV008
      - CV009
      - CV010
      - CV011
      - CV012
      - CV013
      - CV014
      - CV015
      - CV016
      - CV017
    tableRefs:
      - TV001
      - TV002
    figureRefs:
      - FV001
  - id: section-2
    title: Scenarios, comparables, and sensitivity
    body: >-
      Three scenarios anchor the valuation. Base case ($4B-$6B exit, ~50% probability) assumes ARR scales from current
      $130M-$200M to $500M-$700M over 2026-2028 with sustained gross margin in the 30-40% range typical of AI inference,
      modest dilution at a Series C, and Hopper→Blackwell capacity ramp on time. Bull case ($8B-$12B exit, ~25%
      probability) requires ARR >$1B by 2028, gross margin expansion through FlashAttention-driven utilisation,
      sustained Salesforce + NVIDIA channel commitment, and either a strategic acquisition (NVIDIA, hyperscaler,
      Salesforce) or a 2027-2028 IPO at premium multiples. Bear case ($1B-$2.5B outcome, ~25% probability) materialises
      if hyperscaler bundled inference compresses pricing, NVIDIA allocation tightens, or copyright precedent extends to
      platform hosts. The comparable-valuation table covers CoreWeave (post-IPO GPU-cloud comparable), Navan (recent S-1
      SaaS comparable), Figma (S-1 comparable), and private rounds (Fireworks rumoured $4B, Replicate, Modal, Sakana,
      Mistral, Anthropic) plus public listings (NVIDIA, Snowflake) used as ceiling references. Sensitivity drivers are
      revenue growth, gross margin, NRR, exit multiple, and probability-weighted exit window. The bull/base/bear table
      and comparable-valuation table below capture each scenario's assumptions, valuation logic, and key sensitivity.
      The valuation-sensitivity bar figure and the valuation-range figure show downside, base, and upside vs the current
      Series B mark.
    claimRefs:
      - CV018
      - CV019
      - CV020
      - CV021
      - CV022
      - CV023
      - CV024
      - CV025
      - CV026
      - CV027
