      - - 'Anti: hyperscaler bundled inference (AWS Bedrock, GCP Vertex, Azure) compresses pricing'
        - Hyperscaler retreats from bundled inference
      - - 'Anti: GenAI copyright litigation could extend to platform hosts'
        - Adverse precedent contained to model-trainer defendants
      - - 'Anti: revenue + retention undisclosed; price-sensitive entry discipline required'
        - Management discloses ARR + NRR
    notes: Thesis and anti-thesis are symmetric; the chapter is explicit on what evidence would flip the view.
