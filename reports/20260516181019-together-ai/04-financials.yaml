callouts:
  - calloutType: strength
    title: Strategic capital stack
    body: >-
      Salesforce Ventures + NVIDIA + Coatue + Prosperity7 is a rare quadrant of strategic anchors that simultaneously
      supports enterprise GTM, GPU supply, public-market signaling, and sovereign optionality — uncommon for a
      sub-$1B-revenue private company.
    claimRefs:
      - CI005
      - CI006
      - CI007
      - CI008
  - calloutType: risk
    title: Disclosure asymmetry
    body: >-
      The absence of audited ARR, gross margin, and customer-concentration disclosure is the principal underwriting
      risk; every quantitative claim about Together is derived from press around funding events or company
      self-reporting.
    claimRefs:
      - CI019
      - CI020
      - CI021
      - CI022
  - calloutType: assumption
    title: Margin assumption needs validation
    body: >-
      We assume serverless gross margin of 40–60% by analogy to CoreWeave and Fireworks public datapoints. This must be
      validated against management before any underwriting on unit economics.
    claimRefs:
      - CI024
      - CI025
  - calloutType: recommendation
    title: Request standard management deck
    body: >-
      Recommend requesting management to supply: ARR, gross margin by SKU, NDR, top-10 customer concentration,
      contracted vs uncontracted split, cash and runway, and cap table.
    claimRefs:
      - CI026
      - CI027
      - CI028
      - CI029
      - CI030
