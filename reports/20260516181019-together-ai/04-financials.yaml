runDate: '2026-05-16'
company:
  name: Together AI
chapter:
  number: 4
  title: Financials & Capital
  summary: >-
    Together AI is a private company with no public financial filings; cumulative disclosed primary capital is
    approximately $533M across Seed (May 2023, $20M), Series A (Nov 2023, $102.5M), a March 2024 extension (~$106M at
    $1.25B), and Series B (Jul 2024, $305M at $3.3B post-money). Third-party reporting around Series B implied a $100M
    annualised revenue pace and triple-digit growth; pricing is published per-token with a 50% batch discount and custom
    dedicated-endpoint pricing. Unit economics, gross margin, customer concentration, and cash runway are not publicly
    disclosed and are flagged as material diligence gaps.
sections:
  - id: section-1
    title: Funding history and capital stack
    body: >-
      Together AI has assembled approximately $533M of disclosed primary capital across four publicly announced rounds.
      The seed of $20M (May 2023) was led by Lux Capital with Factory, SciFi, Long Journey, and notable individual
      backers (Scott Banister, Jakob Uszkoreit, Aravind Srinivas). A $102.5M Series A in November 2023 was led by
      Kleiner Perkins with NVIDIA, Emergence, NEA, Prosperity7, and Greycroft. In March 2024 the company added
      approximately $106M at a reported $1.25B valuation (sometimes referred to as Series A2), then closed a $305M
      Series B in July 2024 led by Salesforce Ventures and Coatue at a $3.3B post-money valuation, with Lakestar,
      NVIDIA, and several strategics participating. No S-1, S-3, or registered offering appears on SEC EDGAR for
      Together Computer Inc. at the runDate, and no public secondary or 2026 extension has been confirmed. The capital
      stack therefore reads as venture-only with strategic anchors (NVIDIA for GPU supply, Salesforce Ventures for
      enterprise distribution, Prosperity7 for sovereign optionality); board control is split across KP, Coatue and Lux
      based on round-led signaling, but the cap table itself is not public. Cumulative dilution is undisclosed; founders
      are widely reported to retain a meaningful equity stake post Series B, but exact percentages are not in the public
      record and must be verified against management.
    claimRefs:
      - CI001
      - CI002
      - CI003
      - CI004
      - CI005
      - CI006
      - CI007
      - CI008
    tableRefs:
      - TI004
    figureRefs:
      - FI004
  - id: section-2
    title: Revenue, pricing, and reported scale
    body: >-
      Together has not filed financial statements. CNBC reporting around the July 2024 Series B cited a $100M annualised
      revenue pace; Bloomberg cited "triple-digit growth"; Fast Company and VentureBeat repeated those figures without
      independent verification. The Information has separately reported on 2025 revenue trajectory behind a paywall;
      PitchBook lists the company as later-stage venture without a confirmed 2025 follow-on. Pricing is published
      per-token on the public pricing page, ranging roughly $0.20–$0.90/M tokens for 7–70B open models, with a
      documented 50% batch-inference discount and custom dedicated-endpoint pricing quoted via sales. SKUs include
      serverless, dedicated/reserved endpoints, fine-tuning, batch, and embeddings; vision/audio/image SKUs are
      documented separately. There is no published ARR, segment split, customer concentration, NRR, or gross margin
      disclosure at the runDate. Forrester and IDC market frames imply Together is a growth-stage entrant in a
      multi-billion-dollar generative-AI inference TAM, but neither analyst names Together among its top three vendors.
      Management has acknowledged enterprise pipeline acceleration tied to Salesforce Ventures co-selling but has not
      quantified it. This combination of company-claimed momentum, third-party press anecdotes, and absent audited
      disclosure is consistent with private growth-stage SaaS, but creates significant diligence risk on realised vs
      list pricing, mix, and gross margin. The GTM motion is dominated by self-serve developer signup at the top of the
      funnel and partner-led enterprise expansion through Salesforce Ventures and NVIDIA channel referrals; sales-cycle
      length, CAC, and payback are undisclosed but can be inferred to be 60-120 days for enterprise dedicated contracts
      based on comparable inference-API vendor disclosures.
    claimRefs:
      - CI009
      - CI010
      - CI011
      - CI012
      - CI013
      - CI014
      - CI015
      - CI016
      - CI017
      - CI018
    tableRefs:
      - TI001
      - TI002
    figureRefs:
      - FI001
  - id: section-3
    title: Unit economics, capital adequacy, and gaps
    body: >-
      Together's public profile permits only rough unit-economics estimation. On the cost side, GPU-hour COGS scale with
      NVIDIA capex; CoreWeave's S-1 disclosures (a useful comparable) show GPU cloud gross margins in the 60–70% range
      on reserved deals and lower on on-demand. Per-token gross margin at Together's list pricing is plausibly 40–60% on
      serverless and higher on dedicated, but realised margin depends on utilisation and reserved-capacity contracts
      that are not public. On the cash side, $533M raised against an implied $300–$500M cash burn through 2024
      (consistent with hyperscale GPU buildout and a 150+ headcount) suggests runway into 2026, but no figure is
      confirmed. Capital adequacy depends on whether Together extends Series B or files for IPO; the Figma and CoreWeave
      2025 IPO precedents show the public-market window is open for AI-infrastructure issuers, while Navan's S-1 process
      is a closer growth-SaaS comparable. Gaps are material: ARR confirmation, gross margin by SKU, customer
      concentration top-10, net dollar retention, contracted vs uncontracted revenue, runway months, debt or vendor
      financing, and any sovereign-cloud commitments. These gaps drive the diligence ask list in the unit-economics and
      capital-adequacy tables and underpin a material evidence-gap entry for each undisclosed primitive; absent
      management disclosure, the most informative external signals are Together's public hiring posture, pricing-page
      revisions, and any 2026 secondary-market chatter, all of which should be tracked through the close of diligence.
      Working capital is unlikely to be a constraint at this scale of consumption-based SaaS; the bigger swing factor on
      cash is the pace of GPU capex relative to revenue ramp, which sets the cadence for the next round trigger. The
      verdict is that revenue quality and growth optics are strong but unverified; margin path is plausible but
      unaudited; capital intensity is high but underwritten by NVIDIA alignment; and the principal diligence blocker is
      the full set of private financial primitives enumerated in the public-financial-gaps table.
    claimRefs:
      - CI019
      - CI020
      - CI021
      - CI022
      - CI023
      - CI024
      - CI025
      - CI026
      - CI027
      - CI028
      - CI029
      - CI030
