callouts:
  - calloutType: insight
    title: Inference is the underwriting line
    body: >-
      Hyperscaler training capex grabs the headlines, but inference is what Together monetises today; the $8–15B 2026
      inference SAM is the gating market for our IRR model.
    claimRefs:
      - CM009
      - CM010
      - CM011
  - calloutType: risk
    title: Hyperscaler commoditisation
    body: >-
      AWS Bedrock and GCP Vertex Model Garden are aggressively adding open models. If they reach Together's per-token
      price/performance, the pure-inference SAM compresses meaningfully.
    claimRefs:
      - CM024
      - CM030
  - calloutType: strength
    title: Open-weight tailwind
    body: >-
      Every quarter brings stronger open models (Llama 3/4, DeepSeek, Qwen); Together captures volume each release
      because customers want neutral, weight-portable hosting.
    claimRefs:
      - CM021
      - CM022
  - calloutType: assumption
    title: Triangulated SAM uncertainty
    body: >-
      Inference SAM rests on hyperscaler quarterlies and Together's reported ARR; widening errors require
      sensitivity-testing in the valuation chapter.
    claimRefs:
      - CM010
      - CM012
      - CM013
