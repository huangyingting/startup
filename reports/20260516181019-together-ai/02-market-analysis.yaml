company:
  name: Together AI
chapter:
  number: 2
  title: Market Analysis
  summary: >-
    Together AI sells into the AI compute and inference platform market — a fast-growing segment of the broader cloud-AI
    infrastructure spend pool. Public sizing converges on a $40–60B 2024 AI infrastructure TAM growing 30–50% CAGR
    through 2028; the SAM most relevant to Together (open-model inference, fine-tuning, and dedicated GPU capacity) is
    on the order of $8–15B 2026 and dominated by enterprise developers, AI-native startups, and large model builders.
    Adoption is driven by GPU scarcity, open-weight model momentum, and price/performance pressure; constraints include
    sovereign data rules, energy/permitting bottlenecks, and the gravity of incumbent hyperscalers.
sections:
  - id: section-1
    title: Market boundary and adjacencies
    body: >-
      Together AI sits in the AI compute and inference platform layer of the modern cloud stack — between hyperscaler
      GPU IaaS (AWS, GCP, Azure), specialised GPU clouds (CoreWeave, Lambda, Crusoe), inference-API providers
      (Replicate, Fireworks, Groq, Modal), and closed-API model labs (OpenAI, Anthropic). The market we underwrite is
      the spend dedicated to running, fine-tuning, and serving open-weight or customer-owned foundation models, plus the
      dedicated and serverless GPU capacity used for AI workloads. Excluded from this market are general-purpose cloud
      compute, traditional ML platforms (Sagemaker training-only, classical scikit pipelines), and closed proprietary
      model APIs that do not host customer weights. Adjacencies include MLOps tooling (Weights & Biases, Anyscale),
      vector databases, and AI safety/observability vendors. Status-quo substitutes are self-hosted Kubernetes-on-GPU
      clusters and closed-API rentals from OpenAI/Anthropic, both of which trade flexibility for price and operational
      simplicity. We also explicitly exclude per-seat AI copilots (Copilot, Cursor) because the unit of demand is
      end-user seats rather than inference tokens, which means they sit one layer above Together in the application
      stack and procure rather than substitute for token-level inference.
    claimRefs:
      - CM001
      - CM002
      - CM003
      - CM004
      - CM005
      - CM006
    tableRefs:
      - TM001
  - id: section-2
    title: TAM/SAM/SOM and sizing lenses
    body: >-
      Multiple analyst sources converge on a 2024 AI infrastructure TAM of $40–60B with 30–50% CAGR through 2028
      (Gartner, IDC, McKinsey). Within that envelope, the inference and dedicated AI compute SAM most relevant to
      Together is sized at $8–15B in 2026 by triangulating: hyperscaler AI revenue disclosures ($26B annualised AWS
      Bedrock-equivalent revenue extrapolated), Series B coverage citing inference as the fastest-growing line, and the
      ~$100M Together ARR proxy implying a single-digit share of an early SAM. SOM (Together-addressable, near-term
      winnable spend) is on the order of $1–3B, focused on AI-native startups, model labs, and the Salesforce +
      sovereign-cloud channels Together has explicit relationships with. Sizing is constrained by the lack of
      disaggregated public reporting from hyperscalers and by the conflation of training capex with inference run-rate
      in many published estimates.
    claimRefs:
      - CM007
      - CM008
      - CM009
      - CM010
      - CM011
      - CM012
      - CM013
    tableRefs:
      - TM002
    figureRefs:
      - FM001
      - FM002
  - id: section-3
    title: Buyer, user, and payer segmentation
    body: >-
      Three primary buyer segments drive Together demand. (1) AI-native startups and model labs: technical founders or
      CTOs choose Together for FlashAttention-class inference latency, dedicated H100/H200 access, and open-weight
      flexibility; these are typically self-serve credit-card purchasers escalating to enterprise contracts. (2)
      Enterprise platform teams and applied-ML groups inside Fortune-500 companies: budget owners are CIOs/CTOs
      evaluating multi-model strategies, with procurement gates around data residency, SOC 2, and BAA support;
      Salesforce Ventures co-leadership of the Series B underwrites this segment. (3) Government, research, and
      sovereign-cloud customers: Prosperity7 (Aramco) and similar sovereign-aligned LPs signal a Middle East/APAC angle,
      and Together has positioned dedicated regional clusters as a differentiator. Users (developers, ML engineers,
      researchers) often differ from payers (finance, procurement, IT), which lengthens enterprise cycles but improves
      NRR once landed.
    claimRefs:
      - CM014
      - CM015
      - CM016
      - CM017
      - CM018
      - CM019
      - CM020
    tableRefs:
      - TM003
    figureRefs:
      - FM003
  - id: section-4
    title: Growth drivers and constraints
    body: >-
      Tailwinds: ongoing open-weight model proliferation (Llama 3/4, Mistral, DeepSeek, Qwen), GPU scarcity at
      hyperscalers, FinOps pressure to reduce per-token closed-API spend, and the agentic AI wave that multiplies
      token-volume per user. Headwinds: NVIDIA supply allocation favouring hyperscalers, sovereign data rules slowing
      cross-border inference, energy/permitting bottlenecks for new data centres, and competitive pricing pressure from
      Groq, Fireworks, and Cerebras at the inference layer. Adoption-timing risks include enterprise procurement
      friction, the possibility that hyperscalers commoditise the OSS-inference layer (AWS Bedrock open models, GCP
      Vertex Model Garden), and the volatile economics of training-vs-inference mix. Together's positioning depends on
      staying a generation ahead on inference kernels (FlashAttention 3/4, ThunderKittens) while expanding into
      reserved/dedicated SKUs that lock enterprise spend. Each driver and constraint feeds back into a binary question
      for IC: does the inference SAM compound at 35%+ for three more years, or does hyperscaler commoditisation pull
      growth forward into a single year of land-grab? Our base case assumes durable 30–40% CAGR through 2027 with
      widening competitive intensity from 2026 onward, which is the regime in which Together's open-source flywheel and
      dedicated-capacity differentiation produce the strongest IRR.
    claimRefs:
      - CM021
      - CM022
      - CM023
      - CM024
      - CM025
      - CM026
      - CM027
      - CM028
      - CM029
      - CM030
