slug: together-ai
runDate: '2026-05-16'
company:
  name: Together AI
chapter:
  number: 7
  title: Risks
  summary: >-
    Together AI sits at the intersection of GenAI regulatory exposure (FTC inquiry, EU AI Act, BIS export controls, NIST
    AI RMF), IP/copyright litigation precedent (NYT v OpenAI, Authors Guild, Getty v Stability), GPU and partner
    concentration (NVIDIA), and competitive displacement risk from Fireworks, Replicate, Modal, Anyscale, Cerebras,
    Groq, and hyperscaler inference. The chapter ranks risks across regulatory/legal, operational/security,
    partner/dependency, and people/execution registers, attaches mitigations or kill-criteria where public evidence
    exists, and surfaces every undisclosed control as a diligence ask.
sections:
  - id: section-1
    title: Regulatory and legal risk surface
    body: >-
      Together AI faces the same Generative-AI regulatory perimeter as all foundation-model platforms operating in the
      United States and Europe. In the US, the FTC opened a 6(b) study into generative-AI investments and partnerships
      in 2024 and has signalled broad antitrust scrutiny of cloud-AI relationships; the Biden / Trump-era Executive
      Order on AI established a foundation for federal AI standards that the NIST AI Risk Management Framework
      operationalises. The BIS has tightened export controls on advanced GPUs (A100, H100, H200, B200) and on the export
      of certain foundation-model weights, directly relevant to a GPU-cloud operator. In the EU, the AI Act entered into
      force in 2024 with phased obligations for general-purpose AI providers culminating in 2026-2027; the UK ICO and
      Australian OAIC have published GenAI guidance that creates de-facto compliance baselines. Privacy regimes (CCPA in
      California, HIPAA for healthcare workloads) impose contract-level obligations Together discharges via BAAs and SOC
      2 controls referenced on its trust center. On the litigation side, the NYT v Microsoft/OpenAI docket, Authors
      Guild v OpenAI, and Getty v Stability AI are the bellwether copyright cases whose outcomes will shape exposure for
      every model-hosting platform; Together itself is not currently a named defendant but its open-model hosting
      business carries adjacent exposure if precedent extends to platform-as-host. Civil-society pressure (CDT, EFF)
      adds reputational risk. The regulatory and legal risk register below ranks each line item by jurisdiction,
      likelihood, severity, mitigation, and residual exposure, with diligence asks for every undisclosed control.
    claimRefs:
      - CR001
      - CR002
      - CR003
      - CR004
      - CR005
      - CR006
      - CR007
      - CR008
      - CR009
      - CR010
      - CR011
      - CR012
      - CR013
      - CR014
      - CR015
      - CR016
      - CR017
    tableRefs:
      - TR001
    figureRefs:
      - FR001
  - id: section-2
    title: Operational, security, partner, and dependency risk
    body: >-
      Operational risk for Together centres on three vectors: GPU capacity availability (Hopper and Blackwell),
      model-serving reliability, and regulated-workload controls. NVIDIA is the dominant single-vendor dependency —
      GPUs, networking (NVLink, InfiniBand), and software stack (CUDA, TensorRT, NeMo, Dynamo) — and is also a strategic
      investor, which both reduces supply-allocation risk and concentrates correlated downside if Blackwell allocation
      tightens. HuggingFace is the primary model-artefact dependency; partner risk would emerge if HF changes hosting
      terms or commercial alignment. Salesforce Ventures is the lead enterprise channel partner via the Series B;
      channel concentration risk is non-trivial. Security exposure spans the standard model-cloud surface (prompt
      injection, data exfiltration, prompt-logging leakage, supply-chain compromise of model weights) and the SOC 2 /
      HIPAA control surface that Together publishes via its trust center. The public status page exists but does not
      publish an SLA percentage. Competitive displacement risk is real: Fireworks, Replicate, Modal, Anyscale, Cerebras,
      and Groq all serve overlapping workloads, and hyperscalers (AWS Bedrock, GCP Vertex, Azure OpenAI) bundle
      inference into existing enterprise contracts. People and execution risk includes key-person dependency on Vipul
      Ved Prakash (CEO), Ce Zhang (CTO), and Tri Dao (Chief Scientist), and the build-out velocity required to keep pace
      with Hopper→Blackwell→Rubin cadence. The operational, partner, and people registers below capture each failure
      mode, mitigation maturity, and residual exposure with explicit diligence paths.
    claimRefs:
      - CR018
      - CR019
      - CR020
      - CR021
      - CR022
      - CR023
      - CR024
      - CR025
      - CR026
      - CR027
      - CR028
      - CR029
      - CR030
      - CR031
      - CR032
      - CR033
    tableRefs:
      - TR002
      - TR003
      - TR004
    figureRefs:
      - FR002
  - id: section-3
    title: Mitigations, kill criteria, and thesis-break triggers
    body: >-
      The mitigation-and-kill-criteria table below pairs every top risk with a monitorable trigger, an explicit
      threshold or event, and the action implication if the trigger fires. Triggers span regulatory (e.g. EU AI Act GPAI
      obligation enforcement in 2027), litigation (e.g. adverse copyright ruling that extends to platform hosts),
      partner (e.g. NVIDIA allocation cut or HuggingFace hosting change), operational (e.g. multi-hour serverless
      outage, breach disclosure), competitive (e.g. hyperscaler bundled-inference pricing undercut), commercial (e.g.
      Salesforce co-sell churn), and execution (e.g. founder departure, missed Blackwell go-live). For each trigger the
      table records the transmission path into revenue, margin, financing, or valuation, and the action implication
      (kill, re-underwrite, monitor, accept). The chapter is explicit that several primitives — incident count, SLA,
      top-10 customer concentration, retention, GPU committed-spend, opex split — are undisclosed and therefore treated
      as diligence asks rather than asserting numbers that cannot be sourced. Adverse-source coverage is wide:
      regulatory bodies (FTC, BIS, EU, UK ICO, OAIC), legal dockets (CourtListener: NYT, Authors Guild, Getty),
      competitor websites (Fireworks, Replicate, Modal, Anyscale, Groq, Cerebras, CoreWeave, Lambda), and
      developer-sentiment fora (Hacker News, Reddit). The chapter underwrites that Together's public risk surface is
      normal for a growth-stage AI infrastructure company with a healthy mitigation posture, but several control
      primitives remain unverified pending management disclosure.
    claimRefs:
      - CR034
      - CR035
      - CR036
      - CR037
      - CR038
      - CR039
      - CR040
      - CR041
      - CR042
    tableRefs:
      - TR005
    figureRefs:
      - FR003
