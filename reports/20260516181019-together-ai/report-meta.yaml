companyProfile:
  summary: Together AI is a generative-AI cloud that runs serverless and dedicated inference, fine-tuning, and training across 200+ open and custom models, anchored by FlashAttention, ThunderKittens, and Together Inference Engine v2. The company combines a defensible technical research base with a Salesforce + NVIDIA channel and an open-source community surface.
  foundedDate: '2022-06-01'
  founders:
    - name: Vipul Ved Prakash
      role: CEO
      background: prior founder/CTO of Topsy and Topix.net; Twitter acquisition
      claimRefs: []
    - name: Ce Zhang
      role: CTO
      background: ETH Zurich / University of Chicago systems / ML faculty
      claimRefs: []
    - name: Tri Dao
      role: Chief Scientist
      background: Princeton CS faculty; author of FlashAttention
      claimRefs: []
    - name: Percy Liang
      role: co-founder
      background: Stanford CS / Center for Research on Foundation Models
      claimRefs: []
  foundingLocation: San Francisco, California, USA
  headquarters: San Francisco, California
  productSummary: Together AI sells serverless inference (per-token), dedicated endpoints (reserved GPU capacity), fine-tuning (LoRA + full), batch inference, embeddings, vision, audio, and image APIs across a 200+ open and custom model catalog, all OpenAI-compatible.
  customerFocus: Developers (self-serve), AI-native startups (Pika, Cartesia, Arcee, Nous Research), enterprise SaaS (Salesforce, Zoom), healthcare (Adaption), academia (Washington University), and NVIDIA GTC 2025 Pioneers cohort.
  businessModel: Usage-based serverless inference + committed dedicated capacity + fine-tuning + enterprise contracts; Salesforce Ventures co-sell and Startup Accelerator augment direct sales.
  stage: late-stage private
  fundingStatus: Privately funded; Series A $102.5M (Nov 2023, Kleiner Perkins led) and Series B $305M (Mar 2024, Salesforce Ventures led, ~$3.3B post-money per CNBC / Bloomberg / Fast Company); investors include NVIDIA, Coatue, Lux Capital, Prosperity7, General Catalyst.
  claimRefs: []
