              义务执法）、诉讼（如延伸到平台托管方的不利版权裁决）、伙伴（如 NVIDIA 分配削减或 HuggingFace
              托管变更）、运营（如无服务器推理多小时宕机、披露数据泄露）、竞争（如超大规模云厂商捆绑推理定价下压）、商业（如 Salesforce 联合销售流失）和执行（如创始人离职、Blackwell
              上线延期）。每个触发点都记录向收入、毛利、融资或估值传导的路径，以及动作含义（放弃、重估、监控、接受）。本章明确说明，多项基础指标——事故数、SLA、前 10 大客户集中度、留存、GPU
              承诺支出、运营支出拆分——均未披露，因此作为尽调问题处理，而不是断言无法溯源的数字。反向来源覆盖较广：监管机构（FTC、BIS、EU、UK
