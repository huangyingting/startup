      - number: '7.2'
        title: 运营、安全、伙伴与依赖风险
        blocks:
          - type: paragraph
            body: >-
              Together 的运营风险集中在三条线：GPU 资源供给（Hopper 和 Blackwell）、模型服务可靠性，以及受监管工作负载的控制。NVIDIA
              是最重要的单一供应商依赖——GPU、网络（NVLink、InfiniBand）和软件栈（CUDA、TensorRT、NeMo、Dynamo）都绕不开；它同时也是战略投资方，这降低了供给分配风险，也把下行情景集中到同一条链上：一旦
              Blackwell 分配收紧，冲击会高度相关。HuggingFace 是主要的模型制品依赖；如果 HF 调整托管条款或商业协同，合作伙伴风险会浮现。Salesforce Ventures 通过 B
              轮成为核心企业渠道伙伴，渠道集中度风险并不小。安全暴露覆盖标准模型云攻击面（提示词注入、数据外泄、提示词日志泄露、模型权重供应链被攻破），也覆盖 Together 在信任中心披露的 SOC 2 / HIPAA
              控制面。公开视频状态页存在，但不披露 SLA 百分比。竞争替代风险真实存在：Fireworks、Replicate、Modal、Anyscale、Cerebras 和 Groq
              都服务重叠工作负载；超大规模云厂商（AWS Bedrock、GCP Vertex、Azure OpenAI）则把推理捆进既有企业合同。人员与执行风险包括 Vipul Ved Prakash（CEO）、Ce
              Zhang（CTO）和 Tri Dao（首席科学家）的关键人依赖，以及必须跟上 Hopper→Blackwell→Rubin
              节奏的建设速度。下方运营、伙伴和人员风险台账逐项记录失效模式、缓释成熟度和剩余暴露，并给出明确尽调路径。
