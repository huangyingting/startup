      - number: '3.3'
        title: 护城河耐久度与竞争风险
        blocks:
          - type: paragraph
            body: >-
              Together 可防御的护城河包括：（a）FlashAttention 研究脉络和 kernel 迭代速度（Tri Dao + Chris Ré），（b）开源社区引力
              （RedPajama、StripedHyena、MoA），以及（c）NVIDIA + Salesforce + 主权资本结构，帮助锁定 GPU 供应和企业分销。切换成本处于中等水平： 客户可以通过 API 翻译在
              Together / Fireworks / Bedrock 多栖；但 Together 上的专用端点合同和微调模型 artefact 会提高粘性。 分销权力偏向超大规模云厂商——它们掌握企业采购和身份——但
              Together 的中立性与开放权重承诺构成反定位差异。竞争者反向证据包括：CoreWeave 2024 IPO 文件与 Lambda 增长信号显示 IaaS 层有显著资本优势；Groq 和 Cerebras
              各自融资超过 $1B 且估值更高；Bedrock 2025 年扩大 Llama 支持，压缩 Together 在商品化工作负载上的溢价。商品化风险真实存在，但受 Together 的研究速度和专用容量合同约束。
              净判断是：到 2027 年，护城河在专用和高性能分层仍然耐用；商品化无服务器层会越来越受到超大规模云厂商挤压，延迟敏感层会受定制硅厂商压力。 公司能否守住 kernel
              与架构领先，是护城河假设的门槛变量，因此也是技术尽调清单上的首要事项。
