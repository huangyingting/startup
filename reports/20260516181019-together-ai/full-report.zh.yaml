              和全参数训练任务。批量推理相对无服务器最高可打 50% 折扣，并有记录的 SLA 窗口。SDK 提供 Python 与 TypeScript，其他运行时可用原始
              HTTP；限速文档区分免费、付费和企业层。下方完整产品模块 / 资产矩阵列出每个模块、主要用户、成熟度状态、
