  - number: 7
    title: 风险
    sections:
      - number: '7.1'
        title: 监管与法律风险面
        blocks:
          - type: paragraph
            body: >-
              Together AI 面对的生成式 AI 监管边界，与所有在美国和欧洲运营的基础模型平台相同。在美国，FTC 于 2024 年启动对生成式 AI 投资与伙伴关系的 6(b) 研究，并表示会广泛审查云与 AI
              关系的反垄断问题；Biden / Trump-era Executive Order on AI 为联邦 AI 标准奠定基础， NIST AI Risk Management Framework
              将其操作化。BIS 已收紧先进 GPU（A100、H100、H200、B200）以及部分基础模型权重出口管制， 直接影响 GPU 云运营商。欧盟方面，AI Act 于 2024 生效，对通用 AI
              提供商的分阶段义务将延续至 2026-2027；英国 ICO 和澳大利亚 OAIC 发布的 GenAI 指引也形成事实合规底线。隐私制度（California 的 CCPA、医疗健康工作负载的
              HIPAA）施加合同层义务，Together 通过其信任中心提及的 BAA 和 SOC 2 控制来履行。诉讼侧，NYT v Microsoft/OpenAI、Authors Guild v OpenAI 和
              Getty v Stability AI 是版权风向标案件，结果会塑造每个模型托管平台的风险暴露；Together 目前不是具名被告，但其开放模型托管业务存在相邻暴露， 尤其当判例扩展到
              platform-as-host 时。民间组织压力（CDT、EFF）增加声誉风险。下方监管与法律风险登记表按司法辖区、可能性、严重性、 缓释和剩余暴露排序每个条目，并为每项未披露控制设置尽调问题。
