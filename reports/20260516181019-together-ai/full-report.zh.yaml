      - number: '2.4'
        title: 增长驱动与约束
        blocks:
          - type: paragraph
            body: >-
              顺风包括：开放权重模型持续扩散（Llama 3/4、Mistral、DeepSeek、Qwen）、超大规模云厂商 GPU 稀缺、FinOps 压力要求降低按 token 计费的封闭 API 支出，以及智能体 AI
              浪潮把每个用户的 token 用量放大。逆风包括：NVIDIA 供给分配偏向超大规模云厂商、主权数据规则拖慢跨境推理、 新数据中心遭遇能源 / 许可瓶颈，以及 Groq、Fireworks、Cerebras
              在推理层带来的价格竞争压力。采用时点风险包括企业采购摩擦、超大规模云厂商可能把 OSS 推理层商品化（AWS Bedrock 开放模型、GCP Vertex Model
              Garden），以及训练与推理组合的经济性波动。Together 的定位依赖推理 kernel 持续领先一代（FlashAttention 3/4、ThunderKittens），同时扩展到能锁定企业支出的预留
              / 专用 SKU。每个驱动和约束最终都回到 IC 的二元问题： 推理 SAM 能否再以 35%+ 复合增长三年，还是超大规模云厂商商品化会把增长前置成一年抢地盘？我们的基准情景假设 2027 前 CAGR
              可持续在 30–40%，2026 起竞争强度扩大；在这种状态下，Together 的开源飞轮和专用容量差异化能产出最强 IRR。
