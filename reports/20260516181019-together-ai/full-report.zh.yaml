  - number: 4
    title: 财务情况
    sections:
      - number: '4.1'
        title: 融资历史与资本结构
        blocks:
          - type: paragraph
            body: >-
              Together AI 已在四个公开宣布轮次中筹集约 $533M 已披露新股资本。$20M 种子轮（May 2023）由 Lux Capital 领投，Factory、SciFi、 Long Journey
              以及知名个人投资人（Scott Banister、Jakob Uszkoreit、Aravind Srinivas）参与。Nov 2023 的 $102.5M Series A 由 Kleiner Perkins
              领投，NVIDIA、Emergence、NEA、Prosperity7 和 Greycroft 参与。Mar 2024 公司据报道以 $1.25B 估值追加约 $106M（有时称为 Series A2），随后在
              July 2024 完成 $305M Series B，由 Salesforce Ventures 和 Coatue 领投，投后估值 $3.3B，Lakestar、NVIDIA 及多家战略方参与。runDate
              时，SEC EDGAR 上没有 Together Computer Inc. 的 S-1、S-3 或注册发行；公开市场上也未确认老股交易或 2026 延伸轮。因此资本结构仍是纯风险投资，且有战略锚点
              （NVIDIA 对应 GPU 供应，Salesforce Ventures 对应企业分销，Prosperity7 对应主权可选项）；按领投信号看，董事会控制权在 KP、 Coatue 与 Lux
              之间分散，但股权结构表本身未公开。累计稀释未披露；外界普遍报道创始人在 Series B 后仍保留有意义股权，但公开记录没有精确比例， 必须向管理层验证。
