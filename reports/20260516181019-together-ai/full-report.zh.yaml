  - number: 6
    title: 客户情况
    sections:
      - number: '6.1'
        title: 客户分层与采用入口
        blocks:
          - type: paragraph
            body: >-
              Together AI 的客户基础按买方 / 用户角色和部署强度分层。漏斗顶端是使用无服务器推理做原型或低量生产的自助开发者：按公司披露，自 GA 以来已有超过 100,000
              名开发者使用该平台。其下是具名创业客户——Pika（视频）、Arcee（开源合并）、Nous Research（社区模型）、 Cartesia（语音）——它们通过无服务器和专用端点组合运行生产工作负载。企业层由
              Salesforce（通过 Salesforce Ventures 联合销售和客户案例提及）、 Zoom（客户案例）和 Washington University（研究部署）支撑；NVIDIA GTC 2025
              Pioneers 项目又浮现出一批客户，包括医疗健康、机器人和开发者工具公司。 Startup Accelerator（2024-11 启动）是面向早期 AI 创业公司的明确漏斗，提供额度、技术支持和 GTM
              放大。地域组合偏北美， EU 通过专用集群增长；垂直组合覆盖开发者工具、内容 / 媒体（视频、语音、图像）、企业 SaaS、医疗健康和学术。付款方 / 用户 / 买方拆分随层级变化：
              自助层里开发者既是买方也是用户；企业层买方通常是 CTO/CIO 或平台工程负责人，用户则是应用团队。下方客户分层、采用轨迹和具名客户证明表，记录每一行的证据质量与留存、 集中度剩余缺口。
