            body: >-
              估值由三种情景锚定。基准情景（$4B-$6B 退出，约 50% 概率）假设 ARR 从当前 $130M-$200M 在 2026-2028 年扩大到 $500M-$700M，毛利率维持在 AI 推理典型的
              30-40% 区间，C 轮适度稀释，Hopper→Blackwell 产能按时爬坡。乐观情景（$8B-$12B 退出，约 25% 概率）要求 2028 年 ARR >$1B，FlashAttention
              推动利用率提升并带来毛利率扩张，Salesforce + NVIDIA 渠道承诺持续，并出现战略收购（NVIDIA、超大规模云厂商、Salesforce）或 2027-2028 年以溢价倍数
              IPO。悲观情景（$1B-$2.5B 结果，约 25% 概率）在以下情况下兑现：超大规模云厂商捆绑推理压低价格、NVIDIA 分配收紧，或版权先例延伸到平台托管方。可比估值表覆盖 CoreWeave（IPO 后
              GPU 云可比公司）、Navan（近期 S-1 SaaS 可比公司）、Figma（S-1 可比公司）、私募轮次（Fireworks 传闻
