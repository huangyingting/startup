chapters:
  - number: 1
    title: 公司概况
    sections:
      - number: '1.1'
        title: 身份、总部与产品框架
        blocks:
          - type: paragraph
            body: >-
              Together AI 将自己定位为「AI 加速云」，为开源和定制的大语言、图像、音频与视觉模型提供训练、 微调和推理。公司主体 Together Computer Inc. 总部位于 California
              San Francisco，在 Menlo Park 设有卫星办公室， Zurich 还有研究人员；招聘页和联系方式共同确认了这些地点，也显示公司仍在基础设施、kernel、GPU、应用 ML
              与收入岗位上积极招人。 公司由四位与 Stanford、Princeton、ETH Zürich 和更广泛开源 LLM 研究社区深度相关的联合创始人于 27 June 2022 注册成立。
              它的身份建立在三根支柱上：面向 AI 工作负载定制的超大规模 GPU 云，开源研究线（RedPajama、OpenChatKit、StripedHyena、
              FlashAttention、Mixture-of-Agents），以及与 OpenAI 和 Anthropic 竞争、但为开放模型定价的自助式推理和微调 API。
              公司强调客户可以保留权重、控制数据驻留，并在需要时使用专用集群；这是它与封闭 API 竞争对手的核心差异。
