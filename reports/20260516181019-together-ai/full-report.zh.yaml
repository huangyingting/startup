        blocks:
          - type: paragraph
            body: >-
              Together AI 对外提供一个统一平台，包含无服务器推理、专用端点、微调、批量推理、embeddings，以及按模态划分的 API（视觉、音频、图像）。 产品界面记录在
              docs.together.ai，并在 chat-completions 层面兼容 OpenAI，因此从封闭 API 迁移并不复杂。模型目录覆盖 200+ 个开放模型，包括 Llama
              3/4、Mistral、Mixtral、Qwen、DeepSeek、StripedHyena 和定制微调 checkpoint；公开模型和 SKU 资料确认了按 token
