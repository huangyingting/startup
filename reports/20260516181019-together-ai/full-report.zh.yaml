            body: >-
              Together 尚未提交财务报表。CNBC 在 July 2024 Series B 前后报道其年化收入节奏为 $100M；Bloomberg 提到「triple-digit growth」； Fast
              Company 和 VentureBeat 复述了这些数字，但没有独立验证。The Information 另有关于 2025 收入轨迹的付费墙报道；PitchBook 将公司列为后期风险投资公司，但没有确认
              2025 跟投。公开定价页按 token 披露价格，7–70B 开放模型大约 $0.20–$0.90/M tokens， 并记录 50% 批量推理折扣；定制专用端点价格需通过销售报价。SKU 包括无服务器、专用
              / 预留端点、微调、批量和 embeddings；视觉 / 音频 / 图像 SKU 另行记录。runDate 时，公司没有公开 ARR、分部拆分、客户集中度、NRR 或毛利率。Forrester 和 IDC
              的市场框架说明 Together 是数十亿美元生成式 AI 推理 TAM 中的成长阶段进入者，但两家分析机构都未把 Together 列为前三厂商。管理层承认 Salesforce Ventures
              联合销售带动企业管线加速， 但没有量化。公司自称动能、第三方媒体轶事和缺少经审计披露这三者组合，符合私营成长阶段 SaaS，但也在实际成交价 vs 标价、组合和毛利率上制造重大尽调风险。 GTM
              动作以漏斗顶端自助开发者注册为主，随后通过 Salesforce Ventures 和 NVIDIA 渠道转介做伙伴驱动的企业扩张；销售周期、CAC 和回本周期未披露， 但参考可比推理 API
              厂商披露，企业专用合同可推断为 60-120 天。
