            body: >-
              CEO Vipul Ved Prakash 此前是 Topsy 联合创始人 / CTO（2013 年被 Apple 以约 $200M 收购），也是 Cloudmark 早期负责人，因此兼具消费者规模 ML
              与基础设施运营经验。CTO Ce Zhang 是 ETH Zürich 终身教授，并领导 Together 在分布式训练系统和以数据为中心的 ML 研究。首席科学家 Chris Ré 是获得 MacArthur
              奖的 Stanford 教授，Snorkel 以及多条 FlashAttention / Hyena 工作线都出自其团队；Stanford CRFM 主任 Percy Liang 是联合创始人兼顾问。
              领导层已补上收入负责人、GPU 基础设施负责人、推理工程负责人，以及常驻 Zurich 的研究负责人；董事会包括 Coatue、Kleiner Perkins、NEA 和 Lux 的投资合伙人。关键人依赖集中在
              Prakash 的商业执行上，也集中在创始研究三人组带来的技术可信度上； 考虑到开源飞轮贡献了 Together 很大一部分漏斗顶端，这一点尤其重要。
