      - number: '3.2'
        title: 能力与功能比较
        blocks:
          - type: paragraph
            body: >-
              按能力轴看，Together 领先于 FlashAttention-3/4 kernel 性能、开放权重模型广度（Llama、Mistral、DeepSeek、Qwen、定制 checkpoint）
              和专用端点灵活性。超大规模云厂商领先于企业合规广度（BAA、FedRAMP、区域驻留）和打包身份 / 计费。Groq 在支持模型的原始单流延迟上领先， 但模型覆盖落后。Fireworks 在无服务器开放模型
              API 上与 Together 接近，但 OSS 研究可见度更低。价格比较显示，Together 无服务器费率集中在 OpenAI 平价区间附近（7–70B 模型输入 token 约
              $0.20–$0.90/M），批量折扣最高 50%；CoreWeave / Lambda 在原始 GPU-hour 上更便宜，但要求客户自己做 DevOps；AWS Bedrock 则在底层计算之上加收按
              token 溢价。下方功能矩阵把不支持的单元格标为 unknown，而不是猜测。 矩阵显示：Together 赢在开放权重广度和 kernel 性能，超大规模云厂商赢在合规和
              IAM，定制硅厂商以模型覆盖为代价赢在延迟；没有单一厂商能同时主导四个最常被引用的采购标准。 我们还注意到，在这个集合里，Together 是仅有的两家既提供 OpenAI 兼容 chat completions
              端点、又暴露 fine-tune 和 batch SKU 的厂商之一， 能显著缩短从封闭 API 迁出的买方迁移时间。
