            body: >-
              Together 的架构把应用 API（chat、completions、embeddings、fine-tune、batch）叠在模型注册表与推理编排器 之上，后者在多区域 NVIDIA Hopper /
              Blackwell 机群上调度 GPU pod。推理引擎（Together Inference Engine v1/v2）封装 FlashAttention-3 与 FlashAttention-4
              attention kernel、ThunderKittens kernel 框架，以及 speculative-decoding / Medusa
              decoder，用来实现已发表的吞吐和延迟主张。Mixture-of-Agents（MoA）研究使支持模型能够通过 ensemble 推理获得更高质量补全。 模型存储依托 HuggingFace 和
              Together 自有 registry；权重可迁移是其明确设计原则。关键依赖包括 NVIDIA GPU 供应（Hopper/Blackwell）、 数据中心共址伙伴、HuggingFace
              模型工件目录，以及用于微调工件的 AWS S3 / 等价存储。运营模型把 kernel / 推理工程团队（Tri Dao、HazyResearch 脉络）、平台 / SRE 团队（2025 起由 Alon
              Gavrielov 领导的基础设施组织）和研究部门 （Chris Ré、Percy Liang）拆开。架构通过一张流程图呈现（客户请求到 GPU pod 再到响应），并用关键依赖 DAG 暴露单一供应商集中。
              可靠性证据包括状态页、已发布限速文档，以及 GTC 2025 和 AI Native Conference 2025 上发布的模型路线图。缺口包括公开 SLA 百分比、
              精确多区域地图（哪些区域、哪些提供商），以及单一事实源路线图；这些均被标为证据缺口。
