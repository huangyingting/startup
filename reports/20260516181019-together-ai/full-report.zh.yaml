      - number: '5.3'
        title: 信任、安全、合规与路线图
        blocks:
          - type: paragraph
            body: >-
              Together 发布的信任中心提到 SOC 2 Type II 认证、专用端点可提供 HIPAA business associate agreement（BAA），以及标准数据处理条款。 runDate
              时，FedRAMP 和类似美国联邦认证尚未列出；区域驻留通过专用集群提供，但公开地图不完整。安全控制覆盖内容审核、function-calling JSON 校验、structured-output JSON
              mode，以及按模型给出的安全指南。路线图从博客和 AI Native Conference 文章中梳理，包括 Blackwell （B200）容量爬坡、批量推理 SKU
              扩展、更多微调家族、多模态（vision+audio）覆盖，以及 Mixture-of-Agents 产品化。差异化建立在四点： （a）kernel
              级性能领先（FA-3/4、TK），（b）开放权重模型覆盖广，（c）无服务器 / 专用 / 批量 SKU 之间足够灵活，（d）研究与工程双文化， 且深接 Stanford / Princeton / ETH
              脉络。公开开发者信号——GitHub repo 活跃度、PyPI 下载轨迹、HuggingFace model hub 存在感和 Hacker News 讨论参与——确认社区活跃，但规模还未匹配 OpenAI 或
              Hugging Face 本身。相比超大规模云产品，Together 的差异在开放权重中立性和 kernel 性能上最明显，在企业合规广度上最不明显。下方信任 /
              合规与路线图表按当前状态、范围和缺口汇总每项控制与里程碑； 标为 unknown 的单元格表示缺少公开披露，而不是底层能力不存在。
