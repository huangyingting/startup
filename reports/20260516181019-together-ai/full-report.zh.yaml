      - number: '2.2'
        title: TAM/SAM/SOM 与测算口径
        blocks:
          - type: paragraph
            body: >-
              多个分析机构口径指向 2024 AI 基础设施 TAM 为 $40–60B，2028 前 CAGR 为 30–50%（Gartner、IDC、McKinsey）。 在这个范围内，与 Together
              最相关的推理和专用 AI 计算 SAM，到 2026 约为 $8–15B；测算来自三角交叉：超大规模云厂商 AI 收入披露 （外推 AWS Bedrock-equivalent 收入年化 $26B）、Series
              B 报道称推理是增长最快的产品线，以及 Together 约 $100M ARR 代理值意味着其在早期 SAM 中只占个位数份额。SOM（Together 可触达、近期可拿下的支出）大约为 $1–3B，重点是
              AI 原生创业公司、 模型实验室，以及 Together 已有明确关系的 Salesforce + 主权云渠道。测算受两点限制：超大规模云厂商没有拆分公开数据；许多已发表估计把训练 capex
              和推理运行率混在一起。
