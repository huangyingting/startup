  - number: 2
    title: 市场分析
    sections:
      - number: '2.1'
        title: 市场边界与邻近领域
        blocks:
          - type: paragraph
            body: >-
              Together AI 位于现代云栈的 AI 计算和推理平台层——夹在超大规模云厂商 GPU IaaS（AWS、GCP、Azure）、专门 GPU 云（CoreWeave、 Lambda、Crusoe）、推理
              API 提供商（Replicate、Fireworks、Groq、Modal）和封闭 API 模型实验室（OpenAI、Anthropic）之间。
              我们承销的市场，是用于运行、微调和服务开放权重或客户自有基础模型的支出，加上 AI 工作负载使用的专用与无服务器 GPU 容量。 该市场不包括通用云计算、传统 ML 平台（Sagemaker 仅训练、经典
              scikit pipeline），也不包括不托管客户权重的封闭专有模型 API。 邻近领域包括 MLOps 工具（Weights & Biases、Anyscale）、向量数据库，以及 AI 安全 /
              可观测性厂商。现状替代方案是自建 Kubernetes-on-GPU 集群，以及从 OpenAI / Anthropic 租用封闭 API；两者都用灵活性换取价格和运营简单度。我们也明确排除按席位计费的 AI
              copilots（Copilot、Cursor），因为需求单位是终端用户席位而不是推理 token；它们位于 Together 之上的应用层，采购的是 token 级推理， 并不替代它。
