      - number: '2.3'
        title: 买方、用户与付款方分层
        blocks:
          - type: paragraph
            body: >-
              三类核心买方驱动 Together 需求。（1）AI 原生创业公司和模型实验室：技术创始人或 CTO 为 FlashAttention 级推理延迟、专用 H100/H200 访问和开放权重灵活性选择
              Together；这类客户通常先用信用卡自助购买，再升级到企业合同。（2）Fortune-500 企业内部的平台团队和应用 ML 小组：预算所有者是评估多模型策略的 CIO/CTO，采购门槛围绕数据驻留、SOC
              2 和 BAA 支持；Salesforce Ventures 共同领投 Series B 为这一分层背书。（3）政府、研究和主权云客户：Prosperity7（Aramco）及类似主权相关 LP 暗示中东 /
              APAC 角度，Together 也把专用区域集群定位为差异点。 用户（开发者、ML 工程师、研究人员）往往不同于付款方（财务、采购、IT），这会拉长企业周期，但落地后改善 NRR。
