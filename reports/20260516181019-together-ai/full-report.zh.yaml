      - number: '4.3'
        title: 单位经济、资本充足性与缺口
        blocks:
          - type: paragraph
            body: >-
              Together 的公开画像只能支持粗略单位经济估计。成本端，GPU-hour COGS 随 NVIDIA capex 扩张；CoreWeave 的 S-1 披露（有用可比） 显示，GPU
              云在预留交易上的毛利率为 60–70%，按需交易更低。按 Together 标价看，无服务器每 token 毛利率可能在 40–60%，专用端点更高；
              但实际毛利率取决于利用率和未公开的预留容量合同。现金端，已融资 $533M，对应截至 2024 估计 $300–$500M 现金消耗（与超大规模 GPU 建设和 150+ 员工数一致），说明现金跑道可延伸到
              2026，但没有数值被确认。资本充足性取决于 Together 是延长 Series B 还是申请 IPO； Figma 和 CoreWeave 的 2025 IPO 先例说明 AI
              基础设施发行人的公开市场窗口已打开，而 Navan 的 S-1 流程是更接近的成长 SaaS 可比。 缺口很重大：ARR 确认、按 SKU 毛利率、前 10 大客户集中度、净美元留存、已签约 vs
              未签约收入、现金跑道月数、债务或供应商融资，以及任何主权云承诺。 这些缺口推动了单位经济和资本充足性表中的尽调要求，也为每个未披露原始指标形成重大证据缺口；在没有管理层披露前，最有信息量的外部信号是
              Together 的公开招聘状态、定价页修订，以及任何 2026 老股市场传闻，尽调结束前都应跟踪。以这一规模的消耗型 SaaS 看，营运资本不太可能成为约束； 更大的现金摆动项是 GPU capex
              相对收入爬坡的节奏，它决定下一轮触发时间。结论是：收入质量和增长表象强但未验证；毛利路径可信但未经审计； 资本强度高但有 NVIDIA 对齐支撑；首要尽调阻断点，是 public-financial-gaps
              表中列出的全套私有财务原始指标。
