      - number: '1.3'
        title: 融资历史、资本结构与估值
        blocks:
          - type: paragraph
            body: >-
              Together AI 在 May 2023 完成 $20M 种子轮，由 Lux Capital 领投，Factory、SciFi、Long Journey 以及 Scott Banister、Jakob
              Uszkoreit、Aravind Srinivas 等个人投资人参与。Nov 2023 又完成 $102.5M Series A，由 Kleiner Perkins
              领投，NVIDIA、Emergence、NEA、Prosperity7 和 Greycroft 参投。Mar 2024 公司据报道以 $1.25B 估值追加约 $106M；随后在 July 2024 完成
              $305M Series B，由 Salesforce Ventures 和 Coatue 领投，投后估值 $3.3B，Lakestar、NVIDIA 和更多战略投资方也参与。由此计算，在任何 2025/2026
              延伸轮之前，已披露的新股融资累计约 $533M；截至报告运行日，EDGAR 上没有公开 S-1 申报或注册发行文件。 投资人组合——主权相关资本（Prosperity7）、战略 GPU
              供应商（NVIDIA）、定义品类的云客户（Salesforce Ventures） 与一线财务投资人（Coatue/KP/Lux）——并不常见，说明 Together
              正被摆成开放模型市场中立、多方参与的底层骨架。
