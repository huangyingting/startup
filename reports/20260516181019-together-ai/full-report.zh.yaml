  - number: 3
    title: 竞争格局
    sections:
      - number: '3.1'
        title: 竞争格局分层
        blocks:
          - type: paragraph
            body: >-
              Together 在五个相互重叠的战场竞争。（1）超大规模云厂商开放模型产品——AWS Bedrock 和 Google Vertex Model Garden 托管 Together 也提供的 Llama /
              Mistral checkpoint，并打包企业合同和 IAM。（2）专门 GPU 云——CoreWeave、Lambda Labs 和 TensorWave 争夺原始 GPU-hour 与预留容量；它们通常缺少
              Together 叠加的推理 SaaS 层。（3）推理 API 同行——Fireworks、Replicate、Modal 和 Anyscale 在按 token
              计费的无服务器层提供近似直接替代；Fireworks 最常被称为 Together 最接近的直接对手。（4）定制硅推理厂商——Groq （LPU）、Cerebras（wafer-scale）和 SambaNova
              以模型覆盖为代价，在延迟和每 token 价格上竞争。（5）封闭 API 模型实验室——OpenAI 和 Anthropic 是那些愿意放弃权重可迁移性的买方替代方案。现状替代是自建
              Kubernetes-on-GPU，用灵活性换运营负担；内部自建最常见于前沿实验室和 FAANG。 竞争集合异常宽，是因为 Together 位于计算、模型托管与开发者体验的交叉点；每个战场都让 Together
              面对不同成本结构（capex 重的 GPU 云 vs OpEx 轻的 API 提供商）、不同分销权力（超大规模云采购 vs 开发者自助），以及不同退出动态（GPU 云整合 vs API
              同行商品化），下文会分别承销。
