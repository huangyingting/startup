              建议为持有 / 观察，置信度中等，风险评级中高。投资逻辑：Together AI
              处在一个结构性有吸引力的交叉点：（a）按分析师和市场数据来源（Gartner、Forrester、IDC、a16z、Bessemer、Menlo），GenAI 推理市场以 40-60% CAGR
              扩张；（b）技术护城河可信，来自 FlashAttention 作者身份（Tri Dao）、ThunderKittens 内核（Stanford HazyResearch）、Together Inference
              Engine v2 和 Mixture-of-Agents 产品化；（c）企业分发渠道由 Salesforce Ventures 联合销售、NVIDIA GTC 2025 Pioneers 和 Startup
              Accelerator 漏斗锚定。反向逻辑：推理层竞争激烈，Fireworks、Replicate、Modal、Anyscale、Cerebras、Groq 和超大规模云厂商（AWS Bedrock、GCP
              Vertex、Azure OpenAI Service）都把推理捆进既有企业合同；收入（The Information 报道为 $130M-$200M+ ARR）和留存基础指标仍未披露；B 轮标记估值（约
