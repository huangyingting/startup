            body: >-
              Together has not filed financial statements. CNBC reporting around the July 2024 Series B cited a $100M
              annualised revenue pace; Bloomberg cited "triple-digit growth"; Fast Company and VentureBeat repeated
              those figures without independent verification. The Information has separately reported on 2025 revenue
              trajectory behind a paywall; PitchBook lists the company as later-stage venture without a confirmed 2025
              follow-on. Pricing is published per-token on the public pricing page, ranging roughly $0.20–$0.90/M tokens
              for 7–70B open models, with a documented 50% batch-inference discount and custom dedicated-endpoint
              pricing quoted via sales. SKUs include serverless, dedicated/reserved endpoints, fine-tuning, batch, and
              embeddings; vision/audio/image SKUs are documented separately. There is no published ARR, segment split,
              customer concentration, NRR, or gross margin disclosure at the runDate. Forrester and IDC market frames
              imply Together is a growth-stage entrant in a multi-billion-dollar generative-AI inference TAM, but
              neither analyst names Together among its top three vendors. Management has acknowledged enterprise
              pipeline acceleration tied to Salesforce Ventures co-selling but has not quantified it. This combination
              of company-claimed momentum, third-party press anecdotes, and absent audited disclosure is consistent with
              private growth-stage SaaS, but creates significant diligence risk on realised vs list pricing, mix, and
              gross margin. The GTM motion is dominated by self-serve developer signup at the top of the funnel and
