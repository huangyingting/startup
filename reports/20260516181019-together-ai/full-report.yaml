              inference SKU expansion, expanded fine-tune families, multi-modal (vision+audio) coverage, and
              Mixture-of-Agents productisation. Differentiation rests on (a) kernel-level performance lead (FA-3/4, TK),
              (b) breadth of open-weight model coverage, (c) flexibility across serverless/dedicated/batch SKUs, and (d)
