      - number: '5.2'
        title: Architecture, dependencies, and operating model
        blocks:
          - type: paragraph
            body: >-
              Together's architecture stacks application APIs (chat, completions, embeddings, fine-tune, batch) over a
              model registry and inference orchestrator that schedules GPU pods on a multi-region NVIDIA
              Hopper/Blackwell fleet. The inference engine (Together Inference Engine v1/v2) wraps FlashAttention-3 and
              FlashAttention-4 attention kernels, ThunderKittens kernel framework, and speculative-decoding/Medusa
              decoders to achieve published throughput and latency claims. Mixture-of-Agents (MoA) research enables
              ensemble inference for higher-quality completions on supported models. The model store is backed by
              HuggingFace and Together's own registry; weight portability is a stated design principle. Critical
              dependencies include NVIDIA GPU supply (Hopper/Blackwell), data-center co-location partners, the
              HuggingFace catalog for model artefacts, and AWS S3/equivalent storage for fine-tune artefacts. The
              operating model splits a kernel/inference engineering team (Tri Dao, HazyResearch lineage) from a
              platform/SRE team (Alon Gavrielov-led infrastructure org from 2025) and a research arm (Chris Ré, Percy
              Liang). The architecture is exposed through a flow figure (customer request to GPU pod to response) and a
              critical-dependency DAG that surfaces single-vendor concentrations. Reliability proof points are a status
              page, published rate-limit documentation, and a published roadmap of model launches at GTC 2025 and AI
              Native Conference 2025. Gaps include a public SLA percentage, the precise multi-region map (which regions,
              which providers), and a single-source-of-truth roadmap; all are flagged as evidence gaps.
