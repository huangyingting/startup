        title: Funding History, Capital Stack, and Valuation
        blocks:
          - type: paragraph
            body: >-
              Together AI raised a $20M seed in May 2023 led by Lux Capital with Factory, SciFi, Long Journey, and
              individual backers including Scott Banister, Jakob Uszkoreit, and Aravind Srinivas. A $102.5M Series A
              followed in November 2023, led by Kleiner Perkins with NVIDIA, Emergence, NEA, Prosperity7, and Greycroft
