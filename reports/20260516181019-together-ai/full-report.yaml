        blocks:
          - type: paragraph
            body: >-
              Together AI's customer base is segmented by buyer/user role and by deployment intensity. The top of the
              funnel is self-serve developers using serverless inference for prototyping or low-volume production: per
              company disclosure, more than 100,000 developers have used the platform since GA. Beneath that sit named
              startup customers — Pika (video), Arcee (open-source merging), Nous Research (community models), Cartesia
              (voice) — who run production workloads via a mix of serverless and dedicated endpoints. The enterprise
              tier is anchored by Salesforce (referenced via Salesforce Ventures co-sell and a customer case study),
              Zoom (customer case study), and Washington University (research deployment); the NVIDIA GTC 2025 Pioneers
              programme surfaced an additional cohort of customers including healthcare, robotics, and developer-tools
              companies. The Startup Accelerator (launched 2024-11) is an explicit funnel for early-stage AI startups,
              providing credits, technical support, and GTM amplification. Geographic mix is North America-skewed with
              EU presence growing through dedicated clusters; vertical mix spans developer tools, content/media (video,
              voice, image), enterprise SaaS, healthcare, and academia. Payer/user/buyer split varies by tier: in
              self-serve the developer is both buyer and user; in enterprise the buyer is typically a CTO/CIO or
              platform-engineering lead while the users are application teams. Customer segmentation,
