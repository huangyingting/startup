              Act GPAI obligation enforcement in 2027), litigation (e.g. adverse copyright ruling that extends to
              platform hosts), partner (e.g. NVIDIA allocation cut or HuggingFace hosting change), operational (e.g.
              multi-hour serverless outage, breach disclosure), competitive (e.g. hyperscaler bundled-inference pricing
              undercut), commercial (e.g. Salesforce co-sell churn), and execution (e.g. founder departure, missed
              Blackwell go-live). For each trigger the table records the transmission path into revenue, margin,
              financing, or valuation, and the action implication (kill, re-underwrite, monitor, accept). The chapter is
              explicit that several primitives — incident count, SLA, top-10 customer concentration, retention, GPU
              committed-spend, opex split — are undisclosed and therefore treated as diligence asks rather than
              asserting numbers that cannot be sourced. Adverse-source coverage is wide: regulatory bodies (FTC, BIS,
              EU, UK ICO, OAIC), legal dockets (CourtListener: NYT, Authors Guild, Getty), competitor websites
              (Fireworks, Replicate, Modal, Anyscale, Groq, Cerebras, CoreWeave, Lambda), and developer-sentiment fora
