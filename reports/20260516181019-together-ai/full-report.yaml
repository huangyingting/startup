  - number: 3
    title: Competitors
    sections:
      - number: '3.1'
        title: Competitive landscape segmentation
        blocks:
          - type: paragraph
            body: >-
              Together competes across five overlapping arenas. (1) Hyperscaler open-model offerings — AWS Bedrock and
              Google Vertex Model Garden host the same Llama/Mistral checkpoints Together offers, bundled with
              enterprise contracts and IAM. (2) Specialised GPU clouds — CoreWeave, Lambda Labs, and TensorWave compete
              for raw GPU-hour and reserved capacity; they typically lack the inference SaaS layer Together overlays.
              (3) Inference-API peers — Fireworks, Replicate, Modal, and Anyscale provide near-direct substitutes at the
              per-token serverless layer; Fireworks is most frequently cited as Together's closest direct rival. (4)
              Bespoke-silicon inference vendors — Groq (LPU), Cerebras (wafer-scale), and SambaNova compete on latency
              and price/token at the cost of model coverage. (5) Closed-API model labs — OpenAI and Anthropic act as
              substitutes for buyers willing to give up weight portability. The status-quo alternative is self-hosted
              Kubernetes-on-GPU, which trades flexibility for operational burden; internal-build is most common at
              frontier labs and FAANG. The competitive set is unusually broad because Together sits at the intersection
              of compute, model hosting, and developer experience; each arena exposes Together to different cost
              structures (capex-heavy GPU clouds vs OpEx-light API providers), different distribution power (hyperscaler
              procurement vs developer self-serve), and different exit dynamics (consolidation among GPU clouds vs
              commoditisation among API peers), all of which we underwrite separately below.
            claimRefs:
              - CP001
              - CP002
              - CP003
              - CP004
              - CP005
