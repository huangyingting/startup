      - number: '4.3'
        title: Unit economics, capital adequacy, and gaps
        blocks:
          - type: paragraph
            body: >-
              Together's public profile permits only rough unit-economics estimation. On the cost side, GPU-hour COGS
              scale with NVIDIA capex; CoreWeave's S-1 disclosures (a useful comparable) show GPU cloud gross margins in
              the 60–70% range on reserved deals and lower on on-demand. Per-token gross margin at Together's list
              pricing is plausibly 40–60% on serverless and higher on dedicated, but realised margin depends on
              utilisation and reserved-capacity contracts that are not public. On the cash side, $533M raised against an
              implied $300–$500M cash burn through 2024 (consistent with hyperscale GPU buildout and a 150+ headcount)
              suggests runway into 2026, but no figure is confirmed. Capital adequacy depends on whether Together
              extends Series B or files for IPO; the Figma and CoreWeave 2025 IPO precedents show the public-market
              window is open for AI-infrastructure issuers, while Navan's S-1 process is a closer growth-SaaS
              comparable. Gaps are material: ARR confirmation, gross margin by SKU, customer concentration top-10, net
              dollar retention, contracted vs uncontracted revenue, runway months, debt or vendor financing, and any
              sovereign-cloud commitments. These gaps drive the diligence ask list in the unit-economics and
              capital-adequacy tables and underpin a material evidence-gap entry for each undisclosed primitive; absent
              management disclosure, the most informative external signals are Together's public hiring posture,
              pricing-page revisions, and any 2026 secondary-market chatter, all of which should be tracked through the
              close of diligence. Working capital is unlikely to be a constraint at this scale of consumption-based
              SaaS; the bigger swing factor on cash is the pace of GPU capex relative to revenue ramp, which sets the
              cadence for the next round trigger. The verdict is that revenue quality and growth optics are strong but
              unverified; margin path is plausible but unaudited; capital intensity is high but underwritten by NVIDIA
              alignment; and the principal diligence blocker is the full set of private financial primitives enumerated
              in the public-financial-gaps table.
