  - number: 8
    title: Valuation
    sections:
      - number: '8.1'
        title: Recommendation, thesis, and anti-thesis
        blocks:
          - type: paragraph
            body: >-
              The recommendation is Hold/Monitor with medium confidence and a medium-high risk rating. Investment
              thesis: Together AI sits at a structurally attractive intersection of (a) the GenAI inference market
              expanding 40-60% CAGR per analyst-market-data sources (Gartner, Forrester, IDC, a16z, Bessemer, Menlo),
              (b) a credible technical moat through FlashAttention authorship (Tri Dao), ThunderKittens kernels
              (Stanford HazyResearch), Together Inference Engine v2, and Mixture-of-Agents productisation, and (c) an
              enterprise distribution channel anchored by Salesforce Ventures co-sell, NVIDIA GTC 2025 Pioneers, and the
              Startup Accelerator funnel. Anti-thesis: the inference layer is contested by Fireworks, Replicate, Modal,
              Anyscale, Cerebras, Groq, and hyperscalers (AWS Bedrock, GCP Vertex, Azure OpenAI Service) who bundle
              inference into existing enterprise contracts; revenue (reported $130M-$200M+ ARR per The Information) and
              retention primitives remain undisclosed; valuation at the Series B mark (~$3.3B-$3.5B) requires multi-year
              revenue scale to underwrite a 3-5x exit; and the regulatory perimeter (EU AI Act, BIS, copyright
              litigation precedent) is tightening through 2027. The valuation chapter records each of these as an
              explicit thesis-break trigger and pairs it with a monitorable threshold and an action implication. The
              recommendation summary table below pairs recommendation, confidence, risk rating, valuation stance, and
              decision implication; the thesis / anti-thesis table records the underlying arguments and what would
              change the view.
