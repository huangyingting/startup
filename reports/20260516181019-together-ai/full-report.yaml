      - number: '2.3'
        title: Buyer, user, and payer segmentation
        blocks:
          - type: paragraph
            body: >-
              Three primary buyer segments drive Together demand. (1) AI-native startups and model labs: technical
              founders or CTOs choose Together for FlashAttention-class inference latency, dedicated H100/H200 access,
              and open-weight flexibility; these are typically self-serve credit-card purchasers escalating to
              enterprise contracts. (2) Enterprise platform teams and applied-ML groups inside Fortune-500 companies:
              budget owners are CIOs/CTOs evaluating multi-model strategies, with procurement gates around data
              residency, SOC 2, and BAA support; Salesforce Ventures co-leadership of the Series B underwrites this
              segment. (3) Government, research, and sovereign-cloud customers: Prosperity7 (Aramco) and similar
              sovereign-aligned LPs signal a Middle East/APAC angle, and Together has positioned dedicated regional
              clusters as a differentiator. Users (developers, ML engineers, researchers) often differ from payers
              (finance, procurement, IT), which lengthens enterprise cycles but improves NRR once landed.
