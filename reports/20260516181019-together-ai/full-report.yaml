      - number: '8.2'
        title: Scenarios, comparables, and sensitivity
        blocks:
          - type: paragraph
            body: >-
              Three scenarios anchor the valuation. Base case ($4B-$6B exit, ~50% probability) assumes ARR scales from
              current $130M-$200M to $500M-$700M over 2026-2028 with sustained gross margin in the 30-40% range typical
              of AI inference, modest dilution at a Series C, and Hopper→Blackwell capacity ramp on time. Bull case
              ($8B-$12B exit, ~25% probability) requires ARR >$1B by 2028, gross margin expansion through
              FlashAttention-driven utilisation, sustained Salesforce + NVIDIA channel commitment, and either a
              strategic acquisition (NVIDIA, hyperscaler, Salesforce) or a 2027-2028 IPO at premium multiples. Bear case
              ($1B-$2.5B outcome, ~25% probability) materialises if hyperscaler bundled inference compresses pricing,
              NVIDIA allocation tightens, or copyright precedent extends to platform hosts. The comparable-valuation
              table covers CoreWeave (post-IPO GPU-cloud comparable), Navan (recent S-1 SaaS comparable), Figma (S-1
              comparable), and private rounds (Fireworks rumoured $4B, Replicate, Modal, Sakana, Mistral, Anthropic)
              plus public listings (NVIDIA, Snowflake) used as ceiling references. Sensitivity drivers are revenue
              growth, gross margin, NRR, exit multiple, and probability-weighted exit window. The bull/base/bear table
              and comparable-valuation table below capture each scenario's assumptions, valuation logic, and key
              sensitivity. The valuation-sensitivity bar figure and the valuation-range figure show downside, base, and
