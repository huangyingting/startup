  - number: 5
    title: Product & Technology
    sections:
      - number: '5.1'
        title: Product surface, modules, and SKUs
        blocks:
          - type: paragraph
            body: >-
              Together AI exposes a single platform with serverless inference, dedicated endpoints, fine-tuning, batch
              inference, embeddings, and modality-specific APIs (vision, audio, image). The product surface is
              documented at docs.together.ai and is OpenAI-compatible at the chat-completions level, making migration
              from closed APIs straightforward. The model catalog spans 200+ open models including Llama 3/4, Mistral,
              Mixtral, Qwen, DeepSeek, StripedHyena, and custom fine-tuned checkpoints; published model and SKU
              references confirm per-token and per-request billing surfaces. Dedicated endpoints offer reserved capacity
              on H100/H200/B200 GPUs for latency-sensitive workloads and are quoted via sales. The fine-tuning API
              accepts LoRA and full-parameter training jobs across most supported families. Batch inference offers up to
              a 50% discount versus serverless with documented SLA windows. SDKs ship in Python and TypeScript, with raw
              HTTP for any other runtime; rate-limit documentation distinguishes free, paid, and enterprise tiers. The
              complete product module / asset matrix below enumerates each module, its primary user, maturity status,
              differentiation, and the gap a buyer should probe before committing to a long-term contract. Module
              ordering follows the buyer's typical adoption sequence: serverless first for experimentation, then
              dedicated and fine-tuning for production, then batch and embeddings for scaled workflows.
