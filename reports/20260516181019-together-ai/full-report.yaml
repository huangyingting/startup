              re-underwrite base case, (b) Salesforce co-sell deprioritisation → kill bull case, (c) NVIDIA Blackwell
              allocation cut → re-underwrite capacity ramp, (d) hyperscaler bundled inference price cut >40% →
              compression, (e) any platform-host copyright ruling → re-underwrite OSS hosting, (f) Series C at flat/down
              vs Series B → mark-to-market valuation, (g) founder departure → kill thesis, (h) breach disclosure or
              multi-hour outage → SLA + reputation re-underwrite. The final diligence asks table records the remaining
              missing primitives — exact ARR, NRR/GRR, top-10 customer concentration, GPU committed spend, opex split,
              CFO/CRO hires, sovereign-channel posture, paid-developer count — and maps each to an owner or diligence
              path. The investment-KPI figure consolidates IC-ready scoring across market, proof, moat, economics, risk,
              valuation, and evidence quality on a 0-100 scale. The chapter is explicit that the recommendation is
              price-sensitive and evidence-sensitive: at a Series B valuation in the $3.3B-$3.5B range with the
              disclosed evidence base, Hold/Monitor is the disciplined answer — Buy at a 25%+ correction or with
