      - number: '3.2'
        title: Capability and feature comparison
        blocks:
          - type: paragraph
            body: >-
              On capability axes Together leads on FlashAttention-3/4 kernel performance, open-weight model breadth
              (Llama, Mistral, DeepSeek, Qwen, custom checkpoints), and dedicated-endpoint flexibility. Hyperscalers
              lead on enterprise compliance breadth (BAA, FedRAMP, regional residency) and bundled identity/billing.
              Groq leads on raw single-stream latency on supported models but lags on model coverage. Fireworks closely
              matches Together on serverless open-model APIs but has lower OSS-research visibility. Pricing comparison
              shows Together's serverless rates clustered around the OpenAI-parity envelope (≈$0.20–$0.90/M input tokens
              for 7–70B models) with batch discounts up to 50%; CoreWeave/Lambda undercut on raw GPU-hour but require
              customer DevOps; AWS Bedrock charges a per-token premium on top of underlying compute. Feature matrices
              below mark unsupported cells as unknown rather than guessing. The matrix shows Together winning on
              open-weight breadth and kernel performance, hyperscalers winning on compliance and IAM, and
              bespoke-silicon vendors winning on latency at the cost of model coverage; no single vendor dominates the
              four most cited buying criteria simultaneously. We also note that Together is one of only two vendors in
              the set that ships an OpenAI-compatible chat completions endpoint while also exposing fine-tune and batch
              SKUs, which materially shortens migration time for buyers leaving closed APIs.
