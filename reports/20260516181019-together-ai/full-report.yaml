  - number: 4
    title: Financials
    sections:
      - number: '4.1'
        title: Funding history and capital stack
        blocks:
          - type: paragraph
            body: >-
              Together AI has assembled approximately $533M of disclosed primary capital across four publicly announced
              rounds. The seed of $20M (May 2023) was led by Lux Capital with Factory, SciFi, Long Journey, and notable
              individual backers (Scott Banister, Jakob Uszkoreit, Aravind Srinivas). A $102.5M Series A in November
              2023 was led by Kleiner Perkins with NVIDIA, Emergence, NEA, Prosperity7, and Greycroft. In March 2024 the
              company added approximately $106M at a reported $1.25B valuation (sometimes referred to as Series A2),
              then closed a $305M Series B in July 2024 led by Salesforce Ventures and Coatue at a $3.3B post-money
              valuation, with Lakestar, NVIDIA, and several strategics participating. No S-1, S-3, or registered
              offering appears on SEC EDGAR for Together Computer Inc. at the runDate, and no public secondary or 2026
              extension has been confirmed. The capital stack therefore reads as venture-only with strategic anchors
              (NVIDIA for GPU supply, Salesforce Ventures for enterprise distribution, Prosperity7 for sovereign
              optionality); board control is split across KP, Coatue and Lux based on round-led signaling, but the cap
              table itself is not public. Cumulative dilution is undisclosed; founders are widely reported to retain a
              meaningful equity stake post Series B, but exact percentages are not in the public record and must be
              verified against management.
