  - number: 7
    title: Risks
    sections:
      - number: '7.1'
        title: Regulatory and legal risk surface
        blocks:
          - type: paragraph
            body: >-
              Together AI faces the same Generative-AI regulatory perimeter as all foundation-model platforms operating
              in the United States and Europe. In the US, the FTC opened a 6(b) study into generative-AI investments and
              partnerships in 2024 and has signalled broad antitrust scrutiny of cloud-AI relationships; the Biden /
              Trump-era Executive Order on AI established a foundation for federal AI standards that the NIST AI Risk
              Management Framework operationalises. The BIS has tightened export controls on advanced GPUs (A100, H100,
              H200, B200) and on the export of certain foundation-model weights, directly relevant to a GPU-cloud
              operator. In the EU, the AI Act entered into force in 2024 with phased obligations for general-purpose AI
              providers culminating in 2026-2027; the UK ICO and Australian OAIC have published GenAI guidance that
              creates de-facto compliance baselines. Privacy regimes (CCPA in California, HIPAA for healthcare
              workloads) impose contract-level obligations Together discharges via BAAs and SOC 2 controls referenced on
              its trust center. On the litigation side, the NYT v Microsoft/OpenAI docket, Authors Guild v OpenAI, and
              Getty v Stability AI are the bellwether copyright cases whose outcomes will shape exposure for every
              model-hosting platform; Together itself is not currently a named defendant but its open-model hosting
              business carries adjacent exposure if precedent extends to platform-as-host. Civil-society pressure (CDT,
              EFF) adds reputational risk. The regulatory and legal risk register below ranks each line item by
              jurisdiction, likelihood, severity, mitigation, and residual exposure, with diligence asks for every
              undisclosed control.
