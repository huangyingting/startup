chapters:
  - number: 1
    title: Company Overview
    sections:
      - number: '1.1'
        title: Identity, Headquarters, and Product Frame
        blocks:
          - type: paragraph
            body: >-
              Together AI markets itself as “the AI acceleration cloud,” offering training, fine-tuning, and inference
              for open-source and custom large language, image, audio, and vision models. The corporate entity, Together
              Computer Inc., is headquartered in San Francisco, California, with a satellite presence in Menlo Park and
              additional research staff in Zurich; the careers page and contact surface confirm both locations and an
              active hiring posture across infrastructure, kernel, GPU, applied-ML, and revenue roles. The company was
              incorporated on 27 June 2022 by four co-founders with deep ties to Stanford, Princeton, ETH Zürich, and
              the broader open-source LLM research community. Its identity rests on three pillars: a hyperscale GPU
              cloud purpose-built for AI workloads, an open-source research arm (RedPajama, OpenChatKit, StripedHyena,
              FlashAttention, Mixture-of-Agents), and a self-service inference and fine-tuning API competitive with
              OpenAI’s and Anthropic’s but priced for open models. The company emphasises that customers can keep
              weights, control data residency, and dedicate clusters when needed, which is the principal contrast with
              closed-API competitors.
