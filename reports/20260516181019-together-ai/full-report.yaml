              closed a $305M Series B in July 2024 led by Salesforce Ventures and Coatue at a $3.3B post-money
              valuation; Lakestar, NVIDIA, and an expanded set of strategics also participated. Cumulative disclosed
              primary capital is therefore approximately $533M before any 2025/2026 extensions, with no public S-1
              filing or registered offering on EDGAR as of the run date. The investor mix — sovereign-aligned
              (Prosperity7), strategic GPU supplier (NVIDIA), category-defining cloud customer (Salesforce Ventures) and
              tier-1 financials (Coatue/KP/Lux) — is unusual and suggests Together is being positioned as a neutral,
              multi-stakeholder backbone for the open-model market.
