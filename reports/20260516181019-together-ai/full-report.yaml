      - number: '2.4'
        title: Growth drivers and constraints
        blocks:
          - type: paragraph
            body: >-
              Tailwinds: ongoing open-weight model proliferation (Llama 3/4, Mistral, DeepSeek, Qwen), GPU scarcity at
              hyperscalers, FinOps pressure to reduce per-token closed-API spend, and the agentic AI wave that
              multiplies token-volume per user. Headwinds: NVIDIA supply allocation favouring hyperscalers, sovereign
              data rules slowing cross-border inference, energy/permitting bottlenecks for new data centres, and
              competitive pricing pressure from Groq, Fireworks, and Cerebras at the inference layer. Adoption-timing
              risks include enterprise procurement friction, the possibility that hyperscalers commoditise the
              OSS-inference layer (AWS Bedrock open models, GCP Vertex Model Garden), and the volatile economics of
              training-vs-inference mix. Together's positioning depends on staying a generation ahead on inference
              kernels (FlashAttention 3/4, ThunderKittens) while expanding into reserved/dedicated SKUs that lock
              enterprise spend. Each driver and constraint feeds back into a binary question for IC: does the inference
              SAM compound at 35%+ for three more years, or does hyperscaler commoditisation pull growth forward into a
              single year of land-grab? Our base case assumes durable 30–40% CAGR through 2027 with widening competitive
              intensity from 2026 onward, which is the regime in which Together's open-source flywheel and
              dedicated-capacity differentiation produce the strongest IRR.
