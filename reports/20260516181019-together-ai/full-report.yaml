      - number: '3.3'
        title: Moat durability and competitive risk
        blocks:
          - type: paragraph
            body: >-
              Together's defensible moats are (a) FlashAttention research lineage and kernel velocity (with Tri Dao +
              Chris Ré), (b) open-source community gravity (RedPajama, StripedHyena, MoA), and (c) the NVIDIA +
              Salesforce + sovereign capital stack that secures GPU supply and enterprise distribution. Switching costs
              are mid: customers can multi-home across Together / Fireworks / Bedrock with API translation; however,
              dedicated-endpoint contracts and fine-tuned model artifacts on Together raise stickiness. Distribution
              power tilts to hyperscalers — they own enterprise procurement and identity — but Together's neutrality and
              open-weight commitment is a counter-positioning differentiator. Adverse competitor evidence: CoreWeave's
              2024 IPO filings and Lambda's growth signal substantial capital advantage at the IaaS layer; Groq and
              Cerebras have raised >$1B each at higher valuations; Bedrock's 2025 expansion of Llama support compresses
              Together's premium on commodity workloads. Commoditisation risk is real but bounded by Together's research
              velocity and dedicated-capacity contracts. Net, we believe the moat is durable through 2027 in the
              dedicated and high-performance segments, with growing pressure on the commodity serverless tier from
              hyperscalers and on the latency-critical tier from bespoke silicon vendors; the company's ability to
              sustain kernel and architecture leadership is the gating variable for the moat thesis and is therefore the
              principal item on the technical-diligence checklist.
