  - number: 2
    title: Market Analysis
    sections:
      - number: '2.1'
        title: Market boundary and adjacencies
        blocks:
          - type: paragraph
            body: >-
              Together AI sits in the AI compute and inference platform layer of the modern cloud stack — between
              hyperscaler GPU IaaS (AWS, GCP, Azure), specialised GPU clouds (CoreWeave, Lambda, Crusoe), inference-API
              providers (Replicate, Fireworks, Groq, Modal), and closed-API model labs (OpenAI, Anthropic). The market
              we underwrite is the spend dedicated to running, fine-tuning, and serving open-weight or customer-owned
              foundation models, plus the dedicated and serverless GPU capacity used for AI workloads. Excluded from
              this market are general-purpose cloud compute, traditional ML platforms (Sagemaker training-only,
              classical scikit pipelines), and closed proprietary model APIs that do not host customer weights.
              Adjacencies include MLOps tooling (Weights & Biases, Anyscale), vector databases, and AI
              safety/observability vendors. Status-quo substitutes are self-hosted Kubernetes-on-GPU clusters and
              closed-API rentals from OpenAI/Anthropic, both of which trade flexibility for price and operational
              simplicity. We also explicitly exclude per-seat AI copilots (Copilot, Cursor) because the unit of demand
              is end-user seats rather than inference tokens, which means they sit one layer above Together in the
              application stack and procure rather than substitute for token-level inference.
            claimRefs:
              - CM001
              - CM002
              - CM003
              - CM004
              - CM005
              - CM006
