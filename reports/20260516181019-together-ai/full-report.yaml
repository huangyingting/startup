      - number: '7.2'
        title: Operational, security, partner, and dependency risk
        blocks:
          - type: paragraph
            body: >-
              Operational risk for Together centres on three vectors: GPU capacity availability (Hopper and Blackwell),
              model-serving reliability, and regulated-workload controls. NVIDIA is the dominant single-vendor
              dependency — GPUs, networking (NVLink, InfiniBand), and software stack (CUDA, TensorRT, NeMo, Dynamo) —
              and is also a strategic investor, which both reduces supply-allocation risk and concentrates correlated
              downside if Blackwell allocation tightens. HuggingFace is the primary model-artefact dependency; partner
              risk would emerge if HF changes hosting terms or commercial alignment. Salesforce Ventures is the lead
              enterprise channel partner via the Series B; channel concentration risk is non-trivial. Security exposure
              spans the standard model-cloud surface (prompt injection, data exfiltration, prompt-logging leakage,
              supply-chain compromise of model weights) and the SOC 2 / HIPAA control surface that Together publishes
              via its trust center. The public status page exists but does not publish an SLA percentage. Competitive
              displacement risk is real: Fireworks, Replicate, Modal, Anyscale, Cerebras, and Groq all serve overlapping
              workloads, and hyperscalers (AWS Bedrock, GCP Vertex, Azure OpenAI) bundle inference into existing
              enterprise contracts. People and execution risk includes key-person dependency on Vipul Ved Prakash (CEO),
              Ce Zhang (CTO), and Tri Dao (Chief Scientist), and the build-out velocity required to keep pace with
              Hopper→Blackwell→Rubin cadence. The operational, partner, and people registers below capture each failure
              mode, mitigation maturity, and residual exposure with explicit diligence paths.
