      - FE003
  - id: section-3
    title: Trust, security, compliance, and roadmap
    body: >-
      Together publishes a trust center referencing SOC 2 Type II attestation, HIPAA business associate agreement (BAA)
      availability on dedicated endpoints, and standard data processing terms. FedRAMP and similar US-Federal
      accreditation are not yet listed at the runDate; regional residency is offered through dedicated clusters but the
      public map is partial. Safety controls span content moderation, function-calling JSON validation,
      structured-output JSON mode, and per-model safety guidance. The roadmap, mined across the blog and AI Native
      Conference posts, includes Blackwell (B200) capacity ramp, batch inference SKU expansion, expanded fine-tune
      families, multi-modal (vision+audio) coverage, and Mixture-of-Agents productisation. Differentiation rests on (a)
      kernel-level performance lead (FA-3/4, TK), (b) breadth of open-weight model coverage, (c) flexibility across
      serverless/dedicated/batch SKUs, and (d) dual research-and-engineering culture with deep Stanford/Princeton/ETH
      lineage. Public developer signal — GitHub repo activity, PyPI download trajectory, HuggingFace model hub presence,
      and Hacker News thread engagement — confirms an active developer community without yet matching the scale of
      OpenAI or Hugging Face itself. Compared with hyperscaler offerings, Together's differentiation is most visible on
      open-weight neutrality and kernel performance and least visible on enterprise compliance breadth. The
      trust/compliance and roadmap tables below summarise each control and milestone with its current status, scope, and
      gap; cells marked unknown reflect missing public disclosure rather than absence of the underlying capability.
    claimRefs:
