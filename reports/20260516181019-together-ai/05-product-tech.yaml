company:
  name: Together AI
chapter:
  number: 5
  title: Product & Technology
  summary: >-
    Together AI delivers an OpenAI-compatible inference, fine-tuning, and dedicated-endpoint platform serving 200+ open
    and custom large language, embedding, vision, audio, and image models on a NVIDIA Hopper/Blackwell GPU backplane.
    The platform is anchored in FlashAttention-3/4, ThunderKittens, and speculative-decoding research; SDKs span Python,
    TypeScript, and OpenAI-compatible HTTP; trust/security includes SOC 2 with HIPAA via BAA. Documented gaps include
    detailed SLA, FedRAMP scope, regional residency map, and a unified roadmap.
sections:
  - id: section-1
    title: Product surface, modules, and SKUs
    body: >-
      Together AI exposes a single platform with serverless inference, dedicated endpoints, fine-tuning, batch
      inference, embeddings, and modality-specific APIs (vision, audio, image). The product surface is documented at
      docs.together.ai and is OpenAI-compatible at the chat-completions level, making migration from closed APIs
      straightforward. The model catalog spans 200+ open models including Llama 3/4, Mistral, Mixtral, Qwen, DeepSeek,
      StripedHyena, and custom fine-tuned checkpoints; published model and SKU references confirm per-token and
      per-request billing surfaces. Dedicated endpoints offer reserved capacity on H100/H200/B200 GPUs for
      latency-sensitive workloads and are quoted via sales. The fine-tuning API accepts LoRA and full-parameter training
      jobs across most supported families. Batch inference offers up to a 50% discount versus serverless with documented
      SLA windows. SDKs ship in Python and TypeScript, with raw HTTP for any other runtime; rate-limit documentation
      distinguishes free, paid, and enterprise tiers. The complete product module / asset matrix below enumerates each
      module, its primary user, maturity status, differentiation, and the gap a buyer should probe before committing to
      a long-term contract. Module ordering follows the buyer's typical adoption sequence: serverless first for
      experimentation, then dedicated and fine-tuning for production, then batch and embeddings for scaled workflows.
    claimRefs:
      - CE001
      - CE002
      - CE003
      - CE004
      - CE005
      - CE006
      - CE007
      - CE008
      - CE009
      - CE010
    tableRefs:
      - TE001
      - TE002
    figureRefs:
      - FE001
  - id: section-2
    title: Architecture, dependencies, and operating model
    body: >-
      Together's architecture stacks application APIs (chat, completions, embeddings, fine-tune, batch) over a model
      registry and inference orchestrator that schedules GPU pods on a multi-region NVIDIA Hopper/Blackwell fleet. The
      inference engine (Together Inference Engine v1/v2) wraps FlashAttention-3 and FlashAttention-4 attention kernels,
      ThunderKittens kernel framework, and speculative-decoding/Medusa decoders to achieve published throughput and
      latency claims. Mixture-of-Agents (MoA) research enables ensemble inference for higher-quality completions on
      supported models. The model store is backed by HuggingFace and Together's own registry; weight portability is a
      stated design principle. Critical dependencies include NVIDIA GPU supply (Hopper/Blackwell), data-center
      co-location partners, the HuggingFace catalog for model artefacts, and AWS S3/equivalent storage for fine-tune
      artefacts. The operating model splits a kernel/inference engineering team (Tri Dao, HazyResearch lineage) from a
      platform/SRE team (Alon Gavrielov-led infrastructure org from 2025) and a research arm (Chris Ré, Percy Liang).
      The architecture is exposed through a flow figure (customer request to GPU pod to response) and a
      critical-dependency DAG that surfaces single-vendor concentrations. Reliability proof points are a status page,
      published rate-limit documentation, and a published roadmap of model launches at GTC 2025 and AI Native Conference
      2025. Gaps include a public SLA percentage, the precise multi-region map (which regions, which providers), and a
      single-source-of-truth roadmap; all are flagged as evidence gaps.
    claimRefs:
      - CE011
      - CE012
      - CE013
      - CE014
      - CE015
      - CE016
      - CE017
      - CE018
      - CE019
      - CE020
