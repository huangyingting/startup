callouts:
  - calloutType: strength
    title: Kernel lead is real
    body: >-
      FlashAttention-3 and the just-released FlashAttention-4 keep Together a generation ahead of most competitors on
      H100/H200 attention efficiency. Combined with ThunderKittens this gives durable per-token cost advantage.
    claimRefs:
      - CP010
      - CP021
      - CP022
  - calloutType: risk
    title: Hyperscaler price pressure
    body: >-
      Bedrock and Vertex are systematically expanding open-model coverage at small per-token premiums above raw compute.
      If they cut prices further, Together's serverless margin compresses.
    claimRefs:
      - CP024
      - CP026
  - calloutType: risk
    title: Bespoke silicon latency
    body: >-
      Groq has demonstrated 5–10x lower per-stream latency on supported models. Together must counter with kernel +
      speculative-decoding gains rather than per-token pricing alone.
    claimRefs:
      - CP033
      - CP034
  - calloutType: insight
    title: Multi-homing is the equilibrium
    body: >-
      Enterprise buyers report multi-homing across two or three inference providers; Together's open-weight + dedicated
      mix positions it as a default secondary even where Bedrock is primary.
    claimRefs:
      - CP027
      - CP028
