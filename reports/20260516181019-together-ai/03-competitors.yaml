company:
  name: Together AI
chapter:
  number: 3
  title: Competitors
  summary: >-
    Together AI faces a wide competitive set: hyperscaler open-model offerings (AWS Bedrock, GCP Vertex Model Garden),
    specialised GPU clouds (CoreWeave, Lambda, TensorWave), inference-API peers (Fireworks, Replicate, Modal, Anyscale),
    bespoke-silicon inference players (Groq, Cerebras, SambaNova), and closed-API model labs (OpenAI, Anthropic) as
    substitutes. Together's differentiation rests on FlashAttention-class kernels, open-weight neutrality, and dedicated
    capacity SKUs; durability is constrained by NVIDIA supply allocation, hyperscaler commoditisation, and price
    pressure from latency-specialised silicon vendors.
sections:
  - id: section-1
    title: Competitive landscape segmentation
    body: >-
      Together competes across five overlapping arenas. (1) Hyperscaler open-model offerings — AWS Bedrock and Google
      Vertex Model Garden host the same Llama/Mistral checkpoints Together offers, bundled with enterprise contracts and
      IAM. (2) Specialised GPU clouds — CoreWeave, Lambda Labs, and TensorWave compete for raw GPU-hour and reserved
      capacity; they typically lack the inference SaaS layer Together overlays. (3) Inference-API peers — Fireworks,
      Replicate, Modal, and Anyscale provide near-direct substitutes at the per-token serverless layer; Fireworks is
      most frequently cited as Together's closest direct rival. (4) Bespoke-silicon inference vendors — Groq (LPU),
      Cerebras (wafer-scale), and SambaNova compete on latency and price/token at the cost of model coverage. (5)
      Closed-API model labs — OpenAI and Anthropic act as substitutes for buyers willing to give up weight portability.
      The status-quo alternative is self-hosted Kubernetes-on-GPU, which trades flexibility for operational burden;
      internal-build is most common at frontier labs and FAANG. The competitive set is unusually broad because Together
      sits at the intersection of compute, model hosting, and developer experience; each arena exposes Together to
      different cost structures (capex-heavy GPU clouds vs OpEx-light API providers), different distribution power
      (hyperscaler procurement vs developer self-serve), and different exit dynamics (consolidation among GPU clouds vs
      commoditisation among API peers), all of which we underwrite separately below.
    claimRefs:
      - CP001
      - CP002
      - CP003
      - CP004
      - CP005
      - CP006
      - CP007
      - CP008
    tableRefs:
      - TP001
  - id: section-2
    title: Capability and feature comparison
    body: >-
      On capability axes Together leads on FlashAttention-3/4 kernel performance, open-weight model breadth (Llama,
      Mistral, DeepSeek, Qwen, custom checkpoints), and dedicated-endpoint flexibility. Hyperscalers lead on enterprise
      compliance breadth (BAA, FedRAMP, regional residency) and bundled identity/billing. Groq leads on raw
      single-stream latency on supported models but lags on model coverage. Fireworks closely matches Together on
      serverless open-model APIs but has lower OSS-research visibility. Pricing comparison shows Together's serverless
      rates clustered around the OpenAI-parity envelope (≈$0.20–$0.90/M input tokens for 7–70B models) with batch
      discounts up to 50%; CoreWeave/Lambda undercut on raw GPU-hour but require customer DevOps; AWS Bedrock charges a
      per-token premium on top of underlying compute. Feature matrices below mark unsupported cells as unknown rather
      than guessing. The matrix shows Together winning on open-weight breadth and kernel performance, hyperscalers
      winning on compliance and IAM, and bespoke-silicon vendors winning on latency at the cost of model coverage; no
      single vendor dominates the four most cited buying criteria simultaneously. We also note that Together is one of
      only two vendors in the set that ships an OpenAI-compatible chat completions endpoint while also exposing
      fine-tune and batch SKUs, which materially shortens migration time for buyers leaving closed APIs.
    claimRefs:
      - CP009
      - CP010
      - CP011
      - CP012
      - CP013
      - CP014
      - CP015
      - CP016
      - CP017
      - CP018
      - CP019
      - CP020
    tableRefs:
      - TP002
      - TP003
    figureRefs:
      - FP001
      - FP002
  - id: section-3
    title: Moat durability and competitive risk
    body: >-
      Together's defensible moats are (a) FlashAttention research lineage and kernel velocity (with Tri Dao + Chris Ré),
      (b) open-source community gravity (RedPajama, StripedHyena, MoA), and (c) the NVIDIA + Salesforce + sovereign
      capital stack that secures GPU supply and enterprise distribution. Switching costs are mid: customers can
      multi-home across Together / Fireworks / Bedrock with API translation; however, dedicated-endpoint contracts and
      fine-tuned model artifacts on Together raise stickiness. Distribution power tilts to hyperscalers — they own
      enterprise procurement and identity — but Together's neutrality and open-weight commitment is a
      counter-positioning differentiator. Adverse competitor evidence: CoreWeave's 2024 IPO filings and Lambda's growth
      signal substantial capital advantage at the IaaS layer; Groq and Cerebras have raised >$1B each at higher
      valuations; Bedrock's 2025 expansion of Llama support compresses Together's premium on commodity workloads.
      Commoditisation risk is real but bounded by Together's research velocity and dedicated-capacity contracts. Net, we
      believe the moat is durable through 2027 in the dedicated and high-performance segments, with growing pressure on
      the commodity serverless tier from hyperscalers and on the latency-critical tier from bespoke silicon vendors; the
      company's ability to sustain kernel and architecture leadership is the gating variable for the moat thesis and is
      therefore the principal item on the technical-diligence checklist.
    claimRefs:
      - CP021
      - CP022
      - CP023
      - CP024
      - CP025
      - CP026
      - CP027
      - CP028
      - CP029
      - CP030
      - CP031
      - CP032
      - CP033
      - CP034
      - CP035
      - CP036
