company:
  name: Together AI
chapter:
  number: 1
  title: Company Overview
  summary: >-
    Together AI is a San Francisco–based AI acceleration cloud founded in June 2022 by Vipul Ved Prakash, Ce Zhang,
    Chris Re, and Percy Liang, focused on open-source GPU inference, fine-tuning, training infrastructure, and
    dataset/model research; the company has raised over $530M including a July 2024 Series B at a $3.3B post-money
    valuation and counts Salesforce Ventures, NVIDIA, Coatue, Lux, Kleiner Perkins, and Emergence among investors.
sections:
  - id: section-1
    title: Identity, Headquarters, and Product Frame
    body: >-
      Together AI markets itself as “the AI acceleration cloud,” offering training, fine-tuning, and inference for
      open-source and custom large language, image, audio, and vision models. The corporate entity, Together Computer
      Inc., is headquartered in San Francisco, California, with a satellite presence in Menlo Park and additional
      research staff in Zurich; the careers page and contact surface confirm both locations and an active hiring posture
      across infrastructure, kernel, GPU, applied-ML, and revenue roles. The company was incorporated on 27 June 2022 by
      four co-founders with deep ties to Stanford, Princeton, ETH Zürich, and the broader open-source LLM research
      community. Its identity rests on three pillars: a hyperscale GPU cloud purpose-built for AI workloads, an
      open-source research arm (RedPajama, OpenChatKit, StripedHyena, FlashAttention, Mixture-of-Agents), and a
      self-service inference and fine-tuning API competitive with OpenAI’s and Anthropic’s but priced for open models.
      The company emphasises that customers can keep weights, control data residency, and dedicate clusters when needed,
      which is the principal contrast with closed-API competitors.
    claimRefs:
      - CO001
      - CO002
      - CO003
      - CO004
      - CO005
    tableRefs:
      - TO001
    figureRefs:
      - FO002
  - id: section-2
    title: Founders, Leadership, and Governance
    body: >-
      CEO Vipul Ved Prakash was previously co-founder/CTO of Topsy (acquired by Apple for ~$200M in 2013) and an early
      principal at Cloudmark, giving him both consumer-scale ML and infrastructure operating experience. CTO Ce Zhang is
      a tenured professor at ETH Zürich and Together’s research lead on distributed training systems and data-centric
      ML. Chief Scientist Chris Ré is the MacArthur-winning Stanford professor behind Snorkel and many of the
      FlashAttention/Hyena lines of work; Percy Liang, Stanford CRFM director, is co-founder and an advisor. The
      leadership bench has expanded with a head of revenue, head of GPU infrastructure, head of inference engineering,
      and a Zurich-based research head; the board includes investor partners from Coatue, Kleiner Perkins, NEA, and Lux.
      Key-person dependence is concentrated in Prakash for commercial execution and in the founding research trio for
      technical credibility, particularly given the open-source flywheel that drives much of Together’s top-of-funnel.
    claimRefs:
      - CO006
      - CO007
      - CO008
      - CO009
      - CO010
      - CO011
    tableRefs:
      - TO002
  - id: section-3
    title: Funding History, Capital Stack, and Valuation
    body: >-
      Together AI raised a $20M seed in May 2023 led by Lux Capital with Factory, SciFi, Long Journey, and individual
      backers including Scott Banister, Jakob Uszkoreit, and Aravind Srinivas. A $102.5M Series A followed in November
      2023, led by Kleiner Perkins with NVIDIA, Emergence, NEA, Prosperity7, and Greycroft participating. In March 2024
      the company added approximately $106M at a reported $1.25B valuation, then closed a $305M Series B in July 2024
      led by Salesforce Ventures and Coatue at a $3.3B post-money valuation; Lakestar, NVIDIA, and an expanded set of
      strategics also participated. Cumulative disclosed primary capital is therefore approximately $533M before any
      2025/2026 extensions, with no public S-1 filing or registered offering on EDGAR as of the run date. The investor
      mix — sovereign-aligned (Prosperity7), strategic GPU supplier (NVIDIA), category-defining cloud customer
      (Salesforce Ventures) and tier-1 financials (Coatue/KP/Lux) — is unusual and suggests Together is being positioned
      as a neutral, multi-stakeholder backbone for the open-model market.
    claimRefs:
      - CO012
      - CO013
      - CO014
      - CO015
      - CO016
      - CO017
      - CO018
    tableRefs:
      - TO003
    figureRefs:
      - FO001
  - id: section-4
    title: Scale, Cover Metrics, and Milestones
    body: >-
      Public scale metrics remain partial. The company has stated it operates more than 20,000 NVIDIA Hopper-class GPUs
      across multiple regions, with public roadmap notes referencing Blackwell rollouts, and serves "hundreds of
      thousands" of developers via the Together API, but it has not disclosed audited ARR, gross margin, paid-developer
      counts, or net revenue retention. CNBC reported a $100M annualised revenue pace around the Series B; Bloomberg
      cited triple-digit growth without a specific number. Reported headcount tracks above 150 globally, with active
      openings spanning kernel, networking, ML, and sales. The milestone timeline anchors founding (June 2022), seed
      (May 2023), RedPajama 1T dataset (April 2023), OpenChatKit (March 2023), Series A (November 2023),
      FlashAttention-3 (July 2024), Series B at $3.3B (July 2024), and StripedHyena/Mixture-of-Agents research (late
      2023–2024). No adverse litigation, layoffs, or regulatory action has been reported through the run date, but key
      cover metrics (gross margin, ARR confirmation, customer concentration) remain undisclosed and are reflected in the
      snapshot KPI table.
    claimRefs:
