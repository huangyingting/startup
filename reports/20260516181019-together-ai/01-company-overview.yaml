callouts:
  - calloutType: strength
    title: Multi-stakeholder cap table
    body: >-
      Salesforce Ventures, NVIDIA, Coatue, KP, Lux, and Prosperity7 give Together unusually broad strategic alignment
      across distribution, GPU supply, public-markets credibility, and sovereign capital — a defensive moat against
      single-investor capture.
    claimRefs:
      - CO015
      - CO016
      - CO017
  - calloutType: risk
    title: ARR and margin opacity
    body: >-
      Headline traction figures (ARR, paid-developer count, NRR, gross margin) all rest on third-party reporting or
      company-claimed numbers; no audited financial filing exists at runDate. Several cover metrics flagged as "low"
      confidence and must be validated with management before underwriting.
    claimRefs:
      - CO022
      - CO024
  - calloutType: insight
    title: Open-source flywheel as GTM moat
    body: >-
      RedPajama, OpenChatKit, FlashAttention, StripedHyena, and Mixture-of-Agents deliver developer mindshare that
      competing closed-API providers cannot easily replicate, and the same research lineage anchors customer trust in
      the inference platform.
    claimRefs:
      - CO028
      - CO029
      - CO033
  - calloutType: assumption
    title: No adverse events at runDate
    body: >-
      No public litigation, regulatory action, recall, layoff, or executive departure has been reported as of May 2026.
      A formal background and litigation search remains a diligence ask before final IC.
    claimRefs:
      - CO034
      - CO035
      - CO036
