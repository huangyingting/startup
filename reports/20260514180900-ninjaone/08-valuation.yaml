company:
  name: NinjaOne
chapter:
  number: 8
  title: "Valuation"
  summary: >
    NinjaOne presents a compelling growth story — 70% YoY FY2025 revenue growth, 35,000+
    customers across 140+ countries, a category-leading G2 position, and a structurally
    attractive per-device subscription model with demonstrated backup cross-sell traction —
    packaged in a $5B Series C valuation (November 2024) that implies approximately 10–14x
    forward ARR. The investment thesis is credible but entry is priced for perfection: at a
    $5B mark, bull-case returns of 2–4x in 3–5 years require NinjaOne to sustain 40–70% ARR
    growth through 2027–2028 and achieve a premium exit multiple at IPO or strategic sale.
    The base case (growth decelerates to 30–40%) delivers uninspiring 1.3–1.8x returns.
    Key diligence blockers before committing capital: audited financials (FY2024–2025), verified
    NRR, SOC 2 Type II audit report, and cyber-liability insurance scope. The RMM supply-chain
    security risk is the thesis-break scenario — a confirmed platform breach would likely
    impair the exit valuation below entry.

sections:
  - id: investment-thesis
    title: "Investment Thesis and Anti-Thesis"
    order: 1
    tableRefs: [TV001, TV002]
    figureRefs: [FV001]
    body: >
      The investment thesis for NinjaOne rests on five pillars: (1) a structural tailwind from
      the global growth of the MSP market and the ongoing shift to managed IT services; (2)
      product-market fit confirmed by 4,295 G2 reviews at 4.7/5 and a 98% claimed satisfaction
      rate; (3) a per-device subscription model that generates natural ARR expansion within the
      existing customer base as MSP clients grow; (4) strong cross-sell momentum (backup attach
      rate ~40% within 10 months of launch); and (5) a competitive moat built on the MSP workflow
      depth of the platform, integration lock-in with PSA providers, and community network effects
      (script library, G2 reviews, Reddit r/msp community).

      The anti-thesis rests on four concerns: (1) the $5B private valuation implies limited
      multiple expansion upside — most of the value creation must come from ARR growth, not
      re-rating; (2) the RMM supply-chain security risk is a binary tail risk — a Kaseya-scale
      breach would be a valuation-destroying event; (3) key financial metrics (NRR, GRR, audited
      revenue, cash position) remain unverified in public sources; and (4) Microsoft Intune
      represents a long-term competitive headwind in the enterprise IT segment that could cap
      NinjaOne's TAM expansion.

      The thesis is conditional: it holds if NinjaOne can (a) sustain 40%+ ARR growth through
      2027, (b) demonstrate an audited NRR above 110%, (c) show no major security incidents, and
      (d) achieve a credible IPO or strategic exit path at $10–15B+. These are achievable but
      require verification.

  - id: valuation-context
    title: "Financing Context and Valuation Framework"
    order: 2
    tableRefs: []
    figureRefs: []
    body: >
      NinjaOne raised $500M in its Series C (November 2024) at a $5B post-money valuation led
      by ICONIQ Growth, with follow-on participation from Summit Partners. The Dropsuite
      acquisition (January 2025 announcement, $270M final price, June 2025 close) consumed
      approximately $270M of Series C capital, leaving roughly $230M in net new operating capital.
      Total capital raised to date is approximately $761.5M across six rounds.

      Valuation framework: At $5B entry with estimated FY2025 ARR of approximately $450–550M
      (extrapolating from 70% YoY growth and ~10–14x Series C multiple), the implied EV/ARR
      multiple is approximately 9–11x. This is at a discount to the 15–20x multiples commanded
      by the fastest-growing public SaaS companies (ServiceNow, Veeva) but above the 4–6x
      multiples for mature/slower-growing endpoint management peers (N-able, SolarWinds).

      Comparable transaction context: Jamf IPO valued at ~$3.5B in 2020 at approximately 18x
      ARR; N-able spin-off from SolarWinds in 2021 at approximately $1.5B (~5x ARR); Barracuda
      acquisition by KKR at approximately $4B (2022). These comparables suggest $5B for a
      70%-growing RMM platform is defensible but on the high end of the MSP/RMM comp set.

      At IPO (estimated 2027–2028 based on investor return pressure from the November 2024
      round), NinjaOne would need to show $800M–$1.2B ARR and 30–50% growth to justify a
      12–15x IPO multiple that delivers a $10–15B valuation and meaningful investor returns.

  - id: scenarios
    title: "Bull / Base / Bear Case Scenarios"
    order: 3
    tableRefs: [TV003]
    figureRefs: [FV003]
    body: >
      Bull case (35% probability): NinjaOne sustains 50–70% ARR growth through FY2027,
      driven by Kaseya/ConnectWise market share captures, international expansion, backup
      and documentation module upsell, and potential new product launches. FY2027 ARR reaches
      $900M–$1.2B. IPO in 2027–2028 at 14–18x forward ARR yields an exit valuation of
      $12.6B–$21.6B. From a $5B entry, this represents a 2.5–4.3x return multiple (25–40%
      IRR). Requires: no security breach, successful FedRAMP authorization, continued product
      leadership.

      Base case (45% probability): Growth decelerates to 30–40% YoY as the Kaseya migration
      tailwind fades and Microsoft Intune limits enterprise IT upside. FY2027 ARR reaches
      $700M–$800M. IPO in 2028–2029 at 10–13x forward ARR yields $7B–$10.4B. From $5B entry,
      this represents a 1.4–2.1x return multiple (8–16% IRR) — adequate but not compelling.
      Requires: clean security record, verified NRR >110%.

      Bear case (20% probability): Growth decelerates below 25% due to security incident,
      Microsoft Intune competitive displacement, or macroeconomic MSP spending reduction.
      FY2027 ARR reaches $500M–$600M. Exit at 6–8x ARR (compressed multiple) yields
      $3B–$4.8B — a loss at $5B entry. Triggering events: platform breach, CEO departure,
      GDPR enforcement, major customer defection wave.

  - id: comparables
    title: "Comparable Set and Benchmark Analysis"
    order: 4
    tableRefs: [TV004]
    figureRefs: [FV002]
    body: >
      NinjaOne sits in the MSP/RMM software category with endpoint management and IT
      operations SaaS adjacencies. Public comparables include N-able (NYSE: NBLE, ~$1.5B
      market cap, ~4x ARR), SolarWinds (NYSE: SWI, ~$4.5B market cap, ~5x ARR), and
      SentinelOne (NYSE: S, ~$10B market cap, ~10x ARR for endpoint security). These comps
      reflect the 2024–2026 valuation compression environment for software companies, where
      only the highest-growth names command premium multiples.

      In the private market, NinjaOne's closest comparable is Cybereason (private, endpoint
      security, raised at ~$3B valuation but subsequently distressed) — though NinjaOne's
      RMM economics are more durable. Absolute Software's acquisition by Crosspoint Capital
      in 2023 at ~$900M (~6x ARR) and Ivanti's acquisition of MobileIron/Pulse/Cherwell
      (PE-backed, ~$2B implied) provide M&A comparables at lower growth rates.

      The best case comp for NinjaOne's growth profile is Jamf (Apple device management) which
      IPO'd in 2020 at $3.5B and reached $7B market cap at peak; Jamf grew at 25–35% when it
      went public. NinjaOne's 70% growth rate would position it more favorably than Jamf at IPO
      if sustained, but the MSP RMM TAM is broader and NinjaOne's platform breadth is greater.

  - id: recommendation
    title: "Recommendation and Diligence Action Plan"
    order: 5
    tableRefs: [TV005, TV006]
    figureRefs: [FV004]
    body: >
      Recommendation: Conditional Positive — Attractive opportunity with material diligence
      requirements. Do not commit capital until the following blocking items are resolved:
      (1) audited financial statements for FY2024 and FY2025 with verified ARR and NRR;
      (2) SOC 2 Type II audit report reviewed under NDA with scope covering RMM agent,
      backup infrastructure, and remote access; (3) cyber-liability insurance policy summary
      with per-event and aggregate limits; (4) legal review of the NinjaOne MSA indemnification
      caps and limitation of liability clauses.

      Entry discipline: If diligence satisfies the above, the $5B mark is defensible for a
      late-stage growth round (Series C secondary or co-investment). However, any new primary
      capital commitment should target a $4.5–5.0B cap; above $5B without audited verification
      of the ARR and NRR profile is not recommended. Warrant provisions or ratchet protections
      for a down-round scenario should be negotiated.

      Thesis-break monitoring: After investment, the following indicators should be monitored
      monthly: (a) platform security incident reports and CVE disclosures; (b) quarterly customer
      count updates from press releases; (c) backup attach rate trajectory; (d) N-able and
      SolarWinds earnings calls for RMM market pricing signals; (e) Microsoft Intune MSP program
      announcements.

