companyProfile:
  summary: "NinjaOne (formerly NinjaRMM) is a private IT management SaaS company founded in 2013 in Austin, Texas by Sal Sferlazza, Christopher Matarese, and Eric Herrera. The company operates the leading cloud-native RMM (Remote Monitoring and Management) and unified IT management platform for managed service providers and enterprise IT departments. NinjaOne serves approximately 35,000–40,000 customers across 140+ countries, with ~70% year-over-year revenue growth in FY2025. In November 2024, ICONIQ Growth led a $500M Series C at a $5B valuation. NinjaOne acquired Dropsuite (backup software) for $270M (final price, June 2025) and rebranded it as NinjaOne Backup, which reached 15,000+ customers within 10 months. G2 ranks NinjaOne #1 in seven categories including RMM and Endpoint Management with a 4.7/5 rating from 4,295 reviews."
