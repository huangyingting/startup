callouts:
  - calloutType: strength
    title: "Kaseya Migration Wave Is a Durable Acquisition Engine"
    body: >
      Kaseya's aggressive post-acquisition price increases to its Datto MSP installed base
      in 2022–2023 created a structural migration wave that NinjaOne has captured and continues
      to benefit from. As long as Kaseya maintains bundled pricing that increases year-over-year,
      NinjaOne benefits from a recurring, competitor-funded acquisition pipeline. The product
      positioning — simpler, faster, no required professional services — maps directly to the
      grievances of Kaseya and ConnectWise migrations.
    claimRefs: [CP009, CP011, CP031]
  - calloutType: risk
    title: "Android MDM Gap Is the Critical Enterprise Win-Rate Ceiling"
    body: >
      NinjaOne's documented Android MDM limitations (inability to enforce device lockdown
      policies for BYOD Android devices) represent a high-severity moat risk for enterprise
      expansion. As more enterprise IT buyers evaluate NinjaOne for full UEM deployment,
      Android MDM capability is a table-stakes requirement that Microsoft Intune satisfies
      for free. The product roadmap gap must be closed within 18–24 months for NinjaOne to
      compete credibly in enterprise UEM RFPs.
    claimRefs: [CP021, CP035]
  - calloutType: insight
    title: "Atera's Per-Technician Model Is a Pricing-Model Disruption Threat"
    body: >
      Atera's per-technician pricing model (~$149–$229/tech/month with unlimited devices) is
      structurally disruptive to per-device pricing norms that NinjaOne and most incumbents
      use. For small MSPs managing high device-to-technician ratios, per-tech pricing can be
      materially cheaper than per-device. If Atera achieves scale and feature parity, it could
      compress NinjaOne's pricing power at the small-MSP tier. NinjaOne should model whether
      its per-device model remains competitive as Atera grows.
    claimRefs: [CP016, CP017, CP018]

