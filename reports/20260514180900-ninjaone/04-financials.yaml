      All figures are estimated from: (1) valuation/multiple inference for total ARR;
      (2) ITPro ~70% YoY growth claim for FY2025 ARR range; (3) industry-standard gross
      margin benchmarks for cloud SaaS (RMM: ~78%; backup: ~68%; blended: ~75%). No audited
      data available. Use as directional framing only.
    approximationNotes: >
      ARR estimates based on $5B valuation ÷ 15–25x multiple range = $200–333M FY2024 midpoint
      $267M, then applying 70% YoY growth = ~$454M FY2025 estimate. Gross margin of 75% is
