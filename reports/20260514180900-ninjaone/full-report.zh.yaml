      - number: '1.4'
        title: 里程碑、收购与规模
        blocks:
          - type: paragraph
            body: >
              NinjaOne 的增长轨迹由自然扩张、奖项认可和一笔重大收购共同标记。从 2013 年创立，到 2026 年 4 月在 140+ 个国家拥有约 35,000–40,000 名客户，公司在 2020 年
              Summit Partners 投资后扩张提速。约 2022 年，NinjaRMM 更名为 NinjaOne，正式把平台从纯 RMM 扩展为覆盖备份、MDM、远程访问和工单的一体化管理套件。


              最重要的战略动作是 2025 年 1 月宣布拟以约 $252M 收购云备份提供商 Dropsuite，并于 2025 年 6 月以约 $270M 最终价格完成交割。收购后，Dropsuite 被更名为
              NinjaOne SaaS Backup，覆盖范围扩展至 Microsoft 365、Google Workspace、NAS、工作站和服务器。到 2026 年 4 月，NinjaOne Backup
              独立客户数已超过 15,000，显示出强劲的交叉销售牵引。


              IT Pro 在 2026 年 1 月初报道的公司 2025 财年业绩显示，收入同比增长约 70%；该媒体称这一速度超过更广泛的 IT 管理市场。2024 年 11 月 Series C 公告和 Deloitte
              Technology Fast 500 入选进一步验证了增长动能。公开来源中未发现 NinjaOne 披露裁员、监管调查或重大诉讼。
