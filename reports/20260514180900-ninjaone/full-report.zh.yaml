    layout: standard
    notes: |
      风险位置是基于公开信息的定性评估。可能性（低 / 中 / 高）和影响（低 / 中 / 高 / 关键）采用有序等级。位于右上象限的风险优先级最高。
    claimRefs:
      - CR001
      - CR007
      - CR008
      - CR013
      - CR014
      - CR019
      - CR025
      - CR031
    data:
      columns:
        - label: 低可能性
        - label: 中可能性
        - label: 高可能性
      rows:
        - label: 关键影响
          values:
            - 客户赔偿索赔；GDPR €20M 罚款
            - 平台供应链 RMM 入侵；CEO 离职
            - —
        - label: 高影响
          values:
            - IP 侵权索赔；备份数据丢失
            - FedRAMP 缺口；Microsoft Intune 蚕食；AWS 宕机
            - 远程访问不稳定（持续）
        - label: 中影响
          values:
            - EU Data Act 合规
            - Dropsuite 集成执行；GTS 渠道集中
            - Android MDM 缺口；工程扩张
        - label: 低影响
          values:
            - —
            - Kaseya 促销带来的价格压力
            - 快速扩张中的劳动法索赔
  - id: FR002
    title: 风险传导图
    type: flow
    summary: NinjaOne 发生核心平台安全事件后，会如何向客户、监管机构和市场传导。
    layout: standard
    notes: |
      风险传导路径参照 Kaseya VSA 2021 先例建模；NinjaOne 特定影响规模基于其客户基数和平台架构估计。
    claimRefs:
      - CR007
      - CR008
      - CR009
      - CR010
      - CR031
      - CR032
    data:
      nodes:
        - id: breach
          label: NinjaOne 平台入侵
          detail: 攻击者利用 agent、API 或云基础设施漏洞
        - id: msp_customers
          label: MSP 客户受侵
          detail: 攻击者利用 NinjaOne agent，在 MSP 托管端点上部署恶意软件或窃取数据
        - id: end_clients
          label: 终端客户组织受影响
          detail: MSP 客户企业遭遇勒索软件或数据盗窃；启动 BCP/DR
        - id: backup_risk
          label: 备份数据暴露
          detail: 如果备份 API 被攻破，15,000+ 客户的 NinjaOne Backup 存储可被访问
        - id: regulatory
          label: 监管响应
          detail: 需要提交 CISA 事件报告；GDPR Art. 33 要求 72 小时内通知；FTC 可能调查
        - id: litigation
          label: 客户诉讼
          detail: MSP 客户向 NinjaOne 提出赔偿索赔；存在集体诉讼风险
        - id: reputation
          label: 品牌和市场受损
          detail: MSP 社区信任流失；加速评估 Kaseya / ConnectWise 替代方案
        - id: exit_risk
          label: IPO / M&A 退出风险
          detail: 若在 IPO S-1 提交前 12 个月内发生入侵，估值会受到重大损害；M&A 溢价蒸发
      edges:
        - from: breach
          to: msp_customers
          label: agent 访问被武器化
        - from: breach
          to: backup_risk
          label: 备份 API 被攻破
        - from: msp_customers
          to: end_clients
          label: 横向移动
        - from: msp_customers
          to: litigation
          label: MSP 提出索赔
        - from: backup_risk
          to: regulatory
          label: 数据泄露通知
        - from: end_clients
          to: litigation
          label: 终端客户索赔
        - from: litigation
          to: exit_risk
          label: 责任悬而未决
        - from: regulatory
          to: exit_risk
          label: 执法风险
        - from: msp_customers
          to: reputation
          label: 社区反应
        - from: reputation
          to: exit_risk
          label: 估值影响
  - id: FR003
    title: 依赖关系图
    type: flow
    summary: NinjaOne 的关键技术、渠道和监管依赖及其关系。
    layout: standard
    notes: |
      依赖关系显示价值流方向。单箭头表示单向依赖；没有替代路径的节点代表单点故障。
    claimRefs:
      - CR013
      - CR014
      - CR015
      - CR016
      - CR017
      - CR033
    data:
      nodes:
        - id: ninjaone
          label: NinjaOne 平台
          detail: 核心 RMM + 备份 + 文档 + 工单 + MDM
        - id: aws
          label: AWS Cloud
          detail: agent 通信、数据存储和远程访问的主要云基础设施
        - id: connectwise
          label: ConnectWise PSA
          detail: 集成伙伴；最大 MSP PSA；若 ConnectWise 扩张 RMM，将构成竞争威胁
        - id: autotask
          label: Autotask / Datto PSA
          detail: 次级 PSA 集成伙伴
        - id: halopsa
          label: HaloPSA
          detail: 第三级 PSA 集成伙伴
        - id: microsoft
          label: Microsoft Intune
          detail: 借 Microsoft 365 企业许可分发形成竞争威胁
        - id: gts
          label: GTS 渠道合作伙伴
          detail: 2026 年 4 月渠道合作；条款未披露
        - id: msp_customers
          label: 35,000+ MSP/IT 客户
          detail: 主要收入基数；覆盖 140+ 个国家
        - id: fedramp
          label: FedRAMP（尚未取得）
          detail: 美国联邦市场受阻；授权进行中尚未确认
        - id: gdpr
          label: EU GDPR / NIS2 合规
          detail: 数据处理需持续满足 EU 监管合规要求
      edges:
        - from: ninjaone
          to: aws
          label: 云基础设施
        - from: ninjaone
          to: connectwise
          label: PSA 集成
        - from: ninjaone
          to: autotask
          label: PSA 集成
        - from: ninjaone
          to: halopsa
          label: PSA 集成
        - from: gts
          to: ninjaone
          label: 渠道分发
        - from: ninjaone
          to: msp_customers
          label: 平台交付
        - from: microsoft
          to: msp_customers
          label: 竞争替代
        - from: fedramp
          to: ninjaone
          label: 政府市场受阻
        - from: gdpr
          to: ninjaone
          label: 合规义务
  - id: FV001
    title: 推荐逻辑
    type: flow
    summary: 决策逻辑流，展示尽调证据如何映射到有条件正向推荐。
    layout: standard
    notes: |
      推荐是有条件的：投入资本前必须解决阻断性尽调事项。逻辑流反映截至 2026 年 5 月运行日的研究发现。
    claimRefs:
      - CV001
      - CV003
      - CV005
      - CV006
      - CV024
      - CV025
      - CV036
    data:
      nodes:
        - id: start
          label: NinjaOne 投资决策
          detail: 基于 8 章尽调分析评估
        - id: market
          label: 市场机会 ✓
          detail: 2027 年 TAM 约 $45B；MSP 结构性顺风；已验证
        - id: product
          label: 产品匹配 ✓
          detail: 'G2 4.7/5；4,295 条评论；7 个类别 #1；已验证'
        - id: growth
          label: 增长画像 ✓（未经审计）
          detail: FY2025 同比增长 70%；35K+ 客户；备份附加率 40%
        - id: security_check
          label: 安全风险 ⚠️
          detail: RMM 供应链攻击是结构性风险；SOC 2 未审阅
        - id: financial_check
          label: 财务验证 ⚠️
          detail: ARR 未经审计；NRR 未披露；Dropsuite 成本影响未知
        - id: valuation_check
          label: 估值核查 ✓（有条件）
          detail: $5B / 10–14x ARR 若增长指标验证则可辩护
        - id: blocking
          label: 阻断性尽调事项
          detail: 经审计财务；NRR 队列；SOC 2 报告；网络责任保险；MSA 责任上限
        - id: recommend_conditional
          label: 有条件正向
          detail: 若阻断项清除则推进；目标估值上限 $4.5–5.0B
        - id: recommend_pass
          label: 放弃 / 暂缓
          detail: 若发生入侵、增长 <20% 或阻断项无法解决，则放弃
      edges:
        - from: start
          to: market
          label: 分析
        - from: start
          to: product
          label: 分析
        - from: start
          to: growth
          label: 分析
        - from: market
          to: valuation_check
          label: 支撑
        - from: product
          to: valuation_check
          label: 支撑
        - from: growth
          to: financial_check
          label: 需要验证
        - from: financial_check
          to: blocking
          label: 生成
        - from: security_check
          to: blocking
          label: 生成
        - from: blocking
          to: recommend_conditional
          label: 若已解决
        - from: blocking
          to: recommend_pass
          label: 若未解决
        - from: valuation_check
          to: recommend_conditional
          label: 支撑
  - id: FV002
    title: 估值敏感性
    type: matrix
    summary: FY2027 ARR 与 EV/ARR 退出倍数组合下的退出估值（单位 $B）敏感性。
    layout: standard
    notes: |
      进入估值为 $5.0B（2024 年 11 月 Series C 投后）。退出估值单位为 $B。数值 >$5B 表示正回报；数值 <$5B 表示资本亏损。数值 ≥$10B 隐含绿色阴影；数值 ≤$5B 隐含红色阴影。
    claimRefs:
      - CV012
      - CV013
      - CV014
      - CV015
      - CV037
      - CV038
    data:
      columns:
        - label: ARR $600M
        - label: ARR $800M
        - label: ARR $1.0B
        - label: ARR $1.2B
      rows:
        - label: EV/ARR 6x 倍数
          values:
            - $3.6B (–28%)
            - $4.8B (–4%)
            - $6.0B (+20%)
            - $7.2B (+44%)
        - label: EV/ARR 10x 倍数
          values:
            - $6.0B (+20%)
            - $8.0B (+60%)
            - $10.0B (+100%)
            - $12.0B (+140%)
        - label: EV/ARR 14x 倍数
          values:
            - $8.4B (+68%)
            - $11.2B (+124%)
            - $14.0B (+180%)
            - $16.8B (+236%)
        - label: EV/ARR 18x 倍数
          values:
            - $10.8B (+116%)
            - $14.4B (+188%)
            - $18.0B (+260%)
            - $21.6B (+332%)
  - id: FV003
    title: 估值 / 回报区间
    type: range
    summary: 从 $5B 进入估值出发，乐观、基准、悲观情景下的预期退出估值和回报倍数区间。
    layout: standard
    notes: |
      区间端点代表每个情景内第 20 和第 80 百分位结果。中心值代表概率加权情景中点。进入价格为 $5.0B（2024 年 11 月 Series C）。
    claimRefs:
      - CV012
      - CV013
      - CV014
      - CV016
      - CV017
      - CV039
    data:
      items:
        - label: 悲观情景退出估值
          min: 3000
          value: 4000
          max: 4800
          unit: $M
          detail: 20% 概率；退出时 ARR <$600M；倍数 6–8x；资本亏损情景
        - label: 基准情景退出估值
          min: 7000
          value: 8500
          max: 10400
          unit: $M
          detail: 45% 概率；退出时 ARR $700–800M；10–13x 倍数；1.4–2.1x 回报
        - label: 乐观情景退出估值
          min: 12600
          value: 17000
          max: 21600
          unit: $M
          detail: 35% 概率；退出时 ARR $900M–$1.2B；14–18x 倍数；2.5–4.3x 回报
        - label: 概率加权预期价值
          min: 6000
          value: 8250
          max: 11000
          unit: $M
          detail: 各情景混合 EV；从 $5B 进入估值计算，预期回报倍数 1.65x
  - id: FV004
    title: 投资 KPI
    type: kpi
    summary: 决定投资逻辑是否按计划推进的关键绩效指标。
    layout: standard
    notes: |
      所有 KPI 都应在投资承诺时验证。投后监控应按季度检查这些指标。标注（估计）的数值为当前估计，而非已确认数据。
    claimRefs:
      - CV003
      - CV004
      - CV005
      - CV018
      - CV040
    data:
      items:
        - label: FY2025 ARR（估计）
          value: ~$475–550M
          note: 根据 70% 同比增长估计；必须通过经审计财务验证
        - label: 净留存率（NRR）
          value: ~110–125% (est.)
          note: 仅为模型估计；未披露；阻断性尽调事项
        - label: 客户数（2026 年 4 月）
          value: 35,000–40,000
          note: 来自新闻稿；GTS 与 Backup 新闻稿区间一致
        - label: G2 评分（独立）
          value: 4.7/5 (4,295 reviews)
          note: G2 7 个类别领导者；最强独立证明点
        - label: 备份附加率
          value: ~40%
          note: 15K+ 备份客户 ÷ 总客户约 37.5K；交叉销售动能已确认
        - label: 进入 EV/ARR 倍数
          value: ~10–14x (est.)
          note: 取决于实际 FY2025 ARR；通过经审计财务验证
        - label: 乐观情景 IRR（3–5 年）
          value: 25–40%
          note: 需要 ARR CAGR 达 50–70%，且退出倍数为 14–18x
        - label: 安全风险评级
          value: HIGH (unresolved)
          note: RMM 供应链结构性风险；SOC 2 审计未审阅
