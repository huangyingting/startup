      - 威胁
      - 严重性
      - 缓释措施 / 尽调问题
    rows:
      - - 平台整合 / 工具替换（71% 替换 4+ 个工具）
        - Kaseya 和 ConnectWise 靠收购补齐 NinjaOne 的产品宽度；整合叙事变得商品化
        - 中
        - 在竞争交易数据中确认相对 Kaseya 和 ConnectWise 的净胜率；跟踪产品宽度差距是否收窄
      - - G2 品类领先（7 个品类第 1，4.7/5）
        - 客户基数扩大后，评价排名被稀释；竞品投入评价获取；Kaseya/ConnectWise 缩小差距
        - 中
        - 按季度监测 G2 和 TrustRadius 评分走势；按客户批次跟踪 NPS 队列数据
      - - 部署速度（<30 天上线生产）
        - Atera 宣称 <14 天部署；Kaseya 投入上线导入工具；差距收窄
        - 中
        - 按客户合同数据基准测试实际部署周期；核验 <30 天 SLA 达成率
      - - 按设备计费透明度
        - Kaseya 365 按技术人员计费在规模化时有竞争力；市场可能转向按技术人员计费
        - 低
        - 在赢单/输单数据中跟踪定价模型偏好；评估按技术人员与按设备计费的敏感性
      - - 98% 客户满意度得分（5+ 年）
        - 私有指标，无法审计；企业客群扩大、产品复杂度上升后，满意度可能下滑
        - 中
        - 要求披露底层 NPS/CSAT 调研方法和回复率；与独立评价得分趋势对比
      - - Dropsuite/备份交叉销售粘性
        - Datto（Kaseya 旗下）和其他 MSP 备份厂商（Veeam、Acronis）竞争；NinjaOne 备份相对较新（2025 年推出）
        - 中
        - 确认备份 ARR 贡献和留存率；评估 Dropsuite 集成路线图深度相对 Datto/Veeam 的差距
      - - Android MDM 产品缺口
        - 缺口限制企业采用；Microsoft Intune 占据主导；如果 18 个月内补不上 MDM 缺口，企业赢单率上限会被压低
        - 高
        - 向产品团队确认 Android MDM 对齐路线图和时间表；在 CRM 数据中评估可归因于 MDM 缺口的输单
      - - 远程访问可靠性
        - 社区抱怨每天 1+ 次故障；可靠性问题不解决，会伤害 MSP 信任；竞品在赢单/输单对话中强调可靠性
        - 中
        - 查看支持工单数据，判断远程访问事故频率；确认工程团队对远程访问稳定性的投入
