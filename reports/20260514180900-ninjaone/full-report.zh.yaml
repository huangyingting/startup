  - number: 5
    title: 产品与技术
    sections:
      - number: '5.1'
        title: 产品组合与模块架构
        blocks:
          - type: paragraph
            body: >
              NinjaOne 是统一 IT 管理平台，覆盖八个核心模块：RMM、补丁管理、远程访问（NinjaRemote）、MDM、端点与 SaaS 备份、文档管理和工单。所有模块都能在同一个 Web
              控制台使用——也就是公司强调的单一控制台理念——不需要单独登录或进入不同产品门户。整合能力是它相对单点方案厂商、以及 Kaseya 等传统捆绑平台的主要差异化；后者也能做到类似广度，但运营复杂度更高。

              自 NinjaRMM 创立以来，产品组合已明显扩张。2025 年 Dropsuite 收购（$270M）加入了覆盖 Microsoft 365、Google Workspace 和 Salesforce
              的自研云到云备份 IP。到 2026 年 4 月，NinjaOne Backup 声称拥有 15,000+ 客户，说明它向约 35,000–40,000 总客户基数交叉销售的动能很快。文档和工单模块在
              2022–2024 年加入，并被打包进符合条件的 RMM 订阅层级，提高每台设备价值，也抬高切换成本。

              主要模块缺口：NinjaOne 承认 Android MDM 能力不如 Microsoft Intune，限制了公司在 Android 占比较高企业环境中的适用性。面向网络设备、超出 SNMP 的网络监控截至
              2026 年 Q2 仍处于路线图 / beta 阶段。工单能力只是 PSA-lite，不能替代 ConnectWise Manage 或 Autotask。
