            body: >
              NinjaOne 先落地再扩张模式的经济性在结构上有利：每设备订阅模型会随着 MSP 客户增加设备而自动增长收入。产品从 RMM 扩展到备份、文档和工单，在同一控制台内提供更多增购路径。约 40%
              的备份附着率说明交叉销售已规模化跑通。

              客户集中度风险未知。NinjaOne 未披露前 10 或前 25 大客户贡献 ARR 比例。35,000+ 客户、覆盖 140+ 国家，暗示客户基数颗粒度较高、单一客户集中度有限；但小型 MSP（50–200
              台设备）与大型 MSP（10,000+ 台设备）的分布未知，大型 MSP 可能贡献不成比例的收入。

