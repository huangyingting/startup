              Dropsuite 的 SaaS 备份收入毛利率低于核心 RMM 平台（约 65–70%，后者约 78–82%），原因是存储 COGS，但它通过增加第二个留存钩子，显著拉高客户 LTV。客户如果在
              NinjaOne 平台归档多年 Microsoft 365 邮件备份，迁移摩擦就不再只来自 RMM 工作流锁定。即使短期压缩毛利率，这种机制也会长期筑起护城河。
