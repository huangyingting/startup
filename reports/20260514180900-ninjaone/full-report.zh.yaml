  - id: FM001
    title: 市场规模测算视角
    type: pyramid
    summary: NinjaOne IT 管理市场机会的 TAM–SAM–SOM 层级。
    layout: standard
    notes: >
      TAM 采用 Grand View Research 的 IT 管理软件口径（2023 年 $10.9B，至 2026 年增长到约 $15B）。SAM 采用受约束的 MSP 工具和中端市场 IT 管理视角（约
      $4–7B）。SOM 由估值 / 倍数和自下而上的 ACV 分析推导（约 $0.2–0.33B ARR）。所有数值均为近似值，不确定性区间较宽。
    approximationNotes: >
      TAM $14B 估计值来自 GVR 2023 年 $10.9B 数据，按 12.6% CAGR 外推 3 年得到 2026 年规模。SAM $5B 是 $4–7B 区间中点，该区间来自 CompTIA 自下而上测算 +
      Mordor 对中端市场 IT 工具的拆分，排除企业套件。SOM $0.25B 是由估值倍数推导的 $200–333M ARR 区间中点。
    claimRefs:
      - CM009
      - CM010
      - CM011
      - CM012
      - CM013
      - CM014
      - CM015
      - CM016
      - CM017
    data:
      items:
        - label: TAM — 全球 IT 管理软件（2026 年估计）
          value: 14
          unit: USD B
          detail: >
            Grand View Research 的 IT 管理软件市场（2023 年约 $10.9B，12.6% CAGR）。外推到 2026 年：约 $14B。 口径包括 RMM、UEM、补丁管理、ITAM；不包括
            EDR/EPP 和完整 ITSM。仅 Mordor 的 UEM 口径 2024 年就是 $8.2B。
        - label: SAM — MSP 工具和中端市场 IT 管理（2026 年估计）
          value: 5
          unit: USD B
          detail: >
            口径限定为 MSP RMM/PSA 工具（按约 40K 家 MSP 自下而上测算约 $2–4.8B），再加中端市场 UEM（排除 Microsoft Intune 捆绑和企业套件）。中点
            $5B。排除大型企业（>5,000 台设备），因为 NinjaOne 的部署证据有限。
        - label: SOM — NinjaOne 估计 ARR（2026）
          value: 0.25
          unit: USD B
          detail: >
            推导：$5B 估值 ÷ 15–25x ARR 倍数 = $200–333M ARR 区间，中点 $250M。自下而上交叉校验： 约 35–40K 家客户 × 估计 $6K–8K ACV =
            $210–320M。NinjaOne 未公开披露 ARR；这是误差带较宽的模型估计。
