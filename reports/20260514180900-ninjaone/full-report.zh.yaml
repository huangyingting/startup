      - number: '6.4'
        title: 留存、满意度与净收入留存
        blocks:
          - type: paragraph
            body: >
              NinjaOne 声称连续五年以上客户满意度为 98%。这家公司口径指标与 G2 来自 4,295 名评论者的 4.7/5 综合评分，以及 Capterra、TrustRadius 高评分一致。98%
              满意度意味着非常低的不满意率，但具体方法（调研形式、受访者群体，以及“满意度”衡量什么）未披露。

              净收入留存率（NRR）和总收入留存率（GRR）未公开披露。按每设备订阅模型推断：现有 MSP 客户内部设备数增长，即便没有显性产品增购，也会自然带来 100% 以上 NRR 扩张。约 40%
              备份附着率则是一个离散的扩张机制。该细分领域高质量垂直 SaaS 的行业基准通常为 110–125% NRR，但没有 NinjaOne 专属数据。

              远程访问可靠性问题（SourceForge 称约 1 次断开 / 天）是主要产品驱动流失风险。不过，脚本库、文档集成和深度 PSA
              连接带来的平台粘性，使不满意用户切换也很昂贵。未见已确认的大规模客户流失事件公开报道。
