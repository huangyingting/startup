      - number: '4.6'
        title: 关键展板
        blocks:
          - type: callout
            title: 70% YoY 收入增长意味着强产品市场匹配
            body: >
              ITPro 报道的 2025 财年收入同比增长约 70%，若经审计财务核验，将使 NinjaOne 进入同等 ARR 规模 SaaS 公司的前十分位。多数 RMM 和 UEM 平台成熟后年增长
              15–30%。Kaseya 迁移顺风、Dropsuite 交叉销售和 MSP 整合趋势叠加，说明需求真实存在，而不只是收购驱动增长。
