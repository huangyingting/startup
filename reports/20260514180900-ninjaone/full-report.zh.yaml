chapters:
  - number: 1
    title: 公司概况
    sections:
      - number: '1.1'
        title: 公司身份与商业模式
        blocks:
          - type: paragraph
            body: >
              NinjaOne, LLC 是一家私营 IT 管理软件公司，在 Texas 注册，总部位于 Austin, TX。公司 2013 年以 NinjaRMM 之名创立，约在 2022 年更名为
              NinjaOne，表明平台边界已从远程监控与管理（RMM）扩展到更宽的 IT 管理套件。产品组合覆盖 RMM、端点管理、补丁管理、移动设备管理（MDM）、云端和本地备份、远程访问工具，以及集成式 IT
              工单——全部以云原生 SaaS 交付，不要求本地基础设施。


              商业模式以订阅为主，按设备或端点计价，不强制多年合同，也不强制专业服务。公司同时面向托管服务提供商（MSP）和企业 IT 部门：前者为 SMB 外包
              IT，后者管理自有设备群。平台的核心差异化在于整合。NinjaOne 称，71% 的客户采用平台时替换了四个以上独立工具。客户通常 30 天内完成全面部署，操作人员 10 天内达到熟练使用。


              平台集成 200+ 个第三方工具，包括安全厂商、PSA 平台和身份提供商，使 NinjaOne 能充当中央管理枢纽。对许多较小的 MSP 而言，工单模块足以替代独立 PSA。截至 2026 年，NinjaOne
              支持 Windows、macOS、Linux、iOS 和 Android 端点。
