      - number: '4.4'
        title: 公开牵引指标与财务披露缺口
        blocks:
          - type: paragraph
            body: >
              NinjaOne 唯一可确认的公开财务指标是：（1）2024 年 11 月 Series C 对应 $5B 估值；（2）ITPro 报道的 2025 财年收入同比增长约
              70%（未经审计，公司口径）；以及（3）截至 2026 年 4 月客户数 35,000–40,000。公司没有披露 ARR、收入、毛利率、NRR、流失率、CAC、LTV、EBITDA 或员工数。


              如果准确且经审计财务核验，70% YoY 收入增长对 NinjaOne 这一规模的公司而言非常突出。多数可比 SaaS 公司在 $200–400M ARR 阶段年增长 20–40%；70% YoY
              意味着强劲自然市场扩张、Dropsuite 收购带来的显著交叉销售，或统计口径包含了被收购收入。没有审计或管理层确认的财务数据，这一数字置信度较低。


              35,000–40,000 的客户数区间（来自 2026 年 4 月同期新闻稿）是有意义的牵引信号，但不知道每名客户平均设备数和设备定价，就无法换算成 ARR。以说明性 $6,000/年平均 ACV 和
              37,500 名客户（中点）计算，隐含 ARR 约 $225M——与估值倍数推导区间的低端一致。


              监管财务披露完全缺失（未找到 Form D，也未找到州层面证券申报），限制了独立核验融资轮构成、所有权或资金用途的能力。
