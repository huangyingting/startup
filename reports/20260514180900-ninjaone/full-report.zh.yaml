      - number: '8.5'
        title: 建议与尽调行动计划
        blocks:
          - type: paragraph
            body: >
              建议：有条件正面——机会有吸引力，但尽调要求实质。以下阻断项解决前，不应承诺资本：（1）FY2024 和 FY2025 经审计财务报表，并验证 ARR 和 NRR；（2）在 NDA 下审阅 SOC 2 Type
              II 审计报告，范围覆盖 RMM 代理、备份基础设施和远程访问；（3）网络责任保险保单摘要，列明单次事件和总额上限；（4）法律审阅 NinjaOne MSA 中的赔偿上限和责任限制条款。

              进入纪律：如果尽调满足上述条件，$5B 标记对后期增长轮（Series C 老股或共同投资）是可辩护的。但任何新股 资本承诺都应将上限目标设在 $4.5–5.0B；如果没有对 ARR 和 NRR
              画像的审计验证，不建议在 $5B 以上投资。应谈判下行轮情景下的认股权证条款或棘轮保护。

              投资逻辑破裂监控：投资后应每月监控以下指标：（a）平台安全事件报告和 CVE 披露；（b）新闻稿中的季度客户数更新；（c）备份附着率轨迹；（d）N-able 和 SolarWinds 财报电话会中的 RMM
              市场定价信号；（e）Microsoft Intune MSP 项目公告。
