  - number: 6
    title: 客户情况
    sections:
      - number: '6.1'
        title: 客户群细分
        blocks:
          - type: paragraph
            body: >
              截至 2026 年 4 月，NinjaOne 约 35,000–40,000 个组织客户分布在 140+ 个国家。主要买方是托管服务提供商（MSP），估计占客户基数 70–80%。MSP 把 NinjaOne
              作为核心业务工具，管理第三方客户端点；这产生乘数效应，因为每个 MSP 客户通常代表数百到数千台托管设备。第二类客户是中型市场和企业组织的内部 IT 部门，它们管理自有设备队列。

              地域上，NinjaOne 客户最集中在美国（反映 Austin, TX 总部和北美 MSP 市场密度），其次是欧洲。140+ 国家足迹反映全球 MSP 市场，也反映平台云优先部署模式消除了地理基础设施壁垒。

              垂直行业细分未公开披露。RMM 买方覆盖所有需要 IT 管理的行业——医疗、金融服务、专业服务、零售和公共部门都出现在 MSP 客户基数中。NinjaOne 未披露任何垂直行业打法或按行业划分的客户集中度。
