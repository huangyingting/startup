      - number: '7.3'
        title: 运营与技术风险
        blocks:
          - type: paragraph
            body: >
              NinjaOne 的云基础设施建在包括 AWS 在内的主要超大规模云厂商上。区域性 AWS 宕机（如 2021 年 12 月和 2023 年 9 月发生的事件）会影响 NinjaOne 向受影响区域客户交付
              RMM 命令、远程访问会话和备份任务。NinjaOne 发布状态页（status.ninjaone.com）提供可用性历史；社区讨论审阅显示偶发宕机被提及，但未见公开正常运行时间 SLA 保证。

              SourceForge 评论者称远程访问可靠性大约每天断开 1 次，这是核心产品中的可衡量质量缺口。远程访问对 MSP 服务交付越来越关键（尤其是下班后支持）后，这个可靠性问题可能影响续约率和相对
              Splashtop、TeamViewer 及内置工具的竞争定位。

              Dropsuite 收购后集成（收购价 $252M；约 2025 年 6 月完成集成）带来技术债、冗余工程人员管理和客户迁移复杂性。更名为 NinjaOne Backup 之后，15,000+
              客户被加入统一平台，也带来新的备份基础设施运营责任。在这种背景下，备份数据丢失或长时间恢复失败会带来重大客户责任。
            claimRefs: []
      - number: '7.4'
        title: 合作伙伴与依赖风险
        blocks:
          - type: paragraph
            body: >
              NinjaOne 与 ConnectWise PSA、Autotask、HaloPSA 的集成，对其 MSP 工作流主张至关重要。如果 ConnectWise 或 Kaseya 收购竞争性 RMM
              平台，或发展原生 RMM 能力，它们可能优先支持自家产品集成，让使用 NinjaOne 的 MSP 处于劣势。ConnectWise 历史上收购过 PSA 邻近工具（如 ConnectWise
              Automate、ConnectWise Control），也可能把定价或集成摩擦作为竞争杠杆。

              Microsoft 是最大的长期依赖风险。Microsoft Intune（Microsoft 365 Business Premium 的一部分）在设备管理上能力越来越强，而 Microsoft 通过既有
              Microsoft 365 企业许可关系拥有分销优势，是企业 IT 买家的天然既有供应商。虽然 Intune 在 MSP 工作流上不如 NinjaOne 成熟，但 Microsoft
              对端点管理领域的投入是多年逆风。

              GTS 渠道合作增加了渠道依赖：如果 NinjaOne 新获客的相当份额依赖 GTS，GTS 表现或关系恶化都会影响 NinjaOne 增长轨迹。
