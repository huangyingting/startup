      - number: '5.4'
        title: 信任、安全、合规与可靠性
        blocks:
          - type: paragraph
            body: >
              NinjaOne 持有 SOC 2 Type II 和 ISO 27001:2013 认证，并发布信任页面，描述安全控制、加密标准（静态 AES-256、传输 TLS
              1.2+）和事件响应流程。所有管理员和技术人员账户都支持 RBAC 和 MFA。自 2013 年创立以来，未见已确认的公开数据泄露报道。

              主要合规缺口是 FedRAMP：NinjaOne 尚未取得、也未宣布推进 FedRAMP 授权，因此难以进入美国联邦和关键基础设施合同。FIPS 140-2 加密合规也未确认。对于一家处在 NinjaOne
              这个成长阶段、专注 MSP 和商业 IT 市场的公司，这些缺口并不罕见；但如果管理层转向美国政府垂直市场，它们会成为有意义的天花板约束。

              可靠性数据表明核心 RMM 表现强（监控正常运行时间 99.9%+），但按 SourceForge 评论者汇总，NinjaRemote 远程访问会在每个活跃会话日大约强制断开一次。备份模块刚从 Dropsuite
              集成而来，截至 2026 年 Q2 缺少足够公开可靠性记录。
