      - number: '3.2'
        title: 主要竞争者画像
        blocks:
          - type: paragraph
            body: >
              Kaseya 是 NinjaOne 最重要的竞争威胁，同时也是最重要的迁移动因。Kaseya 的「IT Complete」/ Kaseya 365 套餐把 RMM（VSA 或 Datto
              RMM）、PSA（Autotask）、文档（IT Glue）、备份（Datto）和安全工具打包在按技术员收取月费的方案中（按 2024 年定价，完整套餐每名技术员每月约
              $159）。捆绑定价策略带来强初始赢单率和交叉销售效率，但 Kaseya 2022–2023 年在收购后对 Datto MSP 装机基础涨价，引发广泛报道的 MSP 向 NinjaOne 和
              ConnectWise 迁移浪潮。只要 Kaseya 继续激进定价，这一迁移动能就是 NinjaOne 的结构性获客引擎。


              ConnectWise（Thoma Bravo 旗下）是第二大 MSP 既有厂商。ConnectWise Automate（RMM）和 ConnectWise
              Manage（PSA）合在一起，是按收入计算部署最广的 MSP 平台堆栈，估计拥有 25,000+ 家 MSP 客户。ConnectWise Automate 在复杂自动化场景中比 NinjaOne
              更强，但被广泛认为配置和维护明显更难。G2 和 TrustRadius 对比显示，NinjaOne 在部署速度和产品体验上持续赢下与 ConnectWise 的正面竞争；但 ConnectWise 更广的 PSA
              功能和集成仍能留住粘性客户。ConnectWise 在 2023–2024 年经历了重大产品重组，制造了一些客户流失，NinjaOne 已经捕获其中一部分。


              N-able（NYSE: NABL）是面向较小 MSP 的中端竞争者。N-able 的 N-sight（前 Remote Monitoring & Management）和 N-central 产品直接与
              NinjaOne 竞争，价格点也相近。N-able 的上市公司身份提供了收入透明度：2024 财年收入约 $443M，MSP 伙伴 27,000+。N-able 的定价和产品体验与 NinjaOne
              大体可比，因此是次要竞争风险，而非首要威胁。


              Atera 是一家新兴挑战者，定位为 AI 原生 RMM+PSA 平台。Atera 用按技术员计价模型（每名技术员每月约 $149–$229）打破按设备计价常规，吸引那些每名技术员管理大量设备的小型
              MSP。Atera 已融资约 $220M，截至 2024 年客户数约 12,000。其 AI 优先定位（工单自动化、异常检测、根因分析）对技术前倾的小型 MSP 构成差异化，但平台缺少 NinjaOne
              产品的企业深度。
