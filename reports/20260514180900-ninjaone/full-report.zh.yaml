      - number: '7.5'
        title: 财务与执行风险
        blocks:
          - type: paragraph
            body: >
              NinjaOne 在 2024 年 11 月以 $5B 估值完成 $500M Series C。同期 $252M Dropsuite 收购吃掉了约一半 Series C 资金，留下约 $250M 净新增资本（扣除
              $8.5M Dropsuite 集成成本前）。如果 FY2025 收入约 $400–500M（与从推断 FY2024 基数同比增长 70% 相符），$5B 估值意味着 EV/ARR 约 10–12x。同比增长若从
              70% 降至 40%，退出倍数会明显压缩。

              NinjaOne 自 2013 年创立以来已私有 13 年；$5B 估值和累计融资约 $761M 同时带来退出压力（需要 IPO 或战略出售向投资人返还资本）和执行风险（为一家冲刺 $1B+ ARR
              的公司扩展工程、销售和基础设施）。创始人 CEO Sal Sferlazza 的领导集中度带来连续性风险；公司未披露接班计划或联席 CEO 架构。

              整合 Dropsuite 也会占用工程领导带宽、产品管理和客户成功资源。如果 Dropsuite 备份质量问题在集成后出现（数据丢失、恢复失败），责任和修复成本可能大幅超过 $252M 收购价。
