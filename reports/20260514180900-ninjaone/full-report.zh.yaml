      - number: '6.2'
        title: 采用轨迹与规模
        blocks:
          - type: paragraph
            body: >
              NinjaOne 的客户数从 2020 年 Summit Partners 风险轮时约 5,000 增至 2026 年 4 月的 35,000–40,000，六年约 7 倍，反映 MSP 市场自然需求强。公司报告
              FY2025 收入同比增长约 70%，与客户数大幅扩张相符。2026 年 4 月宣布与 GTS（Global Technology Solutions）的渠道合作，预计将在新市场增加 MSP 合作伙伴。

              值得注意的是 NinjaOne Backup 的交叉销售轨迹：Dropsuite 更名后约 10 个月内（2026 年 4 月），15,000+ 客户采用了备份产品，占总客户基数约
              37–43%。这条轨迹证明单控制台交叉销售动作有效。如果备份附着率继续升至 60–70%，无需新增获客，也能显著扩大单客户收入。

              设备数增长是采用深度的平行指标：每个 MSP 客户会随着自身客户基数增长而持续增加设备，形成不依赖新增获客的设备数 ARR 扩张。NinjaOne 未公开披露托管设备数量。
