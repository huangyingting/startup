  - number: 3
    title: 竞争格局
    sections:
      - number: '3.1'
        title: 竞争格局概览
        blocks:
          - type: paragraph
            body: >
              NinjaOne 所处市场竞争激烈，竞争者可分为三类。第一类也是最关键的一类，是 MSP RMM 既有厂商：Kaseya（Austin TX，私营）、ConnectWise（Tampa FL，Thoma
              Bravo 投资组合）、N-able（Houston TX，NYSE: NABL）和 Datto RMM（Kaseya 旗下）。这些平台服务的核心 MSP 买方与 NinjaOne
              相同；基于行业媒体和社区证据，它们也是 NinjaOne 赢单 / 输单数据中最常见的迁出来源。Kaseya 和 ConnectWise 用二十年建立了占主导的装机基础，并通过脚本库、自动化工作流和集成 PSA
              / 会计连接施加切换成本锁定。


              第二类竞争者是企业 UEM 细分，主要由 Microsoft Intune（Microsoft）、VMware Workspace ONE（Broadcom 旗下）和 Jamf（JAMF Pro，Apple
              专家）主导。Microsoft Intune 捆绑在 M365 E3/E5 中，对企业 Microsoft 客户不收增量费用，这是 NinjaOne 向企业高端市场扩张时最重要的结构性竞争威胁。Jamf 在
              Apple 中心化环境中占据可防守的利基，而 NinjaOne 的价值主张在这类环境中较弱。


              第三类是一批新兴挑战者，正在颠覆市场的局部细分：Atera（Tel Aviv，AI 原生 RMM+PSA，按技术员计价）、Syncro（面向小型 MSP 的集成 RMM+PSA，已被 Kaseya 收购）和
              ManageEngine（Zoho Corp 事业部，广泛 IT 管理套件，亚洲市场定价有竞争力）。这些挑战者主要在小型 MSP 和成本敏感型 SMB 层级竞争，而不是 NinjaOne 的中端市场核心。
