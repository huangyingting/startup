      - number: '5.2'
        title: 技术架构与基础设施
        blocks:
          - type: paragraph
            body: >
              NinjaOne 平台是云原生、多租户 SaaS，只通过互联网交付，没有本地部署选项。端点代理是轻量级软件进程，安装在 Windows（7+）、macOS（10.13+）和主要 Linux 发行版上。代理通过
              HTTPS 443 端口向外通信，不需要入站防火墙规则——这个架构选择简化了锁定网络环境里的部署，也经常被客户认为是低于 30 天上线承诺的关键支撑。

              NinjaOne 平台坚持 API 优先：控制台全部操作都通过有文档的 REST API 暴露，使 MSP 能把 NinjaOne 功能嵌入自定义门户、NOC 仪表盘和自动化流水线。集成目录列出 100+
              个开箱即用连接器，覆盖 PSA、安全、计费、身份和可观测性。ConnectWise Manage 集成已获认证，双方都有文档，支持工单与计费双向同步。

              重大基础设施未知仍在：NinjaOne 未确认主要云服务商（AWS、Azure 或 GCP）、除 EU GDPR
              合规之外的数据中心区域，也未确认具体多租户隔离架构。没有本地部署，对气隙环境、受监管金融机构和政府机构都是结构性限制。
