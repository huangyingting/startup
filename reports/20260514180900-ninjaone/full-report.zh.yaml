      - number: '1.5'
        title: 产品平台与市场位置
        blocks:
          - type: paragraph
            body: >
              NinjaOne 在 MSP 工具和 SMB / 中端市场 IT 管理领域占据强势位置，同行评测平台提供了支撑证据。近期报道显示，平台在 G2 上基于 4,295 条评价获得 4.7/5 评分，并在 7 个 G2
              品类中排名第一。TrustRadius 和 SourceForge 评价也确认，用户对核心 RMM 和补丁管理能力的情绪持续正面；不过，用户反馈同时暴露出明显产品缺口。


              关键用户反馈显示，NinjaOne 的 Android MDM 能力不如 Microsoft Intune 等竞争对手成熟——具体而言，用户无法通过 NinjaOne MDM 对 Android
              设备执行某些电子邮件访问锁定策略。远程访问可靠性也被反复提及为弱项，一些用户报告远程桌面模块每天都会出现连接失败。对于拥有大量 Android 设备群或严格零信任访问要求的企业客户，这些缺口尤为相关。


              与 Kaseya VSA、ConnectWise Automate 等既有 RMM 平台相比，G2 评分数据让 NinjaOne 持续处于更高位置；但本研究周期未完成正式的逐项功能审计。公司连续五年获得 98%
              客户满意度，说明留存可能很强；不过，缺少公开的 NRR、流失率或 ARR 数据，限制了对规模化留存的确认能力。
