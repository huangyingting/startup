      - number: '7.2'
        title: 监管与法律风险
        blocks:
          - type: paragraph
            body: >
              NinjaOne 未取得 FedRAMP 授权，因此被排除在美国联邦政府 IT 采购之外，也限制了州 / 地方政府部署。随着政府机构越来越多要求 IT 管理工具获得 FedRAMP 授权，NinjaOne
              的政府市场机会实际上被挡住。FedRAMP 授权通常需要 12–24 个月和 $2–5M 合规投入；Dropsuite 备份模块还会增加范围。

              处理欧盟客户数据需要持续满足 GDPR。NinjaOne 发布了 GDPR 数据处理附录，但未披露用于欧盟数据驻留的数据中心位置。EU Data Act（2025 年 9 月生效）和 NIS2
              Directive（2024 年 10 月生效）扩大了在欧盟管理关键 IT 基础设施的云软件提供商合规义务。考虑到 NinjaOne 覆盖 140+
              国家，欧盟客户基数有分量；任何合规失败都可能触发最高为全球年收入 4% 的 GDPR 罚款。

              未见针对 NinjaOne 的重大诉讼公开报道。公司组织形式为 NinjaOne, LLC（Austin, TX）；在 EDGAR 数据库未找到 SEC Form D 文件，符合一家未按 Regulation D
              寻求 SEC 豁免的私人公司情况。法律风险包括平台介导安全事件引发的客户赔偿索赔、RMM / 备份技术既有厂商的 IP 侵权索赔，以及公司从约 1,000 人扩张到 3,000+ 员工时的雇佣索赔。
