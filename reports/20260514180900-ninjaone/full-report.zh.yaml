  - number: 7
    title: 风险
    sections:
      - number: '7.1'
        title: 网络安全与平台安全风险
        blocks:
          - type: paragraph
            body: >
              NinjaOne 为 35,000+ 个组织运营关键基础设施：一旦平台被成功攻陷，攻击者就能在所有客户的所有托管端点上同时部署恶意软件、外泄数据或摧毁备份。Kaseya VSA 勒索软件攻击（2021 年 7
              月）展示了这个精确威胁向量：单个 RMM 厂商漏洞同时把 REvil 勒索软件投递给 1,500+ 个组织。CISA 在 2023、2024 年多次发布公告，警告 RMM
              工具正被国家级和犯罪威胁行为者主动利用，原因正是它们拥有特权端点访问。

              NinjaOne 声称具备 SOC 2 Type II 合规、端到端加密、多因素认证强制和基于角色的访问控制。但 NinjaOne 未公开发布 SOC 2
              审计报告或鉴证函。第三方安全审计结果和渗透测试披露也无法供外部审阅。考虑到平台为 140+ 国家 35,000+ 客户处理凭据、远程访问会话和备份数据，缺少公开安全审计披露是重大尽调缺口。

              2024 年 ConnectWise Automate 漏洞（CVE-2024-1709，CVSS 10.0）和 2024 年 AnyDesk 凭据被盗事件表明，即使资本充足的 RMM
              和远程访问厂商也面临主动利用。NinjaOne 的远程访问模块、云代理基础设施和备份数据存储，是三类最高价值攻击目标。
