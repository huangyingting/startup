      - number: '1.2'
        title: 创始人、领导层与治理
        blocks:
          - type: paragraph
            body: >
              NinjaOne 由 Sal Sferlazza、Christopher Matarese 和 Eric Herrera 于 2013 年共同创立。截至 2026 年，Sal Sferlazza
              担任首席执行官，也是公司在新闻稿和合作伙伴公告中的主要公开面孔。创始团队在 MSP 工具和端点管理领域的经验，塑造了公司的产品驱动增长模式，并支撑其早期在竞争激烈的 RMM 市场获得牵引。


              CEO 以下的高管团队包括 Matt Hastings（产品管理高级副总裁），负责平台路线图及 Dropsuite 备份收购后的整合；以及 Joe Lohmeier（全球渠道销售副总裁），负责公司的 MSP
              和渠道伙伴生态。公司未公开 CFO 或董事会构成，这符合私营公司常见的信息不透明状态。


              公开来源中未发现 2025 或 2026 年发生重大高管离任，但证据基础仅限于行业媒体和合作伙伴公告。作为私营公司，董事会层面的治理信息没有披露。Sferlazza
              承担了大量公开领导职能，形成关键人依赖风险；任何交易流程都需要进一步尽调。
