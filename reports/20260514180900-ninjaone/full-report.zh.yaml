      - number: '2.5'
        title: 关键展板
        blocks:
          - type: callout
            title: MSP 整合浪潮创造持久平台需求
            body: >
              MSP 从单点工具堆栈转向集成平台的结构性变化，直接放大了 NinjaOne 的总可用市场。CompTIA 数据显示，67% 的渠道公司优先考虑工具整合；NinjaOne 称 71%
              客户替换了四个或更多工具，说明平台正在赢下这条逻辑。合规要求顺风（CMMC 2.0、网络保险要求）又增加了一种拉动机制，它来自监管，而不只是经济因素。
            calloutType: strength
            claimRefs:
              - CM026
              - CM027
              - CM028
          - type: callout
            title: Microsoft Intune 捆绑限制企业上行空间
            body: >
              Microsoft 将 Intune 捆绑进 M365 E3/E5 且不收增量费用，在大型企业中形成几乎难以穿透的护城河，也给中端市场带来显著逆风。NinjaOne 必须持续证明自己相对一个已经付费的工具具备
              ROI 和能力优势，才能赢下企业交易；这提高了企业销售动作的成本和复杂度。NinjaOne 相对 Intune 的 Android MDM 缺口，也进一步削弱其在 Android 密集环境中的企业差异化论证。
            calloutType: risk
            claimRefs:
