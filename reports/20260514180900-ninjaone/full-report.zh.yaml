      - number: '1.3'
        title: 融资历史、估值与资本结构
        blocks:
          - type: paragraph
            body: >
              NinjaOne 已完成两轮可确认的外部股权融资。2020 年 3 月，Summit Partners 领投公司（当时以 NinjaRMM 运营）的一轮风险融资。2024 年 11 月，ICONIQ Growth
              领投 $500M Series C，投后估值 $5B，Frank Slootman（Snowflake 和 ServiceNow 前 CEO）以个人投资者身份参与。CBInsights 将披露融资总额列为约
              $761.5M，但除两笔已确认融资外，早期轮次的构成在公开数据库中没有完整记录。


              $5B 估值体现了后期 SaaS 平台在强劲收入增长动能下常见的显著上调。EDGAR 系统中未找到 NinjaOne, LLC 或 NinjaRMM 的 SEC Form D
              披露；这可能源于面向非美国投资者的离岸结构、仅有州层面申报，或公开记录不完整——仍是未解决的尽调缺口。公司未公开收入、EBITDA 和毛利率；截至 2026 年 5 月，公司也未释放 IPO 时间表。


              Series C 资金投向产品创新（包括 Dropsuite 备份收购）、国际扩张和渠道伙伴项目。截至 2026 年，资本结构看起来只有股权融资，未披露信贷额度或债务工具；但没有公司账簿的一手访问，无法确认。
