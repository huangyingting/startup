          detail: G2 评论（自然）；社群 / Reddit；行业媒体；Kaseya 迁移事件；合作伙伴转介
        - id: trial
          label: 试用 / PoC
          detail: 自助试用；内勤销售协助；<30 天部署承诺加速 PoC
        - id: close
          label: 首单 ACV（估算约 $6K/年）
          detail: 按设备订阅；平均 MSP 客户估计管理 200–300 台设备 × $2–3/设备/月
        - id: cac
          label: 估算 CAC（约 $6–15K）
          detail: 产品驱动的入站获客比纯直销降低 CAC；S&M ÷ 当期新增客户数
        - id: expand
          label: 扩张（新增设备、备份交叉销售）
          detail: 设备群增长带来新增设备；NinjaOne Backup 作为附加产品销售；隐含约 110%+ NRR
        - id: ltv
          label: LTV（估算约 $18–40K）
          detail: ACV × 估算 3–5 年留存期；MSP 脚本 / 工作流锁定；98% 满意度意味着低流失
        - id: payback
          label: 回本期（约 18–30 个月）
          detail: ACV / CAC × 12；以当前增长阶段的订阅业务看较健康
      edges:
        - from: discovery
          to: trial
          label: 入站 / 转介
        - from: trial
          to: close
          label: 40–60% 转化
        - from: close
          to: expand
          label: 设备增长 + 备份
        - from: expand
          to: ltv
          label: 多年留存
        - from: close
          to: cac
          label: S&M / 入职成本
        - from: cac
          to: payback
          label: ACV ÷ CAC × 12
  - id: FI003
    title: 财务估算区间
    type: range
    summary: 用多种倍数反推方法得出的 NinjaOne FY2024 和 FY2025 低 / 基准 / 高 ARR 估算。
    layout: standard
    notes: |
      ARR 未披露。三种独立推断方法得到所示区间。低值采用保守 20x 倍数；基准采用 20x + ITPro 增长率； 高值采用 25x 倍数 + 乐观增长。所有数值均为估算，不确定性很大。
    claimRefs:
      - CI021
      - CI022
      - CI023
      - CI024
      - CI025
    data:
      items:
        - label: NinjaOne FY2024 ARR（USD M，估算）
          low: 200
          base: 267
          high: 333
          unit: USD M
          detail: |
            低：$5B 估值 ÷ 25x 倍数 = $200M。基准：$5B ÷ 约 19x 中点 = $267M。高：$5B ÷ 15x = $333M。全部以 2024 年 11 月 Series C 轮估值为锚。
        - label: NinjaOne ARR FY2025（USD M，按 +70% YoY）
          low: 340
          base: 454
          high: 566
          unit: USD M
          detail: >
            将 70% YoY 增长（ITPro 2026 年 1 月，未经审计）套用到 FY2024 区间。低：$200M × 1.7 = $340M。基准：$267M × 1.7 = $454M。高：$333M × 1.7
            = $566M。不确定性很大；增长率可能包含收购 Dropsuite 带来的收入。
