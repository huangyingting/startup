      - number: '8.4'
        title: 可比公司与基准分析
        blocks:
          - type: paragraph
            body: >
              NinjaOne 位于 MSP / RMM 软件品类，邻近端点管理和 IT 运营 SaaS。公开可比公司包括 N-able（NYSE: NBLE，市值约 $1.5B，约 4x
              ARR）、SolarWinds（NYSE: SWI，市值约 $4.5B，约 5x ARR）和 SentinelOne（NYSE: S，市值约 $10B，端点安全约 10x ARR）。这些可比项反映
              2024–2026 年软件公司估值压缩环境，只有增长最快的公司才能拿到溢价倍数。

              私募市场中，NinjaOne 最接近的可比是 Cybereason（私有，端点安全，曾以约 $3B 估值融资但随后陷入困境）——不过 NinjaOne 的 RMM 经济性更持久。Absolute Software
              2023 年被 Crosspoint Capital 以约 $900M（约 6x ARR）收购，以及 Ivanti 收购 MobileIron / Pulse / Cherwell（PE 支持，隐含约
              $2B），提供了低增长率下的 M&A 可比。

              最匹配 NinjaOne 增长画像的乐观可比是 Jamf（Apple 设备管理），它 2020 年以 $3.5B 估值 IPO，峰值市值达到 $7B；Jamf 上市时增长 25–35%。如果 NinjaOne 的
              70% 增长率能延续，IPO 时会比 Jamf 更有利，但 MSP RMM TAM 更广，NinjaOne 平台广度也更大。
            claimRefs: []
