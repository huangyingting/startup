      - number: '6.3'
        title: 具名客户证明与引用可得性
        blocks:
          - type: paragraph
            body: >
              NinjaOne 的公开客户证明主要是汇总数据和评论，而不是具名企业引用。G2 有 4,295 条用户评论、评分 4.7/5，NinjaOne 在 RMM、Endpoint Management、Remote
              Monitoring and Management 等七个 G2 类别排名第 1。TrustRadius、Capterra 和 SourceForge 也提供额外评论佐证。这是 MSP RMM
              市场中公开可获得、密度最高的客户满意度证明。

              具名企业客户案例并未被 NinjaOne 突出发布。对于主要通过 MSP 渠道销售的平台，这并不异常；MSP 关系才是主要客户关系，MSP 自己的客户很少被点名。缺少已发布 Fortune 500
              或大型企业引用，确实给想验证大规模企业级部署的投资人留下缺口。

              GTS 合作（2026 年 4 月）和 Dropsuite 备份采用轨迹提供了采用规模的间接证明。Reddit r/msp 社区帖子经常提到，Kaseya 2021
              年勒索软件事件及后续定价争议之后，NinjaOne 是 MSP 从 Kaseya VSA 迁出的目的地——这个社区迁移信号是可信的自然采用指标。
