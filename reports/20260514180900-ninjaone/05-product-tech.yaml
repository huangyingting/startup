figures:
  - id: FE001
    title: "Product architecture map"
    type: flow
    summary: "High-level architecture of NinjaOne's cloud platform from endpoint agents through the SaaS cloud layer to the MSP console and integrations."
    layout: standard
    notes: >
      Cloud infrastructure provider is unconfirmed. Arrows represent data flows:
      agent to cloud ingest to management plane to MSP console.
    claimRefs: [CE009, CE010, CE011, CE036, CE039, CE021, CE033]
    data:
      nodes:
        - id: endpoints
          label: "Managed Endpoints"
          detail: "Windows, Mac, Linux devices; iOS/Android MDM; network devices (roadmap)"
        - id: agent
          label: "NinjaOne Agent (HTTPS:443)"
          detail: "Lightweight outbound agent; collects metrics, applies patches, executes scripts"
        - id: cloud
          label: "NinjaOne Cloud (Multi-Tenant SaaS)"
          detail: "Public cloud infrastructure (provider undisclosed); AES-256 at rest, TLS 1.2+ in transit"
        - id: mgmt
          label: "Management Plane"
          detail: "Alerting engine, automation scheduler, patch orchestrator, backup controller"
        - id: console
          label: "MSP / IT Admin Console"
          detail: "Single-pane dashboard: monitoring, patching, remote access, backup, docs, ticketing"
        - id: api
          label: "REST API"
          detail: "Full platform coverage; bidirectional; enables PSA/ITSM/custom integrations"
        - id: integrations
          label: "Third-Party Integrations (100+)"
          detail: "PSA: ConnectWise, Autotask; Security: Bitdefender, SentinelOne; Billing, identity"
      edges:
        - from: endpoints
          to: agent
          label: "agent installed"
        - from: agent
          to: cloud
          label: "HTTPS telemetry"
        - from: cloud
          to: mgmt
          label: "event processing"
        - from: mgmt
          to: console
          label: "real-time dashboard"
        - from: console
          to: api
          label: "API calls"
        - from: api
          to: integrations
          label: "webhook / connector"
        - from: mgmt
          to: agent
          label: "commands (patch, script, remote)"

