        - label: "MDM (iOS/macOS)"
          values: ["4", "4", "Competitive"]
        - label: "MDM (Android)"
          values: ["2", "3", "Lagging Intune"]
        - label: "Endpoint Backup"
          values: ["4", "4", "Maturing; integration in progress"]
        - label: "SaaS Backup"
          values: ["4", "4", "Competitive (Dropsuite IP)"]
        - label: "Documentation"
          values: ["3", "4", "Good; IT Glue still deeper"]
        - label: "Ticketing / PSA-lite"
          values: ["3", "4", "Adequate; not PSA replacement"]
        - label: "API / Integrations"
          values: ["5", "4", "Best-in-class API coverage"]

