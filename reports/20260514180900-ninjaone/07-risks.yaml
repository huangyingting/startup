  evidenceGaps:
    - type: not-public
      severity: blocking
      topic: soc2-audit-report
      missingEvidence: "SOC 2 Type II audit report and attestation letter not publicly available; most recent audit date unknown"
      whyItMatters: "Investors cannot assess NinjaOne's security control effectiveness without reviewing the SOC 2 report; this is standard diligence for critical infrastructure vendors"
      diligencePath: "Request SOC 2 Type II report under mutual NDA from CISO; verify audit scope covers RMM agent, backup infrastructure, and remote access module"
      relatedQuestionRefs: [QR002, QR020, QR024]

    - type: not-public
      severity: blocking
      topic: financial-metrics
      missingEvidence: "Audited ARR, cash position, burn rate, and runway not publicly disclosed; FY2025 revenue growth is unaudited company claim"
      whyItMatters: "Financial health and runway are critical investment metrics; unaudited revenue claims cannot be relied upon for investment underwriting"
      diligencePath: "Request audited financials for FY2023, FY2024, FY2025; confirm cash and ARR position post-Dropsuite acquisition"
      relatedQuestionRefs: [QR015, QR016]

    - type: not-public
      severity: material
      topic: fedramp-roadmap
      missingEvidence: "NinjaOne has not disclosed FedRAMP authorization roadmap or timeline; government market exclusion is not quantified"
      whyItMatters: "FedRAMP gap represents a material lost market opportunity; investor thesis should account for whether government vertical is in the model or out"
      diligencePath: "Ask leadership for FedRAMP authorization timeline and estimated investment; assess how large the government market opportunity is relative to overall TAM"
      relatedQuestionRefs: [QR003, QR028]

    - type: not-public
      severity: material
      topic: cyber-liability-insurance
      missingEvidence: "Cyber-liability insurance coverage amount and policy scope not disclosed"
      whyItMatters: "In a platform-mediated RMM breach scenario, the customer indemnification liability could significantly exceed coverage if inadequate"
      diligencePath: "Request cyber-liability policy summary including per-event limits, aggregate limits, and third-party MSP customer coverage scope"
      relatedQuestionRefs: [QR007, QR025]

    - type: private-evidence-only
      severity: material
      topic: eu-data-residency
