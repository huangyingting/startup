figures:
  - id: FR001
    title: "Risk heatmap"
    type: matrix
    summary: "Risk heatmap plotting NinjaOne's key risks across likelihood (X-axis) and impact (Y-axis)."
    layout: standard
    notes: >
      Risk positions are qualitative assessments based on public information. Likelihood
      (Low/Medium/High) and Impact (Low/Medium/High/Critical) are on ordinal scales.
      Risks appearing in the upper-right quadrant are highest priority.
    claimRefs: [CR001, CR007, CR008, CR013, CR014, CR019, CR025, CR031]
    data:
      columns:
        - label: "Low Likelihood"
        - label: "Medium Likelihood"
        - label: "High Likelihood"
      rows:
        - label: "Critical Impact"
          values: ["Customer indemnification claim; GDPR €20M fine", "Platform supply-chain RMM breach; CEO departure", "—"]
        - label: "High Impact"
          values: ["IP infringement claim; backup data loss", "FedRAMP gap; Microsoft Intune encroachment; AWS outage", "Remote access instability (ongoing)"]
        - label: "Medium Impact"
          values: ["EU Data Act compliance", "Dropsuite integration execution; GTS channel concentration", "Android MDM gap; engineering scaling"]
        - label: "Low Impact"
          values: ["—", "Pricing pressure from Kaseya promotions", "Employment law claims during rapid scale"]

  - id: FR002
    title: "Risk transmission map"
    type: flow
    summary: "How a primary platform security breach at NinjaOne would cascade through customers, regulators, and the market."
    layout: standard
    notes: >
      Risk transmission paths are modeled on the Kaseya VSA 2021 precedent; NinjaOne-specific
      impact scale is estimated based on its customer base and platform architecture.
    claimRefs: [CR007, CR008, CR009, CR010, CR031, CR032]
    data:
      nodes:
        - id: breach
          label: "NinjaOne Platform Breach"
          detail: "Attacker exploits agent, API, or cloud infrastructure vulnerability"
        - id: msp_customers
          label: "MSP Customer Compromise"
          detail: "Attacker uses NinjaOne agent to deploy malware or exfiltrate data across MSP-managed endpoints"
        - id: end_clients
          label: "End-Client Organization Impact"
          detail: "Ransomware or data theft at MSP clients' businesses; BCP/DR activation"
        - id: backup_risk
          label: "Backup Data Exposure"
          detail: "NinjaOne Backup stores for 15,000+ customers accessible if backup API compromised"
        - id: regulatory
          label: "Regulatory Response"
          detail: "CISA incident report required; GDPR Art. 33 notification within 72 hours; FTC investigation possible"
        - id: litigation
          label: "Customer Litigation"
          detail: "MSP customers file indemnification claims against NinjaOne; class action risk"
        - id: reputation
          label: "Brand and Market Damage"
          detail: "MSP community loss of trust; accelerated evaluation of Kaseya/ConnectWise alternatives"
        - id: exit_risk
          label: "IPO / M&A Exit Risk"
          detail: "Breach within 12mo of IPO S-1 filing would materially impair valuation; M&A premium evaporates"
      edges:
        - from: breach
          to: msp_customers
          label: "agent access weaponized"
        - from: breach
          to: backup_risk
          label: "backup API compromise"
        - from: msp_customers
          to: end_clients
          label: "lateral movement"
        - from: msp_customers
          to: litigation
          label: "MSP files claim"
        - from: backup_risk
          to: regulatory
          label: "data breach notification"
        - from: end_clients
          to: litigation
          label: "end-client claims"
        - from: litigation
          to: exit_risk
          label: "liability overhang"
        - from: regulatory
          to: exit_risk
          label: "enforcement risk"
        - from: msp_customers
          to: reputation
          label: "community response"
        - from: reputation
          to: exit_risk
          label: "valuation impact"

