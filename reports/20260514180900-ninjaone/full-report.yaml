      - number: '7.5'
        title: Financial and Execution Risk
        blocks:
          - type: paragraph
            body: >
              NinjaOne raised $500M in its November 2024 Series C at a $5B valuation. The concurrent $252M Dropsuite
              acquisition consumed approximately half the Series C capital, leaving roughly $250M in net new capital
              (before the $8.5M Dropsuite integration costs). If FY2025 revenue was approximately $400–500M (consistent
              with 70% YoY growth from an inferred FY2024 base), the $5B valuation implies an EV/ARR multiple of
              approximately 10–12x. A deceleration in growth from 70% to 40% YoY would compress the exit multiple
