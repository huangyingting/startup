      - number: '7.2'
        title: Regulatory and Legal Risk
        blocks:
          - type: paragraph
            body: >
              NinjaOne has not achieved FedRAMP authorization, which excludes it from U.S. federal government IT
              procurement and limits state/local government deployment. As government agencies increasingly mandate
              FedRAMP-authorized tools for IT management, NinjaOne's government market opportunity remains effectively
              blocked. FedRAMP authorization typically requires 12–24 months and $2–5M in compliance investment; the
              Dropsuite backup module adds additional scope.

              GDPR compliance for EU-based customer data processing is an ongoing requirement. NinjaOne publishes a GDPR
              data processing addendum but has not disclosed data center locations used for EU data residency. The EU
              Data Act (effective September 2025) and NIS2 Directive (effective October 2024) expand compliance
              obligations for cloud software providers managing critical IT infrastructure in the EU. NinjaOne's EU
              customer base is meaningful given its 140+ country reach; any compliance failure could trigger GDPR fines
              of up to 4% of global annual revenue.

              No material litigation has been publicly reported against NinjaOne. The company is organized as NinjaOne,
              LLC (Austin, TX); no SEC Form D filings were found in the EDGAR database, consistent with a private
              company not seeking SEC exemption under Regulation D. Legal risks include customer indemnification claims
              arising from a platform-mediated breach, IP infringement claims from RMM/backup technology incumbents, and
              employment claims as the company scales from ~1,000 to 3,000+ employees.
            claimRefs: []
