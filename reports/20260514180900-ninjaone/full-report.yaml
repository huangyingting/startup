        title: Adoption Trajectory and Scale
        blocks:
          - type: paragraph
            body: >
              NinjaOne has grown its customer base from approximately 5,000 customers at the time of the 2020 Summit
              Partners venture round to 35,000–40,000 by April 2026 — a roughly 7x increase over six years reflecting
              strong organic demand in the MSP market. The company reported approximately 70% year-over-year revenue
              growth for FY2025, consistent with significant customer count expansion. The channel partnership with GTS
              (Global Technology Solutions) announced April 2026 is expected to add incremental MSP partners in new
              markets.

              The NinjaOne Backup cross-sell trajectory is notable: 15,000+ customers adopted the backup product within
              approximately 10 months of the Dropsuite rebrand (April 2026), representing an attach rate of
              approximately 37–43% of the total customer base. This trajectory demonstrates the effectiveness of the
              single-console cross-sell motion. If the backup attach rate continues growing to 60–70%, it would
              materially expand revenue per customer without requiring new customer acquisition.

              Device count growth is a parallel indicator of adoption depth: each MSP customer adds devices over time as
              their own client base grows, creating device-count ARR expansion without new customer acquisition.
