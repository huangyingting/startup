  - number: 7
    title: Risks
    sections:
      - number: '7.1'
        title: Cybersecurity and Platform Security Risk
        blocks:
          - type: paragraph
            body: >
              NinjaOne operates critical infrastructure for 35,000+ organizations: a successful compromise of its
              platform would allow attackers to simultaneously deploy malware, exfiltrate data, or destroy backups
              across all managed endpoints of all customers. The Kaseya VSA ransomware attack (July 2021) demonstrated
              this exact threat vector, delivering REvil ransomware to 1,500+ organizations simultaneously through a
              single RMM vendor vulnerability. CISA has issued multiple advisories (2023, 2024) warning that RMM tools
              are actively exploited by nation-state and criminal threat actors specifically because of their privileged
              endpoint access.

              NinjaOne claims SOC 2 Type II compliance, end-to-end encryption, multi-factor authentication enforcement,
              and role-based access control. However, NinjaOne has not published its SOC 2 audit report or attestation
              letter publicly. Third-party security audit results and penetration test disclosures are not available for
              external review. Given that the platform handles credentials, remote access sessions, and backup data for
              35,000+ customers in 140+ countries, the absence of public security audit disclosure is a material
              diligence gap.

              The 2024 ConnectWise Automate vulnerability (CVE-2024-1709, CVSS 10.0) and 2024 AnyDesk credential theft
              incident illustrate that even well-capitalized RMM and remote access vendors face active exploitation.
              NinjaOne's remote access module, cloud agent infrastructure, and backup data stores represent the three
              highest-value attack targets.
