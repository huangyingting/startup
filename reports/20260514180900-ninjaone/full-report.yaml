      - number: '1.5'
        title: Product Platform and Market Position
        blocks:
          - type: paragraph
            body: |
              NinjaOne occupies a strong position in the MSP tooling and SMB/mid-market IT management
              space, supported by peer review platform evidence. On G2, the platform holds a 4.7-out-of-5
              rating across 4,295 reviews and is the top-ranked product in 7 G2 categories as of recent
              reporting. TrustRadius and SourceForge reviews confirm consistently positive user sentiment
              on core RMM and patch management capabilities, though user feedback also surfaces notable
              product gaps.

              Critical user feedback indicates that NinjaOne's Android MDM capabilities are less mature
              than competitors such as Microsoft Intune — specifically, users cannot enforce certain
              email-access lockdown policies on Android devices through NinjaOne MDM. Remote access
              reliability is also cited as a recurring weakness, with some users reporting daily
              connection failures in the remote desktop module. These gaps are particularly relevant
              for enterprise customers with large Android device fleets or strict zero-trust access
              requirements.

              Compared to incumbent RMM platforms such as Kaseya VSA and ConnectWise Automate, G2
              ratings data places NinjaOne consistently higher, though a formal side-by-side feature
              audit was not completed in this research cycle. The company's 98% customer satisfaction
              score over five consecutive years suggests strong retention, but the absence of disclosed
              NRR, churn, or ARR data limits the ability to confirm this at scale.
            claimRefs:
              - CO018
              - CO019
              - CO036
              - CO037
