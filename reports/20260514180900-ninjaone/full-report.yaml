      - number: '2.5'
        title: Exhibits
        blocks:
          - type: callout
            title: MSP Consolidation Wave Creates Durable Platform Demand
            body: >
              The structural shift among MSPs from point-tool stacks to integrated platforms directly amplifies
              NinjaOne's total addressable market. CompTIA data shows that 67% of channel firms prioritize tool
              consolidation, and NinjaOne's claim that 71% of its customers replaced four or more tools demonstrates
              that the platform is winning on this thesis. The compliance-mandate tailwinds (CMMC 2.0, cyber-insurance
              requirements) add an additional pull mechanism that is regulatory rather than purely economic.
            calloutType: strength
            claimRefs:
              - CM026
              - CM027
              - CM028
          - type: callout
            title: Microsoft Intune Bundling Limits Enterprise Upside
            body: >
              Microsoft's bundling of Intune in M365 E3/E5 at no incremental cost creates a near- impenetrable moat in
              large enterprises and a significant headwind in the mid-market. NinjaOne must consistently demonstrate ROI
              and capability advantages over an already- paid-for tool to win enterprise deals, raising the cost and
              complexity of the enterprise sales motion. NinjaOne's noted Android MDM gap relative to Intune further
              weakens its enterprise differentiation argument in Android-heavy environments.
            calloutType: risk
            claimRefs:
              - CM029
              - CM030
              - CM031
          - type: callout
            title: SaaS Backup Compliance Mandates Create a Second Growth Vector
            body: >
              The Dropsuite acquisition positions NinjaOne ahead of the emerging M365/GWS backup compliance requirement
              wave. Cyber-insurance questionnaires and emerging regulatory expectations around SaaS data protection are
              forcing IT buyers who previously relied on Microsoft's native retention to add third-party backup. With
              15,000+ backup customers by April 2026, NinjaOne Backup has validated early traction in this market before
              the compliance mandate wave peaks.
            calloutType: insight
            claimRefs:
              - CM033
              - CM034
