      - number: '5.2'
        title: Technical Architecture and Infrastructure
        blocks:
          - type: paragraph
            body: >
              NinjaOne's platform is cloud-native and multi-tenant SaaS delivered exclusively over the internet with no
              on-premises option. The endpoint agent is a lightweight software process installed on Windows (7+), macOS
              (10.13+), and major Linux distributions. The agent communicates outbound via HTTPS on port 443, requiring
              no inbound firewall rules — an architectural decision that simplifies deployment in locked-down network
              environments and is frequently cited by customers as a critical enabler of the sub-30-day onboarding
              promise.

              NinjaOne's platform is API-first: all console operations are exposed through a documented REST API,
              enabling MSPs to embed NinjaOne functionality in custom portals, NOC dashboards, and automation pipelines.
              The integrations catalog lists over 100 out-of-the-box connectors spanning PSA, security, billing,
              identity, and observability categories. The ConnectWise Manage integration is certified and documented by
              both vendors, enabling bidirectional ticket and billing sync.

              Significant infrastructure unknowns remain: NinjaOne has not confirmed its primary cloud provider (AWS,
              Azure, or GCP), data center regions beyond EU GDPR compliance, or exact multi-tenancy isolation
              architecture. The absence of on-premises deployment is a structural limitation for air-gapped
              environments, regulated financial institutions, and government agencies.
