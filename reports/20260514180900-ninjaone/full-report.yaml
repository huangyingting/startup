        title: Roadmap, Integration Depth, and Known Gaps
        blocks:
          - type: paragraph
            body: >
              NinjaOne's 2026 product roadmap as communicated to channel press centers on four priorities: NinjaAI
              (alert triage and automated remediation), Android MDM parity, network monitoring general availability, and
              completion of the Dropsuite backup integration. The AI initiative carries the highest potential
