      - number: '3.5'
        title: Exhibits
        blocks:
          - type: callout
            title: Kaseya Migration Wave Is a Durable Acquisition Engine
            body: >
              Kaseya's aggressive post-acquisition price increases to its Datto MSP installed base in 2022–2023 created
              a structural migration wave that NinjaOne has captured and continues to benefit from. As long as Kaseya
              maintains bundled pricing that increases year-over-year, NinjaOne benefits from a recurring,
              competitor-funded acquisition pipeline. The product positioning — simpler, faster, no required
              professional services — maps directly to the grievances of Kaseya and ConnectWise migrations.
            calloutType: strength
            claimRefs:
              - CP009
              - CP011
              - CP031
          - type: callout
            title: Android MDM Gap Is the Critical Enterprise Win-Rate Ceiling
            body: >
              NinjaOne's documented Android MDM limitations (inability to enforce device lockdown policies for BYOD
              Android devices) represent a high-severity moat risk for enterprise expansion. As more enterprise IT
              buyers evaluate NinjaOne for full UEM deployment, Android MDM capability is a table-stakes requirement
              that Microsoft Intune satisfies for free. The product roadmap gap must be closed within 18–24 months for
              NinjaOne to compete credibly in enterprise UEM RFPs.
            calloutType: risk
            claimRefs:
              - CP021
              - CP035
          - type: callout
            title: Atera's Per-Technician Model Is a Pricing-Model Disruption Threat
            body: >
              Atera's per-technician pricing model (~$149–$229/tech/month with unlimited devices) is structurally
              disruptive to per-device pricing norms that NinjaOne and most incumbents use. For small MSPs managing high
              device-to-technician ratios, per-tech pricing can be materially cheaper than per-device. If Atera achieves
              scale and feature parity, it could compress NinjaOne's pricing power at the small-MSP tier. NinjaOne
              should model whether its per-device model remains competitive as Atera grows.
            calloutType: insight
            claimRefs:
              - CP016
              - CP017
              - CP018
  - number: 4
    title: Financials
    sections:
      - number: '4.1'
        title: Revenue Model and Streams
        blocks:
          - type: paragraph
            body: |
              NinjaOne generates subscription revenue through a cloud-native SaaS delivery model with no
              required on-premises infrastructure, professional services mandates, or long-term contract
              commitments. The core revenue stream is a per-device (per-endpoint) monthly subscription
              that covers the RMM, patch management, remote access, and MDM capabilities of the platform.
              Backup (NinjaOne Unified Backup, formerly Dropsuite) is marketed and sold as a separate
              product line with its own subscription tier, covering Microsoft 365, Google Workspace, NAS,
              workstations, and servers.

              The per-device pricing model is not publicly listed but is confirmed to be device-based
              through product positioning language and community benchmarks. MSPs typically pay per
              managed endpoint, which aligns billing to the MSP's own revenue-generating managed-device
              inventory and creates a natural cross-sell incentive as the MSP's device estate grows.
              Enterprise IT department customers also purchase per device, with pricing likely volume-
              discounted at higher device counts.

              A secondary revenue stream has been added through the Dropsuite acquisition: cloud SaaS
              backup is a distinct subscription with per-seat (per M365/GWS user) or per-server
              pricing. This adds a second recurring revenue line with different churn dynamics than
              the core RMM platform: backup customers who store multi-year archives become increasingly
              sticky over time as data gravity grows. NinjaOne's platform ticketing module is bundled
              into the core subscription for most tiers; its incremental pricing impact is not confirmed
              in public sources.

              Revenue recognition is straightforward SaaS: subscription revenue recognized ratably
              over the contract term. Given no disclosed multi-year contract requirements, the
              predominant contract term is likely monthly or annual with month-to-month optionality.
              No material professional services revenue is expected given the company's explicit
              positioning against required professional services.
