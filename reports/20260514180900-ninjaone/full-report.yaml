      - number: '8.4'
        title: Comparable Set and Benchmark Analysis
        blocks:
          - type: paragraph
            body: >
              NinjaOne sits in the MSP/RMM software category with endpoint management and IT operations SaaS
              adjacencies. Public comparables include N-able (NYSE: NBLE, ~$1.5B market cap, ~4x ARR), SolarWinds (NYSE:
              SWI, ~$4.5B market cap, ~5x ARR), and SentinelOne (NYSE: S, ~$10B market cap, ~10x ARR for endpoint
              security). These comps reflect the 2024–2026 valuation compression environment for software companies,
              where only the highest-growth names command premium multiples.

              In the private market, NinjaOne's closest comparable is Cybereason (private, endpoint security, raised at
              ~$3B valuation but subsequently distressed) — though NinjaOne's RMM economics are more durable. Absolute
              Software's acquisition by Crosspoint Capital in 2023 at ~$900M (~6x ARR) and Ivanti's acquisition of
              MobileIron/Pulse/Cherwell (PE-backed, ~$2B implied) provide M&A comparables at lower growth rates.

              The best case comp for NinjaOne's growth profile is Jamf (Apple device management) which IPO'd in 2020 at
              $3.5B and reached $7B market cap at peak; Jamf grew at 25–35% when it went public. NinjaOne's 70% growth
              rate would position it more favorably than Jamf at IPO if sustained, but the MSP RMM TAM is broader and
              NinjaOne's platform breadth is greater.
            claimRefs: []
