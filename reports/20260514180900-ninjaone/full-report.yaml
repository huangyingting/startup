    sections:
      - number: '3.1'
        title: Competitive Landscape Overview
        blocks:
          - type: paragraph
            body: |
              NinjaOne operates in a competitive market with three distinct competitor classes. The
              first and most consequential is the MSP RMM incumbent class: Kaseya (Austin TX, private),
              ConnectWise (Tampa FL, Thoma Bravo portfolio), N-able (Houston TX, NYSE: NABL), and Datto
              RMM (Kaseya-owned). These platforms serve the same core MSP buyer as NinjaOne and
              represent the most common migration-from source in NinjaOne's win/loss data based on
              trade press and community evidence. Kaseya and ConnectWise have dominant installed bases
              built over two decades and exert switching-cost lock-in through script libraries,
              automation workflows, and integrated PSA/accounting connections.

              The second competitor class is the enterprise UEM segment dominated by Microsoft Intune
              (Microsoft), VMware Workspace ONE (Broadcom-owned), and Jamf (JAMF Pro, Apple-specialist).
              Microsoft Intune's bundling in M365 E3/E5 at no incremental cost for enterprise Microsoft
              customers is the most significant structural competitive threat to NinjaOne's enterprise
              upmarket expansion. Jamf occupies a defensible niche in Apple-centric environments where
              NinjaOne has a weaker value proposition.

              The third class is a cohort of emerging challengers who are disrupting point segments of
              the market: Atera (Tel Aviv, AI-native RMM+PSA, per-technician pricing model), Syncro
              (integrated RMM+PSA for small MSPs, acquired by Kaseya), and ManageEngine (division of
              Zoho Corp, broad IT management suite with competitive Asian-market pricing). These
              challengers compete primarily at the small-MSP and cost-sensitive SMB tiers rather than
              at NinjaOne's mid-market core.
