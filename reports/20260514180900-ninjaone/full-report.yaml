      - number: '8.2'
        title: Financing Context and Valuation Framework
        blocks:
          - type: paragraph
            body: >
              NinjaOne raised $500M in its Series C (November 2024) at a $5B post-money valuation led by ICONIQ Growth,
              with follow-on participation from Summit Partners. The Dropsuite acquisition (January 2025 announcement,
              $270M final price, June 2025 close) consumed approximately $270M of Series C capital, leaving roughly
              $230M in net new operating capital. Total capital raised to date is approximately $761.5M across six
              rounds.

              Valuation framework: At $5B entry with estimated FY2025 ARR of approximately $450–550M (extrapolating from
              70% YoY growth and ~10–14x Series C multiple), the implied EV/ARR multiple is approximately 9–11x. This is
              at a discount to the 15–20x multiples commanded by the fastest-growing public SaaS companies (ServiceNow,
              Veeva) but above the 4–6x multiples for mature/slower-growing endpoint management peers (N-able,
              SolarWinds).

              Comparable transaction context: Jamf IPO valued at ~$3.5B in 2020 at approximately 18x ARR; N-able
              spin-off from SolarWinds in 2021 at approximately $1.5B (~5x ARR); Barracuda acquisition by KKR at
              approximately $4B (2022). These comparables suggest $5B for a 70%-growing RMM platform is defensible but
              on the high end of the MSP/RMM comp set.

              At IPO (estimated 2027–2028 based on investor return pressure from the November 2024 round), NinjaOne
              would need to show $800M–$1.2B ARR and 30–50% growth to justify a 12–15x IPO multiple that delivers a
              $10–15B valuation and meaningful investor returns.
            claimRefs: []
      - number: '8.3'
        title: Bull / Base / Bear Case Scenarios
        blocks:
          - type: paragraph
            body: >
              Bull case (35% probability): NinjaOne sustains 50–70% ARR growth through FY2027, driven by
              Kaseya/ConnectWise market share captures, international expansion, backup and documentation module upsell,
              and potential new product launches. FY2027 ARR reaches $900M–$1.2B. IPO in 2027–2028 at 14–18x forward ARR
              yields an exit valuation of $12.6B–$21.6B. From a $5B entry, this represents a 2.5–4.3x return multiple
              (25–40% IRR). Requires: no security breach, successful FedRAMP authorization, continued product
              leadership.

              Base case (45% probability): Growth decelerates to 30–40% YoY as the Kaseya migration tailwind fades and
              Microsoft Intune limits enterprise IT upside. FY2027 ARR reaches $700M–$800M. IPO in 2028–2029 at 10–13x
              forward ARR yields $7B–$10.4B. From $5B entry, this represents a 1.4–2.1x return multiple (8–16% IRR) —
              adequate but not compelling. Requires: clean security record, verified NRR >110%.

              Bear case (20% probability): Growth decelerates below 25% due to security incident, Microsoft Intune
              competitive displacement, or macroeconomic MSP spending reduction. FY2027 ARR reaches $500M–$600M. Exit at
              6–8x ARR (compressed multiple) yields $3B–$4.8B — a loss at $5B entry. Triggering events: platform breach,
              CEO departure, GDPR enforcement, major customer defection wave.
