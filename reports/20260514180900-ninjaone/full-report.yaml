      - number: '7.3'
        title: Operational and Technical Risk
        blocks:
          - type: paragraph
            body: >
              NinjaOne's cloud infrastructure is built on major hyperscalers including AWS. A regional AWS outage (as
              occurred in December 2021 and September 2023) would affect NinjaOne's ability to deliver RMM commands,
              remote access sessions, and backup jobs to customers in the affected region. NinjaOne publishes a status
              page (status.ninjaone.com) that provides availability history; a review of community discussions suggests
              occasional outages have been noted but without published uptime SLA guarantees.

              Remote access reliability is cited by SourceForge reviewers as experiencing approximately 1 disconnect per
              day, which is a measurable quality gap in the core product. As remote access becomes increasingly critical
              for MSP service delivery (particularly for after-hours support), this reliability issue could affect
              renewal rates and competitive positioning against Splashtop, TeamViewer, and built-in tools.

              Post-acquisition integration of Dropsuite (acquired for $252M; integration completed approximately June
              2025) introduces technical debt, redundant engineering headcount management, and customer migration
              complexity. The rebrand to NinjaOne Backup added 15,000+ customers to the unified platform, creating new
              backup infrastructure operational responsibilities. Backup data loss incidents or prolonged restoration
              failures in this context would carry significant customer liability.
            claimRefs: []
      - number: '7.4'
        title: Partner and Dependency Risk
        blocks:
          - type: paragraph
            body: >
              NinjaOne's integrations with ConnectWise PSA, Autotask, and HaloPSA are critical to its MSP workflow
              proposition. If ConnectWise or Kaseya acquires a competing RMM platform or develops native RMM
              capabilities, they could create a disadvantage for MSPs using NinjaOne by prioritizing their own product
              integrations. ConnectWise has historically acquired tools adjacent to its PSA (e.g., ConnectWise Automate,
              ConnectWise Control) and could use pricing or integration friction as a competitive lever.

              Microsoft represents the largest long-term dependency risk. Microsoft Intune (part of Microsoft 365
              Business Premium) is increasingly capable for device management, and Microsoft's distribution advantages
              through existing Microsoft 365 enterprise licensing relationships make it a natural incumbent for
              enterprise IT buyers. While Intune is less mature than NinjaOne for MSP workflows, Microsoft's investment
              in the endpoint management space is a multi-year headwind.

              The GTS channel partnership creates incremental channel dependency: if NinjaOne becomes reliant on GTS for
              a significant share of new customer acquisition, GTS's performance or any deterioration in the
              relationship would affect NinjaOne's growth trajectory.
