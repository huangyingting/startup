      - number: '4.4'
        title: Public Traction Metrics and Financial Disclosure Gaps
        blocks:
          - type: paragraph
            body: |
              The only confirmed public financial metrics for NinjaOne are: (1) $5 billion valuation
              from the November 2024 Series C; (2) ~70% year-over-year revenue growth in FY2025 per
              ITPro reporting (unaudited, company-attributed); and (3) customer count of 35,000–40,000
              as of April 2026. No ARR, revenue, gross margin, NRR, churn, CAC, LTV, EBITDA, or
              employee headcount has been disclosed.

              The 70% YoY revenue growth claim, if accurate and verified through audited financials,
              would be exceptional for a company at NinjaOne's scale. Most comparable SaaS companies
              at $200–400M ARR grow at 20–40% annually; 70% YoY suggests either strong organic market
              expansion, significant cross-sell from the Dropsuite acquisition, or the measurement
              includes acquired revenue. Without audited or management-confirmed financials, this
              figure carries low confidence.

              The customer count range of 35,000–40,000 (from contemporaneous April 2026 press releases)
              represents a meaningful traction signal but cannot be converted to ARR without knowing
              average device count per customer and device pricing. At an illustrative $6,000/year
              average ACV and 37,500 customers (midpoint), implied ARR is approximately $225 million —
              consistent with the lower end of the valuation-multiple-derived estimate.

              The complete absence of regulatory financial disclosures (no Form D, no state-level
              securities filings found) limits the ability to independently verify round composition,
              ownership, or use of funds.
