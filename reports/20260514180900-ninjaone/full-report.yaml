  - number: 6
    title: Customers
    sections:
      - number: '6.1'
        title: Customer Base Segmentation
        blocks:
          - type: paragraph
            body: >
              NinjaOne's customer base of approximately 35,000–40,000 organizations as of April 2026 spans 140+
              countries. The primary buyer segment is managed service providers (MSPs), estimated at 70–80% of the
              customer base. MSPs use NinjaOne to manage third-party client endpoints as a core business tool; this
              creates a multiplier effect where each MSP customer typically represents hundreds to thousands of managed
              devices. The secondary segment is internal IT departments in mid-market and enterprise organizations
              managing their own device fleets.

              Geographically, NinjaOne's customer base is heaviest in the United States (reflecting headquarters in
              Austin, TX and the density of the North American MSP market), followed by Europe. The 140+ country
              footprint reflects the global MSP market but also the platform's cloud-first deployment model, which
              eliminates geographic infrastructure barriers.

              Vertical segmentation is not publicly disclosed. The RMM buyer universe spans all verticals requiring IT
              management — healthcare, financial services, professional services, retail, and public sector are all
              represented in the MSP customer base. NinjaOne has not disclosed any vertical-specific go-to-market motion
              or customer concentration by industry.
