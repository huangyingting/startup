      - number: '4.3'
        title: Cost Structure and Margin Drivers
        blocks:
          - type: paragraph
            body: |
              NinjaOne's cost structure is consistent with a cloud-native SaaS platform company at the
              $200–400 million ARR scale. Cloud infrastructure is the primary COGS driver, covering
              the compute, storage, and network costs for device monitoring telemetry, remote access
              session hosting, and backup data storage (significantly higher post-Dropsuite). NinjaOne
              uses major public cloud providers for its platform; infrastructure costs as a proportion
              of revenue typically decline as a function of engineering efficiency at scale.

              Backup (Dropsuite) introduces a meaningfully different cost structure from the core RMM
              platform: long-term backup storage of customer data is capital-intensive and grows with
              data retention periods. Veeam, Datto, and other backup competitors operate at gross
              margins of 60–75% versus 80–85% for pure RMM tools, suggesting NinjaOne's blended
              gross margin will decline from a pure RMM baseline as backup revenue scales.

              Research and development (R&D) is the second-largest cost category, covering platform
              engineering, product management, and QA for the unified platform (RMM, MDM, backup,
              remote access, ticketing). At a 70% YoY growth rate, NinjaOne is investing heavily in
              product velocity to maintain competitive positioning against Kaseya's bundled platform
              and Microsoft Intune.

              Sales and marketing (S&M) spend supports both inbound digital channels (review platform
              management, community, content) and an outbound sales team for MSP and enterprise
              accounts. At NinjaOne's growth stage, S&M as a percentage of revenue is likely in the
              40–55% range — high relative to mature SaaS but consistent with a company investing in
              category leadership and international expansion.

              General and administrative (G&A) costs cover finance, legal, HR, and compliance
              functions. No disclosed litigation costs or material regulatory fines were found in
              available public sources. The Dropsuite acquisition added integration and transition
              costs in the 2025–2026 period.
