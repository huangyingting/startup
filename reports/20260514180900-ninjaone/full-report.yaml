      - number: '1.2'
        title: Founders, Leadership, and Governance
        blocks:
          - type: paragraph
            body: |
              NinjaOne was co-founded in 2013 by Sal Sferlazza, Christopher Matarese, and Eric Herrera.
              Sal Sferlazza serves as Chief Executive Officer as of 2026 and is the company's public face
              in press releases and partner announcements. The founding team's domain expertise in MSP
              tooling and endpoint management shaped the product-led growth model that underpinned the
              company's early traction in the competitive RMM market.

              The executive bench below the CEO includes Matt Hastings as Senior Vice President of
              Product Management, overseeing the platform roadmap and the integration of the Dropsuite
              backup acquisition, and Joe Lohmeier as Vice President of Global Channel Sales, responsible
              for the company's MSP and channel partner ecosystem. The company has not publicly disclosed
              a CFO or board composition, consistent with typical private-company opacity.

              No material executive leadership departures were found in publicly available sources for
              2025 or 2026, though the evidence base is limited to trade press and partner announcements.
              As a private company, board-level governance information is not disclosed. The concentration
              of public-facing leadership in Sferlazza represents a key-person dependency risk that
              would require diligence in any deal process.
