      - number: '5.4'
        title: Trust, Security, Compliance, and Reliability
        blocks:
          - type: paragraph
            body: >
              NinjaOne holds SOC 2 Type II and ISO 27001:2013 certifications and publishes a trust page describing
              security controls, encryption standards (AES-256 at rest, TLS 1.2+ in transit), and incident response
              procedures. RBAC and MFA are supported across all administrative and technician accounts. No confirmed
              public data breach has been reported since NinjaOne's founding in 2013.

              The principal compliance gap is FedRAMP: NinjaOne has not achieved or announced pursuit of FedRAMP
              authorization, limiting eligibility for U.S. federal and critical infrastructure contracts. FIPS 140-2
              cryptographic compliance is also unconfirmed. These gaps are not unusual for a company at NinjaOne's
              growth stage focused on the MSP and commercial IT market, but represent meaningful ceiling constraints if
              management pursues U.S. government verticals.

              Reliability data indicates strong core RMM performance (99.9%+ uptime for monitoring), but NinjaRemote
              remote access sessions experience approximately one forced disconnection per active session day per
              SourceForge reviewer aggregates. The backup module, recently integrated from Dropsuite, lacks sufficient
              public reliability track record as of Q2 2026.
