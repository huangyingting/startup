  - id: FM001
    title: Market sizing lens
    type: pyramid
    summary: TAM–SAM–SOM hierarchy for NinjaOne's IT management market opportunity.
    layout: standard
    notes: >
      TAM uses Grand View Research's IT management software scope ($10.9B in 2023 growing to ~$15B by 2026). SAM uses a
      constrained MSP tooling and mid-market IT management lens (~$4–7B). SOM is inferred from valuation/multiple and
      bottom-up ACV analysis (~$0.2–0.33B ARR). All values are approximate with wide uncertainty bands.
    approximationNotes: >
      TAM of $14B is estimated as the 2026 value extrapolating GVR's $10.9B 2023 figure at 12.6% CAGR × 3 years. SAM of
      $5B is the midpoint of the $4–7B range derived from CompTIA bottom-up + Mordor segmentation for mid-market IT
      tools excluding enterprise suites. SOM of $0.25B is the midpoint of $200–333M ARR range inferred from valuation
      multiple.
    claimRefs:
      - CM009
      - CM010
      - CM011
      - CM012
      - CM013
      - CM014
      - CM015
      - CM016
      - CM017
    data:
      items:
        - label: TAM — Global IT management software (2026 est.)
          value: 14
          unit: USD B
          detail: >
            Grand View Research IT management software market (~$10.9B 2023, 12.6% CAGR). Extrapolated to 2026: ~$14B.
            Scope includes RMM, UEM, patch mgmt, ITAM. Excludes EDR/EPP and full ITSM. Mordor UEM alone is $8.2B in
            2024.
        - label: SAM — MSP tooling and mid-market IT management (2026 est.)
          value: 5
          unit: USD B
          detail: >
            Constrained to MSP RMM/PSA tooling (~$2–4.8B bottom-up from ~40K MSPs) plus mid-market UEM (excluding
            Microsoft Intune bundle, enterprise suites). Midpoint $5B. Excludes large enterprise (>5,000 devices) where
            NinjaOne has limited deployment evidence.
        - label: SOM — NinjaOne estimated ARR (2026)
          value: 0.25
          unit: USD B
          detail: >
            Inferred: $5B valuation ÷ 15–25x ARR multiple = $200–333M ARR range, midpoint $250M. Bottom-up cross-check:
            ~35–40K customers × est. $6K–8K ACV = $210–320M. NinjaOne ARR is not publicly disclosed; this is a model
            estimate with wide error bands.
