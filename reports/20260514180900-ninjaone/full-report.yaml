  - number: 5
    title: Product & Technology
    sections:
      - number: '5.1'
        title: Product Portfolio and Module Architecture
        blocks:
          - type: paragraph
            body: >
              NinjaOne operates as a unified IT management platform spanning eight core modules: RMM, patch management,
              remote access (NinjaRemote), MDM, endpoint and SaaS backup, documentation, and ticketing. All modules are
              accessible from a single web console — the company's single-pane-of-glass philosophy — without separate
              logins or product portals. This consolidation is a primary competitive differentiator against
              point-solution vendors and against legacy bundled platforms like Kaseya, which achieve comparable breadth
              at higher operational complexity.

              The product mix has expanded materially since NinjaOne's founding as NinjaRMM. The 2025 Dropsuite
              acquisition ($270M) added proprietary cloud-to-cloud backup IP covering Microsoft 365, Google Workspace,
              and Salesforce. By April 2026, NinjaOne Backup claimed 15,000+ customers, demonstrating rapid cross-sell
              momentum into the existing base of approximately 35,000–40,000 total customers. Documentation and
              ticketing modules were added in 2022–2024 and are bundled into qualifying RMM subscription tiers,
              deepening per-device value and increasing switching costs.

              Key module gaps: Android MDM is acknowledged as less capable than Microsoft Intune, limiting NinjaOne in
              Android-heavy enterprise environments. Network monitoring beyond SNMP for network devices remains in
              roadmap/beta as of Q2 2026. Ticketing is PSA-lite, not a replacement for ConnectWise Manage or Autotask.
