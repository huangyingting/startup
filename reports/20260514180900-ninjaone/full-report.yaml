      - number: '8.5'
        title: Recommendation and Diligence Action Plan
        blocks:
          - type: paragraph
            body: >
              Recommendation: Conditional Positive — Attractive opportunity with material diligence requirements. Do not
              commit capital until the following blocking items are resolved: (1) audited financial statements for
              FY2024 and FY2025 with verified ARR and NRR; (2) SOC 2 Type II audit report reviewed under NDA with scope
              covering RMM agent, backup infrastructure, and remote access; (3) cyber-liability insurance policy summary
              with per-event and aggregate limits; (4) legal review of the NinjaOne MSA indemnification caps and
              limitation of liability clauses.

              Entry discipline: If diligence satisfies the above, the $5B mark is defensible for a late-stage growth
              round (Series C secondary or co-investment). However, any new primary capital commitment should target a
              $4.5–5.0B cap; above $5B without audited verification of the ARR and NRR profile is not recommended.
              Warrant provisions or ratchet protections for a down-round scenario should be negotiated.

              Thesis-break monitoring: After investment, the following indicators should be monitored monthly: (a)
              platform security incident reports and CVE disclosures; (b) quarterly customer count updates from press
              releases; (c) backup attach rate trajectory; (d) N-able and SolarWinds earnings calls for RMM market
              pricing signals; (e) Microsoft Intune MSP program announcements.
