company:
  name: NinjaOne
chapter:
  number: 1
  title: "Company Overview"
  summary: >
    NinjaOne, LLC is a privately held unified IT management platform company headquartered in Austin,
    Texas, founded in 2013 as NinjaRMM by Sal Sferlazza, Christopher Matarese, and Eric Herrera.
    The company raised $500 million in a Series C at a $5 billion valuation in November 2024 led by
    ICONIQ Growth, bringing total disclosed capital to approximately $761.5 million. As of April 2026,
    NinjaOne serves approximately 35,000–40,000 customers across 140+ countries, recorded nearly 70%
    year-over-year revenue growth in FY2025, and completed a $270 million acquisition of Dropsuite
    in June 2025 to expand its backup capabilities.

sections:
  - id: company-identity
    title: "Company Identity and Business Model"
    body: |
      NinjaOne, LLC is a privately held IT management software company incorporated in Texas and
      headquartered in Austin, TX. The company was founded in 2013 under the name NinjaRMM and
      rebranded to NinjaOne around 2022 to signal a broader platform scope beyond remote monitoring
      and management (RMM). Its product portfolio spans RMM, endpoint management, patch management,
      mobile device management (MDM), cloud and local backup, remote access tools, and integrated
      IT ticketing — all delivered as cloud-native SaaS with no required on-premises infrastructure.

      The business model is subscription-based, priced on a per-device or per-endpoint basis
      without mandating multi-year contracts or professional services engagements. The company
      targets both managed service providers (MSPs) acting as IT outsourcers for SMBs and
      enterprise IT departments managing their own device fleets. The platform's primary
      differentiation is consolidation: NinjaOne claims that 71% of its customers replace more
      than four separate tools when adopting the platform. Customers are typically fully deployed
      in under 30 days, with operator proficiency achieved in under 10 days.

      The platform integrates with 200+ third-party tools including security vendors, PSA
      platforms, and identity providers, enabling NinjaOne to serve as a central management
      hub. The ticketing module eliminates the need for a standalone PSA for many smaller MSPs.
      As of 2026, NinjaOne supports Windows, macOS, Linux, iOS, and Android endpoints.
    claimRefs: [CO001, CO002, CO005, CO006, CO007, CO031, CO032, CO033, CO034, CO038, CO043]
    tableRefs: [TO001]
    figureRefs: [FO003]

  - id: founders-leadership
    title: "Founders, Leadership, and Governance"
    body: |
      NinjaOne was co-founded in 2013 by Sal Sferlazza, Christopher Matarese, and Eric Herrera.
      Sal Sferlazza serves as Chief Executive Officer as of 2026 and is the company's public face
      in press releases and partner announcements. The founding team's domain expertise in MSP
      tooling and endpoint management shaped the product-led growth model that underpinned the
      company's early traction in the competitive RMM market.

      The executive bench below the CEO includes Matt Hastings as Senior Vice President of
      Product Management, overseeing the platform roadmap and the integration of the Dropsuite
      backup acquisition, and Joe Lohmeier as Vice President of Global Channel Sales, responsible
      for the company's MSP and channel partner ecosystem. The company has not publicly disclosed
      a CFO or board composition, consistent with typical private-company opacity.

      No material executive leadership departures were found in publicly available sources for
      2025 or 2026, though the evidence base is limited to trade press and partner announcements.
      As a private company, board-level governance information is not disclosed. The concentration
      of public-facing leadership in Sferlazza represents a key-person dependency risk that
      would require diligence in any deal process.
    claimRefs: [CO003, CO004, CO029, CO030, CO045]
    tableRefs: [TO002]
    figureRefs: []

  - id: funding-capital
    title: "Funding History, Valuation, and Capital Structure"
    body: |
      NinjaOne has completed two confirmed external equity rounds. In March 2020, Summit Partners
      led a venture round for the company (then operating as NinjaRMM). In November 2024, ICONIQ
      Growth led a Series C of $500 million at a post-money valuation of $5 billion, with Frank
      Slootman (former CEO of Snowflake and ServiceNow) participating as an individual investor.
      CBInsights places total disclosed capital at approximately $761.5 million, though the
      composition of earlier rounds beyond the two confirmed tranches is not fully documented in
      public databases.

      The $5 billion valuation represents a significant step-up typical of late-stage SaaS
      platforms with strong revenue growth momentum. No SEC Form D disclosures were found in the
      EDGAR system for NinjaOne, LLC or NinjaRMM, which may reflect offshore structuring for
      foreign-only investors, state-level-only filings, or incomplete public records — an
      unresolved diligence gap. Revenue, EBITDA, and gross margin are not publicly disclosed;
      the company has signaled no IPO timeline as of May 2026.

      The Series C capital has been directed toward product innovation (including the Dropsuite
      backup acquisition), international expansion, and channel partner programs. As of 2026,
      the capital structure appears to be equity-only, with no disclosed credit facilities or
      debt instruments, though this cannot be confirmed without primary access to company books.
    claimRefs: [CO008, CO009, CO010, CO011, CO012, CO013, CO027, CO028, CO044]
    tableRefs: [TO003]
    figureRefs: [FO002]

  - id: milestones-acquisitions
    title: "Milestones, Acquisitions, and Scale"
    body: |
      NinjaOne's growth trajectory has been marked by organic scale, award recognition, and a
      single material acquisition. From 2013 founding to approximately 35,000–40,000 customers in
      140+ countries by April 2026, the company expanded at an accelerating pace following the
      2020 Summit Partners investment. The rebranding from NinjaRMM to NinjaOne around 2022
      formalized the platform's expansion from a pure RMM to an integrated management suite
      covering backup, MDM, remote access, and ticketing.

      The most significant strategic move was the January 2025 announcement of the intent to
      acquire Dropsuite, a cloud backup provider, for approximately $252 million, which was
      completed in June 2025 at a final price of approximately $270 million. Post-acquisition,
      Dropsuite was rebranded NinjaOne SaaS Backup and extended coverage to Microsoft 365,
      Google Workspace, NAS, workstations, and servers. By April 2026, NinjaOne Backup had
      surpassed 15,000 standalone customers, demonstrating strong cross-sell traction.

      The company's FY2025 results, as reported in early January 2026 by IT Pro, showed
      approximately 70% year-over-year revenue growth, which the publication characterized as
      outpacing the broader IT management market. The Series C announcement in November 2024 and
      the Deloitte Technology Fast 500 listing further validate momentum. NinjaOne has not
      disclosed any layoffs, regulatory investigations, or material litigation in available
      public sources.
    claimRefs: [CO014, CO015, CO016, CO017, CO018, CO020, CO021, CO022, CO023, CO025, CO026, CO035, CO039, CO042]
    tableRefs: [TO004]
    figureRefs: [FO001]

  - id: product-market-position
    title: "Product Platform and Market Position"
    body: |
      NinjaOne occupies a strong position in the MSP tooling and SMB/mid-market IT management
      space, supported by peer review platform evidence. On G2, the platform holds a 4.7-out-of-5
      rating across 4,295 reviews and is the top-ranked product in 7 G2 categories as of recent
      reporting. TrustRadius and SourceForge reviews confirm consistently positive user sentiment
      on core RMM and patch management capabilities, though user feedback also surfaces notable
      product gaps.

      Critical user feedback indicates that NinjaOne's Android MDM capabilities are less mature
      than competitors such as Microsoft Intune — specifically, users cannot enforce certain
      email-access lockdown policies on Android devices through NinjaOne MDM. Remote access
      reliability is also cited as a recurring weakness, with some users reporting daily
      connection failures in the remote desktop module. These gaps are particularly relevant
      for enterprise customers with large Android device fleets or strict zero-trust access
      requirements.

      Compared to incumbent RMM platforms such as Kaseya VSA and ConnectWise Automate, G2
      ratings data places NinjaOne consistently higher, though a formal side-by-side feature
      audit was not completed in this research cycle. The company's 98% customer satisfaction
      score over five consecutive years suggests strong retention, but the absence of disclosed
      NRR, churn, or ARR data limits the ability to confirm this at scale.
    claimRefs: [CO018, CO019, CO036, CO037]
    tableRefs: []
    figureRefs: []

