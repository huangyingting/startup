callouts:
  - calloutType: strength
    title: "Unicorn Status and Strong Peer-Review Leadership"
    body: >
      NinjaOne's November 2024 Series C at a $5 billion valuation confirmed unicorn status and
      placed it among the most well-capitalized pure-play endpoint management platforms. The
      platform's 4.7/5 G2 rating across 4,295 reviews and top ranking in 7 G2 categories
      provides strong social proof for MSP and enterprise IT customer acquisition.
    claimRefs: [CO013, CO018, CO019]
  - calloutType: risk
    title: "Product Gap: Android MDM and Remote Access Reliability"
    body: >
      User reviews on SourceForge and TrustRadius identify two recurring weaknesses: NinjaOne's
      Android MDM lacks the ability to enforce certain device lockdown policies (e.g., blocking
      email access unless enrolled), and the remote access module experiences intermittent
      connection failures. These gaps may limit enterprise adoption in environments with
      significant Android mobile fleets or strict zero-trust access controls.
    claimRefs: [CO036, CO037]
  - calloutType: insight
    title: "Dropsuite Acquisition Extends TAM to Cloud Backup"
    body: >
      The $270 million acquisition of Dropsuite in June 2025 moves NinjaOne beyond endpoint
      management into cloud SaaS backup (Microsoft 365, Google Workspace), adding a recurring
      revenue stream with strong standalone traction (15,000+ customers by April 2026). This
      represents NinjaOne's first M&A and tests its ability to integrate and monetize acquired
      products at scale.
    claimRefs: [CO022, CO023, CO017]

