    relatedTableRefs:
      - TO003
    severity: medium
  - description: >-
      Several senior leadership biographies (Manoj Nair, Tom Nielsen, Brian Rogan, Danny Allan) are not fully detailed
      in accessible public sources. Key-person dependency assessment for non-founder executives in TO002 is based on
      role descriptions rather than verified background profiles.
    relatedQuestionRefs:
      - QO003
      - QO023
    relatedTableRefs:
      - TO002
    severity: low
  - description: >-
      Acquisition amounts for DeepCode (2020), FossID (2021), Probely (2024), and Invariant Labs (2025) are undisclosed.
      Helios and Enso Security amounts are from UK Companies House filing analysis (Calcalist); other amounts in TO004
      are approximated or from incomplete reporting.
    relatedQuestionRefs:
      - QO007
    relatedTableRefs:
      - TO004
    severity: low
  - description: >-
      QO025 (competitive comparison vs Checkmarx, Veracode, GitHub Advanced Security) is only partially answered.
      Detailed market share, pricing benchmarks, and win/loss data are not available from current accessible sources and
      are deferred to the competitor analysis chapter.
    relatedQuestionRefs:
      - QO025
    severity: medium
  - description: >-
      Snyk's current CEO search status, incoming CEO identity, and timeline are unknown as of May 2026. The leadership
      transition creates an evidence gap for forward-looking governance analysis.
    relatedQuestionRefs:
      - QO021
      - QO023
    severity: high
  - type: missing-source
    severity: material
    topic: SAM-estimate
    missingEvidence: >-
      A Gartner or Forrester primary analyst report specifically defining and sizing the developer-first application
      security testing (AST) sub-market, separate from the broader AppSec or WAF-inclusive market.
    whyItMatters: >-
      Without a primary analyst source using consistent boundary definitions, the $6–9B SAM estimate is an inference and
      cannot be independently validated; it could be materially off in either direction.
    diligencePath: >-
      Purchase a Gartner Application Security Testing MQ or Forrester DevSecOps market data license; or commission a
      primary buyer survey to estimate developer-first AST budget pools.
    relatedQuestionRefs:
      - QM006
      - QM023
      - QM029
    relatedTableRefs:
      - TM002
  - type: conflicting-data
    severity: material
    topic: TAM-sizing
    missingEvidence: >-
      Consistent, boundary-verified market size data from multiple analysts using the same AppSec scope definition —
      specifically confirming or denying whether WAF, RASP, and professional services are included in each figure.
    whyItMatters: >-
      The 3.9x dispersion between GVR ($10.65B) and MarketsandMarkets ($41.16B) for the same 2026 year undermines any
      single analyst estimate as a reliable sizing anchor; the investment thesis on market size is therefore highly
      uncertain.
    diligencePath: >-
      Request boundary-definition appendices from MarketsandMarkets and Mordor Intelligence to verify
      inclusion/exclusion criteria; triangulate with Gartner's AST vendor revenue data.
    relatedQuestionRefs:
      - QM009
      - QM023
      - QM026
    relatedTableRefs:
      - TM002
  - type: private-evidence-only
    severity: material
    topic: Snyk-ARR-by-product
    missingEvidence: >-
      Product-level revenue breakdown for Snyk (SCA vs SAST vs Container vs IaC vs DAST) that would enable bottom-up SAM
      penetration validation.
    whyItMatters: >-
      Without knowing what percentage of Snyk's $300M+ ARR comes from each product, it is impossible to validate whether
      Snyk's SCA-led thesis is accurate or whether the SAST and Container products are becoming dominant — which would
      change the SAM estimate.
    diligencePath: >-
      Request in management diligence session: product-line ARR breakdown, customer distribution by primary product
      purchased, and seat-expansion trends by product type.
    relatedQuestionRefs:
      - QM025
      - QM033
      - QM034
  - type: enumeration-incomplete
    severity: minor
    topic: adoption-constraint
    missingEvidence: >-
      Quantified false-positive rate benchmarks for major SAST tools (Snyk Code, Checkmarx, Semgrep, Veracode) from
      independent testing in 2025–2026.
    whyItMatters: >-
      Developer alert fatigue is cited qualitatively across sources, but without current benchmark data it is difficult
      to assess whether Snyk's AI-enhanced SAST meaningfully improves precision vs. competitors — which directly affects
      competitive positioning and SAM capture rate.
    diligencePath: >-
      Consult academic AppSec benchmarks (e.g., NIST SARD dataset, academic static analysis evaluations) or request
      customer satisfaction data on false-positive rates from Snyk management.
    relatedQuestionRefs:
      - QM014
      - QM021
      - QM022
      - QM031
    relatedTableRefs:
      - TM004
  - description: >-
      Snyk does not publicly disclose net revenue retention (NRR) or gross revenue retention (GRR). These are the most
      critical unit economics metrics for evaluating the quality and sustainability of Snyk's ARR, particularly given
      the company's expansion-driven model. Without NRR, it is impossible to independently assess whether ARR growth is
      driven by genuine expansion or is masking underlying churn. Industry estimates for comparable DevSecOps platforms
      suggest NRR of 115–130%, but Snyk has never confirmed. QI023 is partially answered by confirming the gap exists.
    relatedQuestionRefs:
      - QI023
    relatedTableRefs:
      - TI003
      - TI005
    severity: high
  - description: >-
      Customer acquisition cost (CAC), CAC payback period, and customer lifetime value (LTV) are entirely undisclosed.
      The dual PLG + enterprise field sales motion creates two materially different CAC profiles, and the blended figure
      is unknown. Without these metrics, the LTV/CAC ratio and GTM efficiency cannot be independently assessed. This is
      a high-priority formal diligence request.
    relatedQuestionRefs:
      - QI021
      - QI023
    relatedTableRefs:
      - TI003
      - TI005
    severity: high
  - description: >-
      Free cash flow (FCF) and EBITDA are not disclosed. The operating loss figures from UK Companies House filings
      represent GAAP operating loss, which excludes stock-based compensation (SBC), which may be significant ($30–80M at
      this scale). FCF and EBITDA may differ materially from operating loss, which could affect the burn rate and runway
      calculations in TI004. CEO McKay's assertion that Snyk would not burn cash in 2025 implies FCF improvement ahead
      of GAAP operating profitability, but the mechanism is unverified.
    relatedQuestionRefs:
      - QI016
      - QI029
    relatedTableRefs:
      - TI004
      - TI005
    severity: medium
  - description: >-
      Snyk's full capital table structure, including liquidation preference stacks, anti-dilution provisions, pro rata
      rights, and information rights for each round, is not publicly available. Given the December 2022 down-round at
      $7.4B with ~$1.32B raised in prior rounds, investors from earlier rounds at higher valuations (e.g., Series E/F at
      $4.7–8.5B) may hold participating preferred or anti-dilution rights that could significantly impact common equity
      economics in an exit at or below peak valuation. This creates an opaque economic waterfall for option holders and
      common stockholders.
    relatedQuestionRefs:
      - QI006
      - QI009
      - QI015
    relatedTableRefs:
