evidenceGaps:
  - description: >-
      Exact ownership stakes for all investors are not publicly disclosed. The full Snyk cap table, including precise
      percentage ownership, liquidation preference stacks, and anti-dilution provisions, remains private. TO003 is based
      on known lead investors and board representation, not full cap table.
    relatedQuestionRefs:
