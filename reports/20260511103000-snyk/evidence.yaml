  - id: EGV001
    type: private-evidence-only
    severity: high
    topic: Snyk audited financials, NRR by cohort, and cash/burn runway
    missingEvidence: >-
      Snyk has not published audited GAAP financial statements, cohort-level net revenue retention, or a verified cash
      balance and burn rate. All ARR figures rely on Sacra third-party estimates and company-stated numbers without
      independent audit confirmation. Cap table details including liquidation preferences and any convertible note
      overhang are unavailable from public sources.
    whyItMatters: >-
      Without audited financials, NRR by cohort, and verified cash data, it is impossible to price any equity position
      with confidence. Liquidation preference stacks can render new secondary investors effectively subordinated in a
      down-exit scenario even at headline valuations that appear attractive.
    diligencePath: >-
      Request Big-4 audited income statement and balance sheet for FY2024 and FY2025 directly from company as a
      condition of any investment term sheet. Request NRR waterfall by cohort, full cap table with liquidation
      preference tiers, and most recent 409A board-approved valuation.
    relatedQuestionRefs:
      - QV018
      - QV025
      - QV026
      - QV028
  - id: EGV002
    type: enumeration-incomplete
    severity: medium
    topic: Comparable private security SaaS companies excluded from valuation table
    missingEvidence: >-
      The comparable valuation table (TV004) covers only publicly traded companies with disclosed ARR. High-profile
      private comparables such as Wiz ($12B valuation, ~$500M ARR), Lacework, Orca Security, and Veracode are excluded
      because they lack verifiable public revenue and market cap data. Including private comps with estimated multiples
      would require triangulating from funding announcements and third-party estimates with lower reliability than
      public filings.
    whyItMatters: >-
      Private comparable multiples in the security SaaS space can differ materially from public multiples, especially
      for companies with strong growth narratives. Excluding them may systematically understate the bull-case ceiling if
      private markets are pricing growth at premium multiples above the public-market range.
    diligencePath: >-
      Supplement public comparable analysis with PitchBook or Carta private-market comparables data. Use Wiz's most
      recent funding round ($12B at ~$500M ARR) as a disclosed private benchmark for the bull-case multiple ceiling,
      acknowledging the implied ~24x ARR multiple.
    relatedTableRefs:
      - TV004
    relatedQuestionRefs:
      - QV010
