companyProfile:
  summary: >-
    Snyk is a developer-first application security platform founded in 2015 in London, UK, by Guy Podjarny,
    Danny Grander, and Assaf Hefetz. The company enables software development teams to find and fix
    vulnerabilities in open-source dependencies (SCA), proprietary code (SAST), containers, infrastructure-as-code,
    and APIs — all within the developer workflow via IDE plugins, CLI, and CI/CD integrations. Snyk has raised
    approximately $1.32 billion across 17 rounds, achieving an $8.5 billion peak valuation in September 2021
    (Series F) before a step-down to $7.4 billion in its December 2022 Series G. As of late 2024, Snyk reported
    over $300 million ARR, ~4,478 customers, and ~1,162 employees, and was targeting cash-flow break-even in 2025.
  foundedDate: "2015-01-01"
  founders:
    - name: Guy Podjarny
      role: Co-founder & Chairman
      background: Former CTO at Akamai and Imperva; Israeli security engineer who pioneered developer-centric AppSec
      claimRefs: [CO001, CO005]
    - name: Danny Grander
      role: Co-founder & Chief Security Officer
      background: Israeli security researcher and vulnerability expert; leads Snyk's threat intelligence and research
      claimRefs: [CO001, CO007]
    - name: Assaf Hefetz
      role: Co-founder
      background: Israeli engineer and technical co-founder who contributed core platform architecture in early years
      claimRefs: [CO001, CO008]
  foundingLocation: London, UK
  headquarters: Boston, MA
  productSummary: >-
    Snyk's platform includes five integrated products: Snyk Open Source (SCA/dependency scanning), Snyk Code
    (AI-powered SAST using the DeepCode engine), Snyk Container (container and Kubernetes image scanning), Snyk
    Infrastructure as Code (Terraform, CloudFormation, Helm scanning), and Snyk AppRisk (application security
    posture management). The platform integrates deeply with GitHub, GitLab, Bitbucket, Azure DevOps, and major
    CI/CD pipelines, and offers generous free tiers to drive product-led growth.
  customerFocus: Software development teams, AppSec engineers, and CISOs at mid-market and enterprise organizations
  businessModel: Freemium SaaS with per-developer seat pricing; free tier drives organic adoption into paid Team, Business, and Enterprise plans
  stage: Series G
  fundingStatus: "$7.4B valuation at December 2022 Series G ($196.5M raised); $8.5B peak valuation at September 2021 Series F ($530M); total raised approximately $1.32B across 17 rounds"
  disclosureProfile: private-undisclosed
  claimRefs: [CO001, CO002, CO005, CO013, CO015, CO016, CO019, CO020, CO022, CO023, CO025, CO026]

