  - id: FE004
    title: Snyk Developer Adoption Funnel
    type: funnel
    layout: standard
    summary: >-
      Illustrates Snyk's developer adoption funnel from free individual developer discovery through to enterprise
      seat-based revenue, representing the product-led growth model.
    data:
      items:
        - label: Free Developer Discovery
          value: 10000
          description: >-
            Individual developer installs Snyk CLI via npm or IDE extension via VS Code/JetBrains marketplace; scans
            personal or open source projects at no cost (unlimited users on free tier)
        - label: Developer Workflow Integration
          value: 4000
          description: >-
            Snyk embeds into daily development workflow via IDE inline scanning, auto-fix PRs on GitHub/GitLab, and
            CI/CD pipeline gates
        - label: Team-Level Adoption
          value: 800
          description: >-
            Multiple developers on same repo; team-level policies ($25+/dev/month), issue management, and reporting
            unlocked; typically driven by a single developer champion
        - label: Enterprise Procurement
          value: 150
          description: >-
            Security or engineering leadership formalizes the Snyk contract; SSO, RBAC, compliance reporting, API
            access, and Snyk AppRisk governance layer enabled (Ignite/Enterprise plan)
        - label: Platform Expansion
          value: 60
          description: >-
            Enterprise customer expands from initial Open Source or Code product to full platform; Snyk AppRisk becomes
            the cross-product governance dashboard across Container/IaC/DAST/Evo
    approximationNotes: >-
      Funnel stage values and descriptions are inferred from snyk.io/plans/ pricing page and published developer-first
      go-to-market documentation. Specific conversion rates between stages are not publicly disclosed.
    claimRefs:
      - CE014
      - CE015
      - CE031
  - id: FU001
    title: Customer Journey Map
    type: journey-map
    caption: >-
      Six-stage customer journey from developer discovery through strategic platform expansion, illustrating Snyk's
      product-led growth motion and the transition from developer adoption to enterprise procurement and multi-product
      expansion as of May 2026.
    claimRefs:
      - CU023
      - CU013
      - CU014
    data:
      items:
        - label: Discovery
          value: 1
          note: >-
            Developer discovers Snyk via npm audit warnings, GitHub Marketplace, VS Code extension recommendation, IDE
            plugin notification, or peer recommendation; actors: individual developer, open-source contributor
        - label: Free Trial / Sign-Up
          value: 2
          note: >-
            Developer connects GitHub/GitLab/Bitbucket repo; free tier provides 200 tests/month; first scan surfaces
            vulnerabilities with fix suggestions; actors: developer, DevOps engineer
        - label: Team Adoption
          value: 3
          note: >-
            Security lead or DevOps manager sees developer usage and formalises Snyk into CI/CD pipeline; Team plan
            upgrade (~$25/developer/month); CI/CD gates activated; actors: DevSecOps lead, security manager, engineering
            manager
        - label: Enterprise Procurement
          value: 4
          note: >-
            CISO or VP Engineering runs formal vendor evaluation; SSO, RBAC, audit logging, and SIEM integration
            requirements; enterprise license negotiated; actors: CISO, procurement, legal, InfoSec team
        - label: Deep Integration
          value: 5
          note: >-
            Snyk embedded across IDE, PR workflow, CI/CD, container registry, and IaC pipeline; hundreds to thousands of
            repositories onboarded; Snyk Open Source + Container + Code active; actors: platform engineering, security
            champions
        - label: Platform Expansion
          value: 6
          note: >-
            Customer adopts AppRisk ASPM to consolidate application security posture management; seat count expands;
            Snyk becomes security platform-of-record; actors: CISO, developer platform team, security operations
