      - number: '6.5'
        title: Expansion and Concentration Risk
        blocks:
          - type: paragraph
            body: >-
              Snyk's land-and-expand architecture is its primary growth engine: customers begin with Snyk Open Source
              (SCA), then add Snyk Code (SAST), Snyk Container, Snyk IaC, and Snyk AppRisk as their security program
              matures. Cross-sell and upsell are structurally embedded in the platform thesis. However, several
              concentration and risk dynamics demand diligence attention. First, customer concentration: with 2,400
              paying customers generating $300M ARR, a small number of large enterprise accounts—likely the top 50
              accounts by ACV—may account for a disproportionate fraction of revenue. Public data does not permit
              precise quantification. Second, competitive displacement risk: GitHub Advanced Security (GHAS), which
              bundles SCA and SAST with GitHub repositories at no additional cost, creates direct pricing pressure on
              Snyk's core products. Enterprise customers on GitHub Enterprise could rationalize Snyk out of their stack
              if GHAS capability parity improves. Third, SMB attrition: TrustRadius and TrustPilot reviewers
              consistently cite Snyk's enterprise pricing as cost-prohibitive for organizations with fewer than 50
              developers. The free-to-paid conversion rate is unknown, and smaller customers who exceed free-tier limits
              may churn rather than upgrade. Fourth, partner dependency: Snyk's distribution through GitHub Marketplace,
              VS Code Marketplace, and cloud provider marketplaces creates dependency on platform intermediaries that
              could alter terms, feature competing products, or reduce discovery. These risks are structural to Snyk's
              PLG model and would benefit from explicit diligence on cohort churn, top-10 account revenue concentration,
              and GHAS competitive displacement win/loss data.
