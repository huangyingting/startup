      - number: '5.2'
        title: Technical Architecture and Differentiation
        blocks:
          - type: paragraph
            body: >-
              Snyk's core technical differentiation rests on two proprietary assets: the Snyk Intel vulnerability
              database and the DeepCode AI engine. Snyk Intel covers 3× more vulnerabilities than the next largest
              public database, discloses 92% of JavaScript vulnerabilities before NVD, and provides actionable fix
              advice — not just CVE identifiers — an average of 47 days faster than competing sources. Snyk is also a
              CVE Numbering Authority (CNA), enabling it to assign CVEs for newly discovered vulnerabilities and
              reinforcing its security research credibility.

              DeepCode AI is not a generic LLM wrapper. It uses multiple fine-tuned models trained on millions of
              permissively licensed open source projects with verified fixes, maintained by Snyk's in-house security
              researchers and explicitly never trained on customer data. The engine combines symbolic AI (constraint-
              based data flow analysis) with generative AI to achieve high accuracy without hallucinations at the rate
              common in single-model approaches. This architecture powers Snyk Code's 80%-accurate automated fixes, risk
              scoring that incorporates reachability analysis, exploit maturity, EPSS, CVSS, transitive dependency
              depth, and social trend signals, and Snyk's DeepCode AI Search (custom query language with autocomplete
              for security teams). The AI models are self-hosted for data privacy, meaning customer code is not sent to
              external LLM providers.

              The architectural pattern of "scan early, fix in-place" is operationalized through deep integrations
              across the SDLC. At the IDE layer, Snyk's VS Code, JetBrains, Visual Studio, Eclipse, Cursor, and Windsurf
              extensions provide inline issue highlighting with fix suggestions without requiring a build cycle. At the
              SCM layer, Snyk integrates with GitHub, GitLab, Bitbucket, and Azure DevOps to scan pull requests before
              merge and auto-open fix PRs. At the CI/CD layer, integrations with Jenkins, CircleCI, GitHub Actions,
              GitLab CI, Azure Pipelines, and Bamboo enforce security gates. This SDLC-wide coverage means Snyk can
              intercept vulnerabilities at the earliest, cheapest point in the development cycle rather than at
              production scan time.

              The Snyk API (restricted to Enterprise plan customers) enables programmatic access to security data for
              integration with SIEM platforms, custom dashboards, and enterprise governance workflows. Snyk's
              vulnerability disclosure program and CNA status allow it to feed freshly discovered vulnerabilities back
              into its own database faster than public repositories.
