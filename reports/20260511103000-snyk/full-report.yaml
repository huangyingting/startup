      - number: '1.5'
        title: Milestones, Scale, and Adverse Events
        blocks:
          - type: paragraph
            body: >
              Snyk's trajectory from a London/Tel Aviv-based open-source scanning startup to a global developer security
              platform is marked by accelerated product expansion, strategic acquisitions, capital market milestones,
              and a difficult 2022-2023 period of operational rationalization.

              On the product dimension, pivotal launches include Snyk Container (2019), Snyk IaC (2020), and Snyk Code
              (2021) — the latter built on the September 2020 DeepCode acquisition. FossID was acquired in 2021 to add
              C/C++ license compliance. In 2022/2023, Snyk acquired Helios (cloud-native observability, Israeli startup,
              ~$2.9M per Calcalist) and Enso Security (~$32.7M), the latter providing Application Security Posture
              Management. In 2024, Snyk acquired Probely (developer-first DAST, Portugal-based), launching Snyk API &
              Web. In 2025, Snyk acquired Invariant Labs to accelerate agentic AI security, and launched Evo — the
              agentic security orchestration platform.

              On the scale dimension, ARR grew from approximately $4M in 2018 to an estimated $300M+ in December 2024.
              The company's Sacra-estimated ARR was $326M as of February 2026. Revenue (invoiced) reached $278M in 2024,
              a 26% increase from 2023 — representing significant deceleration from 150% ARR growth in 2021 and 50%
              revenue growth in 2023. Customers grew from 3,917 (end-2023) to 4,478 (end-2024), a 14% increase. The
              company employed 1,162 people at end-2024, up modestly from 1,028 in 2023.

              The 2022-2023 adverse period was significant. Three rounds of layoffs between June 2022 and April 2023
              terminated approximately 355 employees — roughly 25% of the peak ~1,400 workforce — with the final
              128-person reduction (April 2023) coming just four months after the Series G funding close. The layoffs
              drew industry criticism given their proximity to the large funding rounds. Concurrently, the December 2022
              Series G was completed at a 12.9% valuation haircut ($7.4B vs $8.5B), making Snyk the only major
              cybersecurity vendor to publicly disclose a valuation reduction in exchange for cash. In February 2026,
              CEO Peter McKay announced his resignation, seeking an "AI-immersed" successor — a material leadership
              transition at a critical inflection point for both the company and the broader AI security market.

              Recognition milestones include: Forbes Cloud 100 (2021), CNBC Disruptor 50 (2021), and — most
              significantly — the 2025 Gartner Magic Quadrant Leader designation for Application Security Testing,
              reversing an earlier 2022 Challenger placement. FedRAMP Moderate Authorization (2024) represents the
              company's most significant regulatory compliance milestone.
