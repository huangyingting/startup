      - number: '3.4'
        title: 'Competitive Positioning Shifts: Who Is Winning and Losing Share in 2026'
        blocks:
          - type: paragraph
            body: >
              The clearest winner in the 2024–2026 period is GitHub Advanced Security. GHAS's availability to all GitHub
              users (public repos free, enterprise add-on pricing) eliminates the separate procurement process and
              positions Microsoft as a significant headwind for Snyk's mid-market pipeline. Every organization that
              renews GitHub Enterprise and adds GHAS as a bundle add-on is a displaced Snyk Trial opportunity. GitHub's
              Copilot Autofix — now integrated with GHAS code scanning — provides AI-powered remediation suggestions
              directly in pull requests, matching a key Snyk differentiator.

              Wiz is the fastest-growing cloud security company of the 2022–2026 era, reportedly trusted by over 50% of
              Fortune 100 companies. Its expansion from CSPM into code-to-cloud security (integrating SCM visibility,
              pipeline risk, and runtime context) positions it as a potential CNAPP+AppSec consolidation play that could
              displace Snyk's container and IaC products in cloud-first enterprise accounts. Wiz's superior enterprise
              sales execution and higher recent valuations give it a strong position for enterprise consolidation
              conversations.

              Checkmarx has maintained consistent enterprise-growth trajectories despite consolidating ownership under
              Hellman & Friedman. Its Checkmarx One platform relaunch and explicit "AppSec for Everyone" messaging in
              2026 targets both the enterprise compliance segment (Veracode's home) and the developer-friendly segment
              (Snyk's home), making it a genuine dual-threat competitor. Semgrep's community adoption has grown
              substantially, particularly in developer-led organizations, though its monetization remains limited
              compared to Snyk.

              Snyk appears to be losing positioning in the pure enterprise SAST deal where compliance and binary
              analysis depth matter (Veracode wins), in the SCM-native deal where GitHub or GitLab organizations
              consolidate onto platform security (GHAS/GitLab wins), and potentially in large cloud-platform accounts
              where Wiz is already deeply embedded. Gartner Peer Insights reviews suggest some customers see Snyk's SCA
              as "a more traditional solution with many gaps and cons when compared to newer SCA solutions" as of late
              2024 — indicating competitive pressure from newer entrants even in Snyk's core segment.

              Snyk's strongest positioning remains in polyglot, multi-cloud, multi-repository development environments
              where no single SCM or cloud vendor dominates, and in organizations that require Snyk's breadth across
              SCA, SAST, container, IaC, and DAST from a single developer-integrated platform.
