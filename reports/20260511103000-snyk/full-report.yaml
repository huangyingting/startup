      - number: '4.3'
        title: Capital Structure and Adequacy
        blocks:
          - type: paragraph
            body: >-
              Snyk has raised approximately $1.32B in total equity funding across 10+ rounds from 2015 to 2023. The
              funding progression spans from a $3M seed round led by Heavybit Industries in 2015-2016, through a Series
              A ($7M, Accel), Series B ($22M, GV/Accel), Series C ($150M at $1B valuation, January 2020), Series D
              ($300M at $2.6B, late 2020), Series E ($105M at $4.7B, March 2021), and Series F ($530M at $8.5B,
              September 2021). In January 2022, Snyk raised an additional $196.5M at the same $8.5B valuation. The most
              recent primary equity raise was the December 2022 round: $196.5M led by Qatar Investment Authority at a
              $7.4B valuation — a 12% reduction from the prior round's $8.5B, making it an explicitly acknowledged
              down-round. In January 2023, ServiceNow made a $25M strategic investment alongside a commercial
              partnership agreement. Snyk's five SEC Form D filings (CIK 0001824657) confirm its US fundraising
              activity; revenue and operational financials are reported through UK Companies House as Snyk Ltd (a
              UK-registered entity) rather than SEC 10-K/10-Q filings.

              As of December 2024, Snyk held approximately $435M in cash, per CEO McKay's December 2024 TechCrunch
              interview. With a 2024 operating loss exceeding $188M (implying ~$15-16M monthly burn from operations),
              this represents approximately 27-29 months of runway at current burn rates. However, McKay stated Snyk
              expects to not burn cash in 2025, indicating the company is approaching or at operational cash-flow
              break-even. Snyk has not completed an IPO as of May 2026, despite McKay stating plans for a 2022 IPO
              following the Series F, and renewed IPO interest reported in 2024. No debt facilities or project finance
              obligations are publicly disclosed.
