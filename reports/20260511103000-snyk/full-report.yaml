  - id: TI005
    title: Public financial gaps table
    columns:
      - Missing Metric
      - Last Confirmed Value (if any)
      - Impact on Underwriting
      - Exact Diligence Path
    rows:
      - - Net Revenue Retention (NRR / NDR)
        - Not disclosed
        - >-
          Critical — NRR >120% signals strong expansion; NRR <100% indicates churn offset; without NRR, ARR quality
          cannot be independently assessed
        - Request historical NRR for 2021–2024 by quarter; segment by customer size cohort and product line
      - - Customer Acquisition Cost (CAC) and Payback Period
        - Not disclosed
        - High — CAC payback >24 months with <120% NRR implies poor LTV/CAC; S&M spend is large portion of opex
        - Request fully loaded S&M expense breakdown; derive CAC from new logos acquired vs. S&M spend; compute payback
      - - Free Cash Flow (FCF) and EBITDA
        - Not disclosed (operating loss >$188M in 2024)
        - High — operating loss excludes SBC (likely $30–70M+), D&A, and working capital; FCF may differ materially
        - Request GAAP cash flow statement; reconcile operating loss to cash used in operations; identify SBC and capex
      - - Segment Revenue Breakdown (by product line)
        - 'Snyk Code ARR: $100M (confirmed, Q4 2024); Total ARR: >$300M; split of remaining ~$200M+ undisclosed'
        - Medium — product concentration and cross-sell rates affect strategic risk and upsell thesis
        - >-
          Request ARR by product (Open Source, Code, Container, IaC, AppRisk, API & Web); confirm contribution margin by
          SKU
      - - Full Cap Table and Liquidation Preference Stack
        - 'Known investors: QIA, Accel, Tiger Global, Sands Capital, Stripes, ServiceNow; full preferences undisclosed'
        - >-
          High — with $7.4B last-round valuation and ~$1.32B raised, liquidation preferences at exit below $1.32B could
          wipe common equity
        - Request pro forma cap table with liquidation preference analysis at $4B, $6B, $8B, and $10B+ exit scenarios
      - - Gross Margin by Revenue Line (SaaS vs. Services)
        - Blended ~80% reported; SaaS vs. services split undisclosed
        - >-
          Medium — services revenue reduces blended margin; understanding pure SaaS gross margin is critical for
          long-run P&L
        - Request GAAP gross profit by segment; confirm services cost attribution vs. product engineering costs
      - - Stock-Based Compensation (SBC) Expense
        - 'Not disclosed; typical SaaS at this stage: $30–80M annually'
        - Medium — SBC inflates non-cash operating loss; adjusted EBITDA (ex-SBC) is more comparable metric for peers
        - >-
          Request SBC expense by function (R&D, S&M, G&A); confirm option vesting schedule and underwater option
          exposure
    notes: >-
      All gaps listed here reflect information not available from public sources as of May 2026. Several of these
      metrics are routinely disclosed in S-1 filings by companies at IPO; their absence creates material information
      asymmetry for investors. Resolution requires NDA-level financial diligence or IPO prospectus.
    claimRefs:
      - CI035
      - CI036
