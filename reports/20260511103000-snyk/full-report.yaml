    title: Company Overview
    sections:
      - number: '1.1'
        title: Company Identity, Founding, and Business Overview
        blocks:
          - type: paragraph
            body: >
              Snyk (pronounced "sneak") is a private developer security company founded in 2015 with its roots in
              London, UK and Tel Aviv, Israel. The company is now headquartered at 10 Summer Street, Boston, MA 02110,
              with significant engineering and commercial presence maintained across London (24 Eversholt St, London NW1
              1AD), Tel Aviv, Ottawa, Singapore, Sydney, Tokyo, Zurich, Bucharest, Cluj-Napoca, and Lisbon — reflecting
              a genuinely distributed global operation. Snyk's legal entity Snyk Limited is registered in England at
              Highlands House, Basingstoke Road, Reading, Berkshire.

              The company positions itself as "the leader in developer security" and operates under the tagline "AI
              writes, Snyk secures," underscoring its strategic pivot toward AI-assisted and AI-generated code security.
              Snyk's developer security platform integrates directly into software development workflows — covering code
              repositories (GitHub, GitLab, Bitbucket), CI/CD pipelines (Jenkins, Travis CI), and IDEs — and
              continuously scans for vulnerabilities and license issues across five security domains: open-source
              software composition analysis (Snyk Open Source / SCA), proprietary code scanning (Snyk Code / SAST),
              container and Kubernetes security (Snyk Container), infrastructure-as-code misconfiguration detection
              (Snyk IaC), and the newly launched agentic security orchestration system (Evo by Snyk). In 2024, Snyk
              added DAST capabilities through the acquisition of Probely and the launch of Snyk API & Web.

              Snyk's business model is a freemium SaaS model with per-developer seat pricing. A free tier drives organic
              developer adoption and funnel conversion, while paid plans (Team, Business, Enterprise) unlock advanced
              scanning, governance, reporting, and compliance features. The company achieved FedRAMP Moderate
              Authorization in 2024, expanding addressable market to US federal agencies. Named a Leader in the 2025
              Gartner Magic Quadrant for Application Security Testing, Snyk has grown its customer base to approximately
              4,478 enterprises as of end-2024, including Google, Salesforce, Intuit, MongoDB, Comcast, CVS Health,
              Atlassian, Revolut, and Anheuser-Busch InBev.
