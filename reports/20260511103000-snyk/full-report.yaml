      - number: '3.2'
        title: Feature and Product Comparison Across Key Capability Dimensions
        blocks:
          - type: paragraph
            body: >
              Buyers of developer security platforms in 2026 evaluate tools across seven primary capability dimensions:
              SAST (static code analysis), SCA (open-source composition analysis), DAST/API testing, container and
              Kubernetes security, IaC misconfiguration detection, secrets detection, and AI-assisted remediation. Snyk
              offers native products across all seven, making it one of only a handful of platforms with true
              "single-pane" AppSec coverage.

              Veracode leads in binary SAST precision — its engine maps every data path to identify where untrusted data
              interacts with critical functions — and holds 9 perfect scores in the Forrester Wave for SAST. However,
              Veracode lacks a developer-native IDE workflow comparable to Snyk's real-time in-IDE feedback and does not
              offer SCA at the same depth. Checkmarx One has closed much of the product gap with Snyk, adding ASPM, AI
              code analysis, and malicious package detection to its SAST/SCA core — scanning over 800 billion lines of
              code monthly suggests significant deployment breadth. Checkmarx's "AI Guidance Developers Can Rely On"
              message in 2026 directly echoes Snyk's historically differentiated developer-friendly positioning.

              GitHub Advanced Security (GHAS) is narrower: its Code Security add-on ($30/active committer/month) covers
              CodeQL SAST, dependency review (SCA-lite), and secret scanning, but does not provide container security,
              IaC scanning, or the deep vulnerability remediation intelligence Snyk embeds via its proprietary advisory
              database. For GitHub-native organizations with moderate security needs, GHAS removes the procurement
              decision entirely, representing a "good enough" substitute at lower friction and cost.

              Semgrep is developer-first and highly customizable but lightweight on vulnerability intelligence; its rule
              ecosystem depends on community contributions rather than proprietary research. SonarQube provides code
              quality integrated with security detection and has SOC 2 Type II certification for its cloud offering,
              appealing to compliance-driven buyers, but its remediation guidance depth is weaker than Snyk's. Aqua
              Security focuses on container and cloud-native runtime security rather than shift-left AST, competing at
              the infrastructure layer more than the code layer. JFrog Xray offers SCA integrated with artifact
              management — a strong adjacency for organizations already on JFrog's platform but limited outside that
              ecosystem.

              Mend.io's 2026 platform has evolved substantially beyond traditional SCA to include AI behavioral testing,
              runtime in-application protection, and continuous AI model scanning — positioning it as an AI-era AppSec
              platform that competes directly with Snyk's Evo/agentic security offering. Cycode's agentic development
              security platform (combining AST, ASPM, and software supply chain security) and Apiiro's risk-based ASPM
              both target the ASPM/AppSec consolidation trend that Snyk must also serve to retain enterprise customers.
            claimRefs:
