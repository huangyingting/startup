  - number: 3
    title: Competitors
    sections:
      - number: '3.1'
        title: 'Competitive Landscape: Direct, Adjacent, and Nascent Competitors'
        blocks:
          - type: paragraph
            body: >
              As of May 2026, Snyk competes across five overlapping competitor archetypes. First, enterprise AppSec
              incumbents: Veracode (now owned by Broadcom following TA Associates' exit) offers binary-based
              SAST/DAST/SCA with 20+ years of enterprise penetration and 100+ supported languages; Checkmarx One
              packages SAST, SCA, DAST, secrets detection, and ASPM into a single platform that scans over 800 billion
              lines of code per month and benefits from Hellman & Friedman's deep enterprise distribution network. Both
              incumbents anchor in Fortune 500 procurement cycles and compliance-centric security budgets — the opposite
              of Snyk's developer-led sales motion.

              Second, platform-native AppSec from SCM vendors: GitHub Advanced Security (GHAS) bundles CodeQL-powered
              SAST (code scanning), secret scanning, and dependency review directly into GitHub repositories. As of
              2026, GHAS is priced at $19/month for Secret Protection and $30/month for Code Security per active
              committer — substantially cheaper than Snyk's per-developer enterprise tiers and available with zero
              additional integration work for the ~100M developers already on GitHub. GitLab's integrated security suite
              offers SAST, DAST, container scanning, and dependency scanning built into its CI/CD pipelines, targeting
              organizations standardized on GitLab Ultimate.

              Third, open-source-adjacent challengers: Semgrep (Semgrep Inc., $53M Series B raised in 2022) provides
              lightweight developer-centric SAST with a free OSS tier and rule customization that appeals to
              engineering-led security programs. SonarQube/SonarCloud (Sonar company) serves over 7 million developers
              worldwide with code quality and security analysis that competes directly with Snyk Code at the SAST layer.

              Fourth, cloud security platforms extending into code: Wiz (trusted by over 50% of Fortune 100 companies)
              has expanded from CNAPP into code-to-cloud security, connecting SCM repositories, CI/CD pipelines, and
              runtime clouds into a unified security graph — directly challenging Snyk's IaC and container scanning
              products. Orca Security similarly offers agentless cloud-native application protection with code-level
              reachability analysis. These cloud-native vendors raised substantially larger recent rounds and have
              strong enterprise sales organizations.

              Fifth, SCA/supply-chain specialists: Mend.io (formerly WhiteSource) rebranded to focus on AI-generated
              code security and software composition analysis; JFrog Xray provides enterprise SCA integrated into the
              JFrog Artifactory binary repository platform; Cycode offers an agentic application security platform
              combining AST, ASPM, and software supply chain security; Apiiro provides risk-based ASPM with deep SCM
              integration for code risk quantification.
