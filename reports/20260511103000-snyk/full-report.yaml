      - number: '8.5'
        title: Exit Pathways and Diligence Asks
        blocks:
          - type: paragraph
            body: >-
              Snyk has three plausible exit pathways: IPO, strategic acquisition, and secondary buyout. The IPO path
              requires filing an S-1, demonstrating Rule-of-40 compliance (ARR growth + FCF margin >= 40%), and pricing
              at multiples that the public market will sustain. With no S-1 filed as of May 2026 and CEO vacancy, this
              path is at minimum 18-24 months away. The company's December 2024 CEO comment about not rushing to go
              public suggests management concurs. Globes reported in late 2024 that the then-CEO favored a Wall Street
              IPO in 2026, a timeline that appears optimistic given the governance transition following McKay's February
              2026 departure.

              A strategic acquisition remains viable. Security platform vendors such as Cisco, Palo Alto Networks,
              Microsoft, and Broadcom have demonstrated appetite for developer-security assets at multiples driven by
              strategic fit rather than pure revenue multiples. However, Snyk's $8.5 billion anchor creates a
              psychological floor that may deter acquirers unless growth re-accelerates materially. An M&A outcome at
              $1.5-3.0 billion is feasible without re-acceleration; above that requires demonstrated platform stickiness
              in enterprise accounts.

              Secondary buyout by a growth-equity or late-stage PE firm is the most likely near-term liquidity event if
              IPO markets remain challenging. TPG-style buyers would apply 3-5x ARR multiples and engineer an
              operational turnaround before a secondary IPO in 3-5 years.

              Key diligence asks before pricing any investment: (1) audited revenue and gross margin for FY2024 and
              FY2025; (2) NRR by cohort, especially 2020-2021 vintage customers; (3) cash and remaining runway with
              detailed burn projections; (4) full cap table with liquidation preferences and anti-dilution terms; (5)
              status of the CEO search and incoming mandate.
            claimRefs:
