      - number: '8.2'
        title: Financing History and Valuation Context
        blocks:
          - type: paragraph
            body: >-
              Snyk closed its Series F in September 2021, raising $530 million at an $8.5 billion post-money valuation
              led by Tiger Global Management. Four months later, in January 2022, Snyk raised an additional $196.5
              million at the same $8.5 billion valuation, with Qatar Investment Authority and Singapore's GIC
              participating. Both rounds were confirmed via SEC Form D filings and contemporaneous official press
              releases. Total disclosed equity raised since founding exceeds $1.25 billion across six rounds.

              The fundraising backdrop has shifted dramatically since 2022. The BVP Nasdaq Emerging Cloud Index declined
              roughly 60% from its November 2021 peak through 2022, and while it has partially recovered, public SaaS
              multiples remain well below 2021 highs. Sacra's ARR model shows Snyk at approximately $322 million for
              full-year 2024 and $326 million as of February 2026, implying annual growth of roughly 7%, a sharp
              deceleration from the 50%+ growth rates implied by the 2021-2022 valuation. TechCrunch confirmed $300
              million ARR in December 2024 based on company statements. Snyk's CEO publicly stated in 2024 that the
              company is not rushing to go public, reflecting both unfavorable market conditions and the need to
              demonstrate re-acceleration before roadshowing.

              A secondary-market signal emerged in December 2022 when Axios reported that Snyk had raised secondary
              funding at a valuation meaningfully below the $8.5 billion peak, consistent with the broader
              private-market reset affecting late-stage technology companies at that time. No subsequent primary round
              has been announced, making the secondary transaction data the most recent arm's-length valuation
              reference.
            claimRefs:
