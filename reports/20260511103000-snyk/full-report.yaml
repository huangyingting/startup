  - number: 7
    title: Risks
    sections:
      - number: '7.1'
        title: Market and Competitive Risks
        blocks:
          - type: paragraph
            body: >-
              Snyk's most immediate existential risk is competitive displacement by platform-native security tooling
              bundled into development infrastructure vendors already embedded in customer workflows. GitHub Advanced
              Security (GHAS) represents the clearest and most quantified competitive threat: Microsoft includes GHAS at
              no incremental cost for GitHub Enterprise Cloud subscribers, delivering CodeQL-powered static analysis
              (SAST) and Dependabot-powered SCA—the two highest-revenue Snyk product lines. An enterprise running GitHub
              Enterprise already pays for a superset of Snyk's core functionality, creating a powerful economic
              substitution argument at renewal. GitHub's own documentation confirms GHAS covers code scanning, secret
              scanning, Dependabot dependency updates, and security overviews, effectively replicating Snyk Open Source
              and Snyk Code functionality within the platform developers already live in.

              GitLab presents a parallel bundling threat for GitLab-hosted customers, with native SAST, dependency
              scanning, container scanning, and secret detection built into GitLab Ultimate and, increasingly, into
              lower-tier plans. AWS Inspector and Azure Defender for Cloud extend this pattern into cloud-native
              infrastructure scanning, targeting Snyk Container and Snyk IaC workloads directly. Google Cloud's Artifact
              Analysis provides container image vulnerability scanning natively. The cumulative effect of these bundled
              offerings is structural pricing pressure: customers who previously paid Snyk $25–$100 per developer per
              month for SCA and SAST coverage can now argue that these functions are included in their existing
              infrastructure spend.

              Open-source alternatives further erode Snyk's pricing power in the free and SMB tiers. Semgrep's
              open-source core and Semgrep Pro compete directly on SAST; OWASP Dependency-Check and similar tools
              provide basic SCA at zero marginal cost. JFrog Xray, Mend (formerly WhiteSource), Sonatype Nexus
              Lifecycle, and Cycode compete across the broader AppSec tooling spectrum. Checkmarx and Veracode have both
              invested in AI-powered remediation features that directly counter Snyk's DeepCode AI differentiation. The
              risk is not that Snyk loses all customers to these alternatives, but that commoditization pressure drives
              average selling prices (ASP) downward in each product category, compressing gross margins and elongating
              payback periods at a company whose $8.5B peak valuation was predicated on high-growth, high-margin SaaS
              expansion. The October 2024 Gartner Peer Insights critical review citing GitHub GHAS as the reason for
              evaluating alternatives provides direct third-party evidence that this substitution is occurring in the
              enterprise segment today.
