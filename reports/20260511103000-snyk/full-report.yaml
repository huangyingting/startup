  - number: 8
    title: Valuation
    sections:
      - number: '8.1'
        title: Investment Thesis and Anti-Thesis
        blocks:
          - type: paragraph
            body: >-
              Snyk occupies a distinctive niche at the intersection of developer productivity and application security:
              its developer-first SAST, SCA, container, and IaC scanning platform is embedded in CI/CD pipelines and IDE
              workflows across tens of thousands of organizations. The investment thesis rests on three pillars. First,
              regulatory tailwinds - NIST SSDF, EU Cyber Resilience Act, and U.S. Executive Order 14028 - mandate
              software bill-of-materials and shift-left controls that Snyk is structurally positioned to satisfy.
              Second, the platform has sticky, workflow-embedded land-and-expand economics: customers begin with
              open-source scanning and expand into container and code security modules, driving multi-product attach.
              Third, Snyk's developer-centric go-to-market has historically translated to high net-revenue retention
              even as the security market consolidates around platform vendors.

              The anti-thesis is equally compelling. Growth has slowed to approximately 7% year-over-year from
              triple-digit expansion in 2020-2021, reflecting saturation of the early-adopter developer cohort and
              intensifying competition from GitHub Advanced Security (free for GitHub Enterprise users), Amazon
              Inspector, and Microsoft Defender for DevOps. Larger SAST/SCA platform vendors such as Veracode,
              Checkmarx, and Semgrep have closed the tooling gap. Snyk's $8.5 billion peak valuation implies a multiple
              that has never been sustained at comparable growth rates in the public market. CEO McKay's departure in
              February 2026, without an announced successor at time of writing, creates material execution risk.
              Combined with no new equity financing since January 2022, the company may face a challenging fundraising
              environment if cash runs low before an IPO window opens.
