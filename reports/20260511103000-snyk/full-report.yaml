      - number: '2.3'
        title: Buyer, User, and Payer Segmentation with Budget Ownership
        blocks:
          - type: paragraph
            body: >
              The AppSec buyer map is distinctively bifurcated: Snyk's developer-first motion serves two parallel buyer
              motions that must be aligned to close enterprise deals. The bottom-up motion starts with individual
              developers or DevOps engineers who adopt Snyk's free tier organically — triggered by encountering an
              open-source vulnerability or a CI/CD pipeline security gate requirement — and then generate a pull from
              their security team for enterprise licensing. The top-down motion starts with a CISO or AppSec lead
              evaluating Snyk against incumbent point tools (Checkmarx, Veracode, Synopsys Black Duck) or a DevSecOps
              platform brief, with the enterprise license purchased from the security or IT budget.

              Budget ownership differs materially by segment. In enterprise accounts (>1,000 developers), the CISO
              typically controls the AppSec budget line and signs the contract, while the AppSec team and platform
              engineering leads drive the technical evaluation. In mid-market accounts (100–1,000 developers), the CTO
              or VP Engineering is frequently both buyer and budget owner, and the sales motion is more product-led. In
              regulated verticals — BFSI, healthcare, and government — compliance officers and risk teams co-approve
              purchases, extending sales cycles but increasing contract durability. BFSI represented the largest
              end-user vertical with 24.83% of 2025 AppSec spending according to Mordor Intelligence.

              Adoption triggers vary by segment: enterprise wins are most commonly catalysed by an audit finding,
              post-breach remediation requirement, or regulatory compliance deadline (PCI-DSS 4.0 full enforcement in
              March 2025 was a documented near-term catalyst). Mid-market and tech-startup adoption is often triggered
              by a dependency vulnerability incident (e.g., Log4Shell), a supply chain security policy requirement from
              a major enterprise customer, or developer-led trial that surfaces material OSS risk. North America
              accounts for approximately 40.91% of global AppSec revenue (Mordor), with Asia-Pacific expected to grow at
              the highest regional CAGR of 13.83% through 2031.
