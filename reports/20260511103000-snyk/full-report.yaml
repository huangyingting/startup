      - number: '7.2'
        title: Financial and Execution Risks
        blocks:
          - type: paragraph
            body: >-
              Snyk's financial risk profile is anchored by the gulf between its 2021 peak valuation ($8.5B, implying
              28–43x forward ARR multiples at the time) and the valuation multiples that the public market has applied
              to comparable security software businesses since the 2022 rate-cycle correction. With $300M ARR as of
              end-2024 and public market security SaaS peers trading at 5–12x ARR in 2024–2026, a fair-value mark on
              Snyk would imply a $1.5–3.6B enterprise value—a 55–80% discount to the 2021 peak. This creates a
              structural down-round risk: any new equity capital raised, whether for growth investment or pre-IPO
              secondary liquidity, would likely require pricing at a lower per-share value than the $8.5B round,
              triggering anti-dilution provisions for earlier investors and signaling distress to prospective enterprise
              customers who use vendor viability as a procurement criterion.

              The IPO pathway remains the most visible unresolved execution risk. Snyk's Series G investors acquired
              shares at an $8.5B valuation; a public offering at a materially lower price requires either investor
              acceptance of a paper write-down or market conditions improving to justify premium multiples. As of May
              2026, Snyk has not filed an S-1 or equivalent prospectus with the SEC and no IPO date has been announced.
              The Globes (Israeli business press) reported in 2025 that then-CEO McKay favored a Wall Street IPO in
              2026, but McKay's departure in February 2026 introduces significant uncertainty about continuity of the
              IPO strategy. An extended pre-IPO holding period increases employee equity fatigue and attrition risk
              among key technical contributors who joined on the expectation of a near-term liquidity event.

              Layoffs are a documented adverse financial signal. Snyk executed two rounds of workforce
              reductions—reported cuts in 2022 and confirmed 14% headcount reductions reported in November
              2023—consistent with a shift from growth-at-all-costs to a path toward operating breakeven. The company
              has guided toward approaching breakeven on the $300M ARR base. With approximately $1.4B raised (implying
              $400–700M deployed historically), remaining cash runway is likely multi-year, but exact figures are not
              publicly disclosed. CEO transition risk compounds the financial uncertainty: Peter McKay's February 2026
              departure announcement while the company is in active IPO preparation is a high-disruption event that
              could delay filings, unsettle customer relationships, and trigger key-employee departures ahead of any
              lock-up cliff.
