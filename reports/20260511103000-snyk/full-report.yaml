  - number: 6
    title: Customers
    sections:
      - number: '6.1'
        title: Customer Base Profile and Segmentation
        blocks:
          - type: paragraph
            body: >-
              Snyk's customer base spans the full enterprise software ecosystem, ranging from individual open-source
              developers on the free tier to Fortune 500 enterprises managing tens of thousands of repositories. As of
              December 2024, Snyk reported approximately 2,400 paying customers and more than 200,000 free developer
              users, with annual recurring revenue of $300 million—a clear signal that commercial conversion from the
              product-led growth (PLG) motion is working. Paying customers skew enterprise: Atlassian, Salesforce,
              MongoDB, Revolut, Komatsu, Skyscanner, Asurion, DigitalOcean, and TechnologyOne represent the publicly
              named tier. Vertical coverage includes financial services (Revolut), travel-tech (Skyscanner), cloud
              infrastructure (DigitalOcean, MongoDB), manufacturing (Komatsu), and B2B SaaS (Salesforce, Atlassian).
              Geographically, Snyk is strongest in North America and Western Europe, with a growing presence in the
              Asia-Pacific region as evidenced by its listing in the Singapore Government Technology Agency's approved
              product catalog. The primary buyer persona is the CISO or head of application security, but the discovery
              motion originates with developers. PLG drives initial adoption through the free tier, while the sales team
              up-sells to enterprise licenses with SSO, RBAC, audit logging, and policy controls. Channel partners and
              systems integrators (Computacenter, global SIs) extend reach into mid-market and regulated verticals.
              Revenue concentration is a known risk: with only 2,400 paying customers against a total addressable
              developer population of tens of millions, the commercial base remains relatively narrow, and the top
              cohort of enterprise accounts is likely disproportionately large in revenue contribution.
