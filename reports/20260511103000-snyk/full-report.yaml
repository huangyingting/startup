  - number: 2
    title: Market Analysis
    sections:
      - number: '2.1'
        title: Market Boundary, Included Spend, and Adjacencies
        blocks:
          - type: paragraph
            body: >
              The Application Security (AppSec) market encompasses tools and services that discover, prevent, and
              remediate security vulnerabilities within software applications across the full development lifecycle. The
              core software sub-segments relevant to Snyk are: Software Composition Analysis (SCA), which scans
              open-source dependencies for known CVEs and license risks; Static Application Security Testing (SAST),
              which analyses source code, bytecodes, and binaries without executing the application; Dynamic Application
              Security Testing (DAST), which probes running applications and APIs for exploitable weaknesses; Container
              Security, which inspects container images and Kubernetes configurations; and Infrastructure-as-Code (IaC)
              Security, which detects policy violations in Terraform, Helm, and CloudFormation templates. Snyk
              participates in all five categories via its platform products.

              Several adjacent markets are typically excluded from Snyk's direct TAM but represent both competitive
              substitutes and potential bundling threats. Web Application Firewalls (WAF) and Runtime Application
              Self-Protection (RASP) address real-time traffic filtering rather than developer-stage testing and are
              typically bought by security operations teams rather than developers. Cloud Security Posture Management
              (CSPM) overlaps with IaC scanning at the cloud-configuration layer but is purchased through separate cloud
              security budgets managed by platform or cloud-ops teams. Managed Security Services (MSSP), network
              security, and endpoint detection sit entirely outside the AppSec software perimeter. The key distinction
              analysts draw is between developer-tooling AppSec spend — which flows through engineering and DevOps
              budgets and where Snyk is strongest — versus operational security spend controlled by security operations
              centres.

              Status-quo substitutes include manual code review, internal penetration testing teams, point-in-time
              vulnerability scanners without CI/CD integration, and homegrown scripts wrapping open-source tools such as
              Bandit (Python SAST), OWASP Dependency-Check (SCA), and Trivy (container scanning). These substitutes are
              prevalent in cost-constrained environments and represent the displacement opportunity for Snyk's freemium
              model. The OWASP Top Ten 2025 remains the primary public benchmark cataloguing the most critical
              web-application risks and shapes both buyer awareness and tool-evaluation criteria globally.
            claimRefs:
              - CM001
              - CM006
              - CM010
              - CM029
              - CM030
          - type: table
            tableRef: TM001
            claimRefs:
