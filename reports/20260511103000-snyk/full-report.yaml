      - number: '4.4'
        title: Evidence Gaps, Financial Risks, and Verdict
        blocks:
          - type: paragraph
            body: >-
              Financial verdict: Snyk is a high-quality SaaS business with 80% gross margins, >$300M ARR, a strong
              developer brand, and a multi-product platform in one of the fastest-growing segments of cybersecurity. The
              revenue growth deceleration (157% → 50% → 26%) is a concern but mirrors industry-wide trends post-ZIRP and
              is consistent with a company at Snyk's scale. At the December 2022 last-round valuation of $7.4B, Snyk
              trades at approximately 24-25x ARR — in line with the high end of public cybersecurity SaaS peers,
              warranting scrutiny of whether post-IPO multiples would support or compress this level. The December 2022
              down-round is a material adverse signal: it confirmed that the $8.5B peak valuation was unsustainable and
              that later investors (Series E/F participants) hold positions with underwater economics at the last formal
              round price. The three layoff rounds in 2022-2023 suggest the company over-hired in the ZIRP era and had
              to undergo painful cost-right-sizing. CEO McKay's statement that Snyk would reach operational cash-flow
              breakeven in 2025 is encouraging but depends on continued revenue execution without re-acceleration of
              opex.

              The primary financial diligence blockers are: (1) NRR/GRR — not disclosed, yet critical for evaluating
              expansion and churn trajectory; (2) CAC and payback period — not disclosed, making GTM efficiency
              unverifiable; (3) free cash flow and EBITDA — operating loss does not capture working capital, capex, or
              stock-based compensation, which may differ materially; (4) segment revenue breakdown — while Snyk Code
              ($100M ARR) is disclosed, the split between SCA, Container, IaC, and AppRisk remains estimated; (5) full
              cap table structure — liquidation preference stacks, anti-dilution provisions, and economic waterfalls are
              not publicly disclosed, which could materially affect common equity outcomes in a below-peak exit
              scenario. Given the December 2022 down-round, liquidation preference analysis is particularly important
              for common equity and option-holder economics.
