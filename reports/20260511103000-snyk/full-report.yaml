      - number: '6.4'
        title: Retention, Renewal, and Customer Satisfaction
        blocks:
          - type: paragraph
            body: >-
              Snyk does not disclose net revenue retention (NRR) or gross revenue retention (GRR) publicly. Sacra
              estimated Snyk's NRR in the 115–130% range based on revenue and customer growth signals, consistent with
              developer security platforms where land-and-expand is the dominant motion. Third-party review aggregators
              provide the best available satisfaction proxy: G2 rates Snyk at 4.5 out of 5 across more than 200 reviews,
              with reviewers praising automated fix pull requests, real-time alerts, and IDE integration. TrustRadius
              reviewers echo the automated remediation theme and highlight the breadth of language and package manager
              coverage. Gartner Peer Insights includes a January 2026 review at 4.0/5 lauding enterprise security
              capabilities, alongside an October 2024 critical review rated 3.0/5 titled "Traditional SCA Solution Faces
              Modern Challenges," which notes increasing competition and commoditization in the SCA segment. TrustPilot
              carries a mixed signal: a 2024 reviewer praised Snyk's renewal experience, while a 2022 reviewer cited
