      - number: '8.3'
        title: Comparable Company Analysis
        blocks:
          - type: paragraph
            body: >-
              Public comparable companies span a wide range of ARR multiples in May 2026, reflecting differences in
              growth rate, gross margin, profitability trajectory, and perceived platform durability. At the high end,
              CrowdStrike (CRWD) trades at approximately 21x trailing ARR on roughly $4.2 billion in FY2026 ARR,
              supported by 20%+ revenue growth and best-in-class net revenue retention above 120%. Palo Alto Networks
              (PANW) trades at approximately 23x next-generation security ARR of $5.1 billion, with its platformization
              strategy driving rapid NGS growth even as total revenue growth moderates.

              In the mid-tier, GitLab (GTLB) trades at roughly 12x ARR on approximately $740 million in FY2025 ARR, with
              25%+ revenue growth and improving unit economics. These companies represent the realistic ceiling for
              Snyk's multiple given its growth profile. At the lower end, Qualys (QLYS) trades at approximately 4x ARR
              on $500 million in ARR, reflecting sub-10% growth, while Rapid7 (RPD) trades at approximately 2x ARR on
              $800 million, weighed down by contested competitive positioning and a pending strategic review.

              Applying these multiples to Snyk's estimated $326 million ARR yields a comparable-company range of roughly
              $0.65 billion (2x Rapid7 floor) to $7.5 billion (23x PANW ceiling). A defensible central tendency using
              the 8-12x range applicable to moderate-growth security SaaS yields $2.6-3.9 billion. Snyk's 7% ARR growth
              is closer to Qualys than to CrowdStrike, which supports a 4-8x multiple range as the most honest anchor
              absent re-acceleration evidence. Private-market M&A provides a floor: TPG's acquisition of Checkmarx at
              approximately $1.1 billion ($300 million ARR, ~3.5x ARR) sets a credible downside benchmark.
