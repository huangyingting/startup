  - id: FR003
    title: Dependency map
    type: timeline
    layout: wide
    summary: >-
      Chronological view of the emergence and escalation of key competitive threats to Snyk, from the initial GHAS
      launch through anticipated AI-native autofix commoditization.
    claimRefs:
      - CR001
      - CR002
      - CR003
      - CR004
      - CR005
      - CR008
    data:
      items:
        - label: GitHub Advanced Security GA Launch
          date: 2020-09
          detail: GHAS becomes generally available; CodeQL SAST and Dependabot SCA bundled into GitHub Enterprise
          tone: adverse
        - label: GitLab Ultimate Native Security Features
          date: 2021-06
          detail: GitLab expands native SAST, dependency scanning, container scanning into Ultimate tier
          tone: adverse
        - label: AWS Inspector v2 — Container + Lambda
          date: 2022-11
          detail: AWS Inspector v2 launches with near-real-time container and Lambda vulnerability scanning
          tone: adverse
        - label: Gartner Peer Insights GHAS Substitution Review
          date: 2024-10
          detail: Critical Gartner Peer Insights review cites GHAS as primary reason for evaluating Snyk alternatives
          tone: adverse
        - label: GitHub Copilot Autofix (AI Inline Security)
          date: 2024-11
          detail: GitHub Copilot Autofix launches inline AI-powered security fix suggestions inside GitHub PRs
          tone: adverse
        - label: Azure Defender for Cloud DevSecOps Expansion
          date: 2025-03
          detail: Microsoft expands Defender for Cloud into unified CNAPP covering code-to-runtime; IaC and container scanning
          tone: adverse
        - label: AI-Native Coding Tools with Security Context
          date: 2026-2027
          detail: >-
            Cursor, Codeium, GitHub Copilot and similar tools expected to add proactive vulnerability prevention at
            code-generation time
          tone: adverse
  - id: FR004
    title: Risk Mitigation Flow — From Identified Risk to Monitored Control
    type: flow
    layout: wide
    summary: >-
      Illustrates Snyk's primary defensive posture against its top risk categories, mapping each risk driver through
      mitigating actions and residual risk state.
    claimRefs:
      - CR001
      - CR017
      - CR024
      - CR026
      - CR031
    data:
      nodes:
        - id: ghas-threat
          label: GHAS / Platform Bundling Threat
          type: input
          description: Microsoft/GitHub bundling SCA+SAST into GitHub Enterprise
        - id: differentiation
          label: AI Differentiation (DeepCode / Evo)
          type: process
          description: >-
            Snyk counters bundling with AI-powered auto-fix, deeper vulnerability intelligence database, and agentic Evo
            orchestration layer
        - id: fp-risk
          label: False Positive / AI Accuracy Risk
          type: input
          description: Alert fatigue and ML false negatives reduce developer trust in Snyk results
        - id: precision-control
          label: Precision Tuning + Human-in-Loop AI
          type: process
          description: >-
            DeepCode AI uses human-in-the-loop training to reduce FP rates; priority scoring surfaces highest-confidence
            findings first
        - id: supply-chain-risk
          label: Supply-Chain Compromise Risk
          type: input
          description: Snyk CLI/IDE extensions process customer source code; compromise = catastrophic
        - id: security-controls
          label: SOC 2 + FedRAMP + Trust Portal
          type: process
          description: >-
            SOC 2 Type II, FedRAMP Moderate, trust.snyk.io security posture disclosure and pen testing provide
            defense-in-depth against supply-chain attack
        - id: residual-risk
          label: Residual Risk (Monitored)
          type: output
          description: >-
            After mitigations, residual competitive displacement risk remains high; residual supply-chain and regulatory
            risks are medium; ongoing monitoring required
      edges:
        - from: ghas-threat
          to: differentiation
        - from: differentiation
          to: residual-risk
        - from: fp-risk
          to: precision-control
        - from: precision-control
          to: residual-risk
        - from: supply-chain-risk
          to: security-controls
        - from: security-controls
          to: residual-risk
