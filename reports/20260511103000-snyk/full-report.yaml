  - id: TE003
    title: Technical Capability Comparison
    columns:
      - Capability
      - Snyk Approach
      - Typical Competitor Approach (GHAS / Checkmarx)
      - Snyk Advantage / Risk
    rows:
      - - Vulnerability Database
        - Proprietary Snyk Intel DB; 3× NVD coverage; curated fix advice; 47-day faster disclosure; CNA status
        - NVD-based or similar external DB with less curation
        - Advantage — faster, richer intelligence; Risk — single-vendor trust dependency
      - - SAST Engine
        - >-
          DeepCode AI (hybrid symbolic + generative); 25M+ data flow cases; 80%-accurate auto-fix; self-hosted; no
          customer data in training
        - Semgrep rules (GitHub); pattern-based rules (Checkmarx); GenAI overlays (various)
        - Advantage — proprietary AI with privacy guarantees; Risk — 20% auto-fix error rate at scale
      - - Auto-fix / Remediation
        - One-click fix PRs (Open Source); Agent Fix inline (Code); base-image upgrade (Container)
        - Dependabot fix PRs (GHAS); manual fix advice (most others)
        - Advantage — broadest automated remediation coverage across scan types
      - - Developer Experience
        - Free tier; CLI (npm, brew); all major IDEs; AI coding assistant integration (Studio)
        - GHAS bundled with GitHub (no extra install); others require enterprise onboarding
        - Advantage — fastest path to adoption; Risk — GHAS bundling erodes free-tier moat
      - - Risk Prioritization
        - 'AppRisk risk scoring: EPSS + CVSS + reachability + exploit maturity + business context'
        - CVSS-only or basic severity (most tools); GHAS adds reachability for some languages
        - Advantage — most contextual risk scoring among pure-play AppSec vendors
      - - IaC Coverage
        - Terraform, CloudFormation, ARM, Helm, K8s manifests; OPA custom policies; CIS benchmarks
        - Checkmarx KICS; GHAS limited IaC support; Wiz cloud-side scanning
        - Advantage — broadest IaC format coverage; OPA extensibility for custom compliance
    claimRefs:
      - CE008
      - CE002
      - CE005
      - CE006
    notes: >-
      Competitor approaches and advantages are primarily sourced from Snyk marketing materials and OWASP SAST
      limitations documentation. Independent third-party benchmarks were not available. All Snyk capability claims are
      company-sourced; treat as directional comparisons requiring independent validation.
