      - number: '2.4'
        title: Growth Drivers and Adoption Constraints
        blocks:
          - type: paragraph
            body: >
              The AppSec market's primary structural growth drivers are well-documented and largely durable. Open-
              source software now underpins the majority of commercial application code; Sonatype's State of the
              Software Supply Chain 2024 documents that open-source malware campaigns are increasingly nation-state
              sponsored and optimized for developer workflows. This directly expands Snyk's SCA addressable base. The
              proliferation of AI-generated code (via GitHub Copilot, Cursor, and similar tools) is creating a new class
              of unknown vulnerabilities at a rate that outpaces traditional manual security review, creating urgency
              around AI-aware scanning tools — a wedge Snyk's "AI writes, Snyk secures" positioning attempts to exploit.
              IBM's 2025 Cost of a Data Breach Report found the global average breach cost was $4.4M, a 9% decrease
              year-over-year attributable to AI-enabled detection — but also noted that 97% of organizations
              experiencing AI-related security incidents lacked proper AI access controls, pointing to a large
              unaddressed risk surface.

              Regulatory catalysts are accelerating budget allocation. The EU's Digital Operational Resilience Act
              (DORA) requires financial entities to demonstrate resilience through mandatory testing as of January 2025.
              The US Executive Order 14028 and CISA's Software Bill of Materials (SBOM) framework require federal
              software suppliers to provide SBOMs — a mandate that expands Snyk's federal addressable market (activated
              by FedRAMP Moderate Authorization in 2024). The EU Cyber Resilience Act and NIST's Secure Software
              Development Framework (SSDF) create further compliance-driven demand across enterprise segments.

              Adoption constraints are real and require management attention. Developer alert fatigue is cited across
              multiple industry sources as the primary reason security tool ROI is difficult to demonstrate; teams
              facing high false-positive rates from SAST tools routinely deprioritize findings. Budget consolidation is
              driving enterprise buyers toward consolidated AppSec platforms from CrowdStrike, Palo Alto Networks, and
              Microsoft Defender — all of which are bundling AppSec capabilities into broader security platforms at
              discounted rates, threatening Snyk's point-tool pricing power. Capital intensity and talent shortages also
              constrain SMB adoption, as small teams lack dedicated AppSec personnel to triage and remediate findings at
              scale.
