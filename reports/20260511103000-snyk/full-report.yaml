  - number: 4
    title: Financials
    sections:
      - number: '4.1'
        title: Revenue Model, Pricing, and GTM Economics
        blocks:
          - type: paragraph
            body: >-
              Snyk operates a freemium SaaS business model with per-developer seat pricing as the primary revenue
              mechanism. The freemium funnel is central: a free tier with limited scanning capabilities is available to
              individual developers and small teams, driving organic adoption across engineering organizations. Once
              developers integrate Snyk into their workflows, enterprise security and platform teams typically
              centralize the deployment, converting free users to paid seats at the Team, Ignite, or Enterprise pricing
              tiers. As of 2026, Snyk's plans include the Free tier (unlimited developers, limited test quota), the Team
              plan (from approximately $25/month or ~$300/year per developer), the Ignite plan (targeting companies with
              fewer than 50 developers, full AppSec governance), and the fully custom Enterprise tier with FedRAMP
              Moderate authorization and volume pricing.

              The pricing architecture has evolved materially since 2020. Sacra research documents that when Snyk sold
              open-source and container security in 2020, the Team subscription was priced at approximately $1,319/year
              for 25 seats and $3,298/year for 50 seats. After adding Snyk Code (SAST) and IaC scanning as part of the
              core platform in 2021-2022, pricing roughly doubled: the Team plan for 25 developers reached approximately
              $2,675/year, while the Business plan for 50 developers reached approximately $6,916/year. This pricing
              leverage — achieving higher per-seat prices while broadening the platform — represents a core unit
              economics driver. The current "from $25/month" per developer positioning suggests continued simplification
              of the pricing model toward per-seat rather than per-SKU pricing.

              Snyk's go-to-market motion combines bottom-up product-led growth (PLG) with a top-down enterprise sales
              overlay. The developer freemium funnel generates approximately 2.5 million free developer accounts (per
              Sacra 2023 data), which serves as an inbound lead engine. Enterprise sales teams convert the largest
              accounts, often using procurement-led multi-year contracts with volume discounts. The revenue model also
              includes Professional Services for enterprise onboarding, and in 2024 Snyk added Snyk Learn (security
              training) and Snyk API & Web (DAST, acquired via Probely) as additional revenue streams. Geographic
              revenue is approximately 70% North America and 10% APAC, with Europe making up the balance. Revenue
              recognition is SaaS subscription (ratably recognized over contract term), and there is a timing lag
              between ARR (forward-looking committed) and invoiced revenue (what Companies House reports).
