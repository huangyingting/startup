summary:
  headline: >-
    Snyk 是开发者安全平台的定义者，ARR 超过 $300M、客户 4,478 家；但 2022 年峰值估值与当前 SaaS 倍数落差太大，估值压缩、GitHub / GitLab 平台原生竞争加剧，以及 IPO
    退出路径不确定，都是实质风险。
