    - id: EGE002
      description: >-
        No independent third-party benchmark or audit of Snyk's "3× NVD coverage" and "47-day faster
        disclosure" claims (SE009/CE008) was identified. These statistics originate from Snyk's own
        marketing materials and have not been verified against a competing vendor's measurement of the
