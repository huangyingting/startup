callouts:
  - calloutType: strength
    title: Developer-First Distribution + AI Differentiation = Durable Moat
    body: >-
      Snyk's integration depth — CLI, five IDE environments, four SCM platforms, six+ CI/CD systems —
      creates switching friction that pure-enterprise security vendors cannot easily replicate. Combined
      with DeepCode AI's self-hosted, privacy-preserving architecture (unique among AI SAST vendors),
      Snyk offers the developer productivity benefit of AI-assisted remediation without the data
      privacy tradeoff that enterprise security teams demand. The 80%-accurate Agent Fix, validated in
      Stack Overflow's developer survey as the only AI SAST shortlisted by developers themselves,
      represents genuine product differentiation rather than marketing positioning.
    claimRefs:
      - CE002
      - CE009
      - CE012
      - CE023
  - calloutType: risk
    title: GitHub Advanced Security Bundling Erodes Free-Tier Moat
    body: >-
      GitHub Advanced Security (GHAS) is bundled with GitHub Enterprise and provides SCA and SAST
      capabilities that overlap substantially with Snyk Open Source and Snyk Code. As GitHub Enterprise
      penetration grows, Snyk's free-tier-as-acquisition-channel strategy faces structural headwinds:
      developers working in GitHub Enterprise environments already have a "good enough" security
      scanner without any install friction. Snyk's ability to differentiate on database quality,
      language breadth, and AI accuracy must be consistently communicated to security buyers who
      control procurement, not the individual developers who would otherwise self-select Snyk.
    claimRefs:
      - CE015
      - CE021
  - calloutType: insight
    title: AI-Native Code Security Is the Next Architecture Bet
    body: >-
      Snyk's Evo and Snyk Studio investments represent a thesis that the application security category
      will bifurcate: traditional deterministic SAST/SCA will commoditize (GHAS, bundled tools) while
      a new AI-native security layer — governing AI coding assistants, AI agents, and non-deterministic
      LLM-based applications — creates a premium tier that incumbents are not yet equipped to address.
      This is a high-risk, high-reward bet. Evo is early-stage and the AI-native security market is
      undefined; but Snyk's platform access to the developer workflow gives it a structural advantage
      in placing these guardrails at the point of AI-code generation.
    claimRefs:
      - CE007
      - CE028
      - CE029

