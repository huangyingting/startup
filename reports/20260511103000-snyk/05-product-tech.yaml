chapter:
  number: 5
  title: Product and Technology
  summary: >-
    Snyk operates a seven-product developer security platform spanning SCA, SAST, Container, IaC,
    DAST, ASPM, and agentic security, differentiated by its proprietary DeepCode AI engine (25M+
    data flow cases), Snyk Intel vulnerability database (3× more entries than NVD), and developer-first
    distribution model (CLI, IDE plugins, free tier). The platform's 2025–2026 pivot to AI-accelerated
    remediation — "AI writes, Snyk secures" — positions Snyk to address proliferating AI-generated code
    vulnerabilities, though competitive pressure from bundled GitHub Advanced Security, a 20% AI fix
    hallucination rate, and closed-source database architecture present material technology risks.

sections:
  - id: product-portfolio
    title: Product Portfolio and Core Capabilities
    body: >-
      Snyk's platform consists of seven distinct security products that address the full application
      security testing (AST) spectrum. Snyk Open Source is the founding and most widely-used product,
      providing software composition analysis (SCA) that scans open-source dependencies against the Snyk
      Intel vulnerability database. It supports 19+ languages and package managers, generates one-click
      fix PRs with customizable templates, enforces license compliance policies, and monitors projects
      continuously — alerting teams to newly disclosed vulnerabilities without re-triggering manual scans.
      In 2024 alone, Snyk tracked over 24,000 newly discovered vulnerabilities.

      Snyk Code is the SAST (static application security testing) product built on the DeepCode AI engine
      acquired from ETH Zurich in September 2020. Supporting 19+ languages, it provides real-time in-IDE
      analysis and automated "Agent Fix" suggestions with a claimed 80% accuracy rate. Snyk Code was the
      only AI-powered code security tool shortlisted by developers in Stack Overflow's 2024 developer
      survey — a signal of genuine developer adoption rather than top-down mandated deployment. Its
      knowledge base is built from 25M+ data flow cases modeled by combining symbolic and generative AI.

      Snyk Container provides vulnerability scanning for Docker images, Kubernetes workloads, and container
      registries (ECR, GCR, ACR, Docker Hub), with automated base-image upgrade recommendations and
      Dockerfile remediation guidance. Snyk IaC scans Terraform, CloudFormation, ARM templates, Helm
      charts, and Kubernetes manifests for misconfigurations, enforcing CIS benchmarks and OPA-based
      custom policies. Snyk API & Web, launched in 2024 following the Probely acquisition, adds DAST
      (dynamic application security testing) for API and web application security. Snyk AppRisk provides
      ASPM (application security posture management) with risk-based prioritization. Finally, Evo —
      launched in 2025 following the Invariant Labs acquisition — provides agentic security orchestration
      for AI-native and non-deterministic application environments.
