  - id: developer-experience
    title: Developer Experience and Adoption Mechanics
    body: >-
      Snyk's go-to-market model is built on developer-led, bottom-up adoption. The free tier allows
      individual developers and small teams to access the full scanning platform at no cost, with limits
      on contributing developers and some governance features restricted to paid plans. This creates a
      natural pipeline from individual developer discovery to team and enterprise procurement, following
      the product-led growth (PLG) playbook.

      The Snyk CLI is the primary mechanism by which developers access Snyk in automated workflows. It is
      available as an npm package (`snyk` on npmjs.com), installable via homebrew, scoop, or direct
      binary download. The CLI supports all four core scan types — `snyk test` (Open Source), `snyk code
      test` (SAST), `snyk container test` (Container), and `snyk iac test` (IaC) — from a single tool,
      making it straightforward to integrate into any CI/CD pipeline. A `snyk monitor` command creates
      a dependency snapshot for ongoing tracking and alerts as new vulnerabilities are disclosed. The
      official snyk/snyk Docker images on Docker Hub provide pre-built environments for dozens of language
      stacks (Clojure, Elixir, Python variants, etc.) for CI/CD use without local CLI installation.

      The IDE extension ecosystem is broad: VSCode (including Cursor, Windsurf, Eclipse Theia), JetBrains
      IDEs (2024.2+), Visual Studio 2022, and Eclipse 2024-03+ are all supported. The VS Code extension
      installs free from the marketplace, provides inline issue highlighting categorized by type and
      severity, and supports Snyk Open Source, Snyk Code, and Snyk IaC scanning in a single plugin. A
      new "Snyk Studio" integration enables "Secure at Inception" guardrails that pass security rules
      into AI coding assistants like GitHub Copilot, Cursor, and Windsurf, intercepting insecure
      patterns before code is generated rather than scanning afterward.

      Developer community signals confirm genuine adoption: Stack Overflow's `snyk` tag (archived at ~9,000
      questions in the Wayback-captured snapshot from February 2026) contains real-world integration
      questions covering GitHub Actions pipelines, Spring Boot CSRF detection, path traversal warnings,
      and .snyk config files — indicating developers integrating Snyk into daily workflows. Snyk Learn
      provides free interactive security education lessons that are embedded in IDE and platform
      experiences, reinforcing the developer-skill-building dimension of the Snyk brand.
