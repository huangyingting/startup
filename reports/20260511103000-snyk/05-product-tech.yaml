acknowledgedWarnings:
  - dimension: unverifiedSource
    reason: >-
      CE008 (3× NVD coverage, 47-day faster disclosure, 92% JS vulnerability primacy) are sourced
      exclusively from Snyk's own marketing page (SE009) and have no independent validation in
      accessible public sources. These claims are labeled company-claimed with medium confidence and
      should be treated as directionally indicative rather than independently audited metrics.
  - dimension: paywallRisk
    reason: >-
      No significant paywall-blocked sources were encountered in this chapter's research. All 28
      sources were accessible and returned substantive content. The JetBrains plugin page (SE028)
      returned minimal content (JS-rendered page) but the basic product identity claim is verifiable
      from the Snyk documentation (SE015).
