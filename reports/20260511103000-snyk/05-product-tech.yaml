figures:
  - id: FE001
    title: Snyk Platform Architecture — Scan-to-Fix Pipeline
    type: flow
    layout: wide
    summary: >-
      How code enters the Snyk scanning pipeline, is analyzed against the Snyk Intel DB and DeepCode AI,
      risk-scored, and routed to developer-facing remediation outputs (fix PRs, IDE suggestions, Jira
      tickets, or Evo agentic orchestration).
    data:
      nodes:
        - id: source-code
          label: Source Code / IaC / Container Image
          description: >-
            Developer-authored code, open-source dependencies, IaC configs, and container images as
            inputs to scanning
        - id: integration-layer
          label: Integration Layer (IDE / CLI / SCM / CI-CD)
          description: >-
            Snyk's integration layer — VS Code extension, Snyk CLI, GitHub/GitLab/Bitbucket SCM
            connectors, CI/CD pipeline plugins — routes code to Snyk scanning engine
        - id: scan-engine
          label: Scan Engine (Open Source / Code / Container / IaC)
          description: >-
            Four parallel scan engines analyze different code artifact types for vulnerabilities and
            misconfigurations
        - id: snyk-intel
          label: Snyk Intel Vulnerability Database
          description: >-
            Proprietary vuln DB with 3× NVD coverage; curated fix advice; 92% of JS vulns disclosed
            before NVD; 47-day faster average
        - id: deepcode-ai
          label: DeepCode AI Engine
          description: >-
            Hybrid symbolic + generative AI with 25M+ data flow cases; 19+ languages; self-hosted;
            no customer data in training; 80%-accurate auto-fix
        - id: apprisk-scoring
          label: AppRisk Risk Scoring
          description: >-
            Contextual prioritization: EPSS + CVSS + reachability + exploit maturity + business
            impact + social trends → ranked risk score per finding
        - id: remediation-outputs
          label: Developer Remediation Outputs
          description: >-
            One-click fix PRs (Open Source), Agent Fix inline suggestions (Code), base-image
            upgrades (Container), in-code fix advice (IaC), Jira/ServiceNow tickets
        - id: evo-agentic
          label: Evo — Agentic Security Orchestration
          description: >-
            Autonomous agentic remediation and runtime protection for AI-native applications
            (non-deterministic systems, LLM agents); 2025+
        - id: snyk-studio
          label: Snyk Studio — AI Coding Guardrails
          description: >-
            Secure-at-inception guardrails injected into AI coding assistants (Copilot, Cursor,
            Windsurf) to prevent insecure code generation
      edges:
        - from: source-code
          to: integration-layer
          label: submitted via
        - from: integration-layer
          to: scan-engine
