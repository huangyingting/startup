    title: Risk Mitigation Flow — From Identified Risk to Monitored Control
    type: flow
    layout: wide
    summary: >-
      Illustrates Snyk's primary defensive posture against its top risk categories,
      mapping each risk driver through mitigating actions and residual risk state.
    claimRefs:
