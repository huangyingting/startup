  - id: operational-people-risks
    title: Operational and People Risks
    body: >-
      Snyk's operational risk profile centers on three interconnected vulnerabilities: CEO-level
      leadership continuity, key-person dependency in vulnerability research, and engineering
      concentration in a geopolitically sensitive region.

      The CEO transition announced in February 2026 is the most immediate operational risk.
      Peter McKay's departure while Snyk is in active pre-IPO preparation creates strategic
      continuity uncertainty—investors, customers, and employees must evaluate the company's
      direction without an established permanent CEO. Interim CEO Ken MacAskill holds operational
      continuity, but a prolonged search for a permanent AI-focused CEO (as the board has described)
      could take six to eighteen months, during which competitive decisions, product roadmap
      commitments, and enterprise sales relationships may be deferred or destabilized. The
      board's specific requirement for a CEO with "deep roots in product innovation and AI"
      narrows the candidate pool and increases the search timeline risk.

      Danny Grander, co-founder and Chief Security Officer, represents the most critical
      single key-person dependency in Snyk's product architecture. Grander leads Snyk's
      vulnerability research team and is the principal architect of the Snyk Intel vulnerability
      database—the proprietary intelligence layer that differentiates Snyk from competitors
      relying on public CVE data. Grander's departure would degrade the quality and
      exclusivity of Snyk's vulnerability intelligence, the product attribute most difficult
      for competitors to replicate. Guy Podjarny, having stepped down from the board in
      March 2025 and returned as Chairman in March 2026, introduces a separate governance
      complexity—the founder-as-chairman dynamic could create ambiguity between strategic
      and operational authority in the CEO search process.

      Engineering concentration in Tel Aviv is a geopolitical risk that has become more
      material since October 2023. Snyk's founding team and a substantial fraction of its
      R&D organization are based in Israel, a country engaged in ongoing regional conflict
      with periodic operational disruptions to technology sector workers. While Snyk has
      diversified engineering across Boston, London, Ottawa, Bucharest, Cluj-Napoca, and
      Lisbon, the Israeli R&D concentration represents a key-site dependency. Competition
      for AI and ML engineering talent is an additional constraint: Snyk's DeepCode AI
      differentiation depends on recruiting and retaining top AI security researchers in
      a market where Google, Microsoft, Amazon, and OpenAI compete aggressively for the
      same talent pool. Glassdoor signals from Snyk employees are mixed post-layoffs,
      and retention of senior technical contributors ahead of any IPO lock-up period
      is a key operational risk that investors cannot fully assess from public information.
    claimRefs:
      - CR031
      - CR032
      - CR033
      - CR034
      - CR035
      - CR036
      - CR037
    tableRefs:
      - TR004
    figureRefs:
      - FR002

