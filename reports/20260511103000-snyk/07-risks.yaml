      - CR026
      - CR031
    data:
      nodes:
        - id: ghas-threat
          label: GHAS / Platform Bundling Threat
          type: input
          description: Microsoft/GitHub bundling SCA+SAST into GitHub Enterprise
        - id: differentiation
          label: AI Differentiation (DeepCode / Evo)
          type: process
          description: >-
            Snyk counters bundling with AI-powered auto-fix, deeper vulnerability
            intelligence database, and agentic Evo orchestration layer
        - id: fp-risk
          label: False Positive / AI Accuracy Risk
          type: input
          description: Alert fatigue and ML false negatives reduce developer trust in Snyk results
        - id: precision-control
          label: Precision Tuning + Human-in-Loop AI
          type: process
          description: >-
            DeepCode AI uses human-in-the-loop training to reduce FP rates;
            priority scoring surfaces highest-confidence findings first
        - id: supply-chain-risk
          label: Supply-Chain Compromise Risk
          type: input
          description: Snyk CLI/IDE extensions process customer source code; compromise = catastrophic
        - id: security-controls
          label: SOC 2 + FedRAMP + Trust Portal
          type: process
          description: >-
            SOC 2 Type II, FedRAMP Moderate, trust.snyk.io security posture disclosure
            and pen testing provide defense-in-depth against supply-chain attack
        - id: residual-risk
          label: Residual Risk (Monitored)
          type: output
          description: >-
            After mitigations, residual competitive displacement risk remains high;
            residual supply-chain and regulatory risks are medium; ongoing monitoring required
      edges:
        - from: ghas-threat
          to: differentiation
        - from: differentiation
          to: residual-risk
        - from: fp-risk
          to: precision-control
        - from: precision-control
          to: residual-risk
        - from: supply-chain-risk
          to: security-controls
        - from: security-controls
          to: residual-risk

callouts:
  - calloutType: risk
    title: GHAS Bundling Is a Present-Tense Displacement Event, Not a Future Threat
    body: >-
      The October 2024 Gartner Peer Insights critical review directly cited GitHub Advanced Security
      as the primary reason a customer was evaluating Snyk alternatives. This is not a theoretical
      competitive risk—it is active customer churn pressure occurring in Snyk's largest enterprise
      segment. With GitHub Advanced Security included at no add-on cost in GitHub Enterprise Cloud,
      and GitHub hosting the majority of enterprise software development globally, Snyk's core SCA
      and SAST revenue lines face structural pricing pressure that deepens with every GitHub Enterprise
      renewal cycle. Investors should demand win/loss data segmented by source code management
      platform to quantify the realized displacement rate.
    claimRefs:
      - CR001
      - CR002
      - CR003

  - calloutType: risk
    title: The $8.5B Valuation Overhang Creates a Structural Down-Round Risk That May Persist for Years
    body: >-
      Snyk's 2021 peak valuation of $8.5 billion was set at 40x+ forward ARR in a zero-rate
      environment with multiple expansion expectations that have since reset. With public security
      SaaS peers trading at 5–12x ARR in 2025–2026, a market-rate valuation of Snyk on $300M ARR
      implies an enterprise value of $1.5–3.6B—a 55–80% write-down from 2021. Unless Snyk
      can demonstrate ARR acceleration to $500M+ with improving margins, or market multiples expand
      significantly, any IPO or late-stage secondary will price below the 2021 round. This overhang
      affects employee equity incentives, investor returns, and Snyk's ability to use stock as
      acquisition currency. It is the most material unresolved financial risk in the portfolio.
    claimRefs:
      - CR009
      - CR011
      - CR013

