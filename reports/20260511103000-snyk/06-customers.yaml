chapter:
  number: 6
  title: Customers
  summary: >-
    Snyk's customer base encompasses 2,400-plus paying enterprise customers generating $300M ARR
    as of December 2024, anchored by a product-led growth (PLG) motion that converts 200,000-plus
    free developer users into enterprise subscriptions. Named proof spans large enterprises
    (Atlassian, Salesforce, Komatsu, Revolut, DigitalOcean) with quantified outcomes including 65%
    high-severity vulnerability reduction at Atlassian and 62% MTTF improvement at Komatsu. Third-party
    review platforms (G2 4.5/5, Gartner 3.0–4.0/5) reflect high enterprise satisfaction with a
    specific adverse signal from an October 2024 Gartner critical review citing GitHub GHAS competition.
    Key diligence gaps include undisclosed NRR/GRR, unknown top-account revenue concentration, and
    the severity of GHAS-driven competitive displacement in the core enterprise segment.

sections:
  - id: customer-base-profile
    title: Customer Base Profile and Segmentation
    body: >-
      Snyk's customer base spans the full enterprise software ecosystem, ranging from individual
      open-source developers on the free tier to Fortune 500 enterprises managing tens of thousands
      of repositories. As of December 2024, Snyk reported approximately 2,400 paying customers and
      more than 200,000 free developer users, with annual recurring revenue of $300 million—a clear
      signal that commercial conversion from the product-led growth (PLG) motion is working.
      Paying customers skew enterprise: Atlassian, Salesforce, MongoDB, Revolut, Komatsu, Skyscanner,
      Asurion, DigitalOcean, and TechnologyOne represent the publicly named tier. Vertical coverage
      includes financial services (Revolut), travel-tech (Skyscanner), cloud infrastructure (DigitalOcean,
      MongoDB), manufacturing (Komatsu), and B2B SaaS (Salesforce, Atlassian). Geographically, Snyk
      is strongest in North America and Western Europe, with a growing presence in the Asia-Pacific
      region as evidenced by its listing in the Singapore Government Technology Agency's approved
      product catalog. The primary buyer persona is the CISO or head of application security, but
      the discovery motion originates with developers. PLG drives initial adoption through the free
      tier, while the sales team up-sells to enterprise licenses with SSO, RBAC, audit logging,
      and policy controls. Channel partners and systems integrators (Computacenter, global SIs)
      extend reach into mid-market and regulated verticals. Revenue concentration is a known risk:
      with only 2,400 paying customers against a total addressable developer population of tens
      of millions, the commercial base remains relatively narrow, and the top cohort of enterprise
      accounts is likely disproportionately large in revenue contribution.
    claimRefs:
      - CU001
      - CU002
      - CU003
      - CU021
      - CU022
      - CU023
    tableRefs:
      - TU002
    figureRefs:
      - FU001

  - id: named-customer-proof
    title: Named Customer Proof
    body: >-
      Snyk's publicly documented case studies represent some of the largest and most demanding
      development organizations in the world. Atlassian, which supports 200,000+ enterprise customers
      globally, runs 5.5 million dependency scans and 3.7 million container scans monthly with Snyk,
      achieving a 65% reduction in high-severity container vulnerabilities and a 39% reduction in
      critical vulnerabilities. Salesforce saved more than 150 hours of manual security review effort
      after integrating Snyk into its CI/CD pipeline. Komatsu, the Japanese industrial manufacturer,
      achieved a 62% reduction in mean time to fix in three months and a 28% improvement in overall
      risk posture within six months—with 19% of discovered vulnerabilities found only in Snyk's
      proprietary database, demonstrating unique coverage depth. TechnologyOne (enterprise ERP)
      reduced developer security feedback time from 90 minutes to mere seconds. Skyscanner monitors
      500-plus projects across a platform serving 70 million monthly users. Asurion, a device
      protection company serving 300 million customers, uses Snyk's containerized developer security
      toolkit. These outcomes consistently demonstrate three themes: time savings, vulnerability
      reduction, and developer experience improvement. The evidence quality is high for outcomes but
      limited for retention signals—case studies are company-controlled and are not independently
      verified. Singapore GovTech's approved product listing provides rare third-party government
      endorsement.
    claimRefs:
      - CU004
      - CU005
      - CU006
      - CU007
      - CU008
      - CU009
      - CU010
      - CU011
      - CU012
      - CU016
