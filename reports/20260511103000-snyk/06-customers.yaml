callouts:
  - id: GU001
    calloutType: strength
    title: Proof Quality and Scale at Atlassian and Komatsu Is Diligence-Grade
    body: >-
      Atlassian's 5.5 million monthly dependency scans and 65% reduction in high-severity container
      vulnerabilities represent the clearest production-scale evidence in Snyk's customer portfolio.
      Komatsu's 62% MTTF reduction in three months—and the finding that 19% of discovered
      vulnerabilities were exclusive to Snyk's database—is a compelling differentiation argument
      that is difficult to manufacture in a company-controlled case study without some operational
      grounding. Taken together, these two accounts provide diligence-grade proof that Snyk delivers
      measurable security outcomes at enterprise scale, not just developer convenience.
    claimRefs:
      - CU004
      - CU005
      - CU008

  - id: GU002
    calloutType: risk
    title: GitHub GHAS Displacement Is the Single Largest Customer Retention Risk
    body: >-
      GitHub Advanced Security bundles SCA and SAST directly into GitHub Enterprise at no incremental
      cost—the exact value proposition of Snyk Open Source and Snyk Code. The October 2024 Gartner
      Peer Insights critical review ("Traditional SCA Solution Faces Modern Challenges") names this
      dynamic explicitly. Any enterprise customer on GitHub Enterprise should be treated as a GHAS
      displacement candidate unless Snyk can demonstrate superior fix quality, vulnerability database
      coverage, or integration breadth that justifies the incremental spend. Investors should request
      win/loss data and any known GHAS-driven churn events before closing.
    claimRefs:
      - CU017
      - CU030
      - CU028

  - id: GU003
    calloutType: risk
    title: Customer Concentration and Undisclosed NRR Are Material Diligence Gaps
    body: >-
      Snyk discloses neither NRR/GRR nor top-account revenue concentration. With 2,400 paying
      customers at $300M ARR, the math implies roughly $125K average ACV—but if the top 50 enterprise
      accounts account for 40–50% of ARR (a common pattern for PLG-to-enterprise companies), the
      portfolio's durability is heavily dependent on a small cohort. Sacra's 115–130% NRR estimate
      is plausible but cannot be independently verified. These two metrics—NRR and top-account
      concentration—should be prerequisites for any transaction above a threshold valuation.
    claimRefs:
      - CU001
      - CU002
      - CU024

