  - id: TU005
    title: Expansion and Concentration Risk Table
    description: >-
      Expansion drivers and concentration/risk factors affecting Snyk's customer base durability
      and revenue predictability. Each row represents a distinct risk or growth lever with impact
      assessment and recommended diligence path.
    columns:
      - Factor
      - Type
      - Severity
      - Evidence / Indicator
      - Diligence Path
    claimRefs:
      - CU028
      - CU029
      - CU030
      - CU031
      - CU032
    notes: >
      Severity ratings are inferred from public signals; no company-disclosed win/loss data is available. GHAS displacement risk severity cannot be quantified from public information.
    rows:
      - - 'Land-and-expand: Open Source → Code → Container → IaC → AppRisk'
        - Expansion driver
        - Positive
        - Komatsu, Atlassian, and Salesforce case studies show multi-product adoption; AppRisk ASPM launched 2024
        - Verify cross-sell attach rates and average product count per enterprise customer
      - - GitHub Advanced Security (GHAS) competitive displacement
        - Concentration / competitive risk
        - High
        - GHAS bundles SCA+SAST into GitHub Enterprise at no add-on cost; directly overlaps Snyk Open Source and Snyk Code
        - Request GHAS win/loss ratio and displacement incidents in last 12 months
      - - SMB churn above free-tier limit
        - Retention risk
        - Medium
        - TrustRadius and TrustPilot cite cost-prohibitiveness; free tier caps at 200 tests/month
        - Quantify free-to-paid conversion rate and SMB gross churn cohort
      - - Top-account revenue concentration
        - Concentration risk
        - Medium-High
        - 2,400 customers at $300M ARR implies ~$125K ACV average; enterprise accounts likely skew much higher
        - Request top-10 and top-50 account ARR concentration; assess cliff risk if large customer churns
      - - Platform intermediary dependency (GitHub Marketplace, VS Code, npm)
        - Partner / channel risk
        - Medium
        - Discovery and distribution partially controlled by Microsoft (GitHub), JetBrains, and npm; policy changes could disrupt PLG funnel
        - Assess contractual protections and alternative distribution channels if marketplace terms change
      - - Adverse AI coding assistant competition (Copilot, Cursor, CodeWhisperer)
        - Emerging risk
        - Medium
        - AI coding assistants increasingly incorporate inline security hints, reducing standalone SAST value proposition
        - Track partnership strategy (Snyk AI integrations) vs head-to-head displacement by AI tooling

figures:
  - id: FU001
    title: Customer Journey Map
    type: journey-map
    caption: >-
      Six-stage customer journey from developer discovery through strategic platform expansion,
      illustrating Snyk's product-led growth motion and the transition from developer adoption to
      enterprise procurement and multi-product expansion as of May 2026.
    claimRefs:
      - CU023
      - CU013
      - CU014
    data:
      items:
        - label: Discovery
          value: 1
          note: >-
            Developer discovers Snyk via npm audit warnings, GitHub Marketplace, VS Code extension
            recommendation, IDE plugin notification, or peer recommendation; actors: individual
            developer, open-source contributor
        - label: Free Trial / Sign-Up
          value: 2
          note: >-
            Developer connects GitHub/GitLab/Bitbucket repo; free tier provides 200 tests/month;
            first scan surfaces vulnerabilities with fix suggestions; actors: developer, DevOps engineer
        - label: Team Adoption
          value: 3
          note: >-
            Security lead or DevOps manager sees developer usage and formalises Snyk into CI/CD pipeline;
            Team plan upgrade (~$25/developer/month); CI/CD gates activated; actors: DevSecOps lead,
            security manager, engineering manager
        - label: Enterprise Procurement
          value: 4
          note: >-
            CISO or VP Engineering runs formal vendor evaluation; SSO, RBAC, audit logging, and SIEM
            integration requirements; enterprise license negotiated; actors: CISO, procurement, legal,
            InfoSec team
        - label: Deep Integration
          value: 5
          note: >-
            Snyk embedded across IDE, PR workflow, CI/CD, container registry, and IaC pipeline; hundreds
            to thousands of repositories onboarded; Snyk Open Source + Container + Code active; actors:
            platform engineering, security champions
        - label: Platform Expansion
          value: 6
          note: >-
            Customer adopts AppRisk ASPM to consolidate application security posture management; seat count
            expands; Snyk becomes security platform-of-record; actors: CISO, developer platform team,
            security operations

