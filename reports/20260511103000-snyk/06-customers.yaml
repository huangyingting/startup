  - id: adoption-trajectory
    title: Adoption Trajectory and Deployment Depth
    body: >-
      Snyk's growth trajectory combines a high-volume developer funnel with a narrower but deeper
      enterprise commercial layer. VentureBeat and TechCrunch both reported in December 2024 that
      Snyk had reached 2,400-plus paying customers and 200,000-plus free developer users. The $300
      million ARR figure (confirmed by TechCrunch CEO interview) represents roughly $125,000 average
      contract value per paying customer, consistent with enterprise-weighted pricing. Deployment
      depth is substantial among named accounts: Atlassian's scan volumes (5.5M dependency + 3.7M
      container per month) and Skyscanner's 500-plus monitored projects indicate that customers who
      adopt Snyk tend to expand coverage broadly across their repository estate. The infoq.com
      coverage of Snyk AppRisk (March 2024) confirms that enterprises are moving beyond single-product
      use toward the AppRisk ASPM platform, creating deeper integration surface area and higher
      switching costs. Snyk's pricing model transitions from free (200 tests/month) to Team ($25/developer/month)
      to Enterprise (negotiated)—with the PLG funnel responsible for creating developer demand that
      security teams then convert to commercial subscriptions. However, the TrustRadius reviewer
      community notes that enterprise pricing becomes cost-prohibitive at scale for smaller
      organizations, suggesting a natural ceiling on SMB penetration without price-model adjustment.
    claimRefs:
      - CU001
      - CU002
      - CU003
      - CU013
      - CU014
      - CU015
    tableRefs:
      - TU003
    figureRefs:
      - FU002

  - id: retention-and-satisfaction
    title: Retention, Renewal, and Customer Satisfaction
    body: >-
      Snyk does not disclose net revenue retention (NRR) or gross revenue retention (GRR) publicly.
      Sacra estimated Snyk's NRR in the 115–130% range based on revenue and customer growth signals,
      consistent with developer security platforms where land-and-expand is the dominant motion.
      Third-party review aggregators provide the best available satisfaction proxy: G2 rates Snyk at
      4.5 out of 5 across more than 200 reviews, with reviewers praising automated fix pull requests,
      real-time alerts, and IDE integration. TrustRadius reviewers echo the automated remediation
      theme and highlight the breadth of language and package manager coverage. Gartner Peer Insights
      includes a January 2026 review at 4.0/5 lauding enterprise security capabilities, alongside an
      October 2024 critical review rated 3.0/5 titled "Traditional SCA Solution Faces Modern Challenges,"
      which notes increasing competition and commoditization in the SCA segment. TrustPilot carries a
      mixed signal: a 2024 reviewer praised Snyk's renewal experience, while a 2022 reviewer cited
      excessive false positives as a friction point. These adverse signals—commoditization pressure,
      false positives, and enterprise cost—represent the primary retention risk factors. The Singapore
      GovTech listing suggests that even regulated government agencies have cleared Snyk through vendor
      evaluation, indicating strong institutional confidence in the platform.
    claimRefs:
      - CU016
      - CU017
      - CU018
      - CU019
      - CU024
      - CU025
      - CU026
      - CU027
    tableRefs:
      - TU004
    figureRefs:
      - FU004

  - id: expansion-and-concentration-risk
    title: Expansion and Concentration Risk
    body: >-
      Snyk's land-and-expand architecture is its primary growth engine: customers begin with Snyk
      Open Source (SCA), then add Snyk Code (SAST), Snyk Container, Snyk IaC, and Snyk AppRisk as
      their security program matures. Cross-sell and upsell are structurally embedded in the platform
      thesis. However, several concentration and risk dynamics demand diligence attention. First,
      customer concentration: with 2,400 paying customers generating $300M ARR, a small number of
      large enterprise accounts—likely the top 50 accounts by ACV—may account for a disproportionate
      fraction of revenue. Public data does not permit precise quantification. Second, competitive
      displacement risk: GitHub Advanced Security (GHAS), which bundles SCA and SAST with GitHub
      repositories at no additional cost, creates direct pricing pressure on Snyk's core products.
      Enterprise customers on GitHub Enterprise could rationalize Snyk out of their stack if GHAS
      capability parity improves. Third, SMB attrition: TrustRadius and TrustPilot reviewers
      consistently cite Snyk's enterprise pricing as cost-prohibitive for organizations with fewer
      than 50 developers. The free-to-paid conversion rate is unknown, and smaller customers who
      exceed free-tier limits may churn rather than upgrade. Fourth, partner dependency: Snyk's
      distribution through GitHub Marketplace, VS Code Marketplace, and cloud provider marketplaces
      creates dependency on platform intermediaries that could alter terms, feature competing
      products, or reduce discovery. These risks are structural to Snyk's PLG model and would benefit
      from explicit diligence on cohort churn, top-10 account revenue concentration, and GHAS
      competitive displacement win/loss data.
    claimRefs:
      - CU028
      - CU029
      - CU030
      - CU031
      - CU032
    tableRefs:
      - TU005
    figureRefs: []

