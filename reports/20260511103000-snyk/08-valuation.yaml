  - id: scenario-analysis
    title: Scenario Analysis and Discount Factors
    body: >-
      Three scenarios bracket the plausible valuation range for Snyk as of May 2026, each conditioned
      on different assumptions about ARR growth re-acceleration, IPO timing, and market sentiment.

      The bear case ($1.3-1.6 billion, 4-5x ARR) assumes growth remains at 6-8% annually through a
      2027 liquidity event, no meaningful re-acceleration, continued CEO vacancy delaying strategic
      execution, and an M&A exit priced at the Checkmarx precedent multiple. At this level, early
      investors face a roughly 80% markdown from peak and secondary buyers from the 2021 round are
      deeply underwater.

      The base case ($2.6-3.3 billion, 8-10x ARR) assumes a new CEO is appointed in H1 2026, ARR
      growth re-accelerates to 15-20% by fiscal 2027, and Snyk achieves an IPO or strategic
      acquisition in 2027 at public-market multiples consistent with moderate-growth SaaS peers. Under
      this scenario, investors at a 60-70% discount to the $8.5 billion anchor could achieve a
      1.5-2x return over a 3-4 year holding period.

      The bull case ($4.9-6.5 billion, 15-20x ARR) requires AI-native product pivots to drive a
      material uplift in NRR, ARR growth re-accelerating above 25%, and an IPO in a favorable window
      where developer-security platforms command premium multiples. Wiz's $12 billion valuation at
      approximately $500+ million ARR demonstrates that private security SaaS can sustain premium
      multiples with strong growth, providing an aspirational ceiling.

      Discount factors that compress the comparable-company range include: private-market illiquidity
      (20-30% discount), information asymmetry on unaudited financials (5-10%), and minority position
      without board representation (5-10%). Stacked, these factors support a 35-50% private-market
      discount to comparable public-company implied values.
