company:
  name: Snyk
chapter:
  number: 8
  title: Valuation
  summary: >-
    Snyk's last disclosed valuation of $8.5 billion (Series F/G, 2021-2022) implies roughly 26-43x
    trailing ARR at current revenue levels, a premium difficult to justify against public-market
    comparables trading at 2-23x ARR in May 2026. With ARR growth moderating to roughly 7%
    year-over-year (Sacra estimate: $326 million as of February 2026), a CEO vacancy following
    McKay's February 2026 departure, no S-1 filed, and a compressing SaaS multiple environment,
    a significant mark-down from peak is the base case. A three-scenario analysis yields a
    bear-case enterprise value of $1.3-1.6 billion (4-5x ARR), a base case of $2.6-3.3 billion
    (8-10x ARR), and a bull case of $4.9-6.5 billion (15-20x ARR) contingent on re-accelerating
    revenue growth and a timely IPO window. An M&A floor exists near $1.1 billion based on the
    Checkmarx TPG transaction precedent (~3.5x ARR). Investors should require audited financials,
    verified NRR and gross-margin data, convertible-note terms, and board governance documentation
    before pricing any position. The overall investment signal at the $8.5 billion anchor is
    negative; at a 60-70% discount to that anchor, the risk/reward becomes selectively interesting
    for a long-duration hold to a 2027+ liquidity event.
sections:
  - id: investment-thesis-anti-thesis
    title: Investment Thesis and Anti-Thesis
    body: >-
      Snyk occupies a distinctive niche at the intersection of developer productivity and application
      security: its developer-first SAST, SCA, container, and IaC scanning platform is embedded in
      CI/CD pipelines and IDE workflows across tens of thousands of organizations. The investment thesis
      rests on three pillars. First, regulatory tailwinds - NIST SSDF, EU Cyber Resilience Act, and
      U.S. Executive Order 14028 - mandate software bill-of-materials and shift-left controls that Snyk
      is structurally positioned to satisfy. Second, the platform has sticky, workflow-embedded
      land-and-expand economics: customers begin with open-source scanning and expand into container
      and code security modules, driving multi-product attach. Third, Snyk's developer-centric
      go-to-market has historically translated to high net-revenue retention even as the security market
      consolidates around platform vendors.

      The anti-thesis is equally compelling. Growth has slowed to approximately 7% year-over-year from
      triple-digit expansion in 2020-2021, reflecting saturation of the early-adopter developer cohort
      and intensifying competition from GitHub Advanced Security (free for GitHub Enterprise users),
      Amazon Inspector, and Microsoft Defender for DevOps. Larger SAST/SCA platform vendors such as
      Veracode, Checkmarx, and Semgrep have closed the tooling gap. Snyk's $8.5 billion peak valuation
      implies a multiple that has never been sustained at comparable growth rates in the public market.
      CEO McKay's departure in February 2026, without an announced successor at time of writing, creates
      material execution risk. Combined with no new equity financing since January 2022, the company may
      face a challenging fundraising environment if cash runs low before an IPO window opens.
    claimRefs:
      - CV001
      - CV002
      - CV003
      - CV004
      - CV005
