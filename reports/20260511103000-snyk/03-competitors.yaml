    notes: "Funding figures are approximate and based on public disclosures; Hellman & Friedman's Checkmarx acquisition value and Mend.io post-rebrand valuation are not publicly confirmed. ARR/revenue estimates marked 'est.' are inferred from third-party sources. Coverage is partial — boutique pen-testing firms and MSSPs are excluded. Sources: vendor sites SP001–SP012, Tracxn SP027, Gartner SP014, accessed May 2026."
    columns:
      - "Competitor"
      - "Category"
      - "Primary Product"
      - "Funding / Stage"
      - "Key Strength"
      - "Key Weakness vs. Snyk"
    enumeration: true
    enumerationScope:
      coverage: partial
      basis: "Covers the 12 most-cited AppSec competitors across direct (SCA/SAST), adjacent (CNAPP), and nascent (ASPM) categories as of May 2026. Based on Gartner AST Magic Quadrant 2025, Tracxn competitive mapping, and vendor-published positioning. Does not include boutique pen-testing firms or MSSPs."
    evidenceGap: "Funding figures for Checkmarx (Hellman & Friedman PE buyout) and Mend.io post-rebrand valuation are not publicly disclosed; GitLab Security financials are only partially disclosed as part of consolidated GitLab results."
