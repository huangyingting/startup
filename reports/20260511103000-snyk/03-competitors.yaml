  - id: competitive-risks
    title: "Competitive Risks and Diligence Paths"
    body: >
      Snyk faces five categories of competitive risk warranting diligence attention in 2026. First, platform
      bundling risk from GitHub (Microsoft) and GitLab is the most structurally acute. GHAS at $30/committer/month
      for Code Security is meaningfully cheaper than Snyk's per-developer enterprise pricing for organizations
      already paying for GitHub Enterprise Cloud. The risk compounds as GitHub Copilot Autofix improves,
      potentially matching Snyk's AI remediation value proposition. Diligence path: obtain Snyk's win/loss data
      versus GHAS, review NRR trends in GitHub-dominant customer segments, and assess how many Snyk customers
      have added GHAS as a parallel tool.

      Second, cloud security platform expansion risk from Wiz and Orca. Both platforms are growing fast in
      enterprise cloud-first accounts and are extending into code-to-cloud security, creating a potential
      consolidation path where a CISO chooses Wiz/Orca for cloud + a reduced AppSec footprint, eliminating
      Snyk Container and IaC spending. Diligence path: review pipeline data in accounts with >500 cloud
      workloads; assess churn or downsell in container/IaC SKUs versus core SCA/SAST.

      Third, ASPM consolidation risk: enterprise buyers are increasingly evaluating ASPM platforms (Cycode,
      Apiiro, Checkmarx One's ASPM layer) as a single orchestration layer that ingests findings from multiple
      AST tools — including Snyk as a data source rather than the primary platform. If Snyk is reduced to
      a "findings data source" role in large enterprises, ASP pricing power and land-and-expand potential
      diminish significantly. Diligence path: analyze customer contract structures for seats vs. API-only
      integrations; review multi-vendor competitive accounts.

      Fourth, pricing pressure from open-source and free tiers: Semgrep's free OSS tier and SonarQube
      Community Edition provide developer-centric SAST capabilities at zero cost, creating a "free vs.
      Snyk paid" comparison in budget-constrained mid-market accounts. Mend.io's competitive positioning
      on AI-era features may pressure Snyk's SCA renewal pricing. Diligence path: review net retention
      rates in SMB and mid-market segments; assess discounting trends in renewal cohorts.

      Fifth, talent and innovation execution risk during CEO transition: Snyk's February 2026 CEO resignation
      creates organizational uncertainty at a critical AI investment cycle. If product roadmap priorities
      shift or key engineering talent exits during the transition, Snyk's AI-driven differentiation (DeepCode
      AI, Evo agentic orchestration) may fall behind competitors who have stable leadership and are investing
      heavily in the same AI-driven AppSec features (Checkmarx One Assist, GHAS Copilot Autofix, Wiz AI agents).
