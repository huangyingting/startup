      - ["Veracode (Broadcom)", "Enterprise AppSec — SAST/SCA/DAST", "Binary SAST + SCA + DAST platform", "Acquired — Broadcom/PE-owned; 20+ year incumbent", "20+ year enterprise penetration; 100+ language binary SAST; 9 perfect Forrester Wave scores", "Legacy agent-based workflow; weak developer-native UX; no free tier; slower to innovate"]
