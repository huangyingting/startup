      - ["Mend.io (fmr. WhiteSource)", "SCA / AI Security", "SCA + AI behavioral testing + AI-BOM + runtime protection", "Private; rebranded 2022; est. $100M+ ARR", "1000+ concurrent AI attack simulations; AI-BOM; adversarial AI testing; supply chain focus", "Weaker brand recognition; narrower developer ecosystem than Snyk; SAST capabilities less mature"]
      - ["JFrog Xray", "SCA / DevOps Platform", "SCA integrated into Artifactory binary repository", "Public (FROG); $350M+ ARR (JFrog consolidated)", "4M+ OSS package database; deep Artifactory integration; malicious package detection; binary scanning", "Ecosystem-locked to JFrog Artifactory; no SAST; limited IDE workflow vs Snyk"]
