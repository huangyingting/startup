  - id: market-sizing
    title: "TAM, SAM, and SOM — Sizing the AppSec Opportunity Across Multiple Lenses"
    body: >
      Market sizing for the AppSec software space shows material dispersion across analyst firms, driven
      primarily by scope boundary choices. Mordor Intelligence places the 2026 global AppSec software market
      at $14.83B, growing to $28.11B by 2031 at a 13.64% CAGR — a mid-range estimate that excludes
      standalone WAF and network security while including SCA, SAST, DAST, container, and IaC tools.
      Grand View Research estimates the 2025 market at $10.65B, projecting $42.09B by 2033 at an 18.8%
      CAGR, a notably faster trajectory driven by a broader cloud-native security inclusion. The Business
      Research Company publishes a more aggressive 2026 figure of $20.75B expanding to $51.35B by 2030 at
      25.4% CAGR. MarketsAndMarkets reports the highest headline number ($41.16B in 2026), but their
      definition encompasses WAF, API gateways, RASP, and professional services alongside pure testing
      tools, making it an unreliable comparator for Snyk's pure-play software TAM.

      For Snyk, the relevant TAM is approximately $13–16B in 2026 (software-only, developer-integrated AST
      tools per Mordor and GVR mid-points). The SAM — the developer-first, CI/CD-integrated, SCA-plus-SAST
      segment that Snyk's platform directly addresses — is estimated at roughly $6–9B, representing
      approximately 45–60% of the software TAM. This estimate is inferred from segment-share data: SCA holds
      roughly 36% of revenue (Mordor SAST dominance data inverted for SCA), SAST another 36%, and container
      plus IaC the remainder, with the developer-first share of each segment approximating 50–70%. Snyk's
      SOM — the portion realistically capturable given its current distribution, sales motion, and FedRAMP
      authorization — is estimated at approximately $1–2B, implying a 15–25% share of SAM at 3-year horizon,
      consistent with Snyk's $300M+ current ARR at roughly 4–5% SAM penetration.

      Important caveats apply: all estimates rely on secondary research, and no analyst publishes a
      "developer-first AppSec testing" segment as a distinct category. The transition to AI-generated code
      development could materially expand the SAM by adding an entirely new class of AI-code security buyers.
      Contradictory estimates have been preserved in Table TM002 and Figure FM002 to surface the sizing risk
      for diligence purposes.
