    approximationNotes: "Funnel stages are illustrative estimates. Top three stages extrapolated from Gartner DevOps adoption surveys and Mordor Intelligence market data. Snyk enterprise customer count from company disclosures (end-2024). Free/trial user figure is directional; Snyk does not publicly disclose free-tier count."
    claimRefs:
      - CM025

callouts:
  - calloutType: risk
    title: "Analyst Estimate Dispersion Is a Diligence-Grade Uncertainty"
    body: >
      The 3.9x spread between the lowest ($10.65B GVR) and highest ($41.16B MarketsAndMarkets) 2026 AppSec
      market estimates is not routine analyst variance — it reflects genuine scope disagreement about whether
      WAF, RASP, and professional services belong in the TAM. Any investor model that anchors to the higher
      figure without boundary-checking it against Snyk's actual product categories will substantially
      overstate the SAM and SOM. Diligence should obtain a Gartner or Forrester AST market license with
      consistent boundary definitions before finalising the sizing thesis.
    claimRefs:
      - CM004
      - CM017
      - CM028

  - calloutType: strength
    title: "Regulatory Tailwinds Create Non-Discretionary AppSec Demand"
    body: >
      Three major regulatory frameworks now mandate software security practices that directly activate Snyk
      use cases: the EU DORA regulation (effective January 2025) for financial entities; the US Executive
      Order 14028 and CISA SBOM framework for federal software suppliers; and the emerging EU Cyber
      Resilience Act for connected products. Compliance-driven purchasing lengthens sales cycles but
      produces higher-retention enterprise contracts with less discretionary churn risk.
    claimRefs:
      - CM012
      - CM021
      - CM022

