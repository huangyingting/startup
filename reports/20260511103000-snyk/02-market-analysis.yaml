  - id: diligence-gaps
    title: "Sizing Diligence Gaps and Contradictory Market Estimates"
    body: >
      The most significant diligence gap is the absence of a published, independently verifiable market
      sizing specific to developer-first application security testing — the segment in which Snyk actually
      competes. All available analyst reports use either the broad "Application Security" category (which
      includes WAF, RASP, managed services, and professional services) or the narrower "Application Security
      Testing" category, but none segment further into "developer-tooling-first AST" or "CI/CD-integrated
      SCA+SAST." Snyk's own SAM calculation is therefore an inferred estimate carrying significant
      uncertainty.

      Estimate dispersion is a material diligence concern: the 2026 AppSec market size ranges from $10.65B
      (Grand View Research, software-only) to $41.16B (MarketsAndMarkets, broad definition), a 3.9x spread.
      This dispersion is not noise — it reflects genuine boundary disagreement. The Business Research
      Company's 25.4% CAGR and $51.35B-by-2030 projection appear to use a dramatically broader scope than
      Mordor's 13.64% CAGR and $28.11B-by-2031 view. Accepting the broader estimate at face value would
      over-inflate Snyk's SAM and SOM. Preserving both estimates here flags that diligence should seek a
      primary analyst data license (Gartner or Forrester) with consistent boundary definitions before sizing
      the investment.

      Additional open questions include: the precise share of Snyk's ARR attributable to each product line
      (SCA vs SAST vs Container vs IaC), which would allow bottom-up validation of SAM capture rate; the
      impact of AI-code acceleration on AST tool usage volumes and per-seat economics; and whether the
      addressable market for SBOM-compliance tooling (driven by EO 14028 and DORA) can be sized separately
      as a new growth vector. The SOM estimate of $1–2B is a forward-looking inference, not a disclosed
      management figure, and should be treated as directional only.
    claimRefs:
      - CM003
      - CM004
      - CM017
      - CM018
      - CM028
      - CM034
      - CM036
