  evidenceGaps:
    - type: missing-source
      severity: material
      topic: "SAM-estimate"
      missingEvidence: "A Gartner or Forrester primary analyst report specifically defining and sizing the developer-first application security testing (AST) sub-market, separate from the broader AppSec or WAF-inclusive market."
      whyItMatters: "Without a primary analyst source using consistent boundary definitions, the $6–9B SAM estimate is an inference and cannot be independently validated; it could be materially off in either direction."
      diligencePath: "Purchase a Gartner Application Security Testing MQ or Forrester DevSecOps market data license; or commission a primary buyer survey to estimate developer-first AST budget pools."
      relatedQuestionRefs:
        - QM006
        - QM023
        - QM029
      relatedTableRefs:
        - TM002

    - type: conflicting-data
      severity: material
      topic: "TAM-sizing"
      missingEvidence: "Consistent, boundary-verified market size data from multiple analysts using the same AppSec scope definition — specifically confirming or denying whether WAF, RASP, and professional services are included in each figure."
      whyItMatters: "The 3.9x dispersion between GVR ($10.65B) and MarketsandMarkets ($41.16B) for the same 2026 year undermines any single analyst estimate as a reliable sizing anchor; the investment thesis on market size is therefore highly uncertain."
      diligencePath: "Request boundary-definition appendices from MarketsandMarkets and Mordor Intelligence to verify inclusion/exclusion criteria; triangulate with Gartner's AST vendor revenue data."
      relatedQuestionRefs:
        - QM009
        - QM023
        - QM026
      relatedTableRefs:
        - TM002

    - type: private-evidence-only
      severity: material
      topic: "Snyk-ARR-by-product"
      missingEvidence: "Product-level revenue breakdown for Snyk (SCA vs SAST vs Container vs IaC vs DAST) that would enable bottom-up SAM penetration validation."
      whyItMatters: "Without knowing what percentage of Snyk's $300M+ ARR comes from each product, it is impossible to validate whether Snyk's SCA-led thesis is accurate or whether the SAST and Container products are becoming dominant — which would change the SAM estimate."
      diligencePath: "Request in management diligence session: product-line ARR breakdown, customer distribution by primary product purchased, and seat-expansion trends by product type."
      relatedQuestionRefs:
