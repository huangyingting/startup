  - id: founders-leadership-governance
    title: Founders, Leadership, and Governance
    body: >
      Snyk was co-founded in 2015 by three Israeli technologists with backgrounds in the Israel Defence Forces'
      elite intelligence Unit 8200: Guy Podjarny, Danny Grander, and Assaf Hefetz. This military intelligence
      pedigree, combined with deep experience in developer tooling, established the founder-market fit that
      underpins Snyk's "security built for developers, not against them" philosophy.

      Guy Podjarny served as Snyk's inaugural CEO before transitioning to the President role when Peter McKay
      joined as CEO in 2019. Podjarny continued as a board member until March 2025, when he stepped down to
      focus on his new AI startup, Tessl (which raised $125M in November 2024). In a significant governance
      development, Podjarny returned to Snyk's board as Chairman in March 2026, coinciding with McKay's
      transition announcement. Danny Grander serves as co-founder and Chief Security Officer, providing
      ongoing security intelligence expertise. Assaf Hefetz co-founded the company in the CTO capacity.

      Peter McKay, who joined Snyk's board in 2016 and became CEO in 2019, announced in February 2026 his
      intention to step down once a successor is found, publicly stating that the company's next chapter
      requires "a leader with deep roots in product innovation and AI" capable of "hyper-intensive AI
      innovation." Ken MacAskill, previously Snyk's CFO, has stepped in as Interim CEO & CFO during the
      transition. The current leadership team also includes Diana Brunelle (Chief People Officer), Manoj Nair
      (Chief Innovation Officer), Tom Nielsen (Chief Revenue Officer), Austin Martin (EVP, Strategy &
      Operations), and Brian Rogan (EVP, R&D), with Danny Allan serving as CTO.

      The board of directors as of May 2026 comprises: Guy Podjarny (Chairman and Founder), Mike Scarpelli
      (Board Member; former CFO of Snowflake), Sanjay Poonen (Board Member; CEO & President of Cohesity),
      Ken Fox (Partner at Stripes), Ping Li (Partner at Accel), Philippe Botteri (Accel), and Peter McKay
      (Advisor). The dual-board seat for Accel reflects the firm's deep long-term commitment since the Series B.

      Key-person risk at Snyk is material and multi-layered: the CEO transition is ongoing with no named
      successor as of May 2026; the founder's recent board return following the CEO exit raises governance
      questions about leadership continuity; and the company's cultural identity has historically been
      associated with Guy Podjarny's "developer security" vision. An AI-focused incoming CEO will need to
      balance product continuity with a decisive strategic pivot.
