  - id: product-platform-model
    title: Product Platform, Revenue Model, and Market Position
    body: >
      Snyk's security platform is organized around a developer-first philosophy: security tools that
      integrate into developer workflows rather than being imposed as external gates. The platform's five
      original security domains — Snyk Open Source (SCA), Snyk Code (SAST), Snyk Container, Snyk IaC, and
      Snyk AppRisk — have expanded with the 2024 acquisition of Probely to add Snyk API & Web (DAST) and the
      2025 launch of Evo by Snyk, billed as the world's first agentic security orchestration system.

      Snyk Open Source (SCA), the founding product, scans open-source library dependencies for known CVEs
      and license compliance issues. It now supports 40+ programming languages and package managers. Snyk Code
      (SAST), built on the acquired DeepCode AI engine, performs real-time static analysis of proprietary
      code with AI-powered pattern recognition; this product surpassed $100M in ARR in late 2024, representing
      approximately one-third of Snyk's total ARR — a testament to the rapid market adoption of AI-augmented
      code security. Snyk Container secures container images and Kubernetes environments. Snyk IaC scans
      Terraform, AWS CloudFormation, Azure Resource Manager, and Google Cloud configurations. Snyk AppRisk
      provides asset inventory and application security posture management (ASPM) for CISOs. Evo provides
      agentic security orchestration for AI-native software, including securing AI models, agents, and
      non-deterministic systems.

      Snyk's business model is subscription SaaS, with per-developer seat pricing as the core commercial
      unit. The freemium tier allows individuals and small teams to scan unlimited projects at no cost, driving
      bottom-up adoption. Paid tiers (Team, Business, Enterprise) unlock governance, SSO, audit logs,
      compliance reporting, priority support, and expanded scan quotas. Roughly 60% of Snyk's revenue comes
      from software and technology companies, with 10% from fintech. North America contributes approximately
      70% of revenue, followed by Europe at 17% and Asia Pacific/Japan at ~10%.

      Snyk achieved FedRAMP Moderate Authorization in 2024, opening the US federal government market. The
      company has formed strategic partnerships with Atlassian Ventures (investor and integration partner),
      Salesforce Ventures (investor and customer), Google Cloud (2025 Technology Partner of the Year for
      Application Development), ServiceNow (strategic investor and partner), Anthropic (Claude embedded in
      Snyk's AI security platform), and Orca Security. Snyk's platform is embedded in major AI coding
      assistants and integrates with GitHub Copilot. As of 2025, AI-generated code — which McKay estimated
      carries 30–40% more vulnerabilities than human-written code — represents both a growing risk and a
      structural tailwind for Snyk's business.
