  - id: funding-valuation-investors
    title: Funding History, Valuation, and Investor Base
    body: >
      Snyk has raised approximately $1.32 billion across 17 funding rounds since its Seed in January 2016,
      spanning from early-stage backing by Boldstart Ventures and Canaan Partners through sovereign wealth
      participation by the Qatar Investment Authority. The company's trajectory broadly mirrors the 2020-2022
      growth-then-reset cycle seen across late-stage enterprise software.

      The funding chronology begins with a $3M Seed in January 2016, followed by a $7M Series A (March 2018)
      led by Boldstart Ventures, Canaan Partners, and Heavybit. The Series B (2018-2019) brought in
      approximately $93.7M in two tranches via Accel and GV (Google Ventures). The December 2019 Series C
      ($150M, led by Stripes with Tiger Global) created Snyk's first unicorn moment at a $1B valuation. The
      Series D ($200M, September 2020, led by Addition Capital and Accel) lifted the valuation to $2.6B amid
      COVID-accelerated cloud adoption. The Series E (March 2021, $175M at $4.7B) and the landmark Series F
      (September 2021, $530M at $8.5B, co-led by Sands Capital and Tiger Global) established Snyk as the
      second-most-valuable venture-backed cybersecurity company globally, behind only Lacework.

      The Series F ($530M) comprised $300M+ in new primary capital plus approximately $230M in secondary
      transactions for employees and early investors. Participants included Baillie Gifford, Koch Strategic
      Platforms, Lone Pine Capital, T. Rowe Price, Whale Rock Capital Management, Accel, Addition, Alkeon,
      Atlassian Ventures, BlackRock, Boldstart Ventures, Canaan, Coatue, Franklin Templeton, Geodesic Capital,
      Salesforce Ventures, and Temasek. CEO Peter McKay expressed at the time that the round positioned Snyk
      for a public offering in late 2022 or early 2023.

      The December 2022 Series G ($196.5M, led by Qatar Investment Authority) marked a meaningful reset: the
      $7.4B post-money valuation represented a 12.9% reduction from the $8.5B Series F peak — the only major
      cybersecurity vendor to publicly disclose a valuation reduction in exchange for a funding injection.
      A $25M strategic investment from ServiceNow followed in January 2023, with a further $25M undisclosed
      round in April 2024. Total cash as of December 2024 stood at $435M per CEO statements, with operating
      losses at $188M in 2024 and targeting cash-flow break-even by end-2025.

      As of May 2026, Snyk's last disclosed valuation remains $7.4B (December 2022). IPO plans were drafted
      in early 2024 (confidential SEC prospectus per The Information), but the company has publicly signaled
      2026 as its preferred IPO window, pending market conditions and the CEO transition.
