  - id: financial-performance
    title: Financial Performance and Unit Economics
    body: >-
      Snyk's revenue trajectory reflects a strong but decelerating growth profile typical of late-stage
      private SaaS companies transitioning out of hyper-growth into sustainable expansion. Based on UK
      Companies House filings as reported by Calcalist, Snyk reported $278M in invoiced revenue for 2024
      (26% YoY growth), following $220M in 2023 (50% growth) and an implied ~$147M in 2022 (157% growth).
      The deceleration from 157% to 26% over three years reflects post-ZIRP expansion headwinds common
      across enterprise SaaS, as well as Snyk's transition from land-and-expand hypergrowth to more
      deliberate enterprise account expansion at larger contract sizes. CEO Peter McKay confirmed in
      December 2024 that ARR exceeded $300M as of month-end, which runs ahead of invoiced revenue due to
      committed but not yet invoiced multi-year contracts.

      Gross margin is approximately 80%, per Calcalist reporting, consistent with a pure software SaaS
      model with no significant hardware, professional services, or content licensing cost of revenue.
      This positions Snyk in the top tier of cybersecurity SaaS gross margins, comparable to CrowdStrike
      (~75%) and Zscaler (~80%). Operating losses, however, remain substantial: >$188M in 2024 (up from
      $176M in 2023 and down from a peak of $267M in 2022). The improved 2023 operating loss reflected
      cost discipline following three layoff rounds — June 2022 (30 employees), October 2022 (198
      employees / 14% of peak workforce), and April 2023 (128 employees / ~11% of remaining staff).
      Total cumulative layoffs from these rounds were approximately 355 employees, or ~25% of the 2022
      peak workforce of 1,421. By end-2024, headcount had recovered modestly to 1,162.

      Key unit economics metrics that are observable include: implied ARR per customer of approximately
      $67,000-70,000 (>$300M ARR across 4,478 customers at end-2024); implied revenue per employee of
      approximately $239,000 ($278M / 1,162 employees). Customer count grew from 3,917 in 2023 to 4,478
      in 2024 (+14% YoY), reaching 4,500+ by mid-2025 (per Snyk news). Net revenue retention, customer
      acquisition cost, CAC payback period, and LTV remain undisclosed, representing the primary unit
      economics diligence gaps for investors. Snyk Code (SAST) surpassed $100M ARR individually by
      Q4 2024, confirming the company's multi-product ARR diversification strategy.
