  - id: verdict-and-gaps
    title: Evidence Gaps, Financial Risks, and Verdict
    body: >-
      Financial verdict: Snyk is a high-quality SaaS business with 80% gross margins, >$300M ARR, a strong
      developer brand, and a multi-product platform in one of the fastest-growing segments of cybersecurity.
      The revenue growth deceleration (157% → 50% → 26%) is a concern but mirrors industry-wide trends
      post-ZIRP and is consistent with a company at Snyk's scale. At the December 2022 last-round valuation
      of $7.4B, Snyk trades at approximately 24-25x ARR — in line with the high end of public cybersecurity
      SaaS peers, warranting scrutiny of whether post-IPO multiples would support or compress this level.
      The December 2022 down-round is a material adverse signal: it confirmed that the $8.5B peak valuation
      was unsustainable and that later investors (Series E/F participants) hold positions with underwater
      economics at the last formal round price. The three layoff rounds in 2022-2023 suggest the company
      over-hired in the ZIRP era and had to undergo painful cost-right-sizing. CEO McKay's statement that
      Snyk would reach operational cash-flow breakeven in 2025 is encouraging but depends on continued
      revenue execution without re-acceleration of opex.

      The primary financial diligence blockers are: (1) NRR/GRR — not disclosed, yet critical for
      evaluating expansion and churn trajectory; (2) CAC and payback period — not disclosed, making GTM
      efficiency unverifiable; (3) free cash flow and EBITDA — operating loss does not capture working
      capital, capex, or stock-based compensation, which may differ materially; (4) segment revenue
      breakdown — while Snyk Code ($100M ARR) is disclosed, the split between SCA, Container, IaC, and
      AppRisk remains estimated; (5) full cap table structure — liquidation preference stacks, anti-dilution
      provisions, and economic waterfalls are not publicly disclosed, which could materially affect common
      equity outcomes in a below-peak exit scenario. Given the December 2022 down-round, liquidation
      preference analysis is particularly important for common equity and option-holder economics.
    claimRefs:
      - CI025
      - CI030
      - CI031
      - CI032
      - CI034
      - CI035
      - CI036
    tableRefs:
      - TI005

tables:
  - id: TI001
    title: Revenue streams table
    columns:
      - Stream
      - Mechanism
      - Unit
      - Current Value / Status
      - Revenue Quality
      - Diligence Ask
    rows:
      - - SaaS Subscription (seat-based)
        - Per-developer seat license, annual or multi-year contract; ratable recognition
        - Per developer per month / per year
        - Primary stream; estimated ~85–90% of total invoiced revenue; drives $278M 2024 revenue
        - High — recurring, sticky, high gross margin (~80%), multi-year contracts typical at enterprise
        - Confirm % of revenue from multi-year vs. monthly contracts; disclose NRR to assess expansion vs. churn dynamics
      - - Professional Services
        - Implementation, onboarding, custom integration, and training services
        - Fixed or time-and-materials project fees
        - Estimated ~5–8% of revenue; undisclosed segment; Services typically lower-margin than SaaS
        - Medium — one-time; lower gross margin (~20–30%); blended with SaaS margin in reported ~80% figure
        - Confirm services revenue as % of total; disclose COGS attribution; confirm pure SaaS gross margin ex-services
      - - Strategic / Financial Partner Revenue
        - ServiceNow integration licensing, co-sell revenue share, OEM or embedded licensing
        - Partnership fee / revenue share
        - Nascent; ServiceNow $25M strategic investment (2023) tied to commercial deal; other partners undisclosed
        - Low-Medium — early stage; diversification value; integration risk if partners shift roadmap
        - Confirm ServiceNow commercial terms; disclose other strategic partner revenue contributions
      - - Add-ons and Consumption-based
        - Snyk Learn (security education), Snyk API & Web (DAST, usage-based), containerized scan capacity
        - Per-user training license or per-scan/API call consumption
        - Early-stage; launched 2024; adds incremental ARR on top of core platform
        - Medium — non-recurring elements; complicates ARR vs. revenue reconciliation
        - Disclose add-on ARR contribution; confirm whether consumption fees are included in stated ARR
    notes: >-
      Revenue stream breakdown by segment is not publicly disclosed; splits are estimated from analyst research
      (Sacra) and press reporting. Professional services estimated to be a minority of total revenue. The
      ~80% gross margin reported is a blended figure and may obscure a lower services gross margin.
    claimRefs:
      - CI001
      - CI002
      - CI018
      - CI038

  - id: TI002
    title: Pricing / monetization table
    columns:
      - Plan
      - Target Customer
      - List Price / Mechanism
      - Key Included Features
      - List vs. Realized Pricing
      - Discounts / Unknowns
    rows:
      - - Free
        - Individual developers; small open-source projects
        - $0 — unlimited developers; limited test quota per month
        - Snyk Open Source SCA (limited); IDE and CLI integration
        - List = Realized (no revenue)
        - No revenue from free tier; serves as top-of-funnel acquisition and developer habit formation
      - - Team
        - Small engineering teams (startup to mid-market)
        - From ~$25/developer/month (current 2026); was $1,319/yr for 25 seats in 2020, ~$2,675/yr in 2022
        - Full SCA, Snyk Code (SAST), Snyk Container, IaC; CI/CD integrations; reporting dashboards
        - List pricing published; actual realized pricing may vary with volume discounts
        - Annual commitment typically required; volume negotiation begins at ~50+ seats; historical doubling confirms pricing power
      - - Ignite
        - SMB / growth-stage companies (<50 developers); developer-led security programs
        - Custom; positioned above Team; targets full AppSec governance for smaller companies
        - Full platform access; security policy controls; SBOM/compliance reporting; dedicated onboarding
        - Not publicly listed; sales-negotiated
        - Relatively new tier (2024-2026 positioning); penetration rate and realized pricing undisclosed
      - - Enterprise
        - Large enterprises (>500 developers); regulated industries (BFSI, government, healthcare)
        - Fully custom; volume licensing; FedRAMP Moderate for US federal; multi-year contracts
        - Full platform; AppRisk; DAST (API & Web); custom integrations; SLA; dedicated CSM
        - Significant volume discounts at scale; list pricing is a floor; CRO-led negotiation
        - Average enterprise contract value undisclosed; NRR expansion from upsell across product lines is a key driver
      - - Add-ons (Snyk Learn, API & Web)
        - All tiers; incremental capability
        - Per-user or consumption pricing; modular on top of base subscription
        - Security training (Snyk Learn); DAST scanning (Snyk API & Web, Probely-based)
        - Not publicly disclosed
        - Add-on contribution to total ARR is undisclosed; represents incremental monetization of existing customer base
    notes: >-
      Pricing data sourced from Snyk official plans page (current 2026) and Sacra research (historical evolution).
      List pricing reflects publicly published amounts; actual realized pricing varies materially for enterprise
      accounts. The pricing evolution from 2020 to 2022 (roughly 2x increase per tier) reflects platform expansion.
    claimRefs:
      - CI003
      - CI038

  - id: TI003
    title: Unit economics table
    columns:
      - Metric
      - Value / Range
      - Confidence
      - Why It Matters
      - Diligence Ask
    rows:
      - - 2024 Revenue (invoiced)
        - $278M
        - High — UK Companies House filing per Calcalist; corroborated by TechCrunch
        - Foundational top-line metric for growth and scale assessment
        - Confirm Companies House filing directly; reconcile invoiced vs. ARR timing differences
      - - 2024 ARR (end of year)
        - ">$300M"
        - High — CEO McKay statement (Dec 2024, TechCrunch); Sacra estimate ~$326M (Feb 2026)
        - ARR is forward-looking committed revenue; leads invoiced revenue; better valuation basis
        - Confirm ARR calculation methodology (seat-based, usage, add-ons); disclose monthly ARR bridge
      - - Gross Margin
        - ~80% (blended)
        - Medium — Calcalist reporting; Sacra estimate; consistent with SaaS-only cost structure
        - High gross margin supports reinvestment in R&D and S&M; critical for path to profitability
        - Disclose GAAP gross margin; confirm services vs. subscription blended split
      - - 2024 Operating Loss
        - ">$188M"
        - Medium — UK Companies House filing per Calcalist; trend confirmed (down from $267M in 2022)
        - Reflects R&D and S&M investment intensity; improving trend is positive; path to breakeven is key
        - Request GAAP income statement; confirm stock-based compensation and depreciation treatment
      - - Net Revenue Retention (NRR)
        - Not disclosed
        - "Low — industry estimate for DevSecOps SaaS at this scale: likely 115–130%"
        - NRR >100% means existing customers expand revenue; critical for SaaS valuation quality
        - Request actual NRR/GRR for each of the past 3 years; segment by product line
      - - ARR per Customer
        - ~$67,000–70,000 (est.)
        - "Medium — derived: $300M+ ARR / 4,478 customers; blended across tiers"
        - Indicates average deal size; blended figure hides mix of large enterprise and smaller SMB accounts
        - Disclose ARR by customer cohort (>$100K, $50–100K, <$50K ARR); confirm enterprise concentration
      - - Revenue per Employee
        - ~$239,000 (2024 est.)
        - "Medium — derived: $278M / 1,162 employees; in line with mature SaaS companies"
        - Productivity measure; >$200K/employee is typical for scaled SaaS; improving from prior years
        - Confirm headcount includes all full-time equivalents; disclose Snyk Code vs. core platform headcount
      - - Customer Acquisition Cost (CAC)
        - Not disclosed
        - Low — estimated to be high given enterprise PLG + enterprise sales dual motion
        - CAC drives payback period and LTV assessment; undisclosed is a primary diligence gap
        - Request fully loaded S&M CAC by segment (PLG vs. enterprise field); calculate payback period
      - - CAC Payback Period
        - Not disclosed
        - Low — estimated >24 months for enterprise accounts at standard SaaS S&M spend ratio
        - Payback >18 months requires strong NRR to justify; critical for capital efficiency assessment
        - Derive from S&M expense (request) divided by new ARR added per year
      - - Gross Profit (est.)
        - ~$222M (est.)
        - "Medium — derived: 80% of $278M revenue; unconfirmed breakout"
        - Gross profit pool funds R&D and S&M; $222M at 80% margin is strong for a $300M ARR company
        - Request GAAP gross profit disclosure; confirm services cost attribution
    notes: >-
      Metrics are a mix of confirmed (revenue, ARR, operating loss, customers) and estimated (gross margin, NRR,
      CAC, gross profit). All estimates are derived calculations or analyst estimates and require NDA-level
      financial disclosure for verification. NRR, CAC, and payback period are the most material diligence gaps.
    claimRefs:
