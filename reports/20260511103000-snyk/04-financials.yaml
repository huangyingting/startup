  - id: TI004
    title: Capital adequacy table
    columns:
      - Metric
      - Value
      - Basis / Source
      - Notes
    rows:
      - - Total Equity Raised
        - ~$1.32B
        - Multiple TechCrunch, GlobeNewsWire, SEC Form D filings; Sacra; Wikipedia
        - Includes seed through Dec 2022 down-round plus Jan 2023 ServiceNow strategic investment
      - - Last Primary Equity Raise
        - $196.5M (December 2022, Series G)
        - Axios (Dec 2022); Calcalist; GlobeNewsWire Jan 2022 (prior raise at $8.5B)
        - QIA-led; 12% valuation reduction from prior $8.5B; down-round explicitly acknowledged by CEO McKay
      - - Last Disclosed Valuation
        - $7.4B (December 2022)
        - Axios (Dec 2022); Calcalist reporting on Series G
        - Peak valuation was $8.5B (Series F, September 2021); down-round at $7.4B is last formal mark
      - - Months Since Last Primary Raise
        - ~41 months (May 2026)
        - Derived from December 2022 close to May 2026
        - Extended runway reliance; no public indication of near-term primary raise or bridge financing
      - - Cash on Hand (December 2024)
        - ~$435M
        - CEO Peter McKay, TechCrunch Dec 2024 interview
        - 'McKay: "We''ve got $435 million in the bank and are very close to break-even"'
      - - Estimated Monthly Burn (2024)
        - ~$15–16M (est.)
        - "Derived: $188M operating loss / 12 months; McKay implies near-zero cash burn in 2025"
        - Operating loss ≠ cash burn (excludes SBC, depreciation, working capital); cash burn may differ
      - - Estimated Runway (at 2024 burn)
        - ~27–29 months from December 2024
        - "Derived: $435M / ~$15.7M monthly; management targeting cash-flow breakeven in 2025"
        - If breakeven achieved in 2025, runway extends materially; IPO decision is self-funding
      - - Known Debt / Project-Finance
        - None publicly disclosed
        - No public announcements; Form D filings are equity instruments only
        - Absence of public debt does not confirm zero debt; must verify in formal diligence
    notes: >-
      Cash balance ($435M) is per CEO McKay's December 2024 public statement; independently confirmed by
      Sacra (Feb 2026 ~$400M+ estimate). Monthly burn is derived from operating loss, which may differ from
      cash burn due to SBC, D&A, and working capital movements. Runway calculation assumes no additional
      primary fundraising. Historical funding chronology is detailed in Chapter 1 (Company Overview);
      this table presents only the capital adequacy metrics needed for financial underwriting.
