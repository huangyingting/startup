  - id: FI002
    title: Unit economics bridge
    type: flow
    layout: wide
    summary: >-
      How Snyk's developer-led freemium funnel converts free developer usage into paid enterprise ARR, and
      how ARR translates through the gross margin and operating cost structure to generate (or consume) cash.
    data:
