  evidenceGaps:
    - description: >-
        Snyk does not publicly disclose net revenue retention (NRR) or gross revenue retention (GRR). These
        are the most critical unit economics metrics for evaluating the quality and sustainability of Snyk's
        ARR, particularly given the company's expansion-driven model. Without NRR, it is impossible to
        independently assess whether ARR growth is driven by genuine expansion or is masking underlying
        churn. Industry estimates for comparable DevSecOps platforms suggest NRR of 115–130%, but Snyk has
        never confirmed. QI023 is partially answered by confirming the gap exists.
      relatedQuestionRefs:
        - QI023
      relatedTableRefs:
        - TI003
        - TI005
      severity: high

    - description: >-
        Customer acquisition cost (CAC), CAC payback period, and customer lifetime value (LTV) are entirely
        undisclosed. The dual PLG + enterprise field sales motion creates two materially different CAC
        profiles, and the blended figure is unknown. Without these metrics, the LTV/CAC ratio and GTM
        efficiency cannot be independently assessed. This is a high-priority formal diligence request.
      relatedQuestionRefs:
        - QI021
        - QI023
      relatedTableRefs:
        - TI003
        - TI005
      severity: high

    - description: >-
        Free cash flow (FCF) and EBITDA are not disclosed. The operating loss figures from UK Companies
        House filings represent GAAP operating loss, which excludes stock-based compensation (SBC), which
        may be significant ($30–80M at this scale). FCF and EBITDA may differ materially from operating
        loss, which could affect the burn rate and runway calculations in TI004. CEO McKay's assertion that
        Snyk would not burn cash in 2025 implies FCF improvement ahead of GAAP operating profitability,
        but the mechanism is unverified.
      relatedQuestionRefs:
        - QI016
        - QI029
      relatedTableRefs:
        - TI004
        - TI005
      severity: medium

    - description: >-
        Snyk's full capital table structure, including liquidation preference stacks, anti-dilution provisions,
        pro rata rights, and information rights for each round, is not publicly available. Given the
        December 2022 down-round at $7.4B with ~$1.32B raised in prior rounds, investors from earlier rounds
        at higher valuations (e.g., Series E/F at $4.7–8.5B) may hold participating preferred or
        anti-dilution rights that could significantly impact common equity economics in an exit at or below
        peak valuation. This creates an opaque economic waterfall for option holders and common stockholders.
      relatedQuestionRefs:
        - QI006
        - QI009
        - QI015
      relatedTableRefs:
        - TI004
        - TI005
      severity: high

    - description: >-
        Revenue and ARR breakdown by product line is only partially confirmed. Snyk Code ($100M ARR) is
        publicly confirmed, but the split of remaining ~$200M+ across Snyk Open Source, Snyk Container,
        Snyk IaC, and Snyk AppRisk/API & Web is not disclosed. This limits assessment of product-line
        concentration risk, upsell dynamics, and which products are growing vs. plateauing.
      relatedQuestionRefs:
        - QI010
      relatedTableRefs:
        - TI001
        - TI005
      severity: medium

    - description: >-
        Snyk's IPO timeline remains uncertain as of May 2026. Despite McKay's December 2024 statement that
        Snyk has $435M in cash and "can pick the time when I go public," no S-1 or formal IPO filing has
        been made. The CEO transition (McKay stepping down, Ken MacAskill as interim CEO/CFO as of Feb 2026)
        further delays IPO readiness. Investors with 2021-2022 vintage positions face a 40+ month hold since
        the last primary round with no liquidity pathway confirmed.
      relatedQuestionRefs:
        - QI018
        - QI015
      relatedTableRefs:
        - TI004
      severity: medium

