    title: 公司概况
    sections:
      - number: '1.1'
        title: 公司身份、创立与业务概览
        blocks:
          - type: paragraph
            body: >
              Snyk（读作「sneak」）是一家私营开发者安全公司，2015 年创立，根基在英国伦敦和以色列特拉维夫。公司目前总部位于 10 Summer Street, Boston, MA 02110，并在伦敦（24
              Eversholt St, London NW1 1AD）、特拉维夫、渥太华、新加坡、悉尼、东京、苏黎世、布加勒斯特、Cluj-Napoca 和里斯本保留重要工程与商业团队，呈现真正分布式的全球运营形态。Snyk
              的法律实体 Snyk Limited 注册在英格兰，地址为 Highlands House, Basingstoke Road, Reading, Berkshire。

              公司把自己定位为「开发者安全领导者」，口号是「AI writes, Snyk secures」，强调它正转向 AI 辅助和 AI 生成代码安全。Snyk
              的开发者安全平台直接嵌入软件开发工作流，覆盖代码仓库（GitHub、GitLab、Bitbucket）、CI/CD 流水线（Jenkins、Travis CI）和
              IDE，并持续扫描五个安全域的漏洞和许可证问题：开源软件成分分析（Snyk Open Source / SCA）、自研代码扫描（Snyk Code / SAST）、容器和 Kubernetes 安全（Snyk
              Container）、基础设施即代码错误配置检测（Snyk IaC），以及新推出的智能体安全编排系统（Evo by Snyk）。2024 年，Snyk 通过收购 Probely 并推出 Snyk API &
              Web，补上了 DAST 能力。

              Snyk 采用 Freemium SaaS 模式，按开发者席位计费。免费层推动开发者自然采用并进入转化漏斗，付费方案（Team、Business、Enterprise）解锁高级扫描、治理、报告和合规功能。公司
              2024 年获得 FedRAMP Moderate Authorization，将可服务市场扩展至美国联邦机构。Snyk 被列为 2025 年 Gartner Magic Quadrant for
              Application Security Testing 领导者，截至 2024 年底客户数增至约 4,478 家企业，包括
              Google、Salesforce、Intuit、MongoDB、Comcast、CVS Health、Atlassian、Revolut 和 Anheuser-Busch InBev。
