      - number: '2.4'
        title: 增长驱动因素与采用约束
        blocks:
          - type: paragraph
            body: >
              AppSec 市场的主要结构性增长驱动因素已有充分记录，且大多具备耐久性。开源软件如今支撑了大多数商业应用代码；Sonatype 的 State of the Software Supply Chain 2024
              显示，开源恶意软件活动越来越多由民族国家赞助，并针对开发者工作流优化。这直接扩大了 Snyk 的 SCA 可服务基础。通过 GitHub Copilot、Cursor 等工具生成的 AI
              代码正在快速增加，带来一类新的未知漏洞，其速度超过传统人工安全审查，推动市场急需具备 AI 感知能力的扫描工具；Snyk 的「AI writes, Snyk secures」定位正试图切入这一楔子。IBM
              2025 Cost of a Data Breach Report 发现，全球平均数据泄露成本为 $4.4M，同比下降 9%，原因归因于 AI 辅助检测；但报告也指出，经历 AI 安全事件的组织中有 97%
              缺少适当 AI 访问控制，指向一大片尚未覆盖的风险面。

              监管催化正在加速预算分配。欧盟 Digital Operational Resilience Act（DORA）要求金融实体自 2025 年 1 月起通过强制测试证明韧性。美国 Executive Order
              14028 与 CISA 的 Software Bill of Materials（SBOM）框架要求联邦软件供应商提供 SBOM；这一要求扩大了 Snyk 的联邦可服务市场，并由 2024 年 FedRAMP
              Moderate Authorization 激活。欧盟 Cyber Resilience Act 和 NIST Secure Software Development
              Framework（SSDF）也在企业细分市场继续制造合规驱动需求。

              采用约束同样真实，需要管理层投入。多份行业资料都把开发者告警疲劳列为安全工具 ROI 难以证明的首要原因；面对 SAST 工具高误报率的团队，往往会降低发现项优先级。预算整合正在推动企业买方向
              CrowdStrike、Palo Alto Networks 和 Microsoft Defender 的整合型 AppSec 平台靠拢；这些厂商把 AppSec 能力以折扣价打包进更广的安全平台，威胁 Snyk
              点工具定价权。资本强度和人才短缺也限制 SMB 采用，因为小团队缺少专职 AppSec 人员，无法大规模分拣和修复发现项。
