      - number: '6.2'
        title: 具名客户验证
        blocks:
          - type: paragraph
            body: >-
              Snyk 公开记录的案例研究，代表了全球最大、要求最高的一批开发组织。Atlassian 支撑全球 200,000+ 个企业客户，每月用 Snyk 运行 5.5 million 次依赖扫描和 3.7
              million 次容器扫描，高危容器漏洞减少 65%，严重漏洞减少 39%。Salesforce 将 Snyk 接入 CI/CD 管线后，节省了超过 150 小时手工安全审查工作量。日本工业制造商 Komatsu
              在三个月内把平均修复时间减少 62%，六个月内整体风险态势改善 28%——且已发现漏洞中有 19% 只存在于 Snyk 自有数据库，展示了独特覆盖深度。TechnologyOne（企业
              ERP）把开发者安全反馈时间从 90 分钟缩短到几秒。Skyscanner 监控服务 70 million 月活用户的平台上 500+ 个项目。服务 300 million 客户的设备保护公司 Asurion
              使用 Snyk 的容器化开发者安全工具包。这些结果持续呈现三个主题：节省时间、减少漏洞、改善开发者体验。就结果而言证据质量高，但留存信号有限——案例研究由公司控制，且未经独立验证。Singapore
              GovTech 批准产品上架记录提供了少见的第三方政府背书。
