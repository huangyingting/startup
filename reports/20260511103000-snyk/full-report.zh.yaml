      - number: '8.5'
        title: 退出路径与尽调要求
        blocks:
          - type: paragraph
            body: >-
              Snyk 有三条可行退出路径：IPO、战略收购和二级买断。IPO 路径要求提交 S-1，证明符合 Rule-of-40（ARR 增长 + FCF 利润率 >= 40%），并以公开市场能承接的倍数定价。截至
              2026 年 5 月，Snyk 尚未提交 S-1，且 CEO 空缺，这条路径至少还要 18–24 个月。公司 2024 年 12 月 CEO 关于不急于上市的表态，说明管理层也同意这个判断。Globes 2024
              年末报道称，时任 CEO 倾向于 2026 年在 Wall Street IPO；考虑 McKay 2026 年 2 月离任后的治理交接，这个时间表显得乐观。

              战略收购仍然可行。Cisco、Palo Alto Networks、Microsoft 和 Broadcom
              等安全平台厂商，已经显示出收购开发者安全资产的意愿，倍数由战略契合度驱动，而不只是收入倍数。不过，Snyk 的 $8.5B
              锚点形成心理底价；除非增长实质重新加速，否则可能劝退收购方。若没有重新加速，$1.5–3.0B 的 M&A 结果可行；高于这个区间则需要证明企业账户中的平台黏性。

              如果 IPO 市场仍然艰难，由成长股权或后期 PE 公司进行二级买断，是近期最可能的流动性事件。TPG 风格买家会套用 3–5x ARR 倍数，先推动运营扭转，再在 3–5 年后进行二次 IPO。

              任何投资定价前，关键尽调要求包括：（1）FY2024 和 FY2025 经审计收入与毛利率；（2）按 cohort 拆分的 NRR，特别是 2020–2021 年批次客户；（3）现金余额和剩余
              runway，并附详细 burn 预测；（4）完整 cap table，包括清算优先权和反稀释条款；（5）CEO 搜寻状态及继任者任务授权。
