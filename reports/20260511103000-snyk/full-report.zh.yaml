      - number: '1.4'
        title: 产品平台、收入模式与市场位置
        blocks:
          - type: paragraph
            body: >
              Snyk 的安全平台围绕开发者优先理念组织：安全工具嵌入开发者工作流，而不是作为外部关卡强行套上去。平台最初的五个安全域——Snyk Open Source（SCA）、Snyk Code（SAST）、Snyk
              Container、Snyk IaC 和 Snyk AppRisk——在 2024 年收购 Probely 后扩展出 Snyk API & Web（DAST），又在 2025 年推出 Evo by
              Snyk，并称其为全球首个智能体安全编排系统。

              创始产品 Snyk Open Source（SCA）扫描开源库依赖中的已知 CVE 和许可证合规问题，目前支持 40+ 种编程语言和包管理器。Snyk Code（SAST）基于收购而来的 DeepCode AI
              引擎，对自研代码进行实时静态分析，并用 AI 识别模式；该产品在 2024 年末 ARR 超过 $100M，约占 Snyk 总 ARR 的三分之一，证明 AI 增强代码安全被市场快速采用。Snyk
              Container 保护容器镜像和 Kubernetes 环境。Snyk IaC 扫描 Terraform、AWS CloudFormation、Azure Resource Manager 和 Google
              Cloud 配置。Snyk AppRisk 为 CISO 提供资产清单和应用安全态势管理（ASPM）。Evo 面向 AI 原生软件提供智能体安全编排，覆盖 AI 模型、智能体和非确定性系统的安全。

              Snyk 的商业模式是订阅制 SaaS，核心商业单位是按开发者席位计费。Freemium
              层允许个人和小团队免费扫描不限数量的项目，推动自下而上采用。付费层（Team、Business、Enterprise）解锁治理、SSO、审计日志、合规报告、优先支持和更高扫描配额。Snyk 约 60%
              收入来自软件和科技公司，10% 来自金融科技。北美贡献约 70% 收入，欧洲约 17%，亚太 / 日本约 10%。

              Snyk 在 2024 年获得 FedRAMP Moderate Authorization，打开美国联邦政府市场。公司已与 Atlassian Ventures（投资者兼集成伙伴）、Salesforce
              Ventures（投资者兼客户）、Google Cloud（2025 Technology Partner of the Year for Application
              Development）、ServiceNow（战略投资者兼合作伙伴）、Anthropic（Claude 嵌入 Snyk 的 AI 安全平台）和 Orca Security 建立战略合作。Snyk 平台嵌入主流
              AI 编程助手，并与 GitHub Copilot 集成。截至 2025 年，McKay 估计 AI 生成代码比人类编写代码多出 30–40% 漏洞；这既是不断扩大的风险，也是 Snyk 业务的结构性顺风。
