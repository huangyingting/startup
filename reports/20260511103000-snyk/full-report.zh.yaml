  - number: 5
    title: 产品与技术
    sections:
      - number: '5.1'
        title: 产品组合与核心能力
        blocks:
          - type: paragraph
            body: >-
              Snyk 平台由七个不同安全产品组成，覆盖完整应用安全测试（AST）谱系。Snyk Open Source 是创始产品，也是使用最广的产品，提供软件成分分析（SCA），把开源依赖项与 Snyk Intel
              漏洞数据库比对扫描。它支持 19+ 种语言和包管理器，可用可定制模板生成一键修复 PR，执行许可证合规策略，并持续监控项目——新漏洞披露后自动提醒团队，无需重新触发手工扫描。仅 2024 年，Snyk
              就跟踪了超过 24,000 个新发现漏洞。

              Snyk Code 是 SAST（静态应用安全测试）产品，建立在 2020 年 9 月从 ETH Zurich 收购的 DeepCode AI 引擎之上。它支持 19+ 种语言，提供 IDE 内实时分析和自动化
              “Agent Fix” 建议，声称准确率 80%。在 Stack Overflow 2024 年开发者调查中，Snyk Code 是唯一进入开发者候选名单的 AI
              驱动代码安全工具——这说明它有真实开发者采用，而不是自上而下强推部署。其知识库来自 25M+ 个数据流案例，通过结合符号 AI 和生成式 AI 建模而成。

              Snyk Container 为 Docker 镜像、Kubernetes 工作负载和容器注册表（ECR、GCR、ACR、Docker Hub）提供漏洞扫描，并给出自动化基础镜像升级建议和 Dockerfile
              修复指引。Snyk IaC 扫描 Terraform、CloudFormation、ARM 模板、Helm charts 和 Kubernetes manifests 中的配置错误，执行 CIS 基准和基于
              OPA 的自定义策略。Snyk API & Web 于 2024 年在收购 Probely 后推出，为 API 和 Web 应用安全加入 DAST（动态应用安全测试）。Snyk AppRisk 提供
              ASPM（应用安全态势管理）和基于风险的优先级排序。最后，Evo 在 2025 年收购 Invariant Labs 后推出，为 AI 原生和非确定性应用环境提供智能体安全编排。
