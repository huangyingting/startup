  - id: FP001
    title: 竞争定位象限——开发者友好度 vs. 安全深度（2026）
    type: quadrant
    layout: standard
    summary: >
      将 10 家主要 Snyk 竞争对手放在两条轴上：开发者友好度（UX、IDE 集成、免费层、上手阻力）与安全深度（漏洞数据库广度、二进制分析、DAST 能力、合规覆盖）。Snyk
      在开发者友好度上领先，安全深度也有竞争力。GHAS 开发者友好度高，但安全深度有限。Veracode 安全深度最高，开发者友好度最低。Wiz 和 Orca 落在安全深度 / 云原生象限。
    xAxisLabel: 开发者友好度（0=低，1=高）
    yAxisLabel: 安全深度 / 广度（0=低，1=高）
    data:
      points:
        - label: Snyk
          x: 0.9
          'y': 0.8
          description: 开发者优先的 SCA/SAST 龙头；免费增值模式；AI 原生平台；5 条产品线
        - label: Veracode
          x: 0.35
          'y': 0.9
          description: 企业二进制 SAST 龙头；Forrester Wave 9 项满分；100+ 种语言；开发者 UX 偏弱
        - label: Checkmarx
          x: 0.5
          'y': 0.85
          description: SAST/SCA/DAST/ASPM 平台；每月 800B 行代码；企业能力强，但 UX 偏传统
        - label: GitHub GHAS
          x: 0.95
          'y': 0.55
          description: GitHub 原生安全，零摩擦；每位提交者 $30；CodeQL SAST + 密钥扫描；无容器 / IaC
        - label: Semgrep
          x: 0.85
          'y': 0.45
          description: 免费开源 SAST；规则快速且可定制；社区增长；无 SCA / 容器 / IaC
        - label: SonarQube
          x: 0.8
          'y': 0.5
          description: 7M+ 开发者用户；代码质量 + 安全；免费 Community Edition；SCA 深度有限
        - label: Wiz
          x: 0.3
          'y': 0.85
          description: 50%+ Fortune 100 信任；代码到云安全图；CNAPP 向代码扩展；非开发者原生
        - label: Orca Security
          x: 0.4
          'y': 0.75
          description: 无代理 CNAPP；3 类可达性；告警噪声降低 90%；云姿态优先
        - label: Mend.io
          x: 0.6
          'y': 0.7
          description: SCA + AI 行为测试；AI-BOM；对抗式 AI 模拟；AI 时代重新定位后的品牌
        - label: JFrog Xray
          x: 0.55
          'y': 0.65
          description: 与 Artifactory 集成的 SCA；4M+ OSS 包数据库；二进制扫描；受限于 JFrog 生态
        - label: Cycode
          x: 0.65
          'y': 0.6
          description: 智能体 ASPM + AST + SSCS；融合平台；获 Gartner 认可；对 Snyk 有 AST 数据源风险
        - label: Apiiro
          x: 0.6
          'y': 0.55
          description: 基于风险的 ASPM；代码到风险映射；Gartner/IDC Leader；可能把 Snyk 降为 AST 数据源
    claimRefs:
