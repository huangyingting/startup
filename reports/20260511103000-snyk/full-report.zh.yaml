      - number: '7.6'
        title: 附录
        blocks:
          - type: callout
            title: GHAS 打包已经是当前置换事件，不是未来威胁
            body: >-
              2024 年 10 月的 Gartner Peer Insights 严厉评论，直接把 GitHub Advanced Security 列为客户评估 Snyk
              替代方案的主要原因。这不是理论上的竞争风险，而是正在 Snyk 最大企业客户群中发生的主动流失压力。GitHub Advanced Security 已包含在 GitHub Enterprise Cloud
              中且无需额外付费，而 GitHub 托管了全球大多数企业软件开发；因此，Snyk 核心 SCA 和 SAST 收入线面临结构性定价压力，并会随着每一轮 GitHub Enterprise
              续约加深。投资人应要求按源代码管理平台拆分的 win/loss 数据，以量化已经发生的置换率。
            calloutType: risk
            claimRefs:
              - CR001
              - CR002
              - CR003
          - type: callout
            title: $8.5B 估值包袱造成结构性降轮风险，且可能持续多年
            body: >-
              Snyk 2021 年 $8.5B 的峰值估值，是在零利率环境下按 40x+ 远期 ARR 定价，市场当时还预期倍数继续扩张。2025–2026 年，公开安全 SaaS 同业按 5–12x ARR
              交易；若按市场倍数给 Snyk 的 $300M ARR 定价，企业价值只有 $1.5–3.6B，较 2021 年减记 55–80%。除非 Snyk 能证明 ARR 加速到 $500M+
              且利润率改善，或市场倍数大幅扩张，否则任何 IPO 或后期二级交易都会低于 2021 轮定价。这个包袱影响员工股权激励、投资人回报，以及 Snyk 用股票作为收购货币的能力。它是组合中最重要、仍未解决的财务风险。
            calloutType: risk
