  - number: 2
    title: 市场分析
    sections:
      - number: '2.1'
        title: 市场边界、纳入支出与相邻市场
        blocks:
          - type: paragraph
            body: >
              应用安全（AppSec）市场包括在完整开发生命周期中发现、预防和修复软件应用漏洞的工具与服务。与 Snyk 最直接相关的核心软件子赛道包括：软件成分分析（SCA），扫描开源依赖中的已知 CVE
              和许可证风险；静态应用安全测试（SAST），在不执行应用的情况下分析源代码、字节码和二进制文件；动态应用安全测试（DAST），探测运行中的应用和 API 里的可利用弱点；容器安全，检查容器镜像和
              Kubernetes 配置；以及基础设施即代码（IaC）安全，检测 Terraform、Helm 和 CloudFormation 模板中的策略违规。Snyk 通过平台产品参与上述五类市场。

              若干相邻市场通常不计入 Snyk 的直接 TAM，但既可能替代竞争，也可能构成打包威胁。Web Application Firewall（WAF）和 Runtime Application
              Self-Protection（RASP）处理实时流量过滤，而非开发阶段测试，通常由安全运营团队采购，而不是开发者采购。Cloud Security Posture Management（CSPM）在云配置层与
              IaC 扫描有重叠，但预算来自平台或云运维团队管理的独立云安全预算。Managed Security Services（MSSP）、网络安全和端点检测则完全位于 AppSec
              软件边界之外。分析师划出的关键分界，是流经工程和 DevOps 预算、Snyk 最强的开发者工具型 AppSec 支出，与由安全运营中心控制的运营安全支出之间的差异。

              维持现状的替代方案包括人工代码审查、内部渗透测试团队、没有 CI/CD 集成的一次性漏洞扫描器，以及用自研脚本包裹 Bandit（Python SAST）、OWASP
              Dependency-Check（SCA）、Trivy（容器扫描）等开源工具。成本受限环境中，这类替代方案很常见，也构成 Snyk freemium 模式的替换机会。OWASP Top Ten 2025
              仍是公开基准中的核心目录，列出最关键 Web 应用风险，并在全球范围塑造买方认知和工具评估标准。
            claimRefs:
              - CM001
              - CM006
              - CM010
              - CM029
              - CM030
