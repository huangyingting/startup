  - id: TM004
    title: 增长驱动因素与采用约束
    columns:
      - 驱动因素 / 约束
      - 方向
      - 时点
      - Snyk 影响
      - 尽调问题
    rows:
      - - 开源采用激增（90%+ 应用使用 OSS）
        - 驱动 ↑
        - 持续 / 结构性
        - 持续扩大 SCA TAM；Snyk Open Source 的核心用例
        - Snyk ARR 中，SCA 与 SAST 席位分别贡献多少？
      - - DevSecOps 左移要求
        - 驱动 ↑
        - 当前（2024–2027）
        - 推高 IDE 和 CI/CD 集成需求——这是 Snyk 的主渠道
        - 按客户队列和年份拆分的开发者席位扩张指标
      - - AI 生成代码扩散（Copilot、Cursor）
        - 驱动 ↑
        - 2025 年后加速
        - 出现新一类 AI 代码漏洞；Snyk Studio 和 Evo 布局在此
        - Snyk 按席位定价如何适配 AI 生成代码量
      - - 软件供应链攻击（Log4Shell、SolarWinds）
        - 驱动 ↑
        - 历史催化；风险仍在
        - 触发企业大规模采用 SCA；验证 Snyk 核心价值主张
        - Log4Shell 后客户获取峰值数据（2021 年 12 月）
      - - 监管要求（EO 14028、DORA、NIST SSDF、EU CRA）
        - 驱动 ↑
        - 当前至中期（2025–2027）
        - 合规驱动采购；销售周期更长，但留存更高
        - FedRAMP 管线 ARR 和 ACV 数据；DORA 驱动的欧盟企业客户赢单
      - - 云原生 / Kubernetes 普及
        - 驱动 ↑
        - 持续 / 结构性
        - 扩大容器和 IaC 安全 TAM；直接对应 Snyk Container / IaC 机会
        - 容器安全收入占总 ARR 的比例
      - - PCI-DSS 4.0 全面执行（2025 年 3 月）
        - 驱动 ↑
        - 近期催化
        - 压缩 BFSI 采购周期；金融行业对 SCA 和 DAST 更急迫
        - 2025 年上半年 BFSI 新增客户数与上一期对比
      - - 误报导致开发者告警疲劳
        - 约束 ↓
        - 当前（持续）
        - 精度差会压低工具采用；需要 AI 分诊
        - SAST 误报率与 Checkmarx、Veracode、Semgrep 的基准对比
      - - 平台厂商捆绑（CrowdStrike、Palo Alto、Microsoft）
        - 约束 ↓
        - 中期（2025–2028）
        - 企业买家可能通过捆绑折扣拿到 AppSec 功能；Snyk 面临定价压力
        - 企业客户中的竞争替换率和平均订单规模趋势
      - - 安全预算整合 / 宏观压力
        - 约束 ↓
        - 中期
        - 单点工具预算减少；平台整合向少数厂商集中
        - 企业客户总流失率；净收入留存趋势
