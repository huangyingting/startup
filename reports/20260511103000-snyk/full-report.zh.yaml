      - number: '5.2'
        title: 技术架构与差异化
        blocks:
          - type: paragraph
            body: >-
              Snyk 的核心技术差异化靠两项自研资产撑住：Snyk Intel 漏洞数据库和 DeepCode AI 引擎。Snyk Intel 覆盖的漏洞数量是次大公共数据库的 3×，92% 的 JavaScript
              漏洞早于 NVD 披露，并提供可执行修复建议——不只是 CVE 编号——平均比竞争来源快 47 天。Snyk 同时也是 CVE 编号授权机构（CNA），可以为新发现漏洞分配 CVE，进一步强化其安全研究可信度。

              DeepCode AI 不是套在通用 LLM 外面的一层壳。它使用多个微调模型，训练语料来自数百万个具备宽松许可证、且修复已验证的开源项目，由 Snyk
              内部安全研究员维护，并明确从不使用客户数据训练。该引擎把符号 AI（基于约束的数据流分析）与生成式 AI 结合，在保持高准确率的同时，避免单模型方案常见的高幻觉率。该架构支撑 Snyk Code 准确率 80%
              的自动修复、把可达性分析、漏洞利用成熟度、EPSS、CVSS、传递依赖深度和社会趋势信号纳入的风险评分，以及 Snyk 的 DeepCode AI Search（面向安全团队、带自动补全的自定义查询语言）。AI
              模型为数据隐私而自托管，客户代码不会发送给外部 LLM 提供商。

              “早扫描、原地修”的架构模式，落在整个 SDLC 的深度集成里。在 IDE 层，Snyk 的 VS Code、JetBrains、Visual Studio、Eclipse、Cursor 和 Windsurf
              扩展无需构建周期，就能内联高亮问题并给出修复建议。在 SCM 层，Snyk 接入 GitHub、GitLab、Bitbucket 和 Azure DevOps，在合并前扫描 pull
              request，并自动打开修复 PR。在 CI/CD 层，Snyk 与 Jenkins、CircleCI、GitHub Actions、GitLab CI、Azure Pipelines 和 Bamboo
              集成，执行安全门禁。覆盖整个 SDLC 意味着，Snyk 能在开发周期中最早、成本最低的节点拦截漏洞，而不是等到生产扫描阶段。

              Snyk API（仅限 Enterprise 套餐客户）让企业可用程序化方式访问安全数据，并接入 SIEM 平台、自定义仪表盘和企业治理工作流。Snyk 的漏洞披露计划和 CNA
              身份，使它能比公共仓库更快地把新发现漏洞回灌到自有数据库。
