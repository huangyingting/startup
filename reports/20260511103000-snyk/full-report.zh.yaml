  - number: 4
    title: 财务情况
    sections:
      - number: '4.1'
        title: 收入模式、定价与 GTM 经济性
        blocks:
          - type: paragraph
            body: >-
              Snyk 采用免费增值 SaaS 模式，按开发者席位收费是主要收入机制。免费漏斗居于核心：个人开发者和小团队可使用扫描能力受限的免费层，推动工程组织内部自然采用。开发者把 Snyk
              接入工作流后，企业安全和平台团队通常会统一部署，把免费用户转为 Team、Ignite 或 Enterprise 定价层的付费席位。截至 2026 年，Snyk 的套餐包括 Free
              层（开发者不限、测试额度有限）、Team 套餐（每位开发者约 $25/月起，或约 $300/年）、Ignite 套餐（面向少于 50 名开发者的公司，提供完整 AppSec 治理），以及完全定制的
              Enterprise 层，含 FedRAMP Moderate 授权和阶梯量价。

              2020 年以来，Snyk 的定价架构已有实质变化。Sacra 研究记录显示，Snyk 在 2020 年销售开源和容器安全时，Team 订阅价格约为 25 席 $1,319/年、50 席
              $3,298/年。2021-2022 年，Snyk Code（SAST）和 IaC 扫描被纳入核心平台后，价格大约翻倍：25 名开发者的 Team 套餐达到约 $2,675/年，50 名开发者的 Business
              套餐达到约 $6,916/年。这种定价杠杆——平台变宽的同时推高每席价格——是核心单位经济性驱动项。当前“每月 $25 起”的按开发者定位，说明定价模型仍在向按席位而非按 SKU 收费继续简化。

              Snyk 的 GTM 动作把自下而上的产品驱动增长（PLG）和自上而下的企业销售叠加在一起。开发者免费增值漏斗带来约 2.5 million 个免费开发者账户（Sacra 2023
              数据），成为入站线索引擎。企业销售团队转化最大账户，常用采购驱动的多年期合同和批量折扣。收入模型还包括企业上线的专业服务；2024 年，Snyk 又加入 Snyk Learn（安全培训）和 Snyk API &
              Web（DAST，经 Probely 收购而来）作为新增收入流。地域收入约 70% 来自北美、10% 来自 APAC，其余来自欧洲。收入确认采用 SaaS
              订阅口径（在合同期内按比例确认），ARR（前瞻性承诺收入）与已开票收入（Companies House 披露口径）之间存在时间差。
