  - number: 7
    title: 风险
    sections:
      - number: '7.1'
        title: 市场与竞争风险
        blocks:
          - type: paragraph
            body: >-
              Snyk 最直接的生存级风险，是被客户工作流中已经嵌入的开发基础设施厂商，用平台原生安全工具捆绑替代。GitHub Advanced Security（GHAS）是最清晰、也最可量化的竞争威胁：Microsoft
              向 GitHub Enterprise Cloud 订阅者免费纳入 GHAS，交付 CodeQL 驱动的静态分析（SAST）和 Dependabot 驱动的 SCA——这正是 Snyk 收入最高的两条产品线。使用
              GitHub Enterprise 的企业，已经为 Snyk 核心功能的超集付费，续约时就有很强的经济替代理由。GitHub 自有文档确认，GHAS 覆盖代码扫描、密钥扫描、Dependabot
              依赖更新和安全概览，实际上是在开发者本来就工作的 GitHub 平台内复制 Snyk Open Source 和 Snyk Code 功能。

              对 GitLab 托管客户，GitLab 也构成平行捆绑威胁：原生 SAST、依赖扫描、容器扫描和密钥检测内置于 GitLab Ultimate，并且越来越多进入更低层套餐。AWS Inspector 和
              Azure Defender for Cloud 把这种模式延伸到云原生基础设施扫描，直接瞄准 Snyk Container 和 Snyk IaC 工作负载。Google Cloud 的 Artifact
              Analysis 原生提供容器镜像漏洞扫描。这些捆绑产品的累积效果是结构性定价压力：过去为 SCA 和 SAST 覆盖向 Snyk 支付每位开发者每月 $25–$100
              的客户，如今可以主张这些功能已经包含在现有基础设施支出里。

              开源替代方案进一步削弱 Snyk 在免费层和 SMB 层的定价权。Semgrep 的开源核心和 Semgrep Pro 直接在 SAST 上竞争；OWASP Dependency-Check
              和类似工具以零边际成本提供基础 SCA。JFrog Xray、Mend（原 WhiteSource）、Sonatype Nexus Lifecycle 和 Cycode 在更广的 AppSec
              工具体系中竞争。Checkmarx 和 Veracode 都已投资 AI 驱动修复功能，直接对冲 Snyk 的 DeepCode AI 差异化。风险并不是 Snyk
              会把所有客户都输给这些替代方案，而是商品化压力会在每个产品类别中压低平均售价（ASP），挤压毛利率，并拉长回本周期；而 Snyk $8.5B 峰值估值原本建立在高增长、高毛利 SaaS 扩张之上。2024 年
              10 月 Gartner Peer Insights 批评评论称 GitHub GHAS 是其评估替代方案的原因，为这种替代正在当下企业细分中发生提供了直接第三方证据。
