      - number: '7.5'
        title: 运营与人员风险
        blocks:
          - type: paragraph
            body: >-
              Snyk 的运营风险集中在三处相互勾连的脆弱点：CEO 层面的领导连续性、漏洞研究中的关键人物依赖，以及工程团队集中在地缘政治敏感地区。

              2026 年 2 月宣布的 CEO 交接是最眼前的运营风险。Snyk 正在积极准备 IPO，Peter McKay 此时离任，给战略连续性带来不确定性——投资人、客户和员工都要在没有确定永久 CEO
              的情况下判断公司方向。临时 CEO Ken MacAskill 负责维持运营连续性，但若董事会所称的“深耕产品创新和 AI”的永久 CEO
              搜寻拉长到六到十八个月，竞争决策、产品路线图承诺和企业销售关系都可能被推迟或动摇。董事会对 CEO 的具体要求压缩了候选人池，也提高了搜寻周期风险。

              Danny Grander 是 Snyk 产品架构中最关键的单点人物依赖。Grander 领导 Snyk 漏洞研究团队，也是 Snyk Intel 漏洞数据库的主要架构师；这层专有情报让 Snyk 区别于依赖公开
              CVE 数据的竞争者。Grander 离开会削弱 Snyk 漏洞情报的质量和独占性，而这正是竞争者最难复制的产品属性。Guy Podjarny 2025 年 3 月退出董事会、2026 年 3
              月又以董事长身份回归，带来另一层治理复杂性：创始人兼董事长的角色，可能让 CEO 搜寻中的战略权力和运营权力边界变得模糊。

              工程团队集中在 Tel Aviv，是 2023 年 10 月以来更实质的地缘政治风险。Snyk 创始团队和相当一部分 R&D 组织位于 Israel；当地持续卷入区域冲突，技术行业员工会周期性遭遇运营中断。虽然
              Snyk 已把工程团队分散到 Boston、London、Ottawa、Bucharest、Cluj-Napoca 和 Lisbon，Israel R&D 集中度仍构成关键站点依赖。AI 和 ML
              工程人才竞争也是额外约束：Snyk 的 DeepCode AI 差异化依赖招募并留住顶尖 AI 安全研究员，而 Google、Microsoft、Amazon 和 OpenAI
              正在同一人才池里激烈争夺。裁员后，Snyk 员工在 Glassdoor 上释放的信号喜忧参半；任何 IPO 锁定期之前，能否留住资深技术贡献者，是投资人无法完全通过公开信息评估的关键运营风险。
            claimRefs:
