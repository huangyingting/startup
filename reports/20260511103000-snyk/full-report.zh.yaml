        - 按年度队列拆分的 ARR 瀑布；客户标识留存和金额留存分开列示
        - P0 - 硬门槛
      - - 现金、债务和清算优先权堆叠
        - 剩余现金跑道和可转债压力没有公开数据；优先权堆叠会影响并购中的股权回收
        - 包含清算优先权、反稀释条款和最新 409A 的股权结构表
        - P0 - 硬门槛
      - - CEO 搜寻进展和新任授权范围
