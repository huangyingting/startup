      - number: '1.2'
        title: 创始人、领导层与治理
        blocks:
          - type: paragraph
            body: >
              Snyk 由三位具备以色列国防军精英情报部队 Unit 8200 背景的以色列技术人于 2015 年共同创立：Guy Podjarny、Danny Grander 和 Assaf
              Hefetz。军事情报履历叠加深厚开发者工具经验，构成了 Snyk「为开发者而建的安全，而不是站在开发者对面」理念背后的创始人—市场匹配。

              Guy Podjarny 是 Snyk 首任 CEO；Peter McKay 于 2019 年加入并出任 CEO 后，Podjarny 转任 President。Podjarny 继续担任董事至 2025 年 3
              月，随后离开董事会，专注于新的 AI 创业公司 Tessl（该公司 2024 年 11 月融资 $125M）。治理层面一项重要变化是，Podjarny 于 2026 年 3 月以董事长身份回归 Snyk
              董事会，与 McKay 的交接公告同步发生。Danny Grander 担任联合创始人兼首席安全官，持续提供安全情报专长。Assaf Hefetz 以 CTO 身份共同创立公司。

              Peter McKay 于 2016 年加入 Snyk 董事会、2019 年成为 CEO，并在 2026 年 2 月宣布，找到继任者后将卸任。他公开表示，公司下一章需要「在产品创新和 AI
              上扎根很深的领导者」，能够推动「高度密集的 AI 创新」。此前担任 Snyk CFO 的 Ken MacAskill 在过渡期兼任 Interim CEO 与 CFO。现任领导团队还包括 Diana
              Brunelle（Chief People Officer）、Manoj Nair（Chief Innovation Officer）、Tom Nielsen（Chief Revenue
              Officer）、Austin Martin（EVP, Strategy & Operations）和 Brian Rogan（EVP, R&D），Danny Allan 担任 CTO。

              截至 2026 年 5 月，董事会成员包括：Guy Podjarny（董事长兼创始人）、Mike Scarpelli（董事；Snowflake 前 CFO）、Sanjay Poonen（董事；Cohesity
              CEO & President）、Ken Fox（Stripes 合伙人）、Ping Li（Accel 合伙人）、Philippe Botteri（Accel）和 Peter McKay（顾问）。Accel
              拥有两个董事会席位，反映出该机构自 Series B 以来的长期深度投入。

              Snyk 的关键人物风险真实存在且多层叠加：截至 2026 年 5 月，CEO 交接仍在进行且未公布继任者；创始人在 CEO 离任后近期回归董事会，引发领导连续性上的治理问题；公司文化身份长期与 Guy
              Podjarny 的「开发者安全」愿景绑定。新的 AI 导向 CEO 需要在产品连续性和果断战略转向之间拿捏平衡。
