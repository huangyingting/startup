        - label: 低概率
          values:
            - —
            - 开源许可证责任
            - 出口管制违规
            - 供应链攻破
        - label: 中等概率
          values:
            - —
            - HIPAA 市场缺口
            - GDPR 执法行动
            - 降价融资
        - label: 高概率
          values:
            - —
            - Semgrep / 开源价格侵蚀
            - IPO 延后；AI 人才流失
            - GHAS SCA/SAST 替代
        - label: 极高概率
          values:
            - 告警噪声 / FP 疲劳
            - AWS/Azure 原生扫描器蚕食
            - CEO 更替扰动
            - 竞争平台捆绑
  - id: FR002
    title: 风险传导图
    type: bar
    layout: standard
    summary: 按类别展示已识别 Snyk 风险的分布，显示竞争和运营风险占风险登记册中离散风险项的最大比例。
    claimRefs:
      - CR001
      - CR009
      - CR017
      - CR024
      - CR031
    data:
      items:
        - label: 竞争风险
          value: 6
          note: GHAS、GitLab、AWS、Azure、Semgrep、AI 原生自动修复
        - label: 财务风险
          value: 4
          note: 降价轮、IPO 延后、裁员 / 烧钱、股权疲劳
        - label: 技术风险
          value: 4
          note: 误报、AI/ML 准确率、供应链、覆盖缺口
        - label: 监管 / 法律风险
          value: 5
          note: GDPR、HIPAA 缺口、FedRAMP 连续性、出口管制、许可证责任
        - label: 运营 / 人员风险
          value: 4
          note: CEO 更替、Danny Grander 关键人员、以色列研发、AI 人才
  - id: FR003
    title: 依赖图
    type: timeline
    layout: wide
    summary: 按时间线展示 Snyk 关键竞争威胁的出现和升级，从最初 GHAS 发布到预期中的 AI 原生自动修复商品化。
    claimRefs:
      - CR001
      - CR002
      - CR003
      - CR004
      - CR005
      - CR008
    data:
      items:
        - label: GitHub Advanced Security GA 发布
          date: 2020-09
          detail: GHAS 正式可用；GitHub Enterprise 打包 CodeQL SAST 和 Dependabot SCA
          tone: adverse
        - label: GitLab Ultimate 原生安全功能
          date: 2021-06
          detail: GitLab 将原生 SAST、依赖扫描、容器扫描扩展进 Ultimate 层级
          tone: adverse
        - label: AWS Inspector v2 — 容器 + Lambda
          date: 2022-11
          detail: AWS Inspector v2 发布，提供近实时容器和 Lambda 漏洞扫描
          tone: adverse
        - label: Gartner Peer Insights 的 GHAS 替代评论
          date: 2024-10
          detail: 一条严厉的 Gartner Peer Insights 评论称，GHAS 是评估 Snyk 替代方案的主要原因
          tone: adverse
        - label: GitHub Copilot Autofix（AI 行内安全）
          date: 2024-11
          detail: GitHub Copilot Autofix 发布，在 GitHub PR 内给出 AI 驱动的行内安全修复建议
          tone: adverse
        - label: Azure Defender for Cloud DevSecOps 扩展
          date: 2025-03
          detail: Microsoft 将 Defender for Cloud 扩展成统一 CNAPP，覆盖从代码到运行时；IaC 和容器扫描
          tone: adverse
        - label: 带安全上下文的 AI 原生编码工具
          date: 2026-2027
          detail: 预计 Cursor、Codeium、GitHub Copilot 及类似工具会在代码生成阶段加入主动漏洞预防
          tone: adverse
  - id: FR004
    title: 风险缓释流程——从已识别风险到受监控控制项
    type: flow
    layout: wide
    summary: 展示 Snyk 针对最高风险类别的主要防御姿态，把每个风险驱动因素映射到缓释动作和剩余风险状态。
    claimRefs:
      - CR001
      - CR017
      - CR024
      - CR026
      - CR031
    data:
      nodes:
        - id: ghas-threat
          label: GHAS / 平台捆绑威胁
          type: input
          description: Microsoft/GitHub 将 SCA+SAST 捆绑进 GitHub Enterprise
        - id: differentiation
          label: AI 差异化（DeepCode / Evo）
          type: process
          description: Snyk 用 AI 驱动自动修复、更深的漏洞情报数据库，以及智能体 Evo 编排层抵消捆绑压力
        - id: fp-risk
          label: 误报 / AI 准确率风险
          type: input
          description: 告警疲劳和 ML 漏报会削弱开发者对 Snyk 结果的信任
        - id: precision-control
          label: 精度调优 + 人在回路 AI
          type: process
          description: DeepCode AI 借助人在回路训练降低 FP 率；优先级评分先浮出置信度最高的发现
        - id: supply-chain-risk
          label: 供应链攻破风险
          type: input
          description: Snyk CLI/IDE 扩展会处理客户源代码；一旦遭攻破，后果灾难性
        - id: security-controls
          label: SOC 2 + FedRAMP + Trust Portal
          type: process
          description: SOC 2 Type II、FedRAMP Moderate、trust.snyk.io 安全态势披露和渗透测试，为供应链攻击提供纵深防御
        - id: residual-risk
          label: 剩余风险（持续监控）
          type: output
          description: 缓释后，剩余竞争替代风险仍高；剩余供应链和监管风险为中等；需要持续监控
      edges:
        - from: ghas-threat
          to: differentiation
        - from: differentiation
          to: residual-risk
        - from: fp-risk
          to: precision-control
        - from: precision-control
          to: residual-risk
        - from: supply-chain-risk
          to: security-controls
        - from: security-controls
          to: residual-risk
  - id: FV001
    title: 推荐逻辑
    type: flow
    description: 决策流程展示从当前 ARR 和增长观察到三种情景驱动推荐的逻辑路径，并以 CEO 空缺和增长轨迹为锚。
    claimRefs:
      - CV003
      - CV005
      - CV019
      - CV020
      - CV021
      - CV038
    data:
      nodes:
        - id: start
          label: Snyk：$326M ARR，~7% YoY，无 CEO
        - id: growth-check
          label: ARR 增长是否重新加速到 15%+？
        - id: ceo-check
          label: 是否在 2026 年 H1 前任命正式 CEO？
        - id: bear
          label: 悲观：$1.3-1.6B（4-5x ARR）- 回避
        - id: base
          label: 基准：$2.6-3.3B（8-10x ARR）- 折价时选择性参与
        - id: bull
          label: 乐观：$4.9-6.5B（15-20x ARR）- 长周期持有
        - id: entry
          label: 仅在较 $8.5B 峰值折价 60-70% 时进入
      edges:
        - from: start
          to: growth-check
        - from: growth-check
          to: bear
          label: 否
        - from: growth-check
          to: ceo-check
          label: 是
        - from: ceo-check
          to: base
          label: 是
        - from: ceo-check
          to: bull
          label: 是 + AI 提振
        - from: base
          to: entry
        - from: bull
          to: entry
  - id: FV002
    title: 估值敏感性
    type: bar
    description: 柱状图显示，将不同 ARR 倍数套用于 Sacra 在 February 2026 对 $326 million ARR 的估计后，Snyk 的隐含企业价值，范围从 Rapid7 底部倍数到 2021 年峰值。
    claimRefs:
      - CV013
      - CV015
      - CV016
      - CV017
      - CV019
      - CV020
      - CV021
      - CV022
    data:
      items:
        - label: 2x ARR（Rapid7 底部）
          value: 652
        - label: 4x ARR（Qualys / 悲观）
          value: 1304
        - label: 5x ARR（悲观上限）
          value: 1630
        - label: 8x ARR（基准下限）
          value: 2608
        - label: 10x ARR（基准上限）
          value: 3260
        - label: 15x ARR（乐观下限）
          value: 4890
        - label: 20x ARR（乐观上限）
          value: 6520
        - label: 26x ARR（峰值隐含）
          value: 8476
  - id: FV003
    title: 估值 / 回报区间
    type: range
    description: 区间图展示各情景下的隐含企业价值跨度，以及要实现投入资本 2x 回报，入场价格需要较 $8.5 billion 峰值折价多少。
    claimRefs:
      - CV019
      - CV020
      - CV021
      - CV025
      - CV028
    data:
      items:
        - label: 悲观情景 EV
          low: 1300
          high: 1600
        - label: 基准情景 EV
          low: 2600
          high: 3300
        - label: 乐观情景 EV
          low: 4900
          high: 6500
        - label: 2x 回报入场价（基准）
          low: 1300
          high: 1650
  - id: FV004
    title: 投资 KPI
    type: kpi
    description: 支撑估值分析的五项关键绩效指标；投资者跟踪 Snyk 持仓时应按季度监测。
    claimRefs:
      - CV003
      - CV011
      - CV033
      - CV036
      - CV029
    data:
      items:
        - label: ARR（Sacra February 2026 估计）
          value: $326M
        - label: ARR 同比增长
          value: ~7%
        - label: 峰值估值（Series F/G）
          value: $8.5B
        - label: 距上一轮新股融资天数
          value: '>1,200 (Jan 2022)'
        - label: 已提交 S-1
          value: No (as of May 2026)
