      - number: '4.3'
        title: 资本结构与资金充足性
        blocks:
          - type: paragraph
            body: >-
              Snyk 自 2015 年至 2023 年累计完成 10+ 轮股权融资，约 $1.32B。融资路径从 2015-2016 年 Heavybit Industries 领投的 $3M 种子轮开始，之后包括
              Series A（$7M，Accel）、Series B（$22M，GV/Accel）、Series C（$150M，估值 $1B，2020 年 1 月）、Series D（$300M，估值 $2.6B，2020
              年末）、Series E（$105M，估值 $4.7B，2021 年 3 月）和 Series F（$530M，估值 $8.5B，2021 年 9 月）。2022 年 1 月，Snyk 又以同样 $8.5B
              估值融资 $196.5M。最近一轮主要股权融资是 2022 年 12 月：Qatar Investment Authority 领投 $196.5M，估值 $7.4B——较上一轮 $8.5B 下调
              12%，是明确承认的降估值轮。2023 年 1 月，ServiceNow 在商业合作协议之外进行了 $25M 战略投资。Snyk 的五份 SEC Form D 文件（CIK
              0001824657）确认了其美国融资活动；收入和运营财务则通过 UK Companies House 按 Snyk Ltd（英国注册实体）披露，而非通过 SEC 10-K/10-Q 文件披露。

              截至 2024 年 12 月，按 CEO McKay 2024 年 12 月接受 TechCrunch 采访时的说法，Snyk 持有约 $435M 现金。若按 2024 年超过 $188M
              的经营亏损计算（意味着每月运营烧钱约 ~$15-16M），当前现金可支撑约 27-29 个月。不过，McKay 表示 Snyk 预计 2025 年不再烧钱，说明公司正在接近或已经达到经营性现金流盈亏平衡。尽管
              McKay 在 Series F 后曾提出 2022 年 IPO 计划，且 2024 年又传出 IPO 兴趣，截至 2026 年 5 月，Snyk 尚未完成 IPO。公开资料未披露任何债务融资额度或项目融资义务。
