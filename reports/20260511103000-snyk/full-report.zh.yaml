        - 实施、上线、定制集成和培训服务
        - 固定费用或按工时材料计费的项目费
        - 估计占收入约 5–8%；分部未披露；服务收入通常比 SaaS 毛利率低
        - 中 —— 一次性；毛利率较低（约 20–30%）；与 SaaS 毛利混在披露的约 80% 数字中
        - 确认服务收入占总收入比例；披露 COGS 归因；确认剔除服务后的纯 SaaS 毛利率
      - - 战略 / 财务合作伙伴收入
        - ServiceNow 集成授权、联合销售收入分成、OEM 或嵌入式授权
        - 合作费 / 收入分成
        - 尚早期；ServiceNow 2023 年 $25M 战略投资绑定商业协议；其他合作伙伴未披露
