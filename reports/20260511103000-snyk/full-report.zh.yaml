      - number: '5.5'
        title: 技术风险与尽调缺口
        blocks:
          - type: paragraph
            body: >-
              Snyk 产品带有几类需要尽调关注的技术专项风险。

              第一，AI 准确率：Snyk Code 的自动修复建议声称准确率 80%——这意味着 20% 的幻觉或错误修复率，开发者必须复核。在处理成千上万发现项的企业工作流中，如果管理不慎，20%
              的规模化错误率可能引入回归，或侵蚀开发者信任。OWASP 记录的 SAST 工具弱点清单——包括高误报率，以及难以发现身份认证和访问控制问题——同样适用于 Snyk Code 所在类别，AI
              层并不会消除这些类别固有限制。

              第二，闭源情报依赖：Snyk 自有漏洞数据库和 DeepCode AI 模型是核心差异化，但也构成单点信任。企业客户必须接受：Snyk 的安全情报无法独立审计，扫描结果质量完全取决于 Snyk
              内部研究流程。这带来一种供应商锁定风险，性质不同于 Semgrep 或 SonarQube 等开源替代方案。

              第三，Snyk 本身是攻击目标：Snyk 处理客户代码（或至少处理依赖清单和 IaC 配置），并维护一个可访问企业 SCM 集成的平台。若 Snyk 平台被攻破，其约 ~4,500
              家企业客户的安全数据将暴露。平台架构（自托管 AI、用于 SCM 访问的代理组件）缓解了部分风险，但一个广泛集成的安全工具天然具备更高系统性暴露面。

              第四，竞争性捆绑压力：GitHub Advanced Security（GHAS）与 GitHub Enterprise 捆绑，提供重叠的 SCA 和 SAST 能力。Microsoft
              能把安全功能打包进开发者已经使用的平台，且不增加增量成本，这对 Snyk 的按开发者席位模式形成结构性定价压力。Wiz 平台把云安全态势与运行时扫描结合，又从基础设施侧引入额外竞争。Snyk 通过开发者优先
              UX、AI 准确率和更广的语言 / 框架覆盖形成的差异化仍有防御力，但需要持续投入才能守住。

              第五，许可证复杂度：Snyk Open Source 的许可证合规扫描必须跟上开源许可证多样性的变化，包括 SSPL、BSL 和新的 AI 专用许可条款。许可证分类错误可能让企业客户暴露在合规风险中。
