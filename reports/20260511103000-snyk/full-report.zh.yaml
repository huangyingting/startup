  - id: FI002
    title: 单位经济桥
    type: flow
    layout: wide
    summary: Snyk 以开发者驱动的免费增值漏斗，把免费开发者使用转成付费企业 ARR；ARR 再经毛利率和运营成本结构，转化为现金生成或现金消耗。
    data:
      nodes:
        - id: free-users
          label: 2.5M+ 免费开发者账户（PLG 漏斗）
          type: input
        - id: conversion
          label: 免费增值 → 付费转化（Team 计划；企业触发）
          type: process
        - id: expansion
          label: 先落地再扩张：跨 5 款产品的平台增购
          type: process
        - id: enterprise-commit
          label: 企业多年期 ARR 承诺（平均约 $67K/客户）
          type: process
        - id: arr-pool
          label: 总 ARR：>$300M（4,478 家企业客户）
          type: process
        - id: gross-profit
          label: 毛利润：估计约 $240M（80% 毛利率）
          type: process
        - id: rd-spend
          label: 研发投入：平台、Snyk Code AI、Evo 智能体
          type: output
        - id: sm-spend
          label: 销售与营销投入：企业销售团队 + PLG 增长
          type: output
      edges:
        - from: free-users
          to: conversion
          label: 开发者驱动采用
        - from: conversion
          to: expansion
          label: 安全管理员升级
        - from: expansion
          to: enterprise-commit
          label: 平台广度推动 ARPC 提升
        - from: enterprise-commit
          to: arr-pool
          label: 年度合同 ARR
        - from: arr-pool
          to: gross-profit
          label: SaaS 收入 80% 毛利率
        - from: gross-profit
          to: rd-spend
          label: 研发再投入（估计约占 ARR 40%）
        - from: gross-profit
          to: sm-spend
          label: 销售与营销再投入（估计约占 ARR 40%）
    approximationNotes: 免费开发者数量来自 Sacra（2023 年数据）。毛利率（约 80%）和运营成本分配为估计值；实际研发和销售与营销支出占收入比例未公开披露。NRR（扩张率）是影响转化到扩张动态的关键未知数。
