      - number: '2.3'
        title: 买方、用户与付款方分层及预算归属
        blocks:
          - type: paragraph
            body: >
              AppSec 买方地图呈现明显分叉：Snyk 的开发者优先打法同时服务两条并行买方路径，企业交易要落地必须让两者对齐。自下而上的路径始于个人开发者或 DevOps 工程师，他们因遇到开源漏洞或 CI/CD
              流水线安全门槛而自然采用 Snyk 免费层，随后从安全团队拉动企业许可采购。自上而下的路径始于 CISO 或 AppSec 负责人，他们拿 Snyk
              与既有点工具（Checkmarx、Veracode、Synopsys Black Duck）或 DevSecOps 平台方案比较，并用安全或 IT 预算购买企业许可。

              不同细分市场的预算归属差异显著。在企业账户（>1,000 名开发者）中，CISO 通常控制 AppSec 预算科目并签署合同，AppSec 团队和平台工程负责人推动技术评估。在中型市场账户（100–1,000
              名开发者）中，CTO 或 VP Engineering
              常常既是买方也是预算负责人，销售动作更偏产品驱动。在受监管行业——BFSI、医疗健康和政府——合规官与风险团队共同审批采购，销售周期更长，但合同耐久性更高。Mordor Intelligence 称，BFSI
              是最大终端用户垂直，贡献 2025 年 AppSec 支出的 24.83%。

              采用触发因素也随细分市场而变：企业赢单最常由审计发现、数据泄露后的整改要求，或监管合规截止日期催化（PCI-DSS 4.0 于 2025 年 3
              月全面执行，是有记录的近期开关）。中型市场和科技创业公司的采用，常由依赖漏洞事件（如 Log4Shell）、大型企业客户提出的软件供应链安全政策要求，或开发者主导试用暴露出重大 OSS 风险触发。北美约占全球
              AppSec 收入的 40.91%（Mordor），亚太预计到 2031 年将以 13.83% 的最高区域 CAGR 增长。
