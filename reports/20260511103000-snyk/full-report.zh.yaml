      - number: '8.2'
        title: 融资历史与估值背景
        blocks:
          - type: paragraph
            body: >-
              Snyk 于 2021 年 9 月完成 Series F，由 Tiger Global Management 领投，融资 $530M，投后估值 $8.5B。四个月后的 2022 年 1 月，Snyk 又以同样
              $8.5B 估值融资 $196.5M，Qatar Investment Authority 和 Singapore's GIC 参与。这两轮均有 SEC Form D
              文件和同期官方新闻稿确认。自创立以来，已披露股权融资总额超过 $1.25B，横跨六轮。

              2022 年后，融资背景剧烈变化。BVP Nasdaq Emerging Cloud Index 从 2021 年 11 月高点到 2022 年下跌约 60%；虽然后来部分恢复，公开 SaaS 倍数仍远低于
              2021 年高位。Sacra 的 ARR 模型显示，Snyk 2024 全年 ARR 约 $322M，2026 年 2 月约 $326M，意味着年增长约 7%，较 2021–2022 年估值所隐含的 50%+
              增速大幅降档。TechCrunch 基于公司表述确认，2024 年 12 月 ARR 为 $300M。Snyk CEO 2024 年公开表示公司不急于上市，反映市场条件不利，也反映路演前需要证明重新加速。

              2022 年 12 月出现一个二级市场信号：Axios 报道 Snyk 以显著低于 $8.5B
              峰值的估值完成二级融资，这与当时后期科技公司受到更广泛私募市场重估冲击相一致。此后没有新的一级轮次公布，因此这笔二级交易数据是最近的独立估值参考。
