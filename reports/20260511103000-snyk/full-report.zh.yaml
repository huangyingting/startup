        - 确认 ServiceNow 商业条款；披露其他战略合作伙伴的收入贡献
      - - 附加组件与按用量计费
        - Snyk Learn（安全教育）、Snyk API & Web（DAST，按用量）、容器化扫描容量
        - 按用户培训授权，或按扫描 / API 调用计费
        - 早期；2024 年推出；在核心平台之上增加增量 ARR
