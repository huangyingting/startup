      - number: '3.4'
        title: 竞争位置变化：2026 年谁在赢得或流失份额
        blocks:
          - type: paragraph
            body: >
              2024–2026 年最清晰的赢家是 GitHub Advanced Security。GHAS 向所有 GitHub 用户开放（公开仓库免费，企业附加包定价），消除了单独采购流程，并让 Microsoft 成为
              Snyk 中型市场管线的重要逆风。每一家续约 GitHub Enterprise 并把 GHAS 作为打包附加项的组织，都是一个被挤出的 Snyk Trial 机会。GitHub 的 Copilot
              Autofix 现已与 GHAS 代码扫描集成，可直接在 pull request 中给出 AI 驱动修复建议，匹配了 Snyk 的一个关键差异化点。

              Wiz 是 2022–2026 年增长最快的云安全公司，据称获得超过 50% Fortune 100 公司信任。它从 CSPM 扩张到 code-to-cloud 安全，整合 SCM
              可视性、流水线风险和运行时上下文，具备成为 CNAPP+AppSec 整合方案的潜力，并可能在云优先企业账户中替代 Snyk 的容器和 IaC 产品。Wiz
              更强的企业销售执行力和近期更高估值，使其在企业整合对话中占据有利位置。

              Checkmarx 在 Hellman & Friedman 旗下整合所有权后，仍保持稳定的企业增长轨迹。Checkmarx One 平台重启，以及 2026 年明确的「AppSec for
              Everyone」信息，同时瞄准企业合规细分（Veracode 的主场）和开发者友好细分（Snyk 的主场），使其成为真正的双线威胁。Semgrep
              的社区采用也显著增长，尤其是在开发者主导的组织中，不过其变现规模仍有限，无法与 Snyk 相比。

              Snyk 在几类交易中看起来正在失去位置：纯企业 SAST 交易中，合规和二进制分析深度更重要（Veracode 胜出）；SCM 原生交易中，GitHub 或 GitLab
              组织会整合到平台安全（GHAS/GitLab 胜出）；大型云平台账户中，Wiz 可能已经深度嵌入。Gartner Peer Insights 评论显示，截至 2024 年末，一些客户认为 Snyk 的
              SCA「与较新的 SCA 方案相比，是一种更传统、有不少缺口和缺点的方案」，说明即便在 Snyk 核心细分市场，也面临新进入者压力。

              Snyk 最强的位置仍在多语言、多云、多仓库开发环境中：这些组织没有单一 SCM 或云厂商占主导，并且需要 Snyk 从一个开发者集成平台提供 SCA、SAST、容器、IaC 和 DAST 的完整广度。
