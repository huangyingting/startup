      - number: '5.6'
        title: 展项
        blocks:
          - type: callout
            title: 开发者优先分发 + AI 差异化 = 持久护城河
            body: >-
              Snyk 的集成深度——CLI、五个 IDE 环境、四个 SCM 平台、六个以上 CI/CD 系统——制造了纯企业安全厂商难以复制的切换摩擦。再叠加 DeepCode AI 自托管、保护隐私的架构（在 AI
              SAST 厂商中独特），Snyk 能提供 AI 辅助修复带来的开发者生产力收益，同时不牺牲企业安全团队要求的数据隐私。准确率 80% 的 Agent Fix 在 Stack Overflow
              开发者调查中得到验证，是唯一由开发者自己列入候选名单的 AI SAST，代表真实产品差异化，而不是营销定位。
            calloutType: strength
            claimRefs:
              - CE002
              - CE009
              - CE012
              - CE023
          - type: callout
            title: GitHub Advanced Security 捆绑削弱免费层护城河
            body: >-
              GitHub Advanced Security（GHAS）与 GitHub Enterprise 捆绑，提供与 Snyk Open Source 和 Snyk Code 大幅重叠的 SCA 和 SAST
              能力。随着 GitHub Enterprise 渗透率提升，Snyk 把免费层作为获客渠道的策略面临结构性逆风：在 GitHub Enterprise
              环境工作的开发者，已经拥有一个“足够好”的安全扫描器，且没有任何安装摩擦。Snyk 必须向控制采购的安全买方持续讲清楚自身在数据库质量、语言广度和 AI 准确率上的差异化，而不是只打动本来会自主选择 Snyk
              的个人开发者。
            calloutType: risk
            claimRefs:
              - CE015
              - CE021
          - type: callout
            title: AI 原生代码安全是下一场架构押注
            body: >-
              Snyk 对 Evo 和 Snyk Studio 的投入，代表一种判断：应用安全赛道将分叉。传统确定性 SAST/SCA 会商品化（GHAS、捆绑工具），而新的 AI 原生安全层——治理 AI 编码助手、AI
              智能体和基于非确定性 LLM 的应用——会创造一个现有厂商尚未准备好覆盖的高端层。这是一场高风险、高回报押注。Evo 仍处早期，AI 原生安全市场也尚未定义；但 Snyk 对开发者工作流的平台级访问，让它在 AI
              代码生成入口放置这些护栏时拥有结构性优势。
            calloutType: insight
            claimRefs:
              - CE007
              - CE028
              - CE029
  - number: 6
    title: 客户情况
    sections:
      - number: '6.1'
        title: 客户基础画像与分群
        blocks:
          - type: paragraph
            body: >-
              Snyk 的客户基础横跨企业软件生态，从免费层上的个人开源开发者，到管理数万个代码仓库的 Fortune 500 企业。截至 2024 年 12 月，Snyk 披露约 2,400 个付费客户、超过 200,000
              名免费开发者用户，年经常性收入（ARR）为 $300
              million——这清楚表明，产品驱动增长（PLG）动作能够完成商业转化。付费客户偏企业：Atlassian、Salesforce、MongoDB、Revolut、Komatsu、Skyscanner、Asurion、DigitalOcean
              和 TechnologyOne 构成公开具名层。垂直覆盖包括金融服务（Revolut）、旅游科技（Skyscanner）、云基础设施（DigitalOcean、MongoDB）、制造业（Komatsu）和 B2B
              SaaS（Salesforce、Atlassian）。地域上，Snyk 在北美和西欧最强；其进入 Singapore Government Technology Agency
              批准产品目录，说明亚太区存在增长势头。主要买方画像是 CISO 或应用安全负责人，但发现动作来自开发者。PLG 通过免费层推动初始采用，销售团队再向上销售带
              SSO、RBAC、审计日志和策略控制的企业许可证。渠道合作伙伴和系统集成商（Computacenter、global
              SIs）把覆盖面延伸到中端市场和受监管垂直行业。收入集中度是已知风险：相对于数千万级可触达开发者群体，2,400 个付费客户仍是一块相对窄的商业基础，头部企业账户队列对收入贡献很可能不成比例地大。
