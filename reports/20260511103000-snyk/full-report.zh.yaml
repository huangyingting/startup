      - number: '2.2'
        title: TAM、SAM 与 SOM —— 多口径测算 AppSec 机会
        blocks:
          - type: paragraph
            body: >
              AppSec 软件市场规模在不同分析机构之间分歧很大，核心原因是范围边界选择不同。Mordor Intelligence 估算 2026 年全球 AppSec 软件市场为 $14.83B，并以 13.64%
              CAGR 增至 2031 年 $28.11B；这是中位数附近的估计，排除独立 WAF 和网络安全，同时纳入 SCA、SAST、DAST、容器和 IaC 工具。Grand View Research 估计 2025
              年市场为 $10.65B，预计 2033 年达到 $42.09B、CAGR 为 18.8%，增速明显更快，主要由更宽泛的云原生安全纳入范围推动。The Business Research Company
              给出更激进的 2026 年 $20.75B，并以 25.4% CAGR 扩张至 2030 年 $51.35B。MarketsAndMarkets 报告最高的标题数字（2026 年 $41.16B），但其定义将
              WAF、API 网关、RASP 和专业服务与纯测试工具一并纳入，因此并不是 Snyk 纯软件 TAM 的可靠可比口径。

              对 Snyk 来说，相关 TAM 约为 2026 年 $13–16B（按 Mordor 和 GVR 中点估算的仅软件、开发者集成型 AST 工具）。SAM——Snyk 平台直接覆盖的开发者优先、CI/CD
              集成、SCA 加 SAST 细分市场——估计约为 $6–9B，约占软件 TAM 的 45–60%。这一估算由细分份额数据推导：SCA 约占收入 36%（由 Mordor 的 SAST 主导数据反推
              SCA），SAST 另占 36%，容器和 IaC 占其余部分；各细分中开发者优先份额约为 50–70%。Snyk 的 SOM——在当前分发能力、销售打法和 FedRAMP 授权下现实可获取的部分——估计约为
              $1–2B，意味着 3 年维度可拿下 SAM 的 15–25%；这与 Snyk 当前 $300M+ ARR、约 4–5% SAM 渗透率相符。

              需要强调若干限制：所有估计均依赖二级研究，且没有分析机构把「开发者优先 AppSec 测试」作为独立类别发布。AI 生成代码开发的转变，可能通过新增一整类 AI 代码安全买方，实质性扩大
              SAM。为暴露规模测算风险，Table TM002 和 Figure FM002 保留了彼此矛盾的估计。
