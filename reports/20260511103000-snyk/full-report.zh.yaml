      - number: '7.3'
        title: 技术与产品风险
        blocks:
          - type: paragraph
            body: >-
              Snyk 的技术风险主要压在三件彼此牵连的事上：误报疲劳、AI/ML 准确率上限，以及供应链安全悖论——安全供应商本身也是高价值攻击目标。

              在开发者安全工具里，误报疲劳是最核心的产品质量风险。SAST 或 SCA
              扫描器噪声过多——把实际不可达、已经缓解，或在具体上下文中严重性很低的漏洞也标出来——开发者就会开始忽略或压制所有告警，真正关键的问题也会被一起淹没。Snyk
              自己的服务条款明确排除对误报和漏报的责任，承认平台“无法发现并监控所有代码中的所有漏洞”。Gartner 行业研究确认，传统 SAST 工具会产生大量误报；Snyk Code 用 DeepCode AI
              引擎缓解这个问题。但 AI 生成的建议又引入一类新风险：AI/ML 漏报，即模型训练数据没有覆盖新的漏洞模式，安全问题被漏掉；以及修复建议中的 AI 幻觉，看似修补了已有漏洞，却可能引入新漏洞。

              覆盖缺口是结构性产品风险。Snyk 直到最近才通过收购 Probely 补上 DAST 能力（Snyk API & Web）。2024 年之前，Snyk 没有动态分析产品，相比 Veracode 和
              Checkmarx 留下一个重大的 AppSec 覆盖缺口。即便收购完成，DAST 集成成熟度仍低于 Snyk 核心的 SCA 和 SAST 产品。Snyk 自身基础设施的供应链风险是最严重的技术风险：如果
              Snyk 的 CLI、IDE 扩展（VS Code、JetBrains）或扫描引擎被攻破，每个客户的源代码都有可能暴露。Snyk
              作为处理客户源代码的可信中介，攻击面价值异常高；一次成功的供应链攻击会同时重创客户和 Snyk 的业务。

              Snyk 的漏洞情报数据库在 2024 年记录了 24,000+ 个新的 CVE 和非 CVE 漏洞，既是竞争壁垒，也是集中风险：一旦数据库被利用、篡改或拒绝服务，Snyk
              的核心扫描产品就会变得不可靠。该数据库也带来出口管制合规风险（见监管章节）。AI 原生竞争者（GitHub Copilot Autofix、Cursor AI 安全功能）带来新的产品替代风险：AI
              编码工具可以在代码生成时自行修复安全问题，可能完全削弱写完代码后的安全扫描需求。
