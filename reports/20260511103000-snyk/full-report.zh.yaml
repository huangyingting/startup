      - number: '6.3'
        title: 采用轨迹与部署深度
        blocks:
          - type: paragraph
            body: >-
              Snyk 的增长轨迹把高流量开发者漏斗和更窄但更深的企业商业层结合起来。VentureBeat 和 TechCrunch 均在 2024 年 12 月报道，Snyk 已达到 2,400+ 个付费客户和
              200,000+ 名免费开发者用户。$300 million ARR 数字（TechCrunch CEO 采访确认）意味着每个付费客户平均合同价值约
              $125,000，符合企业加权定价。具名账户的部署深度很高：Atlassian 的扫描量（每月 5.5M 次依赖 + 3.7M 次容器）和 Skyscanner 的 500+ 个被监控项目说明，采用 Snyk
              的客户往往会在代码仓库资产中大范围扩展覆盖。infoq.com 对 Snyk AppRisk（2024 年 3 月）的报道确认，企业正从单产品使用转向 AppRisk ASPM
              平台，从而形成更深的集成面和更高切换成本。Snyk 的定价模型从免费（200 tests/month）过渡到 Team（$25/developer/month）再到 Enterprise（协商）——PLG
              漏斗负责制造开发者需求，安全团队再把需求转为商业订阅。不过，TrustRadius 评论者社区指出，企业定价在规模扩大后会让较小组织难以承受，说明如果不调整价格模型，SMB 渗透自然有上限。
