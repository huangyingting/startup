      - number: '6.5'
        title: 扩张与集中度风险
        blocks:
          - type: paragraph
            body: >-
              Snyk 的先落地再扩张架构是主要增长引擎：客户先从 Snyk Open Source（SCA）开始，再随着安全项目成熟，加入 Snyk Code（SAST）、Snyk Container、Snyk IaC 和
              Snyk AppRisk。交叉销售和增购结构性嵌在平台逻辑里。不过，有几类集中度和风险动态需要尽调关注。第一，客户集中度：2,400 个付费客户贡献 $300M ARR，少数大型企业账户——很可能是按 ACV
              排名前 50 的账户——可能贡献了不成比例的收入份额。公开数据无法精确量化。第二，竞争替代风险：GitHub Advanced Security（GHAS）把 SCA 和 SAST 与 GitHub
              代码仓库以无额外成本捆绑，对 Snyk 核心产品形成直接定价压力。如果 GHAS 能力对齐度提升，使用 GitHub Enterprise 的企业客户可能有理由把 Snyk 从技术栈中剔除。第三，SMB
              流失：TrustRadius 和 TrustPilot 评论者持续指出，对少于 50 名开发者的组织，Snyk
              的企业定价成本过高。免费转付费转化率未知，超过免费层限制的小客户可能选择流失而非升级。第四，伙伴依赖：Snyk 通过 GitHub Marketplace、VS Code Marketplace
              和云厂商市场分发，依赖平台中介；这些中介可能改变条款、突出竞争产品，或降低发现流量。这些风险内生于 Snyk 的 PLG 模型，需要围绕队列流失、top-10 账户收入集中度和 GHAS 竞争替代赢单 /
              输单数据开展明确尽调。
