  - id: FE001
    title: Snyk 平台架构——从扫描到修复的流水线
    type: flow
    layout: wide
    summary: 代码如何进入 Snyk 扫描流水线，与 Snyk Intel DB 和 DeepCode AI 对照分析，完成风险打分，并路由到面向开发者的修复输出（修复 PR、IDE 建议、Jira 工单或 Evo 智能体编排）。
    data:
      nodes:
        - id: source-code
          label: 源代码 / IaC / 容器镜像
          description: 开发者编写的代码、开源依赖、IaC 配置和容器镜像，作为扫描输入
        - id: integration-layer
          label: 集成层（IDE / CLI / SCM / CI-CD）
          description: Snyk 集成层——VS Code 扩展、Snyk CLI、GitHub/GitLab/Bitbucket SCM 连接器、CI/CD 流水线插件——把代码送入 Snyk 扫描引擎
        - id: scan-engine
          label: 扫描引擎（Open Source / Code / Container / IaC）
          description: 四个并行扫描引擎分析不同代码工件类型，查找漏洞和配置错误
        - id: snyk-intel
          label: Snyk Intel 漏洞数据库
          description: 自研漏洞数据库，覆盖面是 NVD 的 3×；提供策划后的修复建议；92% JS 漏洞早于 NVD 披露；平均快 47 天
        - id: deepcode-ai
          label: DeepCode AI 引擎
          description: 符号分析 + 生成式 AI 混合，拥有 25M+ 数据流案例；支持 19+ 语言；可自托管；客户数据不进入训练；自动修复准确率 80%
        - id: apprisk-scoring
          label: AppRisk 风险打分
          description: 上下文优先级排序：EPSS + CVSS + 可达性 + 漏洞利用成熟度 + 业务影响 + 社交趋势 → 每条发现生成排序后的风险分
        - id: remediation-outputs
          label: 开发者修复输出
          description: 一键修复 PR（Open Source）、Agent Fix 行内建议（Code）、基础镜像升级（Container）、代码内修复建议（IaC）、Jira/ServiceNow 工单
        - id: evo-agentic
          label: Evo——智能体安全编排
          description: 面向 AI 原生应用的自主智能体修复和运行时保护（非确定性系统、LLM 智能体）；2025+
        - id: snyk-studio
          label: Snyk Studio——AI 编码护栏
          description: 注入 AI 编码助手（Copilot、Cursor、Windsurf）的安全内建护栏，阻止不安全代码生成
      edges:
        - from: source-code
          to: integration-layer
          label: 经由提交
        - from: integration-layer
          to: scan-engine
          label: 将工件路由到
        - from: scan-engine
          to: snyk-intel
          label: 查询 CVE / 漏洞匹配
        - from: scan-engine
          to: deepcode-ai
          label: 提交代码做 SAST 分析
        - from: snyk-intel
          to: apprisk-scoring
          label: 补充漏洞元数据
        - from: deepcode-ai
          to: apprisk-scoring
          label: 输入代码风险信号
        - from: apprisk-scoring
          to: remediation-outputs
          label: 排序后的发现路由到
        - from: apprisk-scoring
          to: evo-agentic
          label: 高风险发现升级到
        - from: integration-layer
          to: snyk-studio
          label: AI 编码助手护栏
    approximationNotes: 为清晰起见，流水线步骤经过简化。实践中，Open Source 和 Code 扫描通过 CLI 或 IDE 扩展并行运行。AppRisk 打分在 Snyk 平台 UI 中集中应用于所有扫描类型。
    claimRefs:
      - CE001
      - CE002
      - CE008
      - CE006
      - CE028
      - CE029
