      - number: '3.5'
        title: 竞争风险与尽调路径
        blocks:
          - type: paragraph
            body: >
              到 2026 年，Snyk 有五类竞争风险值得尽调重点跟进。第一，来自 GitHub（Microsoft）和 GitLab 的平台捆绑风险，在结构上最尖锐。对已经购买 GitHub Enterprise
              Cloud 的组织，GHAS 的 Code Security 按每位代码提交者每月 $30 计价，显著低于 Snyk 企业版按开发者收费。GitHub Copilot Autofix 继续进步后，可能追上
              Snyk 在 AI 修复上的价值主张，风险还会叠加。尽调路径：获取 Snyk 相对 GHAS 的赢单 / 输单数据，复核 GitHub 主导客户分群的净留存率（NRR）趋势，并评估有多少 Snyk 客户已把
              GHAS 作为并行工具引入。

              第二，来自 Wiz 和 Orca 的云安全平台扩张风险。两家公司都在企业云优先账户中快速增长，并向代码到云安全延伸，可能形成一条整合路径：CISO 选择 Wiz/Orca 覆盖云安全，再缩减 AppSec
              覆盖面，从而砍掉 Snyk Container 和 IaC 支出。尽调路径：复核拥有 >500 个云工作负载账户的销售管线数据；评估 Container/IaC SKU 相对核心 SCA/SAST 的流失或降购。

              第三，ASPM 整合风险：企业买方越来越多评估 ASPM 平台（Cycode、Apiiro、Checkmarx One 的 ASPM 层），把它们作为单一编排层来吸收多个 AST 工具的发现项——Snyk
              可能只是数据源，而不是主平台。如果 Snyk 在大型企业中被降格为“发现项数据源”，平均售价（ASP）的定价权和先落地再扩张空间都会明显削弱。尽调路径：分析客户合同结构，区分席位与仅 API
              集成；复核多厂商竞争账户。

              第四，来自开源和免费层的定价压力：Semgrep 的免费 OSS 层和 SonarQube Community Edition 以零成本提供开发者中心的 SAST 能力，在预算受限的中端市场账户中制造“免费
              vs. Snyk 付费”的对比。Mend.io 在 AI 时代功能上的竞争定位，也可能压低 Snyk 的 SCA 续约价格。尽调路径：复核 SMB 和中端市场分群的净留存率；评估续约队列的折扣趋势。

              第五，CEO 交接期的人才与创新执行风险：Snyk 2026 年 2 月 CEO 辞任，在关键 AI 投资周期制造组织不确定性。交接期间，如果产品路线图优先级变化，或关键工程人才流失，Snyk 的 AI
              驱动差异化（DeepCode AI、Evo 智能体编排）可能落后于领导层稳定、并在同类 AI 驱动 AppSec 功能上重投的竞争对手（Checkmarx One Assist、GHAS Copilot
              Autofix、Wiz AI agents）。
            claimRefs:
