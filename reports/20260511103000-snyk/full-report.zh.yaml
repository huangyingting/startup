      - number: '4.2'
        title: 财务表现与单位经济性
        blocks:
          - type: paragraph
            body: >-
              Snyk 的收入轨迹呈现强劲但放缓的增长，符合后期私有 SaaS 公司从超高速增长转向可持续扩张时的典型形态。按 Calcalist 引述的 UK Companies House 文件，Snyk 2024
              年已开票收入为 $278M（同比增长 26%），此前 2023 年为 $220M（增长 50%），2022 年隐含约 ~$147M（增长 157%）。三年内从 157% 降到 26%，既反映企业 SaaS 在后
              ZIRP 时代普遍承压，也反映 Snyk 从先落地再扩张的超高速增长，转向更审慎地扩张大合同企业账户。CEO Peter McKay 2024 年 12 月确认，月末 ARR 已超过
              $300M；由于多年期合同已承诺但尚未开票，ARR 会跑在已开票收入前面。

              据 Calcalist 报道，毛利率约 80%，符合纯软件 SaaS 模式，收入成本中没有显著硬件、专业服务或内容授权成本。这让 Snyk 位于网络安全 SaaS 毛利率第一梯队，可与
              CrowdStrike（~75%）和 Zscaler（~80%）相比。不过，经营亏损仍很大：2024 年 >$188M（高于 2023 年的 $176M，低于 2022 年 $267M 的峰值）。2023
              年经营亏损改善，来自三轮裁员后的成本纪律——2022 年 6 月（30 名员工）、2022 年 10 月（198 名员工 / 峰值员工数的 14%）、2023 年 4 月（128 名员工 / 剩余员工约
              11%）。三轮累计裁员约 355 人，相当于 2022 年 1,421 人峰值员工数的约 25%。到 2024 年底，员工数小幅恢复到 1,162 人。

              可观测的关键单位经济性指标包括：隐含每客户 ARR 约 $67,000-70,000（2024 年底 4,478 个客户贡献 >$300M ARR）；隐含人均收入约 $239,000（$278M / 1,162
              名员工）。客户数从 2023 年 3,917 增至 2024 年 4,478（同比 +14%），到 2025 年中超过 4,500（按 Snyk 新闻）。净留存率、获客成本、CAC 回本周期和 LTV
              均未披露，是投资者最核心的单位经济性尽调缺口。Snyk Code（SAST）到 2024 年 Q4 单品 ARR 已超过 $100M，验证了公司多产品 ARR 分散化策略。
