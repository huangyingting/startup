  - id: TE003
    title: 技术能力对比
    columns:
      - 能力
      - Snyk 做法
      - 典型竞品做法（GHAS / Checkmarx）
      - Snyk 优势 / 风险
    rows:
      - - 漏洞数据库
        - 自研 Snyk Intel DB；覆盖范围为 NVD 的 3×；人工整理修复建议；披露快 47 天；CNA 身份
        - 基于 NVD 或类似外部 DB，人工整理较少
        - 优势——情报更快、更丰富；风险——依赖单一供应商信任
      - - SAST 引擎
        - DeepCode AI（符号分析 + 生成式混合）；25M+ 数据流案例；自动修复准确率 80%；支持自托管；客户数据不用于训练
        - Semgrep 规则（GitHub）；基于模式的规则（Checkmarx）；GenAI 叠加层（多家）
        - 优势——自研 AI 且有隐私保证；风险——规模化后自动修复仍有 20% 错误率
      - - 自动修复 / 修复
        - 一键修复 PR（Open Source）；行内 Agent Fix（Code）；基础镜像升级（Container）
        - Dependabot 修复 PR（GHAS）；人工修复建议（多数其他厂商）
        - 优势——自动化修复覆盖的扫描类型最广
      - - 开发者体验
        - 免费层；CLI（npm、brew）；覆盖所有主流 IDE；AI 编码助手集成（Studio）
        - GHAS 随 GitHub 捆绑（无需额外安装）；其他工具需要企业级上线导入
        - 优势——采用路径最短；风险——GHAS 捆绑削弱免费层护城河
      - - 风险优先级排序
        - AppRisk 风险评分：EPSS + CVSS + 可达性 + 漏洞利用成熟度 + 业务上下文
        - 仅 CVSS 或基础严重性（多数工具）；GHAS 为部分语言加入可达性
        - 优势——在纯 AppSec 厂商中风险评分上下文最充分
      - - IaC 覆盖范围
        - Terraform、CloudFormation、ARM、Helm、K8s manifest；OPA 自定义策略；CIS 基准
        - Checkmarx KICS；GHAS 的 IaC 支持有限；Wiz 做云侧扫描
        - 优势——IaC 格式覆盖最广；OPA 可扩展到自定义合规要求
    claimRefs:
      - CE008
      - CE002
      - CE005
      - CE006
    notes: 竞品做法和优势主要来自 Snyk 营销材料以及 OWASP 对 SAST 局限性的文档。未找到独立第三方基准。所有 Snyk 能力主张均来自公司自身；这些方向性比较还需要独立验证。
