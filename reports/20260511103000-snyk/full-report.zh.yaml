  - number: 3
    title: 竞争格局
    sections:
      - number: '3.1'
        title: 竞争版图：直接、相邻与新兴对手
        blocks:
          - type: paragraph
            body: >
              截至 2026 年 5 月，Snyk 在五类相互重叠的竞争者中竞争。第一类是企业 AppSec 既有厂商：Veracode（TA Associates 退出后现由 Broadcom 持有）提供基于二进制的
              SAST/DAST/SCA，拥有 20+ 年企业渗透和 100+ 种支持语言；Checkmarx One 将 SAST、SCA、DAST、密钥检测和 ASPM 打包进单一平台，每月扫描超过 800 billion
              行代码，并受益于 Hellman & Friedman 深厚的企业分发网络。两家公司都扎根 Fortune 500 采购周期和合规中心化安全预算，正好与 Snyk 的开发者主导销售动作相反。

              第二类是 SCM 厂商的平台原生 AppSec：GitHub Advanced Security（GHAS）把 CodeQL 驱动的 SAST（代码扫描）、密钥扫描和依赖审查直接打包进 GitHub 仓库。截至
              2026 年，GHAS 对 Secret Protection 定价为每活跃提交者每月 $19，对 Code Security 定价为每活跃提交者每月 $30，显著低于 Snyk
              按开发者计费的企业层，并且对已经在 GitHub 上的约 100M 开发者几乎不需要额外集成工作。GitLab 的集成安全套件在 CI/CD 流水线中内建 SAST、DAST、容器扫描和依赖扫描，瞄准已标准化在
              GitLab Ultimate 上的组织。

              第三类是开源相邻挑战者：Semgrep（Semgrep Inc.，2022 年完成 $53M Series B）提供轻量、开发者中心的 SAST，带免费 OSS
              层和规则自定义能力，对工程主导的安全项目有吸引力。SonarQube/SonarCloud（Sonar 公司）服务全球超过 7 million 开发者，提供代码质量和安全分析，在 SAST 层与 Snyk
              Code 直接竞争。

              第四类是向代码侧延伸的云安全平台：Wiz（据称获得超过 50% 的 Fortune 100 公司信任）已从 CNAPP 扩张至 code-to-cloud 安全，把 SCM 仓库、CI/CD
              流水线和运行时云连接成统一安全图谱，直接挑战 Snyk 的 IaC 和容器扫描产品。Orca Security
              也提供无代理云原生应用保护，并具备代码级可达性分析。这些云原生厂商近期融资轮更大，企业销售组织也更强。

              第五类是 SCA / 供应链安全专家：Mend.io（原 WhiteSource）已重新定位，聚焦 AI 生成代码安全和软件成分分析；JFrog Xray 提供集成进 JFrog Artifactory
              二进制仓库平台的企业 SCA；Cycode 提供智能体应用安全平台，结合 AST、ASPM 和软件供应链安全；Apiiro 则提供基于风险的 ASPM，并深度集成 SCM 来量化代码风险。
