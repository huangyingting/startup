  - id: FU004
    title: 留存 / 重复购买队列
    type: cohort
    caption: 按客群估计 Snyk 付费客户在三年期内的队列留存率，模型依据 Sacra 的 NRR 估计（115–130%）、评论平台信号和企业安全工具行业基准。数值为方向性估计；Snyk 未公开披露队列留存数据。
    description: >-
      按客户细分估计的年度留存百分比。企业留存由深度 CI/CD 集成和合规驱动的粘性支撑。SMB 留存较低，原因是价格敏感度更高。免费转付费代表已升级的开发者；鉴于 PLG
      驱动账户流失更高、企业锁定更弱，模型给出较低留存率。所有数值均为估计；尽调应向管理层和一手文件获取实际队列数据。
