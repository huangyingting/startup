      - number: '2.5'
        title: 规模测算尽调缺口与相互矛盾的市场估计
        blocks:
          - type: paragraph
            body: >
              最大尽调缺口在于，没有已发布且可独立验证的市场规模数据专门对应开发者优先应用安全测试——也就是 Snyk 实际竞争的细分市场。现有分析报告要么使用宽泛的「Application Security」类别（包括
              WAF、RASP、托管服务和专业服务），要么使用较窄的「Application Security Testing」类别，但没有进一步拆出「开发者工具优先 AST」或「CI/CD 集成
              SCA+SAST」。因此，Snyk 的 SAM 计算是一项带有显著不确定性的推导估计。

              估计分散本身就是重要尽调问题：2026 年 AppSec 市场规模从 $10.65B（Grand View Research，仅软件）到
              $41.16B（MarketsAndMarkets，宽口径定义）不等，跨度达到 3.9x。这种分散不是噪音，而是真实边界分歧的结果。The Business Research Company 的 25.4%
              CAGR 和 2030 年 $51.35B 预测，口径看起来远宽于 Mordor 的 13.64% CAGR 和 2031 年 $28.11B 观点。若直接接受更宽的估计，将高估 Snyk 的 SAM 和
              SOM。这里同时保留两组估计，意在提示：在敲定规模测算投资论点前，尽调应获取 Gartner 或 Forrester 的一级分析师数据授权，并确保边界定义一致。

              其他待解问题包括：Snyk ARR 精确归属于各产品线的比例（SCA vs SAST vs Container vs IaC），这将支持自下而上验证 SAM 获取率；AI 代码加速对 AST
              工具使用量和按席位经济性的影响；以及由 EO 14028 和 DORA 推动的 SBOM 合规工具可服务市场，能否作为新的增长向量单独测算。$1–2B 的 SOM
              估计是前瞻性推导，不是管理层披露数字，只应作方向性参考。
            claimRefs:
              - CM003
              - CM004
              - CM017
              - CM018
              - CM028
