      - number: '1.3'
        title: 融资历史、估值与投资者基础
        blocks:
          - type: paragraph
            body: >
              自 2016 年 1 月 Seed 轮以来，Snyk 已完成约 17 轮融资、累计获得约 $1.32B，早期由 Boldstart Ventures 和 Canaan Partners 支持，后期引入 Qatar
              Investment Authority 等主权财富资本。公司的轨迹大体映射了 2020–2022 年后期企业软件经历的「增长—重估」周期。

              融资时间线从 2016 年 1 月 $3M Seed 开始，随后是 2018 年 3 月由 Boldstart Ventures、Canaan Partners 和 Heavybit 领投的 $7M Series
              A。2018–2019 年的 Series B 通过 Accel 和 GV（Google Ventures）分两批引入约 $93.7M。2019 年 12 月由 Stripes 和 Tiger Global
              领投的 $150M Series C，让 Snyk 以 $1B 估值首次成为独角兽。2020 年 9 月由 Addition Capital 和 Accel 领投的 $200M Series D，在 COVID
              推动云采用提速的背景下将估值推至 $2.6B。2021 年 3 月的 Series E（$175M，估值 $4.7B）以及 2021 年 9 月标志性的 Series F（$530M，估值 $8.5B，由
              Sands Capital 和 Tiger Global 联合领投），使 Snyk 成为全球估值第二高的风投支持网络安全公司，仅次于 Lacework。

              Series F（$530M）由超过 $300M 新股资本和约 $230M 员工及早期投资者老股交易组成。参与方包括 Baillie Gifford、Koch Strategic Platforms、Lone
              Pine Capital、T. Rowe Price、Whale Rock Capital Management、Accel、Addition、Alkeon、Atlassian
              Ventures、BlackRock、Boldstart Ventures、Canaan、Coatue、Franklin Templeton、Geodesic Capital、Salesforce
              Ventures 和 Temasek。CEO Peter McKay 当时表示，该轮融资让 Snyk 有能力在 2022 年末或 2023 年初上市。

              2022 年 12 月由 Qatar Investment Authority 领投的 Series G（$196.5M）构成一次实质性重估：$7.4B 投后估值较 Series F $8.5B 峰值下降
              12.9%，Snyk 也成为唯一公开披露为换取融资而下调估值的主要网络安全厂商。ServiceNow 之后在 2023 年 1 月进行了 $25M 战略投资，2024 年 4 月又有一轮未披露投资者的 $25M
              融资。按 CEO 说法，截至 2024 年 12 月，公司现金为 $435M，2024 年经营亏损 $188M，目标是在 2025 年底前实现现金流盈亏平衡。

              截至 2026 年 5 月，Snyk 最近一次披露估值仍为 $7.4B（2022 年 12 月）。公司曾在 2024 年初起草 IPO 计划（The Information 称其向 SEC
              秘密提交招股书），但公开信号显示，若市场条件和 CEO 交接允许，公司更偏好 2026 年作为 IPO 窗口。
