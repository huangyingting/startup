      - number: '1.5'
        title: 里程碑、规模与负面事件
        blocks:
          - type: paragraph
            body: >
              Snyk 从一家扎根伦敦 / 特拉维夫的开源扫描创业公司，成长为全球开发者安全平台。其路径由产品快速扩张、战略收购、资本市场里程碑，以及 2022–2023 年艰难的运营收缩共同塑造。

              产品层面的关键发布包括 Snyk Container（2019）、Snyk IaC（2020）和 Snyk Code（2021），其中 Snyk Code 建立在 2020 年 9 月收购 DeepCode
              之上。Snyk 于 2021 年收购 FossID，补充 C/C++ 许可证合规能力。2022/2023 年，公司收购 Helios（云原生可观测性，以色列创业公司，Calcalist 称约 $2.9M）和
              Enso Security（约 $32.7M），后者提供应用安全态势管理。2024 年，Snyk 收购总部在葡萄牙、开发者优先的 DAST 公司 Probely，并推出 Snyk API & Web。2025
              年，Snyk 收购 Invariant Labs 以加速智能体 AI 安全，并推出智能体安全编排平台 Evo。

              规模层面，ARR 从 2018 年约 $4M 增至 2024 年 12 月估计 $300M+。Sacra 估计公司截至 2026 年 2 月 ARR 为 $326M。2024 年开票收入达到 $278M，较
              2023 年增长 26%，较 2021 年 150% 的 ARR 增长和 2023 年 50% 的收入增长明显减速。客户数从 2023 年底的 3,917 家增至 2024 年底的 4,478 家，增长
              14%。公司 2024 年底员工 1,162 人，较 2023 年的 1,028 人小幅增加。

              2022–2023 年的负面阶段影响显著。2022 年 6 月至 2023 年 4 月三轮裁员共终止约 355 名员工，约占峰值约 1,400 名员工的 25%；最后一轮 128 人裁员发生在 2023 年 4
              月，距离 Series G 融资完成仅四个月。裁员与大额融资相距过近，引发行业批评。与此同时，2022 年 12 月 Series G 以 12.9% 估值折价完成（$7.4B vs $8.5B），使 Snyk
              成为唯一公开披露以估值下调换取现金的主要网络安全厂商。2026 年 2 月，CEO Peter McKay 宣布辞任，并寻找一位「AI-immersed」继任者；在公司和更广泛 AI
              安全市场均处关键拐点时，这是一项重要领导层交接。

              认可类里程碑包括：Forbes Cloud 100（2021）、CNBC Disruptor 50（2021），以及最重要的 2025 年 Gartner Magic Quadrant for
              Application Security Testing 领导者称号，扭转了 2022 年 Challenger 的定位。FedRAMP Moderate
              Authorization（2024）则是公司最重要的监管合规里程碑。
