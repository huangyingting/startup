      - number: '7.4'
        title: 监管与法律风险
        blocks:
          - type: paragraph
            body: >-
              Snyk 面临多层监管风险，横跨数据隐私、联邦采购授权、出口管制，以及多个司法辖区的开源许可责任。

              GDPR 合规是持续性的运营要求。Snyk 处理来自欧盟客户的源代码，代码、配置文件或测试数据里可能嵌入个人身份信息。英国信息专员办公室（ICO）和欧盟数据保护机构依据 GDPR 以及英国脱欧后的 UK GDPR
              监管这类处理。Snyk 维护一份数据处理附录（DPA），覆盖符合 GDPR 的数据处理；但这些保护是否充分、向美国数据中心跨境处理代码是否合法，仍会随着 Schrems II 判决后续和 EU-US Data
              Privacy Framework 的发展继续变化。

              Snyk 并未把 HIPAA 合规列为标准产品——其服务条款明确禁止客户向服务上传“健康或金融信息”，这让使用 Snyk 保护处理受保护健康信息（PHI）代码的医疗软件公司出现缺口。该排除项可能限制 Snyk
              在受监管医疗和金融服务垂直领域的可服务市场。

              Snyk 2024 年取得 FedRAMP Moderate 授权，这是重要合规里程碑，使其可以向美国联邦机构销售。不过，FedRAMP 授权不是永久的——它要求持续监控、年度评估；如果 Snyk
              的安全态势恶化，也可能被撤销。授权范围也仅限 Moderate 影响级别；Snyk 尚未声称取得最敏感联邦工作负载所需的 FedRAMP High 授权。EAR（Export Administration
              Regulations）下的出口管制可能适用于 Snyk
              漏洞情报数据库，因为其中包含可被利用漏洞的详细技术信息。向全面禁运司法辖区的实体分享该数据库，可能违反美国出口管制法；服务条款明确禁止来自受美国全面禁运国家的使用。

              开源许可证合规责任是 SCA 产品的内生风险：如果 Snyk 错误识别许可证、漏报许可证不兼容，或对 copyleft 义务给出错误指引，客户可能承担知识产权责任。Snyk
              条款排除了对许可证分析准确性的责任。截至 2026 年 5 月，公开来源未发现针对 Snyk 的重大诉讼；SEC EDGAR 没有 Snyk Ltd（CIK
              0001824657）的公开文件显示存在未决诉讼或监管行动。不过，Snyk 是私营公司，重大诉讼可能被密封，或发生在非美国司法辖区，公开渠道看不到。Snyk 声称的 SOC 2 Type II
              认证提供了一定合规保证，但并不等同于监管授权。
