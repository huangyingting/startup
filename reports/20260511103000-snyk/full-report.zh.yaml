  - id: TP001
    title: 竞争格局——Snyk 的直接、相邻和新兴竞争对手（2026）
    notes: >-
      融资数字为近似值，基于公开披露；Hellman & Friedman 收购 Checkmarx 的交易价值和 Mend.io 更名后的估值未获公开确认。标注“估计”的 ARR /
      收入估计来自第三方来源推断。覆盖范围不完整——精品渗透测试公司和 MSSP 未纳入。来源：厂商网站 SP001–SP012、Tracxn SP027、Gartner SP014，访问时间 2026 年 5 月。
    columns:
      - 竞争对手
      - 类别
      - 主要产品
      - 融资 / 阶段
      - 关键优势
      - 相比 Snyk 的关键弱点
    enumeration: true
    enumerationScope:
      coverage: partial
      basis: >-
        Covers the 12 most-cited AppSec competitors across direct (SCA/SAST), adjacent (CNAPP), and nascent (ASPM)
        categories as of May 2026. Based on Gartner AST Magic Quadrant 2025, Tracxn competitive mapping, and
        vendor-published positioning. Does not include boutique pen-testing firms or MSSPs.
    evidenceGap: >-
      Funding figures for Checkmarx (Hellman & Friedman PE buyout) and Mend.io post-rebrand valuation are not publicly
      disclosed; GitLab Security financials are only partially disclosed as part of consolidated GitLab results.
    rows:
      - - Veracode (Broadcom)
        - 企业 AppSec——SAST/SCA/DAST
        - 二进制 SAST + SCA + DAST 平台
        - 已被收购——Broadcom / PE 持有；20+ 年老牌厂商
        - 20+ 年企业渗透；支持 100+ 种语言的二进制 SAST；9 项 Forrester Wave 满分
        - 传统代理式工作流；开发者原生 UX 弱；无免费层；创新较慢
      - - Checkmarx
        - 企业 AppSec——SAST/SCA/ASPM
        - Checkmarx One——SAST、SCA、DAST、ASPM、密钥
        - PE 支持（Hellman & Friedman）；收入估计 $800M+
        - 平台宽度；每月扫描 800B 行代码；ASPM 编排；企业销售强
        - 历史上不如 Snyk 适合开发者；定价复杂；PE 所有权限制 R&D 投入
      - - GitHub Advanced Security (GHAS)
        - SCM 平台原生 AppSec
        - CodeQL SAST + 密钥扫描 + 依赖审查
        - GitHub Enterprise 每位活跃提交者每月 $30 附加费
        - 零集成摩擦；Microsoft 支持；Copilot Autofix AI 修复；依托 GitHub 的巨大分发
        - 无容器安全；无 IaC 扫描；SCA 深度有限；漏洞情报库较弱
      - - GitLab Security
        - SCM 平台原生 AppSec
        - CI/CD 中集成 SAST/DAST/SCA/容器/IaC
        - 上市公司（GTLB）；包含在 GitLab Ultimate 层
        - 原生 CI/CD 集成；单一平台；Ultimate 用户无需按席位附加费
        - 局限于 GitLab 生态；成熟度不及专用 AppSec 工具；漏洞情报较弱
      - - Semgrep
        - 开发者优先 SAST 挑战者
        - 轻量级 SAST，可自定义规则引擎
        - ~$53M 融资（2022 年 Series B）；私有公司
        - 免费 OSS 层；以开发者为中心；规则快速且可自定义；社区增长快
        - 漏洞情报浅；无 SCA、容器或 IaC；企业治理功能有限
      - - SonarQube / SonarCloud
        - 代码质量 + SAST
        - 带安全检测的静态分析
        - 私有（Sonar 公司）；已盈利；7M+ 开发者用户
        - 7M+ 开发者用户；SOC 2 Type II；代码质量 + 安全合一；免费 Community Edition
        - 漏洞修复深度较弱；无 SCA、容器、IaC；漏洞库不够全面
      - - Wiz
        - 云安全（CNAPP 向代码扩展）
        - CNAPP + code-to-cloud 安全图
        - 融资 >$1.9B；估值 $12B+（2024 轮）
        - 获 50%+ Fortune 100 信任；统一云 + 代码安全图；云运行时上下文更强
        - 并非开发者原生（仍以 CSPM/CNAPP 为主）；SCA 和 SAST 深度不及 Snyk
      - - Orca Security
        - 云安全（CNAPP）
        - 无代理 CNAPP，带代码可达性
        - $550M+ 融资；后期私有公司
        - 无代理部署；3 类可达性分析；声称减少 90% 告警噪音
        - 主要聚焦云态势；代码层 SCA/SAST 不够深；无开发者 IDE 集成
      - - Aqua Security
        - 容器 / 云原生安全
        - 容器镜像扫描、运行时保护、Kubernetes 策略
        - ~$265M 融资；私有公司
        - 容器运行时安全很深；基于 eBPF 的传感器；云原生运行时检测
        - 主要在运行时 / 容器层；代码层 SAST/SCA 深度不及 Snyk
      - - Mend.io（原 WhiteSource）
        - SCA / AI 安全
        - SCA + AI 行为测试 + AI-BOM + 运行时保护
        - 私有公司；2022 年更名；ARR 估计 $100M+
        - 1000+ 并发 AI 攻击模拟；AI-BOM；对抗式 AI 测试；聚焦供应链
        - 品牌认知较弱；开发者生态比 Snyk 窄；SAST 能力不够成熟
      - - JFrog Xray
        - SCA / DevOps 平台
        - 集成在 Artifactory 二进制仓库中的 SCA
        - 上市公司（FROG）；ARR $350M+（JFrog 合并口径）
        - 4M+ OSS 包数据库；深度集成 Artifactory；恶意包检测；二进制扫描
        - 生态锁定在 JFrog Artifactory；无 SAST；IDE 工作流较 Snyk 有限
      - - Cycode / Apiiro
        - ASPM / 代码风险
        - 智能体 ASPM，带 AST + 供应链安全
        - Cycode：~$80M 融资；Apiiro：~$100M 融资；均为私有公司
        - 跨多个 AST 工具的 ASPM 编排；基于风险的优先级排序；Gartner 认可的领导者
        - 平台仍早期；依赖第三方 AST 扫描器（包括 Snyk）作为数据源；企业规模有限
