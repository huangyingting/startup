      - number: '8.3'
        title: 可比公司分析
        blocks:
          - type: paragraph
            body: >-
              截至 2026 年 5 月，公开可比公司的 ARR 倍数跨度很大，差异来自增长率、毛利率、盈利路径和市场对平台耐久性的判断。高端区间里，CrowdStrike（CRWD）按约 21x 往绩 ARR 交易，对应
              FY2026 ARR 约 $4.2B，支撑因素是 20%+ 收入增长，以及 120% 以上的同类最佳净收入留存。Palo Alto Networks（PANW）按约 23x 下一代安全 ARR 交易，对应
              $5.1B；其平台化战略推动 NGS 快速增长，即使总收入增速在放缓。

              中端区间，GitLab（GTLB）按约 12x ARR 交易，对应 FY2025 ARR 约 $740M，收入增长 25%+，单位经济性也在改善。考虑 Snyk
              的增长画像，这些公司构成其倍数的现实上限。低端区间，Qualys（QLYS）按约 4x ARR 交易，对应 $500M ARR，反映低于 10% 的增长；Rapid7（RPD）按约 2x ARR 交易，对应
              $800M，受竞争定位被挑战和待定战略审查拖累。

              把这些倍数套到 Snyk 估算 $326M ARR 上，可比公司区间约为 $0.65B（2x Rapid7 地板）到 $7.5B（23x PANW 天花板）。用适用于中等增长安全 SaaS 的 8–12x
              区间作为可辩护的中枢，得到 $2.6–3.9B。Snyk 的 7% ARR 增长更接近 Qualys，而非 CrowdStrike；在缺乏重新加速证据时，4–8x 倍数区间才是最诚实的锚。私募市场 M&A
              提供下限：TPG 以约 $1.1B 收购 Checkmarx（$300M ARR，约 3.5x ARR），设定了可信的下行基准。
