        - 索取全成本 S&M 费用拆分；用新增客户数与 S&M 支出推导 CAC；计算回本周期
      - - 自由现金流（FCF）和 EBITDA
        - 未披露（2024 年经营亏损 >$188M）
        - 高 —— 经营亏损不含 SBC（可能 $30–70M+）、D&A 和营运资本；FCF 可能显著不同
        - 索取 GAAP 现金流量表；将经营亏损与经营活动现金流出调节；识别 SBC 和资本开支
      - - 分部收入拆分（按产品线）
        - Snyk Code ARR：$100M（已确认，2024 年 Q4）；总 ARR：>$300M；剩余 ~$200M+ 拆分未披露
        - 中 —— 产品集中度和交叉销售率影响战略风险与增购逻辑
        - 索取按产品划分的 ARR（Open Source、Code、Container、IaC、AppRisk、API & Web）；确认各 SKU 贡献利润率
      - - 完整股权结构表和清算优先权堆叠
        - 已知投资方：QIA、Accel、Tiger Global、Sands Capital、Stripes、ServiceNow；完整优先权未披露
        - 高 —— 最近一轮估值 $7.4B、累计融资约 $1.32B；若退出估值低于 $1.32B，清算优先权可能抹去普通股权益
        - 索取备考股权结构表，并在 $4B、$6B、$8B、$10B+ 退出情景下做清算优先权分析
      - - 按收入线划分的毛利率（SaaS vs. 服务）
        - 披露为混合约 80%；SaaS 与服务拆分未披露
        - 中 —— 服务收入拉低混合毛利率；理解纯 SaaS 毛利率对长期 P&L 关键
        - 索取按分部划分的 GAAP 毛利润；确认服务成本归因与产品工程成本的边界
      - - 股权激励费用（SBC）
        - 未披露；该阶段 SaaS 典型水平：每年 $30–80M
        - 中 —— SBC 推高非现金经营亏损；调整后 EBITDA（剔除 SBC）与同业更可比
        - 索取按职能划分的 SBC 费用（R&D、S&M、G&A）；确认期权归属时间表和价外期权敞口
    notes: >-
      本表所有缺口反映截至 2026 年 5 月公开来源无法取得的信息。其中多项指标通常会由临近 IPO 的公司在 S-1 文件中披露；缺失这些数据，为投资者制造了重大信息不对称。解决这些缺口需要 NDA 级财务尽调或 IPO
      招股说明书。
    claimRefs:
      - CI035
      - CI036
