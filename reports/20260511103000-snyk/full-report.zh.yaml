      - number: '8.4'
        title: 情景分析与折价因素
        blocks:
          - type: paragraph
            body: >-
              截至 2026 年 5 月，Snyk 的合理估值区间可由三种情景框住；每种情景都取决于对 ARR 增长重新加速、IPO 时点和市场情绪的不同假设。

              熊市情景（$1.3–1.6B，4–5x ARR）假设：增长到 2027 年流动性事件前仍维持 6–8% 年增速，没有明显重新加速；CEO 空缺继续拖延战略执行；M&A 退出按 Checkmarx
              先例倍数定价。在这个水平，早期投资人相对峰值约减记 80%，2021 轮二级买家则深度亏损。

              基准情景（$2.6–3.3B，8–10x ARR）假设：2026 年上半年任命新 CEO，ARR 增长到 FY2027 重新加速至 15–20%，Snyk 在 2027 年以符合中等增长 SaaS
              同业的公开市场倍数完成 IPO 或战略收购。该情景下，以较 $8.5B 锚点折价 60–70% 进入的投资人，可能在 3–4 年持有期获得 1.5–2x 回报。

              牛市情景（$4.9–6.5B，15–20x ARR）要求 AI 原生产品转向显著抬升 NRR，ARR 增长重新加速到 25% 以上，并在有利窗口 IPO，使开发者安全平台获得溢价倍数。Wiz 在约 $500M+
              ARR 上达到 $12B 估值，说明强增长的私营安全 SaaS 可以维持溢价倍数，可作为愿景上限。

              压缩可比公司区间的折价因素包括：私募市场流动性不足（20–30% 折价）、未经审计财务带来的信息不对称（5–10%），以及没有董事会代表的少数股权地位（5–10%）。叠加后，这些因素支持相对可比公开公司隐含价值打
              35–50% 的私募市场折价。
