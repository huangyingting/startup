      - number: '1.6'
        title: 图表
        blocks:
          - type: callout
            title: 开发者优先平台叠加 AI 顺风
            body: >-
              Snyk 的开发者优先分发模式——用免费增值 CLI 推动自下而上采用——在多数既有厂商意识到开发者画像之前，就建立了耐久竞争护城河。McKay 估计，AI 生成代码扩散后会带来 30–40% 更多漏洞；Snyk
