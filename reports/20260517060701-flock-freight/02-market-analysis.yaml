callouts:
  - calloutType: insight
    title: STL Addresses Real and Independently Verifiable Shipper Pain
    body: >
      The 86% LTL damage rate (Flock's 2022 survey) and documented delivery-window compliance
      failures for Amazon FBA sellers (FreightWaves, independently reported) point to genuine buyer pain.
      If Flock can independently validate its utilization and damage metrics, the STL value proposition —
      cost savings, damage reduction, emissions improvement — maps precisely to enterprise ESG and
      supply-chain efficiency mandates accelerating in 2025–2026. The e-commerce tailwind is real and
      independently confirmed through industry media coverage.
    claimRefs: [CM002, CM004, CM019, CM024, CM025]

  - calloutType: risk
    title: No Independent STL Market Size Creates Speculative Valuation Anchor
    body: >
      The complete absence of any independently published STL market-size estimate is a material diligence
      gap. Flock's entire TAM framing is self-constructed and unverified; investors relying on it risk
      overpaying relative to a smaller-than-represented SAM. The Convoy failure demonstrates that even
      well-capitalized digital brokers can underestimate freight-cycle risks and unit-economics fragility.
      Without independent market data and audited financials, any STL market size figure must be classified
      as speculative. Diligence should commission independent freight market research before relying on
      Flock's sizing claims.
    claimRefs: [CM014, CM032, CM037]

  - calloutType: risk
    title: Freight Broker Margin Compression Is a Real-Time 2026 Signal
    body: >
      JB Hunt ICS's 330-basis-point gross margin decline in 2025–2026, reported by FreightWaves, is a
      concurrent adverse signal for the entire freight brokerage sector. Flock's STL differentiation may
      provide partial insulation from pure commodity-rate compression, but the structural forces — carrier
      negotiating power, shipper procurement leverage, spot-contract spread dynamics — apply broadly to
      digital brokers. Diligence should request Flock's net revenue margin by quarter since 2022 to determine
      whether the company is margin-expanding or contracting in the current environment.
    claimRefs: [CM030, CM031, CM034]

