  evidenceGaps:
    - type: missing-source
      severity: blocking
      topic: STL market size and independent validation
      missingEvidence: >
        No independent analyst report, government statistic, or trade association publication
        quantifying the total US STL market size was accessible during research. No public
        CAGR estimate for the STL sub-segment is available. All sizing estimates are derived
        from proxy data or Flock's own unverified claims. No independently published digital
        freight brokerage penetration data was found.
      whyItMatters: >
        Without an independent market size estimate, Flock's TAM claims cannot be validated,
        making valuation comparables speculative. The SAM and SOM framing in this chapter is
        necessarily approximate and should not be used as a primary valuation input without
        independent corroboration. The absence of a CAGR creates a blind spot in forecasting
        Flock's growth ceiling relative to market expansion.
      diligencePath: >
        Commission independent freight market research from freight-specific firms such as
        Armstrong & Associates or SJ Consulting Group; conduct primary shipper interviews to
        estimate STL penetration; request Flock's internal market-sizing methodology and source
        data; access CHRW investor day presentations and third-party TL/LTL market reports
        not publicly accessible during this research.
      relatedQuestionRefs: [QM001, QM003, QM007, QM008]

    - type: private-evidence-only
      severity: material
      topic: Flock Freight revenue quality and spot-contracted mix
      missingEvidence: >
        Flock does not publicly disclose its net revenue, gross revenue, gross margin, spot
        versus contracted freight mix, customer cohort data, or load volume by segment.
        Without these metrics, revenue quality, cycle resilience, and true SAM penetration
        cannot be assessed from public sources.
      whyItMatters: >
        Revenue mix (spot vs. contracted) is highly material to cycle risk: spot-heavy
        brokers suffer disproportionately in freight downturns as seen in 2022–2023.
        Customer cohort data would reveal whether Flock's enterprise adoption is growing or
        plateauing. Without this data, the buyer segmentation analysis relies entirely on
        Flock's own marketing characterizations.
      diligencePath: >
        Request quarterly management accounts showing net revenue, gross margin per load,
        spot/contracted mix, customer count by segment, and load volume since 2021 Series D
        close from Flock Freight investor relations.
      relatedQuestionRefs: [QM022]

    - type: missing-source
      severity: informational
      topic: Carrier-side economics and churn at Flock
      missingEvidence: >
        No independent validation of Flock's claimed 25% carrier revenue premium per haul
        was found in public sources. Carrier retention rates, driver satisfaction data, and
        any carrier-side competitive comparison are absent from public record.
      whyItMatters: >
        Carrier economics are the supply-side foundation of Flock's platform. If the 25%
        premium is not sustained under margin compression, carrier supply quality and
        capacity commitment to STL lanes could deteriorate, undermining the pooling model.
      diligencePath: >
        Request independent carrier survey data or third-party carrier satisfaction reports;
        compare Flock's carrier pay rates to DAT rate benchmarks and CHRW carrier program
        rates; interview active Flock carriers during due diligence.
      relatedQuestionRefs: [QM027]

acknowledgedWarnings:
  - dimension: figureType
    reason: "FM001 uses type 'range' instead of the planned acceptedType 'pyramid' because 'pyramid' is not a supported figure type in the report schema. The range type fulfills the planned figure's TAM/SAM/SOM requirement by displaying nested sizing layers with low/base/high bounds, providing equivalent information in a schema-valid format."

  - dimension: unverifiedSource
    reason: "Four key metrics cited in this chapter — 50% truck under-utilization (CM002), 99.8% damage-free rate (CM003), 86% LTL damage survey (CM004), and 25% carrier revenue premium (CM021) — are sourced exclusively from Flock's own marketing materials without independent corroboration. All four are marked low or medium confidence and typed as company-claimed. Diligence should verify these figures with carrier interviews and shipper data."

  - dimension: paywallRisk
    reason: "Some FreightWaves articles and industry data sources may require registration or subscription access; all core market data points from these sources are corroborated by open government sources (BTS, FHWA, FRED, ATA) or public-company filings (SEC EDGAR, CHRW investor relations). No paywalled-only facts are cited without independent corroboration from accessible sources."
