  evidenceGaps:
    - type: private-evidence-only
      severity: high
      topic: "Core financial metrics — revenue, gross margin, burn rate, unit economics"
      missingEvidence: >-
        Flock discloses no revenue (gross or net), GMV, EBITDA, burn rate, or unit economics.
        All financial inferences rely on funding-round signals and competitor benchmarks.
      whyItMatters: >-
        Without these metrics, equity underwriting is not possible. The margin thesis, capital adequacy
        assessment, and valuation are all speculative until confirmed by management-provided data.
      diligencePath: >-
        Request audited income statements for FY2023-2025, monthly management accounts for the last 12
        months, product-line P&L, and burn/runway as of Series E close.
      relatedQuestionRefs: [QI003, QI007, QI011, QI022]

    - type: conflicting-data
      severity: medium
      topic: "Series E valuation signal versus recovery narrative"
      missingEvidence: >-
        The $60M Series E at an implied lower valuation conflicts with the company's narrative of
        freight market recovery and growth. Independent revenue data post-2022 is unavailable.
      whyItMatters: >-
        Determines whether the Series E was a down round (negative signal) or strategic capital at
        fair value (neutral). Affects cap table structure, investor preferences, and exit economics.
      diligencePath: >-
        Request Series E term sheet; compare pre-money valuation against $1.4B Series D; review
        investor composition for signal on strategic vs. financial investor rationale.
      relatedQuestionRefs: [QI019]

    - type: stale
      severity: medium
      topic: "Post-2023 traction and revenue recovery trajectory"
      missingEvidence: >-
        All available revenue proxy data (triple-digit growth claim, GMV estimate) dates to 2021.
        No independent source confirms Flock's current revenue level, load volume, or customer count.
      whyItMatters: >-
        The freight market has partially recovered since 2023. Flock's actual current performance
        relative to the 2021 baseline is unknown and essential for any forward valuation.
      diligencePath: >-
        Request monthly load volume, active customer count, and GMV for 2024 and 2025 from management;
