callouts:
  - calloutType: risk
    title: "Revenue Opacity Is the Primary Underwriting Blocker"
    body: >-
      Flock discloses zero financial data. Without audited revenue, gross margin, burn rate, and unit
      economics, equity pricing is speculative. The 2022-2023 layoffs confirm the model is exposed to
      freight cycle downturns, and the Series E implied valuation haircut signals investor caution.
      Any investment decision requires management accounts covering at least FY2023-2025 as a precondition.
    claimRefs: [CI016, CI011, CI012, CI013]

  - calloutType: insight
    title: "Asset-Light Model Eliminates Capex Risk"
    body: >-
      Unlike XPO ($8.2B revenue, large fleet) or ODFL ($5.5B, owned terminals), Flock holds no trucks,
      trailers, or warehouses. Capital requirements are bounded to technology, talent, and working capital
      float — a structurally favorable profile that limits downside in freight market downturns and
      preserves capital efficiency if the STL margin thesis is validated.
    claimRefs: [CI033, CI035, CI036, CI037, CI039]

  - calloutType: assumption
    title: "STL Margin Premium Is Structurally Plausible but Empirically Unverified"
    body: >-
      The assumption that STL commands a net revenue margin above the 9-15% CHRW/RXO broker range
      is structural — pooling creates bilateral value, enabling margin expansion. However, no public
      source confirms Flock's actual gross margin. Diligence must verify whether the STL premium
      survives competitive pressure, carrier rate negotiation, and spot market cycles before underwriting
      the margin thesis.
    claimRefs: [CI006, CI019, CI020, CI021, CI022]

