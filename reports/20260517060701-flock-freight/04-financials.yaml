artifact: financials
slug: flock-freight
runDate: "2026-05-17"
company:
  name: "Flock Freight"

chapter:
  number: 4
  title: "Financials"
  summary: >-
    Flock Freight operates an asset-light STL brokerage model earning margin between shippers and
    carriers with no owned assets. As a private company it discloses no revenue, EBITDA, or unit
    economics; financial inference draws on funding-round signals, CHRW/RXO public comps, layoff
    evidence, and structural analysis. The $60M Series E (Oct 2023) at an implied valuation haircut
    versus the 2021 $1.4B Series D reflects post-downturn investor caution; the asset-light model
    eliminates capex risk but leaves key underwriting inputs — GMV, gross margin, burn rate — opaque.

sections:
  - id: s1
    title: "Revenue Model and Pricing"
    body: >-
      Flock Freight operates as an asset-light freight broker across three revenue streams:
      Shared Truckload (STL), Full Truckload (FTL), and Managed Transportation. STL is the
      core innovation — shippers pay for the trailer space they actually use rather than
      booking a full trailer, while Flock's AI pools compatible shipments onto a single
      carrier. Flock acts as principal in each transaction, billing shippers at a quoted
      rate and paying carriers a negotiated rate, retaining the spread as gross revenue. STL
      pricing is typically quoted 20-35% below equivalent FTL rates, a savings proposition
      that drives shipper adoption while Flock captures a pooling premium. FTL brokerage
      follows standard spot/contract pricing benchmarked against DAT trendlines. Managed
      Transportation charges an estimated 2-5% management fee on freight spend or a fixed
      monthly retainer for ongoing program management. The STL AddOns product, launched
      circa 2024-2025, layers premium services — temperature control, liftgate, guaranteed
      transit — onto the base STL offering, creating higher-margin upsell revenue with low
      marginal delivery cost and increased switching friction for shippers.
    claimRefs: [CI001, CI002, CI003, CI004, CI023, CI024, CI025]
    tableRefs: [TI001, TI002]
    figureRefs: [FI001]

  - id: s2
    title: "Unit Economics and Margin Structure"
    body: >-
      Flock's unit economics are not publicly disclosed. Industry proxy analysis using
      publicly-filed comparable data shows that digital freight brokers typically achieve
      net revenue margins (gross profit as percent of gross revenue) of 8-18%. C.H.
      Robinson (CHRW) — the largest US freight broker — reported FY2025 total revenues of
      $16.2 billion with consolidated net revenue of approximately $1.46 billion, implying
      a ~9% blended net margin rate. RXO, an asset-light TL broker spun from XPO in
      November 2022, operates in the 12-15% range for TL brokerage. Flock's STL model has
      a structural argument for higher gross margins than pure spot TL brokerage: pooling
      captures efficiency value for both shippers and carriers, enabling Flock to retain a
      premium that neither party alone could achieve. The 58% trucks-half-empty finding
      (2024 Flock study) confirms the market-scale inefficiency this model addresses.
      However, actual margin magnitude is unverifiable without management disclosure.
      Technology costs for AI/ML load-matching are an ongoing OPEX investment; carrier
      acquisition costs are low-marginal in dense lanes but include non-trivial onboarding
      and compliance overhead. Enterprise Managed Transportation accounts carry higher CAC
      (est. 3-6 month sales cycle) but stronger LTV than transactional spot loads.
    claimRefs: [CI005, CI006, CI019, CI020, CI021, CI022]
    tableRefs: [TI003]
    figureRefs: [FI002]

  - id: s3
    title: "Capital Adequacy and Funding Position"
    body: >-
      Flock Freight's complete funding chronology is detailed in the Company Overview
      chapter. This chapter focuses on capital adequacy and forward runway. Flock raised
      $60 million in Series E financing in October 2023, bringing total disclosed funding
      to approximately $395 million. The Series E followed nearly two years after the $215
      million Series D (October 2021) — a gap during which the 2022-2023 freight market
      downturn compressed margins and triggered layoffs in late 2022 and early 2023.
      The $60 million Series E, relative to the $1.4 billion Series D-era valuation,
      implies a substantial valuation haircut — an adverse signal on investor confidence
      in near-term profitability. With cost structure reduced post-layoffs and freight
      market recovery beginning in 2024, an estimated 18-30 month runway existed as of
      late 2023, placing Flock's next potential capital event in mid-2025 to late 2025.
      Flock has disclosed no debt, credit facility, or project finance obligations. The
      asset-light model eliminates equipment financing risk; working capital exposure is
      limited to load-settlement float (carrier payment timing vs. shipper collections).
      Series E investor identities and economic terms beyond the $60M headline are not
      publicly disclosed.
    claimRefs: [CI007, CI008, CI009, CI010, CI011, CI012, CI013, CI014, CI026, CI027, CI028, CI029]
    tableRefs: [TI004]
    figureRefs: [FI003]

  - id: s4
    title: "Public Traction and Revenue Proxies"
    body: >-
      Flock does not publicly disclose revenue, GMV, load volume, customer count, or
      EBITDA. The strongest available proxy is the 2021 triple-digit growth claim paired
      with the $1.4 billion Series D valuation, implying a 2021 revenue run-rate in the
      range of $300-500 million GMV under freight brokerage multiples (typically 0.5-2.0x
      gross revenue). Post-2022 freight market contraction, digital brokers broadly
      experienced 15-25% revenue declines; Flock's layoffs in late 2022 and early 2023
      corroborate similar pressure. The 2024 Impact Report published by Flock highlights
      environmental metrics — trucks removed, emissions saved — but omits financial
      figures. The February 2025 BusinessWire study showing 58% of truckloads moved more
      than half-empty provides indirect evidence of scale and ongoing research investment.
      No independent source corroborates Flock's current revenue level, GMV trajectory,
      or customer count.
    claimRefs: [CI015, CI016, CI017, CI018, CI030, CI031, CI032]

  - id: s5
    title: "Financial Verdict and Diligence Blockers"
    body: >-
      Flock's financial model is structurally compelling — asset-light, no capex, STL
      premium margin thesis, growing carrier network. Revenue quality risk is high given
      the transactional, spot-rate-sensitive nature of STL/FTL brokerage, as demonstrated
      in the 2022-2023 downturn. Managed Transportation offers more predictable revenue
      but its proportional contribution is unknown. Comparable analysis confirms brokerage-
      only models operate at thin margins at scale: CHRW at ~9% net margin, RXO at est.
      12-15%. Flock's STL premium may carve out a higher-margin niche, but magnitude and
      sustainability require first-party data to validate. Key underwriting blockers are:
      (1) no disclosed revenue or GMV; (2) no disclosed gross margin or EBITDA;
      (3) no confirmed burn rate or current cash position; (4) no disclosed Series E
      investor identities, terms, or pro-rata rights; (5) no CAC, LTV, or payback period
      data. Each input is essential for pricing equity risk.
    claimRefs: [CI033, CI034, CI035, CI036, CI037, CI038, CI039, CI040, CI041]
    tableRefs: [TI005]
    figureRefs: [FI004]

