company:
  name: "Flock Freight"

chapter:
  number: 5
  title: "Product & Technology"
  summary: >-
    Flock Freight's product suite is anchored on its patented Shared Truckload (STL) platform —
    an AI-powered freight pooling engine that matches compatible shipments onto shared trailers,
    eliminating empty miles and reducing shipper costs by an estimated 20-35% vs. FTL. The platform
    operates as an asset-light multi-tenant SaaS-adjacent system with a web portal, API, and
    Managed Transportation TMS wrapper. Flock holds the first-ever US patent for STL matching,
    creating a defensible IP position reinforced by lane-density network effects and a growing
    proprietary data asset; however, the core tech stack, reliability metrics, and integration
    breadth are not publicly disclosed.

sections:
  - id: s1
    title: "Product and Service Definition"
    body: >-
      Flock Freight delivers an integrated freight services platform covering three primary service
      lines and an expanding set of premium add-ons. From a shipper's perspective, the core
      workflow is: enter shipment details (origin, destination, dimensions, weight, timing) →
      receive an instant quote for trailer space on a shared or full truckload → book, track, and
      settle the shipment through a single portal. For carriers, Flock delivers fully-loaded
      trailers via pooling — improving utilization relative to the industry average of over half-
      empty loads. The customer experience abstracts the complexity of carrier matching, pooling
      optimization, and settlement into a single-platform interaction. Flock positions itself not
      as a broker but as a technology-driven freight network that enables a new load type — the
      Shared Truckload — that previously did not exist as a standardized product.
    claimRefs: [CE001, CE002, CE003, CE034, CE035]
    tableRefs: [TE002]
    figureRefs: [FE002]

  - id: s2
    title: "Product Module Map"
    body: >-
      Flock's product suite comprises six distinct modules or service lines. Shared Truckload (STL)
      is the founding and patented product — the first standardized pooled-truckload offering with
      a dedicated US patent. Full Truckload (FTL) brokerage extends Flock's reach to full-trailer
      needs and monetizes the network for lanes where pooling is not available. Managed
      Transportation wraps STL and FTL into an enterprise freight program management service,
      including TMS-layer optimization, reporting, and carrier management. STL AddOns is a premium
      services overlay launched circa 2024-2025, enabling shippers to add temperature control,
      liftgate, inside delivery, and guaranteed transit commitments to base STL bookings. The Flock
      Platform is the technology product itself — the shipper-facing web portal and API layer. The
      Carrier Network is the supply-side asset: a vetted pool of trucking partners with
      standardized onboarding, compliance, and performance tracking. These modules collectively
      address the full shipper workflow from transactional spot loads to enterprise freight
      programs.
    claimRefs: [CE004, CE005, CE006, CE007, CE008, CE009, CE025, CE037]
    tableRefs: [TE001]
    figureRefs: [FE001]

  - id: s3
    title: "Platform Architecture and Technology"
    body: >-
      Flock's core technology is an AI/ML load-matching engine that identifies compatible
      shipments for pooling in real time. Compatible shipments share origin-destination lane
      pairs, compatible transit timing, and physical compatibility (dimensions, fragility,
      temperature). The platform's pricing engine generates instant quotes for shippers using
      lane density data, real-time capacity signals, and historical rate benchmarks. The
      architecture operates as a multi-tenant system: shippers access the portal or API, the
      matching engine operates in a middle layer, and the carrier dispatch system interfaces with
      trucking partners via EDI/API for tendering and tracking.

      Flock's data layer is a growing proprietary asset: each lane-pair booked accumulates
      historical rate, timing, and carrier performance data that improves future matching
      precision and strengthens the pricing engine. The company received recognition as a
      finalist for the 2022 SAP Innovation Awards, confirming enterprise TMS integration
      capability. Career page signals indicate the engineering team focuses on optimization
      algorithms, real-time carrier integrations, and data infrastructure — consistent with
      a high-performance logistics matching platform. The specific tech stack is not publicly
      disclosed; no public GitHub repository or open-source contributions from Flock were
      identified.
    claimRefs: [CE010, CE011, CE012, CE013, CE014, CE015, CE016, CE023, CE024, CE027, CE038, CE040, CE041]
    tableRefs: [TE003]
    figureRefs: [FE003]

  - id: s4
    title: "Differentiation and IP"
    body: >-
      Flock's principal differentiation is its US patent for the shared truckload matching
      methodology — the first and only such patent in the industry as of the filing date. The
      patent covers the algorithmic process of identifying and pooling compatible freight onto
      shared trailers, giving Flock a defensible legal barrier against direct replication of the
      STL model. This IP position is reinforced by two self-compounding advantages. First,
      network effects: more shippers per lane → more pooling opportunities → better rates and
      transit precision → more shipper adoption. Second, data accumulation: each STL booking
      contributes to a proprietary lane, rate, and carrier performance dataset that incumbents
      without the STL load type cannot replicate. The CEO has stated that Flock's AI was
      purpose-built for STL — not adapted from LTL terminal logic or standard load-board
      matching — making the differentiation structural rather than incremental. The B Corp
      certification adds a secondary differentiation layer for sustainability-conscious shippers.
    claimRefs: [CE017, CE018, CE019, CE020, CE021, CE022, CE026, CE031, CE039]
    tableRefs: [TE005]
    figureRefs: [FE004]

  - id: s5
    title: "Trust, Compliance, and Quality Controls"
    body: >-
      Flock holds a Federal Motor Carrier Safety Administration (FMCSA) freight broker license —
      the mandatory federal authorization for all US freight brokers. FMCSA licensing requires a
      $75,000 surety bond, financial fitness requirements, and compliance with federal broker
      regulations including transparency on carrier selection and payment. Flock vets all carriers
      admitted to its network for safety ratings, insurance compliance, operating authority, and
      performance history. B Corp certification confirms that Flock meets minimum environmental
      and social governance standards, verified by B Lab's independent third-party audit.

      No public disclosure of SOC 2 Type II, ISO 27001, or other enterprise cybersecurity
      certifications was found as of May 2026. Flock operates no warehouses or cross-docking
      facilities — all freight handling remains on-carrier, limiting operational quality risk
      to carrier selection and compliance. No regulatory actions, lawsuits, or FMCSA enforcement
      proceedings against Flock Freight were identified in public sources.
    claimRefs: [CE028, CE029, CE030, CE031, CE032, CE033, CE042]
    tableRefs: [TE004]

