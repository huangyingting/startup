  evidenceGaps:
    - type: private-evidence-only
      severity: high
      topic: "Platform transaction volume, lane coverage, and operational metrics"
      missingEvidence: >-
        Flock does not disclose load volume, lane coverage depth, transaction throughput, or
        utilization rates. These metrics are essential for validating the network effects thesis
        and understanding the platform's actual operational scale.
      whyItMatters: >-
        If lane density is insufficient in key geographies, the pooling premium collapses and
        the STL model reverts to a thin-margin spot freight play. Volume and density data are
        critical for validating the moat.
      diligencePath: >-
        Request monthly load volume by product line (STL/FTL/MT), lane pair coverage map,
        pooling success rate (% of STL loads actually pooled), and utilization trends 2022-2025.
      relatedQuestionRefs: [QE006, QE014, QE021]

    - type: missing-source
      severity: medium
      topic: "STL algorithm performance in thin lanes and adverse conditions"
      missingEvidence: >-
        No independent benchmark, technical audit, or third-party assessment of Flock's
        AI matching quality exists publicly. Performance in low-density lanes, seasonal
        capacity crunches, or extreme weather events is unverified.
      whyItMatters: >-
        Algorithm quality directly determines whether Flock can deliver STL at acceptable
        service levels across its lane network. Failures in thin lanes could drive customer
        attrition and carrier dissatisfaction.
      diligencePath: >-
        Request technical review of matching algorithm design, lane quality metrics (pooling
        failure rate by lane), SLA metrics, and post-shipment customer satisfaction data.
      relatedQuestionRefs: [QE022]

    - type: enumeration-incomplete
      severity: low
      topic: "TMS / ERP integration breadth beyond SAP"
        
      missingEvidence: >-
        Only SAP TMS integration is publicly confirmed (2022 Innovation Award). Integration
        with Oracle Transportation Management, Manhattan Associates, BluJay (now e2open),
        or other major enterprise TMS platforms has not been publicly disclosed.
      whyItMatters: >-
        Enterprise managed transportation customers typically standardize on one TMS.
        If Flock's integration roster is limited to SAP, market access for other enterprise
        segments is constrained.
      diligencePath: >-
        Request list of certified TMS integrations; ask for reference customers using each
        integration; verify integration depth (read-only vs. bidirectional execution).
      relatedQuestionRefs: [QE024]

