callouts:
  - calloutType: strength
    title: "Patented STL + Network Effects = Structural Moat"
    body: >-
      Flock holds the only US patent for the STL matching methodology — legal protection that
      prevents direct replication. Combined with lane-density network effects and a proprietary
      data asset that grows with each booking, this creates a compounding moat. Competitors must
      either work around the patent or build from zero without the lane density advantage.
    claimRefs: [CE017, CE018, CE020, CE021, CE022]

  - calloutType: risk
    title: "Tech Stack Opacity and Undisclosed Reliability Metrics"
    body: >-
      Flock does not publish technical architecture, reliability metrics, SLA, or cybersecurity
      certifications. No SOC 2 Type II or ISO 27001 certifications were found. Enterprise
      shippers with third-party risk programs may require these for procurement. The absence of
      a public developer community, API documentation, or GitHub presence limits developer-side
      diligence signal.
    claimRefs: [CE027, CE032, CE038, CE041]

  - calloutType: assumption
    title: "STL Algorithm Quality Is Plausible but Unaudited"
    body: >-
      The claim that Flock's AI is purpose-built for STL and structurally superior to incumbents
      is stated by management and inferred from the patent, but has not been independently
      validated. No benchmark, third-party audit, or academic publication corroborates the
      algorithm's performance claims. Diligence should include a technical review of the matching
      engine's accuracy on low-density lanes where pooling is hardest.
    claimRefs: [CE019, CE020, CE038]

