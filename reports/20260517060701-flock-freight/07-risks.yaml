callouts:
  - calloutType: risk
    title: "Freight Market Cyclicality Is a Demonstrated Business Risk"
    body: >-
      The 2022-2023 freight downturn triggered two rounds of layoffs and a significantly
      smaller Series E, demonstrating that Flock's revenue is highly sensitive to macro
      freight conditions. STL's structural advantage over FTL may compress in soft markets
      when FTL spot rates fall to near-STL levels. The company's lack of public financial
      metrics makes it impossible to independently verify how much the downturn impacted
      revenue or whether the recovery is complete.
    claimRefs: [CR027, CR028, CR030, CR031]

  - calloutType: risk
    title: "Technology Opacity Prevents Full AI, Cybersecurity, and Platform Risk Assessment"
    body: >-
      Flock discloses no algorithm quality metrics, cybersecurity certifications, SLA,
      uptime history, or DRP. This opacity is unusual for a SaaS-adjacent platform handling
      mission-critical freight bookings for enterprise shippers. An undiscovered algorithm
      bug or a cybersecurity incident could materially disrupt operations and customer
      relationships without any public visibility.
    claimRefs: [CR009, CR013, CR014, CR015]

  - calloutType: insight
    title: "STL Patent Is Dual-Use: Moat and Target"
    body: >-
      The STL patent creates a near-term legal barrier that competitors cannot easily
      circumvent. However, the existence of a pioneering patent in a large market also
      makes Flock an attractive IPR target for well-resourced incumbents (CHRW, J.B. Hunt,
      XPO) who may challenge its validity. Patent defense is expensive and uncertain.
    claimRefs: [CR003, CR007, CR036]

