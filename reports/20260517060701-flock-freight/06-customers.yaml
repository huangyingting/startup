callouts:
  - calloutType: risk
    title: "Full Customer Opacity — No Named References, NRR, or Churn Data"
    body: >-
      Flock discloses no customer names, no retention metrics, and no customer count. No G2,
      Capterra, or Gartner Peer Insights reviews exist. Customer proof is limited to unnamed
      aggregate references in press materials. This opacity is a material diligence risk —
      investors cannot independently verify shipper adoption, retention, or satisfaction.
    claimRefs: [CU015, CU020, CU021, CU026]

  - calloutType: risk
    title: "Freight Downturn Contraction — Layoffs and Reduced Series E Signal Churn"
    body: >-
      Two rounds of layoffs in late 2022 and early 2023, combined with a Series E significantly
      smaller than the prior round, indicate customer volume contraction during the freight
      market downturn. Recovery trajectory and whether pre-downturn customer volume was recovered
      by 2025-2026 is unverified.
    claimRefs: [CU010, CU011, CU025]

  - calloutType: strength
    title: "STL Category Monopoly Drives Natural Acquisition — Shippers Must Use Flock"
    body: >-
      Flock holds the only US patent for STL matching. Shippers who specifically want the STL
      product type — pooled, door-to-door, with no terminal handling — must choose Flock or a
      far smaller alternative. This creates a structurally advantaged acquisition position in
      the STL category that doesn't exist for commodity freight brokers.
    claimRefs: [CU037, CU039]

