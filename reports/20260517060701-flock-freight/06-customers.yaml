  evidenceGaps:
    - type: private-evidence-only
      severity: high
      topic: "Named customer list and customer proof — TU003 remains partial-coverage"
      relatedTableRefs: [TU003]
      missingEvidence: >-
        Flock publishes no named customer list, case studies, or attributed testimonials.
        TU003 (Named Customer Proof Table) can only be populated with anonymous segment
        references from press materials; no independently verifiable named customer exists
        in the public record.
      whyItMatters: >-
        Absence of named customers prevents investors from conducting reference checks,
        verifying shipper satisfaction independently, or understanding concentration risk
        by customer. It also limits the ability to validate whether Fortune 500 relationships
        are strategic commitments or low-value transactional interactions.
      diligencePath: >-
        Request a reference customer list (at least 3-5 named accounts willing to speak);
        ask for case studies with quantified cost savings; confirm at least 1 Fortune 500
        customer willing to provide an on-record reference.
      relatedQuestionRefs: [QU006]

    - type: private-evidence-only
      severity: high
      topic: "Customer count, load volume, and gross revenue trajectory"
      missingEvidence: >-
        Flock discloses no shipper customer count, annual load volume, or gross revenue at any
        point in its history. These are the foundational metrics for validating shipper adoption
        at scale. Without them, the 'largest STL provider' characterization cannot be independently
        corroborated.
      whyItMatters: >-
        Customer count and revenue trajectory determine whether Flock's market position is
        genuine scale leadership or a relative claim in a small category. It also anchors
        the customer concentration analysis and retention estimates.
      diligencePath: >-
        Request monthly active shipper count by product line (STL/FTL/MT), quarterly gross
        revenue 2020-2026, load volume trend, and top-5 customer % of gross revenue. Validate
        recovery timeline post-2022-2023 downturn.
      relatedQuestionRefs: [QU002, QU008, QU023]

    - type: missing-source
      severity: medium
      topic: "Customer retention metrics and Managed Transportation adoption data"
      missingEvidence: >-
        No public NRR, GRR, churn rate, customer satisfaction score, or MT customer count
        has been disclosed. The structural retention analysis (high for MT, low for spot STL)
        is a framework estimate only — actual cohort data does not exist publicly.
      whyItMatters: >-
        Retention drives sustainable valuation; a platform with low spot STL repeat rates
        and slow MT conversion would have fundamentally different unit economics than the
        land-and-expand thesis implies. Without retention data, the revenue quality is opaque.
      diligencePath: >-
        Request GRR and NRR by product line; MT enrollment growth rate 2022-2026; average
        contract length for MT; spot STL cohort repeat booking rate at 90-day and 12-month
        marks. Request NPS or CSAT data if available.
      relatedQuestionRefs: [QU010, QU019]

