runDate: "2026-05-17"
company:
  name: "Flock Freight"

chapter:
  number: 6
  title: "Customers"
  summary: >-
    Flock Freight serves US shippers in manufacturing, CPG, retail, and distribution who regularly
    move palletized freight on consistent lanes — the addressable pool for STL pooling. The company
    claims Fortune 500 enterprise relationships and has been characterized by FreightWaves as "quietly
    becoming the largest STL provider" by 2024, implying meaningful shipper scale. Critical gaps
    undermine full diligence: no public customer count, NRR, churn, or named customer list exists.
    The 2022-2023 freight downturn triggered layoffs and a smaller Series E ($60M vs $215M Series D),
    signaling a period of customer volume contraction. Recovery trajectory into 2025-2026 is
    unverified. Customer concentration, retention, and satisfaction remain the largest unknown
    dimensions in this chapter.

sections:
  - id: s1
    title: "Customer Segments and Buyer Profile"
    body: >-
      Flock's primary customer segment is the mid-market to enterprise shipper that regularly moves
      palletized freight on consistent US domestic lanes. The STL model targets shipments that are
      too large for standard LTL (where terminal handling introduces damage and transit time risk)
      but that do not fill a full trailer — roughly 6-20 pallet equivalents per move. Three
      industries are most directly addressable: manufacturing (automotive parts, electronics,
      industrial goods), consumer packaged goods (food and beverage, household products,
      pharmaceuticals), and retail/distribution (direct-to-DC freight for retailers and
      e-commerce fulfillment operators).

      A secondary segment is the sustainability-focused enterprise shipper — companies with Scope 3
      emissions reporting obligations under evolving US and EU regulations who seek freight vendors
      that reduce transportation emissions. Flock's B Corp certification and emphasis on empty-mile
      reduction directly address this need. Flock's Managed Transportation product targets enterprise
      freight managers who want to consolidate multiple freight modes (STL + FTL) under a single
      managed program with TMS integration and performance reporting. American Airlines Ventures
      participated in Flock's Series D as a strategic investor — notably in an investor, not
      shipper, capacity — demonstrating strategic alignment without direct customer proof.
    claimRefs: [CU001, CU002, CU003, CU004, CU005, CU006, CU019]
    tableRefs: [TU001]
    figureRefs: [FU001]

  - id: s2
    title: "Adoption Trajectory and Market Position"
    body: >-
      Flock's adoption trajectory is characterized by strong early growth through 2021 (Series D
      at $1.4B valuation), a significant contraction during the 2022-2023 freight market downturn
      (layoffs in November 2022 and January 2023), and a partial recovery through 2024-2025. By
      2024, FreightWaves described Flock as "quietly becoming the largest STL provider" — implying
      dominant category share in a freight segment Flock itself created. However, the specific
      shipper count, shipment volume, and revenue trajectory are not publicly disclosed.

      Transport Topics' annual ranking of the 50 largest US freight brokers and Armstrong &
      Associates' companion list do not explicitly include Flock in their top tier, suggesting
      total gross brokerage revenue is below the $1B threshold typical of top-50 firms — but this
      is consistent with Flock's positioning as a specialist STL platform rather than a
      full-service freight brokerage. Truckstop.com data and McKinsey analysis of the freight
      brokerage market indicate the sector has $100B+ in gross revenue potential, providing a
      substantial shipper pool for Flock to convert from LTL and FTL alternatives.
    claimRefs: [CU007, CU008, CU009, CU010, CU011, CU012, CU033, CU035]
    tableRefs: [TU002]
    figureRefs: [FU002]

  - id: s3
    title: "Named Customer Proof and Evidence Quality"
    body: >-
      Flock does not publish a named customer list, case studies, or customer testimonials on its
      public website as of May 2026. No customer was named in public media coverage reviewed
      during this diligence. The Series D press release (October 2021) referenced "Fortune 500
      companies and regional manufacturers" but without naming any specifically. The 2024 Impact
      Report describes Flock's shipper network in aggregate terms — sustainability outcomes,
      emissions reductions, and network activity — without naming customers. No public reviews
      on G2, Capterra, or Gartner Peer Insights were found.

      The highest-quality customer-adjacent evidence comes from: (1) the Series E press release
      ($60M, October 2023), which implicitly confirms revenue-generating customer relationships
      given investor scrutiny of growth metrics; (2) FreightWaves coverage of shipper experience
      in STL, which quotes unnamed shippers describing the STL value proposition; and (3) Flock's
      2024 Impact Report confirming an active shipper network with measurable sustainability
      outcomes. Customer identity is fully opaque, representing a significant diligence gap for
      investor due diligence teams.
    claimRefs: [CU015, CU016, CU017, CU018, CU020, CU026]
    tableRefs: [TU003]
    figureRefs: [FU003]

  - id: s4
    title: "Retention, Durability, and Satisfaction"
    body: >-
      Flock has not disclosed any customer retention metrics — no NRR, GRR, churn rate, contract
      renewal rate, or Net Promoter Score is publicly available. Structural analysis of the product
      suite suggests two distinct retention profiles. Enterprise Managed Transportation customers,
      who have integrated Flock's TMS layer with SAP or equivalent ERP systems, face high switching
      costs and likely exhibit long-term retention. In contrast, transactional STL spot shippers
      have no switching cost — they can move to any freight broker or back to LTL after a single
      booking — creating inherent churn risk in the spot segment.

      The November 2022 and January 2023 layoffs, occurring during a broad freight market downturn,
      imply reduced shipper volume and revenue. The Series E at $60M (October 2023) — considerably
      smaller than the Series D's $215M — further suggests either revenue contraction or lower
      investor confidence. Flock's 2024-2025 product moves (STL AddOns, Guaranteed STL) are
      consistent with an effort to increase revenue per customer and create retention through
      premium service lock-in rather than volume growth.
    claimRefs: [CU021, CU022, CU023, CU024, CU025, CU040]
    tableRefs: [TU004]
    figureRefs: [FU004]

  - id: s5
    title: "Expansion Drivers and Concentration Risk"
    body: >-
      Flock's land-and-expand motion operates in three stages: win shippers on STL spot bookings
      (low friction entry) → convert to regular STL program → add AddOns and upgrade to Managed
      Transportation (high switching cost). This progression increases both revenue per customer
      and retention. The STL AddOns overlay (2024-2025) and Guaranteed STL product are explicitly
      designed to expand revenue from existing customers, consistent with an NRR expansion play
      on the installed base.

      Customer concentration risk cannot be quantified — no public disclosure of top-customer
      revenue share exists. Freight brokerage is inherently concentration-sensitive: smaller
      platforms with below-$500M gross revenue typically have high concentration in the top 5-10
      customers. The Managed Transportation product mitigates concentration risk by creating
      long-term enterprise relationships, but the proportion of revenue from MT vs. transactional
      STL/FTL is undisclosed. Flock's main competitive threats to customer retention come from
      CHRW, RXO, and Coyote, each of which has managed transportation capabilities, deeper
      carrier networks, and stronger brand awareness in enterprise procurement.
    claimRefs: [CU027, CU028, CU029, CU030, CU031, CU032, CU037, CU041]
    tableRefs: [TU005]

