callouts:
  - calloutType: strength
    title: STL Patent as Category-Defining Moat
    body: >-
      Flock holds the first and only US patent on shared truckload matching, granted January 2022. No other
      freight broker or digital platform has demonstrated an equivalent patent-protected STL matching
      capability. This creates a defensible moat that justifies a meaningful premium to commodity freight
      broker multiples and positions Flock as an attractive strategic acquisition target for major freight
      platforms seeking to enter or expand in the STL segment.
    claimRefs: [CV027]

  - calloutType: risk
    title: Preference Overhang and Revenue Opacity Dominate Risk Profile
    body: >-
      The combination of $395M in total funding (likely structured with liquidation preferences) and zero
      publicly disclosed financial metrics creates a severe risk concentration. In a bear-case exit below
      $400M EV, common equity holders likely receive nothing. The Convoy shutdown (October 2023, $900M
      raised, zero common recovery) is the closest precedent in the digital freight brokerage space and
      must be treated as a realistic downside scenario until confirmed revenue scale and positive operating
      trajectory are publicly disclosed.
    claimRefs: [CV016, CV031]

