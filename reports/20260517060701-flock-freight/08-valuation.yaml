      gross revenue of approximately $300 million. The chart illustrates that the 2021 unicorn valuation of
      $1.4B requires approximately 4.5 to 5x gross revenue, a peak multiple that demands confirmed category
      leadership and strong revenue growth to justify. The current public comp range (CHRW 0.65x, RXO 1.5x)
      frames the bear-to-base range of $200M to $450M EV, with the STL patent premium supporting a 2.0 to
      3.0x base of $600M to $900M.
    approximationNotes: >-
      All values in millions USD. Estimated gross revenue of $300M is a midpoint estimate; Flock has not
      publicly disclosed revenue. Multiples benchmarked against CHRW (0.65x), RXO (1.5x), and private
      platform comps. 2021 unicorn round implies approximately 4.5 to 5x forward gross revenue.
