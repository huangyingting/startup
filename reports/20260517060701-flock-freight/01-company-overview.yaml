callouts:
  - calloutType: strength
    title: Pioneer and Patent Holder in Shared Truckload
    body: >
      Flock Freight is the only company in the US with a granted patent for shared truckload pooling methodology,
      creating a defensible IP moat. Combined with first-mover scale, the brand recognition of FlockDirect® among
      enterprise shippers, and the Convoy bankruptcy validating STL over pure digital brokerage, Flock appears
      to occupy a durable position in the STL niche.
    claimRefs:
      - CO031
      - CO032
      - CO002

  - calloutType: risk
    title: Four-Year Funding Gap Signals Potential Capital Stress or Exit Pivot
    body: >
      As of May 2026, Flock has not announced a post-Series D funding round (now ~4.5 years). With freight market
      conditions normalizing below 2021 peaks and comparable peer (Convoy) having shut down, the absence of a
      subsequent round raises questions: is Flock cash-flow positive, approaching IPO, or facing
      down-round pressure? The $1.4B Series D valuation likely requires significant verification.
    claimRefs:
      - CO022
      - CO033
      - CO034

  - calloutType: insight
    title: Strategic Investor Syndicate Provides Both Capital and Commercial Moats
    body: >
      The combination of SoftBank (capital scale), American Airlines Ventures (commercial validation), GV
      (technology credibility), and Volvo Group Venture Capital (carrier network) creates a multi-dimensional
      strategic moat beyond pure financial backing. This syndicate structure suggests Flock was positioning
      for platform expansion, not just organic freight brokerage growth.
    claimRefs:
      - CO018
      - CO019
      - CO020
      - CO021

