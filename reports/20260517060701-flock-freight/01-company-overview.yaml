company:
  name: Flock Freight

chapter:
  number: 1
  title: Company Overview
  summary: >
    Flock Freight is a San Diego-based technology-enabled freight brokerage that pioneered the Shared Truckload (STL)
    shipping category through its proprietary FlockDirect® algorithm, enabling multiple shippers to pool compatible
    freight on a single non-stop truck. Founded in 2015 by CEO Oren Zaslansky, the company raised $215M in Series D
    funding in October 2021 at a $1.4B valuation and is self-described as the largest STL freight brokerage in the US,
    with B Corp certification and GLEC-compliant sustainability reporting reinforcing a differentiated brand position.

sections:
  - id: identity-business-model
    title: Identity and Business Model
    body: >
      Flock Freight operates as a technology-enabled freight brokerage specializing in Shared Truckload (STL),
      a shipping mode it claims to have pioneered and which the company trademarked under the FlockDirect® brand.
      Founded in 2015 and headquartered in San Diego (originally Encinitas), California, the company's core thesis
      is that mid-size freight shipments — too large for traditional Less-Than-Truckload (LTL) but too small to
      fill an entire truck — can be efficiently pooled with compatible shipments traveling the same corridor,
      creating a non-stop, hub-free route. This eliminates the multiple terminal touch-points inherent in LTL,
      reducing damage rates, transit times, and carbon emissions. The company's official site claims that STL
      delivers an average 20% cost saving versus truckload and reduces carbon emissions by up to 40% compared to
      LTL. Flock serves enterprise shippers primarily in consumer goods, retail, and manufacturing sectors,
      offering FlockDirect® (STL), full truckload (FTL) brokerage, and managed transportation services. The
      platform integrates with Transportation Management Systems (TMS) including e2open and Oracle OTM,
      enabling seamless adoption by large logistics operations. Revenue flows from per-shipment fees charged to
      shippers net of carrier costs, a gross-margin brokerage model common across digital freight intermediaries.
      Flock achieved B Corp certification with a score of 80.3 (versus a median of 50.9 for ordinary businesses),
      anchoring a sustainability-first brand that resonates with ESG-conscious enterprise procurement teams.
    claimRefs:
      - CO001
      - CO002
      - CO003
      - CO004
      - CO005
      - CO006
      - CO007
      - CO008
      - CO009
      - CO010
    tableRefs:
      - TO001
    figureRefs:
      - FO002

  - id: leadership-governance
    title: Leadership and Governance
    body: >
      Flock Freight was founded by Oren Zaslansky, who serves as CEO and is the company's primary public face.
      Zaslansky is a serial entrepreneur who identified the mid-size freight gap from prior logistics ventures.
      His direct involvement in product vision, investor relations, and media representation creates meaningful
      key-person dependence; nearly all public company statements and investor quotes are attributed to him.
      The company's about page lists leadership and investor sections but does not publicly disclose the full
      executive team roster, limiting visibility into functional coverage across engineering, operations, finance,
      and commercial leadership. Inc. Magazine's 2024 Regionals listing (#29, Pacific) confirms the company
      employs 501–1,000 people, indicating a sizeable workforce with professional management layers beneath
      Zaslansky. Board composition is not publicly disclosed, and corporate governance details remain opaque
      for a private company at this stage. Flock's B Corp certification requires governance accountability
      commitments, including structured review processes and stakeholder consideration in major decisions.
      A prior history of freight-tech staffing cycles — driven by the freight market recession of 2022–2023 —
      created workforce volatility across the sector; specific headcount evolution at Flock is not confirmed
      in public sources.
    claimRefs:
      - CO011
      - CO012
      - CO013
      - CO014
      - CO015
    tableRefs:
      - TO002

  - id: funding-capital
    title: Funding History and Investor Base
    body: >
      Flock Freight raised its Series D round of $215M in October 2021, achieving unicorn status with a reported
      post-money valuation of $1.4 billion. The round was co-led by SoftBank Vision Fund 2 and American Airlines
      Ventures, with participation from GV (Google Ventures), Volvo Group Venture Capital, and Unshackled Ventures.
      Prior rounds included a Series A (~$8M, 2018), Series B (~$25.5M, 2019), and Series C ($56M, 2020),
      bringing the estimated total capital raised to approximately $300M including the Series D. The investor
      syndicate is strategically notable: American Airlines Ventures provides freight ecosystem credibility and
      potential commercial partnership access; GV brings technology platform scaling expertise; SoftBank provides
      growth capital at scale; and Volvo Group Venture Capital aligns with fleet and carrier network interests.
      As a private company, Flock has not disclosed post-Series D debt financing, revenue figures, EBITDA, or
      burn rate. The freight market correction that began in mid-2022 (following pandemic-era demand surge)
      materially reduced spot rates and freight volumes industry-wide, raising questions about whether Flock's
      2021-vintage $1.4B valuation remains supportable in the current environment. No subsequent funding round
      has been publicly announced as of May 2026, creating an approximately 4.5-year gap since the Series D.
    claimRefs:
      - CO016
      - CO017
      - CO018
      - CO019
      - CO020
      - CO021
      - CO022
      - CO023
    tableRefs:
      - TO003

  - id: scale-operations
    title: Scale and Operational Indicators
    body: >
      Flock describes itself as the largest Shared Truckload freight brokerage in the US, a self-reported market
      position that has not been independently verified by a public analyst report. Employee count of 501–1,000
      (per Inc. Magazine 2024) suggests a mid-stage company operating at material scale. The company's 2024
      Impact Report (the fourth annual, indicating reporting continuity since 2020) and Smart Freight Centre
      accreditation demonstrate sustained operational maturity in sustainability tracking. GLEC-compliant emissions
      reporting provides carbon data to enterprise shippers seeking Scope 3 disclosure, a differentiating capability
      vs. non-certified freight brokers. Shipper testimonials on the official website cite savings of $560K and
      $760K versus traditional truckload alternatives, and 97% on-time delivery rates, though these are
      company-curated case studies rather than independently verified operational benchmarks. Customer count,
      net revenue, gross revenue, net revenue retention, and churn metrics are not disclosed publicly.
      The platform integrates with major TMS vendors, and Flock markets its STL solution as the only
      "guaranteed hubless shared truckload" service in the industry, a claim anchored in its US patent for
      the STL pooling methodology.
    claimRefs:
      - CO024
      - CO025
      - CO026
      - CO027
      - CO028
      - CO029
      - CO030
    figureRefs:
      - FO003

  - id: milestones-adverse-events
    title: Key Milestones and Competitive Context
    body: >
      Flock Freight's milestone arc stretches from founding in 2015 through unicorn status in 2021 and continuing
      operations through 2026. The company secured a US patent for its shared truckload pooling technology,
      establishing an intellectual property moat against potential category entrants. Its B Corp certification
      (score 80.3 in the most recent assessment) and inclusion on Inc. Magazine's 2024 Pacific Regionals list
      (#29) reinforce brand legitimacy. The broader competitive context shifted dramatically when Convoy — a
      digital freight brokerage backed by $900M+ from Amazon, Bezos Expeditions, and others — abruptly shut
      down in October 2023, citing unsustainable unit economics in the post-pandemic freight market. Convoy's
      collapse highlighted that pure digital freight brokers face severe structural margin pressures when spot
      rates normalize, underscoring the importance of Flock's differentiated STL model over commodity
      spot-rate matching. Flock's STL model, with its patent protection and higher shipper switching costs
      (relative to standard brokerage), provides some insulation from the dynamics that sank Convoy.
      However, no public update on Flock's financial health, valuation trajectory, or planned liquidity
      event has been disclosed since the 2021 Series D, leaving the company's current strategic posture
      as a significant due-diligence gap.
    claimRefs:
      - CO031
      - CO032
      - CO033
      - CO034
      - CO035
    tableRefs:
      - TO004
    figureRefs:
      - FO001

