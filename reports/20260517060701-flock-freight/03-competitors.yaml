callouts:
  - calloutType: "strength"
    title: "No native STL competitor as of May 2026"
    body: >
      After years of investment and public awareness of inefficient trucking utilization, no LTL carrier
      and no large broker has launched a true multi-shipper shared truckload product. Flock's structural
      first-mover position is stronger than a typical head-start: the switching costs to build STL
      matching require algorithmic investment, carrier-side change management, and corridor density
      that cannot be copied quickly even with deep pockets.
    claimRefs: [CP023, CP032]

  - calloutType: "risk"
    title: "Financial scale asymmetry creates M&A or build-out risk"
    body: >
      C.H. Robinson, XPO, and Uber Freight have combined revenues exceeding $26 billion and the
      engineering and commercial resources to fund a competitive STL product. Flock's $395M total
      funding is a fraction of any single incumbent's annual free cash flow. An acquisition of
      Flock itself or an aggressive STL R&D sprint by a well-funded broker would be the most credible
      threat to Flock's moat — one for which Flock's best defense is continued category leadership
      and carrier-side product lock-in.
    claimRefs: [CP006, CP008, CP030, CP038]

  - calloutType: "insight"
    title: "Convoy's restructuring validates STL's advantage over pure digital brokerage"
    body: >
      Convoy's 2023 scale-back and pivot to a marketplace model — despite raising over $900M and
      achieving unicorn status — suggests that asset-light digital brokerage without a structural
      product differentiator cannot sustain premium margins at scale. Flock's STL model provides
      exactly the structural differentiation that pure TL digital brokers lack: shippers save money
      and avoid damage, carriers earn a premium, and Flock captures margin from both sides.
    claimRefs: [CP013, CP034]

