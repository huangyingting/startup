      - number: '2.3'
        title: Buyer Segmentation
        blocks:
          - type: paragraph
            body: >
              Flock Freight's stated primary buyers are enterprise shippers in consumer goods, retail, and manufacturing
              sectors with mid-size shipments that do not efficiently fill a full truck. The e-commerce channel is an
              emerging demand driver: FreightWaves' analysis highlights that Amazon FBA and Walmart Fulfillment Services
              sellers face rigid delivery-window compliance as a top logistics challenge, and STL's non-stop routing
              offers an advantage over LTL's terminal-dwell variability. A case study published by FreightWaves features
              CGK Linens, an e-commerce seller that adopted STL to reduce transit variability and damage rates,
              representing the archetype of the emerging buyer. Budget ownership for STL services typically sits with
              supply-chain or logistics VPs at enterprise shippers and with owners or founders at growth-stage
              e-commerce brands. Adoption triggers include LTL damage history — Flock's own 2022 survey data states that
              86% of LTL shippers replaced or reshipped damaged freight at least once in that year — sustainability
              reporting requirements pushing interest in lower-emission routing, and TMS integration availability that
              reduces switching friction. A secondary buyer channel is the 3PL market, where traditional freight brokers
              use Flock as a capacity source for STL-profile loads they cannot efficiently fill themselves. On the
              supply side, Flock's carrier value proposition targets independent owner-operators: the company claims
              carriers earn 25% more revenue per haul using STL versus standard truckload, incentivizing capacity
              commitment to the platform. The spot-versus-contracted freight mix in Flock's revenue base is not publicly
              disclosed, leaving revenue quality assessment dependent on due diligence access.
