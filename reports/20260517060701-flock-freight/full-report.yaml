      - number: '8.2'
        title: Comparable Valuation Framework
        blocks:
          - type: paragraph
            body: >-
              Constructing a fair value for Flock requires anchoring to the most relevant public comparables and
              adjusting for size, differentiation, and opacity. At the top of the comparable stack is C.H. Robinson
              (CHRW), the world's largest freight broker, whose FY2025 gross revenue of $16.2 billion and enterprise
              value of roughly $10.5 billion imply EV/gross revenue of approximately 0.65x and EV/net revenue of
              approximately 3.3x on roughly $3.2 billion adjusted gross profit. RXO, the XPO digital brokerage spin-off
              most analogous to Flock in business model, traded at approximately $2.5 billion EV on $1.71 billion FY2025
              gross revenue, implying 1.5x EV/gross revenue. XPO's asset-based model trades at roughly 0.9x revenue,
              while ODFL commands a 7x revenue premium reflecting superior LTL service quality and asset density. These
              multiples frame the bear-case floor at 0.65 to 0.9x gross revenue and a quality-premium ceiling at 2 to 4x
              for a differentiated platform with a patent moat. The IBISWorld estimate of the US freight brokerage
              market at roughly $85 to $90 billion in 2025, combined with Cowen analysis of the broader US truckload
              market at approximately $875 billion, supports a large-TAM narrative, but Flock competes in the narrower
              STL sub-segment estimated at $15 to $20 billion. The Convoy shutdown, Flexport valuation decline, and
              PitchBook data showing broad private tech multiple compression in 2022 through 2024 constrain the premium
              the STL patent alone can support. The CHRW acquisition of Echo Logistics in 2015 at approximately $1.4
              billion is a relevant M&A precedent, though now a decade old.
