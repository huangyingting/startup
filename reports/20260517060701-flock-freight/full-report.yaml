              market. Convoy's collapse highlighted that pure digital freight brokers face severe structural margin
              pressures when spot rates normalize, underscoring the importance of Flock's differentiated STL model over
              commodity spot-rate matching. Flock's STL model, with its patent protection and higher shipper switching
              costs (relative to standard brokerage), provides some insulation from the dynamics that sank Convoy.
              However, no public update on Flock's financial health, valuation trajectory, or planned liquidity event
              has been disclosed since the 2021 Series D, leaving the company's current strategic posture as a
              significant due-diligence gap.
