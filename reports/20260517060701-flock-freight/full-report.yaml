            figureRef: FV003
            claimRefs:
              - CV021
              - CV022
              - CV023
              - CV033
              - CV041
      - number: '8.4'
        title: Risk Factors and Thesis-Break Triggers
        blocks:
          - type: paragraph
            body: >-
              Four risk factors most materially affect the investment thesis. First, the preference overhang from $395M
              raised, structured with 1x or higher liquidation preference per standard venture terms, could eliminate
              common equity recovery in any exit below approximately $400 to $500M EV. Second, Flock's revenue
              trajectory during the 2022 to 2024 freight downturn remains entirely unquantified, leaving bear-case
              calibration to inference from industry data rather than confirmed company metrics. Third, the STL patent
              is the central differentiator, but its validity and competitive breadth have not been tested in
              litigation; a successful third-party design-around would re-rate Flock to a commodity multiple. Fourth,
              the broader digital freight market has experienced significant structural stress: Convoy shut down with
              $900M raised, Flexport has undergone repeated restructurings, and no venture-backed digital freight
              platform has achieved confirmed profitability at scale. No third-party evidence exists that Flock is
              approaching profitability; digital freight peers at comparable scale typically sustain negative operating
              margins. SoftBank board presence and GV investment since 2018 reduce near-term distress risk but do not
              eliminate it. Any of the thesis-break triggers enumerated below would shift conviction from a conditional
              hold to an immediate exit.
            claimRefs:
              - CV026
              - CV027
              - CV028
              - CV029
              - CV030
              - CV031
              - CV032
              - CV033
              - CV034
              - CV035
              - CV036
          - type: table
            tableRef: TV005
            claimRefs:
              - CV027
              - CV031
              - CV033
              - CV034
              - CV036
      - number: '8.5'
        title: Recommendation and Final Diligence Asks
        blocks:
          - type: paragraph
            body: >-
              The overall recommendation is a conditional hold or watch. Flock is a genuine category creator in the STL
              segment, holds a durable US patent, and operates in a large and structurally inefficient freight market.
              However, the combination of a high preference stack relative to an uncertain valuation, complete public
              opacity on revenue and margins, and the Convoy-and-Flexport precedent for digital freight fragility argues
              against initiating a new position above $1.0B EV. Entry at $800M to $1.0B EV is conditional on confirming
              gross revenue at or above $300M with positive growth momentum. The primary warning threshold is revenue
              growth below 10% CAGR for two consecutive years during the current freight recovery cycle. The key
              diligence asks — confirmed revenue scale, preference stack structure, patent FTO analysis, and freight
              cycle exposure quantification — are the primary blockers to upgrading conviction to a buy. An
              EBITDA-positive data point or a disclosed Series F at an EV above $1.2B with credible institutional
              investors would be sufficient evidence to upgrade conviction. Until such evidence is available, monitoring
              from the sidelines and seeking data room access through secondary channels is the appropriate positioning.
            claimRefs:
              - CV037
              - CV038
              - CV039
              - CV040
              - CV041
          - type: table
            tableRef: TV006
            claimRefs:
              - CV010
              - CV031
              - CV036
              - CV037
              - CV040
      - number: '8.6'
        title: Exhibits
        blocks:
          - type: callout
            title: STL Patent as Category-Defining Moat
            body: >-
              Flock holds the first and only US patent on shared truckload matching, granted January 2022. No other
              freight broker or digital platform has demonstrated an equivalent patent-protected STL matching
              capability. This creates a defensible moat that justifies a meaningful premium to commodity freight broker
              multiples and positions Flock as an attractive strategic acquisition target for major freight platforms
              seeking to enter or expand in the STL segment.
            calloutType: strength
            claimRefs:
              - CV027
          - type: callout
            title: Preference Overhang and Revenue Opacity Dominate Risk Profile
            body: >-
              The combination of $395M in total funding (likely structured with liquidation preferences) and zero
              publicly disclosed financial metrics creates a severe risk concentration. In a bear-case exit below $400M
              EV, common equity holders likely receive nothing. The Convoy shutdown (October 2023, $900M raised, zero
              common recovery) is the closest precedent in the digital freight brokerage space and must be treated as a
              realistic downside scenario until confirmed revenue scale and positive operating trajectory are publicly
              disclosed.
            calloutType: risk
            claimRefs:
              - CV016
              - CV031
