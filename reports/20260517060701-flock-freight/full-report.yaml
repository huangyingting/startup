  - number: 3
    title: Competitors
    sections:
      - number: '3.1'
        title: Competitive Landscape Overview
        blocks:
          - type: paragraph
            body: >
              Flock Freight competes across three distinct competitive tiers. The first tier is the $50.8 billion US LTL
              industry, dominated by asset-heavy carriers — XPO (North American LTL ~$4.9B revenue), Old Dominion
              (~$5.5B revenue), FedEx Freight, Saia, and ArcBest — each operating thousands of owned service-center
              terminals. The second tier is large-scale freight brokerage, led by C.H. Robinson ($16.2B FY2025 total
              revenues), RXO ($1.71B FY2025), and Uber Freight (estimated multi-billion brokerage GMV). The third tier
              is digital-native challengers, including Amazon Freight and the pivoted Convoy marketplace. Flock sits at
              the intersection of all three tiers as the category originator of shared truckload, an asset-light
              multi-shipper consolidation model that avoids LTL terminals and does not require dedicated truckload
              capacity. No LTL carrier had launched a direct STL product as of May 2026; no large broker had productized
              multi-shipper truckload consolidation at scale. The status quo for shippers without a STL option is to
              absorb LTL handling damage, overpay for partial FTL, or manage their own multi-stop arrangements. Flock's
