      - number: '1.3'
        title: Funding History and Investor Base
        blocks:
          - type: paragraph
            body: >
              Flock Freight raised its Series D round of $215M in October 2021, achieving unicorn status with a reported
              post-money valuation of $1.4 billion. The round was co-led by SoftBank Vision Fund 2 and American Airlines
              Ventures, with participation from GV (Google Ventures), Volvo Group Venture Capital, and Unshackled
              Ventures. Prior rounds included a Series A (~$8M, 2018), Series B (~$25.5M, 2019), and Series C ($56M,
              2020), bringing the estimated total capital raised to approximately $300M including the Series D. The
              investor syndicate is strategically notable: American Airlines Ventures provides freight ecosystem
              credibility and potential commercial partnership access; GV brings technology platform scaling expertise;
              SoftBank provides growth capital at scale; and Volvo Group Venture Capital aligns with fleet and carrier
              network interests. As a private company, Flock has not disclosed post-Series D debt financing, revenue
              figures, EBITDA, or burn rate. The freight market correction that began in mid-2022 (following
              pandemic-era demand surge) materially reduced spot rates and freight volumes industry-wide, raising
              questions about whether Flock's 2021-vintage $1.4B valuation remains supportable in the current
              environment. No subsequent funding round has been publicly announced as of May 2026, creating an
              approximately 4.5-year gap since the Series D.
