              relative to the $1.4 billion Series D-era valuation, implies a substantial valuation haircut — an adverse
              signal on investor confidence in near-term profitability. With cost structure reduced post-layoffs and
              freight market recovery beginning in 2024, an estimated 18-30 month runway existed as of late 2023,
