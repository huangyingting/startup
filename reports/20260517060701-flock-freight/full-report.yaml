  - id: FR002
    title: Risk Transmission Map
    type: dag
    layout: wide
    summary: How Flock's primary risk vectors flow through operations into revenue, margin, customers, and valuation.
    approximationNotes: Risk transmission pathways are analyst-constructed; Flock has not disclosed an internal risk transmission model.
    claimRefs:
      - CR027
      - CR028
      - CR029
      - CR030
      - CR031
      - CR032
      - CR033
    data:
      nodes:
        - id: r1
          label: Freight Market Downturn
          detail: Spot rate collapse reduces shipper demand for STL and FTL; directly impacts volume and revenue
        - id: r2
          label: AI Algorithm Failure
          detail: >-
            Suboptimal pooling in thin lanes increases carrier cost and shipper transit time; reduces STL
            competitiveness
        - id: r3
          label: Cybersecurity Breach
          detail: Shipper/carrier data breach triggers regulatory fines, litigation, and trust damage
        - id: r4
          label: Patent Invalidation
          detail: STL patent IPR success removes IP moat; competitors may replicate STL matching
        - id: r5
          label: Revenue Contraction
          detail: Direct result of downturn, algorithm failure, or customer loss; reduces cash from operations
        - id: r6
          label: Margin Compression
          detail: FTL commodity competition; STL underpricing from algorithm divergence; carrier rate spikes
        - id: r7
          label: Fundraising Risk
          detail: Reduced revenue/growth → smaller round, lower valuation, dilution; Series E showed early signal
        - id: r8
          label: Valuation Impact
          detail: Cumulative effect of revenue contraction + margin compression + increased risk discount
      edges:
        - from: r1
          to: r5
          label: Volume decline
        - from: r1
          to: r6
          label: Spot rate pressure
        - from: r2
          to: r6
          label: STL cost escalation
        - from: r3
          to: r5
          label: Customer loss
        - from: r3
          to: r7
          label: Investor concern
        - from: r4
          to: r6
          label: Competitive entry
        - from: r5
          to: r7
          label: Growth deceleration
        - from: r6
          to: r7
          label: Unit economics deterioration
        - from: r7
          to: r8
          label: Lower implied value
        - from: r5
          to: r8
          label: DCF compression
