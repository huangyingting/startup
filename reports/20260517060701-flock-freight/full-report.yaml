            - REST API (TMS/ERP integration)
            - EDI Connectivity (carrier-facing)
          note: Multi-tenant; instant quote generation; SAP TMS integration confirmed 2022
        - label: Application Services Layer
          modules:
            - STL Engine (pooling, lane matching, assignment)
            - FTL Brokerage Engine (load-board, capacity sourcing)
            - Managed Transportation TMS (freight program optimization, reporting)
            - STL AddOns (premium service overlay)
            - Guaranteed STL (transit commitment logic)
          note: Core revenue-generating services; STL engine is patent-protected
        - label: Intelligence Layer
          modules:
            - AI/ML Load Compatibility Algorithm (lane, timing, dimensions, carrier)
            - Real-Time Pricing Engine (lane density, market rates, historical data)
            - Carrier Performance Scoring (reliability, compliance, on-time rate)
            - Route Optimization (empty-mile minimization)
          note: Proprietary; purpose-built for STL — not adapted from LTL terminal logic (CEO-stated)
        - label: Data Infrastructure Layer
          modules:
            - Proprietary Lane Dataset (origin-destination pairs, rate history)
            - Carrier Compliance & Safety Database (FMCSA ratings, insurance, authority)
            - Market Rate Feeds (DAT, real-time spot market inputs)
            - Transaction & Settlement Engine
          note: Primary data moat; accumulates with each booking; cloud-hosted (provider undisclosed)
