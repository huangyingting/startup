              Flock's product suite comprises six distinct modules or service lines. Shared Truckload (STL) is the
              founding and patented product — the first standardized pooled-truckload offering with a dedicated US
              patent. Full Truckload (FTL) brokerage extends Flock's reach to full-trailer needs and monetizes the
              network for lanes where pooling is not available. Managed Transportation wraps STL and FTL into an
              enterprise freight program management service, including TMS-layer optimization, reporting, and carrier
