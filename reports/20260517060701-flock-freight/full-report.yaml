  - number: 4
    title: Financials
    sections:
      - number: '4.1'
        title: Revenue Model and Pricing
        blocks:
          - type: paragraph
            body: >-
              Flock Freight operates as an asset-light freight broker across three revenue streams: Shared Truckload
              (STL), Full Truckload (FTL), and Managed Transportation. STL is the core innovation — shippers pay for the
              trailer space they actually use rather than booking a full trailer, while Flock's AI pools compatible
              shipments onto a single carrier. Flock acts as principal in each transaction, billing shippers at a quoted
              rate and paying carriers a negotiated rate, retaining the spread as gross revenue. STL pricing is
              typically quoted 20-35% below equivalent FTL rates, a savings proposition that drives shipper adoption
              while Flock captures a pooling premium. FTL brokerage follows standard spot/contract pricing benchmarked
              against DAT trendlines. Managed Transportation charges an estimated 2-5% management fee on freight spend
              or a fixed monthly retainer for ongoing program management. The STL AddOns product, launched circa
              2024-2025, layers premium services — temperature control, liftgate, guaranteed transit — onto the base STL
              offering, creating higher-margin upsell revenue with low marginal delivery cost and increased switching
              friction for shippers.
