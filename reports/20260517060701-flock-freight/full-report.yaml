              temperature control, liftgate, inside delivery, and guaranteed transit commitments to base STL bookings.
              The Flock Platform is the technology product itself — the shipper-facing web portal and API layer. The
              Carrier Network is the supply-side asset: a vetted pool of trucking partners with standardized onboarding,
