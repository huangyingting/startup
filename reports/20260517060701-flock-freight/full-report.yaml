chapters:
  - number: 1
    title: Company Overview
    sections:
      - number: '1.1'
        title: Identity and Business Model
        blocks:
          - type: paragraph
            body: >
              Flock Freight operates as a technology-enabled freight brokerage specializing in Shared Truckload (STL), a
              shipping mode it claims to have pioneered and which the company trademarked under the FlockDirect® brand.
              Founded in 2015 and headquartered in San Diego (originally Encinitas), California, the company's core
              thesis is that mid-size freight shipments — too large for traditional Less-Than-Truckload (LTL) but too
              small to fill an entire truck — can be efficiently pooled with compatible shipments traveling the same
              corridor, creating a non-stop, hub-free route. This eliminates the multiple terminal touch-points inherent
              in LTL, reducing damage rates, transit times, and carbon emissions. The company's official site claims
              that STL delivers an average 20% cost saving versus truckload and reduces carbon emissions by up to 40%
              compared to LTL. Flock serves enterprise shippers primarily in consumer goods, retail, and manufacturing
              sectors, offering FlockDirect® (STL), full truckload (FTL) brokerage, and managed transportation services.
              The platform integrates with Transportation Management Systems (TMS) including e2open and Oracle OTM,
              enabling seamless adoption by large logistics operations. Revenue flows from per-shipment fees charged to
              shippers net of carrier costs, a gross-margin brokerage model common across digital freight
              intermediaries. Flock achieved B Corp certification with a score of 80.3 (versus a median of 50.9 for
              ordinary businesses), anchoring a sustainability-first brand that resonates with ESG-conscious enterprise
              procurement teams.
