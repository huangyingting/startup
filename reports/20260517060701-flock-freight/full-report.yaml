      - number: '5.5'
        title: Trust, Compliance, and Quality Controls
        blocks:
          - type: paragraph
            body: >-
              Flock holds a Federal Motor Carrier Safety Administration (FMCSA) freight broker license — the mandatory
              federal authorization for all US freight brokers. FMCSA licensing requires a $75,000 surety bond,
              financial fitness requirements, and compliance with federal broker regulations including transparency on
              carrier selection and payment. Flock vets all carriers admitted to its network for safety ratings,
              insurance compliance, operating authority, and performance history. B Corp certification confirms that
              Flock meets minimum environmental and social governance standards, verified by B Lab's independent
              third-party audit.

              No public disclosure of SOC 2 Type II, ISO 27001, or other enterprise cybersecurity certifications was
              found as of May 2026. Flock operates no warehouses or cross-docking facilities — all freight handling
              remains on-carrier, limiting operational quality risk to carrier selection and compliance. No regulatory
              actions, lawsuits, or FMCSA enforcement proceedings against Flock Freight were identified in public
              sources.
