      - number: '2.4'
        title: Growth Drivers
        blocks:
          - type: paragraph
            body: >
              Four structural growth drivers are identified for Flock's STL market. First, e-commerce expansion
              continuously fragments freight into smaller, more frequent shipments that fit the STL profile better than
              FTL. Amazon FBA and Walmart Fulfillment sellers require precise delivery windows that LTL carriers
              struggle to guarantee due to multi-terminal handling; STL's non-stop routing directly addresses this pain
              point and the resulting e-commerce shipper demand is independently verified in FreightWaves reporting.
              Second, sustainability mandates are intensifying: Flock claims 40% fewer carbon emissions per shipment
              versus standard LTL routing, and as enterprise shippers face Scope 3 emissions reporting requirements
              under GHG Protocol frameworks, the emissions-reduction argument for STL becomes a procurement criterion
              rather than a marketing point. Flock's B Corp certification and GLEC-compliant sustainability reporting
              position it for ESG-driven procurement. Third, supply-chain digitization — adoption of Transportation
              Management Systems and API-first logistics orchestration — reduces the switching cost for shippers to
              trial non-traditional freight modes, with Flock's e2open and Oracle OTM integrations directly lowering
              friction for enterprise adoption. Fourth, persistent structural carrier-side inefficiency (50% truck
              utilization per Flock's estimate) means that the supply-side economics for pooled loading remain
              favorable: carriers benefit from better load factors and Flock captures margin from the optimization. The
              2026 freight market is characterized by industry observers as a reset year with equilibrium re-emerging
              after the 2022–2023 spot-rate correction, which should normalize demand visibility and support
              contracted-freight growth for established brokerage platforms.
            claimRefs:
