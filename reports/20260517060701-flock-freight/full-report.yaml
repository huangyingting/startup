      - number: '7.2'
        title: Operational, Quality, and Cybersecurity Risk
        blocks:
          - type: paragraph
            body: >-
              Flock's core operational risk is AI algorithm failure in low-density lanes. The STL pooling model depends
              on sufficient lane density to match compatible shipments — if volume is too thin in a given
              origin-destination pair, the algorithm cannot pool effectively, forcing conversion to FTL at a cost and
              margin penalty. No independent audit or third-party benchmark of Flock's algorithm quality has been
              published.

              Platform reliability is a second-order operational risk: Flock's multi-tenant SaaS platform depends on
              cloud infrastructure; outages affect all active shippers simultaneously. No public SLA, uptime guarantee,
              or DRP disclosure was found. Cargo claim liability is bounded by Flock's broker status — brokers are
              generally not liable for cargo loss unless they assumed carrier liability — but reputational risk from a
              high-profile carrier incident is real. Cybersecurity risk is elevated by the absence of publicly disclosed
              SOC 2 Type II or ISO 27001 certifications. FTC data security guidance requires brokers to protect shipper
              and carrier data with basic controls.
