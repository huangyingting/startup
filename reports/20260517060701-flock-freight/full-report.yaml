              beneath Zaslansky. Board composition is not publicly disclosed, and corporate governance details remain
              opaque for a private company at this stage. Flock's B Corp certification requires governance
              accountability commitments, including structured review processes and stakeholder consideration in major
              decisions. A prior history of freight-tech staffing cycles — driven by the freight market recession of
              2022–2023 — created workforce volatility across the sector; specific headcount evolution at Flock is not
