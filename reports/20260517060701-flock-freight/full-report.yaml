      - CU005
      - CU027
      - CU034
      - CU037
    data:
      items:
        - label: Awareness
          detail: >-
            Shipper encounters Flock through freight industry coverage (FreightWaves), peer referral, or
            sustainability/ESG discovery. Problem recognition: LTL damage and terminal cost, FTL trailer
            underutilization. B Corp branding attracts ESG-oriented procurement teams.
          touchpoints:
            - FreightWaves and industry press coverage of STL category
            - Sustainability / Scope 3 emissions reduction messaging
            - Direct sales outreach for mid-market and enterprise accounts
        - label: First Booking (Evaluation)
          detail: >-
            Shipper submits a shipment on Flock's portal or via API. Receives instant STL quote. First booking is
            low-friction: no long-term commitment required. Shipper evaluates service quality, transit time, and
            damage-free delivery vs. prior LTL experience.
          touchpoints:
            - Web portal or API quote request
            - Pricing comparison vs. LTL carrier incumbent
            - First shipment experience (carrier assignment, tracking, on-time delivery)
        - label: Repeat / Program Adoption
          detail: >-
            Shipper converts to regular STL program for consistent lanes. Begins replacing a defined share of LTL volume
            with STL. Repeat bookings build lane history. STL AddOns (temp control, liftgate) added for specialized
            freight. Operational team integrates booking into standard workflow.
          touchpoints:
            - Repeat booking cadence on core lanes
            - STL AddOns conversation with Flock sales team
            - Cost savings documentation for procurement team
        - label: Managed Transportation Enrollment
          detail: >-
            Enterprise shippers consolidate STL and FTL programs under Flock's Managed Transportation service. TMS
            integration with SAP or equivalent completed. Flock manages carrier mix, optimization, and performance
            reporting across full freight program. High switching cost established.
          touchpoints:
            - MT sales engagement with VP Supply Chain or transportation director
            - SAP TMS integration (confirmed finalist 2022)
            - Quarterly business review and KPI reporting
        - label: Expansion / Advocacy
          detail: >-
            Shipper expands program to additional lanes, freight types, or business units. Adds Guaranteed STL for
            reliability-sensitive lanes. Potentially serves as reference account (unstated, as Flock has no named public
            references). Renewal of MT engagement for multi-year term.
          touchpoints:
            - New lane coverage additions
            - Guaranteed STL enrollment for time-sensitive freight
            - Managed Transportation contract renewal
