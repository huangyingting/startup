    title: Market definition table
    columns:
      - Segment / Category
      - Included Spend
      - Excluded Spend
      - Buyer / Payer
      - Relevance to Flock
    rows:
      - - Shared Truckload (STL)
        - Multi-shipper loads 10–40 LF on a single non-stop truck
        - Loads <10 LF; full-truck loads ≥40 LF
        - Enterprise/mid-market shippers with mid-size freight
        - Core market — Flock's primary product (FlockDirect®)
      - - Full Truckload (FTL)
        - Single-shipper loads filling ≥40 LF of a 53-foot trailer
        - FTL loads already fully utilized
        - High-volume shippers, distribution centers
        - Adjacency — Flock offers FTL brokerage as secondary product
      - - Less-Than-Truckload (LTL)
        - Freight <10 LF consolidated at carrier terminals with multiple transfers
        - High-value fragile small parcel; pallet-level small shipments
        - Shippers with <10 LF palletized freight
        - Substitution target — STL competes for shippers suffering LTL damage and transit-time variability
      - - Digital Freight Brokerage
        - TL and STL loads matched via algorithmic platform with API/TMS integration
        - Parcel, air freight, ocean, intermodal
        - Any shipper or 3PL using API-first load matching
        - Market context — Flock is a digital broker within this segment
      - - Third-Party Logistics (3PL)
        - Outsourced freight management across modes under managed transportation agreements
        - Asset-heavy dedicated trucking; contract warehousing
        - Supply-chain VPs outsourcing full freight execution
        - Channel overlap — 3PLs are both buyers of Flock capacity and competitors in managed transportation
    notes: >-
      Table rows represent included/excluded spend for each modal category. 'Relevance to Flock' column reflects Flock's
      stated competitive positioning per company materials; independence of these claims has not been verified.
