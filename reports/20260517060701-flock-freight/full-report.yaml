      - number: '3.3'
        title: 'Large Freight Brokers: Scale Without STL Product'
        blocks:
          - type: paragraph
            body: >
              C.H. Robinson (CHRW), the largest US freight broker, reported FY2025 total revenues of $16.2 billion, a
              decline of 8.4% primarily driven by the divestiture of its European Surface Transportation business and
              softer ocean volumes. CHRW's North American Surface Transportation (NAST) segment provides both truckload
              (TL) and LTL brokerage services to a network exceeding 75,000 customers and 450,000 contracted carriers.
              Its competitive advantages include scale-driven carrier liquidity, proprietary advanced analytics and
              visibility tooling, and deep relationships that CHRW describes as creating switching cost through embedded
              data integrations. RXO, Inc. — spun off from XPO in November 2022 — reported FY2025 revenues of
              approximately $1.71 billion from its core truck brokerage business. RXO characterizes itself as a
              technology-led "brokered transportation platform" and highlights digital automation, pricing algorithms,
              and carrier app penetration as its key differentiators. Uber Freight acquired Transplace for $2.25 billion
              in 2021, combining spot brokerage with enterprise TMS and managed transportation services. Uber Freight
              reports an average customer tenure of 8.5 years and a 98% customer retention rate across its managed
              transportation book, indicating deep enterprise lock-in. The common limitation across all three large
              brokers is the absence of native STL multi-shipper consolidation: they can arrange multi-stop full
              truckloads manually, but they lack the real-time matching algorithms that assign partial loads from
              multiple shippers onto a single truck without terminal intermediation. STL consolidation requires a
              fundamentally different dispatch model that none of the major brokers had productized by May 2026.
