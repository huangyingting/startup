        title: Product and Service Definition
        blocks:
          - type: paragraph
            body: >-
              Flock Freight delivers an integrated freight services platform covering three primary service lines and an
              expanding set of premium add-ons. From a shipper's perspective, the core workflow is: enter shipment
              details (origin, destination, dimensions, weight, timing) → receive an instant quote for trailer space on
              a shared or full truckload → book, track, and settle the shipment through a single portal. For carriers,
              Flock delivers fully-loaded trailers via pooling — improving utilization relative to the industry average
              of over half- empty loads. The customer experience abstracts the complexity of carrier matching, pooling
              optimization, and settlement into a single-platform interaction. Flock positions itself not as a broker
              but as a technology-driven freight network that enables a new load type — the Shared Truckload — that
              previously did not exist as a standardized product.
