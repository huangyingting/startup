  - id: TV005
    title: Thesis-Break Triggers and Warning Conditions
    columns:
      - Trigger
      - Threshold
      - Transmission to Thesis
      - Action Implication
    rows:
      - - Revenue growth stalls
        - Confirmed gross revenue CAGR below 10% for two consecutive years during freight market recovery
        - Base-case EV collapses toward bear case ($75M to $300M); preference stack at risk of full absorption
        - Exit or write-down; re-evaluate only at $300M to $500M entry point with fresh revenue evidence
      - - Punitive capital raise
        - Series F at implied EV below $600M with senior liquidation preference or onerous covenants
        - Signals operational distress; existing equity significantly diluted or wiped out
        - Exit before close or engage in restructuring; evaluate secondary debt market alternatives
      - - Patent invalidation or design-around
        - >-
          USPTO inter partes review invalidates STL matching patent or major competitor launches competitive STL product
          at scale
        - Moat eliminated; Flock competes on price only; re-rate to commodity multiple 0.5 to 0.9x gross revenue
        - Downgrade conviction immediately; reassess at $200M to $400M EV with commodity multiple assumption
      - - Cash runway crisis
        - Disclosed or estimated cash runway below six months without confirmed new capital commitment
        - Catastrophic; Convoy-style shutdown possible; common equity likely zero recovery
        - Immediate exit; engage with secondary investors or counsel on restructuring options
      - - CHRW or RXO STL product launch
        - CHRW, RXO, or Uber Freight launches competitive STL-matching product at meaningful scale within 18 months
        - Patent moat becomes contested; market share and pricing power erode; re-rate to bear case
        - Monitor closely; trigger bear case valuation if volume decline materializes within two quarters
    notes: >-
      Trigger thresholds are approximate and based on industry benchmarks and standard venture portfolio management
      practice. Flock's actual financial health, cash runway, and competitive intelligence are not publicly available as
      of May 2026.
