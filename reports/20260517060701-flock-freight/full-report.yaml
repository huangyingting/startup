            body: >-
              Flock's core technology is an AI/ML load-matching engine that identifies compatible shipments for pooling
              in real time. Compatible shipments share origin-destination lane pairs, compatible transit timing, and
              physical compatibility (dimensions, fragility, temperature). The platform's pricing engine generates
              instant quotes for shippers using lane density data, real-time capacity signals, and historical rate
              benchmarks. The architecture operates as a multi-tenant system: shippers access the portal or API, the
              matching engine operates in a middle layer, and the carrier dispatch system interfaces with trucking
              partners via EDI/API for tendering and tracking.

              Flock's data layer is a growing proprietary asset: each lane-pair booked accumulates historical rate,
              timing, and carrier performance data that improves future matching precision and strengthens the pricing
              engine. The company received recognition as a finalist for the 2022 SAP Innovation Awards, confirming
              enterprise TMS integration capability. Career page signals indicate the engineering team focuses on
              optimization algorithms, real-time carrier integrations, and data infrastructure — consistent with a
              high-performance logistics matching platform. The specific tech stack is not publicly disclosed; no public
