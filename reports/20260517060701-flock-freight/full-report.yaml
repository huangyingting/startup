    title: Product Architecture Map
    type: stack
    layout: wide
    summary: Flock Freight's platform organized as four technology layers from shipper interface to data infrastructure.
    approximationNotes: >-
      Layer boundaries are inferred from official product pages, career signals, and industry descriptions; Flock has
      not published an architecture diagram or technical documentation.
