      - number: '2.5'
        title: Market Constraints and Adverse Evidence
        blocks:
          - type: paragraph
            body: >
              Several material constraints temper the market opportunity. First and most significant is freight market
              cyclicality: the 2022–2023 recession saw spot rates fall sharply from COVID-era peaks, forcing digital
              brokers to compete on thin or negative margins. While 2025–2026 data indicates market stabilization,
              broker margins remain under structural pressure: FreightWaves reported that the spot-to-contract rate
              spread contraction is testing 3PLs, with JB Hunt's Integrated Capacity Solutions brokerage unit showing a
              330-basis-point margin decline even as revenues grew approximately 20% year-over-year. This
              commoditization dynamic is not specific to Flock but affects all freight brokerage players. Second, the
              collapse of Convoy in October 2023 is a highly adverse market signal. Convoy raised approximately $900
              million in venture capital and was widely regarded as the digital brokerage category leader before its
              sudden shutdown; the failure demonstrates that technology and scale do not guarantee unit-economics
              viability during freight downturns. While Flock argues its STL model differs structurally from Convoy's
              FTL commodity brokerage, the underlying dependencies on carrier trust, shipper volume, and market-rate
              dynamics are substantially shared. Third, no independently published market size data validates Flock's
              claim to be the largest STL broker, and without audited volume data the self-reported TAM framing is
              unverifiable. Fourth, potential incursion from large incumbent logistics operators — Amazon Freight, Uber
              Freight, and C.H. Robinson's own technology investments — into partial-load matching creates displacement
              risk that is difficult to quantify from public sources but should be closely monitored. The carrier
              fragmentation enabling Flock's digital aggregation model could eventually be disrupted by an asset-based
              carrier or larger platform offering direct STL-style pooling at competitive cost.
            claimRefs:
              - CM030
              - CM031
              - CM032
              - CM033
              - CM034
              - CM035
              - CM036
              - CM037
      - number: '2.6'
        title: Exhibits
        blocks:
          - type: callout
            title: STL Addresses Real and Independently Verifiable Shipper Pain
            body: >
              The 86% LTL damage rate (Flock's 2022 survey) and documented delivery-window compliance failures for
              Amazon FBA sellers (FreightWaves, independently reported) point to genuine buyer pain. If Flock can
              independently validate its utilization and damage metrics, the STL value proposition — cost savings,
              damage reduction, emissions improvement — maps precisely to enterprise ESG and supply-chain efficiency
              mandates accelerating in 2025–2026. The e-commerce tailwind is real and independently confirmed through
              industry media coverage.
            calloutType: insight
            claimRefs:
              - CM002
              - CM004
              - CM019
              - CM024
              - CM025
          - type: callout
            title: No Independent STL Market Size Creates Speculative Valuation Anchor
            body: >
              The complete absence of any independently published STL market-size estimate is a material diligence gap.
              Flock's entire TAM framing is self-constructed and unverified; investors relying on it risk overpaying
              relative to a smaller-than-represented SAM. The Convoy failure demonstrates that even well-capitalized
              digital brokers can underestimate freight-cycle risks and unit-economics fragility. Without independent
              market data and audited financials, any STL market size figure must be classified as speculative.
              Diligence should commission independent freight market research before relying on Flock's sizing claims.
            calloutType: risk
            claimRefs:
              - CM014
              - CM032
              - CM037
          - type: callout
            title: Freight Broker Margin Compression Is a Real-Time 2026 Signal
            body: >
              JB Hunt ICS's 330-basis-point gross margin decline in 2025–2026, reported by FreightWaves, is a concurrent
              adverse signal for the entire freight brokerage sector. Flock's STL differentiation may provide partial
              insulation from pure commodity-rate compression, but the structural forces — carrier negotiating power,
              shipper procurement leverage, spot-contract spread dynamics — apply broadly to digital brokers. Diligence
              should request Flock's net revenue margin by quarter since 2022 to determine whether the company is
              margin-expanding or contracting in the current environment.
            calloutType: risk
            claimRefs:
              - CM030
              - CM031
