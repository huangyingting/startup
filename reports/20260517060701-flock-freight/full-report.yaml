companyProfile:
  summary: >-
    Flock Freight, founded in 2015 and headquartered in San Diego, CA, is a technology-driven freight platform
    specializing in shared truckload (STL) shipping. It holds the first and only US patent on STL matching, enabling
    multiple shippers to share a single truck without transshipment. The company achieved unicorn status in October 2021
    with a $1.4 billion Series D valuation backed by SoftBank Vision Fund 2, GV, and American Airlines Ventures. With
    approximately $395 million raised across five rounds, Flock operates as the self-described largest STL provider in
    the US. As a certified B Corporation, it also competes on sustainability. No revenue or profitability metrics have
    been publicly disclosed.
  foundedDate: '2015-01-01'
  founders:
    - name: Oren Zaslansky
      role: CEO and Co-Founder
      background: >-
        Serial entrepreneur with prior logistics and technology venture experience; has led Flock from founding through
        $395M in total funding and patent grant.
  foundingLocation: San Diego, CA
  headquarters: San Diego, CA
  productSummary: >-
    Flock Freight offers shared truckload (STL) shipping via its AI-powered FlockDirect matching platform, which
    aggregates freight from multiple shippers into a single truck to reduce per-shipper cost and carbon footprint versus
    full truckload (FTL) and less-than-truckload (LTL) alternatives. The STL patent covers the core matching
    methodology.
  customerFocus: >-
    Mid-market and enterprise shippers in the US seeking cost savings versus FTL and service reliability improvements
    versus traditional LTL; sustainability-focused shippers and B Corp-aligned procurement teams.
  businessModel: >-
    Asset-light freight brokerage: Flock earns a margin on the spread between shipper freight rates and carrier rates.
    Revenue is a function of gross freight transported multiplied by net take rate (estimated 18 to 20% of gross freight
    revenue). The company does not own trucks or trailers.
