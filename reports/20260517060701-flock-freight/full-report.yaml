      - number: '8.3'
        title: Scenario Analysis and Sensitivity
        blocks:
          - type: paragraph
            body: >-
              The valuation range for Flock spans from a bear-case distressed scenario to a bull-case strategic premium.
              In the base case, estimated gross revenue of $300 to $400 million by 2026 to 2027, combined with a
              recovery multiple of 1.5 to 2.5x gross revenue reflecting the STL patent premium over commodity freight
              brokers and freight market recovery at 3 to 5% volume CAGR, yields a base-case enterprise value of $600M
              to $1.25B. A revenue growth rate exceeding 20% CAGR and successful STL market expansion above $25 billion
              could re-rate Flock toward 2.5 to 4x gross revenue, implying a bull-case EV of $1.5B to $2.5B. This bull
              scenario requires either confirmed revenue exceeding $400 million or a strategic acquisition announcement
              from CHRW, XPO, or a comparable freight platform. In the bear case, a second freight downturn or an
              inability to scale revenue above $250 million compresses the multiple toward the commodity floor of 0.5 to
              1x, implying an EV of $75M to $360M. At the bear-case EV, the $395M preference stack likely absorbs all
              proceeds, leaving common equity at zero. The valuation is highly sensitive to the undisclosed revenue run
              rate, the exit multiple in any M&A transaction, and the freight market cycle stage at time of exit.
              GlobalData projects US road freight volume growth of 4 to 5% CAGR through 2028, supportive of the base
              case but insufficient alone to justify a multiple re-rating above 2x without confirmed revenue scale.
            claimRefs:
