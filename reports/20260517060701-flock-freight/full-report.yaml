  - number: 2
    title: Market Analysis
    sections:
      - number: '2.1'
        title: Market Boundary and Definition
        blocks:
          - type: paragraph
            body: >
              Flock Freight competes in the US road freight brokerage sector, specifically in a sub-category it brands
              as Shared Truckload (STL). The broader freight ecosystem divides road shipments into three primary modes:
              Full Truckload (FTL), where a shipper occupies an entire 53-foot trailer; Less-Than-Truckload (LTL), where
              multiple shippers consolidate small freight at carrier terminals; and parcel or small-package networks for
              sub-pallet shipments. Flock defines STL as shipments occupying 10 to 40 linear feet of trailer space — too
              large to be efficiently handled by LTL terminal networks, but too small to justify the cost of a full
              truck. The status-quo solution for this middle segment is typically either overpaying for FTL capacity or
              accepting the damage risk of LTL transloading, where freight changes trucks multiple times at regional
              terminals. Flock's core claim is that STL eliminates terminal touches by pooling two to four compatible
              shipments on a single truck traveling the same lane, creating a non-stop hub-free route. LTL carriers —
              XPO Logistics, Old Dominion Freight Line, FedEx Freight, and Saia — are the primary incumbents in the
              freight size segment Flock addresses. Traditional freight brokers, including C.H. Robinson, Echo Global,
              Coyote, and RXO, represent the broader brokerage TAM within which Flock operates. Adjacencies include
              pallet-based LTL, expedited freight, and managed transportation services, which Flock also offers. The
              critical boundary-setting question — what fraction of LTL and FTL revenue is realistically addressable by
              STL pooling — remains unresolved in public sources. Flock's estimate that 50% of trucks on the road are
              not full implies a large theoretical opportunity, but the company has not provided audited volume or
              penetration data to substantiate this claim or quantify the competitive displaceable market.
            claimRefs:
              - CM001
              - CM002
              - CM003
              - CM004
              - CM005
              - CM006
              - CM007
              - CM008
