              Flock Freight was founded by Oren Zaslansky, who serves as CEO and is the company's primary public face.
              Zaslansky is a serial entrepreneur who identified the mid-size freight gap from prior logistics ventures.
              His direct involvement in product vision, investor relations, and media representation creates meaningful
              key-person dependence; nearly all public company statements and investor quotes are attributed to him. The
              company's about page lists leadership and investor sections but does not publicly disclose the full
              executive team roster, limiting visibility into functional coverage across engineering, operations,
              finance, and commercial leadership. Inc. Magazine's 2024 Regionals listing (#29, Pacific) confirms the
