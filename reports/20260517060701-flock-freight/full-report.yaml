  - number: 6
    title: Customers
    sections:
      - number: '6.1'
        title: Customer Segments and Buyer Profile
        blocks:
          - type: paragraph
            body: >-
              Flock's primary customer segment is the mid-market to enterprise shipper that regularly moves palletized
              freight on consistent US domestic lanes. The STL model targets shipments that are too large for standard
              LTL (where terminal handling introduces damage and transit time risk) but that do not fill a full trailer
              — roughly 6-20 pallet equivalents per move. Three industries are most directly addressable: manufacturing
              (automotive parts, electronics, industrial goods), consumer packaged goods (food and beverage, household
              products, pharmaceuticals), and retail/distribution (direct-to-DC freight for retailers and e-commerce
              fulfillment operators).

              A secondary segment is the sustainability-focused enterprise shipper — companies with Scope 3 emissions
              reporting obligations under evolving US and EU regulations who seek freight vendors that reduce
              transportation emissions. Flock's B Corp certification and emphasis on empty-mile reduction directly
              address this need. Flock's Managed Transportation product targets enterprise freight managers who want to
              consolidate multiple freight modes (STL + FTL) under a single managed program with TMS integration and
              performance reporting. American Airlines Ventures participated in Flock's Series D as a strategic investor
              — notably in an investor, not shipper, capacity — demonstrating strategic alignment without direct
              customer proof.
            claimRefs:
