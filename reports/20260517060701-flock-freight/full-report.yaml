      - number: '3.4'
        title: Digital Challengers and Adjacent Platforms
        blocks:
          - type: paragraph
            body: >
              Amazon Freight offers truckload brokerage services for external shippers, leveraging Amazon's carrier
              network, GPS-tracked trailer fleet, and data infrastructure. The service targets small and medium-sized
              businesses with self-service instant quotes and enterprise shippers via a dedicated sales team. Amazon's
              competitive advantage is its carrier density in corridors it serves for its own logistics operations; its
              disadvantage is uncertain coverage in lanes where Amazon Prime volume is thin. Amazon Freight does not
              offer an STL or multi-shipper consolidation product; its LTL offering is brokered rather than self-haul.
              Convoy, a Seattle-based digital freight broker that raised over $900 million and reached unicorn status
              before scaling back operations in October 2023, has repositioned itself as a technology marketplace for
              freight brokers and carriers rather than operating as a direct broker itself. Convoy's platform now
              facilitates matching between brokers (not shippers) and carriers, changing its competitive posture
              entirely. LoadSmart, GlobalTranz (acquired by Echo Global, itself owned by WWEX), and other digital TL
              brokers operate in adjacent segments but have not developed STL products. Coyote Logistics (acquired by
              UPS) serves large shippers with TL brokerage but falls in the same category as CHRW and RXO in terms of
              STL capability. The collective picture of the challenger tier confirms that no digital-native freight
              technology company had built a direct STL competitor to Flock as of May 2026, and Convoy's restructuring
              suggests that the asset-light pure digital broker model faces structural profitability constraints.
