  - id: FV001
    title: Investment Recommendation Logic
    type: flow
    layout: standard
    summary: >-
      Flow diagram tracing five primary evidence inputs to the conditional hold recommendation. The validated market
      opportunity and patent-protected product moat partially support the bull thesis, while complete financial opacity,
      peak-cycle valuation history, and Convoy-validated model risk are the dominant negative drivers preventing an
      outright buy recommendation. The diagram illustrates that the two negative factors outweigh the two positive
      factors in the current information state.
    approximationNotes: >-
      Flow represents qualitative investment logic. Conviction weights for each input are illustrative and not derived
      from a formal quantitative scoring model.
    claimRefs:
      - CV001
      - CV007
      - CV016
      - CV017
      - CV022
      - CV031
    data:
      nodes:
        - id: N1
          label: Market Validated
          description: US freight brokerage $85 to $90B TAM; STL sub-segment $15 to $20B; freight recovery underway from H2 2024
        - id: N2
          label: Patent Product Moat
          description: US STL matching patent granted 2022; largest STL provider per FreightWaves 2024; B Corp differentiation
        - id: N3
          label: Financial Opacity Risk
          description: No disclosed revenue, margin, or growth metrics; $395M raised with undisclosed preference structure
        - id: N4
          label: Peak-Cycle Valuation
          description: 2021 entry at $1.4B at freight supercycle and tech multiple peak; base-case fair value $700M to $1.2B
        - id: N5
          label: Digital Freight Model Risk
          description: Convoy shut down Oct 2023 with $900M raised; Flexport restructured; asset-light model fragility confirmed
        - id: N6
          label: Conditional Hold / Watch
          description: >-
            Do not initiate above $1.0B EV; entry at $800M to $1.0B conditional on confirmed gross revenue at or above
            $300M
      edges:
        - from: N1
          to: N6
          label: partially supports bull case
        - from: N2
          to: N6
          label: patent moat supports premium
        - from: N3
          to: N6
          label: primary negative — dominant uncertainty
        - from: N4
          to: N6
          label: entry price discipline required
        - from: N5
          to: N6
          label: raises model fragility risk
  - id: FV002
    title: Valuation Sensitivity to EV/Gross Revenue Multiple
    type: bar
    layout: standard
    summary: >-
      Bar chart showing implied enterprise value in millions USD at eight EV/gross revenue multiple scenarios from 0.5x
      (distressed commodity floor) to 5.0x (peak STL platform premium), anchored to estimated gross revenue of
      approximately $300 million. The chart illustrates that the 2021 unicorn valuation of $1.4B requires approximately
      4.5 to 5x gross revenue, a peak multiple that demands confirmed category leadership and strong revenue growth to
      justify. The current public comp range (CHRW 0.65x, RXO 1.5x) frames the bear-to-base range of $200M to $450M EV,
      with the STL patent premium supporting a 2.0 to 3.0x base of $600M to $900M.
    approximationNotes: >-
      All values in millions USD. Estimated gross revenue of $300M is a midpoint estimate; Flock has not publicly
      disclosed revenue. Multiples benchmarked against CHRW (0.65x), RXO (1.5x), and private platform comps. 2021
      unicorn round implies approximately 4.5 to 5x forward gross revenue.
    claimRefs:
      - CV021
      - CV022
      - CV023
      - CV041
    data:
      items:
        - label: 0.5x Gross Rev (Distressed Floor)
          value: 150
          detail: $300M est. gross rev x 0.5x; below CHRW multiple; distressed or commodity broker scenario
        - label: 1.0x Gross Rev (Bear)
          value: 300
          detail: $300M x 1.0x; at CHRW-equivalent gross revenue multiple; no STL premium awarded
        - label: 1.5x Gross Rev (Bear-Base)
          value: 450
          detail: $300M x 1.5x; equals RXO current trading multiple; partial STL differentiation credit
        - label: 2.0x Gross Rev (Base Low)
          value: 600
          detail: $300M x 2.0x; mid-range base case; STL moat partially valued; lower bound of hold range
        - label: 2.5x Gross Rev (Base)
          value: 750
          detail: $300M x 2.5x; central base case; reflects patent premium over commodity broker
        - label: 3.0x Gross Rev (Base High)
          value: 900
          detail: $300M x 3.0x; upper base case; requires confirmed revenue growth and freight recovery
        - label: 4.0x Gross Rev (Bull)
          value: 1200
          detail: $300M x 4.0x; bull scenario; category leader with confirmed $400M+ revenue trajectory
        - label: 5.0x Gross Rev (Peak 2021 Implied)
          value: 1500
          detail: $300M x 5.0x; approximate 2021 unicorn multiple; requires full STL market leadership
  - id: FV003
    title: Enterprise Value and Return Range by Exit Scenario
    type: range
    layout: standard
    summary: >-
      Range chart showing low, base, and high enterprise value estimates across five scenarios: bear case, base case,
      bull case, strategic acquisition, and IPO scenario, all in millions USD. The bear case ($75M to $360M) reflects
      commodity multiple compression and potential preference absorption eliminating common equity. The base case ($600M
      to $1.25B) reflects STL premium over commodity at estimated gross revenue of $300M to $400M. The bull case ($1.5B
      to $2.4B) and strategic acquisition scenario ($1.2B to $2.2B) reflect confirmed category leadership or a premium
      M&A transaction.
    approximationNotes: >-
      All values in millions USD. Revenue estimates are approximations based on $200M to $500M analyst range; Flock has
      not disclosed financials. Strategic acquisition premiums assume 20 to 30% control premium over standalone value.
      IPO scenario assumes freight-tech comparable multiples and market receptivity.
    claimRefs:
      - CV021
      - CV022
      - CV023
      - CV033
      - CV041
    data:
      items:
        - label: Bear Case EV
          low: 75
          base: 200
          high: 360
        - label: Base Case EV
          low: 600
          base: 900
          high: 1250
        - label: Bull Case EV
          low: 1500
          base: 1900
          high: 2400
        - label: Strategic Acquisition Premium
          low: 1200
          base: 1600
          high: 2200
        - label: IPO Scenario EV
          low: 1800
          base: 2300
          high: 3000
  - id: FV004
    title: Investment Committee KPIs
    type: kpi
    layout: standard
    summary: >-
      Eight investment-committee-ready KPIs summarizing the key valuation and quality signals for Flock Freight: last
      known valuation ($1.4B), total funding (~$395M), base-case fair value ($700M to $1.25B), revenue confidence (very
      low), competitive moat (moderate), evidence quality score (5/10), freight market recovery stage (early recovery),
      and overall recommendation (conditional hold). The KPIs highlight the gap between the 2021 unicorn mark and
      current base-case fair value, and flag revenue opacity and the adverse Convoy precedent as the two dominant
      negative signals.
    approximationNotes: >-
      KPI values are estimates or qualitative assessments. Flock has not disclosed revenue, margin, or growth data
      publicly. All valuation estimates carry wide error bars due to private company opacity.
    claimRefs:
      - CV001
      - CV003
      - CV010
      - CV012
      - CV022
      - CV027
      - CV031
      - CV040
    data:
      items:
        - label: Last Known Valuation
          value: $1.4B
          detail: Series D (Oct 2021); peak freight cycle and peak private tech multiples; SoftBank led $215M round
          tone: neutral
        - label: Total Funding Raised
          value: ~$395M
          detail: 5 rounds A through E; Series E $60M at undisclosed valuation (Oct 2023); 72% smaller than Series D
          tone: neutral
        - label: Base-Case Fair Value May 2026
          value: $700M to $1.25B
          detail: 1.5 to 2.5x estimated $300M to $400M gross revenue; STL patent premium applied; discount to 2021 peak
          tone: neutral
        - label: Revenue Confidence Level
          value: Very Low
          detail: No publicly disclosed financials; analyst estimates range $200M to $500M gross revenue with wide error bars
          tone: adverse
        - label: Competitive Moat Score
          value: Moderate
          detail: US STL patent (2022); largest STL provider per FreightWaves 2024; vulnerable to well-funded CHRW and RXO
          tone: neutral
        - label: Evidence Quality Score
          value: 5 of 10
          detail: >-
            Private company; strong narrative and market evidence; weak quantitative corroboration; heavy reliance on
            inference
          tone: adverse
        - label: Freight Market Recovery
          value: Early Recovery
          detail: H2 2024 volume recovery per DAT; Cowen projects 3 to 5% freight market growth; 2026 trajectory uncertain
          tone: neutral
        - label: Overall Recommendation
          value: Conditional Hold
          detail: >-
            Do not initiate above $1.0B EV; await confirmed revenue at or above $300M; monitor Series F or acquisition
            signal
          tone: neutral
