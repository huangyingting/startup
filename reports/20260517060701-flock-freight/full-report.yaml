  - number: 7
    title: Risks
    sections:
      - number: '7.1'
        title: Regulatory and Legal Risk
        blocks:
          - type: paragraph
            body: >-
              Flock's primary regulatory obligation is its FMCSA freight broker license, governed by 49 CFR Part 371 and
              related FMCSA rules. The license requires a $75,000 surety bond, carrier transparency, and recordkeeping
              compliance. No FMCSA enforcement actions or civil litigation against Flock were identified in public
              records as of May 2026. The Federal Register (FR 2023-26449) and DOT cybersecurity guidance reflect the
              direction of broker regulation: growing pressure on brokers to adopt anti-double-brokering measures,
              carrier verification systems, and data security controls.

              Flock's STL patent (US; granted January 2022) is the company's most significant legal asset — and a key IP
              risk. Patent challenges via inter partes review (IPR) at the USPTO are possible if a competitor believes
              the patent is overly broad. International patent protection outside the US is not confirmed. California
              AB5 and analogous gig economy laws create potential carrier driver reclassification risk, though this risk
              primarily falls on carrier employers rather than on Flock as a broker. Data privacy compliance (CCPA,
              emerging state laws) is a growing obligation; FTC guidance requires freight brokers to maintain basic
              cybersecurity controls for shipper and carrier data.
            claimRefs:
