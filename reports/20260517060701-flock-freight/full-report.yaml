      - number: '2.2'
        title: Market Sizing — Multiple Lenses
        blocks:
          - type: paragraph
            body: >
              No independent analyst report quantifying the US STL market size was accessible during research; all
              sizing estimates must be derived from proxy measures and Flock's own unverified claims. Three
              complementary lenses structure the market analysis. First, a top-down lens anchors to the total US
              trucking and freight brokerage industry. The American Trucking Associations and the FMCSA report
              approximately 580,000 active US motor carriers as of June 2025, with 91.5% operating ten or fewer trucks,
              confirming the extreme fragmentation that creates opportunity for digital aggregators and brokers. Total
              US trucking industry revenues are broadly estimated above $875 billion annually based on ATA economics
              data and Bureau of Transportation Statistics freight data. Freight brokerage specifically can be inferred
              from major public-company revenues: C.H. Robinson, the largest US freight broker, reported $16.2 billion
              in total revenues for fiscal year 2025, serving 450,000+ contract carriers and 75,000+ customers. If CHRW
              represents approximately 10–12% of the total US freight brokerage market, the implied market is $130–165
              billion. Second, a capacity-utilization lens uses Flock's unverified claim that 50% of trucks on the road
              are not full: even a conservative 10% conversion of under-utilized TL capacity to STL-style pooling
              represents tens of billions of addressable spend. Third, a data infrastructure lens: DAT Freight &
              Analytics states it analyzes $1 trillion in freight transaction data annually, indicating the market
              infrastructure is mature but digital-specific revenue share remains unquantified in public data. The
              absence of any independent STL market-size estimate is a material diligence gap requiring direct buyer
              interviews and Flock's internal data for resolution.
