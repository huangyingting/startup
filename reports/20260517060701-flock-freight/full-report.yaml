      - number: '1.5'
        title: Key Milestones and Competitive Context
        blocks:
          - type: paragraph
            body: >
              Flock Freight's milestone arc stretches from founding in 2015 through unicorn status in 2021 and
              continuing operations through 2026. The company secured a US patent for its shared truckload pooling
              technology, establishing an intellectual property moat against potential category entrants. Its B Corp
              certification (score 80.3 in the most recent assessment) and inclusion on Inc. Magazine's 2024 Pacific
