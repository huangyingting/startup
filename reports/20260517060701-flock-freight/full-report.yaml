      - number: '3.2'
        title: 'LTL Incumbents: Asset Infrastructure as Moat and Constraint'
        blocks:
          - type: paragraph
            body: >
              XPO Inc. and Old Dominion Freight Line (ODFL) are the two largest independent LTL carriers by revenue in
              North America. XPO reported FY2025 consolidated revenue of $8.2 billion, with its North American LTL
              segment comprising the largest share; ODFL reported FY2025 revenue of approximately $5.5 billion,
              declining from $5.8 billion in FY2024 amid softer LTL volumes. ODFL consistently achieves best-in-class
              operating ratios near 71%, reflecting terminal utilization discipline. Both carriers compete on
              service-center density, day-definite delivery windows, and claims-free performance; ODFL specifically
              markets its low-damage-claims record to shippers carrying high-value goods. Saia and ArcBest operate in
              similar segments without matching ODFL's operating ratio leadership. FedEx Freight, the largest US LTL
              carrier by market share according to Transport Topics, adds the FedEx brand and parcel network adjacency.
              The structural limitation of LTL incumbents in the STL context is their business model itself: every LTL
              shipment touches multiple terminals, introducing handling damage and consolidation delays. None of the
              major LTL carriers has launched a hub-free multi-shipper TL product that would directly replicate STL.
              Their capital is deployed in owned terminal networks — a sunk cost that also represents a barrier to
              pivoting toward STL's model. Flock's 99.8% damage-free delivery claim, if validated at scale, is a direct
              competitive strike against LTL's known Achilles' heel.
