            body: Flock 持有 STL 匹配方法唯一的美国专利——法律保护阻止直接复制。叠加线路密度网络效应，以及随每一单预订增长的专有数据资产，护城河会持续复利。竞争对手要么绕开专利，要么在没有线路密度优势的情况下从零搭建。
            calloutType: strength
            claimRefs:
              - CE017
              - CE018
              - CE020
              - CE021
              - CE022
          - type: callout
            title: 技术栈不透明，可靠性指标未披露
            body: >-
              Flock 不公开技术架构、可靠性指标、SLA 或网络安全认证。未发现 SOC 2 Type II 或 ISO 27001
              认证。拥有第三方风险管理流程的企业货主在采购时可能要求这些材料。缺少公开开发者社区、API 文档或 GitHub 足迹，也限制了开发者侧尽调信号。
