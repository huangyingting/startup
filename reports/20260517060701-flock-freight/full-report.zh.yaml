      - number: '2.3'
        title: 买方分层
        blocks:
          - type: paragraph
            body: >
              Flock Freight 声称的主要买方，是消费品、零售和制造业的大型企业货主；这些客户有中等规模货物，无法高效装满整车。电商渠道正在成为新的需求驱动因素：FreightWaves 分析指出，Amazon
              FBA 和 Walmart Fulfillment Services 卖家把严格交付窗口合规视为头号物流挑战之一，而 STL 的不经停路线相对 LTL 的货站停留不确定性具备优势。FreightWaves
              发布的案例研究中，电商卖家 CGK Linens 采用 STL 来降低运输波动和破损率，正是这一新兴买方的典型样本。STL 服务的预算所有权通常在大型企业货主的供应链或物流 VP
              手里；增长期电商品牌则由所有者或创始人负责。采用触发因素包括：LTL 破损经历——Flock 自己的 2022 年调查称，86% 的 LTL
              货主当年至少一次替换或重发受损货物；可持续性报告要求推动客户关注低排放路线；以及 TMS 集成可用性降低切换摩擦。第二类买方渠道是 3PL 市场，传统货运经纪商会把 Flock 当作 STL
              画像货物的运力来源，这类货物它们自己难以高效装载。供给侧上，Flock 面向独立车主运营商的价值主张是：公司称承运商使用 STL 每趟收入比标准整车高 25%，从而激励运力投入平台。Flock
              收入中现货与合约货运的比例未公开披露，收入质量评估只能依赖尽调访问。
