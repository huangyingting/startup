            body: >-
              Flock Freight 的完整融资时间线已在公司概况章节详述。本章聚焦资本充足性和未来现金跑道。Flock 在 October 2023 完成 $60 million Series E
              融资，使已披露累计融资达到约 $395 million。Series E 距 $215 million Series D（October 2021）近两年；其间 2022-2023 年货运市场下行压缩利润率，并在
              late 2022 和 early 2023 触发裁员。相对 Series D 时代 $1.4 billion 估值，$60 million 的 Series E
              暗示估值出现大幅折价——这是投资者对近期盈利信心的反向信号。裁员后成本结构下降，货运市场自 2024 年开始复苏；截至 late 2023，估计现金跑道为 18-30 month，把 Flock
              下一次潜在资本事件推至 mid-2025 至 late 2025。Flock
              未披露债务、信贷额度或项目融资义务。轻资产模型消除了设备融资风险；营运资本敞口限于运单结算浮存（承运商付款时间与货主回款之间的差异）。除 $60M 标题数字外，Series E 投资者身份和经济条款未公开披露。
