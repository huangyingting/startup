      - number: '8.2'
        title: 可比估值框架
        blocks:
          - type: paragraph
            body: >-
              构建 Flock 公允价值，需要锚定最相关的上市可比公司，并按规模、差异化和不透明度调整。可比序列顶部是 C.H. Robinson（CHRW），全球最大货运经纪；其 FY2025 总收入 $16.2
              billion、企业价值约 $10.5 billion，意味着 EV / 总收入约 0.65x，按约 $3.2 billion 调整后毛利计算的 EV / 净收入约 3.3x。RXO 是 XPO
              分拆出的数字经纪业务，商业模式最接近 Flock，其 FY2025 总收入 $1.71 billion、EV 约 $2.5 billion，对应 1.5x EV / 总收入。XPO 的资产型模式约按 0.9x
              收入交易；ODFL 则享有 7x 收入溢价，反映更强的 LTL 服务质量和资产密度。这些倍数把悲观情景底部框定在 0.65 至 0.9x 总收入；对拥有专利护城河的差异化平台，质量溢价上限为 2 至
              4x。IBISWorld 估计 2025 年美国货运经纪市场约 $85 billion 至 $90 billion，叠加 Cowen 对更广泛美国卡车整车市场约 $875 billion 的分析，支撑了大 TAM
              叙事，但 Flock 实际竞争的是更窄的 STL 子分部，估计规模 $15 billion 至 $20 billion。Convoy 关闭、Flexport 估值下滑，以及 PitchBook 数据显示 2022
              至 2024 年私营科技公司倍数普遍压缩，都限制了 STL 专利本身能支撑的溢价。CHRW 2015 年以约 $1.4 billion 收购 Echo Logistics 是一个相关 M&A
              先例，尽管距今已有十年。
