      - number: '3.5'
        title: 护城河分析与竞争风险
        blocks:
          - type: paragraph
            body: >
              Flock Freight 的竞争护城河由四个部分构成，耐久度不同。第一，自有多货主合并算法代表技术领先，并随数据扩大而增强：Flock 跑的货越多，承运商利用率和货主定价的匹配就越好。第二，Flock
              面向承运商侧的 STL AddOns 产品——2025 年推出，并获 Fast Company 评为 Next Big Things in Tech
              获奖产品——通过让承运商填满现有货载的剩余空间，把原本空置运力变现，从而增强承运商粘性。第三，Flock 核心线路的通道密度形成覆盖优势：承运商在高密度通道反复跑 Flock
              货，减少空驶并提升服务一致性。第四，Flock 发布的行业研究（2024 年 58% 的卡车半空载）和 B Corp 认证，在重视可持续性的企业采购中建立品牌资产。反向风险同样重大：CHRW、XPO 或 Uber
              Freight 中任何一家，都有财务规模投入工程资源构建 STL 匹配功能。货主多归属风险较高，因为它们本来就有 CHRW 或 Uber Freight 的 TMS 关系；STL
              可以被作为功能添加，而不一定需要新平台供应商。货主切换成本有限——如果 Flock 提价或无法覆盖某条线路，货主可以回到 LTL 或部分 FTL，迁移摩擦不高。Flock
              的长期防御力取决于能否在足够多通道达到密度，让后来进入的现有巨头难以快速复制其匹配质量。
