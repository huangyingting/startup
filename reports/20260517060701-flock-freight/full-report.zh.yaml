      - number: '1.2'
        title: 领导层与治理
        blocks:
          - type: paragraph
            body: >
              Flock Freight 由 Oren Zaslansky 创立，他担任 CEO，也是公司最主要的公开代表。Zaslansky
              是连续创业者，在此前的物流创业中发现了中等规模货运的缺口。他直接参与产品愿景、投资者关系和媒体表达，带来明显的关键人依赖；几乎所有公开公司表态和投资者引语都指向他。公司关于页面列出领导层和投资者板块，但未公开完整高管名单，工程、运营、财务和商业领导力的覆盖情况因此能见度有限。Inc.
              Magazine 的 2024 Regionals 榜单（Pacific #29）确认公司有 501–1,000 名员工，说明 Zaslansky
              之下已有相当规模的员工和专业管理层。董事会构成未公开披露；以现阶段私营公司而言，公司治理细节仍不透明。Flock 的 B Corp
              认证要求治理问责承诺，包括结构化审查流程，以及在重大决策中考虑利益相关方。2022–2023 年货运市场衰退推动货运科技行业经历过一轮人员周期，整个行业劳动力波动加剧；Flock 具体员工数演变未被公开来源确认。
