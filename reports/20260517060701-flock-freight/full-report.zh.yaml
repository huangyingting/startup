      - number: '3.3'
        title: 大型货运经纪商：有规模，缺 STL 产品
        blocks:
          - type: paragraph
            body: >
              美国最大货运经纪商 C.H. Robinson（CHRW）报告 FY2025 总收入 $16.2 billion，同比下降 8.4%，主要受剥离欧洲地面运输业务和海运量走弱影响。CHRW 的 North
              American Surface Transportation（NAST）分部向超过 75,000 家客户和 450,000
              家合同承运商网络提供整车（TL）和零担（LTL）经纪服务。它的竞争优势包括规模带来的承运商流动性、自有高级分析和可视化工具，以及 CHRW 称由嵌入式数据集成形成的深度关系和切换成本。RXO, Inc. 在
              November 2022 从 XPO 分拆出来，FY2025 核心卡车经纪业务收入约 $1.71 billion。RXO
              自称是技术驱动的“经纪运输平台”，并把数字自动化、定价算法和承运商应用渗透率列为关键差异化。Uber Freight 在 2021 年以 $2.25 billion 收购 Transplace，把现货经纪与企业
              TMS 和托管运输服务合并。Uber Freight 报告其托管运输账本中，平均客户合作年限 8.5 年，客户留存率 98%，说明大型企业锁定很深。三家大型经纪商的共同限制，是没有原生 STL
              多货主合并能力：它们可以手工安排多站点整车，但缺少实时匹配算法，无法把来自多个货主的部分货物分配到同一辆卡车上且不经过货站中介。STL 合并需要根本不同的调度模型；截至 May
              2026，主要经纪商尚未将其产品化。
