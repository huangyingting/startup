            title: 截至 May 2026 没有原生 STL 竞争者
            body: >
              经过多年投资和市场对卡车利用率低效的公开认知，仍没有 LTL 承运商或大型经纪商推出真正的多货主共享整车产品。Flock 的结构性先发位置强于一般意义上的领先时间：构建 STL
              匹配需要算法投入、承运商侧变革管理和通道密度，即使资金雄厚，也无法快速复制。
            calloutType: strength
            claimRefs:
              - CP023
              - CP032
          - type: callout
            title: 财务规模不对称带来并购或自建风险
            body: >
              C.H. Robinson、XPO 和 Uber Freight 合计收入超过 $26 billion，并具备资助竞争性 STL 产品的工程和商业资源。Flock 累计融资
              $395M，只相当于任何一家现有巨头年度自由现金流的一小部分。收购 Flock 本身，或由资金充足的经纪商发起激进 STL 研发冲刺，将是对 Flock 护城河最可信的威胁；Flock
              最好的防御，是继续保持品类领导力和承运商侧产品锁定。
            calloutType: risk
            claimRefs:
              - CP006
              - CP008
              - CP030
              - CP038
          - type: callout
            title: Convoy 重组验证 STL 相对纯数字经纪的优势
            body: >
              Convoy 在 2023 年缩减规模并转向市场模型；尽管它融资超过 $900M 并达到独角兽地位，这仍说明，如果缺少结构性产品差异化，轻资产数字经纪无法在规模上维持溢价利润率。Flock 的 STL
              模型恰好提供了纯 TL 数字经纪所缺的结构性差异：货主省钱并减少破损，承运商赚取溢价，Flock 从两端捕获利润。
            calloutType: insight
            claimRefs:
              - CP013
              - CP034
  - number: 4
    title: 财务情况
    sections:
      - number: '4.1'
        title: 收入模型与定价
        blocks:
          - type: paragraph
            body: >-
              Flock Freight 作为轻资产货运经纪商，经营三条收入流：共享整车运输（STL）、整车运输（FTL）和托管运输。STL 是核心创新——货主只为实际使用的拖车空间付费，而不是预订整辆拖车；Flock 的
              AI 把兼容货物拼到同一承运商车辆上。Flock 在每笔交易中作为主事方，按报价向货主收费，按谈判价格向承运商付款，并把价差留作总收入。STL 报价通常比等价 FTL 运价低
              20-35%，这个节省主张推动货主采用，同时 Flock 捕获拼载溢价。FTL 经纪则遵循标准现货 / 合约定价，并以 DAT 趋势线为基准。托管运输估计按货运支出收取 2-5%
              管理费，或为持续项目管理收取固定月费。STL AddOns 产品约在 2024-2025 年推出，把温控、升降尾板、保证运输时效等高级服务叠加到基础 STL
              订单上，以较低边际交付成本创造更高利润率的增购收入，并提高货主切换摩擦。
