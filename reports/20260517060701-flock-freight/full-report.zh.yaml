  - number: 3
    title: 竞争格局
    sections:
      - number: '3.1'
        title: 竞争格局概览
        blocks:
          - type: paragraph
            body: >
              Flock Freight 的竞争横跨三个层级。第一层是 $50.8 billion 的美国 LTL 行业，由重资产承运商主导——XPO（北美 LTL 收入约 $4.9B）、Old Dominion（收入约
              $5.5B）、FedEx Freight、Saia 和 ArcBest；它们各自运营数千个自有服务中心货站。第二层是大型货运经纪，由 C.H. Robinson（FY2025 总收入
              $16.2B）、RXO（FY2025 $1.71B）和 Uber Freight（估计经纪 GMV 达数十亿美元）领跑。第三层是数字原生挑战者，包括 Amazon Freight 和转型后的 Convoy
              市场。Flock 位于三层交叉处，是共享整车品类的开创者，采用轻资产、多货主合并模型，避开 LTL 货站，也不需要专属整车运力。截至 May 2026，尚无 LTL 承运商推出直接 STL
              产品；也没有大型经纪商把多货主整车合并产品化并规模化。没有 STL 选项时，货主的现状选择是承受 LTL 搬运破损、多付部分 FTL 成本，或自己管理多站点安排。Flock
              的差异化建立在三根支柱上：自有多货主路由算法、独家 STL 承运商网络，以及多年合并货载历史积累出的数据护城河。
