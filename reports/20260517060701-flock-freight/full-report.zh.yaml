      - number: '1.3'
        title: 融资历史与投资者基础
        blocks:
          - type: paragraph
            body: >
              Flock Freight 在 October 2021 完成 $215M 的 Series D，据报道投后估值达到 $1.4 billion，跻身独角兽。该轮由 SoftBank Vision Fund 2 和
              American Airlines Ventures 共同领投，GV（Google Ventures）、Volvo Group Venture Capital 和 Unshackled Ventures
              参投。此前轮次包括 Series A（约 $8M，2018）、Series B（约 $25.5M，2019）和 Series C（$56M，2020）；计入 Series D 后，估计累计融资约
              $300M。投资者组合具有战略意义：American Airlines Ventures 提供货运生态信誉和潜在商业合作入口；GV 带来技术平台扩张经验；SoftBank 提供大规模成长资本；Volvo
              Group Venture Capital 与车队和承运商网络利益一致。作为私营公司，Flock 未披露 Series D 之后的债务融资、收入、EBITDA 或烧钱速度。自 mid-2022
              开始的货运市场调整（发生在疫情期需求暴涨之后）显著压低全行业现货运价和货运量，也让 Flock 2021 年 $1.4B 估值在当前环境下是否仍站得住脚成为问题。截至 May
              2026，未有后续融资轮公开宣布，距离 Series D 已相隔约 4.5 年。
