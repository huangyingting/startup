        title: 扩张驱动与集中度风险
        blocks:
          - type: paragraph
            body: >-
              Flock 的先落地再扩张路径分三步：先用 STL 现货预订赢下货主（低摩擦切入）→ 转化为常规 STL 项目 → 叠加 AddOns 并升级到 Managed
              Transportation（高切换成本）。这一路径同时提高单客收入和留存。2024-2025 年推出的 STL AddOns 叠加层和 Guaranteed STL
              产品，明确用于扩张既有客户收入，符合在存量客户上做 NRR 扩张的打法。

              客户集中度风险无法量化——没有公开披露前几大客户收入占比。货运经纪天然对集中度敏感：总收入低于 $500M 的较小平台，前 5-10 大客户通常占比较高。Managed Transportation
              产品通过长期企业关系缓释集中度风险，但 MT 与交易型 STL/FTL 的收入占比未披露。Flock 在客户留存上的主要竞争威胁来自 CHRW、RXO 和
              Coyote；三者都有托管运输能力、更深的承运商网络和企业采购中更强的品牌认知。
