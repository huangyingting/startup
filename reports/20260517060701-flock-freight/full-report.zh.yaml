            body: >-
              CEO Oren Zaslansky 是 Flock 创始人，也是其 STL 类别定位的设计者。鉴于公司独特的市场位置、投资人关系，以及 STL
              类别由他构想并布道，他若离开将构成高影响执行风险。工程人才风险同样重大：Flock 在 San Diego 和更广泛的远程科技人才市场争夺软件工程师，对手能提供更高基础薪酬。

              2022-2023 年裁员可能导致承运商关系、工程和运营中的组织知识流失。规模化执行风险仍在：Flock 必须让承运商网络与货主需求同步增长，才能维持拼载质量。销售执行风险是结构性成本：Flock
              必须先教育市场理解 STL 类别，货主才可能评估它，这会增加销售周期摩擦。ATRI 2024 年关键问题报告将司机短缺列为卡车运输业首要担忧——这是 Flock 扩张承运商网络的结构性约束。
