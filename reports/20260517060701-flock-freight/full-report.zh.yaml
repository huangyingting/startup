              - CV037
              - CV040
      - number: '8.6'
        title: 展示材料
        blocks:
          - type: callout
            title: STL 专利作为定义类别的护城河
            body: >-
              Flock 持有共享整车匹配的首个且唯一美国专利，2022 年 1 月授予。没有其他货运经纪或数字平台展示出同等受专利保护的 STL
              匹配能力。这形成可防守的护城河，支持其相对普通货运经纪倍数享有有意义的溢价，也让 Flock 成为大型货运平台进入或扩张 STL 细分时有吸引力的战略收购标的。
            calloutType: strength
            claimRefs:
              - CV027
          - type: callout
            title: 优先股堆叠与收入不透明主导风险画像
            body: >-
              $395M 累计融资（可能带有清算优先权）与零公开财务指标叠加，形成严重风险集中。在低于 $400M EV 的悲观退出中，普通股持有人很可能一无所获。Convoy 关闭（2023 年 10 月，融资
              $900M，普通股零回收）是数字货运经纪领域最接近的先例；在经确认的收入规模和正向经营轨迹公开披露之前，必须把它视为现实下行情景。
            calloutType: risk
            claimRefs:
              - CV016
              - CV031
