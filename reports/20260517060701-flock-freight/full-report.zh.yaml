        - 管理层访谈；经审计财务报表；二级交易数据室访问
      - - 盈利能力和现金消耗
        - 经营利润率、EBITDA 和月度现金消耗未披露
        - 决定 Series F 是否必要及其时点；影响优先股包袱严重程度和普通股稀释冲击
        - 数据室；管理层访谈；投资人尽调权
      - - 优先股堆叠结构
        - $395M 融资的具体清算优先权条款未公开
        - 决定三种情景下普通股回收；实质影响投资人是否还有上行空间
        - 审查股权结构表；Series E 条款清单；投资人权利协议
      - - 专利有效性和覆盖宽度
        - 未找到公开的第三方 FTO 分析；STL 匹配专利未经诉讼检验
        - 核心护城河逻辑依赖专利；FTO 分析校准竞争覆盖范围和执法风险
        - 聘请专利律师做 FTO 审查；详细分析美国 STL 匹配专利的权利要求
      - - 货运周期收入暴露
        - Flock 在 2022 至 2023 年货运下行期间收入是否下滑及幅度均未公开量化
        - 校准悲观情景的关键；揭示经营杠杆、成本结构和最低可行收入底部
        - 管理层访谈；承运商网络数据；现货费率联动分析
      - - 客户和收入集中度
        - 前 10 大客户收入集中度未披露；承运商网络流失率不可得
        - 集中度高会放大单一客户流失带来的收入风险；流失数据能检验留存质量
        - 管理层；承运商和客户访谈；行业人脉访谈
    notes: 这些尽调问题是将信心从有条件持有上调至买入所需的最低信息集。收入披露和优先股堆叠条款优先级最高。
    claimRefs:
      - CV010
