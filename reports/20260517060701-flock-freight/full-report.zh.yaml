  - id: FE001
    title: 产品架构图
    type: stack
    layout: wide
    summary: Flock Freight 平台按四个技术层组织，从托运人界面到数据基础设施。
    approximationNotes: 层级边界由官方产品页面、招聘信号和行业描述推断；Flock 未发布架构图或技术文档。
