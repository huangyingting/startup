      - number: '8.3'
        title: 情景分析与敏感性
        blocks:
          - type: paragraph
            body: >-
              Flock 的估值区间从悲观的困境情景延伸到乐观的战略溢价情景。在基准情景中，预计 2026 至 2027 年总收入为 $300 million 至 $400 million，叠加 1.5 至 2.5x
              总收入的复苏倍数（反映 STL 专利相对普通货运经纪的溢价，以及货运市场以 3% 至 5% 货量 CAGR 复苏），得到 $600M 至 $1.25B 的基准企业价值。如果收入增长率超过 20% CAGR，且
              STL 市场成功扩张到 $25 billion 以上，Flock 可能重估至 2.5 至 4x 总收入，对应 $1.5B 至 $2.5B 的乐观 EV。该乐观情景要求收入确认超过 $400 million，或
              CHRW、XPO 或类似货运平台发布战略收购公告。悲观情景下，如果再次发生货运下行，或收入无法扩张到 $250 million 以上，倍数会压缩到 0.5 至 1x 的商品化底部，对应 $75M 至 $360M
              的 EV。在悲观情景 EV 下，$395M 优先股堆叠可能吸收全部退出收益，普通股价值归零。估值对未披露收入运行率、任何 M&A 交易的退出倍数，以及退出时货运市场所处周期阶段高度敏感。GlobalData
              预计美国公路货运量到 2028 年将以 4% 至 5% CAGR 增长，这支持基准情景，但若没有经确认的收入规模，单靠该增长不足以证明 2x 以上倍数重估合理。
            claimRefs:
