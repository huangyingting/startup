      - number: '1.5'
        title: 关键里程碑与竞争背景
        blocks:
          - type: paragraph
            body: >
              Flock Freight 的里程碑从 2015 年创立，延伸到 2021 年成为独角兽，并持续运营至 2026 年。公司拿到共享整车拼载技术的美国专利，针对潜在品类进入者建立知识产权护城河。B Corp
              认证（最近一次评估得分 80.3）以及入选 Inc. Magazine 2024 Pacific Regionals 榜单（#29），进一步强化品牌可信度。更大的竞争背景在 October 2023
              发生剧烈变化：由 Amazon、Bezos Expeditions 等出资超过 $900M 的数字货运经纪商 Convoy 突然关闭，理由是疫情后货运市场中的单位经济不可持续。Convoy
              倒下说明，当现货运价正常化，纯数字货运经纪商会面对严重的结构性利润压力，也凸显 Flock 差异化 STL 模型相对于大宗现货运价匹配的重要性。Flock 的 STL
              模型有专利保护，货主切换成本也高于标准经纪业务，因此对压垮 Convoy 的市场动力有一定隔离。但自 2021 年 Series D 之后，Flock
              未公开更新财务健康状况、估值轨迹或计划中的流动性事件；公司当前战略姿态仍是重大尽调缺口。
