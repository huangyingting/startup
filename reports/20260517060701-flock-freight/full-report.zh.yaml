        blocks:
          - type: paragraph
            body: >
              Flock 自称是美国最大的共享整车货运经纪商；这一市场地位来自公司自报，尚未被公开分析师报告独立验证。员工数 501–1,000（据 Inc. Magazine
              2024）说明公司已进入中期阶段，运营规模不小。公司的 2024 Impact Report（第四份年度报告，说明自 2020 年起持续披露）和 Smart Freight Centre
              认可，显示其可持续性跟踪已具备持续运营成熟度。符合 GLEC 的排放报告可为寻求 Scope 3 披露的大型企业货主提供碳数据，相比未认证货运经纪商形成差异化能力。官网货主案例称，相比传统整车替代方案节省
              $560K 和 $760K，并达到 97% 准点交付率，但这些是公司筛选的案例，而非独立验证的运营基准。客户数、净收入、总收入、净收入留存率和流失率未公开披露。平台接入主要 TMS 厂商，Flock 将其 STL
