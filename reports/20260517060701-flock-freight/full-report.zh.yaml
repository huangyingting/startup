      - number: '7.2'
        title: 运营、质量与网络安全风险
        blocks:
          - type: paragraph
            body: >-
              Flock 的核心运营风险是 AI 算法在低密度线路上失效。STL 拼载模式依赖足够线路密度来匹配兼容货物——如果某一起讫组合货量过薄，算法就无法有效拼载，只能转为 FTL，带来成本和利润率惩罚。Flock
              的算法质量尚无独立审计或第三方基准测试公开。

              平台可靠性是第二层运营风险：Flock 的多租户 SaaS 平台依赖云基础设施；一旦宕机，所有活跃货主会同时受影响。未发现公开 SLA、正常运行时间保证或 DRP 披露。货损索赔责任受 Flock
              经纪商身份限制——经纪商通常不对货损负责，除非其承担了承运商责任——但高知名度承运商事故带来的声誉风险是真实存在的。由于没有公开披露 SOC 2 Type II 或 ISO 27001
              认证，网络安全风险升高。FTC 数据安全指引要求经纪商用基本控制保护货主和承运商数据。
            claimRefs:
              - CR009
