      - number: '2.5'
        title: 市场约束与反向证据
        blocks:
          - type: paragraph
            body: >
              几项重大约束压低了市场机会。第一，也是最重要的一项，是货运市场周期性：2022–2023 年衰退中，现货运价从 COVID 时期高点大幅下跌，迫使数字经纪商在很薄甚至为负的利润率上竞争。虽然 2025–2026
              年数据表明市场正在稳定，经纪商利润率仍承受结构性压力：FreightWaves 报道称，现货与合约运价价差收窄正在考验 3PL，JB Hunt 的 Integrated Capacity Solutions
              经纪部门即使收入同比增长约 20%，毛利率仍下降 330 个基点。这种商品化动态并非 Flock 独有，而是影响所有货运经纪玩家。第二，Convoy 在 October 2023
              倒闭是高度负面的市场信号。Convoy 融资约 $900 million，在突然关闭前被广泛视为数字经纪品类领导者；它的失败说明，在货运下行期，技术和规模并不能保证单位经济可行。虽然 Flock 认为自己的
              STL 模型与 Convoy 的 FTL 大宗经纪结构不同，但两者都依赖承运商信任、货主货量和市场运价动态，底层变量高度重合。第三，没有独立发布的市场规模数据验证 Flock 最大 STL
              经纪商的说法；缺乏经审计货量数据时，公司自报的 TAM 框架无法核验。第四，Amazon Freight、Uber Freight 以及 C.H. Robinson
              自身技术投入等大型现有物流运营商，可能切入部分装载匹配；这个替代风险很难从公开来源量化，但必须密切跟踪。承运商分散使 Flock 的数字聚合模型可行，但未来也可能被资产型承运商或更大平台以具竞争力成本直接提供的
              STL 式拼载打断。
