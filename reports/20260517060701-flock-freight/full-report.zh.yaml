      - number: '5.4'
        title: 差异化与知识产权
        blocks:
          - type: paragraph
            body: >-
              Flock 的核心差异化来自其共享整车匹配方法的美国专利——截至申请日，这是行业首个且唯一的同类专利。该专利覆盖识别兼容货物并拼入共享拖车的算法流程，为 Flock 防住 STL 模式的直接复制提供法律屏障。该
              IP 位置又被两项自我强化优势放大。第一是网络效应：每条线路上的货主越多 → 拼载机会越多 → 费率和时效精度越好 → 更多货主采用。第二是数据积累：每一单 STL
              预订都会贡献专有线路、费率和承运商表现数据集；没有 STL 货型的既有玩家无法复制。CEO 曾表示，Flock 的 AI 是为 STL 专门打造的，不是从 LTL
              场站逻辑或标准货板匹配改造而来，因此差异化是结构性的，不是渐进式。B Corp 认证为重视可持续性的货主提供第二层差异化。
