  - number: 2
    title: 市场分析
    sections:
      - number: '2.1'
        title: 市场边界与定义
        blocks:
          - type: paragraph
            body: >
              Flock Freight 竞争的市场是美国公路货运经纪，具体落在它命名为共享整车运输（STL）的子品类。更广义的货运生态把公路货运分成三种主要模式：整车运输（FTL），即一个货主占用整辆 53-foot
              拖车；零担运输（LTL），即多个货主的小票货物在承运商货站合并；以及面向不足托盘货物的包裹或小件网络。Flock 将 STL 定义为占用 10 to 40 linear feet 拖车空间的货物——太大，LTL
              货站网络难以高效处理；又太小，不足以支撑整车成本。这个中间段的现状方案通常是多花钱买 FTL 运力，或接受 LTL 换装的破损风险，让货物在区域货站多次换车。Flock 的核心主张是，STL
              把同一线路上两到四票兼容货物拼到一辆卡车上，形成不经停、无枢纽路线，从而消除货站接触。LTL 承运商——XPO Logistics、Old Dominion Freight Line、FedEx Freight
              和 Saia——是 Flock 所切入货物尺寸段的主要现有玩家。C.H. Robinson、Echo Global、Coyote 和 RXO 等传统货运经纪商，则代表 Flock 所处的更广义经纪
              TAM。相邻市场包括按托盘计的 LTL、加急货运和托管运输服务，Flock 也提供这些服务。关键边界问题仍未在公开来源中解决：LTL 和 FTL 收入中有多大比例能被 STL 拼载现实地触达。Flock
              估计道路上 50% 的卡车未装满，这意味着理论机会很大，但公司没有提供经审计的货量或渗透率数据来支撑这一说法，也没有量化可被竞争性替代的市场。
            claimRefs:
              - CM001
              - CM002
              - CM003
              - CM004
              - CM005
              - CM006
              - CM007
              - CM008
