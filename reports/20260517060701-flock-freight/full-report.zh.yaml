      - number: '3.2'
        title: LTL 现有玩家：资产基础设施既是护城河，也是约束
        blocks:
          - type: paragraph
            body: >
              XPO Inc. 和 Old Dominion Freight Line（ODFL）是北美收入最高的两家独立 LTL 承运商。XPO 报告 FY2025 合并收入 $8.2 billion，其中北美 LTL
              分部占最大份额；ODFL 报告 FY2025 收入约 $5.5 billion，低于 FY2024 的 $5.8 billion，原因是 LTL 货量走弱。ODFL 长期实现接近 71%
              的行业最佳营运比率，反映出货站利用率纪律。两家公司都围绕服务中心密度、确定日期交付窗口和无索赔表现竞争；ODFL 尤其向运输高价值货物的货主强调低破损索赔记录。Saia 和 ArcBest
              处于相似细分市场，但没有匹配 ODFL 的营运比率领先地位。按 Transport Topics 的说法，FedEx Freight 是美国市场份额最大的 LTL 承运商，叠加 FedEx
              品牌和包裹网络邻接。LTL 现有玩家在 STL 语境下的结构性限制，正是它们的商业模式本身：每票 LTL 货物都会触达多个货站，带来搬运破损和合并延误。主要 LTL 承运商都没有推出无枢纽、多货主 TL
              产品来直接复制 STL。它们的资本部署在自有货站网络中——这是沉没成本，也构成向 STL 模型转向的障碍。若 Flock 的 99.8% 无破损交付说法能在规模上得到验证，将直接击中 LTL 公认的阿喀琉斯之踵。
