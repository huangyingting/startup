  - number: 5
    title: 产品与技术
    sections:
      - number: '5.1'
        title: 产品与服务定义
        blocks:
          - type: paragraph
            body: >-
              Flock Freight 提供一个一体化货运服务平台，覆盖三条主要服务线，并不断扩展高级附加服务。站在货主视角，核心流程是：输入货运详情（起点、终点、尺寸、重量、时间）→ 获得共享或整车拖车空间的即时报价 →
              在单一门户中预订、跟踪并结算货运。对承运商而言，Flock 通过拼载交付满载拖车——相对于行业平均超过半空载的货载，提高利用率。客户体验把承运商匹配、拼载优化和结算的复杂性，抽象成一次单平台交互。Flock
              将自己定位为技术驱动的货运网络，而不是经纪商；它启用了一种此前并不存在的标准化新货载类型——共享整车。
