  - id: FU001
    title: 客户旅程地图
    type: journey-map
    layout: wide
    summary: Flock Freight 客户生命周期端到端梳理——从托运人发现，到品类采用、重复项目，再到企业扩张。
    approximationNotes: 旅程阶段由产品结构和行业报道推断；没有公开的内部 CRM 或客户生命周期数据。
    claimRefs:
      - CU001
      - CU005
      - CU027
      - CU034
      - CU037
    data:
      items:
        - label: 认知
          detail: 托运人通过货运行业报道（FreightWaves）、同行推荐或可持续 / ESG 线索接触 Flock。痛点被识别出来：LTL 货损和终端成本、FTL 挂车利用不足。B Corp 品牌吸引重视 ESG 的采购团队。
          touchpoints:
            - FreightWaves 及行业媒体对 STL 品类的报道
            - 可持续性 / Scope 3 减排信息
            - 面向中端市场和企业账户的直销触达
        - label: 首次预订（评估）
          detail: 托运人在 Flock 门户或通过 API 提交货运需求，收到即时 STL 报价。首次预订摩擦低：无需长期承诺。托运人把服务质量、运输时长和无损交付与过去的 LTL 体验对比。
          touchpoints:
            - Web 门户或 API 询价请求
            - 与既有 LTL 承运人的价格对比
            - 首票运输体验（承运人分配、跟踪、准时交付）
        - label: 重复使用 / 项目采用
          detail: 托运人在稳定线路上转为常规 STL 项目，开始用 STL 替代一部分明确的 LTL 运量。重复预订积累线路历史。专业货运可加入 STL AddOns（温控、升降尾板）。运营团队把预订嵌入标准工作流。
          touchpoints:
            - 核心线路的重复预订节奏
            - 与 Flock 销售团队讨论 STL AddOns
            - 面向采购团队的成本节省材料
        - label: 加入托管运输
          detail: >-
            企业托运人把 STL 和 FTL 项目整合到 Flock 的 Managed Transportation 服务下，完成与 SAP 或同类系统的 TMS 集成。Flock
            在全量货运项目中管理承运人组合、优化和绩效报告，建立高转换成本。
          touchpoints:
            - 面向供应链副总裁或运输总监的 MT 销售接触
            - SAP TMS 集成（2022 年确认入围）
            - 季度业务回顾和 KPI 报告
        - label: 扩张 / 倡导
          detail: 托运人把项目扩展到更多线路、货运类型或业务单元。对可靠性敏感线路加入 Guaranteed STL。可能成为参考客户（未明说，因为 Flock 没有公开具名案例）。续签多年期 MT 合作。
          touchpoints:
            - 新增线路覆盖
            - 对时效敏感货运加入 Guaranteed STL
            - Managed Transportation 合同续签
