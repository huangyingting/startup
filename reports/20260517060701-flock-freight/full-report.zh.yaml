      - number: '2.4'
        title: 增长驱动因素
        blocks:
          - type: paragraph
            body: >
              Flock 的 STL 市场有四个结构性增长驱动因素。第一，电商扩张不断把货运切成更小、更高频的批次，这些货物比 FTL 更贴合 STL 画像。Amazon FBA 和 Walmart Fulfillment
              卖家要求精确交付窗口，而 LTL 承运商因多货站处理难以保证；STL 的不经停路线直接解决这个痛点，由此形成的电商货主需求已在 FreightWaves 报道中得到独立验证。第二，可持续性要求正在强化：Flock
              称每票运输相比标准 LTL 路线少 40% 碳排放；当大型企业货主在 GHG Protocol 框架下面对 Scope 3 排放报告要求，STL 的减排论点就从营销卖点变成采购标准。Flock 的 B Corp
              认证和符合 GLEC 的可持续性报告，使其能承接 ESG 驱动的采购。第三，供应链数字化——运输管理系统普及和 API 优先的物流编排——降低了货主试用非传统货运模式的切换成本；Flock 对 e2open 和
              Oracle OTM 的集成，直接压低大型企业采用摩擦。第四，承运商侧持续存在结构性低效（按 Flock 估计，卡车利用率 50%），意味着拼载装车的供给侧经济性仍有利：承运商获得更好的装载率，Flock
              从优化中捕获利润。行业观察者把 2026 年货运市场描述为重置之年；在 2022–2023 年现货运价调整之后，均衡正在重新出现，这应会让需求能见度正常化，并支持成熟经纪平台的合约货运增长。
