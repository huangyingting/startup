      - number: '3.4'
        title: 数字挑战者与相邻平台
        blocks:
          - type: paragraph
            body: >
              Amazon Freight 为外部货主提供整车经纪服务，利用 Amazon 的承运商网络、GPS 跟踪拖车车队和数据基础设施。服务通过自助即时报价触达中小企业，并通过专属销售团队服务大型企业货主。Amazon
              的竞争优势在于它自身物流运营覆盖通道中的承运商密度；劣势则是 Amazon Prime 货量稀薄线路上的覆盖不确定。Amazon Freight 不提供 STL 或多货主合并产品；其 LTL
              产品是经纪服务，而非自营运输。Convoy 是一家位于 Seattle 的数字货运经纪商，融资超过 $900 million，曾达到独角兽地位；在 October 2023
              缩减运营后，它已把自身重新定位为面向货运经纪商和承运商的技术市场，而不再作为直接经纪商运营。Convoy
              平台现在促进经纪商（而非货主）与承运商之间匹配，竞争姿态已经完全改变。LoadSmart、GlobalTranz（被 Echo Global 收购，后者由 WWEX 持有）和其他数字 TL
              经纪商运营在相邻细分市场，但尚未开发 STL 产品。Coyote Logistics（被 UPS 收购）服务大型货主，提供 TL 经纪，但在 STL 能力上与 CHRW 和 RXO
              属于同一类。挑战者层级的整体图景表明，截至 May 2026，没有一家数字原生货运科技公司构建出 Flock 的直接 STL 竞争对手；Convoy 的重组也说明，轻资产纯数字经纪模型面临结构性盈利约束。
