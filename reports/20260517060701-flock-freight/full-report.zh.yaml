            body: >-
              Flock 的产品组合包括六个明确模块或服务线。共享整车运输（STL）是创始产品，也是专利产品——第一个标准化拼载整车产品，并拥有专门的美国专利。整车运输（FTL）经纪把 Flock
              覆盖延伸到整拖车需求，并在线路不适合拼载时变现网络。托管运输把 STL 和 FTL 包装成大型企业货运项目管理服务，包括 TMS 层优化、报告和承运商管理。STL AddOns 是约在 2024-2025
              年推出的高级服务叠层，让货主在基础 STL 订单上增加温控、升降尾板、室内交付和保证运输时效。Flock Platform 是技术产品本身——面向货主的网页门户和 API 层。Carrier Network
              是供给侧资产：经过筛选的卡车运输合作伙伴池，配有标准化入驻、合规和绩效跟踪。这些模块共同覆盖货主从交易型现货货载到企业货运项目的完整工作流。
