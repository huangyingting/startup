      - number: '4.2'
        title: 单位经济与利润率结构
        blocks:
          - type: paragraph
            body: >-
              Flock 未公开披露单位经济。使用上市可比公司数据进行的行业代理分析显示，数字货运经纪商通常实现 8-18% 的净收入利润率（毛利占总收入比例）。美国最大货运经纪商 C.H. Robinson（CHRW）报告
              FY2025 总收入 $16.2 billion，合并净收入约 $1.46 billion，隐含混合净利润率约 9%。RXO 是 November 2022 从 XPO 分拆出来的轻资产 TL 经纪商，其 TL
              经纪利润率区间为 12-15%。Flock 的 STL 模型在结构上有机会取得高于纯现货 TL 经纪的毛利率：拼载为货主和承运商同时创造效率价值，使 Flock 可以保留任何一方单独都无法取得的溢价。2024 年
              Flock 研究中“58% 卡车半空载”的发现，确认了该模型所解决低效的市场级规模。但如果没有管理层披露，实际利润率幅度无法验证。AI/ML 货载匹配的技术成本是持续 OPEX
              投入；在高密度线路上，承运商获取的边际成本较低，但仍包含不小的入驻和合规开销。企业托管运输客户 CAC 更高（估计 3-6 month 销售周期），但 LTV 强于交易型现货货载。
