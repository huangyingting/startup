            body: >-
              Flock 的采用轨迹可以概括为：2021 年前早期增长强劲（Series D，估值 $1.4B）；2022-2023 年货运市场下行期间显著收缩（2022 年 11 月和 2023 年 1
              月裁员）；2024-2025 年部分恢复。到 2024 年，FreightWaves 称 Flock “正低调成为最大的 STL 供应商”——这暗示 Flock
              在自己开创的货运细分中占据主导类别份额。但具体货主数量、货运量和收入轨迹均未公开。

              Transport Topics 的美国 50 大货运经纪年度榜单以及 Armstrong & Associates 的配套榜单，都没有明确把 Flock 列入第一梯队，说明其总经纪总收入可能低于前 50
              名企业常见的 $1B 门槛——但这与 Flock 作为专业 STL 平台、而非全服务货运经纪的定位一致。Truckstop.com 数据和 McKinsey 对货运经纪市场的分析显示，该行业有 $100B+
              的总收入潜力，为 Flock 从 LTL 和 FTL 替代方案中转化货主提供了足够大的池子。
