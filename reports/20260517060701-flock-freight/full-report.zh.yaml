      - number: '8.4'
        title: 风险因素与投资逻辑破裂触发点
        blocks:
          - type: paragraph
            body: >-
              四项风险因素最实质影响投资逻辑。第一，$395M 融资带来的优先股堆叠按标准风险投资条款通常带有 1x 或更高清算优先权，任何低于约 $400M 至 $500M EV
              的退出都可能让普通股无法回收。第二，Flock 在 2022 至 2024 年货运下行期间的收入轨迹完全未量化，悲观情景只能靠行业数据推断，而非经确认的公司指标校准。第三，STL
              专利是核心差异化，但其有效性和竞争覆盖宽度尚未在诉讼中被检验；第三方成功设计绕开将把 Flock 重估为商品化倍数。第四，更广泛的数字货运市场承受了显著结构性压力：Convoy 融资 $900M
              后关闭，Flexport 多次重组，且没有风险投资支持的数字货运平台在规模化后被确认实现盈利。没有第三方证据显示 Flock 正接近盈利；可比规模的数字货运同行通常维持负经营利润率。SoftBank 董事席位和
              GV 自 2018 年以来的投资降低了短期困境风险，但无法消除。下列任一投资逻辑破裂触发点出现，都会把确信度从有条件持有转为立即退出。
