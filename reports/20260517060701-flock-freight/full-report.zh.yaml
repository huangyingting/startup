  - number: 7
    title: 风险
    sections:
      - number: '7.1'
        title: 监管与法律风险
        blocks:
          - type: paragraph
            body: >-
              Flock 的首要监管义务是 FMCSA 货运经纪牌照，受 49 CFR Part 371 及相关 FMCSA 规则约束。该牌照要求 $75,000 保证债券、承运商透明度和记录保存合规。截至 2026 年 5
              月，公开记录中未发现针对 Flock 的 FMCSA 执法行动或民事诉讼。Federal Register（FR 2023-26449）和 DOT
              网络安全指引反映了经纪监管方向：监管压力正在加大，要求经纪商采用反双重经纪措施、承运商验证系统和数据安全控制。

              Flock 的 STL 专利（美国；2022 年 1 月授予）是公司最重要的法律资产，也是关键 IP 风险。如果竞争对手认为该专利过宽，可能在 USPTO
              发起多方复审（IPR）挑战。美国以外的国际专利保护尚未确认。California AB5 及类似零工经济法律带来潜在的承运商司机重新分类风险，不过该风险主要落在承运商雇主身上，而非作为经纪商的
              Flock。数据隐私合规（CCPA、新兴州级法律）是不断增长的义务；FTC 指引要求货运经纪维护基本网络安全控制，保护货主和承运商数据。
