      - number: '8.5'
        title: 建议与最终尽调问题
        blocks:
          - type: paragraph
            body: >-
              总体建议是有条件持有或观察。Flock 是 STL 细分中真正的类别创造者，持有耐久的美国专利，并处在庞大且结构性低效的货运市场。但相对于不确定估值而言优先股堆叠偏高、收入和利润率完全不透明，再加上 Convoy
              和 Flexport 证明数字货运脆弱的先例，意味着不应在 $1.0B EV 以上新建仓位。若进入价格在 $800M 至 $1.0B EV，前提是确认总收入至少 $300M
              且具备正增长动能。主要预警阈值是：在当前货运复苏周期内，连续两年收入增长低于 10% CAGR。关键尽调问题——经确认的收入规模、优先股堆叠结构、专利 FTO
              分析、货运周期暴露量化——是把确信度上调至买入的主要障碍。若出现 EBITDA 转正数据点，或披露由可信机构投资人参与、EV 高于 $1.2B 的 Series
              F，足以支持上调确信度。在这些证据出现前，场外观察并通过二级渠道寻求数据室访问，是更合适的定位。
            claimRefs:
              - CV037
              - CV038
              - CV039
              - CV040
              - CV041
