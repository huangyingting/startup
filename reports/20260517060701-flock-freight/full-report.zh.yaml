      - number: '2.2'
        title: 市场规模——多重视角
        blocks:
          - type: paragraph
            body: >
              研究期间未能获取可量化美国 STL 市场规模的独立分析师报告；所有规模估计都必须来自代理指标和 Flock
              自己未经验证的说法。市场分析可用三个互补视角来搭建。第一，自上而下锚定美国整体卡车运输和货运经纪行业。American Trucking Associations 和 FMCSA 报告称，截至 June
              2025，美国约有 580,000 家活跃机动车承运商，其中 91.5% 运营十辆或更少卡车，证实了极度分散的行业结构，也给数字聚合商和经纪商留下机会。根据 ATA 经济数据和 Bureau of
              Transportation Statistics 货运数据，美国卡车运输行业年收入广泛估计在 $875 billion 以上。货运经纪市场可从主要上市公司收入推算：美国最大货运经纪商 C.H. Robinson
              在 fiscal year 2025 报告总收入 $16.2 billion，服务 450,000+ 合同承运商和 75,000+ 客户。若 CHRW 约占美国货运经纪总市场的 10–12%，隐含市场规模为
              $130–165 billion。第二，运力利用率视角使用 Flock 未验证的说法，即道路上 50% 的卡车未装满：即便保守假设 10% 低利用率 TL 运力转向 STL
              式拼载，也对应数百亿美元可触达支出。第三，数据基础设施视角：DAT Freight & Analytics 称其每年分析 $1 trillion
              货运交易数据，说明市场基础设施成熟，但公开数据中仍无法量化数字化收入占比。缺乏任何独立 STL 市场规模估计，是重大尽调缺口；解决它需要直接买方访谈和 Flock 内部数据。
