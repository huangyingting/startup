          - type: callout
            title: STL 算法质量看似可信，但未经审计
            body: >-
              Flock 的 AI 专为 STL
              打造、结构上优于既有玩家，这一说法来自管理层并可由专利推断，但尚未经过独立验证。没有基准测试、第三方审计或学术论文佐证算法性能声明。尽调应技术审查匹配引擎在低密度线路上的准确性；这些线路最难实现拼载。
