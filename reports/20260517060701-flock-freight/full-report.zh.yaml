  - id: FM004
    title: 采用漏斗或价值链地图
    type: funnel
    layout: standard
    summary: 六阶段漏斗，追踪托运人从最初发现 STL 到完整企业级托管运输的旅程。每个阶段代表 Flock 获得的不同承诺程度和单客户收入里程碑。
    approximationNotes: 阶段名称和描述基于 Flock 已发布产品材料及 FreightWaves 报道。阶段之间转化率未公开披露。
    data:
      items:
        - label: 识别 STL 用例
          value: 100
          detail: 托运人有 10–40 LF 货物，LTL 会带来货损，FTL 又浪费成本；因此把 STL 视为可行替代运输方式。
          tone: neutral
        - label: 通过 FlockDirect® 试运
          value: 40
          detail: 托运人询价并预订一次 STL 试运；无需长期承诺。Flock 与既有 LTL 和 FTL 报价竞争。
          tone: positive
        - label: TMS / API 集成
          value: 20
          detail: 企业托运人把 Flock 接入 e2open 或 Oracle OTM TMS，在既有物流流程中自动预订 STL，降低持续使用摩擦。
          tone: positive
        - label: 常规合约 STL 线路
          value: 12
          detail: 托运人以承诺运量建立经常性合约 STL 线路。Flock 在托运人网络中优化这些线路的拼载，提高承运人资产利用率。
          tone: positive
        - label: 企业级托管运输
          value: 5
          detail: 托运人把完整线路管理和货运模式优化外包给 Flock，由 Flock 在托运人的全量业务中决定 STL 与 FTL 的分配。该阶段单客户收入最高。
          tone: positive
        - label: 倡导与同行推荐
          value: 3
          detail: 满意的企业托运人在行业网络内推荐同行，降低 Flock 的获客成本，并在高价值货运走廊扩大网络密度。
