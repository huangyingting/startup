  - id: TV005
    title: 打破投资逻辑的触发项和预警条件
    columns:
      - 触发项
      - 阈值
      - 对投资逻辑的传导
      - 行动含义
    rows:
      - - 收入增长停滞
        - 货运市场复苏期间，总收入 CAGR 连续两年确认低于 10%
        - 基准 EV 向悲观情景（$75M 至 $300M）塌缩；优先股堆叠有完全吃掉价值的风险
        - 退出或减记；只有在 $300M 至 $500M 入场点且有新收入证据时再评估
      - - 惩罚性融资
        - Series F 隐含 EV 低于 $600M，且带有高级清算优先权或苛刻条款
        - 释放经营困境信号；现有股权被大幅稀释或清零
        - 交割前退出或参与重组；评估二级债务市场替代方案
      - - 专利无效或规避设计
        - USPTO 多方复审使 STL 匹配专利无效，或主要竞争对手大规模推出竞争性 STL 产品
        - 护城河消失；Flock 只能拼价格；重估至普通货运倍数，即总收入 0.5 至 0.9x
        - 立即下调信心；按普通货运倍数假设，在 $200M 至 $400M EV 重新评估
      - - 现金跑道危机
        - 披露或估计现金跑道不足六个月，且没有确认的新资本承诺
        - 灾难性；可能出现 Convoy 式关闭；普通股很可能零回收
        - 立即退出；与二级市场投资人或顾问讨论重组选项
      - - CHRW 或 RXO 推出 STL 产品
        - CHRW、RXO 或 Uber Freight 在 18 个月内以有意义规模推出竞争性 STL 匹配产品
        - 专利护城河受到挑战；市场份额和定价权被侵蚀；重估至悲观情景
        - 密切跟踪；若两个季度内货量下滑落地，触发悲观情景估值
    notes: 触发阈值为近似值，基于行业基准和标准风险投资组合管理实践。截至 2026 年 5 月，Flock 的实际财务健康、现金跑道和竞争情报均未公开。
