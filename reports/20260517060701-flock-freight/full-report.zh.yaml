        - 第 3 年
      rows:
        - label: 企业 MT 队列（估算）
          values:
            - 87
            - 79
            - 72
        - label: 即期 STL 队列（估算）
          values:
            - 62
            - 48
            - 38
        - label: 混合项目队列（估算）
          values:
            - 72
            - 60
            - 51
  - id: FR001
    title: 风险热力图
    type: matrix
    layout: wide
    summary: 按发生可能性和已知缓释措施后的剩余严重性，绘制 Flock Freight 关键风险。
    approximationNotes: 风险发生可能性和严重性评级均为分析师估算；Flock 未公开披露内部风险框架。
    claimRefs:
      - CR009
      - CR013
      - CR027
      - CR031
      - CR036
      - CR040
    data:
      columns:
        - 低剩余严重性
        - 中等剩余严重性
        - 高剩余严重性
      rows:
        - label: 高可能性
          values:
            - label: —
            - label: 司机短缺 / 承运人运力约束（结构性市场问题）
            - label: 货运市场周期性——2022-2023 年已经验证
        - label: 中等可能性
          values:
            - label: 监管合规（CCPA、经纪商规则）——正在缓释
            - label: 平台宕机 / 云依赖；SAP 集成风险
            - label: AI 算法在低密度线路失效；网络安全泄露
        - label: 低可能性
          values:
            - label: FMCSA 执法（无历史记录）；CEO 离任（自愿）
            - label: SoftBank 投资人压力；STL 专利 IPR 挑战
            - label: 专利失效（低概率，但一旦发生影响很高）
  - id: FR002
    title: 风险传导图
    type: dag
    layout: wide
    summary: Flock 的主要风险向量如何经运营传导至收入、利润率、客户和估值。
    approximationNotes: 风险传导路径由分析师构建；Flock 尚未披露内部风险传导模型。
    claimRefs:
      - CR027
      - CR028
      - CR029
      - CR030
      - CR031
      - CR032
      - CR033
    data:
      nodes:
        - id: r1
          label: 货运市场下行
          detail: 即期运价崩塌会压低托运人对 STL 和 FTL 的需求，直接冲击货量和收入
        - id: r2
          label: AI 算法失效
          detail: 低密度线路拼载不佳会推高承运人成本和托运人运输时间，削弱 STL 竞争力
        - id: r3
          label: 网络安全泄露
          detail: 托运人 / 承运人数据泄露会触发监管罚款、诉讼和信任受损
        - id: r4
          label: 专利失效
          detail: STL 专利 IPR 若成功，IP 护城河会被拆掉；竞争对手可能复制 STL 匹配
        - id: r5
          label: 收入收缩
          detail: 市场下行、算法失效或客户流失的直接结果；减少经营现金流
        - id: r6
          label: 利润率挤压
          detail: FTL 商品化竞争；算法偏离造成 STL 定价过低；承运人费率飙升
        - id: r7
          label: 融资风险
          detail: 收入 / 增长下降 → 融资轮变小、估值降低、稀释加重；Series E 已露出早期信号
        - id: r8
          label: 估值影响
          detail: 收入收缩 + 利润率挤压 + 风险折价上升共同作用
      edges:
        - from: r1
          to: r5
          label: 货量下降
        - from: r1
          to: r6
          label: 即期运价压力
        - from: r2
          to: r6
          label: STL 成本上升
        - from: r3
          to: r5
          label: 客户流失
        - from: r3
          to: r7
          label: 投资人担忧
        - from: r4
          to: r6
          label: 竞争者进入
        - from: r5
          to: r7
          label: 增长减速
        - from: r6
          to: r7
          label: 单位经济恶化
        - from: r7
          to: r8
          label: 隐含价值下降
        - from: r5
          to: r8
          label: DCF 压缩
  - id: FR003
    title: 依赖关系图
    type: dag
    layout: wide
    summary: 监管、技术、资本和市场维度的关键外部依赖。
    approximationNotes: 依赖结构由产品架构、监管要求和投资人披露推断；未经 Flock 确认。
    claimRefs:
      - CR016
      - CR017
      - CR018
      - CR019
      - CR020
      - CR021
    data:
      nodes:
        - id: d1
          label: FMCSA 经纪商牌照
          detail: 美国货运经纪业务必需的联邦牌照；需要持续保证金和合规
        - id: d2
          label: 云基础设施提供商
          detail: 未披露；平台、算法和数据存储托管在外部云上；存在单一提供商依赖
        - id: d3
          label: 承运人网络
          detail: 经过筛选的卡车运输合作伙伴供给池；STL 拼载质量取决于线路密度
        - id: d4
          label: 市场运价数据源（DAT/Truckstop）
          detail: Flock 定价引擎的实时即期运价输入；存在供应商依赖
        - id: d5
          label: SoftBank（领投方）
          detail: Series D 起最大的机构投资人；董事会影响力和资本获取依赖
        - id: d6
          label: SAP TMS 集成
          detail: 企业 MT 产品集成点；对 SAP 生态存在 API 依赖
        - id: d7
          label: Flock 平台
          detail: 核心运营资产；所有托运人和承运人交互都经过该平台
      edges:
        - from: d1
          to: d7
          label: 运营牌照
        - from: d2
          to: d7
          label: 基础设施
        - from: d3
          to: d7
          label: 货源供给
        - from: d4
          to: d7
          label: 定价输入
        - from: d5
          to: d7
          label: 资本与治理
        - from: d6
          to: d7
          label: 企业渠道
  - id: FV001
    title: 投资建议逻辑
    type: flow
    layout: standard
    summary: >-
      流程图追踪五项核心证据输入如何导向有条件持有建议。已验证的市场机会和专利保护产品护城河，部分支撑乐观逻辑；完整的财务不透明、周期峰值估值历史，以及 Convoy
      已验证的模式风险，则是压制因素，阻止给出直接买入建议。图中显示，在当前信息状态下，两个负面因素压过两个正面因素。
    approximationNotes: 流程代表定性投资逻辑。各输入的置信权重仅为示意，并非来自正式量化评分模型。
    claimRefs:
      - CV001
      - CV007
      - CV016
      - CV017
      - CV022
      - CV031
    data:
      nodes:
        - id: N1
          label: 市场已验证
          description: 美国货运经纪总可用市场（TAM）为 $85B 至 $90B；STL 子赛道为 $15B 至 $20B；货运复苏自 2024 年下半年启动
        - id: N2
          label: 专利产品护城河
          description: 美国 STL 匹配专利于 2022 年获批；FreightWaves 2024 称其为最大 STL 提供商；B Corp 差异化
        - id: N3
          label: 财务不透明风险
          description: 未披露收入、利润率或增长指标；累计融资 $395M，优先权结构未披露
        - id: N4
          label: 周期峰值估值
          description: 2021 年以 $1.4B 进入，正逢货运超级周期和科技倍数峰值；基准情景公允价值 $700M 至 $1.2B
        - id: N5
          label: 数字货运模式风险
          description: Convoy 于 2023 年 10 月关闭，此前融资 $900M；Flexport 重组；资产轻模式脆弱性已验证
        - id: N6
          label: 有条件持有 / 观察
          description: 不要在 EV 高于 $1.0B 时入场；确认总收入达到或高于 $300M 后，入场估值应在 $800M 至 $1.0B
      edges:
        - from: N1
          to: N6
          label: 部分支撑乐观情景
        - from: N2
          to: N6
          label: 专利护城河支撑溢价
        - from: N3
          to: N6
          label: 主要负面因素——主导不确定性
        - from: N4
          to: N6
          label: 需要入场价格纪律
        - from: N5
          to: N6
          label: 抬高模式脆弱性风险
  - id: FV002
    title: 估值对 EV/总收入倍数的敏感性
    type: bar
    layout: standard
    summary: >-
      柱状图展示八种 EV/总收入倍数情景下的隐含企业价值（百万美元），从 0.5x（困境商品化底部）到 5.0x（STL 平台峰值溢价），锚定估算总收入约 $300M。该图显示，2021 年 $1.4B 独角兽估值需要约 4.5x
      至 5x 总收入；这一峰值倍数必须有已确认的品类领导地位和强劲收入增长才能支撑。当前公开可比公司区间（CHRW 0.65x、RXO 1.5x）给出 $200M 至 $450M EV 的悲观到基准区间，STL 专利溢价则支撑
      $600M 至 $900M 的 2.0x 至 3.0x 基准。
    approximationNotes: 所有数值单位均为百万美元。$300M 估算总收入为中点估计；Flock 未公开披露收入。倍数参考 CHRW（0.65x）、RXO（1.5x）和私有平台可比公司。2021 年独角兽轮隐含约 4.5x 至 5x 远期总收入。
    claimRefs:
      - CV021
      - CV022
      - CV023
      - CV041
    data:
      items:
        - label: 0.5x 总收入（困境底部）
          value: 150
          detail: $300M 估算总收入 x 0.5x；低于 CHRW 倍数；困境或商品化经纪商情景
        - label: 1.0x 总收入（悲观）
          value: 300
          detail: $300M x 1.0x；处于 CHRW 等效总收入倍数；不给予 STL 溢价
        - label: 1.5x 总收入（悲观-基准）
          value: 450
          detail: $300M x 1.5x；等于 RXO 当前交易倍数；部分给予 STL 差异化信用
        - label: 2.0x 总收入（基准低端）
          value: 600
          detail: $300M x 2.0x；基准情景中段；STL 护城河部分计入价值；持有区间下沿
        - label: 2.5x 总收入（基准）
          value: 750
          detail: $300M x 2.5x；基准情景中枢；反映相对商品化经纪商的专利溢价
        - label: 3.0x 总收入（基准高端）
          value: 900
          detail: $300M x 3.0x；基准情景上沿；需要确认收入增长和货运复苏
        - label: 4.0x 总收入（乐观）
          value: 1200
          detail: $300M x 4.0x；乐观情景；品类领导者且 $400M+ 收入轨迹已确认
        - label: 5.0x 总收入（2021 年峰值隐含）
          value: 1500
          detail: $300M x 5.0x；约等于 2021 年独角兽倍数；需要完整 STL 市场领导地位
  - id: FV003
    title: 按退出情景划分的企业价值和回报区间
    type: range
    layout: standard
    summary: >-
      区间图展示五种情景下的低位、基准和高位企业价值估算，单位均为百万美元：悲观情景、基准情景、乐观情景、战略收购和 IPO 情景。悲观情景（$75M 至
      $360M）反映商品化倍数压缩，以及潜在优先权吸收导致普通股价值归零。基准情景（$600M 至 $1.25B）反映在估算总收入 $300M 至 $400M 上叠加 STL 相对商品化的溢价。乐观情景（$1.5B 至
      $2.4B）和战略收购情景（$1.2B 至 $2.2B）反映已确认的品类领导地位或溢价 M&A 交易。
    approximationNotes: >-
      所有数值单位均为百万美元。收入估算基于分析师 $200M 至 $500M 区间，属于近似值；Flock 未披露财务数据。战略收购溢价假设在独立价值上有 20% 至 30% 控制权溢价。IPO
      情景假设货运科技可比倍数和市场接纳度。
    claimRefs:
      - CV021
      - CV022
      - CV023
      - CV033
      - CV041
    data:
      items:
        - label: 悲观情景 EV
          low: 75
          base: 200
          high: 360
        - label: 基准情景 EV
          low: 600
          base: 900
          high: 1250
        - label: 乐观情景 EV
          low: 1500
          base: 1900
          high: 2400
        - label: 战略收购溢价
          low: 1200
          base: 1600
          high: 2200
        - label: IPO 情景 EV
          low: 1800
          base: 2300
          high: 3000
  - id: FV004
    title: 投委会 KPI
    type: kpi
    layout: standard
    summary: >-
      八项投委会可直接使用的 KPI，概括 Flock Freight 的关键估值和质量信号：最后已知估值（$1.4B）、累计融资（约 $395M）、基准情景公允价值（$700M 至
      $1.25B）、收入置信度（很低）、竞争护城河（中等）、证据质量分数（5/10）、货运市场复苏阶段（早期复苏）和整体建议（有条件持有）。这些 KPI 凸显 2021
      年独角兽估值与当前基准情景公允价值之间的差距，并标出收入不透明和 Convoy 反向先例这两个主要负面信号。
    approximationNotes: KPI 数值为估算或定性判断。Flock 未公开披露收入、利润率或增长数据。由于私营公司不透明，所有估值估算都带有很宽误差区间。
    claimRefs:
      - CV001
      - CV003
      - CV010
      - CV012
      - CV022
      - CV027
      - CV031
      - CV040
    data:
      items:
        - label: 最后已知估值
          value: $1.4B
          detail: Series D（2021 年 10 月）；货运周期峰值和私营科技倍数峰值；SoftBank 领投 $215M 融资
          tone: neutral
        - label: 累计融资
          value: ~$395M
          detail: A 轮至 E 轮共 5 轮；Series E 在未披露估值下融资 $60M（2023 年 10 月）；比 Series D 小 72%
          tone: neutral
        - label: 2026 年 5 月基准情景公允价值
          value: $700M to $1.25B
          detail: 估算 $300M 至 $400M 总收入的 1.5x 至 2.5x；计入 STL 专利溢价；相对 2021 年峰值折价
          tone: neutral
        - label: 收入置信度水平
          value: Very Low
          detail: 没有公开披露财务数据；分析师估算总收入区间为 $200M 至 $500M，误差区间很宽
          tone: adverse
        - label: 竞争护城河分数
          value: Moderate
          detail: 美国 STL 专利（2022）；FreightWaves 2024 称其为最大 STL 提供商；面对资金充足的 CHRW 和 RXO 时仍脆弱
          tone: neutral
        - label: 证据质量分数
          value: 5 of 10
          detail: 私营公司；叙事和市场证据强；定量佐证弱；高度依赖推断
          tone: adverse
        - label: 货运市场复苏
          value: Early Recovery
          detail: DAT 显示 2024 年下半年货量复苏；Cowen 预计货运市场增长 3% 至 5%；2026 年轨迹不确定
          tone: neutral
        - label: 整体建议
          value: Conditional Hold
          detail: 不要在 EV 高于 $1.0B 时入场；等待收入确认达到或高于 $300M；跟踪 Series F 或收购信号
          tone: neutral
