            body: >-
              Flock 的财务模型在结构上有吸引力——轻资产、无 capex、STL 溢价利润率逻辑、承运商网络增长。但收入质量风险高，因为 STL/FTL 经纪具有交易型、受现货运价影响的特征，2022-2023
              年下行周期已经证明这一点。托管运输能提供更可预测的收入，但其占比未知。可比分析确认，仅做经纪的模型在规模化后利润率很薄：CHRW 净利润率约 9%，RXO 估计 12-15%。Flock 的 STL
              溢价或许能切出更高利润率的细分市场，但幅度和可持续性需要第一方数据验证。关键承销阻碍包括：（1）未披露收入或 GMV；（2）未披露毛利率或 EBITDA；（3）未确认烧钱速度或当前现金头寸；（4）未披露
