            body: >-
              Flock 持有 Federal Motor Carrier Safety Administration（FMCSA）货运经纪牌照——这是所有美国货运经纪的强制性联邦授权。FMCSA 牌照要求 $75,000
              保证债券、财务适格要求，并遵守联邦经纪法规，包括承运商选择和付款透明度。Flock 会审查进入其网络的所有承运商，覆盖安全评级、保险合规、运营资质和历史表现。B Corp 认证证实 Flock
              达到最低环境和社会治理标准，并经 B Lab 独立第三方审计验证。

              截至 2026 年 5 月，未发现 SOC 2 Type II、ISO 27001 或其他企业网络安全认证的公开披露。Flock
              不运营仓库或交叉转运设施——所有货物处理仍由承运商完成，运营质量风险主要落在承运商筛选和合规上。公开来源中未发现针对 Flock Freight 的监管行动、诉讼或 FMCSA 执法程序。
