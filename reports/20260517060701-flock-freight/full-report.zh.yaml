      - CE010
      - CE011
      - CE016
      - CE019
      - CE038
    data:
      layers:
        - label: 托运人界面层
          modules:
            - Web 门户（询价、预订、跟踪、结算）
            - REST API（TMS / ERP 集成）
            - EDI 连接（面向承运人）
          note: Multi-tenant; instant quote generation; SAP TMS integration confirmed 2022
        - label: 应用服务层
          modules:
            - STL 引擎（拼载、线路匹配、分配）
            - FTL 经纪引擎（货板、运力采购）
            - 托管运输 TMS（货运项目优化、报告）
            - STL AddOns（高端服务叠加层）
            - Guaranteed STL（运输时效承诺逻辑）
          note: Core revenue-generating services; STL engine is patent-protected
        - label: 智能层
          modules:
            - AI/ML 货载兼容算法（线路、时间、尺寸、承运人）
            - 实时定价引擎（线路密度、市场费率、历史数据）
            - 承运人绩效评分（可靠性、合规、准时率）
            - 路线优化（最小化空驶里程）
          note: Proprietary; purpose-built for STL — not adapted from LTL terminal logic (CEO-stated)
        - label: 数据基础设施层
          modules:
            - 专有线路数据集（起讫点组合、费率历史）
            - 承运人合规与安全数据库（FMCSA 评级、保险、资质）
            - 市场费率数据流（DAT、实时现货市场输入）
            - 交易与结算引擎
          note: Primary data moat; accumulates with each booking; cloud-hosted (provider undisclosed)
