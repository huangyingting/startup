        title: 留存、持久性与满意度
        blocks:
          - type: paragraph
            body: >-
              Flock 没有披露任何客户留存指标——NRR、GRR、流失率、合同续约率或净推荐值均未公开。对产品组合做结构分析，可以看到两类不同留存画像。Enterprise Managed Transportation
              客户已将 Flock 的 TMS 层接入 SAP 或同等 ERP 系统，切换成本高，可能呈现长期留存。相比之下，交易型 STL 现货货主没有切换成本——完成一单后即可转向任何货运经纪，或回到
              LTL——现货分部天然存在流失风险。

              2022 年 11 月和 2023 年 1 月裁员发生在广泛的货运市场下行期，暗示货主量和收入下降。2023 年 10 月 $60M 的 Series E 明显小于 Series D 的
              $215M，进一步说明收入可能收缩，或投资人信心下降。Flock 2024-2025 年的产品动作（STL AddOns、Guaranteed
              STL）更像是在提高单客收入，并通过高端服务锁定来制造留存，而不是依靠货量增长。
