chapters:
  - number: 1
    title: 公司概况
    sections:
      - number: '1.1'
        title: 身份与商业模式
        blocks:
          - type: paragraph
            body: >
              Flock Freight 是一家技术赋能的货运经纪商，专注于共享整车运输（STL）。公司称自己开创了这一运输模式，并以 FlockDirect® 品牌注册商标。Flock 成立于 2015 年，总部位于
              California 州 San Diego（最初在
              Encinitas）。公司的核心判断是：中等规模货运——大于传统零担运输（LTL）所适合处理的体量，又小到无法装满整车——可以和同走一条通道的兼容货物高效拼车，跑出不经停、无枢纽的线路。这样可以去掉 LTL
              固有的多次货站接触，降低破损率、缩短运输时间，并减少碳排放。公司官网称，STL 相比整车平均节省 20% 成本，相比 LTL 最多减少 40% 碳排放。Flock 主要服务消费品、零售和制造业的大型企业货主，提供
              FlockDirect®（STL）、整车运输（FTL）经纪和托管运输服务。平台接入 e2open、Oracle OTM
              等运输管理系统（TMS），让大型物流运营更容易采用。收入来自向货主收取的单票运费扣除承运商成本后的部分，这是数字货运中介常见的毛利经纪模式。Flock 获得 B Corp 认证，得分 80.3（普通企业中位数为
              50.9），用可持续优先的品牌定位抓住重视 ESG 的大型企业采购团队。
