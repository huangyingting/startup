companyProfile:
  summary: >-
    Flock Freight 成立于 2015 年，总部位于 California 州 San Diego，是一家技术驱动的货运平台，专注于共享整车运输（STL）。公司持有美国首个也是唯一一个 STL
    匹配专利，可让多个货主共用一辆卡车且无需中转。公司在 October 2021 获得 SoftBank Vision Fund 2、GV 和 American Airlines Ventures 支持，以 $1.4 billion
    的 Series D 估值跻身独角兽。Flock 已在五轮融资中累计募资约 $395 million，自称是美国最大的 STL 服务商。作为获得认证的 B Corp，公司也以可持续性参与竞争。公司未公开披露收入或盈利指标。
