      - number: '7.3'
        title: 伙伴、依赖与财务风险
        blocks:
          - type: paragraph
            body: >-
              Flock 最重要的财务风险是货运市场周期性。2022-2023 年货运费率崩跌直接导致两轮裁员，并让 Series E 显著缩水（$60M 对比 Series D 的
              $215M），证明公司收入对宏观货运环境敏感。基于市场评论，2025-2026 年似乎正在复苏，但未被公开指标验证。

              货运结算中的营运资金是持续财务风险——Flock 通常比向货主收款更快地结算承运商款项，形成必须用现金或信贷额度填补的营运资金缺口。FTL 经纪分部处在商品化市场，FTL
              费率下行时会压缩利润率，造成结构性盈利脆弱。平台依赖单一云服务商、市场费率数据源（DAT、Truckstop）和 SAP TMS 集成，使技术层集中度风险上升。SoftBank
              组合层面的财务压力可能影响未来融资轮或退出时点。
