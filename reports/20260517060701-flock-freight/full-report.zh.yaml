  - number: 6
    title: 客户情况
    sections:
      - number: '6.1'
        title: 客户细分与买方画像
        blocks:
          - type: paragraph
            body: >-
              Flock 的主要客户是中端市场到企业级货主；这些客户经常在美国国内固定线路上运输托盘化货物。STL 模式瞄准的货物介于标准 LTL 与整车之间：对标准 LTL
              来说体量太大（场站中转会带来损坏和时效风险），但又装不满一整辆拖车——每票大约 6-20 个托盘当量。最直接可触达的三个行业是制造业（汽车零部件、电子、工业品）、消费品（食品饮料、家居用品、药品）和零售 /
              分销（面向零售商和电商履约运营商的直达配送中心货运）。

              第二类客户是重视可持续性的企业货主——在不断演进的美国和欧盟法规下，这些公司承担 Scope 3 排放报告义务，并寻找能降低运输排放的货运供应商。Flock 的 B Corp
              认证和对减少空驶里程的强调正好对应这一需求。Flock 的 Managed Transportation 产品面向企业货运经理：他们希望在一个托管项目下整合多种货运模式（STL + FTL），并接入 TMS
              集成和绩效报告。American Airlines Ventures 参与 Flock Series D，是战略投资者——尤其是以投资者而非货主身份参与——这体现战略一致性，但不能直接证明客户采用。
