      - number: '5.3'
        title: 平台架构与技术
        blocks:
          - type: paragraph
            body: >-
              Flock 的核心技术是一套 AI/ML
              货运匹配引擎，实时识别可拼载的货物。可拼载货物需要起讫线路组合相同、运输时效匹配，且物理属性兼容（尺寸、易碎性、温控要求）。平台定价引擎借助线路密度数据、实时运力信号和历史费率基准，为货主生成即时报价。架构以多租户系统运转：货主通过门户或
              API 接入，中间层运行匹配引擎，承运商调度系统则通过 EDI/API 对接卡车运输伙伴，完成派单和追踪。

              Flock 的数据层正在变成一项自有资产：每一条已预订的起讫线路都会沉淀历史费率、时效和承运商表现数据，提升后续匹配精度，也强化定价引擎。公司曾入围 2022 SAP Innovation Awards
              决赛，侧面证实其具备企业 TMS 集成能力。招聘页信号显示，工程团队聚焦优化算法、实时承运商集成和数据基础设施——这与高性能物流匹配平台一致。具体技术栈未公开；未发现 Flock 的公开 GitHub
              仓库或开源贡献。
