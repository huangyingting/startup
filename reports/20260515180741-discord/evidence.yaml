  severity: material
  topic: No public post-2021 financing or IPO announcement from Discord has been identified
  missingEvidence: The most recent publicly confirmed funding round is the September
    2021 Series H at $15 billion. No Series I, credit facility, secondary tender,
    or IPO filing has been identified in public sources as of May 2026, leaving the
    current valuation anchor more than four years stale.
  whyItMatters: A stale valuation makes it impossible to determine whether Discord's
    private-market value has increased, declined, or remained flat relative to the
    2021 peak. Later valuation and exit analysis chapters will have limited anchor
    points.
