evidenceGaps:
  - type: missing-source
    severity: material
    topic: No public post-2021 financing or IPO announcement from Discord has been identified
    missingEvidence: >-
      The most recent publicly confirmed funding round is the September 2021 Series H at $15 billion. No Series I,
      credit facility, secondary tender, or IPO filing has been identified in public sources as of May 2026, leaving the
      current valuation anchor more than four years stale.
    whyItMatters: >-
      A stale valuation makes it impossible to determine whether Discord's private-market value has increased, declined,
      or remained flat relative to the 2021 peak. Later valuation and exit analysis chapters will have limited anchor
      points.
    diligencePath: >-
      Request management's current cap-table summary, board-authorized valuation, any 409A appraisals, and details of
      any secondary market transactions or tender offers completed since September 2021.
    relatedQuestionRefs:
      - QO006
      - QO016
      - QO026
    relatedTableRefs:
      - TO001
      - TO003
  - type: conflicting-data
    severity: material
    topic: Public revenue and employee-count metrics conflict across retained 2025 sources
    missingEvidence: >-
      Backlinko estimates $725M annual revenue and 870 employees, while Wikipedia's 2025 infobox shows 501 employees and
      no revenue figure. The company has not publicly disclosed audited revenue or official headcount. The two employee
      figures differ by roughly 70 percent.
    whyItMatters: >-
      Revenue and headcount are foundational cover metrics that later financial and operational chapters will reference;
      using either figure without reconciliation creates downstream drift.
    diligencePath: >-
      Request audited income statements or management accounts for the last three fiscal years, a current headcount by
      region and function, and a reconciliation of any market estimates against actual figures.
    relatedQuestionRefs:
      - QO017
      - QO018
    relatedTableRefs:
      - TO001
  - type: enumeration-incomplete
    severity: material
    topic: Full board composition, voting rights, and ownership structure are not publicly available
    missingEvidence: >-
      SEC Form D filings identify ten named directors or officers across the 2021 and 2023 rounds but do not disclose
      investor ownership percentages, preferred-equity class terms, voting agreements, anti-dilution rights, or board
      committee assignments.
    whyItMatters: >-
      Without visibility into control and economic rights, it is not possible to assess governance quality,
      founder-vs-investor alignment, or liquidation preferences in a downside scenario.
    diligencePath: >-
      Request the current cap table, preferred-share term sheets, voting agreements, investor side letters, and a
      description of board observer rights and consent requirements.
    relatedQuestionRefs:
      - QO011
    relatedTableRefs:
      - TO002
      - TO003
  - type: missing-source
    severity: minor
    topic: FTC COPPA settlement consent order text was not directly retrieved
    missingEvidence: >-
      The specific FTC consent order filing confirming the $7.8M COPPA settlement amount and terms was not accessible
      via public URL during research. The settlement is confirmed via FTC search pages and Wikipedia, but the primary
      order document was not retrieved.
    whyItMatters: >-
      The exact terms of the consent order (including required compliance measures, monitoring period, and operational
      restrictions) are relevant to assessing ongoing regulatory risk.
    diligencePath: >-
      Obtain the full FTC consent order from the FTC's legal library or via PACER court filings to confirm settlement
      terms, compliance obligations, and any ongoing monitoring requirements.
    relatedQuestionRefs:
      - QO019
      - QO021
    relatedTableRefs:
      - TO004
  - type: missing-source
    severity: material
    topic: Discord's Nitro subscriber count and ARPU are not publicly disclosed
    missingEvidence: >-
      Public sources estimate Nitro penetration in the low single-digit percent of MAU but neither Discord nor any
      audited filing discloses subscriber count, churn, or ARPU.
    whyItMatters: >-
      Without paid-penetration disclosure, realized SAM is unknowable and the $600M-$725M revenue estimates cannot be
      reconciled to a unit-economics model.
    diligencePath: Request Nitro subscriber count, ARPU, and churn from management; cross-check against Server Boost revenue mix.
    relatedQuestionRefs:
      - QM021
    relatedTableRefs:
