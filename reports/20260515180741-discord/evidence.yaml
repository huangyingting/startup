    relatedTableRefs:
      - TP001
  - type: missing-source
    severity: minor
    topic: Documented multi-homing rate between Discord and competing platforms
    missingEvidence: >-
      No published survey or platform-level data quantifies the share of Discord users or community operators who
      maintain active parallel presences on Reddit, Twitch, or other platforms. Multi-homing is asserted qualitatively
      by Naavik and Backlinko but not numerically evidenced.
    whyItMatters: >-
      High multi-homing rates indicate weaker lock-in and higher substitution risk; low rates suggest Discord's
      community structures are more exclusive and durable than qualitative evidence implies.
    diligencePath: >-
      Commission a user survey among Discord server operators asking about parallel community platforms; alternatively
      analyze cross-platform OAuth login patterns if accessible.
