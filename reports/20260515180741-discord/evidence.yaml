  - type: missing-source
    severity: minor
    topic: Guilded user count and scale post-Roblox acquisition
    missingEvidence: >-
      Guilded's active user count, retention rate, and strategic product roadmap following the 2021 Roblox acquisition
      have not been publicly disclosed. Only the fact of the acquisition is confirmed from official Roblox newsroom
      coverage; no post-acquisition metrics are public.
    whyItMatters: >-
      Without Guilded's user scale, it is not possible to quantify the gaming-community segment displacement risk
      Guilded poses to Discord. If Guilded has grown materially since 2021, the competitive threat in Discord's core
      gaming niche is higher than currently estimable.
    diligencePath: >-
      Request Roblox investor relations for any Guilded MAU or daily session data in earnings call transcripts; monitor
