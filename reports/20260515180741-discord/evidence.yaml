  - type: private-evidence-only
    severity: minor
    topic: Enterprise volume discount terms for Microsoft Teams and Slack contracts
    missingEvidence: >-
      Microsoft Teams volume discount schedules through enterprise agreements and Slack enterprise pricing through
      Salesforce sales channels are not publicly disclosed. Only list prices are known; realized pricing for large
      enterprise buyers may be significantly lower than list.
    whyItMatters: >-
      If enterprise pricing for Teams and Slack is substantially below list — common in large ELA deals — the effective
      pricing advantage they hold over Discord's model is even larger than the list-price comparison suggests, further
      constraining Discord's enterprise expansion path.
