  evidenceGaps:
    - type: missing-source
      severity: material
      topic: No public uptime SLA, status page history, or incident post-mortems found in research
      missingEvidence: >-
        Discord operates no publicly accessible uptime SLA, has not published engineering post-mortems
        for past outages, and its Terms of Service explicitly disclaim reliability guarantees. Status
        page data (discordstatus.com) shows historical incidents but no contractual context.
      whyItMatters: >-
        Absence of SLA documentation means enterprise or regulated buyers cannot rely on contractual
        reliability commitments; it also limits the ability to quantify operational risk from Cloudflare
        or BEAM runtime dependency failures.
      diligencePath: >-
        Request from management: historical uptime metrics, P1 incident frequency, mean time to recovery,
        and any internal SLA commitments made to large community or publisher partners.
      relatedQuestionRefs:
        - QE008
        - QE028
      relatedTableRefs:
        - TE003
        - TE004
    - type: missing-source
      severity: material
      topic: AI moderation accuracy and false positive rate not publicly disclosed
      missingEvidence: >-
        Discord has not published precision, recall, or false positive rate metrics for its Sentropy-derived
        AI moderation systems or AutoMod. Transparency reports give action counts by category but no
        effectiveness or accuracy statistics.
      whyItMatters: >-
        Undisclosed accuracy metrics make it impossible to evaluate whether Discord's safety tooling meets
        regulatory thresholds under EU DSA or UK OSA, and adversarial bypass of AI moderation represents
        a legal and reputational risk that is unquantifiable.
      diligencePath: >-
        Request internal accuracy and false positive benchmarks for AI moderation; ask whether independent
        safety red-team audits have been conducted; check for any DSA transparency database filings.
      relatedQuestionRefs:
        - QE012
        - QE022
      relatedTableRefs:
        - TE004
    - type: missing-source
      severity: moderate
      topic: Activity monetization take rate and App Subscription economics not public
      missingEvidence: >-
        Discord has not disclosed the platform take rate on App Subscriptions or the revenue-share model
        for Activities. No public developer economic disclosures comparable to Apple App Store (30%) or
        Epic Games Store (12%) are available.
      whyItMatters: >-
        Developer platform contribution to total ARR is unknowable without take rate; if take rate is
        low, developer platform is primarily a retention tool rather than an independent revenue line.
      diligencePath: >-
        Request App Subscription GMV, take rate, number of paying users per app, and Activity monetization
        roadmap from management.
      relatedQuestionRefs:
        - QE011
        - QE023
      relatedTableRefs:
        - TE001
        - TE005
    - type: missing-source
      severity: moderate
      topic: No public ISO 27001, SOC 2, or equivalent security certification identified
      missingEvidence: >-
        Research found no public certification page, trust portal, or third-party attestation confirming
        ISO 27001, SOC 2 Type II, or equivalent independent security review for Discord's production
        infrastructure.
      whyItMatters: >-
        Absence of certification limits addressability for enterprise or regulated-industry buyers
        and is a gap relative to enterprise SaaS competitors (Slack, Teams) that publish SOC 2 reports.
      diligencePath: >-
        Ask management for trust/security certifications; request most recent penetration test summary
        and remediation status; check if Discord's developer portal has a trust center.
      relatedQuestionRefs:
        - QE008
        - QE024
      relatedTableRefs:
        - TE004
    - type: enumeration-incomplete
      severity: minor
      topic: Infrastructure cost structure and cloud spend composition not publicly reported
      missingEvidence: >-
        Discord has not disclosed its GCP/AWS infrastructure spend, ScyllaDB operational costs, or CDN
        (Cloudflare) contract value. No public proxy for infrastructure-to-revenue ratio exists.
      whyItMatters: >-
        Infrastructure cost is a significant operating expense for a platform of Discord's scale;
        without it, margin modeling and unit economics analysis are speculative.
      diligencePath: >-
        Request cloud spend breakdown, CDN cost, and infrastructure cost as a percentage of revenue
        from management; cross-check against engineering headcount per infrastructure layer.
      relatedQuestionRefs:
        - QE017
      relatedTableRefs:
        - TE003
