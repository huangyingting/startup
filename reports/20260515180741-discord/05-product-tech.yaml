  - id: section-5
    title: Trust, safety, and compliance controls
    body: >-
      Discord's safety infrastructure is the most compliance-tested dimension of its product. In May 2023,
      the FTC and Discord settled COPPA charges for $7.8 million — the highest COPPA penalty at the time
      for a social platform — with Discord required to enhance parental consent mechanisms, improve data
      deletion practices for users under 13, strengthen default privacy settings for minors, and submit to
      ongoing FTC monitoring. The settlement is legally binding and creates recurring compliance overhead.
      For content moderation, Discord operates AutoMod, a built-in server tool that allows community
      managers to define keyword rules, mention limits, and spam filters. More substantively, Discord
      acquired Sentropy in August 2021, internalizing an AI content moderation capability that uses
      machine-learning models to detect harmful content proactively. Discord also operates proactive CSAM
      (child sexual abuse material) scanning on uploaded images and videos, reporting detected material to
      NCMEC via the CyberTipline as mandated by US law. Transparency reports published for H2-2023 and
      H1-2024 document action rates by category including CSAM, violent extremism, harassment, and spam.
      Discord self-declares GDPR compliance in its Privacy Policy but no public ISO 27001, SOC 2, or
      equivalent third-party security certification has been identified. The Terms of Service set the
      minimum age at 13 in most jurisdictions. The absence of contractual uptime guarantees, public SLAs,
      or independent security audits represents a diligence gap for any buyer requiring contractual
      reliability or security assurance.
