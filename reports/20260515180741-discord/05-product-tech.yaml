  - id: section-6
    title: Roadmap, differentiation, and technology risks
    body: >-
      Discord's technology differentiation rests on four verifiable pillars: (1) trillion-message-scale
      infrastructure on ScyllaDB/Elixir that few consumer platforms match; (2) a developer ecosystem of
      over one million registered applications creating high community switching costs; (3) in-house AI
      moderation derived from the Sentropy acquisition; and (4) the always-on ambient voice model that no
      major competitor has replicated at Discord's community depth. The roadmap signals for 2024-26 include
      the rollout of Activities (embedded apps in voice channels), expanded App Subscriptions for developer
      monetization, Quests reward campaigns for game publishers, voice and video quality improvements, and
      preparation for a potential IPO reportedly targeted for 2025-26 per Reuters and WSJ coverage. Key
      technology risks are: Elixir/BEAM talent scarcity (the BEAM ecosystem is small relative to Go, Java,
      or Node.js communities, constraining engineering headcount growth); AI moderation model drift and
      adversarial bypass (accuracy and false positive rates are undisclosed); Cloudflare dependency
      propagation (Cloudflare outages have historically impacted Discord availability); and compliance
      risk escalation (EU DSA, UK Online Safety Act, and potential FTC re-engagement on teen safety
      represent additional regulatory exposure beyond the 2023 settlement). Discord's 2024 layoffs of 170
      employees (approximately 17% of staff) suggest ongoing efficiency prioritization, and engineering
      investment areas visible in job postings include ML/AI, infrastructure reliability, and developer
      platform features — consistent with the roadmap signals above.
    claimRefs:
      - CE001
      - CE007
      - CE022
      - CE025
      - CE036
      - CE038
      - CE041
