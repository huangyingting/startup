  - id: section-4
    title: Developer platform and ecosystem
    body: >-
      Discord's developer platform is both a technical product and a structural competitive moat. The
      platform exposes a REST API, a real-time Gateway WebSocket API, Webhooks, and OAuth2 — all publicly
      documented. Application Commands (slash commands, context-menu commands, and message components)
      allow bots to surface rich interactive UI inside Discord without users leaving the app. Over one
      million applications have been registered with the Discord developer portal per Discord's own
      developer documentation. Activities launched as HTML5 embedded applications that run inside a
      "voice channel activity" — users can play games (e.g., Poker Night, Watch Together) or use
      productivity tools collaboratively without leaving Discord. App Subscriptions, launched in 2023,
      allow application developers to charge Discord users for premium app features, with Discord taking a
      platform share; this creates a flywheel where bot developers have economic incentive to build
      high-quality applications that increase server stickiness. Discord maintains open-source repositories
      at discord.com/open-source, covering the official API documentation repository, interaction
      libraries, and community-maintained tooling. The ecosystem of 1M+ registered apps, many deeply
      integrated into specific community servers, raises switching costs: a server that has invested in
      custom moderation bots, economy bots, and game-integration bots would face significant re-setup cost
      migrating to any competitor. The developer platform is an under-monetized asset relative to its
      community-lock-in contribution, and Activity monetization economics (developer revenue share,
      take rate) are not publicly disclosed.
    claimRefs:
