  - id: section-3
    title: Technology architecture and infrastructure
    body: >-
      Discord's technology stack reflects deliberate performance engineering choices made during periods of
      rapid scale. The real-time gateway layer is built on Elixir and the Erlang/OTP BEAM virtual machine,
      selected for its actor-model concurrency and fault-isolation properties. Discord's engineering blog
      documented that the gateway handles millions of concurrent WebSocket connections with BEAM's
      lightweight process model, enabling per-server and per-user isolation at low memory cost. A
      celebrated 2020 rewrite moved the read-states service — which tracks every user's read position
      across every channel they can see — from Python to Rust, citing a reduction in average latency from
      hundreds of milliseconds to single-digit milliseconds and the ability to handle 7.5 million events
      per second on fewer machines. For message storage, Discord migrated from MongoDB to Apache Cassandra
      in 2017, then executed a second migration to ScyllaDB (a C++ Cassandra-compatible database) by 2023,
      with the engineering blog documenting "trillions of messages" stored after the migration. ScyllaDB
      improved read latencies and reduced operational overhead for Discord's write-heavy, time-series
      message workload. Message search uses Elasticsearch (or a compatible variant) to index billions of
      messages for in-app search. Voice infrastructure relies on WebRTC for peer-to-peer and server-relay
      audio/video, with STUN/TURN relay servers distributed globally. Discord uses Cloudflare extensively
      for CDN and DDoS mitigation, and operates compute on major cloud providers (GCP and AWS reported in
      engineering job descriptions and infrastructure references). The heterogeneous stack — Elixir gateway,
      Rust read-states, Python/C++ background services, ScyllaDB, PostgreSQL for relational data — is a
      product of incremental performance optimization rather than greenfield design, introducing cross-skill
      hiring demands that represent a structural talent risk.
    claimRefs:
