      - TE005
tables:
  - id: TE001
    title: Product module / asset matrix
    notes: >-
      Status and differentiation are based on public product documentation and official Discord blog
      posts; revenue contribution per module is not publicly disclosed. Diligence gaps reflect
      information unavailable from public sources.
    columns:
      - Module / Asset
      - Primary User
      - Status / Maturity
      - Key Differentiation
      - Diligence Gap
    rows:
      - - Voice & Video Channels
        - Gamers, communities, creators
        - GA; production-grade; 9+ years
        - Always-on ambient rooms; no scheduling; WebRTC at gaming-optimized latency
        - No public latency SLA; uptime history not published; reliability metrics undisclosed
      - - Text Channels, DMs, Forum Channels
        - All users
        - GA; production-grade; fully stable
        - Server/channel hierarchy with roles and permissions; forum threads since 2022
        - Message delivery guarantees not contractually defined; no SLA
      - - Nitro Subscription (D2C)
        - Individual consumers
        - GA; primary revenue product
        - Cross-server perks (HD video, custom emoji, large uploads, Boost discount)
        - Subscriber count, ARPU, and churn undisclosed; Xbox Game Pass bundle economics opaque
      - - Server Boost (community)
        - Server owners / community members
        - GA; community subscription product
        - Unlocks custom branding, emoji slots, higher audio bitrate for whole server
        - Revenue per server not disclosed; boost economics not broken out in any public report
      - - Developer Platform (Bot API, Activities, App Subscriptions)
        - Bot developers, game publishers, independent creators
        - GA with evolving features; Activities relatively new (2023-24)
        - 1M+ registered apps; Activities embed HTML5 apps in voice; App Subscriptions enable monetization
        - Activity take rate not public; App Subscription economics not disclosed; developer revenue undisclosed
      - - Safety & Moderation Tools (AutoMod, AI, CSAM scanning)
        - Server moderators, Discord Trust & Safety team
        - GA; FTC-mandated improvements; maturing AI
        - In-house AI from Sentropy; proactive CSAM scanning + NCMEC reporting; AutoMod rules engine
        - AI accuracy and false positive rate not public; no third-party audit of moderation effectiveness
  - id: TE002
    title: Workflow / use-case table
    notes: >-
      Measurable benefits are company-claimed or inferred from product documentation; independent
      user studies confirming quantified benefit are not available from public sources.
    columns:
      - User Job
      - Current (Pre-Discord) Workflow
      - Discord Solution
      - Measurable Benefit (stated or inferred)
      - Limitation
    rows:
      - - Gaming team coordination
        - In-game voice (limited to game session) + text chat apps
        - Persistent server with always-on voice channels; game status integration
        - Eliminates context-switching; squad always reachable without game launch
        - Push-to-talk UX less familiar for non-gamers; requires app install
      - - Fan / creator community hosting
        - Reddit threads + email newsletter + separate Discord server setup
        - Structured server with role-gated channels, events, forums, stage broadcasts
        - Centralizes community with granular permissions; removes email dependency
        - Moderation tooling still maturing vs enterprise-grade Slack/Teams equivalents
      - - Online event and broadcast hosting
        - Zoom, YouTube Live, Twitch for scheduled events
        - Stage Channels with speaker/audience model; built-in RSVP Events feature
        - No viewer cap for Stage; integrated community context; no streaming software needed
        - Limited production controls vs dedicated streaming platforms; no monetized ticketed events
      - - Developer / open-source community support
        - Slack, email lists, GitHub Discussions
        - Forum channels, bot-augmented support workflows, App Commands
        - Searchable threaded support; bot automation reduces repetitive moderation burden
        - Forum UX less powerful than Discourse; Slack has richer enterprise admin controls
      - - Creator monetization
        - Patreon, Substack, or separate platform subscription
        - Nitro-gated server channels, App Subscriptions for premium bot/Activity access
        - Unified community and subscription in one app; no external link friction
        - Monetization limited to Discord user base; creator revenue share terms not fully public
  - id: TE003
    title: Technology / operating architecture table
    notes: >-
      Technology stack sourced from Discord engineering blog posts (2019-2023); some details may have
      changed since publication. Cloud provider mix (GCP/AWS) inferred from job postings and
      infrastructure references; exact allocation is not publicly disclosed.
    columns:
      - Layer / Component
      - Role
      - Key Dependency
      - Risk
    rows:
      - - Elixir / BEAM (OTP) Gateway
        - WebSocket gateway; real-time event fan-out; per-guild and per-user process isolation
        - Erlang runtime; BEAM VM; internal Elixir expertise
        - Niche talent pool vs Go/Java/Node; scaling requires BEAM-skilled engineers; limited hiring market
      - - Rust Read-States Service
        - Tracks per-user read position across all channels; 7.5M events/sec documented
        - Internal Rust expertise; performance-optimized data structures
        - Dual-language codebase increases onboarding complexity; Rust rewrite scope could expand
      - - ScyllaDB (Message Storage)
        - Stores trillions of messages; write-heavy time-series workload; Cassandra-compatible
        - ScyllaDB open-source project; internal migration expertise
        - Vendor support continuity risk; ScyllaDB is smaller than Cassandra ecosystem; skills concentration
      - - Elasticsearch (Search Indexing)
        - Indexes billions of messages for in-app search; powers server-level and DM search
        - Elasticsearch or compatible open-source fork
        - Index freshness lag; cost scales with message volume; relevance tuning not public
      - - WebRTC Voice / Video Infra
        - Real-time audio/video peer connections; STUN/TURN relay for NAT traversal
        - Google STUN/TURN servers; Cloudflare edge; distributed relay nodes
        - ICE failure edge cases; congestion-sensitive; Cloudflare outages propagate to voice
      - - Cloudflare CDN + Edge
        - Content delivery; DDoS mitigation; WebSocket proxying at edge
        - Cloudflare contract and infrastructure; single CDN provider
        - Cloudflare incidents have historically caused Discord-wide outages; sole-CDN concentration risk
  - id: TE004
    title: Trust / quality / compliance table
    notes: >-
      Compliance statuses are based on public disclosures and official documentation. No independent
      third-party audit of AI moderation accuracy or CSAM scanning coverage has been identified.
      GDPR compliance is self-declared only.
    columns:
      - Control / Certification
      - Status
      - Scope
      - Gap / Diligence Ask
    rows:
      - - FTC COPPA Settlement (May 2023)
        - Completed; $7.8M penalty paid; ongoing FTC monitoring
        - Under-13 data handling; parental consent; default privacy settings for minors
        - Confirm FTC monitoring schedule; request internal compliance audit cadence and results
      - - CSAM Proactive Scanning + NCMEC CyberTipline Reporting
        - Active per transparency reports; mandated by US law (PROTECT Our Children Act)
        - All image and video uploads platform-wide
        - Scanning coverage rate and detection accuracy not publicly audited; ask for independent review
      - - AutoMod (Keyword / Rule-Based Moderation)
        - GA since 2022; available to all server owners
        - Server-level content filtering; keyword rules, mention limits, spam detection
        - Precision/recall metrics not disclosed; adversarial bypass not assessed publicly
      - - AI Content Moderation (Sentropy-derived)
        - Active; internal AI system derived from 2021 Sentropy acquisition
        - Platform-wide proactive harmful content detection
        - Model accuracy, false positive rate, and training data not public; no third-party audit
      - - EU GDPR Compliance
        - Self-declared in Privacy Policy; data processing agreements available for developers
        - All EU user data; developer API data processing
        - No public DPA (supervisory authority) audit or formal adequacy decision confirmation found
      - - Biannual Transparency Reports (H2-2023, H1-2024)
        - Published per stated schedule; covers action rates by violation category
        - Platform-wide enforcement actions; CSAM, violent extremism, harassment, spam categories
        - Methodology changed between reports; category definitions not independently audited; no NIST/ISO benchmark
