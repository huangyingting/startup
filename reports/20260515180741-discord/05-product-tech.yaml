    layout: wide
    summary: >-
      Discord's operational continuity depends on a network of critical infrastructure and platform
      dependencies. Google Cloud Platform and Cloudflare represent the two highest-risk single points of
      failure at the infrastructure layer, while ScyllaDB and the Elixir/Erlang gateway are critical
      internal technology dependencies. The developer ecosystem's dependency on discord.js and the
      Activities SDK creates indirect lock-in for third-party developers.
