    type: stack
    data:
      layers:
        - label: Client Layer
          detail: Web (React/TypeScript), Desktop (Electron), iOS and Android native clients; cross-platform real-time sync
        - label: Gateway / API Layer
          detail: Elixir/BEAM WebSocket gateway for real-time events; REST API for state operations; 20B+ messages/month throughput documented
        - label: Service Layer
          detail: Rust read-states service (7.5M events/sec); Python/C++ background microservices; Sentropy-derived AI moderation models
        - label: Data Layer
          detail: ScyllaDB for message storage (trillions of messages); PostgreSQL for users and guild metadata; Elasticsearch for message search indexing
        - label: Edge / Infrastructure Layer
          detail: Cloudflare CDN and DDoS mitigation; WebRTC STUN/TURN relay for voice/video; GCP and AWS compute; distributed global voice nodes
