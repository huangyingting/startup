callouts:
  - calloutType: strength
    title: Trillion-message ScyllaDB infrastructure is a verifiable engineering milestone
    body: >-
      Discord's public engineering blog documented a full production migration from Apache Cassandra to
      ScyllaDB, achieving storage of trillions of messages with improved read latency and operational
      efficiency. Few consumer communication platforms have published this level of infrastructure
      transparency at this scale. The documented migration — MongoDB → Cassandra → ScyllaDB — demonstrates
      an engineering culture capable of large-scale database refactoring without user-visible disruption,
      a meaningful signal of infrastructure maturity.
    claimRefs:
      - CE001
      - CE026
      - CE032
  - calloutType: risk
    title: FTC settlement imposes ongoing compliance obligations with recurrence risk
    body: >-
      Discord's May 2023 COPPA settlement with the FTC — at $7.8M the largest COPPA penalty of its time
      for a social platform — requires ongoing FTC monitoring and mandated product changes. Discord's
      core user base skews young, and the platform remains exposed to EU DSA children-at-risk provisions,
      UK Online Safety Act, and potential FTC re-engagement on teen safety. Compliance cost is a recurring
      overhead, and any recurrence would carry both financial and reputational risk.
    claimRefs:
      - CE002
      - CE021
  - calloutType: insight
    title: Developer platform moat is real but monetization economics are opaque
    body: >-
      The 1M+ registered applications represent meaningful community switching costs: servers that have
      deployed custom moderation, economy, and game-integration bots face high re-setup friction on any
      competing platform. However, Activity monetization take rates and App Subscription economics are
      not publicly disclosed, making it difficult to size developer platform revenue contribution to
      Discord's overall ARR or to model its growth trajectory.
    claimRefs:
      - CE007
      - CE015
      - CE028
      - CE030
  - calloutType: recommendation
    title: No public uptime SLA or third-party security certification identified
    body: >-
      Discord's Terms of Service include no uptime guarantee, and no public ISO 27001, SOC 2 Type II, or
      equivalent third-party security certification has been identified. This limits Discord's
      addressability for enterprise or regulated-industry buyers requiring contractual reliability
      commitments and independently verified security controls — a meaningful constraint on any B2B
      adjacency expansion.
    claimRefs:
      - CE040
