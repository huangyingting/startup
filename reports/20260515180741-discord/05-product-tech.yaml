figures:
  - id: FE001
    title: "Product architecture map"
    type: stack
    layout: wide
    summary: >-
      Discord's technology stack is structured in eight distinct layers, from client-facing applications
      through real-time gateways, application services, and persistent data stores, down to cloud and edge
      infrastructure. The polyglot architecture reflects deliberate technology choices at each layer
      optimized for the specific performance and scalability demands of a real-time communications platform.
    data:
      layers:
        - id: l1
          label: "Client Layer"
          detail: "React (TypeScript) web app; Electron desktop (Windows/macOS/Linux); React Native mobile (iOS/Android); browser"
        - id: l2
          label: "Real-time Gateway Layer"
          detail: "Elixir/Erlang WebSocket gateway; BEAM VM distributed actor model; manages millions of concurrent connections"
        - id: l3
          label: "API & Integration Layer"
          detail: "REST API; Discord Gateway API (WebSocket events); slash commands / interactions API; webhooks; OAuth2"
        - id: l4
          label: "Application Services Layer"
          detail: "Go microservices: authentication, presence, notifications, search, file storage, guild management"
        - id: l5
          label: "Performance Layer"
          detail: "Rust components for voice/video processing, low-latency audio encoding/decoding (OPUS), hotpath pipelines"
        - id: l6
          label: "Data Layer"
          detail: "ScyllaDB (850B+ messages); PostgreSQL (relational metadata); Redis (caching, pub/sub); GCS object storage"
        - id: l7
          label: "Cloud Infrastructure Layer"
          detail: "Google Cloud Platform (GCP); multi-region compute; global load balancing; Kubernetes orchestration"
        - id: l8
          label: "Edge & CDN Layer"
          detail: "Cloudflare CDN; DDoS protection; Cloudflare Workers edge compute; global PoP network"

  - id: FE002
    title: "Customer workflow / operating flow"
    type: flow
    layout: standard
    summary: >-
      The Discord user journey follows a well-defined path from initial account creation through community
      discovery, feature adoption, and ultimately the subscription conversion decision. The funnel identifies
      Activities and bot interactions as the primary drivers of Nitro conversion intent.
    data:
      nodes:
        - id: n1
          label: "Create Account / Install App"
        - id: n2
          label: "Discover Server (Invite Link / Server Browser)"
        - id: n3
          label: "Join Server & Browse Text Channels"
        - id: n4
          label: "Join Voice / Video Channel"
        - id: n5
          label: "Interact with Bots / Activities"
        - id: n6
          label: "Invite Friends / Share Server"
        - id: n7
          label: "Encounter Nitro-Gated Feature"
        - id: n8
          label: "Subscribe to Nitro (Converted)"
        - id: n9
          label: "Remain Free Tier (Retained)"
        - id: n10
          label: "Churn / Become Inactive"
      edges:
        - from: n1
          to: n2
          label: "Onboarding / discovery prompt"
        - from: n2
          to: n3
          label: "Join server"
        - from: n3
          to: n4
          label: "Escalate to voice"
        - from: n3
          to: n5
          label: "Bot / slash command interaction"
        - from: n4
          to: n5
          label: "Activity launch in voice channel"
        - from: n5
          to: n6
          label: "Positive experience → share"
        - from: n6
          to: n2
          label: "Viral loop: new user joins"
        - from: n5
          to: n7
          label: "Hit animated emote / upload limit"
        - from: n7
          to: n8
          label: "Converts to Nitro"
        - from: n7
          to: n9
          label: "Stays free tier"
        - from: n9
          to: n10
          label: "Reduced engagement → churn"

