callouts:
  - calloutType: insight
    title: "Polyglot Stack Reflects Engineering Maturity"
    body: >-
      Discord's deliberate adoption of Elixir/Erlang, Go, Rust, and ScyllaDB—each selected for specific
      performance characteristics rather than trend-following—signals an engineering culture that prioritizes
      operational reliability and scale over development velocity. This is a positive indicator for
      infrastructure stability but creates hiring complexity in a competitive talent market.
    claimRefs: []
  - calloutType: recommendation
    title: "Commission Independent Security Audit Before Close"
    body: >-
      The absence of publicly confirmed ISO 27001 or SOC 2 certification is a gap for enterprise buyers and
      institutional investors. A diligence team should request Discord's most recent penetration test
      results, internal security audit findings, and any existing SOC 2 reports under NDA before close.
    claimRefs: [CE026]

