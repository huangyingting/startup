    - Integration depth depends on continued Sony investment; server engagement metrics not disclosed
  - - Microsoft Xbox
    - Brand/partner — gaming hardware and subscription
    - Xbox Game Pass Ultimate bundles Discord Nitro; cross-promotional partnership
    - Production
