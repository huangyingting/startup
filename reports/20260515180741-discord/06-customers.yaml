- id: s-named-proof
  title: Named customer and brand proof
  body: Discord's named customer proof is concentrated among major gaming publishers and entertainment brands, all of which
    operate through Discord's Verified Server program or formal partnership agreements. Sony PlayStation manages an official
    verified server with more than one million members and has integrated Discord at the PS5 console operating-system level,
    allowing players to display their current game in their Discord profile. Microsoft Xbox partnered with Discord to bundle
    Discord Nitro within Xbox Game Pass Ultimate, exposing the Nitro subscription to tens of millions of Xbox subscribers.
    Nintendo operates an official verified server serving as a community hub for Nintendo title fans. Riot Games maintains
    separate official verified servers for League of Legends and Valorant, each drawing millions of members from competitive
    gaming and esports communities. Epic Games operates the official Fortnite Discord server, one of the platform's largest
    single-game communities. Beyond gaming, Netflix has established fan-community servers for content discussion and premiere
    events, and Spotify has implemented an API integration allowing users to share music-listening status inside Discord profiles.
    These proofs confirm that Tier-1 technology and entertainment companies use Discord as a customer-engagement channel.
    The evidence base is, however, heavily concentrated in gaming and entertainment verticals, with no comparable named proof
    in financial services, healthcare, or enterprise software verticals.
  tableRefs:
