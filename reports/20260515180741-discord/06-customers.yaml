- id: s-retention-expansion
  title: Retention, satisfaction, and expansion risks
  body: 'Community stickiness on Discord is structurally high: server memberships persist by default and there is no active
    unsubscribe mechanism, creating durable retention for community operators. However, Nitro subscriber retention is a different
    picture—churn is not publicly disclosed, and analyst estimates of 20–30 percent annual Nitro churn would be elevated relative
    to best-in-class subscription benchmarks. App Store ratings are strong at 4.7 stars on iOS, while Google Play sits lower
    at 4.1 stars, possibly reflecting Android-specific user-experience gaps. TrustPilot ratings are substantially adverse
    at approximately 2.5 stars, driven by account-ban complaints and child-safety concerns—an adverse sentiment signal warranting
    systematic investigation. The FTC''s 2023 $7.8 million settlement for violations of the Children''s Online Privacy Protection
    Act and the Video Privacy Protection Act represents a structural risk to Discord''s ability to retain younger users and
    monetise their engagement. Expansion risks include heavy concentration in the gaming vertical (cyclical, title-dependent),
    reliance on organic server growth rather than a managed sales motion, absence of disclosed NRR or GRR, and limited revenue
    diversification beyond Nitro and server boosts. The absence of an enterprise contract path and the lack of advanced compliance
    features further constrain near-term expansion optionality. Geographic concentration risk also exists: publicly available
    data is US-centric, and international monetisation and regulatory compliance postures are not clearly evidenced.'
