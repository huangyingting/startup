- id: s-adoption
  title: Adoption trajectory and growth metrics
  body: Discord has followed an exceptional adoption trajectory since its 2015 launch, growing from 100 million registered
    users in 2020 to an estimated 600–700 million by early 2026. Monthly active users are estimated at 150–200 million, implying
    a MAU-to-registered ratio of roughly 20–30 percent—consistent with other freemium communication platforms. Daily active
    users of approximately 90 million reflect deep engagement among the core gaming and community base; a DAU/MAU ratio of
    roughly 45–60 percent compares favourably to messaging-app peers. The platform hosts 19 million weekly active servers,
    a figure last officially confirmed in 2023, and the diversity of server types—gaming, creator, academic, developer, and
    Web3—has substantially broadened the addressable market beyond gaming since 2021. Mobile represents an increasing share
    of sessions, with combined iOS and Android installs estimated above 500 million. The iOS App Store rating of 4.7 stars
    signals strong satisfaction among mobile users. The Nitro subscriber base (estimated 5–8 million) represents approximately
    3–5 percent of MAU, indicating substantial upside if conversion improves. Critically, Discord has not disclosed year-over-year
    growth comparisons, CAGR figures, or official MAU and DAU metrics in any public communication, creating a meaningful gap
    in verifiable growth-velocity data and complicating comparable company valuation analysis.
