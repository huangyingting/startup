  researchQuestions:
  - id: QU001
    question: Has Discord officially confirmed its current registered user count, and what is the most reliable recent public
      estimate?
    type: verification
    targets:
    - contentRequirements/0
    - plannedTables/customer-growth-adoption-trajectory-table
    status: answered
    answer: Discord has not issued an official press release confirming registered user count since 2023. Analyst estimates
      from Backlinko, DemandSage, and BusinessofApps converge around 600–700 M as of early 2026, consistent with growth trajectories
      implied by prior official disclosures. Confidence is medium.
  - id: QU002
    question: What is the official definition of a 'weekly active server' and when was the 19 M figure last confirmed by Discord?
    type: verification
    targets:
    - contentRequirements/0
    - plannedTables/customer-growth-adoption-trajectory-table
    status: answered
    answer: Discord confirmed 19 M weekly active servers in its official blog in 2023. The company has not issued an updated
      figure. The definition of 'active' was not specified in the public disclosure, limiting year-over-year comparability.
  - id: QU003
    question: Is Sony PlayStation's Discord server officially listed in Discord's Verified Server program, and is the PS5
      console integration confirmed?
    type: verification
    targets:
    - plannedTables/named-customer-proof-table
    - plannedFigures/customer-proof-matrix
    status: answered
    answer: Yes on both counts. PlayStation's Discord server is listed as an official verified server with 1M+ members, confirmed
      by Business Insider and IGN. The PS5 console integration was confirmed via Sony and Discord joint announcements and
      covered by multiple reputable technology media outlets.
  - id: QU004
    question: Is the Xbox Game Pass Ultimate and Discord Nitro bundle currently active, and what are its publicly stated terms?
    type: verification
    targets:
    - plannedTables/named-customer-proof-table
    - contentRequirements/2
    status: answered
    answer: The Xbox Game Pass Ultimate and Discord Nitro bundle was confirmed active via Xbox News as of September 2023.
      Specific revenue-share or commission terms were not publicly disclosed by either Microsoft or Discord.
  - id: QU005
    question: Does Discord maintain a public list of all verified servers, enabling independent cross-checking of the named
      customer proof table?
    type: verification
    targets:
    - plannedTables/named-customer-proof-table
    status: answered
    answer: Discord does not publish a comprehensive public directory of all verified servers. The verified badge is visible
      on individual server listings but no aggregate list is published. This confirms the named customer proof table is necessarily
      a partial enumeration and independent full cross-checking is not possible from public sources.
  - id: QU006
    question: What is Discord's current iOS App Store star rating, and how has it trended over the past 12 months?
    type: verification
    targets:
    - plannedTables/retention-repeat-usage-satisfaction-table
    - contentRequirements/3
    status: answered
    answer: Discord's iOS App Store rating is 4.7 stars as of May 2026. Twelve-month trend data is not available from public
      App Store listings without third-party analytics tools such as Sensor Tower.
  - id: QU007
    question: Is the FTC's 2023 $7.8 M settlement against Discord a matter of public record, and what specific statutory violations
      were cited?
    type: verification
    targets:
    - contentRequirements/3
    - plannedTables/retention-repeat-usage-satisfaction-table
    status: answered
    answer: Confirmed. The FTC issued a press release in May 2023 stating Discord agreed to pay $7.8 M and implement new privacy
      protections to resolve allegations of violating COPPA and the Video Privacy Protection Act (VPPA) by retaining children's
      data and exposing minors to harassment.
  - id: QU008
    question: What is the estimated total number of Nitro paying subscribers as of 2025–2026, and what monetisation penetration
      rate does this imply against MAU?
    type: quantification
    targets:
    - plannedTables/customer-growth-adoption-trajectory-table
    - plannedFigures/adoption-deployment-funnel
    status: answered
    answer: Analyst estimates place Nitro subscribers at 5–8 M as of 2025, implying 3–5% penetration of estimated MAU (150–200
      M). Discord has never officially disclosed subscriber count. Confidence is low given the wide estimate range and absence
      of any verified data; this is a formal diligence ask.
  - id: QU009
    question: What is Discord's current estimated daily active user count, and what DAU/MAU ratio does this imply?
    type: quantification
    targets:
    - plannedTables/customer-growth-adoption-trajectory-table
    - contentRequirements/0
    status: answered
    answer: Analyst estimates of ~90 M DAU versus ~150–200 M MAU imply a DAU/MAU ratio of approximately 45–60%. Discord does
      not officially confirm DAU, so confidence is low to medium. The ratio would indicate strong engagement among actives
      if independently verified.
  - id: QU010
    question: How many identifiable segments does Discord's user base decompose into, and what share of DAU does each segment
      represent?
    type: quantification
    targets:
    - plannedTables/customer-segmentation-table
    - contentRequirements/1
    status: answered
    answer: 'Seven segments are identifiable: gaming (~90% DAU by analyst estimates), brand/official, creator, academic, developer,
      Web3, and enterprise-adjacent. Share breakdowns for non-gaming segments are not publicly disclosed; the 90% gaming figure
      is analyst-derived and not officially confirmed by Discord.'
  - id: QU011
    question: What is the estimated conversion rate from registered users to MAU, and from MAU to DAU, in Discord's adoption
      funnel?
    type: quantification
    targets:
    - plannedFigures/adoption-deployment-funnel
    - plannedTables/customer-growth-adoption-trajectory-table
    status: answered
    answer: Implied MAU/registered conversion is ~25% (150–200 M of 600–700 M). Implied DAU/MAU is ~45–60% (90 M of 150–200
      M). These are analyst-derived estimates; Discord has not officially confirmed any conversion rate. Both ratios appear
      reasonable relative to freemium communication platform benchmarks.
  - id: QU012
    question: What is the estimated annual Nitro subscriber churn rate, and how does it compare to SaaS industry benchmarks
      for consumer subscriptions?
    type: quantification
    targets:
    - plannedTables/retention-repeat-usage-satisfaction-table
    - plannedFigures/retention-repeat-cohort
    status: unresolved
    answer: Discord does not disclose Nitro churn. Analyst estimates of 20–30% annual churn are speculative analogies to other
      consumer subscription products. No verified data source exists; this must be obtained through formal company diligence.
  - id: QU013
    question: What retention rates do Nitro subscribers, active server members, and gaming server operators exhibit at 3,
      6, 12, and 24 months post-acquisition?
    type: quantification
    targets:
    - plannedFigures/retention-repeat-cohort
    - plannedTables/retention-repeat-usage-satisfaction-table
    status: unresolved
    answer: Discord does not publish cohort retention data for any user segment. The estimates in the retention cohort figure
      are analyst analogies carrying low confidence. Formal diligence must request cohort analysis from Discord directly.
  - id: QU014
    question: What is Discord's estimated annual revenue, and what share derives from Nitro subscriptions versus server boosts
      versus other products?
    type: quantification
    targets:
    - contentRequirements/3
    - plannedTables/expansion-and-concentration-risk-table
    status: answered
    answer: Discord is private and does not disclose revenue. Analyst estimates vary widely and are not confirmed. Nitro subscriptions
      are understood to be the primary revenue driver; server boosts are a secondary lever. No public revenue split is available;
      revenue breakdown is a formal diligence data request item.
  - id: QU015
    question: Which gaming publishers and entertainment brands operate officially verified Discord servers, and what is the
      current total count of verified servers globally?
    type: enumeration
    targets:
    - plannedTables/named-customer-proof-table
    - plannedFigures/customer-proof-matrix
    status: partial
    answer: Confirmed verified servers include PlayStation, Nintendo, Riot Games (LoL and Valorant separately), Epic Games
      (Fortnite), Xbox, Netflix, and Spotify. Discord does not publish a total count of verified servers, so this enumeration
      is necessarily partial and cannot be independently verified from public sources.
  - id: QU016
    question: What non-gaming verticals have shown material Discord adoption, and what is the strategic opportunity in each?
    type: enumeration
    targets:
    - plannedTables/expansion-and-concentration-risk-table
    - contentRequirements/4
    status: answered
    answer: Creator/streaming, academic, developer, and Web3 verticals have shown material organic adoption beyond gaming.
      Enterprise and financial services adoption remains nascent. Precise market sizing for Discord's addressable opportunity
      in each non-gaming vertical is not publicly available; CNBC reporting in 2024 confirms Discord has been actively pursuing
      non-gaming expansion.
  - id: QU017
    question: How do competing platforms (Slack, Microsoft Teams, Telegram, Guilded) differ from Discord in customer segments
      and primary use cases?
    type: enumeration
    targets:
    - contentRequirements/4
    - plannedTables/expansion-and-concentration-risk-table
    status: answered
    answer: Slack and Microsoft Teams dominate enterprise communications with structured workflow integrations. Telegram leads
      in crypto/activist communities and MENA regions. Guilded (acquired by Roblox) targets gaming specifically. Discord differentiates
      via the free-to-create community server model with voice-first design targeting the 16–35 gaming demographic at much
      larger consumer scale.
  - id: QU018
    question: What is the landscape of Discord bot and integration providers, and how does bot ecosystem depth reflect developer-community
      engagement?
    type: enumeration
    targets:
    - plannedFigures/customer-proof-matrix
    - contentRequirements/1
    status: answered
    answer: Discord's bot ecosystem is large and active; platforms such as top.gg catalogue tens of thousands of public bots
      across moderation, music, gaming utility, and productivity categories. Developer community depth is substantial, evidenced
      by active Discord API developer portals, large developer support servers, and a robust third-party integration market.
  - id: QU019
    question: What is the distribution of server sizes across Discord's 19 M weekly active servers, and how concentrated is
      activity in top-tier servers?
    type: quantification
    targets:
    - plannedTables/customer-segmentation-table
    - plannedFigures/customer-journey-map
    status: unresolved
    answer: Discord does not publish server size distribution data. Anecdotal evidence and power-law dynamics suggest the
      top fraction of servers (large official and brand servers) drive a disproportionate share of total activity, Nitro conversions,
      and new-user acquisition. This distribution is a critical unknown for segment-level modelling.
  - id: QU020
    question: Does Discord disclose any NRR, GRR, or subscriber cohort data in any filing, investor communication, or regulatory
      submission?
    type: verification
    targets:
    - plannedTables/retention-repeat-usage-satisfaction-table
    - plannedFigures/retention-repeat-cohort
    status: unresolved
    answer: Discord is private and has not published NRR, GRR, or cohort retention data in any publicly accessible document.
      No such disclosure was identified across all sources researched.
  - id: QU021
    question: How does Discord's academic and study-community segment compare to dedicated study platforms such as Quizlet,
      Chegg, and Khan Academy?
    type: comparison
    targets:
    - contentRequirements/2
    - plannedTables/customer-segmentation-table
    status: answered
    answer: Discord's study communities are informal and self-organising, lacking the structured content of Quizlet or Khan
      Academy. Discord competes on social engagement and real-time voice rather than content depth, serving a complementary
      rather than competitive role to dedicated study tools. Growth in this segment was COVID-driven and organic.
  - id: QU022
    question: What adverse signals exist in public user reviews and complaint data regarding Discord's safety, moderation,
      and account-ban practices?
    type: adverse
    targets:
    - plannedTables/retention-repeat-usage-satisfaction-table
    - contentRequirements/3
    status: answered
    answer: TrustPilot shows approximately 2.5 stars, dominated by account-ban complaints perceived as unjust and by child
      safety concerns. The FTC's $7.8 M settlement for COPPA/VPPA violations is the most significant adverse regulatory signal.
      Reports from the WSJ and TechCrunch document ongoing risks of predatory behaviour in Discord servers targeting minors.
  - id: QU023
    question: How might Discord's concentration in the gaming vertical create downside scenarios for MAU and revenue in a
      gaming-engagement downturn or platform shift?
    type: adverse
    targets:
    - contentRequirements/3
    - plannedTables/expansion-and-concentration-risk-table
    status: answered
    answer: If gaming engagement declines due to generational shifts, emergence of in-game native voice chat layers, or loss
      of a major publisher partner, Discord's DAU and Nitro base could decline materially. Gaming is cyclical and title-dependent;
      the shutdown or platform migration of a major franchise would stress associated Discord communities directly.
  - id: QU024
    question: What child-safety or platform-moderation failures have been publicly documented that could constitute ongoing
      reputational or regulatory liability?
    type: adverse
    targets:
    - plannedTables/expansion-and-concentration-risk-table
    - contentRequirements/3
    status: answered
    answer: Beyond the FTC settlement, the WSJ and TechCrunch have reported incidents of grooming and predatory behaviour
      in Discord servers. Discord has responded with expanded Trust and Safety teams and age-gating features, but enforcement
      is structurally uneven given 19 M servers. Regulatory scrutiny continues under the EU Digital Services Act.
  - id: QU025
    question: What is the evidence of Nitro subscriber fatigue or negative Nitro perception in public user community discussions
      and reviews?
    type: adverse
    targets:
    - plannedFigures/customer-proof-matrix
    - plannedTables/retention-repeat-usage-satisfaction-table
    status: answered
    answer: Community discussions on r/discordapp frequently surface complaints about Nitro pricing, the perception that Nitro-gated
      features should be free, and frustration with server boost economics. G2 and TrustRadius reviews cite Nitro pricing
      as a friction point. These signals indicate potential Nitro subscriber ceiling and pricing-power constraints.
  - id: QU026
    question: Has Discord faced legal actions or regulatory investigations beyond the FTC settlement that could affect customer
      trust or platform operations?
    type: adverse
    targets:
    - contentRequirements/4
    - plannedTables/retention-repeat-usage-satisfaction-table
    status: answered
    answer: The FTC settlement is the most prominent confirmed public regulatory action. Discord has faced class-action and
      individual lawsuits related to child safety and data handling with less public documentation. EU Digital Services Act
      compliance obligations are an emerging regulatory vector that may require operational and product changes going forward.
  - id: QU027
    question: Are there documented cases of major brand partners reducing or discontinuing their Discord presence, and what
      factors drove any such departures?
    type: adverse
    targets:
    - plannedTables/named-customer-proof-table
    - plannedFigures/customer-proof-matrix
    status: answered
    answer: No major brand departure from Discord was identified in public sources during research. However, the absence of
      long-term contractual commitments means brands can exit at any time with no lock-in, representing a structural risk
      that cannot be fully quantified without internal brand-partner pipeline and retention data.
