callouts:
- calloutType: insight
  title: Gaming concentration is both Discord's superpower and its most material strategic risk
  body: 'Approximately 90 percent of Discord''s daily active users are gamers, and the platform''s deepest product integrations,
    largest communities, and most compelling brand proofs all originate in gaming. This concentration has driven exceptional
    growth and engagement metrics, but it exposes Discord to cyclical risk: a structural decline in PC gaming engagement,
    a platform shift by a major publisher, or the emergence of a gaming-native competitor could rapidly erode the core user
    base. Investors should track the pace of non-gaming segment growth as the primary diversification signal.'
  claimRefs: []
- calloutType: risk
  title: FTC enforcement and TrustPilot signals indicate a material, systemic child-safety risk
  body: The $7.8 M FTC settlement in May 2023 for COPPA and VPPA violations, combined with a ~2.5-star TrustPilot rating dominated
    by child-safety and account-ban complaints, indicates a material and systemic risk that extends beyond surface-level moderation
    failures. These signals reflect product-design and data-handling decisions that regulators have already actioned. Diligence
    should assess Discord's post-settlement compliance programme, any outstanding regulatory inquiries under the EU Digital
    Services Act, and whether the adverse brand signal is affecting enterprise or brand-partner conversations.
  claimRefs: []
