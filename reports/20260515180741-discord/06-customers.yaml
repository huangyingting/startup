chapter:
  number: 6
  title: Customers
  summary: Discord operates a B2C2C platform where individual users, community operators, and brand partners intersect. Its
    estimated 600–700 M registered users span gaming communities (dominant, ~90% of DAU), official brand servers from major
    game publishers and entertainment companies, creator communities, study groups, tech communities, and Web3 projects. Daily
    active users number approximately 90 M across 19 M weekly active servers. Monetisation concentrates in Nitro subscriptions
    (estimated 5–8 M paying subscribers) and server boosts. Named brand proof is robust in gaming—PlayStation, Xbox, Nintendo,
    Riot Games, and Epic Games—but heavy vertical concentration and the absence of disclosed NRR/GRR are notable diligence
    gaps. A $7.8 M FTC settlement in 2023 and adverse TrustPilot scores signal meaningful child-safety and brand-risk exposure
    requiring systematic diligence.
sections:
- id: s-segments
  title: Customer base segmentation
  body: 'Discord''s user base decomposes into seven identifiable segments, each with distinct use cases, monetisation profiles,
    and strategic value. Gaming communities are the dominant segment: approximately 90 percent of daily active users report
    playing video games, and the largest servers—built around titles such as Minecraft, Roblox, Valorant, CS2, and Apex Legends—number
    in the millions of members. Official brand servers maintained by Sony PlayStation, Nintendo, Riot Games, Epic Games, and
    Electronic Arts represent a second, strategically critical segment that confers legitimacy and drives new-user acquisition
    through console and game integrations. Creator communities, including YouTube personalities, Twitch streamers, and K-pop
    fan networks, form a third segment that monetises principally through channel boosts and exclusive subscription tiers.
    Study and academic communities expanded sharply during the COVID-19 pandemic and today represent a sizeable growth segment
    attracting younger cohorts with long-term lifetime-value potential. Tech and developer communities—covering open-source
    projects, programming help servers, and hacker forums—provide developer-relations value and act as informal product advocates.
    Web3 and crypto communities adopted Discord as their primary coordination layer, though this segment is volatile and carries
    reputational risk from fraud and scam server association. Finally, a nascent enterprise-adjacent segment employs Discord
    for lightweight internal communications and customer support, but it remains marginal compared to Slack and Microsoft
    Teams. Discord does not publish official segment-level data, so all sizing estimates are analyst-derived.'
