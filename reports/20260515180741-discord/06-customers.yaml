- id: TU005
  title: Expansion and concentration risk table
  columns:
  - Expansion Driver
  - Concentration Risk
  - Impact
  - Diligence Path
  rows:
  - - Nitro subscription upsell to existing MAU
    - Revenue concentrated in a single subscription SKU; ~3–5% MAU conversion rate estimated
    - 'High: limited pricing power; free tier structurally cannibalises paid upgrade motivation'
    - Obtain subscriber count, ARPU, and churn from company; model sensitivity to conversion rate changes
  - - Gaming-vertical dependency
    - ~90% of DAU are active gamers; gaming is cyclical and title-shift-dependent
    - 'High: platform engagement could fall materially if gaming culture or dominant titles shift away from Discord'
    - Track non-gaming server growth year-on-year; diversification pace is a primary investment risk signal
  - - Brand/official server expansion beyond gaming
    - Concentration in gaming and entertainment; no named proof in enterprise, financial, or healthcare verticals
    - 'Medium: missed revenue from non-gaming verticals; limited enterprise contract revenue path'
    - Map pipeline of non-gaming brand partnerships; assess whether a self-serve enterprise SKU is planned or in beta
  - - Geographic expansion
    - US-centric public data; international MAU share and monetisation rates unclear
    - 'Medium: regulatory risk varies by region (EU DSA, child safety legislation); monetisation rates differ'
    - Request regional MAU breakdown in diligence; assess EU DSA compliance posture and GDPR data-handling audit
  - - Creator monetisation (server subscriptions and creator fund)
    - Creator retention relative to Patreon, Substack, and Memberful is unproven at scale
    - 'Medium: success depends on creator-economics competitiveness; early-stage product with limited track record'
    - Track creator subscription GMV and creator retention cohorts; compare payout economics to competing creator platforms
  notes: Expansion risks are ordered by current revenue-impact severity. Gaming concentration and Nitro-SKU dependency are
    the most near-term and material valuation risks. Geographic and creator monetisation risks are medium-term.
