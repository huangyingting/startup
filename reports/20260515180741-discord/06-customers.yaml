tables:
- id: TU001
  title: Customer segmentation table
  columns:
  - Segment
  - Buyer/User/Payer
  - Use Case
  - Scale
  - Revenue/Strategic Value
  - Gap
  rows:
  - - Gaming communities
    - User (free); Payer if Nitro subscriber
    - Voice/text chat, game-session coordination, esports discussion
    - ~90% of DAU; millions of servers for major titles
    - High strategic value; primary Nitro upsell surface
    - High churn risk if dominant game title loses player base
  - - Brand/official servers
    - Brand is operator (free); fans are users
    - Community management, fan engagement, product announcements
    - Dozens of verified mega-servers with 1M+ members each
    - High legitimacy signal; marketing co-promotion with publishers
    - Brand exit risk if platform trust erodes due to child safety or moderation failures
  - - Creator/content communities
    - Creator is operator; fans as users and optional payers (boosts)
    - Exclusive content, fan interaction, merchandise promotion
    - Millions of creator-linked servers; no aggregate scale disclosed
    - Server boost revenue; Nitro subscriptions from engaged fans
    - Creator migration risk to Patreon, Substack, or Memberful
  - - Study/academic communities
    - Students and educators as users
    - Homework help, study groups, college organisation servers
    - Material growth segment post-COVID; precise scale not publicly available
    - Low direct revenue; long-term LTV if students convert to Nitro
    - Low current monetisation; heavy free-tier dependency
  - - Tech/developer communities
    - Developers as users
    - Open-source project coordination, product support, developer advocacy
    - Substantial; GitHub projects, coding bootcamps, hacker forums
    - Developer-relations value; brand signal for tech ecosystem
    - Low direct monetisation; sophisticated users tend to avoid paid features
  - - Web3/crypto communities
    - Token holders, NFT collectors, DAO participants
    - DAO governance, NFT drop coordination, community management
    - Large but volatile; declined with crypto market cycle
    - Variable; token-gated bots add engagement but no direct Discord revenue
    - Regulatory and reputational risk from fraud/scam server association
  - - Enterprise-adjacent
    - Small teams and customer-support operators
    - Lightweight internal comms, vendor community management
    - Very small relative to Slack and Microsoft Teams
    - Low current; potential upside if a dedicated enterprise SKU launches
    - No enterprise SLA, audit logging, or compliance certifications; direct competition from Slack/Teams
  notes: Segment scale figures are analyst estimates; Discord does not publish official segment-level breakdowns. The Buyer/User/Payer
    distinction reflects Discord's B2C2C model where server operators are the primary platform 'buyers' and individual users
    are the Nitro payers.
