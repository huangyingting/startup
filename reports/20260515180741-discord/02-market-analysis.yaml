  - id: SM-drivers
    title: Growth Drivers and Technology Tailwinds
    body: >-
      Five structural forces provide tailwinds for Discord's market growth through 2028.
      First, the gaming market itself is growing at 13.40% CAGR, expanding the embedded
      audience that historically converts to Discord users at high rates — over 90% of
      Discord's daily active users play video games according to the company's own page.
      Second, the creator economy's expansion toward approximately $480 billion by 2027
      creates demand for platforms that combine community building with monetization tooling.
      Goldman Sachs identified scale, diversified monetization tools, and strong AI
      recommendation capabilities as key enablers for platforms to capture creator-economy
      spending — criteria Discord partially meets. Third, AI integration in collaboration
      tools is a sector-wide driver: Mordor Intelligence estimates generative-AI assistants
      contribute approximately 3.10% incremental CAGR impact to team collaboration tools
      through expanded use of conversation summarization, translation, and workflow automation.
      Discord's developer-API ecosystem positions it to absorb AI-powered extensions built
      by third parties. Fourth, mobile usage continues: Discord was downloaded 54.64 million
      times globally and ranked ninth most-downloaded app in the U.S. Fifth, the platform
      engineering at scale — handling billions of messages per day and having migrated its
      message store to ScyllaDB to handle trillions of stored messages — provides technical
      credibility that supports enterprise-adjacent community deployments.
    claimRefs:
