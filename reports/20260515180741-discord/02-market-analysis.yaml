company:
  name: Discord
chapter:
  number: 2
  title: Market Analysis
  summary: >-
    Discord operates at the intersection of three converging markets: online community
    communication, the gaming ecosystem (a $293B global industry in 2024), and the adjacent
    team-collaboration software segment ($20.86B in 2025, growing at 12–13% CAGR). The company
    holds approximately 9% of the U.S. messaging-app market by share of leading platforms, with
    656 million registered users and 259 million monthly active users as of 2026. Revenue reached
    an estimated $561 million in 2025, growing approximately 29% year-on-year, driven almost
    entirely by Nitro subscriptions and server-boost fees. Gaming servers represent 24.6 million
    of 32.6 million total servers (75%), yet 78% of users report using Discord for purposes beyond
    gaming, illustrating the platform's successful but still incomplete pivot toward general
    community use. The creator economy, projected to approach $480 billion by 2027 per Goldman
    Sachs Research, represents a material adjacent opportunity. Key adoption constraints include
    a gaming-centric brand perception that limits enterprise uptake, revenue concentration on a
    single product tier, unresolved moderation trust-and-safety risks, and intensifying competition
    from better-resourced incumbents. Geographic concentration in North America (30.26% of users
    in the U.S., 60% of in-app purchase revenue) limits near-term global revenue upside without
    a deliberate international expansion strategy.

sections:
  - id: SM-definition
    title: Market Definition and Scope
    body: >-
      Discord's addressable market spans three partially overlapping segments, each with distinct
      buyer behaviors, budget mechanisms, and competitive dynamics. The first and largest is
      online community communication: persistent-channel platforms used by interest-based, gaming,
      creator, and fan communities for ongoing text, voice, and video interaction. This market
      includes subscription revenue from community-feature upgrades (Nitro, Server Boosts), and is
      served by Discord, Guilded, Reddit, Telegram, and Facebook Groups. The second segment is
      gaming communication: the layer of voice, text, and coordination tooling overlaid on the
      $293 billion global gaming market. This segment has historically been Discord's core, with
      24.6 million gaming servers out of 32.6 million total. The third segment is team and
      professional collaboration software, an adjacent market estimated at $20.86 billion in 2025
      by Mordor Intelligence and $18.84 billion in 2024 by Verified Market Research. Discord
      competes indirectly here via server-based workspace use by small teams and developer
      communities, with approximately 65% of companies that use Discord having fewer than 50
      employees.

      Excluded from Discord's addressable market are enterprise unified communications (Zoom,
      Cisco Webex, Microsoft Teams for large-enterprise video-first workflows), social media
      advertising revenue (Facebook, TikTok, Instagram), online gaming software itself, and
      traditional broadcast media. The status-quo substitutes that Discord displaces include
      Reddit (forum-style community), Slack (small-team chat), Telegram (large-channel messaging),
      WhatsApp (group messaging), and TeamSpeak or Mumble (legacy gaming voice). Discord's
      shift in 2021 from "Chat for Gamers" to "Chat for Communities and Friends" formalized its
      intent to broaden beyond the gaming status quo while retaining its core user base.
    claimRefs:
      - CM001
      - CM002
      - CM003
      - CM004
      - CM005
      - CM006
    tableRefs:
      - TM001

  - id: SM-sizing
    title: Market Sizing — TAM, SAM, and Constrained Estimates
    body: >-
      No single published analyst report directly sizes Discord's exact addressable market as
      a community communication platform, requiring multiple complementary lenses. The team
      collaboration tools market, which represents the upstream professional-adjacent
      opportunity, was sized at $20.86 billion in 2025 by Mordor Intelligence, growing at a
      12.18% CAGR to reach $42.2 billion by 2031. Verified Market Research places the 2024
      team collaboration software market at $18.84 billion with a 12.90% CAGR to $49.73
      billion by 2031. The two estimates are broadly aligned on trajectory even if the
      absolute values differ modestly. Discord is not a direct enterprise-software vendor,
      meaning it captures only a slice of this market through its growing SMB and developer
      community usage — primarily in the communication and coordination sub-segment, which
      held 41.29% of team collaboration spending in 2025.

      The global gaming market provides context for the gaming communication overlay.
      Verified Market Research values the gaming market at $293.28 billion in 2024,
      projecting $733.82 billion by 2031 at a 13.40% CAGR. The communication infrastructure
      built for gamers represents a high-engagement, monetizable layer on top of this market,
      though the communication-only TAM for gaming is a fraction of total gaming spend.
      Discord's current revenue run-rate of approximately $561–700 million annually suggests
      it has captured a low-single-digit percentage of the addressable communication and
      community platform segment.

      The creator economy offers a third sizing lens. Goldman Sachs Research projected that
      the creator economy could approach $480 billion by 2027, driven by platform monetization,
      brand partnerships, and creator-direct subscriptions. Discord's App Subscriptions feature
      enables creators to monetize communities directly within the platform, representing a
      direct play on this market. A bottom-up SAM estimate derived from 259 million MAU at a
      conservative $3–5 annual ARPU yields approximately $1–2 billion at current product scope,
      with potential expansion to $3–5 billion if Nitro conversion rates improve and creator
      monetization scales. Discord's 9% share of the U.S. messaging-app market confirms
      material penetration but also room for growth versus Facebook Messenger (52%) and
      WhatsApp (26%).
    claimRefs:
      - CM007
