      - SM003
      - SM010
      - SM011
      - SM016

  - id: TM004
    title: Growth drivers and adoption constraints
    description: Forces shaping Discord's market growth and adoption pace in 2026–2031.
    columns:
      - 'Driver / Constraint'
      - Direction
      - Timing
      - Implication
      - Diligence Ask
    rows:
      - - Gaming market growth (13.4% CAGR through 2031)
        - Tailwind
        - Short to medium term
        - Expanding gaming user base directly replenishes Discord's install funnel
        - Confirm whether Discord MAU tracks gaming market growth or is decoupling
      - - Creator economy expansion (~$480B by 2027)
        - Tailwind
        - Medium term
        - App Subscriptions and creator monetization could diversify revenue beyond Nitro
        - Disclose App Subscriptions revenue share and active creator count
      - - Gen Z digital-native adoption
        - Tailwind
        - Ongoing
        - '37% of U.S. 18–34-year-olds already use Discord; demographic is early majority'
        - Track whether Gen Z retention holds as cohort ages into 25–34 bracket
      - - AI integration and bot ecosystem
        - Tailwind
        - Short term
        - 'Developer bots extend product surface without capex; AI copilots could lift engagement'
        - Quantify active bot/app installs and developer-ecosystem revenue share
      - - Mobile download momentum
        - Tailwind
        - Ongoing
        - '54.64M global downloads and #9 U.S. app rank sustain top-of-funnel acquisition'
        - Disclose mobile vs. desktop MAU split and mobile Nitro conversion vs. desktop
      - - Gaming-centric brand perception
        - Headwind
        - Medium term
        - Limits enterprise and non-gaming creator adoption without sustained repositioning
        - Measure non-gaming DAU share growth quarter-over-quarter
      - - COPPA and DSA regulatory pressure
        - Headwind
        - Short to medium term
        - 'FTC COPPA settlement established compliance obligations; EU DSA creates mandatory
          content-moderation audits'
        - Confirm DSA compliance roadmap; assess KOSA legal exposure
      - - Revenue concentration on Nitro
        - Headwind
        - Structural
        - Single-product revenue base creates fragility with no advertising revenue buffer
        - Disclose Nitro subscriber count, MRR, and churn rate
      - - Enterprise competition from Slack and Teams
        - Headwind
        - Ongoing
        - 'Microsoft Teams has 320M+ active users; Discord lacks SSO, compliance logging,
          and enterprise security certifications'
        - Assess whether Discord has a go-to-market motion or roadmap for enterprise
      - - January 2024 workforce reduction (17%)
        - Headwind (operational signal)
        - Historical (resolved)
        - Signals company operated above sustainable cost base; introduces execution risk
        - Request post-layoff attrition data and runway-to-profitability model
    notes: >-
      Driver and constraint classification based on synthesis of Mordor Intelligence (team
      collaboration market drivers), Verified Market Research (gaming market analysis),
      DemandSage (Discord statistics 2026), Business of Apps (Discord revenue history),
      Goldman Sachs (creator economy), and publicly reported adverse events.
    sourceRefs:
      - SM006
      - SM007
      - SM008
      - SM009
      - SM010
      - SM011
      - SM016

