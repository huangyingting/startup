  - id: SM-segments
    title: Segment and Buyer Landscape
    body: >-
      Discord's user base divides into four primary segments with distinct adoption patterns,
      monetization profiles, and switching costs. The largest by server count is gaming
      communities: 24.6 million gaming servers support casual, competitive, and esports-adjacent
      communication. Within this segment, only 22% of Discord users report using the platform
      exclusively for gaming; 78% use it for gaming plus other purposes, confirming substantial
      overlap with broader community use. The second segment is creator and entertainment
      communities, represented by 13.5 million entertainment-adjacent servers. The Midjourney
      AI art community on Discord has 19.94 million members and is the single largest Discord
      server, exemplifying the AI/tech community use case that emerged since 2022. The third
      segment is interest and identity communities (education, non-profit, fan groups, developer
      communities). The fourth and smallest is SMB and startup teams: approximately 65% of
      companies using Discord have fewer than 50 employees, positioning it as a lightweight
      Slack alternative for early-stage teams.

      The buyer profile is dominated by young adults: 37% of U.S. adults aged 18–34 have a
      Discord account, versus 16% of the total U.S. adult population. The demographic skews
      male at 67.7% versus 32.3% female. The U.S. constitutes 30.26% of the global user base,
      followed by Canada (5.35%), United Kingdom (4.22%), and Germany (4.02%). Monetization
      penetration within each segment is opaque — Discord does not disclose Nitro subscriber
      counts or conversion rates, creating a material evidence gap. The payer (Nitro subscriber)
      is usually the individual user rather than an organization budget owner, which contrasts
      sharply with B2B procurement at Slack or Teams and limits per-seat expansion revenue.
      App Subscriptions allow server creators to charge community members directly, introducing
      a creator-economy payer dynamic where the community manager becomes both buyer and seller.
