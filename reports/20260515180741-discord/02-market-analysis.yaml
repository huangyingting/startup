  evidenceGaps:
    - type: missing-source
      severity: material
      topic: Nitro subscriber count and churn rate
      relatedQuestionRefs:
        - QM020
        - QM027
      missingEvidence: >-
        Discord has not publicly disclosed the number of Nitro subscribers, monthly recurring
        revenue from Nitro, or churn rate. This creates a material diligence gap because almost
        all of Discord's revenue derives from this single product. Without subscriber count and
        retention data, the durability and growth ceiling of the subscription model cannot be
        independently assessed. Diligence path: request from management or seek a future SEC
        filing or bond offering document if Discord pursues a capital raise.

    - type: missing-source
      severity: material
      topic: App Subscriptions revenue and active creator count
      relatedQuestionRefs:
        - QM028
      missingEvidence: >-
        Discord has not disclosed App Subscriptions (creator-direct subscription) revenue or
        the number of active creator subscribers. Given the creator economy strategic rationale
        and the stated expansion beyond Nitro, this data point is material for assessing revenue
        diversification. Diligence path: request from management; triangulate via App Store
        review counts and visible community sizes on top servers.

    - type: missing-source
      severity: moderate
      topic: No direct analyst sizing for online community communication platform market
      relatedQuestionRefs:
        - QM029
        - QM030
      missingEvidence: >-
        No single analyst report provides a clean TAM/SAM estimate for online community
        communication platforms that isolates Discord's exact market boundary. The team
        collaboration and gaming markets are adjacent context, not Discord-specific estimates.
        The bottom-up SAM derived in this chapter ($3–8B) is a rough estimate with very low
        confidence. Diligence path: commission a custom market sizing from an analyst firm or
        develop a proprietary bottom-up model using Discord's disclosed user metrics.

    - type: conflicting-sources
      severity: moderate
      topic: Discrepancy between DemandSage and Business of Apps revenue figures
      missingEvidence: >-
        DemandSage (2026 article) cites $561M revenue in 2025; Business of Apps cites $575M
        in 2023. The growth rates stated (both ~29%) suggest these may be reporting on
        different fiscal years with the same growth rate description, or they are sourcing
        from different underlying private data. Neither figure is audited; they cannot be
        reconciled without access to internal financial statements.

    - type: missing-source
      severity: low
      topic: Non-U.S. market monetization data
      relatedQuestionRefs:
        - QM025
      missingEvidence: >-
        Discord's revenue breakdown by geography beyond the DemandSage estimate that 60% of
        IAP revenue comes from the U.S. is not publicly available. The monetization rate of
        non-U.S. users — critical for international expansion modeling — cannot be confirmed
        from public sources.
