  - calloutType: risk
    title: Realized SAM is far below headline TAM and monetization friction is the binding constraint
    body: >-
      Backlinko's $725M and Reuters' $600M revenue estimates imply Discord captures less than 0.5 percent
      of the games market and roughly 20-50 percent of the much smaller online community management market.
      TheInformation has described Discord as "struggling to grow up," and most users remain unmonetized.
      Without a meaningful expansion of paid penetration or a new revenue surface (advertising, partner
      monetization), valuation is constrained by SAM, not TAM.
    claimRefs:
      - CM046
      - CM048
      - CM049
      - CM050
      - CM051
  - calloutType: insight
    title: Buyer-user-payer separation makes Discord more like a consumer subscription than a B2B SaaS
    body: >-
      Because the same individual is buyer, user, and payer for Nitro, Discord's funnel is community-driven
      and impulse-priced rather than procurement-led. This explains why DAU/MAU and active-server counts
      lead conversion rather than CAC, but also caps how large any single account can become.
    claimRefs:
      - CM024
      - CM029
      - CM030
      - CM044
