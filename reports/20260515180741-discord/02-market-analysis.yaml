  - id: TM003
    title: Segment / buyer map
    description: Discord primary user segments with buyer, payer, workflow, and adoption trigger.
    type: enumeration
    enumerationScope:
      coverage: partial
      basis: >-
        Segments derived from server-count distribution data (DemandSage 2026), Discord product
        pages, and secondary market coverage. Exact revenue or MAU breakdown by segment is not
        publicly disclosed by Discord. This table captures the principal observable community
        types; smaller niche segments such as crypto/NFT communities are not enumerated separately.
    columns:
      - Segment
      - 'Buyer / User'
      - Payer
      - 'Workflow / Use Case'
      - Budget Owner
      - Adoption Trigger
    rows:
      - - Competitive gaming and esports
        - Competitive multiplayer gamers, esports team members
        - 'Individual (Nitro for perks); team budget for organized squads'
        - Real-time voice coordination during gameplay and team strategy channels
        - Individual gamer or esports organization
        - Game launches with official Discord servers (Valorant, Marvel Rivals)
      - - Casual gaming communities
        - 'Casual gamers, game fans, speedrunners'
        - Individual (optional Nitro)
        - 'Game-specific discussion, fan art sharing, server events'
        - Individual (free tier dominant)
        - Word-of-mouth from gaming peers; official game server links
      - - Game developer communities
        - Indie developers and modding communities
        - Developer studios (Server Boost for community features)
        - 'Beta feedback, mod distribution, developer Q&A channels'
        - Studio community manager
        - Platform presence required for game-community management
      - - Creator and streamer communities
        - 'Streamers (Twitch, YouTube), musicians, visual artists'
        - Creator (Nitro) and fans (App Subscriptions)
        - 'Exclusive content, fan engagement, livestream coordination'
        - Creator (revenue share from App Subscriptions)
        - Twitch/YouTube integration; ability to gate content behind subscription
      - - AI and tech communities
        - 'AI researchers, prompt engineers, developers'
        - Community members (optional Nitro or App Subscriptions)
        - 'AI tool discussion, prompt sharing, project collaboration'
        - Individual or community-driven (Midjourney model)
        - 'Community-first product onboarding (Midjourney: 19.94M members)'
      - - SMB and startup teams
        - 'Early-stage startup employees, developer teams'
        - Business (informal free-tier usage or Nitro)
        - 'Internal team chat, lightweight project coordination'
        - Founder or CTO (no formal procurement)
        - Lightweight Slack alternative; familiarity from personal use
      - - Education communities
        - 'Students, educators, tutors, study groups'
        - Individual (Nitro); institution (rare)
        - 'Study coordination, lecture streams, homework channels'
        - Student or educator
        - Discord for Students program; organic study-group formation
      - - Non-gaming interest groups
        - 'Hobby enthusiasts, fan communities, non-profit organizations'
        - Individual (optional Nitro)
        - 'Topic-focused channels, event coordination'
        - Community admin
        - Migration from Facebook Groups or Reddit for better UX
    notes: >-
      Payer data is largely inferred; Discord does not disclose Nitro conversion rates or App
      Subscription revenue by segment. The SMB segment overlaps indirectly with the team-collaboration
      market. Segment rows each represent observable community archetypes, not exclusive categories.
    sourceRefs:
