  evidenceGaps:
    - type: missing-source
      severity: material
      topic: Discord's Nitro subscriber count and ARPU are not publicly disclosed
      missingEvidence: >-
        Public sources estimate Nitro penetration in the low single-digit percent of MAU but neither Discord
        nor any audited filing discloses subscriber count, churn, or ARPU.
      whyItMatters: >-
        Without paid-penetration disclosure, realized SAM is unknowable and the $600M-$725M revenue estimates
        cannot be reconciled to a unit-economics model.
      diligencePath: >-
        Request Nitro subscriber count, ARPU, and churn from management; cross-check against Server Boost
        revenue mix.
      relatedQuestionRefs:
        - QM021
      relatedTableRefs:
        - TM003
        - TM004
    - type: conflicting-data
      severity: material
      topic: Online community management platform market estimates conflict by 30-40% across publishers
      missingEvidence: >-
        Grand View, Allied, Verified, and Market Research Future publish 2030 forecasts in the $2.5B-$3.8B
        range with materially different methodologies and CAGRs.
      whyItMatters: >-
        Underwriting which lens to use materially changes the SAM and the implied Discord share.
      diligencePath: >-
        Triangulate by underlying assumptions; request Discord's own internal market sizing if available.
      relatedQuestionRefs:
        - QM004
        - QM009
      relatedTableRefs:
        - TM002
    - type: enumeration-incomplete
      severity: minor
      topic: Brand and partner revenue contribution to Discord is not enumerable from public sources
      missingEvidence: >-
        Brand-led communities and game-publisher partner integrations are documented but no revenue or unit
        breakdown is public.
      whyItMatters: >-
        Partner revenue is a candidate growth surface that may not show up in current Nitro/Boost data.
      diligencePath: >-
        Request partner-revenue line items and customer logos from management.
      relatedQuestionRefs:
        - QM013
      relatedTableRefs:
        - TM003
    - type: missing-source
      severity: material
      topic: Discord's share of the games market is only inferable, not publicly reported
      missingEvidence: >-
        No publisher reports Discord's penetration as a share of total gaming-related communications spend.
        Existing share estimates (0.3-0.5% of Newzoo's games market) are calculated from analyst revenue
        estimates that the company has not confirmed.
      whyItMatters: >-
        Without a verified share figure, the market-penetration narrative cannot be tested for plausibility.
      diligencePath: >-
        Request Discord's own market-sizing studies and any third-party benchmark commissioned by the company.
      relatedQuestionRefs:
        - QM010
      relatedTableRefs:
        - TM002
    - type: enumeration-incomplete
      severity: minor
      topic: Non-gaming and educational community share of Discord's user base is not separately reported
      missingEvidence: >-
        Discord's blog claims a broader user base but does not split MAU by segment between gaming, study
        groups, fandom, and other non-gaming verticals.
      whyItMatters: >-
        The non-gaming segment hypothesis underwrites the long-run TAM expansion case.
      diligencePath: >-
        Request a server-category breakdown of MAU and active servers.
      relatedQuestionRefs:
        - QM015
      relatedTableRefs:
        - TM003
acknowledgedWarnings:
  - dimension: unverifiedSource
    reason: Sources SM004–SM018, SM023–SM024, SM027–SM030 include market research paywalled reports, Statista, eMarketer, and other JS-only or rate-limited pages that cannot be fetched directly via the fetch-url pipeline. Their market size and growth figures were cross-verified against multiple corroborating sources.
