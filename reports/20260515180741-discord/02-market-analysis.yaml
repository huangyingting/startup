  - id: section-2
    title: Sizing lenses, TAM/SAM/SOM, and contradictory analyst estimates
    body: >-
      No single TAM number captures Discord's opportunity, so we triangulate four lenses. Lens one is the
      online community management platform market: Grand View sizes it at $1.18B in 2022 growing to $3.61B
      by 2030 at a 12.8 percent CAGR, while Allied Market Research and Verified Market Research publish
      similar trajectories and Mordor Intelligence's team-collaboration view sizes the broader collab
      software market at roughly $25B by 2030. Lens two is the gaming market itself: Newzoo's 2024 Global
      Games Market Report puts global games revenue at approximately $187B in 2024, growing to over $200B
      by 2026, with mobile and PC accounting for the majority. Lens three is consumer social and messaging:
      Statista projects 5.85B social media users worldwide by 2027 and a multi-trillion-message daily
      messaging volume, while eMarketer's social-communities outlook tracks group-based usage. Lens four is
      the creator economy: Goldman Sachs values it at $250B today and projects $480B by 2027, while Forbes
      and Influencer Marketing Hub triangulate to a $250-500B range with high methodology variance.

      The point of presenting four lenses is that Discord's realized SAM is much smaller than any of these
      headline numbers. Backlinko's $725M and Reuters' $600M revenue estimates imply Discord captures
      roughly 0.3-0.5 percent of the global games market and roughly 20-50 percent of the online community
      management platform market depending on how strictly the boundary is drawn. The conflicting estimates
      between Grand View, Allied, Verified, and Market Research Future for the same online-community
      category — ranging from $1.1B to $3.6B for similar 2030 forecasts — reflect methodology divergence
      and should be preserved as ranges rather than collapsed to a point estimate.
