callouts:
  - calloutType: strength
    title: Multiple sizing lenses converge on a real, growing addressable market
    body: >-
      Whether the lens is online community management ($3.6B by 2030 per Grand View), the creator economy
      (~$480B by 2027 per Goldman Sachs), or the global games market (~$200B today per Newzoo), Discord
      sits inside categories that are independently sized and growing at high single-digit to mid-teens
      CAGRs. The convergence across publishers gives confidence that the demand backdrop is real.
