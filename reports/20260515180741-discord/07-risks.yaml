  researchQuestions:
    - id: QR001
      question: >-
        Has Discord satisfied the material obligations of the 2023 FTC COPPA
        consent decree, and has the FTC initiated any subsequent enforcement
        action for violations?
      type: verification
      status: answered
      answer: >-
        Public reporting confirms Discord paid the $7.8M fine and implemented
        enhanced parental controls and age verification mechanisms required by
        the consent decree. No FTC enforcement action for post-settlement consent
        decree violation has been publicly reported as of the run date. The
        consent decree remains active and imposes ongoing obligations over a
        multi-year period.
      sourceRefs: [SR001, SR004, SR012, SR013]

    - id: QR002
      question: >-
        What is Discord's estimated maximum annual fine exposure under the EU
        Digital Services Act if designated as a VLOP and found non-compliant?
      type: quantification
      status: answered
      answer: >-
        DSA VLOP non-compliance fines reach up to 6% of global annual revenue.
        Third-party analyst estimates place Discord's annual revenue between
        $400M and $600M (2023 basis). At the midpoint of $500M, 6% equals
        approximately $30M per violation; repeat violations carry escalating
        penalties and may trigger temporary service restrictions within the EU.
      sourceRefs: [SR002, SR019, SR020]

    - id: QR003
      question: >-
        What pending regulatory investigations or enforcement actions does
        Discord face globally as of the report date?
      type: enumeration
      status: answered
      answer: >-
        Publicly confirmed: FTC consent decree (active, US). Likely applicable:
        EU DSA VLOP obligations (unconfirmed formal designation). In force: UK
        Online Safety Act Ofcom obligations. Historical: Australia eSafety
        Commissioner investigation. No formal GDPR DPA enforcement publicly
        disclosed. Sealed investigations and private DOJ or state AG proceedings
        are not verifiable from public sources.
      sourceRefs: [SR001, SR002, SR003, SR004, SR026, SR027]

    - id: QR004
      question: >-
        Has Discord received formal VLOP designation under the EU Digital
        Services Act, and what is its confirmed DSA compliance status?
      type: verification
      status: partial
      answer: >-
        Discord was not on the EC's initial April 2023 VLOP list of 17
        platforms. The EC can designate additional platforms if their EU user
        base exceeds 45M. Discord's estimated 150M+ global MAU suggests
        significant EU user presence making subsequent designation plausible.
        Formal designation has not been confirmed in public EC records as of the
        run date.
      sourceRefs: [SR002, SR006]

    - id: QR005
      question: >-
        What documented CSAM incidents or child safety violations has Discord
        experienced after the 2023 FTC settlement, and have any triggered new
        regulatory action?
      type: adverse
      status: answered
      answer: >-
        Wired and EFF published post-settlement reporting on ongoing teen safety
        concerns including unsolicited adult contact in Discord servers. BBC
        documented child safety risks at platform scale. NCMEC CyberTipline
        annual reports include Discord in aggregate platform CSAM data. No
        renewed FTC enforcement action for post-settlement violations has been
        publicly reported as of the run date, though risk remains elevated.
      sourceRefs: [SR014, SR015, SR024, SR034, SR004]

    - id: QR006
      question: >-
        What is the mechanism by which Discord detects and removes CSAM at the
        scale of approximately 2 billion daily messages?
      type: mechanism
      status: answered
      answer: >-
        Discord publicly states it uses Microsoft PhotoDNA hash-matching (via
        NCMEC) to detect known CSAM. AI classifiers identify novel content. A
        Trust and Safety team handles human review escalations and submits
        confirmed CSAM to NCMEC's CyberTipline. This is standard consumer
        platform CSAM architecture; the scale of 2B messages/day stresses all
        moderation layers and enables adversarial evasion.
      sourceRefs: [SR006, SR030, SR034]

    - id: QR007
      question: >-
        Is Discord compliant with GDPR requirements for EU data subjects
        including data subject access requests, data deletion, and breach
        notification?
      type: verification
      status: answered
      answer: >-
        Discord's privacy policy explicitly covers GDPR rights including access,
        deletion, portability, and objection for EU residents. Discord has
        appointed data protection contacts and maintains DSAR processes. No
        formal DPC enforcement action has been publicly disclosed. Compliance
        posture relies on Discord's self-reported processes; the Irish DPC has
        active enforcement programs for consumer platforms of comparable scale.
      sourceRefs: [SR007, SR028, SR031]

    - id: QR008
      question: >-
        What is Discord's specific EU DSA compliance status as of May 2026,
        including whether mandatory risk assessments and audits have been
        completed?
      type: freshness
      status: unresolved
      answer: >-
        Discord has not publicly disclosed its DSA compliance status as of the
        run date. The DSA compliance deadline for VLOPs was August 2024. Whether
        Discord has completed mandatory risk assessments, appointed a DSA legal
        representative, or undergone an independent audit is not verifiable from
        public sources. This is a material unresolved gap.
      sourceRefs: [SR002]

    - id: QR009
      question: >-
        How many data breach or security incidents has Discord experienced in
        the past three years, and what was the scope of affected user data?
      type: quantification
      status: answered
      answer: >-
        Documented incidents include a 2023 third-party customer service vendor
        breach exposing user contact information; widespread malware distribution
        via Discord's CDN (2021-2023); and token-theft campaigns via malicious
        bots. No breach of Discord's core user database at large scale has been
        publicly disclosed. Discord's status page records service incidents not
        security breaches specifically.
      sourceRefs: [SR010, SR022, SR023, SR024]

    - id: QR010
      question: >-
        Does Discord use end-to-end encryption for direct messages, and what
        cryptographic protections are applied to user data?
      type: verification
      status: answered
      answer: >-
        Discord does not use end-to-end encryption for DMs by default. Messages
        are encrypted in transit (TLS) and at rest, but Discord can access
        message content. This is disclosed in Discord's privacy policy and
        creates a regulatory risk profile distinct from E2E-encrypted platforms.
        Discord has not announced plans to implement E2E encryption for DMs.
      sourceRefs: [SR007, SR008, SR023]

    - id: QR011
      question: >-
        What material cybersecurity vulnerabilities or exploits have been
        publicly disclosed against Discord in the past three years?
      type: adverse
      status: answered
      answer: >-
        Documented: malware distribution through Discord's file-hosting CDN
        (Discord URLs used to deliver payloads, reported extensively 2021-2023);
        token theft via malicious bots; phishing campaigns impersonating Discord.
        A third-party support vendor breach in 2023 exposed user contact
        information. EFF flagged Discord's data collection as a privacy risk.
        No zero-day in Discord's core application has been publicly disclosed.
      sourceRefs: [SR022, SR023, SR024]

    - id: QR012
      question: >-
        What is the mechanism of Discord's GCP dependency, and has Discord
        disclosed any failover or business continuity architecture?
      type: mechanism
      status: answered
      answer: >-
        Discord's engineering blog confirms GCP as the sole hyperscaler. Core
        services including ScyllaDB storage clusters, Elixir message routing, Go
        microservices, and media infrastructure run on GCP with multi-region
        deployment for single-region resilience. No multi-cloud or alternative-
        cloud failover has been publicly disclosed; a GCP global failure has no
        documented Discord mitigation.
      sourceRefs: [SR023, SR029, SR038]

    - id: QR013
      question: >-
        What percentage of Discord's compute and storage infrastructure runs on
        GCP versus other cloud providers?
      type: quantification
      status: answered
      answer: >-
        Based on Discord's engineering blog, technical conference presentations,
        and the Google Cloud customer case study, substantially all of Discord's
        mission-critical services run on GCP. No material workloads on AWS,
        Azure, or other providers have been publicly documented. The effective
        percentage for core services is at or near 100%.
      sourceRefs: [SR023, SR029, SR038]

    - id: QR014
      question: >-
        Has Discord experienced significant platform outages in 2024 or 2025,
        and what was the maximum observed downtime duration?
      type: verification
      status: answered
      answer: >-
        Discord's status pages record historical incidents confirming service
        disruptions affecting voice, messaging, and login functions. Significant
        outages were documented in 2022 and 2023. Discord's status page is the
        authoritative public record; specific 2024-2025 incidents are logged
        there but no comprehensive independent frequency analysis has been
        published by Discord.
      sourceRefs: [SR010, SR022, SR045]

    - id: QR015
      question: >-
        What SLA commitments has Discord publicly disclosed for platform uptime,
        incident response time, and breach notification?
      type: verification
      status: unresolved
      answer: >-
        Discord has not publicly disclosed formal SLA metrics for uptime
        guarantees, incident response timelines, or breach notification schedules
        beyond GDPR/CCPA statutory minimums. This is a material gap for
        institutional due diligence and differentiates Discord from enterprise
        SaaS platforms with contractual uptime commitments.
      sourceRefs: [SR007, SR008]

    - id: QR016
      question: >-
        What is the mechanism by which Apple and Google App Store fees affect
        Discord Nitro unit economics, and how does Discord manage this?
      type: mechanism
      status: answered
      answer: >-
        Apple App Store and Google Play Store require a 30% fee on in-app
        purchases (reduced to 15% for subscriptions after year one under some
        programs). Discord can route mobile users to a web purchase flow but this
        degrades the purchase experience. This structural constraint limits
        mobile Nitro attach rates and cannot be resolved without regulatory or
        policy changes outside Discord's control.
      sourceRefs: [SR019, SR020, SR021, SR023]

    - id: QR017
      question: >-
        What share of Discord's Nitro subscription revenue is generated through
        mobile in-app purchases subject to the 30% App Store fee?
      type: quantification
      status: partial
      answer: >-
        Discord has not disclosed the mobile versus web revenue split for Nitro
        subscriptions. Given Discord's predominantly mobile-accessed user base,
        mobile IAP likely represents a material portion of Nitro revenue. The
        precise percentage is unavailable from public sources.
      sourceRefs: [SR019, SR021]

    - id: QR018
      question: >-
        Does Discord have a documented multi-cloud or cloud redundancy strategy
        to mitigate concentration risk from sole reliance on GCP?
      type: verification
      status: answered
      answer: >-
        No publicly disclosed multi-cloud strategy exists for Discord. Discord's
        engineering blog explicitly describes the platform as GCP-native with
        multi-region deployment within GCP. Multi-region GCP deployment is
        distinct from multi-cloud redundancy and would not mitigate a GCP global
        or account-level failure.
      sourceRefs: [SR029, SR023, SR038]

    - id: QR019
      question: >-
        What evidence exists of ongoing CSAM or child safety violations on
        Discord after the 2023 FTC settlement, and has any new regulatory action
        been initiated?
      type: adverse
      status: answered
      answer: >-
        Wired documented ongoing teen safety concerns including unsolicited adult
        contact post-settlement. EFF raised data collection concerns affecting
        minors. BBC reported child safety risks at platform scale. NCMEC
        CyberTipline includes Discord-sourced reports in aggregate data. No
        renewed FTC enforcement action for post-settlement violations has been
        publicly reported; platform-scale risk remains elevated.
      sourceRefs: [SR014, SR015, SR024, SR034]

    - id: QR020
      question: >-
        How does Discord's content moderation approach and risk profile compare
        to peer platforms such as Slack, Microsoft Teams, and Reddit?
      type: comparison
      status: answered
      answer: >-
        Slack and Microsoft Teams primarily serve verified enterprise users,
        structurally reducing CSAM and child safety risk. Discord's pseudonymous
        consumer model with public servers is more comparable to Reddit or
        Twitch. Moderation challenges at Discord are substantially larger in
        scope than Slack or Teams and more analogous to Twitter/X or TikTok.
        Reddit's pre-IPO governance improvements provide a relevant comparable.
      sourceRefs: [SR006, SR019, SR023]

    - id: QR021
      question: >-
        What are all major third-party technology dependencies in Discord's
        platform stack beyond GCP and Cloudflare?
      type: enumeration
      status: answered
      answer: >-
        Publicly identified dependencies include Stripe (payments, inferred),
        Twilio/SendGrid (transactional email, inferred), Apple App Store and
        Google Play Store (distribution), Opus codec (voice/video), and Microsoft
        PhotoDNA via NCMEC (CSAM detection). Discord's engineering blog
        identifies ScyllaDB, Elixir, Go, and Rust as core infrastructure
        technologies running on GCP.
      sourceRefs: [SR008, SR022, SR023, SR029, SR033, SR038]

    - id: QR022
      question: >-
        Is the Microsoft Xbox / Nitro Rewards partnership still active and
        material to subscriber growth as of May 2026?
      type: freshness
      status: partial
      answer: >-
        Discord and Microsoft Xbox announced a Nitro Rewards bundle including
        Xbox Game Pass benefits for Nitro subscribers. The current status of
        this bundle as of May 2026 has not been publicly confirmed. Microsoft's
        acquisition of Activision Blizzard and evolving Xbox strategy may have
        affected partnership terms and materiality to subscriber growth.
      sourceRefs: [SR023, SR039]

    - id: QR023
      question: >-
        Who is Discord's CEO as of 2026 and what is their stated strategic
        direction following the founder-to-professional-CEO transition?
      type: freshness
      status: answered
      answer: >-
        Humam Sakhnini became Discord's CEO in 2025 following Jason Citron's
        departure. Sakhnini previously served as President of King (Activision
        Blizzard), bringing gaming monetization and operational scaling
        experience. Specific public strategic priorities for 2026 have not been
        detailed in available sources as of the run date.
      sourceRefs: [SR016, SR017, SR023]

    - id: QR024
      question: >-
        How many employees were laid off in January 2024 and what is Discord's
        approximate total headcount as of the report date?
      type: quantification
      status: answered
      answer: >-
        January 2024 layoffs affected approximately 170 employees, representing
        17% of Discord's roughly 1,000-person workforce. Post-layoff headcount
        was approximately 830. Current headcount as of May 2026 is not publicly
        updated; selective backfill hiring has been reported but an official
        current figure is unavailable from public sources.
      sourceRefs: [SR016, SR017, SR018]

    - id: QR025
      question: >-
        How did the January 2024 layoffs affect Discord's product roadmap
        execution and feature delivery velocity?
      type: mechanism
      status: answered
      answer: >-
        The layoffs affected engineering, product, and operations teams.
        Discord's 2024 releases (voice enhancements, server subscription
        improvements, forum channel expansion) continued at a measured pace.
        Roadmap impact consistent with a 15-20% workforce reduction is inferred
        from industry benchmarks on comparable transitions; no specific velocity
        decline was publicly attributed to post-layoff team capacity.
      sourceRefs: [SR016, SR017, SR035]

    - id: QR026
      question: >-
        Has CTO Stanislav Vishnevskiy remained at Discord through the 2025 CEO
        transition, and is there a documented succession plan for his role?
      type: verification
      status: answered
      answer: >-
        Stanislav Vishnevskiy has been Discord's CTO since co-founding the
        company and his role was publicly confirmed through at least early 2024.
        His continued tenure following the 2025 CEO transition has not been
        publicly confirmed or denied in available sources as of the run date. No
        CTO succession plan has been publicly documented; departure would
        represent a material key-person risk.
      sourceRefs: [SR009, SR023]

    - id: QR027
      question: >-
        What is Discord's estimated annual revenue, and what is the company's
        stated or implied timeline to profitability?
      type: quantification
      status: answered
      answer: >-
        Discord's revenue is not publicly disclosed. Third-party analyst
        estimates range from $400M to $600M annually (2023 basis), primarily
        from Nitro subscriptions. The January 2024 layoffs were described as
        cost-reduction initiatives to improve the path to profitability. No
        specific profitability timeline has been publicly stated in available
        sources.
      sourceRefs: [SR019, SR020, SR021, SR036]

    - id: QR028
      question: >-
        How does Discord's combined regulatory risk profile compare to similarly
        valued consumer platforms at equivalent pre-IPO stages?
      type: comparison
      status: answered
      answer: >-
        Discord's profile is heavier than most pre-IPO consumer platforms at
        $15B valuation. The combination of an active FTC consent decree, probable
        DSA VLOP obligations, UK Online Safety Act requirements, and GDPR
        exposure is comparable to pre-IPO Reddit (pseudonymous, content-
        moderation intensive) and more demanding than pre-IPO Snap (resolved FTC
        action only).
      sourceRefs: [SR001, SR002, SR019, SR023, SR036]

    - id: QR029
      question: >-
        What copyright infringement or DMCA-related litigation has Discord faced
        or is currently facing?
      type: enumeration
      status: answered
      answer: >-
        No major copyright infringement lawsuit against Discord as a platform has
        been publicly disclosed as of the run date. Discord operates a registered
        DMCA agent and content takedown process. Discord's CDN has been
        documented as a vector for infringing content distribution, which could
        support secondary liability theories, but no active platform-level
        copyright litigation has been publicly reported.
      sourceRefs: [SR008, SR023]

    - id: QR030
      question: >-
        How does Discord comply with CCPA/CPRA for California residents, and
        has it faced any California AG enforcement action?
      type: verification
      status: answered
      answer: >-
        Discord's privacy policy includes CCPA-specific sections covering the
        right to know, delete, and opt out of sale of personal information.
        Discord is headquartered in San Francisco and is fully subject to
        CCPA/CPRA. No California AG enforcement action against Discord has been
        publicly announced. Privacy class actions remain theoretical but no
        active case has been disclosed.
      sourceRefs: [SR007, SR032]

    - id: QR031
      question: >-
        What is the mechanism by which a gaming ecosystem slowdown translates
        into Discord DAU and revenue decline?
      type: mechanism
      status: answered
      answer: >-
        Discord's user base is organized around gaming communities tied to
        specific franchises. When a flagship game loses active players, the
        associated Discord servers see reduced activity; inactive servers reduce
        the value proposition for community members and accelerate churn.
        Discord's organic user acquisition relies on gaming franchise engagement
        rather than paid marketing, meaning gaming sector slowdowns reduce both
        retention and new server formation simultaneously.
      sourceRefs: [SR019, SR020, SR023, SR037]

    - id: QR032
      question: >-
        What material adverse events or undisclosed litigation risks exist for
        Discord that have not been publicly reported as of the run date?
      type: adverse
      status: answered
      answer: >-
        No material undisclosed adverse events are verifiable from public sources
        by definition. Risk categories that could contain undisclosed items
        include sealed FTC or DOJ investigations, private class action litigation
        for privacy violations, international regulatory inquiries outside the
        FTC and EC, and unreported security incidents below statutory disclosure
        thresholds. These gaps require direct legal disclosure from Discord under
        representations and warranties.
      sourceRefs: [SR001, SR004, SR024]

