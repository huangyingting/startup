callouts:
  - calloutType: risk
    title: "CSAM Liability Transcends the Financial Settlement"
    body: >-
      The 2023 FTC fine resolved the immediate civil liability but did not
      eliminate future criminal exposure. Federal CSAM statutes carry liability
      thresholds that civil settlements do not address. A renewed enforcement
      action involving evidence of platform awareness and delayed response could
      involve DOJ referral rather than FTC civil process, with materially
      different consequences for Discord's operating status and senior
      leadership.
    claimRefs: [CR020, CR039]
  - calloutType: insight
    title: "Discord's Risk Profile Mirrors Pre-IPO Reddit and Pre-FTC Snapchat"
    body: >-
      Discord's combination of pseudonymous identity, private channels, and
      youth-skewing demographics mirrors the risk profile of Snapchat before its
      2014 FTC COPPA settlement and Reddit before its 2023 IPO governance
      overhaul. Both platforms required significant compliance infrastructure
      investment before institutional capital could underwrite them at scale.
      Discord is at an equivalent inflection point.
    claimRefs: [CR001, CR028]

