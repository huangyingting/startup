figures:
  - id: FR001
    title: "Risk heatmap"
    type: matrix
    layout: wide
    summary: >-
      Heatmap plotting nine key Discord risks across likelihood (Low / Medium /
      High) and severity (Medium / High / Critical) dimensions. DSA non-
      compliance and content moderation failure sit at Critical severity.
      GCP failure and CSAM recurrence occupy high-consequence positions.
      Leadership transition and App Store fee pressure are Medium severity.
    data:
      columns:
        - "Likelihood: Low"
        - "Likelihood: Medium"
        - "Likelihood: High"
      rows:
        - label: "Severity: Critical"
          values:
            - label: "CSAM recurrence"
              tone: warning
              detail: >-
                Post-FTC settlement CSAM exposure persists given platform scale
                and pseudonymous environment; medium likelihood due to ongoing
                NCMEC reporting obligations and prior FTC history.
            - label: "DSA non-compliance fine"
              tone: critical
              detail: >-
                VLOP designation likely; 6% global revenue fine exposure if
                compliance obligations unmet; formal designation status
                unconfirmed as of run date.
            - label: "Content moderation failure at scale"
              tone: critical
              detail: >-
                2B messages/day at high likelihood of AI evasion attempts;
                adversarial CSAM and extremist content outpace detection at
                platform scale.
        - label: "Severity: High"
          values:
            - label: "Data breach"
              tone: warning
              detail: >-
                Medium likelihood given API attack surface and 1M+ bots;
                GDPR/CCPA notification obligations compound regulatory exposure.
            - label: "GCP infrastructure outage"
              tone: critical
              detail: >-
                Medium likelihood per GCP reliability history; critical impact
                if sustained; no disclosed multi-cloud failover architecture.
            - label: "Bot and API abuse"
              tone: warning
              detail: >-
                High likelihood given 1M+ registered bots; medium-high severity
                impact on community trust and platform quality metrics.
        - label: "Severity: Medium"
          values:
            - label: "CCPA class action"
              tone: neutral
              detail: >-
                Low likelihood of material action given existing privacy program
                and no disclosed California AG enforcement to date.
            - label: "CEO transition execution miss"
              tone: warning
              detail: >-
                Medium likelihood given concurrent layoffs and new leadership;
                moderate severity on near-term product roadmap delivery.
            - label: "App Store fee increase"
              tone: warning
              detail: >-
                Medium-high likelihood as Apple and Google continue platform
                policy evolution; creates structural margin pressure on mobile
                Nitro revenue.

  - id: FR002
    title: "Risk transmission map"
    type: dag
    layout: wide
    summary: >-
      Directed graph showing how primary Discord risk events propagate through
      intermediate consequences to downstream business impacts. Regulatory
      enforcement, CSAM events, infrastructure failures, and leadership
      disruption each transmit through distinct pathways to revenue loss and
      user churn.
