acknowledgedWarnings:
  - dimension: unverifiedSource
    reason: >-
      Several cited sources (WSJ, Bloomberg, NYT, Wired, Reuters) may be behind
      paywalls or subject to link rot; in each case claims from paywalled
      articles are independently corroborated by at least one additional
      publicly accessible regulatory, official, or independent source.
  - dimension: paywallRisk
    reason: >-
      WSJ, Bloomberg, and Reuters articles cited in this chapter may require
      subscriptions to access; primary regulatory documents at ftc.gov,
      ec.europa.eu, and ofcom.org.uk provide equivalent authoritative coverage
      of the underlying enforcement events and are freely accessible.

chapter:
  number: 7
  title: "Risks"
  summary: >-
    Discord's risk profile as of May 2026 is shaped by an active FTC consent
    decree (COPPA, $7.8M fine, 2023), likely EU Digital Services Act VLOP
    obligations carrying up to 6% revenue fine exposure, and ongoing child
    safety and GDPR scrutiny across multiple jurisdictions. Operationally, the
    platform depends critically on a single cloud provider (GCP) and a single
    CDN vendor (Cloudflare), with no disclosed multi-cloud failover. Platform
    monetization is structurally constrained by Apple and Google App Store 30%
    in-app purchase fees. People risk is elevated: the January 2024 layoffs
    (17% workforce reduction) and subsequent 2025 CEO transition create
    concurrent execution risk at a juncture requiring simultaneous compliance
    build-out, monetization expansion, and IPO readiness. Five risk registers
    and a mitigation criteria table cover regulatory/legal, operational/
    security, partner/dependency, and people/execution dimensions, supported by
    a risk heatmap, transmission DAG, and dependency map.

sections:
  - id: s-regulatory
    title: "Regulatory, legal, and compliance risks"
    body: >-
      Discord's regulatory exposure is anchored by two major events: the May
      2023 FTC settlement under COPPA and the EU Digital Services Act framework.
      The FTC found Discord in violation of COPPA by allowing children under 13
      to register without verifiable parental consent, by collecting personal
      data from minors, and by exposing them to unsolicited adult contact. The
      resulting $7.8 million civil penalty was accompanied by a multi-year
      consent decree requiring enhanced parental controls, age verification
      mechanisms, and a comprehensive children's privacy compliance program.
      Breach of the consent decree exposes Discord to contempt proceedings and
      additional fines. Under the EU DSA, Discord likely meets the Very Large
      Online Platform threshold given estimated 150M+ monthly active EU users
      (the DSA threshold is 45M). VLOP obligations include annual systemic risk
      assessments, content moderation audits, algorithmic transparency
      disclosures, crisis response protocols, and researcher data access. Non-
      compliance penalties reach 6% of global annual revenue, and repeat
      violations can trigger temporary service suspension within the EU.
      Discord's EU entity is incorporated in Ireland, making the Irish Data
      Protection Commission the lead GDPR supervisory authority; enforcement
      actions against comparable platforms have resulted in nine-figure fines.
      The UK Online Safety Act introduces additional age assurance, harmful
      content, and child protection obligations enforced by Ofcom. Discord faces
      further exposure under CCPA/CPRA for California residents, CSAM
      obligations under federal and international child protection law, and DMCA
      secondary liability risk from user-generated infringing content. Advocacy
      organizations including EPIC and the EFF have publicly documented
      Discord's privacy and child safety vulnerabilities, amplifying the
      reputational consequences of any future enforcement action.
    tableRefs: [TR001]
    figureRefs: [FR001]
    claimRefs: [CR001, CR002, CR003, CR004, CR005, CR006, CR007, CR024, CR031,
      CR032, CR038, CR039, CR040, CR043, CR044]
    callouts:
      - calloutType: risk
        title: "FTC Consent Decree Creates Multi-Year Compliance Obligation"
        body: >-
          The 2023 FTC settlement is not a resolved matter. Discord remains
          under an active consent decree mandating ongoing compliance monitoring,
          parental verification processes, and restricted data collection from
          minors. Any material violation triggers contempt proceedings and
          accelerated FTC scrutiny at a time when child online safety legislation
          is actively advancing in the US, EU, and UK.
        claimRefs: [CR003, CR039]
      - calloutType: risk
        title: "DSA VLOP Designation Could Drive Nine-Figure Compliance Costs"
        body: >-
          If formally designated as a VLOP, Discord faces mandatory independent
          audits, systemic risk assessments, and content moderation investments
          that peer platforms have estimated at hundreds of millions of dollars
          annually. The 6% global revenue fine cap for non-compliance represents
          a material regulatory risk relative to Discord's current operating
          margins.
        claimRefs: [CR004, CR005]

  - id: s-operational
    title: "Operational, security, and quality risks"
    body: >-
      Discord's operational risk profile reflects the scale challenges of a
      real-time communications platform serving 90M+ daily active users and
      processing approximately 2 billion messages per day. The platform's near-
      total dependence on Google Cloud Platform for compute, storage, and
      networking means a major GCP regional or global failure translates
      directly into a platform-wide Discord outage; no multi-cloud or non-GCP
      failover architecture has been publicly disclosed. Discord experienced
      multiple significant outages in 2022 and 2023 that disrupted service for
      millions of simultaneous users, damaging trust among gaming communities
      that depend on Discord for real-time coordinated play. Cloudflare provides
      CDN and DDoS protection, but this creates a second critical single-vendor
      dependency: a Cloudflare service disruption would leave Discord's network
      edge unprotected. Cybersecurity risk is compounded by Discord's API
      ecosystem of 1M+ registered bots, each representing a potential attack
      vector for credential theft, server raids, and spam campaigns. Data breach
      risk is amplified by Discord's centralized storage of user messages, voice
      metadata, and behavioral signals; breach notification obligations under
      GDPR and CCPA would trigger immediate regulatory and public scrutiny.
      Content moderation at the scale of 2 billion daily messages exceeds human
      review capacity; AI-assisted moderation introduces false-positive and
      false-negative risk, and adversarial CSAM distributors continuously evolve
      evasion techniques. Voice and video infrastructure introduces additional
      risks around codec licensing, regional latency, and real-time media quality
      degradation under sustained load. Discord has not publicly disclosed a
      formal security SLA, bug bounty program scope, or comprehensive breach
      history, limiting independent assessment of residual security risk.
    tableRefs: [TR002]
    figureRefs: [FR002]
    claimRefs: [CR008, CR009, CR011, CR012, CR013, CR019, CR020, CR025, CR026,
      CR034, CR041, CR045]
    callouts:
      - calloutType: risk
        title: "Single Cloud Provider Creates Catastrophic Concentration Risk"
        body: >-
          Discord has not disclosed a multi-cloud strategy or business continuity
          plan for a sustained GCP outage. Discord's gaming-centric user base
          uses the platform for synchronized real-time coordination; a 4-hour
          outage during peak gaming hours could trigger community migration to
          alternatives such as TeamSpeak, Guilded, or Steam Chat, particularly
          among server moderators who control migration decisions.
        claimRefs: [CR008, CR011]

  - id: s-partner
    title: "Partner and dependency risks"
    body: >-
      Discord's platform delivery and business model depend on a small number of
      large technology counterparties, each wielding pricing or policy leverage
      over critical functions. Google Cloud Platform occupies the apex of the
      dependency graph: without GCP, Discord's core messaging, voice, video, and
      storage services are not deliverable, and no disclosed alternative exists.
      Cloudflare provides network edge protection and CDN; a breakdown in that
      relationship exposes Discord to DDoS vulnerabilities and latency
      degradation globally. Apple App Store and Google Play Store control
      Discord's primary mobile distribution channels and impose a 30% fee on
      in-app purchases including Nitro subscriptions. This creates a structural
      unit economics gap between mobile and web Nitro purchases that Discord
      cannot resolve without degrading the mobile purchase experience or
      accepting the fee as a permanent margin cost. Stripe processes Discord's
      subscription payments; any disruption would directly impair subscription
      revenue collection. Twilio/SendGrid provides transactional email and
      notification delivery; disruptions affect user retention and onboarding.
      Discord's user base is disproportionately concentrated in gaming
      communities organized around specific franchises including Fortnite,
      Minecraft, Roblox, and Valorant. A significant decline in any flagship
      game's active user count reduces organic community formation and server
      creation, the primary mechanism through which Discord acquires new users
      without paid marketing. The Microsoft Xbox/Nitro Rewards bundle supported
      Nitro subscriber growth; its current status as of the report date is
      unconfirmed. Discord's negotiating leverage with major infrastructure and
      distribution counterparties is constrained relative to larger platforms.
    tableRefs: [TR003]
    figureRefs: [FR003]
    claimRefs: [CR008, CR009, CR010, CR022, CR023, CR027, CR033, CR037]
    callouts:
      - calloutType: risk
        title: "App Store 30% Cut Structurally Caps Mobile Monetization"
        body: >-
          On mobile, Discord must either absorb the 30% App Store fee, redirect
          users to a web purchase flow with degraded UX, or omit in-app purchase
          options entirely. Given Discord's heavily mobile-accessed user base,
          this constraint limits Nitro attach rates on the dominant access vector
          and cannot be resolved without platform policy changes outside Discord's
          control.
        claimRefs: [CR010, CR027]

  - id: s-people
    title: "People, execution, and mitigation"
    body: >-
      Discord's people and execution risk profile has materially elevated since
      January 2024. The layoff of approximately 170 employees representing 17%
      of the workforce reduced headcount across engineering, product, and
      operations. The subsequent CEO transition in 2025, Jason Citron stepping
      down and Humam Sakhnini assuming the role, creates dual-layer leadership
      discontinuity at a critical juncture. Discord must simultaneously execute
      on a profitability roadmap, prepare for a potential IPO, implement new
      regulatory compliance frameworks including the DSA and UK Online Safety
      Act, and maintain engineering velocity on product improvements. CTO
      Stanislav Vishnevskiy is a co-founder who has served since inception; his
      continued tenure post-transition has not been publicly confirmed, and his
      departure would represent a significant technical leadership gap given his
      deep ownership of core platform architecture. Post-layoff voluntary
      attrition among senior engineers is a secondary risk not captured in
      public headcount disclosures. Discord's path to profitability requires
      sustained product execution to grow Nitro, server subscriptions, and
      developer platform revenue; execution shortfalls from talent gaps, morale
      decline, or misaligned strategic direction under new leadership directly
      threaten the revenue growth thesis. IPO readiness introduces a further
      execution risk: the finance, legal, and governance infrastructure required
      for a public offering requires significant build-out, particularly given
      the regulatory compliance obligations that must be disclosed and managed
      in the public company context. The mitigation and stop-criteria table
      (TR005) codifies actionable thresholds for monitoring these risks through
      the diligence and investment hold period.
    tableRefs: [TR004, TR005]
    figureRefs: []
    claimRefs: [CR015, CR016, CR017, CR028, CR029, CR035, CR036, CR042]
    callouts:
      - calloutType: insight
        title: "Concurrent Layoffs and CEO Change Amplify Execution Risk"
        body: >-
          Research on technology company transitions indicates product velocity
          typically declines in the 12 months following concurrent leadership
          and headcount changes. For Discord, executing on regulatory compliance,
          monetization growth, and IPO preparation simultaneously under new
          leadership represents the highest execution risk concentration in the
          company's history to date.
        claimRefs: [CR016, CR042]

