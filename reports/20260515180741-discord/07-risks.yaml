  evidenceGaps:
    - description: >-
        Regulatory legal risk register coverage is partial because sealed
        investigations, private litigation, and international regulatory
        inquiries outside the FTC and EC DSA are not publicly documented.
        Discord has not disclosed whether it has received formal inquiry from
        the DOJ, state AGs outside California, or EU member state DPAs other
        than the Irish DPC. The threshold criteria table (TR005)
        includes indicative triggers but not company-confirmed thresholds.
      relatedQuestionRefs: [QR003, QR032]
      relatedTableRefs: [TR001]

    - description: >-
        Discord has not publicly confirmed formal VLOP designation under the EU
        Digital Services Act as of the run date. DSA compliance timeline, audit
        completion status, and fine exposure are unverifiable from public
        sources. The EC's process for designating platforms after the initial
        April 2023 list lacks full public transparency, and Discord's EU user
        count is estimated rather than officially disclosed.
      relatedQuestionRefs: [QR004, QR008]

    - description: >-
        Discord has not publicly disclosed formal SLA metrics for platform
        uptime guarantees, incident response timelines, or breach notification
        schedules beyond GDPR and CCPA statutory minimums. Cybersecurity
        incident response procedures, bug bounty program scope, and
        comprehensive breach history are not available from public sources,
        making residual security risk difficult to independently quantify.
      relatedQuestionRefs: [QR015]

    - description: >-
        Discord's mobile versus web revenue split for Nitro subscriptions is
        not publicly disclosed. The precise impact of App Store and Play Store
        30% fees on Discord's unit economics and total Nitro contribution margin
        cannot be calculated from available public information and requires
        direct financial disclosure.
      relatedQuestionRefs: [QR017]

    - description: >-
        The current status of the Microsoft Xbox / Nitro Rewards partnership as
        of May 2026 is not publicly confirmed. Whether this bundle remains
        active, has been restructured, or has lapsed is unverifiable from
        public sources, and its historical contribution to Nitro subscriber
        growth has not been quantified by Discord.
      relatedQuestionRefs: [QR022]

    - description: >-
        Post-2025 CEO transition, the full current organizational structure of
        Discord's engineering and product leadership including CTO Stanislav
        Vishnevskiy's continued role and any C-suite changes has not been
        publicly confirmed. Voluntary attrition data among senior engineers
        following the January 2024 layoffs is not publicly disclosed.
      relatedQuestionRefs: [QR026]
