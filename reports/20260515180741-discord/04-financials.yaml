  - id: section-I3
    title: "Unit economics: conversion, ARPU, and monetization efficiency"
    body: >-
      Discord's unit economics are not disclosed publicly and must be triangulated from the
      relationship between reported user metrics and revenue estimates. The platform reported
      approximately 259 million monthly active users in 2025, against 2023 total revenue near
      $575 million. This implies a blended ARPU across all MAU of approximately $2.22 per user
      per year — a number that reflects the structurally low monetization rate of a free-tier-first
      platform where the majority of users never upgrade to paid products.

      Converting the denominator to paying users changes the picture substantially. If Discord's
      paid subscriber base (primarily Nitro) is approximately 5–8 million users — a range consistent
      with mobile app revenue data showing roughly $55 million per quarter in in-app purchases
      (implying approximately 550,000 Nitro conversions per quarter at $100/year average) — then
      the realized ARPU of paying users is approximately $72–$115 per year, consistent with the
      $99.99 annual Nitro list price adjusted for localized pricing and Nitro Basic tier subscribers.

      Discord's paid conversion rate is estimated at roughly 2–3 percent of MAU, which is low by
      consumer subscription benchmarks but consistent with freemium communication platforms.
      Spotify, a comparator with a similarly large free user base, historically reported approximately
      26–28 percent paid conversion globally; Discord's gaming-and-community demographic skews
      younger and more price-sensitive, so the gap is structurally expected. Improving paid conversion
      by even one percentage point would add approximately 2.5 million paying subscribers and
      approximately $250 million in annual subscription revenue — making conversion optimization
      the single largest short-term lever in Discord's financial model.

      CAC and LTV data are entirely undisclosed. Discord's organic network-effect distribution means
      that explicit paid acquisition cost is likely modest relative to SaaS peers, but the exact
      ratio of LTV to CAC cannot be confirmed from public sources. Server Boost attachment rates,
      developer subscription GMV, and Quests ad ROAS are not publicly available. These constitute
      the most consequential unit-economics gaps for a prospective investor or acquirer.
    claimRefs:
      - CI018
      - CI019
      - CI020
