  - id: FI002
    title: "Unit economics flow — from MAU to revenue"
    type: flow
    layout: standard
    summary: >-
      Illustrative flow from Discord's total user base through paid conversion to estimated 2023 revenue.
      Nodes reflect estimated values; edges show the conversion or multiplication steps. Inputs are
      from DemandSage and Business of Apps aggregator data; conversion rates are triangulated estimates.
    data:
      nodes:
        - id: n1
          label: "656M registered users (2025)"
        - id: n2
          label: "259M monthly active users (~40% of registered)"
        - id: n3
          label: "~5–8M paying Nitro subscribers (~2–3% MAU conversion)"
        - id: n4
          label: "~$95–$115/subscriber/year (blended Nitro ARPU)"
        - id: n5
          label: "~$475–$900M Nitro + Boost subscription revenue"
        - id: n6
          label: "~$75–$100M developer platform + Quests ad revenue"
        - id: n7
          label: "~$575M total estimated 2023 revenue"
      edges:
        - from: n1
          to: n2
          label: "40% monthly active rate"
        - from: n2
          to: n3
          label: "~2–3% paid conversion"
        - from: n3
          to: n4
          label: "× blended ARPU"
        - from: n4
          to: n5
          label: "= subscription revenue estimate"
        - from: n2
          to: n6
          label: "platform engagement → dev + ad revenue"
        - from: n5
          to: n7
          label: "+ non-subscription streams"
        - from: n6
          to: n7
          label: "+"
