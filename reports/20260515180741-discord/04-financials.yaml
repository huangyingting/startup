  - id: section-I2
    title: "Revenue growth history and 2026 trajectory"
    body: >-
      Discord's revenue history reflects a company that grew extremely rapidly through COVID-19
      tailwinds and has since moderated to a more typical late-growth-stage trajectory.

      Business of Apps' compiled estimates, drawing on Forbes, The Information, and WSJ data,
      show revenue rising from approximately $5 million in 2016 to $135 million in 2020, $310 million
      in 2021, $445 million in 2022, and $575 million in 2023. A Reuters report from February 2024
      cited unnamed sources placing 2023 revenue near $600 million, which is broadly consistent with
      the Business of Apps estimate. DemandSage places Nitro-only revenue at approximately $207 million
      in 2023, indicating that Nitro subscriptions alone account for roughly 35 percent of the total —
      implying meaningful revenues from boosts, developer platform fees, and newer products such as Quests.

      The 2022-to-2023 growth rate implied by these estimates is approximately 29 percent. At a sustained
      25–30 percent annual growth rate, 2024 revenue would be in the $700–$750 million range; an
      acceleration driven by Quests advertising adoption and platform fee growth could push the 2024
      figure toward $800–$900 million. DemandSage's 2026 forecast projects total annual revenue of
      $750–$800 million, which appears conservative and may reflect the data's inclusion only of
      in-app purchase revenue channels. Analyst community consensus as of early 2026 places Discord's
      revenue at or approaching $1 billion annually.

      Revenue geography is skewed heavily toward North America: DemandSage estimates 60 percent of
      in-app purchase revenue originates from the United States, with the United Kingdom (6 percent),
      Canada (5 percent), France (3 percent), and Australia (3 percent) as the next largest markets.
      This concentration creates both growth opportunity in under-penetrated international markets
      and foreign-exchange exposure risk.
