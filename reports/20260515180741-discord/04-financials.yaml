  - id: section-I4
    title: "Capital structure, funding rounds, and valuation history"
    body: >-
      Discord's capital structure is described in detail in the Company Overview chapter; this
      section focuses on the forward-looking capital adequacy question and the implications of
      the valuation markdown since 2021.

      The September 2021 Series H raised $500 million at a $15 billion post-money valuation.
      This was led by Dragoneer Investment Group and included participation from Index Ventures,
      Greenoaks Capital, Firstmark Capital, Spark Capital, Sony Innovation Fund, and Fidelity
      Investments. The SEC Form D filing for this round, dated September 9, 2021, confirms the
      $499,999,442 raised and lists Jason Citron, Stanislav Vishnevskiy, Mitch Lasky, Clint Smith,
      David Sze, Stephen Gillett, Danny Rimer, and Tomasz Marcinkowski as directors or officers.
      Total disclosed capital raised across all rounds is approximately $995 million. Discord rejected
      a reported acquisition offer from Microsoft of approximately $12 billion in mid-2021, opting
      to remain independent and pursue the Series H instead.

      The $15 billion 2021 valuation was set at the peak of a generational multiple expansion in
      consumer technology. By 2026, after two years of tech-multiple contraction, PM Insights
      estimates Discord's implied fair-market valuation at approximately $7.28 billion — less than
      half the 2021 peak. The Pitchbook valuation tracker for Discord reflects this mark-down in
      its private company pricing data, though the exact methodology is proprietary. The valuation
      compression is consistent with public-market SaaS multiples declining from 20–30x ARR to
      5–8x ARR between 2021 and 2023.

      Discord's runway and cash position are unknown from public sources. With $995 million raised
      cumulatively and estimated accumulated operating losses of $400–$600 million through end of
      2023, a rough estimate of remaining cash on hand is $200–$500 million — sufficient for
      approximately 2–5 years of operations at estimated burn rates. The January 2024 workforce
      reduction and the subsequent lean operating model suggest management is actively managing
      toward cash break-even or profitability ahead of a potential capital markets event.
