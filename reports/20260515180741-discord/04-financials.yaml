  - id: FI003
    title: "Discord revenue and valuation estimate ranges (2022–2026)"
    type: range
    layout: standard
    summary: >-
      Revenue estimates from third-party aggregators (Business of Apps, DemandSage, Reuters) and
      analyst forecasts for 2022–2026, alongside the 2021 confirmed valuation and the 2026 implied
      valuation range. Ranges reflect disagreement across sources; low is conservative, high is optimistic.
    data:
      items:
        - label: "Revenue 2022 (confirmed estimate)"
          low: 420
          high: 470
          unit: "USD M"
        - label: "Revenue 2023 (near-confirmed)"
          low: 550
          high: 620
          unit: "USD M"
        - label: "Revenue 2024 (analyst estimate)"
          low: 680
          high: 900
          unit: "USD M"
        - label: "Revenue 2025 (analyst forecast)"
          low: 700
          high: 950
          unit: "USD M"
        - label: "Revenue 2026 (forward forecast)"
          low: 750
          high: 1100
          unit: "USD M"
        - label: "Valuation 2021 (confirmed)"
          low: 15000
          high: 15000
          unit: "USD M"
        - label: "Implied valuation 2026 (estimate)"
          low: 6000
          high: 10000
          unit: "USD M"
      xAxis:
        label: "USD millions (revenue) or USD millions (valuation)"
    approximationNotes: >-
      Revenue ranges synthesized from Business of Apps ($575M 2023), Reuters near-$600M 2023 reference,
      and DemandSage 2026 forecast ($750–800M). 2024–2025 extrapolated at 20–30% growth. Valuation 2026
      range is analyst estimate; $15B 2021 mark is from SEC Form D. Revenue and valuation figures share
      the same axis unit (USD millions) but represent different metrics; separate axis labels would be
      preferable in a production chart.

  - id: FI004
    title: "Discord capital deployment and estimated cash position"
    type: waterfall
