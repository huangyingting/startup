  evidenceGaps:
    - type: private-evidence-only
      description: >-
        Discord does not disclose audited financial statements; annual revenue, gross margin,
        operating income, and cash position cannot be confirmed from public sources. Data room
        access or S-1 registration would be required to verify.
      affectsClaimRefs:
        - CI031
        - CI041
        - CI042
      relatedQuestionRefs:
        - QI020
        - QI025
        - QI032

    - type: missing-source
      description: >-
        Discord's exact Nitro subscriber count, monthly churn rate, and tier-split between Basic
        and Full are not publicly disclosed; the estimated 5–8 million subscriber figure is
        triangulated from mobile IAP data and carries wide uncertainty.
      affectsClaimRefs:
        - CI019
        - CI021
        - CI023
      relatedQuestionRefs:
        - QI017
        - QI016

    - type: private-evidence-only
      description: >-
        Discord's platform fee rate on developer app subscriptions and purchases is not publicly
        disclosed; the 10–30% estimate is based on industry convention, not confirmed documentation.
      affectsClaimRefs:
        - CI007
      relatedQuestionRefs:
        - QI006

    - type: stale
      description: >-
        The Information's adverse reporting on Discord's monetization challenges ("struggling to grow up")
        is from approximately 2022 and is paywalled; it may not reflect Discord's current strategic
        position under the new CEO Humam Sakhnini.
      affectsClaimRefs:
        - CI047
      relatedQuestionRefs:
        - QI036
        - QI037

    - type: access-blocked
      description: >-
        Multiple primary news sources for the January 2024 layoffs (TechCrunch, CNBC, Bloomberg,
        Fortune, Axios) returned 404 or paywall responses at fetch time; the corroborated fact of
        ~170 layoffs (17%) is based on Ars Technica (200 OK) and The Verge (200 OK) coverage.
      affectsClaimRefs:
        - CI037
      relatedQuestionRefs:
        - QI030
        - QI031

    - type: missing-source
      description: >-
        Discord's CAC, LTV, payback period, and subscriber retention by cohort are entirely
        unavailable from public sources; these are critical unit economics metrics that cannot
        be estimated with reasonable confidence.
      affectsClaimRefs:
        - CI022
        - CI023
      relatedQuestionRefs:
        - QI019
    - type: missing-source
      description: >-
        Discord does not publicly disclose detailed revenue breakdowns, cost structure, or
        forward-looking financial guidance. These questions remain partially answered from
        publicly available sources and estimates.
      affectsClaimRefs: []
      relatedQuestionRefs:
        - QI003
        - QI008
        - QI011
        - QI013
        - QI019
        - QI033
        - QI036
        - QI037
