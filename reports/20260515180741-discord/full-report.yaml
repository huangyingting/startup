      - number: '2.3'
        title: Buyer, user, payer segmentation and the adoption path
        blocks:
          - type: paragraph
            body: >-
              Discord's commercial relationship splits buyer, user, and payer in ways that matter for monetization
              modelling. The dominant user is a Gen Z gamer or community participant: Pew's 2022 teens survey shows
              Discord adoption among US teens climbed materially through the pandemic, and Axios's 2022 and 2024
              coverage describes Discord as the platform Gen Z most associates with community belonging. The payer is
              overwhelmingly an individual consumer purchasing Nitro for self-use or a community owner buying Server
              Boost on behalf of a server, not an enterprise procurement organization. The buyer surface is therefore
              self-serve and impulse-driven, which is closer to a consumer subscription business than a traditional B2B
              SaaS funnel. A second buyer cohort is the creator or community manager who runs a large server and uses
              Server Boost, partner programs, and increasingly third-party monetization tools. A third, smaller, cohort
              is brand or media partners who pay for distribution inside specific large communities, with no public
              budget benchmarks.

              The adoption path runs from organic invite (a friend joins a server) to feature exposure (voice channels,
              custom emoji that require Boost) to a Nitro upgrade. Conversion is heavily indexed to community
              participation rather than top-of-funnel marketing, which differentiates Discord from a paid
              advertising-driven consumer app and explains why DAU/MAU and active-server counts are the leading
              indicators rather than CAC. Education, as a vertical adjacency, is mentioned in Restofworld and Naavik
              coverage but remains under-monetized; non-gaming communities, increasingly highlighted in Discord's own
              evolution-of-communities and not-just-for-gamers blog posts, broaden the user funnel without immediately
              broadening the payer surface.
