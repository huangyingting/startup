  - number: 7
    title: Risks
    sections:
      - number: '7.1'
        title: Regulatory, legal, and compliance risks
        blocks:
          - type: paragraph
            body: >-
              Discord's regulatory exposure is anchored by two major events: the May 2023 FTC settlement under COPPA and
              the EU Digital Services Act framework. The FTC found Discord in violation of COPPA by allowing children
              under 13 to register without verifiable parental consent, by collecting personal data from minors, and by
              exposing them to unsolicited adult contact. The resulting $7.8 million civil penalty was accompanied by a
              multi-year consent decree requiring enhanced parental controls, age verification mechanisms, and a
              comprehensive children's privacy compliance program. Breach of the consent decree exposes Discord to
              contempt proceedings and additional fines. Under the EU DSA, Discord likely meets the Very Large Online
              Platform threshold given estimated 150M+ monthly active EU users (the DSA threshold is 45M). VLOP
              obligations include annual systemic risk assessments, content moderation audits, algorithmic transparency
              disclosures, crisis response protocols, and researcher data access. Non- compliance penalties reach 6% of
              global annual revenue, and repeat violations can trigger temporary service suspension within the EU.
              Discord's EU entity is incorporated in Ireland, making the Irish Data Protection Commission the lead GDPR
              supervisory authority; enforcement actions against comparable platforms have resulted in nine-figure
              fines. The UK Online Safety Act introduces additional age assurance, harmful content, and child protection
              obligations enforced by Ofcom. Discord faces further exposure under CCPA/CPRA for California residents,
              CSAM obligations under federal and international child protection law, and DMCA secondary liability risk
              from user-generated infringing content. Advocacy organizations including EPIC and the EFF have publicly
              documented Discord's privacy and child safety vulnerabilities, amplifying the reputational consequences of
              any future enforcement action.
