      - number: '7.4'
        title: People, execution, and mitigation
        blocks:
          - type: paragraph
            body: >-
              Discord's people and execution risk profile has materially elevated since January 2024. The layoff of
              approximately 170 employees representing 17% of the workforce reduced headcount across engineering,
              product, and operations. The subsequent CEO transition in 2025, Jason Citron stepping down and Humam
              Sakhnini assuming the role, creates dual-layer leadership discontinuity at a critical juncture. Discord
              must simultaneously execute on a profitability roadmap, prepare for a potential IPO, implement new
              regulatory compliance frameworks including the DSA and UK Online Safety Act, and maintain engineering
              velocity on product improvements. CTO Stanislav Vishnevskiy is a co-founder who has served since
              inception; his continued tenure post-transition has not been publicly confirmed, and his departure would
              represent a significant technical leadership gap given his deep ownership of core platform architecture.
              Post-layoff voluntary attrition among senior engineers is a secondary risk not captured in public
              headcount disclosures. Discord's path to profitability requires sustained product execution to grow Nitro,
              server subscriptions, and developer platform revenue; execution shortfalls from talent gaps, morale
              decline, or misaligned strategic direction under new leadership directly threaten the revenue growth
              thesis. IPO readiness introduces a further execution risk: the finance, legal, and governance
              infrastructure required for a public offering requires significant build-out, particularly given the
              regulatory compliance obligations that must be disclosed and managed in the public company context. The
              mitigation and stop-criteria table (TR005) codifies actionable thresholds for monitoring these risks
