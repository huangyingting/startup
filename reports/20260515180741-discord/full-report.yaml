      - number: '7.2'
        title: Operational, security, and quality risks
        blocks:
          - type: paragraph
            body: >-
              Discord's operational risk profile reflects the scale challenges of a real-time communications platform
              serving 90M+ daily active users and processing approximately 2 billion messages per day. The platform's
              near- total dependence on Google Cloud Platform for compute, storage, and networking means a major GCP
              regional or global failure translates directly into a platform-wide Discord outage; no multi-cloud or
              non-GCP failover architecture has been publicly disclosed. Discord experienced multiple significant
              outages in 2022 and 2023 that disrupted service for millions of simultaneous users, damaging trust among
              gaming communities that depend on Discord for real-time coordinated play. Cloudflare provides CDN and DDoS
              protection, but this creates a second critical single-vendor dependency: a Cloudflare service disruption
              would leave Discord's network edge unprotected. Cybersecurity risk is compounded by Discord's API
              ecosystem of 1M+ registered bots, each representing a potential attack vector for credential theft, server
              raids, and spam campaigns. Data breach risk is amplified by Discord's centralized storage of user
              messages, voice metadata, and behavioral signals; breach notification obligations under GDPR and CCPA
              would trigger immediate regulatory and public scrutiny. Content moderation at the scale of 2 billion daily
              messages exceeds human review capacity; AI-assisted moderation introduces false-positive and
              false-negative risk, and adversarial CSAM distributors continuously evolve evasion techniques. Voice and
              video infrastructure introduces additional risks around codec licensing, regional latency, and real-time
              media quality degradation under sustained load. Discord has not publicly disclosed a formal security SLA,
              bug bounty program scope, or comprehensive breach history, limiting independent assessment of residual
              security risk.
