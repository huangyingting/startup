      - number: '7.3'
        title: Partner and dependency risks
        blocks:
          - type: paragraph
            body: >-
              Discord's platform delivery and business model depend on a small number of large technology
              counterparties, each wielding pricing or policy leverage over critical functions. Google Cloud Platform
              occupies the apex of the dependency graph: without GCP, Discord's core messaging, voice, video, and
              storage services are not deliverable, and no disclosed alternative exists. Cloudflare provides network
              edge protection and CDN; a breakdown in that relationship exposes Discord to DDoS vulnerabilities and
              latency degradation globally. Apple App Store and Google Play Store control Discord's primary mobile
              distribution channels and impose a 30% fee on in-app purchases including Nitro subscriptions. This creates
              a structural unit economics gap between mobile and web Nitro purchases that Discord cannot resolve without
              degrading the mobile purchase experience or accepting the fee as a permanent margin cost. Stripe processes
              Discord's subscription payments; any disruption would directly impair subscription revenue collection.
              Twilio/SendGrid provides transactional email and notification delivery; disruptions affect user retention
              and onboarding. Discord's user base is disproportionately concentrated in gaming communities organized
              around specific franchises including Fortnite, Minecraft, Roblox, and Valorant. A significant decline in
              any flagship game's active user count reduces organic community formation and server creation, the primary
              mechanism through which Discord acquires new users without paid marketing. The Microsoft Xbox/Nitro
              Rewards bundle supported Nitro subscriber growth; its current status as of the report date is unconfirmed.
              Discord's negotiating leverage with major infrastructure and distribution counterparties is constrained
              relative to larger platforms.
