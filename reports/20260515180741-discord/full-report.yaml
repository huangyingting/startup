            - label: None
              tone: negative
              detail: Team workspaces only; no public community server model or discovery
            - label: None
              tone: neutral
              detail: No gaming integrations; Slack is not positioned for gaming communities
            - label: Full
              tone: positive
              detail: SAML SSO, audit logs, DLP, and eDiscovery on Business+ and Enterprise Grid
            - label: Mature
              tone: positive
              detail: Large Slack app directory with extensive Web API and Events API ecosystem
        - label: Microsoft Teams
          values:
            - label: Partial
              tone: neutral
              detail: Scheduled or ad-hoc meetings; no persistent always-on community rooms
            - label: None
              tone: negative
              detail: Org-scoped Teams channels; no public community server model or discovery
            - label: Partial
              tone: neutral
              detail: Xbox console integration exists but remains peripheral to main product focus
            - label: Full
              tone: positive
              detail: Full enterprise compliance through Microsoft Purview, Azure AD, E5 security
            - label: Mature
              tone: positive
