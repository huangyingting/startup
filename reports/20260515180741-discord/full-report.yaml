            body: >-
              Discord's named customer proof is concentrated among major gaming publishers and entertainment brands, all
              of which operate through Discord's Verified Server program or formal partnership agreements. Sony
              PlayStation manages an official verified server with more than one million members and has integrated
              Discord at the PS5 console operating-system level, allowing players to display their current game in their
