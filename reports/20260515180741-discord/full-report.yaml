            body: >-
              Discord's recent product development trajectory reveals a platform deliberately expanding beyond its
              gaming-and-community roots into monetization, embedded interactive experiences, and advertising. Discord
              Activities, launched in 2022–2023, enables embedded interactive games and applications—such as poker,
              watch-parties, and co-drawing apps—directly within voice channels, built on an Activities SDK open to
              third-party studios. Forum Channels, launched in 2022, added structured thread-based discussion spaces
              designed to compete with Reddit-style community organization while leveraging Discord's real-time social
              graph. The Quests advertising product offers game studios and brands a performance-based promotional
              vehicle tied to specific in-Discord engagement actions, representing Discord's clearest new revenue stream
              beyond subscriptions. In 2025, Discord partnered with Microsoft Xbox Game Pass to offer Nitro Rewards,
              deepening integration with the console gaming ecosystem. The Clyde AI chatbot, piloted in 2023, was
              deprecated by year-end, signaling that Discord's AI strategy remains unsettled. Discord has not publicly
              confirmed a detailed 2026 product roadmap, but the developer platform page and API documentation indicate
              continued investment in the Activities SDK, monetization APIs for developers, and search infrastructure
              improvements. Nitro remains the primary direct subscription revenue vehicle, with partnership and
