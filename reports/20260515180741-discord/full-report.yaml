      - number: '4.2'
        title: Revenue growth history and 2026 trajectory
        blocks:
          - type: paragraph
            body: >-
              Discord's revenue history reflects a company that grew extremely rapidly through COVID-19 tailwinds and
              has since moderated to a more typical late-growth-stage trajectory.

              Business of Apps' compiled estimates, drawing on Forbes, The Information, and WSJ data, show revenue
              rising from approximately $5 million in 2016 to $135 million in 2020, $310 million in 2021, $445 million
              in 2022, and $575 million in 2023. A Reuters report from February 2024 cited unnamed sources placing 2023
              revenue near $600 million, which is broadly consistent with the Business of Apps estimate. DemandSage
              places Nitro-only revenue at approximately $207 million in 2023, indicating that Nitro subscriptions alone
              account for roughly 35 percent of the total — implying meaningful revenues from boosts, developer platform
              fees, and newer products such as Quests.

              The 2022-to-2023 growth rate implied by these estimates is approximately 29 percent. At a sustained 25–30
              percent annual growth rate, 2024 revenue would be in the $700–$750 million range; an acceleration driven
              by Quests advertising adoption and platform fee growth could push the 2024 figure toward $800–$900
              million. DemandSage's 2026 forecast projects total annual revenue of $750–$800 million, which appears
              conservative and may reflect the data's inclusion only of in-app purchase revenue channels. Analyst
              community consensus as of early 2026 places Discord's revenue at or approaching $1 billion annually.

              Revenue geography is skewed heavily toward North America: DemandSage estimates 60 percent of in-app
              purchase revenue originates from the United States, with the United Kingdom (6 percent), Canada (5
              percent), France (3 percent), and Australia (3 percent) as the next largest markets. This concentration
              creates both growth opportunity in under-penetrated international markets and foreign-exchange exposure
              risk.
            claimRefs:
              - CI010
              - CI011
              - CI012
              - CI013
              - CI014
              - CI015
              - CI016
              - CI017
          - type: figure
            figureRef: FI003
            claimRefs: []
      - number: '4.3'
        title: 'Unit economics: conversion, ARPU, and monetization efficiency'
        blocks:
          - type: paragraph
            body: >-
              Discord's unit economics are not disclosed publicly and must be triangulated from the relationship between
              reported user metrics and revenue estimates. The platform reported approximately 259 million monthly
              active users in 2025, against 2023 total revenue near $575 million. This implies a blended ARPU across all
              MAU of approximately $2.22 per user per year — a number that reflects the structurally low monetization
              rate of a free-tier-first platform where the majority of users never upgrade to paid products.

              Converting the denominator to paying users changes the picture substantially. If Discord's paid subscriber
              base (primarily Nitro) is approximately 5–8 million users — a range consistent with mobile app revenue
              data showing roughly $55 million per quarter in in-app purchases (implying approximately 550,000 Nitro
              conversions per quarter at $100/year average) — then the realized ARPU of paying users is approximately
              $72–$115 per year, consistent with the $99.99 annual Nitro list price adjusted for localized pricing and
              Nitro Basic tier subscribers.

              Discord's paid conversion rate is estimated at roughly 2–3 percent of MAU, which is low by consumer
              subscription benchmarks but consistent with freemium communication platforms. Spotify, a comparator with a
              similarly large free user base, historically reported approximately 26–28 percent paid conversion
              globally; Discord's gaming-and-community demographic skews younger and more price-sensitive, so the gap is
              structurally expected. Improving paid conversion by even one percentage point would add approximately 2.5
              million paying subscribers and approximately $250 million in annual subscription revenue — making
              conversion optimization the single largest short-term lever in Discord's financial model.

              CAC and LTV data are entirely undisclosed. Discord's organic network-effect distribution means that
              explicit paid acquisition cost is likely modest relative to SaaS peers, but the exact ratio of LTV to CAC
              cannot be confirmed from public sources. Server Boost attachment rates, developer subscription GMV, and
              Quests ad ROAS are not publicly available. These constitute the most consequential unit-economics gaps for
              a prospective investor or acquirer.
