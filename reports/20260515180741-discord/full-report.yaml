companyProfile:
  summary: >-
    Discord is a late-stage private consumer communications platform originally built for gamers that has expanded into
    general-interest community hosting. It monetizes primarily through Nitro subscriptions and Server Boost, with
    approximately $600M in 2023 revenue and 200M+ monthly active users. The company raised ~$995M across multiple
    rounds, culminating in a $15B valuation at its September 2021 Series H led by Dragoneer. A CEO transition to Humam
    Sakhnini in Spring 2025 and persistent IPO speculation frame the near-term strategic posture.
