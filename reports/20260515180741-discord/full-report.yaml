              Backlinko's $725M and Reuters' $600M revenue estimates imply Discord captures less than 0.5 percent of the
              games market and roughly 20-50 percent of the much smaller online community management market.
              TheInformation has described Discord as "struggling to grow up," and most users remain unmonetized.
              Without a meaningful expansion of paid penetration or a new revenue surface (advertising, partner
              monetization), valuation is constrained by SAM, not TAM.
