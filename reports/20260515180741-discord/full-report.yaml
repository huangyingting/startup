      - number: '3.6'
        title: Exhibits
        blocks:
          - type: callout
            title: Persistent community architecture creates switching costs that productivity tools cannot replicate
            body: >-
              Discord's combination of persistent voice channels, role-based community servers, and a mature bot
              ecosystem creates switching friction that is qualitatively different from the switching costs in
              enterprise SaaS. A large server with custom bots, established roles, and years of channel history is not
              easily replicated on Slack or Teams, and the social-graph cost of convincing an entire established
              community to migrate to a rival platform is high. This moat is most durable in gaming and creator
              communities where the persistent voice and identity features are core to the product experience, not
              peripheral perks.
