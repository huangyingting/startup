      - number: '8.4'
        title: Comparable Analysis
        blocks:
          - type: paragraph
            body: >-
              Discord has no direct public-market comparable that fully captures its hybrid voice/text/ gaming-community
              model. The most instructive comparables span communications-platform acquisitions, consumer-social IPOs,
              and gaming-social public companies.

              Slack (Salesforce acquisition, July 2021) is the strongest structural analog for communications-platform
              value. Salesforce paid $27.7 billion when Slack's trailing ARR was approximately $906 million, implying
              ~30x ARR. Slack served enterprise B2B customers with contract-based NRR exceeding 130 percent —
              fundamentally different from Discord's consumer freemium model. The Slack comp sets a ceiling, not a
              floor, for Discord.

              Reddit (NYSE: RDDT, IPO March 2024) is the most relevant structural analog as a consumer social platform
              with community-centric architecture, significant gaming and Gen-Z demographics, and a similar lack of
              enterprise revenue. Reddit priced at ~$34 per share for an initial market cap of ~$5.5 billion against
              2023 revenue of $804 million, implying approximately 7x trailing revenue. Reddit's post-IPO performance is
              instructive but the IPO pricing represents the clearing price for institutions — not a retrospective mark.

              Roblox (NYSE: RBLX) is the closest analog from a user-community and gaming perspective, trading at
              approximately $20-25 billion in 2024 against $2.65 billion 2023 revenue (~7.5x), but operates a
              virtual-currency platform economy with structurally different economics.

              The comparable set converges on a 7-10x revenue range for social and community consumer platforms in the
              2024-2026 market environment, with a premium possible for platforms demonstrating strong growth and a
              credible path to profitability. Applying 10-15x to Discord's estimated 2024E revenue of $700-750 million
              produces a $7-11 billion implied valuation — below the $15 billion 2021 round.
            claimRefs:
              - CV012
              - CV013
              - CV014
              - CV015
              - CV016
              - CV025
