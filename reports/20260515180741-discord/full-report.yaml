      - number: '3.3'
        title: Feature, pricing, and GTM comparison
        blocks:
          - type: paragraph
            body: >-
              Feature parity is highest in real-time text chat, where Slack, Teams, Telegram, and Guilded all match
              Discord's capability. Discord's structural differentiation lies in persistent voice channels (always-on
              rooms that are not scheduled meetings), its community server model (public and private servers with
              role-based access and moderation tooling), and its gaming integrations (PS5 voice, Xbox Game Pass via
              Nitro Rewards, rich game-presence APIs). Slack and Teams match or exceed Discord on enterprise compliance
              features — SAML SSO, audit logging, data-loss prevention, and eDiscovery — categories where Discord has no
              documented offering, which blocks enterprise procurement at most regulated organizations. Pricing
              structures diverge materially. Slack's entry pricing at $7.25 per user per month on annual billing and
              Teams' inclusion in Microsoft 365 at $6 to $22 per seat represent per-user models that generate
              substantially higher ARPU than Discord's consumer Nitro at $9.99 per month for one user regardless of
              server size. Telegram and WhatsApp are free to end users, meaning Discord must justify the Nitro premium
              entirely through gaming perks and community features rather than competing on core messaging value.
              Distribution diverges sharply: Microsoft's commercial M365 base provides Teams with zero-incremental-cost
              distribution into enterprise accounts; Slack leverages Salesforce's enterprise field sales force; Discord
              distributes almost entirely through organic community formation, gaming culture, and peer referrals,
              making GTM asymmetries a structural ceiling on Discord's near-term addressable revenue expansion outside
              the gaming and creator community segments.
