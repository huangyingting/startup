  - id: FE004
    title: Product maturity / capability map
    type: matrix
    layout: wide
    summary: >-
      The product maturity map assesses six of Discord's core product lines across four dimensions: maturity,
      competitive position, revenue contribution, and diligence risk. Voice Channels and Text Channels represent the
      mature, defensible core, while Activities and Quests are the highest-risk, highest-upside growth initiatives.
    data:
      columns:
        - Maturity
        - Competitive Position
        - Revenue Contribution
        - Diligence Risk
      rows:
        - label: Voice Channels
          values:
            - label: GA / Mature
              tone: positive
              detail: Shipping since launch; 2.5B min/month at peak; battle-tested infrastructure
            - label: Strong / Differentiated
              tone: positive
              detail: Low-latency OPUS audio; deep gaming integration; no credible direct substitute
            - label: Indirect (Nitro driver)
              tone: neutral
              detail: Drives Nitro conversion and retention; not directly monetized as a standalone feature
            - label: Low
              tone: positive
              detail: Infrastructure cost risk managed; no major regulatory exposure specific to voice
        - label: Text Channels
          values:
            - label: GA / Mature
              tone: positive
              detail: Core feature since founding; rich formatting, threads, forums, file sharing
            - label: Strong / Commoditized
              tone: neutral
              detail: Feature parity with Slack and Teams; differentiation via community model not enterprise workflow
            - label: Indirect (Nitro driver)
              tone: neutral
              detail: Enables community formation driving Nitro; search upsell opportunity
            - label: Low
              tone: positive
              detail: Mature, stable feature; content moderation at scale is ongoing challenge
        - label: Discord Activities
          values:
            - label: Growth / Early GA
              tone: neutral
              detail: Launched 2022–2023; SDK available to developers; growing game library
            - label: Emerging / First-Mover
              tone: positive
              detail: No comparable embedded gaming layer in competing communication platforms
            - label: Early / Unproven
              tone: warning
              detail: Revenue model not publicly disclosed; Activities SDK monetization nascent
            - label: Medium
              tone: warning
              detail: Developer adoption pace, monetization model, and studio interest not publicly confirmed
        - label: Nitro Subscriptions
          values:
            - label: GA / Mature
              tone: positive
              detail: Multi-tier subscription ($4.99 Basic, $9.99 Nitro); long-standing revenue product
            - label: Moderate / Defensible
              tone: neutral
              detail: Subscription perks tied to Discord-specific features; limited substitutability
            - label: Primary Direct Revenue
              tone: positive
              detail: Largest disclosed revenue driver; conversion and churn not publicly reported
            - label: Low-Medium
              tone: neutral
              detail: Conversion rate and churn not disclosed; revenue concentration risk in subscriptions
        - label: Developer API / Bots
          values:
            - label: GA / Mature
              tone: positive
              detail: 1M+ bots; comprehensive REST + Gateway API; stable versioned API surface
            - label: Dominant / Ecosystem Lock-in
              tone: positive
              detail: discord.js 1M+ weekly downloads; largest bot ecosystem of any communication platform
            - label: Indirect (Ecosystem moat)
              tone: neutral
              detail: API enables Nitro conversion via bot-driven engagement; not directly monetized
            - label: Low
              tone: positive
              detail: Well-documented API; bot ecosystem creates switching costs; API stability maintained
        - label: Quests (Advertising)
          values:
            - label: Early / Growing
              tone: neutral
              detail: Active product; performance-based advertising for game studios and brands
            - label: Early / Niche
              tone: neutral
              detail: Limited to gaming/brand advertisers; no scale benchmarks publicly available
            - label: Emerging Revenue Stream
              tone: neutral
              detail: Represents Discord's push beyond subscriptions; revenue contribution not disclosed
            - label: Medium-High
              tone: warning
              detail: Brand-safety risk in semi-moderated server environments; early advertiser adoption unconfirmed
  - id: FU001
    title: Customer journey map
    type: journey-map
    layout: wide
    summary: >-
      The typical Discord user journey begins with organic discovery through gaming or social networks, progresses
      through account creation and first-server joining, deepens through feature exploration and community
      participation, and may culminate in Nitro conversion or server creation. Key friction points occur at onboarding
      (complex UI for non-technical users) and at the free-to-paid conversion moment where the Nitro value proposition
      is perceived as insufficient by many users.
    data:
      nodes:
        - id: n1
          label: Discovery (organic / word-of-mouth / game integration)
          detail: >-
            User discovers Discord via gaming lobbies, friend referrals, game-publisher integration prompts (e.g., PS5
            notification, Xbox dashboard), or social media content about a game or community
        - id: n2
          label: Account creation and onboarding
          detail: >-
            User creates an account via email or phone; onboarding is intentionally lightweight but can overwhelm
            non-technical users unfamiliar with the server and channel model
        - id: n3
          label: Join first server (friend invite or game integration)
          detail: >-
            User joins via an invite link from a friend, a game publisher's official server prompt, or Discord's
            discovery browser; the first-server experience strongly predicts short-term retention
        - id: n4
          label: Feature exploration (voice, text, reactions, bots)
          detail: >-
            User engages with voice channels, text chat, reaction roles, and third-party bots; breadth of feature
            engagement correlates with higher long-term retention and Nitro conversion
        - id: n5
          label: Community deepening (join more servers, boost, evaluate Nitro)
          detail: >-
            Power user joins multiple servers across interests, boosts a favourite server, and evaluates Nitro
            subscription for animated avatars, larger uploads, and cross-server boosts
        - id: n6
          label: Power user and advocate (create own server, recruit members)
          detail: >-
            Highest-value cohort: creates and moderates own server, recruits community members, invests in Nitro and
            server boosts consistently; acts as primary platform advocate and organic acquisition driver
  - id: FU002
    title: Adoption / deployment funnel
    type: flow
    layout: standard
    summary: >-
      The Discord adoption funnel narrows dramatically from an estimated 600–700 M registered users to approximately 5–8
      M Nitro subscribers, reflecting freemium-typical conversion dynamics. Each funnel stage represents a meaningful
      drop-off opportunity for product investment to improve monetisation conversion. Engagement depth—measured by
      server participation and feature use—is the key intermediate conversion signal.
    data:
      nodes:
        - id: n1
          label: Registered users (~600–700 M)
        - id: n2
          label: Monthly active users (~150–200 M)
        - id: n3
          label: Daily active users (~90 M)
        - id: n4
          label: Engaged community participants (server boosters, active members)
        - id: n5
          label: Nitro paying subscribers (~5–8 M)
      edges:
        - from: n1
          to: n2
          label: MAU conversion (~25% of registered)
        - from: n2
          to: n3
          label: DAU conversion (~50% of MAU)
        - from: n3
          to: n4
          label: Deep engagement conversion (est. ~20–30% of DAU)
        - from: n4
          to: n5
          label: Nitro conversion (est. ~15–25% of deeply engaged users)
  - id: FU003
    title: Customer proof matrix
    type: matrix
    layout: wide
    summary: >-
      The customer proof matrix evaluates five major customer segments across four dimensions: evidence type, outcome
      specificity, retention visibility, and production maturity. Gaming communities and key brand partners
      (PlayStation, Xbox) score highest on evidence quality and production maturity; creator, academic, and Web3
      segments show weaker formal evidence and lower retention visibility.
    data:
      columns:
        - Evidence Type
        - Outcome Specificity
        - Retention Visibility
        - Production Maturity
      rows:
        - label: Gaming communities (Minecraft / Roblox / Valorant)
          values:
            - label: Deep console and game integration; verified servers
              tone: positive
              detail: >-
                Multiple game publishers have PS5/Xbox OS integrations and official verified servers with millions of
                members
            - label: High — member counts publicly visible; integrations confirmed by publishers
              tone: positive
              detail: Server member counts observable; integrations confirmed via publisher press releases and tech media
            - label: High — structural stickiness via default server membership persistence
              tone: positive
              detail: Server membership persists by default; game activity reinforces daily return behaviour
            - label: Production — fully deployed at scale since platform launch
              tone: positive
              detail: Core use case and primary revenue driver; in full production since Discord's 2015 launch
        - label: Sony PlayStation
          values:
            - label: OS-level integration and official verified server
              tone: positive
              detail: PS5 console integration is platform-level; official server confirmed with 1M+ members via press releases
            - label: High — 1M+ member count disclosed; PS5 integration confirmed via Sony and Discord
              tone: positive
              detail: Sony and Discord joint announcements confirm integration depth and member milestone
            - label: Medium — console integration drives return but subscriber churn not disclosed
              tone: neutral
              detail: Structural retention via console OS; no churn, NRR, or engagement data disclosed publicly
            - label: Production — embedded in PS5 OS software
              tone: positive
              detail: Integration shipped in PS5 system software update; widely reported by IGN, The Verge, and Polygon
        - label: Microsoft Xbox (Game Pass bundle)
          values:
            - label: Formal subscription bundle partnership
              tone: positive
              detail: Nitro included in Xbox Game Pass Ultimate; confirmed by both Microsoft Xbox and Discord
            - label: Medium — partnership public; activation rate and Nitro usage from bundle not disclosed
              tone: neutral
              detail: Bundle existence confirmed; no data on what share of bundle recipients activate or retain Nitro
            - label: Low — bundle churn and Nitro retention from bundle cohort not disclosed
              tone: warning
              detail: Bundle may inflate Nitro metrics without reflecting genuine product-driven loyalty or willingness to pay
            - label: Production — active partnership operational as of 2023
              tone: positive
              detail: Partnership confirmed operational per Xbox News September 2023; ongoing per public communications
        - label: Creator and streaming communities
          values:
            - label: Organic adoption; no formal partnership programme at scale
              tone: neutral
              detail: Creators adopt Discord independently; no formal Discord creator-partnership programme confirmed at scale
            - label: Low — server sizes vary widely; no aggregate outcome data
              tone: warning
              detail: Individual creator server sizes are not aggregated by Discord; evidence is anecdotal and self-reported
            - label: Medium — creator loyalty varies; migration risk to Patreon and Substack exists
              tone: neutral
              detail: >-
                Some creators have migrated communities to competing platforms; no platform-level retention data
                available
            - label: Production — widely adopted by streaming community as established norm
              tone: positive
              detail: >-
                Twitch and YouTube creators routinely link Discord servers in channel profiles; well-established
                community practice
        - label: Study and academic communities
          values:
            - label: Organic adoption; no institutional or educational endorsement
              tone: neutral
              detail: >-
                No university or educational institution has formally endorsed Discord; adoption is entirely
                student-driven
            - label: Low — no measurable academic outcome data or scale metrics
              tone: warning
              detail: >-
                Academic Discord use is anecdotal; no peer-reviewed or institutional data on scale or educational
                efficacy
            - label: Low — seasonal churn at semester and academic-year boundaries
              tone: warning
              detail: >-
                Academic communities are likely to churn at semester end and graduation; no cohort retention data
                available
            - label: Production — widespread but unstructured use in practice
              tone: neutral
              detail: >-
                Widespread student use is well-documented anecdotally; unstructured and without Discord's formal support
                or features
  - id: FU004
    title: Retention / repeat cohort
    type: cohort
    layout: wide
    summary: >-
      Estimated retention cohorts for three Discord user segments over 24 months. All figures are analyst estimates;
      Discord does not publish cohort retention data. Gaming community servers show the strongest estimated long-term
      retention due to structural network effects and game-driven daily return behaviour. Nitro subscriber cohorts show
      the steepest estimated decline, reflecting discretionary consumer subscription dynamics.
    data:
      columns:
        - Month 1
        - Month 3
        - Month 6
        - Month 12
        - Month 24
      rows:
        - label: Nitro subscribers (est.)
          values:
            - 100
