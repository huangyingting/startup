  - number: 2
    title: Market Analysis
    sections:
      - number: '2.1'
        title: Market boundary, included and excluded spend, and substitutes
        blocks:
          - type: paragraph
            body: >-
              Discord's underwriting-relevant market is narrower than the broad social-media universe and broader than
              gaming chat alone. Public product surfaces show the platform monetizing through the Nitro consumer
              subscription, Server Boost community payments, and the 2025 Nitro Rewards bundle with Xbox Game Pass.
              Those surfaces sit primarily inside two definable spend categories: (a) gaming-community communications,
              where the buyer is a player or community owner inside Newzoo's roughly $200B global games market, and (b)
              online community management platforms, which Grand View, Allied, Verified Market Research, and Mordor
              Intelligence size between roughly $1.5B and $3.6B by the late 2020s. A third adjacent category, consumer
              messaging, is the addressable backdrop tracked by Statista's social and messaging outlooks but is not
              directly monetizable at Discord's current price points outside of Nitro. A fourth, the creator economy, is
              sized by Goldman Sachs at roughly half a trillion dollars by 2027 and contains the prosumer audience
              Discord seeks to retain via Server Boost and creator tools.

              Excluded spend includes hyperscaler infrastructure capex, console/PC hardware, advertising-funded social
              platforms, and enterprise productivity SaaS — categories where Discord does not capture revenue directly.
              Substitutes include Microsoft Teams and Slack on the workplace side, Telegram and WhatsApp on the consumer
              side, Twitch and YouTube live-chat for streamer communities, Reddit and Facebook Groups for asynchronous
              community discussion, and Steam Chat or in-game voice for the gaming use case. The status quo for many
              gaming communities remains in-game voice plus a friend list, which keeps switching costs to Discord low
              and re-acquisition cycles short.
