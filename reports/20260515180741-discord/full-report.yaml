  - number: 6
    title: Customers
    sections:
      - number: '6.1'
        title: Customer base segmentation
        blocks:
          - type: paragraph
            body: >-
              Discord's user base decomposes into seven identifiable segments, each with distinct use cases,
              monetisation profiles, and strategic value. Gaming communities are the dominant segment: approximately 90
              percent of daily active users report playing video games, and the largest servers—built around titles such
              as Minecraft, Roblox, Valorant, CS2, and Apex Legends—number in the millions of members. Official brand
              servers maintained by Sony PlayStation, Nintendo, Riot Games, Epic Games, and Electronic Arts represent a
              second, strategically critical segment that confers legitimacy and drives new-user acquisition through
              console and game integrations. Creator communities, including YouTube personalities, Twitch streamers, and
              K-pop fan networks, form a third segment that monetises principally through channel boosts and exclusive
              subscription tiers. Study and academic communities expanded sharply during the COVID-19 pandemic and today
              represent a sizeable growth segment attracting younger cohorts with long-term lifetime-value potential.
              Tech and developer communities—covering open-source projects, programming help servers, and hacker
              forums—provide developer-relations value and act as informal product advocates. Web3 and crypto
              communities adopted Discord as their primary coordination layer, though this segment is volatile and
              carries reputational risk from fraud and scam server association. Finally, a nascent enterprise-adjacent
              segment employs Discord for lightweight internal communications and customer support, but it remains
              marginal compared to Slack and Microsoft Teams. Discord does not publish official segment-level data, so
              all sizing estimates are analyst-derived.
            claimRefs:
