      - number: '1.3'
        title: Capital formation and investor base
        blocks:
          - type: paragraph
            body: >-
              Discord's public financing record spans twelve disclosed rounds from a July 2012 seed through the
              September 2021 Series H. Total disclosed capital raised amounts to approximately $995 million per
              Backlinko's aggregated funding data, aligned with Wikipedia's coverage of individual rounds.

              The early rounds were small: a $1.1 million seed in July 2012, an $8.2 million Series A in November 2013,
              and a February 2015 Series B of undisclosed size. Benchmark Capital and Tencent Holdings participated in
              the company's early development via funding to Hammer and Chisel. The Series C raised $20 million in
              January 2016, with WarnerMedia (then Time Warner) among the investors. The Series D in January 2017 raised
              $50 million and established a roughly $2 billion valuation. The December 2018 Series F raised $150 million
              at a $2 billion valuation, led by Greenoaks Capital with Firstmark, Tencent, IVP, Index Ventures, and
              Technology Opportunity Partners participating.

              The June 2020 Series G raised $100 million to support platform growth during the pandemic-era
              communications surge. The September 2021 Series H, confirmed via an SEC Form D filing dated September
              2021, raised $500 million at a $15 billion post-money valuation. Discord's own blog post confirms this
              raise. Wikipedia describes the round as Dragoneer Investment Group-led, with Baillie Gifford, Fidelity
              Investments, and others participating. No public financing round has been disclosed since September 2021,
              and no IPO announcement has been made as of the research date.

              A notable non-event: in March to April 2021, Bloomberg and other outlets reported that Microsoft had
              approached Discord about an acquisition at approximately $12 billion; Discord declined and instead pursued
              the larger Series H at $15 billion. This decision preserved Discord's independence and established its
              current valuation floor.
