  - number: 4
    title: Financials
    sections:
      - number: '4.1'
        title: Revenue model and monetization architecture
        blocks:
          - type: paragraph
            body: >-
              Discord's revenue engine is built primarily on premium consumer subscriptions, with three growing
              supplementary streams that are expanding the mix toward advertising and platform-fee income.

              The flagship product is Discord Nitro, a monthly or annual premium subscription sold in two tiers. Nitro
              Basic is priced at $2.99 per month or $29.99 per year and unlocks custom emoji anywhere, 50 MB file
              uploads, and custom app icons. The full Nitro tier is priced at $9.99 per month or $99.99 per year and
              adds 500 MB uploads, HD streaming, animated avatars, custom profiles, two included Server Boosts, and — as
              of 2025 — Xbox Game Pass (Starter Edition) through the Nitro Rewards program. Nitro pricing is listed
              publicly on discord.com/nitro, but list prices are not realized revenue; localized pricing is available in
              select markets at lower rates.

              Server Boosts are a separate community monetization lever: users can purchase additional Boosts beyond the
              two included with Nitro at roughly $4.99 per boost per month, and these collectively upgrade a server's
              audio quality, emoji capacity, and streaming limits. Business of Apps estimates that Nitro and related
              subscription products account for the overwhelming majority of Discord's total revenue.

              Discord operates a developer monetization platform that allows third-party app and bot developers to
              charge users for premium app subscriptions (user or guild scope) and one-time purchases (durable and
              consumable items). Discord's official developer documentation confirms this framework: SKUs represent
              premium offerings, Entitlements track access, and Subscriptions govern the recurring payment lifecycle.
              Discord collects a platform service fee on these transactions; the exact fee rate is not publicly
              disclosed but follows the industry norm of 10–30 percent.

              The Quests advertising product, surfaced on discord.com/quests, allows game publishers and brands to pay
              for performance-based promotions: users complete in-game tasks and receive Discord rewards (Orbs, Nitro
              credits, partner goods). This product monetizes Discord's engagement surface without charging users
              directly and represents a nascent but structurally important fourth revenue line as Discord diversifies
              away from pure subscription income. Creator server subscriptions — where Discord takes a platform fee from
              creator-set subscriber revenue — add a fifth stream at early scale. Discord's official Creators page
              confirms the feature's availability but does not disclose take-rate or creator revenue totals.
