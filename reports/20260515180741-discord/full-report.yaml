chapters:
  - number: 1
    title: Company Overview
    sections:
      - number: '1.1'
        title: Identity, product platform, and current operating footprint
        blocks:
          - type: paragraph
            body: >-
              Discord Inc. is a Delaware-incorporated private technology company headquartered at 444 De Haro Street,
              Suite 200, San Francisco, California 94107. The company describes itself as a communications platform
              built to enable meaningful connections around the joy of playing games through voice, video, and text
              features. Its core product allows users to join and create invitation-only virtual communities called
              servers, which contain persistent text channels, voice channels, and video capabilities. Users can also
              communicate privately through direct messages and group direct messages.

              The platform is available on Windows, macOS, Android, iOS, iPadOS, Linux, and in web browsers. As of May
              2026, Discord's official company page reports 90 million-plus daily active users, more than 90 percent of
              whom play video games, and approximately 40 percent who start a game within one hour of opening Discord.
              Wikipedia records approximately 150 to 200 million monthly active users and 19 million weekly active
              servers as of 2024, though Backlinko's aggregated market-data figure of 200 million MAU is more current.
              The company's revenue model relies on Nitro premium subscriptions and server-boosting fees, supplemented
              by gaming-partner programs such as the Xbox Game Pass integration announced through the 2025 Nitro Rewards
              program.

              Discord's legal name is Discord Inc., its SEC CIK is 0001763840, and its registered state of incorporation
              is Delaware. LinkedIn lists the company under the software sector. The platform supports 30 languages and
              is consistently ranked among the 30 most-visited websites globally. Its tech stack is principally
              TypeScript on the client side with React, and Elixir, Python, Rust, and C++ on the server side, with
              Electron for the desktop client and React Native for mobile.
