  - number: 5
    title: Product & Technology
    sections:
      - number: '5.1'
        title: Core Platform Architecture & Scale
        blocks:
          - type: paragraph
            body: >-
              Discord's core platform architecture exemplifies a polyglot engineering approach optimized for real-time,
              high-concurrency communication. The real-time messaging gateway is built on Elixir and Erlang, leveraging
              the distributed actor model via the BEAM virtual machine to handle millions of simultaneous WebSocket
              connections with fault tolerance and horizontal scalability. The frontend web client is written in React
              with TypeScript, delivering a high-performance single-page application experience, while Electron powers
              the cross-platform desktop client and React Native handles iOS and Android mobile applications. For
              persistent message storage, Discord completed a significant three-phase migration: initially using
              MongoDB, then Apache Cassandra for scale, and finally migrating to ScyllaDB in 2022—motivated by read
              latency and write throughput requirements at billions-of-messages scale. As of 2023, Discord had stored
              over 850 billion messages. Google Cloud Platform serves as the primary cloud infrastructure, and
              Cloudflare provides global CDN, DDoS protection, and edge computing. At peak, Discord supports
              approximately 4 million concurrent voice users and delivers 2.5 billion minutes of voice and video monthly
              across 19 million weekly active servers—metrics benchmarking Discord as one of the most demanding
              real-time communications platforms in the consumer internet industry.
