        - label: Telegram
          values:
            - label: None
              tone: negative
              detail: No persistent voice channel feature in core Telegram product
            - label: Partial
              tone: neutral
              detail: Public channels exist but lack Discord-style server role and permission structure
            - label: None
              tone: neutral
              detail: No gaming integrations; Telegram is positioned as a general messaging platform
            - label: None
