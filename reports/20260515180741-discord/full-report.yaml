      - number: '5.3'
        title: Trust, Safety & Compliance
        blocks:
          - type: paragraph
            body: >-
              Discord's trust and safety posture carries meaningful regulatory history and ongoing operational
              challenges. In May 2023, the FTC reached a settlement with Discord for $7.8 million over violations of the
              Children's Online Privacy Protection Act (COPPA), requiring Discord to implement enhanced
              age-verification, parental consent mechanisms, and stricter data retention limits for users under 13. This
              represented the most significant regulatory action in Discord's history and necessitated material changes
              to its onboarding and privacy infrastructure. Beyond COPPA, Discord's privacy policy documents compliance
              with GDPR, covering data subject rights, data portability, and deletion requests, and CCPA, covering
              opt-out rights for California residents. Discord maintains a dedicated Trust & Safety team responsible for
              content moderation, abuse response, and community guideline enforcement across its millions of servers—a
              challenge given the platform's semi-private server structure that limits external visibility into content.
              The public status page at discord.statuspage.io provides historical incident transparency. All
              communications are encrypted in transit. Notable gaps include the absence of a publicly confirmed ISO
              27001 certification and the non-disclosure of contractual SLAs or uptime guarantees. For brand advertisers
              and enterprise users, the combination of FTC settlement history, ongoing moderation challenges, and
              limited security certification transparency represents an elevated operational and reputational risk
              factor.
