  - id: FE001
    title: Product architecture map
    type: stack
    layout: wide
    summary: >-
      Discord's technology stack is structured in eight distinct layers, from client-facing applications through
      real-time gateways, application services, and persistent data stores, down to cloud and edge infrastructure. The
      polyglot architecture reflects deliberate technology choices at each layer optimized for the specific performance
      and scalability demands of a real-time communications platform.
    data:
      layers:
        - id: l1
          label: Client Layer
          detail: >-
            React (TypeScript) web app; Electron desktop (Windows/macOS/Linux); React Native mobile (iOS/Android);
            browser
        - id: l2
          label: Real-time Gateway Layer
          detail: Elixir/Erlang WebSocket gateway; BEAM VM distributed actor model; manages millions of concurrent connections
        - id: l3
          label: API & Integration Layer
          detail: REST API; Discord Gateway API (WebSocket events); slash commands / interactions API; webhooks; OAuth2
        - id: l4
          label: Application Services Layer
          detail: 'Go microservices: authentication, presence, notifications, search, file storage, guild management'
        - id: l5
          label: Performance Layer
          detail: Rust components for voice/video processing, low-latency audio encoding/decoding (OPUS), hotpath pipelines
        - id: l6
          label: Data Layer
          detail: ScyllaDB (850B+ messages); PostgreSQL (relational metadata); Redis (caching, pub/sub); GCS object storage
        - id: l7
          label: Cloud Infrastructure Layer
          detail: Google Cloud Platform (GCP); multi-region compute; global load balancing; Kubernetes orchestration
        - id: l8
          label: Edge & CDN Layer
          detail: Cloudflare CDN; DDoS protection; Cloudflare Workers edge compute; global PoP network
