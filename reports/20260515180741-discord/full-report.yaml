              - CV016
      - number: '8.5'
        title: Exit Readiness and IPO Path
        blocks:
          - type: paragraph
            body: >-
              Discord's most likely exit path is a public-market IPO. The Microsoft acquisition interest in April 2021
              at a reported $10-12 billion was rejected, and that decision implicitly set a floor expectation for
              management and existing investors. As of May 2026, no S-1 has been filed and no IPO has been announced.
              Multiple financial media outlets — Reuters, Axios, WSJ, Bloomberg, and Forbes — have reported IPO plans
              for 2025-2026, with some noting a possible delay from a 2025 target to 2026 as Discord works toward
              profitability.

              IPO readiness indicators are mixed. Positive signals include: Dragoneer, Fidelity, and other institutional
              investors are IPO-experienced and have incentive to exit given five years since the last round; new CEO
              Humam Sakhnini with public-company experience at Activision Blizzard provides credibility for an investor
              roadshow; and 2026 IPO market conditions for consumer tech have improved from 2022-2023 lows. Negative
              signals include: no S-1 filing as of May 2026 means IPO could slip to 2027; no confirmation of EBITDA
              profitability means IPO may require loss-making-consumer-tech positioning which historically commands a
              discount; and the lack of formal financial disclosure means the IPO price will be set in a data vacuum for
              public investors.

              New CEO Sakhnini's appointment in Spring 2025 added approximately 12-18 months of execution runway before
              a credible IPO roadshow can be conducted, suggesting even an optimistic timeline would land in late 2026
              at the earliest. DemandSage projects first meaningful profitability by late 2026, aligning with a
              potential 2026-2027 IPO window if the financial trajectory improves under new leadership.
            claimRefs:
              - CV004
              - CV005
              - CV018
              - CV020
              - CV021
              - CV035
              - CV037
              - CV040
      - number: '8.6'
        title: Final Diligence Asks and Thesis-Break Triggers
        blocks:
          - type: paragraph
            body: >-
              The primary diligence gap preventing a confident investment decision is the absence of audited financial
              statements or data-room access. Discord's public evidence base cannot answer the questions that govern
              whether the company deserves a premium or discount to the comparable set: gross margin, EBITDA trajectory,
              Nitro subscriber cohort health, revenue by segment, full cap-table and preference terms, management's
              financial model, and IPO structure.

              Thesis-break triggers focus on four dimensions: revenue growth, gaming market health, regulatory
              enforcement, and management execution. A decline in annualized revenue growth below 10 percent or a gaming
              MAU decline of 15-plus percent would indicate Discord has reached a structural ceiling. A new material FTC
              or DOJ regulatory action post the 2023 COPPA settlement would add compliance costs Discord cannot easily
              pass through to subscribers. An IPO delay beyond 2027 would extend the investment horizon by two or more
              additional years with no liquidity guarantee. Any of these events would require immediate conviction
              re-evaluation and, in the case of an active position, a disciplined exit process.
            claimRefs:
              - CV029
              - CV033
              - CV034
              - CV036
              - CV040
