      - number: '8.2'
        title: Valuation Context and Entry Discipline
        blocks:
          - type: paragraph
            body: >-
              Discord's last disclosed post-money valuation is $15 billion, confirmed by the SEC Form D filing dated
              September 2021 and corroborated by Discord's official blog announcement and TechCrunch's contemporaneous
              reporting on the $500 million Series H led by Dragoneer Investment Group. The round included Fidelity
              Investments, T. Rowe Price, Baillie Gifford, Index Ventures, and others. At the time of the raise,
              Discord's estimated 2021 revenue was approximately $310 million per Business of Apps, implying a ~48x
              trailing revenue multiple consistent with peak 2021 consumer-tech valuations.

              Between 2022 and 2024, public-market technology multiples compressed approximately 60-70 percent from peak
              levels. Pitchbook's private-company valuation data and DemandSage projections suggest Discord's implied
              fair-market value has declined to approximately $7-10 billion in 2025-2026. Applying the current
              comparable-set median of approximately 8x revenue to Discord's estimated 2024 revenue of $700-750 million
              yields an implied valuation of roughly $5.6-6.0 billion — below even the bear-case scenario — underscoring
              that entry at or above the 2021 price represents a high-multiple risk.

              Entry discipline for a prospective investor requires clarity on three factors: (1) the revenue multiple
              that a 2026-2027 IPO market will accept for a consumer social/gaming platform without positive EBITDA; (2)
              the degree to which preferred-share overhang from $995 million raised affects common-equity outcomes at
              different IPO prices; and (3) whether Sakhnini's operating improvements and the Quests ramp shift the
              growth-and-margin trajectory materially enough to justify a premium to the comparable set. Without
              data-room access to gross margin, EBITDA bridge, and Nitro cohort data, entry above $8 billion is not
              supportable on public evidence alone. A secondary-market purchase at $6-8 billion would represent a
              reasonable margin of safety relative to the $15 billion peak if supported by confirmed revenue of $700M or
              more.
            claimRefs:
              - CV001
              - CV002
              - CV003
