            title: Gaming concentration is both Discord's superpower and its most material strategic risk
            body: >-
              Approximately 90 percent of Discord's daily active users are gamers, and the platform's deepest product
              integrations, largest communities, and most compelling brand proofs all originate in gaming. This
              concentration has driven exceptional growth and engagement metrics, but it exposes Discord to cyclical
              risk: a structural decline in PC gaming engagement, a platform shift by a major publisher, or the
              emergence of a gaming-native competitor could rapidly erode the core user base. Investors should track the
