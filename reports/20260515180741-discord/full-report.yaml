      - number: '1.2'
        title: Leadership, governance, and board composition
        blocks:
          - type: paragraph
            body: >-
              Discord was co-founded in 2015 by Jason Citron and Stanislav Vishnevskiy. Citron had previously founded
              the social gaming network OpenFeint, which he sold to GREE in 2011 for approximately $104 million. The
              proceeds funded Hammer and Chisel, the game development studio that produced Fates Forever before pivoting
              to build Discord. Vishnevskiy joined Citron in April 2013 and has served as Chief Technology Officer since
              the company's inception.

              In Spring 2025, Jason Citron announced his transition from CEO to Board Member and Advisor. Humam Sakhnini
              was appointed as Discord's new Chief Executive Officer. Sakhnini brings deep gaming industry experience
              from senior leadership roles at Activision Blizzard and King. Discord's official company page is the
              primary public source for this transition, describing it as part of a new era for the platform. News
              coverage from Variety corroborates the CEO appointment in Spring 2025.

              Financial governance has been in place since at least March 2021, when Discord hired Tomasz Marcinkowski
              as its first CFO, a former head of finance for Pinterest. SEC Form D filings for the September 2021 Series
              H round disclose eight named directors or officers: Jason Citron, Stanislav Vishnevskiy, Mitch Lasky,
              Clint Smith, David Sze, Stephen Gillett, Danny Rimer, and Tomasz Marcinkowski. A subsequent March 2023
              Form D filing added Amrita Ahuja and Leslie Kilgore to the disclosed directors list. Public board
              composition beyond these ten names remains undisclosed, so ownership percentages, voting agreements, and
              full governance structure are not confirmable from public sources alone.
