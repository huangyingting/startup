  - id: FM001
    title: Market sizing lens
    type: pyramid
    layout: standard
    summary: >-
      Discord's TAM stack runs from the very large social-media backdrop down through the gaming and creator-economy
      layers to the relatively narrow online-community-management addressable market and finally to Discord's realized
      revenue band.
    data:
      nodes:
        - label: Global social media users (TAM backdrop)
          detail: ~5.07B users 2024, projected 5.85B by 2027 (Statista)
          tone: neutral
        - label: Global games market (TAM backdrop)
          detail: ~$187B (2024) growing toward $200B+ by 2026 (Newzoo)
          tone: positive
        - label: Creator economy (adjacent TAM)
          detail: ~$250B today, ~$480B by 2027 (Goldman Sachs); $250-500B range across publishers
          tone: positive
        - label: Online community management platform SAM
