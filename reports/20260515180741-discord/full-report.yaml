  - number: 3
    title: Competitors
    sections:
      - number: '3.1'
        title: Competitive landscape and peer taxonomy
        blocks:
          - type: paragraph
            body: >-
              Discord's competitive landscape spans at least five distinct peer categories. Gaming-native peers —
              Guilded (acquired by Roblox in 2021), TeamSpeak, and Mumble — originally targeted the same low-latency
              gaming-voice use case that Discord disrupted in 2015; all three have smaller user bases and declining
              developer investment relative to Discord today. Incumbent productivity platforms — Microsoft Teams (~320M
              MAU) and Slack (Salesforce subsidiary, ~18M DAU) — compete for community mind-share in workplace and
              educational contexts and carry substantially larger capital bases and enterprise distribution advantages.
              Consumer messaging and community incumbents — Telegram (~950M MAU), WhatsApp (~3B MAU), and Reddit (public
              company since April 2024) — compete for asynchronous and group messaging use cases at consumer scale that
              overlaps with Discord's non-gaming communities. Live-streaming adjacent platforms — principally Twitch
              Chat — compete for real-time community engagement among gaming and creator audiences. Federated and
              self-hosted alternatives — Element (Matrix protocol) and Steam Chat (Valve) — serve as status quo
              substitutes for privacy-focused users and PC-native gamers respectively. Two additional competitive
              dynamics warrant tracking: the internal build option (Discord's own API enabling developers to extend the
              platform rather than migrating to a rival), and the status-quo alternative for casual gaming communities
              (in-game voice plus a console friend list), which keeps switching cost to Discord relatively low for users
              who have not yet built deep community infrastructure on the platform.
            claimRefs:
              - CP007
              - CP012
              - CP014
              - CP018
