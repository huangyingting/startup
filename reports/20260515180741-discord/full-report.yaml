              detail: Role-based servers with public/private access controls and moderation
            - label: Full
              tone: positive
              detail: PS5 voice, Xbox Nitro bundle, rich game-presence API with overlay support
            - label: None
              tone: warning
              detail: No SAML SSO, audit logging, DLP, or eDiscovery offering documented
