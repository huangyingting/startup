  - number: 8
    title: Valuation
    sections:
      - number: '8.1'
        title: Investment Thesis and Anti-Thesis
        blocks:
          - type: paragraph
            body: >-
              Discord's investment thesis is anchored on three structural advantages: community-layer moat,
              gaming-culture network effects, and a diversifying revenue model. With 200 million-plus monthly active
              users and 90 million-plus daily active users as of 2026, Discord has built the largest
              persistent-voice-and-text community infrastructure for gaming globally. Approximately 90 percent of users
              play video games, and Discord is the default communication layer for PC, console, and cross-platform
              gaming communities. Servers are persistent, invitation-gated, and moderator-controlled, creating high
              switching costs: migrating a server with hundreds of members, custom emoji, roles, and bots is practically
              difficult. The network effect is strong at the community level — each new member joining a server
              increases value for every existing member — and Discord's API ecosystem with over one million active bots
              deepens the moat through developer lock-in.

              Revenue has grown from an estimated $135 million in 2020 to approximately $575-600 million in 2023 per
              Reuters and Business of Apps, a compound annual growth rate of roughly 63 percent over three years before
              moderating toward 20-30 percent in 2022-2023. New CEO Humam Sakhnini brings Activision Blizzard and King
              experience and is positioned to accelerate the Quests advertising product and developer-platform
              monetization streams that diversify away from pure Nitro subscription income.

              The anti-thesis is equally grounded. Discord's $15 billion 2021 valuation was set at the peak of a
              generational consumer-tech multiple expansion that has since fully reversed. The current comparable set —
              Reddit's ~$5.5 billion IPO at ~7x 2023 revenue, Roblox at ~7.5x revenue — implies Discord's fair value is
              in the $8-10 billion range, not $15 billion. Discord's revenue ceiling risk is real: 90-plus percent
              gaming dependency means that gaming-market stagnation or a shift in demographics directly impairs the
              business. Monetization remains structurally thin at approximately $2-3 per MAU per year; paid conversion
              of 2-3 percent is substantially below industry benchmarks. The January 2024 layoffs of ~170 employees
              confirmed the company was operating at a material loss. The Information's adverse reporting that Discord
              is "struggling to grow up" from a monetization standpoint remains relevant context despite the leadership
              transition.
            claimRefs:
              - CV023
              - CV024
              - CV026
              - CV027
              - CV036
              - CV038
              - CV041
