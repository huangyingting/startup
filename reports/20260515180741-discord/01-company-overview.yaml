callouts:
  - calloutType: strength
    title: Dominant gaming platform with 90M+ DAU and strong private-market capital base
    body: >-
      Discord's official metrics show 90 million daily active users with 90-plus percent in the gaming
      demographic, making it the de-facto communications layer for the global gaming community.
      The $15 billion Series H valuation from 2021 and ~$995 million total raised give it deep financial
      reserves, while the 2025 Nitro Rewards and Xbox Game Pass partnership signal continued platform
      strength.
    claimRefs:
      - CO007
      - CO008
      - CO009
      - CO024
      - CO025
      - CO035
  - calloutType: risk
    title: FTC enforcement, layoff overhang, and stale public financials require scrutiny
    body: >-
      The May 2023 FTC COPPA settlement ($7.8M) and January 2024 layoffs (17% of workforce) are two
      material adverse events within the past two years. No new funding round or audited financials have
      been publicly disclosed since September 2021, leaving valuation and revenue as market estimates.
      The CEO transition in Spring 2025 introduces a new leadership risk dimension that later diligence
      chapters should assess.
    claimRefs:
