  - id: section-4
    title: Growth metrics, key milestones, and adverse events
    body: >-
      Discord's growth arc runs from a May 2015 public launch to a platform serving tens of millions of
      daily users in 2026. The company doubled its monthly user base to approximately 140 million during
      2020, according to Wikipedia, driven by pandemic-era demand for remote communication. Backlinko's
      data shows MAU growth from 56 million in May 2019 to a reported 200 million by 2024. Discord's
      official page quotes 90 million-plus DAU as of 2026, while Wikipedia's infobox records 501 employees
      as of 2025, lower than Backlinko's 870-employee estimate which likely reflects post-layoff figures.
      Backlinko also estimates annual revenue at $725 million, though this is a market estimate and not
      an audited figure disclosed by the company.

      Key product milestones include the 2016 introduction of the in-game overlay and API, the 2017 launch
      of Discord Nitro and video/screen-share features, the 2019 Go Live game-streaming feature, and the
      2023 PS5 voice chat integration. In 2025, Discord launched Nitro Rewards, which bundles Xbox Game
      Pass with Nitro benefits at no added cost, representing a deepened Microsoft gaming partnership
      despite the 2021 acquisition rejection.

      The most significant adverse events are the May 2023 FTC COPPA settlement and the January 2024
      workforce reduction. The FTC, as documented through its news and press-release search pages, reached
      a settlement with Discord in May 2023 under which Discord agreed to pay $7.8 million and reform
      data-collection practices that had affected minors. The settlement was the largest COPPA fine at that
      time. Separately, in January 2024, Discord announced layoffs affecting approximately 17 percent of
      its workforce, or roughly 170 employees, citing cost discipline and restructuring. These two events
      together represent material governance, regulatory, and operational inflection points that later
      diligence chapters should carry forward.
