company:
  name: Discord
chapter:
  number: 1
  title: Company Overview
  summary: >-
    Discord is a private American company incorporated in Delaware that operates a voice, video, and text
    communication platform originally built for gamers and now serving 90 million daily active users across
    gaming, creative, and general-interest communities. Public evidence supports a May 2015 founding by
    Jason Citron and Stanislav Vishnevskiy, a Spring 2025 CEO transition to Humam Sakhnini (former Activision
    Blizzard and King), and a total disclosed capital raise of approximately $995 million culminating in a
    September 2021 Series H at a $15 billion post-money valuation. The clearest current caveats are a
    $7.8 million FTC COPPA settlement in May 2023, a 17-percent workforce reduction in January 2024, and
    no public post-2021 financing or IPO announcement.
sections:
  - id: section-1
    title: Identity, product platform, and current operating footprint
    body: >-
      Discord Inc. is a Delaware-incorporated private technology company headquartered at 444 De Haro Street,
      Suite 200, San Francisco, California 94107. The company describes itself as a communications platform
      built to enable meaningful connections around the joy of playing games through voice, video, and text
      features. Its core product allows users to join and create invitation-only virtual communities called
      servers, which contain persistent text channels, voice channels, and video capabilities. Users can also
      communicate privately through direct messages and group direct messages.

      The platform is available on Windows, macOS, Android, iOS, iPadOS, Linux, and in web browsers. As of
      May 2026, Discord's official company page reports 90 million-plus daily active users, more than 90
      percent of whom play video games, and approximately 40 percent who start a game within one hour of
      opening Discord. Wikipedia records approximately 150 to 200 million monthly active users and 19 million
      weekly active servers as of 2024, though Backlinko's aggregated market-data figure of 200 million MAU
      is more current. The company's revenue model relies on Nitro premium subscriptions and server-boosting
      fees, supplemented by gaming-partner programs such as the Xbox Game Pass integration announced through
      the 2025 Nitro Rewards program.

      Discord's legal name is Discord Inc., its SEC CIK is 0001763840, and its registered state of
      incorporation is Delaware. LinkedIn lists the company under the software sector. The platform supports
      30 languages and is consistently ranked among the 30 most-visited websites globally. Its tech stack is
      principally TypeScript on the client side with React, and Elixir, Python, Rust, and C++ on the server
      side, with Electron for the desktop client and React Native for mobile.
