companyProfile:
  summary: Discord is a late-stage private consumer communications platform originally built for gamers that has expanded into general-interest community hosting. It monetizes primarily through Nitro subscriptions and Server Boost, with approximately $600M in 2023 revenue and 200M+ monthly active users. The company raised ~$995M across multiple rounds, culminating in a $15B valuation at its September 2021 Series H led by Dragoneer. A CEO transition to Humam Sakhnini in Spring 2025 and persistent IPO speculation frame the near-term strategic posture.
  foundedDate: '2015-05-01'
  founders:
    - name: Jason Citron
      role: Founder, former CEO, now Board Member and Advisor
      background: Previously founded OpenFeint (sold to GREE for ~$104M in 2011); transitioned from CEO to board role in Spring 2025.
      claimRefs: [CO010, CO023]
    - name: Stanislav Vishnevskiy
      role: Co-founder and CTO
      background: Joined Citron in 2013; has served as CTO since Discord's inception, overseeing the Elixir/Rust/ScyllaDB technical stack.
      claimRefs: [CO010]
  foundingLocation: San Francisco, California, USA
  headquarters: San Francisco, California
  productSummary: Discord provides persistent voice, video, and text communication through server-based communities, direct messaging, and a developer platform supporting bots and embedded apps. The platform serves gaming, creative, educational, and general-interest communities across desktop, mobile, and web.
  customerFocus: Consumers (Gen Z gamers, community owners, creators), game publishers, and brand partners.
  businessModel: Consumer subscriptions (Nitro), community payments (Server Boost), and partner integrations (Xbox Game Pass bundle).
  stage: late-stage private
  fundingStatus: Privately funded; latest public financing was a $500M Series H at $15B post-money valuation in September 2021, led by Dragoneer Investment Group. Total raised approximately $995M.
  claimRefs: [CO001, CO003, CO006, CO007, CO010, CO023]
summary:
  headline: Discord has real consumer-scale proof and a durable community moat, but the $15B entry price outruns the public financial disclosure package.
