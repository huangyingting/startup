        - Broad -- Teams free includes 60-min meetings, 5 GB storage, and unlimited chat
        - Unlimited -- fully free for standard use; Telegram Premium minimal add-ons only
        - Broad -- core community features are free; Guilded monetization is minimal
    notes: >-
      Cells reflect best-available public product documentation and independent competitive analysis.
      Enterprise compliance for Discord is marked None based on absence of documented SSO or audit
      features in official documentation and Naavik's competitive review. Guilded feature maturity
