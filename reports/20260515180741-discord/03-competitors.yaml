figures:
  - id: FP001
    title: Competitive positioning map
    type: quadrant
    layout: wide
    summary: >-
      Discord occupies a differentiated position combining deep community infrastructure with
      medium consumer scale. Microsoft Teams and Telegram dominate the high-scale quadrant with
      shallow community depth. Guilded and TeamSpeak are community-deep but niche-scale. Reddit
      is the only large-scale platform with meaningful community depth but competes in
      asynchronous discussion rather than real-time voice.
