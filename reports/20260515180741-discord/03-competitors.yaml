  - id: TP004
    title: Moat durability and competitive risk register
    type: enumeration
    columns:
      - Moat claim
      - Threat vector
      - Severity
      - Mitigation / diligence ask
    rows:
      - - Server-level network effects (social graph embedded in gaming servers)
        - Guilded (Roblox) could capture next-generation Roblox gamers before Discord habit forms
        - Medium
        - Monitor Guilded's MAU growth and Roblox server count. Ask Discord for user cohort data by age group showing new-user retention rates from 2022–2025.
      - - Switching cost from community investment (bots, channel history, roles, custom emojis)
        - Teams or Slack adding richer community-server features and offering migration tools with history import
        - Medium
        - Track Teams Communities feature roadmap. Assess Discord's history-export or data-portability posture, which affects enterprise adoption risk.
      - - Gaming-identity layer (Xbox, PlayStation, Steam, Twitch integrations)
        - Microsoft could bundle Teams with Xbox, leveraging the same gaming-identity hook without separate Discord integration
        - High
        - Monitor Microsoft Xbox / Teams integration announcements. Discord's 2025 Nitro Rewards / Xbox Game Pass partnership is a partial hedge but does not lock in the channel.
      - - Free-tier breadth (persistent voice, text, bots at no cost)
        - Telegram adding full server-management tooling and Guilded matching Discord quality on free voice could erode Discord's free-tier moat
        - Low
        - Telegram currently lacks server admin infrastructure; Guilded scale is insufficient. Revisit if Roblox invests significantly in Guilded growth.
      - - Creator and non-gaming community adoption (Midjourney, study groups, fan communities)
        - Reddit improving real-time chat and Twitter/X investing in Communities could recapture community formation that currently migrates to Discord
        - Medium
        - Discord's 9% US messaging share and post-pandemic growth moderation are adverse signals. Request management's breakdown of MAU by community type (gaming vs. non-gaming).
    notes: >-
      Severity ratings are ordinal assessments based on public evidence of competitive activity and
      platform momentum as of May 2026. "High" indicates an active threat with credible incumbent
      resources. "Medium" indicates a plausible threat requiring monitoring. "Low" indicates a
      theoretical threat with limited near-term evidence. All diligence asks require private
      management data not available in public sources.
    enumerationScope:
      coverage: partial
      basis: >-
        Table covers the five moat mechanisms most consistently cited across analyst commentary,
        product reviews, and competitor profiles reviewed during this chapter's research. Regulatory
        moat (child-safety compliance costs as barrier) and brand moat (gaming culture association)
        are excluded from this table as they are covered in the risk and company-overview chapters.
