  - id: section-P3
    title: Consumer and community messaging — Telegram and WhatsApp Communities
    body: >-
      Telegram reached 1 billion monthly active users in March 2025, with 500 million daily active
      users and 15 million paying Premium subscribers as of May 2025. Founded by brothers Pavel and
      Nikolai Durov in 2013 and headquartered in Dubai, Telegram built its audience on a privacy-
      first positioning and open API that enables third-party developers to build bots and
      integrations. Its Channels and Groups features allow creators and communities to broadcast to
      large subscriber bases — functioning partly as a Discord-style community hub and partly as a
      content publication tool.

      Telegram's revenue model relies primarily on its optional Premium subscription ($4.99/month),
      which generated an estimated $342 million in 2023. Unlike Discord, Telegram has explicitly
      refused to sell advertising, framing itself as an anti-commercial alternative. This limits its
      monetization ceiling but also differentiates it from Meta properties. Its user base is heavily
      concentrated in Asia (38 percent), Europe (27 percent), and Latin America (21 percent), with
      India representing the largest single country (roughly 45 percent of Indian respondents use
      Telegram). This international concentration means Telegram competes more directly with Discord
      in emerging markets than in Discord's North American core.

      WhatsApp, owned by Meta, has over 2.9 billion users globally and is the dominant messaging
      application in more than 100 countries. WhatsApp Communities, launched in October 2022,
      introduces a Discord-like nested-group structure allowing community organizers to group
      multiple chat groups under a shared umbrella. While WhatsApp's communities feature lacks
      Discord's persistent voice channels, server-level moderation tools, and bot ecosystem, its
      scale and pre-existing user habits create substantial distribution power. WhatsApp generated
      approximately $1.7 billion in revenue in 2024, primarily from WhatsApp for Business.

      Discord's differentiation against both platforms rests on real-time voice and on the richness
      of its server management and bot ecosystem. However, Discord's relatively low penetration in
      Asia and Latin America leaves it exposed to Telegram's home-field advantage in those regions.
    claimRefs:
