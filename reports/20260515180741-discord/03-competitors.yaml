      - CP022
      - CP026
      - CP033
      - CP034
      - CP035
  - id: FP003
    title: Moat / readiness KPIs
    type: kpi
    layout: compact
    summary: >-
      Key competitive metrics show Discord at ~200M MAU is well below Teams (~320M) and Telegram
      (~950M) in raw scale. Discord's estimated Nitro penetration of ~3-5% of MAU limits revenue
      scale relative to competitors' paid-seat models. The Discord-to-Slack ARPU gap is
      approximately an order of magnitude, reflecting the structural consumer-vs-enterprise pricing
      difference that constrains Discord's competitive investment capacity against better-capitalized
      incumbents.
    data:
      items:
        - label: Discord MAU (est.)
          value: 200
          unit: M MAU
          detail: Estimated monthly active users; Influencer Marketing Hub and DemandSage (2024)
        - label: Microsoft Teams MAU
          value: 320
          unit: M MAU
          detail: Reported by Microsoft; cited by Business of Apps and IDC (2023 figure)
        - label: Telegram MAU
          value: 950
          unit: M MAU
          detail: Reported MAU as of 2024; Business of Apps and data.ai State of Mobile
        - label: Slack DAU (est.)
          value: 18
          unit: M DAU
          detail: Business of Apps estimate as Salesforce subsidiary; 2024 estimate
        - label: Discord Nitro penetration (est.)
          value: 3-5
          unit: '% of MAU'
          detail: Low-single-digit analyst estimate; exact figure not disclosed by Discord
        - label: Discord bot ecosystem
          value: 1000000
          unit: bot apps
          detail: Approximate distinct bot applications registered on Discord developer platform
        - label: Slack vs Discord ARPU gap
          value: 10
          unit: x ratio
          detail: >-
            Extrapolated from Slack list price (~$87/user/yr at $7.25/mo) vs Discord blended
            ARPU across full MAU base given low single-digit Nitro penetration; illustrative
    approximationNotes: >-
      All values are estimates or public-source figures. Discord does not publicly disclose Nitro
      subscriber count or ARPU. The ARPU ratio is illustrative based on list prices, not realized
      revenue per paying user. Telegram MAU is from third-party reporting as Telegram does not
      publish audited accounts. KPI values are as of 2024 unless otherwise noted.
    claimRefs:
