  - id: TP003
    title: Pricing / packaging comparison
    columns:
      - Product
      - Price / Unit
      - Contract Model
      - Included Capabilities
      - Discount / Unknown
      - Implication for Discord
    rows:
      - - Discord Nitro
        - $9.99/mo or $99.99/yr
        - Consumer self-serve; single-user subscription
        - Custom emoji, 2 server boosts, HD video, larger uploads, Nitro Rewards perks
        - No disclosed volume discounts; annual plan saves ~17%
        - Low consumer ARPU; pricing is impulse-driven with no enterprise upside at current model
      - - Discord Nitro Basic
        - $2.99/mo
        - Consumer self-serve; single-user subscription
        - Custom emoji, HD avatar, custom profile; no server boosts included
        - No annual option publicly documented
        - Expands payer base at very low ARPU; limited incremental revenue impact per user
      - - Slack Pro
        - $7.25/user/mo (annual billing)
        - Seat-based SaaS; annual contract; per-user
        - Full message history, 10 app integrations, voice/video, screen share
        - Org-size volume discounts available; exact terms not public; monthly billing $8.75/user
        - Slack ARPU per paying seat is ~8-10x Discord Nitro on a per-paying-user basis
      - - Slack Business+
        - $12.50/user/mo (annual billing)
        - Seat-based SaaS; annual enterprise contract
        - SAML SSO, 99.99% SLA, compliance exports, advanced identity management
        - Enterprise volume discounts through Salesforce agreements; terms not public
        - Enterprise lock-in via compliance features; no equivalent Discord offering exists today
      - - Microsoft Teams (Free)
        - Free
        - No contract; free standalone product
        - 60-min meetings, 5 GB storage, unlimited chat and search, basic VoIP calling
        - No discounts needed; free product subsidized within Microsoft cost base
        - Direct free-tier substitute for casual Discord use cases; zero user switching cost
      - - Microsoft Teams via M365
        - Included in M365 ($6-22/user/mo)
        - Enterprise volume licensing; multi-year ELA contracts
        - Full Teams plus Office apps, SharePoint, OneDrive, Exchange, Purview security
        - Volume discounts up to ~20-30% at large enterprise scale; exact ELA terms not public
        - Bundled value makes Teams economically unchallengeable inside existing M365 accounts
      - - Telegram (standard)
        - Free
        - No contract; free for all standard features
        - Unlimited messages, 200K-member groups, bots, channels, large file sharing
        - No paid requirement for core; Telegram Premium ~$4.99/mo for power-user additions
        - Free competitor at ~4.75x Discord MAU scale; threat escalates if voice layer added
    notes: >-
      All prices are list prices from official pricing pages or credible third-party reporting as
      of the report date. Realized enterprise pricing for Teams and Slack through volume contracts
      is not publicly disclosed. The pricing gap between Discord's consumer subscription and
      Slack/Teams per-seat enterprise model is structural and reflects fundamentally different
      GTM motions.
