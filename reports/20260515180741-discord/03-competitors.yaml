  - id: section-P2
    title: Workplace collaboration rivals — Slack and Microsoft Teams
    body: >-
      Slack was founded in 2013 and acquired by Salesforce for $27.7 billion in July 2021. As of
      2024, Slack reported approximately 42 million daily active users and an estimated 79 million
      monthly active users. Revenue reached $1.7 billion in 2023, a 17 percent year-over-year
      increase. More than 750,000 organizations use Slack, including 77 percent of Fortune 100
      companies. Its channel-based architecture is structurally analogous to Discord's server-and-
      channel model, and Slack's Connect feature allows organizations to collaborate across company
      boundaries in a manner similar to Discord's cross-server invitation model.

      Slack's free tier restricts message history to 90 days and limits connected apps to 10. Paid
      tiers start at $7.25 per user per month (Pro, billed annually) and $15 per user per month
      (Business+). Salesforce ownership integrates Slack into the broader enterprise CRM stack,
      giving it a distribution moat Discord cannot match. However, Slack holds only an 18 percent
      share of the business communications software market versus Teams' dominance, suggesting it
      too faces displacement pressure from Microsoft's bundling strategy.

      Microsoft Teams reached 320 million users in 2024 and is the most widely deployed business
      communications platform globally. It is bundled at no incremental cost with Microsoft 365
      Business subscriptions, a distribution advantage that prompted Slack to file an EU antitrust
      complaint. Teams holds approximately 32 percent of the global video conferencing market and is
      used by 93 percent of Fortune 100 companies. Its revenue is reported within Microsoft's broader
      Microsoft 365 commercial segment; analyst estimates place Teams-attributable revenue at
      approximately $8 billion in 2024. Teams' demographic skews heavily toward workers aged 35 and
      above (82 percent), contrasting with Discord's core 18-to-34 audience.

      Neither Slack nor Teams directly threatens Discord's gaming-community base in the near term.
      However, as Discord expands its platform into productivity and creator economy tools, it
      directly enters territory where Slack and Teams are entrenched. Discord's lack of native
      enterprise security features, compliance logging, and IT-managed SSO at scale are structural
      gaps relative to both rivals.
