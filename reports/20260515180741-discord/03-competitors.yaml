  - id: section-2
    title: Direct competitor profiles and scale comparison
    body: >-
      Microsoft Teams is the most strategically significant incumbent. Reported at approximately
      320 million monthly active users as of 2023 by Business of Apps and IDC, Teams is bundled
      inside Microsoft 365 at enterprise seat prices ranging from $6 to $22 per user per month,
      meaning that for the more than 345 million commercial Microsoft 365 subscribers the marginal
      cost of Teams is effectively zero. This distribution advantage is structurally unreplicable
      by a standalone community platform operating on a consumer subscription model. Teams core
      weakness is its meeting-centric product DNA — voice and video are transient rather than
      persistent — which means it does not serve gaming communities, creator fan clubs, or
      long-form community discussion natively. Slack, acquired by Salesforce for approximately
      $27.7 billion in 2021, is the definitive enterprise messaging incumbent. Business of Apps
      and IDC estimate Slack at approximately 18 million daily active users; while far smaller
      than Teams on raw user count, Slack's seat-based pricing generates substantially higher
      revenue per active user than Discord's Nitro. Post-acquisition, Slack is positioned as
      the CRM-adjacent workspace tool, not a gaming or creator platform, which narrows the
      overlap with Discord's communities. Telegram reported approximately 950 million monthly
      active users in 2024 per Business of Apps and data.ai, making it the largest messaging
      platform outside WhatsApp that could plausibly substitute for Discord's group-chat
      functionality. Telegram is free, globally distributed, and has a mature bot ecosystem,
      but lacks Discord's persistent voice channels and community server model. Guilded,
      acquired by Roblox in 2021, targeted gaming community management directly but has not
      achieved critical-mass network effects; Guilded's exact user count following the
      acquisition has not been publicly disclosed, creating a gap that limits competitive
      risk quantification for this niche peer.
