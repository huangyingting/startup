  evidenceGaps:
    - type: no-public-evidence
      severity: major
      topic: Guilded user count and growth trajectory
      missingEvidence: >-
        Roblox has not publicly disclosed Guilded's monthly active users, server count, or growth
        rate since the August 2021 acquisition. Without this data it is impossible to assess whether
        Guilded represents an active competitive threat or a dormant asset within the Roblox portfolio.
      whyItMatters: >-
        If Guilded has meaningful growth among Roblox's 380M registered users, it could be capturing
        the next generation of gaming-community users before they develop Discord habits, undermining
        Discord's network-effect moat at the acquisition funnel.
      diligencePath: >-
        Request Roblox's investor relations team for any Guilded usage disclosures. Monitor Guilded's
        app store ranking and review count as a proxy for active user growth. Compare Discord and Guilded
        server counts in Roblox-adjacent gaming categories.
      relatedQuestionRefs:
        - QP016
      relatedTableRefs:
        - TP001
  
    - type: no-public-evidence
      severity: moderate
      topic: Discord non-gaming MAU share
      missingEvidence: >-
        Discord has not publicly disclosed what percentage of its approximately 259M MAU are
        gaming-primary users versus creator, education, or general-interest users. This breakdown
        is critical for assessing the durability of Discord's community-positioning pivot and the
        revenue opportunity in non-gaming verticals.
      whyItMatters: >-
        Discord's ability to compete with Slack, Telegram, and Reddit in non-gaming verticals
        depends on having a material non-gaming community base. Without public data, the
        post-2021 repositioning from Chat for Gamers cannot be evaluated against actual usage.
      diligencePath: >-
        Request internal Discord segmentation data showing community type (gaming, creator,
        education, professional, other) by server count, MAU, and revenue contribution.
      relatedQuestionRefs:
        - QP021
        - QP022
        - QP024
      relatedTableRefs:
        - TP004
  
    - type: contested-data
      severity: minor
      topic: Discord revenue and valuation estimates post-2021
      missingEvidence: >-
        Multiple analyst aggregation sources (DemandSage, Backlinko, Business of Apps) report
        conflicting Discord revenue estimates ranging from $575M to $725M for the 2023–2025 period.
        No audited revenue figure has been publicly disclosed. The last disclosed valuation is the
        September 2021 Series H at $15B, now over four years old.
      whyItMatters: >-
        Comparing Discord's competitive position against Slack ($1.7B) and Teams (~$8B) requires
        a reliable revenue figure. The 3x-to-14x revenue gap between Discord and its top competitors
        defines the monetization challenge, but the exact gap is uncertain.
      diligencePath: >-
        Request audited or management-reviewed revenue schedules for fiscal 2022, 2023, and 2024.
        Obtain the most recent 409A or board-authorized valuation to replace the 2021 Series H anchor.
      relatedQuestionRefs:
        - QP020
      relatedTableRefs:
        - TP003
  
