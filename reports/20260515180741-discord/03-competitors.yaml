  - id: TP001
    title: Competitor profile table
    columns:
      - Competitor
      - Category
      - Scale / Funding
      - Target Segment
      - Key Differentiation
      - Key Limitation
    rows:
      - - Slack (Salesforce)
        - Direct-incumbent (productivity)
        - Salesforce sub.; ~$27.7B acquisition (2021); ~18M DAU estimated
        - Enterprise and SMB teams; developer communities
        - Deep Salesforce CRM integration; Slack Connect; large app directory
        - No gaming identity; enterprise per-seat pricing excludes consumer use case
      - - Microsoft Teams
        - Direct-incumbent (productivity)
        - Microsoft sub.; ~320M MAU reported (2023); bundled in M365 ($6-22/seat/mo)
        - Enterprise, SMB, education; M365 commercial subscribers
        - Bundled at zero marginal cost; deep Office and Windows integration; Xbox partnership
        - Meeting-centric; no persistent community voice; no gaming-native features
      - - Telegram
        - Adjacent-substitute (consumer messaging)
        - Independent; ~950M MAU (2024); raised ~$1B debt financing (2021)
        - Global consumer messaging; privacy-focused users; large group chats
        - Largest messaging scale outside WhatsApp; free; strong bot ecosystem; 200K-member groups
        - No persistent voice channels; no community server model; privacy reputation questions
      - - WhatsApp (Meta)
        - Adjacent-substitute (consumer messaging)
        - Meta sub.; ~3B MAU; embedded in Meta advertising business
        - Global consumer personal and group messaging
        - Ubiquitous global adoption; E2E encryption; zero user cost
        - No server or community model; not gaming-native; Meta brand scrutiny
      - - Guilded (Roblox)
        - Direct-niche (gaming community)
        - Roblox sub.; acquired August 2021; user count not publicly disclosed post-acquisition
        - Gaming communities; Roblox ecosystem users
        - Rich game-score integration; structured community tools; gaming identity focus
        - Very limited scale vs Discord; no critical-mass network effect; Roblox ecosystem dependency
      - - TeamSpeak / Mumble
        - Substitute-niche (gaming voice)
        - Self-hosted / licensed (TeamSpeak licensing model); estimated declining install base
        - LAN gamers; privacy-focused; low-latency voice use cases
        - Ultra-low latency; fully self-hosted; no third-party data exposure
        - Outdated UX; no community discovery; rapidly declining adoption vs Discord
      - - Reddit
        - Adjacent-substitute (async community)
        - Public company (IPO April 2024); ~$6.5B market cap at IPO; ~73M DAU
        - Asynchronous discussion communities across all topics; link-sharing culture
        - Search-discoverable communities; long-form content; large established user base
        - No real-time voice or text; not persistent in Discord sense; different job-to-be-done
      - - Twitch Chat (Amazon)
        - Adjacent-substitute (live streaming)
        - Amazon sub.; ~35M daily viewers; embedded in Prime Video subscription
        - Live-stream viewing and community chat for gaming and creator content
        - Real-time streaming; Amazon Prime distribution; large gaming creator base
        - Ephemeral chat only; no community persistence outside active streams
      - - Element / Matrix
        - Alternative-federated (open source)
        - Open source; Element.io raised ~$30M Series B; self-hosted by enterprise and government
        - Privacy-first users; enterprises requiring self-hosting; government and regulated sectors
        - Federated protocol; E2E encrypted; self-hosted; no single-vendor lock-in
        - Fragmented ecosystem; poor UX vs Discord; very limited mainstream user base
      - - Steam Chat (Valve)
        - Substitute-gaming (status quo)
        - Valve-owned; embedded in Steam platform (~130M MAU)
        - PC gamers on Steam; casual community via friends list
        - Native Steam integration; in-game overlay; zero friction for existing Steam users
        - Limited to Steam users; minimal community tools; no voice-channel persistence
    notes: >-
      Competitor categories reflect the job-to-be-done overlap with Discord rather than simple product
      similarity. Scale figures are third-party estimates or reported figures where available.
      Guilded's post-acquisition scale is not publicly disclosed. Funding figures reflect last known
      public information and do not represent current capital adequacy assessments.
