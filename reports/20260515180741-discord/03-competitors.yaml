            - label: Full
              tone: positive
              detail: Game-score integration and native Roblox platform ecosystem tie-in
            - label: None
              tone: warning
              detail: No enterprise compliance features; SMB-level access controls at most
            - label: Limited
              tone: warning
              detail: Guilded API exists but developer community is much smaller than Discord
        - label: Element/Matrix
          values:
            - label: None
              tone: neutral
              detail: Matrix protocol supports voice calling but few mainstream clients implement fully
            - label: Partial
              tone: neutral
              detail: Matrix Spaces exist but lack Discord-style community discovery and UX polish
            - label: None
              tone: neutral
              detail: No gaming integrations; designed for privacy-first and enterprise self-hosting
            - label: Partial
              tone: positive
              detail: Self-hosting satisfies some regulated-industry on-premises requirements
            - label: Limited
              tone: neutral
              detail: Matrix spec supports bots and bridges but ecosystem adoption is limited
    approximationNotes: >-
      Cell intensities reflect best-available public product documentation and independent
      competitive reviews. Enterprise compliance for Discord is marked None based on absence
      of documented SSO or audit features in official documentation and Naavik competitive
      analysis. Guilded capabilities are from public product pages; post-acquisition roadmap
      is not publicly disclosed.
    claimRefs:
