        - None -- Teams is org-scoped; no public community or server discovery
        - Partial -- public channels exist but lack Discord-style server role structure
        - Full -- Guilded replicates Discord-style server and role model for gaming
      - - Gaming integrations (console, game-presence, in-game overlay)
        - Full -- PS5 voice, Xbox Game Pass Nitro bundle, rich game presence via API
        - None -- no gaming integrations; Slack is not positioned for gaming communities
        - Partial -- Xbox console integration exists but peripheral to main product focus
        - None -- no gaming integrations; not positioned for gaming use case
        - Full -- game-score integration and Roblox ecosystem native tie-in
      - - Enterprise compliance (SSO, audit logging, DLP, eDiscovery)
        - None -- no disclosed SAML SSO, audit logging, DLP, or eDiscovery offering
        - Full -- SAML SSO, audit logs, DLP, eDiscovery on Business+ and Enterprise tiers
        - Full -- full enterprise compliance suite via Microsoft Purview integration
        - None -- no enterprise compliance features; consumer-grade security model only
        - None -- no enterprise compliance; SMB-level access controls at most
      - - API and bot ecosystem maturity
        - Mature -- 1M+ bot applications; extensive developer documentation and gateway API
        - Mature -- extensive Slack app directory; well-documented API; broad third-party ecosystem
        - Mature -- Teams app store; Graph API; Power Platform and Azure AD integration
        - Mature -- Telegram Bot API widely used; large third-party bot and channel ecosystem
        - Limited -- Guilded API exists but developer community is much smaller than Discord
      - - Free tier scope
