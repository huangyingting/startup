  - id: section-4
    title: Switching costs, lock-in, multi-homing, and distribution
    body: >-
      Discord's switching costs operate at three levels. First, social-graph switching costs:
      a user's friend list, server memberships, persistent channel history, and custom role
      assignments represent real relationship infrastructure. Abandoning Discord means losing
      persistent access to those communities, and the friction of re-inviting an entire
      community to a rival platform is non-trivial for large servers. Second, bot and
      integration switching costs: servers with heavily customized bots for moderation,
      game-score tracking, music playback, and scheduled events carry significant configuration
      investment that cannot be ported to rival platforms without rebuilding. Discord's bot
      ecosystem — estimated at over one million distinct registered applications — is a
      meaningful lock-in mechanism for active community operators who have invested in those
      bots. Third, community identity switching costs: Discord servers often function as the
      canonical home of a brand, creator, or game's community. Migrating to Reddit or Guilded
      means asking an audience to re-follow across platforms, which incurs high friction for
      established servers with thousands of active members. Multi-homing is nonetheless
      common: Naavik's deep-dive and Backlinko data confirm that most Discord gaming
      communities also maintain subreddits for asynchronous discussion, and many streamer
      communities co-exist on Discord and Twitch, reducing Discord's exclusivity without
      eliminating its real-time community advantage. Distribution dynamics favor Teams in
      enterprise and Telegram globally for consumer messaging; Discord's distribution
      strength is concentrated in gaming and creator communities where organic network
      formation and gaming culture are the primary acquisition drivers. PS5 and Xbox
      integrations confirm favorable supply and partner access in the gaming segment, but
      all other integrations face open-market competition from Slack, Teams, and Telegram,
      whose API ecosystems are equally mature for general productivity use cases.
    claimRefs:
