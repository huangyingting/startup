  - id: TP004
    title: Moat durability / competitive risk register
    columns:
      - Moat Claim
      - Competitive Threat
      - Severity
      - Mitigation / Diligence Ask
    rows:
      - - Community social graph (friend lists, server memberships, channel history)
        - Microsoft Teams adding persistent community rooms and extending free consumer access
        - High
        - Quantify share of Discord users also holding Teams/Slack accounts; model defection scenario
      - - Gaming integrations (PS5 voice, Xbox Game Pass Nitro bundle)
        - Guilded/Roblox and native console platforms adding rival community layers directly
        - High
        - Confirm exclusivity or preferred-partner terms of PS5 and Xbox integration contracts
      - - Bot and developer ecosystem (~1M+ applications) creates per-server migration barrier
        - Slack and Telegram bot ecosystems are equally mature for general productivity use cases
        - Medium
        - Measure active bot count trend, developer retention, and API call volume growth annually
      - - Free-to-use model creates low barrier to try and retention without direct monetization
        - Telegram at ~950M MAU offers a free alternative at 4.75x Discord scale
        - High
        - Model scenario where Telegram launches persistent voice channels; assess channel-overlap risk
      - - Brand identity with Gen Z gaming and creator communities
        - Platform pivot to general communities risks diluting gaming identity moat (Wired 2023)
        - Medium
        - Track Gen Z age cohort distribution and brand association surveys quarterly
      - - Strategic independence post-rejection of ~$12B Microsoft acquisition in 2021
        - Discord forfeited a potential strategic distribution partner who competes as a rival
        - Medium
        - Assess current leadership M&A posture, strategic alternatives, and next financing milestones
      - - Server Boost and community investment create per-server lock-in for operators
        - Reddit community co-habitation and multi-homing dilute Discord's community exclusivity
        - Medium
        - 'Quantify multi-homing rate: share of Discord servers with an active parallel Reddit community'
      - - Infrastructure reliability track record (past outages in 2020, 2022)
        - Element/Matrix offers self-hosted federated alternative for reliability-sensitive communities
        - Low
        - Obtain current uptime SLO data, SLA commitments to community operators, and incident reviews
    notes: >-
      Severity ratings (High/Medium/Low) are inferred from competitive scale and structural
      reversibility of each risk relative to Discord's current moat depth. High severity threats
      involve incumbent scale advantages or direct structural substitutes. Mitigation items are
      diligence asks that would resolve severity to a bounded estimate; absent this evidence,
      severity ratings are conservative.
