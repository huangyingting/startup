  evidenceGaps:
    - type: missing-source
      severity: minor
      topic: Guilded user count and scale post-Roblox acquisition
      missingEvidence: >-
        Guilded's active user count, retention rate, and strategic product roadmap following the 2021
        Roblox acquisition have not been publicly disclosed. Only the fact of the acquisition is
        confirmed from official Roblox newsroom coverage; no post-acquisition metrics are public.
      whyItMatters: >-
        Without Guilded's user scale, it is not possible to quantify the gaming-community segment
        displacement risk Guilded poses to Discord. If Guilded has grown materially since 2021, the
        competitive threat in Discord's core gaming niche is higher than currently estimable.
      diligencePath: >-
        Request Roblox investor relations for any Guilded MAU or daily session data in earnings call
        transcripts; monitor Roblox annual reports for Guilded-specific KPI disclosures.
      relatedQuestionRefs:
        - QP008
        - QP024
      relatedTableRefs:
        - TP001
    - type: missing-source
      severity: minor
      topic: Documented multi-homing rate between Discord and competing platforms
      missingEvidence: >-
        No published survey or platform-level data quantifies the share of Discord users or community
        operators who maintain active parallel presences on Reddit, Twitch, or other platforms.
        Multi-homing is asserted qualitatively by Naavik and Backlinko but not numerically evidenced.
      whyItMatters: >-
        High multi-homing rates indicate weaker lock-in and higher substitution risk; low rates
        suggest Discord's community structures are more exclusive and durable than qualitative
        evidence implies.
      diligencePath: >-
        Commission a user survey among Discord server operators asking about parallel community
        platforms; alternatively analyze cross-platform OAuth login patterns if accessible.
      relatedQuestionRefs:
        - QP015
    - type: private-evidence-only
      severity: minor
      topic: Enterprise volume discount terms for Microsoft Teams and Slack contracts
      missingEvidence: >-
        Microsoft Teams volume discount schedules through enterprise agreements and Slack enterprise
        pricing through Salesforce sales channels are not publicly disclosed. Only list prices are
        known; realized pricing for large enterprise buyers may be significantly lower than list.
      whyItMatters: >-
        If enterprise pricing for Teams and Slack is substantially below list — common in large ELA
        deals — the effective pricing advantage they hold over Discord's model is even larger than
        the list-price comparison suggests, further constraining Discord's enterprise expansion path.
      diligencePath: >-
        Review enterprise agreement tender records or IT procurement benchmarking databases; obtain
        a sample enterprise contract from a reference customer willing to disclose pricing terms.
      relatedQuestionRefs:
        - QP023
      relatedTableRefs:
        - TP003
