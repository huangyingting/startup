        - Salesforce 子公司；2021 年收购价约 $27.7B；估计约 18M DAU
        - 企业和 SMB 团队；开发者社区
        - 深度集成 Salesforce CRM；Slack Connect；大型应用目录
        - 没有游戏身份；企业按席位定价排除了消费者用例
      - - Microsoft Teams
        - 直接在位者（生产力）
        - Microsoft 子公司；据报道约 320M MAU（2023）；捆绑在 M365（$6-22/席位/月）
        - 企业、SMB、教育；M365 商业订阅用户
        - 零边际成本捆绑；深度集成 Office 和 Windows；Xbox 合作
        - 以会议为中心；没有持久在线社区语音；没有游戏原生功能
      - - Telegram
        - 相邻替代（消费者消息）
        - 独立；约 950M MAU（2024）；2021 年筹集约 $1B 债务融资
        - 全球消费者消息；重视隐私的用户；大型群聊
        - WhatsApp 之外最大消息规模；免费；机器人生态强；20 万人群组
        - 没有持久在线语音频道；没有社区服务器模型；隐私声誉存在疑问
      - - WhatsApp (Meta)
        - 相邻替代（消费者消息）
        - Meta 子公司；约 3B MAU；嵌入 Meta 广告业务
        - 全球消费者个人和群组消息
        - 全球普及率极高；端到端加密；用户零成本
        - 没有服务器或社区模型；非游戏原生；Meta 品牌受审视
      - - Guilded (Roblox)
        - 直接利基（游戏社区）
        - Roblox 子公司；2021 年 8 月收购；收购后用户数未公开披露
        - 游戏社区；Roblox 生态用户
        - 深度游戏分数集成；结构化社区工具；聚焦游戏身份
        - 相对 Discord 规模很小；没有临界规模网络效应；依赖 Roblox 生态
      - - TeamSpeak / Mumble
        - 利基替代（游戏语音）
        - 自托管 / 授权（TeamSpeak 授权模式）；估计安装基数下滑
