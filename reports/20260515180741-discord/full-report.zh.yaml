    type: pyramid
    layout: standard
    summary: Discord 的 TAM 栈从庞大的社交媒体背景出发，下沉到游戏和创作者经济层，再到相对狭窄的在线社区管理可服务市场，最后落到 Discord 已实现收入区间。
