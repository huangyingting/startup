  - id: TI001
    title: Discord 收入流
    notes: >-
      所有收入估计均来自第三方聚合数据或分析师估算；Discord 不披露分部收入。标价不等于实际收入，因为本地化定价、折扣和档位组合都会影响实现收入。开发者平台费率按行业常见的 10–30% 估计，Discord
      未确认。Quests 广告收入仍处早期，未单独披露。
    enumerationScope:
      coverage: partial
      basis: >-
        Five identified revenue streams from official product pages and third-party analyst estimates; excludes any
        undisclosed enterprise or partnership revenue.
    columns:
      - 收入流
      - 机制
      - 单位 / 定价
      - 估算收入占比（2023）
      - 收入质量
      - 关键尽调问题
    rows:
      - - Nitro Full
        - 面向消费者的月度或年度订阅；解锁 HD 直播、500MB 上传、动态头像、Boosts、Xbox Game Pass
        - $9.99/mo 或 $99.99/yr
        - 占总收入 ~55–65%（估计）
        - 经常性、高毛利；取消订阅后流失
        - 确认订阅用户数、月流失率、本地化定价影响
      - - Nitro Basic
        - 较低档月度或年度订阅；自定义表情、50MB 上传
        - $2.99/mo 或 $29.99/yr
        - 占总收入 ~10–15%（估计）
        - 经常性；ARPU 更低，但对 Nitro Full 构成增量
        - Basic 与 Full 的档位组合；升级 / 降级率
      - - Server Boosts
        - 用户按 boost 支付月费，升级社区服务器权益；Nitro 含 2 个 boost，额外 boost 每个每月约 $4.99
