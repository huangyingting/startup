          label: 正向体验 → 分享
        - from: n6
          to: n2
          label: 病毒循环：新用户加入
        - from: n5
          to: n7
          label: 触达 animated emote / 上传限制
        - from: n7
          to: n8
          label: 转化为 Nitro
        - from: n7
          to: n9
          label: 留在免费层
        - from: n9
          to: n10
          label: 参与度下降 → 流失
  - id: FE003
    title: 关键依赖图
    type: dag
    layout: wide
    summary: >-
      Discord 的运营连续性依赖一张关键基础设施和平台依赖网络。Google Cloud Platform 和 Cloudflare 是基础设施层风险最高的两个单点故障；ScyllaDB 和 Elixir/Erlang
      gateway 则是关键内部技术依赖。开发者生态对 discord.js 和 Activities SDK 的依赖，为第三方开发者形成间接锁定。
    data:
      nodes:
        - id: d1
          label: Discord Platform
          type: product
        - id: d2
          label: Google Cloud Platform（云平台）
          type: infrastructure
        - id: d3
          label: Cloudflare
          type: infrastructure
        - id: d4
          label: Elixir/Erlang WebSocket Gateway
          type: technology
        - id: d5
          label: ScyllaDB（消息存储）
          type: technology
        - id: d6
          label: Go Microservices
          type: technology
        - id: d7
          label: Rust Components
          type: technology
        - id: d8
          label: Discord Developer API
          type: platform
        - id: d9
          label: discord.js / discord.py（社区库）
          type: ecosystem
        - id: d10
          label: 第三方 bot（1M+）
          type: ecosystem
        - id: d11
          label: Electron（Desktop）
          type: technology
        - id: d12
          label: React Native（Mobile）
          type: technology
      edges:
        - from: d1
          to: d2
          label: 托管于（主云）
        - from: d1
          to: d3
          label: 通过其提供 CDN / DDoS 防护
        - from: d1
          to: d4
          label: 实时消息通过
        - from: d4
          to: d5
          label: 消息持久化到
        - from: d4
          to: d6
          label: 将业务逻辑委派给
        - from: d6
          to: d5
          label: 读写消息元数据
        - from: d6
          to: d7
          label: 性能路径由其处理
        - from: d1
          to: d8
          label: 暴露开发者 API
        - from: d8
          to: d9
          label: 客户端库构建于
        - from: d9
          to: d10
          label: bot 使用其开发
        - from: d1
          to: d11
          label: Desktop 由其封装
        - from: d1
          to: d12
          label: Mobile 由其驱动
  - id: FE004
    title: 产品成熟度 / 能力图
    type: matrix
    layout: wide
    summary: 产品成熟度图从四个维度评估 Discord 六条核心产品线：成熟度、竞争位置、收入贡献和尽调风险。语音频道和文字频道代表成熟、可防守的核心；Activities 和 Quests 则是风险最高、上行空间也最高的增长项目。
    data:
      columns:
        - 成熟度
        - 竞争位置
        - 收入贡献
        - 尽调风险
      rows:
        - label: 语音频道
          values:
            - label: GA / 成熟
              tone: positive
              detail: 自上线以来一直交付；峰值 2.5B min/month；基础设施经受过实战考验
            - label: 强 / 差异化
              tone: positive
              detail: 低延迟 OPUS 音频；深度游戏整合；没有可信直接替代品
            - label: 间接（Nitro 驱动）
              tone: neutral
              detail: 驱动 Nitro 转化和留存；不是作为独立功能直接变现
            - label: 低
              tone: positive
              detail: 基础设施成本风险已管理；语音本身没有重大专项监管敞口
        - label: 文字频道
          values:
            - label: GA / 成熟
              tone: positive
              detail: 自创立以来的核心功能；富格式、threads、forums、文件分享
            - label: 强 / 商品化
              tone: neutral
              detail: 与 Slack 和 Teams 功能平价；差异化来自社区模型，而非企业工作流
            - label: 间接（Nitro 驱动）
              tone: neutral
              detail: 支撑社区形成并带动 Nitro；存在搜索增购机会
            - label: 低
              tone: positive
              detail: 成熟、稳定的功能；规模化内容审核仍是持续挑战
        - label: Discord Activities
          values:
            - label: 增长 / 早期 GA
              tone: neutral
              detail: 2022–2023 推出；SDK 向开发者开放；游戏库在增长
            - label: 新兴 / 先发
              tone: positive
              detail: 竞争通信平台没有可比的嵌入式游戏层
            - label: 早期 / 未验证
              tone: warning
              detail: 收入模型未公开披露；Activities SDK 变现仍处萌芽
            - label: 中
              tone: warning
              detail: 开发者采用速度、变现模型和工作室兴趣尚未公开确认
        - label: Nitro 订阅
          values:
            - label: GA / 成熟
              tone: positive
              detail: 多层订阅（$4.99 Basic、$9.99 Nitro）；长期收入产品
            - label: 中等 / 可防守
              tone: neutral
              detail: 订阅权益绑定 Discord 专属功能；可替代性有限
            - label: 主要直接收入
              tone: positive
              detail: 最大的已披露收入驱动；转化和 churn 未公开报告
            - label: 低-中
              tone: neutral
              detail: 转化率和 churn 未披露；订阅存在收入集中风险
        - label: 开发者 API / Bot
          values:
            - label: GA / 成熟
              tone: positive
              detail: 1M+ bot；REST + Gateway API 完整；版本化 API surface 稳定
            - label: 主导 / 生态锁定
              tone: positive
              detail: discord.js 每周下载 1M+；拥有通信平台中最大的 bot 生态
            - label: 间接（生态护城河）
              tone: neutral
              detail: API 通过 bot 驱动参与度，带动 Nitro 转化；不直接变现
            - label: 低
              tone: positive
              detail: API 文档完善；bot 生态创造切换成本；API 稳定性得到维护
        - label: Quests（广告）
          values:
            - label: 早期 / 增长中
              tone: neutral
              detail: 活跃产品；面向游戏工作室和品牌的效果广告
            - label: 早期 / 小众
              tone: neutral
              detail: 限于游戏 / 品牌广告主；无公开规模基准
            - label: 新兴收入流
              tone: neutral
              detail: 代表 Discord 向订阅之外推进；收入贡献未披露
            - label: 中-高
              tone: warning
              detail: 半审核服务器环境存在品牌安全风险；早期广告主采用未确认
  - id: FU001
    title: 客户旅程图
    type: journey-map
    layout: wide
    summary: >-
      典型 Discord 用户旅程始于通过游戏或社交网络自然发现，随后创建账户并加入第一个服务器，再通过功能探索和社区参与加深，最终可能转化为 Nitro 或创建服务器。关键摩擦点出现在 onboarding（非技术用户会觉得 UI
      复杂）以及免费转付费时刻——许多用户认为 Nitro 价值主张不够强。
    data:
      nodes:
        - id: n1
          label: 发现（自然 / 口碑 / 游戏整合）
          detail: 用户通过游戏 lobby、朋友推荐、游戏发行方整合提示（如 PS5 notification、Xbox dashboard），或关于某款游戏 / 社区的社交媒体内容发现 Discord
        - id: n2
          label: 账户创建和 onboarding
          detail: 用户通过邮箱或手机创建账户；onboarding 有意做轻，但不了解服务器和频道模型的非技术用户可能会被复杂度压住
        - id: n3
          label: 加入第一个服务器（朋友邀请或游戏整合）
          detail: 用户通过朋友邀请链接、游戏发行方官方服务器提示，或 Discord 发现浏览器加入；第一个服务器体验强烈预测短期留存
        - id: n4
          label: 功能探索（语音、文字、reaction、bot）
          detail: 用户使用语音频道、文字聊天、reaction role 和第三方 bot；功能参与广度与更高长期留存和 Nitro 转化相关
        - id: n5
          label: 社区加深（加入更多服务器、boost、评估 Nitro）
          detail: power user 围绕不同兴趣加入多个服务器，boost 喜欢的服务器，并为了 animated avatars、更大上传和跨服务器 boost 评估 Nitro 订阅
        - id: n6
          label: power user 和倡导者（创建自己的服务器、招募成员）
          detail: 最高价值 cohort：创建并管理自己的服务器，招募社区成员，持续投入 Nitro 和 server boost；既是主要平台倡导者，也是自然获客驱动
  - id: FU002
    title: 采用 / 部署漏斗
    type: flow
    layout: standard
    summary: >-
      Discord 采用漏斗从估算 600–700 M 注册用户急剧收窄到约 5–8 M Nitro 订阅者，体现出 freemium
      典型转化动态。每个漏斗阶段都有明显流失，也给产品投入改善变现转化留下机会。参与深度——以服务器参与和功能使用衡量——是关键中间转化信号。
    data:
      nodes:
        - id: n1
          label: 注册用户（~600–700 M）
        - id: n2
          label: 月活跃用户（~150–200 M）
        - id: n3
          label: 日活跃用户（~90 M）
        - id: n4
          label: 深度参与社区成员（server booster、活跃成员）
        - id: n5
          label: Nitro 付费订阅者（~5–8 M）
      edges:
        - from: n1
          to: n2
          label: MAU 转化（约注册用户的 ~25%）
        - from: n2
          to: n3
          label: DAU 转化（约 MAU 的 ~50%）
        - from: n3
          to: n4
          label: 深度参与转化（估算为 DAU 的 ~20–30%）
        - from: n4
          to: n5
          label: Nitro 转化（估算为深度参与用户的 ~15–25%）
  - id: FU003
    title: 客户证明矩阵
    type: matrix
    layout: wide
    summary: >-
      客户证明矩阵从四个维度评估五个主要客户分部：证据类型、结果具体性、留存可见度和生产成熟度。游戏社区和关键品牌合作伙伴（PlayStation、Xbox）在证据质量和生产成熟度上得分最高；创作者、学术和 Web3
      分部的正式证据较弱，留存可见度也更低。
    data:
      columns:
        - 证据类型
        - 结果具体性
        - 留存可见度
        - 生产成熟度
      rows:
        - label: 游戏社区（Minecraft / Roblox / Valorant）
          values:
            - label: 深度主机和游戏整合；已验证服务器
              tone: positive
              detail: 多个游戏发行方具备 PS5/Xbox OS 整合，并拥有官方已验证服务器，成员数以百万计
            - label: 高 — 成员数公开可见；整合由发行方确认
              tone: positive
              detail: 服务器成员数可观察；整合由发行方新闻稿和科技媒体确认
            - label: 高 — 默认服务器成员身份持续，带来结构性粘性
              tone: positive
              detail: 服务器成员身份默认保留；游戏活动强化每日回访行为
            - label: 生产化 — 自平台上线以来已规模部署
              tone: positive
              detail: 核心使用场景和主要收入驱动；自 Discord 2015 上线以来已全面生产化
        - label: Sony PlayStation
          values:
            - label: OS 级整合和官方已验证服务器
              tone: positive
              detail: PS5 主机整合属于平台层；新闻稿确认官方服务器成员 1M+
            - label: 高 — 披露 1M+ 成员数；PS5 整合由 Sony 和 Discord 确认
              tone: positive
              detail: Sony 和 Discord 联合公告确认整合深度和成员里程碑
            - label: 中 — 主机整合驱动回访，但未披露订阅者 churn
              tone: neutral
              detail: 通过主机 OS 形成结构性留存；未公开披露 churn、NRR 或参与数据
            - label: 生产化 — 嵌入 PS5 OS 软件
              tone: positive
              detail: 整合随 PS5 系统软件更新交付；IGN、The Verge 和 Polygon 广泛报道
        - label: Microsoft Xbox（Game Pass 捆绑）
          values:
            - label: 正式订阅捆绑合作
              tone: positive
              detail: Nitro 包含在 Xbox Game Pass Ultimate 中；Microsoft Xbox 和 Discord 均确认
            - label: 中 — 合作公开；未披露捆绑带来的激活率和 Nitro 使用
              tone: neutral
              detail: 已确认捆绑存在；没有数据说明捆绑领取者有多少激活或留存 Nitro
            - label: 低 — 未披露捆绑 cohort 的 churn 和 Nitro 留存
              tone: warning
              detail: 捆绑可能抬高 Nitro 指标，但不反映真正由产品驱动的忠诚度或付费意愿
            - label: 生产化 — 截至 2023，活跃合作已运营
              tone: positive
              detail: 根据 Xbox News September 2023，合作确认运营；公开沟通显示仍在持续
        - label: 创作者和流媒体社区
          values:
            - label: 自然采用；没有规模化正式合作计划
              tone: neutral
              detail: 创作者独立采用 Discord；未确认 Discord 存在规模化正式创作者合作计划
            - label: 低 — 服务器规模差异很大；没有聚合结果数据
              tone: warning
              detail: Discord 未汇总单个创作者服务器规模；证据多为轶事和自报
            - label: 中 — 创作者忠诚度不一；存在迁移到 Patreon 和 Substack 的风险
              tone: neutral
              detail: 部分创作者已将社区迁移到竞争平台；没有可用的平台级留存数据
            - label: 生产化 — 流媒体社区已广泛采用，成为既定规范
              tone: positive
              detail: Twitch 和 YouTube 创作者经常在频道资料中链接 Discord 服务器；这是成熟的社区实践
        - label: 学习和学术社区
          values:
            - label: 自然采用；没有机构或教育背书
              tone: neutral
              detail: 没有大学或教育机构正式背书 Discord；采用完全由学生驱动
            - label: 低 — 没有可衡量的学术结果数据或规模指标
              tone: warning
              detail: Discord 的学术使用证据偏轶事；没有关于规模或教育效果的同行评议或机构数据
            - label: 低 — 学期和学年节点存在季节性 churn
              tone: warning
              detail: 学术社区可能在学期结束和毕业时流失；没有可用的 cohort 留存数据
            - label: 生产化 — 实践中广泛使用，但缺乏结构
              tone: neutral
              detail: 学生广泛使用已有充分轶事记录；但使用无结构，也没有 Discord 正式支持或功能
  - id: FU004
    title: 留存 / 重复 cohort
    type: cohort
    layout: wide
    summary: >-
      该图估算三个 Discord 用户分部在 24 个月内的留存 cohort。所有数字都是分析师估算；Discord 不发布 cohort
      留存数据。游戏社区服务器因结构性网络效应和游戏驱动的每日回访行为，估算长期留存最强。Nitro 订阅者 cohort 估算下滑最陡，反映可选消费订阅的动态。
    data:
      columns:
        - 第 1 个月
        - 第 3 个月
        - 第 6 个月
        - 第 12 个月
        - 第 24 个月
      rows:
        - label: Nitro 订阅者（估算）
          values:
            - 100
            - 80
            - 68
            - 55
            - 42
        - label: 活跃服务器成员（估算）
          values:
            - 100
            - 75
            - 62
            - 50
            - 38
        - label: 游戏社区服务器（估算）
          values:
            - 100
            - 85
            - 72
            - 61
            - 50
  - id: FR001
    title: 风险热力图
    type: matrix
    layout: wide
    summary: >-
      热力图把九个 Discord 关键风险映射到发生概率（低 / 中 / 高）和严重度（中 / 高 / 严重）两个维度。DSA 不合规和内容审核失效位于严重级别。GCP 故障和 CSAM 复发处于高后果位置。领导层交接和 App
      Store 费率压力为中等严重度。
    data:
      columns:
        - 发生概率：低
        - 发生概率：中
        - 发生概率：高
      rows:
        - label: 严重度：严重
          values:
            - label: CSAM 复发
              tone: warning
              detail: FTC 和解后，考虑到平台规模和化名环境，CSAM 敞口仍在；持续 NCMEC 报告义务和过往 FTC 历史使其发生概率为中。
            - label: DSA 不合规罚款
              tone: critical
              detail: VLOP 指定可能适用；若未履行合规义务，罚款敞口可达全球收入 6%；截至报告生成日，正式指定状态未确认。
            - label: 规模化内容审核失效
              tone: critical
              detail: 2B messages/day 下，AI 规避尝试发生概率高；对抗性 CSAM 和极端主义内容在平台规模上跑得比检测更快。
        - label: 严重度：高
          values:
            - label: 数据泄露
              tone: warning
              detail: API 攻击面和 1M+ bot 使发生概率为中；GDPR/CCPA 通知义务会叠加监管敞口。
            - label: GCP 基础设施中断
              tone: critical
              detail: 按 GCP 可靠性历史，发生概率为中；若持续，影响严重；未披露多云故障切换架构。
            - label: Bot 和 API 滥用
              tone: warning
              detail: 1M+ 注册 bot 使发生概率高；对社区信任和平台质量指标的影响为中高严重度。
        - label: 严重度：中
          values:
            - label: CCPA 集体诉讼
              tone: neutral
              detail: 考虑到既有隐私计划，且截至目前未披露 California AG 执法，重大行动发生概率低。
            - label: CEO 交接执行落空
              tone: warning
              detail: 裁员与新领导层同时发生，使发生概率为中；对近期产品路线图交付的严重度为中。
            - label: App Store 费率提高
              tone: warning
              detail: Apple 和 Google 持续调整平台政策，发生概率中高；会给移动端 Nitro 收入带来结构性利润率压力。
  - id: FR002
    title: 风险传导图
    type: dag
    layout: wide
    summary: 有向图展示 Discord 主要风险事件如何经由中间后果，传导到下游业务影响。监管执法、CSAM 事件、基础设施故障和领导层扰动，各自通过不同路径传导到收入损失和用户流失。
    data:
      nodes:
        - id: r1
          label: 监管执法（FTC / DSA）
          type: risk
        - id: r2
          label: CSAM / 儿童安全违规
          type: risk
        - id: r3
          label: GCP 基础设施故障
          type: risk
        - id: r4
          label: 合规成本增加
          type: consequence
        - id: r5
          label: 收入和利润率压缩
          type: consequence
        - id: r6
          label: 声誉损害
          type: consequence
        - id: r7
          label: 领导层和人才扰动
          type: risk
        - id: r8
          label: 工程速度下降
          type: consequence
        - id: r9
          label: 产品功能延迟
          type: consequence
        - id: r10
          label: 用户流失
          type: impact
        - id: r11
          label: App Store 费率压力
