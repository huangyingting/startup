      - number: '6.5'
        title: 图表与证据
        blocks:
          - type: callout
            title: 游戏集中度既是 Discord 的核心优势，也是最重大的战略风险
            body: >-
              Discord 约 90% 的日活用户是游戏玩家，平台最深的产品集成、最大社区和最有说服力的品牌证明都来自游戏。这一集中度推动了异常强的增长和参与度指标，但也让 Discord 暴露于周期性风险：PC
              游戏参与度结构性下滑、主要发行商转向其他平台，或出现原生游戏社交竞品，都可能迅速侵蚀核心用户基础。投资者应把非游戏分层增长速度作为主要多元化信号。
