            body: >-
              CNBC 和 The Verge 均在 2021 年 4 月报道，Discord 拒绝了 Microsoft 据称价值约 $12 billion 的收购要约。Discord
              选择保持独立，保住了自主权，也支持更广泛的社区战略；但该选择也失去了一个潜在战略分发伙伴，而后者如今通过 Teams 和 Xbox 生态成为竞争者。长期含义是，Discord 必须在没有 Microsoft
