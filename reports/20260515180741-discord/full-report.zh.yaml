      - number: '4.3'
        title: 单位经济：转化、ARPU 和变现效率
        blocks:
          - type: paragraph
            body: >-
              Discord 没有公开披露单位经济，只能从用户指标和收入估计的关系中交叉推导。平台 2025 年月活跃用户约 259 million，而 2023 年总收入接近 $575 million。这意味着全体 MAU
              的混合 ARPU 约为每用户每年 $2.22——这个数字反映了免费层优先平台的低变现率，多数用户从未升级到付费产品。

              如果把分母换成付费用户，图景会明显不同。假设 Discord 付费订户基础（主要是 Nitro）约 5–8 million 用户——这个区间与移动应用收入数据一致：应用内购买每季度约 $55 million，按
              $100/year 平均值推算，每季度约 550,000 个 Nitro 转化——则付费用户实际 ARPU 约为每年 $72–$115，与 $99.99 年度 Nitro 标价相符，并已考虑本地化定价和
              Nitro Basic 订户影响。

              Discord 付费转化率估计约为 MAU 的 2–3%，按消费订阅基准看偏低，但符合免费增值通信平台特征。Spotify 作为拥有同样庞大免费用户基础的可比公司，历史上全球付费转化率约
              26–28%；Discord 的游戏和社区人群更年轻、价格敏感度更高，因此差距在结构上可以预期。付费转化率只要提高一个百分点，就会增加约 2.5 million 名付费订户和约 $250 million
              年订阅收入——这让转化优化成为 Discord 财务模型中最大的短期杠杆。

              CAC 和 LTV 数据完全未披露。Discord 的有机网络效应分发意味着，显性付费获客成本相对 SaaS 同业可能不高，但 LTV 与 CAC 的确切比率无法从公开来源确认。Server Boost
              附着率、开发者订阅 GMV 和 Quests 广告 ROAS 均未公开。它们构成潜在投资者或收购方最重要的单位经济缺口。
