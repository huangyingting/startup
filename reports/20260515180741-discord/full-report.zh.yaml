        - Sakhnini 任内 12-month KPI 节奏：MAU 增长、Quests 广告收入、Nitro ARPU 改善
      - - 竞争定位
        - Discord 是默认游戏聊天基础设施；同等规模没有直接竞争者
        - Twitch chat、YouTube Live 和游戏内语音威胁参与度；Teams 在社区场景形成价格压力
