  - id: TI003
    title: Discord 单位经济估算
    notes: 除 Nitro 标价外，所有指标均根据第三方收入聚合数据与用户数数据之间的关系估计或推断。Discord 未披露任何官方单位经济指标。CAC 和 LTV 无法从公开来源获得。付费转化率由移动端 IAP 数据三角估算，未获确认。
    columns:
      - 指标
      - 估计值
      - 置信度
      - 重要性
      - 尽调问题
    rows:
