      - number: '7.2'
        title: 运营、安全与质量风险
        blocks:
          - type: paragraph
            body: >-
              Discord 的运营风险画像来自实时通信平台的规模挑战：服务 90M+ 日活用户，每天处理约 2 billion 条消息。平台在计算、存储和网络上近乎完全依赖 Google Cloud Platform，意味着
              GCP 重大区域或全球故障会直接转化为 Discord 全平台宕机；Discord 未公开披露多云或非 GCP 故障切换架构。2022 和 2023 年，Discord
              多次发生重大宕机，影响数百万并发用户，损害了依赖 Discord 进行实时协同游戏的游戏社区信任。Cloudflare 提供 CDN 和 DDoS 防护，但这又形成第二个关键单一供应商依赖：Cloudflare
              服务中断会让 Discord 的网络边缘失去保护。Discord 的 API 生态拥有 1M+
              注册机器人，每个机器人都可能成为凭证盗取、服务器冲击攻击和垃圾信息活动的攻击向量，网络安全风险因此被放大。Discord 集中存储用户消息、语音元数据和行为信号，进一步放大数据泄露风险；GDPR 和 CCPA
              下的数据泄露通知义务会立即触发监管和公众审视。每天 2 billion 条消息的内容审核规模已经超出人工复核能力；AI 辅助审核会带来误杀和漏判风险，对抗性的 CSAM
              传播者也会持续演进规避技术。语音和视频基础设施还带来编解码器授权、区域延迟以及持续负载下实时媒体质量下降等额外风险。Discord 未公开披露正式安全
              SLA、漏洞赏金计划范围或完整泄露历史，限制了外部对剩余安全风险的独立评估。
