      - number: '2.2'
        title: 规模测算视角、TAM/SAM/SOM 和相互矛盾的分析师估计
        blocks:
          - type: paragraph
            body: >-
              没有单一 TAM 数字能完整概括 Discord 的机会，因此我们用四个视角交叉验证。第一是在线社区管理平台市场：Grand View 估算该市场 2022 年为 $1.18B，2030 年增至
              $3.61B，CAGR 为 12.8%；Allied Market Research 和 Verified Market Research 给出类似轨迹，Mordor Intelligence
              的团队协作口径则把更广义协作软件市场估至 2030 年约 $25B。第二是游戏市场本身：Newzoo 2024 Global Games Market Report 将 2024 年全球游戏收入定在约
              $187B，并预计 2026 年超过 $200B，移动和 PC 贡献大部分收入。第三是消费者社交和消息通信：Statista 预计 2027 年全球社交媒体用户达
              5.85B，日均消息量达到数万亿条；eMarketer 的社交社区展望跟踪群组型使用。第四是创作者经济：Goldman Sachs 估算当前规模为 $250B，2027 年增至 $480B；Forbes 和
              Influencer Marketing Hub 则给出 $250-500B 区间，方法差异很大。

              提出四个视角的关键在于，Discord 实际可服务市场（SAM）远小于这些标题数字。Backlinko 的 $725M 和 Reuters 的 $600M 收入估计意味着，Discord 约占全球游戏市场
              0.3-0.5%，并约占在线社区管理平台市场 20-50%，具体取决于边界划定有多严格。Grand View、Allied、Verified 和 Market Research Future
              对同一在线社区类别给出的估计彼此冲突——类似 2030 年预测从 $1.1B 到 $3.6B 不等——反映方法论差异，应该保留为区间，而不是压成单点估计。
