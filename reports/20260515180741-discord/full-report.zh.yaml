        - Amazon 子公司；约 35M 日活观看者；嵌入 Prime Video 订阅
        - 面向游戏和创作者内容的直播观看与社区聊天
        - 实时流媒体；Amazon Prime 分发；大型游戏创作者基础
        - 只有临时聊天；活跃直播之外没有社区持久性
      - - Element / Matrix
        - 联邦式替代（开源）
        - 开源；Element.io 筹集约 $30M Series B；企业和政府自托管
