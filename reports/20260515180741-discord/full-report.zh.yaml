      - number: '7.4'
        title: 人才、执行与缓释
        blocks:
          - type: paragraph
            body: >-
              自 2024 年 1 月以来，Discord 的人才和执行风险显著上升。裁员约 170 人、占员工总数 17%，减少了工程、产品和运营岗位。随后 2025 年 CEO 交接，Jason Citron
              退任、Humam Sakhnini 接任，在关键节点制造了双层领导断点。Discord 必须同时执行盈利路线图、准备潜在 IPO、落地包括 DSA
              和英国《在线安全法》在内的新监管合规框架，并维持产品改进的工程速度。CTO Stanislav Vishnevskiy 是联合创始人，自创立以来一直任职；CEO
              交接后他是否继续留任尚未公开确认。考虑到他深度掌握核心平台架构，其离职将构成重大技术领导缺口。裁员后资深工程师自愿流失，是公开员工数披露捕捉不到的次级风险。Discord 通往盈利需要持续产品执行，以增长
              Nitro、服务器订阅和开发者平台收入；人才缺口、士气下滑或新管理层战略方向错配造成的执行短板，会直接威胁收入增长逻辑。IPO
              准备还引入进一步执行风险：公开发行所需的财务、法务和治理基础设施需要大规模建设，尤其是在必须披露并管理监管合规义务的上市公司语境下。缓释与止损标准表（TR005）把可执行阈值制度化，用于在尽调和投资持有期间监控这些风险。
