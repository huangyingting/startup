      - - 品牌 / 官方服务器
        - 品牌方运营（免费）；粉丝是用户
        - 社区管理、粉丝互动、产品公告
        - 数十个已认证超大服务器，各有 1M+ 成员
        - 强背书信号；与发行商联合营销
