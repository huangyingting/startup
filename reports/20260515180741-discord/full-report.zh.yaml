        - 约 $2.22/user/year（$575M ÷ 259M）
        - 低 — 需要收入和 MAU 估计同时准确
        - 衡量整体商业化密度；对免费增值平台来说可比偏低
        - 同一期间确认的 MAU 和总收入
      - - 估算 Nitro 订阅用户（2023）
        - ~5–8 million（MAU 的 2–3%）
        - 低 — 根据季度移动端 IAP 数据推断
        - 决定收入集中风险；付费基数小既是风险也是机会
        - 官方 Nitro 订阅用户数；档位拆分（Basic vs. Full）
      - - ARPU — 仅付费订阅用户（2023）
        - ~$72–$115/year（Nitro + Boost 综合）
        - 低 — 三角估算
        - 反映定价权；与 $99.99 年付 Nitro 经本地化调整后的水平一致
        - 披露每位付费用户的平均合约价值
      - - 付费转化率（MAU 转付费）
        - 占 MAU ~2–3%（估计）
        - 低 — 推断值；未披露
        - 收入增长的最大杠杆；提升 1pp ≈ +$250M ARR
        - 按用户队列确认转化率；免费增值转付费漏斗数据
      - - 客户获取成本（CAC）
        - 未披露（因自然 / 口碑增长，可能较低）
        - 不可得
        - 决定订阅用户获取投入的回本周期
        - 按渠道划分的综合 CAC；付费 vs. 自然拆分
      - - 订阅用户生命周期价值（LTV）
        - 未披露
        - 不可得
        - LTV:CAC 比率是评估资本效率的关键
        - 平均订阅留存期；按档位和用户队列划分的流失率
      - - 毛利率（估计）
        - ~50–65%（估计；无披露）
        - 低 — 根据基础设施成本基准和收入组合推断
