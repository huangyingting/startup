        - 直接收入低；若学生转化为 Nitro，长期 LTV 有价值
        - 当前变现低；高度依赖免费层
      - - 技术 / 开发者社区
        - 开发者是用户
        - 开源项目协作、产品支持、开发者关系
        - 规模可观；覆盖 GitHub 项目、编程训练营、黑客论坛
        - 开发者关系价值；技术生态品牌信号
        - 直接变现低；成熟用户倾向绕开付费功能
