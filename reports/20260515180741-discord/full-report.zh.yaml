        - 60 分钟会议、5 GB 存储、无限聊天和搜索、基础 VoIP 通话
        - 无需折扣；免费产品由 Microsoft 成本基础补贴
        - 休闲 Discord 用例的直接免费替代；用户切换成本为零
      - - Microsoft Teams 通过 M365 捆绑
