      - number: '3.3'
        title: 功能、定价和 GTM 对比
        blocks:
          - type: paragraph
            body: >-
              实时文字聊天的功能同质性最高，Slack、Teams、Telegram 和 Guilded 都能匹配 Discord。Discord 的结构性差异在于持续语音频道（无需排期会议、常开的房间）、社区 server
              模式（具备基于角色的访问和审核工具的公私有 servers），以及游戏集成（PS5 语音、通过 Nitro Rewards 接入 Xbox Game Pass、丰富的游戏状态 API）。Slack 和 Teams
              在企业合规功能上达到或超过 Discord——SAML SSO、审计日志、数据泄露防护和 eDiscovery——这些类别 Discord
              没有公开记录的产品，因此大多数受监管组织无法走企业采购。定价结构差异明显。Slack 年付入门价为每用户每月 $7.25，Teams 包含在 Microsoft 365 中，每席位 $6 至
              $22；这类按用户收费模型产生的 ARPU 显著高于 Discord 面向消费者的 Nitro（每个用户每月 $9.99，不随 server 规模变化）。Telegram 和 WhatsApp
              对终端用户免费，这意味着 Discord 必须完全靠游戏权益和社区功能来证明 Nitro 溢价，而不能靠核心消息价值竞争。分发差异更尖锐：Microsoft 的商业 M365 基础让 Teams
              能以零增量成本进入企业账户；Slack 借 Salesforce 的企业现场销售队伍分发；Discord 几乎完全靠有机社区形成、游戏文化和同伴推荐获客。这种 GTM 不对称，是 Discord
              近期在游戏和创作者社区之外扩大可寻址收入的结构性天花板。
