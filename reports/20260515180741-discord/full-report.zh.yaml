      - number: '6.3'
        title: 具名客户与品牌证明
        blocks:
          - type: paragraph
            body: >-
              Discord 的具名客户证明集中在大型游戏发行商和娱乐品牌，它们均通过 Discord 的 Verified Server 计划或正式合作协议运营。Sony PlayStation 管理一个拥有超过 1
              million 成员的官方认证服务器，并已在 PS5 主机操作系统层面集成 Discord，允许玩家在 Discord 个人资料中展示当前游戏。Microsoft Xbox 与 Discord 合作，把
              Discord Nitro 打包进 Xbox Game Pass Ultimate，让数千万 Xbox 订阅用户接触 Nitro 订阅。Nintendo 运营官方认证服务器，作为 Nintendo
              游戏粉丝的社区枢纽。Riot Games 分别为 League of Legends 和 Valorant 维护官方认证服务器，每个服务器都从竞技游戏和电竞社区吸引数百万成员。Epic Games 运营官方
              Fortnite Discord 服务器，这是平台上最大的单一游戏社区之一。游戏之外，Netflix 为内容讨论和首映活动建立粉丝社区服务器，Spotify 则落地 API 集成，允许用户在 Discord
              个人资料中分享听歌状态。这些证明确认，一线科技和娱乐公司把 Discord 用作客户互动渠道。不过，证据基础高度集中于游戏和娱乐垂直领域，金融服务、医疗健康或企业软件垂直领域没有可比的具名证明。
