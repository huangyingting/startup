      - number: '4.2'
        title: 收入增长历史和 2026 年轨迹
        blocks:
          - type: paragraph
            body: >-
              Discord 的收入历史体现出一家公司先借 COVID-19 顺风高速增长，随后放缓到更典型的后期增长阶段轨迹。

              Business of Apps 汇总估计基于 Forbes、The Information 和 WSJ 数据，显示收入从 2016 年约 $5 million 增至 2020 年 $135
              million、2021 年 $310 million、2022 年 $445 million、2023 年 $575 million。Reuters 2024 年 2 月报道援引未具名来源，称 2023
              年收入接近 $600 million，与 Business of Apps 估计大体一致。DemandSage 将 2023 年 Nitro-only 收入置于约 $207 million，说明单 Nitro
              订阅约占总额 35%——也意味着 boosts、开发者平台费和 Quests 等新产品贡献了可观收入。

              这些估计隐含的 2022 至 2023 年增速约为 29%。如果年增速维持 25–30%，2024 年收入将在 $700–$750 million 区间；若 Quests 广告采用和平台费增长推动加速，2024
              年数字可能推向 $800–$900 million。DemandSage 的 2026 年预测将总年收入放在 $750–$800 million，看起来偏保守，可能反映其数据只包含应用内购买收入渠道。截至
              2026 年初，分析师社区共识认为 Discord 年收入已达到或接近 $1 billion。

              收入地域高度偏向北美：DemandSage 估计应用内购买收入 60%
              来自美国，英国（6%）、加拿大（5%）、法国（3%）和澳大利亚（3%）是随后几个最大市场。这种集中度既在渗透不足的国际市场留下增长机会，也带来外汇敞口风险。
