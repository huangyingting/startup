            title: Microsoft Teams 捆绑是 Discord 无法靠有机增长匹配的结构性分发威胁
            body: >-
              约 345 million 商业 Microsoft 365 订户以零边际成本获得 Teams，Microsoft 已经把一个社区通信工具预装进企业市场，并延伸到教育和 Xbox 游戏板块。如果
              Microsoft 按 IDC 路线图报道，在 Teams 中加入持续语音房间和社区发现，Discord 与 Teams 的功能差距会显著缩小，分发不对称也会压倒 Discord 的有机增长模型。Discord
              唯一可持续的防守，是在 Teams 缩小产品差距前加深游戏原生和创作者社区差异化，或增加一个足以支撑单独采购决策的企业合规层。
            calloutType: risk
