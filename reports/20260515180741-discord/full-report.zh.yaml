      - number: '8.5'
        title: 退出准备度与 IPO 路径
        blocks:
          - type: paragraph
            body: >-
              Discord 最可能的退出路径是公开市场 IPO。Microsoft 在 2021 年 4 月据报道以 $10-12 billion
              表达收购兴趣，但被拒绝；这一决定隐含地为管理层和现有投资者设定了底价预期。截至 2026 年 5 月，Discord 尚未提交 S-1，也未宣布 IPO。Reuters、Axios、WSJ、Bloomberg 和
              Forbes 等多家财经媒体报道过 2025-2026 年 IPO 计划，其中部分报道提到，随着 Discord 努力走向盈利，原 2025 年目标可能推迟至 2026 年。

              IPO 准备度信号好坏参半。正面信号包括：Dragoneer、Fidelity 和其他机构投资者都有 IPO 经验，距离上一轮融资已过去五年，也有退出动力；新 CEO Humam Sakhnini 在
              Activision Blizzard 有上市公司经验，可为投资者路演提供可信度；2026 年消费者科技 IPO 市场条件较 2022-2023 低谷有所改善。负面信号包括：截至 2026 年 5 月尚无
              S-1，意味着 IPO 可能滑到 2027 年；没有 EBITDA 盈利确认，意味着 IPO 可能需要以亏损型消费者科技定位上市，而这一定位历来会被打折；正式财务披露缺失，意味着公开投资者将在数据真空中确定
              IPO 价格。

              2025 年春季任命新 CEO Sakhnini，使公司在能够进行可信 IPO 路演前增加约 12-18 个月执行跑道，因此即使乐观时间线也最早落在 2026 年末。DemandSage 预计 Discord 到
              2026 年末实现首次有意义盈利；如果新领导层下财务轨迹改善，这与潜在 2026-2027 IPO 窗口一致。
            claimRefs:
              - CV004
              - CV005
              - CV018
              - CV020
              - CV021
              - CV035
