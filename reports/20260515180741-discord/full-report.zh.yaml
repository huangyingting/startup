      - number: '5.4'
        title: 路线图、变现与产品成熟度
        blocks:
          - type: paragraph
            body: >-
              Discord 近期产品发展轨迹显示，平台正有意从游戏和社区根基扩展到变现、嵌入式互动体验和广告。Discord Activities 于 2022–2023
              年上线，让扑克、一起观影、共同绘画应用等嵌入式互动游戏和应用直接出现在语音频道中，并基于向第三方工作室开放的 Activities SDK 构建。Forum Channels 于 2022
              年上线，增加结构化的帖子式讨论空间，意在与 Reddit 式社区组织竞争，同时利用 Discord 的实时社交图谱。Quests 广告产品为游戏工作室和品牌提供按效果计费的推广工具，绑定 Discord
              内的特定互动动作，是 Discord 在订阅之外最清晰的新收入流。2025 年，Discord 与 Microsoft Xbox Game Pass 合作提供 Nitro
              Rewards，加深与主机游戏生态的整合。2023 年试点的 Clyde AI 聊天机器人在年底退役，说明 Discord 的 AI 策略仍未定型。Discord 尚未公开确认详细的 2026
              产品路线图，但开发者平台页面和 API 文档显示，公司会继续投资 Activities SDK、面向开发者的变现 API，以及搜索基础设施改进。Nitro
              仍是主要直接订阅收入载体，合作伙伴和广告收入则是新兴但具有战略重要性的补充收入流。
