      - number: '5.3'
        title: 信任、安全与合规
        blocks:
          - type: paragraph
            body: >-
              Discord 的信任与安全态势带有重要监管历史，也面临持续运营挑战。2023 年 5 月，FTC 因 Discord 违反儿童在线隐私保护法（COPPA）与其达成 $7.8 million 和解，要求
              Discord 为 13 岁以下用户实施更强的年龄验证、父母同意机制和更严格的数据留存限制。这是 Discord 史上最重大的监管行动，也迫使公司对注册和隐私基础设施做出实质调整。COPPA 之外，Discord
              的隐私政策记录了对 GDPR 的合规，包括数据主体权利、数据可携性和删除请求；也记录了对 CCPA 的合规，包括加州居民的退出权。Discord
              设有专门的信任与安全团队，负责内容审核、滥用响应，以及在数百万个服务器中执行社区准则；平台半私密的服务器结构限制外部可见性，也让这项工作更难。discord.statuspage.io
              的公开状态页提供历史事故透明度。所有通信均在传输中加密。明显缺口包括：没有公开确认的 ISO 27001 认证，也未披露合同性 SLA 或正常运行时间保证。对品牌广告主和企业用户而言，FTC
              和解历史、持续审核挑战和有限安全认证透明度叠加，构成较高的运营和声誉风险因素。
