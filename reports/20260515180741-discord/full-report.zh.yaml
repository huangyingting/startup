      - number: '7.5'
        title: 图表与证据
        blocks:
          - type: callout
            title: CSAM 责任超出财务和解本身
            body: >-
              2023 年 FTC 罚款解决了即时民事责任，但没有消除未来刑事风险。联邦 CSAM 法规的责任门槛不是民事和解能覆盖的。如果新一轮执法行动涉及平台知情且迟延响应的证据，案件可能转交 DOJ，而不是走 FTC
              民事程序；这会给 Discord 的经营状态和高管层带来实质不同的后果。
            calloutType: risk
            claimRefs:
              - CR020
              - CR039
          - type: callout
            title: Discord 的风险画像类似 IPO 前的 Reddit 和 FTC 前的 Snapchat
            body: >-
              Discord 结合了化名身份、私密频道和偏年轻的人口结构，风险画像类似 2014 年 FTC COPPA 和解前的 Snapchat，以及 2023 年 IPO 治理重整前的
              Reddit。两家公司都需要在机构资本能够大规模投资前，投入大量合规基础设施。Discord 正处在类似拐点。
