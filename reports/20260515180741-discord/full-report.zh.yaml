  - id: FE001
    title: 产品架构图
    type: stack
    layout: wide
    summary: Discord 技术栈分为八个清晰层级：从面向客户端的应用，到实时 gateway、应用服务、持久数据存储，再到云和边缘基础设施。多语言架构体现了各层有意识的技术选择，针对实时通信平台的性能和可扩展性要求做优化。
    data:
      layers:
        - id: l1
          label: 客户端层
          detail: React（TypeScript）网页应用；Electron 桌面端（Windows/macOS/Linux）；React Native 移动端（iOS/Android）； 浏览器
        - id: l2
          label: 实时 Gateway 层
          detail: Elixir/Erlang WebSocket gateway；BEAM VM 分布式 actor 模型；管理数百万并发连接
        - id: l3
          label: API 与整合层
          detail: REST API；Discord Gateway API（WebSocket 事件）；斜杠命令 / interactions API；webhooks；OAuth2
        - id: l4
          label: 应用服务层
          detail: Go 微服务：authentication、presence、notifications、search、file storage、guild management
        - id: l5
          label: 性能层
          detail: Rust 组件处理语音 / 视频、低延迟音频编码 / 解码（OPUS）、hotpath pipeline
        - id: l6
          label: 数据层
          detail: ScyllaDB（850B+ messages）；PostgreSQL（关系元数据）；Redis（caching、pub/sub）；GCS object storage
        - id: l7
          label: 云基础设施层
          detail: Google Cloud Platform（GCP）；多区域计算；全球负载均衡；Kubernetes 编排
        - id: l8
          label: 边缘与 CDN 层
          detail: Cloudflare CDN；DDoS 防护；Cloudflare Workers edge compute；全球 PoP 网络
