  - id: TP002
    title: 功能 / 能力矩阵
    columns:
      - 能力
      - Discord
      - Slack
      - Microsoft Teams
      - Telegram
      - Guilded
    rows:
      - - 持久在线语音频道（常久在线房间）
        - 完整——核心产品入口；所有服务器都有持久在线语音房间
        - 无——Slack Huddles 是临时会话；没有持久在线语音房间
        - 部分——Teams 会议按计划或按需发起，不是持久在线房间
        - 无——Telegram 没有持久在线语音频道这一产品功能
        - 完整——Guilded 将持久在线语音频道作为核心社区功能
      - - 社区服务器模型（基于角色访问）
        - 完整——服务器含角色、权限、频道和治理工具
        - 无——Slack 工作区面向团队内部；没有公共服务器或社区模型
        - 无——Teams 以组织为边界；没有公共社区或服务器发现
        - 部分——有公共频道，但缺少 Discord 式服务器角色结构
        - 完整——Guilded 为游戏复刻 Discord 式服务器和角色模型
      - - 游戏集成（主机、游戏状态、游戏内覆盖层）
        - 完整——PS5 语音、Xbox Game Pass Nitro 捆绑、通过 API 提供丰富游戏状态
        - 无——没有游戏集成；Slack 不定位于游戏社区
        - 部分——存在 Xbox 主机集成，但相对主产品重心是外围功能
        - 无——没有游戏集成；不定位于游戏用例
        - 完整——游戏分数集成，并与 Roblox 生态原生绑定
      - - 企业合规（SSO、审计日志、DLP、eDiscovery）
        - 无——未披露 SAML SSO、审计日志、DLP 或 eDiscovery 产品
        - 完整——Business+ 和 Enterprise 层提供 SAML SSO、审计日志、DLP、eDiscovery
        - 完整——通过 Microsoft Purview 集成提供完整企业合规套件
        - 无——没有企业合规功能；只有消费者级安全模型
        - 无——没有企业合规；最多是 SMB 级访问控制
      - - API 和机器人生态成熟度
        - 成熟——1M+ 机器人应用；开发者文档和 Gateway API 完整
        - 成熟——Slack 应用目录丰富；API 文档完善；第三方生态广
        - 成熟——Teams 应用商店；Graph API；Power Platform 和 Azure AD 集成
        - 成熟——Telegram Bot API 使用广泛；第三方机器人和频道生态庞大
        - 有限——Guilded API 存在，但开发者社区远小于 Discord
      - - 免费层范围
        - 广泛——消息、语音和社区功能免费；Nitro 只增加权益
        - 受限——免费层将消息历史限制在 90 天；核心功能在付费墙后
        - 广泛——Teams 免费版包含 60 分钟会议、5 GB 存储和无限聊天
        - 不限——标准使用完全免费；Telegram Premium 只提供少量重度用户附加功能
        - 广泛——核心社区功能免费；Guilded 变现很少
    notes: 单元格基于可获得的最佳公开产品文档和独立竞争分析。Discord 企业合规标为“无”，依据是官方文档和 Naavik 竞争评述中未记录 SSO 或审计功能。Guilded 功能成熟度来自公开产品文档；收购后路线图未公开披露。
