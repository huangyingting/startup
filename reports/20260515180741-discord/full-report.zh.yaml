      - number: '7.3'
        title: 合作伙伴与依赖风险
        blocks:
          - type: paragraph
            body: >-
              Discord 的平台交付和商业模式依赖少数大型技术合作方，每一方都对关键功能拥有定价或政策杠杆。Google Cloud Platform 位于依赖图顶端：没有 GCP，Discord
              的核心消息、语音、视频和存储服务无法交付，且没有已披露替代方案。Cloudflare 提供网络边缘防护和 CDN；如果这段关系出问题，Discord 会暴露于 DDoS 漏洞和全球延迟恶化。Apple App
              Store 和 Google Play Store 控制 Discord 主要移动分发渠道，并对包括 Nitro 订阅在内的应用内购买收取 30% 费用。这造成移动端和 Web 端 Nitro
              购买之间的结构性单位经济差异；除非牺牲移动购买体验，或把该费用接受为永久利润率成本，Discord 无法解决。Stripe 处理 Discord
              订阅支付；任何中断都会直接损害订阅收入收款。Twilio/SendGrid 提供交易邮件和通知投递；中断会影响用户留存和注册引导。Discord 用户基础过度集中在围绕
              Fortnite、Minecraft、Roblox 和 Valorant 等特定游戏组织的游戏社区。任何旗舰游戏活跃用户数显著下降，都会削弱自然社区形成和服务器创建，而这是 Discord
              不靠付费营销获取新用户的主要机制。Microsoft Xbox/Nitro Rewards 捆绑推动了 Nitro 订阅用户增长；截至报告日期，其当前状态尚未确认。相对于更大平台，Discord
              与主要基础设施和分发合作方谈判时的杠杆有限。
