      - number: '2.3'
        title: 买方、用户、付费方分层和采纳路径
        blocks:
          - type: paragraph
            body: >-
              Discord 的商业关系把买方、用户和付费方拆成不同角色，这直接影响变现建模。主导用户是 Gen Z 游戏玩家或社区参与者：Pew 2022 年青少年调查显示，美国青少年对 Discord
              的采用率在疫情期间明显上升；Axios 2022 年和 2024 年报道也称，Discord 是 Gen Z 最常与社区归属感联系在一起的平台。付费方压倒性地是为自己购买 Nitro 的个人消费者，或代表一个
              server 购买 Server Boost 的社区所有者，而不是企业采购组织。因此买方界面以自助、冲动消费为主，更接近消费订阅业务，而不是传统 B2B SaaS 漏斗。第二类买方是运营大型 server
              的创作者或社区经理，他们使用 Server Boost、合作伙伴计划以及越来越多的第三方变现工具。第三类规模更小，是为特定大型社区内分发付费的品牌或媒体合作伙伴，公开渠道没有预算基准。

              采纳路径从有机邀请开始（一位朋友加入某个 server），进入功能暴露（语音频道、需要 Boost 的自定义 emoji），最后转化为 Nitro 升级。转化高度依赖社区参与，而不是顶部漏斗营销；这让
              Discord 区别于付费广告驱动的消费应用，也解释了为什么 DAU/MAU 和活跃 server 数是领先指标，而非 CAC。教育作为垂直相邻场景，在 Restofworld 和 Naavik
              报道中被提及，但仍未充分变现；Discord 自身 evolution-of-communities 和 not-just-for-gamers
              博文越来越强调非游戏社区，这扩大了用户漏斗，却没有立刻扩大付费方界面。
