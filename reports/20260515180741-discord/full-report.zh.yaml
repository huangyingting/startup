  - number: 7
    title: 风险
    sections:
      - number: '7.1'
        title: 监管、法律与合规风险
        blocks:
          - type: paragraph
            body: >-
              Discord 的监管敞口锚定在两件大事上：2023 年 5 月的 FTC COPPA 和解，以及欧盟《数字服务法》（DSA）框架。FTC 认定 Discord 违反 COPPA：允许 13
              岁以下儿童在没有可验证父母同意的情况下注册，收集未成年人个人数据，并让他们暴露于未经请求的成人接触。由此产生的 $7.8 million
              民事罚款，还伴随一项多年期同意令，要求加强父母控制、年龄验证机制，以及全面儿童隐私合规计划。违反同意令会让 Discord 面临藐视法庭程序和额外罚款。在 EU DSA 下，按估计 150M+ 月活 EU
              用户计算，Discord 很可能达到超大型在线平台（VLOP）门槛（DSA 门槛为 45M）。VLOP
              义务包括年度系统性风险评估、内容审核审计、算法透明度披露、危机响应协议和研究人员数据访问。不合规处罚最高可达全球年收入 6%，重复违规可能触发 EU 境内临时服务暂停。Discord 的 EU
              实体注册在爱尔兰，因此爱尔兰数据保护委员会是 GDPR 主监管机构；针对可比平台的执法已经产生九位数罚款。英国《在线安全法》引入额外年龄保证、有害内容和儿童保护义务，由 Ofcom 执法。Discord
              还面临加州居民适用的 CCPA/CPRA、联邦和国际儿童保护法下的 CSAM 义务，以及用户生成侵权内容带来的 DMCA 次级责任风险。EPIC 和 EFF 等倡议组织已经公开记录 Discord
              的隐私和儿童安全漏洞，会放大未来任何执法行动的声誉后果。
