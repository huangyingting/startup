      - number: '5.2'
        title: 开发者生态与 API 平台
        blocks:
          - type: paragraph
            body: >-
              Discord 的开发者生态是它最耐久的竞争优势之一。平台支持超过 1 million 个注册机器人，社区可以自动化审核、添加娱乐功能、运行锦标赛、集成外部服务，并用数千种方式丰富 Discord 体验。npm
              上的 discord.js 库每周下载量超过 1 million，是 JavaScript 生态里采用最广的平台集成库之一。Gateway API 通过 WebSockets
              向机器人客户端实时分发事件，支持消息创建、反应新增、服务器成员变更和语音状态更新等事件。Interactions API 支撑斜杠命令和应用命令，取代了早期基于前缀的命令模型，并提供标准化、可发现的命令界面，由
              Discord 在客户端原生渲染。Discord 后端以 Go 微服务为核心，处理认证、通知、搜索和文件存储；Rust 则用于语音和视频处理管线等性能关键组件，以降低延迟和 CPU 开销。2022 年上线的
              App Directory 为优质机器人和应用增加了精选发现入口。OAuth2 支撑更广泛的身份与集成生态，允许第三方应用请求对 Discord 账户的限定范围访问。丰富 API
              面、流行客户端库和庞大机器人装机基础叠加，给深度嵌入 Discord 生态的社区带来了显著切换成本。
