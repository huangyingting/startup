          - type: callout
            title: 建仓前必须拿到数据室或 IPO S-1
            body: >-
              仅凭公开证据，无法有把握地承保 Discord 的投资逻辑。毛利率、Nitro 队列留存、分业务收入和资本结构优先股堆叠均未知。建议尽调路径是：（1）向 Discord
              管理层或现有股东请求数据室权限，或（2）等待 S-1 文件，届时会披露审计财务、股权结构表和 MD&A。如果有确认的 $700 million 或更高收入运行率支撑，低于 $8 billion
              的老股市场进入或可接受。
