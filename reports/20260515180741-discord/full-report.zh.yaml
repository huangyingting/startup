  - number: 2
    title: 市场分析
    sections:
      - number: '2.1'
        title: 市场边界、纳入与排除支出以及替代品
        blocks:
          - type: paragraph
            body: >-
              从承销视角看，Discord 的市场边界窄于广义社交媒体，也宽于单纯游戏聊天。公开产品界面显示，平台通过 Nitro 消费订阅、Server Boost 社区付费，以及 2025 年与 Xbox Game
              Pass 捆绑的 Nitro Rewards 变现。上述产品主要落在两个可定义支出类别中：（a）游戏社区通信，买方是 Newzoo 口径约 $200B
              全球游戏市场里的玩家或社区所有者；（b）在线社区管理平台，Grand View、Allied、Verified Market Research 和 Mordor Intelligence 预计该市场在 2020
              年代后期约 $1.5B 至 $3.6B。第三个相邻类别是消费者消息通信，是 Statista 社交与消息展望跟踪的可寻址背景，但按 Discord 当前价格点，除 Nitro
              外并不能直接变现。第四个类别是创作者经济，Goldman Sachs 预计到 2027 年规模约半万亿美元，其中包含 Discord 希望借 Server Boost 和创作者工具留住的准专业消费者人群。

              排除支出包括超大规模云厂商基础设施 capex、主机 / PC 硬件、广告资助型社交平台，以及企业生产力 SaaS——这些类别 Discord 不能直接获取收入。替代品包括工作场景中的 Microsoft
              Teams 和 Slack，消费者侧的 Telegram 和 WhatsApp，面向主播社区的 Twitch 和 YouTube 实时聊天，异步社区讨论中的 Reddit 和 Facebook
              Groups，以及游戏场景里的 Steam Chat 或游戏内语音。许多游戏社区的现状仍是游戏内语音加好友列表，这让切换到 Discord 的成本较低，也让再获客周期较短。
