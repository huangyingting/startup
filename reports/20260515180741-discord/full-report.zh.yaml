      - number: '1.3'
        title: 融资形成和投资者基础
        blocks:
          - type: paragraph
            body: >-
              Discord 的公开融资记录横跨十二轮，从 2012 年 7 月 seed 轮到 2021 年 9 月 Series H。按 Backlinko 汇总融资数据，披露融资总额约 $995 million，与
              Wikipedia 对单轮融资的记录基本一致。

              早期轮次规模较小：2012 年 7 月 seed 轮 $1.1 million，2013 年 11 月 Series A $8.2 million，2015 年 2 月 Series B
              金额未披露。Benchmark Capital 和 Tencent Holdings 通过对 Hammer and Chisel 的融资参与了公司早期发展。Series C 于 2016 年 1 月融资 $20
              million，WarnerMedia（当时的 Time Warner）位列投资方。Series D 于 2017 年 1 月融资 $50 million，并确立了约 $2 billion 估值。2018 年
              12 月 Series F 以 $2 billion 估值融资 $150 million，由 Greenoaks Capital 领投，Firstmark、Tencent、IVP、Index Ventures 和
              Technology Opportunity Partners 参投。

              2020 年 6 月 Series G 融资 $100 million，用于支撑疫情期间通信需求激增带来的平台增长。2021 年 9 月 Series H 经同月 SEC Form D 文件确认，融资 $500
              million，投后估值 $15 billion。Discord 自身博客文章也确认了这笔融资。Wikipedia 称该轮由 Dragoneer Investment Group 领投，Baillie
              Gifford、Fidelity Investments 等参投。自 2021 年 9 月以来，公司未披露新的公开融资轮；截至研究日期，也没有宣布 IPO。

              一个值得注意的未发生事件是：2021 年 3 月至 4 月，Bloomberg 等媒体报道 Microsoft 曾以约 $12 billion 估值接触 Discord 商讨收购；Discord
              拒绝了该交易，转而完成规模更大的 Series H，并把估值推至 $15 billion。该决定保住了 Discord 的独立性，也奠定了其当前估值地板。
