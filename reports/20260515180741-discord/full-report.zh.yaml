chapters:
  - number: 1
    title: 公司概况
    sections:
      - number: '1.1'
        title: 身份、产品平台和当前运营版图
        blocks:
          - type: paragraph
            body: >-
              Discord Inc. 是一家在 Delaware 注册成立的私有科技公司，总部位于 444 De Haro Street, Suite 200, San Francisco, California
              94107。公司自称是一款通信平台，围绕游戏乐趣，用语音、视频和文字功能帮助用户建立有意义的连接。核心产品允许用户加入并创建邀请制虚拟社区，也就是 servers；这些 servers
              包含持续存在的文字频道、语音频道和视频能力。用户也可以通过私信和群组私信私下沟通。

              平台覆盖 Windows、macOS、Android、iOS、iPadOS、Linux 和网页浏览器。截至 2026 年 5 月，Discord 官方公司页面披露日活用户超过 90 million，其中 90%
              以上玩电子游戏，约 40% 会在打开 Discord 后一小时内启动游戏。Wikipedia 记录 2024 年月活跃用户约 150 million 至 200 million，周活跃 servers 为 19
              million；不过 Backlinko 汇总的市场数据口径更近，给出的 MAU 为 200 million。公司收入模式依赖 Nitro 高级订阅和服务器 boost 费用，并由游戏伙伴计划补充，例如 2025
              年 Nitro Rewards 计划宣布的 Xbox Game Pass 集成。

              Discord 的法定名称为 Discord Inc.，SEC CIK 为 0001763840，注册州为 Delaware。LinkedIn 将公司归入软件行业。平台支持 30 种语言，并长期位列全球访问量前
              30 的网站。其技术栈主要是客户端 TypeScript 与 React，服务端 Elixir、Python、Rust 和 C++，桌面客户端使用 Electron，移动端使用 React Native。
