      - number: '6.4'
        title: 留存、满意度与扩张风险
        blocks:
          - type: paragraph
            body: >-
              Discord 的社区黏性结构性很强：服务器成员身份默认保留，也没有主动退订机制，给社区运营方带来持久留存。但 Nitro 订阅留存是另一回事——流失率未公开，分析师估计 Nitro 年流失率为
              20–30%，相较最佳订阅业务基准偏高。App Store 评分在 iOS 上为 4.7 星，Google Play 较低，为 4.1 星，可能反映 Android 特定用户体验缺口。TrustPilot
              评分明显负面，约 2.5 星，主要由账号封禁投诉和儿童安全担忧驱动；这是需要系统调查的反向情绪信号。FTC 2023 年因违反儿童在线隐私保护法和视频隐私保护法达成的 $7.8 million 和解，构成
              Discord 留住年轻用户并变现其参与度的结构性风险。扩张风险包括：高度集中于游戏垂直领域（周期性强、依赖具体游戏）、依赖自然服务器增长而不是可管理销售动作、未披露 NRR 或 GRR，以及 Nitro
              和服务器 boost 之外的收入多元化有限。缺少企业合同路径，也没有高级合规功能，进一步限制近期扩张选项。地理集中风险同样存在：公开数据偏美国，国际变现和监管合规姿态缺乏清晰证据。
