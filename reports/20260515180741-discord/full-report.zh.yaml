      - number: '8.2'
        title: 估值背景与进入纪律
        blocks:
          - type: paragraph
            body: >-
              Discord 最后一次披露的投后估值为 $15 billion，由日期为 2021 年 9 月的 SEC Form D 文件确认，并得到 Discord 官方博客公告和 TechCrunch 当时对
              Dragoneer Investment Group 领投 $500 million Series H 的报道交叉印证。该轮包括 Fidelity Investments、T. Rowe
              Price、Baillie Gifford、Index Ventures 等投资者。融资时，根据 Business of Apps，Discord 2021 年估计收入约 $310 million，隐含约 48x
              后视收入倍数，符合 2021 年消费者科技估值峰值。

              2022 至 2024 年，公开市场科技估值倍数较峰值压缩约 60-70%。Pitchbook 私营公司估值数据和 DemandSage 预测显示，Discord 2025-2026 年隐含公允市场价值已降至约
              $7-10 billion。将当前可比公司组约 8x 收入的中位数应用于 Discord 估计 2024 年收入 $700-750 million，得到隐含估值约 $5.6-6.0
              billion，甚至低于悲观情景，凸显以 2021 年价格或更高价格进入会承担高倍数风险。

              潜在投资者的进入纪律需要先看清三件事：（1）2026-2027 年 IPO 市场会给一家没有正 EBITDA 的消费者社交 / 游戏平台接受多少收入倍数；（2）已融资 $995 million
              带来的优先股包袱会在不同 IPO 价格下怎样影响普通股结果；（3）Sakhnini 的运营改善和 Quests
              放量，是否足以实质改变增长和利润率轨迹，从而支撑高于可比公司组的溢价。没有数据室权限去看毛利率、EBITDA 桥和 Nitro 队列数据，单靠公开证据无法支撑 $8 billion 以上进入。如果有确认的
              $700M 或更高收入运行率支撑，按 $6-8 billion 做老股交易会相对于 $15 billion 峰值提供合理安全边际。
