  - number: 3
    title: 竞争格局
    sections:
      - number: '3.1'
        title: 竞争版图和同业分类
        blocks:
          - type: paragraph
            body: >-
              Discord 的竞争版图至少横跨五类同业。游戏原生同业——Guilded（2021 年被 Roblox 收购）、TeamSpeak 和 Mumble——最初都瞄准 Discord 2015
              年颠覆的低延迟游戏语音场景；如今三者用户基础更小，开发投入也相对 Discord 下滑。既有生产力平台——Microsoft Teams（约 320M MAU）和 Slack（Salesforce 子公司，约
              18M DAU）——在工作和教育语境中争夺社区心智，并拥有大得多的资本基础和企业分发优势。消费者消息通信和社区既有平台——Telegram（约 950M MAU）、WhatsApp（约 3B MAU）以及
              Reddit（2024 年 4 月上市）——在消费规模上争夺异步和群组消息场景，与 Discord 的非游戏社区重叠。直播相邻平台——主要是 Twitch
              Chat——争夺游戏和创作者受众的实时社区互动。联邦化和自托管替代品——Element（Matrix protocol）和 Steam Chat（Valve）——分别服务重视隐私的用户和 PC
              原生玩家，构成现状替代品。还有两个竞争动态需要跟踪：内部自建选项（Discord 自身 API 允许开发者扩展平台，而不是迁移到竞品），以及休闲游戏社区的现状替代方案（游戏内语音加主机好友列表），这让尚未在
              Discord 上建立深层社区基础设施的用户切换成本相对较低。
