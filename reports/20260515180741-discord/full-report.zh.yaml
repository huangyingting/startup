      - number: '3.6'
        title: 图表
        blocks:
          - type: callout
            title: 持续社区架构创造了生产力工具无法复制的切换成本
            body: >-
              Discord 将持续语音频道、基于角色的社区 servers 和成熟 bot 生态结合起来，形成的切换摩擦在性质上不同于企业 SaaS 的切换成本。一个拥有定制 bots、既定角色和多年频道历史的大型
              server，很难在 Slack 或 Teams 上复制；说服整个成熟社区迁到竞品平台的社交图谱成本也很高。这条护城河在游戏和创作者社区最稳固，因为持续语音和身份功能是产品体验核心，而不是外围权益。
