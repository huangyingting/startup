        - UX 陈旧；没有社区发现；相对 Discord 采用率快速下滑
      - - Reddit
        - 相邻替代（异步社区）
        - 上市公司（2024 年 4 月 IPO）；IPO 时市值约 $6.5B；约 73M DAU
        - 覆盖所有话题的异步讨论社区；链接分享文化
        - 社区可被搜索发现；长内容；大型既有用户基础
