  - id: FV004
    title: 投资 KPI
    type: kpi
    data:
      items:
        - label: 市场机会
          value: 7/10
          unit: score
          detail: TAM 大（$200B+ 游戏 + 创作者经济）；游戏聚焦限制 SAM 渗透
        - label: 产品护城河
          value: 8/10
          unit: score
          detail: 网络效应和 API 生态已确认；成熟社区切换成本高
        - label: 收入证明
          value: 6/10
          unit: score
          detail: 2023 估算约 ~$600M；增长 29%；gross margin 和分部拆分未确认
        - label: 盈利路径
          value: 4/10
          unit: score
          detail: 未披露 EBITDA；January 2024 裁员显示纪律；预计 2026 年末盈亏平衡
        - label: 管理层质量
          value: 6/10
          unit: score
          detail: 新 CEO Sakhnini 有游戏背景；IPO 前有 12-18 个月执行窗口
        - label: 估值吸引力
          value: 4/10
          unit: score
          detail: 上一轮 $15B = 25x 2023 revenue；可比公司组中位数 7-10x 意味着 $5.5-7.5B 公允价值
        - label: 退出准备度
          value: 6/10
          unit: score
          detail: 目标 IPO 2026-2027；保荐方高度一致；截至 May 2026 尚未提交 S-1
        - label: 风险评级
          value: HIGH
          unit: rating
          detail: COPPA/监管、CEO 交接、收入天花板和倍数压缩均处高位
    claimRefs:
      - CV008
      - CV020
      - CV021
      - CV023
      - CV033
