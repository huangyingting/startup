  - id: FV001
    title: 建议逻辑
    type: flow
    data:
      nodes:
        - id: n1
          label: 200M+ MAU / 90M+ DAU
          detail: 规模已确认；游戏社区护城河已验证
          tone: positive
        - id: n2
          label: ~$600M 收入；29% 增长
          detail: 收入证明中等；gross margin 和分部拆分未确认
          tone: neutral
        - id: n3
          label: 社区 + 游戏护城河
          detail: 网络效应和 API 生态已确认；活跃服务器切换成本高
          tone: positive
        - id: n4
          label: $15B 上一轮；约 ~25x 收入
          detail: 高于 7-10x 可比公司区间；仅凭公开证据无法支撑溢价
          tone: warning
        - id: n5
          label: COPPA 风险；CEO 交接；收入天花板
          detail: 监管、管理层和游戏变现维度风险均抬高
          tone: warning
        - id: n6
          label: 继续研究 / 有条件跟踪
          detail: 启动投资前需要 data room 或 S-1；若收入确认，$6-8B 二级交易可接受
          tone: neutral
        - id: n7
          label: 投资论点失效触发器
          detail: 增长 <10% YoY；DAU 下降 >15%；新监管行动；IPO 延后到 2027 之后
          tone: risk
      edges:
        - from: n1
          to: n6
          label: 规模已确认
        - from: n2
          to: n6
          label: 证明中等
        - from: n3
          to: n6
          label: 护城河已确认
        - from: n4
          to: n6
          label: 估值偏高
        - from: n5
          to: n6
          label: 风险抬高
        - from: n6
          to: n7
          label: 监控
    claimRefs:
      - CV008
      - CV023
      - CV026
