      - number: '4.4'
        title: 资本结构、融资轮次和估值历史
        blocks:
          - type: paragraph
            body: >-
              Discord 的资本结构已在公司概况章节详述；本节聚焦前瞻性资本充足性问题，以及 2021 年以来估值下调的含义。

              2021 年 9 月 Series H 融资 $500 million，投后估值 $15 billion。该轮由 Dragoneer Investment Group 领投，Index
              Ventures、Greenoaks Capital、Firstmark Capital、Spark Capital、Sony Innovation Fund 和 Fidelity Investments
              参投。2021 年 9 月 9 日的 SEC Form D 文件确认融资额为 $499,999,442，并列出 Jason Citron、Stanislav Vishnevskiy、Mitch
              Lasky、Clint Smith、David Sze、Stephen Gillett、Danny Rimer 和 Tomasz Marcinkowski 为董事或高管。所有轮次累计披露融资约 $995
              million。2021 年中，Discord 拒绝了 Microsoft 据报约 $12 billion 的收购要约，选择保持独立并推进 Series H。

              2021 年 $15 billion 估值，定在消费者科技代际倍数扩张的峰值。到 2026 年，经过两年科技公司倍数收缩，PM Insights 估计 Discord 隐含公允市场估值约 $7.28
              billion，不到 2021 年峰值的一半。Pitchbook 的 Discord 估值跟踪器在其私有公司定价数据中反映了这一下调，不过具体方法为专有。估值压缩与公开市场 SaaS 倍数在 2021 至
              2023 年从 20–30x ARR 降至 5–8x ARR 的走势一致。

              Discord 的现金跑道和现金头寸无法从公开来源得知。公司累计融资 $995 million，估计截至 2023 年底累计经营亏损 $400–$600 million；粗略估算剩余现金约 $200–$500
              million，按估计烧钱速度足以支撑约 2–5 年运营。2024 年 1 月裁员以及随后更精简的运营模式表明，管理层正主动走向现金盈亏平衡或盈利，为潜在资本市场事件做准备。
