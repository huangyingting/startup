      - number: '2.4'
        title: 增长驱动、采纳约束和估值相关性
        blocks:
          - type: paragraph
            body: >-
              核心需求侧驱动包括：Gen Z 社交行为转向持续在线社区；创作者经济成熟，servers 成为粉丝俱乐部；以及游戏作为休闲类别的韧性。Pew、Axios 和 Verge 的报道都记录了 Gen Z
              相比开放式社交网络更偏好小型社区平台；Newzoo 和 Verified Market Research 显示游戏仍在以高个位数 CAGR 增长。Goldman Sachs 和 Forbes
              强调，创作者经济变现正扩展到社区原生订阅，这与 Discord 的 Boost 模式契合。eMarketer 的社交社区展望也强化了一个判断：群组型使用正在从公开信息流社交中抢占份额。

              主要采纳约束是竞争、监管和变现摩擦。Microsoft Teams 和 Slack 主导企业通信，收入基础也大得多；Discord 如果不改变产品 DNA，很难切入 B2B。Telegram 和 WhatsApp
              在全球争夺消息通信心智，并且对终端用户免费。监管已经产生实质影响——2023 年 5 月 FTC COPPA 和解成本为 $7.8M，并要求合规整改；EU DSA 和 UK Online Safety Act
              暴露仍然重要。最少被讨论的约束是变现摩擦：多数 Discord 用户没有变现，多位分析师估计 Nitro 渗透率仅为 MAU 的低个位数百分比；TheInformation
              报道称公司相对其私募市场估值「难以长大」。估值层面，TAM 很大，但实际 SAM 高度取决于 Nitro 渗透率、Server Boost 经济性，以及未来广告或合作伙伴收入界面能否成功。
