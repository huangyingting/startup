            body: >-
              Discord 在 2021 年 9 月的 $15 billion 估值，隐含约 25x 后视 2023 年收入。当前公开市场可比公司组——Reddit 约 7x、Roblox 约
              7.5x——给消费者社区和游戏平台的定价为 7-10x 收入。除非 Discord 展示出明显强于可比公司组隐含水平的增长或利润率，否则任何以 $15 billion 或更高估值收购 Discord
              股权的投资者，都很可能在 2026-2027 年 IPO 时遭遇按市值计价亏损。
