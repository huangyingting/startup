      - number: '1.2'
        title: 领导层、治理和董事会构成
        blocks:
          - type: paragraph
            body: >-
              Discord 由 Jason Citron 和 Stanislav Vishnevskiy 于 2015 年共同创立。Citron 此前创办社交游戏网络 OpenFeint，并在 2011 年以约 $104
              million 出售给 GREE。出售所得资金支持了游戏开发工作室 Hammer and Chisel；该工作室先开发 Fates Forever，之后转向打造 Discord。Vishnevskiy 于
              2013 年 4 月加入 Citron，自公司创立以来一直担任首席技术官。

              2025 年春，Jason Citron 宣布从 CEO 转任董事会成员兼顾问。Humam Sakhnini 被任命为 Discord 新任首席执行官。Sakhnini 曾在 Activision
              Blizzard 和 King 担任高级领导职务，带来深厚的游戏行业经验。Discord 官方公司页面是此次交接的主要公开来源，并将其描述为平台新阶段的一部分。Variety 的新闻报道也印证了 2025 年春的
              CEO 任命。

              至少自 2021 年 3 月起，公司已建立财务治理架构，当时 Discord 聘请 Pinterest 前财务负责人 Tomasz Marcinkowski 担任首任 CFO。2021 年 9 月 Series
              H 轮的 SEC Form D 文件披露了八名具名董事或高管：Jason Citron、Stanislav Vishnevskiy、Mitch Lasky、Clint Smith、David
              Sze、Stephen Gillett、Danny Rimer 和 Tomasz Marcinkowski。2023 年 3 月后续 Form D 文件又将 Amrita Ahuja 和 Leslie
              Kilgore 加入披露董事名单。除这十个姓名外，公开渠道没有披露更多董事会构成，因此仅靠公开来源无法确认持股比例、投票协议和完整治理结构。
