    notes: 情景概率是基于公开证据综合得出的方向性信号，不是精算估计。估值区间将可比公司组收入倍数套用于分析师共识收入估算。所有数字均为估算，不构成投资建议。
  - id: TV004
    title: 可比估值表
    type: enumeration
    enumerationScope:
      coverage: partial
      basis: >-
        Sample of five public-market acquisitions and IPOs selected from direct business-model analogs and
        consumer-platform comps using publicly disclosed transaction values and revenue multiples; excludes unlisted
        transactions and undisclosed private-round marks; does not claim exhaustive coverage across all possible
        comparable companies for Discord.
    columns:
      - 可比公司 / 事件
      - 收入 / ARR
      - 估值 / 价格
      - 隐含倍数
      - 与 Discord 的相关性
      - 局限
    rows:
      - - Slack（Salesforce 2021 年 7 月收购）
        - 约 $906M ARR（收购时 trailing）
        - $27.7B 收购价
        - ~30x ARR
        - 直接通信平台可比；开发者生态；社区使用场景
        - 企业 B2B，合同 NRR >130%；Discord 是 B2C freemium，模型结构不同
      - - 'Reddit（NYSE: RDDT，2024 年 3 月 IPO）'
        - 2023 年收入约 $804M
        - IPO 定价约 ~$5.5B（$34/share）
        - 约 7x trailing revenue
        - 消费社交平台；社区架构；与 Gen-Z / 游戏人群重叠；IPO 时亏损
        - 广告变现模型；护城河类型不同；DAU/MAU 比例更小；无语音 / 实时通信
      - - Discord Series H（自身轮次，2021 年 9 月）
        - ~$310M 2021E / ~$600M 2023A
        - $15B post-money
        - 约 48x 2021E / 约 25x 2023A
        - 自身参照；2021 价格是现有投资人在退出时必须打赢的基准
        - 定价发生在倍数扩张峰值；当前市场难以复现；2021 后未披露新轮融资
      - - 'Roblox（NYSE: RBLX，2024 年上市可比）'
        - 2023 年收入约 $2.65B
        - 市值约 $20B（Q1 2024）
        - 约 7.5x trailing revenue
        - 游戏社交平台；用户生成内容；DAU 与 Discord 用户基础高度重叠
        - 使用 Robux 的虚拟货币 UGC 模型；收入基数大 3x+；变现结构不同
      - - Twitter/X（Musk 2022 年 10 月收购）
        - 2021 年收入约 $5.1B
        - $44B 收购价
        - 约 8.7x trailing revenue
        - 社交平台可比，为倍数提供背景；Musk 后续将该资产标记为 $8-20B
        - 收购情境特殊；不是 IPO；广告主流失推动收购后价值缩水
    claimRefs:
      - CV001
      - CV012
      - CV013
      - CV015
      - CV016
    notes: >-
      所有可比收入数字和倍数均来自第三方分析师报告和财经媒体；Discord 自身数字为估算。倍数采用交易或 IPO 日期的 trailing revenue 或
      ARR。当前交易倍数会因市场环境不同而变化。这只是部分可比公司组；完整机构级可比表需要授权数据提供商。
  - id: TV005
    title: 论点失效与否决触发器表
    columns:
      - 触发器
      - 阈值 / 事件
      - 对投资论点的传导
      - 行动含义
    rows:
      - - 收入增长减速
        - YoY 收入增长连续两个季度低于 10%
        - 多重重估叙事失效；意味着天花板已到；DCF 价值向空头情景坍缩
        - 退出持仓或不启动投资；立即将确信度降至回避
      - - 游戏市场收缩
        - Discord 游戏社区 DAU 或 MAU YoY 下降 >15%
        - 90%+ 游戏依赖造成直接收入悬崖；社区流失可能快速级联
        - 严重度高；投资论点立即受损；拿到数据后 30 天内全面重评
      - - 新监管执法行动
        - 2023 COPPA 和解后，FTC、DOJ 或 EU 出现重大监管行动
        - 合规成本叠加、用户限制禁令，以及品牌声誉受损
        - 法律审查；若用户数据实践可能被禁令限制则退出；每周监控监管文件
      - - CEO 执行失败
        - DAU、Nitro MAU 或收入较内部目标低 >10%；Sakhnini 任内关键产品 KPI 下滑
        - 管理层论点支柱坍塌；投资人和投行不再相信扭转叙事
        - 下调至观察 / 退出；若要维持持有确信度，需董事会 / 投资人层面的透明度
      - - IPO 延迟超过 2027
        - December 2026 前未提交 S-1，或正式宣布撤回 IPO
        - 流动性再锁定 1-3 年；终值风险上升；现金消耗风险抬高
        - 要求二级退出选择或 down-round 融资条款；若有二级机会则减仓
    claimRefs:
      - CV033
      - CV034
      - CV035
      - CV036
      - CV037
    notes: 阈值只是用于重新评估确信度的示例触发水平，不是自动卖出信号。实际监控需要季度 app-store 数据、监管数据库和管理层直接沟通。所有触发器都应放在完整投资论点中评估。
  - id: TV006
    title: 最终尽调问题表
    columns:
      - 主题
      - 缺失证据
      - 重要性
      - 负责人 / 尽调路径
    rows:
      - - 按分部拆分收入
        - 未公开 Nitro、Server Boost、Quests 广告、开发者平台费用或创作者订阅拆分
        - 收入耐久性因分部而异；Quests 广告增长最快，但周期性也最强
        - CFO；data room；S-1 财务报表
      - - Gross Margin 和 COGS 结构
        - 未披露托管、CDN 或实时语音 / 视频基础设施成本占收入比例
        - 语音 / 视频 COGS 高；gross margin 决定 EBITDA 空间和合适可比倍数
        - CFO；data room；管理层成本结构演示
      - - Nitro 订阅者 Cohort
        - 未披露订阅者数量、月 churn rate、层级拆分（Basic vs Full）和年度续费率
        - 核心变现健康指标；没有 cohort 数据，无法承销 Nitro LTV 或估算回本周期
        - CFO；data room；订阅者分析 cohort 导出
      - - 资本结构和优先权堆栈
        - 完整 cap table、期权池规模、各轮优先权条款和清算瀑布未公开
        - $995M 融资带来的优先股清算优先权，可能实质压低普通股 IPO 收益
        - General counsel / CFO；data room；SEC Form S-1 cap table 附件
      - - 盈利路径财务模型
        - 管理层未提供 EBITDA 桥、经营杠杆模型或收入到现金流时间线
        - 评估 IPO 定价必须要有；没有该模型，roadshow 分析师会施加不确定性折价
        - CFO；S-1 MD&A 章节；IPO roadshow 财务模型
      - - IPO 结构和募资用途
        - 未披露拟发行流通规模、lock-up 条款、二级 vs 一级股份拆分、承销团
        - 决定 IPO 后流动性、free-float 可得性，以及现有投资人是否分配股份
        - 主承销投行；S-1 招股书；IPO 前投行材料
    claimRefs:
      - CV028
      - CV029
      - CV039
      - CV040
    notes: 尽调问题按对投资决策的重要性排序。第 1-3 项对收入模型至关重要。第 4-6 项对资本结构和退出机制至关重要。所有项目都是正式 data-room 或 S-1 招股书审查中的标准请求。
figures:
  - id: FO001
    title: 公司里程碑时间线
    type: timeline
    layout: wide
    summary: >-
      Discord 从 May 2015 游戏聊天产品上线起步，经历疫情期间爆发式增长、2021 年 $15 billion Series H、2023 FTC 监管和解、2024 裁员，以及 2025 CEO
      交接；公司由此进入后创始人时代。
    data:
      items:
        - date: '2012-07-01'
          label: 种子轮
          detail: Hammer & Chisel 获 $1.1M 种子轮；Benchmark 和 YouWeb 9+ incubator 参与
          tone: positive
        - date: '2015-05-01'
          label: Discord 上线
          detail: 平台公开发布；游戏社区快速采用
          tone: positive
        - date: '2017-01-01'
          label: Series D — $2B 估值
          detail: 融资 $50M；首次达到独角兽估值
          tone: positive
        - date: '2018-12-01'
          label: Series F — $150M
          detail: Greenoaks 领投；Tencent 和 Index Ventures 参与
          tone: positive
        - date: '2020-06-01'
          label: Series G 和转向
          detail: 融资 $100M；平台重新定位为游戏之外的「your place to talk」
          tone: positive
        - date: '2021-04-01'
          label: 拒绝 Microsoft 报价
          detail: Discord 拒绝约 ~$12B 收购；转而寻求私募融资
          tone: neutral
        - date: '2021-09-01'
          label: Series H — $15B 估值
          detail: 融资 $500M，由 Dragoneer 领投；当前公开估值锚
          tone: positive
        - date: '2023-05-01'
          label: FTC COPPA 和解
          detail: $7.8M 罚款；Discord 被要求整改儿童隐私实践
          tone: negative
        - date: '2024-01-01'
          label: 裁员 — 17% 员工
          detail: 成本重组中裁掉约 170 名员工
          tone: negative
        - date: '2025-01-01'
          label: Nitro Rewards 上线
          detail: Xbox Game Pass 与 Nitro 捆绑且不加价；游戏合作进一步加深
          tone: positive
        - date: '2025-04-01'
          label: CEO 交接
          detail: Humam Sakhnini 出任 CEO；Jason Citron 转任董事会和顾问角色
          tone: neutral
    approximationNotes: 季节引用（Spring、Winter）和只有年份的事件放在该期间第一天。April 2021 Microsoft 拒绝日期基于 Bloomberg 报道时间线近似处理。
