        - 联邦协议；端到端加密；自托管；无单一供应商锁定
        - 生态碎片化；UX 弱于 Discord；主流用户基础很有限
      - - Steam Chat (Valve)
        - 游戏替代（现状）
        - Valve 所有；嵌入 Steam 平台（约 130M MAU）
        - Steam 上的 PC 玩家；通过好友列表形成轻量社区
