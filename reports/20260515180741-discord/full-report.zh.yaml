      - number: '3.2'
        title: 直接竞争对手画像和规模对比
        blocks:
          - type: paragraph
            body: >-
              Microsoft Teams 是战略意义最强的既有平台。Business of Apps 和 IDC 报告称，截至 2023 年 Teams 月活跃用户约 320 million，并被打包进 Microsoft
              365，企业席位价格为每用户每月 $6 至 $22；这意味着对超过 345 million 的商业 Microsoft 365 订户而言，Teams
              的边际成本实际上为零。这种分发优势是一个靠消费订阅模式运营的独立社区平台无法复制的结构性优势。Teams 的核心弱点是产品 DNA
              以会议为中心——语音和视频是临时性的，而非持续在线——因此不能原生服务游戏社区、创作者粉丝俱乐部或长线社区讨论。Slack 于 2021 年被 Salesforce 以约 $27.7 billion
              收购，是企业消息通信的标杆既有平台。Business of Apps 和 IDC 估算 Slack 约有 18 million 日活跃用户；虽然原始用户数远小于 Teams，但其按席位定价让每活跃用户收入显著高于
              Discord 的 Nitro。收购后，Slack 被定位为贴近 CRM 的工作空间工具，而不是游戏或创作者平台，这收窄了与 Discord 社区的重叠。Telegram 据 Business of Apps 和
              data.ai 披露，2024 年约有 950 million 月活跃用户，是 WhatsApp 之外最大、且有可能替代 Discord 群聊功能的消息平台。Telegram 免费、全球分发，并拥有成熟 bot
              生态，但缺少 Discord 的持续语音频道和社区 server 模式。Guilded 2021 年被 Roblox 收购，直接瞄准游戏社区管理，但尚未形成临界规模的网络效应；收购后 Guilded
              的准确用户数没有公开披露，形成一个缺口，限制了对此类小众同业竞争风险的量化。
