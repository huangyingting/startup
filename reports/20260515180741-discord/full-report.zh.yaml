  - number: 5
    title: 产品与技术
    sections:
      - number: '5.1'
        title: 核心平台架构与规模
        blocks:
          - type: paragraph
            body: >-
              Discord 的核心平台架构体现了一条多语言工程路线，专为实时、高并发通信优化。实时消息网关基于 Elixir 和 Erlang 构建，借助 BEAM 虚拟机上的分布式 actor 模型，承载数百万条并发
              WebSocket 连接，并兼顾容错和横向扩展。前端 Web 客户端使用 React 和 TypeScript，提供高性能单页应用体验；Electron 支撑跨平台桌面客户端，React Native 负责
              iOS 和 Android 移动应用。持久化消息存储方面，Discord 完成过一次重要的三阶段迁移：最初使用 MongoDB，随后为规模切换到 Apache Cassandra，最后在 2022 年迁至
              ScyllaDB，背后驱动因素是十亿级消息规模下的读取延迟和写入吞吐需求。截至 2023 年，Discord 已存储超过 850 billion 条消息。Google Cloud Platform
              是主要云基础设施，Cloudflare 提供全球 CDN、DDoS 防护和边缘计算。峰值时，Discord 支持约 4 million 名并发语音用户，每月在 19 million 个周活跃服务器上交付 2.5
              billion 分钟语音和视频；这些指标使 Discord 成为消费者互联网里负载最高的实时通信平台之一。
