      - number: '8.6'
        title: 最终尽调要求与投资逻辑失效触发项
        blocks:
          - type: paragraph
            body: >-
              阻止作出有把握投资决定的主要尽调缺口，是缺少审计财报或数据室权限。仅凭 Discord 的公开证据，无法回答决定公司应相对可比公司组享受溢价还是折价的问题：毛利率、EBITDA 轨迹、Nitro
              订阅队列健康度、分业务收入、完整股权结构表和优先权条款、管理层财务模型，以及 IPO 结构。

              投资逻辑失效触发项集中在四个维度：收入增长、游戏市场健康度、监管执法和管理层执行。年化收入增长降至 10% 以下，或游戏 MAU 下降 15%+，都说明 Discord 已触及结构性天花板。2023 COPPA
              和解后，如果 FTC 或 DOJ 发起新的重大监管行动，会增加 Discord 难以转嫁给订阅用户的合规成本。IPO 推迟至 2027
              年之后，会把投资周期再延长两年或更久，且没有流动性保证。任何上述事件都要求立即重新评估信念；若已有持仓，则应启动有纪律的退出流程。
