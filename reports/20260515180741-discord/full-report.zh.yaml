      - number: '8.3'
        title: 乐观 / 基准 / 悲观情景
        blocks:
          - type: paragraph
            body: >-
              估值分析考虑三个不同情景，按收入增长、利润率轨迹和 Discord 在 2026-2027 年 IPO 市场可获得的倍数区分。

              乐观情景假设 Discord 到 2026 年收入达到 $900 million 至 $1 billion，由 Quests 广告规模化、开发者平台增长，以及 Nitro Rewards 捆绑带来的 Nitro
              增购驱动。在这一情景下，Discord 到 2027 年展示出通向 15-20% EBITDA 利润率的可信路径，IPO 时收入倍数重估至 15-20x，并实现 $12-15 billion 股权估值。这要求
              IPO 市场把 Discord 当作高增长消费者科技平台，而不是成熟社交公司来接纳。概率信号：15-20%。

              基准情景假设年化收入增长 20-25%，2026 年达到约 $800-850 million，通向 EBITDA 盈亏平衡但尚未完全盈利，并以 12-15x 收入倍数 IPO，形成 $8-10 billion
              股权估值。在这一情景下，以 2021 年峰值（$15 billion）购买 Discord 股权的投资者会出现重大按市值计价亏损。按 $7-8 billion 区间在老股市场进入，到 2027 年 IPO
              退出可产生 0-25% IRR。概率信号：55-65%。

              悲观情景假设收入增长放缓至年化 15% 以下，经营亏损持续到 2026 年之后，IPO 窗口要求 Discord 接受 7-9x 收入倍数——隐含 $5.5-7 billion 估值——或推迟到 2028
              年或更晚。在这一情景下，按 $15 billion 进入的投资者将面临 50%+ 名义亏损。悲观情景由游戏市场停滞、Quests 广告表现不及预期，或新 CEO 执行失误触发。概率信号：20-25%。
