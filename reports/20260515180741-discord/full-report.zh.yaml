      - number: '1.4'
        title: 增长指标、关键里程碑和不利事件
        blocks:
          - type: paragraph
            body: >-
              Discord 的增长曲线始于 2015 年 5 月公开发布，到 2026 年已成为日活用户数千万的平台。Wikipedia 称，疫情期间远程通信需求推动公司在 2020 年将月活用户翻倍至约 140
              million。Backlinko 数据显示，MAU 从 2019 年 5 月的 56 million 增至 2024 年披露的 200 million。Discord 官方页面给出 2026 年日活超过 90
              million；Wikipedia 信息框记录 2025 年员工数为 501 人，低于 Backlinko 的 870 人估计，后者可能反映裁员后的口径。Backlinko 还估计年收入为 $725
              million，但这是市场估计值，并非公司披露的审计数字。

              关键产品里程碑包括：2016 年推出游戏内 overlay 和 API，2017 年上线 Discord Nitro 以及视频 / 屏幕共享功能，2019 年推出 Go Live 游戏串流功能，2023 年实现
              PS5 语音聊天集成。2025 年，Discord 推出 Nitro Rewards，将 Xbox Game Pass 与 Nitro 权益免费捆绑；尽管 2021 年拒绝了 Microsoft
              收购，该举措仍显示双方游戏合作进一步加深。

              最重要的不利事件是 2023 年 5 月 FTC COPPA 和解以及 2024 年 1 月裁员。FTC 在新闻和新闻稿搜索页面记录，2023 年 5 月与 Discord 达成和解：Discord 同意支付
              $7.8 million，并改革曾影响未成年人的数据收集做法。该和解当时是金额最高的 COPPA 罚款。另一个事件是，Discord 2024 年 1 月宣布裁撤约 17% 员工，即约 170
              人，理由是成本纪律和重组。两项事件合在一起，构成重大的治理、监管和运营拐点，后续尽调章节应持续跟踪。
