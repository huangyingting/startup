          - type: callout
            title: FTC 执法与 TrustPilot 信号指向重大、系统性的儿童安全风险
            body: >-
              2023 年 5 月因 COPPA 和 VPPA 违规达成的 $7.8 M FTC 和解，加上约 2.5 星且被儿童安全和账号封禁投诉主导的 TrustPilot
              评分，指向一个重大且系统性的风险，已经超出表层审核失误。这些信号反映的是产品设计和数据处理决策，监管机构已经出手。尽调应评估 Discord
              和解后的合规计划、欧盟《数字服务法》（DSA）下是否存在未了结监管问询，以及负面品牌信号是否影响企业或品牌合作伙伴对话。
