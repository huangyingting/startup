  - number: 6
    title: 客户情况
    sections:
      - number: '6.1'
        title: 客户基础分层
        blocks:
          - type: paragraph
            body: >-
              Discord 用户基础可以拆成七个可识别分层，每一层都有不同用例、变现画像和战略价值。游戏社区是主导分层：约 90% 的日活用户称自己玩电子游戏，围绕
              Minecraft、Roblox、Valorant、CS2、Apex Legends 等游戏建立的大型服务器拥有数百万成员。由 Sony PlayStation、Nintendo、Riot Games、Epic
              Games 和 Electronic Arts 维护的官方品牌服务器构成第二个具有关键战略意义的分层，它们提供可信背书，并通过主机和游戏集成带来新用户。创作者社区包括 YouTube 人物、Twitch 主播和
              K-pop 粉丝网络，构成第三个分层，主要通过频道 boost 和独家订阅层级变现。学习和学术社区在 COVID-19
              疫情期间急剧扩张，如今已是规模可观的增长分层，吸引更年轻的人群，并具有长期终身价值潜力。技术和开发者社区覆盖开源项目、编程求助服务器和黑客论坛，提供开发者关系价值，也充当非正式产品倡导者。Web3 和加密社区把
              Discord 作为主要协作层，但这一分层波动较大，并因欺诈和诈骗服务器关联带来声誉风险。最后，一个萌芽中的企业相邻分层把 Discord 用于轻量级内部沟通和客户支持，但与 Slack 和 Microsoft
              Teams 相比仍很边缘。Discord 不发布官方分层数据，因此所有规模估计均来自分析师推算。
