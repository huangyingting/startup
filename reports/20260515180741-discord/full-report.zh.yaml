  - number: 4
    title: 财务情况
    sections:
      - number: '4.1'
        title: 收入模式和变现架构
        blocks:
          - type: paragraph
            body: >-
              Discord 的收入引擎主要建立在高级消费订阅上，同时有三条增长中的补充收入流，正在把收入组合推向广告和平台费。

              旗舰产品是 Discord Nitro，按月或按年销售，分两个高级订阅层级。Nitro Basic 定价为每月 $2.99 或每年 $29.99，解锁跨 server 自定义 emoji、50 MB
              文件上传和自定义应用图标。完整 Nitro 层级定价为每月 $9.99 或每年 $99.99，增加 500 MB 上传、HD 串流、动态头像、自定义个人资料、两个包含在内的 Server Boost；截至
              2025 年，还通过 Nitro Rewards 计划提供 Xbox Game Pass（Starter Edition）。Nitro 价格在 discord.com/nitro
              公开列示，但标价不等于实际收入；部分市场提供更低的本地化定价。

              Server Boosts 是独立的社区变现杠杆：用户可以在 Nitro 包含的两个 Boost 之外，以约每 boost 每月 $4.99 购买额外 Boost；多个 Boost 合计提升 server
              的音频质量、emoji 容量和串流限制。Business of Apps 估计，Nitro 及其他订阅产品贡献了 Discord 绝大部分总收入。

              Discord 运营一个开发者变现平台，允许第三方应用和 bot 开发者向用户收取高级应用订阅费（用户或 guild 范围）以及一次性购买费（耐用品和消耗品）。Discord
              官方开发者文档确认了这一框架：SKUs 代表高级供给，Entitlements 跟踪访问权限，Subscriptions 管理循环付款生命周期。Discord
              对这些交易收取平台服务费；具体费率未公开披露，但遵循行业 10–30% 的常见区间。

              Quests 广告产品在 discord.com/quests 展示，允许游戏发行商和品牌为绩效型推广付费：用户完成游戏内任务并获得 Discord 奖励（Orbs、Nitro
              credits、合作伙伴商品）。该产品在不直接向用户收费的情况下变现 Discord 的参与界面；随着 Discord 从纯订阅收入走向多元化，它是一条早期但结构上重要的第四收入线。创作者 server
              订阅是第五条收入流，Discord 从创作者设定的订阅收入中抽取平台费，目前规模仍早。Discord 官方 Creators 页面确认该功能可用，但没有披露抽成率或创作者收入总额。
