      - number: '8.4'
        title: 可比公司分析
        blocks:
          - type: paragraph
            body: >-
              Discord 没有一个能完整覆盖其语音 / 文字 / 游戏社区混合模式的直接公开市场可比公司。最有参考价值的可比对象横跨通信平台收购、消费者社交 IPO 和游戏社交上市公司。

              Slack（Salesforce 于 2021 年 7 月收购）是通信平台价值最强的结构性类比。Salesforce 支付 $27.7 billion 时，Slack 后视 ARR 约 $906
              million，隐含约 30x ARR。Slack 服务企业 B2B 客户，基于合同的 NRR 超过 130%，与 Discord 的 C 端免费增值模式有根本差异。Slack 可比交易为 Discord
              设定的是上限，而不是下限。

              Reddit（NYSE: RDDT，2024 年 3 月 IPO）是最相关的结构性类比：同为以社区为中心架构的消费者社交平台，拥有显著游戏和 Gen-Z 用户，且同样缺少企业收入。Reddit IPO 定价约
              $34 每股，初始市值约 $5.5 billion，对应 2023 年收入 $804 million，隐含约 7x 后视收入。Reddit IPO 后表现有参考价值，但 IPO
              定价代表机构出清价，而不是事后标记。

              Roblox（NYSE: RBLX）从用户社区和游戏角度最接近，2024 年市值约 $20-25 billion，对应 2023 年收入 $2.65 billion（约
              7.5x），但它运营的是虚拟货币平台经济，经济模型结构不同。

              在 2024-2026 年市场环境中，社交和社区型消费者平台的可比公司组收敛在 7-10x 收入区间；若平台展现强增长和可信盈利路径，可能获得溢价。把 10-15x 应用于 Discord 估计 2024E 收入
              $700-750 million，得到 $7-11 billion 隐含估值，低于 2021 年 $15 billion 融资轮。
            claimRefs:
              - CV012
              - CV013
              - CV014
              - CV015
