      - number: '6.2'
        title: 采用轨迹与增长指标
        blocks:
          - type: paragraph
            body: >-
              自 2015 年上线以来，Discord 走出了一条异常强的采用轨迹：注册用户从 2020 年的 100 million 增至 2026 年初估计 600–700 million。月活用户估计为 150–200
              million，意味着 MAU/注册用户比约 20–30%，与其他免费增值通信平台一致。约 90 million 日活用户反映核心游戏和社区基础参与度很深；约 45–60% 的 DAU/MAU
              比率相比消息应用同行更有优势。平台托管 19 million 个周活跃服务器，这一数字最后一次由官方确认是在 2023 年；服务器类型从游戏扩展到创作者、学术、开发者和 Web3，2021
              年以来显著拓宽了游戏之外的可触达市场。移动端在会话中的占比不断提高，iOS 与 Android 合计安装量估计超过 500 million。iOS App Store 评分 4.7
              星，显示移动用户满意度较强。Nitro 订阅用户基础估计为 5–8 million，约占 MAU 的 3–5%，如果转化率改善，上行空间很大。关键问题是，Discord 从未在任何公开沟通中披露同比增长、CAGR
              或官方 MAU 和 DAU 指标，造成可核验增长速度数据的重大缺口，也让可比公司估值分析更复杂。
