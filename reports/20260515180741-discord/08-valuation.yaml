chapter:
  number: 8
  title: Valuation
  summary: >-
    Discord's last disclosed valuation is $15 billion at the September 2021 Series H, implying
    approximately 25x trailing 2023 revenue of $600 million — a multiple materially above the
    current public-comp range of 7-10x for social and community platforms (Reddit IPO ~7x,
    Roblox ~7.5x). Multiple analyst sources and financial media report an IPO is targeted for
    2025 or 2026, but no S-1 has been filed as of May 2026 and the company has disclosed no new
    financing since September 2021. The investment thesis rests on 200M+ MAU, 90M+ DAU,
    gaming-culture network effects, and a plausible path to ~$1B revenue under new CEO Humam
    Sakhnini. The anti-thesis centers on an out-of-market 2021 multiple, absence of public
    financial disclosures, ongoing regulatory exposure, and a gaming-concentration revenue ceiling.
    The base-case fair-value estimate is $8-10B at ~13-15x estimated 2024 revenue. The bull case
    reaches $12-15B on margin proof and multiple re-rating; the bear case reaches $5-7B on
    growth deceleration and an IPO delay. The recommendation is RESEARCH MORE / CONDITIONAL
    TRACK: do not initiate without data-room access or S-1 disclosure.

sections:
  - id: section-V1
    title: Investment Thesis and Anti-Thesis
    body: >-
      Discord's investment thesis is anchored on three structural advantages: community-layer
      moat, gaming-culture network effects, and a diversifying revenue model. With 200 million-plus
      monthly active users and 90 million-plus daily active users as of 2026, Discord has built
      the largest persistent-voice-and-text community infrastructure for gaming globally.
      Approximately 90 percent of users play video games, and Discord is the default communication
      layer for PC, console, and cross-platform gaming communities. Servers are persistent,
      invitation-gated, and moderator-controlled, creating high switching costs: migrating a
      server with hundreds of members, custom emoji, roles, and bots is practically difficult.
      The network effect is strong at the community level — each new member joining a server
      increases value for every existing member — and Discord's API ecosystem with over one
      million active bots deepens the moat through developer lock-in.

      Revenue has grown from an estimated $135 million in 2020 to approximately $575-600 million
      in 2023 per Reuters and Business of Apps, a compound annual growth rate of roughly 63 percent
      over three years before moderating toward 20-30 percent in 2022-2023. New CEO Humam Sakhnini
      brings Activision Blizzard and King experience and is positioned to accelerate the Quests
      advertising product and developer-platform monetization streams that diversify away from pure
      Nitro subscription income.

      The anti-thesis is equally grounded. Discord's $15 billion 2021 valuation was set at the
      peak of a generational consumer-tech multiple expansion that has since fully reversed. The
      current comparable set — Reddit's ~$5.5 billion IPO at ~7x 2023 revenue, Roblox at ~7.5x
      revenue — implies Discord's fair value is in the $8-10 billion range, not $15 billion.
      Discord's revenue ceiling risk is real: 90-plus percent gaming dependency means that
      gaming-market stagnation or a shift in demographics directly impairs the business.
      Monetization remains structurally thin at approximately $2-3 per MAU per year; paid
      conversion of 2-3 percent is substantially below industry benchmarks. The January 2024
      layoffs of ~170 employees confirmed the company was operating at a material loss. The
      Information's adverse reporting that Discord is "struggling to grow up" from a monetization
      standpoint remains relevant context despite the leadership transition.
