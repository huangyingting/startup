callouts:
  - calloutType: risk
    title: "Last-round valuation significantly above current comparable set"
    body: >-
      Discord's $15 billion September 2021 valuation implies approximately 25x trailing 2023 revenue.
      The current public-market comparable set — Reddit at ~7x, Roblox at ~7.5x — prices consumer
      community and gaming platforms at 7-10x revenue. Any investor acquiring Discord equity at or
      above $15 billion faces a high probability of a mark-to-market loss at a 2026-2027 IPO unless
      the company demonstrates materially stronger growth or margin than the comparable set implies.
    claimRefs:
      - CV001
      - CV008
      - CV013
      - CV015
  - calloutType: recommendation
    title: "Data room or IPO S-1 required before initiating any position"
    body: >-
      Discord's investment thesis cannot be confidently underwritten from public evidence alone.
      Gross margin, Nitro cohort retention, revenue by segment, and the capital-structure preference
      stack are all unknown. The recommended diligence path is: (1) request data-room access from
      Discord management or existing shareholders, or (2) wait for S-1 filing which will disclose
      audited financials, cap table, and MD&A. Secondary-market entry below $8 billion may be
      acceptable if supported by a confirmed revenue run-rate of $700 million or more.
    claimRefs:
      - CV029
      - CV039
      - CV040

