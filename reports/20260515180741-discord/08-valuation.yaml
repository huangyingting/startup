  - id: section-V3
    title: "Bull / Base / Bear Scenarios"
    body: >-
      The valuation analysis considers three distinct scenarios differentiated by revenue growth,
      margin trajectory, and the IPO-market multiple that Discord can command in 2026-2027.

      The bull case assumes Discord reaches $900 million to $1 billion in revenue by 2026 driven
      by Quests advertising scale, developer-platform growth, and Nitro upsell from the Nitro
      Rewards bundle. Under this scenario, Discord demonstrates a credible path to 15-20 percent
      EBITDA margin by 2027, attracts re-rating to a 15-20x revenue multiple at IPO, and achieves
      an equity valuation of $12-15 billion. This requires the IPO to be received as a high-growth
      consumer-tech platform rather than a mature social company. Probability signal: 15-20 percent.

      The base case assumes 20-25 percent annualized revenue growth to approximately $800-850
      million in 2026, a path to EBITDA break-even but not full profitability, and an IPO multiple
      of 12-15x revenue producing an equity valuation of $8-10 billion. Under this scenario, an
      investor who purchased Discord equity at the 2021 peak ($15 billion) would experience a
      material mark-to-market loss. Secondary-market entry in the $7-8 billion range would produce
      a 0-25 percent IRR at a 2027 IPO exit. Probability signal: 55-65 percent.

      The bear case assumes revenue growth decelerates to below 15 percent annually, operating
      losses persist beyond 2026, and the IPO window requires Discord to accept a 7-9x revenue
      multiple — implying a $5.5-7 billion valuation — or delay to 2028 or later. Under this
      scenario, an investor at $15 billion would face a 50-plus percent nominal loss. The bear
      case is triggered by gaming-market stagnation, Quests advertising underperformance, or a
      new-CEO execution stumble. Probability signal: 20-25 percent.
