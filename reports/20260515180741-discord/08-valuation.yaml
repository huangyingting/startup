  - id: section-V6
    title: Final Diligence Asks and Thesis-Break Triggers
    body: >-
      The primary diligence gap preventing a confident investment decision is the absence of
      audited financial statements or data-room access. Discord's public evidence base cannot
      answer the questions that govern whether the company deserves a premium or discount to the
      comparable set: gross margin, EBITDA trajectory, Nitro subscriber cohort health, revenue by
      segment, full cap-table and preference terms, management's financial model, and IPO structure.

      Thesis-break triggers focus on four dimensions: revenue growth, gaming market health,
      regulatory enforcement, and management execution. A decline in annualized revenue growth
      below 10 percent or a gaming MAU decline of 15-plus percent would indicate Discord has
      reached a structural ceiling. A new material FTC or DOJ regulatory action post the 2023
      COPPA settlement would add compliance costs Discord cannot easily pass through to subscribers.
      An IPO delay beyond 2027 would extend the investment horizon by two or more additional years
      with no liquidity guarantee. Any of these events would require immediate conviction
      re-evaluation and, in the case of an active position, a disciplined exit process.
    claimRefs:
      - CV029
      - CV033
      - CV034
      - CV036
      - CV040
