companyProfile:
  summary: Character.AI is a Menlo Park-based AI companion platform founded in January 2021 by former Google Brain researchers Noam Shazeer and Daniel De Freitas. Users can create and converse with AI-powered personas covering entertainment, education, emotional support, and creative writing. The platform reached 45M monthly active users and 75M+ cumulative downloads by September 2025, generating an estimated $50M ARR (66% YoY growth). In August 2024, Google licensed the founding team's LLM technology for approximately $2.7B; Shazeer, De Freitas, and ~30 engineers returned to Google, leaving ~140 staff. Character.AI retained ~$2.5B+ in cash, transitioned to the Google Gemini API, and hired Karandeep Anand (ex-Microsoft Teams) as CEO in June 2025. The company faces an unprecedented teen safety litigation cluster (Garcia v. Character Technologies, plus 5+ related suits) and regulatory scrutiny from the FTC under COPPA and the Kids Online Safety Act.
  foundedDate: "2021-01-01"
  founders:
    - name: Noam Shazeer
      role: Co-Founder (departed to Google August 2024)
      background: Google Brain senior researcher; co-author of the Transformer paper; designed Character.AI's original LLM architecture before departing with the Google licensing deal.
      claimRefs: [CO002]
    - name: Daniel De Freitas
      role: Co-Founder (departed to Google August 2024)
      background: Google Brain researcher; built early Character.AI product alongside Shazeer; departed with Google licensing deal.
      claimRefs: [CO002]
    - name: Karandeep Anand
      role: CEO (since June 2025)
      background: Ex-Microsoft Teams and Meta executive; hired to lead the post-Google-deal company; no founder background in LLM research.
      claimRefs: [CO016]
  foundingLocation: Menlo Park, CA
  headquarters: Menlo Park, CA
  productSummary: Character.AI provides an AI companion platform where users create and interact with AI-powered characters representing fictional personas, celebrities, and custom assistants. The platform hosts 18M+ user-generated characters and generates average session times of approximately 2 hours. Core capabilities include multi-turn persona-consistent conversation, user-controlled character creation tools, and a premium Character.AI+ subscription ($9.99/month) offering faster response times and priority access. Technology stack has transitioned from a proprietary LLM (developed by founding team) to Google Gemini API post-August 2024 deal.
  customerFocus: Primarily 18-24 year old consumers (60%+ of users) for entertainment, emotional support, and creative roleplay. Significant teen user population (under 18) creating regulatory and litigation exposure. No enterprise or developer API product available.
  businessModel: "Freemium consumer subscription: 99% of users on free tier; ~1% converting to Character.AI+ at $9.99/month (~$120/year). Total estimated ARR $50M at ~500K subscribers. No enterprise, API, or B2B revenue disclosed."
  stage: late-stage private
  fundingStatus: Series A closed March 2023 ($150M at $1B+ post-money valuation, led by a16z and Spark Capital). Total formal equity raised ~$150M. In August 2024, Google licensing deal provided ~$2.7B in total consideration; company retained estimated $2.5B+ in cash. No subsequent equity financing disclosed. No SEC Form D filing found for the Google deal.
  disclosureProfile: private-undisclosed
  claimRefs: [CO001, CO002, CO005, CO006, CO008, CI009, CI012]

