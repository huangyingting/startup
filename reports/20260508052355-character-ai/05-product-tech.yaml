chapter:
  number: 5
  title: Product and Technology
  summary: |
    Character.AI's core product is a conversational AI platform enabling users to create, interact with,
    and discover AI-powered personas ("characters") for entertainment, creative roleplay, companionship,
    and learning. The platform is built on a proprietary large language model originally developed by
    co-founders Noam Shazeer and Daniel De Freitas at Google Brain, which powered the early product's
    performance advantages in multi-turn dialogue and persona consistency. Following the August 2024
    Google licensing deal under which the founders returned to Google, Character.AI transitioned
    to licensing Google's Gemini API for its inference layer while retaining its unique character
    creation tools, persona memory architecture, and moderation stack. The platform serves 45M MAU
    with an average session time of approximately 2 hours — among the highest engagement metrics
    in consumer AI. Key differentiators include the Character Engine (multi-persona dialogue manager),
    persistent user-character memory, a creator tools ecosystem with 18M+ characters, and platform
    features like c.ai Books (collaborative fiction) and multi-character rooms. Safety infrastructure
    includes teen-specific content filters, response monitoring, and crisis intervention routing.
