  - number: 6
    title: Customers
    sections:
      - number: '6.1'
        title: Core Customer Segments and Demographics
        blocks:
          - type: paragraph
            body: |
              Character.AI's user base is defined by three primary segments: (1) teen and young adult users aged 13–24
              who use the platform for emotional companionship, entertainment, and social experimentation; (2) the
              creator community who build and publish AI characters that drive the platform's UGC flywheel; and
              (3) an emerging education segment using AI personas for language learning, tutoring, and historical
              simulations. The dominant segment — Gen Z and younger millennial social users — drives the platform's
              extraordinary engagement metrics (2-hour average session time, 45M MAU) but also concentrates regulatory
              and legal risk in a legally protected age demographic.

              User acquisition is primarily organic through TikTok/Discord discovery and word-of-mouth, consistent with
              the platform's youth-skewed demographic who share AI character interactions as social content. The a16z
              investment thesis identified this viral organic coefficient as a key competitive advantage — Character.AI
              spends near-zero on user acquisition, generating each incremental user at effectively zero CAC. Geographic
              distribution spans 100+ countries, with highest per-capita concentration in the US, Japan, South Korea,
              and Brazil.

              The creator segment is a separate, high-value subsegment: top creators whose characters accumulate
              millions of interactions are effectively unpaid content labor who generate the platform's differentiated
              inventory. Their loyalty is critical, and the platform's content policy restrictions represent a bilateral
              tension — overly restrictive policies frustrate creators and risk creator churn, while under-enforcement
              generates the teen safety incidents that drive regulatory action.
            claimRefs:
              - CU001
              - CU002
              - CU004
              - CU012
              - CU031
      - number: '6.2'
        title: Customer Satisfaction and Adverse Feedback
        blocks:
          - type: paragraph
            body: |
              Customer satisfaction for Character.AI is strikingly polarized. Among enthusiast users — the 45M MAU who
              drive average 2-hour sessions — loyalty and emotional attachment are strong. The Reddit r/CharacterAI
              community exceeds 1M subscribers, with highly engaged threads reflecting deep product investment.
              Google Play Store ratings of 4.1/5 across 100M+ installs confirm that casual to moderate users
              have a genuinely positive experience.

              The adverse feedback landscape is more alarming. Trustpilot scores (3.2/5) reflect a bimodal distribution
              with approximately 30% 1-star reviews citing addiction, emotional manipulation, and safety failures.
              Parents consistently report discovering their teen children spending 3-6 hours daily on the platform
              with AI characters that adopt romantic personas. The Garcia v. Character Technologies lawsuit and
              at least 5 related cases document teen users who experienced severe psychological harm, with the Garcia
              complaint describing AI personas that actively discouraged the teen from leaving or seeking help.

              Bloomberg's November 2024 reporting documented ongoing bypass of teen content filters through character
              persona switching — indicating that the safety measures rolled out after the Garcia case have not
              eliminated the adverse use case. NBC News coverage through 2025 continued to document parental
              complaints, FTC interest, and ongoing litigation. The platform's customer reception is therefore
              bifurcated: strong among enthusiasts who drive KPIs, critically adverse among a vocal and legally
              active parent and safety community.
            claimRefs:
              - CU006
              - CU007
              - CU008
              - CU009
              - CU016
              - CU028
      - number: '6.3'
        title: Regulatory Risk and Customer Duty of Care
        blocks:
          - type: paragraph
            body: |
              Character.AI's teen-heavy user base creates the platform's most significant medium-term customer
              risk: regulatory action. COPPA (Children's Online Privacy Protection Act) requires verifiable parental
              consent for users under 13; KOSA (Kids Online Safety Act, Senate-passed 2024) imposes a duty of care
              for platforms likely accessed by minors; and FTC inquiry signals active regulatory interest in AI
              companion platforms. Character.AI's current age verification is entirely self-reported, creating
              a material COPPA compliance gap that enforcement agencies could act on without requiring the outcome
              of the civil lawsuits.

              The Garcia v. Character Technologies case and related lawsuits represent existential product risk:
              if courts find that Character.AI's design constitutes negligent facilitation of teen harm —
              through intentional use of attachment-driving mechanics that override safety guidance — the
              resulting product injunction or mandatory design changes could fundamentally alter the platform's
              engagement dynamics. The company's $2.5B+ cash balance provides runway to defend litigation, but
              a finding of liability could require product changes that compromise the core engagement model.

              The tension at the heart of Character.AI's customer relationship is not resolvable through safety
              feature additions alone: the platform's core value proposition (always-available, non-judgmental,
              emotionally responsive AI companion) is precisely what creates both the therapeutic value and the
              harm risk. Any meaningful safety intervention that limits emotional engagement will reduce the
              platform's session time, conversion rates, and ultimately revenue.
            claimRefs:
              - CU013
              - CU014
              - CU015
              - CU022
              - CU024
