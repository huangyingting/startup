        - from: injunction
          to: engagement
          label: reduces
        - from: ftc
          to: engagement
          label: mandates changes
        - from: engagement
          to: revenue
          label: directly reduces
  - id: FV001
    type: kpi
    title: Valuation Snapshot
    description: Key valuation metrics for Character.AI as of May 2026.
    data:
      items:
        - label: Implied Total Valuation (deal)
          value: $2.7B
          detail: August 2024 Google licensing deal implied enterprise value
        - label: Cash on Balance Sheet (est.)
          value: $2.5B+
          detail: Net proceeds from Google deal retained by company
        - label: Platform Business Value (implied)
          value: ~$150-200M
          detail: Enterprise value minus cash = value placed on platform, users, and character library
        - label: Trailing Revenue (ARR)
          value: $50M (est.)
          detail: Unaudited; as of September 2025 press reports; 66% YoY growth
        - label: P/S Multiple (stated EV)
          value: 54x
          detail: $2.7B / $50M ARR = expensive vs. Snap 3.7x, Roblox 11x
        - label: P/S Multiple (platform only)
          value: 3-4x
          detail: $150-200M platform value / $50M ARR = reasonable if cash separated
  - id: FV002
    type: pyramid
    title: Scenario Probability Distribution
    description: Probability-weighted valuation outcomes across bull, base, and bear scenarios.
    data:
      items:
        - label: 'Bear (30% probability): $800M-$1.2B'
          value: 30
          detail: Litigation injunction + ARR collapse + competitive displacement
        - label: 'Base (50% probability): $2.0-2.5B'
          value: 50
          detail: Managed litigation + modest ARR growth + Google API maintained
        - label: 'Bull (20% probability): $4-5B+'
          value: 20
          detail: Litigation resolved + ARR 4x + ARPU expansion + successful exit
  - id: FV003
    type: matrix
    title: Comparable Company Metrics
    description: Comparison of Character.AI to public and private market comparables on key metrics.
    data:
      columns:
        - Revenue / ARR
        - Valuation
        - P/S Multiple
      rows:
        - label: Snap (public)
          values:
            - $4.9B FY2024
            - $18B market cap
            - 3.7x
        - label: Roblox (public)
          values:
            - $3.6B FY2024
            - $40B market cap
            - 11x
        - label: Character.AI (implied)
          values:
            - $50M ARR (est.)
            - $2.7B (deal implied)
            - 54x trailing
  - id: FV004
    type: pyramid
    title: Investment Conviction Pyramid
    description: What would need to be true for each conviction level — building from low to high.
    data:
      items:
        - label: LOW (current) — PASS
          value: 1
          detail: Unaudited financials, undisclosed API terms, active litigation, teen-heavy demographics
        - label: MEDIUM — WATCH
          value: 2
          detail: Garcia settled without injunction, API terms disclosed, ARR $75M+ confirmed
        - label: HIGH — INVEST (minority)
          value: 3
          detail: ARR $150M+, gross margin 65%+, API cost certainty, litigation resolved, developer API launched
        - label: VERY HIGH — LEAD (institutional)
          value: 4
          detail: All above + audited financials + IPO path defined + secondary from a16z at lower price
