            - Engagement design → teen harm liability → product change mandate
            - Safety filters → model-level intervention → Gemini dependency constraint
        - label: Business Model
          values:
            - COPPA violation → regulatory fine → revenue disruption
            - API price increase → margin compression → subscription price hike → churn
        - label: Competitive Position
          values:
            - Regulatory product restrictions → reduced engagement → user migration to competitors
            - Model commoditization → character library loses differentiation → competitor catch-up
  - id: FR003
    type: timeline
    title: Regulatory and Legal Risk Timeline
    description: Key legal and regulatory events and expected decision points.
    data:
      items:
        - label: 'Oct 2024: Garcia Lawsuit Filed'
          date: '2024-10-22'
          detail: Florida Middle District; negligence/products liability theory
          tone: negative
          claimRefs:
            - CR001
        - label: 'Oct 2024: Teen Safety Feature Rollout'
          date: '2024-10-30'
          detail: Age detection, content filters, crisis routing; potential evidence of prior knowledge of risk
          tone: neutral
          claimRefs:
            - CR039
        - label: 'Nov 2024: Bloomberg Filter Bypass Documented'
          date: '2024-11-15'
          detail: Ongoing harm despite new safety features; continued liability exposure
          tone: negative
          claimRefs:
            - CR010
        - label: 'Jan 2025: FTC Interest Reported'
          date: '2025-01-15'
          detail: FTC inquiry into AI companion platforms; pre-enforcement signal
          tone: negative
          claimRefs:
            - CR004
        - label: '2025-2026: Garcia Discovery'
          date: '2025-06-01'
          detail: If not dismissed, discovery could expose internal safety audit history
          tone: negative
          claimRefs:
            - CR026
  - id: FR004
    type: kpi
    title: Risk Quantification Summary
    description: Estimated financial exposure by risk category.
    data:
      items:
        - label: Active Lawsuits (Count)
          value: 6+
          detail: Garcia + related teen harm suits; potential class certification pending
        - label: COPPA Max Penalty Exposure
          value: Potentially $B+
          detail: $51,744/violation/day x millions of potential under-13 user interactions
        - label: Estimated Litigation Settlement Cost
          value: $50M–$500M (est.)
          detail: Comparable Snap settlements $35M+; AI-specific cases lack precedent
        - label: Cash Litigation Runway
          value: 10+ years
          detail: $2.5B+ cash; litigation defense at $20-50M/year = 50-125 year runway
        - label: Competitive Revenue Risk
          value: $50M ARR (full)
          detail: 100% ARR at risk if major churn event from safety/regulatory action
  - id: FR005
    type: dag
    title: 'Risk Cascade: Litigation to Platform Impact'
    description: Causal chain from Garcia lawsuit outcome to platform business impact.
    data:
      nodes:
        - id: garcia
          label: Garcia Lawsuit
          detail: Oct 2024 negligence case; Florida Middle District
          group: legal
        - id: discovery
          label: Discovery Process
          detail: Internal safety documents, product decisions exposed to plaintiffs
          group: legal
        - id: liability
          label: Liability Finding
          detail: Court holds Character.AI liable; products liability theory accepted
          group: legal
        - id: injunction
          label: Injunctive Relief
          detail: Court orders engagement-limiting product changes
          group: legal
        - id: ftc
          label: FTC Enforcement
          detail: COPPA action triggered by liability finding; civil penalties
          group: regulatory
        - id: engagement
          label: Engagement Decline
          detail: Reduced session time, lower conversion, subscriber churn
          group: business
        - id: revenue
          label: Revenue Impact
          detail: ARR declines from $50M; fixed cost base unchanged
          group: business
      edges:
        - from: garcia
          to: discovery
          label: proceeds to
        - from: discovery
          to: liability
