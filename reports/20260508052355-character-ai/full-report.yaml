companyProfile:
  summary: >-
    Character.AI is a Menlo Park-based AI companion platform founded in January 2021 by former Google Brain researchers
    Noam Shazeer and Daniel De Freitas. Users can create and converse with AI-powered personas covering entertainment,
    education, emotional support, and creative writing. The platform reached 45M monthly active users and 75M+
    cumulative downloads by September 2025, generating an estimated $50M ARR (66% YoY growth). In August 2024, Google
    licensed the founding team's LLM technology for approximately $2.7B; Shazeer, De Freitas, and ~30 engineers returned
    to Google, leaving ~140 staff. Character.AI retained ~$2.5B+ in cash, transitioned to the Google Gemini API, and
    hired Karandeep Anand (ex-Microsoft Teams) as CEO in June 2025. The company faces an unprecedented teen safety
    litigation cluster (Garcia v. Character Technologies, plus 5+ related suits) and regulatory scrutiny from the FTC
    under COPPA and the Kids Online Safety Act.
