  - id: TV005
    title: Thesis-Break and Kill Triggers Table
    type: trigger-table
    coverage: full
    notes: Thesis-break triggers require re-evaluation; kill triggers mean immediate full exit.
    claimRefs:
      - CV039
      - CV010
      - CV018
      - CV026
    columns:
      - Trigger
      - Type
      - Probability
      - Financial Impact
      - Action Required
    rows:
      - - 'Garcia case: injunctive product changes mandate session limits'
        - Thesis break / kill
        - High
        - 30-50% ARR decline if engagement reduced
        - Exit if confirmed; watch if appealed
      - - Google terminates Gemini API license
        - Kill trigger
        - Low
        - Platform non-operational without alternative model; full ARR at risk
        - Exit immediately
      - - COPPA/FTC enforcement action with > $200M penalty
        - Thesis break
        - Medium
        - $200M+ cash drain; reputation damage accelerates churn
        - Hold if <$100M and no product change; review if larger
      - - MAU drops below 30M for 2+ consecutive months
        - Thesis break
        - Medium
        - Conversion absolute number reduces; ARR stagnates
        - Evaluate competitive cause; reassess at 25M
      - - Google acquires Character.AI at >$3B
        - Positive thesis break
        - Low
        - Potential 10-20% premium over entry; confirms Google strategic interest
        - Tender or hold based on offer terms
      - - A16z sells secondary shares at <$2B implied
        - Negative signal
        - Low
        - Indicates investor pessimism; potential price discovery mechanism
        - Re-evaluate thesis immediately
