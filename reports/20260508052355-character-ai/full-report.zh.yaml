      - number: '8.3'
        title: 投资建议与最终尽调要求
        blocks:
          - type: paragraph
            body: >
              **建议：按 $2.7B 隐含估值，放弃。**


              Character.AI 的投资逻辑很清晰：平台在 AI 陪伴互动中建立了真实先发优势，拥有 45M MAU、18M 角色的内容库护城河、约 500K 订阅者验证出的付费意愿，以及 $2.5B+
              现金，足以支撑长期诉讼。孤独问题和心理健康服务缺口已有文献记录，也给 AI 陪伴市场带来强宏观顺风。


              反向逻辑同样清晰，而且目前更强：(1) 青少年安全诉讼制造或有负债，范围从可控（和解）到生死级（禁令式产品调整）；(2) 核心技术如今从竞争者兼合作伙伴 Google 处获得许可，条款未披露；(3) OpenAI
              GPT Store 和 Meta AI 的竞争压力威胁用户基盘，而公司尚无可防守的产品差异化回应；(4) 商业模式依赖以青少年为主的用户群实现 1% 转化，且转化靠的功能正是法律责任来源；(5) 按过去收入
              54x 定价，倍数已经计入相当大的成功，安全边际有限。


              重新关注的条件：(a) Garcia 诉讼在没有禁令式产品调整的情况下和解；(b) ARR 超过 $150M，且毛利率改善至 65%+ 有记录支持；(c) 开发者 API 或 B2B 收入流上线；(d)
              Google API 条款披露，并显示到 2028+ 年都有价格确定性；(e) 可提供经审计财务报表或管理账目用于尽调。


              任何投资前的最终尽调要求：经审计收入和 COGS、Google Gemini 许可条款、完整诉讼登记册及预留金额、创始人离开后的员工留存数据、收入多元化产品路线图，以及显示投资者权利的董事会 / 治理文件。
            claimRefs:
              - CV016
