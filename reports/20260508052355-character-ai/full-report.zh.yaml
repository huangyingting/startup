      - number: '1.5'
        title: 竞争位置与战略风险
        blocks:
          - type: paragraph
            body: >
              Character.AI 在 AI 格局中占据独特位置：它是领先的纯消费者 AI 人设平台，用户互动指标远高于大多数 AI 应用。但它的护城河正同时受到多方挑战。OpenAI 的 ChatGPT（含 custom
              GPTs）、Meta AI（含人设功能）、Google Gemini（借授权交易已可访问 Character.AI 的大语言模型），以及 Replika（情感伴侣聚焦）和 Pi.ai（对话式
              AI）等新进入者，都在争夺消费者注意力和 AI 伴侣场景。

              Google 交易后的战略问题是：失去创始人打造的自研大语言模型优势后，Character.AI 能否维持竞争差异化。公司现在依赖授权的大语言模型底座（自有模型加上潜在第三方供应商），而主要技术架构师已在
              Google 任职。这在模型能力提升上形成结构性竞争劣势，尤其面对资源雄厚的基础模型供应商；因此，产品设计、社区、角色库和创作者生态成为剩余主要防御杠杆。

              青少年安全危机是最接近生死线的战略风险。已有多起诉讼提交，源于未成年人据称与 Character.AI 聊天机器人发展出有害关系。最受关注的案件涉及佛罗里达一名 14 岁少年，他在 2024 年 10
              月自杀，其母亲将此与平台上的 AI 伴侣关系联系起来。随后 FTC 审查和国会关注跟进，形成监管压力，可能迫使公司采用年龄验证、内容审核要求和家长同意机制，而这些会实质削弱推动平台超高停留时长的青少年互动。
            claimRefs:
              - CO021
              - CO022
              - CO023
              - CO024
              - CO025
