      - number: '1.4'
        title: 领导团队与组织背景
        blocks:
          - type: paragraph
            body: >
              2024 年 8 月，联合创始人 Noam Shazeer 和 Daniel De Freitas 随 Google 授权交易离开，造成显著领导真空。尤其是 Shazeer，他是 Character.AI
              大语言模型基础设施的技术架构师，也是其模型差异化叙事的主要来源。两位创始人如今都嵌入 Google Gemini 团队，实际上让 Google 在没有正式收购公司的情况下，成为 Character.AI
              智力资本的受益者。

              2025 年 6 月任命 Karandeep Anand 为 CEO，为公司带来重要产品商业化经验。Anand 曾任 Microsoft Teams 产品 VP，此前在 SAP SuccessFactors
              任职，拥有企业 SaaS 产品管理和规模化经验，而这是 Character.AI 此前领导层欠缺的能力。不过，他的背景是企业软件而非消费者 AI，由此带来战略转向问题：Character.AI
              是继续加码消费者社交娱乐定位，还是尝试转向企业和教育，让青少年安全责任更可控？

              Google 交易后的组织挑战在于重建技术领导力。据报道，截至 2025 年中，Character.AI 约有 300–400 名员工，较此前峰值减少，因为部分技术人员随联合创始人去了 Google。公司拥有来自
              $2.7B 授权收入的充足财务跑道，但也面对典型的创始人离职难题：当创始愿景持有者离开，如何留住组织知识、文化和技术速度。
