  - number: 6
    title: 客户情况
    sections:
      - number: '6.1'
        title: 核心客户细分与人口结构
        blocks:
          - type: paragraph
            body: >
              Character.AI 的用户基础由三类主要群体定义：（1）13–24 岁青少年和青年用户，他们用平台做情感陪伴、娱乐和社交实验；（2）构建并发布 AI 角色、驱动平台 UGC 飞轮的创作者社区；（3）将 AI
              人设用于语言学习、辅导和历史模拟的新兴教育细分。主导群体——Gen Z 和更年轻的千禧一代社交用户——推动平台异常高的互动指标（平均 2 小时会话、45M
              MAU），但也把监管和法律风险集中在受法律保护的年龄人群上。


              用户获取主要通过 TikTok / Discord 发现和口碑自然发生，符合平台偏年轻的人口结构，他们会把 AI 角色互动当成社交内容分享。a16z
              的投资逻辑将这种病毒式自然系数视为关键竞争优势——Character.AI 几乎不花钱获客，新增用户的有效 CAC 接近零。地理分布覆盖 100 多个国家，美国、日本、韩国和巴西的人均集中度最高。


              创作者细分是独立且高价值的子群体：头部创作者的角色积累数百万次互动，实际上是无偿内容劳动力，生成平台差异化库存。他们的忠诚度至关重要，而平台内容政策限制构成双边张力——过度严格会挫伤创作者并带来创作者流失风险，执行不足则会引发推动监管行动的青少年安全事件。
