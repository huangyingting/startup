  - number: 7
    title: 风险
    sections:
      - number: '7.1'
        title: 法律与监管风险
        blocks:
          - type: paragraph
            body: >
              Character.AI 近期最实质的风险，是青少年安全诉讼和相伴监管敞口的集群。Garcia v. Character Technologies 案（2024 年 10 月提起）是首个重大的 AI
              陪伴平台青少年伤害责任案件。其法律理论——平台 AI 生成角色回复构成设计缺陷产品，并可预见地造成未成年人情感伤害——在法律上仍属新颖，尚未裁判。如果法院接受产品责任框架，而不是适用 Section 230
              CDA 免责，这一判例会让所有 AI 陪伴平台暴露在未成年人 AI 生成伤害的潜在无限损害赔偿中。


              监管环境会放大这一风险。COPPA 要求 13 岁以下用户取得可验证的家长同意；Character.AI 自报式年龄验证形成实质性执法缺口。Kids Online Safety
              Act（KOSA）要求可能被未成年人访问的平台承担注意义务——考虑到已有青少年伤害事件记录，Character.AI 的产品设计直接落入该标准。Axios 2025 年报道显示，FTC 对 AI
              陪伴平台有询问兴趣，说明监管注意力已经到位。州级监管又叠加了拼图式合规负担。


              Snap Inc. 先例有参考价值：Snap 经历了多年青少年安全诉讼、FTC 执法和州总检察长行动，平台没有遭遇生死风险，但付出了 $35M+ 和解金与显著产品投入。Character.AI
              的现金余额（$2.5B+）提供了充足诉讼跑道，但 Garcia 案若认定责任，可能触发禁令式产品调整，削弱支撑商业模式的参与度设计。
