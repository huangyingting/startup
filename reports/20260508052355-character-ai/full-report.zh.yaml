  - number: 4
    title: 财务情况
    sections:
      - number: '4.1'
        title: 收入模式与变现架构
        blocks:
          - type: paragraph
            body: >
              Character.AI 的主要收入来源是 **Character.AI+ 订阅**，价格为
              $9.99/月（$119.99/年）。订阅提供：更快响应、优先访问最强模型、创建可容纳多个角色同时对话的“房间”，以及长期记忆功能（“Character Memory”）。截至 2025
              年，公司没有广告层、没有企业 / API 层，也没有创作者收入分成——收入完全来自直接消费者订阅。

              收入结构清晰但集中：

              - **订阅 ARR：** 2025 年约 $50M，由 BusinessOfApps 确认（同比增长 66%）；意味着 2024 年约 $30M - **ARPU：** 付费用户约 $9.99/月；所有 MAU
              的混合 ARPU 为 $1.11/年（$50M / 45M MAU） - **转化率：** $50M /（$9.99/月 × 12）意味着平均付费订阅用户约 417K；约占 45M MAU 的 1% -
              **收入质量：** 订阅收入可重复且相对可预测；低流失将意味着高客户终身价值（LTV）

              增长杠杆：在当前 MAU 下，转化率从 1% 提升到 2% 就能把收入翻倍至 $100M，不需要用户增长。国际扩张和企业 / 教育产品开发可能带来有意义的增量收入。

              应用商店经济：Apple 和 Google 抽取应用内订阅收入约 30%，将有效 ARPU 降至约 $7/月。直接 Web 订阅渠道可收回这部分利润，但尚未确认其是主要获客路径。
