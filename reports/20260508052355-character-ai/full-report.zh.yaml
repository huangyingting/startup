  productSummary: >-
    Character.AI 提供 AI 伴侣平台，用户可以创建并互动于 AI 驱动的角色，这些角色可代表虚构人物、名人和定制助手。平台托管超过 18M 个用户生成角色，平均单次会话时长约 2
    小时。核心能力包括多轮且人设一致的对话、用户可控的角色创建工具，以及高级订阅 Character.AI+（$9.99/月），提供更快响应和优先访问。技术栈已从创始团队开发的自研大语言模型，转向 2024 年 8 月交易后的
