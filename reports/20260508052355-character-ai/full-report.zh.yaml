  - number: 8
    title: 估值
    sections:
      - number: '8.1'
        title: 估值背景与当前隐含价值
        blocks:
          - type: paragraph
            body: >
              2024 年 8 月 Google 许可交易，是 Character.AI 估值的主要定价锚。交易中 Google 支付总对价约 $2.7B：约 $2.5B 现金流向
              Character.AI，其余用于补偿创始人（Noam Shazeer 和 Daniel De Freitas）以及约 30 名离职工程师。Google 获得 Character Engine LLM
              许可，创始人则以员工身份回到 Google。


              这种交易结构让 $2.7B 的含义变得相当混乱。它不是传统股权融资轮，不是新投资者按明确投后估值购买公司一定比例股权。更准确地说，这是许可交易，Google 支付的是 (a) LLM 技术访问权，(b)
              关键人才回流，(c) 可被推断为对存续平台的隐含期权。Character Technologies 没有 SEC Form D 文件，表明本次交易没有发行股权——也就是说，从传统风投意义上看，$2.7B
              不是投后估值。


              如果 $2.7B 代表总交易价值（技术许可费 + 人才留存 + 平台支持），且其中约 $2.5B 仍留在 Character.AI 资产负债表上，那么市场把 $2.7B
              当成平台“估值”的共识，可能从根本上就错了。平台独立股权价值——剔除 Google 付款形成的现金后的业务价值——更接近 $150-200M（隐含总企业价值与账上现金的差额）。按 $50M ARR
              计算，平台业务本身对应 3-4x EV/Revenue 倍数，这比常被引用的 54x 倍数更符合其风险画像。
            claimRefs:
              - CV001
              - CV011
