              2024 年 8 月约 $2.7B 的 Google 大语言模型授权交易，是证据窗口内确认 Character.AI 独角兽地位的关键事件。虽然交易结构是许可而非股权，但约 $2.7B 转入
              Character.AI，实际上验证了 $2.7B 以上的企业价值，并为公司独立运营提供充足现金跑道。
