      - number: '1.3'
        title: 产品平台与用户指标
        blocks:
          - type: paragraph
            body: >
              Character.AI 平台托管超过 18M 个 AI 人设（角色），既包括公司创建，也包括用户生成内容，覆盖名人、虚构人物、历史人物、导师、治疗师、角色扮演人物和生产力助手。平台提供 Web 和移动应用；截至
              2025 年初，iOS 与 Google Play 累计 App 下载量超过 75M。月活跃用户估计约 20M，据报道活跃会话平均平台停留时间超过 2 小时——这一指标与
              TikTok、Instagram、YouTube 中互动最深的用户队列相当，甚至更高。

              用户结构明显偏向青少年和年轻成年人（13–24
              岁），他们用平台做创意角色扮演、社交连接、情感支持和学业辅导。这一人口集中既是增长资产，也是公司最重要法律与声誉风险的来源。青少年用户群推动病毒式自然增长和极高互动，但也带来指控：AI
              伴侣体验可能对脆弱未成年人造成心理伤害，尤其围绕拟社会关系和危机内容。

              教育场景是一个有意义的次级产品表面：Character.AI 已将 AI 辅导角色整合进平台，支持跨学科学习。这使公司处在消费者 AI 娱乐与 AI
              驱动教育的交汇点，也可能为教育机构企业合作打开通道，分散纯消费者基础。
            claimRefs:
