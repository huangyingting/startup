        - 没有替代模型，平台无法运行；全部 ARR 面临风险
        - 立即退出
      - - COPPA/FTC 执法行动，罚款 > $200M
        - 投资逻辑破坏
        - 中
        - $200M+ 现金流出；声誉受损会加速流失
        - 若低于 $100M 且无需改产品，则持有；金额更高则复核
      - - MAU 连续 2 个月以上跌破 30M
        - 投资逻辑破坏
        - 中
        - 转化绝对人数减少；ARR 停滞
        - 评估竞争原因；跌至 25M 时重新评估
      - - Google 以 >$3B 收购 Character.AI
        - 正向投资逻辑变化
        - 低
        - 相较入场价可能有 10-20% 溢价；验证 Google 战略兴趣
        - 根据要约条款接受或继续持有
      - - A16z 以隐含估值 <$2B 出售老股
        - 负面信号
        - 低
        - 表明投资者悲观；可能形成价格发现机制
        - 立即重新评估投资逻辑
  - id: TV006
    title: 最终尽调索取清单
    type: diligence-asks
    coverage: full
    notes: 任何投资决策前都必须取得；缺少任一项，都不适合机构投资。
    enumerationScope:
      coverage: exhaustive
      basis: >-
        Six critical diligence items; all required for investment committee approval under standard institutional due
        diligence.
    claimRefs:
      - CV040
      - CV012
      - CV019
    columns:
      - 尽调项目
      - 所需数据
      - 当前状态
      - 重要性
    rows:
      - - 经审计财务报表
        - 收入、COGS、毛利率、订阅用户数（FY2024）
        - 不可得——仅有媒体未审计估计
        - 关键
      - - Google Gemini API 授权条款
        - 定价表、SLA、终止条件、排他性、范围限制
        - 保密——未公开披露
        - 关键
      - - 完整诉讼清单
        - 所有未决案件、当前程序状态、预留金额、和解授权
        - 媒体部分公开；公司未披露
        - 关键
      - - 员工留存数据
        - Google 交易前后员工数趋势；关键工程师离职；薪酬数据
        - 未公开披露
        - 高
      - - 收入多元化路线图
        - API 产品计划、B2B 合作、企业功能、H2 2025+ 产品路线图
        - 除大方向外未披露
        - 高
      - - 股权结构表与治理文件
        - 董事会构成、投资者权利、投票协议、Google 交易后创始人锁定状态
        - 未公开；需要谈判取得
        - 高
