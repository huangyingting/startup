      - number: '2.2'
        title: 市场规模：TAM、SAM 和 SOM
        blocks:
          - type: paragraph
            body: >
              **广义 TAM——对话式 AI：** Grand View Research 估计，2024 年全球对话式 AI 市场为 $11.6B，到 2030 年将以 23.7% CAGR 增至
              $41.4B。MarketsandMarkets 预计到 2031 年为 $49.8B，CAGR 19.6%。这些数字包括企业聊天机器人、语音机器人和虚拟助手——其中大多数并非 Character.AI
              覆盖的市场。

              **狭义 TAM——消费者 AI 伴侣 / 人设：** 目前没有权威分析师清晰定义这一子细分。自下而上估算：英语市场 500M 智能手机用户 × 5% 愿意为 AI 伴侣应用付费 × $10/月 = 每年约
              $300M–$600M 可触达订阅收入。全球扩张（Character.AI 用户分布于 180 多个国家）可将这一规模放大 3–5 倍：每年 $900M–$3B 订阅
              TAM。再加上广告潜力（Character.AI 当前未开发，但这是社交媒体标准收入流）：约 $15 ARPU × 500M 活跃用户 = $7.5B 广告支持型 TAM。

              **SAM——Character.AI 可触达市场：** 由当前变现方式（订阅）和地理覆盖定义。Character.AI+ 全球可用，约 $9.99/月。按 20M MAU 和估计 3–8% 转化率：

              - 低估：600K 订阅用户 × $10/月 × 12 = $72M ARR - 高估：1.6M 订阅用户 × $10/月 × 12 = $192M ARR - BusinessOfApps 报道 2025
              年收入 $50M（同比增长 66%），意味着 2025 年已确认 ARR 约 $50M。

              **SOM——当前实现收入：** 按 BusinessOfApps，2025 年年收入 $50M，代表在混合定价下 20M MAU 约 1.6–5% 转化率。这与 $50M
              数字一致，也显示变现提升仍有大量空间。可比消费者 AI 应用（Replika、Snapchat My AI）未公开披露订阅收入，限制了基准验证。

              **EdTech 邻近市场：** 美国 K–12 AI 辅导市场预计到 2028 年达到 $2.8B（HolonIQ）。Character.AI 在这里具备天然定位，但截至 2025 年尚未推出企业 /
              学校产品。
