companyProfile:
  summary: >-
    Character.AI 是一家位于 Menlo Park 的 AI 伴侣平台，由前 Google Brain 研究员 Noam Shazeer 和 Daniel De Freitas 于 2021 年 1 月创立。用户可以创建并与
    AI 驱动的人设对话，覆盖娱乐、教育、情感支持和创意写作。到 2025 年 9 月，平台月活跃用户达到 45M，累计下载量超过 75M，估计年经常性收入（ARR）为 $50M（同比增长 66%）。2024 年 8 月，Google
    以约 $2.7B 授权创始团队的大语言模型技术；Shazeer、De Freitas 和约 30 名工程师回到 Google，留下约 140 名员工。Character.AI 保留超过 $2.5B 现金，转向 Google
    Gemini API，并于 2025 年 6 月聘请前 Microsoft Teams 高管 Karandeep Anand 担任 CEO。公司正面对前所未有的青少年安全诉讼群（Garcia v. Character
    Technologies 及 5 起以上相关诉讼），也面临 FTC 在 COPPA 和 Kids Online Safety Act 下的监管审视。
  foundedDate: '2021-01-01'
  founders:
    - name: Noam Shazeer
      role: 联合创始人（2024 年 8 月离职加入 Google）
      background: Google Brain 资深研究员；Transformer 论文共同作者；在随 Google 授权交易离开前，设计了 Character.AI 最初的大语言模型架构。
