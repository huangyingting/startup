      - number: '8.2'
        title: 可比分析与情景建模
        blocks:
          - type: paragraph
            body: >
              Character.AI 没有完美的公开市场可比公司。最接近的代理是 Snap（面向青少年 / 年轻成人的社交平台，有创作者 UGC 和订阅实验）、Roblox（青少年人群的用户生成内容平台）和
              Discord（私密社区平台）。三者的变现动态、监管画像和技术栈都显著不同，限制了倍数的直接套用。


              把 Snap 3-4x 的远期 P/S 倍数套用到 Character.AI 的 $50M ARR，对应约 $150-200M 的平台股权价值——与上文现金调整后的分析一致。Roblox 10-15x
              的较高倍数不适用，因为 Character.AI 的 IP 护城河更弱、ARPU 更低。Discord 2021 年 $15B 估值对应 19x 倍数，反映的是加息前环境和近零流失率，而 Character.AI
              并不具备这些条件。


              三种情景模型：乐观情景（$4-5B+）需要 ARR 翻四倍且诉讼解决；基准情景（$2.0-2.5B）基本等同现金价值，并给予适度平台溢价；悲观情景（$800M-$1.2B）则是假设诉讼或 API 中断将 ARR
              打回 $20-30M。按 20% 乐观、50% 基准、30% 悲观加权，情景期望值约为 $1.8-2.2B——低于当前隐含估值，说明在 $2.7B 价格下风险 / 回报不占优。


              ARPU 扩张情景（$1.11/用户 → $3-4/用户，匹配 Snap）是近期最有说服力的催化剂：即使用户不增长，达到 Snap ARPU 水平也会带来 $135-180M ARR，并可在 15x 倍数下支撑
              $2-3B 估值。执行路径需要推出高端功能、合作收入或 API 产品，但目前都未披露。
            claimRefs:
              - CV005
              - CV006
              - CV007
              - CV008
