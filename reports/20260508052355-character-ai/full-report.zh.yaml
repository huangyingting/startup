        title: 平台架构与核心技术
        blocks:
          - type: paragraph
            body: >
              Character.AI 的技术栈围绕三层搭建：基础语言模型（最初为自研，如今通过 Google 授权使用 Gemini API）、Character
              Engine（自研人设管理系统），以及位于其上的创作者工具和安全基础设施。最初的自研大语言模型由 Noam Shazeer 设计——他是 multi-query attention 和 Switch
              Transformers 的发明者——专门服务高吞吐、低成本的角色对话推理，而不是通用推理任务。这一架构选择带来了平台标志性的 2
              小时平均会话时长：模型被调校为能在长多轮对话中保持人设一致，同时成本结构能匹配消费者级访问定价。

              2024 年 8 月 Google 交易后，Character.AI 将推理迁移到 Google Gemini API。这同时带来风险（供应商锁定）和收益（可访问 Gemini 的 1M-token
              上下文窗口，从而实现更丰富的持久记忆）。平台的 Character Engine——管理 18M+ 个不同人设、用户—角色关系记忆和上下文感知回复生成的自研层——仍是主要技术差异化。

              角色创建系统完全无代码，任何用户都能在 5 分钟内发布一个人设，推动 UGC 库自我增长。Shazeer 的技术贡献（multi-query attention、mixture-of-experts）同样是
              Gemini 架构的基础——这意味着，尽管创始人离开，交易后的技术栈仍吸收了让原始 Character.AI 模型具备效率优势的同类架构创新，形成少见的技术连续性。
