      - number: '5.2'
        title: 产品功能集与差异化
        blocks:
          - type: paragraph
            body: >
              Character.AI 的产品表面远超基础聊天界面。核心产品——与用户创建或平台精选的 AI 人设进行 1:1 对话——还叠加了：（a）Multi-Character Rooms（群体角色扮演），（b）c.ai
              Books（连载式协作小说），（c）语音对话模式，（d）聊天内图像生成，以及（e）供用户自我定制的 Personas 功能。这些功能分别服务不同场景：游戏社区（Multi-Character
              Rooms）、创意写作者（Books）、语音原生用户（语音模式）和身份探索者（Personas）。

              18M+
              角色库完全由用户创建，是产品最深的防御性资产。不同于静态内容目录，这个库会自我更新、响应文化变化，并覆盖任何企业内容团队都难以策展的细分生态（粉丝角色、历史人物、导师、治疗师、学习伙伴）。头部角色吸引数百万次互动，形成帕累托式使用分布，将互动和社会证明集中在少数高评分角色上。

              Character.AI 目前没有开发者 API，也没有企业级集成层，产品被限制在第一方消费者分发中。这是一个战略约束，也让它不同于 OpenAI 和 Anthropic；二者的开发者 API 是重要收入流。缺少
              API 可能反映了公司有意聚焦消费者互动深度，而非开发者广度。
