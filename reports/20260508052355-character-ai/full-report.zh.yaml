  - number: 3
    title: 竞争格局
    sections:
      - number: '3.1'
        title: 直接竞争者与格局概览
        blocks:
          - type: paragraph
            body: >
              Character.AI 的竞争格局分三层：（1）直接 AI 伴侣 / 人设平台，争夺同一使用场景和人群；（2）可配置为人设互动的通用 AI 聊天机器人；（3）嵌入既有社交网络、触达 Character.AI
              核心用户群的平台原生 AI 功能。准确理解这些层次，才能衡量竞争风险。

              **直接竞争者：**

              - **Replika**——最早的 AI 伴侣 App；聚焦成年人情感支持；熬过 2023 年 GDPR / 意大利危机；偏成年人，且允许性内容（订阅解锁）。用户结构不同（25–45 岁、情感孤立成年人），但与
              Character.AI 成年伴侣场景重叠。 - **Snapchat My AI**——Snap 嵌入 Snapchat 的 AI；注册用户超过 800M；天然面向青少年；随 Snapchat+
              免费使用。凭零获客成本优势，直接争夺 Character.AI 的青少年人群。 - **Pi.ai**——Inflection AI 的个人 AI 伴侣；2024 年 Microsoft 聘走创始人后关闭 /
              重组；不再是有意义的独立竞争者。

              **平台原生威胁（间接但最危险）：**

              - **Meta AI**——部署在 WhatsApp、Instagram、Facebook、Messenger，覆盖 3B+ 月活用户；包含名人 AI 人设。无需单独下载，且已经拥有 Character.AI
              的青少年人群。 - **ChatGPT custom GPTs**——OpenAI 的 GPT Store 允许创建定制人设；ChatGPT 用户超过 200M；2024
              年加入记忆和人设定制功能。娱乐原生程度较低，但技术上可替代。

              **值得关注的新进入者：**

              - 基于开源模型（LLaMA、Mistral）搭建的角色技术初创公司，审核力度低于 Character.AI；对安全审核不满的青少年用户可能迁移到监管更少的替代品。 -
              **Crushon.AI、Janitor.AI**——NSFW AI 角色扮演平台，以 Character.AI 流失用户为目标受众；监管更少；在 Character.AI 2024 年审核收紧后增长。
