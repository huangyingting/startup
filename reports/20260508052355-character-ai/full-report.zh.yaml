  - number: 2
    title: 市场分析
    sections:
      - number: '2.1'
        title: 市场边界与细分定义
        blocks:
          - type: paragraph
            body: >
              Character.AI 的核心市场是 **AI 人设 / 伴侣聊天** 细分——一个消费者产品品类，用户与具名 AI 人设互动，用于娱乐、情感连接、创意角色扮演和非正式学习。这不同于更广义的对话式 AI
              市场，后者覆盖企业聊天机器人、客服自动化、语音助手和 AI 编码工具。Character.AI 在企业聊天、呼叫中心 AI 或编码助手中并没有实质竞争。

              相关市场边界：

              - **范围内：** 消费者 AI 伴侣 / 人设平台；AI 社交娱乐；AI 角色扮演和创意写作工具；AI 语言学习和轻量 EdTech 聊天机器人；消费者心理健康聊天机器人（与 Replika 部分重叠）。 -
              **范围外：** 企业客服聊天机器人（Intercom、Zendesk AI）、AI 编码（GitHub
              Copilot）、语音助手（Alexa、Siri）、用于生产力任务时的通用聊天机器人（ChatGPT、Gemini）。

              模糊地带：ChatGPT custom GPTs 和 Meta AI 可用于人设聊天，但并不以伴侣平台定位。

              Character.AI 的护城河是 18M+ 角色库、创作者经济和长会话情感互动，而不是大语言模型能力。

              现状替代品包括社交媒体（TikTok、Instagram，用于拟社会娱乐）、约会应用（Tinder、Hinge，用于社交连接）以及传统视频游戏 / 同人小说社区。

              AI 可触达的消费者社交娱乐总时长巨大：美国成年人每天屏幕时间约 7 小时，其中约 2.5 小时花在社交媒体。Character.AI 从最深度用户那里获取约 2 小时 / 次会话，接近 Netflix
              观看时长。
