      - number: '5.3'
        title: 安全基础设施与技术风险
        blocks:
          - type: paragraph
            body: >
              自 2024 年以来，安全基础设施一直是 Character.AI 的核心产品挑战。平台功能——开放式角色扮演、情感绑定、AI 人设进入浪漫角色——带来的审核难题与标准内容审核有质的不同。2024 年 10 月的
              Sewell Setzer 案件暴露出，平台既有关键词内容过滤未能阻止一名 14 岁少年参与最终导致自伤的对话。该案触发产品大修：强制年龄检测、青少年专属内容限制、实时危机转介（至
              NAMI、自杀热线）以及家长监督看板均在 2024 年 10–11 月宣布。


              尽管做了这些改进，NBC News 和 Bloomberg 从 2024 年末到 2025
              年初的报道仍记录了持续事件：青少年用户通过角色人设切换和越狱绕过有害内容过滤——这表明安全架构在规模化下仍有孔洞。执行挑战是系统性的：要在 45M MAU 下、主要靠自动审核，对 18M
              个用户创建角色执行内容政策，如果不接受误杀正常内容，就必须容忍残余有害内容率。平台未披露内容过滤系统的具体误报 / 漏报率。


              创始人离开后，底层技术风险来自 Gemini API 依赖：约 140
              名工程师的团队必须在无法访问训练基础设施或模型权重的情况下，维护、定制并做安全调校一个授权模型。这限制了平台进行深层安全导向模型干预的能力，而这类干预才可能触及青少年安全危机的根因，而不是只加表层过滤。
