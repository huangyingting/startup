      - number: '1.2'
        title: 融资历史与估值
        blocks:
          - type: paragraph
            body: >
              Character.AI 于 2023 年 3 月完成 $150M Series A，报道估值超过 $1B，由 Andreessen Horowitz 领投，A Capital 及其他投资者参与。该轮融资让
              Character.AI 成为独角兽，并为扩展基础设施和安全能力提供现金跑道。公司的融资历史异常集中：Series A 仍是其主要披露机构轮，额外外部融资极少，因此 2024 年 8 月的 Google
              交易成为关键融资事件。

              2024 年 8 月，Google 宣布以约 $2.7B 获得 Character.AI 底层大语言模型技术的非独家许可。作为交易一部分，联合创始人 Noam Shazeer 和 Daniel De
              Freitas 回到 Google 加入 Gemini 团队，另有数名资深技术人员跟随离开。Character.AI 保持公司独立，保留角色平台、品牌和用户基础，$2.7B
              授权收入为资产负债表提供了充足现金跑道。这一结构有时被称作“人才收购”，但技术上是许可协议，使 Google 无需触发完整收购通常面对的反垄断审查，就获得技术人才和 IP。

              交易后，Character.AI 作为独立公司的估值约为 $2.7B，反映授权收入。2025 年 1 月，报道确认公司独立估值约为 $2.7B。公司于 2025 年 6 月宣布 Karandeep Anand（前
              Microsoft 产品 VP）出任新 CEO，意味着公司从创始人主导，转向由职业管理层推动商业化和规模化。
