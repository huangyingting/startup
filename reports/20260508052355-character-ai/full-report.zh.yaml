        title: 成本结构、烧钱速度与资本充足性
        blocks:
          - type: paragraph
            body: >
              Character.AI 不公开披露财务数据。以下成本结构依据可比 AI 消费公司和公开信号估计：

              **大语言模型推理成本：** 最大的可变成本。45M MAU 每月估计产生 10B+ 条消息，即使按每条消息 $0.001（对高质量模型而言偏低），推理成本也可能达到
              $10M+/月（$120M+/年）。Character.AI 可能混合使用自研微调模型（基于如今授权给 Google 的原始 Shazeer 架构）和商业 API 供应商（考虑到关系，Google Gemini
              API 可能优先）。确切推理成本结构是关键未知数。

              **员工数：** Google 交易后，公司约有 140–170 名员工（30 名研究人员随 Shazeer 离开）。按湾区 AI 公司全口径平均成本约 $250K 计算，员工成本约 $37–43M/年。

              **基础设施（非大语言模型）：** 云存储、网络和 App 基础设施估计 $5–10M/年。

              **G&A 与销售 / 营销：** 估计 $10–20M/年；消费者 App 通常靠口碑和应用商店优化获客，付费营销支出很低。

              **估计总烧钱：** 当前规模下为 $150–250M/年，大语言模型推理是主要驱动因素。

              **资本充足性：** 加上 Google 交易 $2.5–2.7B 收入和此前约 $150M 融资，Character.AI 估计现金超过 $2.5B（假设交易前 $150M 烧钱有限）。按
              $200M/年烧钱，这代表超过 12 年现金跑道——极为宽裕，消除了近期 IPO 压力。
