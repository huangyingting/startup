      - number: '2.3'
        title: 买方、用户与付款方分层
        blocks:
          - type: paragraph
            body: >
              Character.AI 的市场呈现消费者双边结构：用户与 AI 角色互动（角色由其他用户或 Character.AI 自身创建），订阅用户为高级访问付费。公司正在追逐企业和教育细分，但尚未公开推出机构产品。

              **细分 1——青少年与青年消费者（核心）：** 13–24 岁，主要在美国、英国、印度和巴西。使用场景：情感陪伴、创意角色扮演（动漫、小说）、名人人设互动、休闲辅导。平均会话时长 2
              小时以上。对更快模型响应和记忆功能有强付费意愿。预算所有者：青少年本人（通常使用礼品卡或可自由支配开支）；偶尔由父母为家庭计划付费。

              **细分 2——成年消费者（增长）：** 25–35 岁，主要在美国。使用场景：创意写作伙伴、语言练习、休闲社交模拟、心理健康。成瘾风险低于青少年细分；ARPU 潜力更高。预算所有者：个人；企业报销并不常见。

              **细分 3——创作者 / 开发者（社区飞轮）：** 构建并发布角色的用户；已发布 18M+ 个角色。价值通过角色发布创造；这不是付费细分，但驱动双边市场供给侧。留存风险：如果审核力度提升，创作者可能迁移到
              Replika、Pi 或 custom GPT 生态。

              **细分 4——教育机构（新兴）：** K–12 学校使用 AI 伴侣做语言学习、辅导或创意写作。公开信息中没有已确认企业交易。新 CEO Anand 的企业背景可能意味着这里会获得投入。
