      - number: '7.3'
        title: 商业模式与产品风险
        blocks:
          - type: paragraph
            body: >
              Character.AI 的商业模式有集中的收入风险。免费层占用户 99%，不产生直接收入；$50M ARR 由约 417K–500K 订阅用户（MAU 的
              1%）支撑。任何导致付费订阅者大规模流失的事件——重大安全事故、监管产品限制，或竞争者价格扰动——都会让收入立即塌缩，成本却不会按比例下降。平台的参与度设计（会话时长优化、情感依恋驱动）同时直接连接收入模式（订阅转化）和责任画像（青少年伤害诉讼）。这形成结构性张力：拉动变现的功能，也制造最大的法律风险。


              按当前规模，内容治理是一个持续且难以彻底解决的挑战。平台有 18M 用户生成角色、45M MAU，仅靠自动化工具执行政策在技术上不可行，除非 (a) 接受显著误杀率、伤害合法用户体验，或 (b)
              容忍残余有害内容比例、招致监管行动。Bloomberg 记录的通过切换角色人设绕过过滤器案例说明，自动化审核不足；Google 交易后的工程团队也缺少模型训练能力，难以落地更深层的模型级安全干预。


              双向审核压力——创作者用户要求更少限制，安全倡导者和监管方要求更多限制——让产品治理长期无解。任何审核决定都会造成某一侧用户流失。平台夹在两股要求之间：商业上需要最大化参与度，法律与监管上必须保护脆弱用户。
            claimRefs:
