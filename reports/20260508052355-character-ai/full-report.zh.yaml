      - number: '6.3'
        title: 监管风险与客户注意义务
        blocks:
          - type: paragraph
            body: >
              Character.AI 以青少年为主的用户结构，带来平台最重大的中期客户风险：监管行动。COPPA（儿童在线隐私保护法）要求 13 岁以下用户取得可验证的家长同意；KOSA（儿童在线安全法，参议院 2024
              年通过）要求可能被未成年人访问的平台承担注意义务；FTC 询问则说明监管方已经盯上 AI 陪伴平台。Character.AI 目前的年龄验证完全依赖用户自报，形成实质性的 COPPA
              合规缺口，执法机构无需等待民事诉讼结果即可采取行动。


              Garcia v. Character Technologies 案及相关诉讼构成生死级产品风险：如果法院认定 Character.AI
              的设计构成对青少年伤害的过失促成——即刻意使用推动依恋的机制，压过安全指引——由此产生的产品禁令或强制设计调整，可能从根本上改变平台的参与度机制。公司 $2.5B+
              现金余额足以支撑诉讼抗辩，但若被认定承担责任，所需产品改造可能削弱核心参与度模型。


              Character.AI 客户关系的核心张力，不能只靠叠加安全功能解决：平台核心价值主张（随时在线、不评判、能作情感回应的 AI
              陪伴）正是同时制造治疗价值与伤害风险的来源。任何真正限制情感互动的安全干预，都会压低平台会话时长、转化率，并最终压低收入。
