chapters:
  - number: 1
    title: 公司概况
    sections:
      - number: '1.1'
        title: 身份、使命与商业模式
        blocks:
          - type: paragraph
            body: >
              Character.AI 于 2021 年在加州 Menlo Park 创立，创始人为 Noam Shazeer 和 Daniel De Freitas，二人均曾是 Google Brain
              研究员，在大语言模型领域积累深厚。Shazeer 是 Transformer 架构的共同发明者，曾搭建 Google 的 LaMDA/Meena 对话式 AI 系统；De Freitas
              是他的长期合作者。公司的核心使命是让个性化 AI 伴侣和创意工具普惠化——任何人都能构建、发现并对话于 AI 人设，这些人设覆盖娱乐、角色扮演、社交连接、教育和生产力。


              商业模式建立在免费增值订阅上。免费层提供无限 AI 角色对话，响应速度为标准档。高级订阅 Character.AI+ 约
              $9.99/月，提供优先访问、更快响应、早期功能访问和专属角色内容。企业层面向教育机构和企业。平台还让用户构建并发布自己的 AI 角色，撬动创作者经济参与，形成网络效应，降低内容成本，并提升互动多样性。


              Character.AI 核心平台差异化来自以人设为中心的架构——它不是一个通用 AI 助手，而是提供数百万个带有不同性格、知识库和对话风格的专门 AI
              角色。这个设计拉高了平台停留时长：据报道，活跃用户平均单次会话超过 2 小时，使 Character.AI 跻身所有品类中互动强度最高的消费者应用之一。
