      - number: '7.2'
        title: 技术与竞争风险
        blocks:
          - type: paragraph
            body: >
              2024 年 8 月 Google 交易改变了 Character.AI 的风险画像：公司从拥有可防守 LLM 技术护城河（由创始团队打造），变成核心推理能力从竞争者兼合作伙伴处获得许可的公司。Gemini
              API 依赖带来多条风险线：(a) 定价风险（Character.AI 增长后，Google 可上调 API 成本），(b) 终止风险（不利许可条款可能迫使公司用昂贵模型微调来替代），(c)
              利益冲突风险（Google 自身也有 Gemini 品牌下的 AI 陪伴野心），(d) 反向关键人风险（创始团队如今在 Google 工作，并为竞争模型栈做贡献）。


              竞争格局正在升温。OpenAI 的 GPT Store（2023 年 12 月推出）允许开发者和消费者基于 GPT-4o 创建角色形象——模型更强，且拥有 100M+ 用户分发优势。Meta 将 AI 植入
              WhatsApp、Instagram 和 Messenger，为 3B+ 用户提供零摩擦分发。开源模型（Llama 2/3、Mistral、DeepSeek）正被独立开发者以近零成本微调用于角色扮演，直接冲击
              Character.AI 的创作者经济。平台 18M 角色库的网络效应，是剩下最强竞争护城河，但它是内容护城河，不是技术护城河——历史上，内容护城河比技术护城河更容易被替代。


              创始团队离开后的人才留存，是一个被低估的风险。加入 Character.AI、原本希望与 Noam Shazeer 一起做前沿 LLM 研究的工程师，如今运营的是一家授权 API 消费公司。能做原创模型研究的高级
              ML 工程师需求极端旺盛；一旦流失，平台角色引擎和安全基础设施的技术差异化会进一步被侵蚀。
