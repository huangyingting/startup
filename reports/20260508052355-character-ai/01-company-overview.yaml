callouts:
  - calloutType: insight
    title: "Google Deal Validates $2.7B Unicorn Status"
    body: "The August 2024 Google LLM licensing deal for approximately $2.7B is the pivotal unicorn-confirming event for Character.AI within the evidence window. While structured as a license rather than equity, the deal transferred approximately $2.7B to Character.AI, effectively validating a $2.7B+ enterprise value and providing substantial runway for the company's independent operation."
    claimRefs: [CO006, CO007]

  - calloutType: risk
    title: "Founder Departure Creates Technical Moat Risk"
    body: "Co-founders Noam Shazeer and Daniel De Freitas, the primary architects of Character.AI's LLM advantage, now work for Google. This leaves Character.AI technically dependent on third-party or licensed models for frontier AI improvements, creating a structural competitive disadvantage vs. Google (which now has both the talent and a non-exclusive license to the original technology)."
    claimRefs: [CO016, CO017]

