callouts:
  - calloutType: insight
    title: "1% MAU conversion is the single most important financial lever"
    body: "At 45M MAU, each 1% incremental conversion improvement (from 1% to 2%) adds ~$54M in annual revenue at $9.99/month — more than doubling 2025 revenue with no MAU growth required. This makes conversion rate, not user growth, the primary financial upside driver."
    claimRefs: [CI004, CI005]

  - calloutType: risk
    title: "LLM inference cost is an unquantified burn risk"
    body: "Character.AI's message volume (likely 10B+ monthly interactions from 45M MAU) creates a potential inference cost of $120M+/year at $0.001/message — 2.4x its entire 2025 revenue. If Character.AI relies on premium commercial LLMs (GPT-4 tier), this cost escalates dramatically and may make the business model structurally loss-making without pricing increases."
    claimRefs: [CI007, CI008]

  - calloutType: assumption
    title: "Google deal valuation is an anomaly, not a market signal"
    body: "The $2.5–2.7B 'valuation' from the Google deal is a license transaction where Google paid for LLM IP access and talent — not for an equity stake in the business at fair value. The independent company's true equity value may be $500M–$1.5B based on revenue multiples alone, making the $2.7B balance sheet the primary value-driver, not the operating business."
    claimRefs: [CI010, CI011, CI014]

