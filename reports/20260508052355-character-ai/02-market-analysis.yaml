  evidenceGaps:
    - type: missing-source
      severity: high
      topic: teen-user-percentage-confirmed
      missingEvidence: >-
        Character.AI has not disclosed the percentage of its 20M–45M MAU that are under 18; demographic estimates come
        from lawsuit filings and survey data, not company-confirmed statistics.
      whyItMatters: >-
        Regulatory exposure under COPPA and proposed age-verification laws depends directly on minor user concentration;
        if 50%+ of MAU is under 18, Character.AI faces potential loss of a majority of its user base.
      diligencePath: >-
        Request user age distribution data from CPO; cross-reference with COPPA compliance records and app store
        age-rating confirmations.
      relatedQuestionRefs:
        - QM010
        - QM013
    - type: missing-source
      severity: high
      topic: state-age-verification-impact
      missingEvidence: >-
        No quantified estimate exists for how many Character.AI users would be removed by biometric age-verification
        requirements; the regulatory pass-through rate is unknown.
      whyItMatters: >-
        A 40% MAU reduction (conservative) at current monetization would reduce revenue by $20M and eliminate long-term
        teen user cohort growth.
      diligencePath: >-
        Model 10%/20%/40% MAU loss scenarios against revenue sensitivity; confirm whether age verification is
        technically feasible at low friction.
      relatedQuestionRefs:
        - QM013
        - QM015
    - type: private-evidence-only
      severity: medium
      topic: international-geographic-revenue
      missingEvidence: >-
        Character.AI does not publicly disclose revenue by geography; the split between US and international markets
        (including India, Brazil, Korea) is unknown.
      whyItMatters: >-
        High international revenue concentration in markets with weaker COPPA-equivalent laws could reduce regulatory
        risk; or conversely, GDPR exposure in the EU could add compliance burden.
      diligencePath: Request geographic revenue breakdown from CFO; assess GDPR article 8 age of consent implications for EU users.
      relatedQuestionRefs:
        - QM024
