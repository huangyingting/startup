callouts:
  - calloutType: insight
    title: No authoritative consumer AI companion market exists
    body: >-
      All major analyst market sizes for 'conversational AI' include enterprise chatbots, voice assistants, and coding
      AI — not the consumer persona segment. Character.AI is in an underserved data environment where its own revenue
      ($50M) is the most reliable market anchor.
    claimRefs:
      - CM004
      - CM005
  - calloutType: risk
    title: Regulation could destroy the teen segment
    body: >-
      Proposed COPPA 2.0 and state age-verification bills (e.g., Utah, Texas) would require biometric age verification
      for users under 16–18. If Character.AI cannot verify user age at scale, it could be blocked from app stores in key
      states or globally, removing an estimated 40–60% of its core user base.
    claimRefs:
      - CM011
      - CM015
      - CM016
  - calloutType: assumption
    title: Character.AI's TAM includes ad-supported revenue it has not yet monetized
    body: >-
      At 20M MAU and 2hr average session time, Character.AI has a social-media-scale engagement asset. An ad-supported
      tier at even $5 ARPU would add $100M+ in annual revenue. This has not been announced but is structurally
      available. The caveat: teen users are COPPA-restricted from behavioral advertising.
    claimRefs:
      - CM007
      - CM009
