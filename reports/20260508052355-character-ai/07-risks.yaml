chapter:
  number: 7
  title: Risks
  summary: |
    Character.AI faces an unusually concentrated risk profile for a consumer AI company at its scale. The
    paramount near-term risk is the teen safety litigation cluster (6+ active lawsuits, including the Garcia
    v. Character Technologies case stemming from the October 2024 Sewell Setzer suicide) combined with
    regulatory pressure from the FTC and potential enforcement under COPPA and the Kids Online Safety Act.
    A second major risk is the technology dependency created by the August 2024 Google deal: by returning
    the founding LLM team to Google in exchange for a $2.7B licensing payment, Character.AI converted its
    core technology moat (proprietary model) into a vendor dependency (Google Gemini API license), creating
    single-vendor concentration in the most critical technical layer. A third risk is the fundamental tension
    in the product design: the mechanisms that drive the platform's extraordinary engagement (emotional
    attachment, parasocial bond design, non-judgmental AI personas) are precisely the mechanisms that create
    the duty-of-care liability for teen users. Any regulatory intervention that mandates engagement-limiting
    safety features threatens to destroy the platform's core KPIs — session time, retention, and conversion.
    Additional risks include talent retention post-founder departure, content moderation at scale, and
    competitive displacement by better-capitalized AI labs.
