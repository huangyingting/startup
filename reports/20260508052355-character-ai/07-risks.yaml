  claims:
    - id: CR001
      statement: >-
        The Garcia v. Character Technologies lawsuit (filed October 2024, Florida Middle District) is the most material
        legal risk Character.AI faces: if the court finds the platform liable for negligent design under a products
        liability theory, the precedent could trigger industry-wide injunctive relief requirements that would mandate
        engagement-limiting safety features across all AI companion platforms.
      type: inferred
      topic: garcia-lawsuit-risk
      sourceRefs:
        - SR001
        - SR002
      confidence: high
      freshness: current
      answersQuestionRefs:
        - QR001
    - id: CR002
      statement: >-
        NBC News reported at least 5 distinct teen harm lawsuits against Character.AI as of early 2025; this cluster
        pattern suggests systemic platform liability rather than isolated incidents, and creates a path for class action
        certification that would multiply discovery costs and potential damages.
      type: third-party-reported
      topic: lawsuit-cluster
      sourceRefs:
        - SR002
        - SR003
      confidence: high
      freshness: current
      answersQuestionRefs:
        - QR002
    - id: CR003
      statement: >-
        The Garcia complaint's theory of liability — that Character.AI's platform is a defectively designed product that
        foreseeably causes emotional harm to minors — relies on a products liability framework that has not yet been
        applied to AI-generated content; the legal novelty of this theory creates uncertainty for both defendants and
        plaintiffs.
      type: inferred
      topic: products-liability-theory
      sourceRefs:
        - SR001
        - SR005
      confidence: medium
      freshness: current
      answersQuestionRefs:
        - QR001
        - QR003
    - id: CR004
      statement: >-
        COPPA (Children's Online Privacy Protection Act) requires verifiable parental consent for collecting data from
        users under 13; Character.AI's age verification relies entirely on self-reporting, creating a material
        compliance gap that the FTC can enforce through civil penalties of up to $51,744 per violation per day —
        potentially catastrophic given the likely scale of under-13 users on the platform.
      type: inferred
      topic: coppa-violation-risk
      sourceRefs:
        - SR004
        - SR006
      confidence: high
      freshness: current
      answersQuestionRefs:
        - QR004
    - id: CR005
      statement: >-
        The Kids Online Safety Act (KOSA), passed by the US Senate in 2024, imposes a 'duty of care' obligation on
        platforms likely to be accessed by minors to mitigate depression, anxiety, self-harm, and eating disorders —
        each of which is documented in Character.AI-related lawsuits, creating potential KOSA enforcement liability on
        top of COPPA exposure.
      type: observed
      topic: kosa-liability
      sourceRefs:
        - SR005
        - SR004
      confidence: high
      freshness: current
      answersQuestionRefs:
        - QR004
        - QR005
    - id: CR006
      statement: >-
        The August 2024 Google deal converted Character.AI's core technology moat (proprietary LLM trained by Noam
        Shazeer and Daniel De Freitas) into a vendor dependency (Google Gemini API license) — a risk transformation from
        model risk to contract risk, where the platform's core capabilities now depend on Google's continued API
        availability, pricing, and willingness to maintain favorable terms.
      type: inferred
      topic: google-dependency-risk
      sourceRefs:
        - SR007
        - SR008
      confidence: high
      freshness: current
      answersQuestionRefs:
        - QR006
    - id: CR007
      statement: >-
        Google holds a dual-conflict-of-interest position relative to Character.AI: as a licensee/partner (Gemini API)
        and as a potential competitor (Google's own AI companion products under the Gemini and Bard brands). If Google
        launches a direct consumer AI companion competitor, it will have access to the technical insights of the
        founding team and the strategic context of the licensing relationship.
      type: inferred
      topic: google-conflict-of-interest
      sourceRefs:
        - SR007
