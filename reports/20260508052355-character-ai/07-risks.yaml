sections:
  - id: SR-S1
    title: Legal and Regulatory Risk
    body: |
      Character.AI's most material near-term risk is the cluster of teen safety lawsuits and associated
      regulatory exposure. The Garcia v. Character Technologies case (filed October 2024) represents the
      first major AI companion platform liability case for teen harm. The legal theory — that the platform's
      AI-generated character responses constitute a defectively designed product that foreseeably causes
      emotional harm to minors — is legally novel and has not yet been adjudicated. If courts accept a products
      liability framework rather than applying Section 230 CDA immunity, the precedent would expose all AI
      companion platforms to potentially unlimited damages for AI-generated harm to minor users.

      The regulatory environment compounds this risk. COPPA requires verifiable parental consent for users
      under 13; Character.AI's self-reported age verification creates a material enforcement gap. The Kids
      Online Safety Act (KOSA) imposes a duty of care for platforms likely accessed by minors — a standard
      that Character.AI's product design directly implicates given the documented teen harm incidents. FTC
      inquiry interest in AI companion platforms (per Axios 2025 reporting) signals active regulatory
      attention. State-level regulation adds a patchwork compliance burden.

      The Snap Inc. precedent is instructive: Snap faced multiple years of teen safety litigation, FTC
      enforcement, and state AG actions without existential platform risk, but at a cost of $35M+ in
      settlements and significant product investment. Character.AI's cash balance ($2.5B+) provides
      substantial litigation runway, but a liability finding in Garcia could trigger injunctive product
      changes that compromise the engagement design that drives the business model.
