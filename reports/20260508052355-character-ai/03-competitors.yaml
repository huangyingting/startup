  claims:
    - id: CP001
      statement: >-
        Replika is a direct AI companion competitor focused on adult emotional support and relationship simulation, with
        an estimated 10M+ users; it allows NSFW content unlock for subscribers, targeting a different demographic than
        Character.AI's teen-heavy user base.
      type: observed
      topic: direct-competitor
      sourceRefs:
        - SP002
      confidence: medium
      freshness: current
      answersQuestionRefs:
        - QP001
        - QP002
    - id: CP002
      statement: >-
        Snapchat's My AI is embedded within Snapchat's 800M+ registered user base, providing AI chat functionality
        natively within the teen social network — giving it zero-download access to Character.AI's core demographic at
        Snapchat+ pricing ($3.99/month), below Character.AI+'s $9.99/month.
      type: observed
      topic: platform-native-threat
      sourceRefs:
        - SP001
        - SP004
      confidence: medium
      freshness: current
      answersQuestionRefs:
        - QP003
        - QP004
    - id: CP003
      statement: >-
        Meta AI is deployed across WhatsApp, Instagram, Facebook, and Messenger to over 3 billion monthly active users,
        offering AI persona interaction through celebrity AI personas — a direct substitute for Character.AI's
        famous-person characters with zero acquisition cost advantage.
      type: observed
      topic: platform-native-threat
      sourceRefs:
        - SP010
        - SP012
      confidence: medium
      freshness: current
      answersQuestionRefs:
        - QP003
        - QP005
    - id: CP004
      statement: >-
        Platform-native AI competitors (Meta AI, Snapchat My AI) represent the most dangerous competitive threat because
        they require no incremental user acquisition — they inherit the existing social network user base that already
        includes Character.AI's teen demographic.
      type: inferred
      topic: competitive-threat-severity
      sourceRefs:
        - SP002
        - SP004
        - SP006
      confidence: medium
      freshness: current
      answersQuestionRefs:
        - QP004
        - QP005
    - id: CP005
      statement: >-
        Unmoderated AI roleplay platforms (Crushon.AI, Janitor.AI) are capturing Character.AI users who are frustrated
        with the 2024 content moderation crackdown; these platforms explicitly market themselves as alternatives to
        censored AI companions and are growing in niche communities.
      type: observed
      topic: emerging-competitor
      sourceRefs:
        - SP014
        - SP008
      confidence: low
      freshness: current
      answersQuestionRefs:
        - QP006
    - id: CP006
      statement: >-
        ChatGPT's custom GPTs, launched in November 2023, allow users to create custom AI personas — a direct functional
        equivalent to Character.AI's character creation tool — operated at scale within OpenAI's 200M+ ChatGPT user
        base.
      type: observed
      topic: direct-competitor
      sourceRefs:
        - SP004
        - SP026
      confidence: high
      freshness: current
      answersQuestionRefs:
        - QP002
        - QP007
    - id: CP007
      statement: >-
        Inflection AI's Pi companion app has been effectively shut down as a standalone product after Microsoft hired
        the founders in 2024; Pi's users have dispersed to other platforms, slightly benefiting Character.AI and other
        AI companion apps.
      type: observed
      topic: competitor-exit
      sourceRefs:
        - SP003
        - SP005
      confidence: medium
      freshness: current
      answersQuestionRefs:
        - QP008
    - id: CP008
      statement: >-
        Character.AI's subscription pricing at $9.99/month (or $119.99/year) is competitively positioned against Replika
        Pro at $19.99/month, but faces pressure from Meta AI (free) and Snapchat My AI (bundled at $3.99/month) at the
        lower end.
      type: observed
      topic: pricing-comparison
      sourceRefs:
        - SP022
        - SP002
      confidence: medium
      freshness: current
      answersQuestionRefs:
        - QP009
    - id: CP009
      statement: >-
        Meta AI's decision to offer its AI companion features as a free product embedded in existing social apps creates
        a price floor of zero for the category, challenging Character.AI's ability to justify a paid subscription for
        casual users.
      type: inferred
      topic: pricing-threat
      sourceRefs:
        - SP010
        - SP004
      confidence: medium
      freshness: current
      answersQuestionRefs:
        - QP009
        - QP010
    - id: CP010
      statement: >-
        Character.AI's 18M+ user-created character library is its most durable competitive moat — it took years to build
        and requires simultaneously attracting both creators and audiences, creating a classic cold-start barrier for
        new entrants.
      type: inferred
      topic: content-moat
      sourceRefs:
        - SP001
        - SP010
      confidence: high
      freshness: current
      answersQuestionRefs:
        - QP011
        - QP012
    - id: CP011
      statement: >-
        Character.AI's average session time of 2+ hours represents its strongest engagement metric differentiator — no
        known competitor achieves this per-session engagement depth, which reflects the emotional investment users make
        in character relationships.
