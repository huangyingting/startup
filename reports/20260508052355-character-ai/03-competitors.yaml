        No quantified data exists on user migration from Character.AI to Crushon.AI or other NSFW alternatives
        post-moderation crackdown; Reddit and community surveys are anecdotal only.
      whyItMatters: >-
        If character removal is driving measurable user attrition to unmoderated alternatives, Character.AI's content
        moderation strategy is destroying retention without achieving safety goals.
      diligencePath: >-
        Request retention and churn data by cohort pre/post moderation changes; cross-check against Crushon.AI's public
        download stats.
      relatedQuestionRefs:
