callouts:
  - calloutType: risk
    title: Meta AI and Snapchat My AI are the existential distribution threats
    body: >-
      Both Meta AI and Snapchat My AI have zero-install access to Character.AI's teen demographic at global scale. If
      these platforms match Character.AI's persona depth (creator tools, character library), Character.AI loses its
      primary differentiator without any new user acquiring cost advantage.
    claimRefs:
      - CP003
      - CP004
  - calloutType: strength
    title: The 18M character library is a genuine cold-start moat
    body: >-
      Character.AI's 18M+ user-created character library represents years of community content investment. No competitor
      can replicate this overnight — it requires simultaneously attracting creators and readers. This is the same
      structural moat YouTube has in video. The risk is that safety-driven character removal erodes the moat from
      within.
    claimRefs:
      - CP010
  - calloutType: insight
    title: NSFW alternatives are an untracked competitive threat
    body: >-
      Crushon.AI, Janitor.AI, and similar unmoderated AI roleplay platforms are absorbing users frustrated with
      Character.AI's 2024 content moderation changes. These platforms operate in a legal gray zone that Character.AI has
      vacated, creating a niche competitor segment that benefits from Character.AI's regulatory compliance costs.
    claimRefs:
      - CP005
      - CP012
