        - SP006
      confidence: medium
      freshness: current
      answersQuestionRefs:
        - QP011
    - id: CP012
      statement: >-
        Character.AI's content moderation tightening in 2024 (removing NSFW content and controversial characters
        post-lawsuit) is a moat-weakening action: it reduces the supply of content that drives creator engagement and
