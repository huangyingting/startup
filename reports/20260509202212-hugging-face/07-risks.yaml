    title: 'Highest Severity Risk: Cloud Bundling'
    body: >-
      Cloud provider bundling of model hub capabilities (AWS Bedrock, Google Vertex AI) is the single highest-severity
      risk, combining high likelihood with high potential impact on enterprise revenue.
    claimRefs:
