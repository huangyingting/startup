  - id: KR002
    type: warning
    title: 'Ongoing Security Threat: Malicious Models'
    body: >-
      Despite Safetensors adoption, security researchers confirm malicious models can still be uploaded and distributed
      via the HF Hub, creating ongoing enterprise trust and regulatory risk.
    claimRefs:
      - CR005
  - id: KR003
    type: insight
    title: Structural Financial Risk
    body: >-
      The open-source monetization model creates inherent tension: the platform's community value depends on free
      access, while financial sustainability requires converting a fraction to enterprise paying accounts.
    claimRefs:
      - CR016
