      - number: '1.6'
        title: Exhibits
        blocks:
          - type: callout
            title: Network-Effect Flywheel at Massive Scale
            body: >
              With 2 million models, 500K datasets, and 10 million users, the Hugging Face Hub has achieved the critical
              mass necessary for a self-reinforcing network effect. Each new model contribution attracts more users;
              more users attract more contributors. This dynamic makes the platform extremely difficult to displace and
              explains why major tech companies (Google, Amazon, Nvidia) chose to invest rather than build competing
              alternatives from scratch.
            calloutType: strength
            claimRefs:
              - CO026
              - CO027
              - CO028
              - CO029
          - type: callout
            title: Open-Source Monetization Tension
            body: >
              Hugging Face's open-access ethos creates a structural challenge: the majority of users pay nothing.
              Converting community scale into enterprise revenue requires continuous product differentiation—private
              hubs, SLA-backed inference, compliance features—that free users do not need. Security vulnerabilities in
              community-uploaded models (e.g., malicious pickle files) and license drift in downstream applications
              present reputational and legal risks that require ongoing investment.
            calloutType: risk
            claimRefs:
              - CO045
              - CO046
          - type: callout
            title: Strategic Investors as Platform Partners
            body: >
              The Series D investor roster—Salesforce, Google, Amazon, Nvidia, Intel, AMD, IBM, Qualcomm—is unusual in
              that each investor is also a platform partner contributing models, datasets, or compute resources to the
              Hub. This alignment creates strong incentives for continued platform investment but may also introduce
              governance complexity if investor-partners develop competing interests or seek preferential API terms.
