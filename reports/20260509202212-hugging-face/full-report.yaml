companyProfile:
  summary: >
    Hugging Face is a Brooklyn-based AI platform company that has become the dominant open-source hub for machine
    learning models, datasets, and applications. Founded in 2016 by three French entrepreneurs, the company pivoted from
    a consumer chatbot to building the infrastructure that powers modern ML development. Its Transformers library (2018)
    and Model Hub (2020) catalyzed a network-effect platform that now hosts 2M+ models and 10M+ users. The company
    monetizes through Enterprise Hub subscriptions, Inference API, and AutoTrain, generating approximately $130M ARR in
    2024. It raised $235M at a $4.5B valuation in August 2023 with strategic backing from Google, Amazon, Nvidia,
    Salesforce, and Intel.
