  - CV027
  - CV028
  - CV029
  - CV030
  enumerationScope:
    coverage: partial
    basis: 'Ten critical diligence asks enumerated based on public evidence gaps and standard growth equity due diligence
      frameworks. Internal management accounts and board materials would expand this list substantially.

      '
  columns:
  - Diligence Ask
  - Priority
  - Rationale
  rows:
  - - Independently audited or management-reviewed ARR by product line (quarterly)
    - Critical
    - All public ARR estimates are third-party; unit economics unknown without verified revenue
  - - Enterprise customer gross and net churn rate by cohort
    - Critical
    - Enterprise stickiness fundamental to platform moat; absence is a critical evidence gap
  - - Gross margin by product line (Hub subscriptions vs. Inference API vs. Compute)
    - Critical
    - Infrastructure-heavy inference may have low gross margins relative to software tier
  - - 'Customer concentration: top 10 customers as % of revenue'
    - High
    - Hyperscaler partnerships could create disproportionate concentration risk
  - - CAC and LTV by acquisition channel (organic vs. outbound enterprise)
    - High
    - Freemium conversion economics are entirely unverified from public sources
  - - 'Headcount cost breakdown: R&D vs. G&A vs. Sales and Marketing split'
    - High
    - ~635 employees; cost structure and burn rate determine time to profitability
  - - Regulatory compliance roadmap for EU AI Act GPAI obligations
    - High
    - GPAI classification may impose costly transparency and documentation obligations
  - - 'Security audit reports: malicious model incident frequency and remediation metrics'
    - High
    - Safetensors adoption rate and automated scanning coverage metrics needed
  - - Strategic investor preferential terms (MFN, anti-competitive clauses, board rights)
    - Medium
    - Amazon/Google/Nvidia investments may have terms affecting M&A/IPO flexibility
  - - Pollen Robotics integration plan, hardware margins, and 12-month revenue projection
    - Medium
    - Robotics adjacency is unproven; capital requirements and margin dilution uncertain
  notes: Diligence asks represent minimum threshold information for an informed investment decision. Priority ratings are
    relative to each other within this chapter.
