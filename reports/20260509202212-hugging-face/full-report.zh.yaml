      - number: '5.6'
        title: 信任、安全治理、信息安全与合规
        blocks:
          - type: paragraph
            body: >-
              Hugging Face 作为公共模型仓库，安全是关键且不断演进的挑战。主要漏洞类型是以 pickle 格式上传的恶意模型；这类模型在反序列化时可执行任意代码。HF 的应对是开发
              Safetensors，一种旨在防止代码执行的替代格式，并在 HF blog 上公开安全审计。平台也会对模型上传运行自动扫描，识别已知恶意模式。尽管有这些措施，安全研究人员（包括
              Checkmarx）已证明，恶意模型仍可上传，并可能被毫无防备的用户下载，形成持续猫鼠游戏。Model Hub
              包含社区举报机制，也有专门的信任与安全团队审查被标记内容。许可证合规通过模型卡要求处理，要求填写许可证字段，但对用户上传内容的强制力有限。Enterprise Hub
              提供额外安全控制，包括私有仓库、网络隔离（VPC peering 选项）、SSO/SAML，以及满足合规要求的审计日志。Hugging Face 维持 SOC 2 Type II 认证，并为 Enterprise
              客户提供 GDPR 合规文档。平台已参与 EU AI Act 合规要求讨论，并发布与该法案要求一致的模型文档实践指南。Safetensors
              安全审计由独立第三方研究人员执行，未发现格式本身存在关键漏洞，为企业模型部署提供了较高置信度的安全基础。
            claimRefs: []
