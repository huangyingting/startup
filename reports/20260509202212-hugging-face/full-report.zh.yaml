      - number: '3.4'
        title: 开放权重 LLM 实验室成为新兴竞争者
        blocks:
          - type: paragraph
            body: >
              Mistral AI 是定位独特的竞争者：它由前 DeepMind 和 Meta AI 研究人员创立，以 $6B 估值融资 $1.2B，并在 Hugging Face Hub
              上发布前沿开放权重模型，同时建设自己的推理 API（La Plateforme）和企业产品（Mistral for Business）。Mistral 的策略给 Hugging Face 带来张力：Hub
              会受益于 Mistral 模型的高流量下载，但 Mistral 自有 API 和 Mistral for Business 会直接争夺 Hugging Face Inference Endpoints 和
              Enterprise Hub 所瞄准的企业推理与微调预算。随着 Mistral 扩大直接客户关系，企业把流量导向 Mistral API 而不是 Hugging Face 计算层的风险会上升。

              Meta AI 的开放发布策略（LLaMA 2、LLaMA 3、LLaMA 3.1）让 Meta 成为 Hugging Face Hub 上流量最高的模型贡献者之一，同时也创造了一个免费、社区分发的专有模型
              API 竞争者。Meta 目前不直接变现开放权重模型，但它持续投入开源，会压缩任何模型托管溢价的价值。同样，Google 的 Gemma 和 Apple 的 OpenELM 模型家族都通过 Hugging
              Face 发布，表明前沿实验室把 HF 视为分发渠道，而不是差异化层。如果这些实验室集体建立直接企业分发，Hugging Face 在最高价值模型供给上的中介角色会面临被绕开的风险。

              对许多企业 AI 买方来说，现状替代方案不是专门平台，而是直接调用 OpenAI 或 Anthropic API、内部工程投入，以及临时使用云厂商工具的组合。截至 2024 年，这条「内部自建 + 专有
              API」替代路径是最常见的非 Hugging Face 企业 AI 部署模式；要逆转它，Hugging Face 必须证明相对专有 API 的具体 TCO 节省和合规优势。
