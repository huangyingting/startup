      - number: '1.6'
        title: 要点展示
        blocks:
          - type: callout
            title: 大规模网络效应飞轮
            body: >
              Hugging Face Hub 拥有 200 万个模型、500K 个数据集和 1000
              万用户，已经达到自我强化网络效应所需的临界规模。每一个新模型贡献都会吸引更多用户；更多用户又会吸引更多贡献者。这种动态让平台极难被替代，也解释了为什么 Google、Amazon、Nvidia
              等大型科技公司选择投资，而不是从零开始构建竞争性替代品。
            calloutType: strength
            claimRefs:
              - CO026
              - CO027
              - CO028
              - CO029
          - type: callout
            title: 开源变现张力
            body: >
              Hugging Face 的开放访问理念带来结构性挑战：大多数用户不付费。要把社区规模转化为企业收入，公司必须持续做出免费用户不需要的产品差异化——私有 Hub、带 SLA
              的推理、合规功能。社区上传模型中的安全漏洞（例如恶意 pickle 文件）以及下游应用中的许可证漂移，会带来声誉和法律风险，需要持续投入应对。
            calloutType: risk
            claimRefs:
