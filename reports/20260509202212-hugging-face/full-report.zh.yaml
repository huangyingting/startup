  - number: 7
    title: 风险
    sections:
      - number: '7.1'
        title: 风险概览与严重度框架
        blocks:
          - type: paragraph
            body: >-
              Hugging Face 的风险画像由其独特位置决定：它是全球最大的开源 AI 平台，这一角色既带来强护城河，也带来独特脆弱性。公司处在几个高度不确定领域的交叉点：AI
              监管、模型安全、开源可持续性和超大规模云厂商竞争。本节采用严重度框架，从可能性（未来 2-3
              年内显现的概率）、影响（对收入、平台完整性或估值的潜在影响）和缓释成熟度（公司防线推进程度）三方面给风险打分。五个最重要风险是：（1）云厂商捆绑模型 Hub 功能；随着 AWS Bedrock、Google
              Vertex AI 和 Azure AI Catalog 持续改进，该风险可能性高、影响高。（2）恶意模型安全事件；一次高知名度事件就可能引发监管审查和企业信任流失。（3）EU AI Act
              合规负担；Hugging Face 作为模型分发方，面临新的责任暴露。（4）核心人物依赖；三位联合创始人对技术方向和社区可信度至关重要。（5）开源商品化；前沿模型能力持续缩小专有 AI 与开源 AI
              的差距，可能降低平台独特价值。以下章节逐项分析这些风险，并定义缓释状态和推翻投资逻辑的标准。
