          - type: callout
            title: 战略投资者也是平台伙伴
            body: >
              Series D 投资人名单——Salesforce、Google、Amazon、Nvidia、Intel、AMD、IBM、Qualcomm——并不常见，因为每一家投资方也都是平台伙伴，会向 Hub
              贡献模型、数据集或计算资源。这种绑定为持续投入平台创造了强激励；但如果投资伙伴发展出相互竞争的利益，或寻求优惠 API 条款，也可能引入治理复杂性。
