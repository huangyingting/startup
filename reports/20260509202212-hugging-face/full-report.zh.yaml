  - id: TV006
    title: 最终尽调索取事项表
    claimRefs:
      - CV026
      - CV027
      - CV028
      - CV029
      - CV030
    enumerationScope:
      coverage: partial
      basis: >
        Ten critical diligence asks enumerated based on public evidence gaps and standard growth equity due diligence
        frameworks. Internal management accounts and board materials would expand this list substantially.
    columns:
      - 尽调索取事项
      - 优先级
      - 依据
    rows:
      - - 按产品线拆分、经独立审计或管理层复核的季度 ARR
        - 关键
        - 公开 ARR 估计均来自第三方；没有经验证收入，单位经济性无法判断
      - - 按队列拆分的企业客户总流失率和净流失率
        - 关键
        - 平台护城河要靠企业粘性撑住；缺失该数据是关键证据缺口
      - - 按产品线拆分的毛利率（Hub 订阅、Inference API、Compute）
        - 关键
        - 推理基础设施重，毛利率可能低于软件层
      - - 客户集中度：前 10 大客户收入占比
        - 高
        - 超大规模云厂商合作可能带来不成比例的集中度风险
      - - 按获客渠道拆分的 CAC 和 LTV（自然增长 vs. 企业销售外拓）
        - 高
        - 免费增值转化经济性完全无法用公开来源验证
      - - 人员成本拆分：R&D、G&A、销售与市场占比
        - 高
        - 约 635 名员工；成本结构和烧钱速度决定盈利时间
      - - 针对欧盟 AI Act GPAI 义务的监管合规路线图
        - 高
        - GPAI 分类可能带来昂贵的透明度和文档义务
      - - 安全审计报告：恶意模型事件频率和修复指标
        - 高
        - 需要 Safetensors 采用率和自动扫描覆盖率指标
      - - 战略投资人优先条款（MFN、反竞争条款、董事会权利）
        - 中
        - Amazon/Google/Nvidia 投资条款可能影响 M&A/IPO 灵活性
      - - Pollen Robotics 整合计划、硬件毛利率和未来 12 个月收入预测
        - 中
        - 机器人相邻业务尚未验证；资本需求和毛利稀释仍不确定
    notes: 上述尽调索取事项是做出知情投资决策所需的最低门槛信息。优先级仅 在本章内部相对比较。
