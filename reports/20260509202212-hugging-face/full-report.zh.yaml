      - number: '5.2'
        title: 产品模块与资产地图
        blocks:
          - type: paragraph
            body: >-
              Hugging Face 的产品组合由八个核心模块，加上若干专业工具和近期新增产品构成。Transformers 库是基础开源组件，提供 Python API，用于在
              NLP、计算机视觉和多模态任务中加载、训练和服务基于 transformer 的模型。该库支持 250+ 个模型架构，包括 BERT、GPT-2、T5、LLaMA、Stable Diffusion 和
              Whisper。Model Hub 托管 2M+ 个模型仓库，具备基于 git 的版本控制、模型卡（标准化文档）、通过强制 Safetensors
              格式执行的自动安全扫描，以及评论、标签、下载统计等社区功能。Datasets 库提供 500K+ 个数据集，并用统一加载 API 支持流式读取（用于无法装入内存的大数据集）、缓存和格式转换。Spaces
              是托管应用平台，支持 Gradio、Streamlit 和静态 HTML 应用，已有 1M+ 个部署应用，并通过 ZeroGPU（共享 GPU 基础设施）支持计算密集型 demo。Inference
              Endpoints 提供专用模型部署，带自动扩缩容、健康监控和 REST API 访问。AutoTrain 是无代码微调界面，支持文本分类、NER、摘要、问答和 LLM 指令微调。HuggingChat
              是开源对话式 AI，由领先开源 LLM（LLaMA、Mistral、Falcon）驱动。Safetensors 是 HF 自研的模型序列化格式，用来替代 pickle，解决一类重大安全漏洞。LeRobot 是公司
              2024 年推出的机器人库，面向真实世界机器人学习，发布时 GitHub 星标超过 12K。HF 收购的 Gradio 是构建 ML demo 界面的领先 Python
              库，数十万研究人员和开发者用它在无需前端工程的情况下创建交互式 AI 应用。
