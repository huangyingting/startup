      - number: '1.5'
        title: 关键里程碑与战略事件
        blocks:
          - type: paragraph
            body: >
              Hugging Face 的历史是一条从消费者聊天机器人到 AI 基础设施领导者的弧线。公司 2016 年以面向青少年的聊天机器人起步，团队随后发现底层 NLP 技术价值更大，并在 2018 年果断转向，开源
              Transformers 库，推动全球研究人员和开发者广泛采用。2020 年推出 Model Hub 后，平台形成网络效应，吸引全球 ML 社区贡献数百万项内容。2022 年推出 Spaces，让用户可以用
              Gradio 和 Streamlit 构建交互式演示，进一步加深用户参与。2023 年，公司推出 HuggingChat，作为 ChatGPT 的开源替代品，表明其挑战专有 AI 助手的意图。BigScience
              项目（2021–2022）由 Hugging Face 共同组织，产出 BLOOM——一个 1760 亿参数的多语言模型，也是当时最大的开放协作 AI 研究项目。2025 年收购 Pollen
              Robotics，代表公司战略性拓展到物理 AI，将开放 ML 生态与开源人形机器人硬件结合。这些里程碑共同说明，公司战略动作正从研究工具，加速延伸到企业基础设施和现实世界 AI。
