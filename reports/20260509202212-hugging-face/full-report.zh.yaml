      - number: '7.2'
        title: 监管与法律风险
        blocks:
          - type: paragraph
            body: >-
              2024 年 8 月生效的 EU AI Act，是 Hugging Face 最直接的监管风险。Hugging Face 向包括欧盟居民和企业在内的全球数百万用户分发 AI 模型，可能在该法案下被归类为「通用
              AI 模型提供者」，从而承担透明度、文档和问责义务。法案要求具有系统性风险的通用 AI 模型提供者（以训练计算量超过 10^25 FLOPs 衡量）接受对抗性测试、向监管机构报告严重事件，并维持网络安全防护。虽然
              Hugging Face 本身并不训练平台上的大多数模型（主要分发他人训练的模型），但作为主要分发渠道，它的角色制造了新的责任问题：一个托管并服务模型的平台，是否要为该模型下游伤害承担责任？公司已为用户发布 EU
              AI Act 指南，并与欧盟监管方沟通，但监管解释仍在演进。许可证漂移是第二个法律风险：Hub 上许多开源模型使用 CC BY-NC（仅限非商业使用）、Llama
              社区许可证或其他自定义条款，企业用户商业部署时可能无意违规。Hugging Face 对用户上传内容的许可证合规强制能力有限。与 Hub 上分发模型所用训练数据相关的 IP 侵权主张，是第三条法律路径：围绕
              Stable Diffusion、Copilot 和其他生成式 AI 模型的持续诉讼，会为任何模型分发平台制造判例风险。Hugging Face 维护带许可证字段的模型卡，但自动化许可证合规执行有限。
