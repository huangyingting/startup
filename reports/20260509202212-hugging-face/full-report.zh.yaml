      - number: '7.4'
        title: 合作伙伴与依赖风险
        blocks:
          - type: paragraph
            body: >-
              Hugging Face 的战略投资人基础——包括 AWS、Google、Nvidia、Intel、AMD、IBM、Salesforce——既是优势，也是依赖风险。最尖锐的合作伙伴风险是超大规模云厂商捆绑模型
              Hub：AWS Bedrock、Google Vertex AI 和 Azure AI Catalog 都托管开源模型精选库，而且三家都在重金缩小与 Hugging Face Model Hub
              的功能差距。AWS 尤其复杂：它既是战略投资人、渠道伙伴（通过 SageMaker 和 Bedrock 集成），也是潜在竞争者（Bedrock 的模型目录）。如果 AWS 优先发展 Bedrock 而不是
              Hugging Face 合作，或 Microsoft 深化 Azure AI Catalog 能力，企业客户可能把模型托管整合进主云厂商关系中。PyTorch 依赖是另一项关键技术风险：Hugging Face
              的 Transformers 库主要构建在 PyTorch 上，任何重大的 PyTorch 破坏性变更或治理扰动（Meta 控制 PyTorch 治理）都需要 Transformers
              库做重大更新。开源社区本身也是一种依赖：Hugging Face 的产品价值很大程度上依靠研究人员和公司把模型、数据集发布到 Hub。如果社区转向替代平台（例如 GitHub 原生模型托管改进，或大型竞争者的开放
              Hub），内容飞轮可能被削弱。鉴于累计融资 $395M 且 ARR 持续增长，资本提供方依赖相对较低；但下一轮融资仍取决于公司能否在 2023 年后更审慎的 AI 投资环境中，证明收入持续增长和可信盈利路径。
