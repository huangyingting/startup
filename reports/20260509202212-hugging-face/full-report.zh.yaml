      - number: '1.3'
        title: 融资历史与资本结构
        blocks:
          - type: paragraph
            body: >
              Hugging Face 已通过四轮风险融资累计募资约 $390–395 million。最初的 $15 million Series A（2019 年，由 Lux Capital 领投）支持开源
              Transformers 库和早期平台开发。$40 million Series B（2021 年，由 Addition 领投）加速了社区增长和数据集基础设施建设。$100 million Series
              C（2022 年 5 月，由 Coatue 领投）将估值推至 $2 billion 以上，并支持 Spaces 产品和企业功能。标志性的 $235 million Series D（2023 年 8
              月）使公司估值达到 $4.5 billion，Salesforce、Google、Amazon、Nvidia、Intel、AMD、IBM 和 Qualcomm 等战略方参与，凸显平台在企业 AI
              生态中的中心位置。Series D 投资人大多也是战略伙伴，会在 Hub 上贡献开放模型和数据集，使资本提供方与平台增长高度同向。公司收入从 2023 年约 $70 million ARR 增至 2024 年约
              $130 million，显示资本效率为正；但考虑到持续的基础设施和人员投入，公司仍未盈利。公司没有公开披露债务融资或老股交易，仍是完全股权融资的私营公司。
