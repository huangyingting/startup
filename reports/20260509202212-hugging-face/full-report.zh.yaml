        - 护城河由社区驱动且非排他；GitHub 可以添加 ML 功能
      - - 10M+ 注册用户构成社区飞轮，价值可复利累积
        - 免费增值用户很少转化；企业转化漏斗长且不确定
      - - 战略投资方（Google、AWS、Nvidia）提供 GTM 杠杆
        - 投资方也是竞争对手；伙伴关系和平台模式存在结构性冲突
      - - Enterprise Hub 早期变现（~10K 付费组织）证明真实需求
        - 50K 基础中有 10K 付费组织 = 20% 渗透率；总流失率未知
      - - ARR 强劲增长（同比 ~86%）支撑相对可比公司的溢价倍数
        - ARR 来自第三方估计且未经审计；实际收入和利润率不清楚
      - - 平台可延展到机器人（LeRobot、Pollen Robotics、Reachy Mini）
        - 机器人资本开支重、会稀释利润率；HF 缺少硬件制造经验
