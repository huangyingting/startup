      - number: '3.3'
        title: MLOps 工具与推理平台同业
        blocks:
          - type: paragraph
            body: >
              Weights & Biases（W&B）是主导性的 MLOps 实验追踪平台，拥有 500,000+ 注册用户，并以 $1.25B 估值融资 $200M。W&B 的 Weave 产品已扩展到
              LLMOps——提示词追踪、评测和部署可观测性——直接竞争 Hugging Face 的企业模型评测与监控能力。W&B 和 Hugging Face 部分互补（W&B 与 HF Transformers
              原生集成），但越来越多地争夺同一笔企业 ML 团队预算。W&B 官网客户证言强调无缝集成和易于追踪，这与 Hugging Face 自身的开发者优先定位相呼应。

              Replicate 通过简单 API 为开放权重模型提供托管推理，直接竞争 Hugging Face 的 Inference Endpoints 产品。Replicate 已融资约
              $40M，采用按秒计费模式，吸引构建间歇性推理负载应用的开发者。Replicate 的模型库经过精选，规模小于 Hugging Face 的 2M+ 模型
              Hub；但无服务器定价和部署简单性，是面向非企业买方的强转化杠杆。Together AI 已融资 $102M，面向需要吞吐和延迟保障的企业团队提供高性能 LLM 推理；其 API 定价可与 OpenAI
              竞争，同时服务 Llama、Mistral 等开放权重模型。Modal 为 Python 开发者提供无服务器 GPU 计算，并具备独特开发者体验（基于装饰器的函数部署）；它争夺可能原本使用 Hugging
              Face Inference Endpoints 或 AutoTrain 的 ML 工程师细分。

              Scale AI 是一家更广义的 AI 基础设施公司（$14B 估值，融资 $670M），聚焦数据标注、RLHF 服务和企业 AI 评测。虽然 Scale AI 不直接竞争模型托管，但它的评测和数据流水线能力与
              Hugging Face 的 Datasets 和评测工具重叠。Scale AI 的 RLHF-as-a-service 产品也与 Hugging Face Hub 上社区贡献的偏好数据竞争。
