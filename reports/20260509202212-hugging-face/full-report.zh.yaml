      - number: '6.2'
        title: 采用轨迹与使用指标
        blocks:
          - type: paragraph
            body: >-
              Hugging Face 的采用指标讲的是一个免费层和付费层都快速、广泛增长的故事。总注册用户从 2021 年不足 1M 增至 2024 年超过 10M，反映 AI/ML 行业爆发式增长，也反映 Hugging
              Face 作为主要开源分发渠道的地位。2023 年，Hub 上模型下载量超过每天 1M 次，说明全球自动化 ML 流水线、训练任务和研究实验都在高频使用。平台组织总数从 2022 年约 15,000 个增至
              2024 年 50,000+。关键企业转化指标——付费组织——从 2022 年估计 1,000 个增至 2024 年约 10,000 个，两年增长 10x。关于这 10,000+ 个付费组织，Forbes
              报道还显示约 215,000 个组织拥有某种形式账号，说明总可触达账号基础远大于当前付费群体。Fortune 500 渗透率 30%+ 这个指标尤其重要：它表明 Hugging Face 已成为大型企业 AI
              团队的常态化基础设施，即便许多客户最初仍在免费层。AWS Marketplace 上架和 Dell Enterprise Hub
              集成打开了分发渠道，加速中端市场和企业采用，尤其是偏好通过既有云合同或本地基础设施采购的组织。政府客户包括法国文化部、波兰数字事务部和 UNESCO，横跨多个地域，也证明了平台的国际采用。
