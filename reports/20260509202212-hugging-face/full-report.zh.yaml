      - number: '2.3'
        title: 买方分层与需求结构
        blocks:
          - type: paragraph
            body: >
              三类核心买方驱动 Hugging Face 的需求。企业技术买方（CIO、工程副总裁、ML 平台团队）需要托管合规、私有模型仓库、带 SLA 的推理、SSO 和审计日志；这些功能体现在 Enterprise
              Hub 层，起步为定制定价（约 $20/user/month）。这类买方拥有数十万到数百万美元级 AI 基础设施预算，对数据驻留和监管要求敏感，会将总拥有成本与 AWS SageMaker、Azure ML 或
              Google Vertex AI 等替代方案比较。Hugging Face 报告的 Fortune 500 渗透率超过 30%，并拥有约 10,000 个付费企业组织，说明该细分已有实质渗透，但仍处早期。


              开发者和数据科学买方（个人从业者、ML 工程师、团队负责人）是 Hugging Face 社区的历史核心。他们看重免费模型和数据集访问、高质量文档、快速迭代循环，以及协作平台的网络效应。AWS 自己的 ML
              页面宣称「超过 100,000 名客户选择了 AWS ML 服务」，说明云超大规模厂商已经大规模服务该群体；Hugging Face 的差异在于开源社区、模型广度（2M+，而 AWS
              是精选目录）和更低的切换摩擦。Anaconda 的 State of Data Science 调查发现，Python 和 ML 库标准化大幅降低了模型实验的技能门槛，扩大了开发者细分。


              研究和学术买方（大学实验室、政府研究机构、非营利组织）主要把 Hugging Face 用作发表和可复现平台。NASA IMPACT、UNESCO 等组织在 Hub
              上维护组织主页，发布专门模型和数据集。该细分大多不付费，但对 Hugging Face 供给侧质量（新模型、基准数据集）和品牌合法性贡献不成比例。McKinsey State of AI 2024
              报告发现，65% 的受访组织正在常态化使用生成式 AI，高于一年前的 33%；这表明 AI 正从研究快速扩展到生产使用，有利于 Hugging Face 的企业转化漏斗。
