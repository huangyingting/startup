          tone: neutral
        - label: Transformers 库
          date: '2018'
          detail: 开源 Transformers v1；转向 ML 平台；成为使用最广泛的 NLP 库
          tone: positive
        - label: A 轮 — $15M
          date: '2019'
          detail: 完成 Lux Capital 领投的 $15M 融资；用于初始平台和社区基础设施
          tone: positive
        - label: Model Hub 上线
