      - number: '7.6'
        title: 缓释措施、监测指标与推翻投资逻辑的触发条件
        blocks:
          - type: paragraph
            body: >-
              Hugging Face 的风险缓释覆盖主要风险类别中的主动措施和被动措施。安全风险上，公司的主要缓释是推动 Safetensors 采用（降低 pickle
              攻击面）、自动模型扫描和社区举报系统。Safetensors
              的独立安全审计提供了部分保证，说明格式本身并不脆弱。安全风险推翻投资逻辑的触发条件，是公开披露的高严重度恶意模型事件攻陷企业客户生产系统；这很可能引发监管调查和企业订阅取消。监管风险上，主要缓释是主动与欧盟监管方沟通，并发布与
              EU AI Act 要求一致的模型卡文档标准。推翻投资逻辑的触发条件，是监管机构因托管不合规 AI 模型而对 Hugging Face 采取正式执法行动或罚款。竞争风险上，缓释包括 AWS、Dell
              和云厂商合作关系，它们让超大规模云厂商与 HF 分发站在同一侧，而不是纯竞争者；另一个缓释是 2M+ 个模型和 10M+ 社区成员构成的网络效应护城河。竞争风险推翻投资逻辑的触发条件，是 AWS 或 Google
              宣布大幅改进的模型 Hub 功能集，在社区功能上达到与 HF Hub 持平，促使企业客户整合到主云厂商内。监测指标包括：月度模型上传率（社区健康早期指标）、企业净新增 logo 数、ARR 增长率、云厂商模型
              Hub 功能发布，以及 EU AI Act 监管指引发布。
            claimRefs: []
