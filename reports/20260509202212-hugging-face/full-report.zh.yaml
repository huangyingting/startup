      - - 入场价格（Series D 轮，2023 年 8 月）
        - $4.5B 投后估值
      - - 上行情景（乐观）
        - 若 ARR 持续增长 80%+，2027 年达 $12-18B
      - - 下行情景（悲观）
        - 被迫融资或 M&A 下轮估值降至 $2.5-4B
      - - 目标持有期
        - 3-5 年，至 IPO 或 M&A 流动性事件
