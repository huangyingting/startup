  - number: 6
    title: 客户情况
    sections:
      - number: '6.1'
        title: 客户基础分层
        blocks:
          - type: paragraph
            body: >-
              理解 Hugging Face 的客户基础，最好用分层框架。最宽的一层是全球 10M+ 注册用户，他们免费消费模型、数据集和 Spaces 应用；这个社区层既是漏斗顶端，也是病毒式采用的来源。第二层是拥有正式
              Hub 账号的 50,000+ 个组织，既包括商业公司，也包括学术机构。第三层约为 10,000 个付费企业组织，它们购买了 Enterprise Hub 订阅、Inference Endpoints 容量或
              AutoTrain 额度。按行业看，客户基础偏向科技公司、金融服务、医疗健康 / 生命科学，以及政府 /
              公共部门。按地域看，用户基础全球分布，但美国、欧洲和亚太集中度尤其高。按规模看，付费群体覆盖大型企业（Fortune 500 名单）、中端市场科技公司和学术研究机构。按用例看，主要企业用例是面向垂直任务的 LLM
              微调（法律、医疗、金融文档处理）、计算机视觉应用，以及内部 AI 聊天机器人 / 助手开发。企业买方画像通常是 ML 平台团队、AI
              卓越中心，或拥有预算权的数据科学团队。免费增值到企业的转化漏斗由开发者驱动：个人贡献者通过研究论文或社区项目发现
              HF，证明价值后，采购团队再介入企业合同。这种自下而上的采用模型让工程团队内初始产品市场匹配较强，但一旦需要正式 IT 采购审查，转化周期会拉长。
            claimRefs: []
