        title: 创始团队与核心领导层
        blocks:
          - type: paragraph
            body: >
              Hugging Face 由三位法国创业者共同创立：Clément Delangue（CEO）、Julien Chaumond（CTO）和 Thomas Wolf（首席科学官）。Delangue
              推动公司从聊天机器人创业公司成长为数十亿美元估值的开放 AI 平台，也是公司开源主张的公众代表。Chaumond 共同负责技术架构和基础设施；Wolf 曾是计算语言学家，负责研究方向和支撑平台的
              Transformers 库。三人在产品、工程和研究上的互补能力，是公司发展轨迹的核心。公司对三位创始人的关键人物依赖值得关注，因为战略愿景和技术执行都与他们的参与紧密绑定。创始团队之外，Jeff Boudier
              担任产品与增长负责人，主导企业变现策略。公司董事会构成没有完全公开，但 Salesforce Ventures 及其他 Series D
              参与方很可能拥有投资人席位。截至报告日期，没有公开披露重大高管离任。作为私营公司，Hugging Face 未提交公开财务披露，董事会构成细节也被视为专有信息。
