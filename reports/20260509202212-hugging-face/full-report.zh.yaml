      - number: '5.3'
        title: 技术架构与运营模型
        blocks:
          - type: paragraph
            body: >-
              Hugging Face 的技术架构围绕三件事组织：基于 git 的模型和数据集仓库系统、分布式推理基础设施、Python 优先的开发者体验。Model Hub 后端用 git-LFS（Large File
              Storage）存储大型模型权重文件，让标准 git 操作仍可用于模型仓库，同时高效处理数十 GB
              级文件。仓库元数据、模型卡和社区互动存放在常规数据库层。模型安全扫描在新上传后异步运行，检查已知恶意模式，并在可能时强制使用 Safetensors 格式。Transformers 库构建在
              PyTorch（主）和 TensorFlow（辅）之上，屏蔽框架差异，让用户用同一套 API 在任一框架中加载模型。PEFT（Parameter Efficient Fine-Tuning）和
              Accelerate 库扩展了 Transformers，支持分布式训练，以及 LoRA 等高效微调技术。Inference Endpoints 把模型作为 Docker 容器部署到客户选择的云区域，由 HF
              管理的控制平面处理路由、扩缩容和健康检查。ZeroGPU 是 Spaces 的共享 GPU 基础设施，采用新的调度方法，按需把 A100 GPU 时间分配给 Spaces，避免单个 Space
              独占资源。Datasets 库以 Apache Arrow 作为内存和磁盘格式，支持零拷贝读取和高效流式处理。Safetensors 格式用 header+tensor
              布局存储模型权重，允许部分加载，并防止反序列化期间执行任意代码，直击 pickle 的内生安全缺陷。Enterprise Hub 在社区基础设施之上增加 SSO/SAML
              集成层、私有网络隔离和合规报告。公司的计算栈不绑定云厂商，并集成 AWS（因 AWS 合作最深）、GCP 和 Azure。硬件优化库 Optimum 为
