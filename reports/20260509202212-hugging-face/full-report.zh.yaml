  - id: FR001
    title: 风险严重度热力图
    type: matrix
    claimRefs:
      - CR001
      - CR005
      - CR009
      - CR013
      - CR016
    notes: 风险热力图绘制概率与影响。定性评估基于研究。高 = 高概率 × 高影响（最关键象限）。
    data:
      columns:
        - 低影响
        - 中影响
        - 高影响
      rows:
        - label: 高概率
          values:
            - 未识别
            - ML 人才流失、扩张执行
            - 云捆绑（AWS/GCP）、恶意模型上传
        - label: 中概率
          values:
            - 跨境数据传输
            - 许可证漂移、内容审核、平台宕机
            - EU AI Act 执法、关键人物离职
        - label: 低概率
          values:
            - 隐私泄露（SOC2）
            - GitHub 竞争、知识产权诉讼
            - PyTorch 破坏性变更、私有仓库外泄
  - id: FR002
    title: 风险传导 DAG
    type: dag
    claimRefs:
      - CR005
      - CR007
      - CR009
      - CR016
    notes: 展示主要风险若不缓释，会如何在业务中传导。
    data:
      nodes:
        - id: r1
          label: 恶意模型上传
          detail: 安全研究人员绕过扫描，恶意模型得以分发
        - id: r2
          label: 企业信任受损
          detail: 事件后企业客户暂停或取消订阅
        - id: r3
          label: 欧盟监管调查
          detail: 监管机构对平台安全实践启动调查
        - id: r4
          label: 云厂商捆绑（AWS/GCP）
          detail: 超大规模云厂商改进模型 Hub，企业走向整合
        - id: r5
          label: ARR 增速放缓
          detail: 企业流失 + 新客户增长放慢，拖累 ARR 增长
        - id: r6
          label: 估值压缩
          detail: ARR 增速下降，压低估值倍数
        - id: r7
          label: 融资难度上升
          detail: 估值下调与投资人担忧，阻碍下一轮融资
        - id: r8
          label: 社区平台流失
          detail: 研究人员迁移到资金更足或云原生平台
      edges:
        - from: r1
          to: r2
          label: 触发
        - from: r1
          to: r3
          label: 触发
        - from: r2
          to: r5
          label: 导致
        - from: r3
          to: r2
          label: 放大
        - from: r4
          to: r5
          label: 导致
        - from: r5
          to: r6
          label: 推动
        - from: r6
          to: r7
          label: 导致
        - from: r7
          to: r8
          label: 威胁
  - id: FR003
    title: 关键依赖图谱 DAG
    type: dag
    claimRefs:
      - CR009
      - CR010
      - CR011
      - CR012
    notes: DAG 展示 Hugging Face 的关键外部依赖及其风险关系。
    data:
      nodes:
        - id: d1
          label: AWS / Amazon
          detail: 云计算 + SageMaker 分发 + 投资方
        - id: d2
          label: PyTorch（Meta）
          detail: 支撑 Transformers 库的核心 ML 框架
        - id: d3
          label: 开源社区
          detail: 2M+ 模型上传、开发者生态、漏斗顶部
        - id: d4
          label: Google Cloud / Vertex
          detail: 推理计算 + 投资方 + 潜在竞争者
        - id: d5
          label: Model Hub 平台
          detail: HF 核心产品；依赖社区 + 云计算
        - id: d6
          label: 企业收入
          detail: 来自 10,000 个付费组织的 ~$130M ARR
        - id: d7
          label: Transformers 库
          detail: 130K+ 星标库；生态锁定锚点
        - id: d8
          label: Inference Endpoints
          detail: 企业托管推理；依赖计算资源
      edges:
        - from: d2
          to: d7
          label: 支撑
        - from: d7
          to: d5
          label: 支撑
        - from: d3
          to: d5
          label: 供给
        - from: d1
          to: d8
          label: 算力
        - from: d4
          to: d8
          label: 算力
        - from: d5
          to: d6
          label: 转化为
        - from: d8
          to: d6
          label: 贡献
        - from: d1
          to: d5
          label: 竞争 + 合作
        - from: d4
          to: d5
          label: 竞争 + 合作
  - id: FV001
    title: 投资建议逻辑
    type: flow
    claimRefs:
      - CV001
      - CV002
      - CV005
      - CV007
      - CV009
      - CV021
    data:
      nodes:
        - id: n1
          label: 市场地位
          detail: 占据主导地位的开源 AI 枢纽；2M+ 个模型、50K+ 个组织、10M+ 用户；定位为 AI 版 GitHub
        - id: n2
          label: 收入证据
          detail: 2024 年 ARR 估计约 $130M，同比增长 86%；仅为未经审计的第三方估计
        - id: n3
          label: 可比估值
          detail: 综合可比区间：$5.5-9B；Series D 入场价 = $4.5B（2023 年 8 月）；Mistral 对应 $80-100M ARR 估值 $6B
        - id: n4
          label: 主要风险
          detail: 开源变现天花板；超大规模云厂商竞争；没有公开经审计财务；关键人物风险
        - id: n5
          label: 入场纪律
          detail: 审慎关注。需要收入透明，并且 ARR 年增长持续高于 60%
        - id: n6
          label: 投资建议
          detail: 控制仓位纪律，继续跟踪。若下一轮定价在 $7B 或以下且收入可验证，再推进接触
      edges:
        - from: n1
          to: n3
        - from: n2
          to: n3
        - from: n3
          to: n5
        - from: n4
          to: n5
        - from: n5
          to: n6
