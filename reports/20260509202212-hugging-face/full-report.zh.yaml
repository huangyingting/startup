      - number: '6.4'
        title: 留存、满意度与耐久性
        blocks:
          - type: paragraph
            body: >-
              Hugging Face 不公开披露净收入留存、总留存或流失指标，这是重大尽调缺口。不过，结构性信号显示企业段留存较高。留存的主要驱动是工作流嵌入深度：一旦企业团队构建了引用 HF 模型标识符的 ML
              流水线，把微调模型存入私有 Hub 仓库，并通过 Inference Endpoints 部署，迁移成本就变得有意义。Hub 上的模型仓库使用基于 git 的版本管理，私有存储在 HF
              的模型权重若不重新上传并重新接入不同 API，就不易迁移到其他平台。社区评价分数可作为满意度的部分代理：G2 上 Hugging Face 评分较高（平均
              4.5+/5.0），评论持续称赞模型广度、易用性和活跃社区。TrustRadius 和 Capterra
              评论也提到强满意度。各评论平台上的关键满意主题包括模型可访问性、优秀文档、活跃社区支持和模型快速更新。常见负面主题包括高峰负载下偶发的平台稳定性担忧、免费层用户客户支持有限，以及计算密集型工作负载的定价透明度担忧。企业合同期限未公开披露，但企业
              ML 基础设施的 SaaS 行业惯例显示，安全审查完成后通常是一年期或多年期合同。留存的关键风险是云厂商捆绑：如果 AWS、GCP 或 Azure 显著改善自家模型
              Hub，企业客户可能把工具整合到主云厂商内，削弱 HF 粘性。
