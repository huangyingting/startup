      - number: '6.3'
        title: 具名客户证明与证据质量
        blocks:
          - type: paragraph
            body: >-
              Hugging Face 已组建起一批值得注意的具名企业客户，覆盖金融服务、科技、医疗健康和公共部门。Bloomberg LP 是高知名度客户，曾使用 Hugging Face 基础设施发布面向金融 NLP
              任务训练的大语言模型 BloombergGPT。Bloomberg 合作博客和相关技术论文构成了强、可验证的证据材料。全球制药公司 Pfizer 将 Hugging Face 用于药物发现和医学 NLP
              研究。eBay 使用 HF 模型做商品分类和搜索相关性。Intel 在 Hub 上有显著组织存在，自己的模型仓库包含数十个优化模型。Amazon 使用 HF Hub 分发和消费模型，AWS-HF 合作让
              Amazon SageMaker 用户可以原生访问 HF Hub 模型。Google Vertex AI 与 HF 模型集成，Meta-LLaMA 模型则通过 HF Hub 分发，后者是 LLaMA
