  - number: 5
    title: 产品与技术
    sections:
      - number: '5.1'
        title: 客户工作流中的平台产品
        blocks:
          - type: paragraph
            body: >-
              Hugging Face 服务三类主要客户画像——研究人员、ML 工程师和企业团队——用一个统一平台覆盖完整机器学习生命周期。研究人员需要发布和发现层：Model Hub
              让研究人员公开分享模型权重、模型卡和评测结果，Datasets 库则提供 500K+ 个精选数据集，采用可流式读取的 Apache Arrow 格式。ML 工程师把 Hugging Face 的
              Transformers 库（250+ 架构、支持 130+ 种语言）作为加载、微调和部署前沿模型的主要抽象层，再配合 Datasets 做高效数据摄取，用 Inference API 快速原型验证。Spaces
              让工程师不用管理基础设施，就能用 Gradio 或 Streamlit 构建并分享交互式 demo。企业团队则在社区平台之上使用 Enterprise Hub，获得私有仓库、SSO/SAML
              认证、基于角色的访问控制、审计日志、SLA 保证和合规文档。Inference Endpoints 按客户选择的云厂商（AWS、GCP、Azure）提供专用计算部署，并通过 REST API
              访问。AutoTrain 让非 ML 专家团队通过无代码界面在专有数据上微调模型。HuggingChat 则为企业内部聊天助手部署提供 ChatGPT 的开放替代方案。平台强在集成：研究人员发现模型，工程师用
              AutoTrain 微调，企业再通过 Endpoints 部署——全在一个平台内完成。这种端到端一致性，是 Hugging Face 相比单点解决方案竞争者的核心产品差异化。
