        - 启动正式调查
        - 罚款或强制修改平台
      - - 竞争
        - 云模型 Hub 功能追平
        - AWS Bedrock 功能追平 HF Hub
        - 企业客户 2 个季度流失率 >20%
      - - 财务
        - ARR 增长率
        - 同比增长放缓至 40% 以下
        - 增长低于 20% 或 ARR 持平
      - - 开源
        - 模型上传速率趋势
        - 月度上传速率下降
        - 社区迁移到竞争平台
      - - 关键人
        - 联合创始人留任信号
        - 任一联合创始人公开释放转向信号
        - IPO / 退出前联合创始人离职
      - - 财务模型
        - 毛利率趋势
        - 毛利率低于 40%
        - 毛利率承压且没有缓释路径
