      - number: '3.2'
        title: 云超大规模厂商 ML 平台
        blocks:
          - type: paragraph
            body: >
              AWS SageMaker 是企业 ML 平台采用的市场领导者。AWS 官方产品页称，它在全球服务 100,000+ 名 ML 客户。SageMaker 提供完整生命周期能力，覆盖数据标注（Ground
              Truth）、训练（训练作业、分布式训练、Spot instances）、模型注册表、推理（实时、批量、无服务器）、MLOps 流水线和集成特征库。它的核心优势是与 AWS
              生态深度集成（IAM、S3、CloudWatch、VPC）、企业级安全，以及能把 AI 支出打包进既有 AWS 企业折扣协议。相对 Hugging Face，SageMaker
              的弱点在于开放模型目录经过精选但有限，开发者社区参与也较弱。

              Azure Machine Learning（Azure ML）受益于 Microsoft 深厚的企业销售体系、Office 365 集成和 GitHub Copilot 生态。Azure ML
              包含模型目录（Azure AI model catalog），其中开源模型与 Azure OpenAI Service 并列，形成专有 + 开放组合，直接竞争 Hugging Face
              的模型发现层。Microsoft 2024 年企业 AI 战略强调负责任 AI 和合规；Azure 因 Purview 数据治理集成而受益。Azure ML 除计算外不收额外平台费，这会让采购团队很难与
              Hugging Face Enterprise Hub 做价格比较。

              Google Vertex AI 在 Gartner Magic Quadrant for AI Application Development Platforms（Q4 2025）和 Forrester
              Wave for AI/ML Platforms（Q3 2024）中被评为领导者，说明分析机构认可度强。Vertex AI 具备 Model
              Garden（精选开放和专有模型）、AutoML、Workbench，并集成 Google 的 TPU 基础设施和 Gemini API。Google 的研究声望（BERT、T5、PaLM 源自
              Google）为其带来模型可信度，尽管开源发布往往先出现在 Hugging Face。三家超大规模云厂商都能通过高毛利计算收入补贴 AI 平台定价，这是 Hugging Face 无法匹配的结构性优势。
