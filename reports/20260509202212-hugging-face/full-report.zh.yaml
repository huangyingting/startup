companyProfile:
  summary: >
    Hugging Face 是一家总部位于纽约 Brooklyn 的 AI 平台公司，已经成为机器学习模型、数据集和应用的主导性开源 Hub。公司由三位法国创业者在 2016 年创立，最初做消费者聊天机器人，后转向建设支撑现代 ML
    开发的基础设施。Transformers 库（2018）和 Model Hub（2020）拉起了网络效应平台，如今承载 2M+ 模型和 10M+ 用户。公司靠 Enterprise Hub 订阅、Inference API 和
    AutoTrain 变现，2024 年 ARR 约 $130M。2023 年 8 月，公司以 $4.5B 估值融资 $235M，Google、Amazon、Nvidia、Salesforce 和 Intel 等战略投资者参与。
