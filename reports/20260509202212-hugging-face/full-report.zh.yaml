      - number: '7.3'
        title: 运营与安全风险
        blocks:
          - type: paragraph
            body: >-
              最直接的运营风险是恶意模型上传。Checkmarx 安全研究人员已经证明，恶意模型可以用绕过当前自动扫描的方式上传到 Hugging Face Hub。攻击向量利用 pickle 序列化格式：以 pickle
              文件存储的模型在加载时可执行任意代码，可能攻陷下载并运行它们的用户系统。虽然 Hugging Face 开发了更安全的替代格式 Safetensors 并鼓励使用，但平台无法强制所有模型都用
              Safetensors，尤其是格式出现前已上传的既有模型。Checkmarx
              博文明确指出，这是持续猫鼠游戏。一次高知名度恶意模型事件——尤其是影响企业客户生产系统的事件——可能触发监管调查、企业信任流失，以及重视安全的组织弃用平台。除恶意上传外，平台还面临标准基础设施运营风险，包括针对
              API 层的 DDoS 攻击、瞄准私有模型仓库的数据外泄尝试，以及影响生产推理部署的服务中断。平台规模（2M+ 个模型、10M+ 用户、1M+ 个 Spaces
              应用）让全面安全监控极其困难。内容审核是另一项运营风险：平台托管可生成有害内容（CSAM、武器说明、虚假信息）的模型，会带来声誉和法律暴露。依赖社区事后举报的方式在规模化后不够用，而自动识别有害模型能力在技术上尚未解决。快速扩张积累的技术债，也可能表现为可靠性事件，尤其是在企业客户依赖且有
              SLA 保证的 Inference Endpoints 中。
