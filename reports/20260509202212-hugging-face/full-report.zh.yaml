    title: 公司概况
    sections:
      - number: '1.1'
        title: 公司身份与商业模式
        blocks:
          - type: paragraph
            body: >
              Hugging Face, Inc. 是一家美国 AI 公司，总部位于纽约 Brooklyn，并在法国 Paris 保持重要团队。公司创立于 2016 年，最初为青少年开发消费者聊天机器人，2018
              年转向开源机器学习平台。如今，它是发现、分享和部署 AI 模型、数据集与交互式应用的主导性社区 Hub，因此被非正式称为「AI 的
              GitHub」。它的使命是让最先进的机器学习工具向所有人开放，从而推动人工智能民主化。平台承载超过 200 万个预训练模型、500,000+ 数据集和 100 万个交互式 Spaces
              应用，覆盖自然语言处理、计算机视觉、音频、多模态 AI 和机器人。Hugging Face 采用免费增值模式创收：核心平台免费开放，通过 Enterprise Hub 订阅、Inference API
              使用费、AutoTrain 微调服务，以及与主要超大规模云厂商的云计算额度合作变现。2025 年，公司收购法国机器人创业公司 Pollen Robotics，进入物理 AI 领域。
