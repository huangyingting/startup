evidenceGaps:
  - type: missing-source
    severity: material
    topic: founding-date
    missingEvidence: Exact founding date or founding year for Cellares.
    whyItMatters: Founding date is part of the core identity brief and helps reconcile pre-Series B history.
    diligencePath: >-
      Obtain incorporation records, early financing documents, or direct management confirmation of founding and first
      operating date.
    relatedQuestionRefs:
      - QO004
    relatedTableRefs:
      - TO001
  - type: conflicting-data
    severity: material
    topic: board-completeness
    missingEvidence: >-
      Current board roster reconciling the 2023 David Mauney board-appointment announcement with the current company
      page.
    whyItMatters: Board composition affects governance, investor rights, and current sponsor influence.
    diligencePath: Request current board list, resignation history, and board-observer rights from Koch and other major investors.
    relatedQuestionRefs:
      - QO010
    relatedTableRefs:
      - TO002
  - type: private-evidence-only
    severity: material
    topic: valuation-disclosure
    missingEvidence: Current valuation, latest preferred terms, and any secondary pricing since the 2026 Series D.
    whyItMatters: Without a valuation anchor, investors cannot benchmark dilution, market appetite, or IPO readiness.
    diligencePath: >-
      Request the latest cap table, last round price per share, liquidation preferences, and any employee or investor
      secondary transactions.
    relatedQuestionRefs:
      - QO014
    relatedTableRefs:
      - TO001
      - TO003
  - type: private-evidence-only
    severity: material
    topic: operating-metrics-disclosure
    missingEvidence: Current headcount, public revenue run-rate, and any disclosed customer-count or utilization metric.
    whyItMatters: The company is large enough to raise $612M, but public operating transparency still lags the capital story.
    diligencePath: >-
      Request current employee count, active-customer count, batch-volume by site, and any revenue split between
      platform services and manufacturing.
    relatedQuestionRefs:
      - QO022
    relatedTableRefs:
      - TO001
  - type: missing-source
    severity: material
    topic: adverse-search-scope
    missingEvidence: Dedicated legal, regulatory, and layoff search coverage beyond the cached source pack reviewed here.
    whyItMatters: The absence of an adverse hit in the current pack should not be mistaken for proof that no adverse events exist.
    diligencePath: >-
      Run a targeted 2026 legal-news and enforcement search pack covering lawsuits, labor actions, recalls, sanctions,
      and government investigations.
    relatedQuestionRefs:
      - QO025
    relatedTableRefs:
      - TO004
  - type: missing-source
    severity: material
    topic: serviceable-market-size
    missingEvidence: >-
      A public source that isolates outsourced automated IDMO spend for cell therapy manufacturing services by sponsor
      segment or region.
    whyItMatters: >-
      Without a clean service-level denominator, TAM and SAM claims remain broad heuristics rather than investable
      market math.
    diligencePath: >-
      Collect sponsor budget benchmarks, outsourced-manufacturing mix, and capacity-utilization disclosures from CDMOs,
      developers, and private market studies.
    relatedQuestionRefs:
      - QM023
    relatedTableRefs:
      - TM002
  - type: private-evidence-only
    severity: material
    topic: utilization-and-renewals
    missingEvidence: >-
      Utilization rates, realized batch volumes, renewal terms, and cohort economics for reserved or contracted Cellares
      capacity.
    whyItMatters: Marquee reservations prove interest, but they do not prove durable throughput conversion or margin quality.
    diligencePath: >-
      Request partner cohort data, utilization dashboards, renewal history, and realized cost-per-batch data in
      diligence.
    relatedQuestionRefs:
      - QM026
  - type: conflicting-data
    severity: material
    topic: installed-capacity-math
    missingEvidence: >-
      A reconciled capacity model that explains why official site ranges and third-party installed-capacity estimates
      diverge so widely.
    whyItMatters: >-
      Capacity is one of the core underwriting variables for Cellares, and contradictory public figures weaken
      confidence in precise output forecasts.
    diligencePath: >-
      Request per-site system counts, assumed process durations, actual shift patterns, and the company’s definition of
      batch versus dose.
    relatedQuestionRefs:
      - QM024
    relatedTableRefs:
      - TM002
  - type: private-evidence-only
    severity: material
    topic: payer-pass-through
    missingEvidence: >-
      Evidence showing whether automation-driven manufacturing savings reduce therapy net price or widen payer access
      materially.
    whyItMatters: >-
      Operational efficiency is strategically useful, but the market case gets stronger only if savings help sponsors
      win reimbursement or expand treated populations.
    diligencePath: >-
      Compare sponsor gross-to-net assumptions, reimbursement dossiers, and post-launch pricing behavior for therapies
      made on automated platforms.
    relatedQuestionRefs:
      - QM025
      - QM027
  - type: missing-source
    severity: material
    topic: public-pricing-and-terms
    missingEvidence: >-
      A clean public apples-to-apples comparison of instrument price, consumables, service fees, and realized per-batch
      economics across Cellares, Ori, Lonza, Miltenyi, and Multiply.
    whyItMatters: >-
      Without that commercial denominator, competitive conclusions rely on architecture and packaging rather than on
      proven price leadership.
    diligencePath: >-
      Collect customer proposals, list-price schedules, consumables terms, and realized contract structures from
      diligence.
    relatedQuestionRefs:
      - QP016
      - QP023
    relatedTableRefs:
      - TP003
  - type: private-evidence-only
    severity: material
    topic: customer-conversion-and-utilization
    missingEvidence: >-
      Actual deployed-unit counts, utilization, renewal behavior, and cohort economics for Cellares and newer modular
      platforms.
    whyItMatters: >-
      Partnership headlines and platform claims do not prove that customer interest converts into durable throughput or
      margins.
    diligencePath: Request deployment cohorts, utilization dashboards, renewal history, and expansion decisions by customer class.
    relatedQuestionRefs:
      - QP008
      - QP012
      - QP016
    relatedTableRefs:
      - TP001
      - TP003
  - type: private-evidence-only
    severity: material
    topic: platform-validation
    missingEvidence: Long-run reproducibility and cross-therapy validation data for newer automation platforms and robotics layers.
    whyItMatters: >-
      Industrial buyers may hesitate if platforms work in pilot settings but not across many therapies, sites, or
      regulators.
    diligencePath: Request therapy-by-therapy validation history, failed transfer cases, batch-deviation data, and audit findings.
    relatedQuestionRefs:
      - QP014
      - QP020
      - QP028
    relatedTableRefs:
      - TP002
      - TP004
  - type: missing-source
    severity: material
    topic: buy-vs-build-decision-math
    missingEvidence: >-
      A sponsor-specific total cost and cycle-time comparison between Cellares, one-device point-of-care systems, manual
      CDMOs, and internal build.
    whyItMatters: This is the real competitive decision, and public sources do not isolate it cleanly enough for underwriting.
    diligencePath: Model individual sponsor scenarios using capex, staffing, QC, logistics, and region-by-region launch assumptions.
    relatedQuestionRefs:
      - QP022
      - QP023
      - QP026
    relatedTableRefs:
      - TP001
      - TP003
      - TP004
  - type: private-evidence-only
    severity: material
    topic: recognized-revenue
    missingEvidence: Recognized revenue, ARR, and revenue mix by service line or customer.
    whyItMatters: >-
      Without actual top-line disclosure, the business cannot be valued or compared cleanly with other manufacturing or
      platform companies.
    diligencePath: Request monthly and annual revenue by service line, customer, geography, and clinical versus commercial stage.
    relatedQuestionRefs:
      - QI017
      - QI026
    relatedTableRefs:
      - TI005
  - type: private-evidence-only
    severity: material
    topic: realized-pricing
    missingEvidence: >-
      Realized batch pricing, discounting, payment schedules, and minimum-volume commitments for BMS, Cabaletta, and
      other major contracts.
    whyItMatters: Throughput claims do not convert into revenue without actual price and contract-term data.
    diligencePath: >-
      Obtain contract schedules showing list versus realized price, milestone timing, take-or-pay terms, and
      cancellation rights.
    relatedQuestionRefs:
      - QI004
      - QI027
    relatedTableRefs:
      - TI002
      - TI005
  - type: private-evidence-only
    severity: material
    topic: gross-margin
    missingEvidence: Gross margin, batch COGS, failure-cost burden, and utilization by site or system.
    whyItMatters: Automation claims remain marketing-level until they are tied to realized cost and margin outcomes.
    diligencePath: >-
      Request gross-margin bridge by service line and by clinical versus commercial mix, with utilization and
      failure-rate assumptions.
    relatedQuestionRefs:
      - QI010
      - QI026
    relatedTableRefs:
      - TI003
      - TI005
  - type: private-evidence-only
    severity: critical
    topic: cash-burn-runway
    missingEvidence: Current cash, monthly burn, runway, and working-capital bridge.
    whyItMatters: Capital adequacy is impossible to judge without liquidity and burn metrics.
    diligencePath: >-
      Request latest balance sheet cash, trailing-12-month operating cash burn, runway scenarios, and working-capital
      assumptions.
    relatedQuestionRefs:
      - QI022
      - QI027
    relatedTableRefs:
      - TI004
      - TI005
  - type: private-evidence-only
    severity: material
    topic: customer-concentration-and-backlog
    missingEvidence: Customer concentration, reserved-capacity utilization, backlog conversion timing, and site-by-site capex budget.
    whyItMatters: Large headline agreements can still hide concentration, underutilization, or delayed revenue conversion.
    diligencePath: >-
      Request customer concentration by revenue and capacity, backlog waterfall, utilization by site, and capex schedule
      by region.
    relatedQuestionRefs:
      - QI017
      - QI026
    relatedTableRefs:
      - TI004
      - TI005
  - type: private-evidence-only
    severity: material
    topic: economics-gap
    missingEvidence: >-
      Realized per-batch COGS, sustained installed-base utilization, batch-failure distributions, and measured
      turnaround-time improvements by site and modality.
    whyItMatters: >-
      These data determine whether claimed cost and throughput advantages translate into durable commercial economics
      rather than one-off validation events.
    diligencePath: >-
      Request partner-level operating dashboards, bridgewater line-performance reports, release-by-release yield
      history, and actual contract economics for at least one mature program.
    relatedQuestionRefs:
      - QE022
  - type: stale
    severity: material
    topic: network-risk
    missingEvidence: >-
      Current commissioning status, qualification milestones, staffing readiness, and local regulatory-path detail for
