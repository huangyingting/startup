    relatedQuestionRefs:
      - QE023
    relatedTableRefs:
      - TE005
  - type: missing-source
    severity: material
    topic: ip-position
    missingEvidence: >-
      Freedom-to-operate analysis, external reproducibility benchmarks across multiple commercial programs, and customer
      switching-cost evidence beyond public marketing.
    whyItMatters: >-
      A durable moat depends on more than patents and partner announcements; buyers need proof that the platform is hard
      to replace and remains superior as competitors mature.
    diligencePath: >-
      Request patent counsel summary, customer reference calls on switching costs, and cross-platform technical
