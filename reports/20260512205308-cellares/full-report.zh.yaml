    title: 公司概况
    sections:
      - number: '1.1'
        title: 身份定位、运营模式与地理布局
        blocks:
          - type: paragraph
            body: >-
              Cellares 将自己定位为第一家 Integrated Development and Manufacturing Organization（IDMO），专为细胞疗法生产工业化而建，不是传统手工
              CDMO。当前首页和公司页把身份锚定在 South San Francisco，同时描述更大的智能工厂网络：项目方可基于同一套自动化流程标准在全球扩张。披露的足迹已覆盖 South San
              Francisco、Bridgewater、Leiden 和 Kashiwa，全球产能主张最高达到 215,000 batches，相比手工设施有 10x
              生产率。这个工业身份故事很强，但一个显眼的基础事实仍缺失：已审阅的公开材料没有披露确切创立年份或创立日期。因此，投资人能看清 Cellares
              自称要建什么、在哪里建，却还看不到完整锚定的注册历史或公开员工数基线。
