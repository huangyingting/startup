      - number: '8.3'
        title: 为什么今天仍无法只靠公开资料承销
        blocks:
          - type: paragraph
            body: >-
              反方论点不是 Cellares 没有野心，而是公开证据仍解不开承销的基本题。公司没有公开披露当前估值或优先权结构。 申办方申报文件没有显示来自 Cellares
              的实际收入贡献、当前工厂利用率，或与平台绑定的申办方毛利验证。即使是 最强的 Cabaletta 申报措辞也仍然是前瞻性的：它描述 Cellares 获批后可能如何降低成本、改善排期，而不是今天
              已经能看到多少利润。公开验证也高度依赖公司和伙伴自己生成的材料。这一点重要，因为细胞治疗的闭环自动化仍是难市场， 采用门槛依然很高，连同业自动化供应商也会提出大幅通量主张。在这个语境下，正确问题不是
              Cellares 是否有前景， 而是任何拟议价格是否已经在这些事项公开之前，就假设了广泛采用、多元化订单和高效工厂经济性。如果答案是肯定， 本章应停在 research-more，而不是拉伸成照价买入式热情。
