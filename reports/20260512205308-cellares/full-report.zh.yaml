        blocks:
          - type: paragraph
            body: >-
              公开记录中的主要承销张力在于：Cellares
              累积客户、监管和基础设施验证的速度，快过它累积可复用公开披露的速度。创立日期、估值、员工数、收入和客户数量指标，在已审阅材料中都缺失。最清晰的反向证据不是诉讼或执法行动，而是客户侧风险披露。Cabaletta 的
              2025 Form 10-K 明确警告，Cellares 或其他制造伙伴的制造延误或产能约束，可能扰乱试验供货和入组；同一文件也明确，January 2026
              制造协议可在通知后终止。已审阅的缓存材料没有出现直接法律新闻或裁员信号，但不能过度解读这种缺席。尽调读者正确的结论是：Cellares
              已用真实里程碑搭出可信的工业叙事，但若要把平台作为后期私营公司承销，仍有多项基础公司级披露需要管理层直接回答。
