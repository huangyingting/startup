  - number: 8
    title: 估值
    sections:
      - number: '8.1'
        title: 建议与入场纪律
        blocks:
          - type: paragraph
            body: >-
              第一个估值问题不是 Cellares 有没有意思，而是公开证据够不够给它定价。答案仍然是不够。Cellares 的牵引力 显然高于典型自动化初创公司：已融资 $612 million，与 Bristol
              Myers Squibb 签下蓝筹商业协议，从 TAP 到 患者给药有可信的 Cabaletta 证明链，管理层也公开准备 IPO。这些都是实打实的正面因素。但留存的公开来源都
              没有披露当前投后估值、每股价格、清算优先权或二级交易估值。公开来源也没有把预留产能和试点成果清楚桥接到实际 利用率、收入或毛利率。因此，在当前私募价格上给出精确买入或回避判断，会是虚假精确。合适建议是
              research-more， 而且必须明确对价格敏感。如果下一轮定价接近公开可比对象区间，并给基础设施验证一个可辩护溢价，继续尽调；如果 投资人被要求按多元化商业规模已经可见来付价，就暂停。
