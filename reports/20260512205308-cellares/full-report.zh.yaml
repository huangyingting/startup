      - number: '2.4'
        title: 增长驱动、采用约束与保留的规模测算缺口
        blocks:
          - type: paragraph
            body: >-
              增长逻辑很直接：获批疗法增加，更多项目进入自身免疫疾病或实体瘤，对区域自体供应的预期更高，降低人工、批次失败和 QC
              瓶颈的压力更强。自动化也契合监管方和项目方对可追溯性、可审计性和更好数据的需求。但约束同样重要。自动化可能需要沉重前期 capex、漫长回本期、跨司法辖区可比性工作，以及 MES、LIMS
              和分析系统之间的集成投入。互操作性缺口和专有耗材也会让买方担心锁定效应。许多开发商在早期临床工作中仍保留手工方法，因为该阶段灵活性比效率更值钱。最重要的是，公开记录仍留下多个未解决的承销缺口：没有干净
              SAM，没有预留产能的公开利用率数据，没有可靠证据表明节省传导给疗法付款方，也没有定论说明应相信哪一个已发布产能估计。正确结论是方向性看多，但精度受限。
