      - number: '4.3'
        title: 成本结构和单位经济性方向上有吸引力，但仍大多未验证
        blocks:
          - type: paragraph
            body: >-
              Cellares 把经济论点讲得很容易理解。公司称，每台 Cell Shuttle 每年最多可支持 2,500 batches，每台 Cell Q 可处理大约 3,000 to 6,000 release
              batches，整体智能工厂模式的产出约为传统 CDMO 的 10 倍，同时人工和设施占地最多减少 90%。它还在这些运营指标上叠加了明确成本主张：Cell Q 发布时称批次价格最多降低 50%，早期 Cell
              Shuttle 材料称成本最多降低 75%，并通过更快技术转移和区域 scale-out 缩短上市时间。


              第三方行业背景让这些主张方向上可信。ISPE 和 McKinsey 都把手工自体 CAR-T 制造描述为劳动密集、高 COGS 且受 scale-out 约束。但可信不等于可承销。Cellares
              没有披露已实现毛利率、batch COGS、站点利用率、保修或失败成本负担，或任何实际合同 ASP。因此，公开单位经济性桥梁停在运营主张和外部背景，没有走到 revenue-to-gross-profit 模型。
