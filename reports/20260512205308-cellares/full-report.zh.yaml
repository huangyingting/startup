              Cellares 的客户面应被读作制造项目方和转化中心，而不是疗法终端用户。官方服务页称，公司在 pharma、biotech 和学术转化中心拥有 10+ partnerships、14+ unique
              processes、1,000+ automated runs 和 1,400+ automated assays。公开点名的大型药企或商业阶段 sponsor 包括 Bristol Myers
              Squibb、Autolus 和 Kite。临床阶段 biotech 账户包括 Cabaletta、Lyell 和 ProTgen。学术或转化账户包括 City of Hope、Stanford Medicine
              和 University of Wisconsin。这个组合重要，因为购买动作并不一致：大型药企似乎用 Cellares 做韧性和全球 scale-out，biotech
              用它做自动化和未来商业准备，学术中心用它做 bench-to-clinic 转化。这也意味着，并非每个具名关系都应被视作同等客户证据。有些是商业或临床供货关系，另一些仍是临床前评估或平台开发合作，没有披露
