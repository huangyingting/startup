      - number: '4.2'
        title: GTM 动作与销售效率代理指标
        blocks:
          - type: paragraph
            body: >-
              GTM 动作可见，虽然 CAC 和回本周期不可见。Cellares 用 TAP 作楔子：sponsor 可在约 6 个月内把现有手工流程搬到 Cell Shuttle，生成可比性或 PoC
              数据，然后决定是否扩展到临床或商业制造。这由高触达运营模式支撑，每段合作都有 Alliance Manager、里程碑跟踪和监管协调。


              公开账户历史是有用的销售效率代理指标。Bristol Myers Squibb 从 August 2023 TAP 进入，到 April 2024 签署 $380 million 协议；Cabaletta
              路径更长，从 November 2023 TAP 公告，到 March 2025 概念验证里程碑、January 2026 IND clearance，以及 April 2026 的 10-year 供货协议。到
              late 2025，Cellares 表示已经拥有 5 项全球制造协议，并推出 Biotech Incentive Program，为自动化工作预先出资。这指向严肃的企业管线，但不是已披露 CAC、quota
              productivity 或回本周期。
