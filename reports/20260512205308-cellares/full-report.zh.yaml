        title: 差异化、IP、路线图与风险
        blocks:
          - type: paragraph
            body: >-
              看差异化时，Cellares 与传统 CDMO 和局部自动化对手相比最强，而不是与通用实验室自动化供应商相比。公开护城河组合是连贯的：16-batch 并行执行、制造和 QC 配对平台、软件定义转移、区域
              Smart Factory 复制，以及围绕 cartridge
              与仪器集成、流体处理、监控、电穿孔、分选和分析平台设计的持续增长专利组合。独立报道也倾向于把公司定位为工业化细胞疗法制造的领跑者。但风险画像同样清晰。Ori 和 Multiply
              等竞争供应商强调更窄或更模块化的路线，这可为部分买方降低锁定。行业文章警告，自动化采用仍面临 capex 负担、互操作性缺口、专有耗材风险、劳动力需求和市场碎片化。Cellares 自身最大的开放问题是已实现
              COGS、利用率、多站点多疗法类型规模化可复现性，以及 Leiden、Kashiwa 和后续商业爬坡的时点风险。Autolus、Kite 和 Lyell 的伙伴披露也显示，许多买方保留内部科学和制造能力，因此
