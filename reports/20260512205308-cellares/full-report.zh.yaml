      - number: '5.4'
        title: 质量、监管设计与验证
        blocks:
          - type: paragraph
            body: >-
              Cellares 的质量和监管设计，比典型早期自动化营销更成熟。公司公开表示，QbD 已编码进 Cell Shuttle 软件，运营遵循 cGMP Quality Management System；Cell Q
              把过程内检测和放行检测接到同一数字骨干上，后者存储 COI 或 COC 以及 electronic batch records。外部里程碑部分验证了这个故事：Cell Shuttle 在 2025 获得 FDA
              AMT designation，South San Francisco 和 Bridgewater 的 cGMP Cell Shuttles 在 2024 完成，Cabaletta 的 IND amendment
              在 January 2026 获批用于临床制造，首批使用 Cell Shuttle 制造 rese-cel 给药的患者在 April 2026 宣布。Cell Q
              也更像产品化合规层，而不是通用机器人：它具备预确认 assays、CoA 或 CoT 生成，以及针对 liquid handling、calibration verification、flow
              cytometry、synthetic controls 和保持 COI 或 COC 的 sample handling 的具名集成。即便如此，EMA 和 ISPE
              材料也明确显示，更广泛疗法类型扩展仍需要疗法层面的可比性、验证和接口控制证据。
