  - id: TM001
    title: 市场定义表
    columns:
      - 细分 / 类别
      - 纳入支出
      - 排除支出
      - 买方 / 付款方
      - 相关性
    rows:
      - - 自动化 IDMO 制造服务
        - 细胞治疗项目的工艺转译、制造运行、技术转移、批次放行支持和区域产能预留
        - 成品药治疗销售收入和医院报销
        - 生物制药申办方的制造、CMC 和开发预算
        - Cellares 今天变现的核心市场
      - - 自动化 QC 和分析服务
        - 过程内和放行 QC 自动化、检测转移、数字批记录和验证支持
        - 与细胞治疗制造放行无关的一般 CRO 测试支出
        - 申办方 QC、质量和监管预算
        - 重要，因为 Cell Q 是 Cellares 捆绑方案的一部分
      - - 学术或转化制造赋能
        - 临床规模自动化、支持 IND 的制造，以及内部发明疗法的分析桥接
        - 与转化制造无关的一般大学研究经费
        - 学术医学中心、转化研究机构、资助支持的项目预算
        - 相关，因为学术中心是工业化支持的早期买家
      - - 内部自建或混合制造替代方案
        - 申办方为保留内部制造所需的资本开支、人员、软件和工艺控制投资
        - 细胞治疗以外任何无关厂房投资
        - 申办方资产负债表和运营预算
        - 直接替代方案，会给外包设定上限
      - - 手工或半自动 CDMO 替代栈
        - 劳动密集型合同制造、碎片化 QC 和传统技术转移工作
        - 细胞治疗以外的一般生物工艺外包
        - 申办方制造支出
        - Cellares 试图替代的主要既有工作流
      - - 排除的邻近市场
        - n/a
        - 治疗终端市场销售、医院给药支出、付款方药品预算，以及广泛生物科技研发软件
        - 保险方、医院和更广泛的企业职能
        - 推动疗法采用的需求因素，但不是 Cellares SAM
    notes: 各行把 Cellares 可直接捕获的支出，与只间接影响需求的更大疗法和医疗市场拆开。
    claimRefs:
      - CM001
      - CM002
      - CM003
      - CM004
      - CM006
