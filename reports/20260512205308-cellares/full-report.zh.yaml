  - number: 4
    title: 财务情况
    sections:
      - number: '4.1'
        title: 收入模型、定价姿态与真正公开的内容
        blocks:
          - type: paragraph
            body: >-
              Cellares 的公开财务故事建立在合同制造和基础设施服务模式上，不是软件订阅或设备销售。当前服务页展示了几层可见变现：把流程转换到 Cell Shuttle、在 Cell Q
              上做分析桥接和放行检测、监管咨询、临床制造，以及最终商业供应。这让业务更像一体化外包制造伙伴，而不是纯自动化工具供应商。


              定价故事方向清楚，但数字不透明。Cellares 称其提供透明按批定价，没有隐藏费用，也没有版税或许可费。公开锚定协议强化了合同逻辑：Bristol Myers Squibb 签下最高 $380 million
              的产能预留和供货协议；Cabaletta 签下围绕每年数千批构建的 10-year 商业供货协议。ProTGen
              等额外疗法类型扩展伙伴关系暗示未来服务宽度，但投资人真正建模所需信息仍缺失：已实现批次定价、里程碑拆分、最低 volume commitments、取消经济性和收入确认时点。
