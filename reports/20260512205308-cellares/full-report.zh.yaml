      - number: '3.4'
        title: 护城河耐久性真实存在，但取决于标准设定、验证和利用率
        blocks:
          - type: paragraph
            body: >-
              Cellares 有真实竞争楔子，但保留证据并不支持说市场已经定局。公司是公开文档最充分的工业级自动化案例，把 QC 和服务产能一起打包；它的专利记录和 sponsor
              阵容也重要。即便如此，对手的反向定位可信。Ori 现在同样有 AMT 徽章，并营销开放性。Lonza 和 Miltenyi 受益于装机熟悉度和 point-of-care
              适配。模块化或机器人优先路线承诺更低转移负担，并可能随着 PAT、AI、digital twins 和 rapid-QC
              工具改进而变强。独立来源也警告，市场碎片化，买方害怕过时，许多较新平台仍需长期可复现性证据，才可能成为 de facto standard。因此，反向案例是有层次的，而非致命：Cellares 可能领先
              scale-out 细分，同时仍会把不少决策输给本地控制、multi-homing 或观望买方。正确结论是，Cellares 在一条有价值的竞争赛道中领先，而不是已经赢下整个制造架构之争。
