        title: 产品到底是什么
        blocks:
          - type: paragraph
            body: >-
              Cellares 应按产品化制造基础设施加服务模式来承销，而不是按点状仪器或泛 CDMO 劳动力外壳。官方材料始终把四个交付物打包：Cell Shuttle 制造平台、Cell Q QC 工作站、全球 Smart
              Factory 网络，以及流程转换、分析桥接和监管咨询服务。放到客户工作流里，sponsor 带来手工或半手工细胞疗法流程，Cellares 把该流程转换到一套连接制造、QC
              和记录的自动化栈上。这个框架重要，因为护城河不只是机器，而是硬件、一次性耗材、QC 自动化和区域产能的组合。公开证据在这一捆绑模式上最强，而不在独立 SKU 定价、授权软件或独立披露的利用率经济性上。
