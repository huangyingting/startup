      - number: '8.2'
        title: 为什么这个故事原则上值得看
        blocks:
          - type: paragraph
            body: >-
              这里确实有一个投资论点。Cellares 不是让投资人相信一个不存在的市场。细胞治疗制造已经是瓶颈，Cellares 的公开验证也强于大多数私营自动化同业。Bristol Myers Squibb 在一份最高
              $380 million 的合同下预留了多区域 产能。Cabaletta 从评估关系推进到 TAP 完成、IND 修订获批、首例患者给药和 10-year 供应协议。Series D 融到
              的资本足以继续搭建全球网络，而不只是一个示范站点。管理层看起来也在为下一阶段招人，而不只是庆祝平台 PPT。 这些事实足以支持继续尽调，也解释了为什么 Cellares
              可以合理地相对小型自动化同业或验证前的细胞治疗公司拿到 溢价。关键是溢价必须扣在已经证明的东西上。公开证据显示真实的商业意图和早期制造验证，还不是一个客户多元、毛利 可见的基础设施生意。
            claimRefs:
