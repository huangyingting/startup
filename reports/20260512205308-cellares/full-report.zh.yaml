        - 一个标杆账户可能主导可见企业级验证和产能预留信号
        - 若产能被吃满，上行空间高；若钱包份额低于标志性交易暗示，下行风险也高
        - 要求按区域提供预留产能利用率、最低承诺和收入确认
      - - Cabaletta 自身免疫规模化
        - 临床和商业验证异常扎实，但 Cabaletta 也保留其他制造伙伴
        - 有力验证平台就绪度，但不能证明独家供应控制
        - 要求提供钱包份额、双供应逻辑和排他边界
      - - 学术到临床转化（Wisconsin）
        - 学术项目可能需要更久才能变成稳定收入账户
        - 是未来需求的有用前置指标，但近期经济性可能滞后于技术成功
        - 要求提供预期 IND 时间、赞助项目经济性和产能承诺
      - - 商业溢出产能路径（Autolus / Kite）
        - 成熟运营商可能只把 Cellares 用作溢出或应急产能，而非核心供应
        - 即使账户转化，也可能压住钱包份额
        - 要求说明评估目标是主生产、溢出产能，还是区域冗余
      - - 新模态广度（Stanford / ProTgen）
        - 平台广度拓宽漏斗，但转化仍处于 pre-IND，技术上不确定
        - 更能拓宽 TAM 叙事，而非证明近期收入
        - 要求提供各项目阶段门里程碑和预期付费服务里程碑
