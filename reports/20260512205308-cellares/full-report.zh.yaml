          - type: paragraph
            body: >-
              Cellares 最强的公开商业验证集中在两段关系上。Bristol Myers Squibb 通过 $380 million 产能预留和供应协议 提供了已披露的最大收入机会；Cabaletta 则通过 TAP
              完成、IND 修订获批、首例患者给药和 10-year 供应协议， 给出了最强的临床到商业转化链条。这些信号对一家私营制造平台来说异常有力，但也很集中。除 BMS 和 Cabaletta
              外，公开披露的关系大多是评估、开发或平台扩展公告，而不是带有清晰最低量经济性的长期合同。BMS 自己的谨慎 措辞明确提醒，协议预期收益可能不会按希望的速度兑现。因此，投资人应把当前伙伴组合视为模型能赢下重要客户的
              证据，而不是客户多元化、利用率或续约行为已经铺开的证据。如果 BMS 或 Cabaletta 进展延误，或这些旗舰项目 未能催化更多长期订单，下行会同时打击收入可见性、融资弹性和估值支撑。
