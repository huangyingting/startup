      - number: '3.2'
        title: 直接同行分化为开放生态、装机一体机系统和机器人层
        blocks:
          - type: paragraph
            body: >-
              一旦认真看架构，直接供应商版图很快碎片化。Ori 是 Cellares 最干净的概念对手，因为它也销售自动化细胞疗法制造，拥有自己的 AMT designation，并把自己定位为从 R&D 到 GMP
              的路径。但 Ori 推的是另一套哲学：让客户选择各领域最优伙伴，而不是绑定单一端到端服务栈。Lonza Cocoon 和 Miltenyi Prodigy
              代表既有一体机替代方案。它们的强项不是智能工厂规模，而是装机熟悉度，以及适合 one-device-per-patient 或 point-of-care 工作流。Multiply Labs 和 Cellular
              Origins 从另一侧进攻，承诺用机器人保留现有仪器或已验证技术，不要求买方围绕新的专有工厂重建平台。这意味着 Cellares 同时面对至少三类竞争原型：开放合作伙伴网络、去中心化 one-box
              系统，以及把流程转移痛点降到最低的编排层。它最大的挑战不是逐项匹配每个对手功能，而是证明集中式吞吐量加集成 QC，足以胜过竞争架构积极营销的控制力和灵活性。
