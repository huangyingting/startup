      - number: '3.3'
        title: 商业打包、切换成本和分销力量，比公开标价更重要
        blocks:
          - type: paragraph
            body: >-
              这个市场公开价格透明度很弱，因此更强的竞争证据在打包方式和切换经济性。Cellares 不寻常，因为它披露了服务层 proof points：$380 million Bristol Myers Squibb
              产能预留、10-year Cabaletta 商业协议，以及明确没有版税或许可费的主张。多数竞争对手不是这样呈现自己。Ori 强调监管顺风、伙伴准入和反锁定灵活性。Multiply
              强调无需流程转移，并围绕已验证仪器做自动化。Lonza 和 Miltenyi
              展示平台熟悉度，但在保留证据集中没有干净公开价目表。因此，切换成本成为核心。买方必须考虑可比性包、专有耗材、互操作性缺口、再培训，以及自己想在本地拥有运营，还是交给外部网络。项目方想快速获得外包区域产能时，Cellares
              自有智能工厂足迹给了它分销优势。但同一服务模式也可能比模块化或伙伴主导方案更有绑定感，因此定价权更少取决于标价，更多取决于每种架构降低总摩擦的说服力。
