  - id: TI005
    slug: public-financial-gaps-table
    title: 公开财务缺口表
    description: The missing numbers that still block a full underwriting or valuation model.
    columns:
      - 缺失的私有指标
      - 影响
      - 精确尽调路径
    rows:
      - - 已确认收入 / ARR / 收入组合
        - 阻断任何可信收入模型，也无法区分试点、临床和商业贡献
        - 按服务线、客户、地域，以及临床与商业阶段索取月度和年度收入
      - - 已实现 ASP 和折扣表
        - 无法把吞吐量转成收入，也遮住议价能力
        - 索取各主要合同类型的批次定价、产能费、返点和里程碑安排
      - - 毛利率 / 单批次 COGS
        - 无法判断自动化主张能否转成经济优势
        - 索取按服务线拆分的毛利率桥接，包含人工、耗材、QC、物流和失败率假设
      - - 客户集中度和积压订单转化
        - 具名交易对手无法揭示 Cellares 对一两个锚定客户的依赖程度
        - 提供合同积压订单、预留产能、利用率，以及按头部客户拆分的收入集中度
      - - 按工厂和系统拆分的站点利用率
        - 没有利用率，产能主张不等于收入
        - 按站点和季度分享 Cell Shuttle 与 Cell Q 的实际利用率与设计利用率
      - - 现金余额、现金消耗和资金续航
        - 没有流动性指标，就无法检验资本充足性
        - 提供最新资产负债表现金、月度现金消耗和管理层资金续航假设
      - - 债务、设备融资、租赁义务和营运资本
        - 即便股权融资看起来强，隐藏固定义务也可能主导风险画像
        - 提供完整负债明细、设备融资、租赁义务，以及库存 / 应收 / 应付桥接
      - - 按站点和技术模态拆分的资本开支预算
        - 没有分阶段预算，就无法把工厂建设同剩余资本挂钩
        - 提供逐站点资本开支、装修适配和自动化部署计划，并列明达到就绪的时间
      - - CAC / 回本和 TAP 转化指标
        - 没有漏斗经济性，企业销售效率仍只是轶事
        - 提供从 TAP 到临床制造再到商业供应的 cohort 转化，以及获取每个项目的成本
    notes: 开源记录足以描述模式，但不足以给它估值。
    claimRefs:
      - CI028
      - CI029
      - CI032
      - CI038
      - CI039
      - CI040
