      - number: '5.3'
        title: Cell Shuttle、Cell Q 与疗法类型架构
        blocks:
          - type: paragraph
            body: >-
              最深的技术披露集中在 Cell Shuttle 本身。Cellares 描述的是以 cartridge 为中心的架构：一个批次在专用、预灭菌的一次性 cartridge 上运行，专用试剂瓶位于封闭 ISO 8
              环境内。一次性核心之外，是 Reagent Vault System、4 个无菌液体转移系统、一个物料处理系统，以及可异步运行最多 16 个 cartridges 的 16
              个生物处理系统。公开点名的单元操作包括细胞分离、磁选、电穿孔、基因编辑、激活，以及在支持 perfusion 的 stirred-tank bioreactor 中扩增，并闭环监测温度、dissolved
              oxygen 和 pH。Process Design Studio、集成 MES、实时监控和自动生成 electronic batch records
              很重要，因为它们让硬件变成软件定义，而不是固定功能。这个架构解释了为什么 Cellares 称其支持 autologous 和 allogeneic processes，以及大约 90% 的
              cell-therapy modalities。未公开的是各疗法类型的完整性能边界，而不是架构本身。
