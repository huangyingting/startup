          detail: 工艺转译、分析桥接、监管咨询以及临床或商业生产项目，把硬件包装进申办方工作流。
        - label: 数字控制层
          modules:
            - Process Design Studio
            - 集成 MES
            - 实时监控
            - 电子批记录
            - ERP / LIMS / COI-COC 接口
          detail: 软件定义配方、调度设备群、捕获记录，并把数据送入企业质量系统。
        - label: QC 自动化层
          modules:
            - Cell Q
            - 预认证通用检测
            - CoA / CoT 生成
          detail: 公开定位里，自动化过程内检测和放行检测属于同一平台，而不是割裂的实验室工作流。
        - label: 制造编排层
          modules:
            - Reagent Vault System
            - 4x SLTS
            - Material Handling System
            - Feedthrough
          detail: 机器人化物料流、无菌转移和试剂调度，把一次性耗材接到仪器上，中间不需要人工交接。
        - label: 封闭耗材与单元操作层
          detail: 一个批次在专用耗材卡匣里跑完，卡匣内置流体总线、智能容器，以及 CCE、磁选、电穿孔、灌流扩增等单元操作。
