  - id: TV002
    title: 投资论点 / 反论点表
    columns:
      - 立场
      - 论点
      - 哪些证据会改变判断
    rows:
      - - 正方论点
        - 作为一家私人制造平台，Cellares 的公开证据罕见地扎实：累计融资 $612M，BMS 预留产能，Cabaletta 已给患者给药，全球网络也在建设中。
        - 如果更多客户签下长期合同，且站点利用率变得可见，该论点会增强。
      - - 正方论点
        - Cellares 卖的是制造基础设施，而不只是管线；相较许多开发阶段细胞治疗公司，这种定位可以支撑溢价。
        - 如果重复预订、毛利率数据和多客户利用率证明基础设施模式，该论点会增强。
      - - 反方论点
        - 已审阅的公开来源没有披露当前估值、每股价格、清算优先权，也没有干净的二级市场标记。
        - 如果管理层提供最新条款清单、股权结构表，或近期要约 / 二级交易定价，该风险会显著下降。
      - - 反方论点
        - 公开来源仍未显示已实现收入、在手订单转化、工厂利用率或毛利率，投资人可能是在为一个尚不可见的商业未来付钱。
        - 如果申办方文件或公司材料披露收入贡献、按站点划分的利用率，以及能经受规模化考验的经济性，该风险会缓解。
    notes: 该表把公司质量和特定价格下、由公开证据支撑的可投资性分开。
    claimRefs:
      - CV006
      - CV007
      - CV011
      - CV027
      - CV035
      - CV038
  - id: TV003
    title: 牛 / 基准 / 熊情景表
    columns:
      - 情景
      - 明确假设
      - 估值逻辑
      - 关键风险
      - 决策含义
    rows:
      - - 悲观
        - BMS 和 Cabaletta 仍是真实验证点，但更广泛的客户转化、站点利用率和经济性可见性滞后。
        - 可支撑区间约 $0.8B-$1.5B，更接近开发阶段公开细胞治疗同业，只给少量基础设施溢价。
        - 工厂延期、客户集中，以及在商业化证据尚未匹配前按接近商业化公司的价格融资。
        - 只有在大幅折价且下行保护强时才参与。
      - - 基准
        - BMS 和 Cabaletta 转化为更广泛订单，全球网络按 2026-2027 计划推进，尽调显示可信的单位经济性。
        - 可支撑区间约 $1.5B-$3.0B，作为有溢价的制造平台故事，但仍低于成熟商业化同业。
        - 利用率可能仍落后于市场叙事，毛利率也可能仍未被证明。
        - 若给出的价格落在该区间内或以下，且条款干净，继续尽调。
      - - 乐观
        - 多个客户和地区迅速转化，平台扩张未遇重大可比性或质量挫折，投资人看到持久的基础设施价值。
        - 可支撑区间约 $3.0B-$5.0B，接近但不超过 Legend 式商业化区间。
        - 该情景要求证据比当前公开材料显示的速度快得多。
        - 没有异常强的私下证据，不要为这种结果背书。
    notes: 这些区间是基于公开证据和同业语境得出的决策护栏，不是对公司当前未披露估值的主张。
    claimRefs:
      - CV026
      - CV027
      - CV041
      - CV042
      - CV043
      - CV044
  - id: TV004
    title: 可比估值表
    columns:
      - 可比对象
      - 阶段 / 类型
      - 观察到的价值
      - 对 Cellares 的启示
      - 局限
    rows:
      - - Cellares
        - 私人制造平台
        - 估值未披露；累计融资 $612M
        - 资本基础大、合作伙伴证据真实，相比许多小型自动化同业可以支撑溢价。
        - 融资额不等于当前估值，也不等于干净入场价。
      - - Autolus
        - 正在商业化的自体 CAR-T 公司
        - 约 $419M 市值
        - 说明即便公司有真实商业化重心，公开估值也可能仍然有限。
        - Autolus 是治疗产品公司，不是制造基础设施平台。
      - - Allogene
        - 开发阶段异体 CAR-T 公司
        - 约 $787M 市值
        - 提供开发阶段公开细胞治疗公司的高端基准。
        - 治疗模态和商业模式不同。
      - - Lyell
        - 临床阶段 CAR-T 公司
        - 约 $451M 市值
        - 进一步说明公开市场仍会折价看待商业化前细胞治疗故事。
        - 管线不同，也不是基础设施提供商。
      - - Cabaletta
        - 临床阶段自身免疫 CAR-T 公司
        - 约 $634M 市值
        - 有助于观察市场如何在商业批准前给 Cellares 重要客户定价。
        - 衡量的是客户，而不是 Cellares 经济性。
      - - Legend
        - 商业化 CAR-T 基准
        - 约 $5.23B 市值
        - 提示一旦真实产品经济性成立，规模化商业细胞治疗价值可以到达哪里。
        - Legend 是产品公司，商业化证据远比 Cellares 成熟。
    notes: 可比组刻意选择公开且可直接观察的公司；它是估值括号，不是直接定价公式。
    enumerationScope:
      coverage: partial
      basis: >-
        Includes the most relevant public comparables with usable current quote pages and stage context; private
        automation peers with undisclosed valuations are not exhaustively represented.
    claimRefs:
      - CV003
      - CV013
      - CV014
      - CV015
      - CV016
      - CV017
      - CV018
      - CV019
      - CV020
      - CV030
  - id: TV005
    title: 论点破裂与否决触发因素表
    columns:
      - 风险
      - 可监测触发因素
      - 阈值 / 事件
      - 估值含义
    rows:
      - - 工厂执行
        - Leiden 和 Kashiwa 准备度、人员配置、客户导入
        - 相对公开 2026-2027 商业化时间表出现实质滑坡
        - 将可支撑区间压向悲观区间，并假设未来融资需求更高。
      - - 客户集中
        - 新长期合同和已披露利用率
        - BMS 或 Cabaletta 放慢时，没有新的有意义客户转化
        - 把这家公司视为集中验证，而非多元化基础设施。
      - - 可比性 / 质量
        - 工程运行、放行数据、偏差和监管反馈
        - 桥接包失败、反复偏差趋势或转移延迟
        - 大幅降低信心，并下调估值预期。
      - - 融资纪律
        - 下一轮定价和条款
        - 公司估值接近商业化同业区间，但公开证据没有匹配
        - 除非私下证据异常强、下行保护极佳，否则放弃。
      - - 证据质量
        - 收入、毛利率和利用率披露
        - 又一轮融资到来，但经济性可见性没有改善
        - 即便公司质量有正面因素，也维持继续研究建议。
    notes: 触发因素用于改变建议或可支撑区间，而不只是给通用公司风险贴标签。
    claimRefs:
      - CV027
      - CV033
      - CV034
      - CV041
      - CV044
      - CV045
  - id: TV006
    title: 最终尽调问题表
    columns:
      - 尽调问题
      - 为什么重要
      - 所需证据
      - 询问对象
    rows:
      - - 当前估值、股权结构表和清算优先权
        - 没有条款，公开证据无法转化为可投资价格。
        - 最新条款清单、股权结构表、优先权堆栈，以及任何近期二级交易或要约价格标记。
        - 管理层、CFO、领投方
      - - 工厂利用率和在手订单转化
        - 产能预留不等于已实现需求。
        - 按站点划分的已预订产能、签约最低量、历史利用率，以及从 TAP 到长期供给的转化。
        - 运营、商业化负责人
      - - 批次经济性和毛利率路径
        - 基础设施溢价只有在吞吐量和成本主张经受住真实运营后才成立。
        - 每批次成本、按站点划分的贡献利润、定价假设和扩张模型。
        - CFO、运营
      - - BMS 和 Cabaletta 转化机制
        - 旗舰交易对手目前主导公开证据。
        - 项目节奏、预期量、续约或扩展逻辑，以及对延迟的敏感性。
        - 商业化负责人、客户项目负责人
      - - 逐站点准备度和质量包
        - 估值上行取决于多地区执行，不只是单一工厂。
        - 各站点调试状态、确认包、验证摘要和人员就绪度。
        - COO、质量负责人
      - - 现金消耗和融资桥
        - 高资本开支网络若利用率滞后，可能被迫接受惩罚性融资。
        - 月度或季度现金消耗、资本开支计划、现金跑道分析和融资触发阈值。
        - CFO、董事会观察员
    notes: 在把公开公司质量转化为更强估值判断前，这些是最低限度需要索取的私有数据。
    enumerationScope:
      coverage: partial
      basis: >-
        Captures the highest-value diligence requests implied by retained public evidence, not every diligence item a
        full buy-side process would request.
    claimRefs:
      - CV011
      - CV031
      - CV032
      - CV045
      - CV046
