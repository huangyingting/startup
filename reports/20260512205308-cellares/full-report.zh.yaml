      - number: '7.4'
        title: 资本、人才与论点破裂：现在是执行密集型承销题
        blocks:
          - type: paragraph
            body: >-
              Cellares 已越过“是否有人在意这个想法”的阶段。更难的问题是，公司能否把站点、伙伴、QC、领导层和融资协调 得足够紧，把早期成果转成可复制的商业基础设施。Series D
              和更广泛的投资人阵容给了公司比典型制造初创公司 更多回旋空间；但同一融资历史也抬高了业绩门槛：4 个智能工厂站点、2026 年临床制造、2027 年商业规模产出和 IPO
              准备，意味着在多元化利用率公开之前，公司要承担很大的资本开支和运营负荷。领导层深度很关键，因为这个 运营模型需要跨地域的专业商业、制造、质量和项目管理人才。公开来源在安全认证、积压订单转化和确切利用率上仍然
              很薄。最清晰的论点破裂信号因此在运营端，而不是叙事端。可比性桥接失败、站点反复延误、批次质量问题，或 BMS 与 Cabaletta 不能转成重复订单的证据，都会比任何网站法律问题更快削弱商业化论点。
