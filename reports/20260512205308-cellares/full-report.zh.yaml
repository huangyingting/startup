    title: 投资 KPI
    type: kpi
    layout: standard
    summary: IC 风格评分卡，评估 Cellares 的商业验证、估值可见性、经济性可见性、集中度风险和证据质量。
    approximationNotes: 分数是基于留存证据得出的 0-10 启发式评分，不是外部评级。
