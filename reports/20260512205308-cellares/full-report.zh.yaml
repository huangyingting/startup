  - number: 2
    title: 市场分析
    sections:
      - number: '2.1'
        title: 市场边界、纳入支出与现状替代方案
        blocks:
          - type: paragraph
            body: >-
              Cellares 应被按自动化赋能的制造服务公司来定市场规模，不是疗法开发商，也不是泛泛的生物技术基础设施故事。直接市场是项目方为细胞疗法项目支付的流程转换、端到端制造、QC
              放行自动化和监管支持费用；这些项目必须从脆弱的手工工作流转向可重复的临床和商业供应。这个边界重要，因为最接近的替代品不是实验室科研工具或医院 IT 预算，而是手工或半自动
              CDMO、项目方内部制造团队，以及新兴的去中心化或床旁生产模式。Cellares 自身材料也通过强调 auto/allo 灵活性和向基因编辑 HSC 工作流扩展，把服务市场从经典 CAR-T
              拓宽。核心市场之外应排除下游疗法收入、医院管理支出和细胞疗法终端市场的全部价值。这些是重要需求驱动因素，但不同于 Cellares 实际试图捕获的可服务支出。
