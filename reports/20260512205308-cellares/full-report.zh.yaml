companyProfile:
  summary: >-
    Cellares 是位于 South San Francisco 的私营制造平台，试图通过自动化 IDMO 智能工厂网络，把细胞疗法生产工业化。公开证据比多数私营自动化同行更扎实：公司已融资 $612 million，签下最高
    $380 million 的 Bristol Myers Squibb 产能预留协议，推动 Cabaletta 从流程采用走到首例患者给药和 10-year
    商业供货协议，并在美国、欧洲和日本建设站点。这个故事更应被理解为基础设施加服务，而不是单纯设备自动化。
  founders:
    - name: Fabian Gerlinghaus
      role: 联合创始人兼 CEO
      background: 创立 Cellares 前，曾在 Synthego 扩大自动化技术规模。
      claimRefs:
        - CO011
    - name: Omar Kurdi
      role: 联合创始人兼总裁
      background: 具备来自 Finesse Solutions、Synthego 和 Thermo Fisher 的运营与设施建设经验。
      claimRefs:
        - CO012
  headquarters: South San Francisco, California
  productSummary: Cellares 销售以 Cell Shuttle 制造平台和 Cell Q 质控工作站为核心的自动化细胞疗法制造与质控产能，并通过其智能工厂网络提供流程转移和 IDMO 运营。
  customerFocus: 主要客户是细胞疗法开发商和药企项目方，他们需要自动化流程转移、制造和 QC 产能。公开验证集中在 Bristol Myers Squibb 和 Cabaletta，其他 biotech 与学术账户仍处于更早阶段。
  businessModel: 模式是共享制造基础设施和服务：Cellares 通过采用项目、产能预留和长期供货协议，把自动化制造和 QC 产能变现，而不是只靠一次性设备销售。
  stage: private, commercialization buildout
  fundingStatus: >-
