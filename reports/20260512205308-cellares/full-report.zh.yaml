        blocks:
          - type: paragraph
            body: >-
              财务结论复杂但方向为正。收入质量看起来明显好于纯研究或试点平台，因为 Cellares 有公开证据，显示来自两个严肃交易对手的多年商业或准商业需求：大型、最高 $380 million 的 BMS
              产能协议，以及与活跃临床项目绑定的 10-year Cabaletta 供货协议。这强过泛泛的自动化营销。


              与此同时，公开记录仍远不足以支撑真正承销。没有公开收入、ARR、毛利率、现金余额、烧钱速度、现金跑道、利用率或合同级定价桥梁。Cabaletta 的 10-K
