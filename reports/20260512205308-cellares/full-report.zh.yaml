      - number: '2.3'
        title: 买方、用户、付款方与采用路径
        blocks:
          - type: paragraph
            body: >-
              主要买方是细胞疗法项目方，但它们并不相同。大型药企或商业化 CAR-T 项目方购买自动化，是为了溢出产能、地理扩张或韧性产能。后期 biotech
              在内部制造太慢或资本强度过高时购买。学术和转化中心用它从台架科学走到 IND-ready 生产，而不必从零建设工业基础设施。在客户组织内部，预算所有者通常在
              CMC、技术运营、制造或开发领导层。用户是流程开发科学家、制造团队、QC
              团队和监管人员，他们必须把活流程及其检测体系搬到新平台，同时不破坏可比性。因此，采用不是一张简单采购单，而是一串步骤：评估瓶颈、转换流程、桥接分析、验证数据流，然后决定区域生产和放行检测放在哪里。项目方经济性最直接，但逻辑仍与下游相连，因为支付报销压力和冷链约束决定项目方能吸收多少制造支出。
