  - id: TM003
    title: 细分市场 / 买方地图
    columns:
      - 细分市场
      - 买方
      - 使用者
      - 付款方
      - 工作流
      - 预算负责人
      - 采用触发因素
    rows:
      - - 大型药企 / 商业化 CAR-T 赞助方
        - 细胞治疗运营、技术运营或 CMC 负责人
        - 工艺开发、生产、QC 与监管团队
        - 赞助方生产与开发预算
        - 产能瓶颈 -> 平台评估 -> 工艺转移 -> 商业供应预留
        - 生产 / CMC 高管
        - 不再新建工厂，也需要更广地域覆盖、更强韧性或更快周转
      - - 后期或商业化阶段生物技术公司
        - CEO、COO 或生产负责人
        - 生产科学、联盟与质量团队
        - 赞助方运营预算与融资所得
        - 临床成功 -> 预期需求扩大 -> 外包溢出或横向扩产
        - 运营或项目负责人
        - 内部生产版图或现金太有限，撑不起多区域扩建
      - - 临床阶段生物技术公司
        - 开发与 CMC 负责人
        - 工艺科学家与转化运营团队
        - R&D 与临床开发预算
        - 手工实验室流程 -> 自动化可行性 -> 分析可比性 -> 试验供应
        - CMC / 开发负责人
        - 需要早期工业化，同时避免后续重建工艺
      - - 学术医学中心或转化研究机构
        - 首席研究者、转化中心或生产主任
        - 研究人员、GMP 操作员与 IND 团队
        - 资助金、慈善资金或赞助项目资金
        - 台架工艺 -> 临床规模生产 -> IND 支持
        - 首席研究者或转化中心负责人
        - 需要更快从发现走到试验用产品
      - - 新模态开发者（如基因编辑 HSC）
        - 科学创始人或模态负责人
        - 分析、生产与监管团队
        - 项目预算或合作伙伴资金
        - 平台工艺设计 -> 检测自动化 -> 跨适应症复用
        - 模态项目负责人
        - 希望在多个罕见病项目之间复用生产骨干
      - - 混合型自建客户
        - 现有内部生产组织
        - 内部工厂团队加外部联盟经理
        - 赞助方资本开支加运营开支
        - 内部基础产能 -> 外包溢出或区域补充
        - 技术运营负责人
        - 新增产能要快过内部新站点投产
    notes: 同一赞助方可能随着项目从早期开发走向商业供应，在不同行里反复出现。经济付款方通常是赞助方，而不是下游保险方。
    claimRefs:
      - CM016
      - CM017
      - CM018
      - CM021
      - CM022
      - CM023
      - CM024
  - id: TM004
    title: 增长驱动与约束表
    columns:
      - 驱动因素 / 约束
      - 方向
      - 时点
      - 影响
      - 尽调问题
    rows:
      - - 已获批和在研 CGT 增多
        - 增长驱动
        - 结构性
        - 项目越多，对可扩展生产和 QC 的需求越大
        - 现实中有多少项目适合外包自动化，而不是内部自建？
      - - 自身免疫、实体瘤与 HSC 扩张
        - 增长驱动
        - 中期
        - 把可触达模态从当前血液肿瘤 CAR-T 扩到更宽范围
        - 哪些模态与当前平台真正工艺兼容？
      - - 区域性自体供应要求
        - 增长驱动
        - 近期
        - 洲内或本国生产可以缩短物流，降低周转风险
        - 各区域赞助方需求中，真实需要本地生产的比例是多少？
      - - 自动化节省人工和洁净室
        - 增长驱动
        - 近期
        - 利用率足够高时，生产经济性优于传统 CDMO
        - 利用率达到什么门槛，节省才能可持续？
      - - 缓解 QC 瓶颈
        - 增长驱动
        - 近期
        - 自动化放行检测加快的是完整生产周期，不只是上游生产
        - QC 在当前合作伙伴项目里，究竟多常是真正瓶颈？
      - - AMT 与监管支持
        - 增长驱动
        - 近期
        - 可以降低不确定性，加快赞助方与监管机构互动
        - 使用 AMT 指定平台后，申报在实践中能快多少？
      - - 前期资本开支高、回本周期长
        - 采用约束
        - 即时
        - 即便长期经济性改善，风险投资支持或规模较小的开发者也可能推迟采用
        - 哪些客户画像能吸收资本和验证负担？
      - - 可比性与验证负担
        - 采用约束
        - 持续
        - 平台变更仍可能触发大量分析与监管工作
        - 哪些工艺变更需要最重的可比性资料包？
      - - 互操作缺口与专有耗材
        - 采用约束
        - 持续
        - 抬高切换成本，让部分开发者不愿过早承诺
        - 真实客户部署中，数据和耗材生态有多开放？
      - - 早期阶段偏好手工灵活性
        - 采用约束
        - 持续
        - 开发者可能把自动化推迟到后期，即便这会增加未来转移痛点
        - 多数买方在什么阶段决定脱离手工流程？
      - - 冷链与 vein-to-vein 摩擦
        - 采用约束
        - 持续
        - 即便上游已自动化，只要物流或 QC 仍慢，自体项目仍会受拖累
        - 哪些地区或适应症对周转时间最敏感？
      - - 向付款方传导价格不清晰
        - 采用约束
        - 持续
        - 运营节省不会自动变成更好报销或更广可及性
        - 赞助方能否证明自动化降低的是净治疗成本，而不只是内部 COGS？
    notes: 本表强调时点和投资判断含义，而不是泛泛列优缺点，因为采用取决于利用率、可比性和报销语境，程度不亚于技术本身。
    claimRefs:
      - CM025
      - CM026
      - CM027
      - CM028
      - CM029
      - CM030
      - CM031
      - CM032
      - CM033
      - CM034
      - CM038
  - id: TP001
    title: 竞争对手画像表
    columns:
      - 竞争对手 / 类别
      - 竞争方式
      - 规模 / 融资信号
      - 目标细分市场
      - 差异化
      - 限制
    rows:
      - - Cellares（参考行）
        - 集中式自动化 IDMO 服务
        - 累计融资超过 $355M；BMS 预留 $380M；已公告四个智能工厂站点
        - 需要区域化外包规模的药企、生物技术公司与学术赞助方
        - 集成 Cell Shuttle + Cell Q + 自有智能工厂产能
        - 公开定价、利用率和续约数据仍有限，工艺转移也绑定具体平台
      - - Ori Biotech
        - 开放模块化自动化平台 + 合作伙伴网络
        - 获得 AMT 指定；13 个活跃合作伙伴；与 Charles River、CTMC、ElevateBio 和 Kincell 组成 PPN；保留资料集中未披露融资
        - 希望兼得自动化与服务商选择权的疗法开发者、CDMO 和 AMC
        - 从 R&D 到 GMP 的灵活性，以及明确的反锁定定位
        - 保留资料中的公开范围并非完全端到端，长期规模证明仍在形成
      - - Lonza Cocoon 平台
        - 既有单设备封闭系统
        - 全球装机 >150 台；估计占自动化封闭系统 18%-22% 份额；与 Vertex 生产相关
        - 优先考虑 PoC 或去中心化生产的开发者
        - 装机基础、单设备熟悉度和本地控制适配
        - 一次一批患者限制了单元吞吐，相比 Cellares 受限
      - - Miltenyi CliniMACS Prodigy
        - 既有单设备封闭系统
        - PoC 文献中广泛使用；模块化设备可并行运行；此处未单独拆出公开 CGT 专属经济性
        - 医院、学术机构和赞助方运营的本地生产站点
        - 经过验证的一体箱方案，适配自体工作流
        - 已审文献显示，集成 PAT 和更广生态灵活性有限
      - - Multiply Labs
        - 机器人编排层
