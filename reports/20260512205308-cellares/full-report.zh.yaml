  - number: 3
    title: 竞争格局
    sections:
      - number: '3.1'
        title: 竞争集合是一种架构选择，不是一张扁平同行清单
        blocks:
          - type: paragraph
            body: >-
              Cellares 并不在一个镜像式同行组里竞争。买方至少有四条路线解决同一个制造问题：外包给 Cellares 这样的集中式自动化 IDMO；部署 Ori 或 Multiply 这类开放或模块化自动化平台；使用
              Lonza Cocoon 或 Miltenyi CliniMACS Prodigy 这种更靠近护理点的单设备系统；或者继续使用手工 CDMO
              和内部建设。这个区分重要，因为每条路线优化的买方目标不同。当项目方想要区域 scale-out、外包运营责任和制造加 QC 的捆绑栈时，Cellares 最强。买方看重本地控制和更短物流时，单设备或
              point-of-care 系统更强。灵活性比工业化更重要时，手工和内部选项仍有生命力。因此，正确的市场图景是按运营模式看买方选择，而不是简单罗列自动化 logo。
