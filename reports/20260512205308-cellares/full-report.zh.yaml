  - id: TR005
    title: 缓释与否决标准表
    columns:
      - 风险
      - 可监测触发项
      - 阈值 / 事件
      - 行动含义
    rows:
      - - 可比性与转移接受度
        - 工程批次、IND 修订、批次偏差、监管反馈
        - 任何失败的桥接包、未解决的偏差趋势，或与制造变更相关的临床搁置
        - 暂停估值上行假设，并在承销更多规模化主张前要求完整转移包
      - - 工厂建设与站点启用
        - Leiden 和 Kashiwa 调试里程碑、人员配置和客户导入日期
        - 相对公开 2026-2027 就绪计划出现实质延误
        - 下调收入爬坡时点，并假设更高营运资本需求
      - - BMS 与 Cabaletta 集中度
        - 合同扩张、新长期客户和已披露利用率
        - BMS 或 Cabaletta 滑坡时，没有新增有意义的长期合同
        - 将公司重新定价为集中型平台供应商，而非多元化基础设施
      - - QC、数据完整性与安全
        - 审计发现、网络事件、异常处理和放行表现数据
        - 任何质疑批次可追溯性、检测验证或系统可用性的事件
        - 在控制措施获得独立证据前，将运营杠杆主张视为受损
      - - 资本强度与利用率
        - 季度融资活动、站点支出和已披露产能使用
        - 利用率拓宽前或 2027 年商业产出可见前，需要新资本
        - 假设惩罚性融资或更慢扩张
      - - 领导层与执行带宽
        - 高管离职、时间表反复重置或 PMO 压力外显
        - 多站点推出期间流失关键制造或商业运营负责人
        - 要求更新执行计划，并下调商业化时间表信心
    notes: 触发项刻意设计为可监测，并直接绑定尽调或估值动作，而不是泛化风险标签。
