  - id: TI003
    slug: unit-economics-table
    title: 单位经济性表
    description: Public operating signals plus the unit-economics inputs that remain missing.
    columns:
      - 指标
      - 值 / 状态
      - 置信度
      - 为何重要
      - 尽调问题
    rows:
      - - Cell Shuttle 单系统吞吐量
        - 最高每年 2,500 个批次
        - 高
        - 自动化能否把固定基础设施转成更多创收批次，核心分子就在这里
        - 按站点和客户 cohort 披露实际利用率、正常运行时间和良率
      - - Cell Q 单系统吞吐量
        - 根据方法复杂度，每年 3,000 到 6,000 次批次放行
        - 高
        - 自体制造中，QC 是主要瓶颈；打开 QC 瓶颈可改变有效产能和周转时间
        - 拆出常规与复杂放行套餐的吞吐量，以及制造合同附着率
      - - Smart Factory 生产率主张
        - 约为同等占地和人员规模传统 CDMOs 的 10x
        - 中
        - 这是利润率论点的核心，因为它意味着每平方英尺和每名员工可产生更多收入
        - 提供并排基准假设和 Bridgewater 已实现吞吐量
      - - 劳动力削减主张
        - 最高 90%
        - 中
        - 直接人工是手工 CGT 制造的主要成本驱动因素
        - 分享自动化前后的每批直接人工小时，以及仍残留的手工 QC 劳动
      - - 设施面积削减主张
        - 最高 90%
        - 中
        - 洁净室空间减少应会降低固定成本强度和区域复制负担
        - 按设施阶段披露单批次成本和每个站点的装修适配负担
      - - Series B 早期经济性主张
        - 成本最高降低 75%，上市时间快一到两年
        - 中
        - 显示最初商业承诺，以及管理层早期如何框定 ROI
        - 更新这些早期主张在当前生产环境下是否仍成立
      - - 战略客户销售周期代理指标
        - BMS 从 TAP 到产能协议约 8 个月；Cabaletta 从 TAP 到商业供应约 29 个月
        - 中
        - 在缺少 CAC 和回本数据时，这是有用替代指标，因为它显示企业转化可能需要多长时间
        - 按账户客群提供周期中位数、转化率和实施成本
      - - 公开已实现毛利率
        - null
        - 低
        - 毛利率是承销制造平台最关键的缺失输入
        - 按服务线以及临床 / 商业组合披露毛利率
      - - 公开已实现单批次 ASP
