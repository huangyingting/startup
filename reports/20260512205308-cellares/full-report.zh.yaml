      - number: '8.5'
        title: 退出路径与最后尽调
        blocks:
          - type: paragraph
            body: >-
              Cellares 最终可能上市，管理层显然也在这样思考。但仅凭公开证据，较近的价值实现路径看起来仍更像私募延续轮、 战略合作或最终战略
              M&A，而不是一个近期就能完全承销的上市案。这不是否定业务，而是说明定价档案还有太多在私下。 最终尽调包因此很直接。投资人需要条款清单和股本结构表，而不只是融资标题；需要已实现的批次经济性、积压
              订单转化和各站点利用率，而不只是伙伴新闻稿；需要逐厂就绪地图、客户集中度测算，以及 BMS 和 Cabaletta 正在 变成可重复收入、而不只是旗舰轶事的证据。在这些材料披露前，本章应保持
              research-more。如果定价落在公开可比 区间附近，加上理性溢价，且私下尽调补上最大缺口，就继续；如果定价远早于披露证据就假设商业成熟，放弃并之后再看。
