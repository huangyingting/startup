      - number: '2.2'
        title: 规模测算视角：获批与管线增长、装机产能、外包需求和区域需求
        blocks:
          - type: paragraph
            body: >-
              没有一个已审阅来源给出自动化 IDMO 服务的干净 TAM、SAM 或 SOM，因此市场必须通过多个受约束视角测算。第一是疗法需求：Pharmaceutical Technology Europe 引述全球 32
              个已获批细胞和基因疗法，以及超过 2,000 个处于临床研究的产品；Frontiers 则描述德国和欧洲的 CAR-T 需求快速上升，截至 May 2025，主要制造商已治疗超过 35,685
              名患者。第二个视角是装机产能。Cellares 披露了单系统和单站点吞吐量；一旦已宣布站点上线，其公开站点区间意味着 43,000 to 215,000 annual-dose
              网络。第三个视角是项目方外包行为。BMS 预留多区域产能，Cabaletta 承诺 10-year
              供货协议，因为自身免疫需求可能要求每年数千批。第四个视角是区域需求：日本和欧洲都被描述为自体疗法的实际本地供应市场。这些视角有信息量，但不能相加；且一个第三方产能估计显著高于官方站点测算。
