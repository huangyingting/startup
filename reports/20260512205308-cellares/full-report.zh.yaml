      - number: '8.4'
        title: 公开可比与情景护栏
        blocks:
          - type: paragraph
            body: >-
              公开可比组主要用来划边界，不是给目标价。Autolus、Allogene、Lyell、Cabaletta 等开发阶段细胞治疗公司，在 检索到的 2026 年 5 月报价页上，市值大约落在 $0.4 billion
              到 $0.8 billion；商业化 Legend 则超过 $5 billion。这个跨度说明的更多是行业对验证有多敏感，而不是 Cellares 应用哪个单一正确倍数。Cellares 值得
              相对许多小型开发阶段公司拿溢价，因为它卖的是基础设施，不只是管线，而且伙伴验证异常强。但除非利用率、利润率和
              客户多元化变得可见，它还不应按成熟商业细胞治疗公司同样的基础资本化。最实用的表达方式是区间。熊市情景：转化 停滞，Cellares 更接近开发阶段同业区间。基准情景：BMS 和 Cabaletta
              验证更广的制造网络，支撑低个位数 十亿美元估值。牛市情景：多个客户和地区转化速度足够快，Cellares 开始像差异化商业基础设施，但仍未达到 Legend 成熟度。
