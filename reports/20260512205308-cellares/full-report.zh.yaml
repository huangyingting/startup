          score: 7.5
          detail: BMS 和 Cabaletta 为一家私营平台提供了异常强的公开验证。
        - label: 资本支持
          score: 8
          detail: 融资 $612M，比许多自动化同业有更长现金跑道。
        - label: 估值透明度
          score: 2
          detail: 没有公开投后估值或清晰入场锚点。
        - label: 经济性可见性
          score: 2.5
          detail: 收入、利用率和毛利率仍未公开。
        - label: 客户多元化
          score: 3.5
          detail: 公开验证集中在 BMS 和 Cabaletta。
        - label: 执行风险权衡
          score: 4
          detail: 多区域扩建带来不小的运营负担。
        - label: 竞争护城河清晰度
          score: 5
          detail: AMT 和规模有帮助，但同业也承诺激进的自动化效率提升。
        - label: 证据质量
          score: 5.5
          detail: 动能证据强，投资判断输入较弱。
