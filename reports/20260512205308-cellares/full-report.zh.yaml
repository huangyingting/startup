      - number: '5.2'
        title: 工作流集成与运营模式
        blocks:
          - type: paragraph
            body: >-
              运营工作流旨在把项目方的科学工艺转化为可重复、多站点制造，而不是执行一次性批次。Cellares 的公开路径从 TAP 式流程转换和分析桥接开始，随后进入可比性工作、工程批、cGMP 制造、自动化 QC
              放行和电子批记录输出。Smart Factories 页面补上系统胶水：从患者材料接收到 Certificate of Analysis 的条码追踪，集成 ERP 和 LIMS，配 eBR 以及 COI 或
              COC，自动化原材料管理、冷冻储存，以及把标准化流程迁移到区域站点的能力。伙伴里程碑让这个流程更具体。Bristol Myers Squibb 用该模式预留临床和商业产能；Cabaletta 从采用工作推进到
              IND amendment clearance 和首例患者给药；Autolus 正在把平台评估为未来溢出商业产能。剩下的尽调问题是：只有当可比性包和接收站点被接受时，软件定义转移才会减少返工。
