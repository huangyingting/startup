            body: >-
              Cellares 有足够公开 traction，即使不公布收入，也能显得具备商业相关性。公司引用 10-plus partnerships、14-plus unique processes、more than
              1,000 automated runs 和 more than 1,400 automated assays。它还表示临床制造已在 first half of 2026 开始，商业规模制造应在 2027
