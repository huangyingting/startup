  - number: 7
    title: 风险
    sections:
      - number: '7.1'
        title: 监管和法律风险面：进展真实，但转移和可比性仍关键
        blocks:
          - type: paragraph
            body: >-
              核心监管细节是，Cellares 已拿到有意义信号，但还没有让转移风险消失。AMT designation 是强信号，说明 FDA 认为该平台可能对先进制造重要；Cabaletta 也已经在工程批支持下获批
              IND amendment，并在 Cell Shuttle 上完成首例患者给药。这是真实去风险。它不同于公开证据证明：完整跨站点可比性包、PPQ readiness
              set，或覆盖欧洲、日本和未来商业供应的逐监管方制造 dossier 已经齐备。EMA guidance 和 Cabaletta filing evidence
              都强化了这一点：一旦引入制造变更，可比性、验证和质量体系证据仍是核心。法律风险面同样普通但不
              trivial：仲裁、网站免责声明、敏感数据处理、执法披露语言，以及反垄断、反腐败和环境合规的行为义务，都形成尽调问题，而不是红旗。实际结论是：Cellares
              最大的监管风险不是缺乏动能；而是外部投资人能看到头部成果，却仍无法检查其下的完整证明包。
