callouts:
- calloutType: insight
  title: This is a constrained manufacturing-services market, not a biotech catch-all TAM
  body: Cellares benefits from therapy growth, but it only captures the sliver of spend tied to process translation, manufacturing, QC, and regional supply. Treating all cell therapy revenue as Cellares TAM would overstate the opportunity materially.
  claimRefs:
  - CM001
  - CM002
  - CM007
  - CM035
- calloutType: risk
  title: Capacity headlines are directionally useful but not fully underwritten
  body: Official smart-factory ranges and third-party installed-capacity estimates do not line up cleanly, and public sources do not disclose utilization or renewal cohorts. That means investors can believe in growth without pretending that one precise capacity number is settled.
  claimRefs:
  - CM014
  - CM015
  - CM036
  - CM037
