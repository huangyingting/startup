- id: TM003
  title: Segment / buyer map
  columns:
  - Segment
  - Buyer
  - User
  - Payer
  - Workflow
  - Budget owner
  - Adoption trigger
  rows:
  - - Large pharma / commercial CAR-T sponsor
    - Cell therapy operations, technical operations, or CMC leadership
    - Process development, manufacturing, QC, and regulatory teams
    - Sponsor manufacturing and development budget
    - Capacity bottleneck -> platform evaluation -> process transfer -> commercial supply reservation
    - Manufacturing / CMC executive
    - Need more geographic reach, resilience, or turnaround without building another plant
  - - Late-stage or commercial-stage biotech
    - CEO, COO, or manufacturing leadership
    - Manufacturing science, alliance, and quality teams
    - Sponsor operating budget and financing proceeds
    - Clinical success -> expected demand expansion -> outsourced overflow or scale-out
    - Operations or program leadership
    - Internal footprint or cash is too limited for multi-region buildout
  - - Clinical-stage biotech
    - Development and CMC leadership
    - Process scientists and translational operations
    - R&D and clinical-development budget
    - Manual lab process -> automation feasibility -> analytical comparability -> trial supply
    - CMC / development lead
    - Need to industrialize early without re-creating the process later
  - - Academic medical center or translational institute
    - Principal investigator, translational center, or manufacturing director
    - Research staff, GMP operators, and IND teams
    - Grant, philanthropy, or sponsored-program funding
    - Bench process -> clinical-scale manufacturing -> IND support
    - Principal investigator or translational center lead
    - Need a faster path from discovery to investigational product
  - - New-modality developer (e.g. gene-edited HSC)
    - Scientific founder or modality lead
    - Analytical, manufacturing, and regulatory teams
    - Program budget or partner funding
    - Platform-process design -> assay automation -> cross-indication reuse
    - Modality program lead
    - Want a reusable manufacturing backbone across multiple rare-disease programs
  - - Hybrid internal-build customer
    - Existing internal manufacturing organization
    - Internal plant teams plus external alliance manager
    - Sponsor capex plus opex
    - Internal base capacity -> outsourced overflow or regional supplement
    - Technical operations head
    - Need to add capacity faster than a new internal site can come online
  notes: The same sponsor may show up in multiple rows over time as programs move from early development to commercial supply. The economic payer is usually the sponsor, not the downstream insurer.
