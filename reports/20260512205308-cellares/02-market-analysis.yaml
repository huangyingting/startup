  title: Market definition table
  columns:
  - Segment / category
  - Included spend
  - Excluded spend
  - Buyer / payer
  - Relevance
  rows:
  - - Automated IDMO manufacturing services
    - Process translation, manufacturing runs, tech transfer, batch release support, and regional capacity reservation for cell therapy programs
    - Therapy sales revenue and hospital reimbursement for the finished drug
    - Biopharma sponsor manufacturing, CMC, and development budgets
    - Core market that Cellares monetizes today
  - - Automated QC and analytical services
    - In-process and release QC automation, assay transfer, digital batch records, and validation support
    - General CRO testing spend unrelated to cell therapy manufacturing release
    - Sponsor QC, quality, and regulatory budgets
    - Important because Cell Q is part of the Cellares bundle
  - - Academic or translational manufacturing enablement
    - Clinical-scale automation, IND-supporting manufacturing, and analytical bridging for internally invented therapies
    - General university research grants unrelated to translational manufacturing
    - Academic medical centers, translational institutes, grant-backed program budgets
    - Relevant because academic centers are early buyers of industrialization support
  - - Internal build or hybrid manufacturing substitute
    - Sponsor capex, staffing, software, and process-control investment needed to keep manufacturing in-house
    - Any unrelated plant investment outside cell therapy
    - Sponsor balance sheet and operating budget
    - A direct substitute that caps what can be outsourced
  - - Manual or semi-automated CDMO substitute stack
    - Labor-intensive contract manufacturing, fragmented QC, and conventional tech transfer work
    - General bioprocess outsourcing outside cell therapies
    - Sponsor manufacturing spend
    - The main incumbent workflow Cellares tries to displace
  - - Excluded adjacencies
    - n/a
    - Therapy end-market sales, hospital administration spend, payer drug budgets, and broad biotech R&D software
    - Insurers, hospitals, and broader corporate functions
    - Demand drivers for therapy adoption, but not Cellares SAM
  notes: Rows separate the spend Cellares can directly capture from the much larger therapy and healthcare markets that only influence demand indirectly.
