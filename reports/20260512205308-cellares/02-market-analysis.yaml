  evidenceGaps:
  - type: missing-source
    severity: material
    topic: serviceable-market-size
    missingEvidence: A public source that isolates outsourced automated IDMO spend for cell therapy manufacturing services by sponsor segment or region.
    whyItMatters: Without a clean service-level denominator, TAM and SAM claims remain broad heuristics rather than investable market math.
    diligencePath: Collect sponsor budget benchmarks, outsourced-manufacturing mix, and capacity-utilization disclosures from CDMOs, developers, and private market studies.
    relatedQuestionRefs:
    - QM023
    relatedTableRefs:
    - TM002
  - type: private-evidence-only
    severity: material
    topic: utilization-and-renewals
    missingEvidence: Utilization rates, realized batch volumes, renewal terms, and cohort economics for reserved or contracted Cellares capacity.
    whyItMatters: Marquee reservations prove interest, but they do not prove durable throughput conversion or margin quality.
    diligencePath: Request partner cohort data, utilization dashboards, renewal history, and realized cost-per-batch data in diligence.
    relatedQuestionRefs:
    - QM026
  - type: conflicting-data
    severity: material
    topic: installed-capacity-math
    missingEvidence: A reconciled capacity model that explains why official site ranges and third-party installed-capacity estimates diverge so widely.
    whyItMatters: Capacity is one of the core underwriting variables for Cellares, and contradictory public figures weaken confidence in precise output forecasts.
    diligencePath: Request per-site system counts, assumed process durations, actual shift patterns, and the company’s definition of batch versus dose.
    relatedQuestionRefs:
    - QM024
    relatedTableRefs:
    - TM002
  - type: private-evidence-only
    severity: material
    topic: payer-pass-through
    missingEvidence: Evidence showing whether automation-driven manufacturing savings reduce therapy net price or widen payer access materially.
    whyItMatters: Operational efficiency is strategically useful, but the market case gets stronger only if savings help sponsors win reimbursement or expand treated populations.
    diligencePath: Compare sponsor gross-to-net assumptions, reimbursement dossiers, and post-launch pricing behavior for therapies made on automated platforms.
    relatedQuestionRefs:
    - QM025
    - QM027
