        blocks:
          - type: callout
            title: Cabaletta is the cleanest public conversion from evaluation to clinical and commercial proof
            body: >-
              Cabaletta gives Cellares something most manufacturing-infrastructure startups lack in public: a visible
              chain from pilot work to clinical manufacturing, first patient dosing, and a long-duration commercial
              supply agreement. That makes it the single most important customer-proof account in this chapter.
            calloutType: strength
            claimRefs:
              - CU012
              - CU014
              - CU016
              - CU017
              - CU020
          - type: callout
            title: Public proof quality is strong, but concentration math remains opaque
            body: >-
              Bristol Myers Squibb and Cabaletta anchor most of the disclosed commercial and clinical validation, while
              many other named accounts remain early-stage or evaluation-only. Without customer-count, utilization, or
              wallet-share disclosure, investors cannot know whether the visible proof surface is diversified or highly
              concentrated economically.
            calloutType: risk
            claimRefs:
              - CU038
              - CU039
              - CU040
              - CU019
  - number: 7
    title: Risks
    sections:
      - number: '7.1'
        title: 'Regulatory and legal risk surface: traction is real, but transfer and comparability still matter'
        blocks:
          - type: paragraph
            body: >-
              The core regulatory nuance is that Cellares has earned meaningful signals without yet making transfer risk
              disappear. AMT designation is a strong indicator that FDA views the platform as potentially important to
              advanced manufacturing, and Cabaletta has already cleared an IND amendment supported by engineering runs
              plus first-patient dosing on Cell Shuttle. That is real de-risking. It is not the same as public evidence
              of a complete cross-site comparability package, PPQ readiness set, or regulator-by-regulator manufacturing
              dossier covering Europe, Japan, and future commercial supply. EMA guidance and Cabaletta filing evidence
              both reinforce that comparability, validation, and quality-system evidence remain central once
              manufacturing changes are introduced. The legal surfaces are similarly ordinary but not trivial:
              arbitration, website disclaimers, sensitive-data handling, law-enforcement disclosure language, and
              conduct obligations on antitrust, anti-corruption, and environmental compliance all create diligence asks
              rather than red flags. The practical takeaway is that Cellares biggest regulatory risk is not lack of
              momentum; it is that outside investors can see the headline wins but still cannot inspect the full proof
              package underneath them.
            claimRefs:
