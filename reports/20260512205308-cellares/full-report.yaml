companyProfile:
  summary: >-
    Cellares is a South San Francisco-based private manufacturing platform trying to industrialize cell-therapy
    production through a network of automated IDMO smart factories. Public evidence shows a stronger proof surface than
    most private automation peers: the company has raised $612 million, signed a Bristol Myers Squibb
    capacity-reservation agreement worth up to $380 million, moved Cabaletta from process adoption into first-patient
    dosing and a 10-year commercial supply agreement, and is building out sites across the United States, Europe, and
    Japan. The story is best framed as infrastructure-plus-services rather than equipment-only automation.
  founders:
    - name: Fabian Gerlinghaus
      role: Co-founder and CEO
      background: Previously scaled automation technology at Synthego before founding Cellares.
      claimRefs:
        - CO011
    - name: Omar Kurdi
      role: Co-founder and President
      background: Brings operations and facility-build experience from Finesse Solutions, Synthego, and Thermo Fisher.
      claimRefs:
        - CO012
  headquarters: South San Francisco, California
  productSummary: >-
    Cellares sells automated cell-therapy manufacturing and quality-control capacity built around the Cell Shuttle
    manufacturing platform and Cell Q quality-control workcell, plus process transfer and IDMO operations across its
    smart-factory network.
  customerFocus: >-
    Primary customers are cell-therapy developers and pharma sponsors that need automated process transfer,
    manufacturing, and QC capacity. Public proof is concentrated in Bristol Myers Squibb and Cabaletta, while other
    biotech and academic accounts remain earlier-stage.
  businessModel: >-
    The model is shared manufacturing infrastructure and services: Cellares uses adoption programs, capacity
    reservations, and long-term supply agreements to monetize automated manufacturing and QC capacity rather than
    relying only on one-off equipment sales.
  stage: private, commercialization buildout
  fundingStatus: >-
    Publicly disclosed financing totals $612 million across Series B ($82 million), Series C ($255 million), and Series
    D ($257 million). Current valuation, share price, and liquidation preferences are not publicly disclosed.
