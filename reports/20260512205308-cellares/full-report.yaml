      - number: '4.2'
        title: GTM motion and sales-efficiency proxies
        blocks:
          - type: paragraph
            body: >-
              The go-to-market motion is visible even though CAC and payback are not. Cellares is using TAP as the
              wedge: a sponsor can move an existing manual process onto the Cell Shuttle in about six months, generate
              comparability or proof-of-concept data, and then decide whether to expand into clinical or commercial
              manufacturing. That is supported by a high-touch operating model in which each partnership gets an
              Alliance Manager, milestone tracking, and regulatory coordination.


              The public account histories are useful sales-efficiency proxies. Bristol Myers Squibb progressed from an
              August 2023 TAP entry to a $380 million agreement in April 2024, while Cabaletta took a longer path from
              its November 2023 TAP announcement to a March 2025 proof-of-concept milestone, January 2026 IND clearance,
              and April 2026 10-year supply agreement. By late 2025 Cellares said it already had five global
              manufacturing agreements and had launched a Biotech Incentive Program that funds automation work upfront.
              That points to a serious enterprise pipeline, but not to disclosed CAC, quota productivity, or payback.
