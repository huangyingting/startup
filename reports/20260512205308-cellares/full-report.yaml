      - number: '8.5'
        title: Exit path and final diligence
        blocks:
          - type: paragraph
            body: >-
              Cellares may eventually become a public company, and management is clearly thinking that way. But on
              public evidence alone, the nearer-term value realization path still looks more like private continuation,
              strategic partnerships, or eventual strategic M&A than a fully underwritable near-term listing. That is
              not a knock on the business. It is a statement about how much of the pricing file is still private. The
              final diligence package is therefore straightforward. Investors need the term sheet and cap table, not
              just the financing headlines. They need realized batch economics, backlog conversion, and utilization by
              site, not only partner press releases. They need a factory-by-factory readiness map, customer
              concentration math, and evidence that BMS and Cabaletta are becoming repeatable revenue rather than just
              flagship anecdotes. Until those pieces are disclosed, the chapter should remain research-more. If pricing
              lands near the public-comp cluster plus a rational premium and private diligence closes the biggest gaps,
              continue. If pricing assumes commercial maturity far ahead of disclosed evidence, pass and revisit later.
