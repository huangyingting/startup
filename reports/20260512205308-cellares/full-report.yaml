  - id: TM004
    title: Growth drivers and constraints table
    columns:
      - Driver / constraint
      - Direction
      - Timing
      - Implication
      - Diligence ask
    rows:
      - - More approved and investigational CGTs
        - Growth driver
        - Structural
        - More programs create more demand for scalable manufacturing and QC
        - How many programs are realistically candidates for outsourced automation versus internal build?
      - - Autoimmune, solid-tumor, and HSC expansion
        - Growth driver
        - Medium-term
        - Broadens the addressable modality set beyond current hematology CAR-T
        - Which modalities are genuinely process-compatible with the current platform?
      - - Regional autologous supply requirements
        - Growth driver
        - Near-term
        - On-continent or in-country production can shorten logistics and reduce turnaround risk
        - What share of sponsor demand truly requires local manufacturing by region?
      - - Labor and cleanroom savings from automation
        - Growth driver
        - Near-term
        - Improves manufacturing economics versus conventional CDMOs if utilization is high enough
        - What utilization threshold is required for savings to become durable?
      - - QC bottleneck relief
        - Growth driver
        - Near-term
        - Automated release testing can accelerate the full manufacturing cycle rather than just upstream production
        - How often is QC the true limiting step in partner programs today?
      - - AMT and regulatory support
        - Growth driver
        - Near-term
        - Can reduce uncertainty and speed sponsor interactions with regulators
        - How much faster do filings move in practice when using the AMT-designated platform?
      - - High upfront capex and long payback
        - Adoption constraint
        - Immediate
        - Can delay adoption for venture-backed or smaller developers even if long-run economics improve
        - What customer profiles can absorb the capital and validation burden?
      - - Comparability and validation burden
        - Adoption constraint
        - Persistent
        - Platform changes can still trigger significant analytical and regulatory work
        - Which process changes force the heaviest comparability package?
      - - Interoperability gaps and proprietary consumables
        - Adoption constraint
        - Persistent
        - Raises switching costs and makes some developers hesitate to commit early
        - How open is the data and consumables ecosystem in real customer deployments?
      - - Early-stage preference for manual flexibility
        - Adoption constraint
        - Persistent
        - Developers may postpone automation until later phases even if that increases future transfer pain
        - At what stage do most buyers decide to move off manual processes?
      - - Cold-chain and vein-to-vein friction
        - Adoption constraint
        - Persistent
        - Autologous programs still suffer if logistics or QC remain slow even after upstream automation
        - Which geographies or indications are most sensitive to turnaround time?
      - - Unclear price pass-through to payers
        - Adoption constraint
        - Persistent
        - Operational savings do not automatically become better reimbursement or broader access
        - Can sponsors prove automation lowers net treatment cost rather than just internal COGS?
    notes: >-
      The table emphasizes timing and underwriting implications rather than generic pros and cons because adoption
