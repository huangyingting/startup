      - number: '2.2'
        title: 'Sizing lenses: approvals and pipeline growth, installed capacity, outsourcing demand, and regional need'
        blocks:
          - type: paragraph
            body: >-
              No single reviewed source provides a clean TAM, SAM, or SOM for automated IDMO services, so the market has
              to be sized through multiple constrained lenses. The first is therapy demand: Pharmaceutical Technology
              Europe cited 32 approved cell and gene therapies worldwide and more than 2,000 products under clinical
              investigation, while Frontiers described sharply rising CAR-T demand in Germany and Europe plus more than
              35,685 patients treated by major manufacturers as of May 2025. The second lens is installed capacity.
              Cellares discloses per-system and per-site throughput, and its public site ranges imply a 43,000 to
              215,000 annual-dose network once the announced sites are online. A third lens is sponsor outsourcing
              behavior. BMS reserved multi-region capacity, and Cabaletta committed to a 10-year supply agreement
              because autoimmune demand could require thousands of batches per year. A fourth lens is regional need:
              Japan and Europe are both framed as practical local-supply markets for autologous therapies. These lenses
              are informative, but they are not additive, and one third-party capacity estimate is materially higher
              than the official site math.
