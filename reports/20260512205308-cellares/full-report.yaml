      - number: '5.3'
        title: Cell Shuttle, Cell Q, and modality architecture
        blocks:
          - type: paragraph
            body: >-
              The deepest technical disclosures are on the Cell Shuttle itself. Cellares describes a cartridge-centric
              architecture where one batch runs on a dedicated, pre-sterilized consumable cartridge with dedicated
              reagent bottles inside a closed ISO 8 environment. Around that disposable core sit a Reagent Vault System,
              four sterile liquid transfer systems, a material-handling system, and 16 bioprocessing systems that can
              run up to 16 cartridges asynchronously. Publicly named unit operations include cell separation, magnetic
              selection, electroporation, gene editing, activation, and expansion in a perfusion-enabled stirred-tank
              bioreactor with closed-loop monitoring of temperature, dissolved oxygen, and pH. The Process Design
              Studio, integrated MES, real-time monitoring, and auto-generated electronic batch records are important
              because they make the hardware software-defined rather than fixed-function. That architecture explains why
              Cellares claims support for autologous and allogeneic processes and roughly 90% of cell-therapy
              modalities. What is not public is the full performance envelope by modality, not the architecture itself.
