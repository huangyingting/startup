      - number: '3.5'
        title: Exhibits
        blocks:
          - type: callout
            title: Cellares is selling an operating model, not just an automation tool
            body: >-
              Its competitive pitch bundles capacity, QC, regulatory positioning, and service packaging. That makes
              Cellares harder to compare to a single equipment vendor, but also exposes it to buyers who prefer local
              control over an external network.
