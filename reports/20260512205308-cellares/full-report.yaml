              - CV038
      - number: '8.3'
        title: Why public underwriting still fails today
        blocks:
          - type: paragraph
            body: >-
              The anti-thesis is not that Cellares lacks ambition. It is that public evidence still cannot resolve the
              underwriting basics. The company has not publicly disclosed a current valuation or preference stack.
              Sponsor filings do not show realized revenue contribution from Cellares, current factory utilization, or
              sponsor-level gross-margin proof tied to the platform. Even the strongest Cabaletta filing language is
              still forward-looking: it describes how Cellares could reduce cost and improve scheduling after approval,
              not how much profit is already visible today. Public proof also remains heavily company- and
              partner-generated. That matters because closed-loop automation in cell therapy is still a difficult market
              where adoption barriers remain material and even peer automation vendors make sweeping throughput claims.
              In that context, the right question is not whether Cellares is promising. It is whether any proposed price
              already assumes widespread adoption, diversified bookings, and efficient factory economics before those
              things are public. If the answer is yes, the chapter should stop at research-more rather than stretch into
              price-taking enthusiasm.
            claimRefs:
              - CV009
