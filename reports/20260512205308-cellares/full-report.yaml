      - number: '2.4'
        title: Growth drivers, adoption constraints, and preserved sizing gaps
        blocks:
          - type: paragraph
            body: >-
              The growth case is straightforward: more approved therapies, more programs moving into autoimmune disease
              or solid tumors, higher expectations for regional autologous supply, and stronger pressure to reduce
              labor, batch failure, and QC bottlenecks. Automation also fits regulators’ and sponsors’ demand for
              traceability, auditability, and better data. But the constraints are just as material. Automation can
              require heavy upfront capex, long payback periods, comparability work across jurisdictions, and
              integration effort across MES, LIMS, and analytics systems. Interoperability gaps and proprietary
              consumables can also make buyers wary of lock-in. Many developers still keep manual methods in early
              clinical work because flexibility is worth more than efficiency at that stage. Most importantly, the
              public record still leaves several underwriting gaps unresolved: no clean SAM, no public utilization data
              for reserved capacity, no reliable proof that savings are being passed through to therapy payers, and no
              settled answer on which published capacity estimate is the right one to trust. The right conclusion is
              directionally bullish but precision-constrained.
