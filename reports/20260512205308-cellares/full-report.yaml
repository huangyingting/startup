            body: >-
              Cellares has enough public traction to look commercially relevant without publishing revenue. The company
              cites 10-plus partnerships, 14-plus unique processes, more than 1,000 automated runs, and more than 1,400
              automated assays. It also says clinical manufacturing began in the first half of 2026 and commercial-scale
              manufacturing should begin in 2027. Those are meaningful markers for a private manufacturing platform.


              Capital dependency, however, is more visible than capital adequacy. Cellares has raised $612 million
              across Series B, C, and D, and the latest round is explicitly funding a four-site network. The public
              record shows a cGMP Cell Shuttle online in South San Francisco by March 2024, a 105,000-square-foot
              long-term lease and phased fit-out in Leiden, active buildout in Japan, and continuing investment in
              Bridgewater. Customer-side language strengthens the same conclusion from a different angle: Cabaletta and
              Autolus both portray Cellares as a minimal-capital or capital-efficient path for them, which is
              commercially powerful but implies Cellares bears much of the infrastructure burden. What is still absent
