chapters:
  - number: 1
    title: Company Overview
    sections:
      - number: '1.1'
        title: Identity, operating model, and geographic footprint
        blocks:
          - type: paragraph
            body: >-
              Cellares presents itself as the first Integrated Development and Manufacturing Organization, or IDMO,
              built specifically to industrialize cell therapy production rather than operate as a conventional manual
              CDMO. The current homepage and company page anchor the identity in South San Francisco while describing a
              broader network of smart factories meant to let sponsors scale globally from the same automated process
              standard. The disclosed footprint now spans South San Francisco, Bridgewater, Leiden, and Kashiwa, with
              global capacity claims reaching 215,000 batches and 10x productivity versus manual facilities. That is a
              strong industrial identity story, but one notable basic fact is still missing: the reviewed public pack
              does not disclose an exact founding year or founding date. Investors therefore have a clear top-line
              picture of what Cellares says it is building and where it is building it, but not yet a fully anchored
              incorporation history or a public headcount baseline for the business.
