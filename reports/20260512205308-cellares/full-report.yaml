      - number: '2.3'
        title: Buyer, user, payer, and adoption path
        blocks:
          - type: paragraph
            body: >-
              The primary buyers are cell therapy sponsors, but they are not all the same. Large-pharma or commercial
              CAR-T sponsors buy automation as overflow, geographic expansion, or resilience capacity. Late-stage
              biotechs buy it when internal manufacturing would be too slow or too capital intensive. Academic and
              translational centers use it to get from bench science to IND-ready production without building industrial
              infrastructure from scratch. Inside the customer organization, the budget owner usually sits in CMC,
              technical operations, manufacturing, or development leadership. The users are process-development
              scientists, manufacturing teams, QC groups, and regulatory staff who must move a live process and its
              assays onto a new platform without breaking comparability. Adoption therefore follows a sequence rather
              than a simple purchase order: evaluate bottlenecks, translate the process, bridge analytics, validate data
              flows, and then decide where regional production and release testing should sit. Sponsor economics matter
              most directly, but the logic is still downstream-linked because reimbursement pressure and cold-chain
              constraints shape how much manufacturing spend a sponsor can absorb.
            claimRefs:
              - CM016
              - CM017
              - CM018
              - CM021
              - CM022
              - CM023
