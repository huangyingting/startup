  - number: 3
    title: Competitors
    sections:
      - number: '3.1'
        title: The competitive set is an architecture choice, not a flat peer list
        blocks:
          - type: paragraph
            body: >-
              Cellares does not compete in a single mirror-image peer group. Buyers can solve the same manufacturing
              problem through at least four routes: outsource into a centralized automated IDMO such as Cellares, deploy
              an open or modular automation platform such as Ori or Multiply, use an installed one-device system such as
              Lonza Cocoon or Miltenyi CliniMACS Prodigy closer to the point of care, or stay with manual CDMOs and
              internal build. That distinction matters because each route optimizes for a different buyer objective.
              Cellares is strongest when a sponsor wants regional scale-out, outsourced operational responsibility, and
              a bundled manufacturing-plus-QC stack. One-device or point-of-care systems look stronger when the buyer
              prizes local control and shorter logistics. Manual and internal options remain alive when flexibility
              matters more than industrialization. The right landscape frame is therefore buyer choice by operating
              model rather than a simple list of automation logos.
            claimRefs:
