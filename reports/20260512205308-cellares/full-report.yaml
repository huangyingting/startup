      - number: '8.2'
        title: Why the story deserves attention in principle
        blocks:
          - type: paragraph
            body: >-
              There is a real thesis here. Cellares is not asking investors to believe in a market that does not exist.
              Cell-therapy manufacturing is already a bottleneck, and Cellares has stronger public validation than most
              private automation peers. Bristol Myers Squibb reserved multi-region capacity under a contract worth up to
              $380 million. Cabaletta progressed from an evaluation relationship to TAP completion, IND amendment
              clearance, first patient dosing, and a 10-year supply agreement. Series D raised enough capital to
              continue building a global network rather than a single demonstration site. Management also appears to be
              staffing for the next stage rather than simply celebrating platform slides. Those facts justify ongoing
              diligence and explain why Cellares can plausibly command a premium to smaller automation peers or
              pre-proof cell-therapy names. The key is that the premium has to remain tethered to what has actually been
              demonstrated. Public evidence shows real commercial intent and early manufacturing proof, not yet a
              diversified, margin-visible infrastructure business.
            claimRefs:
              - CV003
              - CV005
              - CV006
              - CV007
              - CV008
