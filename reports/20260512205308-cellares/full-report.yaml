  - number: 8
    title: Valuation
    sections:
      - number: '8.1'
        title: Recommendation and entry discipline
        blocks:
          - type: paragraph
            body: >-
              The first valuation problem is not whether Cellares is interesting. It is whether public evidence is
              sufficient to price it. The answer is still no. Cellares clearly has more traction than a typical
              automation startup: $612 million raised, a blue-chip commercial agreement with Bristol Myers Squibb, a
              credible Cabaletta proof chain from TAP through patient dosing, and a management team openly preparing for
              IPO. Those are real positives. But none of the retained public sources disclose the current post-money
              valuation, price per share, liquidation preferences, or secondary marks. Public sources also do not
              provide a clean bridge from reserved capacity and pilot wins to realized utilization, revenue, or gross
              margin. That means a precise buy or avoid call at the current private price would be false precision. The
              appropriate recommendation is research-more and explicitly price-sensitive. Continue diligence if the next
              round is priced near the public peer cluster plus a defensible premium for infrastructure proof; pause if
              investors are being asked to pay as though diversified commercial scale is already visible.
            claimRefs:
              - CV003
