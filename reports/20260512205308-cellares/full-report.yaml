      - number: '7.4'
        title: 'Capital, people, and thesis breaks: this is now an execution-heavy underwriting problem'
        blocks:
          - type: paragraph
            body: >-
              Cellares has moved past the stage where the primary risk is whether anyone cares about the idea. The
              harder question now is whether the company can coordinate sites, partners, QC, leadership, and financing
              tightly enough to convert early wins into repeatable commercial infrastructure. Series D and the broader
              investor roster give the company more room than a typical manufacturing startup, but the same funding
              history also raises the performance bar: four smart-factory sites, 2026 clinical manufacturing, 2027
              commercial-scale output, and IPO preparation imply a large capex and operating burden before diversified
              utilization is public. Leadership depth matters because the operating model requires specialized
              commercial, manufacturing, quality, and program-management talent across geographies. Public sources also
              remain thin on security certifications, backlog conversion, and exact utilization. The cleanest
              thesis-break indicators are therefore operational rather than narrative. A failed comparability bridge,
              repeated site-slippage, a batch-quality problem, or evidence that BMS and Cabaletta do not convert into
              repeat bookings would undercut the commercialization case faster than any website legal issue ever could.
