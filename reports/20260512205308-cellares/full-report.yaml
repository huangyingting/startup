  - number: 5
    title: Product & Technology
    sections:
      - number: '5.1'
        title: What the product actually is
        blocks:
          - type: paragraph
            body: >-
              Cellares should be underwritten as productized manufacturing infrastructure plus a service model rather
              than as a point instrument or a generic CDMO labor wrapper. Official materials consistently package four
              deliverables together: the Cell Shuttle manufacturing platform, the Cell Q QC workcell, a global Smart
              Factory network, and services for process translation, analytical bridging, and regulatory consultation.
              In customer workflow terms, the sponsor brings a manual or semi-manual cell-therapy process, and Cellares
              translates that process onto an automated stack that links manufacturing, QC, and records. That framing
              matters because the moat is not only the machine. It is the combination of hardware, single-use
              consumables, QC automation, and regional capacity. Public evidence is strongest on that bundled model, not
              on standalone SKU pricing, licensed software, or independently disclosed utilization economics.
