  - number: 2
    title: Market Analysis
    sections:
      - number: '2.1'
        title: Market boundary, included spend, and status-quo substitutes
        blocks:
          - type: paragraph
            body: >-
              Cellares should be sized as an automation-enabled manufacturing-services company, not as a therapeutic
              developer and not as a generic biotech-infrastructure story. The immediate market is sponsor spending on
              process translation, end-to-end manufacturing, QC release automation, and regulatory support for cell
              therapy programs that must move from fragile manual workflows into repeatable clinical and commercial
              supply. That boundary matters because the closest substitutes are not laboratory research tools or
              hospital IT budgets; they are manual or semi-automated CDMOs, sponsor in-house manufacturing groups, and
              emerging decentralized or bedside production models. Cellares’ own materials also widen the served market
              beyond classic CAR-T by emphasizing auto/allo flexibility and expansion into gene-edited HSC workflows.
              What should stay outside the core market is downstream therapy revenue, hospital administration spend, and
              the full value of cell therapy end-markets. Those are important demand drivers, but they are not the same
              thing as the serviceable spend that Cellares actually tries to capture.
            claimRefs:
              - CM001
              - CM002
              - CM003
