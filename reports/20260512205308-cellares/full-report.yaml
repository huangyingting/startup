    layout: standard
    summary: >-
      IC-style scorecard for Cellares on commercial proof, valuation visibility, economics visibility, concentration
      risk, and evidence quality.
    approximationNotes: Scores are 0-10 heuristics derived from retained evidence, not external ratings.
