        - label: Capital support
          score: 8
          detail: $612M raised gives more runway than many automation peers.
        - label: Valuation transparency
          score: 2
          detail: No public post-money or clean entry marker.
        - label: Economics visibility
          score: 2.5
          detail: Revenue, utilization, and margins remain private.
        - label: Customer diversification
          score: 3.5
          detail: Public proof is concentrated in BMS and Cabaletta.
        - label: Execution risk balance
          score: 4
          detail: Multi-region build-out creates meaningful operational burden.
        - label: Competitive moat clarity
          score: 5
          detail: AMT and scale help, but peers also promise aggressive automation gains.
        - label: Evidence quality
          score: 5.5
          detail: Strong on momentum, weaker on underwriting inputs.
