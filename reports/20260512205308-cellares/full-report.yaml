        title: Workflow integration and operating model
        blocks:
          - type: paragraph
            body: >-
              The operating workflow is designed to convert sponsor science into repeatable, multi-site manufacturing
              rather than one-off batch execution. Cellares' public path starts with TAP-style process translation and
              analytical bridging, then moves into comparability work, engineering runs, cGMP manufacturing, automated
              QC release, and electronic batch-record output. The Smart Factories page adds the system glue: barcode
              tracking from patient material receipt through Certificate of Analysis, integrated ERP and LIMS with eBR
              and COI or COC, automated raw-material management, cryostorage, and the ability to move a standardized
              process into regional sites. Partner milestones make that flow more concrete. Bristol Myers Squibb uses
              the model for reserved clinical and commercial capacity, Cabaletta progressed from adoption work to IND
              amendment clearance and first patient dosing, and Autolus is evaluating the platform as future overflow
              commercial capacity. The remaining diligence issue is that software-defined transfer reduces rework only
