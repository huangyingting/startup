company:
  name: Cellares
chapter:
  number: 4
  title: Financials
  summary: |-
    Cellares’ public financial profile is that of a capital-intensive outsourced manufacturing platform with visible contract logic but almost no reusable company-level disclosure. The revenue model is real enough to see—TAP onboarding, clinical manufacturing, QC automation, regulatory support, capacity reservation, and long-term commercial supply—but realized pricing, revenue, margin, cash, burn, and runway remain private. That leaves investors with a credible commercial narrative anchored by BMS and Cabaletta, yet still without the core numbers required to underwrite liquidity, profitability, or valuation.
sections:
- id: revenue-model-and-pricing
  title: Revenue model, pricing posture, and what is actually public
  body: |-
    Cellares’ public financial story is based on a contract-manufacturing and infrastructure-services model, not on software subscriptions or equipment sales. The current service pages show several visible monetization layers: process translation onto Cell Shuttle, analytical bridging and release testing on Cell Q, regulatory consultation, clinical manufacturing, and eventual commercial supply. That makes the business look more like an integrated outsourced manufacturing partner than a pure automation-tool vendor.

    The pricing story is directionally clear but numerically opaque. Cellares says it offers transparent per-batch pricing with no hidden fees and no royalty or licensing charges. Public anchor agreements reinforce the contract logic: Bristol Myers Squibb signed a capacity reservation and supply agreement valued up to $380 million, while Cabaletta signed a 10-year commercial supply agreement built around thousands of batches per year. Additional modality-expansion partnerships such as ProTGen suggest future service breadth, but what remains missing is the information an investor would actually model: realized batch pricing, milestone splits, minimum-volume commitments, cancellation economics, and revenue-recognition timing.
