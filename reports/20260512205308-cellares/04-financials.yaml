- id: TI002
  slug: pricing-monetization-table
  title: Pricing / monetization table
  description: What is publicly knowable about pricing and what remains entirely private.
  columns:
  - Price / unit / contract
  - List vs realized pricing
  - Discounts / unknowns
  - Source / implication
  rows:
  - - Transparent per-batch pricing with no hidden fees
    - Official pricing posture, not a quoted price sheet
    - No public batch price, regional adjustment, or volume tier schedule
    - Shows Cellares wants to be read as a predictable outsourced manufacturing utility rather than a
      bespoke consulting shop
  - - No royalty or licensing fees
    - Official contract term posture, not proof of low total cost
    - No disclosure on pass-through consumables, minimum commitments, or QC surcharges
    - Important for customer messaging but still not enough to estimate realized economics
  - - TAP onboarding and process transfer in about six months
    - Commercial mechanism is public; fee is private
    - No public setup fee, success fee, or refund structure
    - Suggests a paid or subsidized enterprise wedge but leaves customer-acquisition economics hidden
  - - BMS capacity reservation and supply agreement valued up to $380M in upfront and milestone payments
    - Headline contract value, not realized revenue
    - Upfront/milestone split, duration details, cancellation economics, and minimum utilization are not
      public
    - Strong evidence of enterprise-scale economics, but still impossible to revenue-model cleanly
  - - Cabaletta 10-year commercial agreement with thousands of batches per year targeted
    - Public long-term commercial structure, realized price private
    - Exact batch price, minimum take-or-pay volume, and margin structure are undisclosed
    - Strongest commercial proof point, but still only a qualitative pricing anchor
  - - Cell Q / Cell Shuttle economic positioning
    - Company claims include up to 50% lower batch price and among the lowest cost per batch in the industry
    - No audited comparison set, no realized customer savings bridge
    - Useful for positioning and negotiation context, insufficient for underwriting realized ASP or gross
      margin
  notes: Every public pricing statement here is either a positioning claim or a headline contract value,
    not a realized net-price disclosure.
