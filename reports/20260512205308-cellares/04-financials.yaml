- id: TI003
  slug: unit-economics-table
  title: Unit economics table
  description: Public operating signals plus the unit-economics inputs that remain missing.
  columns:
  - Metric
  - Value / status
  - Confidence
  - Why it matters
  - Diligence ask
  rows:
  - - Cell Shuttle throughput per system
    - Up to 2,500 batches per year
    - High
    - Core numerator for how automation could convert fixed infrastructure into more revenue-producing
      batches
    - Disclose actual utilization, uptime, and yield by site and customer cohort
  - - Cell Q throughput per system
    - 3,000 to 6,000 batch releases per year depending on method complexity
    - High
    - QC is a major bottleneck in autologous manufacturing; relieving it can change effective capacity
      and turnaround
    - Break out throughput for routine versus complex release packages and attach rate to manufacturing
      contracts
  - - Smart-factory productivity claim
    - About 10x versus conventional CDMOs with similar footprint and headcount
    - Medium
    - Central to the margin thesis because it implies more revenue per square foot and employee
    - Provide side-by-side benchmark assumptions and realized throughput at Bridgewater
  - - Labor reduction claim
    - Up to 90%
    - Medium
    - Direct labor is a major cost driver in manual CGT manufacturing
    - Share direct labor hours per batch before and after automation and any residual manual QC labor
  - - Facility-size reduction claim
    - Up to 90%
    - Medium
    - Less cleanroom space should lower fixed-cost intensity and regional duplication burden
    - Disclose cost per batch by facility phase and fit-out burden per site
  - - Early economic claim from Series B
    - Up to 75% lower costs and one to two years faster time to market
    - Medium
    - Shows the original commercial promise and how management framed ROI early on
    - Update whether those early claims still hold for current production settings
  - - Strategic-account sales-cycle proxy
    - BMS about 8 months TAP-to-capacity deal; Cabaletta about 29 months TAP-to-commercial supply
    - Medium
    - Useful substitute for missing CAC and payback because it shows how long enterprise conversion can
      take
    - Provide median cycle length, conversion rate, and implementation cost by account segment
  - - Public realized gross margin
    - null
    - Low
    - Gross margin is the key missing input for underwriting a manufacturing platform
    - Disclose gross margin by service line and by clinical versus commercial mix
  - - Public realized ASP per batch
    - null
    - Low
    - Needed to translate throughput into revenue capacity
    - Disclose average realized price by customer class, geography, and stage of development
  - - Public CAC / payback
    - null
    - Low
    - Without CAC and payback, sales efficiency cannot be benchmarked against other platform or services
      businesses
    - Provide enterprise-sales spend, conversion funnel, and payback by program cohort
  notes: The table mixes disclosed operating metrics with explicit nulls where public unit-economics disclosure
    does not exist.
