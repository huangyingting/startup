- id: TI001
  slug: revenue-streams-table
  title: Revenue streams table
  description: Publicly visible revenue mechanisms separated from pseudo-revenue and still-undisclosed
    economics.
  columns:
  - Stream
  - Mechanism
  - Unit
  - Current value / status
  - Quality
  - Diligence ask
  rows:
  - - Technology Adoption Partnership / process translation
    - Manual process is translated, automated, and tech-transferred onto Cell Shuttle as an onboarding
      wedge
    - Per program / tech-transfer engagement
    - Publicly active with BMS, Cabaletta, Kite, and other partners; fee structure undisclosed
    - High on mechanism, low on dollars
    - Disclose setup fees, conversion rates, and whether onboarding is paid, subsidized, or milestone-based
  - - Clinical manufacturing services
    - GMP batch manufacturing on Cell Shuttle after comparability or IND-enabling work
    - Patient batch / clinical program
    - Active clinical manufacturing is public for rese-cel; other named programs remain in evaluation
      or preclinical stages
    - Good demand proof, weak revenue visibility
    - Share batch pricing, utilization, turnaround SLAs, and who pays for failed runs
  - - Commercial supply / capacity reservation
    - Multi-year reserved capacity and supply agreements tied to future commercial demand
    - Reserved systems / batches / contract value
    - BMS up to $380M; Cabaletta 10-year commercial supply with thousands of batches per year targeted
    - Strongest visible revenue-quality signal, but partly contingent
    - Break out upfront versus milestone economics, minimum volumes, exclusivity, and take-or-pay terms
  - - Analytical bridging and release testing via Cell Q
    - Automation of in-process and release QC with pre-qualified assays and digital records
    - Batch release / assay package
    - Cell Q publicly supports 3,000-6,000 batch releases per year depending on method complexity
    - Clear monetization logic, no standalone pricing
    - Disclose QC-only pricing, attach rate to manufacturing, and contribution to gross margin
  - - Regulatory consultation / CMC support
    - Briefing books, Module 3 support, IR responses, LoAs, and AMT-enabled strategy work
    - Project / filing support
    - Explicitly marketed as part of the IDMO journey
    - Service is clear, billing model is not
    - Clarify whether regulatory work is bundled into manufacturing contracts or sold as separate services
  - - Biotech Incentive Program
    - Cellares funds and executes automation work while taking upfront technical risk to reduce customer
      friction
    - Customer-acquisition subsidy / onboarding program
    - Publicly described in the CCO release, but no budget or conversion data disclosed
    - Potentially important GTM lever, economically opaque
    - Disclose spend per cohort, conversion to paid manufacturing, and payback period
  notes: The table distinguishes visible contract structures from the economics still missing in open
    sources.
