- id: TI005
  slug: public-financial-gaps-table
  title: Public financial gaps table
  description: The missing numbers that still block a full underwriting or valuation model.
  columns:
  - Missing private metric
  - Impact
  - Exact diligence path
  rows:
  - - Recognized revenue / ARR / revenue mix
    - Blocks any credible top-line model and makes it impossible to distinguish pilot, clinical, and commercial
      contribution
    - Request monthly and annual revenue by service line, customer, geography, and clinical versus commercial
      stage
  - - Realized ASP and discount schedule
    - Prevents translation of throughput into revenue and obscures negotiating power
    - Request batch pricing, capacity fees, rebates, and milestone schedules for each major contract archetype
  - - Gross margin / batch COGS
    - Prevents judgment on whether automation claims translate into economic advantage
    - Request gross-margin bridge by service line with labor, consumables, QC, logistics, and failure-rate
      assumptions
  - - Customer concentration and backlog conversion
    - Named counterparties do not reveal how dependent Cellares is on one or two anchors
    - Provide contracted backlog, reserved capacity, utilization, and revenue concentration by top customer
  - - Site utilization by factory and by system
    - Capacity claims are not revenue without utilization
    - Share actual versus designed utilization for Cell Shuttle and Cell Q by site and quarter
  - - Cash balance, burn, and runway
    - Without liquidity metrics, capital adequacy cannot be tested
    - Provide latest balance sheet cash, monthly burn, and management runway assumptions
  - - Debt, equipment financing, lease obligations, and working capital
    - Hidden fixed obligations could dominate the risk profile even if equity funding looks strong
    - Provide full liability schedule, equipment financing, lease obligations, and inventory/receivables/payables
      bridge
  - - Capex budget by site and modality
    - Factory buildout cannot be linked to remaining capital without a phased budget
    - Provide site-by-site capex, fit-out, and automation deployment plan with timing to readiness
  - - CAC / payback and TAP conversion metrics
    - Enterprise sales efficiency remains anecdotal without funnel economics
    - Provide cohort conversion from TAP to clinical manufacturing to commercial supply and the cost to
      acquire each program
  notes: The open-source record is strong enough to describe the model, but not strong enough to value
    it.
