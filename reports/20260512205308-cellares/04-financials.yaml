- id: cost-structure-and-unit-economics
  title: Cost structure and unit economics are directionally attractive but still largely unproven
  body: |-
    Cellares has made the economic thesis easy to understand. The company says each Cell Shuttle can support up to 2,500 batches per year, each Cell Q can handle roughly 3,000 to 6,000 release batches, and the overall smart-factory model produces about 10 times the output of a conventional CDMO with up to 90% less labor and facility footprint. It has also stacked explicit cost claims on top of those operating metrics: up to 50% lower batch prices in the Cell Q launch, up to 75% lower costs in early Cell Shuttle materials, and lower time to market through faster tech transfer and regional scale-out.

    Third-party industry context makes those claims directionally plausible. ISPE and McKinsey both describe manual autologous CAR-T manufacturing as labor-heavy, high-COGS, and scale-out constrained. But plausible is not the same as underwritten. Cellares does not disclose realized gross margin, batch COGS, site utilization, warranty or failure-cost burden, or any actual contract ASP. The public unit-economics bridge therefore stops at operational claims and external context rather than arriving at a revenue-to-gross-profit model.
