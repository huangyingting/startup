- id: TI004
  slug: capital-adequacy-table
  title: Capital adequacy table
  description: What is visible about financing and capital intensity versus what remains unknowable from
    public materials.
  columns:
  - Capital input
  - Public value / status
  - Confidence
  - Why it matters
  - Diligence ask
  rows:
  - - Latest primary financing
    - $257M Series D announced January 2026
    - High
    - Latest external equity buffer against immediate financing stress
    - Disclose net proceeds after fees and current unrestricted cash remaining from the round
  - - Total capital raised
    - $612M cumulative
    - High
    - Shows how much equity capital has already been required before public revenue disclosure
    - Provide a sources-and-uses bridge from inception to current date
  - - Planned use of Series D proceeds
    - Four-site buildout, commercial launch, and path toward becoming a public company
    - High
    - Tells investors the money is still being used to industrialize capacity rather than simply harvest
      it
    - Break out budget by South San Francisco, Bridgewater, Leiden, Japan, and central functions
  - - Publicly disclosed cash on hand
    - null
    - Low
    - Cash is the starting point for runway analysis
    - Provide latest month-end cash, restricted cash, and short-term investment balances
  - - Publicly disclosed burn
    - null
    - Low
    - Burn determines whether the capital stack is ample or already under pressure
    - Provide trailing 12-month operating cash burn and expected 2026-2027 spend profile
  - - Publicly disclosed runway
    - null
    - Low
    - Without runway, investors cannot judge whether current financing reaches breakeven, another round,
      or a liquidity event
    - Provide management base-case runway and downside-case runway
  - - Public debt / project-finance obligations
    - No current debt or credit facility was identified in the reviewed public pack
    - Low
    - Hidden recourse, equipment finance, or working-capital lines could materially change risk
    - Provide full debt schedule, equipment leases, covenants, and any project-finance structures
  - - European site commitment
    - About 105,000 sq ft long-term lease plus phased fit-out and later-2026 occupancy
    - Medium
    - Lease and fit-out commitments consume cash before revenue from that node is visible
    - Share lease liability, fit-out capex, and timing to operational readiness
  - - Japan site commitment
    - Facility under construction, regional launch planned, ~350 jobs expected
    - Medium
    - Shows additional headcount and buildout intensity for international scale
    - Disclose capex, hiring ramp, and expected utilization milestones for Kashiwa
  - - Customer capital-light signal
    - Cabaletta and Autolus both describe Cellares as a minimal-capital or capital-efficient expansion
      path for them
    - Medium
    - Commercially attractive for customers, but it implies Cellares carries a large share of infrastructure
      burden
    - Provide customer prepayment mix, committed volumes, and capex-recovery assumptions by contract
  notes: Public financing facts are clear; public liquidity facts are not.
