- id: capital-base-and-stakeholders
  title: Capital base, stakeholder map, and commercial anchors
  body: |-
    Cellares’ capital story is unusually large for a private manufacturing platform company. The public financing record now shows an $82 million Series B, a $255 million Series C, and a $257 million Series D, with the latest round taking total capital raised to $612 million. That latest round is also revealing because management tied it directly to a four-site buildout and a future path toward public-company status, meaning the business is still financing infrastructure creation rather than merely harvesting an already scaled network. Bristol Myers Squibb matters most in the stakeholder map because it spans both equity and revenue logic: BMS participated in Series C and later signed the $380 million capacity reservation agreement. Cabaletta is the clearest commercialization validator because it progressed from TAP into IND clearance, first dosing, and a 10-year supply agreement. What public sources still do not provide is a valuation anchor or a clean picture of non-equity capital, leaving ownership concentration, current marks, and debt exposure as unresolved diligence items.
  claimRefs:
