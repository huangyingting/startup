company:
  name: Cellares
chapter:
  number: 1
  title: Company Overview
  summary: |-
    Cellares is a South San Francisco-based private cell-therapy manufacturing company that now describes itself as the first Integrated Development and Manufacturing Organization, or IDMO, built to scale cell therapies through a global network of automated smart factories. By May 2026 the company had raised $612 million, secured FDA AMT designation for its Cell Shuttle platform, expanded its footprint across the U.S., Europe, and Japan, and publicly crossed into active clinical manufacturing through Cabaletta’s rese-cel program. The main diligence challenge is not lack of momentum but lack of disclosure: founding date, valuation, headcount, revenue, and several governance details remain publicly unresolved despite the increasingly large capital and customer commitments around the platform.
sections:
- id: identity-and-footprint
  title: Identity, operating model, and geographic footprint
  body: |-
    Cellares presents itself as the first Integrated Development and Manufacturing Organization, or IDMO, built specifically to industrialize cell therapy production rather than operate as a conventional manual CDMO. The current homepage and company page anchor the identity in South San Francisco while describing a broader network of smart factories meant to let sponsors scale globally from the same automated process standard. The disclosed footprint now spans South San Francisco, Bridgewater, Leiden, and Kashiwa, with global capacity claims reaching 215,000 batches and 10x productivity versus manual facilities. That is a strong industrial identity story, but one notable basic fact is still missing: the reviewed public pack does not disclose an exact founding year or founding date. Investors therefore have a clear top-line picture of what Cellares says it is building and where it is building it, but not yet a fully anchored incorporation history or a public headcount baseline for the business.
  claimRefs:
