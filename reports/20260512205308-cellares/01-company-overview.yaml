- id: open-questions-and-adverse-checks
  title: Open questions and adverse checks
  body: |-
    The main underwriting tension in the public record is that Cellares has accumulated real customer, regulatory, and infrastructure validation faster than it has accumulated reusable public disclosures. Founding date, valuation, headcount, revenue, and customer-count metrics all remain missing from the reviewed pack. The clearest adverse evidence is not a lawsuit or enforcement action but customer-side risk disclosure. Cabaletta’s 2025 Form 10-K explicitly warns that manufacturing delays or capacity constraints at Cellares or other manufacturing partners could disrupt trial supply and enrollment, and the same filing makes clear that the January 2026 manufacturing agreement is terminable subject to notice. No direct legal-news or layoff signal surfaced in the cached materials reviewed here, but that absence should not be over-read. The right conclusion for a diligence reader is that Cellares has built a credible industrial narrative with real milestones, while several basic company-level disclosure items still require direct management answers before the platform can be underwritten as a later-stage private company.
  claimRefs:
  - CO018
  - CO023
