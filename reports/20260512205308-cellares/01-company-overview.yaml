- id: milestones-and-validation
  title: Milestones, regulatory progress, and infrastructure validation
  body: |-
    The milestone record is what turns Cellares from a concept company into a reusable diligence baseline for later chapters. The company commissioned its first Bridgewater cGMP Cell Shuttle in 2024, secured FDA AMT designation for the Cell Shuttle in 2025, and expanded its network into Japan and Europe as 2026 began. Those are important infrastructure markers, but the strongest public validation came through Cabaletta. The companies completed a rese-cel TAP in March 2025, secured FDA IND amendment clearance in January 2026, and publicly disclosed first patient dosing in April 2026. That progression is more valuable than generic automation marketing because it shows the platform reaching an active clinical program. The Stanford and City of Hope collaborations also broaden the story beyond one customer or one modality by extending the platform into HSC manufacturing and solid-tumor CAR-T workflows. Taken together, the chronology shows a company that has advanced materially toward clinical and commercial relevance even though detailed financial transparency remains thin.
  claimRefs:
