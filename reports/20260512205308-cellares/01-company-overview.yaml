- id: leadership-and-governance
  title: Leadership, governance, and key-person dependency
  body: |-
    Leadership quality is a central part of the investment case because Cellares is still selling an execution-heavy manufacturing platform rather than a mature, transparently reported operating business. The founder pair remains visible: Fabian Gerlinghaus is still the public face of platform strategy and fundraising, while Omar Kurdi covers operations and manufacturing scale-up. The 2024 appointment of Ossama Eissa added commercial CAR-T manufacturing depth from Legend, Lonza, and Novartis, and the 2025 appointment of Ali Soleymannezhad added commercial go-to-market and public-market preparation experience. The advisory bench is similarly deliberate, featuring Carl June, Christi Shaw, and Chris McDonald. The open governance question is board completeness. The current company page lists five directors, but the 2023 Series C announcement said Koch’s David Mauney would join the board. That may reflect a later change, but the reviewed public pack does not resolve it cleanly, so current board composition remains a diligence follow-up rather than a settled fact.
