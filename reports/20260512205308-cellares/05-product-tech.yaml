- id: TE003
  title: Technology / operating architecture table
  columns:
  - Layer / component
  - Role
  - Dependency
  - Key risk
  rows:
  - - Reagent Vault System
    - Stores and schedules up to 200 automation-friendly reagent bottles at controlled temperature
    - Software scheduling plus bottle and cartridge availability
    - Little public evidence on vendor substitution or stockout handling
  - - 4x Sterile Liquid Transfer Systems
    - Mate reagent bottles to the cartridge and automate additions and sampling
    - Precise sterile connectors, pumps, and consumables
    - Any connector or tubing issue can propagate into batch loss
  - - Material Handling System and feedthrough
    - Moves cartridges and reagents between vault, instruments, and ingress points
    - Robotic transfer reliability and barcode-tracked routing
    - Throughput depends on orchestration and avoidance of transfer bottlenecks
  - - Consumable cartridge, fluidic bus, and smart containers
    - Create the closed batch-specific process environment
    - Proprietary cartridge and patented fluid-handling geometry
    - Consumable dependency is a switching-cost lever but also a supply risk
  - - Bioprocessing suite
    - Executes CCE, magnetic selection, electroporation, activation, and expansion
    - Instrument calibration, recipe tuning, and process characterization
    - Performance by modality is not fully public beyond named examples
  - - Digital control stack
    - Runs process design, MES scheduling, monitoring, and electronic batch records
    - Reliable interface mapping into ERP, MES, and LIMS
    - Interface validation and data integrity are mandatory for every site
  - - Cell Q modular assay stack
    - Automates sample prep, instrument runs, and digital release documentation
    - Partner instruments and consumables from Tecan, Cytek, Artel, Slingshot, and AltemisLab
    - Third-party component changes could affect validation and uptime
  notes: >-
    The table emphasizes how hardware, consumables, partner instruments, and software have to work together; the risks shown are mostly dependency and validation risks.
