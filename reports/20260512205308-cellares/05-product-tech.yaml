tables:
- id: TE001
  title: Product module / asset matrix
  columns:
  - Module / asset
  - Primary buyer or user
  - Status / maturity
  - Differentiation
  - Diligence gap
  rows:
  - - Cell Shuttle manufacturing platform
    - Sponsor process-development, manufacturing, and CMC teams
    - cGMP deployed and clinically validated through Cabaletta milestones
    - Closed 16-batch-parallel cartridge architecture tied to Smart Factory replication
    - No public realized COGS, utilization, or long-run failure-rate dataset
  - - Cell Q QC workcell
    - Analytical development, QA, and QC teams
    - Launched in 2024 with partner integrations disclosed in 2025
    - Automates in-process and release assays to match Cell Shuttle throughput
    - No public cross-site reproducibility dataset for the full assay menu
  - - IDMO Smart Factory network
    - Supply-chain, operations, and commercial manufacturing leaders
    - South San Francisco and Bridgewater active; Leiden and Kashiwa ramping
    - Pairs automation hardware with regional capacity and a shared digital backbone
    - Public site-ramp and utilization detail remains limited
  - - TAP / process-translation workflow
    - Sponsor process-development teams
    - Active across multiple partner programs
    - Claims six-month automation plus software-defined transfer to later sites
    - Sponsor-specific comparability burden still must be cleared
  - - QbD / QMS / regulatory support
    - QA, regulatory, and CMC leaders
    - Embedded service capability
    - QbD encoded in software plus AMT-linked consultation and audit-ready records
    - No public list of independent certifications beyond cGMP and QMS claims
  - - Modality expansion programs
    - Novel cell-therapy sponsors
    - Early but broadening beyond T-cell core
    - Common backbone now applied to HSC, progenitor T, and solid-tumor programs
    - Breadth beyond announced programs is still unproven publicly
  notes: >-
    Rows separate the core productized layers that a sponsor would underwrite; maturity is based on public milestones rather than undisclosed internal deployment counts.
