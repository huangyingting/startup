  title: Product architecture map
  type: stack
  layout: standard
  summary: >-
    The stack shows that Cellares combines service packaging, digital control, QC automation, and cartridge-based manufacturing into one product architecture.
  data:
    layers:
    - label: IDMO service layer
      detail: >-
        Process translation, analytical bridging, regulatory consultation, and clinical or commercial manufacturing engagements package the hardware into a sponsor workflow.
    - label: Digital control layer
      modules:
      - Process Design Studio
      - Integrated MES
      - Real-time monitoring
      - Electronic batch records
      - ERP / LIMS / COI-COC interfaces
      detail: Software defines recipes, schedules fleets, captures records, and moves data into enterprise quality systems.
    - label: QC automation layer
      modules:
      - Cell Q
      - Pre-qualified common assays
      - CoA / CoT generation
      detail: >-
        Automated in-process and release testing is positioned as part of the same platform rather than a disconnected lab workflow.
    - label: Manufacturing orchestration layer
      modules:
      - Reagent Vault System
      - 4x SLTS
      - Material Handling System
      - Feedthrough
      detail: >-
        Robotic material flow, sterile transfers, and reagent scheduling connect disposables to instruments without manual handoffs.
    - label: Closed consumable and unit-operation layer
      detail: >-
        One batch runs inside a dedicated consumable cartridge with fluidic bus, smart containers, and embedded unit operations such as CCE, magnetic selection, electroporation, and perfusion-enabled expansion.
