  evidenceGaps:
  - type: private-evidence-only
    severity: material
    topic: economics-gap
    missingEvidence: >-
      Realized per-batch COGS, sustained installed-base utilization, batch-failure distributions, and measured turnaround-time improvements by site and modality.
    whyItMatters: >-
      These data determine whether claimed cost and throughput advantages translate into durable commercial economics rather than one-off validation events.
    diligencePath: >-
      Request partner-level operating dashboards, bridgewater line-performance reports, release-by-release yield history, and actual contract economics for at least one mature program.
    relatedQuestionRefs:
    - QE022
  - type: stale
    severity: material
    topic: network-risk
    missingEvidence: >-
      Current commissioning status, qualification milestones, staffing readiness, and local regulatory-path detail for Leiden and Kashiwa.
    whyItMatters: >-
      The regional supply thesis depends on these sites moving from announced or fit-out status into repeatable GMP operation without prolonged delay.
    diligencePath: >-
      Obtain the latest site master schedules, equipment-install qualification reports, staffing plans, and customer-ready GMP dates for both non-US facilities.
    relatedQuestionRefs:
    - QE023
    relatedTableRefs:
    - TE005
  - type: missing-source
    severity: material
    topic: ip-position
    missingEvidence: >-
      Freedom-to-operate analysis, external reproducibility benchmarks across multiple commercial programs, and customer switching-cost evidence beyond public marketing.
    whyItMatters: >-
      A durable moat depends on more than patents and partner announcements; buyers need proof that the platform is hard to replace and remains superior as competitors mature.
    diligencePath: >-
      Request patent counsel summary, customer reference calls on switching costs, and cross-platform technical evaluations against alternative automation vendors.
    relatedQuestionRefs:
    - QE024
