- id: quality-and-regulatory-design
  title: Quality, regulatory design, and validation
  body: >-
    Cellares' quality and regulatory design is more mature than typical early automation marketing. The company publicly states that QbD is encoded into the Cell Shuttle software, that it operates under a cGMP Quality Management System, and that Cell Q links in-process and release testing to the same digital backbone that stores COI or COC and electronic batch records. External milestones partially validate that story: the Cell Shuttle received FDA AMT designation in 2025, cGMP Cell Shuttles were completed in South San Francisco and Bridgewater in 2024, Cabaletta's IND amendment was cleared for clinical manufacturing in January 2026, and first patients dosed with Cell Shuttle-manufactured rese-cel were announced in April 2026. Cell Q also looks more like a productized compliance layer than a generic robot, with pre-qualified assays, CoA or CoT generation, and named integrations for liquid handling, calibration verification, flow cytometry, synthetic controls, and COI or COC-preserving sample
    handling. Even so, EMA and ISPE materials make clear that broader modality expansion still requires comparability, validation, and interface-control evidence at the therapy level.
