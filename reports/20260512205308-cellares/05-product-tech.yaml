- id: TE002
  title: Workflow / use-case table
  columns:
  - User job
  - Current manual workflow
  - Cellares solution
  - Claimed benefit
  - Limitation
  rows:
  - - Translate a manual sponsor process
    - Benchtop process with operator know-how and offline records
    - TAP plus Process Design Studio and alliance-led transfer
    - Faster automation cycle with preserved quality attributes
    - Comparability evidence remains sponsor and program specific
  - - Bridge release analytics into automation
    - Manual sample prep and fragmented assay execution
    - Cell Q analytical bridging with pre-qualified common assays
    - Higher QC throughput with cleaner records and fewer handoffs
    - Custom assays still need method-specific validation
  - - Run autologous autoimmune CAR-T clinically
    - One-batch-at-a-time manual manufacturing
    - Concurrent Cell Shuttle manufacturing with automated release path
    - IND-cleared manufacturing and first patient dosing now publicly disclosed
    - Only one publicly disclosed clinical-use platform program exists today
  - - Secure overflow commercial capacity
    - Build new internal suites or add manual CDMO headcount
    - Reserve Cell Shuttle and Cell Q capacity in multiple regions
    - Capital-light expansion and geographic optionality
    - Reserved economics and actual utilization are not public
  - - Expand into new modalities
    - Redesign manufacturing and analytics for each therapy
    - Common Cell Shuttle and Cell Q backbone for HSC, progenitor T, and solid-tumor programs
    - Lower redesign burden and reuse of platform know-how
    - Clinical proof beyond CAR-T remains early
  - - Regionalize patient supply
    - Ship across continents from a single site
    - Replicate standardized Smart Factories in the US, EU, and Japan
    - Potentially shorter logistics paths and faster regional activation
    - Leiden and Kashiwa still carry site-ramp risk
  notes: >-
    Benefits reflect claimed workflow improvements; the remaining limitations are the main public diligence holes rather than implementation impossibilities.
