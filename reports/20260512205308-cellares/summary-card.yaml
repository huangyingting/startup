  topStrengths:
    - >-
      The Bristol Myers Squibb agreement and Cabaletta proof chain give Cellares stronger public commercial validation
      than most private automation peers.
    - >-
      $612 million of disclosed financing and a four-site build-out create a credible platform for global cell-therapy
      manufacturing scale.
    - >-
      Cell Shuttle, Cell Q, AMT-linked regulatory positioning, and a broad patent footprint suggest meaningful process
      and automation differentiation.
    - >-
      The business model is infrastructure-like rather than pipeline-like, which can justify a premium if utilization
      and customer conversion become visible.
  topRisks:
    - >-
      Current valuation, price per share, cap table, and liquidation preferences remain undisclosed, so entry discipline
      cannot be judged from public evidence alone.
    - >-
      Public sources still do not show utilization, revenue, gross margin, or realized batch-economics data, making
      underwriting vulnerable to false precision.
    - >-
      Public customer proof is concentrated in Bristol Myers Squibb and Cabaletta, with most other named relationships
      still earlier-stage.
    - >-
      Multi-region site build-out and process-transfer execution create meaningful comparability, quality, and timeline
      risk.
    - >-
      Automation peers also claim large throughput and cost benefits, so category excitement alone should not be
      capitalized at commercial-peer levels.
  unresolvedGaps:
    - Current post-money valuation, share price, cap table, and liquidation-preference stack
    - Site-level utilization, booked volumes, backlog conversion, and realized customer concentration
    - Revenue run-rate, gross margin, batch economics, and cash-burn visibility
    - Detailed BMS conversion mechanics and long-term demand assumptions beyond the headline agreement value
    - Qualification, readiness, and staffing evidence for the Leiden and Kashiwa sites
