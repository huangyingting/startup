- id: named-proof
  title: 'Named proof: Bristol Myers and Cabaletta anchor the highest-quality evidence'
  body: 'Public named proof is strongest where counterparties confirm the relationship themselves. Bristol Myers Squibb publicly described a progression from an August 2023 TAP evaluation to an October 2023 second program and then to an April 2024 worldwide capacity reservation and supply agreement worth up to $380 million, with dedicated Cell Shuttle and Cell Q systems in the U.S., Europe, and Japan. Cabaletta provides even stronger operational proof: it moved from a 2023 TAP evaluation to successful multi-batch TAP completion in 2025, FDA-cleared clinical manufacturing in January 2026, first patient dosing in April 2026, and a 10-year commercial supply agreement later that month. City of Hope adds customer-side confirmation for an academic solid-tumor program. By contrast, Lyell, Kite, and Autolus are still publicly framed as evaluation or feasibility accounts, not disclosed production customers. The customer-proof hierarchy is thus clear: BMS and Cabaletta show the deepest evidence, Wisconsin
    shows credible academic-to-clinical progression, and the rest broaden the map more than they prove revenue.'
