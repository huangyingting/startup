- id: concentration-risk
  title: 'Concentration risk: anchor-account proof is real, but wallet share is still opaque'
  body: 'Customer concentration is the main unresolved negative in this chapter. The public proof surface is top-heavy: Bristol Myers Squibb and Cabaletta provide most of the commercial and clinical validation, while Lyell, Kite, City of Hope, Stanford, Autolus, and ProTgen remain early or evaluation-stage. Even the mature accounts do not prove full wallet share. Bristol Myers said the Cellares deal strengthens its existing internal manufacturing network, and Autolus said Cellares may complement commercial manufacturing at its Nucleus facility. Cabaletta''s own press release says Cellares complements its current CDMO partners, while Cabaletta''s 2025 10-K warns that dependence on Minaris, Lonza, and/or Cellares could adversely affect supply or enrollment if any partner falters. The right conclusion is that Cellares has real anchor-account proof, but exact revenue concentration, utilization, and competitive share inside those accounts remain materially undisclosed. That makes customer quality
    encouraging, but customer concentration still a diligence issue rather than a resolved strength. Independent quote pages also show Autolus, Lyell, and Cabaletta remain biotech-scale public companies, while the wider public cell-therapy sponsor set still includes names such as Allogene, Arcellx, and Legend. Logo count therefore does not equal diversified purchasing power or full market penetration.'
