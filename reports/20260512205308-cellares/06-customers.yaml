- id: durability-and-expansion
  title: 'Durability and expansion: strong public step-up proxies, but no disclosed retention metrics'
  body: 'Standard retention metrics are absent, so durability has to be inferred from public step-up milestones. Bristol Myers Squibb progressed from one TAP program to two TAP programs and then to a multi-region reserved-capacity agreement, which is a strong expansion proxy inside a single account. Cabaletta is the clearest land-and-expand case: the relationship moved from evaluation to successful automation, clinical manufacturing, first patient dosing, and a 10-year commercial agreement. Wisconsin also progressed from early automation work to clinical manufacturing and IND support after its initial collaboration met performance standards. These are meaningful durability signals because they show counterparties continuing to invest time, technical work, and regulatory effort with Cellares. But they are still proxies, not retention data. No reviewed public source discloses NRR, GRR, renewals, churn, or utilization, and no public dataset shows how many pilots convert into paid recurring
    manufacturing relationships. Investors should therefore treat public step-ups as positive but incomplete evidence of customer stickiness.'
