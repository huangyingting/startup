- id: TU003
  title: Named customer proof table
  columns:
  - Counterparty
  - Segment
  - Program / use case
  - Public status
  - Strongest proof
  - Limitation
  rows:
  - - Bristol Myers Squibb
    - Large pharma / commercial CAR-T sponsor
    - Select CAR-T therapies
    - TAP evaluation -> second program -> worldwide capacity reservation and supply agreement
    - $380M agreement; dedicated Cell Shuttle and Cell Q systems in the U.S., EU, and Japan; customer-side confirmation from BMS
    - No public patient-dosing or utilization data on Cellares-made BMS product
  - - Cabaletta Bio
    - Clinical-stage biotech / autoimmune cell therapy sponsor
    - Rese-cel (formerly CABA-201)
    - TAP evaluation -> TAP completion -> IND-cleared clinical manufacturing -> first patient dosing -> 10-year commercial supply
    - FDA-cleared IND amendment, first two GMP doses infused, and customer-side commercial press release
    - Cabaletta says Cellares complements other CDMO partners; detailed economics remain undisclosed
  - - City of Hope
    - Academic translational center
    - CARpool glioblastoma CAR-T program
    - Preclinical evaluation
    - Customer-side newsroom page confirms evaluation of Cell Shuttle and Cell Q
    - No clinical batches, patients, or contract economics disclosed
  - - Stanford Medicine
    - Academic platform partner
    - Gene-edited HSC manufacturing and release-testing platform
    - Platform collaboration / preclinical
    - Cross-indication platform process for HIV and 19+ rare diseases
    - Not product-specific clinical supply proof
  - - University of Wisconsin School of Medicine and Public Health
    - Academic translational center
    - CRISPR-edited GD2 CAR-T for solid tumors
    - Clinical-scale automation -> clinical manufacturing / IND support
    - Expanded partnership after initial work met specified performance standards
    - No public first-patient or revenue disclosure yet
  - - ProTgen
    - Pre-IND biotech
    - ProT-096 personalized progenitor T-cell therapy
    - Pre-IND manufacturing and QC partnership
    - Automation plus regulatory support toward IND submission
    - No clinical execution or supply contract disclosed
  - - Lyell
    - Clinical-stage biotech
    - LYL797 CAR-T for solid tumors
    - TAP evaluation only
    - Proof-of-concept transfer for future clinical trials and commercialization
    - No disclosed follow-on manufacturing or supply agreement by run date
  - - Autolus
    - Commercial-stage biotech
    - AUCATZYL (obe-cel) and future indications
    - Feasibility evaluation only
    - Commercial-stage sponsor said Cellares may complement Nucleus manufacturing as demand expands
    - Evaluation only; not current disclosed supply
  - - Kite
    - Commercial cell-therapy sponsor
    - Future manufacturing option for next-generation therapies
    - Proof-of-concept evaluation only
    - Kite said the data would assess Cell Shuttle viability as a future manufacturing option
    - No disclosed progression beyond evaluation
  notes: This table is a public named-proof map only; it is not a complete customer roster and it separates evaluation, clinical, and commercial status explicitly.
