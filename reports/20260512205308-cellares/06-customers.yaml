tables:
- id: TU001
  title: Customer segmentation table
  columns:
  - Segment
  - Buyer / user / payer
  - Use case
  - Scale
  - Revenue / strategic value
  - Gap
  rows:
  - - Large pharma / commercial CAR-T sponsor (BMS)
    - 'Buyer: cell-therapy leadership; User: technical operations, manufacturing, QC, regulatory; Payer: global manufacturing budget'
    - Reserve resilient multi-region automated capacity for inline and pipeline CAR-T assets
    - Multi-region, multi-program, named $380M relationship
    - Potentially the largest publicly disclosed economic account
    - No public utilization, margin, or share-of-wallet data
  - - Commercial-stage sponsor adding overflow capacity (Autolus, Kite)
    - 'Buyer: tech ops or manufacturing leadership; User: commercial manufacturing teams; Payer: sponsor operations budget'
    - Evaluate automation to complement internal commercial manufacturing as new indications grow
    - Commercial or market-facing programs, but evaluation-only with Cellares
    - Strategically important proof that established operators are testing the platform
    - No disclosed conversion to supply or production volumes
  - - Clinical-stage biotech automation adopter (Cabaletta, Lyell)
    - 'Buyer: CMC / development leadership; User: process development and clinical supply teams; Payer: R&D budget'
    - Automate personalized cell-therapy processes and prepare for future clinical or commercial scale-out
    - Cabaletta has full public progression; Lyell remains evaluation-only
    - Best evidence that Cellares can move a biotech from pilot to real clinical supply
    - Public economics and conversion rates are incomplete
  - - Academic translational center (University of Wisconsin, City of Hope)
    - 'Buyer: principal investigator or translational center; User: GMP operators, translational teams, IND authors; Payer: grant or program funding'
    - Move internally developed cell therapies from lab process into clinical-scale or IND-ready manufacturing
    - Named U.S. academic relationships, one of which progressed into clinical manufacturing support
    - Important top-of-funnel source of future programs and modality breadth
    - Commercial revenue timing and program durability are not public
  - - Platform modality expansion partner (Stanford)
    - 'Buyer: academic center leadership; User: gene-editing and manufacturing teams; Payer: translational research budgets'
    - Build a standardized HSC process and assays across HIV and rare-disease programs
    - Cross-indication platform collaboration rather than a single therapy contract
    - Extends Cellares beyond T-cell therapies and broadens future customer surface
    - Not public proof of current clinical batches or revenue
  - - Pre-IND novel modality sponsor (ProTgen)
    - 'Buyer: CEO / development lead; User: process development and quality teams; Payer: venture-backed development budget'
    - Automate progenitor T-cell manufacturing and draft IND materials
    - Very early-stage but named 2026 partnership
    - Shows willingness of new modality developers to buy automation before the clinic
    - No clinical execution or supply economics disclosed
  notes: Segments describe the sponsor and translational counterparties publicly visible in Cellares materials; they do not imply equal spend, maturity, or contract size.
