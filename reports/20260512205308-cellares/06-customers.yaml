- id: TU005
  title: Expansion and concentration risk table
  columns:
  - Expansion driver
  - Concentration risk
  - Impact
  - Diligence path
  rows:
  - - BMS multi-program and multi-region reservation
    - One marquee account may dominate visible enterprise proof and reserved-capacity signaling
    - High upside if utilized; high downside if wallet share proves smaller than the headline deal suggests
    - Request reserved-capacity utilization, minimum commitments, and revenue recognition by region
  - - Cabaletta autoimmune scale-up
    - Clinical and commercial proof is unusually strong, but Cabaletta also maintains other manufacturing partners
    - Important validation of platform readiness, but not proof of exclusive supply control
    - Request share-of-wallet, dual-sourcing logic, and exclusivity boundaries
  - - Academic-to-clinical conversion (Wisconsin)
    - Academic programs may take longer to become durable revenue accounts
    - Useful lead indicator for future demand, but near-term economics can lag technical success
    - Request expected IND timing, sponsored-program economics, and capacity commitments
  - - Commercial overflow motion (Autolus / Kite)
    - Established operators may use Cellares only for overflow or contingency rather than core supply
    - Could cap wallet share even if the account converts
    - Request whether evaluations target primary production, overflow, or regional redundancy
  - - New-modality breadth (Stanford / ProTgen)
    - Platform breadth expands the funnel, but conversion is still pre-IND and technically uncertain
    - Broadens TAM narrative more than near-term revenue proof
    - Request stage-gate milestones and expected paid-service milestones for each program
  - - Public proof concentration overall
    - Most public commercial and clinical validation sits in BMS and Cabaletta
    - Customer quality looks real, but concentration math remains unresolved
    - Request top-customer and top-5 concentration for booked revenue and reserved capacity
  notes: Rows focus on economic concentration and conversion risk, not on whether the counterparties are real; the named relationships are real but their wallet share is still opaque.
