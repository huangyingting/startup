chapter:
  number: 6
  title: Customers
  summary: 'Cellares has unusually strong public customer proof for a manufacturing-infrastructure startup because Bristol Myers Squibb moved from TAP evaluation to a $380 million multi-region capacity reservation and Cabaletta progressed from TAP work to IND-cleared clinical manufacturing, first patient dosing, and a 10-year commercial supply agreement. But the proof surface remains concentrated: University of Wisconsin is the only other named account with disclosed step-up into clinical manufacturing, while Autolus, Kite, Lyell, City of Hope, Stanford, and ProTgen remain evaluation, academic-translation, or pre-IND relationships. Public disclosures therefore support real adoption and credible expansion logic, but not diversified recurring revenue, renewal metrics, or clean concentration math.'
sections:
- id: customer-segmentation
  title: 'Customer segmentation: sponsors and translational centers, not therapy end-users'
  body: 'Cellares'' customer surface should be read as manufacturing sponsors and translational centers rather than therapy end-users. The official services page says the company has 10+ partnerships, 14+ unique processes, 1,000+ automated runs, and 1,400+ automated assays across pharma, biotech, and academic translation centers. Publicly named large-pharma or commercial-stage sponsors include Bristol Myers Squibb, Autolus, and Kite. Clinical-stage biotech accounts include Cabaletta, Lyell, and ProTgen. Academic or translational accounts include City of Hope, Stanford Medicine, and the University of Wisconsin. This mix matters because the buying motion is heterogeneous: large pharma appears to use Cellares for resilience and global scale-out, biotechs for automation and future commercial readiness, and academic centers for bench-to-clinic translation. It also means that not every named relationship should be treated as equal customer proof. Some are commercial or clinical supply relationships,
    while others are still preclinical evaluations or platform-development collaborations with no disclosed recurring economics.'
