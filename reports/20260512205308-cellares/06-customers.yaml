- id: adoption-trajectory
  title: 'Adoption trajectory: the proof surface deepened from 2023 pilots to 2026 clinical milestones'
  body: 'The adoption trajectory is increasingly credible because it shows sequential account progression rather than isolated logo announcements. In 2023 Cellares announced TAP relationships with Bristol Myers Squibb, Lyell, and Cabaletta. In 2024 the proof surface deepened when BMS escalated to a $380 million multi-region reservation and Kite began evaluating the Cell Shuttle as a future option. In 2025 Cabaletta''s TAP succeeded and Wisconsin entered the base as an academic translation partner. Early 2026 brought the sharpest inflection: Cabaletta received IND amendment clearance and then dosed the first patients with Cellares-manufactured rese-cel; Wisconsin expanded into clinical manufacturing support; and new accounts appeared in Autolus, City of Hope, Stanford, and ProTgen. That sequence does not prove broad recurring revenue, but it does show that the customer surface is getting fresher and deeper rather than merely recycling old logos. The timeline also matters for underwriting
    because the 2026 proof is the first evidence that the platform is touching real patient supply rather than just engineering campaigns.'
