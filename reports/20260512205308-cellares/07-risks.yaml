- id: partner-and-commercial-concentration
  title: 'Partner and commercial concentration: proof exists, diversification is still early'
  body: Cellares strongest public commercial proof is concentrated in two relationships. Bristol Myers Squibb provides the largest disclosed revenue opportunity through the $380 million capacity reservation and supply agreement, while Cabaletta provides the strongest public clinical-to-commercial conversion chain through TAP completion, IND amendment clearance, first patient dosing, and a 10-year supply agreement. Those are unusually strong signals for a private manufacturing platform. They are also concentrated signals. Publicly disclosed relationships beyond BMS and Cabaletta are mostly evaluation, development, or platform-expansion announcements rather than long-duration contracts with clear minimum-volume economics. BMS own cautionary language explicitly warns that the expected benefits of the agreement may not materialize as quickly as hoped. That means investors should read the current partner set as proof that the model can win important customers, not proof that customer diversity,
    utilization, or renewal behavior is already broad. If BMS or Cabaletta slips, or if those flagship programs fail to catalyze more long-term bookings, the downside hits revenue visibility, financing flexibility, and valuation support at the same time.
