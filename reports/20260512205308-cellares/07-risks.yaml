- id: scale-up-quality-and-site-activation
  title: 'Scale-up, quality, and site activation: the operating model is ambitious before it is fully proven'
  body: 'The second residual risk cluster is operational. Cellares has published a much richer process picture than most private manufacturing startups: Cell Shuttle architecture, reagent vaults, MES and electronic batch records, COI and COC tracking, Cell Q throughput, and Bridgewater capacity are all described in detail. That helps. It also reveals how much has to work at once. The model depends on tightly integrated automation hardware, consumables, QC workcells, software controls, and site-level commissioning across the United States, Europe, and Japan. The Cabaletta 8-K is helpful because it shows engineering runs and GMP-readiness work were real, but it also implicitly confirms that early 2026 evidence was still about validating readiness and logistics rather than proving routine high-utilization commercial output. Public sources do not show a full public audit pack for data integrity, validated cyber controls, or finished site qualification at Leiden and Kashiwa. Add Cell & Gene plus
    baseline cGMP and Part 11 context, and the residual risk becomes clear: automated cell therapy manufacturing can work, but once sponsors shift processes or add sites, quality-system and comparability friction can still move timelines materially right.'
