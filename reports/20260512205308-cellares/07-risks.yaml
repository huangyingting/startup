- id: TR005
  title: Mitigation and kill criteria table
  columns:
  - Risk
  - Monitorable trigger
  - Threshold / event
  - Action implication
  rows:
  - - Comparability and transfer acceptance
    - Engineering runs, IND amendments, batch deviations, regulator feedback
    - Any failed bridge package, unresolved deviation trend, or clinical hold linked to manufacturing change
    - Pause valuation upside and demand full transfer package before underwriting further scale claims
  - - Factory build-out and site activation
    - Leiden and Kashiwa commissioning milestones, staffing, and customer onboarding dates
    - Material slip versus public 2026-2027 readiness plan
    - Discount revenue ramp timing and assume higher working-capital needs
  - - BMS and Cabaletta concentration
    - Contract expansions, new long-term customers, and disclosed utilization
    - No additional meaningful long-term contract while BMS or Cabaletta slips
    - Re-rate the company as a concentrated platform vendor rather than diversified infrastructure
  - - QC, data integrity, and security
    - Audit findings, cyber incidents, exception handling, and release-performance data
    - Any event that questions batch traceability, assay validation, or system availability
    - Treat operating leverage claims as impaired until controls are independently evidenced
  - - Capital intensity and utilization
    - Quarterly financing activity, site spend, and disclosed capacity usage
    - Need for new capital before utilization broadens or before 2027 commercial output becomes visible
    - Assume punitive financing or slower expansion
  - - Leadership and execution bandwidth
    - Senior departures, repeated timetable resets, or visible PMO strain
    - Loss of key manufacturing or commercial operators during multi-site rollout
    - Require refreshed execution plan and downgrade confidence in the commercialization timeline
  notes: Triggers are deliberately monitorable and tie directly to diligence or valuation actions rather than generic risk labels.
