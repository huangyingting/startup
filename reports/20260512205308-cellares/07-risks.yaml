chapter:
  number: 7
  title: Risks
summary: Cellares has real automation and commercialization traction, but the public record still leaves material risk around comparability, multi-site scale-up, partner concentration, and the capital intensity of turning automated cell-therapy manufacturing into reliable commercial supply. AMT designation, Cabaletta clinical manufacturing, and the BMS reservation agreement clearly de-risk the story, yet they do not eliminate the need for site-qualification proof, utilization evidence, validated QC and data-integrity controls, or cleaner visibility into backlog and security posture. The prudent read is that the company has moved beyond concept risk but not beyond execution risk.
sections:
- id: regulatory-and-legal-risk-surface
  title: 'Regulatory and legal risk surface: traction is real, but transfer and comparability still matter'
  body: 'The core regulatory nuance is that Cellares has earned meaningful signals without yet making transfer risk disappear. AMT designation is a strong indicator that FDA views the platform as potentially important to advanced manufacturing, and Cabaletta has already cleared an IND amendment supported by engineering runs plus first-patient dosing on Cell Shuttle. That is real de-risking. It is not the same as public evidence of a complete cross-site comparability package, PPQ readiness set, or regulator-by-regulator manufacturing dossier covering Europe, Japan, and future commercial supply. EMA guidance and Cabaletta filing evidence both reinforce that comparability, validation, and quality-system evidence remain central once manufacturing changes are introduced. The legal surfaces are similarly ordinary but not trivial: arbitration, website disclaimers, sensitive-data handling, law-enforcement disclosure language, and conduct obligations on antitrust, anti-corruption, and environmental
    compliance all create diligence asks rather than red flags. The practical takeaway is that Cellares biggest regulatory risk is not lack of momentum; it is that outside investors can see the headline wins but still cannot inspect the full proof package underneath them.'
