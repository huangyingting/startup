- id: TP003
  title: Pricing / packaging comparison
  columns:
  - Offering / class
  - Commercial model
  - Public price or deal signal
  - Included capability
  - Key unknown
  - Implication for Cellares
  rows:
  - - Cellares IDMO services
    - Capacity reservation, long-term supply, and automation services
    - $380M BMS reservation; 10-year Cabaletta agreement; no royalties or licensing fees
    - Manufacturing, QC, regulatory support, and global smart-factory access
    - Realized per-batch pricing, utilization, and renewals
    - The strongest public packaging proof in the reviewed set
  - - Ori IRO platform
    - Platform deployment through direct customers and service partners
    - No public price retained; AMT and PPN are the visible commercial signals
    - Automation for key manufacturing steps plus access to partner network
    - Contract template, consumables economics, and support pricing
    - Competes via flexibility and partner choice rather than price transparency
  - - Lonza Cocoon
    - Instrument / platform deployment
    - Public price not retained; installed-base and market-share signals dominate
    - Closed one-device manufacturing platform
    - Instrument cost, disposables, and service terms
    - Incumbent familiarity can outweigh price opacity for PoC buyers
  - - Miltenyi Prodigy
    - Instrument plus disposable / local-site model
    - Public price not retained
    - All-in-one-box patient-scale manufacturing
    - Total cost including QC and site operations
    - Economic comparison needs diligence, not brochure claims
  - - Multiply Labs cluster
    - Platform plus software and deployment support
    - Public price not retained
    - Automation of existing instruments with electronic records and Part 11 control
    - Hardware/service pricing and consumables burden
    - Low transfer burden could beat Cellares where revalidation pain matters most
  - - Manual / semi-automated CDMO
    - Project, batch, and labor-heavy service model
    - No clean public tariff; literature instead emphasizes labor and facility burden
    - Flexible outsourced manufacturing
    - Failure rates, labor utilization, and actual margin profile
    - Status quo remains viable until automation proof is compelling
  - - Internal build / decentralized PoC
    - Sponsor capex plus local operations
    - Public total cost not isolated; decentralized models can cut shipping delay
    - Full control over process and site
    - Facility, staffing, QC, and reproducibility cost
    - Caps willingness to sign long-term proprietary external contracts
  notes: The table compares packaging structure and transparency, not gross margin or like-for-like realized net price.
