tables:
- id: TP001
  title: Competitor profile table
  columns:
  - Competitor / class
  - Competition mode
  - Scale / funding signal
  - Target segment
  - Differentiation
  - Limitation
  rows:
  - - Cellares (reference row)
    - Centralized automated IDMO service
    - Raised over $355M; $380M BMS reservation; four announced smart-factory sites
    - Pharma, biotech, and academic sponsors needing outsourced regional scale
    - Integrated Cell Shuttle + Cell Q + owned smart-factory capacity
    - Public pricing, utilization, and renewal data are still limited and process transfer is platform specific
  - - Ori Biotech
    - Open modular automation platform + partner network
    - AMT designated; 13 active partners; PPN with Charles River, CTMC, ElevateBio, and Kincell; funding not disclosed in retained set
    - Therapy developers, CDMOs, and AMCs that want automation plus provider choice
    - R&D-to-GMP flexibility and explicit anti-lock-in positioning
    - Public scope is not fully end-to-end in the retained set and long-run scale proof is still emerging
  - - Lonza Cocoon Platform
    - Incumbent one-device closed system
    - '>150 installed instruments globally; estimated 18%-22% automated closed-system share; Vertex manufacturing relevance'
    - Developers prioritizing PoC or decentralized manufacturing
    - Installed base, one-device familiarity, and local-control fit
    - One patient batch at a time constrains per-unit throughput versus Cellares
  - - Miltenyi CliniMACS Prodigy
    - Incumbent one-device closed system
    - Widely used in PoC literature; modular instruments can run in parallel; public CGT-specific economics not isolated here
    - Hospital, academic, and sponsor-run local manufacturing sites
    - Validated all-in-one-box familiarity for autologous workflows
    - Integrated PAT and broader ecosystem flexibility are limited in reviewed literature
  - - Multiply Labs
    - Robotic orchestration layer
    - Official site claims up to 100x throughput and 74% cost reduction; customer scale and funding not disclosed in retained set
    - Manufacturers wanting to keep existing validated instruments
    - No process transfer and direct quality-system integration
    - Retained public proof is architecture-heavy, not commercial-outcome heavy
  - - Cellular Origins
    - Configurable robotic factory layer
    - Constellation launched in 2023; independent coverage cites 30x space efficiency, 16x labor reduction, and 51% lower COGS
    - Manufacturers wanting configurable automation around proven tools
    - Robotics-first factory model rather than one fixed box
    - Commercial traction is less underwritten because official cached pages degraded
  - - Manual / semi-automated CDMO
    - Status-quo incumbent
    - Legacy workflow with about 50 manual steps and ~80 labor hours per dose in the literature
    - Sponsors avoiding early platform commitment
    - Flexibility and operational familiarity
    - Labor intensity, batch-failure risk, and poor scale-out remain structural weaknesses
  - - Internal build / decentralized PoC
    - Substitute / non-vendor option
    - Hospital or sponsor controlled; public cost not isolated; decentralized models can shorten logistics
    - Sponsors prioritizing control, local manufacturing, and custom workflows
    - Maximum control and potentially shorter vein-to-vein time
    - Reproducibility, site infrastructure, and QC bottlenecks remain hard
  notes: Rows mix vendors and substitutes because buyers choose operating models, not just brands. Scale signals are not additive across rows.
