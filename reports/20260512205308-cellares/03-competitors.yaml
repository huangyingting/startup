- id: TP004
  title: Moat durability / competitive risk register
  columns:
  - Moat claim
  - Threat / competitor response
  - Severity
  - Evidence today
  - Mitigation / diligence ask
  rows:
  - - Industrial-scale throughput and regional capacity
    - Installed-base incumbents, modular clusters, and PoC platforms attack different slices of the market
    - High
    - Cellares has strong throughput claims, but not every buyer needs factory-scale output
    - Request site utilization, backlog, and win/loss by customer archetype
  - - Integrated QC layer
    - Modular PAT and rapid-QC tooling could narrow the workflow advantage
    - High
    - Cell Q is public and differentiated, while broader PAT and AI tooling keeps advancing
    - Request assay coverage, manual holdouts, and actual release-time savings
  - - Regulatory advantage via AMT
    - Ori now also has AMT and decentralized models can still win on speed or control
    - Medium
    - Cellares and Ori both market earlier FDA engagement
    - Request evidence of filing-cycle acceleration and renewal value from AMT
  - - Closed-stack economics
    - Open-ecosystem rivals explicitly market against lock-in
    - High
    - Ori says end-to-end providers restrict flexibility; interoperability literature supports buyer concern
    - Request reasons deals are won or lost on openness versus integration
  - - Service-layer GTM
    - Buyers can prefer instrument ownership or internal build over external-network dependence
    - High
    - Cellares has marquee sponsor proof, but manual and internal options remain live
    - Request pipeline split between technology-only, local-control, and outsourced-capacity buyers
  - - Patent moat
    - Rivals can pursue different hardware and robotics architectures
    - Medium
    - Cellares has a visible 2025-2026 patent stream, but not ownership of every automation approach
    - Request freedom-to-operate mapping and design-around risk
  - - Pricing power
    - Opaque economics and fragmented standards weaken vendor leverage
    - High
    - Independent coverage cites at least 11 systems and limited apples-to-apples pricing
    - Request realized pricing, discounts, gross margin, and consumable dependency
  - - Centralized model
    - Decentralized PoC can cut logistics and localize manufacturing
    - High
    - Lonza/Prodigy literature and McKinsey/Springer support local-control benefits
    - Request where centralized factories lose deals to hospital or local-manufacturing models
  - - Technology-curve risk
    - AI-enabled control, modular PAT, and microfluidic automation could make control layers more portable
    - Medium
    - Recent literature points to digital twins, PAT, and rapid-QC progress
    - Request roadmap dependence on proprietary hardware versus portable software/control
  notes: Severity is an underwriting judgment based on the retained evidence set, not a probabilistic forecast.
