- id: direct-platform-archetypes
  title: Direct peers split between open ecosystems, installed one-box systems, and robotics layers
  body: 'The direct vendor landscape fragments quickly once architecture is taken seriously. Ori is Cellares’ cleanest conceptual rival because it also sells automated cell-therapy manufacturing, has its own AMT designation, and frames itself as a path from R&D to GMP. But Ori pushes a different philosophy: best-of-breed partner choice rather than a single end-to-end service stack. Lonza Cocoon and Miltenyi Prodigy represent the incumbent one-box alternative. Their strength is not smart-factory scale; it is installed familiarity and suitability for one-device-per-patient or point-of-care workflows. Multiply Labs and Cellular Origins attack from yet another flank, promising robotics that preserve existing instruments or proven technologies instead of asking buyers to replatform around a new proprietary factory. That means Cellares competes against at least three rival archetypes at once: open partner networks, decentralized one-box systems, and orchestration layers that minimize process-transfer
    pain. Its biggest challenge is not matching every rival feature, but proving that centralized throughput plus integrated QC outweighs the control and flexibility that competing architectures market aggressively.'
