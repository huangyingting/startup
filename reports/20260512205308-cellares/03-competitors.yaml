- id: pricing-switching-and-distribution
  title: Commercial packaging, switching cost, and distribution power matter more than public list prices
  body: 'Public price transparency is weak across this landscape, so the stronger competitive evidence is in packaging and switching economics. Cellares is unusual because it has disclosed service-layer proof points: a $380 million Bristol Myers Squibb capacity reservation, a 10-year Cabaletta commercial agreement, and explicit claims of no royalties or licensing fees. That is not how most competitors present themselves. Ori emphasizes regulatory tailwinds, partner access, and anti-lock-in flexibility. Multiply emphasizes no process transfer and automation around already validated instruments. Lonza and Miltenyi show platform familiarity, but not a clean public tariff in the retained evidence set. This makes switching cost central. Buyers have to think about comparability packages, proprietary consumables, interoperability gaps, retraining, and whether they want to own operations locally or hand them to an external network. Cellares’ owned smart-factory footprint gives it a distribution
    advantage when sponsors want outsourced regional capacity quickly. But that same service model can feel more binding than modular or partner-led alternatives, so pricing power will depend less on list price and more on how convincingly each architecture reduces total friction.'
