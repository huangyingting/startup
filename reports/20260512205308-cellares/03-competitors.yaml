  claims:
  - id: CP001
    statement: Cellares competes across four solution classes—owned automated IDMO services, open modular platforms, installed one-device systems, and status-quo manual or internal models—so the landscape has to be mapped by buyer choice rather than by logo count.
    type: inferred
    topic: competition-modes
    sourceRefs:
    - SP001
    - SP018
    - SP019
    - SP020
    confidence: medium
    freshness: current
    answersQuestionRefs:
    - QP001
    - QP002
  - id: CP002
    statement: 'The relevant buying decision changes by sponsor situation: commercial sponsors can buy outsourced global capacity, while earlier or local teams may prefer instrument ownership or hospital-based manufacturing.'
    type: inferred
    topic: competition-modes
    sourceRefs:
    - SP002
    - SP007
    - SP020
    - SP023
    confidence: medium
    freshness: current
    answersQuestionRefs:
    - QP001
    - QP026
  - id: CP003
    statement: Cellares’ sharpest competitive threat is not one mirror-image IDMO but any architecture that removes autologous manufacturing bottlenecks without forcing the buyer into its specific centralized service model.
    type: inferred
    topic: competition-modes
    sourceRefs:
    - SP003
    - SP019
    - SP023
    confidence: medium
    freshness: current
    answersQuestionRefs:
    - QP001
    - QP002
  - id: CP004
    statement: Cellares differentiates by combining end-to-end Cell Shuttle automation, Cell Q QC automation, and owned smart-factory service capacity inside one IDMO offering.
    type: company-claimed
    topic: cellares-differentiation
    sourceRefs:
    - SP001
    - SP003
    - SP009
    - SP010
    confidence: high
    freshness: current
    answersQuestionRefs:
    - QP006
    - QP007
  - id: CP005
    statement: Public partner evidence from Bristol Myers Squibb, Kite, and Autolus shows that large commercial sponsors are willing to evaluate or reserve Cellares capacity instead of relying only on internal facilities.
    type: third-party-reported
    topic: partner-proof
    sourceRefs:
    - SP006
    - SP007
    - SP008
    - SP025
    - SP026
    confidence: high
    freshness: current
    answersQuestionRefs:
    - QP008
    - QP026
  - id: CP006
    statement: Cellares says the Cell Shuttle can process up to 16 patient batches in parallel and deliver about 10-fold higher smart-factory throughput than conventional facilities of similar footprint and headcount.
    type: company-claimed
    topic: throughput
    sourceRefs:
    - SP003
    - SP007
    confidence: medium
    freshness: current
    answersQuestionRefs:
    - QP007
    - QP030
  - id: CP007
    statement: Cellares’ Cell Q gives the company a public claim to automated in-process and release QC for up to 6,000 batches per year, which few competitors match explicitly in the retained set.
    type: company-claimed
    topic: qc-differentiation
    sourceRefs:
    - SP009
    - SP010
    confidence: medium
    freshness: current
    answersQuestionRefs:
    - QP007
    - QP006
  - id: CP008
    statement: The Cell Shuttle’s AMT designation gives Cellares a regulatory positioning advantage because developers using the platform can point to earlier and more frequent FDA engagement.
    type: company-claimed
    topic: regulatory-position
    sourceRefs:
    - SP004
    - SP005
    confidence: high
    freshness: current
    answersQuestionRefs:
    - QP009
    - QP028
  - id: CP009
    statement: Cellares tries to soften adoption friction by offering process-parameter transparency, no royalties or licensing fees, and a Biotech Incentive Program that assumes upfront automation risk.
    type: company-claimed
    topic: switching-cost
    sourceRefs:
    - SP002
    - SP011
    confidence: medium
    freshness: current
    answersQuestionRefs:
    - QP024
    - QP026
  - id: CP010
    statement: Justia’s 2025-2026 patent list shows Cellares building IP across automated cell-processing control, fluid transfer, cell sorting, cartridges, and analytical testing, but not a monopoly over all automation architectures.
    type: inferred
    topic: patents
    sourceRefs:
    - SP027
    confidence: medium
    freshness: current
    answersQuestionRefs:
    - QP010
    - QP028
  - id: CP011
    statement: Ori positions IRO as a flexible, digital R&D-to-GMP platform that avoids the classic trade-off between biological performance and automation.
    type: company-claimed
    topic: ori-positioning
    sourceRefs:
    - SP013
    - SP014
    confidence: medium
    freshness: current
    answersQuestionRefs:
    - QP011
  - id: CP012
    statement: Ori’s IRO also received FDA AMT designation in 2025, eroding any claim that Cellares alone can market a regulatory tailwind from automation.
    type: company-claimed
    topic: ori-regulatory
    sourceRefs:
    - SP014
    confidence: medium
    freshness: current
    answersQuestionRefs:
    - QP013
    - QP028
  - id: CP013
    statement: 'Ori’s homepage and press materials show a growing distribution ecosystem: Seattle Children’s became the 13th active partner and the PPN launched with Charles River, CTMC, ElevateBio, Kincell, and other partners.'
    type: third-party-reported
    topic: ori-distribution
    sourceRefs:
    - SP013
    - SP015
    - SP016
    confidence: high
    freshness: current
    answersQuestionRefs:
    - QP012
  - id: CP014
    statement: Ori explicitly markets against end-to-end lock-in, arguing that developers should choose best-of-breed technologies and service providers rather than a single closed solution provider.
    type: company-claimed
    topic: ori-positioning
    sourceRefs:
    - SP015
    confidence: medium
    freshness: current
    answersQuestionRefs:
    - QP011
    - QP024
  - id: CP015
    statement: Independent market coverage describes Ori as automating activation, transduction, and expansion with claims of 50%-70% lower labor, 30%-50% lower manufacturing cost, roughly 1,000 annual doses in 1,000 square feet, and R&D-to-GMP continuity.
    type: third-party-reported
    topic: ori-scope
    sourceRefs:
    - SP018
    - SP019
    confidence: medium
    freshness: current
    answersQuestionRefs:
    - QP014
    - QP017
  - id: CP016
    statement: The same independent coverage also says Ori still relies on manual involvement for selection and final formulation, meaning its public automation scope is narrower than Cellares’ end-to-end narrative.
    type: inferred
    topic: ori-scope
    sourceRefs:
    - SP019
    confidence: medium
    freshness: current
    answersQuestionRefs:
    - QP014
  - id: CP017
    statement: Multiply Labs competes from a different angle, claiming that robotic clusters can automate existing GMP instruments with no process transfer, up to 100x throughput gain, 74% cost reduction, complete electronic records, and 21 CFR Part 11-compliant control.
    type: company-claimed
    topic: multiply-positioning
    sourceRefs:
    - SP017
    - SP023
    confidence: medium
    freshness: current
    answersQuestionRefs:
    - QP015
    - QP017
  - id: CP018
    statement: Multiply’s wedge is preserving buyer control of already validated instruments, which can be attractive when the main objection to automation is revalidation burden rather than pure throughput.
    type: inferred
    topic: multiply-positioning
    sourceRefs:
    - SP017
    - SP019
    confidence: medium
    freshness: current
    answersQuestionRefs:
    - QP015
    - QP024
  - id: CP019
    statement: 'The retained public source set around Multiply is architecture-heavy but commercially thin: it does not show named CGT manufacturing customers, AMT recognition, or public pricing terms.'
    type: inferred
    topic: multiply-proof-gap
    sourceRefs:
    - SP017
    confidence: medium
    freshness: current
    answersQuestionRefs:
    - QP016
    - QP023
  - id: CP020
    statement: Lonza’s Cocoon Platform is the clearest incumbent one-device competitor, with more than 150 installed instruments, roughly 5,000+ annual batches of installed capacity, decentralized deployment, and an estimated 18%-22% automated closed-system market share.
    type: third-party-reported
    topic: lonza-positioning
    sourceRefs:
    - SP018
    - SP019
    confidence: medium
    freshness: current
    answersQuestionRefs:
    - QP017
  - id: CP021
    statement: Cocoon’s design favors one patient batch at a time and can cut vein-to-vein time toward about 10 days, which is valuable for local or decentralized manufacturing even if it does not match Cellares’ centralized parallel throughput.
    type: third-party-reported
    topic: lonza-positioning
    sourceRefs:
    - SP019
    - SP023
    confidence: medium
    freshness: current
    answersQuestionRefs:
    - QP018
    - QP022
  - id: CP022
    statement: Miltenyi’s CliniMACS Prodigy is another serious incumbent because academic literature and trade coverage treat it as one of the most widely used closed platforms for point-of-care or hospital-based autologous manufacturing, and modular instruments can run in parallel.
    type: third-party-reported
    topic: miltenyi-positioning
    sourceRefs:
    - SP018
    - SP023
    confidence: medium
    freshness: current
    answersQuestionRefs:
    - QP017
    - QP018
  - id: CP023
    statement: 'The same literature flags a trade-off for one-device platforms: Prodigy and Cocoon fit point-of-care use, but integrated PAT and broader technology integration remain limited, with Prodigy specifically described as lacking integrated PAT tools.'
    type: inferred
    topic: one-device-tradeoffs
    sourceRefs:
    - SP019
    - SP023
    confidence: medium
    freshness: current
    answersQuestionRefs:
    - QP019
