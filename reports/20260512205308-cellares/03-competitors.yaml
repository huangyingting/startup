callouts:
- calloutType: insight
  title: Cellares is selling an operating model, not just an automation tool
  body: Its competitive pitch bundles capacity, QC, regulatory positioning, and service packaging. That makes Cellares harder to compare to a single equipment vendor, but also exposes it to buyers who prefer local control over an external network.
  claimRefs:
  - CP004
  - CP031
  - CP035
  - CP037
- calloutType: risk
  title: Flexibility and local control keep the market from standardizing on one winner
  body: Ori’s anti-lock-in positioning, installed one-box systems, and PoC alternatives all give buyers credible ways to delay or avoid committing to one centralized architecture. The moat is therefore conditional, not absolute.
