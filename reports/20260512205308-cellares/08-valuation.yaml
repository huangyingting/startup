  - CV034
  - CV041
  - CV044
  - CV045
- id: TV006
  title: Final diligence asks table
  columns:
  - Diligence ask
  - Why it matters
  - Evidence needed
  - Who to ask
  rows:
  - - Current valuation, cap table, and preferences
    - Without terms, public evidence cannot translate into an investable price.
    - Latest term sheet, cap table, preference stack, and any recent secondary or tender marks.
    - Management, CFO, lead investors
  - - Factory utilization and backlog conversion
    - Capacity reservation is not the same as realized demand.
    - Booked capacity by site, signed minimums, utilization history, and conversion from TAP to long-term supply.
    - Operations, commercial leadership
  - - Batch economics and gross margin path
    - Infrastructure premiums only work if throughput and cost claims survive real operations.
    - Cost per batch, contribution margin by site, pricing assumptions, and scaling model.
    - CFO, operations
  - - BMS and Cabaletta conversion mechanics
    - Flagship counterparties currently dominate public proof.
    - Program cadence, expected volumes, renewal or expansion logic, and sensitivity to delays.
    - Commercial leadership, customer program owners
  - - Site-by-site readiness and quality package
    - Valuation upside depends on multi-region execution, not just one factory.
    - Commissioning status, qualification package, validation summary, and staffing readiness for each site.
    - COO, quality leadership
  - - Cash burn and financing bridge
    - A high-capex network can force punitive financing if utilization lags.
    - Monthly or quarterly burn, capex plan, runway analysis, and financing trigger thresholds.
    - CFO, board observers
  notes: These are the minimum private-data asks needed before translating public company quality into a stronger valuation call.
  enumerationScope:
    coverage: partial
    basis: Captures the highest-value diligence requests implied by retained public evidence, not every diligence item a full buy-side process would request.
