    - 'Cellares has unusually strong public proof for a private manufacturing platform: $612M raised, BMS reserved capacity, Cabaletta reached patient dosing, and a global network is being built.'
    - This strengthens if more customers sign long-term contracts and site utilization becomes visible.
  - - thesis
    - Selling manufacturing infrastructure rather than only a pipeline can justify a premium to many development-stage cell-therapy companies.
    - This strengthens if repeat bookings, margin data, and multi-customer utilization prove the infrastructure model.
  - - anti-thesis
    - No reviewed public source discloses current valuation, price per share, liquidation preferences, or a clean secondary mark.
    - This risk falls sharply if management shares the latest term sheet, cap table, or recent tender/secondary pricing.
  - - anti-thesis
    - Public sources still do not show realized revenue, backlog conversion, factory utilization, or gross margin, so investors could be paying for a commercial future that is not yet visible.
    - This improves if sponsor filings or company materials show revenue contribution, utilization by site, and economics that survive scale-up.
