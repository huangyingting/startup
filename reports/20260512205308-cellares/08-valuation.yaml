- id: TV003
  title: Bull / base / bear scenario table
  columns:
  - Scenario
  - Explicit assumptions
  - Valuation logic
  - Key risks
  - Decision implication
  rows:
  - - bear
    - BMS and Cabaletta remain real proof points, but broader customer conversion, site utilization, and economic visibility lag.
    - Supportable range roughly $0.8B-$1.5B, closer to development-stage public cell-therapy peers plus only a modest infrastructure premium.
    - Factory delays, concentration, and financing at commercial-like prices before commercial-like proof.
    - Participate only at a substantial discount with strong downside protection.
  - - base
    - BMS and Cabaletta convert into broader bookings, the global network stays on the 2026-2027 plan, and diligence shows credible unit economics.
    - Supportable range roughly $1.5B-$3.0B as a premium manufacturing-platform story still below mature commercial peers.
    - Utilization may still trail hype, and margins may still be unproven.
    - Continue diligence if offered pricing sits inside or below this band with clean terms.
  - - bull
    - Multiple customers and regions convert quickly, the platform scales without major comparability or quality setbacks, and investors see durable infrastructure value.
    - Supportable range roughly $3.0B-$5.0B, approaching but not exceeding Legend-like commercial territory.
    - This case requires proof arriving much faster than what public evidence currently shows.
    - Do not underwrite this outcome without unusually strong private evidence.
  notes: Ranges are decision guardrails derived from public proof and peer context, not claims about the company current undisclosed valuation.
