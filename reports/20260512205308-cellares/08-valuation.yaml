company:
  name: Cellares
chapter:
  number: 8
  title: Valuation
summary: Cellares looks like a serious cell-therapy manufacturing platform with unusually strong public proof for a private company, but public evidence still does not reveal the current equity price, preference stack, revenue run-rate, or utilization profile needed to underwrite a clean entry valuation. The company has raised $612 million, signed a $380 million capacity reservation agreement with Bristol Myers Squibb, moved Cabaletta through IND-amendment clearance and first-patient dosing, and is building a four-site smart-factory network. Those facts justify continued diligence and a real valuation premium versus many development-stage peers. They do not justify false precision. Public cell-therapy comps range from roughly $0.4 billion to $0.8 billion for development-stage names up to about $5.2 billion for commercial Legend Biotech, so the most honest stance on an undisclosed current price is research-more, high risk, and price-sensitive. A rough supportable reference range is about
  $0.8B-$1.5B bear, $1.5B-$3.0B base, and $3.0B-$5.0B bull, with any price above that requiring non-public proof materially stronger than what the open record shows today.
sections:
- id: recommendation-and-entry-discipline
  title: Recommendation and entry discipline
  body: 'The first valuation problem is not whether Cellares is interesting. It is whether public evidence is sufficient to price it. The answer is still no. Cellares clearly has more traction than a typical automation startup: $612 million raised, a blue-chip commercial agreement with Bristol Myers Squibb, a credible Cabaletta proof chain from TAP through patient dosing, and a management team openly preparing for IPO. Those are real positives. But none of the retained public sources disclose the current post-money valuation, price per share, liquidation preferences, or secondary marks. Public sources also do not provide a clean bridge from reserved capacity and pilot wins to realized utilization, revenue, or gross margin. That means a precise buy or avoid call at the current private price would be false precision. The appropriate recommendation is research-more and explicitly price-sensitive. Continue diligence if the next round is priced near the public peer cluster plus a defensible premium
    for infrastructure proof; pause if investors are being asked to pay as though diversified commercial scale is already visible.'
  claimRefs:
