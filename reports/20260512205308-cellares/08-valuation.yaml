- id: TV005
  title: Thesis-break and kill triggers table
  columns:
  - Risk
  - Monitorable trigger
  - Threshold / event
  - Valuation implication
  rows:
  - - Factory execution
    - Leiden and Kashiwa readiness, staffing, and customer onboarding
    - Material slippage versus the public 2026-2027 commercialization timeline
    - Compress supportable range toward the bear band and assume higher future financing needs.
  - - Customer concentration
    - New long-term contracts and disclosed utilization
    - No new meaningful customer conversion while BMS or Cabaletta slows
    - Treat the business as concentrated proof rather than diversified infrastructure.
  - - Comparability / quality
    - Engineering runs, release data, deviations, and regulator feedback
    - Failed bridge package, recurring deviation trend, or delayed transfer
    - Reduce confidence sharply and move valuation expectations lower.
  - - Financing discipline
    - Next round pricing and terms
    - Round prices the company near commercial-peer territory without matching public proof
    - Pass unless private evidence is unusually strong and downside protection is exceptional.
  - - Evidence quality
    - Revenue, margin, and utilization disclosure
    - Another financing round arrives without better economics visibility
    - Keep the recommendation at research-more despite company-quality positives.
  notes: Triggers are set up to move the recommendation or supportable range, not merely to label generic company risk.
