- id: public-comps-and-scenario-guardrails
  title: Public comps and scenario guardrails
  body: 'The public comparable set is useful mainly as a bracket, not a target. Development-stage cell-therapy names like Autolus, Allogene, Lyell, and Cabaletta sit around roughly $0.4 billion to $0.8 billion market cap on the retrieved May 2026 quote pages, while commercial Legend sits above $5 billion. That spread says more about how proof-sensitive the sector is than about any single correct multiple for Cellares. Cellares deserves a premium to many small development-stage names because it is selling infrastructure, not only a pipeline, and because its partner proof is unusually strong. But it does not yet deserve to be capitalized on the same basis as a mature commercial cell-therapy company unless utilization, margins, and customer diversity become visible. The most practical way to express that is with ranges. Bear case: Cellares stays closer to development-stage peer territory because conversion stalls. Base case: BMS and Cabaletta validate a broader manufacturing network and support
    a low-single-digit-billion mark. Bull case: multiple customers and regions convert fast enough that Cellares begins to resemble differentiated commercial infrastructure, though still short of Legend-level maturity.'
