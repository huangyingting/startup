      title-level metadata without numeric detail.
    whyItMatters: >-
      Independent ranking, download, and grossing data would help triangulate current consumer traction versus company
      claims.
    diligencePath: Re-run Similarweb/Sensor Tower with licensed access or request mobile analytics exports from the company.
    relatedQuestionRefs:
      - QO005
    relatedTableRefs:
      - TO001
