evidenceGaps:
  - type: private-evidence-only
    severity: material
    topic: Exact current cap table, ownership, and secondaries
    missingEvidence: >-
      No reviewed public source disclosed ownership percentages, liquidation preferences, or any secondary transactions
      for Speak after Series C.
    whyItMatters: Control rights and preference stack shape governance power and future financing dilution.
    diligencePath: >-
      Request the current cap table, board observer rights, and any secondary transaction summary from management or
      lead investors.
    relatedQuestionRefs:
      - RQ122
    relatedTableRefs:
      - T103
  - type: missing-source
    severity: material
    topic: Current headcount and function mix
    missingEvidence: >-
      Public sources conflict between a 75-person workforce in June 2024 and a 253-employee third-party estimate in
      2025, with no official 2026 headcount disclosure.
    whyItMatters: >-
      Team size and functional mix determine burn, operating leverage, and execution capacity across product and
      go-to-market.
    diligencePath: >-
      Request a current org chart and employee count by function from management and reconcile against LinkedIn or
      payroll records.
    relatedQuestionRefs:
      - RQ121
    relatedTableRefs:
      - T101
      - T102
  - type: enumeration-incomplete
    severity: minor
    topic: Investor and stakeholder map is partial
    missingEvidence: >-
      Public round announcements identify lead and notable investors but not a full cap table or all observer/strategic
      relationships.
    whyItMatters: Missing smaller investors or strategic side letters can hide governance frictions or commercial constraints.
    diligencePath: Collect financing documents, board minutes, and side-letter schedules for all rounds since 2022.
    relatedQuestionRefs:
      - RQ108
      - RQ122
    relatedTableRefs:
      - T103
  - type: conflicting-data
    severity: minor
    topic: Founding year chronology conflict
    missingEvidence: >-
      Most official and company-profile sources say 2016, while one June 2024 TechCrunch article described Speak as
      launched in 2014.
    whyItMatters: >-
      Founding-year drift is a small issue on its own but can signal sloppy external storytelling or confusion between
      an idea start date and formal company formation.
    diligencePath: >-
      Confirm Delaware incorporation date and founders’ own chronology in data-room materials, then standardize all
      investor-facing narratives.
    relatedQuestionRefs:
      - RQ119
    relatedTableRefs:
      - T104
  - type: access-blocked
    severity: minor
    topic: Third-party app analytics detail
    missingEvidence: >-
      Similarweb blocked text retrieval for Speak’s app analytics page during this run, and Sensor Tower yielded only
      title-level metadata without numeric detail.
    whyItMatters: >-
      Independent ranking, download, and grossing data would help triangulate current consumer traction versus company
      claims.
    diligencePath: Re-run Similarweb/Sensor Tower with licensed access or request mobile analytics exports from the company.
    relatedQuestionRefs:
      - RQ105
    relatedTableRefs:
      - T101
  - type: missing-source
    severity: material
    topic: SAM and SOM for Speak
    missingEvidence: >-
      Public sources provide broad market lenses but no verified serviceable available market or attainable market share
      specifically for Speak.
    whyItMatters: >-
      Underwriting needs a tighter link between market size and the share Speak can win with its current language set,
      price point, and distribution.
    diligencePath: >-
      Request internal cohort data by geography, language pair, CAC channel, enterprise sales conversion, and employer
      seat deployment to build a bottom-up SAM/SOM.
    relatedQuestionRefs:
      - RQ216
      - RQ217
    relatedTableRefs:
      - T202
  - type: conflicting-data
    severity: minor
    topic: Market sizing lenses are not directly comparable
    missingEvidence: >-
      Technavio reports forecast growth, Preply quotes current market value, and Speak cites a broad $100B+ market
      boundary that includes offline spend.
    whyItMatters: Averaging these numbers would create false precision and overstate confidence in a single market-size figure.
    diligencePath: >-
      Keep multiple lenses separated by scope and request internal management framing of consumer vs enterprise vs
      offline displacement.
    relatedQuestionRefs:
      - RQ224
    relatedTableRefs:
      - T202
  - type: private-evidence-only
    severity: material
    topic: Public market share and retention by segment
    missingEvidence: >-
      No reviewed public source provides validated market share, segment retention, or cohort economics for Speak versus
      peers.
    whyItMatters: >-
      Without share and retention, strong category growth does not automatically translate into durable company-level
      growth.
    diligencePath: >-
      Request management dashboards showing active subscribers, enterprise seats, renewals, and competitive win/loss
      rates.
    relatedQuestionRefs:
      - RQ223
      - RQ225
    relatedTableRefs:
      - T203
  - type: access-blocked
    severity: minor
    topic: Independent mobile analytics detail for Speak
    missingEvidence: Similarweb and Sensor Tower were not available with full numeric detail during this run.
    whyItMatters: Independent ranking and grossing data would sharpen the consumer-market adoption view.
    diligencePath: Re-run with licensed analytics access or request third-party mobile analytics exports from the company.
    relatedQuestionRefs:
      - RQ206
    relatedTableRefs:
      - T202
  - type: private-evidence-only
    severity: material
    topic: Public market share by revenue or paying users
    missingEvidence: No reviewed source published a reliable revenue-share or paying-user-share ranking for Speak versus direct rivals.
    whyItMatters: Without share data it is difficult to convert product anecdotes into a defensible competitive position.
    diligencePath: >-
      Request internal win/loss analysis, subscriber counts, and enterprise seat data, then benchmark against paid
      external datasets.
    relatedQuestionRefs:
      - RQ317
    relatedTableRefs:
      - T301
  - type: missing-source
    severity: material
    topic: Enterprise customer overlap and multi-homing
    missingEvidence: >-
      Public sources do not reveal whether employers use Speak alongside Duolingo, Cambly, or human tutors, nor whether
      contracts are exclusive.
    whyItMatters: Multi-homing would weaken any claim that Speak for Business is a durable channel moat.
    diligencePath: Request customer references, contract terms, and competitive win/loss notes for the top enterprise accounts.
    relatedQuestionRefs:
      - RQ321
      - RQ324
    relatedTableRefs:
      - T304
  - type: enumeration-incomplete
    severity: minor
    topic: Competitor pricing transparency
    missingEvidence: Many competitors disclose memberships or trials but not clean realized ASPs or enterprise contract pricing.
    whyItMatters: List-price comparisons can overstate or understate actual monetization differences.
    diligencePath: Collect current checkout screenshots and enterprise proposals for Speak, ELSA, Cambly, Babbel, and Busuu.
    relatedQuestionRefs:
      - RQ308
    relatedTableRefs:
      - T303
  - type: missing-source
    severity: minor
    topic: Independent efficacy benchmarks
    missingEvidence: >-
      No reviewed source provides standardized head-to-head speaking-efficacy data across Speak, ELSA, Duolingo, and
      live-tutor alternatives.
    whyItMatters: Competitive differentiation in language learning ultimately rests on outcomes, not just downloads or ratings.
    diligencePath: Commission independent learner testing or request controlled experiment results from management.
    relatedQuestionRefs:
      - RQ310
      - RQ323
    relatedTableRefs:
      - T302
  - type: private-evidence-only
    severity: material
    topic: Revenue and retention disclosure
    missingEvidence: >-
      No reviewed public source disclosed Speak revenue, ARR, subscriber count, gross retention, net revenue retention,
      or cohort performance.
    whyItMatters: >-
      Without actual revenue and retention, pricing and download metrics cannot be converted into durable revenue
      quality.
    diligencePath: >-
      Request audited or management ARR, payer counts, cohort retention, churn, refunds, and revenue split between
      consumer and business.
    relatedQuestionRefs:
      - RQ405
      - RQ410
      - RQ412
    relatedTableRefs:
      - T403
      - T405
  - type: private-evidence-only
    severity: material
    topic: Cash on hand and burn
    missingEvidence: Public sources show recent funding but do not disclose current cash balance, monthly burn, or budgeted runway.
    whyItMatters: Capital adequacy cannot be underwritten from fundraising headlines alone.
    diligencePath: Request monthly cash balance, burn, board budget, hiring plan, and downside runway scenarios.
    relatedQuestionRefs:
      - RQ414
      - RQ421
    relatedTableRefs:
      - T404
  - type: missing-source
    severity: material
    topic: Enterprise economics
    missingEvidence: >-
      Public sources do not reveal enterprise seat counts, ACVs, implementation costs, sales cycle length, or renewal
      data for Speak for Business.
    whyItMatters: >-
      If enterprise is the higher-quality revenue stream, these missing numbers determine whether it meaningfully
      improves unit economics.
    diligencePath: Request top-20 customer contracts, pipeline stages, ACVs, renewal rates, and implementation cost data.
    relatedQuestionRefs:
      - RQ409
      - RQ411
    relatedTableRefs:
      - T401
      - T403
  - type: missing-source
    severity: minor
    topic: Platform fee and app-store dependency
    missingEvidence: >-
      Public sources do not quantify how much gross billings are retained after platform fees or what share of
      conversions occur on-web versus in-app.
    whyItMatters: Platform economics can materially change contribution margin for subscription apps.
    diligencePath: Request billing mix by channel, app-store fee rates, refund rates, and web conversion share.
    relatedQuestionRefs:
      - RQ424
      - RQ423
    relatedTableRefs:
      - T403
  - type: access-blocked
    severity: material
    topic: Public privacy and terms detail on speak.com legal pages
    missingEvidence: >-
      The public privacy and terms URLs resolved during review, but text-only fetch returned only a JS shell rather than
      readable policy language.
    whyItMatters: >-
      Product and compliance diligence needs verifiable language on retention, third-party processors, minors,
