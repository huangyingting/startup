evidenceGaps:
  - type: private-evidence-only
    severity: material
    topic: Exact current cap table, ownership, and secondaries
    missingEvidence: >-
      No reviewed public source disclosed ownership percentages, liquidation preferences, or any secondary transactions
      for Speak after Series C.
    whyItMatters: Control rights and preference stack shape governance power and future financing dilution.
    diligencePath: >-
      Request the current cap table, board observer rights, and any secondary transaction summary from management or
      lead investors.
    relatedQuestionRefs:
      - QO022
    relatedTableRefs:
      - TO003
  - type: missing-source
    severity: material
    topic: Current headcount and function mix
    missingEvidence: >-
      Public sources conflict between a 75-person workforce in June 2024 and a 253-employee third-party estimate in
      2025, with no official 2026 headcount disclosure.
    whyItMatters: >-
      Team size and functional mix determine burn, operating leverage, and execution capacity across product and
      go-to-market.
    diligencePath: >-
      Request a current org chart and employee count by function from management and reconcile against LinkedIn or
      payroll records.
    relatedQuestionRefs:
      - QO021
    relatedTableRefs:
      - TO001
      - TO002
  - type: enumeration-incomplete
    severity: minor
    topic: Investor and stakeholder map is partial
    missingEvidence: >-
      Public round announcements identify lead and notable investors but not a full cap table or all observer/strategic
      relationships.
    whyItMatters: Missing smaller investors or strategic side letters can hide governance frictions or commercial constraints.
    diligencePath: Collect financing documents, board minutes, and side-letter schedules for all rounds since 2022.
    relatedQuestionRefs:
      - QO008
      - QO022
    relatedTableRefs:
      - TO003
  - type: conflicting-data
    severity: minor
    topic: Founding year chronology conflict
    missingEvidence: >-
      Most official and company-profile sources say 2016, while one June 2024 TechCrunch article described Speak as
      launched in 2014.
    whyItMatters: >-
      Founding-year drift is a small issue on its own but can signal sloppy external storytelling or confusion between
      an idea start date and formal company formation.
    diligencePath: >-
      Confirm Delaware incorporation date and founders’ own chronology in data-room materials, then standardize all
      investor-facing narratives.
    relatedQuestionRefs:
      - QO019
    relatedTableRefs:
      - TO004
  - type: access-blocked
    severity: minor
    topic: Third-party app analytics detail
    missingEvidence: >-
