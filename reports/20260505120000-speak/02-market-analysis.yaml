callouts:
  - calloutType: insight
    title: The market is large enough; the real question is capture
    body: >-
      All credible sources point to a large and growing English-learning market, but none isolate a clean public SAM for
      Speak. The diligence burden therefore shifts from proving macro demand to proving conversion, retention, and
      budget ownership within a narrower spoken-fluency wedge.
    claimRefs:
      - CM006
      - CM021
      - CM022
  - calloutType: risk
    title: AI tailwinds do not erase efficacy and trust hurdles
    body: >-
      Macro AI adoption helps the category, but WEF, World Bank, academic research, and product reviews all point to the
      same limiting factors: access gaps, privacy concerns, and the need for feedback quality that actually improves
      speaking skill rather than merely feeling engaging.
    claimRefs:
      - CM016
      - CM017
      - CM020
      - CM035
      - CM036
