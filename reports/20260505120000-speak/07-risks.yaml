  - id: T705
    title: Mitigation and kill criteria table
    columns:
      - risk
      - monitorable trigger
      - threshold / event
      - action implication
    rows:
      - - Subscription trust / billing friction
        - Refund requests, chargebacks, and billing-related review spikes
        - Meaningful multi-week jump after a pricing or trial-flow change
        - Pause aggressive acquisition and rework store / onboarding disclosures before scaling spend.
      - - Recognition quality
        - Clusters of reviews citing missed words, lag, or rushed speaking windows
        - Persistent issues across more than one major language or platform release
        - Hold language expansion until accuracy and pacing recover.
      - - Voice-data / child-data compliance
        - Inability to furnish retention, deletion, or age-screening controls to diligence or regulators
        - Missing DPIA / retention package or a regulator / platform notice
        - Downgrade the underwriting case until compliance documentation is complete.
      - - OpenAI / model dependence
        - Material API price increase, latency regression, or policy constraint
        - A sustained margin hit or degraded live-roleplay experience
        - Reset valuation assumptions and require fallback / routing proof.
      - - Cloud / inference concentration
        - Repeated Sev-1 inference or speech-serving disruptions
        - More than one major outage without credible failover evidence
        - Require multi-region or multi-vendor resilience plan before underwriting premium growth.
      - - Financing / valuation support
        - New round or secondary process implies flat / down pricing without metric proof
        - Unable to show durable retention, margins, and refund discipline
        - Treat the current valuation as fragile and avoid paying ahead of verified economics.
    notes: These triggers translate a broad diligence narrative into a concrete monitoring framework for investors.
