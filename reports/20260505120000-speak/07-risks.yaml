company:
  name: Speak
chapter:
  number: 7
  title: Risks
  summary: >-
    Speak’s main residual risk is not product-market fit; it is the combination of voice-data regulation, fragmented
    app-store billing, and heavy dependence on external AI / cloud infrastructure for a premium paid learning
    experience. Public sources show strong user love and meaningful scale, but they also show recognition complaints,
    refund friction, evolving AI compliance obligations, and material gaps around privacy-policy text, unit economics,
    and enterprise-grade reliability. The result is a company with clear upside and real mitigation progress, but one
    where moderate operational or compliance slippage can propagate quickly into retention, margin, and valuation risk.
sections:
  - id: S701
    title: Legal, regulatory, and consumer-protection risk
    body: >-
      Speak is not facing an obvious public enforcement event today, but its legal surface is more complicated than a
      generic language app because the product is voice-first, AI-mediated, global, and subscription-driven. Google Play
      says the app may share app activity and device identifiers with third parties and may collect personal and
      financial information, while also offering encryption in transit and deletion requests. Apple rates the app 13+,
      but Google rates it Everyone, which creates an ambiguous minor-facing posture for a service that invites users to
      speak naturally into an AI tutor. That matters because FTC guidance says COPPA obligations attach if a service is
      directed to children under 13 or has actual knowledge of collection, and because AI Act and GDPR obligations can
      intensify when AI systems become more consequential or less transparent. On top of privacy, billing rights are
      fragmented: Apple controls App Store refunds, Google imposes strict transparency and cancellation rules, and
      Speak’s own help center draws fine distinctions between cancellation and refunds. The residual legal risk is
      therefore manageable but real: one part regulation, one part consumer-trust plumbing.
    claimRefs:
      - C257
      - C258
      - C259
      - C262
      - C264
      - C266
      - C268
      - C270
      - C272
