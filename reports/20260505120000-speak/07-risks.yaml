  evidenceGaps:
    - type: enumeration-incomplete
      severity: material
      topic: >-
        Regulatory / legal risk register coverage is partial because non-public privacy, DPA, and store-contract
        documents were unavailable.
      missingEvidence: >-
        Current machine-readable privacy and terms text, full subprocessor commitments, age-gating logic, and
        store-specific contract amendments were not publicly reviewable.
      whyItMatters: >-
        Those documents determine whether Speak's voice-data handling, minor-facing posture, and platform obligations
        are comfortably compliant or merely minimally disclosed.
      diligencePath: >-
        Request the current privacy policy, terms, DPA, child-data controls, retention schedule, and any Apple/Google
        billing-disclosure screenshots from management.
      relatedQuestionRefs:
        - RQ724
      relatedTableRefs:
        - T701
    - type: missing-source
      severity: blocking
      topic: Financial-model disclosure remains private.
      missingEvidence: >-
        No audited revenue, gross margin, burn, inference-cost, chargeback, or customer-concentration package was
        public.
      whyItMatters: >-
        Without those figures it is impossible to know whether Speak's $1B valuation is supported by durable economics
        or by growth plus capital availability.
      diligencePath: >-
        Request monthly revenue by store and geography, gross margin after inference costs, chargeback/refund rates, and
        cash runway.
      relatedQuestionRefs:
        - RQ728
      relatedTableRefs: []
    - type: missing-source
      severity: material
      topic: Cross-jurisdiction litigation and enforcement review is incomplete.
      missingEvidence: >-
        Public web-accessible sources did not provide a comprehensive counsel-grade search package across U.S. state,
        federal, and non-U.S. dockets.
      whyItMatters: >-
        A hidden dispute over refunds, privacy, or IP would change the legal-risk ranking quickly for a consumer AI
        product operating globally.
      diligencePath: Have counsel run PACER, state court, EU, and Korea searches for Speakeasy Labs, Speak, and key executives.
      relatedQuestionRefs:
        - RQ723
      relatedTableRefs: []
    - type: missing-source
      severity: material
      topic: Enterprise reliability commitments are not public.
      missingEvidence: No public SLA credits, uptime commitments, detailed incident history, or support-response metrics were found.
      whyItMatters: >-
        If Speak wants to expand business use cases, hidden reliability or support weakness can block larger contracts
        even when the core app is loved by consumers.
      diligencePath: >-
        Request SLA documents, incident postmortems, first-response times, and store-specific refund / complaint
        metrics.
      relatedQuestionRefs:
        - RQ730
      relatedTableRefs:
        - T702
        - T704
    - type: access-blocked
      severity: material
      topic: Speak privacy and terms pages were JS-gated during text review.
      missingEvidence: >-
        The retained fetches for speak.com/privacy and speak.com/terms returned only client-rendered shells rather than
        policy text.
      whyItMatters: >-
        Voice-data retention, transcript retention, training-use exclusions, and arbitration / liability terms are
        central to underwriting legal and privacy exposure.
      diligencePath: Obtain PDF or HTML exports of the current policies directly from management or legal.
      relatedQuestionRefs:
        - RQ724
      relatedTableRefs: []
