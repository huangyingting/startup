  - id: TI004
    title: Capital adequacy table
    columns:
      - Item
      - Public status
      - Current view
      - Why it matters
      - Next-round / diligence trigger
    rows:
      - - Recent funding
        - Confirmed
        - ~$98M gross announced across recent Series B-3 and C
        - Provides near-term financing support
        - Reconcile announced rounds with cap table and net proceeds
      - - Form D corroboration
        - Partially confirmed
        - Form D tracker shows $77.7M offering related to late-2024 financing
        - Improves confidence that the announced raise closed materially
        - Request official closing docs and proceeds schedule
      - - Cash on hand
        - Unavailable
        - Unknown
        - Most direct runway input
        - Request current balance and restricted cash
      - - Monthly burn
        - Unavailable
        - Unknown
        - Determines runway speed
        - Request monthly burn and budget by function
      - - Runway months
        - Unavailable
        - Scenario only
        - Public sources cannot underwrite it
        - Build base / downside / expansion cases from actual burn
      - - Debt / project finance
        - No public evidence surfaced
        - Likely none, but not fully verified
        - Debt can change risk and flexibility
        - Request debt schedule, leases, and contingent obligations
    notes: This chapter intentionally focuses on adequacy, not a full historical round chronology already covered elsewhere.
    claimRefs:
      - CI008
      - CI009
      - CI010
      - CI012
      - CI033
      - CI035
  - id: TI005
    title: Public financial gaps table
    columns:
      - Missing metric
      - Impact on diligence
      - Exact diligence path
    rows:
      - - Revenue / ARR / billings
        - Cannot underwrite scale or growth quality
        - Request audited or board-level trailing-12-month revenue bridge
      - - Subscriber count and conversion
        - Cannot link downloads to revenue
        - Request subscriber funnel, trial conversion, and plan mix
      - - Gross margin and platform-fee mix
        - Cannot assess AI delivery economics
        - Request COGS by compute, content, support, and app-store fees
      - - Enterprise ACV / seats / renewals
        - Cannot assess quality of B2B stream
        - Request top-customer contract summary and renewal history
      - - Burn and runway
        - Cannot assess financing dependency
        - Request monthly cash balance and forecast burn scenarios
      - - Refund / churn / support quality
        - Cannot assess consumer revenue leakage
        - Request refund rate, churn by plan, and complaint-resolution metrics
    notes: The exact diligence path is part of the artifact so the missing-data problem is operational, not rhetorical.
    claimRefs:
      - CI007
      - CI014
      - CI027
      - CI036
