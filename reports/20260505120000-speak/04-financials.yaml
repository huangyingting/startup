  - id: TI003
    title: Unit economics table
    columns:
      - Metric
      - Public value / status
      - Confidence
      - Why it matters
      - Diligence ask
    rows:
      - - Consumer list price
        - ~$20/month or $99/year
        - medium
        - Starting point for LTV but not enough on its own
        - Confirm current pricing by geo and discount path
      - - Payer count
        - Unavailable
        - low
        - Needed to convert downloads into revenue
        - Request current and trailing-12-month payer counts
      - - Gross margin
        - Unavailable
        - low
        - Core test of AI delivery economics
        - Request margin by channel and compute / platform-fee breakdown
      - - CAC / payback
        - Unavailable
        - low
        - Determines efficiency of growth
        - Request acquisition channel mix, CAC, payback, and enterprise sales cycle
      - - Refund rate / support drag
        - Unavailable publicly; adverse anecdotal signals exist
        - low
        - Important for consumer revenue quality
        - Request refund rate, chargebacks, support backlog, and SLA metrics
      - - Enterprise ACV / seat economics
        - Unavailable
        - low
        - Determines whether business improves the model
        - Request ACV, seats, term, implementation cost, and renewal rate
      - - Retention / NRR
        - Unavailable
        - low
        - Most important revenue-quality test
        - Request cohort retention, gross retention, and NRR by segment
    notes: 'The sparse public table is the point: most economically decisive metrics remain private.'
    claimRefs:
