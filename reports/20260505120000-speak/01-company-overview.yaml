callouts:
  - calloutType: strength
    title: Funding momentum reached category-level validation in 2024
    body: >-
      Speak’s back-to-back 2024 rounds turned it from a fast-growing private language app into a recognized EdTech
      unicorn. The combination of Accel-led capital, OpenAI ecosystem backing, and HolonIQ inclusion gives the company
      unusually strong external validation for a still-private education startup.
    claimRefs:
      - C009
      - C011
      - C012
  - calloutType: risk
    title: Public operating disclosure still lags the valuation narrative
    body: >-
      Despite the unicorn step-up, public materials still do not disclose current ARR, current headcount, debt exposure,
      or a full board roster. Independent reviews also show product-quality and billing complaints that matter more once
      the company starts selling an enterprise-grade learning product.
    claimRefs:
      - C030
      - C032
      - C033
      - C035
