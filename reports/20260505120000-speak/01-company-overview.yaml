company:
  name: Speak
chapter:
  number: 1
  title: Company Overview
  summary: >-
    Speak is a San Francisco-based AI language-learning startup that built its early wedge in English speaking practice
    before expanding into a broader multilingual tutoring app and an employer-facing product. Public evidence shows a
    sharp 2024 step-up: a $20M Series B-3 at a $500M valuation in June 2024 was followed six months later by a $78M
    Series C at a $1B valuation, pushing Speak onto HolonIQ’s EdTech unicorn list. Official materials support strong
    top-line traction—10M+ users in 40+ countries by mid-2024, 15M+ downloads claimed by 2026, and 200+ enterprise
    customers or brands for Speak for Business—but the company still withholds key underwriting data such as current
    ARR, current headcount, and full governance disclosure. The result is a high-momentum but still partially opaque
    private-company profile.
sections:
  - id: S101
    title: Identity, product scope, and business model
    body: >-
      Speak is the consumer-facing brand of Speakeasy Labs, a San Francisco-headquartered startup focused on
      spoken-language fluency rather than textbook-style memorization. Across its homepage, app-store listings, and
      late-2024 fundraising materials, the company consistently describes itself as an AI language tutor that pushes
      learners to speak out loud, receive instant feedback, and build conversational confidence. That positioning
      matters because it is narrower than general language-learning incumbents: Speak competes first on speaking
      efficacy, not on broad gamified content breadth.


      By May 2026, Speak’s public consumer surfaces show a broader product than the English-only wedge that powered its
      early growth. The homepage and Apple listing advertise six live learning tracks (French, Spanish, English, Korean,
      Italian, and Japanese), while the June 2025 product post states that Spanish launched first for English speakers
      and four more languages followed shortly after. This evolution supports a hybrid model: consumer subscriptions
      remain the core monetization engine, but the same voice-first tutoring stack now also supports a business offering
      for employers. TechCrunch’s December 2024 reporting gives the clearest public list-price anchor for the consumer
      product at $20 per month or $99 per year.


      The public disclosure profile is still that of a private growth startup. Speak says enough to establish category,
      product strategy, and top-line traction, but not enough to validate unit economics, current ARR, or the exact
      customer mix between consumer and enterprise.
    claimRefs:
      - C001
      - C002
      - C003
      - C004
      - C037
  - id: S102
    title: Founders, leadership, and organizational footprint
    body: >-
      The public leadership picture is founder-led and still highly concentrated. Late-2024 fundraising coverage
      consistently names Connor Zwick as CEO and Andrew Hsu as CTO/co-founder, with Zwick serving as the primary
      external spokesperson in both official company posts and independent press. That concentration is positive for
      speed and product coherence, but it also creates clear key-person dependence because the company’s narrative,
      investor messaging, and product vision all run heavily through Zwick.


      Speak’s operating footprint is global for a company of its size. TechCrunch reported a 75-person workforce across
      San Francisco, Seoul, Tokyo, and Ljubljana in June 2024, while the current careers page still highlights Seoul,
      Ljubljana, and San Francisco and presents the company as internationally distributed. The careers page is useful
      but internally stale: it also includes an older historical snapshot referring to a 60-person team and more than
      $60 million raised, showing that the page was not fully updated after the late-2024 financing jump. That
      inconsistency is a small but real diligence signal: even company-controlled surfaces should be treated as
      time-stamped claims, not timeless facts.


      Governance disclosure is limited. The best publicly supported board datapoint is that Accel partner Ben Quazzo
      joined the board at Series C. Beyond that, public materials identify related persons in the Form D filing but do
      not disclose a full current board roster, observer rights, or control provisions.
    claimRefs:
      - C002
      - C014
      - C015
      - C016
      - C024
      - C029
      - C030
  - id: S103
    title: Funding history, valuation step-up, and chronology of record
    body: >-
      Speak’s public funding story accelerated sharply in 2024. The company announced a $20 million Series B-3 in June
      2024 at a $500 million valuation, then followed six months later with a $78 million Series C at a $1 billion
      valuation. The Series C post says total capital reached $162 million and frames the financing as the second
      preempted round of the year. Independent coverage from TechCrunch, Tech Funding News, and HolonIQ corroborates the
      valuation jump strongly enough to treat the unicorn milestone as well supported.


      The securities-filing trail is directionally consistent with the press narrative. A Form D filed on December 11,
      2024 lists a $77.7 million equity offering under Rule 506(b), with the first sale dated November 13, 2024. The
      filing list also shows additional Form D events on August 12, 2024 and October 17, 2023, which likely map to
      intermediate financing activity around the B-extension period and prior private issuance activity. Those filings
      do not reveal ownership terms, preferences, or all governance rights, but they do add useful primary-document
      corroboration that real capital moved on the timeline the company describes.


      HolonIQ’s EdTech unicorn ledger then recorded Speak as joining the global EdTech unicorn list in December 2024 at
      a $1 billion valuation. That makes the Series C not just a financing milestone but a category-status milestone
      with real signaling value for future fundraising, recruiting, and enterprise sales.
    claimRefs:
      - C008
      - C009
      - C010
      - C011
      - C012
      - C023
      - C025
  - id: S104
    title: Traction signals, enterprise expansion, and risk flags
    body: >-
      Speak has enough public traction data to support “scaled private company,” but not enough to underwrite operating
      performance. On the consumer side, official surfaces claim 15M+ downloads and a 4.8 rating, while app stores
      independently confirm strong rating depth (44K ratings on Apple; 112K reviews on Google Play). Earlier 2024
      fundraising materials said Speak had more than 10 million learners in 40+ countries and that users had already
      spoken more than one billion sentences that year. Those are all company-centered metrics, but they are at least
      consistent with the product’s visible distribution footprint.


      The most interesting non-consumer signal is the enterprise product. Speak for Business appears to have launched in
      earnest between the June and December 2024 rounds, and the Series C announcement claims more than 200 customers
      and an 85% employee adoption rate. The current B2B page similarly says 200+ brands rely on Speak for Business.
      That suggests a real second act beyond subscriptions, although public disclosures still do not break out B2B
      revenue, contract size, or retention.


      Risk flags remain mostly product-quality and disclosure-related rather than legal or financial. Independent
      reviewers praised the polish and speaking-first design, but adverse reviews also point to lenient pronunciation
      scoring, confusing premium packaging, refunds and auto-renew complaints, and incomplete disclosure on current
      headcount and board composition. Those issues do not invalidate the growth narrative, but they do make the next
      layer of diligence operational rather than purely promotional.
    claimRefs:
      - C005
      - C006
      - C007
      - C013
      - C017
      - C018
      - C019
      - C020
      - C032
      - C033
      - C034
      - C035
