  topStrengths:
    - 产品围绕口语流利度做差异化，而不是被动语言学习。
    - 消费者 traction 真实：应用商店评分强、下载量达数百万，并已看见国际化触达。
    - 公司在 2024 年证明投资人持续买单，六个月内估值从 $500M 翻到 $1.0B。
    - Speak for Business 在消费者订阅之外，开出第二个收入面。
    - 工程和产品执行力看起来足够强，能快速推出高阶 AI tutor 和语音智能体功能。
  topRisks:
    - ARR、利润率、留存和回本周期的公开披露太薄，无法有把握地支撑当前估值。
    - Duolingo、ELSA、Babbel、OpenAI 加持的新进入者和低成本 AI tutor 都会施压，压缩定价权。
    - 消费者账单摩擦、退款投诉和发音质量批评说明增长故事底下仍有产品风险边角。
    - 对第三方模型和应用商店生态的依赖，可能削弱护城河耐久度和经济性。
    - 产品在多个地区处理语音数据，还可能触达低龄学习者，因此监管和隐私暴露会上升。
  unresolvedGaps:
    - 当前 ARR、毛利率、消费者转化漏斗和企业收入结构。
    - Speak for Business 的续约、流失、净留存率（NRR）和客户集中度。
    - Series C 估值下的完整股权结构表条款、优先权、老股权利和投资人保护。
    - 当前按职能划分的员工数、董事会构成和更深层治理控制。
    - 分层队列留存，以及溢价定价在早期采用者市场之外是否能守住。
