  - id: TV004
    title: Comparable valuation table
    columns:
      - Comparable
      - Metric
      - Multiple / valuation / status
      - Relevance
      - Limitation
    rows:
      - - Duolingo
        - TTM revenue / EV-revenue / market cap
        - $1.04B revenue; 4.01x EV/revenue; $5.15B market cap
        - Best public quality benchmark for premium language-learning software.
        - Much more mature, profitable, and disclosed than Speak.
      - - Coursera
        - TTM revenue / EV-revenue / market cap
        - $789.84M revenue; 0.42x EV/revenue; $0.98B market cap
        - Shows how general online-learning platforms price when growth and margins are weaker.
        - Business mix is broader than speaking-led consumer language learning.
      - - Udemy
        - TTM revenue / EV-revenue / market cap
        - $773.9M revenue; 0.38x EV/revenue; $0.68B market cap
        - Useful consumer/creator education benchmark for slower-growth subscription learning.
        - Marketplace economics differ from Speak’s owned-curriculum model.
      - - Chegg
        - TTM revenue / EV-revenue / market cap
        - $376.91M revenue; 0.32x EV/revenue; $0.12B market cap
        - Hard downside anchor for what education assets can trade at after product / moat deterioration.
        - Chegg is an adverse comp, not a target peer.
    notes: >-
      Sample of current public anchors used for price discipline; private AI-tutor comparables remain too opaque to
      enumerate exhaustively from open sources.
    enumerationScope:
      coverage: sample
      basis: >-
        This table deliberately samples the most decision-relevant public comps with current 2026 valuation data and
        filings. It is not an exhaustive universe of private AI-tutor rounds, which are not disclosed consistently
        enough in open sources.
