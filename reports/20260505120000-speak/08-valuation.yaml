  evidenceGaps:
    - type: private-evidence-only
      severity: material
      topic: 2026 consumer-to-enterprise revenue mix and renewal quality
      missingEvidence: >-
        No public source discloses current revenue split, enterprise contract duration, renewal rates, or seat expansion
        for Speak for Business.
      whyItMatters: >-
        The bull case depends on enterprise revenue being more durable and higher-ARPU than consumer subscriptions;
        without mix data, the quality of the >$100M run-rate is only partially visible.
      diligencePath: >-
        Request 2025-2026 revenue bridge by segment, top-20 enterprise cohorts, renewal / expansion data, and any
        gross-margin split for consumer versus B2B.
      relatedQuestionRefs:
        - QV018
      relatedTableRefs: []
    - type: private-evidence-only
      severity: blocking
      topic: December 2024 cap table and liquidation preference stack
      missingEvidence: >-
        No public source shows liquidation preferences, participating preferred terms, option-pool refresh, debt, or any
        side letters tied to the $1B round.
      whyItMatters: >-
        Recommendation quality is price-sensitive: a clean cap table can preserve upside, while stacked preferences or
        hidden dilution can erase returns even if enterprise value grows.
      diligencePath: >-
        Review the latest cap table, stock purchase agreements, SAFE / note conversions, employee option grants, and any
        investor-protective clauses from the 2024 round.
      relatedQuestionRefs:
        - QV024
        - QV025
      relatedTableRefs: []
    - type: missing-source
      severity: material
      topic: Scenario return range for a new 2026 investor
      missingEvidence: >-
        Public evidence does not disclose current fully diluted share count, dilution trajectory, or net cash / debt
        adjustments specific to Speak.
      whyItMatters: >-
        Valuation ranges can be sketched from revenue and comps, but investor return ranges remain partial without
        dilution, preference, and financing-need visibility.
      diligencePath: >-
        Underwrite returns using a full cap-table model with planned hiring dilution, financing needs, and liquidation
        preference waterfalls across bear/base/bull exits.
      relatedQuestionRefs:
        - QV029
      relatedTableRefs: []
    - type: enumeration-incomplete
      severity: minor
      topic: Comparable valuation table is a public-sample set, not an exhaustive private comp universe
      missingEvidence: >-
        Accessible public sources provided current listed comps, but comparable private AI-tutoring rounds and
        secondaries are not disclosed with enough consistency to enumerate exhaustively.
      whyItMatters: >-
        The table is sufficient for public-market anchor setting, but it should not be mistaken for a full
        private-market clearing set for AI language-learning assets.
      diligencePath: >-
        Supplement with PitchBook / secondary-market data, banker readouts, and term-sheet references for private
        language-learning or AI-tutor rounds.
      relatedQuestionRefs:
        - QV028
      relatedTableRefs:
        - TV004
    - type: missing-source
      severity: material
      topic: Final diligence asks table lacks cohort retention and CAC payback disclosure
      missingEvidence: >-
        Public sources do not disclose conversion, retention, or CAC payback by cohort for Speak’s consumer and
        enterprise products.
      whyItMatters: >-
        Those unit-economics datapoints are the cleanest bridge between top-line momentum and durable valuation support;
        without them, recommendation quality remains constrained.
      diligencePath: >-
        Request cohort tables for free-to-paid conversion, monthly / annual retention, CAC payback, and gross margin by
        acquisition channel and geography.
      relatedQuestionRefs:
        - QV030
      relatedTableRefs:
        - TV006
