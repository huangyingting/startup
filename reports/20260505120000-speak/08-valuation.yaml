schemaVersion: report-v2
artifact: valuation
slug: speak
runDate: '2026-05-05'
company:
  name: Speak
chapter:
  number: 8
  title: Valuation
  summary: >-
    Public evidence supports a real growth story, but the last public $1B mark still looks stretched without private
    diligence on cap table, retention, and revenue mix.
sections:
  - id: S1
    title: Recommendation and price discipline
    body: >-
      Speak has enough public operating proof to justify serious diligence, but not enough price support to justify a
      clean buy at the last public $1B mark. Official disclosures show valuation moved from $500M in June 2024 to $1B in
      December 2024, while later reporting points to more than $100M of annualized revenue, 15M downloads, 10M+ Google
      Play installs, and a real enterprise footprint. That is materially stronger evidence than most consumer-edtech
      startups can show. The problem is that the available price anchor still implies a high-single-digit to roughly 10x
      revenue multiple, which remains richer than current public education and subscription-learning comps. Duolingo is
      the only public peer with comparable growth and product quality, yet even it screens near 4x EV/revenue on current
      market data. Because the published valuation is older than the latest revenue milestone and the cap table,
      preference stack, and retention profile remain undisclosed, the prudent call is research-more with medium
      confidence, high risk, and a stretched valuation stance. Entry only becomes attractive if updated diligence shows
      stronger recurring economics than public evidence currently proves, or if entry price is materially below the last
      public mark.
    claimRefs:
      - CV001
      - CV006
      - CV012
      - CV015
      - CV017
      - CV021
      - CV023
      - CV050
      - CV051
      - CV053
      - CV057
  - id: S2
    title: Scenario range and comparable frame
    body: >-
      The public-market anchor says Speak deserves a premium to struggling edtech names, but the premium must be earned
      through unusually durable growth and monetization. Duolingo still posts healthy growth, positive margin, and a
      multi-billion market cap, yet its EV/revenue is roughly 4x; Coursera, Udemy, and Chegg sit far below 1x
      EV/revenue. That spread matters because Speak is still private and investors are being asked to fund into a
      company with less disclosure than any of those names. The upside case is still meaningful: AI tutors and online
      language learning both remain large and growing markets, and Speak’s app rankings, pricing, and enterprise
      traction suggest it is building a more serious learning product than a generic vocabulary game. Still, MMR’s
      market work flags freemium competition and CAC pressure, and Oliver Wyman shows how quickly AI-exposed software
      multiples can reprice when markets question seat growth, moat durability, or revenue quality. That is why the
      scenario frame uses conservative public-comp ranges rather than extrapolating an open-ended AI premium. A bear
      outcome compresses toward $400M-$650M, a base case holds around $800M-$1.0B, and a bull case requires revenue to
      move well beyond $150M with broader enterprise conversion and continued app-store strength.
    claimRefs:
      - CV025
      - CV029
      - CV033
      - CV037
      - CV041
      - CV042
      - CV043
      - CV044
      - CV045
      - CV048
      - CV049
      - CV051
      - CV052
      - CV054
      - CV055
      - CV056
  - id: S3
    title: Upgrade triggers, thesis breaks, and final asks
    body: >-
      The path from research-more to buy is straightforward but evidence-heavy. Speak needs to show that enterprise
      traction is not just logo count but recurring, expanding revenue with solid renewal quality. It also needs to
      prove that consumer scale is translating into retention and cohort economics strong enough to defend a premium
      multiple above public edtech. The main thesis-breaks are observable: app-store momentum rolling over, consumer
      paywall friction worsening, enterprise adoption failing to translate into disclosed ARR support, or the broader
      AI-software multiple resetting lower again. Regulatory and market-structure risk also matter because generative-AI
      platforms can become concentrated around key model, data, or compute owners, limiting downstream moats for
      application-layer companies. A financing window can also close quickly if markets stop rewarding AI narratives
      before Speak has disclosed enough economics to separate itself from weaker subscription-learning assets. Put
      differently, Speak looks like a credible business, but the underwriting gap is around return architecture rather
      than product existence. Without the cap table, unit economics, and segment mix, the investor is still pricing a
      narrative premium. With them, the company could merit track or better; without them, the correct posture is
      disciplined diligence rather than conviction pricing. The upgrade path is therefore concrete today: prove
      segment-level retention, show enterprise renewal quality, and demonstrate that premium pricing survives
      competitive pressure.
    claimRefs:
      - CV009
      - CV013
      - CV022
      - CV046
      - CV047
      - CV053
      - CV057
      - CV058
tables:
  - id: TV001
    title: Recommendation summary table
    columns:
      - Dimension
      - Assessment
      - Evidence-backed reason
      - Decision implication
    rows:
      - - Recommendation
        - research-more
        - >-
          Real product traction exists, but public evidence does not yet fully support price-sensitive underwriting at
          the last $1B mark.
        - Proceed only with full private diligence package.
      - - Confidence
        - medium
        - >-
          Funding, revenue, pricing, app traction, and comp data are all visible, but retention and cap-table economics
          are not.
        - Treat public view as a screen, not an IC-ready close.
      - - Risk rating
        - high
        - Outcome depends on continued premium growth plus undisclosed dilution / preference terms.
        - Underwrite downside explicitly before any term-sheet decision.
      - - Valuation stance
        - stretched
        - >-
          Implied private multiple sits above public edtech comp ranges and requires a premium for better growth
          quality.
        - Seek price concession or unusually clean economics.
      - - Target underwriting
        - '>=3x gross MOIC over 4-5 years'
        - >-
          At the last public mark, that target likely requires a faster scale-up than current public evidence alone
          proves.
        - Prefer entry below the last round or with strong downside protections.
    notes: >-
      Target return / hold framing is an underwriting discipline, not a sourced market quote; it is included because
      chapter 08 requires a decision implication.
    claimRefs:
      - CV006
      - CV012
      - CV050
      - CV051
      - CV053
      - CV057
  - id: TV002
    title: Thesis / anti-thesis table
    columns:
      - Lens
      - Thesis
      - Anti-thesis
      - What would change the view
    rows:
      - - Demand
        - Large AI-tutor and language-learning markets support continued category growth.
        - Big markets do not prevent CAC inflation or competition from free / freemium tools.
        - Show cohort-level retention and efficient acquisition by geography.
      - - Monetization
        - Storefront pricing and >$100M annualized revenue suggest consumers will pay for a premium speaking product.
        - Public evidence does not show conversion durability or whether revenue concentration is too consumer-heavy.
        - Provide conversion funnels, payback, and renewal metrics.
      - - Enterprise
        - 200+ customers in Dec 2024 and ~500 employers in late 2025 imply B2B expansion optionality.
        - Logo counts are not the same as durable ARR, expansion, or gross-margin proof.
        - Disclose enterprise ARR, renewal rates, and top-customer concentration.
      - - Relative valuation
        - >-
          A premium to weaker public edtech peers can be justified if Speak behaves more like a category leader than a
          commodity app.
        - Current comp ranges still imply the $1B mark bakes in a lot of future execution.
        - An updated financing at similar price with better disclosure would improve the call.
    notes: null
    claimRefs:
      - CV009
      - CV012
      - CV041
      - CV042
      - CV043
      - CV044
      - CV046
      - CV048
      - CV052
  - id: TV003
    title: Bull / base / bear scenario table
    columns:
      - Scenario
      - Assumptions
      - Valuation / return logic
      - Key risks
      - Probability signal
    rows:
      - - Bear
        - Growth slows, app momentum softens, and investors value Speak closer to public edtech ranges.
        - $400M-$650M valuation; a $1B entry would likely lose capital before dilution and preferences.
        - Multiple compression, paywall friction, weak enterprise conversion.
        - More likely if app-store momentum fades or sector sentiment weakens again.
      - - Base
        - >-
          Revenue scale holds around current run-rate trajectory, enterprise expands but remains unproven, and premium
          over public comps narrows but does not vanish.
        - $800M-$1.0B valuation; a last-round entry produces limited upside unless terms are unusually clean.
        - Mix / retention opacity, financing need, inability to defend premium.
        - Most consistent with current public evidence.
      - - Bull
        - >-
          Revenue scales well beyond $150M, enterprise penetration broadens, and Speak keeps premium app momentum with
          stronger disclosed economics.
        - $1.1B-$1.4B valuation; upside exists, but still depends on private data confirming durable monetization.
        - Execution miss, competitive imitation, weaker-than-expected renewal quality.
        - Needs evidence beyond what public sources currently show.
    notes: >-
      Scenario ranges are analytical estimates derived from published revenue milestones, current public comps, and 2026
      software multiple risk commentary; they exclude undisclosed preference effects.
