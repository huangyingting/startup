  - id: TV005
    title: Thesis-break and kill triggers table
    columns:
      - Trigger
      - Threshold
      - Transmission to thesis
      - Action implication
    rows:
      - - App momentum fades
        - Download / ranking data lose premium positioning across core markets for multiple months
        - Weakens evidence that Speak is still winning consumer attention at premium price points.
        - Re-cut base case toward public-comp ranges.
      - - Enterprise proof stalls
        - No disclosed ARR, renewals, or expansion despite growing employer footprint
        - Turns enterprise story into a narrative add-on rather than a value-supporting second engine.
        - Do not pay a premium for B2B optionality.
      - - Sector multiple compression deepens
        - AI/software risk reprices again and premium subscription names de-rate further
        - Shrinks valuation ceiling even if operations remain solid.
        - Demand wider discount to last round or stand aside.
      - - Terms are investor-unfriendly
        - Heavy preferences, ratchets, or hidden dilution appear in the 2024-2026 financing stack
        - Can eliminate return even if enterprise value holds near base case.
        - Pass or insist on protective entry terms.
    notes: null
    claimRefs:
      - CV020
      - CV022
      - CV048
      - CV049
      - CV053
      - CV058
  - id: TV006
    title: Final diligence asks table
    columns:
      - Topic
      - Missing evidence
      - Why it matters
      - Owner or diligence path
    rows:
      - - Cap table / preferences
        - No public waterfall, option pool, or liquidation preference detail
        - Return math can diverge sharply from enterprise value growth.
        - Company counsel + lead investor data room.
      - - Segment mix
        - No public split of consumer versus enterprise revenue or geography
        - Premium valuation depends on quality and diversification of revenue.
        - Finance team revenue bridge and board materials.
      - - Cohort economics
        - No public conversion, retention, or CAC payback disclosure
        - Needed to judge whether revenue can compound efficiently.
        - Growth / finance analytics export by cohort.
      - - Enterprise quality
        - No public contract duration, renewal, or expansion data for 200-500 employer footprint
        - Needed to validate bull-case durability and downside protection.
        - Sales ops pipeline review plus top-customer diligence calls.
    notes: null
    claimRefs:
