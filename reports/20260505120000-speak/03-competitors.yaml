callouts:
  - calloutType: insight
    title: ELSA is the cleaner direct benchmark than Duolingo
    body: >-
      Duolingo is the biggest substitute, but ELSA is closer to Speak’s actual job-to-be-done: AI-led speaking and
      pronunciation practice for English learners. That makes ELSA the better benchmark for product strength, while
      Duolingo remains the benchmark for distribution power.
    claimRefs:
      - CP005
      - CP008
      - CP029
  - calloutType: risk
    title: Speak’s moat looks moderate, not locked-in
    body: >-
      Public evidence points to real differentiation in speaking-first UX and a nascent business channel, but also to
      limited switching costs, easy feature imitation, and plenty of substitute routes for both consumers and employers.
    claimRefs:
      - CP025
      - CP030
      - CP041
