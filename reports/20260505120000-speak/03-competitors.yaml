  evidenceGaps:
    - type: private-evidence-only
      severity: material
      topic: Public market share by revenue or paying users
      missingEvidence: >-
        No reviewed source published a reliable revenue-share or paying-user-share ranking for Speak versus direct
        rivals.
      whyItMatters: Without share data it is difficult to convert product anecdotes into a defensible competitive position.
      diligencePath: >-
        Request internal win/loss analysis, subscriber counts, and enterprise seat data, then benchmark against paid
        external datasets.
      relatedQuestionRefs:
        - RQ317
      relatedTableRefs:
        - T301
    - type: missing-source
      severity: material
      topic: Enterprise customer overlap and multi-homing
      missingEvidence: >-
        Public sources do not reveal whether employers use Speak alongside Duolingo, Cambly, or human tutors, nor
        whether contracts are exclusive.
      whyItMatters: Multi-homing would weaken any claim that Speak for Business is a durable channel moat.
      diligencePath: Request customer references, contract terms, and competitive win/loss notes for the top enterprise accounts.
      relatedQuestionRefs:
        - RQ321
        - RQ324
      relatedTableRefs:
        - T304
    - type: enumeration-incomplete
      severity: minor
      topic: Competitor pricing transparency
      missingEvidence: Many competitors disclose memberships or trials but not clean realized ASPs or enterprise contract pricing.
      whyItMatters: List-price comparisons can overstate or understate actual monetization differences.
      diligencePath: Collect current checkout screenshots and enterprise proposals for Speak, ELSA, Cambly, Babbel, and Busuu.
      relatedQuestionRefs:
        - RQ308
      relatedTableRefs:
        - T303
    - type: missing-source
      severity: minor
      topic: Independent efficacy benchmarks
      missingEvidence: >-
