  - id: FV001
    title: Recommendation logic
    type: flow
    layout: standard
    summary: Flow from observed traction and market tailwind to valuation caution and a research-more recommendation.
    data:
      nodes:
        - id: n1
          label: Observed traction
          description: Funding up-rounds, >$100M annualized revenue, and strong app metrics show the company is real.
        - id: n2
          label: Category tailwind
          description: AI tutor and online language learning markets are growing quickly enough to support further expansion.
        - id: n3
          label: Premium case exists
          description: Speak can justify trading above weaker public edtech names if growth quality proves durable.
        - id: n4
          label: Public comp ceiling is lower
          description: Current listed peers mostly trade far below the implied private multiple behind the last $1B mark.
        - id: n5
          label: Key diligence is missing
          description: Cap-table terms, retention, CAC payback, and segment mix remain undisclosed.
        - id: n6
          label: 'Recommendation: research-more'
          description: Proceed only if private diligence or better pricing closes the gap between traction and underwritten return.
      edges:
        - from: n1
          to: n3
        - from: n2
          to: n3
        - from: n3
          to: n4
        - from: n4
          to: n5
        - from: n5
          to: n6
    approximationNotes: null
    claimRefs:
      - CV012
      - CV017
      - CV021
      - CV041
      - CV042
      - CV051
      - CV053
      - CV057
