      - number: '2.3'
        title: Buyer, user, and payer segmentation
        blocks:
          - type: paragraph
            body: >-
              Speak’s buyer map splits into two materially different motions. In the consumer motion, the user and payer
              are usually the same person: a learner paying a recurring subscription for self-directed speaking
              practice. TechCrunch’s reported $20/month or $99/year list price fits this self-serve model. In the
              enterprise motion, however, the learner is the user but the employer is the payer, usually buying English
              training as a productivity, recruiting, mobility, or retention benefit. Speak’s Series C post is explicit
              that the business product is industry agnostic and already claims 200+ customers.


              Public market research aligns with that split. Technavio says corporate non-academic learners are a major
              segment for digital English learning, reflecting the role of English in international business
              communication. Preply’s 2026 report likewise says English remains the default second language because of
              business and education demand. Together, these sources suggest that consumer demand is emotion- and
              aspiration-led, while enterprise demand is budget- and productivity-led.


              The adoption path also differs by segment. Consumers can trial and subscribe immediately. Employers
              require HR, L&D, or departmental budget approval and need proof of adoption, seat utilization, and skill
              improvement. That makes enterprise economics potentially larger per account, but slower and more dependent
              on renewal evidence than consumer subscriptions.
            claimRefs:
              - CM009
              - CM023
              - CM024
              - CM025
          - type: table
            tableRef: TM003
            claimRefs:
              - CM009
              - CM023
              - CM024
              - CM025
