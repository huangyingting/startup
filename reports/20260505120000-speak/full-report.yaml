      - number: '3.4'
        title: Moat durability, switching costs, and the main threats
        blocks:
          - type: paragraph
            body: >-
              The publicly visible moat for Speak is moderate. The company has a real product identity—speaking-first AI
              tutoring—and a potentially valuable second channel in business accounts. Those are positives. But the moat
              is not obviously durable because every one of those strengths is attackable. Duolingo can outspend and
              out-distribute. Cambly can win on human trust. ELSA can win on explicit pronunciation coaching. Busuu and
              Babbel can win on structure and retention loops. Praktika and Loora can compress the AI-speaking niche
              with cheaper or more focused positioning.


              Switching costs also look limited from public evidence. Consumers can test multiple apps cheaply, and many
              likely do. Employers may face more friction once they deploy, but there is no public proof that Speak has
              exclusive contracts or deep workflow lock-in. Public reviews reinforce the risk: if advanced users feel
              feedback is shallow or overly forgiving, they have plenty of substitutes.


              The main near-term threats are therefore not existential technology leaps but slower-moving commercial
              forces: pricing pressure, distribution bundling, and category commoditization. Speak can still win, but it
              needs outcomes and enterprise proof more than marketing novelty.
            claimRefs:
