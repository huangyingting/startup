      - number: '8.2'
        title: Scenario range and comparable frame
        blocks:
          - type: paragraph
            body: >-
              The public-market anchor says Speak deserves a premium to struggling edtech names, but the premium must be
              earned through unusually durable growth and monetization. Duolingo still posts healthy growth, positive
              margin, and a multi-billion market cap, yet its EV/revenue is roughly 4x; Coursera, Udemy, and Chegg sit
              far below 1x EV/revenue. That spread matters because Speak is still private and investors are being asked
              to fund into a company with less disclosure than any of those names. The upside case is still meaningful:
              AI tutors and online language learning both remain large and growing markets, and Speak’s app rankings,
              pricing, and enterprise traction suggest it is building a more serious learning product than a generic
              vocabulary game. Still, MMR’s market work flags freemium competition and CAC pressure, and Oliver Wyman
              shows how quickly AI-exposed software multiples can reprice when markets question seat growth, moat
              durability, or revenue quality. That is why the scenario frame uses conservative public-comp ranges rather
              than extrapolating an open-ended AI premium. A bear outcome compresses toward $400M-$650M, a base case
              holds around $800M-$1.0B, and a bull case requires revenue to move well beyond $150M with broader
              enterprise conversion and continued app-store strength.
