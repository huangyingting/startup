            title: AI tailwinds do not erase efficacy and trust hurdles
            body: >-
              Macro AI adoption helps the category, but WEF, World Bank, academic research, and product reviews all
              point to the same limiting factors: access gaps, privacy concerns, and the need for feedback quality that
              actually improves speaking skill rather than merely feeling engaging.
