      - number: '2.4'
        title: Growth drivers and adoption constraints
        blocks:
          - type: paragraph
            body: >-
              The demand case is unusually strong. English remains the most learned language globally, with roughly 1.5
              billion total speakers and clear utility in business, education, and mobility. Technavio attributes market
              growth partly to the flexibility of digital courses, while WEF and MarketsandMarkets emphasize the broader
              shift toward personalized learning, adaptive content, and AI-powered educational tools. Speak-specific
              materials add a more practical angle: users want to actually speak, not just memorize. For employers,
              English-learning budgets can be justified as productivity or workforce-development spend, which
              strengthens the enterprise thesis.


              But public sources also show real constraints. WEF highlights access, privacy, bias, and displacement
              concerns in AI-enhanced learning. World Bank argues that scalable AI adoption depends on connectivity,
              compute, local data, and skills—conditions that are unevenly distributed across emerging markets. The
              academic review of AI language tools reaches a similar conclusion: personalized feedback helps, but
              privacy, evidence quality, and teacher readiness lag. Product-specific reviews sharpen the risk further:
              both Android Police and Languatalk found Speak strong at motivation but weaker at rigorous pronunciation
              correction and advanced-level feedback.


              The practical takeaway is that demand growth is not the same as frictionless adoption. Speak benefits from
              macro demand, but its segment still has to prove learning efficacy, trusted feedback quality, and
              acceptable privacy norms to convert interest into durable paid usage.
            claimRefs:
