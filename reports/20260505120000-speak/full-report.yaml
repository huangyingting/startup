  - number: 2
    title: Market Analysis
    sections:
      - number: '2.1'
        title: 'Market boundary: where Speak competes and where it does not'
        blocks:
          - type: paragraph
            body: >-
              Speak sits inside a narrower segment than “language learning” in general. The relevant boundary is
              digital, speaking-first language learning: products that use AI or live conversation to help users
              practice spoken output in realistic contexts, rather than primarily drilling reading, grammar, or
              flash-card memorization. Speak’s own fundraising materials make that framing explicit by contrasting its
              speaking-first tutor with older app models and by calling out the much broader $100B+ online-and-offline
              language-learning market only as background context.


              That means the closest substitutes are not every educational app, but a narrower bundle: broad language
              platforms such as Duolingo, Babbel, and Busuu; specialized speaking apps such as ELSA and Praktika;
              live-tutor networks such as Cambly; and, in enterprise settings, employer-sponsored English training or
              in-house tutoring. Spend that belongs inside the market includes consumer subscriptions, employer-funded
              English upskilling, and digital spoken-language products. Spend outside the market includes generalized
              test-prep, textbook-led classroom instruction that does not emphasize speaking, or enterprise training
              categories unrelated to language fluency.


              The key diligence point is that Speak is best understood as a spoken-fluency wedge inside a large but
              heterogeneous market. A very broad TAM exists, but the underwritable market depends on who actually pays
              for repeated speaking practice and how much of that demand can be digitized.
            claimRefs:
              - CM001
              - CM002
              - CM023
              - CM030
              - CM031
              - CM033
          - type: table
            tableRef: TM001
            claimRefs:
