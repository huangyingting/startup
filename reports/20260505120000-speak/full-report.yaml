  - number: 5
    title: Product & Technology
    sections:
      - number: '5.1'
        title: Product surface and learner workflow
        blocks:
          - type: paragraph
            body: >-
              Speak’s public product story is unusually coherent: the app is sold as a speaking-first AI tutor, not a
              vocabulary game or grammar-reference tool. Across the homepage, app-store listings, and product posts, the
              same workflow repeats: learners enter a structured lesson, speak target phrases out loud, receive
              immediate corrective feedback, and then apply what they practiced in freer AI conversations. That workflow
              is now formalized as the Speak Method’s Learn → Practice → Apply loop. In practice, the visible module set
              includes Tutor Lessons, speaking drills / speaking cards, roleplays, free-form conversations, progress
              tracking, and newer review or proficiency features such as unit refreshers and Speak Level. The product
              surface is still primarily mobile-first, but it is no longer just an English-learning app; public help
              content shows six target languages for learners and 15 native-language entry points for English
              instruction. The main strategic takeaway is that Speak has a tight workflow fit between pedagogy and
              product packaging: every major module is ultimately in service of getting the learner to speak, compare
              output, and try again rather than passively consume content.
