      - number: '4.2'
        title: 'Public traction and pricing proxies: useful signals, weak underwriting inputs'
        blocks:
          - type: paragraph
            body: >-
              Public traction is real. Speak advertises 15M+ downloads, the App Store shows a large ratings base, and
              Google Play shows six-figure review volume. TechCrunch also reports 10-20 minutes of average daily usage.
              These are meaningful signals that the product is widely distributed and actively used.


              But public traction is not the same thing as revenue. Download counts do not tell us how many users are
              active, how many convert, or how long they stay. Review counts do not show refund rates or net billings.
              Daily usage does not reveal whether engagement is coming from free-trial users, paying subscribers, or
              enterprise-sponsored seats. The same caution applies to peer pricing pages. Competitor list prices are
              useful for triangulating category willingness to pay, but they do not show realized ASPs or contribution
              margins.


              Still, the pricing corridor is informative. Speak looks mid-priced relative to low-cost AI tutors, clearly
              below the spending required for repeated human tutoring, and above free or freemium substitutes. That
              supports monetization plausibility while also highlighting the limits of pricing power.
