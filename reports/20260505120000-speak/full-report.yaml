      - number: '1.3'
        title: Funding history, valuation step-up, and chronology of record
        blocks:
          - type: paragraph
            body: >-
              Speak’s public funding story accelerated sharply in 2024. The company announced a $20 million Series B-3
              in June 2024 at a $500 million valuation, then followed six months later with a $78 million Series C at a
              $1 billion valuation. The Series C post says total capital reached $162 million and frames the financing
              as the second preempted round of the year. Independent coverage from TechCrunch, Tech Funding News, and
              HolonIQ corroborates the valuation jump strongly enough to treat the unicorn milestone as well supported.


              The securities-filing trail is directionally consistent with the press narrative. A Form D filed on
              December 11, 2024 lists a $77.7 million equity offering under Rule 506(b), with the first sale dated
              November 13, 2024. The filing list also shows additional Form D events on August 12, 2024 and October 17,
              2023, which likely map to intermediate financing activity around the B-extension period and prior private
              issuance activity. Those filings do not reveal ownership terms, preferences, or all governance rights, but
              they do add useful primary-document corroboration that real capital moved on the timeline the company
              describes.


              HolonIQ’s EdTech unicorn ledger then recorded Speak as joining the global EdTech unicorn list in December
              2024 at a $1 billion valuation. That makes the Series C not just a financing milestone but a
              category-status milestone with real signaling value for future fundraising, recruiting, and enterprise
              sales.
