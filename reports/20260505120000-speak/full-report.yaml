  - id: FR001
    title: Risk heatmap
    type: matrix
    layout: wide
    summary: >-
      Speak’s highest residual risks sit where AI/voice regulation, app-store billing, and model / cloud dependence
      overlap with a premium consumer experience.
    data:
      columns:
        - Likelihood
        - Impact
        - Mitigation maturity
        - Residual severity
      rows:
        - label: Voice / privacy compliance
          values:
            - label: medium
              tone: warning
              detail: Minor-facing ambiguity and voice-data handling create a real but not yet acute legal risk.
            - label: high
              tone: negative
              detail: A bad privacy or child-data finding would hit trust, store distribution, and growth.
            - label: medium
              tone: neutral
              detail: Encryption, deletion requests, and current disclosures help, but policy text was not fully reviewable.
            - label: medium-high
              tone: warning
              detail: Residual exposure stays elevated until retention and age-gating are fully verified.
        - label: Billing / refund trust
          values:
            - label: medium-high
              tone: negative
              detail: The help center and complaint record show billing is a meaningful support surface.
            - label: high
              tone: negative
              detail: Unexpected charges or refund friction can quickly poison a paid consumer product.
            - label: medium
              tone: warning
              detail: Cancellation and refund flows exist, but responsibility is fragmented across multiple rails.
            - label: medium-high
              tone: warning
              detail: Residual risk remains until chargeback and response-time metrics are known.
        - label: OpenAI / model dependence
          values:
            - label: high
              tone: negative
              detail: Core tutoring experiences visibly rely on GPT-4, GPT-4o, and Realtime API paths.
            - label: high
              tone: negative
              detail: Vendor cost or policy shifts can hit both quality and margins.
            - label: low-medium
              tone: warning
              detail: Speak has its own learning engine and custom ASR, but public fallback detail is thin.
            - label: high
              tone: negative
              detail: Residual concentration is still high for premium live conversational features.
        - label: ASR / realtime product quality
          values:
            - label: medium-high
              tone: warning
              detail: Recognition errors and device-side performance issues still surface in reviews.
            - label: high
              tone: negative
              detail: Quality failures directly undercut the product’s core reason to exist.
            - label: medium
              tone: neutral
              detail: Custom ASR investment and strong ratings show real mitigation progress.
            - label: medium-high
              tone: warning
              detail: Residual exposure is reduced but not closed because users pay for immediacy and accuracy.
        - label: Expansion / support scaling
          values:
            - label: medium
              tone: warning
              detail: Country and language expansion continues while support and localization demands rise.
            - label: medium-high
              tone: warning
              detail: Execution misses would hurt retention and financing support before they threaten solvency.
            - label: medium
              tone: neutral
              detail: Recent capital and active hiring provide some buffer.
            - label: medium
              tone: warning
              detail: Residual risk is mostly about unknowns in support load and enterprise maturity.
    approximationNotes: null
    claimRefs:
      - CR003
      - CR005
      - CR008
      - CR010
      - CR016
      - CR019
      - CR022
      - CR023
      - CR026
