      - number: '7.2'
        title: Operational quality and platform-dependency risk
        blocks:
          - type: paragraph
            body: >-
              Operationally, Speak depends on the quality of speech recognition and conversational latency in a product
              where users notice every miss immediately. Speak built custom ASR because earlier third-party
              speech-recognition services struggled with accented learner speech, and it now runs that stack on Nvidia
              GPU inference inside Kubernetes on Google Cloud. That creates a stronger product than a purely
              off-the-shelf stack, but also a narrower operational base: latency, throughput, or cloud-vendor issues can
              translate directly into weaker tutoring quality. The same pattern appears in OpenAI dependence. Speak
              publicly uses GPT-4, GPT-4o, and the Realtime API; it also admits speech-to-speech models still lag text
              models on instruction following and nuanced coaching. Independent review sources reinforce that this is
              not just a theoretical risk. Complaints cite laggy recognition, missed words in the middle of sentences,
              noisy-environment failures, battery drain, device heating, and occasional recording or progress-saving
              bugs. Strong product love exists, but the operational bar is high because users are paying for an
              experience that feels immediate, accurate, and fair.
            claimRefs:
              - CR022
              - CR023
