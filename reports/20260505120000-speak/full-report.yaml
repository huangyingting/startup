  - number: 3
    title: Competitors
    sections:
      - number: '3.1'
        title: 'Landscape overview: many ways to solve the same job'
        blocks:
          - type: paragraph
            body: >-
              Buyers can solve the “help me speak a language fluently” job through at least four classes of products:
              broad freemium language platforms, specialized AI-speaking apps, live human-tutor networks, and structured
              course or community-led apps. Speak belongs in the specialized speaking-first cluster, but it competes
              against all four classes because consumers and employers do not buy product categories—they buy outcomes.
              That matters: even if Speak’s product is distinctive, it still loses share whenever a buyer decides that
              Duolingo is good enough, Cambly is more trusted, or Babbel / Busuu are more structured.


              The public scale hierarchy is clear. Duolingo is the category incumbent with 100M+ MAUs and platform-level
              bundle power. Babbel and Busuu have much larger installed bases than Speak and compete on structured
              pedagogy rather than AI novelty. Cambly owns the live-tutor substitute lane. ELSA, Praktika, and Loora
              prove that AI-speaking competition is now crowded, not greenfield. In this landscape, Speak’s pitch is not
              “we are the only one,” but rather “we are the most compelling combination of speaking-first UX, AI
              tutoring, and emerging enterprise distribution.”


              That is a real position, but not yet a dominant one.
