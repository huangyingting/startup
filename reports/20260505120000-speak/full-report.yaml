      - number: '7.4'
        title: Mitigations, monitoring indicators, and thesis-break triggers
        blocks:
          - type: paragraph
            body: >-
              The good news for Speak is that the product already shows evidence of real user love, large-scale
              adoption, and a willingness to publish some customer-support and technical detail. That lowers the chance
              that the main risks are purely hidden disasters. The more realistic underwriting question is whether those
              mitigations mature as quickly as the company’s ambition. Strong ratings and positive speaking-feedback
              reviews help, encryption and deletion controls help, and documented cancellation / refund flows help. But
              none of those substitute for full privacy-policy visibility, enterprise reliability commitments, or hard
              unit-economics evidence. The most important monitors are practical: store-review clusters around
              recognition or billing, chargeback and refund rates, any inability to show clear retention and data-use
              controls for voice data, and any OpenAI or cloud cost shift that forces a weaker product or margin reset.
              For an investor, the thesis does not break on one bad review week. It breaks if recurring operational
              complaints, compliance gaps, or missing economics start to overwhelm a product that is currently winning
              because it feels better than the alternatives.
