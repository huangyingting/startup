  - number: 8
    title: Valuation
    sections:
      - number: '8.1'
        title: Recommendation and price discipline
        blocks:
          - type: paragraph
            body: >-
              Speak has enough public operating proof to justify serious diligence, but not enough price support to
              justify a clean buy at the last public $1B mark. Official disclosures show valuation moved from $500M in
              June 2024 to $1B in December 2024, while later reporting points to more than $100M of annualized revenue,
              15M downloads, 10M+ Google Play installs, and a real enterprise footprint. That is materially stronger
              evidence than most consumer-edtech startups can show. The problem is that the available price anchor still
              implies a high-single-digit to roughly 10x revenue multiple, which remains richer than current public
              education and subscription-learning comps. Duolingo is the only public peer with comparable growth and
              product quality, yet even it screens near 4x EV/revenue on current market data. Because the published
              valuation is older than the latest revenue milestone and the cap table, preference stack, and retention
              profile remain undisclosed, the prudent call is research-more with medium confidence, high risk, and a
              stretched valuation stance. Entry only becomes attractive if updated diligence shows stronger recurring
              economics than public evidence currently proves, or if entry price is materially below the last public
              mark.
            claimRefs:
              - CV001
              - CV006
              - CV012
