      - number: '3.2'
        title: Competitor profiles and business-model differences
        blocks:
          - type: paragraph
            body: >-
              Duolingo is the incumbent benchmark because it combines huge free-user scale, a top-grossing app-store
              position, and broad language breadth. It is not the closest product analog to Speak’s speaking-first
              tutoring, but it is the most powerful default substitute when buyers want “an app to learn a language.”
              ELSA is the more relevant direct benchmark: it is also AI-led, English-focused, and centered on speaking
              and pronunciation. Its 18M+ download claim and 109K App Store ratings put it much closer to Speak’s scale
              band than Duolingo’s.


              Cambly competes from a different labor model. It offers real native-speaker tutors around the clock, which
              makes it more expensive operationally but also more credible for learners who trust humans over AI. Busuu
              and Babbel are different again: they sell structure, community reinforcement, and curriculum depth. They
              are less conversation-first than Speak but more clearly pedagogical. Praktika and Loora show how fast the
              AI-speaking niche itself is filling in, with lower-price or more English-specific tutor framing.


              The important pattern is not that any one rival dominates every dimension. It is that Speak faces a
              portfolio of substitutes, each strong in one area: scale, tutor trust, structure, community, or cheap AI
              tutoring.
            claimRefs:
              - CP005
              - CP008
              - CP011
              - CP012
              - CP014
              - CP016
              - CP017
              - CP032
              - CP033
          - type: figure
            figureRef: FP002
            claimRefs:
              - CP011
              - CP032
      - number: '3.3'
        title: Capability, pricing, and distribution comparison
        blocks:
          - type: paragraph
            body: >-
              Public pricing data is incomplete, but the directional picture is enough to matter. Speak’s publicly
              reported consumer price is roughly $20/month or $99/year. Praktika markets an AI-tutor alternative at
              around $8/month. ELSA offers monthly and yearly memberships. Duolingo uses freemium scale and only
              converts about 9% of MAUs into subscribers, which gives it broad reach and pricing flexibility. That mix
              implies pricing pressure from both ends: low-cost AI tutoring below Speak and gigantic freemium funnel
              economics above it.


              On capability, Speak is strongest when the buyer values a smooth speaking-first experience and low social
              friction. On explicit correction, however, ELSA’s pronunciation-first positioning and Speak’s own adverse
              reviews suggest ELSA may be stronger. On curriculum depth and review systems, Babbel and Busuu look
              stronger. On live accountability, Cambly is stronger. On pure distribution, Duolingo is clearly stronger.


              Speak’s one clearly differentiating commercial angle is Speak for Business. Most public rivals here are
              still primarily consumer products. But because public materials do not disclose customer names, seat
              counts, or renewals, the competitive importance of that channel is still more promising than proven.
            claimRefs:
              - CP003
              - CP004
              - CP006
              - CP007
              - CP010
              - CP030
              - CP034
              - CP035
