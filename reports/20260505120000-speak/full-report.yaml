  - number: 4
    title: Financials
    sections:
      - number: '4.1'
        title: 'Revenue model: hybrid on the surface, opaque underneath'
        blocks:
          - type: paragraph
            body: >-
              Speak’s public financial story is straightforward at a high level and thin underneath. Public evidence
              supports two monetization rails: consumer subscriptions sold through mobile app stores and enterprise
              contracts sold through Speak for Business. TechCrunch consistently reports a consumer price point of
              roughly $20 per month or $99 per year, and the App Store corroborates recurring monthly and annual
              subscriptions. Meanwhile the business site and Series C materials show that Speak has built an
              employer-facing offer and claims 200+ brands or customers.


              That is enough to conclude Speak is not just a consumer app. But it is not enough to quantify revenue mix,
              realized pricing, or revenue quality. No reviewed public source discloses ARR, payer count, conversion
              rate, refund rate, churn, or the share of revenue coming from business accounts. The result is a common
              diligence trap: visible monetization architecture without visible economics.


              The category context matters. Language learning buyers can spend nothing on a free or exchange-based
              product, buy a mid-priced subscription like Speak, pay per lesson for human tutoring, or choose other AI
              tutors. That means Speak’s public price point sits inside a crowded pricing corridor, not above it.
