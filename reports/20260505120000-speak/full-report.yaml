  - number: 7
    title: Risks
    sections:
      - number: '7.1'
        title: Legal, regulatory, and consumer-protection risk
        blocks:
          - type: paragraph
            body: >-
              Speak is not facing an obvious public enforcement event today, but its legal surface is more complicated
              than a generic language app because the product is voice-first, AI-mediated, global, and
              subscription-driven. Google Play says the app may share app activity and device identifiers with third
              parties and may collect personal and financial information, while also offering encryption in transit and
              deletion requests. Apple rates the app 13+, but Google rates it Everyone, which creates an ambiguous
              minor-facing posture for a service that invites users to speak naturally into an AI tutor. That matters
              because FTC guidance says COPPA obligations attach if a service is directed to children under 13 or has
              actual knowledge of collection, and because AI Act and GDPR obligations can intensify when AI systems
              become more consequential or less transparent. On top of privacy, billing rights are fragmented: Apple
              controls App Store refunds, Google imposes strict transparency and cancellation rules, and Speak’s own
              help center draws fine distinctions between cancellation and refunds. The residual legal risk is therefore
              manageable but real: one part regulation, one part consumer-trust plumbing.
            claimRefs:
