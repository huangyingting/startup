      - number: '2.2'
        title: 'Sizing lenses: broad demand is real, but the lenses are not interchangeable'
        blocks:
          - type: paragraph
            body: >-
              The strongest public evidence supports a large and growing digital English-learning market, but not a
              single clean number. Technavio estimates the digital English language learning market will grow by $39.46B
              between 2024 and 2029 at a 24.5% CAGR, with APAC contributing 39% of growth. Preply, using a different
              methodology and broader online-learning lens, estimates the global online language-learning market reaches
              about $115B in 2025, with English alone worth roughly $43.51B and growing around 22% annually. Speak’s own
              June 2024 post uses the broadest lens of all, describing a $100B+ online-and-offline market.


              These figures should not be averaged together. Technavio is reporting forecast growth for a specific
              digital-English segment; Preply is reporting a broader platform-led online market; Speak is using a
              company-authored framing that includes offline spend. The right interpretation is directional rather than
              exact: all credible sources point to a very large and still-growing market, but public data does not
              isolate a clean, source-verified SAM or SOM for Speak.


              The more actionable sizing conclusion is qualitative: English remains the single largest language-learning
              category, APAC remains the most important growth geography, and speaking-first digital products are riding
              both the long-term demand for English and the short-term adoption of AI-assisted learning.
            claimRefs:
              - CM001
              - CM003
              - CM004
              - CM006
              - CM007
              - CM010
              - CM021
              - CM022
