            title: ELSA is the cleaner direct benchmark than Duolingo
            body: >-
              Duolingo is the biggest substitute, but ELSA is closer to Speak’s actual job-to-be-done: AI-led speaking
              and pronunciation practice for English learners. That makes ELSA the better benchmark for product
              strength, while Duolingo remains the benchmark for distribution power.
            calloutType: insight
            claimRefs:
