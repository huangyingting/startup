        title: Exhibits
        blocks:
          - type: callout
            title: The market is large enough; the real question is capture
            body: >-
              All credible sources point to a large and growing English-learning market, but none isolate a clean public
              SAM for Speak. The diligence burden therefore shifts from proving macro demand to proving conversion,
              retention, and budget ownership within a narrower spoken-fluency wedge.
            calloutType: insight
            claimRefs:
