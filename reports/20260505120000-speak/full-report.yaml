      - number: '7.3'
        title: Financial-model and execution risk
        blocks:
          - type: paragraph
            body: >-
              Speak’s financial risk is less about visible distress than about opaque economics behind an
              expensive-to-run product. Public sources show impressive momentum: over 10 million users by mid-2024, more
              than 40 countries, a Series C at a $1 billion valuation by late 2024, and continued investor support from
              OpenAI, Khosla, Accel, and Y Combinator. But the same public record says Speak sometimes builds
              experiences that are cost-prohibitive today in anticipation of cheaper models later, and independent
              reporting notes that custom LLM ambitions can be expensive. That means gross margin, inference cost per
              active learner, refund leakage, and support intensity matter a great deal. Those figures are not public.
              NicheMetric offers directional app-revenue and download estimates, but not with enough transparency to
              close underwriting questions. Execution risk compounds this uncertainty: the company scaled from South
              Korea into more than 20 and then 40-plus countries while still expanding languages, hiring, and product
              scope. Positive reviews suggest the bet is working, yet requests for more languages and better support
              imply the operating system around the tutor may still be catching up to demand.
            claimRefs:
              - CR002
              - CR029
              - CR030
              - CR031
              - CR032
