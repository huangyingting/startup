      - number: '4.3'
        title: Cost structure, unit economics, and capital adequacy
        blocks:
          - type: paragraph
            body: >-
              From public evidence, Speak appears capital-light in the manufacturing sense but not necessarily cheap to
              operate. There is no visible inventory, hardware, or project-finance burden. The company looks like a
              software and content business. However, AI tutoring introduces cost layers that a static course app does
              not fully bear: inference, speech processing, feedback generation, localization, support, and continued
              content expansion.


              Those cost drivers likely matter more than capex. App stores also introduce platform dependency into both
              distribution and collection. On the business side, any meaningful enterprise motion likely adds sales,
              onboarding, and customer-success costs. None of that is inherently problematic—but none of it is directly
              quantified in public sources either. CAC, payback, gross margin, and retention remain private.


              Capital adequacy is therefore a scenario question. The company has clearly raised meaningful recent
              capital and has not surfaced public distress signals. But because current cash and burn remain
              undisclosed, the public record cannot distinguish between “comfortably funded” and “funded but still
              dependent on another round once hiring or enterprise expansion accelerates.”
