      - number: '5.2'
        title: Architecture and operating model
        blocks:
          - type: paragraph
            body: >-
              Speak now discloses more technical detail than many consumer education apps. The 2024 ASR overhaul moved
              the company away from fragmented on-device and third-party speech systems toward a unified backend stack.
              Speak says that stack fine-tunes Conformer-CTC on learner speech, serves inference with Nvidia Riva /
              Triton on Kubernetes and Google Cloud, and uses gRPC plus websocket streaming to return speech feedback
              quickly enough for lesson interactions. In 2025, Speak added Matching v2, which combines streaming ASR
              with a phonetic model and forced alignment; this matters because learner speech often breaks the
              assumptions built into generic ASR. By early 2026, Speak layered a broader voice-agent platform on top:
              mobile apps connect over WebRTC via LiveKit Cloud; voice-agent servers orchestrate external ASR, LLM, TTS,
              and speech-to-speech providers; and the system chooses cascade or speech-to-speech by feature rather than
              forcing one universal stack. That architecture implies real technical depth, but also real operating
              complexity. Speak is explicitly multi-provider, region-aware, and latency-obsessed, with public discussion
              of failover, tail-latency monitoring, semantic turn detection, and provider switching when quality or
              availability degrades.
