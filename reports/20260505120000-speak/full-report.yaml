      - number: '8.3'
        title: Upgrade triggers, thesis breaks, and final asks
        blocks:
          - type: paragraph
            body: >-
              The path from research-more to buy is straightforward but evidence-heavy. Speak needs to show that
              enterprise traction is not just logo count but recurring, expanding revenue with solid renewal quality. It
              also needs to prove that consumer scale is translating into retention and cohort economics strong enough
              to defend a premium multiple above public edtech. The main thesis-breaks are observable: app-store
              momentum rolling over, consumer paywall friction worsening, enterprise adoption failing to translate into
              disclosed ARR support, or the broader AI-software multiple resetting lower again. Regulatory and
              market-structure risk also matter because generative-AI platforms can become concentrated around key
              model, data, or compute owners, limiting downstream moats for application-layer companies. A financing
              window can also close quickly if markets stop rewarding AI narratives before Speak has disclosed enough
              economics to separate itself from weaker subscription-learning assets. Put differently, Speak looks like a
              credible business, but the underwriting gap is around return architecture rather than product existence.
              Without the cap table, unit economics, and segment mix, the investor is still pricing a narrative premium.
              With them, the company could merit track or better; without them, the correct posture is disciplined
              diligence rather than conviction pricing. The upgrade path is therefore concrete today: prove
              segment-level retention, show enterprise renewal quality, and demonstrate that premium pricing survives
              competitive pressure.
