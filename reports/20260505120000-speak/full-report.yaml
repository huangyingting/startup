chapters:
  - number: 1
    title: Company Overview
    sections:
      - number: '1.1'
        title: Identity, product scope, and business model
        blocks:
          - type: paragraph
            body: >-
              Speak is the consumer-facing brand of Speakeasy Labs, a San Francisco-headquartered startup focused on
              spoken-language fluency rather than textbook-style memorization. Across its homepage, app-store listings,
              and late-2024 fundraising materials, the company consistently describes itself as an AI language tutor
              that pushes learners to speak out loud, receive instant feedback, and build conversational confidence.
              That positioning matters because it is narrower than general language-learning incumbents: Speak competes
              first on speaking efficacy, not on broad gamified content breadth.


              By May 2026, Speak’s public consumer surfaces show a broader product than the English-only wedge that
              powered its early growth. The homepage and Apple listing advertise six live learning tracks (French,
              Spanish, English, Korean, Italian, and Japanese), while the June 2025 product post states that Spanish
              launched first for English speakers and four more languages followed shortly after. This evolution
              supports a hybrid model: consumer subscriptions remain the core monetization engine, but the same
              voice-first tutoring stack now also supports a business offering for employers. TechCrunch’s December 2024
              reporting gives the clearest public list-price anchor for the consumer product at $20 per month or $99 per
              year.


              The public disclosure profile is still that of a private growth startup. Speak says enough to establish
              category, product strategy, and top-line traction, but not enough to validate unit economics, current ARR,
              or the exact customer mix between consumer and enterprise.
            claimRefs:
              - CO001
              - CO002
              - CO003
              - CO004
              - CO037
      - number: '1.2'
        title: Founders, leadership, and organizational footprint
        blocks:
          - type: paragraph
            body: >-
              The public leadership picture is founder-led and still highly concentrated. Late-2024 fundraising coverage
              consistently names Connor Zwick as CEO and Andrew Hsu as CTO/co-founder, with Zwick serving as the primary
              external spokesperson in both official company posts and independent press. That concentration is positive
              for speed and product coherence, but it also creates clear key-person dependence because the company’s
              narrative, investor messaging, and product vision all run heavily through Zwick.


              Speak’s operating footprint is global for a company of its size. TechCrunch reported a 75-person workforce
              across San Francisco, Seoul, Tokyo, and Ljubljana in June 2024, while the current careers page still
              highlights Seoul, Ljubljana, and San Francisco and presents the company as internationally distributed.
              The careers page is useful but internally stale: it also includes an older historical snapshot referring
              to a 60-person team and more than $60 million raised, showing that the page was not fully updated after
              the late-2024 financing jump. That inconsistency is a small but real diligence signal: even
              company-controlled surfaces should be treated as time-stamped claims, not timeless facts.


              Governance disclosure is limited. The best publicly supported board datapoint is that Accel partner Ben
              Quazzo joined the board at Series C. Beyond that, public materials identify related persons in the Form D
              filing but do not disclose a full current board roster, observer rights, or control provisions.
