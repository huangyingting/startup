      - number: '2.3'
        title: 买方、用户与付款方分层
        blocks:
          - type: paragraph
            body: >-
              Speak 的买方地图分成两条实质不同的动线。在 C 端动线中，用户和付款方通常是同一人：学习者为自助口语练习支付经常性订阅。TechCrunch 报道的每月 $20 或每年 $99
              标价符合这种自助模式。但在企业动线中，学习者是用户，雇主才是付款方，通常把英语培训作为生产力、招聘、流动性或留存福利来采购。Speak 的 Series C 文章明确称，商业产品不限定行业，并已宣称 200+
              家客户。


              公开市场研究与这种分割相一致。Technavio 称，企业非学术学习者是数字英语学习的重要细分，反映出英语在国际商务沟通中的作用。Preply 的 2026
              报告同样称，受商业和教育需求驱动，英语仍是默认第二语言。这些来源合在一起说明，C 端需求由情绪和志向驱动，企业需求由预算和生产力驱动。


              不同细分的采用路径也不同。消费者可以立即试用并订阅。雇主需要 HR、L&D 或部门预算批准，也需要采纳、席位使用率和技能提升的证据。因此，企业端单账户经济潜力更大，但也更慢，并且比 C 端订阅更依赖续约证据。
