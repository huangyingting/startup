      - number: '4.2'
        title: 公开牵引力与定价参考：有用信号，弱核准依据
        blocks:
          - type: paragraph
            body: >-
              公开牵引力是真实的。Speak 宣传 1,500 万次以上下载量，App Store 显示庞大的评分基数，Google Play 显示六位数的评论量。TechCrunch 还报道日均使用时长为 10 至 20
              分钟。这些都是有意义的信号，表明产品 分发广泛、活跃使用持续。


              但公开牵引力与收入不是一回事。下载量无法告知活跃用户数、转化率或留存时长。评论数无法反映退款率或 净计费额。日均使用时长也无法区分免费试用用户、付费订阅者和企业赞助席位的贡献比例。同样的谨慎适用于
              竞品定价页面：竞品标价有助于三角测算品类支付意愿，但不能反映实际平均销售价格（ASP）或贡献利润率。


              不过，定价走廊仍有信息量。相比低价 AI 辅导，Speak 定位中端；明显低于反复真人辅导所需的支出；高于 免费或免费增值替代品。这支撑了变现合理性，同时也凸显了定价权的局限。
