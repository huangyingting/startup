      - number: '1.2'
        title: 创始人、管理团队与组织布局
        blocks:
          - type: paragraph
            body: >-
              公开的领导层画像是创始人主导、高度集中。2024 年底的融资报道一致点名 Connor Zwick 担任 CEO，Andrew Hsu 担任联合创始人兼 CTO；在官方公告和独立媒体报道中，Zwick
              均是首要对外发言人。高度集中对决策速度和产品一致 性有利，但也形成明显的关键人依赖——公司的叙事、投资者沟通和产品愿景高度绑定于 Zwick 一人。


              Speak 的运营版图对其规模而言相当国际化。TechCrunch 2024 年 6 月报道称公司拥有 75 名员工，分布在旧金山、
              首尔、东京和卢布尔雅那；现有招聘页面仍标注首尔、卢布尔雅那和旧金山，将公司定性为国际分布式组织。不过招聘 页面内部存在信息滞后：其中还附有一段较旧的描述，提及 60 人团队和累计融资逾 6,000 万美元，说明
              2024 年底 融资完成后页面并未全面更新。这是一个小但真实的尽调信号——即便是公司自控的公开界面，也应视为带时间戳的声明， 而非永久事实。


              治理信息披露有限。公开信息中最可靠的董事会数据点是 Accel 合伙人 Ben Quazzo 在 C 轮后加入董事会。除此之外， 公开材料虽在 Form D
              文件中列出关联人员，但并未披露完整的现任董事会名单、观察员权利或控制权条款。
