      - number: '4.3'
        title: 成本结构、单位经济模型与资本充足性
        blocks:
          - type: paragraph
            body: >-
              从公开证据看，Speak 在生产端接近轻资产，但运营层面未必廉价。没有可见的存货、硬件或项目融资负担，公司 更像一个软件与内容业务。然而，AI 辅导引入了静态课程应用所不必完全承担的成本层：推理、语音处理、
              反馈生成、本地化、客户支持和持续内容扩充。


              这些成本驱动因素可能比资本支出更重要。应用商店还在分发和收款两端引入了平台依赖。企业端方面，任何 有实质意义的企业运营都会叠加销售、入职和客户成功成本。这些并非天然的问题所在，但在公开来源中均未
              被直接量化。获客成本（CAC）、回本周期、毛利率和留存情况均属私有信息。


              资本充足性因此是情景假设问题。公司显然近期已完成有意义的融资，且未出现公开的财务困境信号。但由于 当前现金储备和烧钱速度未披露，公开记录无法区分"资金充裕"和"已融资但仍依赖下一轮才能支撑招聘或
              企业端扩张提速"。
