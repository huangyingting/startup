        title: 护城河持久性、切换成本与主要威胁
        blocks:
          - type: paragraph
            body: >-
              Speak 公开可见的护城河属于中等水准。公司拥有真实的产品身份——口语优先 AI 辅导——以及企业客户这一 潜在价值可观的第二渠道，这是正面因素。但护城河的持久性并不显著，因为每一项优势都面临可攻击的弱点：
              Duolingo 可以砸钱拉开分发差距；Cambly 可以凭人类可信度胜出；ELSA 可以在明确发音辅导上取胜；Busuu 和 Babbel 可以靠体系与留存循环拿分；Praktika 和 Loora
              可以用更低价或更聚焦的定位压缩 AI 口语细分 赛道。


              切换成本在公开证据中也看似有限。消费者能以低成本测试多款应用，且很可能确实如此。企业部署后可能面临 更高摩擦，但目前没有公开证据表明 Speak 拥有排他合同或深度工作流锁定。公开评测强化了这一风险：若
              进阶用户感觉反馈浅薄或过于宽容，替代品唾手可得。


              主要的近期威胁因此不是技术层面的颠覆性飞跃，而是慢慢积累的商业压力：定价挤压、分发捆绑和品类同质化。 Speak 仍有胜出的可能，但需要的是结果证明和企业端数据，而非更多营销新意。
