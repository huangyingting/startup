      - number: '2.3'
        title: 买家、用户与付费方细分
        blocks:
          - type: paragraph
            body: >-
              Speak 的买家图谱分为两条截然不同的销售路径。消费端路径中，用户即付费方——学习者按月支付订阅费进行 自主驱动的口语练习，TechCrunch 报道的月付 $20 或年付 $99
              定价正契合这一自助模式。而在企业端路径中， 学员是用户，雇主是付费方，通常将英语培训作为提升效率、招聘吸引力、员工流动性或留用率的福利购买。 Speak 的 C 轮公告明确指出企业产品不限行业，且已声称拥有
              200 家以上客户。


              公开市场研究与这一拆分相吻合。Technavio 指出企业非学术学员是数字英语学习的主要细分群体，体现了英语 在国际商务沟通中的核心地位。Preply 的 2026
              年报告同样指出，英语因商业和教育需求而成为默认的第二语言。 综合来看，消费端需求由情感和向往驱动，企业端需求由预算和生产力驱动。


              两个细分市场的采购路径也不同。消费者可立即试用并订阅；企业则需要 HR、L&D 或部门负责人的预算审批， 并要求提供使用率、席位利用率和技能提升的证明。这使得企业端单客户经济价值可能更高，但销售周期更长，
              续约依赖比消费端订阅更重。
