  - id: TR005
    title: 缓释与终止标准表
    columns:
      - 风险
      - 可监控触发项
      - 阈值 / 事件
      - 行动含义
    rows:
      - - 订阅信任 / 计费摩擦
        - 退款请求、拒付和计费相关评价激增
        - 定价或试用流程调整后，连续数周显著跳升
        - 暂停激进获客，在扩大投放前重做商店 / onboarding 披露。
      - - 识别质量
        - 多个评价集中提到漏词、延迟或发言窗口太赶
        - 问题在不止一种主要语言或平台版本中持续出现
        - 在准确率和节奏恢复前，暂停语言扩张。
      - - 语音数据 / 儿童数据合规
        - 无法向尽调方或监管方提供留存、删除或年龄筛查控制
        - 缺少 DPIA / 留存材料包，或收到监管方 / 平台通知
        - 在合规文件补齐前，下调承销判断。
      - - OpenAI / 模型依赖
        - API 价格大幅上调、延迟退化或政策约束
        - 利润率持续受冲击，或实时角色扮演体验变差
        - 重设估值假设，并要求 fallback / 路由证明。
      - - 云 / 推理集中度
        - 反复出现 Sev-1 推理或语音服务中断
        - 超过一次重大中断，且没有可信的故障切换证据
        - 在按溢价增长承销前，要求多区域或多供应商韧性方案。
      - - 融资 / 估值支撑
        - 新一轮或二级交易在缺少指标证明下暗示平轮 / 下调定价
        - 无法证明持久留存、利润率和退款纪律
        - 将当前估值视为脆弱，避免在经济性验证前提前买单。
    notes: 这些触发项把宽泛的尽调叙事转成投资人可执行监控框架。
