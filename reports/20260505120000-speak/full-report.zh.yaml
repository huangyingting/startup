        - B2B 采用可能仍主要由韩国消费端需求孵化
        - 如果韩国仍是主要验证场，全球企业端可复制性可能被高估
        - 要求按国家提供企业端年经常性收入（ARR）、席位和续约
      - - 口语优先差异化和强评分
        - 公开评分看不出付费同期群是否以有吸引力的比例续约
        - 采用质量可能比收入耐久性更好看
        - 要求提供年度计划续约曲线和退款率
      - - 更多国家和更多语言
        - 语言目录投诉表明部分用户想要尚不支持的语言或更好的本地化
        - 可能压低相邻学习者客群的总可用市场（TAM），并提高初次试用后的流失风险
        - 要求提供语言路线图、候补名单规模，以及按新语言拆分的留存
      - - 雇主赞助采用率指标
        - 85% 员工采用率有吸引力，但缺少席位数和合同价值背景
        - 可能反映的是规模较小但参与度高的子集，而不是成规模的企业扩张
        - 要求提供 logo 级席位激活和 ACV 分布
      - - 自助订阅定价
        - 自动续订订阅和退款投诉会带来支持负担和非自愿流失
        - 消费端流失和品牌情绪可能比评分显示的更波动
