figures:
  - id: FO001
    title: 战略拐点时间线
    type: timeline
    layout: standard
    summary: 2016 年至 2026 年 2 月，Speak 身份定位、资本形成、产品扩张和外部认可的公开年表。
    data:
      items:
        - date: '2016'
          label: 成立
          detail: Speak / Speakeasy Labs 的公开年表从 2016 年开始。
          tone: positive
        - date: '2019'
          label: 韩国上线
          detail: 英语产品率先在韩国上线，形成公司初始楔入市场。
          tone: positive
        - date: 2024-06
          label: B-3 轮
          detail: 以 5 亿美元估值融资 2000 万美元；累计融资达 8400 万美元。
          tone: positive
        - date: 2024-08
          label: 临时 Form D
          detail: 一份日期为 2024 年 8 月 12 日的额外 Form D 出现在公开文件列表中。
          tone: neutral
        - date: 2024-12
          label: C 轮 / 独角兽
          detail: 以 10 亿美元估值融资 7800 万美元；Accel 领投；HolonIQ 随后将 Speak 列为 2024 年 12 月的教育科技独角兽。
          tone: positive
        - date: 2024-12
          label: 董事会扩充
          detail: Accel 合伙人 Ben Quazzo 在 C 轮融资期间加入 Speak 董事会。
          tone: positive
