chapters:
  - number: 1
    title: 公司概述
    sections:
      - number: '1.1'
        title: 身份、产品范围与商业模式
        blocks:
          - type: paragraph
            body: >-
              Speak 是 Speakeasy Labs 面向消费者的品牌；这家总部位于 San Francisco 的创业公司聚焦口语流利度，而不是教材式背记。公司在官网、应用商店页面和 late-2024
              融资材料中，始终把自己描述为 AI 语言导师：推动学习者开口说、即时获得反馈，并建立对话信心。这个定位重要，因为它比泛语言学习既有厂商更窄：Speak 首先竞争的是口语效果，而不是游戏化内容的广度。


              到 May 2026，Speak 的公开 C 端触点已经不再只是早期增长依赖的英语切口。官网和 Apple 页面宣传 6 条上线学习路径（French、Spanish、English、Korean、Italian
              和 Japanese），June 2025 产品文章则称，面向英语使用者的 Spanish 最先上线，随后很快又推出 4 种语言。这种演进支撑混合模式：C
              端订阅仍是核心变现引擎，同一套语音优先辅导技术栈也开始支撑面向雇主的商业产品。TechCrunch 在 December 2024 的报道给出了最清晰的 C 端公开标价锚点：每月 $20 或每年 $99。


              公开披露画像仍是未上市成长公司的样子。Speak 说出的信息足以确认品类、产品策略和总体牵引力，但不足以验证单位经济、当前年经常性收入（ARR），或 C 端与企业端客户组合的精确比例。
            claimRefs:
