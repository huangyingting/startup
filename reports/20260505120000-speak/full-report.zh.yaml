      - number: '8.2'
        title: 情景区间与可比公司框架
        blocks:
          - type: paragraph
            body: >-
              公开市场锚点表明 Speak 值一个高于困境教育科技标的的溢价，但溢价必须靠异常持久的增长和变现来挣到。Duolingo 增速健康、利润为正、市值数十亿， EV/收入约 4 倍；Coursera、Udemy 和
              Chegg 远低于 1 倍 EV/收入。这个落差很重要——Speak 仍是私有公司，投资人进入时的披露程度不如上述任何 一家。上行情景仍有意义：AI 辅导和在线语言学习都是体量大、仍在增长的市场，Speak
              的应用排名、定价和企业牵引力表明它在打造一个比普通词汇游戏 更严肃的学习产品。不过，MMR 的市场研究标记了免费增值竞争和获客成本（CAC）压力，Oliver Wyman
              也展示了当市场质疑座位增长、护城河持久性或 收入质量时，AI 软件倍数能多快重新定价。这就是情景框架采用保守公开可比区间而非外推开放式 AI 溢价的原因。悲观情景压缩至 4 亿到 6.5 亿美元， 基准情景维持在
              8 亿到 10 亿美元，乐观情景要求收入远超 1.5 亿美元、企业转化更广且应用商店势头延续。
