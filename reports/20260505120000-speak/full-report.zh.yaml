  - id: FR001
    title: 风险热力图
    type: matrix
    layout: wide
    summary: Speak 最高的剩余风险集中在 AI / 语音监管、应用商店计费、模型 / 云依赖与高端消费者体验交叠处。
    data:
      columns:
        - 发生概率
        - 影响
        - 缓解成熟度
        - 剩余严重性
      rows:
        - label: 语音 / 隐私合规
          values:
            - label: 中
              tone: warning
              detail: 面向未成年人的边界不清和语音数据处理带来真实但尚未急性的法律风险。
            - label: 高
              tone: negative
              detail: 一旦隐私或儿童数据出现负面认定，信任、商店分发和增长都会受冲击。
            - label: 中
              tone: neutral
              detail: 加密、删除请求和现有披露有帮助，但政策文本无法完整审阅。
            - label: 中高
              tone: warning
              detail: 在数据留存和年龄门槛完全核验前，剩余敞口仍偏高。
        - label: 计费 / 退款信任
          values:
            - label: 中高
              tone: negative
              detail: 帮助中心和投诉记录显示，计费是重要支持触点。
            - label: 高
              tone: negative
              detail: 意外收费或退款摩擦会快速损害付费消费者产品。
            - label: 中
              tone: warning
              detail: 取消和退款流程存在，但责任分散在多条通道上。
            - label: 中高
              tone: warning
              detail: 在拒付和响应时长指标披露前，剩余风险仍在。
        - label: OpenAI / 模型依赖
          values:
            - label: 高
              tone: negative
              detail: 核心辅导体验明显依赖 GPT-4、GPT-4o 和 Realtime API 路径。
            - label: 高
              tone: negative
              detail: 供应商成本或政策变化会同时冲击质量和利润率。
            - label: 中低
              tone: warning
              detail: Speak 有自己的学习引擎和定制 ASR，但公开备用方案细节很薄。
            - label: 高
              tone: negative
              detail: 高端实时对话功能的剩余集中度仍高。
        - label: ASR / 实时产品质量
          values:
            - label: 中高
              tone: warning
              detail: 识别错误和设备端性能问题仍在评论中出现。
            - label: 高
              tone: negative
              detail: 质量失误会直接削弱产品存在的核心理由。
            - label: 中
              tone: neutral
              detail: 定制 ASR 投入和高评分显示缓解已有实质进展。
            - label: 中高
              tone: warning
              detail: 用户为即时性和准确性付费，因此剩余敞口虽已降低但未关闭。
        - label: 扩张 / 支持扩容
          values:
            - label: 中
              tone: warning
              detail: 国家和语言扩张继续推进，支持与本地化需求同步上升。
            - label: 中高
              tone: warning
              detail: 执行失误在威胁偿付能力前，会先伤害留存和融资支持。
            - label: 中
              tone: neutral
              detail: 近期资本和活跃招聘提供了一定缓冲。
            - label: 中
              tone: warning
              detail: 剩余风险主要来自支持负载和企业端成熟度未知。
    approximationNotes: null
    claimRefs:
