  - number: 4
    title: 财务情况
    sections:
      - number: '4.1'
        title: 收入模式：表面混合，内部不透明
        blocks:
          - type: paragraph
            body: >-
              Speak 的公开财务状况在高层面清晰，底层却薄弱。公开证据支持两条变现路径：通过移动应用商店销售的消费端 订阅，和通过 Speak for Business 销售的企业端合同。TechCrunch
              持续报道消费端定价约为月付 $20 或年付 $99， App Store 印证了月付和年付订阅的存在。与此同时，企业网站和 C 轮材料表明 Speak 已构建面向雇主的产品， 并声称拥有 200
              家以上品牌或客户。


              这足以判断 Speak 不只是一款消费端应用。但不足以量化收入结构、实际定价或收入质量。没有任何经审阅的 公开来源披露 ARR、付费用户数、转化率、退款率、流失率或企业收入占比。结果是一个常见的尽调陷阱：
              变现架构可见，经济模型不可见。


              行业背景也很重要。语言学习买家可以选择免费或语言交换产品，也可以购买 Speak 这样的中价位订阅，或按 课时付费给真人家教，或选择其他 AI 辅导工具。这意味着 Speak
              的公开定价位于一条拥挤的价格走廊之中， 而非凌驾其上。
