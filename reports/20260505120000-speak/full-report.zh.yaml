      - number: '1.4'
        title: 牵引力信号、企业端扩张与风险标志
        blocks:
          - type: paragraph
            body: >-
              Speak 的公开牵引力数据足以支撑"规模化私营公司"的判断，但不足以核准运营表现。消费端方面，官方渠道声称 1,500 万次以上下载量和 4.8 分评分，应用商店独立验证了大量评分深度（Apple 44,000
              条评分；Google Play 112,000 条评论）。2024 年初的融资材料称 Speak 在 40 多个国家拥有逾 1,000 万学员，当年用户开口说话已超 10
              亿句。这些均为公司自报指标，但与产品可见的分发规模基本吻合。


              最值得关注的非消费端信号是企业产品。Speak for Business 看似在 2024 年 6 月至 12 月两轮融资之间正式起步， C 轮公告声称企业客户已超 200 家、员工使用率达 85%。当前 B2B
              官网同样表示超过 200 个品牌依赖 Speak for Business。这表明订阅之外确实存在真实的第二增长线，尽管公开信息仍未拆分 B2B 收入、合同规模 或留存率。


              风险标志总体与产品质量和信息披露有关，而非法律或财务层面。独立评测普遍称赞产品打磨程度和口语优先设计， 但负面评价也指出发音评分过于宽松、高级套餐包装混乱、退款及自动续费投诉，以及员工数和董事会构成的信息披露
              不完整。这些问题不能否定增长叙事，但也说明下一层尽调工作将偏向运营细节，而非纯粹的宣传审核。
