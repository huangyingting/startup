            body: >-
              从公开证据看，Speak 在制造意义上偏资本轻，但运营未必便宜。看不到库存、硬件或项目融资负担。公司更像软件和内容业务。不过，AI 辅导引入了静态课程 App
              不完全承担的成本层：推理、语音处理、反馈生成、本地化、支持和持续内容扩展。


              这些成本驱动因素可能比资本开支更重要。应用商店也把平台依赖带入分发和收款。企业端方面，任何有意义的企业销售动线都可能增加销售、上线和客户成功成本。这些本身都不是问题，但公开来源也没有直接量化。CAC、回本周期、毛利率和留存仍是私有信息。


              因此，资本充足性是情景题。公司显然近期融到了有意义的资本，也没有浮现公开困境信号。但由于当前现金和烧钱速度仍未披露，公开记录无法区分“资金充裕”和“已有资金但一旦招聘或企业扩张提速仍依赖下一轮融资”。
