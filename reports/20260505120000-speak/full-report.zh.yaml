  - number: 7
    title: 风险
    sections:
      - number: '7.1'
        title: 法律、监管与消费者保护风险
        blocks:
          - type: paragraph
            body: >-
              Speak 目前没有明显的公开执法事件，但它的法律暴露面比普通语言 App 更复杂，因为产品语音优先、由 AI 介入、全球化且依赖订阅。Google Play 称，该 App 可能与第三方共享 App
              活动和设备标识符，也可能收集个人和财务信息，同时提供传输中加密和删除请求。Apple 将该 App 评级为 13+，Google 则评级为 Everyone；对于一个邀请用户向 AI
              导师自然说话的服务，这形成了模糊的未成年人接触姿态。这点重要，因为 FTC 指引称，如果服务面向 13 岁以下儿童，或实际知悉其收集儿童数据，就会触发 COPPA 义务；当 AI
              系统影响更重大或透明度更低时，AI Act 和 GDPR 义务也可能加强。隐私之外，计费权利也分散：Apple 控制 App Store 退款，Google 施加严格透明度和取消规则，Speak
              自己的帮助中心又细分取消与退款。因此，剩余法律风险可管理但真实存在：一半是监管，一半是消费者信任基础设施。
