  - number: 7
    title: 风险
    sections:
      - number: '7.1'
        title: 法律、监管与消费者保护风险
        blocks:
          - type: paragraph
            body: >-
              Speak 当前并无明显的公开执法风险，但其法律面比普通语言应用更为复杂——因为产品是语音优先、AI 中介、 全球覆盖且以订阅为驱动的。Google Play
              显示该应用可能与第三方共享应用活动和设备标识，也可能收集 个人及财务信息，同时提供传输加密和删除请求。Apple 给出 13+ 年龄评级，而 Google 则评为全年龄段， 使这款邀请用户对着 AI
              家教自然说话的服务，对未成年用户呈现出模糊的面向姿态。这一点非常重要： 美国联邦贸易委员会（FTC）的指引指出，若服务面向 13 岁以下儿童或有实际知情的情况，COPPA 义务即行 适用；AI 法案和 GDPR
              义务也可能随着 AI 系统更具实质影响或透明度降低而加重。隐私之外，账单权利 也处于碎片化状态：Apple 控制 App Store 退款，Google 施加严格的透明度和取消规则，Speak 自己的
              帮助中心则对取消订阅和退款作出细致区分。因此，剩余法律风险虽可控但真实存在：一半是监管合规问题， 一半是消费者信任的配套管道问题。
