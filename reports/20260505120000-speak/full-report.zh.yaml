      - number: '2.2'
        title: 市场规模测算：宏观需求真实存在，但各口径不可互换
        blocks:
          - type: paragraph
            body: >-
              最有力的公开证据支持一个庞大且持续增长的数字英语学习市场，但不存在单一的清晰数字。Technavio 估计 2024 至 2029 年数字英语学习市场将增长 394.6 亿美元，年复合增长率
              24.5%，亚太地区贡献 39% 的增量。 Preply 采用不同方法和更宽泛的在线学习口径，估计 2025 年全球在线语言学习市场约达 1,150 亿美元，其中 仅英语市场约为 435.1 亿美元，年增速约
              22%。Speak 自己在 2024 年 6 月使用了最宽泛的口径——描述为 1,000 亿美元以上的线上线下市场。


              这些数据不能取平均。Technavio 报告的是特定数字英语细分市场的预测增量；Preply 报告的是平台驱动的更 宽泛在线市场；Speak
              则使用了包含线下支出的公司自撰框架。正确的解读是方向性而非精确性：所有可信来源 均指向一个巨大且仍在增长的市场，但公开数据无法为 Speak 提取出经过来源验证的清晰可服务市场（SAM）或 可获取市场（SOM）。


              更具操作价值的规模判断是定性的：英语仍是最大的单一语言学习品类，亚太仍是最重要的增长地域，口语优先 的数字产品正在乘着英语长期需求与 AI 辅助学习短期采用的双重东风前行。
