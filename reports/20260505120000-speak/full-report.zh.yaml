    title: 投资论点 / 反向论点表
    columns:
      - 视角
      - 论点
      - 反向论点
      - 什么会改变判断
    rows:
      - - 需求
        - 庞大的 AI 家教和语言学习市场支撑品类继续增长。
        - 大市场挡不住 CAC 上升，也挡不住免费 / freemium 工具竞争。
        - 按地域展示 cohort 级留存和高效获客。
      - - 商业化
        - 商店定价和 >$100M 年化收入表明，消费者愿意为高端口语产品付费。
        - 公开证据没有显示转化是否持久，也没有显示收入是否过度偏向消费者端。
        - 提供转化漏斗、回本周期和续费指标。
      - - 企业
        - 2024 年 12 月 200+ 客户、2025 年末约 500 家雇主，暗示 B2B 扩张可选性。
        - logo 数不等于持久年经常性收入（ARR）、扩张或毛利率证明。
        - 披露企业年经常性收入（ARR）、续费率和头部客户集中度。
      - - 相对估值
        - 如果 Speak 的表现更像品类领导者、而非同质化应用，相对较弱公开教育科技同行的溢价可以解释。
        - 当前可比区间仍意味着 $1B 估值已经计入大量未来执行。
        - 若新一轮融资价格相近且披露更充分，判断会改善。
