  - number: 5
    title: 产品与技术
    sections:
      - number: '5.1'
        title: 产品界面与学习者工作流
        blocks:
          - type: paragraph
            body: >-
              Speak 的公开产品叙事异常连贯：该应用被定位为口语优先的 AI 家教，而非词汇游戏或语法参考工具。无论是 官网首页、应用商店描述还是产品更新帖，同一套工作流反复出现：学习者进入结构化课程，大声朗读目标句，
              立即获得纠正反馈，再将练习内容应用于更自由的 AI 对话中。这套工作流现已被正式化为 Speak Method 的
              "学习→练习→应用"循环。在实际操作中，可见的模块包括家教课程、口语练习/口语卡片、角色扮演、自由 对话、学习进度追踪，以及单元复习和 Speak Level 等较新的复习与水平评估功能。产品界面仍以移动端为主，
              但已不再只是英语学习应用——公开帮助内容显示面向学习者的六种目标语言和 15 个英语教学的母语入口。 核心战略结论是：Speak 在教学法与产品包装之间实现了紧密的工作流契合，每个主要模块最终都服务于同一
              目标——让学习者开口、对比输出、不断重试，而非被动消费内容。
