companyProfile:
  summary: >-
    Speak 是一家未上市 AI 语言学习公司，打造以语音为先的导师，服务消费者和雇主场景下的口语流利度。公司把差异化的口语课程与生成式 AI 和语音技术结合，产品证据强于许多教育
    App。公开证据显示其全球分发和投资人支持可观，但财务、留存和股权结构问题仍太多，无法给出高确信度的价格判断。
