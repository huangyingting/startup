      - number: '1.3'
        title: 融资历史、估值跃升与文件记录时间线
        blocks:
          - type: paragraph
            body: >-
              Speak 的公开融资故事在 2024 年急速提速。2024 年 6 月，公司宣布完成 2,000 万美元 B-3 轮融资，估值 5 亿美元； 六个月后，C 轮融资 7,800 万美元，估值翻倍至 10
              亿美元。C 轮公告称累计融资达 1.62 亿美元，并将本轮定性为 年内第二笔被抢先推进的融资。TechCrunch、Tech Funding News 和 HolonIQ 的独立报道充分印证了估值跃升，
              独角兽里程碑视为有据可查。


              证券备案记录与融资叙事在方向上吻合。2024 年 12 月 11 日提交的 Form D 显示一笔 7,770 万美元的 506(b) 规则股权发行，首次出售日期为 2024 年 11 月 13
              日。备案记录还显示 2024 年 8 月 12 日和 2023 年 10 月 17 日各有一次 Form D 事件，可能对应 B 轮延伸期间的中间融资活动及此前的私募股权发行。这些备案未披露持股
              条款、优先权或全部治理权利，但它们提供了有用的一手文件佐证——真实资金在公司所述的时间线上确实发生了流动。


              此后，HolonIQ 的 EdTech 独角兽名册于 2024 年 12 月将 Speak 列入全球 EdTech 独角兽榜单，估值 10 亿美元。 C
              轮由此不仅是融资里程碑，更是品类地位里程碑，对未来融资、人才招募和企业销售具有真实信号价值。
