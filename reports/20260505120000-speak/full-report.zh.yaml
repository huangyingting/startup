      - number: '8.2'
        title: 情景区间和可比框架
        blocks:
          - type: paragraph
            body: >-
              公开市场锚点说明，Speak 应该比困境中的 edtech 公司享有溢价，但溢价必须靠异常持久的增长和变现来兑现。Duolingo 仍有健康增长、正利润率和数十亿美元市值，但 EV/revenue 约
              4x；Coursera、Udemy 和 Chegg 远低于 1x EV/revenue。这个价差很重要，因为 Speak 仍是私营公司，投资人要投入的是一家披露少于上述任何公司的公司。上行情景仍有意义：AI
              辅导产品和在线语言学习都是庞大且增长中的市场，Speak 的应用排名、定价和企业端进展表明，它做的学习产品比通用词汇游戏更严肃。但 MMR 的市场工作提示免费增值竞争和 CAC 压力，Oliver Wyman
              也显示，当市场质疑席位增长、护城河耐久性或收入质量时，AI 敞口软件倍数可以多快重估。因此，情景框架使用保守的上市可比公司区间，而不是外推无上限的 AI 溢价。悲观情形压缩至
              $400M-$650M，基准情形维持在约 $800M-$1.0B，乐观情形则要求收入远超 $150M，并伴随更广的企业端转化和持续应用商店强势。
