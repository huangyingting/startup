      - number: '1.4'
        title: 牵引力信号、企业扩张与风险旗标
        blocks:
          - type: paragraph
            body: >-
              Speak 的公开牵引力数据足以支持“规模化未上市公司”的判断，但不足以测算经营表现。C 端方面，官方触点宣称 15M+ 下载和 4.8 评分，应用商店也独立确认了较深的评分基础（Apple 44K
              个评分；Google Play 112K 条评论）。Earlier 2024 融资材料称，Speak 在 40+ 个国家拥有超过 10 million 名学习者，用户当年已说出超过 1 billion
              个句子。这些都是公司口径指标，但至少与产品可见的分发覆盖相一致。


              最有意思的非 C 端信号是企业产品。Speak for Business 似乎在 June and December 2024 两轮融资之间正式启动，Series C 公告称已有超过 200 家客户、员工采用率
              85%。当前 B2B 页面同样称 200+ 个品牌依赖 Speak for Business。这暗示订阅之外存在真实第二曲线，尽管公开披露仍没有拆出 B2B 收入、合同规模或留存。


              风险旗标主要来自产品质量和披露，而不是法律或财务。独立评测认可产品打磨和口语优先设计，但负面评论也指向发音评分宽松、premium
              打包令人困惑、退款和自动续费投诉，以及当前员工数和董事会构成披露不完整。这些问题不会推翻增长叙事，但会让下一层尽调落到运营层，而不是只看宣传。
