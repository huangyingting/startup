      - number: '1.3'
        title: 融资历史、估值跃升与记录时间线
        blocks:
          - type: paragraph
            body: >-
              Speak 的公开融资故事在 2024 年急剧加速。公司在 June 2024 宣布以 $500 million 估值完成 $20 million Series B-3，6 个月后又以 $1 billion
              估值完成 $78 million Series C。Series C 公告称总融资达到 $162 million，并把这轮融资称为年内第二次提前锁定的融资。TechCrunch、Tech Funding News
              和 HolonIQ 的独立报道共同佐证了这次估值跃升，足以把独角兽里程碑视为有较强支撑。


              证券备案链与媒体叙事方向一致。December 11, 2024 提交的 Form D 列出 Rule 506(b) 下 $77.7 million 股权发行，首次出售日期为 November 13,
              2024。备案列表还显示 August 12, 2024 和 October 17, 2023 另有 Form D 事件，可能对应 B
              轮延展融资前后的中间融资活动，以及此前的私募发行活动。这些备案没有揭示所有权条款、优先权或全部治理权，但确实提供了有用的一手文件佐证：真实资本按公司描述的时间线流入。


              HolonIQ 的 EdTech 独角兽名册随后记录 Speak 于 December 2024 以 $1 billion 估值进入全球 EdTech 独角兽名单。因此，Series C
              不只是融资里程碑，也成为品类地位里程碑，对未来融资、招聘和企业销售都有真实信号价值。
