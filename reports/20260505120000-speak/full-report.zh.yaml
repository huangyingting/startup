        title: 财务结论：变现架构有希望，收入证据有限
        blocks:
          - type: paragraph
            body: >-
              财务结论是：对架构审慎正面，对透明度审慎偏负面。Speak 明确拥有可变现的 C
              端和企业端触点、近期机构融资，以及应能支撑部分经常性收入的产品参与度。它也处在一个消费者已经为辅导、订阅和备考结果付费的品类中，因此需求是否存在不是问题。


              问题在于，公开记录验证的是结构，而非表现。估值借快速融资势能从 $500M 升至 $1B，但财务披露没有同步跟上。公开证据没有告诉我们业务产生多少收入、扣除应用商店费用和 AI
              交付成本后利润率如何、订阅者有多黏，或企业账户是否实质改善经济性。这让投资测算过多依赖融资标题、用户代理指标和市场热情。


              对尽调而言，下一步不是寻找更多营销页面，而是拿到内部财务包：年经常性收入（ARR）和账单额、付款方数量、分渠道毛利率、退款和流失数据、企业 ACV、销售效率，以及真实的跑道模型。
