      - number: '7.2'
        title: 运营质量与平台依赖风险
        blocks:
          - type: paragraph
            body: >-
              运营上，Speak 押在语音识别质量和对话延迟上；这个产品里，用户会立刻感知每一次识别漏错。Speak 当年自研 ASR，是因为早期第三方语音识别服务处理带口音的学习者语音吃力；现在这套栈跑在 Google
              Cloud 的 Kubernetes 上，用 Nvidia GPU 做推理。这样比纯现成栈做出更强产品，但运营底座也更窄：延迟、吞吐或云厂商问题，都可能直接拉低辅导质量。同样的模式也出现在对 OpenAI
              的依赖上。Speak 公开使用 GPT-4、GPT-4o 和 Realtime
              API；它也承认，语音到语音模型在指令跟随和细腻辅导上仍落后于文本模型。独立评测来源说明，这不只是理论风险。投诉提到识别卡顿、句中漏词、嘈杂环境失效、耗电、设备发热，以及偶发录音或进度保存
              bug。产品热爱度确实强，但用户付费买的是即时、准确、公平的体验，运营门槛很高。
