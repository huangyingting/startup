  - number: 8
    title: 估值
    sections:
      - number: '8.1'
        title: 投资建议与定价纪律
        blocks:
          - type: paragraph
            body: >-
              Speak 的公开运营证据足以支撑认真尽调，但不足以支撑以最近公开的 10 亿美元估值干净买入。官方披露显示估值从 2024 年 6 月的 5 亿美元跳至 2024 年 12 月的 10 亿美元，最新报道指向超
              1 亿美元年化收入、1500 万次下载、1000 万以上 Google Play 安装量以及真实的企业业务。与大多数 消费教育科技初创公司相比，这是明显更强的证据。问题在于可参考的价格锚点依然隐含高个位数到约
              10 倍的收入乘数，远高于当前公开教育和订阅学习 可比公司。Duolingo 是唯一兼具类似增速和产品质量的上市标的，但按当前市场数据其 EV/收入也只在 4 倍左右。公开估值早于最新收入里程碑，股权
              结构表、优先股堆叠和留存结构亦未披露，审慎结论是：继续研究，置信度中，风险高，估值偏高。只有当深入尽调揭示比现有公开证据更强的经常性经济数据， 或入场价格大幅低于最近公开标记，进入才具吸引力。
