      - number: '3.2'
        title: 竞争对手画像与商业模式差异
        blocks:
          - type: paragraph
            body: >-
              Duolingo 是既有龙头基准，因为它同时拥有巨大的免费用户规模、应用商店畅销位置和宽语言覆盖。它不是与 Speak 口语优先辅导最接近的产品类比，但当买方想要“一款学语言的
              App”时，它是最强的默认替代品。ELSA 是更相关的直接基准：它同样由 AI 驱动、聚焦英语，并围绕口语和发音展开。其 18M+ 下载声明和 109K 个 App Store 评分，让它比 Duolingo
              更接近 Speak 的规模带。


              Cambly 以不同的劳动力模型竞争。它提供全天候真人母语导师，运营成本更高，但对更信任真人而非 AI 的学习者也更可信。Busuu 和 Babbel 又不同：它们卖的是结构、社区强化和课程深度。它们不如
              Speak 对话优先，但教学法更清晰。Praktika 和 Loora 显示，AI 口语细分本身正在快速填满，定位要么更低价，要么更聚焦英语导师。


              重要模式不是某一个对手在所有维度上占优，而是 Speak 面对一组替代品组合，每个替代品都在一个领域强：规模、导师信任、结构、社区，或廉价 AI 辅导。
