      - number: '5.2'
        title: 架构与运营模型
        blocks:
          - type: paragraph
            body: >-
              Speak 现在披露的技术细节多于许多 C 端教育 App。2024 年 ASR 重构让公司从碎片化的端侧和第三方语音系统，转向统一后端技术栈。Speak 称，这套栈在学习者语音上微调
              Conformer-CTC，用 Nvidia Riva / Triton 在 Kubernetes 和 Google Cloud 上提供推理，并通过 gRPC 加 websocket
              流式传输，以足够快的速度返回语音反馈，支撑课程互动。2025 年，Speak 增加 Matching v2，把流式 ASR 与音素模型和强制对齐结合；这点重要，因为学习者语音常常打破通用 ASR 内置假设。到
              2026 年初，Speak 又在上层叠加更宽的语音 Agent 平台：移动 App 通过 LiveKit Cloud 上的 WebRTC 连接；语音 Agent 服务器编排外部 ASR、LLM、TTS 和
              speech-to-speech 供应商；系统按功能选择级联或 speech-to-speech，而不是强制使用单一通用栈。这个架构意味着真实技术深度，也意味着真实运营复杂度。Speak
              明确是多供应商、区分区域、极度关注延迟的系统；公开讨论涉及故障转移、尾延迟监控、语义轮次检测，以及质量或可用性下降时切换供应商。
