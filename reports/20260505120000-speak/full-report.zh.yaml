      - number: '8.3'
        title: 升级触发器、投资论点失效和最终提问
        blocks:
          - type: paragraph
            body: >-
              从 research-more 升到 buy 的路径很直接，但证据负担很重。Speak 需要证明，企业端进展不只是 logo
              数量，而是可续期、可扩张的收入，并且续约质量扎实。它也需要证明消费端规模正在转化为留存和队列经济性，强到足以支撑高于上市 edtech
              的溢价倍数。主要投资论点失效点可以观察：应用商店势头掉头、消费端付费墙摩擦恶化、企业端采用不能转化为披露的年经常性收入（ARR）支撑，或更广 AI 软件倍数再次下修。监管和市场结构风险同样重要，因为生成式 AI
              平台可能围绕关键模型、数据或算力所有者集中，限制应用层公司的下游护城河。如果市场在 Speak 披露足够经济性、把自己同更弱订阅学习资产区分开之前，就停止奖励 AI
              叙事，融资窗口也可能很快关闭。换句话说，Speak 像一家可信企业，但承销缺口在回报架构，而不是产品是否存在。没有股权结构表、单位经济性和分部组合，投资人仍在给叙事溢价定价。有了这些，公司可能值得 track
              或更高；没有这些，正确姿态是有纪律的尽调，而不是高确信定价。因此，升级路径今天已经具体：证明分部级留存、展示企业端续约质量，并证明溢价定价能顶住竞争压力。
