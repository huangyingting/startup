  - id: TV003
    title: 乐观 / 基准 / 悲观情景表
    columns:
      - 情景
      - 假设
      - 估值 / 回报逻辑
      - 关键风险
      - 概率信号
    rows:
      - - 悲观
        - 增长放缓、应用动能转弱，投资人给 Speak 的估值更接近公开教育科技区间。
        - $400M-$650M 估值；在 $1B 进入，即使不计稀释和优先权，也很可能亏损本金。
        - 倍数压缩、付费墙摩擦、企业转化弱。
        - 如果应用商店动能消退，或板块情绪再次转弱，该情景更可能发生。
      - - 基准
        - 收入规模维持在当前收入运行率轨迹附近，企业端扩张但仍未经证明；相对公开可比公司的溢价收窄，但不会消失。
        - $800M-$1.0B 估值；按上一轮进入，上行空间有限，除非条款异常干净。
        - 业务组合 / 留存不透明、融资需求、无法守住溢价。
        - 与当前公开证据最一致。
      - - 乐观
        - 收入规模远超 $150M，企业渗透扩大，且 Speak 在披露更强经济性的同时守住高端应用动能。
        - $1.1B-$1.4B 估值；存在上行，但仍取决于私有数据确认商业化能持续。
        - 执行失误、竞争模仿、续费质量弱于预期。
        - 需要超出当前公开来源的证据。
    notes: 情景区间是基于已发布收入里程碑、当前公开可比公司和 2026 年软件倍数风险评论得出的分析估计；不包含未披露优先权影响。
