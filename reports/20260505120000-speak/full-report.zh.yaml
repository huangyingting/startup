              辅导，上方有巨大免费增值漏斗经济。


              能力上，当买方重视顺滑的口语优先体验和低社交摩擦时，Speak 最强。但在明确纠错上，ELSA 的发音优先定位和 Speak 自身负面评论暗示 ELSA 可能更强。在课程深度和复习系统上，Babbel 和
              Busuu 看起来更强。在真人督促上，Cambly 更强。在纯分发上，Duolingo 明显更强。


