      - number: '8.3'
        title: 升级触发因素、逻辑打碎条件与最终问题清单
        blocks:
          - type: paragraph
            body: >-
              从继续研究到买入的路径清晰，但要求证据充分。Speak 需要证明企业牵引力不只是 logo 数量，而是有扎实续约质量的经常性扩展收入；还需要证明消费者
              规模正转化为留存和队列经济，足以为高于公开教育科技的溢价倍数提供支撑。主要的逻辑打碎条件清晰可观测：应用商店势头逆转、消费者付费墙摩擦加剧、 企业采用无法转化为披露的 ARR 支撑，或更广泛的 AI
              软件倍数再次下移。监管与市场结构风险同样重要——生成式 AI 平台可能向少数关键模型、数据或 算力持有者集中，压缩应用层公司的护城河。市场在 Speak 完成足够经济披露之前停止奖励 AI
              叙事，融资窗口也可能迅速关闭。换句话说，Speak 看起来 是一门可信的生意，但核保缺口在于回报架构而非产品存在本身。没有股权结构表、单元经济和分部构成，投资人仍在为叙事溢价定价；有了这些，公司可能值
              得观察乃至更高评级；没有，正确姿态是纪律性尽调而非确信定价。升级路径因此在今天就是具体的：证明分部级留存，展示企业续约质量，并证明溢价定价在 竞争压力下守得住。
