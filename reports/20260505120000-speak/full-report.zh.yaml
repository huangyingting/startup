      - number: '6.3'
        title: 耐久性、扩张与集中度风险
        blocks:
          - type: paragraph
            body: >-
              核心尽调问题是，客户质量证据远弱于采用证据。公开材料展示了下载量、评分、课程、已说句子数，甚至雇主采用率，但没有披露净留存率（NRR）、总收入留存（GRR）、流失、合同期限、队列留存或头部客户集中度。这意味着
              Speak 可以可信地展示谁尝试并喜欢产品，但还不能展示这些客户在收入意义上有多耐久。变现表面也引入了会影响流失分析的摩擦点。应用商店定价显示，自助订阅从约 $18 月付到 $84 年度 premium
              计划以及更高的 premium-plus
              层级不等；独立投诉页面则出现退款、自动续费、语言覆盖和语音识别投诉。这些都不能证明系统性弱点，但意味着公开记录仍更擅长展示获客和使用，而不是续约质量。企业扩张故事同样合理但不完整：Forbes
              称推动力始于消费者要求雇主付费，这是健康的先落地再扩张信号；但公开语料仍缺少具名案例库、合同条款或地理拆分，无法显示 B2B 收入是否仍高度集中在
              Korea。公开证据也没有从头部活动指标桥接到活跃付款方数量，因此投资人仍需要基础项：付费用户队列、年度计划续约曲线、退款率，以及 logo 级企业留存。在这些通过私下披露之前，正确解读是：Speak
