      - number: '6.3'
        title: 持久性、扩张与集中度风险
        blocks:
          - type: paragraph
            body: >-
              关键的尽调问题在于：客户质量证据远弱于采用规模证据。公开材料展示了下载量、评分、课程数、已开口 句数，甚至企业使用率，但未披露净留存率（NRR）、总留存率（GRR）、流失率、合同期限、队列留存或
              头部客户集中度。这意味着 Speak 能可信地展示谁在试用和喜爱产品，但无法证明这些客户在收入层面的 持久性。变现界面还引入了流失分析中至关重要的摩擦点：应用商店定价显示自助订阅从月付约 $18 到年付 约
              $84 的高级计划和更高端的高级加量计划不等，而独立投诉页面则反映了退款、自动续费、语言覆盖和 语音识别方面的投诉。这些并不能证明系统性弱点，但确实说明公开记录在展示获客和使用数据上更胜一筹，
              续约质量则付之阙如。企业扩张故事也颇有说服力但尚不完整：Forbes 称这一布局起步于消费者要求雇主 买单，这是健康的由用及企业信号，但公开语料库仍缺乏具名案例研究库、合同条款，或能够判断 B2B
              收入是否仍高度集中于韩国的地理拆分。公开证据也未能将头部活动指标与活跃付费用户数打通，投资者 仍需要基础数据：付费用户队列、年付计划续约曲线、退款率，以及按账户/地域分层的企业留存。在这些
              数据私下披露之前，正确的解读是：Speak 已展现需求与使用习惯，但尚未能全面审计各队列、各客户和 各地域的客户持久性。
