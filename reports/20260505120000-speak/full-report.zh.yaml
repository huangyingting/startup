        - 产品吸引力真实存在，但公开证据尚不足以支撑在上轮 10 亿美元估值下进行价格敏感型承保。
        - 仅在获取完整私募尽调材料后方可推进。
      - - 可信度
        - 中等
        - 融资、营收、定价、应用吸引力和可比公司数据均可见，但留存率和股权结构经济性尚不透明。
        - 将公开信息视为筛选工具，而非投委会可直接使用的结论。
      - - 风险评级
        - 高
        - 结果取决于持续的溢价增长，以及尚未披露的稀释比例和优先清算条款。
        - 在做出任何意向书决策前，明确为下行情景建模。
      - - 估值立场
        - stretched
        - 隐含私募倍数高于公开教育科技可比公司区间，需要更优的增长质量来支撑溢价。
        - 寻求价格让步或异常清晰的经济条款。
      - - 目标承保
        - ≥3x 总 MOIC（4-5 年）
        - 按上轮公开估值，该目标很可能需要比现有公开证据所证明的更快的规模扩张。
        - 优先在低于上一轮的价格入场，或要求强下行保护条款。
    notes: 目标回报 / 持有期框架是承保纪律，而非来源于市场报价；之所以纳入，是因为第 08 章需要决策含义。
