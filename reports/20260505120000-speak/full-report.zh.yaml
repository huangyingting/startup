  - number: 3
    title: 竞争格局
    sections:
      - number: '3.1'
        title: 竞争格局概览：解决同一需求的多条路径
        blocks:
          - type: paragraph
            body: >-
              买家至少可以通过四类产品解决"帮我流利说一门外语"这一需求：宽泛的免费增值语言平台、专注 AI 口语的 应用、真人家教网络，以及结构化课程或社区驱动应用。Speak 属于口语优先的专注型集群，但也面临全部四类
              产品的竞争，因为消费者和企业购买的不是产品品类，而是结果。这一点很关键：即便 Speak 的产品与众不同， 只要买家认为 Duolingo 够用、Cambly 更可信，或 Babbel/Busuu
              更系统，Speak 就会失去份额。


              公开规模层级一目了然。Duolingo 是品类头部，月活用户超 1 亿，具备平台级捆绑优势。Babbel 和 Busuu 的装机量远超 Speak，依靠系统化教学法而非 AI 新鲜感竞争。Cambly
              占据真人家教替代赛道。ELSA、Praktika 和 Loora 证明 AI 口语赛道已趋于拥挤，而非蓝海。在这一格局下，Speak 的差异化主张不是"唯一选择"， 而是"口语优先体验、AI
              辅导与新兴企业分发的最佳组合"。


              这是真实的定位，但尚未形成主导地位。
