      - number: '7.3'
        title: 财务模型和执行风险
        blocks:
          - type: paragraph
            body: >-
              Speak 的财务风险，不是公开信息显示公司承压，而是一个运行成本高的产品背后，经济模型不透明。公开来源显示势头强：mid-2024 用户超过 10 million，覆盖 40 多个国家，late 2024 以
              $1 billion 估值完成 Series C，并继续得到 OpenAI、Khosla、Accel 和 Y Combinator 支持。但同一公开记录也显示，Speak
              有时会先做今天成本还高到难以承受的体验，赌后续模型降价；独立报道也指出，自研 LLM 的野心可能很烧钱。因此，毛利率、每个活跃学习者的推理成本、退款漏损和支持强度都很关键。这些数字没有公开。NicheMetric
              给了方向性的 app 收入和下载量估算，但透明度不足以关闭承销问题。执行风险进一步放大不确定性：公司从韩国扩张到 20 多个、再到 40-plus
              个国家，同时仍在扩语言、招人、拓产品范围。正面评价说明这场赌局在奏效，但用户要求更多语言、更好支持，也暗示辅导产品外围的运营系统可能仍在追赶需求。
