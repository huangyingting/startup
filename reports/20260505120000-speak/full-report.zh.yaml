      - number: '5.3'
        title: 可信度、质量与支持控制机制
        blocks:
          - type: paragraph
            body: >-
              在信任与运营质量方面，Speak 的公开证据参差不齐，但整体优于纯营销导向的应用。公司暴露了具体的支持 流程：应用内问题反馈、故障排查指南、麦克风权限核查清单，以及未解决问题的邮件升级通道。应用商店公开
              内容还披露了基本的隐私和平台控制，包括数据传输加密、删除请求、最低操作系统支持和仅限移动端可用。 课程质量管控也比一般 AI 应用更明确：Speak 表示课程由学习设计师编写，AI 用于加速生产，最终内容仍由
              人工审核。信任图景中较弱的一面是外部摩擦。独立评测称赞了语音质量和以口语为中心的设计，但也报告了 反馈深度浅薄、高级套餐分层混乱、语音识别间歇性卡顿、退款投诉和支持响应迟缓等问题。对尽调而言更
              重要的是：Speak 的公开隐私政策和服务条款 URL 在纯文本审阅中无法呈现可读内容，我们也未能找到公开的 SOC 2、ISO 27001
              或类似安全保障证明材料。这意味着尽管消费端支持机制清晰可见，企业端信任层面仍 存在真实缺口。
