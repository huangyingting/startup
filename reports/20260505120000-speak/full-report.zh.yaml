  - number: 2
    title: 市场分析
    sections:
      - number: '2.1'
        title: 市场边界：Speak 竞争在哪里，不竞争在哪里
        blocks:
          - type: paragraph
            body: >-
              Speak 所在的细分市场，比泛泛的“语言学习”更窄。相关边界是数字化、口语优先的语言学习：产品借助 AI 或真人对话，帮助用户在真实语境中练习口语输出，而不是主要刷阅读、语法或闪卡记忆。Speak
              自己的融资材料也明确采用这一框架：它把口语优先导师与旧式 App 模式对比，并仅把更大的 $100B+ 线上线下语言学习市场作为背景。


              因此，最接近的替代品不是所有教育 App，而是一组更窄的产品：Duolingo、Babbel、Busuu 等综合语言平台；ELSA、Praktika 等专门口语 App；Cambly
              等真人导师网络；以及在企业场景中由雇主赞助的英语培训或内部辅导。应纳入市场的支出包括 C
              端订阅、雇主资助的英语提升、数字化口语产品。排除在外的支出包括通用备考、并不强调口语的教材主导课堂教学，或与语言流利度无关的企业培训类别。


              尽调关键在于，Speak 最适合被理解为一个大而异质市场中的口语流利度切口。很宽的总可用市场（TAM）确实存在，但可投资测算的市场取决于谁真正为反复口语练习付费，以及这部分需求能数字化多少。
