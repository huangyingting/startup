chapters:
  - number: 1
    title: 公司概况
    sections:
      - number: '1.1'
        title: 身份定位、产品边界与商业模式
        blocks:
          - type: paragraph
            body: >-
              Speak 是 Speakeasy Labs 的消费端品牌，总部位于旧金山，专注于口语流利度而非填鸭式背诵。无论是官网首页、应用 商店描述，还是 2024
              年底的融资材料，公司始终将自己定位为推动学习者大声开口、即时获得反馈、建立对话自信的 AI 语言家教。这一定位比泛语言学习头部产品更聚焦——Speak 首先拼口语效果，而非宽泛的游戏化内容覆盖。


              到 2026 年 5 月，Speak 的消费端公开产品已远超早期仅针对英语学习的切入口。官网和 Apple 应用页面列出六条 在售学习语言（法语、西班牙语、英语、韩语、意大利语、日语），2025 年 6
              月的产品更新说明西班牙语率先面向英语 母语者推出，其后四门语言相继上线。这一演进支撑起混合商业模式：消费端订阅仍是核心变现引擎，但同一套语音优先 辅导技术栈如今也支撑着企业端雇主产品。TechCrunch
              2024 年 12 月的报道给出了最清晰的消费端公开定价参考： 月付 $20 或年付 $99。


              Speak 目前的信息披露仍是私营成长型公司的标准模式——公开内容足以确立品类定位、产品策略和收入规模概览，但 不足以验证单位经济模型、当前 ARR，或消费端与企业端的精确客户结构。
            claimRefs:
              - CO001
