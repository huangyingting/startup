  - number: 3
    title: 竞争对手
    sections:
      - number: '3.1'
        title: 格局概览：同一个任务有多种解法
        blocks:
          - type: paragraph
            body: >-
              买方要完成“帮我把一门语言说流利”这个任务，至少有 4 类产品可选：综合免费增值语言平台、专门 AI 口语 App、真人导师网络，以及结构化课程或社区驱动 App。Speak 属于专门的口语优先集群，但它会与所有
              4 类竞争，因为消费者和雇主买的不是产品类别，而是结果。这一点重要：即便 Speak 的产品有辨识度，只要买方认为 Duolingo 已经够用、Cambly 更可信，或 Babbel / Busuu
              更有结构，它仍会丢失份额。


              公开规模层级很清晰。Duolingo 是品类龙头，拥有 100M+ MAUs 和平台级捆绑能力。Babbel 和 Busuu 的安装基数远大于 Speak，竞争点是结构化教学法而不是 AI 新鲜感。Cambly
              占据真人导师替代路线。ELSA、Praktika 和 Loora 证明 AI 口语竞争已经拥挤，并非蓝海。在这个格局中，Speak 的叙事不是“只有我们能做”，而是“我们把口语优先 UX、AI
              辅导和正在成形的企业分发组合得最有说服力”。


              这是一个真实位置，但还不是主导地位。
