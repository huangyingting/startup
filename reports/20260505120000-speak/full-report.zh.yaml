      - number: '5.3'
        title: 信任、质量与支持控制
        blocks:
          - type: paragraph
            body: >-
              在信任和运营质量上，Speak 的公开证据喜忧参半，但比纯营销页面更好。公司暴露出具体支持流程：App
              内问题标记、故障排查指南、麦克风权限清单，以及未解决问题的邮件升级。公开应用商店页面也披露了基础隐私和平台控制，例如传输中加密的数据处理、删除请求、最低 OS 支持和仅移动端可用。课程质量控制也比一般 AI
              App 更明确：Speak 称课程由学习设计师编写，AI 用于加速生产，但人类仍会审阅最终产品。信任画像较弱的一面来自外部摩擦。独立评测来源认可语音质量和以口语为中心的设计，但也报告反馈深度浅、premium
              分层令人困惑、语音识别迟滞、退款投诉和支持延迟。对尽调更重要的是，Speak 的隐私和条款 URL 在纯文本审阅中没有渲染出可读政策文本，我们也未找到公开 SOC 2、ISO 27001
              或类似安全保证材料。因此，即便 C 端支持机制清晰可见，企业信任仍存在真实缺口。
