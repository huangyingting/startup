      - number: '7.2'
        title: 运营质量与平台依赖风险
        blocks:
          - type: paragraph
            body: >-
              在用户每次出错都立刻察觉的产品里，语音识别质量和对话延迟决定了 Speak 的运营下限。Speak 之所以自研 ASR，是因为第三方语音识别在处理口音学习者时 问题频出；这套系统现已跑在 Google Cloud
              Kubernetes 上的 Nvidia GPU 推理集群中。自研栈产品力更强，但运营底盘更窄——延迟、吞吐或云厂商故障会 直接拉低辅导质量。对 OpenAI 的依赖也如出一辙：Speak 公开使用
              GPT-4、GPT-4o 和 Realtime API，同时承认语音转语音模型在指令跟随和精细反馈
              上仍落后于文本模型。独立评测来源印证这不只是理论风险——用户投诉涉及识别延迟、漏词、噪声环境失效、耗电过快、设备发热，以及偶发的录音或进度保存
              缺陷。产品口碑扎实，但运营要求极高：用户付费买的就是即时、准确、公平的体验。
