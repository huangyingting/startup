  - id: TV001
    title: 建议摘要表
    columns:
      - 维度
      - 评估
      - 有证据支撑的理由
      - 决策含义
    rows:
      - - 建议
        - 继续研究
        - 产品牵引力真实存在，但公开证据尚未充分支撑按上一轮 $1B 估值做价格敏感型承销。
        - 只有拿到完整私有尽调包后才推进。
      - - 信心
        - 中
        - 融资、收入、定价、应用牵引和可比公司数据都可见，但留存和股权结构经济性不可见。
        - 将公开视角当作筛选，不是可提交 IC 的结案材料。
      - - 风险评级
        - 高
        - 结果取决于持续的溢价增长，以及未披露的稀释 / 优先权条款。
        - 在任何 term sheet 决策前，明确承销下行情景。
      - - 估值立场
        - 偏高
        - 隐含私有市场倍数高于公开教育科技可比区间，需要用更高增长质量支撑溢价。
        - 争取价格让步，或要求异常干净的经济条款。
      - - 目标承销
        - 4-5 年内总 MOIC >=3x
        - 按上一公开估值，该目标很可能需要比当前公开证据单独能证明的速度更快的规模化。
        - 优先选择低于上一轮价格进入，或附带强下行保护。
    notes: 目标回报 / 持有期框架是承销纪律，不是有来源的市场报价；纳入它，是因为第 08 章要求给出决策含义。
