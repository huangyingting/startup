      - number: '3.2'
        title: 竞争对手画像与商业模式差异
        blocks:
          - type: paragraph
            body: >-
              Duolingo 是基准参照，原因在于它兼具庞大的免费用户规模、应用商店顶级营收排名和广泛的语言覆盖。它并非 Speak
              口语优先辅导的最近产品类比，但在买家寻求"一款学语言的应用"时，是最强势的默认替代品。ELSA 才是更贴近的直接参照：同样以 AI 为核心、聚焦英语、以口语和发音为中心。其声称的 1,800 万次以上下载量 和
              10.9 万条 App Store 评分，使其规模量级与 Speak 更为接近。


              Cambly 依靠不同的劳动力模式竞争。它提供全天候真人母语家教，运营成本更高，但对于信任人类胜过 AI 的 学习者而言可信度更强。Busuu 和 Babbel
              又有所不同：它们主打结构化体系、社区互动和课程深度，口语优先 程度不及 Speak，但教学体系更清晰。Praktika 和 Loora 展示了 AI 口语细分市场本身填充的速度——以更低
              定价或更聚焦的英语家教定位抢占空间。


              关键的规律不是某个竞争者在所有维度上都占优，而是 Speak 面对一组各有一技之长的替代品：规模、家教 可信度、结构化课程、社区属性，或低价 AI 辅导。
