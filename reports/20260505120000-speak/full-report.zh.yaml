      - number: '7.3'
        title: 财务模型与执行风险
        blocks:
          - type: paragraph
            body: >-
              Speak 的财务风险不在于显性困境，而在于一款高运营成本产品背后不透明的经济模型。公开数据呈现强劲势头：2024 年中用户超 1000 万、覆盖 40 余个 国家、2024 年底 Series C 估值达 10
              亿美元，OpenAI、Khosla、Accel、Y Combinator 持续跟投。但同样是公开信息——Speak 承认部分功能在当前
              成本下得等模型价格下降才划算，独立报道也指出自研大模型野心烧钱。这意味着毛利率、每活跃学习者推理成本、退款漏损和支持成本至关重要，而这些数据均 未公开。NicheMetric
              提供了应用营收和下载量的方向性估算，但精度不足以回答核保问题。执行风险进一步加剧不确定性：公司在扩语种、招人、拓产品范围 的同时，完成了从韩国到 20 余个、再到 40
              余个国家的跃升。正向评价说明这步棋走对了，但对更多语种和更好支持的持续呼声，暗示产品背后的运营体系 或许还在追赶需求。
