      - number: '3.3'
        title: 能力、定价与分发对比
        blocks:
          - type: paragraph
            body: >-
              公开定价数据不完整，但方向性图像已足够说明问题。Speak 公开报道的消费端定价约为月付 $20 或年付 $99。 Praktika 将 AI 家教替代品定价约为月付 $8。ELSA
              提供月付和年付会员。Duolingo 依托免费增值规模，付费 转化率约 9%，兼具广泛触达和定价灵活性。这一组合意味着双向的定价压力：低价 AI 辅导从下方挤压， 免费增值漏斗的巨大规模从上方压制。


              能力层面，Speak 在买家重视流畅口语体验和低社交摩擦时最具优势。但在明确纠错方面，ELSA 的发音优先定位 与 Speak 自身的负面评价暗示 ELSA 可能更强。课程体系和复习机制方面，Babbel 和
              Busuu 更扎实。真人督学 方面，Cambly 更强。纯分发规模方面，Duolingo 遥遥领先。


              Speak 唯一明显差异化的商业角度是 Speak for Business。大多数公开竞争者仍主要是消费端产品。但由于
              公开材料未披露客户名称、席位数或续约情况，该渠道的竞争重要性目前仍更多是潜力展望，而非已验证结论。
