  - id: FR001
    title: 风险热力图
    type: matrix
    layout: wide
    summary: Speak 最高的残余风险集中在 AI/语音监管、应用商店计费、模型/云依赖与高溢价消费体验相互交叉的地带。
    data:
      columns:
        - 可能性
        - 影响
        - 缓解成熟度
        - 残余严重程度
      rows:
        - label: 语音 / 隐私合规
          values:
            - label: 中
              tone: warning
              detail: 涉未成年人的模糊地带与语音数据处理构成实质性但尚不紧迫的法律风险。
            - label: 高
              tone: negative
              detail: 一旦在隐私或儿童数据上出问题，将直接打击用户信任、商店分发和增长。
            - label: 中
              tone: neutral
              detail: 加密、删除申请和现有披露有一定缓解作用，但政策条款无法完整审查。
            - label: 中高
              tone: warning
              detail: 留存和年龄限制未经完整核实前，残余风险仍处于较高水平。
        - label: 计费 / 退款信任
          values:
            - label: 中高
              tone: negative
              detail: 帮助中心和投诉记录显示计费是一个重要的支持问题面。
            - label: 高
              tone: negative
              detail: 意外扣费或退款障碍会迅速损害付费消费产品的口碑。
            - label: 中
              tone: warning
              detail: 取消和退款流程已存在，但责任分散在多个渠道之间。
            - label: 中高
              tone: warning
              detail: 在退单率和响应时间指标明确之前，残余风险持续存在。
        - label: OpenAI / 模型依赖
          values:
            - label: 高
              tone: negative
              detail: 核心辅导体验明显依赖 GPT-4、GPT-4o 和 Realtime API。
            - label: 高
              tone: negative
              detail: 供应商成本或政策调整会同时冲击产品质量和利润率。
            - label: 低中
              tone: warning
              detail: Speak 有自研学习引擎和定制 ASR，但公开的备用方案细节极少。
            - label: 高
              tone: negative
              detail: 高溢价实时对话功能的供应商集中度仍然偏高。
        - label: ASR / 实时产品质量
          values:
            - label: 中高
              tone: warning
              detail: 识别错误和设备端性能问题仍见于用户评论。
            - label: 高
              tone: negative
              detail: 质量缺陷直接动摇产品的核心存在理由。
            - label: 中
              tone: neutral
              detail: 定制 ASR 投入和高评分表明缓解已取得实质进展。
            - label: 中高
              tone: warning
              detail: 残余风险有所收窄但未消除——用户付费看重的正是即时性和准确性。
        - label: 扩张 / 支持扩容
          values:
            - label: 中
              tone: warning
              detail: 国家和语言版本持续扩张，支持与本地化需求随之上升。
            - label: 中高
              tone: warning
              detail: 执行失误会先伤害留存和融资支持，再危及偿付能力。
            - label: 中
              tone: neutral
              detail: 近期融资和积极招聘提供了一定缓冲。
            - label: 中
              tone: warning
              detail: 残余风险主要来自支持负荷和企业成熟度的不确定性。
