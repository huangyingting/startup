  - id: FV001
    title: 建议逻辑
    type: flow
    layout: standard
    summary: 从已观察到的牵引力和市场顺风，走向估值谨慎和继续研究建议。
    data:
      nodes:
        - id: n1
          label: 已观察牵引力
          description: 估值上行的融资轮、>$100M 年化收入和强应用指标说明公司是真实存在的。
        - id: n2
          label: 品类顺风
          description: AI 导师和在线语言学习市场增长足够快，可支撑进一步扩张。
        - id: n3
          label: 溢价逻辑存在
          description: 如果增长质量证明可持续，Speak 有理由较弱势上市教育科技公司溢价交易。
        - id: n4
          label: 上市可比公司天花板更低
          description: 当前上市同业交易倍数大多远低于上次 $1B 标记背后的隐含私人倍数。
        - id: n5
          label: 关键尽调缺失
          description: 股权结构条款、留存、CAC 回收期和分部组合仍未披露。
        - id: n6
          label: 建议：research-more
          description: 只有私人尽调或更好价格弥合牵引力与投资测算回报之间的差距，才继续推进。
      edges:
        - from: n1
          to: n3
        - from: n2
          to: n3
        - from: n3
          to: n4
        - from: n4
          to: n5
        - from: n5
          to: n6
