  - id: FU003
    title: 客户验证矩阵
    type: matrix
    layout: wide
    summary: Speak 的公开消费者验证很强，企业总量也已披露，但公开留存与集中度可见度偏弱。
    data:
      columns:
        - 结果具体性
        - 独立证据面
        - 重复使用信号
        - 持久性可见度
      rows:
        - label: 消费者评论面
          values:
            - label: 高
              tone: positive
              detail: 具名评论者描述具体口语提升和功能使用
            - label: 高
              tone: positive
              detail: Apple 和 Google 承载大型公开评论池
            - label: 中
              tone: neutral
              detail: 部分评论提到使用数月或数年
            - label: 低
              tone: warning
              detail: 评分不披露续订或流失
        - label: 官方评论精选
          values:
            - label: 中
              tone: neutral
              detail: 官方页面包含具名评论原文
            - label: 中
              tone: neutral
              detail: 多条引语与公开商店评论重复
            - label: 低
              tone: warning
              detail: 页面只收录 5 星 App Store 评论
            - label: 低
              tone: warning
              detail: 正向筛选削弱尽调平衡性
        - label: 雇主赞助 B2B 基础
          values:
            - label: 中
              tone: neutral
              detail: 200+ 至 ~500 家公司的计数已公开
            - label: 低
              tone: warning
              detail: 公开具名雇主成果很少
            - label: 中
              tone: neutral
              detail: 85% 采用率表明部分账户内部已有使用
            - label: 低
              tone: warning
              detail: 无公开续约、合同期限或 ACV
        - label: 集中度 / 留存透明度
          values:
            - label: 低
              tone: warning
              detail: 无公开头部客户或区域组合披露
            - label: 低
              tone: warning
              detail: 无同期群图或净留存率（NRR）/GRR 数据
            - label: 低
              tone: warning
              detail: 使用总量缺少活跃用户分母
            - label: 低
              tone: warning
              detail: 主要尽调风险仍是持久性，而非是否存在
