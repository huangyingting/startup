      - number: '3.4'
        title: 护城河耐久性、切换成本与主要威胁
        blocks:
          - type: paragraph
            body: >-
              Speak 公开可见的护城河属于中等。公司拥有真实的产品身份——口语优先 AI 辅导——并在企业账户中拥有一个潜在有价值的第二渠道。这些都是正面因素。但护城河并不明显耐久，因为每项优势都可被进攻。Duolingo
              可以用更多预算和更强分发压过它。Cambly 可以赢在人类信任。ELSA 可以赢在明确发音辅导。Busuu 和 Babbel 可以赢在结构和留存循环。Praktika 和 Loora
              可以用更便宜或更聚焦的定位压缩 AI 口语细分。


              从公开证据看，切换成本也有限。消费者可以低成本测试多个 App，而且很多人可能确实会这样做。雇主一旦部署后摩擦可能更高，但没有公开证据证明 Speak
              拥有独家合同或深度工作流锁定。公开评测也强化了这一风险：如果高阶用户觉得反馈浅或过于宽松，他们有大量替代品可选。


              因此，近期主要威胁不是颠覆性的技术跃迁，而是更慢的商业力量：定价压力、分发捆绑和品类商品化。Speak 仍能赢，但它更需要结果和企业端证据，而不是营销新鲜感。
