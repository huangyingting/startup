              - CO037
      - number: '1.2'
        title: 创始人、领导层与组织足迹
        blocks:
          - type: paragraph
            body: >-
              公开领导层画像显示，Speak 由创始人主导，权力仍高度集中。Late-2024 融资报道一致把 Connor Zwick 列为 CEO、Andrew Hsu 列为 CTO /
              联合创始人；无论公司官方文章还是独立媒体，Zwick 都是主要对外发言人。这种集中有利于速度和产品一致性，但也带来清晰的关键人依赖，因为公司叙事、投资人沟通和产品愿景都高度穿过 Zwick。


              以公司规模看，Speak 的运营足迹已经全球化。TechCrunch 在 June 2024 报道其 75 人团队分布在 San Francisco、Seoul、Tokyo 和
              Ljubljana；当前招聘页仍突出 Seoul、Ljubljana 和 San Francisco，并把公司呈现为国际化分布。招聘页有参考价值，但内部内容已陈旧：页面还保留一段旧历史快照，称团队 60
              人、融资超过 $60 million，说明页面在 late-2024 融资跃升后并未完全更新。这个不一致是小但真实的尽调信号：即便是公司自有页面，也应被当作带时间戳的主张，而不是永恒事实。


              治理披露有限。公开证据最能支持的董事会信息，是 Accel 合伙人 Ben Quazzo 在 Series C 轮加入董事会。除此之外，公开材料只在 Form D
              备案中识别相关人士，没有披露完整的当前董事会名单、观察员权利或控制权条款。
