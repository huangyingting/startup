            body: >-
              公开证据表明，Speak 目前首先仍是一款自助式消费端语言应用，企业雇主付费的覆盖层正在浮现，而非纯粹 的企业业务。官网首页和应用商店描述强调直接面向个人学习、六条核心语言学习路径、AI 口语练习和应用
              商店规模。自助服务层显然已具规模：官方与第三方数据均显示，截至 2024 年年中学习者已逾 1,000 万， 截至 2025 至 2026 年底下载量约达 1,500 万。地域分布也很重要。韩国是 Speak
              的首发市场，公司公开 表示 2024 年韩国约 6% 的人口在使用该应用学习英语，TechCrunch 早在 2023 年就报道了超过 10 万名 韩国付费用户。与此同时，Speak
              已扩展至首发市场之外，官方与第三方报道均显示覆盖 40 多个国家， 语言产品涵盖英语、西班牙语、法语、意大利语、日语和韩语。新兴的 B2B 路径以雇主为付费方、员工为 主要用户，英语技能提升为旗舰使用场景。
