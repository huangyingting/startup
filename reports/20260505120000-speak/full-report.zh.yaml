      - number: '5.2'
        title: 技术架构与运营模式
        blocks:
          - type: paragraph
            body: >-
              Speak 现在披露的技术细节已超过大多数消费端教育应用。2024 年的 ASR 系统重构，将公司从分散的设备端和 第三方语音系统，整合至统一的后端技术栈。Speak 称该技术栈在学习者语音数据上微调了
              Conformer-CTC 模型， 以 Nvidia Riva/Triton 在 Kubernetes 和 Google Cloud 上提供推理服务，并借助 gRPC 加 WebSocket 流式
              传输，将语音反馈的延迟压低至课程互动所需的水平。2025 年，Speak 推出 Matching v2，将流式 ASR 与音素 模型和强制对齐结合——这一点至关重要，因为学习者语音往往会打破通用 ASR
              的内置假设。到 2026 年初， Speak 在此基础上叠加了更宽泛的语音智能体平台：移动应用通过 LiveKit Cloud 以 WebRTC 方式连接； 语音智能体服务器编排外部 ASR、LLM、TTS
              和语音转语音服务商；系统按功能特性选择级联模式或端到端语音 转语音模式，而非强制使用统一技术栈。这一架构体现了真实的技术深度，但也带来了真实的运营复杂度。 Speak
              明显是多服务商、区域感知、以延迟为重要指标的系统，公开讨论涵盖故障转移、尾延迟监控、语义轮次 检测和在质量或可用性下降时切换服务商等细节。
