      - number: '2.2'
        title: 规模测算镜头：广泛需求真实存在，但不同口径不能互换
        blocks:
          - type: paragraph
            body: >-
              最强的公开证据支持数字英语学习市场既大且增长，但没有一个干净的单一数字。Technavio 估计，数字英语语言学习市场将在 2024 至 2029 年间增长 $39.46B，CAGR 为 24.5%，APAC
              贡献 39% 的增长。Preply 使用不同方法和更宽的在线学习口径，估计全球在线语言学习市场 2025 年达到约 $115B，其中英语单独约 $43.51B，并以约 22% 的年增速增长。Speak 自己
              June 2024 文章采用最宽口径，描述的是 $100B+ 线上线下市场。


              这些数字不应简单平均。Technavio 报告的是特定数字英语细分市场的预测增长；Preply 报告的是更宽的平台型在线市场；Speak
              使用的是公司自写框架，包含线下支出。正确解读应看方向而非精确值：所有可信来源都指向一个巨大且仍在增长的市场，但公开数据无法为 Speak 隔离出一个干净、由来源验证的 SAM 或 SOM。


              更可操作的规模结论是定性的：英语仍是最大的单一语言学习类别，APAC 仍是最重要的增长区域，口语优先数字产品同时受益于英语长期需求和 AI 辅助学习的短期采用。
