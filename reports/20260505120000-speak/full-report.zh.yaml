  - number: 8
    title: 估值
    sections:
      - number: '8.1'
        title: 建议和价格纪律
        blocks:
          - type: paragraph
            body: >-
              Speak 已有足够公开运营证明，值得认真尽调，但价格支撑还不足以在最后公开 $1B 点位上直接买入。官方披露显示，估值从 June 2024 的 $500M 升至 December 2024 的
              $1B；后续报道又指向超过 $100M 的年化收入、15M 下载量、10M+ Google Play 安装量，以及真实企业端落地。相比多数消费级 edtech
              初创，这些证据强得多。问题在于，可用价格锚仍隐含高个位数到约 10x 收入倍数，比当前上市教育和订阅学习可比公司仍更贵。Duolingo 是唯一增长和产品质量可比的上市同业，但即便它按当前市场数据也接近 4x
              EV/revenue。由于已发布估值早于最新收入里程碑，且股权结构表、优先权结构和留存画像仍未披露，审慎结论是
              research-more：中等信心、高风险、估值偏紧。只有在更新尽调证明经常性经济性强于当前公开证据，或入场价格显著低于最后公开点位时，入场才有吸引力。
