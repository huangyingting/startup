  - number: 2
    title: 市场分析
    sections:
      - number: '2.1'
        title: 市场边界：Speak 参与竞争的赛道与未参与的赛道
        blocks:
          - type: paragraph
            body: >-
              Speak 所在的细分市场比泛"语言学习"更窄，可界定为数字化、口语优先的语言学习：借助 AI 或真人对话帮助 用户在真实语境中练习口语输出，而非以阅读、语法或单词卡片记忆为主。Speak
              的融资材料明确了这一框架—— 将口语优先家教与旧式应用模式对比，并将那个更宽泛的 1,000 亿美元以上线上线下语言学习市场仅作为背景信息。


              这意味着最近的替代品不是所有教育应用，而是一批更窄的竞品：Duolingo、Babbel、Busuu 等宽泛语言平台， ELSA、Praktika 等专注口语的应用，Cambly
              等真人家教网络，以及企业场景下的雇主赞助英语培训或内部辅导。 属于该市场的消费包括：消费端订阅、雇主出资的英语技能提升，以及数字化口语类产品的支出。市场外的消费
              包括：应试备考、不以口语为重点的教材主导课堂教学，以及与语言流利度无关的企业培训类别。


              关键尽调结论是：Speak 最好被理解为嵌入庞大但分散市场中的口语流利度楔子。总可用市场（TAM）足够大，但 可核准的市场规模取决于谁真正愿意为反复口语练习付费，以及多大比例的需求可以数字化。
