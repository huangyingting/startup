        title: 收入模式：表面混合，底层不透明
        blocks:
          - type: paragraph
            body: >-
              Speak 的公开财务故事在高层次上直观，往下则很薄。公开证据支持两条变现轨道：通过移动应用商店销售的 C 端订阅，以及通过 Speak for Business 销售的企业合同。TechCrunch 多次报道
              C 端价格点约为每月 $20 或每年 $99，App Store 也佐证了经常性月度和年度订阅。与此同时，商业网站和 Series C 材料显示 Speak 已搭建面向雇主的产品，并声称拥有 200+
              个品牌或客户。


              这足以得出结论：Speak 不只是一个 C 端
              App。但还不足以量化收入组合、实际成交价格或收入质量。已审阅的公开来源没有披露年经常性收入（ARR）、付款方数量、转化率、退款率、流失，或来自企业账户的收入占比。结果是一个常见尽调陷阱：变现架构看得见，经济性看不见。


              品类背景很重要。语言学习买方可以什么都不花，使用免费或交换型产品；可以购买 Speak 这类中等价格订阅；可以按课为真人辅导付费；也可以选择其他 AI 导师。这意味着 Speak
              的公开价格点处在拥挤价格带内部，而不是高于价格带。
