schemaVersion: report-v2
artifact: customers
slug: speak
runDate: '2026-05-05'
company:
  name: Speak
chapter:
  number: 6
  title: Customers
  summary: >-
    Public evidence supports a large self-serve consumer base and a real employer-sponsored upsell motion for Speak, but
    durability and concentration remain mostly undisclosed.
sections:
  - id: customer-base
    title: Customer base and segmentation
    body: >-
      Public evidence suggests that Speak still looks first and foremost like a self-serve consumer language app, with
      an emerging employer-paid overlay rather than a purely enterprise business. The homepage and app-store listings
      emphasize direct individual learning, six core language tracks, AI speaking practice, and app-store scale. That
      self-serve layer appears broad: official and third-party surfaces point to more than 10 million learners by
      mid-2024 and roughly 15 million downloads by late 2025 to 2026. Geography also matters. South Korea was Speak's
      inaugural market, the company has publicly said nearly 6% of Korea's population was learning English with the app
      in 2024, and TechCrunch reported well over 100,000 Korean subscribers as early as 2023. At the same time, Speak
      has expanded far beyond that origin, with official and third-party reporting pointing to 40+ countries and
      language offerings spanning English, Spanish, French, Italian, Japanese, and Korean. The newer B2B motion appears
      to use employers as payer, employees as primary users, and English upskilling as the flagship use case.
    claimRefs:
      - CU001
      - CU002
      - CU003
      - CU004
      - CU005
      - CU006
      - CU009
      - CU010
      - CU012
      - CU021
      - CU022
      - CU024
      - CU027
      - CU044
  - id: customer-proof
    title: Named proof and adoption signals
    body: >-
      The strongest public proof is not a roster of enterprise case studies; it is a combination of scaled review
      surfaces and duplicated named learner testimony. Apple and Google show large rating and review counts, while
      Speak's own review page republishes identifiable customer comments that also appear on public app-store surfaces.
      That duplication matters because it reduces the risk that every quote is wholly synthetic, even if the official
      page is still positively selected. The clearest named examples are consumer learners. j herronov says months of
      French use improved comprehension of French media and made free talk and bookmarking valuable. Dan S says more
      than six months of Spanish use beat prior tools because feedback was detailed and instantaneous. Rosalyn Mulder
      says Speak's tutor-like feedback and streaks made it her preferred option over Duolingo and Mango. These are still
      self-reported outcomes, but they are specific, recent, and visible across independent distribution channels. On
      the enterprise side, the proof is thinner but not nonexistent: Speak says it has 200+ business customers, and
      Forbes reported roughly 500 companies, including KPMG and HD Hyundai, offered subscriptions to employees, mostly
      in South Korea.
    claimRefs:
      - CU005
      - CU008
      - CU015
      - CU016
      - CU023
      - CU024
      - CU029
      - CU031
      - CU032
      - CU033
      - CU034
      - CU035
      - CU043
      - CU048
      - CU050
  - id: durability-risk
    title: Durability, expansion, and concentration risk
    body: >-
      The key diligence problem is that customer-quality evidence is much weaker than adoption evidence. Public
      materials show downloads, ratings, lessons, lines spoken, and even an employer adoption percentage, but they do
      not disclose NRR, GRR, churn, contract length, cohort retention, or top-customer concentration. That means Speak
      can credibly show who tries and likes the product, but not yet how durable those customers are in revenue terms.
      The monetization surface also introduces friction points that matter for churn analysis. App-store pricing shows
      self-serve subscriptions ranging from roughly $18 monthly to $84 annual premium plans and higher premium-plus
      tiers, while independent complaint pages surface refund, auto-renewal, language-coverage, and speech-recognition
      complaints. None of that proves systemic weakness, but it does mean the public record is still better at showing
      acquisition and usage than renewal quality. The enterprise expansion story is also plausible but incomplete:
      Forbes says the push began when consumers asked employers to pay, which is a healthy land-and-expand signal, yet
      the public corpus still lacks a named case-study library, contract terms, or a geography split that would show
      whether B2B revenue is still heavily concentrated in Korea. Public evidence also does not bridge from headline
      activity metrics to active payer counts, so investors still need the basics: paid-user cohorts, annual-plan
      renewal curves, refund rates, and logo-level enterprise retention. Until those are disclosed privately, the right
      reading is that Speak has demonstrated demand and habit, but not yet fully auditable customer durability across
      cohorts, logos, or geographies globally.
    claimRefs:
      - CU016
      - CU026
      - CU028
      - CU036
      - CU037
      - CU039
      - CU040
      - CU041
      - CU042
      - CU045
      - CU046
      - CU047
      - CU048
      - CU049
tables:
  - id: TU001
    title: Customer segmentation table
    columns:
      - Segment
      - Buyer / user / payer
      - Use case
      - Scale evidence
      - Revenue / strategic value
      - Gap
    rows:
      - - Self-serve consumer learners
        - Individual / learner / individual
        - Speaking practice for travel, work, school, and everyday conversation
        - 15M+ downloads on Speak homepage; 44K iOS ratings; 112K Google Play reviews
        - Core consumer subscription engine and top-of-funnel for brand spread
        - No public free-to-paid conversion or payer mix
      - - Korea English-learning base
        - Individual or employer / learner / individual or employer
        - English fluency and confidence in Speak's origin market
        - Nearly 6% of Korea population claim in 2024; well over 100K Korean subscribers in 2023
        - Explains early density, review volume, and enterprise seed demand
        - Current Korea share of revenue and users is undisclosed
      - - International multi-language consumers
        - Individual / learner / individual
        - Spanish, French, English, Italian, Japanese, and Korean speaking practice
        - 40+ countries by 2024 plus six core course tracks on the homepage
        - Supports global growth beyond Korea and broader cross-sell
        - No country-by-country user or revenue breakout
      - - Employer-sponsored B2B teams
        - Employer or L&D / employee / employer
        - Business English and workforce fluency
        - 200+ brands on B2B page; 200+ business customers and 85% employee adoption in Series C post
        - Higher-ARPU expansion path layered on top of consumer demand
        - No public ACV, seat count, or renewal data
      - - Named corporate subscriber base
        - Employer / employee / employer
        - Employee language benefit or upskilling program
        - Forbes says ~500 companies including KPMG and HD Hyundai offered subscriptions, mostly in Korea
        - Suggests real procurement penetration beyond pilots
        - No public roster, case studies, or deployment outcomes for most logos
    notes: >-
      Public evidence points to a consumer-first base with a meaningful but still under-disclosed employer-sponsored
      layer.
