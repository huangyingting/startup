  evidenceGaps:
    - type: missing-source
      severity: material
      topic: Retention cohorts and NRR for Speak
      missingEvidence: No reviewed public source provided NRR, GRR, churn, renewal curves, or cohort-retention percentages by segment.
      whyItMatters: Adoption and review scale do not translate cleanly into durable revenue without retention metrics.
      diligencePath: >-
        Request cohort tables for monthly and annual plans, NRR/GRR by geography and language, and involuntary churn and
        refund rates.
      relatedQuestionRefs:
        - QU017
        - QU025
      relatedTableRefs:
        - TU004
    - type: missing-source
      severity: material
      topic: B2B contract structure and expansion quality
      missingEvidence: >-
        No public source disclosed seat counts, ACVs, median contract term, renewal rate, or seat-expansion behavior for
        Speak for Business.
      whyItMatters: The 85% employee-adoption claim is directionally positive but does not show commercial durability.
      diligencePath: Request logo-level contract terms, seats sold versus active seats, renewal data, and expansion by cohort.
      relatedQuestionRefs:
        - QU010
        - QU018
        - QU025
      relatedTableRefs:
        - TU005
    - type: missing-source
      severity: material
      topic: Revenue and geography concentration
      missingEvidence: >-
        No reviewed public source disclosed top-customer revenue share, Korea versus ex-Korea revenue mix, or partner
        concentration.
      whyItMatters: Korea-origin growth could still dominate economics even as the product expands globally.
      diligencePath: Request revenue, users, and B2B ARR by geography plus top-10 customer concentration.
      relatedQuestionRefs:
        - QU019
        - QU024
        - QU025
      relatedTableRefs:
        - TU005
    - type: enumeration-incomplete
      severity: minor
      topic: Named customer proof table is only a sample
      missingEvidence: >-
        Publicly accessible named proof is much richer for consumer reviewers than for the 200+/500-company employer
        base.
      whyItMatters: Sampling can overstate the breadth and maturity of enterprise proof if the unseen base behaves differently.
      diligencePath: Request a segmented customer roster, 10 reference calls, and deployment stage for the largest employer logos.
      relatedQuestionRefs:
        - QU016
        - QU025
      relatedTableRefs:
        - TU003
    - type: missing-source
      severity: minor
      topic: Balanced complaint and satisfaction evidence
      missingEvidence: >-
        Speak's official review page is curated to 5-star App Store reviews, while independent complaint surfaces are
        sparse and mixed quality.
      whyItMatters: Without balanced sampling it is hard to estimate true support burden, complaint incidence, or downside churn.
      diligencePath: >-
        Pull raw rating distributions, support-ticket volumes, refund rates, and complaint-resolution SLAs from Apple,
        Google, and internal support systems.
