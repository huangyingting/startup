  - id: TU005
    title: Expansion and concentration risk table
    columns:
      - Expansion driver
      - Concentration / friction risk
      - Impact
      - Diligence path
    rows:
      - - Consumer-to-employer upsell
        - B2B adoption may still be heavily seeded by Korea-based consumer demand
        - Could overstate global enterprise repeatability if Korea remains the dominant proving ground
        - Request enterprise ARR, seats, and renewals by country
      - - Speaking-first differentiation and strong ratings
        - Public ratings do not show whether paid cohorts renew at attractive rates
        - Adoption quality may look better than revenue durability
        - Request annual-plan renewal curves and refund rates
      - - More countries and more languages
        - Language-catalog complaints suggest some users want unsupported languages or better localization
        - Can cap TAM in adjacent learner segments and raise churn risk after initial trial
        - Request language roadmap, waitlist size, and retention by new language
      - - Employer-sponsored adoption metric
        - 85% employee adoption is promising but lacks context on seat counts and contract value
        - Could reflect a small, highly engaged subset rather than scaled enterprise expansion
        - Request logo-level seat activation and ACV distribution
      - - Self-serve subscription pricing
        - Auto-renewing subscriptions and refund complaints can create support and involuntary churn burden
        - Consumer churn and brand sentiment may be more volatile than ratings imply
        - Request refund, cancellation, and chargeback metrics by store
      - - Aggregate enterprise count
        - No public roster for the 200+/500-company base means concentration cannot be checked
        - A few large logos could drive a disproportionate share of B2B revenue
        - Request top-10 logo revenue share and sponsor concentration
    notes: The public record supports expansion narratives, but not a clean concentration bridge.
