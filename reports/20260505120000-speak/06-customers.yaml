  - calloutType: insight
    title: The best named proof is duplicated learner testimony, not enterprise case studies
    body: >-
      Speak can show specific users and concrete self-reported outcomes across official and public review surfaces, but
      it still lacks a deep public library of named enterprise deployments.
    claimRefs:
      - CU031
      - CU032
      - CU033
      - CU048
  - calloutType: risk
    title: Retention and concentration remain the chapter's main unresolved risks
