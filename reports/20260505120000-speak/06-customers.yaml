        - Mostly positive in the accessible sample
        - No full rating-distribution or refund data
      - - Google Play reviews
        - Customer-proof
        - Large Android review base plus visible complaints on recognition and language handling
        - Mixed positive and negative examples are visible
        - No payer-status or retention linkage
      - - Speak official review page
        - Curated customer-proof
        - Duplicates real named reviews and makes them easy to inspect
        - Positively selected because it is limited to 5-star App Store reviews
        - Cannot stand alone as a balanced satisfaction read
      - - LanguaTalk review
        - Independent review
        - Structured critique of feedback depth, lesson variety, and speech-recognition leniency
        - Adverse
        - Reviewer sample size is small and editorial
      - - JustUseApp reviews
        - Independent complaint aggregation
        - Refund, language-coverage, and missing-content complaints appear publicly
        - Adverse
        - Aggregation quality is weaker than first-party store data
    notes: This table isolates review-surface quality so the retention table can stay focused on durability metrics.
