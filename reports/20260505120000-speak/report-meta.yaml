    - name: Andrew Hsu
      role: Co-founder, CTO
      background: Technical co-founder shaping Speak's product, speech, and AI stack.
      claimRefs: []
  foundingLocation: San Francisco, California, USA
  headquarters: San Francisco, California, USA
  productSummary: Speak delivers AI-guided speaking practice, pronunciation feedback, structured lessons, live roleplays, and multilingual tutoring through mobile apps and an enterprise training product.
  customerFocus: Consumers learning spoken English and other languages, plus employers using English upskilling and workplace language practice.
  businessModel: Consumer subscriptions with in-app pricing plus enterprise seat-based or contract language-training offerings.
  stage: Series C private / growth-stage edtech unicorn
  fundingStatus: Raised $78M Series C in December 2024 at a $1.0B valuation and roughly $162M cumulative funding, after a June 2024 B-extension at a $500M valuation.
