companyProfile:
  summary: Speak is a private AI language-learning company building a voice-first tutor for spoken fluency across consumer and employer use cases. The company pairs a differentiated speaking-focused curriculum with generative AI and speech technologies, giving it stronger product proof than many education apps. Public evidence shows meaningful global distribution and investor support, but still leaves too many financial, retention, and cap-table questions unanswered for a high-conviction price call.
