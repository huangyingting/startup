    rows:
      - - Tutor Lessons
        - New and progressing learners
        - Core / shipping
        - Dynamic AI tutor can correct, answer questions, and redirect rather than just play canned audio
        - No public completion or learning-outcome benchmarks by module
      - - Speaking drills / speaking cards
        - All learners in structured lessons
        - Core / shipping
        - Speaking-first repetition plus in-house matching and phonetic alignment instead of generic quiz mechanics
        - Public evidence is internal-only on matching accuracy and false-positive control
      - - Live Roleplays
        - Learners moving into open-ended practice
        - Shipping, but originally limited rollout in late 2024
        - >-
          Realtime voice conversations combine OpenAI speech-to-speech with Speak proficiency graph, hints, and
          objectives
        - Public rollout breadth by market / plan is not quantified
      - - Free Talk / custom conversations
        - Self-directed learners and higher-intent practice
        - Shipping
        - Open-ended AI conversations personalize scenarios and let users create practice around their own contexts
        - Independent reviews say conversation control and feedback depth still trail serious-learner needs
      - - Progress / review features (Unit Refreshers, Speak Level, side quests)
        - Active learners returning between sessions
        - Shipping / staged by market
        - Adds retention loops and measurable fluency tracking on top of speaking workflow
        - Speak Level was still limited to English learners in select markets entering 2026
    notes: >-
      Public surfaces show a coherent module stack, but several higher-order quality claims remain internal or
      rollout-limited.
