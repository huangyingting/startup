artifact: product-tech
slug: speak
runDate: '2026-05-05'
company:
  name: Speak
chapter:
  number: 5
  title: Product & Technology
  summary: >-
    Speak pairs a speaking-first curriculum with a non-trivial real-time voice stack; public evidence is strong on
    speech UX and weaker on formal trust/compliance disclosure.
sections:
  - id: product-surface
    title: Product surface and learner workflow
    body: >-
      Speak’s public product story is unusually coherent: the app is sold as a speaking-first AI tutor, not a vocabulary
      game or grammar-reference tool. Across the homepage, app-store listings, and product posts, the same workflow
      repeats: learners enter a structured lesson, speak target phrases out loud, receive immediate corrective feedback,
      and then apply what they practiced in freer AI conversations. That workflow is now formalized as the Speak
      Method’s Learn → Practice → Apply loop. In practice, the visible module set includes Tutor Lessons, speaking
      drills / speaking cards, roleplays, free-form conversations, progress tracking, and newer review or proficiency
      features such as unit refreshers and Speak Level. The product surface is still primarily mobile-first, but it is
      no longer just an English-learning app; public help content shows six target languages for learners and 15
      native-language entry points for English instruction. The main strategic takeaway is that Speak has a tight
      workflow fit between pedagogy and product packaging: every major module is ultimately in service of getting the
      learner to speak, compare output, and try again rather than passively consume content.
    claimRefs:
      - C155
      - C156
      - C158
      - C159
      - C160
      - C162
      - C163
      - C202
  - id: architecture
    title: Architecture and operating model
    body: >-
      Speak now discloses more technical detail than many consumer education apps. The 2024 ASR overhaul moved the
      company away from fragmented on-device and third-party speech systems toward a unified backend stack. Speak says
      that stack fine-tunes Conformer-CTC on learner speech, serves inference with Nvidia Riva / Triton on Kubernetes
      and Google Cloud, and uses gRPC plus websocket streaming to return speech feedback quickly enough for lesson
      interactions. In 2025, Speak added Matching v2, which combines streaming ASR with a phonetic model and forced
      alignment; this matters because learner speech often breaks the assumptions built into generic ASR. By early 2026,
      Speak layered a broader voice-agent platform on top: mobile apps connect over WebRTC via LiveKit Cloud;
      voice-agent servers orchestrate external ASR, LLM, TTS, and speech-to-speech providers; and the system chooses
      cascade or speech-to-speech by feature rather than forcing one universal stack. That architecture implies real
      technical depth, but also real operating complexity. Speak is explicitly multi-provider, region-aware, and
      latency-obsessed, with public discussion of failover, tail-latency monitoring, semantic turn detection, and
      provider switching when quality or availability degrades.
    claimRefs:
      - C164
      - C165
      - C166
      - C167
      - C168
      - C169
      - C170
      - C171
      - C172
      - C173
      - C174
