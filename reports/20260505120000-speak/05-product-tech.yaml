      - C180
      - C181
      - C182
  - id: trust-quality
    title: Trust, quality, and support controls
    body: >-
      On trust and operational quality, Speak’s public evidence is mixed but directionally better than marketing-only
      surfaces. The company exposes concrete support workflows: in-app issue flags, troubleshooting guides,
      microphone-permission checklists, and email escalation for unresolved issues. Public store listings also disclose
      basic privacy and platform controls such as encrypted-in-transit data handling, deletion requests, minimum OS
      support, and mobile-only availability. Curriculum quality control is also more explicit than usual for an AI app:
      Speak says lessons are authored by learning designers, AI is used to accelerate production, and humans still
      review the end product. The weaker side of the trust picture is external friction. Independent review sources
      praise voice quality and speaking-centric design, but they also report shallow feedback depth, confusing premium
      tiering, laggy voice recognition episodes, refund complaints, and support delays. More importantly for diligence,
      Speak’s public privacy and terms URLs did not render readable policy text in text-only review, and we did not
      locate public SOC 2, ISO 27001, or similar security assurance artifacts. That leaves a real enterprise-trust gap
      even though consumer support mechanics are clearly visible.
    claimRefs:
      - C183
      - C184
      - C185
      - C186
      - C187
      - C188
      - C189
      - C190
      - C197
      - C198
  - id: differentiation-maturity
    title: Differentiation, maturity, and open diligence asks
    body: >-
      Speak’s strongest product-level differentiation is not just “AI tutor” branding; it is a purpose-built speech
      stack paired with pedagogy that appears customized for language learners rather than retrofitted from a generic
      chatbot. Public claims around learner-accent ASR, phonetic matching, multi-provider TTS selection, and
      feature-specific voice-pipeline choices support that view. External corroboration from OpenAI, TechCrunch, app
      stores, and independent reviewers suggests the market sees the same pattern: a highly polished speaking product
      with strong user love and genuine technical ambition. The maturity signals are credible but should not be
      over-read. Ratings and download counts are strong, app versions are shipping frequently, and Google Play
      recognition suggests real distribution in Asia. At the same time, several underwriting questions remain open: how
      deep the company’s security/compliance program is, whether the richer voice stack is economically efficient at
      scale, how much of the roadmap is still rollout-limited, and whether independent learning-outcome evidence exists
      beyond internal product metrics and customer anecdotes. In short, Speak looks product-strong and technically
      differentiated, but public evidence is much stronger on capability and UX than on formal trust/compliance
      disclosure.
    claimRefs:
      - C177
      - C178
      - C191
      - C192
      - C193
      - C194
      - C195
      - C196
      - C199
      - C200
      - C201
      - C203
      - C204
tables:
