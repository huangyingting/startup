  evidenceGaps:
    - type: access-blocked
      severity: material
      topic: Public privacy and terms detail on speak.com legal pages
      missingEvidence: >-
        The public privacy and terms URLs resolved during review, but text-only fetch returned only a JS shell rather
        than readable policy language.
      whyItMatters: >-
        Product and compliance diligence needs verifiable language on retention, third-party processors, minors,
        biometrics / voice data, and user rights.
      diligencePath: >-
        Request the rendered privacy policy, terms, DPA / subprocessors list, and any region-specific data-handling
        addenda directly from the company.
      relatedQuestionRefs:
        - RQ018
      relatedTableRefs:
        - T504
    - type: missing-source
      severity: material
      topic: Public security certification and trust-center evidence for Speak
      missingEvidence: >-
        No retained source surfaced a public SOC 2, ISO 27001, penetration-test summary, security whitepaper, or status
        / incident page for Speak.
      whyItMatters: >-
        If Speak is pushing deeper into business learning or enterprise accounts, buyers will likely require more than
        consumer help-center workflows and store disclosures.
      diligencePath: >-
        Ask for the security packet, audit letters, architecture diagram for production data, incident history, and
        enterprise security questionnaire responses.
      relatedQuestionRefs:
        - RQ023
      relatedTableRefs:
        - T504
    - type: missing-source
      severity: minor
      topic: Public API docs or web / desktop product surface
      missingEvidence: >-
        Public help content confirms iOS / Android support and no desktop PC support, but retained sources did not
        reveal public API documentation, integrations docs, or a production web client.
      whyItMatters: >-
        Integration optionality and non-mobile deployment paths can matter for enterprise adoption, partnerships, and
        accessibility.
      diligencePath: Request product roadmap detail on desktop / web, public or partner APIs, and enterprise integration surfaces.
      relatedQuestionRefs:
        - RQ024
      relatedTableRefs:
        - T501
    - type: private-evidence-only
      severity: minor
      topic: Independent learning-outcome validation beyond internal product metrics
      missingEvidence: >-
        Retained sources provide internal model-performance statistics and customer anecdotes, but not standardized
        third-party efficacy studies or externally audited fluency outcomes.
      whyItMatters: >-
        Public ratings and downloads show adoption, but they do not prove durable learning efficacy, advanced-learner
        success, or ROI in business settings.
      diligencePath: >-
        Ask for cohort retention by module, CEFR / proficiency progression studies, enterprise learning-outcome data,
        and any experimental evidence comparing Speak with alternatives.
      relatedQuestionRefs: []
      relatedTableRefs:
        - T502
        - T505
