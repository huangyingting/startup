  - id: T502
    title: Workflow / use-case table
    columns:
      - User job
      - Current workflow / pain point
      - Speak solution
      - Publicly observable benefit
      - Limitation / caveat
    rows:
      - - Start speaking quickly
        - Traditional apps over-index on reading, grammar, or vocabulary recognition
        - Speaking-first onboarding with immediate repetition and feedback
        - Homepage and reviews repeatedly describe learners speaking from day 1
        - Benefit is mostly anecdotal rather than third-party efficacy-tested
      - - Practice realistic conversations
        - Human tutors are expensive and hard to schedule
        - Roleplays and Free Talk simulate common scenarios with AI partners
        - Users and independent reviews both highlight real-world conversation practice
        - Some reviewers say the AI can feel repetitive or over-questioning
      - - Correct pronunciation or delivery
        - Generic ASR misses accented learner speech
        - Custom ASR plus matching stack, with speech-to-speech where audio nuance matters
        - Speak reports faster feedback and lower WER after backend upgrades
        - Most performance numbers are internal and not externally benchmarked
      - - Resume after breaks / stay motivated
        - Language apps often lose users between sessions
        - Unit Refreshers, streak systems, side quests, and Speak Level progress views
        - Winter 2025 release explicitly added retention and progress surfaces
        - Some app-store reviews still ask for richer rewards and more gamified loops
      - - Learn another language as an English speaker
        - Prior Speak product focused on English learners in Asia
        - 2025 language expansion added French, Japanese, Korean, and Italian after Spanish
        - Public help pages now document six target languages
        - Intermediate depth outside flagship tracks remains incomplete
    notes: >-
      The workflow is strongest where Speak can keep the learner in a tight speak-hear-correct loop; open-ended mastery
      and breadth remain less verified.
    claimRefs:
      - C155
      - C158
      - C162
      - C163
      - C169
      - C172
      - C196
      - C198
      - C204
  - id: T503
    title: Technology / operating architecture table
    columns:
      - Layer / process / component
      - Role
      - Key dependency
      - Principal risk
    rows:
      - - Mobile iOS / Android clients
        - Capture learner audio, play responses, host lesson UX
        - Native mobile apps; OS permissions; current versions
        - No desktop fallback and microphone permissions can break voice workflows
      - - Realtime transport
        - Low-latency bidirectional audio between clients and backend
        - WebRTC via LiveKit Cloud; regional routing
        - External platform dependency and cross-region latency variation
      - - Voice-agent runtime
        - Runs lesson logic, turn-taking, hints, corrections, and orchestration
        - LiveKit Agents plus Speak application logic
        - Complexity grows as feature count and provider permutations expand
      - - Speech recognition and matching
        - Transcribe learner speech and map it to lesson targets
        - Fine-tuned Conformer-CTC, Nvidia Riva/Triton, wav2vec2 phonetic model, forced alignment
        - Internal metrics are strong but externally unaudited; accent edge cases still exist
      - - LLM / TTS / speech-to-speech providers
        - Generate tutor responses and voice output
        - OpenAI Realtime API, external LLM/TTS providers, backup-provider routing
        - Multi-provider cost, reliability, and model-quality variance
      - - Learning engine and content systems
        - Store lessons, proficiency graph, conversation state, analytics
        - Speak backend services and curriculum systems
        - Limited public evidence on data governance, evals, and versioning discipline
      - - Observability and failover
        - Measure latency / errors and reroute traffic when providers degrade
        - Per-provider metrics, backup routing, region-aware operations
        - Public disclosures do not quantify uptime or incident history
    notes: >-
      Speak’s technical disclosures indicate a real production ML stack rather than a thin wrapper around one model
      vendor.
