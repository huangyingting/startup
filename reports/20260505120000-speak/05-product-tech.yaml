callouts:
  - calloutType: strength
    title: Purpose-built speech stack is the core product moat candidate
    body: >-
      Public technical writing suggests Speak is not simply wrapping a generic chat model. It has invested in
      learner-accent ASR, phonetic matching, feature-specific voice pipelines, provider failover, and a pedagogy-aware
      learning engine. That combination is the clearest source of product-tech differentiation visible from public
      evidence.
    claimRefs:
      - C165
      - C170
      - C176
      - C178
      - C181
  - calloutType: risk
    title: Trust disclosure still trails product sophistication
    body: >-
      Support workflows and mobile-store data-safety disclosures are visible, but formal enterprise-grade trust
      artifacts are not. Privacy / terms pages were not directly readable in text-only review, and we did not locate
      public security certifications or uptime / incident disclosures. That is a meaningful diligence gap if Speak wants
      larger business or regulated deployments.
    claimRefs:
      - C187
      - C188
      - C190
      - C197
