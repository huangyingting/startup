        - Text-only review returned JS shells, reducing direct diligence visibility
      - - Security certifications / audits / trust center
        - Not found publicly
        - No public SOC 2, ISO 27001, penetration-test summary, or uptime page retained in chapter evidence
        - Material diligence gap if underwriting enterprise expansion or regulated buyers
    notes: Trust evidence is adequate for a consumer app review but incomplete for deeper enterprise or privacy diligence.
