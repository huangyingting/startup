companyProfile:
  summary: |
    Torq is a cybersecurity hyperautomation company founded in 2020 by Eldad Livni (CEO) and
    Leonid Belkind (CTO), veterans of Check Point Software. The company's platform combines a
    no-code/low-code security workflow engine with 1,000+ integrations, Socrates AI (a proprietary
    multi-agent reasoning layer), and HyperSOC — an autonomous SOC tier-replacement product that
    claims 90–95% autonomous Tier-1 alert resolution. HyperSOC 2.0 (GA Q4 2025) extends to Tier-2
    autonomous investigation and proactive threat hunting. The RevRod acquisition (2025, ~$20M)
    added AI-powered threat intelligence enrichment. Torq serves 300+ enterprise customers including
    Marriott, PepsiCo, and P&G, with a $140M Series D at a $1.2B valuation (January 2026) led by
    Merlin Ventures. The platform is cloud-native SaaS only (AWS/Azure) with SOC 2 Type II and
    FedRAMP authorization in progress.
  foundedDate: "2020-01-01"
  founders:
    - name: Eldad Livni
      role: Co-Founder & CEO
      background: Former CEO of IOI Digital; 15+ years cybersecurity; led Check Point product lines; architect of Torq's go-to-market and enterprise sales strategy.
      claimRefs: [CO002]
    - name: Leonid Belkind
      role: Co-Founder & CTO
      background: Former VP Engineering at Check Point; platform architect and head of Torq engineering; designed the hyperautomation engine and Socrates AI architecture.
      claimRefs: [CO002]
  foundingLocation: Herzliya, Israel
  headquarters: New York, NY (commercial HQ); Herzliya, Israel (R&D headquarters)
  productSummary: |
    Torq's product portfolio centers on the Hyperautomation Platform (no-code/low-code workflow
    engine connecting 700+ pre-built connectors to 1,000+ security and IT tools), HyperSOC v1.0
    (autonomous Tier-1 alert resolution via Socrates AI), HyperSOC 2.0 (Tier-2 autonomous
    investigation and proactive threat hunting, GA Q4 2025), and RevRod AI enrichment (CTI
    aggregation from 15+ threat intelligence feeds). Customers connect their full security stack —
    SIEM, EDR, cloud security, identity, ticketing — to Torq, which then orchestrates automated
    investigation and response workflows. Enterprise security engineers build playbooks via
    drag-and-drop, with a full Python escape hatch for advanced use cases. Socrates AI uses
    chain-of-thought multi-agent reasoning to investigate alerts autonomously, generating audit
    trails of all AI decisions for human review.
  customerFocus: Large enterprise security teams (1,000+ employee organizations) with complex, multi-vendor security stacks across financial services, retail, healthcare, insurance, manufacturing, and MSSP verticals. Named customers include Marriott, PepsiCo, P&G, Marsh McLennan, Penn Mutual, Fujitsu, and La-Z-Boy.
  businessModel: "SaaS subscription (ARR model): platform access fee plus per-automation-action or per-connector pricing. Average deal size estimated $200K–$500K ARR. Professional services for onboarding (4–8 weeks). MSSP partner program launched Q2 2026 adds reseller channel revenue. No on-premises offering."
  stage: Series D
  fundingStatus: "$282M total raised: Seed/Series A ($8M, 2020-2021), Series B ($42M, 2022), Series C ($92M, 2023-2024), Series D ($140M, January 2026, led by Merlin Ventures at $1.2B post-money valuation)."
  disclosureProfile: private-undisclosed
  claimRefs: [CO001, CO002, CO003, CO007, CO009, CO014]

summary:
  headline: "Torq is the most credible pure-play AI-SOAR challenger to incumbent SOAR platforms, but the core thesis rests on an unaudited autonomous resolution claim and a 1–2 year window before XDR native AI triage commoditizes its Tier-1 value proposition."
