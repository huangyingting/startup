      - number: '8.3'
        title: 退出准备度与最终尽调事项
        blocks:
          - type: paragraph
            body: >-
              Torq 最可信的退出路径有两条：（1）若 ARR 超过 $100M、NRR 高于 110%、三年收入 CAGR 高于 60%，2027–2028 年冲刺 IPO；（2）由 CrowdStrike、Palo
              Alto Networks 或 Cisco 以 10–20x ARR 倍数战略收购，补上收购方的 AI-SOC 能力缺口。几项 IPO 准备度指标已经到位：Bessemer 领投后的独角兽估值、Cloud100
              2025 入选、约 200 人且具备深厚领域经验的团队、SOC 2 Type II 认证，以及 300+ 企业账户带来的广泛客户验证。出资前必须进数据室核清的关键缺口包括：经审计 ARR 与同比增长率，因为
              $50–70M 区间只是分析师估算、尚未证实；按客户队列拆分的 NRR，这是判断平台黏性和 IPO 准备度最关键的单一指标；毛利率结构，若要支撑高端 SaaS 倍数，应达到 70%+；客户集中度，尤其是前 10
              大客户占总 ARR 的比例；FedRAMP 授权状态及进入联邦市场的时间表；以及联合创始人 Eldad Livni（CEO）和 Leonid Belkind（CTO）的关键人留任安排。公司累计融资
              $255M，偏好权悬在股权结构表上；若退出估值低于 $2B，IPO 时会产生实质性稀释，因为约 $1.05B 投后估值的 Series D 清算优先权会先吃掉退出所得的前 $1B+，普通股东才开始分到价值。表
              TV005 已把破坏投资假设的触发条件操作化：严重性最高的四项是 CrowdStrike 收购竞争性 AI-SOC 平台、NRR 连续两个季度低于 100%、具名客户发生重大 AI 引发的安全事件，以及
              Series E 以低于 $900M 估值降价融资。表 TV006 列出六个最终尽调证据缺口；只有补齐后，投委会建议才可从有条件升级为肯定。投委会应准备在开放数据室后 30 天内行动，因为随着 Torq
              继续执行、二级市场溢价上升，Series D 的最佳入场定价窗口会收窄。
