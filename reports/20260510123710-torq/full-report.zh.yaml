      - number: '4.2'
        title: GTM 动作与销售效率
        blocks:
          - type: paragraph
            body: >
              Torq 采用直销企业销售模式，并辅以增长中的渠道伙伴计划，目标是 MSSP、VAR 和全球系统集成商。SOAR/AI-SOC 平台的企业销售周期通常为 3–9 个月，因为 SOC 集成复杂，且安全团队
              champion 需要推动采购决策。Torq 的周期可能偏向 4–7 个月；无代码部署优势降低了实施摩擦，相比需要大量脚本的传统 SOAR 工具更快。


              公司报告的 2025 年同比 300% 收入增长若准确，表现非常突出，可能意味着基数较小、产品市场匹配异常强，或两者兼有。作为背景，可比规模（低于 $100M ARR）的最佳企业 SaaS
              公司面向安全运营买家时，通常靠既有账户扩张实现 80–150% 净收入留存率（NRR）；这与 Torq 在企业 SOC 环境中的 land-and-expand 模型一致，告警量会随云采用自然增长。公司公开点名的
              Fortune 500 客户包括 Marriott、PepsiCo、Procter & Gamble、Siemens、Uber 和 Virgin Atlantic，为其企业市场渗透提供社会证明，也与
              $100K–$500K+ ACV 区间相符。


              可比企业安全 SaaS 公司的获客成本（CAC）估计为每个企业 logo $50,000 到 $150,000；按 Torq 估计 ACV 区间，意味着回本周期 12–30
              个月。没有披露销售和营销支出，销售效率代理指标很难计算；但 Torq 350+ 员工数和 2026 年计划扩张 200 人，显示 GTM 投入显著。按当前员工数估计年运营费用约
              $50M–$70M，隐含获客经济性将是关键尽调问题。MSSP 和 VAR 渠道经济性可能显著改善混合 CAC，但渠道收入质量——利润率、留存和粘性——尚未验证，需要直接尽调具名渠道伙伴。
