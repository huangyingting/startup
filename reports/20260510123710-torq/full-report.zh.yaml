      - number: '6.4'
        title: 客户留存、满意度与扩张机制
        blocks:
          - type: paragraph
            body: >
              Torq 的客户留存由深度工作流自动化投入驱动：客户一旦在 Torq 平台上构建并部署 50+ 条自动化工作流，切换成本就会变高，
              因为每条工作流都代表被编码进自动化逻辑的机构知识。这会在合同锁定之外形成自然留存机制。Torq 尚未公开披露 net revenue retention（NRR）或 gross revenue
              retention（GRR），但公司声称的指标暗示 NRR 高于 120%， 符合安全自动化平台里一流企业 SaaS benchmark。G2 和 TrustRadius 评论持续给 Torq
              的客户支持响应速度、 onboarding 体验和平台可靠性打高分。来自经验证安全从业者的 PeerSpot 评论突出平台强 API 集成能力和高质量预置工作流模板，
              认为它们是满意度关键驱动因素。扩张机制由三条路径驱动：横向扩张（在同一组织内增加更多用例和工作流类别）、 纵向扩张（随着 SOC 团队增长增加更多用户和
              seat），以及生态扩张（随着客户安全栈演进集成更多安全工具）。 MSSP 客户扩张尤其强，因为每个新增 MSSP 客户部署都带来经常性收入，不必重新谈判 Torq license。Reddit
              和安全社区讨论也浮现一些担忧：小团队 onboarding 复杂，某些集成偶尔出现 API rate limiting。这些都是持续产品改进空间。
              医疗和金融服务客户面临特定监管合规要求（HIPAA、PCI-DSS、SOX），Torq 的审计 trail 和合规报告功能正是为此设计， 也让监管行业客户更黏。
