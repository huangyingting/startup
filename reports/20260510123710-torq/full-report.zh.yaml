companyProfile:
  summary: >
    Torq 是一家网络安全超自动化公司，2020 年由 Eldad Livni（CEO）和 Leonid Belkind（CTO）创立，两人均为 Check Point Software 老兵。公司平台把无代码 /
    低代码安全工作流引擎、1,000+ 集成、Socrates AI（自研多智能体推理层）和 HyperSOC 组合在一起；HyperSOC 是一款自主 SOC 层级替代产品，声称可自主解决 90–95% 的 Tier-1
    告警。HyperSOC 2.0（2025 年 Q4 GA）扩展到 Tier-2 自主调查和主动威胁狩猎。RevRod 收购（2025 年，约 $20M）补上了 AI 驱动的威胁情报增强。Torq 服务 300+ 企业客户，包括
    Marriott、PepsiCo 和 P&G；2026 年 1 月由 Merlin Ventures 领投 $140M Series D，估值 $1.2B。平台仅提供云原生 SaaS（AWS/Azure），已具备 SOC 2
    Type II，FedRAMP 授权推进中。
