      - number: '6.5'
        title: 扩张机会与集中度风险
        blocks:
          - type: paragraph
            body: >
              Torq 的扩张机会主要有三个维度：从北美向 EMEA 和 APAC 做地理扩张，进入监管行业垂直（待 FedRAMP 的联邦政府、医疗、金融），以及通过把 HyperSOC upsell 给仅使用
              Hyperautomate 的客户做产品驱动扩张。 联邦政府垂直代表重大未开发机会：Torq 正在积极推进 FedRAMP 授权；一旦获批，就能打开 DHS Continuous Diagnostics and
              Mitigation（CDM）等框架下的美国联邦机构合同。联邦新闻报道和 GovInfoSecurity 文章显示， 联邦网络安全自动化预算在增长。医疗也是同样有吸引力的监管垂直，原因是 HIPAA
              事件响应要求和 ransomware 威胁上升。ChannelFutures 和 MSSP Alert 报道确认，MSSP 渠道扩张是近期优先事项，Torq 正投入 MSSP
              专属定价、培训和联合销售项目。收入集中度风险仍是开放问题：Torq 未披露前五或前十客户贡献 ARR 的比例； 对这个阶段的公司来说，前十大账户集中度若超过 30%，就是实质性风险。MSSP
              渠道带来特定集中度动态： 单个 MSSP 可能贡献超大 ARR，但每个 MSSP 客户自身又带有分散的终端客户组合，部分缓释了最终集中度暴露。 Torq 的以色列工程血统和欧洲数据主权合规姿态支持向 EMEA
              做国际扩张，但 GDPR 合规义务和 EU AI Act 不确定性会增加监管摩擦。Palo Alto Networks 和 CrowdStrike marketplace 集成提供嵌入式分销，可通过
              co-sell 项目推动既有客户账户扩张。
