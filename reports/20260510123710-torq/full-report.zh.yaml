  - id: TV004
    title: 可比估值表
    columns:
      - 可比公司
      - 类型
      - ARR 倍数 / 估值
      - 可比性
      - 局限
    enumerationScope:
      coverage: partial
      basis: >-
        Comparable set drawn from public company SEC filings, investor relations press releases, and publicly disclosed
        private funding rounds. Private company ARR multiples are analyst-estimated from round size and publicly
        available growth benchmarks. Not all AI-SOC or SecOps SaaS companies with recent transactions are included;
        smaller or less-disclosed private rounds are excluded due to insufficient public data. Coverage is partial
        rather than exhaustive.
    rows:
      - - CrowdStrike (CRWD)
        - 公开上市 AI 安全平台
        - 约 NTM 收入 15x（2026 年初）
        - 最可比的公开公司；AI 原生安全平台正通过 Charlotte AI 扩展 SOC 自动化；为 AI 安全估值倍数设定上限
        - 规模更大（$4B+ ARR）；平台更广（EDR/XDR 核心，而 Torq 聚焦 SOC 自动化）；公开市场流动性溢价高于私人估值
      - - SentinelOne (S)
        - 公开上市 AI 安全平台
        - 约 NTM 收入 10x（2026 年初）
        - 较早增长阶段的 AI 安全平台可比样本；现在进入成熟期，增长放缓，倍数从 20x+ 峰值压缩
        - 纯 AI 端点安全业务；SOC 自动化只是相邻能力而非核心；增长放缓后 NTM 倍数压缩；作为成长阶段可比样本适用性较低
      - - Palo Alto Networks (PANW)
        - 公开上市平台型安全公司，含 XSIAM AI-SOC
        - 约 NTM 收入 12x（2026 年初）
        - XSIAM 产品直接竞争 AI-SOC 赛道；最大安全平台拥有 $9B+ ARR，可提供规模基准和竞争背景
        - Palo Alto 的倍数反映成熟多元平台；XSIAM 只是一个产品线，未单独拆分；作为纯 AI-SOC 可比样本适用性较低
      - - Rapid7 (RPD)
        - 公开上市成熟 SecOps SaaS
        - 约 NTM 收入 3x（2026 年初）
        - 提供下行情景基准；成熟 SecOps SaaS 增长较慢，XDR 商品化加速后倍数从 8x+ 峰值压缩
        - 对 Torq 成长阶段可比性低；Rapid7 是增长下滑业务，更像悲观情景轨迹，而非同业基准
      - - Abnormal Security
        - 私人 AI 安全 Series D（2025）
        - 约 ARR 20x（分析师估计）
        - 最可比的私人公司；AI 原生安全平台，处于 Series D；增长画像和投资人质量（Insight Partners）相近，验证 15-21x 区间
        - ARR 和倍数为分析师估计，未公开披露；聚焦邮件安全而非 SOC 自动化；需要做子行业调整
      - - Vanta
        - 私人安全 SaaS Series C（2024）
        - 约 ARR 18x，对应 $2.45B 估值（分析师估计）
        - Series C/D 阶段的安全 SaaS 平台可比样本；说明高增长、强 NRR 的安全 SaaS 能在私募轮拿到溢价倍数
        - 子行业不同（合规自动化 vs. SOC 自动化）；市场定位可比性没那么直接；Vanta 有已确认收入基础
    notes: >-
      公开公司倍数来自 SEC 文件和投资者关系披露；NTM 收入估计来自截至 2026 年初的分析师共识。私人公司 ARR
      倍数根据公开披露的融资轮规模和公开可得的增长率评论估算。在拿到实际公司财务前，所有私人公司倍数都只能视为指示性。
    claimRefs:
      - CV008
      - CV009
      - CV010
      - CV011
      - CV012
      - CV013
      - CV025
      - CV026
  - id: TV005
    title: 打破投资逻辑与终止触发因素表
    columns:
      - 风险 / 投资逻辑依赖
      - 可监控触发因素
      - 阈值 / 事件
      - 行动含义
    rows:
      - - CrowdStrike 收购竞争性 AI-SOC 自动化平台
        - CrowdStrike 并购公告；Charlotte AI 产品路线图披露；SEC 8-K 文件
        - CrowdStrike 收购任何 ARR >$50M 的 AI 原生 SOC 自动化公司，或宣布面向企业级规模的竞争性智能体 SOC 产品
        - 退出持仓或拒绝跟投；收购后 18 个月内，CrowdStrike 的分发能力会使 Torq 可触达 TAM 压缩 30-50%
      - - 净收入留存率（NRR）低于 100%
        - 通过投资人更新或数据室访问按季度监控 NRR；渠道合作伙伴反馈
        - 任意连续两个季度报告中 NRR <100%；意味着净流失加速和竞争替代
        - 立即复盘持仓；AI-SOC 平台 NRR <100%，意味着平台捆绑压力或产品市场匹配恶化正在兑现
      - - 具名客户发生由 AI 引发的重大安全事件
        - 安全事件披露数据库；Torq 客户提交的 SEC 网络事件 8-K 文件；行业媒体
        - 任何公开报道将具名企业客户的重大泄露或漏检归因于 Torq HyperSOC 自主响应失败
        - 全面停止；声誉风险足以危及存续，可比 CrowdStrike 2024 年 7 月传感器事件；监管审查可能跟进；客户流失连锁反应
      - - Series E 融后估值低于 $900M 的下轮融资
        - 下一轮融资公告；通过 Forge 或 EquityZen 获取二级市场定价；LP 季度估值标记
        - Series E 或二级市场定价隐含融后估值低于 $900M（较 Series D 回撤 14%）
        - 下轮融资释放投资人信心恶化信号；触发优先股压力复盘和 LP 减记决策；评估退出还是持有
      - - FedRAMP 授权被拒或放弃
        - marketplace.fedramp.gov 上的 FedRAMP 市场状态；Torq 官方公告；GSA 更新
        - Torq 从 FedRAMP 授权管线移除，或公开确认 2027 年后不再追求联邦市场
        - TAM 显著收缩；美国联邦网络安全市场（估计 $5B+）永久不可进入；乐观情景崩塌
    notes: 终止触发因素设计为可衡量且有时间边界。监控频率：NRR 和竞争格局按季度；并购公告和安全事件持续监控；FedRAMP 市场状态每半年更新。
    claimRefs:
      - CV036
      - CV037
      - CV038
      - CV028
      - CV029
  - id: TV006
    title: 最终尽调问题表
    columns:
      - 主题
      - 缺失证据
      - 重要性
      - 负责人或尽调路径
    rows:
      - - 经审计 ARR 与增长率
        - 没有公开披露或经审计的 ARR 数字；分析师估计 $50-70M，但未经验证和确认
        - ARR 决定隐含 15-21x 倍数是否站得住；ARR 低于 $40M 意味着 26x+ 倍数，高于所有可比先例
        - 管理层数据室；要求提供过去 8 个季度按客户队列拆分的月度 ARR 和同比增长率，作为 IC 批准前置条件
      - - 按队列划分的净收入留存率（NRR）
        - NRR 未公开披露；任何来源都没有公开客户流失或扩张收入数据
        - NRR 高于 110% 是 IPO 准备度最重要的单项指标；NRR 低于 100% 是打破投资逻辑的触发因素，必须立即复盘
        - 管理层数据室；要求提供 2022-2025 年度客户队列的 NRR，并拆分总流失和净流失
      - - 毛利率画像
        - 没有公开 GAAP 毛利率数据；根据 SaaS 网络安全基准推断为 70-75%，但未确认
        - 毛利率低于 65%，相对于高毛利同业会压缩 3-5x 估值倍数，并削弱 IPO S-1 准备度
        - 管理层数据室；要求提供 FY2024 和 FY2025 GAAP 毛利率及收入成本拆分
      - - 客户集中度
        - 前 10 大客户 ARR 贡献未公开披露；没有可用的瀑布图或集中度数据
        - 前 3 大客户超过 ARR 30%，会显著加重悲观情景严重性，并提高 IPO 过程中对集中度风险的感知
        - 管理层数据室；要求提供前 20 大客户 ARR 瀑布图，以及按账户规模拆分的历史流失和扩张数据
      - - FedRAMP 授权时间表
        - FedRAMP 授权状态未确认；“进行中”说法未通过公开市场列表验证
        - FedRAMP 授权是进入 $5B+ 美国联邦市场的二元门槛；如果延后到 2027 年以后，会实质性限制乐观情景 TAM 兑现
        - 直接询问管理层；在 marketplace.fedramp.gov 核验；要求提供正式 FedRAMP 项目计划和发起机构识别信息
      - - 联合创始人留任安排
        - 没有公开披露 Eldad Livni 和 Leonid Belkind 的归属悬崖刷新、竞业限制条款或留任奖金
        - Series D 后联合创始人离职是常见风险因素；市场先例显示，创始人意外退出会带来 60%+ 的 NTM 估值折价
        - 管理层数据室；要求提供股权结构表、创始人和关键高管归属时间表，以及关键人物保险政策确认
    notes: 尽调问题按其对投资建议从有条件正面上调至正面的影响排序。ARR 核验是阻断项；其他均为重大事项。负责人默认为管理层，另有说明除外。
    claimRefs:
      - CV034
      - CV035
      - CV030
      - CV031
