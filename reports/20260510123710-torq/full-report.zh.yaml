      - number: '3.2'
        title: 直接竞争对手画像
        blocks:
          - type: paragraph
            body: >-
              Palo Alto Networks Cortex XSOAR（前 Demisto，2019 年以 $560M 收购）是部署最广的企业 SOAR 平台，嵌入 Cortex XDR 生态，并受益于 Palo
              Alto 80,000+ 客户安装基础。XSOAR 的分发优势是结构性的：几乎每个企业 SOAR 候选清单都会默认出现它。不过，它主要是带 AI 增强的 playbook 编排平台，而不是 AI 优先的自主
              SOC；本地部署基因也让它在云原生价值实现速度对比中吃亏。Cisco/Splunk SOAR（前 Phantom，2024 年 Cisco 以 $28B 收购 Splunk 后并入 Cisco Security
              Cloud）形成垂直整合的 SIEM+SOAR 栈，吸引已在日志管理上押注 Splunk 的组织。IBM QRadar SOAR 是受监管金融和政府市场的偏好选择，借力 Watson AI 和 IBM
              的合规可信度。Swimlane 的 Turbine 平台面向 MSSP 渠道，强调高吞吐自动化和强开发者 API，但需要大量专业服务投入。Tines 已成长为接近 $50M ARR
              的高速增长中端替代方案，刻意采用简单无代码工作流自动化模式。Rapid7 InsightConnect 将 SOAR 集成进 Insight 平台，主要服务 Rapid7 既有 11,000+ 漏洞管理客户。D3
              Security 和 Sekoia.io 服务细分领域：D3 聚焦 MSSP 案件管理，Sekoia 面向需要数据主权的 EU 受监管市场。Torq 2025 年以约 $20M 收购 RevRod，补齐了相对
              Sekoia.io 和 Palo Alto XSOAR Marketplace 的 CTI 集成缺口。
