      - number: '7.5'
        title: 财务与商业模式风险
        blocks:
          - type: paragraph
            body: >-
              Torq 的财务风险画像，反映了一家 Series D 阶段、高增长、尚未盈利的企业 SaaS 公司常见脆弱点。公司 2026 年 1 月以 $1.2B 估值完成 $140M Series
              D，说明投资人看好增长轨迹；但按估计 $8–10M 月 burn 计算，公司在需要追加资本或实现现金流 breakeven 前约有 14–18 个月 runway——如果 2026 年 200
              人招聘计划按公告推进，这个时间表会明显压缩。最具结构性的财务风险是 XDR 商品化：如果 CrowdStrike、Palo Alto Networks、Microsoft 或其他平台供应商，把自主 SOC
              能力作为更大平台 bundle 的原生能力，并以更低增量成本交付， Torq 独立高价定价将受到严重挤压。这不是假设情景——Microsoft Copilot for Security 和 CrowdStrike
              Charlotte AI 都是资源充足的 incumbents 正在推进的活跃产品投入，直接瞄准 Torq 的自主 SOC positioning。NRR 可持续性是二阶财务风险： Torq 估计 120%
              NRR 要求既有账户持续扩张，取决于客户是否真的随时间把自动化部署到更多用例；如果扩张因集成复杂度或内部优先级竞争而停滞， NRR 可能下滑到只剩 retention 的水平。盈利路径尚未说明，且
              2028–2029 年前不太可能实现，这意味着 Torq 要么成功 IPO，要么继续获得私募资本；但后期网络安全估值已较 2021 年峰值明显压缩。收入集中度未量化： 如果前 10 大客户贡献超过 30%
              ARR，即便流失两三个大账户，也可能在 IPO 前实质性削弱增长叙事。
