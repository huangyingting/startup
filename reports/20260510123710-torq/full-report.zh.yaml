  - id: FV001
    title: 投资建议逻辑
    type: flow
    data:
      nodes:
        - id: n1
          label: 市场机会
          detail: 2030 年 SOAR / AI-SOC TAM 达 $20-30B；CAGR 20%+；SOC 分析师严重短缺，拉动结构性需求
        - id: n2
          label: 产品差异化
          detail: HyperSOC 智能体 AI；300+ 集成；专为 Tier-1 SOC 分诊和响应打造的自主能力
        - id: n3
          label: 企业客户进展
          detail: 300+ 企业客户；打入 Fortune 500；Cloud100 2025；Bessemer Venture Partners 领投
        - id: n4
          label: 估值风险
          detail: 估计 ARR 倍数 15-21x；$50-70M ARR 未验证；溢价倍数下安全边际有限
        - id: n5
          label: 竞争威胁
          detail: CrowdStrike Charlotte AI；Palo Alto XSIAM；Microsoft Sentinel Automation；平台捆绑风险
        - id: n6
          label: 有条件正面 / 观察名单
          detail: 市场和产品逻辑强；入场价格必须克制；数据室验证完成前，不能上调为全面正面
      edges:
        - from: n1
          to: n6
          label: 支撑
        - from: n2
          to: n6
          label: 支撑
        - from: n3
          to: n6
          label: 支撑
        - from: n4
          to: n6
          label: 约束
        - from: n5
          to: n6
          label: 约束
    notes: 从证据支柱到最终建议的逻辑链。支撑因素（市场、产品、客户进展）与风险因素（估值溢价、竞争强度）相互平衡，得出有条件正面的投资立场；升级仍需要数据室验证。
