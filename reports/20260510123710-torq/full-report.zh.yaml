      - number: '1.2'
        title: 创始人、领导层与关键人物依赖
        blocks:
          - type: paragraph
            body: >-
              Torq 由三位网络安全老兵联合创立，他们此前都有扎实的退出记录和深厚行业经验。Ofer Smadari（CEO）曾联合创立零信任应用访问公司 Luminate Security，后者于 2019 年被
              Symantec 收购；他还曾在 Adallom 和 FireLayers 担任领导职务。Leonid Belkind（CTO）曾联合创立云原生容器安全公司 Twistlock，2019 年 Palo Alto
              Networks 以约 $410 million 收购该公司，证明了他在云安全领域的产品搭建能力。Eldad Livni（Chief Innovation Officer，CINO）也曾与 Smadari
              一起联合创立 Luminate Security，自 Torq 创立以来聚焦技术平台创新。


              创始团队在 Luminate 的共同经历，以及 Twistlock 和 Check Point
              的互补角色，形成紧密的创始人与市场匹配：三人都亲手搭建并放大过企业安全产品，之后又获得大型战略收购方验证。不过，三位联合创始人也构成关键人物集中风险。三人均担任 C
              级运营角色，也是公司主要产品与技术愿景来源。CEO Smadari、CTO Belkind 或 CIO Livni 中任何一人离开，都会在公司冲刺 $100 million ARR
              的阶段制造实质领导风险。Torq 尚未公开董事会构成，也未宣布正式董事会治理结构，外部尽调无法充分判断创始团队之外的决策监督。尽管公司已完成多轮融资，尚无公开消息显示新增独立董事。
