chapters:
  - number: 1
    title: 公司概况
    sections:
      - number: '1.1'
        title: 身份、总部与商业模式
        blocks:
          - type: paragraph
            body: >-
              Torq 是一家私营网络安全公司，成立于 2020 年，美国总部位于 New York, NY，主要研发中心在以色列 Tel Aviv。公司还在 Japan、Germany、Amsterdam 和 London
              设有办公室。Torq 自称 AI Security Operations Center（AI SOC）先行者，提供企业级平台，把 Hyperautomation 与智能体 AI
              结合，以机器速度自主检测、分诊、调查并响应网络安全威胁。平台接入 700+ 第三方安全工具，横跨 SIEM、EDR、云平台、身份提供商和工单系统，让安全团队不用写代码就能自动化工作流。


              商业模式是年度 SaaS 订阅，定价围绕告警量、工作流自动化和企业席位授权。根据独立市场分析，大规模部署的企业合同通常为每年 $150,000 到 $350,000 或更高。Torq 的 GTM
              组合了直销企业销售团队与扩张中的渠道伙伴计划，后者包括大型 VAR、MSSP 和全球技术联盟。公司把平台定位为传统 SOAR（Security Orchestration, Automation, and
              Response）工具的继任者，理由是传统 SOAR 并不是为现代混合云环境或 AI 时代告警量设计。Torq
              的「any-code」路径支持无代码拖拽、低代码和全代码开发，让安全团队无需依赖稀缺工程资源也能搭建复杂自动化；这是推动 Fortune 500 SOC 自下而上采用的关键差异点。
