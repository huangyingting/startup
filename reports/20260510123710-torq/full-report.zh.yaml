      - number: '1.6'
        title: 地理布局、增长计划与联邦市场扩张
        blocks:
          - type: paragraph
            body: >-
              Torq 的美国总部位于 New York，主要 R&D 中心在以色列 Tel Aviv，大部分工程和产品开发团队位于那里。公司还在 Japan、Germany、Amsterdam 和 London
              设办公室，反映其客户遍布 North America、EMEA 和 Asia-Pacific 的跨国企业基础。截至 2026 年初，公司雇用 350+ 人（称为「Torqers」），计划在 2026
              年全年于全球工程、销售和客户成功岗位再招聘约 200 人。


              Series D 的战略意义在于，领投方 Merlin Ventures 帮助 Torq 扩张美国联邦和公共部门市场。Merlin 拥有近 30 年美国政府采购和合规要求导航经验，包括
              FedRAMP，并与美国政府网络安全买家保持深度关系。Torq 若取得 FedRAMP 认证并打入联邦市场，将获得显著新增收入机会；美国联邦政府 2023 财年网络安全支出约 $11 billion。Torq
              的以色列 R&D 基地存在地缘政治风险——估计约 60-70% 工程人才在以色列——但公司没有披露各地具体员工数。Torq 也在 2025 年大幅扩张渠道伙伴计划，与 GuidePoint
              Security、Optiv、Stratascale、Trace3 等主要解决方案提供商合作，并与 CrowdStrike、SentinelOne、Abnormal Security、Check Point 和
              Wiz 建立技术联盟。与 RSM US 的合作把 HyperSOC 集成进 RSM 的托管 SOC 服务，延伸了 Torq 在 MSSP 和 MDR 市场的触达。
