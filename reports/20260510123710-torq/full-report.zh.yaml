      - number: '4.6'
        title: 财务结论与尽调卡点
        blocks:
          - type: paragraph
            body: >
              Torq 的财务叙事很有吸引力，但仅靠公开证据几乎无法核实。300% 增长若真实且可持续，公司会进入企业 SaaS 增长的顶尖梯队；但这个指标必须靠客户 reference
              check、前员工访谈，最好还要靠经审阅或经审计的财务报表独立验证。 $1.2B 估值对应约 10–17x 前瞻 ARR 倍数；若 Torq 是高速增长安全自动化市场里的品类定义者，这一估值合理，
              但一旦增长明显放缓，安全边际很薄。

              收入质量是最大尽调卡点：ARR 是否集中在少数大型企业 logo，SaaS 订阅的高毛利与专业服务的低毛利之间差异有多大， 使用量计费组件仍处早期，这些都需要深挖。RevRod
              收购又带来收入确认复杂性；没有收购条款和交割后整合里程碑， 无法判断影响。公开数据库没有任何 Form D 或同等监管文件，也限制了对投资人权利、清算优先权、反稀释条款的核验。

              对这个赛道而言，Torq 资本强度中等；但 200 人招聘计划会在短期推高现金消耗，可能比 headline runway 暗示的时间更早需要 bridge financing 或 Series
              E。本尽调报告的财务章节更应被当作结构化问题框架， 而不是量化结论文件。最低限度建议尽调步骤包括：（1）FY2023–2025 经审计或经审阅财务报表；（2）按 cohort 和 vintage 拆分的 NRR
              数据；（3）按产品线和客群拆分的收入 bridge；（4）按渠道和客户细分拆分的 CAC 与回本周期；（5）RevRod 收购经济性，包括收购价、整合里程碑和收入贡献预测。
            claimRefs:
              - CI032
              - CI033
              - CI034
              - CI035
              - CI036
