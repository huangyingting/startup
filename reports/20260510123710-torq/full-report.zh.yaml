  - number: 8
    title: 估值
    sections:
      - number: '8.1'
        title: 投资论点与估值背景
        blocks:
          - type: paragraph
            body: >-
              Torq 于 2026 年 1 月完成由 Bessemer Venture Partners 领投的 $140M Series D，post-money 估值约 $1.05B，并进入独角兽行列。此前各轮合计募资
              $115M，包括 Series A（$10M，2021 年）、 Series B（$35M，2022 年）和 Series C（$70M，2023 年）；截至 Series D 交割，累计募资约
              $255M。这笔投资建立在四个相互强化的支柱上。第一，SOAR 和 AI 原生 SOC 自动化市场很大且在加速： 分析师共识预计 2028–2030 年可服务市场达到 $20-30B，复合年增长率超过
              20%，驱动力来自安全告警量爆炸、 全球 SOC 分析师长期短缺，以及可用于分诊工作流的大语言模型能力成熟。第二，Torq 的 HyperSOC 产品代表真正差异化的 agentic AI 架构，专为自主
              Tier-1 SOC 运营打造，而不是把 AI 能力嫁接到传统 SOAR 上；300+ 个预置集成创造网络效应和切换成本。 第三，企业 traction 已经显现：300+ 个具名企业客户，包括 Fortune
              500 账户、Cloud100 2025 认可， 以及 Bessemer 作为领投方的 conviction，都提供了机构验证。第四，Torq 的集成广度和 agentic 工作流编排形成竞争护城河， 相比
              point-solution 竞争者具备可防御差异化。与这些论点相对，反论点集中在：（a）ARR 未经验证， 估计 $50-70M ARR 区间没有公开审计轨迹，且可能实质性更低；（b）估值风险，15-21x
              估计 ARR 的倍数处于溢价端，执行失误空间有限；（c）来自 CrowdStrike Charlotte AI、Palo Alto XSIAM 和 Microsoft Sentinel Automation
              的竞争回应，这些 AI-SOC 竞争者资源充足，可能压缩 Torq 的 TAM 或加速价格压力；（d）平台 bundling 风险，大型安全平台会 bundle AI-SOC 能力。净评估是有条件正面：
              论点可信，市场真实，但在高于 $1.05B 估值投入资本前，必须验证 ARR 和 NRR 数据。入场纪律至关重要。
