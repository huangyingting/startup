  - id: TV003
    title: 乐观 / 基准 / 悲观情景表
    columns:
      - 情景
      - 关键假设
      - 估值 / 回报逻辑
      - 主要风险
      - 概率信号
    rows:
      - - 乐观情景（2028）
        - ARR $150-200M；NRR >=130%；FedRAMP 获批；市场份额占 $30B TAM 的 5-7%；同比增长 60%+ 可持续；没有重大竞争性捆绑
        - NTM 收入 25x；隐含 2028 年估值 $1.5-2.5B；以 NTM 20-30x IPO，对应市值 $3-5B；Series D MOIC 约 2.9x-4.8x
        - FedRAMP 被拒；CrowdStrike 竞争性捆绑；创始团队关键人物离职；宏观环境下企业支出冻结
        - 25%
      - - 基准情景（2028）
        - ARR $80-100M；NRR 110-120%；同比增长 50-70%；无 FedRAMP；维持竞争均势；市场按 15-20% CAGR 增长
        - NTM 收入 12-15x；IPO 估值 $800M-1.5B；Series D MOIC 约 0.8x-1.4x（按入场价看边际，入场纪律至关重要）
        - 如果公开 SaaS 倍数收缩 25-30%，会出现倍数压缩；客户集中度风险；SMB 向企业客户迁移更慢
        - 50%
      - - 悲观情景（2028）
        - ARR 停滞在 $60-70M；NRR <100%；增长 <40%；平台捆绑加速流失；无 FedRAMP；关键人物风险兑现
        - ARR 5-8x；估值 $300-560M；Series E 持平或下轮估值 <$900M；Series D MOIC 约 0.3x-0.7x；入场资金显著亏损
        - CrowdStrike 收购竞争性 AI-SOC 初创公司；发生由 AI 引发的重大安全事件；NRR 连续两个季度 <95%
        - 25%
    notes: ARR 估计来自分析师对融资轮规模、可比增长基准和公开表述的推导。概率信号只是指示性判断，并非精算结果。估值区间使用表 TV004 中公开网络安全 SaaS 可比公司分析的 NTM 收入倍数。
    claimRefs:
