  - number: 3
    title: 竞争格局
    sections:
      - number: '3.1'
        title: 竞争格局概览
        blocks:
          - type: paragraph
            body: >-
              Torq 在 SOAR（Security Orchestration, Automation and Response）和安全超自动化市场中竞争，对手分布在既有平台厂商、专业化厂商和 AI
              原生新进入者等多层。竞争格局可分为四档。第一，既有平台厂商（Palo Alto Networks Cortex XSOAR、Cisco/Splunk SOAR、IBM QRadar
              SOAR）借安装基数带来的分发优势和深度平台集成，占据企业市场份额，但也背着传统本地架构和高度依赖专业服务的部署模式。第二，Swimlane、D3 Security 等专业 SOAR 厂商提供更灵活的编排和面向
              MSSP 的功能，但缺少 Torq 在 HyperSOC 中构建的 AI 自主层。第三，Tines 这类工作流自动化专家用更简单的无代码工作流构建器争夺中端市场，把 AI 分诊叙事让给
              Torq。第四，相邻替代品包括 ServiceNow Security Operations（捆绑 ITSM 安全工作流）、Rapid7 InsightConnect（与漏洞管理集成）、Sekoia.io 等欧洲
              SOAR 厂商，以及自定义脚本、RPA 工具、SIEM 原生抑制规则等非平台替代方案。在尚未承诺 SOAR 的组织里，人工分析师工作流仍是主要支出类别；因此，买家惯性与产品差异化一样，是重要竞争力量。
