      - number: '7.4'
        title: 合作伙伴与依赖风险
        blocks:
          - type: paragraph
            body: >-
              Torq 的平台价值主张严重依赖庞大第三方安全供应商生态的集成稳定性和连续性。这会形成不对称依赖风险：合作伙伴的 API deprecation、定价模型变化或战略转向，都可能在提前通知有限的情况下实质性削弱
              Torq 产品价值。CrowdStrike 是严重性最高的单个合作伙伴依赖：CrowdStrike Falcon 是 Torq 企业客户群中领先的 EDR 平台，CrowdStrike API
              稳定性和合作姿态会直接影响 Torq 自动化端点响应工作流的质量。2024 年 7 月 CrowdStrike Falcon sensor 更新事件造成全球 IT outage
              之后，企业客户对安全软件供应链里的供应商集中度风险更加敏感。Microsoft Sentinel 和 Splunk SIEM 集成同样关键；Microsoft 通过 Microsoft Sentinel
              Automation 和 Copilot for Security 激进开发自有安全自动化能力，同时制造集成依赖风险和竞争威胁风险。AWS 和 Azure hyperscaler 依赖虽被 Torq
              双云架构部分缓释，但整个平台仍集中在两个供应商上；它们的定价、API 政策和服务级别承诺都不是 Torq 能单方面控制的。 Socrates AI 能力对第三方 LLM API 的依赖，带来 LLM
              provider 的模型可用性、定价和服务条款变化风险。 ExtraHop 和 UnderDefense 等 MSSP 渠道伙伴代表另一种方向的依赖：若大型 MSSP 伙伴 churn 或转向竞争平台， Torq
              失去的不只是一个客户，而是整本渠道业务。
