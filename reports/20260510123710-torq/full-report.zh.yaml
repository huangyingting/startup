      - number: '4.4'
        title: 公开牵引指标与财务披露缺口
        blocks:
          - type: paragraph
            body: >
              作为私营公司，Torq 的财务披露严格限于公司和投资人在融资公告及新闻稿中选择分享的内容。最重要的可用牵引信号是：（1）公司声称 2025 年同比收入增长 300%（未经审计）；（2）2026 年约 $100M
              ARR 的隐含目标——来自 Series D 叙事和分析师外推，而非管理层明确披露；（3）2026 年 1 月 Series D 投后估值 $1.2B，按实际达到的 ARR 水平不同，意味着约 10–17x 远期
              ARR 收入倍数。这些指标显示增长势头强劲，但无法独立验证。


              公开渠道完全拿不到的关键财务指标包括：准确当前 ARR、按产品线拆分的月经常性收入（MRR）、净收入留存率（NRR）、毛利率百分比、总客户数、按分群划分的平均合同价值（ACV）分布、销售和营销费用、R&D
              费用、EBITDA 利润率、自由现金流烧钱速度，以及经审计或审阅的财务报表。对 IPO 前私营公司而言，这种信息缺口很常见，但会造成有意义的尽调不确定性，单靠二级研究无法解决。EDGAR 公开数据库中没有任何
              Series D 的 SEC Form D 备案，也进一步限制了对融资条款和投资人权利的独立验证。


              尽调团队可使用的代理信号包括：LinkedIn 员工数增长（可推断每员工收入和人效）、招聘信息分析（可推断招聘优先级和销售动作优先级）、与具名 Fortune 500 账户做客户背调，以及对照已披露指标的
              SOAR 相邻上市公司进行同业基准。Crunchbase、PitchBook 和 CB Insights 的分析师估计可提供额外三角校验，但这些数据库对私营公司的覆盖准确性通常与实际值相差 +/- 30–50%。
