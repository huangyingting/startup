      - number: '4.5'
        title: 资本充足性与现金跑道评估
        blocks:
          - type: paragraph
            body: >
              Torq 在 2026 年 1 月完成 $140M Series D，由 Insight Partners 领投，现有投资方 GGV Capital 和 Bessemer Venture Partners
              参投。至此，公司在五轮有据可查的融资中累计募资 $332M（2020 年 Seed 约 $10M，2022 年 Series A $50M，2023 年 Series B $90M，2024 年 Series C
              $52M，2026 年 1 月 Series D $140M）。若假设公司在 Series D 前约投入 $150–180M 资本——这与 350 人团队、双地域运营、收购 RevRod、激进 GTM
              投入大致匹配——按当前烧钱速度， Series D 预计能提供 18–30 个月 runway。

              当前月度现金消耗估计为 $6M–$10M。仅人员成本一项，双地域模式下每名员工完全摊薄年成本约 $150K–$200K，乘以 350 名员工再除以 12 个月，即
              $4.4M–$5.8M；还要叠加云基础设施、G&A 和 GTM 支出。公司计划 2026 年新增 200 人，这会显著抬高 burn：若 200 个岗位都按相近完全摊薄成本落地， 到 2026 年底月 burn
              可能升至 $10M–$15M。以 $140M 融资额计算，Series D 后有效 runway 为 12–24 个月，核心取决于招聘执行的速度与成本，以及收入增长能抵消多少新增费用。

              下一次融资触发点最可能与达到或接近 $100M ARR 里程碑绑定；若达成，公司有望以不低于当前 $1.2B 估值完成 Series E，若 SOAR / AI-SOC
              市场继续享受溢价估值，倍数还可能更高。反向情景包括：股票市场大幅修正、 Insight Partners 在下一轮失去领投位置，或收入明显减速。这些都会压缩下一次融资时间表，并提高现有投资人的稀释风险。
              公开材料未披露任何债务工具或项目融资义务，公司看起来仅靠股权资本运营。
