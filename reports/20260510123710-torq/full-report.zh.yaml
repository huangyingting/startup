      - number: '3.4'
        title: 切换成本、锁定效应与分发能力
        blocks:
          - type: paragraph
            body: >-
              SOAR 市场两端的切换成本都中等偏高。客户离开既有厂商（XSOAR、QRadar SOAR、Splunk SOAR）时，摩擦来自 playbook 迁移、集成重接和分析师再培训，估计需要 3 到 6
              个月实施工作。Torq 自身客户的软锁定效应来自自研连接器库：企业用 Torq 特定集成搭建大量 playbook 后，把这些工作流重接到替代平台会带来有意义的迁移摩擦。MSSP
              分发是关键竞争杠杆。Swimlane 和 D3 Security 都拥有成熟 MSSP 计划和白标能力。Torq 的 HyperSOC 多租户架构为捕获 MSSP 分发而设计，但专门 MSSP
              渠道计划建设早于竞争对手。多平台部署风险中等：大型企业安全运营有时会为不同用例并行部署多个 SOAR 平台；当账户保留既有厂商时，Torq 很难声称完成整个平台替换。ServiceNow Security
              Operations 对深度使用 ServiceNow ITSM 的组织构成结构性捆绑威胁；这些组织可能把安全工作流自动化作为既有企业协议的一部分采购，而不是开展专门 SOAR 评估。
            claimRefs:
              - CP009
