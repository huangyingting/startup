      - number: '3.5'
        title: 护城河耐久性与替代风险
        blocks:
          - type: paragraph
            body: >-
              Torq 的竞争护城河建立在三项相互关联的优势上：自研集成库（1,000+ 工具）、AI 自主层（HyperSOC 的 90% 到 95% 自动关闭率），以及从真实企业 SOC
              部署中积累的自研运营训练数据。集成库护城河真实存在，但并不封闭——竞争对手正在扩大连接器数量，开源社区也能随时间搭建集成库。AI 护城河在近期更可防守，因为 Torq 的 Socrates AI
              训练于真实企业告警数据，并随规模复利。主要替代风险来自 XDR 平台厂商把原生 AI 分诊自动化嵌入产品，且不给既有客户增加成本。CrowdStrike Charlotte AI 和 Microsoft
              Copilot for Security 均在 2025 年宣布自动化分诊能力，这一趋势会把单供应商 XDR 客户的基础 SOAR 商品化。Torq 的反向定位是多供应商编排价值主张：运行异构安全栈的企业横跨混合
              EDR、SIEM、云和身份工具，并来自多家供应商；Torq 的 1,000+ 集成广度无法被任何单一 XDR 厂商的原生自动化层复制。反向信号是：社区和评论数据表明，Torq
              的自主功能启用前需要大量预配置，这会给较小安全团队制造门槛。Torq 若成功推进 FedRAMP，将打开 IBM 和 Splunk 已具合规资质的联邦账户；但时间表和结果仍不确定。
