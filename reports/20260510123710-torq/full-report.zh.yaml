      - number: '2.3'
        title: 买家格局与分群
        blocks:
          - type: paragraph
            body: >-
              SOAR 和超自动化平台的主要经济买家，是企业安全运营中的 CISO 或 SOC 负责人。PeerSpot 评论和独立 MSSP 分析一致指出，CISO 是决策者和预算负责人，SOC
              分析师与安全工程师是操作用户。最活跃的采购垂直行业是金融服务、医疗和政府；监管压力、泄露频率和人员约束叠加，让自动化更有吸引力。CISA
              面向联邦机构和受监管行业运营者的最佳实践指南，把自动化定义为现代事件响应项目的核心能力，为安全自动化投资提供制度背书。独立评论中最常见的采用触发点，是告警疲劳——团队无法人工清理队列——加上一次具体泄露或险些发生的事件，暴露手工工作流成本。次级触发点包括合规项目，以及高曝光行业事件后的董事会层面压力。Exaforce
              的 2026 SOAR 比较报告按技术姿态划分自动化买家，并将需要可靠、可审计 playbook、而非概率式 AI 响应的「确定性优先」组织识别为 Torq 的主要客群。公开来源没有披露 Torq
              的实际客户行业组合、合同价值或分群胜率，这些仍是开放尽调项。
