  - id: FU001
    title: 客户旅程图
    type: journey-map
    data:
      nodes:
        - id: n1
          label: 认知
          detail: SOC 团队和 CISO 通过 Gartner Peer Insights 评分、G2 评价、分析师报告、行业会议（RSA、Black Hat） 以及 MSSP 合作伙伴转介发现 Torq
        - id: n2
          label: 评估
          detail: >-
            安全团队将 Torq 与 SOAR 竞品（Palo Alto XSOAR、Splunk SOAR、Microsoft Sentinel Automation）对比评估；核心标准包括集成广度、无代码 UX 和自主 AI
            能力
        - id: n3
          label: 概念验证
          detail: 4–8 周 POC，部署 3–5 个预构建工作流，并接入现有 SIEM / EDR；成功指标是告警降低率和首次自动化用时
        - id: n4
          label: 生产部署
          detail: 在客户成功团队支持下完整部署平台；初始范围通常覆盖 Tier-1 告警分诊和常见事件响应剧本
        - id: n5
          label: 扩张
          detail: 客户在 12 个月内从最初 3–5 个工作流扩到 50–500+ 个，新增合规报告、威胁狩猎和多工具编排等用例
        - id: n6
          label: 口碑倡导
          detail: 满意客户提交 G2 / TrustRadius 评价，参与案例研究，在会议发言，并提供转介绍，反哺认知阶段
    notes: 旅程图反映典型企业客户路径。MSSP 旅程更短：MSSP 只评估一次，随后以程序化方式把 Torq 部署到多个客户账户。
    claimRefs:
      - CU007
      - CU008
      - CU009
      - CU010
