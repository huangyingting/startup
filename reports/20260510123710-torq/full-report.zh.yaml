      - number: '3.3'
        title: 能力与定价比较
        blocks:
          - type: paragraph
            body: >-
              Torq 的产品差异化集中在三条轴线上，并在这些轴线上显著优于或独特领先竞争场。第一是集成广度：Torq 拥有 1,000+ 安全与 IT 工具集成（700+ 预构建连接器），明显超过 Rapid7 约 300
              个、Swimlane 约 350 个和 Tines 约 400 个原生集成，并与 Palo Alto XSOAR 的 500+ Marketplace 集成大致可比。第二是 AI 自主性：HyperSOC
              声称可自主解决 90% 到 95% 的 Tier-1 告警，这是既有厂商未公开声称的基准；XSOAR 和 QRadar SOAR 在等效分诊工作流中需要更多分析师触点。第三是云原生部署速度：Torq
              按天部署，而本地 SOAR 替代品通常需要数周或数月。定价上，Torq 每年 $150K 到 $350K 的企业 ACV 与既有厂商相比具备竞争力：Palo Alto XSOAR 企业版包括必需专业服务后为
              $200K 到 $800K+，Tines 则以 $40K 到 $80K 切入中端市场。GigaOm（2026 Radar：Leader and Outperformer）和 KuppingerCole（2026
              AI-SOC Leadership Compass：Overall Leader）均验证了 Torq 相对既有厂商的竞争定位。
