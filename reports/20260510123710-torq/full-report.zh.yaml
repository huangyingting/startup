      - number: '7.3'
        title: 运营与技术风险
        blocks:
          - type: paragraph
            body: >-
              Torq 的运营风险集中在平台架构固有的四个结构性脆弱点：AI 模型准确性限制、连接器维护脆弱性、云基础设施依赖， 以及客户 onboarding 复杂度。公司宣传的 90–95% 自主 Tier-1
              告警解决率尚未经过独立审计；若真实环境中的 false-negative rate 明显高于声称水平，客户可能遭遇未被发现的入侵，并把责任归因于 Torq 平台，从而带来声誉损害和潜在合同责任。
              连接器维护是一项复合型运营负担：Torq 的 700+ 个预置集成必须随着 CrowdStrike、Microsoft、Splunk、 AWS 和其他供应商更新 API 而持续更新；一个广泛使用的集成发生
              breaking change，就可能同时级联影响多个客户工作流。 平台只通过 AWS 和 Azure 以云原生 SaaS 方式交付，形成基础设施集中风险；虽然 Torq 维持 99.9% SLA（每年允许约
              8.7 小时 downtime），但若两个提供商同时发生长时间 hyperscaler outage——类似大型云事故—— 对 SOC 运营会是灾难性的。客户 onboarding 复杂度（典型部署时间 4–8
              周）会给较小企业客户带来 churn 风险，因为他们可能没有安全工程资源完成初始配置。数据泄露风险具备生死性质：Torq 处理客户原始安全 telemetry， Torq
              平台一旦被攻破，会同时暴露数百家企业客户的安全姿态，使 Torq 成为高级威胁行为者的极高价值目标。 Socrates AI 能力使用第三方 LLM API 又引入数据出境风险，需要与 AI provider
              做严密合同控制，确保客户安全数据不被用于模型训练。
