      - number: '5.5'
        title: 差异化、IP 与竞争护城河
        blocks:
          - type: paragraph
            body: >-
              Torq 的核心技术差异化来自三个会相互强化的优势：Socrates AI 多智能体推理架构、无代码工作流构建器的广度和易用性、 以及 700+ 个认证连接器带来的集成生态深度。Palo Alto
              XSOAR、Splunk SOAR 等传统 SOAR 平台， 原本面向工程师主导的 Python 脚本 playbook 开发；Torq 的拖拽式构建器消除了这类采用摩擦。Forrester 2026 安全自动化
              wave 将 Torq 定位为编排与自动化市场的 strong performer。独立评论平台也确认， 与传统 SOAR 部署相比，Torq
              用户报告部署更快、分析师采用度更高、time-to-resolution 更好。

              IP 护城河主要由商业秘密构成，而不是注册专利。未发现保护 Torq 工作流自动化或 AI 技术的公开注册专利。最具防御性的 IP 资产是 Socrates AI 的专有安全领域训练数据、从企业部署中累积的自动化
              recipe 库（每新增一个客户就会增长并更准确）， 以及数百个客户自建 playbook 带来的切换成本。这个数据飞轮护城河会随规模增强：越多企业 SOC 部署在 Torq 上，Socrates AI
              得到的训练信号越多，recipe 库也越完整。收购 RevRod 通过额外威胁上下文 enrichment 能力加速了这条数据 pipeline。关键竞争风险来自平台供应商 bundling：Palo Alto
              Networks、Splunk（Cisco） 和 ServiceNow 都在投入 AI 驱动安全自动化，可能削弱 Torq 对已部署这些平台客户的独立价值主张。
