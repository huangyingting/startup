      - number: '5.6'
        title: 信任、安全、隐私与合规
        blocks:
          - type: paragraph
            body: >-
              Torq 维持了适合 Fortune 500 企业采购的安全与合规姿态。SOC 2 Type II 认证提供 12 个月经审计的安全性、 可用性和保密性控制证明，由 Big Four 或同等审计方按 AICPA
              标准验证。ISO 27001 认证提供国际认可的信息安全管理体系保障。 GDPR 合规支持欧洲客户部署所需的 EU 数据处理要求。平台每年接受第三方 penetration testing；结果不公开披露，
              但可通过 Torq Trust Center 在 NDA 下提供给企业客户。

              客户数据隔离通过多租户架构控制强制执行；Torq 客户不共享计算或存储资源。自主响应置信度阈值为低置信度 AI 决策提供 human-in-the-loop 安全控制。99.9% SLA
              支撑关键任务部署就绪度。监管行业仍存在关键合规缺口： Torq 目前不提供本地、air-gapped 或 FedRAMP
              授权部署，这限制了其在美国联邦机构、涉密环境，以及部分有数据驻留要求的金融服务机构中的采用。 GDPR 合规通过 EU 数据处理控制维持，但客户控制的私有云隔离不可用。G2 和 PeerSpot
              评论整体上对安全和可靠性评价积极。 Gartner Peer Insights 与 Forrester 的独立分析师覆盖强化了信任姿态。主要信任风险在于：若置信度阈值配置错误， AI
              自主响应决策可能扰乱合法业务；SC Media 也把这点识别为自主安全平台的行业性风险。
