        - SOAR/AI-SOC TAM 预计到 2030 年达 $20-30B，CAGR 超过 20%；Torq 切入增长最快的自主 AI-SOC 细分市场
        - 企业在安全运营中采用智能体 AI 更慢，导致 TAM 估计显著降低（<$10B）
      - - 投资逻辑
        - HyperSOC 智能体 AI 架构专为自主一线 SOC 分诊打造；300+ 项集成抬高切换成本，并形成网络效应
        - CrowdStrike 或 Palo Alto 在 18 个月内推出可直接对标的智能体 SOC 产品，并免费捆绑进现有平台合同
      - - 投资逻辑
        - Bessemer Venture Partners 领投（Cloud100 发起方，拥有 Veeva/Shopify/Twilio 投资记录），显示一线机构背书和已验证的退出能力
        - Bessemer 下调该持仓估值，或拒绝领投 Series E，释放对增长轨迹失去信心的信号
      - - 反向逻辑
        - 估计 ARR 为 $50-70M，但没有公开审计轨迹；实际 ARR 可能显著更低，使低 ARR 情景下隐含 15-21x 倍数膨胀到 26x+
        - 数据室确认经审计 ARR >=60M，且同比增长 >=80%，从而验证该倍数
      - - 反向逻辑
        - CrowdStrike Charlotte AI、Palo Alto XSIAM 和 Microsoft Sentinel Automation 都是有平台支撑的 AI-SOC 竞争对手，分发能力和客户基础大得多
        - 竞争对手在 24 个月内未能追上 Torq 的工作流编排深度和集成广度；Torq 获得平台合作伙伴地位
      - - 反向逻辑
        - 以估计 ARR 的 15-21x 入场，Series D 入场倍数留下的安全边际有限；如果公开可比公司估值下调 25-30%，倍数压缩风险较高
        - 市场共识转向高增长 AI-SOC 龙头可享 20x+，验证 Torq 溢价并支撑 IPO 定价
    notes: 投资逻辑与反向逻辑来自公开融资数据、可比公司分析和分析师市场研究。改变判断的条件具体且可衡量，便于持续监控。
    claimRefs:
