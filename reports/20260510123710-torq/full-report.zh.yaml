      - number: '5.3'
        title: 平台架构与运营模式
        blocks:
          - type: paragraph
            body: >-
              Torq 平台采用云原生多租户 SaaS 架构，运行在 AWS 和 Azure 基础设施上。技术架构由五个功能层组成， 从 ingestion 到响应执行处理安全事件。ingest 层通过
              webhook、REST API、SIEM 连接器，以及 EDR 和云平台原生集成接收事件。事件规范化层把多种 telemetry 格式转换为统一内部事件模型。编排引擎用事件驱动触发模型实时执行无代码
              playbook，消除影响传统 SOAR 系统的轮询延迟。Socrates AI enrichment 层部署专门 sub-agent， 用于威胁情报关联、行为异常检测、案例历史检索和 remediation
              建议。响应执行层跨 700+ 个集成采取自动化动作——隔离端点、 撤销凭证、创建工单，或升级给人工分析师。

              Torq 提供完整 REST API 和 webhook 框架，服务需要程序化控制的开发者；同时在公开 GitHub 仓库
              （torq-io/public-integrations）维护带版本的集成定义，支持社区贡献和透明的连接器版本管理。无代码构建器、
              低代码模板和全代码编辑器，为安全团队提供多种自动化开发模式，匹配不同工程能力。AI 置信度阈值可配置：低置信度 Socrates AI 决策会进入人工复核，而不是自主执行，形成 human-in-the-loop
              安全控制。平台层面强制多租户隔离； 客户不共享计算或数据资源，并通过 EU 数据处理控制维持 GDPR 合规。
