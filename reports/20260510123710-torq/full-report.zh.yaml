      - number: '1.4'
        title: 产品、技术平台与关键差异点
        blocks:
          - type: paragraph
            body: >-
              Torq 的产品组合围绕两个一体化产品展开：Torq Hyperautomation 平台和 Torq HyperSOC。Hyperautomation
              平台是企业级、云原生、多租户、零信任的安全工作流自动化引擎，支持无代码拖拽设计、低代码配置和全代码定制开发。它连接 700+
              预构建集成，覆盖云服务商（AWS、Azure、GCP）、终端安全（CrowdStrike、SentinelOne）、SIEM 平台（Splunk、Microsoft
              Sentinel）、身份提供商（Okta、Azure AD）、工单系统（ServiceNow、Jira）以及数十个其他类别。实时 API 监控确保第三方 API 演进时，集成仍能正常运转。


              Torq HyperSOC 首次于 2023 年发布，是公司构建在 Hyperautomation 引擎之上的 AI 驱动 SOC 平台。它用自主 AI
              智能体分析、关联并增强来自任意接入源的未处理安全事件，生成上下文丰富的事件案卷，并按严重性、所需领域专长和潜在影响智能排序。关键能力包括：（1）用低保真告警自动化完成 100% 告警分诊，最多缩短 90%
              调查时间；（2）自助式智能体工作流构建器，让团队以较低投入部署复杂智能体；（3）Torq Socrates，自然语言 AI 界面，分析师可用日常英语查询、指挥和调查事件案卷。2025 年，公司发布
              HyperSOC 2.0，加入多智能体系统架构和原生 Model Context Protocol（MCP）支持，提升平台协调多个专用 AI 智能体处理复杂、多步骤安全调查的能力。Torq 还在 2025
              年以超过 $20 million 收购隐身以色列 AI 初创 RevRod，加速多智能体能力。
            claimRefs:
              - CO020
              - CO021
              - CO022
              - CO023
              - CO024
