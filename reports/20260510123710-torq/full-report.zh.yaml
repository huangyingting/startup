  - number: 5
    title: 产品与技术
    sections:
      - number: '5.1'
        title: 产品定义与客户工作流价值
        blocks:
          - type: paragraph
            body: >-
              Torq 提供 AI 原生安全运营中心（AI SOC）平台，重塑企业安全团队管理、调查和响应网络威胁的方式。从客户视角看， 产品位于 SIEM、EDR、云平台等原始安全告警入口，与安全工具栈里的
              containment 或升级动作之间。没有 Torq 时， Tier-1 SOC 分析师要手工分诊每条告警：跨五到十个工具关联信号、跑 enrichment 查询，再决定每个事件是升级还是关闭。
              每条告警通常耗时 15–45 分钟；现代企业环境每天触发数万条告警，这套流程无法扩展。

              Torq 的 HyperSOC 用自主 AI 驱动 pipeline 取代 Tier-1 分析师循环。告警从 SIEM 或 EDR 工具进入后， HyperSOC 立即通过预置或自定义 playbook
              路由，借助 Socrates AI 的多智能体推理补充信息（查询威胁情报、行为数据和案例历史）， 自主决定分诊结果，然后在数秒内关闭告警、执行 containment 动作，或升级给人工分析师。Torq 声称
              90–95% 的 Tier-1 告警可自动解决，在早期客户部署中让分析师工作量约降 90%，平均响应时间最高降 80%。独立评论也佐证， 部署可在 2–4 周完成；G2
              用户评论把无代码构建器和集成广度列为突出产品优势。因此，客户工作流价值主张就是速度、 规模和释放分析师产能，覆盖五类主要用例：告警分诊、事件调查、威胁狩猎、合规自动化和身份验证工作流。
            claimRefs:
              - CE001
              - CE011
              - CE012
              - CE022
              - CE035
          - type: table
            tableRef: TE002
            claimRefs:
              - CE001
              - CE012
              - CE022
              - CE013
              - CE024
      - number: '5.2'
        title: 产品模块与资产地图
        blocks:
          - type: paragraph
            body: >-
              Torq 产品组合由五个功能模块组成，统一交付在一个云原生 SaaS 平台内。HyperSOC 是旗舰 AI SOC 产品， 2024 年起商业化可用，也是主要收入引擎。Socrates AI 是嵌入
              HyperSOC 的专有多智能体推理引擎， 也可通过 API 供自定义编排工作流选用。无代码 / 低代码 / 全代码工作流构建器是基础开发环境，让安全团队无需 Python 脚本能力也能构建、测试和部署自动化
              playbook。集成框架提供 700+ 个认证连接器，覆盖 SIEM、EDR、 云、身份和工单等类别。RevRod 收购带来上下文 AI 数据 pipeline，并被整合进 Socrates
              AI，丰富其威胁调查数据源。

              HyperSOC 2.0 于 2026 年 Q1 发布，把自主覆盖从 Tier-1 扩展到 Tier-2 事件，并加入主动威胁狩猎能力。 2027 年路线图指向完全自主 SOC
              架构，在两个分析师层级上都消除常规人工介入。从 IP 视角看，Torq 最有价值的专有资产是 Socrates AI 多智能体架构（用安全运营数据训练）、随每个新客户部署而累积的自动化 recipe
              库，以及无代码构建器因切换成本形成的竞争护城河：企业在平台上构建数百个 playbook 后，迁移到其他编排工具的摩擦很高。 未发现公开注册专利；Torq 的 IP
              依赖商业秘密、专有训练数据，以及企业部署带来的复合数据飞轮。
            claimRefs:
              - CE003
