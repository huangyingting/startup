      - number: '1.3'
        title: 融资历史、估值与资本结构
        blocks:
          - type: paragraph
            body: >-
              自 2020 年创立以来，Torq 已在五轮有记录融资中累计获得 $332 million。公司最早一批融资到 2021 年末约为 $50 million，用于资助 Hyperautomation
              平台首版和最初的企业客户群。2023 年 6 月，Torq 在披露 ARR 约 $15 million 时完成由 Insight Partners 领投的 $70 million Series
              B。融资节奏随后加快：2024 年 1 月扩展 $42 million Series B，2024 年 9 月由 Evolution Equity Partners 领投 $70 million Series
              C；Series C 完成时累计融资达到 $192 million。


              决定性资本事件是 2026 年 1 月 12 日宣布的 $140 million Series D，由专注网络安全的 Merlin Ventures
              领投；该基金以美国联邦和政府市场连接见长。所有既有投资方参投，包括 Evolution Equity Partners、Notable Capital（前 GGV Capital）、Bessemer
              Venture Partners、Insight Partners、Greenfield Partners 和 J.P. Morgan Private Bank。Series D 将 Torq 投后估值推至
              $1.2 billion，确立其独角兽地位。资金将用于产品 R&D、企业 GTM 扩张，以及战略性打入美国联邦和公共部门市场。公司目标在 2026 财年达到 $100 million ARR；相比 CEO 在
              Series C 时披露的约 $24 million ARR，这意味着 4-5x 台阶，并由 2025 年报告的 300% 收入增长支撑。以 $1.2 billion 估值对比估计 ARR，收入倍数约
              20-25x，符合可比阶段高增长网络安全 SaaS 同行的区间。
