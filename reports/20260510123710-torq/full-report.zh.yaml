      - number: '1.5'
        title: 客户牵引、规模指标与分析师认可
        blocks:
          - type: paragraph
            body: >-
              Torq 披露的客户群包括数百家跨国企业，Series D 公告明确点名 Marriott International、PepsiCo、Procter & Gamble、Siemens、Uber、Virgin
              Atlantic、Abnormal Security、Armis、Check Point Security、Chipotle Mexican Grill、Inditex（Zara
              group）、Informatica、Kyocera、Telefonica、Valvoline 和 Wiz。Fortune 100 公司正在生产 SOC 环境中部署 Torq AI
              Agents，用于端到端调查和事件响应。公司官网声称，其客户群每日运行 100 million+ 次安全自动化，工作流执行时间较传统工具提升 800%，并为安全团队带来 10x 运营与生产率提升。Torq 在
              G2 和 Gartner Peer Insights 两个评论平台上的平均评分均为 4.8。


              2025-2026 年，独立分析师认可明显加速。KuppingerCole 在 2026 Leadership Compass for the Emerging AI SOC 中将 Torq 评为 Overall
              Leader，并称其「非常适合成熟的企业 SOC 团队」。GigaOm 在 SecOps Automation Radar 中将 Torq 定位为 Leader 和 Faster Mover，并在 AI
              护栏、案件管理和集成上给出 5 星评级。Torq 获得 RSA Conference 2025 Best Emerging Technology 奖。Forbes 将 Torq 评为网络安全
              standout。客户证言包括 Valvoline CISO Corey Kaemming 称「部署后 48 小时内，我们团队就开始使用 Torq 的 AI SOC Platform」，以及 Virgin
              Atlantic CISO John White 称 Torq 是安全运营的「伞形平台」。这些第三方验证为 Torq 的产品主张提供了有意义的旁证，但绝对客户数和净收入留存率仍未披露。
