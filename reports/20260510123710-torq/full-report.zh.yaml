      - number: '8.2'
        title: 情景分析——乐观、基准与悲观
        blocks:
          - type: paragraph
            body: >-
              乐观情景（概率信号 25%）：到 2028 年，Torq 拿下 SOAR / AI-SOC 市场 5-7% 份额，在企业大规模从传统 SOAR 平台迁移、FedRAMP 授权成功打开美国联邦市场的推动下，ARR
              达到 $150-200M。Net Revenue Retention 超过 130%，反映向 HyperSOC Pro upsell 和既有账户内平台扩张。按 25x NTM 收入估值、与 CrowdStrike
              峰值倍数一致，2028 年隐含估值为 $1.5-2.5B；若 IPO 以 20-30x NTM 收入定价，市值可达 $3-5B。Series D 投资人回报约为 2.9x-4.8x
              MOIC。关键乐观假设包括：FedRAMP 不延迟， 没有重大竞争性价格战，AI-SOC 工作流自动化在规模上证明 ROI，且管理层留任。乐观情景下行触发器： FedRAMP 被拒，或竞争性 agentic
              AI-SOC 产品在 2027 年前取得主导市场份额。基准情景（概率信号 50%）： Torq 到 2026 年底达到 $80-100M ARR，相比估计 2025 年 $50-70M 基线实现 50-70%
              同比增长。 Net Revenue Retention 维持 110-120%。2027–2028 年 IPO 以 12-15x NTM 收入定价， 隐含 $800M-1.5B 估值。Series D
              投资人按入场估值实现 0.8x-1.4x MOIC，回报边际， 也凸显入场纪律。基准情景依赖于：与 CrowdStrike 持续保持竞争 parity，没有重大平台 churn 事件， 且市场继续以 15-20%
              CAGR 增长。关键基准风险：若公开网络安全 SaaS 倍数较当前水平收缩 25-30%， 估值会被压缩。悲观情景（概率信号 25%）：随着 CrowdStrike 和 Palo Alto
              在既有平台合同中以折扣价积极 bundle AI-SOC 能力，收入增速降至 40% 以下。ARR 停滞在 $60-70M，NRR 降至 100% 以下， 说明净客户流失。持平轮或 down-round
              Series E 以 8-10x ARR 定价，隐含 $480-700M 估值， 较 Series D mark 回撤 33-54%。若以 5x ARR 退出，估值仅 $300-350M。Series D
              投资人面临 0.3x-0.7x MOIC。悲观触发器包括：CrowdStrike 收购一家竞争性 AI-SOC startup；具名 Torq 客户发生由 AI 导致的重大安全事件并损害声誉；或 NRR
              连续两个季度低于 95%。
