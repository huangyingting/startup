  - number: 7
    title: 风险
    sections:
      - number: '7.1'
        title: 风险全景与严重性排序
        blocks:
          - type: paragraph
            body: >-
              Torq 的风险图谱最好理解为五个相互咬合的风险集群：监管与法律合规、运营与技术可靠性、合作伙伴和第三方依赖、
              财务与商业模式可持续性，以及人员与执行风险。各集群的严重性取决于发生概率、影响速度和可逆性。监管风险在近期排名最高， 因为 FedRAMP 被拒是二元事件——要么打开、要么关闭整个美国联邦市场；而 EU AI
              Act 若把 Torq 归类为高风险系统，将强制第三方 conformity assessment，Torq 尚未完成。运营 AI 准确性风险排第二： 若 Torq 的自主解决能力产生 false
              negative，让真实威胁漏过，声誉和法律后果会很严重，且难以逆转。 对 CrowdStrike 和云 hyperscaler 的合作伙伴依赖排第三，但 Torq 的多云架构和广泛集成降低了单一供应商暴露。
              财务 runway 风险真实存在，但 2026 年 1 月 Series D 已完成，因此可管理；主要财务风险不是急性破产， 而是 XDR
              商品化带来的估值压缩。以色列总部带来的人员和地缘政治风险是持续背景性担忧，在中东不稳定时期会加剧。 合在一起，这些风险定义了一家后期、IPO 前网络安全 SaaS 公司的典型风险画像：可管理，但需要主动监控，
              并为尽调目的设定清晰的 thesis-break 触发器。以下章节会深入拆解每个风险集群，并在第 6 节列出具体缓释措施、 监控指标和 kill criteria。
