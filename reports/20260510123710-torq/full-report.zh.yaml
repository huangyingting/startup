        - label: 乐观（25x ARR）
          value: 1750
    notes: 以 $60M ARR 中值估计为基准，不同 NTM 收入倍数下的隐含估值（$M）。Series D 入场估值（$1,050M）落在高基准与乐观情景之间，说明其定价相对上市可比公司 10-15x NTM 收入中位数有溢价。
