      - number: '7.2'
        title: 监管与法律风险
        blocks:
          - type: paragraph
            body: >-
              Torq 位于三个 2024–2026 年快速演进的监管体系交汇处：数据隐私法（GDPR、Israeli PDPA）、网络安全行业监管（NIS2、FedRAMP）， 以及 AI 治理（EU AI
              Act）。GDPR 第 28 条要求 Torq 与每个 EU 客户签署数据处理协议，只要这些客户的安全 telemetry 流经 Torq 平台；若无法维持合规 DPA，Torq 客户会面临监管机构调查，Torq
              自身也会因处理者不合规承担合同责任。 EU NIS2 Directive 于 2024 年 10 月生效，可能把服务关键基础设施运营商的安全自动化平台供应商归类为 essential service
              provider，使其承担事件报告、安全要求和国家监管监督。ENISA 关于 NIS2 实施的指引明确， 托管安全服务提供商及其软件供应商面临更高义务。EU AI Act 的高风险 AI 条款将于 2026 年
              8 月生效， 带来最前瞻的监管不确定性：如果像 Torq HyperSOC 自主分诊和响应这样的自主安全决策系统，被 Annex III 归类为高风险 AI 应用，Torq 将面临强制 conformity
              assessment、技术文档要求和人工监督义务，可能需要大幅重构产品。 FedRAMP 授权仍在等待；没有它，Torq 无法销售给美国联邦机构，也就失去一个庞大且增长中的政府网络安全市场。 SEC 2023
              年网络安全披露规则直接影响 Torq 的企业客户，而非 Torq 本身，但会通过提高对安全供应商供应链的审查产生间接风险。 以色列总部意味着跨境向以色列传输数据需要 GDPR adequacy
              safeguard；Israeli PDPA 于 2023 年更新， 更贴近 GDPR，但其 adequacy status 仍取决于 European Commission 复审。
