      - number: '2.4'
        title: 增长驱动与市场顺风
        blocks:
          - type: paragraph
            body: >-
              三股叠加的结构性驱动支撑 SOAR 和超自动化需求。第一，全球网络安全人才缺口从 2013 年 1 million 个未填补岗位扩大到 2021 年 3.5 million 个，Cybersecurity
              Ventures 称此后仍继续增加，给分析师工作流自动化制造了不可逆压力。第二，泄露成本把 ROI 逻辑算清楚：IBM 的 Cost of Data Breach 报告显示，2024 年全球平均泄露成本为
              $4.88M；IBM 自身数据也显示，能在 200 天内解决泄露的组织，相比响应更慢的组织平均节省 $1.02M。第三，AI 集成已成为 2026 年的主要市场驱动：Automation Atlas 记录了向
              AI 增强 SOAR 的转移，大语言模型负责增强、摘要和一轮分析，确定性自动化负责遏制与修复。三项驱动彼此强化：人才稀缺抬高手工响应成本，泄露成本量化更快自动化响应的 ROI，AI
              降低搭建和维护自动化工作流的技能门槛。CISA 的官方网络安全指南明确支持自动化作为最佳实践，为商业需求信号增加监管验证。估值视角下，这些驱动耐久且非周期性；但市场顺风能否转成 Torq
              收入，还需要公开记录中尚未出现的胜率、留存和扩张轨迹证据。
