              2026 年计划新增 200 人，相当于一年内 headcount 增加 57%；若按公告执行，到 2026 年底月度现金 burn 大约会翻倍。在估计峰值月 burn 达 $10M–$15M 时，$140M
              Series D 从峰值 burn 开始只能支撑 9–14 个月。也就是说，即便收入目标达成，Torq 仍有现实可能在 2027 年底前需要 Series E，持续的投资人信心和市场环境
