              Torq 的 GTM 动作结合了企业直销、MSSP 渠道合作，以及 AWS Marketplace、Azure Marketplace 和合作伙伴生态列表（CrowdStrike、Splunk、Palo Alto
              Networks、SentinelOne、Okta）等 marketplace 分销。获客漏斗从 awareness 开始，驱动力来自分析师认可（Gartner Peer Insights
              评分、行业分析师覆盖）、 同行评论平台（G2、TrustRadius、PeerSpot）和安全社区口碑。潜在客户通常进入为期四到八周的 proof-of-concept（POC） 阶段；Torq
              的预置连接器可快速接入既有安全工具。POC 到生产部署的转化由 Torq 客户成功组织和专业服务团队支持。 部署后，无代码工作流构建器推动扩张：客户通常从三到五条自动化工作流起步，十二个月内增长到 50–500+
              条工作流， 自然拉动 net revenue retention 扩张。MSSP 渠道把个别企业销售周期压缩成跨 MSSP 客户组合的程序化、重复部署模式。 通过 AWS 和 Azure 做
              marketplace 分销，为已承诺云支出的云原生企业提供额外获客渠道，这些云支出可用于购买 Torq license。VentureBeat 和 SecurityWeek 对 Torq
              企业部署的报道，突出其在安全成熟组织中的快速采用。具名客户案例， 包括一家 Fortune 500 金融服务公司实现 70% 告警减少，以及一家全球 MSSP 扩展到 500+ 条自动化工作流，
