      - number: '5.4'
        title: 部署、集成、可靠性与路线图
        blocks:
          - type: paragraph
            body: >-
              Torq 只以云 SaaS 形式部署，没有本地或混合选项。这是有意的架构取舍：能加速部署，但会限制受数据主权要求约束的监管行业企业。 企业 onboarding 通常在 2–4 周完成，明显快于传统 SOAR
              实施常见的 3–6 个月专业服务周期。Torq 向所有企业客户承诺 99.9% uptime SLA。平台已作为经过验证的合作伙伴集成列入 AWS Marketplace， 说明其与云生态对齐。

              集成维护是结构性风险：700+ 个连接器依赖第三方供应商发布的稳定 API，包括 Splunk、CrowdStrike、 ServiceNow 和 Okta。这些供应商的上游 API 变更经常会打断连接器逻辑，给
              Torq 连接器团队带来持续工程负担， 也可能扰乱客户工作流。Torq 通过专门连接器工程团队和公开 GitHub 仓库里的社区贡献来管理这一风险。到 2027 年的产品路线图如下：HyperSOC 2.0 于
              2026 年 Q1 发布，带来 Tier-2 自主能力和威胁狩猎。2026 年 Q2 目标是深化 SIEM 连接器认证，并扩展 Socrates AI sub-agent 库。2026 年 H2 计划新增 EDR
              和云平台集成，并增强 analytics。2027 年远期目标是完全自主 SOC，让常规安全事件不再需要 Tier-1 或 Tier-2 人工介入。关键未解尽调问题：Torq
              路线图缺少已发布的技术里程碑，独立验证 2027 年自主 SOC 声称因此很难。
