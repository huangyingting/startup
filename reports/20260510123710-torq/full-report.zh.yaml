      - number: '4.3'
        title: 成本结构与利润率画像
        blocks:
          - type: paragraph
            body: >
              Torq 的成本结构符合风投支持企业 SaaS 公司大举投入增长的典型画像：人员成本占主导，R&D 与销售 / 营销合计可能消耗总运营支出的 70–80%。公司的双总部模式（New York 商业运营加 Tel
              Aviv R&D 中心）提供了有意义的人力成本套利：以色列工程人才相对新兴市场昂贵，但按全成本口径比同等 San Francisco 或 New York 工程岗位便宜 20–35%，相对纯美国同行形成结构性
              R&D 成本优势。


              Torq 这种 SaaS 为主的收入模型，毛利率估计为 65–75%，符合可比规模企业安全软件公司的行业基准。不过，专业服务部分——实施、上线和客户成功——通常毛利率为
              20–40%，随着企业客户获取带动服务收入增长，会稀释混合毛利率。云基础设施成本（AI 智能体负载计算、SIEM 集成处理和大规模工作流执行）是主要收入成本项目；随着每个客户部署中的 AI
              工作负载强度增加，这部分成本可能比订阅收入增长更快。


              相比纯软件同行，资本开支要求较低，因为 Torq 运行在云基础设施（AWS、Azure、GCP）上，而非自有数据中心。年度预付订阅有利于营运资本动态，但随着用量组件和月度计费周期增长，复杂度会上升。RevRod
              收购用于搭建计费优化基础设施，战略上合理，但也带来整合成本和潜在商誉减值风险；没有收购条款和交割后整合里程碑，无法评估。公开信息未披露债务义务，暗示资产负债表干净，但没有经审计报表无法确认。
