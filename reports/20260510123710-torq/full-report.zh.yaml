  - number: 6
    title: 客户
    sections:
      - number: '6.1'
        title: 客户基础概览与分层
        blocks:
          - type: paragraph
            body: >
              自 2020 年创立以来，Torq 已建立覆盖 Fortune 500 企业、中型市场科技公司和托管安全服务提供商（MSSP）的客户基础。 公司平台服务两类主要买方角色：大型企业内部安全运营中心（SOC）团队，用
              Torq HyperSOC 做自主威胁检测与响应； 以及 MSSP，把 Torq Hyperautomate 嵌入托管服务交付，为终端客户提供可扩展的自动化安全运营。Torq 的客户分层反映其双产品 GTM
              策略：HyperSOC 面向中高端市场和企业段（通常为拥有 2,000+ 员工、成熟安全项目以及既有 SIEM / EDR 工具的公司），Hyperautomate 同时面向企业和
              MSSP，解决没有深厚安全工程能力也要做工作流自动化的需求。 Torq 已披露客户基础中的企业垂直行业包括金融服务、医疗健康、科技 / SaaS 和电信。MSSP 渠道尤其关键： MSSP 同时是客户（购买
              Torq license）、分销伙伴（转售基于 Torq 构建的托管 SOC 服务），以及规模化证明者（在高告警量下验证平台可靠性）。 G2 评论和 TrustRadius 反馈确认，客户看重 Torq
              的无代码自动化构建器和深度预置连接器库（700+ 个集成）， 因为它能快速交付价值，且不要求自定义开发资源。Bessemer Venture Partners 和 Forbes 的 Cloud100 2025
              认可，进一步验证了企业市场 traction。
