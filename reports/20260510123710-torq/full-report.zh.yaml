  - id: TM004
    title: 增长驱动因素与约束表
    columns:
      - 驱动因素 / 约束
      - 方向
      - 时点
      - 含义
      - 尽调事项
    rows:
      - - 全球网络安全人才短缺（350 万个岗位空缺）
        - 驱动
        - 当前且持续
        - 分析师产能不足，催生用自动化补位的结构性需求
        - 询问管理层：人才供给恶化或改善时，管线速度如何变化
      - - 数据泄露成本上升（2024 年平均 $4.88M）
        - 驱动
        - 当前
        - 为更快自动化响应量化 ROI——每起事件更快解决可节省 $1M+
        - 要求提供客户案例，展示数据泄露响应时间和成本节约的前后对比
      - - AI 增强型 SOC 自动化采用
        - 驱动因素
        - 2026 年加速
        - AI 增强和基于 LLM 的摘要降低了自动化部署的技能门槛
        - 验证 Torq 的 Socrates AI 功能集是否不同于竞争对手的 AI 模块
      - - 自动化相关的监管和 CISA 指引
        - 驱动因素
        - 当前
        - 为政府和受监管行业优先投资自动化 SOC 提供制度背书
        - 确认 Torq 的 FedRAMP 或政府合规路线图
      - - 企业垂直行业的高昂数据泄露成本压力
        - 驱动因素
        - 当前
        - 安全买家若面临明确的数据泄露损失，自动化投资的 ROI 路径最清楚
        - 索取按数据泄露成本暴露类别划分的胜率数据
      - - 与现有安全栈的集成复杂度
        - 约束因素
        - 当前
        - 多工具部署需要数周到数月工程投入，才能打通 SIEM、EDR 和工单连接器
        - 索取新客户部署的中位上线时间和连接器复杂度数据
      - - 小型 SOC 团队的剧本维护负担
        - 约束因素
        - 当前
        - 持续自动化工程投入会侵蚀资源受限买家的 ROI
        - 索取客户流失与 SOC 团队规模、剧本维护负载的相关数据
      - - XDR 平台整合威胁
        - 约束因素
        - 2026 年上升
        - CrowdStrike、Palo Alto 和 Microsoft Sentinel 内嵌自动化后，削弱独立 SOAR 需求
        - 索取 Torq 在与 XDR 捆绑方案竞争时获胜的证据，以及争夺型交易中的差异化
      - - 安全自动化工程技能缺口
        - 约束因素
        - 当前
        - 能构建并维护复杂自动化工作流的工程师短缺，限制采用速度
        - 验证 Torq 的无代码界面在实践中是否实质降低自动化专业能力要求
    notes: 驱动因素是结构性、反复出现的，不是周期性的。约束因素影响部署速度和 ROI 持续性，而不是购买意愿。 时间和严重程度评估由分析师综合研究期间保留的多份独立与官方来源得出。
