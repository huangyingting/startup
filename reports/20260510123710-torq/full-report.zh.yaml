      - number: '2.5'
        title: 采用约束与结构性风险
        blocks:
          - type: paragraph
            body: >-
              主要采用约束是集成复杂度、playbook 维护负担，以及安全自动化工程技能稀缺。Underdefense 和 Automation Atlas
              均指出，与现有安全栈——SIEM、EDR、工单、身份——集成是最常被提及的部署障碍；多系统编排通常需要数周到数月专业服务和配置工作。Playbook 维护是第二个约束：告警模式变化、工具更新之后，playbook
              需要持续工程投入；缺少专职自动化工程师的小型 SOC 团队会因此被侵蚀 ROI。Dark Reading 报道强调，安全自动化技能缺口是持续瓶颈，即便积极采购的企业也会因此放慢部署节奏。结构性风险方面，Palo
              Alto Networks、CrowdStrike 和 Microsoft Sentinel 的 XDR 平台正逐步把传统 SOAR 的告警关联和自动化 playbook 功能吸收到更大的平台套件中，威胁单点
              SOAR 厂商的独立市场。对 Torq 而言，超自动化定位——覆盖所有安全工作流，而不只是 SOC 告警——是对抗 XDR 吸收的关键差异化论点；但这种差异化能否持久，取决于持续的平台广度投资，以及能否证明
              XDR 捆绑无法复制的用例。没有独立来源确认 Torq 在具名企业账户的正面对比评估中具备实际差异化。
            claimRefs:
