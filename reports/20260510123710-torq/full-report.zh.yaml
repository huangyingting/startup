  - number: 2
    title: 市场分析
    sections:
      - number: '2.1'
        title: 市场边界——SOAR、安全编排与超自动化
        blocks:
          - type: paragraph
            body: >-
              Torq 的市场边界从产品主张开始：用无代码、云原生超自动化平台自动化任意安全运营工作流。按分析师口径，这跨越两个相邻市场框架。狭义框架是 SOAR——Security Orchestration,
              Automation and Response——TechTarget 将其定义为结合安全工具编排、重复任务自动化和威胁情报运营的平台。MarketsandMarkets 估计严格 SOAR 市场从 2022
              年约 $1.2B 增长到 2027 年 $2.3B。更宽框架是安全自动化或超自动化，Torq 材料把范围扩到任意企业安全流程——不只是 SOC 事件响应。这个框架连接到 International Finance
              对 2032 年 $26.6B 安全自动化市场的预测，也连接到 Torq 投资者材料引用的 Gartner 更广义超自动化逻辑。计入支出包括安全运营自动化：playbook
              执行、告警分诊、调查、遏制、增强和跨工具编排。排除支出是身份管理、终端防护、SIEM 分析和不直接触及工作流自动化的防火墙策略。现状替代品包括传统本地 SOAR 平台（XSOAR、QRadar
              SOAR、Splunk SOAR）、人工分析师工作流，以及嵌入部分自动化的新兴 XDR 平台。边界区分很重要，因为 Torq 的估值逻辑部分依靠更宽的超自动化框架，但公司当前收入基础和买家对话最清晰地锚定在
              SOC 自动化细分，这里有具名企业客户和第三方验证。
