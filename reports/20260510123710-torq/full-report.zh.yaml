  - number: 4
    title: 财务情况
    sections:
      - number: '4.1'
        title: 收入模型与定价架构
        blocks:
          - type: paragraph
            body: >
              Torq 的收入模型有三条主线：年度 SaaS
              订阅费（主导收入驱动）、与告警量和工作流执行次数挂钩的用量组件，以及实施、上线和持续客户成功带来的专业服务收入。公司也从合作伙伴和渠道安排中获得一小但增长中的收入，包括托管安全服务提供商（MSSP）和增值分销商（VAR），它们把
              Torq 平台嵌入或转售到自有服务中。2025 年收购 RevRod 这家 AI 驱动的计费优化初创，表明 Torq
              打算搭建更复杂的用量计费基础设施；企业越来越要求与消耗对齐的定价，而不是固定年度席位费，这一步在架构上是必要的。


              定价锚定企业合同价值。根据公开客户证言、竞品基准和分析师估计，中端市场账户的年合同价值（ACV）通常落在 $100,000–$250,000 区间，大型企业和 Fortune 500 部署可超过每年
              $500,000。公司没有公开定价页；纯直销企业软件通常如此。折扣实践不透明，但可能包括按量分层、多年合同 10–20% 让利，以及面向全球 Fortune 500 部署的站点授权安排；这与 SOAR
              市场惯例一致。


              Torq 的 SaaS 合同收入确认遵循标准 ASC 606 原则：订阅费在合同期内按比例确认（通常 12–36 个月），专业服务按交付里程碑确认，用量组件按消耗确认。RevRod
              集成引入了用量计量准确性和客户消耗模式带来的潜在收入波动复杂度；用量组件在收入结构中占比越高，这项风险越大。在当前增长阶段，公司可能从年度预付订阅中获得中等递延收入缓冲，但如果没有财务报表，无法确认该余额规模及其与经营现金流的关系。
