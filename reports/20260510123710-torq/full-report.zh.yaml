      - number: '2.2'
        title: 市场规模与增长轨迹
        blocks:
          - type: paragraph
            body: >-
              公开 SOAR 市场数据指向一个有意义但到 2027 年仍低于 $3B 的细分市场，年增速为两位数。MarketsandMarkets 预计 SOAR 市场 2022-2027 年 CAGR 为 15.8%，到
              2027 年达到 $2.3B；Automation Atlas 和汇总分析师评论则跟踪到 2026 年 $3.5B 或更高的路径，云原生采用加速了采购周期。把视角扩到整体安全自动化，International
              Finance 将 2032 年可寻址市场放在 $26.6B。Torq 投资者材料引用的 Gartner 超自动化框架，则暗示了一个更大的总机会，把业务流程和安全流程一并纳入。多个独立来源还报告，45% 到
              80% 的常规 SOC 任务——尤其是 Tier-1 告警分诊——可以自动化；这就是支撑市场增长轨迹的需求侧机制。上述规模估计带有常见分析师保留：各发布方的边界定义不同，方法论很少可审计，也没有来源清晰切分
              Torq 在更广义 SOAR 或安全自动化池中的具体可服务市场。最稳妥、有证据支撑的表述是：SOAR 细分真实、重要，并以约 15-20% 年增速增长；Torq 位于该市场的云原生高端层。
