      各项按 1-10 分衡量，维度可直接进入投委会（IC）讨论。市场评分反映 TAM 大且增长快，结构性顺风强。产品评分反映 HyperSOC 差异化和集成广度。客户证据受限于公开 NRR 和 ACV
      数据缺失。财务可见度最弱，因为私有 ARR 未经审计。估值纪律受 15-21x 溢价入场倍数约束。
