summary:
  headline: Torq 是挑战既有 SOAR 平台最可信的纯 AI-SOAR 玩家；但核心逻辑押在未经审计的自主处置率主张上， 且 XDR 原生 AI 分诊可能在 1–2 年内商品化其 Tier-1 价值主张。
