  evidenceGaps:
    - type: private-evidence-only
      severity: blocking
      topic: ARR verification
      missingEvidence: >-
        Audited ARR and quarterly growth rate by cohort for Torq; no public financial statements or confirmed ARR
        disclosure exists as of May 2026. The $50-70M estimate is analyst-derived and unconfirmed.
      whyItMatters: >-
        ARR determines whether the 15-21x implied multiple is defensible. If actual ARR is below $40M, the multiple
        exceeds 26x and is above all comparable precedents, making the investment case unjustifiable at entry.
      diligencePath: >-
        Request data room access; require trailing 8 quarters monthly ARR and year-over-year growth rate by cohort
        as a binding precondition for investment committee approval above $1.05B.
      relatedQuestionRefs:
        - QV008
        - QV009
