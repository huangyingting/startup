  - id: TV003
    title: Bull / Base / Bear Scenario Table
    columns:
      - Scenario
      - Key Assumptions
      - Valuation/Return Logic
      - Key Risks
      - Probability Signal
    rows:
      - - Bull (2028)
        - ARR $150-200M; NRR >=130%; FedRAMP authorized; market share 5-7% of $30B TAM; 60%+ YoY growth sustained; no major competitive bundling
        - 25x NTM revenue; implied $1.5-2.5B 2028 valuation; IPO at 20-30x NTM delivers $3-5B market cap; Series D MOIC approx 2.9x-4.8x
        - FedRAMP denial; CrowdStrike competitive bundling; key-person departure of founding team; macroeconomic enterprise spending freeze
        - "25%"
      - - Base (2028)
        - ARR $80-100M; NRR 110-120%; 50-70% YoY growth; no FedRAMP; competitive parity maintained; market growth at 15-20% CAGR
        - 12-15x NTM revenue; $800M-1.5B IPO valuation; Series D MOIC approx 0.8x-1.4x (marginal at entry price; entry discipline critical)
        - Multiple compression if public SaaS multiples contract 25-30%; customer concentration risk; slower SMB-to-enterprise migration
        - "50%"
      - - Bear (2028)
        - ARR stagnates $60-70M; NRR <100%; growth <40%; platform bundling accelerates churn; no FedRAMP; key-person risk materializes
        - 5-8x ARR; $300-560M valuation; flat/down Series E <$900M; Series D MOIC approx 0.3x-0.7x; significant capital loss at entry
        - CrowdStrike acquires competing AI-SOC startup; material AI-caused security incident; NRR <95% two consecutive quarters
        - "25%"
    notes: >-
      ARR estimates are analyst-derived from funding round sizing, comparable growth benchmarks, and public
      statements. Probability signals are indicative, not actuarial. Valuation ranges use NTM revenue multiples
      from public cybersecurity SaaS comparable analysis in Table TV004.
    claimRefs:
      - CV017
      - CV018
      - CV019
      - CV024
      - CV028
  - id: TV004
    title: Comparable Valuation Table
    columns:
      - Comparable
      - Type
      - ARR Multiple / Valuation
      - Relevance
      - Limitation
    enumerationScope:
      coverage: partial
      basis: >-
        Comparable set drawn from public company SEC filings, investor relations press releases, and publicly
        disclosed private funding rounds. Private company ARR multiples are analyst-estimated from round size
        and publicly available growth benchmarks. Not all AI-SOC or SecOps SaaS companies with recent
        transactions are included; smaller or less-disclosed private rounds are excluded due to insufficient
        public data. Coverage is partial rather than exhaustive.
    rows:
      - - CrowdStrike (CRWD)
        - Public AI security platform
        - Approx 15x NTM revenue (early 2026)
        - Highest-relevance public comp; AI-native security platform expanding SOC automation via Charlotte AI; sets the ceiling multiple for AI security
        - Larger scale ($4B+ ARR); broader platform breadth (EDR/XDR core vs. Torq's SOC automation focus); higher public liquidity premium vs. private valuation
      - - SentinelOne (S)
        - Public AI security platform
        - Approx 10x NTM revenue (early 2026)
        - Relevant AI security platform comparable at earlier growth stage; now maturing with decelerated growth and multiple compression from 20x+ peak
        - Pure-play AI endpoint security; SOC automation is adjacent not core; NTM multiple compressed as growth decelerated; less applicable as growth-stage comp
      - - Palo Alto Networks (PANW)
        - Public platform security with XSIAM AI-SOC
        - Approx 12x NTM revenue (early 2026)
        - XSIAM product competes directly in AI-SOC space; largest security platform with $9B+ ARR provides scale benchmark and competitive context
        - Palo Alto's multiple reflects mature diversified platform; XSIAM is one product line not isolated; less applicable as pure-play AI-SOC comp
      - - Rapid7 (RPD)
        - Public mature SecOps SaaS
        - Approx 3x NTM revenue (early 2026)
        - Provides downside scenario benchmark; mature SecOps SaaS with slower growth and compression from 8x+ peak as XDR commoditization accelerated
        - Low growth-stage relevance to Torq; Rapid7 is a declining-growth business; represents the bear-case trajectory rather than a peer benchmark
      - - Abnormal Security
        - Private AI security Series D (2025)
        - Approx 20x ARR (analyst-estimated)
        - Highest-relevance private comp; AI-native security platform at Series D; similar growth profile and investor quality (Insight Partners); validates 15-21x range
        - ARR and multiple are analyst-estimated not publicly disclosed; focuses on email security not SOC automation; subsector adjustment required
      - - Vanta
        - Private security SaaS Series C (2024)
        - Approx 18x ARR at $2.45B valuation (analyst-estimated)
        - Comparable security SaaS platform at Series C/D stage; demonstrates premium private-round multiples for high-growth security SaaS with strong NRR
        - Different subsector (compliance automation vs. SOC automation); market positioning less directly comparable; Vanta has confirmed revenue base
    notes: >-
      Public company multiples derived from SEC filings and investor relations disclosures; NTM revenue
      estimates from analyst consensus as of early 2026. Private company ARR multiples are estimated from
      publicly disclosed funding round sizes and publicly available growth rate commentary. All private
      multiples should be treated as indicative pending access to actual company financials.
    claimRefs:
      - CV008
      - CV009
      - CV010
      - CV011
      - CV012
      - CV013
      - CV025
      - CV026
  - id: TV005
    title: Thesis-Break and Kill Triggers Table
    columns:
      - Risk / Thesis Dependency
      - Monitorable Trigger
      - Threshold/Event
      - Action Implication
    rows:
      - - CrowdStrike acquires competing AI-SOC automation platform
        - CrowdStrike M&A announcements; Charlotte AI product roadmap disclosures; SEC 8-K filings
        - CrowdStrike acquires any AI-native SOC automation company with >$50M ARR or announces competing agentic SOC product at enterprise scale
        - Exit position or decline follow-on; CrowdStrike's distribution would compress Torq's addressable TAM by 30-50% within 18 months of acquisition
      - - Net Revenue Retention declines below 100%
        - Quarterly NRR monitoring via investor updates or data room access; channel partner feedback
        - NRR <100% in any two consecutive quarterly reports; indicates net churn acceleration and competitive displacement
        - Immediate position review; NRR <100% for an AI-SOC platform implies platform bundling pressure or product-market fit degradation is materializing
      - - Material AI-caused security incident at named customer
        - Security incident disclosure databases; SEC cyber-incident 8-K filings by Torq customers; industry press
        - Any public report attributing a material breach or missed detection to Torq HyperSOC autonomous response failure at a named enterprise customer
        - Full stop; existential reputational risk comparable to CrowdStrike July 2024 sensor incident; regulatory scrutiny likely; customer churn cascade
      - - Series E down-round below $900M post-money
        - Next financing round announcement; secondary market pricing via Forge or EquityZen; LP mark quarterly
        - Series E or secondary pricing implying post-money valuation below $900M (14% drawdown from Series D)
        - Down-round signals investor confidence deterioration; triggers preference overhang review and LP mark-down decision; evaluate exit vs. hold
      - - FedRAMP authorization denied or abandoned
        - FedRAMP marketplace status at marketplace.fedramp.gov; Torq official announcements; GSA updates
        - Torq removed from FedRAMP authorization pipeline or publicly confirms no federal market pursuit beyond 2027
        - Significant TAM reduction; U.S. federal cybersecurity market (estimated $5B+) becomes permanently inaccessible; bull case collapses
    notes: >-
      Kill triggers are designed to be measurable and time-bound. Monitoring frequency: quarterly for NRR
      and competitive landscape; continuous for M&A announcements and security incidents; semi-annual for
      FedRAMP marketplace status updates.
    claimRefs:
      - CV036
      - CV037
      - CV038
      - CV028
      - CV029
  - id: TV006
    title: Final Diligence Asks Table
    columns:
      - Topic
      - Missing Evidence
      - Why It Matters
      - Owner or Diligence Path
    rows:
      - - Audited ARR and Growth Rate
        - No publicly disclosed or audited ARR figure; analyst estimate of $50-70M is unverified and unconfirmed
        - ARR determines whether the 15-21x implied multiple is defensible; ARR below $40M implies 26x+ multiple above all comparable precedents
        - Management data room; request trailing 8 quarters monthly ARR and YoY growth rate by customer cohort as precondition for IC approval
      - - Net Revenue Retention by Cohort
        - NRR not publicly disclosed; no public customer churn or expansion revenue data available from any source
        - NRR above 110% is the single most important IPO-readiness indicator; NRR below 100% is a thesis-break trigger requiring immediate review
        - Management data room; request NRR by annual customer cohort for 2022-2025 vintages with gross and net churn decomposition
      - - Gross Margin Profile
        - No public GAAP gross margin data; inferred at 70-75% from SaaS cybersecurity benchmarks but unconfirmed
        - Gross margin below 65% would compress valuation multiple by 3-5x relative to high-margin peers and impair IPO S-1 readiness
        - Management data room; request GAAP gross margin and cost of revenue breakdown for FY2024 and FY2025
      - - Customer Concentration
        - Top 10 customer ARR contribution not publicly disclosed; no waterfall or concentration data available
        - Top 3 customers exceeding 30% of ARR would materially increase bear-case severity and concentration risk perception in IPO process
        - Management data room; request top-20 customer ARR waterfall and historical churn and expansion data by account size
      - - FedRAMP Authorization Timeline
        - FedRAMP authorization status unconfirmed; in-progress claim unverified through public marketplace listing
        - FedRAMP authorization is binary gate for $5B+ U.S. federal market; delay beyond 2027 materially constrains bull-case TAM realization
        - Direct management inquiry; verify at marketplace.fedramp.gov; request formal FedRAMP project plan and sponsor agency identification
      - - Co-Founder Retention Arrangements
        - No public disclosure of vesting cliff refresh, non-compete terms, or retention bonuses for Eldad Livni and Leonid Belkind
        - Co-founder departure post-Series D is a common risk factor; market precedent shows 60%+ NTM de-rating on unplanned founder exit
        - Management data room; request cap table, vesting schedules for founders and key executives, and key-person insurance policy confirmation
    notes: >-
      Diligence asks are prioritized by impact on investment recommendation upgrade from CONDITIONAL POSITIVE
      to POSITIVE. ARR verification is blocking; all others are material. Owner is management unless noted.
    claimRefs:
      - CV034
      - CV035
      - CV030
      - CV031
