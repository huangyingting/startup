        - Do not commit above $1.05B without data room ARR and NRR confirmation; track NRR, competitive intensity, and FedRAMP status quarterly
    notes: >-
      Recommendation is price-sensitive: upgrade to Positive if data room confirms ARR >=60M, NRR >=110%,
