evidenceGaps:
  - type: private-evidence-only
    severity: blocking
    topic: board governance
    missingEvidence: >-
      Board composition, board charter, investor board-seat rights, governance structure, and independent director
      identities. No public source reviewed disclosed any board member beyond the three co-founders.
    whyItMatters: >-
      Lack of board transparency prevents assessment of checks on founder decision-making, investor alignment, or
      succession planning — all material governance considerations at a $1.2B unicorn stage.
    diligencePath: >-
      Request board deck, cap table, and investor rights agreements directly from Torq management; review Series D term
      sheet for board composition and protective provisions.
    relatedQuestionRefs:
      - QO018
  - type: private-evidence-only
    severity: blocking
    topic: FedRAMP status
    missingEvidence: >-
      Current FedRAMP authorization status, expected timeline to authorization, scope of required product changes, and
      estimated investment required for federal market compliance.
    whyItMatters: >-
      Federal market expansion is a core pillar of the Series D investment thesis; if FedRAMP authorization is 18-24
      months away, the federal revenue contribution cannot be counted in near-term ARR projections.
    diligencePath: >-
      Review FedRAMP marketplace listing for Torq; request federal product roadmap and compliance timeline from
      management; check whether Merlin Ventures has sponsored any FedRAMP-in-process authorizations.
    relatedQuestionRefs:
      - QO024
  - type: missing-source
    severity: material
    topic: funding history discrepancy
    missingEvidence: >-
      Precise round-by-round breakdown of Torq's early 2021 funding. TechRepublic states "$50M in December 2021" as a
      single round; task brief references a $20M Seed plus $42M Series A. The official total of $332M cannot be fully
      reconstructed from public sources alone.
    whyItMatters: >-
      Round-by-round breakdown affects cap table analysis, investor ownership percentages, and ESOP dilution history.
      Uncertainty in early round sizes prevents accurate pro-forma ownership modeling.
    diligencePath: >-
      Request cap table from management; cross-reference SEC EDGAR Form D filings for Torq Technologies Inc if
      registered under US securities law.
    relatedQuestionRefs: []
  - type: private-evidence-only
    severity: material
    topic: ARR and unit economics
    missingEvidence: >-
      Audited ARR, NRR, gross margin, CAC, LTV, and burn rate figures. CEO-stated ARR of $24M at Series C time and $100M
      FY2026 target are the only disclosed financial metrics; no third-party-verified financial data exists.
    whyItMatters: >-
      Revenue multiple on the $1.2B valuation varies dramatically based on actual ARR: 50x at $24M vs 12x at $100M.
      Without audited financials, valuation assessment remains highly uncertain.
    diligencePath: >-
      Request audited or reviewed financial statements, ARR waterfall, NRR cohort data, and burn rate schedules from
      management as part of formal diligence.
    relatedQuestionRefs:
      - QO007
  - id: GM001
    title: No independent analyst quadrant or Wave report found placing Torq vs. legacy SOAR competitors
    description: >-
      No Forrester Wave, Gartner Magic Quadrant, or equivalent independent analyst quadrant placing Torq against Palo
      Alto XSOAR, IBM QRadar SOAR, or Splunk SOAR was found in the public record. The Exaforce comparison report is the
      closest available substitute but it is from a competitor and not an independent research firm.
    severity: moderate
    relatedQuestionRefs:
      - QM012
    diligenceAsk: >-
      Request any Gartner, Forrester, or IDC analyst placement for Torq from management, and ask whether the company
      expects to appear in a named Wave or Quadrant by 2026.
  - id: GM002
    title: XDR consolidation threat quantification not confirmed by independent market data
    description: >-
      While Palo Alto Networks' own materials and Automation Atlas commentary describe XDR platform absorption of SOAR
      functions, no independent analyst has published a quantified estimate of how much standalone SOAR revenue is at
      risk from XDR bundling. The magnitude of the structural threat to Torq's addressable market remains unquantified
      in public evidence.
    severity: moderate
    relatedQuestionRefs:
      - QM016
    diligenceAsk: >-
      Ask management for win/loss data on evaluations where XDR bundling was the chosen alternative and for any internal
      estimate of the revenue at risk from XDR consolidation.
  - id: GM003
    title: Cloud-native versus legacy SOAR deployment split not publicly quantified
    description: >-
      No independent source publishes a market share breakdown separating cloud-native SOAR deployments from legacy
      on-premises SOAR installations. The cloud-native share of new deployments is structurally growing but no
      quantified split was found in accessible public research.
    severity: low
    relatedQuestionRefs:
      - QM026
    diligenceAsk: >-
      Request any industry data or internal win/loss analysis that quantifies the cloud-native versus legacy deployment
      split among Torq's target enterprise accounts.
  - type: private-evidence-only
    severity: minor
    topic: Torq FedRAMP authorization status and timeline
    missingEvidence: >-
      Independent confirmation of Torq's FedRAMP authorization status or timeline from FedRAMP marketplace listing or
      government-facing disclosure.
    whyItMatters: >-
      FedRAMP authorization is a prerequisite for meaningful US federal SOAR market access; without it Torq cannot
      displace IBM or Splunk in government accounts.
    diligencePath: >-
      Check the FedRAMP marketplace at marketplace.fedramp.gov directly; request authorization roadmap from Torq
      management during diligence.
    relatedQuestionRefs:
      - QP025
  - type: missing-source
    severity: minor
    topic: Competitor ARR figures for Swimlane, D3 Security, and Sekoia.io
    missingEvidence: >-
      Public ARR or revenue disclosures for Swimlane, D3 Security, and Sekoia.io to enable direct revenue comparison
      with Torq.
    whyItMatters: >-
      Without competitor revenue benchmarks, relative market share and competitive momentum cannot be independently
      verified.
    diligencePath: >-
      Request competitor revenue benchmarks from industry analysts such as Gartner or Forrester; check annual reports of
      MSSP partners that disclose partner revenue.
