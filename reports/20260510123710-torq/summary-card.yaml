  topStrengths:
    - >-
      HyperSOC's 90–95% autonomous Tier-1 alert resolution claim, if validated, represents a genuine paradigm shift in
      SOC economics eliminating the largest operational cost center in enterprise security.
    - >-
      Socrates AI's multi-agent reasoning architecture creates a data moat: each autonomous investigation feeds training
      data that compounds with customer scale, making the AI progressively harder for competitors to replicate.
    - >-
      1,000+ integration ecosystem (700+ pre-built connectors) exceeds all pure-play SOAR competitors and creates soft
      lock-in through customer-specific playbook libraries built on Torq-specific connectors.
    - >-
      GigaOm 2026 Leader and KuppingerCole 2026 Overall Leader both validate the technical differentiation from
      independent analyst perspectives against the full competitive field.
    - >-
      Strong enterprise proof: Marriott, PepsiCo, and P&G as named customers provide credibility signals that the
      platform operates at Fortune 500 scale with complex, multi-vendor environments.
  topRisks:
    - >-
      XDR native AI commoditization is the #1 structural risk: CrowdStrike Charlotte AI and Microsoft Copilot for
      Security both embed autonomous alert triage as native XDR features, threatening to render Torq's Tier-1 value
      proposition obsolete for single-vendor XDR shops within 1–2 years.
    - >-
      The 90–95% autonomous resolution rate has never been independently audited; the entire product pricing premium and
      customer retention story depends on this claim being both accurate and defensible in adversarial enterprise
      procurement environments.
    - >-
      Cloud-only SaaS architecture structurally excludes air-gapped and classified environments where Palo Alto XSOAR
      and IBM QRadar SOAR hold a durable advantage; FedRAMP authorization timeline is uncertain and could slip into
      2027.
    - >-
      $1.2B valuation at an estimated 24x–34x ARR multiple is pricing in a market leadership outcome that requires both
      independent validation of the AI claims and successful defense against XDR commoditization — both unproven.
    - >-
      Key-person concentration in co-founders Livni (CEO) and Belkind (CTO); loss of either without credible successor
      would materially impair product direction and investor confidence.
  unresolvedGaps:
    - >-
      90–95% autonomous resolution rate: no independent third-party audit exists; the entire product thesis and premium
      pricing depend on this claim being validated under adversarial conditions.
    - >-
      NRR cohort data: no public NRR, GRR, or customer retention cohort information is available; growth story cannot be
      separated from logo acquisition versus expansion momentum.
    - >-
      Patent portfolio: no confirmed patent filings identified in public searches; IP defensibility of Socrates AI and
      the no-code orchestration engine is unverified.
    - >-
      FedRAMP authorization timeline: Torq has announced pursuit but not confirmed an authorization date;
      regulated/government market access is blocked until completed.
    - >-
      Audited financials and unit economics: ARR, burn rate, gross margin, and CAC/LTV ratios are not publicly
      disclosed; financial diligence is entirely dependent on company management data room.
