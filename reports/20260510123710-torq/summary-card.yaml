summary:
  headline: >-
    Torq is the most credible pure-play AI-SOAR challenger to incumbent SOAR platforms, but the core thesis rests on an
    unaudited autonomous resolution claim and a 1–2 year window before XDR native AI triage commoditizes its Tier-1
    value proposition.
