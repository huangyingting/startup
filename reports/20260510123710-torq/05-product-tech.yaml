chapter:
  number: 5
  title: Product & Technology
  summary: 'Torq delivers an AI-native Security Operations Center platform built on three interlocking product layers: HyperSOC
    (autonomous Tier-1 alert triage and response), Socrates AI (multi-agent contextual reasoning), and a no-code/low-code/full-code
    workflow builder connecting 700+ pre-built integrations. The platform autonomously investigates and closes 90–95% of Tier-1
    security alerts without human intervention, replacing manual analyst workflows with event-driven orchestration across
    SIEM, EDR, cloud, identity, and ticketing ecosystems. HyperSOC 2.0, released in early 2026, extends autonomous coverage
    to Tier-2 incidents and proactive threat hunting. Torq is delivered exclusively as cloud-native multi-tenant SaaS on AWS/Azure,
    certified SOC 2 Type II, GDPR-compliant, with a 99.9% uptime SLA. Key technology risks include AI autonomous-decision
    accuracy, integration maintenance burden from 700+ connectors, and cloud-only delivery excluding regulated on-premises
    environments.'
