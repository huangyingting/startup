- id: TE002
  title: Workflow / use-case table
  notes: Measurable benefit figures are company-claimed metrics from Torq product pages and customer blog posts. Independent
    third-party validation of MTTR reduction and workload figures is not available in public sources. Limitation column reflects
    evidence gaps and risk factors identified in independent coverage.
  columns:
  - User Job / Use Case
  - Current Manual Workflow
  - Torq Solution
  - Measurable Benefit (claimed)
  - Limitation
  rows:
  - - Alert triage
    - Analyst reviews alert in SIEM, manually enriches with 5-10 tool lookups, decides to close or escalate
    - HyperSOC autonomously enriches, investigates, and closes or escalates within seconds via Socrates AI
    - 90-95% auto-close rate; 80% MTTR reduction; 90% analyst workload reduction (company-claimed)
    - Auto-close rate not independently audited; false negative risk if AI misclassifies real threat
  - - Incident investigation
    - Analyst correlates logs, threat intel, and endpoint data manually across multiple consoles
    - Socrates AI multi-agent system auto-correlates context, generates investigation report, and recommends response
    - Investigation time reduced from hours to minutes (company-claimed)
    - Investigation accuracy for complex multi-stage attacks not independently benchmarked
  - - Threat hunting
    - Senior analyst manually queries SIEM and EDR for indicators of compromise on a scheduled basis
    - HyperSOC 2.0 runs proactive threat hunting workflows autonomously, surfacing anomalies without manual queries
    - Continuous proactive hunting vs periodic manual sweeps (no quantified benefit claim available)
    - Threat hunting autonomy in HyperSOC 2.0 is newly released Q1 2026; customer proof limited
  - - Compliance automation
    - Security team manually gathers evidence, generates reports, and tracks control status for audits
    - Torq workflows automate evidence collection, compliance reporting, and control validation across integrated tools
    - Audit evidence collection time reduced; specific metrics not published
    - Compliance workflow coverage depends on which specific frameworks are pre-built in the playbook library
  - - Identity verification workflow
    - Analyst manually reviews MFA failures, unusual login attempts, and identity anomalies in identity provider
    - Torq automates identity anomaly investigation via Okta, Azure AD integrations; can suspend accounts autonomously
    - Autonomous identity response reduces credential compromise dwell time (specific metrics not published)
    - Risk of false-positive account suspension if AI confidence threshold is misconfigured
  claimRefs:
  - CE001
  - CE012
  - CE022
  - CE013
