- id: TE003
  title: Technology / operating architecture table
  notes: Architecture layer descriptions are based on official Torq documentation and product pages. Dependency and risk data
    are based on observed platform characteristics and independent news analysis. Internal implementation details (specific
    databases, ML frameworks) are not publicly disclosed.
  columns:
  - Layer / Component
  - Role
  - Key Dependency
  - Risk
  rows:
  - - Cloud delivery layer
    - Hosts the multi-tenant SaaS platform on AWS and Azure; enforces tenant isolation and handles scaling
    - AWS and Azure public cloud uptime and availability
    - Platform-wide outage if AWS or Azure experiences regional disruption; no on-premises fallback
  - - AI/ML engine (Socrates AI)
    - Conducts multi-agent contextual investigation across security data sources; drives autonomous triage decisions
    - Proprietary training data; external threat intel feeds; RevRod enrichment APIs
    - 'AI accuracy risk: false negatives miss threats; false positives trigger unnecessary containment; no independent accuracy
      audit'
  - - Workflow orchestration engine
    - Executes no-code playbooks in real time using event-driven triggers across all integrated systems
    - Stable event stream from SIEM, EDR, and cloud source connectors
    - Playbook logic errors or trigger misconfigurations could produce unintended automated actions at scale
  - - Connector framework (700+)
    - Provides certified pre-built integrations to SIEM, EDR, cloud, identity, and ticketing platforms
    - Stable upstream APIs from Splunk, CrowdStrike, ServiceNow, Okta, Microsoft, AWS
    - 'Integration maintenance burden: upstream API changes break connectors; requires ongoing engineering updates'
  - - Data enrichment layer
    - Aggregates threat intelligence, case history, and behavioral analytics to inform Socrates AI investigations
    - External threat intel feeds (VirusTotal, MISP, internal sources); RevRod data APIs
    - Enrichment quality determines AI investigation accuracy; gaps in threat intel coverage degrade resolution rates
  - - Developer API and webhook layer
    - Provides REST API, webhook triggers, and scripting interfaces for custom integration and automation control
    - Torq API availability and documentation completeness
    - API-dependent integrations require developer maintenance; API versioning changes could break custom workflows
