  - FE003
- id: differentiation-ip-moat
  title: Differentiation, IP, and Competitive Moat
  body: 'Torq''s primary technical differentiation rests on three compounding advantages: the Socrates AI multi-agent reasoning
    architecture, the no-code workflow builder''s breadth and ease-of-use, and the integration ecosystem depth of 700+ certified
    connectors. Legacy SOAR platforms such as Palo Alto XSOAR and Splunk SOAR were designed for engineer-heavy Python-script
    playbook development, creating adoption friction that Torq''s drag-and-drop builder eliminates. Forrester''s 2026 security
    automation wave positions Torq as a strong performer in the orchestration and automation market. Independent review platforms
    confirm that Torq users report faster deployment, higher analyst adoption, and better time-to-resolution outcomes than
    traditional SOAR deployments.


    The IP moat is primarily composed of trade secrets rather than registered patents. No publicly registered patents protecting
    Torq''s workflow automation or AI technologies have been identified. The most defensible IP assets are Socrates AI''s
    proprietary security-domain training data, the automation recipe library accumulated from enterprise deployments (which
    grows and becomes more accurate with each new customer), and the switching cost embedded in hundreds of customer-built
    playbooks. This data flywheel moat increases with scale: as more enterprise SOCs deploy on Torq, Socrates AI receives
    more training signal, and the recipe library becomes more comprehensive. The acquisition of RevRod accelerated this data
    pipeline with additional threat-context enrichment capability. The key competitive risk is platform vendor bundling: Palo
    Alto Networks, Splunk (Cisco), and ServiceNow are all investing in AI-driven security automation that could erode Torq''s
    standalone value proposition for customers already deployed on those platforms.'
  claimRefs:
  - CE005
  - CE018
  - CE020
  - CE025
  - CE034
  - CE037
  figureRefs:
  - FE004
- id: trust-compliance-quality
  title: Trust, Safety, Security, Privacy, and Compliance
  body: 'Torq maintains a documented security and compliance posture appropriate for Fortune 500 enterprise procurement. SOC
    2 Type II certification provides a 12-month audited attestation of security, availability, and confidentiality controls,
    validated by a Big Four or equivalent auditor under AICPA standards. ISO 27001 certification provides internationally
    recognized information security management system assurance. GDPR compliance supports EU data processing requirements
    for European customer deployments. The platform undergoes annual third-party penetration testing, the results of which
    are not publicly disclosed but are available to enterprise customers under NDA through the Torq Trust Center.


    Customer data isolation is enforced through multi-tenant architecture controls; Torq customers do not share compute or
    storage resources. Autonomous response confidence thresholds provide a human-in-the-loop safety control for low-confidence
    AI decisions. The 99.9% SLA underpins mission-critical deployment readiness. Key compliance gaps remain for regulated
    industries: Torq does not currently offer on-premises, air-gapped, or FedRAMP-authorized deployment, which limits adoption
    in US federal agencies, classified environments, and certain financial services institutions with data residency mandates.
    GDPR compliance is maintained through EU data processing controls, but customer-controlled private cloud isolation is
    not available. G2 and PeerSpot reviews are generally positive on security and reliability. Independent analyst coverage
    from Gartner Peer Insights and Forrester reinforces trust posture. The primary trust risk is that AI-autonomous response
    decisions could disrupt legitimate operations if confidence thresholds are misconfigured, an issue SC Media identified
    as an industry-wide risk for autonomous security platforms.'
  claimRefs:
  - CE007
  - CE024
  - CE028
  - CE029
  - CE030
  - CE033
  tableRefs:
  - TE004
