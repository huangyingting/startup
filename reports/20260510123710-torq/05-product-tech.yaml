sections:
- id: product-definition-and-customer-workflow
  title: Product Definition and Customer Workflow Value
  body: 'Torq delivers an AI-native Security Operations Center (AI SOC) platform that transforms how enterprise security teams
    manage, investigate, and respond to cybersecurity threats. From the customer''s perspective, the product sits between
    the ingestion of raw security alerts from SIEM, EDR, and cloud platforms and the execution of containment or escalation
    actions across the security tool stack. Without Torq, Tier-1 SOC analysts manually triage each alert: they correlate signals
    across five to ten tools, run enrichment lookups, and decide whether to escalate or close each event. This process typically
    takes 15–45 minutes per alert and cannot scale to modern enterprise environments where tens of thousands of alerts fire
    daily.


    Torq''s HyperSOC product replaces the Tier-1 analyst loop with an autonomous AI-driven pipeline. When an alert arrives
    from a SIEM or EDR tool, HyperSOC immediately routes it through a pre-built or custom playbook, enriches it with Socrates
    AI''s multi-agent reasoning (querying threat intel, behavioral data, and case history), makes an autonomous triage decision,
    and either closes the alert, executes a containment action, or escalates to a human analyst — all within seconds. Torq
    claims 90–95% of Tier-1 alerts are auto-resolved, reducing analyst workload by approximately 90% and mean-time-to-respond
    by up to 80% in early customer deployments. Independent reviews corroborate that deployment completes within 2–4 weeks,
    and G2 user reviews rate the no-code builder and integration breadth as standout product strengths. The customer workflow
    value proposition is therefore speed, scale, and analyst capacity reclamation across five primary use-case families: alert
    triage, incident investigation, threat hunting, compliance automation, and identity verification workflows.'
  claimRefs:
  - CE001
  - CE011
  - CE012
  - CE022
  - CE035
  tableRefs:
  - TE002
- id: product-module-and-asset-map
  title: Product Module and Asset Map
  body: 'Torq''s product portfolio comprises five distinct functional modules delivered within a unified cloud-native SaaS
    platform. HyperSOC is the flagship AI SOC product, commercially available since 2024, and represents the primary revenue
    driver. Socrates AI is the proprietary multi-agent reasoning engine embedded within HyperSOC and optionally accessible
    via API for custom orchestration workflows. The no-code/low-code/full-code workflow builder is the foundational development
    environment enabling security teams to build, test, and deploy automation playbooks without Python scripting expertise.
    The integration framework provides 700+ certified connectors across SIEM, EDR, cloud, identity, and ticketing categories.
    The RevRod acquisition added a contextual AI data pipeline that was integrated into Socrates AI to enrich its threat investigation
    data sources.


    HyperSOC 2.0 was released in Q1 2026, extending autonomous coverage from Tier-1 to Tier-2 incidents and adding proactive
    threat hunting capabilities. The 2027 roadmap targets a fully autonomous SOC architecture that eliminates routine human
    intervention at both analyst tiers. From an IP perspective, Torq''s most valuable proprietary assets are the Socrates
    AI multi-agent architecture (trained on security operations data), the accumulated automation recipe library (growing
    with each new customer deployment), and the no-code builder''s competitive moat from switching cost: enterprises that
    build hundreds of playbooks on the platform face high friction migrating to alternative orchestration tools. No publicly
    registered patents have been identified; Torq''s IP relies on trade secrets, proprietary training data, and the compounding
    data flywheel from enterprise deployments.'
  claimRefs:
  - CE003
  - CE005
  - CE006
  - CE009
  - CE034
  - CE037
  tableRefs:
  - TE001
- id: platform-architecture
  title: Platform Architecture and Operating Model
  body: 'Torq''s platform is architected as a cloud-native multi-tenant SaaS service running on AWS and Azure infrastructure.
    The technical architecture comprises five functional layers that process security events from ingest through response
    execution. The ingest layer receives events via webhooks, REST API, SIEM connectors, and native integrations with EDR
    and cloud platforms. The event normalization layer converts diverse telemetry formats into a unified internal event model.
    The orchestration engine executes no-code playbooks in real time using an event-driven trigger model that eliminates the
    polling latency affecting legacy SOAR systems. The Socrates AI enrichment layer deploys specialized sub-agents for threat
    intelligence correlation, behavioral anomaly detection, case history retrieval, and remediation recommendation. The response
    execution layer takes automated action across 700+ integrations — isolating endpoints, revoking credentials, creating
    tickets, or escalating to human analysts.


    Torq provides a full REST API and webhook framework for developers who need programmatic control, and maintains versioned
    integration definitions in a public GitHub repository (torq-io/public-integrations) enabling community contributions and
    transparent connector versioning. The no-code builder, low-code templates, and full-code editor give security teams a
    range of automation development modalities matching their engineering capacity. AI confidence thresholds are configurable:
    low-confidence Socrates AI decisions route to human review rather than autonomous execution, providing a human-in-the-loop
    safety control. Multi-tenant isolation is enforced at the platform level; customers do not share compute or data resources,
    and GDPR compliance is maintained through EU data processing controls.'
  claimRefs:
  - CE002
  - CE010
  - CE019
  - CE023
  - CE024
  - CE026
