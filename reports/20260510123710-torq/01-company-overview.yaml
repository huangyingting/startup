chapter:
  number: 1
  title: Company Overview
  summary: >-
    Torq is an Israeli-American cybersecurity hyperautomation unicorn that closed a $140 million Series D in January
    2026 at a $1.2 billion valuation, bringing total funding to $332 million since its 2020 founding. The company
    offers an AI-powered Security Operations Center platform that autonomously triages and resolves 90-95% of Tier-1
    security alerts for Fortune 500 enterprises including Marriott, PepsiCo, Procter & Gamble, Siemens, Uber, and
    Virgin Atlantic. Torq reported approximately 300% revenue growth in 2025, employs 350+ people globally, and plans
    to hire 200 more in 2026 to fuel expansion into US federal and public-sector markets.
sections:
  - id: identity-and-business-model
    title: Identity, Headquarters, and Business Model
    body: >-
      Torq is a private cybersecurity company founded in 2020 and headquartered in New York, NY (US headquarters), with
      its principal research and development center in Tel Aviv, Israel. The company also operates offices in Japan,
      Germany, Amsterdam, and London. Torq markets itself as the pioneer of the AI Security Operations Center (AI SOC),
      offering an enterprise-grade platform that combines Hyperautomation with agentic artificial intelligence to
      autonomously detect, triage, investigate, and respond to cybersecurity threats at machine speed. The platform
      integrates with 700+ third-party security tools across SIEM, EDR, cloud platforms, identity providers, and
      ticketing systems, enabling security teams to automate workflows without writing code.


      The business model is annual SaaS subscription-based, with pricing structured around alert volume, workflow
      automations, and enterprise seat licensing. Enterprise contracts typically range from $150,000 to $350,000 or more
      per year for large-scale deployments, according to independent market analysis. Torq's go-to-market motion
      combines a direct enterprise sales force with a growing channel partner program that includes major VARs, MSSPs,
      and global technology alliances. The company positions its platform as the successor to legacy SOAR (Security
      Orchestration, Automation, and Response) tools, arguing that traditional SOAR was not designed for modern hybrid
      cloud environments or AI-era alert volumes. Torq's "any-code" approach—supporting no-code drag-and-drop,
      low-code, and full-code development—has enabled security teams to build sophisticated automations without
      depending on scarce engineering resources, a key differentiator that has driven bottom-up adoption inside Fortune
      500 SOCs.
    claimRefs:
      - CO001
      - CO002
      - CO003
      - CO004
      - CO005
      - CO006
    tableRefs:
      - TO001
    figureRefs:
      - FO002

  - id: founders-and-leadership
    title: Founders, Leadership, and Key-Person Dependence
    body: >-
      Torq was co-founded by three cybersecurity veterans with strong prior exit records and deep domain expertise.
      Ofer Smadari (CEO) previously co-founded Luminate Security, a zero-trust application access company that
      Symantec acquired in 2019, and also held leadership roles at Adallom and FireLayers. Leonid Belkind (CTO)
      co-founded Twistlock, a cloud-native container security company that Palo Alto Networks acquired for
      approximately $410 million in 2019, establishing him as a proven builder in the cloud security space. Eldad Livni
      (Chief Innovation Officer, CINO) also co-founded Luminate Security alongside Smadari and has focused on
      Torq's technical platform innovation since the company's founding.


      The founding team's shared history at Luminate and complementary roles at Twistlock and Check Point creates
      cohesive founder-market fit: all three bring hands-on experience building and scaling enterprise security
      products that were subsequently validated by major strategic acquirers. However, the three co-founders represent
      a critical key-person concentration. All hold C-level operational roles and are the company's primary product and
      technical visionaries. Any departure of CEO Smadari, CTO Belkind, or CIO Livni would create material leadership
      risk at a stage when the company is scaling toward $100 million ARR. Torq has not publicly disclosed board
      composition or announced formal board governance structures, which limits independent diligence on decision-making
      oversight beyond the founding team. Despite multiple funding rounds, no independent board member additions have
      been publicly announced.
    claimRefs:
      - CO007
      - CO008
      - CO009
      - CO010
      - CO011
      - CO012
    tableRefs:
      - TO002

  - id: funding-history-and-capital
    title: Funding History, Valuation, and Capital Structure
    body: >-
      Torq has raised $332 million in total funding across five documented rounds since its 2020 inception. The
      company's earliest funding totaled approximately $50 million by late 2021, financing the Hyperautomation
      platform's first version and the company's initial enterprise customer base. In June 2023, Torq raised a $70
      million Series B led by Insight Partners as the company reported ARR of approximately $15 million. The financing
      accelerated with a $42 million Series B expansion in January 2024 and a $70 million Series C in September 2024
      led by Evolution Equity Partners, bringing total funding to $192 million at the time of the Series C close.


      The defining capital event was a $140 million Series D announced January 12, 2026, led by cybersecurity-focused
      fund Merlin Ventures—known for its US federal and government market connections—with participation from all
      existing investors including Evolution Equity Partners, Notable Capital (formerly GGV Capital), Bessemer Venture
      Partners, Insight Partners, Greenfield Partners, and J.P. Morgan Private Bank. The Series D valued Torq at $1.2
      billion post-money, cementing its unicorn status. Proceeds are earmarked for product R&D, enterprise go-to-market
      expansion, and a strategic push into the US federal and public-sector markets. The company targets $100 million
      ARR by fiscal year 2026, implying a 4-5x step-up from the CEO's stated ARR of approximately $24 million at
      Series C time, supported by the 300% revenue growth reported for 2025. Revenue multiple on the $1.2 billion
      valuation versus estimated ARR implies a 20-25x multiple, consistent with high-growth cybersecurity SaaS peers
      at comparable stages.
    claimRefs:
      - CO013
      - CO014
      - CO015
      - CO016
      - CO017
      - CO018
      - CO019
