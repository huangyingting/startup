  evidenceGaps:
    - type: private-evidence-only
      severity: blocking
      topic: board governance
      missingEvidence: >-
        Board composition, board charter, investor board-seat rights, governance structure, and independent director
        identities. No public source reviewed disclosed any board member beyond the three co-founders.
      whyItMatters: >-
        Lack of board transparency prevents assessment of checks on founder decision-making, investor alignment, or
        succession planning — all material governance considerations at a $1.2B unicorn stage.
      diligencePath: >-
        Request board deck, cap table, and investor rights agreements directly from Torq management; review
        Series D term sheet for board composition and protective provisions.
      relatedQuestionRefs:
        - QO018

    - type: private-evidence-only
      severity: blocking
      topic: FedRAMP status
      missingEvidence: >-
        Current FedRAMP authorization status, expected timeline to authorization, scope of required product changes,
        and estimated investment required for federal market compliance.
      whyItMatters: >-
        Federal market expansion is a core pillar of the Series D investment thesis; if FedRAMP authorization is
        18-24 months away, the federal revenue contribution cannot be counted in near-term ARR projections.
      diligencePath: >-
        Review FedRAMP marketplace listing for Torq; request federal product roadmap and compliance timeline from
        management; check whether Merlin Ventures has sponsored any FedRAMP-in-process authorizations.
      relatedQuestionRefs:
        - QO024

    - type: missing-source
      severity: material
      topic: funding history discrepancy
      missingEvidence: >-
        Precise round-by-round breakdown of Torq's early 2021 funding. TechRepublic states "$50M in December 2021"
        as a single round; task brief references a $20M Seed plus $42M Series A. The official total of $332M cannot
        be fully reconstructed from public sources alone.
      whyItMatters: >-
        Round-by-round breakdown affects cap table analysis, investor ownership percentages, and ESOP dilution history.
        Uncertainty in early round sizes prevents accurate pro-forma ownership modeling.
      diligencePath: >-
        Request cap table from management; cross-reference SEC EDGAR Form D filings for Torq Technologies Inc if
        registered under US securities law.
      relatedQuestionRefs: []

    - type: private-evidence-only
      severity: material
      topic: ARR and unit economics
      missingEvidence: >-
        Audited ARR, NRR, gross margin, CAC, LTV, and burn rate figures. CEO-stated ARR of $24M at Series C time and
        $100M FY2026 target are the only disclosed financial metrics; no third-party-verified financial data exists.
      whyItMatters: >-
        Revenue multiple on the $1.2B valuation varies dramatically based on actual ARR: 50x at $24M vs 12x at $100M.
        Without audited financials, valuation assessment remains highly uncertain.
      diligencePath: >-
        Request audited or reviewed financial statements, ARR waterfall, NRR cohort data, and burn rate schedules
        from management as part of formal diligence.
      relatedQuestionRefs:
        - QO007
