callouts:
  - calloutType: strength
    title: Proven Founder-Market Fit with Prior Exits
    body: >-
      All three Torq co-founders have prior cybersecurity company exits: Smadari and Livni from Luminate Security
      (Symantec acquisition, 2019) and Belkind from Twistlock (Palo Alto Networks acquisition, ~$410M, 2019). This
      proven M&A track record signals product-market viability and de-risks the technology thesis. The founders'
      shared history at Luminate creates organizational cohesion rare in early-stage companies.
    claimRefs:
      - CO007
      - CO008
      - CO009

  - calloutType: risk
    title: Key-Person Concentration and Board Opacity
    body: >-
      All three co-founders hold C-level operational roles with no publicly announced succession plans or independent
      board additions. Board composition and governance structure remain entirely undisclosed. Any departure of Smadari,
      Belkind, or Livni would constitute a material leadership risk during an inflection period when the company is
      scaling toward $100M ARR and entering the US federal market. Investors should request board charter, board member
      identities, and vesting schedules for founders before completing diligence.
    claimRefs:
      - CO007
      - CO008
      - CO009
      - CO010
      - CO011
      - CO012

  - calloutType: insight
    title: Federal Market Entry as Asymmetric Revenue Opportunity
    body: >-
      The Merlin Ventures partnership is not merely a capital event — it represents a structured GTM entry into the
      US federal and public-sector market, where Merlin has three decades of procurement relationships and
      compliance expertise. If Torq achieves FedRAMP authorization, the addressable US federal cybersecurity spend
      could add a substantial new revenue layer beyond the commercial enterprise market. This de-risks over-reliance
      on commercial Fortune 500 concentration while opening a less contested, high-value segment.
    claimRefs:
      - CO016
      - CO036
      - CO037
      - CO038
      - CO039

