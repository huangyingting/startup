  - id: product-portfolio
    title: Products, Technology Platform, and Key Differentiators
    body: >-
      Torq's product portfolio centers on two integrated offerings: the Torq Hyperautomation platform and Torq
      HyperSOC. The Hyperautomation platform is an enterprise-grade, cloud-native, multi-tenant, zero-trust security
      workflow automation engine that supports no-code drag-and-drop design, low-code configuration, and full-code
      custom development. It connects to 700+ pre-built integrations spanning cloud providers (AWS, Azure, GCP),
      endpoint security (CrowdStrike, SentinelOne), SIEM platforms (Splunk, Microsoft Sentinel), identity providers
      (Okta, Azure AD), ticketing systems (ServiceNow, Jira), and dozens of other categories. Real-time API monitoring
      ensures integrations remain functional as third-party APIs evolve.


      Torq HyperSOC, first launched in 2023, is the company's AI-powered SOC platform built on top of the
      Hyperautomation engine. It uses autonomous AI agents to analyze, correlate, and enrich unprocessed security
      events from any connected source, creates contextually enriched cases, and intelligently prioritizes them by
      severity, subject matter expertise, and potential impact. Key capabilities include: (1) 100% alert triage using
      low-fidelity alert automation that cuts investigation time by up to 90%; (2) self-service agentic workflow
      builder enabling teams to deploy sophisticated agents with minimal effort; and (3) Torq Socrates, the
      natural-language AI interface that allows analysts to query, direct, and investigate cases in plain English.
      In 2025, the company shipped HyperSOC 2.0 with multi-agent system architecture and native Model Context
      Protocol (MCP) support, extending the platform's ability to coordinate multiple specialized AI agents on
      complex, multi-step security investigations. Torq also acquired RevRod, a stealth Israeli AI startup, for
      over $20 million in 2025 to accelerate multi-agent capabilities.
    claimRefs:
      - CO020
      - CO021
      - CO022
      - CO023
      - CO024
      - CO025
      - CO026

  - id: customer-traction-and-scale
    title: Customer Traction, Scale Metrics, and Analyst Recognition
    body: >-
      Torq's stated customer base includes hundreds of multinational enterprises, with the Series D announcement
      specifically naming Marriott International, PepsiCo, Procter & Gamble, Siemens, Uber, Virgin Atlantic, Abnormal
      Security, Armis, Check Point Security, Chipotle Mexican Grill, Inditex (Zara group), Informatica, Kyocera,
      Telefonica, Valvoline, and Wiz as named customers. Fortune 100 companies are actively deploying Torq AI Agents
      for end-to-end investigations and incident response within their live SOC environments. The company's own website
      claims 100 million or more daily security automations running across its customer base, an 800% improvement in
      workflow execution time versus legacy tools, and a 10x operational and productivity boost for security teams.
      Torq holds a 4.8 average rating on both G2 and Gartner Peer Insights review platforms.


      Independent analyst recognition has accelerated in 2025-2026. KuppingerCole named Torq an Overall Leader in its
      2026 Leadership Compass for the Emerging AI SOC, calling it "a strong fit for sophisticated enterprise SOC
      teams." GigaOm positioned Torq as a Leader and Faster Mover in the SecOps Automation Radar with 5-star ratings
      for AI guardrails, case management, and integrations. Torq won the Best Emerging Technology award at RSA
      Conference 2025. Forbes named Torq a cybersecurity standout. Customer testimonials include Valvoline CISO Corey
      Kaemming stating that "within 48 hours of deployment, our team was using Torq's AI SOC Platform" and Virgin
      Atlantic CISO John White calling Torq "our umbrella platform" for security operations. These third-party
      validations provide meaningful corroboration of Torq's product claims, though absolute customer count and
      net revenue retention figures remain undisclosed.
    claimRefs:
      - CO027
      - CO028
      - CO029
      - CO030
      - CO031
      - CO032
      - CO033
    figureRefs:
      - FO003

  - id: geographic-footprint-growth
    title: Geographic Footprint, Growth Plans, and Federal Market Expansion
    body: >-
      Torq operates from its US headquarters in New York and its main R&D center in Tel Aviv, Israel, where the
      majority of its engineering and product development teams are located. Additional offices are in Japan, Germany,
      Amsterdam, and London, reflecting the company's multinational enterprise customer base across North America,
      EMEA, and Asia-Pacific. As of early 2026, the company employs 350+ people (referred to as "Torqers"), with
      plans to hire approximately 200 additional employees throughout 2026 across engineering, sales, and customer
      success globally.


      The Series D's strategic dimension is the US federal and public-sector market expansion enabled by lead investor
      Merlin Ventures. Merlin has nearly 30 years of experience navigating US government procurement and compliance
      requirements, including FedRAMP, and maintains deep relationships with US government cybersecurity buyers.
      For Torq, FedRAMP certification and federal market penetration represent a significant additional revenue
      opportunity, given that the US federal government spent approximately $11 billion on cybersecurity in fiscal
      2023. Geopolitical risk exists around Torq's Israeli R&D base—roughly 60-70% of engineering talent is
      estimated to be in Israel—though the company has not disclosed specific headcount by geography. Torq also
      expanded its channel partner program significantly in 2025, partnering with major solution providers including
      GuidePoint Security, Optiv, Stratascale, and Trace3, and establishing technology alliances with CrowdStrike,
      SentinelOne, Abnormal Security, Check Point, and Wiz. A partnership with RSM US integrated HyperSOC into
      RSM's managed SOC offering, extending Torq's reach into the MSSP and MDR market segment.
    claimRefs:
      - CO034
      - CO035
      - CO036
      - CO037
      - CO038
      - CO039
      - CO040

