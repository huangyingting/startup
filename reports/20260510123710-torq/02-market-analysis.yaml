  - id: section-3
    title: Buyer landscape and segmentation
    body: >-
      The primary economic buyer for SOAR and hyperautomation platforms is the CISO or SOC director in enterprise
      security operations. PeerSpot reviews and independent MSSP analysis consistently identify the CISO as the
      decision-maker and budget authority, with SOC analysts and security engineers as the operational users. The most
      active buying verticals are financial services, healthcare, and government, where regulatory pressure, breach
      frequency, and staffing constraints combine to make automation compelling. CISA best practices guidance for
      federal agencies and regulated-sector operators frames automation as a core competency in modern incident response
      programs, providing institutional legitimacy for security automation investment. The adoption trigger most
      commonly observed in independent commentary is a combination of alert fatigue — teams unable to clear queues
      manually — and a specific breach or near-miss event that exposes the cost of manual workflows. Secondary triggers
      are compliance initiatives and board-level pressure after high-profile industry incidents. Exaforce's 2026 SOAR
      comparison report segments automation buyers by technology posture and identifies "deterministic-first"
      organizations that need reliable, auditable playbooks over probabilistic AI responses as Torq's primary cohort.
      No public source discloses Torq's actual customer vertical mix, contract values, or win-rate by segment, so
      these remain open diligence items.
    claimRefs:
      - CM019
      - CM020
      - CM021
      - CM022
