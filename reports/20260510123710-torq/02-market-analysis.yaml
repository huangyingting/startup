  evidenceGaps:
    - id: GM001
      title: No independent analyst quadrant or Wave report found placing Torq vs. legacy SOAR competitors
      description: >-
        No Forrester Wave, Gartner Magic Quadrant, or equivalent independent analyst quadrant placing Torq against
        Palo Alto XSOAR, IBM QRadar SOAR, or Splunk SOAR was found in the public record. The Exaforce comparison
        report is the closest available substitute but it is from a competitor and not an independent research firm.
      severity: moderate
      relatedQuestionRefs:
        - QM012
      diligenceAsk: >-
        Request any Gartner, Forrester, or IDC analyst placement for Torq from management, and ask whether the
        company expects to appear in a named Wave or Quadrant by 2026.

    - id: GM002
      title: XDR consolidation threat quantification not confirmed by independent market data
      description: >-
        While Palo Alto Networks' own materials and Automation Atlas commentary describe XDR platform absorption of
        SOAR functions, no independent analyst has published a quantified estimate of how much standalone SOAR revenue
        is at risk from XDR bundling. The magnitude of the structural threat to Torq's addressable market remains
        unquantified in public evidence.
      severity: moderate
      relatedQuestionRefs:
        - QM016
      diligenceAsk: >-
        Ask management for win/loss data on evaluations where XDR bundling was the chosen alternative and for any
        internal estimate of the revenue at risk from XDR consolidation.

    - id: GM003
      title: Cloud-native versus legacy SOAR deployment split not publicly quantified
      description: >-
        No independent source publishes a market share breakdown separating cloud-native SOAR deployments from
        legacy on-premises SOAR installations. The cloud-native share of new deployments is structurally growing
        but no quantified split was found in accessible public research.
      severity: low
      relatedQuestionRefs:
        - QM026
      diligenceAsk: >-
        Request any industry data or internal win/loss analysis that quantifies the cloud-native versus legacy
        deployment split among Torq's target enterprise accounts.
