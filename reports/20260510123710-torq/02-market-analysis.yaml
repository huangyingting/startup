  - id: section-4
    title: Growth drivers and market tailwinds
    body: >-
      Three compounding structural drivers underpin SOAR and hyperautomation demand. First, the global cybersecurity
      talent shortage has grown from one million unfilled roles in 2013 to 3.5 million by 2021 per Cybersecurity
      Ventures and has continued to increase, creating an irreversible pressure to automate analyst workflows. Second,
      breach costs make the ROI case explicit: IBM's Cost of Data Breach report puts the average global breach cost at
      $4.88M in 2024, and IBM's own data shows that organizations resolving breaches in under 200 days save $1.02M on
      average compared to slower responders. Third, AI integration is now a primary 2026 market driver: Automation
      Atlas documents the shift toward AI-augmented SOAR where large language models handle enrichment, summarization,
      and first-pass analysis while deterministic automation handles containment and remediation. These three drivers
      are reinforcing: talent scarcity raises the cost of manual response, breach costs quantify the ROI of faster
      automated response, and AI lowers the skill bar required to build and maintain automation workflows. CISA's
      official cybersecurity guidance explicitly supports automation as a best practice, adding regulatory validation
      to commercial demand signals. For valuation purposes, the drivers are durable and not cyclical, but the
      translation from market tailwind to company revenue requires evidence on Torq's win rates, retention, and
      expansion trajectory that is not yet available in the public record.
    claimRefs:
      - CM015
      - CM016
      - CM017
      - CM018
      - CM027
      - CM028
      - CM029
      - CM040
    tableRefs:
      - TM004
  - id: section-5
    title: Adoption constraints and structural risks
    body: >-
      The primary adoption constraints are integration complexity, playbook maintenance burden, and skills scarcity in
      security automation engineering. Underdefense and Automation Atlas independently identify integration with
      existing security stacks — SIEM, EDR, ticketing, identity — as the most frequently cited deployment barrier,
      with multi-system orches­tration requiring weeks to months of professional services and configuration work.
      Playbook maintenance is a second constraint: as alert patterns change and tools update, playbooks require
      ongoing engineering investment, which erodes ROI at smaller SOC teams that lack dedicated automation engineers.
      Dark Reading coverage highlights the skills gap in security automation as a persistent bottleneck that slows
      deployment timelines even at motivated enterprises. On the structural risk side, XDR platforms from Palo Alto
      Networks, CrowdStrike, and Microsoft Sentinel are progressively absorbing traditional SOAR alert correlation and
      automated playbook functions into broader platform suites, threatening the standalone market for point-product
      SOAR vendors. For Torq specifically, the hyperautomation positioning — breadth across all security workflows,
      not only SOC alerting — is the key differentiation argument against XDR absorption, but the durability of that
      differentiation depends on continued platform breadth investment and the ability to demonstrate use cases that
      XDR bundling cannot replicate. No independent source has confirmed Torq's actual differentiation in head-to-head
      evaluations at named enterprise accounts.
    claimRefs:
      - CM035
      - CM036
      - CM037
      - CM038
      - CM039
      - CM014
