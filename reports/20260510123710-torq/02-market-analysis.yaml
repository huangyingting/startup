chapter:
  number: 2
  title: Market Analysis
  summary: >-
    Torq competes in the SOAR and security hyperautomation market, a segment growing from roughly $1.2B in 2022 toward
    $2.3B by 2027 per MarketsandMarkets at a 15.8% CAGR, and embedded inside a broader security automation pool that
    International Finance projects at $26.6B by 2032. Market boundary logic matters here: the strict SOAR category
    captures incident-response orchestration and playbook automation, while Torq's hyperautomation positioning reaches
    further into any enterprise security workflow, connecting the company to Gartner's much larger hyperautomation
    market framing. Demand is structurally supported by a 3.5-million-position cybersecurity talent gap, IBM-documented
    average breach costs of $4.88M, and accelerating AI-augmented SOC adoption. The primary economic buyer is the CISO
    or SOC director in mid-market and enterprise security operations centers, with financial services, healthcare, and
    government as leading verticals. Legacy SOAR vendors such as Palo Alto XSOAR, IBM QRadar SOAR, and Splunk SOAR
    (Cisco) frame the incumbent landscape; XDR platform consolidation represents the principal structural risk. No
    independent source has published a Torq-specific SAM or SOM, so near-term market share assumptions remain a
    diligence item.
sections:
  - id: section-1
    title: Market boundary — SOAR, security orchestration, and hyperautomation
    body: >-
      The market boundary for Torq starts with what the product claims to do: automate any security operations workflow
      through a code-free, cloud-native hyperautomation platform. In analyst terms that spans two adjacent market
      frames. The narrow frame is SOAR — Security Orchestration, Automation and Response — which TechTarget defines as
      a platform combining orchestration of security tools, automation of repetitive tasks, and threat intelligence
      operations. MarketsandMarkets sizes this strict SOAR market at roughly $1.2B in 2022 growing to $2.3B by 2027.
      The broader frame is security automation or hyperautomation, which Torq's materials extend to any enterprise
      security process — not only SOC incident response. That framing connects to International Finance's $26.6B
      security automation projection for 2032 and to Gartner's broader hyperautomation market thesis that Torq cites
      in its investor materials. Included spend is security operations automation: playbook execution, alert triage,
      investigation, containment, enrichment, and cross-tool orchestration. Excluded spend is identity management,
      endpoint protection, SIEM analytics, and firewall policy that do not directly touch workflow automation. Status-quo
      substitutes are legacy on-premises SOAR platforms (XSOAR, QRadar SOAR, Splunk SOAR), manual analyst workflows,
      and emerging XDR platforms that embed some automation. The boundary distinction matters because Torq's valuation
      case rests partly on claiming the wider hyperautomation frame, yet the company's current revenue base and buyer
      conversations are most legibly anchored in the SOC automation segment where it has named enterprise customers and
      third-party validation.
    claimRefs:
      - CM001
      - CM002
      - CM004
      - CM005
      - CM006
      - CM007
      - CM008
      - CM011
      - CM012
      - CM013
