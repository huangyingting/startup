  - number: 2
    title: Market Analysis
    sections:
      - number: '2.1'
        title: Market boundary — SOAR, security orchestration, and hyperautomation
        blocks:
          - type: paragraph
            body: >-
              The market boundary for Torq starts with what the product claims to do: automate any security operations
              workflow through a code-free, cloud-native hyperautomation platform. In analyst terms that spans two
              adjacent market frames. The narrow frame is SOAR — Security Orchestration, Automation and Response — which
              TechTarget defines as a platform combining orchestration of security tools, automation of repetitive
              tasks, and threat intelligence operations. MarketsandMarkets sizes this strict SOAR market at roughly
              $1.2B in 2022 growing to $2.3B by 2027. The broader frame is security automation or hyperautomation, which
              Torq's materials extend to any enterprise security process — not only SOC incident response. That framing
              connects to International Finance's $26.6B security automation projection for 2032 and to Gartner's
              broader hyperautomation market thesis that Torq cites in its investor materials. Included spend is
              security operations automation: playbook execution, alert triage, investigation, containment, enrichment,
              and cross-tool orchestration. Excluded spend is identity management, endpoint protection, SIEM analytics,
              and firewall policy that do not directly touch workflow automation. Status-quo substitutes are legacy
              on-premises SOAR platforms (XSOAR, QRadar SOAR, Splunk SOAR), manual analyst workflows, and emerging XDR
              platforms that embed some automation. The boundary distinction matters because Torq's valuation case rests
              partly on claiming the wider hyperautomation frame, yet the company's current revenue base and buyer
              conversations are most legibly anchored in the SOC automation segment where it has named enterprise
              customers and third-party validation.
            claimRefs:
