        title: Customer Base Overview and Segmentation
        blocks:
          - type: paragraph
            body: >
              Torq has built a customer base spanning Fortune 500 enterprises, mid-market technology companies, and
              managed security service providers (MSSPs) since its 2020 founding. The company's platform serves two
              primary buyer personas: in-house Security Operations Center (SOC) teams at large enterprises who use Torq
              HyperSOC for autonomous threat detection and response, and MSSPs that embed Torq Hyperautomate into their
              managed service delivery to offer scalable automated security operations to their end clients. Torq's
              customer segmentation reflects the dual-product go-to-market strategy: HyperSOC targets the upper
              mid-market and enterprise segment (typically 2,000+ employee companies with mature security programs and
              existing SIEM/EDR tooling), while Hyperautomate targets both enterprises and MSSPs who need workflow
              automation without deep security engineering expertise. Enterprise verticals represented in Torq's
              disclosed customer base include financial services, healthcare, technology/SaaS, and telecommunications.
              The MSSP channel is particularly strategic: MSSPs act simultaneously as customers (buying Torq licenses),
              distribution partners (reselling managed SOC services built on Torq), and proof-of-scale validators
              (demonstrating platform reliability at high alert volumes). G2 reviews and TrustRadius feedback confirm
              that customers value Torq's no-code automation builder and deep pre-built connector library (700+
              integrations), enabling rapid time-to-value without requiring custom development resources. The platform's
              Cloud100 2025 recognition by Bessemer Venture Partners and Forbes further validates enterprise market
              traction.
