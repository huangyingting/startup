companyProfile:
  summary: |
    Torq is a cybersecurity hyperautomation company founded in 2020 by Eldad Livni (CEO) and
    Leonid Belkind (CTO), veterans of Check Point Software. The company's platform combines a
    no-code/low-code security workflow engine with 1,000+ integrations, Socrates AI (a proprietary
    multi-agent reasoning layer), and HyperSOC — an autonomous SOC tier-replacement product that
    claims 90–95% autonomous Tier-1 alert resolution. HyperSOC 2.0 (GA Q4 2025) extends to Tier-2
    autonomous investigation and proactive threat hunting. The RevRod acquisition (2025, ~$20M)
    added AI-powered threat intelligence enrichment. Torq serves 300+ enterprise customers including
    Marriott, PepsiCo, and P&G, with a $140M Series D at a $1.2B valuation (January 2026) led by
    Merlin Ventures. The platform is cloud-native SaaS only (AWS/Azure) with SOC 2 Type II and
    FedRAMP authorization in progress.
