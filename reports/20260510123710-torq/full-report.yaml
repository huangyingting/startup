      - number: '1.2'
        title: Founders, Leadership, and Key-Person Dependence
        blocks:
          - type: paragraph
            body: >-
              Torq was co-founded by three cybersecurity veterans with strong prior exit records and deep domain
              expertise. Ofer Smadari (CEO) previously co-founded Luminate Security, a zero-trust application access
              company that Symantec acquired in 2019, and also held leadership roles at Adallom and FireLayers. Leonid
              Belkind (CTO) co-founded Twistlock, a cloud-native container security company that Palo Alto Networks
              acquired for approximately $410 million in 2019, establishing him as a proven builder in the cloud
              security space. Eldad Livni (Chief Innovation Officer, CINO) also co-founded Luminate Security alongside
              Smadari and has focused on Torq's technical platform innovation since the company's founding.


              The founding team's shared history at Luminate and complementary roles at Twistlock and Check Point
              creates cohesive founder-market fit: all three bring hands-on experience building and scaling enterprise
              security products that were subsequently validated by major strategic acquirers. However, the three
              co-founders represent a critical key-person concentration. All hold C-level operational roles and are the
              company's primary product and technical visionaries. Any departure of CEO Smadari, CTO Belkind, or CIO
              Livni would create material leadership risk at a stage when the company is scaling toward $100 million
              ARR. Torq has not publicly disclosed board composition or announced formal board governance structures,
              which limits independent diligence on decision-making oversight beyond the founding team. Despite multiple
              funding rounds, no independent board member additions have been publicly announced.
