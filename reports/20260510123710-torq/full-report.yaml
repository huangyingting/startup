chapters:
  - number: 1
    title: Company Overview
    sections:
      - number: '1.1'
        title: Identity, Headquarters, and Business Model
        blocks:
          - type: paragraph
            body: >-
              Torq is a private cybersecurity company founded in 2020 and headquartered in New York, NY (US
              headquarters), with its principal research and development center in Tel Aviv, Israel. The company also
              operates offices in Japan, Germany, Amsterdam, and London. Torq markets itself as the pioneer of the AI
              Security Operations Center (AI SOC), offering an enterprise-grade platform that combines Hyperautomation
              with agentic artificial intelligence to autonomously detect, triage, investigate, and respond to
              cybersecurity threats at machine speed. The platform integrates with 700+ third-party security tools
              across SIEM, EDR, cloud platforms, identity providers, and ticketing systems, enabling security teams to
              automate workflows without writing code.


              The business model is annual SaaS subscription-based, with pricing structured around alert volume,
              workflow automations, and enterprise seat licensing. Enterprise contracts typically range from $150,000 to
              $350,000 or more per year for large-scale deployments, according to independent market analysis. Torq's
              go-to-market motion combines a direct enterprise sales force with a growing channel partner program that
              includes major VARs, MSSPs, and global technology alliances. The company positions its platform as the
              successor to legacy SOAR (Security Orchestration, Automation, and Response) tools, arguing that
              traditional SOAR was not designed for modern hybrid cloud environments or AI-era alert volumes. Torq's
              "any-code" approach—supporting no-code drag-and-drop, low-code, and full-code development—has enabled
              security teams to build sophisticated automations without depending on scarce engineering resources, a key
              differentiator that has driven bottom-up adoption inside Fortune 500 SOCs.
