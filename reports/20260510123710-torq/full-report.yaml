      - number: '5.3'
        title: Platform Architecture and Operating Model
        blocks:
          - type: paragraph
            body: >-
              Torq's platform is architected as a cloud-native multi-tenant SaaS service running on AWS and Azure
              infrastructure. The technical architecture comprises five functional layers that process security events
              from ingest through response execution. The ingest layer receives events via webhooks, REST API, SIEM
              connectors, and native integrations with EDR and cloud platforms. The event normalization layer converts
              diverse telemetry formats into a unified internal event model. The orchestration engine executes no-code
              playbooks in real time using an event-driven trigger model that eliminates the polling latency affecting
              legacy SOAR systems. The Socrates AI enrichment layer deploys specialized sub-agents for threat
              intelligence correlation, behavioral anomaly detection, case history retrieval, and remediation
              recommendation. The response execution layer takes automated action across 700+ integrations — isolating
              endpoints, revoking credentials, creating tickets, or escalating to human analysts.


              Torq provides a full REST API and webhook framework for developers who need programmatic control, and
              maintains versioned integration definitions in a public GitHub repository (torq-io/public-integrations)
              enabling community contributions and transparent connector versioning. The no-code builder, low-code
              templates, and full-code editor give security teams a range of automation development modalities matching
              their engineering capacity. AI confidence thresholds are configurable: low-confidence Socrates AI
              decisions route to human review rather than autonomous execution, providing a human-in-the-loop safety
              control. Multi-tenant isolation is enforced at the platform level; customers do not share compute or data
              resources, and GDPR compliance is maintained through EU data processing controls.
