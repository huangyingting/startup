      - number: '3.5'
        title: Moat Durability and Displacement Risk
        blocks:
          - type: paragraph
            body: >-
              Torq's competitive moat rests on three interrelated advantages: its proprietary integration library
              (1,000-plus tools), its AI autonomy layer (HyperSOC's 90 to 95 percent auto-close rate), and its
              proprietary operational training data accumulated from live enterprise SOC deployments. The integration
              library moat is real but porous — competitors are expanding their connector counts, and the open-source
              community can build integration libraries over time. The AI moat is more defensible in the near term
              because Torq's Socrates AI is trained on real enterprise alert data that compounds with scale. However,
              the principal displacement risk is from XDR platform vendors embedding native AI-triage automation at no
              incremental cost to existing customers. CrowdStrike Charlotte AI and Microsoft Copilot for Security both
              announced automated triage capabilities in 2025, a trend that will commoditize basic SOAR for
              single-vendor XDR shops. Torq's counter-positioning is the multi-vendor orchestration value proposition:
              for enterprises running heterogeneous security stacks across mixed EDR, SIEM, cloud, and identity tools
              from multiple vendors, Torq's 1,000-plus integration breadth cannot be replicated by any single XDR
              vendor's native automation layer. Adverse signal: community and review data indicate Torq's onboarding
              requires extensive pre-configuration before autonomous features engage, creating a barrier for smaller
              security teams. Torq's FedRAMP pursuit, if successful, would open federal accounts where incumbents IBM
              and Splunk already hold compliance credentials; the timeline and outcome remain uncertain.
