      - number: '2.2'
        title: Market sizing and growth trajectory
        blocks:
          - type: paragraph
            body: >-
              Public SOAR market data converges on a meaningful but still sub-$3B segment through 2027, growing at
              double-digit annual rates. MarketsandMarkets places the SOAR market at a 15.8% CAGR from 2022 to 2027
              reaching $2.3B, while Automation Atlas and aggregated analyst commentary track the trajectory toward $3.5B
              or higher by 2026 as cloud-native adoption accelerates adoption cycles. Broadening the lens to security
              automation overall, International Finance puts the addressable pool at $26.6B by 2032. Gartner's
              hyperautomation construct, cited by Torq's investor materials, implies a still larger total opportunity
              spanning business and security processes together. Multiple independent sources also report that 45 to 80
              percent of routine SOC tasks — particularly tier-1 alert triage — are automatable, which is the
              demand-side mechanism that justifies the market growth trajectory. These sizing figures carry the usual
              analyst caveats: boundary definitions differ across publishers, methodology is rarely auditable, and no
              source cleanly isolates Torq's specific serviceable market within the broader SOAR or security automation
              pools. The safest evidence-backed characterization is that the SOAR segment is real, material, and growing
              at roughly 15-20% annually, with Torq operating in the cloud-native premium tier of that market.
            claimRefs:
