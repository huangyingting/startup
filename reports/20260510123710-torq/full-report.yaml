  - number: 5
    title: Product & Technology
    sections:
      - number: '5.1'
        title: Product Definition and Customer Workflow Value
        blocks:
          - type: paragraph
            body: >-
              Torq delivers an AI-native Security Operations Center (AI SOC) platform that transforms how enterprise
              security teams manage, investigate, and respond to cybersecurity threats. From the customer's perspective,
              the product sits between the ingestion of raw security alerts from SIEM, EDR, and cloud platforms and the
              execution of containment or escalation actions across the security tool stack. Without Torq, Tier-1 SOC
              analysts manually triage each alert: they correlate signals across five to ten tools, run enrichment
              lookups, and decide whether to escalate or close each event. This process typically takes 15–45 minutes
              per alert and cannot scale to modern enterprise environments where tens of thousands of alerts fire daily.


              Torq's HyperSOC product replaces the Tier-1 analyst loop with an autonomous AI-driven pipeline. When an
              alert arrives from a SIEM or EDR tool, HyperSOC immediately routes it through a pre-built or custom
              playbook, enriches it with Socrates AI's multi-agent reasoning (querying threat intel, behavioral data,
              and case history), makes an autonomous triage decision, and either closes the alert, executes a
              containment action, or escalates to a human analyst — all within seconds. Torq claims 90–95% of Tier-1
              alerts are auto-resolved, reducing analyst workload by approximately 90% and mean-time-to-respond by up to
              80% in early customer deployments. Independent reviews corroborate that deployment completes within 2–4
