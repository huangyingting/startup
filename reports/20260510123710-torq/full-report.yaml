            body: >-
              Torq maintains a documented security and compliance posture appropriate for Fortune 500 enterprise
              procurement. SOC 2 Type II certification provides a 12-month audited attestation of security,
              availability, and confidentiality controls, validated by a Big Four or equivalent auditor under AICPA
              standards. ISO 27001 certification provides internationally recognized information security management
              system assurance. GDPR compliance supports EU data processing requirements for European customer
              deployments. The platform undergoes annual third-party penetration testing, the results of which are not
              publicly disclosed but are available to enterprise customers under NDA through the Torq Trust Center.


              Customer data isolation is enforced through multi-tenant architecture controls; Torq customers do not
              share compute or storage resources. Autonomous response confidence thresholds provide a human-in-the-loop
              safety control for low-confidence AI decisions. The 99.9% SLA underpins mission-critical deployment
              readiness. Key compliance gaps remain for regulated industries: Torq does not currently offer on-premises,
              air-gapped, or FedRAMP-authorized deployment, which limits adoption in US federal agencies, classified
              environments, and certain financial services institutions with data residency mandates. GDPR compliance is
              maintained through EU data processing controls, but customer-controlled private cloud isolation is not
              available. G2 and PeerSpot reviews are generally positive on security and reliability. Independent analyst
              coverage from Gartner Peer Insights and Forrester reinforces trust posture. The primary trust risk is that
              AI-autonomous response decisions could disrupt legitimate operations if confidence thresholds are
              misconfigured, an issue SC Media identified as an industry-wide risk for autonomous security platforms.
