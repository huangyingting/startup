      - number: '5.2'
        title: Product Module and Asset Map
        blocks:
          - type: paragraph
            body: >-
              Torq's product portfolio comprises five distinct functional modules delivered within a unified
              cloud-native SaaS platform. HyperSOC is the flagship AI SOC product, commercially available since 2024,
              and represents the primary revenue driver. Socrates AI is the proprietary multi-agent reasoning engine
              embedded within HyperSOC and optionally accessible via API for custom orchestration workflows. The
              no-code/low-code/full-code workflow builder is the foundational development environment enabling security
              teams to build, test, and deploy automation playbooks without Python scripting expertise. The integration
              framework provides 700+ certified connectors across SIEM, EDR, cloud, identity, and ticketing categories.
              The RevRod acquisition added a contextual AI data pipeline that was integrated into Socrates AI to enrich
              its threat investigation data sources.


              HyperSOC 2.0 was released in Q1 2026, extending autonomous coverage from Tier-1 to Tier-2 incidents and
              adding proactive threat hunting capabilities. The 2027 roadmap targets a fully autonomous SOC architecture
              that eliminates routine human intervention at both analyst tiers. From an IP perspective, Torq's most
              valuable proprietary assets are the Socrates AI multi-agent architecture (trained on security operations
              data), the accumulated automation recipe library (growing with each new customer deployment), and the
              no-code builder's competitive moat from switching cost: enterprises that build hundreds of playbooks on
              the platform face high friction migrating to alternative orchestration tools. No publicly registered
              patents have been identified; Torq's IP relies on trade secrets, proprietary training data, and the
              compounding data flywheel from enterprise deployments.
