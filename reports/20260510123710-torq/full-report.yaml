      - number: '7.2'
        title: Regulatory and Legal Risk
        blocks:
          - type: paragraph
            body: >-
              Torq operates at the intersection of three active regulatory regimes that are rapidly evolving in
              2024–2026: data privacy law (GDPR, Israeli PDPA), cybersecurity sector regulation (NIS2, FedRAMP), and AI
              governance (EU AI Act). GDPR Article 28 requires data processing agreements between Torq and each EU
              customer whose security telemetry flows through Torq's platform; failure to maintain compliant DPAs
              exposes Torq's customers to supervisory authority investigations and exposes Torq itself to contractual
              liability for processor non-compliance. The EU NIS2 Directive, which entered force in October 2024, may
              classify security automation platform vendors serving critical infrastructure operators as essential
              service providers subject to incident reporting, security requirements, and national supervisory
              oversight. ENISA guidance on NIS2 implementation clarifies that managed security service providers and
              their software vendors face heightened obligations. The EU AI Act, with high-risk AI provisions taking
              effect in August 2026, presents the most forward-looking regulatory uncertainty: if autonomous security
              decision systems — such as Torq's HyperSOC autonomous triage and response — are classified as high-risk AI
              applications under Annex III, Torq would face mandatory conformity assessments, technical documentation
              requirements, and human oversight obligations that could require significant product re-architecture.
              FedRAMP authorization remains pending; without it, Torq cannot sell to U.S. federal agencies, foreclosing
              a large and growing government cybersecurity market. The SEC's 2023 cybersecurity disclosure rules affect
              Torq's enterprise customers rather than Torq directly, but create indirect risk by increasing scrutiny of
              security vendor supply chains. Israel-based headquarters means cross-border data transfers to Israel
              require GDPR adequacy safeguards; the Israeli PDPA was updated in 2023 to align closer with GDPR but
              adequacy status under EU law remains subject to European Commission review.
            claimRefs:
              - CR006
              - CR007
              - CR008
              - CR009
              - CR010
              - CR011
              - CR012
              - CR013
