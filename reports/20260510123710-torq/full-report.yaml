      - number: '2.4'
        title: Growth drivers and market tailwinds
        blocks:
          - type: paragraph
            body: >-
              Three compounding structural drivers underpin SOAR and hyperautomation demand. First, the global
              cybersecurity talent shortage has grown from one million unfilled roles in 2013 to 3.5 million by 2021 per
              Cybersecurity Ventures and has continued to increase, creating an irreversible pressure to automate
              analyst workflows. Second, breach costs make the ROI case explicit: IBM's Cost of Data Breach report puts
              the average global breach cost at $4.88M in 2024, and IBM's own data shows that organizations resolving
              breaches in under 200 days save $1.02M on average compared to slower responders. Third, AI integration is
              now a primary 2026 market driver: Automation Atlas documents the shift toward AI-augmented SOAR where
              large language models handle enrichment, summarization, and first-pass analysis while deterministic
              automation handles containment and remediation. These three drivers are reinforcing: talent scarcity
              raises the cost of manual response, breach costs quantify the ROI of faster automated response, and AI
              lowers the skill bar required to build and maintain automation workflows. CISA's official cybersecurity
              guidance explicitly supports automation as a best practice, adding regulatory validation to commercial
              demand signals. For valuation purposes, the drivers are durable and not cyclical, but the translation from
              market tailwind to company revenue requires evidence on Torq's win rates, retention, and expansion
              trajectory that is not yet available in the public record.
            claimRefs:
