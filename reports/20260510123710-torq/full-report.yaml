  - number: 8
    title: Valuation
    sections:
      - number: '8.1'
        title: Investment Thesis and Valuation Context
        blocks:
          - type: paragraph
            body: >-
              Torq closed a $140M Series D in January 2026 led by Bessemer Venture Partners, reaching an approximately
              $1.05B post-money valuation and entering unicorn status. Prior rounds totalled $115M across Series A
              ($10M, 2021), Series B ($35M, 2022), and Series C ($70M, 2023), bringing cumulative capital raised to
              approximately $255M as of the Series D close. The investment is grounded in four reinforcing pillars.
              First, the SOAR and AI-native SOC automation market is large and accelerating: analyst consensus projects
              the addressable market at $20-30B by 2028-2030 at a 20%+ compound annual growth rate, driven by the
              explosion of security alert volume, a chronic global shortage of SOC analysts, and the maturation of large
              language model capabilities applicable to triage workflows. Second, Torq's HyperSOC product represents a
              genuinely differentiated agentic AI architecture, purpose-built for autonomous Tier-1 SOC operations
              rather than AI capabilities grafted onto legacy SOAR, with 300+ pre-built integrations creating network
              effects and switching costs. Third, enterprise traction is demonstrated: 300+ named enterprise customers
              including Fortune 500 accounts, Cloud100 2025 recognition, and Bessemer's conviction as lead investor add
              institutional validation. Fourth, the competitive moat from Torq's integration breadth and agentic
              workflow orchestration creates defensible differentiation versus point-solution competitors. Against these
              thesis pillars, the anti-thesis centers on: (a) unverified ARR, with the estimated $50-70M ARR range
              carrying no public audit trail and potentially being materially lower; (b) valuation risk, as at 15-21x
              estimated ARR the multiple is at the premium end and leaves limited room for execution shortfalls; (c)
              competitive response from CrowdStrike Charlotte AI, Palo Alto XSIAM, and Microsoft Sentinel Automation,
              all materially resourced AI-SOC competitors that may compress Torq's TAM or accelerate pricing pressure;
              and (d) platform bundling risk, as large security platforms bundle AI-SOC capabilities. The net assessment
              is a conditional positive: the thesis is credible and the market is real, but the valuation requires
              verified ARR and NRR data before capital commitment above $1.05B. Entry discipline is paramount.
            claimRefs:
              - CV001
              - CV002
              - CV003
              - CV004
