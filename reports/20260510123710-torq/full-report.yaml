            body: >
              Customer retention at Torq is driven by deep workflow automation investment: once a customer has built and
              deployed 50+ automated workflows on the Torq platform, switching costs become substantial, as each
              workflow represents institutional knowledge encoded in the automation logic. This creates natural
              retention mechanics beyond contractual lock-in. While Torq has not publicly disclosed net revenue
              retention (NRR) or gross revenue retention (GRR) rates, company-claimed metrics suggest an NRR above 120%,
