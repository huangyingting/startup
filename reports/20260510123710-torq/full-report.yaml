      - number: '7.4'
        title: Partner and Dependency Risk
        blocks:
          - type: paragraph
            body: >-
              Torq's platform value proposition depends critically on the stability and continuity of integrations with
              a large ecosystem of third-party security vendors. This creates asymmetric dependency risks where changes
              by partners — API deprecation, pricing model shifts, or strategic pivots — can materially degrade Torq's
              product value with limited advance notice. CrowdStrike represents the highest-severity individual partner
              dependency: CrowdStrike Falcon is the leading EDR platform among Torq's enterprise customer base, and
              CrowdStrike's API stability and partnership posture directly affect the quality of Torq's automated
              endpoint response workflows. Following the July 2024 CrowdStrike Falcon sensor update incident that caused
              global IT outages, enterprise customers are more sensitized to vendor concentration risk in security
              software supply chains. Microsoft Sentinel and Splunk SIEM integrations are similarly critical;
              Microsoft's aggressive development of its own security automation capabilities through Microsoft Sentinel
              Automation and Copilot for Security creates both an integration dependency risk and a competitive threat
              risk simultaneously. AWS and Azure hyperscaler dependency, while partially mitigated by Torq's dual-cloud
              architecture, still concentrates the entire platform on two vendors whose pricing, API policies, and
              service-level commitments Torq cannot unilaterally control. Third-party LLM API dependency for Socrates AI
              capabilities introduces model availability, pricing, and terms-of-service change risk from LLM providers.
              MSSP channel partners such as ExtraHop and UnderDefense represent dependency in the opposite direction: if
              a major MSSP partner churns or shifts to a competing platform, Torq loses not just one customer but an
              entire channel book of business.
            claimRefs:
              - CR021
              - CR022
              - CR023
              - CR024
              - CR025
