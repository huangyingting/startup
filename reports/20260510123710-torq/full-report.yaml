      - number: '7.6'
        title: Mitigations, Monitoring, and Thesis-Break Triggers
        blocks:
          - type: paragraph
            body: >-
              Torq has implemented or is actively pursuing several credible mitigations across its risk clusters. On the
              regulatory front, SOC 2 Type II certification and active GDPR compliance documentation provide baseline
              enterprise procurement credibility, while FedRAMP authorization pursuit (if successful) would open the
              federal market and signal institutional security maturity. The multi-cloud AWS/Azure architecture reduces
              single-provider infrastructure failure risk, and the 700+ pre-built connector library reduces dependency
              on any single integration partner. On the AI accuracy dimension, Torq's Socrates AI multi-agent reasoning
              layer is designed to add contextual validation before autonomous action, reducing raw model error
              propagation. The RevRod acquisition adds data enrichment that improves signal quality for autonomous
              decisions. However, several risks lack adequate monitoring indicators or mitigations: FedRAMP
              authorization timeline is externally controlled; EU AI Act classification is uncertain and product
              re-architecture would be expensive; and co-founder key-person risk lacks publicly documented succession
              planning. Investors and acquirers should monitor the following early warning indicators on a quarterly
              basis: FedRAMP authorization status updates; EU AI Act implementing regulation progress as it relates to
              AI security systems; NRR trends (a decline below 110% for two consecutive quarters is a yellow flag; below
              100% is red); any public disclosure of a customer security incident attributable to Torq's platform;
              leadership departure of either co-founder; and Israel HQ operational continuity through geopolitical
              events. Thesis-break triggers — events that would warrant immediate position review — include: FedRAMP
              application denial or indefinite suspension; classification of Torq HyperSOC as a high-risk AI system
              under EU AI Act requiring product re-architecture; a material security breach at a named Torq customer
              attributable to platform failure; sustained NRR below 100% for three or more quarters; or co-founder
              departure within 12 months of a financing round.
            claimRefs:
              - CR031
              - CR032
              - CR033
              - CR034
              - CR035
