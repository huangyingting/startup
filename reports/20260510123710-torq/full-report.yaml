      - number: '7.5'
        title: Financial and Business Model Risk
        blocks:
          - type: paragraph
            body: >-
              Torq's financial risk profile reflects the standard vulnerabilities of a high-growth, pre-profitability
              enterprise SaaS company at the Series D stage. The $140M Series D raised in January 2026 at a $1.2B
              valuation implies investor confidence in the growth trajectory, but at an estimated $8–10M monthly burn
              rate, the company has approximately 14–18 months of runway before requiring additional capital or
              achieving cash-flow breakeven — a timeline that could compress significantly if the planned 200-person
              2026 hiring wave proceeds as announced. The most structurally significant financial risk is XDR
              commoditization: if CrowdStrike, Palo Alto Networks, Microsoft, or other platform vendors successfully
              deliver autonomous SOC capabilities natively within their broader platform bundles at lower incremental
              cost, Torq's standalone premium pricing would face severe compression. This is not a hypothetical scenario
              — Microsoft Copilot for Security and CrowdStrike Charlotte AI represent active product investments by
              well-resourced incumbents directly targeting Torq's autonomous SOC positioning. NRR sustainability is a
              second-order financial risk: Torq's 120% NRR estimate requires consistent expansion within existing
              accounts, which depends on customers actually deploying automation across more use cases over time; if
              expansion stalls due to integration complexity or competing internal priorities, NRR could decline toward
              retention-only levels. Path to profitability is unstated and unlikely before 2028–2029, meaning Torq will
              require either a successful IPO or continued private capital access in a market where late-stage
              cybersecurity valuations have compressed significantly from 2021 peaks. Revenue concentration risk is
              unquantified: if the top 10 customers represent more than 30% of ARR, churn of even two or three large
              accounts could materially impair the growth narrative ahead of an IPO.
            claimRefs:
              - CR026
              - CR027
              - CR028
              - CR029
              - CR030
