  - id: TV005
    title: Thesis-Break and Kill Triggers Table
    columns:
      - Risk / Thesis Dependency
      - Monitorable Trigger
      - Threshold/Event
      - Action Implication
    rows:
      - - CrowdStrike acquires competing AI-SOC automation platform
        - CrowdStrike M&A announcements; Charlotte AI product roadmap disclosures; SEC 8-K filings
        - >-
          CrowdStrike acquires any AI-native SOC automation company with >$50M ARR or announces competing agentic SOC
          product at enterprise scale
        - >-
          Exit position or decline follow-on; CrowdStrike's distribution would compress Torq's addressable TAM by 30-50%
          within 18 months of acquisition
      - - Net Revenue Retention declines below 100%
        - Quarterly NRR monitoring via investor updates or data room access; channel partner feedback
        - >-
          NRR <100% in any two consecutive quarterly reports; indicates net churn acceleration and competitive
          displacement
        - >-
          Immediate position review; NRR <100% for an AI-SOC platform implies platform bundling pressure or
          product-market fit degradation is materializing
      - - Material AI-caused security incident at named customer
        - Security incident disclosure databases; SEC cyber-incident 8-K filings by Torq customers; industry press
        - >-
          Any public report attributing a material breach or missed detection to Torq HyperSOC autonomous response
          failure at a named enterprise customer
        - >-
          Full stop; existential reputational risk comparable to CrowdStrike July 2024 sensor incident; regulatory
          scrutiny likely; customer churn cascade
      - - Series E down-round below $900M post-money
        - Next financing round announcement; secondary market pricing via Forge or EquityZen; LP mark quarterly
        - Series E or secondary pricing implying post-money valuation below $900M (14% drawdown from Series D)
        - >-
          Down-round signals investor confidence deterioration; triggers preference overhang review and LP mark-down
          decision; evaluate exit vs. hold
      - - FedRAMP authorization denied or abandoned
        - FedRAMP marketplace status at marketplace.fedramp.gov; Torq official announcements; GSA updates
        - Torq removed from FedRAMP authorization pipeline or publicly confirms no federal market pursuit beyond 2027
        - >-
          Significant TAM reduction; U.S. federal cybersecurity market (estimated $5B+) becomes permanently
          inaccessible; bull case collapses
    notes: >-
      Kill triggers are designed to be measurable and time-bound. Monitoring frequency: quarterly for NRR and
      competitive landscape; continuous for M&A announcements and security incidents; semi-annual for FedRAMP
      marketplace status updates.
    claimRefs:
      - CV036
      - CV037
      - CV038
      - CV028
      - CV029
  - id: TV006
    title: Final Diligence Asks Table
    columns:
      - Topic
      - Missing Evidence
      - Why It Matters
      - Owner or Diligence Path
    rows:
      - - Audited ARR and Growth Rate
        - No publicly disclosed or audited ARR figure; analyst estimate of $50-70M is unverified and unconfirmed
        - >-
          ARR determines whether the 15-21x implied multiple is defensible; ARR below $40M implies 26x+ multiple above
          all comparable precedents
        - >-
          Management data room; request trailing 8 quarters monthly ARR and YoY growth rate by customer cohort as
          precondition for IC approval
      - - Net Revenue Retention by Cohort
        - NRR not publicly disclosed; no public customer churn or expansion revenue data available from any source
        - >-
          NRR above 110% is the single most important IPO-readiness indicator; NRR below 100% is a thesis-break trigger
          requiring immediate review
        - >-
          Management data room; request NRR by annual customer cohort for 2022-2025 vintages with gross and net churn
          decomposition
      - - Gross Margin Profile
        - No public GAAP gross margin data; inferred at 70-75% from SaaS cybersecurity benchmarks but unconfirmed
        - >-
          Gross margin below 65% would compress valuation multiple by 3-5x relative to high-margin peers and impair IPO
          S-1 readiness
        - Management data room; request GAAP gross margin and cost of revenue breakdown for FY2024 and FY2025
      - - Customer Concentration
        - Top 10 customer ARR contribution not publicly disclosed; no waterfall or concentration data available
        - >-
          Top 3 customers exceeding 30% of ARR would materially increase bear-case severity and concentration risk
          perception in IPO process
        - >-
          Management data room; request top-20 customer ARR waterfall and historical churn and expansion data by account
          size
      - - FedRAMP Authorization Timeline
        - FedRAMP authorization status unconfirmed; in-progress claim unverified through public marketplace listing
        - >-
          FedRAMP authorization is binary gate for $5B+ U.S. federal market; delay beyond 2027 materially constrains
          bull-case TAM realization
        - >-
          Direct management inquiry; verify at marketplace.fedramp.gov; request formal FedRAMP project plan and sponsor
          agency identification
      - - Co-Founder Retention Arrangements
        - >-
          No public disclosure of vesting cliff refresh, non-compete terms, or retention bonuses for Eldad Livni and
          Leonid Belkind
        - >-
          Co-founder departure post-Series D is a common risk factor; market precedent shows 60%+ NTM de-rating on
          unplanned founder exit
        - >-
          Management data room; request cap table, vesting schedules for founders and key executives, and key-person
          insurance policy confirmation
    notes: >-
      Diligence asks are prioritized by impact on investment recommendation upgrade from CONDITIONAL POSITIVE to
      POSITIVE. ARR verification is blocking; all others are material. Owner is management unless noted.
    claimRefs:
      - CV034
      - CV035
      - CV030
      - CV031
