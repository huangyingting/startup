      - number: '1.3'
        title: Funding History, Valuation, and Capital Structure
        blocks:
          - type: paragraph
            body: >-
              Torq has raised $332 million in total funding across five documented rounds since its 2020 inception. The
              company's earliest funding totaled approximately $50 million by late 2021, financing the Hyperautomation
              platform's first version and the company's initial enterprise customer base. In June 2023, Torq raised a
              $70 million Series B led by Insight Partners as the company reported ARR of approximately $15 million. The
              financing accelerated with a $42 million Series B expansion in January 2024 and a $70 million Series C in
              September 2024 led by Evolution Equity Partners, bringing total funding to $192 million at the time of the
              Series C close.


              The defining capital event was a $140 million Series D announced January 12, 2026, led by
              cybersecurity-focused fund Merlin Ventures—known for its US federal and government market connections—with
              participation from all existing investors including Evolution Equity Partners, Notable Capital (formerly
              GGV Capital), Bessemer Venture Partners, Insight Partners, Greenfield Partners, and J.P. Morgan Private
              Bank. The Series D valued Torq at $1.2 billion post-money, cementing its unicorn status. Proceeds are
              earmarked for product R&D, enterprise go-to-market expansion, and a strategic push into the US federal and
              public-sector markets. The company targets $100 million ARR by fiscal year 2026, implying a 4-5x step-up
              from the CEO's stated ARR of approximately $24 million at Series C time, supported by the 300% revenue
              growth reported for 2025. Revenue multiple on the $1.2 billion valuation versus estimated ARR implies a
              20-25x multiple, consistent with high-growth cybersecurity SaaS peers at comparable stages.
