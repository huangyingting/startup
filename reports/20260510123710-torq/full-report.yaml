      - number: '1.4'
        title: Products, Technology Platform, and Key Differentiators
        blocks:
          - type: paragraph
            body: >-
              Torq's product portfolio centers on two integrated offerings: the Torq Hyperautomation platform and Torq
              HyperSOC. The Hyperautomation platform is an enterprise-grade, cloud-native, multi-tenant, zero-trust
              security workflow automation engine that supports no-code drag-and-drop design, low-code configuration,
              and full-code custom development. It connects to 700+ pre-built integrations spanning cloud providers
              (AWS, Azure, GCP), endpoint security (CrowdStrike, SentinelOne), SIEM platforms (Splunk, Microsoft
              Sentinel), identity providers (Okta, Azure AD), ticketing systems (ServiceNow, Jira), and dozens of other
              categories. Real-time API monitoring ensures integrations remain functional as third-party APIs evolve.


              Torq HyperSOC, first launched in 2023, is the company's AI-powered SOC platform built on top of the
              Hyperautomation engine. It uses autonomous AI agents to analyze, correlate, and enrich unprocessed
              security events from any connected source, creates contextually enriched cases, and intelligently
              prioritizes them by severity, subject matter expertise, and potential impact. Key capabilities include:
              (1) 100% alert triage using low-fidelity alert automation that cuts investigation time by up to 90%; (2)
              self-service agentic workflow builder enabling teams to deploy sophisticated agents with minimal effort;
              and (3) Torq Socrates, the natural-language AI interface that allows analysts to query, direct, and
              investigate cases in plain English. In 2025, the company shipped HyperSOC 2.0 with multi-agent system
              architecture and native Model Context Protocol (MCP) support, extending the platform's ability to
              coordinate multiple specialized AI agents on complex, multi-step security investigations. Torq also
              acquired RevRod, a stealth Israeli AI startup, for over $20 million in 2025 to accelerate multi-agent
              capabilities.
            claimRefs:
              - CO020
              - CO021
              - CO022
              - CO023
              - CO024
              - CO025
