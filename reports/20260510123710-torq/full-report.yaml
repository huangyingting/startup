      - number: '5.4'
        title: Deployment, Integration, Reliability, and Roadmap
        blocks:
          - type: paragraph
            body: >-
              Torq is deployed exclusively as cloud SaaS with no on-premises or hybrid option, a deliberate
              architectural choice that enables rapid deployment but limits the addressable market for regulated
              enterprises with data sovereignty mandates. Enterprise onboarding typically completes within 2–4 weeks,
              significantly faster than legacy SOAR implementations that commonly require 3–6 months of professional
              services. Torq commits to a 99.9% uptime SLA for all enterprise customers. The platform is listed on the
              AWS Marketplace as a validated partner integration, confirming cloud ecosystem alignment.


              Integration maintenance is a structural risk: 700+ connectors depend on stable APIs published by
              third-party vendors including Splunk, CrowdStrike, ServiceNow, and Okta. Upstream API changes by these
              vendors frequently break connector logic, creating ongoing engineering obligations for Torq's connector
              team and potential workflow disruption for customers. Torq manages this via a dedicated connector
              engineering team and community contribution through the public GitHub repository. The product roadmap
              through 2027 is as follows: HyperSOC 2.0 was released in Q1 2026 with Tier-2 autonomy and threat hunting.
              Q2 2026 targets deeper SIEM connector certifications and expanded Socrates AI sub-agent library. H2 2026
              plans additional EDR and cloud platform integrations and enhanced analytics. The 2027 horizon targets a
              fully autonomous SOC requiring no Tier-1 or Tier-2 human intervention for routine security events. Key
              unresolved diligence question: Torq's roadmap lacks published technical milestones, which makes
              independent validation of the 2027 autonomous SOC claim difficult.
