      - number: '8.3'
        title: Exit Readiness and Final Diligence Asks
        blocks:
          - type: paragraph
            body: >-
              Torq's most credible exit paths are: (1) IPO targeting 2027-2028 if ARR exceeds $100M with NRR above 110%
              and three-year revenue CAGR above 60%; (2) strategic acquisition by CrowdStrike, Palo Alto Networks, or
              Cisco at a 10-20x ARR multiple to close the acquirer's AI-SOC capabilities gap. Several IPO-readiness
              indicators are already in place: unicorn valuation with Bessemer lead, Cloud100 2025 recognition,
              approximately 200-person team with deep domain expertise, SOC 2 Type II certification, and broad
              enterprise customer validation across 300+ accounts. Critical gaps requiring data room access before
              capital commitment include: audited ARR and year-over-year growth rate, since the $50-70M range is
              analyst-estimated and unconfirmed; Net Revenue Retention by cohort, which is the single most important
              indicator of platform stickiness and IPO readiness; gross margin profile, targeting 70%+ for premium SaaS
              multiple support; customer concentration, specifically top 10 customers as a percentage of total ARR;
              FedRAMP authorization status and timeline for federal market access; and key-person retention arrangements
              for co-founders Eldad Livni (CEO) and Leonid Belkind (CTO). Preference overhang from $255M cumulative
              raised creates meaningful dilution at IPO if exit valuation is below $2B, as Series D liquidation
              preferences at approximately $1.05B post-money consume the first $1B+ of exit proceeds before common
              shareholders receive value. Thesis-break triggers are operationalized in Table TV005: the four
              highest-severity triggers are CrowdStrike acquiring a competing AI-SOC platform, NRR declining below 100%
              for two consecutive quarters, a material AI-caused security incident at a named customer, and a Series E
              down-round below $900M. Final diligence asks in Table TV006 itemize the six evidence gaps that must be
              closed before an investment committee recommendation can be upgraded from conditional to affirmative. The
              investment committee should be prepared to act within 30 days of data room access, as the Series D market
              window for optimal entry pricing will narrow as Torq continues to execute and secondary market premiums
              increase.
