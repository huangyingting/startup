      - number: '3.4'
        title: Switching Costs, Lock-in, and Distribution Power
        blocks:
          - type: paragraph
            body: >-
              Switching costs in SOAR are moderately high on both sides of the market. For customers leaving incumbents
              (XSOAR, QRadar SOAR, Splunk SOAR), the friction involves playbook migration, integration re-wiring, and
              analyst retraining, a process estimated at 3 to 6 months of implementation effort. For Torq's own
              customers, soft lock-in is created by the proprietary connector library: as enterprises build extensive
              playbooks using Torq-specific integrations, the cost of re-wiring those workflows to an alternative
              platform creates meaningful migration friction. MSSP distribution is a key competitive leverage point.
              Swimlane and D3 Security both have mature MSSP programs with white-label capabilities. Torq's HyperSOC
              multi-tenant architecture is designed to capture MSSP distribution, but it is earlier in building
              dedicated MSSP channel programs than competitors. Multi-homing risk is moderate: large enterprise security
              operations sometimes deploy parallel SOAR platforms for different use cases, limiting Torq's ability to
              claim complete platform displacement in accounts where an incumbent is retained. ServiceNow Security
              Operations poses a structural bundling threat for organizations with deep ServiceNow ITSM footprints,
              where security workflow automation may be procured as part of an existing enterprise agreement rather than
              through a dedicated SOAR evaluation.
