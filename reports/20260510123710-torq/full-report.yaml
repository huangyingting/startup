      - number: '2.5'
        title: Adoption constraints and structural risks
        blocks:
          - type: paragraph
            body: >-
              The primary adoption constraints are integration complexity, playbook maintenance burden, and skills
              scarcity in security automation engineering. Underdefense and Automation Atlas independently identify
              integration with existing security stacks — SIEM, EDR, ticketing, identity — as the most frequently cited
              deployment barrier, with multi-system orches­tration requiring weeks to months of professional services
              and configuration work. Playbook maintenance is a second constraint: as alert patterns change and tools
              update, playbooks require ongoing engineering investment, which erodes ROI at smaller SOC teams that lack
              dedicated automation engineers. Dark Reading coverage highlights the skills gap in security automation as
              a persistent bottleneck that slows deployment timelines even at motivated enterprises. On the structural
              risk side, XDR platforms from Palo Alto Networks, CrowdStrike, and Microsoft Sentinel are progressively
              absorbing traditional SOAR alert correlation and automated playbook functions into broader platform
              suites, threatening the standalone market for point-product SOAR vendors. For Torq specifically, the
              hyperautomation positioning — breadth across all security workflows, not only SOC alerting — is the key
              differentiation argument against XDR absorption, but the durability of that differentiation depends on
              continued platform breadth investment and the ability to demonstrate use cases that XDR bundling cannot
              replicate. No independent source has confirmed Torq's actual differentiation in head-to-head evaluations
              at named enterprise accounts.
