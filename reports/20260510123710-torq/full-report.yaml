  - number: 3
    title: Competitors
    sections:
      - number: '3.1'
        title: Competitive Landscape Overview
        blocks:
          - type: paragraph
            body: >-
              Torq competes in the SOAR (Security Orchestration, Automation and Response) and security hyperautomation
              market against a layered field of incumbents, pure-play specialists, and AI-native newcomers. The
              competitive landscape divides into four tiers. First, incumbent platform vendors (Palo Alto Networks
              Cortex XSOAR, Cisco/Splunk SOAR, and IBM QRadar SOAR) dominate enterprise market share through their
              installed base distribution advantages and deep platform integration, but carry the weight of legacy
              on-premises architectures and professional-services-heavy deployment models. Second, pure-play SOAR
              specialists such as Swimlane and D3 Security offer more flexible orchestration and MSSP-oriented features,
              but lack the AI autonomy layer that Torq has built into HyperSOC. Third, workflow automation specialists
              like Tines compete with a simpler no-code workflow builder in the mid-market tier, ceding the AI triage
              narrative to Torq. Fourth, adjacent substitutes include ServiceNow Security Operations (bundled ITSM
              security workflows), Rapid7 InsightConnect (integrated with vulnerability management), European SOAR
              vendors like Sekoia.io, and non-platform alternatives such as custom scripts, RPA tools, and SIEM-native
              suppression rules. The status-quo substitute of manual analyst workflows remains the dominant spend
              category in organizations not yet committed to SOAR, making buyer inertia a significant competitive force
              alongside product differentiation.
