  - number: 7
    title: Risks
    sections:
      - number: '7.1'
        title: Risk Landscape Overview and Severity Ranking
        blocks:
          - type: paragraph
            body: >-
              Torq's risk landscape is best understood as five interlocking risk clusters: regulatory and legal
              compliance, operational and technology reliability, partner and third-party dependency, financial and
              business model sustainability, and people and execution risk. Across these clusters, severity is driven by
              probability of occurrence, speed of impact, and reversibility. Regulatory risk ranks highest in the near
              term because FedRAMP denial is binary — it either opens or closes the entire U.S. federal market — while
              EU AI Act classification as a high-risk system would impose mandatory third-party conformity assessments
              that Torq has not yet completed. Operational AI accuracy risk ranks second: if Torq's autonomous
              resolution capability generates false negatives that allow real threats to pass undetected, the
              reputational and legal consequences would be severe and difficult to reverse. Partner dependency on
              CrowdStrike and cloud hyperscalers ranks third in severity but is partially mitigated by Torq's
              multi-cloud architecture and its breadth of integrations reducing single-vendor exposure. Financial runway
              risk is real but manageable given the Series D closing in January 2026; the primary financial risk is
              valuation compression from XDR commoditization rather than acute insolvency. People and geopolitical risk
              from the Israel headquarters is an ongoing background concern that intensifies under periods of Middle
              East instability. Together, these risks define a risk profile typical of a late-stage pre-IPO
              cybersecurity SaaS company: manageable but requiring active monitoring and clear thesis-break triggers for
              diligence purposes. The sections below examine each cluster in depth, with specific mitigations,
              monitoring indicators, and kill criteria detailed in Section 6.
            claimRefs:
              - CR001
              - CR002
              - CR003
              - CR004
              - CR005
