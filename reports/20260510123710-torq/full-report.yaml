      - number: '7.3'
        title: Operational and Technology Risk
        blocks:
          - type: paragraph
            body: >-
              Torq's operational risk profile centres on four structural vulnerabilities inherent to its platform
              architecture: AI model accuracy limitations, connector maintenance fragility, cloud infrastructure
              dependency, and customer onboarding complexity. The company's marketed claim of 90–95% autonomous Tier-1
              alert resolution has not been independently audited; if the real-world false-negative rate is materially
              higher than claimed, customers could suffer undetected breaches that would be attributed to Torq's
              platform, generating both reputational damage and potential contractual liability. Connector maintenance
              presents a compounding operational burden: Torq's 700+ pre-built integrations must be continuously updated
              as CrowdStrike, Microsoft, Splunk, AWS, and other vendors update their APIs; a single breaking change in a
              widely-used integration can cascade across multiple customer workflows simultaneously. The platform's
              exclusive cloud-native SaaS delivery via AWS and Azure creates infrastructure concentration risk; while
              Torq maintains a 99.9% SLA (allowing ~8.7 hours downtime per year), an extended hyperscaler outage
              affecting both providers simultaneously — as seen in major cloud incidents — would be catastrophic for SOC
              operations. Customer onboarding complexity (4–8 weeks typical deployment time) creates churn risk for
              smaller enterprise customers who may not have the security engineering resources to complete initial
              configuration. Data breach risk is existential: Torq processes customers' raw security telemetry, and a
              Torq platform breach would expose the security posture of hundreds of enterprise clients simultaneously,
              making Torq an extremely high-value target for sophisticated threat actors. The use of third-party LLM
              APIs for Socrates AI capabilities introduces a data-egress risk that requires careful contractual controls
              with AI providers to ensure customer security data is not used for model training.
            claimRefs:
              - CR014
              - CR015
              - CR016
              - CR017
              - CR018
              - CR019
              - CR020
