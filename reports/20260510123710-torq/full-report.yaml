      - number: '1.6'
        title: Geographic Footprint, Growth Plans, and Federal Market Expansion
        blocks:
          - type: paragraph
            body: >-
              Torq operates from its US headquarters in New York and its main R&D center in Tel Aviv, Israel, where the
              majority of its engineering and product development teams are located. Additional offices are in Japan,
              Germany, Amsterdam, and London, reflecting the company's multinational enterprise customer base across
              North America, EMEA, and Asia-Pacific. As of early 2026, the company employs 350+ people (referred to as
              "Torqers"), with plans to hire approximately 200 additional employees throughout 2026 across engineering,
              sales, and customer success globally.


              The Series D's strategic dimension is the US federal and public-sector market expansion enabled by lead
              investor Merlin Ventures. Merlin has nearly 30 years of experience navigating US government procurement
              and compliance requirements, including FedRAMP, and maintains deep relationships with US government
              cybersecurity buyers. For Torq, FedRAMP certification and federal market penetration represent a
              significant additional revenue opportunity, given that the US federal government spent approximately $11
              billion on cybersecurity in fiscal 2023. Geopolitical risk exists around Torq's Israeli R&D base—roughly
              60-70% of engineering talent is estimated to be in Israel—though the company has not disclosed specific
              headcount by geography. Torq also expanded its channel partner program significantly in 2025, partnering
              with major solution providers including GuidePoint Security, Optiv, Stratascale, and Trace3, and
              establishing technology alliances with CrowdStrike, SentinelOne, Abnormal Security, Check Point, and Wiz.
              A partnership with RSM US integrated HyperSOC into RSM's managed SOC offering, extending Torq's reach into
              the MSSP and MDR market segment.
