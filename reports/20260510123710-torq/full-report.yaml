        title: Customer Traction, Scale Metrics, and Analyst Recognition
        blocks:
          - type: paragraph
            body: >-
              Torq's stated customer base includes hundreds of multinational enterprises, with the Series D announcement
              specifically naming Marriott International, PepsiCo, Procter & Gamble, Siemens, Uber, Virgin Atlantic,
              Abnormal Security, Armis, Check Point Security, Chipotle Mexican Grill, Inditex (Zara group), Informatica,
