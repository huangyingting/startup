            body: >-
              Palo Alto Networks Cortex XSOAR (formerly Demisto, acquired 2019 for $560M) is the most widely deployed
              enterprise SOAR platform, embedded within the Cortex XDR ecosystem and benefiting from Palo Alto's
              80,000-plus customer installed base. XSOAR's distribution advantage is structural: it appears on nearly
              every enterprise SOAR shortlist by default. However, it is primarily a playbook orchestration platform
              with AI augmentation rather than an AI-first autonomous SOC, and its on-premises heritage makes
              cloud-native time-to-value comparisons unfavorable. Cisco/Splunk SOAR (formerly Phantom, now integrated
              into Cisco Security Cloud post the $28B acquisition of Splunk in 2024) creates a vertically integrated
              SIEM+SOAR stack that appeals to organizations already committed to Splunk for log management. IBM QRadar
              SOAR is the preferred choice for regulated financial and government markets, leveraging Watson AI and
              IBM's compliance credibility. Swimlane's Turbine platform targets the MSSP channel with high-throughput
              automation and strong developer APIs, but requires substantial professional services investment. Tines has
              emerged as a fast-growing mid-market alternative approaching $50M ARR, with a deliberately simple no-code
              workflow automation model. Rapid7 InsightConnect integrates SOAR within the Insight platform, primarily
              serving Rapid7's existing 11,000-plus vulnerability management customers. D3 Security and Sekoia.io serve
              niche segments: D3 in MSSP case management, Sekoia in EU-regulated markets requiring data sovereignty.
              Torq's RevRod acquisition in 2025 for approximately $20M closed a CTI integration gap versus Sekoia.io and
              Palo Alto XSOAR Marketplace.
