      - number: '8.2'
        title: Scenario Analysis - Bull, Base, and Bear Cases
        blocks:
          - type: paragraph
            body: >-
              Bull case (probability signal 25%): Torq captures 5-7% of the SOAR/AI-SOC market by 2028, reaching
              $150-200M ARR driven by mass enterprise migration from legacy SOAR platforms and a successful FedRAMP
              authorization opening the U.S. federal market. Net Revenue Retention exceeds 130%, reflecting upsell to
              HyperSOC Pro and platform expansion within existing accounts. At 25x NTM revenue, consistent with
              CrowdStrike's peak multiple, the 2028 implied valuation is $1.5-2.5B, and an IPO at 20-30x NTM revenue
              delivers a $3-5B market cap. Return to Series D investors approximates 2.9x-4.8x MOIC. Key bull
              assumptions include no FedRAMP delay, no major competitive price war, AI-SOC workflow automation achieving
              proven ROI at scale, and management retention. Bull downside trigger: FedRAMP denial or a competing
              agentic AI-SOC product gaining dominant market share before 2027. Base case (probability signal 50%): Torq
              reaches $80-100M ARR by end-2026, achieving 50-70% year-over-year growth from the estimated $50-70M 2025
              baseline. Net Revenue Retention maintains 110-120%. A 2027-2028 IPO prices at 12-15x NTM revenue, implying
              an $800M-1.5B valuation. Series D investors achieve 0.8x-1.4x MOIC at entry valuation, which is marginal
              and underscores entry discipline. Base case hinges on consistent competitive parity with CrowdStrike, no
              major platform churn events, and market growth continuing at 15-20% CAGR. Key base risk: valuation
              compression if public cybersecurity SaaS multiples contract 25-30% from current levels. Bear case
              (probability signal 25%): Revenue growth decelerates below 40% as CrowdStrike and Palo Alto aggressively
              bundle AI-SOC capabilities at discounted pricing within existing platform contracts. ARR stagnates at
              $60-70M and NRR declines below 100%, indicating net customer churn. A flat or down-round Series E prices
              at 8-10x ARR, implying a $480-700M valuation, a 33-54% drawdown from the Series D mark. At 5x ARR in an
              exit, valuation reaches only $300-350M. Series D investors face 0.3x-0.7x MOIC. Bear triggers include
              CrowdStrike acquiring a competing AI-SOC startup, a material AI-caused security incident at a named Torq
              customer causing reputational damage, or NRR declining below 95% for two consecutive quarters.
            claimRefs:
              - CV017
              - CV018
