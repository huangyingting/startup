- id: gtm-sales-efficiency
  title: GTM Motion and Sales Efficiency
  body: 'Torq employs a direct enterprise sales model supplemented by a growing channel partner program targeting

    MSSPs, VARs, and global systems integrators. The enterprise sales cycle for SOAR/AI-SOC platforms typically

    spans 3–9 months given the complexity of SOC integration and the need for security team champions to navigate

    procurement decisions. Torq''s cycles likely skew toward 4–7 months given the no-code deployment advantage

    that reduces implementation friction compared to legacy SOAR tools requiring extensive scripting.


    The company''s reported 300% year-over-year revenue growth in 2025 is exceptional if accurate, suggesting

    either a small base effect, extraordinary product-market fit, or both. For context, best-in-class enterprise

    SaaS companies at comparable scale (sub-$100M ARR) targeting the security operations buyer typically achieve

    80–150% net revenue retention (NRR) driven by expansion within existing accounts — a pattern consistent with

    Torq''s land-and-expand model in enterprise SOC environments where alert volume grows organically alongside

    cloud adoption. The company has publicly named Fortune 500 customers including Marriott, PepsiCo, Procter &

    Gamble, Siemens, Uber, and Virgin Atlantic, providing social proof of enterprise market penetration

    consistent with $100K–$500K+ ACVs.


    Customer acquisition cost (CAC) estimates for comparable enterprise security SaaS companies range from

    $50,000 to $150,000 per enterprise logo, implying payback periods of 12–30 months at Torq''s estimated ACV

    range. Sales efficiency proxies are difficult to compute without disclosed sales and marketing spend, but

    Torq''s 350+ employee headcount and planned 200-person 2026 expansion suggest significant GTM investment.

    With roughly $50M–$70M estimated annual operating expense at current headcount, the implied customer

    acquisition economics will be a critical diligence question. Channel economics through MSSPs and VARs could

    significantly improve blended CAC, but channel revenue quality — margin, retention, and stickiness — is

    unverified and would require direct due diligence with named channel partners.

    '
