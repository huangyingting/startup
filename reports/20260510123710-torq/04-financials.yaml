callouts:
- calloutType: insight
  title: Series D Signals Category Leadership at Defensible Valuation
  body: The January 2026 $140M Series D at $1.2B valuation, led by Insight Partners with existing investor participation,
    signals strong institutional confidence in Torq's position as the SOAR category successor. A 10–17x forward ARR multiple
    is consistent with premium valuations for category-defining enterprise security SaaS companies with 100%+ growth rates.
    The clean financing structure and Insight Partners' deep enterprise SaaS expertise de-risk the growth-to-profitability
    path — assuming growth metrics are validated.
  claimRefs:
  - CI026
  - CI027
  - CI035
- calloutType: risk
  title: Revenue Quality and Private-Metric Opacity Are Blocking Diligence
  body: The complete absence of audited financial statements, disclosed NRR cohort data, and revenue breakdown by product
    line means that the 300% growth claim and $100M ARR target cannot be independently verified. Revenue concentration in
    a handful of Fortune 500 logos, the dilutive effects of professional services mix, and the unquantified complexity of
    the RevRod acquisition collectively make revenue quality the single largest unresolved diligence risk. A diligence team
    cannot reach a quantitative investment conclusion without data room access to financial statements and customer cohort
    metrics.
  claimRefs:
  - CI020
  - CI032
  - CI033
  - CI034
- calloutType: risk
  title: 200-Person Hiring Wave Creates Material Burn Acceleration Risk
  body: The planned 200-person hiring expansion in 2026 — a 57% headcount increase in a single year — will approximately double
    monthly cash burn by year-end 2026 if executed as announced. At the estimated $10M–$15M peak monthly burn, the $140M Series
    D provides only 9–14 months of runway from peak burn onset. This creates a realistic scenario where Torq needs a Series
    E by late 2027 regardless of revenue achievement, making continued investor confidence and market conditions a critical
    capital dependency risk.
  claimRefs:
  - CI029
  - CI030
  - CI031
  - CI038
