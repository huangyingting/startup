- id: financial-verdict
  title: Financial Verdict and Diligence Blockers
  body: 'Torq''s financial narrative is compelling but substantially unverifiable through public evidence alone. The

    300% growth claim, if accurate and sustained, would place the company in an elite cohort of enterprise SaaS

    growers — but this metric requires independent validation through customer reference checks, former employee

    interviews, and preferably reviewed or audited financial statements. The $1.2B valuation at an implied

    10–17x forward ARR multiple is reasonable for a category-defining leader in a high-growth security

    automation market, but it leaves limited margin of safety if growth decelerates materially.


    Revenue quality is the primary diligence blocker: the potential concentration of ARR in a small number of

    large enterprise logos, the margin differential between high-margin SaaS subscriptions and lower-margin

    professional services, and the nascent state of usage-based components all require deeper scrutiny. The

    RevRod acquisition introduces additional revenue recognition complexity that cannot be assessed without

    access to acquisition terms and post-close integration milestones. The absence of any Form D or equivalent

    regulatory filing in public databases limits verification of investor rights, liquidation preferences, and

    anti-dilution provisions.


    Capital intensity is moderate for the sector, but the 200-person hiring plan creates near-term cash burn

    risk that may require bridge financing or a Series E sooner than the headline runway estimate suggests. The

    financial chapter of this diligence report should be treated as a structural framework for questions rather

    than a quantitative conclusions document. Minimum recommended diligence steps: (1) audited or reviewed

    financial statements for FY2023–2025; (2) cohort-level NRR data by vintage; (3) detailed revenue bridge by

    product line and segment; (4) CAC and payback period by channel and customer segment; and (5) RevRod

    acquisition economics including purchase price, integration milestones, and revenue contribution forecast.

    '
