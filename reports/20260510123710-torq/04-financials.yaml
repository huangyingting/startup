chapter:
  number: 4
  title: Financials
  summary: Torq's financial profile is that of a high-growth, pre-profitability SaaS company targeting the SOAR/AI-SOC market.
    Following its $140M Series D in January 2026 at a $1.2B post-money valuation, the company has raised $332M total and is
    executing against a reported ~$100M ARR target for 2026 on the back of claimed 300% YoY revenue growth. The revenue model
    combines annual SaaS subscriptions, usage-based components, professional services, and emerging partner/channel fees.
    As a private company, precise financial metrics remain undisclosed. Capital adequacy appears reasonable with an estimated
    18–30 month runway post-Series D at current burn, but the planned 200-person 2026 hiring wave creates material cash burn
    acceleration risk. Key diligence blockers are the absence of audited statements, NRR cohort data, and a detailed revenue
    bridge by product line.
sections:
- id: revenue-model-pricing
  title: Revenue Model and Pricing Architecture
  body: 'Torq''s revenue model rests on three primary streams: annual SaaS subscription fees (the dominant revenue

    driver), usage-based components tied to alert volume and workflow execution counts, and professional services

    revenue from implementation, onboarding, and ongoing customer success engagements. The company also derives a

    modest but growing share of revenue from partner and channel arrangements, including managed security service

    providers (MSSPs) and value-added resellers (VARs) that embed or resell Torq''s platform within their own

    service offerings. The 2025 acquisition of RevRod, an AI-powered billing optimization startup, signals Torq''s

    intent to build more sophisticated usage-based monetization infrastructure — a necessary architectural step as

    enterprises increasingly demand consumption-aligned pricing rather than flat annual seat fees.


    Pricing is anchored to enterprise contract value. Based on publicly available customer testimonials,

    competitor benchmarking, and analyst estimates, annual contract values (ACVs) for mid-market accounts

    typically fall in the $100,000–$250,000 range, while large enterprise and Fortune 500 deployments can

    exceed $500,000 per year. The company does not publish a public pricing page, which is standard for

    enterprise software sold entirely through a direct sales motion. Discounting practices are opaque but

    likely involve volume-based tiering, multi-year contract concessions of 10–20%, and site-license

    arrangements for global Fortune 500 deployments — consistent with SOAR market norms.


    Revenue recognition for Torq''s SaaS contracts follows standard ASC 606 principles: subscription fees

    recognized ratably over the contract term (typically 12–36 months), professional services recognized upon

    delivery milestones, and usage components recognized as consumed. The RevRod integration introduces

    complexity around usage metering accuracy and potential revenue volatility tied to customer consumption

    patterns — a risk that grows as usage-based components become a larger share of the revenue mix. At this

    stage of growth, the company likely generates a moderate deferred revenue buffer from annual prepaid

    subscriptions, but the size of this balance and its relationship to operating cash flow cannot be confirmed

    without access to financial statements.

    '
