- id: public-traction-gaps
  title: Public Traction Metrics and Financial Disclosure Gaps
  body: 'As a private company, Torq''s financial disclosures are strictly limited to what the company and its

    investors choose to share in fundraising announcements and press releases. The most significant available

    traction signals are: (1) a company-claimed 300% year-over-year revenue growth rate for 2025 (unaudited);

    (2) an implied target of approximately $100M ARR for 2026 — derived from the Series D narrative and analyst

    extrapolation rather than any explicit management disclosure; and (3) the January 2026 Series D at a $1.2B

    post-money valuation, implying a revenue multiple of approximately 10–17x forward ARR depending on the actual

    ARR level achieved. These metrics suggest strong growth momentum but cannot be independently verified.


    Key financial metrics that are entirely unavailable through public channels include: precise current ARR,

    monthly recurring revenue (MRR) breakdown by product line, net revenue retention (NRR) rate, gross margin

    percentage, total customer count, average contract value (ACV) distribution by segment, sales and marketing

    expense, R&D expense, EBITDA margin, free cash flow burn, and audited or reviewed financial statements.

    This information gap is standard for pre-IPO private companies but creates meaningful diligence uncertainty

    that cannot be resolved through secondary research alone. The absence of any SEC Form D filing for the

    Series D in the EDGAR public database further limits independent verification of fundraising terms and

    investor rights.


    Proxy signals available to diligence teams include: employee count growth on LinkedIn (useful for inferring

    revenue per employee and headcount efficiency), job posting analysis (useful for inferring hiring priorities

    and sales motion priorities), customer reference checks with named Fortune 500 accounts, and peer

    benchmarking against disclosed metrics of public SOAR-adjacent companies. Analyst estimates from Crunchbase,

    PitchBook, and CB Insights provide additional triangulation, but private-company coverage accuracy from

    these databases is typically +/- 30–50% from actual figures.

    '
