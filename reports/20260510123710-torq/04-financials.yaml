  evidenceGaps:
  - type: private-evidence-only
    severity: blocking
    topic: audited financial statements
    missingEvidence: Audited or reviewed financial statements for FY2023, FY2024, and FY2025, including income statement,
      balance sheet, cash flow statement, and notes to financial statements with revenue recognition policies.
    whyItMatters: Cannot verify any revenue, margin, or expense claim without this; the 300% growth claim and $100M ARR target
      are entirely unverifiable without audited statements, making a quantitative financial verdict impossible.
    diligencePath: Request data room access; require Big 4 or top-tier CPA audit report; if unavailable, require CFO attestation
      with management accounts; use for all revenue quality and margin diligence.
    relatedQuestionRefs:
    - QI002
    - QI010
    - QI019
    - QI025
    relatedTableRefs:
    - TI003
    - TI004
    - TI005
  - type: private-evidence-only
    severity: blocking
    topic: NRR cohort data
    missingEvidence: Net revenue retention (NRR) data by customer cohort, vintage, and segment; including dollar-based NRR,
      logo churn rate, gross retention rate (GRR), and expansion revenue by customer tier.
    whyItMatters: NRR is the single most material SaaS metric for estimating LTV and validating the land-and-expand thesis;
      100% vs 130% NRR implies a 2–3x difference in long-term revenue trajectory and terminal value.
    diligencePath: Request cohort NRR tables from CFO; benchmark against OpenView/Bessemer benchmarks; validate with customer
      references from named Fortune 500 accounts.
    relatedQuestionRefs:
    - QI007
    - QI009
    - QI015
    relatedTableRefs:
    - TI003
    - TI005
  - type: private-evidence-only
    severity: material
    topic: revenue by product line
    missingEvidence: ARR bridge and revenue breakdown by product line (SaaS subscription, professional services, usage-based
      components, channel), by customer segment, and by geography.
    whyItMatters: Without product-line revenue breakdown, cannot assess services dilution of SaaS margins, quality of recurring
      versus non-recurring revenue, or geographic concentration risk.
    diligencePath: Request ARR bridge with product-line and segment waterfall from CFO; reconcile to board-level financial
      reporting package; cross-validate with customer reference checks on contract structures.
    relatedQuestionRefs:
    - QI001
    - QI005
    - QI010
    relatedTableRefs:
    - TI001
    - TI005
  - type: private-evidence-only
    severity: material
    topic: CAC and GTM spend
    missingEvidence: Sales and marketing expense breakdown, customer acquisition cost by segment and channel, payback period
      by customer tier, and sales efficiency metrics (magic number, CAC ratio).
    whyItMatters: GTM efficiency determines the capital required to sustain growth; high CAC with long payback creates working
      capital risk during rapid expansion phases like the planned 200-person hiring wave.
    diligencePath: Request S&M expense from management accounts; compute CAC from new logo additions and S&M spend; benchmark
      against OpenView Rule of 40 and comparable SOAR vendor GTM efficiency data.
    relatedQuestionRefs:
    - QI007
    - QI008
    - QI009
    relatedTableRefs:
    - TI003
  - type: private-evidence-only
    severity: material
    topic: RevRod acquisition economics
    missingEvidence: RevRod acquisition purchase price, earnout structure, goodwill recorded, revenue and cost synergies expected,
      integration milestones, and post-close revenue contribution by quarter.
    whyItMatters: Goodwill impairment risk, integration costs, and incremental revenue complexity from the RevRod billing
      system cannot be assessed without acquisition terms and post-close financial reporting.
    diligencePath: Request acquisition agreement, purchase price allocation schedule, and post-close integration roadmap;
      evaluate against billing optimization ROI for current and projected customer base.
    relatedQuestionRefs:
    - QI022
    - QI027
    relatedTableRefs:
    - TI001
  - type: missing-source
    severity: minor
    topic: regulatory disclosure
    missingEvidence: SEC Form D filing for the January 2026 Series D and any prior rounds filed under entity variants; state-level
      securities registrations that may have captured earlier rounds.
    whyItMatters: Form D filings disclose investor names, amounts, exemption type, and date of first sale; their absence limits
      independent verification of round terms and investor rights structures.
    diligencePath: Search SEC EDGAR for entity variant names (Torq Inc., Torq Technologies Inc., Torq Security Ltd.); check
      Delaware, New York, and Israeli corporate registries; request investor rights agreement in data room.
    relatedQuestionRefs:
    - QI014
    relatedTableRefs:
    - TI005
