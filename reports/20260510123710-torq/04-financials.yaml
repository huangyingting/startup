- id: capital-adequacy-runway
  title: Capital Adequacy and Runway Assessment
  body: 'Torq''s January 2026 Series D raised $140M from Insight Partners (lead) with participation from existing

    investors GGV Capital and Bessemer Venture Partners. This brings total raised capital to $332M across five

    documented rounds (Seed ~$10M 2020, Series A $50M 2022, Series B $90M 2023, Series C $52M 2024, Series D

    $140M January 2026). Assuming the company has deployed approximately $150–180M of pre-Series-D capital over

    five years of operations — consistent with 350-person headcount, dual-geography operations, RevRod

    acquisition, and aggressive GTM investment — the Series D provides an estimated 18–30 months of runway at

    current burn rates.


    Monthly cash burn is estimated at $6M–$10M at current headcount ($150K–$200K fully loaded annual cost per

    employee in a dual-geography model × 350 employees ÷ 12 months = $4.4M–$5.8M in personnel alone, plus

    cloud infrastructure, G&A, and GTM expenses). The planned 200-person hiring wave in 2026 would increase

    burn materially — potentially reaching $10M–$15M per month by year-end 2026 if all 200 planned hires

    materialize at comparable fully-loaded costs. At $140M raised, this implies an effective runway of

    12–24 months post-Series D depending heavily on the pace and cost of hiring execution and the degree to

    which growing revenue offsets new expense.


    The company''s next funding trigger is most likely tied to achieving or approaching the $100M ARR milestone,

    which would support a Series E at or above the current $1.2B valuation, potentially at a higher multiple

    if the SOAR/AI-SOC market continues to attract premium valuations. The adversarial scenario — a significant

    equity market correction, loss of Insight Partners'' lead position in the next round, or material revenue

    deceleration — could compress the timeline to next financing and increase dilution risk for existing

    investors. No public debt instruments or project finance obligations have been disclosed, and the company

    appears to operate on equity capital alone.

    '
