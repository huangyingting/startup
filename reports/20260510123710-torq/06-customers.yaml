chapter:
  number: 6
  title: Customers
sections:
  - id: SEC-U-1
    title: "Customer Base Overview and Segmentation"
    body: |
      Torq has built a customer base spanning Fortune 500 enterprises, mid-market technology companies, and managed security service providers (MSSPs) since its 2020 founding. The company's platform serves two primary buyer personas: in-house Security Operations Center (SOC) teams at large enterprises who use Torq HyperSOC for autonomous threat detection and response, and MSSPs that embed Torq Hyperautomate into their managed service delivery to offer scalable automated security operations to their end clients. Torq's customer segmentation reflects the dual-product go-to-market strategy: HyperSOC targets the upper mid-market and enterprise segment (typically 2,000+ employee companies with mature security programs and existing SIEM/EDR tooling), while Hyperautomate targets both enterprises and MSSPs who need workflow automation without deep security engineering expertise. Enterprise verticals represented in Torq's disclosed customer base include financial services, healthcare, technology/SaaS, and telecommunications. The MSSP channel is particularly strategic: MSSPs act simultaneously as customers (buying Torq licenses), distribution partners (reselling managed SOC services built on Torq), and proof-of-scale validators (demonstrating platform reliability at high alert volumes). G2 reviews and TrustRadius feedback confirm that customers value Torq's no-code automation builder and deep pre-built connector library (700+ integrations), enabling rapid time-to-value without requiring custom development resources. The platform's Cloud100 2025 recognition by Bessemer Venture Partners and Forbes further validates enterprise market traction.
    claimRefs: [CU001, CU002, CU003, CU004, CU005, CU006]
    tableRefs: [TU001]

  - id: SEC-U-2
    title: "Customer Acquisition, Adoption Funnel, and Growth Trajectory"
    body: |
      Torq's go-to-market motion combines direct enterprise sales, MSSP channel partnerships, and marketplace distribution across AWS Marketplace, Azure Marketplace, and partner ecosystem listings (CrowdStrike, Splunk, Palo Alto Networks, SentinelOne, Okta). The acquisition funnel begins with awareness driven by analyst recognition (Gartner Peer Insights ratings, industry analyst coverage), peer review platforms (G2, TrustRadius, PeerSpot), and security community word-of-mouth. Prospects typically enter a proof-of-concept (POC) phase lasting four to eight weeks, during which Torq's pre-built connectors allow rapid integration with existing security tools. Conversion from POC to production deployment is supported by Torq's customer success organization and professional services team. Post-deployment, the platform's no-code workflow builder encourages expansion: customers typically start with three to five automated workflows and grow to 50-500+ workflows within twelve months, driving natural net revenue retention expansion. The MSSP channel compresses the individual enterprise sales cycle by creating programmatic, recurring deployment patterns across MSSP client portfolios. Marketplace distribution via AWS and Azure provides additional acquisition channels for cloud-native enterprises with pre-committed cloud spend that can be applied toward Torq licenses. VentureBeat and SecurityWeek coverage of Torq's enterprise deployments highlights rapid adoption among security-mature organizations. Named customer case studies, including a Fortune 500 financial services firm achieving 70% alert reduction and a global MSSP scaling to 500+ automated workflows, provide concrete adoption evidence at scale. The Series D funding round in January 2026 provides capital to invest further in sales capacity and partner ecosystem development.
    claimRefs: [CU007, CU008, CU009, CU010, CU011, CU012, CU013]
    tableRefs: [TU002]
    figureRefs: [FU001, FU002]

  - id: SEC-U-3
    title: "Named Customer Proof and Case Study Evidence"
    body: |
      Torq's publicly available customer proof corpus includes named case studies, third-party review platform testimonials, press release references, and partner ecosystem validation. The financial services sector provides the strongest case study evidence: a Fortune 500 financial services firm deployed Torq HyperSOC in production and reported a 70% reduction in actionable security alerts requiring human analyst attention, with autonomous resolution handling the remainder. This outcome aligns with Torq's marketed claim of 90-95% autonomous Tier-1 alert resolution. A global MSSP (name undisclosed in public materials) deployed Torq Hyperautomate and scaled to more than 500 automated workflows, demonstrating platform reliability at managed-services scale and validating the MSSP go-to-market thesis. A healthcare system customer deployed Torq HyperSOC in a pilot program and achieved a 60% reduction in mean time to respond (MTTR) to security incidents, a critical metric for healthcare organizations facing HIPAA incident response obligations. A technology/SaaS company integrated Torq's platform with CrowdStrike Falcon and Splunk SIEM, creating an end-to-end automated detection-to-response pipeline that eliminated manual alert triage for common threat patterns. Help Net Security published a case study covering Torq's enterprise deployment methodology. Third-party review platforms including G2, TrustRadius, and PeerSpot aggregate verified customer testimonials confirming platform usability, integration depth, and measurable time savings for SOC teams. LinkedIn posts from Torq's corporate page highlight additional customer wins and partnership announcements. MSSP Alert and ChannelFutures coverage confirms MSSP channel adoption and partner ecosystem validation.
    claimRefs: [CU014, CU015, CU016, CU017, CU018, CU019, CU020]
    tableRefs: [TU003]
    figureRefs: [FU003]

  - id: SEC-U-4
    title: "Customer Retention, Satisfaction, and Expansion Dynamics"
    body: |
      Customer retention at Torq is driven by deep workflow automation investment: once a customer has built and deployed 50+ automated workflows on the Torq platform, switching costs become substantial, as each workflow represents institutional knowledge encoded in the automation logic. This creates natural retention mechanics beyond contractual lock-in. While Torq has not publicly disclosed net revenue retention (NRR) or gross revenue retention (GRR) rates, company-claimed metrics suggest an NRR above 120%, consistent with best-in-class enterprise SaaS benchmarks for security automation platforms. G2 and TrustRadius reviews consistently award Torq high marks for customer support responsiveness, onboarding experience, and platform reliability. PeerSpot reviews from verified security practitioners highlight the platform's strong API integration capabilities and the quality of pre-built workflow templates as key satisfaction drivers. Expansion dynamics are driven by three mechanisms: horizontal expansion (adding more use cases and workflow categories within the same organization), vertical expansion (adding more users and seats as the SOC team grows), and ecosystem expansion (integrating additional security tools as the customer's stack evolves). MSSP customers exhibit particularly strong expansion dynamics because each new MSSP client deployment adds recurring revenue without requiring additional Torq licensing negotiations. Reddit and security community discussions surface some concerns about onboarding complexity for smaller teams and occasional API rate-limiting issues with certain integrations, representing areas for ongoing product improvement. Healthcare and financial services customers face specific regulatory compliance requirements (HIPAA, PCI-DSS, SOX) that Torq's audit trail and compliance reporting features are designed to address, creating additional retention stickiness in regulated verticals.
    claimRefs: [CU021, CU022, CU023, CU024, CU025, CU026]
    tableRefs: [TU004]
    figureRefs: [FU004]

  - id: SEC-U-5
    title: "Expansion Opportunities and Concentration Risk"
    body: |
      Torq's expansion opportunity set is substantial across three dimensions: geographic expansion beyond North America into EMEA and APAC, vertical expansion into regulated industries (federal government pending FedRAMP, healthcare, finance), and product-led expansion through HyperSOC upsell to Hyperautomate-only customers. The federal government vertical represents a significant untapped opportunity: Torq is actively pursuing FedRAMP authorization, which would unlock U.S. federal agency contracts under frameworks like DHS Continuous Diagnostics and Mitigation (CDM). Federal news coverage and GovInfoSecurity articles indicate growing federal cybersecurity automation budgets. Healthcare represents a similarly attractive regulated vertical given HIPAA incident response requirements and growing ransomware threats. ChannelFutures and MSSP Alert coverage confirms that MSSP channel expansion is a near-term priority, with Torq investing in MSSP-specific pricing, training, and co-selling programs. Revenue concentration risk is an open question: Torq has not disclosed the proportion of ARR attributable to its top five or ten customers, and for a company at this stage, concentration above 30% in the top ten accounts would represent material risk. The MSSP channel creates a specific concentration dynamic: individual MSSPs may represent outsized ARR contributions, but each MSSP customer itself brings a diversified end-client portfolio, partially mitigating ultimate concentration exposure. International expansion to EMEA is supported by Torq's Israeli engineering heritage and European data sovereignty compliance posture, though GDPR compliance obligations and EU AI Act uncertainty add regulatory friction. Palo Alto Networks and CrowdStrike marketplace integrations provide embedded distribution that can drive expansion in existing customer accounts through co-sell programs.
    claimRefs: [CU027, CU028, CU029, CU030, CU031, CU032, CU033, CU034, CU035, CU036, CU037, CU038]
    tableRefs: [TU005]

