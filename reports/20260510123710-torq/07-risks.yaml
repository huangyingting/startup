- id: TR005
  title: Mitigation and kill criteria table
  columns:
  - Thesis-Break Trigger
  - Early Warning Indicator
  - Kill Criteria
  - Action
  rows:
  - - FedRAMP authorization denied or suspended
    - Authorization timeline slips >12 months beyond initial target
    - FedRAMP application formally denied or withdrawn without resubmission plan
    - Reassess federal market TAM; reduce federal-dependent valuation premium by 15–25%
  - - EU AI Act high-risk classification requires product re-architecture
    - ENISA or national authority issues formal guidance classifying autonomous SOC as high-risk AI
    - Conformity assessment required within 18 months; Torq has no compliant product path
    - Engage EU AI counsel; model product re-architecture costs; reassess EU market access
  - - Material customer breach attributable to Torq AI false-negative
    - Increase in customer-reported missed-detection incidents; bug bounty severity escalations
    - Public disclosure of a breach at a named Torq customer where Torq platform failed to detect
    - Immediate platform technical review; legal liability assessment; executive response plan
  - - NRR declines below 100% for three consecutive quarters
    - NRR declining from ~120% toward 110% over two quarters
    - Gross retention below 85% or NRR below 100% for Q3 in a row
    - Investigate churn root cause; reassess expansion motion; consider pricing review
  - - Co-founder departure within 12 months of financing
    - Co-founder signals reduced operational involvement; executive search initiated
    - Either co-founder resigns or transitions to non-executive role within 12 months of last round
    - Assess successor capability; review strategic direction continuity; engage board on options
  - - XDR commoditization accelerates past model assumptions
    - Major platform vendor bundles autonomous SOC free or at marginal cost
    - Two or more hyperscaler vendors offer autonomous tier-1 SOC natively within 24 months
    - Reassess standalone premium pricing viability; model platform-feature acquisition scenarios
  notes: Kill criteria thresholds are diligence-framework constructs based on analyst judgment and comparable SaaS risk frameworks; Torq has not published these internally.
