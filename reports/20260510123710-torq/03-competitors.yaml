- id: switching-costs-distribution-power
  title: Switching Costs, Lock-in, and Distribution Power
  body: 'Switching costs in SOAR are moderately high on both sides of the market. For customers leaving incumbents (XSOAR, QRadar SOAR, Splunk SOAR), the friction involves playbook migration, integration
    re-wiring, and analyst retraining, a process estimated at 3 to 6 months of implementation effort. For Torq''s own customers, soft lock-in is created by the proprietary connector library: as enterprises
    build extensive playbooks using Torq-specific integrations, the cost of re-wiring those workflows to an alternative platform creates meaningful migration friction. MSSP distribution is a key competitive
    leverage point. Swimlane and D3 Security both have mature MSSP programs with white-label capabilities. Torq''s HyperSOC multi-tenant architecture is designed to capture MSSP distribution, but it is
    earlier in building dedicated MSSP channel programs than competitors. Multi-homing risk is moderate: large enterprise security operations sometimes deploy parallel SOAR platforms for different use cases,
    limiting Torq''s ability to claim complete platform displacement in accounts where an incumbent is retained. ServiceNow Security Operations poses a structural bundling threat for organizations with
    deep ServiceNow ITSM footprints, where security workflow automation may be procured as part of an existing enterprise agreement rather than through a dedicated SOAR evaluation.'
  claimRefs:
  - CP009
  - CP017
  - CP020
  - CP021
  - CP022
  - CP032
  - CP033
- id: moat-durability-displacement-risk
  title: Moat Durability and Displacement Risk
  body: 'Torq''s competitive moat rests on three interrelated advantages: its proprietary integration library (1,000-plus tools), its AI autonomy layer (HyperSOC''s 90 to 95 percent auto-close rate), and
    its proprietary operational training data accumulated from live enterprise SOC deployments. The integration library moat is real but porous — competitors are expanding their connector counts, and the
    open-source community can build integration libraries over time. The AI moat is more defensible in the near term because Torq''s Socrates AI is trained on real enterprise alert data that compounds with
    scale. However, the principal displacement risk is from XDR platform vendors embedding native AI-triage automation at no incremental cost to existing customers. CrowdStrike Charlotte AI and Microsoft
    Copilot for Security both announced automated triage capabilities in 2025, a trend that will commoditize basic SOAR for single-vendor XDR shops. Torq''s counter-positioning is the multi-vendor orchestration
    value proposition: for enterprises running heterogeneous security stacks across mixed EDR, SIEM, cloud, and identity tools from multiple vendors, Torq''s 1,000-plus integration breadth cannot be replicated
    by any single XDR vendor''s native automation layer. Adverse signal: community and review data indicate Torq''s onboarding requires extensive pre-configuration before autonomous features engage, creating
    a barrier for smaller security teams. Torq''s FedRAMP pursuit, if successful, would open federal accounts where incumbents IBM and Splunk already hold compliance credentials; the timeline and outcome
    remain uncertain.'
  claimRefs:
  - CP013
  - CP023
  - CP024
  - CP025
  - CP026
  - CP027
  - CP035
  - CP037
