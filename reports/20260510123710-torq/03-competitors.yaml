chapter:
  number: 3
  title: Competitors
  summary: 'Torq competes against a tiered field in the SOAR and security hyperautomation market: incumbent platform vendors (Palo Alto XSOAR, Cisco/Splunk SOAR, IBM QRadar SOAR) dominate enterprise market
    share via distribution advantages but carry legacy architecture weight; pure-play specialists (Swimlane, D3 Security) target MSSP channels; workflow-automation specialists (Tines) compete in the mid-market
    tier; and adjacent substitutes (ServiceNow SecOps, custom scripts, XDR native automation) create structural pressure. Torq differentiates on AI autonomy (90-95 percent auto-close rate via HyperSOC),
    integration breadth (1,000-plus tools), and cloud-native deployment speed. The principal moat risk is XDR vendors (CrowdStrike, Microsoft, Palo Alto) embedding native AI triage, commoditizing basic
    SOAR for single-vendor shops. Torq''s moat is durable on a 2-3 year horizon for multi-vendor enterprise environments. GigaOm 2026 and KuppingerCole 2026 independently validated Torq''s leadership positioning.'
sections:
- id: competitive-landscape-overview
  title: Competitive Landscape Overview
  body: Torq competes in the SOAR (Security Orchestration, Automation and Response) and security hyperautomation market against a layered field of incumbents, pure-play specialists, and AI-native newcomers.
    The competitive landscape divides into four tiers. First, incumbent platform vendors (Palo Alto Networks Cortex XSOAR, Cisco/Splunk SOAR, and IBM QRadar SOAR) dominate enterprise market share through
    their installed base distribution advantages and deep platform integration, but carry the weight of legacy on-premises architectures and professional-services-heavy deployment models. Second, pure-play
    SOAR specialists such as Swimlane and D3 Security offer more flexible orchestration and MSSP-oriented features, but lack the AI autonomy layer that Torq has built into HyperSOC. Third, workflow automation
    specialists like Tines compete with a simpler no-code workflow builder in the mid-market tier, ceding the AI triage narrative to Torq. Fourth, adjacent substitutes include ServiceNow Security Operations
    (bundled ITSM security workflows), Rapid7 InsightConnect (integrated with vulnerability management), European SOAR vendors like Sekoia.io, and non-platform alternatives such as custom scripts, RPA tools,
    and SIEM-native suppression rules. The status-quo substitute of manual analyst workflows remains the dominant spend category in organizations not yet committed to SOAR, making buyer inertia a significant
    competitive force alongside product differentiation.
