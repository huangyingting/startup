- id: competitor-profiles
  title: Direct Competitor Profiles
  body: 'Palo Alto Networks Cortex XSOAR (formerly Demisto, acquired 2019 for $560M) is the most widely deployed enterprise SOAR platform, embedded within the Cortex XDR ecosystem and benefiting from Palo
    Alto''s 80,000-plus customer installed base. XSOAR''s distribution advantage is structural: it appears on nearly every enterprise SOAR shortlist by default. However, it is primarily a playbook orchestration
    platform with AI augmentation rather than an AI-first autonomous SOC, and its on-premises heritage makes cloud-native time-to-value comparisons unfavorable. Cisco/Splunk SOAR (formerly Phantom, now
    integrated into Cisco Security Cloud post the $28B acquisition of Splunk in 2024) creates a vertically integrated SIEM+SOAR stack that appeals to organizations already committed to Splunk for log management.
    IBM QRadar SOAR is the preferred choice for regulated financial and government markets, leveraging Watson AI and IBM''s compliance credibility. Swimlane''s Turbine platform targets the MSSP channel
    with high-throughput automation and strong developer APIs, but requires substantial professional services investment. Tines has emerged as a fast-growing mid-market alternative approaching $50M ARR,
    with a deliberately simple no-code workflow automation model. Rapid7 InsightConnect integrates SOAR within the Insight platform, primarily serving Rapid7''s existing 11,000-plus vulnerability management
    customers. D3 Security and Sekoia.io serve niche segments: D3 in MSSP case management, Sekoia in EU-regulated markets requiring data sovereignty. Torq''s RevRod acquisition in 2025 for approximately
    $20M closed a CTI integration gap versus Sekoia.io and Palo Alto XSOAR Marketplace.'
  claimRefs:
  - CP001
  - CP002
  - CP003
  - CP004
  - CP005
  - CP006
  - CP007
  - CP008
  - CP031
  - CP036
- id: capability-pricing-comparison
  title: Capability and Pricing Comparison
  body: 'Torq''s product differentiation centers on three axes where it materially outperforms or uniquely leads the competitive field. First, integration breadth: with 1,000-plus security and IT tool integrations
    (700-plus pre-built connectors), Torq significantly exceeds Rapid7''s approximately 300, Swimlane''s approximately 350, and Tines''s approximately 400 native integrations, and is broadly comparable
    to Palo Alto XSOAR''s 500-plus Marketplace integrations. Second, AI autonomy: HyperSOC''s claimed 90 to 95 percent autonomous Tier-1 alert resolution is a benchmark no incumbent publicly claims, with
    XSOAR and QRadar SOAR requiring substantially more analyst touchpoints for equivalent triage workflows. Third, cloud-native deployment speed: Torq deploys in days versus weeks or months for on-premises
    SOAR alternatives. On pricing, Torq''s $150K to $350K per year enterprise ACV is competitive with incumbents: Palo Alto XSOAR enterprise runs $200K to $800K-plus including required professional services,
    while Tines enters lower at $40K to $80K for mid-market. Both GigaOm (2026 Radar: Leader and Outperformer) and KuppingerCole (2026 AI-SOC Leadership Compass: Overall Leader) validated Torq''s competitive
    positioning against incumbents.'
  claimRefs:
