- calloutType: risk
  title: XDR Commoditization Risk
  body: CrowdStrike Charlotte AI and Microsoft Copilot for Security both announced autonomous AI-triage capabilities in 2025, threatening to commoditize basic SOAR for single-vendor XDR shops within 1 to
    2 years. Torq's multi-vendor orchestration moat is real but time-limited.
  claimRefs:
  - CP013
  - CP023
- calloutType: strength
  title: Dual Analyst Leadership Validation
  body: 'Both GigaOm (2026 Radar: Leader and Outperformer) and KuppingerCole (2026 AI-SOC Leadership Compass: Overall Leader) independently validated Torq''s leadership positioning versus incumbents, providing
    third-party credibility for product differentiation claims.'
  claimRefs:
  - CP015
  - CP016
- calloutType: insight
  title: Multi-Vendor Orchestration as Durable Moat
  body: For enterprises running heterogeneous security stacks across mixed EDR, SIEM, cloud, and identity tools from multiple vendors, Torq's 1,000-plus integration breadth cannot be replicated by any single
    XDR vendor's native automation layer. This structural positioning is the most durable competitive advantage on a 2 to 5 year horizon.
