evidenceGaps:
  - type: private-evidence-only
    severity: material
    topic: Net dollar retention and cohort ARR quality
    missingEvidence: >-
      Glean has not disclosed NRR, GRR, or cohort-level ARR retention data. The disclosed $100M ARR figure is
      self-reported via press release with no third-party audit.
    whyItMatters: >-
      NRR is the primary indicator of ARR durability and product stickiness. Without it, investors cannot assess whether
      growth is driven by net new logos or expansion within the existing base.
    diligencePath: Request management accounts and cohort-level NRR data under NDA during DD process.
    relatedQuestionRefs:
      - RQ025
  - type: private-evidence-only
    severity: minor
    topic: Board composition and investor governance rights
    missingEvidence: >-
      No public disclosure of board seat composition, observer rights, or liquidation preference terms from any Glean
      funding round beyond Kleiner Perkins and Sequoia.
    whyItMatters: >-
      Board composition affects strategic decision-making speed; liquidation preferences affect return analysis in
      downside and M&A scenarios.
    diligencePath: Review corporate governance documents and cap table under NDA.
    relatedQuestionRefs:
      - RQ011
  - type: enumeration-incomplete
    severity: minor
    topic: Investor stakeholder map — complete board and observer list
    missingEvidence: >-
      The investor map (T103) lists known financial and strategic investors from press releases but board observer
      rights and secondary investors are not publicly confirmed.
    whyItMatters: Complete stakeholder map is required for full governance analysis and conflict-of-interest review.
    diligencePath: Obtain board minutes and cap table during due diligence.
    relatedTableRefs:
      - T103
  - type: private-evidence-only
    severity: minor
    topic: Competitive positioning versus Guru and ServiceNow Now Assist
    missingEvidence: >-
      Detailed head-to-head win/loss data for Glean versus Guru and ServiceNow Now Assist in enterprise knowledge
      management use cases is not publicly disclosed.
    whyItMatters: >-
      Win/loss analysis identifies the use cases where Glean is winning deals and where it is losing to cheaper
      incumbents with existing customer relationships.
    diligencePath: Request customer reference calls and win/loss analysis from sales team.
    relatedQuestionRefs:
      - RQ024
  - type: private-evidence-only
    severity: material
    topic: LTV/CAC ratios and enterprise sales cycle length
    missingEvidence: >-
      Glean has not disclosed LTV/CAC, average contract size, sales cycle duration, or net dollar retention — the key
      metrics for go-to-market efficiency assessment.
    whyItMatters: >-
      Without LTV/CAC and sales cycle data, investors cannot assess whether Glean's $200M ARR target is achievable at
      unit-economic profitability.
    diligencePath: Request sales efficiency metrics and cohort-level LTV analysis under NDA during due diligence.
    relatedQuestionRefs:
      - RQ015
  - type: stale
    severity: minor
    topic: Freshness of analyst market sizing estimates
    missingEvidence: >-
      Gartner and IDC estimates cited are from 2024 publications; no updated estimates for the AI-native knowledge
      management sub-segment specifically have been published as of May 2026.
    whyItMatters: Stale market sizing underestimates the pace of AI-native product displacement of legacy enterprise search.
    diligencePath: >-
      Commission updated analyst market sizing from Gartner or IDC for AI-native enterprise knowledge management as a
      standalone category.
    relatedQuestionRefs:
      - RQ019
  - type: private-evidence-only
    severity: material
    topic: Customer churn from Glean to Microsoft Copilot
    missingEvidence: >-
      No public data on whether any Glean customer has churned to M365 Copilot or reduced Glean contract size due to
      Copilot bundling.
    whyItMatters: >-
      Copilot bundling is the #1 competitive threat; evidence of initial churn would be an early warning signal for the
      thesis.
    diligencePath: Request churn cohort data and customer win/loss analysis from Glean sales team under NDA.
    relatedQuestionRefs:
      - RQ024
  - type: private-evidence-only
    severity: minor
    topic: Glean distribution partnerships and channel strategy
    missingEvidence: >-
      No public disclosure of reseller, SI, or OEM channel partnerships that could scale distribution beyond direct
      sales.
    whyItMatters: >-
      A Microsoft-comparable channel network would be required to compete at $1B+ ARR; absence of disclosed partners
      limits growth visibility.
    diligencePath: Request partner ecosystem strategy and channel ARR contribution data during due diligence.
    relatedQuestionRefs:
      - RQ016
  - type: private-evidence-only
    severity: blocking
    topic: NRR, GRR, and gross margin — the three critical financial metrics
    missingEvidence: Glean has not disclosed NRR, GRR, or audited gross margin in any public source.
    whyItMatters: >-
      These three metrics are necessary for investment-grade financial underwriting; their absence makes the $7.2B
      valuation impossible to independently verify.
    diligencePath: >-
      Request audited financial statements, cohort NRR data, and gross margin by module under NDA during formal due
      diligence.
    relatedQuestionRefs:
      - RQ013
  - type: private-evidence-only
    severity: material
    topic: Revenue mix between Search, Assistant, and Agents modules
    missingEvidence: No public disclosure of revenue split between Glean's three product modules; Agents was only launched May 2025.
    whyItMatters: Module-level revenue mix indicates where Glean is winning and the durability of each revenue stream.
    diligencePath: Request module-level ARR breakdown and Agents adoption metrics from Glean during due diligence.
    relatedQuestionRefs:
      - RQ014
  - type: private-evidence-only
    severity: material
    topic: Uptime SLA and reliability metrics
    missingEvidence: >-
      Glean has not disclosed contractual uptime SLA or historical reliability metrics; enterprise buyers cannot
      independently verify system reliability.
    whyItMatters: >-
      Reliability is a critical procurement factor for enterprise AI search deployed at scale; absence of SLA data
      limits due diligence.
    diligencePath: Request enterprise MSA/SLA contracts and incident log data during due diligence.
    relatedQuestionRefs:
      - RQ018
  - type: private-evidence-only
    severity: minor
    topic: IP protection strategy and patent portfolio
    missingEvidence: >-
      No public patent filings or IP protection disclosures identified for Glean's Enterprise Graph or permission-aware
      indexing architecture.
    whyItMatters: Without IP protection, competitors could replicate key architectural innovations within 12-18 months.
    diligencePath: Conduct patent search on Glean-related inventions and request IP assignment documentation during due diligence.
    relatedQuestionRefs:
      - RQ024
  - type: private-evidence-only
    severity: material
    topic: Net revenue retention (NRR) and gross logo churn
    missingEvidence: >-
      Glean has not publicly disclosed NRR or gross churn figures; these are the most critical customer retention
      metrics for VC review.
    whyItMatters: >-
      NRR above 120% would confirm the land-and-expand model is working; below 100% would signal serious customer
      retention concerns.
    diligencePath: Request cohort-level NRR data and gross/net logo churn by customer size in the private data room.
    relatedQuestionRefs:
      - RQ021
      - RQ004
  - type: private-evidence-only
    severity: material
    topic: Customer-disclosed productivity and ROI metrics
    missingEvidence: >-
      No named customer has publicly disclosed specific productivity improvements, time savings, or ROI figures
      attributable to Glean.
    whyItMatters: Without quantified outcomes, customer case studies are narrative only and cannot anchor pricing justification.
    diligencePath: >-
      Request reference call interviews with Databricks, Duolingo, and two other customers for private productivity
      metric disclosure.
    relatedTableRefs:
      - T603
  - type: private-evidence-only
    severity: minor
    topic: International customer coverage beyond European accounts
    missingEvidence: Glean's APAC and LatAm customer coverage is undisclosed; Booking.com is the only European named customer.
    whyItMatters: Geographic concentration in US and Western Europe limits TAM and currency-risk-adjusted revenue.
    diligencePath: Request geographic breakdown of customer count and ARR by region.
    relatedQuestionRefs:
      - RQ016
  - type: private-evidence-only
    severity: material
    topic: Glean cyber liability insurance and breach notification procedures
    missingEvidence: No public disclosure of cyber liability insurance coverage amount or breach notification protocols for Glean.
    whyItMatters: >-
      In an enterprise data breach scenario, insurance coverage and response procedures determine enterprise trust
      survivability.
    diligencePath: >-
      Request cyber insurance certificate, breach notification procedures, and incident response plan from Glean legal
      team.
    relatedQuestionRefs:
      - RQ025
  - type: private-evidence-only
    severity: material
    topic: Glean EU AI Act compliance roadmap
    missingEvidence: No public EU AI Act compliance plan or GPAI system registration timeline disclosed by Glean.
    whyItMatters: >-
      EU AI Act enforcement begins August 2026; European customers (Booking.com, others) face compliance risk if Glean
      is not certified.
    diligencePath: Request EU AI Act compliance roadmap and legal opinion from Glean general counsel.
    relatedTableRefs:
      - T701
  - type: private-evidence-only
    severity: material
    topic: Glean NRR, gross logo churn, and LLM cost margin data
    missingEvidence: NRR, gross churn, LLM inference cost as % of revenue, and gross margin have not been publicly disclosed by Glean.
    whyItMatters: >-
      These are the three most critical unit economics inputs for an enterprise SaaS investment decision at the $7.2B
      entry price.
    diligencePath: >-
      Mandatory data room items: cohort NRR by year, gross logo churn by competitive reason, LLM API cost as % of gross
      revenue, gross margin structure.
    relatedQuestionRefs:
      - RQ024
  - type: private-evidence-only
    severity: material
    topic: Glean cap table and liquidation preference stack
    missingEvidence: >-
      Full cap table, liquidation preferences, and participation rights have not been publicly disclosed; $765M raised
      across 6 rounds likely creates significant preference overhang.
    whyItMatters: >-
      Preference stack affects downside protection for secondary investors and shapes return distribution in
      non-bull-case exits.
    diligencePath: Request full cap table, Series F term sheet, and liquidation waterfall analysis.
    relatedTableRefs:
      - T804
