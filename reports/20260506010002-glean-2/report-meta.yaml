companyProfile:
  summary: 'Glean was founded in March 2019 in Palo Alto by four ex-Google and ex-Meta engineers: Arvind Jain (CEO, ex-Google
    9 years and Rubrik co-founder), T.R. Vishwanath (CTO, ex-Meta), Tony Gentilcore (ex-Google), and Piyush Prahladka (ex-Google
    AI). The company''s core insight is that enterprise employees waste 2-3 hours per day searching for information across
    20-100+ SaaS applications, and that a neutral, multi-ecosystem AI search layer could unify this fragmented knowledge into
    a single intelligent interface. Glean''s platform has three product layers: Glean Search (hybrid vector + BM25 search
    with permission-aware indexing), Glean Assistant (RAG-grounded conversational AI using the Model Hub — supporting OpenAI,
    Anthropic, and Gemini), and Glean Agents (autonomous workflow automation, GA May 2025). The Enterprise Graph (September
    2025) is the company-specific knowledge personalization layer that adapts all three product layers to each employee''s
    role, team, and work context. The company raised $765M across six rounds from Kleiner Perkins, Lightspeed, Sequoia, General
    Catalyst, Altimeter, DST Global, and Wellington Management — reaching a $7.2B valuation at the June 2025 Series F. ARR
    scaled from $10M (2022 est.) to $100M (Dec 2024, disclosed) to $200M+ (2025 est.) at approximately 100% YoY growth, with
    200+ enterprise customers including Databricks, eBay, Booking.com, Duolingo, Canva, Sony Electronics, and Plaid. DAU/MAU
    of approximately 40% — reported by CEO Arvind Jain — is above enterprise software norms (20-25%) and suggests strong daily
    adoption habit. The company has approximately 1,300-1,500 employees and has not yet achieved profitability. The investment
    recommendation is TRACK: the thesis is exceptional and the traction is real, but the $7.2B valuation at 36x estimated
    ARR provides insufficient margin of safety given hyperscaler bundling risk and the absence of NRR disclosure.'
