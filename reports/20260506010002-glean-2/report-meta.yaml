  topStrengths:
  - 'Fastest ARR scaling in enterprise search history: $10M (2022 est.) → $100M (Dec 2024 disclosed) → $200M+ (2025 est.),
    ~100% YoY growth'
  - 200+ marquee enterprise customers (Databricks, eBay, Booking.com, Duolingo, Canva, Sony Electronics) with ~40% DAU/MAU
    — well above the 20-25% enterprise software norm
  - 'Multi-ecosystem connector breadth (100+ apps) + permission-aware indexing architecture is technically defensible: neither
    Microsoft nor Google can replicate this neutrally given their own ecosystem conflicts of interest'
  - 'Serial founder team with deep domain expertise (Arvind Jain: ex-Google 9 years, Rubrik co-founder) backed by Sequoia,
    Kleiner Perkins, Lightspeed, Altimeter, and Wellington — a top-quartile investor roster'
  - Glean Agents (GA May 2025) and Enterprise Graph (Sep 2025) open a larger agentic workflow TAM beyond search, with no comparable
    multi-ecosystem competitor at scale
  topRisks:
  - 'Hyperscaler bundling: Microsoft 365 Copilot and Google Workspace Gemini are bundled at zero marginal cost into existing
    enterprise licenses — a structural, permanent pricing headwind that Glean cannot fully mitigate'
  - 'NRR not disclosed: the absence of net revenue retention data at $200M ARR is atypical for a company at this scale and
    is the single most critical missing investment signal'
  - 'Valuation: 36x estimated ARR at $7.2B implies negative probability-weighted expected returns (-8%) across bull/base/bear
    scenarios; entry price discipline requires $3-4B (15-20x ARR) for an attractive risk/return'
  - 'LLM API dependency: all AI capabilities depend on third-party OpenAI/Anthropic/Google APIs; no in-house LLM creates persistent
    vendor, cost, and margin compression risk as inference usage scales'
  - 'EU AI Act enforcement (August 2026): Glean has not disclosed any compliance roadmap for its European customer base despite
    enforcement beginning 15 months from the research date'
  unresolvedGaps:
  - Net revenue retention (NRR) and gross logo churn not publicly disclosed — mandatory diligence item before any investment
    decision
  - LLM inference cost as percentage of gross revenue not disclosed — gross margin structure and unit economics are opaque
  - Cap table and liquidation preference stack not publicly disclosed — $765M raised across 6 rounds likely creates significant
    preference overhang
  - EU AI Act compliance roadmap not disclosed — material regulatory risk for European enterprise deployments
  - FedRAMP authorization status undisclosed — blocks $8-10B US federal government TAM; no disclosed timeline for remediation
