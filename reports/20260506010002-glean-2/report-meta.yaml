  productSummary: 'Glean''s Work AI platform has three product layers: Glean Search (AI-powered enterprise search with permission-aware
    indexing across 100+ app connectors), Glean Assistant (RAG-grounded conversational AI using the multi-LLM Model Hub),
    and Glean Agents (autonomous workflow automation, GA May 2025). The Enterprise Graph (Sep 2025) is the proprietary personalization
    layer that models relationships between documents, employees, and teams across all connected applications, adapting all
    three product layers to each employee''s individual context. Pricing is seat-based with annual enterprise commitments;
    estimated 5-25 per user per month at list price. SOC 2 Type II, ISO 27001, and GDPR certifications satisfy enterprise
    procurement requirements for US and European customers.'
