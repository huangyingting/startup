  evidenceGaps:
  - type: private-evidence-only
    severity: material
    topic: valuation private metrics
    missingEvidence: Management-provided ARR, margin, retention, customer concentration, legal reserve, or deployment-cohort
      evidence as applicable.
    whyItMatters: The public record supports directional analysis but does not provide every underwriting input needed for
      a final investment decision.
    diligencePath: Request a management data room, audited financials, cohort exports, customer reference calls, legal memos,
      and technical validation artifacts.
    relatedQuestionRefs:
    - QV028
    - QV029
    - QV030
  - type: enumeration-incomplete
    severity: minor
    topic: valuation enumeration tables partial coverage
    missingEvidence: Complete population lists from management or primary databases for every row category in the enumeration
      exhibits.
    whyItMatters: Partial public enumerations can bias conclusions toward better-publicized customers, investors, risks, or
      comparables.
    diligencePath: Ask management for exported customer, investor, partner, and risk registers and reconcile them to the public-source
      sample.
    relatedTableRefs:
    - TV001
    - TV002
    - TV003
    - TV004
    - TV005
    - TV006
  - type: conflicting-data
    severity: material
    topic: privacy litigation and consent implementation
    missingEvidence: Current docket status, settlement posture, insurance coverage, written customer consent workflows, and
      counsel assessment.
    whyItMatters: Biometric and in-cab monitoring risk can affect sales cycles, reserves, customer trust, and valuation discount.
    diligencePath: Obtain outside-counsel memo, docket updates, customer consent templates, and a sample deployment audit
      before final underwriting.
    relatedQuestionRefs:
    - QV028
