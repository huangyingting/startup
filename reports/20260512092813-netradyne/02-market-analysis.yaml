chapter:
  number: 2
  title: Market Analysis
  summary: The relevant market is the intersection of fleet management, video telematics, compliance, and AI driver safety.
    Public market estimates point to a large, growing category, but the investable serviceable market depends on fleet segments
    that will pay for safety ROI, claims reduction, and compliance integration.
sections:
- id: section-1
  title: Market boundary and spend definition
  body: Market boundary and spend definition frames Netradyne through the retained 2026 evidence set rather than through a
    single marketing claim. The chapter's working thesis is that Demand is structurally supported by safety, insurance, compliance,
    and productivity pressure, but sizing must avoid double-counting broad fleet-management spend. The strongest reviewed
    evidence comes from official product and funding materials, named customer stories, independent market or company profiles,
    and adverse/legal sources where relevant. This section interprets those sources by separating company-claimed facts from
    third-party reporting and by converting unsupported private metrics into explicit diligence asks. For investment use,
    the most important question is not whether the product category is attractive in the abstract; it is whether Netradyne
    can turn safety, compliance, and claims-reduction proof into durable recurring economics while controlling privacy, hardware,
    and competitive risks. The tables and figures attached to this section therefore emphasize evidence quality, decision
    implications, and the next data-room checks needed before a price-sensitive underwriting decision. Where public sources
    leave gaps, the analysis avoids false precision and marks the remaining work as management, customer, legal, or technical
    diligence rather than inventing metrics.
