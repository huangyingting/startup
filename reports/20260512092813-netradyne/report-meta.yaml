companyProfile:
  summary: Netradyne is a San Diego based private company selling Driveri, an AI-powered fleet safety and fleet-management
    platform that combines cameras, edge intelligence, driver coaching, telematics, compliance workflows, integrations, and
    privacy controls. Public evidence supports strong product and customer proof, a January 2025 $90 million Series D, and
    broad international ambitions, but financial metrics and litigation posture remain private.
