companyProfile:
  summary: >-
    Netradyne is a San Diego based private company selling Driveri, an AI-powered fleet safety and fleet-management
    platform that combines cameras, edge intelligence, driver coaching, telematics, compliance workflows, integrations,
    and privacy controls. Public evidence supports strong product and customer proof, a January 2025 $90 million Series
    D, and broad international ambitions, but financial metrics and litigation posture remain private.
  foundedDate: '2015-01-01'
  founders:
    - name: Avneesh Agrawal
      role: CEO and Co-Founder
      background: >-
        Public sources identify Agrawal as the CEO and co-founder leading Netradyne through the 2025 financing and
        product expansion.
      claimRefs:
        - CO004
    - name: David Julian
      role: Co-Founder and CTO
      background: >-
        Public Netradyne materials quote Julian as co-founder and CTO responsible for AI fleet-safety technology
        expansion.
      claimRefs:
        - CO004
  foundingLocation: San Diego, California
  headquarters: San Diego, California
  productSummary: >-
    Driveri applies AI-enabled cameras, edge intelligence, video review, driver coaching, telematics, maintenance, fuel,
    and compliance workflows to commercial fleet safety and operations.
  customerFocus: >-
    Commercial fleets across trucking, logistics, delivery, passenger transit, armored transport, waste, food
    distribution, construction, and service fleets.
  businessModel: >-
    Quote-based hardware-plus-SaaS fleet safety and fleet-management platform; public sources do not disclose ARR, gross
    margin, or net retention.
  stage: late-stage private / Series D
  fundingStatus: >-
    Netradyne announced a $90 million Series D in January 2025; third-party sources report a $1.35 billion pre-money
    valuation and total funding above $350 million.
