        blocks:
          - type: paragraph
            body: >-
              Identity, mission, and verified footprint frames Netradyne through the retained 2026 evidence set rather
              than through a single marketing claim. The chapter's working thesis is that The company is best understood
              as a private fleet-safety SaaS and hardware platform rather than a pure dashcam vendor. The strongest
              reviewed evidence comes from official product and funding materials, named customer stories, independent
              market or company profiles, and adverse/legal sources where relevant. This section interprets those
              sources by separating company-claimed facts from third-party reporting and by converting unsupported
              private metrics into explicit diligence asks. For investment use, the most important question is not
              whether the product category is attractive in the abstract; it is whether Netradyne can turn safety,
              compliance, and claims-reduction proof into durable recurring economics while controlling privacy,
              hardware, and competitive risks. The tables and figures attached to this section therefore emphasize
              evidence quality, decision implications, and the next data-room checks needed before a price-sensitive
              underwriting decision. Where public sources leave gaps, the analysis avoids false precision and marks the
              remaining work as management, customer, legal, or technical diligence rather than inventing metrics.
