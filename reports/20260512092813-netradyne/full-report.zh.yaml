        blocks:
          - type: paragraph
            body: >-
              「身份、使命与已核实足迹」不采信单一营销说法，而是把 Netradyne 放在 2026 年保留下来的证据集中审视。本章的工作假设是：公司更应被理解为一家私有的车队安全 SaaS
              与硬件平台，而不是单纯的行车记录仪厂商。已复核证据里，最强的是官方产品与融资材料、具名客户案例、独立市场或公司画像，以及需要纳入的不利 /
              法律来源。本节拆分公司自称事实与第三方报道，把缺乏支撑的私有指标转化为明确的尽调问题。用于投资判断时，关键不是产品类别抽象上是否有吸引力，而是 Netradyne
              能否在控制隐私、硬件和竞争风险的同时，把安全、合规和降低理赔的证据转化为可持续的经常性收入经济性。因此，本节附表和图表聚焦证据质量、决策含义，以及定价敏感的投资决策前还需核查的数据室资料。公开来源留下缺口时，分析避免伪精确，并把后续工作标记为管理层、客户、法律或技术尽调，而不是编造指标。
