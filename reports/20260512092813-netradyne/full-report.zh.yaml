companyProfile:
  summary: >-
    Netradyne 是一家总部位于 San Diego 的私营公司，销售 Driveri：一个 AI
    驱动的车队安全与车队管理平台，把摄像头、边缘智能、驾驶员辅导、车联网、合规工作流、集成和隐私控制串在一起。公开证据支持其产品与客户验证扎实、2025 年 1 月完成 $90 million Series
    D，并有广泛国际化野心；但财务指标和诉讼态势仍未公开。
  foundedDate: '2015-01-01'
  founders:
    - name: Avneesh Agrawal
      role: CEO 兼联合创始人
      background: 公开来源显示，Agrawal 是 CEO 兼联合创始人，带领 Netradyne 完成 2025 年融资并推进产品扩张。
      claimRefs:
        - CO004
    - name: David Julian
      role: 联合创始人兼 CTO
      background: Netradyne 的公开材料引用 Julian 作为联合创始人兼 CTO，负责扩展 AI 车队安全技术。
      claimRefs:
        - CO004
  foundingLocation: San Diego, California
  headquarters: San Diego, California
  productSummary: Driveri 把 AI 摄像头、边缘智能、视频复核、驾驶员辅导、车联网、维护、燃油和合规工作流用于商业车队安全与运营。
  customerFocus: 客户覆盖卡车运输、物流、配送、客运、武装运输、废弃物处理、食品分销、建筑和服务车队等商业车队。
  businessModel: 基于报价的硬件 + SaaS 车队安全与车队管理平台；公开来源未披露 ARR、毛利率或净留存率。
  stage: late-stage private / Series D
