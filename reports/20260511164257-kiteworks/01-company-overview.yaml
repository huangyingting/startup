company:
  name: Kiteworks
chapter:
  number: 1
  title: Company Overview
  summary: "Kiteworks (formerly Accellion) is a San Mateo, California-based enterprise cybersecurity company that builds the Private Content Network (PCN), a unified platform for secure sensitive-data communications spanning managed file transfer, email protection, secure file sharing, and compliant web forms. Backed by Insight Partners and Sixth Street Growth with $1B+ valuation after a $456M growth equity round in August 2024, the company is profitable, employs ~365 people, and serves 3,650+ enterprise and government customers including regulated industries such as healthcare, defense, financial services, and government."

sections:
  - id: identity-and-history
    title: Identity, History, and Rebrand
    body: "Kiteworks traces its origins to 1999, when the company was founded as Accellion in Singapore, initially focused on distributed file storage and large-file sharing for enterprises grappling with email attachment limitations. Over the following decade, Accellion expanded its product from basic file transfer into an enterprise-grade secure content communications platform. By 2014 the company had reached a $500M valuation. In April 2020, Bregal Sagemount invested $120M, enabling an accelerated product build-out and sales expansion. The company rebranded from Accellion to Kiteworks in October 2021, distancing itself from the Accellion File Transfer Appliance (FTA) legacy product that had been exploited in a major breach during December 2020–February 2021, and signaling a broader vision: a Private Content Network (PCN) that unifies all sensitive communications channels under one governance and compliance engine. The rebrand also reflected the acquisition of totemo (January 2022), ownCloud (November 2023), and DRACOON (November 2023) to deepen European market presence and email encryption capabilities. Headquartered at 1510 Fashion Island Blvd, San Mateo, California 94404, Kiteworks operates globally with significant European operations built through the ownCloud and DRACOON acquisitions in Germany and Switzerland."
    claimRefs: [CO001, CO002, CO003, CO004, CO005, CO012, CO022, CO023, CO024, CO025, CO026]
    tableRefs: [TO004]
    figureRefs: [FO001]

  - id: leadership-governance
    title: Leadership, Governance, and Key Personnel
    body: "Jonathan Yaron serves as Chairman and CEO of Kiteworks as of 2026, having joined the company in 2015 initially as an advisor and chairman before taking operational control during a critical turnaround period. Under Yaron's leadership, Kiteworks transformed from a struggling legacy file-transfer company into a profitable, fast-growing cybersecurity platform serving thousands of regulated enterprises worldwide. Tim Freestone serves as Chief Marketing Officer, driving the company's messaging and brand positioning in the content security space. Yaron Galant holds the role of Chief Product Officer, overseeing product strategy and roadmap for the PCN platform. Frank Balonis serves as Senior Vice President, Operations and CISO, responsible for the security posture of the company itself. Michael Lee serves as Senior Vice President, Finance, managing the company's financial operations. Camilo Artiga-Purcell is General Counsel. Dario Perfettibile leads European Operations as VP & GM. As part of the August 2024 growth equity round, Insight Partners and Sixth Street Growth placed representatives on Kiteworks' board of directors, providing governance oversight alongside the existing management team. The company's leadership is geographically distributed, with Israeli technical founders and management, a US-based executive leadership team, and European operational management for the EMEA region."
    claimRefs: [CO006, CO007, CO008, CO009, CO010, CO011, CO013, CO014]
    tableRefs: [TO002]

  - id: funding-and-capital
    title: Funding History, Valuation, and Investor Map
    body: "In August 2024, Kiteworks closed its largest and most significant financing event: a $456M growth equity round led by Insight Partners and Sixth Street Growth, valuing the company at over $1 billion and conferring unicorn status. The round was structured as a minority investment, providing partial liquidity to existing shareholders while funding continued growth, M&A activity, product development, and international expansion. The investment represented strong institutional confidence in Kiteworks' position as a compliance-driven secure communications platform in a market experiencing rapid regulatory-driven demand. As part of the transaction, both investors received board representation. Prior to this round, Kiteworks (then operating as Accellion) raised $120M from Bregal Sagemount in April 2020, which had funded the platform rebuild and go-to-market expansion that preceded the rebrand. Total capital raised to date across all rounds is approximately $650M. Kiteworks is privately held and does not disclose detailed financial statements; however, the company has confirmed it has been profitable for multiple consecutive years, a notable characteristic for a cybersecurity growth company at this scale. The August 2024 round was a partial liquidity event, suggesting it was not a primary capital raise driven by cash need but rather a growth acceleration and investor return event."
    claimRefs: [CO015, CO016, CO017, CO018, CO019, CO020, CO021, CO027, CO028, CO029]
    tableRefs: [TO003]
    figureRefs: [FO003]

  - id: scale-and-metrics
    title: Scale, Metrics, and Business Model
    body: "Kiteworks operates on a subscription SaaS model with no professional services revenue disclosed separately, meaning its ARR and total revenue are closely aligned. As of early 2025, the company disclosed ARR exceeding $130M, with continued growth driven by new customer acquisition, upsell of additional compliance modules, and geographic expansion in Europe. As of March 2026, the company employed approximately 365 people, up from approximately 332 in early 2025, representing roughly 10% year-on-year headcount growth. The company serves 3,650+ enterprise and government customers across regulated industries, with its platform protecting more than 100 million end users. Kiteworks' business model monetizes through per-seat or per-connector subscription licensing, with pricing tiers aligned to compliance requirements and deployment model (on-premises, private cloud, hybrid, or FedRAMP Gov Cloud). The company's acquisition strategy targets subscription-based businesses with ARR between $5M and $60M, with management indicating bullishness on executing multiple deals per year to expand the platform and geographic reach. This inorganic growth layer complements organic ARR growth and broadens the addressable market. Key metrics remain private, including net revenue retention, gross margin, and churn rates, representing material evidence gaps for diligence purposes."
    claimRefs: [CO030, CO031, CO032, CO033, CO034, CO035, CO036, CO037]
    tableRefs: [TO001]
    figureRefs: [FO002]

  - id: adverse-events
    title: Adverse Events and Reputational Risk
    body: "The most significant adverse event in Kiteworks' corporate history is the Accellion File Transfer Appliance (FTA) breach of December 2020–February 2021. Threat actors attributed to the FIN11 group (linked to the CLOP ransomware gang) exploited four zero-day vulnerabilities in the legacy FTA software (CVE-2021-27101, CVE-2021-27102, CVE-2021-27103, CVE-2021-27104) to steal sensitive data from over 100 organizations worldwide. Victims included Shell, Kroger, Stanford University, the University of California system, Singtel, Bombardier, and multiple healthcare systems. The CISA and FBI issued a joint advisory (AA21-055A) on the attack. The FTA was a 20-year-old legacy product that Accellion had been encouraging customers to migrate away from; its compromise did not affect the newer Kiteworks platform. However, the reputational damage was severe, contributing to the decision to rebrand. In January 2022, Accellion agreed to an $8.1M class-action settlement, covering approximately 9.2 million affected individuals, without admitting wrongdoing. As part of the settlement, the company agreed to retire the FTA product permanently and implement enhanced security practices. The breach and settlement serve as an adverse source that informs ongoing diligence into the company's security culture and current risk posture."
    claimRefs: [CO038, CO039, CO040, CO041, CO042, CO043, CO044, CO038]

