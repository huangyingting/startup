    title: "Accellion FTA Breach Legacy Remains an Ongoing Reputational Overhang"
    body: "The 2020-2021 Accellion FTA breach affected 100+ organizations and resulted in an $8.1M settlement. While the FTA product has been retired, the reputational risk from this incident persists in procurement discussions in sensitive government and healthcare accounts."
    claimRefs: [CO038, CO039, CO040, CO041, CO042, CO043, CO044]

  - calloutType: insight
    title: "Acquisition-Led Growth Strategy Signals Consolidation Play"
    body: "Kiteworks has acquired totemo, ownCloud, and DRACOON and signals intent to acquire 2-4 businesses per year in the $5M-$60M ARR range. This inorganic strategy could accelerate platform breadth and European market share but introduces integration risk."
    claimRefs: [CO022, CO023, CO024, CO036, CO037]

