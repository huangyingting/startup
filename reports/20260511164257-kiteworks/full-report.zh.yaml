      - number: '8.4'
        title: 可比估值
        blocks:
          - type: paragraph
            body: >-
              Kiteworks 的可比公司分析覆盖四个维度：上市公司交易倍数、私募轮次可比、战略收购退出倍数，以及行业分析师基准数据。最相关的上市可比公司是 Varonis Systems（数据安全 SaaS，NYSE:
              VRNS）和 Progress Software（MFT/MOVEit，NASDAQ: PRGS）。Varonis 在完成纯 SaaS 转型后约按 8x ARR 交易，是 Kiteworks 合规 SaaS
              定位的最佳单一上市类比。Progress Software 约按 4x ARR 交易，反映 MOVEit 泄露后 MFT 品牌承压，设定了熊市底部。

              历史战略收购倍数（Proofpoint 约 10x ARR，Mimecast 约 9-10x ARR）为有利市场中的内容安全收购设定天花板。这些交易属于 2021-2022
              年批次，发生在倍数压缩之前；按当前市场条件应折价 30-40%。CBInsights 网络安全独角兽追踪器和 Pitchbook Kiteworks 公司资料确认了 Kiteworks
              当前独角兽地位和成长股权结构。

              Livmo 和 Acquiry 对 2026 SaaS 估值倍数的分析师基准显示，网络安全 SaaS 中位数倍数为 6-9x ARR，与 Kiteworks 基准情景区间一致。SaaStr 企业 SaaS
              基准确认，NRR 高于 120% 可获得 12-15x 倍数，而 NRR 低于 110% 则意味着倍数向 5-7x 承压。
