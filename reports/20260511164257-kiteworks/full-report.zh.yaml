      - number: '4.4'
        title: 财务证据缺口与尽调阻断项
        blocks:
          - type: paragraph
            body: >
              作为私有公司，Kiteworks 不披露经审计财务、不披露 FedRAMP 和合规认证之外的监管申报，也不提供指引。以下是阻碍完整承销收入、利润率、单位经济或资本位置的重大财务证据缺口。第一，ARR
              数字（$130M）完全来自 GetLatka——该数据库对私有公司的估计经常不准确，依赖自报或外推数字。没有 NDA
              下的管理层披露，这只是软估计。第二，毛利率完全由行业基准估算；如果专业服务或本地许可在收入中占比高于假设，实际利润率可能显著不同。第三，NRR
              未确认；如果通过收购获得的客户（ownCloud/DRACOON）留存更低，混合 NRR 可能低于预期。第四，收购整合成本不透明；ownCloud 尤其拥有复杂的开源授权模式，可能影响 Kiteworks
              充分变现被收购客户群的能力。第五，FTA 泄露相关索赔带来的任何持续财务敞口——包括保险代位求偿、州 AG 调查或 HIPAA/OCR 调查——均未公开披露。投资人必须在投入资本前获得完整财务资料包（经审计
              P&L、含 NRR waterfall 的 ARR 明细、收购经济性、未决诉讼准备金，以及关键客户集中度数据）。
