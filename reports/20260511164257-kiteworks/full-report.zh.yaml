      - number: '1.3'
        title: 融资历史、估值与投资方图谱
        blocks:
          - type: paragraph
            body: >-
              August 2024，Kiteworks 完成最大、也最关键的一次融资：由 Insight Partners 和 Sixth Street Growth 领投的 $456M 成长型股权融资，公司估值超过 $1
              billion，并获得独角兽地位。该轮为少数股权投资，在为持续增长、M&A 活动、产品开发和国际扩张提供资金的同时，也为既有股东提供部分流动性。该投资体现了机构对 Kiteworks
              作为合规驱动安全通信平台的强信心，而该市场正经历监管驱动的需求快速增长。交易完成后，两家投资方均获得董事会席位。在此之前，Kiteworks（当时仍以 Accellion 名义运营）于 April 2020 从
              Bregal Sagemount 融资 $120M，为更名前的平台重建和 go-to-market 扩张提供资金。截至目前，各轮累计融资约 $650M。Kiteworks
              为私有公司，不披露详细财务报表；不过公司已确认连续多年盈利，这对如此规模的网络安全成长型公司而言较为少见。August 2024
              这一轮属于部分流动性事件，说明该轮并非由现金需求驱动的一级资本募集，更像是增长加速和投资人回报事件。
