  - number: 3
    title: 竞争对手
    sections:
      - number: '3.1'
        title: 竞争格局与类别结构
        blocks:
          - type: paragraph
            body: >
              Kiteworks 处在一个碎片化市场，历史上买方会从不同供应商采购 MFT、安全文件共享和邮件加密。缺少统一平台型既有巨头，既创造机会（类别创建），也带来风险（多个决策者之间采购动作分散）。直接 MFT
              竞争对手——Progress MOVEit、Axway AMPLIFY MFT、IBM Sterling Connect:Direct 和 Fortra GoAnywhere MFT——是分析师对比列表和 G2
              评价中最常被提及的替代方案。这些供应商主要围绕协议覆盖、集成深度和企业级吞吐竞争。在安全文件共享细分中，Box Business、Citrix ShareFile、Egnyte 和 Microsoft
              SharePoint/OneDrive 是主要替代品，其中 Microsoft 因与 M365 零成本捆绑而最危险。邮件加密竞争对手包括 Virtru、Zix（已被 OpenText 收购）、Proofpoint
              和 Mimecast；Kiteworks 收购 totemo 正是为了直接覆盖该细分。相邻威胁包括 CTERA 和 Tresorit
              等面向受监管文件同步的云原生初创公司。现状替代方案——共享网盘、邮件附件、消费级文件共享工具——在较小组织中仍然普遍。June 2023 的 Progress MOVEit 大规模利用泄露，被归因于 CLOP
              勒索软件组织（也是 Accellion FTA 泄露背后的同一威胁行为者），实质性损害了 Progress 在合规敏感买方中的声誉，并加速替代方案评估。该事件在 2023–2024 为 Kiteworks 和其他
              MFT 供应商创造了可争夺的替代机会。未来可能进入者包括 hyperscaler-native 平台（AWS Transfer Family、Azure B2B、Google Cloud Secure File
              Transfer），它们会商品化基础 SFTP/MFT 功能，但缺乏专用平台的合规治理深度。
