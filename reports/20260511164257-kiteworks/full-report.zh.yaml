  productSummary: >
    Kiteworks Private Content Network (PCN) 是统一平台，以加固虚拟设备（本地部署、私有云或混合部署）或 FedRAMP Gov Cloud 交付。核心模块包括：(1) Managed File
    Transfer (MFT)——企业级安全文件传输，配备审计日志、FIPS 140-2 加密和 SFTP/FTPS/AS2 支持；(2) Email Protection——带 DLP、S/MIME
    加密和威胁过滤的策略强制邮件；(3) Secure File Sharing——具备访问控制和活动审计轨迹的合规协作；(4) Secure Forms——加密的结构化数据采集；(5) eSignature——合规电子签名；(6)
    API Gateway——与 Salesforce、ServiceNow、Microsoft 365、Splunk 以及 30+ 个企业平台集成。平台差异化包括零信任内容防火墙、单租户客户隔离、集成 IDS/IPS 和 WAF、AV
    扫描，以及用于治理报告的统一 CISO 仪表盘。
  customerFocus: >
    核心客户是需要证明合规的受监管企业和政府机构：需要 FedRAMP Moderate/High、CMMC 2.0 和 ITAR 支持的美国联邦机构与 DoD 承包商；受 HIPAA 约束的医疗机构；受 GLBA 和 SOX
    约束的金融服务公司；处理敏感 IP 的法律和医药公司。次级市场包括由 DRACOON 服务的 EMEA 企业（Germany/Austria/Switzerland），以及由 totemo 服务的 Swiss
    金融服务和医药客户。政府 / 国防垂直的纵深是最强竞争护城河。
  businessModel: >
    订阅 SaaS 模式：PCN 平台按席位或按连接器收取年度订阅费。部署选项——云、本地设备和混合部署——对应不同定价层级，FedRAMP Gov Cloud 实例带有合规溢价。DRACOON 和 totemo 子公司在 EMEA
    采用企业授权模式。公司未单独披露专业服务分部；实施和合规咨询要么打包在内，要么由合作伙伴交付。
