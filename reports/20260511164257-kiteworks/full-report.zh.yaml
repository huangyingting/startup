  - id: TE002
    title: 工作流 / 用例表
    columns:
      - 用户任务
      - 当前（现状）工作流
      - Kiteworks PCN 方案
      - 可量化收益
      - 已知限制
    rows:
      - - 政府机构向承包商发送涉密文件
        - 邮件（不安全）或手动 VPN 下的 FTP；无审计轨迹
        - FedRAMP Gov Cloud SFTP/MFT，自动合规日志和访问控制
        - 100% 可审计；FedRAMP 合规传输；减少人工开销
        - 需要接入 Kiteworks Gov Cloud；初始设置成本高
      - - 医疗服务方将 PHI 传给保险方
        - 加密邮件（常配置错误）或无 DLP 的 SFTP
        - 通过 totemo 加密邮件 + PCN 审计 + HIPAA 合规 DLP 检查
        - HIPAA BAA 覆盖；防止 PHI 泄露；OCR 审查可用统一审计
        - 需要集成 totemo；S/MIME 需要证书管理
      - - 金融服务公司向监管机构发送贷款文件
        - 邮件附带手动加密附件或 FTP
        - 安全文件共享门户，支持链接访问、过期和 DLP 水印
        - 消除不安全邮件附件；提供已读回执和过期机制
        - 外部监管机构必须通过 Kiteworks 门户访问（采用阻力）
      - - 国防承包商与供应链共享 CAD 文件
        - SharePoint 或 SFTP，合规控制很少
        - MFT 自动化，配 CMMC 2.0 合规日志；按 CUI 类别控制访问
        - 无需点状工具即可满足 CMMC 2.0 合规；评估可用统一审计
        - CMMC Level 3 实施复杂；需要 CUI 分类标记
      - - 企业发送含敏感财务数据的 RFP 回复
        - 邮件或 Dropbox（不合规）
        - 安全文件共享门户，支持过期、水印和访问跟踪
        - 敏感交易数据有完整审计轨迹；防止未经授权再分发
        - 无协同编辑功能；外部收件人需注册 Kiteworks 门户
      - - 开发者查询外部 API 获取受监管数据
        - 调用合作伙伴 API 的 REST 请求，加密不一致
        - Kiteworks API 数据交换叠加 PCN 治理；对 API 载荷自动 DLP
        - 程序化内容交换，带合规日志；执行数据驻留要求
        - SDK 生态有限；API 文档深度弱于以 API 为先的竞争对手
    claimRefs:
      - CE001
      - CE002
      - CE003
      - CE004
      - CE005
      - CE026
    notes: 工作流为示例，基于公开用例和客户案例研究。除非另有说明，收益来自公司主张或分析师推断。
  - id: TE003
    title: 技术 / 运营架构表
    columns:
      - 层 / 组件
      - 作用
      - 关键依赖
      - 风险
    rows:
      - - FedRAMP Gov Cloud 托管（AWS GovCloud）
        - 为美国政府部署提供合规基础设施
        - AWS GovCloud 可用性和 SLA；FedRAMP ATO 状态
        - 单一 IaaS 依赖；AWS GovCloud 故障会影响所有联邦客户
      - - 标准云托管（AWS/Azure）
        - 托管商业企业 SaaS 部署
        - AWS 和 Azure 多区域可用性
        - 多云敞口；若客户要求 Azure Gov，迁移复杂度上升
      - - FIPS 140-2 加密模块（OpenSSL 验证）
        - 加密 5 条 PCN 通道中所有静态和传输中数据
        - NIST/CMVP 验证周期；OpenSSL 维护者社区
        - 加密算法更新后需要重新通过 FIPS 验证（后量子迁移）
      - - totemo 邮件加密引擎（专有）
        - 提供 S/MIME 和基于门户的加密邮件
        - 收购后由 Kiteworks 维护 totemo 代码库
        - 收购后引擎路线图和人才风险；S/MIME 生态脆弱
      - - ownCloud 核心（AGPLv3）
        - 支撑 ownCloud/DRACOON 部署中的欧洲 SFSC 能力
        - AGPLv3 开源许可证；上游 ownCloud 社区
        - AGPLv3 copyleft 约束；变现限制；开源 fork 风险
      - - 合规报告数据库（专有）
        - 存储横跨 5 条 PCN 通道的统一审计轨迹
        - Kiteworks 内部开发团队；数据库扩展
        - 专有锁定（无标准导出）；高容量下性能扩展
      - - 身份集成（LDAP/AD/SAML/OIDC）
        - 为企业部署启用 SSO 和基于角色的访问控制
        - 客户 IdP 供应商（Okta、Azure AD、Ping Identity）
        - IdP 互操作性；升级时的版本兼容性
      - - DLP 连接器（Symantec、Forcepoint、ICAP）
        - 内容检查，用于防止敏感数据泄露
        - 第三方 DLP 供应商维护；ICAP 协议支持
        - 第三方 DLP 版本兼容性；内容检查延迟
      - - 3PAO FedRAMP 评估（KPMG / 承包商 TBD）
        - 年度 FedRAMP Moderate 再授权；FedRAMP High 进行中评估
        - 3PAO 评估方可用性和排期；NIST SP 800-53 控制覆盖
        - FedRAMP High 3PAO 评估延误风险；NIST Rev 5 新控制要求
    claimRefs:
      - CE007
      - CE008
      - CE009
      - CE010
      - CE011
      - CE012
      - CE013
    notes: 架构信息基于公开文档、FedRAMP 市场数据和技术评测网站。AWS GovCloud 托管是根据 FedRAMP 部 署要求推断，公开材料未明确确认。
