      - number: '6.2'
        title: 客户采用轨迹与增长证据
        blocks:
          - type: paragraph
            body: >
              Kiteworks 公开披露 3,650+ 企业客户和 100M+ 终端用户；对一家企业 SaaS 公司而言，这是可观的安装基础。客户数从约 2,000（2021 前、Accellion 时代）增长到
              3,650+（2025），意味着四年中有机净新增客户约 1,600+ 个——剔除收购后，约每年净增 400 个客户。ownCloud 和 DRACOON 收购带来欧洲订阅用户基础，可能贡献 200K+
              额外账户（主要是使用 ownCloud Community 和 Enterprise 版本的较小欧洲公司）。100M+ 终端用户数字是所有客户部署的加权汇总；该指标能证明平台规模，但不能直接说明收入质量，因为
              Kiteworks 按企业账户定价，而不是按终端用户定价。G2 上 400+ 条评价、平均 4.3/5，以及 Gartner Peer Insights 上 200+
              条评价、4.3/5，显示多个垂直行业的活跃用户群在使用该平台。SAM.gov 和 USASpending.gov 上的政府采购记录确认了多个联邦机构合同，包括 DoD、HHS
              和司法部门部署。负面采用信号包括：G2 评论提到企业 MFT 自动化实施复杂度为 5–10 天（高于更简单工具）；用户抱怨安全文件共享的外部收件人体验（需要登录门户）；Kiteworks Files iOS
              App Store 评分低于 4.0（3.8/5），落后于 Box（4.7/5）和 SharePoint（4.4/5）。这些 UX
              摩擦点可能限制商业细分市场采用，但对政府和受监管企业买方影响较小，因为合规深度高于便利性。
