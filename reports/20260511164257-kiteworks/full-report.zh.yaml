        - 联邦 SLA 违约超过合同补救期
        - 审查 MSA 赔偿条款；评估续约风险
      - - 定价跌破可持续 ASP 底线
        - 渠道伙伴 ASP 情报；群组定价数据
        - 连续 3 笔新企业交易 ASP 低于 $50K ACV
        - 评估竞争性定价压力；复核产品差异化能否守住
    claimRefs:
      - CR001
      - CR005
      - CR011
      - CR014
      - CR015
      - CR029
      - CR036
    notes: 终止标准定义为：若 90 天内未解决，就需要修订投资论点的事件。所有触发因素都可通过公开信息或合作伙伴情报来源监测。
  - id: TV001
    title: 建议摘要表
    columns:
      - 维度
      - 评估
    rows:
      - - 建议
        - 入场估值 <= $1.5B 时有条件 BUY；高于 $1.5B 则 TRACK
      - - 置信度
        - 中等 — ARR 和 NRR 未确认；FedRAMP High in-process 状态未确认
      - - 风险评级
        - 高 — 平台安全遗留、FedRAMP High 缺口、私有财务不透明
      - - 估值立场
        - 公允 — 5-8x ARR 落在 2025 市场区间；$1B EV 并非折价
      - - $1B 下的隐含 EV/ARR
        - $130M ARR 时 7.7x；$200M ARR 时 5.0x — 区间反映 ARR 不确定性
      - - 基准情景 EV (2027-2028)
        - 8-10x ARR 下为 $1.4B-$2.2B，年增长 15-20% 至 $170-180M ARR
      - - 牛市情景 EV (2028)
        - 12-15x ARR 下为 $2.5B-$3.5B，FedRAMP High 确认，ARR $220M+
      - - 熊市情景 EV
        - ARR 停滞、平台事件或倍数压缩下，5x ARR 对应 $500M-$1.0B
      - - 持有期
        - 3-5 年；通过战略收购退出（最可能）或 IPO（次选）
    claimRefs:
      - CV001
      - CV002
      - CV003
      - CV005
      - CV023
      - CV024
      - CV027
    notes: 建议对价格和证据都敏感，取决于六项尽调确认。$1.5B 的 BUY 阈值反映：在验证 ARR 达 $160M+ 时，基准回报约 1.5-2.0x。
  - id: TV002
    title: 论点 / 反论点表
    columns:
      - 投资论点
      - 反论点 — 哪些情况会改变判断
    rows:
      - - CMMC 2.0 执法推动 300,000+ 家 DIB 承包商需要符合 CMMC 的 MFT，为 Kiteworks 创造持久的合规拉动需求
        - CMMC 执法延迟到 2027 之后，或 DoD 放松要求，将削弱管线机会并放慢 ARR 增长
      - - FedRAMP High in-process 授权有望打开目前受 Moderate 限制的 DoD 和 IC 账户，联邦 ARR 机会可能增加 25-40%
        - FedRAMP High 授权被拒、延迟到 2028 之后，或另一家竞争对手先在 DoD 赞助下取得 High
      - - Insight Partners 和 Sixth Street 资本（$456M）提供 5+ 年跑道，可支持 M&A、联邦扩张和 FedRAMP High 投入，无需稀释性融资
        - 遗留 Accellion PE 结构的优先股包袱，或新股发行产生清算优先权，压低普通股回报
      - - 受监管垂直行业的 3,000+ 家企业客户带来高切换成本和经常性收入，意味着 NRR 可能高于 110%
        - NRR 低于 100% 将表明客户流失超过扩张，击穿 ARR 增长论点
      - - MFT 品类整合（GoAnywhere、MOVEit、ownCloud 被吸收）让 Kiteworks 成为独立的合规原生替代方案
        - OpenText 或 IBM Aspera 用捆绑定价在中端市场 ASP 上压价 Kiteworks，挤压利润率和 NRR
      - - Accellion FTA 产品已停用；Kiteworks 平台采用不同架构，并已运行 FedRAMP Moderate 8+ 年
        - Kiteworks 平台 CVE 若达到 CVSS >= 9.0 且在野被利用，将击穿品牌并抹去 FedRAMP 可信度
      - - 收购 ownCloud、DRACOON 和 totemo，扩大欧洲企业内容和电子邮件加密 TAM
        - 三项收购整合带来利润率拖累、被收购客群稀释 NRR，并增加管理层带宽风险
      - - 联邦 AI 治理市场正在形成：Kiteworks AI 治理功能让公司有机会切入 AI 模型风险管理新收入流
        - AI 治理收入仍处商业化前且带有投机性；变现时间线超过投资持有期
    claimRefs:
      - CV017
      - CV018
      - CV019
      - CV020
      - CV025
      - CV026
      - CV041
      - CV042
    notes: 八个论点支柱及对称的反论点条件。每个反论点都是可监测的论点修订触发因素。
  - id: TV003
    title: 牛市 / 基准 / 熊市情景表
    columns:
      - 情景
      - ARR 假设
      - 倍数
      - 隐含 EV
      - 关键假设
      - 下行触发因素
    rows:
      - - 牛市 (2028)
        - $220M-$240M
        - 12-15x
        - $2.6B-$3.6B
        - 2026 年确认 FedRAMP High；CMMC 执法加速；NRR >120%；行业倍数恢复至 12x+
        - FedRAMP High 延迟；行业倍数持续承压；NRR 低于 115%
      - - 基准 (2027-28)
        - $170M-$185M
        - 8-10x
        - $1.4B-$1.9B
        - ARR 增长 15-20%；2026-2027 年取得 FedRAMP High；NRR 110-115%；市场倍数稳定在 8-10x
        - ARR 增长放慢至 <12%；FedRAMP High 延迟；NRR 压缩至 108% 以下
      - - 熊市
        - $130M-$150M
        - 4-6x
        - $0.5B-$0.9B
        - ARR 停滞；FedRAMP High 延迟或被拒；平台安全事件；NRR 低于 100%；倍数压缩至 4-6x
        - 平台零日漏洞；FedRAMP 被拒；CMMC 延迟 >24 个月；CEO 离任
    claimRefs:
      - CV023
      - CV024
      - CV027
      - CV033
      - CV035
      - CV038
    notes: ARR 假设基于 GetLatka $130M 基准以及分析师 $130M-$200M 区间。基于 in-process 指定的时间线常态，FedRAMP High 到 2027 年的概率评估为 60-70%。
  - id: TV004
    title: 可比估值表
    enumerationScope:
      coverage: sample
      basis: >-
        Representative sample drawn from public company filings (Varonis FY2025, Progress FY2024), historical strategic
        acquisitions (Proofpoint 2021, Mimecast 2022), and analyst databases (CBInsights unicorn tracker, Pitchbook).
        Full enumeration limited by private company data availability in MFT and content security sector.
    columns:
      - 可比对象
      - 类型
      - 指标
      - 倍数 / 估值
      - 与 Kiteworks 的相关性
      - 局限
    rows:
      - - Varonis Systems (VRNS)
        - 上市公司 — 数据安全 SaaS
        - ARR ~$571M (FY2024)；FY2025 ARR ~$640M（估计）
        - ~8x 预期 ARR（NYSE 交易）
        - 最接近的上市可比：合规 SaaS、企业客户、联邦客户，SaaS 转型完成
        - 规模更大（$570M+ ARR，相比 Kiteworks ~$130-200M）；产品不同（DSPM 与 MFT）
      - - Progress Software / MOVEit (PRGS)
        - 上市公司 — MFT/企业软件
        - 收入 ~$745M (FY2024)
        - ~4x ARR（NASDAQ 交易）
        - MFT 品类直接可比；联邦客户；政府渠道
        - MOVEit 泄露后品牌受损；收入模式不同；永久授权 + SaaS 混合
      - - Proofpoint（Thoma Bravo PE 持有）
        - 历史收购 — 电子邮件 / 内容安全
        - 收购时 ARR ~$1.0B
        - ~10x ARR（$12.3B, 2021）
        - 内容安全平台在市场峰值倍数被 PE 收购；客户群邻近联邦
        - 2021 年份（峰值倍数时期）；以电子邮件为中心，不是 MFT；2025-2026 市场条件明显不同
      - - Mimecast（Permira PE 持有）
        - 历史收购 — 电子邮件安全
        - 收购时 ARR ~$0.6B
        - ~9-10x ARR（$5.8B, 2022）
        - 电子邮件安全与合规平台；企业垂直行业重叠；PE 收购可比
        - 以电子邮件为中心，不是 MFT；2022 年份；收购后倍数已压缩
      - - Kiteworks（当前轮次）
        - 私人成长股权轮
        - ARR ~$130M-$200M（估计）
        - 隐含 ARR ~5-8x（$1B+ EV，August 2024）
        - 直接参照：当前隐含估值；回报模型基线
        - ARR 未经审计且未确认；优先权结构未知；该轮距分析时已 18+ 个月
      - - SaaS 网络安全同业中位数 (2025-2026)
        - 分析师基准 — Livmo/Acquiry 2026 数据
        - 20%+ 增长群组中位数
        - 6-9x ARR（2025-2026 市场）
        - 当前市场条件下高增长网络安全 SaaS 的市场基准
        - 聚合基准；不是单一公司可比；反映市场区间，而非特定同业
    claimRefs:
      - CV009
      - CV010
      - CV011
      - CV012
      - CV030
      - CV037
      - CV038
    notes: 样本集是可获得信息中最相关的组合。Proofpoint 和 Mimecast 倍数处于峰值市场（2021-2022），在当前条件下应折价 30-40%。完整列举受私有交易数据限制。
  - id: TV005
    title: 论点失效与退出触发因素表
    columns:
      - 触发因素
      - 阈值 / 可观察事件
      - 行动含义
    rows:
      - - FedRAMP High 被拒或延迟
        - 投资后 36 个月内未取得 FedRAMP High 授权，或被 PMO 赞助方拒绝
        - 下调联邦收入 TAM 假设；将 EV 修订为熊市情景；考虑折价退出或二级出售
      - - Kiteworks 平台零日漏洞
        - CISA KEV 列名，或 NVD 将 CVSS >= 9.0 的 CVE 归因于 Kiteworks 平台（非遗留 FTA）
        - 立即复核投资论点；评估联邦客户流失风险；比较品牌修复时间线与退出成本
      - - ARR 停滞在 $150M 以下
        - 管理层或第三方数据确认连续两个季度 ARR 同比增长低于 8%
        - 将基准情景修订为熊市；重新评估持有；分析竞争替代驱动因素
      - - NRR 确认低于 100%
        - 管理层披露有机群组 NRR 或 GRR 低于 100%
        - 论点失效：净流失无法支撑增长论点；启动退出流程或二级出售
      - - CEO 或 CRO 离任且未指定继任者
        - Patrick Spence 离任或 CRO 离任后 60 天内未指定继任者
        - 加速管理层尽调；要求董事会治理资料包；评估持有还是退出
    claimRefs:
      - CV018
      - CV026
      - CV042
      - CV025
      - CV023
    notes: 触发因素按严重性排序。FedRAMP High 被拒和平台零日漏洞严重性最高。所有触发因素都可通过公开来源、管理层报告或合作伙伴情报监测。
  - id: TV006
    title: 最终尽调要求表
    columns:
      - 主题
      - 缺失证据
      - 重要性
      - 尽调路径
    rows:
      - - 经审计 ARR
        - 没有公开可得的经审计 ARR、收入明细表或 ARR 群组瀑布；GetLatka $130M 是唯一代理指标
        - 整个估值论点取决于 ARR 准确性；30% ARR 误差会使 EV/ARR 倍数偏移 1.5-2x
        - 要求在 NDA 下提供经审计或管理层确认的 ARR 明细，并拆分有机与收购群组
      - - 净收入留存
        - NRR 和 GRR 未披露；没有按垂直行业或收购年份划分的群组数据
        - NRR 决定可持续 ARR 增长底线；低于 110% 会把 $1.5B 入场价下的基准回报压缩至 <1.5x
        - 要求提供过去 12 个月 NRR 和 GRR，按群组拆分（有机、ownCloud、DRACOON、totemo 收购）
      - - 资本结构表
        - 优先股结构、清算瀑布、期权池和二级股份可得性没有公开信息
        - 遗留 Accellion PE 结构或 2024 轮条款带来的优先权包袱，可能使普通股回报居后
        - 要求完整股本结构表和优先权瀑布明细；评估清算优先权与 $1.5B 入场估值的关系
      - - FedRAMP High 授权
        - FedRAMP High in-process 指定已确认，但目标授权日期和 PMO 赞助方身份未公开确认
        - FedRAMP High 是最大单一估值催化剂；若延迟到 2027 之后，牛市情景将坍塌
        - 联系 FedRAMP PMO 核实 in-process 状态和目标日期；向公司索取授权材料包
      - - 管理层接触
        - 没有 Kiteworks CEO 或 CFO 访谈、业绩会或投资者日文字记录公开可得
        - 如果没有直接管理层 Q&A，联邦战略、ARR 指引和 M&A 整合逻辑都无法验证
        - 在投资条款清单前要求管理层路演、CEO 一对一会议和 CFO 财务审查会议
      - - 客户集中度
        - 没有公开披露客户集中度数据；前 10 大客户 ARR 占比未知
        - 单一客户若超过 ARR 的 15%，会带来集中度风险，可能损害估值和退出可选性
        - 要求客户集中度明细：按 ARR、垂直行业、合同期限和续约概率列示前 10 大客户
    claimRefs:
      - CV003
      - CV004
      - CV034
      - CV029
      - CV031
      - CV040
    notes: 六项尽调都是投资前标准确认事项。至少在经审计 ARR 和 NRR 确认之前，无法负责任地作出投资决定。
