  - number: 7
    title: 风险
    sections:
      - number: '7.1'
        title: 监管与法律风险
        blocks:
          - type: paragraph
            body: >-
              Kiteworks 运行在分层的联邦监管框架之下，这同时制造市场准入要求和责任敞口。最具战略约束力的是 FedRAMP 授权：Kiteworks 持有 FedRAMP Moderate 授权（在 FedRAMP
              marketplace 上确认为 FRN1600185），因此可向 Moderate 影响级别的民用联邦机构销售。FedRAMP High 授权是 DoD、IC 以及处理高影响级 Controlled
              Unclassified Information 的机构所必需，但尚未公开确认；在取得 High 之前，敏感联邦账户存在收入天花板。该流程通常需要 12-24 个月，要求 DoD
              机构赞助方、大量文档和独立评估。Kiteworks 在新闻稿材料中营销 DoD IL4 授权，但截至 May 2026，所引用 URL 返回 404，限制了独立验证。

              CMMC 2.0 的最终规则在 October 2024 发布，要求处理 CUI 的 Defense Industrial Base 承包商取得 CMMC Level 2 认证。Kiteworks 作为定位合规的
              MFT 平台受益于该 mandate，但执法时间线变化会制造客户预算不确定性。所有使用 Kiteworks 传输或存储 PHI 的医疗客户都适用 HIPAA 义务；Kiteworks 必须签署 Business
              Associate Agreements（BAA），而 HHS OCR 罚款可达每个违规类别每年 $1.9M。

              诉讼风险来自 Accellion FTA 时代。法院记录显示，Prescient Data Management LLC v. Kiteworks Inc. 曾作为集体诉讼提起；Reuters
              报道称，September 2021 达成 $8.1M 和解。虽然 FTA 产品已停用，未来安全诉讼中仍存在继承责任敞口。Export Administration Regulations（EAR）适用于
              ECCN 5E002 下的 Kiteworks 加密软件，部分国际销售需要许可例外，为全球扩张增加合规开销。
