      - number: '8.6'
        title: 附录要点
        blocks:
          - type: callout
            title: 入场估值在 $1.5B 或以下时有条件 BUY
            body: >-
              Kiteworks 投资案例是证据有条件，而不是论点有条件。CMMC 2.0、FedRAMP High 和 MFT 整合催化剂在结构上有吸引力，但承诺投资前必须取得六项尽调确认：经审计
              ARR、NRR、股本表、FedRAMP High 授权包、管理层接触和客户集中度。在至少解决经审计 ARR 和 NRR 之前，不应发出投资条款清单。入场估值高于 $1.5B 时，基准情景回报压缩到 2x
              以下，建议为 TRACK。
            calloutType: recommendation
            claimRefs:
              - CV024
              - CV028
              - CV039
              - CV040
          - type: callout
            title: ARR 估算尚未确认——整个估值论点建立在未经审计数据上
            body: >-
              $130M-$200M ARR 区间完全来自 GetLatka 估算和分析师聚合器。GetLatka 对私营公司的估算经常偏离 20-40%。如果向下修正 30% 至 $91M-$140M ARR，隐含
              EV/ARR 将从 5-8x 变为 7-11x，使 $1.0B+ 估值显得昂贵。任何投资决策前，单一最重要的尽调项是经审计或管理层确认的 ARR。
            calloutType: risk
