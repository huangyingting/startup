      - number: '6.4'
        title: 留存、扩张与集中度风险
        blocks:
          - type: paragraph
            body: >
              Kiteworks 未公开披露客户留存和扩张指标。留存的结构性决定因素很强：如果 FedRAMP 和 CMMC 合规客户更换供应商，就要重新做监管流程认证、重新集成合规工作流，并重新培训员工，估计切换成本为
              $100K–$500K+（大型部署）。政府多年期合同（IDIQ、BPA）把收入在合同上锁定 2–5 年，降低自愿流失风险。Accellion 时代客户在 FTA
              泄露和更名期间的留存率——即便发生泄露，公司仍保住多数企业账户——说明即使在不利情景下，由高切换成本驱动的留存也很强。先落地再扩张的动态有利：客户通常从一个 PCN 渠道（MFT
              或文件共享）开始，随着合规要求增加，再扩展到更多渠道。以 CMMC 2.0 mandate 为例，DIB 客户扩大合规面时，会增加 MFT、邮件加密和 Web 表单。客户集中度风险是一个重要未知数：$130M
              ARR 分布在 3,650+ 客户上，平均 ACV 约 $35K——但分布很可能是双峰，少数大型政府合同贡献了不成比例的收入。如果前 10 大客户占 ARR 的
              >30%，单一合同流失或不续约就可能显著影响季度收入。公开来源无法量化该集中度风险，这是客户尽调中的关键问题。
