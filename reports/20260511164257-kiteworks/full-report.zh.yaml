      - number: '5.4'
        title: 产品路线图与开发阶段
        blocks:
          - type: paragraph
            body: >
              Kiteworks 面向 2025–2026 公开沟通的路线图聚焦三条主线：（1）AI 治理——Kiteworks 在 late 2024 宣布生成式 AI 治理能力，把发往 AI 模型或从 AI
              模型接收的敏感内容（ChatGPT、Copilot 等）拦截、记录并控制，作为新的 PCN 渠道；（2）FedRAMP High 完成——early 2025 投资人沟通中，3PAO
              评估被描述为“处于高级阶段”；（3）ownCloud/DRACOON 整合——把 EMEA 产品栈并入 Kiteworks 核心治理层。AI 治理产品回应了真实的新兴买方需求（受监管企业需要控制员工粘贴到 AI
              工具里的数据），也让 Kiteworks 在处理 AI 时代数据治理问题上领先于多数合规 SaaS 竞争者。这可能把 PCN 品类从文件传输合规扩展到更广的 AI 数据治理，从而扩大 TAM。ownCloud
              整合在技术上复杂，因为 AGPLv3 许可约束：Kiteworks 不能在不开放专有代码的情况下，将 AGPLv3 代码与专有代码混合分发，因此必须谨慎做架构隔离。这会增加持续工程开销，并限制 EMEA
              产品整合速度。截至 2025，totemo 邮件引擎已较好接入（产品文档显示，统一审计轨迹覆盖邮件和 MFT 渠道）。FedRAMP High 认证如果在 2025 完成，将解锁涉密网络部署——这是 DoD/IC
              市场中的一块大型增量收入机会。
