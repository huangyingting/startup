      - number: '7.5'
        title: 财务与模型风险
        blocks:
          - type: paragraph
            body: >-
              Kiteworks 是一家私营公司，没有经审计的公开财务数据。第三方 ARR 估算约为 $100M，但未经验证。私有所有权结构意味着 Sixth Street 和 Insight Partners
              的公开市场流动性有限；退出路径是 IPO、战略收购或二级交易，取决于持续 ARR 增长和联邦合同基础。收入集中在美国联邦采购中，带来预算周期风险：临时拨款决议会限制新合同授予，长期拨款延迟可在每个 CR
              期间推迟联邦 ARR 扩张 6-12 个月。

              OpenText（Hightail/Carbonite 收购）、IBM Aspera 和开源 MFT 替代品的定价压力，会压缩中端市场 ASP。MFT 市场整合——OpenText、Fortra、Progress
              吸收 MFT 点解决方案——意味着如果 ARR 增长停滞，公司可能面临被折价非邀约收购的风险。没有公开验证的 NRR 和总留存指标，就无法确认队列经济性是否支撑当前 ARR
              轨迹下的投资论点。缺少审计财务数据是结构性尽调缺口。
