      - number: '1.2'
        title: 领导层、治理与关键人员
        blocks:
          - type: paragraph
            body: >-
              截至 2026，Jonathan Yaron 担任 Kiteworks 董事长兼 CEO；他于 2015 加入公司，最初担任顾问和董事长，随后在关键转型期接手运营控制。在 Yaron 领导下，Kiteworks
              从陷入困境的传统文件传输公司，转型为服务全球数千家受监管企业的盈利、高增长网络安全平台。Tim Freestone 担任首席营销官，负责公司在内容安全领域的信息传递和品牌定位。Yaron Galant
              担任首席产品官，负责 PCN 平台的产品战略和路线图。Frank Balonis 担任运营高级副总裁兼 CISO，负责公司自身安全态势。Michael Lee 担任财务高级副总裁，管理公司财务运营。Camilo
              Artiga-Purcell 是总法律顾问。Dario Perfettibile 以 VP & GM 身份领导欧洲运营。作为 August 2024 成长型股权融资的一部分，Insight Partners 和
              Sixth Street Growth 向 Kiteworks 董事会派驻代表，与现有管理团队共同提供治理监督。公司领导层地域分布较广，包括 Israeli 技术创始人与管理层、美国本土高管团队，以及负责
              EMEA 区域的欧洲运营管理层。
