companyProfile:
  summary: >
    Kiteworks（前身为 Accellion）是一家位于 San Mateo, California 的网络安全公司，成立于 1999，由董事长兼 CEO Jonathan Yaron（自 2015 起）领导。其传统 File
    Transfer Appliance (FTA) 产品在 December 2020 至 February 2021 之间遭 FIN11/CLOP 勒索软件组织利用一系列零日漏洞攻击，影响全球 100+ 个组织和约 9.2
    million 名个人；之后 Accellion 于 October 2021 更名为 Kiteworks，并推出 Private Content Network (PCN)。该平台经过现代化改造，获得 FedRAMP
    Moderate 授权，把托管文件传输、邮件保护、安全文件共享、安全表单和 eSignature 能力统一在一起。August 2024，Kiteworks 从 Insight Partners 和 Sixth Street
    Growth 获得 $456M 成长型股权融资，投后估值超过 $1 billion，成为合规内容通信领域的头部独角兽。公司披露 ARR 为 $130M+（截至 early 2025，第三方分析师口径）、员工约 365 人（March
    2026），在国防、医疗、金融服务和政府等垂直领域拥有 3,650+ 家企业与政府客户。Kiteworks 持有 FedRAMP Moderate 授权（since 2017），截至 February 2025 的 FedRAMP
    High 状态为 In Process。三笔收购——totemo AG（January 2022，邮件加密，Switzerland）、ownCloud GmbH（November 2023，企业文件共享，Germany）和
    DRACOON GmbH（November 2023，云内容管理，Germany）——扩大了 Kiteworks 在欧洲的覆盖和邮件安全能力。
