            body: >
              Kiteworks 的客户证据主要来自 G2 和 Gartner Peer Insights 评论（评论者会标明行业和公司规模）、kiteworks.com
              官方案例研究、政府采购记录和新闻稿引用。出于分级和安全原因，公司通常不点名具体政府客户，但采购记录确认了生产部署。公开材料中提到的具名商业客户包括：AstraZeneca（制药，案例研究中引用）、Leidos（国防承包商，在
