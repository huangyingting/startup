      - number: '7.4'
        title: 人员与执行风险
        blocks:
          - type: paragraph
            body: >-
              CEO Hemi Zucker 代表关键人物集中风险。Zucker 主导了从 Accellion 到 Kiteworks 的品牌转向、2021 PE 资本重组，以及联邦 GTM 搭建。截至 May
              2026，未公开发现继任计划或二号高管。若 Zucker 离开，会扰乱战略方向和联邦客户关系。CRO 和 CPO 角色同样公开度不足，限制了对高管梯队深度的可见度。

              网络安全人才结构性稀缺：Gartner 估计，2024 年美国网络安全劳动力缺口超过 700,000 个未填补职位。Kiteworks 要与 Microsoft、CrowdStrike
              和资金充足的初创公司争夺具备 FedRAMP、zero-trust 和安全内容管理经验的工程师。政府安全许可要求进一步收窄招聘池。FedRAMP ISSO 人员尤其稀缺；合规工程职能若出现人员流失，可能危及
              ATO 连续性。从约 3,500 家企业客户继续扩张销售，需要 CISO 级关系、CMMC 专业销售工程师和政府合同专长。销售团队快速扩张会提高销售指标达成风险。
            claimRefs:
