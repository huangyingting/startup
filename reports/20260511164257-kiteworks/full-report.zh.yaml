      - number: '4.2'
        title: 单位经济与效率代理指标
        blocks:
          - type: paragraph
            body: >
              Kiteworks 的单位经济未公开披露。基于可得代理指标，本报告构建了部分有证据支持的图景。每全职员工 ARR（约 $391K，依据 GetLatka ARR 和员工数估算）与企业 SaaS
              同行相比表现良好——Veeva Systems 和 Proofpoint 在可比增长阶段也处于类似 ARR/employee 水平。SaaS 组成部分的毛利率估计为 70–75%（企业合规 SaaS
              的行业基准），混合毛利率（包括约 30–40% 利润率的专业服务和约 60% 利润率的传统永久许可）可能在 65–72% 区间。客户获取成本（CAC）未披露；企业安全 SaaS 通常需要 12–18 个月 CAC
              回收期，政府账户因多年合同结构，CAC 回收期更短。考虑交易规模和合规复杂度，公司销售模式看起来以直接企业销售为主（现场销售 +
              政府渠道伙伴）。净收入留存（NRR）未披露；对一家具有强切换成本和多年合同的企业合规平台而言，110–125% 的 NRR 较为典型（同行基准：Veeva 120%+、Proofpoint
              110%+）。年度合同价值分布估计为标准企业客户中位数 $75K–$150K，政府账户偏高。3,650+ 客户数和约 $130M ARR 意味着平均每客户 ARR 约 $35K——这与近 SME 客户（约
              $15K ACV）和大型企业 / 政府账户（$150K–$2M+ ACV）混合相符。收购整合成本（ownCloud/DRACOON/totemo）可能在 2023–2024 协同兑现前压低毛利率和 EBITDA
              利润率。
