      - number: '8.3'
        title: 牛市、基准与熊市情景
        blocks:
          - type: paragraph
            body: >-
              估值情景锚定三组 ARR 与倍数组合，覆盖现有证据下的合理区间。牛市情景（2028 年 $2.5B-$3.5B）要求 FedRAMP High 授权在 2026 年确认，ARR 以每年 25%+ 增速增长到
              $220M+，NRR 高于 120%，且高增长、政府聚焦平台的行业倍数恢复到 12-15x。Deloitte 2025 网络安全市场报告支持到 2027 年总市场规模 $240B，与该轨迹下的可寻址需求一致。

              基准情景（2027-2028 年 $1.4B-$2.2B）要求 ARR 以每年 15-20% 增长至 $170M-$180M，确认 FedRAMP High，NRR 为 110-115%，倍数为 8-10x
              ARR。在当前市场条件下可以实现，也与 Varonis SaaS 转型后倍数在 2023-2025 年从 5x 扩张到 8x 的轨迹一致。

              熊市情景（$500M-$1.0B）由以下任意组合触发：FedRAMP High 授权延迟到 2027 年之后、Kiteworks 平台安全事件、ARR 停滞在 $150M 以下、NRR 低于
              100%，或行业倍数压缩到 5x ARR 以下。SecurityWeek 对 Accellion 和解的报道确认，不利事件可显著重置私营公司估值预期，无论战略定位如何。

              监控触发点——FedRAMP High 被拒、ARR 停滞、平台零日、CMMC 执法延误和领导层离职——都可从公开来源观察，任何持仓投资者都应按季度跟踪。
