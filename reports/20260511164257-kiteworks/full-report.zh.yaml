      - number: '8.5'
        title: 建议与最终尽调
        blocks:
          - type: paragraph
            body: >-
              投资建议是在入场估值不高于 $1.5B 时有条件 BUY，并取决于六项强制尽调确认：（1）与 CEO 和 CFO 的管理层接触和问答会，（2）经审计或管理层确认 ARR 高于 $160M，（3）确认 NRR 高于
              110%，（4）股本表审查，包括优先股结构和清算瀑布，（5）FedRAMP PMO 赞助方确认 FedRAMP High 授权包和目标授权日期，（6）客户集中度分析显示没有单一客户超过 ARR 的 15%。

              置信度为 medium，风险评级为 high。按当前隐含水平，估值立场是合理，上行可选性与 FedRAMP High 确认和 CMMC 2.0 执法加速绑定。Insight Partners 和 Sixth
              Street 的投资人背景是正面信号：两家公司都有退出纪律和公开市场准备的记录。Sixth Street 公告确认了超过 $1B 估值的 $456M 轮次。

              入场估值高于 $1.5B 时，建议为 TRACK：更高入场价下，基准情景回报压缩到 2x 以下；除非有额外证据确认 ARR 高于 $180M、NRR 高于 115%，否则风险调整后回报不具吸引力。投资 KPI
              评分确认，市场（4/5）、护城河（4/5）和产品证据（3/5）支撑论点，但证据质量（2/5）和财务透明度（2/5）限制确信度，直到尽调缺口关闭。
            claimRefs:
