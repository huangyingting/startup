        - $50K–$300K
        - 可服务市场大；合规支出高
        - 该垂直公开点名案例有限；竞争对手（OpenText/Zix）在中端金融服务市场强势
      - - 医疗健康 / 生命科学
        - CISO、HIM 总监、隐私官
