  - id: FE002
    title: 客户工作流 / 运营流程
    type: flow
    layout: standard
    summary: 受监管企业用户（如政府承包商）如何通过 Kiteworks PCN 发送敏感文件，并完整捕获合规记录。
    data:
      nodes:
        - id: sender
          label: 企业用户 / 承包商
          detail: 发起传输：通过 Web 门户、SFTP 客户端或 API 调用上传
          type: input
        - id: policy
          label: PCN 策略引擎
          detail: 执行 DLP 扫描、访问控制检查、加密策略和收件人验证
          type: process
        - id: encrypt
          label: FIPS 140-2 加密
          detail: 传输前在内容层应用 AES-256 加密；传输中使用 TLS 1.3
          type: process
        - id: channel
          label: PCN 通道选择
          detail: 根据发送方场景，经由 MFT（SFTP/AS2）、文件共享门户、加密电子邮件或 API 路由
          type: process
        - id: audit
          label: 合规审计引擎
          detail: 创建不可变日志条目：时间戳、发送方、收件人、通道、加密状态、DLP 结果
          type: process
        - id: recipient
          label: 外部收件人
          detail: 通过安全链接、S/MIME 电子邮件、SFTP 拉取或 API 接收文件——强制执行身份认证
          type: output
        - id: report
          label: 合规报告
          detail: 完整审计轨迹可用于 FedRAMP 持续监控、CMMC 评估或 HIPAA OCR 审查
          type: output
    approximationNotes: 工作流基于 Kiteworks 官方产品文档和平台架构说明。具体 DLP 行为取决于客户配置。
