            body: >-
              ownCloud 和 DRACOON 收购增加了 300K+ 欧洲订阅账户。然而，这些客户采用不同定价模式（ownCloud 订阅 vs. Kiteworks SaaS），相较有机 Kiteworks 客户基础的
