      - number: '1.4'
        title: 规模、指标与商业模式
        blocks:
          - type: paragraph
            body: >-
              Kiteworks 采用订阅 SaaS 模式，未单独披露专业服务收入，因此 ARR 与总收入高度接近。截至 early 2025，公司披露 ARR 超过
              $130M，增长来自新客户获取、更多合规模块的追加销售，以及欧洲地域扩张。截至 March 2026，公司约有 365 名员工，高于 early 2025 的约 332 人，约为 10% year-on-year
              员工增长。公司服务 3,650+ 家企业与政府客户，覆盖受监管行业，平台保护超过 100 million 名终端用户。Kiteworks
              的商业模式靠按席位或按连接器的订阅授权变现，定价层级与合规要求和部署模式（本地部署、私有云、混合部署或 FedRAMP Gov Cloud）挂钩。公司的收购策略瞄准 ARR 在 $5M 至 $60M
              之间的订阅型业务，管理层表示看好每年执行多笔交易，以扩大平台和地域覆盖。非内生增长层补充了有机 ARR 增长，也拓宽了可服务市场。关键指标仍未公开，包括净收入留存、毛利率和流失率，这些都是尽调中的重大证据缺口。
