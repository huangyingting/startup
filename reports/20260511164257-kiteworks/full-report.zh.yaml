      - number: '3.5'
        title: 图表与要点
        blocks:
          - type: callout
            title: Progress MOVEit 和 Fortra GoAnywhere 泄露创造替代顺风
            body: >-
              June 2023 的 Progress MOVEit 大规模利用（影响数千个组织）和 January 2023 的 Fortra GoAnywhere 零日漏洞——两者均被归因于 CLOP——实质性损害了
              Kiteworks 两个主要 MFT 竞争对手，并加速竞争性替代评估。竞争对手的负面事件在 2023–2024 销售周期中为 Kiteworks 创造了直接顺风。
            calloutType: strength
            claimRefs:
              - CP005
              - CP006
              - CP029
          - type: callout
            title: Kiteworks 的 Accellion FTA 历史是竞争负债
            body: >-
              先前利用 Accellion FTA 的，正是攻破 MOVEit 和 GoAnywhere 的同一个 CLOP 组织。Kiteworks 的传统 FTA 泄露经常在竞争性 RFP
              中被提起，作为排除因素，尤其是在会对供应商安全背景做深度检查的 IC 和 DoD 账户中。
            calloutType: risk
            claimRefs:
              - CP030
              - CP031
          - type: callout
            title: Microsoft 的 M365 捆绑是商业定价的最大结构性约束
            body: >-
              Microsoft SharePoint/OneDrive 是部署最广的现状替代方案，增量成本为零。Kiteworks 必须通过证明 M365 单独无法交付的合规深度来赢得商业交易——随着 Microsoft
              添加 GCC High 功能，该价值主张在商业细分中会变窄，但在政府和受监管企业中仍然强劲。
            calloutType: insight
