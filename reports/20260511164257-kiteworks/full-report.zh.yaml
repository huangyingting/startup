      - number: '7.2'
        title: 运营与安全风险
        blocks:
          - type: paragraph
            body: >-
              最高严重度的运营风险，是 Kiteworks 暴露在 MFT 威胁类别之中。CISA Advisory AA21-055A 记录显示，Accellion FTA 曾被 FIN11/CLOP 利用四个零日
              CVE（CVE-2021-27101 至 CVE-2021-27104）攻击，影响约 300 个组织。Kiteworks 明确退役了 FTA 产品，并将现平台营销为不同架构；但截至 May
              2026，尚未发现独立公开安全审计确认这种分离。

              MFT 品类仍承受持续对抗压力。MOVEit Transfer（Progress Software）在 May-June 2023 遭遇被 CLOP 利用的关键零日漏洞（CVE-2023-34362），Wired
              报道称全球超过 2,500 个组织受影响。GoAnywhere MFT（Fortra）在 early 2023 遭遇归因于 CLOP 的零日漏洞，影响 130+
              个组织。这些事件验证了品类级威胁：无论单个供应商架构如何，CLOP/FIN11 都会系统性瞄准 MFT 平台，把它们当作高价值数据外泄通道。每次 MFT 行业泄露都会给 Kiteworks
              带来声誉外溢风险。CISA Known Exploited Vulnerabilities 目录追踪多个供应商的 MFT 平台 CVE；仅靠公开研究，无法独立验证 KEV 目录中当前没有 Kiteworks
              CVE。

              对需要 99.99%+ SLA 承诺的政府客户而言，运营可用性风险具有实质性。如果文件内容没有与推理模型流水线妥善隔离，AI
              内容检查功能会制造新的数据处理风险。开源组件依赖（OpenSSL、文件解析库）要求快速补丁管理，才能维持 FedRAMP 合规 SLA。
