      - number: '3.3'
        title: 定价、打包与 go-to-market 对比
        blocks:
          - type: paragraph
            body: >
              Kiteworks 主要通过订阅 SaaS 模式竞争，定价基于用户数、连接器数量和部署模式（云、本地、混合或 FedRAMP Gov Cloud）。Kiteworks
              不公开发布标价，但第三方数据库和经销商显示，小型部署入门价格通常为每年 $30K–$50K。需要完整平台能力的组织，企业交易通常超过每年 $100K–$500K。Progress MOVEit
              对本地部署采用永久许可加维护模式，对云采用订阅模式；较小层级的 MOVEit Transfer 公开定价约为每年 $5K–$50K。Axway AMPLIFY MFT 定价通常只通过企业合同，较大部署交易常在
              $100K–$500K 区间。IBM Sterling 定价不透明、直接协商，大型金融服务部署通常在 $200K–$1M+ 区间。Fortra GoAnywhere MFT 定价最透明，基础产品起价约每年
              $4K，是成本最低的企业 MFT 替代方案。Box Business 起价 $15/user/month，竞争维度是用户数而非 MFT 工作流水平。Microsoft SharePoint 包含在 M365
              Business 计划中，价格为 $22/user/month，作为增量项目实际免费。Kiteworks 的定价纪律形成高端定位：其收费为 Fortra 入门价的
              2x–5x，因此销售时必须清楚证明合规价值。公司的 FedRAMP Gov Cloud 溢价通常比标准 SaaS 定价高 20–30%，以反映合规基础设施开销。
