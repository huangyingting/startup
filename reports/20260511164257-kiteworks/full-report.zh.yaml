      - number: '5.2'
        title: 技术架构与运营模式
        blocks:
          - type: paragraph
            body: >
              Kiteworks 的技术架构以一台加固型虚拟设备为中心：它是一台基于 Linux 的 VM，由客户部署在自有云环境（AWS、Azure 或本地）中，或部署在 Kiteworks 托管的 FedRAMP Gov
              Cloud（托管于 AWS GovCloud）中。设备模式意味着：（a）客户数据在客户自有云边界内完成静态和传输加密；（b）Kiteworks 运营团队不能直接访问客户数据（这是 FedRAMP High
              和涉密环境的关键要求）；（c）每个客户部署在逻辑上相互隔离。加密使用 FIPS 140-2 验证的密码模块（静态数据用 AES-256，传输数据用 TLS 1.3）。平台通过 LDAP/Active
              Directory、SAML 2.0 和 OpenID Connect 接入身份提供商，实现 SSO。内容层集成包括 SIEM（Splunk、IBM
              QRadar）、DLP（Symantec、Forcepoint、ICAP）、端点防护和业务应用（Microsoft 365、Salesforce、ServiceNow）。MFT
              引擎支持所有主流文件传输协议：SFTP、FTPS、FTPS、HTTPS、AS2、OFTP2 和 NFS。邮件加密引擎（totemo）作为独立设备运行，并接入 PCN 治理层，支持
              S/MIME、OpenPGP，以及面向无法收邮件的收件人的专有安全门户投递模式。ownCloud 组件（EMEA 部署）使用 ownCloud core（AGPLv3），外层包入 Kiteworks
              的企业许可和治理覆盖层。关键技术依赖包括用于 FedRAMP 部署的 AWS GovCloud、Kiteworks 自研合规报告数据库（专有）和 totemo
              邮件引擎（专有）。该架构没有有意义的开源社区存在感；所有平台代码要么是专有代码，要么构建在授权开源组件之上（ownCloud AGPLv3、Linux kernel、OpenSSL）。
