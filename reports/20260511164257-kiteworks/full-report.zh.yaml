              $130M ARR 分布在 3,650+ 客户上，约 $35K 的平均 ACV 掩盖了很可能存在的双峰分布：少数大型政府 IDIQ 合同贡献了不成比例的收入。如果前 5 大账户占 ARR 的
              >15–20%，单个不续约或政府预算削减都可能显著影响季度收入。这是优先级最高的客户尽调问题。
