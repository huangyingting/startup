  - number: 5
    title: 产品与技术
    sections:
      - number: '5.1'
        title: 产品定义与通道架构
        blocks:
          - type: paragraph
            body: >
              Kiteworks 将核心产品定义为 Private Content Network（PCN），这是它自造的术语，用来概括把过去割裂的敏感内容通信渠道收拢到一个受治理控制的平台。五个 PCN
              渠道分别是：（1）Managed File Transfer（MFT）——面向企业的 SFTP、FTPS、FTPS、AS2 和 HTTPS 自动化文件传输，支持调度、事件触发和合规日志；（2）Secure
              File Sharing（SFSC）——基于 Web 和移动端的文件共享，带细粒度访问控制、到期设置和水印；（3）Encrypted Email——通过 totemo 引擎端到端加密投递邮件，支持
              S/MIME，以及面向大附件的专有门户投递；（4）Secure Web Forms——面向政府门户和受监管行业采集流程的加密数据收集表单；（5）API Data Exchange——用于与外部方程序化交换内容的
              REST API，并接入内容检查和 DLP。五个渠道都汇入同一套合规与审计引擎，生成统一的内容追踪记录（谁在何时、通过哪个渠道、用何种加密，把什么发给了谁），用于监管报告。平台以加固型虚拟设备交付（不是多租户
              SaaS），这简化了合规认证和数据驻留，但部署开销高于标准云 SaaS。“加固型虚拟设备”模式早于 Kiteworks 更名，延续 Accellion 最初企业文件传输产品架构——这种设计保证数据永不经过
              Kiteworks 自有基础设施，但也带来部署复杂度和客户自管升级义务。
            claimRefs:
              - CE001
              - CE002
              - CE003
              - CE004
              - CE005
              - CE006
