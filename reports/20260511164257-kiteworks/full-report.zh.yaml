      - number: '5.3'
        title: 信任、安全、合规与质量控制
        blocks:
          - type: paragraph
            body: >
              Kiteworks 的信任姿态是核心差异点，也是受监管行业客户选择该平台的主要原因。当前合规认证组合包括：FedRAMP Moderate（已授权，在 FedRAMP Marketplace
              中处于有效状态）；FedRAMP High（In Process——截至 early 2025，3PAO 评估正在进行）；CMMC 2.0（Level 3 就绪，通过验证配置认证）；HIPAA（可提供
              BAA，并由多个医疗客户部署验证）；SOC 2 Type II（年度报告可在 NDA 下提供）；ISO 27001（已认证）；IRAP（澳大利亚政府评估完成，可部署在政府涉密网络）；以及 ITAR/EAR
              合规能力。FedRAMP Moderate 授权覆盖 Kiteworks 标准云平台（托管在 AWS）；FedRAMP High In Process 认证将覆盖涉密 DoD
              环境所需的增强型气隙部署模式。平台安全架构包括：单租户（客户之间无共享基础设施）、涉密环境气隙能力、通过 DLP 连接器做内容检查、敏感文档水印，以及所有内容交换的不可变审计日志。Accellion FTA
              泄露事件（2021）影响的是遗留 FTA 产品，不是当前 Kiteworks 平台；泄露由基于 Perl 的遗留代码库中的零日漏洞引发，该代码库已退役。截至 May
              2026，当前平台没有公开披露的重大等级安全漏洞。Kiteworks 未公开宣布漏洞赏金计划；公司依赖 3PAO FedRAMP
              评估周期做定期渗透测试。相较运行公开漏洞赏金计划的同行（HackerOne、Bugcrowd），这留下一个缺口；后者能带来持续的外部安全审视。
