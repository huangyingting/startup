        - 符合 GDPR 的文件共享、BSI C5 认证数据驻留
        - EUR 15K–100K
        - 地域多元化；EU 数据驻留护城河
        - 被收购资产 NRR 未知；ownCloud 变现模式不同于 Kiteworks SaaS
      - - 法律 / 专业服务
        - IT 总监、GC、风险官
        - 客户文件安全共享、电子取证、尽调数据室
        - $15K–$100K
        - 愿意为安全支付高价；用例契合度强
        - 面临 Citrix ShareFile 和专业 VDR 服务商竞争；ACV 较小
