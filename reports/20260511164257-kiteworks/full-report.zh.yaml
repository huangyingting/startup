        title: 合作伙伴与依赖风险
        blocks:
          - type: paragraph
            body: >-
              Kiteworks 云托管联邦 SaaS 部署依赖 AWS GovCloud 和 Azure Government 作为底层基础设施。两者都持有 FedRAMP High 授权，满足 FedRAMP CSP
              要求，但运营集中在两大 CSP，会在区域故障或授权变更时制造相关性故障风险。Microsoft 365 集成——通过 Outlook、SharePoint Online 和
              Teams——是核心企业工作流差异点。这些集成依赖 Microsoft 控制的 Microsoft Graph API 和 SharePoint REST API 端点，Microsoft
              可在有限通知下弃用端点，从而带来集成中断风险。

              联邦渠道伙伴集中度具有实质性：Kiteworks 通过 VAR 和政府集成商关系进入许多联邦合同载体（GSA Schedule、SEWP）。失去一家主要联邦集成商，可能削弱进入关键机构的销售管道。Sixth
              Street / Insight Partners 资本重组（2021 年
              $456M）很可能带有财务契约条款，从而制造运营约束；契约条款未公开披露。开源组件依赖（OpenSSL、容器基础设施）带来供应链风险，需要持续管理
              SBOM。集成伙伴生态（法律、医疗、金融垂直行业）也使公司间接依赖伙伴的财务健康和平台路线图一致性。
