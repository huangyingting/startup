          to: K1
          label: 拉动 DIB 需求
        - from: D7
          to: K1
          label: 联邦分销
        - from: D8
          to: K1
          label: 资本与治理
        - from: D9
          to: D4
          label: 维护 FedRAMP ATO
        - from: D9
          to: D5
          label: 维护 IL4 ATO
        - from: D10
          to: K1
          label: 基础组件
    claimRefs:
      - CR021
      - CR022
      - CR023
      - CR024
      - CR025
    notes: 展示关键外部依赖；若这些依赖中断，可能损害 Kiteworks 平台交付或监管授权。
  - id: FV001
    title: 推荐逻辑
    type: flow
    layout: wide
    summary: 从结构性催化和风险因素出发，推导在入场估值不高于 $1.5B 时给出条件性 BUY 建议的决策链。
    data:
      nodes:
        - id: N1
          label: CMMC 2.0 执法
          detail: 300,000+ 家 DIB 承包商被纳入强制要求；合规拉动 Kiteworks MFT 需求
          type: input
        - id: N2
          label: FedRAMP High 办理中
          detail: 2025 年取得 in-process 标识；若确认，可打开 DoD/IC TAM
          type: input
        - id: N3
          label: 市场整合
          detail: GoAnywhere/MOVEit 被吸收；Kiteworks 成为独立替代选项
          type: input
        - id: N4
          label: 倍数压缩风险
          detail: 板块倍数 5-10x，而峰值为 10-15x；高于 $1.5B 时回报测算收紧
          type: risk
        - id: N5
          label: ARR 不透明风险
          detail: 无经审计 ARR；区间为 $130M-$200M；NRR 未确认
          type: risk
        - id: N6
          label: <= $1.5B 时条件性 BUY
          detail: 基准情形回报 1.5-2.0x；信心中等；6 个尽调关口
          type: output
        - id: N7
          label: 高于 $1.5B 时 TRACK
          detail: 回报测算被压缩；更高入场价下，证据不足以支撑确信度
          type: output
      edges:
        - from: N1
          to: N6
          label: 需求催化
        - from: N2
          to: N6
          label: TAM 扩张催化
        - from: N3
          to: N6
          label: 竞争定位
        - from: N4
          to: N7
          label: 压缩 $1.5B 以上回报
        - from: N5
          to: N7
          label: 证据缺口限制确信度
        - from: N4
          to: N6
          label: 风险因素限制 BUY 上限
    claimRefs:
      - CV024
      - CV025
      - CV026
      - CV042
    notes: 流程图列出影响决策的主因。若要上调投资确信度，FedRAMP High 确认结果和经审计 ARR 是最关键的两个未知项。
  - id: FV002
    title: 估值敏感性
    type: bar
    layout: standard
    summary: 以 $1B 基准为锚，展示 Kiteworks 隐含 EV 对 ARR 水平与退出倍数组合的敏感性。
    data:
      items:
        - label: $130M ARR，5x 倍数
          value: 0.65
          unit: $B EV
        - label: $130M ARR，8x 倍数
          value: 1.04
          unit: $B EV
        - label: $160M ARR，8x 倍数
          value: 1.28
          unit: $B EV
        - label: $180M ARR，9x 倍数
          value: 1.62
          unit: $B EV
        - label: $200M ARR，10x 倍数
          value: 2
          unit: $B EV
        - label: $220M ARR，12x 倍数
          value: 2.64
          unit: $B EV
    claimRefs:
      - CV005
      - CV023
      - CV037
      - CV038
    notes: ARR 数值为估计，覆盖悲观到乐观区间。倍数区间反映 2025 年网络安全 SaaS 的市场状况。$1.0B 基准对应 $130M ARR x 7.7x，或 $200M ARR x 5.0x。
  - id: FV003
    title: 估值 / 回报区间
    type: range
    layout: standard
    summary: Kiteworks EV 在 2027-2028 年的悲观、基准与乐观估值区间，以及按 $1.5B 入场价测算的隐含回报。
    data:
      items:
        - label: 悲观情形 EV（2026-2027）
          low: 0.5
          high: 0.9
          unit: $B
        - label: 基准情形 EV（2027-2028）
          low: 1.4
          high: 2.2
          unit: $B
        - label: 乐观情形 EV（2028）
          low: 2.5
          high: 3.5
          unit: $B
        - label: 按 $1.5B 入场价测算的隐含回报
          low: 0.33
          high: 2.33
          unit: x MOIC
    claimRefs:
      - CV023
      - CV027
      - CV039
    notes: 区间反映 ARR 与倍数的不确定性。悲观情形下，$0.5B EV 对应 0.33x 回报，假设 $1.5B 入场且优先权得到完全满足。乐观情形下，2.33x 回报假设 $1.5B 入场、$3.5B EV。
  - id: FV004
    title: 投资 KPI
    type: kpi
    layout: standard
    summary: 针对 Kiteworks 有条件 BUY 建议，从七个投资维度给出可供 IC 使用的评分。
    data:
      items:
        - label: 市场机会
          value: 4
          unit: / 5
        - label: 产品验证（FedRAMP 护城河）
          value: 4
          unit: / 5
        - label: 客户验证（3,000+ 家企业）
          value: 3
          unit: / 5
        - label: 单位经济性（NRR 估计）
          value: 3
          unit: / 5
        - label: 风险画像
          value: 2
          unit: / 5
        - label: 估值吸引力
          value: 3
          unit: / 5
        - label: 证据质量
          value: 2
          unit: / 5
    claimRefs:
      - CV007
      - CV008
      - CV015
      - CV016
      - CV029
      - CV032
    notes: 评分反映当前证据状态。证据质量（2/5）与风险画像（2/5）反映私营公司不透明度，以及平台安全历史包袱。若确认 FedRAMP High，产品验证评分将上调至 5/5，估值吸引力将上调至 4/5。
