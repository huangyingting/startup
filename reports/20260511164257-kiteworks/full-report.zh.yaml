      - number: '5.5'
        title: 附录要点
        blocks:
          - type: callout
            title: 加固型虚拟设备模式独特支持 FedRAMP High 和涉密部署
            body: >-
              Kiteworks 的客户侧虚拟设备部署模式——客户数据永不经过 Kiteworks 基础设施——在架构上契合 FedRAMP High 和涉密环境要求。相较多租户 SaaS
              竞争者，这是显著优势；后者若没有硬件级隔离，就无法实现同等隔离。
            calloutType: strength
            claimRefs:
              - CE007
              - CE009
              - CE014
          - type: callout
            title: ownCloud AGPLv3 许可带来长期 IP 与商业化风险
            body: >-
              ownCloud core 采用 AGPLv3 许可，要求任何与其一起分发的软件也必须采用 AGPLv3。Kiteworks 的专有治理覆盖层不能与 ownCloud core
              混合，否则会触发开源许可义务——因此需要架构隔离，持续增加工程开销，并限制 EMEA 产品整合节奏。
            calloutType: risk
            claimRefs:
              - CE012
              - CE024
          - type: callout
            title: FedRAMP High 认证延误会推迟重大收入机会
            body: >-
              FedRAMP High 授权预计在 2025 取得，是打开涉密 DoD 和 IC 账户部署的关键。3PAO 评估完成延误、NIST SP 800-53 Rev 5 合规缺口，或 FedRAMP PMO
              积压，都可能把授权推迟到 2026 或更晚，从而推迟政府收入扩张论点。
            calloutType: risk
            claimRefs:
              - CE015
              - CE022
          - type: callout
            title: AI 治理模块让 Kiteworks 有机会把 TAM 扩展到 MFT 之外
            body: >-
              AI 治理产品会拦截、记录并控制与 AI 模型交换的敏感内容，击中了现有 MFT 或 SFSC 竞争者尚未覆盖的新兴企业需求。如果 AI 治理成为受监管的合规要求（例如 EU AI Act、NIST AI RMF
              mandate），Kiteworks 可能把 TAM 从 MFT/SFSC 扩到更广的 AI 数据治理。
            calloutType: insight
            claimRefs:
              - CE025
              - CE027
  - number: 6
    title: 客户
    sections:
      - number: '6.1'
        title: 客户群分层与买方画像
        blocks:
          - type: paragraph
            body: >
              Kiteworks 的客户群覆盖四个主要垂直行业：（1）美国联邦政府与国防（DoD、IC 机构、国防工业基础）——由合规驱动的锚定细分市场，也是 FedRAMP 和 CMMC
              级部署的主要用例；（2）金融服务——银行、保险公司、财富管理机构和受 SEC、FINRA、GLBA、SOX 合规约束的 fintech 公司；（3）医疗与生命科学——在 HIPAA 下处理 PHI
              和临床试验数据的医院系统、健康计划、药企和 CRO；（4）政府相邻垂直行业——法律、会计、专业服务和能源 / 公用事业。买方画像通常是首席信息安全官（CISO）或
              IT/合规负责人，而不是业务线买方。因此销售周期更长（企业级 6–12 个月），但合规工作流嵌入后账户黏性更高。政府垂直行业是 ACV 最高的细分市场，联邦合同通常采用多年期 IDIQ 或 BPA
              载体（$300K–$2M+）。按客户数看，医疗是最大细分市场，因为 HIPAA 推动加密文件传输的紧迫需求，PHI 交换流程也高度分散。金融服务按 ACV 处于中档，但随着 FINRA/SEC
              对电子通信监控要求提高，正在增长。国际客户（通过 EMEA 的 ownCloud/DRACOON）是增长中的细分市场，但 ACV 低于美国政府。分销以企业直销为主；渠道伙伴（MSSP、GSA Schedule
              经销商、政府 VAR）在政府采购中的作用正在增强。3,650+ 客户数由管理层披露，未经独立审计；该数字很可能同时包括有机 Kiteworks 客户和收购来的 ownCloud/DRACOON 订阅用户。
