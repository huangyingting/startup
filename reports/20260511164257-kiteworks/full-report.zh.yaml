  - id: FU001
    title: 客户旅程图
    type: journey-map
    layout: wide
    summary: 企业客户生命周期的各阶段，从初步发现到全面采用 PCN 并扩展。
    data:
      nodes:
        - id: discovery
          label: 发现
          detail: >-
            RFP/RFI 触发点：合规要求（CMMC、HIPAA、FedRAMP）。调研：G2、Gartner Peer Insights、分析师 对比网站。竞品评估：Kiteworks 对比
            MOVEit、Box、Virtru。
          type: input
        - id: evaluation
          label: 评估
          detail: POC / 试点：通常 30–90 天。技术审查：FedRAMP ATO、CMMC 配置、DLP 集成。 定价：定制合同谈判（平均销售周期 6–12 个月）。
          type: process
        - id: purchase
          label: 采购
          detail: 合同签署：商业客户通常为 1–3 年期限；政府客户使用 IDIQ/BPA。配置 FedRAMP Gov Cloud 或本地部署。
          type: process
        - id: onboarding
          label: 上线导入
          detail: 实施：1–3 个月（MFT + 文件共享）；若完整 PCN 包含电子邮件和表单，周期更长。专业服务介入。 IdP 集成、DLP 配置。
          type: process
        - id: production
          label: 生产使用
          detail: PCN 活跃使用：合规工作流已嵌入。审计日志可用于 FedRAMP 持续监控。 合规报告仪表盘投入使用。
          type: process
        - id: expansion
          label: 扩展
          detail: 增加 PCN 通道：从 MFT 起步 → 增加文件共享 → 增加电子邮件加密 → 增加网页表单 → 增加 API。CMMC 评估推动通道扩展。
          type: output
        - id: renewal
          label: 续约 / 向上销售
          detail: 多年续约：FedRAMP/CMMC 客户切换成本高。向上销售：AI 治理模块（Beta 2024）、更多连接器，以及获授权后的 FedRAMP High。
          type: output
    approximationNotes: 客户旅程基于公开销售周期信息、G2 评论者实施时间线和企业 SaaS 行业惯例。政府采购周期可能显著不同。
