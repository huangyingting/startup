      - number: '1.5'
        title: 负面事件与声誉风险
        blocks:
          - type: paragraph
            body: >-
              Kiteworks 公司历史上最重大的负面事件，是 December 2020–February 2021 的 Accellion File Transfer Appliance (FTA) 泄露。被归因于
              FIN11 组织（与 CLOP 勒索软件团伙有关联）的威胁行为者利用传统 FTA 软件中的四个零日漏洞（CVE-2021-27101, CVE-2021-27102, CVE-2021-27103,
              CVE-2021-27104），从全球 100+ 个组织窃取敏感数据。受害者包括 Shell、Kroger、Stanford University、University of California
              系统、Singtel、Bombardier 以及多家医疗系统。CISA 和 FBI 就该攻击发布联合通报（AA21-055A）。FTA 是一款已有 20 年历史的传统产品，Accellion
              一直在鼓励客户迁离；其被攻破并未影响更新的 Kiteworks 平台。不过声誉损害很重，并推动了更名决策。January 2022，Accellion 同意达成 $8.1M 集体诉讼和解，覆盖约 9.2
              million 名受影响个人，且不承认不当行为。作为和解的一部分，公司同意永久退役 FTA 产品并实施强化安全实践。该泄露与和解构成负面信源，仍会影响对公司安全文化和当前风险态势的持续尽调。
