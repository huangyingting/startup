            body: >-
              企业客户一旦把 Kiteworks 嵌入 FedRAMP Continuous Monitoring（ConMon）合规工作流，更换供应商就要承担 $100K–$500K+
              的重新认证、重新集成和员工再培训成本。这种结构性锁定解释了为什么即便经历 Accellion FTA 泄露——对企业文件传输供应商而言几乎是最严重的负面事件之一——Kiteworks 仍保住了多数企业账户。
