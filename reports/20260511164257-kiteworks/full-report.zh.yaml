    title: 公司概览
    sections:
      - number: '1.1'
        title: 身份、沿革与更名
        blocks:
          - type: paragraph
            body: >-
              Kiteworks 可追溯到 1999，当时公司以 Accellion 之名在 Singapore 创立，最初聚焦分布式文件存储和企业大文件共享，解决邮件附件容量限制。此后十年， Accellion
              将产品从基础文件传输扩展为企业级安全内容通信平台。到 2014，公司估值达到 $500M。April 2020，Bregal Sagemount 投资 $120M，推动产品加速建设和销售扩张。October
              2021，公司从 Accellion 更名为 Kiteworks，与在 December 2020–February 2021 重大泄露中被利用的 Accellion File Transfer
              Appliance (FTA) 传统产品拉开距离，同时释放更大的愿景：Private Content Network (PCN)，把所有敏感通信通道统一到同一套治理与合规引擎下。更名也呼应了
              totemo（January 2022）、ownCloud（November 2023）和 DRACOON（November 2023）的收购，用于加深欧洲市场覆盖和邮件加密能力。Kiteworks 总部位于
              1510 Fashion Island Blvd, San Mateo, California 94404，并通过在 Germany 和 Switzerland 收购 ownCloud 与 DRACOON
              建立了重要欧洲业务。
