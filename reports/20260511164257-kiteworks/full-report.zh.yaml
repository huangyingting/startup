  - id: FE001
    title: 产品架构图
    type: stack
    layout: wide
    summary: Kiteworks Private Content Network 平台从基础设施到治理的分层架构。
    data:
      layers:
        - label: 治理与合规层
          detail: 中央策略引擎在全部五个 PCN 内容渠道上执行统一访问控制、审计日志和合规报告。
          modules:
            - 统一审计日志（全部 5 个渠道）
            - 合规报告引擎（FedRAMP、HIPAA、CMMC）
            - 策略执行和 DLP 集成
            - 基于角色的访问控制和权限管理
        - label: PCN 渠道层（5 个渠道）
          detail: 五个内容通信渠道（MFT、文件共享、加密邮件、网页表单、API），每个渠道都以端到端加密和审计交付内容。
          modules:
            - MFT 引擎：SFTP / FTPS / AS2 / HTTPS 自动化
            - 安全文件共享：Web 门户 / 移动端 / 限时链接
            - 加密电子邮件：totemo S/MIME + 门户投递
            - 安全网页表单：加密收集 / 政府门户
            - API 数据交换：REST API，带内容检查
        - label: 安全与加密引擎
          detail: 通过 FIPS 140-2 验证的密码模块，提供 AES-256 静态加密与 TLS 1.3 传输加密， 并支持客户控制的密钥管理。
          modules:
            - 通过 FIPS 140-2 验证的 AES-256 静态加密
            - TLS 1.3 传输加密（所有通道）
            - 密钥管理：客户控制密钥
            - 内容检查（ICAP / DLP 连接器）
        - label: 集成与身份层
          detail: 企业集成枢纽，连接身份提供商（LDAP/SAML/OIDC）、SIEM 平台（Splunk/QRadar） 和业务应用（M365/Salesforce/ServiceNow）。
          modules:
            - LDAP / Active Directory / SAML 2.0 / OIDC (SSO) 身份集成
            - SIEM：Splunk、IBM QRadar
            - 业务应用：Microsoft 365、Salesforce、ServiceNow
