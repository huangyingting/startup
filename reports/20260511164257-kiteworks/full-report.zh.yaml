      - number: '3.2'
        title: 功能与能力对比
        blocks:
          - type: paragraph
            body: >
              用受监管买方优先考虑的功能来对比 Kiteworks 与主要竞争对手，可以看出 Kiteworks 在合规覆盖和通道统一上有差异化位置，而单一类别的点状解决方案竞争对手，往往在自身主赛道的深度上超过
              Kiteworks。Progress MOVEit 在企业 MFT 吞吐、协议支持和 AS2/SFTP 自动化上很强，但缺少原生加密邮件、FedRAMP High 能力（in
              process）和统一合规仪表盘。Axway AMPLIFY MFT 在 API 管理和 EDI 集成上领先，但在 MFT 通道之外的合规治理有限。IBM Sterling Connect:Direct
              深嵌于金融服务批处理工作流，但主要运行在本地且维护成本高。Fortra GoAnywhere MFT 具备强自动化和有竞争力的定价，但 January 2023 的零日利用影响了其合规可信度。Box
              在用户体验和协作功能上出色，但缺少原生 MFT 自动化，并依赖第三方集成来承载合规工作流。Virtru 以客户端加密和 Google Workspace 集成形成差异化，但它是点状解决方案，不具备 MFT 或
              SFSC 能力。Microsoft SharePoint/OneDrive 依靠普及度和 M365 集成取胜，但要满足 FedRAMP 或 CMMC 合规，需要大量额外配置，也缺少原生 MFT
              自动化。Kiteworks 的差异化包括：(1) 唯一把全部五个通道（MFT、文件共享、邮件、Web 表单、API）统一到同一合规仪表盘的平台；(2) 已获 FedRAMP Moderate 授权，FedRAMP
              High 为 In Process——相较多数竞争对手明显领先；(3) 开箱即具备 CMMC 2.0 认证就绪能力；(4) 面向 Australian government 的 IRAP 认证；(5) 借助
              2023 收购的 ownCloud/DRACOON 技术栈实现 EU 数据驻留。Kiteworks 的局限包括相较单类别竞争对手总拥有成本更高，多通道架构带来实施复杂度，以及 Accellion FTA
              泄露带来的声誉余波。
