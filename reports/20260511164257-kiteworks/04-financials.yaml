    claimRefs: [CI015, CI016, CI018, CI019, CI020, CI029]

callouts:
  - calloutType: risk
    title: "ARR Estimate Is Unconfirmed and May Be Materially Inaccurate"
    body: "The $130M ARR figure (GetLatka, 2025) is the only public ARR proxy for Kiteworks. GetLatka estimates for private companies are frequently off by 20–40%. Investors must obtain audited or management-confirmed ARR before using this figure in a financial model. The entire valuation thesis depends on the accuracy of this number."
    claimRefs: [CI021, CI022]

  - calloutType: strength
    title: "2024 Growth Equity Round Provides Exceptional Capital Cushion"
    body: "The $456M round from Insight Partners and Sixth Street Growth — two experienced growth equity firms — at a $1B+ valuation provides Kiteworks with 5+ years of runway even at estimated burn rates. This removes near-term capital risk and provides firepower for additional acquisitions or market expansion."
    claimRefs: [CI015, CI016]

  - calloutType: recommendation
    title: "Obtain Full Financial Package Under NDA Before Investment"
    body: "The seven gaps identified in the Public Financial Gaps Table (audited revenue, gross margin, NRR, acquisition economics, litigation reserve, customer concentration, and sales efficiency) are all standard pre-investment diligence items. No investment decision can be responsibly made without resolving at minimum the ARR and NRR confirmations."
    claimRefs: [CI021, CI022, CI023, CI024, CI025]

  - calloutType: risk
    title: "Acquisition Integration Creates Margin and NRR Uncertainty"
    body: "Three acquisitions in a single year (ownCloud, DRACOON, totemo) adds approximately 100–200 employees and multiple technology stacks, creating integration risk. The ownCloud open-source model in particular may limit Kiteworks' ability to fully monetize the acquired customer base without customer pushback on licensing changes."
    claimRefs: [CI004, CI005, CI023, CI024]

