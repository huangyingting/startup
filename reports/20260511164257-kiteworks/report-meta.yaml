companyProfile:
  summary: >
    Kiteworks (formerly Accellion) is a Santa Clara, California-based cybersecurity company founded in 1999 and led by CEO Jonathan Yaron (since 2016). After a significant data breach in its legacy File Transfer Appliance (FTA) product between December 2020 and February 2021 affecting approximately 100 organizations globally, Accellion rebranded to Kiteworks in October 2021 and launched the Private Data Network (PDN) — a modernized, FIPS 140-2 validated, FedRAMP Moderate authorized platform for secure managed file transfer, email protection, and content governance. Kiteworks raised $456M total including a $250M Series D in 2021 from Insight Partners, Sixth Street, Owl Rock, and Northgate Capital. The company serves 3,000+ organizations including 600+ in defense and government sectors, with an estimated $200M+ ARR (analyst estimate, unconfirmed). Kiteworks holds FedRAMP Moderate authorization and is pursuing FedRAMP High (In Process designation ~Q1 2026). The company completed three acquisitions in 2023: ownCloud, DRACOON, and totemo, expanding into European enterprise content management. Key differentiators include ITAR compliance support, CMMC 2.0 alignment, and 8+ years of FedRAMP Moderate track record.
  foundedDate: "1999-01-01"
  founders:
    - name: "Jonathan Yaron"
      role: "CEO (since 2016)"
      background: "Former CEO of Sycamore Entertainment Group; transformed Accellion into Kiteworks following the 2020-2021 FTA breach; led $456M fundraise, FedRAMP authorization, and three 2023 acquisitions."
      claimRefs: []
  foundingLocation: "Santa Clara, California, USA"
  headquarters: "Santa Clara, California, USA"
  productSummary: >
    The Kiteworks Private Data Network (PDN) includes: (1) Managed File Transfer (MFT) — secure large file transfer with FIPS 140-2 encryption and audit logging; (2) Email Protection Gateway — S/MIME and content filtering for regulated email; (3) Secure File Sharing — enterprise collaboration with policy enforcement; (4) SFTP/FTPS server with compliance controls; (5) API and connector integrations with Salesforce, ServiceNow, Microsoft 365, Splunk, and 30+ enterprise platforms; (6) FedRAMP Gov Cloud dedicated instance for US federal agencies; (7) DRACOON (European content management) and totemo (Swiss secure email) subsidiaries for EMEA markets.
  customerFocus: >
    Primary: US federal government agencies requiring FedRAMP Moderate/High authorization; DoD contractors requiring CMMC 2.0 and ITAR compliance; healthcare systems under HIPAA; financial services under GLBA. Secondary: EMEA enterprises via DRACOON (Germany, Austria, Switzerland) and totemo (Swiss financial services and pharma).
  businessModel: >
    Subscription SaaS revenue for PDN (cloud, on-premises appliance, and hybrid); perpetual/term license for DRACOON and totemo enterprise; professional services for FedRAMP, CMMC, and enterprise deployment. On-premises appliance model is preferred in air-gapped government environments.
  stage: "Growth"
  fundingStatus: >
