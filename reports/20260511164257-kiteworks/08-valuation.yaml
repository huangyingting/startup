    figureRefs:
      - FV001

  - id: bull-base-bear-scenarios
    title: "Bull, Base, and Bear Scenarios"
    body: >-
      The valuation scenarios are anchored to three ARR and multiple combinations spanning a plausible
      range given available evidence. The bull case ($2.5B-$3.5B by 2028) requires FedRAMP High
      authorization confirmed in 2026, ARR growing at 25%+ annually to $220M+, NRR above 120%, and
      sector multiples recovering to 12-15x for high-growth government-focused platforms. The Deloitte
      2025 cybersecurity market report supports a $240B total market by 2027, providing addressable
      demand consistent with this trajectory.

      The base case ($1.4B-$2.2B by 2027-2028) requires ARR growing at 15-20% annually to $170M-$180M,
      FedRAMP High confirmation, NRR of 110-115%, and multiples of 8-10x ARR. This is achievable
      under current market conditions and consistent with the Varonis SaaS-transition multiple
      expansion from 5x to 8x over 2023-2025 as SaaS purity improved.

      The bear case ($500M-$1.0B) is triggered by any combination of: FedRAMP High authorization
      delay beyond 2027, Kiteworks platform security incident, ARR stalling below $150M, NRR below
      100%, or sector multiple compression below 5x ARR. The SecurityWeek reporting on the Accellion
      settlement confirms that adverse events can materially reset private company valuation expectations
      regardless of strategic positioning.

      Monitoring triggers — FedRAMP High denial, ARR stall, platform zero-day, CMMC enforcement
      delay, and leadership departure — are observable from public sources and should be tracked on
      a quarterly basis by any investor holding a position.
    claimRefs:
      - CV023
      - CV024
      - CV027
      - CV028
      - CV033
