  evidenceGaps:
    - type: private-evidence-only
      severity: blocking
      topic: "ARR estimate"
      missingEvidence: "Audited or management-confirmed trailing-twelve-month ARR for Kiteworks FY2024 and FY2025; analyst estimates range from $130M to $200M."
      whyItMatters: "The ARR estimate is the primary denominator for the EV/ARR multiple. A $70M range implies a multiple range of 5x-7.7x at $1B valuation — wide enough to shift from BUY to MONITOR at lower bound."
      diligencePath: "Request audited financial statements and confirmed ARR under NDA from Insight Partners or Kiteworks management data room."
      relatedQuestionRefs: ["QV003"]

    - type: private-evidence-only
      severity: blocking
      topic: "cap table"
      missingEvidence: "Complete capitalization table including preference stack terms, liquidation waterfall, antidilution provisions, and employee option pool from the August 2024 round."
      whyItMatters: "Without the preference stack, downside valuation for common equity holders cannot be determined; Insight Partners growth equity could carry preferences that haircut common returns in bear case."
      diligencePath: "Request capitalization table and investment agreement from lead investor data room under NDA."
      relatedQuestionRefs: ["QV014"]

    - type: missing-source
      severity: material
      topic: "comparable Proofpoint"
      missingEvidence: "Current (2025-2026) confirmed ARR and valuation for Proofpoint under Thoma Bravo ownership; last public data point is the 2021 acquisition at $12.3B."
      whyItMatters: "Proofpoint is the closest PE-buyout precedent for email/content security SaaS; a current valuation mark would anchor the comparable set."
      diligencePath: "Monitor Proofpoint secondary market transactions and any Thoma Bravo exit process press coverage."
      relatedQuestionRefs: ["QV024"]

