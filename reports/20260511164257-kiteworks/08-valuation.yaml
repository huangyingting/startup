          to: risk-assessment
        - from: metrics-gap
          to: risk-assessment
        - from: risk-assessment
          to: valuation-check
        - from: valuation-check
          to: recommendation
    approximationNotes: "Logic chain represents the analyst's assessment based on publicly available evidence. Upgrade from Track to Invest requires primary confirmation of ARR growth, NRR, and FedRAMP High authorization timeline."

