  - id: scenario-analysis
    title: "Scenario Analysis"
    body: >-
      Bull case (25% probability): FedRAMP High authorization achieved by late 2026; CMMC 2.0 enforcement
      drives 35%+ growth in DIB segment; Kiteworks ARR reaches $220M by 2027 at 25% CAGR from $100M
      2024 baseline; no material security incident; gross margins in the 70-75% range typical of
      government SaaS. Exit in 2028 via strategic acquisition by a defense-focused technology platform
      (L3Harris, Leidos, Peraton, or a large cybersecurity platform) or IPO. Exit multiple: 7-8x ARR
      ($1.5B-$1.8B EV). At a $500M entry, this implies 3-3.5x gross return (before dilution) — a
      strong outcome if federal compliance tailwinds materialize.

      Base case (50% probability): FedRAMP High delayed to 2027; CMMC enforcement proceeds at plan but
      DIB sales cycle elongated by C3PAO capacity constraints; Kiteworks ARR reaches $160M by 2027 at
      ~15% CAGR; brand rehabilitation from Accellion continues without major new incident; margins in the
      65-70% range with ongoing compliance investment. Exit in 2028 via strategic acquisition. Exit
      multiple: 5-6x ARR ($800M-$960M EV). At a $500M entry, this implies 1.6-1.9x gross return —
      a modest positive but potentially below hurdle rate after fees and dilution.

      Bear case (25% probability): A Kiteworks platform security incident, a major CMMC enforcement
      delay, or sustained pricing pressure from OpenText/IBM causes ARR to plateau at $130M by 2027;
      multiple compression to 3-4x; exit at $390M-$520M. At a $500M entry, this implies a 0.8-1.0x
      return — a near-loss scenario. The bear case is triggered by the same threat actor class that
      targeted MOVEit and GoAnywhere finding a Kiteworks zero-day, which would be existential for brand
      in the government security segment.

      Entry discipline: Given the valuation uncertainty (unverified ARR, opaque financials), investment
      discipline requires: (1) audited ARR confirmation above $120M, (2) NRR above 110%, (3) FedRAMP
      High timeline commitment with evidence of active pursuit, and (4) entry at or below 5x confirmed
      ARR (~$600M-$750M at $120-150M ARR). These conditions would improve risk-adjusted return
      across all three scenarios.
