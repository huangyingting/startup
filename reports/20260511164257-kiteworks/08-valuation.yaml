callouts:
  - calloutType: recommendation
    title: "Conditional BUY at Entry Valuation at or Below $1.5B"
    body: "The Kiteworks investment case is evidence-conditional, not thesis-conditional. The CMMC 2.0, FedRAMP High, and MFT consolidation catalysts are structurally compelling, but six diligence confirmations must be obtained before commitment: audited ARR, NRR, cap table, FedRAMP High authorization package, management access, and customer concentration. A term sheet should not be issued without resolving at minimum audited ARR and NRR. At entry valuations above $1.5B, the base-case return compresses below 2x and the recommendation is TRACK."
    claimRefs: [CV024, CV028, CV039, CV040]

  - calloutType: risk
    title: "ARR Estimate Is Unconfirmed — Entire Valuation Thesis Rests on Unaudited Data"
    body: "The $130M-$200M ARR range is derived entirely from GetLatka estimates and analyst aggregators. GetLatka estimates for private companies are frequently off by 20-40%. A 30% downward revision to $91M-$140M ARR would shift the implied EV/ARR from 5-8x to 7-11x, making the $1.0B+ valuation appear expensive. Audited or management-confirmed ARR is the single most important diligence item before any investment decision."
    claimRefs: [CV003, CV004, CV034]

