chapter:
  number: 8
  title: Valuation
  summary: >
    Kiteworks implied enterprise value of $1B+ (August 2024 growth equity round) is conditionally
    fair at an estimated 5-8x ARR on a $130-200M ARR range, supported by an 8-year FedRAMP Moderate
    moat, 3,000+ enterprise customers, and a CMMC 2.0 enforcement tailwind from 300,000+ Defense
    Industrial Base contractors. The base-case valuation range of $1.4B-$2.2B (8-10x confirmed ARR)
    is achievable by 2027-2028 if FedRAMP High authorization is confirmed and ARR growth is validated
    above $180M. The bear case ($500M-$1.0B) is triggered by FedRAMP High delay beyond 2027, a
    platform security incident, or sustained multiple compression below 5x ARR. A conditional BUY
    is supported at entry valuations below $1.5B, pending management access, audited ARR above
    $160M, and confirmed NRR above 110%. At valuations above $1.5B, the recommendation is TRACK
    pending additional evidence.

sections:
  - id: financing-and-valuation-context
    title: "Financing and Valuation Context"
    body: >-
      In August 2024, Kiteworks closed a $456M growth equity round led by Insight Partners with
      participation from Sixth Street, at a publicly disclosed valuation exceeding $1.0B. The
      investment represented one of the largest single-year cybersecurity growth equity transactions
      of 2024, validating Kiteworks' positioning as a federal compliance SaaS platform at a critical
      inflection point driven by CMMC 2.0 enforcement and FedRAMP High in-process authorization.

      The implied enterprise value at the time of closing exceeded $1.0B by investor disclosure.
      Third-party ARR estimates from GetLatka and aggregator databases place Kiteworks ARR in the
      $130M-$200M range as of late 2024 and early 2026, implying an EV/ARR multiple of approximately
      5-8x at the $1.0B mark. This range is consistent with the 2025 market for high-growth
      cybersecurity SaaS platforms: analyst data from Livmo and Acquiry show median multiples of
      6-9x ARR for cybersecurity companies with greater than 20% ARR growth, compressing from the
      10-15x peak of 2021-2022. The valuation is therefore within the current market range but
      not yet a discount, making entry discipline important.

      No preference share structure, liquidation waterfall, or capitalization table data is publicly
      available for Kiteworks. The Sixth Street and Insight Partners capital is structured as growth
      equity, not venture capital, which typically implies less aggressive preference stacks. However,
      legacy recapitalization structures from the Accellion/Kiteworks history may carry preference
      overhang that is not visible from public sources. Audited ARR and cap table review are the
      two most critical pre-investment diligence items.
