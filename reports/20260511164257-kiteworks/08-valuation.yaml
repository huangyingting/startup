  evidenceGaps:
    - type: missing-source
      severity: high
      description: >
        The August 2024 $1B valuation cannot be independently benchmarked without public financial disclosure
        from Kiteworks. ARR, NRR, gross margin, and growth rate are all estimated from directional third-party
        sources. Without primary source confirmation, the question of whether the $1B entry is overpriced
        or fairly priced relative to private SaaS peers at comparable growth and retention remains unresolved.
      relatedQuestionRefs: [QV001, QV002]
      relatedTableRefs: [TV004]
      diligencePath: "Request management presentation with audited 2023-2024 financials; commission independent ARR verification from CFO; compare against SaaStr and PitchBook private SaaS comp data for equivalent growth cohorts"

    - type: missing-data
      severity: high
      description: >
        Kiteworks' cap table structure, liquidation preference terms, and anti-dilution provisions from the
        $456M round are not publicly disclosed. Without this information, the economic return to common
        equity holders at exit values below $2B cannot be calculated. Investor marks and any subsequent
        round pricing are also not available from public sources.
      relatedQuestionRefs: [QV006, QV014, QV016]
      diligencePath: "Request term sheet and shareholder agreement; outside counsel analysis of downside scenario returns by share class; review any board minutes disclosing governance rights"

    - type: missing-data
      severity: high
      description: >
        Net revenue retention for Kiteworks is not publicly disclosed. The base and bull case return
        scenarios depend materially on NRR above 110 percent for multi-year enterprise contract durability.
        Without cohort-level NRR data, the thesis that compliance certifications create high switching costs
        and durable retention cannot be verified from public sources.
      relatedQuestionRefs: [QV011]
      diligencePath: "Request customer cohort analysis in management presentation; CFO presentation on NRR by vertical and pre/post-acquisition cohorts; reference checks with 5-10 enterprise customers at renewal"

