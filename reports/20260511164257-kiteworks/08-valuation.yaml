  - id: recommendation-and-diligence
    title: "Recommendation and Final Diligence"
    body: >-
      Recommendation: Research-more / Conditional Positive. The investment thesis is compelling and
      supported by structural market tailwinds (CMMC, FedRAMP, HIPAA compliance mandates), a
      defensible compliance moat in a mission-critical workflow, and approximately 3,500 enterprise
      customers including US federal agencies. However, the recommendation cannot advance to positive
      without resolution of four critical diligence gaps: (1) audited ARR and NRR data — the business
      quality case rests on unverified $100M ARR and completely opaque retention metrics; (2) FedRAMP
      High authorization status and committed timeline — the IC/DoD revenue ceiling is the largest
      upside driver; (3) independent platform security audit — the Accellion FTA precedent demands
      confirmation that the current Kiteworks architecture does not share vulnerability patterns with
      FTA; (4) financial covenant terms and PE governance structure — Sixth Street covenant compliance
      status determines whether the company has operational flexibility to execute the growth plan.

      Confidence in recommendation: Medium. The market opportunity and compliance-moat positioning
      are well-supported by evidence. The financial quality, platform security, and governance risks
      are structurally unresolvable from public data and require direct company access.

      Risk rating: High. The Accellion FTA legacy creates a tail-risk scenario (platform breach)
      that would be disproportionately damaging relative to a typical SaaS security incident; the
      concentrated federal customer base creates single-sector revenue risk; and private equity
      governance creates exit timing uncertainty.

      Thesis-break events: (1) A Kiteworks platform security incident with government customer data
      exposure; (2) FedRAMP High authorization denied or significantly delayed beyond 2027; (3)
      Audited ARR below $80M, indicating material estimation error in third-party data; (4) CEO
      departure without credible succession; (5) Financial covenant breach triggering lender control
      actions. Any single thesis-break event within 12 months of investment would trigger a complete
      position review.
