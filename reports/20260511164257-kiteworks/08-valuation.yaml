  - id: recommendation-and-diligence
    title: "Recommendation and Final Diligence"
    body: >-
      The investment recommendation is conditional BUY at entry valuations at or below $1.5B,
      subject to six mandatory diligence confirmations: (1) management access and Q&A session with
      CEO and CFO, (2) audited or management-confirmed ARR above $160M, (3) confirmed NRR above
      110%, (4) capitalization table review including preference share structure and liquidation
      waterfall, (5) FedRAMP High authorization package and target authorization date confirmation
      from the FedRAMP PMO sponsor, and (6) customer concentration analysis showing no single
      customer exceeding 15% of ARR.

      The confidence level is medium and risk rating is high. The valuation stance is fair at current
      implied levels, with upside optionality tied to FedRAMP High confirmation and CMMC 2.0
      enforcement acceleration. The Insight Partners and Sixth Street investor pedigree is a positive
      signal: both firms have demonstrated exit discipline and public market preparation track records.
      The Sixth Street announcement confirms the $456M round at over $1B valuation.

      At entry valuations above $1.5B, the recommendation is TRACK: base-case returns compress
      below 2x at higher entry, making the risk-adjusted return unattractive without additional
      evidence confirming ARR above $180M and NRR above 115%. Investment KPIs scoring confirms that
      market (4/5), moat (4/5), and product proof (3/5) support the thesis, but evidence quality
      (2/5) and financial transparency (2/5) limit conviction until diligence gaps are closed.
    claimRefs:
