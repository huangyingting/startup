  - id: comparable-valuation
    title: "Comparable Valuation"
    body: >-
      The comparable company analysis for Kiteworks spans four dimensions: public company trading
      multiples, private round comparables, strategic acquisition exit multiples, and sector benchmark
      data from industry analysts. The most relevant public comps are Varonis Systems (data security
      SaaS, NYSE: VRNS) and Progress Software (MFT/MOVEit, NASDAQ: PRGS). Varonis trades at
      approximately 8x ARR following its SaaS-only transition, representing the best single public
      analog for Kiteworks' compliance-SaaS positioning. Progress Software trades at approximately
      4x ARR reflecting distressed MFT brand compression post-MOVEit breach, setting a bear-case
      floor.

      Historical strategic acquisition multiples (Proofpoint at approximately 10x ARR, Mimecast at
      approximately 9-10x ARR) set the ceiling for content security acquisitions in a favorable
      market. These are 2021-2022 vintage, before multiple compression, and should be discounted by
      30-40% for current market conditions. The CBInsights cybersecurity unicorn tracker and Pitchbook
      Kiteworks company profile confirm Kiteworks' current unicorn status and growth equity structure.

      Analyst benchmarks from Livmo and Acquiry for 2026 SaaS valuation multiples suggest median
      cybersecurity SaaS multiples of 6-9x ARR, consistent with the Kiteworks base-case range.
      SaaStr enterprise SaaS benchmarks confirm that NRR above 120% commands 12-15x multiples, while
      NRR below 110% implies pressure toward 5-7x.
    claimRefs:
      - CV009
      - CV010
      - CV011
      - CV012
      - CV014
