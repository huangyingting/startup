  - id: valuation-framework-and-comparables
    title: "Valuation Framework and Comparable Set"
    body: >-
      Kiteworks is valued as a compliance-grade SaaS platform with a durable government and regulated
      enterprise customer base. The appropriate valuation framework is ARR multiple (EV/ARR), consistent
      with private SaaS company practice, calibrated against public market cybersecurity SaaS peers and
      M&A precedents in the MFT and content security space.

      The 2021 recapitalization ($456M from Sixth Street Partners and Insight Partners) implied an
      enterprise value of approximately $1B at the time of investment, given that PE recapitalizations
      typically inject capital at or near company value. At $100M ARR (unverified), this implies a ~10x
      ARR entry multiple — appropriate in 2021 when cybersecurity SaaS traded at 10-20x ARR, but
      potentially stretched in 2026 if the market has compressed to 5-8x for similar-scale companies.
      If ARR has grown to $150-200M by 2026 at ~20% annual growth, the implied current 2021 entry
      multiple normalizes to 5-6x ARR — reasonable for a compliance-moat SaaS business with federal
      contract durability.

      Public comparable set: Progress Software (PRGS, NASDAQ), which owns MOVEit MFT and other B2B
      software, trades at approximately 2-3x trailing revenue (~$650M revenue) — but this is severely
      depressed by the MOVEit breach reputational impact and PRGS's heterogeneous portfolio. Axway SA
      (AXW.PA, Euronext) is a pure-play MFT incumbent with ~€350M revenue trading at ~1.5x — also
      depressed as a legacy vendor with lower growth. These legacy comps are not the appropriate
      primary benchmark for Kiteworks given its compliance-moat positioning and faster implied growth.

      The more appropriate benchmark set includes cybersecurity SaaS companies with similar scale and
      growth profiles: CrowdStrike at ~9x NTM revenue (high growth, $3.5B+ ARR), SentinelOne at ~7x
      NTM revenue ($700M+ ARR), and Informatica at ~4x NTM revenue ($1.7B ARR, lower growth). Private
      market M&A precedents in adjacent spaces provide additional anchors: Fortra (HelpSystems) acquired
      GoAnywhere for an estimated $150M (implying ~3-4x ARR for a breach-impacted vendor); HHS-focused
      secure collaboration companies have transacted at 4-6x ARR. A 5-7x ARR multiple applied to
      $150M ARR implies a valuation range of $750M-$1.05B; at $200M ARR, 5-7x implies $1B-$1.4B.
