callouts:
  - calloutType: strength
    title: "FedRAMP Compliance Creates Near-Irreversible Customer Lock-In"
    body: "Enterprise customers who embed Kiteworks into their FedRAMP Continuous Monitoring (ConMon) compliance workflows face re-certification, re-integration, and staff retraining costs of $100K–$500K+ to switch vendors. This structural lock-in explains why Kiteworks retained the majority of its enterprise accounts even through the Accellion FTA breach — one of the most severe possible adverse events for an enterprise file transfer vendor."
    claimRefs: [CU020, CU021, CU022]

  - calloutType: risk
    title: "Customer Concentration Is Unresolved and Potentially Material"
    body: "With $130M ARR across 3,650+ customers, the average ACV of ~$35K masks a likely bimodal distribution where a small number of large government IDIQ contracts contribute disproportionate revenue. If the top 5 accounts represent >15–20% of ARR, a single non-renewal or government budget cut could materially impact quarterly revenue. This is the highest-priority customer diligence ask."
    claimRefs: [CU024, CU025]

  - calloutType: risk
    title: "Mobile UX Gap vs. Box and SharePoint Limits Commercial Adoption"
    body: "Kiteworks' iOS app rating of 3.8/5 vs. Box (4.7/5) and SharePoint (4.4/5) indicates a meaningful user experience gap in the commercial enterprise segment where mobile-first adoption matters. This limits Kiteworks' ability to compete on user experience in commercial deals where IT departments prioritize employee adoption over compliance depth."
    claimRefs: [CU012, CU013]

  - calloutType: insight
    title: "ownCloud/DRACOON Acquisition Adds 300K+ Accounts but Requires Careful NRR Tracking"
    body: "The ownCloud and DRACOON acquisitions added a European subscriber base of 300K+ accounts. However, these customers operate under a different pricing model (ownCloud subscription vs. Kiteworks SaaS), and their NRR relative to the organic Kiteworks base is unknown. Investors should track acquired vs. organic NRR separately to detect integration-driven churn."
    claimRefs: [CU006, CU019, CU032]

