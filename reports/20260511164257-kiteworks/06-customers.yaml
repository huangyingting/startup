figures:
  - id: FU001
    title: Customer journey map
    type: journey-map
    layout: wide
    summary: "Stages of the enterprise customer lifecycle from initial discovery through full PCN adoption and expansion."
    data:
      nodes:
        - id: discovery
          label: "Discovery"
          detail: "RFP/RFI trigger: compliance mandate (CMMC, HIPAA, FedRAMP). Research: G2, Gartner Peer Insights, analyst comparison sites. Competitive evaluation: Kiteworks vs. MOVEit, Box, Virtru."
          type: input
        - id: evaluation
          label: "Evaluation"
          detail: "POC / pilot: typically 30–90 days. Technical review: FedRAMP ATO, CMMC configuration, DLP integration. Pricing: custom contract negotiation (6–12 month average sales cycle)."
          type: process
        - id: purchase
          label: "Purchase"
          detail: "Contract signed: typically 1–3 year term for commercial; IDIQ/BPA for government. FedRAMP Gov Cloud provisioning or on-premises deployment."
          type: process
        - id: onboarding
          label: "Onboarding"
          detail: "Implementation: 1–3 months (MFT + file sharing); longer for full PCN with email and forms. Professional services engagement. IdP integration, DLP configuration."
          type: process
        - id: production
          label: "Production Use"
          detail: "Active PCN usage: compliance workflows embedded. Audit log available for FedRAMP continuous monitoring. Compliance reporting dashboard in use."
          type: process
        - id: expansion
          label: "Expansion"
          detail: "Add PCN channels: start with MFT → add file sharing → add email encryption → add web forms → add API. CMMC assessment drives channel addition."
          type: output
        - id: renewal
          label: "Renewal / Upsell"
          detail: "Multi-year renewal: high switching cost for FedRAMP/CMMC customers. Upsell: AI governance module (Beta 2024), additional connectors, FedRAMP High when authorized."
          type: output
    approximationNotes: "Customer journey based on publicly available sales cycle information, G2 reviewer implementation timelines, and enterprise SaaS industry norms. Government procurement cycle may differ significantly."
    claimRefs: [CU001, CU002, CU003, CU004, CU005, CU028]

