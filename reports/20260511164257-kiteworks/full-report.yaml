  - id: FE001
    title: Product architecture map
    type: stack
    layout: wide
    summary: Layered architecture of the Kiteworks Private Content Network platform, from infrastructure to governance.
    data:
      layers:
        - label: Governance & Compliance Layer
          detail: >-
            Central policy engine that enforces unified access control, audit logging, and compliance reporting across
            all five PCN content channels.
          modules:
            - Unified audit log (all 5 channels)
            - Compliance reporting engine (FedRAMP, HIPAA, CMMC)
            - Policy enforcement and DLP integration
            - Role-based access control and entitlement management
        - label: PCN Channel Layer (5 Channels)
          detail: >-
            Five content communication channels (MFT, file sharing, encrypted email, web forms, API) each delivering
            content delivery with end-to-end encryption and audit.
          modules:
            - 'MFT Engine: SFTP / FTPS / AS2 / HTTPS automation'
            - 'Secure File Sharing: web portal / mobile / expiring links'
            - 'Encrypted Email: totemo S/MIME + portal delivery'
            - 'Secure Web Forms: encrypted intake / government portals'
            - 'API Data Exchange: REST API with content inspection'
        - label: Security & Encryption Engine
          detail: >-
            FIPS 140-2 validated cryptographic module providing AES-256 at-rest and TLS 1.3 in-transit encryption with
            customer-controlled key management.
          modules:
            - FIPS 140-2 validated AES-256 at rest
            - TLS 1.3 in transit (all channels)
            - 'Key management: customer-controlled keys'
            - Content inspection (ICAP / DLP connectors)
        - label: Integration & Identity Layer
          detail: >-
            Enterprise integration hub connecting identity providers (LDAP/SAML/OIDC), SIEM platforms (Splunk/QRadar),
            and business applications (M365/Salesforce/ServiceNow).
          modules:
            - LDAP / Active Directory / SAML 2.0 / OIDC (SSO)
            - 'SIEM: Splunk, IBM QRadar'
            - 'Business apps: Microsoft 365, Salesforce, ServiceNow'
            - 'DLP: Symantec, Forcepoint, Check Point'
        - label: Deployment & Infrastructure Layer
          detail: >-
            Multi-deployment model supporting cloud (AWS/Azure), FedRAMP GovCloud, on-premises appliance, and hybrid
            topologies for regulated customer environments.
          modules:
            - 'Cloud (AWS / Azure): standard enterprise deployments'
            - 'FedRAMP Gov Cloud (AWS GovCloud): U.S. government'
            - 'On-premises: hardened virtual appliance (customer-managed)'
            - 'Hybrid: split governance across cloud and on-premises'
    approximationNotes: >-
      Architecture inferred from official product documentation, FedRAMP marketplace ATO package structure, and
      integration partner announcements. Internal code architecture is proprietary and not independently verified.
    claimRefs:
      - CE007
      - CE008
      - CE009
      - CE010
      - CE011
      - CE028
