      - number: '8.2'
        title: Financing and Valuation Context
        blocks:
          - type: paragraph
            body: >
              Kiteworks closed a $456M growth equity round in August 2024 at a valuation exceeding $1 billion, achieving
              unicorn status. At an estimated ARR of $200M to $250M (derived by triangulating Latka's $130M plus
              estimate for early 2025 with assumed 25 to 35 percent growth from the 2023 acquisition base), the implied
              enterprise value-to-ARR multiple is approximately 4 to 5 times. This is below the median growth equity
              entry multiple of 8 to 10 times ARR for enterprise SaaS companies growing above 25 percent annually in
              2025. The discount likely reflects one of three scenarios: (1) growth is slower than the company or
              investors have suggested publicly; (2) the round was priced in a compressed multiple environment following
              the 2022 to 2023 SaaS valuation correction; or (3) the preference structure (undisclosed) provides
              investor protection that effectively lowers the economic entry price. All three scenarios require primary
              diligence to resolve.

              No public financial filings exist for Kiteworks as a private company. SEC EDGAR search confirms no
              registered securities offerings. Pitchbook and Craft.co confirm the $1B unicorn valuation mark from the
              2024 round. CBInsights' 2025 cybersecurity unicorn tracker places Kiteworks among the approximately 15
              cybersecurity companies with $1B plus valuations in compliance and data protection. The absence of a
              disclosed cap table means preference overhang from growth equity and earlier rounds (approximately $650M
              total raised) is unquantified. At a $1B exit valuation, the preference stack could absorb most of the
              proceeds depending on liquidation preference multiples and anti-dilution provisions.

              The AWS Marketplace listing provides an additional monetization channel through cloud consumption billing,
              potentially enabling a land-and-expand motion beyond the direct enterprise sales model. Press releases
              confirm ongoing product investment across MFT, secure email, and SFTP server modules. The blog and press
              release archives confirm active company communications through May 2026 with no disclosed adverse
              financial events post-round.
            claimRefs:
              - CV011
