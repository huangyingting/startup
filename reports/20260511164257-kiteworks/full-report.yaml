  productSummary: >
    The Kiteworks Private Data Network (PDN) includes: (1) Managed File Transfer (MFT) — secure large file transfer with
    FIPS 140-2 encryption and audit logging; (2) Email Protection Gateway — S/MIME and content filtering for regulated
    email; (3) Secure File Sharing — enterprise collaboration with policy enforcement; (4) SFTP/FTPS server with
    compliance controls; (5) API and connector integrations with Salesforce, ServiceNow, Microsoft 365, Splunk, and 30+
    enterprise platforms; (6) FedRAMP Gov Cloud dedicated instance for US federal agencies; (7) DRACOON (European
    content management) and totemo (Swiss secure email) subsidiaries for EMEA markets.
  customerFocus: >
    Primary: US federal government agencies requiring FedRAMP Moderate/High authorization; DoD contractors requiring
    CMMC 2.0 and ITAR compliance; healthcare systems under HIPAA; financial services under GLBA. Secondary: EMEA
    enterprises via DRACOON (Germany, Austria, Switzerland) and totemo (Swiss financial services and pharma).
  businessModel: >
    Subscription SaaS revenue for PDN (cloud, on-premises appliance, and hybrid); perpetual/term license for DRACOON and
    totemo enterprise; professional services for FedRAMP, CMMC, and enterprise deployment. On-premises appliance model
    is preferred in air-gapped government environments.
