      - number: '5.3'
        title: Trust, Security, Compliance, and Quality Controls
        blocks:
          - type: paragraph
            body: >
              Kiteworks' trust posture is a central differentiator and primary reason regulated-industry customers
              select the platform. The current compliance certification stack includes: FedRAMP Moderate (authorized,
              active in FedRAMP Marketplace); FedRAMP High (In Process — 3PAO assessment underway as of early 2025);
              CMMC 2.0 (Level 3 readiness, certified through validated configuration); HIPAA (BAA available, verified by
              multiple healthcare customer deployments); SOC 2 Type II (annual report available under NDA); ISO 27001
              (certified); IRAP (Australian government assessment complete, enabling deployment in government-classified
              networks); and ITAR/EAR compliance capability. The FedRAMP Moderate authorization covers the Kiteworks
              standard cloud platform (hosted on AWS); the FedRAMP High In Process certification would cover the
              enhanced air-gapped deployment model required for classified DoD environments. The platform's security
              architecture includes: single-tenancy (no shared infrastructure between customers), air-gap capability for
              classified environments, content inspection via DLP connectors, watermarking for sensitive documents, and
              immutable audit logging for all content exchanges. The Accellion FTA breach (2021) affected the legacy FTA
              product, not the current Kiteworks platform; the breach was caused by a zero-day in the Perl-based legacy
              codebase, which has since been retired. The current platform has no publicly disclosed security
              vulnerabilities of material severity as of May 2026. Bug bounty program is not publicly announced;
              Kiteworks relies on its 3PAO FedRAMP assessment cycle for periodic penetration testing. This creates a gap
              relative to peers that operate public bug bounty programs (HackerOne, Bugcrowd), which provide continuous
              external security scrutiny.
