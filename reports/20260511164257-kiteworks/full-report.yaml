      - number: '5.4'
        title: Product Roadmap and Development Stage
        blocks:
          - type: paragraph
            body: >
              Kiteworks' publicly communicated roadmap for 2025–2026 centers on three themes: (1) AI governance —
              Kiteworks announced a generative AI governance capability in late 2024 that intercepts, logs, and controls
              sensitive content sent to or received from AI models (ChatGPT, Copilot, etc.) as a new PCN channel; (2)
              FedRAMP High completion — the 3PAO assessment was described as "in advanced stages" in early 2025 investor
              communications; and (3) ownCloud/DRACOON integration — consolidating the EMEA product stack into the
              Kiteworks core governance layer. The AI governance product addresses a genuine emerging buyer need
              (regulated enterprises need to control what data employees paste into AI tools) and positions Kiteworks
              ahead of most compliance SaaS competitors in addressing the AI-era data governance problem. This could
              expand the PCN category from file transfer compliance to broader AI data governance, increasing TAM. The
              ownCloud integration is technically complex due to the AGPLv3 licensing constraints: Kiteworks cannot
              distribute AGPLv3 code mixed with proprietary code without making proprietary code open-source, requiring
              careful architectural separation. The totemo email engine is well-integrated as of 2025 (confirmed by
              product documentation showing unified audit trail spanning email and MFT channels). The FedRAMP High
              certification, if completed in 2025, would unlock deployment in classified networks — a large incremental
              revenue opportunity in the DoD/IC market.
