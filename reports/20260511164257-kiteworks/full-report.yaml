              - CV020
      - number: '8.3'
        title: Scenario Analysis
        blocks:
          - type: paragraph
            body: >
              Three scenarios bound the return distribution for an investor entering at the $1B plus valuation. The bull
              case assumes 25 percent or greater ARR compound annual growth, successful FedRAMP High authorization in
              year two of the investment period, net revenue retention of 120 percent or higher, and an exit at 8 times
              ARR from a strategic acquirer (Microsoft, Cisco, or Palo Alto Networks). At $480M to $520M estimated ARR
              at year five and an 8 times multiple, exit valuation reaches $3.8B to $4.2B, implying a 3.7 to 4.0 times
              return on the $1B plus entry value. This scenario requires primary confirmation of existing retention
              metrics and assumes no FTA breach re-emergence or FedRAMP authorization setback.

              The base case assumes 18 to 20 percent ARR CAGR, FedRAMP High authorization in year three, net revenue
              retention of approximately 112 percent, and exit at 6 times ARR from a financial or strategic buyer. At
              $320M to $380M estimated ARR at year five, exit valuation of $1.9B to $2.3B implies a 1.8 to 2.2 times
              return on capital. This scenario is directionally supported by the compliance moat and government
              expansion thesis but depends on unconfirmed NRR. SaaStr data indicates median enterprise SaaS security
              company NRR of 110 to 120 percent in 2025, consistent with the base assumption but not verified for
              Kiteworks specifically.

              The bear case assumes 8 to 12 percent ARR CAGR reflecting FedRAMP High denial or long delay, FTA breach
              re-emergence of claims, net revenue retention at or below 100 percent, and exit at 4 times ARR. At $200M
              to $240M estimated ARR at year five, exit valuation of $800M to $960M represents a 0.8 to 0.9 times return
              — a loss of capital. Probability signals for the bear case include post-investment ARR growth below 15
              percent for two consecutive years, or a competitor achieving FedRAMP High authorization before Kiteworks.
              The bear scenario is plausible but not the modal outcome given the compliance differentiation and
              8-plus-year FedRAMP Moderate track record.
            claimRefs:
              - CV021
