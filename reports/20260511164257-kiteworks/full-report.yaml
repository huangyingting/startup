  - id: FV001
    title: Recommendation Logic
    type: flow
    layout: wide
    summary: >-
      Chain from market scale, product moat, customer proof, and risk assessment to the Track recommendation for
      Kiteworks, with specific conditions required to upgrade to invest.
    claimRefs:
      - CV003
      - CV004
      - CV005
      - CV009
      - CV010
    data:
      nodes:
        - id: market-scale
          label: Market Scale Evidence
          detail: $6-8B TAM; 12-18% CAGR; compliance-driven government and enterprise adoption
          type: input
        - id: product-moat
          label: Product and Compliance Moat
          detail: FedRAMP Moderate since 2017; ITAR, HIPAA, CMMC certifications; multi-year enterprise contracts
          type: process
        - id: customer-proof
          label: Customer and Revenue Proof
          detail: 3,650+ enterprise customers; >$130M ARR (est.); 2+ years profitable; AWS Marketplace listing
          type: process
        - id: fedramp-high
          label: FedRAMP High Catalyst
          detail: In Process March 2026; DoD IL4/IL5 market worth $2-3B; 18-36 months to authorization
          type: input
        - id: risk-assessment
          label: Risk Assessment
          detail: FTA breach tail; FedRAMP High delay risk; NRR unconfirmed; cap table undisclosed
          type: process
        - id: valuation-check
          label: Valuation Assessment
          detail: $1B+ entry at 4-5x estimated ARR; below typical growth equity multiple; supportable if 25%+ growth confirmed
          type: process
        - id: fta-risk
          label: FTA Breach Litigation Tail
          detail: $8.1M settlement; ongoing individual claims; HIPAA BAA exposure; suppresses enterprise win rates
          type: input
        - id: metrics-gap
          label: Unconfirmed Key Metrics
          detail: ARR growth rate, NRR, gross margin not publicly disclosed; Latka estimates directional only
          type: input
        - id: recommendation
          label: 'Recommendation: Track'
          detail: >-
            Await primary confirmation of 2024 ARR growth, NRR, FedRAMP High timeline, and cap table before committing
            capital
          type: output
      edges:
        - from: market-scale
          to: product-moat
        - from: product-moat
          to: customer-proof
        - from: customer-proof
          to: valuation-check
        - from: fedramp-high
          to: risk-assessment
        - from: fta-risk
          to: risk-assessment
        - from: metrics-gap
          to: risk-assessment
        - from: risk-assessment
          to: valuation-check
        - from: valuation-check
          to: recommendation
    approximationNotes: >-
      Logic chain represents the analyst's assessment based on publicly available evidence. Upgrade from Track to Invest
      requires primary confirmation of ARR growth, NRR, and FedRAMP High authorization timeline.
  - id: FV002
    title: Valuation Sensitivity
    type: bar
    layout: standard
    summary: >-
      Illustrative exit valuations across bear, entry, base, and bull scenarios at different ARR and multiple
      combinations. All values are estimated; actual outcomes depend on unconfirmed financial metrics.
    claimRefs:
      - CV021
      - CV022
      - CV023
      - CV024
      - CV025
    data:
      items:
        - label: Bear Exit ($200M ARR × 4x)
          value: 800
        - label: Entry Valuation (2024)
          value: 1050
        - label: Base Exit ($350M ARR × 6x)
          value: 2100
        - label: Bull Exit ($500M ARR × 8x)
          value: 4000
        - label: Strategic Acquirer ($400M ARR × 10x)
          value: 4000
    approximationNotes: >-
      All values in $M. ARR estimates are derived from third-party sources. Multiples are based on comparable public and
      private transactions. Entry valuation of $1,050M is illustrative of $1B+ round price.
  - id: FV003
    title: Valuation / Return Range
    type: range
    layout: standard
    summary: >-
      Low-to-high exit valuation and return ranges under bear, base, and bull scenarios for a 5-year investment hold
      period starting from the $1B+ entry valuation.
    claimRefs:
      - CV021
      - CV022
      - CV023
      - CV024
    data:
      items:
        - label: Bear Exit Valuation ($M)
          low: 750
          high: 960
          unit: $M
        - label: Base Exit Valuation ($M)
          low: 1920
          high: 2280
          unit: $M
        - label: Bull Exit Valuation ($M)
          low: 3200
          high: 4200
          unit: $M
        - label: Implied Return — Bear
          low: 0.7
          high: 0.9
          unit: x
        - label: Implied Return — Base
          low: 1.8
          high: 2.2
          unit: x
        - label: Implied Return — Bull
          low: 3
          high: 4
          unit: x
    approximationNotes: >-
      Ranges reflect bear (low) to bull (high) spread in each scenario. Entry assumed at $1.05B. Returns are gross of
      fees, taxes, and preference waterfall. Preference structure unknown; common equity return could differ materially
      from these gross figures.
  - id: FV004
    title: Investment KPIs
    type: kpi
    layout: standard
    summary: >-
      IC-ready scoring across market, product moat, customer proof, financial metrics, risk, valuation, and evidence
      quality as of May 2026. Scores are the analyst's assessment based on publicly available evidence.
    claimRefs:
      - CV003
      - CV004
      - CV005
      - CV008
      - CV009
      - CV010
      - CV039
    data:
      items:
        - label: Market Score
          value: 7 / 10
          detail: Large TAM ($6-8B); strong compliance tailwind; government expansion catalyst; 12-18% CAGR
        - label: Product / Moat Score
          value: 8 / 10
          detail: FedRAMP Moderate since 2017; ITAR, HIPAA, CMMC; multi-cert platform; high switching costs
        - label: Customer Proof Score
          value: 6 / 10
          detail: 3,650 enterprises confirmed; limited named enterprise proof from public sources; NRR not confirmed
        - label: Revenue / Economics Score
          value: 5 / 10
          detail: '>$130M ARR estimated; ARR growth rate and NRR are not publicly confirmed; gross margin estimated only'
        - label: Risk Score
          value: 5 / 10
          detail: >-
            FTA breach tail; FedRAMP High delay; integration complexity from 3 acquisitions; competitive displacement
            risk
        - label: Valuation Score
          value: 6 / 10
          detail: $1B+ entry at 4-5x estimated ARR; below typical growth equity; justifiable if 25%+ growth confirmed
        - label: Evidence Quality Score
          value: 5 / 10
          detail: Private company; no audited financials; NRR, ARR growth, cap table all unconfirmed from public sources
        - label: Overall IC Score
          value: 6 / 10
          detail: >-
            Track rating: compelling market and moat, but unconfirmed metrics prevent invest recommendation at current
            price
    approximationNotes: >-
      Scores are 1-10 analyst assessments based on publicly available evidence as of May 2026. All scores should be
      updated after primary diligence confirmation. Revenue / Economics and Evidence Quality scores are the primary
      gating factors.
