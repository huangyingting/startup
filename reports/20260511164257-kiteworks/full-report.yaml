  - number: 7
    title: Risks
    sections:
      - number: '7.1'
        title: Regulatory and Legal Risks
        blocks:
          - type: paragraph
            body: >-
              Kiteworks operates under a layered federal regulatory framework that creates both market access
              requirements and liability exposure. The most strategically binding is FedRAMP authorization: Kiteworks
              holds FedRAMP Moderate authorization (confirmed on the FedRAMP marketplace as FRN1600185), enabling sales
              to civilian federal agencies at Moderate impact level. FedRAMP High authorization — required for DoD, IC,
              and agencies processing Controlled Unclassified Information at high impact — has not been publicly
              confirmed, creating a revenue ceiling on sensitive federal accounts until High is achieved, typically a
              12-24 month process requiring a DoD agency sponsor, extensive documentation, and independent assessment.
              Kiteworks markets DoD IL4 authorization in press release materials, but the referenced URL returned a 404
              as of May 2026, limiting independent verification.

              CMMC 2.0, with its final rule published October 2024, mandates that Defense Industrial Base contractors
              handling CUI achieve CMMC Level 2 certification. Kiteworks benefits from this mandate as a
              compliance-positioned MFT platform, but enforcement timeline shifts create customer budget uncertainty.
              HIPAA obligations apply to all healthcare customers using Kiteworks to transmit or store PHI; Kiteworks
              must execute Business Associate Agreements (BAAs) and HHS OCR fines can reach $1.9M per violation category
              per year.

              Litigation risk stems from the Accellion FTA era. Court records show Prescient Data Management LLC v.
              Kiteworks Inc. was filed as a class action; Reuters reported an $8.1M settlement in September 2021. While
              the FTA product has been discontinued, successor liability exposure persists in future security
              litigation. Export Administration Regulations (EAR) apply to Kiteworks encryption software under ECCN
              5E002, requiring license exceptions for certain international sales, creating compliance overhead for
              global expansion.
            claimRefs:
              - CR001
              - CR002
              - CR003
