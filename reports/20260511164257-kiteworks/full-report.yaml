      - number: '6.4'
        title: Retention, Expansion, and Concentration Risk
        blocks:
          - type: paragraph
            body: >
              Kiteworks' customer retention and expansion metrics are not publicly disclosed. The structural
              determinants of retention are strong: FedRAMP and CMMC-compliant customers face regulatory process
              re-certification, re-integration of compliance workflows, and staff retraining costs if they switch
              vendors — creating estimated switching costs of $100K–$500K+ for large deployments. Government multi-year
              contracts (IDIQ, BPA) contractually lock revenue for 2–5 years, reducing voluntary churn risk. The
              Accellion-era customer retention rate through the FTA breach and rebranding — the company retained the
              majority of its enterprise accounts despite the breach — suggests very high switching cost-driven
              retention even in adverse scenarios. Land-and-expand dynamics are favorable: customers typically start
              with one PCN channel (MFT or file sharing) and expand to additional channels as compliance requirements
              grow. The CMMC 2.0 mandate, for example, drives DIB customers to add MFT, email encryption, and web forms
              as they expand their compliance surface. Customer concentration risk is a material unknown: with $130M ARR
              across 3,650+ customers, the average ACV is approximately $35K — but the distribution is likely bimodal,
              with a small number of large government contracts contributing disproportionate revenue. If the top 10
              accounts represent >30% of ARR, a single contract loss or non-renewal could materially impact quarterly
              revenue. This concentration risk is unquantified from public sources and is the key customer diligence
