      - number: '1.5'
        title: Adverse Events and Reputational Risk
        blocks:
          - type: paragraph
            body: >-
              The most significant adverse event in Kiteworks' corporate history is the Accellion File Transfer
              Appliance (FTA) breach of December 2020–February 2021. Threat actors attributed to the FIN11 group (linked
              to the CLOP ransomware gang) exploited four zero-day vulnerabilities in the legacy FTA software
              (CVE-2021-27101, CVE-2021-27102, CVE-2021-27103, CVE-2021-27104) to steal sensitive data from over 100
              organizations worldwide. Victims included Shell, Kroger, Stanford University, the University of California
              system, Singtel, Bombardier, and multiple healthcare systems. The CISA and FBI issued a joint advisory
              (AA21-055A) on the attack. The FTA was a 20-year-old legacy product that Accellion had been encouraging
              customers to migrate away from; its compromise did not affect the newer Kiteworks platform. However, the
              reputational damage was severe, contributing to the decision to rebrand. In January 2022, Accellion agreed
              to an $8.1M class-action settlement, covering approximately 9.2 million affected individuals, without
              admitting wrongdoing. As part of the settlement, the company agreed to retire the FTA product permanently
              and implement enhanced security practices. The breach and settlement serve as an adverse source that
              informs ongoing diligence into the company's security culture and current risk posture.
            claimRefs:
              - CO038
              - CO039
              - CO040
              - CO041
              - CO042
              - CO043
