companyProfile:
  summary: >
    Kiteworks (formerly Accellion) is a Santa Clara, California-based cybersecurity company founded in 1999 and led by
    CEO Jonathan Yaron (since 2016). After a significant data breach in its legacy File Transfer Appliance (FTA) product
    between December 2020 and February 2021 affecting approximately 100 organizations globally, Accellion rebranded to
    Kiteworks in October 2021 and launched the Private Data Network (PDN) — a modernized, FIPS 140-2 validated, FedRAMP
    Moderate authorized platform for secure managed file transfer, email protection, and content governance. Kiteworks
    raised $456M total including a $250M Series D in 2021 from Insight Partners, Sixth Street, Owl Rock, and Northgate
    Capital. The company serves 3,000+ organizations including 600+ in defense and government sectors, with an estimated
    $200M+ ARR (analyst estimate, unconfirmed). Kiteworks holds FedRAMP Moderate authorization and is pursuing FedRAMP
    High (In Process designation ~Q1 2026). The company completed three acquisitions in 2023: ownCloud, DRACOON, and
    totemo, expanding into European enterprise content management. Key differentiators include ITAR compliance support,
    CMMC 2.0 alignment, and 8+ years of FedRAMP Moderate track record.
  foundedDate: '1999-01-01'
  founders:
