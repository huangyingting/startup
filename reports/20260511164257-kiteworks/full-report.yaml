      - number: '1.3'
        title: Funding History, Valuation, and Investor Map
        blocks:
          - type: paragraph
            body: >-
              In August 2024, Kiteworks closed its largest and most significant financing event: a $456M growth equity
              round led by Insight Partners and Sixth Street Growth, valuing the company at over $1 billion and
              conferring unicorn status. The round was structured as a minority investment, providing partial liquidity
              to existing shareholders while funding continued growth, M&A activity, product development, and
              international expansion. The investment represented strong institutional confidence in Kiteworks' position
              as a compliance-driven secure communications platform in a market experiencing rapid regulatory-driven
              demand. As part of the transaction, both investors received board representation. Prior to this round,
              Kiteworks (then operating as Accellion) raised $120M from Bregal Sagemount in April 2020, which had funded
              the platform rebuild and go-to-market expansion that preceded the rebrand. Total capital raised to date
              across all rounds is approximately $650M. Kiteworks is privately held and does not disclose detailed
              financial statements; however, the company has confirmed it has been profitable for multiple consecutive
              years, a notable characteristic for a cybersecurity growth company at this scale. The August 2024 round
              was a partial liquidity event, suggesting it was not a primary capital raise driven by cash need but
              rather a growth acceleration and investor return event.
