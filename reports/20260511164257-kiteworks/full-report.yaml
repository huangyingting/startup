  - number: 1
    title: Company Overview
    sections:
      - number: '1.1'
        title: Identity, History, and Rebrand
        blocks:
          - type: paragraph
            body: >-
              Kiteworks traces its origins to 1999, when the company was founded as Accellion in Singapore, initially
              focused on distributed file storage and large-file sharing for enterprises grappling with email attachment
              limitations. Over the following decade, Accellion expanded its product from basic file transfer into an
              enterprise-grade secure content communications platform. By 2014 the company had reached a $500M
              valuation. In April 2020, Bregal Sagemount invested $120M, enabling an accelerated product build-out and
              sales expansion. The company rebranded from Accellion to Kiteworks in October 2021, distancing itself from
              the Accellion File Transfer Appliance (FTA) legacy product that had been exploited in a major breach
              during December 2020–February 2021, and signaling a broader vision: a Private Content Network (PCN) that
              unifies all sensitive communications channels under one governance and compliance engine. The rebrand also
              reflected the acquisition of totemo (January 2022), ownCloud (November 2023), and DRACOON (November 2023)
              to deepen European market presence and email encryption capabilities. Headquartered at 1510 Fashion Island
              Blvd, San Mateo, California 94404, Kiteworks operates globally with significant European operations built
              through the ownCloud and DRACOON acquisitions in Germany and Switzerland.
