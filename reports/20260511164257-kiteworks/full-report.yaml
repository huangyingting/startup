      - number: '5.2'
        title: Technical Architecture and Operating Model
        blocks:
          - type: paragraph
            body: >
              Kiteworks' technical architecture centers on a hardened virtual appliance running as a Linux-based VM that
              customers deploy in their own cloud environment (AWS, Azure, or on-premises) or in Kiteworks' managed
              FedRAMP Gov Cloud (hosted on AWS GovCloud). The appliance model means: (a) customer data is encrypted at
              rest and in transit within the customer's own cloud boundary; (b) Kiteworks' operational team does not
              have direct access to customer data (a critical requirement for FedRAMP High and classified environments);
              and (c) each customer deployment is logically isolated. Encryption uses FIPS 140-2 validated cryptographic
              modules (AES-256 for data at rest, TLS 1.3 for data in transit). The platform integrates with identity
              providers via LDAP/Active Directory, SAML 2.0, and OpenID Connect for SSO. Content-layer integrations
              include SIEM (Splunk, IBM QRadar), DLP (Symantec, Forcepoint, ICAP), endpoint protection, and business
              applications (Microsoft 365, Salesforce, ServiceNow). The MFT engine supports all major file transfer
              protocols: SFTP, FTPS, FTPS, HTTPS, AS2, OFTP2, and NFS. The email encryption engine (totemo) operates as
              a separate appliance that integrates with the PCN governance layer, supporting S/MIME, OpenPGP, and a
              proprietary secure portal delivery mode for non-email-capable recipients. The ownCloud component (EMEA
              deployments) uses the ownCloud core (AGPLv3) wrapped in Kiteworks' enterprise licensing and governance
              overlay. Key technical dependencies include AWS GovCloud for FedRAMP deployments, the Kiteworks-developed
              compliance reporting database (proprietary), and the totemo email engine (proprietary). The architecture
              does not have a meaningful open-source community presence; all platform code is proprietary or built on
              licensed open-source components (ownCloud AGPLv3, Linux kernel, OpenSSL).
            claimRefs:
              - CE007
              - CE008
              - CE009
              - CE010
              - CE011
              - CE012
