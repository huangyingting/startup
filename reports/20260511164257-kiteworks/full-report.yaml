      - number: '1.2'
        title: Leadership, Governance, and Key Personnel
        blocks:
          - type: paragraph
            body: >-
              Jonathan Yaron serves as Chairman and CEO of Kiteworks as of 2026, having joined the company in 2015
              initially as an advisor and chairman before taking operational control during a critical turnaround
              period. Under Yaron's leadership, Kiteworks transformed from a struggling legacy file-transfer company
              into a profitable, fast-growing cybersecurity platform serving thousands of regulated enterprises
              worldwide. Tim Freestone serves as Chief Marketing Officer, driving the company's messaging and brand
              positioning in the content security space. Yaron Galant holds the role of Chief Product Officer,
              overseeing product strategy and roadmap for the PCN platform. Frank Balonis serves as Senior Vice
              President, Operations and CISO, responsible for the security posture of the company itself. Michael Lee
              serves as Senior Vice President, Finance, managing the company's financial operations. Camilo
              Artiga-Purcell is General Counsel. Dario Perfettibile leads European Operations as VP & GM. As part of the
              August 2024 growth equity round, Insight Partners and Sixth Street Growth placed representatives on
              Kiteworks' board of directors, providing governance oversight alongside the existing management team. The
              company's leadership is geographically distributed, with Israeli technical founders and management, a
              US-based executive leadership team, and European operational management for the EMEA region.
