  - id: TV005
    title: Thesis-Break and Kill Triggers Table
    columns:
      - Trigger
      - Threshold
      - Transmission to Thesis
      - Action Implication
    rows:
      - - FedRAMP High Authorization Denied
        - Authorization denial or indefinite suspension by PMO before year 3 of hold
        - Eliminates government growth thesis; DoD IL4/IL5 market access lost; 20-35% ARR concentration at risk
        - Immediate position review; initiate exit discussion if no alternative government market path exists
      - - ARR Growth Falls Below 15% for Two Consecutive Periods
        - Post-investment ARR CAGR below 15% YoY for two reporting periods
        - Return model falls to bear case; exit multiple contracts at slower growth premium; 0.8-0.9x return scenario
        - Demand management presentation with cohort-level NRR data; re-underwrite at new base ARR
      - - Competitor Achieves FedRAMP High Authorization First
        - Progress MOVEit or Fortra GoAnywhere receives FedRAMP High ATO from PMO before Kiteworks
        - First-mover advantage in DoD IL4/IL5 eroded; government sales cycle elongates; competitive moat narrows
        - Reassess government strategy; determine if Kiteworks can capture meaningful share post-competitor entry
      - - FTA Breach Litigation Amplification
        - New individual judgment >$50M or HIPAA OCR civil money penalty exceeds $10M against Kiteworks
        - Financial exposure exceeds manageable range; reputational damage accelerates churn in healthcare vertical
        - >-
          Demand legal opinion on total remaining exposure; require reserve disclosure; re-underwrite risk-adjusted
          valuation
      - - NRR Falls Below 100% for Organic Cohort
        - >-
          Net revenue retention for pre-2023 organic customer cohort falls below 100% gross on two consecutive
          measurements
        - >-
          Fundamental churn inconsistent with multi-year enterprise contract thesis; acquisition may be masking organic
          erosion
        - Trigger immediate position review; demand organic cohort separation from M&A-acquired base in reporting
    notes: >-
      Triggers are designed to be specific and monitorable. Each threshold should be tracked quarterly. Action
      implications escalate from watch to review to exit depending on duration and severity of breach.
    claimRefs:
      - CV039
      - CV040
  - id: TV006
    title: Final Diligence Asks Table
    columns:
      - Topic
      - Missing Evidence
      - Why It Matters
      - Owner / Diligence Path
    rows:
      - - 2024 ARR and Revenue Growth Rate
        - No public disclosure of 2023-2024 ARR or YoY growth; Latka estimate directional only at >$130M
        - Directly determines if $1B valuation is supportable; 25% growth required for base return scenario
        - Management presentation; audited financial statements 2023-2024; independent ARR confirmation from CFO
      - - Net Revenue Retention by Cohort
        - NRR not disclosed; no analyst coverage of cohort retention; Latka provides aggregate ARR directional only
        - NRR >110% required to validate multi-year contract durability; sub-100% NRR is a thesis-break
        - >-
          Customer cohort analysis in management presentation; CFO presentation; reference checks with post-renewal
          customers
      - - FedRAMP High Authorization Timeline
        - PMO In Process designation confirmed; specific authorization timeline not publicly disclosed
        - Government growth thesis depends on High authorization; 18-36 months typical; competitor risk during gap
        - 3PAO assessment schedule and milestones; PMO correspondence review; FedRAMP marketplace status monitoring
      - - Cap Table and Liquidation Preference
        - No public disclosure of share classes, preference stack, or anti-dilution provisions from $456M round
        - Preference overhang could reduce common equity upside at exits below $2B valuation significantly
        - Term sheet and shareholder agreement review; outside counsel analysis of downside scenario returns by class
      - - FTA Litigation Tail — Remaining Exposure Quantification
        - Individual plaintiff cases not publicly quantified; D&O and cyber insurance coverage extent unknown
        - If total remaining exposure exceeds $100M, it is a material balance sheet risk to the equity value
        - Legal due diligence; outside counsel opinion on remaining open claims; D&O and cyber liability schedule review
      - - CMMC Level 2 C3PAO Assessment Status
        - No public disclosure of C3PAO independent assessment of Kiteworks' own operations and infrastructure
        - >-
          Required for credibility with DoD contractor customers; self-attestation insufficient post-2026 CMMC
          enforcement
        - >-
          Demand C3PAO assessment certificate or letter of completion from authorized assessor; verify with
          accreditation body
    notes: >-
      Diligence asks are ranked by materiality to the investment decision. Items 1-3 (ARR growth, NRR, FedRAMP High) are
      primary gating items before an invest recommendation. Items 4-6 are confirmatory but material to risk-adjusted
      valuation.
    claimRefs:
      - CV037
      - CV038
      - CV039
      - CV040
