      - number: '7.2'
        title: Operational and Security Risks
        blocks:
          - type: paragraph
            body: >-
              The highest-severity operational risk is Kiteworks exposure as a member of the MFT threat class. CISA
              Advisory AA21-055A documented that Accellion FTA was exploited by FIN11/CLOP using four zero-day CVEs
              (CVE-2021-27101 through CVE-2021-27104) affecting approximately 300 organizations. Kiteworks has
              explicitly decommissioned the FTA product and markets its platform as a distinct architecture, but no
              independent public security audit confirming this separation has been identified as of May 2026.

              The MFT category remains under sustained adversarial pressure. MOVEit Transfer (Progress Software)
              suffered a critical zero-day (CVE-2023-34362) exploited by CLOP in May-June 2023, with Wired reporting
              over 2,500 organizations globally affected. GoAnywhere MFT (Fortra) suffered a CLOP-attributed zero-day in
              early 2023 affecting 130+ organizations. These incidents validate the category-level threat: CLOP/FIN11
              systematically targets MFT platforms as high-value data exfiltration vectors, regardless of individual
              vendor architecture. Kiteworks faces reputational spillover risk from each MFT industry breach. CISA Known
              Exploited Vulnerabilities catalog tracks MFT platform CVEs across multiple vendors; the absence of current
              Kiteworks CVEs in the KEV catalog cannot be independently verified from public research alone.

              Operational uptime risk is material for government customers requiring 99.99%+ SLA commitments. AI content
              inspection features create new data processing risk if file content is not properly isolated from
              inference model pipelines. Open-source component dependencies (OpenSSL, file-parsing libraries) require
              rapid patch management to maintain FedRAMP compliance SLAs.
            claimRefs:
