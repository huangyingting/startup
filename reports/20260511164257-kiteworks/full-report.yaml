      - number: '3.3'
        title: Pricing, Packaging, and Go-to-Market Comparison
        blocks:
          - type: paragraph
            body: >
              Kiteworks competes primarily through a subscription SaaS model with pricing based on user count, connector
              count, and deployment model (cloud, on-premises, hybrid, or FedRAMP Gov Cloud). Kiteworks does not publish
              list pricing publicly, but third-party databases and resellers indicate entry pricing typically starts at
              $30K–$50K annually for small deployments. Enterprise deals regularly exceed $100K–$500K per year for
              organizations requiring full platform capabilities. Progress MOVEit uses a perpetual license plus
              maintenance model for on-premises and a subscription for cloud; pricing is publicly documented for smaller
              tiers at approximately $5K–$50K per year for MOVEit Transfer. Axway AMPLIFY MFT pricing is typically
              enterprise contract only, with deals frequently in the $100K–$500K range for large deployments. IBM
              Sterling pricing is opaque and negotiated directly, generally in the $200K–$1M+ range for large financial
              services deployments. Fortra GoAnywhere MFT offers the most transparent pricing, starting at approximately
              $4K per year for the base product, making it the lowest-cost enterprise MFT alternative. Box Business
              starts at $15/user/month, competing at the user-count level rather than the MFT workflow level. Microsoft
              SharePoint is included in M365 Business plans at $22/user/month, effectively free as an incremental item.
              Kiteworks' pricing discipline creates a premium positioning: it charges 2x–5x Fortra's entry price,
              requiring a clear compliance-value demonstration during sales. The company's FedRAMP Gov Cloud premium is
              typically 20–30% above standard SaaS pricing to reflect the compliance infrastructure overhead.
