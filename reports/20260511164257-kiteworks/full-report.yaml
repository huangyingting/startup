      - number: '3.2'
        title: Feature and Capability Comparison
        blocks:
          - type: paragraph
            body: >
              Comparing Kiteworks against its primary competitors across the features that regulated buyers prioritize
              reveals that Kiteworks holds a differentiated position in compliance coverage and channel unification,
              while individual point-solution competitors often exceed Kiteworks on depth within their primary category.
              Progress MOVEit is strong on enterprise MFT throughput, protocol support, and AS2/SFTP automation, but
              lacks native encrypted email, FedRAMP High capability (in process), and a unified compliance dashboard.
              Axway AMPLIFY MFT leads on API management and EDI integration but has limited compliance governance
              outside the MFT channel. IBM Sterling Connect:Direct is deeply embedded in financial services batch
              workflows but runs primarily on-premises and is expensive to maintain. Fortra GoAnywhere MFT offers strong
              automation and competitive pricing but suffered a zero-day exploitation in January 2023 that affected its
              compliance credibility. Box excels on user experience and collaboration features but lacks native MFT
              automation and relies on third-party integrations for compliance workflows. Virtru differentiates on
              client-side encryption and Google Workspace integration but is a point solution without MFT or SFSC
              capabilities. Microsoft SharePoint/OneDrive wins on ubiquity and M365 integration but requires significant
              additional configuration for FedRAMP or CMMC compliance and lacks native MFT automation. Kiteworks'
              differentiators include: (1) the only platform unifying all five channels (MFT, file sharing, email, web
              forms, API) under one compliance dashboard; (2) FedRAMP Moderate authorized, with FedRAMP High In Process
              — a significant lead over most competitors; (3) CMMC 2.0 certified readiness out of the box; (4) IRAP
              certification for Australian government; and (5) EU data residency via the ownCloud/DRACOON stack acquired
              in 2023. Kiteworks' limitations include higher total cost of ownership versus single-category competitors,
              implementation complexity from the multi-channel architecture, and the reputational hangover from the
              Accellion FTA breach.
