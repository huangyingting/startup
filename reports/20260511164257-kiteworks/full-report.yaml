  - number: 5
    title: Product & Technology
    sections:
      - number: '5.1'
        title: Product Definition and Channel Architecture
        blocks:
          - type: paragraph
            body: >
              Kiteworks defines its core product as a Private Content Network (PCN), a term it coined to describe the
              consolidation of previously siloed sensitive-content communication channels into a single
              governance-controlled platform. The five PCN channels are: (1) Managed File Transfer (MFT) —
              enterprise-grade SFTP, FTPS, FTPS, AS2, and HTTPS-based automated file transfer with scheduling,
              event-driven triggers, and compliance logging; (2) Secure File Sharing (SFSC) — web-based and mobile file
              sharing with granular access controls, expiration, and watermarking; (3) Encrypted Email — end-to-end
              encrypted email delivery via the totemo engine, supporting S/MIME and proprietary portal delivery for
              large attachments; (4) Secure Web Forms — encrypted data intake forms for government portals and regulated
              industry intake workflows; and (5) API Data Exchange — REST API for programmatic content exchange with
              external parties, with content inspection and DLP integration. All five channels feed into a shared
              compliance and audit engine that generates unified content tracking records (who sent what to whom, when,
              from which channel, with what encryption) for regulatory reporting. The platform is delivered as a
              hardened virtual appliance (not multi-tenant SaaS), which simplifies compliance certification and data
              residency but requires more deployment overhead than standard cloud SaaS. The "hardened virtual appliance"
              model predates Kiteworks' rebranding and reflects Accellion's original enterprise file transfer product
              architecture — a design choice that ensures data never transits Kiteworks' own infrastructure but
              introduces deployment complexity and customer-managed upgrade obligations.
            claimRefs:
              - CE001
              - CE002
