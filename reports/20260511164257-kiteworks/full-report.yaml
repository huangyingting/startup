      - number: '1.4'
        title: Scale, Metrics, and Business Model
        blocks:
          - type: paragraph
            body: >-
              Kiteworks operates on a subscription SaaS model with no professional services revenue disclosed
              separately, meaning its ARR and total revenue are closely aligned. As of early 2025, the company disclosed
              ARR exceeding $130M, with continued growth driven by new customer acquisition, upsell of additional
              compliance modules, and geographic expansion in Europe. As of March 2026, the company employed
              approximately 365 people, up from approximately 332 in early 2025, representing roughly 10% year-on-year
              headcount growth. The company serves 3,650+ enterprise and government customers across regulated
              industries, with its platform protecting more than 100 million end users. Kiteworks' business model
              monetizes through per-seat or per-connector subscription licensing, with pricing tiers aligned to
              compliance requirements and deployment model (on-premises, private cloud, hybrid, or FedRAMP Gov Cloud).
              The company's acquisition strategy targets subscription-based businesses with ARR between $5M and $60M,
              with management indicating bullishness on executing multiple deals per year to expand the platform and
              geographic reach. This inorganic growth layer complements organic ARR growth and broadens the addressable
              market. Key metrics remain private, including net revenue retention, gross margin, and churn rates,
              representing material evidence gaps for diligence purposes.
