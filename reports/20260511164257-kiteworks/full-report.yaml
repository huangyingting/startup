              - CV036
      - number: '8.5'
        title: Exit Readiness, Thesis Breaks, and Diligence Asks
        blocks:
          - type: paragraph
            body: >
              Exit readiness is constrained by three unresolved items. First, without public financial disclosure,
              Kiteworks cannot access public equity markets; IPO readiness requires at minimum two to three years of
              audited financials, a clear path to GAAP profitability, and an investor relations infrastructure. The CEO
              has confirmed profitability for more than two years, which is necessary but not sufficient for IPO. The
              earliest plausible IPO window is 2028 to 2030, consistent with Insight Partners' typical 7 to 10 year
              investment horizon. Second, the strategic acquisition path depends on the FedRAMP High authorization
              catalyst and continued ARR growth above 20 percent, both of which require primary confirmation. Third, the
              FTA breach legacy creates an acquisition due diligence risk: acquirers will require full disclosure of
              remaining litigation and insurance coverage.

              Thesis-break triggers are specific and monitorable. A FedRAMP High authorization denial or indefinite
              suspension eliminates the government growth thesis immediately. Post-investment ARR growth falling below
              15 percent for two consecutive reporting periods triggers a re-underwrite at a lower entry valuation. A
              competitor achieving FedRAMP High authorization before Kiteworks erodes the first-mover advantage. FTA
              breach litigation amplification above $50M in new individual judgments or HIPAA OCR civil money penalties
              creates material balance sheet risk. Any of these triggers requires immediate position review and should
              be monitored quarterly.

              Primary diligence asks are concentrated in five areas: confirmed ARR growth rate for 2023 and 2024; net
              revenue retention by customer cohort (pre-acquisition organic versus acquired); FedRAMP High authorization
              timeline with specific PMO correspondence; cap table and liquidation preference structure from the $456M
              round; and full disclosure of remaining FTA breach litigation and insurance coverage. Without these data
              points, the $1B plus entry cannot be underwritten to any of the three return scenarios with statistical
              confidence. The recommendation remains Track until primary source confirmation is obtained.
            claimRefs:
