summary:
  headline: >-
    Kiteworks 是合规级 private content network 龙头：已盈利、ARR 增至 $130M+，并拥有可防守的 FedRAMP 护城河；但 Accellion
    数据泄露遗留问题和未经审计的财务画像，要求投资人做严格尽调。
