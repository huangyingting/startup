callouts:
  - calloutType: strength
    title: "Progress MOVEit and Fortra GoAnywhere Breaches Created Displacement Tailwind"
    body: "The June 2023 Progress MOVEit mass exploitation (affecting thousands of organizations) and the January 2023 Fortra GoAnywhere zero-day — both attributed to CLOP — materially damaged two of Kiteworks' primary MFT competitors and accelerated competitive displacement evaluations. This adverse event for competitors created a direct tailwind for Kiteworks in 2023–2024 sales cycles."
    claimRefs: [CP005, CP006, CP029]

  - calloutType: risk
    title: "Kiteworks' Accellion FTA History is a Competitive Liability"
    body: "The same CLOP group that breached MOVEit and GoAnywhere previously exploited the Accellion FTA. Kiteworks' legacy FTA breach is frequently raised in competitive RFPs as a disqualifying factor, particularly in IC and DoD accounts that conduct deep vendor security background checks."
    claimRefs: [CP030, CP031]

  - calloutType: insight
    title: "Microsoft's M365 Bundling Is the Largest Structural Constraint on Commercial Pricing"
    body: "Microsoft SharePoint/OneDrive is the most widely deployed status-quo alternative at zero incremental cost. Kiteworks must win commercial deals by demonstrating compliance depth that M365 alone cannot deliver — a value proposition that narrows in commercial segments as Microsoft adds GCC High features but remains strong in government and regulated enterprise."
    claimRefs: [CP004, CP020, CP021]

