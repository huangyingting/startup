  topStrengths:
    - >-
      FedRAMP Moderate authorization since 2017 with zero revocations — the deepest compliance moat in secure MFT;
      estimated 3-5 years and $50M+ for any competitor to replicate
    - >-
      3,650+ enterprise customers including government, defense, healthcare, and financial services; multi-year
      contracts and structural switching costs support high NRR
    - >-
      Two consecutive years of profitability (company-stated) at $130M+ ARR — uncommon in cybersecurity growth companies
      at this stage
    - >-
      $456M August 2024 growth equity from Insight Partners and Sixth Street Growth at $1B+ valuation validates platform
      thesis and provides acquisition runway
    - >-
      PCN platform unifies five formerly disparate compliance workflows (MFT, email, file sharing, forms, eSignature)
      into a single governance-auditable platform
    - >-
      FedRAMP High In Process as of February 2025 unlocks DoD IL4/IL5 programs — an estimated $500M+ total addressable
      contract opportunity
  topRisks:
    - >-
      Accellion FTA breach legacy (2020-2021): $8.1M class-action settlement resolved; residual HIPAA OCR and individual
      plaintiff exposure remain as unquantified tail risk
    - >-
      Unaudited financials: all ARR, growth, and profitability figures are company-stated or third-party estimates;
      gross margin, NRR, and churn are undisclosed
    - >-
      FedRAMP High authorization delay: In Process to ATO typically takes 18-36 months; a competitor achieving FedRAMP
      High first weakens the government expansion narrative
    - >-
      M&A integration risk: ownCloud GmbH, DRACOON GmbH, and totemo AG acquired in 2022-2023 at undisclosed prices;
      integration complexity and technical debt are unverified
    - >-
      Microsoft bundling: Defender for Office 365, Purview, and Azure Information Protection compete with PCN modules in
      M365 E5 enterprise bundles
    - >-
      Key-person concentration: Jonathan Yaron has led the transformation since 2015; departure would materially affect
      strategy execution and investor confidence
  unresolvedGaps:
    - 'Audited financials: gross margin, ARR growth rate, NRR, churn, and operating cash flow not publicly available'
    - FedRAMP High authorization timeline and current PMO review stage not publicly disclosed
    - Acquisition pricing and integration ROI for ownCloud GmbH and DRACOON GmbH undisclosed
    - >-
