    category: adverse-evidence
    signal: medium
    impact: medium
    description: Market saturation indicators, pricing pressure trends, and commoditization evidence are not systematically
      tracked.
    whyNotClosed: Requires longitudinal analysis of deal sizes, sales cycles, competitive discounting, and market share shifts.
    diligencePath: Track Kiteworks average contract value (ACV) trends, discount rates by quarter, and sales cycle duration
      as proxies for pricing pressure.
    relatedQuestionRefs:
