  - id: GM001
    category: market-sizing
    signal: medium
    impact: high
    description: Primary TAM/SAM/SOM sizing based on Kiteworks-specific buyer research and win/loss analysis is unavailable.
      Current estimates rely on aggregating generic analyst categories with uncertain boundaries.
    whyNotClosed: Requires access to Kiteworks internal market research, sales data segmentation by vertical and use case,
      and competitive win/loss attribution.
    diligencePath: Request Kiteworks sales pipeline analysis by vertical, average deal size by segment, win rate vs competitor
      categories, and any commissioned market research or buyer surveys.
    relatedQuestionRefs:
    - QM001
    - QM002
    - QM003
  - id: GM002
    category: growth-rate
    signal: low
    impact: medium
    description: 2026-specific market growth forecast is unavailable. Most analyst reports provide 2021-2030 projections without
      granular annual estimates.
    whyNotClosed: Analyst reports focus on multi-year CAGRs rather than year-over-year growth. Current-year forecasts require
      subscription access to latest reports.
    diligencePath: Obtain latest Gartner, IDC, or Forrester quarterly updates for 2025-2026 security market forecasts. Monitor
      Kiteworks pipeline velocity as leading indicator.
    relatedQuestionRefs:
    - QM021
  - id: GM003
    category: buyer-economics
    signal: medium
    impact: medium
    description: Detailed budget allocation patterns (security vs compliance vs collaboration) and deal size distribution
      by buyer persona are not validated with primary data.
    whyNotClosed: Relies on general enterprise security budget patterns rather than Kiteworks-specific customer data.
    diligencePath: Interview Kiteworks sales and customer success for budget source breakdown by vertical. Review contract
      data for department-level buyer attribution.
    relatedQuestionRefs:
    - QM006
  - id: GM004
    category: competitive-dynamics
    signal: high
    impact: critical
    description: Win/loss rates against incumbent bundlers (Microsoft, Google) and feature-gap analysis for compliance capabilities
      are unavailable.
    whyNotClosed: Requires Kiteworks competitive intelligence data and structured win/loss analysis programs.
    diligencePath: Request Kiteworks win/loss analysis by competitor type. Conduct buyer interviews to assess feature parity
      and switching decision drivers.
    relatedQuestionRefs:
    - QM016
    - QM025
  - id: GM005
    category: adoption-metrics
    signal: medium
    impact: medium
    description: User adoption rates, time-to-value metrics, and deployment success rates are not quantified with customer
      data.
    whyNotClosed: Customer success metrics and product usage analytics are internal to Kiteworks.
    diligencePath: 'Request Kiteworks customer health metrics: active user %, time to first value, deployment duration distribution,
      and churn by cohort.'
    relatedQuestionRefs:
    - QM010
    - QM018
