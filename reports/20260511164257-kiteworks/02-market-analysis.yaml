tables:
- id: TM001
  title: Market Definition and Boundary
  enumerationScope:
    coverage: exhaustive
    basis: Categories defined based on Kiteworks platform capabilities, analyst market taxonomy, and buyer budget allocation
      patterns.
  columns:
  - Category
  - Included Spend
  - Excluded Spend
  - Primary Buyer
  - Relevance to Kiteworks
  rows:
  - - Secure File Sharing (EFSS)
    - Enterprise file sync/share with security and compliance features
    - Consumer file sharing (Dropbox personal, Google Drive free)
    - IT/Security
    - Core product category
  - - Managed File Transfer (MFT)
    - Automated B2B file transfer with audit and encryption
    - Ad-hoc email attachments
    - IT Operations
    - Consolidation opportunity
  - - Data Governance
    - Policy enforcement, classification, retention for content
    - General data governance (databases, warehouses)
    - Compliance/Legal
    - Value-add capability
  - - Email Encryption
    - Secure message/attachment delivery to external parties
    - Internal email security
    - IT/Security
    - Partial displacement
  - - Data Loss Prevention (DLP)
    - Content inspection and policy enforcement for file sharing
    - Network DLP, endpoint DLP
    - Security
    - Integrated capability
  sourceRefs:
  - SM003
  - SM004
  - SM016
  - SM017
  - SM018
  - SM019
  notes: Market boundary defined by analyst and industry coverage as of May 2026; adjacencies and substitute spend are estimates
    based on public analyst reports (Gartner, IDC, Forrester).
