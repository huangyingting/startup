  evidenceGaps:
    - type: missing-source
      severity: critical
      topic: "GreyOrange annual revenue and ARR entirely undisclosed"
      missingEvidence: >-
        No public source discloses GreyOrange's annual revenue, ARR, or any financial performance metric.
        The company is a private entity with no SEC filing obligation, and management has not disclosed
        revenue in any press release, analyst briefing, or industry conference presentation accessible
        from public sources. All revenue estimates in this report are analyst-inferred with very low
        confidence.
      whyItMatters: >-
        Without disclosed revenue, the company's $1.2B valuation cannot be assessed as a multiple;
        growth trajectory is invisible; software pivot success cannot be quantified; and runway
        analysis is entirely speculative. Revenue is the single most important financial metric.
      diligencePath: >-
        Request audited financial statements (income statement, balance sheet, cash flow) under NDA
        from GreyOrange management. Use per-site revenue and ACV data as cross-checks.
      relatedQuestionRefs:
        - QI001
        - QI009
      relatedTableRefs:
        - TI001
        - TI005

    - type: missing-source
      severity: critical
      topic: "Gross margin by segment (hardware, software, services) entirely undisclosed"
      missingEvidence: >-
        GreyOrange does not disclose gross margin for any revenue segment. The margin differential between
        hardware (estimated 20%–35%) and software (estimated 65%–78%) is the primary financial quality
        variable, and the blended margin is unknowable without revenue mix disclosure.
      whyItMatters: >-
        Gross margin determines operating leverage, scalability, and long-term profitability. A company
        earning 25% blended gross margin is fundamentally different from one earning 55%. The software
        pivot thesis is value-creative only if software gross margin materially exceeds hardware margin.
      diligencePath: >-
        Request product-line P&L from management. Cross-reference with comparable public WES/WMS company
        gross margins (Manhattan Associates, Zebra Technologies) as benchmarks.
      relatedQuestionRefs:
        - QI003
        - QI022
      relatedTableRefs:
        - TI003
        - TI005

    - type: missing-source
      severity: critical
      topic: "Net revenue retention (NRR) for GreyMatter SaaS entirely undisclosed"
      missingEvidence: >-
        GreyOrange does not disclose NRR for the GreyMatter platform. NRR is the most important SaaS
        financial quality metric. Without it, it is impossible to assess whether the SaaS revenue base
        is compounding (NRR >100%) or declining (NRR <100%), or whether the 3,000+ sites represent
        stable or churning customer relationships.
      whyItMatters: >-
        Enterprise SaaS companies with NRR above 120% command premium valuations because they grow
        within the existing customer base without additional acquisition spend. If GreyOrange's NRR is
        below 100%, the software pivot thesis faces a structural revenue quality problem that cannot be
        addressed by new logo growth alone.
      diligencePath: >-
        Request cohort revenue analysis and NRR calculation from management. Ask for churn rate and
        expansion revenue data by product line and customer segment.
      relatedQuestionRefs:
        - QI008
        - QI028
      relatedTableRefs:
        - TI003
        - TI005

    - type: missing-source
      severity: material
      topic: "Cash position, burn rate, and runway entirely undisclosed since September 2022"
      missingEvidence: >-
        No public source confirms GreyOrange's current cash position, annual operating cash burn, or
        remaining runway from the September 2022 $135M raise. The four-year gap since the last disclosed
        funding round is the longest known gap in the company's history, and may reflect financial
        self-sufficiency or near-term capital pressure — both scenarios are consistent with the available
        public data.
      whyItMatters: >-
        Capital adequacy is the most urgent near-term risk dimension for a late-stage private company.
        If GreyOrange is approaching cash exhaustion and cannot raise additional capital at an
        acceptable valuation, it faces financial distress — as illustrated by Locus Robotics in 2024.
      diligencePath: >-
        Request balance sheet and cash flow statement from management. Track hiring and headcount trends
        as indirect burn indicators. Monitor for any undisclosed bridge financing or secondary transactions.
      relatedQuestionRefs:
        - QI005
        - QI024
        - QI025
      relatedTableRefs:
        - TI004
        - TI005

    - type: private-evidence-only
      severity: material
      topic: "Customer concentration and ACV distribution unknown"
      missingEvidence: >-
        GreyOrange discloses 3,000+ active sites but does not disclose customer count, top-customer
        revenue concentration, or the distribution of contract sizes (ACV). It is unknown whether
        revenue is distributed across hundreds of small customers or concentrated in a handful of
        large enterprises (e.g., top 10 customers > 50% of revenue).
      whyItMatters: >-
        High customer concentration dramatically increases churn risk; if one or two enterprise
        customers represent 20%+ of revenue each, losing either would be a material financial event.
        Conversely, a distributed customer base with high NRR is a strong financial quality indicator.
      diligencePath: >-
        Request anonymized customer revenue concentration table (top 10 customers as % of total revenue).
        Ask for logo retention data and ARR waterfall showing expansion vs. churn vs. new logos.
      relatedQuestionRefs:
        - QI009
        - QI027
      relatedTableRefs:
        - TI005

acknowledgedWarnings:
  - dimension: paywallRisk
    reason: >-
      High-reputation financial and industry sources including PitchBook, Bloomberg, Reuters, WSJ, CB
      Insights, Financial Express, Inc42, and MHI were inaccessible during research due to paywalls,
      bot-blocking, or HTTP errors. Their content is documented as access-blocked in the evidence gap.
      The 15 sources with confirmed access (ok status) include GreyOrange's own website, official SEC
      EDGAR filings, three confirmed partner press releases (Kenco, Dematic, Zebra), and GreyOrange's
      own press release pages. Paywalled sources are cited only where their content is referenced in
      publicly accessible secondary materials or where the source identity itself (e.g., PitchBook
      funding record) is the relevant citation rather than article text. This paywall exposure is
      inherent to public research without institutional subscriptions and is documented in evidence gap
      EI005 (Revenue and P&L inaccessibility).
