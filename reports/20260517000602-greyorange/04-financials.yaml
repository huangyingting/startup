  - id: SI-section-2
    title: "Capital Formation, Funding History, and Valuation"
    body: >-
      GreyOrange has raised approximately $305M in disclosed venture capital across multiple rounds.
      The company's publicly known funding milestones are as follows: an early-stage raise from
      Blume Ventures, a $170M Series C closed in March 2019 led by Mithril Capital with participation
      from Tiger Global Management and Binny Bansal (co-founder of Flipkart), which valued the company
      at approximately $1 billion — making it one of India's first robotics unicorns. The most recent
      disclosed round was a $135M raise in September 2022 led by new and existing investors at a
      post-money valuation of approximately $1.2 billion, an incremental step-up from the 2019 unicorn
      valuation. As of May 2026, the company has not disclosed any additional fundraising, representing
      a nearly four-year gap since the last round.

      The $1.2B valuation at the September 2022 round implies a post-money enterprise value approximately
      3.9x the total disclosed capital raised. In the context of comparable late-stage private software
      and robotics companies in 2022, a $1.2B valuation was moderately conservative relative to the
      revenue multiples that pure-play SaaS companies commanded at the time; however, the warehouse
      robotics sector was already experiencing a valuation reset by mid-2022 following the 2021 peak.
      Locus Robotics — a direct AMR peer that had also raised over $400M in venture capital — saw its
      valuation collapse and filed for assignment for the benefit of creditors in early 2024, offering
      a cautionary precedent for the capital intensity and burn risk of hardware-heavy robotics business
      models that fail to reach profitability.

      GreyOrange's 2022 capital raise of $135M was positioned as a growth financing to accelerate global
      expansion, product development on the GreyMatter platform, and go-to-market scaling. The company
      has since secured significant strategic partnership agreements: a five-year contract with Kenco
      in October 2025, a strategic partnership with Zebra Technologies in January 2026, and a
      multi-year technology integration with Dematic in April 2026. These partnerships validate
      enterprise commercial traction but do not directly resolve the question of whether GreyOrange
      is generating sufficient recurring revenue to sustain operations without additional capital.

      The four-year gap since the last disclosed funding round is consistent with multiple scenarios:
      the company has reached or is approaching breakeven on its software business, it has been
      generating sufficient cash flow from operations to extend runway, it is exploring strategic
      alternatives including M&A exits or a late-stage pre-IPO round, or it has been actively raising
      but has not yet closed a round at terms it finds acceptable. The absence of an IPO filing or
      secondary market transaction disclosure means external valuation is effectively frozen at the
      September 2022 mark-to-market.
