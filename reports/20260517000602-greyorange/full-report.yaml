        title: Capital Base, Investors, and Valuation
        blocks:
          - type: paragraph
            body: >
              GreyOrange has raised approximately $305M in total disclosed funding across multiple rounds since its
              founding in 2012. The most significant round publicly documented was a $170M Series C in 2019 co-led by
              Mithril Capital (associated with Peter Thiel) and Tiger Global Management at an implied valuation of
              approximately $1B, making GreyOrange a unicorn at the time. In September 2022, GreyOrange raised an
              additional $135M at a $1.2B valuation, with participation from investors including Binny Bansal
              (co-founder of Flipkart). Blume Ventures, an early-stage Indian venture fund, provided early backing
              during the company's formative years (reportedly from 2014 onward), and continues to be a stakeholder.


              As of the run date in May 2026, no new funding rounds have been publicly announced since the September
              2022 raise. This nearly four-year gap without publicly disclosed new capital is a material diligence
              point: it is unclear whether the company has achieved operating profitability or near-profitability that
              reduces capital needs, or whether capital markets access has been constrained. Revenue figures are not
              publicly disclosed. The $1.2B valuation last confirmed in 2022 should be treated as an unconfirmed stale
              benchmark until updated through a new round or secondary transaction.


              Key strategic partners also represent economic stakeholders: Kenco (5-year deal, Oct 2025), Dematic (KION
              Group subsidiary, Apr 2026), and Zebra Technologies (Jan 2026) each generate partner revenue streams and
              create customer-facing channel dependency. The Gartner recognition in October 2025 further validates the
              company's positioning in the emerging Multiagent Orchestration Platform (MAOP) market.
