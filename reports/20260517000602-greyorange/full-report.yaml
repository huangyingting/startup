  - number: 2
    title: Market Analysis
    sections:
      - number: '2.1'
        title: Market Definition and Scope
        blocks:
          - type: paragraph
            body: >-
              The warehouse automation market encompasses all technology investments—hardware and software—deployed to
              automate or orchestrate warehouse and distribution center operations. This includes autonomous mobile
              robots (AMRs), automated storage and retrieval systems (AS/RS), conveyor systems, warehouse management
              systems (WMS), warehouse execution systems (WES), and AI-powered multi-agent orchestration platforms
              (MAOPs). For the purposes of this diligence, the market boundary includes software and hardware solutions
              deployed in distribution centers, fulfillment centers, retail back-of-house operations, and cold chain
              logistics facilities globally. It excludes pure last-mile delivery robotics, manufacturing assembly
              automation, and enterprise resource planning (ERP) platforms that lack a warehouse-specific workflow
              execution layer.

              GreyOrange competes across multiple sub-segments of this market. Its GreyMatter platform occupies the
              orchestration and execution software layer—the software "brain" that coordinates robots, humans,
              conveyors, and other agents in real time. Its Ranger robot series competes in the AMR hardware layer,
              though GreyOrange has de-emphasized proprietary hardware in favor of an open, hardware-agnostic model
              since ~2022. Its gStore product extends into retail in-store inventory intelligence, a closely adjacent
              market driven by similar omnichannel pressures.

              Key market boundaries and inclusions are critical to sizing. The broadest definition (all warehouse
              automation hardware and software globally) generates the largest TAM figures cited by analysts ($29–34B in
              2025–2026). Narrower definitions focused on AI orchestration software only yield a smaller SAM ($8–12B
              estimated). GreyOrange's SOM is further constrained by its current geographic footprint, partner channel
              capacity, and competitive win rates, all of which are not publicly disclosed.
            claimRefs:
