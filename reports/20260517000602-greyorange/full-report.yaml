      - number: '2.5'
        title: Exhibits
        blocks:
          - type: callout
            title: 'Massive Greenfield Opportunity: 90% of Warehouses Not Yet Automated'
            body: >-
              GreyOrange's own website states that only 10% of warehouses are currently automated. This leaves
              approximately 1.35 million facilities globally that represent potential future demand—an almost entirely
              untapped market. Gartner's projection that 80% will deploy some automation by 2028 implies a step-change
              in adoption pace, suggesting the market's next several years will be characterized by rapid first-time
              adoption rather than incremental upgrades. GreyOrange's software-first, open- architecture model is
              well-positioned to capture first-time adopters who want flexibility and interoperability without vendor
              lock-in.
            calloutType: insight
            claimRefs:
              - CM004
              - CM005
          - type: callout
            title: Intensifying Competition from Well-Capitalized Integrated Vendors
            body: >-
              The warehouse automation orchestration layer is attracting competition from large, well-capitalized
              integrated vendors. Dematic (KION Group, €12B+ revenue), Swisslog (KUKA Group), Honeywell Intelligrated,
              and Amazon Robotics all have significantly larger capital bases than GreyOrange and are expanding their
              orchestration software capabilities. These incumbents benefit from existing customer relationships, large
              field service organizations, and bundled hardware-software selling motions that GreyOrange must compete
              against without equivalent scale advantages. Bloomberg's 2023 coverage documented a "reality check" for
              warehouse automation startups after the 2021 funding boom, and Locus Robotics—a comparable pure-play AMR
              company—faced financial distress in 2023–2024.
            calloutType: insight
            claimRefs:
              - CM034
              - CM035
              - CM040
          - type: callout
            title: Software-First Model Benefits from Accelerating Software Segment CAGR
            body: >-
              Grand View Research and Mordor Intelligence both indicate that the software segment of warehouse
              automation is growing faster than hardware: Grand View Research estimates ~21% CAGR for the software
              component (WMS, WCS, WES), while Mordor Intelligence shows 14.87% for software vs. hardware leading in
              absolute share but growing more slowly at ~17%. GreyOrange's 2022 strategic pivot to a software-first,
              hardware-agnostic model positions it to capture this differential growth. The hardware business is
              commoditizing faster than the software orchestration layer, making GreyOrange's approach structurally
              advantaged relative to pure-play hardware vendors.
            calloutType: insight
            claimRefs:
              - CM010
              - CM017
              - CM037
          - type: callout
            title: Monitor Gartner's MAOP Category Evolution as a Competitive Signal
            body: >-
              Gartner's Multiagent Orchestration Platform (MAOP) category—in which GreyOrange is recognized as a
              Representative Provider—is an emerging analytical frame that could define competitive dynamics over the
              next 3–5 years. If Gartner elevates MAOP to a formal Magic Quadrant, it would sharpen competitive
              comparisons and could influence enterprise buyer decisions significantly. Tracking which competitors enter
              this Gartner category, and whether GreyOrange's position improves to Challenger or Leader status, is a
              high-value signal for assessing GreyOrange's market positioning trajectory.
            calloutType: insight
            claimRefs:
              - CM039
  - number: 3
    title: Competitors
    sections:
      - number: '3.1'
        title: Competitive Landscape Overview
        blocks:
          - type: paragraph
            body: >-
              GreyOrange operates in a warehouse automation market characterized by distinct but converging competitive
              layers. The first layer is AMR hardware—autonomous mobile robot manufacturers that own the physical
              execution tier. Key players here include AutoStore (Norwegian, IPO'd on the Oslo Stock Exchange in 2021,
              grid-based goods-to-person systems), Geek+ (Chinese, $500M+ raised, strongest in Asia-Pacific), and Locus
              Robotics (US-based, collaborative cobots, facing severe financial headwinds in 2023–2024). The second
              layer is large integrated automation providers—global system integrators that sell bundled
              hardware-software-service solutions. Dematic (KION Group, 10,000+ employees, 9,000+ installations
              worldwide), Swisslog (KUKA Group, 2,500+ implementations globally), and Honeywell Intelligrated represent
              this cohort of well-capitalized incumbents.

              The third layer is WMS and orchestration software—platforms competing on the software "brain" layer of
              warehouse operations. Manhattan Associates, Körber Supply Chain, and Blue Yonder compete here with
              existing WMS customer bases they are actively extending toward WES and orchestration functions. Manhattan
              Associates explicitly markets a WES built natively inside its cloud-native WMS, claiming the ability to
              orchestrate every warehouse resource simultaneously including labor, automation, and robotics—putting it
              in direct software-layer competition with GreyMatter.

              GreyOrange's distinctive competitive position is its hardware-agnostic multi-agent orchestration platform
              (MAOP), recognized by Gartner in its Innovation Insight report. Rather than competing purely in any one
              layer, GreyMatter sits atop the stack, coordinating robots, conveyors, humans, and software from any
              vendor through the Certified Ranger Network. This cross-layer positioning creates both opportunity
              (partner with hardware vendors) and risk (hardware vendors building their own orchestration software
              layers). The April 2026 Dematic partnership is a notable structural development: KION Group chose to
              integrate GreyMatter into its software portfolio rather than compete head-on, validating GreyOrange's
              orchestration layer while creating a channel dependency. Bloomberg documented the broader correction in
              warehouse automation startup valuations in 2023, noting that elevated post-pandemic valuations were
              unsustainable for companies without clear profitability paths—a market dynamic that has reshaped the
              competitive field.
