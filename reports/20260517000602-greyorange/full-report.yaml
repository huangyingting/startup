      - number: '4.3'
        title: Unit Economics and Margin Profile
        blocks:
          - type: paragraph
            body: >-
              GreyOrange has not publicly disclosed gross margin, operating margin, or EBITDA metrics. However, the
              company's dual hardware-software revenue model allows for inference of blended margin characteristics from
              industry benchmarks. Hardware robotics — including AMR manufacturing, supply chain logistics, and field
              deployment — typically carries gross margins in the 20%–40% range, driven by component costs,
              manufacturing overhead, warranty and maintenance reserves, and field service labor. Software SaaS
              subscriptions, by contrast, typically carry gross margins of 65%–80% at scale, reflecting minimal
              incremental cost per seat or site once the platform is developed. The blended gross margin for a company
              at GreyOrange's stage of software/hardware mix is likely in the range of 35%–55%, with wide uncertainty
              given the unknown proportion of hardware versus software revenue.

              The GreyMatter platform's stated performance metrics provide indirect evidence of the economic value
              GreyOrange delivers to customers: 60% lower variable cost per unit, 4–5x on-demand scalability, 300+ units
              picked per hour per station, and 99.95% on-time fulfillment. If these outcomes are validated in customer
              deployments, they imply a strong return on investment for buyers and suggest pricing power for GreyOrange
              — i.e., the ability to price GreyMatter at a level that reflects the value delivered rather than purely
              cost-plus. This is particularly important for the SaaS layer, where pricing power is the primary driver of
              net revenue retention and eventual margin expansion.

              Customer payback period for large warehouse automation deployments is typically 2–4 years on the hardware
              side, reflecting the capital intensity of the initial robot deployment. For software-only deployments,
              payback periods are shorter — typically 12–24 months — given lower upfront investment and immediate
              productivity gains. GreyOrange's RaaS model through partners like enMotion by enVista transfers the
              capital expenditure risk to the service provider, allowing customers to achieve faster ROI at the cost of
              higher ongoing per-unit operating expense. For GreyOrange, RaaS arrangements likely generate lower annual
              cash revenue per site than outright hardware sales but improve revenue predictability and reduce the
              lumpiness of hardware-driven revenue cycles.

              Net revenue retention (NRR) — the most important SaaS financial metric for enterprise software companies —
              is entirely undisclosed. Given the platform's positioning as a continuous-learning, expanding
              orchestration layer, the structural case for NRR above 100% (i.e., expansion revenue from existing
              customers outpacing churn) is strong: customers who add robots, processes, or sites naturally expand their
              GreyMatter subscription scope. However, without disclosed NRR data, this remains an analytical inference
              rather than a confirmed metric. The company's disclosure of 100,000+ physical agents under management
              across 3,000+ active sites implies an average of approximately 33 robots per site, a metric consistent
              with medium-to-large enterprise deployments that would anchor meaningful ACV per site.
