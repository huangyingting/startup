    slug: customer-workflow-operating-flow
    type: flow
    layout: wide
    summary: >-
      End-to-end operating flow showing how GreyMatter orchestrates a DC fulfillment order from WMS receipt through
      physical execution and shipment.
    data:
      nodes:
        - id: n1
          label: Order Received (WMS)
          detail: >-
            WMS or OMS pushes order batch to GreyMatter via REST API; order decomposed into individual line items and
            pick tasks
          type: input
        - id: n2
          label: GreyMatter AI Optimization
          detail: >-
            Multiagent AI engine assigns pick tasks to available robots and human associates in real time; considers
            robot location, battery level, pick zone, order priority, and dock schedule
          type: process
        - id: n3
          label: Parallel Robot Execution
          detail: >-
            AMRs and goods-to-person robots navigate to pick locations; CRN ensures cross-vendor coordination; real-time
            re-routing on collisions or equipment failures
          type: process
        - id: n4
          label: Human Associate Guidance
          detail: >-
            Associates receive simplified adaptive pick instructions via wearable or fixed terminal; 70-80% less
            training required; GreyMatter manages task interleaving with robot fleet
          type: process
        - id: n5
          label: Pick Verification and Exception Handling
          detail: >-
            Scan-and-verify at pick station; mis-picks or shorts trigger automatic re-assignment to another agent;
            <0.07% agent breach rate reported
          type: process
        - id: n6
          label: Pack, Sort, and Ship
          detail: >-
            Sorted items flow to packing stations; GreyMatter coordinates parcel sorter handoff; dock assignment
            optimized for carrier pickup
