          label: 'Risk 3: Valuation Uncertainty'
          detail: $1.2B mark from 2022 unverifiable against current revenue; bull/base/bear cases span $800M–$3.5B range
          type: risk
        - id: s1
          label: 'Scenario: Base Case'
          detail: $100–180M ARR by 2027; $1.2–1.8B valuation; 8–15% IRR from 2022 entry
          type: scenario
        - id: s2
          label: 'Scenario: Bull Case'
          detail: $200–300M ARR; $2.5–3.5B valuation; 25–35% IRR; requires Dematic channel traction + software-heavy mix
          type: scenario
        - id: s3
          label: 'Scenario: Bear Case'
          detail: <$80M ARR; <$1B valuation; negative IRR; Locus-style revenue shortfall
          type: scenario
        - id: rec
          label: 'Recommendation: TRACK'
          detail: Not invest yet; monitor for IPO signals, ARR milestone, Dematic traction, M&A catalysts; revisit quarterly
          type: recommendation
      edges:
        - from: e1
          to: s1
          label: Supports base/bull case ARR assumptions
        - from: e2
          to: s2
          label: Large TAM validates scale ceiling
        - from: e3
          to: s1
