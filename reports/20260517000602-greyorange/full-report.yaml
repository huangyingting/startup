      - number: '8.2'
        title: Comparable Valuation and Scenario Analysis
        blocks:
          - type: paragraph
            body: >-
              Valuing GreyOrange requires both a comparable company analysis and a scenario-based discounted value
              framework, given the absence of disclosed revenue. The public comparables provide a reference range of
              valuation multiples for warehouse automation businesses at different scales and stages.

              Symbotic (NASDAQ: SYM) is the most instructive comparable. As of May 2026, Symbotic trades at
              approximately $47 per share with a market capitalization of $28.52B and trailing twelve-month revenue of
              $2.52B, implying roughly an 11–12x EV/Revenue multiple. Symbotic's fiscal Q2 2026 revenue reached $676M
              with GAAP profitability achieved and backlog at $22.7B, demonstrating what a fully scaled warehouse AI
              company can look like financially. However, Symbotic's dominant Walmart relationship and $22B+ backlog are
              qualitatively distinct from GreyOrange's diversified but undisclosed customer base: the comparison sets a
              ceiling for what GreyOrange could achieve but should not be used as a direct multiple input given the
              scale difference. AutoStore (Oslo: AUTO), a grid-based storage automation company that IPO'd in 2021 at a
              $12B+ peak valuation, has experienced significant multiple compression and trades at a $2–3B estimated
              market cap in 2025–2026 at roughly 4–5x revenues of $600M+, providing a more relevant multiple for a
              warehouse automation company in the $200–600M revenue range. Locus Robotics, which reached a $2B peak
              private valuation before filing for bankruptcy in 2024, provides the critical adverse comparable: a
              warehouse AMR company with insufficient revenue relative to its funding and operating structure,
              destroying essentially all equity value. Geek+, still private at an estimated $2B+ valuation, provides the
              most direct competitive comparable; its Chinese manufacturing cost structure likely implies a different
              margin profile than GreyOrange but its scale validates the category.

              Under base case assumptions — $100–180M ARR by 2027, hardware gross margins of 20–30%, and software gross
              margins of 60–70%, yielding a blended margin of 35–45% — an appropriate EV/Revenue multiple of 8–12x
              (reflecting GreyOrange's private status discount, lower scale than Symbotic, and data-flywheel moat
              premium) yields an enterprise value of $1.2–1.8B, approximately validating the 2022 valuation mark. Under
              the bull case ($200–300M ARR, software-heavy mix, Dematic channel scaling), multiples could expand toward
              12–15x, supporting a $2–3B valuation range and 25–35% IRR for 2022 investors. The bear case ($60–80M ARR,
              hardware margin compression, profitability concerns) compresses valuations below $1B, generating negative
              IRR for investors who paid the 2022 price. The probability weighting of scenarios is highly uncertain
              given financial opacity; the base case is assigned roughly 50% weight, bull case 25%, bear case 25%,
              suggesting an expected value modestly above $1.2B but with wide uncertainty bounds.

              The comparable valuation table below captures the sector landscape. Coverage is partial because Geek+ and
              GreyOrange financials are not publicly disclosed; the public company multiples are sourced from live
              market data as of May 2026.
