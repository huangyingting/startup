              GreyOrange was co-founded by Akash Gupta and Samay Kohli, who also co-founded several related entities.
              Samay Kohli served as CEO during the company's early phases; Akash Gupta was named CEO in 2022, marking a
              leadership transition that repositioned the executive structure as the company pivoted from a
              hardware-centric robot manufacturer to an AI-software orchestration platform. This transition is material
              to diligence because it signaled a deliberate strategy shift: GreyOrange de-emphasized proprietary robot
              hardware in favor of a vendor-agnostic, software-first model that can orchestrate third-party robots,
              including competing hardware.


              Akash Gupta's role as CEO has been confirmed across multiple GreyOrange press releases in 2025 and 2026,
              including the Gartner recognition announcement in October 2025 and the Dematic partnership press release
              in April 2026. In November 2025, GreyOrange named Richard "Rik" Schrader as Chief Revenue Officer,
              bringing deep expertise in warehouse and supply chain transformation and signaling a commercial growth
              phase. Schrader's appointment also indicated that GreyOrange was investing in go-to-market leadership
              depth beyond its founder-CEO.


              The company's leadership profile has limited public disclosure beyond key executives; board composition,
              equity distribution, and governance documents are not available from public sources. Key-person
              concentration remains a diligence consideration: Akash Gupta is the primary spokesperson across all recent
              press and partnership materials. The company's earlier co-founder CEO Samay Kohli is no longer in a
