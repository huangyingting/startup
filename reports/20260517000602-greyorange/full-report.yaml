      - number: '2.2'
        title: 'Market Sizing: TAM, SAM, and SOM'
        blocks:
          - type: paragraph
            body: >-
              Multiple analyst firms have published estimates for the warehouse automation market, and their figures
              vary materially depending on definitional scope. Mordor Intelligence estimates the market at $29.98B in
              2025, growing to $34.17B in 2026 and $65.74B by 2031 at a 13.98% CAGR. Grand View Research sizes the
              warehouse robotics market narrower, at $4.31B in 2022 growing to $17.29B by 2030 at a 19.6% CAGR.
              MarketsandMarkets uses the broader logistics automation frame, projecting $52.53B by 2029 at 8.4% CAGR—a
              lower growth rate reflecting the inclusion of mature transportation and freight automation sub-segments.
              These discrepancies are attributable to definitional differences (robotics-only vs. all automation
              software vs. all logistics automation), geographic scope, and methodology.

              For GreyOrange's TAM, this analysis uses the Mordor Intelligence estimate of ~$30–34B for 2025–2026 as the
              most directly comparable scope (warehouse automation hardware and software, global). The SAM— the
              sub-market GreyOrange can realistically address with its current product portfolio—is estimated at $8–12B,
              representing approximately 25–35% of the TAM. This estimate is derived by applying the software segment's
              share of the warehouse automation market (Grand View Research estimates software at ~21% CAGR outpacing
              hardware at ~17%, and Mordor Intelligence reports software at 14.87% CAGR with hardware leading at 55.12%
              share) to the total market, then adjusting for the orchestration and execution layer specifically versus
              lower-level WMS incumbents. This is an analyst-inferred estimate and carries low confidence absent
              segment-level market data.

              GreyOrange's SOM is estimated at $200–500M based on its disclosed deployments (3,000+ sites, 100,000+
              physical agents under management), strategic partner relationships (Kenco, Dematic, Zebra), and geographic
              footprint across Americas, Europe, and Asia. At a $350M midpoint SOM on a $10B SAM midpoint, GreyOrange
              would hold approximately 3.5% of the AI orchestration software market—a plausible position for a
              late-stage private company with established enterprise customers but lacking the scale of Honeywell, KION
              Group (Dematic), or Vanderlande. The SOM is highly sensitive to undisclosed revenue figures and win rates,
              which are not available from public sources.
