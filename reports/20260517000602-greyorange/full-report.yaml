  - number: 4
    title: Financials
    sections:
      - number: '4.1'
        title: Revenue Model Architecture and Business Model Evolution
        blocks:
          - type: paragraph
            body: >-
              GreyOrange operates a multi-stream revenue model that spans hardware, software, and professional services
              — a structure that has evolved significantly since the company's founding in 2012. In its early years,
              GreyOrange generated revenue primarily through proprietary robot hardware sales, specifically its Butler
              and Sorter robot product lines, which were sold or leased to large e-commerce and retail customers in
              India and Southeast Asia. This hardware-centric model created high capital requirements for manufacturing,
              inventory, and field service, but generated predictable large-ticket revenue from robot sales at per-unit
              prices estimated to range from $30,000 to over $150,000 depending on robot type and customization.

              The strategic inflection point came in 2022, when GreyOrange explicitly repositioned from a hardware-robot
              company to an AI software orchestration platform. The launch and maturation of GreyMatter — the company's
              Warehouse Execution System (WES) and Multi-Agent Orchestration Platform (MAOP) — as a hardware-agnostic
              product capable of coordinating third-party robots marked the beginning of a recurring revenue layer.
              GreyMatter is sold as a SaaS subscription, and pricing is structured around per-site and per-robot-unit
              dimensions, though the precise pricing schedule is not publicly disclosed. Customers accessing GreyMatter
              through partners such as Kenco and enMotion by enVista may also access it via a Robotics-as-a-Service
              (RaaS) model, where the entire stack — hardware and software — is delivered as a monthly subscription,
              further shifting capital expenditure to GreyOrange and its partners.

              The gStore platform represents GreyOrange's retail vertical extension, delivering real-time RFID inventory
              intelligence and in-store execution orchestration. gStore is sold as a standalone SaaS product and in
              January 2026 was commercially launched in conjunction with Zebra Technologies' SmartLens overhead RFID
              hardware. In its first deployment at a national fashion retailer, gStore achieved an on-shelf availability
              rate of up to 98%, providing a high-quality reference metric. gStore is positioned as a separate SaaS
              subscription product, expanding the company's total addressable revenue per customer beyond warehouse
              operations into the retail store estate.

              The revenue mix across hardware, GreyMatter SaaS, gStore SaaS, and professional services is not publicly
              disclosed. Based on the company's software-first strategic pivot and the Certified Ranger Network's
              hardware-agnostic positioning, it is reasonable to infer that SaaS revenue is growing faster than hardware
              revenue as a proportion of total revenue. The appointment of Richard Schrader as Chief Revenue Officer in
              November 2025 — with an explicit focus on scaling the Certified Partner Network and SaaS go-to-market — is
              a structural signal that recurring software revenue is the primary commercial priority for growth. With
              3,000+ active global sites and 100,000+ physical agents under management, the potential ARR per site is
              the single most important unknown for evaluating the software revenue flywheel.
