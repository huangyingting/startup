  - id: TV005
    title: Thesis-Break and Kill Triggers
    description: >-
      Enumeration of specific, measurable conditions that would cause a downgrade from "track" to "avoid," or would
      escalate a "track" to "invest." Ordered by severity. These triggers should be monitored as ongoing diligence
      signals.
    columns:
      - Trigger
      - Threshold
      - Transmission to Thesis
      - Recommended Action
      - Severity
    rows:
      - - Win-rate collapse vs. Geek+
        - Win-rate in North America / EMEA enterprise evaluations drops below 30% consistently
        - Competitive moat thesis fails; software differentiation insufficient against price competition
        - Exit / reduce position; downgrade to avoid
        - Critical
      - - Revenue shortfall at IPO filing
        - ARR < $60M disclosed in S-1 or equivalent public filing
        - 2022 $1.2B valuation mark becomes structurally unsustainable at sector-appropriate multiples
        - Avoid IPO; track-only; re-evaluate in 12 months
        - High
      - - CEO / founder departure (Akash Gupta)
        - Unplanned departure without named successor and 90-day transition plan
        - >-
          Disrupts investor relationships (Mithril, Tiger Global), partner trust (Dematic, Kenco), and AI product vision
          simultaneously
        - Immediate re-evaluation; suspend new investment pending succession clarity
        - High
      - - Down-round financing
        - New equity round at valuation < $800M post-money
        - >-
          Signals investor consensus that 2022 mark was a peak; preferred liquidation preference structure may impair
          common equity
        - Flag for investor review; assess liquidation preference waterfall impact
        - High
      - - Dematic channel abandonment
        - Dematic terminates or significantly reduces GreyOrange partnership within 18 months of signing
        - Bull case channel revenue assumption collapses; KION integration pipeline evaporates
        - Re-evaluate base case; downgrade probability weighting toward bear
        - Medium
      - - Regulatory / safety enforcement action
        - OSHA citation or EU AI Act enforcement action at GreyOrange or a major GreyOrange customer site
        - Operational liability exposure; customer confidence erosion; potential deployment moratorium
        - Suspend diligence pending investigation; assess product liability scope
        - Medium
      - - Net revenue retention below 85%
        - NRR disclosed (or credibly estimated from customer churn signals) below 85%
        - >-
          Software land-and-expand model fails; flywheel assumption invalid; ARR growth requires expensive new logo
          acquisition
        - Downgrade to avoid pending explanation; request cohort analysis
        - Medium
    sourceRefs:
      - SV001
      - SV003
      - SV004
      - SV005
      - SV010
      - SV011
      - SV020
    claimRefs:
      - CV005
      - CV006
      - CV007
      - CV008
      - CV033
      - CV034
      - CV035
      - CV036
      - CV037
      - CV038
      - CV039
    notes: >-
      Thresholds are analyst-defined; none are contractual or disclosed GreyOrange internal targets. Win-rate, NRR, and
      ARR data require NDA access to verify.
  - id: TV006
    title: Final Diligence Asks
    description: >-
      Priority-ordered list of information requests that would materially change the investment recommendation,
      confidence, or valuation stance. Designed as a management / investor data room checklist.
    columns:
      - Ask
      - Priority
      - Why It Matters
      - Target Provider
      - Impact if Positive
    rows:
      - - Current ARR and revenue mix (hardware vs. software vs. services)
        - Critical
        - >-
          Fundamental valuation input; determines applicable comparable multiple; current absence prevents any
          defensible EV estimation
        - Management / CFO
        - Upgrades confidence to high; likely upgrades recommendation to invest if ARR ≥ $120M
      - - Gross margin by segment (hardware, software, services)
        - Critical
        - >-
          Software gross margin ≥60% validates platform moat; hardware margin < 20% is a structural drag; blended margin
          drives EBITDA path
        - Management / CFO
        - Confirms software economics thesis; enables IRR modeling with defensible assumptions
      - - Net revenue retention rate (NRR) by customer cohort
        - High
        - NRR >110% signals land-and-expand is working and reduces new-logo dependence; NRR <90% is a thesis-breaker
        - Management / CFO
        - NRR >110% upgrades base case valuation by 20–30%; confirms flywheel model
      - - Headcount, burn rate, and runway
        - High
        - >-
          Resolves four-year funding gap concern; confirms capital adequacy through 2027; identifies if additional raise
          is imminent
        - Management / CFO / Investors
        - Runway >24 months reduces down-round risk; confirms base case financial assumptions
      - - Win/loss analysis vs. Geek+ and AutoStore (last 24 months)
        - High
        - >-
          Validates competitive moat thesis; quantifies win-rate in strategic geographies; key input to bull/base/bear
          probability weights
        - Sales / Management / Customer references
        - Win-rate >50% in NA/EMEA confirms thesis; <30% triggers kill trigger TV005 row 1
      - - Roadmap to GAAP profitability or EBITDA break-even
        - High
        - >-
          Determines IPO feasibility timeline; confirms whether software-attached ARR is sufficient to cover hardware
          and opex
        - Management / Board
        - Clear path to break-even by 2027 enables IPO positioning; absence extends bear case probability
      - - Cap table, preference stack, and liquidation waterfall
        - Medium
        - >-
          Determines common equity value in M&A scenarios; identifies if preferred liquidation preferences impair
          returns at sub-$1.5B exit
        - Investors / Legal counsel
        - Clean waterfall with limited preference overhang validates equity upside at target exit price
      - - 'Customer concentration: top 5 customers as % of ARR'
        - Medium
        - >-
          Kenco 5-year alliance likely represents material ARR share; >30% in any single customer creates churn risk and
          valuation risk
        - Management
        - Concentration <20% in any single customer validates diversification of ARR base
    sourceRefs:
