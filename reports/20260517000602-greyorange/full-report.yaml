      - number: '5.4'
        title: Trust, Safety, and Compliance
        blocks:
          - type: paragraph
            body: >-
              GreyMatter reports a less-than-0.07% agent breach rate, defined as the fraction of agent tasks where a
              robot or human deviates from its assigned path in a way that interrupts other agents or causes a safety
              incident. This figure is company-stated and appears on the GreyMatter product page without citation to an
              independent audit methodology. No SOC 2 Type II, ISO 27001, or equivalent information security
              certification is publicly confirmed; requests for trust or compliance documentation redirect to the sales
              and customer portal rather than a public trust center.


              For physical safety, the Certified Ranger Network certification process is described as ensuring that each
              integrated robot model meets GreyMatter safety and API standards before it is approved for joint
              deployment. The company offers a 24/7 support model for enterprise customers and describes SLA tiers, but
              no specific uptime SLA percentages are published on the public site. GDPR compliance is mentioned in the
              context of European deployments, but no public data processing agreement or privacy certification is
              available for independent review.


              The absence of public trust documentation is a material diligence gap for enterprise procurement. Buyers
              in regulated industries (pharma, food, automotive) that require SOC 2 or ISO 27001 from software vendors
              will need to request documentation under NDA. This is consistent with a company-stage software vendor that
              is pre-IPO and mid-scale, but it is a contrast with more mature SaaS platforms.
