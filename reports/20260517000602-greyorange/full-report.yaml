      - number: '7.2'
        title: Operational, Technology, and Supply Chain Risks
        blocks:
          - type: paragraph
            body: >-
              GreyOrange's hardware manufacturing creates capital intensity and supply chain risk that software-only
              competitors do not face. The Ranger robot series requires semiconductors, precision motors, LIDAR sensors,
              and battery systems whose supply and cost are subject to geopolitical disruption. US-China Section 301
              tariffs on robotics-relevant electronics components increase COGS for any hardware sourcing routed through
              Chinese supply chains, potentially compressing hardware margins below sustainability thresholds if pricing
              cannot adjust correspondingly. Manufacturing concentration — GreyOrange manufactures in India and
              assembles components globally — creates geographic risk if production is disrupted by labor action,
              natural disaster, or regulatory change in India.

              Technology risk is most acute in GreyOrange's core AI orchestration engine. GreyMatter claims to execute
              over one million optimizations per minute across warehouse sites, a throughput that creates systemic
              failure risk: if the AI engine fails, produces incorrect route assignments, or triggers robot collision
              scenarios, the operational and legal consequences are immediate. Real-time orchestration of autonomous
              mobile robots in environments with human workers creates physical safety risks — a robot-worker collision
              or near-miss incident at a customer site could trigger OSHA investigation, product liability claims, and
              customer confidence erosion. The claim of 99%+ inventory accuracy and 0.07% on-time shipment breach rate
              sets high customer expectation levels; failing to consistently deliver these metrics triggers
              contract-level risk and reputational damage.

              System integration risk is also material. GreyMatter layers above customer WMS, ERP, and OMS systems
              through API integration; WMS upgrade cycles, customer IT infrastructure changes, and new customer
              onboarding all create integration maintenance burden. A failed deployment at a high-profile customer would
              damage GreyOrange's reference customer base, which is critical for enterprise sales cycles. Cloud
              infrastructure dependency is a structural risk: if GreyMatter's AI engine runs on a single cloud provider
              and that provider experiences an outage, real-time warehouse operations across all affected customer sites
              could be disrupted simultaneously. The cloud provider's identity has not been publicly disclosed,
              preventing assessment of multi-cloud resilience.
