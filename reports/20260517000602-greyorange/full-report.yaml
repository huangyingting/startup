    title: Public Financial Disclosure Gaps
    columns:
      - Metric
      - Disclosure Status
      - Why It Matters for Diligence
      - Diligence Path
    rows:
      - - Annual Revenue / ARR
        - Undisclosed
        - >-
          Without revenue, the $1.2B 2022 valuation cannot be assessed as a revenue multiple; cannot determine growth
          trajectory or software/hardware revenue evolution
        - Request audited financials under NDA; use 3,000+ sites × estimated ACV as a cross-check
      - - Gross Margin by Segment
        - Undisclosed
        - >-
          Hardware vs. software gross margin split is the primary driver of long-term financial quality; blended margin
          determines path to profitability
        - >-
          Request management accounts with product-line P&L; cross-reference with comparable public company margins
          (Manhattan Associates, Zebra Technologies)
      - - EBITDA / Operating Profitability
        - Undisclosed
        - >-
          Cannot assess burn rate, runway, or proximity to cash flow breakeven without EBITDA; critical for evaluating
          capital adequacy and fundraising risk
        - Request trailing 12-month P&L and forward budget; assess vs. $135M 2022 capital raise remaining balance
      - - Net Revenue Retention (NRR)
        - Undisclosed
        - >-
          NRR is the single most important SaaS quality metric; determines whether SaaS revenue is compounding or at
          risk; a <100% NRR would be a significant red flag for the software pivot thesis
        - Request cohort retention analysis; ask for NRR by customer size and product line
      - - Customer Count and Concentration
        - Partially disclosed (3,000+ sites referenced)
        - >-
          Site count is not equivalent to customer count; concentration risk is unknown; if top 10 customers represent
          >50% of revenue, churn risk is elevated
        - Request customer list with anonymized revenue concentration; ask for logo retention data
      - - Headcount and R&D Spend
        - Undisclosed
        - Headcount trends are a proxy for burn rate; R&D spend determines product investment sustainability
        - LinkedIn headcount tracking; check for layoff disclosures; request org chart with headcount by function
      - - GreyMatter ACV / Deal Sizes
        - Undisclosed
        - >-
          ACV determines the scale of enterprise commitments and pricing power; without ACV data, revenue estimates are
          wide-range approximations
        - Request pipeline data; review publicly disclosed partnership terms (Kenco 5-year deal) as proxy
      - - Hardware Inventory and CapEx
        - Undisclosed
        - >-
          Hardware CapEx and inventory levels determine working capital intensity; critical for assessing whether RaaS
          model shifts capital to balance sheet risk
        - Request balance sheet; assess inventory aging, warranty reserves, and CapEx vs. depreciation
    notes: >-
      The financial disclosure gaps listed above collectively represent the most material diligence deficiencies for any
      investor or acquirer evaluating GreyOrange in 2026. All of these gaps are standard for a late-stage private
      company but are atypically important here given the four-year absence of public fundraising activity and the
      company's hardware-to-software business model transition. Any credible financial diligence process must resolve at
      least the first four items (revenue/ARR, gross margin, EBITDA, NRR) before reaching investment conclusions.
