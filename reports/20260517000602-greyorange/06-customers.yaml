company:
  name: GreyOrange
chapter:
  number: 6
  title: Customers
  summary: GreyOrange serves enterprise customers across logistics/3PL, retail, e-commerce,
    and healthcare verticals, with 3,000+ active deployment sites and 100,000+ agents
    as of May 2026. Named production deployments include Kenco (5-year strategic alliance),
    Sodimac, Farmacia Tei, Active Ants, FIGS Scrubs, and multiple unnamed retail chains.
    Retention data is not publicly disclosed; contract stickiness is inferred from
    multi-year infrastructure deals. The Dematic and Zebra partnerships signal major
    channel expansion, while customer concentration and NRR remain key diligence gaps.

sections:
  - id: section-U1
    title: Customer Segmentation and Base Overview
    body: "GreyOrange serves enterprise customers across four primary verticals: logistics/3PL,\
      \ retail (brick-and-mortar), e-commerce/direct-to-consumer, and healthcare/pharmacy.\
      \ The company's homepage reports 3,000+ active deployment sites globally with 100,000+\
      \ physical agents and $1B+ inventory processed monthly, suggesting meaningful scale\
      \ — though the company does not disaggregate site or agent counts by segment or geography.\
      \ Named enterprise customers include Kenco Group (one of the largest US privately-held\
      \ 3PLs), GXO Logistics (reportedly a customer, though not independently confirmed),\
      \ Farmacia Tei (Romania), Apotek Hjärtat (Sweden), and Sodimac (South America).\n\n\
      The buyer profile is typically an operations or supply-chain executive evaluating a\
      \ multi-year warehouse automation platform. Payers are enterprise procurement departments\
      \ with capital budget authority. End users are warehouse associates, robot fleet managers,\
      \ and retail store operations teams. GreyOrange's dual-product portfolio — GreyMatter\
      \ for DC fulfillment and gStore for retail store inventory — gives it reach across\
      \ the DC-to-store value chain. Geographic diversity is evident from named deployments\
      \ in North America, EMEA, and LATAM, though revenue or customer concentration by\
      \ region is not publicly disclosed. Segment-level revenue split is unknown, which\
      \ is a material diligence gap for understanding where growth and churn risk are concentrated."
    tableRefs:
      - TU001
      - TU002
    figureRefs:
      - FU001

  - id: section-U2
    title: Named Customer Deployments and Production Evidence
    body: "GreyOrange has publicly named a growing set of production customers. The most\
      \ prominent is Kenco Group, which signed a 5-year strategic alliance in October 2025\
      \ to deploy GreyMatter MPOP across multiple fulfillment centers for case picking and\
      \ P2P pallet movement; Kenco was also awarded GreyOrange's inaugural Elite Partner\
      \ of the Year in April 2026. Sodimac (South America) is cited on the GreyMatter product\
      \ page as the world's largest pallet-moving AMR installation, though this claim has\
      \ not been independently verified. In retail, a leading specialty retailer deployed\
      \ gStore across 200+ stores achieving >99% inventory accuracy and 50% fewer stockout\
      \ cancellations, while a national fashion retailer achieved 98% on-shelf availability\
      \ via the Zebra-GreyOrange gStore integration (announced January 2026).\n\n\
      Other named deployments include Farmacia Tei (Romania pharmacy, faster service\
      \ and less labor), Active Ants (Netherlands e-commerce, zero-walk automation), and\
      \ FIGS Scrubs (healthcare apparel DTC, warehouse automation). The April 2026 Dematic/KION\
      \ partnership extends GreyMatter access to 9,000+ global installations in the KION\
      \ Group ecosystem, representing a major pipeline expansion. A critical limitation:\
      \ most customer names are self-reported by GreyOrange; independent confirmation is\
      \ limited because G2 and Gartner Peer Insights are js-only and several customer\
      \ websites are broken or rate-limited. Customer outcome metrics (NRR, labor savings,\
      \ ROI) are almost entirely company-stated without independent audit. Named customer\
      \ proof quality is medium: production deployments are confirmed but quantified outcomes\
      \ with independent verification are rare."
    tableRefs:
      - TU003
    figureRefs:
      - FU002
      - FU003

  - id: section-U3
    title: Retention, Satisfaction, Expansion, and Concentration Risk
    body: "Public retention data for GreyOrange is not available. No NRR, GRR, churn rate,\
      \ or cohort data has been disclosed by the company or found via third-party sources.\
      \ The best proxy for retention durability is the Kenco 5-year strategic alliance:\
      \ long-term infrastructure contracts in warehouse automation are common due to high\
      \ switching costs — deep WMS/ERP integration, robot fleet commissioning, and trained\
      \ workforce dependencies that compound over deployment tenure. Industry benchmarks\
      \ for AMR platforms suggest 3-5 year average deployment tenures, implying structurally\
      \ low natural churn, though GreyOrange has not disclosed contract renewal rates or\
      \ multi-cohort retention metrics.\n\n\
      Expansion levers are strong: the Dematic partnership creates access to a global\
      \ customer base of 9,000+ KION installations; the Kenco alliance spans multiple\
      \ fulfillment centers (land-and-expand model); and the Zebra gStore partnership\
      \ opens retail store deployments as a second growth vector. Concentration risk is\
      \ a material uncertainty: with 3,000+ sites, any single customer's count-based\
      \ share is likely modest, but revenue concentration is undisclosed. If top customers\
      \ (Kenco, GXO) represent >20% of ARR, counterparty risk is material. Channel\
      \ dependence via Dematic and Zebra introduces margin and control risks if these\
      \ partnerships evolve adversarially. Customer review data remains inaccessible\
      \ — G2 and Gartner Peer Insights require JavaScript-rendered pages that could not\
      \ be fetched, and Capterra has minimal GreyOrange coverage, leaving satisfaction\
      \ and NPS scores entirely unverified from independent sources."
    tableRefs:
      - TU004
      - TU005
    figureRefs:
      - FU004

