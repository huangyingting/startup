  evidenceGaps:
    - type: access-blocked
      severity: material
      topic: customer-reviews-inaccessible
      missingEvidence: Independent customer satisfaction data from G2 (js-only), Gartner
        Peer Insights (js-only), and Capterra (minimal coverage); NPS or CSAT scores from
        any third-party review platform
      whyItMatters: Without independent review data, customer satisfaction and product-market
        fit can only be inferred from company-stated metrics; adverse feedback from customers
        is entirely invisible
      diligencePath: Request G2 and Gartner Peer Insights reviews directly from GreyOrange
        sales team; ask for customer reference calls with 3+ production customers
      relatedQuestionRefs:
        - QU022

    - type: private-evidence-only
      severity: blocking
      topic: nrr-retention-undisclosed
      missingEvidence: Net Revenue Retention (NRR), Gross Revenue Retention (GRR), customer
        cohort retention curves, or annual churn rate for GreyOrange's customer base
      whyItMatters: NRR is the most critical SaaS/infrastructure quality signal; without
        it, the durability of GreyOrange's revenue base cannot be assessed; benchmark
        comparison to peers is impossible
      diligencePath: Request NRR and cohort retention data under NDA directly from GreyOrange;
        benchmark against AMR/warehouse automation SaaS peers if obtainable
      relatedQuestionRefs:
        - QU024

    - type: private-evidence-only
      severity: material
      topic: revenue-concentration-unknown
      missingEvidence: Top-customer revenue concentration (top 1, top 3, top 10 customer
        share of ARR); segment-level revenue breakdown; geographic revenue split
      whyItMatters: High customer concentration (e.g., Kenco >15% of ARR) creates counterparty
        risk material to valuation; without disclosure, risk cannot be quantified
      diligencePath: Request customer revenue breakdown under NDA; ask for top-10 customer
        ARR contribution as part of commercial diligence
      relatedQuestionRefs:
        - QU026

    - type: missing-source
      severity: material
      topic: contract-renewal-not-published
      missingEvidence: Disclosed contract renewal rate, multi-site expansion rate per
        customer, or any cohort-level retention metric for GreyOrange deployments
      whyItMatters: Retention quality cannot be verified; estimated figures (3-5 year tenure)
        rely on industry analogues, not GreyOrange-specific data
      diligencePath: Request contract renewal statistics from GreyOrange; obtain reference
        customer interviews with Kenco or other multi-year clients to validate renewal patterns
      relatedQuestionRefs:
        - QU025

    - type: missing-source
      severity: minor
      topic: peer-retention-comparison-blocked
      missingEvidence: Published NRR or churn rate for warehouse automation peers (Locus
        Robotics, 6 River Systems, Geek+) for meaningful retention benchmarking
      whyItMatters: Relative retention quality cannot be assessed without peer benchmarks;
        GreyOrange's retention could be above or below category norms
      diligencePath: Research Locus Robotics and 6RS post-acquisition disclosures; use
        Gartner and CB Insights for sector benchmarks
      relatedQuestionRefs:
        - QU023

    - type: enumeration-incomplete
      severity: material
      topic: named-customer-enumeration-incomplete
      missingEvidence: Complete customer roster beyond the ~10 publicly named accounts;
        total active customer count disaggregated from the 3,000+ sites metric
      whyItMatters: The gap between ~10 named customers and 3,000+ active sites may represent
        many anonymous small clients or a few unnamed large accounts; this uncertainty
        limits segment and concentration analysis
      diligencePath: Request full customer list (anonymized by segment) from GreyOrange;
        verify whether 3,000+ sites is an account count or a facility count
      relatedTableRefs:
        - TU003
