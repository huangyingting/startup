figures:
  - id: FU001
    title: Customer Journey Map
    type: journey-map
    layout: wide
    summary: Six-stage customer lifecycle from initial awareness through multi-site expansion,
      illustrating GreyOrange's land-and-expand motion and enterprise switching-cost dynamics.
    data:
      items:
        - label: Awareness
          detail: Prospect discovers GreyOrange via analyst reports (Gartner multiagent
            orchestration insight), industry events (MODEX, ProMat), partner referrals
            (Dematic, Kenco, Zebra), or direct outreach from GreyOrange's sales team
        - label: Evaluation / RFP
          detail: Formal evaluation includes GreyMatter Foundry simulation demo, site visit
            to reference deployment, Certified Ranger Network hardware review, WMS/ERP
            integration scoping, and ROI modeling against current manual baseline
        - label: Procurement
          detail: Enterprise sales cycle typically 6–18 months; greenfield or brownfield
            contract negotiation; multi-year SaaS subscription plus robot fleet agreement;
            approval by C-suite and procurement
        - label: Deployment / Onboarding
          detail: WMS/ERP integration via REST/SOAP APIs; site infrastructure setup; RFID
            tagging for gStore deployments; robot fleet commissioning; associate training
            (70-80% reduction in training time claimed)
        - label: Active Operations
          detail: Daily AI-driven orchestration with 1M+ task optimizations per minute;
            real-time robot and associate task assignment; continuous SLA monitoring;
            99.95% on-time fulfillment rate claimed; gStore >99% accuracy at retail sites
        - label: Expansion / Multi-Site
          detail: Add fulfillment center sites (Kenco multi-site pattern); expand SKU
            coverage; add gStore retail locations; upsell gNetwork cross-channel
            coordination; Dematic channel customers onboarded at scale
    claimRefs:
      - CU027
      - CU033
      - CU036
      - CU040

  - id: FU002
    title: Adoption / Deployment Funnel
    type: funnel
    layout: standard
    summary: Representative funnel from initial prospect market through full multi-site
      expansion, illustrating the enterprise sales motion and conversion dynamics for
      GreyOrange's warehouse orchestration platform.
    data:
      items:
        - label: Initial Market Prospects
          value: 100
          detail: Enterprise warehouse operators evaluating automation; DC managers, 3PL
            operators, retailers with fulfillment complexity
        - label: Qualified Pipeline / RFP Stage
          value: 30
          detail: Prospects advancing to formal RFP or structured evaluation with GreyMatter
            Foundry simulation and reference customer conversations
        - label: Pilot / PoC Deployed
          value: 12
          detail: On-site proof-of-concept or limited-scope pilot deployment; integration
            testing complete; initial ROI measurement underway
        - label: Full Production Deployment
          value: 6
          detail: Full-scale production deployment across one or more warehouse sites;
            active daily operations; SLA monitoring and support engagement
        - label: Multi-Site Expansion
          value: 2
          detail: Customer expands to additional sites (Kenco model); upsell of gStore,
            gNetwork, or additional robot fleet; high switching cost at this stage
    approximationNotes: Stage conversion rates are illustrative estimates based on enterprise
      software industry benchmarks; GreyOrange has not disclosed its actual pipeline conversion
      metrics.
    claimRefs:
