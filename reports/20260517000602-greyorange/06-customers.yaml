callouts:
  - calloutType: strength
    title: Multi-Year Infrastructure Anchors Retention
    body: GreyOrange's 5-year strategic alliance with Kenco illustrates the land-and-expand
      dynamic central to enterprise warehouse robotics. Deep WMS/ERP integration, trained
      workforce adaptation, and multi-site fleet commissioning create switching costs
      that structurally disfavor customer churn. This is consistent with AMR industry
      norms for infrastructure-class deployments.
    claimRefs:
      - CU005
      - CU027

  - calloutType: risk
    title: Customer Proof Is Almost Entirely Self-Reported
    body: Of GreyOrange's named customer deployments, nearly all outcome metrics are
      company-stated and unverified by independent audits. Review platforms G2 and Gartner
      Peer Insights are inaccessible, Capterra has minimal coverage, and several customer
      websites are broken or rate-limited. This creates a material proof quality gap for
      diligence purposes.
    claimRefs:
      - CU029
      - CU030
      - CU031

  - calloutType: risk
    title: Revenue Concentration and NRR Are Undisclosed Blind Spots
    body: GreyOrange does not publish NRR, GRR, customer concentration, or top-N customer
      revenue share. If Kenco or GXO represents a disproportionate share of ARR, counterparty
      risk is material. The Dematic channel dependency introduces additional margin and
      control risk. Investors and acquirers should request customer-level revenue attribution
      as a primary diligence ask.
    claimRefs:
      - CU025
      - CU037

  - calloutType: insight
    title: Dematic Partnership Creates Step-Change Expansion Opportunity
    body: The April 2026 Dematic / KION Group partnership gives GreyOrange a conduit to
      9,000+ global installations — a potential 3x increase in addressable installed base
      relative to the current 3,000+ sites. Conversion of even 5-10% of the KION base
      would be a material expansion event. The risk is channel dependency and margin
      compression if Dematic controls the customer relationship.
    claimRefs:
      - CU007
      - CU008
      - CU035

