callouts:
  - type: "risk"
    title: "Financial Opacity Is a Fundamental Diligence Blocker"
    body: >-
      GreyOrange has disclosed zero financial metrics publicly — no revenue, no EBITDA, no burn
      rate, no unit economics, no ARR. After 14 years of operation and ~$305M raised, the
      complete absence of financial transparency means diligence can only assess the risk of
      financial distress by proxy: funding gap duration, comparable sector collapses (Locus
      Robotics), and qualitative signals from new partnerships. A thorough risk assessment
      requires NDA-gated financial access as a non-negotiable diligence step.
    claimRefs:
      - CR006
      - CR007
      - CR022
      - CR037
      - CR038

  - type: "risk"
    title: "Geek+ Price War Is an Unmitigated Structural Competitive Threat"
    body: >-
      Geek+'s Chinese manufacturing cost structure gives it a durable price advantage in hardware
      that GreyOrange cannot match through operational efficiency alone. In price-sensitive markets
      (APAC, emerging markets, cost-focused 3PLs), Geek+'s bundled hardware-software offering
      eliminates the need for a separate orchestration vendor — directly undercutting GreyOrange's
      core value proposition. GreyOrange's best defense is software-layer differentiation and
      enterprise focus in markets where total cost of ownership and AI sophistication outweigh
      unit price — but this limits addressable market and creates pricing ceiling risk.
    claimRefs:
      - CR001
      - CR002
      - CR032
      - CR033

  - type: "risk"
    title: "Key-Person Risk: Undisclosed Succession Creates Governance Blind Spot"
    body: >-
      Akash Gupta's 14-year tenure as CEO and co-founder creates deep institutional knowledge
      concentration with no disclosed succession plan, deputy CEO, or named operational COO.
      GreyOrange's investor relationships (Mithril Capital, Tiger Global), strategic partnerships
      (Dematic, Kenco), and AI product vision are all publicly associated with Gupta personally.
      An unplanned departure would simultaneously disrupt fundraising, strategic execution, and
      customer confidence — a compounded risk that is difficult to hedge without a disclosed
      succession framework. This should be a mandatory diligence ask before any investment.
    claimRefs:
      - CR009
      - CR022
      - CR029

