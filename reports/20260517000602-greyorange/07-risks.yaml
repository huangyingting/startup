  - id: section-R3
    title: "Regulatory, Legal, and Geopolitical Risks"
    body: >-
      GreyOrange's robotic deployments in warehouses across the Americas, Europe, and Asia
      create a layered regulatory exposure profile. The most immediate US regulatory risk comes
      from OSHA's General Duty Clause (Section 5(a)(1) of the OSH Act), which requires
      employers to provide a workplace free from recognized hazards. OSHA has explicitly stated
      on its robotics page that there are currently no specific OSHA standards for the robotics
      industry, but enforcement under the General Duty Clause applies to any warehouse robot
      incident involving worker injury. A robot-caused worker injury at a customer deployment
      could result in OSHA citations directed at the customer, but product liability claims
      against GreyOrange are plausible if the injury traces to a software orchestration defect.
      ISO 10218-1:2011 (robot safety requirements for industrial robots) provides the
      international safety standard framework; compliance with this standard is expected for
      any commercial warehouse robotics deployment.

      In Europe, the EU AI Act (entered into force 2024) introduces a risk-based classification
      system for AI systems. Autonomous robotic systems operating in environments shared with
      humans — such as warehouse AMRs coordinating with human pickers — may qualify as
      high-risk AI under Annex III categories, requiring conformity assessments, technical
      documentation, and transparency obligations before deployment in EU markets. The EU AI
      Act's full enforcement timeline extends to 2026 and beyond, but early compliance
      obligations are now active. GreyOrange has not publicly disclosed its EU AI Act
      compliance posture. GDPR (EU Regulation 2016/679) applies to GreyOrange's European
      operations as a data processor of worker activity data, inventory movement records, and
      potentially biometric or location data captured by warehouse sensors. Data Processing
      Agreements with European customers and data minimization practices are baseline
      compliance requirements.

      Export control risk is elevated: the US Bureau of Industry and Security (BIS) administers
      the Export Administration Regulations (EAR), and advanced robotics technology may be
      subject to export licensing in some geographies — particularly when deployed in markets
      subject to US sanctions or technology transfer restrictions. GreyOrange's operations
      in certain APAC and Middle Eastern markets require ongoing export control screening.
      Geopolitical risks compound: India-based operations create exposure to bilateral trade
      tensions, India's evolving technology regulation, and potential restrictions on technology
      export to or from India. FX risk from multi-currency operations (Indian rupees, euros,
      Singapore dollars, and other local currencies) is inherent but undisclosed in scope.
