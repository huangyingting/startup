  evidenceGaps:
    - type: "private-evidence-only"
      severity: "blocking"
      topic: "financial-metrics-completely-absent"
      missingEvidence: >-
        Revenue, ARR, EBITDA, burn rate, gross margin, unit economics, customer NRR — none
        disclosed publicly; all financial risk assessment relies on proxy signals.
      whyItMatters: >-
        Financial risk cannot be assessed without financial data; the four-year funding gap
        and 14-year operation without profitability disclosure are the most material unresolved
        risk factors in this chapter.
      diligencePath: >-
        Request audited financials, ARR cohort data, and board-level financial projections
        under NDA; obtain confirmation of runway and capital adequacy from CFO directly.
