  title: Product Architecture Map
  slug: product-architecture-map
  type: stack
  layout: wide
  summary: Layered stack representing GreyOrange's product architecture from physical robot hardware at the base through AI
    orchestration, store intelligence, and cross-channel coordination to enterprise integration at the apex.
  data:
    layers:
    - label: Physical Execution Layer — Certified Ranger Network (CRN)
      detail: 100+ certified robot models (AMRs, sorters, conveyors, goods-to-person systems) from third-party vendors; hardware-agnostic;
        CRN API standard ensures interoperability; 100K+ agents deployed
    - label: Robot Orchestration — GreyMatter Warehouse AI
      detail: 1M+ task-allocation optimizations per minute; multiagent AI assigns, re-routes, and balances work across all
        physical agents; 300+ UPH/station; 60% lower cost/unit; 4-5x peak scalability
