- id: section-E3
  title: Customer Workflows and Operational Outcomes
  body: 'GreyMatter addresses two primary customer workflow contexts: distribution center (DC) fulfillment and parcel sortation.
    In a DC deployment, GreyMatter receives order batches from the WMS, decomposes them into pick tasks, assigns tasks to
    available robots and human pickers, monitors execution, and re-routes dynamically when exceptions occur. The platform''s
    300+ UPH per station metric suggests meaningful throughput improvement over manual picking (typically 80-120 UPH in conventional
    warehouses). Customers include retailers, 3PLs, and omnichannel brands.


    In the retail store context, gStore uses RFID readers—typically mounted on ceilings or embedded in scan guns—to continuously
    monitor item-level inventory positions on shelves, in stockrooms, and in transit between areas. When inventory falls below
    a threshold or detects a mismatch, gStore triggers autonomous replenishment alerts to associates. The 40% sales lift per
    associate metric and 50% reduction in stockout cancellations are company-stated; the first production deployment with
    Zebra at a national fashion retailer (January 2026) reported 98% on-shelf availability as a tangible outcome.


    The Dematic strategic partnership (announced April 14, 2026) expands GreyMatter''s go-to-market into the KION Group ecosystem.
    Dematic, a major KION subsidiary and global material handling integrator, will offer GreyMatter as a complement to its
    own WMS and automation software. This makes GreyOrange''s AI orchestration available to Dematic''s global customer base
    without GreyOrange needing to build direct sales relationships in all markets.'
