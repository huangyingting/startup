chapter:
  number: 5
  title: Product & Technology
  summary: GreyOrange delivers a unified AI-powered fulfillment platform comprising three primary products—GreyMatter (warehouse
    orchestration), gStore (retail inventory intelligence), and GreyMatter Foundry (AI simulation and planning)—supported
    by the Certified Ranger Network (CRN) of vendor-agnostic robot hardware and the gNetwork cross-channel coordination layer.
    GreyMatter's multiagent AI engine processes 1M+ optimizations per minute across 100K+ physical agents at 3,000+ active
    sites, while gStore achieves >99% inventory accuracy using RFID. Product maturity is high for GreyMatter and gStore, newly
    launched for Foundry (April 2026), and early-GA for gNetwork; all performance metrics are company-reported with no independent
    third-party audit evidence publicly available.
sections:
- id: section-E1
  title: Product Portfolio and Platform Architecture
  body: 'GreyOrange organizes its commercial offerings under a unified fulfillment intelligence platform with four principal
    product lines as of the May 2026 run date. GreyMatter is the flagship AI-powered warehouse orchestration software, coordinating
    robots, humans, and software agents across distribution centers and fulfillment facilities. The platform processes more
    than one million task-allocation optimizations per minute, orchestrates over 100,000 physical agents simultaneously, and
    is active at more than 3,000 sites globally. It handles over $1 billion in inventory value per month, claims to reduce
    variable cost per fulfillment unit by 60%, and supports 300+ units per hour (UPH) per station throughput. GreyMatter is
    hardware-agnostic by design, integrating with robots from more than 100 vendors through the Certified Ranger Network (CRN).


    gStore is the company''s retail inventory intelligence product, powered by RFID readers and computer vision. It delivers
    more than 99% inventory accuracy, a 40% improvement in availability, and doubles associate productivity according to company-published
    benchmarks. A January 2026 joint announcement with Zebra Technologies reported 98% on-shelf availability at the first
    gStore production deployment—a national fashion retailer—and introduced an autonomous replenishment trigger capability.
    The Zebra partnership provides RFID hardware, software integration, and joint go-to-market channels.


    GreyMatter Foundry was launched at MODEX on April 13, 2026. It is described as an AI-powered warehouse automation simulator
    that predicts throughput, labor requirements, and cost outcomes for both current-state warehouse configurations and future
    automation scenarios. GreyOrange positions Foundry as a pre-sales and continuous-improvement tool to de-risk capital expenditure
    decisions.


    The Certified Ranger Network (CRN) is the hardware certification and integration layer. Rather than manufacturing its
    own robots, GreyOrange certifies third-party robot vendors whose hardware meets GreyMatter API compatibility standards.
    The CRN allows customers to mix robot brands within a single GreyMatter deployment, eliminating single-vendor lock-in.
    gNetwork is the cross-channel coordination layer connecting warehouse and retail environments, still in early general
    availability as of the run date.'
