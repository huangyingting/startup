  evidenceGaps:
  - type: missing-source
    severity: material
    topic: SOC-2-certification
    missingEvidence: Public SOC 2 Type II or ISO 27001 certification report, or confirmation of certification status from
      an accredited auditor's registry
    whyItMatters: Enterprise buyers in regulated industries require SOC 2 confirmation before procurement; absence blocks
      deals in pharma, financial services, and government verticals
    diligencePath: Request SOC 2 report under NDA directly from GreyOrange sales team; check AICPA SOC registry
    relatedQuestionRefs:
    - QE022
  - type: missing-source
    severity: minor
    topic: cloud-infrastructure-provider
    missingEvidence: Identity of cloud provider(s) hosting GreyMatter AI engine (AWS, Azure, GCP, or hybrid)
    whyItMatters: Cloud provider identity affects latency SLA, data residency compliance for EU customers, and risk concentration
      in multi-cloud vs single-cloud architecture
    diligencePath: Ask GreyOrange directly during technical due diligence; review customer DPA for sub-processor disclosure
    relatedQuestionRefs:
    - QE023
  - type: private-evidence-only
    severity: material
    topic: performance-metrics-audit
    missingEvidence: Independent third-party audit or benchmarking report for GreyMatter throughput (1M+ opts/min, 300+ UPH),
      gStore accuracy (>99%), and breach rate (<0.07%) claims
    whyItMatters: All reported performance metrics are company-stated; without independent validation, they cannot be used
      as binding contractual benchmarks and may overstate typical production performance
    diligencePath: Request customer references willing to share operational outcome data; ask for vendor-neutral benchmarking
      methodology
    relatedQuestionRefs:
    - QE024
  - type: access-blocked
    severity: minor
    topic: developer-community
    missingEvidence: Public developer documentation, SDK, open-source contributions, or active community signals (GitHub stars,
      Stack Overflow activity, developer forum posts)
    whyItMatters: Absence of public developer surface limits independent technical assessment and reduces ecosystem stickiness
      relative to API-first competitors; docs.greyorange.com requires authentication
    diligencePath: Request developer documentation access during due diligence; evaluate if a partner API program exists for
      system integrators
    relatedQuestionRefs:
    - QE017
