  evidenceGaps:
    - type: "private-evidence-only"
      severity: "blocking"
      topic: "revenue-arr-completely-undisclosed"
      missingEvidence: >-
        GreyOrange ARR, revenue, revenue mix (hardware vs. software), gross margin, NRR, EBITDA,
        and burn rate are entirely absent from public sources; no proxy or estimate can resolve
        this gap without management disclosure or NDA-gated data access.
      whyItMatters: >-
        Revenue is the single most important input to any valuation; without it, the $1.2B 2022
        mark cannot be validated or disproven; the bear vs. base vs. bull case probabilities are
        unanchored; and no investment conviction recommendation is defensible.
      diligencePath: >-
