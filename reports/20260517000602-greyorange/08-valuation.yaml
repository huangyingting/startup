callouts:
  - type: "risk"
    title: "Financial Opacity Is the Single Largest Diligence Blocker"
    body: >-
      GreyOrange has disclosed zero financial metrics — no revenue, no ARR, no EBITDA, no
      gross margin, no NRR — after fourteen years of operation and approximately $305M raised.
      A company at this stage with these partnership milestones (Dematic, Kenco, Zebra) would
      ordinarily be providing at least ARR and growth metrics to prospective investors. The
      complete absence of financial disclosure means that any valuation conclusion, including
      the "fair" stance taken here, is contingent on undisclosed data. The four-year funding
      gap from 2022 to 2026 without confirmed additional equity financing is the second-order
      signal of this opacity: either GreyOrange is profitable and self-funding (positive), or
      it is burning reserves from the 2022 raise and avoiding a down-round (negative). Without
      NDA access to audited financials, this ambiguity cannot be resolved.
    claimRefs:
      - CV006
      - CV007
      - CV008
      - CV035

  - type: "insight"
    title: "Symbotic's Trajectory Sets the Ceiling — and the Standard"
    body: >-
      Symbotic's rise from a $5.5B SPAC valuation at IPO in 2022 to a $28.5B market
      capitalization in May 2026 — driven by $2.52B in TTM revenue, GAAP profitability,
      and a $22.7B order backlog — demonstrates the potential ceiling for warehouse AI
      companies that achieve enterprise scale. The gap between Symbotic and GreyOrange is not
      primarily technological: both companies operate AI-powered orchestration systems at
      warehouse scale. The gap is commercial: Symbotic's Walmart anchor customer provided
      the scale and revenue that funded the flywheel, while GreyOrange's more distributed
      customer base has not produced a comparable public revenue milestone. The "Track"
      recommendation reflects the conviction that GreyOrange has the technology to become
      a Symbotic-scale company, tempered by the evidence that it has not yet demonstrated
      the financial trajectory to make that conviction investable at the current entry price.
    claimRefs:
      - CV012
      - CV013
      - CV014
      - CV022

  - type: "risk"
    title: "Locus Robotics Is the Adverse Comparable — Not Just a Warning"
    body: >-
      Locus Robotics peaked at a $2B+ private valuation with strong technology credentials,
      marquee customers, and a compelling AMR-as-a-Service narrative. By 2024 it filed for
      bankruptcy after repeated layoff rounds, demonstrating that the warehouse robotics
      sector punishes companies that cannot convert technology moat into sufficient revenue
      margin to cover operating costs. GreyOrange is not Locus Robotics — its software-first
      model, ten-year data flywheel, and vendor-agnostic architecture are structurally different.
      But the narrative similarity is not coincidental: both companies operated at scale
      (Locus had thousands of robots deployed), both had blue-chip investors, and both faced
      the same fundamental hardware margin pressure from Chinese AMR competitors. GreyOrange's
      bear case is not hypothetical — it is documented in the Locus precedent.
    claimRefs:
      - CV018
      - CV019
      - CV020
      - CV037

