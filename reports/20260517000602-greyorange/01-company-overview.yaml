  - id: section-4
    title: Platform Metrics and Milestone Trajectory
    body: >
      GreyOrange's public platform metrics as of 2026 demonstrate significant operational scale. The company reports
      100,000+ physical agents deployed worldwide, 3,000+ active global sites under management, $1B+ in inventory
      flows processed per month, and 1M+ task optimizations per minute via GreyMatter. The GreyMatter platform
      claims to deliver 60% lower variable cost per unit and 4-5x on-demand scalability headroom for customers.
      gStore, the retail inventory product, reports >99% inventory accuracy across 200+ stores for a leading
      specialty retailer, as well as a 40% boost in on-floor availability through intelligent replenishment, and
      2x associate productivity gains through guided workflows. These figures are company-claimed and represent
      best-case outcomes; they have not been independently audited.


      The product portfolio has evolved significantly since founding. GreyOrange began as a hardware provider of
      autonomous mobile robots (the "Butler" series), pivoted to an open orchestration software model around 2022,
      and launched GreyMatter as the unified AI-driven multiagent orchestration platform (MAOP). In April 2026,
      the company launched GreyMatter Foundry at MODEX, an AI simulator that predicts performance, labor, and cost
      outcomes for warehouse automation investments, positioning it as a pre-deployment planning tool. GreyMatter
      also includes DeepNav, an AI navigation component under development in collaboration with Google Cloud, using
      reinforcement learning to optimize AMR deployment and navigation.


      The milestone table presents the chronological record of key events from founding through April 2026.
      Strategically, GreyOrange's trajectory shows a company that initially scaled hardware globally, then
      repositioned to software-first in 2022, and is now executing a partnership-led GTM motion with major
      3PLs (Kenco), automation OEMs (Dematic), and technology platforms (Zebra) to capture the MAOP category.
