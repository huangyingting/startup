company:
  name: GreyOrange
chapter:
  number: 1
  title: Company Overview
  summary: >-
    GreyOrange is a late-stage private company founded in 2012 and headquartered in Atlanta, Georgia, that develops
    AI-powered warehouse orchestration and retail inventory software. Its flagship GreyMatter platform coordinates
    100,000+ physical agents across 3,000+ global sites, processing 1M+ optimizations per minute and managing $1B+
    in monthly inventory flows. The company last publicly disclosed a valuation of $1.2B in September 2022 following
    a $135M funding round, with total capital raised of approximately $305M from investors including Mithril Capital,
    Tiger Global, and Blume Ventures. Co-founder Akash Gupta has served as CEO since 2022; the company expanded its
    leadership team in November 2025 with the appointment of Richard Schrader as CRO and closed strategic partnerships
    with Kenco, Zebra Technologies, and Dematic in 2025-2026.

sections:
  - id: section-1
    title: Identity, Mission, and Business Model
    body: >
      GreyOrange Inc. is a global provider of AI-driven warehouse orchestration and retail store inventory software,
      founded in 2012 and headquartered in Suwanee, Georgia (Atlanta metro area). The company describes itself as a
      leader in hyper-intelligent warehouse orchestration, serving large retailers and third-party logistics providers
      (3PLs) through two primary software platforms: GreyMatter for distribution center operations and gStore for
      retail inventory management. GreyOrange's mission is to enable physical agents — robots, software systems, and
      human workers — to collaborate seamlessly under AI-driven direction, reducing costs, improving accuracy, and
      scaling throughput without proportional labor increases.


      The business model combines software licensing, platform fees, and partnerships with system integrators who
      deploy GreyOrange's solutions through a Certified Partner Network. The Certified Ranger Network (CRN) makes
      GreyMatter hardware-agnostic, allowing customers to integrate nearly any robot vendor's equipment without
      vendor lock-in. This open architecture is a core differentiator: GreyMatter's open API enables integration
      with diverse automation hardware, and customers can add new robots from almost any vendor with assurance of
      seamless interoperability. The company generates revenue through its platforms and through strategic alliances
      such as the enMotion by enVista offering, which delivers GreyMatter capabilities on a Robotics-as-a-Service
      (RaaS) basis, lowering the capital expenditure barrier for customers.


      GreyOrange was originally incorporated and built its early operations in India before relocating its
      headquarters to the United States. The company maintains offices and partners across the Americas, Europe,
      and Asia. As of the run date, the company is in a late-stage private company status with no publicly announced
      IPO plans, having last raised capital in September 2022 at a $1.2B valuation.
    claimRefs:
      - CO001
      - CO002
      - CO003
