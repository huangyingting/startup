  evidenceGaps:
    - type: private-evidence-only
      severity: material
      topic: "Annual revenue, ARR, and profitability metrics not publicly disclosed"
      missingEvidence: >-
        GreyOrange has not disclosed annual revenue, ARR, gross margin, or path-to-profitability data in any
        public filing or press release. No proxy or secondary estimate has been identified.
      whyItMatters: >-
        Without revenue data, financial diligence on the $1.2B valuation is impossible. The revenue multiple
        could range from very high to reasonable depending on undisclosed figures.
      diligencePath: "Request audited P&L (2022-2025) and capitalization table under NDA."
      relatedQuestionRefs:
        - QO015

    - type: stale
      severity: material
      topic: "GreyOrange valuation not updated since September 2022 (44+ months stale as of May 2026)"
      missingEvidence: >-
        No new funding round, secondary transaction, or independent third-party valuation has been publicly
        reported since the September 2022 $135M raise at $1.2B.
      whyItMatters: >-
        A four-year-old valuation in the rapidly evolving warehouse robotics and AI software market may not
        reflect current enterprise value; the company's strategic positioning and product evolution since 2022
        may justify a materially different valuation in either direction.
      diligencePath: "Request recent cap table and board-approved 409A or third-party valuation. Identify any recent secondary market transactions."
      relatedQuestionRefs:
        - QO007
        - QO021

    - type: missing-source
      severity: minor
      topic: "Employee headcount not publicly disclosed"
      missingEvidence: >-
        GreyOrange has not published headcount figures on its website or in press releases. LinkedIn and
        other HR data platforms may provide directional estimates but were not accessible with precision
        in this research pass.
      whyItMatters: >-
        Headcount is a useful proxy for burn rate and organizational scale; without it, revenue per employee
        and efficiency benchmarks cannot be estimated.
      diligencePath: "Check LinkedIn company page for employee count estimate; request confirmed headcount under NDA."
      relatedQuestionRefs:
        - QO020

    - type: enumeration-incomplete
      severity: minor
      topic: "Leadership table TO002 is partial — board members, advisors, and full executive team not publicly disclosed"
      missingEvidence: >-
        GreyOrange does not publish a full executive team roster on its website. Only Akash Gupta (CEO),
        Samay Kohli (co-founder), and Rik Schrader (CRO) are named in public press releases as of May 2026.
        Additional C-suite executives, board members, and advisors are not publicly identified.
      whyItMatters: >-
        Incomplete leadership visibility limits assessment of key-person risk, functional coverage depth,
        and governance accountability. Board composition in particular is critical for understanding investor
        control and exit alignment.
      diligencePath: "Request full organizational chart, board composition list, and executive biographies under NDA."
      relatedTableRefs:
        - TO002
      relatedQuestionRefs:
        - QO024

    - type: enumeration-incomplete
      severity: minor
      topic: "Milestone table TO004 is partial — private internal milestones, product releases, and regulatory filings not captured"
      missingEvidence: >-
        Only publicly announced milestones (press releases, media coverage) are captured. Internal product
        releases, customer contract signings, regulatory filings, and operational scale milestones not
        accompanied by press releases are absent. Early funding terms (2014 seed, 2015 Series A) lack
        specific dates and amounts.
      whyItMatters: >-
        A complete chronology is important for understanding the pace of company evolution, the triggers
        behind the 2022 software pivot, and any adverse events that may not have been publicly disclosed.
      diligencePath: "Request company timeline, board meeting minutes, and historical product roadmaps under NDA."
      relatedTableRefs:
        - TO004
      relatedQuestionRefs:
        - QO025

    - type: missing-source
      severity: minor
      topic: "Board composition and investor governance rights not publicly available"
      missingEvidence: >-
        GreyOrange has not disclosed its board composition, investor board seats, pro-rata rights, or
        liquidation preference stack. This limits understanding of control and exit dynamics.
      whyItMatters: >-
        Board control by lead investors (Mithril Capital, Tiger Global) could constrain the company's
        ability to execute on independent strategic decisions including partnerships, acquisitions, or an IPO.
      diligencePath: "Request capitalization table, investor rights agreement, and board minutes under NDA."
      relatedQuestionRefs:
        - QO009

    - type: enumeration-incomplete
      severity: minor
      topic: "Stakeholder or investor map TO003 is partial — secondary and undisclosed investors not confirmed"
      missingEvidence: >-
        The investor table reflects publicly disclosed investors only. Secondary investors who may have
        acquired shares in private transactions, debt holders, any undisclosed co-investors in the 2022 round,
        and any structured notes or convertible instruments are not captured from public sources.
      whyItMatters: >-
        Full capitalization table visibility — including all investors, their ownership percentages, board
        rights, and liquidation preferences — is essential for valuation and exit analysis in diligence.
      diligencePath: "Request full cap table, investor rights agreement, and secondary transaction history under NDA."
      relatedTableRefs:
        - TO003
      relatedQuestionRefs:
