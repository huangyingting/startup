  - id: section-2
    title: Leadership and Organizational Structure
    body: >
      GreyOrange was co-founded by Akash Gupta and Samay Kohli, who also co-founded several related entities. Samay
      Kohli served as CEO during the company's early phases; Akash Gupta was named CEO in 2022, marking a leadership
      transition that repositioned the executive structure as the company pivoted from a hardware-centric robot
      manufacturer to an AI-software orchestration platform. This transition is material to diligence because it
      signaled a deliberate strategy shift: GreyOrange de-emphasized proprietary robot hardware in favor of a
      vendor-agnostic, software-first model that can orchestrate third-party robots, including competing hardware.


      Akash Gupta's role as CEO has been confirmed across multiple GreyOrange press releases in 2025 and 2026,
      including the Gartner recognition announcement in October 2025 and the Dematic partnership press release in
      April 2026. In November 2025, GreyOrange named Richard "Rik" Schrader as Chief Revenue Officer, bringing
      deep expertise in warehouse and supply chain transformation and signaling a commercial growth phase. Schrader's
      appointment also indicated that GreyOrange was investing in go-to-market leadership depth beyond its founder-CEO.


      The company's leadership profile has limited public disclosure beyond key executives; board composition, equity
      distribution, and governance documents are not available from public sources. Key-person concentration remains
      a diligence consideration: Akash Gupta is the primary spokesperson across all recent press and partnership
      materials. The company's earlier co-founder CEO Samay Kohli is no longer in a publicly named executive role,
      though his co-founder relationship with the company continues.
    claimRefs:
      - CO004
      - CO005
      - CO006
      - CO030
      - CO035
    tableRefs:
      - TO002

  - id: section-3
    title: Capital Base, Investors, and Valuation
    body: >
      GreyOrange has raised approximately $305M in total disclosed funding across multiple rounds since its founding
      in 2012. The most significant round publicly documented was a $170M Series C in 2019 co-led by Mithril Capital
      (associated with Peter Thiel) and Tiger Global Management at an implied valuation of approximately $1B,
      making GreyOrange a unicorn at the time. In September 2022, GreyOrange raised an additional $135M at a $1.2B
      valuation, with participation from investors including Binny Bansal (co-founder of Flipkart). Blume Ventures,
      an early-stage Indian venture fund, provided early backing during the company's formative years (reportedly
      from 2014 onward), and continues to be a stakeholder.


      As of the run date in May 2026, no new funding rounds have been publicly announced since the September 2022
      raise. This nearly four-year gap without publicly disclosed new capital is a material diligence point: it is
      unclear whether the company has achieved operating profitability or near-profitability that reduces capital
      needs, or whether capital markets access has been constrained. Revenue figures are not publicly disclosed.
      The $1.2B valuation last confirmed in 2022 should be treated as an unconfirmed stale benchmark until updated
      through a new round or secondary transaction.


      Key strategic partners also represent economic stakeholders: Kenco (5-year deal, Oct 2025), Dematic
      (KION Group subsidiary, Apr 2026), and Zebra Technologies (Jan 2026) each generate partner revenue streams
      and create customer-facing channel dependency. The Gartner recognition in October 2025 further validates the
      company's positioning in the emerging Multiagent Orchestration Platform (MAOP) market.
