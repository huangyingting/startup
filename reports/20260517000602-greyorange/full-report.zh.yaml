  - id: TI005
    title: 公开财务披露缺口
    columns:
      - 指标
      - 披露状态
      - 为什么对尽调重要
      - 尽调路径
    rows:
      - - 年收入 / ARR
        - 未披露
        - 没有收入数据，无法判断 2022 年 $1.2B 估值对应的收入倍数；也无法确定增长轨迹或软件 / 硬件收入结构如何演变
        - 在 NDA 下索取经审计财务报表；用 3,000+ 个站点 × 估计 ACV 交叉校验
      - - 按板块拆分的毛利率
        - 未披露
        - 硬件与软件毛利率拆分是长期财务质量的核心驱动；综合毛利率决定通向盈利的路径
        - 索取按产品线拆分的管理账和 P&L；与可比上市公司毛利率（Manhattan Associates、Zebra Technologies）交叉比对
      - - EBITDA / 经营盈利能力
        - 未披露
        - 没有 EBITDA，就无法评估烧钱速度、现金跑道或接近现金流盈亏平衡的程度；这对判断资本充足性和融资风险至关重要
        - 索取过去 12 个月 P&L 和前瞻预算；与 2022 年 $135M 融资剩余余额对比评估
      - - 净收入留存率（NRR）
        - 未披露
        - NRR 是最关键的 SaaS 质量指标；它决定 SaaS 收入是在复利增长还是承压；若 NRR <100%，软件转型逻辑会出现重大红旗
        - 索取队列留存分析；按客户规模和产品线询问 NRR
      - - 客户数量和集中度
        - 部分披露（提及 3,000+ 个站点）
        - 站点数不等于客户数；集中度风险未知；若前 10 大客户贡献 >50% 收入，流失风险会抬升
        - 索取客户名单及匿名化收入集中度；询问 logo 留存数据
      - - 员工数和 R&D 支出
        - 未披露
        - 员工数趋势是烧钱速度的代理指标；R&D 支出决定产品投资能否持续
        - 跟踪 LinkedIn 员工数；检查裁员披露；索取按职能拆分员工数的组织架构图
      - - GreyMatter ACV / 交易规模
        - 未披露
        - ACV 决定企业承诺规模和定价权；没有 ACV 数据，收入估计只能是宽区间近似
        - 索取销售管线数据；审阅公开披露的合作条款（Kenco 5 年协议）作为代理
      - - 硬件库存和 CapEx
        - 未披露
        - 硬件 CapEx 和库存水平决定营运资本强度；这对判断 RaaS 模式是否把资本转成资产负债表风险至关重要
        - 索取资产负债表；评估库存库龄、保修准备金，以及 CapEx 相对折旧的水平
    notes: >-
      上述财务披露缺口合在一起，是任何投资者或收购方在 2026 年评估 GreyOrange 时最关键的尽调短板。对后期私人公司而言，所有这些缺口都属常见；但考虑到 GreyOrange
      四年没有公开融资活动，且正从硬件转向软件，缺口的重要性高于一般情形。任何可信的财务尽调流程，都必须先解决前四项（收入 / ARR、毛利率、EBITDA、NRR），再下投资结论。
    claimRefs:
      - CI025
      - CI026
      - CI027
      - CI028
      - CI029
      - CI030
