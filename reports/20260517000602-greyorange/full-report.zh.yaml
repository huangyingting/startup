      - number: '7.3'
        title: 监管、法律与地缘政治风险
        blocks:
          - type: paragraph
            body: >-
              GreyOrange 在美洲、欧洲和亚洲的仓库机器人部署，形成多层监管暴露。最直接的美国监管风险来自 OSHA 的 General Duty Clause（OSH Act 第 5(a)(1)
              条），该条要求雇主提供没有已知危害的工作场所。OSHA 在其机器人页面明确表示，目前机器人行业没有具体 OSHA 标准，但任何涉及工人受伤的仓库机器人事件，都适用 General Duty Clause
              执法。客户部署中如果机器人导致工人受伤，OSHA 传票可能指向客户；但如果伤害追溯到软件编排缺陷，针对 GreyOrange 的产品责任索赔也有可能。ISO
              10218-1:2011（工业机器人安全要求）提供国际安全标准框架；任何商业仓库机器人部署都预期应符合这一标准。

              欧洲方面，EU AI Act（2024 年生效）为 AI 系统引入基于风险的分类体系。在与人类共享环境中运行的自主机器人系统——例如与人工拣货员协同的仓库 AMR——可能根据 Annex III
              类别被认定为高风险 AI，在进入 EU 市场部署前需要合格评定、技术文档和透明度义务。EU AI Act 的完整执法时间线延伸到 2026 年及以后，但早期合规义务已经生效。GreyOrange 未公开披露其
              EU AI Act 合规立场。GDPR（EU Regulation 2016/679）适用于 GreyOrange
              的欧洲业务，因为它作为数据处理者处理工人活动数据、库存移动记录，以及仓库传感器可能捕获的生物识别或位置数据。与欧洲客户签署数据处理协议，并落实数据最小化实践，是基线合规要求。

              出口管制风险偏高：美国 Bureau of Industry and Security（BIS）管理 Export Administration
              Regulations（EAR），先进机器人技术在部分地区可能需要出口许可——尤其部署到受美国制裁或技术转让限制约束的市场时。GreyOrange 在部分 APAC
              和中东市场的业务，需要持续做出口管制筛查。地缘政治风险还会叠加：印度业务带来双边贸易紧张、印度技术监管演变，以及技术进出印度潜在限制等暴露。多币种运营带来的外汇风险（印度卢比、欧元、新加坡元及其他本地货币）天然存在，但范围未披露。
