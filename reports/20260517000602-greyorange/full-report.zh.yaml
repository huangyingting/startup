      - number: '5.5'
        title: 产品路线图与战略方向
        blocks:
          - type: paragraph
            body: >-
              GreyOrange 披露的路线图围绕三个战略主题：（1）Commerce One Vision——把 GreyMatter、gStore 和 gNetwork
              统一到单一平台，共享数据模型，并做跨渠道库存优化；（2）Foundry Expansion——把仿真能力扩展为仓库运营的持续数字孪生；（3）Alliance Ecosystem growth——扩展
              Certified Ranger Network 和战略伙伴名单，降低客户获取摩擦，加快企业部署。


              Commerce One Vision 已在公司网站宣布，GreyOrange 由此把自己定位为跨渠道履约智能平台，连接 DC
              与零售门店环境。这是一次重要产品战略转向：从机器人编排软件供应商，转向统一的实时库存和劳动力优化平台。公司尚未公开承诺完整统一 Commerce One Vision 平台的具体 GA 日期。


              Alliance Ecosystem 战略由 Dematic 合作（2026 年 4 月）、Zebra 合作（2026 年 1 月）和 Kenco Elite Partner of the Year
              奖项（2026 年 Q1）共同体现。这三项动作接连发生，说明公司有意借助高信誉合作伙伴触达企业客户，否则这些客户需要很长的直销周期。GreyOrange 还发布了 GreyMatter Foundry
              Launchpad，这是一个使用 Foundry 推进自动化履约项目的结构化加速器。
