      - number: '1.4'
        title: 平台指标与里程碑轨迹
        blocks:
          - type: paragraph
            body: >
              截至 2026 年，GreyOrange 公开披露的平台指标显示出可观运营规模。公司称，全球已部署 100,000+ 个物理智能体，管理 3,000+ 个活跃全球站点，每月处理 $1B+ 库存流，并通过
              GreyMatter 每分钟完成 1M+ 次任务优化。GreyMatter 平台宣称可帮助客户把单位可变成本降低 60%，并提供 4-5x 的按需扩展余量。零售库存产品 gStore 披露，一家领先专业零售商在
              200+ 家门店中实现 >99% 库存准确率；同时，靠智能补货将卖场有货率提高 40%，并借助引导式工作流将店员生产率提升 2x。这些数字均为公司宣称，代表最佳情形，尚未经过独立审计。


              自创立以来，产品组合已显著演化。GreyOrange 起步于自主移动机器人硬件（“Butler” 系列），约 2022 年转向开放编排软件模式，并推出 GreyMatter，作为统一的 AI
              驱动多智能体编排平台（MAOP）。2026 年 4 月，公司在 MODEX 发布 GreyMatter Foundry，这是一款 AI
              模拟器，用于预测仓库自动化投资的性能、用工和成本结果，定位为部署前规划工具。GreyMatter 还包含 DeepNav，这是与 Google Cloud 合作开发中的 AI 导航组件，利用强化学习优化 AMR
              部署和导航。


              里程碑表按时间记录了从创立到 2026 年 4 月的关键事件。战略上，GreyOrange 的轨迹显示：公司先把硬件做向全球，2022 年转为软件优先，如今则靠合作伙伴驱动的市场拓展动作，与大型
              3PL（Kenco）、自动化 OEM（Dematic）和技术平台（Zebra）一起争夺 MAOP 品类。
