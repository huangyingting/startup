      - number: '3.3'
        title: 定价格局、护城河分析与竞争耐久性
        blocks:
          - type: paragraph
            body: >-
              仓库自动化定价高度可变，且很少公开。企业整场部署（AMR、编排软件、集成、支持）通常在 $2 million 到 $50 million 以上，取决于设施规模、机器人队列规模和软件范围。AMR
              硬件（GreyOrange Ranger、Geek+ P1200、AutoStore Grid Robots）按台定价，通常在 $20,000–$120,000
              区间，取决于载重等级和能力。编排平台软件授权（GreyMatter、LocusONE、Manhattan WMS/WES）通常采用年度 SaaS 订阅费，依据管理资产、按机器人或按站点计费。GreyOrange
              不公开披露价格；其 RaaS 模式（通过 enMotion/enVista 合作）将资本开支转为运营费用。AutoStore 只通过认证系统集成商销售，包括 Swisslog、Bastian Solutions
              和 SSI Schaefer，这增加了一层集成环节，而 GreyOrange 通过直接伙伴关系避开了这一层。

              GreyOrange 的竞争护城河可从五个维度分析。第一，软件飞轮：GreyMatter 的机器学习模型会随着新增站点和机器人管理规模提升而改进，形成复利式数据优势。GreyOrange 管理 3,000+
              个站点、100,000+ 个物理智能体，每分钟处理 1 million 次以上优化，已积累大量训练数据，新进入者难以快速复制。第二，Certified Ranger Network（CRN）：GreyOrange
              通过认证机器人厂商硬件与 GreyMatter 兼容，为部署混合机器人队列的客户制造切换成本。第三，与 WMS、ERP、OMS 和 TMS
              平台的深度企业集成代表大量实施投入，替换成本高。第四，合作伙伴生态：Certified Partner Network 中的系统集成商关系形成联合销售依赖，有利于 GreyOrange
              扩展客户。第五，Dematic 渠道：2026 年 4 月 KION/Dematic 合作让 GreyMatter 可触达 Dematic 装机基础；如果合作加深，这会是重要分销护城河。

              护城河耐久性的主要风险包括：Manhattan Associates 和 Blue Yonder 把原生 WES 编排延伸进自身 WMS 装机基础，形成绕过 GreyOrange
              的纯软件路径；硬件厂商（AutoStore、Geek+、Dematic）开发或收购自有编排层；Geek+ 价格有竞争力的 AMR 捆绑方案侵蚀 GreyOrange 在价格敏感地区的市场；以及 Dematic
              合作形成渠道依赖，让 KION Group 可能据此争取更优条款。护城河真实存在，但并非不可逾越。
