      - number: '2.4'
        title: 增长驱动、约束与采用动态
        blocks:
          - type: paragraph
            body: >-
              仓库自动化市场受到多项结构性需求驱动支撑，这些驱动相互强化，且大体属于长期趋势。物流劳动力短缺和工资通胀是最大单一驱动，估计为市场 CAGR 增加 +3.1%（Mordor
              Intelligence）。美国劳工统计局记录了仓储和配送岗位长期难招的情况，物流领域结构性工资通胀自 2021 年以来加速。电商增长和最后一公里配送预期估计为 CAGR 增加
              +2.8%；随着全球线上零售渗透率继续提升，履约中心必须以更快周期处理更高订单量。SKU 激增——零售商现在管理的 SKU 数量是十年前的 10x
              以上——以及全渠道整合需求，制造了人工工作流无法经济处理的运营复杂度。

              RaaS（Robotics-as-a-Service）订阅模式是重要需求加速器。传统自动化系统通常需要 $5–50M+ 前期投入，RaaS
              将大额资本开支转为运营费用，让中端市场运营商也能使用过去只有投资级企业才用得起的自动化。该模式把原先被价格挡在门外的大量中型仓库（低于 50,000 平方英尺；Mordor Intelligence 预测其
              CAGR 为 15.19%）纳入市场，从而扩大可服务范围。

              约束端，高资本成本和较长 ROI 周期（完全回本需 3–5+ 年）仍是障碍，经济不确定时期尤其如此。与旧有 WMS 和 ERP 系统集成的复杂度是显著摩擦点：大多数大型企业已在 SAP、Oracle 或 Blue
              Yonder 等既有系统上投入重金，任何自动化方案都必须干净接入。竞争拥挤正成为新约束：资金充裕的既有厂商（Dematic、Swisslog、Honeywell Intelligrated、KION
              Group）拥有的资本和客户关系远多于纯软件供应商，其中一些正在开发自有编排软件层，直接竞争 GreyOrange
              定位。经济周期性是横向风险：仓库自动化资本开支重且并非刚性；宏观下行历来会让企业推迟或取消自动化投资。
