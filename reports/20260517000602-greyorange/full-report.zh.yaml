  - number: 3
    title: 竞争格局
    sections:
      - number: '3.1'
        title: 竞争格局概览
        blocks:
          - type: paragraph
            body: >-
              GreyOrange 所处的仓库自动化市场有多个清晰但正在融合的竞争层次。第一层是 AMR 硬件，即拥有物理执行层的自主移动机器人制造商。主要公司包括 AutoStore（挪威公司，2021 年在 Oslo
              Stock Exchange IPO，基于网格的货到人系统）、Geek+（中国公司，融资 $500M+，在亚太最强）和 Locus Robotics（美国协作机器人公司，2023–2024
              年面临严重财务逆风）。第二层是大型集成自动化供应商，即销售硬件-软件-服务捆绑方案的全球系统集成商。Dematic（KION Group，10,000+ 名员工，全球 9,000+
              个安装项目）、Swisslog（KUKA Group，全球 2,500+ 个实施项目）和 Honeywell Intelligrated 代表这一批资金雄厚的既有厂商。

              第三层是 WMS 与编排软件，即在仓库运营软件“大脑”层竞争的平台。Manhattan Associates、Körber Supply Chain 和 Blue Yonder 参与这里的竞争，它们拥有既有
              WMS 客户基础，并正向 WES 和编排功能延伸。Manhattan Associates 明确营销一套原生内置于云原生 WMS 的
              WES，宣称可同时编排仓库中的每一类资源，包括劳动力、自动化和机器人——这使其在软件层与 GreyMatter 直接竞争。

              GreyOrange 独特的竞争位置在于不绑定硬件的多智能体编排平台（MAOP），并获得 Gartner Innovation Insight 报告认可。GreyMatter
              不是只在某一层竞争，而是坐在技术栈之上，借助 Certified Ranger Network
              协调来自任何厂商的机器人、输送线、人员和软件。这种跨层定位同时带来机会（与硬件厂商合作）和风险（硬件厂商自建编排软件层）。2026 年 4 月 Dematic 合作是值得注意的结构性进展：KION Group
              选择把 GreyMatter 集成进自有软件组合，而不是正面竞争，这验证了 GreyOrange 的编排层，也制造了渠道依赖。Bloomberg 记录了 2023
              年仓库自动化创业公司估值的整体回调，并指出，疫情后抬高的估值对缺少清晰盈利路径的公司不可持续——这一市场动态已经重塑竞争版图。
