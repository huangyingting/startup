          - type: callout
            title: 资金雄厚的集成厂商竞争加剧
            body: >-
              仓库自动化编排层正在吸引大型、资金雄厚的集成厂商进入。Dematic（KION Group，€12B+ 收入）、Swisslog（KUKA Group）、Honeywell Intelligrated 和
              Amazon Robotics 的资本基础均远大于 GreyOrange，并在扩展编排软件能力。这些既有厂商拥有现成客户关系、大规模现场服务组织，以及捆绑式硬件-软件销售动作；GreyOrange
              必须在没有同等规模优势的情况下与之竞争。Bloomberg 2023 年报道记录了 2021 年融资热潮后仓库自动化创业公司的“现实检验”，Locus Robotics——一家可比的纯 AMR 公司——在
              2023–2024 年陷入财务困境。
