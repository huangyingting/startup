      - number: '4.4'
        title: 财务不透明、尽调缺口与资本充足性
        blocks:
          - type: paragraph
            body: >-
              GreyOrange 的财务画像有意保持高度不透明，这符合其作为无需披露财务结果的私营公司身份。截至 2026 年 5 月，没有可靠公开来源披露公司的年收入、年经常性收入（ARR）、毛利率、运营费用、EBITDA
              或现金状况。后期私营公司普遍如此，但它显著抬高尽调风险，因为外部无法验证公司的财务轨迹、烧钱速度和现金跑道假设。

              最重要的财务缺口是没有任何披露收入数字。没有收入，就无法判断 $1.2B 的 2022 年估值隐含了多少收入倍数，无法评估业务是在增长还是收缩，也无法判断 2022–2026 年的软件转向如何影响财务表现。跟踪
              GreyOrange 的分析师和记者都未能获得收入披露；印度或美国私营公司在这一阶段也没有等同的监管文件可查。

              资本充足性是最紧迫的财务风险维度。2022 年 9 月融资 $135M
              是最后一次已知现金注入。公司在三大洲拥有大规模现场业务，承担制造或硬件采购，并扩张软件研发组织；如果用收入覆盖程度不同测算，年度现金消耗可能从 $30M 到超过 $100M。如果公司年收入为
              $80M–$150M，且贡献毛利层面接近盈亏平衡，2022 年 9 月的资金在审慎管理下可能仍有余额。如果公司尚未盈亏平衡、年度烧钱超过 $60M，那么 2022 年融资带来的现金跑道到 2025–2026
              年可能已经接近耗尽或已经耗尽，未披露的过桥融资或新一轮融资就很合理。

              GreyOrange 历史业务模式偏硬件，这对资本效率是结构性逆风。硬件公司需要为库存、制造预付款和保修准备金占用营运资本，软件公司没有这些负担。转向软件优先和 Certified Ranger
              Network（第三方硬件）后，这一压力显著下降，但并未完全消失，因为 GreyOrange 仍继续提供自有 Ranger 机器人。资本强度图（FI004）展示了各业务成本中心的相对强度。Locus
              Robotics 的教训值得警惕：这家公司融资超过 $400M，却在 2024 年初进入债权人利益转让程序；这说明硬件资本强度叠加扩张难题，即便资本充足的机器人公司，也可能在跑到可持续单位经济模型之前被压垮。

              尽调 GreyOrange 财务，需要拿到经审计财务报表、按产品线和地区拆分的 ARR、按分部拆分的毛利率，以及详细烧钱速度和现金跑道分析。签署 NDA
              的战略投资者或收购方，会获得与任何公开来源截然不同的可见度。外部评估最有效的代理指标包括：合作伙伴合同公告（Kenco 5 年协议、Dematic 集成）、员工数趋势、地域扩张节奏，以及未来任何融资披露的时间点。
