            title: 财务不透明是基本尽调阻断点
            body: >-
              GreyOrange 公开披露的财务指标为零——没有收入、没有 EBITDA、没有烧钱速度、没有单位经济模型、没有 ARR。运营 14 年并融资约 $305M
              后，财务透明度完全缺失，意味着尽调只能通过代理指标评估财务困境风险：融资空窗长度、可比行业崩塌案例（Locus Robotics）以及新合作带来的定性信号。全面风险评估必须把 NDA
              门槛内的财务访问作为不可谈判的尽调步骤。
