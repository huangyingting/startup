  - number: 5
    title: 产品与技术
    sections:
      - number: '5.1'
        title: 产品组合与平台架构
        blocks:
          - type: paragraph
            body: >-
              截至 2026 年 5 月运行日，GreyOrange 将商业产品整合在统一的履约智能平台之下，主要有四条产品线。GreyMatter 是旗舰 AI
              仓库编排软件，负责在配送中心和履约设施中协调机器人、人员和软件智能体。平台每分钟处理超过 1M 次任务分配优化，同时编排 100,000+ 个物理智能体，并在全球 3,000+ 个站点运行。它每月处理超过 $1B
              的库存价值，声称可将每履约单元可变成本降低 60%，并支持每个工作站 300+ 件 / 小时（UPH）的吞吐。GreyMatter 设计上不绑定硬件，借 Certified Ranger
              Network（CRN）接入来自 100+ 家供应商的机器人。


              gStore 是公司的零售库存智能产品，依靠 RFID 读写器和计算机视觉驱动。根据公司发布的基准，它可交付超过 99% 的库存准确率、40% 的可得性提升，并让门店员工生产率翻倍。2026 年 1 月与
              Zebra Technologies 的联合公告称，首个 gStore 生产部署——一家全国性时尚零售商——实现了 98% 的货架有货率，并引入自主补货触发能力。Zebra 合作提供 RFID
              硬件、软件集成和联合商业化渠道。


              GreyMatter Foundry 于 2026 年 4 月 13 日在 MODEX 发布。公司将其描述为 AI
              驱动的仓库自动化仿真器，可预测当前仓库配置和未来自动化场景下的吞吐、用工需求和成本结果。GreyOrange 将 Foundry 定位为售前和持续改进工具，用来降低资本开支决策风险。


              Certified Ranger Network（CRN）是硬件认证和集成层。GreyOrange 的做法不是只制造自有机器人，而是认证符合 GreyMatter API 兼容标准的第三方机器人供应商。CRN
              允许客户在单个 GreyMatter 部署中混用不同机器人品牌，消除单一供应商锁定。gNetwork 是连接仓库和零售环境的跨渠道协调层，截至运行日仍处于早期 GA 阶段。
