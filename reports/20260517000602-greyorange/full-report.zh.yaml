          note: 多站点铺开；NRR 扩张；每新增站点带来增量 SaaS ARR
        - id: platform-lock-in
          label: 平台粘性 / 续约
          value: 36
          unit: months
          note: 深度 WMS/ERP 集成形成切换成本；续约 ACV 持平或高于上一期
        - id: gstore-upsell
          label: gStore 增购（零售客户）
          value: 24
          unit: months after GreyMatter
          note: 向已使用 GreyMatter 的零售商交叉销售 gStore；扩大钱包份额
      edges:
        - from: acquisition
          to: deployment
          label: 签约 → 硬件 + 实施
        - from: deployment
          to: greymatter-live
          label: 集成完成 → SaaS 计费开始
        - from: greymatter-live
          to: expansion
          label: ROI 验证 → 多站点或机器人扩张
        - from: expansion
          to: platform-lock-in
          label: 装机基础 → 深度集成锁定
        - from: greymatter-live
          to: gstore-upsell
          label: 零售客户 → gStore 交叉销售
        - from: platform-lock-in
          to: expansion
          label: 续约周期 → 持续扩张
    approximationNotes: 时间线估计基于企业仓库自动化部署基准和 GreyOrange 伙伴优先的 GTM 模式。实际时间线会因客户规模和复杂度而异。扩张和增购阶段代表 NRR 扩张逻辑。GreyOrange 不披露销售周期、部署时间或 NRR 数据。
