      - number: '3.2'
        title: 直接竞争对手画像与战略评估
        blocks:
          - type: paragraph
            body: >-
              AutoStore 总部位于挪威，是市场中占主导地位的网格型货到人系统。其立方体存储系统在每平方米上实现高存储密度：箱体堆叠在三维铝制或钢制网格中，由顶部轨道上的电池驱动 Grid Robots
              取放。AutoStore 硬件优先、基础设施投入重；安装需要大量设施施工，且高度耐用，通常可运行 25+ 年。AutoStore 于 2021 年在 Oslo Stock Exchange IPO，峰值估值超过
              $12 billion。GreyOrange 不参与网格型货到人存储竞争，但会争夺同一批企业物流预算；其 GreyMatter 平台可通过 Certified Ranger Network 编排
              AutoStore 系统，把 AutoStore 硬件变成 GreyMatter 编排端点。

              Geek+ 总部位于中国，业务遍及 40+ 个国家，是亚太按出货量领先的 AMR 制造商。公司融资超过 $500M，部署货到人、货到墙和分拣机器人系统（包括 P1200 拣选机器人和 RS Air 分拣系统），与
              GreyOrange 的 Ranger 系列直接竞争。其捆绑的软件编排层（RMS）与 GreyMatter 竞争。Geek+ 的关键竞争优势是价格：中国硬件成本显著低于西方替代方案，使 Geek+
              在价格敏感市场具备成本优势，尤其是亚洲、南美和欧洲电商运营商。Geek+ 带来的竞争风险在 GreyOrange 缺少深度合作伙伴关系的市场最尖锐，因为 Geek+ 的硬件-软件捆绑方案不需要额外编排供应商。

              Locus Robotics 是美国协作机器人公司，曾从 Tiger Global 等投资方融资超过 $400M，峰值估值超过 $2 billion。2023–2024 年，Locus
              遭遇严重财务困难，进行多轮裁员并重组业务。截至 2026 年，Locus 已转向自主履约模式（Locus Array），并以 Physical AI 定位推出 LocusONE 编排软件，成为 WES 层中的
              GreyMatter 直接竞争者。Locus 财务不稳定，使其长期竞争相关性和客户信任都存在不确定性。

              Dematic（KION Group）是全球最大仓库自动化集成商之一，拥有 10,000+ 名员工，覆盖 26+ 个国家。2026 年 4 月与 GreyOrange 合作后，Dematic
              从原本的直接编排软件竞争者，转变为 GreyMatter 的分销渠道。Dematic 现有企业关系让 GreyOrange 得以进入全球一些最复杂的供应链环境。Manhattan Associates
              是按企业市场份额计领先的 WMS 厂商，如今已加入原生 WES 能力，可“同时编排仓库中的每一类资源——包括劳动力、自动化和机器人”；考虑到 Manhattan 既有 WMS 装机基础和企业关系，它是
              GreyOrange 最强的软件层竞争对手。OPEX Corporation 服务 47 家 Fortune 100 公司，拥有 345 项已授权专利和 50 年自动化经验，在独立货到人 ASRS
              细分竞争。Körber Supply Chain 通过 K.Motion 套件在欧洲和北美竞争 WMS/WCS/WES 软件层。6 River Systems 原为独立公司，2023 年 5 月并入 Ocado
              Group，目前以 Ocado Mobile Robot System（OMRS）对外销售，服务物流和零售的中密度仓库自动化。Fetch Robotics（2021 年被 Zebra Technologies
              收购）在 Zebra 企业组合内竞争 AMR 和机器人队列管理细分。
