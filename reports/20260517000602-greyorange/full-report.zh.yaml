              GreyOrange 有意从硬件优先的机器人制造商，重新定位为软件优先的 AI 编排平台，长期看会带来明显更好的财务质量。SaaS 毛利率（估计 65%–78%）约为硬件毛利率（估计 20%–35%）的
              2–3x。随着 GreyMatter 和 gStore 的 SaaS 收入流在总收入中占比提升，混合毛利率改善、运营杠杆增强，业务资本强度下降。Certified Ranger Network 让
              GreyMatter 不再绑定硬件，并把机器人采购转给第三方供应商，直接从 GreyOrange 资产负债表上移除资本强度最高的成本中心。2025–2026 年宣布的三项大型企业合作（Kenco 5
              年协议、Zebra Technologies、Dematic）都把软件平台作为主要商业产品，验证企业买家采购的是 AI 编排层，而不是自有硬件。
