            - Geek+ 价格竞争；软件护城河削弱
        - label: 中概率
          values:
            - 出口管制摩擦
            - 中美关税升级；WMS 集成失败；地缘政治汇率风险
            - 资本不足；Kenco / Dematic 渠道流失
        - label: 低概率
          values:
            - ''
            - GDPR 不合规；EU AI Act 合规缺口
