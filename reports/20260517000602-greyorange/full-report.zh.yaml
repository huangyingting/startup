      - number: '2.5'
        title: 图表
        blocks:
          - type: callout
            title: 巨大的空白市场：90% 仓库尚未自动化
            body: >-
              GreyOrange 自有网站称，目前只有 10% 仓库实现自动化。这意味着全球约 1.35 million 个设施可能形成未来需求，几乎是完全未开发市场。Gartner 预测到 2028 年 80%
              仓库将部署某种自动化，意味着采用速度会阶跃式上升；未来几年，市场特征可能是快速首次采用，而不是增量升级。GreyOrange
              软件优先、开放架构模式适合争取首次采用者，这些客户想要灵活性和互操作性，又不想被厂商锁定。
            calloutType: insight
