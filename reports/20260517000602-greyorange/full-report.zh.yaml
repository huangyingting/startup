      - number: '5.3'
        title: 客户工作流与运营结果
        blocks:
          - type: paragraph
            body: >-
              GreyMatter 覆盖两个主要客户工作流场景：配送中心（DC）履约和包裹分拣。在 DC 部署中，GreyMatter 从 WMS
              接收订单批次，将其拆分为拣货任务，分配给可用机器人和人工拣货员，监控执行，并在异常发生时动态重新路由。平台每工作站 300+ UPH 的指标，意味着相较人工拣货（传统仓库通常为 80-120
              UPH）有显著吞吐提升。客户包括零售商、3PL 和全渠道品牌。


              零售门店场景下，gStore 使用 RFID 读写器——通常安装在天花板或嵌入扫描枪——持续监控货架、库房以及区域间在途商品的单品级库存位置。当库存低于阈值或检测到不匹配时，gStore
              会向门店员工触发自主补货提醒。公司披露每名员工销售提升 40%、缺货取消减少 50%；2026 年 1 月与 Zebra 在一家全国性时尚零售商的首个生产部署报告了 98% 的货架有货率，属于可观察的具体结果。


              Dematic 战略合作（2026 年 4 月 14 日宣布）将 GreyMatter 的商业化触达扩展到 KION Group 生态。Dematic 是 KION 旗下重要子公司，也是全球物料搬运集成商，将把
              GreyMatter 作为自有 WMS 和自动化软件的补充提供给客户。这让 Dematic 全球客户群可以使用 GreyOrange 的 AI 编排，而 GreyOrange 不必在所有市场自建直销关系。
