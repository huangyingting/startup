            title: 四年融资空窗引发资本充足性疑问
            body: >-
              GreyOrange 最后一次披露融资是在 2022 年 9 月，当时以 $1.2B 估值融资 $135M。截至 2026 年 5
              月，公司未公开披露后续融资——空窗期接近四年。公司跨三大洲运营、仍有活跃硬件制造，并拥有规模不小的工程团队，年度现金消耗可能在 $30M 到超过 $90M 之间。如果烧钱速度处于高位，2022 年的 $135M
              资金到 2026 年可能已大部分或全部用完，带来近期融资压力。可比仓库机器人公司 Locus Robotics 曾耗尽超过 $400M 风险资本，并在 2024
              年进入债权人利益转让程序，说明硬件密集型机器人企业如果在资本耗尽前未实现盈利，财务风险会非常尖锐。GreyOrange 的软件转向可能带来更省资本的轨迹，但在没有财务披露前无法验证。
            calloutType: insight
