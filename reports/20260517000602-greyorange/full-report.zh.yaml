  - number: 7
    title: 风险
    sections:
      - number: '7.1'
        title: 竞争与市场风险
        blocks:
          - type: paragraph
            body: >-
              GreyOrange 所在仓库自动化市场，竞争者包括资本充足的既有厂商、进攻性很强的中国 AMR 厂商，以及把机器人编排原生集成进 WMS
              平台的软件巨头。三大主要竞争威胁是结构性的，不是周期性的。第一，Geek+ 已融资超过 $500M，业务覆盖 40+ 个国家，并受益于中国制造成本结构，硬件定价明显低于 GreyOrange Ranger
              系列。在价格敏感市场——尤其 APAC 和新兴市场——Geek+ 的软硬件捆绑方案不需要单独编排供应商，直接替代 GreyOrange 的价值主张。第二，AutoStore 是资本充足的上市竞争者（Oslo
              Stock Exchange，2021），拥有韧性较强的网格化硬件收入和不断扩张的软件层；它争夺同一批企业物流预算。第三，Manhattan Associates 明确对外销售一套内置在其云原生 WMS 平台中的
              WES，声称可同时编排所有仓库资源，包括劳动力、自动化和机器人——这直接侵入 GreyMatter 软件层差异化。Dematic 合作把一个竞争者转为渠道伙伴，但 Dematic
              也在构建竞争性软件能力。GreyOrange 的供应商中立定位是结构性优势，但硬件厂商自建专有编排层仍在挑战这一优势。Locus Robotics 2024 年破产程序说明行业脆弱：一家峰值估值 $2B 的
              AMR 公司在财务压力下倒下，证明仓库机器人市场会惩罚没有清晰盈利路径的公司。GreyOrange 的关键竞争失效信号，是北美或 EMEA 企业交易赢单率持续下降，以及 Geek+ 价格战迫使
              GreyOrange 低于可持续硬件毛利率，引发毛利压缩。Amazon Robotics 虽然主要服务内部，但鉴于 Amazon 在仓库环境中的规模和机器学习能力，一旦对外商业化，就是潜在威胁。
