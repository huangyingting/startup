      - number: '4.2'
        title: 资本形成、融资历史与估值
        blocks:
          - type: paragraph
            body: >-
              GreyOrange 在多轮融资中披露累计风险资本融资约 $305M。公司公开可见的融资里程碑如下：早期从 Blume Ventures 融资；2019 年 3 月完成 $170M Series C，由
              Mithril Capital 领投，Tiger Global Management 和 Binny Bansal（Flipkart 联合创始人）参与，估值约 $1
              billion——使其成为印度第一批机器人独角兽之一。最近一次披露融资是 2022 年 9 月，由新老投资方领投的 $135M 融资，投后估值约 $1.2 billion，较 2019 年独角兽估值小幅抬升。截至
              2026 年 5 月，公司未披露任何新增融资，距上一轮已有近四年空窗。

              2022 年 9 月融资时 $1.2B 估值，意味着投后企业价值约为累计披露融资额的 3.9x。放在 2022 年可比后期私营软件和机器人公司语境下，相比当时纯 SaaS 公司享有的收入倍数，$1.2B
              估值算中等偏保守；不过仓库机器人板块在 2021 年高峰后，到 2022 年中已开始估值重置。Locus Robotics——一家同样融资超过 $400M 的直接 AMR 同业——估值崩塌，并于 2024
              年初申请债权人利益转让，为资本密集且未能盈利的重硬件机器人商业模式提供了警示先例。

              GreyOrange 2022 年融资 $135M，被定位为增长融资，用于加速全球扩张、GreyMatter 平台产品开发和市场拓展规模化。此后，公司拿下多项重要战略合作协议：2025 年 10 月与 Kenco
              签订五年合同，2026 年 1 月与 Zebra Technologies 建立战略合作，2026 年 4 月与 Dematic 开展多年期技术集成。这些合作验证了企业商业牵引力，但不能直接回答
              GreyOrange 是否正在产生足够经常性收入、从而无需新增资本即可维持运营。

              距上一轮披露融资已有四年，这一空窗可对应多种情景：公司软件业务已经达到或接近盈亏平衡；运营现金流足以延长现金跑道；公司正在探索战略选项，包括 M&A 退出或后期 pre-IPO
              轮；也可能一直在融资，但尚未以可接受条款完成。缺少 IPO 申报或二级市场交易披露，意味着外部估值事实上冻结在 2022 年 9 月的 mark-to-market 水平。
