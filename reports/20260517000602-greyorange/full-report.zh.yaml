        title: 客户分层与客户基础概览
        blocks:
          - type: paragraph
            body: >-
              GreyOrange 服务四个主要垂直行业的企业客户：物流 / 3PL、零售（实体门店）、电商 / DTC，以及医疗健康 / 药房。公司首页披露全球 3,000+ 个活跃部署站点、100,000+
              个物理智能体，并每月处理 $1B+ 库存，显示出相当规模——但公司没有按细分行业或地区拆分站点数或智能体数。具名企业客户包括 Kenco Group（美国最大私营 3PL 之一）、GXO
              Logistics（据报道为客户，但未独立确认）、Farmacia Tei（罗马尼亚）、Apotek Hjärtat（瑞典）和 Sodimac（南美）。


              典型买方画像是评估多年期仓库自动化平台的运营或供应链高管。付款方是拥有资本预算权限的企业采购部门。终端用户是仓库一线员工、机器人车队管理人员和零售门店运营团队。GreyOrange 的双产品组合——面向 DC
              履约的 GreyMatter 和面向零售门店库存的 gStore——让它覆盖从 DC 到门店的价值链。北美、EMEA 和 LATAM
              的具名部署显示地域多元，但收入或客户集中度未公开按地区披露。细分层面的收入拆分未知，这是理解增长和流失风险集中在哪里的重大尽调缺口。
