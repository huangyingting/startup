    rows:
      - - GreyMatter AI / ML 飞轮（数据护城河）
        - 4 / 5
        - 竞争对手（Manhattan、Geek+）基于自有装机基础构建专有编排 ML；数据优势需要持续再投入才能守住
        - 中期（2–4 年）
        - 索取 ML 模型性能随时间提升的证据；用标准 KPI 对标 GreyMatter 与可比编排平台的准确性
      - - Certified Ranger Network（硬件互操作护城河）
        - 4 / 5
        - 硬件厂商（AutoStore、Geek+）可能关闭 API，减少第三方编排接入；KION / Dematic 构建原生编排，削弱 CRN 价值主张
        - 短中期（1–3 年）
        - 索取认证厂商和储备管线的准确数量；核验 API 接入条款；评估是否有 CRN 厂商限制 GreyMatter 接入
      - - 企业集成锁定效应（WMS / ERP / OMS）
        - 3 / 5
        - Manhattan Associates 在 WMS 内原生扩展 WES，降低对独立编排厂商的需要；Blue Yonder 凭现有 ERP 客户基础走同一路线
        - 中期（2–4 年）
        - 索取客户留存率和净收入留存率（NRR）；梳理哪些客户在 GreyMatter 旁边同时运行 Manhattan 或 Blue Yonder WMS
      - - Certified Partner Network（SI 渠道）
        - 3 / 5
        - Dematic 渠道形成战略依赖；KION 可能将 GreyMatter 能力内化，或用 iQ 软件替代；合作伙伴产能限制增长
        - 短中期（1–3 年）
        - 索取合作伙伴渠道收入贡献、合作伙伴 NPS 和排他条款；评估合作伙伴管线质量与产能
      - - 软件优先定价模式（RaaS / SaaS 转换）
        - 3 / 5
        - Geek+ 的低价硬件加捆绑软件在价格敏感市场竞争；若 Locus Robotics 稳住，其 RaaS 模式相似
        - 短期（1–2 年）
        - 索取与 Geek+ 在竞争评估中的赢输数据；识别 Geek+ 正在替代 GreyOrange 的地区
      - - Gartner MAOP 类别认可
        - 2 / 5
        - MAOP 仍是 Innovation Insight 类别（不是 Magic Quadrant）；如果 Gartner 不把它提升为正式 Magic Quadrant，竞争信号和买方拉力会减弱
        - 中期（2–4 年）
        - 每年跟踪 Gartner MAOP 类别演进；监控哪些竞争对手进入 MAOP 框架；评估 GreyOrange 相比同业的位置轨迹
      - - gStore 零售库存差异化
        - 2 / 5
        - 目前没有具名竞争对手拥有等价的 DC 到门店统一库存平台，但 Manhattan Associates 和 Blue Yonder 正在投入店内智能能力
        - 中期（2–4 年）
        - 索取 gStore 客户数、ARR 和 NRR；评估 gStore 是独立产品线，还是主要作为 GreyMatter 采用加速器
    notes: >-
      护城河强度评分（1–5）是基于公开证据的定性分析师评估，并非来自审计指标或 GreyOrange 提供的数据。风险周期根据公开产品公告中观察到的竞争投资速度估计。尽调问题反映缺失的私有信息，这些信息会实质改变强度评估。评分不反映
      GreyOrange 内部竞争情报，后者并不公开。
