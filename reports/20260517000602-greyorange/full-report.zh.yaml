            body: >-
              截至 2026 年 5 月，收入、年经常性收入（ARR）、毛利率、EBITDA、净留存率（NRR）、客户数、ACV
              和烧钱速度均未披露。一家估值十亿美元级的后期私营公司出现这种情况，属于最高等级的财务不透明。任何投资或收购决策，如果没有 NDA 保护下访问 GreyOrange 经审计财务、管理账和 ARR
              瀑布表，几乎只能依赖低置信度的推断估计。财务尽调最关键的四个待确认指标是：（1）按产品线拆分的年收入；（2）按分部拆分的毛利率；（3）GreyMatter SaaS 平台的
              NRR；（4）当前现金状况和未来烧钱速度。缺少这四个数据点，无法以合理置信度得出财务估值结论。
