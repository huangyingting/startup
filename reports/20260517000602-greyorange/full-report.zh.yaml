  - id: FR001
    type: matrix
    title: GreyOrange 风险热力图：概率与影响
    summary: 风险热力图把 GreyOrange 已识别风险按概率（低 / 中 / 高）和影响（低 / 中 / 高）两个维度映射。单元格条目代表各风险类别。高概率 / 高影响风险是投资逻辑的即时关注点。
    layout: standard
    data:
      columns:
