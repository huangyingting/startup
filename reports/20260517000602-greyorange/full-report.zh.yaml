  - id: FV001
    type: flow
    title: GreyOrange 投资建议逻辑
    summary: 流程图追踪从核心证据支柱，经关键风险和不确定性，到最终“观察”建议的逻辑链。展示哪些输入会把建议转为投资或回避。
    layout: standard
    data:
      nodes:
        - id: e1
          label: 证据支柱 1：规模与验证
          detail: 3,000+ 个站点、100,000+ 个物理智能体、每分钟 1M+ 次优化；Kenco 和 Dematic 合作验证规模化部署
          type: evidence
        - id: e2
          label: 证据支柱 2：市场顺风
          detail: 仓库自动化市场 2026 年为 $34B，到 2031 年以 14% CAGR 增至 $66B；Gartner：到 2028 年 80% 仓库实现自动化
          type: evidence
        - id: e3
          label: 证据支柱 3：软件护城河
          detail: 10+ 年自有数据飞轮；通过 CRN 集成 100+ 家机器人 OEM；不绑定硬件的模式制造切换成本
          type: evidence
        - id: r1
          label: 风险 1：财务不透明
          detail: 运营 14 年后仍无 ARR / EBITDA / NRR 披露；4 年融资空窗；估值仅基于 2022 年标记
          type: risk
        - id: r2
          label: 风险 2：竞争威胁
          detail: Geek+ 在 APAC 打价格战；Manhattan Associates 原生 WES；Symbotic 规模优势；Locus Robotics 警示案例
          type: risk
        - id: r3
          label: 风险 3：估值不确定
          detail: $1.2B 的 2022 年标记无法用当前收入验证；乐观 / 基准 / 悲观情景横跨 $800M–$3.5B
          type: risk
        - id: s1
          label: 情景：基准情景
          detail: 2027 年 ARR $100–180M；估值 $1.2–1.8B；2022 年进入的 IRR 为 8–15%
          type: scenario
        - id: s2
          label: 情景：乐观情景
          detail: ARR $200–300M；估值 $2.5–3.5B；IRR 25–35%；需要 Dematic 渠道跑出牵引力 + 收入结构偏软件
          type: scenario
        - id: s3
          label: 情景：悲观情景
          detail: ARR <$80M；估值 <$1B；IRR 为负；类似 Locus 的收入不及预期
          type: scenario
        - id: rec
          label: 建议：观察
          detail: 暂不投资；跟踪 IPO 信号、ARR 里程碑、Dematic 牵引力和 M&A 催化；每季度复盘
          type: recommendation
      edges:
        - from: e1
          to: s1
          label: 支撑基准 / 乐观情景的 ARR 假设
        - from: e2
          to: s2
          label: 大 TAM 验证规模天花板
        - from: e3
          to: s1
          label: 软件护城河支撑基准情景下的溢价倍数
        - from: r1
          to: s3
          label: 不透明提高悲观情景概率权重
        - from: r2
          to: s3
          label: Geek+ 价格战压缩赢单率和利润率
        - from: r3
          to: rec
          label: 估值不确定区间太宽，压低确信度
        - from: s1
          to: rec
          label: 基准情景 IRR 不足以支撑高确信度买入
        - from: s2
          to: rec
          label: 乐观情景可能成立，但没有财务数据无法验证
        - from: s3
          to: rec
          label: 悲观情景并非小概率；盲目进入下行太大
