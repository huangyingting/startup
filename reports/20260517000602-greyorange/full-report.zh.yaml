      - number: '1.2'
        title: 领导层与组织结构
        blocks:
          - type: paragraph
            body: >
              GreyOrange 由 Akash Gupta 和 Samay Kohli 联合创办；两人还共同创办过数个相关实体。Samay Kohli 在公司早期担任 CEO；Akash Gupta 于 2022 年出任
              CEO，这次领导层交接重塑了高管结构，也对应公司从硬件为中心的机器人制造商转向 AI 软件编排平台。尽调上，这次转型很关键：GreyOrange
              有意弱化自研机器人硬件，改走不绑定厂商、软件优先的模式，可编排第三方机器人，包括竞争对手硬件。


              Akash Gupta 的 CEO 身份已在 GreyOrange 2025 和 2026 年多份新闻稿中得到确认，包括 2025 年 10 月 Gartner 认可公告和 2026 年 4 月 Dematic
              合作新闻稿。2025 年 11 月，GreyOrange 任命 Richard “Rik” Schrader 为首席营收官，引入仓库和供应链转型领域的深厚经验，也释放出进入商业增长阶段的信号。Schrader
              的任命还说明，GreyOrange 正在创始人 CEO 之外加深商业化领导层厚度。


              除关键高管外，公司公开披露的领导层信息有限；董事会构成、股权分布和治理文件无法从公开来源获得。关键人物集中度仍是尽调要点：Akash Gupta 是近期所有新闻与合作材料中的主要发言人。早期联合创始人兼 CEO
              Samay Kohli 已不再担任公开披露的高管职位，但仍保持与公司的联合创始人关系。
