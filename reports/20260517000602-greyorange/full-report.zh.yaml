      - number: '2.3'
        title: 买方细分与采用路径
        blocks:
          - type: paragraph
            body: >-
              仓库自动化市场主要按买方类型划分（3PL、零售商、电商、冷链、制造），各细分在需求、预算归属和采用触发因素上不同。按 Mordor Intelligence，第三方物流商（3PL）在 2025
              年仓库自动化支出中占比最大，为 38.96%；推动力是它们需要用灵活、可重构的自动化方案服务多个客户。零售与电商合计占 28.41%，由全渠道履约需求、以及当天或次日送达 SLA
              推动；这些服务水平靠人工运营无法规模化支撑。

              GreyOrange 的产品组合与 3PL 和大型零售商最匹配，这是其优先级最高的两个细分。GreyMatter 平台不绑定硬件的架构和多智能体编排能力，对同时管理多个机器人厂商、多客户运营的 3PL
              尤其有价值。对大型零售商而言，GreyMatter（配送中心）与 gStore（零售门店库存）整合后，能从 DC 到门店货架形成统一履约智能层。公开点名的部署包括
              Sodimac（南美领先家装零售商，部署全球最大托盘搬运 AMR 项目）、Farmacia Tei（欧洲药房连锁）和 Active Ants（荷兰电商履约专家）。

              企业仓库自动化的采用路径通常是分阶段漏斗：认知自动化选项、评估 ROI 与供应商匹配度、单设施试点、再全网络部署。对 GreyOrange 来说，Certified Ranger
              Network（CRN）以及技术、渠道和咨询伙伴构成的 Alliance Ecosystem，可以降低集成风险和部署复杂度，从而加速漏斗。2026 年 4 月宣布的 Dematic（KION
              Group，全球前三自动化供应商）合作，是重要渠道进展，把 GreyOrange 触达延伸到 Dematic 现有企业客户群。
