          - type: callout
            title: 软件优先模式受益于软件板块 CAGR 加速
            body: >-
              Grand View Research 和 Mordor Intelligence 均指出，仓库自动化的软件板块增速快于硬件：Grand View Research 估计软件组件（WMS、WCS、WES）CAGR
              约 21%；Mordor Intelligence 显示软件为 14.87%，而硬件在绝对份额上领先、但增速较慢，约 17%。GreyOrange 2022
              年战略转向软件优先、不绑定硬件的模式，使其有机会捕捉这种差异化增长。硬件业务商品化速度快于软件编排层，因此 GreyOrange 的打法相对纯硬件厂商具备结构优势。
