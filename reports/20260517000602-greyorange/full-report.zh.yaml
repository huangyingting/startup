      - number: '4.3'
        title: 单位经济与利润率画像
        blocks:
          - type: paragraph
            body: >-
              GreyOrange 尚未公开披露毛利率、经营利润率或 EBITDA 等指标。不过，公司硬件 + 软件的双重收入模型，可以借助行业基准推断其混合毛利特征。硬件机器人业务——包括 AMR
              制造、供应链物流和现场部署——毛利率通常在 20%–40%；组件成本、制造开销、保修和维护准备金、现场服务人工共同压低毛利。相比之下，软件 SaaS 订阅在规模化后毛利率通常为
              65%–80%，平台开发完成后，每增加一个席位或站点的边际成本很低。以 GreyOrange 目前软件 / 硬件收入混合阶段看，混合毛利率可能在 35%–55%，但硬件与软件收入占比未知，区间不确定性很大。

              GreyMatter 平台披露的性能指标，间接说明 GreyOrange 为客户创造的经济价值：单件可变成本降低 60%、按需扩展能力提升 4–5x、每个工作站每小时拣选 300+ 件、准时履约率
              99.95%。如果这些结果能在客户部署中得到验证，就意味着买方 ROI 很强，也说明 GreyOrange 有定价权——也就是可以按交付价值而不是单纯成本加成来给 GreyMatter 定价。SaaS
              层尤其依赖这一点，因为定价权是净留存率和最终利润率扩张的主要驱动。

              大型仓库自动化部署的客户回本周期，硬件侧通常为 2–4 年，反映首批机器人部署的资本开支强度。纯软件部署回本更快，通常为 12–24 个月，因为前期投入更低，生产率提升更快兑现。GreyOrange 借
              enVista 的 enMotion 等合作伙伴提供 RaaS 模式，把资本开支风险转给服务商；客户可更快拿到 ROI，但代价是持续的单件运营支出更高。GreyOrange 获得的 RaaS
              年度现金收入，每个站点可能低于直接硬件销售，但收入可预测性更好，也降低了硬件收入周期的波动。

              净留存率（NRR）——企业软件公司最重要的 SaaS 财务指标——完全未披露。平台定位为持续学习、不断扩展的编排层，因此 NRR 高于 100% 的结构性理由很强：客户增加机器人、流程或站点时，会自然扩大
              GreyMatter 订阅范围，即现有客户扩张收入跑赢流失。不过，在没有披露 NRR 数据的情况下，这仍是分析推断，不是已确认指标。公司披露其管理 100,000+ 个物理智能体、覆盖 3,000+
              个活跃站点，意味着平均每站点约 33 台机器人；这一水平符合中大型企业部署特征，足以支撑每站点有意义的 ACV。
