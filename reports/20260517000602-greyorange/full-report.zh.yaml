  - id: FR003
    type: dag
    title: GreyOrange 依赖关系图：关键外部依赖
    summary: 有向无环图列出 GreyOrange 横跨硬件、云基础设施、渠道合作伙伴、监管机构和客户的关键外部依赖。边表示从外部实体到 GreyOrange 运营能力的依赖流。
    layout: wide
    data:
      nodes:
        - id: d1
          label: Dematic / KION Group
          detail: 2026 年 4 月以来的战略渠道合作伙伴；向 KION 全球 9,000+ 个安装点分发 GreyMatter
          type: dependency
        - id: d2
          label: Zebra Technologies
          detail: gStore 零售场景的 RFID 硬件合作伙伴；顶置 RFID 部署采用联合市场推广
          type: dependency
        - id: d3
          label: Certified Ranger Network（100+ 家机器人厂商）
          detail: 不绑定硬件的编排依赖 AMR / 机器人制造商积极参与 CRN
          type: dependency
        - id: d4
          label: 云基础设施供应商（未披露）
          detail: 实时 AI 编排引擎托管在云端；供应商未公开披露
          type: dependency
        - id: d5
          label: WMS / ERP 供应商（SAP、Oracle、Manhattan）
          detail: GreyMatter 集成在客户 WMS/ERP 之上；API 兼容性是部署前提
          type: dependency
        - id: d6
          label: Kenco Group（锚定客户）
          detail: 五年战略联盟；美国 3PL 标杆参考；多站点 GreyMatter 部署
          type: dependency
        - id: d7
          label: OSHA / 监管机构
          detail: 美国 OSHA、EU AI Act 主管机构、ISO 标准机构共同约束机器人安全和 AI 合规
          type: dependency
        - id: d8
          label: GreyOrange 核心平台（GreyMatter + gStore）
          detail: 中央编排引擎；实时运营依赖所有上游输入
          type: core
        - id: d9
          label: 半导体 / 零部件供应商
          detail: Ranger 机器人制造依赖半导体、LIDAR 传感器和精密电机
          type: dependency
      edges:
        - from: d1
          to: d8
          label: 渠道分发；软件生态集成
        - from: d2
          to: d8
          label: RFID 硬件数据供给 gStore 智能
        - from: d3
          to: d8
          label: 机器人集群遥测数据供给 GreyMatter 编排
        - from: d4
          to: d8
          label: 云承载 AI 引擎；实时计算
