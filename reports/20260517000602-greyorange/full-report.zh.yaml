      - number: '8.2'
        title: 可比估值与情景分析
        blocks:
          - type: paragraph
            body: >-
              由于收入未披露，给 GreyOrange 定价必须同时看可比公司和基于情景的折现价值框架。上市可比公司给出了仓储自动化企业在不同规模、不同阶段对应的估值倍数区间。

              Symbotic（NASDAQ: SYM）是最有参考价值的可比公司。截至 2026 年 5 月，Symbotic 股价约 $47，市值 $28.52B，过去十二个月收入 $2.52B，对应约 11–12x 的
              EV/Revenue 倍数。Symbotic 2026 财年 Q2 收入达到 $676M，已按 GAAP 盈利，订单积压为 $22.7B，展示了一家完全规模化的仓储 AI 公司在财务上可以长成什么样。但
              Symbotic 对 Walmart 的主导关系和 $22B+ 订单积压，与 GreyOrange 分散但未披露的客户基础在性质上不同：这组对比给出了 GreyOrange
              可达上限，却不应因规模差异被直接拿来套倍数。AutoStore（Oslo: AUTO）是一家基于网格的仓储自动化公司，2021 年 IPO 时峰值估值超过 $12B；2025–2026
              年其倍数已明显压缩，估计市值 $2–3B，收入 $600M+，对应约 4–5x 收入倍数，更适合作为收入 $200–600M 区间仓储自动化公司的参考。Locus Robotics 在 2024
              年申请破产前，曾达到 $2B 的私人估值峰值，是关键的反向可比：一家仓储 AMR 公司，相对其融资规模和运营结构，收入不足，最终几乎抹掉全部股权价值。Geek+ 仍为私人公司，估值估计超过
              $2B，是最直接的竞争可比；其中国产制造成本结构可能意味着毛利率曲线不同于 GreyOrange，但其规模验证了这个品类。

              基准情景假设 2027 年年经常性收入（ARR）达 $100–180M，硬件毛利率 20–30%，软件毛利率 60–70%，混合毛利率 35–45%；在这个前提下，8–12x 的 EV/Revenue
              倍数较合理（反映 GreyOrange 的私人公司折价、低于 Symbotic 的规模，以及数据飞轮护城河溢价），对应企业价值 $1.2–1.8B，基本验证 2022 年估值标记。乐观情景下（ARR
              $200–300M、软件占比更高、Dematic 渠道放量），倍数可能扩到 12–15x，支撑 $2–3B 估值区间，并让 2022 年投资人获得 25–35% IRR。悲观情景下（ARR
              $60–80M、硬件毛利承压、盈利能力存疑），估值会压到 $1B 以下，使按 2022 年价格进入的投资人 IRR 为负。由于财务高度不透明，情景概率权重很不确定；这里给基准情景约 50% 权重，乐观和悲观各
              25%，意味着期望值略高于 $1.2B，但不确定性区间很宽。

              下方可比估值表概括了行业格局。覆盖并不完整，因为 Geek+ 和 GreyOrange 的财务数据没有公开披露；上市公司倍数来自截至 2026 年 5 月的实时市场数据。
