      - number: '1.3'
        title: 资本基础、投资方与估值
        blocks:
          - type: paragraph
            body: >
              GreyOrange 自 2012 年创立以来，在多轮融资中披露累计融资约 $305M。公开记录中最重要的一轮是 2019 年 $170M Series C，由 Mithril Capital（与 Peter
              Thiel 相关）和 Tiger Global Management 共同领投，隐含估值约 $1B，使 GreyOrange 当时成为独角兽。2022 年 9 月，GreyOrange 又以 $1.2B 估值融资
              $135M，Binny Bansal（Flipkart 联合创始人）等投资方参与。Blume Ventures 是印度早期风险基金，在公司成长期提供早期支持（据报道自 2014 年起），并持续持股。


              截至 2026 年 5 月本报告日期，2022 年 9
              月融资之后，公司未公开宣布新一轮融资。近四年没有公开披露新增资本，是一个重要尽调点：目前不清楚公司是否已实现运营盈利或接近盈利、从而降低资金需求，还是资本市场通道受限。收入数据未公开披露。2022 年最近确认的
              $1.2B 估值，在新融资或老股交易更新之前，应视为未经确认且已经滞后的基准。


              关键战略合作伙伴也代表经济利益相关方：Kenco（5 年协议，2025 年 10 月）、Dematic（KION Group 子公司，2026 年 4 月）和 Zebra Technologies（2026 年
              1 月）分别带来合作伙伴收入流，并形成面向客户的渠道依赖。2025 年 10 月 Gartner 的认可进一步验证了公司在新兴 Multiagent Orchestration
              Platform（MAOP）市场中的定位。
