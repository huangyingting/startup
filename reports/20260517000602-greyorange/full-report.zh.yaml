              产品页被称为全球最大的托盘搬运 AMR 安装案例，但这一说法尚未独立验证。零售侧，一家头部专业零售商在 200+ 家门店部署 gStore，实现 >99% 库存准确率和缺货取消减少 50%；一家全国性时尚零售商借
              Zebra-GreyOrange gStore 集成实现 98% 的货架有货率（2026 年 1 月宣布）。


              其他具名部署包括 Farmacia Tei（罗马尼亚药房，服务更快、用工更少）、Active Ants（荷兰电商，零步行自动化）和 FIGS Scrubs（医疗服饰 DTC，仓库自动化）。2026 年 4 月
              Dematic/KION 合作把 GreyMatter 的触达延伸到 KION Group 生态的 9,000+ 个全球安装点，代表一次重大管线扩张。关键限制在于：大多数客户名称由 GreyOrange
              自报；独立确认有限，因为 G2 和 Gartner Peer Insights 需要 JS
              渲染，多个客户网站损坏或受到限流。客户结果指标（NRR、人工节省、ROI）几乎全部由公司披露，缺少独立审计。具名客户证明质量为中等：生产部署得到确认，但带有独立验证的量化结果很少。
