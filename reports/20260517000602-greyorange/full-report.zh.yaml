      - number: '7.2'
        title: 运营、技术与供应链风险
        blocks:
          - type: paragraph
            body: >-
              GreyOrange 的硬件制造带来资本强度和供应链风险，纯软件竞争者没有这些问题。Ranger 机器人系列需要半导体、精密电机、LIDAR 传感器和电池系统，供应和成本都容易受到地缘政治扰动。美中
              Section 301 关税覆盖机器人电子组件，会抬高任何经由中国供应链采购的硬件销货成本（COGS）；如果价格无法相应调整，硬件毛利可能被压到不可持续阈值以下。制造集中度——GreyOrange
              在印度制造，并在全球组装组件——带来地域风险；一旦印度发生劳工行动、自然灾害或监管变化，生产可能中断。

              技术风险最集中在 GreyOrange 的核心 AI 编排引擎。GreyMatter 声称在仓库站点间每分钟执行超过 1M 次优化，这种吞吐带来系统性故障风险：如果 AI
              引擎失效、给出错误路径分配，或触发机器人碰撞场景，运营和法律后果会立刻出现。在有人类工人的环境中实时编排自主移动机器人，带来实体安全风险——客户现场一旦发生机器人与工人碰撞或险情，可能引发 OSHA
              调查、产品责任索赔和客户信心流失。99%+ 库存准确率和 0.07% 准时发货违规率的说法抬高了客户预期；如果持续交付不了这些指标，就会触发合同层面风险和声誉损害。

              系统集成风险同样重大。GreyMatter 借 API 集成叠加在客户 WMS、ERP 和 OMS 系统之上；WMS 升级周期、客户 IT
              基础设施变化和新客户上线，都会带来集成维护负担。高知名度客户部署失败，会伤害 GreyOrange 的标杆客户基础，而标杆客户对企业销售周期至关重要。云基础设施依赖是结构性风险：如果 GreyMatter 的
              AI 引擎跑在单一云提供商上，而该提供商发生故障，所有受影响客户站点的实时仓库运营可能同时中断。云提供商身份未公开披露，无法评估多云韧性。
