  - id: FE002
    title: 客户工作流 / 运营流程
    slug: customer-workflow-operating-flow
    type: flow
    layout: wide
    summary: 端到端运营流程，展示 GreyMatter 如何从 WMS 接收订单开始，编排 DC 履约订单直到物理执行和出货。
    data:
      nodes:
        - id: n1
          label: 收到订单（WMS）
          detail: WMS 或 OMS 通过 REST API 将订单批次推送给 GreyMatter；订单被拆解为单个行项目和拣选任务
          type: input
        - id: n2
          label: GreyMatter AI 优化
          detail: 多智能体 AI 引擎实时把拣选任务分配给可用机器人和人类员工；考虑机器人位置、电量、拣选区域、订单优先级和月台排程
          type: process
        - id: n3
          label: 并行机器人执行
          detail: AMR 和货到人机器人导航到拣选位置；CRN 确保跨供应商协同；发生碰撞或设备故障时实时重路由
          type: process
        - id: n4
          label: 现场员工指引
          detail: 员工通过穿戴设备或固定终端接收简化的自适应拣选指令；所需培训减少 70-80%；GreyMatter 管理员工任务与机器人车队的穿插
          type: process
        - id: n5
          label: 拣选校验与异常处理
          detail: 在拣选工位扫描并校验；错拣或缺货会触发自动重新分配给另一智能体；报告的智能体违约率 <0.07%
          type: process
        - id: n6
          label: 打包、分拣和出货
          detail: 分拣后的商品流向打包工位；GreyMatter 协调包裹分拣机交接；优化承运商提货的月台分配
          type: output
      edges:
        - from: n1
          to: n2
          label: 订单批次推送
        - from: n2
          to: n3
          label: 机器人任务分配
        - from: n2
          to: n4
          label: 员工任务分配
        - from: n3
          to: n5
          label: 商品已拣选
        - from: n4
          to: n5
          label: 商品已拣选
        - from: n5
          to: n6
          label: 商品已校验
