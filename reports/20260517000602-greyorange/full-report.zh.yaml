      - number: '5.4'
        title: 信任、安全与合规
        blocks:
          - type: paragraph
            body: >-
              GreyMatter 披露低于 0.07% 的智能体违规率（agent breach rate），定义为机器人或人工偏离指定路径、从而打断其他智能体或造成安全事件的智能体任务占比。该数据由公司披露，出现在
              GreyMatter 产品页，但没有引用独立审计方法。公开信息中尚未确认 SOC 2 Type II、ISO 27001 或同等信息安全认证；信任或合规文档请求会导向销售和客户门户，而不是公开信任中心。


              实体安全方面，公司称 Certified Ranger Network 认证流程会确保每个接入的机器人型号在获准联合部署前，满足 GreyMatter 安全和 API 标准。公司为企业客户提供 24/7
              支持模式，并描述了 SLA 分层，但公开网站未发布具体 uptime SLA 百分比。GDPR 合规在欧洲部署语境中被提及，但没有公开数据处理协议或隐私认证可供独立审阅。


              缺少公开信任文档，是企业采购的重大尽调缺口。受监管行业（制药、食品、汽车）的买家如果要求软件供应商提供 SOC 2 或 ISO 27001，需要在 NDA
              下索取文档。这符合一家上市前、中等规模软件供应商的阶段特征，但也与更成熟 SaaS 平台形成对比。
