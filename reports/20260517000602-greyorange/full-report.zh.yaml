              SaaS 费率变现，收入基座相当可观。关键问题是 3,000+ 个站点是否都在付费订阅 GreyMatter SaaS，还是站点数包含软件收入附着有限的传统纯硬件客户。这一区分，是财务尽调最重要的澄清问题。
