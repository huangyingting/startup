      - number: '2.2'
        title: 市场规模测算：TAM、SAM 与 SOM
        blocks:
          - type: paragraph
            body: >-
              多家分析机构发布了仓库自动化市场估算，数字会因定义范围不同而显著差异。Mordor Intelligence 估计，市场规模 2025 年为 $29.98B，2026 年增至 $34.17B，到 2031 年达到
              $65.74B，CAGR 为 13.98%。Grand View Research 对仓库机器人市场采用更窄口径，估算 2022 年为 $4.31B，到 2030 年增至 $17.29B，CAGR 为
              19.6%。MarketsandMarkets 使用更宽的物流自动化框架，预测到 2029 年达 $52.53B，CAGR 为
              8.4%；增速较低，反映了成熟运输和货运自动化子赛道被纳入。这些差异来自定义差别（仅机器人 vs. 全部自动化软件 vs. 全部物流自动化）、地理范围和方法论。

              本分析测算 GreyOrange 的总可用市场（TAM）时，采用 Mordor Intelligence 对 2025–2026 年约 $30–34B
              的估算，作为最直接可比口径（全球仓库自动化硬件与软件）。可服务市场（SAM），即 GreyOrange 以现有产品组合可现实触达的子市场，估计为 $8–12B，约占 TAM 的
              25–35%。估算方法是先应用软件板块在仓库自动化市场中的占比（Grand View Research 估计软件以约 21% CAGR 增长，快于硬件约 17%；Mordor Intelligence 报告软件
              CAGR 为 14.87%，硬件则以 55.12% 份额领先），再针对编排和执行层相对于更底层 WMS 既有厂商的范围作调整。该估算由分析师推断，缺少细分市场数据支撑，置信度低。

              GreyOrange 的可获取市场（SOM）估计为 $200–500M，依据是其披露的部署规模（3,000+ 个站点、管理 100,000+
              个物理智能体）、战略合作关系（Kenco、Dematic、Zebra）和覆盖美洲、欧洲、亚洲的地理足迹。若以 $350M 作为 SOM 中值、$10B 作为 SAM 中值，GreyOrange 约占 AI
              编排软件市场 3.5%；对于一家拥有成熟企业客户、但规模不及 Honeywell、KION Group（Dematic）或 Vanderlande 的后期私营公司，这是合理位置。SOM
              对未披露的收入和胜率高度敏感，而公开来源无法获得这些数据。
