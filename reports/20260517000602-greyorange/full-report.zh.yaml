  - number: 4
    title: 财务情况
    sections:
      - number: '4.1'
        title: 收入模式架构与商业模式演化
        blocks:
          - type: paragraph
            body: >-
              GreyOrange 运营多收入流模式，横跨硬件、软件和专业服务；这一结构自 2012 年创立以来已显著演化。早期，GreyOrange 收入主要来自自研机器人硬件销售，具体是 Butler 和 Sorter
              机器人产品线，销售或租赁给印度和东南亚的大型电商、零售客户。硬件为中心的模式对制造、库存和现场服务提出高资本要求，但也通过机器人销售产生可预测的大额收入；按机器人类型和定制程度估计，单台价格从 $30,000
              到超过 $150,000。

              战略拐点发生在 2022 年。GreyOrange 明确从硬件机器人公司重新定位为 AI 软件编排平台。GreyMatter——公司的 Warehouse Execution System（WES）和
              Multi-Agent Orchestration Platform（MAOP）——发布并成熟，成为可协调第三方机器人的不绑定硬件产品，标志着经常性收入层的开始。GreyMatter 以 SaaS
              订阅销售，定价围绕按站点和按机器人单元两个维度设计，但具体价格表未公开披露。通过 Kenco、enVista 的 enMotion 等合作伙伴使用 GreyMatter 的客户，也可能以
              Robotics-as-a-Service（RaaS）模式获取；在这种模式下，整个技术栈——硬件和软件——按月订阅交付，进一步把资本开支转移给 GreyOrange 及其伙伴。

              gStore 平台是 GreyOrange 向零售垂直的延伸，提供实时 RFID 库存智能和店内执行编排。gStore 作为独立 SaaS 产品销售，并于 2026 年 1 月与 Zebra
              Technologies 的 SmartLens 顶置 RFID 硬件联合商业发布。gStore 在一家全国性时装零售商的首次部署中，实现最高 98% 的货架有货率，提供了高质量参考指标。gStore
              被定位为独立 SaaS 订阅产品，把公司每个客户的总可服务收入从仓库运营扩展到零售门店资产。

              硬件、GreyMatter SaaS、gStore SaaS 和专业服务之间的收入结构未公开披露。基于公司软件优先的战略转型，以及 Certified Ranger Network 不绑定硬件的定位，可以合理推断
              SaaS 收入在总收入中的占比增长快于硬件收入。2025 年 11 月 Richard Schrader 出任首席营收官，明确聚焦扩大 Certified Partner Network 和 SaaS
              市场拓展，是一个结构性信号：经常性软件收入是增长的首要商业重点。在 3,000+ 个活跃全球站点和 100,000+ 个受管理物理智能体的基础上，每站点潜在年经常性收入（ARR）是评估软件收入飞轮最重要的未知数。
