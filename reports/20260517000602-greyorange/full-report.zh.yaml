chapters:
  - number: 1
    title: 公司概况
    sections:
      - number: '1.1'
        title: 身份、使命与商业模式
        blocks:
          - type: paragraph
            body: >
              GreyOrange Inc. 是一家全球 AI 驱动仓库编排与零售门店库存软件供应商，2012 年成立，总部位于佐治亚州
              Suwanee（亚特兰大都会区）。公司自称是超智能仓库编排领导者，主要靠两套软件平台服务大型零售商和第三方物流商（3PL）：面向配送中心运营的 GreyMatter，以及面向零售库存管理的
              gStore。GreyOrange 的使命是让机器人、软件系统和一线员工等物理智能体在 AI 指挥下顺畅协作，降低成本、提高准确率，并在不按比例增加用工的情况下扩大吞吐量。


              商业模式结合软件授权、平台费，以及系统集成商合作。系统集成商依托 Certified Partner Network 部署 GreyOrange 方案。Certified Ranger Network（CRN）让
              GreyMatter 不绑定硬件，客户几乎可以接入任何机器人厂商设备，不被单一厂商锁定。这种开放架构是核心差异：GreyMatter 的开放 API
              能接入多种自动化硬件，客户也可以从几乎任何厂商新增机器人，并确保互操作顺畅。公司收入来自平台收费，也来自 enVista 的 enMotion 等战略联盟；该方案以
              Robotics-as-a-Service（RaaS）形式交付 GreyMatter 能力，降低客户资本开支门槛。


              GreyOrange 最初在印度注册并搭起早期业务，随后将总部迁至美国。公司在美洲、欧洲和亚洲拥有办公室与合作伙伴。截至本报告日期，公司仍是后期私营公司，未公开宣布 IPO 计划；最近一次融资是 2022 年 9
              月，估值 $1.2B。
