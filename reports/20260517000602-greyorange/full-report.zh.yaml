      - number: '6.3'
        title: 留存、满意度、扩张与集中度风险
        blocks:
          - type: paragraph
            body: >-
              GreyOrange 没有公开留存数据。公司未披露 NRR、GRR、流失率或队列数据，也未在第三方来源找到。判断留存韧性的最佳代理是 Kenco 5
              年战略联盟：仓库自动化中的长期基础设施合同很常见，因为高切换成本会随部署时间累积——深度 WMS/ERP 集成、机器人车队调试、已培训劳动力依赖。AMR 平台行业基准显示平均部署周期为 3-5
              年，意味着自然流失在结构上偏低，不过 GreyOrange 未披露续约率或多队列留存指标。


              扩张杠杆强：Dematic 合作带来 9,000+ 个 KION 安装点的全球客户基础；Kenco 联盟覆盖多个履约中心（先落地后扩张模型）；Zebra gStore
              合作把零售门店部署打开为第二增长向量。集中度风险存在重大不确定性：在 3,000+ 个站点下，任何单一客户按数量口径的占比可能不高，但收入集中度未披露。如果头部客户（Kenco、GXO）贡献 >20%
              ARR，交易对手风险就很重大。Dematic 和 Zebra 渠道依赖如果演变为对抗性关系，会引入毛利和控制风险。客户评价数据仍不可获取——G2 和 Gartner Peer Insights 需要
              JavaScript 渲染页面，无法抓取；Capterra 对 GreyOrange 的覆盖很少，因此满意度和 NPS 分数完全无法由独立来源验证。
