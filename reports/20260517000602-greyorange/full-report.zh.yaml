  - id: TV006
    title: 最终尽调请求
    description: >-
      Priority-ordered list of information requests that would materially change the investment recommendation,
      confidence, or valuation stance. Designed as a management / investor data room checklist.
    columns:
      - 请求项
      - 优先级
      - 为何重要
      - 目标提供方
      - 正面结果影响
    rows:
      - - 当前 ARR 和收入结构（硬件 vs. 软件 vs. 服务）
        - 关键
        - 估值的基础输入；决定适用的可比倍数；当前缺失使任何 EV 估算都难以自洽。
        - 管理层 / CFO
        - 将置信度上调至高；若 ARR ≥ $120M，可能将建议上调至投资
      - - 分业务毛利率（硬件、软件、服务）
        - 关键
        - 软件毛利率 ≥60% 可验证平台护城河；硬件毛利率 < 20% 是结构性拖累；混合毛利率决定 EBITDA 路径。
        - 管理层 / CFO
        - 确认软件经济性逻辑；可在可防守假设下建模 IRR
      - - 按客户队列划分的净收入留存率（NRR）
        - 高
        - NRR >110% 表明先落地再扩张跑通，并降低对新增客户的依赖；NRR <90% 会打破投资逻辑
        - 管理层 / CFO
        - NRR >110% 将基准情景估值上调 20–30%；确认飞轮模型
      - - 员工数、烧钱速度和现金跑道
        - 高
        - 解决 4 年融资空窗疑虑；确认资金可支撑至 2027 年；识别是否即将再融资。
        - 管理层 / CFO / 投资人
        - 现金跑道 >24 个月可降低未来降估值融资风险；确认基准情景财务假设
      - - 过去 24 个月相对 Geek+ 和 AutoStore 的赢单 / 输单分析
        - 高
        - 验证竞争护城河逻辑；量化战略地域的胜率；是乐观 / 基准 / 悲观概率权重的关键输入。
        - 销售 / 管理层 / 客户背调
        - 北美 / EMEA 胜率 >50% 确认投资逻辑；<30% 触发 TV005 第 1 行终止触发项
      - - GAAP 盈利或 EBITDA 盈亏平衡路线图
        - 高
        - 决定 IPO 可行性时间线；确认附带软件的 ARR 是否足以覆盖硬件和运营开支。
        - 管理层 / 董事会
        - 2027 年前清晰实现盈亏平衡路径，可支撑 IPO 定位；缺失则提高悲观情景概率
      - - 股权结构表、优先股堆叠和清算瀑布
        - 中
        - 决定并购情景下的普通股价值；识别优先股清算优先权是否会在低于 $1.5B 的退出中损害回报。
        - 投资人 / 法律顾问
        - 清算瀑布干净、优先权负担有限，可验证目标退出价格下的股权上行空间
      - - 客户集中度：前 5 大客户占 ARR 百分比
        - 中
        - Kenco 5 年联盟可能占据重要 ARR 份额；任何单一客户 >30% 都会带来流失风险和估值风险。
        - 管理层
        - 任一单一客户集中度 <20% 可验证 ARR 基础已经多元化
