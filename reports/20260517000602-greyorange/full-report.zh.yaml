  - id: FR002
    type: dag
    title: 风险传导图：风险如何流向收入和估值
    summary: 有向无环图展示 GreyOrange 单个风险事件如何沿运营和财务链条传导，最终影响收入、客户留存和估值。关键传导路径已高亮。
    layout: wide
    data:
      nodes:
        - id: r1
          label: Geek+ 价格战
          detail: 中国竞争对手提供更低成本硬件；捆绑软件；赢下价格敏感型交易
          type: risk-source
        - id: r2
          label: 软件护城河削弱
          detail: Manhattan Associates、Dematic 自建原生 WES 编排；GreyMatter 差异化收窄
          type: risk-source
        - id: r3
          label: 机器人安全事故
          detail: 客户现场发生机器人与工人碰撞或险些碰撞；触发 OSHA 调查
          type: risk-source
        - id: r4
          label: 资本不足
          detail: 四年融资空窗；未披露盈利能力；现金跑道不确定
          type: risk-source
        - id: r5
          label: CEO 关键人离任
          detail: Akash Gupta 离任扰动投资人关系、战略合作和客户信任
          type: risk-source
        - id: r6
          label: 赢单率下降
          detail: 竞争压力加大，企业交易流失增加
          type: transmission
        - id: r7
          label: ARR / 收入影响
          detail: 新增预订减少和 / 或流失压低顶线收入；ARR 增长停滞
          type: transmission
        - id: r8
          label: 利润率受压
          detail: 定价压力侵蚀硬件利润率；软件利润率不足以抵消
          type: transmission
        - id: r9
          label: 客户信心受损
          detail: 安全事故或产品故障损害 GreyOrange 品牌；流失加速
          type: transmission
        - id: r10
          label: 估值 / 融资风险
          detail: 收入停滞和利润率侵蚀压缩融资选择；被迫接受降价轮或战略退出
          type: outcome
      edges:
        - from: r1
          to: r6
          label: 价格下探拉低赢单率
        - from: r2
          to: r6
          label: WES 既有厂商赢下软件层交易
        - from: r6
          to: r7
          label: 新增预订减少 → ARR 放缓
        - from: r7
          to: r10
          label: 收入停滞压低估值倍数
        - from: r3
          to: r9
          label: 安全事故触发品牌损害
        - from: r9
          to: r7
          label: 客户流失压低 ARR
        - from: r1
          to: r8
          label: 价格战迫使硬件利润率下调
        - from: r8
