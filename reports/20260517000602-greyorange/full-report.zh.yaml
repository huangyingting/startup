      - number: '5.2'
        title: AI 与技术能力
        blocks:
          - type: paragraph
            body: >-
              GreyMatter 的技术底座是多智能体 AI 编排引擎。系统把仓库运营状态——流入订单、机器人位置、人工作业位置、库存位置、月台排程——拆成离散的智能体任务，并持续实时重优化任务分配。不同于传统 WES
              或规则驱动的 WMS，GreyMatter 使用基于 ML
              的决策逻辑适应动态条件：机器人故障、订单激增或拣货路径冲突，系统都能吸收并重新路由，不必暂停整体运营。公司声称，由于系统用简化且自适应的拣货指令引导工人，员工培训时间可减少 70-80%。


              GreyMatter 集成层借 REST 和 SOAP API 连接 WMS、ERP、OMS 和 TMS 系统。集成页面列出面向 SAP、Oracle、Blue Yonder、Manhattan
              Associates 等一线供应链软件的预构建连接器，将 GreyMatter 定位为运行在 WMS 之上的履约执行层，而不是替代 WMS。这一架构支持棕地部署——客户把 GreyMatter
              叠加到既有仓库基础设施之上。


              GreyMatter Foundry 将 AI 能力延伸到仿真：工具使用历史仓库遥测数据和实时 GreyMatter 运营数据，对「如果我增加 20 台 AMR 会怎样」或「Q4
              旺季吞吐会怎样」等场景建模。Foundry 截至 2026 年 4 月 13 日已 GA（在 MODEX 发布）。Gartner 在 2025 年 10 月的 Multiagent Orchestration
              Platforms Innovation Insight 中将 GreyOrange 列为代表性供应商，这验证了该供应商在这一新兴类别中的定位，也把它放在更大型企业软件供应商旁边比较。


              开发者和技术文档界面有限。docs.greyorange.com 的技术文档需要认证（员工或客户登录）；GitHub 上没有可归因于 GreyOrange 仓库编排的公开代码库；Stack Overflow
              也没有这类标签问题。与 API 优先的软件平台相比，这限制第三方技术评估，也留下开发者社区缺口。
