      - number: '8.4'
        title: 附录
        blocks:
          - type: callout
            title: 财务不透明是最大尽调阻碍
            body: >-
              GreyOrange 运营十四年、累计融资约 $305M，却没有披露任何财务指标——没有收入、ARR、EBITDA、毛利率、NRR。处在这一阶段、且已经拿下 Dematic、Kenco、Zebra
              等合作里程碑的公司，通常至少会向潜在投资人提供 ARR 和增长指标。财务披露完全缺失，意味着任何估值结论，包括本文给出的「合理」判断，都取决于未披露数据。2022–2026
              年四年融资空窗，是这种不透明的第二层信号：GreyOrange 要么已经盈利并能自我供血（正面），要么正在消耗 2022 年融资并避免降估值融资（负面）。没有 NDA 下的经审计财务，无法消除这个歧义。
            calloutType: insight
            claimRefs:
              - CV006
              - CV007
              - CV008
              - CV035
          - type: callout
            title: Symbotic 的轨迹设定上限，也设定标准
            body: >-
              Symbotic 从 2022 年 IPO 时 $5.5B 的 SPAC 估值，升至 2026 年 5 月 $28.5B 市值，背后是 $2.52B TTM 收入、GAAP 盈利和 $22.7B
              订单积压。这说明仓储 AI 公司一旦跑到企业级规模，天花板可以很高。Symbotic 与 GreyOrange 的差距不主要在技术：两家公司都在仓储规模上运行 AI 驱动的编排系统。差距在商业化：Symbotic
              的 Walmart 锚定客户给了规模和收入，反过来供给飞轮；GreyOrange 更分散的客户基础还没有产生可比的公开收入里程碑。「观察」建议的含义是：我们相信 GreyOrange 具备成为 Symbotic
              级公司的技术，但也看到它还没有拿出足以按当前入场价投资的财务轨迹。
            calloutType: insight
            claimRefs:
              - CV012
              - CV013
              - CV014
              - CV022
          - type: callout
            title: Locus Robotics 是反向可比，不只是警示
            body: >-
              Locus Robotics 曾凭借强技术资质、头部客户和有吸引力的 AMR 即服务叙事，达到 $2B+ 的私人估值峰值。到 2024
              年，多轮裁员后它申请破产，说明仓储机器人行业会惩罚那些无法把技术护城河转化为足够收入和毛利、以覆盖运营成本的公司。GreyOrange 不是 Locus
              Robotics——软件优先模型、十年数据飞轮和供应商无关架构在结构上不同。但叙事相似并非巧合：两家公司都规模化运营（Locus 已部署数千台机器人），都有蓝筹投资人，也都面对中国 AMR
              竞争对手带来的同一类硬件毛利压力。GreyOrange 的悲观情景不是假设，而是已经写在 Locus 的先例里。
            calloutType: insight
            claimRefs:
              - CV018
              - CV019
              - CV020
              - CV037
