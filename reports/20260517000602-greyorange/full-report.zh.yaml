  - number: 2
    title: 市场分析
    sections:
      - number: '2.1'
        title: 市场定义与范围
        blocks:
          - type: paragraph
            body: >-
              仓库自动化市场涵盖所有用于自动化或编排仓库和配送中心运营的技术投资，包括硬件与软件。这包括自主移动机器人（AMR）、自动存储与检索系统（AS/RS）、输送系统、仓库管理系统（WMS）、仓库执行系统（WES）和
              AI
              驱动的多智能体编排平台（MAOP）。本次尽调将市场边界定义为全球配送中心、履约中心、零售后场运营和冷链物流设施中部署的软件与硬件方案；不包括纯最后一公里配送机器人、制造装配自动化，以及缺少仓库专用工作流执行层的企业资源规划（ERP）平台。

              GreyOrange 在这个市场的多个细分赛道竞争。GreyMatter 平台处在编排与执行软件层，即实时协调机器人、人员、输送线和其他智能体的软件“大脑”。Ranger 机器人系列竞争 AMR 硬件层，不过自约
              2022 年起，GreyOrange 已弱化自研硬件，转向开放、不绑定硬件的模式。gStore 产品延伸到零售门店库存智能，这是一个相邻市场，同样受全渠道压力推动。

              关键市场边界和纳入范围对测算规模至关重要。最宽口径（全球全部仓库自动化硬件与软件）产生分析师引用的最大总可用市场（TAM）数字（2025–2026 年为 $29–34B）。只聚焦 AI
              编排软件的窄口径对应更小的可服务市场（SAM）（估计 $8–12B）。GreyOrange 的可获取市场（SOM）进一步受当前地理覆盖、合作伙伴渠道能力和竞争胜率限制，而这些数据均未公开披露。
