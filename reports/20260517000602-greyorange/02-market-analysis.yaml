  evidenceGaps:
    - type: missing-source
      severity: material
      topic: "Warehouse orchestration software sub-segment size not independently verified in 2026"
      missingEvidence: >-
        No analyst firm publishes a standalone market size for the AI warehouse orchestration / execution
        software layer (WES + MAOP) that would directly validate the SAM estimate of $8–12B. Mordor
        Intelligence and Grand View Research report software-vs-hardware splits but do not isolate the
        orchestration layer from broader warehouse management software.
      whyItMatters: >-
        Without an independently sourced SAM estimate, the $8–12B figure is analyst-inferred and could
        be materially wrong in either direction. This affects GreyOrange's market penetration calculation
        and competitive positioning analysis.
      diligencePath: >-
        Commission a custom market research study scoping AI MAOP and WES exclusively; alternatively,
        engage Gartner or IDC analyst directly to get their private-client segment estimates for the
        orchestration software layer.
      relatedQuestionRefs:
        - QM008
        - QM021
      relatedTableRefs:
        - TM002

    - type: private-evidence-only
      severity: material
      topic: "GreyOrange SOM cannot be validated without undisclosed revenue data"
      missingEvidence: >-
        GreyOrange does not disclose annual revenue, ARR, or market share figures. The SOM estimate of
        $200–500M is derived from deployment metrics (3,000+ sites) and partner channel breadth, which
        are insufficient proxies for revenue without average contract value or revenue-per-site data.
      whyItMatters: >-
        The SOM is the most investment-relevant sizing figure; without revenue validation, the SOM could
        be significantly over- or under-estimated. A $350M SOM midpoint implies ~3.5% of the $10B SAM,
        which is plausible but unverifiable.
      diligencePath: >-
        Request audited financial statements (revenue by product line, customer count, ACV) under NDA.
        Request sales pipeline data and win-rate statistics by segment.
      relatedQuestionRefs:
        - QM009
        - QM026
      relatedTableRefs:
        - TM002

    - type: conflicting-data
      severity: material
      topic: "Material analyst disagreement on market size and CAGR makes TAM boundary uncertain"
      missingEvidence: >-
        Mordor Intelligence ($34.17B, 14% CAGR), Grand View Research ($17.29B by 2030, 19.6% CAGR), and
        MarketsandMarkets ($52.53B by 2029, 8.4% CAGR) present materially different market sizes and
        growth rates because they use different definitional scopes. This makes the TAM boundary highly
        sensitive to which definition is adopted.
      whyItMatters: >-
        A 3x difference in TAM estimates ($17B vs. $52B) materially changes the SOM penetration
        calculation and relative competitive position assessment. GreyOrange's investor materials
        presumably adopt one specific definition that is not publicly visible.
      diligencePath: >-
        Request GreyOrange's internal market sizing methodology and the specific analyst reports they
        use in investor presentations. Reconcile analyst definitional differences before validating the
        TAM number.
      relatedQuestionRefs:
        - QM001
        - QM007
        - QM028

    - type: access-blocked
      severity: minor
      topic: "Gartner, McKinsey, IDC, HBR, WSJ full content inaccessible behind paywall or access block"
      missingEvidence: >-
        Multiple high-reputation sources (Gartner, McKinsey, IDC, HBR, WSJ, Reuters, Bloomberg) were
        inaccessible during research due to paywalls, bot blocks, or 404 errors. Their specific market
        sizing data, Gartner Magic Quadrant placements, and competitive analyses could not be directly
        verified.
      whyItMatters: >-
        These sources would likely provide the most authoritative and independently verified market data.
        Absence of their direct content means the market analysis relies more heavily on Mordor
        Intelligence and Grand View Research, both of which have medium reputation tiers.
      diligencePath: >-
        Acquire Gartner subscription for MAOP Innovation Insight report; obtain McKinsey logistics
        automation report via institutional access; purchase IDC warehouse robotics forecast.
      relatedQuestionRefs:
        - QM004
        - QM015
        - QM017
        - QM018

acknowledgedWarnings:
  - dimension: tableNotes
    reason: >-
      TM001, TM002, TM003, and TM004 all contain notes fields describing data sources, estimation
      methodology, and coverage limitations. TM001 is a definitional/boundary table with known analyst-
      interpolated size estimates. TM002 explicitly flags SAM and SOM as low-confidence analyst-inferred
      estimates. No additional row-level notes are required as the table-level notes address coverage gaps.
  - dimension: paywallRisk
    reason: >-
      High-reputation sources including Gartner, McKinsey, IDC, HBR, WSJ, Reuters, Bloomberg, and
      Statista were inaccessible during research due to paywalls, bot-blocking, or HTTP errors. Their
      content is documented as access-blocked in the evidence gap. The remaining 27 sources span 20+
      domains with confirmed access; the paywall-restricted sources are cited only where their content
      is referenced in secondary materials (e.g., GreyOrange press releases citing Gartner). This risk
      is inherent to public research without institutional subscriptions.
