companyProfile:
  summary: "GreyOrange is an AI-powered warehouse orchestration and retail store inventory software company that coordinates 100,000+ physical agents (robots and automation hardware) across 3,000+ global sites. Its flagship GreyMatter platform delivers 1M+ real-time optimizations per minute, enabling retailers, 3PLs, and e-commerce operators to achieve 60% lower variable cost per unit and 4–5x on-demand scalability. Through its vendor-agnostic Certified Ranger Network and gStore retail platform, GreyOrange offers a full-stack commerce execution fabric spanning warehouses, stores, and supply chain networks."
