  topStrengths:
    - GreyMatter 平台不绑定厂商，积累了 10+ 年专有运营数据，覆盖 3,000+ 个站点、100,000+ 个智能体，形成可持续的数据飞轮
    - 全栈 Commerce One 愿景（GreyMatter + gStore + gNetwork）让公司区别于只卖硬件的竞争对手
    - 与 Dematic、Kenco、Zebra Technologies 建立战略合作，验证企业采用度，也打开渠道扩张
    - Gartner 在 2025 年 10 月将其列为 Multiagent Orchestration Platforms Representative Provider，强化了市场定位
  topRisks:
    - 硬件经济性带来资本强度约束；制造成本上涨和供应链扰动都是高影响风险
    - Geek+（中国成本优势）、AutoStore（已 IPO、资本充足）和 Amazon Robotics（内部规模）带来强竞争
    - 收入、ARR、毛利率和 NRR 均未披露；$1.2B 估值锚定 2022 年数据，3+ 年没有公开更新
    - 关键人集中风险：CEO Akash Gupta 是联合创始人，也是公司最主要的对外面孔
  unresolvedGaps:
    - 当前 ARR、收入结构（硬件 vs. 软件）和同比增速
    - 分业务毛利率（硬件 vs. GreyMatter SaaS vs. gStore SaaS）
    - 净收入留存率和客户流失数据
    - 盈利路径和当前烧钱速度 / 现金跑道
    - 与 Geek+、AutoStore 正面竞争时的赢单率
