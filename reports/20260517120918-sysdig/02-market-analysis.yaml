  title: "Market Analysis"
  summary: "Global CNAPP market sized at $19.3–75.3B TAM by 2027–2030, growing at 13–20% CAGR driven by cloud workload consolidation, Kubernetes adoption (82% in production), and regulatory pressure. Sysdig competes in the platform segment consolidating CSPM, CWPP, KSPM, and runtime security—powered by Falco (CNCF graduated, 100M+ downloads). Market concentration risk: top vendors (Palo Alto, Wiz, CrowdStrike) drive rapid consolidation."

sections:
  - id: SM-01
    title: Market Boundary and Scope
    body: |
      The market in which Sysdig competes is labeled Cloud-Native Application Protection Platform (CNAPP) by Gartner (first Magic Quadrant published 2024), cloud workload protection and security by Forrester, and cloud security by broader market analysts. CNAPP emerged as a category in 2022 to describe the consolidation of previously discrete cloud security tools—cloud security posture management (CSPM), cloud workload protection platform (CWPP), Kubernetes security posture management (KSPM), cloud infrastructure entitlement management (CIEM), container security, runtime security, and infrastructure-as-code (IaC) scanning—into unified platforms.
      
      The CNAPP market addresses protection for cloud-native applications across the full lifecycle: code (CI/CD security, IaC scanning, software composition analysis), build (artifact scanning, registry security), deploy (CSPM, KSPM configuration management), and runtime (CWPP threat detection, behavioral anomaly detection, incident response). Sysdig's positioning emphasizes runtime insights powered by Falco—the CNCF graduated open-source runtime security engine using eBPF for Linux kernel instrumentation—as the differentiating foundation for threat detection, investigation, and response.
      
      Adjacent but distinct markets include traditional IT endpoint detection and response (EDR), extended detection and response (XDR) expanding into cloud, security information and event management (SIEM), application security posture management (ASPM), and supply chain security. Status-quo substitutes include manual cloud console reviews, CSP-native security tools (AWS Security Hub, Azure Defender, Google Cloud Security Command Center), and point-solution tools assembled by enterprise security teams. Market growth displaces both manual approaches and fragmented tool sets as organizations seek consolidation to address "tool sprawl"—a constraint cited by 60% of enterprises consolidating to single-vendor CNAPP by 2023 (Gartner).
