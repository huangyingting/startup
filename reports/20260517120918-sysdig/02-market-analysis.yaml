  evidenceGaps:
    - type: stale
      severity: material
      topic: tam-sizing
      missingEvidence: "CNAPP TAM analyst estimates (MarketsandMarkets, Grand View Research, Allied) use 2022–2023 base years; no refreshed 2025–2026 estimates with updated cloud spending trajectories were publicly available during this research run."
      whyItMatters: "Base-year vintage affects whether CAGR projections still apply after the 2023–2024 cloud spending slowdown; investors cannot anchor valuation to TAM figures that have not been recalibrated against post-slowdown actual spend."
      diligencePath: "Request updated analyst reports (Gartner, Forrester, IDC) from 2025 or 2026 vintage; cross-check against public cloud vendor revenue growth rates (AWS, Azure, GCP) as a proxy for cloud security market health."
      relatedQuestionRefs: [QM027]
      relatedTableRefs: [TM002]

    - type: stale
      severity: minor
      topic: k8s-adoption
      missingEvidence: "CNCF 2025 survey data (82% Kubernetes in production) is the most recent available; no 2026 CNCF survey or equivalent industry data was found to confirm continued adoption growth trajectory."
      whyItMatters: "If Kubernetes adoption has plateaued or declined, the structural demand argument for runtime CNAPP platforms based on K8s proliferation would need revision."
      diligencePath: "Monitor CNCF 2026 annual survey release; supplement with hyperscaler-reported container service growth metrics (AWS EKS, Azure AKS, GCP GKE) as proxies for production K8s adoption."
      relatedQuestionRefs: [QM028]

    - type: stale
      severity: material
      topic: macro-risk
      missingEvidence: "No current-vintage (2025–2026) primary survey data was available to confirm whether 2023–2024 CNAPP sales cycle elongation and deal compression have resolved; evidence on recovery is based on secondary trend commentary only."
      whyItMatters: "Continued elongated sales cycles materially affect Sysdig's near-term growth trajectory; if the 2024 slowdown persists into 2026, growth rate assumptions in any DCF or revenue forecast require downward adjustment."
      diligencePath: "Review SentinelOne, Palo Alto Networks, and CrowdStrike cloud security segment growth commentary in recent earnings calls; request Sysdig pipeline metrics under NDA."
      relatedQuestionRefs: [QM029]

    - type: private-evidence-only
      severity: blocking
      topic: sysdig-financials
      missingEvidence: "Sysdig does not publicly disclose ARR, total customer count, gross margin, net revenue retention, or cloud security market share. No third-party estimate with explicit methodology was found. PitchBook shows funding history but no revenue data."
      whyItMatters: "Without revenue run-rate and market share data, it is impossible to calculate Sysdig's SOM, assess ARR-to-valuation multiples, or benchmark unit economics against public CNAPP peers (SentinelOne, Palo Alto cloud modules, CrowdStrike Falcon Cloud Security)."
      diligencePath: "Request Sysdig ARR, NRR, customer count, and segment gross margin from management under NDA; commission PitchBook or Harmonic revenue estimate based on customer data; cross-reference against average CNAPP contract values from Gartner Peer Insights."
      relatedQuestionRefs: [QM030]
      relatedTableRefs: [TM002]
