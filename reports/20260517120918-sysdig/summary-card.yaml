  topStrengths:
    - >-
      Sysdig is the originator and primary commercial steward of Falco, the CNCF-graduated (Feb 2024) runtime-security
      standard, giving it the deepest eBPF/runtime detection lineage of any CNAPP vendor.
    - >-
      Sysdig is a recognized CNAPP vendor in Gartner and Forrester evaluations with a full feature set spanning CSPM,
      CWPP, KSPM, CIEM, vulnerability management, container/IaC scanning, and Cloud Detection and Response.
    - >-
      Marquee customer roster including Goldman Sachs, IBM, SAP, BigCommerce, Booking.com, and the U.S. Air Force
      demonstrates Fortune 500 and federal-grade buying power.
    - >-
      Strong investor syndicate (Vista Equity Partners, Insight Partners, Bain Capital Ventures, Accel, Goldman Sachs,
      Premji Invest, Permira) supplies long-duration capital and operational scaling expertise.
    - >-
      555 Benchmark and Sysdig Sage gen-AI assistant give the company a differentiated narrative on cloud
      detection-and-response speed and AI-augmented analyst workflows.
  topRisks:
    - >-
      Open-source moat erodes as Falco is CNCF-owned: competitors (Aqua Tracee, Isovalent/Cisco Tetragon) can build
      commercial offerings on the same runtime foundation.
    - >-
      Competitive pressure from Wiz (announced $32B Google acquisition March 2025) sets a high agentless-CNAPP premium
      and concentrates buyer mindshare on the consolidated leader.
    - >-
      Platform-bundling pressure from Palo Alto Networks (Prisma Cloud) and CrowdStrike (Falcon Cloud Security)
      compresses standalone-vendor pricing power.
    - >-
      Nov 2024 ~10% workforce reduction and 24+ months without a new primary round may signal slowing growth, burn
      pressure, or a flat-to-down funding environment for the Sysdig vintage.
    - >-
      Private-company disclosure gap: revenue, ARR, NRR, gross margin, customer count, and burn are not publicly
      verifiable, forcing reliance on analyst estimates and inferred multiples.
  unresolvedGaps:
