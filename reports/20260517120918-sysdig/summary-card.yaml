summary:
  headline: >
    Sysdig is the open-source-led CNAPP pioneer behind CNCF-graduated Falco, last valued at $2.5B in a May 2023 Series
    G, now navigating a more crowded and consolidated cloud-security market in which Wiz commands the agentless premium
    while Palo Alto and CrowdStrike bundle runtime security into platform sales; November 2024 layoffs and a 24-month
    financing pause warrant a conditional-buy / track stance pending verified ARR, NRR, and burn disclosures.
