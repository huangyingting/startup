  evidenceGaps:
    - type: private-evidence-only
      severity: blocking
      topic: ARR
      missingEvidence: >-
        Sysdig has not publicly disclosed its annual recurring revenue in any press release, investor
        communication, or regulatory filing. The $250M estimate is analyst-derived and unverified.
      whyItMatters: >-
        ARR is the primary valuation anchor for SaaS companies. Without verified ARR, the $2.5B valuation
        cannot be assessed as fair, stretched, or discounted relative to peer benchmarks.
      diligencePath: >-
        Request audited financial statements for FY2022–FY2025; obtain CFO representation letter with ARR
        definition; confirm whether ARR excludes professional services revenue; request deferred revenue roll.
      relatedQuestionRefs:
        - QO013
      relatedTableRefs:
        - TO001
    - type: private-evidence-only
      severity: material
      topic: valuation
      missingEvidence: >-
        The $2.5B valuation from the May 2023 Series G is now over three years stale. No new primary round
        or secondary transaction price has been publicly disclosed to update the valuation reference.
      whyItMatters: >-
        CNAPP multiples compressed significantly between 2023 and 2025 following the Lacework acquisition.
        A stale valuation anchor creates material uncertainty about the current equity mark.
      diligencePath: >-
        Request the most recent 409A valuation and any secondary transaction prices in the past 12 months;
        compare implied ARR multiple to current CNAPP peer transaction multiples.
      relatedQuestionRefs:
        - QO012
      relatedTableRefs:
        - TO001
    - type: private-evidence-only
      severity: material
      topic: cap table
      missingEvidence: >-
        The complete capitalization table including all share classes, preference stack, anti-dilution
        provisions, and pro-rata rights across all investor rounds is not publicly available.
      whyItMatters: >-
        Without cap table visibility, the waterfall analysis at various exit prices cannot be completed
        and common equity value relative to preferred stack remains unknown.
      diligencePath: >-
        Request full capitalization table with per-share pricing, liquidation preferences, participation
        rights, and conversion mechanics for each series from Series A through Series G.
      relatedQuestionRefs:
        - QO011
      relatedTableRefs:
        - TO003
    - type: private-evidence-only
      severity: minor
      topic: headcount
      missingEvidence: >-
        Sysdig does not publish an official headcount figure. The ~1,200 estimate is derived from LinkedIn
        profile counts and post-layoff news estimates, both of which carry material uncertainty.
      whyItMatters: >-
        Headcount and location footprint drive operating cost estimates and can signal sales capacity
        relative to ARR targets; without a precise figure, burn rate modeling is imprecise.
      diligencePath: >-
        Request current headcount by department and location from HR records; confirm the November 2024
        reduction count and affected departments.
      relatedQuestionRefs:
        - QO014
      relatedTableRefs:
        - TO001
    - type: insufficient-public-evidence
      severity: minor
      topic: FedRAMP
      missingEvidence: >-
        FedRAMP authorization for Sysdig Secure is referenced in customer-facing materials but the
        exact authorization level, scope, and date are not publicly confirmed on the FedRAMP Marketplace.
      whyItMatters: >-
        FedRAMP status is a gating requirement for U.S. federal agency customers such as the U.S. Air
        Force; confirming scope and date is material to sizing the public-sector opportunity.
      diligencePath: >-
        Check the FedRAMP Marketplace listing for Sysdig Secure; request the authorization letter and
        current ATO boundary documentation from the Sysdig federal team.
