  - id: section-3
    title: Funding history, valuation, and investor map
    body: >
      Sysdig has raised approximately $745 million across seven disclosed rounds since 2016. The capital
      structure reflects a steady escalation from early venture to late-stage growth equity, with the
      Series G being the defining financing event. Vista Equity Partners led the $350 million Series G in
      May 2023 at a post-money valuation of $2.5 billion. Permira, Accel, Bain Capital Ventures, Insight
      Partners, DFJ Growth, Third Point Ventures, Goldman Sachs, and Guggenheim are all current or prior
      investors. The breadth of the investor syndicate, including infrastructure-focused growth equity
      firms alongside traditional venture, is consistent with a company that has de-risked its technology
      but still needs capital to scale its go-to-market.


      The $2.5 billion valuation was set in a period of compressed multiples for cloud-security SaaS.
      The Lacework-Fortinet acquisition in 2024 — in which a well-funded CNAPP peer was sold at a
      distressed price relative to its peak valuation — illustrates the risk of late-stage CNAPP companies
      that fail to demonstrate sufficient revenue scale to justify growth-era valuations. Sysdig has not
      disclosed a new primary round since May 2023; this could reflect disciplined capital management, a
      focus on improving ARR coverage of the existing valuation, or both.


      The funding history covers Series A (~$5.6 million in 2016) through Series G ($350 million in 2023),
      with meaningful inflection points at Series E ($188 million in 2021) and the Series G. Each round
      brought new strategic investors who now have board or observer representation and information rights,
      creating a sophisticated investor group with aligned interests in a timely liquidity event.
    claimRefs:
