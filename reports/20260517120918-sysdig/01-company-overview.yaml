  - id: section-5
    title: Company milestones and adverse events
    body: >
      Sysdig's chronology is a sequence of technical firsts anchored in open-source credibility and
      monetized through enterprise SaaS. The company was founded in 2013 by Loris Degioanni; in 2014
      the open-source sysdig tool was created as the first syscall-level container introspection engine.
      Falco was created in 2016 and donated to the CNCF in 2018, an unusual move that traded short-term
      proprietary advantage for long-term community ownership and trust. Falco was accepted as a CNCF
      incubating project on January 8, 2020, and graduated to top-level project status on February 29, 2024,
      the strongest credibility signal in the cloud-native security ecosystem.


      The financing milestones parallel the technical ones: Series E ($188 million, 2021) arrived at the
      peak of cloud-security market enthusiasm, and the Series G ($350 million, May 2023) came in a more
      disciplined rate environment at a $2.5 billion valuation. The CEO succession in May 2024 from
      Suresh Vasudevan to Bill Welch represents a planned operational transition, though it coincided
      with the November 2024 workforce reduction of approximately ten percent, which is the most significant
      adverse event in the company's recent history. The layoffs were not publicly accompanied by a revenue
      warning, but they indicate that Sysdig made deliberate cost structure adjustments ahead of a planned
      liquidity path. FedRAMP authorization status has been referenced in customer-facing materials but
      exact authorization dates are not publicly confirmed.
    claimRefs:
      - CO018
      - CO019
      - CO020
