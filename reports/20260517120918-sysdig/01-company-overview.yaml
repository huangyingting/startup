company:
  name: Sysdig
chapter:
  number: 1
  title: Company Overview
  summary: >-
    Sysdig Inc. is a late-stage private cloud-native security company founded in 2013 by Loris Degioanni
    — the co-creator of Wireshark — and headquartered in San Francisco, California. The company provides a
    cloud-native application protection platform (CNAPP) and cloud observability SaaS sold on a per-host
    subscription model, with open-source project Falco serving as its primary community and conversion flywheel.
    In May 2023, Sysdig raised a $350 million Series G led by Vista Equity Partners at a $2.5 billion
    valuation, bringing total disclosed capital to approximately $745 million. Bill Welch was appointed CEO
    in May 2024, succeeding founder-adjacent CEO Suresh Vasudevan who led the company from 2018 to 2024.
    Falco graduated from the Cloud Native Computing Foundation in February 2024, cementing Sysdig's
    architectural leadership in runtime-first cloud security. The company employed roughly 1,200 people
    after a November 2024 workforce reduction of approximately 10 percent.
sections:
  - id: section-1
    title: Identity, headquarters, and product model
    body: >
      Sysdig Inc. is a San Francisco-based cloud-native security company incorporated in 2013. The company
      operates from its corporate headquarters in San Francisco, California, with engineering and go-to-market
      offices distributed globally. Its mission — "cloud security, the right way" — anchors a product strategy
      built around the premise that real-time, kernel-level visibility is architecturally superior to purely
      agentless scanning approaches. That conviction shapes every layer of the commercial product and the
      open-source community strategy.


      The core product portfolio contains two commercial SaaS platforms and one foundational open-source
      project. Sysdig Secure is a CNAPP that unifies vulnerability management, cloud security posture
      management (CSPM), cloud detection and response (CDR), and Kubernetes security in a single platform
      anchored by runtime context. Sysdig Monitor provides cloud and container observability including metrics,
      events, and capacity analytics for containerized and serverless workloads. Falco is the company's
      open-source runtime security engine, which Sysdig created in 2016 and donated to the Cloud Native
      Computing Foundation; it graduated to CNCF top-level project status in February 2024 and is the de
      facto Kubernetes threat-detection standard.


      Sysdig's commercial business model is subscription SaaS sold on a per-host or per-node basis.
      Enterprise seats are priced per host per year, with enterprise discounts for large container fleet
      deployments. The open-source Falco community functions as the top-of-funnel acquisition channel:
      security practitioners who instrument Falco in their clusters are natural buyers of Sysdig's
      enterprise rule management, compliance, and response capabilities. This open-source-led growth
      pattern mirrors the Elastic, HashiCorp, and Confluent playbooks and differentiates Sysdig from
      purely commercial CNAPP entrants.
    claimRefs:
