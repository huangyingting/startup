  - id: section-4
    title: Scale metrics and coverage gaps
    body: >
      The publicly supportable metric set for Sysdig is thinner than for a public company of equivalent
      market weight, as expected for a late-stage private company that has not disclosed audited financials.
      The most reliable anchors are the $2.5 billion post-money Series G valuation (May 2023), total
      disclosed capital of approximately $745 million, and approximately 1,200 employees following the
      November 2024 reduction.


      Annual recurring revenue is not publicly disclosed. Analyst estimates as of 2025 place Sysdig ARR
      at $250 million or more, but this figure is unverified and should be treated as a directional
      reference, not a confirmed data point. At $250 million ARR, the $2.5 billion valuation implies a
      10x ARR multiple, which is below the peak SaaS multiples of 2021 but consistent with post-correction
      cloud-security benchmarks for companies with Sysdig's growth profile. Customer count is also not
      publicly confirmed at a recent date; the company's customers page lists enterprise names including
      Goldman Sachs, IBM, and U.S. Air Force without specifying total count. Craft.co referenced 700+
      customers as of 2021, but that figure is likely stale and should not be used without updated
      confirmation.


      Falco's GitHub repository serves as a proxy for community scale: the project had over 7,000 stars
      and is listed as one of CNCF's highest-velocity graduated projects. This open-source traction is
      a meaningful leading indicator of enterprise pipeline, but converting community usage to ARR is
      not directly observable from public sources. Headcount is estimated at approximately 1,200 post-
      layoff, down from an estimated 1,300 peak; all location data is approximate given the distributed
      workforce.
    claimRefs:
      - CO015
      - CO016
      - CO023
