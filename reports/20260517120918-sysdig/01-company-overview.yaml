  - id: section-2
    title: Founders, leadership, and board governance
    body: >
      Loris Degioanni is the founder and Chief Technology Officer. Degioanni co-created Wireshark in the
      1990s while completing his PhD at Politecnico di Torino, establishing deep credibility in network
      and systems introspection. He created the open-source sysdig tool in 2014 as the world's first
      syscall-level introspection layer for containers, then followed with Falco in 2016. His technical
      depth and open-source reputation remain core assets for recruiting and enterprise trust.


      Bill Welch joined as CEO in May 2024, succeeding Suresh Vasudevan who led the company from 2018
      to 2024. Welch brings scaling credentials as former CEO of Pure Storage and Alteryx, both of which
      he led through significant commercial growth phases. His appointment signals that Sysdig's board
      prioritized enterprise go-to-market execution ahead of an eventual liquidity event. Karen Walker
      joined as CFO in 2021, bringing IPO-readiness experience from her time leading finance at Uber and
      Virgin America. Gary Olson joined as CRO with a mandate to accelerate revenue growth; at Snyk, Olson
      helped grow ARR to $300 million in his first year in the role.


      The board of directors is led by Enrique Salem (Bain Capital Ventures) as Chairman. Additional
      directors include Rob Schwartz (Third Point Ventures). The investor-heavy board is consistent with
      a late-stage private company working toward a liquidity event. Key-person dependence is concentrated
      in two nodes: Loris Degioanni as the technical and community credibility anchor, and Bill Welch as
      the primary enterprise commercial driver. The November 2024 leadership change reduces CEO key-person
      risk relative to a single long-tenured founder-CEO, but both Degioanni and Welch are essential to
      the company's public positioning.
