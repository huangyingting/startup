callouts:
  - calloutType: strength
    title: Falco CNCF graduation is a durable ecosystem moat
    body: >-
      CNCF top-level graduation means Falco's governance, maintenance, and ecosystem permanence no
      longer depend on Sysdig's commercial health. This is an asymmetric asset: the community survives
      even in adverse scenarios, while Sysdig retains the enterprise rule-management and response layer.
    claimRefs:
      - CO019
      - CO027
  - calloutType: risk
    title: Valuation is stale and ARR is unverified
    body: >-
      The $2.5B Series G valuation from May 2023 is now over three years old and was set before Lacework's
      distressed CNAPP exit. Without a verified ARR figure, the implied ARR multiple range spans 8x to 20x,
      making valuation judgment highly dependent on data-room disclosure.
    claimRefs:
      - CO015
      - CO016
      - CO023
  - calloutType: insight
    title: Open-source-led growth model is both an advantage and a conversion risk
    body: >-
      Falco's community traction is the primary pipeline source, but converting OSS practitioners to
      enterprise buyers requires a sales motion that Sysdig has been building since 2017. Monitoring
      OSS-to-enterprise conversion efficiency is a key diligence variable not derivable from public sources.
    claimRefs:
      - CO005
      - CO006
      - CO018
  - calloutType: risk
    title: 2024 workforce reduction signals cost discipline under pressure
    body: >-
      The November 2024 layoffs of approximately 10 percent of staff were not accompanied by a public
      revenue warning, but they indicate that Sysdig is tightening cash efficiency ahead of an IPO window
      or new primary round. The absence of a new round since May 2023 makes burn rate a key diligence ask.
    claimRefs:
      - CO030
