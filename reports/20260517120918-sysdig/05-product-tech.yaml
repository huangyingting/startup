figures:
- id: FE001
  title: Sysdig Platform Architecture Stack
  type: stack
  notes: 'Layered view of the Sysdig platform from data collection at the base to user-facing products at the top. Each layer represents a functional tier with documented components.

    '
  data:
    layers:
    - label: Infrastructure and Cloud Environment
      detail: 'Linux hosts and Kubernetes nodes with eBPF agent deployed as DaemonSet, plus cloud control planes (AWS, Azure, GCP) accessed agentlessly via read-only IAM roles. Windows workloads are not
        yet supported by the runtime agent.

        '
    - label: Data Collection Runtime and Cloud
      detail: 'Falco eBPF probe captures Linux system calls at kernel level via BPF CO-RE. Cloud connectors ingest CloudTrail, Azure Monitor, and GCP Cloud Audit Logs. Agentless scanners assess cloud resource
        configurations and container image registries without host agents.

        '
    - label: Detection and Analytics Engine
      detail: 'Falco rules engine evaluates system-call streams against a managed detection rules library. Runtime insight graph correlates runtime events, cloud configuration drift, and vulnerability scan
        results into a unified risk-prioritized finding set with Prometheus-compatible metrics.

        '
    - label: Platform Services and Integrations
      detail: 'SaaS backend providing policy management, compliance mapping against CIS Benchmarks, PCI DSS, SOC 2, and NIST CSF, and a 700-plus connector integrations library connecting to SIEM such as
        Splunk and IBM QRadar, SOAR such as PagerDuty and ServiceNow, and developer tools.

        '
    - label: User-Facing Products
      detail: 'Sysdig Secure covering CSPM, CWPP, CDR, and CIEM; Sysdig Monitor for observability and Prometheus dashboards; and Sysdig Sage the AI security assistant. All three modules share the unified
        runtime insight graph and are available through a single SaaS console.

        '
