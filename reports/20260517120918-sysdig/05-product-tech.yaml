    - Cloud security engineer and IAM administrator
    - Entitlement scan reveals overprivileged IAM roles or unused cloud permissions
    - Least-privilege policy recommendations generated; risk-ranked entitlement dashboard surfaced
    - Reduced cloud blast radius; documented 60-70% misconfiguration drop at CoinDCX
