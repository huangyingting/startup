        - Medium — slows product velocity if key engineers depart to better-funded competitors
        - Competitive RSU program; technical leadership track; remote-first kernel team structure
        - Verify trailing-twelve-month attrition rate for kernel security and detection engineering
    notes: >-
      CEO execution under competitive pressure and post-layoff retention of customer-success and detection engineering
