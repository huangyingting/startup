company:
  name: Sysdig
chapter:
  number: 7
  letter: R
  title: Risks
  summary: >-
    Sysdig's risk profile is shaped by four dominant threat clusters as of May 2026. Competitive displacement from Wiz —
    which raised $1 billion at a $12 billion valuation in May 2024 and penetrated more than 50% of Fortune 100 accounts
    — represents the most structurally acute risk; Wiz's agentless-first platform and enterprise sales depth create
    direct substitution risk for Sysdig's CNAPP. Regulatory exposure from the SEC's amended Form 8-K Item 1.05
    (effective December 2023) and the EU's NIS2 Directive (transposition deadline October 2024) creates multi-
    jurisdictional compliance obligations for Sysdig and its enterprise customers. Operationally, eBPF kernel
    compatibility fragility and the CNCF vendor-neutral governance of Falco — which allows Aqua Security (Tracee) and
    Cilium (Tetragon) to commercialize Falco's detection grammar freely — erode Sysdig's technical moat. People and
    execution risks from the May 2024 CEO transition to Bill Welch and TechCrunch-reported November 2024 layoffs add
    near-term sales and product velocity uncertainty. FedRAMP authorization scope is unresolved: the Sysdig press
    release URL returned HTTP 404 at research date. Kill criteria and diligence asks are documented in TR005 and the
    mitigation section.
sections:
  - id: risk-landscape-and-methodology
    title: Risk Landscape and Assessment Methodology
    body: >-
      Sysdig's risk profile reflects its competitive positioning as a purpose-built cloud-native security platform whose
      technical differentiation rests on Falco, eBPF-based instrumentation, and a vendor-controlled CNAPP stack. This
      chapter assesses material risks across six domains: regulatory and legal exposure, competitive and market
      displacement, operational and technical, partner and dependency, people and execution, and financial and pricing
      compression. Risk severity is assessed qualitatively by multiplying likelihood by business impact, yielding a
      residual exposure rating for each risk item. Evidence-based likelihood estimates draw on public regulatory
      filings, third-party news reporting, competitor product pages, analyst reviews, and Sysdig official
      communications. [CR043]


      The risk heatmap (FR001) places competitive displacement from Wiz and regulatory disclosure obligations in the
      upper-severity quadrants as of May 2026. The risk transmission map (FR002) traces how platform displacement and
      regulatory triggers cascade downstream into revenue slowdown, customer churn, financing difficulty, and valuation
      impairment. The dependency map (FR003) illustrates the structural dependency stack beneath Sysdig's detection
      surface: Linux kernel eBPF, CNCF Falco governance, cloud provider audit APIs, and Kubernetes runtime. Each risk
      entry in the registers below includes a mitigation maturity rating and residual exposure estimate to support
      investment thesis verification and data-room prioritization. Kill criteria and monitored triggers are consolidated
      in TR005 (Mitigation and Kill Criteria Table) in section 6.
    claimRefs:
      - CR043
    figureRefs:
      - FR001
  - id: regulatory-and-legal-risks
    title: Regulatory and Legal Risks
    body: >-
      Sysdig faces multi-jurisdictional regulatory obligations that create disclosure liability, market access
      requirements, and contractual compliance costs. The SEC's amended Form 8-K Item 1.05, effective December 15, 2023,
      requires public companies to disclose material cybersecurity incidents within four business days of determining
      the incident is material. While Sysdig is currently privately held, its enterprise customer base includes public
      companies subject to this rule; a customer incident involving a Sysdig agent vulnerability could expose Sysdig to
      reputational and legal liability even before any Sysdig IPO. [CR001] [CR038]


      The EU NIS2 Directive expanded the EU cybersecurity incident reporting regime to 18 critical sectors and required
      member states to complete national transposition by October 17, 2024. NIS2 significantly broadens reporting
      obligations for Sysdig's EU enterprise customers and creates both an enablement opportunity and a compliance-gate
      risk for Sysdig's cloud detection tooling. [CR003] [CR004] GDPR Article 33 additionally requires supervisory
      authority notification within 72 hours of a data breach, imposing incident response requirements on Sysdig as a
      data processor for EU customers. [CR002] [CR037]


      FedRAMP authorization governs Sysdig's ability to sell into the US federal market; the official Sysdig press page
      for its FedRAMP authorization returned HTTP 404 at research date, making authorization scope unverifiable from
      public sources. [CR005] [CR006] See TR001 for the full regulatory and legal risk register ordered by severity, and
      the evidence gap EG-R003 for the FedRAMP diligence path.
    claimRefs:
      - CR001
      - CR002
      - CR003
      - CR004
      - CR005
      - CR006
      - CR037
      - CR038
    tableRefs:
      - TR001
  - id: competitive-and-market-displacement-risks
    title: Competitive and Market Displacement Risks
    body: >-
      Wiz has emerged as the most structurally threatening competitor for Sysdig's enterprise CNAPP motion. Wiz raised
      $1 billion at a $12 billion valuation in May 2024 and its platform was trusted by more than 50% of the Fortune 100
      as of its public positioning. Wiz's agentless-first cloud security approach, end-to-end coverage from code to
      runtime, and enterprise sales depth create direct substitution risk for Sysdig's CNAPP platform in contested
      accounts. [CR013] [CR014] [CR039]


      CrowdStrike's Falcon platform achieved 100% detection with zero false positives in the MITRE ATT&CK cloud
      evaluation, and CrowdStrike uses its installed endpoint base as a land-and-expand vector for cloud security
      procurement. [CR015] [CR027] Palo Alto Networks employs a similar bundling strategy through its Cortex Cloud
      platform, reducing procurement friction for existing Palo Alto customers evaluating cloud-native security
      alternatives. [CR028] [CR029] Lacework's acquisition by Fortinet at an undisclosed price in mid-2024 signals that
      standalone CNAPP vendors face consolidation pressure, pricing compression, and valuation discounts when competing
      against platform vendors. [CR016] [CR030] The risk transmission map (FR002) illustrates how these competitive
      dynamics cascade into ARR slowdown, logo churn, and downstream financing difficulty.
    claimRefs:
      - CR013
      - CR014
      - CR015
      - CR016
