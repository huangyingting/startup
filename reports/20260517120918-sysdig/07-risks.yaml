    rows:
      - - CNCF Falco Governance — vendor-neutral project oversight
        - CNCF TOC and vendor community (Aqua, Cisco, AWS, Google, others)
        - Core detection engine and rule grammar governed outside Sysdig's unilateral control
        - Competitor vendor forks or dominates Falco direction; Sysdig's commercial layer commoditized
        - High — loss of Falco differentiation enables agentless or non-Sysdig runtime detection
        - Sysdig maintains primary committer position; active steering committee participation
        - Moderate — governance dilution risk grows as Falco ecosystem expands beyond Sysdig
      - - Cloud Provider Audit APIs — AWS CloudTrail, Azure Activity Log, GCP Audit Log
        - AWS, Microsoft Azure, Google Cloud Platform
        - Cloud audit events feed CDR detection signatures; schema must match exactly
        - Cloud provider changes API schema without notice; CDR detection signatures break silently
        - Medium — detection gaps in cloud layer for days or weeks until Sysdig updates signatures
        - Continuous integration tests against cloud API schemas; automated schema change monitoring
        - Moderate — depends on cloud provider notification cadence and Sysdig's CI/CD responsiveness
      - - Kubernetes Container Runtime — CRI-O and containerd interface evolution
        - Kubernetes community and CNCF
        - Container runtime events feed Sysdig eBPF agent's container-level detection layer
        - Runtime interface break or deprecation disrupts agent's container event feed
        - Medium-high — agent blindspot in containerized environments during incompatibility window
        - Compatibility matrix maintained; agent release cadence aligned with Kubernetes release cycle
        - Moderate — Kubernetes release cycle is predictable but fast; patch response must be timely
    notes: >-
      CNCF Falco governance is the most strategically significant dependency risk. Diligence should verify Sysdig's
      committer status on the Falco project, any trademark agreements with CNCF, and whether the engineering team has
      defensible IP beyond the open-source rule grammar.
