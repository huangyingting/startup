        - Wiz penetration exceeds 60% Fortune 500 AND Sysdig ARR growth slows below 20% YoY
        - Thesis break — revise to sell recommendation; escalate data-room NRR and logo churn request
      - - CEO Execution Failure — Bill Welch underperformance
