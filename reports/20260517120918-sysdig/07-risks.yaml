        - Public Form 8-K filing by any Sysdig customer attributing breach to Sysdig platform
        - Any SEC 8-K or equivalent disclosure attributing a material breach to Sysdig tooling
        - Pause investment decision; demand root-cause analysis; assess customer churn risk
    notes: >-
      Thresholds and kill criteria represent analyst estimates based on public benchmarks and comparable private-company
      precedents; they are not sourced from Sysdig internal projections.
