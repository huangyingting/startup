      - Residual Exposure
      - Unresolved Gap
    rows:
      - - eBPF Kernel Incompatibility — detection gap on unsupported or legacy kernels
        - Medium (managed K8s kernel versions controlled by cloud providers)
        - High — missed detections create blind spots in customer environments
        - Medium — CO-RE model reduces issues; multi-mode fallback (kernel module, kprobes)
        - Agent gaps in environments running kernels below minimum supported version
        - No public benchmark for kernel version distribution across the Sysdig customer fleet
      - - Detection Evasion by Privileged Adversaries — syscall interception bypass
        - Low-medium (requires sophisticated threat actor with privileged access)
        - High — eBPF verifier does not prevent userspace-layer evasion by privileged processes
        - Low — threat model focused on known attack patterns; no published adversarial testing
        - Persistent risk against advanced persistent threat actors operating inside customer infra
        - No third-party adversarial penetration test of Sysdig's detection stack publicly available
      - - Agent Performance Overhead — CPU and memory cost on dense container hosts
        - Medium (known procurement objection in competitive evaluations)
        - Medium — overhead exceeding SLA thresholds causes customer churn and evaluation loss
        - Medium — eBPF preferred over kernel module for lower overhead; optimization roadmap
        - Deployment friction on high-density Kubernetes nodes with tight CPU budgets
        - No peer-reviewed agent overhead benchmark published by Sysdig or independent party
      - - CVE Exposure in Falco Libs / Sysdig Libs — shared OSS supply chain risk
        - Low-medium (CNCF security process and coordinated disclosure reduce frequency)
        - Medium — upstream vulnerability in shared libs affects all Sysdig customers simultaneously
        - Medium — CNCF security committee; responsible disclosure process; patch SLA
        - Supply chain vulnerability risk across shared open-source detection foundation
        - No CVE count or patch SLA metric published on Sysdig website as of research date
    notes: >-
      Detection evasion and eBPF kernel compatibility are the two highest-severity operational risks. Diligence should
      request Sysdig's kernel compatibility matrix, agent overhead benchmarks from representative production
      deployments, and documentation of the security response process for Falco libs CVEs.
