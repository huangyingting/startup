    columns:
      - Rule / License / Case
      - Jurisdiction
      - Status
      - Likelihood
      - Severity
      - Mitigation
      - Residual Exposure
    rows:
      - - SEC Form 8-K Item 1.05 — Material Cybersecurity Incident Disclosure
        - USA (public companies)
        - Active — effective December 15, 2023
        - Medium (Sysdig currently private; customer implication and pre-IPO risk)
        - High — reputational and legal liability for customer incidents attributable to Sysdig
        - Incident response plan with 4-business-day SLA; pre-IPO compliance readiness program
        - Significant if Sysdig's platform is implicated in a material customer incident
      - - GDPR Article 33 — 72-Hour Data Breach Notification
        - EU (EEA-wide)
        - Active — applicable since May 25, 2018
        - Medium (Sysdig is a data processor for EU enterprise customers)
        - Medium — operational fines and contractual penalties for late notification
        - DPA agreements with EU customers; privacy incident response runbook
        - Moderate; exposure proportional to volume of EU personal data processed
      - - NIS2 Directive — Critical Infrastructure Cybersecurity Reporting
        - EU (18 critical sectors)
        - Active — member-state transposition deadline October 17, 2024
        - High (EU enterprise customer base must comply; creates enablement and friction)
        - Medium — market access risk if Sysdig tooling is not validated for NIS2 evidence
        - NIS2 compliance mapping; customer compliance enablement documentation
        - Low to moderate; opportunity as well as risk as market develops through 2026
      - - FedRAMP Authorization — US Federal Market Access
        - USA (US federal government)
        - Unverified — Sysdig press release URL returned HTTP 404 at research date
        - Medium (if Sysdig pursues US federal contracts)
        - High — bars Sysdig from US federal procurement without FedRAMP marketplace listing
        - FedRAMP advisory engagement; ATO tracking and marketplace listing verification
        - Material gap if federal accounts are in Sysdig's enterprise sales pipeline
    notes: >-
      FedRAMP authorization scope is the highest-priority regulatory diligence ask. Confirm Sysdig's marketplace listing
      and authorized services directly with the FedRAMP PMO or via ATO documentation in the data room.
