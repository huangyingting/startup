  - id: operational-and-technical-risks
    title: Operational and Technical Risks
    body: >-
      Sysdig's eBPF-based instrumentation depends on Linux kernel compatibility across the full distribution matrix of
      customer environments. The eBPF verifier guarantees that programs cannot crash the kernel, but does not prevent
      evasion at the privileged userspace boundary by sophisticated adversaries. [CR007] [CR008] Kernel upgrades in
      managed Kubernetes environments — where the kernel version is controlled by the cloud provider rather than the
      customer — create agent compatibility risks that can result in detection gaps or missed detections until Sysdig
      releases a compatible agent build. The eBPF CO-RE (compile-once, run-everywhere) model reduces but does not
      eliminate cross-kernel compatibility fragility. [CR023] [CR024]


      eBPF runtime instrumentation is proven in hyperscale production environments: Google, Netflix, Meta, and
      Cloudflare all use eBPF for security and observability at scale. [CR025] However, Sysdig's detection layer
      captures Linux system calls at the kernel boundary, which privileged adversaries can subvert through namespace
      isolation, kernel exploit exploitation, or eBPF program fingerprinting techniques. [CR042] No third-party
      adversarial testing report for Sysdig's detection stack was publicly available at research date. CPU and memory
      overhead of the eBPF agent on densely packed container hosts is a known procurement objection; specific published
      benchmarks were not found at research date (see EG-R001). CVE exposure in the shared Falco and sysdig-libs OSS
      foundation represents a systemic supply chain risk across all Sysdig customers. [CR026]
    claimRefs:
      - CR007
      - CR008
      - CR023
      - CR024
      - CR025
      - CR026
      - CR042
    tableRefs:
      - TR002
  - id: partner-and-dependency-risks
    title: Partner and Dependency Risks
    body: >-
      Sysdig's technical moat is partially anchored in Falco, which it contributed to the Cloud Native Computing
      Foundation in 2018. Falco graduated as a CNCF project on February 29, 2024, conferring vendor-neutral governance
      through the CNCF Technical Oversight Committee, which prevents Sysdig from unilaterally controlling the project's
      direction or roadmap. [CR009] [CR010] [CR011] [CR034] This governance structure enables any vendor to build
      commercial detection products on Falco's rule grammar and eBPF integration model. Aqua Security's Tracee and
      Cilium's Tetragon are both eBPF-based runtime detection tools that directly compete with Sysdig's runtime
      detection module while leveraging open-source foundations adjacent to or derived from Falco's detection approach.
      [CR017] [CR018] [CR035]


      Cloud provider audit API dependencies — including AWS CloudTrail schema evolution, Azure Activity Log format
      updates, and GCP Audit Log field changes — require continuous engineering maintenance in Sysdig's CDR detection
      modules; any unannounced API format change by a hyperscaler creates temporary detection gaps. [CR019] Kubernetes
      container runtime evolution (CRI-O and containerd interface changes across Kubernetes release cycles) requires
      ongoing agent compatibility testing by Sysdig's engineering team. [CR020] The dependency map (FR003) illustrates
      the four-layer dependency stack — Linux kernel, CNCF Falco governance, cloud audit APIs, and Kubernetes runtime —
      that underlies Sysdig's commercial detection surface. Disruption at any dependency layer can create
      customer-facing detection gaps and generate churn risk.
    claimRefs:
      - CR009
      - CR010
      - CR011
      - CR017
      - CR018
      - CR019
      - CR020
      - CR034
      - CR035
