      - - 2024 Workforce Reduction — reported November 2024 layoffs
        - Headcount impact unconfirmed; TechCrunch reported layoffs but URL returned 404
        - Low-medium (event already occurred; residual execution impact ongoing)
        - Medium — reduced CS capacity (churn risk), reduced sales headcount (ARR growth risk)
        - Selective rehiring in critical functions; FTE-to-contractor conversion in non-core roles
