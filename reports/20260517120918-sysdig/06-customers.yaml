chapter:
  number: 6
  title: "Customers"
  summary: >
    Sysdig has accumulated a rich portfolio of publicly documented named customers—including
    Neo4j (80% fewer vulnerabilities), JumpCloud (99.8% daily alert reduction), Bloomreach
    (350% ROI), CoinDCX (12× faster remediation), and UIDAI (biometric IDs for 1 billion+
    residents)—that demonstrate production-grade CNAPP deployments with measurable, named
    outcomes. The customer base spans cloud-native SaaS/tech, fintech/crypto, healthcare, and
    government, but skews heavily toward cloud-native technology companies; no Fortune 500
    enterprise names are disclosed. Sysdig holds Gartner Customers' Choice recognition for
    both CNAPP and CSPM and is a Forrester CNAPP Leader, confirming analyst-validated customer
    satisfaction. Critical diligence gaps remain: total customer count, net revenue retention,
    gross revenue retention, and churn rate are all absent from public disclosures, making
    retention durability impossible to verify without data-room access.

sections:
- id: customer-base-and-segmentation
  title: "Customer Base Segmentation and Adoption Profile"
  body: >
    Sysdig's publicly documented customer base spans at least eight industry verticals—software
    technology, retail and e-commerce, healthcare, financial services, government, gaming and
    entertainment, telecommunications, and cryptotrading—as listed on the company's customers
    page. The customer page also filters by deployment environment (Private Cloud, Bare Metal,
    On-Premises, Google Cloud, Azure, AWS) and geography (Americas, EMEA, APAC), suggesting
    multi-cloud and multi-region penetration. The dominant segment, based on the weight of
    published case studies, is cloud-native SaaS and tech companies running Kubernetes workloads
    at mid-market to large-enterprise scale. [CU021]

    Buyers within these organizations are almost universally CISO-led with deep engineering
    involvement: Neo4j's deployment was driven by the CISO and adopted by engineering; JumpCloud's
    CISO championed the platform; BigCommerce's VP of Cybersecurity and Senior Infrastructure
    Security Engineer co-owned the evaluation. This dual CISO-and-engineering sponsorship is a
    structural attribute of cloud-native security purchasing that Sysdig's Falco open-source
    heritage directly exploits: familiarity with the Falco detection engine reduces evaluation
    friction for security engineers and shortens PoC cycles. [CU013] [CU020]

    Sysdig does not publish a total customer count. Its homepage aggregates three headline
    statistics—98% fewer vulnerabilities in production, 12× faster remediation, and 99.8%
    reduction in daily alerts—derived from named case studies, not from a disclosed customer
    base size or a statistically sampled survey. These figures are company-stated and not
    independently audited. Sysdig's Series G funding of $350 million at a $2.5 billion valuation
    (2022) and its reported ARR trajectory suggest a substantive enterprise customer base, but
    no discrete customer count has been publicly confirmed. [CU022] [CU023] [CU024] [CU031]

    Sysdig's three core use case clusters—runtime threat detection and CNAPP (CSPM+CWPP+CDR),
    vulnerability management for containerized workloads, and compliance readiness for
    frameworks such as SOC 2, HITRUST, ISO 27001, and PCI DSS—align with the operational
    requirements of cloud-native engineering organizations that have moved or are moving core
    infrastructure to Kubernetes. The Falco-based runtime detection layer creates a technical
    differentiation that community-familiar buyers value, and multiple case studies cite Falco
    familiarity as an initial pull factor that led the customer to evaluate Sysdig as a
    commercial CNAPP. [CU008] [CU028]
  claimRefs: [CU008, CU013, CU020, CU021, CU022, CU023, CU024, CU028, CU031]
  tableRefs: [TU001, TU002]
  figureRefs: [FU001, FU002]

- id: named-proof-and-case-studies
  title: "Named Customer Proof and Case Studies"
  body: >
    Sysdig maintains one of the deepest publicly documented customer proof portfolios among
    CNAPP vendors. As of the May 2026 research date, the company's website hosts more than
    a dozen named case studies spanning technology, financial services, healthcare, government,
    and entertainment. The eight cases reviewed in this chapter all describe full production
    deployments—not pilots—with specific, quantified outcomes attributed to CISO-level
    executives and security engineers.

    Neo4j, the graph database company serving NASA and major U.S. banks, deployed Sysdig's
    full CNAPP platform (CSPM, CWPP, CDR) and achieved an 80% reduction in reported
    vulnerabilities, a 75% reduction in alert noise, and the elimination of more than 160,000
    vulnerabilities to benchmark level over the first six months. [CU001] [CU002] [CU003]
    JumpCloud, the identity and MDM platform, reduced container vulnerabilities by 80% and
    daily alert volume by 99.8%, enabling 30-second triage—down from hours-long manual
    investigation. [CU006] [CU007] [CU008] BigCommerce, the e-commerce platform, used Sysdig
    runtime insights to filter 80% or more of alert noise and is targeting 95% time savings
    on vulnerability management. [CU004] [CU005]

    Bloomreach—identified as one of the fastest-growing private companies in North America in
    2022—began with Sysdig Monitor for Kubernetes observability, achieving 350% ROI and reducing
    infrastructure monitoring costs by over 40%, then expanded to Sysdig Secure to add CNAPP
    capabilities. [CU009] [CU010] [CU011] This Monitor-to-Secure expansion is the strongest
    land-and-expand proof point in Sysdig's named customer base. CoinDCX, India's leading
    crypto exchange, compressed remediation cycles from three months to one week (12×
    improvement) and cut cloud misconfigurations by 60–70% after deploying CSPM and CDR modules
    in late 2024. [CU014] [CU015]

    UIDAI—the Indian government authority responsible for the world's largest biometric identity
    system, Aadhaar, covering 1 billion+ residents—selected Sysdig via open tender for container
    security in its private cloud modernization. Sysdig's resident engineer model (an on-site
    engineer working with UIDAI's team) was cited as critical. [CU016] [CU017] Apree Health,
    a healthcare company undergoing HITRUST audits, deployed Sysdig in under two months,
    saving 10+ hours per month on compliance workflows. [CU018] [CU019] Additional named
    customers on the Sysdig customers page include BitMEX (30-second triage, halved investigation
    time), Mambu (95% false positive reduction), Square Enix (real-time runtime visibility),
    Minna Bank Japan, and Immuta. [CU020] [CU037] [CU038]
  claimRefs: [CU001, CU002, CU003, CU004, CU005, CU006, CU007, CU008, CU009, CU010, CU011,
    CU014, CU015, CU016, CU017, CU018, CU019, CU020, CU037, CU038]
  tableRefs: [TU003]
  figureRefs: [FU003]

- id: retention-and-expansion
  title: "Retention Signals and Expansion Patterns"
  body: >
    Sysdig does not publish net revenue retention (NRR), gross revenue retention (GRR), or
    churn rates. These are the most critical missing data points in this customer chapter.
    Without independently verifiable retention metrics, durability of revenue cannot be
    confirmed. No third-party analyst report reviewed in this research contained independently
    validated Sysdig retention data. All retention analysis below is inferred from secondary
    signals in case study content and the absence of documented churn events. [CU032] [CU035]

    The strongest retention signal is Bloomreach's documented expansion from Sysdig Monitor to
    Sysdig Secure—representing an upsell from observability to full CNAPP within the same
    customer relationship. [CU011] [CU034] No other case study explicitly documents a
    multi-product expansion event, but Neo4j mentions quarterly business reviews with Sysdig
    leadership and joint long-term roadmap alignment, suggesting a multi-year contract horizon.
    JumpCloud's CISO described a deliberate "build vs. buy" evaluation concluding that Sysdig's
    out-of-box delivery would have required several additional engineers to replicate independently—
    a switching cost framing that implies durable retention. [CU006]

    Platform stickiness is structurally high for deployed Sysdig accounts: the eBPF/Falco agent
    is instrumented at the kernel level across all containerized workloads, historical runtime
    event data accumulates in the platform, compliance benchmark histories are embedded in the
    dashboard, and Sysdig Sage's AI assistant begins tailoring guidance to the customer's
    specific environment over time. Migrating away from Sysdig requires re-instrumenting
    detection, rebuilding compliance baselines, and retraining the security team on a new
    tool—a significant switching cost particularly for teams that have gamified vulnerability
    management (as JumpCloud did with leaderboards) or integrated Sysdig alerts into Slack and
    PagerDuty workflows.

    PeerSpot, an independent review platform, rates Sysdig Monitor at 8.0 out of 10 across
    four reviews, with 80% of reviewers willing to recommend. The review sample is small (four
    reviews on PeerSpot as of May 2026) and not statistically significant, but no adverse
    satisfaction signals appear at the aggregate level. Negative feedback centers on the absence
    of APM and OpenTelemetry support and installation friction on Windows—use cases outside
    Sysdig's core Kubernetes/Linux positioning. [CU028] [CU029] [CU030]
  claimRefs: [CU006, CU011, CU028, CU029, CU030, CU032, CU034, CU035]
  tableRefs: [TU004]
  figureRefs: [FU004]

- id: concentration-and-churn-risk
  title: "Concentration, Churn Risk, and Adverse Evidence"
  body: >
    Sysdig's named customer base exhibits a significant vertical concentration risk: at least
    seven of the nine case studies reviewed in depth are cloud-native SaaS or software technology
    companies. Only UIDAI (government) and Apree Health (healthcare) represent non-tech verticals
    in the named proof base, and Apree Health is a tech-enabled healthcare company rather than
    a traditional payer or health system. This concentration means Sysdig's documented adoption
    mirrors the Kubernetes adoption curve within cloud-native organizations, and any sustained
    slowdown in SaaS/cloud-native enterprise security spending would disproportionately affect
    Sysdig's demonstrated revenue base. [CU033]

    No Fortune 500 or FTSE 100 enterprise has been named as a Sysdig customer in any public
    document reviewed during this research. UIDAI is an enterprise-scale deployment at national
    infrastructure level, but it is a government agency, not a commercial enterprise. The
    absence of named large-enterprise references makes it difficult to assess Sysdig's progress
    in the enterprise CNAPP market against Palo Alto Networks Prisma Cloud and Wiz, both of
    which disclose named large-enterprise customers. [CU025] [CU027]

    No churn events, contract non-renewals, or material customer dissatisfaction disclosures
    have been identified in any public source. However, this may reflect the absence of
    public disclosure rather than the absence of churn—as a private company, Sysdig is not
    required to report customer losses. G2 and TrustRadius review pages were inaccessible
    during research (G2 requires JavaScript, TrustRadius returned 404), limiting the
    independent review data set to PeerSpot's four Sysdig Monitor reviews. [CU035]

    The Gartner Customers' Choice designation for CNAPP and CSPM is a positive signal, but the
    primary Gartner Customers' Choice and Voice of the Customer source URLs returned 404 errors
    during research, and the Forrester Wave CNAPP report was also inaccessible. These are
    material evidence gaps that reduce the reliability of analyst validation claims. The
    company's customers page and press releases reference both designations, but
    Sysdig-authored sources confirming third-party awards should be supplemented by independent
    verification before treating them as high-confidence. [CU025] [CU026] [CU027]
  claimRefs: [CU025, CU026, CU027, CU033, CU035]
  tableRefs: [TU005]

