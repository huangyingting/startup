  evidenceGaps:
  - type: missing-source
    severity: material
    topic: customer-count
    missingEvidence: >
      Sysdig's total customer count — number of paying accounts, active deployments, or ARR
      contributor count — has not been found in any public source.
    whyItMatters: >
      Without a customer count, adoption rate, sales velocity, and account concentration
      risk cannot be quantified; it is impossible to assess whether the business is broadening
      its customer base or deepening with existing accounts.
    diligencePath: >
      Request total paying customer count by segment and geography in the data room; triangulate
      against headcount in customer success and sales roles from LinkedIn.

  - type: private-evidence-only
    severity: material
    topic: retention-nrr
    missingEvidence: >
      Net revenue retention (NRR), gross revenue retention (GRR), and annual customer churn
      rate have not been disclosed in any public source; retention can only be inferred from
      secondary signals.
    whyItMatters: >
      NRR is the single most important metric for assessing Sysdig's revenue durability and
      land-and-expand efficiency; without it, the quality of the customer base and the
      sustainability of growth cannot be assessed.
    diligencePath: >
      Request NRR and GRR by cohort and segment in the data room; benchmark against
      CNAPP peer group (Wiz, CrowdStrike, Palo Alto CNAPP) which disclose NRR in S-1/10-K filings.
    relatedTableRefs: [TU004]

  - type: missing-source
    severity: material
    topic: churn
    missingEvidence: >
      No publicly documented churn events, contract non-renewals, or customer exit announcements
      have been found; this may reflect absence of public disclosure rather than absence of churn.
    whyItMatters: >
      Customer churn evidence would directly affect retention model assumptions; absence of
      public churn records in private companies is the norm, not evidence of zero churn.
    diligencePath: >
      Request customer cohort data and non-renewal analysis in data room; ask for a list of
      customers lost in the past 24 months and reasons.
    relatedQuestionRefs: [QU024]

  - type: missing-source
    severity: material
    topic: customer-concentration
    missingEvidence: >
      Revenue concentration by customer (top 1, top 5, top 10 as percentage of ARR) is
      not disclosed in any public source; it is unknown whether a small number of large
      accounts represent a material share of revenue.
    whyItMatters: >
      High customer concentration creates business risk if a major account churns, reduces
      scope, or negotiates aggressive renewal terms; it also affects valuation multiples.
    diligencePath: >
      Request top-10 customer concentration (% of ARR), average contract value, and minimum
      contract duration data in the data room.
    relatedQuestionRefs: [QU025]

  - type: missing-source
    severity: minor
    topic: contract-value
    missingEvidence: >
      Average contract value (ACV), minimum deal size, or enterprise contract ranges are not
      disclosed in any public source; deal economics are entirely opaque.
    whyItMatters: >
      ACV is needed to triangulate customer count from ARR, and to assess upsell efficiency
      and whether the customer base is broadening vs. deepening.
    diligencePath: >
      Request ACV by segment and contract length distribution in data room; check LinkedIn
      for recent sales engineer and account executive job posts that may hint at deal sizes.
    relatedQuestionRefs: [QU028]

  - type: enumeration-incomplete
    severity: minor
    topic: named-customer-proof-table
    missingEvidence: >
      The named customer proof table covers only the 8 full case studies and 2 customers from
      the summary tiles; Sysdig's customers page contains additional logos and one-line
      testimonials for customers including Rush Street Interactive, Minna Bank, Square Enix,
      and others whose full deployment scope and outcomes have not been documented.
    whyItMatters: >
      The completeness of named customer proof matters for assessing Sysdig's actual breadth
      of proof — logos and one-line quotes do not establish production deployment at scale.
    diligencePath: >
      Request the full customer list with segmentation, deployment status (pilot vs. production),
      and outcome metrics in the data room.
    relatedTableRefs: [TU003]

  - type: access-blocked
    severity: minor
    topic: review-sentiment
    missingEvidence: >
      G2 reviews for Sysdig Secure were inaccessible (JavaScript-required), TrustRadius returned
      404, Reddit returned 403, and the Gartner Customers' Choice and VoC source URLs returned
      404; only PeerSpot (4 reviews) was accessible, providing an insufficient independent
      review sample.
    whyItMatters: >
      Independent review site data is important for confirming satisfaction beyond company-
      authored case studies; the blocked access means adverse customer feedback may be
      undetected in this research.
    diligencePath: >
      Access G2 and TrustRadius directly in a browser session; request Gartner Peer Insights
      aggregate scores and review counts directly from Sysdig or Gartner in diligence.

  - type: missing-source
    severity: minor
    topic: competitor-comparison-data
    missingEvidence: >
      No independent side-by-side analysis of Sysdig's customer vertical distribution versus
      CNAPP peers (Wiz, Palo Alto Prisma Cloud, CrowdStrike Falcon Cloud Security) is available
      from any public source reviewed. Competitive customer data would require analyst reports
      or market surveys not accessible at research date.
    whyItMatters: >
      Understanding whether Sysdig's cloud-native SaaS skew is shared by peers or unique to
      Sysdig helps assess whether vertical concentration is a company-specific risk or a
      structural feature of the CNAPP market at this stage.
    diligencePath: >
      Request competitive win/loss analysis by vertical from Sysdig; cross-reference against
      Gartner Magic Quadrant or Forrester Wave customer segment data if available.
    relatedQuestionRefs: [QU027]
