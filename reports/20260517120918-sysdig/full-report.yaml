      - number: '2.3'
        title: Buyer Profiles and Budget Ownership
        blocks:
          - type: paragraph
            body: >
              CNAPP buyers are enterprise CISOs, cloud security architects, DevSecOps platform leads, and site
              reliability engineering (SRE) teams responsible for securing Kubernetes and containerized workloads.
              Unlike traditional IT security purchases controlled solely by the CISO organization, CNAPP procurement
              often involves joint IT/security/engineering committees because the tools must integrate with CI/CD
              pipelines, Kubernetes clusters, and developer workflows. Engineering teams value non-intrusive deployment
              (Sysdig's passive eBPF instrumentation via Falco), low performance overhead, and developer-friendly
              policy-as-code interfaces. Security teams prioritize comprehensive threat coverage, compliance mapping
              (SOC 2, PCI-DSS, NIST, GDPR), and incident response workflows.


              Budget ownership varies by organization maturity. In cloud-native startups and digital-first enterprises,
              platform engineering or DevOps teams often control CNAPP spend as part of infrastructure tooling budgets.
              In traditional enterprises undergoing cloud migration, CISO-led security budgets fund CNAPP alongside EDR,
              SIEM, and network security. In regulated industries (BFSI, healthcare, government), compliance officers
              influence CNAPP selection and budget allocation tied to audit requirements.


              The buyer journey typically begins with a security gap trigger: failed audit finding, cloud
              misconfiguration incident, ransomware targeting Kubernetes, or regulatory mandate (FedRAMP, CMMC, NIS2).
              Evaluation cycles range from 3–9 months for enterprises, involving proof-of-concept (POC) deployments
              across representative workloads. Sysdig competes on runtime detection depth (Falco's kernel-level
              visibility), open-source ecosystem alignment, and Prometheus/Kubernetes-native integrations. Pricing is
              typically per-workload or per-host, with enterprise agreements including professional services for
              deployment and rule customization.


              Key buyer personas: (1) Fortune 500 CISO organizations managing multi-cloud estates requiring unified
              posture visibility; (2) financial services and healthcare enterprises needing audit-ready compliance
              reports; (3) federal and defense agencies requiring FedRAMP Moderate authorization (Sysdig achieved
              FedRAMP authorization as of October 2025); (4) technology companies with large Kubernetes footprints
              seeking developer-friendly security. Channel partners—managed security service providers (MSSPs) and cloud
              consultancies—represent a growing buyer segment for mid-market deployments.
            claimRefs:
              - CM014
              - CM015
              - CM016
              - CM017
              - CM034
          - type: table
            tableRef: TM004
            claimRefs: []
          - type: figure
            figureRef: FM003
