        - id: market-check
          label: CNAPP Market Leader?
          detail: Gartner MQ Leader 2024; Forrester Leader; FedRAMP Moderate -- verified YES
        - id: moat-check
          label: Defensible Technical Moat?
          detail: eBPF + CNCF-graduated Falco + 6-year runtime lead -- YES (with caveat on Wiz closing gap)
        - id: arr-check
          label: Verified ARR >=200M?
          detail: Unverified as of May 2026; analyst estimate $120M-$300M -- UNKNOWN
