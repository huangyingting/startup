chapters:
  - number: 1
    title: Company Overview
    sections:
      - number: '1.1'
        title: Identity, headquarters, and product model
        blocks:
          - type: paragraph
            body: >
              Sysdig Inc. is a San Francisco-based cloud-native security company incorporated in 2013. The company
              operates from its corporate headquarters in San Francisco, California, with engineering and go-to-market
              offices distributed globally. Its mission — "cloud security, the right way" — anchors a product strategy
              built around the premise that real-time, kernel-level visibility is architecturally superior to purely
              agentless scanning approaches. That conviction shapes every layer of the commercial product and the
              open-source community strategy.


              The core product portfolio contains two commercial SaaS platforms and one foundational open-source
              project. Sysdig Secure is a CNAPP that unifies vulnerability management, cloud security posture management
              (CSPM), cloud detection and response (CDR), and Kubernetes security in a single platform anchored by
              runtime context. Sysdig Monitor provides cloud and container observability including metrics, events, and
              capacity analytics for containerized and serverless workloads. Falco is the company's open-source runtime
              security engine, which Sysdig created in 2016 and donated to the Cloud Native Computing Foundation; it
              graduated to CNCF top-level project status in February 2024 and is the de facto Kubernetes
              threat-detection standard.


              Sysdig's commercial business model is subscription SaaS sold on a per-host or per-node basis. Enterprise
              seats are priced per host per year, with enterprise discounts for large container fleet deployments. The
              open-source Falco community functions as the top-of-funnel acquisition channel: security practitioners who
              instrument Falco in their clusters are natural buyers of Sysdig's enterprise rule management, compliance,
              and response capabilities. This open-source-led growth pattern mirrors the Elastic, HashiCorp, and
              Confluent playbooks and differentiates Sysdig from purely commercial CNAPP entrants.
