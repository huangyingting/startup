      - number: '7.4'
        title: Operational and Technical Risks
        blocks:
          - type: paragraph
            body: >-
              Sysdig's eBPF-based instrumentation depends on Linux kernel compatibility across the full distribution
              matrix of customer environments. The eBPF verifier guarantees that programs cannot crash the kernel, but
              does not prevent evasion at the privileged userspace boundary by sophisticated adversaries. [CR007]
              [CR008] Kernel upgrades in managed Kubernetes environments — where the kernel version is controlled by the
              cloud provider rather than the customer — create agent compatibility risks that can result in detection
              gaps or missed detections until Sysdig releases a compatible agent build. The eBPF CO-RE (compile-once,
              run-everywhere) model reduces but does not eliminate cross-kernel compatibility fragility. [CR023] [CR024]


              eBPF runtime instrumentation is proven in hyperscale production environments: Google, Netflix, Meta, and
              Cloudflare all use eBPF for security and observability at scale. [CR025] However, Sysdig's detection layer
              captures Linux system calls at the kernel boundary, which privileged adversaries can subvert through
              namespace isolation, kernel exploit exploitation, or eBPF program fingerprinting techniques. [CR042] No
              third-party adversarial testing report for Sysdig's detection stack was publicly available at research
              date. CPU and memory overhead of the eBPF agent on densely packed container hosts is a known procurement
              objection; specific published benchmarks were not found at research date (see EG-R001). CVE exposure in
              the shared Falco and sysdig-libs OSS foundation represents a systemic supply chain risk across all Sysdig
              customers. [CR026]
            claimRefs:
              - CR007
              - CR008
              - CR023
              - CR024
