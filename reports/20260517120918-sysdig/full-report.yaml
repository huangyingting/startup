      - number: '8.4'
        title: Thesis-Break Triggers and Final Diligence Asks
        blocks:
          - type: paragraph
            body: >-
              Thesis-break triggers are events that, if they materialize, would cause the CONDITIONAL-BUY recommendation
              to downgrade to TRACK or AVOID. The primary thesis-break trigger is ARR verification below $150M, which
              would imply a 17x+ ARR multiple at the $2.5B last mark -- elevated for an undisclosed-metrics private
              company. A secondary trigger is Wiz pricing its anticipated IPO below $8B, which would signal sector-wide
              multiple compression and likely reset Sysdig's implied private mark downward. A tertiary trigger is NRR
              below 105%, suggesting net contraction in the existing customer base. Management departure -- specifically
              the loss of CEO Welch within 24 months of appointment -- would signal board instability and strategic
              drift. Material regulatory action against Sysdig's FedRAMP authorization would close the federal channel.


              The final diligence checklist for investment execution centers on five information packages that cannot be
              sourced from public materials. First, audited ARR for FY2023, FY2024, and FY2025 with revenue recognition
              methodology and deferred revenue schedule. Second, net revenue retention rate by annual customer cohort,
              defined as dollar-based expansion less contraction and churn on the same starting cohort. Third, cash
              balance and monthly burn rate as of March 2026 with a projection to the next fundraising event. Fourth,
              the full capitalization table including preference terms, anti-dilution provisions, and liquidation
              waterfall by share class. Fifth, any secondary market transactions (tender offers, employee liquidity
              events) since May 2023 that established a clearing price for Sysdig equity.
            claimRefs:
