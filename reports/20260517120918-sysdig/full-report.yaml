      - number: '6.3'
        title: Retention Signals and Expansion Patterns
        blocks:
          - type: paragraph
            body: >
              Sysdig does not publish net revenue retention (NRR), gross revenue retention (GRR), or churn rates. These
              are the most critical missing data points in this customer chapter. Without independently verifiable
              retention metrics, durability of revenue cannot be confirmed. No third-party analyst report reviewed in
              this research contained independently validated Sysdig retention data. All retention analysis below is
              inferred from secondary signals in case study content and the absence of documented churn events. [CU032]
              [CU035]

              The strongest retention signal is Bloomreach's documented expansion from Sysdig Monitor to Sysdig
              Secure—representing an upsell from observability to full CNAPP within the same customer relationship.
              [CU011] [CU034] No other case study explicitly documents a multi-product expansion event, but Neo4j
              mentions quarterly business reviews with Sysdig leadership and joint long-term roadmap alignment,
              suggesting a multi-year contract horizon. JumpCloud's CISO described a deliberate "build vs. buy"
              evaluation concluding that Sysdig's out-of-box delivery would have required several additional engineers
              to replicate independently— a switching cost framing that implies durable retention. [CU006]

              Platform stickiness is structurally high for deployed Sysdig accounts: the eBPF/Falco agent is
              instrumented at the kernel level across all containerized workloads, historical runtime event data
              accumulates in the platform, compliance benchmark histories are embedded in the dashboard, and Sysdig
              Sage's AI assistant begins tailoring guidance to the customer's specific environment over time. Migrating
              away from Sysdig requires re-instrumenting detection, rebuilding compliance baselines, and retraining the
              security team on a new tool—a significant switching cost particularly for teams that have gamified
              vulnerability management (as JumpCloud did with leaderboards) or integrated Sysdig alerts into Slack and
              PagerDuty workflows.

              PeerSpot, an independent review platform, rates Sysdig Monitor at 8.0 out of 10 across four reviews, with
              80% of reviewers willing to recommend. The review sample is small (four reviews on PeerSpot as of May
              2026) and not statistically significant, but no adverse satisfaction signals appear at the aggregate
              level. Negative feedback centers on the absence of APM and OpenTelemetry support and installation friction
              on Windows—use cases outside Sysdig's core Kubernetes/Linux positioning. [CU028] [CU029] [CU030]
