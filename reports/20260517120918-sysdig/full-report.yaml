  - id: FU001
    title: Customer Journey Map
    type: journey-map
    sectionRef: customer-base-and-segmentation
    claimRefs:
      - CU001
      - CU008
      - CU011
      - CU013
      - CU020
      - CU028
    data:
      nodes:
        - label: Discovery / Awareness
          detail: >
            Security engineers familiar with Falco OSS or Wireshark (Sysdig founder's tools) encounter Sysdig
            commercially. Analyst reports (Gartner CC, Forrester CNAPP Wave) and peer word-of-mouth also drive initial
            awareness in CISO communities.
        - label: Evaluation (PoC)
          detail: >
            30–90 day PoC against 3–7 competing platforms. JumpCloud and Automox each evaluated multiple vendors before
            selecting Sysdig. Falco-native rules transparency cited as differentiator — "no smoke and mirrors" (Automox
            CISO).
        - label: Initial Deployment (Land)
          detail: >
            Production deployment of Sysdig Secure (CNAPP: CWPP+CSPM) or Sysdig Monitor. Typical entry point is
            container/Kubernetes security. Deployment commonly automated via Terraform. Time-to-value is days to weeks.
        - label: Value Realization
          detail: >
            First 6 months: measurable outcomes documented — 80%+ alert noise reduction (Neo4j, JumpCloud, BigCommerce,
            Automox), faster triage (30 seconds at BitMEX/JumpCloud), compliance baseline achieved (Apree Health HITRUST
            in <2 months).
        - label: Expansion (Upsell / Add-on)
          detail: >
            Bloomreach added Sysdig Secure after Monitor deployment. CoinDCX expanded CSPM coverage across additional
            accounts. JumpCloud explored Sysdig Sage™. Multiple customers adding Managed Falco or custom detection rules
            as maturity grows.
        - label: Executive Alignment
          detail: >
            Quarterly business reviews documented at Neo4j. CISO-level briefings on threat landscape from Sysdig Threat
            Research Team. Multi-year relationship framing cited by multiple CISOs as differentiating from single-vendor
            transactional relationships.
        - label: Advocacy (Case Study / Reference)
          detail: >
            Named case study consent — Sysdig has 10+ published case studies with CISO-level executives quoted. Gartner
            Customers' Choice designation reflects review participation. JumpCloud, Neo4j, and CoinDCX all agreed to
            public proof publication.
        - label: Renewal / Multi-Product Expansion
          detail: >
            No documented churn in reviewed sources. Platform stickiness from eBPF/Falco agent instrumentation,
            historical event data, compliance baseline history, and Sage AI personalization makes switching costs high
            for deployed accounts.
    notes: >
      Journey stages are inferred from case study content describing customer timelines and deployment progression.
      Quantitative stage-to-stage conversion rates are not publicly disclosed. Expansion module economics are not
      disclosed.
