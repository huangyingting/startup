      - - Detection Evasion by Privileged Adversaries — syscall interception bypass
        - Low-medium (requires sophisticated threat actor with privileged access)
        - High — eBPF verifier does not prevent userspace-layer evasion by privileged processes
        - Low — threat model focused on known attack patterns; no published adversarial testing
        - Persistent risk against advanced persistent threat actors operating inside customer infra
        - No third-party adversarial penetration test of Sysdig's detection stack publicly available
      - - Agent Performance Overhead — CPU and memory cost on dense container hosts
        - Medium (known procurement objection in competitive evaluations)
        - Medium — overhead exceeding SLA thresholds causes customer churn and evaluation loss
        - Medium — eBPF preferred over kernel module for lower overhead; optimization roadmap
        - Deployment friction on high-density Kubernetes nodes with tight CPU budgets
        - No peer-reviewed agent overhead benchmark published by Sysdig or independent party
      - - CVE Exposure in Falco Libs / Sysdig Libs — shared OSS supply chain risk
