      - number: '3.2'
        title: Capability and Positioning
        blocks:
          - type: paragraph
            body: |
              The central capability divide in CNAPP is runtime depth versus deployment simplicity. Sysdig
              occupies the high-runtime-depth quadrant: Falco's eBPF kernel instrumentation provides
              syscall-level visibility into container and host behavior, enabling real-time threat detection
              within milliseconds of an exploit. This level of signal is inaccessible to agentless scanners
              that rely on periodic snapshots of cloud configuration and disk state. Sysdig's 555 Benchmark
              claims the platform can detect and respond to a cloud attack faster than an attacker can complete
              it—a marketing-led assertion that nonetheless reflects genuine architectural depth in runtime event
              capture via Falco.

              Wiz's agentless approach—scanning cloud workload metadata without kernel agents—offers faster
              time-to-first-value (minutes versus hours for agent deployment) and broader cloud asset visibility
              (IAM, storage, network configuration, and virtual machine images). However, Wiz's runtime detection
              capability is limited without its Wiz Defend module, which requires the Wiz Sensor agent for
              kernel-level signals. As of 2026, Wiz has added an agent-optional layer, but its primary
              differentiation remains the security graph and agentless posture management breadth. Orca Security
              followed a similar trajectory, launching its eBPF-based Orca Sensor in 2025/2026 to close the
              runtime gap.

              Palo Alto Networks Prisma Cloud (now Cortex Cloud) offers the broadest feature set among CNAPP
              vendors but at the cost of platform complexity. Prisma Cloud analyzes 1 trillion events daily using
              AI-powered Precision AI and offers built-in AI Security Posture Management (AI SPM) for GenAI
              workloads. Its advantage is deep integration with PANW's broader Cortex platform and a large
              professional services network for complex enterprise deployments.

              CrowdStrike Falcon Cloud Security differentiates on adversary intelligence: the platform maps cloud
              detections to 281+ tracked threat actors and validated 100% detection with zero false-positives in
              MITRE's first-ever cloud ATT&CK evaluation (Enterprise 2025). CrowdStrike's cloud module benefits
              from cross-domain correlation with its endpoint and identity signals—an advantage Sysdig replicates
              partially through Sysdig Monitor integration but cannot match in endpoint breadth.

              Aqua Security's full lifecycle approach (code to registry to runtime) overlaps most with Sysdig in
              container and Kubernetes security. Aqua's open-source tools—Trivy and Tracee—create developer
              community presence that competes with Falco for practitioner mindshare. Snyk's developer-first
              platform covers code, open source, containers, IaC, and API/web security (DAST), with integrations
              spanning the entire SDLC. Snyk's overlap with Sysdig is primarily in container image scanning and
              IaC security; it lacks Sysdig's runtime depth and observability integration.

              Sysdig's Sage GenAI cloud security analyst (launched 2025) and Headless Cloud Security architecture
              (launched 2026) represent its AI-era response to Wiz's security graph and PANW's Cortex platform.
              Sage provides multi-step reasoning for alert triage and investigation—a capability now offered by
              most tier-1 CNAPP vendors, making AI features a table-stakes differentiator rather than a true moat.
