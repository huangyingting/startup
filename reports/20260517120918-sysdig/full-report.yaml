  - number: 2
    title: Market Analysis
    sections:
      - number: '2.1'
        title: Market Boundary and Scope
        blocks:
          - type: paragraph
            body: >
              The market in which Sysdig competes is labeled Cloud-Native Application Protection Platform (CNAPP) by
              Gartner (first Magic Quadrant published 2024), cloud workload protection and security by Forrester, and
              cloud security by broader market analysts. CNAPP emerged as a category in 2022 to describe the
              consolidation of previously discrete cloud security tools—cloud security posture management (CSPM), cloud
              workload protection platform (CWPP), Kubernetes security posture management (KSPM), cloud infrastructure
              entitlement management (CIEM), container security, runtime security, and infrastructure-as-code (IaC)
              scanning—into unified platforms.


              The CNAPP market addresses protection for cloud-native applications across the full lifecycle: code (CI/CD
              security, IaC scanning, software composition analysis), build (artifact scanning, registry security),
              deploy (CSPM, KSPM configuration management), and runtime (CWPP threat detection, behavioral anomaly
              detection, incident response). Sysdig's positioning emphasizes runtime insights powered by Falco—the CNCF
              graduated open-source runtime security engine using eBPF for Linux kernel instrumentation—as the
              differentiating foundation for threat detection, investigation, and response.


              Adjacent but distinct markets include traditional IT endpoint detection and response (EDR), extended
              detection and response (XDR) expanding into cloud, security information and event management (SIEM),
              application security posture management (ASPM), and supply chain security. Status-quo substitutes include
              manual cloud console reviews, CSP-native security tools (AWS Security Hub, Azure Defender, Google Cloud
              Security Command Center), and point-solution tools assembled by enterprise security teams. Market growth
              displaces both manual approaches and fragmented tool sets as organizations seek consolidation to address
              "tool sprawl"—a constraint cited by 60% of enterprises consolidating to single-vendor CNAPP by 2023
              (Gartner).
            claimRefs:
              - CM001
              - CM002
              - CM003
              - CM004
              - CM005
              - CM032
          - type: table
            tableRef: TM001
            claimRefs: []
      - number: '2.2'
        title: TAM / SAM / SOM — Sizing with Multiple Lenses
        blocks:
          - type: paragraph
            body: >
              Multiple analysts size the cloud security and CNAPP markets from overlapping definitional bases, producing
              forecasts that span a 4× range depending on scope. MarketsandMarkets projects the CNAPP market—defined
              narrowly as platforms offering integrated CSPM, CWPP, and CIEM—at $19.3 billion by 2027, growing at CAGR
              19.9% from a 2022 baseline. Grand View Research sizes the broader cloud security market—encompassing
              identity and access management, data loss prevention, encryption, network security, email security, and
              SIEM in addition to CNAPP—at $75.26 billion by 2030, growing at CAGR 13.3% from $35.84 billion in 2024.
              Allied Market Research projects an intermediate scope at $125.8 billion by 2032, CAGR 13.6% from $35.8
              billion in 2022.


              The definitional variance reflects genuine market boundary ambiguity: CNAPP platforms increasingly bundle
              capabilities traditionally sold separately (SIEM log aggregation, identity governance, data security),
              while legacy IT security vendors expand cloud modules into their existing platforms. Gartner's 2023
              guidance estimated that 60% of enterprises would consolidate CWPP and CSPM to a single vendor by 2023, up
              from 25% in 2022—a structural tailwind for integrated CNAPP platforms like Sysdig, Palo Alto Prisma Cloud,
              Wiz, and CrowdStrike Falcon Cloud Security.


              Sysdig's primary addressable market is the CNAPP platform segment—estimated SAM of $19–25 billion by 2027
              using MarketsandMarkets' narrow scope. This segment excludes legacy endpoint security, on-premises data
              centers without cloud workloads, and SMEs without containerized or Kubernetes deployments. North America
              represents 33–42% of global cloud security spend. BFSI, IT/telecom, healthcare, and manufacturing are the
              largest vertical segments, with healthcare projected to grow fastest at 17.7% CAGR through 2032 due to
              sensitive data protection mandates.


              Deployment mode is shifting: private cloud dominated 48% of 2024 spend, but hybrid and multi-cloud
              architectures—Sysdig's core use case—are the fastest-growing deployment segments. Enterprise-sized
              organizations represent 73–74% of current spend, though regulatory expansion (GDPR, NIS2, CMMC, state
              privacy laws) is driving mid-market adoption. Sysdig's SOM is not publicly disclosed; the company does not
              publish revenue or customer count in available sources.
