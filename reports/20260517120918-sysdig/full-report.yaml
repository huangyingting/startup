        - Immediate visibility into cloud drift; compliance report generation for auditors
      - - Cloud Detection and Response CDR
        - Threat hunter and SOC analyst
        - CloudTrail or Azure Monitor log ingested alongside runtime eBPF telemetry
        - Correlated attack chain surfaced with MITRE ATT&CK mapping and affected cloud resources
        - Cross-layer kill-chain visibility; response time target of 5 minutes per 555 Benchmark
      - - Permissions and Entitlements CIEM
        - Cloud security engineer and IAM administrator
        - Entitlement scan reveals overprivileged IAM roles or unused cloud permissions
        - Least-privilege policy recommendations generated; risk-ranked entitlement dashboard surfaced
