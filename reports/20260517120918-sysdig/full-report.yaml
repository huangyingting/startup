      - number: '5.3'
        title: Trust, Compliance, Differentiation, and Roadmap
        blocks:
          - type: paragraph
            body: |
              Sysdig achieved FedRAMP Moderate authorization in 2024, enabling it to serve US federal agencies
              and regulated government contractors. This is a significant differentiator: as of the May 2026
              research date, most pure CNAPP competitors have not yet cleared this authorization barrier. The
              platform is also documented as SOC 2 Type II, ISO 27001, PCI DSS, and HIPAA compliant on the
              Sysdig trust page; however, no independent audit reports are publicly available for these certifications,
              and the FedRAMP authorization scope (which modules and regions are covered) is not detailed in the
              press release.

              Gartner recognized Sysdig as a Customers Choice for both CNAPP and CSPM in its Peer Insights program,
              and Forrester named Sysdig a Leader in its CNAPP Wave report. These recognitions provide third-party
              analyst validation of enterprise-grade maturity and complement the 2024 Gartner CNAPP Magic Quadrant
              appearance. G2 and TrustRadius reviews further confirm customer satisfaction, with runtime detection
              depth and Kubernetes visibility frequently cited as strengths.

              Key product risks include: (1) Windows workload coverage gap — the eBPF agent is Linux-only, excluding
              enterprises with significant Windows server deployments; (2) Falco CNCF governance risk — the core
              detection engine is governed by a CNCF community, not exclusively by Sysdig, and a fork or governance
              change could allow competitors to build equivalent runtime detection; (3) R&D capacity concern —
              Sysdig confirmed a layoff event in November 2024 with undisclosed scope, reported by TechCrunch and
              The Register; (4) competitive pressure — Wiz, which raised  billion at a 2 billion valuation in
              mid-2024, continues to intensify competition in the agentless CNAPP segment. The inferred 2026 roadmap
              focuses on AI-driven security workflows via Sysdig Sage, expanded agentless coverage for multi-cloud
              environments, and deeper developer toolchain integration based on public product direction signals.
