      - number: '6.4'
        title: Concentration, Churn Risk, and Adverse Evidence
        blocks:
          - type: paragraph
            body: >
              Sysdig's named customer base exhibits a significant vertical concentration risk: at least seven of the
              nine case studies reviewed in depth are cloud-native SaaS or software technology companies. Only UIDAI
              (government) and Apree Health (healthcare) represent non-tech verticals in the named proof base, and Apree
              Health is a tech-enabled healthcare company rather than a traditional payer or health system. This
              concentration means Sysdig's documented adoption mirrors the Kubernetes adoption curve within cloud-native
              organizations, and any sustained slowdown in SaaS/cloud-native enterprise security spending would
              disproportionately affect Sysdig's demonstrated revenue base. [CU033]

              No Fortune 500 or FTSE 100 enterprise has been named as a Sysdig customer in any public document reviewed
              during this research. UIDAI is an enterprise-scale deployment at national infrastructure level, but it is
              a government agency, not a commercial enterprise. The absence of named large-enterprise references makes
              it difficult to assess Sysdig's progress in the enterprise CNAPP market against Palo Alto Networks Prisma
              Cloud and Wiz, both of which disclose named large-enterprise customers. [CU025] [CU027]

              No churn events, contract non-renewals, or material customer dissatisfaction disclosures have been
              identified in any public source. However, this may reflect the absence of public disclosure rather than
              the absence of churn—as a private company, Sysdig is not required to report customer losses. G2 and
              TrustRadius review pages were inaccessible during research (G2 requires JavaScript, TrustRadius returned
              404), limiting the independent review data set to PeerSpot's four Sysdig Monitor reviews. [CU035]

              The Gartner Customers' Choice designation for CNAPP and CSPM is a positive signal, but the primary Gartner
              Customers' Choice and Voice of the Customer source URLs returned 404 errors during research, and the
              Forrester Wave CNAPP report was also inaccessible. These are material evidence gaps that reduce the
              reliability of analyst validation claims. The company's customers page and press releases reference both
              designations, but Sysdig-authored sources confirming third-party awards should be supplemented by
              independent verification before treating them as high-confidence. [CU025] [CU026] [CU027]
