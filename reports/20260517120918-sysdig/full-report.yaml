  - number: 4
    title: Financials
    sections:
      - number: '4.1'
        title: Revenue Model and Pricing Architecture
        blocks:
          - type: paragraph
            body: >
              Sysdig generates revenue through three primary software subscription streams — Sysdig Secure, Sysdig
              Monitor, and Falco Enterprise Feeds — plus professional services and managed-security enablement
              engagements. The company employs a per-host/per-node licensing model for its two main platform products,
              where "host" encompasses compute instances, containers, Kubernetes nodes, and serverless functions
              depending on the specific product module. This model is disclosed on the Sysdig pricing page, which
              explicitly states that Sysdig Secure licensing is based on the number of hosts in a customer's
              environment, with cloud-log-based detection modules priced per events processed. Sysdig Monitor offers
              both host-based licensing and time-series-based licensing, providing customers flexibility between
              workload-count and metric-volume pricing.

              Sysdig Secure is the company's flagship product, combining vulnerability management, cloud security
              posture management (CSPM), cloud infrastructure entitlement management (CIEM), container and Kubernetes
              security, cloud detection and response (CDR), and infrastructure-as-code security in a unified CNAPP. As
              the largest product by estimated revenue share, Sysdig Secure competes directly with Wiz, Orca Security,
              Aqua Security, and the CNAPP modules bundled into CrowdStrike Falcon and Palo Alto Networks Prisma Cloud.
              The breadth of coverage — spanning agent-based and agentless deployment modes — and the runtime
              intelligence layer anchored by Falco differentiate Sysdig from competitors that rely primarily on
              agentless posture management without real-time syscall visibility.

              Sysdig Monitor provides container, Kubernetes, and cloud service monitoring using a managed Prometheus
              service. It competes with Datadog and Dynatrace in the cloud-native observability segment. The Monitor
              product includes built-in cost optimization, PromQL support, and automatic service detection, positioning
              it as a DevOps-adjacent product that land alongside Sysdig Secure deployments. The per-host or time-series
              pricing model aligns with Datadog's approach, enabling shared infrastructure data for both observability
              and security use cases.

              Falco Enterprise Feeds, launched as a commercial subscription offering on top of the CNCF-graduated open
              source Falco project, provides enterprise-grade detection rules, threat intelligence, and professional
              support to organizations already running Falco. The Falco project reached 175M+ container image pulls and
              8,600+ GitHub stars over its first decade (2016–2026), and Sysdig donated $70,000 to the Falco project
              through the Linux Foundation in May 2026 to mark the ten-year anniversary. The size of the Falco open
              source community provides a natural funnel for commercial Falco Feeds conversions — a dynamic analogous to
              HashiCorp's commercial product strategy on top of Terraform. Monetization through Falco Feeds represents
              an emerging but structurally attractive revenue line given the community scale.

              Professional services include implementation, threat detection rule customization, Sysdig Sage AI
              onboarding, and managed threat detection engagements. These services typically carry lower gross margins
              (estimated 20–35%) than the software subscription tiers (estimated 65–75%) and are expected to grow as a
              natural complement to platform expansion, then plateau as customers achieve self-sufficiency. The absence
              of a publicly disclosed price list or contract value data makes any revenue quantification speculative;
              Sysdig does not publish per-host pricing, discount structures, or average contract values.
