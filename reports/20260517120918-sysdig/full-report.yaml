  - number: 7
    title: Risks
    sections:
      - number: '7.1'
        title: Risk Landscape and Assessment Methodology
        blocks:
          - type: paragraph
            body: >-
              Sysdig's risk profile reflects its competitive positioning as a purpose-built cloud-native security
              platform whose technical differentiation rests on Falco, eBPF-based instrumentation, and a
              vendor-controlled CNAPP stack. This chapter assesses material risks across six domains: regulatory and
              legal exposure, competitive and market displacement, operational and technical, partner and dependency,
              people and execution, and financial and pricing compression. Risk severity is assessed qualitatively by
              multiplying likelihood by business impact, yielding a residual exposure rating for each risk item.
              Evidence-based likelihood estimates draw on public regulatory filings, third-party news reporting,
              competitor product pages, analyst reviews, and Sysdig official communications. [CR043]


              The risk heatmap (FR001) places competitive displacement from Wiz and regulatory disclosure obligations in
              the upper-severity quadrants as of May 2026. The risk transmission map (FR002) traces how platform
              displacement and regulatory triggers cascade downstream into revenue slowdown, customer churn, financing
              difficulty, and valuation impairment. The dependency map (FR003) illustrates the structural dependency
              stack beneath Sysdig's detection surface: Linux kernel eBPF, CNCF Falco governance, cloud provider audit
              APIs, and Kubernetes runtime. Each risk entry in the registers below includes a mitigation maturity rating
              and residual exposure estimate to support investment thesis verification and data-room prioritization.
              Kill criteria and monitored triggers are consolidated in TR005 (Mitigation and Kill Criteria Table) in
              section 6.
