      - number: '5.2'
        title: Technology Architecture and Open-Source Foundation
        blocks:
          - type: paragraph
            body: |
              The Sysdig platform is architectured as a multi-tenant SaaS backend with a lightweight per-host
              kernel agent delivered via eBPF (extended Berkeley Packet Filter). The eBPF probe captures Linux
              system calls at the kernel level without requiring kernel module compilation or OS modifications,
              reducing deployment friction versus legacy kernel module approaches. The agent is packaged as a
              container deployed as a Kubernetes DaemonSet; an agentless scanning mode supplements the agent for
              cloud configuration and image registry scanning where runtime visibility is not required or agent
              deployment is restricted by policy.

              The Falco open-source project underpins the runtime detection layer. Falco uses a rules engine that
              consumes system call streams and evaluates them against a library of detection rules expressed in a
              YAML-based DSL. The falcosecurity GitHub organization hosts over 100 active contributors as of the
              research date, and the falcosecurity/falco repository has accumulated more than 7,000 stars on GitHub,
              indicating substantial developer-community adoption beyond Sysdig commercial users. Docker Hub shows
              millions of pulls of the official Falco image, further evidencing production deployments at scale.

              Sysdig Sage, the AI security assistant announced in 2023, uses LLM-backed generative AI to translate
              raw threat findings into natural-language investigation workflows, reducing mean time to respond for
              SOC analysts. Sage is built on top of the runtime insight graph that powers the core CNAPP, meaning
              its recommendations are grounded in live runtime data rather than static configuration snapshots.
              The specific underlying LLM provider is not publicly disclosed. The Sysdig Labs GitHub organization
              (github.com/sysdiglabs) publishes open-source Terraform modules, Helm charts, and automation scripts
              for platform deployment. A VS Code marketplace extension extends security into the IDE, and the
              platform integrates with GitHub Actions and Jenkins for CI/CD pipeline security scanning.
