  - number: 5
    title: Product & Technology
    sections:
      - number: '5.1'
        title: Cloud-Native Application Protection Platform Overview
        blocks:
          - type: paragraph
            body: >
              Sysdig delivers a unified Cloud-Native Application Protection Platform (CNAPP) integrating cloud

              security posture management (CSPM), cloud workload protection (CWPP), cloud detection and response

              (CDR), and cloud infrastructure entitlement management (CIEM) into a single SaaS platform. The product

              surface is organized into two branded modules: Sysdig Secure (security) and Sysdig Monitor
              (observability),

              supplemented by Sysdig Sage, a generative AI assistant introduced in 2023 that surfaces prioritized

              security findings using natural language. The platform serves five primary documented use cases:

              vulnerability management, runtime security, cloud detection and response, posture management, and

              permissions and entitlements management.


              The platform is differentiated by three pillars. First, Falco, an eBPF-based runtime threat detection

              engine created by Sysdig in 2016 and donated to the CNCF, graduated to top-level CNCF project status

              in February 2024, validating community production readiness. Second, runtime insights correlate container

              image vulnerabilities, cloud configuration drift, and live process activity into a single risk-prioritized

              view, reducing actionable alert volume by more than 95 percent in documented deployments. Third, the

              555 Benchmark asserts threat detection within 5 seconds, correlation within 5 seconds, and response

              initiation within 5 minutes, positioning Sysdig against agentless-only competitors who cannot match

              real-time response.


              The platform supports deployment across AWS, Azure, and Google Cloud with both agent-based (eBPF)

              and agentless scanning modes. Sysdig is listed on all three cloud marketplaces and is certified as

              a security partner by each provider. The product integrations library documents more than 700 pre-built

              connectors covering SIEM (Splunk, IBM QRadar), SOAR (PagerDuty, ServiceNow), and developer tooling

              (GitHub Actions, Jenkins, VS Code). FedRAMP Moderate authorization was achieved in 2024, enabling

              federal and regulated government contractor deployments — a certification barrier most pure CNAPP

              competitors have not yet cleared.
