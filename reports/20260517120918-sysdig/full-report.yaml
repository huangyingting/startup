companyProfile:
  summary: >
    Sysdig, Inc. is a San Francisco–headquartered cloud-native security company founded in 2013 by Loris Degioanni
    (co-creator of Wireshark) and the Draios team. Its commercial portfolio centers on Sysdig Secure, a Cloud-Native
    Application Protection Platform (CNAPP) covering CSPM, CWPP, KSPM, CIEM, vulnerability management, container/IaC
    scanning, and Cloud Detection and Response, and Sysdig Monitor, a Prometheus-compatible observability product for
    containers and Kubernetes. Both products are built on Falco, the company's open-source runtime security project that
    graduated from the CNCF in February 2024. Sysdig last raised a $350M Series G led by Vista Equity Partners at a
    $2.5B post-money valuation in May 2023, bringing cumulative disclosed capital to approximately $745M. The company
    served Fortune 500 enterprises and government agencies (Goldman Sachs, IBM, SAP, BigCommerce, the U.S. Air Force,
    among others) and conducted a workforce reduction of ~10% in November 2024, leaving approximately 1,200 employees as
    of 2026.
