        - label: Suspicious system call detected by Falco eBPF probe within container on Kubernetes node
          detail: Detection occurs within 5 seconds of event per 555 Benchmark target
        - label: Falco rule fires and alert enriched with container identity, process tree, and network context
          detail: Runtime insight graph correlates with cloud identity, IAM role, and image vulnerability data
        - label: Alert surfaced in Sysdig Secure console with MITRE ATT&CK mapping and prioritized risk score
          detail: Sysdig Sage generates natural-language investigation summary for SOC analyst review
        - label: Analyst investigates correlated kill chain and identifies affected workloads and blast radius
          detail: Cross-layer correlation links runtime event to cloud account, IAM role, and open CVE
        - label: Remediation triggered including container termination, policy update, and ServiceNow ticket
          detail: Response target is 5 minutes per 555 Benchmark; SOAR integration automates ticket creation
    sourceRefs:
