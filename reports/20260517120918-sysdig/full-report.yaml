        title: Regulatory and Legal Risks
        blocks:
          - type: paragraph
            body: >-
              Sysdig faces multi-jurisdictional regulatory obligations that create disclosure liability, market access
              requirements, and contractual compliance costs. The SEC's amended Form 8-K Item 1.05, effective December
              15, 2023, requires public companies to disclose material cybersecurity incidents within four business days
              of determining the incident is material. While Sysdig is currently privately held, its enterprise customer
              base includes public companies subject to this rule; a customer incident involving a Sysdig agent
              vulnerability could expose Sysdig to reputational and legal liability even before any Sysdig IPO. [CR001]
              [CR038]


              The EU NIS2 Directive expanded the EU cybersecurity incident reporting regime to 18 critical sectors and
              required member states to complete national transposition by October 17, 2024. NIS2 significantly broadens
              reporting obligations for Sysdig's EU enterprise customers and creates both an enablement opportunity and
              a compliance-gate risk for Sysdig's cloud detection tooling. [CR003] [CR004] GDPR Article 33 additionally
              requires supervisory authority notification within 72 hours of a data breach, imposing incident response
              requirements on Sysdig as a data processor for EU customers. [CR002] [CR037]


              FedRAMP authorization governs Sysdig's ability to sell into the US federal market; the official Sysdig
              press page for its FedRAMP authorization returned HTTP 404 at research date, making authorization scope
              unverifiable from public sources. [CR005] [CR006] See TR001 for the full regulatory and legal risk
              register ordered by severity, and the evidence gap EG-R003 for the FedRAMP diligence path.
