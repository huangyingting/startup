      - number: '7.5'
        title: Partner and Dependency Risks
        blocks:
          - type: paragraph
            body: >-
              Sysdig's technical moat is partially anchored in Falco, which it contributed to the Cloud Native Computing
              Foundation in 2018. Falco graduated as a CNCF project on February 29, 2024, conferring vendor-neutral
              governance through the CNCF Technical Oversight Committee, which prevents Sysdig from unilaterally
              controlling the project's direction or roadmap. [CR009] [CR010] [CR011] [CR034] This governance structure
              enables any vendor to build commercial detection products on Falco's rule grammar and eBPF integration
              model. Aqua Security's Tracee and Cilium's Tetragon are both eBPF-based runtime detection tools that
              directly compete with Sysdig's runtime detection module while leveraging open-source foundations adjacent
              to or derived from Falco's detection approach. [CR017] [CR018] [CR035]


              Cloud provider audit API dependencies — including AWS CloudTrail schema evolution, Azure Activity Log
              format updates, and GCP Audit Log field changes — require continuous engineering maintenance in Sysdig's
              CDR detection modules; any unannounced API format change by a hyperscaler creates temporary detection
              gaps. [CR019] Kubernetes container runtime evolution (CRI-O and containerd interface changes across
              Kubernetes release cycles) requires ongoing agent compatibility testing by Sysdig's engineering team.
              [CR020] The dependency map (FR003) illustrates the four-layer dependency stack — Linux kernel, CNCF Falco
              governance, cloud audit APIs, and Kubernetes runtime — that underlies Sysdig's commercial detection
              surface. Disruption at any dependency layer can create customer-facing detection gaps and generate churn
              risk.
