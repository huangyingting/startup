  - number: 6
    title: Customers
    sections:
      - number: '6.1'
        title: Customer Base Segmentation and Adoption Profile
        blocks:
          - type: paragraph
            body: >
              Sysdig's publicly documented customer base spans at least eight industry verticals—software technology,
              retail and e-commerce, healthcare, financial services, government, gaming and entertainment,
              telecommunications, and cryptotrading—as listed on the company's customers page. The customer page also
              filters by deployment environment (Private Cloud, Bare Metal, On-Premises, Google Cloud, Azure, AWS) and
              geography (Americas, EMEA, APAC), suggesting multi-cloud and multi-region penetration. The dominant
              segment, based on the weight of published case studies, is cloud-native SaaS and tech companies running
              Kubernetes workloads at mid-market to large-enterprise scale. [CU021]

              Buyers within these organizations are almost universally CISO-led with deep engineering involvement:
              Neo4j's deployment was driven by the CISO and adopted by engineering; JumpCloud's CISO championed the
              platform; BigCommerce's VP of Cybersecurity and Senior Infrastructure Security Engineer co-owned the
              evaluation. This dual CISO-and-engineering sponsorship is a structural attribute of cloud-native security
              purchasing that Sysdig's Falco open-source heritage directly exploits: familiarity with the Falco
              detection engine reduces evaluation friction for security engineers and shortens PoC cycles. [CU013]
              [CU020]

              Sysdig does not publish a total customer count. Its homepage aggregates three headline statistics—98%
              fewer vulnerabilities in production, 12× faster remediation, and 99.8% reduction in daily alerts—derived
              from named case studies, not from a disclosed customer base size or a statistically sampled survey. These
              figures are company-stated and not independently audited. Sysdig's Series G funding of $350 million at a
              $2.5 billion valuation (2022) and its reported ARR trajectory suggest a substantive enterprise customer
              base, but no discrete customer count has been publicly confirmed. [CU022] [CU023] [CU024] [CU031]

              Sysdig's three core use case clusters—runtime threat detection and CNAPP (CSPM+CWPP+CDR), vulnerability
              management for containerized workloads, and compliance readiness for frameworks such as SOC 2, HITRUST,
              ISO 27001, and PCI DSS—align with the operational requirements of cloud-native engineering organizations
              that have moved or are moving core infrastructure to Kubernetes. The Falco-based runtime detection layer
              creates a technical differentiation that community-familiar buyers value, and multiple case studies cite
              Falco familiarity as an initial pull factor that led the customer to evaluate Sysdig as a commercial
              CNAPP. [CU008] [CU028]
