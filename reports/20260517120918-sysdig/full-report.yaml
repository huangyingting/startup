      - number: '7.6'
        title: People and Execution Risks
        blocks:
          - type: paragraph
            body: >-
              Sysdig appointed Bill Welch as CEO in May 2024, replacing Suresh Vasudevan who led the company through its
              Series G raise at a $2.5 billion valuation in 2022. Welch brings enterprise software experience from
              Zendesk and other SaaS companies but lacks a prior CEO track record at a security vendor of Sysdig's
              scale, creating strategic execution risk during a period of intensifying competitive pressure from Wiz and
              CrowdStrike. [CR021] [CR040] TechCrunch reported Sysdig conducted a round of layoffs in November 2024; the
              specific headcount impact was not confirmed at research date (see EG-R002). [CR022]


              Leadership transitions combined with workforce reductions create execution risk across three dimensions:
              customer success and renewal capacity (direct churn risk), sales pipeline management and new logo
              acquisition (ARR growth risk), and product engineering velocity (roadmap risk). [CR033] The competition
              for eBPF and cloud security engineering talent is intense, with Wiz, CrowdStrike, and hyperscalers all
              actively recruiting from the same narrow pool of kernel security and cloud detection engineers. [CR032]
              Founder concentration in Loris Degioanni (CTO and CNCF Falco creator) represents a key-person dependency
              for Falco's architectural direction and eBPF roadmap. Mitigation and kill criteria for these risks —
              including monitored triggers, action thresholds, and diligence paths — are consolidated in TR004 (People /
              Execution Risk Register) and TR005 (Mitigation and Kill Criteria Table).
