  evidenceGaps:
  - type: private-evidence-only
    severity: blocking
    topic: ARR
    missingEvidence: 'Sysdig''s annual recurring revenue figure for FY2023, FY2024, and FY2025 has not
      been publicly disclosed in any press release, investor communication, or regulatory filing. No third-party
      analyst has confirmed a specific ARR figure.

      '
    whyItMatters: 'ARR is the primary valuation anchor for SaaS companies. Without a verified ARR figure,
      the $2.5B Series G valuation cannot be assessed as 8x, 12x, or 21x ARR — a range that spans the
      difference between a fair price, an attractive price, and an expensive overpay.

      '
    diligencePath: 'Request audited financial statements for FY2022–FY2025; obtain CFO representation
      letter with ARR definition (bookings-based vs. recognized revenue); confirm whether ARR excludes
      professional services; request deferred revenue roll-forward schedule.

      '
    relatedQuestionRefs:
