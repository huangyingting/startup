- id: financial-gaps
  title: Financial Transparency Assessment and Diligence Gaps
  body: 'Sysdig''s financial opacity is extensive and reflects standard practice for late-stage private
    companies that have not filed for a public offering. The company has not disclosed ARR, revenue, gross
    margins, operating loss, net loss, cash position, burn rate, net revenue retention, customer count,
    or average contract value in any public filing or press release. No audited financial statements are
    available from SEC EDGAR, nor any Form S-1 or debt prospectus that would require financial disclosure.
    The company''s last material public financial event — the $350M Series G in May 2023 — disclosed only
    the round size and post-money valuation, without any revenue metrics.

    The absence of 36+ months of new primary funding represents the most material financial signal available
    from public sources. This gap is consistent with either (a) the company having achieved cash-flow
    sufficiency from Series G proceeds alone, or (b) the company delaying a new round due to unfavorable
    valuation conditions or investor appetite concerns. The ~10% workforce reduction in 2024 (reported
    by industry outlets but not officially confirmed by Sysdig) provides evidence in favor of interpretation
    (b) — active burn management suggesting extended runway needs — though it could also represent organizational
    restructuring ahead of an IPO process. No official press release confirming the layoffs has been located;
    the adverse claim is sourced from industry reporting.

    The appointment of Karen Walker as CFO in 2021 — with explicit IPO-readiness credentials from PagerDuty
    and early IPO preparation at Uber — combined with the hiring of CRO Gary Olson (who took Snyk to $300M
    ARR) suggests the company is building toward a public offering or large strategic transaction. However,
    no S-1 has been filed, and no confidential IPO filing (SEC Form DRS) has been identified in the public
    domain as of May 2026.

    Evidence gaps that are material to investment judgment include: (1) ARR and annual revenue growth
    rate — blocking, since valuation cannot be reliably assessed without a verified revenue base; (2)
    net revenue retention — blocking, since NRR above 120% vs. below 110% shifts enterprise value by 30%–50%
    in comparable DCF analysis; (3) gross margin by product line — material, since the blended margin
    determines path to profitability and SaaS quality; (4) burn rate and cash position — material, since
    runway determines capital risk and next-round pressure; (5) preference stack and cap table — material,
    since seven institutional rounds with likely 1x–1.5x liquidation preferences create significant common
    equity impairment in below-preference exit scenarios; (6) the unconfirmed 2024 workforce reduction
    percentage and scope.

    Diligence would require: audited financial statements (FY2022, FY2023, FY2024); management letter
    from CFO with ARR definition (bookings-based vs. GAAP-recognized), NRR methodology, and cohort retention
    data; deferred revenue roll-forward; cap table with fully diluted share count and liquidation preference
    waterfall; and employment records confirming headcount as of Q1 2026 to contextualize the 2024 reduction.

    '
