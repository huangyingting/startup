    - TI005
  - type: private-evidence-only
    severity: blocking
    topic: NRR
    missingEvidence: 'Net revenue retention rate (NRR) for Sysdig has not been disclosed in any public
      source. No investor presentation, earnings call transcript, or analyst report has cited a specific
      Sysdig NRR figure.

      '
    whyItMatters: 'NRR is the single most important SaaS quality metric. NRR above 120% implies organic
      ARR growth without new customer acquisition. NRR below 110% implies net contraction in the existing
      customer base, which undermines growth assumptions embedded in the $2.5B valuation. A 10 percentage-point
      NRR difference can shift implied company value by 30%–50% in a DCF-based model.

      '
    diligencePath: 'Request annual cohort revenue waterfall showing starting ARR, expansion, contraction,
      and churn by annual cohort year; define NRR methodology (logo-based, ARR-based, net vs. gross);
      compare to CrowdStrike (119%) and Wiz (reportedly 120%+) public benchmarks.

      '
    relatedQuestionRefs:
    - QI014
    relatedTableRefs:
