- id: unit-economics
  title: Unit Economics and Efficiency Estimates
  body: 'All unit economics metrics for Sysdig are private and unverified. The following analysis constructs
    estimated ranges using peer benchmarks, revenue proxies, and the structural characteristics of Sysdig''s
    per-host SaaS model. These estimates carry low-to-medium confidence and should not be treated as company
    representations.

    Annual recurring revenue is estimated in the $120M–$300M range. The lower bound reflects the minimum
    ARR consistent with the 2023 Series G valuation at 20x ARR (a stretched multiple for a private company
    in a post-2022 multiple-compression environment). The upper bound reflects the ARR level at which
    CRO Gary Olson''s prior experience at Snyk ($300M ARR milestone in his first year) would be most directly
    applicable — suggesting the board may have hired Olson to drive a similar scaling trajectory at Sysdig.
    A midpoint estimate of $200M ARR for full-year 2025 is used as the base case for this analysis, implying
    a 12.5x ARR multiple at the $2.5B Series G valuation. This base-case multiple is within the range
    of peer CNAPP multiples (Wiz at ~24x at $12B/$500M ARR; Lacework at ~5x at distressed exit).

    Net revenue retention (NRR) is undisclosed. Based on peer CNAPP benchmarks — Wiz reportedly above
    120%, CrowdStrike''s NRR publicly disclosed at 119–127% — an estimated NRR range of 105%–130% is plausible
    for Sysdig. The per-host model naturally expands as customers grow their cloud footprints (adding
    containers, nodes, and workloads), supporting expansion without additional sales effort. NRR below
    110% would indicate churn or contraction within the installed base that constrains organic growth.
    NRR above 120% would confirm strong land-and-expand dynamics consistent with the platform''s breadth.

    Gross margin is estimated at 65%–75% for the blended platform revenue. Sysdig Secure''s pure SaaS
    delivery model would support margins in the 70%–80% range at scale, while professional services revenue
    (estimated 10%–20% of total) would drag blended margins down. The per-host model has meaningful infrastructure
    cost implications as cloud-based telemetry collection, correlation, and storage scale proportionally
    with customer environments. Competitors with agentless-only models (Wiz) typically report higher gross
    margins (85%+) due to lower agent infrastructure costs, creating a structural margin gap that Sysdig
    must address through eBPF driver efficiency optimization and data processing cost management.

    Operating efficiency metrics (S&M spend as % of ARR, R&D as % of ARR) are not disclosed. At Sysdig''s
    estimated $200M ARR base case, applying industry median CNAPP benchmarks: S&M estimated at 40%–55%
    of ARR ($80M–$110M), reflecting the competitive enterprise cloud security sales environment; R&D at
    20%–28% ($40M–$56M), consistent with the open source R&D model where community contributions offset
    some commercial development cost; G&A at 8%–12% ($16M–$24M). These imply an estimated annual cash
    burn of $30M–$100M, consistent with the 24–48 month runway estimate from the Series G proceeds. The
    ~10% workforce reduction in 2024 likely reduced annualized operating expense by $8M–$20M, suggesting
    management has been actively managing burn.

    The Falco open source community provides a structural sales efficiency advantage: with 8,600+ GitHub
    stars, 175M+ container image pulls, and 1,600+ contributors, Falco creates developer-influenced procurement
    that reduces cold-call CAC. Security practitioners who already know and trust Falco represent a pre-qualified
    buyer segment for Sysdig Secure. This dynamic is analogous to HashiCorp''s Terraform-to-enterprise
    funnel, and quantifies as an estimated 15%–25% lower CAC for Falco-adjacent accounts vs. non-Falco-aware
    prospects.

    '
