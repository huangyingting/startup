        - 经审计 ARR 和月度 burn rate；FY2025 的 409A 估值
      - - 退出时点
        - 若 ARR >=300M，IPO 路径可行；PANW、CrowdStrike、Cisco 可能有战略买方兴趣
        - Wiz IPO 可能重置 CNAPP 倍数；Lacework 困境 M&A 先例值得警惕
        - Wiz IPO 定价及上市后交易倍数；Sysdig 任一二级市场交易
      - - 开源护城河
        - Falco 从 CNCF 毕业 + 175M+ 拉取量，带来社区信任和漏斗顶部转化
        - Falco 社区不保证商业转化；CNCF 治理限制 Sysdig 控制力
        - 披露 Falco 到 Sysdig 的商业转化率；Falco Feeds 的 ARR 贡献
    notes: 正向与反向逻辑来自公开市场数据、分析师报告和竞争情报。所有财务反向项都需要 CFO 级数据才能解决。
  - id: TV003
    title: Sysdig 牛 / 基准 / 熊情景分析
    claimRefs:
      - CV018
      - CV019
      - CV020
      - CV021
    columns:
      - 情景
      - 核心假设
      - 2028 年 ARR
      - 估值 / 退出逻辑
      - 关键风险
      - 概率信号
    rows:
      - - 牛
        - ARR 从约 $200M 基数按 40% CAGR 增长；NRR >125%；达到 FedRAMP High；以 12-15x ARR IPO 或 Series H
        - $400M+
        - $4.8B-$6.0B（12-15x ARR）；CNAPP 整合中的运行时优先赢家
        - Wiz 规模优势；PANW 平台捆绑导致价格承压
        - 20%
      - - 基准
        - 25% CAGR；NRR 115-120%；2026 年接近盈亏平衡；2027 年以 10-12x ARR 完成 Series H 或 IPO
        - $300M+
        - $3.0B-$3.6B（10-12x ARR）；较当前 $2.5B 标记有公允回报
        - 竞争逆风；新 CEO 规模化执行风险
        - 55%
      - - 熊
        - 增长放缓至 10% CAGR；NRR 跌破 110%；按账面价值战略出售
        - $150M-$200M
        - $1.5B-$2.5B（困境 M&A 或清算优先权回收情景）
        - Lacework 式困境退出；优先权堆叠侵蚀普通股价值
        - 25%
      - - 概率加权 EV
        - 加权估值：$4.8B x 20% + $3.3B x 55% + $2.0B x 25%
        - ~$250M（混合估算）
        - $2.9B-$3.5B 概率加权企业价值
        - 所有情景都取决于未核验的 ARR 基线假设
        - 100%
    notes: 所有 ARR 数字均为分析师估算。概率信号是定性评估，不是精算概率。退出倍数来自公开 CNAPP 可比公司集合。
  - id: TV004
    title: 可比估值表
    claimRefs:
      - CV009
      - CV010
      - CV011
      - CV012
      - CV013
      - CV014
      - CV015
      - CV030
      - CV039
    enumerationScope:
      coverage: partial
      basis: >-
        Public and private CNAPP / cloud security companies with disclosed valuations as of May 2026. Excludes adjacent
        vendors (SIEMs, EDR-only) without meaningful CNAPP overlap. Private valuations are last disclosed round prices,
        not current marks.
    columns:
      - 可比公司
      - 类型
      - 最新估值 / 市值
      - 估算 ARR
      - 隐含 ARR 倍数
      - 与 Sysdig 的相关性
      - 关键限制
    rows:
      - - CrowdStrike (CRWD)
        - NASDAQ 上市公司
        - ~$151B（2026 年 5 月市值）
        - ~$4.2B-$4.5B（FY2025）
        - 33x-36x ARR
        - 平台型 CNAPP；质量最高的公开 CNAPP 可比标的；NRR 119%
        - Sysdig 是单一平台且未 IPO；规模差 10x；上市公司溢价不能直接套用
      - - Palo Alto Networks (PANW)
        - NASDAQ 上市公司
        - ~$197B（2026 年 5 月市值）
        - ~$9B+（Prisma Cloud 在平台内约 $1B+）
        - 21x-22x 总平台 ARR
        - 通过 Prisma Cloud 做 CNAPP；最大网络安全平台；Sysdig 竞争对手
        - 平台 ARR 未拆分；集团型溢价降低与 CNAPP 的直接可比性
      - - Wiz
        - 非上市（预计 2025-2026 年 IPO）
        - $12B（Series E 轮，2024 年 5 月）
        - ~$500M+（估算；未披露）
        - ~24x ARR（估算）
        - 最接近的非上市 CNAPP 可比标的；无代理优先；企业买家画像相近
        - ARR 未核验；$12B 估值反映 IPO 溢价预期；技术路径不同
      - - Lacework (acquired)
        - 被 Fortinet 收购（2024）
        - ~$150M-$200M（困境收购估算；未披露）
        - ~$50M-$80M，收购时（估算）
        - ~2x-4x ARR（困境）
        - 直接 CNAPP 同业；曾以 $8B 峰值估值融资 $1.9B；困境退出的警示先例
        - 困境收购意味着执行失败，而非市场结构问题；存在选择偏差
      - - Aqua Security
        - 非上市（Series E 轮）
        - ~$1B（2021 年轮次；标记可能陈旧）
        - ~$75M-$100M（估算；未披露）
        - ~10x ARR（按 2021 年标记估算）
        - 容器安全 / CNAPP 竞争对手；云原生重心相近
        - 2021 年标记陈旧；规模小于 Sysdig；近期融资信号有限
      - - Snyk
        - 非上市（估值下调轮后）
        - ~$7.4B（从 $8.7B 峰值下调后）
        - ~$250M+（估算；未披露）
        - ~30x ARR（偏高；估值下调轮后已压缩）
        - DevSecOps / 安全左移竞争对手；估值下调轮信号与 CNAPP 估值风险相关
        - 产品重心不同（开发者优先）；估值下调轮反映规模化后的增长放缓
    notes: >-
      所有非上市估值都是最后披露轮次标记，不是当前公允市场价值。上市公司倍数为市值对估算预期 ARR， 来源包括 SEC 文件和公开业绩。非上市 ARR 估算来自分析师推断；均未获相应公司确认。困境收购价格为
      广泛报道的估算，未在监管文件中确认。
  - id: TV005
    title: Sysdig 投资逻辑破裂与止损触发器
    claimRefs:
      - CV041
      - CV042
      - CV043
    columns:
      - 触发器
      - 阈值 / 可观察信号
      - 对投资逻辑的传导
      - 监控动作 / 含义
    rows:
      - - ARR 低于尽调底线
        - FY2025 审计财务中已核验 ARR <$150M
        - 按 $2.5B 估值隐含 17x+ ARR；立场转为偏贵；下调至跟踪
        - 将 ARR 审计作为任何投资交割前提
      - - NRR 低于收缩线
        - FY2024 或 FY2025 任一年度客户 cohort 已核验 NRR <105%
        - 客户 cohort 净收缩意味着客户满意度危机；投资逻辑坍塌
        - 向 CFO 索取年度客户 cohort 瀑布图；对标 CrowdStrike 119%
      - - Wiz IPO 定价低于 $8B
        - Wiz IPO 估值 <$8B（对比 $12B 非上市标记）
        - 板块倍数压缩事件；非上市 CNAPP 标记下调 20-40%
        - 跟踪 Wiz S-1 文件与 IPO 定价；调整非上市可比倍数假设
      - - CEO 或 CFO 在 24 个月内离职
        - Bill Welch 或 Karen Walker 在 2026 年 5 月前离开 Sysdig
        - 规模化和 IPO 准备背书消失；释放董事会不稳定信号
        - 跟踪 LinkedIn 和新闻稿；要求管理层留任方案细节
      - - FedRAMP 授权暂停或降级
        - GSA 暂停或撤销 Sysdig FedRAMP Moderate ATO
        - 关闭 $200M+ 联邦 CNAPP TAM；政府渠道 ARR 出现实质风险
        - 监控 FedRAMP marketplace 上架状态；跟踪任何联邦事件报告
    notes: 触发器定义为可观察的二元事件，并绑定可衡量阈值。所有触发器都可纳入标准尽调和投后监控框架。
  - id: TV006
    title: Sysdig 最终尽调清单
    claimRefs:
      - CV043
      - CV044
      - CV045
    columns:
      - 主题
      - 缺失证据
      - 重要性
      - 负责人 / 尽调路径
    rows:
      - - ARR 与收入确认
        - FY2023、FY2024、FY2025 经审计 ARR；签约额与已确认收入对比；递延收入
        - 首要估值锚；没有 ARR，8x-21x 倍数区间无法收敛
        - CFO Karen Walker；将审计财务作为交割前提索取
      - - 净收入留存
        - 按年度客户 cohort（2022-2025）拆分的 NRR；总留存与净留存拆分
        - NRR 是最重要的 SaaS 质量指标；10 个点差异对应 30-50% EV 影响
        - CFO；索取包含起始 ARR、扩张、收缩、流失的 cohort 瀑布图
      - - 现金头寸与 burn rate
        - 截至 2025 年 12 月的现金余额；月度净现金消耗率；到下一事件的资金跑道预测
        - 36 个月未融资会引出融资紧迫性问题；现金消耗决定时点风险
        - CFO；索取银行对账单和董事会批准的 2027 年前现金消耗模型
      - - 股权结构表与优先权堆叠
        - 按股份类别拆分的完整股权结构表；清算优先权、反稀释、pay-to-play 条款
        - 若退出低于 $2.5B，优先权包袱决定普通股价值
        - 总法律顾问；索取经认证股权结构表和 Series G/F 投资条款书
      - - 二级市场定价
        - 2023 年 5 月以来任何要约回购、员工流动性安排或二级交易；409A 估值
        - Sysdig 股权最新标记；判断 $2.5B 是否仍能站住
        - CFO；索取 FY2024 和 FY2025 的 409A 报告；在 Hiive/Forge 核查二级市场活动
      - - FedRAMP 边界与范围
        - 授权系统边界定义；哪些产品和模块纳入 FedRAMP
        - FedRAMP 帮 Sysdig 在联邦采购中差异化；范围不清会限制 TAM 清晰度
        - CTO / 安全团队；索取 Authorization to Operate 信函和系统安全计划摘要
    notes: 尽调清单按估值敏感度排序。第 1-3 项会阻断投资执行；第 4-6 项重要，但可在签署 term sheet 后处理。
