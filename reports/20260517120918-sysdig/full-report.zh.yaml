      - number: '7.2'
        title: 监管与法律风险
        blocks:
          - type: paragraph
            body: >-
              Sysdig 面对多司法辖区监管义务，这些义务会带来披露责任、市场准入要求和合同合规成本。SEC 修订后的 Form 8-K Item 1.05 自 December 15, 2023
              生效，要求上市公司在认定网络安全事件具有重大性后的四个工作日内披露。Sysdig 目前仍是私营公司，但其企业客户基础包含受该规则约束的上市公司；如果客户事件涉及 Sysdig 代理漏洞，即使 Sysdig 尚未
              IPO，也可能承受声誉和法律责任。[CR001] [CR038]


              EU NIS2 Directive 把欧盟网络安全事件报告制度扩展到 18 个关键行业，并要求成员国在 October 17, 2024 前完成国内转置。NIS2 显著扩大了 Sysdig
              欧盟企业客户的报告义务，也给 Sysdig 的云检测工具带来赋能机会和合规门槛风险。[CR003] [CR004] GDPR Article 33 还要求数据泄露后 72 小时内通知监管机构，Sysdig
              作为欧盟客户的数据处理者，因此承担事件响应要求。[CR002] [CR037]


              FedRAMP 授权决定 Sysdig 能否进入美国联邦市场；研究日期时，Sysdig 关于 FedRAMP 授权的官方新闻页面返回 HTTP 404，使公开来源无法验证授权范围。[CR005] [CR006]
              按严重度排序的完整监管和法律风险登记表见 TR001；FedRAMP 尽调路径见证据缺口 EG-R003。
