  - number: 3
    title: 竞争格局
    sections:
      - number: '3.1'
        title: 竞争格局概览
        blocks:
          - type: paragraph
            body: >
              截至 May 2026，CNAPP 竞争格局分为四层：无代理优先的独角兽（Wiz、Orca Security）；利用相邻平台的上市既有厂商（Palo Alto Networks Prisma/Cortex
              Cloud、CrowdStrike Falcon Cloud Security）；有开源血统的专业厂商（Sysdig、Aqua Security）；以及从开发者优先 AppSec
              扩展到云的进入者（Snyk）。Fortinet 在 June 2024 收购 Lacework，创造了第五类：网络安全既有厂商借 M&A 进入 CNAPP，如今将产品命名为 FortiCNAPP。


              Wiz 是增长最快的纯 CNAPP 厂商，也是 Sysdig 最常被提及的直接竞争对手。Wiz 由前 Microsoft Azure 团队成员于 2020 年创立，已渗透超过 50% Fortune
              100，并保护 5 million+ 云工作负载，每天扫描 230 billion 个文件。Wiz 在 May 2024 以 $12 billion 估值完成约 $1 billion Series E
              融资，随后拒绝了 Google/Alphabet 据报道 $23 billion 的收购报价。Wiz
              平台建立在专有安全图谱之上，无需内核代理即可连接代码、云和运行时上下文；对优先考虑快速产生价值的组织，这是部署简便性优势。


              Palo Alto Networks（PANW）是企业安全平台既有厂商，市值约 $100 billion，全球客户超过 70,000，覆盖 10 家 Fortune 10 公司中的 9 家。其 Cortex
              Cloud 平台（由 Prisma Cloud 更名而来）每 24 小时分析 1 trillion 个事件，并用 Precision AI 每天检测 1.5 million 次新攻击。PANW 的平台化策略把
              CNAPP 与终端（Cortex XDR）、SASE（Prisma SASE）和网络安全打包，形成采购惯性和交叉销售杠杆，这是纯玩家竞争对手无法复制的。SEC EDGAR 确认 PANW 是提交年度 10-K
              报告的大型上市公司。


              CrowdStrike（CRWD）把 AI 原生终端安全基因带入云端，产品是 Falcon Cloud Security。截至 2026 年，CrowdStrike 追踪 281+
              全球攻击者，并报告云检测与响应时间加快 89%。值得注意的是，CrowdStrike 在 July 2024 经历了一次重大声誉反向事件：一次错误的 Falcon 传感器内容更新导致 Windows
              系统大范围宕机，影响企业对基于代理的安全厂商的信任；Sysdig 的 eBPF 路径（较低内核足迹）可能因此受益。


              Aqua Security（成立于 2015 年，累计融资约 $259M）保留容器安全血统，并靠开源项目形成差异化：Trivy（容器漏洞扫描器）和 Tracee（eBPF 运行时安全）。Orca
              Security（成立于 2019 年，累计融资约 $630 million，估值 $1.8 billion）开创 SideScanning 无代理路径，之后加入基于 eBPF 的 Orca
              Sensor，用于实时检测。Snyk 面向开发者优先的应用安全，覆盖代码、开源依赖、容器和 IaC；它与 Sysdig 在 CI/CD 流水线安全上重叠，但没有 Sysdig 的运行时检测深度。


              Gartner 研究发现，60% 企业正在把 CWPP 和 CSPM 整合到单一供应商，高于前一年的 25%；这一趋势利好综合平台，也加快了小众专业厂商承压。预计到 2026 年，随着上市公司收购方把 CNAPP
              能力整合进打包安全平台，市场整合会进一步加剧。
