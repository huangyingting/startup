      - number: '4.4'
        title: 财务透明度评估与尽调缺口
        blocks:
          - type: paragraph
            body: >
              Sysdig 的财务不透明程度很高，这符合尚未申报上市的后期私营公司的常见做法。公司没有在任何公开文件或新闻稿中披露
              ARR、收入、毛利率、经营亏损、净亏损、现金余额、烧钱速度、净留存率、客户数或平均合同价值。SEC EDGAR 上没有可用的经审计财务报表，也没有需要披露财务数据的 Form S-1
              或债务招股书。公司最近一次重大的公开财务事件，是 May 2023 的 $350M Series G；该轮只披露了融资规模和投后估值，没有任何收入指标。

              超过 36 个月没有新的新股融资，是公开来源里最重要的财务信号。这个间隔既可能说明：（a）公司只靠 Series G
              资金就已经实现现金流自给；也可能说明（b）由于估值环境不利或投资人兴趣不足，公司推迟了新一轮融资。2024 年约 ~10% 的裁员（行业媒体报道，但 Sysdig
              未正式确认）更支持解释（b）：管理层主动控烧钱，说明需要拉长现金跑道；不过，它也可能是 IPO 进程前的组织重组。未找到确认裁员的官方新闻稿；这条反向说法来自行业报道。

              Karen Walker 在 2021 年出任 CFO，履历里有 PagerDuty 的明确 IPO 准备经验，也参与过 Uber 的早期 IPO 准备；再加上 CRO Gary Olson 的任命（他曾把
              Snyk 带到 $300M ARR），说明公司可能在为公开上市或大型战略交易搭建能力。不过，截至 May 2026，尚未提交 S-1，也没有在公开域中识别到保密 IPO 申报（SEC Form DRS）。

              对投资判断重要的证据缺口包括：（1）ARR 和年度收入增速——阻断项，因为没有经验证的收入底座，就无法可靠评估估值；（2）净留存率——阻断项，因为 NRR 高于 120% 与低于 110%，会在可比 DCF
              分析中把企业价值拉开 30%–50%；（3）按产品线拆分的毛利率——重要项，因为混合毛利决定盈利路径和 SaaS
              质量；（4）烧钱速度和现金余额——重要项，因为现金跑道决定资本风险和下一轮融资压力；（5）优先股堆叠和股权结构表——重要项，因为七轮机构融资很可能带有 1x–1.5x
              清算优先权，一旦退出价低于优先权门槛，普通股会被显著稀释或受损；（6）2024 年裁员比例和范围仍未确认。

              尽调需要取得：经审计财务报表（FY2022、FY2023、FY2024）；CFO 管理层说明函，包含 ARR 定义（按 bookings 还是按 GAAP 确认）、NRR
              方法和队列留存数据；递延收入滚动表；包含完全稀释股数和清算优先权瀑布的股权结构表；以及截至 Q1 2026 的员工记录，用来解释 2024 年裁员背景。
