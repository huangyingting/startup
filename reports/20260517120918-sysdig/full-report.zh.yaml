      - number: '7.4'
        title: 运营与技术风险
        blocks:
          - type: paragraph
            body: >-
              Sysdig 基于 eBPF 的打点能力，依赖客户环境完整发行版矩阵中的 Linux 内核兼容性。eBPF 验证器能保证程序不会让内核崩溃，但无法阻止高级对手在特权用户空间边界规避检测。[CR007]
              [CR008] 在托管 Kubernetes 环境中，内核版本由云厂商而非客户控制；内核升级会带来代理兼容性风险，在 Sysdig 发布兼容代理构建前，可能造成检测缺口或漏检。eBPF
              CO-RE（compile-once, run-everywhere）模型降低了跨内核兼容脆弱性，但没有完全消除。[CR023] [CR024]


              eBPF 运行时打点已经在超大规模生产环境中被验证：Google、Netflix、Meta、Cloudflare 都大规模使用 eBPF 做安全和可观测性。[CR025] 但 Sysdig
              的检测层是在内核边界捕获 Linux 系统调用，有特权的对手可以通过命名空间隔离、内核漏洞利用或 eBPF 程序指纹识别技术加以规避。[CR042] 研究日期时，没有公开可用的第三方对抗测试报告覆盖 Sysdig
              检测栈。eBPF 代理在高密度容器主机上的 CPU 和内存开销，是已知采购异议；研究日期未找到具体公开基准（见 EG-R001）。共享的 Falco 和 sysdig-libs OSS 基础若暴露
              CVE，会对所有 Sysdig 客户形成系统性供应链风险。[CR026]
