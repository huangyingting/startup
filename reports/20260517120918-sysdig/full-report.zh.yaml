  - id: FE001
    title: Sysdig 平台架构栈
    type: stack
    notes: |
      从底部的数据采集到顶部面向用户的产品，分层展示 Sysdig 平台。每一层代表一个有文档支持的功能层级。
    data:
      layers:
        - label: 基础设施与云环境
          detail: |
            Linux 主机和 Kubernetes 节点上以 DaemonSet 部署 eBPF 代理；云控制平面（AWS、Azure、GCP）则通过只读 IAM 角色无代理访问。运行时代理尚不支持 Windows 工作负载。
        - label: 数据采集：运行时与云
          detail: >
            Falco eBPF 探针通过 BPF CO-RE 在内核层捕获 Linux 系统调用。云连接器摄取 CloudTrail、Azure Monitor 和 GCP Cloud Audit
            Logs。无代理扫描器在不安装主机代理的情况下评估云资源配置和容器镜像注册表。
        - label: 检测与分析引擎
          detail: |
            Falco 规则引擎用托管检测规则库评估系统调用流。运行时洞察图谱把运行时事件、云配置漂移和漏洞扫描结果关联起来，形成统一且按风险优先级排序的问题集，并带有 Prometheus 兼容指标。
        - label: 平台服务与集成
          detail: >
            SaaS 后端提供策略管理，按 CIS Benchmarks、PCI DSS、SOC 2、NIST CSF 做合规映射，并提供 700 多个连接器的集成库，可接入 Splunk、IBM QRadar 等
            SIEM，PagerDuty、ServiceNow 等 SOAR，以及开发者工具。
        - label: 面向用户的产品
          detail: >
            Sysdig Secure 覆盖 CSPM、CWPP、CDR 和 CIEM；Sysdig Monitor 提供可观测性和 Prometheus 仪表盘；Sysdig Sage 是 AI
            安全助手。三个模块共享统一运行时洞察图谱，并通过同一个 SaaS 控制台提供。
    sourceRefs:
      - SE001
      - SE002
      - SE003
      - SE004
      - SE005
    claimRefs:
      - CE001
      - CE002
      - CE008
  - id: FE002
