      - number: '2.3'
        title: 买方画像与预算归属
        blocks:
          - type: paragraph
            body: >
              CNAPP 买方包括企业 CISO、云安全架构师、DevSecOps 平台负责人，以及负责保护 Kubernetes 和容器化工作负载的站点可靠性工程（SRE）团队。传统 IT 安全采购往往只由 CISO
              组织控制； CNAPP 采购则通常需要 IT / 安全 / 工程联合委员会参与，因为工具必须接入 CI/CD 流水线、Kubernetes 集群和开发者工作流。工程团队看重非侵入式部署（Sysdig 借助
              Falco 的被动 eBPF 检测）、低性能开销和对开发者友好的策略即代码接口。安全团队优先考虑全面威胁覆盖、合规映射（SOC 2、PCI-DSS、NIST、GDPR）和事件响应工作流。


              预算归属随组织成熟度而变。云原生创业公司和数字优先企业中，平台工程或 DevOps 团队常把 CNAPP 支出纳入基础设施工具预算。在推进云迁移的传统企业里，CISO 主导的安全预算会把 CNAPP 与
              EDR、SIEM、网络安全一起覆盖。受监管行业（BFSI、医疗、政府）中，合规负责人会影响 CNAPP 选择和与审计要求绑定的预算分配。


              买方旅程通常从安全缺口触发：审计发现未通过、云配置错误事件、勒索软件瞄准 Kubernetes，或监管要求（FedRAMP、CMMC、NIS2）。企业评估周期为 3–9
              个月，包含在代表性工作负载上部署概念验证（POC）。 Sysdig 竞争点包括运行时检测深度（Falco 的内核级可见性）、开源生态一致性，以及 Prometheus/Kubernetes
              原生集成。定价通常按工作负载或主机计算，企业协议包含部署和规则定制的专业服务。


              核心买方画像包括：（1）管理多云资产、需要统一态势可见性的 Fortune 500 CISO 组织；（2）需要审计就绪合规报告的金融服务和医疗企业；（3）要求 FedRAMP Moderate
              授权的联邦与国防机构（Sysdig 截至 October 2025 已获得 FedRAMP 授权）；（4）拥有大型 Kubernetes 足迹、寻求开发者友好安全能力的技术公司。渠道合作伙伴——
              托管安全服务提供商（MSSP）和云咨询公司——正在成为中端市场部署中增长的买方细分。
