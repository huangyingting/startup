    notes: 买方画像基于行业结构、Gartner 整合趋势、CNCF 调研数据和 Sysdig 定位（FedRAMP、Falco 开源生态）综合而来。预算归属碎片化，取决于组织成熟度，在安全、工程和平台团队之间分散。
