      - number: '6.2'
        title: 具名客户验证与案例研究
        blocks:
          - type: paragraph
            body: >
              在 CNAPP 厂商中，Sysdig 拥有公开记录最深的客户验证组合之一。截至 May 2026
              研究日期，公司网站托管了十多个具名案例研究，覆盖技术、金融服务、医疗健康、政府和娱乐。本章审阅的八个案例都描述了完整生产部署，而不是试点；结果具体、量化，并归因于 CISO 级高管和安全工程师。

              Neo4j 是服务 NASA 和美国大型银行的图数据库公司，它部署了 Sysdig 的完整 CNAPP 平台（CSPM、CWPP、CDR），在最初六个月里让报告漏洞减少 80%、告警噪声减少 75%，并把超过
              160,000 个漏洞降到基准水平。[CU001] [CU002] [CU003] 身份和 MDM 平台 JumpCloud 把容器漏洞减少 80%、每日告警量减少
              99.8%，把原本需要数小时手工调查的流程压缩到 30 秒分诊。[CU006] [CU007] [CU008] 电商平台 BigCommerce 借助 Sysdig 运行时洞察过滤 80%
              以上告警噪声，目标是在漏洞管理上节省 95% 时间。[CU004] [CU005]

              Bloomreach 在 2022 年被认定为北美增长最快的私营公司之一；它先用 Sysdig Monitor 做 Kubernetes 可观测性，获得 350% ROI，并将基础设施监控成本降低超过
              40%，随后扩展到 Sysdig Secure，增加 CNAPP 能力。[CU009] [CU010] [CU011] 这条从 Monitor 到 Secure 的扩张，是 Sysdig
              具名客户基础中最强的先落地再扩张证据。印度头部加密交易所 CoinDCX 在 late 2024 部署 CSPM 和 CDR 模块后，把修复周期从三个月压到一周（提升 12×），并将云错误配置减少
              60–70%。[CU014] [CU015]

              UIDAI 是印度政府机构，负责全球最大的生物识别身份系统 Aadhaar，覆盖 1 billion+ 居民；其私有云现代化中的容器安全项目通过公开招标选择了 Sysdig。Sysdig
              的驻场工程师模式（一名现场工程师与 UIDAI 团队协作）被认为是关键。[CU016] [CU017] 正在接受 HITRUST 审计的医疗健康公司 Apree Health，在不到两个月内部署
              Sysdig，每月在合规工作流上节省 10+ 小时。[CU018] [CU019] Sysdig 客户页面上的其他具名客户还包括 BitMEX（30 秒分诊、调查时间减半）、Mambu（误报减少
              95%）、Square Enix（实时运行时可见性）、Minna Bank Japan 和 Immuta。[CU020] [CU037] [CU038]
