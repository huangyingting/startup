    type: dag
    insight: >-
      Sysdig 的商业检测面建立在四层依赖栈上。Linux 内核 eBPF 底座和 CNCF Falco 治理是风险最高的两项依赖——都不在 Sysdig 单方控制之内。云服务商审计 API 和 Kubernetes
      运行时在运营上可管理，但需要持续工程维护，跟进超大规模云厂商的模式演进。
    claimRefs:
      - CR009
      - CR011
      - CR019
      - CR020
      - CR034
      - CR035
    sourceRefs:
      - SR005
      - SR006
      - SR007
      - SR021
      - SR022
      - SR026
    data:
      nodes:
        - id: d1
          label: Linux 内核 eBPF 底座
          type: infrastructure
        - id: d2
          label: CNCF Falco 治理
          type: governance
        - id: d3
          label: 云服务商审计 API（AWS / Azure / GCP）
          type: cloud
        - id: d4
          label: Kubernetes 容器运行时（CRI-O / containerd）
          type: runtime
        - id: d5
          label: Sysdig 商业平台（CDR / CSPM / CWPP）
          type: product
        - id: d6
          label: 企业客户安全结果
          type: outcome
      edges:
        - from: d1
          to: d5
          label: 用于捕获系统调用的 eBPF 埋点层
        - from: d2
          to: d5
          label: Falco 检测规则、开源引擎与规则语法
        - from: d3
          to: d5
          label: 用于云检测与响应的云审计事件
        - from: d4
          to: d5
          label: 用于工作负载级检测的容器运行时事件
        - from: d5
          to: d6
          label: 交付给企业客户的安全结果
        - from: d2
          to: d6
          label: 开源 Falco 可作为免费检测替代方案
  - id: FV001
    title: Sysdig 投资建议决策逻辑
    type: flow
    summary: 从证据输入经核验关口到投资建议结果的决策树。
    claimRefs:
      - CV001
      - CV007
      - CV008
      - CV018
      - CV019
      - CV020
    data:
      nodes:
        - id: start
          label: Sysdig：启动估值评估
          detail: 起点——当前最后一轮估值 $2.5B（2023 年 5 月 Series G）
        - id: market-check
          label: CNAPP 市场领导者？
          detail: Gartner MQ Leader 2024；Forrester Leader；FedRAMP Moderate——已核验为是
        - id: moat-check
          label: 可防守的技术护城河？
          detail: eBPF + CNCF 毕业的 Falco + 6 年运行时领先——是（但需注意 Wiz 正在追赶）
        - id: arr-check
          label: ARR 已核验 >=200M？
          detail: 截至 2026 年 5 月未核验；分析师估计 $120M-$300M——未知
        - id: nrr-check
          label: NRR 已核验 >=120%？
          detail: 未披露；CrowdStrike 基准为 119%——未知
        - id: runway-check
          label: 现金跑道 >=24 个月？
          detail: 未知；2024 年裁员暗示在控制烧钱——未知
        - id: cond-buy
          label: $2.5B 时有条件买入
          detail: 产品和市场证据强；财务未核验；在 ARR/NRR 尽调条件下推进
        - id: track
          label: 观察——继续跟踪
          detail: 产品强，但若没有数据，财务或竞争位置不足以支撑以 $2.5B 投资
        - id: buy
          label: 买入（核验后）
          detail: 所有关口通过；若审计后 ARR >=200M 且 NRR >=120%，以 $2.8B 或更低估值投资
      edges:
        - from: start
          to: market-check
          label: 开始分析
        - from: market-check
          to: moat-check
          label: 是——继续
        - from: market-check
          to: track
          label: 否——观察
        - from: moat-check
          to: arr-check
          label: 是——核验财务
        - from: moat-check
          to: track
          label: 否——观察
        - from: arr-check
          to: nrr-check
          label: '>=200M 已核验'
        - from: arr-check
          to: cond-buy
          label: 未知——有条件
        - from: nrr-check
          to: runway-check
          label: '>=120% 已核验'
        - from: nrr-check
          to: cond-buy
          label: 未知——有条件
        - from: runway-check
          to: buy
          label: '>=24 个月——买入'
        - from: runway-check
          to: cond-buy
          label: 未知——有条件
  - id: FV002
    title: Sysdig 估值敏感性——ARR 倍数网格
    type: bar
    summary: 在不同 ARR 估计和倍数假设下的隐含企业价值；当前 $2.5B 作为参照标记。
    claimRefs:
      - CV007
      - CV008
      - CV022
      - CV030
    data:
      items:
        - label: $125M ARR x 8x（悲观低位）
          value: 1000
          unit: $M
        - label: $150M ARR x 8x（悲观基准）
          value: 1200
          unit: $M
        - label: $200M ARR x 10x（基准低位）
          value: 2000
          unit: $M
        - label: $250M ARR x 10x（基准中位）
          value: 2500
          unit: $M
        - label: $300M ARR x 12x（基准高位）
          value: 3600
          unit: $M
        - label: $400M ARR x 12x（乐观基准）
          value: 4800
          unit: $M
        - label: $400M ARR x 15x（乐观高位）
          value: 6000
          unit: $M
    notes: 所有 ARR 数值均为分析师估计；Sysdig 未披露 ARR。当前 $2.5B Series G 估值标记大约落在 $200-250M ARR x 10x 倍数。数值单位为百万美元。
  - id: FV003
    title: Sysdig 估值 / 回报区间（按情景）
    type: range
    summary: 乐观 / 基准 / 悲观企业价值区间，以及概率加权预期价值。
    claimRefs:
      - CV018
      - CV019
      - CV020
      - CV021
    data:
      items:
        - label: 悲观情景企业价值
          low: 1500
          mid: 2000
          high: 2500
          unit: $M
        - label: 基准情景企业价值
          low: 2500
          mid: 3300
          high: 3600
          unit: $M
        - label: 乐观情景企业价值
          low: 4800
          mid: 5400
          high: 6000
          unit: $M
        - label: 概率加权 EV
          low: 2700
          mid: 3200
          high: 3700
          unit: $M
    notes: 悲观 25% / 基准 55% / 乐观 20% 的概率权重是定性评估。区间反映 ARR 和倍数的不确定性。概率加权 EV 约 $3.2B，支持 $2.5B 上轮标记处于合理到略有折价。所有数值单位为百万美元。
  - id: FV004
    title: Sysdig 投资 KPI——投委会就绪评分
    type: kpi
    summary: 投资委员会评审潜在 Sysdig 仓位时使用的关键决策指标。
    claimRefs:
      - CV001
      - CV024
      - CV025
      - CV026
      - CV027
      - CV029
      - CV036
    data:
      items:
        - label: 最近披露估值
          value: $2.5B (May 2023)
          tone: neutral
          note: 已过时 36 个月；Series G 后没有新一轮新股融资；在 $200-300M ARR 下估值合理
        - label: 估计 ARR 区间
          value: $120M-$300M
          tone: neutral
          note: 仅为分析师估计；未核验；$2.5B 对应 8x-21x 隐含倍数
        - label: 投资建议
          value: CONDITIONAL-BUY
          tone: positive
          note: 取决于 ARR >=200M + NRR >=120%；无法核验则降级为观察
        - label: 置信度
          value: MEDIUM
          tone: neutral
          note: 产品和市场证据强；公开财务披露为零是主要限制
        - label: 风险评级
          value: MEDIUM
          tone: warning
          note: CNAPP 竞争风险（Wiz 规模、PANW 捆绑）；Lacework 困境退出先例
        - label: 分析师认可
          value: Gartner MQ Leader 2024
          tone: positive
          note: 另有 Forrester Wave Leader 和 Gartner Customers' Choice；市场位置获得独立验证
        - label: 开源护城河
          value: 'Falco: 175M+ pulls, CNCF Graduated'
          tone: positive
          note: 行业标准运行时安全引擎；社区驱动获客漏斗顶端；eBPF 领先 6 年
        - label: FedRAMP 授权
          value: Moderate -- Active
          tone: positive
          note: 美国联邦文职机构采购关口；相对 Wiz（另行推进）形成差异化
        - label: 领导层质量
          value: CEO Welch (Druva $1B+ ARR); CFO Walker (IPO-ready)
          tone: positive
          note: 职业经理人团队显示董事会支持的 IPO 或结构化退出诉求
        - label: 证据质量
          value: MEDIUM -- Missing Financials
          tone: warning
          note: 市场 / 产品证据强；ARR、NRR、烧钱速度、股权结构表均为私有且未核验
    notes: KPI 数值来自 Sysdig 公开公告、分析师报告和可比公司分析。财务 KPI（ARR、NRR）是分析师估计，需要尽调核验。
