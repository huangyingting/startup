      - number: '7.5'
        title: 合作伙伴与依赖风险
        blocks:
          - type: paragraph
            body: >-
              Sysdig 的技术护城河部分锚定在 Falco 上；Sysdig 在 2018 年把 Falco 捐给 Cloud Native Computing Foundation。Falco 在 February
              29, 2024 毕业为 CNCF 项目，通过 CNCF Technical Oversight Committee 获得厂商中立治理，也阻止 Sysdig 单方面控制项目方向或路线图。[CR009]
              [CR010] [CR011] [CR034] 这种治理结构允许任何厂商基于 Falco 的规则语法和 eBPF 集成模型构建商业检测产品。Aqua Security 的 Tracee 和 Cilium 的
              Tetragon 都是基于 eBPF 的运行时检测工具；它们利用与 Falco 检测方法相邻或源自该方法的开源基础，直接竞争 Sysdig 的运行时检测模块。[CR017] [CR018] [CR035]


              云厂商审计 API 依赖——包括 AWS CloudTrail schema 演进、Azure Activity Log 格式更新、GCP Audit Log 字段变化——要求 Sysdig 的 CDR
              检测模块持续工程维护；超大规模云厂商任何未提前通知的 API 格式变化，都会制造临时检测缺口。[CR019] Kubernetes 容器运行时演进（CRI-O 和 containerd 接口随
              Kubernetes 发布周期变化）要求 Sysdig 工程团队持续做代理兼容性测试。[CR020] 依赖图（FR003）展示 Sysdig 商业检测表面下方的四层依赖栈：Linux 内核、CNCF Falco
              治理、云审计 API 和 Kubernetes 运行时。任何一层依赖被扰动，都可能造成客户可见的检测缺口，并产生流失风险。
