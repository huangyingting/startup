      - number: '7.6'
        title: 人员与执行风险
        blocks:
          - type: paragraph
            body: >-
              Sysdig 在 May 2024 任命 Bill Welch 为 CEO，接替 Suresh Vasudevan；后者带领公司在 2022 年以 $2.5 billion 估值完成 Series G
              融资。Welch 拥有 Zendesk 等 SaaS 公司的企业软件经验，但此前没有在 Sysdig 这一规模的安全厂商担任 CEO 的记录；在 Wiz 和 CrowdStrike
              竞争压力加剧的阶段，这带来战略执行风险。[CR021] [CR040] TechCrunch 报道 Sysdig 在 November 2024 进行了一轮裁员；研究日期时，具体员工数影响未确认（见
              EG-R002）。[CR022]


              领导层交替叠加裁员，会在三个维度制造执行风险：客户成功和续约能力（直接流失风险）、销售管线管理和新客户获取（ARR 增长风险）、产品工程速度（路线图风险）。[CR033] eBPF
              和云安全工程人才竞争激烈，Wiz、CrowdStrike 和超大规模云厂商都在同一个狭窄的内核安全与云检测工程师池里积极招聘。[CR032] 创始人 Loris Degioanni（CTO、CNCF Falco
              创建者）集中度较高，使 Falco 架构方向和 eBPF 路线图存在关键人物依赖。这些风险的缓解和终止标准——包括监测触发因素、行动阈值和尽调路径——汇总在 TR004（人员 / 执行风险登记表）和
              TR005（缓解和终止标准表）。
