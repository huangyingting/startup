      - number: '8.2'
        title: 估值框架与可比分析
        blocks:
          - type: paragraph
            body: >-
              Sysdig 的估值采用前瞻 ARR 倍数法，并以公开和私营 CNAPP 可比公司作为基准。公开可比公司给出市场出清倍数：CrowdStrike 约 $151B 市值，对应估计 $4.2B-$4.5B
              ARR（FY2025），意味着 33x-36x ARR 倍数；Palo Alto Networks 约 $197B 市值，对应 $9B+ 平台 ARR，意味着 21x-22x
              ARR。这些公开倍数反映的是规模化、高 NRR、多元化安全平台的溢价定价，不能直接套用于 Sysdig 这个 IPO 前、单平台画像。


              对私营成长型可比公司，后期私营 SaaS 公司通常要在公开倍数基础上打 30%-50% 非流动性折扣。把这个折扣套到 CrowdStrike 倍数（35x × 0.65 = 约 23x）和 Wiz
              上一轮融资（Wiz 在 May 2024 以 $12B 融资 $1B，当时 $500M+ ARR = 约 24x ARR），可框出最佳同类私营 CNAPP 的 20x-24x 溢价倍数区间。保守基准情景使用
              8x-12x ARR——适合财务指标未披露的后期私营公司——隐含合理价值区间从 $1.0B（$125M ARR x 8x）到 $3.6B（$300M ARR x 12x）。当前 $2.5B 标记落在该区间内；在
              8x-12x 倍数下，$210M-$312M ARR 可以支撑这一估值。若没有 ARR 验证，基准情景周围仍有 +/-$1.5B 的重大估值不确定性。


              战略收购方定价可能增加 20%-40% 溢价，意味着 CrowdStrike、Palo Alto Networks 或 Cisco 等潜在整合方可给出 $3.0B-$3.5B。不过 Lacework
              先例说明，如果增长停滞，CNAPP 资产并不能免于以显著低于峰值估值的价格困境出售。
