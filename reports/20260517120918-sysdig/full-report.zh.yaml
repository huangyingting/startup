  - id: TE002
    title: 工作流用例表
    notes: |
      五个主要用例依据 sysdig.com/use-cases 文档整理。可量化收益来自 Sysdig 截至 2026 年 5 月在 sysdig.com 发布的具名客户案例研究。
    columns:
      - 用例
      - 用户
      - 触发条件
      - 系统动作
      - 结果
    rows:
      - - 漏洞管理
        - 安全工程师和 DevSecOps
        - 新容器镜像推送到镜像仓库，或运行中的工作负载发现 CVE
        - Sysdig 扫描镜像层；关联运行包；抑制不可利用 CVE
        - 公司汇总数据显示，需修复漏洞减少 98%；Neo4j 降低 80%
      - - 运行时威胁检测
        - SOC 分析师和事件响应人员
        - 可疑系统调用触发 Falco 规则，例如容器内启动 shell 或加密货币挖矿
        - 生成告警，附进程树、网络上下文和受影响工作负载身份
        - 555 Benchmark 要求 5 秒检测；JumpCloud 案例记录每日告警减少 99.8%
      - - 云态势管理 CSPM
        - 云安全架构师
        - 持续无代理扫描云资源配置
        - 按 CIS Benchmarks、PCI DSS、SOC 2 和自定义策略给配置错误打分
        - 即时看见云配置漂移；为审计员生成合规报告
      - - 云检测与响应 CDR
        - 威胁猎手和 SOC 分析师
        - CloudTrail 或 Azure Monitor 日志与运行时 eBPF 遥测一起接入
        - 呈现关联攻击链，并映射 MITRE ATT&CK 与受影响云资源
        - 跨层 kill chain 可见性；555 Benchmark 设定 5 分钟响应目标
      - - 权限与授权 CIEM
        - 云安全工程师和 IAM 管理员
        - 权限扫描发现过度授权 IAM 角色或未使用的云权限
        - 生成最小权限策略建议；呈现按风险排序的权限仪表盘
        - 缩小云爆炸半径；CoinDCX 记录配置错误下降 60-70%
