  - id: TM001
    title: CNAPP 市场定义与边界
    notes: >-
      市场定义综合 Gartner CNAPP 品类指南、TechTarget、Aqua Security 和 Orca Security 教育内容。CNAPP 整合了过去作为单点方案销售的能力。Sysdig 定位强调以 Falco
      为基础差异化的运行时安全。
    columns:
