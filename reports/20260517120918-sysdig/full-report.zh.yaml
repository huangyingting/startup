  - number: 7
    title: 风险
    sections:
      - number: '7.1'
        title: 风险图谱与评估方法
        blocks:
          - type: paragraph
            body: >-
              Sysdig 的风险画像来自它的竞争定位：一套专为云原生安全打造的平台，技术差异化压在 Falco、基于 eBPF 的打点能力，以及厂商控制的 CNAPP
              栈上。本章从六个领域评估重大风险：监管和法律暴露、竞争和市场替代、运营和技术、合作伙伴和依赖、人员和执行、财务和价格压缩。风险严重度用可能性乘以业务影响进行定性评估，为每个风险项得出残余暴露评级。基于证据的可能性估计，来自公开监管文件、第三方新闻报道、竞争对手产品页、分析师评论和
              Sysdig 官方沟通。[CR043]


              截至 May 2026，风险热力图（FR001）把 Wiz
              带来的竞争替代和监管披露义务放在高严重度象限。风险传导图（FR002）追踪平台替代和监管触发因素如何向下游传导，演变成收入放缓、客户流失、融资困难和估值受损。依赖图（FR003）展示 Sysdig
              检测表面之下的结构性依赖栈：Linux 内核 eBPF、CNCF Falco 治理、云厂商审计 API，以及 Kubernetes
              运行时。下方登记表中的每个风险项都包含缓解成熟度评级和残余暴露估计，用于支持投资逻辑验证和资料室优先级排序。终止标准和监测触发因素汇总在第 6 节 TR005（缓解和终止标准表）。
            claimRefs:
              - CR043
