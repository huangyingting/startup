        - 借 Falco 提供运行时洞察；支持多云；集成 Prometheus/K8s
      - - 金融服务（BFSI）
        - CISO、首席风险官、合规
        - IT 安全 + 监管合规预算
        - SOC 2、PCI-DSS、审计轨迹；低误报
        - 合规报告；运行时取证；FedRAMP 授权
      - - 医疗健康企业
        - CISO、IT 安全 VP
        - IT 安全 + HIPAA 合规
        - HIPAA、HITECH 数据保护；防范泄露
        - 数据分类；运行时异常检测；审计日志
      - - 联邦 / 国防机构
        - CISO、项目经理、ATO 发起人
        - 机构 IT 预算（需 FedRAMP）
