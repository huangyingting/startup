      - number: '3.2'
        title: 能力与定位
        blocks:
          - type: paragraph
            body: >
              CNAPP 的核心能力分野，是运行时深度与部署简便性。Sysdig 位于高运行时深度象限：Falco 的 eBPF
              内核检测提供对容器和主机行为的系统调用级可见性，使平台能在漏洞被利用后的毫秒级完成实时威胁检测。依赖云配置和磁盘状态周期性快照的无代理扫描器无法获得这种信号。Sysdig 的 555 Benchmark
              声称，平台检测并响应云攻击的速度可以快过攻击者完成攻击；这是一句营销驱动的表述，但也反映出 Falco 在运行时事件捕获上的真实架构深度。


              Wiz 的无代理路径——在没有内核代理的情况下扫描云工作负载元数据——能更快产生首次价值（分钟级，而代理部署需要小时级），并提供更广的云资产可见性（IAM、存储、网络配置和虚拟机镜像）。不过，如果没有 Wiz
              Defend 模块，Wiz 的运行时检测能力有限；该模块需要 Wiz Sensor 代理来获取内核级信号。截至 2026 年，Wiz 已加入可选代理层，但主要差异化仍是安全图谱和无代理态势管理广度。Orca
              Security 走了类似路径，在 2025/2026 年推出基于 eBPF 的 Orca Sensor 来补齐运行时缺口。


              Palo Alto Networks Prisma Cloud（现 Cortex Cloud）在 CNAPP 厂商中提供最广的功能集，但代价是平台复杂度。Prisma Cloud 用 AI 驱动的
              Precision AI 每天分析 1 trillion 个事件，并为 GenAI 工作负载提供内置 AI 安全态势管理（AI SPM）。它的优势在于与 PANW 更大 Cortex
              平台深度集成，以及能服务复杂企业部署的大型专业服务网络。


              CrowdStrike Falcon Cloud Security 以攻击者情报做差异化：平台将云检测映射到 281+ 已追踪威胁行为体，并在 MITRE 首次云 ATT&CK 评估（Enterprise
              2025）中验证 100% 检测、零误报。CrowdStrike 云模块受益于与终端和身份信号的跨域关联；Sysdig 可借 Sysdig Monitor 集成部分复制这种优势，但无法匹配其终端广度。


              Aqua Security 的全生命周期路径（从代码到镜像仓库再到运行时）在容器和 Kubernetes 安全上与 Sysdig 重叠最多。Aqua 的开源工具 Trivy 和 Tracee
              带来开发者社区存在感，与 Falco 争夺从业者心智。Snyk 的开发者优先平台覆盖代码、开源、容器、IaC 和 API/web 安全（DAST），集成横跨整个 SDLC。Snyk 与 Sysdig
              的重叠主要在容器镜像扫描和 IaC 安全；它缺少 Sysdig 的运行时深度和可观测性集成。


              Sysdig 的 Sage GenAI 云安全分析师（2025 年推出）和 Headless Cloud Security 架构（2026 年推出），是它在 AI 时代对 Wiz 安全图谱和 PANW
              Cortex 平台的回应。Sage 为告警分诊和调查提供多步推理；一线 CNAPP 厂商如今大多提供类似能力，因此 AI 功能更像是准入门槛，而不是真正护城河。
