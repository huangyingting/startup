      - number: '3.4'
        title: 定价与 GTM 重叠
        blocks:
          - type: paragraph
            body: >
              CNAPP 厂商定价普遍不透明：没有一线厂商公布标价。Wiz 定价按模块和工作负载规模设计，商业层级包括四档——Wiz Cloud（无代理态势）、Wiz Code（开发者安全）、Wiz
              Defend（CDR/运行时）和 Wiz Sensor（eBPF 代理）——每档都走定制企业报价。Wiz 在 G2 上由 772+ 条评价给出 4.7
              星评分，反映买方满意度较强，也暗示其在早期交易中可能积极定价，以拿下 Fortune 500 客户。


              Sysdig 按消耗定价——按主机、容器或工作负载——企业协议会把 Sysdig Secure（CNAPP）和 Sysdig Monitor（可观测性）打包。Sysdig
              定价页跳转到“联系销售”流程，确认没有公开可用费率。Secure+Monitor 双产品包是 GTM 差异点：Sysdig 可以从可观测性切入账户（摩擦较低），再扩展到安全（价值更高）；纯 CNAPP
              竞争对手无法使用这种先落地再扩张动作。


              CrowdStrike 使用按终端 / 模块的定价模型，并打包 Falcon Go、Pro、Enterprise 层级。云安全模块是现有 Falcon 订阅的附加项，让 CrowdStrike
              交叉销售团队在已安装 Falcon 的账户中拥有显著优势。PANW 同样借既有 Cortex 和 NGFW 关系撬动销售，提供平台化折扣，使 CNAPP 在打包续约中接近免费；这是纯 CNAPP
              厂商无法匹配的定价武器。


              Snyk 提供面向开发者的定价，包含免费层（有限扫描）、团队层和企业层。公开团队定价约 $25/developer/month，在 DevSecOps 细分中少见地透明。Aqua 和 Orca
              都只提供定制报价。GTM 分发优势明确属于平台既有厂商（PANW、CrowdStrike），它们在企业账户中已有嵌入式销售团队，并能以边际成本打包 CNAPP。Sysdig 的缓冲来自 Falco 社区：部署开源
              Falco 的从业者会成为 Sysdig 的获客管道；这种开发者主导的 GTM 动作，部分抵消了相对 PANW 和 CrowdStrike 的分发差距。
            claimRefs:
              - CP033
              - CP034
              - CP035
              - CP036
              - CP037
              - CP038
