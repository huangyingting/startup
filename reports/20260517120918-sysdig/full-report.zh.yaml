        - 低——Wiz 和 PANW 正在推进 FedRAMP；优势有时限，直到竞争对手获授权
        - 短中期（1–2 年）
        - 确认 FedRAMP High 路线图；核验 DoD/CMMC 管线；跟踪竞争对手 FedRAMP 申请
      - - 已部署 Falco 代理带来的切换成本
        - 中高——生产环境已部署的 eBPF 探针需要全量资产重新插桩；自定义规则、历史数据、SOC 重新培训
        - 低——切换成本来自架构；只要运行时安全需要代理，就会持续存在
        - 长期（3+ 年）
        - 尽调中索取 NRR/GRR 数据；在数据室查找企业客户流失证据
