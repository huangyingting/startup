  - number: 2
    title: 市场分析
    sections:
      - number: '2.1'
        title: 市场边界与范围
        blocks:
          - type: paragraph
            body: >
              Sysdig 所处市场在 Gartner 口径中被称为云原生应用保护平台（CNAPP）（首份魔力象限于 2024 年发布），Forrester 则称为云工作负载保护与安全，
              更宽口径市场分析师称为云安全。CNAPP 作为品类在 2022 年出现，用来描述此前分散的云安全工具整合进统一平台：云安全态势管理（CSPM）、 云工作负载保护平台（CWPP）、Kubernetes
              安全态势管理（KSPM）、云基础设施权限管理（CIEM）、容器安全、运行时安全、基础设施即代码（IaC）扫描。


              CNAPP 市场覆盖云原生应用全生命周期的保护：代码（CI/CD 安全、IaC 扫描、软件成分分析）、构建（制品扫描、镜像仓库安全）、部署（CSPM、KSPM 配置管理）、 运行时（CWPP
              威胁检测、行为异常检测、事件响应）。Sysdig 的定位强调由 Falco 驱动的运行时洞察——Falco 是 CNCF 毕业的开源运行时安全引擎， 用 eBPF 做 Linux
              内核检测——并把它作为威胁检测、调查和响应的差异化基础。


              相邻但不同的市场包括传统 IT 终端检测与响应（EDR）、向云扩展的扩展检测与响应（XDR）、安全信息和事件管理（SIEM）、应用安全态势管理（ASPM）和供应链安全。 现状替代方案包括手工审查云控制台、CSP
              原生安全工具（AWS Security Hub、Azure Defender、Google Cloud Security Command Center），
              以及企业安全团队自行拼接的点状工具。组织希望整合工具来解决“工具蔓延”——Gartner 称，到 2023 年有 60% 企业合并到单一供应商 CNAPP—— 市场增长因此同时替代人工做法和碎片化工具集。
            claimRefs:
