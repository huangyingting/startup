  - id: TM005
    title: CNAPP 市场主要增长驱动因素
    notes: >-
      增长驱动因素评估综合了监管时间表（CISA、FedRAMP、NIS2）、CNCF 调查中的容器 / K8s 采用数据、Gartner 工具整合趋势以及 IBM
      数据泄露成本数据。紧迫性评级是分析判断，依据监管执法时间表和观察到的云安全事件频率。
    columns:
      - 驱动因素
      - 机制
      - 主要证据
      - 时间窗口
      - 紧迫性（高 / 中 / 低）
    rows:
      - - 监管强制要求（FedRAMP、CMMC、NIS2、GDPR）
        - 联邦采购、国防供应链、欧盟关键行业和数据保护场景都必须配置云安全控制
        - CISA 指引、FedRAMP Marketplace、NIS2 指令 2024–2026 年执法
        - 2024–2027
        - 高
      - - Kubernetes 在生产环境大规模采用
        - 82% 的容器用户在生产环境运行 K8s；66% 用 K8s 承载 GenAI 工作负载；临时容器（70% 存活 <5 min）需要运行时安全
        - CNCF 2025 年度调查；Sysdig 容器安全实践报告
        - 持续至 2028+ 之后
        - 高
      - - 工具蔓延推动 CNAPP 整合
        - 企业把 CSPM + CWPP + KSPM 整合到单一供应商（2023 年达 60%，2022 年为 25%）
        - Gartner 2023 年 CNAPP 指引；MarketsandMarkets 趋势分析
        - 2023–2027
        - 高
      - - 云端泄露成本上升
        - 全球平均泄露成本为 $4.4M（2025）；云端泄露比本地部署高 12%，因为数据外泄速度更快
        - IBM《Cost of a Data Breach Report 2025》报告
        - 即期 / 2025–2026
        - 高
      - - Falco 生态成熟（2024 年 CNCF 毕业）
        - Falco 运行时安全项目达到 CNCF 毕业级别（下载量 100M+）；企业更信任毕业项目用于生产环境
        - CNCF 2024 年 2 月毕业公告；Falco.org 采用数据
        - 2024–2028
        - 中
      - - 多云和混合部署复杂度
        - 企业平均使用 2.6 家云提供商；跨云手工做安全，规模化后不可行
        - Allied Market Research 混合云增长趋势；行业调查
        - 2025–2030
        - 中
      - - AI/ML 工作负载安全需求
        - 66% 的 K8s 用户部署 GenAI 工作负载；新攻击向量包括模型盗窃、提示注入、数据外泄
        - CNCF 2025 调查；Sysdig AI 工作负载安全定位
        - 2026–2029
        - 中
    sourceRefs:
      - SM008
      - SM009
      - SM010
      - SM011
      - SM012
      - SM015
  - id: TM006
    title: CNAPP 采用约束与缓释手段
    notes: 约束分析基于行业结构（CSP 原生工具）、技能短缺观察、并购整合趋势（Palo Alto、CrowdStrike 收购）以及从业者文献记录的告警疲劳问题。严重性评级是分析判断；关于采用障碍的主要调查数据并未公开。
    columns:
      - 约束
      - 根因
      - 对采用的影响
      - 缓释手段
      - 严重性（高 / 中 / 低）
    rows:
      - - CSP 原生工具碎片化
        - AWS Security Hub、Azure Defender、GCP SCC 随云服务捆绑，提供免费 / 低成本基础安全
        - 采购惯性；CNAPP 必须证明相比 CSP 原生工具有增量价值
        - 多云标准化；更强的运行时检测（Falco）；合规自动化
        - 高
      - - 云安全技能稀缺
        - 熟悉 Kubernetes、eBPF、云 IAM 和安全运营的人才短缺
        - 部署后落地慢；依赖供应商专业服务
        - 托管服务；AI 辅助检测（Sysdig Sage）；培训计划
        - 高
      - - 市场整合与既有巨头
        - Palo Alto、CrowdStrike、Cisco、Microsoft 正在收购 / 自建 CNAPP；CSP 扩展原生安全
        - 利润率受压；独立 CNAPP 供应商面临商品化风险
        - 开源差异化（Falco）；运行时深度；开发者社区
        - 中
      - - 告警疲劳与误报
        - Kubernetes 每小时产生数百万事件；高误报率引发告警疲劳
        - 安全团队关闭噪声检测；真实威胁被漏掉
        - 运行时上下文（Falco 内核级可见性）；基于 ML 的关联；可调规则
        - 中
      - - 云支出的经济敏感性
        - 云采用和 CNAPP 销售与宏观经济相关；下行周期会推迟迁移
        - 销售周期拉长；交易额压缩；预算冻结
        - 先落地再扩张的定价；按用量计费模型；快速证明 ROI
        - 中
      - - 分析师市场规模估算分歧
        - TAM 估算相差 4 倍（$19B–$125B），源于定义模糊
        - 投资人和买家不确定；市场规模说法难验证
        - 独立买方调查；按细分市场验证支出；供应商披露
        - 低
    sourceRefs:
      - SM013
      - SM014
      - SM016
  - id: TP001
    title: 竞争对手画像表
    sectionRef: competitor-landscape
    enumeration: true
    expectedMinRows: 5
    enumerationScope:
      coverage: partial
      basis: >-
        Covers eight named CNAPP/cloud-security competitors researched via official product pages, Crunchbase, SEC
        filings, and press sources as of 2026-05-17. Excludes CSP-native tools (AWS Security Hub, Azure Defender for
        Cloud, GCP Security Command Center) treated as status-quo substitutes, and smaller vendors without publicly
        available funding or product data. FortiCNAPP included because the Lacework acquisition closes the mid-tier
        legacy category.
    claimRefs:
      - CP003
      - CP004
      - CP005
      - CP006
      - CP007
      - CP008
      - CP009
      - CP010
      - CP012
      - CP022
      - CP030
    columns:
      - 竞争对手
      - 融资 / 阶段
      - 与 Sysdig 的产品重叠
      - 主要差异化
      - 相对 Sysdig 的主要短板
    rows:
      - - Wiz
        - 已融资约 $1.93B；估值 $12B+（2024 年 5 月）；目标 IPO
        - CNAPP：CSPM、CWPP、CIEM、CDR、AI SPM；安全图谱连接代码、云和运行时
        - 无代理部署；渗透 >50% 的 Fortune 100；安全图谱覆盖广；工作负载 5M+
        - 没有可选 Wiz Sensor 代理就缺少内核级运行时深度；自研规则相对开放 Falco
      - - Palo Alto Networks（Cortex Cloud 平台）
        - NASDAQ：PANW；市值约 $100B；FY2025 收入 $8B+
        - 全栈 CNAPP：CSPM、CWPP、CIEM、CDR、AI SPM、IaC；与 Cortex XDR 和 SASE 集成
        - 平台化捆绑端点 / SASE；70K+ 客户；每天分析 1T 事件
        - 平台复杂；部署开销高；定价绑定套装续约
      - - CrowdStrike Falcon Cloud Security
        - NASDAQ：CRWD；ARR $4B+；市值约 $100B
        - 云姿态、CDR、容器 / K8s 安全、漏洞管理、CIEM
        - AI 原生对手情报（281+ 个对手）；MITRE 云检测覆盖 100%；跨域关联
        - 2024 年 7 月宕机削弱了基于代理的信任；云模块需要基础 Falcon 订阅
      - - Aqua Security
        - 已融资约 $259M；未上市
        - 容器 / K8s 安全、CWPP、CSPM、供应链、漏洞管理
        - 开源 Trivy（漏洞）和 Tracee（eBPF 运行时）；覆盖从代码到运行时的完整生命周期
        - 规模小于一线竞争对手；分析师认可度低于 Wiz/PANW/CrowdStrike
      - - Snyk
        - 已融资约 $1.2B；峰值估值约 $7B；未上市
        - 容器安全（Snyk Container）、IaC 安全（Snyk IaC）、DAST（Snyk API & Web）
        - 开发者优先，嵌入 IDE 和 CI/CD；代码、依赖、容器、IaC 集于一个平台
        - 无运行时 / eBPF 检测；无 CSPM/CIEM；与 Sysdig 企业安全买家的重叠有限
      - - Orca Security
        - 已融资约 $630M，估值 $1.8B；未上市
        - 无代理 CNAPP：CSPM、CWPP、CIEM、漏洞管理、CDR（带 Orca Sensor）
        - SideScanning 专利无代理技术；三类可达性分析；Orca AI 智能体
        - 已添加 eBPF 传感器以补齐运行时缺口——相对 Falco 积累，仍是较新的运行时能力
      - - FortiCNAPP（原 Lacework）
        - 2024 年 6 月以困境价收购后成为 Fortinet 子公司；未上市
        - 云姿态、CDR、CWPP、CIEM；基于 ML 的零日检测；合规自动化
        - 集成 Fortinet Security Fabric；无需自定义规则的专利 ML 异常检测
        - 以困境估值被收购显示商业化承压；渠道整合仍在成熟
      - - CSP 原生工具（AWS GuardDuty / Azure Defender / GCP SCC）
        - 公有云提供商；随云订阅捆绑，增量成本为零
        - 基础 CSPM、威胁检测、合规基准；K8s 原生可见性有限
        - 零增量成本；深度 CSP 集成；无部署摩擦
        - 没有统一多云视图；没有自定义 Falco 规则；没有可观测性；运行时深度有限
    notes: >-
      融资数据来自 Crunchbase 公开资料、新闻报道和公司披露；未上市公司估值采用最后已知轮次数据。CrowdStrike ARR 为最近披露的财年数据；PANW 收入为截至 2025 年 7 月的财年。Sysdig 的
      Series G 轮估值为 $2.5B（2023 年 5 月）。Snyk 估值反映 2021 年前后的峰值，到 2026 年很可能已下调。
