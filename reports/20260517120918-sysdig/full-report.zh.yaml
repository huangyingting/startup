      - number: '6.4'
        title: 集中度、流失风险与反向证据
        blocks:
          - type: paragraph
            body: >
              Sysdig 的具名客户基础存在明显垂直集中风险：九个深入审阅的案例研究中，至少七个是云原生 SaaS 或软件技术公司。在具名验证基础里，只有 UIDAI（政府）和 Apree
              Health（医疗健康）代表非技术垂直；而 Apree Health 是技术赋能型医疗健康公司，不是传统付款方或医疗体系。这种集中度意味着，Sysdig 有记录的采用情况跟随云原生组织里的 Kubernetes
              采用曲线；如果 SaaS / 云原生企业安全支出持续放缓，Sysdig 已展示的收入基础会承受不成比例的冲击。[CU033]

              本研究审阅的任何公开文件中，都没有把 Fortune 500 或 FTSE 100 企业列为 Sysdig 客户。UIDAI
              是国家基础设施级别的企业规模部署，但它是政府机构，不是商业企业。缺少具名大型企业参考，使得评估 Sysdig 在企业 CNAPP 市场相对 Palo Alto Networks Prisma Cloud 和
              Wiz 的进展变得困难；后两者都披露具名大型企业客户。[CU025] [CU027]

              公开来源中没有识别到流失事件、合同不续约或重大客户不满披露。不过，这可能只是因为没有公开披露，而不代表没有流失；作为私营公司，Sysdig 不需要报告客户流失。研究期间无法访问 G2 和 TrustRadius
              评论页（G2 需要 JavaScript，TrustRadius 返回 404），独立评论数据集因此只剩 PeerSpot 的四条 Sysdig Monitor 评论。[CU035]

              Gartner 对 CNAPP 和 CSPM 的 Customers' Choice 认定是正面信号，但研究期间，Gartner Customers' Choice 和 Voice of the Customer
              的主要来源 URL 返回 404，Forrester Wave CNAPP
              报告也无法访问。这些是重要证据缺口，会降低分析师验证说法的可靠性。公司客户页面和新闻稿都引用了这两项认定，但在把它们视为高置信度证据前，Sysdig 自有来源确认的第三方奖项还应由独立验证补足。[CU025]
              [CU026] [CU027]
            claimRefs:
              - CU025
