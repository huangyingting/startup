chapters:
  - number: 1
    title: 公司概况
    sections:
      - number: '1.1'
        title: 身份、总部与产品模式
        blocks:
          - type: paragraph
            body: >
              Sysdig Inc. 是一家位于 San Francisco 的云原生安全公司，2013 年注册成立。公司总部设在 California, San Francisco，工程和市场销售办公室分布在全球。
              它的使命——“用正确方式做云安全”——支撑着一套产品判断：实时、内核级可见性在架构上优于纯无代理扫描。这个判断贯穿商业产品和开源社区策略的每一层。


              核心产品组合包含两套商业 SaaS 平台和一个基础开源项目。Sysdig Secure 是一套 CNAPP，把漏洞管理、云安全态势管理（CSPM）、云检测与响应（CDR）、 Kubernetes
              安全统一到单一平台里，并以运行时上下文为锚点。Sysdig Monitor 为容器化和无服务器工作负载提供云与容器可观测性，涵盖指标、事件和容量分析。 Falco 是公司开源的运行时安全引擎，Sysdig 于
              2016 年创建后捐赠给 Cloud Native Computing Foundation；它在 February 2024 晋升为 CNCF 顶级项目， 是事实上的 Kubernetes 威胁检测标准。


              Sysdig 的商业模式是按主机或节点销售订阅 SaaS。企业席位按每主机每年定价，大型容器集群部署可获得企业折扣。开源 Falco 社区承担漏斗顶部获客：在集群里部署 Falco 的安全从业者，天然会成为
              Sysdig 企业级规则管理、合规和响应能力的买方。这种开源驱动增长路径类似 Elastic、HashiCorp、Confluent 的打法， 也把 Sysdig 同纯商业 CNAPP 新进入者区分开。
