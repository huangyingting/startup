      - number: '4.3'
        title: 单位经济模型与效率估计
        blocks:
          - type: paragraph
            body: >
              Sysdig 的所有单位经济模型指标都是私有且未经验证的。下面的分析用同行基准、收入代理指标，以及 Sysdig 按主机计费 SaaS 模型的结构特征，搭出估计区间。这些估计只有低到中等置信度，不能视为公司披露。

              年经常性收入（ARR）估计在 $120M–$300M。下限对应 2023 年 Series G 估值在 20x ARR 时所需的最低 ARR；在 2022 年后倍数压缩环境里，这对私营公司已经是偏高倍数。上限对应
              CRO Gary Olson 在 Snyk 的经验最能直接套用的 ARR 水平——他入职第一年推动 Snyk 达到 $300M ARR 里程碑，暗示董事会可能希望他在 Sysdig 复制类似扩张轨迹。本分析把
              2025 全年的 $200M ARR 作为基准情景中点，对应 $2.5B Series G 估值下的 12.5x ARR 倍数。这个基准倍数落在 CNAPP 同行区间内（Wiz 在 $12B/$500M ARR
              时约 ~24x；Lacework 困境退出时约 ~5x）。

              净留存率（NRR）未披露。参考 CNAPP 同行基准——Wiz 据报道高于 120%，CrowdStrike 公开披露 NRR 为 119–127%——Sysdig 的 NRR 估计在 105%–130%
              之间是合理的。按主机计费模型会随着客户云足迹扩大而自然扩张：容器、节点、工作负载增加后，收入可在不额外投入销售的情况下增长。NRR 低于 110% 会说明存量客户流失或收缩，压住自然增长；NRR 高于 120%
              则能确认平台广度带来的强劲先落地再扩张动力。

              混合平台收入的毛利率估计为 65%–75%。Sysdig Secure 的纯 SaaS 交付模式在规模化后可支撑 70%–80% 的毛利率，但专业服务收入（估计占总收入
              10%–20%）会拉低混合毛利。按主机模型会带来明显的基础设施成本：云端遥测采集、关联和存储会随客户环境同步扩张。只做无代理模型的竞争对手（Wiz）通常报告更高毛利率（85%+），因为代理基础设施成本更低；Sysdig
              必须靠 eBPF 驱动效率优化和数据处理成本管理，缩小这个结构性毛利差距。

              运营效率指标（销售和市场（S&M）支出占 ARR 比例、研发（R&D）占 ARR 比例）未披露。以 Sysdig 估计 $200M ARR 的基准情景为底，套用 CNAPP 行业中位数基准：S&M 估计占 ARR
              40%–55%（$80M–$110M），反映企业云安全销售环境竞争激烈；R&D 占 20%–28%（$40M–$56M），符合开源研发模型——社区贡献抵消一部分商业开发成本；一般及行政（G&A）占
              8%–12%（$16M–$24M）。这些数字意味着估计年度现金消耗为 $30M–$100M，与 Series G 资金可支撑 24–48 个月现金跑道的估计一致。2024 年约 ~10%
              的裁员可能让年化运营费用减少 $8M–$20M，说明管理层一直在主动控烧钱。

              Falco 开源社区给 Sysdig 带来结构性的销售效率优势：Falco 拥有 8,600+ GitHub 星标、175M+ 容器镜像拉取、1,600+
              贡献者，能形成开发者影响采购，降低陌拜获客成本（CAC）。已经了解并信任 Falco 的安全从业者，是 Sysdig Secure 的预筛选买方群体。这一机制类似 HashiCorp 从 Terraform
              导向企业版的漏斗；量化来看，Falco 相邻账号的 CAC 估计比不熟悉 Falco 的潜在客户低 15%–25%。
