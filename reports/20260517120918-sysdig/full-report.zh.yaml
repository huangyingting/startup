      - number: '5.2'
        title: 技术架构与开源基础
        blocks:
          - type: paragraph
            body: >
              Sysdig 平台采用多租户 SaaS 后端架构，并通过 eBPF（extended Berkeley Packet Filter）交付轻量级按主机部署的内核代理。eBPF 探针在内核层捕获 Linux
              系统调用，不需要编译内核模块或修改操作系统，相比传统内核模块方案降低了部署摩擦。代理打包成容器，以 Kubernetes DaemonSet
              形式部署；在不需要运行时可见性，或政策限制代理部署的场景里，无代理扫描模式补充覆盖云配置和镜像仓库扫描。


              Falco 开源项目支撑运行时检测层。Falco 使用规则引擎消费系统调用流，并用基于 YAML 的 DSL 表达的检测规则库进行评估。截至研究日期，falcosecurity GitHub 组织有 100
              多名活跃贡献者，falcosecurity/falco 仓库在 GitHub 上累计超过 7,000 个星标，说明 Sysdig 商业用户之外也有相当规模的开发者社区采用。Docker Hub 显示官方
              Falco 镜像有数百万次拉取，进一步证明其已在生产环境规模化部署。


              Sysdig Sage 是 2023 年发布的 AI 安全助手，它使用 LLM 支撑的生成式 AI，把原始威胁发现转成自然语言调查工作流，缩短 SOC 分析师的平均响应时间。Sage 建在核心 CNAPP
              使用的运行时洞察图谱之上，因此建议基于实时运行时数据，而不是静态配置快照。底层具体 LLM 提供商未公开披露。Sysdig Labs GitHub
              组织（github.com/sysdiglabs）发布用于平台部署的开源 Terraform 模块、Helm chart 和自动化脚本。VS Code marketplace 扩展把安全能力延伸到
              IDE，平台也与 GitHub Actions、Jenkins 集成，用于 CI/CD 流水线安全扫描。
