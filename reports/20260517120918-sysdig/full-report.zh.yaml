  - number: 6
    title: 客户情况
    sections:
      - number: '6.1'
        title: 客户基础分层与采用画像
        blocks:
          - type: paragraph
            body: >
              Sysdig 公开记录的客户基础至少覆盖八个行业垂直：软件技术、零售和电商、医疗健康、金融服务、政府、游戏和娱乐、电信、加密交易；这些分类来自公司客户页面。客户页面还按部署环境（Private
              Cloud、Bare Metal、On-Premises、Google
              Cloud、Azure、AWS）和地域（Americas、EMEA、APAC）筛选，说明公司已经打进多云、多区域场景。按已发布案例研究的权重看，主导客群是云原生 SaaS
              和技术公司，它们在中端市场到大型企业规模运行 Kubernetes 工作负载。[CU021]

              这些组织里的采购几乎都由 CISO 主导，并深度牵涉工程团队：Neo4j 的部署由 CISO 推动、工程团队采用；JumpCloud 的 CISO 主推平台；BigCommerce 的 VP of
              Cybersecurity 和 Senior Infrastructure Security Engineer 共同拥有评估过程。CISO 与工程团队双重赞助，是云原生安全采购的结构性特征，Sysdig 的
              Falco 开源底色正好利用了这一点：安全工程师熟悉 Falco 检测引擎，会降低评估摩擦并缩短 PoC 周期。[CU013] [CU020]

              Sysdig 不公布总客户数。官网汇总了三个头部指标——生产环境漏洞减少 98%、修复速度提高 12×、每日告警减少
              99.8%——这些来自具名案例研究，而不是已披露的客户基础规模或统计抽样调查。这些数字由公司陈述，未经独立审计。Sysdig 的 $350 million Series G、$2.5 billion
              估值（2022）以及报道中的 ARR 轨迹，说明它应有实质性的企业客户基础，但没有公开确认过具体客户数。[CU022] [CU023] [CU024] [CU031]

              Sysdig 的三类核心用例——运行时威胁检测和 CNAPP（CSPM+CWPP+CDR）、容器化工作负载漏洞管理、以及 SOC 2、HITRUST、ISO 27001、PCI DSS
              等框架的合规就绪——契合云原生工程组织的运营需求；这些组织已经把核心基础设施迁移到 Kubernetes，或正在迁移。基于 Falco
              的运行时检测层形成了社区熟悉买方重视的技术差异化；多个案例研究都提到，客户最初因为熟悉 Falco，才把 Sysdig 作为商业 CNAPP 纳入评估。[CU008] [CU028]
