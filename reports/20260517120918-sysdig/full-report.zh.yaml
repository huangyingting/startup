      - number: '2.2'
        title: TAM / SAM / SOM —— 多视角测算
        blocks:
          - type: paragraph
            body: >
              多家分析机构从相互重叠的定义出发测算云安全和 CNAPP 市场，预测结果因范围不同而相差 4×。MarketsandMarkets 将 CNAPP 市场窄定义为提供一体化 CSPM、CWPP、 CIEM
              的平台，预计 2027 年达到 $19.3 billion，较 2022 年基线 CAGR 为 19.9%。Grand View Research 将更宽的云安全市场——除 CNAPP 外还包括身份与访问管理、
              数据丢失防护、加密、网络安全、邮件安全和 SIEM——测算为 2030 年 $75.26 billion，较 2024 年 $35.84 billion 以 13.3% CAGR 增长。 Allied
              Market Research 采用中间口径，预计 2032 年达到 $125.8 billion，较 2022 年 $35.8 billion 以 13.6% CAGR 增长。


              定义差异反映了真实的市场边界模糊：CNAPP 平台越来越多打包过去单独销售的能力（SIEM 日志聚合、身份治理、数据安全），而传统 IT 安全厂商也把云模块扩展进既有平台。 Gartner 的 2023
              年指引估计，到 2023 年，60% 企业会把 CWPP 和 CSPM 合并到单一供应商，高于 2022 年的 25%；这为 Sysdig、Palo Alto Prisma Cloud、
              Wiz、CrowdStrike Falcon Cloud Security 等一体化 CNAPP 平台带来结构性顺风。


              Sysdig 的主要可服务市场是 CNAPP 平台细分市场——按 MarketsandMarkets 窄口径测算，2027 年 SAM 约为 $19–25 billion。该细分不包括传统终端安全、
              没有云工作负载的本地数据中心，以及没有容器化或 Kubernetes 部署的中小企业。北美占全球云安全支出的 33–42%。BFSI、IT/通信、医疗和制造业是最大的垂直细分； 由于敏感数据保护要求，医疗预计到
              2032 年以 17.7% CAGR 增长最快。


              部署模式正在变化：私有云占 2024 年支出的 48%，但混合云和多云架构——Sysdig 的核心使用场景——是增长最快的部署细分。大型企业当前占支出的 73–74%，
              但监管扩展（GDPR、NIS2、CMMC、州级隐私法）正在推动中端市场采用。Sysdig 的 SOM 未公开披露；公司没有在可用来源中发布收入或客户数。
