  - id: FU001
    title: 客户旅程图
    type: journey-map
    sectionRef: customer-base-and-segmentation
    claimRefs:
      - CU001
      - CU008
      - CU011
      - CU013
      - CU020
      - CU028
    data:
      nodes:
        - label: 发现 / 认知
          detail: >
            熟悉 Falco OSS 或 Wireshark（Sysdig 创始人工具）的安全工程师，会在商业场景中接触 Sysdig。分析师报告（Gartner CC、 Forrester CNAPP
            Wave）和同行口碑也推动 CISO 社群形成初始认知。
        - label: 评估（PoC）
          detail: >
            PoC 通常 30–90 天，对比 3–7 个竞争平台。JumpCloud 和 Automox 都在选择 Sysdig 前评估过多家供应商。Falco 原生规则 的透明度被列为差异点——Automox CISO
            称其「no smoke and mirrors」。
        - label: 初始部署（落地）
          detail: |
            将 Sysdig Secure（CNAPP：CWPP+CSPM）或 Sysdig Monitor 上生产。典型切入口是容器 / Kubernetes 安全。部署常用 Terraform 自动化。见效时间从数天到数周。
        - label: 价值兑现
          detail: >
            前 6 个月：已披露案例显示可量化结果——告警噪音减少 80%+（Neo4j、JumpCloud、BigCommerce、Automox），分诊更快 （BitMEX/JumpCloud 30
            秒），合规基线达成（Apree Health 不到 2 个月完成 HITRUST 准备）。
        - label: 扩张（增购 / 加购）
          detail: >
            Bloomreach 在部署 Monitor 后加购 Sysdig Secure。CoinDCX 将 CSPM 覆盖扩展到更多账户。JumpCloud 探索 Sysdig Sage™。随着成熟度提升，多个客户增配
            Managed Falco 或自定义检测规则。
        - label: 高管对齐
          detail: |
            Neo4j 案例记录了季度业务回顾。Sysdig Threat Research Team 向 CISO 层做威胁态势简报。多位 CISO 提到多年关系框架，使其区别于单一供应商交易关系。
        - label: 背书（案例 / 推荐）
          detail: >
            具名案例许可——Sysdig 已发布 10+ 篇案例，并引用 CISO 级高管。Gartner Customers' Choice 称号反映客户参与评论。 JumpCloud、Neo4j 和 CoinDCX
            都同意公开验证材料发布。
        - label: 续约 / 多产品扩张
          detail: |
            已审阅来源未披露流失。eBPF/Falco agent 埋点、历史事件数据、合规基线历史和 Sage AI 个性化让已部署账户切换成本较高。
    notes: |
      旅程阶段由案例内容中描述的客户时间线和部署推进推断。公开资料未披露阶段间量化转化率。扩张模块经济性未披露。
