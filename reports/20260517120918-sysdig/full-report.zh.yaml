      - number: '7.3'
        title: 竞争与市场替代风险
        blocks:
          - type: paragraph
            body: >-
              对 Sysdig 的企业 CNAPP 动作来说，Wiz 已经成为结构性威胁最大的竞争对手。Wiz 在 May 2024 以 $12 billion 估值融资 $1 billion；按其公开定位，其平台获得超过
              50% Fortune 100 信任。Wiz 的云安全打法以无代理优先，从代码到运行时端到端覆盖，再叠加企业销售深度，使其在竞争账号中对 Sysdig CNAPP 平台构成直接替代风险。[CR013]
              [CR014] [CR039]


              CrowdStrike 的 Falcon 平台在 MITRE ATT&CK 云评估中实现 100% 检测且零误报；CrowdStrike 还把已安装的终端客户基础作为云安全采购的先落地再扩张入口。[CR015]
              [CR027] Palo Alto Networks 通过 Cortex Cloud 平台采用类似捆绑策略，降低既有 Palo Alto 客户评估云原生安全替代方案时的采购摩擦。[CR028] [CR029]
              Lacework 在 mid-2024 被 Fortinet 以未披露价格收购，说明独立 CNAPP 厂商与平台型厂商竞争时，会面对整合压力、价格压缩和估值折价。[CR016] [CR030]
              风险传导图（FR002）展示这些竞争动态如何传导为 ARR 放缓、客户 logo 流失和下游融资困难。
