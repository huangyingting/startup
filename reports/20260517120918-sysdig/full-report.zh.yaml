      - number: '1.4'
        title: 规模指标与覆盖缺口
        blocks:
          - type: paragraph
            body: >
              与一家市场分量相当的上市公司相比，Sysdig 可被公开来源支撑的指标更少；这符合一家尚未披露经审计财务的后期私营公司状态。最可靠的锚点是 May 2023 Series G 的 $2.5 billion
              投后估值、约 $745 million 的累计披露资本，以及 November 2024 裁员后的约 1,200 名员工。


              年经常性收入（ARR）未公开披露。截至 2025 年，分析师估计 Sysdig ARR 为 $250 million 或更高，但该数字未经验证，应视为方向性参考，而不是已确认数据点。 若 ARR 为 $250
              million，$2.5 billion 估值意味着 10x ARR 倍数，低于 2021 年 SaaS 峰值倍数，但与修正后云安全基准相符，尤其是具备 Sysdig
              这类增长画像的公司。近期客户数也没有公开确认；公司客户页列出 Goldman Sachs、IBM、U.S. Air Force 等企业名称，但没有给出总数。Craft.co 曾提到 2021 年有 700+
              客户，但该数字大概率已经过时，若没有更新确认，不应使用。


              Falco 的 GitHub 仓库可作为社区规模代理：该项目已有 7,000+ stars，并被列为 CNCF 速度最高的毕业项目之一。这种开源牵引力是企业管道的有意义领先指标，
              但公共来源无法直接观察社区使用如何转化为 ARR。裁员后员工数估计约 1,200 人，低于估计峰值 1,300 人；考虑到分布式员工结构，所有地点数据都是近似值。
