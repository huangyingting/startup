  - number: 4
    title: 财务情况
    sections:
      - number: '4.1'
        title: 收入模式与定价架构
        blocks:
          - type: paragraph
            body: >
              Sysdig 的收入来自三条主要软件订阅流——Sysdig Secure、Sysdig Monitor、Falco Enterprise
              Feeds——以及专业服务和托管安全赋能项目。公司对两大主要平台产品采用按主机 / 节点授权模型； 其中 “host” 可按具体产品模块涵盖计算实例、容器、Kubernetes 节点和无服务器函数。Sysdig
              定价页披露了这一模型，并明确说明 Sysdig Secure 授权基于客户环境中的主机数量， 基于云日志的检测模块则按处理事件定价。Sysdig Monitor
              同时提供按主机授权和按时间序列授权，让客户可在工作负载数量和指标量定价之间选择。

              Sysdig Secure 是公司的旗舰产品，把漏洞管理、云安全态势管理（CSPM）、云基础设施权限管理（CIEM）、容器和 Kubernetes 安全、云检测与响应（CDR）以及基础设施即代码安全整合进统一
              CNAPP。 按估计收入占比看，它是最大产品，直接竞争对手包括 Wiz、Orca Security、Aqua Security，以及打包进 CrowdStrike Falcon 和 Palo Alto
              Networks Prisma Cloud 的 CNAPP 模块。 覆盖范围横跨基于代理和无代理部署模式，再加上由 Falco 锚定的运行时情报层，使 Sysdig
              有别于主要依赖无代理态势管理、缺少实时系统调用可见性的竞争对手。

              Sysdig Monitor 使用托管 Prometheus 服务，监控容器、Kubernetes 和云服务。它在云原生可观测性细分中与 Datadog、Dynatrace 竞争。Monitor
              产品内置成本优化、PromQL 支持和自动服务发现， 定位为与 Sysdig Secure 部署相邻的 DevOps 产品。按主机或时间序列定价的模型与 Datadog
              做法一致，也让同一套基础设施数据可同时服务可观测性和安全场景。

              Falco Enterprise Feeds 是建立在 CNCF 毕业开源 Falco 项目之上的商业订阅产品，提供企业级检测规则、威胁情报和专业支持，面向已经运行 Falco 的组织。Falco
              项目在第一个十年（2016–2026）达到 175M+ 次容器镜像拉取和 8,600+ GitHub stars；Sysdig 于 May 2026 通过 Linux Foundation 向 Falco
              项目捐赠 $70,000，以纪念十周年。Falco 开源社区规模为商业 Falco Feeds 转化提供了自然漏斗——这一动态类似 HashiCorp 在 Terraform
              之上构建商业产品策略。考虑到社区规模，Falco Feeds 变现是一条新兴但结构上有吸引力的收入线。

              专业服务包括实施、威胁检测规则定制、Sysdig Sage AI 上线，以及托管威胁检测项目。这些服务通常毛利率较低（估计 20–35%），低于软件订阅层级（估计 65–75%）；预计它们会随着平台扩张自然增长，
              随后在客户实现自给后进入平台期。由于缺少公开披露的价格表或合同价值数据，任何收入量化都带有推测性；Sysdig 不发布按主机定价、折扣结构或平均合同价值。
