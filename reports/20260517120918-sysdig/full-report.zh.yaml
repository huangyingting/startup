      - number: '8.3'
        title: 乐观、基准与悲观情景分析
        blocks:
          - type: paragraph
            body: >-
              乐观情景假设：企业买方更看重深度而非广度，FedRAMP 授权打开联邦采用浪潮，Sysdig 成为运行时优先 CNAPP 整合赢家。乐观假设：ARR 从 ~$200M 底座（May 2026）以 40% CAGR
              增长，到 2028 年达到 $400M+；NRR 持续高于 125%；随着 Falco Enterprise Feeds 规模化，毛利率扩到 75%+；Series H 或 IPO 按 12x-15x ARR
              定价，估值在 $4.8B 到 $6.0B 之间。乐观情景概率信号：20%——需要尚未建立的经验证轨迹。


              基准情景假设：在竞争压力下，公司保持有纪律的企业增长。基准假设：ARR 以 25% CAGR 增长，到 2028 年达到 $300M+；NRR 维持在 115%-120%；公司在 2027 年 Series H
              或 IPO 前接近运营盈亏平衡；按 10x-12x ARR 退出，估值 $3.0B-$3.6B。基准情景概率信号：55%。


              悲观情景假设：Wiz 平台规模和 CrowdStrike/PANW 捆绑带来的竞争压力，把 Sysdig 增长压到个位数，并推高烧钱速度。悲观假设：ARR 停在 $150M-$200M；NRR 降到 110%
              以下；董事会推动 $2.0B-$2.5B 的战略出售（保护后期轮投资人的账面价值）；或以 $1.5B-$2.0B 困境并购，重演 Lacework 情景。悲观情景概率信号：25%。跨情景概率加权企业价值（EV）约
              $2.9B-$3.5B，温和支撑 $2.5B 最后估值标记为合理到小幅折价。
