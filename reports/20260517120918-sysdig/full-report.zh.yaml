      - number: '1.5'
        title: 公司里程碑与反向事件
        blocks:
          - type: paragraph
            body: >
              Sysdig 的时间线是一串以开源信用为锚点的技术首创，并靠企业 SaaS 实现商业化。公司由 Loris Degioanni 于 2013 年创立；2014 年，开源 sysdig 工具诞生，
              成为首个系统调用级容器内省引擎。Falco 于 2016 年创建，并在 2018 年捐赠给 CNCF；这一步以短期专有优势换取长期社区所有权和信任，并不常见。 Falco 在 January 8, 2020 被
              CNCF 接纳为孵化项目，并在 February 29, 2024 晋升为顶级项目，这是云原生安全生态中最强的信用信号。


              融资里程碑与技术里程碑相互呼应：2021 年 Series E（$188 million）踩在云安全市场热情峰值，May 2023 的 Series G（$350 million）则在更克制的利率环境下， 以
              $2.5 billion 估值完成。May 2024 从 Suresh Vasudevan 到 Bill Welch 的 CEO 交接，是一次有计划的运营过渡；不过它与 November 2024 约 10%
              的裁员相距不远，后者是公司近期历史中最重要的反向事件。裁员时公司没有公开发布收入预警，但这表明 Sysdig 在计划流动性路径之前，有意识地调整成本结构。 FedRAMP
              授权状态曾出现在面向客户的材料中，但准确授权日期未公开确认。
