      - 排除支出
      - 主要买方 / 付款方
      - 与 Sysdig 的相关性
    rows:
      - - CNAPP——平台（核心）
        - 提供 CSPM + CWPP + KSPM + CIEM + 运行时安全的统一平台
        - 单独销售的 CSPM 或 CWPP 单点方案；仅限本地部署的安全
        - 企业 CISO、云安全架构师、DevSecOps 负责人
        - 直接相关——Sysdig 作为集成 CNAPP 平台竞争
      - - 云工作负载保护（CWPP）
        - 容器、VM、无服务器运行时威胁检测；漏洞扫描；合规监控
        - 缺少云原生支持的传统端点 EDR
        - 安全运营、云平台团队
        - 核心——由 Falco 运行时驱动的 Sysdig Secure CWPP
      - - 云安全态势管理（CSPM）
        - 配置漂移、合规基准（CIS、NIST）、IaC 扫描、错误配置告警
        - 手工云控制台审计
        - 云架构师、合规负责人、DevOps
        - 核心——Sysdig Secure CSPM 模块
      - - Kubernetes 安全态势管理（KSPM）
        - K8s 集群加固、RBAC 审计、准入控制、网络策略验证
        - 未配置安全控制的 Kubernetes
        - 平台工程、SRE、Kubernetes 管理员
        - 核心——Sysdig K8s 原生安全、Falco 集成
      - - 云基础设施权限管理（CIEM）
        - IAM 最小权限、访问审查、权限升级检测
        - 静态 IAM 策略审查
        - 身份治理、安全架构师
        - 已纳入——Sysdig Secure CIEM 能力
      - - 运行时安全（基于 Falco）
        - eBPF 内核插桩、系统调用监控、行为异常检测、威胁狩猎
