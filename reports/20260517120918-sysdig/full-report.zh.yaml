      - number: '6.3'
        title: 留存信号与扩张模式
        blocks:
          - type: paragraph
            body: >
              Sysdig 不公布净留存率（NRR）、总留存率（GRR）或流失率。这些是本客户章节最关键的缺失数据点。没有可独立验证的留存指标，就无法确认收入耐久性。本研究审阅的第三方分析师报告中，没有包含经独立验证的
              Sysdig 留存数据。下面所有留存分析都从案例研究内容中的二级信号，以及没有记录到流失事件这一点推断而来。[CU032] [CU035]

              最强留存信号是 Bloomreach 有记录地从 Sysdig Monitor 扩展到 Sysdig Secure——同一客户关系内，从可观测性增购到完整 CNAPP。[CU011] [CU034]
              其他案例研究没有明确记录多产品扩张事件，但 Neo4j 提到与 Sysdig 管理层进行季度业务复盘，并共同对齐长期路线图，暗示合同周期可能跨多年。JumpCloud 的 CISO 描述了一次有意的「自建 vs.
              采购」评估，结论是如果要独立复制 Sysdig 的开箱交付能力，需要额外投入多名工程师——这是切换成本叙事，也暗示留存具备耐久性。[CU006]

              对已经部署的 Sysdig 账号，平台粘性结构性较高：eBPF/Falco 代理在所有容器化工作负载的内核层打点，历史运行时事件数据沉淀在平台里，合规基准历史嵌入仪表盘，Sysdig Sage 的 AI
              助手也会随着时间推移，开始按客户具体环境定制指引。迁出 Sysdig 意味着重新打点检测、重建合规基线，并让安全团队重新学习新工具；对已经把漏洞管理游戏化（如 JumpCloud 使用排行榜），或把 Sysdig
              告警接入 Slack、PagerDuty 工作流的团队来说，这是一笔显著切换成本。

              独立评论平台 PeerSpot 基于四条评论给 Sysdig Monitor 打出 8.0/10，80% 评论者愿意推荐。样本很小（截至 May 2026，PeerSpot
              上只有四条评论），没有统计显著性，但汇总层面没有出现反向满意度信号。负面反馈集中在缺少 APM 和 OpenTelemetry 支持，以及 Windows 安装摩擦；这些用例都不在 Sysdig 核心
              Kubernetes/Linux 定位内。[CU028] [CU029] [CU030]
            claimRefs:
