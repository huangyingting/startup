      - number: '8.4'
        title: 投资逻辑破裂触发条件与最终尽调问题
        blocks:
          - type: paragraph
            body: >-
              投资命题破裂触发项，是一旦发生就会把 CONDITIONAL-BUY 建议下调至 TRACK 或 AVOID 的事件。最核心的触发项是 ARR 核验低于 $150M；按上一轮 $2.5B 估值计算，ARR
              倍数会超过 17x，对于一家未披露经营指标的私营公司偏高。第二个触发项是 Wiz 预期 IPO 定价低于 $8B；这会释放整个赛道倍数压缩的信号，并可能下调 Sysdig 的隐含私募估值。第三个触发项是 NRR
              低于 105%，意味着现有客户群出现净收缩。管理层离任也会触发重估——尤其是 CEO Welch 上任 24 个月内离职，将显示董事会不稳和战略漂移。 如果监管对 Sysdig 的 FedRAMP
              授权采取重大行动，联邦渠道也会关闭。


              最终投资执行尽调清单，集中在五组无法从公开材料取得的信息。第一，FY2023、FY2024 和 FY2025 经审计 ARR，以及收入确认方法和递延收入排期。 第二，按年度客户分组统计的
              NRR，定义为同一起始分组的美元口径扩张减去收缩和流失。第三，截至 2026 年 3 月的现金余额和月度烧钱速度，
              以及通往下一次融资事件的预测。第四，完整股权结构表，包括优先权条款、反稀释条款，以及按股份类别拆分的清算顺位。第五，2023 年 5 月以来任何为 Sysdig
              股权形成成交价格的二级市场交易（要约收购、员工流动性事件）。
            claimRefs:
