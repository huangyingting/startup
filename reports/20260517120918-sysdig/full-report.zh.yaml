      - number: '2.4'
        title: 增长驱动与结构性顺风
        blocks:
          - type: paragraph
            body: >
              监管强制和合规要求是全球 CNAPP 采用最强的结构性需求驱动。在美国，CISA 的跨部门网络安全绩效目标将 IT 和 OT 安全对齐到 NIST Cybersecurity Framework
              2.0，为全面云安全平台带来联邦采购压力。FedRAMP 授权——Sysdig 于 October 2025 获得——是联邦民事机构部署云安全的前提。
              美国国防部网络安全成熟度模型认证（CMMC）要求供应链安全控制，需要对容器化国防应用具备运行时可见性。


              在欧盟，NIS2 指令（2024–2026 分阶段执行）把强制网络安全要求扩展到 18 个行业类别，包括能源、医疗、制造和数字基础设施；这些行业都是云原生架构重度采用者。 GDPR
              施加数据泄露通知和保护要求，推动对数据分类、访问日志和加密管理等 CNAPP 能力的需求。行业专项要求包括支付处理商的 PCI-DSS、医疗的 HIPAA、SaaS 厂商的 SOC 2； 这些都要求 CNAPP
              平台自动化持续合规监测。


              Kubernetes 和容器采用内生地创造对专用安全的需求。CNCF 2025 年度调查显示，82% 容器用户在生产环境部署 Kubernetes，高于 2023 年的 78%，且 66% 组织将
              Kubernetes 用于生成式 AI 工作负载。容器生命周期仍然短暂——70% 容器存活五分钟或更短——使传统基于代理的安全方式难以落地，也让 Falco 这类基于 eBPF 的运行时检测产生结构性需求。
              大型企业的 Kubernetes 集群平均拥有 50+ namespaces 和 500+ microservices，攻击面复杂度已超出人工安全审查可规模化处理的范围。


              云工作负载整合和工具蔓延收缩推动平台采购。Gartner 2023 年研究显示，企业平均管理 60+ 安全工具，造成告警疲劳、集成开销和技能缺口。从点状方案转向一体化平台（CNAPP 整合
              CSPM、CWPP、KSPM、CIEM），可以减少供应商数量、授权复杂度和培训负担。MarketsandMarkets 将这一整合趋势列为 2027 年前 CNAPP 平台的主要增长驱动。


              真实世界云威胁活动持续制造紧迫感。IBM 2025 年《数据泄露成本》报告估计，全球平均数据泄露成本为 $4.4 million；由于数据外泄速度更快，云泄露成本平均比本地事件高 12%。
              高曝光度的云勒索软件活动、挖矿僵尸网络和供应链攻击（SolarWinds、Log4Shell、3CX）说明云原生应用已经成为活跃目标。Sysdig 年度《云原生安全与使用报告》
              追踪这些趋势，并把运行时威胁检测定位为必需能力，而非可选项。
