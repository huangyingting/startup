      - number: '1.2'
        title: 创始人、管理层与董事会治理
        blocks:
          - type: paragraph
            body: >
              Loris Degioanni 是创始人兼首席技术官。Degioanni 在 Politecnico di Torino 攻读 PhD 期间，于 1990s 共同创建
              Wireshark，由此在网络和系统内省领域建立深厚信用。 他在 2014 年创建开源 sysdig 工具，把它做成全球首个面向容器的系统调用级内省层，随后在 2016 年推出
              Falco。他的技术深度和开源声誉，仍是公司招聘和赢得企业信任的核心资产。


              Bill Welch 于 May 2024 加入并担任 CEO，接替 2018 至 2024 年领导公司的 Suresh Vasudevan。Welch 曾任 Pure Storage 和 Alteryx
              CEO， 两家公司都在他任内经历重要商业增长阶段，具备规模化经验。他的任命表明，Sysdig 董事会把企业级市场销售执行置于未来流动性事件之前。Karen Walker 于 2021 年加入并担任 CFO，
              此前在 Uber 和 Virgin America 负责财务，带来 IPO 准备经验。Gary Olson 加入担任 CRO，任务是加速收入增长；在 Snyk，Olson 任职第一年就帮助 ARR 增至 $300
              million。


              董事会由 Enrique Salem（Bain Capital Ventures）担任主席。其他董事包括 Rob Schwartz（Third Point
              Ventures）。投资人占比高的董事会，符合一家走向流动性事件的后期私营公司特征。 关键人依赖集中在两个节点：Loris Degioanni 是技术与社区信用锚点，Bill Welch
              是企业级商业化的主要驱动者。May 2024 的领导层更替，相比单一长期创始人 CEO 降低了 CEO 关键人风险； 但 Degioanni 和 Welch 对公司外部定位都不可或缺。
