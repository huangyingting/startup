        - 经认证股权结构表及优先权瀑布；法律顾问审阅 IRA 和 SHA
      - - 2024 年裁员范围
        - 部分确认 — 仅行业报道，无官方声明
        - ~10% 裁员意味着 ~70 名员工；指向烧钱压力或重组
        - 行业媒体报道（CRN、The Register、layoffs.fyi）；官方未确认
        - 要求提供按季度官方员工数；若允许，通过前员工访谈验证
    notes: >
      截至 2026 年 5 月，Sysdig 未披露本表所有指标。公司未发布 S-1、经审计财务报表，也没有任何会要求披露收入的 SEC 文件。代理指标和尽调路径用于 NDA
      下的正式尽调。「最佳可用代理指标」数字均为低置信度的分析师估计。
