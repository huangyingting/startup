  - number: 5
    title: 产品与技术
    sections:
      - number: '5.1'
        title: 云原生应用保护平台概览
        blocks:
          - type: paragraph
            body: >
              Sysdig 提供统一的云原生应用保护平台（CNAPP），把云安全态势管理（CSPM）、云工作负载保护（CWPP）、云检测与响应（CDR）、云基础设施权限管理（CIEM）整合进一个 SaaS
              平台。产品表面分成两个品牌模块：Sysdig Secure（安全）和 Sysdig Monitor（可观测性）；另有 2023 年推出的生成式 AI 助手 Sysdig
              Sage，用自然语言呈现按优先级排序的安全发现。平台覆盖五个已记录的核心用例：漏洞管理、运行时安全、云检测与响应、态势管理、权限和授权管理。

              平台差异化靠三根支柱。第一，Falco 是 Sysdig 在 2016 年创建并捐给 CNCF 的基于 eBPF 的运行时威胁检测引擎；它在 February 2024 晋升为 CNCF
              顶级项目，验证了社区生产就绪度。第二，运行时洞察把容器镜像漏洞、云配置漂移和实时进程活动关联到一个按风险排序的视图中；在有记录的部署里，可操作告警量减少超过 95%。第三，555 Benchmark 声称 5
              秒内完成威胁检测、5 秒内完成关联、5 分钟内发起响应，让 Sysdig 能对标无法做到实时响应的纯无代理竞争对手。

              平台支持在 AWS、Azure、Google Cloud 上部署，既有基于代理（eBPF）的模式，也有无代理扫描模式。Sysdig 已上架三大云市场，并获得每家云厂商的安全合作伙伴认证。产品集成库记录了 700
              多个预构建连接器，覆盖 SIEM（Splunk、IBM QRadar）、SOAR（PagerDuty、ServiceNow）和开发者工具（GitHub Actions、Jenkins、VS
              Code）。Sysdig 在 2024 年获得 FedRAMP Moderate 授权，可以服务美国联邦机构和受监管的政府承包商；这是一道多数纯 CNAPP 竞争对手尚未跨过的认证门槛。
