      - number: '3.3'
        title: 护城河与可防御性
        blocks:
          - type: paragraph
            body: >
              Sysdig 最持久的竞争护城河是 Falco 开源生态。Falco 于 October 2018 贡献给 CNCF，在 January 2020 进入孵化状态，并于 February 29, 2024 达到
              CNCF 毕业成熟度；这一里程碑意味着，管理 Kubernetes 和 containerd 的同一基金会认可其生产就绪。Falco 累计下载超过 100 million
              次，已成为容器化环境中内核级运行时安全的事实标准。这种社区渗透带来开发者到企业的管道：在开源中使用 Falco 的工程师，在企业场景中更容易选择 Sysdig。没有直接竞争对手拥有同等规模、且已从 CNCF
              毕业的运行时安全项目；CrowdStrike、Wiz 和 PANW 依赖专有内核代理或无代理路径，缺少 CNCF 治理。


              企业一旦在生产环境部署 Sysdig 的 eBPF 代理，切换成本很高。Falco 内核驱动或 eBPF 探针在每个工作负载节点的 OS
              层做检测；替换它需要重新检测整支集群、重新配置检测规则（这些规则往往按组织上下文定制）、迁移历史事件数据，并重新培训安全运营团队。Sysdig 基于 Prometheus 的监控集成（Sysdig
              Monitor）会放大这些成本，因为平台工程团队形成了双重依赖。


              Sysdig 的 FedRAMP Moderate 授权（October 2025 获得）在美国联邦市场提供了可防御位置，并非所有竞争对手都已跨过这道门槛。联邦民事机构采购 CNAPP 要求
              FedRAMP，形成强制准入门槛。Wiz 和 PANW 也有各自 FedRAMP 路径，但该授权为政府账户增加了一层监管切换成本。


              Sysdig 护城河的关键衰减风险包括：无代理 CNAPP 厂商加入 eBPF 传感器（Orca Sensor、Wiz Defend），缩小运行时深度差距；PANW 平台化策略在企业协议中以低于成本的方式打包
              CNAPP，压缩独立 CNAPP 定价；Google Cloud 和其他 CSP 扩展原生安全工具（GCP Security Command Center、AWS
              GuardDuty），提供免费的运行时信号；以及若企业贡献者把治理注意力转向替代项目，Falco 社区可能碎片化。


              竞争对手反向证据：Fortinet 在 June 2024 以未披露价格收购 Lacework，价格远低于 Lacework 2021 年 $8.3 billion 峰值估值；这说明中腰部 CNAPP
              厂商夹在资本充足的既有厂商和高速增长独角兽之间，会面临怎样的风险。Sysdig 以估值衡量处在类似中腰部位置（Series G $2.5B，而 Wiz 为 $12B、PANW 市值
              $100B），必须证明自己能走向更大规模，或以溢价被收购。
