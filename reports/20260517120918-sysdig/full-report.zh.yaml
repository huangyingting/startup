      - number: '1.3'
        title: 融资历史、估值与投资人图谱
        blocks:
          - type: paragraph
            body: >
              自 2016 年以来，Sysdig 已在七轮公开披露融资中募集约 $745 million。资本结构显示，公司从早期风险投资一路推进到后期成长股权，其中 Series G 是决定性融资事件。 Vista
              Equity Partners 在 May 2023 领投 $350 million Series G，投后估值 $2.5 billion。Permira、Accel、Bain Capital Ventures、
              Insight Partners、DFJ Growth、Third Point Ventures、Goldman Sachs 和 Guggenheim 都是现有或历史投资人。投资人组合覆盖面广，
              既有传统风投，也有专注基础设施的成长股权机构，符合一家技术风险已降低、但仍需要资本扩大市场销售的公司状态。


              $2.5 billion 估值发生在云安全 SaaS 倍数受压的时期。2024 年 Lacework-Fortinet 交易中，一家资金充足的 CNAPP 同行相对峰值估值以折价出售， 展示了后期 CNAPP
              公司若无法证明收入规模足以支撑增长时代估值，会面临怎样的风险。Sysdig 自 May 2023 后未披露新的新股融资轮；这可能说明公司在资本管理上更克制， 也可能说明管理层把重点放在提高 ARR
              对既有估值的覆盖度，或两者兼有。


              融资历史从 2016 年 Series A（约 $5.6 million）延伸到 2023 年 Series G（$350 million），关键拐点包括 2021 年 Series E（$188
              million） 和 Series G。每一轮都引入新的战略投资人，这些投资人如今拥有董事会或观察员席位和信息权，形成了一个成熟的投资人群体，并在及时实现流动性事件上利益一致。
