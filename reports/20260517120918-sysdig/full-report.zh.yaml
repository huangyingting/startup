      - number: '2.5'
        title: 采用约束与市场风险
        blocks:
          - type: paragraph
            body: >
              尽管监管和威胁顺风强劲，CNAPP 采用仍面临持久的结构性约束。首要技术壁垒是 CSP 原生工具碎片化：AWS、Azure、Google Cloud 都提供专有安全工具（AWS Security Hub、
              Azure Defender、Google Security Command Center），可免费或低成本完成基础态势监测，让已经投入 CSP 生态的企业形成采购惯性。Sysdig 这类第三方 CNAPP
              平台必须证明自己相对 CSP 原生工具有清晰增量价值——通常来自更强运行时检测、多云标准化或高级威胁关联——才能支撑新增支出。


              技能稀缺限制采用速度。Kubernetes 和容器安全需要 Linux 内核内部机制、eBPF 检测、网络策略和云 IAM 等专门能力；即使在大型企业，这些技能也稀缺。组织很难为云安全运营中心（SOC）
              配齐同时理解传统安全和云原生架构的人。CNAPP 厂商用托管服务和 AI 辅助检测（Sysdig 的 “Sage” GenAI 助手）缓解问题，但底层技能缺口限制了企业部署后把平台运营起来的速度。


              市场整合风险很尖锐。大型 IT 安全既有厂商——Palo Alto Networks、CrowdStrike、Cisco、Microsoft——正借助 M&A 收购 CNAPP 能力（Palo Alto 收购
              Bridgecrew 和 Cider Security；CrowdStrike 收购 Bionic 布局 ASPM），也在自建云模块，可能把独立 CNAPP 厂商商品化。云服务提供商也在扩张安全产品：AWS 收购
              Wickr 补强安全通信，Azure 把 Defender 集成进所有企业 SKU，Google 收购 Mandiant 获取威胁情报。若 CSP 以边际成本打包全面、等同 CNAPP
              的能力，独立厂商将面临毛利挤压。


              告警疲劳和误报率削弱 CNAPP 价值兑现。Kubernetes 和容器环境会生成海量事件——大型集群每小时产生数百万 API 调用、系统调用和网络流。若 CNAPP 平台产生高误报率，
              安全团队会陷入告警疲劳，并开始忽略或关闭检测。Sysdig 的运行时重点（借助 Falco 内核级可见性）试图用行为上下文降低误报，但达到可接受的信噪比仍是全行业挑战。


              经济敏感性会影响企业安全预算。云安全支出与云采用率相关，而云采用率受宏观经济影响。经济下行时，企业会推迟云迁移并冻结基础设施支出，直接拉长 CNAPP 销售周期。 2023–2024 年企业 IT
              支出放缓压缩了全行业 CNAPP 厂商增长率。Sysdig 的私营状态遮蔽了收入轨迹，但上市 CNAPP 厂商（SentinelOne、CrowdStrike 云模块） 在这一时期报告了销售周期拉长和交易压缩。


              市场规模估计分歧带来尽调风险。MarketsandMarkets 对 2027 年 CNAPP TAM 的 $19.3B 估计，与 Allied Market Research 对 2032 年云安全 TAM 的
              $125.8B 估计相差 4×，反映了定义模糊、分析方法差异，以及市场对品类边界缺乏共识。若没有买方调研、采购数据或厂商收入披露来独立验证细分市场支出，投资人不能依赖自上而下的 TAM 估计。
