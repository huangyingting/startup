      - number: '5.3'
        title: 信任、合规、差异化与路线图
        blocks:
          - type: paragraph
            body: >
              Sysdig 在 2024 年获得 FedRAMP Moderate 授权，可以服务美国联邦机构和受监管的政府承包商。这是一个重要差异化点：截至 May 2026 研究日期，多数纯 CNAPP
              竞争对手尚未跨过这道授权门槛。Sysdig 信任页面还记录平台符合 SOC 2 Type II、ISO 27001、PCI DSS 和 HIPAA；但这些认证没有公开可获取的独立审计报告，FedRAMP
              授权范围（覆盖哪些模块和区域）也没有在新闻稿中说明。


              Gartner 在 Peer Insights 项目中把 Sysdig 评为 CNAPP 和 CSPM 的 Customers Choice，Forrester 也在 CNAPP Wave 报告中将 Sysdig
              列为领导者。这些认可提供了第三方分析师对企业级成熟度的验证，也补充了 2024 Gartner CNAPP Magic Quadrant 入选信号。G2 和 TrustRadius
              评论进一步确认客户满意度，运行时检测深度和 Kubernetes 可见性经常被提为优势。


              关键产品风险包括：（1）Windows 工作负载覆盖缺口——eBPF 代理只支持 Linux，排除了有大量 Windows server 部署的企业；（2）Falco CNCF 治理风险——核心检测引擎由
              CNCF 社区治理，并非 Sysdig 独占控制，分叉或治理变化可能让竞争对手做出同等运行时检测能力；（3）R&D 产能担忧——Sysdig 确认 November 2024
              发生裁员，但范围未披露，TechCrunch 和 The Register 均有报道；（4）竞争压力——Wiz 在 mid-2024 融资  billion、估值 2 billion，继续加剧无代理 CNAPP
              领域竞争。根据公开产品方向信号推断，2026 路线图会聚焦三件事：通过 Sysdig Sage 推动 AI 驱动的安全工作流，扩大多云环境无代理覆盖，并更深地集成开发者工具链。
