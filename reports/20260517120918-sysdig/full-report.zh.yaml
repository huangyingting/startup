    Sysdig, Inc. 是一家总部位于 San Francisco 的云原生安全公司，2013 年由 Loris Degioanni（Wireshark 联合创建者）和 Draios 团队创立。商业产品组合围绕 Sysdig
    Secure 展开，这是一套云原生应用保护平台（CNAPP），覆盖 CSPM、CWPP、KSPM、CIEM、漏洞管理、容器 / IaC 扫描以及云检测与响应；另有 Sysdig Monitor，这是一款兼容 Prometheus
