chapter:
  number: 3
  title: "Competitors"
  summary: >-
    Sysdig operates in a fiercely competitive CNAPP market dominated by Wiz (agentless leader, >50%
    Fortune 100, ~$1B raised at $12B+ valuation), Palo Alto Networks Prisma/Cortex Cloud (~$100B market
    cap, 70K+ customers), and CrowdStrike Falcon Cloud Security ($4B+ ARR). Sysdig's primary moat is
    Falco—the CNCF Graduated open-source runtime security engine (graduated February 29, 2024)—giving it
    unmatched kernel-level eBPF visibility that agentless competitors cannot replicate without deploying
    an agent. Lacework's acquisition by Fortinet (June 2024) at a distressed valuation validates the
    consolidation pressure on mid-tier CNAPP vendors. Key risks include Wiz's distribution power and
    developer community, PANW's platformization bundling lock-in, and CSP-native tools as free substitutes.
    Sysdig's FedRAMP Moderate authorization (October 2025) and unified Secure+Monitor platform are
    defensible differentiators, but revenue scale remains below all three public-market peers.

sections:
  - id: competitor-landscape
    title: "Competitor Landscape"
    body: |
      The CNAPP competitive landscape as of May 2026 is structured across four tiers: agentless-led
      unicorns (Wiz, Orca Security); public-company incumbents leveraging adjacent platforms (Palo Alto
      Networks Prisma/Cortex Cloud, CrowdStrike Falcon Cloud Security); open-source-heritage specialists
      (Sysdig, Aqua Security); and developer-first AppSec entrants expanding into cloud (Snyk). The
      Fortinet acquisition of Lacework in June 2024 created a fifth category: network-security incumbents
      entering CNAPP via M&A, now branding the product FortiCNAPP.

      Wiz is the fastest-scaling pure-play CNAPP vendor and Sysdig's most frequently cited direct
      competitor. Founded in 2020 by ex-Microsoft Azure team members, Wiz reached more than 50% Fortune
      100 penetration and protects more than 5 million cloud workloads with 230 billion files scanned
      daily. Wiz raised approximately $1 billion in Series E funding at a $12 billion valuation in May
      2024 and subsequently rejected a reported $23 billion acquisition offer from Google/Alphabet. Wiz's
      platform is built on a proprietary security graph that connects code, cloud, and runtime context
      without requiring kernel agents—a deployment simplicity advantage for organizations prioritizing
      fast time-to-value.

      Palo Alto Networks (PANW) is the incumbent enterprise security platform with approximately $100
      billion market capitalization, more than 70,000 global customers, and coverage of 9 of 10 Fortune
      10 companies. Its Cortex Cloud platform (rebranded from Prisma Cloud) analyzes 1 trillion events
      per 24 hours and detects 1.5 million new attacks daily using Precision AI. PANW's platformization
      strategy bundles CNAPP with endpoint (Cortex XDR), SASE (Prisma SASE), and network security,
      creating procurement inertia and cross-sell leverage that pure-play competitors cannot replicate.
      SEC EDGAR confirms PANW as a large-cap public company filing annual 10-K reports.

      CrowdStrike (CRWD) brings AI-native endpoint security heritage to cloud via Falcon Cloud Security.
      CrowdStrike tracked 281+ global adversaries and reported 89% response time acceleration in cloud
      detection and response as of 2026. Notably, CrowdStrike experienced a major reputational adverse
      event in July 2024 when a faulty Falcon sensor content update caused widespread Windows system
      outages—affecting enterprise trust in agent-based security vendors, a dynamic from which Sysdig's
      eBPF approach (lower kernel footprint) may benefit.

      Aqua Security (founded 2015, approximately $259M raised) maintains a container-security heritage
      and differentiates through open-source projects: Trivy (container vulnerability scanner) and
      Tracee (eBPF runtime security). Orca Security (founded 2019, approximately $630 million raised
      at a $1.8 billion valuation) pioneered the SideScanning agentless approach and has since added
      an eBPF-based Orca Sensor for real-time detection. Snyk targets developer-first application
      security across code, open-source dependencies, containers, and IaC—overlapping with Sysdig's
      CI/CD pipeline security but not its runtime detection depth.

      Gartner research found that 60% of enterprises were consolidating CWPP and CSPM to a single
      vendor, up from 25% in the prior year—a trend that benefits comprehensive platforms but also
      accelerates pressure on niche specialists. Market consolidation is expected to intensify through
      2026 as public-company acquirers integrate CNAPP capabilities into bundled security platforms.
