  - id: pricing-and-gtm-overlap
    title: "Pricing and GTM Overlap"
    body: |
      Pricing across CNAPP vendors is universally non-transparent: no tier-1 vendor publishes list prices.
      Wiz's pricing is modular and workload-scaled, with four commercial tiers—Wiz Cloud (agentless
      posture), Wiz Code (developer security), Wiz Defend (CDR/runtime), and Wiz Sensor (eBPF agent)—
      each priced via custom enterprise quotes. Wiz's G2 rating of 4.7 stars from 772+ reviews reflects
      strong buyer satisfaction and suggests aggressive pricing in initial deals to capture Fortune 500
      logos.

      Sysdig prices on a consumption basis—per host, per container, or per workload—with enterprise
      agreements bundling Sysdig Secure (CNAPP) and Sysdig Monitor (observability). Sysdig's pricing
      pages redirect to a "contact sales" flow, confirming no publicly available rates. The dual
      Secure+Monitor bundle is a GTM differentiator: Sysdig can enter accounts via observability (lower
      friction) and expand into security (higher value), a land-and-expand motion not available to
      pure-play CNAPP competitors.

      CrowdStrike uses a per-endpoint/per-module pricing model with bundled Falcon Go, Pro, and Enterprise
      tiers. Cloud security modules are add-ons to existing Falcon subscriptions, giving CrowdStrike's
      cross-sell team a significant advantage in Falcon-installed-base accounts. PANW similarly leverages
      existing Cortex and NGFW relationships, offering platformization discounts that make CNAPP near-free
      in bundle renewals—a pricing weapon that pure-play CNAPP vendors cannot match.

      Snyk offers developer-facing pricing with a free tier (limited scans), team tier, and enterprise tier.
      Published team pricing at approximately $25/developer/month is unusual transparency for the DevSecOps
      segment. Aqua and Orca are both custom-quote only. The GTM distribution advantage belongs clearly to
      the platform incumbents (PANW, CrowdStrike) that have embedded sales teams in enterprise accounts and
      can bundle CNAPP at marginal cost. Sysdig's mitigant is the Falco community: practitioners who deploy
      Falco open source become Sysdig's acquisition pipeline—a developer-led GTM motion that partially
      offsets the distribution gap versus PANW and CrowdStrike.
