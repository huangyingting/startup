  evidenceGaps:
    - type: private-evidence-only
      severity: material
      topic: Sysdig-win-loss-displacement-data
      missingEvidence: >-
        Sysdig has not publicly documented named competitive displacement wins against Wiz or CrowdStrike.
        Win-rate, pipeline displacement logs, and account-level loss data are not available in public sources.
      whyItMatters: >-
        Without win/loss data, it is impossible to verify whether Sysdig's runtime-depth positioning
        translates into commercial wins against agentless-first competitors or whether it is ceding
        ground in greenfield enterprise accounts.
      diligencePath: >-
        Request Sysdig competitive deal analysis from sales team in data room; review pipeline stage
        data segmented by primary competitor displacement; obtain customer references for accounts
        that evaluated and chose Sysdig over Wiz or CrowdStrike.
      relatedQuestionRefs:
        - QP023
        - QP024
      relatedTableRefs:
        - TP001

    - type: missing-source
      severity: material
      topic: Sysdig-revenue-market-share
      missingEvidence: >-
        Sysdig does not disclose revenue, ARR, win rates, or market share. No public data source provides
        Sysdig's competitive win/loss rate against Wiz, PANW Prisma Cloud, or CrowdStrike Falcon. The
        estimated ARR range ($350M+) is derived from secondary sources and not confirmed.
      whyItMatters: >-
        Market share and win-rate data would determine whether Sysdig is growing its competitive position
        or ceding ground to agentless competitors. The absence of this data makes commercial moat
        durability assessment speculative rather than evidence-based.
      diligencePath: >-
        Access data room for ARR, NRR, GRR, deal-level competitive displacement logs; request net-new logo
        analysis by competitor; obtain channel partner qualitative win-loss feedback; check secondary-market
        broker intelligence on Sysdig ARR trajectory.
      relatedQuestionRefs:
        - QP025

