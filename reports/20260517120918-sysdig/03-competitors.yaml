  - id: moat-and-defensibility
    title: "Moat and Defensibility"
    body: |
      Sysdig's most durable competitive moat is the Falco open-source ecosystem. Falco was contributed
      to the CNCF in October 2018, moved to Incubating status in January 2020, and graduated to CNCF
      Graduated maturity on February 29, 2024—the milestone that signals production readiness endorsed
      by the same foundation that governs Kubernetes and containerd. Falco has accumulated more than 100
      million downloads, making it the de facto standard for kernel-level runtime security in containerized
      environments. This community penetration creates a developer-to-enterprise pipeline: engineers who
      use Falco in open source are predisposed to Sysdig in enterprise contexts. No direct competitor
      has an equivalent CNCF-graduated runtime security project at this scale; CrowdStrike, Wiz, and PANW
      rely on proprietary kernel agents or agentless approaches without CNCF governance.

      Switching costs from Sysdig's eBPF agent deployment are high once an enterprise is in production.
      The Falco kernel driver or eBPF probe is instrumented at the OS level across every workload node;
      replacing it requires re-instrumenting the entire fleet, reconfiguring detection rules (often
      customized to organizational context), migrating historical event data, and retraining security
      operations teams. These costs compound with Sysdig's Prometheus-based monitoring integration
      (Sysdig Monitor), which creates dual dependency in platform engineering teams.

      Sysdig's FedRAMP Moderate authorization (achieved October 2025) provides a defensible position
      in the U.S. federal market that not all competitors have yet cleared. Federal civilian agency
      CNAPP procurement requires FedRAMP, creating a mandatory gateway. Wiz and PANW have their own
      FedRAMP pathways, but the authorization adds a regulatory switching cost layer in government accounts.

      Key decay risks for Sysdig's moat include: agentless CNAPP vendors adding eBPF sensors (Orca
      Sensor, Wiz Defend) that reduce the runtime depth gap; PANW's platformization strategy bundling
      CNAPP below cost in enterprise agreements, compressing standalone CNAPP pricing; Google Cloud and
      other CSPs expanding native security tools (GCP Security Command Center, AWS GuardDuty) that
      provide free runtime signals; and Falco community fragmentation if enterprise contributors shift
      governance attention to alternative projects.

      Adverse competitor evidence: the Lacework fire-sale acquisition by Fortinet in June 2024—at an
      undisclosed price far below Lacework's peak $8.3 billion valuation from 2021—illustrates the risk
      of mid-tier CNAPP vendors caught between well-capitalized incumbents and fast-growing unicorns.
      Sysdig occupies a similar mid-tier position by valuation ($2.5B at Series G versus Wiz's $12B and
      PANW's $100B market cap) and must demonstrate a path to either scale or acquisition at a premium.
