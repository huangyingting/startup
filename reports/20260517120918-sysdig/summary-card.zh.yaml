summary:
  headline: >
    Sysdig 是由开源带动的 CNAPP 先行者，背后核心资产 Falco 已从 CNCF 毕业，上一轮 May 2023 Series G 估值 $2.5B；但云安全市场正在变得更拥挤、更集中，Wiz 拿走 agentless
    溢价，Palo Alto 和 CrowdStrike 把运行时安全打包进平台销售，叠加 2024 年 11 月裁员和 24 个月融资停顿，在 ARR、NRR、烧钱披露被验证前，只适合条件性买入 / 观察。
