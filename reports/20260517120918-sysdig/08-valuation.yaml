chapter:
  number: 8
  title: Valuation
  summary: >-
    Sysdig's most recently disclosed valuation is $2.5B (Series G, May 2023, led by Permira), with
    total capital raised estimated at $745M-$891M. As of May 2026, 36+ months have elapsed without
    a new primary funding round, and all core financial metrics -- ARR, NRR, gross margin, and burn
    rate -- remain undisclosed. Analyst estimates place ARR at $120M-$300M, implying an 8x-21x ARR
    multiple on the last known valuation. The base case recommendation is CONDITIONAL-BUY at the
    current $2.5B mark, conditional on verification of ARR >=200M, NRR >=120%, and 24+ months of
    runway. Comparable public company benchmarks (CrowdStrike at ~$151B market cap, PANW at ~$197B)
    and private precedents (Wiz at $12B, Lacework distressed at ~$150M) bracket a plausible fair
    value range of $1.8B-$4.5B depending on ARR realization and growth trajectory.

sections:
  - id: thesis-recommendation
    title: Investment Thesis, Anti-Thesis, and Recommendation
    body: >-
      The Sysdig investment thesis rests on three interlocking pillars. First, CNAPP market
      structural growth: the cloud-native application protection platform market is growing at
      18-22% CAGR through 2030, driven by enterprise cloud migration, container adoption, and
      regulatory tailwinds (NIS2, DORA, FedRAMP). Sysdig is a recognized leader in this
      market per both Gartner Magic Quadrant (2024) and Forrester Wave evaluations. Second,
      technical differentiation: Sysdig's eBPF-based runtime security engine and the CNCF-graduated
      Falco project create a durable technical moat that agentless-first competitors are only
      beginning to replicate. FedRAMP Moderate authorization opens a federal market segment that
      many CNAPP competitors have not yet cleared. Third, leadership quality: CEO Bill Welch
      (appointed May 2024), who previously scaled Druva to $1B+ ARR, and CFO Karen Walker
      (IPO-readiness pedigree from Uber and Virgin America) signal a board-backed commitment to
      professional management and a structured liquidity path.


      The anti-thesis is equally material. Wiz has scaled to $500M+ ARR at $12B valuation with
      massive capital resources ($2.4B raised), creating a formidable agentless-first competitor
      whose sensor product is now closing the runtime detection gap. CrowdStrike and Palo Alto
      Networks are bundling CNAPP into broader platform suites, compressing standalone CNAPP
      pricing and creating multi-product bundling pressure. Lacework -- a CNAPP peer that raised
      $1.9B at $8B peak valuation -- was acquired by Fortinet in 2024 at a price widely reported
      as materially below its peak, representing a vivid cautionary scenario. The 36-month gap
      since the Series G raises unanswered questions about growth trajectory and burn sustainability.


      Recommendation: CONDITIONAL-BUY at $2.5B. The valuation stance is FAIR -- not attractive --
      given the 2023 vintage and undisclosed financials. Confidence is MEDIUM. The call upgrades
      to BUY if verified ARR exceeds $200M with NRR >=120%; it downgrades to TRACK if ARR is
      below $150M or runway is under 18 months. Risk rating is MEDIUM, reflecting execution
      risk in a well-funded competitive market rather than existential platform risk.
