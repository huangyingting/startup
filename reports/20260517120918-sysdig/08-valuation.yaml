  evidenceGaps:
    - type: private-evidence-only
      severity: blocking
      topic: ARR
      missingEvidence: >-
        Sysdig's ARR for FY2023, FY2024, and FY2025 has not been disclosed in any press release,
        investor communication, regulatory filing, or credible third-party source. No audited
        figure exists in the public domain.
      whyItMatters: >-
        ARR is the primary input to every valuation model. The 8x-21x implied multiple range at
        $2.5B is unresolvable without a verified ARR figure. A $125M ARR would imply 20x+ (expensive);
        a $300M ARR would imply 8x (attractive). A $175M difference in ARR estimate creates $1.5B+
        difference in implied fair value.
      diligencePath: >-
        Request audited financial statements for FY2022-FY2025 as a condition precedent for
        investment execution; obtain CFO representation letter on ARR definition; require deferred
        revenue roll-forward to confirm ARR quality.
      relatedQuestionRefs:
        - QV002
        - QV021
      relatedTableRefs:
        - TV003
        - TV004

    - type: private-evidence-only
      severity: blocking
      topic: NRR
      missingEvidence: >-
        Net revenue retention rate by cohort has not been disclosed in any public document. No
        investor communication, analyst report, or customer survey has cited a specific Sysdig NRR
        figure. The 119% CrowdStrike benchmark is used as a proxy with no confirmation it applies
        to Sysdig.
      whyItMatters: >-
        NRR is the most important forward-looking quality metric for SaaS businesses. A 10-point
        NRR difference translates to 30%-50% difference in implied company value in DCF models.
        Without NRR, ARR growth sustainability cannot be assessed and the CONDITIONAL-BUY
        recommendation cannot be upgraded to BUY.
      diligencePath: >-
        Request annual cohort waterfall (starting ARR, expansion, contraction, logo churn) for
        FY2022-FY2025; define NRR methodology (ARR-based vs. logo-based); benchmark against
        CrowdStrike 119% and Wiz undisclosed.
      relatedQuestionRefs:
        - QV021
      relatedTableRefs:
        - TV003
        - TV006

    - type: missing-source
      severity: material
      topic: secondary-market-pricing
      missingEvidence: >-
        No secondary market transaction, tender offer, employee liquidity program, or 409A
        appraisal has been publicly disclosed establishing a current Sysdig equity clearing price
        after the May 2023 Series G.
      whyItMatters: >-
        The $2.5B last mark is 36+ months old. Private market multiple compression between 2022
        and 2024 (demonstrated by Lacework, Snyk down-rounds) may have reset implied fair value.
        A current secondary market price would be the most reliable single data point for
        validating or contesting the $2.5B mark.
      diligencePath: >-
        Check Hiive, Forge, EquityZen, and Nasdaq Private Market for Sysdig share transaction
        data; request FY2024 and FY2025 409A appraisals from Sysdig CFO; ask board about any
        tender offer or employee liquidity window since May 2023.
      relatedQuestionRefs:
        - QV016
      relatedTableRefs:
        - TV006
