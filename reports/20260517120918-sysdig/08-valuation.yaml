  - id: TV005
    title: Sysdig Thesis-Break and Stop Triggers
    claimRefs:
      - CV041
      - CV042
      - CV043
    columns:
      - Trigger
      - Threshold / Observable Signal
      - Transmission to Thesis
      - Monitoring Action / Implication
    rows:
      - - ARR below diligence floor
        - Verified ARR <$150M in FY2025 audited financials
        - Implies 17x+ ARR multiple at $2.5B; shifts stance to EXPENSIVE; downgrade to TRACK
        - Require ARR audit as condition precedent before closing any investment
      - - NRR below contraction level
        - Verified NRR <105% for any annual cohort in FY2024 or FY2025
        - Net cohort contraction signals customer satisfaction crisis; thesis collapses
        - Request annual cohort waterfall from CFO; benchmark against CrowdStrike 119%
      - - Wiz IPO prices below $8B
        - Wiz IPO at <$8B valuation (vs. $12B private mark)
        - Sector multiple compression event; private CNAPP marks reset 20-40% lower
        - Monitor Wiz S-1 filing and IPO pricing; adjust private comp multiple assumptions
      - - CEO or CFO departure within 24 months
        - Bill Welch or Karen Walker leaves Sysdig before May 2026
        - Removes scaling and IPO-readiness credentials; signals board instability
        - Track LinkedIn, press releases; request management retention package details
      - - FedRAMP authorization suspension or downgrade
        - GSA suspends or revokes Sysdig FedRAMP Moderate ATO
        - Closes $200M+ federal CNAPP TAM; material ARR risk in government channel
        - Monitor FedRAMP marketplace listing; track any federal incident reports
    notes: >-
      Triggers defined as observable, binary events tied to measurable thresholds. All triggers
      are actionable within standard diligence and post-investment monitoring frameworks.

  - id: TV006
    title: Sysdig Final Diligence Asks
    claimRefs:
      - CV043
      - CV044
      - CV045
    columns:
      - Topic
      - Missing Evidence
      - Why It Matters
      - Owner / Diligence Path
    rows:
      - - ARR and Revenue Recognition
        - Audited ARR for FY2023, FY2024, FY2025; bookings vs. recognized revenue; deferred revenue
        - Primary valuation anchor; without ARR, the 8x-21x multiple range is unresolvable
        - CFO Karen Walker; request audited financials as condition precedent
      - - Net Revenue Retention
        - NRR by annual customer cohort (2022-2025); gross retention vs. net retention split
        - NRR is the single most important SaaS quality metric; 10-point difference = 30-50% EV impact
        - CFO; request cohort waterfall with starting ARR, expansion, contraction, churn
      - - Cash Position and Burn Rate
        - Cash balance as of December 2025; monthly net burn rate; runway projection to next event
        - 36 months without new round raises financing urgency questions; burn determines timing risk
        - CFO; request bank statement and board-approved burn model through 2027
      - - Cap Table and Preference Stack
        - Full cap table by share class; liquidation preferences, anti-dilution, pay-to-play provisions
        - Preference overhang determines common equity value in sub-$2.5B exit scenarios
        - General Counsel; request certified cap table and Series G/F term sheets
      - - Secondary Market Pricing
        - Any tender offer, employee liquidity, or secondary transaction since May 2023; 409A appraisals
        - Most current mark for Sysdig equity; resolves whether $2.5B is still a defensible mark
        - CFO; request 409A reports for FY2024 and FY2025; check Hiive/Forge for secondary activity
      - - FedRAMP Boundary and Scope
        - Authorized system boundary definition; which products and modules are FedRAMP-covered
        - FedRAMP differentiates Sysdig in federal procurement; ambiguous scope limits TAM clarity
        - CTO/Security team; request Authorization to Operate letter and system security plan summary
    notes: >-
      Diligence asks are prioritized in order of valuation sensitivity. Items 1-3 are blocking
      for investment execution; items 4-6 are material but can be addressed post-term-sheet.

