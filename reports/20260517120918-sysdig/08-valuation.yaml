  - id: scenarios
    title: Bull, Base, and Bear Scenario Analysis
    body: >-
      The bull case assumes Sysdig emerges as the runtime-first CNAPP consolidation winner as
      enterprise buyers prioritize depth over breadth and FedRAMP authorization unlocks a
      federal adoption wave. Bull assumptions: ARR reaches $400M+ by 2028 growing at 40%
      CAGR from a ~$200M base (May 2026); NRR sustains above 125%; gross margin expands to
      75%+ as Falco Enterprise Feeds scales; a Series H round or IPO at 12x-15x ARR prices
      between $4.8B and $6.0B. Bull case probability signal: 20% -- requires verified
      trajectory not yet established.


      The base case assumes disciplined enterprise growth amid competitive pressure. Base
      assumptions: ARR grows at 25% CAGR to $300M+ by 2028; NRR sustains at 115%-120%;
      the company reaches operational near-breakeven ahead of a Series H or IPO in 2027;
      exit valuation at 10x-12x ARR of $3.0B-$3.6B. Base case probability signal: 55%.


      The bear case assumes competitive pressure from Wiz platform scale and CrowdStrike/PANW
      bundling compresses Sysdig's growth to single digits and drives accelerated burn. Bear
      assumptions: ARR plateaus at $150M-$200M; NRR declines below 110%; board pursues
      strategic sale at $2.0B-$2.5B (book value protection for later-round investors); or
      distressed M&A at $1.5B-$2.0B mirrors the Lacework scenario. Bear case probability
      signal: 25%. Probability-weighted EV across scenarios is approximately $2.9B-$3.5B,
      which modestly supports the $2.5B last mark as fair to slight discount.
