  - id: valuation-methodology
    title: Valuation Framework and Comparable Analysis
    body: >-
      Sysdig's valuation is assessed using a forward ARR multiple methodology benchmarked
      against public and private CNAPP comparables. Public comparables provide market-clearing
      multiples: CrowdStrike trades at approximately $151B market cap on estimated $4.2B-$4.5B
      ARR (FY2025), implying a 33x-36x ARR multiple; Palo Alto Networks trades at approximately
      $197B on $9B+ platform ARR, implying 21x-22x ARR. These public multiples reflect premium
      pricing for at-scale, high-NRR, diversified security platforms and are not directly
      applicable to Sysdig's pre-IPO, single-platform profile.


      For private growth comparables, a 30%-50% illiquidity discount to public multiples is
      standard for late-stage private SaaS companies. Applying this discount to the CrowdStrike
      multiple (35x times 0.65 = approx 23x) and Wiz's last round (Wiz raised $1B at $12B in
      May 2024 at $500M+ ARR = approx 24x ARR) brackets a premium-private-CNAPP multiple range
      of 20x-24x for best-in-class profiles. For a conservative base case applying 8x-12x ARR --
      appropriate for a late-stage private company with undisclosed metrics -- the implied fair
      value range spans $1.0B (at $125M ARR x 8x) to $3.6B (at $300M ARR x 12x). The current
      $2.5B mark sits within this range and is supportable at $210M-$312M ARR at 8x-12x multiples.
      Absent ARR verification, the valuation carries material uncertainty of +/-$1.5B around the
      base case.


      Strategic acquirer pricing would likely add a 20%-40% premium, implying $3.0B-$3.5B from
      CrowdStrike, Palo Alto Networks, or Cisco as likely consolidators. However, the Lacework
      precedent demonstrates that CNAPP assets are not immune to distressed acquisition at
      materially below peak valuation if growth stalls.
