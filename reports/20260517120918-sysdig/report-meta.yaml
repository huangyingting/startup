companyProfile:
  summary: >
    Sysdig, Inc. is a San Francisco–headquartered cloud-native security company founded in 2013 by Loris
    Degioanni (co-creator of Wireshark) and the Draios team. Its commercial portfolio centers on Sysdig
    Secure, a Cloud-Native Application Protection Platform (CNAPP) covering CSPM, CWPP, KSPM, CIEM,
    vulnerability management, container/IaC scanning, and Cloud Detection and Response, and Sysdig Monitor,
    a Prometheus-compatible observability product for containers and Kubernetes. Both products are built on
    Falco, the company's open-source runtime security project that graduated from the CNCF in February 2024.
    Sysdig last raised a $350M Series G led by Vista Equity Partners at a $2.5B post-money valuation in May
    2023, bringing cumulative disclosed capital to approximately $745M. The company served Fortune 500
    enterprises and government agencies (Goldman Sachs, IBM, SAP, BigCommerce, the U.S. Air Force, among
    others) and conducted a workforce reduction of ~10% in November 2024, leaving approximately 1,200
    employees as of 2026.
  foundedDate: "2013-01-01"
  founders:
    - name: "Loris Degioanni"
      role: "Founder, CTO, and Chief Open Source Officer"
      background: "Co-creator of Wireshark (1990s) and the open-source sysdig system-call instrumentation tool; creator of Falco; founded Sysdig (formerly Draios, Inc.) in 2013."
      claimRefs: ["CO002", "CO007"]
  foundingLocation: "San Francisco, CA, USA"
  headquarters: "San Francisco, CA, USA"
  productSummary: >
    Sysdig Secure delivers an integrated CNAPP covering posture management (CSPM/KSPM), workload protection
    (CWPP), entitlement management (CIEM), vulnerability management, container and IaC scanning, runtime
    threat detection (Falco), and Cloud Detection and Response benchmarked to Sysdig's 555 framework
    (5s detection / 5min triage / 5min response). Sysdig Monitor is a Prometheus-compatible metrics and
    observability product for containers and Kubernetes. Sysdig Sage, launched 2024, is a generative-AI
    cloud security analyst. All products run on a multi-tenant SaaS backend with eBPF/Falco host agents and
    agentless cloud-account connectors for AWS, Azure, GCP, and OCI.
  customerFocus: "Cloud-native enterprises, financial services, SaaS, e-commerce, healthcare, telecom, and U.S. government / defense agencies running Kubernetes and multi-cloud workloads at scale."
  businessModel: "Subscription SaaS sold primarily on a per-host (per-node) annual contract basis for Sysdig Secure and Sysdig Monitor; open-source Falco is a community-led top-of-funnel motion donated to the CNCF."
  stage: "Series G (late-stage private; no public IPO filing as of run date)"
  fundingStatus: "Series G of $350M at a $2.5B post-money led by Vista Equity Partners in May 2023; total disclosed capital approximately $745M across all rounds; no publicly disclosed primary round since."
