    rows:
      - - Global Oncology Drug Market
        - Chemotherapy, targeted therapy, immunotherapy, hormone therapy drug sales globally (~$196B in 2022)
        - Diagnostics, medical devices, surgery, radiation, supportive care drugs
        - Health insurers (commercial, Medicare, Medicaid), government health systems (NHS, EU)
        - >-
          End-market for approved Eikon drugs EIK1001 and EIK1002; defines competitive pricing ceiling and payer
          constraints
      - - Precision Oncology Sub-Market
        - Biomarker-driven targeted therapies in oncology; companion diagnostics in some estimates ($77–94B, 2022–2023)
        - Non-biomarker chemotherapy, broad radiation, palliative care
        - Same as above; prescribers are oncologists; eligibility gated by biomarker testing labs
        - 'Directly relevant: Eikon''s pipeline targets molecularly defined patient subsets requiring companion diagnostic'
      - - Oncology Drug Discovery / R&D Platform Market
        - Pharma R&D partnerships, milestone and licensing payments for oncology drug candidates, platform access deals
        - Drug sales revenue, clinical trial CRO services, manufacturing, post-market surveillance
        - >-
          Big pharma BD and R&D alliances teams (Merck, Pfizer, Roche, BMS); budget held by CSO and Head of External
          Innovation
        - >-
          Immediate revenue opportunity: Merck deal ($30M equity + milestones) exemplifies this buyer; additional
          partnerships are near-term commercial priority
      - - AI-Enabled Drug Discovery Platform Market
        - >-
          AI models, computational screening services, live-cell imaging tools, bioinformatics platforms ($1.3–1.5B
          annually, 2022–2023)
        - Drug development CRO services, sequencing services, hardware sales not bundled with platform licenses
        - Pharma R&D technology buyers; biotech licensing teams; academic research centers
        - >-
          Structural market context: Eikon's live-cell imaging platform is in this space but distinct from generative AI
          language model platforms
      - - PPI-Targeted Therapeutics Niche
        - >-
          Drugs targeting protein-protein interactions; no independent published size estimate; fewer than 40
          clinical-stage agents globally
        - All other drug target classes (kinases, GPCRs, ion channels via conventional mechanisms)
        - Same as oncology drug market; niche payer willingness-to-pay is unproven at scale
        - >-
          Core technology differentiation: Eikon claims its platform drugs PPI targets inaccessible to conventional
          small molecules; SAM not independently quantified
    notes: >-
      Market size figures are analyst estimates (IQVIA, Grand View Research, MarketsandMarkets) and vary by methodology
      and inclusion criteria. No independent standalone estimate exists for the PPI drug discovery segment.
