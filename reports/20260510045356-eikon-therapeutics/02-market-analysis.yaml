  evidenceGaps:
    - type: missing-source
      severity: blocking
      topic: ppi-drug-discovery-market-size
      missingEvidence: >-
        No independent analyst report publishes a standalone market size estimate for the protein-protein interaction
        (PPI) targeted drug discovery segment as a distinct commercial market. All published estimates embed PPI drugs
        within broader oncology or drug discovery categories.
      whyItMatters: >-
        Without a PPI-specific market size, Eikon's SAM cannot be quantitatively bounded from first principles, leaving
        addressable market claims unsubstantiated by independent evidence and relying entirely on company-defined
        framing.
      diligencePath: >-
        Commission custom research from GlobalData, Clarivate, or Pharma Intelligence with explicit PPI therapeutic area
        segmentation. Request Eikon's investor materials disclosing their internal TAM/SAM estimates for PPI-targeted
        oncology.
      relatedQuestionRefs:
        - QM010
    - type: missing-source
      severity: material
      topic: eikon-internal-sam-estimate
      missingEvidence: >-
        Eikon has not published a proprietary SAM estimate in public filings or press releases, and no independent
        analyst has sized Eikon's specific addressable market as a live-cell imaging platform company for PPI drug
        discovery.
      whyItMatters: >-
        Without an internal or third-party SAM estimate, comparing Eikon's market position to analyst-published AI drug
        discovery TAM numbers creates a false precision that overstates or understates the addressable opportunity.
      diligencePath: >-
        Request Eikon's investor deck or BD materials; review S-1 or 10-K for SAM/SOM disclosures; commission expert
        network interviews with oncology BD professionals who have evaluated Eikon's platform.
      relatedQuestionRefs:
        - QM015
        - QM009
    - type: missing-source
      severity: material
      topic: non-oncology-platform-expansion-evidence
      missingEvidence: >-
        No published evidence confirms or denies that Eikon's live-cell imaging platform has been validated in
        non-oncology disease areas (CNS, cardiovascular, autoimmune), limiting assessment of total platform optionality
        beyond oncology.
      whyItMatters: >-
        If the platform is oncology-only, the TAM is bounded by oncology alone. If expandable to non-oncology, the total
        platform value is materially larger, potentially justifying higher valuation multiples independent of oncology
        clinical results.
      diligencePath: >-
        Review scientific publications from Eikon-affiliated researchers for non-oncology target experiments. Contact
        Eikon IR for platform development roadmap. Review academic collaborator publications citing Eikon's microscopy
        technology.
      relatedQuestionRefs:
        - QM026
    - type: conflicting-data
      severity: material
      topic: ai-drug-discovery-market-size-estimate-conflict
      missingEvidence: >-
        Published estimates for the AI-enabled drug discovery market vary from $1.3 billion to $7.0 billion for the same
        2022–2023 base year—a 5x spread attributable to different inclusion criteria (computational chemistry,
        generative AI, imaging platforms). No reconciling analysis has been published.
      whyItMatters: >-
        The wide estimate range makes it impossible to precisely benchmark Eikon's platform market share or calibrate
        deal size expectations relative to total market. Different analyst estimates lead to materially different
        valuation conclusions.
      diligencePath: >-
        Obtain methodology appendices from Grand View Research, MarketsandMarkets, and McKinsey to understand inclusion
        criteria. Commission a custom market sizing from Clarivate or IQVIA with standardized boundary definition that
        explicitly includes or excludes live-cell imaging platforms.
      relatedQuestionRefs:
        - QM006
        - QM016
