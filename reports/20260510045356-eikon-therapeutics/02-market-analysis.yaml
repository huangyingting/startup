  - id: TM004
    slug: growth-drivers-and-constraints-table
    title: Growth Drivers and Adoption Constraints Table
    description: >-
      Structured assessment of market growth factors and adoption barriers relevant to Eikon's oncology drug discovery
      platform and clinical programs.
    columns:
      - Driver / Constraint
      - Direction
      - Timing
      - Implication for Eikon
      - Diligence Ask
    rows:
      - - Rising global cancer incidence (19.3M cases/yr 2020 → 28.4M projected 2040)
        - Growth driver
        - Long-term (5–15 years)
        - >-
          Increases size of addressable patient population for Eikon's oncology drugs; drives pharma R&D budget
          expansion
        - >-
          Which tumor types are driving incidence growth fastest? Is Eikon's melanoma + PARP focus aligned with
          incidence trends?
      - - Record FDA precision oncology approvals (14 with companion diagnostics in 2023)
        - Growth driver
        - Near-term (1–3 years)
        - Validates precision oncology regulatory pathway; increases payer precedents for high-cost targeted drugs
        - >-
          What is the FDA approval probability for Eikon's programs? How does FDA's precision guidance apply to TLR
          agonists?
      - - AI drug discovery deal activity surge ($2B+ in deal value, 2023)
        - Growth driver
        - Near-term (1–3 years)
        - Increases market validation for AI platform partnerships; improves Eikon's negotiating position on deal terms
        - How does the Merck deal compare to peer AI drug discovery deals? Are Eikon's deal economics improving?
      - - Declining genomic sequencing costs (WGS <$200 in 2024)
        - Growth driver
        - Near-term (1–3 years)
        - >-
          Expands biomarker testing accessibility; expands patient eligibility identification for precision oncology
          drugs
        - >-
          Does Eikon's companion diagnostic strategy leverage NGS testing? What biomarker assay is required for EIK1001
          patient selection?
      - - Pharma R&D productivity crisis (average IRR fell to 1.2% in 2023)
        - Growth driver
        - Near-term (1–3 years)
        - Creates urgency for pharma to adopt external AI platforms; strengthens Eikon's partnership value proposition
        - >-
          Which therapeutic areas within oncology are pharma most willing to access via platform partnerships vs
          internal discovery?
      - - High oncology clinical failure rates (~89% Phase II/III attrition)
        - Adoption constraint
        - Persistent (structural)
        - >-
          AI-discovered leads may fail in the clinic just as conventional leads do; market skepticism persists until
          clinical proof
        - >-
          Has Eikon published any data showing its platform-discovered compounds have higher preclinical-to-clinical
          translation rates?
      - - 10–15 year drug development timelines
        - Adoption constraint
        - Persistent (structural)
        - >-
          Platform partnerships generate milestone revenue slowly; Eikon must manage cash burn against multi-year
          timeline
        - >-
          What is Eikon's expected timeline to first clinical readout for EIK1001? Does Breakthrough Therapy Designation
          apply?
      - - IRA drug negotiation (CMS)
        - Adoption constraint
        - Near-term (1–3 years)
        - Post-approval price negotiation by CMS reduces net realized revenue for Medicare Part D oncology drugs
        - >-
          Are Eikon's lead indications subject to IRA negotiation timelines? What peak sales estimates assume under
          IRA-adjusted pricing?
      - - Back-loading trend in AI platform deals (2024)
        - Adoption constraint
        - Near-term (1–3 years)
        - >-
          Pre-clinical platform deals reset to smaller upfront sums; large payments require clinical-stage validation
          data
        - Does Eikon have Phase I readout data sufficient to command $100M+ upfront in its next platform deal?
    notes: >-
      Timing assessments are qualitative estimates based on market and regulatory analyst reports. Eikon-specific
      diligence asks represent research team priorities, not confirmed information from the company.
