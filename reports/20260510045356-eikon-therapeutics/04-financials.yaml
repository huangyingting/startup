  evidenceGaps:
    - type: private-evidence-only
      severity: blocking
      topic: Eikon-financial-private-data
      missingEvidence: "Eikon's current cash on hand, monthly operating expense breakdown, annual burn rate by category, and total collaboration revenue from Merck are all private and unavailable from any public source. All public financial estimates are back-calculations from funding round data and peer comparables."
      whyItMatters: "Without cash position and burn rate, runway modeling is speculative. The difference between $150M and $350M remaining cash represents the difference between a 12-month and 36-month runway — a qualitative difference for investment risk assessment."
      diligencePath: "Request audited financial statements (last 2 fiscal years), monthly management accounts (last 12 months), and balance sheet cash position as of most recent quarter. All should be available in data room for a serious financial investor."
      relatedQuestionRefs: [QI003, QI004, QI020]

    - type: private-evidence-only
      severity: material
      topic: Merck-collaboration-exclusivity
      missingEvidence: "The Merck collaboration agreement is private. The existence, scope, and duration of any exclusivity restrictions on Eikon's ability to partner with other pharma companies are unknown. Similarly, whether Merck received board representation, anti-dilution rights, or first-look acquisition rights is undisclosed."
      whyItMatters: "Merck exclusivity restrictions could prevent Eikon from entering $150M+ collaborations with Roche, AstraZeneca, or Pfizer — significantly limiting peak revenue potential. Anti-dilution or board rights could constrain future financing flexibility."
      diligencePath: "Request collaboration agreement or a legal summary of: exclusivity scope (fields of use, target classes, geography, duration); investor rights (board seat, information rights, anti-dilution); first-look or ROFR provisions on acquisition."
      relatedQuestionRefs: [QI024]

    - type: stale
      severity: material
      topic: Eikon-2026-pipeline-progress
      missingEvidence: "No 2026 public updates on Eikon's pipeline status, Phase I data readouts, or new partnership announcements have been identified. The most recent confirmed event is the Merck collaboration (2025). Without 2026 updates, the financial model reflects 2025 knowledge."
      whyItMatters: "If Phase I data for EIK1001 or EIK1002 has been disclosed (even preliminary), it would materially change both the valuation basis for Series D and the probability-adjusted revenue model."
      diligencePath: "Search Eikon's investor page, press releases, and clinical trial registry (ClinicalTrials.gov NCT numbers for EIK1001 and EIK1002) for any 2026 data disclosures. Request Phase I data package from Eikon management."
      relatedQuestionRefs: [QI026]

