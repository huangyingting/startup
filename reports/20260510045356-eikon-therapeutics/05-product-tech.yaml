        The lattice light-sheet microscope, developed by Eikon co-founder Eric Betzig at HHMI Janelia Research Campus,
        illuminates biological specimens with a thin, structured light sheet that minimizes photodamage, enabling
        sustained single-molecule imaging of living cells over minutes to hours.
      type: third-party-reported
      topic: lattice-light-sheet-mechanism
