  - id: S6
    title: Development Roadmap and Key Milestones
    body: >-
      Eikon's near-term product roadmap is dominated by clinical execution. The highest-value upcoming milestone is the
      first interim analysis of TeLuRide-006 (EIK1001 + pembrolizumab in melanoma), expected in 2026-2027, which will
      provide the first signal on whether EIK1001 can improve outcomes over pembrolizumab alone in first-line advanced
      melanoma. Positive data could trigger regulatory discussions with FDA and validate the TLR7/8 mechanism in this
      indication. EIK1003's Phase 1/2 dose-escalation is ongoing, with preliminary safety and efficacy signals expected
      within 12-18 months. EIK1004's CNS-penetrant PARP1 program is earlier stage, with Phase 1 dose escalation expected
      to take 18-24 months before efficacy signals are assessable. EIK1005 (WRN helicase inhibitor) is in IND-enabling
      studies, with an IND filing targeted for 2026-2027. Platform-side, Eikon has announced plans to use SMT to
      actively generate new drug discovery programs, with the goal of achieving SMT-discovered drug candidates that are
      independent of externally acquired assets. The 15% workforce reduction in 2025, attributed to NIH funding cuts,
      concentrated in the research tools division, slowed platform expansion timelines but did not affect active
      clinical trials. Post-IPO capital (~$717M total cash and equivalents) extends runway into H2 2027, providing
      capital to reach key clinical readouts for EIK1001 and EIK1003. However, no pivotal-ready SMT-discovered asset is
      expected within the current funding window, leaving the company's long-term platform value dependent on
      early-stage programs that have not yet entered clinical trials.
