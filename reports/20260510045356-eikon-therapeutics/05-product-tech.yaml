figures:
  - id: FE001
    type: stack
    layout: standard
    slug: product-architecture-map
    title: 'Product Architecture Map: SMT Platform Stack'
    summary: >-
      Three-layer architecture of Eikon's SMT platform showing hardware, chemistry, and computation layers with key
      components and dependencies at each level.
    approximationNotes: >-
      Layer composition based on published scientific papers, patent disclosures, and public presentations. Throughput
      and capacity metrics are not publicly disclosed.
    claimRefs:
      - CE016
      - CE017
      - CE018
      - CE019
    data:
      layers:
        - label: 'Hardware Layer: Imaging Instruments'
          detail: >-
            Custom-built lattice light-sheet microscopes (Nobel Prize-derived, Eric Betzig design) and RESOLFT
            super-resolution systems. Not commercially purchasable; built and maintained by Eikon engineering team in
            Hayward, CA.
        - label: 'Chemistry Layer: Janelia Fluor Dyes and Protein Tags'
          detail: >-
            Proprietary JF dye library (Luke Lavis / Janelia) + HaloTag/SNAP-tag protein labeling chemistry. Exclusively
            licensed from HHMI Janelia. Dye optimization required per target; 3–6 months per new target application.
        - label: 'Biology Layer: Target Cell Lines and Assay Development'
          detail: >-
            Endogenous or overexpressed HaloTag/SNAP-tag protein constructs in cancer-relevant cell lines. CRISPR
            engineering for physiological expression levels. Target-specific assay development by biology team.
        - label: 'Data and ML Layer: Trajectory Analysis and Drug Metrics'
          detail: >-
            GPU-based single-molecule trajectory analysis pipeline using ML models to compute dwell time, diffusion
            coefficient, and drug occupancy fraction. Trained on known drug-target pairs; applicable to novel
            target-drug combinations.
        - label: 'Output Layer: Drug Discovery Decisions and Clinical Candidates'
          detail: >-
            SMT-derived engagement metrics fed into lead optimization decisions and IND-enabling packages. Currently
            informing EIK1005 (WRN helicase) and future undisclosed programs; EIK1001 and EIK1003 are externally
            acquired.
  - id: FE002
    type: flow
    layout: wide
    slug: customer-workflow-operating-flow
    title: 'Customer Workflow: SMT-Enabled Drug Discovery and Clinical Delivery'
    summary: >-
      End-to-end workflow from target identification through clinical trial delivery, showing where Eikon's SMT platform
      intersects with the standard drug discovery process.
    approximationNotes: >-
      Workflow steps based on Eikon's stated platform use cases and published academic papers. Clinical timelines are
      estimates.
    claimRefs:
