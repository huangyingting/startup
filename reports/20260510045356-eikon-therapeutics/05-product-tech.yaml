  - id: S3
    title: 'Technology Architecture: Imaging, Chemistry, and Computation'
    body: >-
      The SMT platform integrates three interdependent technology layers. The hardware layer consists of custom-built
      lattice light-sheet microscopes and RESOLFT super-resolution instruments capable of sub-diffraction imaging at
      speeds compatible with live-cell physiology. These instruments are built at Eikon's Hayward facility by an
      in-house engineering team and are not commercially purchasable off-the-shelf, creating both a barrier to
      replication and a maintenance dependency. The chemistry layer consists of Janelia Fluor dyes—a proprietary dye
      series developed by Luke Lavis—that enable site-specific covalent labeling of individual target proteins within
      living cells. The dyes require careful optimization for each protein target: cell permeability, spectral
      properties, photostability, and target labeling efficiency must be verified for each application, making platform
      scaling non-trivial. The computation layer consists of machine learning models trained on imaging trajectories
      (single-molecule positions, velocities, and binding events over time) to extract drug-target engagement metrics.
      These models convert pixel-level microscopy data into interpretable pharmacological readouts such as residence
      time distributions, co-localization frequencies, and dose-response curves for cellular engagement rather than
      biochemical binding affinity. The full stack requires simultaneous optimization across all three layers for each
      new drug target, limiting throughput versus conventional biochemical high-throughput screening. Eikon has not
      disclosed specific throughput metrics (screens per month, targets per year) or head-to-head comparisons with
      conventional screening platforms. The CTO Russ Berman leads platform engineering and scaling. Academic
      collaborations with UC Berkeley and HHMI Janelia support continued platform development.
    claimRefs:
      - CE016
