      whyItMatters: >-
        Clinical supply chain risk is a binary risk for an oncology company: a CMO quality failure or Merck supply
        disruption could delay or terminate active clinical trials, materially affecting the timeline to pivotal
        readouts.
      diligencePath: >-
        Request data room disclosure of: (1) CMO names and qualification status, (2) Merck supply agreement terms
