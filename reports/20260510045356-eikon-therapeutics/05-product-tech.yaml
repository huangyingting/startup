                proof
              tone: warning
            - label: Medium — selective PARP1 IP novel; at risk from PARP inhibitor blocking IP
              tone: neutral
        - label: EIK1004 (CNS-penetrant PARP1)
          values:
            - label: Medium-High — CNS penetrance engineered into PARP1 scaffold; novel mechanism for brain tumors
              tone: neutral
            - label: Low-Medium — Phase 1/2 early; MTD not determined
              tone: warning
            - label: Low — brain tumor market is large but competitive; early stage prevents commercial planning
              tone: warning
            - label: Medium — CNS-penetrant PARP1 IP differentiated; but dependent on PARP1 scaffold IP
              tone: neutral
        - label: EIK1005 (WRN helicase inhibitor)
          values:
            - label: Medium — WRN synthetic lethality in MSI-H validated academically; IND-enabling in progress
              tone: neutral
            - label: Low — IND not yet filed; pre-clinical; earliest Phase 1 start 2026–2027
              tone: warning
