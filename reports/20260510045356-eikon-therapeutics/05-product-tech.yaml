            - label: High — Nobel-derived; published in Nature/Science; 7+ years Janelia development
              tone: positive
            - label: Medium — used internally; no FDA-cleared diagnostic or companion Dx application
              tone: neutral
            - label: Low — not commercialized; no external licensing revenue; research-use-only tool
