  evidenceGaps:
    - type: private-evidence-only
      severity: material
      topic: SMT-throughput-metrics
      missingEvidence: >-
        Eikon has not publicly disclosed specific throughput metrics for the SMT platform including compounds screened
        per month, targets profiled per year, or time-per-screen benchmarks. All throughput claims rely on inference
        from academic publications and competitor benchmarks.
      whyItMatters: >-
        Without throughput metrics, it is impossible to independently assess whether the SMT platform can scale to
        industrially relevant drug discovery productivity levels or whether it remains a boutique research tool.
      diligencePath: >-
        Request platform throughput data room disclosures including: (1) screens run per quarter since 2020, (2) targets
        profiled by SMT, (3) compound-to-IND conversion rate from SMT-initiated programs, (4) comparison to conventional
        HTS throughput.
      relatedQuestionRefs:
        - QE016
        - QE017
    - type: missing-source
      severity: material
      topic: 2023-termination-rationale
      missingEvidence: >-
        No public disclosure of the specific scientific, clinical, or safety rationale for the 2023 termination of two
        SMT-discovered programs after each enrolled one patient. The programs' names, target classes, and failure modes
        have not been disclosed.
      whyItMatters: >-
        The failure mode matters enormously: if the programs failed due to SMT platform errors (wrong target selection)
        vs. unrelated safety issues vs. business prioritization, the implications for platform validity differ
        fundamentally.
      diligencePath: >-
        Request data room disclosure of: (1) program names and target mechanisms, (2) clinical findings from the single
        patient enrolled in each program, (3) internal scientific rationale for discontinuation decisions.
      relatedQuestionRefs:
        - QE013
        - QE014
    - type: private-evidence-only
      severity: material
      topic: SMT-quantitative-validation
      missingEvidence: >-
