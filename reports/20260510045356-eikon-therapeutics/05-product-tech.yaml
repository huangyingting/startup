chapter:
  number: 5
  title: Product and Technology
  summary: >-
    Eikon Therapeutics' commercial proposition rests on two distinct but interrelated assets: a Nobel Prize-derived
    Single-Molecule Tracking (SMT) platform that visualizes individual protein molecules in living cells in real time,
    and a clinical pipeline of four oncology drugs (EIK1001–EIK1005) that were partly discovered or informed by the
    platform. The most advanced asset, EIK1001 (TLR7/8 agonist combined with pembrolizumab), has entered a pivotal Phase
    2/3 melanoma trial. The platform's core technology—lattice light-sheet microscopy and Janelia Fluor dyes—is
    scientifically distinguished, but platform-to-drug translation risk is material: two early SMT programs were
    terminated in 2023 after enrolling only one patient each, and EIK1001 and EIK1003 are externally acquired assets.
sections:
  - id: S1
    title: 'SMT Platform: Core Technology and Scientific Foundation'
    body: >-
      Eikon Therapeutics is built on Single-Molecule Tracking (SMT), a technology that combines Nobel Prize-winning
      lattice light-sheet microscopy with proprietary Janelia Fluor (JF) fluorescent dyes to image and track individual
      protein molecules as they move and interact inside living cells in real time. The lattice light-sheet microscope,
      developed by co-founder Eric Betzig at Janelia Research Campus of HHMI, illuminates biological specimens with
      minimal photodamage by confining excitation light to a thin, structured sheet—enabling sustained imaging over
      minutes to hours. Betzig received the 2014 Nobel Prize in Chemistry for the development of super-resolved
      fluorescence microscopy, which overcomes the classical diffraction limit of light. Luke Lavis, also at Janelia,
      developed the JF dye series: cell-permeable, photostable fluorescent probes that attach covalently to single
      protein molecules, providing sufficient signal-to-noise ratios for single-molecule detection inside the crowded
      intracellular environment. Xavier Darzacq at UC Berkeley contributed quantitative single-molecule imaging methods
      and machine learning frameworks that convert raw imaging trajectories into mechanistic drug-target engagement
      metrics. The SMT platform's fundamental value proposition is that it measures drug-target engagement directly in
      the native cellular context—something that biochemical assays (binding to purified proteins) and fixed-cell
      imaging cannot provide. This enables Eikon to differentiate between drugs that bind their target under
      physiological conditions versus those that appear active in vitro but fail due to cellular inaccessibility,
      off-target binding, or subcellular compartmentalization. Machine learning is applied to the imaging data to
      extract quantitative features (dwell time, diffusion coefficient, co-localization frequency) that predict drug
      efficacy. The platform represents a genuine scientific advance but remains early in its translation to drug
      discovery at commercial scale.
    claimRefs:
      - CE001
      - CE002
      - CE003
