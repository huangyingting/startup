        on hypothesis, not demonstrated correlation with Phase 2 outcomes.
      whyItMatters: >-
        Platform differentiation claims rest entirely on scientific logic; without empirical data showing that
        SMT-high-engagement compounds perform better clinically than SMT-low-engagement compounds, the platform premium
        in valuation is unsubstantiated.
      diligencePath: >-
        Request any internal biomarker correlation data from completed trials; inquire whether EIK1001 or EIK1003 Phase
