      statement: >-
        Eikon Therapeutics' Single-Molecule Tracking (SMT) platform uses Nobel Prize-winning lattice light-sheet
        microscopy to image and track individual protein molecules inside living cells in real time, enabling direct
        measurement of drug-target engagement that is impossible with conventional biochemical or fixed-cell assays.
