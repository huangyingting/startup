        - label: EIK1001 (TLR7/8 agonist + pembro)
          values:
            - label: Medium — mechanism validated in preclinical and early Phase 1; pivotal trial ongoing
              tone: neutral
            - label: High — Phase 2/3 TeLuRide-006 enrolled; regulatory path defined
              tone: positive
            - label: Low — no approved indication; commercial launch 2028–2030 at earliest if pivotal succeeds
              tone: warning
            - label: Medium — in-licensed; third-party IP; own IP on specific formulation/combo
              tone: neutral
        - label: EIK1003 (selective PARP1 inhibitor)
          values:
            - label: Medium — PARP1 selectivity profile novel; Phase 1/2 dose-finding ongoing
              tone: neutral
            - label: Medium — Phase 1/2 enrolling; safety data emerging; RP2D not yet defined
              tone: neutral
            - label: >-
