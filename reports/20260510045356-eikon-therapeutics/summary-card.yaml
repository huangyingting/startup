  topStrengths:
    - >-
      Nobel Prize-winning founders and world-class scientific advisory base provide exceptional credibility and platform
      differentiation.
    - >-
      Roger Perlmutter (former Merck Research Labs president) brings direct Keytruda development experience and Merck
      partnership that is strategically validated by Merck's $30M equity investment.
    - >-
      EIK1001 in Phase 2/3 pivotal trial for melanoma with Keytruda represents a de-risked near-term value catalyst
      backed by established pembrolizumab efficacy.
  topRisks:
    - >-
      IPO market cap (~$743-800M) represents a ~60% step-down from $1.85B Series D private valuation, signaling investor
      skepticism about platform claims or pipeline risk.
    - >-
      Both lead clinical assets (EIK1001, EIK1003) were externally acquired rather than discovered via the SMT platform,
      undermining the core platform-as-drug-discovery-engine narrative.
    - >-
      Two original SMT-discovered programs were terminated in 2023 after enrolling only one patient each, raising
      unresolved questions about the platform's translational capability.
  unresolvedGaps:
    - >-
      Detailed clinical efficacy data from TeLuRide-006 (EIK1001 + pembrolizumab in melanoma) remain confidential; trial
      outcome is binary and will drive most near-term valuation change.
    - >-
      Full audited financial statements with segment-level detail and covenant terms are not publicly available beyond
      summary press release figures.
    - >-
      The specific mechanism and reasons for the 2023 SMT-program terminations have not been fully disclosed, limiting
      platform validation assessment.
    - IP ownership structure and license terms for the in-licensed EIK1001 and EIK1003 assets are not publicly detailed.
