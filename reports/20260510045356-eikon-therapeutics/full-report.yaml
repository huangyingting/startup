    Eikon Therapeutics is a Hayward, CA-based clinical-stage biopharmaceutical company founded in 2019 by Nobel laureate
    Eric Betzig and colleagues. The company applies Nobel Prize-winning live-cell super-resolution microscopy and
    Single-Molecule Tracking (SMT) technology to oncology drug discovery. Eikon went public on February 5, 2026 (Nasdaq:
