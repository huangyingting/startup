  - number: 7
    title: Risks
    sections:
      - number: '7.1'
        title: 'Binary Clinical Risk: TeLuRide-006 as the Primary Value Catalyst'
        blocks:
          - type: paragraph
            body: >-
              The single largest risk facing Eikon Therapeutics is the binary outcome of TeLuRide-006—the Phase 2/3
              randomized controlled trial evaluating EIK1001 (TLR7/8 agonist) plus pembrolizumab versus pembrolizumab
              alone in first-line advanced melanoma. This trial represents Eikon's highest near-term value creation
              opportunity, but its failure would simultaneously eliminate the primary revenue pathway, impair investor
              confidence, and potentially destabilize the Merck partnership. Several factors amplify the binary nature
              of this risk: first, first-line advanced melanoma is now dominated by effective checkpoint immunotherapy
              including pembrolizumab monotherapy, nivolumab, and combination regimens such as ipilimumab + nivolumab,
              making meaningful incremental benefit from TLR7/8 agonism hard to demonstrate. Second, EIK1001's TLR7/8
              mechanism has not yet produced a Phase 3 success in any indication globally, leaving the mechanism
              unvalidated at the pivotal level. Third, other TLR7/8 agonist programs from Roche/Genentech (RO7119929)
              and other developers have demonstrated mixed results in comparable indications, providing cautionary
              signals. Fourth, the trial design, primary endpoint, and statistical assumptions are all dependent on
              achieving a specified ORR or PFS improvement that must be large enough to be clinically meaningful and
              statistically significant. A negative interim analysis—projected in 2026-2027—would represent the most
              severe adverse event in Eikon's commercial history to date.
