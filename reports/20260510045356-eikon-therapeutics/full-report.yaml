      - number: '5.2'
        title: 'Clinical Pipeline: EIK1001 to EIK1005'
        blocks:
          - type: paragraph
            body: >-
              Eikon's clinical pipeline comprises four differentiated oncology programs spanning two mechanistic
              classes—immunotherapy and DNA damage response—and a fifth in preclinical/IND-enabling stage. EIK1001 is a
              TLR7/8 agonist co-administered with Merck's pembrolizumab (Keytruda) in solid tumor immunotherapy. TLR7/8
              agonism activates innate immune sensing pathways, triggering a systemic anti-tumor immune response that
              may synergize with PD-1 checkpoint blockade. EIK1001 is currently in two pivotal-stage trials:
              TeLuRide-006 (NCT05612581), a Phase 2/3 randomized trial in first-line advanced melanoma in combination
              with pembrolizumab; and TeLuRide-005, a Phase 2 study in first-line non-small cell lung cancer (NSCLC).
              The melanoma trial represents Eikon's highest-value near-term binary catalyst. EIK1003 is a selective
              PARP1 inhibitor currently in Phase 1/2 trials across breast, ovarian, prostate, and pancreatic cancers
              with homologous recombination repair deficiency. Unlike approved PARP inhibitors (olaparib, niraparib,
              talazoparib) that inhibit both PARP1 and PARP2, EIK1003's selectivity for PARP1 is designed to reduce
              PARP2-related hematologic toxicity while preserving anti-tumor efficacy. EIK1004 is a CNS-penetrant PARP1
              inhibitor in Phase 1/2 for brain and CNS malignancies, a mechanistically distinct opportunity addressing a
              significant unmet need since existing PARP inhibitors have poor blood-brain barrier penetration. EIK1005
              is a WRN helicase inhibitor targeting microsatellite instability-high (MSI-H) cancers, currently in
              IND-enabling research. WRN helicase synthetic lethality in MSI-H tumors is a recently validated mechanism
              with no approved drugs, representing first-in-class potential. Critically, EIK1001 and EIK1003 are
              externally acquired assets, not SMT-discovered, which creates a gap between platform narrative and current
              commercial value driver.
