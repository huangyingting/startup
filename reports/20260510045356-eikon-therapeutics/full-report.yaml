      - number: '8.4'
        title: Investment Recommendation and Thesis Summary
        blocks:
          - type: paragraph
            body: >-
              The analyst recommendation for Eikon Therapeutics (EIKN) is HOLD / ACCUMULATE on weakness with a 12-month
              price target of $19-22 per share (approximately $780M-905M market cap on a fully diluted basis). This
              recommendation reflects the following thesis and anti-thesis balance: The thesis is that Perlmutter's
              track record with pembrolizumab, the strength of the Merck partnership, and the quality of TeLuRide-006's
              design position Eikon well to be the first TLR7/8 agonist to succeed in a randomized trial. A positive
              interim would trigger a sharp re-rating. The anti-thesis is that TLR7/8 mechanism has never achieved Phase
              3 success; the 2023 program terminations raise platform validity questions; the $28M/month burn means only
              25 months of runway from post-IPO cash; and the $1.85B private valuation step-down to $750-800M public
              reflects structural skepticism about pre-approval oncology platforms. The recommendation is to hold
              current positions for investors already in the name, and to accumulate on weakness below $16/share (sub
              $660M market cap) where the risk/reward improves materially. New investors should wait for enrollment
              completion confirmation or early TeLuRide-006 safety/activity signals before initiating a full position.
              The primary diligence ask before initiating any new position is the TeLuRide-006 statistical analysis
              plan, which would allow investors to assess the probability that the interim analysis will be powered to
              detect a meaningful clinical improvement.
            claimRefs:
              - CV011
              - CV012
              - CV013
          - type: table
            tableRef: TV002
            claimRefs:
              - CV011
              - CV012
              - CV014
              - CV015
          - type: figure
            figureRef: FV001
            claimRefs:
              - CV011
              - CV012
              - CV013
      - number: '8.5'
        title: Anti-Thesis and Thesis Breaks
        blocks:
          - type: paragraph
            body: >-
              The strongest arguments against the Eikon investment thesis as of May 2026 are: (1) The TLR7/8 mechanism
              has never achieved pivotal trial success in any solid tumor indication globally—EIK1001 would be the
              first. The base rate for Phase 3 success in novel immuno-oncology mechanisms is approximately 30-40%, but
              for mechanisms with no prior Phase 3 validation, the rate may be lower. (2) The 2023 program terminations
              after one patient each suggest platform limitations in predicting clinical viability— a risk that is
              currently unquantifiable without data room access. (3) Eikon's valuation step-down from $1.85B to $750M
              reflects public market skepticism that arguably incorporates more information than private round pricing.
              (4) The absence of any FDA breakthrough therapy or fast-track designation for EIK1001 or EIK1003 suggests
              FDA does not currently assess either program as meeting the 'substantial improvement over available
              therapy' threshold. The thesis breaks if: TeLuRide-006 generates a negative interim analysis; Roger
              Perlmutter departs without an equivalent pharmaceutical development leader; Merck de-prioritizes the
              collaboration after disappointing early signals; or capital markets deteriorate to the point where Eikon
              cannot raise at non-distressed terms before the runway expires. Investors should establish a clear exit
              framework: sell on any negative TeLuRide-006 data release, sell if Merck formally reduces its equity
              stake, and reassess if Perlmutter's engagement becomes limited.
            claimRefs:
              - CV014
              - CV015
              - CV016
          - type: table
            tableRef: TV005
            claimRefs:
              - CV014
              - CV015
              - CV016
              - CV018
      - number: '8.6'
        title: Final Diligence Asks and Investment Decision Criteria
        blocks:
          - type: paragraph
            body: >-
              Before a full investment decision can be made with high confidence, five critical pieces of information
              are required: (1) The TeLuRide-006 full protocol and statistical analysis plan (SAP)—specifically the
              primary endpoint definition, interim analysis timing, DSMB stopping criteria, and the power calculation
              assumptions. Without this, it is impossible to assess the probability that a positive interim will be
              powered to support accelerated approval. (2) The reasons for the 2023 program terminations—specifically
              whether the failure mode was platform-related (wrong target, false SMT signal) or
              clinical/business-related. This determines whether the SMT platform deserves any option value in the
              valuation model. (3) The HHMI Janelia IP license terms, including change-of-control provisions—critical
              for assessing M&A exit scenarios where an acquirer would inherit the SMT platform IP. (4) The Merck
              collaboration agreement terms including termination provisions, milestone payments, and any
              co-commercialization rights—which determine whether the partnership has real economic value beyond
              clinical supply. (5) The TeLuRide-006 enrollment status as of Q2-Q3 2026—specifically whether enrollment
              is on track or delayed, and whether any protocol amendments have been filed with the FDA. A publicly
              available interim enrollment update would significantly reduce timing uncertainty for the catalyst.
            claimRefs:
              - CV017
              - CV018
              - CV019
          - type: table
            tableRef: TV006
            claimRefs:
              - CV017
              - CV018
              - CV019
