chapters:
  - number: 1
    title: Company Overview
    sections:
      - number: '1.1'
        title: Company Identity and Mission
        blocks:
          - type: paragraph
            body: |
              Eikon Therapeutics is a clinical-stage biopharmaceutical company headquartered in Hayward,
              California, founded in 2019 by scientists from Janelia Research Campus of the Howard Hughes
              Medical Institute and the University of California, Berkeley. The company's mission is to
              transform oncology drug discovery through its proprietary Single-Molecule Tracking (SMT)
              technology platform, which enables direct visualization of protein behavior and drug-target
              engagement in living cells at unprecedented resolution. Eikon occupies a distinctive position
              in the biopharmaceutical landscape: conceived by Nobel Prize-winning scientists and initially
              aimed to build an entirely SMT-derived pipeline, the company has since evolved into a hybrid
              model combining platform-enabled insights with externally acquired clinical-stage assets.

              As of May 2026, Eikon is a post-IPO company, having completed a $381.2 million initial public
              offering on February 5, 2026 on the Nasdaq Global Select Market under ticker EIKN. The company
              describes itself as a technology-enabled drug company using its imaging platform for target
              selection, drug-target engagement validation, and mechanism-of-action characterization rather
              than as a pure platform play. Eikon focuses on precision oncology, with programs spanning
              immunotherapy (TLR7/8 agonism) and DNA damage response (selective PARP1 inhibition). The
              company has not yet generated product revenue and operates as a pre-revenue clinical-stage
              enterprise funded by venture capital, public equity markets, and strategic pharmaceutical
              partnerships. Its primary operations are in Hayward, California. Total capital raised as of
              the research date exceeds $1.5 billion across five distinct financing events.
