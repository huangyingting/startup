      - number: '6.5'
        title: Customer Concentration, Retention Risk, and Expansion Dynamics
        blocks:
          - type: paragraph
            body: >-
              Customer concentration risk is extreme for Eikon at this stage. The Merck partnership is the single most
              important external relationship: loss of Merck as a clinical partner would require restructuring the
              TeLuRide pivotal program, impair the pembrolizumab supply, and likely trigger negative market reactions
              given that Perlmutter's Merck connections are a key investment thesis element. The 15% workforce reduction
              in 2025, attributed to NIH funding cuts affecting government-funded research partners, signals a secondary
              form of customer dependency on government research relationships that can be disrupted by policy changes.
              In terms of retention, clinical trial site enrollment is relatively sticky once patients are
              enrolled—dropout from an active trial is costly operationally for both the site and Eikon—but site
              participation can be reduced or discontinued if Eikon's financial position deteriorates or if interim
              safety signals emerge. There is no subscription or recurring revenue component to Eikon's model; trial
              site relationships are transactional and program-specific. Expansion opportunity post-approval could be
              significant: if EIK1001 achieves FDA approval in melanoma, label expansion opportunities to NSCLC,
              additional solid tumors, and adjuvant settings represent a commercial expansion path. Similarly, if
              EIK1003 achieves approval in ovarian or breast cancer, expansion to additional HRR-deficient tumor types
              represents substantial incremental addressable market. The AI/ML drug discovery platform could also
              generate revenue through partnerships with additional pharma companies beyond Merck, though no such
              partnerships have been announced.
