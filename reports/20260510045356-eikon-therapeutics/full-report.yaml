      - number: '6.4'
        title: Future Commercial Customer Segments and Adoption Pathway
        blocks:
          - type: paragraph
            body: >-
              Eikon's future commercial customers upon drug approval fall into three primary segments. The first is
              medical oncologists and oncology pharmacists at community and academic cancer centers who prescribe
              oncology drugs. For EIK1001 in advanced melanoma (if approved), the prescribing base would be
              approximately 3,000-5,000 US melanoma-treating oncologists, concentrated at academic cancer centers with
              melanoma tumor boards and at community oncology practices using NCCN guidelines. Key opinion leaders
              (KOLs) at academic centers such as MD Anderson, MSK, and Dana-Farber would drive early adoption. The
              second segment is payers—commercial insurance companies and government payers (Medicare, Medicaid)—who
              determine formulary access, reimbursement rates, and step-edit requirements. In first-line advanced
              melanoma, the comparator is pembrolizumab monotherapy (if Eikon's combination requires co-pay or step
              therapy through mono first, uptake will be slowed). The third segment is hospitals and integrated delivery
              networks (IDNs) that negotiate drug purchasing through specialty pharmacy or GPO arrangements. Adoption
              velocity will depend critically on clinical differentiation versus pembrolizumab monotherapy: if
              TeLuRide-006 shows only modest incremental ORR improvement without OS benefit, payer and KOL adoption may
              be slow despite FDA approval. Competitor programs from Merck, BMS, AstraZeneca, and emerging TLR agonist
              companies represent the future competitive landscape at commercial launch.
