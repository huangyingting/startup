      - number: '1.2'
        title: Scientific Founders and Technology Platform
        blocks:
          - type: paragraph
            body: |
              Eikon Therapeutics was co-founded by four scientists whose credentials represent the most
              distinguished in modern biology and biophysics. Eric Betzig, Group Leader at Janelia Research
              Campus of HHMI, was awarded the Nobel Prize in Chemistry in 2014 jointly with Stefan W. Hell
              and William E. Moerner for the development of super-resolved fluorescence microscopy, which
              overcomes the diffraction limit of light to achieve nanometer-scale imaging of biological
              structures. Betzig subsequently developed lattice light-sheet microscopy, enabling imaging of
              living cells with minimal photodamage over extended time periods — the foundation of Eikon's
              platform.

              Luke Lavis, also at Janelia Research Campus, developed the Janelia Fluor (JF) fluorescent dye
              series — cell-permeable probes essential for single-molecule imaging in living cells. These dyes
              allow individual protein molecules to be labeled and tracked with high signal-to-noise ratios
              in native cellular environments. Robert Tjian, a molecular biologist, served as President of
              HHMI and as Chancellor of the University of California, Berkeley, bringing institutional
              relationships and gene regulation expertise. Xavier Darzacq, a professor at UC Berkeley,
              specializes in single-molecule imaging and quantitative analysis of transcription dynamics in
              living cells. Together, these founders created the SMT platform, which tracks individual protein
              molecules as they interact with drug candidates in real time within living cells — enabling
              direct measurement of drug-target engagement impossible with traditional biochemical approaches
              or fixed-cell imaging. The platform applies machine learning to imaging data, converting
              molecular behavioral readouts into quantitative drug discovery insights.
