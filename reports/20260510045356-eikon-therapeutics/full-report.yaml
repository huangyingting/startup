      - number: '7.2'
        title: 'Platform Translation Risk: SMT Discovery to Clinical Viability'
        blocks:
          - type: paragraph
            body: >-
              The most consequential adverse signal in Eikon's history is the 2023 termination of two pipeline programs
              after each enrolled only one patient in Phase 1 clinical trials. These programs were selected using the
              SMT platform, making their failure potentially indicative of platform-level limitations in predicting
              clinical viability. Eikon has not publicly disclosed the target classes, mechanism of action, failure mode
              (safety, lack of efficacy, or business prioritization), or scientific rationale for these terminations.
              This opacity creates a diligence gap: investors cannot determine whether the failures were attributable to
              SMT platform errors (wrong target selection, incorrect engagement readout, false cellular models) or to
              independent clinical development failures unrelated to the platform. The practical consequence is that no
              purely SMT-discovered drug has demonstrated clinical efficacy as of May 2026. EIK1001 and EIK1003—Eikon's
              two pivotal-stage programs—are externally acquired and not SMT-discovered. The entire platform premium in
              Eikon's valuation rests on the hypothesis that SMT will produce clinically successful drugs; this
              hypothesis remains unvalidated. EIK1005 (WRN helicase inhibitor, preclinical) is the most advanced
              genuinely SMT-informed asset, but it is 4-6 years from potential approval, meaning the platform validation
              timeline extends well beyond the current funding runway.
            claimRefs:
              - CR005
              - CR006
              - CR007
              - CR008
      - number: '7.3'
        title: 'Capital and Burn Rate Risk: Runway Constraints and Funding Dependency'
        blocks:
          - type: paragraph
            body: >-
              Eikon is burning approximately $28 million per month—$338 million annualized in 2025—with a post-IPO cash
              position of approximately $717 million and a projected runway into H2 2027. This runway is sufficient to
              reach the TeLuRide-006 interim analysis (expected 2026-2027) and early EIK1003 Phase 1/2 data, but it is
              not sufficient to fund a full Phase 3 program for EIK1001 if the interim analysis requires a trial
              extension or design amendment. A positive interim analysis would likely enable Eikon to access capital
              markets at favorable terms; a negative analysis would impair its ability to raise capital for any
              remaining programs. The burn rate reflects Eikon's four-trial clinical development portfolio and its
              384-person workforce: even after the 2025 15% workforce reduction, monthly expenses remain among the
              highest per-employee ratios in the clinical-stage biotech sector. Key capital risk factors include: (1)
              any trial protocol amendment requiring enrollment expansion would increase total spending; (2) CMO pricing
              increases or supply disruptions would increase trial costs; (3) the absence of partnership milestone
              revenue from any program beyond Merck (whose research collaboration financial terms are undisclosed) means
              Eikon is almost entirely dependent on equity market capital; (4) if biotech market conditions deteriorate,
              Eikon's ability to raise capital pre-readout at non-dilutive terms would be impaired.
            claimRefs:
              - CR009
              - CR010
              - CR011
              - CR012
      - number: '7.4'
        title: 'Regulatory and Legal Risks: IP, Clinical Holds, and FDA Dependencies'
        blocks:
          - type: paragraph
            body: >-
              Eikon's regulatory risk profile is characterized by standard clinical-stage oncology uncertainties
              amplified by specific IP and licensing dependencies. On the regulatory front, no FDA Breakthrough Therapy
              Designation, Fast Track Designation, or Accelerated Approval pathway has been announced for any Eikon
              program, meaning Eikon's programs will proceed through standard FDA review timelines (10-14 months for
              NDA/BLA after filing). Clinical hold risk exists for any active trial if a safety signal emerges in
              EIK1001 or EIK1003 that requires protocol review. The TLR7/8 agonist mechanism is generally considered
              safe but systemic TLR agonism can cause cytokine release syndrome (CRS) and other immune-related adverse
              events that must be managed carefully. On the IP front, Eikon's SMT platform is built on an exclusive
              license from HHMI Janelia Research Campus; the specific terms of this license (duration, field of use,
              sublicensing rights, change-of-control provisions) are not publicly disclosed. License termination under
              certain conditions—such as insolvency, change of control, or breach of minimum commercialization
              obligations—could eliminate Eikon's core platform IP protection. Additionally, EIK1001 and EIK1003 are
              built on in-licensed third-party IP, creating dependency on third-party licensor compliance and potential
              for IP disputes. Patent expiry timelines for the core platform IP are not publicly disclosed.
            claimRefs:
              - CR013
              - CR014
              - CR015
              - CR016
              - CR017
