      - number: '5.5'
        title: Differentiation, IP Position, and Competitive Moat
        blocks:
          - type: paragraph
            body: >-
              Eikon's differentiation rests on four pillars. First, founder IP and tacit know-how: the SMT platform is
              anchored by intellectual property developed at HHMI Janelia by Betzig and Lavis, licensed exclusively to
              Eikon; the tacit knowledge embedded in the scientists who built the platform is difficult to replicate
              without the same team. Second, the Janelia Fluor dye library, continuously expanded by Luke Lavis,
              provides a proprietary chemical toolkit unavailable to competitors attempting to replicate SMT imaging.
              Third, the combination of hardware, chemistry, and ML creates a system whose interdependencies raise the
              replication barrier: even well-funded competitors would require years to assemble equivalent capabilities.
              Fourth, the Merck partnership provides both clinical credibility and a strategic relationship with the
              world's largest immuno-oncology franchise holder, whose $30 million equity investment and clinical supply
              agreement validate the platform's potential from an industry perspective. Competitive risks exist from
              computational biology platforms (Relay Therapeutics, Recursion Pharmaceuticals, Schrödinger) that use
              different approaches—MD simulation, AI genomics, physics-based models—to address similar drug discovery
              bottlenecks. These competitors have more advanced pipelines or validated platform-to-drug track records.
              The core moat concern is clinical validation: the 2023 termination of two original SMT-discovered programs
              after enrolling only one patient each, without public disclosure of the scientific rationale, has created
              uncertainty about the platform's ability to generate clinically viable drug candidates independently.
            claimRefs:
