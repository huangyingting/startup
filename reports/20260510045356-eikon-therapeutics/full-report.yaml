      - number: '7.5'
        title: Partner, Dependency, and Key Person Risks
        blocks:
          - type: paragraph
            body: >-
              Eikon's key person risk is concentrated in CEO Roger Perlmutter. Perlmutter was the president of Merck
              Research Laboratories who personally drove pembrolizumab's clinical development and commercialization, and
              his institutional relationships with Merck are a primary reason for the Merck equity investment and
              clinical supply agreement. Perlmutter is also the primary interface with institutional investors and is
              the public face of Eikon's clinical strategy. His departure—through death, illness, termination, or
              voluntary exit—would likely impair the Merck relationship (creating supply risk), reduce investor
              confidence, and potentially delay or terminate capital raises. No public succession plan has been
              disclosed. The dependency on Merck as the sole pharma partner creates a second category of critical
              dependency: Merck controls the pembrolizumab supply for the pivotal trial, and any deterioration in the
              commercial relationship (e.g., Merck decides not to pursue combination after negative early signals) would
              require Eikon to restructure TeLuRide-006 around a different checkpoint inhibitor or proceed without a
              PD-1 partner, both of which are operationally complex. On the scientific founder side, departure of Eric
              Betzig, Luke Lavis, or Xavier Darzacq from advisory or collaboration roles would reduce the platform's
              scientific credibility and potentially impair ongoing Janelia IP license relationships. The 15% workforce
              reduction in 2025, attributed to NIH funding cuts affecting the research tools division, signals
              structural dependency on government research funding that is outside Eikon's control.
            claimRefs:
