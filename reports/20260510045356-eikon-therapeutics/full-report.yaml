  - number: 5
    title: Product & Technology
    sections:
      - number: '5.1'
        title: 'SMT Platform: Core Technology and Scientific Foundation'
        blocks:
          - type: paragraph
            body: >-
              Eikon Therapeutics is built on Single-Molecule Tracking (SMT), a technology that combines Nobel
              Prize-winning lattice light-sheet microscopy with proprietary Janelia Fluor (JF) fluorescent dyes to image
              and track individual protein molecules as they move and interact inside living cells in real time. The
              lattice light-sheet microscope, developed by co-founder Eric Betzig at Janelia Research Campus of HHMI,
              illuminates biological specimens with minimal photodamage by confining excitation light to a thin,
              structured sheet—enabling sustained imaging over minutes to hours. Betzig received the 2014 Nobel Prize in
              Chemistry for the development of super-resolved fluorescence microscopy, which overcomes the classical
              diffraction limit of light. Luke Lavis, also at Janelia, developed the JF dye series: cell-permeable,
              photostable fluorescent probes that attach covalently to single protein molecules, providing sufficient
              signal-to-noise ratios for single-molecule detection inside the crowded intracellular environment. Xavier
              Darzacq at UC Berkeley contributed quantitative single-molecule imaging methods and machine learning
              frameworks that convert raw imaging trajectories into mechanistic drug-target engagement metrics. The SMT
              platform's fundamental value proposition is that it measures drug-target engagement directly in the native
              cellular context—something that biochemical assays (binding to purified proteins) and fixed-cell imaging
              cannot provide. This enables Eikon to differentiate between drugs that bind their target under
              physiological conditions versus those that appear active in vitro but fail due to cellular
              inaccessibility, off-target binding, or subcellular compartmentalization. Machine learning is applied to
              the imaging data to extract quantitative features (dwell time, diffusion coefficient, co-localization
              frequency) that predict drug efficacy. The platform represents a genuine scientific advance but remains
              early in its translation to drug discovery at commercial scale.
            claimRefs:
              - CE001
              - CE002
              - CE003
              - CE004
              - CE005
              - CE006
