  - id: TE003
    slug: technology-operating-architecture-table
    title: Technology / Operating Architecture Table
    description: Layered map of the SMT platform's technology components, their roles, dependencies, and technical risks.
    columns:
      - Layer / Component
      - Role in Platform
      - Key Dependency
      - Technical Risk
    rows:
      - - Lattice Light-Sheet Microscope (custom-built)
        - >-
          Primary imaging hardware; illuminates living cells with thin, structured light sheet enabling single-molecule
          detection with minimal photodamage over extended time periods
        - Proprietary design; in-house engineering team; specialized optical components (not COTS)
        - >-
          Instrument availability per target screen; maintenance risk if key engineers leave; not commercially
          purchasable
      - - RESOLFT Super-Resolution Imaging
        - Sub-diffraction imaging for dense cellular environments where standard SMT is obscured by molecular crowding
        - Custom instrument engineering; specialized fluorescent labels compatible with RESOLFT switching
        - Limited throughput; technically demanding; requires additional dye engineering beyond JF series
      - - Janelia Fluor (JF) Dye Library
        - >-
          Proprietary fluorescent dye molecules that covalently label individual target proteins; cell-permeable and
          photostable
        - Luke Lavis / Janelia ongoing development; exclusive license to Eikon
        - Dye optimization required per target (permeability, spectral tuning, background); not all targets amenable
      - - HaloTag / SNAP-tag Protein Labeling
        - Enzymatic tags fused to target proteins to enable site-specific, stoichiometric JF dye attachment
        - Genetic engineering of target cell lines (CRISPR or overexpression); stable cell line generation
        - Cell line engineering timeline 3–6 months per target; endogenous tagging required for physiological relevance
      - - Machine Learning / Trajectory Analysis Pipeline
        - >-
          Converts raw single-molecule imaging data (position, time, intensity) into pharmacological metrics (dwell
          time, diffusion state, drug occupancy fraction)
        - Internal data science team; GPU compute infrastructure; labeled training datasets from known drug-target pairs
        - >-
          Model generalizability to novel targets; overfitting risk on small datasets; interpretability of complex
          trajectory features
      - - Clinical Drug Manufacturing
        - GMP-grade drug supply for EIK1001 (TLR7/8 agonist) and PARP1 inhibitors (EIK1003, EIK1004)
        - Merck clinical supply agreement for pembrolizumab; CMO partnerships for small molecules
        - Clinical supply chain disruption; CMO quality failures; Merck agreement dependent on clinical relationship
    notes: >-
      Architecture assessed from published scientific papers, patent filings, and public presentations. Internal
      throughput metrics are not publicly disclosed.
