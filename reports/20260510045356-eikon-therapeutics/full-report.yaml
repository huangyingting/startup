      - number: '5.4'
        title: Regulatory Status, Clinical Development, and Trust Controls
        blocks:
          - type: paragraph
            body: >-
              Eikon's pipeline operates under the oversight of the US FDA and has submitted INDs for its clinical-stage
              programs. EIK1001 (TeLuRide-006) is enrolled under an FDA-cleared IND for a Phase 2/3 randomized
              controlled trial in first-line advanced melanoma; the trial is also registered on ClinicalTrials.gov
              (NCT05612581). EIK1003 and EIK1004 PARP1 inhibitor programs operate under INDs for Phase 1/2
              dose-escalation studies. No FDA Breakthrough Therapy Designation or Fast Track Designation has been
              publicly disclosed for any Eikon program as of May 2026, which would otherwise accelerate development.
              Good Manufacturing Practice (GMP) compliance for clinical drug supply is managed through Merck's clinical
              supply agreement for EIK1001 (pembrolizumab) and contract manufacturing organizations for Eikon's small
              molecule programs. The SMT platform itself operates under laboratory-grade quality controls; it is a
              research tool, not a regulated diagnostic, and is therefore not subject to FDA oversight in its current
              form. Data integrity and reproducibility are critical to the platform's credibility: imaging artifacts,
              fluorescence bleed-through, and single-molecule localization errors must be systematically controlled.
              Eikon's scientific advisory board and academic collaborators at UC Berkeley and Janelia provide
              independent quality oversight for imaging methodology. Patient data from clinical trials is managed under
              standard 21 CFR Part 11 electronic records requirements and Good Clinical Practice guidelines. No clinical
              holds, FDA warning letters, or safety-related trial terminations have been reported for any Eikon program.
            claimRefs:
