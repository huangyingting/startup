      - number: '6.2'
        title: Clinical Trial Site Adoption and Enrollment Evidence
        blocks:
          - type: paragraph
            body: >-
              Enrollment in Eikon's clinical trials—particularly TeLuRide-006 (NCT05612581)—represents the most
              operationally tangible measure of customer adoption in the current phase. The fact that academic medical
              centers are actively enrolling patients in TeLuRide-006 as a Phase 2/3 pivotal trial confirms that (1)
              institutional review boards at multiple sites have approved the protocol, (2) site investigators believe
              the mechanism is scientifically plausible, and (3) patients are willing to enroll in an experimental
              combination regimen. For pivotal-stage oncology trials of this type, typical enrollment timelines range
              from 18-36 months to reach the full sample size. Eikon presented clinical data at ASCO 2024 and ASCO 2025,
              indicating that trial data from enrolled patients is being generated and is of sufficient quality and
              interest to be accepted for presentation at the world's largest oncology congress. The EIK1003 Phase 1/2
              trial (NCT04799054) enrollment in breast, ovarian, prostate, and pancreatic cancer cohorts confirms
              multi-site enrollment across multiple tumor types, demonstrating oncologist engagement with the selective
              PARP1 hypothesis. The EIK1004 Phase 1/2 trial's enrollment in CNS/brain cancer patients at neuro-oncology
              centers represents a distinct customer segment (neuro-oncologists) at specialized brain tumor programs.
              Enrollment progress across four active clinical trials simultaneously is operationally significant for a
              company with approximately 384 employees and a $28 million monthly burn rate, demonstrating execution
              capacity.
