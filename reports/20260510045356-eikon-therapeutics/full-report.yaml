  - number: 6
    title: Customers
    sections:
      - number: '6.1'
        title: 'Customer Definition: Clinical Trial Sites and Pharma Partners'
        blocks:
          - type: paragraph
            body: >-
              As a pre-commercial clinical-stage biopharmaceutical company, Eikon Therapeutics does not have paying
              commercial customers in the traditional sense. Instead, its current 'customer base' consists of two
              categories. The first is clinical trial site partners—academic medical centers and cancer hospitals that
              enroll patients into Eikon's trials (TeLuRide-006, TeLuRide-005, EIK1003 Phase 1/2, and EIK1004 Phase
              1/2). These institutions participate in exchange for access to investigational drugs at no cost and
              research funding; they are customers in the sense that their institutional willingness to participate
              validates the therapeutic hypothesis and generates the clinical data upon which Eikon's valuation depends.
              Leading academic cancer centers such as MD Anderson, Memorial Sloan Kettering, and University of Colorado
              Health Cancer Center are typical trial site partners for pivotal-stage oncology biotechs. The second
              category is the pharmaceutical partnership customer: Merck & Co., which co-develops EIK1001, has committed
              $30 million in equity investment (approximately 10% stake), and supplies pembrolizumab for
              TeLuRide-006/005 under a clinical supply agreement. Merck is the closest analog to a B2B customer or
              revenue-generating partner for Eikon in the current pre-commercial phase. Future commercial
              customers—oncologists, cancer centers, hospitals, and payers—are contingent on drug approval, and no
              commercial launch is realistically possible before 2028–2030 at the earliest given current Phase 2/3 trial
              timelines.
            claimRefs:
