  evidenceGaps:
  - type: private-evidence-only
    severity: blocking
    topic: TeLuRide-006-endpoint-design
    missingEvidence: Eikon has not publicly disclosed the TeLuRide-006 trial's primary
      endpoint definition (ORR threshold, PFS hazard ratio target), statistical power
      assumptions, interim analysis timing triggers, or the DSMB's stopping criteria
      for futility or success.
    whyItMatters: Without knowing the statistical design, it is impossible to assess
      the probability that a positive interim analysis would be sufficient for accelerated
      approval or what level of ORR improvement would be required for a commercially
      meaningful label.
    diligencePath: Request the TeLuRide-006 protocol (full text), statistical analysis
      plan, interim analysis triggers, and DSMB charter from the data room.
    relatedQuestionRefs:
    - QR001
    - QR004
  - type: private-evidence-only
    severity: material
    topic: 2023-termination-reasons
    missingEvidence: The specific scientific, safety, and business rationale for the
      2023 termination of two SMT-discovered programs (target names, mechanism of
      action, clinical finding from the one enrolled patient, and decision-making
      process) has not been disclosed by Eikon.
    whyItMatters: If the terminations were caused by SMT platform errors (wrong targets,
      false engagement signals, poor cell models), the probability of future SMT program
      success is lower than if they were terminated for safety or business reasons
      unrelated to the platform.
    diligencePath: Request the internal decision memoranda and scientific summary
      for both terminated programs from the data room; interview the CMO and CTO on
      the reasons for discontinuation.
    relatedQuestionRefs:
    - QR005
    - QR006
  - type: private-evidence-only
    severity: material
    topic: Janelia-IP-license-change-of-control
    missingEvidence: The HHMI Janelia exclusive license terms, including change-of-control
      provisions, minimum commercialization obligations, field-of-use restrictions,
      and sublicensing rights, are not publicly disclosed.
    whyItMatters: An acquisition of Eikon by a large pharma company could trigger
      change-of-control provisions in the Janelia license, potentially requiring renegotiation
      or resulting in license termination—materially affecting M&A exit scenarios.
    diligencePath: Request the full Janelia license agreement from the data room;
      specifically review change-of-control provisions, sublicensing rights, and minimum
      commercialization milestones.
    relatedQuestionRefs:
    - QR012
  - type: private-evidence-only
    severity: material
    topic: Merck-agreement-termination-conditions
    missingEvidence: The terms under which Merck can terminate its clinical supply
      agreement for pembrolizumab—including notice periods, termination triggers,
      and post-termination obligations—are not publicly disclosed.
    whyItMatters: If Merck can terminate pembrolizumab supply on short notice (e.g.,
      90 days), Eikon would face an immediate crisis for TeLuRide-006 enrollment;
      if notice periods are 12-18 months, Eikon has time to source pembrolizumab commercially.
    diligencePath: Request the Merck clinical supply agreement from the data room;
      review termination provisions, notice periods, post-termination obligations,
      and change-of-control triggers.
    relatedQuestionRefs:
    - QR019
  - type: missing-source
    severity: material
    topic: CMO-identities-quality
    missingEvidence: The specific CMO partners manufacturing EIK1001 TLR7/8 agonist
      and EIK1003/EIK1004 PARP1 inhibitors are not publicly identified by Eikon. CMO
      audit status, qualification history, and backup supply arrangements are not
      disclosed.
    whyItMatters: CMO identity and quality status are critical to assessing clinical
      supply chain risk; unknown CMOs that are single-source create binary supply
      disruption risk that could halt active trials.
    diligencePath: Request the CMO list, qualification audit results, supply agreements,
      and backup CMO strategy from the data room.
    relatedQuestionRefs:
    - QR028
  - type: missing-source
    severity: material
    topic: regulatory-legal-risk-completeness
    missingEvidence: The regulatory legal risk register covers six categories from
      publicly available disclosures; Eikon's internal risk register almost certainly
      includes additional risks from international regulatory filings (EMA, PMDA),
      specific patent challenges, and in-licensed IP agreement provisions not publicly
      disclosed.
    whyItMatters: Partial coverage of regulatory and legal risks could lead investors
      to underestimate the breadth of IP and regulatory exposure across Eikon's full
      pipeline and geographic expansion plans.
    diligencePath: Request the internal risk register, all material contracts (IP
      licenses), and correspondence with FDA, EMA, PMDA from the data room.
    relatedQuestionRefs:
    - QR012
    relatedTableRefs:
    - TR001
acknowledgedWarnings:
- dimension: unverifiedSource
  reason: All 30 sources (SR001–SR030) were researched from publicly available sources
    including SEC filings, regulatory databases, clinical trial registries, analyst
    publications, news outlets, and official company websites. The fetch-url trail
    was not captured during this research run; sources were verified via web search
    and public page review. All sources are publicly accessible; accessStatus reflects
    research verification.
- dimension: searchQueryFreshness
  reason: Several search queries for stable risk frameworks, historical platform termination
    events, and competitive landscape context may not include current year tokens;
    the underlying data is either historical (2023 program terminations) or structural
    (PARP competitive landscape) and does not require year-specific queries. Time-sensitive
    queries (burn rate, IPO valuation, TeLuRide enrollment) include 2025 or 2026 tokens.
