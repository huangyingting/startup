- id: TR005
  slug: mitigation-and-kill-criteria-table
  title: Mitigation and Kill Criteria Table
  description: Risk mitigations in place and the kill criteria at which investors
    should materially reassess or exit the Eikon investment thesis.
  columns:
  - Risk Category
  - Current Mitigation
  - Kill Criterion (reassess thesis)
  - Thesis-Saving Scenario
  rows:
  - - Clinical (TeLuRide-006 failure)
    - Active enrollment; DSMB oversight; Merck co-development relationship; post-IPO
      cash sufficient for full trial completion
    - Negative interim analysis showing no improvement in ORR or PFS over pembrolizumab
      monotherapy; trial stopped for futility
    - Positive interim showing ≥15% improvement in ORR over pembrolizumab; subsequent
      accelerated approval filing
  - - Platform translation (SMT discovery failure)
    - Externally acquired EIK1001 and EIK1003 as near-term anchors; EIK1005 as SMT-generated
      asset; ongoing discovery programs
    - A second generation of SMT-discovered programs fails to reach Phase 2 efficacy
      readout; no new SMT IND filed by 2028
    - EIK1005 (WRN helicase) IND filed and early Phase 1 shows on-target safety; second
      SMT program enters IND-enabling
  - - Capital and burn (runway expiry)
    - Post-IPO $717M cash; H2 2027 runway; positive interim could enable additional
      raise at favorable terms
    - Negative TeLuRide-006 interim + inability to raise capital; runway falls below
      12 months with no near-term catalyst; DSMB recommends trial halt
    - Positive interim analysis enables $300-500M equity raise at favorable terms;
      Merck expands collaboration with upfront payment
  - - Key person (Perlmutter departure)
    - Perlmutter in active role; board presumably has succession thinking; institutional
      investors aware of key person risk
    - Perlmutter departure without a credible replacement announced; Merck publicly
      withdraws from collaboration within 3 months
    - Perlmutter retention through commercial launch; or succession with equivalent
      immuno-oncology pharmaceutical executive
  - - Partner concentration (Merck withdrawal)
    - Merck active investor and partner; financial alignment; Perlmutter relationship;
      Merck pipeline needs post-Keytruda
    - Merck formally terminates clinical supply agreement or sells its ~10% equity
      stake; EIK1001 cannot access pembrolizumab at trial cost
    - Second pharma partner signed for EIK1003, EIK1004, or platform; Merck expands
      relationship to additional programs
  - - Competitive (competitor PARP1 inhibitor approval)
    - EIK1003 PARP1 selectivity differentiated from EIK1004 CNS focus; EIK1003's safety
      profile differentiation vs. PARP1/2 dual inhibitors
    - AZD5305 (AstraZeneca selective PARP1) achieves FDA approval in HRR+ solid tumors
      before EIK1003; generic PARP pricing competition intensifies
    - EIK1003 demonstrates superior PFS or safety vs. AZD5305; EIK1004 occupies unique
      CNS PARP niche without direct competitor
  notes: Kill criteria are hypothetical threshold events, not binary triggers requiring
    immediate action. They represent the analyst's judgment of the minimum adverse
    outcome that would warrant fundamental reassessment of the investment thesis.
