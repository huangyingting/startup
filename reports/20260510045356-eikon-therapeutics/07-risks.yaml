- id: TR002
  slug: operational-quality-security-risk-register
  title: Operational / Quality / Security Risk Register
  description: Register of operational, quality, and infrastructure risks affecting
    Eikon's clinical and platform operations.
  columns:
  - Risk
  - Probability
  - Impact
  - Mitigation
  - Monitoring Signal
  rows:
  - - Clinical trial enrollment shortfall (TeLuRide-006)
    - 'Medium: first-line advanced melanoma has many approved options reducing trial-eligible
      naive patients'
    - 'High: delayed enrollment extends catalyst timeline; increases total trial spend;
      may require protocol amendment'
    - International site expansion; biomarker selection to enrich eligible patients;
      site network management
    - Monthly enrollment data; protocol deviation rate; site dropout events
  - - CMO supply failure (EIK1001 / EIK1003 drug supply)
    - 'Low-Medium: CMO failures are rare but catastrophic when they occur; CMO identities
      not disclosed'
    - 'Critical: trial pauses if drug supply fails; may require CMO transition which
      takes 12-18 months'
    - Merck supply agreement for pembrolizumab; undisclosed backup CMO strategy for
      EIK1001 TLR agonist
    - Quarterly CMO audit results; drug supply inventory levels vs. trial demand
  - - SMT platform throughput limitation (pipeline generation)
    - 'High: each new SMT target requires 3-6 month chemistry + engineering optimization;
      not disclosed to scale'
    - 'Medium: limits number of SMT-discovered programs entering IND-enabling; perpetuates
      externally-acquired pipeline'
    - Ongoing JF dye library expansion by Lavis lab; ML pipeline improvements; engineering
      team build
    - Number of new targets profiled per quarter; IND-enabling programs in queue
  - - Data quality and imaging reproducibility failures
    - 'Low-Medium: single-molecule imaging is technically demanding; reproducibility
      challenges have been documented in academic settings'
    - 'Medium: regulatory agencies may question reproducibility of SMT-derived biomarker
      data if submitted in IND packages'
    - Internal imaging QC protocols; academic collaborations provide external validation;
      HHMI Janelia oversight
    - Publication replication studies; FDA queries on imaging data in IND submissions
  - - Cybersecurity / IP theft risk (AI models and imaging data)
    - 'Low: biotechs face increasing IP theft risk; SMT proprietary algorithms are
      high-value targets'
    - 'High: theft of JF dye structures, ML trajectory models, or target engagement
      data would eliminate competitive barriers'
    - Standard biotech cybersecurity; proprietary data not shared publicly; restricted
      access to ML models
    - Security incident reports; unusual data access patterns
  notes: Operational risks assessed from public information and standard clinical-stage
    biotech risk frameworks. Internal quality controls, CMO identities, and cybersecurity
    measures are not publicly disclosed.
