  - CR007
  - CR009
  - CR023
- id: TR003
  slug: partner-dependency-risk-register
  title: Partner / Dependency Risk Register
  description: Register of key external partner dependencies and the risks from each
    relationship's disruption.
  columns:
  - Partner / Dependency
  - Dependency Type
  - Risk of Disruption
  - Impact if Disrupted
  - Mitigation
  rows:
  - - Merck & Co. (EIK1001 clinical supply and co-development)
    - Sole pembrolizumab supplier for TeLuRide-006/005; strategic equity investor;
      research collaboration partner
    - 'Low-Medium: active partnership; Merck has financial stake (~$30M equity); Perlmutter
      relationship; but Merck may deprioritize if EIK1001 early signals disappoint'
    - 'Critical: TeLuRide-006 restructuring required; commercial pembrolizumab sourcing
      at high cost; investor confidence impairment'
    - Maintain strong clinical data updates to Merck; Perlmutter relationship management;
      early notification of any safety signals
  - - HHMI Janelia Research Campus (SMT platform IP licensor)
    - Exclusive licensor of lattice light-sheet microscopy and JF dye IP; Luke Lavis
      ongoing dye development
    - 'Low: exclusive license actively maintained; co-founder relationships; no public
      dispute'
    - 'Critical: loss of SMT IP license would eliminate platform differentiation and
      devalue Eikon''s technology premium'
    - Maintain license in good standing; fulfill commercialization obligations; co-founder
      relationships buffer risk
  - - CMO network (drug manufacturing)
    - GMP drug supply for EIK1001, EIK1003, EIK1004 clinical programs; CMO identities
      not publicly disclosed
    - 'Low-Medium: CMO failures are episodic but can be catastrophic for trial continuity'
    - 'High: trial pause or termination if CMO fails; 12-18 month timeline to qualify
      new CMO; significant cost'
    - Maintain backup supply agreements; inventory buffer above trial demand; Merck
      supply for pembrolizumab provides EIK1001 trial support
  - - US NIH (research funding for academic collaborators)
    - Indirect dependency via UC Berkeley Darzacq lab and other academic SMT collaborators
      funded by NIH grants
    - 'High: NIH funding cuts in 2025 already triggered 15% Eikon layoffs in research
      tools; policy-driven risk'
    - 'Medium: reduced academic collaboration capability; slower platform development;
      demonstrated impact already in 2025'
    - Post-2025 layoffs may have right-sized research tool staffing; explore EU and
      private grant alternatives for academic partners
  - - CRO / clinical operations network
    - Contract research organizations (CROs) managing trial data collection, monitoring,
      and statistical analysis
    - 'Low: CRO industry is competitive; backup providers available; standard contractual
      protections'
    - 'Medium: CRO transition takes 6-12 months; data quality issues during transition;
      timeline delays'
    - Maintain contractual quality standards; SLA monitoring; escalation protocols
      with CROs
  notes: Partner dependency assessment based on publicly disclosed relationships and
    standard industry risk frameworks. Specific contract terms, backup arrangements,
    and CRO identities are not publicly disclosed by Eikon.
