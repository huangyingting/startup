  - id: TP001
    slug: competitor-profile-table
    title: 竞争对手画像表
    description: >-
      Profiles of Eikon's direct AI oncology peers, key incumbent pharma competitors, and computational platform
      substitutes, covering scale, funding, target segment, and strategic direction.
    columns:
      - 竞争对手
      - 类别
      - 规模 / 融资
      - 目标细分市场
      - 关键差异化
