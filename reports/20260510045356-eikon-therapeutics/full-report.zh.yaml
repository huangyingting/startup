        - 全球
        - $1.3B (2022) → $4.9B (2028) AI 药物发现
        - 24.9%
        - 自下而上测算 AI 平台市场；访谈 AI 药物发现公司
        - 低-中
        - AI 药物发现定义差异很大；Eikon 基于成像的平台可能与可比公司不匹配
