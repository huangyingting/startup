        - 治疗胶质母细胞瘤、脑转移的神经肿瘤科医生
        - 1/2 期（剂量递增）
        - 外部收购；CNS 穿透性是关键差异化
        - 临床开发中首个可穿透 CNS 的 PARP1 抑制剂；瞄准显著未满足需求
