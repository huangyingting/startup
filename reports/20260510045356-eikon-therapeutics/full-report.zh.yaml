      - number: '7.5'
        title: 合作伙伴、依赖与关键人物风险
        blocks:
          - type: paragraph
            body: >-
              Eikon 的关键人物风险集中在 CEO Roger Perlmutter 身上。Perlmutter 曾任 Merck Research Laboratories 总裁，亲自推动 pembrolizumab
              的临床开发和商业化；他与 Merck 的机构关系，是 Merck 股权投资和临床供应协议的重要原因。Perlmutter 也是与机构投资者沟通的主要接口，并是 Eikon
              临床战略的公共面孔。他若因死亡、疾病、解聘或自愿离职离开，很可能损害 Merck 关系（制造供应风险）、降低投资者信心，并可能推迟或终止融资。公司未披露公开继任计划。对 Merck
              这一唯一制药伙伴的依赖，构成第二类关键依赖：Merck 掌控关键试验所需 pembrolizumab 供应，若商业关系恶化（例如 Merck 因早期负面信号决定不再推进联合治疗），Eikon
              就需要围绕另一种检查点抑制剂重组 TeLuRide-006，或在没有 PD-1 伙伴的情况下推进；两者在运营上都复杂。科学创始人侧，如果 Eric Betzig、Luke Lavis 或 Xavier
              Darzacq 退出顾问或合作角色，平台科学可信度会下降，并可能损害持续的 Janelia IP 授权关系。2025 年因 NIH 经费削减、影响研究工具部门而进行的 15%
              裁员，显示公司对政府研究经费存在结构性依赖，而这不受 Eikon 控制。
            claimRefs:
