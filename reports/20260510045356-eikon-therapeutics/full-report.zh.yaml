      - number: '6.3'
        title: Merck 合作：战略客户与验证信号
        blocks:
          - type: paragraph
            body: >-
              Merck & Co. 是 Eikon 当前最具战略意义的“客户”关系，提供三类价值：资本（$30M 股权投资）、临床供应（TeLuRide 试验所需 pembrolizumab）和战略验证。Merck
              决定投资并与 Eikon 合作意义重大，因为 Merck 通过 Keytruda (pembrolizumab) 持有全球最大免疫肿瘤特许经营权；截至 2024 年，Keytruda 年收入约 $25
              billion。Merck 有很强动机寻找联合治疗伙伴，把 Keytruda 的商业寿命延伸到第一代单纯检查点治疗范式之外。CEO Roger Perlmutter 曾任 Merck Research
              Laboratories 总裁，并领导 Keytruda 临床开发，这一经历带来异常深的机构关系，也促成了合作。Merck 合作验证了 EIK1001 机制的战略价值，但也制造集中度风险：如果 Eikon 失去
              Merck 合作，就需要商业化采购 pembrolizumab（成本高昂），或围绕另一种检查点抑制剂重设关键试验；两条路在运营上都复杂，并可能拉长时间表。除 $30M 股权外，Merck
              研究合作协议的财务条款尚未公开披露，这给 Eikon 收入模型分析留下缺口。Keytruda 专利将于 2028 年到期，Merck 后 Keytruda
              管线压力上升，也强化了其寻找具备差异化机制、且经验证的联合治疗伙伴的战略理由。
