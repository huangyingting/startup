      - number: '5.6'
        title: 开发路线图与关键里程碑
        blocks:
          - type: paragraph
            body: >-
              Eikon 近期产品路线图主要由临床执行主导。价值最高的下一项里程碑是 TeLuRide-006 的首次中期分析（EIK1001 + pembrolizumab 用于黑色素瘤），预计在 2026-2027
              年进行；它将首次显示 EIK1001 能否在一线晚期黑色素瘤中相较 pembrolizumab 单药改善结局。积极数据可能触发与 FDA 的监管讨论，并验证 TLR7/8 机制在该适应症中的价值。EIK1003
              的 Phase 1/2 剂量递增仍在进行，初步安全性和疗效信号预计在 12-18 个月内出现。EIK1004 的 CNS 穿透型 PARP1 项目更早，Phase 1 剂量递增预计需要 18-24
              个月后才能评估疗效信号。EIK1005（WRN 解旋酶抑制剂）处于 IND 使能研究，目标是在 2026-2027 年提交 IND。平台侧，Eikon 已宣布计划用 SMT
              主动生成新的药物发现项目，目标是拿到独立于外部收购资产的 SMT 发现候选药物。2025 年因 NIH 经费削减而进行的 15%
              裁员主要集中在研究工具部门，拖慢了平台扩张时间表，但未影响正在进行的临床试验。IPO 后资本（现金及等价物合计约 $717M）把现金跑道延长至 H2 2027，为 EIK1001 和 EIK1003
              的关键临床读出提供资金。然而，在当前资金窗口内，预计不会出现已具备关键试验准备度的 SMT 发现资产；公司的长期平台价值仍取决于尚未进入临床试验的早期项目。
