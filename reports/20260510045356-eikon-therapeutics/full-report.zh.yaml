      - number: '1.3'
        title: 领导团队与高管梯队
        blocks:
          - type: paragraph
            body: >
              Eikon Therapeutics 的高管团队把深厚制药行业经验、肿瘤专长和技术能力放在一起。首席执行官 Roger Perlmutter 在 2021

              加入，拥有现代肿瘤药物开发中最亮眼的履历之一。Perlmutter 曾在 2013 至 2020 任 Merck Research Laboratories

              Executive Vice President and President，负责 pembrolizumab (Keytruda) 的临床开发和监管批准；Keytruda
              后来成为全球收入最高的肿瘤药物。他的免疫肿瘤经验直接服务于

              EIK1001——这是一款正与 Keytruda 联合评估的 TLR7/8 激动剂。在 Perlmutter 领导下，Eikon 从纯平台驱动模式，转向外部资产收购和内部发现并行。


              首席医学官 Roy Baynes 拥有数十年肿瘤药物开发经验，负责 EIK1001 关键性试验和 PARP1 抑制剂项目的临床策略与监管事务。首席财务官

              Alfred Bowie 负责关键 IPO 后阶段的财务运营；公司现金支撑期预计可延续至 H2 2027。首席技术官 Russ Berman 领导

              SMT 平台开发与规模化。首席运营官 Mike Klobuchar 管理日常运营。首席商务官兼总法律顾问 Ben Thorner 牵头业务拓展，包括

              Merck 合作，并管理法律事务。首席人事官 Barbara Howes 负责人力资源，包括 2025 员工重组。公司在 IPO 文件中披露约有

              384 名员工。关键人风险集中在 CEO Roger Perlmutter：如果他离任，Merck 合作、投资者信心以及公司吸引资本和人才的能力都可能受损。公司未公开披露具名 CEO 接班计划。
