      - number: '4.3'
        title: 单位经济、成本结构与毛利路径
        blocks:
          - type: paragraph
            body: >
              Eikon 的单位经济围绕药物发现成本周期展开：从平台研究支出，到 IND 申报、临床开发，再到最终获批或捕捉合作里程碑。关键指标包括：每个启动项目的研究成本、每次

              IND 申报成本、每次 Phase I 完成成本，以及每个获批药物的最终收入。


              Eikon 这一规模公司的平台研究支出通常为每年 $30–60M，覆盖人员（科学家、药物化学家）、仪器维护（超分辨显微成像

              基础设施）和计算资源。一个完整从临床前到 IND 项目的直接成本通常为 $3–8M（不含平台间接成本），而一项 Phase I

              肿瘤试验会再增加 $25–75M，取决于适应证和试验设计。EIK1001（黑色素瘤 TLR7/8）和 EIK1002（PARP-variant）都处于

              Phase I/II，这意味着 Eikon 迄今已承诺约 $50–150M 用于临床开发。


              商业化后的毛利率会符合小分子药物行业常态：制造规模建立后为 70–90%，COGS 为净收入的 5–15%。Eikon 的
              EIK1002（小分子）会落在这一毛利区间。小分子药物制造资本开支不高（商业规模合成合作约

              $10–30M）；Eikon 很可能把制造外包给 CDMO。


              鉴于 Eikon 尚未商业化，业务拓展和 G&A 成本估计低于总经营成本的 15%。Roger Perlmutter 的 BD 关系降低合作获取成本，但不能消除这项成本。SG&A

              搭建只会在需要商业化规划时启动，可能在 NDA 申报前 18–24 months。当前资本效率（每个 Phase I 项目对应已融资美元）约为每个项目

              $250M，处在 AI 赋能肿瘤领域行业常态范围内。
