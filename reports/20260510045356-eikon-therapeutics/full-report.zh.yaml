      - number: '3.2'
        title: 竞争者画像：规模、融资与临床管线状态
        blocks:
          - type: paragraph
            body: |
              在直接 AI 肿瘤同行中，Relay Therapeutics 在平台验证和临床结果两端都最靠前。Relay 的 Dynamo 平台把分子动力学模拟和实验测定
              结合，用来药物化构象灵活口袋；这与 Eikon 的活细胞成像不同，但互补。Relay 在 2024 获得 futatinib（FGFR2 抑制剂）FDA
              批准，此前拿到 Breakthrough Therapy Designation；RLY-2608（allosteric PI3Kα 抑制剂）正在乳腺癌和其他癌种中推进。Relay
              在 2023 年末拥有约 $850M 现金，此前已大幅裁员并整合管线。Relay 的授权模式吸引了大型制药合作，包括 Roche 合作。

              Monte Rosa Therapeutics 使用 QuEEN 分子胶发现平台，寻找通过 E3 ligase 定向降解
              降解不可成药蛋白的化合物；这在机制上补足 PPI 抑制。MRT-2359（GSPT1 degrader）处于 Phase I/II，面向 MYC 扩增
              癌种。Monte Rosa 披露截至 Q3 2024 有 $184 million 现金，尚未与大型制药公司达成平台合作。公司在 early 2025
              市值约 $400 million，较累计融资额有显著折价。

              Recursion Pharmaceuticals（2024 与 Exscientia 合并后）是累计融资最多的 AI 药物发现公司（$1.3 billion+）。Recursion
              的平台使用在细胞扰动 phenomics 图像上训练的生物基础模型——概念上类似 Eikon 的活细胞成像，但分辨率是群体层面，而非单分子层面。Recursion
              与 Roche/Genentech 和 Sanofi 有合作，项目处于 Phase I/II，但没有获批药物。收购 Exscientia 增加了生成式 AI
              化学能力。

              Insilico Medicine 在 2025 达成标志性事件：针对 IPF（非肿瘤）TNIK 的 INS018_055 成为首批获得监管批准（China）的
              AI 发现药物之一。虽然不是肿瘤药，但这是全球 AI 药物发现最强的概念验证。Insilico 为私有公司，累计融资约
              $400 million，肿瘤项目处于早期临床阶段。

              在既有厂商中，AstraZeneca 的 olaparib (Lynparza) 在 2023 产生 $2.33 billion 收入，并在美国与 Merck 共同商业化。AstraZeneca
              已将 olaparib 适应证扩展到卵巢癌、乳腺癌、胰腺癌和前列腺癌——直接挤占 Eikon 的 EIK1002 所竞争的 PARP 抑制剂空间。BMS
              的 nivolumab (Opdivo) 是黑色素瘤标准治疗，为 Eikon 的 TLR7/8 激动剂（EIK1001）设定了必须证明优效或有意义差异化的疗效基准。
