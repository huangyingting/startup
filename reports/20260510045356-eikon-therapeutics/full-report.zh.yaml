      - number: '5.5'
        title: 差异化、IP 位置与竞争护城河
        blocks:
          - type: paragraph
            body: >-
              Eikon 的差异化建立在四根支柱上。第一，创始人 IP 和隐性 know-how：SMT 平台锚定 Betzig 和 Lavis 在 HHMI Janelia 开发的知识产权，并由 Eikon
              独家授权；搭建平台的科学家身上沉淀的隐性知识，没有同一支团队很难复制。第二，Luke Lavis 持续扩充的 Janelia Fluor 染料库，为 Eikon 提供专有化学工具箱；试图复制 SMT
              成像的竞争者拿不到这套工具。第三，硬件、化学和 ML 的组合形成一个相互依赖的系统，抬高了复制门槛：即便资金充足的竞争者，也需要多年才能拼出等同能力。第四，Merck
              合作既提供临床可信度，也建立了与全球最大免疫肿瘤特许经营权持有者的战略关系；Merck 的 $30 million 股权投资和临床供应协议，从行业视角验证了平台潜力。竞争风险来自计算生物学平台（Relay
              Therapeutics、Recursion Pharmaceuticals、Schrödinger），它们用不同路径——MD simulation、AI genomics、physics-based
              models——解决相似的药物发现瓶颈。这些竞争者拥有更成熟的管线，或已经验证过从平台到药物的记录。核心护城河问题是临床验证：2023 年两个原始 SMT 发现项目在各入组 1
              名患者后终止，且未公开披露科学原因，这让外界不确定该平台能否独立产出具备临床可行性的候选药物。
