      - number: '8.4'
        title: 投资建议与论点摘要
        blocks:
          - type: paragraph
            body: >-
              对 Eikon Therapeutics (EIKN) 的分析师建议是 HOLD / 逢低 ACCUMULATE，12 个月目标价为每股 $19-22（按完全摊薄计算，市值约
              $780M-905M）。该建议反映以下正反论点的平衡：正向论点是，Perlmutter 在 pembrolizumab 上的记录、Merck 合作强度，以及 TeLuRide-006 设计质量，使 Eikon
              有机会成为首个在随机试验中成功的 TLR7/8 激动剂。积极中期数据将触发迅速重估。反向论点是，TLR7/8 机制从未实现 Phase 3 成功；2023 年项目终止引发平台有效性质疑；每月 $28M
              的烧钱速度意味着 IPO 后现金只够约 25 个月现金跑道；而 $1.85B 私募估值降至 $750-800M
              公开市场估值，反映了市场对尚未获批肿瘤平台的结构性怀疑。建议已持有该名称的投资者继续持有，并在股价低于 $16/share（市值低于 $660M）时逢低增持，因为风险 /
              回报会明显改善。新投资者应等待入组完成确认，或早期 TeLuRide-006 安全性 / 活性信号后，再建立完整仓位。建立任何新仓位前，最重要的尽调问题是 TeLuRide-006
              统计分析计划；它能帮助投资者评估中期分析是否具备足够统计功效来检测有意义的临床改善。
            claimRefs:
              - CV011
              - CV012
              - CV013
