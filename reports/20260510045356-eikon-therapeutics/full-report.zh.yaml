        - EIK1005（WRN 解旋酶）IND 提交，早期 1 期显示靶向安全性；第二个 SMT 项目进入 IND 支持阶段
      - - 资本和现金消耗（跑道到期）
        - IPO 后 $717M 现金；H2 2027 跑道；阳性期中结果可支持以有利条件追加融资
        - TeLuRide-006 期中阴性 + 无法融资；无近期催化剂且现金跑道低于 12 个月；DSMB 建议停止试验
        - 阳性期中分析支持以有利条件融资 $300-500M；Merck 以预付款扩大合作
      - - 关键人物（Perlmutter 离任）
        - Perlmutter 仍在一线角色；董事会想必已有接班思路；机构投资者了解关键人物风险
        - Perlmutter 离任且未宣布可信接替者；Merck 在 3 个月内公开退出合作
        - Perlmutter 留任至商业化上市；或由同等免疫肿瘤药企高管接班
      - - 伙伴集中度（Merck 退出）
        - Merck 是活跃投资方和合作伙伴；财务利益一致；Perlmutter 关系；Merck 有 Keytruda 之后的管线需求
        - Merck 正式终止临床供应协议或出售其 ~10% 股权；EIK1001 无法按试验成本获得 pembrolizumab
        - 为 EIK1003、EIK1004 或平台签下第二家药企伙伴；Merck 将关系扩大到更多项目
      - - 竞争（竞争对手 PARP1 抑制剂获批）
        - EIK1003 PARP1 选择性区别于 EIK1004 CNS 定位；EIK1003 相对 PARP1/2 双重抑制剂具备安全性差异化
        - AZD5305（AstraZeneca 选择性 PARP1）先于 EIK1003 在 HRR+ 实体瘤获 FDA 批准；仿制 PARP 定价竞争加剧
        - EIK1003 相对 AZD5305 展示更优 PFS 或安全性；EIK1004 占据独特 CNS PARP 细分，且没有直接竞争对手
    notes: 否决标准是假设性阈值事件，不是要求立即行动的二元触发器。它们代表分析师判断中足以触发对投资论点进行根本重估的最低不利结果。
