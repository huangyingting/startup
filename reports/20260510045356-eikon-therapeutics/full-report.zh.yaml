      - number: '5.3'
        title: 技术架构：成像、化学与计算
        blocks:
          - type: paragraph
            body: >-
              SMT 平台整合了三层相互依赖的技术。硬件层由定制晶格光片显微镜和 RESOLFT 超分辨率仪器组成，能以适配活细胞生理的速度完成亚衍射成像。这些仪器由 Eikon 内部工程团队在 Hayward
              工厂搭建，无法在市场上直接购买现货，因此既形成复制壁垒，也带来维护依赖。化学层由 Janelia Fluor 染料构成；这是 Luke Lavis
              开发的专有染料系列，可在活细胞内对单个靶蛋白进行位点特异性共价标记。每个蛋白靶点都需要细致优化染料：细胞通透性、光谱性质、光稳定性和靶点标记效率都必须逐项验证，因此平台放大并不简单。计算层由机器学习模型构成，这些模型基于成像轨迹训练（单分子在时间维度上的位置、速度和结合事件），用于提取药物-靶点结合指标。这些模型把像素级显微数据转化为可解释的药理读数，例如停留时间分布、共定位频率，以及细胞内结合的剂量-反应曲线，而不是生化结合亲和力。每个新药物靶点都需要在三层技术上同时优化整个栈，相比传统生化高通量筛选，吞吐量受到限制。Eikon
              尚未披露具体吞吐指标（每月筛选数、每年靶点数），也没有披露与传统筛选平台的头对头比较。CTO Russ Berman 负责平台工程和放大。与 UC Berkeley 和 HHMI Janelia
              的学术合作继续支持平台开发。
