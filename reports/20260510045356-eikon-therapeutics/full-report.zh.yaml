      - number: '5.2'
        title: 临床管线：EIK1001 到 EIK1005
        blocks:
          - type: paragraph
            body: >-
              Eikon 的临床管线包括 4 个差异化肿瘤项目，覆盖免疫治疗和 DNA 损伤反应两类机制；另有第 5 个项目处于临床前 / IND 使能阶段。EIK1001 是 TLR7/8 激动剂，与 Merck 的
              pembrolizumab (Keytruda) 联合给药，用于实体瘤免疫治疗。TLR7/8 激动会激活先天免疫感知通路，触发系统性抗肿瘤免疫反应，并可能与 PD-1 检查点阻断形成协同。EIK1001
              目前有两项关键阶段试验：TeLuRide-006 (NCT05612581)，一项一线晚期黑色素瘤中与 pembrolizumab 联合的 Phase 2/3 随机试验；以及
              TeLuRide-005，一项一线非小细胞肺癌 (NSCLC) Phase 2 研究。黑色素瘤试验是 Eikon 近期价值最高的二元催化剂。EIK1003 是选择性 PARP1
              抑制剂，目前在乳腺癌、卵巢癌、前列腺癌和胰腺癌等同源重组修复缺陷癌种中开展 Phase 1/2 试验。已获批 PARP 抑制剂（olaparib、niraparib、talazoparib）同时抑制 PARP1
              和 PARP2；EIK1003 选择性作用于 PARP1，设计目标是在保留抗肿瘤疗效的同时，降低 PARP2 相关血液学毒性。EIK1004 是可穿透 CNS 的 PARP1 抑制剂，针对脑部和 CNS
              恶性肿瘤开展 Phase 1/2；现有 PARP 抑制剂血脑屏障穿透性差，这给它提供了机制上不同、且未满足需求显著的机会。EIK1005 是 WRN 解旋酶抑制剂，靶向微卫星不稳定性高 (MSI-H)
              癌症，目前处于 IND 使能研究。WRN 解旋酶在 MSI-H 肿瘤中的合成致死机制近期已得到验证，尚无获批药物，因此具备 first-in-class 潜力。关键问题在于，EIK1001 和 EIK1003
              都是外部收购资产，并非 SMT 发现资产，这在平台叙事与当前商业价值驱动因素之间留下缺口。
