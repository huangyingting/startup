    rows:
      - - Relay Therapeutics (RLAY)
        - 直接 AI 肿瘤同业
        - ~$850M 现金（2023）；NASDAQ 上市；约 400 名员工
        - 肿瘤（FGFR2、PI3Kα、构象灵活口袋）
        - Dynamo 平台；FDA 批准的 futatinib（FGFR2）— 首个 AI 辅助肿瘤获批药物；Roche 合作
        - 仅有传统生化测定 + 计算；不具备单分子活细胞成像能力；平台特定于靶点类别
      - - Monte Rosa Therapeutics (GLUE)
        - 直接 AI 肿瘤同业（降解剂）
        - ~$400M 融资；NASDAQ 上市；约 150 名员工；Q3 2024 现金 $184M
        - 肿瘤（GSPT1、MYC 扩增癌种），通过分子胶降解
        - QuEEN 平台支持理性分子胶设计；MRT-2359 处于 Phase I/II；针对同一癌基因靶点，是 PPI 抑制之外的替代路径
        - 未与大型制药公司建立平台合作；模态不同（降解剂），并非直接竞争，但靶向重叠的蛋白生物学；仅 Phase I
      - - Recursion / Exscientia (RXRX)
        - 最广泛的 AI 药物发现平台
        - $1.3B+ 融资；NASDAQ 上市；NVIDIA 合作；Roche 和 Sanofi 合作
        - 多适应症（肿瘤、罕见病、神经）；合并平台带来最广 AI 覆盖
        - 最大的生物学训练数据集；群体尺度表型组学成像；来自 Exscientia 的生成式 AI 化学；$100M+ 制药合作
        - 无 FDA 批准药物；群体级成像 vs Eikon 的单分子分辨率；临床证据仍未落地；现金消耗高
      - - Insilico Medicine
        - 生成式 AI 药物设计
        - ~$400M 融资；私有公司；业务覆盖 US、China、HK
        - 多适应症（IPF 在 China 获批；肿瘤 Phase I 项目）
        - INS018_055 在 China 获批（2025）— 全球首个从完全 AI 设计走到监管批准的药物（IPF）；TNIK 抑制剂
        - IPF 获批不属于肿瘤；China 监管先例对 US/EU 市场的相关性有限；未公开披露肿瘤 Phase II 数据
      - - Black Diamond Therapeutics (BDTX)
        - 前直接 AI 肿瘤同业
        - 2024 年持续经营警示；BDTX-1535 失败后基本停摆
        - 肿瘤（NSCLC 中 EGFR 变构突变）— 现已停摆
        - 变构 EGFR 路径相较已获批 EGFR 抑制剂有理论差异化
        - 警示证据：BDTX-1535 疗效失败；公司停摆；显示精准肿瘤 AI 公司存在临床转化风险
      - - AstraZeneca / Merck (Lynparza)
        - 在位肿瘤制药公司
        - Olaparib：$2.33B 收入（2023）；多个获批适应症（卵巢癌、乳腺癌、胰腺癌、前列腺癌）
        - PARP 抑制剂，覆盖多个实体瘤适应症
        - 先发 PARP 抑制剂，在 7+ 个获批适应症上有成熟临床证据；庞大商业化基础设施；内部 AI/ML 团队
        - 对 EIK1002 构成直接竞争威胁：成熟产品和广泛适应症覆盖正在挤占 PARP 抑制剂空间
      - - Bristol-Myers Squibb (Opdivo/Yervoy)
        - 在位肿瘤制药公司
        - Nivolumab：$9.8B 收入（2023）；一线黑色素瘤标准治疗
        - 黑色素瘤、NSCLC、RCC、GI 癌种中的免疫疗法（anti-PD-1、CTLA-4）
        - 多适应症标准治疗；成熟的肿瘤医生关系；黑色素瘤 NCCN Category 1
        - 为 EIK1001 在黑色素瘤设定疗效门槛：EIK1001 必须证明优于 nivolumab/ipilimumab，或在联合 / 并用中带来获益
      - - Schrödinger（SDGR，上市公司）
        - 计算化学平台替代品
        - ~$300M 融资；NASDAQ 上市；基于物理的 FEP+ 平台；与多家制药公司合作
        - 面向包括 PPI 在内任何靶点的药物设计；仅 in-silico；授权模式
        - 基于物理的 FEP+ 可预测结合亲和力；无需活细胞实验即可用计算覆盖 PPI 界面；多制药合作伙伴基础
        - 仅 in-silico；无法捕捉 Eikon 活细胞成像提供的动态细胞语境；FEP+ 的 PPI 准确度仍在提高；尚无仅靠 FEP 引导设计得到的 PPI 药物临床验证
    notes: 融资数据来自公开申报或新闻报道，可能不反映最新状态。BDTX 停摆状态基于 2024 年持续经营披露。Olaparib 和 nivolumab 收入数据分别来自 AstraZeneca 和 BMS 2023 年年报。
