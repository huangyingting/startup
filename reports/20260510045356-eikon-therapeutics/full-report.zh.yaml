      - number: '1.2'
        title: 科学创始人与技术平台
        blocks:
          - type: paragraph
            body: >
              Eikon Therapeutics 由四位科学家共同创立，他们的履历代表了现代生物学和生物物理学里的顶级梯队。Eric Betzig 是 HHMI

              Janelia Research Campus 的 Group Leader，因开发超分辨荧光显微技术，与 Stefan W. Hell 和 William E. Moerner

              共同获得 2014 诺贝尔化学奖；该技术突破光学衍射极限，可在纳米尺度观察生物结构。Betzig 随后开发晶格光片显微成像，让活细胞能在更长时间内成像且光损伤极低——这构成了

              Eikon 平台的基础。


              同样来自 Janelia Research Campus 的 Luke Lavis 开发了 Janelia Fluor (JF)
              荧光染料系列——这类可进入细胞的探针，是活细胞单分子成像的关键。借助这些染料，研究者能在原生细胞环境中以高信噪比标记并追踪单个蛋白分子。分子生物学家

              Robert Tjian 曾任 HHMI 总裁和 University of California, Berkeley 校长，带来机构关系和基因调控专长。UC

              Berkeley 教授 Xavier Darzacq 专攻单分子成像，以及活细胞转录动态的定量分析。几位创始人共同搭建了 SMT
              平台：在活细胞内实时追踪单个蛋白分子与候选药物的相互作用，从而直接测量药物-靶点结合，这是传统生化方法或固定细胞成像做不到的。平台再把机器学习作用于成像数据，将分子行为读数转化为可量化的药物发现洞察。
