      - number: '5.4'
        title: 监管状态、临床开发与信任控制
        blocks:
          - type: paragraph
            body: >-
              Eikon 的管线处于美国 FDA 监管之下，并已为其临床阶段项目提交 IND。EIK1001 (TeLuRide-006) 在 FDA 放行的 IND 下入组，开展一线晚期黑色素瘤 Phase 2/3
              随机对照试验；该试验也登记在 ClinicalTrials.gov (NCT05612581)。EIK1003 和 EIK1004 PARP1 抑制剂项目在 IND 下开展 Phase 1/2 剂量递增研究。截至
              May 2026，Eikon 尚未公开披露任何项目获得 FDA Breakthrough Therapy Designation 或 Fast Track
              Designation；若获得，这些资格本可加速开发。临床药物供应的 Good Manufacturing Practice (GMP) 合规由两部分管理：EIK1001 的 Merck
              临床供应协议（pembrolizumab）以及 Eikon 小分子项目的合同生产组织。SMT 平台本身按实验室级质量控制运行；它是研究工具，不是受监管诊断产品，因此当前形态不受 FDA
              监管。数据完整性和可重复性决定平台可信度：成像伪影、荧光串扰和单分子定位误差都必须系统控制。Eikon 的科学顾问委员会，以及 UC Berkeley 和 Janelia
              的学术合作者，为成像方法提供独立质量监督。临床试验患者数据按标准 21 CFR Part 11 电子记录要求和 Good Clinical Practice 指南管理。Eikon 任何项目均未报告临床搁置、FDA
              警告信或安全相关试验终止。
