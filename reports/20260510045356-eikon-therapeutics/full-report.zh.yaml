  - id: FE001
    type: stack
    layout: standard
    slug: product-architecture-map
    title: 产品架构图：SMT 平台栈
    summary: Eikon 的 SMT 平台分三层：硬件、化学和计算；图中列出各层关键组件与依赖。
    approximationNotes: 层级构成基于已发表科学论文、专利披露和公开演示。吞吐量和产能指标未公开。
    claimRefs:
      - CE016
      - CE017
      - CE018
      - CE019
    data:
      layers:
        - label: 硬件层：成像仪器
          detail: 定制搭建的晶格光片显微镜（源自 Nobel Prize，Eric Betzig 设计）和 RESOLFT 超分辨率系统。无法商业购买；由 Eikon 工程团队在 Hayward, CA 搭建并维护。
        - label: 化学层：Janelia Fluor 染料与蛋白标签
          detail: 专有 JF 染料库（Luke Lavis / Janelia）+ HaloTag/SNAP-tag 蛋白标记化学。由 HHMI Janelia 独家授权。每个靶点都需要优化染料；每个新靶点应用需 3–6 个月。
        - label: 生物层：靶细胞系与测定开发
          detail: 癌症相关细胞系中的内源或过表达 HaloTag/SNAP-tag 蛋白构建体。CRISPR 工程调到生理表达水平。生物团队开发靶点特异测定。
        - label: 数据与 ML 层：轨迹分析与药物指标
          detail: 基于 GPU 的单分子轨迹分析管线，用 ML 模型计算驻留时间、扩散系数和药物占据比例。模型用已知药物-靶点配对训练；可用于新的靶点-药物组合。
        - label: 输出层：药物发现决策与临床候选物
          detail: SMT 得出的靶点结合指标输入先导优化决策和支持 IND 的资料包。目前用于 EIK1005（WRN 解旋酶）和未来未披露项目；EIK1001 和 EIK1003 来自外部引进。
  - id: FE002
    type: flow
    layout: wide
    slug: customer-workflow-operating-flow
    title: 客户工作流：SMT 驱动的药物发现与临床交付
    summary: 从靶点识别到临床试验交付的端到端工作流，显示 Eikon 的 SMT 平台在标准药物发现流程中插入的位置。
    approximationNotes: 工作流步骤基于 Eikon 声称的平台用例和已发表学术论文。临床时间线为估计。
    claimRefs:
      - CE001
      - CE002
      - CE003
      - CE008
    data:
      nodes:
        - label: 靶点识别：SMT 成像捕捉蛋白动态，在活体癌细胞中识别具备可测分子行为、可干预的药物靶点
        - label: 命中物生成：用 SMT 占据比例作为主要读数筛选化合物库；识别具备细胞内靶点结合（不只是生化结合）的化合物
        - label: 先导优化：用 SMT 驻留时间和扩散系数指标指导 SAR 决策；筛出靶上结合最优的化合物
        - label: 支持 IND 的研究：体内药理、毒理和 GMP 合成；SMT 靶点结合数据纳入 IND 资料包
        - label: Phase 1 剂量递增：安全性、PK、PD；用 SMT 衍生靶点结合指标作为 PD 读数开发生物标志物（假设路径；当前试验尚未确认）
        - label: Phase 2/3 疗效：随机对照试验（如 TeLuRide-006）；主要终点 ORR、PFS、OS；SMT 生物标志物效用正在评估
        - label: 监管申报与批准：NDA/BLA 申报；SMT 平台数据作为临床资料包的机制支持
      edges:
        - from: Target Identification
          to: Hit Generation
        - from: Hit Generation
          to: Lead Optimization
        - from: Lead Optimization
          to: IND-Enabling Studies
        - from: IND-Enabling Studies
          to: Phase 1 Dose Escalation
        - from: Phase 1 Dose Escalation
          to: Phase 2/3 Efficacy
        - from: Phase 2/3 Efficacy
          to: Regulatory Submission and Approval
