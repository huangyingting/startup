      - number: '6.2'
        title: 临床试验中心采用与入组证据
        blocks:
          - type: paragraph
            body: >-
              Eikon 临床试验的入组情况，尤其是 TeLuRide-006 (NCT05612581)，是当前阶段最具操作实感的客户采用指标。学术医学中心正积极为 TeLuRide-006 这一 Phase 2/3
              关键试验入组患者，说明：（1）多个中心的机构审查委员会已批准方案；（2）中心研究者认为该机制具备科学合理性；（3）患者愿意加入实验性联合治疗方案。此类关键阶段肿瘤试验的典型入组周期为 18-36
              个月，才能达到完整样本量。Eikon 在 ASCO 2024 和 ASCO 2025 展示临床数据，说明已入组患者产生了试验数据，且数据质量和关注度足以被全球最大肿瘤大会接收展示。EIK1003 Phase
              1/2 试验 (NCT04799054) 在乳腺癌、卵巢癌、前列腺癌和胰腺癌队列中的入组，确认了跨多个肿瘤类型、多个中心的入组，也显示肿瘤医生对选择性 PARP1 假设有所参与。EIK1004 Phase 1/2
              试验在神经肿瘤中心入组 CNS/脑癌患者，代表了一个不同客户细分（神经肿瘤医生），对应专业脑肿瘤项目。对一家约 384 名员工、月烧钱 $28 million 的公司而言，同时推进 4
              项活跃临床试验的入组，在运营上具有重要意义，也证明了执行能力。
