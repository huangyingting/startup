  - number: 6
    title: 客户
    sections:
      - number: '6.1'
        title: 客户定义：临床试验中心与制药合作伙伴
        blocks:
          - type: paragraph
            body: >-
              作为一家尚未商业化、处于临床阶段的生物制药公司，Eikon Therapeutics 传统意义上没有付费商业客户。当前“客户基础”实际由两类构成。第一类是临床试验中心伙伴——为 Eikon
              试验（TeLuRide-006、TeLuRide-005、EIK1003 Phase 1/2 和 EIK1004 Phase
              1/2）入组患者的学术医学中心和癌症医院。这些机构以免费获得试验药物和研究经费为交换参与；它们之所以可被视为客户，是因为机构参与意愿验证了治疗假设，并生成 Eikon 估值所依赖的临床数据。MD
              Anderson、Memorial Sloan Kettering、University of Colorado Health Cancer Center
              等领先学术癌症中心，是关键阶段肿瘤生物科技公司的典型试验中心伙伴。第二类是制药合作伙伴客户：Merck & Co.。Merck 共同开发 EIK1001，已承诺 $30 million 股权投资（约 10%
              持股），并根据临床供应协议为 TeLuRide-006/005 提供 pembrolizumab。在当前尚未商业化阶段，Merck 是 Eikon 最接近 B2B
              客户或创收伙伴的对应方。未来商业客户——肿瘤医生、癌症中心、医院和支付方——取决于药物获批；按当前 Phase 2/3 试验时间表，商业化上市最早也很难早于 2028–2030 年。
