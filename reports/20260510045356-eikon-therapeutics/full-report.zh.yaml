  - number: 4
    title: 财务
    sections:
      - number: '4.1'
        title: 收入模型：依赖合作、商业化前架构
        blocks:
          - type: paragraph
            body: >
              Eikon Therapeutics 采用的是商业化前 AI 药物发现公司典型的生物制药收入模型：产品收入为零，主要收入来自研究合作协议，长周期里程碑只有在药物获批后才会转化为特许权

              收入。这种架构意味着 Eikon 近期现金流几乎完全由 Merck 合作决定，并由风险资本提款补充。


              Merck 合作（已确认：$30M 股权投资，2025）很可能包含一份研究合作协议，含基于 FTE 的研究经费和按项目设置的里程碑付款。可比

              AI 药物发现平台合作的行业先例（Relay/Roche、Recursion/Roche $150M、Recursion/Sanofi $150M）显示，预付款

              研究经费可在 $10M 到 $150M 之间，取决于项目范围；每个项目在临床开发生命周期内的里程碑付款为 $100M–$1B。Eikon 与 Merck

              协议的具体条款未公开披露，这是本财务评估中最重要的单一信息缺口。


              研究合作协议的收入确认遵循 ASC 808（collaborative arrangements）或 ASC 606（contracts with
              customers），研究经费在履约期内按比例确认，里程碑在达成时确认。这意味着即便

              Eikon 拥有总潜在里程碑包（例如 $500M+），在 Phase II 数据读出前，任一年确认收入也会限于研究报销，可能在每年 $10–40M 区间。


              没有公开披露证据显示 Eikon 有 Merck 合作以外的任何收入来源。Eikon 未发布财务报表、提交 SEC 文件，或披露任何资助、政府

              合同或再授权收入。
