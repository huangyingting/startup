      - - RESOLFT 超分辨成像
        - 用于致密细胞环境的亚衍射成像；在分子拥挤遮挡标准 SMT 时使用
        - 定制仪器工程；需与 RESOLFT 切换兼容的专用荧光标签
        - 通量有限；技术要求高；JF 系列之外还需要额外染料工程
      - - Janelia Fluor (JF) 染料库
        - 专有荧光染料分子，可共价标记单个靶蛋白；细胞可渗透且光稳定
        - Luke Lavis / Janelia 持续开发；Eikon 独家许可
        - 每个靶点都需要染料优化（渗透性、光谱调谐、背景）；并非所有靶点都适配
      - - HaloTag / SNAP-tag 蛋白标记
        - 与靶蛋白融合的酶标签，用于位点特异、化学计量式连接 JF 染料
        - 靶细胞系遗传工程（CRISPR 或过表达）；稳定细胞系生成
        - 每个靶点细胞系工程周期 3–6 个月；为保持生理相关性需要内源标记
      - - 机器学习 / 轨迹分析管线
        - 将原始单分子成像数据（位置、时间、强度）转换为药理指标（停留时间、扩散状态、药物占据比例）
        - 内部数据科学团队；GPU 计算基础设施；来自已知药物-靶点配对的标注训练数据集
        - 模型泛化到新靶点的能力；小数据集过拟合风险；复杂轨迹特征可解释性
      - - 临床药品制造
        - GMP 级 EIK1001（TLR7/8 激动剂）和 PARP1 抑制剂（EIK1003、EIK1004）供药
        - Merck 提供 pembrolizumab 临床供应协议；小分子 CMO 合作
        - 临床供应链中断；CMO 质量失败；Merck 协议依赖临床关系
    notes: 架构评估来自已发表科学论文、专利申请和公开演示。内部通量指标未公开披露。
