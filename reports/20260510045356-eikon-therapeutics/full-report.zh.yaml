        - 获批后的 CMS 药价谈判会压低 Medicare Part D 肿瘤药物的净实现收入
        - Eikon 的主要适应症是否会受 IRA 谈判时间线约束？在 IRA 调整后定价下，峰值销售估算假设是什么？
      - - AI 平台交易后端加载趋势（2024）
