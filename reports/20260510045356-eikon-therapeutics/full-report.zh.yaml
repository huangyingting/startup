  - number: 3
    title: 竞争者
    sections:
      - number: '3.1'
        title: 竞争格局：直接 AI 肿瘤同行、既有厂商与现状方案
        blocks:
          - type: paragraph
            body: >
              Eikon 的竞争格局分为三层，必须分别评估，因为它们威胁的是 Eikon 商业论点的不同部分。


              第一层是 AI 赋能精准肿瘤发现的直接同行：Relay Therapeutics（面向构象灵活靶点的计算平台，NASDAQ: RLAY）、Monte Rosa

              Therapeutics（分子胶降解剂平台，NASDAQ: GLUE）、Recursion Pharmaceuticals（AI 表型组学

              平台，与 Exscientia 合并，NASDAQ: RXRX）和 Insilico Medicine（生成式 AI 药物设计）。这些公司与

              Eikon 争夺制药平台合作、投资者资本和临床人才。这个同行组里，Relay Therapeutics 已经取得最重要的临床里程碑：futatinib（RLY-4008，FGFR2

              抑制剂）在 2024 获 FDA 批准用于胆管癌，验证了 AI 辅助发现公司能把药物从平台推进到获批。Black Diamond

              Therapeutics 代表下行风险：其 BDTX-1535（EGFR allosteric）未能证明足够疗效，BDTX 在 2024 发布持续经营

              警示，实际上进入收缩退出状态——这对 Eikon 是一个警示性平行案例。


              第二层是大型既有制药公司，它们在 Eikon 目标适应证中已有上市精准肿瘤药：AstraZeneca/Merck 的 Lynparza（olaparib，PARP

              抑制剂）年销售 $2.3B，Bristol-Myers Squibb 的 nivolumab (Opdivo) 加 ipilimumab (Yervoy) 是一线黑色素瘤的

              标准治疗。这些药物定义了 Eikon 的 EIK1001（TLR7/8 激动剂）和 EIK1002（PARP-variant）要实现差异化时必须达到或超过的临床对照门槛。AstraZeneca

              通过内部 MLAI 团队拥有 AI 能力；随着老牌制药公司在内部建设 AI 药物发现基础设施，Eikon 存在长期替代风险。


              第三层是制药内部实验室的传统高通量筛选（HTS）现状方案——Eikon 平台直接替代的就是这套体系。大型制药公司（Pfizer、Roche、Novartis）保有数百名药物化学家和 HTS 设施，构成了为外部
              AI 平台付费的主要替代方案。Schrödinger 的物理计算平台是 Eikon 成像平台最近的计算替代品，可在不需要活细胞仪器的情况下做

              计算机模拟 PPI 建模。
