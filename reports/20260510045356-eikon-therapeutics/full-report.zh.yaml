              - CV018
      - number: '8.6'
        title: 最终尽调问题与投资决策标准
        blocks:
          - type: paragraph
            body: >-
              要以高置信度做出完整投资决策，需要 5 项关键信息：（1）TeLuRide-006 完整方案和统计分析计划 (SAP)——尤其是主要终点定义、中期分析时间、DSMB
              停止标准和统计功效计算假设。没有这些信息，就无法评估积极中期结果是否有足够统计功效支持加速批准。（2）2023 年项目终止原因——尤其是失败模式是平台相关（靶点错误、SMT 信号失真），还是临床 /
              业务相关。这决定 SMT 平台在估值模型中是否应获得任何期权价值。（3）HHMI Janelia IP 授权条款，包括控制权变更条款——这对评估并购退出场景至关重要，因为收购方会继承 SMT 平台
              IP。（4）Merck 合作协议条款，包括终止条款、里程碑付款和任何共同商业化权利——这些决定该合作除临床供应外是否具备真实经济价值。（5）截至 Q2-Q3 2026 的 TeLuRide-006
              入组状态——尤其是入组是否按计划推进或延迟，以及是否已向 FDA 提交任何方案修订。公开可得的中期入组更新将显著降低催化剂时间不确定性。
            claimRefs:
              - CV017
              - CV018
              - CV019
