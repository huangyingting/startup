      - number: '7.2'
        title: 平台转化风险：从 SMT 发现到临床可行性
        blocks:
          - type: paragraph
            body: >-
              Eikon 历史上最重要的负面信号，是 2023 年两个管线项目在 Phase 1 临床试验中各只入组 1 名患者后终止。这些项目由 SMT
              平台筛选出来，因此失败可能指向平台层面的局限：它预测临床可行性的能力不足。Eikon
              尚未公开披露这些终止项目的靶点类别、作用机制、失败模式（安全性、缺乏疗效或业务优先级），也没有披露科学理由。这种不透明制造了尽调缺口：投资者无法判断失败是否来自 SMT
              平台错误（靶点选择错误、结合读数不正确、细胞模型失真），还是与平台无关的独立临床开发失败。实际后果是，截至 May 2026，没有任何纯 SMT 发现药物证明了临床疗效。EIK1001 和
              EIK1003——Eikon 两个关键阶段项目——均为外部收购资产，并非 SMT 发现。Eikon 估值中的全部平台溢价，都建立在 SMT 将产出临床成功药物这一假设上；该假设仍未验证。EIK1005（WRN
              解旋酶抑制剂，临床前）是最先进的真正由 SMT 支撑的资产，但距离潜在获批还有 4-6 年，意味着平台验证时间表远超当前资金跑道。
            claimRefs:
              - CR005
              - CR006
              - CR007
              - CR008
      - number: '7.3'
        title: 资本与烧钱速度风险：现金跑道约束与融资依赖
        blocks:
          - type: paragraph
            body: >-
              Eikon 每月烧钱约 $28 million——2025 年年化为 $338 million；IPO 后现金约 $717 million，预计现金跑道延至 H2 2027。这条现金跑道足以覆盖
              TeLuRide-006 中期分析（预计 2026-2027 年）和早期 EIK1003 Phase 1/2 数据，但若中期分析要求延长试验或修改设计，则不足以完整资助 EIK1001 的 Phase 3
              项目。积极的中期分析很可能让 Eikon 以有利条件进入资本市场；阴性分析则会削弱其为任何剩余项目融资的能力。烧钱速度反映了 Eikon 的 4 项临床试验组合和 384 人团队：即便 2025 年裁员 15%
              后，月度费用仍处于临床阶段生物科技公司中按员工计最高的一档。关键资本风险包括：（1）任何要求扩大入组的试验方案修订都会推高总支出；（2）CMO 定价上涨或供应中断会增加试验成本；（3）Merck
              之外任何项目都没有合作里程碑收入（且 Merck 研究合作财务条款未披露），意味着 Eikon 几乎完全依赖股权市场资本；（4）若生物科技市场环境恶化，Eikon 在读出前以非稀释性条件融资的能力会受损。
            claimRefs:
              - CR009
              - CR010
              - CR011
              - CR012
      - number: '7.4'
        title: 监管与法律风险：IP、临床搁置与 FDA 依赖
        blocks:
          - type: paragraph
            body: >-
              Eikon 的监管风险画像，是标准临床阶段肿瘤项目不确定性叠加特定 IP 和授权依赖。监管端，公司尚未宣布任何项目获得 FDA Breakthrough Therapy Designation、Fast
              Track Designation 或 Accelerated Approval 路径，这意味着 Eikon 项目将按标准 FDA 审评时间表推进（NDA/BLA 提交后 10-14 个月）。任何活跃试验一旦在
              EIK1001 或 EIK1003 中出现需要方案审查的安全信号，都存在临床搁置风险。TLR7/8 激动剂机制通常被认为安全，但系统性 TLR 激动可能导致细胞因子释放综合征 (CRS)
              和其他免疫相关不良事件，必须谨慎管理。IP 端，Eikon 的 SMT 平台建立在 HHMI Janelia Research Campus
              的独家授权上；该授权的具体条款（期限、使用领域、再授权权利、控制权变更条款）未公开披露。在特定条件下——例如破产、控制权变更或违反最低商业化义务——授权终止可能会消除 Eikon 核心平台 IP
              保护。此外，EIK1001 和 EIK1003 建立在外部授权的第三方 IP 之上，带来对第三方授权方合规的依赖，也存在 IP 争议可能。核心平台 IP 的专利到期时间未公开披露。
