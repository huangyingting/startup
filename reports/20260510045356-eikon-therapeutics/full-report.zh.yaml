      - number: '2.3'
        title: 买方、用户与支付方分层
        blocks:
          - type: paragraph
            body: >
              Eikon 的商业模式至少涉及三类不同买方和支付方关系，取决于其战略路径。作为平台公司，其买方是大型制药公司的业务拓展和 R&D

              联盟负责人。决策链包括首席科学官、外部创新负责人和 BD 负责人，典型交易周期从首次接触到落地为

              12–24 months。Top-10 制药公司的平台交易预算从 $50 million 到超过 $1 billion 不等。精准肿瘤目前已经纳入超过

              15 种肿瘤的标准治疗，并配有 FDA 批准的生物标志物匹配疗法；NSCLC 和黑色素瘤中，医生对生物标志物检测的采用率超过

              70%（ASCO, 2023）。


              作为药物开发商，如果 Eikon 的药物获批，处方方将是专科癌症中心和学术医学中心的肿瘤内科医生与肿瘤护士。肿瘤药物的支付方包括商业保险、Medicare（CMS，65+ 患者的主要政府支付方）和
              Medicaid。黑色素瘤精准治疗中，免疫肿瘤药物的定价平均为每名患者每年

              $130,000–$250,000，已经建立高价值专科药房报销先例。癌症患者是最终用户，但很少直接付款；生物标志物检测决定资格，由此形成多步骤采用路径。


              CMS 的 Inflation Reduction Act (IRA) 药品谈判项目在 2023 启动，瞄准 Medicare Part D 支出最高的药物；肿瘤是受谈判影响最大的药物类别。ICER

              2023 评估发现，超过 60% 的高成本肿瘤药在标价下达不到成本效果阈值，说明支付方对处方目录准入的阻力正在加大。即使临床成功，这些支付方动态也会对

              Eikon 的峰值收入预测形成结构性约束。


              肿瘤药商业化的标准路径，是从 FDA 批准走到商业采用：需要进入 NCCN Category 1 指南、伴随诊断共同获批，并被支付方处方目录

              纳入——这是获批后持续多年的采用过程。学术研究中心是 Eikon 平台的次级买方，场景是基础研究合作和资助研究，主要通过 NIH 资助的癌症中心合作完成。
