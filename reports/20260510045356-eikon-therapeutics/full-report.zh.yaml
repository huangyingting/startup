  - number: 7
    title: 风险
    sections:
      - number: '7.1'
        title: 二元临床风险：TeLuRide-006 是主要价值催化剂
        blocks:
          - type: paragraph
            body: >-
              Eikon Therapeutics 面临的最大单一风险，是 TeLuRide-006 的二元结果——这项 Phase 2/3 随机对照试验评估 EIK1001（TLR7/8 激动剂）+
              pembrolizumab 对比 pembrolizumab 单药用于一线晚期黑色素瘤。该试验是 Eikon 近期最重要的价值创造机会，但若失败，将同时切断主要收入路径、削弱投资者信心，并可能动摇 Merck
              合作。几个因素放大了这一风险的二元性：第一，一线晚期黑色素瘤如今由有效的检查点免疫治疗主导，包括 pembrolizumab 单药、nivolumab，以及 ipilimumab + nivolumab
              等联合方案，TLR7/8 激动剂要证明有意义的增量获益并不容易。第二，EIK1001 的 TLR7/8 机制尚未在全球任何适应症中产生 Phase 3
              成功，因此关键试验层面仍未验证。第三，Roche/Genentech (RO7119929) 和其他开发者的 TLR7/8
              激动剂项目在可比适应症中结果不一，提供了警示信号。第四，试验设计、主要终点和统计假设都依赖于达成指定 ORR 或 PFS 改善，且改善幅度必须足够大，才具备临床意义和统计显著性。若 2026-2027
              年预计进行的中期分析为阴性，将成为 Eikon 迄今商业史上最严重的不利事件。
