        - 长期（5–15 年）
        - 扩大 Eikon 肿瘤药物的可触达患者群体；推动制药行业 R&D 预算扩张
        - 哪些肿瘤类型的发病率增长最快？Eikon 在黑色素瘤 + PARP 上的重心是否契合发病率趋势？
      - - FDA 精准肿瘤获批数量创纪录（2023 年 14 项带伴随诊断）
        - 增长驱动因素
        - 近期（1–3 年）
        - 验证精准肿瘤监管路径；增加支付方对高价靶向药的报销先例
        - Eikon 项目的 FDA 批准概率是多少？FDA 的精准指导如何适用于 TLR 激动剂？
      - - AI 药物发现交易活动激增（2023 年交易额 $2B+）
        - 增长驱动因素
        - 近期（1–3 年）
        - 增强市场对 AI 平台合作的验证；改善 Eikon 在交易条款上的议价位置
        - Merck 交易与同业 AI 药物发现交易相比如何？Eikon 的交易经济性是否在改善？
      - - 基因组测序成本下降（2024 年 WGS <$200）
        - 增长驱动因素
        - 近期（1–3 年）
        - 提高生物标志物检测可及性；扩大精准肿瘤药物适格患者识别
        - Eikon 的伴随诊断策略是否借助 NGS 检测？EIK1001 患者筛选需要哪类生物标志物检测？
      - - 制药 R&D 生产率危机（2023 年平均 IRR 降至 1.2%）
        - 增长驱动因素
        - 近期（1–3 年）
        - 促使制药公司加快采用外部 AI 平台；强化 Eikon 的合作价值主张
        - 在肿瘤领域内，制药公司更愿意通过平台合作而非内部发现切入哪些治疗方向？
      - - 肿瘤临床失败率高（Phase II/III 流失率 ~89%）
        - 采用约束
        - 持续性（结构性）
        - AI 发现的先导物也可能像传统先导物一样在临床失败；临床证据出现前，市场怀疑仍会持续
        - Eikon 是否发布过任何数据，显示其平台发现化合物的临床前到临床转化率更高？
      - - 10–15 年药物开发周期
        - 采用约束
        - 持续性（结构性）
        - 平台合作的里程碑收入释放慢；Eikon 必须在多年时间线下管理现金消耗
        - Eikon 预计 EIK1001 首次临床读出的时间线是什么？Breakthrough Therapy Designation 是否适用？
      - - IRA 药价谈判（CMS）
