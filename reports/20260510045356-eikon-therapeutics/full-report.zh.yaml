      - number: '6.4'
        title: 未来商业客户细分与采用路径
        blocks:
          - type: paragraph
            body: >-
              Eikon 药物获批后的未来商业客户主要分为三类。第一类是在社区和学术癌症中心开具肿瘤药物处方的肿瘤内科医生和肿瘤药师。若 EIK1001 在晚期黑色素瘤中获批，处方基础约为 3,000-5,000
              名美国黑色素瘤治疗肿瘤医生，集中在拥有黑色素瘤肿瘤委员会的学术癌症中心，以及使用 NCCN 指南的社区肿瘤诊所。MD Anderson、MSK、Dana-Farber 等学术中心的关键意见领袖 (KOLs)
              将推动早期采用。第二类是支付方——商业保险公司和政府支付方（Medicare、Medicaid），它们决定处方集准入、报销率和 step-edit 要求。在一线晚期黑色素瘤中，对照治疗是
              pembrolizumab 单药；如果 Eikon 联合方案需要先承担单药共付或先走阶梯治疗，采用速度会放慢。第三类是医院和整合交付网络 (IDNs)，它们通过专科药房或 GPO
              安排谈判药品采购。采用速度高度取决于相较 pembrolizumab 单药的临床差异化：如果 TeLuRide-006 只显示 ORR 小幅提升，而没有 OS 获益，即便获得 FDA 批准，支付方和 KOL
              的采用也可能偏慢。Merck、BMS、AstraZeneca 以及新兴 TLR 激动剂公司的竞争项目，将构成商业化上市时的未来竞争格局。
