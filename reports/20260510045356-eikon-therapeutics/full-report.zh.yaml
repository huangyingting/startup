  - id: TM001
    slug: market-definition-table
    title: 市场定义表
    description: >-
      The three market layers relevant to Eikon Therapeutics, their included and excluded spend, buyer/payer identity,
      and Eikon's relevance to each.
    columns:
      - 市场细分 / 类别
      - 纳入支出
      - 排除支出
      - 买方 / 支付方
      - 与 Eikon 的相关性
    rows:
      - - 全球肿瘤药物市场
        - 全球化疗、靶向治疗、免疫治疗、激素治疗药物销售额（2022 年 ~$196B）
        - 诊断、医疗器械、手术、放疗、支持治疗药物
        - 健康保险方（商业保险、Medicare、Medicaid）、政府医疗体系（NHS、EU）
        - Eikon 获批药物 EIK1001 和 EIK1002 的终端市场；决定竞争性定价上限和支付方约束
      - - 精准肿瘤学子市场
        - 肿瘤领域由生物标志物驱动的靶向疗法；部分估算包含伴随诊断（2022–2023 年 $77–94B）
        - 非生物标志物化疗、广泛放疗、姑息治疗
        - 同上；处方医生为肿瘤科医生；适用资格由生物标志物检测实验室把关
        - 直接相关：Eikon 管线瞄准按分子定义的患者亚群，需要伴随诊断
      - - 肿瘤药物发现 / R&D 平台市场
        - 制药 R&D 合作、肿瘤候选药物里程碑和授权付款、平台访问交易
        - 药品销售收入、临床试验 CRO 服务、生产、上市后监测
        - 大型制药公司的 BD 和 R&D 联盟团队（Merck、Pfizer、Roche、BMS）；预算由 CSO 和外部创新负责人掌握
        - 直接收入机会：Merck 交易（$30M 股权 + 里程碑）就是这类买方；新增合作是近期商业重点
      - - AI 赋能药物发现平台市场
        - AI 模型、计算筛选服务、活细胞成像工具、生物信息学平台（2022–2023 年年化 $1.3–1.5B）
        - 药物开发 CRO 服务、测序服务、未与平台授权捆绑的硬件销售
        - 制药 R&D 技术买方；生物技术授权团队；学术研究中心
        - 结构性市场背景：Eikon 的活细胞成像平台处在该空间，但不同于生成式 AI 语言模型平台
      - - PPI 靶向疗法利基市场
        - 靶向蛋白质-蛋白质相互作用的药物；没有独立公开规模估算；全球临床阶段药物少于 40 个
        - 其他所有药物靶点类别（激酶、GPCRs、通过传统机制作用的离子通道）
        - 同肿瘤药物市场；利基支付方大规模支付意愿尚未验证
        - 核心技术差异化：Eikon 称其平台可开发传统小分子难以触及的 PPI 靶点；SAM 尚无独立量化
    notes: 市场规模数字为分析师估算（IQVIA、Grand View Research、MarketsandMarkets），会随方法和纳入标准变化。PPI 药物发现细分市场没有独立单列估算。
    claimRefs:
      - CM001
      - CM002
      - CM003
      - CM004
