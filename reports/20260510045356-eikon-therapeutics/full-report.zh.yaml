      - number: '1.6'
        title: 负面信号、风险因素与关键尽调关注点
        blocks:
          - type: paragraph
            body: |
              Eikon 的科学谱系和融资成功叙事需要被几项实质性负面信号降温。第一，也是对平台验证最重要的一点：2023，两个最初由 SMT
              平台内部发现的药物项目，在临床试验中各自仅纳入一名患者后即被终止。该事件重创平台药物发现假设，说明 SMT 优势尚未在实践中转化为临床效用。公司转向收购外部临床资产（EIK1001、EIK1003），但
              SMT 平台是否已经产出临床验证过的候选药物，仍是开放问题。

              第二，Eikon 在 2025 裁员 15%，主要影响研究工具业务，理由是美国政府和 NIH 对学术研究机构的资金减少。从约 384
              名员工出发，此次裁员大约减少 57 个岗位，显示公司从工具制造收缩到纯药物开发，也反映高烧钱、尚无收入模式下的财务压力。第三，February
              2026 IPO 市值约 $743-800 million，明显低于十二个月前 Series D 的 $1.85 billion 投前估值；这一下台阶意味着部分后期私募投资者账面价值大幅缩水。第四，Eikon
              对 CEO Roger Perlmutter 有集中关键人风险。第五，以 fiscal year 2025 约 $28 million 每月的烧钱速度看，公司现金
              现金支撑期仅预计到 H2 2027，近期仍依赖资本市场。上述风险共同构成潜在投资者的实质尽调事项，应与 Eikon 的科学和临床优势一起评估。
