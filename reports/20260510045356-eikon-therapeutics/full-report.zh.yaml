      - number: '1.4'
        title: 融资历史与资本市场
        blocks:
          - type: paragraph
            body: |
              Eikon Therapeutics 走出了一条近年生物制药领域最成功的私募融资路径之一：在标志性公开发行前，通过四轮融资拿到约 $1.12 billion
              私募资本。公司在 May 2021 走出隐身，以 The Column Group 领投的 $148 million Series A 亮相，Foresite
              Capital、Innovation Endeavors 和 Lux Capital 参投——Eikon 立刻成为创投圈关注的高知名度平台公司。

              January 2022，Eikon 完成 T. Rowe Price 领投的 $518 million Series B——这是有记录以来最大的生物技术 Series B
              融资之一——并吸引了多元机构投资者，包括 CPP Investments、EcoR1、UC Investments、Abu Dhabi Investment
              Authority、Harel Group、StepStone Group、Schroders、General Catalyst、Hartford HealthCare、AME Cloud
              Ventures、Lux Capital 和 Horizons Ventures。June 2023，公司在收购临床阶段资产 EIK1001 和 EIK1003 全球权利的同时完成
              $106 million Series C，反映出内部项目失败后的战略转向。February 2025，Eikon 以 $1.85 billion 投前估值拿到
              $350.7 million Series D，11 家机构投资者参投，包括 Lux Capital、Alexandria Venture Investments、T. Rowe
              Price Associates 和 General Catalyst。February 5, 2026，Eikon 在 Nasdaq (EIKN) 完成扩容 IPO，以每股 $18
              募资 $381.2 million，是 2024 以来最大生物技术 IPO。IPO 后约 $743-800 million 的市值，较一年前 Series D
              设定的 $1.85 billion 估值显著下台阶，反映公开市场对尚无收入、处于临床阶段的生物技术公司仍有疑虑。
