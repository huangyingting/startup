      - - Morgan Stanley Research
        - '2024'
        - 全球
        - 到 2035 年累计 $50B+ AI 生物制药交易流
        - N/A
        - 自上而下，基于交易活动预测；投资者报告
        - 低
        - 投资者预测，并非市场研究；时点不确定性高；无法独立验证
    notes: 精准肿瘤市场估算会因是否纳入伴随诊断而相差 2.5x。AI 药物发现估算相差 5x。所有数字都是分析师预测，存在实质不确定性。Morgan Stanley 数字是交易流估算，不是市场规模估算。
