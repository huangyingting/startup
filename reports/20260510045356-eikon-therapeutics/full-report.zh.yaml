      - number: '4.5'
        title: 财务结论：收入质量、毛利路径与资本强度
        blocks:
          - type: paragraph
            body: |
              对风险投资或成长股权投资者而言，Eikon 的财务结论是混合但具建设性的，前提是采用平台价值论。公司有一个可信的收入模型（研究合作 → 里程碑 →
              特许权收入），临床成功后可能创造可观价值；但近期财务图景由高资本强度、私有指标不透明和二元临床风险构成。

              当前收入质量较低：没有商业收入，合作收入未披露且相对烧钱速度可能有限，里程碑付款尚未触发。通往高收入质量的路径，需要临床概念验证数据（Phase
              I/II 读出预计 2025–2027），以及药物获批或显著新增合作价值。

              资本强度高，且符合肿瘤 AI 药物发现同行组特征。Eikon 必须继续融资（Series D、IPO 或战略交易）来资助 Phase II
              项目。若 EIK1002 成功，达到 NDA 申报估计还需要在现有已融资资本之外再投入 $500M–$1.5B；这一判断基于 Phase II/III
              肿瘤开发的行业成本基准。这给 Series A–C 投资者在当前隐含估值下带来有意义的稀释风险。

              主要财务尽调阻断点是：（1）相对于 Phase I 数据读出的当前现金位置与现金支撑期，（2）Merck 合作经济条款，（3）未来合作的任何合同限制，以及（4）Phase
              I 疗效数据（一旦可得），后者将决定 Series D 估值。没有这些披露，就无法建立可信财务模型；任何估值分析都只能基于可比公司倍数，而不是基本面财务预测。
            claimRefs: []
  - number: 5
    title: 产品与技术
    sections:
      - number: '5.1'
        title: SMT 平台：核心技术与科学基础
        blocks:
          - type: paragraph
            body: >-
              Eikon Therapeutics 建立在 Single-Molecule Tracking (SMT) 之上。这项技术把诺贝尔奖级别的晶格光片显微镜与专有 Janelia Fluor (JF)
              荧光染料结合起来，能在活细胞内实时成像并追踪单个蛋白分子的运动和相互作用。该晶格光片显微镜由联合创始人 Eric Betzig 在 HHMI 的 Janelia Research Campus
              开发，通过把激发光限制在薄而结构化的光片中，尽量降低生物样本的光损伤，从而支持持续数分钟到数小时的成像。Betzig 因开发超分辨荧光显微镜获得 2014 年诺贝尔化学奖；这项技术突破了传统光学衍射极限。Luke
              Lavis 同样来自 Janelia，开发了 JF 染料系列：这类可进入细胞、光稳定的荧光探针会与单个蛋白分子共价结合，在拥挤的细胞内环境中提供足够的信噪比，用于单分子检测。UC Berkeley 的
              Xavier Darzacq 贡献了定量单分子成像方法和机器学习框架，把原始成像轨迹转化为药物-靶点结合机制指标。SMT
              平台的核心价值在于，它能在原生细胞环境中直接测量药物-靶点结合；生化实验（与纯化蛋白结合）和固定细胞成像无法做到这一点。因此，Eikon
              可以区分两类药物：一类在生理条件下真正结合靶点，另一类在体外看似活跃，却因细胞不可及性、脱靶结合或亚细胞区室化而失败。机器学习用于成像数据，提取停留时间、扩散系数、共定位频率等定量特征，以预测药效。该平台确实代表了科学进展，但把它商业规模地转化为药物发现能力，仍处在早期。
