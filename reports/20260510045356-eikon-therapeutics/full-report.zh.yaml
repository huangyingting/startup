        - 在纯化蛋白上做生化测定（HTRF、SPR、ITC）；间接细胞报告测定
        - SMT 成像：在活细胞中直接可视化药物-蛋白共定位和停留时间
        - 在生理相关环境中直接测量靶上结合；识别仅靠生化筛选产生的假阳性
        - 通量低；每个靶点都需要定制 JF 染料优化；尚未在规模上用临床结局验证
      - - 选择细胞靶点结合最佳的化合物进入下一阶段（IND 申报）
        - 细胞活力测定的 IC50；Western blot 检测通路调节；替代生物标志物
        - 量化 SMT 结合指标（停留时间、占据比例）作为推进 / 停止标准
        - 比活力读数更有机制置信度；降低因细胞不可及性导致的转化失败
        - 尚无已发表的头对头比较，验证 SMT 选择化合物与传统选择化合物在 IND 至 II 期转化上的差异
      - - 给药 EIK1001 + pembrolizumab（TeLuRide-006 试验）
        - Pembrolizumab 单药或联合化疗，用于 1L 晚期黑色素瘤
        - EIK1001 TLR7/8 激动剂皮下注射，与 pembrolizumab IV 联用
        - 假设：先天免疫激活可放大 Keytruda 应答率；2/3 期 RCT 正在进行
        - 二元试验风险：失败意味着 EIK1001 没有获批适应症，并失去近期主要催化剂
      - - 在 HRR 缺陷实体瘤中给药 EIK1003 PARP1 抑制剂（1/2 期）
        - 已获批 PARP1+2 抑制剂（olaparib、niraparib）；标准铂类化疗
        - 选择性 PARP1 抑制，并设计为避开 PARP2，以改善血液学耐受性
        - 假设：疗效可比双重 PARP 抑制剂，同时降低血小板减少和贫血
        - 安全性特征尚未完全刻画；相对获批药物的疗效尚未确立
    notes: 工作流步骤对应 Eikon 的在研项目。声称收益反映管理层表述和科学假设；截至 2026 年 5 月，尚无任何收益由 3 期数据验证。
