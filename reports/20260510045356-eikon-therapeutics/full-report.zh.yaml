      - number: '6.5'
        title: 客户集中度、留存风险与扩张动态
        blocks:
          - type: paragraph
            body: >-
              Eikon 现阶段客户集中度风险极高。Merck 合作是最重要的外部关系：如果失去 Merck 这一临床伙伴，Eikon 就必须重组 TeLuRide 关键项目，pembrolizumab 供应也会受损；鉴于
              Perlmutter 的 Merck 关系是投资论点的关键部分，市场很可能给出负面反应。2025 年因 NIH 经费削减而进行的 15%
              裁员，影响了政府资助研究伙伴，显示公司对政府研究关系也存在第二类客户依赖，而这种关系可能被政策变化打断。从留存看，患者一旦入组，临床试验中心入组相对黏性较强——退出正在进行的试验对中心和 Eikon
              都有运营成本——但如果 Eikon 财务状况恶化，或出现中期安全信号，中心参与可能减少或中止。Eikon 模型中没有订阅或经常性收入；试验中心关系是交易型、项目特定的。获批后的扩张机会可能很大：若 EIK1001
              在黑色素瘤中获得 FDA 批准，向 NSCLC、更多实体瘤和辅助治疗场景扩展标签，将形成商业扩张路径。同样，若 EIK1003 在卵巢癌或乳腺癌中获批，扩展至更多 HRR
              缺陷肿瘤类型，将带来可观的增量可寻址市场。AI/ML 药物发现平台也可能通过与 Merck 之外的更多制药公司合作产生收入，但公司尚未宣布此类合作。
