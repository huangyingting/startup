      - number: '2.4'
        title: 增长驱动因素与采用约束
        blocks:
          - type: paragraph
            body: >
              肿瘤药物发现市场受益于多重结构性顺风，但 AI 平台采用速度也面临真实约束，这些约束对 Eikon 估值有实质影响。


              主要增长驱动包括全球癌症发病率上升——WHO 预计到 2040 每年新增癌症病例为 28.4 million，较 2020 的 19.3 million 增长

              47%，支撑长期市场持续扩张。FDA 在 2023 批准约 14 个带伴随诊断的精准肿瘤适应证，是有记录以来最高年度数量。全基因组测序成本下降（2024

              每个基因组低于 $200，2018 为 $1,000）正在扩大生物标志物检测可及性，并加速精准肿瘤采用。制药 R&D 生产率危机是 AI 采用的关键驱动：Deloitte

              2024 报告显示，制药 R&D 平均内部收益率从 2010 的 10.1% 降至 2023 的 1.2%，外部 AI 平台的采用变得更紧迫。


              采用约束同样重要：肿瘤药在 Phase II/III 试验中的失败率约 89%，是所有治疗领域中失败率最高的。尚无以 AI 为先的药物发现公司产出 FDA 批准药物；AI
              生成候选药物的临床试验数据显示，成功率相较历史基线没有统计显著改善（STAT News,

              2023；Nature Biotechnology, 2022）。10–15 year 药物开发周期意味着平台合作的里程碑收入释放缓慢。CMS 的 IRA 谈判项目给肿瘤药峰值定价带来不确定性。ICER

              价值评估越来越多地把高成本肿瘤药在 WAC 价格下评为低价值。


              2024 AI 药物发现交易活动呈现后置化：随着制药公司要求先看到临床证明，再承诺大额预付款，临床前 AI

              平台交易被重构为更强调里程碑付款而非前期资本。BCG 估计 AI 发现可将单药开发成本降低 40–50%（从 $2.6B 降至

              $1.3–1.6B），但这取决于临床失败率能否随发现效率一起改善——这一点尚未被经验证明。
