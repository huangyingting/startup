      - number: '4.4'
        title: 公开财务缺口与私有指标依赖
        blocks:
          - type: paragraph
            body: |
              作为私有公司，Eikon 未提交 SEC 文件、发布经审计财务报表，或披露以下任何信息：当前账上现金、月度经营费用明细、合作协议经济条款、按项目划分的
              R&D 预算、员工数或人均成本结构，以及合同义务（租约、仪器融资、CRO 合同）。这形成了一类无法用公开来源解决的财务尽调，需要直接访问资料室。

              最重要的信息缺口是 Merck 合作经济条款。如果不知道该合作每年提供 $5M 还是 $50M 研究经费，就无法搭出可信的扣除合作收入后的烧钱
              模型。第二大缺口是当前账上现金：鉴于 Series C 约在 2023 完成，烧钱速度估计为每年 $100–130M，如果没有更新资产负债表数据，公司在
              2026 的现金支撑期位置高度不确定。

              Crunchbase、CB Insights 或 PitchBook 等平台对 Eikon 财务的第三方估计，依赖已披露融资轮次，并不提供运营数据。公开领域没有 Eikon
              收入或烧钱的独立财务模型。EY、SVB 和 JP Morgan 的生物技术行业报告能为 Eikon 发展阶段的公司提供基准，但无法替代
              Eikon 专属财务披露。
