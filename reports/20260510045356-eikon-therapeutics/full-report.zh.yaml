      - number: '2.2'
        title: 市场规模：TAM、SAM 与 Eikon 可触达的平台机会
        blocks:
          - type: paragraph
            body: |
              多个独立规模测算视角都指向一个庞大的全球肿瘤市场，但估计值会因方法、纳入标准和地理范围显著不同。已发布估计值之间的区间，反映了测量对象本身的真实差异：总药品销售、管线价值，或
              R&D 支出。本章保留相互矛盾的估计，而不是强行得出共识。

              全球精准肿瘤市场 2022 估计为 $77.0 billion，到 2030 以 10.1% CAGR 增至 $166.4 billion（Grand View
              Research）——这是仅药物口径。MarketsandMarkets 估计 2023 为 $94.2 billion，到 2028 以 19.7% CAGR 增至
              $232.0 billion——这一更高估计包含伴随诊断和更广泛的个性化医疗支出。两组估计之间 2.5x 的区间，反映真实方法差异：仅纳入诊断一项，就会让市场规模移动约
              $15–20 billion。IQVIA Institute 数据显示，2022 肿瘤药物总支出为 $196 billion，年增速 12.4%。Evaluate
              Pharma 采用管线到销售转化模型，预测 2030 肿瘤总销售为 $370–410 billion。

              AI 药物发现子市场方面，MarketsandMarkets 估计 2022 为 $1.3 billion，到 2028 增至 $4.9 billion（24.9%
              CAGR）；Grand View Research 估计 2023 为 $1.5 billion，到 2030 增至 $7.0 billion（21.4% CAGR）。同一基年估计相差
              5x，是因为 AI 药物发现的市场边界定义并不一致：有的纳入计算化学和生物信息学服务，有的只计算纯 AI 平台公司。Morgan
              Stanley 预测到 2035 AI-biopharma 累计交易流超过 $50 billion，但这属于投资者外推，不是市场研究估计。

              Eikon 的 SAM 由其聚焦肿瘤 PPI 靶点决定。全球上市或临床阶段的 PPI 靶向药物少于 40 种（Journal of Medicinal
              Chemistry, 2023）。没有独立 TAM 估计单独切出 PPI 治疗板块。Eikon 近期 SOM 由制药合作经济学定义：按当前平台交易可比案例（取决于临床数据成熟度，预付款
              为 $30–$500M）计算，两到三笔平台交易即构成实质性收入事件，且不需要药物获批。
