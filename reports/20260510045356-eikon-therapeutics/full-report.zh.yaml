        - Eikon 是否已有足够的 Phase I 读出数据，能在下一笔平台交易中拿到 $100M+ 首付款？
    notes: 时间判断基于市场和监管分析报告做定性估算。Eikon 相关尽调问题代表研究团队优先事项，并非公司确认信息。
