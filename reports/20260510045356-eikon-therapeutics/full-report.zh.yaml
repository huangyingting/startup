      - number: '1.5'
        title: 临床管线概览
        blocks:
          - type: paragraph
            body: >
              Eikon 的临床管线由三个在研项目和一个临床前项目支撑。EIK1001 是 Toll-like receptor 7/8 (TLR7/8) 激动剂，也是

              Eikon 的领先资产。它正与 Merck 的 pembrolizumab (Keytruda) 联用，在名为 TeLuRide-006（又称 Keynote-G04）的关键性

              Phase 2/3 试验中，作为晚期黑色素瘤一线治疗进行评估。另一项 Phase 2 试验 TeLuRide-005 则考察 EIK1001 与

              pembrolizumab 联用于一线非小细胞肺癌（NSCLC）。EIK1001 的商业潜力在很大程度上取决于 TeLuRide-006 结果，因此这是一个二元式临床价值拐点。Merck

              的 $30 million 战略投资和多年临床供药合作，凸显了该路径的科学逻辑和商业兴趣。


              EIK1003 是选择性 PARP1 抑制剂，正处于 Phase 1/2，面向包括乳腺癌、卵巢癌、前列腺癌和胰腺癌在内的晚期实体瘤。选择性

              PARP1 路径专门靶向 PARP1，而不是同时抑制 PARP1 和
              PARP2，目标是在保持抗肿瘤疗效的同时，降低第一代抑制剂（olaparib、niraparib、talazoparib）可见的血液学毒性。EIK1004

              是可穿透 CNS 的 PARP1 抑制剂，面向脑部和 CNS 癌种；现有 PARP 抑制剂穿越血脑屏障能力弱，因此这里存在显著未满足需求。EIK1004

              处于 Phase 1/2。EIK1005 是面向 MSI-H 癌种的 WRN helicase 抑制剂，仍处于临床前和 IND-enabling 研究。关键在于，三个活跃临床项目全部来自外部收购，而非由

              SMT 平台发现；这给公司核心平台差异化论点留下了实质性验证缺口。
