      - number: '8.5'
        title: 反向论点与论点破裂点
        blocks:
          - type: paragraph
            body: >-
              截至 May 2026，反对 Eikon 投资论点的最强理由是：（1）TLR7/8 机制从未在全球任何实体瘤适应症中取得关键试验成功——EIK1001 将是第一个。新型免疫肿瘤机制 Phase 3
              成功的基准概率约为 30-40%，但对没有既往 Phase 3 验证的机制，概率可能更低。（2）2023 年两个项目各入组 1
              名患者后终止，提示平台预测临床可行性可能存在局限；没有数据室访问权限，这一风险目前无法量化。（3）Eikon 估值从 $1.85B 降至
              $750M，反映公开市场怀疑，而公开市场可能吸收的信息比私募轮定价更多。（4）EIK1001 或 EIK1003 均未获得任何 FDA breakthrough therapy 或 fast-track
              designation，说明 FDA 目前并未把任一项目评估为达到“相较现有疗法有实质改善”的门槛。若出现以下情况，投资论点将破裂：TeLuRide-006 产生阴性中期分析；Roger Perlmutter
              离任且没有同等药物开发领导者接替；Merck 因早期信号令人失望而降低合作优先级；或资本市场恶化到 Eikon 在现金跑道到期前无法以非困境条款融资。投资者应建立清晰退出框架：任何负面 TeLuRide-006
              数据发布即卖出；若 Merck 正式降低股权持仓即卖出；若 Perlmutter 参与度变得有限，则重新评估。
            claimRefs:
              - CV014
              - CV015
              - CV016
