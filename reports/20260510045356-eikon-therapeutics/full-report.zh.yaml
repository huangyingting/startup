        - label: NCCN 指南优先患者（生物标志物或临床标准）
          value: 7200
        - label: 组合方案获得充分支付方覆盖的患者
          value: 5000
        - label: 接受 EIK1001 + pembro 治疗的患者（商业化第 1 年）
          value: 1500
        - label: 确认缓解并继续治疗的患者（12 周）
          value: 750
  - id: FU003
    type: matrix
    layout: wide
    slug: customer-proof-matrix
    title: 客户证明矩阵：按关系类型划分的采用证据
    summary: 矩阵从证据质量、财务承诺、近期性和独立性维度，对 Eikon 关键关系类型的客户证明强度打分。
    approximationNotes: 分数为基于公开信息的分析师判断；Eikon 未发布客户满意度数据。
    claimRefs:
      - CU001
      - CU009
      - CU005
      - CU003
    data:
      columns:
        - 证据质量（1-3）
        - 财务承诺（1-3）
        - 近期性（1-3）
        - 独立性（1-3）
      rows:
        - label: Merck & Co.（药企合作伙伴）
          values:
            - label: 3 – 高：$30M 股权 + 供应协议已公开确认
              tone: positive
            - label: 3 – 高：$30M 股权 + 未披露研究资金；承诺具实质性
              tone: positive
            - label: 3 – 当前：IPO 后披露显示合作仍活跃并持续
              tone: positive
            - label: 2 – 合作伙伴：并非完全独立（有共同开发利益）；CEO Perlmutter 曾任 Merck 员工
              tone: neutral
        - label: 临床试验中心（已入组患者）
          values:
            - label: 2 – 中：ClinicalTrials.gov 登记确认入组；ASCO 摘要提交确认数据
              tone: neutral
            - label: 1 – 低：中心免费获得药物供应；资金流向中心，而非来自中心
              tone: warning
            - label: 3 – 当前：截至 2026 年，TeLuRide-006 和 EIK1003 Phase 1/2 正在积极入组
              tone: positive
            - label: 2 – 独立：学术医学中心具备科学独立性；研究者发起的热情
              tone: neutral
        - label: HHMI Janelia（IP 授权方）
          values:
            - label: 3 – 高：来自全球顶级生物医学研究机构的独家许可；有公开记录
              tone: positive
            - label: 2 – 中：推定授权费与版税结构具实质性；条款未公开
              tone: neutral
            - label: 3 – 当前：Betzig 和 Lavis 仍是活跃创始人；Janelia 合作持续
              tone: positive
            - label: 3 – 独立：HHMI 为非营利机构；商业上独立于 Eikon
              tone: positive
        - label: UC Berkeley（Darzacq 实验室，学术合作）
          values:
            - label: 2 – 中：UC Berkeley 隶属关系已确认；论文共同作者；大学网站
              tone: neutral
            - label: 1 – 低：学术合作；资金转移未公开量化；由资助经费支持
              tone: warning
            - label: 2 – 近期：网站显示合作活跃；未报告近期终止
              tone: neutral
            - label: 2 – 独立：UC Berkeley 是独立学术机构；Darzacq 具有共同创始人利益
              tone: neutral
  - id: FU004
    type: range
    layout: standard
    slug: retention-repeat-cohort
    title: 留存 / 重复队列：关键客户关系预计持续时间
    summary: 对 Eikon 关键外部关系的预期持续时间和连续性做区间估计，纳入基准与压力情景。
    approximationNotes: 持续时间估计为分析师判断，基于典型生物技术合作生命周期、临床试验时间线和控制权变更条款。无合同条款公开披露。
    claimRefs:
      - CU018
      - CU019
      - CU009
    data:
      items:
        - label: Merck 临床供应与合作（自 2026 年 IPO 起的持续时间）
          low: 2
          mid: 4
          high: 7
          unit: years
          detail: 至少需要 2 年完成 TeLuRide-006 试验；中位情景延续至获批后的商业上市；高位情景包括获批后共同推广
        - label: 试验中心参与（TeLuRide-006 平均中心持续时间）
          low: 1
          mid: 2
          high: 4
          unit: years
          detail: 从中心启动到试验完成和分析；完成时间取决于入组节奏和中期分析时间
        - label: HHMI Janelia IP 许可（估计剩余期限）
          low: 5
          mid: 10
          high: 20
          unit: years
          detail: 核心晶格光片与 JF 染料 IP 的预计剩余独占期；实际条款未披露
        - label: UC Berkeley 学术合作（活跃期）
          low: 2
          mid: 5
          high: 10
          unit: years
          detail: 取决于 Darzacq 持续参与和 NIH 资助经费连续性
  - id: FR001
    type: matrix
    layout: wide
    slug: risk-heatmap
    title: 风险热力图：概率与影响矩阵
    summary: 2x2 热力图按概率（低 / 中 / 高）和影响（低 / 中 / 高 / 关键）为 12 项主要风险打分，并在单元格标签中显示风险名称和指定颜色 / 色调。
    approximationNotes: 风险分数为基于公开信息和标准生物技术风险框架的定性分析师判断。分数会随临床数据读出而变化。
    claimRefs:
      - CR001
      - CR005
      - CR009
      - CR013
      - CR018
      - CR023
    data:
      columns:
        - 低影响
        - 中等影响
        - 高影响
        - 关键影响
      rows:
        - label: 低概率
          values:
            - label: 平台 IP 专利到期
              tone: low
            - label: 数据质量 / 可重复性失败
              tone: low
            - label: FDA 临床暂停（EIK1001）；第三方 IP 纠纷
              tone: neutral
            - label: Janelia 许可终止；Phase 3 成功后 NDA 被拒
              tone: risk
        - label: 中等概率
          values:
            - label: 裁员后二次流失（非关键员工）
              tone: low
            - label: CMO 供应失败；竞争性 PARP1 获批（AZD5305）
              tone: neutral
            - label: 入组不足；SMT 创始人抽身；SMT 工程人才流失
              tone: warning
            - label: EIK1001 中期分析负面；关键人物（Perlmutter）离任
              tone: risk
        - label: 高概率
          values:
            - label: （无风险映射至高概率 / 低影响）
              tone: low
            - label: SMT 吞吐量限制；NIH 资金政策风险
              tone: warning
            - label: 若试验延长且无催化剂，烧钱率超过现金跑道
              tone: warning
            - label: 若 EIK1001 数据令人失望，Merck 退出
              tone: critical
  - id: FR002
    type: dag
    layout: wide
    slug: risk-transmission-map
    title: 风险传导图：风险如何在 Eikon 业务中级联
    summary: 有向无环图展示主要风险如何级联并放大：EIK1001 失败传导至 Merck 退出、资本获取受损，并最终走向重组或解散。
    approximationNotes: 传导路径由分析师根据 Eikon 风险、合作和资本结构之间的逻辑依赖推断。
    claimRefs:
      - CR001
      - CR009
      - CR018
      - CR019
    data:
      nodes:
        - label: EIK1001 TeLuRide-006 中期阴性（主要催化剂失败）
        - label: Merck 降低 EIK1001 合作优先级（供应不确定）
        - label: 融资受损（缺少机构买盘催化剂；IPO 下调进一步压低价格）
        - label: 现金跑道不足（烧钱延续；无新催化剂；融资后跑道低于 12 个月）
        - label: EIK1003/EIK1004 资金不足（PARP1 项目放缓或暂停）
        - label: SMT 平台项目停滞（研究工具部门已收缩；完成特征分析的新靶点减少）
        - label: Eikon 重组或合作出售（战略选项：出售管线、合并或清盘）
      edges:
        - from: EIK1001 TeLuRide-006 Negative Interim (primary catalyst failure)
          to: Merck De-prioritizes EIK1001 Collaboration (supply uncertainty)
        - from: EIK1001 TeLuRide-006 Negative Interim (primary catalyst failure)
          to: Capital Raise Impaired (no catalyst for institutional bid; IPO step-down further depresses price)
        - from: Merck De-prioritizes EIK1001 Collaboration (supply uncertainty)
          to: Capital Raise Impaired (no catalyst for institutional bid; IPO step-down further depresses price)
        - from: Capital Raise Impaired (no catalyst for institutional bid; IPO step-down further depresses price)
          to: Runway Shortfall (burn continues; no new catalyst; raise below 12 months)
        - from: Runway Shortfall (burn continues; no new catalyst; raise below 12 months)
          to: EIK1003/EIK1004 Underfunded (PARP1 programs slow or pause)
        - from: Runway Shortfall (burn continues; no new catalyst; raise below 12 months)
          to: SMT Platform Programs Stall (research tools division already reduced; fewer new targets profiled)
        - from: EIK1003/EIK1004 Underfunded (PARP1 programs slow or pause)
          to: 'Eikon Restructuring or Partnership Sale (strategic options: sell pipeline, merge, or wind down)'
        - from: SMT Platform Programs Stall (research tools division already reduced; fewer new targets profiled)
          to: 'Eikon Restructuring or Partnership Sale (strategic options: sell pipeline, merge, or wind down)'
  - id: FR003
    type: dag
    layout: standard
    slug: dependency-map
    title: 依赖图：Eikon 关键外部依赖
    summary: 有向图呈现 Eikon 的外部依赖，箭头显示价值 / 风险流向以及每个临床项目的关键路径。
    approximationNotes: 依赖基于公开披露、ClinicalTrials.gov 登记和推断的行业标准实践。
    claimRefs:
      - CR013
      - CR018
      - CR019
      - CR020
    data:
      nodes:
        - label: HHMI Janelia（IP 授权方）：SMT 平台 IP 基础——所有平台运营都需要独家许可
        - label: Merck & Co.（临床合作伙伴）：为 TeLuRide-006/005 供应 pembrolizumab——没有 Merck，关键试验必须重组
        - label: FDA（监管守门人）：所有项目都需要 IND 放行、临床暂停权限、NDA/BLA 批准
        - label: CMO 网络（制造）：EIK1001、EIK1003、EIK1004 的 GMP 药物供应——未披露 CMO；可能存在单一来源风险
        - label: NIH / 政府资金（研究）：通过 UC Berkeley 和 Janelia 学术合作者形成间接依赖——2025 年影响已显现
        - label: Roger Perlmutter（CEO 关键人物）：Merck 关系、投资者信心、临床策略——未披露继任者
      edges:
        - from: >-
            HHMI Janelia (IP Licensor): SMT platform IP foundation — exclusive license required for all platform
            operations
          to: SMT Platform Operations
        - from: >-
            Merck & Co. (Clinical Partner): Pembrolizumab supply for TeLuRide-006/005 — without Merck, pivotal trial
            must be restructured
          to: EIK1001 Clinical Trials
        - from: >-
            FDA (Regulatory Gatekeeper): IND clearance, clinical hold authority, NDA/BLA approval required for all
            programs
          to: EIK1001 Clinical Trials
        - from: >-
            FDA (Regulatory Gatekeeper): IND clearance, clinical hold authority, NDA/BLA approval required for all
            programs
          to: EIK1003 EIK1004 Programs
        - from: >-
            CMO Network (Manufacturing): GMP drug supply for EIK1001, EIK1003, EIK1004 — undisclosed CMOs; single-source
            risk possible
          to: EIK1001 Clinical Trials
        - from: >-
            CMO Network (Manufacturing): GMP drug supply for EIK1001, EIK1003, EIK1004 — undisclosed CMOs; single-source
            risk possible
          to: EIK1003 EIK1004 Programs
        - from: >-
            NIH / Government Funding (Research): Indirect dependency via UC Berkeley and Janelia academic collaborators
            — demonstrated impact in 2025
          to: SMT Platform Operations
        - from: >-
            Roger Perlmutter (CEO Key Person): Merck relationship, investor confidence, clinical strategy — no successor
            disclosed
          to: >-
            Merck & Co. (Clinical Partner): Pembrolizumab supply for TeLuRide-006/005 — without Merck, pivotal trial
            must be restructured
  - id: FV001
    type: flow
    layout: wide
    slug: recommendation-logic
    title: 建议逻辑：从关键输入到投资行动的决策流
    summary: 决策流程图展示 TeLuRide-006 中期结果、Merck 合作状态和资本状况如何相互作用，决定建议的投资者行动（买入、持有、卖出）。
    approximationNotes: 决策阈值由分析师定义，基于本章概率加权预期价值分析。
    claimRefs:
      - CV011
      - CV012
      - CV013
    data:
      nodes:
        - label: TeLuRide-006 中期分析
        - label: 中期阳性（≥主要终点）：牛市情景
        - label: 中期模糊 / 混合（有趋势但未达标）：基准情景
        - label: 中期阴性（无效性停止）：熊市情景
        - label: Merck 扩大合作：签署共同商业化
        - label: Merck 维持（仅延续当前供应）
        - label: Eikon 以 $2B+ 估值融资 $400-500M
        - label: Eikon 以 $1-1.2B 估值融资 $200-300M
        - label: Eikon 困境融资或出售管线
        - label: 行动：买入 — 满仓（重估至 $2-3B；2.5-4× 回报）
        - label: 行动：持有 — 当前仓位（等待更多 Phase 3 数据）
        - label: 行动：卖出 — 全部退出（股价至 $4-6/股，仅剩平台残值）
      edges:
        - from: TeLuRide-006 Interim Analysis
          to: 'Positive Interim (≥primary endpoint): Bull Case'
        - from: TeLuRide-006 Interim Analysis
          to: 'Ambiguous/Mixed Interim (trend but miss): Base Case'
        - from: TeLuRide-006 Interim Analysis
          to: 'Negative Interim (futility stop): Bear Case'
        - from: 'Positive Interim (≥primary endpoint): Bull Case'
          to: 'Merck Expands Collaboration: Co-commercialization signed'
        - from: 'Positive Interim (≥primary endpoint): Bull Case'
          to: Eikon Raises $400-500M at $2B+ valuation
        - from: 'Merck Expands Collaboration: Co-commercialization signed'
          to: 'ACTION: BUY — Full Position (re-rate to $2-3B; 2.5-4× return)'
        - from: Eikon Raises $400-500M at $2B+ valuation
          to: 'ACTION: BUY — Full Position (re-rate to $2-3B; 2.5-4× return)'
        - from: 'Ambiguous/Mixed Interim (trend but miss): Base Case'
          to: Merck Holds (continues current supply only)
        - from: 'Ambiguous/Mixed Interim (trend but miss): Base Case'
          to: Eikon Raises $200-300M at $1-1.2B valuation
        - from: Merck Holds (continues current supply only)
          to: 'ACTION: HOLD — Current Position (wait for additional Phase 3 data)'
        - from: Eikon Raises $200-300M at $1-1.2B valuation
          to: 'ACTION: HOLD — Current Position (wait for additional Phase 3 data)'
        - from: 'Negative Interim (futility stop): Bear Case'
          to: Eikon Distressed Raise or Pipeline Sale
        - from: Eikon Distressed Raise or Pipeline Sale
          to: 'ACTION: SELL — Full Exit (stock to $4-6/share platform salvage only)'
