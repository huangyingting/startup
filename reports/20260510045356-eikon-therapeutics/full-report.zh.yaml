      - number: '3.4'
        title: 护城河耐久性、商品化风险与负面竞争证据
        blocks:
          - type: paragraph
            body: >
              Eikon
              的主要护城河主张，是其诺贝尔奖级活细胞超分辨显微平台，能够在活细胞中做单分子追踪；这一能力耗时多年开发，运行也需要专用仪器、计算算法和生物学专长。这构成了真实技术壁垒，尚未被商业化复制到同等分辨率。但三类替代风险很重要。


              第一，AI 公司越来越多地使用在大规模细胞成像数据上训练的生物基础模型（Recursion、Insitro），以群体层面而非单分子尺度逼近

              Eikon 的成像路径。如果这些群体层面方法足以识别 PPI 靶点，Eikon 的单分子优势可能没有其宣称的那么必要。第二，Schrödinger

              和类似计算化学公司每年都在提升 PPI 界面 FEP+ 准确度，提供一条纯计算的 PPI 药物设计路径，降低对活细胞成像数据的依赖。第三，如果

              AI 优先发现公司无法比传统发现更高比例地产出 Phase II 疗效数据，整个 AI 平台溢价（包括 Eikon 的溢价）都可能坍塌，所有

              AI 发现平台会被商品化到 CRO 等价定价。


              负面竞争证据：Black Diamond Therapeutics 在 BDTX-1535 失败后于 2024 崩塌，说明仅有精准肿瘤生物标志物匹配并不够，还必须有临床疗效。Relay

              Therapeutics 在 2023 因管线整合裁员 40%，说明即便先进 AI 肿瘤平台也面临残酷运营经济学。没有任何活细胞成像 PPI 药物进入

              Phase III 的竞争基准，意味着 Eikon 的平台主张尚未在能建立真正竞争护城河耐久性的层面获得验证；这种局面要等 EIK1001 或 EIK1002 带着疗效数据进入

              Phase II 才会改变。
