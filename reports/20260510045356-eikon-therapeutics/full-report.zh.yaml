        - 数据室（重大合同）
        - '++ : 有利的 CoC 条款抬升 M&A 退出价值；限制性条款降低价值'
      - - 4（高）
        - Merck 合作协议：财务条款（里程碑时间表、版税率）、终止条款、通知期、若 EIK1001 获批后的共同商业化权利
        - Merck 合作的财务价值目前未知；未披露里程碑可能增加 $50–200M+ NPV；终止条款决定临床供应风险
        - 数据室（重大合同）
        - '++ : 披露里程碑和有利终止条款可增加 NPV，并降低供应风险'
      - - 5（中）
        - TeLuRide-006 当前入组状态（活跃中心、已入组患者与目标对比、IND 提交后是否提交任何方案修订）
        - 入组速度决定催化剂时间；方案修订提示试验可能遇到困难；完成入组可降低时间不确定性
