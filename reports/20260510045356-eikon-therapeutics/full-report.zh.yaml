chapters:
  - number: 1
    title: 公司概览
    sections:
      - number: '1.1'
        title: 公司身份与使命
        blocks:
          - type: paragraph
            body: |
              Eikon Therapeutics 是一家总部位于 Hayward, California 的临床阶段生物制药公司，由 Howard Hughes
              Medical Institute 的 Janelia Research Campus 和 University of California, Berkeley 科学家在 2019
              创立。公司的使命，是用其专有 Single-Molecule Tracking (SMT) 技术平台改造肿瘤药物发现；该平台能在活细胞中以空前分辨率直接观察蛋白行为和药物-靶点结合。Eikon
              在生物制药版图里的位置很特殊：由诺贝尔奖得主科学家构想，最初目标是搭建完全来自 SMT 的管线，之后演进为一种混合模式——用平台洞察叠加外部收购的临床阶段资产。

              截至 May 2026，Eikon 已完成 IPO：公司在 February 5, 2026 以 EIKN 为 ticker 登陆 Nasdaq Global Select
              Market，募资 $381.2 million。公司把自己定义为技术赋能的药物公司，用成像平台做靶点选择、药物-靶点结合验证和作用机制刻画，而不是纯平台标的。Eikon
              聚焦精准肿瘤，项目覆盖免疫疗法（TLR7/8 激动）和 DNA 损伤反应（选择性 PARP1 抑制）。公司尚未产生产品收入，仍是由风险资本、公开股权市场和战略制药合作支撑的临床阶段企业。主要运营地点在
              Hayward, California。截至研究日，公司已通过五次不同融资事件累计融资超过 $1.5 billion。
