      - number: '8.3'
        title: 牛市、基准与熊市场景分析
        blocks:
          - type: paragraph
            body: >-
              Eikon 的投资论点可以压缩为围绕 TeLuRide-006 中期分析（预计 2026-2027 年）的情景分析；该事件是主要价值创造或价值毁灭节点。牛市场景（概率约 25-30%）：TeLuRide-006
              相较 pembrolizumab 单药显示 ORR 提升 >15%，且具有统计显著性；Eikon 申请 accelerated approval；Merck 以预付款和共同商业化协议扩大合作；Eikon
              以有利溢价融资 $400-500M；估值重估至 $2-3B，意味着相对 $800M 有 2.5-4× 回报。基准场景（概率约 35-40%）：TeLuRide-006
              显示温和积极信号，但未达到预设主要终点，不过支持继续开发；Eikon 以稀释性条款追加融资；完整获批还需额外 Phase 3；获批路径需要 3-4 年；峰值销售下修；估值在稀释后维持 $800M-1.2B
              区间。熊市场景（概率约 30-35%）：TeLuRide-006 未达到主要终点；Merck 降低合作优先级；Eikon 无法以非困境条款融资；烧钱速度迫使重组；估值降至
              $150-250M，仅代表平台残值和管线期权价值。概率加权期望价值约为 $900M-1.1B，接近当前 $750-800M 市值，说明上行有限但下行风险显著。
            claimRefs:
