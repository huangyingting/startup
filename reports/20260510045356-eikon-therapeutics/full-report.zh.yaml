      - number: '4.2'
        title: 资本充足性、烧钱速度与现金支撑期
        blocks:
          - type: paragraph
            body: |
              Eikon 的资本状况只能从已公开确认的融资轮次和可比公司经营费用数据推断，因为公司从未披露当前现金余额或月度烧钱速度。已确认累计融资约为 $517.5
              million，来自 Series A–C 轮（2019–2023）以及 2025 的 $30M Merck 股权投资。虽然金额看似可观，但 Series C
              完成（约 2023）到未来融资事件之间的阶段，是公司资本充足性风险最高的时期。

              处于类似开发阶段的 AI 药物发现公司为 Eikon 的烧钱速度提供了基准。Relay Therapeutics 报告 2023 经营亏损
              $267 million；Monte Rosa 报告经营亏损 $124 million；Recursion 报告 2023 经营亏损 $298 million。这些公司各自有
              1–3 个活跃 Phase I/II 项目。Eikon 有两个 Phase I/II 项目（EIK1001 和 EIK1002）以及持续平台运营，年烧钱速度可能为
              $100–130 million；如果没有进一步融资，则从 2023 Series C 完成起，现金支撑期约 3–5 years——也就是说，公司可能需要在
              2025–2027 时间窗口融资 Series D。

              Merck 的 $30M 股权投资能部分延长现金支撑期，但不会实质改变资本充足性判断。Eikon 可以使用的非稀释融资替代方案包括特许权
              融资、NIH/NCI 资助和癌症基金会资助，但公司未披露已使用这些工具。EY 的 2025 生物技术融资
              报告指出，54% 的生物技术公司在 2023 年末现金支撑期少于 12 months，凸显行业层面的资本充足性压力。

              下一次融资触发因素最可能是 EIK1001 或 EIK1002 的 Phase I 临床数据。如果数据积极，参考 Relay Therapeutics（2020
              数据前以 $600M IPO）和 Monte Rosa（2021 以 $250M IPO）的先例，以 $1–3B 估值完成 Series D 或 IPO 是可行的。如果
              Phase I 数据中性或负面，Eikon 后续融资将面临显著稀释风险。
