      - number: '3.3'
        title: 能力对比、护城河主张与切换成本分析
        blocks:
          - type: paragraph
            body: >
              比较 AI 药物发现平台能力时，必须把平台主张和临床验证证据分开。Eikon 的核心平台主张，是通过活细胞超分辨荧光显微成像获得独特的

              PPI 靶点触达能力；仅使用标准计算或生化测定的竞争者尚未复制这一能力。不过，Schrödinger 基于物理的 FEP+（Free Energy

              Perturbation）计算能在没有活细胞的情况下做计算机模拟 PPI 结合界面建模；如果准确度提升到足够水平，这会提供另一条 PPI 药物设计路径，并削弱

              Eikon 的独占性主张。


              从 Eikon
              平台视角看，切换成本是不对称的：对处在活跃合作中的制药伙伴而言，项目中途切换会损失已投入数据和机构知识，因此形成中等锁定。但在启动合作前，制药公司的切换成本较低，因为所有平台都按交易条款和已发表数据来评估。这意味着

              Eikon 必须发布有说服力的科学验证，证明其 PPI 发现能力，才能把竞争动态从交易前评估推向交易内留存。


              分销权力偏向既有厂商（AstraZeneca、BMS），它们已经拥有肿瘤医生关系、报销先例和商业基础设施。Eikon 缺少商业基础设施，任何获批药物要取得分销规模，都需要与大型制药公司合作，或被其收购。Merck

              共同开发协议（February 2025）为合作覆盖项目提供了通过 Merck 的分销触达，但不赋予 Eikon 独立商业化能力。


              制药伙伴多平台并用的风险是真实存在的：大型制药公司通常同时推进多个 AI 平台合作（例如 Roche 同时与 Recursion 和 Relay

              合作）。因此，Eikon 平台不是唯一来源关系，而是在一个竞争性格局中竞争；制药公司会把平台合作风险分散到多个供应商。
