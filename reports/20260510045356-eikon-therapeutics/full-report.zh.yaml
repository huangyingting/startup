  - number: 2
    title: 市场分析
    sections:
      - number: '2.1'
        title: 市场边界与 Eikon Therapeutics 的可触达机会
        blocks:
          - type: paragraph
            body: |
              Eikon Therapeutics 处在三个相互重叠的市场交汇处；要准确评估商业机会，必须把它们拆开。最宽的背景是全球肿瘤药物市场，2022
              年销售额超过 $196 billion（IQVIA），这是 Eikon 已获批药物最终竞争的终端市场。第二层是精准肿瘤子市场——由生物标志物驱动的靶向治疗——2022
              规模估计为 $77.0 billion（Grand View Research），或 $94.2 billion（MarketsandMarkets）；Eikon 的临床项目
              EIK1001（黑色素瘤 TLR7/8 激动剂）和 EIK1002（PARP-variant 抑制剂）在这里直接竞争。第三层是 AI 赋能药物发现
              平台市场，Eikon 的活细胞超分辨荧光显微技术在这里争夺制药合作交易流；该市场 2022 估计为 $1.3–1.5 billion，并以
              21–25% CAGR 增长，到 2028–2030 达到 $4.9–7.0 billion。

              Eikon 平台面对的现状替代方案，是传统针对可溶性蛋白靶点的高通量小分子筛选；这种方法会系统性错过蛋白-蛋白相互作用
              (PPI) 靶点类别。PPI 在人类互作组中代表超过 300,000 种独特相互作用，但专门破坏 PPI 的临床药物少于 40 种（Drug
              Discovery Today, 2022）。这一靶点类别缺口界定了 Eikon 的核心差异化主张。没有单一分析师报告单独发布 PPI 靶向药物发现的市场规模，因此 Eikon 的 SAM 存在真实测算缺口。

              肿瘤领域在 2023 占全部制药授权和合作交易的 37%，临床阶段资产平均预付款为 $120 million，纯平台准入交易为
              $50 million（Informa Pharma Intelligence, 2024）。Merck 共同开发协议（February 2025，$30M 股权加多年 R&D
              合作）就是平台交易板块的例子。Eikon 的商业路径取决于它是独立推进药物到商业化，还是通过合作把平台变现——两条路对应不同市场边界。
