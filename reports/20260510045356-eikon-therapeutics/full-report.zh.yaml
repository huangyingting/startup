  - id: TP004
    slug: moat-durability-competitive-risk-register
    title: 护城河耐久性 / 竞争风险登记表
    description: >-
      Assessment of Eikon's claimed competitive moats, primary threats to each moat, severity, and recommended diligence
      paths.
    columns:
      - 护城河主张
      - 主要威胁
      - 严重性
      - 缓释 / 尽调问题
    rows:
      - - 专有活细胞超分辨率 SMT 平台（获 Nobel 奖技术，尚无商业复制）
        - Recursion/Exscientia 的生物基础模型用大规模细胞成像训练，正接近群体级表型组学；Schrödinger FEP+ 的 in-silico PPI 准确度在提高
        - 重大（3–5 年窗口）
        - >-
          在同一 PPI 靶点系统中，将 Eikon 的单分子数据与 Recursion 群体级表型组学对标；评估 Schrödinger FEP+ 在已验证 PPI 靶点上的准确度；要求 Eikon
          提供仅由其平台发现、替代方案未发现的独特可成药 PPI 靶点数据
      - - PPI 靶点可及性（>300,000 个独特 PPI，<40 个经临床验证）
        - 没有临床证据证明 Eikon 平台发现的 PPI 化合物质量优于理论 in-silico PPI 设计；PPI 领域的先发优势只有在转化率更高时才有价值
        - 高（结构性，长期）
        - 要求 Eikon 提供活细胞成像 PPI 发现相对同一 PPI 靶点传统 HTS 的命中率内部数据；寻求 PPI 发现数据发表或专家 KOL 验证
      - - Roger Perlmutter 领导力可信度（前 Merck Research Labs 总裁）
        - 关键人依赖：若 Perlmutter 离开，将实质削弱平台合作可信度和商务拓展能力
        - 重大
        - 要求董事会继任计划；审查关键科学家和 Perlmutter 的股权归属；评估科学顾问委员会深度，以及没有创始发明人 Betzig 持续参与时平台能否运转
      - - Merck 战略合作（2025，$30M 股权）
        - 仅与 Merck 合作可能限制与竞争制药公司的合作（排他条款未知）；Merck 也是全球最大制药公司，长期可能在内部复制平台能力
        - 重大
        - 要求披露 Merck 合作中的排他条款；评估 Merck 的 $30M 股权是否为未来合作轮次带来利益一致，或造成控制冲突
      - - 临床阶段项目（EIK1001、EIK1002）处于活跃 Phase I/II
        - 肿瘤 Phase I/II 流失率高（~70%）；BDTX 倒塌显示精准肿瘤公司并非免疫；EIK1001（TLR7/8）在黑色素瘤与 BMS Opdivo/Yervoy 竞争，疗效门槛高
        - 高（近期临床风险）
        - EIK1001 和 EIK1002 Phase I 剂量递增数据可用后要求提供；评估独立 KOL 对黑色素瘤 TLR7/8 激动剂机制的意见；将安全性与 Opdivo/Yervoy 联合方案比较
      - - Nobel Prize 关联与科学可信度（Eric Betzig，Nobel Chemistry 2014）
        - 声誉护城河不具排他性：Betzig 的 HHMI 实验室也是竞争研究来源；合作者的学术发表可能验证替代成像方法
