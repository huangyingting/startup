      - number: '7.6'
        title: 运营与竞争风险
        blocks:
          - type: paragraph
            body: >-
              除临床和财务风险外，Eikon 还面临可能削弱长期位置的运营和竞争风险。运营上，384 名员工同时管理 4 项 Phase 1/2 和 Phase 2/3
              临床试验，会制造执行风险：临床运营能力不足、中心管理失败或数据质量问题，都可能推迟试验时间表、增加成本，或影响监管申报。2025 年集中在研究工具部门的 15% 裁员，可能在 SMT
              平台团队中制造产能缺口，限制下一代管线资产生成。竞争上，与 EIK1003 和 EIK1004 相关的 PARP 抑制剂领域越来越拥挤：AstraZeneca、GSK 和 Pfizer 已有获批 PARP1/2
              抑制剂，多个竞争者也在开发选择性 PARP1 抑制剂，包括 AstraZeneca (AZD5305)。AZD5305 已发表积极早期临床数据，提示 PARP1 选择性获益。AZD5305 (saruparib)
              于 2024 年进入 Phase 3，若疗效确认，可能早于 EIK1003 上市。免疫肿瘤领域，大量 TLR7/8 激动剂项目正在资源更深的大公司中开发。AI/ML
              药物发现竞争格局也在加剧：Recursion、Isomorphic Labs 和 Insilico Medicine 都已把 AI 生成化合物推进到临床试验，提供了竞争性概念验证，也挑战了 Eikon 对“首个
              AI 驱动药物发现”叙事的主张。
            claimRefs:
              - CR023
              - CR024
              - CR025
              - CR026
  - number: 8
    title: 估值
    sections:
      - number: '8.1'
        title: 估值框架：rNPV、可比公司与情景分析
        blocks:
          - type: paragraph
            body: >-
              Eikon Therapeutics 的内在价值，最适合用三种方法评估：（1）临床管线的风险调整净现值 (rNPV)，（2）临床阶段 AI
              药物发现公司的可比公司分析，（3）围绕主要临床催化剂的牛市、基准和熊市场景分析。rNPV 方法按以下方式为每项临床资产估值：（a）估算获批后的峰值年销售额，（b）按阶段和适应症套用临床成功概率
              (PoS)，（c）用风险调整折现率折现（生物科技为 12-15%），（d）扣除剩余开发成本和获批所需时间。EIK1001 用于一线黑色素瘤：若 2029-2030 年获批，峰值销售估算为
              $1-2B/year；Phase 2/3 至获批 PoS 约 20-30%（免疫肿瘤联合疗法行业平均）；在 14% 折现率下 NPV 约 $400-700M。EIK1003 (PARP1) 用于 HRR+
              实体瘤：峰值销售 $500M-1B，Phase 2 PoS 约 15-25%，NPV 约 $150-300M。平台价值（SMT 作为发现引擎）增加 $100-200M 期权价值。合并 rNPV 为
              $650M-1.2B——与当前 $750-800M 市值一致，但也说明若没有近期催化剂，股价接近公允。驱动估值的关键变量是 TeLuRide-006 中期分析结果：这一单一数据读出预计将解释 2026-2027
              年股价变动的 60-80%。
            claimRefs:
              - CV001
              - CV002
              - CV003
          - type: figure
            figureRef: FV004
            claimRefs:
              - CV001
              - CV002
              - CV009
      - number: '8.2'
        title: 可比公司分析：对标 AI 肿瘤同行
        blocks:
          - type: paragraph
            body: >-
              Eikon 最接近的公开市场可比公司包括 Relay Therapeutics (RLAY)、Recursion Pharmaceuticals (RXRX) 和 Schrödinger
              (SDGR)；它们分别代表肿瘤领域 AI/计算药物发现的不同路径。Relay Therapeutics 2026 年市值约
              $800M-1B，具备类似的临床阶段、尚未获批画像，领先项目集中在胃肠道癌症。Recursion Pharmaceuticals 市值约 $1.5-2B，由 10+ 项目组成的更宽临床管线，以及
              Roche、Sanofi 等多项高知名度制药合作支撑。Schrödinger 市值约 $2-3B，由显著的软件 / 服务收入流支撑（物理建模平台每年约 $100M）。Eikon 市值
              $750-800M，尽管领先项目临床更成熟（EIK1001 Phase 2/3，而 Recursion 组合多为 Phase 1/2），估值仍低于 Recursion；但与 Relay 相比，二者都有 Phase
              2/3 领先项目，Eikon 市值更高。Eikon 的有利关键差异在于 Merck 合作和 Perlmutter 的药物开发记录；不利关键差异是 2023 年平台层面项目终止，以及缺乏任何经 SMT
              验证的临床资产。Eikon 估值约为 2025 年现金等价年度烧钱额 ($333M) 的 2.2×，与 Relay (2.4×) 相近，但低于 Recursion（4.5× 烧钱倍数），反映出
              TeLuRide-006 上集中的二元风险。
            claimRefs:
              - CV004
              - CV005
              - CV006
              - CV007
