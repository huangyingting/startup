        - 数据室（临床研究方案）
        - '+++ : 证实具备有意义中期读出的充分把握度；将 PoS 估计上调 5–10%'
      - - 2（关键）
        - 2023 年项目终止原因：科学摘要、每个项目一名入组患者的临床数据、内部决策备忘录、失败模式分类
