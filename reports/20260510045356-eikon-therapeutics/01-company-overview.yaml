  evidenceGaps:
    - type: private-evidence-only
      severity: material
      topic: series-c-investor-identity
      missingEvidence: >-
        The lead investor for the $106M Series C (June 2023) has not been publicly disclosed in any press release or SEC
        filing reviewed.
      whyItMatters: >-
        Unknown lead investor may hold governance rights, liquidation preferences, or strategic implications not visible
        in public records.
      diligencePath: >-
        Request cap table and investor rights agreement from company; review S-1 registration statement investor
        sections and EDGAR beneficial ownership filings.
      relatedQuestionRefs:
        - QO026
        - QO029
    - type: private-evidence-only
      severity: material
      topic: board-governance-composition
      missingEvidence: >-
        Full board of directors composition, director independence determinations, board committee structure, and
        investor board seat rights are not fully enumerated in reviewed public sources.
      whyItMatters: >-
        Board governance directly affects strategic oversight, CEO accountability, and investor alignment. Unknown board
        members may have conflicts of interest.
      diligencePath: >-
        Review proxy statement (DEF 14A) once filed; review S-1 directors section; request board materials directly from
        company.
      relatedQuestionRefs:
        - QO026
    - type: private-evidence-only
      severity: material
      topic: smt-program-termination-rationale
      missingEvidence: >-
        The scientific rationale for termination of the two original SMT programs — including targets, mechanism,
        patient characteristics, and clinical decision criteria — has not been publicly disclosed.
      whyItMatters: >-
        Understanding why the first two SMT programs failed is critical to assessing whether the platform's
        translational gap is fundamental or program-specific and addressable.
      diligencePath: >-
        Request internal program review documents; conduct expert interviews with key opinion leaders in the relevant
        therapeutic areas; review clinical trial registries for terminated trials.
      relatedQuestionRefs:
        - QO019
    - type: stale
      severity: minor
      topic: post-ipo-ownership-percentages
      missingEvidence: >-
        Precise current ownership percentages for venture investors (The Column Group, Lux Capital, T. Rowe Price, etc.)
        are not publicly available after IPO dilution. Comparable benchmarks for clinical-stage oncology IPOs are also
        not captured.
      whyItMatters: >-
        Ownership concentration affects governance and potential insider selling pressure on the public stock. Absence
        of comparable benchmarks limits the ability to assess whether Eikon's post-IPO valuation step-down and burn rate
        are typical or outliers.
      diligencePath: >-
        Review 13F filings for institutional investors over $100M AUM; S-1 selling stockholder table; post-IPO 13D/G
        filings on SEC EDGAR. For benchmarking, review BioPharma Dive and Evaluate Pharma public oncology IPO databases.
      relatedQuestionRefs:
        - QO026
        - QO028
