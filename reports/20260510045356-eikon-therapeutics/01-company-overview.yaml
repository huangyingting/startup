  - id: SO006
    title: Adverse Signals, Risk Factors, and Key Diligence Concerns
    body: |
      Several material adverse signals temper the positive narrative of Eikon's scientific pedigree
      and fundraising success. First and most significant for platform validation: in 2023, two
      original drug programs internally discovered through the SMT platform were terminated after
      each enrolled only a single patient in clinical trials. This was a consequential setback to
      the platform's drug discovery hypothesis, demonstrating that the SMT advantage has not yet
      translated to clinical utility in practice. The company pivoted to acquiring external clinical
      assets (EIK1001, EIK1003), but the question of whether the SMT platform has produced a
      clinically validated drug candidate remains open.

      Second, Eikon conducted a 15% workforce reduction in 2025, primarily affecting its research
      tools business, citing reduced US government and NIH funding to academic research institutions
      as the primary driver. From approximately 384 employees, this reduced headcount by roughly
      57 positions, signaling strategic narrowing from tool-making toward pure drug development and
      reflecting financial pressures from a high-burn pre-revenue model. Third, the February 2026
      IPO market capitalization of approximately $743-800 million was substantially below the $1.85
      billion pre-money valuation set at the Series D twelve months earlier, a step-down implying
      significant paper value erosion for some late-stage private investors. Fourth, Eikon carries
      concentrated key-person risk in CEO Roger Perlmutter. Fifth, with a burn rate of approximately
      $28 million per month in fiscal year 2025, the company's cash runway is projected only into
      H2 2027, creating near-term capital markets dependency. These risks collectively represent
      material diligence considerations for prospective investors and should be evaluated alongside
      Eikon's scientific and clinical strengths.
