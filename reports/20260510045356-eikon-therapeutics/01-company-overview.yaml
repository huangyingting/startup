  - id: SO004
    title: Funding History and Capital Markets
    body: |
      Eikon Therapeutics has executed one of the most successful private financing trajectories in
      recent biopharmaceutical history, raising approximately $1.12 billion in private capital across
      four rounds before a landmark public offering. The company emerged from stealth in May 2021
      with a $148 million Series A financing led by The Column Group, joined by Foresite Capital,
      Innovation Endeavors, and Lux Capital — immediately establishing Eikon as a high-profile
      platform company in the venture community.

      In January 2022, Eikon closed a $518 million Series B led by T. Rowe Price — among the largest
      biotech Series B financings on record — attracting a diversified institutional investor base
      including CPP Investments, EcoR1, UC Investments, Abu Dhabi Investment Authority, Harel Group,
      StepStone Group, Schroders, General Catalyst, Hartford HealthCare, AME Cloud Ventures, Lux
      Capital, and Horizons Ventures. In June 2023, the company raised a $106 million Series C while
      acquiring global rights to clinical-stage assets EIK1001 and EIK1003, reflecting a strategic
      pivot following internal program failures. In February 2025, Eikon secured a $350.7 million
      Series D at a $1.85 billion pre-money valuation with 11 institutional investors including Lux
      Capital, Alexandria Venture Investments, T. Rowe Price Associates, and General Catalyst. On
      February 5, 2026, Eikon completed an upsized IPO raising $381.2 million at $18 per share on
      Nasdaq (EIKN), the largest biotech IPO since 2024. The post-IPO market capitalization of
      approximately $743-800 million was a significant step-down from the $1.85 billion Series D
      valuation established one year earlier, reflecting public market skepticism toward pre-revenue
      clinical-stage biotech companies.
