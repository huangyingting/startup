  - id: SO005
    title: Clinical Pipeline Overview
    body: |
      Eikon's clinical pipeline is anchored by three programs in active development plus one
      preclinical program. EIK1001, a Toll-like receptor 7/8 (TLR7/8) agonist, is Eikon's lead
      asset. It is being evaluated in a pivotal Phase 2/3 trial designated TeLuRide-006 (also known
      as Keynote-G04) in combination with Merck's pembrolizumab (Keytruda) as first-line treatment
      for advanced melanoma. A separate Phase 2 trial, TeLuRide-005, examines EIK1001 with
      pembrolizumab for first-line non-small cell lung cancer (NSCLC). The commercial potential of
      EIK1001 depends substantially on TeLuRide-006 outcomes, making it a binary clinical value
      inflection point. Merck's $30 million strategic investment and multi-year clinical supply
      collaboration underscores the scientific rationale and commercial interest in this approach.

      EIK1003 is a selective PARP1 inhibitor in Phase 1/2 trials for advanced solid tumors including
      breast, ovarian, prostate, and pancreatic cancers. The selective PARP1 approach targets PARP1
      specifically rather than both PARP1 and PARP2, aiming to maintain anti-tumor efficacy while
      reducing hematologic toxicity seen with first-generation inhibitors (olaparib, niraparib,
      talazoparib). EIK1004 is a CNS-penetrant PARP1 inhibitor for brain and CNS cancers — a
      significant unmet need given poor blood-brain barrier penetration of existing PARP inhibitors.
      EIK1004 is in Phase 1/2 trials. EIK1005, a WRN helicase inhibitor for MSI-H cancers, remains
      in preclinical and IND-enabling studies. Critically, all three active clinical programs were
      externally acquired rather than discovered through the SMT platform, representing a material
      validation gap for the company's core platform differentiation thesis.
