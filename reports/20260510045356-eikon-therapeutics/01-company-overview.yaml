  - id: SO003
    title: Leadership Team and Executive Bench
    body: |
      The executive leadership of Eikon Therapeutics combines distinguished pharmaceutical industry
      experience with specialized oncology and technology expertise. Chief Executive Officer Roger
      Perlmutter joined in 2021 with one of the most accomplished track records in modern oncology
      drug development. Perlmutter previously served as Executive Vice President and President of
      Merck Research Laboratories from 2013 to 2020, where he oversaw clinical development and
      regulatory approval of pembrolizumab (Keytruda), which became the world's highest-grossing
      oncology medicine. His immuno-oncology expertise directly informs EIK1001, a TLR7/8 agonist
      being evaluated with Keytruda. Under Perlmutter's leadership, Eikon pivoted from a purely
      platform-driven model toward one combining external asset acquisition with internal discovery.

      Chief Medical Officer Roy Baynes brings decades of oncology drug development experience,
      overseeing clinical strategy and regulatory affairs for EIK1001's pivotal trial and PARP1
      inhibitor programs. Chief Financial Officer Alfred Bowie manages financial operations during
      a critical post-IPO period with runway projected into H2 2027. Chief Technology Officer Russ
      Berman leads development and scaling of the SMT platform. Chief Operating Officer Mike
      Klobuchar manages day-to-day operations. Chief Business Officer and General Counsel Ben Thorner
      leads business development including the Merck collaboration and manages legal affairs. Chief
      People Officer Barbara Howes oversees human resources including the 2025 workforce
      restructuring. The company employed approximately 384 individuals at its IPO filing. Key-person
      risk is concentrated in CEO Roger Perlmutter: his departure would likely impair the Merck
      collaboration, investor confidence, and the company's ability to attract capital and talent.
      No named CEO succession plan is publicly disclosed.
