  productSummary: >-
    Eikon's pipeline includes EIK1001 (TLR7/8 agonist, Phase 2/3 melanoma + Keytruda), EIK1003 (selective
    PARP1 inhibitor, Phase 1/2 solid tumors), EIK1004 (CNS-penetrant PARP1 inhibitor, Phase 1/2),
    and EIK1005 (WRN helicase inhibitor for MSI-high cancers, preclinical). The underlying technology
    platform uses lattice light-sheet microscopy and RESOLFT super-resolution imaging to track individual
    protein molecules in living cells.
