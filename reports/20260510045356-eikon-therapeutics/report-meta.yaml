companyProfile:
  summary: >-
    Eikon Therapeutics is a Hayward, CA-based clinical-stage biopharmaceutical company founded in 2019 by
    Nobel laureate Eric Betzig and colleagues. The company applies Nobel Prize-winning live-cell
    super-resolution microscopy and Single-Molecule Tracking (SMT) technology to oncology drug discovery.
    Eikon went public on February 5, 2026 (Nasdaq: EIKN), raising $381.2M in the largest biotech IPO since
    2024. Its lead asset EIK1001 (TLR7/8 agonist) is in Phase 2/3 pivotal trials for advanced melanoma in
    combination with Merck's pembrolizumab (Keytruda), with a clinical collaboration and $30M equity
    investment from Merck. The company has raised ~$1.5B in total financing and carries a post-IPO market
    cap of approximately $743-800M.
