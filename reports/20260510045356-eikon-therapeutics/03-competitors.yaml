  - id: TP004
    slug: moat-durability-competitive-risk-register
    title: "Moat Durability / Competitive Risk Register"
    description: "Assessment of Eikon's claimed competitive moats, primary threats to each moat, severity, and recommended diligence paths."
    columns: ["Moat Claim", "Primary Threat", "Severity", "Mitigation / Diligence Ask"]
    rows:
      - ["Proprietary live-cell super-resolution SMT platform (Nobel-winning technology, not commercially replicated)", "Recursion/Exscientia biological foundation models trained on large-scale cellular imaging are approaching population-level phenomics; Schrödinger FEP+ improving PPI accuracy in-silico", "Material (3–5 year horizon)", "Benchmark Eikon's single-molecule data against Recursion population-level phenomics in the same PPI target system; assess Schrödinger FEP+ accuracy on validated PPI targets; request Eikon's data on unique drug-able PPI targets discovered ONLY by their platform vs alternatives"]
      - ["PPI target access (>300,000 unique PPIs, <40 clinically validated)", "No clinical proof that Eikon's platform discovers better-quality PPI compounds than theoretical in-silico PPI design; first-mover advantage in PPI space is only valuable if translation rate is superior", "High (structural, long-term)", "Request Eikon's internal data on hit rate for live-cell imaging PPI discovery versus conventional HTS on same PPI targets; seek publication of PPI discovery data or expert KOL validation"]
      - ["Roger Perlmutter leadership credibility (ex-Merck Research Labs President)", "Key-person dependency: loss of Perlmutter would materially reduce platform partnership credibility and business development capabilities", "Material", "Request board succession plan; review equity vesting for key scientists and Perlmutter; assess depth of scientific advisory board and whether platform can operate without founder-inventor Betzig's continuing engagement"]
      - ["Merck strategic partnership (2025, $30M equity)", "Merck-only collaboration may limit partnering with competing pharma (exclusivity clauses unknown); Merck is also the world's largest pharmaceutical company and could replicate platform capabilities internally over time", "Material", "Request disclosure of exclusivity terms in Merck collaboration; assess whether Merck's $30M equity creates alignment or control conflicts for future partnership rounds"]
      - ["Clinical-stage programs (EIK1001, EIK1002) in active Phase I/II", "Phase I/II attrition in oncology is high (~70%); BDTX collapse shows precision oncology companies are not immune; EIK1001 (TLR7/8) competing with BMS Opdivo/Yervoy in melanoma faces high efficacy bar", "High (near-term clinical risk)", "Request Phase I dose escalation data for EIK1001 and EIK1002 when available; assess independent KOL opinion on TLR7/8 agonist mechanism in melanoma; compare safety profile to Opdivo/Yervoy combination"]
      - ["Nobel Prize association and scientific credibility (Eric Betzig, Nobel Chemistry 2014)", "Reputation moat is non-exclusive: Betzig's HHMI laboratory is also a source of competing research; academic publications from collaborators could validate alternative imaging methods", "Minor", "Confirm Betzig's current engagement with Eikon as scientific advisor; verify exclusivity of key IP from Betzig lab that is licensed to Eikon vs. made available to academic community"]
    notes: "Moat severity ratings are qualitative diligence team assessments based on competitive intelligence and published clinical data. 'High' severity means the threat could materially reduce Eikon's platform premium within 3 years; 'Material' within 5 years; 'Minor' within 10 years or unlikely."
    claimRefs: [CP017, CP018, CP019, CP020, CP021, CP022]

