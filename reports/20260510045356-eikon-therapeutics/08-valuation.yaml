    slug: final-diligence-asks-table
    title: Final Diligence Asks Table
    description: The five highest-priority data room and management meeting requests before a full investment decision.
    columns:
      - Priority
      - Diligence Ask
      - Why Critical
      - Expected Source
      - Impact on Thesis if Answered Favorably
    rows:
      - - 1 (Critical)
        - >-
          TeLuRide-006 full protocol and statistical analysis plan (SAP): primary endpoint definition, interim analysis
          triggers, power assumptions, DSMB stopping rules
        - >-
          Cannot assess interim PoS without knowing what success threshold is; the SAP determines whether the interim is
          powered for accelerated approval
        - Data room (clinical study protocol)
        - '+++ : Confirms adequate power for meaningful interim readout; raises PoS estimate by 5–10%'
      - - 2 (Critical)
        - >-
          2023 program termination reasons: scientific summary, clinical data from one enrolled patient per program,
          internal decision memos, failure mode classification
        - >-
          Determines whether 2023 failures were platform-driven (wrong target, false SMT signal) or
          clinical/business-driven; directly impacts SMT platform option value
        - Data room (clinical records) + management interview
        - '+++ : Confirms business/clinical reason (not platform); adds $100–200M to platform NPV'
      - - 3 (High)
        - >-
          HHMI Janelia exclusive IP license: full terms including change-of-control provisions, minimum
          commercialization obligations, sublicensing rights, and field-of-use restrictions
        - >-
          Change-of-control provisions determine M&A exit scenarios; license termination risk is the most
          underappreciated IP risk for acquirers
        - Data room (material contracts)
        - '++ : Favorable CoC provisions raise M&A exit value; restrictive provisions reduce it'
      - - 4 (High)
        - >-
          Merck collaboration agreement: financial terms (milestone schedule, royalty rates), termination provisions,
          notice period, co-commercialization rights if EIK1001 is approved
        - >-
          Merck collaboration financial value is currently unknown; undisclosed milestones could add $50–200M+ NPV;
          termination terms determine clinical supply risk
        - Data room (material contracts)
        - '++ : Disclosed milestones and favorable termination terms add to NPV and reduce supply risk'
      - - 5 (Moderate)
        - >-
          TeLuRide-006 current enrollment status (sites active, patients enrolled vs. target, any protocol amendments
          filed since IND submission)
        - >-
          Enrollment pace determines catalyst timing; protocol amendments signal potential trial difficulties;
          enrollment completion reduces timing uncertainty
        - Company investor relations update or management meeting
        - '+ : On-track enrollment confirms expected 2026–2027 interim timeline'
    notes: >-
      Priority 1 and 2 are blocking diligence items for a confident investment decision. Priorities 3–5 are important
      but not blocking if favorable assumptions are applied.
