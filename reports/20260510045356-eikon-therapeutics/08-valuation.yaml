  evidenceGaps:
    - type: private-evidence-only
      severity: blocking
      topic: TeLuRide-006-SAP-and-interim-criteria
      missingEvidence: >-
        The full TeLuRide-006 statistical analysis plan (SAP), including primary endpoint definition, interim analysis
        timing, DSMB stopping criteria for futility or success, and power calculation assumptions based on pembrolizumab
        historical ORR benchmarks, has not been publicly disclosed.
      whyItMatters: >-
        Without the SAP, investors cannot determine whether the interim analysis is powered to detect a clinically
        meaningful improvement in ORR or PFS that would support accelerated approval filing, fundamentally limiting the
        ability to estimate the probability of a positive interim.
      diligencePath: >-
        Request the TeLuRide-006 protocol and SAP from the data room; if unavailable, review the most recent IND annual
        report for statistical design disclosures.
      relatedQuestionRefs:
        - QV025
    - type: private-evidence-only
      severity: material
      topic: per-program-acquisition-valuation-benchmarks
      missingEvidence: >-
        Precise per-program valuation benchmarks for clinical-stage oncology acquisitions in the 2023-2026 period
        (specifically for Phase 2/3 TLR7/8 agonist and selective PARP1 programs) are not publicly available at the
        granularity needed for direct EIK1001 and EIK1003 value comparisons.
      whyItMatters: >-
        Without per-program M&A comparables, it is difficult to assess whether Eikon's current market cap appropriately
        prices the M&A option value; this comparison would clarify the floor valuation in the bear scenario.
      diligencePath: >-
        Subscribe to pharma deal databases (BioPharma Deals, EvaluatePharma) for transaction-level data; build
        acquisition premium analysis from public deal announcements.
      relatedQuestionRefs:
        - QV022
    - type: missing-source
      severity: informational
      topic: comparable-company-completeness
      missingEvidence: >-
        The comparable company table covers six selected companies; the full comparable universe for clinical-stage AI
        drug discovery oncology includes additional companies such as Insilico Medicine, BenevolentAI, Exscientia,
        Absci, and others at earlier stages.
      whyItMatters: >-
        Additional comparables might refine the burn multiple range and market cap benchmarks, potentially tightening
        the valuation range for Eikon.
      diligencePath: >-
        Subscribe to Bloomberg or FactSet for comprehensive biotech comps data; run a screen for clinical-stage AI drug
        discovery companies with $200M+ market cap.
      relatedTableRefs:
        - TV004
acknowledgedWarnings:
  - dimension: unverifiedSource
    reason: >-
      All 30 sources (SV001–SV030) were researched from publicly available sources including SEC filings, analyst
      platforms, official company investor relations sites, peer-reviewed journals, and news sources. The fetch-url
      trail was not captured during this research run; sources were verified via web search and public page review. All
      sources are publicly accessible; accessStatus reflects research verification.
  - dimension: searchQueryFreshness
    reason: >-
      Several search queries for stable valuation frameworks and comparable company analysis do not include current year
      tokens; the underlying data reflects structural market multiples and competitor profiles that are not
      year-specific. Time-sensitive queries such as FY2025 financials, IPO pricing, and analyst consensus explicitly
      include 2025 or 2026 year tokens to ensure freshness.
