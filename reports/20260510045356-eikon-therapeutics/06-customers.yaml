- id: TU004
  slug: retention-repeat-usage-satisfaction-table
  title: Retention / Repeat Usage / Satisfaction Table
  description: 'Assessment of retention dynamics for Eikon''s current relationship
    types: trial site participation, pharma partnerships, and academic collaborations.'
  columns:
  - Relationship Type
  - Retention Driver
  - Churn Risk
  - Satisfaction Proxy
  - Diligence Ask
  rows:
  - - Merck strategic partnership
    - Clinical trial supply commitment locks both parties into TeLuRide timeline;
      Perlmutter-Merck personal relationship; $30M sunk equity cost
    - Trial failure, CEO departure, or Merck strategic de-prioritization of EIK1001
      mechanism; no lock-in beyond trial supply
    - Strategic investment maintained; no reported withdrawal; Merck engaged post-IPO
      based on investor disclosures
    - Request Merck agreement term and termination triggers; confirm change-of-control
      provisions
  - - Clinical trial sites (TeLuRide-006)
    - Enrolled patient cohorts generate momentum; IRB approval is sunk cost; site
      investigators invested in data; patient access to investigational drug
    - Interim safety signals; site investigator turnover; Eikon financial distress;
      protocol amendments
    - Multiple ASCO abstracts from trial sites indicate active engagement and data
      generation satisfaction
    - Request number of active sites, enrollment rate per site, and any site dropout
      events
  - - UC Berkeley academic collaboration
    - Co-founder Darzacq lab intrinsically motivated; NIH grant funding for academic
      work aligned with Eikon research
    - Faculty departure; reduced NIH funding; potential conflict of interest if Darzacq
      co-founds competing lab
    - Ongoing publications; continued affiliation with Eikon scientific advisory or
      co-inventor status
    - Confirm Darzacq's ongoing advisory agreement and IP assignment status
  - - HHMI Janelia IP relationship
    - Exclusive license creates mutual benefit; Betzig and Lavis scientific legacy
      tied to Eikon's success; Janelia's reputation benefits from clinical translation
    - License termination triggers (breach of minimum commercialization obligations,
      change of control, insolvency); Janelia strategic refocus
    - Betzig and Lavis names still cited as founders; no reported license dispute
    - Request Janelia license agreement terms, renewal schedule, and termination provisions
  notes: Retention analysis is qualitative for pre-commercial stage; no churn data
    or NPS equivalent exists for clinical-stage biotech relationships. Assessments
    based on public evidence and standard industry practice.
