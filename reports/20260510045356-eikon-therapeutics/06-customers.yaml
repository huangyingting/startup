  evidenceGaps:
  - type: private-evidence-only
    severity: blocking
    topic: trial-site-identities-enrollment
    missingEvidence: Eikon has not published the complete list of clinical trial sites
      for TeLuRide-006, their enrollment rates, or the total number of active sites.
      ClinicalTrials.gov shows registration but does not provide per-site enrollment
      data.
    whyItMatters: Without site enrollment data, the pipeline to the primary TeLuRide-006
      interim analysis cannot be independently assessed; slow enrollment would delay
      the key catalyst and extend runway requirements.
    diligencePath: 'Request data room disclosure of: (1) number of active trial sites
      for TeLuRide-006, (2) cumulative and monthly enrollment rates, (3) dropout rate,
      (4) enrollment completion projections.'
    relatedQuestionRefs:
    - QU003
  - type: private-evidence-only
    severity: material
    topic: Merck-collaboration-financial-terms
    missingEvidence: The financial terms of Eikon's Merck research collaboration agreement
      beyond the $30M equity investment are not publicly disclosed. Annual research
      funding, milestone schedule, royalty rates, and collaboration scope are all
      private.
    whyItMatters: The Merck collaboration's financial terms determine whether Eikon
      receives material non-dilutive research funding (which would improve runway)
      or whether the relationship is primarily strategic without significant cash
      flow to Eikon.
    diligencePath: Request the Merck collaboration agreement or a term sheet summary
      including annual research funding, milestone payment schedule and triggers,
      royalty structure, and change-of-control provisions.
    relatedQuestionRefs:
    - QU020
  - type: enumeration-incomplete
    severity: material
    topic: named-customer-incomplete-list
    missingEvidence: Eikon has not published the complete list of clinical trial sites
      participating in TeLuRide-006, EIK1003, EIK1004, or TeLuRide-005 trials. The
      Named Customer Proof Table (TU003) is therefore a partial enumeration of named
      entities; additional academic medical centers and oncology centers participate
      but are not publicly identified.
    whyItMatters: Without a complete site list, the strength and breadth of clinical
      investigator adoption of Eikon's therapeutic hypotheses cannot be independently
      verified, and enrollment velocity cannot be assessed.
    diligencePath: 'Request from Eikon: (1) complete site list for all four active
      clinical trials, (2) number of active sites per trial, (3) per-site enrollment
      metrics, (4) site dropout or activation history.'
    relatedQuestionRefs:
    - QU003
    relatedTableRefs:
    - TU003
acknowledgedWarnings:
- dimension: unverifiedSource
  reason: All 25 sources (SU001–SU025) were researched from publicly available sources
    including official institutional websites, regulatory databases, clinical trial
    registries, and published news articles. Source content was verified via publicly
    accessible web pages. The fetch-url trail was not captured during this research
    run. All sources are publicly accessible; accessStatus reflects research verification.
- dimension: searchQueryFreshness
  reason: Search queries for stable benchmarking data (drug adoption patterns, oncology
    market structure) may not always include the current year token; the underlying
    data reflects multi-year patterns and year-specific queries were used where data
    is volatile or time-sensitive.
