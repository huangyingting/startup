- id: FU001
  type: journey-map
  layout: wide
  slug: customer-journey-map
  title: 'Customer Journey Map: Oncologist-Patient-Payer Path for EIK1001 (if Approved)'
  summary: Journey map showing the path from oncologist awareness through payer approval
    to patient treatment, with key barriers at each stage for a potential EIK1001
    commercial launch in melanoma.
  approximationNotes: Journey map is forward-looking for a hypothetical 2029 commercial
    launch; no approved product exists. Steps reflect standard oncology drug adoption
    patterns.
  claimRefs:
  - CU014
  - CU015
  - CU016
  data:
    items:
    - label: 'Awareness: Oncologist learns of FDA approval of EIK1001 + pembrolizumab
        through ASCO presentations, press releases, and NCCN guideline update process'
    - label: 'Evaluation: KOL oncologists at academic centers (MD Anderson, MSK, Dana-Farber)
        review pivotal data; peer-reviewed publication of TeLuRide-006 results; CME
        education begins'
    - label: 'Payer Authorization: Oncologist submits prior authorization for EIK1001
        + pembrolizumab combination; payer evaluates cost-effectiveness vs. pembrolizumab
        monotherapy; step-edit protocols'
    - label: 'Prescription and Dispensing: Specialty pharmacy dispenses EIK1001; infusion
        center or clinic administers pembrolizumab IV; patient support program manages
        compliance'
    - label: 'Monitoring and Continuation: Imaging response assessment (RECIST) at
        12 weeks; dose modification per label; continued dosing if response confirmed'
