- id: TU002
  slug: customer-growth-adoption-trajectory-table
  title: Customer Growth / Adoption Trajectory Table
  description: Timeline of Eikon's customer relationship development from inception
    through projected commercial launch.
  columns:
  - Period
  - Customer Milestone
  - Metric / Evidence
  - Interpretation
  rows:
  - - 2019–2021 (Founding to Series A)
    - Academic and institutional relationships established; no clinical customers
    - Series A $148M led by a16z; scientific advisory board formation; HHMI/Berkeley
      collaborations active
    - Platform credibility established via scientific founder reputation; institutional
      adoption of research model
  - - 2021–2022 (Perlmutter joins; Series B)
    - Merck relationship initiated concurrent with Series B $518M; TeLuRide program
      design begins
    - Merck $30M equity + collaboration; Roger Perlmutter CEO transition from Merck
      Research Labs president
    - First strategic pharma customer engagement; signals clinical-stage pivot and
      Keytruda combination strategy
  - - 2022–2023 (Clinical Stage + Terminations)
    - TeLuRide-006 and EIK1003 INDs filed and cleared; trial sites begin enrolling;
      2 programs terminated
    - NCT05612581 (TeLuRide-006) and NCT04799054 (EIK1003) registered on ClinicalTrials.gov;
      2 early SMT programs stopped
    - 'Positive: pivotal trial enrollment begins. Adverse: 2 programs fail, signaling
      SMT translation risk to trial sites'
  - - 2023–2025 (Series C/D + Enrollment)
    - Expanded trial site adoption; EIK1001 data presented at ASCO 2024 and 2025
    - Series C $106M (2023); Series D $350.7M (2025); ASCO 2024 and 2025 abstract
      acceptances
    - ASCO presentation validates trial data quality and site engagement; Series D
      provides runway for pivotal readout
  - - 2026 (IPO Year)
    - IPO on Nasdaq (EIKN); $381.2M raised; clinical updates provided post-IPO
    - IPO completed Feb 5, 2026 at $18/share; Q4 2025/FY2025 financial results published;
      pipeline updates
    - Public market as new capital customer; institutional investor adoption as equity
      holders; Merck relationship continues
  - - 2028–2030 (Projected commercial launch, if approved)
    - Commercial customers (oncologists, hospitals, payers) pending FDA approval of
      EIK1001 (melanoma) or EIK1003
    - Subject to TeLuRide-006 interim analysis 2026–2027; FDA review process 10–12
      months; commercial launch prep
    - Adoption velocity depends on label differentiation; payer access; KOL endorsement;
      commercial team build
  notes: Timeline based on public press releases, ClinicalTrials.gov registrations,
    and financial filing dates. Commercial launch scenarios are projections based
    on clinical timelines and regulatory precedent, not disclosed by Eikon.
