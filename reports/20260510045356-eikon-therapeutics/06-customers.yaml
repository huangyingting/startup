- id: TU005
  slug: expansion-and-concentration-risk-table
  title: Expansion and Concentration Risk Table
  description: Assessment of customer concentration risks and expansion opportunities
    across Eikon's commercial trajectory.
  columns:
  - Risk / Opportunity
  - Description
  - Severity / Magnitude
  - Mitigation or Path Forward
  rows:
  - - Merck concentration (single pharma partner)
    - 100% of Eikon's pharma partnership revenue and co-development support comes
      from a single partner; no other disclosed pharma collaborations
    - 'Critical: loss of Merck requires trial restructuring and supply sourcing; would
      trigger stock decline and raise capital concerns'
    - Sign a second pharma partnership for a different program (e.g., EIK1003, EIK1005);
      diversify with collaboration agreements
  - - Single pivotal program (EIK1001 melanoma)
    - TeLuRide-006 is Eikon's only pivotal-stage trial; failure creates a 2-3 year
      gap before any other program could reach pivotal stage
    - 'High: binary event; negative interim analysis would reduce market cap significantly
      and impair future financing'
    - Advance EIK1003 to Phase 2 pivotal faster; explore accelerated approval pathway
      for EIK1003 in HRR+ cancers
  - - Clinical trial enrollment pace risk
    - Enrollment velocity in TeLuRide-006 determines timing of interim analysis; slower-than-expected
      enrollment delays the primary catalyst
    - 'Medium-High: melanoma enrollment can be competitive with many approved checkpoint
      therapies making patient selection complex'
    - Expand trial sites internationally; add EU, Asia-Pacific sites to TeLuRide-006
      enrollment
  - - 'Expansion opportunity: EIK1001 label expansion (melanoma → NSCLC)'
    - TeLuRide-005 (Phase 2 NSCLC) running concurrently; positive melanoma data could
      accelerate NSCLC regulatory strategy
    - 'High potential: NSCLC is 5x larger market than melanoma; potential $3-5B peak
      sales if both indications approved'
    - Accelerate TeLuRide-005 enrollment post positive TeLuRide-006 data; design Phase
      3 confirmatory NSCLC trial
  - - 'Expansion opportunity: AI/ML platform licensing to pharma (beyond Merck)'
    - SMT platform could be licensed to additional large pharma companies for target
      identification and lead optimization in programs outside oncology
    - 'Medium: platform licensing deals in AI drug discovery ($1-5B+ for validated
      platforms) could provide non-dilutive revenue'
    - Publish additional platform validation data; hire BD team; identify second partner
      target; use ASCO presentations as BD tool
  notes: Risk severity assessments are based on standard oncology biotech risk frameworks
    and Eikon's specific stage, program portfolio, and capital structure. No Eikon-specific
    disclosure covers expansion plans beyond disclosed programs.
