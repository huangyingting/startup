company:
  name: Lalamove
chapter:
  number: 6
  title: Customers
  summary: |
    Lalamove's customer base divides into two principal cohorts: 12.2 million monthly active merchant-customers (as disclosed in the March 2023 HKEX prospectus) and 1.1 million monthly active carrier-partners, with both groups concentrated overwhelmingly in mainland China (operating as Huolala). The merchant base is dominated by small and medium-sized enterprises in F&B, retail, trading, and e-commerce verticals, with a growing enterprise cohort accessing the platform via REST API integrations with Shopify and WooCommerce. No customer-level NRR, GRR, or cohort retention data has been publicly disclosed, limiting durable quantitative assessment of repeat-purchase economics. The carrier membership subscription model is the clearest proxy for retention—it creates a recurring financial commitment from the carrier cohort—but subscriber counts and churn rates are also not disclosed. China revenue concentration (~90%) and undisclosed customer concentration data represent the primary customer-side risks for diligence.

sections:
  - id: customer-segmentation
    title: Customer Base Segmentation
    body: |
      Lalamove's customer base segments along two distinct supply-demand roles. On the demand side, merchants (businesses and individuals who book deliveries) number 12.2 million monthly actives as of mid-2022. On the supply side, carrier-partners (independent owner-operators who fulfill deliveries) number 1.1 million monthly actives over the same period. These figures, disclosed in the March 2023 HKEX listing application, represent one of the few quantified windows into Lalamove's scale, though they are now more than three years old and no updated figures have been publicly released.

      The merchant cohort segments primarily by size and use case. SMEs dominate by volume: restaurants ordering ingredient or supply deliveries, retail merchants shipping purchased goods to customers, trading companies moving samples and documents, and e-commerce sellers fulfilling orders placed through Shopify or WooCommerce storefronts. Enterprise customers—large retailers, logistics intermediaries, and supply chain managers—access the platform through the REST API, typically requiring higher reliability SLAs, priority carrier assignment, and dedicated account management. The Shopify App Store listing for Lalamove has accumulated more than 3,000 installs, indicating a measurable enterprise and mid-market e-commerce merchant cohort operating through the integration layer.

      Geographically, the merchant base is heavily concentrated in China (operating as Huolala), which has historically contributed approximately 90% of Lalamove's total revenue. Southeast Asian markets (Singapore, Philippines, Thailand, Vietnam, Malaysia) represent the second-largest block, with Latin American and MENA markets in early-to-growth stages. The China concentration creates both a scale advantage (density-driven dispatch efficiency) and a concentration risk (regulatory, geopolitical, and macro-economic sensitivity).

      From the carrier-partner perspective, the customer relationship differs fundamentally from merchant relationships. Carrier-partners are independent owner-operators who pay Lalamove through a per-job commission structure or, increasingly, through a recurring monthly membership subscription. The subscription model locks in carrier relationships through a financial commitment and provides premium job access in return. This creates a two-sided customer base where carrier retention is as strategically important as merchant retention—carrier density drives dispatch speed, which in turn drives merchant satisfaction and repeat usage.
    claimRefs: [CU001, CU002, CU003, CU004, CU005, CU006, CU007, CU008, CU009]
    tableRefs: [TU001]
    figureRefs: [FU001]

  - id: adoption-and-growth
    title: Adoption Trajectory and Named Customer Proof
    body: |
      Lalamove's adoption trajectory is visible primarily through two disclosed metrics: the 12.2 million monthly active merchants and 1.1 million monthly active carrier-partners from the 2022–2023 IPO filing period. While Lalamove has not published a longitudinal series of these metrics, the company's 2022 revenue of US$1.04 billion—against an H1 2022 GTV of US$3.9 billion—implies substantial transaction depth per active merchant, suggesting a core of high-frequency users generating a disproportionate share of volume. The implied average merchant GTV contribution (total 2022 GTV annualized at ~US$7.8B / 12.2M merchants = approximately US$640 per merchant per year) suggests a distribution heavily skewed toward high-frequency SME users and away from one-time users.

      Named customer proof at the individual enterprise level is not publicly available: Lalamove does not publish a named customer list, and no enterprise client has issued a public press release confirming a Lalamove contract. The most concrete customer evidence derives from two sources. First, the Shopify App Store listing shows 3,000-plus installs with merchant reviews confirming active production use for same-day delivery fulfillment across Singapore, Hong Kong, and Malaysia. Second, case studies published in trade press (e27, Tech in Asia) describe unnamed F&B merchants in Singapore and retail trading companies in Hong Kong achieving measurable reduction in delivery labor costs and fulfillment times using Lalamove.

      Enterprise API adoption is confirmed by the existence of the Shopify and WooCommerce integrations and by third-party coverage of Lalamove's API product. However, the number of dedicated enterprise API customers (outside the standard app-booking workflow) has not been disclosed. KR Asia reporting from 2024 noted that Lalamove has been growing its enterprise API customer base in Southeast Asia through direct sales to logistics-intensive industries, but quantified revenue attribution or customer count was not provided.

      The absence of named customer logos, case studies with quantified ROI, or published NPS/CSAT scores is a notable gap relative to B2B SaaS peers—though Lalamove's marketplace model (where merchant success is validated by repeat transaction volume rather than a software license renewal) means that public case studies are less standard in this sector.
    claimRefs: [CU010, CU011, CU012, CU013, CU014, CU015, CU016, CU017]
    tableRefs: [TU002, TU003]
    figureRefs: [FU002]

  - id: retention-and-expansion
    title: Retention, Expansion, and Concentration Risk
    body: |
      Lalamove has not publicly disclosed any customer retention metrics—no NRR, GRR, monthly churn rate, or cohort retention curve has been made available in the IPO prospectus or subsequent press coverage. The carrier membership subscription model provides the clearest proxy for durable engagement: carriers who pay a recurring monthly fee for premium job access have demonstrated willingness to commit financially to the platform, creating a recurring revenue base with implied retention. The subscription model launch in 2020 and its adoption across key markets (China, Singapore, Hong Kong) suggests that a meaningful share of the 1.1 million active carriers are on subscription contracts rather than pure per-job commission.

      On the merchant side, the implicit retention driver is frequency: high-volume SME merchants (restaurants, traders) who rely on Lalamove for daily deliveries have limited tolerance for switching costs because they have already embedded the Lalamove app into operational workflows, trained staff on the booking interface, and (in many cases) integrated it with their e-commerce storefront. Enterprise API customers face even higher switching costs due to the technical integration effort required to swap platforms. However, the absence of published churn data means these retention arguments are qualitative, not quantitative.

      Customer concentration is a material risk dimension that is also largely undisclosed. Geographic concentration in China (~90% of revenue) is the most significant concentration risk: any policy change affecting Lalamove's China operations (regulatory crackdown, gig-worker reclassification, data law enforcement) would have an outsized financial impact. Individual customer concentration (top-10 or top-20 merchant revenue share) has not been disclosed and represents a diligence gap.

      The expansion motion is platform-led: existing merchants naturally expand usage as their business volumes grow, and the API integration creates a land-and-expand path for enterprise customers who add more vehicle types, markets, or use cases over time. Lalamove's carrier subscription model creates a recurring relationship that is expanded when carriers upgrade from basic to premium tiers. The NEV/EV transition program (DuoLa Auto) could further deepen the carrier relationship by financing vehicles through the platform, creating a financial dependency analogous to a fleet finance product.
    claimRefs: [CU018, CU019, CU020, CU021, CU022, CU023, CU024, CU025, CU026]
    tableRefs: [TU004, TU005]
    figureRefs: [FU003, FU004]

