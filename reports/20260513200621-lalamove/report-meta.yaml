companyProfile:
  summary: >
    Lalamove was founded in Hong Kong in December 2013 by Chow Shing-Yuk (formerly a professional
    poker player) as EasyVan, a van-hailing app for small businesses. It rebranded to Lalamove in
    November 2014 to support international expansion, entering mainland China in 2014 under the
    Huolala brand. The platform connects merchants needing same-day delivery with independent van,
    truck, and motorcycle drivers via a mobile app with real-time dispatch, route optimization, and
    a carrier subscription model. Lalamove expanded across Southeast Asia, Latin America, and EMEA
    through the 2016–2021 period. Its 2022 revenue of US$1.04 billion exceeded the US$1 billion
    threshold for the first time. The company raised US$1.5 billion at a US$10 billion valuation in
    November 2021 (Series F), filed for a Hong Kong IPO in March 2023, and saw its prospectus lapse
    in September 2023 without listing.
  foundedDate: "2013-12-01"
  founders:
    - name: Chow Shing-Yuk
      role: Founder & Chairman
      background: >
        Former professional poker player; founded EasyVan (later Lalamove) in Hong Kong in 2013.
        Retains approximately 25% equity interest in Lalatech Holdings after prior secondary
        transactions.
      claimRefs: [CO001, CO013, CO014]
  foundingLocation: Hong Kong SAR, China
  headquarters: Hong Kong SAR, China
  productSummary: >
    Lalamove's core product is an on-demand logistics matching platform: merchants post delivery
    orders via the iOS/Android app or API; the AI-powered dispatch system matches them with the
    nearest available carrier partner; the carrier completes the delivery and receives payment via
    the platform. Carrier partners pay a monthly or annual subscription fee to access orders;
    commission revenue (per-order percentage) was added in 2018 and grew to 28% of 2022 revenue.
    Enterprise customers access the platform via an API integration layer (Shopify, WooCommerce,
    Lazada, Grab integration). In China, an EV fleet transition initiative is underway.
  customerFocus: >
    Primary customers are SME merchants (food and beverage, retail, e-commerce fulfillment) needing
    same-day or scheduled intra-city delivery. Enterprise customers include large e-commerce
    platforms, retail chains, and third-party logistics companies accessing the platform via API.
    Approximately 90% of GMV is China-based (Huolala brand); remaining GMV is in SEA (Singapore,
    Malaysia, Thailand, Philippines, Vietnam), LATAM (Mexico, Brazil), and MENA.
  businessModel: >
    Dual revenue streams: (1) carrier subscription fees — monthly or annual recurring fees paid by
    1.1 million active carriers for access to the merchant order flow; (2) per-order commissions
    charged to merchants on each completed transaction. The subscription model creates recurring
    revenue and high carrier switching costs; the commission layer captures upside from volume growth.
    The asset-light model (no owned vehicles) keeps capex minimal and gross margins structurally
    above asset-heavy logistics peers.
  stage: Pre-IPO (Series F; HKEX prospectus lapsed September 2023)
  fundingStatus: >
    Seven funding rounds through Series F (November 2021): total capital raised approximately
    US$3.5 billion. Series F raised US$1.5 billion from Sequoia Capital China, Tiger Global,
    LaSalle Investment Management, and others at a US$10 billion post-money valuation. HKEX IPO
    filing sought to raise approximately US$500 million; the prospectus lapsed in September 2023
    without listing. No Series G or bridge financing has been publicly announced as of May 2026.
  disclosureProfile: private-disclosed
  claimRefs: [CO001, CO002, CO003, CO004, CO005, CO011, CO012, CO013, CO014, CI001]

summary:
  headline: >
    Lalamove is Asia's dominant on-demand intra-city logistics network with a credible investment
    thesis, but its Series F valuation (9.6x EV/Revenue) is unsupported by public comparables;
    entry at base-case multiples (5–7x, US$5.2–7.3B) requires confirmed IPO progress and
    resolution of the gig-worker and PIPL regulatory overhangs before a positive view is warranted.
