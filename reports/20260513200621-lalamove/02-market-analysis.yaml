  - id: market-sizing
    title: TAM, SAM, and Market Sizing
    body: |
      Lalamove's total addressable market (TAM) is best approximated by the global on-demand logistics market: US$198.96 billion in 2025 growing to US$485.84 billion by 2031 at a 15.87% CAGR (Mordor Intelligence). This encompasses all digital platform-enabled, on-demand freight matching globally. For context, this represents roughly 46% of the overall Asia-Pacific 3PL market (US$431.38 billion in 2025), although the geographies and segment definitions partially overlap.

      Lalamove's serviceable addressable market (SAM) is more constrained: intra-city, on-demand road freight in the 17 markets where it operates. The SAM can be estimated using the APAC share of global on-demand logistics (42.91%), reduced for Lalamove's current 17-market footprint and adjusted for its focus on road, short-haul freight. A conservative estimate of Lalamove's SAM is US$30–50 billion (intra-city on-demand logistics across its active markets), noting that China alone (where it competes via Huolala) represents the largest single slice of this figure given the country's US$254 billion 3PL market (58.74% × US$431.38 billion). Lalamove's serviceable obtainable market (SOM) is approximated by its 2022 reported revenue of US$1.04 billion and H1 2022 freight gross transaction value (GTV) of US$3.9 billion (annualized ~US$7.8 billion), suggesting it had captured roughly 1–2% of its APAC-focused SAM by 2022.

      Different analyst estimates diverge significantly: GlobeNewswire (sourcing an unnamed research firm) forecasted the on-demand logistics market at US$357.84 billion by 2028; MarketsandMarkets covers the same broad category with their own CAGR ranges; Technavio's on-demand logistics market analysis uses a different base year. The divergence arises from definitional differences—whether to include platform-brokered freight forwarding, B2B scheduled deliveries dispatched via app, or only true spot-market same-day services. For Lalamove diligence, the Mordor Intelligence definition (on-demand, technology-enabled, real-time match) is most applicable, but the range of estimates (US$199B–US$358B for 2025–2028) is a material uncertainty.

      SMEs represent the fastest-growing end-user segment within the on-demand logistics market at a 19.16% CAGR according to Mordor Intelligence, reflecting rapid digitization of small business logistics. Lalamove explicitly targets this segment—its Hong Kong platform notes that 98% of Hong Kong businesses are SMEs—and the platform's pricing model is designed for ad-hoc, no-minimum-volume transactions that suit micro-enterprises.
