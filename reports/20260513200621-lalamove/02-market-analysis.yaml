        - Constraint
        - Ongoing
        - Commission yield compression; carrier membership fee sensitivity
        - What is Lalamove's carrier pricing power vs. Manbang in overlapping cities?
      - - SME buyer churn and price sensitivity
        - Constraint
        - Ongoing
        - High elasticity means promotional pricing to retain users is margin-dilutive
        - What is Lalamove's SME customer LTV and 12-month cohort retention rate?
      - - Non-China market execution risk
        - Constraint
        - Medium-term; 3–5 year ramp
        - EMEA/LATAM markets are early stage; GTV per city is a fraction of China
        - What is the unit economics profile for 2024/2025 entrant markets?
      - - Macro sensitivity (China freight cycle)
        - Constraint
        - Cyclical; currently neutral-to-soft
        - GTV correlated with manufacturing output and consumer spending
        - How does Lalamove's platform GTV correlate with China PMI and e-commerce GMV data?
    notes: "Drivers and constraints compiled from SCMP gig-economy coverage, Mordor Intelligence, e27 SME analysis, McKinsey last-mile research, and Lalamove IPO prospectus disclosures. Timing and magnitude are analyst estimates subject to revision."
