        - Increases last-mile and same-day delivery demand; enlarges SAM
        - What % of Lalamove's GTV growth is attributable to e-commerce vs. traditional SME freight?
      - - SME logistics digitization
        - Driver
        - Ongoing; 3–5 year horizon
        - Core demand engine; 19.16% CAGR for SME segment per Mordor Intelligence
        - What is SME cohort retention and order frequency trend over 24 months?
      - - Gig-driver supply proliferation
        - Driver
        - Near-term; moderating as regulation tightens
        - Maintains carrier supply depth and suppresses per-order carrier costs
        - How has carrier earnings per hour trended 2021–2025 in China?
      - - Platform API integrations (Shopify, ERP)
        - Driver
        - Near-term; network effect accelerating
        - Stickiness and automated volume; reduces churn in enterprise segment
        - What is API-sourced order % of total volume? What is enterprise churn rate?
      - - NEV fleet adoption and green mandates
        - Driver
        - Medium-term; policy-accelerated in China
        - 40% NEV fulfillment rate as of 2024–2025; charging infra is moat
        - Does Lalamove own/lease NEVs or subsidize driver EV purchases?
      - - Gig-worker regulatory risk (China, SEA)
        - Constraint
        - Near-term; ongoing regulatory evolution
        - Mandatory social insurance could add 15–30% to carrier cost structure
        - What are Lalamove's current compliance costs and accruals for regulatory obligations in China?
