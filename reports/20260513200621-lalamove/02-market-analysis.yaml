  - id: FM004
    title: Adoption funnel or value-chain map
    type: flow
    layout: standard
    summary: >-
      Value-chain flow showing how freight moves through Lalamove's platform from shipper need to delivery
      completion. Illustrates the five core actors (shipper, platform, driver-supply pool, last-mile execution,
      recipient) and two enabling layers (payment/settlement and tracking/proof of delivery).
    data:
      nodes:
        - id: shipper
          label: Shipper (SME / Enterprise / Consumer)
          note: Places booking via Lalamove app or API; defines pickup, destination, vehicle type, and declared value
        - id: platform
          label: Lalamove Platform (Matching Engine)
          note: Real-time matching algorithm; dynamic pricing; dispatches nearest available verified driver; collects payment
        - id: driver-pool
          label: Gig Driver Supply Pool
          note: Verified, licensed drivers with registered vehicles; earn per trip; pay carrier membership fee or per-order commission
        - id: last-mile
          label: Last-Mile Execution
          note: Driver collects goods, navigates to destination, delivers; GPS tracking visible to shipper and recipient
        - id: recipient
          label: Recipient (Business or Consumer)
          note: Receives delivery; confirms via app or signature; disputes handled through platform
      edges:
        - from: shipper
          to: platform
          label: Booking request and payment authorization
        - from: platform
          to: driver-pool
          label: Order dispatch and dynamic pricing signal
        - from: driver-pool
          to: last-mile
          label: Driver accepts and executes pickup and delivery
