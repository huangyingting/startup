  evidenceGaps:
    - type: missing-source
      severity: material
      topic: market-sizing
      missingEvidence: "China-specific on-demand intra-city logistics market size from an independent analyst source; only APAC aggregates are available."
      whyItMatters: "A China-specific figure would sharpen the Lalamove SAM estimate; without it, the China contribution to the SAM must be extrapolated from 3PL shares rather than on-demand data."
      diligencePath: "Request China-specific freight platform market data from Mordor Intelligence, Frost & Sullivan, or iResearch; triangulate from Lalamove's disclosed China revenue share and GTV."

    - type: private-evidence-only
      severity: material
      topic: gig-economy
      missingEvidence: "Carrier earnings per hour and earnings trend data for Lalamove's China market from 2021 to 2025."
      whyItMatters: "This data is necessary to assess whether gig-driver regulatory compliance costs have been absorbed by the platform, passed to carriers, or passed to shippers via higher prices."
      diligencePath: "Request earnings data from Lalamove in diligence; compare to Full Truck Alliance disclosures in SEC filings."

    - type: private-evidence-only
      severity: material
      topic: buyer-churn
      missingEvidence: "SME cohort retention and 12-month repeat order rate for Lalamove across its active markets."
      whyItMatters: "Without cohort data it is impossible to distinguish genuine platform stickiness from one-time trial usage, making LTV and churn projections unreliable."
      diligencePath: "Request cohort analysis from Lalamove management; benchmark against comparable e-commerce delivery platforms in SEA."

    - type: missing-source
      severity: medium
      topic: competitive-dynamics
      missingEvidence: "English-language documentation of the competitive response of Manbang (Full Truck Alliance) and Didi Freight to Lalamove's urban van/truck segment, and a clear carrier supply-pool comparison."
      whyItMatters: "Without competitive supply-pool data, Lalamove's moat in China's urban freight segment cannot be independently assessed."
      diligencePath: "Use Chinese-language industry reports and FTA SEC filings to map competitive dynamics in overlapping city markets."
      relatedQuestionRefs:
        - QM022

    - type: missing-source
      severity: minor
      topic: market-execution-risk
      missingEvidence: "Unit economics (order density, carrier acquisition cost, GTV per city) for 2024/2025 entrant markets including Turkey, UAE, and Germany; and data on World Bank LPI correlation with platform adoption in these markets."
