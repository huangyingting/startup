chapter:
  number: 2
  title: Market Analysis
  summary: |
    The on-demand logistics market, Lalamove's primary competitive arena, was valued at approximately US$198.96 billion in 2025 and is projected to reach US$485.84 billion by 2031 at a 15.87% CAGR (Mordor Intelligence). Asia-Pacific accounts for roughly 42.91% of the global market and is the dominant region by size; within APAC, China represents approximately 58.74% of third-party logistics spend. Lalamove's total addressable market spans on-demand freight and last-mile delivery for SMEs across 17 markets, but its serviceable market is primarily intra-city road freight in China (roughly 90% of revenue) and APAC. Four buyer segments drive adoption: micro/small enterprises seeking ad-hoc delivery, larger enterprises integrating via API, e-commerce merchants requiring same-day fulfillment, and individual consumers for moving services. Growth is driven by e-commerce volume growth, SME digitization, gig-driver supply proliferation, and platform-API integrations with commerce software. Key constraints include gig-worker regulatory risk in China and Southeast Asia, price elasticity among SME buyers, competition from incumbent freight brokers, and widening coverage gaps in non-China markets. Contradictory market estimates across analyst reports reflect differing scope definitions, with TAM figures ranging from US$199B to over US$350B depending on geography and segment inclusions.

sections:
  - id: market-definition
    title: Market Definition and Scope
    body: |
      On-demand logistics is defined as freight and delivery services matched in real time via digital platforms, typically with sub-hour dispatch, transparent pricing, and no advance booking requirement. The core addressable spend for Lalamove is intra-city, on-demand, road-based freight: van and truck hailing for parcel, pallet, and cargo-level shipments where speed and flexibility take precedence over cost optimization. Adjacent but partially included spend comprises scheduled same-day delivery, marketplace-fulfilled e-commerce last-mile, and API-integrated platform logistics (Shopify, WooCommerce integrations). Excluded from Lalamove's primary TAM are long-haul cross-border freight forwarding, ocean and air cargo, warehousing-as-a-service, and express courier services relying on hub-and-spoke sorting networks (DHL Express, FedEx, SF Express).

      The substitutes for on-demand logistics platforms are: (1) traditional phone-dispatched freight companies, where SMEs call brokers hours or days in advance with no real-time tracking; (2) self-operated delivery fleets for larger enterprises; (3) postal and courier networks for small parcels below van-capacity thresholds; and (4) informal driver marketplaces (social media, classified ads) prevalent in emerging markets. Lalamove's key differentiation from these substitutes is instant matching, transparent per-booking pricing, real-time GPS tracking, and a two-sided marketplace that eliminates the freight broker intermediary.

      The global on-demand logistics market was valued at US$198.96 billion in 2025 by Mordor Intelligence, with Asia-Pacific representing 42.91% of that value (approximately US$85.4 billion). Mordor Intelligence separately sized the Asia-Pacific third-party logistics (3PL) market at US$431.38 billion in 2025, with China accounting for 58.74% of that figure. These two figures are not additive; the on-demand segment is a sub-vertical of the broader 3PL market. The discrepancy in estimates between different research firms (GlobeNewswire reports a market size approaching US$357.84 billion by 2028) reflects differing inclusions: some estimates include all technology-enabled freight matching regardless of same-day requirement, while stricter definitions require sub-four-hour SLAs.
