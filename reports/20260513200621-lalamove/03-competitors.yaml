company:
  name: Lalamove
chapter:
  number: 3
  title: Competitors
  summary: |
    Lalamove (Huolala in China) occupies the dominant position in Asia's on-demand intra-city logistics platform market, with its nearest structural peer being GoGoX (formerly GoGoVan, HK: 2246), which shares a similar marketplace model connecting independent van and truck drivers with shippers. GoGoX operates in six Asian markets versus Lalamove's seventeen, with an estimated funding base and revenue substantially below Lalamove's US$1.04 billion 2022 revenue. The competitive field divides into three distinct clusters: direct intra-city competitors (GoGoX, Didi Freight in China), adjacent freight platforms operating in longer-haul segments (Full Truck Alliance, NYSE: YMM), and super-app logistics arms that compete at the last-mile parcel level (Grab's GrabExpress, J&T Express). Lalamove's key differentiation stems from its multi-vehicle breadth (motorcycles through heavy trucks), its 12.2 million monthly active merchant network, its early NEV/EV fleet transition (40% of orders fulfilled by new energy vehicles in 2024), and its API-based enterprise integrations that create switching costs. The primary competitive risk is China market concentration: GoGoX and Didi Freight compete directly in Lalamove's highest-revenue geography, while regulatory scrutiny has periodically constrained all digital freight platforms operating in China. Lalamove's moat—network density, carrier subscription model, and brand recognition among SMEs—is durable but not impenetrable if a well-capitalised competitor (e.g., Didi or a Tencent-backed entity) prioritises intra-city freight.

sections:
  - id: competitive-landscape-overview
    title: Competitive Landscape Overview
    body: |
      The on-demand intra-city logistics platform market in Asia is structurally concentrated around two dominant players: Lalamove (operating as Huolala in mainland China) and GoGoX (formerly GoGoVan, HK Stock Code 2246). Both companies were founded in Hong Kong in 2013 within months of each other and share a nearly identical marketplace model: an app-based platform matching merchants and individual shippers with independent owner-operators driving vans and light trucks, compensated on a per-order basis with an optional membership subscription. This structural similarity has shaped a classic platform duopoly in the on-demand intra-city segment across the key markets both platforms entered early.

      Beyond this core duopoly, the competitive landscape fragments across three additional layers. First, China-domestic freight platforms such as Didi Freight (launched 2020 as a Didi subsidiary) and the long-haul matching platform Full Truck Alliance (NYSE: YMM) overlap with Lalamove's Chinese operations but in different segments: Didi Freight in intra-city road freight and FTA in intercity highway trucking. Second, super-app logistics arms—principally Grab's GrabExpress service operating across eight Southeast Asian markets—compete in the last-mile parcel delivery segment in Lalamove's SEA markets but with narrower vehicle scope (primarily motorcycles, packages under 20 kg) compared to Lalamove's van and truck offerings. Third, the express parcel delivery sector, represented by J&T Express (HK: 1519, founded 2015 in Indonesia), serves overlapping merchant customers but through a fundamentally different hub-and-spoke model focused on B2C e-commerce fulfillment rather than real-time marketplace matching.

      Lalamove's competitive position is strongest in its home turf of Hong Kong and in mainland China (as Huolala), where it claims the largest network of monthly active merchants (12.2 million) and monthly active carriers (1.1 million) globally. Its 400-plus city footprint across 17 markets in 2025—spanning China, Southeast Asia, Latin America, and EMEA—substantially exceeds any single competitor's geographic reach. The on-demand logistics market, valued at approximately US$198.96 billion in 2025 with a projected 15.87% CAGR through 2031 (Mordor Intelligence), is large enough to sustain multiple platform players but competitive intensity is highest in China and the more mature markets of Hong Kong and Singapore.
    claimRefs: [CP001, CP002, CP003, CP013, CP014, CP015, CP024, CP031]

  - id: direct-competitors
    title: Direct Competitors — GoGoX and Didi Freight
    body: |
      GoGoX is Lalamove's closest structural competitor and the only other publicly traded pure-play intra-city on-demand logistics platform in Asia. Founded as GoGoVan in Hong Kong in 2013 by Steven Lam, Nick Tang, and Reeve Kwan, the company merged with mainland Chinese competitor 58 Suyun in late 2017—gaining coverage across more than 300 Chinese cities at a stroke—before rebranding as GOGOX in July 2020. In July 2021, GoGoX raised US$100 million in a round led by BOCOM International and Cyberport Macro Fund, with participation from Alibaba, Cainiao, and 58.com. In 2022 it listed on the Hong Kong Stock Exchange under ticker 2246, making it one of the few pure-play logistics platforms to be publicly traded in Asia. As of 2024 GoGoX operates in six markets: Hong Kong, Singapore, mainland China, Taiwan, South Korea, and India—substantially fewer than Lalamove's seventeen.

      The structural similarity between the two companies creates a direct price-competitive dynamic in the overlap markets of Hong Kong and Singapore. Both platforms use per-booking transparent pricing, real-time GPS tracking, driver rating systems, and membership subscription models for carriers. However, Lalamove has meaningfully differentiated on three dimensions: (1) multi-vehicle breadth, supporting motorcycles through heavy trucks versus GoGoX's predominantly van-and-light-truck fleet; (2) enterprise API integrations with e-commerce platforms including Shopify and WooCommerce, which GoGoX has not rolled out at equivalent scale; and (3) the DuoLa Auto EV cargo van initiative announced in June 2025 in partnership with Changan Kaicene, which represents a vertical integration into vehicle supply without a GoGoX equivalent.

      Didi Freight (滴滴货运), launched in 2020 as a business unit of Didi Chuxing, is a meaningful competitor to Huolala in mainland China. Didi Freight operates an urban freight matching service for vans and trucks in major Chinese cities, directly overlapping with Huolala's core segment. Didi's competitive advantage stems from its massive existing driver network (inherited from its ride-hailing business) and its deep brand recognition among Chinese consumers and SMEs. However, Didi Freight faces significant regulatory and operational headwinds: Didi Chuxing's delisting from New York stock exchanges in 2021 following a Chinese data security investigation created strategic uncertainty, and Didi Freight's China operations have been subject to the same regulatory environment affecting all gig-economy freight platforms. As of the report date, Didi Freight has not publicly disclosed standalone revenue or profitability figures.
    claimRefs: [CP004, CP005, CP006, CP016, CP019, CP022, CP025, CP029, CP030, CP032, CP033, CP035]
    tableRefs: [TP002, TP003]

  - id: adjacent-competitors
    title: Adjacent Competitors — FTA, Grab, and J&T Express
    body: |
      Full Truck Alliance (FTA, NYSE: YMM), known in China as Manbang Group (满帮集团), is the dominant digital platform for long-haul intercity highway freight matching in China. FTA listed on the New York Stock Exchange in June 2021. Unlike Lalamove/Huolala, which focuses on same-day intra-city delivery within metropolitan areas, FTA connects truck owners with shippers for cross-city highway freight—a fundamentally different use case with different economics (multi-day transit, load-optimisation pricing, contract freight). FTA does not operate in Lalamove's core intra-city segment, and Lalamove does not compete in FTA's highway freight segment. However, both platforms vie for Chinese truck drivers and logistics SMEs as customers, creating an indirect competitive overlay. FTA's NYSE listing and US-based institutional investor base expose it to geopolitical risk that Lalamove's Hong Kong IPO track avoids. FTA's revenue model (transaction fees on freight matches) is also distinct from Lalamove's membership-plus-commission structure.

      Grab Holdings (NASDAQ: GRAB), Southeast Asia's largest super-app by revenue (US$2.80 billion in FY2024), operates GrabExpress as its on-demand parcel delivery service across eight SEA markets including Singapore, Malaysia, Indonesia, Thailand, Vietnam, the Philippines, Cambodia, and Myanmar. GrabExpress launched in November 2015 and uses motorbike couriers for door-to-door deliveries within cities, targeting packages under 20 kg. This is structurally complementary to, rather than directly competitive with, Lalamove in most cases: a merchant needing to send a parcel (single package, motorbike-compatible) might use GrabExpress, while one needing to ship a van-load of goods uses Lalamove. However, as Grab expands its logistics capabilities and potentially adds larger vehicle types, the overlap with Lalamove's van and light-truck segment will increase. Grab's super-app distribution advantage—its existing user base of tens of millions of consumers and merchants across SEA—gives it a low-cost acquisition channel for logistics customers that Lalamove must counter with superior product and pricing.

      J&T Express (HK: 1519), founded in 2015 in Jakarta and listed on the Hong Kong Stock Exchange in October 2023, is an international parcel express company operating across 13 countries. J&T's model—franchise-style sorting centres, employed delivery personnel, hub-and-spoke routing optimised for e-commerce fulfillment—is fundamentally different from Lalamove's real-time marketplace. J&T's investor base (Hillhouse, Sequoia China, Tencent) overlaps with Lalamove's, but the companies target different logistics occasions. In markets like Singapore and Malaysia, J&T competes for B2C e-commerce delivery volume that some of Lalamove's merchant customers also ship. J&T's valuation reached US$20 billion in November 2021 (before declining post-IPO), suggesting that e-commerce fulfilment platforms can achieve Lalamove-comparable scale.
    claimRefs: [CP006, CP007, CP008, CP009, CP010, CP011, CP012, CP017, CP018, CP020, CP026, CP027, CP028, CP034]
    tableRefs: [TP001]

  - id: competitive-moats
    title: Competitive Moats and Lalamove's Differentiation
    body: |
      Lalamove's durable competitive advantages derive from four sources: network density, subscription-driven switching costs, multi-vehicle breadth, and technology integrations. Network density is the most critical: with 1.1 million monthly active carriers and 12.2 million monthly active merchants (per IPO prospectus data), Lalamove has built the deepest double-sided network in intra-city on-demand logistics across Asia. This density creates a virtuous cycle—more merchants attract more carriers (faster matching, lower unfulfilled rate), which in turn attract more merchants. GoGoX's substantially smaller network in overlapping markets makes it difficult to match Lalamove on fulfillment speed and availability.

      The carrier subscription model is a second structural moat. Lalamove charges carriers a regular subscription fee for platform access, creating a recurring revenue stream and a high-frequency relationship with drivers that pure commission-only platforms (such as some early-stage entrants) cannot replicate easily. Carriers who have paid a subscription and built their ratings on Lalamove's platform face meaningful switching costs—forfeiting both sunk subscription costs and accumulated reputation. Similarly, enterprise merchants who have integrated Lalamove's API into their own order management or e-commerce systems (Shopify, WooCommerce) face integration-layer switching costs.

      Lalamove's multi-vehicle capability—motorcycles, sedans, vans, light trucks, medium trucks, and heavy trucks—provides a single-platform solution for merchants whose logistics needs vary by shipment size, addressing a fragmentation problem competitors with narrower vehicle pools cannot solve. GoGoX, while offering vans and trucks, is not known for heavy-truck coverage at scale. GrabExpress is motorcycle-only. J&T is fixed-schedule rather than on-demand.

      The NEV/EV transition investment is a forward-looking moat: Lalamove's DuoLa Auto brand (launched June 2025), 40% NEV fulfillment rate (2024), and 940,000 charging pile partnerships across 338 Chinese cities position the company to comply with China's tightening emissions standards before competitors, potentially securing preferential regulatory treatment and reducing carrier fuel costs—a key driver of carrier satisfaction and retention.
    claimRefs: [CP013, CP014, CP018, CP021, CP023, CP025, CP029, CP030, CP036, CP037]
    figureRefs: [FP001, FP002, FP003]

  - id: competitive-risk-assessment
    title: Competitive Risk Assessment
    body: |
      Lalamove faces a set of identifiable competitive risks that require ongoing monitoring. The most material near-term risk is Didi Freight's potential scale-up in mainland China. Didi Chuxing's driver network exceeds Lalamove's in China ride-hailing, and if Didi prioritises urban freight—potentially subsidised by its ride-hailing cash flows—it could undercut Lalamove's pricing in key Chinese cities. Historical precedent from ride-hailing (Didi vs. Uber China, Didi vs. Lyft in China) shows that a well-capitalised Didi can sustain aggressive pricing campaigns. Lalamove's response would need to lean on its subscription-based carrier economics and merchant loyalty rather than pure price competition.

      A second competitive risk is Grab's super-app expansion into heavier cargo in SEA. As Grab's financial position improves (it reported US$2.80 billion in FY2024 revenue), it has the capital to add larger vehicle types to GrabExpress across its eight-market SEA footprint. Were Grab to expand to van-sized deliveries, it would directly encroach on Lalamove's SEA segment. Grab's advantage would be its existing merchant and consumer relationships and its super-app cross-selling capability; Lalamove's defence would be freight-specific depth (vehicle management tools, multi-stop routing, enterprise API) that a generalised super-app logistics arm would take years to replicate.

      Third, the consolidation risk in the express parcel market (J&T's expansion, Ninja Van, and regional players) creates price pressure on the delivery-fee floor in e-commerce fulfilment markets, potentially commoditising the small-parcel segment that Lalamove competes in with its motorcycle delivery tier. The on-demand logistics market is growing rapidly (15.87% CAGR per Mordor Intelligence) but not immune to margin compression from well-funded express delivery networks.
    claimRefs: [CP009, CP015, CP019, CP031, CP038, CP039]
    tableRefs: [TP004, TP005]

