callouts:
  - calloutType: strength
    title: Scale and Platform Lock-In
    body: |
      Lalamove's dual-sided network of 12.2 million monthly active merchants and 1.1 million monthly active carriers in 400+ cities creates a powerful liquidity moat. Its 44% market share in Chinese closed-loop freight GTV (per Frost & Sullivan cited in prospectus) and >90% instant-delivery market share in Malaysia illustrate deep regional entrenchment that is difficult for new entrants to replicate.
    claimRefs:
      - CO006
      - CO028
      - CO029

  - calloutType: risk
    title: Regulatory and Profitability Risk
    body: |
      Mainland Chinese regulators summoned Lalamove over a dozen times in 2022-2023 regarding alleged carrier payment arrears and freight rate suppression. The company swung back to a US$33 million net loss in H1 2023 after its first-ever profit in H1 2022, highlighting volatile earnings. The Hong Kong IPO remains incomplete, meaning the company still lacks a public capital markets exit or valuation anchor.
    claimRefs:
      - CO039
      - CO031
      - CO032
      - CO040

