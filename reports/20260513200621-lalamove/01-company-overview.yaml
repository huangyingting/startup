  - id: founding-leadership-governance
    title: Founding, Leadership, and Governance
    body: |
      Lalamove was founded in December 2013 by Chow Shing-Yuk in Hong Kong. Chow, described in contemporaneous media as a former professional poker player, identified the logistics pain point for small businesses—traditionally forced to phone multiple freight companies days in advance—and digitized the van-hailing model. Chow serves as founder and chairman and retains approximately 25% of the company's equity even after selling US$165 million worth of shares to investors in recent years. No succession plan or alternate chair has been publicly announced, making Chow a significant key-person dependency.

      Blake Larson served as Head of International and later Managing Director of the International division from the early growth phase through at least 2020, helping drive expansion across Southeast Asia and Latin America. Paul Loo is the Chief Operating Officer responsible for international operations, as confirmed in company communications surrounding the 2022 Bangladesh launch and 2025 media coverage. Regional managing directors include Jane Teh (Malaysia), Ben Lin (Thailand), and Dannah Majarocon (Philippines, as of 2020). The executive team uses a deliberate localization strategy—nearly all market heads are nationals of their respective markets—with an exception noted for Mexico, where a Colombian national was appointed.

      Governance disclosures are limited because Lalatech Holdings remains a private company. Board composition, independent director representation, and audit committee structure are not publicly disclosed. The planned Hong Kong IPO would require significantly enhanced governance disclosures. Goldman Sachs, BofA Securities, and JP Morgan serve as joint sponsors for the prospective share offering. FWD Group, Tencent, Bank of China Group Investment, Ping An Insurance, and Meituan hold minority stakes, indicating significant institutional investor relationships. Hillhouse Capital (now HongShan) and Sequoia China led the major growth rounds.
