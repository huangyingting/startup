  - id: expansion-milestones
    title: Geographic Expansion and Key Milestones
    body: |
      Lalamove's growth trajectory spans three continents and a dozen years. After its Hong Kong founding in December 2013 as EasyVan, the platform rebranded and launched in Bangkok (Thailand) in November 2014. By 2015, the company had entered Singapore and Taipei. Mainland China operations under the Huolala brand commenced in 2014, and by 2017 Huolala was present in 100 Chinese cities. Between 2016 and 2019, Lalamove entered the Philippines and Vietnam. In 2019, the company made its first move beyond Asia by launching in Brazil and Mexico. The platform subsequently expanded to Bangladesh (August 2022, market 11), Japan (August 2023 per available sources), Turkey (November 2024, first EMEA market), the UAE (May 2025, market 14), and Germany (further EU expansion under lalamove.eu).

      Product and technology milestones include the introduction of a ride-hailing service in Southeast Asia and Indonesia in 2024, reflecting a strategic pivot beyond pure freight logistics. In June 2025, Lalamove unveiled DuoLa Auto, an electric vehicle brand, and announced the DuoLa Bafang electric cargo van produced via an OEM partnership with Changan Kaicene. The vehicle features a 94 kW electric motor, up to 305 km range, and 7.8 cubic meters of cargo volume. By 2024, 40% of platform orders were fulfilled by new energy vehicles, and the company's charging network spanned 338 cities with 940,000 charging piles. Adverse milestones include mainland Chinese regulatory summonses (over a dozen in 2022-2023) related to carrier payment arrears and freight rate suppression allegations, and the IPO delay from US to HK venue due to regulatory headwinds.

      In 2022, the company issued its inaugural Sustainability Report, outlining ESG commitments. The 2026 Sustainability Report, issued in April 2026, reported that Lalamove surpassed its new energy vehicle fulfillment target ahead of schedule. The company has also undertaken community initiatives including the LalaJeep program in Quezon City (Philippines) to support jeepney drivers displaced by COVID-19, and earthquake relief efforts in Thailand in 2025.
