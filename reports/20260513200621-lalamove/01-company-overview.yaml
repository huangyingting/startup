  - id: funding-valuation
    title: Funding History and Valuation
    body: |
      Lalamove has raised approximately US$2.66 billion across 11 funding rounds from inception through 2023. The company began with a Series A disclosed in early 2015 (at which point total raised was approximately US$10 million), followed by a US$10 million bridge round in September 2015 led by MindWorks Ventures, bringing the total to roughly US$20 million. A US$30 million Series B was announced in early January 2017. In October 2017, ShunWei Capital (co-founded by Xiaomi CEO Lei Jun) led a US$100 million Series C, enabling broad Southeast Asia and mainland China expansion. In 2019, Lalamove raised US$300 million in a Series D led by Hillhouse Capital and Sequoia China, crossing the US$1 billion valuation threshold and achieving unicorn status. In November 2021, Lalatech Holdings secured a US$1.5 billion Series F round, valuing the group at approximately US$10 billion.

      The company subsequently shifted its IPO venue from the United States to Hong Kong in 2021, following China's crackdown on overseas listings that forced Didi Global to delist from NYSE. Lalamove filed its first HK listing application in March 2023. The prospectus disclosed that 260.1 million orders worth US$3.9 billion freight GTV were facilitated in H1 of the prospectus filing period, with 12.2 million monthly active merchants and 1.1 million monthly active carriers. The filing also showed 2022 revenue of approximately US$1.04 billion (nearly double 2020 levels), with a first-ever adjusted net profit of US$36.97 million in H1 2022. However, H1 2023 saw a return to a net loss of US$33 million. As of a February 2023 share repurchase, Lalamove's implied valuation stood at approximately US$9.8 billion, slightly below the Series F peak of US$10 billion. The IPO has not been completed as of the run date.
