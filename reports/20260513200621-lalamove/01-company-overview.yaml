company:
  name: Lalamove

chapter:
  number: 1
  title: Company Overview
  summary: |
    Lalamove (parent: Lalatech Holdings) is a Hong Kong-founded on-demand logistics platform that connects SMEs and individual users with professional drivers via a mobile app. Founded in December 2013 as EasyVan by Chow Shing-Yuk and rebranded in 2014, it now operates in 400+ cities across 17 markets including China (as Huolala), Southeast Asia, Latin America, and EMEA. The company raised US$1.5 billion in a 2021 Series F at a ~US$10 billion valuation, achieving total funding of ~US$2.66 billion, and generated US$1.04 billion in 2022 revenue. A Hong Kong IPO process has been under way since early 2023 but remains incomplete, and profitability has been uneven; mainland Chinese regulators have summoned the company over a dozen times regarding carrier payment and pricing complaints.

sections:
  - id: identity-and-model
    title: Company Identity and Business Model
    body: |
      Lalamove is an on-demand logistics and delivery platform headquartered in Hong Kong. It was founded in December 2013 under the name EasyVan by Chow Shing-Yuk, a former professional poker player turned entrepreneur. In November 2014, the company rebranded to Lalamove to support an international expansion strategy starting with Bangkok. In mainland China, the platform operates under the brand name Huolala (货拉拉). The parent holding company is Lalatech Holdings.

      The platform's core value proposition is connecting small and medium enterprises (SMEs) and individual users with licensed delivery drivers via a mobile application and web platform. The platform covers vehicle types from motorcycles for small parcels to large trucks for freight, with same-day, on-demand matching as the primary service. As of 2025-2026, Lalamove operates in 400+ cities across 17 markets: mainland China, Hong Kong, Thailand, Vietnam, Philippines, Malaysia, Singapore, Indonesia, Brazil, Mexico, Turkey, UAE, Germany, and Bangladesh/Japan. Its German and EU operations are branded under lalamove.eu, and it also has a US presence under lalamove.us.

      Revenue is generated through a hybrid model: carrier membership subscriptions and transaction commissions on freight orders. In China, Lalamove shifted from carrier membership fees (introduced at market entry) to adding commissions per facilitated order from 2018, reaching a monetization rate of approximately 10.3% of GTV by mid-2023. Ancillary revenue comes from value-added services such as home-moving and logistics services, vehicle sales and leasing, and enterprise subscription products. Roughly 90% of revenue derives from Chinese operations, making the company heavily dependent on its Huolala brand's performance in that market.
