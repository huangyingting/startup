summary:
  headline: >
    Lalamove is Asia's dominant on-demand intra-city logistics network with a credible investment thesis, but its Series
    F valuation (9.6x EV/Revenue) is unsupported by public comparables; entry at base-case multiples (5–7x, US$5.2–7.3B)
    requires confirmed IPO progress and resolution of the gig-worker and PIPL regulatory overhangs before a positive
    view is warranted.
