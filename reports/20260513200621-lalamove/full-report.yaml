      - number: '6.3'
        title: Retention, Expansion, and Concentration Risk
        blocks:
          - type: paragraph
            body: >
              Lalamove has not publicly disclosed any customer retention metrics—no NRR, GRR, monthly churn rate, or
              cohort retention curve has been made available in the IPO prospectus or subsequent press coverage. The
              carrier membership subscription model provides the clearest proxy for durable engagement: carriers who pay
              a recurring monthly fee for premium job access have demonstrated willingness to commit financially to the
              platform, creating a recurring revenue base with implied retention. The subscription model launch in 2020
              and its adoption across key markets (China, Singapore, Hong Kong) suggests that a meaningful share of the
              1.1 million active carriers are on subscription contracts rather than pure per-job commission.


              On the merchant side, the implicit retention driver is frequency: high-volume SME merchants (restaurants,
              traders) who rely on Lalamove for daily deliveries have limited tolerance for switching costs because they
              have already embedded the Lalamove app into operational workflows, trained staff on the booking interface,
              and (in many cases) integrated it with their e-commerce storefront. Enterprise API customers face even
              higher switching costs due to the technical integration effort required to swap platforms. However, the
              absence of published churn data means these retention arguments are qualitative, not quantitative.


              Customer concentration is a material risk dimension that is also largely undisclosed. Geographic
              concentration in China (~90% of revenue) is the most significant concentration risk: any policy change
              affecting Lalamove's China operations (regulatory crackdown, gig-worker reclassification, data law
              enforcement) would have an outsized financial impact. Individual customer concentration (top-10 or top-20
              merchant revenue share) has not been disclosed and represents a diligence gap.


              The expansion motion is platform-led: existing merchants naturally expand usage as their business volumes
              grow, and the API integration creates a land-and-expand path for enterprise customers who add more vehicle
              types, markets, or use cases over time. Lalamove's carrier subscription model creates a recurring
              relationship that is expanded when carriers upgrade from basic to premium tiers. The NEV/EV transition
              program (DuoLa Auto) could further deepen the carrier relationship by financing vehicles through the
              platform, creating a financial dependency analogous to a fleet finance product.
