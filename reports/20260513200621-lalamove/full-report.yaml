      - number: '7.5'
        title: Risk Heatmap, Mitigations, and Kill Criteria
        blocks:
          - type: paragraph
            body: >
              The risk heatmap places gig-worker reclassification (likelihood 4/5, impact 5/5, residual score 20) and
              China revenue concentration (likelihood 3/5, impact 5/5, residual score 15) as the two highest-severity
              risks. The HKEX prospectus lapse (likelihood 4/5, impact 4/5, score 16) and PIPL non-compliance
              (likelihood 3/5, impact 4/5, score 12) are the next tier. Platform outage (score 8) and driver fraud
              (score 9) are material but sub-threshold for thesis concern.


              Lalamove's primary mitigations are: (1) the carrier-partner contractual model, which explicitly avoids
              employment language and structures compensation to avoid the employer-employee relationship (disclosed in
              the prospectus); (2) the international expansion strategy targeting 30% non-China GMV; (3) data residency
              architecture for PIPL compliance (disclosed as an ongoing effort but not externally certified); and (4)
              HKEX re-filing capability with updated audited financials. DealStreetAsia (2023) noted that Lalamove's IPO
              was filed during a period when the Hang Seng Tech Index was down more than 60% from its 2021 peak; a
              base-case scenario assumes re-filing in H2 2026 if HK market conditions improve, with an alternative of a
              private Series G bridge.


              Thesis-break triggers for Lalamove are: (1) a PRC court ruling or administrative order requiring that
              delivery platform drivers be classified as employees—estimated additional cost of US$300M–US$500M
              annually; (2) a CAC enforcement action suspending Lalamove's app from Chinese app stores, removing ~90% of
              GMV overnight; and (3) a second HKEX prospectus lapse without a committed capital bridge (indicating the
              company cannot access public markets on any reasonable timeline). Key diligence asks include a legal
              opinion on driver classification, a PIPL compliance certification, a non-China GMV revenue bridge, and
              board documentation on the capital runway if the IPO is delayed a further 12 months.
