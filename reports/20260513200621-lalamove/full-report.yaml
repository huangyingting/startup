      - number: '4.2'
        title: Revenue Model, Take Rate, and Monetization
        blocks:
          - type: paragraph
            body: >
              Lalamove operates a two-sided marketplace model with two primary revenue streams: (1) a transaction
              commission taken from each order (the take rate applied to GTV), and (2) carrier membership subscription
              fees paid by registered driver-partners for platform access. The commission is the dominant revenue
              stream, representing approximately 85–90% of total revenue based on the IPO prospectus disclosures.
              Subscription fees provide a predictable recurring base and average across markets and carrier tiers.


              The blended take rate of approximately 13.3% (2022E) compares favorably to similar platform models:
              ride-hailing platforms typically retain 20–25% of gross fare, while food delivery platforms retain 15–30%.
              Lalamove's lower take rate relative to ride-hailing reflects the different economics of freight (higher
              average order values mean a lower percentage yielding sufficient absolute revenue per trip) and the
              competitive pressure from GoGoX and informal market alternatives in price-sensitive markets. In Hong Kong
              and Singapore (more mature markets), take rates are likely higher than in China or Southeast Asian markets
              where pricing competition is more intense.


              Carrier subscription fees vary by market and tier. In China, carrier memberships are typically priced at
              RMB 99–399 per month, with premium tiers unlocking priority matching and additional job visibility. In
              Southeast Asia, carrier subscription pricing differs by market. The subscription model creates dual
              benefits: it generates predictable recurring revenue (partially de-correlating revenue from order volumes)
              and it creates carrier switching costs—carriers who have paid into a subscription period are unlikely to
              migrate to alternative platforms mid-period.


              A third, smaller revenue stream is advertising and value-added services: carriers can pay to boost the
              visibility of their profile within the app's matching algorithm. This is not separately broken out in
              available prospectus materials but is likely a low-single-digit percentage of total revenue.


              Lalamove does not own or lease the freight vehicles on its platform. It is a pure marketplace/technology
              platform with asset-light capital structure. The driver-carrier fleet is entirely composed of independent
              owner-operators who bear the cost of vehicle acquisition and maintenance. This distinguishes Lalamove from
              integrated logistics providers and limits capital intensity but also limits gross margin, as the platform
              must pass through the majority of merchant payment to carriers.
            claimRefs:
