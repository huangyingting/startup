      - number: '3.2'
        title: Direct Competitors — GoGoX and Didi Freight
        blocks:
          - type: paragraph
            body: >
              GoGoX is Lalamove's closest structural competitor and the only other publicly traded pure-play intra-city
              on-demand logistics platform in Asia. Founded as GoGoVan in Hong Kong in 2013 by Steven Lam, Nick Tang,
              and Reeve Kwan, the company merged with mainland Chinese competitor 58 Suyun in late 2017—gaining coverage
              across more than 300 Chinese cities at a stroke—before rebranding as GOGOX in July 2020. In July 2021,
              GoGoX raised US$100 million in a round led by BOCOM International and Cyberport Macro Fund, with
              participation from Alibaba, Cainiao, and 58.com. In 2022 it listed on the Hong Kong Stock Exchange under
              ticker 2246, making it one of the few pure-play logistics platforms to be publicly traded in Asia. As of
              2024 GoGoX operates in six markets: Hong Kong, Singapore, mainland China, Taiwan, South Korea, and
              India—substantially fewer than Lalamove's seventeen.


              The structural similarity between the two companies creates a direct price-competitive dynamic in the
              overlap markets of Hong Kong and Singapore. Both platforms use per-booking transparent pricing, real-time
              GPS tracking, driver rating systems, and membership subscription models for carriers. However, Lalamove
              has meaningfully differentiated on three dimensions: (1) multi-vehicle breadth, supporting motorcycles
              through heavy trucks versus GoGoX's predominantly van-and-light-truck fleet; (2) enterprise API
              integrations with e-commerce platforms including Shopify and WooCommerce, which GoGoX has not rolled out
              at equivalent scale; and (3) the DuoLa Auto EV cargo van initiative announced in June 2025 in partnership
              with Changan Kaicene, which represents a vertical integration into vehicle supply without a GoGoX
              equivalent.


              Didi Freight (滴滴货运), launched in 2020 as a business unit of Didi Chuxing, is a meaningful competitor to
              Huolala in mainland China. Didi Freight operates an urban freight matching service for vans and trucks in
              major Chinese cities, directly overlapping with Huolala's core segment. Didi's competitive advantage stems
              from its massive existing driver network (inherited from its ride-hailing business) and its deep brand
              recognition among Chinese consumers and SMEs. However, Didi Freight faces significant regulatory and
              operational headwinds: Didi Chuxing's delisting from New York stock exchanges in 2021 following a Chinese
              data security investigation created strategic uncertainty, and Didi Freight's China operations have been
              subject to the same regulatory environment affecting all gig-economy freight platforms. As of the report
              date, Didi Freight has not publicly disclosed standalone revenue or profitability figures.
