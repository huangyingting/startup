  - number: 2
    title: Market Analysis
    sections:
      - number: '2.1'
        title: Market Definition and Scope
        blocks:
          - type: paragraph
            body: >
              On-demand logistics is defined as freight and delivery services matched in real time via digital
              platforms, typically with sub-hour dispatch, transparent pricing, and no advance booking requirement. The
              core addressable spend for Lalamove is intra-city, on-demand, road-based freight: van and truck hailing
              for parcel, pallet, and cargo-level shipments where speed and flexibility take precedence over cost
              optimization. Adjacent but partially included spend comprises scheduled same-day delivery,
              marketplace-fulfilled e-commerce last-mile, and API-integrated platform logistics (Shopify, WooCommerce
              integrations). Excluded from Lalamove's primary TAM are long-haul cross-border freight forwarding, ocean
              and air cargo, warehousing-as-a-service, and express courier services relying on hub-and-spoke sorting
              networks (DHL Express, FedEx, SF Express).


              The substitutes for on-demand logistics platforms are: (1) traditional phone-dispatched freight companies,
              where SMEs call brokers hours or days in advance with no real-time tracking; (2) self-operated delivery
              fleets for larger enterprises; (3) postal and courier networks for small parcels below van-capacity
              thresholds; and (4) informal driver marketplaces (social media, classified ads) prevalent in emerging
              markets. Lalamove's key differentiation from these substitutes is instant matching, transparent
              per-booking pricing, real-time GPS tracking, and a two-sided marketplace that eliminates the freight
              broker intermediary.


              The global on-demand logistics market was valued at US$198.96 billion in 2025 by Mordor Intelligence, with
              Asia-Pacific representing 42.91% of that value (approximately US$85.4 billion). Mordor Intelligence
              separately sized the Asia-Pacific third-party logistics (3PL) market at US$431.38 billion in 2025, with
              China accounting for 58.74% of that figure. These two figures are not additive; the on-demand segment is a
              sub-vertical of the broader 3PL market. The discrepancy in estimates between different research firms
              (GlobeNewswire reports a market size approaching US$357.84 billion by 2028) reflects differing inclusions:
              some estimates include all technology-enabled freight matching regardless of same-day requirement, while
              stricter definitions require sub-four-hour SLAs.
