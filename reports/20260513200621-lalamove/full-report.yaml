chapters:
  - number: 1
    title: Company Overview
    sections:
      - number: '1.1'
        title: Company Identity and Business Model
        blocks:
          - type: paragraph
            body: >
              Lalamove is an on-demand logistics and delivery platform headquartered in Hong Kong. It was founded in
              December 2013 under the name EasyVan by Chow Shing-Yuk, a former professional poker player turned
              entrepreneur. In November 2014, the company rebranded to Lalamove to support an international expansion
              strategy starting with Bangkok. In mainland China, the platform operates under the brand name Huolala
              (货拉拉). The parent holding company is Lalatech Holdings.


              The platform's core value proposition is connecting small and medium enterprises (SMEs) and individual
              users with licensed delivery drivers via a mobile application and web platform. The platform covers
              vehicle types from motorcycles for small parcels to large trucks for freight, with same-day, on-demand
              matching as the primary service. As of 2025-2026, Lalamove operates in 400+ cities across 17 markets:
              mainland China, Hong Kong, Thailand, Vietnam, Philippines, Malaysia, Singapore, Indonesia, Brazil, Mexico,
              Turkey, UAE, Germany, and Bangladesh/Japan. Its German and EU operations are branded under lalamove.eu,
              and it also has a US presence under lalamove.us.


              Revenue is generated through a hybrid model: carrier membership subscriptions and transaction commissions
              on freight orders. In China, Lalamove shifted from carrier membership fees (introduced at market entry) to
              adding commissions per facilitated order from 2018, reaching a monetization rate of approximately 10.3% of
              GTV by mid-2023. Ancillary revenue comes from value-added services such as home-moving and logistics
              services, vehicle sales and leasing, and enterprise subscription products. Roughly 90% of revenue derives
              from Chinese operations, making the company heavily dependent on its Huolala brand's performance in that
              market.
