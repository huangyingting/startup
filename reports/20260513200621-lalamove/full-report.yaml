      - number: '8.4'
        title: Comparable Valuation Analysis
        blocks:
          - type: paragraph
            body: >
              The primary public comparables for Lalamove are Full Truck Alliance (NYSE: YMM) and Grab Holdings (NASDAQ:
              GRAB). FTA is the most structurally analogous in terms of geography (China-dominant digital freight
              platform) and business model (marketplace matching with a recurring revenue layer). FTA's 2022 annual
              revenue was approximately US$596 million, and at a market cap of approximately US$3.5B in early 2023, it
              traded at roughly 5.9x EV/Revenue—compressing from 12x-plus at IPO in June 2021 as China tech multiples
              declined. By 2024, FTA's revenue grew to approximately US$1.1B and the stock stabilized at 3–5x
              EV/Revenue.


              Grab is a relevant but imperfect comparable: it operates in SEA (Lalamove's second-largest region) and has
              a logistics segment (GrabExpress), but its broader super-app revenue base and higher growth profile in a
              different regulatory environment command a premium. Grab traded at 5–7x EV/Revenue through 2023–2024 as it
              approached break-even on US$2.8B revenue (FY2024). The Grab comparable provides a ceiling for Lalamove's
              multiple if international execution accelerates.


              GoGoX (HK: 2246) is the most direct model—same-geography, same-product—but its small scale (estimated
              US$50–80M revenue) and post-listing stock decline of over 50% makes it a cautionary, not aspirational,
              comparable. The implied multiple at GoGoX's current market cap is below 1x EV/Revenue, reflecting
              loss-making operations and a thin institutional investor base. Lalamove's superior scale, revenue, and
              market position warrant a premium to GoGoX but a discount to FTA until profitability is demonstrated.


              Taking an equal-weighted average of FTA (4x) and Grab (6x) yields approximately 5x as the central
              comparable multiple, with a range of 3.5–7x. Applied to Lalamove's 2022 revenue of US$1.04B: central
              estimate US$5.2B, range US$3.6B–US$7.3B. If Lalamove's revenue has grown to US$1.2–1.5B by 2024–2025
              (plausible given disclosed 2022 trajectory), the range shifts to US$4.2B–US$10.5B—a wide interval that
              underscores the importance of obtaining current revenue data.
            claimRefs:
              - CV031
              - CV032
              - CV033
              - CV034
              - CV035
              - CV036
              - CV037
              - CV038
              - CV039
              - CV040
