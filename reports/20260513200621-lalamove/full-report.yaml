      - number: '3.5'
        title: Competitive Risk Assessment
        blocks:
          - type: paragraph
            body: >
              Lalamove faces a set of identifiable competitive risks that require ongoing monitoring. The most material
              near-term risk is Didi Freight's potential scale-up in mainland China. Didi Chuxing's driver network
              exceeds Lalamove's in China ride-hailing, and if Didi prioritises urban freight—potentially subsidised by
              its ride-hailing cash flows—it could undercut Lalamove's pricing in key Chinese cities. Historical
              precedent from ride-hailing (Didi vs. Uber China, Didi vs. Lyft in China) shows that a well-capitalised
              Didi can sustain aggressive pricing campaigns. Lalamove's response would need to lean on its
              subscription-based carrier economics and merchant loyalty rather than pure price competition.


              A second competitive risk is Grab's super-app expansion into heavier cargo in SEA. As Grab's financial
              position improves (it reported US$2.80 billion in FY2024 revenue), it has the capital to add larger
              vehicle types to GrabExpress across its eight-market SEA footprint. Were Grab to expand to van-sized
              deliveries, it would directly encroach on Lalamove's SEA segment. Grab's advantage would be its existing
              merchant and consumer relationships and its super-app cross-selling capability; Lalamove's defence would
              be freight-specific depth (vehicle management tools, multi-stop routing, enterprise API) that a
              generalised super-app logistics arm would take years to replicate.


              Third, the consolidation risk in the express parcel market (J&T's expansion, Ninja Van, and regional
              players) creates price pressure on the delivery-fee floor in e-commerce fulfilment markets, potentially
              commoditising the small-parcel segment that Lalamove competes in with its motorcycle delivery tier. The
              on-demand logistics market is growing rapidly (15.87% CAGR per Mordor Intelligence) but not immune to
              margin compression from well-funded express delivery networks.
