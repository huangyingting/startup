  - number: 6
    title: Customers
    sections:
      - number: '6.1'
        title: Customer Base Segmentation
        blocks:
          - type: paragraph
            body: >
              Lalamove's customer base segments along two distinct supply-demand roles. On the demand side, merchants
              (businesses and individuals who book deliveries) number 12.2 million monthly actives as of mid-2022. On
              the supply side, carrier-partners (independent owner-operators who fulfill deliveries) number 1.1 million
              monthly actives over the same period. These figures, disclosed in the March 2023 HKEX listing application,
              represent one of the few quantified windows into Lalamove's scale, though they are now more than three
              years old and no updated figures have been publicly released.


              The merchant cohort segments primarily by size and use case. SMEs dominate by volume: restaurants ordering
              ingredient or supply deliveries, retail merchants shipping purchased goods to customers, trading companies
              moving samples and documents, and e-commerce sellers fulfilling orders placed through Shopify or
              WooCommerce storefronts. Enterprise customers—large retailers, logistics intermediaries, and supply chain
              managers—access the platform through the REST API, typically requiring higher reliability SLAs, priority
              carrier assignment, and dedicated account management. The Shopify App Store listing for Lalamove has
              accumulated more than 3,000 installs, indicating a measurable enterprise and mid-market e-commerce
              merchant cohort operating through the integration layer.


              Geographically, the merchant base is heavily concentrated in China (operating as Huolala), which has
              historically contributed approximately 90% of Lalamove's total revenue. Southeast Asian markets
              (Singapore, Philippines, Thailand, Vietnam, Malaysia) represent the second-largest block, with Latin
              American and MENA markets in early-to-growth stages. The China concentration creates both a scale
              advantage (density-driven dispatch efficiency) and a concentration risk (regulatory, geopolitical, and
              macro-economic sensitivity).


              From the carrier-partner perspective, the customer relationship differs fundamentally from merchant
              relationships. Carrier-partners are independent owner-operators who pay Lalamove through a per-job
              commission structure or, increasingly, through a recurring monthly membership subscription. The
              subscription model locks in carrier relationships through a financial commitment and provides premium job
              access in return. This creates a two-sided customer base where carrier retention is as strategically
              important as merchant retention—carrier density drives dispatch speed, which in turn drives merchant
              satisfaction and repeat usage.
