      - number: '7.4'
        title: People and Execution Risks
        blocks:
          - type: paragraph
            body: >
              Founder-CEO Shing Chow has led Lalamove since its founding in 2013. The HKEX prospectus does not disclose
              a named successor or a CFO with external public-company experience. Chow manages key investor
              relationships, regulatory dialogues, and strategic partnerships—concentrating institutional knowledge and
              relationship capital at the founder level. This is elevated key-person risk, particularly during an IPO
              process where investor confidence is closely tied to founder credibility.


              China's 2021 MHR labor guidelines mandate minimum earnings guarantees for platform workers who depend
              primarily on a single platform for income. Non-compliance creates enforcement risk; compliance creates
              upward cost pressure on driver acquisition economics. Driver wage inflation—driven by China's general
              labor-cost inflation and platform-sector-specific minimum-earnings mandates—compresses Lalamove's take
              rate unless order volume grows sufficiently to offset unit cost increases. Reuters (2022) documented that
              delivery platforms across Asia are implementing earnings protections; Lalamove's driver economics are
              subject to these dynamics across all 12 operating markets.


              Engineering talent competition from ByteDance, Alibaba, and Meituan intensifies during the IPO delay
              period, as Lalamove's stock-option packages lose expected time value with each additional month of delay.
              Pre-IPO equity compensation is a key differentiator versus cash-paying competitors; a sustained delay
              erodes this advantage and risks attrition of key engineers responsible for the dispatch algorithm and EV
              fleet management systems.
            claimRefs:
              - CR027
