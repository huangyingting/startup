      - number: '7.2'
        title: Operational, Security, and Quality Risks
        blocks:
          - type: paragraph
            body: >
              Lalamove's operational risk profile is moderate in aggregate but includes a high-severity tail risk from
              platform outage during China's peak delivery window (typically 11am–2pm for SME shipments). A platform
              disruption during this window would directly reduce GMV and trigger customer churn. The HKEX prospectus
              acknowledges platform reliability as a risk factor but does not disclose an SLA or historical uptime data.
              Lalamove deploys cloud infrastructure redundancy, but the identity of its primary cloud provider is not
              publicly disclosed; sector norms for China-based platforms suggest Alibaba Cloud dependency, which carries
              its own concentration risk.


              Driver fraud—including GPS spoofing (faking pick-up and drop-off to collect fees without performing
              deliveries), ghost rides, and payment manipulation—is an endemic problem for on-demand logistics platforms
              globally. Lalamove states that it deploys ML-based anomaly detection; however, its fraud loss rate is not
              publicly disclosed, making independent assessment of mitigation effectiveness impossible. Comparable
              platforms (Uber, DoorDash) report fraud as 0.1–0.5% of gross bookings; without Lalamove's own disclosure,
              this metric is a diligence gap.


              Lalamove's June 2025 launch of the Duola EV cargo van (in partnership with a Chinese EV OEM) introduces
              supply-chain risk during a fleet transition period. Battery supply from LFP producers (BYD, CATL) and
              assembly capacity are outside Lalamove's control. Driver safety incidents—vehicle accidents, cargo theft,
              driver-merchant confrontations—create legal liability and reputational risk across 12 operating markets,
              each with distinct regulatory requirements for platform-operator safety obligations. Lalamove's safety
              page and Straits Times coverage confirm that in-app safety features (driver verification, live tracking,
              emergency contacts) are deployed, but insurance coverage limits and incident-reporting obligations vary by
              market.
