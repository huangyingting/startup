        - from: commission
          to: gross_revenue
          label: ~85-90% of gross revenue
        - from: subscription
          to: gross_revenue
          label: ~8-12% of gross revenue
        - from: vas
          to: gross_revenue
          label: ~2-5% of gross revenue
        - from: gross_revenue
          to: variable_costs
          label: Deducted
        - from: gross_revenue
          to: contribution_margin
          label: After variable cost deduction
        - from: contribution_margin
