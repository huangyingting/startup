companyProfile:
  summary: >
    Lalamove was founded in Hong Kong in December 2013 by Chow Shing-Yuk (formerly a professional poker player) as
    EasyVan, a van-hailing app for small businesses. It rebranded to Lalamove in November 2014 to support international
    expansion, entering mainland China in 2014 under the Huolala brand. The platform connects merchants needing same-day
    delivery with independent van, truck, and motorcycle drivers via a mobile app with real-time dispatch, route
    optimization, and a carrier subscription model. Lalamove expanded across Southeast Asia, Latin America, and EMEA
    through the 2016–2021 period. Its 2022 revenue of US$1.04 billion exceeded the US$1 billion threshold for the first
    time. The company raised US$1.5 billion at a US$10 billion valuation in November 2021 (Series F), filed for a Hong
    Kong IPO in March 2023, and saw its prospectus lapse in September 2023 without listing.
