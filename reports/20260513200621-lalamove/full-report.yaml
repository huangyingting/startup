      - number: '8.3'
        title: Bull, Base, and Bear Scenarios
        blocks:
          - type: paragraph
            body: >
              Three valuation scenarios span the range of plausible outcomes for Lalamove's IPO and operating trajectory
              from mid-2026. Each scenario is driven by distinct assumptions about IPO execution, regulatory outcome,
              international expansion pace, and market sentiment toward China-based tech platforms.


              The bull scenario assumes: IPO executes in H2 2026 at favorable market conditions; no adverse gig-worker
              reclassification ruling in China; SEA revenue grows to 20-plus percent of GMV; and the Hang Seng Tech
              Index re-rates toward 2021 levels. Under these assumptions, an 8–10x EV/Revenue multiple on the 2022
              revenue base (or a higher 2024–2025 estimated revenue of US$1.2–1.5B) implies enterprise value of
              US$9.6–10B. This essentially matches Series F and delivers minimal return at that entry price.


              The base scenario assumes: IPO re-files in 2026 with a 15–25% valuation discount to Series F to clear the
              book; China gig-worker risk remains a regulatory overhang but no enforcement; international GMV grows to
              15% of total; market assigns a 5–7x multiple reflecting the mid-point of FTA and Grab comparables. Implied
              enterprise value of US$5.2B–US$7.3B represents a 27–48% discount to Series F. For a late Series F
              investor, this is a loss; for a hypothetical entry at US$5B, the bull scenario provides ~100% upside.


              The bear scenario assumes: HKEX prospectus lapses for a second time; a PRC enforcement action or
              gig-worker ruling materially impairs platform economics; China GMV contracts; or a general emerging-market
              risk-off event. In this scenario, 2–3.5x EV/Revenue implies US$2.1B–US$3.6B, a 64–79% decline from Series
              F. The Didi delisting (NYSE: DIDI) after CAC enforcement is the most direct precedent; Didi's implied
              China-only business value fell below US$5B within 18 months of enforcement.
