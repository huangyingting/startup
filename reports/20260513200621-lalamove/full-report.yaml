      - number: '8.5'
        title: Diligence, Triggers, and Final Asks
        blocks:
          - type: paragraph
            body: >
              Thesis-break triggers for Lalamove are clearly defined and observable. The highest-severity trigger is a
              PRC court ruling or administrative order classifying platform delivery drivers as employees: this would
              add US$300–500M in annual labor costs and make the current valuation untenable. Second is a CAC
              enforcement action suspending Lalamove's app from Chinese app stores—the Didi precedent shows this can
              happen within 48 hours of a listing, with no advance notice. Third is a second HKEX prospectus lapse
              without a capital bridge: this would signal that Lalamove is unable to access public equity markets on any
              reasonable timeline and would require a significant private-market reset.


              Positive catalysts that would support the bull case include: HKEX prospectus re-filing with updated
              2024–2025 audited financials showing revenue growth above 15% YoY; an explicit CAC cybersecurity review
              clearance letter; SEA revenue crossing 20% of GMV; and China gig-worker regulatory framework settling
              without employee reclassification.


              Final diligence asks are structured around the six most material information gaps: (1) current-period
              (2024 or 2025) audited revenue and GMV by geography; (2) legal opinion on driver classification risk from
              a PRC-licensed law firm; (3) PIPL compliance certification or CAC cybersecurity review status; (4)
              non-China GMV trajectory for the three-year plan (2026–2028); (5) board-approved capital runway memo if
              IPO is delayed beyond December 2026; and (6) documentation of carrier partner agreements post-2021 MHR
              guidelines. Without these six items, a positive investment decision cannot be made at any valuation near
              Series F.
            claimRefs:
