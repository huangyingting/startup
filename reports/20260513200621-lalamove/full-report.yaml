      - number: '6.2'
        title: Adoption Trajectory and Named Customer Proof
        blocks:
          - type: paragraph
            body: >
              Lalamove's adoption trajectory is visible primarily through two disclosed metrics: the 12.2 million
              monthly active merchants and 1.1 million monthly active carrier-partners from the 2022–2023 IPO filing
              period. While Lalamove has not published a longitudinal series of these metrics, the company's 2022
              revenue of US$1.04 billion—against an H1 2022 GTV of US$3.9 billion—implies substantial transaction depth
              per active merchant, suggesting a core of high-frequency users generating a disproportionate share of
              volume. The implied average merchant GTV contribution (total 2022 GTV annualized at ~US$7.8B / 12.2M
              merchants = approximately US$640 per merchant per year) suggests a distribution heavily skewed toward
              high-frequency SME users and away from one-time users.


              Named customer proof at the individual enterprise level is not publicly available: Lalamove does not
              publish a named customer list, and no enterprise client has issued a public press release confirming a
              Lalamove contract. The most concrete customer evidence derives from two sources. First, the Shopify App
              Store listing shows 3,000-plus installs with merchant reviews confirming active production use for
              same-day delivery fulfillment across Singapore, Hong Kong, and Malaysia. Second, case studies published in
              trade press (e27, Tech in Asia) describe unnamed F&B merchants in Singapore and retail trading companies
              in Hong Kong achieving measurable reduction in delivery labor costs and fulfillment times using Lalamove.


              Enterprise API adoption is confirmed by the existence of the Shopify and WooCommerce integrations and by
              third-party coverage of Lalamove's API product. However, the number of dedicated enterprise API customers
              (outside the standard app-booking workflow) has not been disclosed. KR Asia reporting from 2024 noted that
              Lalamove has been growing its enterprise API customer base in Southeast Asia through direct sales to
              logistics-intensive industries, but quantified revenue attribution or customer count was not provided.


              The absence of named customer logos, case studies with quantified ROI, or published NPS/CSAT scores is a
              notable gap relative to B2B SaaS peers—though Lalamove's marketplace model (where merchant success is
              validated by repeat transaction volume rather than a software license renewal) means that public case
              studies are less standard in this sector.
