  - number: 3
    title: Competitors
    sections:
      - number: '3.1'
        title: Competitive Landscape Overview
        blocks:
          - type: paragraph
            body: >
              The on-demand intra-city logistics platform market in Asia is structurally concentrated around two
              dominant players: Lalamove (operating as Huolala in mainland China) and GoGoX (formerly GoGoVan, HK Stock
              Code 2246). Both companies were founded in Hong Kong in 2013 within months of each other and share a
              nearly identical marketplace model: an app-based platform matching merchants and individual shippers with
              independent owner-operators driving vans and light trucks, compensated on a per-order basis with an
              optional membership subscription. This structural similarity has shaped a classic platform duopoly in the
              on-demand intra-city segment across the key markets both platforms entered early.


              Beyond this core duopoly, the competitive landscape fragments across three additional layers. First,
              China-domestic freight platforms such as Didi Freight (launched 2020 as a Didi subsidiary) and the
              long-haul matching platform Full Truck Alliance (NYSE: YMM) overlap with Lalamove's Chinese operations but
              in different segments: Didi Freight in intra-city road freight and FTA in intercity highway trucking.
              Second, super-app logistics arms—principally Grab's GrabExpress service operating across eight Southeast
              Asian markets—compete in the last-mile parcel delivery segment in Lalamove's SEA markets but with narrower
              vehicle scope (primarily motorcycles, packages under 20 kg) compared to Lalamove's van and truck
              offerings. Third, the express parcel delivery sector, represented by J&T Express (HK: 1519, founded 2015
              in Indonesia), serves overlapping merchant customers but through a fundamentally different hub-and-spoke
              model focused on B2C e-commerce fulfillment rather than real-time marketplace matching.


              Lalamove's competitive position is strongest in its home turf of Hong Kong and in mainland China (as
              Huolala), where it claims the largest network of monthly active merchants (12.2 million) and monthly
              active carriers (1.1 million) globally. Its 400-plus city footprint across 17 markets in 2025—spanning
              China, Southeast Asia, Latin America, and EMEA—substantially exceeds any single competitor's geographic
              reach. The on-demand logistics market, valued at approximately US$198.96 billion in 2025 with a projected
              15.87% CAGR through 2031 (Mordor Intelligence), is large enough to sustain multiple platform players but
              competitive intensity is highest in China and the more mature markets of Hong Kong and Singapore.
            claimRefs:
              - CP001
              - CP002
              - CP003
              - CP013
