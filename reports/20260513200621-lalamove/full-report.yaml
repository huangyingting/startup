  - number: 7
    title: Risks
    sections:
      - number: '7.1'
        title: Regulatory and Legal Risks
        blocks:
          - type: paragraph
            body: >
              Lalamove's most material risks arise from China's regulatory environment. China's 2021 Ministry of Human
              Resources (MHR) guidelines require platform companies to document contractor status and provide social
              insurance contributions for gig workers whose income derives primarily from a single platform. Lalamove's
              prospectus (HKEX, March 2023) explicitly identifies gig-worker reclassification as a top risk factor,
              noting that if its carrier partners were reclassified as employees, operating costs would increase
              materially and the platform economics would be structurally impaired. Reuters reported in March 2023 that
              Lalamove faces a "tough route" to its Hong Kong IPO precisely because of this regulatory uncertainty.


              China's Personal Information Protection Law (PIPL, effective November 2021) requires data localization for
              personal data of Chinese residents. Lalamove's real-time driver location data, delivery route history, and
              merchant transactional data are squarely within PIPL's scope. Failure to implement compliant
              data-residency architecture exposes Lalamove to enforcement by the Cyberspace Administration of China
              (CAC). The Didi Global precedent—where Didi's apps were suspended from Chinese app stores within days of
              its NYSE listing in July 2021 following a CAC cybersecurity review—demonstrates the speed and severity of
              Chinese data enforcement actions. SAMR's algorithmic pricing scrutiny and anti-monopoly investigations of
              tech platforms (2021–2023) add a further regulatory layer, potentially requiring Lalamove to disclose its
              dispatch and surge-pricing algorithms to regulators.


              HKEX listing rules require a prospectus to be updated and re-filed if the issuer has not listed within six
              months. Lalamove's March 2023 prospectus lapsed in September 2023 without listing, constituting a concrete
              capital access failure that must be weighed by investors. Road transport licensing (Transportation Network
              Platform, or TNP, license from China's Ministry of Transport) and ongoing securities regulation compliance
              add further recurring obligations.
