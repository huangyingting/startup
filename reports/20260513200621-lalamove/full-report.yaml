      - number: '5.3'
        title: Safety, Trust, and Compliance Controls
        blocks:
          - type: paragraph
            body: >
              Lalamove's trust and safety architecture is built around three pillars: carrier vetting (background checks
              before platform onboarding), in-trip safety (real-time GPS tracking and in-app SOS/emergency feature for
              merchants), and post-trip accountability (mandatory photo proof of delivery and a mutual star-rating
              system for both carriers and merchants).


              Driver background checks are conducted as a prerequisite for carrier onboarding across all markets, though
              the depth and third-party verification methodology vary by country—a gap that could be material in markets
              without centralized national identity databases. The star-rating system creates performance-based carrier
              visibility, with lower-rated carriers receiving deprioritized job broadcasts from the Smart Dispatch
              Engine. Rating manipulation risks exist but no public incident has been documented.


              In China, Lalamove's compliance obligations are substantial: the platform must comply with the PIPL
              (personal data), MLPS Level 2+ security certification for critical infrastructure, and evolving gig-worker
              classification regulations introduced in 2021 under the Ministry of Human Resources guidelines. Lalamove
              has publicly stated compliance with China data-localization requirements, but no third-party audit of this
              compliance posture has been made publicly available, making investor verification of regulatory adherence
              impossible from disclosed sources.


              Outside China, Lalamove operates in jurisdictions with varying data privacy regimes (PDPA in Singapore and
              Thailand, PDPO in Hong Kong, LGPD in Brazil) and obtains market-specific operating licenses for commercial
              vehicle brokerage in each country. No significant regulatory penalties or enforcement actions against
              Lalamove have been reported in the public record as of May 2026.
