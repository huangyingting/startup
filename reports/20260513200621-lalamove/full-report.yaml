      - number: '7.3'
        title: Partner, Dependency, and Concentration Risks
        blocks:
          - type: paragraph
            body: >
              China revenue concentration at approximately 90% of GMV is the single most consequential structural risk
              in Lalamove's risk profile. Any China-specific shock—regulatory action, macroeconomic contraction,
              geopolitical escalation, or natural disaster—is effectively a company-wide revenue shock. This
              concentration also creates a correlated risk amplifier: Lalamove's gig-worker reclassification risk, PIPL
              enforcement risk, SAMR anti-monopoly risk, and CAC data-security risk are all China-specific, meaning
              multiple tail risks can materialize simultaneously.


              Bloomberg and WSJ reporting from March 2023 confirms that Lalamove's IPO delay constrains its capacity to
              fund the SEA, LATAM, and MENA expansion that would reduce this concentration. KR-Asia analysis indicates
              that international GMV has grown from approximately 5% (pre-2020) to approximately 10% (2022) at only
              about 2 percentage points per year, suggesting that reaching 30% international—Lalamove's stated
              medium-term target—would take 8–12 years at current pace without a step-change investment in international
              expansion.


              Secondary dependency risks include: (1) cloud vendor concentration in Alibaba Cloud for China operations;
              (2) payment rail dependency on Alipay and WeChat Pay, both subject to state oversight and potential access
              restriction; and (3) top-driver carrier-pool concentration, where a cohort of high-frequency drivers
              fulfils a disproportionate share of orders. FT and WSJ reporting indicates that IPO delay is already
              creating a competitive window for Huolala (a Lalamove substitute) and Didi Freight to consolidate China
              market share while Lalamove's capital is constrained. The ILO (2023) documents that SEA gig-economy
              regulation is evolving rapidly, with Singapore's MOM, Indonesia's Ministry of Manpower, and Thailand's
              Labour Department all developing platform-specific standards—creating a multi-jurisdiction compliance
              overhead.
