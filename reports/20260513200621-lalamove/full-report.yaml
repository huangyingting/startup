  - id: FI001
    title: Revenue model bridge
    type: flow
    layout: standard
    summary: >-
      Flow diagram mapping Lalamove's revenue generation from gross transaction value through platform commission,
      carrier subscription, and value-added services to reported gross revenue, then through variable costs to reach
      estimated contribution margin. Illustrates the asset-light marketplace economics where carriers retain the
      majority of GTV.
    data:
      nodes:
        - id: gtv
          label: Gross Transaction Value (GTV)
          note: 'H1 2022: US$3.9B; FY2022E ~US$7.8B annualised'
        - id: carrier_payout
          label: Carrier Payout (~86.7%)
          note: Paid to independent driver-partners; platform does not bear vehicle cost
        - id: commission
          label: Transaction Commission (~13.3%)
          note: Primary revenue stream; take rate ~13.3% of GTV (2022E)
        - id: subscription
          label: Carrier Subscription Fees
          note: ~8–12% of total revenue; recurring monthly/annual driver memberships
        - id: vas
          label: Value-Added Services
          note: ~2–5% of total revenue; profile ads, premium matching
        - id: gross_revenue
          label: Reported Gross Revenue
          note: 'FY2022: US$1.04B'
        - id: variable_costs
          label: Variable Platform Costs
          note: Payment processing, tech infrastructure, per-order support (~8–15% of gross revenue)
        - id: contribution_margin
          label: Contribution Margin
          note: 'Estimated 40–57% in China; 79–86% in HK/SG; company-level H1 2022 adjusted profit: US$36.97M'
        - id: fixed_costs
          label: Fixed Costs and Investments
          note: HQ, R&D, S&M, international expansion; H1 2023 returned to US$33M net loss
      edges:
        - from: gtv
          to: carrier_payout
          label: Passed through to drivers
        - from: gtv
          to: commission
