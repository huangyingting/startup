          note: 'Favorable: US$199B TAM, 15.9% CAGR; Asia on-demand logistics structural growth'
        - id: product
          label: Product / Tech Assessment
          note: 'Differentiated: AI dispatch moat; API integrations; EV fleet transition; high switching costs'
        - id: financials
          label: Financial Assessment
          note: 'Pre-profit: US$1.04B 2022 revenue; improving take rate; capital-light model'
        - id: risks
          label: Risk Assessment
          note: 'High risk: gig-worker reclassification; China ~90% GMV; HKEX lapse; PIPL'
