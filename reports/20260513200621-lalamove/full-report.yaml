      - number: '2.3'
        title: Buyer Segmentation and Adoption Path
        blocks:
          - type: paragraph
            body: >
              Lalamove's buyer universe spans four distinct segments with different workflows, budget ownership, and
              adoption triggers. The largest by transaction volume are micro and small enterprises (MSEs) and
              small-to-medium enterprises (SMEs): retail shops, food and beverage outlets, flower sellers, clinics, and
              light manufacturers that need same-day or next-day goods movement but lack a captive delivery fleet. These
              buyers typically own the logistics budget at the owner or ops-manager level, are highly price-sensitive,
              and adopt the platform after a single word-of-mouth referral or when their incumbent freight broker raises
              prices or fails a time-sensitive delivery. Average order values are low (US$10–US$40 per booking in
              Southeast Asia) but frequency can be daily or weekly for regular shippers.


              The second segment is mid-market and enterprise shippers integrating logistics into their operations via
              API. Lalamove has developed API capabilities and Shopify/WooCommerce plugins enabling automatic dispatch
              on order placement. Enterprise buyers tend to have procurement teams, require volume pricing agreements
              (carrier membership tiers), and adopt after a vendor qualification process. Their decision-makers are
              supply chain or IT managers rather than business owners. This segment generates higher GTV per customer
              but longer sales cycles and requires dedicated account management.


              The third segment is e-commerce merchants, whose growth is structurally tied to Asia-Pacific e-commerce
              expansion. McKinsey's research highlights that customer expectations for same-day delivery have risen
              sharply, with last-mile delivery representing the most expensive part of the supply chain—typically
              US$10–US$50 per delivery attempt and US$17.20 in sunk cost per failed delivery. E-commerce merchants on
              platforms like Shopify adopt Lalamove's integration to automate fulfillment; the Shopify App Store listing
              (4.5/5 stars, 18 reviews as of May 2026) indicates limited but growing enterprise penetration on this
              channel.


              The fourth segment is individual consumers requiring moving services (home moves, furniture delivery,
              single-item transport). This segment has lower repeat-purchase frequency but higher per-transaction
              values. Lalamove runs targeted campaigns for this use case in Hong Kong and Southeast Asia.
