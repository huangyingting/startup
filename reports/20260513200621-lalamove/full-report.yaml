      - number: '5.2'
        title: Technology Architecture and Smart Dispatch Engine
        blocks:
          - type: paragraph
            body: >
              Lalamove's core technology differentiator is its Smart Dispatch Engine—a proprietary AI-based
              order-to-driver matching algorithm that assigns incoming delivery requests to available carrier-partners
              in real-time. The engine incorporates carrier proximity (GPS coordinates updated continuously), vehicle
              type eligibility, carrier performance score, and current demand density to select the optimal carrier
              within seconds of booking confirmation. While the specific ML model architecture has not been publicly
              disclosed, the engine has been described in trade press as using a combination of geospatial matching and
              reinforcement-learning-based demand prediction to reduce average acceptance time and improve route
              efficiency.


              The platform is built on a mobile-first architecture with iOS and Android client applications for both
              merchants and carriers, backed by a RESTful API gateway that serves enterprise integrations and web
              portals. Cloud infrastructure details have not been publicly disclosed by Lalamove, which represents a due
              diligence gap: the identity of the cloud provider(s), SLA commitments, disaster recovery posture, and data
              residency architecture for China operations versus international markets are unknown from public sources.
              In China, Lalamove (operating as Huolala) must comply with the Personal Information Protection Law (PIPL)
              and Multi-Level Protection Scheme (MLPS) requirements, which mandate data localization for personal and
              operational data generated within China.


              Dynamic pricing is calculated algorithmically at the time of booking, incorporating distance, vehicle
              type, time of day, and surge multipliers during peak demand periods. The pricing engine uses Baidu Maps
              APIs for routing and distance calculation in China and Google Maps APIs in international markets—creating
              a geographic dependency that introduces regulatory risk if China's data infrastructure policies evolve or
              if API pricing/access changes materially.


              The enterprise API layer supports REST-based integrations with webhooks for status updates, enabling
              third-party systems (e-commerce platforms, ERP, warehouse management systems) to programmatically book,
              track, and manage deliveries. As of 2023, Lalamove had active integrations with Shopify and WooCommerce at
              scale, making it one of the few intra-city logistics platforms with a significant developer ecosystem
              presence in Asia.
