  - number: 5
    title: Product & Technology
    sections:
      - number: '5.1'
        title: Product Portfolio and Operating Model
        blocks:
          - type: paragraph
            body: >
              Lalamove's product suite is organized around four customer-facing modules: a merchant booking app (iOS,
              Android, and web), a carrier-partner app (iOS and Android), an enterprise web management portal, and a
              RESTful API layer that powers third-party integrations with Shopify, WooCommerce, and enterprise ERP
              systems. Together, these modules cover the full logistics lifecycle—price quotation, order booking,
              real-time driver dispatch, GPS tracking, proof of delivery, and post-job settlement.


              The merchant workflow is designed for speed: a merchant enters the pickup address, selects vehicle type
              (ranging from motorcycle to heavy truck), and receives an instant algorithmic price quote, typically
              within ten seconds of submission. After confirming the booking, the Smart Dispatch Engine broadcasts the
              job to eligible carrier-partners within a configurable geographic radius, and a driver typically accepts
              within one to three minutes. Real-time GPS tracking is shared with the merchant throughout the journey,
              and a photo of delivery serves as the digital proof of delivery record.


              The carrier-partner app mirrors this workflow from the driver's perspective: it surfaces available jobs,
              provides GPS-guided navigation, manages in-app earnings dashboards, and processes the subscription payment
              for carrier membership. The subscription model—launched in 2020 in key markets—allows carriers to pay a
              recurring monthly fee in exchange for priority job visibility and reduced per-job commission rates,
              improving earnings predictability and carrier retention.


              For enterprise customers, the Shopify plugin (available on the Shopify App Store) and the WooCommerce
              extension enable merchants to surface Lalamove delivery as a checkout option, auto-quote delivery cost
              based on the merchant's warehouse address and customer delivery address, and trigger booking automatically
              upon order confirmation. This integration reduces manual dispatch labor for high-volume SME merchants and
              creates platform stickiness through workflow embedding.


              Lalamove's multi-vehicle coverage—motorcycles, sedans, mini-vans, vans, 5.5-ton trucks, and open-top
              container trucks—differentiates it from pure last-mile parcel platforms (which are typically
              motorcycle-only for B2C parcels) and from highway freight platforms such as Full Truck Alliance (which
              address intercity load matching). The combination of vehicle depth, API integration, and real-time
              dispatch creates a product that addresses same-day B2B logistics across SME, SME-e-commerce, and
              enterprise segments simultaneously.
