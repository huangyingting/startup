      - number: '4.3'
        title: Unit Economics and Path to Profitability
        blocks:
          - type: paragraph
            body: >
              Based on available disclosures, Lalamove's per-order economics can be estimated as follows. With H1 2022
              GTV of approximately US$3.9 billion and implied monthly active orders across 12.2 million monthly active
              merchants (MAM), the average order value (AOV) is likely in the range of US$15–25 per trip in China and
              US$25–40 in Southeast Asia and Hong Kong, weighted by geography. The platform retains approximately 13.3%
              of AOV as gross revenue, implying US$2–3.30 per order in gross revenue. Against this, variable costs
              include payment processing, tech infrastructure, driver support, and per-order compliance costs.


              Lalamove's contribution margin trajectory improved materially through 2021–2022 as the company increased
              its take rate and reduced driver subsidy spending. The H1 2022 adjusted net profit of US$36.97 million
              suggests the China business may have reached contribution-positive economics on a per-order basis, at
              least in mature markets. However, the return to loss in H1 2023 indicates that the company continues to
              invest in growth at the expense of short-term profitability.


              The path to sustained profitability depends on three levers: (1) increasing the take rate in China by
              reducing commission competition as carrier density grows; (2) achieving contribution-positive economics in
              international markets (currently likely loss-making given lower order density and higher customer
              acquisition costs per market); and (3) growing carrier subscription revenue as a de-correlated income
              stream. The DuoLa Auto EV initiative (June 2025) introduces a new potential revenue stream (vehicle
              leasing/financing to carriers who adopt the DuoLa Bafang microvan) but at the cost of increased capital
              deployment.


              Gross margin for a pure-play marketplace model is structurally different from an integrated carrier:
              Lalamove's gross margin should be interpreted as net revenue minus variable platform costs (payment,
              matching infrastructure, per-order support), not including carrier payouts which flow directly to drivers.
              On this basis, marketplace platforms of Lalamove's maturity typically achieve 40–60% contribution margins
              in mature markets, but 10–25% in markets still in investment mode.
            claimRefs:
              - CI016
              - CI017
              - CI018
              - CI019
              - CI020
