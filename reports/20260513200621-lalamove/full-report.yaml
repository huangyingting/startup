        - 'Didi-analog signal: app disappears from App Store / Android; CAC press release'
        - Immediate stop-loss; China GMV (~90% of total) at risk within 48h
      - - Second HKEX prospectus lapse without bridge
        - Prospectus expires (6-month HKEX rule) without relisting or Series G committed
        - 'HKEX prospectus search: lapse date not followed by new prospectus filing'
        - Renegotiate valuation at 2-3x or exit to secondary at discount
      - - China GMV contraction >20% YoY
        - China GMV falls >20% year-on-year for two consecutive quarters
        - Lalamove newsroom; trade press; analyst estimates; carrier app-rating trends
        - Trigger fundamental review; reduce position or add short-hedge
  - id: TV006
    title: Final Diligence Asks Table
    notes: >-
      Diligence asks are ordered by priority (Critical, High, Medium). Critical asks are required before any positive
      investment decision. High-priority asks are required before Series G or IPO participation. Medium asks should be
      completed within 90 days of investment.
    enumerationScope:
      coverage: partial
      basis: >-
        Diligence ask list is based on identified evidence gaps across chapters 1–7. Additional items may emerge from
        management presentations and due-diligence process that are not anticipatable from public sources.
    claimRefs:
      - CV036
      - CV037
      - CV039
      - CV040
    columns:
      - Area
      - Specific Ask
      - Rationale
      - Priority
    rows:
      - - Current-period financials
        - Audited revenue, GMV, and take-rate data by geography for FY2024 or FY2025
        - >-
          2022 is the most recent disclosed period; 3-year-old revenue data is insufficient for a US$10B valuation
          decision
        - Critical
      - - Driver classification legal risk
        - PRC-licensed legal opinion on driver classification risk under the 2021 MHR guidelines
        - Estimated US$300-500M annual exposure; legal opinion quality determines residual risk severity
        - Critical
      - - PIPL compliance status
        - CAC cybersecurity review outcome or waiver letter; PIPL compliance certification
        - Didi precedent shows CAC can act within 48h of listing; no certification means binary execution risk
        - Critical
      - - Non-China GMV trajectory
        - 'Segment revenue bridge: China vs. SEA vs. LATAM vs. MENA for FY2023-2025A and 3-year target'
        - China concentration (~90%) is the dominant risk; verifying diversification trajectory is essential
        - High
      - - Capital runway documentation
        - Board memo on funding runway if HKEX IPO is delayed beyond December 2026; bridge options
        - Series F capital was raised in November 2021; 5-year runway at burn rate is a key input
        - High
      - - Carrier partner agreements
        - Sample carrier partner agreements post-2021 MHR guidelines; social insurance compliance documentation
        - Carrier agreements structure the legal argument for contractor status; must align with MHR guidance
        - Medium
