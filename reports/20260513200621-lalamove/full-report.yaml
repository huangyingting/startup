      - number: '4.5'
        title: Financial Risks, Data Gaps, and Diligence Priorities
        blocks:
          - type: paragraph
            body: >
              The most significant financial risk in Lalamove's profile is its extreme China revenue concentration (~90%
              of revenue from China operations as Huolala). China-specific risks that could materially affect revenue
              include: (1) regulatory pricing controls or algorithm restrictions imposed by Chinese transport
              authorities; (2) gig-worker classification reform requiring carrier employment rather than contractor
              status; (3) platform economy tax enforcement; and (4) macroeconomic demand deceleration in China's SME
              sector. The company received over a dozen regulatory summons from Chinese authorities in 2022–2023,
              indicating active regulatory scrutiny. Each episode of regulatory uncertainty creates order volume
              volatility, as carriers and merchants may reduce platform activity during periods of uncertainty.


              A second material financial risk is the protracted IPO delay. Without public market access, Lalamove
              cannot tap equity capital markets to fund the next phase of international expansion. If international
              markets (LATAM, EMEA, additional Southeast Asian penetration) require sustained investment before reaching
              contribution-positive economics, the company must either constrain investment or seek additional private
              financing at potentially less favorable terms than the Series F. The H1 2023 net loss of US$33 million
              suggests the aggregate business was still burning cash at the time of the last disclosed results, and no
              H2 2023 or 2024 data is publicly available.


              Critical data gaps in the financial assessment include: full-year 2023 and 2024 revenue and profitability;
              market-by-market revenue and contribution margin breakdown; carrier subscription retention rates and
              average revenue per carrier per month; and the financial terms and expected volume of the DuoLa Auto
              vehicle financing program. Without these figures, precise valuation modeling is not possible and financial
              assessment must rely on disclosed H1 2022 metrics (which may be stale by 2026 standards) and qualitative
              analysis of the business model.
