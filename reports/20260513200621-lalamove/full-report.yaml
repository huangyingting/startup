            title: Scale and Platform Lock-In
            body: >
              Lalamove's dual-sided network of 12.2 million monthly active merchants and 1.1 million monthly active
              carriers in 400+ cities creates a powerful liquidity moat. Its 44% market share in Chinese closed-loop
              freight GTV (per Frost & Sullivan cited in prospectus) and >90% instant-delivery market share in Malaysia
              illustrate deep regional entrenchment that is difficult for new entrants to replicate.
