  - number: 4
    title: Financials
    sections:
      - number: '4.1'
        title: Revenue, GTV, and Growth Trajectory
        blocks:
          - type: paragraph
            body: >
              Lalamove's revenue is derived from the gross transaction value (GTV) it processes on its platform—the
              total amount merchants pay for deliveries. The platform retains a commission (take rate) from each
              transaction, alongside subscription fees paid by registered carrier-partners. Based on its IPO prospectus
              disclosures, Lalamove reported H1 2022 GTV of approximately US$3.9 billion, implying a full-year 2022 GTV
              annualized run-rate of US$7.8 billion. Against 2022 reported revenue of US$1.04 billion, this yields an
              implied take rate of approximately 13.3% for the year—consistent with a mature marketplace model where
              platform commission is the dominant revenue driver.


              The 2022 revenue of US$1.04 billion represents a substantial year-on-year acceleration from an estimated
              2021 revenue of US$520–600 million (approximately a doubling). This growth was driven by (1) post-COVID
              recovery in delivery volumes in China and Southeast Asia, (2) expansion of carrier membership
              subscriptions, and (3) the addition of enterprise API customers through Shopify and WooCommerce
              integrations. China operations (as Huolala) have consistently contributed approximately 90% of total
              revenue, reflecting the dominant scale of Lalamove's Chinese business relative to its international
              footprint.


              H1 2022 marked a critical inflection point: the company reported an adjusted net profit of US$36.97
              million, the first time Lalamove had achieved positive earnings in any six-month period. This was
              attributed to operating leverage in China (improved take rate and carrier subscription density) and cost
              discipline following the COVID-era driver incentive spending. However, H1 2023 returned to a net loss of
              US$33 million, reflecting increased spending on international market development, regulatory compliance
              infrastructure in China, and the NEV/EV transition investment. No full-year 2023 or 2024 results have been
              publicly disclosed, as the IPO remains pending. The absence of audited financial data beyond the IPO
              prospectus period (H1 2023) is a material gap in the financial assessment.


              Key financial uncertainty: Lalamove's 2021 Series F round was completed at a US$10 billion valuation. The
              February 2023 IPO target of approximately US$9.8 billion implied valuation (based on US$500M raise at
              market pricing) represents a modest discount to the Series F, but post-2023 market conditions may have
              further pressured the achievable IPO valuation. The protracted delay in IPO completion (now exceeding 26
              months from first filing) raises questions about whether the company has maintained its financial
              performance at Series F-implied multiple levels.
            claimRefs:
              - CI001
              - CI002
              - CI003
              - CI004
              - CI005
              - CI006
              - CI007
              - CI008
