      - number: '8.2'
        title: Valuation Context and Entry Discipline
        blocks:
          - type: paragraph
            body: >
              Lalamove's valuation history shows a consistent upward arc through its seven funding rounds—from a US$300
              million valuation at its Series C (TechCrunch, April 2019) to US$10 billion at Series F (November 2021).
              The Series F was led by a consortium including Sequoia Capital China, Tiger Global, and LaSalle Investment
              Management; Bloomberg, CNBC, and BusinessWire contemporaneously confirmed the US$1.5 billion raise and
              US$10 billion post-money valuation. This implies an EV/Revenue multiple of approximately 9.6x on the 2022
              revenue of US$1.04 billion—near the top of the range for comparable on-demand logistics platforms in late
              2021 peak market conditions.


              Post-Series F market conditions have compressed peer multiples significantly. FTA (NYSE: YMM) traded at
              3–5x EV/Revenue in 2022–2023 as the Chinese tech valuation multiple compressed following the Didi
              enforcement and broader US-China tech decoupling. Grab (NASDAQ: GRAB) traded at 5–7x EV/Revenue in
              2023–2024 as it approached profitability on US$2.80B revenue. Entry discipline for Lalamove therefore
              requires a discount to Series F: base case at 5–7x (US$5.2B–US$7.3B) and a margin of safety threshold of
              approximately US$4.5B (4.3x) to compensate for illiquidity, IPO uncertainty, and the gig-worker regulatory
              option value.


              The valuation sensitivity bar chart shows how enterprise value scales with the applied revenue multiple
              against the US$1.04B 2022 revenue base: each 1x improvement in multiple adds approximately US$1.04B to
              implied EV. At the Series F anchor of 9.6x, implied EV is approximately US$10B. At the bear-case floor of
              2x, it falls to US$2.1B. Investors entering at Series F price hold a substantially out-of-the-money option
              on the bull case, with limited downside cushion. The range figure illustrates the full bull/base/bear
              spread in comparable-weighted enterprise value estimates.
