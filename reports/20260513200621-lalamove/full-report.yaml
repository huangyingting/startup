  - number: 8
    title: Valuation
    sections:
      - number: '8.1'
        title: Investment Thesis and Recommendation
        blocks:
          - type: paragraph
            body: >
              Lalamove's investment thesis is anchored by its dominant network position in Asia's on-demand intra-city
              logistics market—a large and structurally growing market where network density, carrier switching costs,
              and enterprise API integrations create durable competitive advantages. With 12.2 million monthly active
              merchants, 1.1 million active carrier partners, and 400-plus city coverage across 17 markets, Lalamove
              operates the deepest double-sided network in its segment. Its 2022 revenue of US$1.04 billion (per HKEX
              prospectus, a high-confidence primary source) anchors valuation analysis; Bloomberg, WSJ, Reuters, and
              SCMP confirmed the US$10 billion Series F valuation (November 2021) and the approximately US$9.8 billion
              IPO target (February–March 2023).


              The anti-thesis is material. China gig-worker reclassification risk—estimated at US$300M–US$500M annually
              in incremental labor costs—could be existential for a pre-profit company. China revenue concentration
              (~90% of GMV) means any China-specific shock (regulatory, macroeconomic, geopolitical) is a company-wide
              shock. The 26-month-plus IPO delay since the March 2023 HKEX filing signals structural demand or
              regulatory concerns beyond market timing, as GoGoX's post-listing decline of over 50% illustrates the
              adverse secondary market for HK logistics platform IPOs.


              The recommendation is conditional monitor: the investment thesis is credible and the TAM is large (US$199B
              global on-demand logistics, Mordor Intelligence), but entry at Series F valuation (US$10B, 9.6x
              EV/Revenue) demands a risk premium that is not adequately compensated without confirmed IPO progress or
              international revenue acceleration. A base-case valuation of US$5.2B–US$7.3B (5–7x EV/Revenue) represents
              fair-value range; entry at or below base case is required before the gig-worker and IPO risks crystallize
              one way or another. Thesis-break triggers are clearly defined; the investment requires active monitoring
              of CAC enforcement signals, PRC labor-ruling developments, and HKEX prospectus renewal timing.
            claimRefs:
