      - number: '5.4'
        title: EV Transition, DuoLa Auto, and Product Roadmap
        blocks:
          - type: paragraph
            body: >
              Lalamove's most strategically significant product initiative since its enterprise API launch is the DuoLa
              Auto program: an EV cargo van designed in partnership with Changan Kaicene (a subsidiary of state-owned
              Changan Automobile Group) and unveiled in June 2025. DuoLa Auto represents a potential vertical
              integration play—moving Lalamove from a pure software marketplace model into co-designing, potentially
              distributing, and financing the physical assets that carrier-partners use to fulfill jobs on its platform.
              As of the unveiling date, production volumes, pricing to carriers, financing terms, and deployment
              timeline had not been disclosed.


              The EV transition context is critical: by 2024, 40% of orders on Lalamove's China platform (operated as
              Huolala) were fulfilled by new-energy vehicles, supported by carrier access to more than 940,000 EV
              charging piles. This milestone is the result of both Chinese regulatory pressure (the Ministry of Ecology
              and Environment's targets for commercial vehicle electrification) and Lalamove's deliberate carrier
              incentive programs that promoted NEV adoption. The 40% NEV share positions Huolala ahead of most competing
              platforms in China for sustainability compliance.


              The product roadmap as disclosed in investor communications and press coverage includes multi-stop route
              optimization (enabling merchants to book a single carrier for multiple sequential deliveries), expanded
              enterprise API capabilities (additional webhook event types, batch booking), and continued geographic
              expansion in LATAM and MENA markets. However, specific feature release dates, engineering headcount behind
              these initiatives, and annual R&D budget have not been publicly disclosed, limiting roadmap confidence
              assessment.


              The combination of the Smart Dispatch AI, the carrier subscription model, the enterprise API ecosystem,
              and the DuoLa Auto EV initiative positions Lalamove as one of the most technology-integrated intra-city
              logistics platforms globally—though the lack of public technical disclosure and the China concentration
              risk (both regulatory and geopolitical) remain the primary technology risk factors for investors.
