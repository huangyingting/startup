  - id: FV001
    title: Recommendation Logic
    type: flow
    layout: standard
    summary: >-
      End-to-end logic chain from market, product, financial, and risk assessments to the investment recommendation.
      Each upstream node feeds into the valuation anchor, which drives the final recommendation.
    data:
      nodes:
        - id: market
