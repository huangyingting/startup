      - number: '3.3'
        title: Adjacent Competitors — FTA, Grab, and J&T Express
        blocks:
          - type: paragraph
            body: >
              Full Truck Alliance (FTA, NYSE: YMM), known in China as Manbang Group (满帮集团), is the dominant digital
              platform for long-haul intercity highway freight matching in China. FTA listed on the New York Stock
              Exchange in June 2021. Unlike Lalamove/Huolala, which focuses on same-day intra-city delivery within
              metropolitan areas, FTA connects truck owners with shippers for cross-city highway freight—a fundamentally
              different use case with different economics (multi-day transit, load-optimisation pricing, contract
              freight). FTA does not operate in Lalamove's core intra-city segment, and Lalamove does not compete in
              FTA's highway freight segment. However, both platforms vie for Chinese truck drivers and logistics SMEs as
              customers, creating an indirect competitive overlay. FTA's NYSE listing and US-based institutional
              investor base expose it to geopolitical risk that Lalamove's Hong Kong IPO track avoids. FTA's revenue
              model (transaction fees on freight matches) is also distinct from Lalamove's membership-plus-commission
              structure.


              Grab Holdings (NASDAQ: GRAB), Southeast Asia's largest super-app by revenue (US$2.80 billion in FY2024),
              operates GrabExpress as its on-demand parcel delivery service across eight SEA markets including
              Singapore, Malaysia, Indonesia, Thailand, Vietnam, the Philippines, Cambodia, and Myanmar. GrabExpress
              launched in November 2015 and uses motorbike couriers for door-to-door deliveries within cities, targeting
              packages under 20 kg. This is structurally complementary to, rather than directly competitive with,
              Lalamove in most cases: a merchant needing to send a parcel (single package, motorbike-compatible) might
              use GrabExpress, while one needing to ship a van-load of goods uses Lalamove. However, as Grab expands its
              logistics capabilities and potentially adds larger vehicle types, the overlap with Lalamove's van and
              light-truck segment will increase. Grab's super-app distribution advantage—its existing user base of tens
              of millions of consumers and merchants across SEA—gives it a low-cost acquisition channel for logistics
              customers that Lalamove must counter with superior product and pricing.


              J&T Express (HK: 1519), founded in 2015 in Jakarta and listed on the Hong Kong Stock Exchange in October
              2023, is an international parcel express company operating across 13 countries. J&T's
              model—franchise-style sorting centres, employed delivery personnel, hub-and-spoke routing optimised for
              e-commerce fulfillment—is fundamentally different from Lalamove's real-time marketplace. J&T's investor
              base (Hillhouse, Sequoia China, Tencent) overlaps with Lalamove's, but the companies target different
              logistics occasions. In markets like Singapore and Malaysia, J&T competes for B2C e-commerce delivery
              volume that some of Lalamove's merchant customers also ship. J&T's valuation reached US$20 billion in
              November 2021 (before declining post-IPO), suggesting that e-commerce fulfilment platforms can achieve
              Lalamove-comparable scale.
