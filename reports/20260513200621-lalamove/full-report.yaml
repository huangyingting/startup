  productSummary: >
    Lalamove's core product is an on-demand logistics matching platform: merchants post delivery orders via the
    iOS/Android app or API; the AI-powered dispatch system matches them with the nearest available carrier partner; the
    carrier completes the delivery and receives payment via the platform. Carrier partners pay a monthly or annual
    subscription fee to access orders; commission revenue (per-order percentage) was added in 2018 and grew to 28% of
    2022 revenue. Enterprise customers access the platform via an API integration layer (Shopify, WooCommerce, Lazada,
    Grab integration). In China, an EV fleet transition initiative is underway.
  customerFocus: >
    Primary customers are SME merchants (food and beverage, retail, e-commerce fulfillment) needing same-day or
    scheduled intra-city delivery. Enterprise customers include large e-commerce platforms, retail chains, and
    third-party logistics companies accessing the platform via API. Approximately 90% of GMV is China-based (Huolala
    brand); remaining GMV is in SEA (Singapore, Malaysia, Thailand, Philippines, Vietnam), LATAM (Mexico, Brazil), and
    MENA.
  businessModel: >
    Dual revenue streams: (1) carrier subscription fees — monthly or annual recurring fees paid by 1.1 million active
    carriers for access to the merchant order flow; (2) per-order commissions charged to merchants on each completed
    transaction. The subscription model creates recurring revenue and high carrier switching costs; the commission layer
    captures upside from volume growth. The asset-light model (no owned vehicles) keeps capex minimal and gross margins
    structurally above asset-heavy logistics peers.
  stage: Pre-IPO (Series F; HKEX prospectus lapsed September 2023)
