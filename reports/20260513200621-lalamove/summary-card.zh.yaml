summary:
  headline: >
    Lalamove 是亚洲领先的按需同城物流网络，投资逻辑成立；但 Series F 估值（9.6x EV/Revenue）缺乏公开可比公司支撑。若要在基准倍数（5–7x，US$5.2–7.3B）入场，需要先确认 IPO
    进展，并解除零工劳动者与 PIPL 监管悬顶，才足以转为正面观点。
