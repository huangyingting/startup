  shortDescription: >
    Lalamove (Lalatech Holdings) is Asia's leading on-demand intra-city logistics platform, operating in 400-plus cities
    across 17 markets under the Lalamove and Huolala brands. Founded in 2013, it connects over 12 million monthly
    merchant customers with 1.1 million independent carrier partners. Its 2022 revenue was US$1.04 billion. It raised
    US$1.5 billion at a US$10 billion post-money valuation in November 2021 (Series F), and filed for a Hong Kong Stock
    Exchange IPO in March 2023, which lapsed in September 2023 without listing.
