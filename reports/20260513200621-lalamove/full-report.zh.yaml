      - number: '8.5'
        title: 尽调、触发条件与最终问题
        blocks:
          - type: paragraph
            body: >
              Lalamove 的投资逻辑失效触发条件定义清晰且可观察。严重度最高的触发条件，是中国法院裁定或行政命令把平台配送司机归类为雇员：这会每年增加 US$300–500M 人工成本，使当前估值无法成立。第二是 CAC
              执法行动导致 Lalamove app 从中国应用商店下架——Didi 先例显示，这可能在上市后 48 小时内、没有提前通知的情况下发生。第三是港交所招股书第二次失效且没有资本过桥：这将表明 Lalamove
              无法在任何合理时间表内进入公开股权市场，并需要在私募市场大幅重置估值。


              支撑乐观情景的正向催化剂包括：重新向港交所提交招股书，并附带更新的 2024–2025 审计财务数据，显示收入同比增长超过 15%；明确的 CAC 网络安全审查通过函；SEA 收入超过 GMV 的
              20%；以及中国零工劳动者监管框架落定且不触发雇员重新分类。


              最终尽调问题围绕六个最重要的信息缺口展开：（1）当前期间（2024 或 2025）按地域拆分的审计收入和 GMV；（2）PRC 执业律所出具的司机分类风险法律意见；（3）PIPL 合规认证或 CAC
              网络安全审查状态；（4）2026–2028 三年计划中的非中国 GMV 轨迹；（5）若 IPO 延迟至 2026 年 12 月以后，董事会批准的资本跑道备忘录；（6）2021 年 MHR
              指南之后的承运伙伴协议文件。没有这六项材料，就不能在任何接近 Series F 的估值上做出正向投资决定。
