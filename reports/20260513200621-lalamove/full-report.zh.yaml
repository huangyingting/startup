      - number: '1.3'
        title: 融资历史与估值
        blocks:
          - type: paragraph
            body: >
              从创立到 2023，Lalamove 在 11 轮融资中累计融资约 US$2.66 billion。公司早期在 2015 年初披露 Series A（当时累计融资约 US$10 million），随后在 2015
              年 9 月完成由 MindWorks Ventures 领投的 US$10 million 过桥轮，使累计融资达到约 US$20 million。2017 年 1 月初，公司宣布 US$30 million
              Series B。2017 年 10 月，由 Xiaomi CEO Lei Jun 联合创办的 ShunWei Capital 领投 US$100 million Series
              C，支撑公司在东南亚和中国内地大规模扩张。2019 年，Lalamove 完成由 Hillhouse Capital 和 Sequoia China 领投的 US$300 million Series
              D，估值跨过 US$1 billion 门槛，成为独角兽。2021 年 11 月，Lalatech Holdings 完成 US$1.5 billion Series F 轮，集团估值约 US$10
              billion。


              2021 年，在中国打击境外上市并迫使 Didi Global 从 NYSE 退市之后，公司将 IPO 地点从美国转向香港。Lalamove 于 2023 年 3 月首次提交香港上市申请。招股书披露，申请期 H1
              内平台促成 260.1 million 笔订单、货运 GTV 为 US$3.9 billion，月活跃商户 12.2 million、月活跃承运方 1.1 million。文件还显示，2022 收入约
              US$1.04 billion（接近 2020 水平的两倍），并在 H1 2022 首次实现 US$36.97 million 调整后净利润。但 H1 2023 又转回 US$33 million 净亏损。截至
              2023 年 2 月的一次股份回购，Lalamove 隐含估值约 US$9.8 billion，略低于 Series F 峰值 US$10 billion。截至本次报告日期，IPO 尚未完成。
