      - number: '3.3'
        title: 相邻竞争对手——FTA、Grab 与 J&T Express
        blocks:
          - type: paragraph
            body: >
              Full Truck Alliance（FTA，NYSE: YMM）在中国称为 Manbang Group（满帮集团），是中国长途城际公路货运撮合的主导数字平台。FTA 于 2021 年 6
              月在纽约证券交易所上市。不同于聚焦都市圈内当日同城配送的 Lalamove/Huolala，FTA 连接卡车车主与跨城公路货运发货方，是根本不同的场景，经济性也不同（多日运输、装载优化定价、合同货运）。FTA
              不运营 Lalamove 的核心同城分部，Lalamove 也不参与 FTA 的公路货运分部。但双方都会争夺中国卡车司机和物流 SME 客户，形成间接竞争叠加。FTA 的 NYSE
              上市身份和美国机构投资人基础，使其暴露于 Lalamove 香港 IPO 路径可避免的地缘政治风险。FTA 的收入模式（货运撮合交易费）也不同于 Lalamove 的会员费加佣金结构。


              Grab Holdings（NASDAQ: GRAB）是东南亚按收入计最大的超级应用（FY2024 收入 US$2.80 billion），在新加坡、马来西亚、印度尼西亚、泰国、越南、菲律宾、柬埔寨和缅甸等八个
              SEA 市场运营按需包裹配送服务 GrabExpress。GrabExpress 于 2015 年 11 月推出，用摩托车骑手完成城市内门到门配送，目标包裹在 20 kg 以下。在多数情况下，它与
              Lalamove 更像互补而非直接竞争：商户要寄单个包裹（摩托车可承载）时可能用 GrabExpress；要发一车货时则用 Lalamove。但随着 Grab 扩展物流能力并可能增加更大车型，它与
              Lalamove 面包车和轻卡分部的重叠会增加。Grab 的超级应用分发优势——其在 SEA 拥有数千万消费者和商户用户——为物流客户提供低成本获客通道，Lalamove 需要用更好的产品和定价来对冲。


              J&T Express（HK: 1519）于 2015 年创立于雅加达，并在 2023 年 10 月于香港交易所上市，是一家覆盖 13 个国家的国际包裹快递公司。J&T
              的模式——加盟式分拣中心、雇佣配送人员、为电商履约优化的轴辐式路由——与 Lalamove 的实时撮合平台根本不同。J&T 的投资人基础（Hillhouse、Sequoia China、Tencent）与
              Lalamove 有重叠，但两家公司瞄准不同物流场景。在新加坡和马来西亚等市场，J&T 会争夺 B2C 电商配送量，而部分 Lalamove 商户客户也会发这类货。J&T 估值在 2021 年 11 月达到
              US$20 billion（IPO 后下滑），说明电商履约平台也能达到与 Lalamove 相当的规模。
