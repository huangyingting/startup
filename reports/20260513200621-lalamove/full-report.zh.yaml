      - number: '3.5'
        title: 竞争风险评估
        blocks:
          - type: paragraph
            body: >
              Lalamove 面临一组可识别的竞争风险，需要持续跟踪。最重要的近期风险，是 Didi Freight 可能在中国内地放大规模。Didi Chuxing 在中国网约车领域的司机网络超过 Lalamove；如果
              Didi 优先发展城市货运，并可能用网约车现金流补贴，就可能在中国重点城市压低 Lalamove 价格。网约车历史先例（Didi vs. Uber China、Didi vs. Lyft in
              China）显示，资本充足的 Didi 能承受激进定价战。Lalamove 的回应需要依靠其基于订阅的承运方经济性和商户忠诚度，而不是纯粹价格竞争。


              第二个竞争风险，是 Grab 的超级应用向 SEA 更重货物扩张。随着 Grab 财务状况改善（FY2024 收入 US$2.80 billion），它有资本在八个 SEA 市场的 GrabExpress
              中加入更大车型。如果 Grab 扩张到面包车尺寸配送，将直接侵入 Lalamove 的 SEA 分部。Grab 的优势在于既有商户和消费者关系，以及超级应用交叉销售能力；Lalamove
              的防御则是货运专用深度（车辆管理工具、多点路线规划、企业 API），这些能力需要一个通用超级应用物流部门多年才能复制。


              第三，快递包裹市场的整合风险（J&T 扩张、Ninja Van 及区域玩家）会压低电商履约市场的配送费底部，可能把 Lalamove 以摩托车配送层参与竞争的小包裹分部商品化。按需物流市场增长很快（Mordor
              Intelligence 数据显示 CAGR 为 15.87%），但并不能免疫于资金充足的快递网络带来的利润率压缩。
