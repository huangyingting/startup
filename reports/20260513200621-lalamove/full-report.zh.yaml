      - number: '7.5'
        title: 风险热力图、缓释措施与否决条件
        blocks:
          - type: paragraph
            body: >
              风险热力图把零工劳动者重新分类（可能性 4/5、影响 5/5、剩余风险得分 20）和中国收入集中（可能性 3/5、影响 5/5、剩余风险得分 15）列为严重度最高的两项风险。港交所招股书失效（可能性 4/5、影响
              4/5、得分 16）和 PIPL 不合规（可能性 3/5、影响 4/5、得分 12）位于下一档。平台宕机（得分 8）和司机欺诈（得分 9）同样重要，但未达到影响投资逻辑的阈值。


              Lalamove 的主要缓释措施包括：（1）承运伙伴合同模式，明确避免雇佣用语，并设计薪酬结构以规避雇主-雇员关系（招股书披露）；（2）以非中国 GMV 达到 30% 为目标的国际扩张策略；（3）用于 PIPL
              合规的数据驻留架构（披露为持续推进，但未获外部认证）；（4）用更新审计财务数据重新向港交所提交的能力。DealStreetAsia（2023）指出，Lalamove 提交 IPO 时，Hang Seng Tech
              Index 已较 2021 年高点下跌超过 60%；基准情景假设，如果香港市场条件改善，公司将在 H2 2026 重新提交申请，替代路径是私募 Series G 过桥轮。


              Lalamove 的投资逻辑失效触发条件包括：（1）中国法院裁定或行政命令要求配送平台司机被归类为雇员——估计每年新增成本 US$300M–US$500M；（2）CAC 执法行动导致 Lalamove app
              从中国应用商店下架，一夜之间移除约 90% GMV；（3）没有承诺资本过桥的情况下，港交所招股书第二次失效（意味着公司无法在任何合理时间表内进入公开市场）。关键尽调要求包括：司机分类法律意见、PIPL
              合规认证、非中国 GMV 收入桥接，以及若 IPO 再延迟 12 个月时董事会关于现金跑道的文件。
