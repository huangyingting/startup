      - number: '5.3'
        title: 安全、信任与合规控制
        blocks:
          - type: paragraph
            body: >
              Lalamove 的信任与安全架构围绕三根支柱搭建：承运伙伴审查（入驻平台前做背景检查）、行程中安全（实时 GPS 跟踪，以及商户端 app 内 SOS /
              紧急功能）、行程后问责（强制送达照片证明，以及承运伙伴与商户互评星级体系）。


              各市场都把司机背景检查作为承运伙伴入驻前提，但审查深度和第三方核验方法因国家而异——在没有集中式全国身份数据库的市场，这可能成为重大缺口。星级体系决定承运伙伴的任务可见性，评分较低的承运伙伴会在 Smart
              Dispatch Engine 的任务广播中被降权。评分操纵风险存在，但公开资料没有记录相关事件。


              在中国，Lalamove 的合规义务很重：平台必须遵守 PIPL（个人数据）、关键基础设施的 MLPS Level 2+ 安全认证，以及 2021 年人社部指南引入并持续演进的零工劳动者分类监管。Lalamove
              公开表示已遵守中国数据本地化要求，但没有公开第三方审计报告，因此投资人无法仅凭披露资料验证其监管合规状态。


              中国以外，Lalamove 在不同数据隐私制度下运营（新加坡和泰国的 PDPA、香港的 PDPO、巴西的 LGPD），并在各国取得商业车辆经纪业务所需的市场特定经营许可。截至 2026 年 5 月，公开记录未显示
              Lalamove 遭遇重大监管处罚或执法行动。
