              Lalamove 在 400+ 城市拥有 12.2 million 月活跃商户和 1.1 million 月活跃承运方，双边网络形成强流动性护城河。招股书援引 Frost & Sullivan
              数据显示，公司在中国闭环货运 GTV 中占 44% 市场份额；在马来西亚即时配送市场份额超过 90%。这说明其区域根基很深，新进入者很难复制。
