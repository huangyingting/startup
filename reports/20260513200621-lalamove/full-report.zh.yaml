      - number: '4.3'
        title: 单位经济与盈利路径
        blocks:
          - type: paragraph
            body: >
              基于现有披露，可以这样估算 Lalamove 的单单经济账。H1 2022 GTV 约 US$3.9 billion，结合 12.2 million
              月活跃商户（MAM）所隐含的月活订单量，按地区加权后，平均订单价值（AOV）大致落在中国每单 US$15–25、东南亚和香港每单 US$25–40。平台留存约 13.3% AOV 作为总收入，意味着每单总收入
              US$2–3.30。对应的可变成本包括支付处理、技术基础设施、司机支持和单单合规成本。


              2021–2022 年，Lalamove 提高抽佣率并压降司机补贴，边际贡献率轨迹明显改善。H1 2022 调整后净利润 US$36.97 million
              表明，中国业务至少在成熟市场可能已在单单层面跑通正向贡献。但 H1 2023 重新亏损，说明公司仍在用短期盈利换增长投入。


              持续盈利取决于三根杠杆：（1）随着承运密度提高、佣金竞争降温，在中国提高抽佣率；（2）让国际市场实现正向边际贡献（目前订单密度较低、单市场获客成本较高，可能仍在亏损）；（3）把承运伙伴订阅收入做成与订单波动低相关的收入流。DuoLa
              Auto EV 计划（2025 年 6 月）带来一条潜在新收入线：向采用 DuoLa Bafang 微面包车的承运伙伴提供车辆租赁 / 融资，但代价是资本投放增加。


              纯撮合型平台的毛利率与一体化承运商结构不同：Lalamove 的毛利率应理解为净收入减去平台可变成本（支付、匹配基础设施、单单支持），不包括直接流向司机的承运伙伴分成。按这一口径，与 Lalamove
              成熟度相近的平台，在成熟市场通常能做到 40–60% 的边际贡献率；仍处于投入期的市场则只有 10–25%。
            claimRefs:
