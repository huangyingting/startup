  - number: 7
    title: 风险
    sections:
      - number: '7.1'
        title: 监管与法律风险
        blocks:
          - type: paragraph
            body: >
              Lalamove 最重大的风险来自中国监管环境。中国人力资源和社会保障部（MHR）2021 年指南要求平台公司记录承包商身份，并为收入主要来自单一平台的零工劳动者缴纳社会保险。Lalamove
              招股书（港交所，2023 年 3 月）明确把零工劳动者重新分类列为最高风险因素之一，并指出，如果其承运伙伴被重新分类为雇员，运营成本将显著上升，平台经济模型会受到结构性损害。Reuters 2023 年 3
              月报道 Lalamove 香港 IPO 面临一条「艰难路线」，原因正是这种监管不确定性。


              中国《个人信息保护法》（PIPL，2021 年 11 月生效）要求中国居民个人数据本地化。Lalamove 的实时司机位置数据、配送路线历史和商户交易数据都明确落在 PIPL
              范围内。如果未搭建合规的数据驻留架构，Lalamove 将面临国家互联网信息办公室（CAC）执法风险。Didi Global 先例显示了中国数据执法的速度和力度：Didi 2021 年 7 月在 NYSE
              上市后数日内，就因 CAC 网络安全审查被中国应用商店下架。国家市场监督管理总局（SAMR）对科技平台的算法定价审查和反垄断调查（2021–2023）又叠加了一层监管，可能要求 Lalamove
              向监管机构披露派单和高峰溢价算法。


              港交所上市规则要求，发行人在六个月内未上市时，必须更新并重新提交招股书。Lalamove 2023 年 3 月招股书在 2023 年 9
              月失效且未完成上市，这构成一个具体的资本访问失败，投资人必须纳入权衡。道路运输许可（中国交通运输部的 Transportation Network Platform，即 TNP
              牌照）和持续证券监管合规，也带来进一步经常性义务。
