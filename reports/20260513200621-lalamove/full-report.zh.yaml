      - number: '6.2'
        title: 采用轨迹与具名客户证据
        blocks:
          - type: paragraph
            body: >
              Lalamove 的采用轨迹主要由两项已披露指标呈现：2022–2023 年 IPO 申请期的 12.2 million 月活跃商户和 1.1 million 月活跃承运伙伴。虽然 Lalamove
              没有发布这些指标的纵向序列，但公司 2022 年收入 US$1.04 billion——对应 H1 2022 GTV US$3.9
              billion——意味着每名活跃商户背后有相当深的交易量，说明一批高频用户贡献了不成比例的订单规模。隐含的商户平均 GTV 贡献（2022 GTV 年化约 US$7.8B / 12.2M 商户 = 每名商户每年约
              US$640）显示，分布明显偏向高频 SME 用户，而不是一次性用户。


              单个企业层面的具名客户证据并未公开：Lalamove 不发布具名客户名单，也没有企业客户发布公开新闻稿确认与 Lalamove 签约。最具体的客户证据来自两个来源。第一，Shopify App Store
              条目显示 3,000 多次安装，商户评论确认其在新加坡、香港和马来西亚用于同日配送履约的生产环境。第二，行业媒体（e27、Tech in Asia）发布的案例研究描述了新加坡未具名 F&B
              商户和香港零售贸易公司使用 Lalamove 后，配送人工成本和履约时间可量化下降。


              Shopify 和 WooCommerce 集成的存在，以及第三方对 Lalamove API 产品的报道，确认了企业 API 的采用。但专用企业 API 客户数量（不含标准 app 下单流程）尚未披露。KR
              Asia 2024 年报道提到，Lalamove 正通过面向物流密集型行业的直接销售，在东南亚扩大企业 API 客户基础；但报道没有给出收入归因或客户数量。


              缺少具名客户标识、带量化 ROI 的案例研究、或公开 NPS / CSAT 分数，是相较 B2B SaaS 同行的明显缺口——不过 Lalamove
              的撮合平台模式中，商户成功更多由重复交易量验证，而不是软件许可证续约，因此公开案例研究在这个行业并不那么标准。
