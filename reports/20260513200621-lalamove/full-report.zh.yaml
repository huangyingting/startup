chapters:
  - number: 1
    title: 公司概况
    sections:
      - number: '1.1'
        title: 公司身份与商业模式
        blocks:
          - type: paragraph
            body: >
              Lalamove 是一家总部位于香港的按需物流和配送平台。公司由从职业扑克玩家转型为创业者的 Chow Shing-Yuk 于 2013 年 12 月以 EasyVan 之名创办。2014 年 11
              月，公司更名为 Lalamove，以支撑从曼谷起步的国际扩张。中国内地平台使用 Huolala（货拉拉）品牌运营。母公司控股主体为 Lalatech Holdings。


              平台的核心价值主张，是通过移动应用和网页平台，把中小企业（SME）及个人用户与持证配送司机连接起来。平台覆盖的车型从小包裹用摩托车到大件货运用大型卡车，主服务是当日、按需撮合。截至
              2025-2026，Lalamove 在 17 个市场的 400+ 城市运营：中国内地、香港、泰国、越南、菲律宾、马来西亚、新加坡、印度尼西亚、巴西、墨西哥、土耳其、阿联酋、德国，以及孟加拉国 / 日本。德国和
              EU 业务使用 lalamove.eu 品牌，公司也通过 lalamove.us 在美国运营。


              收入来自混合模式：承运方会员订阅，以及货运订单交易佣金。在中国，Lalamove 进入市场时先收承运方会员费，2018 年起叠加每单佣金；到 2023 年中，变现率约为 GTV 的
              10.3%。附属收入来自搬家和物流服务、车辆销售与租赁、企业订阅产品等增值服务。约 90% 的收入来自中国业务，公司因此高度依赖 Huolala 品牌在该市场的表现。
