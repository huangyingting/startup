      - number: '4.4'
        title: 融资历史、股权结构与 IPO 状态
        blocks:
          - type: paragraph
            body: >
              Lalamove（母公司：Lalatech Holdings）自成立至 Series F，已在多轮融资中累计获得约 US$2.66 billion 风险资本。公司在 2019 年 Series D
              轮后进入独角兽行列（融资 US$300 million）。关键融资事件是 2021 年 11 月的 Series F：以 US$10 billion 投前估值融资 US$1.5
              billion。这在当时是东南亚和香港创业公司史上规模最大的单轮风险融资之一。Series F 的领投和主要投资方包括 Hillhouse Capital（现以 HongShan 运营）、Sequoia
              Capital China（现为 HongShan 分拆实体）、FWD Group（保险集团）、Tencent Holdings、Bank of China Group Investment、Ping An 和
              Meituan。Series F 投资团横跨金融服务、保险、科技和战略物流玩家，说明市场认为公司在按需物流品类中拥有领先地位。


              Series F 之后，Lalamove 于 2023 年 3 月向香港提交 IPO 申请，Goldman Sachs、Bank of America Securities 和 JP Morgan
              担任联席保荐人。公司寻求募资约 US$500 million。这次 IPO 被包装为对 Lalamove 市场领导地位的验证，隐含估值接近 Series F 的 US$10 billion；按媒体报道的 2023
              年 2 月定价讨论，发行后估值约 US$9.8 billion。截至 2026 年 5 月，IPO 仍未完成，延迟已超过 26 个月。这一拖延可能反映香港 IPO 市场疲弱、市场对 H1 2023
              净亏损的担忧、影响中国科技公司上市的地缘政治因素，或 / 和公司中国业务带来的监管复杂性。


              IPO 推迟对股权结构影响显著：Lalamove 现有投资人（Series F 参与方）正在接近典型私募股权持有期尾声（从 2021 年 11 月起 4–6 年）。没有 IPO
              流动性事件，会制造二级市场压力，也可能让管理层的增长投入优先级与投资人希望靠盈利改善估值的诉求发生张力。一个缓冲因素是，若干 Series F 投资人（Tencent、Ping An、Bank of
              China）是战略型而非纯财务投资人，短期内最大化财务回报的紧迫性较低。
