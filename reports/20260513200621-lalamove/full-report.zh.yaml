      - number: '2.3'
        title: 买方分层与采用路径
        blocks:
          - type: paragraph
            body: >
              Lalamove
              的买方范围分为四类，工作流、预算归属和采用触发点各不相同。按交易量看，最大群体是微型和小型企业（MSE）以及中小企业（SME）：零售店、餐饮门店、花店、诊所和轻制造商需要当日或次日货物流动，但没有自有配送车队。这些买方的物流预算通常由业主或运营经理掌握，对价格高度敏感；一次口碑推荐，或原有货运经纪涨价、错过时效订单，就可能促使他们采用平台。东南亚平均订单价值较低（每单
              US$10–US$40），但常规发货方的频次可以达到每日或每周。


              第二类是通过 API 将物流嵌入运营的中端市场和企业发货方。Lalamove 已开发 API 能力和 Shopify/WooCommerce
              插件，可在下单时自动调度。企业买方通常有采购团队，要求量价协议（承运方会员层级），并在供应商资格流程后采用。决策者更多是供应链或 IT 经理，而不是企业主。该分层贡献更高的单客户
              GTV，但销售周期更长，也需要专属客户管理。


              第三类是电商商户，其增长与亚太电商扩张在结构上绑定。McKinsey 研究强调，客户对当日达的期待大幅上升，而末端配送是供应链中最昂贵的环节——单次配送尝试通常为 US$10–US$50，失败配送的沉没成本为
              US$17.20。Shopify 等平台上的电商商户采用 Lalamove 集成来自动化履约；Shopify App Store 页面（截至 2026 年 5 月为 4.5/5 星、18
              条评价）显示，该渠道的企业渗透仍有限但在增长。


              第四类是需要搬家服务的个人消费者（搬家、家具配送、单件运输）。该分层复购频次较低，但单笔交易价值更高。Lalamove 在香港和东南亚针对这一用例投放定向营销活动。
