      - number: '1.2'
        title: 创立、领导层与治理
        blocks:
          - type: paragraph
            body: >
              Lalamove 由 Chow Shing-Yuk 于 2013 年 12 月在香港创办。同期媒体将 Chow
              描述为前职业扑克玩家；他看到小企业的物流痛点——过去必须提前数日致电多家货运公司——于是把货运叫车模式数字化。Chow 目前担任创始人兼董事长，即便近年向投资人出售 US$165 million
              股票后，仍持有公司约 25% 股权。公司尚未公开宣布继任计划或替代董事长，Chow 因而构成显著关键人物依赖。


              Blake Larson 从早期增长阶段到至少 2020 年先后担任国际业务负责人和国际业务董事总经理，推动公司在东南亚和拉丁美洲扩张。Paul Loo 是负责国际运营的首席运营官，这一点在公司围绕 2022
              年孟加拉国上线和 2025 年媒体报道的沟通中得到确认。区域董事总经理包括 Jane Teh（马来西亚）、Ben Lin（泰国）和 Dannah Majarocon（菲律宾，截至
              2020）。管理团队采用有意的本地化策略——几乎所有市场负责人都是当地国民；墨西哥是例外，公司任命了一名哥伦比亚籍人士。


              Lalatech Holdings 仍是私营公司，治理披露有限。董事会构成、独立董事代表性和审计委员会结构均未公开。计划中的香港 IPO 将要求公司大幅加强治理披露。Goldman Sachs、BofA
              Securities 和 JP Morgan 担任潜在股票发行的联席保荐人。FWD Group、Tencent、Bank of China Group Investment、Ping An Insurance 和
              Meituan 持有少数股权，显示公司拥有重要机构投资人关系。Hillhouse Capital（现 HongShan）和 Sequoia China 领投了主要成长轮。
