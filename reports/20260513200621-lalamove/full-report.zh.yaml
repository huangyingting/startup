  - number: 3
    title: 竞争格局
    sections:
      - number: '3.1'
        title: 竞争格局概览
        blocks:
          - type: paragraph
            body: >
              亚洲按需同城物流平台市场在结构上围绕两家主导玩家集中：Lalamove（在中国内地以 Huolala 运营）和 GoGoX（前身 GoGoVan，香港股票代码 2246）。两家公司都在 2013
              年相隔数月创立于香港，撮合平台模式几乎相同：基于应用的平台把商户和个人发货方与驾驶面包车、轻卡的独立车主司机匹配，按单计酬，并可选择会员订阅。这种结构相似性，在双方早期进入的关键市场中塑造了按需同城分部的经典平台双寡头。


              核心双寡头之外，竞争格局分散为另外三层。第一层是中国本土货运平台，例如 Didi Freight（2020 年作为 Didi 子公司推出）和长途撮合平台 Full Truck Alliance（NYSE:
              YMM）；它们与 Lalamove 中国业务重叠，但分属不同细分：Didi Freight 做同城道路货运，FTA 做城际公路卡车货运。第二层是超级应用物流部门——主要是 Grab 的
              GrabExpress，覆盖八个东南亚市场——在 Lalamove 的 SEA 市场中竞争末端包裹配送，但车型范围更窄（主要是摩托车、20 kg 以下包裹），不及 Lalamove
              的面包车和卡车供给。第三层是快递包裹配送板块，代表为 J&T Express（HK: 1519，2015 年创立于印度尼西亚），服务部分重叠的商户客户，但采用根本不同的轴辐式模式，聚焦 B2C
              电商履约，而不是实时撮合平台。


              Lalamove 在本土香港和中国内地（Huolala）竞争位置最强，公司称自己拥有全球最大的月活跃商户（12.2 million）和月活跃承运方（1.1 million）网络。到 2025，其足迹覆盖 17
              个市场、400+ 城市——横跨中国、东南亚、拉丁美洲和 EMEA——显著超过任何单一竞争对手的地理覆盖。Mordor Intelligence 估计，按需物流市场 2025 年规模约 US$198.96
              billion，2031 年前预计 CAGR 为 15.87%；市场足够大，可容纳多家平台玩家，但中国以及更成熟的香港和新加坡市场竞争强度最高。
