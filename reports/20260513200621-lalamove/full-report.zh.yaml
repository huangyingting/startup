            - 95
            - 87
            - 78
            - 70
        - label: 承运人订阅队列（估计）
          values:
            - 78
            - 58
            - 46
            - 36
    claimRefs:
      - CU018
      - CU019
      - CU020
      - CU024
  - id: FR001
    title: 风险热力图
    type: matrix
    layout: standard
    summary: 六类风险按分析师估计发生概率（1=极低，5=极高）和影响（1=轻微，5=灾难性）评分绘制。剩余风险分为 L×I 乘积（最高 25）。零工劳动者重新分类（20）和中国集中度（15）是暴露最高的风险。
    data:
      columns:
        - 发生概率（1-5）
        - 影响（1-5）
        - 剩余风险分（L x I）
      rows:
        - label: 零工劳动者重新分类
          values:
            - '4'
            - '5'
            - '20'
        - label: 中国收入集中
          values:
            - '3'
            - '5'
            - '15'
        - label: HKEX 招股书失效
          values:
            - '4'
            - '4'
            - '16'
        - label: PIPL / 数据本地化
          values:
            - '3'
            - '4'
            - '12'
        - label: 平台宕机（峰值窗口）
          values:
            - '2'
            - '4'
            - '8'
        - label: 司机欺诈（GPS 伪装）
          values:
            - '3'
            - '3'
            - '9'
    approximationNotes: 发生概率和影响分数为分析师估计，依据公开报道、HKEX 招股书风险因素披露，以及类似平台监管行动（Didi 2021）。剩余风险分仅供指示参考。
    claimRefs:
      - CR001
      - CR007
      - CR010
      - CR021
      - CR031
      - CR034
  - id: FR002
    title: 风险传导地图
    type: dag
    layout: standard
    summary: 有向无环图展示主要风险因素（零工劳动者重新分类、PIPL 违规、中国集中度、IPO 延迟）如何级联到下游投资者信心和国际扩张放缓。边表示因果路径。
    data:
      nodes:
        - id: gig-reclassify
          label: 零工劳动者重新分类
          note: PRC 裁决使年度劳动力成本增加 US$300-500M；威胁平台经济模型
        - id: pipl-breach
          label: PIPL / 数据违规
          note: CAC 执法触发 App 下架或数据收集禁令
        - id: china-concentration
          label: 中国收入集中
          note: 约 90% GMV 暴露在中国特定冲击下
        - id: ipo-delay
          label: IPO 延迟 / 资本吃紧
          note: HKEX 招股书失效；需要过桥融资；扩张资本开支受限
        - id: driver-shortage
          label: 司机供给中断
          note: 工资通胀或重新分类推高司机获取成本
        - id: samr-action
          label: SAMR / CAC 执法
          note: 算法定价或数据处理做法触发监管行动
        - id: investor-confidence
          label: 投资者信心受损
          note: IPO 延迟和监管风险溢价压缩隐含估值
        - id: intl-expansion
          label: 国际扩张放缓
          note: 资金短缺限制东南亚 / 拉美扩张落地；集中度持续
      edges:
        - from: gig-reclassify
          to: driver-shortage
          label: 推高司机成本
        - from: gig-reclassify
          to: ipo-delay
          label: 增加监管不确定性
        - from: pipl-breach
          to: samr-action
          label: 触发执法
        - from: samr-action
          to: ipo-delay
          label: 阻碍上市审批
        - from: china-concentration
          to: investor-confidence
          label: 放大中国特定冲击
        - from: ipo-delay
          to: investor-confidence
          label: 释放资本承压信号
        - from: ipo-delay
          to: intl-expansion
          label: 限制资本开支
        - from: driver-shortage
          to: china-concentration
          label: 压制中国 GMV 增长
    claimRefs:
      - CR001
      - CR003
      - CR007
      - CR010
      - CR021
      - CR022
      - CR031
      - CR034
  - id: FR003
    title: 平台依赖地图
    type: dag
    layout: standard
    summary: 依赖地图展示 Lalamove 在云基础设施、支付通道、监管机构和承运人池上的关键外部依赖。图中突出单点故障和监管关口。箭头表示依赖方向（Lalamove 依赖目标节点）。
    data:
      nodes:
        - id: lalamove
          label: Lalamove 平台
          note: 核心匹配、调度、支付；12 个运营市场
        - id: alibaba-cloud
          label: Alibaba Cloud（中国）
          note: 中国基础设施可能主要使用的 IaaS 供应商
        - id: wechat-pay
          label: WeChat Pay
          note: 中国主导移动支付通道；Tencent 旗下
        - id: alipay
          label: Alipay
          note: 中国第二大支付通道；Ant Group
        - id: china-regulators
          label: PRC 监管机构（MHR、MOT、CAC、SAMR）
          note: 多个重叠机构管理劳动、交通、数据和市场行为
        - id: hkex
          label: HKEX（IPO 通道）
          note: 公开募资的必要通道；招股书失效风险
        - id: carrier-pool
          label: 承运人池（2M+ 活跃）
          note: 供给侧依赖；头部司机承担过高订单份额
      edges:
        - from: lalamove
          to: alibaba-cloud
          label: 计算和存储
        - from: lalamove
          to: wechat-pay
          label: 支付处理
        - from: lalamove
          to: alipay
          label: 支付处理
        - from: lalamove
          to: china-regulators
          label: 牌照和合规
        - from: lalamove
          to: hkex
          label: 资本通道
        - from: lalamove
          to: carrier-pool
          label: 供给侧履约
        - from: china-regulators
          to: carrier-pool
          label: 劳动分类规则
        - from: china-regulators
          to: hkex
          label: 上市监管许可
    claimRefs:
      - CR017
      - CR018
      - CR021
      - CR025
      - CR030
      - CR034
  - id: FV001
    title: 建议逻辑
    type: flow
    layout: standard
    summary: 从市场、产品、财务和风险评估到投资建议的端到端逻辑链。每个上游节点都流入估值锚点，并由估值锚点驱动最终建议。
    data:
      nodes:
        - id: market
          label: 市场评估
          note: US$199B 总可用市场（TAM）、15.9% CAGR；亚洲按需物流结构性增长，环境有利
        - id: product
          label: 产品 / 技术评估
          note: AI 调度护城河、API 集成、EV 车队转型、高切换成本，构成差异化
        - id: financials
          label: 财务评估
          note: 尚未盈利；2022 年收入 US$1.04B；抽佣率改善；轻资本模式
        - id: risks
          label: 风险评估
          note: 高风险：零工劳动者重新分类；中国约 90% GMV；HKEX 失效；PIPL
        - id: comparables
          label: 可比公司倍数
          note: FTA：3.5-5x；Grab：5-7x；同行中点约 5x EV/Revenue（Series F 为 9.6x）
        - id: recommendation
          label: 建议：有条件观察
          note: 不支持以 Series F（9.6x）进入；基准情景下以 5-7x 进入，需要确认 IPO 并完成尽调
      edges:
        - from: market
          to: comparables
          label: 支撑更高倍数
        - from: product
          to: comparables
          label: 支撑相对 FTA 的溢价
        - from: financials
          to: comparables
          label: 未盈利限制上行空间
        - from: risks
          to: recommendation
          label: 需要估值折价
        - from: comparables
          to: recommendation
          label: 锚定公允价值区间
    claimRefs:
      - CV001
      - CV003
      - CV010
      - CV011
      - CV018
      - CV022
  - id: FV002
    title: 估值敏感性
    type: bar
    layout: standard
    summary: 将不同 EV/Revenue 倍数应用于 Lalamove 2022 年 US$1.04B 收入后得到的隐含企业价值。Series F 锚点（9.6x = US$10B）列为参考。图中突出悲观、基准和乐观情景中点。
    data:
      xAxis: EV / Revenue 倍数
      yAxis: 隐含企业价值（US$B）
      items:
        - label: 悲观底部（2x）
          value: 2.08
          note: PIPL 执法 / 零工劳动者重新分类情景
        - label: 悲观中点（3.5x）
          value: 3.64
          note: IPO 延迟 + 中国宏观逆风
        - label: 基准低点（5x）
          value: 5.2
          note: FTA 可比倍数；IPO 伴随适度折价
        - label: 基准高点（7x）
          value: 7.28
          note: Grab 可比倍数；IPO 叠加市场顺风
        - label: 乐观（9x）
          value: 9.36
          note: 重估至 2021 年峰值条件；IPO 成功
        - label: Series F 锚点（9.6x）
          value: 9.98
          note: 2021 年 11 月 Series F 估值参考
    approximationNotes: 所有数值均使用 2022 年 US$1.04B 收入（HKEX 招股书）。倍数由分析师按 FTA 和 Grab 公开交易区间校准。若 2024-2025 年收入为 US$1.2-1.5B，所有隐含 EV 数值按比例缩放。
    claimRefs:
      - CV011
      - CV012
      - CV013
      - CV014
      - CV015
      - CV022
      - CV023
      - CV028
  - id: FV003
    title: 估值 / 回报区间
    type: range
    layout: standard
    summary: 三种情景估值区间（悲观、基准、乐观）对比 Series F 入场价格 US$10B。悲观和基准情景相对 Series F 为负回报。乐观情景也只是勉强回到 Series F 价格。区间反映倍数敏感性和收入估计不确定性。
    data:
      items:
        - label: 悲观情景
          low: 2.1
          high: 3.6
          unit: US$B
          note: 2-3.5x 2022 年收入；执法行动、第二次 IPO 失效或中国宏观冲击
        - label: 基准情景
          low: 5.2
          high: 7.3
          unit: US$B
          note: 5-7x 2022 年收入；IPO 完成，较 Series F 折价 15-25%
        - label: 乐观情景
          low: 8.3
          high: 10.5
          unit: US$B
          note: 8-10x 2022 年收入；IPO 条款有利；国际 GMV 加速
        - label: Series F 入场价格
          low: 10
          high: 10
          unit: US$B
          note: 2021 年 11 月 Series F 投后估值；投资者锚点
    approximationNotes: 区间为分析师估计，将按可比公司校准的倍数应用于 2022 年 US$1.04B 收入。悲观 / 基准 / 乐观边界并非硬切；基于可比同行交易区间，概率加权预期价值约为 US$5.5-6.5B。
    claimRefs:
      - CV021
      - CV022
      - CV023
      - CV027
      - CV028
      - CV030
  - id: FV004
    title: 投资 KPI
    type: kpi
    layout: standard
    summary: >-
      截至报告日期（2026 年 5 月）的 Lalamove 关键投资参考指标。估值锚点为 Series F（2021 年 11 月）。收入和 GMV 数据来自 2023 年 3 月 HKEX 招股书（2022
      年实际值）。同行倍数来自公开交易区间。
    data:
      items:
        - label: Series F 估值（2021 年 11 月）
          value: US$10.0B
          unit: USD
          description: Series F 交割时的投后估值；从 Sequoia China、Tiger Global 等募资 US$1.5B
        - label: IPO 目标估值（2023 年 2 月）
          value: ~US$9.8B
          unit: USD
          description: 由 US$500M 融资目标和已披露股份回购价格推算；招股书于 2023 年 9 月失效
        - label: 2022 年收入
          value: US$1.04B
          unit: USD
          description: HKEX 招股书主要披露；最近公开可得的收入数字
        - label: Series F 时 EV / Revenue
          value: ~9.6x
          unit: multiple
          description: US$10B / US$1.04B 2022 年收入；显著高于 FTA（3.5-5x）和 Grab（5-7x）同行区间
        - label: 基准情景公允价值区间
          value: US$5.2–7.3B
          unit: USD
          description: 对 2022 年基数应用 5-7x EV/Revenue；较 Series F 锚点折价 27-48%
        - label: 基准情景下隐含 Series F 回报
          value: '-27% to -48%'
          unit: percent
          description: 若 IPO 按基准情景倍数执行，相对 Series F 入场价格亏损；正回报需要乐观情景
    approximationNotes: >-
      除标注为 HKEX 招股书披露者外，KPI 数值均为分析师估计。收入 KPI 使用 2022 年实际值（HKEX）。估值和回报 KPI 使用按可比公司校准的倍数。同行倍数来自 FTA（NYSE:YMM）和
      Grab（NASDAQ:GRAB）公开文件。
    claimRefs:
      - CV001
      - CV007
      - CV010
      - CV011
      - CV014
      - CV018
