  - number: 2
    title: 市场分析
    sections:
      - number: '2.1'
        title: 市场定义与范围
        blocks:
          - type: paragraph
            body: >
              按需物流指通过数字平台实时撮合的货运和配送服务，通常具备一小时内调度、透明定价且无需提前预约。Lalamove
              的核心可触达支出，是同城、按需、道路货运：面包车和卡车叫车服务，用于包裹、托盘和货物级运输，速度与灵活性优先于成本优化。相邻且部分纳入的支出包括预约当日达、由平台履约的电商末端配送，以及 API
              集成的平台物流（Shopify、WooCommerce 集成）。Lalamove 的主要 TAM 不包括长途跨境货代、海运和空运、仓储即服务，以及依赖轴辐式分拣网络的快递服务（DHL
              Express、FedEx、SF Express）。


              按需物流平台的替代方案包括：（1）传统电话调度货运公司，SME
              需要提前数小时或数日致电经纪人，且没有实时追踪；（2）大型企业的自营配送车队；（3）用于低于面包车容量门槛的小包裹的邮政和快递网络；（4）新兴市场常见的非正式司机市场（社交媒体、分类广告）。Lalamove
              相比这些替代方案的关键差异，是即时撮合、每单透明定价、实时 GPS 追踪，以及取消货运经纪中介的双边平台。


              Mordor Intelligence 估算，2025 年全球按需物流市场规模为 US$198.96 billion，其中亚太占 42.91%（约 US$85.4 billion）。Mordor
              Intelligence 另行估算，2025 年亚太第三方物流（3PL）市场规模为 US$431.38 billion，其中中国占 58.74%。这两个数字不能相加；按需板块是更广义 3PL
              市场的一个子垂直。不同研究公司的估算差异（GlobeNewswire 报道到 2028 市场规模接近 US$357.84
              billion）来自纳入口径不同：有些估算包括所有技术驱动的货运撮合，不论是否要求当日达；更严格定义则要求四小时以内 SLA。
