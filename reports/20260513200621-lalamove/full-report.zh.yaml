      - CV036
      - CV037
      - CV039
      - CV040
    columns:
      - 领域
      - 具体要求
      - 理由
      - 优先级
    rows:
      - - 当期财务
        - FY2024 或 FY2025 按地区拆分的经审计收入、GMV 和抽佣率数据
        - 2022 年是最近披露期；3 年前的收入数据不足以支撑 US$10B 估值决策
        - 关键
      - - 司机分类法律风险
        - 中国执业律师就 2021 年 MHR 指引下司机分类风险出具的法律意见
        - 估计每年 US$300-500M 风险敞口；法律意见质量决定剩余风险严重程度
        - 关键
      - - PIPL 合规状态
        - CAC 网络安全审查结果或豁免函；PIPL 合规认证
        - Didi 先例显示，CAC 可在上市后 48 小时内行动；没有认证意味着二元执行风险
        - 关键
      - - 非中国 GMV 轨迹
        - 分部收入桥接：FY2023-2025A 及 3 年目标下，中国 vs. SEA vs. LATAM vs. MENA
        - 中国集中度（约 90%）是主导风险；必须核实多元化轨迹
        - 高
      - - 资本跑道文件
        - 若 HKEX IPO 延迟至 2026 年 12 月之后，董事会关于融资跑道的备忘录；过桥选项
        - Series F 资金于 2021 年 11 月募集；按烧钱速度计算的 5 年跑道是关键输入
        - 高
      - - 承运人合作伙伴协议
        - 2021 年 MHR 指引后的承运人合作伙伴协议样本；社保合规文件
        - 承运人协议搭起承包商身份的法律论证；必须与 MHR 指引一致
        - 中
