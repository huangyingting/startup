      - number: '1.4'
        title: 地理扩张与关键里程碑
        blocks:
          - type: paragraph
            body: >
              Lalamove 的增长轨迹横跨三大洲、持续十余年。2013 年 12 月，公司以 EasyVan 之名在香港创立；2014 年 11 月，更名后的平台在曼谷（泰国）上线。到
              2015，公司已进入新加坡和台北。Huolala 品牌下的中国内地业务于 2014 年启动；到 2017，Huolala 已覆盖 100 个中国城市。2016 至 2019 年间，Lalamove
              进入菲律宾和越南。2019 年，公司首次走出亚洲，在巴西和墨西哥上线。随后，平台扩张至孟加拉国（2022 年 8 月，第 11 个市场）、日本（2023 年 8 月，按可得来源）、土耳其（2024 年 11
              月，首个 EMEA 市场）、阿联酋（2025 年 5 月，第 14 个市场）和德国（在 lalamove.eu 下继续 EU 扩张）。


              产品和技术里程碑包括 2024 年在东南亚和印度尼西亚推出网约车服务，体现公司从纯货运物流向外延伸的战略转向。2025 年 6 月，Lalamove 发布电动车品牌 DuoLa Auto，并宣布通过与
              Changan Kaicene 的 OEM 合作生产 DuoLa Bafang 电动货运面包车。该车配备 94 kW 电机，续航最高 305 km，货舱容积 7.8 立方米。到 2024，平台 40%
              订单由新能源车辆履约；公司的充电网络覆盖 338 个城市、940,000 个充电桩。负面里程碑包括中国内地监管部门在 2022-2023 就拖欠承运方款项和压低运价等指控十余次约谈公司，以及监管逆风导致 IPO
              从美国转向香港并延后。


              2022 年，公司发布首份可持续发展报告，阐述 ESG 承诺。2026 年 4 月发布的 2026 可持续发展报告称，Lalamove 已提前超过新能源车辆履约目标。公司也开展社区项目，包括菲律宾 Quezon
              City 的 LalaJeep 计划，用于支持受 COVID-19 冲击的 jeepney 司机，以及 2025 年泰国地震救援。
