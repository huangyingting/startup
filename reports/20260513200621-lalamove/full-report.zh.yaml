      - number: '8.4'
        title: 可比估值分析
        blocks:
          - type: paragraph
            body: >
              Lalamove 的主要公开可比公司是 Full Truck Alliance（NYSE: YMM）和 Grab Holdings（NASDAQ: GRAB）。FTA
              在地域（中国主导的数字货运平台）和商业模式（带经常性收入层的撮合匹配）上最接近。FTA 2022 年全年收入约 US$596 million，2023 年初市值约 US$3.5B，对应约 5.9x
              EV/Revenue——较 2021 年 6 月 IPO 时 12x 以上倍数明显压缩，原因是中国科技倍数下行。到 2024 年，FTA 收入增至约 US$1.1B，股票稳定在 3–5x EV/Revenue。


              Grab 是相关但不完美的可比公司：它在 SEA 运营（Lalamove 第二大区域），也有物流业务（GrabExpress），但更广泛的超级 app
              收入基础，以及不同监管环境中的更高增长画像，使其享有溢价。Grab 在 2023–2024 年按 5–7x EV/Revenue 交易，当时其在 US$2.8B 收入（FY2024）基础上接近盈亏平衡。如果
              Lalamove 国际执行加速，Grab 可比公司给出了其倍数上限。


              GoGoX（HK: 2246）是最直接模型——同地域、同产品——但规模较小（估计收入 US$50–80M），且上市后股价下跌超过 50%，因此更像警示性而非进取性可比。按 GoGoX 当前市值计算，隐含倍数低于
              1x EV/Revenue，反映其亏损经营和机构投资者基础薄弱。Lalamove 规模、收入和市场地位更强，应较 GoGoX 享有溢价；但在证明盈利能力前，应较 FTA 折价。


              将 FTA（4x）和 Grab（6x）等权平均，得到约 5x 的中心可比倍数，区间为 3.5–7x。套用到 Lalamove 2022 年收入 US$1.04B：中心估计 US$5.2B，区间
              US$3.6B–US$7.3B。如果 Lalamove 收入到 2024–2025 年已增至 US$1.2–1.5B（鉴于已披露 2022 年轨迹，这一假设合理），区间将移至
              US$4.2B–US$10.5B——宽区间凸显了获取当前收入数据的重要性。
