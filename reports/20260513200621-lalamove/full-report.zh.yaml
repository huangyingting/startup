  - id: FI001
    title: 收入模型桥
    type: flow
    layout: standard
    summary: 流程图从总交易额出发，经过平台佣金、承运方订阅和增值服务，映射到报告总收入，再扣除可变成本得到估计贡献利润率。图中说明轻资产市场经济模型：承运方留住 GTV 的大部分。
    data:
      nodes:
        - id: gtv
          label: 总交易额（GTV）
          note: H1 2022：US$3.9B；FY2022E 年化约 US$7.8B
        - id: carrier_payout
          label: 支付给承运方（约 86.7%）
          note: 支付给独立司机伙伴；平台不承担车辆成本
        - id: commission
          label: 交易佣金（约 13.3%）
          note: 主要收入来源；抽成率约为 GTV 的 13.3%（2022E）
        - id: subscription
          label: 承运方订阅费
          note: 约占总收入 8–12%；司机会员按月/年经常性付费
        - id: vas
          label: 增值服务
          note: 约占总收入 2–5%；资料页广告、优先匹配
        - id: gross_revenue
          label: 报告总收入
          note: FY2022：US$1.04B
        - id: variable_costs
          label: 平台可变成本
          note: 支付处理、技术基础设施、逐单支持（约占总收入 8–15%）
        - id: contribution_margin
          label: 贡献利润率
          note: 估计中国为 40–57%；HK/SG 为 79–86%；公司层面 H1 2022 调整后利润：US$36.97M
        - id: fixed_costs
          label: 固定成本和投入
          note: 总部、R&D、S&M、国际扩张；H1 2023 重新转为 US$33M 净亏损
      edges:
        - from: gtv
          to: carrier_payout
          label: 穿透支付给司机
        - from: gtv
          to: commission
          label: 平台抽成率约 13.3%
        - from: commission
          to: gross_revenue
          label: 约占总收入 85-90%
        - from: subscription
          to: gross_revenue
          label: 约占总收入 8-12%
        - from: vas
          to: gross_revenue
          label: 约占总收入 2-5%
        - from: gross_revenue
          to: variable_costs
          label: 扣除
        - from: gross_revenue
          to: contribution_margin
          label: 扣除可变成本后
        - from: contribution_margin
          to: fixed_costs
          label: 由固定成本基数吸收
