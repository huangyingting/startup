      - number: '4.5'
        title: 财务风险、数据缺口与尽调重点
        blocks:
          - type: paragraph
            body: >
              Lalamove 财务画像里最重要的风险，是中国收入极度集中（约 90% 收入来自以 Huolala
              运营的中国业务）。可能显著影响收入的中国特定风险包括：（1）中国交通主管部门施加价格管制或算法限制；（2）零工劳动者分类改革，要求承运伙伴采用雇员身份而非承包商身份；（3）平台经济税务执法；（4）中国中小企业部门的宏观需求放缓。2022–2023
              年，公司收到中国监管部门十余次监管约谈，说明监管审视正在进行。每一次监管不确定性都会带来订单量波动，因为承运伙伴和商户可能在不确定时期减少平台活动。


              第二个重大财务风险是 IPO 长期拖延。无法进入公开市场，Lalamove
              就不能从股权资本市场获得资金，去支持下一阶段国际扩张。如果国际市场（LATAM、EMEA、东南亚进一步渗透）需要持续投入后才能实现正向边际贡献，公司要么压缩投入，要么以可能不如 Series F
              有利的条款寻求新的私募融资。H1 2023 净亏损 US$33 million 表明，在最后一次披露业绩时，整体业务仍在烧钱；H2 2023 或 2024 数据均未公开。


              财务评估中的关键数据缺口包括：2023 和 2024 全年收入与盈利能力；逐市场收入和边际贡献率拆分；承运伙伴订阅留存率及每名承运伙伴月均收入；DuoLa Auto
              车辆融资计划的财务条款和预期规模。没有这些数字，就无法做精确估值建模；财务评估只能依赖已披露的 H1 2022 指标（到 2026 年可能已经过时）以及对商业模式的定性分析。
