      - number: '6.3'
        title: 留存、扩张与集中风险
        blocks:
          - type: paragraph
            body: >
              Lalamove 未公开披露任何客户留存指标——IPO
              招股书和后续媒体报道中，都没有净留存率（NRR）、总留存率（GRR）、月流失率或队列留存曲线。承运伙伴会员订阅模式是最清晰的持久参与度代理指标：愿意为优质任务访问权支付经常性月费的承运伙伴，已经证明其愿意对平台做出财务承诺，由此形成带有隐含留存的经常性收入基础。订阅模式
              2020 年推出，并在中国、新加坡、香港等关键市场采用，说明 1.1 million 活跃承运伙伴中，有相当一部分采用订阅合同，而不是纯单任务佣金。


              商户侧的隐含留存驱动因素是频次：高单量 SME 商户（餐厅、贸易商）依赖 Lalamove 做日常配送，已经把 Lalamove app
              嵌入运营流程、培训员工使用下单界面，并且在许多情况下与电商店铺集成，因此承受切换成本的空间有限。企业 API
              客户切换成本更高，因为更换平台需要投入技术集成工作。不过，没有公开流失数据，这些留存判断只能停留在定性层面，无法量化。


              客户集中度也是重大风险维度，但同样大多未披露。中国地域集中（约 90% 收入）是最重要的集中风险：任何影响 Lalamove
              中国运营的政策变化（监管整顿、零工劳动者重新分类、数据法执法）都会产生超比例财务影响。单个客户集中度（前 10 或前 20 商户收入占比）没有披露，构成尽调缺口。


              扩张动作由平台驱动：现有商户随着业务量增长自然增加使用量，API 集成也为企业客户随着时间增加车型、市场或使用场景提供先落地再扩张路径。Lalamove
              的承运伙伴订阅模式创造了经常性关系，承运伙伴从基础层升级到高级层时，这段关系也随之扩张。NEV / EV 转型计划（DuoLa
              Auto）还可能通过平台融资车辆进一步加深承运伙伴关系，形成类似车队融资产品的财务依赖。
