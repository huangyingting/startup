      - number: '5.4'
        title: EV 转型、DuoLa Auto 与产品路线图
        blocks:
          - type: paragraph
            body: >
              自企业 API 推出以来，Lalamove 最具战略意义的产品计划是 DuoLa Auto：一款与 Changan Kaicene（国有 Changan Automobile Group 旗下子公司）合作设计、于
              2025 年 6 月发布的 EV 货运面包车。DuoLa Auto 代表一种潜在纵向整合打法——Lalamove
              从纯软件撮合平台模式，向共同设计、可能分销并为承运伙伴履约所用实物资产提供融资延伸。截至发布日，产量、面向承运伙伴的定价、融资条款和部署时间表均未披露。


              EV 转型背景很关键：到 2024 年，Lalamove 中国平台（以 Huolala 运营）40% 订单由新能源车辆完成，背后有承运伙伴可使用的 940,000 多个 EV
              充电桩支撑。这一里程碑既来自中国监管压力（生态环境部对商用车电动化的目标），也来自 Lalamove 有意推动 NEV 采用的承运伙伴激励计划。40% NEV 订单占比让 Huolala
              在中国多数竞品之前满足可持续合规要求。


              投资人沟通和媒体报道中披露的产品路线图包括：多站点路线优化（让商户为多个连续配送任务预订同一名承运伙伴）、扩展企业 API 能力（更多 webhook 事件类型、批量下单），以及继续在 LATAM 和 MENA
              市场扩张。但具体功能发布日期、支撑这些计划的工程人员规模、年度研发预算均未公开，限制了对路线图可信度的评估。


              Smart Dispatch AI、承运伙伴订阅模式、企业 API 生态和 DuoLa Auto EV 计划叠加，使 Lalamove
              成为全球技术整合程度最高的城内物流平台之一——但公开技术披露不足，以及中国集中风险（监管与地缘政治两端）仍是投资人面对的主要技术风险。
