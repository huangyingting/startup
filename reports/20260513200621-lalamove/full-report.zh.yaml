      - number: '8.2'
        title: 估值背景与入场纪律
        blocks:
          - type: paragraph
            body: >
              Lalamove 的估值历史在七轮融资中一路上行——从 Series C 的 US$300 million 估值（TechCrunch，2019 年 4 月）到 Series F 的 US$10
              billion（2021 年 11 月）。Series F 由包含 Sequoia Capital China、Tiger Global 和 LaSalle Investment Management
              的财团领投；Bloomberg、CNBC 和 BusinessWire 同期确认了 US$1.5 billion 融资和 US$10 billion 投后估值。这意味着按 2022 年收入 US$1.04
              billion 计算，EV/Revenue 倍数约为 9.6x——接近 2021 年末市场高峰时同类按需物流平台可比区间顶部。


              Series F 之后，市场环境显著压缩了可比公司倍数。FTA（NYSE: YMM）在 2022–2023 年按 3–5x EV/Revenue 交易，原因是 Didi
              执法事件及更广泛的中美科技脱钩后，中国科技估值倍数下行。Grab（NASDAQ: GRAB）在 2023–2024 年按 5–7x EV/Revenue 交易，当时其在 US$2.80B
              收入基础上接近盈利。Lalamove 的入场纪律因此要求相较 Series F 打折：基准情景为 5–7x（US$5.2B–US$7.3B），安全边际阈值约 US$4.5B（4.3x），用来补偿流动性不足、IPO
              不确定性和零工监管风险的期权价值。


              估值敏感性柱状图展示了企业价值如何随所采用收入倍数、基于 US$1.04B 的 2022 年收入基础变化：倍数每提升 1x，隐含 EV 增加约 US$1.04B。按 Series F 锚点 9.6x，隐含 EV
              约 US$10B。按悲观情景底部 2x，则降至 US$2.1B。按 Series F 价格进入的投资人，持有的是一个明显价外的乐观情景期权，下行缓冲有限。区间图展示了按可比公司加权的企业价值估计中，乐观 / 基准
              / 悲观的完整分布。
