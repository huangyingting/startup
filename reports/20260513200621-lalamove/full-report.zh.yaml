  - id: FE002
    title: Lalamove 客户工作流（订单流程）
    type: flow
    layout: standard
    summary: 十步订单到结算流程，从商户下单，经承运方派单、GPS 引导取货，到支付结算。
    data:
      nodes:
        - id: booking
          label: 商户下单
          note: 通过 app、Web 门户或企业 API
        - id: pricing
          label: 实时价格计算
          note: 智能调度引擎计算距离和需求运价
        - id: confirm
          label: 商户确认下单
          note: 支付方式已授权
        - id: broadcast
          label: 订单广播给附近承运方
          note: 基于 GPS 距离和资格匹配
        - id: accept
          label: 承运方接单
          note: 通常在 1–3 分钟内
        - id: navigate
          label: 承运方导航到取货点
          note: GPS 引导；app 内逐向导航
        - id: pickup
          label: 取货确认
          note: 取货时在应用内拍摄照片
        - id: transit
          label: 配送中
          note: 实时 GPS 共享给商户
        - id: delivery
          label: 配送完成
          note: 已拍摄送达照片凭证
        - id: settlement
          label: 款项结算完成
          note: Lalamove 留存佣金；承运人收到净余额
      edges:
        - from: booking
          to: pricing
        - from: pricing
          to: confirm
        - from: confirm
          to: broadcast
        - from: broadcast
          to: accept
        - from: accept
          to: navigate
        - from: navigate
          to: pickup
        - from: pickup
          to: transit
        - from: transit
          to: delivery
        - from: delivery
          to: settlement
    claimRefs:
      - CE001
      - CE002
      - CE003
      - CE005
