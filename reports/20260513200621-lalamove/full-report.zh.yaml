      - number: '7.3'
        title: 合作伙伴、依赖与集中风险
        blocks:
          - type: paragraph
            body: >
              中国收入集中度约占 GMV 的 90%，是 Lalamove
              风险画像中最关键的结构性风险。任何中国特定冲击——监管行动、宏观经济收缩、地缘政治升级或自然灾害——实质上都会演变为全公司收入冲击。这种集中还放大了相关性风险：Lalamove 的零工劳动者重新分类风险、PIPL
              执法风险、SAMR 反垄断风险和 CAC 数据安全风险都集中在中国，意味着多个尾部风险可能同时落地。


              Bloomberg 和 WSJ 2023 年 3 月报道确认，Lalamove IPO 拖延限制了其为 SEA、LATAM 和 MENA 扩张融资的能力，而这些扩张本可以降低中国集中度。KR-Asia
              分析显示，国际 GMV 已从约 5%（2020 年前）增至约 10%（2022 年），年均仅约 2 个百分点；若不对国际扩张做阶跃式投入，按当前速度达到 Lalamove 所称 30% 国际占比的中期目标，需要
              8–12 年。


              次级依赖风险包括：（1）中国业务对 Alibaba Cloud 的云服务商集中；（2）对 Alipay 和 WeChat Pay
              支付通道的依赖，两者都受国家监管并可能面临访问限制；（3）头部司机承运池集中，一批高频司机履约了不成比例的订单份额。FT 和 WSJ 报道显示，IPO 拖延已经为 Huolala（Lalamove 替代平台）和
              Didi Freight 创造竞争窗口，使它们能在 Lalamove 资本受限时巩固中国市场份额。ILO（2023）记录，SEA 零工经济监管正快速演进，新加坡 MOM、印尼人力资源部和泰国 Labour
              Department 都在制定平台特定标准——这会制造多司法辖区合规开销。
