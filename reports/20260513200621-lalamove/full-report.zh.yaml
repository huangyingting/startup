  - number: 4
    title: 财务情况
    sections:
      - number: '4.1'
        title: 收入、GTV 与增长轨迹
        blocks:
          - type: paragraph
            body: >
              Lalamove 的收入来自平台处理的总交易额（GTV）——商户为配送支付的总金额。平台从每笔交易中留存佣金（抽佣率 / take rate），并叠加注册承运伙伴支付的订阅费。基于 IPO
              招股书披露，Lalamove H1 2022 GTV 约 US$3.9 billion，意味着全年化 2022 GTV 运行率为 US$7.8 billion。对照 2022 披露收入 US$1.04
              billion，全年隐含抽佣率约 13.3%，符合成熟撮合平台模式：平台佣金是主导收入驱动。


              2022 收入 US$1.04 billion，相比估计 2021 收入 US$520–600
              million（约翻倍）明显加速。增长由三点驱动：（1）中国和东南亚配送量在疫情后复苏；（2）承运方会员订阅扩张；（3）通过 Shopify 和 WooCommerce 集成增加企业 API
              客户。中国业务（Huolala）一直贡献总收入约 90%，反映 Lalamove 中国业务相对国际足迹的主导规模。


              H1 2022 是关键拐点：公司报告 US$36.97 million 调整后净利润，这是 Lalamove
              第一次在任何六个月期间实现正收益。原因包括中国业务经营杠杆释放（抽佣率改善、承运方订阅密度提升），以及疫情期间司机激励支出后的成本纪律。但 H1 2023 又转为 US$33 million
              净亏损，反映国际市场开发、在中国搭建监管合规基础设施，以及 NEV/EV 转型投资带来的支出增加。IPO 仍待完成，因此公司未公开披露 2023 或 2024 全年业绩。IPO 招股书期间（H1
              2023）之后缺少经审计财务数据，是财务评估中的重大缺口。


              关键财务不确定性：Lalamove 2021 Series F 轮按 US$10 billion 估值完成。2023 年 2 月 IPO 目标约 US$9.8 billion 隐含估值（基于按市场定价募资
              US$500M）较 Series F 略有折价，但 2023 年后市场环境可能进一步压低可实现 IPO 估值。IPO 从首次提交至今已拖延超过 26 个月，带来一个问题：公司能否维持 Series F
              隐含倍数所要求的财务表现。
