      - number: '4.2'
        title: 收入模式、抽佣率与变现
        blocks:
          - type: paragraph
            body: >
              Lalamove 运营双边撮合平台，主要有两条收入流：（1）从每笔订单收取交易佣金（适用于 GTV 的抽佣率 / take rate）；（2）注册司机伙伴为平台访问权支付的承运方会员订阅费。按 IPO
              招股书披露，佣金是主导收入流，约占总收入 85–90%。订阅费提供可预测的经常性基础，按市场和承运方层级平均收取。


              混合抽佣率约 13.3%（2022E），与相似平台模式相比并不差：网约车平台通常留存总车费的 20–25%，外卖平台留存 15–30%。Lalamove
              相比网约车抽佣率更低，反映货运经济性不同（平均订单价值更高，较低百分比也能产生足够的每单绝对收入），也反映 GoGoX
              和价格敏感市场中非正式替代方案带来的竞争压力。在香港和新加坡（更成熟市场），抽佣率可能高于中国或东南亚市场，因为后者价格竞争更激烈。


              承运方订阅费因市场和层级而异。在中国，承运方会员通常定价为每月 RMB
              99–399，高级层级可解锁优先匹配和更多订单可见性。在东南亚，承运方订阅定价按市场不同而不同。订阅模式带来双重好处：产生可预测经常性收入（部分降低收入与订单量的相关性），并制造承运方切换成本——已经付费进入一个订阅周期的承运方，不太可能在周期中途迁移到替代平台。


              第三条规模较小的收入流是广告和增值服务：承运方可以付费，提高其个人资料在应用匹配算法中的可见性。可得招股书材料没有单独拆分这一项，但其占总收入的比例可能为低个位数。


              Lalamove 不拥有也不租赁平台上的货运车辆。它是纯撮合 / 技术平台，资本结构轻资产。司机-承运车队完全由独立车主经营者组成，由他们承担车辆购买和维护成本。这使 Lalamove
              不同于一体化物流提供商，并限制资本强度；但平台必须将大部分商户付款转给承运方，因此毛利率也受到限制。
