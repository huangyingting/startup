      - number: '8.3'
        title: 乐观、基准与悲观情景
        blocks:
          - type: paragraph
            body: >
              三个估值情景覆盖了 Lalamove 自 2026 年中起 IPO 和经营轨迹的合理结果区间。每个情景都由 IPO 执行、监管结果、国际扩张速度以及市场对中国科技平台的情绪等不同假设驱动。


              乐观情景假设：IPO 在 H2 2026 于有利市场条件下完成；中国没有不利的零工劳动者重新分类裁定；SEA 收入增长到 GMV 的 20% 以上；Hang Seng Tech Index 向 2021
              年水平重估。在这些假设下，按 2022 年收入基础套用 8–10x EV/Revenue 倍数（或套用更高的 2024–2025 年估计收入 US$1.2–1.5B），隐含企业价值为
              US$9.6–10B。这基本与 Series F 相当，按该进入价格只能带来极低回报。


              基准情景假设：IPO 在 2026 年重新提交，并以较 Series F 低 15–25% 的估值折扣完成簿记；中国零工劳动者风险仍是监管悬顶之剑，但没有执法落地；国际 GMV 增至总量的 15%；市场给出
              5–7x 倍数，反映 FTA 和 Grab 可比公司的中点。隐含企业价值 US$5.2B–US$7.3B，较 Series F 折价 27–48%。对后期 Series F 投资人，这是亏损；对假设在 US$5B
              进入的投资人，乐观情景提供约 100% 上行。


              悲观情景假设：港交所招股书第二次失效；中国执法行动或零工劳动者裁定显著损害平台经济模型；中国 GMV 收缩；或出现整体新兴市场避险事件。在这一情景下，2–3.5x EV/Revenue 隐含
              US$2.1B–US$3.6B，较 Series F 下跌 64–79%。Didi 在 CAC 执法后从 NYSE 退市是最直接先例；执法后 18 个月内，Didi 隐含的仅中国业务价值跌破 US$5B。
