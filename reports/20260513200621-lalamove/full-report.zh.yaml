      - number: '5.2'
        title: 技术架构与 Smart Dispatch Engine
        blocks:
          - type: paragraph
            body: >
              Lalamove 的核心技术差异化来自 Smart Dispatch Engine：一套自研、基于 AI 的订单-司机匹配算法，实时把新进配送请求分配给可用承运伙伴。引擎把承运伙伴距离（持续更新的 GPS
              坐标）、车型资格、承运伙伴绩效评分和当前需求密度纳入计算，在下单确认后数秒内选出最优承运伙伴。具体 ML
              模型架构尚未公开，但行业媒体描述其使用地理空间匹配与基于强化学习的需求预测组合，以降低平均接单时间、提升路线效率。


              平台采用移动优先架构，商户和承运伙伴两端都有 iOS 与 Android 客户端，后端由 RESTful API 网关支撑企业集成和 web 门户。Lalamove
              尚未公开云基础设施细节，这是一个尽调缺口：云服务商身份、SLA 承诺、灾备状态，以及中国业务与国际市场之间的数据驻留架构，公开资料均无法确认。在中国，Lalamove（以 Huolala
              运营）必须遵守《个人信息保护法》（PIPL）和等保（MLPS）要求，这些规则要求中国境内产生的个人数据和运营数据本地化存储。


              动态定价在下单时由算法计算，纳入距离、车型、时段以及高峰需求期的溢价倍数。定价引擎在中国使用 Baidu Maps APIs 做路线和距离计算，在国际市场使用 Google Maps
              APIs——这形成了地理依赖；如果中国数据基础设施政策演变，或 API 定价 / 访问规则发生重大变化，就会引入监管风险。


              企业 API 层支持基于 REST 的集成，并通过 webhooks 推送状态更新，让第三方系统（电商平台、ERP、仓库管理系统）可以程序化下单、跟踪并管理配送。截至 2023 年，Lalamove 已大规模接入
              Shopify 和 WooCommerce，是亚洲少数拥有显著开发者生态存在感的城内物流平台之一。
