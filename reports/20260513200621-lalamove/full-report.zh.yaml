      - number: '2.2'
        title: TAM、SAM 与市场规模测算
        blocks:
          - type: paragraph
            body: >
              Lalamove 的总可用市场（TAM）最好用全球按需物流市场近似：Mordor Intelligence 估计，2025 年为 US$198.96 billion，并以 15.87% CAGR 增长到 2031
              年的 US$485.84 billion。该口径涵盖全球所有由数字平台驱动的按需货运撮合。作为参照，这大约相当于 2025 年亚太整体 3PL 市场（US$431.38 billion）的
              46%，虽然两者的地域和细分定义部分重叠。


              Lalamove 的可服务市场（SAM）更窄：公司运营的 17 个市场中的同城、按需道路货运。可用全球按需物流中 APAC 的份额（42.91%）估算 SAM，再按 Lalamove 当前 17
              个市场的足迹折减，并根据其聚焦道路短途货运作调整。保守估计，Lalamove 的 SAM 为 US$30–50 billion（活跃市场中的同城按需物流）；仅中国（Huolala
              参与竞争的市场）就是最大单一切片，因为该国 3PL 市场为 US$254 billion（58.74% × US$431.38 billion）。Lalamove 的可获取市场（SOM）可用其 2022 披露收入
              US$1.04 billion 和 H1 2022 货运总交易额（GTV）US$3.9 billion（年化约 US$7.8 billion）近似，说明到 2022 年公司已拿下以 APAC 为核心的 SAM
              中约 1–2%。


              不同分析师估算差异很大：GlobeNewswire（引用未具名研究机构）预测，到 2028 年按需物流市场将达到 US$357.84 billion；MarketsandMarkets
              覆盖同一宽泛类别，但使用自己的 CAGR 区间；Technavio 的按需物流市场分析则采用不同基年。差异来自定义不同——是否包括平台撮合的货代、通过应用调度的 B2B
              预约配送，还是只纳入真正的现货当日达服务。就 Lalamove 尽调而言，Mordor Intelligence 的定义（按需、技术驱动、实时匹配）最适用，但 2025–2028 年
              US$199B–US$358B 的估算区间本身就是重大不确定性。


              按 Mordor Intelligence 数据，SME 是按需物流市场中增长最快的终端用户群，CAGR 为 19.16%，反映小企业物流快速数字化。Lalamove 明确瞄准这一群体——其香港平台指出，香港
              98% 企业为 SME——平台定价模式也面向临时、无最低量要求的交易，适合微型企业。
