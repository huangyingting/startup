  - number: 6
    title: 客户情况
    sections:
      - number: '6.1'
        title: 客户群体分层
        blocks:
          - type: paragraph
            body: >
              Lalamove 的客户群体按供需两端分成两个不同角色。需求端是商户（下单配送的企业和个人），截至 2022 年中有 12.2 million 月活。供给端是承运伙伴（完成配送的独立车主 / 运营者），同期有
              1.1 million 月活。这些数字披露于 2023 年 3 月港交所上市申请，是少数能量化观察 Lalamove 规模的窗口之一；但数据距今已超过三年，公司也未公开更新。


              商户队列主要按规模和使用场景分层。按量看，SME 占主导：餐厅订购食材或补给配送，零售商户把已购商品送到客户手中，贸易公司运输样品和文件，电商卖家履约 Shopify 或 WooCommerce
              店铺订单。企业客户——大型零售商、物流中介和供应链管理方——通过 REST API 使用平台，通常要求更高可靠性的 SLA、优先承运伙伴分配和专属客户经理。Shopify App Store 上的
              Lalamove 条目累计超过 3,000 次安装，说明有一批可量化的企业和中端市场电商商户在通过集成层运营。


              从地域看，商户基础高度集中在中国（以 Huolala 运营），历史上贡献 Lalamove 总收入约 90%。东南亚市场（新加坡、菲律宾、泰国、越南、马来西亚）是第二大板块，拉丁美洲和 MENA
              市场处于早期到成长阶段。中国集中度同时带来规模优势（密度驱动调度效率）和集中风险（监管、地缘政治与宏观经济敏感性）。


              从承运伙伴视角看，客户关系与商户关系根本不同。承运伙伴是独立车主 / 运营者，向 Lalamove
              支付单任务佣金，或越来越多地支付经常性月度会员订阅费。订阅模式用财务承诺锁定承运伙伴关系，并以优质任务访问权作为回报。于是，Lalamove
              形成双边客户基础，承运伙伴留存与商户留存同等重要——承运密度驱动调度速度，调度速度又驱动商户满意度和复购。
