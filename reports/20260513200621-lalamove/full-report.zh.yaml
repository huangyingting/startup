      - number: '7.4'
        title: 人员与执行风险
        blocks:
          - type: paragraph
            body: >
              创始人兼 CEO Shing Chow 自 2013 年创立以来一直领导 Lalamove。港交所招股书没有披露具名继任者，也没有披露一位具备外部上市公司经验的 CFO。Chow
              管理关键投资人关系、监管沟通和战略合作——机构知识和关系资本集中在创始人层面。这是偏高的关键人物风险，尤其是在 IPO 过程中，投资人信心与创始人可信度高度绑定。


              中国 2021 年 MHR
              劳动指南要求，为主要依赖单一平台获得收入的平台劳动者提供最低收入保障。不合规会带来执法风险；合规则会推高司机获取经济账的成本。司机工资通胀——由中国整体劳动力成本通胀和平台行业特定最低收入要求推动——会压缩
              Lalamove 抽佣率，除非订单量增长足以抵消单位成本上升。Reuters（2022）记录，亚洲各地配送平台都在实施收入保护；Lalamove 在全部 12 个运营市场的司机经济账都会受到这些动态影响。


              IPO 拖延期间，来自 ByteDance、Alibaba 和 Meituan 的工程人才竞争加剧，因为 Lalamove 股票期权包的预期时间价值会随着每多拖一个月而下降。 IPO
              前股权薪酬是相较给现金的竞争对手的一项关键差异化；持续拖延会侵蚀这一优势，并可能导致负责派单算法和 EV 车队管理系统的关键工程师流失。
