      - number: '7.2'
        title: 运营、安全与质量风险
        blocks:
          - type: paragraph
            body: >
              Lalamove 的运营风险整体为中等，但包含一个严重尾部风险：在中国配送高峰窗口（SME 发货通常为 11am–2pm）发生平台宕机。该窗口内的平台中断会直接压低
              GMV，并触发客户流失。港交所招股书承认平台可靠性是风险因素，但未披露 SLA 或历史正常运行时间数据。Lalamove 部署了云基础设施冗余，但未公开主要云服务商身份；中国平台的行业惯例指向 Alibaba
              Cloud 依赖，这本身也带来集中风险。


              司机欺诈——包括 GPS 欺骗（伪造取货和送达以在未履约情况下收取费用）、幽灵行程和支付操纵——是全球按需物流平台的常见顽疾。Lalamove 称其部署了基于 ML
              的异常检测；但公司未公开欺诈损失率，因此外部无法独立评估缓解措施是否有效。可比平台（Uber、DoorDash）报告欺诈占总预订额的 0.1–0.5%；没有 Lalamove 自身披露，这一指标就是尽调缺口。


              Lalamove 2025 年 6 月推出 Duola EV 货运面包车（与一家中国 EV OEM 合作），在车队转型期引入供应链风险。来自 LFP 生产商（BYD、CATL）的电池供应和装配产能都不在
              Lalamove 控制之内。司机安全事件——车辆事故、货物盗窃、司机与商户冲突——会在 12 个运营市场制造法律责任和声誉风险，而各市场对平台运营方安全义务的监管要求各不相同。Lalamove 安全页面和
              Straits Times 报道确认，公司已部署 app 内安全功能（司机验证、实时跟踪、紧急联系人），但保险覆盖上限和事故报告义务因市场而异。
            claimRefs:
              - CR011
              - CR012
              - CR013
              - CR014
