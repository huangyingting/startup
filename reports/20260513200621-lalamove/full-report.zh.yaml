      - number: '3.2'
        title: 直接竞争对手——GoGoX 与 Didi Freight
        blocks:
          - type: paragraph
            body: >
              GoGoX 是 Lalamove 最接近的结构性竞争对手，也是亚洲唯一另一家上市且专注同城按需物流的平台。公司由 Steven Lam、Nick Tang 和 Reeve Kwan 于 2013 年在香港以
              GoGoVan 之名创办，2017 年末与中国内地竞争对手 58 Suyun 合并，一举获得 300 多个中国城市覆盖，随后在 2020 年 7 月更名为 GOGOX。2021 年 7 月，GoGoX 完成由
              BOCOM International 和 Cyberport Macro Fund 领投、Alibaba、Cainiao、58.com 参投的 US$100 million 融资。2022
              年，公司在香港交易所上市，股票代码 2246，成为亚洲少数上市且专注物流的平台之一。截至 2024，GoGoX 在六个市场运营：香港、新加坡、中国内地、台湾、韩国和印度，显著少于 Lalamove 的十七个市场。


              两家公司结构相似，使香港和新加坡等重叠市场形成直接价格竞争。两家平台都使用每单透明定价、实时 GPS 追踪、司机评分系统和面向承运方的会员订阅模式。但 Lalamove
              在三点上拉开差异：（1）车型覆盖更宽，从摩托车到重卡，而 GoGoX 车队主要是面包车和轻卡；（2）与 Shopify、WooCommerce 等电商平台的企业 API 集成，GoGoX
              尚未以同等规模推出；（3）2025 年 6 月宣布与 Changan Kaicene 合作的 DuoLa Auto EV 货运面包车计划，代表向车辆供给的垂直整合，而 GoGoX 没有对应项目。


              Didi Freight（滴滴货运）于 2020 年作为 Didi Chuxing 业务单元推出，是 Huolala 在中国内地的重要竞争对手。Didi Freight
              在中国主要城市运营面包车和卡车的城市货运撮合服务，与 Huolala 核心分部直接重叠。Didi 的竞争优势来自庞大的既有司机网络（继承自网约车业务），以及在中国消费者和 SME 中很深的品牌认知。但 Didi
              Freight 面临显著监管和运营逆风：Didi Chuxing 在 2021 年因中国数据安全调查从纽约证券交易所退市，造成战略不确定性；Didi Freight
              中国业务也处在影响所有零工经济货运平台的同一监管环境中。截至报告日期，Didi Freight 尚未公开披露独立收入或盈利数据。
