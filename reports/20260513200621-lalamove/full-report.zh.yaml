  - number: 5
    title: 产品与技术
    sections:
      - number: '5.1'
        title: 产品组合与运营模式
        blocks:
          - type: paragraph
            body: >
              Lalamove 的产品套件围绕四个面向客户的模块搭建：商户下单 app（iOS、Android 和 web）、承运伙伴 app（iOS 和 Android）、企业 web 管理门户，以及 RESTful API
              层，支撑与 Shopify、WooCommerce 和企业 ERP 系统的第三方集成。合在一起，这些模块覆盖完整物流生命周期——报价、下单、实时司机派单、GPS 跟踪、签收证明和任务后结算。


              商户流程强调速度：商户输入取货地址，选择车型（从摩托车到重型卡车），通常在提交后十秒内获得即时算法报价。确认下单后，Smart Dispatch Engine
              会在可配置的地理半径内向符合条件的承运伙伴广播任务，司机通常在一到三分钟内接单。全程实时 GPS 跟踪会分享给商户，送达照片则构成数字签收记录。


              承运伙伴 app 从司机视角复刻这套流程：展示可接任务，提供 GPS 导航，管理 app 内收入看板，并处理承运会员订阅付款。订阅模式于 2020
              年在关键市场推出，承运伙伴支付经常性月费，换取更高的任务可见性和更低的单任务佣金率，从而提高收入可预期性和承运伙伴留存。


              企业客户侧，Shopify 插件（上架 Shopify App Store）和 WooCommerce 扩展让商户可以把 Lalamove
              配送作为结账选项，根据商户仓库地址和客户收货地址自动报价，并在订单确认后自动触发下单。集成层减少了高单量 SME 商户的人工调度工作，并靠嵌入工作流形成平台粘性。


              Lalamove 覆盖多种车型——摩托车、轿车、小型面包车、面包车、5.5 吨卡车和敞顶货柜车——这让它不同于纯末端包裹平台（B2C 包裹通常只用摩托车），也不同于 Full Truck Alliance
              这类干线货运平台（解决城际整车匹配）。车型深度、API 集成和实时调度叠加，形成了一个同时覆盖 SME、SME 电商和企业客户的同日 B2B 物流产品。
