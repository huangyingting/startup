summary:
  headline: Flo Health 是全球消费者 femtech 应用龙头，数据护城河可防守、MAU 增长强且已确认现金流为正；但财务不透明、隐私诉讼未了，以及 Apple 原生竞争，压住了 $1B+ 估值下的风险调整后上行空间。
