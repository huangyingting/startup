  evidenceGaps:
    - type: private-evidence-only
      severity: material
      topic: retention-gap
      missingEvidence: Flo annual cohort retention rates (M1, M6, M12) for premium subscribers by plan type (annual vs monthly)
      whyItMatters: >-
        Without cohort retention data, it is impossible to validate whether the 5M subscriber base is growing, stable,
        or experiencing significant churn offset by new acquisition
      diligencePath: >-
        Request cohort retention waterfall from Flo management data room; benchmark against IQVIA consumer health app
        retention norms
      relatedQuestionRefs:
        - QU010
        - QU025
    - type: private-evidence-only
      severity: material
      topic: geographic-concentration
      missingEvidence: Country-by-country MAU and revenue breakdown for Flo's top 10 markets
      whyItMatters: >-
        Geographic concentration risk (e.g., US dependency) cannot be assessed without regional splits; EU GDPR
        compliance costs are proportional to EU user share
      diligencePath: >-
        Request regional revenue and MAU breakdown by Flo management; cross-reference with App Store country-level chart
        positions
      relatedQuestionRefs:
        - QU009
        - QU029
    - type: private-evidence-only
      severity: material
      topic: premium-subscribers
      missingEvidence: Official Flo-disclosed premium subscriber count, plan-type breakdown, and pricing by geography
      whyItMatters: >-
        The 5M subscriber estimate is a secondary analytics inference; actual count and average revenue per user
        determine DCF sensitivity in valuation modeling
      diligencePath: >-
        Request subscriber count, plan mix, and cohort data from Flo management; compare to reported $275M revenue for
        consistency
      relatedQuestionRefs:
        - QU003
        - QU014
    - type: missing-source
      severity: minor
      topic: anonymous-mode
      missingEvidence: Adoption rate of Flo's Anonymous Mode feature among the 77M MAU base
      whyItMatters: >-
        Anonymous Mode was the headline privacy response to post-Roe fears; its adoption rate indicates breadth of user
        privacy concern and uptake of the open-source feature
      diligencePath: >-
        Request Anonymous Mode monthly active account count from Flo; review IETF/open-source fork activity for
        ecosystem adoption
      relatedQuestionRefs:
        - QU023
        - QU024
    - type: private-evidence-only
      severity: minor
      topic: b2b-channel
      missingEvidence: Flo for Business corporate client count, average contract value, and renewal rate
      whyItMatters: >-
        B2B channel could become a meaningful revenue and retention diversifier; without metrics, it cannot be sized in
        the model
      diligencePath: Request enterprise sales data from Flo management; identify any publicly announced employer partnerships
      relatedQuestionRefs:
        - QU028
    - type: enumeration-incomplete
      severity: minor
      topic: named-customer-proof
      missingEvidence: Named individual user case studies with quantified health outcomes for TTC, perimenopause, and PCOS users
      whyItMatters: >-
        App store aggregates prove scale but not depth; named outcome proof builds diligence confidence and supports
        enterprise sales materials
      diligencePath: >-
        Request case studies or anonymized user outcome data from Flo; review academic publications co-authored with Flo
        (Mayo Clinic collaboration)
      relatedQuestionRefs:
        - QU016
      relatedTableRefs:
        - TU003
