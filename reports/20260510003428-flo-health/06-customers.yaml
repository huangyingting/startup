  - id: customer-proof-satisfaction-and-retention
    title: Customer Proof, Satisfaction & Retention
    body: >
      Flo's core customer proof comes primarily from app store ratings and Trustpilot reviews rather than named
      enterprise deployments, reflecting the direct-to-consumer nature of the product. The iOS US App Store 4.8/5 rating
      from 1.9 million raters and Android 7 million five-star ratings represent the largest independently verifiable
      corpus of customer satisfaction at scale for any femtech product. Positive review themes center on cycle accuracy,
      content quality, symptom tracking utility, and the app's role as a long-term health companion — one Trustpilot
      reviewer notes using Flo since 2018.

      Adverse signals are concentrated in three areas: (1) subscription billing complaints — multiple Trustpilot users
      report being charged after cancellation or inadvertent subscription activation; (2) content personalization gaps —
      menopausal users find cycle-irrelevant content (e.g., pregnancy info) displayed despite stated preferences; and
      (3) data privacy concerns — some users express discomfort with targeted ad correlation to app health inputs. These
      complaints closely mirror the FTC's 2021 consent order findings that Flo shared sensitive health data with third
      parties (Facebook, Google) without adequate disclosure.

      Retention is structurally supported by switching costs (years of logged health data within Flo's proprietary
      format), monthly recurrence of the tracked health event (the menstrual cycle), and premium feature depth. However,
      no independently audited NRR, GRR, or cohort retention figures have been disclosed. The businessofapps estimate of
      5 million premium subscribers at $275 million revenue implies retention sufficient to sustain year-over-year
      revenue growth of 4.5%. The class-action lawsuit settlement disclosed in Flo's newsroom (resolved without
      admission of wrongdoing) adds historical reputational risk but appears not to have materially depressed
      subscription growth.
    claimRefs:
      - CU017
      - CU018
      - CU019
      - CU020
      - CU021
      - CU022
      - CU023
      - CU024
      - CU025
    tableRefs:
      - TU003
    figureRefs:
      - FU002
      - FU003
  - id: expansion-concentration-and-risks
    title: Expansion Pathways & Concentration Risks
    body: >
      Flo's expansion strategy operates on three vectors: (1) life-stage expansion — the perimenopause mode targets 1
      billion+ women aged 40+ who are systematically underserved; (2) geographic expansion — Pass It On provides free
      Premium access in 66 countries, building brand equity and potential future conversion in emerging markets; and (3)
      channel expansion — Flo for Business targets corporate wellness buyers, and FSA/HSA eligibility (US, since October
      2024) opens a new payment mechanism for existing US subscribers.

      Concentration risks are notable. Platform dependency on Apple App Store and Google Play creates margin and
      distribution risk: Apple typically takes a 15–30% cut of in-app purchases, and any policy change (privacy rules,
      content restrictions, ranking algorithm shifts) could suppress acquisition or increase CAC. Over-reliance on a
      single demographic cohort (18–35 women) means Flo's core MAU base faces natural graduation out of peak tracking
      years, requiring continuous cohort replenishment and successful perimenopause retention. The 2021 FTC enforcement
      action and ongoing class-action sensitivity create legal concentration risk if privacy practices face renewed
      regulatory scrutiny post-Roe.

      Geographic concentration is unknown without disclosed regional MAU splits, but the US is likely the single largest
      revenue market given App Store ratings skew and pricing. EU GDPR compliance adds compliance overhead for European
      users. The Pass It On program, while prosocial, does not generate direct revenue from 12 million users in 66
      countries, creating a cross-subsidy dependency on Premium Western subscribers. Key competitor Natural Cycles
      (FDA-cleared) and Apple Health's built-in cycle tracking represent platform-level substitution risk for the core
      tracking use case.
    claimRefs:
      - CU026
      - CU027
      - CU028
      - CU029
      - CU030
      - CU031
      - CU032
      - CU033
    tableRefs:
      - TU004
tables:
  - id: TU001
    title: Customer Segmentation by Segment
    columns:
      - Segment
      - Primary User Profile
      - Use Case
      - Scale / Signal
      - Revenue / Strategic Value
      - Evidence Gap
    rows:
      - - Menstrual Health Trackers
        - Women 18–35, regular or irregular cycles
        - Period prediction, symptom logging, cycle insights
        - Largest MAU segment; primary funnel
        - Core free-to-premium conversion engine
        - No disclosed MAU split by segment
      - - TTC / Fertility
        - Women 25–38 actively trying to conceive
        - Ovulation tracking, BBT, fertile window accuracy
        - High-engagement; premium conversion rate likely above average
        - High LTV — fertility urgency drives faster premium upsell
        - No NRR or retention data by segment
      - - Pregnancy Trackers
        - Women 25–40 newly pregnant
        - Week-by-week pregnancy guidance, symptom tracking
        - Transient cohort; acquired from TTC or cycle users
        - Medium LTV; churn risk at birth
        - No post-birth retention data
      - - Perimenopause
        - Women 40–55 experiencing cycle irregularity
        - Perimenopause Score, mood/sleep tracking, symptom monitoring
        - 1B+ addressable globally; mode launched 2023
        - Strategic long-term growth driver; nascent monetization
        - Limited cohort data on perimenopause mode retention
      - - Partners
        - Male/female partners of primary users
        - Cycle visibility, pregnancy updates, partner notifications
        - Companion feature; not a separate MAU segment
        - Relationship stickiness; low direct revenue
        - No partner account count disclosed
      - - B2B / Employer
        - Corporate HR buyers via Flo for Business
        - Employee wellness, inclusive health benefit
        - Small fraction of total revenue; early stage
        - Higher ACV per corporate account vs. individual
        - No disclosed enterprise customer count or ARR
    notes: >-
      Segment scale estimates based on app store descriptions, businessofapps, and press reports; no official
      segment-level MAU disclosed. All cells except Scale/Signal are based on public product feature information.
