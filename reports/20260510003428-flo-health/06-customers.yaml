callouts:
  - calloutType: strength
    title: App Store Ratings at Scale Validate Product-Market Fit
    body: >
      Flo's 4.8/5 iOS rating from 1.9 million US raters and 7 million Android five-star ratings are the strongest
      third-party validation available for any femtech product. At this rating count, selection bias has diminished
      significance — satisfied and dissatisfied users both contribute. This level of sustained rating from a
      predominantly free user base suggests genuine product utility and favorable word-of-mouth retention.
    claimRefs:
      - CU017
      - CU018
  - calloutType: risk
    title: Premium Subscription Billing Complaints Signal Churn Risk
    body: >
      Trustpilot's adverse review tail — including multiple complaints of post-cancellation charges, failed in-app
      cancellation, and unexpected Apple subscription charges — indicates friction in the premium offboarding
      experience. This pattern is common in freemium health apps and typically inflates refund rates and App Store
      dispute tickets. If unresolved, it could amplify churn among the ~5M premium subscriber base and depress renewal
      rates.
    claimRefs:
      - CU019
      - CU025
      - CU030
  - calloutType: risk
    title: Data Privacy Regulatory Risk Remains a Material Overhang
    body: >
      The 2021 FTC consent order (sharing health data with Facebook and Google), a subsequent class-action settlement,
      and post-Roe legislative environment in the US create persistent regulatory exposure. Women's fear of period
      tracking data being used in legal proceedings drove measurable demand for Anonymous Mode — a feature Flo had to
      retroactively build. GDPR enforcement in the EU and US state privacy laws (CCPA, Colorado, Virginia) impose
      ongoing compliance costs and limit permissible data uses, constraining Flo's data monetization optionality.
    claimRefs:
      - CU029
      - CU031
      - CU032
      - CU033
  - calloutType: insight
    title: Perimenopause Mode Is the Critical Long-Term Retention Lever
    body: >
      Flo's core 18–35 age band naturally ages out of peak cycle-tracking years. Without perimenopause retention, MAU
      growth would require pure new-cohort replacement. The 2023 perimenopause mode — developed in collaboration with
      Mayo Clinic for a global study — targets a 1 billion+ addressable market that is systematically underserved by
      existing digital health products. Successful perimenopause adoption would extend average user lifetime from
      roughly 15–17 years (menarche to menopause) to 25+ years, significantly improving LTV.
    claimRefs:
      - CU006
      - CU026
      - CU027
