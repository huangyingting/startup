company:
  name: Flo Health
chapter:
  number: 6
  title: Customers
  chapterLetter: U
  summary: >
    Flo Health serves approximately 77 million monthly active users (2025) across the full female reproductive health
    lifecycle — menstrual tracking, TTC, pregnancy, and perimenopause — with a core demographic of women aged 18–40
    expanding into 40+. App store ratings of 4.8/5 (iOS US, 1.9M ratings) and 7 million five-star Android ratings
    confirm broad satisfaction, while Trustpilot complaints about billing, cancellation, and data-relevance signal
    meaningful churn risk among premium subscribers. Approximately 5 million users pay for Flo Premium; the 2021 FTC
    settlement and post-Roe privacy fears remain concentration risks for international growth.
sections:
  - id: customer-segmentation-and-demographics
    title: Customer Segmentation & Demographics
    body: >
      Flo Health's primary customer is a woman aged 18–40 who seeks structured cycle tracking integrated with health
      insights. The app targets four core life-stage segments: (1) menstrual health trackers, representing the largest
      cohort and the primary acquisition funnel; (2) fertility and TTC (trying-to-conceive) users, who engage more
      deeply with ovulation and BBT tracking; (3) pregnancy trackers, who transition from cycle tracking after
      conception; and (4) perimenopause users, a strategic growth segment launched in 2023 targeting the 1 billion+
      women globally experiencing perimenopause. Secondary users include partners accessing the "Flo for Partners"
      companion feature.

      Geographically, Flo reaches users across North America, Europe, and APAC. The app has been downloaded by over 460
      million users in total as of March 2026 (per App Store listing). The Google Play listing states 430 million
      members across all platforms. No official country-by-country breakdown is disclosed, but the app supports 20+
      languages and is accessible globally. The Pass It On program extends free Premium access to 12 million users in 66
      lower-income countries, broadening geographic diversity beyond paying Western markets.

      Premium subscription buyers skew toward users seeking deeper personalization: cycle insights, fertility window
      accuracy, symptom tracking for conditions such as PCOS and endometriosis, and AI-powered health assistant access.
      Free users consume content, basic tracking, and community features. The buyer-payer identity is direct-to-consumer
      (individual women paying via App Store, Google Play, or Flo's web checkout), with the employer channel (Flo for
      Business) offering a small but growing B2B distribution path.
    claimRefs:
      - CU001
      - CU002
      - CU003
      - CU004
      - CU005
      - CU006
      - CU007
    tableRefs:
      - TU001
      - TU005
  - id: adoption-and-growth-trajectory
    title: Adoption & Growth Trajectory
    body: >
      Flo's monthly active user base grew from 22 million in early 2018 to 70 million by June 2024 and 77 million by
      2025, a compound trajectory of roughly 20–25% annually. Annual downloads reached 48.6 million in 2025, indicating
      sustained new-user acquisition. Total registered users across all platforms exceed 430–460 million, reflecting
      years of cumulative installs including churned or lapsed users.

      The conversion from free to premium is estimated at approximately 6–8% of MAU, with approximately 5 million paying
      subscribers as of recent reporting. Subscription revenue reached $275 million in 2025 (a 4.5% increase on 2024's
      $263 million), implying an average revenue per subscriber of roughly $55 per year, consistent with a predominantly
      annual-plan pricing model. IQVIA's digital health market research confirms that the top tier of health apps
      achieves 5–10% paid conversion, placing Flo at the upper boundary of typical consumer health app conversion.

      App store ratings are strong: iOS (US) earns 4.8 out of 5 from 1.9 million ratings, and Google Play reports 7
      million five-star ratings out of 430 million total members. The UK iOS store shows 4.7 out of 5 from 279,000
      ratings. Trustpilot rates flo.health at 4.3 out of 5 ("Excellent") but surfaces a meaningful tail of complaints
      around subscription billing, cancellation friction, and content personalization — a pattern common in freemium
      health apps where premium upsell is aggressive.

      Growth drivers include organic search dominance in reproductive health queries, iOS App Store #1 ranking in Health
      & Fitness by downloads, perimenopause product expansion, and the Anonymous Mode feature (TIME Best Inventions
      2023) that re-engaged privacy-conscious users post-Roe. Smartphone penetration of 91% among US adults (Pew
      Research, 2025) provides the addressable platform for continued growth.
    claimRefs:
      - CU008
      - CU009
      - CU010
      - CU011
      - CU012
      - CU013
      - CU014
      - CU015
      - CU016
