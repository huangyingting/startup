  - id: TU005
    title: Expansion Drivers and Concentration Risks
    columns:
      - Driver / Risk
      - Type
      - Current Status
      - Potential Impact
      - Diligence Path
    rows:
      - - Perimenopause mode expansion
        - Expansion driver
        - Launched 2023; 1B+ addressable women globally
        - High — extends user lifetime beyond 35; increases premium LTV
        - Track perimenopause mode MAU and premium conversion separately
      - - FSA/HSA eligibility (US)
        - Expansion driver
        - Active since Oct 2024; US only
        - Medium — reduces friction for premium purchase decision
        - Assess premium conversion lift in US post-eligibility launch
      - - Pass It On / prosocial program
        - Expansion driver
        - Active in 66 countries; 12M free recipients
        - Low-medium direct revenue; high brand equity and future conversion potential
        - Quantify conversion rate from Pass It On users to paid
      - - Flo for Business / employer channel
        - Expansion driver
        - Early stage; no disclosed revenue
        - Medium long-term — corporate buyer reduces CAC
        - Request employer customer count and renewal rate
      - - Apple / Google platform dependency
        - Concentration risk
        - 15–30% platform fee on in-app purchases
        - High — any fee increase or policy change directly compresses margins
        - Negotiate direct-web subscription share; disclose channel mix
      - - Single demographic concentration
        - Concentration risk
        - Core user 18–35 women; graduation risk
        - Medium — cohort naturally ages out; perimenopause must compensate
        - Monitor MAU by age cohort; assess perimenopause conversion among 35+ users
      - - US / EU regulatory exposure
        - Concentration risk
        - FTC consent order (2021); GDPR (EU); post-Roe scrutiny
        - High — renewed enforcement could restrict data practices or require costly restructuring
        - Obtain updated legal opinion on GDPR and US state privacy law compliance
      - - Competitive substitution (Apple Health)
        - Concentration risk
        - Apple Health added cycle tracking natively in iOS 16+
        - Medium — free native tracking erodes premium value proposition for basic users
        - Monitor Apple Health feature parity; track overlap in user churn surveys
    notes: >-
      Impact ratings are qualitative assessments based on public evidence; no internal Flo scenario analysis is
      available. Expansion estimates rely on addressable market proxies.
