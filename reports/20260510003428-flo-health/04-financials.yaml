artifact: financials
slug: flo-health
runDate: "2026-05-10"
company:
  name: Flo Health

chapter:
  number: 4
  title: Financials
  summary: |
    Flo Health operates a freemium subscription model priced at $59.99 per year, with approximately
    5 million paying subscribers out of 70–77 million MAU (≈7% conversion) generating gross bookings
    exceeding $200M in 2024. Third-party revenue estimates for 2025 diverge materially—Business of Apps
    at $275M versus GetLatka at $157.6M—and no audited financials exist for independent verification.
    General Atlantic's $200M+ Series C (July 2024) at a $1B+ valuation provides runway, and the CEO
    confirmed positive cash flow as of that date; however, unit economics inputs (CAC, churn, LTV) are
    entirely undisclosed, and litigation costs from the FTC settlement and ongoing class actions represent
    contingent liabilities that require data-room verification.

sections:
  - id: revenue-model-unit-economics
    title: Revenue Model and Unit Economics
    body: |
      Flo Health's revenue model is anchored on a direct-to-consumer freemium subscription. The free
      tier provides period tracking, cycle prediction, basic symptom logging, and access to Anonymous
      Mode. Flo Premium—priced at $59.99 per year (or approximately $13 per month) for individual
      subscribers, and $79.99 per year for family plans—unlocks the AI-powered Ask Flo health
      assistant, personalized health insights, expert articles, detailed cycle analytics, and Secret
      Chats community features. As of June 2024, Flo counted approximately 70 million monthly active
      users and approximately 5 million paying subscribers, implying a freemium-to-paid conversion
      rate of roughly 7%. The company reported gross bookings exceeding $200 million in 2024,
      representing approximately 50% year-over-year growth per General Atlantic's announcement. The
      Pass It On Project extends complimentary premium access to approximately 12 million women across
      66 countries (India, Indonesia, Nigeria, and others), a social-impact program that carries an
      operational cost but no subscription revenue. Flo's revenue is collected primarily through
      Apple App Store and Google Play in-app purchases, where platform fees of 15–30% materially
      reduce net revenue per subscriber to an estimated $42–$51 per year. No confirmed B2B enterprise
      licensing or advertising revenue streams are publicly documented; the company appears to be
      purely subscription-funded. Annual subscription prepayments are the dominant billing format,
      which is positive for working capital but obscures the underlying churn dynamics. Revenue per
      paying user, churn rate, CAC, and LTV are entirely undisclosed by the company, representing
      the largest unit-economics gap in this chapter.
    claimRefs: [CI001, CI002, CI003, CI004, CI005, CI006, CI007, CI008, CI009, CI010, CI011, CI012]

  - id: capital-structure-funding
    title: Capital Structure and Funding Sufficiency
    body: |
      Flo Health has raised approximately $299 million in total equity funding across multiple
      rounds. The company's SEC EDGAR filing records (CIK 0001752100) confirm that Flo Health, Inc.
      is incorporated in Delaware, and the only formal SEC filing is a Form D (accession
      0001752100-18-000002), which records a $750,000 equity offering with a first sale date of
      July 24, 2018, and lists Yury Hurski as CEO at that time. This Form D appears to correspond
      to an internal or early-stage round not covered in public press. Flo's subsequent funding
      history, drawn from Company Overview context, includes a $1M seed (2016), a $5M Series A
      (2017), a $6M Series A extension (2018), a $7.5M late-stage A from Founders Fund (2019), a
      $50M Series B led by VNV Global and Target Global at an $800M valuation (2021), and a
      transformative Series C of $200M+ led by General Atlantic in July 2024 at a $1B+ valuation.
      General Atlantic's minority stake implies the company's post-money valuation exceeded $1B;
      exact ownership dilution is not disclosed. GP Bullhound served as the financial adviser on
      the Series C. No venture debt or credit facilities are publicly documented; the only SEC
      filing is the 2018 Form D for equity. Cash on hand post-Series C is not publicly disclosed,
      but the CEO's statement of positive cash flow in July 2024 suggests the company did not raise
      the Series C out of necessity. Flo's parent entity is Palta, with Yuri Gurski (co-founder
      and President of Flo) serving as Palta's CEO; inter-company financial relationships and
      whether Palta makes capital demands on Flo are not publicly documented and represent a
      material diligence gap.
    claimRefs: [CI013, CI014, CI015, CI016, CI017, CI018, CI019, CI020, CI021, CI022]

  - id: revenue-growth-public-estimates
    title: Revenue Growth and Public Estimates
    body: |
      Flo's revenue trajectory has accelerated significantly since its commercial launch. Third-party
      estimates suggest revenue grew from approximately $20 million in 2018 to approximately $75
      million in 2020, and the company itself confirmed gross bookings exceeding $200 million in
      2024 at approximately 50% year-over-year growth. For fiscal year 2025, two independent
      analyst-data aggregators diverge materially: Business of Apps estimates $275 million in
      annual revenue based on subscription volume analysis, while GetLatka reports $157.6 million
      based on a different methodology. This 75% variance—$117 million in absolute terms—makes
      it impossible to value the company reliably without audited financials. CompWorth estimates
      an enterprise value of approximately $1.2–1.5 billion as of 2025, consistent with the Series C
      post-money valuation range. Revenue CAGR from 2018 to 2024 is estimated at 45–50%,
      driven by subscriber growth from the free base and steadily expanding premium pricing. In
      comparison, Natural Cycles—Flo's closest pure-play femtech competitor—reported revenue
      of approximately $33 million in fiscal 2023, illustrating Flo's meaningful scale advantage.
      Subscriber count grew to approximately 5 million by mid-2024, and the total registered user
      base (cumulative downloads) reached 430–460 million by 2025–2026. Annualizing the $200M+
      gross bookings for 2024 at an estimated 50% YoY growth rate suggests a forward run rate of
      $300M+ in bookings for 2025, which roughly corroborates the Business of Apps estimate. No
      ARR figure has been officially disclosed; all revenue estimates are derived from third-party
      data or company-stated gross bookings guidance, neither of which have been independently
      audited.
    claimRefs: [CI023, CI024, CI025, CI026, CI027, CI028, CI029, CI030]

  - id: cost-structure-profitability
    title: Cost Structure and Path to Profitability
    body: |
      Flo Health operates as a software subscription business with no physical distribution, no
      inventory, and no manufacturing costs—the cost structure is dominated by R&D and engineering
      (including AI infrastructure), sales and marketing, and personnel. The company employed an
      estimated 685–700+ staff as of 2025 per third-party headcount estimates. CEO Dmitry Gurski
      stated in July 2024 that Flo was already generating positive operating cash flow, a notable
      milestone for a consumer health app at its scale and an encouraging signal for the capital
      efficiency of the freemium subscription model. Flo's 2025 adoption of the Databricks Data
      Intelligence Platform signals substantial AI and data infrastructure investment, with
      associated recurring licensing costs that increase the marginal cost of delivering AI-powered
      features such as Ask Flo. For a software-only subscription business at Flo's scale, gross
      margins are typically in the 70–80%+ range; however, Flo's actual gross margin is not
      publicly disclosed, and the App Store/Google Play commission burden (15–30% of IAP revenue)
      materially reduces net revenue relative to gross bookings. Operating expenses are distributed
      across R&D, marketing, and personnel but no GAAP-equivalent breakdown is available. Capital
      expenditure is expected to be minimal given the software-only delivery model, with the
      primary capital intensity in cloud compute for AI model serving. The 12-million-user Pass It
      On Project carries a cost-of-service burden (cloud, content delivery) without any offsetting
      revenue, suggesting some margin compression from social-impact commitments. Positive cash
      flow, if accurate, implies either very high gross margins or disciplined operating expenditure
      relative to the revenue base—both of which require audit-level verification.
    claimRefs: [CI033, CI034, CI035, CI036, CI037, CI038, CI039, CI040]

  - id: financial-risks-verdict
    title: Financial Risks and Diligence Verdict
    body: |
      Flo Health's financial profile presents several material diligence blockers that prevent
      reliable underwriting from publicly available data alone. First and most critical: no audited
      financial statements exist. The 75% variance between Business of Apps ($275M) and GetLatka
      ($157.6M) revenue estimates for 2025 means the choice of estimate alone could shift a
      DCF-based valuation by 30–40%. Second, the FTC consent order (closed June 2021) imposed no
      monetary penalty but required consent mechanisms and third-party data deletion; the total
      compliance cost to Flo is undisclosed. The 2025 California class action settlement cost Flo
      $8 million (Google paid the remaining $48 million of the $56M total). A ninth-circuit appeal
      (Frasco et al. v. Flo Health, case 25-3496, filed June 2025) remains pending, and the
      British Columbia class action (Clements v. Flo Health, 3:21-cv-06147) represents a continuing
      contingent liability. Third, the positive cash flow claim by the CEO (July 2024) is unverified
      by independent audit; if the company drew on Series C proceeds for operations, the underlying
      operating cash flow may be negative. Fourth, platform concentration risk is elevated: Apple
      and Google collectively control IAP distribution and pricing, and any commission increase
      or policy change—such as Apple's ongoing enforcement actions—could materially reduce net
      revenue per subscriber. Finally, geographic revenue concentration is unknown; if most revenue
      comes from the US, GDPR and post-Dobbs regulatory risk from a single market would be
      heightened. The financial verdict is that Flo Health has demonstrated impressive revenue
      scale and growth velocity for a consumer subscription business, but the absence of audited
      financials, undisclosed unit economics, ongoing litigation, and platform dependency collectively
      require a comprehensive data-room engagement before any reliable valuation can be established.
    claimRefs: [CI041, CI042, CI043, CI044, CI045, CI046, CI047, CI048, CI049, CI050]

