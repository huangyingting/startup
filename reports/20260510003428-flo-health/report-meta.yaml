companyProfile:
  summary: "Flo Health is the world's leading women's health platform, offering an AI-powered period, ovulation, fertility, and pregnancy tracking app. Founded in 2015 in Minsk, Belarus by brothers Dmitry and Yuri Gurski with CTO Roman Bugaev, Flo achieved unicorn status in July 2024 following a $200M+ Series C from General Atlantic at a $1B+ valuation. The app has 77M monthly active users and approximately 5M paid subscribers in 2025, generating an estimated $157M–$275M in annual revenue. Flo is operationally headquartered in London with its largest office in Vilnius, Lithuania, and a team of 685–700+ across 56% female employees and 120+ in-house medical experts. The company has been cash-flow positive per CEO statement and is investing in AI capabilities (Databricks partnership, AWS MACROS system), perimenopause expansion, and clinical research (Mayo Clinic partnership)."
  foundedDate: "2015-08-01"
  founders:
    - name: "Dmitry Gurski"
      role: "Co-founder & CEO"
      background: "Self-taught Belarusian entrepreneur who identified gap in women's health app market; leads Flo as primary strategic executive."
      claimRefs: [CO009]
    - name: "Yuri Gurski"
      role: "Co-founder & President / CEO Palta"
      background: "Twin brother of Dmitry; prior startups acquired by Facebook and Google; Executive MBA; journalism background."
      claimRefs: [CO009, CO010]
    - name: "Roman Bugaev"
      role: "Co-founder & CTO"
      background: "Technology co-founder; architect of Anonymous Mode (Oblivious HTTP) and Flo's AI/ML infrastructure."
      claimRefs: [CO012]
    - name: "Andrew Kovzel"
      role: "Co-founder"
      background: "Early product/engineering co-founder; limited public profile post-founding."
      claimRefs: [CO009]
  foundingLocation: "Minsk, Belarus"
  headquarters: "London, United Kingdom (largest office: Vilnius, Lithuania)"
  productSummary: "Freemium mobile app (iOS + Android, 22 languages) for period/ovulation/fertility/pregnancy tracking, perimenopause monitoring, AI-powered health insights (Ask Flo assistant), and anonymous reproductive health data management (Anonymous Mode). Flo Premium ($59.99/yr) unlocks advanced AI features, expert content, Secret Chats, and personalized health coaching."
  customerFocus: "Women aged 18–45 globally for reproductive health tracking; expanding into peri/menopause segment (40–60+ age group)."
  businessModel: "Freemium B2C subscription: free tier (period/cycle tracking) with ~7% conversion to Flo Premium ($59.99/yr or ~$13/month); pro-social pass-it-on program offers free premium in 66 countries (12M users). No direct advertising model."
  stage: "Series C (unicorn, $1B+ valuation)"
  fundingStatus: "$200M+ Series C from General Atlantic (July 2024); total raised ~$299M across seed, Series A/A-ext, $7.5M Founders Fund, $50M Series B (VNV Global/Target Global), and Series C."
