summary:
  headline: >-
    Flo Health is the dominant consumer femtech app globally with a defensible data moat, strong MAU growth, and
    confirmed positive cash flow, but opaque financials, ongoing privacy litigation, and Apple's native competition
    constrain the risk-adjusted upside at $1B+ valuation.
