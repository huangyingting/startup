  evidenceGaps:
    - type: private-evidence-only
      severity: material
      topic: cap-table-ownership
      missingEvidence: >-
        Exact ownership stakes of each investor class (General Atlantic, VNV Global, Target Global, Mangrove, Flint
        Capital) and founders' current equity positions
      whyItMatters: Without cap table data, economic dilution, control rights, and alignment of interests cannot be fully assessed
      diligencePath: Request cap table and shareholder agreement from management; cross-check with GP Bullhound Series C documents
      relatedQuestionRefs:
        - QO019
      relatedTableRefs:
        - TO003
    - type: missing-source
      severity: minor
      topic: milestone-historical-dates
      missingEvidence: >-
        Precise dates for early product milestones (2015–2019) and any major events not covered in public press releases
        (e.g., product discontinuations, team restructurings)
      whyItMatters: Milestone Table partial coverage limits historical narrative completeness
      diligencePath: Request company timeline from management; review Lithuanian and Belarusian business registry filings
      relatedTableRefs:
        - TO004
    - type: private-evidence-only
      missingEvidence: Any existing debt, venture debt, convertible notes, or credit facilities outstanding at Flo Health
      whyItMatters: Undisclosed debt would affect net equity value, covenant restrictions, and cash runway calculations
      diligencePath: >-
        Review financial statements and legal due diligence; check for UK Companies House filings on any Flo Health UK
        entity
      relatedQuestionRefs:
        - QO021
    - type: private-evidence-only
      severity: material
      topic: revenue-audited
      missingEvidence: >-
        Audited financial statements or revenue confirmation from Flo Health; wide range between $157.6M–$275M in 2025
        estimates
      whyItMatters: >-
        Revenue is the primary growth and valuation metric; unaudited estimates from third-party sources lack
        reliability
      diligencePath: Request management accounts, audited financials, or at minimum a data room revenue confirmation
      relatedQuestionRefs:
        - QO006
    - type: missing-source
      severity: minor
      topic: geographic-revenue-split
      missingEvidence: Revenue or user breakdown by geography (North America vs. Europe vs. APAC vs. emerging markets)
      whyItMatters: Geographic mix affects regulatory risk exposure (US vs. EU/UK GDPR) and growth opportunity assessment
      diligencePath: Request management accounts segmented by geography; check investor presentations
      relatedQuestionRefs:
        - QO015
    - type: missing-source
      severity: minor
      topic: palta-structure
      missingEvidence: >-
        Details of Palta (parent entity) corporate structure, its other assets/subsidiaries beyond Flo Health, and Yuri
        Gurski's dual CEO role implications
      whyItMatters: Inter-company dependencies and parent company financial health could affect Flo Health's standalone operations
      diligencePath: Research Palta corporate filings; request organizational chart and inter-company agreements
      relatedQuestionRefs:
        - QO011
    - type: missing-source
      severity: minor
      topic: peer-valuation-comparison
      missingEvidence: >-
        Published valuation multiples or comparable transaction data for peer femtech companies (Natural Cycles, Clue,
        Ovia) to benchmark Flo Health's $1B+ valuation in 2025–2026
      whyItMatters: >-
        Valuation benchmarking against peers is essential for investment merit assessment; without peer data, the $1B
        valuation cannot be contextualized
      diligencePath: See Valuation chapter for full comp analysis; Natural Cycles annual reports, femtech M&A databases
      relatedQuestionRefs:
