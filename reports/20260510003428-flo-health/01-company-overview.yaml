  - id: scale-metrics-milestones
    title: Scale Metrics and Key Milestones
    body: |
      Flo's growth trajectory has been exceptional for consumer health. From 2 million active
      users in its first year (2016–17) to over 77 million monthly active users by 2025, the app
      has compounded user growth at an estimated 40%+ CAGR over nine years. Downloads have grown
      from 380 million (November 2024 per Wikipedia) to 430–460 million (Google Play and Apple App
      Store, 2026), reflecting continued global expansion.

      Revenue grew from $20M (2018) to $75M (2020) to an estimated $200M+ gross bookings in 2024,
      with full-year 2025 revenue estimated at $275 million by Business of Apps (based on
      subscription data) or $157.6 million by GetLatka (a lower-tier estimate with different
      methodology). The Business of Apps estimate appears better corroborated by the company's
      own gross bookings guidance.

      The company published a first-of-its-kind global perimenopause study in partnership with
      Mayo Clinic in the journal Menopause, drawing on data from over 17,000 women across 158
      countries—evidence of Flo's transition from consumer app to clinical research platform.
      Flo's Anonymous Mode (launched September 2022) was recognized on TIME's Best Inventions
      2023 list and Fast Company's World Changing Ideas 2023. The company received ISO/IEC 27001
      (Information Security) and ISO/IEC 27701 (Privacy) certifications, and won the 2025
      PICCASO Privacy and Security Awards for ISO 27001 team of the year.
