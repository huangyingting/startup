  - id: adverse-signals
    title: Adverse Events and Regulatory History
    body: |
      Flo Health's most significant adverse event is the Federal Trade Commission (FTC) complaint
      and settlement. Beginning in 2020, the FTC alleged that Flo had shared users' sensitive
      health data—including menstrual and fertility information—with third parties including Google,
      Facebook (via Facebook Analytics), AppsFlyer, and Flurry since 2016, despite repeatedly
      promising users in its privacy policy that such data would not be shared. The company reached
      a settlement in August 2021 requiring it to: (1) obtain user consent before sharing health
      data; (2) instruct third parties to delete the health data they had received; and (3) undergo
      an independent privacy audit. No monetary penalty was imposed, but the behavioral requirements
      were substantial. The privacy audit was completed in March 2022.

      A Wall Street Journal investigation in January 2019 first surfaced the data-sharing practices.
      In March 2024, the Supreme Court of British Columbia certified a class action against Flo
      regarding the same data practices. In 2025, a California class action arising from the same
      data-sharing episode was settled for $56 million total—Flo paid $8 million and Google paid
      $48 million. However, a federal judge in the California case notably described the lack of
      evidence supporting allegations that Flo improperly shared menstrual cycle data with Meta
      as an "insurmountable" problem, providing partial vindication.

      These adverse events represent a meaningful governance risk and customer trust exposure,
      particularly given the sensitivity of reproductive health data in the post-Roe v. Wade
      environment. Flo has since implemented Anonymous Mode and dual ISO certifications to
      address data privacy concerns.
