callouts:
  - calloutType: strength
    title: First-mover Femtech Unicorn
    body: |
      Flo became the first purely digital consumer women's health app to achieve unicorn status
      in July 2024, a milestone that signals both the scale of its user base (70M+ MAU, 5M+
      paid subscribers) and the market's confidence in the freemium subscription model for
      consumer health. The 50% YoY gross bookings growth and confirmed positive cash flow
      position Flo uniquely among femtech peers.
    claimRefs:
      - CO001
      - CO022
      - CO026
      - CO007
  - calloutType: risk
    title: FTC Settlement and Ongoing Privacy Litigation
    body: |
      The 2021 FTC settlement over sharing sensitive reproductive health data with Facebook,
      Google, and others, combined with the 2024 BC class action certification and 2025
      California class action settlement ($56M total), represent a persistent reputational
      and governance risk. In the post-Roe v. Wade environment, user trust around reproductive
      data privacy is existential for Flo's market position.
    claimRefs:
      - CO034
      - CO035
      - CO036
      - CO037
      - CO038
      - CO039
