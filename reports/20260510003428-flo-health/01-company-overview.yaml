  - id: funding-history-capital-structure
    title: Funding History and Capital Structure
    body: |
      Flo Health has raised approximately $299 million in total funding across multiple rounds.
      The company began with a $1 million seed round in 2016 from Flint Capital and Haxus Venture
      Fund. This was followed by a $5 million Series A in 2017 from Flint Capital and model/investor
      Natalia Vodianova, and a $6 million Series A extension in 2018 from Mangrove Capital Partners
      (with Flint Capital and Haxus participation) at an implied valuation of approximately $200M.
      In mid-2019, Founders Fund led an additional $7.5 million investment.

      The Series B of $50 million closed in September 2021, led by VNV Global and Target Global,
      which valued the company at $800 million. This represented substantial appreciation despite
      coinciding with the FTC settlement. By the Series B, the total raised prior to Series C was
      approximately $99.45 million.

      The transformative round came on July 30, 2024, when General Atlantic led a $200M+ Series C
      that pushed Flo's valuation above $1 billion—the first purely digital consumer women's health
      unicorn. The company had seen "significant inbound interest" according to CEO Gurski and
      selected General Atlantic for their "deep expertise in scaling companies at the intersection
      of consumer technology, healthcare, and subscription business models." The company is
      private-undisclosed with no public financial filings; revenue and headcount estimates
      come from third-party data sources that may carry material uncertainty.
