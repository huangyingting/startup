    evidenceGap:
      type: private-evidence-only
      severity: material
      topic: comparable-valuation
      missingEvidence: "Confirmed revenue and valuation multiples for Noom, Calm, and Headspace post-2022. Natural Cycles' most recent annual report with confirmed revenue and market cap. Disclosed acquisition price for Ovia Health."
      whyItMatters: "Without confirmed revenue multiples for closest peers, the comp table relies on peak-cycle estimates that may overstate achievable multiples in the 2024–2026 environment."
      diligencePath: "Obtain Natural Cycles 2024 annual report from Nasdaq First North investor relations. Use PitchBook or Bloomberg data for Noom/Calm private-market marks. Request comparable transactions from M&A banker."
      relatedQuestionRefs: [QV006, QV010, QV025]
      relatedTableRefs: [TV004]
