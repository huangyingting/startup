  - dimension: paywallRisk
    reason: >
      Fifteen of twenty-five sources in this chapter have accessStatus broken, rate-limited, or js-only. These
      restricted sources were all fetched via fetch-url during this research run, confirmed via the fetch trail log. The
      broken fetches are due to 404 errors on pages that moved or were restructured since original publication
      (TechCrunch, FDA, BusinessOfApps), Cloudflare blocks (Crunchbase), or JavaScript-only rendering (NYT). The
      chapter's ten fully-accessible sources from ten distinct registrable domains provide sufficient primary and
      secondary evidence for all high-confidence claims. The broken sources are cited only for low-confidence or
      estimated claims where they corroborate third-party-reported facts already supported by accessible sources.
