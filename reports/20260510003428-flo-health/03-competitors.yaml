  - id: displacement-risk
    title: Displacement, Substitution, and Adverse Competitive Evidence
    body: >
      The most plausible displacement scenario for Flo is gradual share erosion by Apple Cycle Tracking rather than
      sudden competitive defeat. Apple's free native feature reaches every iPhone user without download friction, and
      Apple iterates on health features along a well-established historical pattern: it enters a category with a minimal
      viable feature, then progressively improves it until the value delta between its free version and competing paid
      apps narrows. The 2025–2026 Apple Cycle Tracking feature roadmap is not publicly disclosed, constituting a
      material strategic uncertainty. Apple's on-device data architecture also pre-empts the trust argument that
      dedicated apps use as a differentiator.

      Natural Cycles presents a different risk: rather than a substitute for Flo's general tracking, it is a clinical
      upsell from cycle tracking into regulated contraception. As Natural Cycles expands distribution—through pharmacy
      channel partnerships, prescription reimbursement, or employer benefits—it could permanently convert Flo's
      highest-intent users (those seeking contraception-grade reliability). Natural Cycles' 2024 profitable growth and
      Series C financing indicate it has the capital and regulatory credibility to pursue this path aggressively.

      Adverse evidence on Natural Cycles is instructive for assessing category-wide regulatory risk: a 2018 Guardian
      investigation found that multiple users experienced unwanted pregnancies while relying on Natural Cycles as sole
      contraception, that the UK Advertising Standards Authority upheld complaints that its marketing was misleading,
      and that the Swedish Medical Products Agency required the company to clarify pregnancy risk communication. The
      FDA's own data showed a 6.5% typical-use failure rate versus the company's marketed 93% effectiveness figure.
      These incidents demonstrate that medical-grade efficacy claims in digital health carry material litigation and
      regulatory risk—directly relevant to any future Flo move toward regulated contraception claims.

      Clue's competitive risk to Flo is primarily European and among privacy-sensitive users. Its GDPR positioning,
      women-led governance, and science-driven editorial appeal to users made suspicious of US-based health apps by
      post-Roe privacy concerns and Flo's FTC enforcement history.
