chapter:
  number: 3
  title: Competitors
  summary: >
    Flo Health operates in a multi-tiered competitive landscape spanning dedicated period-tracking apps (Clue, Glow),
    the only FDA-cleared digital contraceptive (Natural Cycles), platform incumbents with free native integration (Apple
    Cycle Tracking), and B2B2C employer models (Ovia/LabCorp). Flo's structural advantages—70M+ monthly active users,
    proprietary AI trained on a large proprietary cycle dataset, and consumer brand recognition—are partially offset by
    a legacy FTC privacy enforcement action and male-founded reputational friction in a category where user trust is the
    primary purchase driver. Apple's free, pre-installed Cycle Tracking feature, embedded on every iPhone, represents
    the most structurally durable competitive threat because it cannot be displaced through app-store competition.
sections:
  - id: competitive-landscape
    title: Competitive Landscape Overview
    body: >
      The competitive set for period and fertility tracking is not a homogeneous market: buyers can satisfy the core
      job—understanding their menstrual cycle—through at least five structurally distinct categories. Dedicated consumer
      apps (Flo, Clue, Glow) compete primarily on feature depth, AI prediction quality, and brand. Natural Cycles
      occupies a uniquely defensible position as the only app cleared by the FDA as a Class II medical device for
      contraception, creating a regulatory moat no consumer-app rival currently matches. Platform incumbents—Apple with
      Cycle Tracking built into iOS Health—threaten to render dedicated apps redundant through free native integration.
      B2B2C models (Ovia Health, acquired by LabCorp in 2021) serve employers and health plans, not direct consumers,
      and do not compete with Flo in the consumer channel. Fertility hardware companies such as Mira and inne overlay
      physical hormone-testing devices with companion apps, targeting a higher-intent clinical segment.

      CBInsights identifies Natural Cycles' primary competitors as including Clue, inne, Eli Health, Lady Technologies,
      and Maven Clinic alongside Flo Health, confirming that the competitive landscape extends into fertility technology
      and reproductive medicine beyond simple period tracking. Across all categories, Flo's most significant competitive
      advantages are scale (the largest user base at an estimated 70M+ monthly active users), data depth (a proprietary
      AI training set built from hundreds of millions of logged cycles), and consumer brand recognition in most global
      markets outside Northern Europe. Its primary structural weaknesses are a 2021 FTC consent decree related to data
      sharing with third-party analytics providers, and social-media controversy surrounding its male-founded leadership
      in a women's-health-focused category—both of which are actively exploited in the competitive positioning of Clue
      and Natural Cycles.
