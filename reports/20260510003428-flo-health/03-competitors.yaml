callouts:
  - calloutType: risk
    title: Apple Native Integration Is an Existential Distribution Threat
    body: >
      Apple Cycle Tracking is pre-installed on every iPhone at no cost, reaching an estimated 2 billion active iOS
      devices globally without any app-store discovery friction. Apple's historical pattern of entering app categories
      with a minimal free native feature and progressively expanding it until the value delta between its free version
      and competing paid apps collapses (Weather, Podcast, Calculator, Notes) creates a clear trajectory risk for Flo.
      The 2025–2026 Apple Cycle Tracking feature roadmap is not publicly disclosed, which is itself a material strategic
      risk. Flo's only durable defense is differentiation in dimensions Apple has not and may not enter: AI prediction
      accuracy from a larger dataset, expert medical content, community features, and reproductive health monitoring
      beyond cycle tracking.
    claimRefs:
      - CP015
      - CP027
      - CP036
      - CP040
  - calloutType: strength
    title: Natural Cycles' Regulatory Moat Is Genuinely Durable—But Narrow
    body: >
      Natural Cycles' FDA clearance as a Class II medical device for contraception is a genuinely hard barrier to entry:
      the clinical trial pathway (15,500+ women, 180,000+ cycles, multi-jurisdiction regulatory submissions) requires
      3–5 years and tens of millions of dollars that few consumer-app competitors can commit. Natural Cycles' profitable
      growth as of its 2024 Series C confirms that the regulatory moat is translating into sustainable revenue. However,
      this moat is narrow in scope: it protects specifically the contraception use case, not period tracking broadly.
      Flo competes in a wider market and the contraception segment, while valuable, is not the primary revenue driver
      for either company today.
    claimRefs:
      - CP007
      - CP009
      - CP010
      - CP011
      - CP035
