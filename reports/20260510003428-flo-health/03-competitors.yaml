    - type: missing-source
      severity: material
      topic: competitive-dynamics
      missingEvidence: >-
        No independent benchmark study comparing Flo, Clue, and Natural Cycles cycle prediction accuracy under
        controlled conditions was found during this research run. Flo's '54% cycle prediction improvement' claim is
        company-reported, not independently audited.
      whyItMatters: >-
        The core justification for Flo's data moat rests on AI prediction superiority. Without an independent accuracy
        benchmark, this moat claim cannot be corroborated and could be challenged by Clue or Natural Cycles with their
        own efficacy data.
      diligencePath: >-
        Search academic databases (PubMed, Google Scholar) for peer-reviewed comparative studies of period tracking app
        accuracy; request Flo's internal validation methodology and any clinical advisory review.
      relatedQuestionRefs:
