  evidenceGaps:
    - type: private-evidence-only
      severity: minor
      topic: competitor-profile-clue
      missingEvidence: >-
        Clue's 2025–2026 user count, revenue run rate, and any new funding rounds completed after 2022 are not publicly
        disclosed. The company is private and has not released financials.
      whyItMatters: >-
        Without current Clue metrics, the relative scale gap between Flo and Clue cannot be precisely quantified, and
        the competitive threat level from Clue's growth trajectory is unclear.
      diligencePath: >-
        Request Clue's Pitchbook/Crunchbase record for any undisclosed rounds; check LinkedIn employee count trend as a
        headcount proxy; review any EU funding disclosures or German commercial registry filings.
