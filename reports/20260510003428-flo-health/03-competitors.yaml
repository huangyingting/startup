  - id: competitor-profiles
    title: Direct and Adjacent Competitor Profiles
    body: >
      **Clue (BioWink GmbH)** was founded in 2012 in Berlin, Germany by Ida Tin, making it the first women-led period
      tracking app to reach significant scale. Clue serves an estimated 12 million registered users and offers multiple
      tracking modes: period tracking, fertility/ovulation, trying to conceive (Clue Conceive), pregnancy following,
      perimenopause guidance, and tracking without a period for users who do not menstruate. Its business model is
      freemium—basic tracking is free, while Clue Plus (paid) unlocks deeper cycle insights, pattern analysis,
      reminders, and access to expert medical content. Clue's core brand positioning is GDPR compliance and women-led
      governance, used to attract privacy-conscious European users and to contrast with US competitors that have faced
      FTC enforcement. Clue has raised an estimated $30 million or more in external capital; exact 2025–2026 figures are
      not publicly disclosed.

      **Natural Cycles** was founded in 2013 in Stockholm by Dr. Elina Berglund Scherwitzl and Dr. Raoul Scherwitzl,
      particle physicists who were part of the CERN team that discovered the Higgs boson. The app became the first
      CE-certified contraceptive in the EU in 2017 and received FDA clearance in August 2018 as a Class II medical
      device—the first birth control app ever approved in the United States. As of its 2024 Series C, Natural Cycles
      reported more than 3 million users and profitable growth. The €50.8 million Series C was led by Lauxera Capital
      Partners with Point72 Private Investments and a J.P. Morgan revolving debt facility. Natural Cycles holds
      regulatory clearance in six jurisdictions (US, EU, Canada, Australia, Singapore, South Korea) and does not share
      user data with third-party advertisers.

      **Apple Cycle Tracking** is built into the iOS Health app at no cost on all iPhones. While feature-limited
      relative to dedicated apps, Apple's native integration reaches the full addressable market of iPhone users without
      any app-store friction. Apple processes health data on-device with encryption, and even Apple cannot access user
      health information when two-factor authentication is enabled. **Glow** (Glowing, Inc., founded 2013) focuses on
      fertility and partner connection for couples trying to conceive, covering male and female fertility logging
      simultaneously. **Ovia Health**, originally a B2C tracker, was acquired by LabCorp in 2021 and pivoted to employer
      benefits integration, effectively exiting direct consumer competition with Flo.
