  - id: TP004
    title: Moat Durability and Competitive Risk Register
    notes: >
      Moat claims and threat assessments are analyst inferences based on public evidence. Severity ratings
      (High/Medium/Low) reflect potential impact on Flo's revenue and user base if the threat fully materializes.
      Mitigation paths are diligence asks, not confirmed company strategies.
    columns:
      - Flo Moat Claim
      - Threat
      - Severity
      - Mitigation / Diligence Ask
    rows:
      - - Largest cycle data set enables superior AI prediction
        - Apple, with billions of iOS health data points, could train a comparable model using its own dataset
        - High
        - >-
          Diligence: has Flo published any independent accuracy benchmarks vs. Apple or Clue? What is the AI retraining
          cadence and data governance?
      - - 70M+ MAU brand and scale creates discovery default in app stores
        - Apple Cycle Tracking is pre-installed—no discovery required; bypasses app-store competition entirely
        - High
        - >-
          Assess whether Flo's value proposition beyond basic cycle tracking (AI, community, expert content) is
          sufficient to drive new-user downloads when Apple is pre-installed
      - - Flo Premium Anonymous Mode addresses FTC privacy concern
        - >-
          Clue's structural GDPR-native positioning and women-led brand are not replicable by organizational change
          alone
        - Medium
        - >-
          Diligence: what share of churned Flo users cite privacy as a reason? Is European DAU/MAU declining relative to
          US?
      - - Global brand recognition across 180+ countries
        - >-
          Natural Cycles' FDA-cleared contraception mode captures highest-intent segment and may convert Flo users
          seeking medical-grade reliability
        - Medium
        - >-
          Diligence: what is Flo's user overlap with Natural Cycles? Is Flo building any contraception-grade feature?
          What regulatory path would that require?
      - - Network effects from community and expert content
        - >-
          Zero switching costs and zero multi-homing friction allow users to run multiple apps simultaneously, diluting
          stickiness for all competitors
        - Medium
        - >-
          Diligence: what are Flo's DAU/MAU and daily engagement ratios? How does streak/habit-formation retention
          compare to Clue?
