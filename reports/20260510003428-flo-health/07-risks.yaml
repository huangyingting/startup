  - id: operational-technical-risk
    title: Operational, Technical, and AI Safety Risk
    body: |
      Flo has deployed AI-driven health advisory capabilities—including its Ask Flo LLM-based health
      assistant—that introduce meaningful AI safety risk. In a health context, LLM hallucination
      (generating medically plausible but incorrect advice) could harm users acting on incorrect guidance
      about fertility, pregnancy, symptom interpretation, or medication interactions. Flo maintains a
      Medical Expert Board and content review processes including a partnership with Mayo Clinic. However,
      the speed of AI feature development and breadth of health topics covered create ongoing safety risk
      that is difficult to fully mitigate without constraining product velocity.

      Flo's Anonymous Mode uses IETF-standardized OHTTP (RFC 9458) with Cloudflare as relay operator,
      technically preventing Flo's servers from linking user health data requests to IP addresses or
      identity. This represents a substantive privacy-enhancing technical deployment. However, the feature
      also introduces dependency on Cloudflare's relay infrastructure and potential vulnerabilities in a
      novel cryptographic implementation deployed at scale. Any breach of user data—even in aggregate—
      would trigger enforcement scrutiny under the existing FTC consent order.

      The FDA's Digital Health Center of Excellence classifies certain software functions as Software as
      a Medical Device (SaMD) subject to premarket review. Natural Cycles received FDA De Novo
      classification as a contraceptive in 2018, establishing that AI-based reproductive health tools
      can attract FDA jurisdiction. Flo has not sought FDA clearance for any features, positioning them
      as wellness tools. If FDA reclassified Flo's AI fertility prediction or symptom assessment features
      as SaMD, Flo would face premarket review requirements, clinical validation obligations, and
      potential feature blocks. Additionally, Flo's primary cloud infrastructure dependency on AWS
      introduces single-provider concentration risk; no multi-cloud strategy has been publicly disclosed.
    claimRefs:
      - CR009
      - CR010
      - CR011
      - CR016
      - CR025
      - CR027
      - CR028
      - CR036
