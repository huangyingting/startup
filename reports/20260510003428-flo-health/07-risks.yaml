  title: Risks
sections:
  - id: data-privacy-regulatory-risk
    title: Data Privacy and Regulatory Risk
    body: |
      Flo Health occupies one of the highest-risk positions in consumer technology: it processes intimate
      reproductive and menstrual health data for over 77 million monthly active users—data explicitly
      classified as "special category" under EU GDPR and subject to heightened US federal regulatory
      scrutiny. The company's January 2021 FTC complaint and August 2021 finalized consent order—arising
      from the sharing of sensitive user health data with Facebook, Google, Amplitude, and Fabric contrary
      to its privacy policy—created a permanent regulatory baseline. The settlement imposed a 20-year
      compliance program (through 2041) with mandatory independent privacy assessments and user
      notification, but no monetary penalty, leaving future enforcement exposure open under the FTC's
      expanded authority.

      Flo is not a HIPAA-covered entity, so HIPAA's strict health data protections do not directly apply.
      This creates a structural regulatory gap: users may assume HIPAA-level protection when none exists.
      The primary applicable US legal frameworks are the FTC Act and state consumer protection laws,
      including a rapidly expanding set of state health data privacy statutes post-Roe. Under GDPR
      Article 9, menstrual and reproductive health data constitutes special category data requiring
      explicit consent, a DPIA, and a designated DPO. EU and UK regulators (CNIL, ICO) can impose
      fines of up to 4% of global annual turnover for systemic violations—approximately $8–12M at
      Flo's current estimated revenue scale.

      The post-Roe v. Wade environment (since June 2022) materially elevated the political sensitivity
      of reproductive health data. Period tracking apps faced intense media scrutiny and user concern
      about whether menstrual data could be subpoenaed by state law enforcement in abortion-restrictive
      states. Flo responded in September 2022 with Anonymous Mode—implemented via Oblivious HTTP (OHTTP,
      RFC 9458) in partnership with Cloudflare—allowing use without linking health data to personal
      identity. This is a substantive technical response, but does not eliminate exposure for pre-2022
      identified user data or for users who did not activate Anonymous Mode.
    claimRefs:
      - CR001
      - CR002
      - CR004
      - CR005
    tableRefs:
      - TR001
      - TR005
    figureRefs:
      - FR001
      - FR002
  - id: litigation-legal-risk
    title: Active Litigation and Legal Exposure
    body: |
      Beyond the FTC regulatory proceeding, Flo faces active civil litigation. A class action was filed
      in British Columbia, Canada, alleging privacy violations arising from the same data-sharing conduct
      cited by the FTC. The Supreme Court of British Columbia certified this class action in March 2024,
      creating concrete legal exposure. The damages quantum and litigation timeline remain key diligence
      gaps requiring direct engagement with Flo's litigation counsel. Separately, a California class
      action arising from the same episode was settled in 2025 for $56M total ($8M from Flo, $48M from
      Google), providing a cost benchmark but not a ceiling for future exposures.

      The FTC complaint alleged that Flo shared detailed health event data—including menstruation,
      pregnancy, and fertility intentions—with third-party analytics SDKs in a manner contrary to Flo's
      privacy policy. The 2021 finalized order requires 20 years of independent privacy assessments and
      user notification. The FTC has since expanded its health data enforcement focus, taking actions
      against GoodRx, BetterHelp, and other health app companies for improper data sharing between 2022
      and 2024, increasing Flo's risk exposure under its existing consent order.

      The post-Roe legal environment has created a new category of health data legal risk: US states
      criminalizing abortion assistance may compel disclosure of reproductive health records as evidence.
      Washington State's My Health MY Data Act (effective 2024) creates a private right of action for
      health data violations with no HIPAA safe harbor. Similar legislation has been enacted or proposed
      in California, Connecticut, Illinois, and several other states, generating a patchwork of compliance
      obligations that Flo must navigate across its ~77M user base globally.
    claimRefs:
      - CR003
      - CR006
      - CR007
      - CR008
      - CR024
      - CR033
  - id: platform-competitive-risk
    title: Platform Dependency and Competitive Displacement Risk
    body: |
      Flo's distribution is critically mediated by Apple App Store and Google Play, creating structural
      dependency risk across three dimensions. First, commission rates: Apple charges up to 30% on
      subscriptions in year one (15% thereafter for qualifying subscribers); Google Play similarly charges
      15–30%. At Flo Premium's $55–80/year price point, platform commission materially reduces net
      subscription economics and constrains margin expansion. Apple's Small Business Program rate of 15%
      does not apply at Flo's revenue scale.

      Second, app store removal risk is structurally undiversifiable. Apple's App Store Review Guidelines
      and Google Play's Developer Content Policy grant both platforms broad discretion to remove or
      restrict apps dealing with sensitive health data or reproductive topics. No viable alternative iOS
      distribution channel exists at scale in most markets; EU Digital Markets Act relief is only partial.
      Any platform policy change mandating specific data deletion timelines, consent mechanisms, or
      reproductive health data handling requirements could impose immediate compliance costs and
      potential suspension risk.

      Third, Apple's native Cycle Tracking feature within the iOS Health app provides period tracking,
      ovulation prediction, and fertility window calculation at zero cost to all iPhone users, with deep
      Apple Watch integration (wrist temperature for cycle phase detection). Samsung Health similarly
      offers cycle tracking on Android. These native features compress the addressable market for
      standalone period tracking at the free tier, though they do not replicate the health content
      library, AI advisory features, clinical partnerships, community, or enterprise integrations that
      underpin Flo Premium's value proposition.
    claimRefs:
      - CR012
      - CR013
      - CR014
      - CR015
      - CR022
      - CR026
