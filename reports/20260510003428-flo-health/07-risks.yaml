callouts:
  - title: 'Key Risk: FTC Consent Order Creates 20-Year Enforcement Baseline'
    body: >-
      Flo's 2021 FTC consent order runs through 2041. Any future privacy violation will be assessed against this
      baseline, and the FTC now has broader financial penalty authority than in 2021. A repeat violation would likely
      carry material penalties plus compounded reputational damage—making privacy compliance a permanent board-level
      obligation.
    calloutType: risk
    claimRefs:
      - CR001
      - CR002
      - CR023
  - title: 'Kill Criterion: App Store Removal Is Thesis-Breaking'
    body: >-
      Removal of Flo from either Apple App Store or Google Play would be an immediate thesis-break event. The company
      has no viable alternative distribution at iOS scale in most markets. Rebuilding user acquisition through web-only
      channels would require years and significant capital with uncertain outcomes.
    calloutType: risk
    claimRefs:
      - CR012
      - CR022
  - title: 'Insight: Anonymous Mode Demonstrates Proactive Privacy Engineering'
    body: >-
      The September 2022 launch of Anonymous Mode—using OHTTP (RFC 9458) with Cloudflare—is a technically substantive
      privacy-enhancing deployment, not merely a policy response. It is the strongest evidence that Flo's management
      takes privacy risk seriously at the engineering level, though it does not retroactively protect pre-2022
      identified user data or users who have not activated the feature.
    calloutType: insight
    claimRefs:
      - CR009
      - CR025
      - CR031
