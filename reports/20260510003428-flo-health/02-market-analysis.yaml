callouts:
  - calloutType: strength
    title: Large and High-Growth Addressable Market
    body: >
      The femtech market is large ($39B–$61B globally), growing rapidly (8–18% CAGR depending on scope),
      and structurally underpenetrated. Women's health apps represent a $4–8B sub-market growing at 16–18%
      CAGR. Flo's 77M MAU make it the dominant player in the digital period tracking
      segment, giving it a platform for monetization and cross-sell into adjacent categories including
      perimenopause, mental health, and employer benefits.
    claimRefs:
      - CM009
      - CM012
      - CM015

  - calloutType: risk
    title: Data Privacy Enforcement Risk and Post-Roe Headwinds
    body: >
      Period tracking apps face heightened regulatory scrutiny post-Roe v. Wade, with period data
      potentially subject to law-enforcement subpoenas in states with abortion restrictions. The FTC's
      2021 enforcement action against Flo established a costly compliance precedent. Any breach of the
      consent order, new enforcement action, or state-level legislation restricting health data would
      materially harm Flo's brand and user retention, particularly in the US market.
    claimRefs:
      - CM037
      - CM039
      - CM040

  - calloutType: risk
    title: Low Emerging Market ARPU Limits Blended Economics
    body: >
      Flo's fastest-growing user geographies (APAC, LatAm) have materially lower willingness-to-pay
      than North America and Europe. Sub-$5/year effective ARPU in these regions means that volume
      growth does not proportionally drive revenue growth, creating a potential divergence between
      user-count metrics and financial performance as the user mix shifts toward emerging markets.
    claimRefs:
      - CM024
      - CM041

  - calloutType: insight
    title: Regulatory Compliance as Competitive Moat
    body: >
      Flo's investments in ISO 27001/27701 certification, Anonymous Mode, and a Privacy & Security
      Advisory Board position privacy compliance as a product differentiator rather than merely a
      compliance cost. Smaller femtech competitors lack the resources to match this investment,
      creating a durable advantage in privacy-conscious markets. This dynamic favors scaled platforms
      in the post-FTC, post-Roe regulatory environment.
    claimRefs:
      - CM026
      - CM038
      - CM042

