  - number: 2
    title: 市场分析
    sections:
      - number: '2.1'
        title: 市场边界与定义
        blocks:
          - type: paragraph
            body: >
              Flo Health
              竞争的赛道是女性健康科技（femtech）——这是一个宽泛类别，覆盖数字技术、移动应用、可穿戴设备、诊断和远程医疗平台，用来服务女性全生命周期的健康需求：月经、生育、妊娠、产后，以及围绝经期到绝经期。在
              femtech 内，Flo 直接可触达的细分市场是女性激素健康应用，具体包括周期和经期追踪、排卵和生育指导、妊娠监测、围绝经期支持。


              现状替代品包括实体日历、纸质周期记录、通用手机备忘录应用、妇产科临床就诊，以及缺少生殖健康功能的基础健康应用。会扩大 Flo 总机会的相邻市场包括数字心理健康（月经周期与情绪、焦虑追踪重叠）、雇主福利平台（经
              Flo for Business）、远程医疗咨询，以及联网可穿戴生物传感设备。


              Flo 的直接 SAM 不包括 femtech 硬件和独立医疗器械（例如生育激素监测器）、面向医疗提供方的企业临床决策支持软件，以及实体诊断试剂盒。目前支付方格局以个人 DTC 订阅为主（免费增值 /
              Premium 模式），但正在向雇主赞助访问，以及少数欧洲市场早期的健康保险报销扩展。市场边界会影响测算：宽口径 femtech TAM 往往包括硬件、临床诊断和企业软件，而 Flo 当前并不从这些领域变现。
