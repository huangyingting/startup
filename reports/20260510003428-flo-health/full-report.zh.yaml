  - number: 5
    title: 产品与技术
    sections:
      - number: '5.1'
        title: 产品组合与核心用户流程
        blocks:
          - type: paragraph
            body: >
              Flo 的 App 围绕五个生命周期阶段组织：月经周期追踪、排卵与生育、孕期、产后、围绝经期。每个阶段都有独立模块，提供个性化症状追踪、健康教育内容和 AI
              生成洞察。免费层提供经期与排卵预测、周期日历、症状记录，以及 Secret Chats——一个匿名社区讨论功能。Flo Premium 进一步加入 Ask Flo（由 LLM
              驱动的健康助手）、症状预测和模式分析、个性化医生报告、生育引导路径，以及更细的孕期里程碑追踪。


              围绝经期模块 Flo for Perimenopause 于 2025 年上线，引入首个经过科学验证的 Perimenopause Score。该评分由 Flo 医疗与科学团队联合 100
              多名医学专家开发，直接回应了 54% 女性称自己对围绝经期了解不足这一问题。该模块包含适配围绝经期不规律性的周期追踪、潮热与情绪变化等症状监测，以及用于社区支持的 Secret Chats。


              Flo for Partners 向男性伴侣提供孕期相关健康信息，拓宽了可服务使用场景。Flo 在周期阶段中追踪 70+ 种症状，包括精力、情绪、痉挛、腹胀、头痛和睡眠，使 ML
              系统能识别与周期阶段相关的症状模式。付费功能 Symptom Checker 会把用户记录的症状与医学知识交叉核对，提示潜在状况。医学文章由 Flo 的 120+ 名医生和专家团队撰写，使 Flo 成为唯一拥有
              100+ 名内部临床审阅人员的女性健康 App。在一项覆盖 500 名美国妇产科医生的调查中，Flo 是排名第一的 OB-GYN 推荐经期与周期追踪 App。
            claimRefs:
              - CE024
              - CE025
              - CE026
              - CE027
              - CE028
              - CE029
              - CE032
              - CE044
          - type: table
            tableRef: TE001
            claimRefs:
              - CE024
