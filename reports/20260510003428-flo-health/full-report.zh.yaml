      - number: '7.2'
        title: 活跃诉讼与法律敞口
        blocks:
          - type: paragraph
            body: >
              除 FTC 监管程序外，Flo 还面临活跃民事诉讼。加拿大 British Columbia 提起了一起集体诉讼，指控与 FTC 所引用的同一数据分享行为相关的隐私违规。British Columbia
              最高法院于 2024 年 3 月认证该集体诉讼，形成具体法律敞口。损害金额和诉讼时间表仍是关键尽调缺口，需要直接接触 Flo 的诉讼律师。另一起源自同一事件的加州集体诉讼已在 2025 年以 $56M
              总额和解（Flo 支付 $8M，Google 支付 $48M），提供了成本基准，但不是未来敞口上限。


              FTC 投诉称，Flo 以违背其隐私政策的方式，向第三方分析 SDK 分享详细健康事件数据，包括月经、怀孕和生育意图。2021 年最终命令要求 20 年独立隐私评估和用户通知。FTC
              随后扩大了健康数据执法重点，2022 至 2024 年间对 GoodRx、BetterHelp 和其他健康 App 公司就不当数据分享采取行动，抬高了 Flo 在既有同意令下的风险敞口。


              Roe 之后的法律环境创造了新的健康数据法律风险类别：将协助堕胎刑事化的美国州，可能强制披露生殖健康记录作为证据。Washington State 的 My Health MY Data Act（2024
              年生效）为健康数据违规设立私人诉权，且没有 HIPAA 安全港。California、Connecticut、Illinois 和其他几个州已经颁布或提出类似立法，形成一张碎片化合规义务网络，Flo 必须在全球约
              77M 用户基础上应对。
            claimRefs:
              - CR003
              - CR006
              - CR007
              - CR008
              - CR024
              - CR033
      - number: '7.3'
        title: 平台依赖与竞争替代风险
        blocks:
          - type: paragraph
            body: >
              Flo 的分发高度由 Apple App Store 和 Google Play 中介，形成三重结构性依赖风险。第一，佣金率：Apple 对首年订阅最高抽取 30%（符合条件订阅用户此后为 15%）；Google
              Play 同样抽取 15–30%。在 Flo Premium $55–80/year 的价格点上，平台佣金会实质压低净订阅经济模型，并限制利润率扩张。Apple 的 Small Business Program
              15% 费率不适用于 Flo 的收入规模。


              第二，应用商店下架风险在结构上无法分散。Apple 的 App Store Review Guidelines 和 Google Play 的 Developer Content Policy
              赋予两家平台广泛裁量权，可以移除或限制处理敏感健康数据或生殖议题的 App。在多数市场，iOS 没有规模化可行的替代分发渠道；EU Digital Markets Act
              带来的缓解也只是部分。任何平台政策变化，若要求特定数据删除期限、同意机制或生殖健康数据处理要求，都可能带来即时合规成本和潜在暂停风险。


              第三，Apple 在 iOS Health App 内置 Cycle Tracking 功能，向所有 iPhone 用户零成本提供经期追踪、排卵预测和生育窗口计算，并深度集成 Apple
              Watch（通过手腕温度检测周期阶段）。Samsung Health 在 Android 上也提供周期追踪。这些原生功能压缩了免费层独立经期追踪的可服务市场，尽管它们没有复制支撑 Flo Premium
              价值主张的健康内容库、AI 咨询功能、临床合作、社区或企业集成。
