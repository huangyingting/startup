  - id: TV005
    title: 投资逻辑破裂与止损触发器
    slug: thesis-break-kill-triggers
    columns:
      - 风险
      - 可监测触发信号
      - 阈值 / 事件
      - 行动含义
    rows:
      - - FTC 再度执法
        - FTC 案卷活动；独立隐私评估发现
        - 任何违规通知提交；涉及 AI 功能的重大数据共享事件
        - 立即复核持仓；若执法升级为民事罚款，可能不计价格退出
      - - 收入停滞 / 下调估值融资
        - 季度 ARR 更新；任何隐含估值低于 $1B 的老股交易
        - ARR 同比增长 <10%；老股标记价较入场价低 >20%
        - 降低仓位；要求董事会席位或信息权升级
      - - Apple / Google 平台替代
        - iOS 和 Android 原生经期 / 周期功能评分；Flo 在 App Store 的下载排名
        - Flo MAU 在 12 个月内下降 >15%；App Store 健康类排名连续 3+ 个月跌出前 10
        - 重新评估转化经济性；评估仅 B2B 策略可行性
      - - BC 集体诉讼不利判决
        - BC 集体诉讼案卷；律师季度诉讼更新
        - 法院裁定责任 >$50M；和解要求超过准备金
        - 要求披露准备金；可能要求减记投资价值
    notes: 触发阈值是指示性监测基准。每个事件的实际重大性取决于投资者入场价、组合背景和当时市场环境。
    claimRefs:
      - CV029
      - CV035
      - CV036
  - id: TV006
    title: 最终尽调问题
    slug: final-diligence-asks
    columns:
      - 主题
      - 缺失证据
      - 重要性
      - 负责人 / 尽调路径
    rows:
      - - 已确认 ARR 与订阅经济性
        - 实际 ARR、订阅用户数、月付 / 年付结构、订阅毛利率、净收入留存率
        - 以 5× 还是 10× 估值入场，会显著改变确信度和回报画像
        - 管理层；在 NDA 下索取经审计 P&L 或管理账
      - - FTC 同意令合规状态
        - 最新独立隐私评估；2021 年以来任何 FTC 通信；由 FTC 律师审阅的 Databricks/AWS 数据使用协议
        - 合规破口会成为投资逻辑破裂触发器，影响所有成长股回报
        - Flo 法务 / 合规团队；独立律师审阅；FTC 公开案卷
      - - 诉讼准备金与 BC 集体诉讼敞口
        - 诉讼律师给出的金额估计；资产负债表准备金；D&O 保险覆盖上限
        - 超过 $25–50M 的未披露负债会实质性损害股权价值
        - Flo CFO/GC；收购方律师独立诉讼复核
      - - B2B / 企业 ARR 管线
        - 当前 B2B 已签约 ARR；企业健康计划或雇主客户数量；ACV 与续约率
        - B2B 是估值上行的主要杠杆；若 B2B 牵引力为零，乐观情景概率会下降
        - Flo 合作伙伴 / 商务团队；索取管线报告和已签合同摘要
    notes: 证据缺口来自公开数据缺失；所有事项都需要在 NDA 保护下访问 Flo Health 管理信息。优先级仅为指示性。
    claimRefs:
      - CV034
      - CV035
      - CV036
      - CV037
      - CV038
