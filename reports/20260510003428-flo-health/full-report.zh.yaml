              - CE029
      - number: '5.2'
        title: AI/ML 架构与预测引擎
        blocks:
          - type: paragraph
            body: >
              Flo 的机器学习基础设施是其最具防守性的技术资产。周期预测模型采用神经网络架构，包含 442 个输入单元，吸收周期历史、检测结果、生物指标、生活方式因素、睡眠模式、情绪、症状，以及来自 Fitbit、Apple
              Watch 等可穿戴设备的数据流。训练数据集超过 450 GB，每天累积 1.4 million 个数据点，并持续用真实周期结果校准。结果是，不规律周期预测误差从 5.6 天降至 2.6 天，下降
              54%——这是有临床意义的改善，使用简单日历平均法的竞争者难以匹配。


              生成式 AI 健康助手 Ask Flo 由通过 Databricks Mosaic AI 微调的 LLM 驱动。为在上线前验证安全性，Flo 与 SuperAnnotate 合作，搭建了专家在环评估流水线，将
              12,000 多条 LLM 输出与临床指南对照处理，验证准确率超过 90%。该流程把迭代周期从 2–3 周压缩到 3–5 天，并带来 10× 吞吐提升。CTO Roman Bugaev
              确认：「SuperAnnotate 让我们能把深度医学专长转化为 Databricks 流水线中可扩展、结构化的真实标准数据。」


              为了规模化验证医学内容，Flo 与 AWS Generative AI Innovation Center 共同开发了 MACROS（Medical Automated Content Review and
              Revision Optimization Solution）。MACROS 基于 Amazon Bedrock 基础模型，用 AWS Step Functions 编排，Streamlit UI 托管在
              Amazon ECS，并提供可接入流水线的 API 路径。其设计目标是 90% 内容召回准确率、专家审阅时间减少 10×，并接入 Flo 现有技术基础设施。截至第 1 部分发布时，MACROS
              仍处于概念验证阶段，生产级扩展将在第 2 部分覆盖。


              同一套 ML 基础设施还支撑周期追踪之外的症状预测、健康问题识别和内容个性化，包括新的围绝经期功能，用来分析历史月经研究中代表性不足的年龄群体模式。FDA 对 AI 医疗设备审查趋严后，Flo 已验证的 ML
              基础设施让它具备潜在临床应用位置——尽管目前尚未取得 FDA SaMD 许可。
