chapters:
  - number: 1
    title: 公司概况
    sections:
      - number: '1.1'
        title: 公司身份与商业模式
        blocks:
          - type: paragraph
            body: |
              Flo Health, Inc. 是一家私营女性数字健康公司，注册于特拉华州，总部位于英国
              伦敦。公司运营全球下载量最高的女性健康应用 Flo；自 2016 年在 iOS 和
              Android 上线以来，累计注册用户超过 430 million。运营总部和最大人才集群
              位于立陶宛维尔纽斯，另在伦敦、阿姆斯特丹和纽约设有办公室。

              Flo 的商业模式建立在免费增值订阅架构上。核心应用免费，提供经期和周期追踪、
              基础症状记录、排卵预测。Flo Premium 面向个人订阅者定价 $59.99/year
              或约 $13/month，家庭计划 $79.99/year；它解锁 AI 驱动的 Ask Flo
              健康助手、个性化健康洞察、专家内容、详细周期分析和 Secret Chats 社区功能。
              截至 2024 年 6 月，公司披露约 70 million 月活用户、接近 5 million
              付费订阅用户，意味着付费转化率约 7%。2024 年总预订额预计超过 $200 million，
              同比增长约 50%。

              CEO Dmitry Gurski 表示，截至 2024 年 7 月，Flo 已经产生正向现金流；
              消费级健康应用做到这个规模后，现金流转正是值得注意的里程碑。公司还运营公益
              准入项目 Pass It On Project，在印度、印度尼西亚、尼日利亚等 66 个国家
              免费开放 Flo Premium；截至 2024 年中，约 12 million 女性受益。
