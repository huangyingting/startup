      - number: '2.2'
        title: 市场规模与增长预测
        blocks:
          - type: paragraph
            body: >
              全球 femtech 市场的分析师估计，在基准年份价值和预测 CAGR 上差异都很大，核心原因是范围定义不同。Grand View Research 估计 2024 年 femtech 市场为
              $39.29B，CAGR 为 16.37%，到 2030 年达到 $97.25B。Precedence Research 估算 2025 年市场为 $60.89B，并预测到 2035 年达到
              $140.64B，对应期间 CAGR 更保守，为 8.73%。Allied Market Research 估计 2023 年 femtech 行业约 $28B，并指出 VC 融资在 2021 年见顶后，2022
              年达到 $840M。这些跨度很大的区间——同一近似时间窗口内从 $28B 到 $61B——很可能反映了口径是否在纯软件平台之外还纳入硬件 / 可穿戴设备和临床诊断。


              专看女性健康应用子市场，GM Insights 估计该细分 2024 年为 $4.1B，并预测到 2034 年达到 $22.1B，CAGR 为 18.5%；Allied Market Research
              则将女性健康应用市场定为 2023 年 $2.9B，到 2032 年增至 $11.3B，CAGR 为 16.4%。用户需求侧，Statista 预计全球经期追踪应用用户到 2025 年达到
              812M；即便缺少可靠的用户收入数据，这也凸显了用户机会的规模。


              Flo 最宽口径的 femtech TAM 为 $39–61B（2024–2025 年分析师区间）。更相关的 SAM——全球女性激素健康应用——基于女性健康应用市场数据，并按 Flo
              的多平台、全球足迹调整，估计为 $4–8B。SOM 受 Flo 从 77M 注册用户基础向 Premium 订阅转化的约束；个位数转化率和 $20–30/year 定价，意味着当前收入运行率在 $100–200M
              区间，不过 Flo 未披露精确数据。Precedence Research 显示，北美占全球 femtech 市场 38.64%，区域需求领先。
