      - number: '5.3'
        title: 数据平台与工程基础设施
        blocks:
          - type: paragraph
            body: >
              2025 年 6 月，Flo 采用 Databricks Data Intelligence Platform，替换阻碍规模化 AI 用户体验的碎片化数据系统和老旧基础设施。迁移后，Flo
              在该平台上的内部月活用户增长 45%，周活用户增长 57%，显示工程、数据科学和业务分析角色广泛采用。现在近 46% 的 Flo 员工每月使用 Databricks 做数据驱动决策，这是重要的数据民主化里程碑。


              Flo 的 Databricks 技术栈包括：MLflow，用于模型版本管理和部署等 ML 生命周期管理；Mosaic AI，作为 LLM 智能体系统（Ask Flo 微调）的底座；Unity
              Catalog，用于统一治理、细粒度访问控制和数据血缘，以执行隐私要求；AI/BI Genie，用自然语言查询数据（「What is our MAU for last month?」）；Databricks
              Assistant，用于内部「Copilot」计划下的 SQL 调试；以及 Unity Catalog Metrics，用于 BI 指标可靠性。Flo 并行运行 150–200 个实验，每季度超过 400
              个实验，并通过 Experiment Service 管理 1,293 个功能和 5,617 项配置。


              Flo 的生产环境全部托管在 Amazon Web Services。AWS 数据中心具备 SOC 1、SOC 2 和 SOC 3 认证。Flo
              使用虚拟私有云（VPC）和多账户基础设施，将生产环境与预发、开发环境隔离。AWS Key Management Service 管理加密密钥。Cloudflare 安全套件拦截恶意流量，并提供 CDN
              路由。基础设施通过自动扩缩容、负载均衡、任务队列和滚动部署保证可靠性。数据库每天做增量备份、每周做全量备份，且全部加密。生产环境 24/7/365 监控，并配有值班升级机制。


              Flo 的开源开发者活动显示其在隐私保护协议上的技术成熟度。GitHub
              组织（github.com/flo-health）托管七个公开仓库：AffectedModuleDetector（Kotlin、Apache-2.0、55 stars，2026 年 2
              月更新）、ok-ohttp-plugin（16 stars，2025 年 5 月更新）、ohttp-encapsulator（2025 年 5 月更新）、ohttp-client-swift（Swift、18
              stars，2025 年 4 月更新）、contentful-localization-matrix（TypeScript、13 stars，2024 年 4 月更新）、ok-bhttp（用于 OHTTP 的
              Kotlin Binary HTTP，2023 年 6 月更新）和 bhttp-swift（MIT，2023 年 6 月更新）。
