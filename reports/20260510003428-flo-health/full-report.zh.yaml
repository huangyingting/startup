      - number: '8.2'
        title: 估值背景、融资历史与入场纪律
        blocks:
          - type: paragraph
            body: >
              Flo Health 于 2024 年 7 月完成由 General Atlantic 领投、超过 $200 million 的 Series C，投后估值达到或超过 $1
              billion，从而进入独角兽行列。这是 femtech 领域第一款纯数字消费者女性健康 App 达到独角兽门槛。本轮之前，据较早融资沟通相关报道，Flo 估值约为 $800 million，意味着 Series
              C 在 $1 billion 关口大约上调 25%。


              Flo Health, Inc. 已向 SEC 提交 Form D 通知，确认其根据 Rule 506 取得豁免发行状态。截至 Series C，已披露股权融资总额超过 $270 million。已披露投资者包括
              General Atlantic（Series C 领投）、BOND、Flint Capital、Target Global 等。股权结构表未公开披露；不过，多家早期 VC 与成长股权投资者同时存在，说明
              Series C 新进入者在回报建模时必须考虑优先股堆叠和潜在稀释压力。


              在 $1 billion 估值下，入场纪律要求对隐含倍数做压力测试，参照：(1) 已披露运营 KPI（77M MAU、5M+ Premium 订阅用户）；(2) GetLatka 和 CompWorth
              估计，认为截至 2024 年末 ARR 在 $100–200M 区间；(3) 公开可比公司。SVB Healthcare Investments and Exits 报告显示，与 Flo
              收入规模相近的数字健康消费者软件公司，在私人市场交易时 ARR 倍数为 3–8×，取决于增长率和利润率画像。CB Insights 数字健康融资数据显示，Series C / 后期数字健康估值在
              2023–2024 年较 2021 年高点压缩 20–40%，因此 $1B 关口更像真正差异化的信号，而非周期高点泡沫。


              入场纪律的关键未答问题是实际 ARR。第三方估计范围为 $100M 到 $200M，意味着 $1B 估值对应 5–10× ARR。若为 5×，该倍数与公开 health-tech SaaS 中位数一致；若为
              10×，则需要增长加速来支撑。
            claimRefs:
              - CV007
