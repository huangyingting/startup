      - number: '7.5'
        title: 人员、地缘政治与声誉风险
        blocks:
          - type: paragraph
            body: >
              Flo 由 Dmitry Gurski（CEO）和 Yuri Gurski 兄弟在白俄罗斯 Minsk 共同创立。2020 年白俄罗斯政治危机后，公司将总部迁至伦敦，并在立陶宛 Vilnius
              扩大工程团队。白俄罗斯因人权违规面临美国和 EU 制裁，任何残留工程运营或向白俄罗斯员工付款都会带来制裁合规风险。当前白俄罗斯员工数未披露——这是必需尽调项。关键人风险偏高：Dmitry Gurski
              是主要战略决策者、投资者关系负责人和公众面孔，且没有公开披露继任计划。


              2024 年中，Flo 的 $200M 融资轮因 femtech 男性创始人议题引发社交媒体病毒式批评。公司公开回应，强调其由女性领导的医疗和编辑团队，但融资争议暴露出持续的声誉脆弱点，可能影响与重视 DEI
              的健康系统和保险方开展企业合作谈判。Trustpilot 和应用商店用户评论也指出，计费清晰度和数据删除困难是运营摩擦点。


              变现风险具有结构性，并直接绑定估值逻辑。Flo 未披露 Premium 转化率。行业估计 MAU 的 3–6% 对应约 2.3M–4.6M 付费订阅用户；鉴于 $1B+
              独角兽地位，这一区间对估值高度敏感。本报告第 1 章引用截至 2024 年 6 月约 5M 付费订阅用户（公司口径），意味着当时转化率约 7%，但当前轨迹尚未确认。如果 MAU 超过 80M 后转化率停滞在 4%
              以下，收入增长模型将受到实质损害，规模化盈利路径也会变得难以维持。
