  - number: 7
    title: 风险
    sections:
      - number: '7.1'
        title: 数据隐私与监管风险
        blocks:
          - type: paragraph
            body: >
              Flo Health 处在消费者科技中风险最高的位置之一：它为超过 77 million 月活用户处理私密生殖与月经健康数据——这些数据在 EU GDPR 下被明确归为「special
              category」，也受到美国联邦更高强度的监管审查。公司 2021 年 1 月的 FTC 投诉与 2021 年 8 月最终同意令，源于其将敏感用户健康数据分享给
              Facebook、Google、Amplitude 和 Fabric，且与隐私政策不符；事件由此建立了永久监管基线。和解要求实施 20 年合规计划（至 2041
              年），包括强制独立隐私评估和用户通知，但没有罚款，因此在 FTC 扩张后的权限下，未来执法敞口仍然存在。


              Flo 不是 HIPAA-covered entity，因此 HIPAA 的严格健康数据保护并不直接适用。结构性监管缺口由此出现：用户可能以为存在 HIPAA 级别保护，但实际上没有。美国主要适用法律框架是
              FTC Act 和州消费者保护法，包括 Roe 之后迅速扩张的一组州健康数据隐私法规。根据 GDPR Article 9，月经与生殖健康数据属于需要明确同意、DPIA 和指定 DPO 的特殊类别数据。EU 与
              UK 监管机构（CNIL、ICO）可对系统性违规处以最高全球年营业额 4% 的罚款——按 Flo 当前估计收入规模，约为 $8–12M。


              Roe v. Wade 之后（自 2022 年 6 月起），生殖健康数据的政治敏感性显著抬升。经期追踪 App 遭遇密集媒体审视，用户担心月经数据是否会在限制堕胎的州被州执法机构传唤。Flo 于 2022 年 9
              月推出 Anonymous Mode 作为回应——该功能与 Cloudflare 合作，通过 Oblivious HTTP（OHTTP，RFC
              9458）实现，使用户可以在不把健康数据与个人身份绑定的情况下使用。技术回应具有实质性，但不能消除 2022 年前已识别用户数据的风险，也不能保护未激活 Anonymous Mode 的用户。
            claimRefs:
              - CR001
              - CR002
              - CR004
              - CR005
