  - number: 4
    title: 财务情况
    sections:
      - number: '4.1'
        title: 收入模式与单位经济性
        blocks:
          - type: paragraph
            body: |
              Flo Health 的收入模式锚定 DTC 免费增值订阅。免费层提供经期追踪、周期预测、
              基础症状记录和 Anonymous Mode 访问。Flo Premium 面向个人订阅者定价
              $59.99 per year（或约 $13 per month），家庭计划 $79.99 per year；
              它解锁 AI 驱动的 Ask Flo 健康助手、个性化健康洞察、专家文章、详细周期分析
              和 Secret Chats 社区功能。截至 2024 年 6 月，Flo 约有 70 million
              月活用户和约 5 million 付费订阅用户，意味着免费增值到付费的转化率约 7%。
              General Atlantic 公告显示，公司 2024 年总预订额超过 $200 million，
              同比增长约 50%。Pass It On Project 向 66 个国家（印度、印度尼西亚、
              尼日利亚等）约 12 million 女性提供免费 Premium 访问，这是有运营成本、
              但没有订阅收入的社会影响项目。Flo 的收入主要经 Apple App Store 和
              Google Play 应用内购买收取，平台费用 15–30% 会显著降低每位订阅用户的
              净收入，估计降至 $42–$51 per year。公开资料没有确认 B2B 企业授权或广告
              收入流；公司看起来完全由订阅收入支撑。年度订阅预付是主导计费形式，这有利于
              营运资本，却会掩盖底层流失动态。每位付费用户收入、流失率、CAC 和 LTV
              公司均未披露，这是本章最大的单位经济性缺口。
