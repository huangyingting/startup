      - number: '2.5'
        title: 监管环境与合规格局
        blocks:
          - type: paragraph
            body: >
              Femtech 的监管环境正在主要地区快速演进。美国 FDA 的 Software as a Medical Device（SaMD）框架——与 International Medical Device
              Regulators Forum 共同发展——适用于提出诊断或治疗主张的健康软件。纯粹定位为健康管理工具的经期追踪应用，一般不落入 FDA SaMD 管辖；但会影响临床决策的 AI
              生育预测（例如自然计划生育）可能跨过监管门槛。Flo 目前主要在健康管理类别运营，但 AI 能力扩展后，必须谨慎管理这条边界。


              FTC 2021 年针对 Flo 的同意令确立了行业级先例：健康应用在向第三方分享健康数据前，必须取得用户明确同意；数据若被不当分享，必须通知受影响用户。这在整个 femtech
              领域制造了合规成本，也抬高了美国消费者的隐私预期。The Guardian 2020 年 1 月关于 Flo 与 Facebook 分享数据的调查报道，是 FTC 行动的催化剂。随后，Flo 推出
              Anonymous Mode（2022 年），并取得 ISO 27001 和 ISO 27701 认证。


              欧洲方面，GDPR 对健康数据处理提出严格要求；EU Medical Device Regulation（MDR）也可能适用于具备诊断能力的 femtech 应用。KFF 记录了 Dobbs v. Jackson
              Women's Health Organization 判决之后，美国围绕生殖健康应用的监管姿态如何演进，包括对 mifepristone 可及性和避孕政策的关注上升。Flo
              面临的现实是：合规既是成本中心，也是差异化护城河——ISO 认证、Anonymous Mode、Privacy & Security Advisory Board 这些投入，在隐私敏感市场里也是营销资产。
            claimRefs:
              - CM035
              - CM036
              - CM037
              - CM038
              - CM039
              - CM040
              - CM042
      - number: '2.6'
        title: 证据要点
        blocks:
          - type: callout
            title: 巨大且高增长的可触达市场
            body: >
              Femtech 市场规模大（全球 $39B–$61B）、增长快（视口径而定，CAGR 8–18%），且结构性渗透不足。女性健康应用是一个 $4–8B 子市场，CAGR 为 16–18%。Flo 的 77M MAU
              使其成为数字经期追踪细分的主导者，也给其变现和向围绝经期、心理健康、雇主福利等相邻品类交叉销售提供了平台。
            calloutType: strength
            claimRefs:
              - CM009
              - CM012
              - CM015
          - type: callout
            title: 数据隐私执法风险与 Roe v. Wade 推翻后的逆风
            body: >
              Roe v. Wade 被推翻后，经期追踪应用面临更高监管审查；在限制堕胎的州，经期数据可能被执法传票调取。FTC 2021 年针对 Flo
              的执法行动确立了高成本合规先例。若公司违反同意令、遭遇新的执法行动，或州级立法限制健康数据，Flo 的品牌和用户留存会受到实质性伤害，尤其是在美国市场。
            calloutType: risk
            claimRefs:
              - CM037
              - CM039
              - CM040
          - type: callout
            title: 新兴市场低 ARPU 限制综合经济性
            body: >
              Flo 增长最快的用户地区（APAC、LatAm）付费意愿明显低于北美和欧洲。这些地区有效 ARPU 低于
              $5/year，意味着用户量增长不会按比例拉动收入增长；随着用户结构向新兴市场迁移，用户数指标和财务表现可能出现背离。
            calloutType: risk
            claimRefs:
              - CM024
              - CM041
          - type: callout
            title: 监管合规成为竞争护城河
            body: >
              Flo 投入 ISO 27001/27701 认证、Anonymous Mode 和 Privacy & Security Advisory Board，把隐私合规做成产品差异化，而不只是合规成本。较小的
              femtech 竞争对手缺少资源复制这些投入，在重视隐私的市场里，Flo 因此获得更持久优势。FTC 执法后、Roe v. Wade 被推翻后的监管环境更有利于规模化平台。
            calloutType: insight
