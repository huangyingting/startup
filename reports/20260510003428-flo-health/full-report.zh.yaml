        overstate achievable multiples in the 2024–2026 environment.
      diligencePath: >-
        Obtain Natural Cycles 2024 annual report from Nasdaq First North investor relations. Use PitchBook or Bloomberg
        data for Noom/Calm private-market marks. Request comparable transactions from M&A banker.
