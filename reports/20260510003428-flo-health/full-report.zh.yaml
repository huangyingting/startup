      - number: '4.4'
        title: 成本结构与盈利路径
        blocks:
          - type: paragraph
            body: |
              Flo Health 是软件订阅业务，没有实体分发、库存和制造成本；成本结构主要由
              R&D 和工程（包括 AI 基础设施）、销售与营销、人员构成。第三方员工数估计显示，
              截至 2025 年公司员工约 685–700+。CEO Dmitry Gurski 2024 年 7 月表示
              Flo 已经产生正向经营性现金流；在如此规模下，现金流为正是值得注意的
              里程碑，也说明免费增值订阅模式的资本效率较好。Flo 2025 年采用 Databricks
              Data Intelligence Platform，显示 AI 和数据基础设施投入较大；经常性
              授权成本会提高 Ask Flo 等 AI 功能的边际交付成本。按 Flo 这类规模的软件
              订阅业务，毛利率通常在 70–80%+ 区间；不过，Flo 实际毛利率未公开披露，
              App Store / Google Play 佣金（IAP 收入的 15–30%）会使净收入相对总预订额
              明显下降。运营费用分布在 R&D、营销和人员上，但没有 GAAP 等价口径拆分。
              鉴于交付模式纯软件，资本开支预计很低，主要资本强度在用于 AI 模型服务的云计算。
              Pass It On Project 的 12 million 用户会带来无收入抵消的服务成本负担
              （云、内容分发），说明社会影响承诺可能压缩部分利润率。若正向现金流属实，
              公司要么毛利率很高，要么相对收入基础保持了纪律性的运营支出；两点
              都需要审计级验证。
