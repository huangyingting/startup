      - number: '5.4'
        title: 隐私、安全与合规控制
        blocks:
          - type: paragraph
            body: >
              Flo 的 Anonymous Mode 是公司的旗舰隐私创新。该功能于 2022 年 9 月推出，直接回应 Dobbs 之后对生殖数据监控的担忧；它使用与 Cloudflare 共同实现的 Oblivious
              HTTP（OHTTP）协议，把用户健康数据与身份彻底解耦。即使是 Flo，也无法把 Anonymous Mode 健康记录链接到具体用户。该功能包含在 Flo Premium 内，不额外收费。2023 年，Flo
              开源了 OHTTP 实现库——ok-bhttp（依 RFC 9292 的 Kotlin Binary HTTP）、bhttp-swift 和 ohttp-client-swift——鼓励更广泛的 femtech
              行业采用类似隐私保护。TIME 将 Anonymous Mode 评为 2023 年 Best Inventions 之一；Fast Company 将其列为 2023 World Changing Ideas
              Awards Rapid Response 类别入围项目。


              Flo 成为第一款同时取得 ISO/IEC 27001（信息安全管理）和 ISO/IEC 27701（隐私信息管理）认证的女性健康
              App，并通过新闻室公布。取得这些认证需要第三方审计整个组织的安全与隐私控制。Flo 还定期请行业领先的网络安全红队公司做渗透测试，并运行漏洞赏金计划。由网络安全领导者组成的 Privacy & Security
              Advisory Board 提供外部治理。所有 Flo 员工和承包商每年接受安全意识培训。


              法律与监管历史：2021 年，Flo 与 FTC 就一项指控达成和解；指控称其在 2017 至 2019 年间通过第三方 SDK 与 Facebook、Google 分享用户健康数据。和解要求 Flo
              在与第三方分享健康数据前通知用户并取得同意，但没有罚款，也不承认不当行为。随后一宗集体诉讼失败，联邦法官认为原告证据存在「难以逾越」的障碍，Flo 在不承认责任的情况下和解。FTC 和解发生在当前产品架构和
              Anonymous Mode 基础设施之前。Flo 的公开政策是从未出售、也永不出售用户数据。公司符合 GDPR 与 CCPA。
