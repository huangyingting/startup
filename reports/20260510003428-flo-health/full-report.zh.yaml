      - number: '6.3'
        title: 客户证明、满意度与留存
        blocks:
          - type: paragraph
            body: >
              Flo 的核心客户证明主要来自应用商店评分和 Trustpilot 评论，而不是具名企业部署，这反映了产品直接面向消费者的性质。美国 iOS App Store 来自 1.9 million 评分者的 4.8/5
              评分，以及 Android 的 7 million 个五星评分，构成了任何 femtech 产品在规模化客户满意度上最庞大、可独立验证的语料。正面评论主题集中在周期准确性、内容质量、症状追踪实用性，以及 App
              作为长期健康伴侣的角色——一位 Trustpilot 评论者提到自 2018 年起使用 Flo。

              负面信号集中在三个方面：(1) 订阅计费投诉——多名 Trustpilot 用户称取消后仍被扣费，或在无意中激活订阅；(2)
              内容个性化缺口——绝经用户发现仍显示与周期无关的内容（如孕期信息），尽管已声明偏好；(3) 数据隐私担忧——部分用户对定向广告与 App 健康输入相关感到不适。这些投诉与 FTC 2021
              年同意令认定的问题高度相似：Flo 在披露不足的情况下向第三方（Facebook、Google）分享敏感健康数据。

              留存有结构性支撑：Flo 自研格式中沉淀了多年健康数据，形成切换成本；被追踪健康事件（月经周期）每月复现；付费功能深度较高。不过，公司未披露经过独立审计的 NRR、GRR 或队列留存数据。Business of
              Apps 对 5 million 付费订阅用户和 $275 million 收入的估计，意味着留存足以支撑 4.5% 的同比收入增长。Flo
              新闻室披露的集体诉讼和解（不承认不当行为而解决）增加了历史声誉风险，但似乎并未实质压低订阅增长。
