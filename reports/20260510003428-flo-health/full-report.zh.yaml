            title: 核心风险：FTC 同意令建立 20 年执法基线
            body: >-
              Flo 的 2021 年 FTC 同意令持续到 2041 年。任何未来隐私违规都会以这条基线评估，而 FTC 现在拥有的财务处罚权限比 2021
              年更宽。再次违规很可能带来重大罚款和叠加声誉损害——隐私合规因此成为永久性的董事会级义务。
