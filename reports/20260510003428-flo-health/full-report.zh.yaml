      - number: '6.4'
        title: 扩张路径与集中风险
        blocks:
          - type: paragraph
            body: >
              Flo 的扩张战略沿三条向量展开：(1) 生命周期扩张——围绝经期模式面向 1 billion+ 系统性供给不足的 40+ 岁女性；(2) 地理扩张——Pass It On 在 66 个国家提供免费
              Premium 访问，在新兴市场建立品牌资产和未来转化可能；(3) 渠道扩张——Flo for Business 面向企业健康福利买方，FSA/HSA 资格（美国，自 2024 年 10
              月起）为现有美国订阅用户打开新的支付机制。

              集中风险值得关注。对 Apple App Store 和 Google Play 的平台依赖带来利润率与分发风险：Apple 通常抽取应用内购买的
              15–30%，任何政策变化（隐私规则、内容限制、排名算法调整）都可能压制获客或抬高 CAC。过度依赖单一人口队列（18–35 岁女性）意味着 Flo 核心 MAU
              基础会自然离开高峰追踪年限，公司需要持续补充新队列，并成功做围绝经期留存。2021 年 FTC 执法行动和持续的集体诉讼敏感性构成法律集中风险；Roe 之后，隐私实践若再次受到监管审查，该风险会放大。

              若没有披露区域 MAU 拆分，地理集中度仍未知；但从 App Store 评分偏向和定价看，美国很可能是最大单一收入市场。EU GDPR 合规给欧洲用户增加合规开销。Pass It On
              计划虽然具有公益性，但来自 66 个国家的 12 million 用户不直接产生收入，形成对西方 Premium 订阅用户的交叉补贴依赖。核心竞争者 Natural Cycles（获 FDA 许可）和 Apple
              Health 内置周期追踪，对核心追踪用例构成平台级替代风险。
            claimRefs:
              - CU026
