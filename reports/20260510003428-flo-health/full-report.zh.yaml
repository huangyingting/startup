              2022 年 9 月推出的 Anonymous Mode 使用 OHTTP（RFC 9458）与 Cloudflare，是有技术实质的隐私增强部署，不只是政策回应。它是 Flo
              管理层在工程层面认真对待隐私风险的最强证据，但不能追溯保护 2022 年前已识别用户数据，也不能保护未激活该功能的用户。
