      - number: '4.3'
        title: 收入增长与公开估计
        blocks:
          - type: paragraph
            body: |
              Flo 自商业化上线以来，收入轨迹明显加速。第三方估计显示，收入从 2018 年
              约 $20 million 增至 2020 年约 $75 million；公司自身确认 2024 年总预订额
              超过 $200 million，同比增长约 50%。2025 财年，两家独立分析数据聚合商
              给出的数字差异很大：Business of Apps 基于订阅量分析，估计年收入为
              $275 million；GetLatka 用不同方法报告 $157.6 million。两者相差 75%
              ——绝对值 $117 million——意味着没有经审计财务，就无法可靠估值。
              CompWorth 估计 2025 年企业价值约 $1.2–1.5 billion，与 Series C 投后
              估值区间一致。2018 到 2024 年收入 CAGR 估计为 45–50%，由免费用户基础的
              订阅转化增长和 Premium 定价持续扩大驱动。相比之下，Flo 最接近的纯 femtech
              竞争对手 Natural Cycles 在 2023 财年报告收入约 $33 million，显示 Flo
              具有显著规模优势。到 2024 年中，订阅用户数增至约 5 million；到 2025–2026
              年，总注册用户基础（累计下载量）达到 430–460 million。按估计 50% YoY
              增长率，将 2024 年 $200M+ 总预订额年化，意味着 2025 年预订额前瞻运行率
              为 $300M+，大体印证 Business of Apps 的估计。公司没有正式披露 ARR；
              所有收入估计都来自第三方数据或公司披露的总预订额指引，且均未经独立审计。
