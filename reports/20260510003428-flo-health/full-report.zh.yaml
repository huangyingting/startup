      - number: '5.5'
        title: 临床研究平台与医学可信度
        blocks:
          - type: paragraph
            body: >
              Flo 通过一系列同行评议研究合作，从消费者 App 演进为临床研究平台。它与 Mayo Clinic 的合作产出了首个关于围绝经期认知的全球数字研究，发表在 Menopause 期刊，数据来自 158 个国家的
              17,000+ 名女性。另一项子宫内膜异位症研究显示，症状追踪数据可能将诊断时间缩短 50% 以上——该疾病平均诊断延迟超过七年。Johns Hopkins University School of
              Medicine 与 Flo 合作，研究产后抑郁的关键风险因素。


              公司科学可信度由 120 多名内部医生、科学家和医学专家背书；他们审阅 App 内分享的所有医学研究和内容。根据 DRG 于 2021 年对 500 名美国妇产科医生的调查，Flo 是排名第一的 OB-GYN
              推荐经期与周期追踪 App。医疗团队直接与数据科学和工程团队协作，为 AI 输出制定训练评分标准；SuperAnnotate 合作就是例证，临床专家为 LLM 评估设定真实标准。


              Flo 在 FIGO World Congress 上展示真实世界周期数据如何改善女性健康结果，把公司放进与学术和临床机构并列的科学共同体。Flo 的 Pass It On Project 目标是向 66
              个国家有需要的 1 billion 名女性免费提供 Flo Premium，包括印度、印度尼西亚和尼日利亚；迄今已捐赠 20 million
              份订阅。该计划把临床数据收集扩展到全球，也扩大了代表性不足人群的训练数据集——包括历史月经研究中代表性不足的围绝经期队列。
            claimRefs:
              - CE030
