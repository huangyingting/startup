      - number: '8.5'
        title: 退出准备度与 IPO 路径
        blocks:
          - type: paragraph
            body: >
              Flo Health CEO Dmitry Gurski 曾公开表示，公司重点是增长，而非近期 IPO。公司尚未披露 IPO 时间表。不过，Series C 结构——General Atlantic 这类专注
              IPO 的成长型投资人提供成长股权——意味着从 July 2024 交割起，退出窗口大约为 3–7 年。在可比消费健康 / SaaS 情况下，General Atlantic 过往通常在投资后 3 到 6
              年推动被投公司 IPO。


              Flo 的主要 IPO 候选标准是：（1）ARR >$300M 且增速 20%+，（2）规模化后 EBITDA 为正（按公司说法，运营层面已实现），（3）FTC 同意令义务已解决或实质性降险，（4）B2B
              收入多元化拿出证据。女性健康科技 / 数字健康 IPO 市场仍处早期：Natural Cycles 于 2019 年在 Nasdaq First North 上市（不是 Nasdaq / NYSE）；截至
              2026 年，美国市场尚无纯女性健康科技公司完成上市。Flo 若想拿到有吸引力的美国 IPO 倍数，可能需要讲出类似 Doximity 或 Phreesia 的高溢价数字健康叙事。


              战略收购更可能成为近期退出路径。潜在买家包括：寻求 DTC 数据管线的制药公司（Bayer、Pfizer / Organon）、消费健康集团（J&J、Procter &
              Gamble）以及健康保险平台（UnitedHealth / Optum、CVS / Aetna）。LabCorp / Ovia Health 先例说明，生育邻近数据在健康计划分发中有战略价值。若 Flo 按
              6–8× ARR 被收购（以 $200M ARR 计为 $1.2–1.6B），价格将接近或等于当前入场估值；除非 ARR 先放大，否则溢价很有限。
            claimRefs:
              - CV030
              - CV031
              - CV032
              - CV033
      - number: '8.6'
        title: 最终尽调要求与投资逻辑破坏监控
        blocks:
          - type: paragraph
            body: >
              做出最终投资决策前，五类证据必须补齐。第一，确认 ARR 和订阅用户经济模型：Flo 未披露财务数据。$200M+ ARR 估计来自（5M 订阅用户 × 年均 ~$55–80），必须用真实订阅组合（月付 vs.
              年付、USD vs. EUR）、退款率和订阅毛利率核验。如果确认 ARR 低于 $150M，而估值为 $1B，则对应 6.7× 倍数，需要极强增长来支撑。


              第二，FTC 同意令状态：20 年监控义务（至 2041 年）要求每年进行独立隐私评估。投资人应取得最近一次评估报告，并确认不存在已提交的 Notice of Violation。若有任何证据显示 FTC
              重新审查——尤其涉及 Flo 的 AI 功能以及与 Databricks / AWS 的数据合作——都是实质性投资逻辑破坏触发点。


              第三，诉讼准备金是否足够：BC 集体诉讼（March 2024 认证）和 California 和解先例（Flo 部分 $8M）已经给出框架，但 BC 损害赔偿金额未知。若 BC 程序的诉讼准备金低于
              $25M，可能不足。第四，B2B 管线：企业健康计划和雇主健康福利集成被列为增长向量，但公司未披露来自 B2B 的已签约 ARR。尽调应量化当前 B2B
              ARR、管线和平均合同价值。第五，投资人权利和清算优先权：Flint Capital、BOND、Target Global 和 General Atlantic 在 $1B
              入场估值下形成的优先股堆叠，可能带来优先权悬置，使普通股股东回报低于 2× 入场价。
            claimRefs:
              - CV034
