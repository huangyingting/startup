  - id: FV001
    title: 投资建议逻辑流
    slug: recommendation-logic-flow
    type: flow
    data:
      nodes:
        - id: scale
          label: 规模：77M MAU，5M+ Premium 订阅者
        - id: revenue
          label: 收入：ARR 估计约 $200M；现金流为正
        - id: valuation
          label: 估值：Series C 投后 $1B（5× ARR）
        - id: risk
          label: 风险：FTC 命令、集体诉讼、平台依赖
        - id: recommendation
          label: 建议：有条件买入 — 中高信心
    caption: 从 Flo Health 的运营规模和融资情况到投资建议的证据链。建议以确认 ARR 和 FTC 合规状态为条件。
    claimRefs:
      - CV001
      - CV002
      - CV003
  - id: FV002
    title: 估值对 ARR 和退出倍数的敏感性
    slug: valuation-sensitivity-arr-multiple
    type: bar
    data:
      items:
        - label: ARR 为 $100M 时 3× ARR
          value: 300
        - label: ARR 为 $100M 时 5× ARR
          value: 500
        - label: ARR 为 $100M 时 8× ARR
          value: 800
        - label: ARR 为 $200M 时 3× ARR
          value: 600
        - label: ARR 为 $200M 时 5× ARR（进入价）
          value: 1000
        - label: ARR 为 $200M 时 8× ARR
          value: 1600
        - label: ARR 为 $300M 时 3× ARR
          value: 900
        - label: ARR 为 $300M 时 5× ARR
          value: 1500
        - label: ARR 为 $300M 时 8× ARR
          value: 2400
    caption: >-
      不同 ARR 情景和退出倍数下的隐含企业价值（百万美元）。在 $200M ARR（中心估计）下，5× 倍数对应 $1.0B（进入价）；8× 倍数对应 $1.6B。$100M ARR 下 3× 情景（$300M）意味着相对 $1B
      进入价亏损 70%。敏感性凸显投资前确认 ARR 的重要性。
    claimRefs:
      - CV009
      - CV010
      - CV011
      - CV021
  - id: FV003
    title: 各情景估值与回报区间
    slug: valuation-return-range-scenarios
    type: range
    data:
      items:
        - label: 悲观情景（20%）
          low: 400
          high: 600
        - label: 基准情景（60%）
          low: 1750
          high: 2100
        - label: 乐观情景（20%）
          low: 3500
          high: 4000
    caption: >-
      2027–2028 年退出估值区间（百万美元），覆盖悲观、基准和乐观情景。悲观情景意味着相对 $1B 进入价亏损 40–60%。基准情景意味着 1.75–2.1× 总回报。乐观情景意味着 3.5–4.0×
      总回报。概率加权期望值：约 $1.7–2.0B（进入价的 1.7–2.0×）。
    claimRefs:
      - CV024
      - CV025
      - CV026
      - CV027
      - CV028
  - id: FV004
    title: 投资 KPI 记分卡
    slug: investment-kpi-scorecard
    type: kpi
    data:
      items:
        - label: 市场规模
          value: 8 / 10
          detail: 女性健康科技总可用市场（TAM）到 2030 年 $50B+（Allied/Grand View）；生殖健康数据是长期需求
        - label: 用户规模与证明
          value: 9 / 10
          detail: 77M MAU；全球最大的女性健康垂直数字应用；5M+ 付费订阅者
        - label: 竞争护城河
          value: 7 / 10
          detail: 数据网络效应和信任声誉较强；Apple/Samsung 原生功能风险中等
        - label: 收入模型
          value: 7 / 10
          detail: 订阅 ARR 估计约 $200M；现金流为正；B2B 上行空间尚未验证
        - label: 监管 / 法律风险
          value: 5 / 10
          detail: FTC 20 年同意令；BC 集体诉讼；GDPR 特殊类别数据敞口；拉低评分
        - label: 估值
          value: 7 / 10
          detail: $1B、5× ARR，相比消费健康同业属合理；若 ARR <$150M 则偏高
        - label: 退出准备度
          value: 6 / 10
          detail: 未披露 IPO 时间表；战略退出可行，但女性健康科技领域 >$1B 先例有限
    caption: 面向 IC 的七维评分。综合分：49/70（70%）。监管 / 法律风险（5/10）和退出准备度（6/10）是整体信心的主要拖累。用户规模和市场规模是突出的正向因素。
    claimRefs:
      - CV001
      - CV003
      - CV004
      - CV015
      - CV036
appendices:
  - id: A
    title: 关键尽调问题与证据缺口
    blocks:
      - type: list
        title: 管理层尽调优先开放问题
        items:
          - 提供 FY2023 和 FY2024 经审计财务报表，或确认管理账口径的收入区间。
          - 提供 Series C 交割时的股权结构表，包括所有投资者持股、创始人稀释和期权池。
          - 说明 Palta 公司架构：子公司、公司间协议，以及 Yuri Gurski 双重 CEO 角色冲突。
          - 提供 BC 集体诉讼进展，以及法律顾问对风险敞口区间的评估。
          - 披露任何未偿债务、风险债、可转债或授信额度。
          - 提供 Flo Premium 订阅者的总留存率和净留存率（NRR）数据。
          - 说明 Series C 募资用途进展：围绝经期产品、R&D 招聘和 M&A 管线。
          - 说明 Ask Flo AI assistant 被 FDA 按 SaMD 分类的监管风险评估。
        claimRefs: []
