      - number: '4.5'
        title: 财务风险与尽调结论
        blocks:
          - type: paragraph
            body: >
              Flo Health 的财务画像存在几项关键尽调堵点，仅靠公开数据无法可靠测算投资案。第一，也是最关键的一点：没有审计财务报表。Business of Apps 与 GetLatka 对 2025
              年收入的估计分别为 $275M 与 $157.6M，相差 75%；仅选择哪一个估计，就可能让基于 DCF 的估值移动 30–40%。第二，FTC 同意令（2021 年 6
              月结案）没有罚款，但要求同意机制和第三方数据删除；Flo 的总合规成本未披露。2025 年加州集体诉讼和解让 Flo 支付 $8 million（$56M 总额中其余 $48 million 由 Google
              支付）。第九巡回上诉（Frasco et al. v. Flo Health，案号 25-3496，2025 年 6 月提交）仍在审理；British Columbia 集体诉讼（Clements v. Flo
              Health，3:21-cv-06147）仍是持续的或有负债。第三，CEO 在 2024 年 7 月提出的正现金流说法没有独立审计验证；如果公司动用了 Series C
              资金来支持运营，底层经营现金流可能为负。第四，平台集中风险偏高：Apple 和 Google 共同控制 IAP 分发与定价，任何佣金上调或政策变化——例如 Apple
              正在推进的执法行动——都可能显著压低每订阅用户净收入。最后，地理收入集中度未知；如果大部分收入来自美国，单一市场会放大 GDPR 与 Dobbs 之后监管风险。财务结论是：作为消费者订阅业务，Flo Health
              已经证明了可观收入规模和增长速度，但缺少审计财务、单位经济模型未披露、诉讼仍在进行、且依赖平台；在形成任何可靠估值前，必须先做完整数据室尽调。
