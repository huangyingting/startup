      - number: '7.4'
        title: 运营、技术与 AI 安全风险
        blocks:
          - type: paragraph
            body: >
              Flo 已经部署 AI 驱动的健康咨询能力，包括基于 LLM 的 Ask Flo 健康助手，由此引入有实质意义的 AI 安全风险。在健康场景下，LLM
              幻觉（生成医学上看似合理但错误的建议）可能伤害用户，尤其是用户据此处理生育、怀孕、症状解读或药物相互作用时。Flo 设有 Medical Expert Board 和内容审阅流程，包括与 Mayo Clinic
              的合作。不过，AI 功能开发速度与覆盖健康主题的广度带来持续安全风险；如果不牺牲产品速度，很难完全化解。


              Flo 的 Anonymous Mode 使用 IETF 标准化的 OHTTP（RFC 9458），由 Cloudflare 担任中继运营方，从技术上阻止 Flo 服务器将用户健康数据请求与 IP
              地址或身份关联。这项部署具有实质性隐私增强效果。不过，该功能也引入了对 Cloudflare 中继基础设施的依赖，以及规模化部署的新型加密实现可能存在的漏洞。任何用户数据泄露——即使是汇总数据——都会触发既有
              FTC 同意令下的执法审查。


              FDA 的 Digital Health Center of Excellence 将某些软件功能归类为 Software as a Medical Device（SaMD），需要上市前审查。Natural
              Cycles 于 2018 年取得 FDA De Novo 分类，作为避孕工具，说明基于 AI 的生殖健康工具可能进入 FDA 管辖。Flo 尚未为任何功能申请 FDA 许可，并将其定位为健康管理工具。如果
              FDA 将 Flo 的 AI 生育预测或症状评估功能重新归类为 SaMD，Flo 将面临上市前审查要求、临床验证义务和潜在功能封锁。此外，Flo 主要云基础设施依赖
              AWS，引入单一供应商集中风险；公司未公开披露多云策略。
            claimRefs:
