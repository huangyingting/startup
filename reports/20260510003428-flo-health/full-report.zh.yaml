      - number: '6.2'
        title: 采用情况与增长轨迹
        blocks:
          - type: paragraph
            body: >
              Flo 的月活用户从 2018 年初的 22 million 增至 2024 年 6 月的 70 million，并在 2025 年达到 77 million，大致对应每年 20–25% 的复合增长轨迹。2025
              年年度下载量达到 48.6 million，说明新用户获取仍在持续。全平台累计注册用户超过 430–460 million，反映了多年累计安装，其中包含已流失或不活跃用户。

              免费到付费的转化率估计约为 MAU 的 6–8%，近期报道显示付费订阅用户约 5 million。订阅收入在 2025 年达到 $275 million（较 2024 年的 $263 million 增长
              4.5%），意味着每订阅用户年均收入约 $55，符合以年度套餐为主的定价模型。IQVIA 的数字健康市场研究确认，头部健康 App 的付费转化率可达 5–10%，把 Flo 放在典型消费者健康 App
              转化区间的上沿。

              应用商店评分很强：iOS（美国）在 1.9 million 条评分中获得 4.8/5；Google Play 在 430 million 总成员中报告 7 million 个五星评分。英国 iOS 商店在
              279,000 条评分中显示 4.7/5。Trustpilot 将 flo.health 评为 4.3/5（「优秀」），但也暴露出围绕订阅计费、取消摩擦和内容个性化的显著投诉尾部——在付费增购激进的
              freemium 健康 App 中，这类模式很常见。

              增长驱动来自生殖健康搜索查询中的自然搜索优势、iOS App Store 按下载量在 Health & Fitness 排名 #1、围绝经期产品扩张，以及 Anonymous Mode 功能（TIME Best
              Inventions 2023）在 Roe 之后重新吸引重视隐私的用户。美国成年人智能手机渗透率为 91%（Pew Research，2025），为持续增长提供可触达平台。
