      - number: '1.5'
        title: 负面事件与监管历史
        blocks:
          - type: paragraph
            body: |
              Flo Health 最重要的负面事件是美国联邦贸易委员会（FTC）的投诉与和解。FTC
              指控称，自 2016 年以来，Flo 在隐私政策中反复承诺不会分享这些数据，却将
              用户敏感健康数据——包括月经和生育信息——分享给 Google、Facebook
              （经 Facebook Analytics）、AppsFlyer 和 Flurry 等第三方。公司 2021 年
              8 月达成和解，要求其：（1）在分享健康数据前取得用户同意；（2）指示第三方
              删除已经收到的健康数据；（3）接受独立隐私审计。和解没有罚款，但行为约束
              很重。隐私审计于 2022 年 3 月完成。

              Wall Street Journal 2019 年 1 月的调查最先曝光了这些数据分享做法。2024 年
              3 月，不列颠哥伦比亚省最高法院批准针对 Flo 同一数据做法的集体诉讼认证。
              2025 年，源自同一数据分享事件的加州集体诉讼以 $56 million 总额和解——Flo
              支付 $8 million，Google 支付 $48 million。不过，加州案中的一名联邦法官
              明确称，关于 Flo 不当向 Meta 分享月经周期数据的指控缺乏证据，这一问题
              「无法逾越」，为 Flo 提供了部分澄清。

              这些负面事件构成实质性的治理风险和客户信任敞口；Roe v. Wade 被推翻后，
              生殖健康数据更敏感，风险尤其突出。此后，Flo 推出 Anonymous Mode，并取得
              两项 ISO 认证，用来回应数据隐私担忧。
