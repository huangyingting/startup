      - number: '2.3'
        title: 买方、用户与支付方分层
        blocks:
          - type: paragraph
            body: >
              Flo 的核心用户群是 18–45 岁女性，需求包括经期和生育追踪、妊娠监测、围绝经期支持。在 DTC 渠道里，买方和用户是同一个人；下载免费，Premium
              功能靠订阅解锁。平台的免费增值模式形成了很宽的漏斗顶部（77M+ 注册用户、50M 月活），付费转化层则构成收入基础。


              第二个且正在增长的买方分层是雇主：Flo for Business 让组织把 Flo Premium 作为职场健康福利提供给员工。支付方由个人转为雇主后，单用户 ARPU
              可以更高，流失也会降低。第三类新兴买方是健康保险方或国家医疗服务体系，尤其在欧洲市场，预防性女性健康正逐步获得报销。Roe v. Wade
              被推翻后，美国雇主项目的重要性上升，因为企业在提供生殖健康福利；但美国保险报销仍处在早期。


              各分层的采用触发点不同：个人用户在生殖健康拐点采用（初潮、避孕决策、备孕、妊娠、围绝经期开始），雇主和保险买方则以员工健康结果和降本指标评估 femtech。地域分层显示，北美和欧洲 因用户愿意为 Premium
              数字健康付费，ARPU 最高；APAC 和拉美带来最高的用户量增长，但 ARPU 显著更低，压制综合经济性。
