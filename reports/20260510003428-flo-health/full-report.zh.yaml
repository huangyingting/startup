              总预订额和高毛利软件模型，这说明公司在单位经济模型上约束力较强。若能得到独立验证，在 77M MAU 和 5M 付费订阅用户规模上实现正经营现金流，将为 Series C 投资提供有吸引力的风险调整后画像。
