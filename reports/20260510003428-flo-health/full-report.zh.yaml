          - type: callout
            title: 要求审计财务与单位经济模型数据室
            body: >
              投资推进前必须要求：(1) 最近两个财年的审计财务报表（损益表、资产负债表、现金流量表）；(2) 按获客年份拆分的订阅用户队列数据，显示年度流失；(3) 按主要渠道拆分的 CAC；(4) 净收入拆分，区分 App
              Store / Google Play 回款与直接计费；(5) 股权结构表，列明全部在外股权、期权和任何可转工具。仍在进行的第九巡回上诉（Frasco，2025）与 BC
