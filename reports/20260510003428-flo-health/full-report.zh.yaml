      - number: '1.4'
        title: 规模指标与关键里程碑
        blocks:
          - type: paragraph
            body: |
              Flo 在消费健康领域的增长轨迹十分突出。从上线第一年（2016–17）的 2 million
              活跃用户，到 2025 年超过 77 million 月活用户，应用九年用户增长的估计 CAGR
              超过 40%。下载量从 380 million（Wikipedia，2024 年 11 月）增至
              430–460 million（Google Play 和 Apple App Store，2026 年），显示全球
              扩张仍在继续。

              收入从 2018 年 $20M 增至 2020 年 $75M，并在 2024 年达到估计 $200M+
              总预订额；2025 全年收入，Business of Apps 基于订阅数据估计为
              $275 million，GetLatka 用不同方法给出的较低估计为 $157.6 million。
              Business of Apps 的估计与公司自身总预订额指引更能相互印证。

              公司与 Mayo Clinic 合作，在 Menopause 期刊发表首个全球围绝经期研究；
              研究使用来自 158 个国家、超过 17,000 名女性的数据，证明 Flo 正从消费应用
              转向临床研究平台。Flo 的 Anonymous Mode（2022 年 9 月上线）入选 TIME
              Best Inventions 2023 和 Fast Company World Changing Ideas 2023。
              公司获得 ISO/IEC 27001（信息安全）和 ISO/IEC 27701（隐私）认证，并赢得
              2025 PICCASO Privacy and Security Awards 的 ISO 27001 team of the year。
