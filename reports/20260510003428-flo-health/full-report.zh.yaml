  - number: 6
    title: 客户情况
    sections:
      - number: '6.1'
        title: 客户分层与人口画像
        blocks:
          - type: paragraph
            body: >
              Flo Health 的核心客户是 18–40 岁女性，她们需要把结构化周期追踪与健康洞察结合起来。App 面向四个核心生命周期分层：(1) 月经健康追踪用户，这是最大队列，也是主要获客漏斗；(2) 生育与
              TTC（备孕）用户，她们更深度使用排卵和 BBT 追踪；(3) 孕期追踪用户，她们在受孕后从周期追踪迁移过来；(4) 围绝经期用户，这是 2023 年推出的战略增长分层，面向全球 1 billion+
              正经历围绝经期的女性。次级用户包括使用「Flo for Partners」伴侣功能的伴侣。

              地理上，Flo 覆盖北美、欧洲和 APAC 用户。截至 2026 年 3 月（按 App Store 列表），App 累计下载用户超过 460 million。Google Play 列表显示，全平台成员为
              430 million。公司未披露官方分国家数据，但 App 支持 20+ 种语言，并可在全球访问。Pass It On 计划在 66 个较低收入国家向 12 million 用户提供免费 Premium
              访问，把地理多样性扩展到付费西方市场之外。

              Premium 订阅购买者更偏向寻求更深个性化的用户：周期洞察、生育窗口准确性、PCOS 与子宫内膜异位症等状况的症状追踪，以及 AI
              健康助手访问。免费用户消费内容、基础追踪和社区功能。买方与付款方身份是直接面向消费者（个人女性通过 App Store、Google Play 或 Flo 网页结账付款）；雇主渠道（Flo for
              Business）提供一条小但在增长的 B2B 分发路径。
