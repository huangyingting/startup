    rows:
      - - Natural Cycles（NATU-B）
        - 上市 SaMD 女性健康科技公司
        - ~€80M 收入（2023E）；Nasdaq First North 上市；市值 ~€300–400M
        - ~4–5× 收入
        - 最接近的女性健康科技同业；订阅模式；获 FDA 批准的器械
        - 受监管 SaMD，而 Flo 定位健康管理；瑞典上市；规模更小（约 2M 用户）
      - - Noom（体重管理）
        - 私营消费健康订阅
        - 估值峰值 ~$3.7B（2021）；据报道收入下滑；Series F
        - 当前收入运行率下未知；峰值约 5–7× ARR
        - DTC 健康订阅模式；高级付费层应用
        - 体重管理不同于生殖健康；据报道 2022–2024 年收入下滑
      - - Calm（心理健康）
        - 私营消费健康订阅
        - ~$2.0B 估值（2021 Series B 轮）；Calm Premium ~$70/年
        - 峰值估值约 8–12× ARR
        - 消费级健康订阅；全球规模；由付费内容驱动
        - 心理健康不同于生殖健康；内容重，与数据驱动模式不同；2021 年以来估值可能已压缩
      - - Ovia Health（2021 年被 LabCorp 收购）
        - M&A 交易
        - 收购价格未披露；雇主 / 健康计划渠道
        - 未披露
        - 生育 / 孕期女性健康科技应用；B2B 雇主分发
        - 未披露倍数；战略买方而非财务买方；MAU 基数更小
      - - Headspace（2021 年与 Ginger 合并）
        - 私营 / M&A 心理健康
        - 合并前估值约 $3.0B；合并后价值 $3.0B
        - 合并前约 10–15× ARR
        - 有规模的消费级健康订阅；全球化；应用优先模式
        - 带临床心理健康模块（Ginger）；监管画像不同；用户行为不同
    notes: 私营可比公司（Noom、Calm、Headspace）的收入和估值数据基于第三方估计及周期峰值数据；2022 年后的确认倍数不可得。
