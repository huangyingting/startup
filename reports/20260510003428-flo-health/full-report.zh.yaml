      - number: '3.4'
        title: 替代、置换与反向竞争证据
        blocks:
          - type: paragraph
            body: >
              Flo 最可能被置换的场景，不是突然败给竞争对手，而是被 Apple Cycle Tracking 逐步侵蚀份额。Apple 的免费原生功能无下载摩擦，覆盖每一位 iPhone 用户；Apple
              迭代健康功能也有成熟历史路径：先用一个最低可行的免费原生功能进入某个品类，再持续改进，直到免费版本和竞品付费应用之间的价值差收窄。2025–2026 年 Apple Cycle Tracking
              功能路线图未公开披露，本身就是重大策略不确定性。Apple 的端侧数据架构也预先削弱了专门应用用作差异化的信任论点。

              Natural Cycles 带来的是另一类风险：它不是 Flo 一般追踪功能的替代品，而是从周期追踪向受监管避孕的临床升级。Natural Cycles
              若通过药房渠道合作、处方报销或雇主福利扩大分发，可能永久转化 Flo 意图最高的用户（追求避孕级可靠性的用户）。Natural Cycles 2024 年的盈利增长和 Series C
              融资说明，它有资本和监管可信度积极推进这条路径。

              Natural Cycles 的负面证据，对评估整个品类的监管风险有启发：The Guardian 2018 年调查发现，多名用户只依赖 Natural Cycles 避孕却意外怀孕；UK Advertising
              Standards Authority 维持了关于其营销误导的投诉；Swedish Medical Products Agency 要求公司澄清妊娠风险沟通。FDA 自有数据显示，典型使用失败率为
              6.5%，而公司营销的有效性数字为 93%。这些事件说明，数字健康中的医疗级有效性主张伴随实质诉讼和监管风险；若 Flo 未来转向受监管避孕主张，这类风险会直接落到 Flo 身上。

              Clue 对 Flo 的竞争风险主要集中在欧洲和重视隐私的用户群。它的 GDPR 定位、女性主导治理和科学驱动编辑内容，吸引那些因 Roe v. Wade 推翻后的隐私担忧以及 Flo 的 FTC
              执法历史，而对美国健康应用产生怀疑的用户。
            claimRefs:
              - CP012
              - CP013
              - CP014
              - CP029
              - CP030
              - CP032
              - CP039
              - CP040
      - number: '3.5'
        title: 证据要点
        blocks:
          - type: callout
            title: Apple 原生集成是生存级分发威胁
            body: >
              Apple Cycle Tracking 免费预装在每台 iPhone 上，全球估计 2 billion 活跃 iOS 设备无需任何应用商店发现摩擦即可使用。Apple
              进入应用品类的历史路径很清晰：先提供一个最低限度的免费原生功能，再逐步扩展，直到免费版本与竞品付费应用之间的价值差坍缩（Weather、Podcast、Calculator、Notes）。这为 Flo
              带来明确的轨迹风险。2025–2026 年 Apple Cycle Tracking 功能路线图未公开披露，本身就是重大策略风险。Flo 唯一耐久的防御，来自 Apple
              尚未也可能不会进入的维度：更大数据集带来的 AI 预测准确性、专家医疗内容、社区功能，以及超出周期追踪的生殖健康监测。
            calloutType: risk
            claimRefs:
              - CP015
              - CP027
              - CP036
              - CP040
          - type: callout
            title: Natural Cycles 的监管护城河确实耐久，但边界很窄
            body: >
              Natural Cycles 作为用于避孕的 FDA II 类医疗器械获得许可，确实构成很硬的进入壁垒：临床试验路径（15,500+ 名女性、180,000+ 个周期、多司法辖区监管提交）需要 3–5
              年和数千万美元投入，少数消费应用竞争者才承担得起。Natural Cycles 截至 2024 年 Series C
              的盈利增长说明，监管护城河正在转化为可持续收入。不过，这条护城河范围很窄：它专门保护避孕用例，而不是广义经期追踪。Flo 竞争的市场更宽，避孕细分虽然有价值，却并不是两家公司当前的核心收入驱动。
            calloutType: strength
            claimRefs:
              - CP007
