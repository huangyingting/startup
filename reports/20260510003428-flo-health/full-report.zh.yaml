      - number: '6.5'
        title: 附录
        blocks:
          - type: callout
            title: 大规模 App Store 评分验证产品市场匹配
            body: >
              Flo 在美国 iOS 的 4.8/5 评分来自 1.9 million 名评分者，Android 则有 7 million 个五星评分，这是任何 femtech
              产品能拿到的最强第三方验证。达到这样的评分数量后，选择偏差的意义已经下降——满意和不满意用户都会参与评价。以主要免费用户群还能维持这种评分水平，说明产品确有实用性，也有较好的口碑留存。
            calloutType: strength
            claimRefs:
              - CU017
              - CU018
          - type: callout
            title: Premium 订阅计费投诉提示流失风险
            body: >
              Trustpilot 的负面评论尾部——包括多起取消后扣费、App 内取消失败，以及意外 Apple 订阅扣费投诉——说明 Premium 退出体验存在摩擦。这种模式在 freemium 健康 App
              中很常见，通常会推高退款率和 App Store 争议工单。若不解决，它可能放大约 5M Premium 订阅用户群的流失，并压低续费率。
            calloutType: risk
            claimRefs:
              - CU019
              - CU025
              - CU030
          - type: callout
            title: 数据隐私监管风险仍是重大阴影
            body: >
              2021 年 FTC 同意令（与 Facebook、Google 分享健康数据）、后续集体诉讼和解，以及 Roe 之后美国立法环境，形成持续监管敞口。女性担心经期追踪数据被用于法律程序，推动了对
              Anonymous Mode 的可测量需求——Anonymous Mode 是 Flo 事后不得不补建的功能。EU 的 GDPR
              执法和美国州隐私法（CCPA、Colorado、Virginia）带来持续合规成本，并限制可允许的数据使用，压缩 Flo 的数据变现选择权。
            calloutType: risk
            claimRefs:
              - CU029
              - CU031
              - CU032
              - CU033
          - type: callout
            title: 围绝经期模式是长期留存关键杠杆
            body: >
              Flo 核心 18–35 岁年龄带会自然离开高峰周期追踪年限。若没有围绝经期留存，MAU 增长就必须完全依赖新队列替换。2023 年围绝经期模式——与 Mayo Clinic 围绕全球研究合作开发——瞄准 1
              billion+ 的可服务市场，而现有数字健康产品系统性服务不足。若围绝经期采用成功，平均用户生命周期可从约 15–17 年（初潮至绝经）延长到 25+ 年，显著改善 LTV。
            calloutType: insight
