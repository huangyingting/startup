      - number: '4.2'
        title: 资本结构与资金充足性
        blocks:
          - type: paragraph
            body: |
              Flo Health 多轮股权融资累计约 $299 million。公司的 SEC EDGAR 备案记录
              （CIK 0001752100）确认 Flo Health, Inc. 注册于特拉华州；唯一正式 SEC
              备案是 Form D（accession 0001752100-18-000002），记录了一笔 $750,000
              股权发行，首次销售日期为 2018 年 7 月 24 日，并列明当时 CEO 为 Yury
              Hurski。该 Form D 看起来是一轮未被公开新闻覆盖的内部或早期融资。Flo
              后续融资历史来自公司概况章节，包括 $1M 种子轮（2016）、$5M Series A
              （2017）、$6M Series A extension（2018）、Founders Fund 领投的
              $7.5M 后期 A 轮（2019）、VNV Global 和 Target Global 领投且估值
              $800M 的 $50M Series B（2021），以及 2024 年 7 月 General Atlantic
              领投、估值 $1B+ 的变革性 $200M+ Series C。General Atlantic 的少数股权
              意味着公司投后估值超过 $1B；确切所有权稀释未披露。GP Bullhound 担任
              Series C 的财务顾问。公开资料没有记录任何风险债或信贷额度；唯一 SEC
              备案是 2018 年股权 Form D。Series C 后在手现金未公开披露，但 CEO 在
              2024 年 7 月称公司现金流为正，说明公司并非因资金必需而融资。Flo 的母体
              是 Palta，Flo 联合创始人兼总裁 Yuri Gurski 同时担任 Palta CEO；公司间
              财务关系，以及 Palta 是否向 Flo 提出资本需求，公开资料均未记录，构成重大
              尽调缺口。
