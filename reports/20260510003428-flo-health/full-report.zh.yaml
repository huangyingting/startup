      - number: '1.3'
        title: 融资历史与资本结构
        blocks:
          - type: paragraph
            body: |
              Flo Health 多轮累计融资约 $299 million。公司 2016 年获得 Flint Capital
              和 Haxus Venture Fund 投入的 $1 million 种子轮。随后，2017 年获 Flint
              Capital 与模特 / 投资人 Natalia Vodianova 投入 $5 million Series A；
              2018 年获 Mangrove Capital Partners（Flint Capital 和 Haxus 参投）
              投入 $6 million Series A extension，隐含估值约 $200M。2019 年中，
              Founders Fund 又领投 $7.5 million。

              $50 million Series B 于 2021 年 9 月完成，由 VNV Global 和 Target
              Global 领投，公司估值 $800 million。尽管该轮与 FTC 和解同期发生，估值仍
              大幅上升。到 Series B 时，Series C 之前累计融资约 $99.45 million。

              关键一轮发生在 2024 年 7 月 30 日，General Atlantic 领投 $200M+
              Series C，将 Flo 估值推至 $1 billion 以上——成为首个纯数字消费级女性健康
              独角兽。CEO Gurski 称公司此前获得了「大量主动入局兴趣」，并选择 General
              Atlantic，是看重其「在消费科技、医疗健康和订阅商业模式交叉领域扩展公司的
              深厚经验」。公司为私营、未披露财务，没有公开财务申报；收入和员工数估计来自
              第三方数据源，可能存在重大不确定性。
