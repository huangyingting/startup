      - number: '1.2'
        title: 创始人、管理层与治理
        blocks:
          - type: paragraph
            body: |
              Flo Health 于 2015 年由 Dmitry Gurski（CEO）和 Yuri Gurski
              （总裁，同时也是母体 Palta 的 CEO）兄弟共同创立，Roman Bugaev（CTO）
              和 Andrew Kovzel 也参与创办。Gurski 兄弟是白俄罗斯创业者，具备数字产品
              开发背景，此前也曾共同创办科技公司，其中部分被大型科技公司收购。Dmitry
              Gurski 是公司最主要的公开代表和战略决策者。

              Anna Klepchukova, MD 担任首席医疗官，推动 Flo 建立医疗可信度；她是公司
              将自身定位为「妇产科医生推荐度第 1 的周期追踪应用」以及推进科研合作的
              核心发声者。CTO Roman Bugaev 主导技术演进，包括 2022 年与 Cloudflare
              合作，使用 Oblivious HTTP 协议推出 Anonymous Mode，以及 2025 年采用
              Databricks Data Intelligence Platform。

              2024 年 7 月 General Atlantic 投入 Series C 后，Tanzeen Syed
              （GA 董事总经理、Consumer Internet and Technology 负责人）和 Jessie
              Cai（GA Principal）加入 Flo 董事会。公司女性员工占 56%，内部医生和健康
              专家 120+。截至 2025 年，总员工数估计为 685–700+。GP Bullhound 担任
              Series C 融资的财务顾问。

              Dmitry Gurski 作为创始 CEO 和主要外部沟通者，关键人物风险偏高。不过，
              四位创始人的团队结构，以及 Dmitry 任 CEO、Yuri 任总裁 / 母体 CEO 的双高管
              结构，为最高层提供了一定冗余。
