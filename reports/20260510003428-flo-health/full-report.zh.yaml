      - number: '8.3'
        title: 可比公司与交易分析
        blocks:
          - type: paragraph
            body: >
              女性健康科技可比上市公司很少：Natural Cycles 是唯一直接可比的上市同业。Natural Cycles 在 Nasdaq First North（Stockholm）挂牌，代码 NATU-B，2023
              年收入约 €70–80 million（EUR）；按市值倒推，它的收入倍数明显低于 Flo 的 $1B / ~$200M 隐含倍数。2022–2024 年，Natural Cycles 收入年增速约
              25–35%，增长由 FDA 批准的避孕 App 和高级订阅（$14.99/month）带动。对比并不完美：Natural Cycles 是受监管的 SaMD 设备，Flo 则主要是健康管理 App，只拥有一项
              FDA 批准功能；不过两家公司都靠面向消费者的健康订阅变现。


              更宽泛的数字健康和消费订阅可比公司包括 Noom（体重管理，最后已知估值在收入据报下滑前峰值约 ~$3.7B）、Calm（心理健康，峰值估值约 ~$2B）和 Headspace（心理健康，已与 Ginger
              合并）。这些公司都没有直接上市。并购方面，Ovia Health（生育与家庭健康 App，January 2021 出售给 LabCorp）提供了一笔先例交易。LabCorp 未披露收购 Ovia
              的价格，但交易逻辑是雇主 / 健康计划渠道分发——这正好对应 Flo 的 B2B 扩张逻辑。


              SVB 和 CB Insights 给出的 SaaS 估值基准显示，成长期消费健康订阅软件通常按 3–8× ARR 定价。按 Flo 估计 $200M ARR 计算，$1B 估值对应 5×
              ARR，正落在区间中部。若 $1B 估值倍数要向 8–10× 扩张，Flo 需要证明三件事：（a）ARR 年增速超过 25%，（b）毛利率向 60%+ 改善，（c）B2B 渠道成功放量。


              Allied Market Research 估计，全球女性健康科技市场从 2022 年 $3.8 billion 增至 2032 年 $10+ billion（CAGR 约 10–11%）；Grand View
              Research 按更宽口径估计，2030 年女性健康科技总可用市场（TAM）为 $60–75 billion。CB Insights 女性健康科技报告指出，全球女性健康科技 VC 融资在 2021 年达到
              $2.5 billion，2023 年降至约 ~$1.3 billion，资金集中在生育、经期健康和更年期。Statista 女性健康科技市场收入数据库估计，到 2026 年全球女性健康科技收入约为 $22
              billion。
            claimRefs:
