      - number: '3.2'
        title: 直接与相邻竞争对手画像
        blocks:
          - type: paragraph
            body: >
              **Clue（BioWink GmbH）** 由 Ida Tin 于 2012 年在德国柏林创立，是首个达到显著规模的女性主导经期追踪应用。Clue 估计服务 12 million
              注册用户，提供多种追踪模式：经期追踪、生育 / 排卵、备孕（Clue Conceive）、妊娠跟踪、围绝经期指导，以及为不来月经用户提供的无经期追踪。其商业模式是免费增值——基础追踪免费，Clue
              Plus（付费）解锁更深入的周期洞察、模式分析、提醒和专家医疗内容。Clue 的核心品牌定位是 GDPR 合规和女性主导治理，用来吸引重视隐私的欧洲用户，并与曾遭 FTC 执法的美国竞争对手形成对照。Clue
              外部融资估计为 $30 million 或更多；2025–2026 年精确数据未公开披露。

              **Natural Cycles** 由 Dr. Elina Berglund Scherwitzl 和 Dr. Raoul Scherwitzl 于 2013
              年在瑞典斯德哥尔摩创立；两人都是粒子物理学家，曾参与 CERN 发现 Higgs boson 的团队。该应用 2017 年成为欧盟首个 CE 认证避孕工具，并于 2018 年 8 月获得 FDA 作为 II
              类医疗器械的许可——这是美国首个获批的避孕应用。截至 2024 年 Series C，Natural Cycles 披露用户超过 3 million，且保持盈利增长。€50.8 million Series C
              由 Lauxera Capital Partners 领投，Point72 Private Investments 参投，并配有 J.P. Morgan 循环债务额度。Natural Cycles
              在六个司法辖区（美国、欧盟、加拿大、澳大利亚、新加坡、韩国）获得监管许可，且不与第三方广告商分享用户数据。

              **Apple Cycle Tracking** 免费内置于所有 iPhone 的 iOS Health 应用。虽然相较专门应用功能有限，Apple 的原生集成无需任何应用商店发现摩擦，就能触达全部 iPhone
              用户可寻址市场。Apple 在设备端加密处理健康数据；启用双因素认证后，即便 Apple 也无法访问用户健康信息。**Glow**（Glowing, Inc.，2013
              年创立）聚焦备孕夫妻的生育和伴侣连接，同时覆盖男性和女性生育记录。**Ovia Health** 最初是 B2C 追踪器，2021 年被 LabCorp 收购后转向雇主福利集成，实际上退出了与 Flo
              的直接消费者竞争。
