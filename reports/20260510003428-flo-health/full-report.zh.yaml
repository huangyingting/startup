            title: 先发的女性健康科技独角兽
            body: |
              2024 年 7 月，Flo 成为首个达到独角兽估值的纯数字消费级女性健康应用；这个
              里程碑同时说明其用户规模（70M+ 月活、5M+ 付费订阅用户）和市场对消费健康
              免费增值订阅模式的信心。总预订额同比增长 50%，且公司确认现金流为正，使
              Flo 在女性健康科技同行中处于独特位置。
