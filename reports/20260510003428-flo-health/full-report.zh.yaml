  - number: 3
    title: 竞争格局
    sections:
      - number: '3.1'
        title: 竞争格局概览
        blocks:
          - type: paragraph
            body: >
              经期和生育追踪的竞争集合并不是一个同质市场：买方至少可以用五类结构不同的方案完成核心任务——理解自己的月经周期。专门的消费应用（Flo、Clue、Glow）主要比拼功能深度、AI 预测质量和品牌。Natural
              Cycles 的位置独特且防御性强，它是唯一获 FDA II 类医疗器械认证、用于避孕的应用，形成了当前消费应用对手无法匹配的监管护城河。平台级既有玩家——Apple 把 Cycle Tracking 内置在
              iOS Health 中——靠免费的原生集成，威胁把专门应用变得多余。B2B2C 模式（Ovia Health，2021 年被 LabCorp 收购）服务雇主和健康计划，而不是直接服务消费者，因此不在消费渠道与
              Flo 竞争。Mira、inne 等生育硬件公司，则把实体激素检测设备叠加配套应用，瞄准意图更强的临床细分。

              CBInsights 认为 Natural Cycles 的主要竞争对手包括 Clue、inne、Eli Health、Lady Technologies、Maven Clinic，以及 Flo
              Health；这也证明竞争格局已经延伸到生育科技和生殖医学，而不只是简单的经期追踪。横跨所有类别，Flo 最重要的竞争优势是规模（最大用户基础，估计 70M+ 月活）、数据深度（由数亿条记录周期构成的自有 AI
              训练集）以及在北欧 之外多数全球市场的消费者品牌认知。它最主要的结构性弱点，一是 2021 年与第三方分析提供商分享数据引发的 FTC
              同意令，二是在女性健康聚焦品类中，由男性创始团队领导引发的社交媒体争议；Clue 和 Natural Cycles 都在竞争定位中主动利用这两点。
            claimRefs:
              - CP001
              - CP006
              - CP007
              - CP015
              - CP017
