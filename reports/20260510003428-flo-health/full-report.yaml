  - number: 6
    title: Customers
    sections:
      - number: '6.1'
        title: Customer Segmentation & Demographics
        blocks:
          - type: paragraph
            body: >
              Flo Health's primary customer is a woman aged 18–40 who seeks structured cycle tracking integrated with
              health insights. The app targets four core life-stage segments: (1) menstrual health trackers,
              representing the largest cohort and the primary acquisition funnel; (2) fertility and TTC
              (trying-to-conceive) users, who engage more deeply with ovulation and BBT tracking; (3) pregnancy
              trackers, who transition from cycle tracking after conception; and (4) perimenopause users, a strategic
              growth segment launched in 2023 targeting the 1 billion+ women globally experiencing perimenopause.
              Secondary users include partners accessing the "Flo for Partners" companion feature.

              Geographically, Flo reaches users across North America, Europe, and APAC. The app has been downloaded by
              over 460 million users in total as of March 2026 (per App Store listing). The Google Play listing states
              430 million members across all platforms. No official country-by-country breakdown is disclosed, but the
              app supports 20+ languages and is accessible globally. The Pass It On program extends free Premium access
              to 12 million users in 66 lower-income countries, broadening geographic diversity beyond paying Western
              markets.

              Premium subscription buyers skew toward users seeking deeper personalization: cycle insights, fertility
              window accuracy, symptom tracking for conditions such as PCOS and endometriosis, and AI-powered health
              assistant access. Free users consume content, basic tracking, and community features. The buyer-payer
              identity is direct-to-consumer (individual women paying via App Store, Google Play, or Flo's web
              checkout), with the employer channel (Flo for Business) offering a small but growing B2B distribution
              path.
            claimRefs:
              - CU001
              - CU002
              - CU003
              - CU004
              - CU005
              - CU006
              - CU007
      - number: '6.2'
        title: Adoption & Growth Trajectory
        blocks:
          - type: paragraph
            body: >
              Flo's monthly active user base grew from 22 million in early 2018 to 70 million by June 2024 and 77
              million by 2025, a compound trajectory of roughly 20–25% annually. Annual downloads reached 48.6 million
              in 2025, indicating sustained new-user acquisition. Total registered users across all platforms exceed
              430–460 million, reflecting years of cumulative installs including churned or lapsed users.

              The conversion from free to premium is estimated at approximately 6–8% of MAU, with approximately 5
              million paying subscribers as of recent reporting. Subscription revenue reached $275 million in 2025 (a
              4.5% increase on 2024's $263 million), implying an average revenue per subscriber of roughly $55 per year,
              consistent with a predominantly annual-plan pricing model. IQVIA's digital health market research confirms
              that the top tier of health apps achieves 5–10% paid conversion, placing Flo at the upper boundary of
              typical consumer health app conversion.

              App store ratings are strong: iOS (US) earns 4.8 out of 5 from 1.9 million ratings, and Google Play
              reports 7 million five-star ratings out of 430 million total members. The UK iOS store shows 4.7 out of 5
              from 279,000 ratings. Trustpilot rates flo.health at 4.3 out of 5 ("Excellent") but surfaces a meaningful
              tail of complaints around subscription billing, cancellation friction, and content personalization — a
              pattern common in freemium health apps where premium upsell is aggressive.

              Growth drivers include organic search dominance in reproductive health queries, iOS App Store #1 ranking
              in Health & Fitness by downloads, perimenopause product expansion, and the Anonymous Mode feature (TIME
              Best Inventions 2023) that re-engaged privacy-conscious users post-Roe. Smartphone penetration of 91%
              among US adults (Pew Research, 2025) provides the addressable platform for continued growth.
            claimRefs:
              - CU008
              - CU009
              - CU010
              - CU011
              - CU012
              - CU013
              - CU014
              - CU015
              - CU016
      - number: '6.3'
        title: Customer Proof, Satisfaction & Retention
        blocks:
          - type: paragraph
            body: >
              Flo's core customer proof comes primarily from app store ratings and Trustpilot reviews rather than named
              enterprise deployments, reflecting the direct-to-consumer nature of the product. The iOS US App Store
              4.8/5 rating from 1.9 million raters and Android 7 million five-star ratings represent the largest
              independently verifiable corpus of customer satisfaction at scale for any femtech product. Positive review
              themes center on cycle accuracy, content quality, symptom tracking utility, and the app's role as a
              long-term health companion — one Trustpilot reviewer notes using Flo since 2018.

              Adverse signals are concentrated in three areas: (1) subscription billing complaints — multiple Trustpilot
              users report being charged after cancellation or inadvertent subscription activation; (2) content
              personalization gaps — menopausal users find cycle-irrelevant content (e.g., pregnancy info) displayed
              despite stated preferences; and (3) data privacy concerns — some users express discomfort with targeted ad
              correlation to app health inputs. These complaints closely mirror the FTC's 2021 consent order findings
              that Flo shared sensitive health data with third parties (Facebook, Google) without adequate disclosure.

              Retention is structurally supported by switching costs (years of logged health data within Flo's
              proprietary format), monthly recurrence of the tracked health event (the menstrual cycle), and premium
              feature depth. However, no independently audited NRR, GRR, or cohort retention figures have been
              disclosed. The businessofapps estimate of 5 million premium subscribers at $275 million revenue implies
              retention sufficient to sustain year-over-year revenue growth of 4.5%. The class-action lawsuit settlement
              disclosed in Flo's newsroom (resolved without admission of wrongdoing) adds historical reputational risk
              but appears not to have materially depressed subscription growth.
            claimRefs:
              - CU017
              - CU018
              - CU019
              - CU020
              - CU021
              - CU022
              - CU023
              - CU024
              - CU025
      - number: '6.4'
        title: Expansion Pathways & Concentration Risks
        blocks:
          - type: paragraph
            body: >
              Flo's expansion strategy operates on three vectors: (1) life-stage expansion — the perimenopause mode
              targets 1 billion+ women aged 40+ who are systematically underserved; (2) geographic expansion — Pass It
              On provides free Premium access in 66 countries, building brand equity and potential future conversion in
              emerging markets; and (3) channel expansion — Flo for Business targets corporate wellness buyers, and
              FSA/HSA eligibility (US, since October 2024) opens a new payment mechanism for existing US subscribers.

              Concentration risks are notable. Platform dependency on Apple App Store and Google Play creates margin and
              distribution risk: Apple typically takes a 15–30% cut of in-app purchases, and any policy change (privacy
              rules, content restrictions, ranking algorithm shifts) could suppress acquisition or increase CAC.
              Over-reliance on a single demographic cohort (18–35 women) means Flo's core MAU base faces natural
              graduation out of peak tracking years, requiring continuous cohort replenishment and successful
              perimenopause retention. The 2021 FTC enforcement action and ongoing class-action sensitivity create legal
              concentration risk if privacy practices face renewed regulatory scrutiny post-Roe.

              Geographic concentration is unknown without disclosed regional MAU splits, but the US is likely the single
              largest revenue market given App Store ratings skew and pricing. EU GDPR compliance adds compliance
              overhead for European users. The Pass It On program, while prosocial, does not generate direct revenue
              from 12 million users in 66 countries, creating a cross-subsidy dependency on Premium Western subscribers.
              Key competitor Natural Cycles (FDA-cleared) and Apple Health's built-in cycle tracking represent
              platform-level substitution risk for the core tracking use case.
            claimRefs:
              - CU026
              - CU027
              - CU028
              - CU029
              - CU030
              - CU031
              - CU032
              - CU033
