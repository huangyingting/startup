  - number: 7
    title: Risks
    sections:
      - number: '7.1'
        title: Data Privacy and Regulatory Risk
        blocks:
          - type: paragraph
            body: |
              Flo Health occupies one of the highest-risk positions in consumer technology: it processes intimate
              reproductive and menstrual health data for over 77 million monthly active users—data explicitly
              classified as "special category" under EU GDPR and subject to heightened US federal regulatory
              scrutiny. The company's January 2021 FTC complaint and August 2021 finalized consent order—arising
              from the sharing of sensitive user health data with Facebook, Google, Amplitude, and Fabric contrary
              to its privacy policy—created a permanent regulatory baseline. The settlement imposed a 20-year
              compliance program (through 2041) with mandatory independent privacy assessments and user
              notification, but no monetary penalty, leaving future enforcement exposure open under the FTC's
              expanded authority.

              Flo is not a HIPAA-covered entity, so HIPAA's strict health data protections do not directly apply.
              This creates a structural regulatory gap: users may assume HIPAA-level protection when none exists.
              The primary applicable US legal frameworks are the FTC Act and state consumer protection laws,
              including a rapidly expanding set of state health data privacy statutes post-Roe. Under GDPR
              Article 9, menstrual and reproductive health data constitutes special category data requiring
              explicit consent, a DPIA, and a designated DPO. EU and UK regulators (CNIL, ICO) can impose
              fines of up to 4% of global annual turnover for systemic violations—approximately $8–12M at
              Flo's current estimated revenue scale.

              The post-Roe v. Wade environment (since June 2022) materially elevated the political sensitivity
              of reproductive health data. Period tracking apps faced intense media scrutiny and user concern
              about whether menstrual data could be subpoenaed by state law enforcement in abortion-restrictive
              states. Flo responded in September 2022 with Anonymous Mode—implemented via Oblivious HTTP (OHTTP,
              RFC 9458) in partnership with Cloudflare—allowing use without linking health data to personal
              identity. This is a substantive technical response, but does not eliminate exposure for pre-2022
              identified user data or for users who did not activate Anonymous Mode.
            claimRefs:
              - CR001
              - CR002
              - CR004
              - CR005
      - number: '7.2'
        title: Active Litigation and Legal Exposure
        blocks:
          - type: paragraph
            body: |
              Beyond the FTC regulatory proceeding, Flo faces active civil litigation. A class action was filed
              in British Columbia, Canada, alleging privacy violations arising from the same data-sharing conduct
              cited by the FTC. The Supreme Court of British Columbia certified this class action in March 2024,
              creating concrete legal exposure. The damages quantum and litigation timeline remain key diligence
              gaps requiring direct engagement with Flo's litigation counsel. Separately, a California class
              action arising from the same episode was settled in 2025 for $56M total ($8M from Flo, $48M from
              Google), providing a cost benchmark but not a ceiling for future exposures.

              The FTC complaint alleged that Flo shared detailed health event data—including menstruation,
              pregnancy, and fertility intentions—with third-party analytics SDKs in a manner contrary to Flo's
              privacy policy. The 2021 finalized order requires 20 years of independent privacy assessments and
              user notification. The FTC has since expanded its health data enforcement focus, taking actions
              against GoodRx, BetterHelp, and other health app companies for improper data sharing between 2022
              and 2024, increasing Flo's risk exposure under its existing consent order.

              The post-Roe legal environment has created a new category of health data legal risk: US states
              criminalizing abortion assistance may compel disclosure of reproductive health records as evidence.
              Washington State's My Health MY Data Act (effective 2024) creates a private right of action for
              health data violations with no HIPAA safe harbor. Similar legislation has been enacted or proposed
              in California, Connecticut, Illinois, and several other states, generating a patchwork of compliance
              obligations that Flo must navigate across its ~77M user base globally.
            claimRefs:
              - CR003
              - CR006
              - CR007
              - CR008
              - CR024
              - CR033
      - number: '7.3'
        title: Platform Dependency and Competitive Displacement Risk
        blocks:
          - type: paragraph
            body: |
              Flo's distribution is critically mediated by Apple App Store and Google Play, creating structural
              dependency risk across three dimensions. First, commission rates: Apple charges up to 30% on
              subscriptions in year one (15% thereafter for qualifying subscribers); Google Play similarly charges
              15–30%. At Flo Premium's $55–80/year price point, platform commission materially reduces net
              subscription economics and constrains margin expansion. Apple's Small Business Program rate of 15%
              does not apply at Flo's revenue scale.

              Second, app store removal risk is structurally undiversifiable. Apple's App Store Review Guidelines
              and Google Play's Developer Content Policy grant both platforms broad discretion to remove or
              restrict apps dealing with sensitive health data or reproductive topics. No viable alternative iOS
              distribution channel exists at scale in most markets; EU Digital Markets Act relief is only partial.
              Any platform policy change mandating specific data deletion timelines, consent mechanisms, or
              reproductive health data handling requirements could impose immediate compliance costs and
              potential suspension risk.

              Third, Apple's native Cycle Tracking feature within the iOS Health app provides period tracking,
              ovulation prediction, and fertility window calculation at zero cost to all iPhone users, with deep
              Apple Watch integration (wrist temperature for cycle phase detection). Samsung Health similarly
              offers cycle tracking on Android. These native features compress the addressable market for
              standalone period tracking at the free tier, though they do not replicate the health content
              library, AI advisory features, clinical partnerships, community, or enterprise integrations that
              underpin Flo Premium's value proposition.
            claimRefs:
              - CR012
              - CR013
              - CR014
              - CR015
              - CR022
              - CR026
      - number: '7.4'
        title: Operational, Technical, and AI Safety Risk
        blocks:
          - type: paragraph
            body: |
              Flo has deployed AI-driven health advisory capabilities—including its Ask Flo LLM-based health
              assistant—that introduce meaningful AI safety risk. In a health context, LLM hallucination
              (generating medically plausible but incorrect advice) could harm users acting on incorrect guidance
              about fertility, pregnancy, symptom interpretation, or medication interactions. Flo maintains a
              Medical Expert Board and content review processes including a partnership with Mayo Clinic. However,
              the speed of AI feature development and breadth of health topics covered create ongoing safety risk
              that is difficult to fully mitigate without constraining product velocity.

              Flo's Anonymous Mode uses IETF-standardized OHTTP (RFC 9458) with Cloudflare as relay operator,
              technically preventing Flo's servers from linking user health data requests to IP addresses or
              identity. This represents a substantive privacy-enhancing technical deployment. However, the feature
              also introduces dependency on Cloudflare's relay infrastructure and potential vulnerabilities in a
              novel cryptographic implementation deployed at scale. Any breach of user data—even in aggregate—
              would trigger enforcement scrutiny under the existing FTC consent order.

              The FDA's Digital Health Center of Excellence classifies certain software functions as Software as
              a Medical Device (SaMD) subject to premarket review. Natural Cycles received FDA De Novo
              classification as a contraceptive in 2018, establishing that AI-based reproductive health tools
              can attract FDA jurisdiction. Flo has not sought FDA clearance for any features, positioning them
              as wellness tools. If FDA reclassified Flo's AI fertility prediction or symptom assessment features
              as SaMD, Flo would face premarket review requirements, clinical validation obligations, and
              potential feature blocks. Additionally, Flo's primary cloud infrastructure dependency on AWS
              introduces single-provider concentration risk; no multi-cloud strategy has been publicly disclosed.
            claimRefs:
              - CR009
              - CR010
              - CR011
              - CR016
              - CR025
              - CR027
              - CR028
              - CR036
      - number: '7.5'
        title: People, Geopolitical, and Reputational Risk
        blocks:
          - type: paragraph
            body: |
              Flo was co-founded in Minsk, Belarus, by brothers Dmitry Gurski (CEO) and Yuri Gurski. Following
              the 2020 Belarusian political crisis, the company relocated its headquarters to London and expanded
              engineering in Vilnius, Lithuania. Belarus faces US and EU sanctions related to human rights
              violations, and any residual engineering operations or payments to Belarus-based employees create
              sanctions compliance risk. The current Belarus headcount has not been disclosed—a required
              diligence item. Key person risk is elevated: Dmitry Gurski is the primary strategic decision-maker,
              investor relations lead, and public face, with no publicly disclosed succession plan.

              Flo attracted viral criticism in mid-2024 when its $200M funding round generated social media
              debate about male founders in femtech. The company responded publicly, emphasizing its female-led
              medical and editorial teams, but the incident revealed a persistent reputational vulnerability that
              could affect enterprise partnership negotiations with health systems and insurers prioritizing DEI
              considerations. User reviews on Trustpilot and app store platforms have also flagged billing clarity
              and data deletion difficulties as operational friction points.

              Monetization risk is structural and tied directly to the valuation thesis. Flo has not disclosed
              premium conversion rates. Industry estimates of 3–6% of MAU imply approximately 2.3M–4.6M paying
              subscribers—a range with high valuation sensitivity given the $1B+ unicorn status. Chapter 1 of
              this report cites approximately 5M paid subscribers as of June 2024 (company-stated), implying
              roughly 7% conversion at that time, but the current trajectory is unconfirmed. If conversion
              stagnates below 4% as MAU grows past 80M, the revenue growth model is materially impaired and the
              path to profitability at scale becomes difficult to sustain.
            claimRefs:
              - CR017
              - CR018
              - CR019
              - CR020
              - CR021
              - CR029
              - CR030
              - CR037
              - CR039
              - CR040
      - number: '7.6'
        title: Exhibits
        blocks:
          - type: callout
            title: 'Key Risk: FTC Consent Order Creates 20-Year Enforcement Baseline'
            body: >-
              Flo's 2021 FTC consent order runs through 2041. Any future privacy violation will be assessed against this
              baseline, and the FTC now has broader financial penalty authority than in 2021. A repeat violation would
              likely carry material penalties plus compounded reputational damage—making privacy compliance a permanent
              board-level obligation.
            calloutType: risk
            claimRefs:
              - CR001
              - CR002
              - CR023
          - type: callout
            title: 'Kill Criterion: App Store Removal Is Thesis-Breaking'
            body: >-
              Removal of Flo from either Apple App Store or Google Play would be an immediate thesis-break event. The
              company has no viable alternative distribution at iOS scale in most markets. Rebuilding user acquisition
              through web-only channels would require years and significant capital with uncertain outcomes.
            calloutType: risk
            claimRefs:
              - CR012
              - CR022
          - type: callout
            title: 'Insight: Anonymous Mode Demonstrates Proactive Privacy Engineering'
            body: >-
              The September 2022 launch of Anonymous Mode—using OHTTP (RFC 9458) with Cloudflare—is a technically
              substantive privacy-enhancing deployment, not merely a policy response. It is the strongest evidence that
              Flo's management takes privacy risk seriously at the engineering level, though it does not retroactively
              protect pre-2022 identified user data or users who have not activated the feature.
            calloutType: insight
            claimRefs:
              - CR009
              - CR025
              - CR031
