      - number: '5.3'
        title: Data Platform and Engineering Infrastructure
        blocks:
          - type: paragraph
            body: |
              In June 2025, Flo adopted the Databricks Data Intelligence Platform to replace fragmented data
              systems and legacy infrastructure that impeded cohesive AI-powered user experiences at scale.
              Since the transition, Flo's internal monthly active users on the platform increased 45% and
              weekly active users 57%, reflecting widespread adoption across engineering, data science, and
              business analyst roles. Nearly 46% of all Flo employees now use Databricks monthly for
              data-driven decision-making—a significant data democratisation milestone.

              The Databricks stack at Flo includes: MLflow for ML lifecycle management including model
              versioning and deployment; Mosaic AI as the backbone of the LLM agentic system (Ask Flo fine-
              tuning); Unity Catalog for unified governance, fine-grained access controls, and data lineage
              enforcing privacy requirements; AI/BI Genie for natural-language data queries ("What is our MAU
              for last month?"); Databricks Assistant for SQL debugging under the internal "Copilot" initiative;
              and Unity Catalog Metrics for BI metric reliability. Flo runs 150–200 experiments in parallel
              and more than 400 per quarter, with 1,293 features and 5,617 configurations managed via its
              Experiment Service.

              Flo's production environment is hosted entirely on Amazon Web Services. AWS data centres are
              SOC 1, SOC 2, and SOC 3 certified. Flo uses a virtual private cloud (VPC) with multi-account
              infrastructure to isolate production from staging and development. AWS Key Management Service
              manages encryption keys. Cloudflare's security suite blocks malicious traffic and provides CDN
              routing. The infrastructure uses auto-scaling, load balancing, task queues, and rolling
              deployments for reliability. Databases are backed up daily (incremental) and weekly (full), all
              encrypted. The production environment is monitored 24/7/365 with on-call escalation.

              Flo's open-source developer activity signals technical maturity in privacy-preserving protocols.
              The GitHub organisation (github.com/flo-health) hosts seven public repositories:
              AffectedModuleDetector (Kotlin, Apache-2.0, 55 stars, updated February 2026),
              ok-ohttp-plugin (16 stars, updated May 2025), ohttp-encapsulator (updated May 2025),
              ohttp-client-swift (Swift, 18 stars, updated April 2025), contentful-localization-matrix
              (TypeScript, 13 stars, updated April 2024), ok-bhttp (Kotlin Binary HTTP for OHTTP, updated
              June 2023), and bhttp-swift (MIT, updated June 2023).
            claimRefs:
              - CE005
              - CE006
              - CE007
              - CE008
              - CE033
              - CE034
              - CE035
              - CE036
              - CE040
              - CE041
      - number: '5.4'
        title: Privacy, Security, and Compliance Controls
        blocks:
          - type: paragraph
            body: |
              Flo's Anonymous Mode is the company's flagship privacy innovation. Launched September 2022 in
              direct response to post-Dobbs concerns about reproductive data surveillance, it uses the
              Oblivious HTTP (OHTTP) protocol co-implemented with Cloudflare to completely decouple a user's
              health data from their identity. Even Flo cannot link Anonymous Mode health records to a
              specific user. The feature is included in Flo Premium at no additional charge. In 2023, Flo
              open-sourced its OHTTP implementation libraries—ok-bhttp (Kotlin Binary HTTP per RFC 9292),
              bhttp-swift, and ohttp-client-swift—encouraging the broader femtech industry to adopt similar
              privacy protections. TIME named Anonymous Mode one of its Best Inventions of 2023; Fast Company
              named it a finalist in the 2023 World Changing Ideas Awards Rapid Response category.

              Flo became the first women's health app to achieve simultaneous ISO/IEC 27001 (Information
              Security Management) and ISO/IEC 27701 (Privacy Information Management) certifications, which
              it announced via its newsroom. These certifications require third-party audit of security and
              privacy controls across the organisation. Flo also conducts regular penetration tests by
              industry-leading cybersecurity red-teaming firms and a bug bounty programme. A Privacy &
              Security Advisory Board of cybersecurity leaders provides external governance. All Flo staff
              and contractors receive annual security awareness training.

              Legal and regulatory history: In 2021, Flo reached an FTC settlement over allegations that
              it shared user health data with Facebook and Google between 2017 and 2019 via third-party SDKs.
              The settlement required Flo to notify users and obtain consent before sharing health data with
              third parties, but carried no monetary penalty and no admission of wrongdoing. A subsequent
              class action failed when a federal judge found the plaintiffs' evidence "insurmountable" to
              overcome, and Flo settled without admitting liability. The FTC settlement predates the current
              product architecture and Anonymous Mode infrastructure. Flo's stated policy is that it has
              never sold and will never sell user data. The company is GDPR and CCPA compliant.
            claimRefs:
              - CE019
              - CE020
              - CE021
              - CE022
              - CE023
              - CE037
              - CE038
              - CE039
      - number: '5.5'
        title: Clinical Research Platform and Medical Credibility
        blocks:
          - type: paragraph
            body: |
              Flo has evolved from a consumer app into a clinical research platform through a series of
              peer-reviewed study partnerships. Its collaboration with Mayo Clinic produced the first global
              digital study on perimenopause awareness, published in the journal Menopause, drawing on data
              from 17,000+ women across 158 countries. A separate study on endometriosis suggests that
              symptom-tracking data could shorten time to diagnosis by more than 50%—addressing a condition
              whose average diagnostic delay exceeds seven years. Johns Hopkins University School of Medicine
              collaborated with Flo on a study identifying key risk factors for postpartum depression.

              The company's scientific credibility is underwritten by more than 120 in-house doctors,
              scientists, and medical experts who review all medical studies and content shared in the app.
              Flo is the #1 OB-GYN-recommended period and cycle tracking app per a 2021 survey of 500 US
              obstetricians and gynaecologists conducted by DRG. The medical team works directly with the
              data science and engineering teams to define training rubrics for AI outputs, as demonstrated
              by the SuperAnnotate collaboration where clinical experts set the ground-truth standards for
              LLM evaluation.

              Flo presented at the FIGO World Congress on how real-world cycle data can improve women's
              health outcomes, positioning the company in scientific peer communities alongside academic
              and clinical institutions. Flo's Pass It On Project aims to provide free Flo Premium access
              to 1 billion women in need across 66 countries, including India, Indonesia, and Nigeria,
              with 20 million subscriptions donated to date. This initiative extends the clinical data
              collection globally and expands the training dataset for underrepresented populations—
              including perimenopause cohorts that are underrepresented in historical menstrual research.
