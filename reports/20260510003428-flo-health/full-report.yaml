        title: Exhibits
        blocks:
          - type: callout
            title: App Store Ratings at Scale Validate Product-Market Fit
            body: >
              Flo's 4.8/5 iOS rating from 1.9 million US raters and 7 million Android five-star ratings are the
              strongest third-party validation available for any femtech product. At this rating count, selection bias
              has diminished significance — satisfied and dissatisfied users both contribute. This level of sustained
              rating from a predominantly free user base suggests genuine product utility and favorable word-of-mouth
              retention.
            calloutType: strength
