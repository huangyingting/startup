chapters:
  - number: 1
    title: Company Overview
    sections:
      - number: '1.1'
        title: Identity and Business Model
        blocks:
          - type: paragraph
            body: |
              Flo Health, Inc. is a privately held women's digital health company incorporated in Delaware
              and headquartered in London, United Kingdom. The company operates the world's most-downloaded
              women's health app—Flo—which has accumulated over 430 million registered users since its
              launch in 2016 on iOS and Android. Its operational headquarters and largest talent concentration
              are in Vilnius, Lithuania, with additional offices in London, Amsterdam, and New York.

              Flo's business model is built on a freemium subscription architecture. The core app is free,
              providing period and cycle tracking, basic symptom logging, and ovulation prediction. Flo
              Premium—priced at $59.99/year or approximately $13/month, with a $79.99/year family plan—
              unlocks access to the AI-powered Ask Flo health assistant, personalized health insights, expert
              content, detailed cycle analysis, and Secret Chats community features. As of June 2024, the
              company reported approximately 70 million monthly active users and close to 5 million paid
              subscribers, implying a paid conversion rate of roughly 7%. Gross bookings for 2024 were
              expected to exceed $200 million, representing approximately a 50% year-over-year increase.

              CEO Dmitry Gurski stated that Flo was already generating positive cash flow by July 2024, a
              notable milestone for a consumer health app at this scale. The company also maintains a
              pro-social access program—the Pass It On Project—providing free access to Flo Premium across
              66 countries including India, Indonesia, and Nigeria, with approximately 12 million women
              benefiting as of mid-2024.
            claimRefs:
              - CO001
              - CO002
              - CO003
              - CO004
              - CO005
              - CO006
              - CO007
              - CO008
      - number: '1.2'
        title: Founders, Leadership, and Governance
        blocks:
          - type: paragraph
            body: |
              Flo Health was co-founded in 2015 by brothers Dmitry Gurski (CEO) and Yuri Gurski
              (President, also CEO of Palta, the parent entity), along with Roman Bugaev (CTO) and
              Andrew Kovzel. The Gurski brothers are Belarusian entrepreneurs with backgrounds in digital
              product development and prior experience co-founding tech ventures, some of which were
              acquired by major tech companies. Dmitry Gurski serves as the company's primary public face
              and strategic decision-maker.

              Anna Klepchukova, MD, serves as Chief Medical Officer and has been instrumental in establishing
              Flo's medical credibility—she is the lead voice on the company's positioning as "the #1
              OB-GYN-recommended cycle tracking app" and on its scientific research partnerships. Roman
              Bugaev, CTO, has overseen the technological evolution including the 2022 launch of Anonymous
              Mode using Oblivious HTTP protocol in partnership with Cloudflare, and the 2025 adoption of
              the Databricks Data Intelligence Platform.

              Following the July 2024 Series C from General Atlantic, Tanzeen Syed (Managing Director and
              Head of Consumer Internet and Technology at GA) and Jessie Cai (Principal at GA) joined Flo's
              Board of Directors. The company has 56% female employees and 120+ doctors and health experts
              on staff. As of 2025, total headcount is estimated at 685–700+ employees. GP Bullhound served
              as financial adviser on the Series C capital raise.

              Key-person risk is elevated given Dmitry Gurski's prominence as the founding CEO and primary
              external communicator. However, the four-founder team structure and dual-executive structure
              (Dmitry as CEO, Yuri as President/parent CEO) provides some redundancy at the top.
            claimRefs:
              - CO009
              - CO010
              - CO011
              - CO012
              - CO013
