              Flo became the first purely digital consumer women's health app to achieve unicorn status
              in July 2024, a milestone that signals both the scale of its user base (70M+ MAU, 5M+
              paid subscribers) and the market's confidence in the freemium subscription model for
              consumer health. The 50% YoY gross bookings growth and confirmed positive cash flow
