          - type: callout
            title: Perimenopause Mode Is the Critical Long-Term Retention Lever
            body: >
              Flo's core 18–35 age band naturally ages out of peak cycle-tracking years. Without perimenopause
              retention, MAU growth would require pure new-cohort replacement. The 2023 perimenopause mode — developed
              in collaboration with Mayo Clinic for a global study — targets a 1 billion+ addressable market that is
              systematically underserved by existing digital health products. Successful perimenopause adoption would
              extend average user lifetime from roughly 15–17 years (menarche to menopause) to 25+ years, significantly
              improving LTV.
