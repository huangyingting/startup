        - label: Competitive Moat
          value: 7 / 10
          detail: Data network effect and trust reputation are strong; Apple/Samsung native feature risk moderate
        - label: Revenue Model
          value: 7 / 10
          detail: Subscription ARR ~$200M est.; positive cash flow; B2B upside unproven
        - label: Regulatory / Legal Risk
          value: 5 / 10
