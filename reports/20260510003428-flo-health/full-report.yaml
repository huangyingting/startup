  - number: 3
    title: Competitors
    sections:
      - number: '3.1'
        title: Competitive Landscape Overview
        blocks:
          - type: paragraph
            body: >
              The competitive set for period and fertility tracking is not a homogeneous market: buyers can satisfy the
              core job—understanding their menstrual cycle—through at least five structurally distinct categories.
              Dedicated consumer apps (Flo, Clue, Glow) compete primarily on feature depth, AI prediction quality, and
              brand. Natural Cycles occupies a uniquely defensible position as the only app cleared by the FDA as a
              Class II medical device for contraception, creating a regulatory moat no consumer-app rival currently
              matches. Platform incumbents—Apple with Cycle Tracking built into iOS Health—threaten to render dedicated
              apps redundant through free native integration. B2B2C models (Ovia Health, acquired by LabCorp in 2021)
              serve employers and health plans, not direct consumers, and do not compete with Flo in the consumer
              channel. Fertility hardware companies such as Mira and inne overlay physical hormone-testing devices with
              companion apps, targeting a higher-intent clinical segment.

              CBInsights identifies Natural Cycles' primary competitors as including Clue, inne, Eli Health, Lady
              Technologies, and Maven Clinic alongside Flo Health, confirming that the competitive landscape extends
              into fertility technology and reproductive medicine beyond simple period tracking. Across all categories,
              Flo's most significant competitive advantages are scale (the largest user base at an estimated 70M+
              monthly active users), data depth (a proprietary AI training set built from hundreds of millions of logged
              cycles), and consumer brand recognition in most global markets outside Northern Europe. Its primary
              structural weaknesses are a 2021 FTC consent decree related to data sharing with third-party analytics
              providers, and social-media controversy surrounding its male-founded leadership in a
              women's-health-focused category—both of which are actively exploited in the competitive positioning of
              Clue and Natural Cycles.
            claimRefs:
              - CP001
              - CP006
              - CP007
              - CP015
              - CP017
              - CP019
              - CP024
              - CP033
              - CP034
      - number: '3.2'
        title: Direct and Adjacent Competitor Profiles
        blocks:
          - type: paragraph
            body: >
              **Clue (BioWink GmbH)** was founded in 2012 in Berlin, Germany by Ida Tin, making it the first women-led
              period tracking app to reach significant scale. Clue serves an estimated 12 million registered users and
              offers multiple tracking modes: period tracking, fertility/ovulation, trying to conceive (Clue Conceive),
              pregnancy following, perimenopause guidance, and tracking without a period for users who do not
              menstruate. Its business model is freemium—basic tracking is free, while Clue Plus (paid) unlocks deeper
              cycle insights, pattern analysis, reminders, and access to expert medical content. Clue's core brand
              positioning is GDPR compliance and women-led governance, used to attract privacy-conscious European users
              and to contrast with US competitors that have faced FTC enforcement. Clue has raised an estimated $30
              million or more in external capital; exact 2025–2026 figures are not publicly disclosed.

              **Natural Cycles** was founded in 2013 in Stockholm by Dr. Elina Berglund Scherwitzl and Dr. Raoul
              Scherwitzl, particle physicists who were part of the CERN team that discovered the Higgs boson. The app
              became the first CE-certified contraceptive in the EU in 2017 and received FDA clearance in August 2018 as
              a Class II medical device—the first birth control app ever approved in the United States. As of its 2024
              Series C, Natural Cycles reported more than 3 million users and profitable growth. The €50.8 million
              Series C was led by Lauxera Capital Partners with Point72 Private Investments and a J.P. Morgan revolving
              debt facility. Natural Cycles holds regulatory clearance in six jurisdictions (US, EU, Canada, Australia,
              Singapore, South Korea) and does not share user data with third-party advertisers.

              **Apple Cycle Tracking** is built into the iOS Health app at no cost on all iPhones. While feature-limited
              relative to dedicated apps, Apple's native integration reaches the full addressable market of iPhone users
              without any app-store friction. Apple processes health data on-device with encryption, and even Apple
              cannot access user health information when two-factor authentication is enabled. **Glow** (Glowing, Inc.,
              founded 2013) focuses on fertility and partner connection for couples trying to conceive, covering male
              and female fertility logging simultaneously. **Ovia Health**, originally a B2C tracker, was acquired by
              LabCorp in 2021 and pivoted to employer benefits integration, effectively exiting direct consumer
              competition with Flo.
            claimRefs:
              - CP001
              - CP002
              - CP003
              - CP004
              - CP005
              - CP006
