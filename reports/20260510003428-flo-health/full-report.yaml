  - number: 2
    title: Market Analysis
    sections:
      - number: '2.1'
        title: Market Boundary and Definition
        blocks:
          - type: paragraph
            body: >
              Flo Health competes within the femtech sector—a broad category encompassing digital technologies, mobile
              applications, wearable devices, diagnostics, and telemedicine platforms designed to address women's health
              across the full life course: menstruation, fertility, pregnancy, postpartum, and perimenopause through
              menopause. Within femtech, the directly addressable segment for Flo is women's hormonal health apps,
              specifically cycle and period tracking, ovulation and fertility guidance, pregnancy monitoring, and
              perimenopause support.


              Status-quo substitutes include physical calendars, paper-based cycle logs, general smartphone notes apps,
              clinical visits to OB-GYN providers, and basic wellness apps lacking reproductive health features.
              Adjacent markets that expand Flo's total opportunity include digital mental health (mood and anxiety
              tracking overlapping menstrual cycle), employer benefits platforms (through Flo for Business), telehealth
              consultations, and connected wearable biosensor devices.


              Excluded from Flo's direct SAM are femtech hardware and standalone medical devices (e.g., fertility
              hormone monitors), enterprise clinical decision-support software for providers, and physical diagnostic
              kits. The payer landscape is currently dominated by individual direct-to-consumer subscriptions
              (freemium/premium model) but is expanding toward employer-sponsored access and, in early-stage form,
              health insurer reimbursement in select European markets. This boundary matters for sizing: broad femtech
              TAM figures often include hardware, clinical diagnostics, and enterprise software that Flo does not
              currently monetize.
            claimRefs:
              - CM001
              - CM002
              - CM003
              - CM004
              - CM005
              - CM006
              - CM007
              - CM008
      - number: '2.2'
        title: Market Sizing and Growth Forecasts
        blocks:
          - type: paragraph
            body: >
              Analyst estimates for the global femtech market vary substantially in both base-year value and projected
              CAGR, reflecting differences in scope definitions. Grand View Research estimated the femtech market at
              $39.29B in 2024 with a CAGR of 16.37%, projecting $97.25B by 2030. Precedence Research assessed the market
              at $60.89B in 2025, forecasting $140.64B by 2035 at a more conservative 8.73% CAGR through that period.
              Allied Market Research valued the femtech industry at approximately $28B in 2023, noting VC funding
              reached $840M in 2022 following a 2021 peak. These wide ranges—$28B to $61B for the same approximate time
              window—likely reflect whether the scope includes hardware/wearables and clinical diagnostics alongside
              software-only platforms.


              For the women's health apps sub-market specifically, GM Insights estimated the segment at $4.1B in 2024
              projecting $22.1B by 2034 at 18.5% CAGR, while Allied Market Research pegged women's health app market at
              $2.9B in 2023 growing to $11.3B by 2032 at 16.4% CAGR. On the user demand side, Statista projects global
              period tracking app users to reach 812M by 2025, underscoring the scale of the user opportunity even in
              the absence of reliable revenue-per-user data.


              Flo's TAM at the broadest femtech level is $39–61B (2024–2025 analyst range). Its more relevant
              SAM—women's hormonal health apps globally—is estimated at $4–8B based on women's health apps market data,
              adjusting for Flo's multi-platform geographic footprint. The SOM is constrained by Flo's premium
              subscriber conversion from its 77M registered-user base; at single-digit conversion and $20–30/year
              pricing, this implies a current revenue run-rate in the $100–200M range, though Flo has not disclosed
              exact figures. North America leads regional demand, representing 38.64% of the global femtech market per
              Precedence Research.
            claimRefs:
              - CM009
              - CM010
              - CM011
              - CM012
              - CM013
              - CM014
              - CM015
              - CM016
              - CM017
              - CM018
