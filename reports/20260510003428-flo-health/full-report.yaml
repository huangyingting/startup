      - number: '1.3'
        title: Funding History and Capital Structure
        blocks:
          - type: paragraph
            body: |
              Flo Health has raised approximately $299 million in total funding across multiple rounds.
              The company began with a $1 million seed round in 2016 from Flint Capital and Haxus Venture
              Fund. This was followed by a $5 million Series A in 2017 from Flint Capital and model/investor
              Natalia Vodianova, and a $6 million Series A extension in 2018 from Mangrove Capital Partners
              (with Flint Capital and Haxus participation) at an implied valuation of approximately $200M.
              In mid-2019, Founders Fund led an additional $7.5 million investment.

              The Series B of $50 million closed in September 2021, led by VNV Global and Target Global,
              which valued the company at $800 million. This represented substantial appreciation despite
              coinciding with the FTC settlement. By the Series B, the total raised prior to Series C was
              approximately $99.45 million.

              The transformative round came on July 30, 2024, when General Atlantic led a $200M+ Series C
              that pushed Flo's valuation above $1 billion—the first purely digital consumer women's health
              unicorn. The company had seen "significant inbound interest" according to CEO Gurski and
              selected General Atlantic for their "deep expertise in scaling companies at the intersection
              of consumer technology, healthcare, and subscription business models." The company is
              private-undisclosed with no public financial filings; revenue and headcount estimates
              come from third-party data sources that may carry material uncertainty.
            claimRefs:
              - CO017
              - CO018
              - CO019
              - CO020
              - CO021
              - CO022
              - CO023
              - CO024
              - CO025
      - number: '1.4'
        title: Scale Metrics and Key Milestones
        blocks:
          - type: paragraph
            body: |
              Flo's growth trajectory has been exceptional for consumer health. From 2 million active
              users in its first year (2016–17) to over 77 million monthly active users by 2025, the app
              has compounded user growth at an estimated 40%+ CAGR over nine years. Downloads have grown
              from 380 million (November 2024 per Wikipedia) to 430–460 million (Google Play and Apple App
              Store, 2026), reflecting continued global expansion.

              Revenue grew from $20M (2018) to $75M (2020) to an estimated $200M+ gross bookings in 2024,
              with full-year 2025 revenue estimated at $275 million by Business of Apps (based on
              subscription data) or $157.6 million by GetLatka (a lower-tier estimate with different
              methodology). The Business of Apps estimate appears better corroborated by the company's
              own gross bookings guidance.

              The company published a first-of-its-kind global perimenopause study in partnership with
              Mayo Clinic in the journal Menopause, drawing on data from over 17,000 women across 158
              countries—evidence of Flo's transition from consumer app to clinical research platform.
              Flo's Anonymous Mode (launched September 2022) was recognized on TIME's Best Inventions
              2023 list and Fast Company's World Changing Ideas 2023. The company received ISO/IEC 27001
              (Information Security) and ISO/IEC 27701 (Privacy) certifications, and won the 2025
              PICCASO Privacy and Security Awards for ISO 27001 team of the year.
            claimRefs:
              - CO026
              - CO027
              - CO028
              - CO029
              - CO030
              - CO031
              - CO032
              - CO033
      - number: '1.5'
        title: Adverse Events and Regulatory History
        blocks:
          - type: paragraph
            body: |
              Flo Health's most significant adverse event is the Federal Trade Commission (FTC) complaint
              and settlement. Beginning in 2020, the FTC alleged that Flo had shared users' sensitive
              health data—including menstrual and fertility information—with third parties including Google,
              Facebook (via Facebook Analytics), AppsFlyer, and Flurry since 2016, despite repeatedly
              promising users in its privacy policy that such data would not be shared. The company reached
              a settlement in August 2021 requiring it to: (1) obtain user consent before sharing health
              data; (2) instruct third parties to delete the health data they had received; and (3) undergo
              an independent privacy audit. No monetary penalty was imposed, but the behavioral requirements
              were substantial. The privacy audit was completed in March 2022.

              A Wall Street Journal investigation in January 2019 first surfaced the data-sharing practices.
              In March 2024, the Supreme Court of British Columbia certified a class action against Flo
              regarding the same data practices. In 2025, a California class action arising from the same
              data-sharing episode was settled for $56 million total—Flo paid $8 million and Google paid
              $48 million. However, a federal judge in the California case notably described the lack of
              evidence supporting allegations that Flo improperly shared menstrual cycle data with Meta
              as an "insurmountable" problem, providing partial vindication.

              These adverse events represent a meaningful governance risk and customer trust exposure,
              particularly given the sensitivity of reproductive health data in the post-Roe v. Wade
              environment. Flo has since implemented Anonymous Mode and dual ISO certifications to
              address data privacy concerns.
            claimRefs:
              - CO034
              - CO035
              - CO036
              - CO037
              - CO038
              - CO039
              - CO040
