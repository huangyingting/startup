  - number: 5
    title: Product & Technology
    sections:
      - number: '5.1'
        title: Product Portfolio and Core User Workflows
        blocks:
          - type: paragraph
            body: |
              Flo's app is organised around five lifecycle phases: menstrual cycle tracking, ovulation and
              fertility, pregnancy, postpartum, and perimenopause. Each phase has a dedicated module with
              personalised symptom tracking, health education content, and AI-generated insights. The free
              tier provides period and ovulation predictions, cycle calendar, symptom logging, and access to
              Secret Chats—an anonymous community discussion feature. Flo Premium adds Ask Flo (the
              LLM-powered health assistant), symptom prediction and pattern analysis, a personalised doctor's
              report, guided fertility journeys, and detailed pregnancy milestone tracking.

              The perimenopause module—Flo for Perimenopause—launched in 2025 and introduced the first
              scientifically validated Perimenopause Score, developed by Flo's medical and science teams in
              collaboration with more than 100 medical experts. This directly addresses the 54% of women who
              report feeling inadequately informed about perimenopause. The module includes adapted cycle
              tracking that accounts for perimenopause irregularities, symptom monitoring for hot flashes and
              mood changes, and Secret Chats for community support.

              Flo for Partners provides male partners with pregnancy-related health information, broadening
              the addressable use case. Flo tracks 70+ symptoms across cycle phases including energy, mood,
              cramps, bloating, headaches, and sleep—enabling the ML system to surface symptom patterns tied
              to cycle phase. The premium Symptom Checker cross-references logged symptoms against medical
              knowledge to flag potential conditions. Medical articles are authored by Flo's 120+ doctor and
              expert team, making Flo the only women's health app with a 100+ in-house clinical reviewer base.
              Flo is the #1 OB-GYN-recommended period and cycle tracking app in a survey of 500 US
              obstetricians and gynaecologists.
            claimRefs:
              - CE024
              - CE025
              - CE026
              - CE027
              - CE028
              - CE029
              - CE032
              - CE044
      - number: '5.2'
        title: AI/ML Architecture and Prediction Engine
        blocks:
          - type: paragraph
            body: |
              Flo's machine learning infrastructure is its most defensible technical asset. The cycle prediction
              model employs a neural network architecture with 442 input units, ingesting cycle history, test
              results, biometrics, lifestyle factors, sleep patterns, mood, symptoms, and data streamed from
              wearables including Fitbit and Apple Watch. The training dataset exceeds 450 GB and accumulates
              1.4 million daily data points, continuously refined against actual cycle outcomes. The result is
              a 54% reduction in cycle prediction error for irregular cycles, from 5.6 days to 2.6 days—a
              clinically meaningful improvement that competitors using simpler calendar averaging cannot match.

              Ask Flo, the generative-AI health assistant, is powered by LLMs fine-tuned via Databricks'
              Mosaic AI. To validate safety before launch, Flo partnered with SuperAnnotate to build an
              expert-in-the-loop evaluation pipeline that processed more than 12,000 LLM outputs against
              clinical guidelines, achieving a validated accuracy rate exceeding 90%. This reduced iteration
              cycles from 2–3 weeks to 3–5 days and delivered a 10× throughput boost. CTO Roman Bugaev
              confirmed: "SuperAnnotate enabled us to transform deep medical expertise into scalable,
              structured ground truth data within our Databricks pipeline."

              For medical content validation at scale, Flo co-developed MACROS (Medical Automated Content
              Review and Revision Optimization Solution) with the AWS Generative AI Innovation Center. MACROS
              is built on Amazon Bedrock foundation models orchestrated via AWS Step Functions, with a Streamlit
              UI hosted in Amazon ECS and an API pathway for pipeline integration. Its design goals are 90%
              content recall accuracy, a 10× reduction in expert review time, and integration into Flo's
              existing tech infrastructure. As of the Part 1 publication, MACROS was at proof-of-concept
              stage with production scaling covered in Part 2.

              The same ML infrastructure powers symptom prediction, health issue detection, and content
              personalisation beyond cycle tracking, including the new perimenopause features that analyse
              patterns across age groups underrepresented in historical menstrual research. As FDA scrutiny
              of AI-enabled medical devices intensifies, Flo's validated ML infrastructure positions it for
              potential clinical applications—though no FDA SaMD clearance has been obtained.
