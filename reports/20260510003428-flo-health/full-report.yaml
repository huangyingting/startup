              - CU017
              - CU018
          - type: callout
            title: Premium Subscription Billing Complaints Signal Churn Risk
            body: >
              Trustpilot's adverse review tail — including multiple complaints of post-cancellation charges, failed
              in-app cancellation, and unexpected Apple subscription charges — indicates friction in the premium
              offboarding experience. This pattern is common in freemium health apps and typically inflates refund rates
              and App Store dispute tickets. If unresolved, it could amplify churn among the ~5M premium subscriber base
              and depress renewal rates.
            calloutType: risk
            claimRefs:
              - CU019
              - CU025
              - CU030
          - type: callout
            title: Data Privacy Regulatory Risk Remains a Material Overhang
            body: >
              The 2021 FTC consent order (sharing health data with Facebook and Google), a subsequent class-action
              settlement, and post-Roe legislative environment in the US create persistent regulatory exposure. Women's
              fear of period tracking data being used in legal proceedings drove measurable demand for Anonymous Mode —
              a feature Flo had to retroactively build. GDPR enforcement in the EU and US state privacy laws (CCPA,
              Colorado, Virginia) impose ongoing compliance costs and limit permissible data uses, constraining Flo's
              data monetization optionality.
            calloutType: risk
            claimRefs:
              - CU029
              - CU031
              - CU032
