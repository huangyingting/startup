  evidenceGaps:
    - type: missing-source
      severity: material
      topic: ai-prediction
      missingEvidence: >-
        Third-party independent benchmark comparing Flo's 54% cycle prediction error reduction against NaturalCycles and
        Clue with the same irregularity cohort definition.
      whyItMatters: >-
        The 54% improvement claim is company-claimed and third-party-reported from a low-reputation blog; without an
        independent peer-reviewed benchmark, competitive differentiation cannot be verified.
      diligencePath: >-
        Request Flo's internal model performance study; search PubMed for peer-reviewed menstrual cycle prediction
        accuracy studies citing Flo's dataset.
      relatedQuestionRefs:
        - QE010
    - type: private-evidence-only
      severity: minor
      topic: infrastructure
      missingEvidence: >-
        Public disclosure of Flo's own application-layer SOC 2 Type II report, penetration test frequency and scope, and
        infrastructure incident history.
      whyItMatters: >-
        Flo inherits AWS SOC certifications but an independent SOC 2 for Flo's application layer is unconfirmed;
        incident history under the current architecture is not available.
      diligencePath: Request Flo's SOC 2 Type II report, penetration test scope, and past security incident log under NDA.
      relatedQuestionRefs:
        - QE018
        - QE020
    - type: missing-source
      severity: minor
      topic: anonymous-mode
      missingEvidence: >-
        Quantitative comparison of Anonymous Mode OHTTP implementation against Clue's and NaturalCycles' stated privacy
        controls.
      whyItMatters: >-
        Flo claims Anonymous Mode is unique in femtech; this cannot be fully verified without a systematic audit of
        competitor privacy architectures.
      diligencePath: Review Clue and NaturalCycles privacy engineering blogs and architecture documentation.
      relatedQuestionRefs:
        - QE021
    - type: stale
      severity: minor
      topic: ask-flo
      missingEvidence: >-
        Current roadmap disclosure for LLM-powered features beyond Ask Flo: multilingual expansion timeline, RLHF
        implementation schedule, and additional LLM use-cases in development.
      whyItMatters: >-
        SuperAnnotate case study notes multilingual expansion and RLHF are planned but no timeline or milestone has been
        publicly committed.
      diligencePath: Request product roadmap under NDA; monitor Flo newsroom and Databricks blog for future announcements.
      relatedQuestionRefs:
        - QE024
    - type: missing-source
      severity: material
      topic: regulatory
      missingEvidence: >-
        FDA regulatory risk assessment for Ask Flo and AI-powered Symptom Checker as potential Software as a Medical
        Device (SaMD) under the FDA's AI/ML SaMD Action Plan.
      whyItMatters: >-
        If FDA classifies Ask Flo or the Symptom Checker as a SaMD requiring premarket review, Flo would face
        significant regulatory overhead and potential feature restrictions; no public FDA correspondence has been found.
      diligencePath: >-
        Review FDA SaMD guidance documents; request Flo's FDA regulatory counsel assessment; check FDA pre-submission
        records.
      relatedQuestionRefs:
        - QE025
