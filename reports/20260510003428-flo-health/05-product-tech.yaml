callouts:
  - calloutType: strength
    title: ML Prediction Accuracy and Dataset Scale Are Durable Moats
    body: |
      The 442-input neural network trained on a 450 GB+ dataset delivering 54% cycle prediction error
      reduction for irregular cycles represents a compounding data advantage. Each of Flo's 75 million
      MAUs adds new data points daily, widening the gap over smaller competitors. The combination of
      cycle history, biometrics, mood, sleep, and wearable integration cannot be replicated quickly
      by new entrants.
    claimRefs:
      - CE001
      - CE002
      - CE003
      - CE042
  - calloutType: strength
    title: Anonymous Mode Positions Flo as the Privacy Standard-Setter
    body: |
      OHTTP-based Anonymous Mode is technically ahead of any femtech competitor. Open-sourcing the
      protocol libraries and earning TIME Best Inventions 2023 recognition converts a privacy feature
      into a marketing asset and a data-trust differentiator—critical in a market sensitised by the
      post-Dobbs reproductive data surveillance debate.
    claimRefs:
      - CE019
      - CE020
      - CE021
      - CE022
      - CE023
  - calloutType: risk
    title: LLM Safety Framework Is Still Maturing
    body: |
      MACROS is at proof-of-concept stage. The SuperAnnotate pipeline validated pre-launch outputs
      but continuous production-grade LLM safety monitoring is not yet publicly confirmed. As Ask
      Flo scales to 75M MAU, the cost of a clinically incorrect AI response is reputational and
      potentially legal. FDA is increasing scrutiny of AI-enabled health apps, and Flo has no SaMD
      clearance.
    claimRefs:
      - CE011
      - CE013
      - CE016
      - CE026
  - calloutType: risk
    title: Vendor Concentration in AWS and Databricks Creates Platform Risk
    body: |
      All production infrastructure runs on a single cloud (AWS) and the AI/ML stack is now
      concentrated in a single vendor (Databricks, since June 2025). An AWS outage or a breakdown
      in Databricks partnership terms would require costly and time-consuming migration. The OHTTP
      relay for Anonymous Mode depends on Cloudflare's relay operation—a third critical single-vendor
      dependency.
    claimRefs:
      - CE005
      - CE033
      - CE034
  - calloutType: insight
    title: Databricks Partnership Signals an LLM Feature Velocity Acceleration
    body: |
      Running 150–200 experiments in parallel (400/quarter) via Databricks represents a 4-5× increase
      in experimentation throughput compared to the fragmented legacy system. The combination of Mosaic
      AI for LLM fine-tuning and Unity Catalog for governed data access creates the infrastructure
      foundation for rapid release of AI-powered features—perimenopause prediction, dietary advice
      during pregnancy, and irregular cycle management are already in the pipeline.
    claimRefs:
      - CE005
      - CE006
      - CE007
      - CE009
