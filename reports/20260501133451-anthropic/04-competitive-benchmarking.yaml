  - id: T303
    title: Moat assessment
    columns:
      - Potential moat
      - Evidence
      - Competitive relevance
      - Durability view
    rows:
      - - Safety and governance narrative
        - Public Benefit Corporation structure, Long-Term Benefit Trust, ISO 42001, Transparency Hub, and Responsible Scaling Policy. [C006][C028][C029]
        - Can matter in enterprise procurement where governance credibility affects adoption.
        - Medium-high if execution and transparency stay current.
      - - Cross-cloud availability
        - Anthropic sells through direct API, Bedrock, Vertex AI, and Foundry and claims unique frontier-family presence across AWS, Google Cloud, and Microsoft Azure. [C009][C016]
        - Broadens reach and reduces single-channel dependence from the customer perspective.
        - Medium because partner access can change.
      - - API portability
        - Anthropic preserves a near-identical Messages API model across direct, Bedrock, and Vertex surfaces. [C043]
        - Lowers switching friction for developers and enterprise platform teams.
        - Medium.
      - - Ecosystem and solution packaging
        - SI partnerships and vertical solutions in financial services expand deployment capacity. [C036][C037]
        - Helps Anthropic win implementation-heavy enterprise deals.
        - Medium.
      - - Compute access
        - AWS is the primary training partner, with more than $100B over ten years and up to 5 GW of capacity committed. [C014][C046]
        - Supports scale and reliability but also creates concentration risk.
        - Mixed strength because advantage and dependency coexist.
      - - Coding wedge
        - Claude Code is distinct and widely distributed across developer surfaces, with a claimed $2.5B+ run-rate. [C013][C044]
        - Creates a high-frequency workflow surface that can deepen enterprise entrenchment.
        - Medium-high if product usage remains sticky.
    notes: Durability assessments are analyst judgments derived from retained evidence and should be re-tested against competitor-side diligence.
