  - id: T302
    title: Feature matrix and competitive readout
    columns:
      - Capability
      - Anthropic evidence
      - Comparison-set readout
      - Competitive implication
    rows:
      - - Consumer and seat-based distribution
        - Free, Pro, Max, Team, and Enterprise plans across web, desktop, iOS, and Android. [C008][C031]
        - Named incumbent cloud channels are additive distribution routes in the retained ledger, but competitor-side seat-offer detail was not retained. [C009]
        - Anthropic can sell both self-serve and enterprise procurement from a common model stack.
      - - Direct API breadth
        - Messages, Message Batches, Token Counting, Models, Files, Skills, Agents, Sessions, and Environments APIs. [C041]
        - Competitor-side API breadth was not retained for direct benchmarking.
        - Broad builder surface supports platform rather than single-app positioning.
      - - Cross-cloud availability
        - Direct API plus Amazon Bedrock, Google Vertex AI, and Microsoft Foundry. [C009]
        - Anthropic claims Claude is the only frontier model family available across AWS, Google Cloud, and Microsoft Azure. [C016]
        - Reduces procurement friction and may matter for enterprise standardization.
      - - Governance and compliance posture
        - Public Benefit Corporation, Long-Term Benefit Trust, ISO 42001, Transparency Hub, and Responsible Scaling Policy. [C006][C028][C029]
        - Competitor-side governance comparison was not retained.
        - May create an advantage in regulated or risk-sensitive accounts.
      - - Workflow-specific product wedge
        - Claude Code is available across terminal, IDE, desktop, and web; Anthropic also packages financial-services solutions. [C013][C036]
        - Coding-assistant and vertical-solution substitutes clearly exist but were not feature-benchmarked in the retained ledger.
        - Gives Anthropic expansion vectors beyond general chat.
      - - Ecosystem-assisted deployment
        - BCG, Accenture, Infosys, and NEC extend implementation reach. [C037]
        - Competitor-side SI ecosystems were not retained for side-by-side benchmarking.
        - Improves enterprise land-and-expand capacity.
