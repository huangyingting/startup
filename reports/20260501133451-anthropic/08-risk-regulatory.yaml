sections:
  - number: '7.1'
    title: Risk overview
    body: |
      Anthropic should be underwritten as a company with strong governance optics but significant execution and valuation risk. The public evidence is notably better on safety posture, cloud partnerships, and commercialization breadth than on audited financials, retention, concentration, or contingent liabilities. That makes this a case where downside is less about whether the company matters strategically and more about whether public scale claims, gross-margin resilience, and customer durability hold up under private diligence. [C006][C009][C019][C022][C023][C028][C029][C046]
    claimRefs:
      - C006
      - C009
      - C019
      - C022
      - C023
      - C028
      - C029
      - C046
  - number: '7.2'
    title: Regulatory and legal risk
    body: |
      Anthropic’s disclosed regulatory and legal posture is better than average for a frontier-AI company. It has a Public Benefit Corporation structure, Long-Term Benefit Trust oversight, ISO 42001 certification, a Trust Center, a Transparency Hub, a Responsible Scaling Policy, and published accountability and White House commitment materials. Commercial terms and the DPA also provide relatively clear customer-data protections. The limitation is that the retained public record does not provide a consolidated litigation, reserve, or contingent-liability view, so the legal-risk conclusion is "managed but not fully visible." [C006][C010][C028][C029][C030][C034]
    claimRefs:
      - C006
      - C010
      - C028
      - C029
      - C030
      - C034
  - number: '7.3'
    title: Credit, operational, and security risk
    body: |
      The biggest operating-risk cluster combines concentration, margin opacity, and control burden. AWS is Anthropic’s primary training and mission-critical cloud partner, and the more than $100 billion ten-year AWS agreement materially increases the importance of vendor economics and resilience. At the same time, Anthropic continues to publish misuse and safeguard updates, which is positive evidence of active controls but also evidence that monitoring and incident-response obligations remain ongoing. Public sources do not disclose receivables quality, bad-debt history, gross margin, or incident metrics, so underwriting should assume meaningful unknowns until management data is reviewed. [C010][C014][C022][C023][C030][C040][C046]
    claimRefs:
      - C010
      - C014
      - C022
      - C023
      - C030
      - C040
      - C046
  - number: '7.4'
    title: Competitive and channel risk
    body: |
      Anthropic’s distribution is a strength and a dependency at the same time. Claude is available directly and through Amazon Bedrock, Google Vertex AI, and Microsoft Foundry, which broadens procurement and deployment routes. But those same channels are also powerful intermediaries with their own platform interests, customer control, and infrastructure leverage. The competitive risk is therefore not only model substitution; it is also that partner-mediated routes could compress economics, slow enterprise standardization, or weaken Anthropic’s bargaining power over time. [C009][C015][C016][C037][C045][C046]
    claimRefs:
      - C009
      - C015
      - C016
      - C037
      - C045
      - C046
  - number: '7.5'
    title: Mitigation summary and kill criteria
    body: |
      The evidence-supported mitigation case rests on Anthropic’s governance stack, cross-cloud availability, capital access, and visible enterprise traction. The evidence-supported kill criteria are equally clear: do not underwrite through unresolved audited-revenue gaps, weak retention or concentration findings, structurally poor compute economics, or material legal exposures that could impair product rights or distribution. In practical terms, a deal should stop if diligence cannot validate revenue quality, gross-margin path, customer durability, and infrastructure resilience at a level commensurate with a $380 billion post-money valuation. [C006][C019][C022][C023][C028][C029][C046]
    claimRefs:
      - C006
      - C019
      - C022
      - C023
      - C028
      - C029
      - C046
