  - id: T702
    title: Regulatory, legal, credit, operational, and security posture
    columns:
      - Domain
      - What is evidenced
      - Primary open question
      - Investor implication
    rows:
      - - Governance and AI safety
        - Public Benefit Corporation status, Long-Term Benefit Trust, Responsible Scaling Policy, and accountability publications are public. [C006][C029][C034]
        - How often do safety triggers materially delay launches or reduce commercial velocity?
        - Governance is a strength, but it may also constrain pace if capability growth outstrips control readiness.
      - - Privacy and data handling
        - Commercial terms and DPA state customers own outputs and Anthropic may not train on governed customer content, while Anthropic positions itself as a processor for commercial personal data. [C010][C030]
        - What are actual incident rates, exception paths, and enforcement controls across products and partner channels?
        - Positive enterprise signal, but operational proof is needed.
      - - Misuse and content-risk operations
        - Anthropic continues to publish misuse, election, child-safety, and safeguard updates. [C040]
        - What is the internal incident volume, escalation burden, and associated cost of control?
        - Persistent control burden can become a margin and release-velocity issue.
      - - Credit and contract quality
        - Public sources show enterprise and cloud-channel scale, but not receivables quality, payment terms, or bad-debt history. [C022][C023][C024]
        - Are large-enterprise and cloud-routed accounts paying on favorable, low-risk terms?
        - Revenue scale is visible, but credit quality is unproven.
      - - Litigation and contingent liabilities
        - The retained public set does not provide a consolidated litigation-outcome or reserve view.
        - Are there material IP, privacy, employment, or regulatory matters that could alter cash needs or product rights?
        - This is a meaningful diligence blocker before high-conviction underwriting.
    notes: The absence of a consolidated litigation, bad-debt, or reserve view is a retained-evidence gap rather than evidence of no exposure.
