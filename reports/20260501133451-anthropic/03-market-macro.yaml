sections:
  - number: '2.1'
    title: Market definition
    body: Anthropic’s addressable market is best understood as a converged frontier-AI platform market rather than as a single chatbot category. Claude is sold through consumer subscriptions, Team and Enterprise seats, direct APIs, cloud-provider channels, and a dedicated coding product, which together point to one market structure spanning end-user productivity, developer tooling, and enterprise AI infrastructure. [C007][C008][C009][C013][C031]
    claimRefs:
      - C007
      - C008
      - C009
      - C013
      - C031
  - number: '2.2'
    title: TAM / SAM / SOM analysis
    body: The retained evidence supports a qualitative TAM/SAM/SOM framing but not an independent top-down dollar model. TAM is the broad frontier-AI demand pool across consumer, enterprise, API, cloud, and coding workflows. SAM narrows to reachable governed enterprise and developer workloads that can be bought through Anthropic’s direct and partner channels. SOM is the current served footprint evidenced by company-claimed run-rate revenue of $14B in February 2026 and $30B+ in April 2026, plus 500+ customers spending over $1M annually and 100000+ Bedrock customers. [C008][C009][C014][C015][C022][C023][C024][C037][C045]
    claimRefs:
      - C008
      - C009
      - C014
      - C015
      - C022
      - C023
      - C024
      - C037
      - C045
  - number: '2.3'
    title: Growth drivers
    body: The clearest demand drivers in the ledger are cloud procurement compatibility, governance-sensitive enterprise buying, workflow-specific product expansion, and SI-led implementation capacity. Bedrock, Vertex AI, and Microsoft Foundry broaden procurement paths; Public Benefit Corporation status, the Long-Term Benefit Trust, ISO 42001, and the Responsible Scaling Policy strengthen trust-sensitive positioning; and Claude Code plus vertical solutions expand monetization beyond generic chat. [C006][C009][C013][C028][C029][C036][C037][C045]
    claimRefs:
      - C006
      - C009
      - C013
      - C028
      - C029
      - C036
      - C037
      - C045
  - number: '2.4'
    title: Segment analysis
    body: The most visible segments in the retained ledger are large enterprises, developers, cloud-routed enterprise buyers, and regulated or workflow-specific verticals. Evidence includes direct pricing and plan tiers, API breadth, coding-product distribution, customer proof in legal and security, financial-services packaging, and systems-integrator partnerships. This mix suggests Anthropic’s strongest near-term market expansion is likely to come from enterprise and developer segments rather than from consumer chat alone. [C008][C009][C013][C021][C026][C027][C036][C037][C041]
    claimRefs:
      - C008
      - C009
      - C013
      - C021
      - C026
      - C027
      - C036
      - C037
      - C041
