    title: Market definitions and evidence-backed sizing lens
    columns:
      - Market layer
      - Definition
      - Evidenced demand anchor
      - Dollar sizing status
      - Estimate basis
    rows:
      - - Frontier AI platform market
        - General-purpose AI sold through consumer apps, enterprise seats, APIs, and partner clouds.
        - Claude is available across consumer, API, and partner-cloud surfaces. [C007][C008][C009]
        - No independent total market dollars retained in the ledger.
        - Definition-led layer based on actual product surfaces, not external TAM data.
      - - Governed enterprise AI workloads
        - Enterprise deployments where reliability, controls, and procurement compatibility matter.
        - Anthropic shows customer proof across legal, security, pharma, financial services, and enterprise AI deployments. [C021][C026][C027][C036][C037]
        - No independent SAM dollars retained in the ledger.
        - SAM boundary is inferred from evidenced enterprise verticals, compliance posture, and channel access.
      - - Cross-cloud model access market
        - AI demand purchased through existing cloud-provider relationships rather than only direct vendor contracts.
        - Claude is distributed through Amazon Bedrock, Google Vertex AI, and Microsoft Foundry. [C009][C014][C015]
        - No separate cloud-channel dollar dataset retained.
        - Layer defined by procurement route and interoperability evidence.
      - - AI coding workflow market
        - Developer spend tied to IDE, terminal, and coding-agent workflows.
        - Claude Code is a dedicated coding product across terminal, VS Code, JetBrains, desktop, and web; Anthropic claims Claude Code exceeded $2.5B in run-rate revenue. [C013][C044]
        - No independent category-size dollars retained.
        - Market layer defined by distinct product surface plus company-claimed monetization anchor.
    notes: The ledger supports market-boundary definitions and served-footprint anchors, but not independent TAM or share estimates.
