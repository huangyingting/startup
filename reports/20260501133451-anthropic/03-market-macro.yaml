company:
  name: Anthropic
chapter:
  number: 2
  title: Market Sizing & Macro Analysis
  summary: Anthropic participates in a broad frontier-AI market that spans consumer assistants, enterprise seats, direct APIs, cloud-channel distribution, and coding workflows, with especially strong evidence of enterprise and developer demand. The retained ledger supports a definition-led TAM/SAM framing and a SOM anchored to Anthropic’s disclosed or company-claimed footprint, but it does not retain independent third-party TAM or market-share datasets. [C007][C008][C009][C013][C021][C022][C023]
callouts:
  - type: key-insight
    title: Multi-surface demand is the core market feature
    body: Anthropic is not selling into a single chatbot market; Claude is monetized through subscriptions, enterprise seats, direct API usage, cloud marketplaces, and Claude Code workflows. [C007][C008][C009][C013][C031]
    claimRefs:
      - C007
      - C008
      - C009
      - C013
      - C031
  - type: opportunity
    title: Enterprise demand is broad and increasingly workflow-specific
    body: Customer and partner proof spans software, legal, security, pharma, financial services, and SI-led deployments, suggesting that the served market is expanding from generic chat into higher-value workflow automation. [C021][C025][C026][C027][C036][C037]
    claimRefs:
      - C021
      - C025
      - C026
      - C027
      - C036
      - C037
  - type: key-insight
    title: Cloud channels materially enlarge reachable SAM
    body: Claude is sold through Amazon Bedrock, Google Vertex AI, and Microsoft Foundry, while AWS and Google partner posts corroborate cloud-channel execution. This widens procurement pathways for enterprises that prefer to buy AI inside existing cloud relationships. [C009][C014][C015][C045]
    claimRefs:
      - C009
      - C014
      - C015
      - C045
  - type: risk-alert
    title: Market sizing is evidence-constrained
    body: The retained ledger includes strong company and partner demand signals, but the biggest numeric sizing anchors are company-claimed revenue and customer counts rather than independent market datasets. [C022][C023][C024][C044]
    claimRefs:
      - C022
      - C023
      - C024
      - C044
tables:
