  - number: 8
    title: Risk & Regulatory
    sections:
      - number: '8.1'
        title: Risk overview
        blocks:
          - type: callout
            title: Governance posture is a real risk mitigant
            body: |
              Public Benefit Corporation status, the Long-Term Benefit Trust, ISO 42001, the Trust Center, the Transparency Hub, and the Responsible Scaling Policy give Anthropic a stronger disclosed governance stack than most venture-scale AI companies provide publicly. [C006][C028][C029]
