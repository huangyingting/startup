              Anthropic’s disclosed regulatory and legal posture is better than average for a frontier-AI company. It has a Public Benefit Corporation structure, Long-Term Benefit Trust oversight, ISO 42001 certification, a Trust Center, a Transparency Hub, a Responsible Scaling Policy, and published accountability and White House commitment materials. Commercial terms and the DPA also provide relatively clear customer-data protections. The limitation is that the retained public record does not provide a consolidated litigation, reserve, or contingent-liability view, so the legal-risk conclusion is "managed but not fully visible." [C006][C010][C028][C029][C030][C034]
