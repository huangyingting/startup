          label: Revenue-quality uncertainty
          detail: Missing audited retention, concentration, and revenue-mix data weakens conviction in durability.
          tone: high
        - id: p3
          label: Product or release friction
          detail: Safety controls or incident-response load can slow product rollout and increase enterprise support burden.
          tone: medium
        - id: u1
          label: Lower underwriteable cash-flow quality
          detail: Weak confidence in margin and retention reduces supportable valuation multiples.
          tone: critical
        - id: u2
          label: Next-round or mark compression risk
