  - id: T703
    title: Mitigation priorities and stop-loss / kill criteria
    columns:
      - Trigger area
      - Evidence-backed rationale
      - Diligence requirement
      - Kill criterion or stop-loss trigger
    rows:
      - - Revenue quality
        - Public scale claims are company-claimed, not audited. [C022][C023][C044]
        - Obtain audited or board-approved historical revenue by stream and month.
        - Stop if audited revenue quality materially fails to support the company-claimed run-rate narrative or if revenue concentration is structurally worse than expected.
      - - Margin and compute economics
        - AWS is the primary cloud partner and commitments exceed $100B over ten years. [C014][C046]
        - Obtain committed-versus-consumed compute schedule, channel take-rates, and gross-margin bridge.
        - Stop if realized compute economics imply structurally weak gross margins with no credible path to improvement.
      - - Customer durability
        - Anthropic claims meaningful enterprise scale, but public NRR, churn, and concentration are not disclosed. [C022][C023]
        - Obtain NRR, gross retention, churn, top-10 customer share, and cloud-channel conversion quality.
        - Stop if retention is materially subscale for enterprise software benchmarks or if concentration is incompatible with the valuation case.
      - - Legal and regulatory exposure
        - Anthropic has strong disclosed controls, but no consolidated litigation or reserve view is retained publicly. [C028][C029][C030][C034]
        - Obtain legal docket summary, outside-counsel memo, and reserve policy.
        - Stop if there is a material unresolved IP, privacy, or regulatory matter that could impair distribution, product rights, or financing.
      - - Infrastructure concentration
        - AWS concentration is strategically valuable but also a dependency. [C014][C046]
        - Obtain contingency plan, vendor concentration limits, and effective pricing protections.
        - Stop if the company lacks a credible resilience plan for partner pricing, outages, or strategic channel conflict.
    notes: Kill criteria are investor decision rules derived from retained evidence and known diligence gaps.
