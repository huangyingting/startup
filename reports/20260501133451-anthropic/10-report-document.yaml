      - number: '5.2'
        title: Scale anchors versus disclosure quality
        blocks:
          - type: callout
            title: Reported scale is extraordinary but mostly company-claimed
            body: |
              Anthropic’s strongest financial scale claims are a $14 billion run-rate in February 2026, $30 billion+ by April 2026, 500+ customers spending over $1 million annually, and Claude Code above $2.5 billion in run-rate revenue. These are important underwriting anchors, but they are still company-claimed rather than audited public financials. [C022][C023][C044]
