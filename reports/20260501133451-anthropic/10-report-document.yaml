              The retained ledger supports only a constrained valuation framework. Private-mark anchors are strong: Anthropic moved from a $61.5 billion post-money Series E in March 2025 to a $380 billion post-money Series G in February 2026. Revenue-multiple sensitivity can be illustrated using the company-claimed $14 billion February 2026 run-rate and $30 billion+ April 2026 run-rate floor, which imply roughly 27.1x and 12.7x, respectively, against the Series G mark. Public-comparable multiples were not retained in the ledger, so they should be treated as a research-more item rather than fabricated for this report. [C018][C019][C022][C023]
