  - number: 9
    title: 投资与估值
    sections:
      - number: '9.1'
        title: 估值框架
        blocks:
          - type: callout
            title: 估值已跑在公开尽调深度之前
            body: |
              即使已观测到 2026 年 2 月估值达到投后 $380B，最强的运营规模证据仍主要来自公司自述。这一差距是建议未更为积极的核心原因。[C019][C022][C023]
            calloutType: risk-alert
            tableRef: null
            figureRef: null
            items: []
            equation: null
            claimRefs:
              - C019
              - C022
              - C023
          - type: paragraph
            title: null
            body: |
              保留台账仅支持一个受约束的估值框架。私募估值锚点很强：Anthropic 从 2025 年 3 月投后 $61.5 billion 的 E 轮，跃升至 2026 年 2 月投后 $380 billion 的 G 轮。可用公司声称的 2026 年 2 月 $14 billion 收入运行率和 2026 年 4 月 $30 billion+ 收入运行率下限来展示收入倍数敏感性，对应 G 轮估值约为 27.1x 和 12.7x。公开可比公司倍数并未保留在台账中，因此应将其视为需要进一步研究的事项，而不是在本报告中凭空构造。[C018][C019][C022][C023]
