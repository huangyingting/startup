      - number: '9.3'
        title: 最终投资建议
        blocks:
          - type: paragraph
            title: null
            body: |
              最终建议为持续跟踪。信心水平为中等，因为战略和产品证据很强，但财务承保证据存在实质性缺口。风险评级为显著，因为下行风险更可能通过估值支撑、利润率质量、集中度或法律风险显现，而非简单的需求崩塌逻辑。估值立场为偏高，因为最新观测到的私募估值已提前反映了相当大一部分上行空间，而公开记录在经审计支撑方面仍较薄弱。[C019][C022][C023][C046]
