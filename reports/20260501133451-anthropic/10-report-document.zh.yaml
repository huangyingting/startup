      - 有证据支持的逻辑
      - 尽调要求
      - 否决标准或止损触发条件
    rows:
      - - 收入质量
        - 公开规模主张来自公司自述，而非审计。[C022][C023][C044]
        - 获取按收入流和月份划分、经审计或董事会批准的历史收入数据。
        - 如果经审计收入质量无法实质性支撑公司自述的收入运行率叙事，或收入集中度在结构上比预期更差，则应停止。
      - - 利润率与算力经济性
        - AWS is the primary cloud partner and commitments exceed $100B over ten years. [C014][C046]
        - 获取已承诺与已消耗算力时间表、渠道抽成率和毛利率桥接。
        - 如果已实现的算力经济性意味着毛利率结构性疲弱且没有可信的改善路径，则应停止。
      - - 客户持续性
        - Anthropic claims meaningful enterprise scale, but public NRR, churn, and concentration are not disclosed. [C022][C023]
        - 获取 NRR、毛留存、流失、前 10 大客户占比以及云渠道转化质量数据。
        - 如果留存明显低于企业软件基准，或集中度与估值逻辑不相容，则应停止。
      - - 法律与监管风险敞口
        - Anthropic 已披露的控制措施较强，但公开资料中未保留统一的诉讼或准备金视图。[C028][C029][C030][C034]
        - 获取法律案件摘要、外部律师备忘录和准备金政策。
        - 如果存在重大且未解决的知识产权、隐私或监管事项，可能损害分销、产品权利或融资能力，则应停止。
      - - 基础设施集中度
        - AWS 集中度在战略上有价值，但同时也是一种依赖。[C014][C046]
        - 获取应急方案、供应商集中度上限和有效价格保护条款。
        - 如果公司缺乏针对合作伙伴定价、宕机或战略渠道冲突的可信韧性方案，则应停止。
    notes: 否决标准是基于保留证据和已知尽调缺口得出的投资者决策规则。
