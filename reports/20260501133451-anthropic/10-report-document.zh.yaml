startupIntroduction:
  summary: Anthropic 是一家总部位于旧金山的 AI 安全与研究公司，成立于 2021 年初，由联合创始人 Dario Amodei 和 Daniela Amodei 领导。公司以 Public Benefit Corporation 形式运营，并叠加 Long-Term Benefit Trust 治理机制；其通过消费者订阅、企业席位、直接 API 访问、Claude Code 以及包括 Amazon Bedrock、Google Vertex AI 和 Microsoft Foundry 在内的主要云合作伙伴渠道将 Claude 商业化。截至最新获取的官方融资披露，Anthropic 是一家后期私营公司，已完成一笔投后估值 $380B 的 $30 billion G 轮融资；公司另行声称，其收入运行率已于 2026 年 2 月达到 $14 billion，并于 2026 年 4 月超过 $30 billion。[C002][C003][C005][C006][C007][C008][C009][C019][C022][C023]
