          - type: callout
            title: 仅在高质量私有数据基础上重新承保
            body: |
              若要给出更积极的建议，需要获得经审计的历史数据、按收入流和渠道拆分的收入、留存与集中度数据、算力成本桥接，以及一套清晰的法律风险材料。在此之前，合适的立场仍是持续跟踪，且估值观点为偏高。[C022][C023][C046]
