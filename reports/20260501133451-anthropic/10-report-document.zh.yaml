appendices:
  - id: A
    title: 优先尽调缺口
    blocks:
      - type: paragraph
        body: 按收入流划分的经审计收入、毛利率桥接、算力成本兑现情况以及收入集中度，仍是给出 buy 建议的主要障碍。[C019][C022][C023][C046]
        claimRefs:
          - C019
          - C022
          - C023
          - C046
      - type: paragraph
        body: 客户持续性在公开材料中仍证据不足，因为 NRR、流失、cohort 行为和头部客户集中度并未披露。[C022][C023]
        claimRefs:
          - C022
          - C023
      - type: paragraph
        body: 当前员工数量以及统一的诉讼或或有负债视图，同样缺失于保留的公开记录中。[C034][C050]
        claimRefs:
          - C034
          - C050
  - id: B
    title: 重新承保检查清单
    blocks:
      - type: paragraph
        body: 仅在收到经审计或董事会批准的财务数据、客户留存与集中度数据、算力经济性桥接，以及清晰的法律风险材料后，才应重新承保。[C022][C023][C028][C029][C046]
        claimRefs:
          - C022
          - C023
          - C028
          - C029
          - C046
      - type: paragraph
        body: 如果私下尽调能够验证收入质量、利润率轨迹、客户持续性，以及可管理的基础设施集中度，那么在合适价格下，Anthropic 可能值得采取更积极的入场立场。[C014][C019][C022][C023][C046]
        claimRefs:
          - C014
          - C019
          - C022
          - C023
          - C046
