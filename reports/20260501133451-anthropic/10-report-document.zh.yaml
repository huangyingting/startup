      - number: '8.3'
        title: 缓释优先级与止损规则
        blocks:
          - type: callout
            title: 基础设施集中度是最大的非监管运营风险
            body: |
              AWS 是 Anthropic 的主要云与训练合作伙伴，且 2026 年 4 月协议承诺在十年内投入超过 $100 billion，并支持最高 5 GW 容量。这确保了规模，但也带来了供应商议价能力、成本灵活性和韧性风险。[C014][C046]
