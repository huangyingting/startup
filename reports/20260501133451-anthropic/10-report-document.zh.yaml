      - number: '8.2'
        title: 监管与运营姿态
        blocks:
          - type: callout
            title: 滥用、隐私与政策义务在结构上将持续存在
            body: |
              Anthropic 持续发布有关滥用、选举、儿童安全和防护措施的更新，其法律和 DPA 材料也强化了客户数据保护。这一组合既意味着相对成熟的控制姿态，也意味着持续存在的监控、文档记录和事件响应负担。[C010][C030][C034][C040]
            calloutType: risk-alert
