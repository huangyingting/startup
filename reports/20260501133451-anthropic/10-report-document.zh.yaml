  - number: 8
    title: 风险与监管
    sections:
      - number: '8.1'
        title: 风险概览
        blocks:
          - type: callout
            title: 治理姿态是真实有效的风险缓释因素
            body: |
              Public Benefit Corporation 身份、Long-Term Benefit Trust、ISO 42001、Trust Center、Transparency Hub 以及 Responsible Scaling Policy，使 Anthropic 拥有比大多数风险投资阶段 AI 公司更强的公开治理体系披露。[C006][C028][C029]
            calloutType: key-insight
            tableRef: null
            figureRef: null
            items: []
            equation: null
            claimRefs:
              - C006
              - C028
              - C029
          - type: paragraph
            title: null
            body: |
              应将 Anthropic 视为一家治理形象强、但执行与估值风险显著的公司来承保。公开证据在安全姿态、云合作关系和商业化广度方面明显强于在经审计财务、留存、集中度或或有负债方面的披露。因此，本案下行风险不太在于公司是否具有战略意义，而更多在于其公开规模主张、毛利韧性和客户持续性，能否在私下尽调中经受检验。[C006][C009][C019][C022][C023][C028][C029][C046]
