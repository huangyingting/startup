      - 证据
      - 竞争相关性
      - 持续性看法
    rows:
      - - 安全与治理叙事
        - Public Benefit Corporation structure, Long-Term Benefit Trust, ISO 42001, Transparency Hub, and Responsible Scaling Policy. [C006][C028][C029]
        - 在治理公信力影响采用的企业采购中，这一点可能很重要。
        - 如果执行与透明度持续保持更新，则为中高。
      - - 跨云可用性
        - Anthropic sells through direct API, Bedrock, Vertex AI, and Foundry and claims unique frontier-family presence across AWS, Google Cloud, and Microsoft Azure. [C009][C016]
        - 从客户视角看，这扩大了触达范围并降低了对单一渠道的依赖。
        - 中等，因为合作伙伴准入可能发生变化。
      - - API 可移植性
        - Anthropic 在直连、Bedrock 和 Vertex 界面之间保持了几乎相同的 Messages API 模式。[C043]
        - 降低开发者和企业平台团队的切换摩擦。
        - Medium.
      - - 生态与解决方案封装
        - SI 合作关系以及金融服务垂直解决方案扩展了部署能力。[C036][C037]
        - 帮助 Anthropic 赢得实施复杂度高的企业交易。
        - Medium.
      - - 算力获取
        - AWS 是主要训练合作伙伴，十年承诺超过 $100B，且承诺容量最高达 5 GW。[C014][C046]
        - 支持规模和可靠性，但也带来集中度风险。
        - 优势与依赖并存，因此强度评价为混合。
      - - 编码楔子
        - Claude Code 具备独立性，并广泛分布于开发者界面之上，声称收入运行率达 $2.5B+。[C013][C044]
        - 创造了一个高频工作流界面，可加深企业黏性。
        - 如果产品使用保持黏性，则为中高。
    notes: 持续性评估是基于保留证据得出的分析师判断，应在竞品侧尽调中再次验证。
