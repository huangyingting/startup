          - type: paragraph
            title: null
            body: |
              有证据支持的缓释逻辑建立在 Anthropic 的治理体系、跨云可用性、资本获取能力和可见的企业牵引力之上。同样清晰的还有有证据支持的否决标准：如果经审计收入缺口未解决、留存或集中度发现疲弱、算力经济性结构性不佳，或存在可能损害产品权利或分销的重大法律风险，则不应继续承保。实际操作上，如果尽调无法验证收入质量、毛利率路径、客户持续性和基础设施韧性达到与投后 $380 billion 估值相称的水平，交易就应停止。[C006][C019][C022][C023][C028][C029][C046]
